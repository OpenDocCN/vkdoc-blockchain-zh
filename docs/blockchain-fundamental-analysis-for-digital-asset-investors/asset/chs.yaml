  \n\n\n### 质押项目概览\n\n暂且不论所有项目的基本面，`Tron` 和 `BNB Chain` 是突出的顶级质押项目，其实际奖励率分别为 7.36%\
  \ 和 6.34%，紧随其后的是`以太坊`和`波卡`。`Tron` 48.10% 的质押比例代表了已质押代币的良好平衡，既支持了网络安全，又维持了充足的流动性。`BNB\
  \ Chain` 的质押比例较低，为 22.39%，这促成了其高且具有吸引力的奖励率。即使其质押比例较低，但其 202.6 亿美元的庞大质押市值使其成为一个高度安全的网络，降低了遭受攻击的风险。为了维护网络安全，对于质押市值较小的项目，达到一个适中的质押比例至关重要。\n\
  \n`Solana` 和 `Cardano` 的质押比例很高，但实际奖励率却很低。相比之下，`Aptos` 和 `Celestia` 的质押比例处于中高水平，但由于高达\
  \ 12.24% 和 18.94% 的巨大通胀率，其实际奖励率为负值。那些具有稳定奖励率、高质押市值且质押比例适中偏低（低至中等）的资产，为投资者提供了盈利能力、安全性和流动性的最佳组合。\n\
  \n### 挖矿奖励\n\n正如第 6 章“区块链架构”中“工作量证明 (PoW)”一节所讨论的，*挖矿*是通过生成满足特定条件的密码学解决方案来创建一个有效区块（称为区块创建），从而验证和记录区块链交易的过程。当*矿工*解决这个复杂的数学难题时，他们会铸造（创建）新的比特币，并收取该区块中包含的交易费用。请注意，只有最先解决数学难题的矿工才能获得奖励——这被称为工作量证明\
  \ (PoW) 共识机制。`bitcoin` 是 PoW 区块链的一个典型例子，矿工因其计算工作而获得激励。\n\n**优势**\n\n- **奖励** – 根据数字资产的不同，挖矿可能非常有利可图，矿工不仅可以获得挖矿奖励，还可以获得交易费用，例如\
  \ `bitcoin`。\n- **资产增值** – 如果所挖加密货币的价值随时间增值，矿工获得的奖励在未来可能会价值更高。\n- **网络贡献** – 矿工有助于维护区块链网络的安全，提升项目声誉和投资者信心，这可能间接支持代币的长期价值。\n\
  - **去中心化** – 独立矿工增加了网络的整体去中心化程度。\n\n**劣势**\n\n- **能源消耗** – 由于使用高功率的 ASIC（*专用集成电路*）矿机，电费可能非常高昂，甚至可能超过挖矿奖励带来的利润。\n\
  - **启动成本** – 初始启动成本可能很高，这主要是由于搭建 ASIC 矿机所需的花费。通常，ASIC 矿机效率越高，价格也越高。\n- **维护** –\
  \ 对于不熟悉 PoW 挖矿的人来说，矿机的搭建和维护在技术上可能具有挑战性。\n- **技术进步** – 由于技术的快速进步，矿机很快就会被更强大的技术所取代，这削弱了旧矿机的盈利能力，除非投入更多资金升级到最新技术。\n\
  - **运营要求** – 挖矿设备通常噪音很大，并且散发大量热量。因此，根据居住环境的不同，可能需要一个隐蔽且受控的环境。\n- **竞争** – 大型的中心化矿场使得独立矿工或小型矿池难以竞争利润。\n\
  - **技术知识** – 由于搭建、维护和升级挖矿硬件及软件的技术性很强，对于没有相关经验的人来说非常复杂。\n\n### 流动性挖矿\n\n*示例：* [Uniswap](https://uniswap.org/)、[PancakeSwap](https://pancakeswap.finance/)、[Balancer](https://balancer.fi/)\
  \ 和 [Curve](https://curve.fi/%2523/ethereum/swap)\n\n流动性挖矿是一个 DeFi 流程，用户通过向去中心化金融\
  \ (DeFi) 协议提供流动性来赚取被动收入。诸如 [Uniswap](https://uniswap.org/) 和 [Curve](https://curve.fi/%2523/ethereum/pools)\
  \ 等去中心化交易所 (DEX) 是自动做市商 (AMM)，它们在无需第三方交易平台参与的情况下促进数字资产的兑换。要进行代币兑换，必须有充足的流动性。\n\n\
  流动性高的数字资产拥有众多的买家和卖家，能够以最低成本实现快速成交的交易。相比之下，低流动性资产通常会导致交易速度变慢、潜在的滑点以及更高的费用。为了解决这个问题，自动做市商激励用户（称为流动性提供者，简称\
  \ LP）将其数字资产存入流动性池。流动性提供者因其帮助维持流动性而获得奖励，这通过促进更快、更便宜的兑换惠及所有 DEX 用户。\n\n例如，一个流动性提供者为支持\
  \ `ETH` 和 `USDT`（反之亦然）之间的兑换提供流动性，会将等值的 `ETH` 和 `USDT` 存入一个 `ETH/USDT` 流动性池中。作为回报，流动性提供者会获得奖励，通常是该池中交易产生的手续费的一定份额。一些项目还会提供额外的代币奖励以鼓励更多的流动性，特别是针对新代币或不太知名的代币，这些代币在早期阶段流动性可能较差。\n\
  \n![一张加密货币平台界面截图，显示各种流动性池。顶部栏显示总存款、日交易量和加密货币交易量份额。下方有搜索栏和不同加密货币的筛选选项。表格列出了各流动性池，包含池名称、基础年化收益率、奖励、交易量和总锁仓价值\
  \ (TVL) 等列。显示的池包括 \"steth\"、\"tricrypto2\"、\"3pool\"、\"crvUSD/USDC\"、\"fraxusdc\"\
  \ 和 \"crvUSD/USDT\"，每个都附有具体的百分比和数值。顶部还提供了按交易量排序和隐藏小额池的选项。右上角有以太坊和钱包连接按钮。](img/648696_1_En_13_Fig4_HTML.jpg)\n\
  \n图 13-4\n\nCurve DAO 流动性池（图片由 [`​curve.​fi/​#/​ethereum/​pools`](https://curve.fi/%2523/ethereum/pools)\
  \ 提供）\n\n流动性提供者会收到自动铸造的流动性池代币（LP 代币），这些代币追踪他们在池中的份额，并赋予他们获得相应比例交易费用以及自动做市商提供的任何额外激励的权利。一些\
  \ LP 代币的例子可以在 `Balancer` 和 `SushiSwap` 等平台上看到。在 `Balancer` 上，这些代币被称为 *Balancer 池代币*\
  \ (BPT)，而在 `SushiSwap` 上，它们被称为 *SushiSwap 流动性提供者* (SLP) 代币。这些 LP 代币是大多数 DEX 提供商不可或缺的部分，代表了参与者在该流动性池中权益的证明（收据）以及所赚取的利息。LP\
  \ 代币作为锁定在池子智能合约中资产的收据，允许提供者在协议允许时随时提取其原始本金（和费用）。如果需要，LP 代币使流动性提供者能够获取加密贷款、转移已质押流动性的所有权，并在流动性挖矿中赚取复利。大多数流动性挖矿平台通常允许参与者随时提取其\
  \ LP 代币，并兑现所赚取的费用和奖励。\n\n对于新项目而言，流动性奖励通常始于流动性提供者获得高额奖励（收益率）。然而，随着越来越多的流动性提供者向池中添加流动性，奖励会在所有\
  \ LP 参与者之间进行分配，从而稀释了激励。此外，其他因素，如协议类型、特定的流动性池和市场状况，都会影响流动性挖矿的奖励。\n\n\n\n"
- '# 流动性挖矿风险


  流动性挖矿虽然利润丰厚，但并非没有风险。当流动性池中两种代币的价格比率偏离存入时的比率时，就会发生无常损失（IL）——无论它们的法币价格是上涨还是下跌——最终
  LP 头寸的价值会低于单纯持有这些代币。这两种价值之间的差额决定了损失的规模：差额越大，损失越大。


  **专业提示**


  对于提供极高 LP 收益率的项目要格外谨慎。这些通常与涉及小型、早期初创项目的代币对相关，这些项目市值极小，具有高风险和极高的波动性。


  由于无常损失源于交易对内的波动性，因此包含至少一种稳定资产（`USDC`、`USDT`或`DAI`）的流动性池不易受到影响。类似地，对于由两种稳定币组成的流动性对，无常损失风险会进一步降低；然而，激励水平也会相应降低。在某些情况下，随着时间的推移，池内向流动性提供者提供的奖励有可能抵消无常损失，同时仍能提供利润。


  ![流程图说明了将以太坊代币（ETH 和 sETH）存入 Uniswap sETH/ETH 池合约的过程。池合约生成 50/50 的流动性池份额，然后存入 Synthetix
  质押合约。该图显示了交易费用流向用户以及从质押合约中获得 SNX 奖励的流程。关键要素包括以太坊代币、池合约、流动性份额和奖励分配。](img/648696_1_En_13_Fig5_HTML.jpg)


  **图 13-5**

  Uniswap 去中心化交易所的流动性挖矿流程（来源：[`academy.shrimpy.io/lesson/what-is-liquidity-mining`](https://academy.shrimpy.io/lesson/what-is-liquidity-mining)）


  ### 优势


  - **高收益潜力** – 投资者可以赚取高额的年化收益率（APY）。

  - **低准入门槛** – 无需昂贵的硬件或软件。

  - **支持项目** – 通过提供流动性，用户支持和促进了项目的成功。

  - **接触新项目** – 流动性提供者可以从新兴的、有前景的项目中获得代币，这些代币的价值可能会随着时间的推移而增长。


  ### 劣势


  - **无常损失风险** – 由于流动性池内代币价值的变化，可能导致重大损失。

  - **拉地毯骗局** – 早期项目经常用高回报吸引流动性提供者。然而，有时欺诈团队会突然撤走所有流动性，让投资者持有毫无价值的代币。这种骗局通常被称为“拉地毯骗局”。

  - **代码漏洞** – 流动性中存在的任何漏洞或代码缺陷都会给黑客可乘之机，可能导致流动性提供者遭受永久性损失。


  '
- '# 流动性收益 farming/ 收益农耕


  **示例：** [Compound Finance](https://compound.finance/) 和 [Aave](https://aave.com/)


  收益农耕是 DeFi 用户质押或借出其数字资产以赚取被动收入的过程。像 Compound Finance 和 Aave 这样的协议通过提供激励措施来吸引流动性提供者，将其资产借出或锁定在由智能合约驱动的流动性池中。通常，这些奖励来自交易费用、借款人的利息以及有时特定于平台的代币的组合。以
  Aave 为例，在[安全模块](https://aave.com/docs/primitives/safety-module)中质押`AAVE`的用户会收到`stAAVE`代币，这代表了他们对协议安全的贡献。


  流动性 farming 参与者通常质押或借出`USDC`、`USDT`或`DAI`等稳定币，因为这些资产有助于降低无常损失的风险。最近，流动性 farming
  参与者也开始质押从流动性挖矿中获得的 LP 代币，通过提供流动性并重新质押奖励以获取额外收益，从而实现收益最大化。流动性 farming 的回报通常以 APY
  表示，并考虑了复利。然而，由于池需求、协议激励和资产价格的变化，这些利率会频繁波动。


  ![图表说明了一个去中心化金融（DeFi）平台流程。左侧，存款人将加密资产存入由电脑图标代表的 DeFi 平台。平台向存款人支付利息。右侧，借款人向平台请求贷款，平台借出加密资产。如发生还款失败，将使用智能合约清算资产。箭头指示了存款人、DeFi
  平台和借款人之间的资产和操作流向。](img/648696_1_En_13_Fig6_HTML.jpg)


  **图 13-6**

  典型的收益农耕流程（源于[`cointelegraph.com/learn/what-are-defi-yield-aggregators-and-how-do-they-work`](https://cointelegraph.com/learn/what-are-defi-yield-aggregators-and-how-do-they-work)）


  许多收益农耕平台在解除质押后会实施一个“冷却期”，要求用户在完全提取其代币之前等待一段时间。此措施旨在保护协议免受突然大额提款造成的干扰。例如，Aave 在其安全模块中强制执行十天的冷却期，以帮助维持稳定性。


  ![Compound Finance 仪表板界面截图。顶部菜单包括仪表板、市场、扩展和投票选项，以及一个连接钱包按钮。主体部分显示余额为 0.0000 USDC。展示了一个抵押品资产列表，包括
  Chainlink、Coinbase Wrapped BTC、Compound、以太坊、Lido Wrapped Staked ETH、Uniswap、Wrapped
  Bitcoin 和 tBTC v2，每个资产的协议余额均为 0.0000。USDC 钱包余额部分显示净借款年利率为 5.97%，净供应年利率为 5.43%。头寸摘要列出了抵押品价值、清算点、借款能力和可借款金额，均为
  0.0000 USDC。一个弹出窗口建议使用 V2 的市场选择器。](img/648696_1_En_13_Fig7_HTML.jpg)


  **图 13-7**

  Compound Finance 仪表板（源于[`app.compound.finance/?market=usdc-mainnet`](https://app.compound.finance/%253Fmarket%253Dusdc-mainnet)）


  ### 优势


  - **高回报** – 与传统质押相比，有获得可观利润的潜力。

  - **增强流动性** – 流动性 farmers 有助于提供充足的市场流动性，以平衡供需。

  - **平台代币** – 许多平台用原生代币奖励流动性提供者。如果这些代币价值上涨，可以显著提高整体回报。


  ### 劣势


  - **高费用** – 根据网络和策略，流动性 farmers 可能面临持续的高额费用。

  - **无常损失** – 面临 AMM 交易对中价格比率波动的风险；LP 最终可能获得的资产价值低于单纯持有两种代币。

  - **高风险** – 智能合约中的漏洞或缺陷可能导致重大损失。

  - **复杂性** – 流动性 farming 可能很复杂，需要对其协议、无常损失、策略和风险水平有相当的理解。




  ### 收益聚合器


  **示例：** [Yearn Finance](https://yearn.finance/) 和 [Beefy Finance](https://beefy.com/)


  DeFi 收益聚合器，也被称为*收益优化器*，是一种特定类型的 DeFi 协议，通过组合并自动化收益耕种协议和策略的过程，帮助投资者实现利润最大化。聚合器通过将用户的数字资产汇集在一起，并通过自动化收益生成的智能合约将其投资于一系列高收益产品和服务的投资组合来实现这一点。


  收益耕种的主要缺点是上述过程需要投资者手动执行，这需要时间和精力。收益聚合器会收取一定费用，将上述典型的收益耕种过程接管过来，并代表投资者将其完全自动化。这消除了许多不必要的压力和耗时。收益耕种策略的另一个问题是相关的费用。投资者在首次将他们的`LP`代币赎回为底层资产（或出售任何单独的奖励代币）时，以及当他们将这些新获得的代币重新投资到新的质押或流动性头寸时，都可能会产生费用。然而，由于收益聚合器汇集了大量来自不同投资者的资产，产生的费用由所有流动性提供者（`LP`）和质押参与者共同分担。这种成本分摊的方式通常能将费用的影响降至最低，常常使其接近于可忽略不计。收益聚合器的另一个显著优势是，它们通过自动复投奖励、降低交易成本并代表投资者管理整个过程来产生被动收入。


  #### 收益聚合器架构


  一个典型的收益聚合器池的操作可以概括为三到四个阶段，具体取决于特定的协议。


  ![流程图展示了包含四个阶段的金融流程。阶段 0 是池资金注入，用户可存款或提款。阶段 1 是抵押，涉及存入和赎回抵押品。阶段 2 是策略执行，部署借入资本并偿还贷款。阶段
  3 是在申领产生的收益后进行再投资。该过程包括出售收益以换取池资产。箭头表示各阶段间的操作流向。](img/648696_1_En_13_Fig8_HTML.jpg)


  图 13-8


  风格化的收益聚合器机制（致谢：Sok: DeFi 中的收益聚合器–[`​arxiv.​org/​pdf/​2105.​13891.​pdf`](https://arxiv.org/pdf/2105.13891.pdf)）


  **阶段 0**


  1.  提议、创建并将收益耕种策略部署到区块链上。

  2.  通过治理或内部团队投票，收益耕种策略被批准或拒绝。

  3.  一旦获批，就会为此特定的收益耕种策略创建一个资金池。收益农民现在可以将资金存入此池。

  4.  存入资金后，收益农民会以“流动性代币”的形式获得池份额。

  5.  退出策略时，农民交出他们的流动性代币，以赎回与其份额成比例的资金。


  **阶段 1**


  1.  将阶段 0 中汇集的资金用作抵押品，通过借贷平台（例如 Aave、Compound）借入另一种资产。

  2.  根据策略的不同，汇集的资产可能会在进入阶段 2 之前先兑换成另一种代币（通常是稳定币）；许多金库式策略会保留原始资产或`LP`代币，并完全跳过此步骤。

  3.  在后台，收益聚合器通过引导阶段 0 和阶段 1 中使用的智能合约之间的资金流向，来管理抵押资产以避免清算。


  **阶段 2**


  1.  来自阶段 0 和/或阶段 1 的资产被用于预先编程的策略中，这些策略开始产生收益。这些策略包括借贷策略或流动性策略等收益生成策略。

  2.  如果阶段 1 中存入池中的资产是产生收益的代币（例如`LP`代币），则可以跳过阶段 1，汇集的资产直接从阶段 0 流向阶段 2。

  3.  如果从原始池中发生较大规模的资金提取，借入的资产有可能流回阶段 1，以偿还部分贷款。


  收益聚合器有许多优点和缺点；具体如下：


  **优点**


  *   **增加利润** – 与传统的收益生成型 DeFi 服务相比，由于费用降低和优化的自动化策略，具有获得高回报的潜力。

  *   **代币奖励** – 收益耕作的参与者通常能获得参与奖励。

  *   **灵活性** – 投资策略的选择范围更广。

  *   **增加流动性** – 为所有 DeFi 用户提供极佳的市场流动性。


  **缺点**


  *   **高风险** – 智能合约漏洞和代码漏洞、无常损失（`IL`）以及潜在清算——如果使用了抵押头寸——会严重影响投资者。

  *   **复杂性** – 管理风险和避免财务损失需要扎实理解复杂的风险因素和战略变量。

  *   **波动性** – 代币价格下跌会显著降低所获奖励的价值。


  ### 治理奖励


  治理奖励——大多数情况下会自动在链上发放——是奖励那些参与去中心化协议或平台决策过程的用户的激励措施。治理代币赋予资产持有者对各种改进网络的提案进行投票的权利。例如，`Uniswap
  (UNI)` 使持有者能够治理 Uniswap 去中心化交易所，而 `Maker (MKR)` 持有者负责管理 Maker 协议，这包括调整 Dai 稳定币的政策、选择新的抵押品类型以及改进治理本身。


  ### 边玩边赚奖励


  游戏平台提供边玩边赚（Play-to-Earn）奖励，以激励玩家参与游戏体验。这些奖励通常以数字资产的形式提供。例如，当玩家达到特定目标或里程碑、赢得一场战斗或完成特定任务时，他们可以收集游戏内的`NFT`资产。根据游戏的主题，`NFT`（非同质化代币）可以是诸如定制化的头像皮肤、武器、载具、地块、收藏品或艺术品等资产。在游戏世界中，个人通过玩边玩边赚游戏赚取一些额外收入是很常见的。边玩边赚游戏的一些核心优势包括：


  *   顶级玩家可以参加游戏竞赛，赢得可观的现金奖励。

  *   为专注的游戏玩家提供赚取可观收入的机会。

  *   玩家拥有代表其在链上游戏资产的`NFT`或代币，尽管游戏工作室仍可能限制这些资产在游戏内的运作方式。

  *   有能力将收益再投资回游戏平台，或提取至其他平台或市场。

  *   激励措施促使用户与其他玩家和更广泛的社区互动，这有助于提高采用率。


  最受欢迎的边玩边赚游戏例子之一是 [Axie Infinity](https://axieinfinity.com/)，它允许玩家繁殖、养育并操控名为 Axies
  的数字生物进行战斗。


  ![一幅充满活力的卡通风格游戏战斗场景，画面中呈现各种颜色鲜艳、造型圆润的生物，它们带有不同的配件和表情。背景是郁郁葱葱、长有奇特树木和植物的绿色景观。前景显示一排卡片，上面有各种生物插图和数字，表示游戏元素或能力。整个场景传达出一种趣味盎然且充满策略的氛围。](img/648696_1_En_13_Fig9_HTML.jpg)


  图 13-9


  Axie Infinity——战斗、收集和交易可收藏的 NFT 生物（致谢：[`​axieinfinity.​com/​`](https://axieinfinity.com/)）




  '
- "# 次级激励机制\n\n次级激励机制是指在链下管理的代币奖励，通常以中心化方式进行人工控制和分发。奖励流程种类繁多，从空投和推荐激励，到贡献者奖励和忠诚度奖励不一而足。项目团队将这些奖励发放给特定的个人和社区成员，这些人通过提升知名度、测试新功能、识别代码漏洞、创作内容和促进社区参与来支持项目发展。这些奖励机制包括：\n\
  - `平台激励`\n- `Beta 测试激励`\n- `推荐激励`\n- `忠诚度激励`\n\n## 空投\n\n空投是一种代币分发方式，将免费代币或币分发给满足特定条件的个人，例如通过社交媒体推广项目。通常，这些奖励是手动分发的，但有时也会通过自动执行的智能合约在链上自动分发。空投通常分为以下几种类型：\n\
  - **标准空投** – 新成立的初创公司有时会向在项目`dApp`上注册钱包地址的新用户发放空投，例如，Uniswap 向在 2020 年 9 月之前使用过其平台的用户发放了\
  \ 400 个`UNI`代币。\n- **赏金空投** – 除了交易和投资之外，赏金空投是区块链领域内另一种赚钱方式。其设计目的是奖励那些执行特定任务，为项目的成功和长期发展做出贡献的参与者（*赏金猎人*）。这些任务包括：提升`ICO`知名度、通过撰写博客文章或制作视频创造价值、参加线上活动、代码开发、在社交媒体上推广项目，或者将网站文案、白皮书或其他内容翻译成不同语言。\n\
  \n  此外，如第 12 章“项目代码库”中“漏洞赏金”一节所述，漏洞赏金是项目方为帮助抵御网络攻击和安全问题而推出的计划。这些漏洞赏金空投用于激励和吸引外部开发者、社区成员和黑客识别并披露代码中任何有效的安全漏洞、缺陷和错误。漏洞赏金猎人还会提出有助于增强其区块链或`dApp`安全性和可靠性的解决方案。\n\
  - **分叉空投** – 如第 6 章“区块链架构”中“分叉”一节所述，当区块链发生硬分叉时，它会分裂成两个不兼容的版本。在分叉前持有该区块链原生数字资产的投资者，将从新创建的区块链中获得空投的新代币。例如，[比特币现金](https://bitcoincash.org/)\
  \ 于 2017 年从比特币分叉而来；它向`BTC`持有者按 1:1 的比例发放了`BCH`——但此空投主要记入自我保管的钱包；许多中心化交易所并未分发这些新币。\n\
  - **持有者空投** – 要获得“持有者”空投资格，投资者必须在项目团队指定的某个时间点持有特定数量的代币。项目方会使用快照来验证投资者钱包中是否持有最低要求的代币数量。\n\
  \n## 平台激励\n\n去中心化应用（`dApps`）提供有吸引力的激励措施，鼓励投资者持有原生资产并使用项目提供的功能——有时会在链上自动分发，但这取决于协议规则。除了之前讨论过的`DeFi`激励措施（如质押、流动性挖矿和提供流动性）之外，一些平台奖励激励措施包括：\n\
  - **交易费折扣** – 一些平台通过提供交易费折扣来激励投资者，在某些情况下，甚至还能赚取一部分交易费。\n- **收入分成** – 平台与代币持有者分享一定比例的收入是很常见的做法，这能激励用户持有代币并使用平台服务；需要注意的是，某些司法管辖区的监管机构可能会将此类收入分成代币归类为证券，从而增加合规风险。\n\
  - **访问高级功能** – 项目方通过提供高级`dApp`功能或服务来激励投资者也很常见，包括去中心化交易所（`DEX`）上的高级交易功能、订阅折扣以及新功能的抢先体验权。\n\
  - **新项目早期访问权** – `IDO`（首次去中心化发行）发射台是向代币持有者提供众筹机会的平台。这些平台，例如 [Polkastarter](https://polkastarter.com/)、[Synapse\
  \ Network](https://synapse.network/) 和 [Launchpool](https://launchpool.xyz/)，通过允许`IDO`发射台代币持有者在项目生命周期的早期阶段进行投资，来为新的初创项目众筹并提供流动性。\n\
  \n## Beta 测试奖励\n\nBeta 测试是一个过程，产品（例如`DeFi` `dApp`和`NFT`市场）由开发团队，并且通常通过激励性的公共测试网由更广泛的社区进行试用和测试。其目的是识别潜在的缺陷、小故障和代码漏洞，以便项目团队在适用的情况下进行修改。参与此过程的社区成员将因其贡献而获得原生数字资产作为奖励。\n\
  \n## 推荐计划\n\n推荐计划是由交易所、`DeFi`平台和区块链提供商等相关区块链社区使用的营销工具，旨在激励现有用户并获取新客户或参与者。推荐计划的最终目标是推动特定平台或项目的增长和采用。成功推荐的奖励通常以数字资产的形式支付。传统的\
  \ Web-2 推荐计划可能会以礼品卡或代金券（例如，亚马逊积分和拼车优惠券）的形式支付，但区块链项目通常会避免这些现实世界的奖励，而是提供平台内福利，例如费用返还或免费交易层级。以下是区块链领域内推荐计划的两个例子（在撰写本书时）：\n\
  - **Bybit:** 推荐人可获得其被推荐人交易手续费最高 30% 的佣金，而被推荐人通过完成特定任务最高可获得 1,025 `USDT` 的奖金。\n-\
  \ **Coinbase:** 当被推荐人使用推荐人的链接注册，并在 180 天内购买或出售至少价值 100 美元的加密货币时，推荐人和被推荐人双方均可获得 10\
  \ 美元的比特币。\n\n## 忠诚度激励\n\n忠诚度激励是由区块链公司发放的奖励，提供给忠实客户，以表彰他们持续长期的支持和消费。忠诚度计划的目标是提高客户留存率和满意度。奖励通常以数字资产的形式支付。然而，与推荐计划类似，奖励也可能以代金券、优惠券、免费产品或服务，或高级服务访问权的形式提供。以下是两个忠诚度激励计划的例子（在撰写本书时）：\n\
  - **币安:** 通过其 VIP 计划提供交易手续费的阶梯式折扣，并使用币安卡在符合条件的消费上提供最高 8% 的返现。\n- **Crypto.com:**\
  \ 使用其 Visa 卡在消费时提供最高 5% 的返现，同时提供 Spotify、Netflix 和 Amazon Prime 等服务的费用返还。\n\n\n\n\
  ### 行动步骤\n\n项目方常常通过承诺诱人的收益流程来吸引投资者购买数字资产，这种情况并不少见。然而，投资者很快就会发现，这些流程蕴含着极高的风险和波动性，不仅限时有效，还需要持有特定数量的代币才能参与。投资者必须具备识别和规避此类陷阱的技能，更重要的是，能够发现并评估那些具有长期激励机制、能提供可持续回报的合法项目。在投入这些投资之前，建议遵循以下关键考量因素和行动步骤。\n\
  \n## 确定合适的基于奖励的策略时的考量因素与行动步骤\n\n1.  **风险与回报** – 建议在投资前，先评估哪种基于奖励的策略最适合你。对大多数投资者而言，风险在选择奖励策略中扮演着主要角色。对于基于\
  \ PoS 的区块链项目，传统的质押是长期投资者最安全、最具吸引力的选择。然而，短期投资者可能倾向于高风险高回报的策略，例如通过收益聚合器实现的复杂流动性挖矿策略。尽管如此，每种奖励策略的利弊都应与所提供的激励率、相关风险、投资类型（长期/短期）以及基本面分析的其他方面进行权衡。\n\
  \n2.  **专业水平** – 在选择基于奖励的策略之前，评估自己的知识储备和学习时间。例如，如果投资者无法拨出充足的时间去深入研究 PoS 验证节点或 PoW\
  \ 节点的技术设置，那么建议选择一种与你当前技能水平相匹配的策略。\n\n鉴于某些流动性挖矿策略的复杂性和难度，投入充足的时间并谨慎行事至关重要。投资者因无常损失而亏损的情况非常普遍。\n\
  \n3.  **时间与投入** – 评估你实际能投入多少时间，并将其与理解并参与特定奖励策略所需的时间进行比较。例如，使用去中心化钱包提供商或中心化交易所进行传统质押流程，所需的时间和投入很少。所需要的只是间歇性的价格监控、市场情绪和项目进展。然而，更复杂的奖励策略需要额外的时间和投入，例如多种流动性挖矿策略，需要每天持续监控。验证器和节点质押以及挖矿策略需要定期监督以保持节点在线——理想情况下几乎是持续在线，除非使用第三方\
  \ SaaS 提供商，后者可以付费分担部分监控负担。\n\n4.  **奖励策略** – 任何基于奖励的策略的一个关键方面是它能够吸引并留住其用户和利益相关者。项目方会特意设计策略来迎合不同类型的投资者。这样做，就能明确聚焦于特定类型的投资者。例如，有些项目奖励用户完成任务、赢得战斗或创作内容，而有些项目则为在相关平台上持有和使用其代币的用户提供高额奖励，例如\
  \ DeFi。无论奖励机制如何，它都应在其领域内脱颖而出，击败竞争对手，确保用户安全，并为用户提供真正的价值。\n\n以 Axie Infinity 为例，它拥有忠实的追随者和高参与率，其奖励结构和激励机制应与类似的热门项目进行比较评估。这有助于投资者判断所提议的奖励策略与其竞争对手相比是强还是弱，以及它是否与其他成功的项目保持一致。但请记住，这应与本书中讨论的许多其他基本面方面相结合，以确保进行全面的评估。\n\
  \n5.  **独特的奖励策略** – 审视项目提供的任何突破常规且具有吸引力的奖励。这些可能包括诱人的平台奖励，或新颖、改进的流动性挖矿策略。在参与之前，务必充分理解条款、条件、风险、有效期限以及影响盈利能力的内部和外部因素。\n\
  \n6.  **投资者与社区参与** – 有吸引力的奖励系统有助于建立和鼓励社区参与，进而吸引更多投资者。这些奖励系统应从长期可持续收益与短期激励的角度进行评估。例如，假设\
  \ **项目 X** 为所有参与者提供年化收益率 40% 的流动性挖矿激励。这显然是一个危险信号，表明 a）新成立的初创公司为早期参与者提供限时不可持续的奖励，或者\
  \ b）这是一个骗局。奖励通常根据价格波动性、项目质量和声誉而变化，不太稳定、价值较低的项目会提供更高的收益以补偿更高的风险。市值较高、信誉良好、更稳定的项目，其流动性挖矿奖励通常平均为\
  \ 10% 至 15%，质押奖励则在年化收益率 2% 至 7% 之间。\n\n7.  **质押比率** – 许多成功的权益证明网络的目标质押比率约为 30%–70%。来自\
  \ `StakingRewards.com` 上十大质押网络的数据显示，这一范围通常能锁定足够的代币来保护网络，同时仍留有充足的代币用于流通交易，并保持新代币通胀的可控性。非常大的链——例如以太坊或\
  \ BNB Chain——即使只有 20%–30% 的代币被质押也能保持安全，因为已绑定到网络的总美元价值非常之高。要计算质押比率，请访问 `CoinMarketCap`\
  \ 或 `CoinGecko`，提取以下公式所需的信息：**质押比率 =** `(总质押代币数量 / 代币总供应量) * 100`。或者，访问 `StakingRewards.com`，该网站预先计算了大量数字资产的质押比率。\n\
  \n8.  **实际收益率** – 为了保持供应量的相同质押份额，并确保质押回报为净正值。实际收益率必须为正值，并满足投资者根据 `StakingRewards.com`\
  \ 上按市值排名的前十大质押资产的要求。平均实际收益率大约为 0.74%。然而，许多顶级项目，如以太坊、BNB Chain 和 Avalanche，其实际收益率显著高于平均水平。投资者至少必须结合质押比率和实际收益率的结果，以确保流动性、网络安全等因素不受损害。\n\
  \n9.  **二级激励机制** – 激励机制如空投、平台奖励、边玩边赚奖励、内测奖励、推荐奖励和项目奖励需要逐案评估。虽然这些激励措施对投资者有利，但它们不像质押等主要机制那样被视为“被动收入”。投资者通常希望让钱为自己工作，除非目标是建立声誉并与项目团队建立良好关系，以期在团队内获得长期职位。\n\
  \n主要激励机制的奖励相对稳定，不像空投或推荐计划等二级机制的奖励那样不规律。话虽如此，无论是被动的还是积极获得的，任何额外的激励都应被视为一种红利。\n\n\n\
  \n#### 结果评估\n\n本次分析最关键的一点是确保投资者在所选的激励机制下不会遭受任何损失。在大多数情况下，只要收益生成过程经过评估、被认为是合法的，并且处于投资者的风险承受范围之内，就没有绝对的对错。本次分析的结果应满足以下项目：\n\
  \n1.  风险因素与投资者的风险承受能力、时间投入和技术专长相匹配。\n2.  激励机制与投资者在特定时间范围内的策略和总体目标（无论是长期还是短期目标）相一致。\n\
  3.  收益流的类型与投资者的策略相符，例如被动收入或以主动参与为主（如“边玩边赚”激励）。\n4.  激励结构与项目的基本面良好契合，这包括区块链架构、代币设计、代币经济学、团队质量、路线图、资金状况和合作伙伴关系。（稳定币除外。）\n\
  5.  激励机制能够抵御市场状况的变化。如果它受到市场影响，则应制定清晰的进入和退出策略。\n6.  该项目不是骗局。\n\n在大多数情况下，风险较低的创新机制通常伴随着低到中等回报。相反，高收益机制则伴随着高风险。与人性使然一样，大多数投资者都希望获得诱人的回报，却不愿接受随之增加的风险。因此，在大多数情况下，除非投资者接受高风险激励策略，否则建议根据顶级项目和相关竞争对手的当前平均标准来设定回报目标，并限制预期。\n\
  \n"
- "# 14. 社区与社交媒体\n\n在加密货币领域，一个强大的社区以及管理良好且活跃的社交媒体存在，表明了项目的承诺及其潜在的长期成功。社区不仅仅是一群追随者；它是一个核心驱动力，有助于吸引更多兴趣，并推动项目走向成功。通过社交媒体渠道以及项目博客、`GitHub`仓库和治理论坛等其他官方渠道，社区成员聚集在一起分享知识、解答疑问、提供建议、制造声势、参与技术性和非技术性讨论，并了解项目团队发布的最新动态。\n\
  \n拥有活跃社区和在社交媒体上积极存在的项目，向公众、`dApp`用户、网络参与者、投资者等表明，团队致力于项目的成功、保持透明，并希望赢得更广泛社区的信任。相反，如果团队不活跃，社交媒体存在感差，导致与社区缺乏沟通，则表明他们并未全心投入。因此，其短期或长期成功都将受到严重威胁。\n\
  \n**本章讨论的基本内容：**\n\n*   社交媒体的重要性\n    *   内测\n    *   代码协作\n    *   网络效应\n    *\
  \   持续反馈\n    *   传播认知\n    *   治理\n    *   主流采用与接受\n*   社交媒体与社区评估\n    *   区块链社区的社交平台\n\
  \    *   关注者数量\n    *   发帖频率\n    *   内容互动度\n    *   社区管理员\n\n## 社交媒体\n\n“社交”一词指的是群体、社区或社会中成员之间的互动、交流和联系。像\
  \ Facebook、X、Instagram、TikTok 和 LinkedIn 这样的流行社交媒体平台，使得世界各地的人们能够以社交方式相互交流。此外，这些社交媒体平台不仅面向普通大众。它们也为小型企业、大型公司和组织提供营销和推广服务。\n\
  \n## 什么是社区？\n\n社区可以描述为一群拥有共同兴趣的个体，在共享环境中相互交流。许多社区包括文化类、专业类、遗产类、技术类、体育类、动物类、音乐类以及各种区块链社区。社区成员通常共享一些主要特征，例如共同的价值观、相互尊重、归属感和紧密联系的关系。社区成员通过贡献信息和在必要时提供帮助来支持他人，这很常见。这有助于建立一个更强大、更稳固、更有意义的社区，并营造积极的知识共享氛围。\n\
  \n社区主要有两种形式：实体社区和虚拟社区。在实体、面对面的社区中，每位社区成员都在一个实体地点会面。这类社区通常具有地域性，来自城镇、城市或乡村、拥有共同兴趣的人们聚集在一起互动。顾名思义，“在线”社区是在线上进行的，每位社区成员通过互联网会面和互动。在大多数情况下，社区中的绝大多数成员可能从未见过面。许多社交媒体平台促进了在线社交互动。重要的是要注意，有时实体社区也可能拥有在线存在，成员们可以在实体聚会之外进行线上互动。此外，根据社区类型及其成员所在地，在线社区组织实体聚会和活动也很常见。\n\
  \n在区块链世界中，主要有三种类型的在线社区，分类如下：\n\n1.  **开发社区** – 由众多开发者组成，他们团结协作，互相帮助、分享想法和知识，为区块链技术的整体进步做出贡献。\n\
  2.  **信息社区** – 由来自各个领域、学习区块链技术各方面知识的人组成。\n3.  **投资社区** – 由各个级别的投资者组成，他们分享并阐述投资和获利了结的建议。\n\
  \n## 区块链项目社区的重要性\n\n社区不仅仅重要，它是必不可少的。将区块链社区视为一个去中心化、多功能的营销武器，它以多种方式协助项目，影响项目的整体情绪、增长和长期成功。社区通过多种不同的方式实现这一目标，例如内测、代码协作、网络效应、传播反馈等等。下一节将深入探讨这些角色，并强调社区如何为区块链项目做出贡献。\n\
  \n### 内测\n\n正如第 4 章“核心产品”中“产品测试”一节所述，内测是加密项目使用的一种安全技术，它们利用其社区在正式发布前测试其产品或服务。在此过程中，产品（例如\
  \ `DeFi` `dApp` 或 `NFT` 市场）会由若干社区成员进行试用和测试，他们的努力通常会得到激励。社区帮助发现产品中的故障、错误和漏洞。每个功能都会被测试，包括功能集、用户界面、网络交易、智能合约以及整体安全性和性能。这些信息会反馈给团队，所有数据和测试报告都会被汇总。然后实施更新和变更，以修正发现的错误、故障和代码漏洞。\n\
  \n### 代码协作\n\n开源项目社区的成员对于项目的核心和灵魂——代码——至关重要。他们积极合作，为项目的整体开发做出贡献。这包括开发、评估和修改代码，以帮助优化项目的整体价值。\n\
  \n\n\n### 网络效应\n\n“网络效应”这一术语用于描述一种产品或服务，其规模和价值随着用户数量的增加而提升——现有用户吸引新用户，新用户又吸引更多用户，从而以指数级速度推动产品增长。在加密货币领域，用户在某个平台、`dApp`\
  \ 或协议上的互动增加，通常会导致网络的进一步增长和扩张。社区通过社交媒体发布和推广项目来帮助推动这种互动。这反过来又创造了额外程序员的需求，他们在一个强大的协作式环境中帮助相应地扩展协议。\n\
  \n### 持续反馈\n\n在项目的整个生命周期中，团队必须了解代码中可能影响协议的任何故障、错误或漏洞。这是通过项目与社区成员之间的持续反馈循环来实现的。除了识别代码中的漏洞外，反馈循环还收集来自社区成员的有价值的意见和建议。这包括关于社区痛点、功能请求或相关项目的反馈。这些见解帮助团队识别、改进和实施新功能，从而增加项目的整体价值。\n\
  \n### 传播认知\n\n一个项目的成功取决于其价值主张以及获得发展动力、吸引用户和构建强大生态系统的能力。社区成员传播认知有助于引发兴趣、推动采用、增强网络效应、组织合作以及确保建立伙伴关系。\n\
  \n### 治理\n\n区块链治理是一个术语，指通过各种结构化的集体过程和机制做出决策。这些决策有助于建立和执行区块链网络发展、方向及管理的规则。持有治理代币的社区成员可以就提案进行投票并影响决策，但投票权通常集中在大型持有者（鲸鱼、`VC`\
  \ 或核心团队）手中，这可能限制了更广泛社区最终能产生的影响力。\n\n### 主流采用与接受\n\n区块链社区在向大众介绍和传授区块链技术方面发挥着重要作用，包括其运作方式、去中心化的优势以及有影响力的用例，从而培养出更高效、信息更充分的参与者和信誉更高的项目。通过这样做，社区帮助营造一个有效的学习环境，从而实现主流采用。\n\
  \n## 社交媒体与社区评估\n\n理解和解读社交媒体指标是任何项目评估流程的关键。它可以让投资者深入了解项目在受欢迎程度和参与度方面的运营状况，以及社交内容相对于竞争对手的表现。\n\
  \n社交媒体评估使投资者能够了解社区的总体情绪，每条帖文都提供了对项目总体态度和情绪反应的快照，无论环境是消极、中立还是积极。此外，情绪分析有助于识别潜在趋势和预测市场走势。例如，如果围绕某个特定项目有大量积极情绪，则可能引发更多兴趣，进而导致该数字资产价格上涨。\n\
  \n### 区块链社区的社交平台\n\n**评估目标：确定项目团队是否使用了足够数量的社交平台，以优化与社区的沟通、认知、协作和支持。**\n\n在当今世界，项目主要使用的社交平台有七个主要类型。加密货币项目利用这些平台来帮助与公众沟通并推销其产品或服务。此外，这些平台也是赋能社区成员的根据地，社区成员帮助推广众多项目生态系统，并在更广泛的范围内推动区块链采用。项目应力争使用本部分概述的大部分社交媒体平台——选择那些适合其规模、资源和发展阶段的平台——以帮助优化与社区的沟通、认知、协作和支持。\n\
  \n-   `X` – 这是一种“微博客”和社交网络平台。它允许人们发布包含照片、视频、链接和文本的“推文”消息。`X`，在区块链爱好者中也被正式称为“加密推特——‘CT’”，是区块链世界一些最具影响力人物的家园。在\
  \ `X` 上自然成长的区块链社区发表他们对新颖且令人兴奋的项目的意见、知识和信息。\n\n-   `YouTube` – 它是一个视频分享平台，用户可以在线观看、点赞、分享、评论和上传自己的视频。区块链项目广泛使用它来为团队提供更新和教程视频。对于那些想要学习区块链技术、新闻以及关于现有和即将推出的功能丰富项目的信息的人来说，`YouTube`\
  \ 极其有用。\n\n-   `Discord` – 它是一个免费的通讯应用程序，使用户能够分享语音、视频和文本。由于其易于使用、功能丰富的用户界面，它被世界各地的区块链项目和爱好者广泛使用。`Discord`\
  \ 深受项目团队的喜爱，因为他们可以在官方服务器内创建独立的频道（聊天室），每个聊天室满足项目不同方面的需求。这些聊天室的性质因项目而异；典型的聊天室可能包括新公告、主聊天、媒体、帮助和开发者聊天室。\n\
  \n-   `Telegram` – 它是一个基于云的安全消息和音频通话应用程序，允许用户发送消息、照片、视频和文件。区块链开发者、加密货币交易者和企业家利用\
  \ `Telegram` 其功能丰富的用户界面。它包含并促进隐私保护、多平台可用性、自动化机器人、`RSS` 订阅以及价格机器人。虽然并非原生功能，但 `Telegram`\
  \ 的开放 `API` 允许交易者运行自定义机器人，将实时加密货币价格提醒和其他数据推送到其频道。\n\n-   `Reddit` – 它是一个美国社会新闻聚合、内容评分和讨论网站。在决定优先显示哪些内容时，它优先考虑用户的反馈。凭借其独特的点赞和点踩系统，它能够及时且准确地识别出人们喜欢什么以及不想要什么。区块链项目利用\
  \ `Reddit` 来建立强大有力的社区。\n\n-   `Medium` – 它是一个“博客”发布平台，人们可以在此发布和阅读关于他们最关心话题的重要且有深度的文章。区块链项目利用\
  \ `Medium` 向社区分发更新、想法、技术文档、新闻和公告。由于其博客型功能，它非常适合向用户和投资者普及他们的产品以及整个区块链技术。\n\n\n\n\
  - **[领英](https://LinkedIn.com/)** – 这是全球最大的在线职业社交网络。它用于寻找合适的工作或实习机会，建立并加强职业关系。对于区块链项目而言，领英尤其重要，有助于获取新的客户合作关系，并构建能惠及项目的广泛专业人士网络。\n\
  - **[Substack](https://Substack.com/)** – 它将博客与电子邮件通讯合并，因此每篇帖子都会直接发送到订阅者的收件箱。项目团队用它来发布长篇更新——比如开发者日记、治理说明或月度回顾——而无需依赖社交媒体算法。由于关注者会收到电子邮件通知，他们不太可能错过关键公告。项目还可以添加付费层级，用于提供高级研究或抢先体验内容，从而创造可选的收入来源。\n\
  \n### 行动步骤\n\n遵循以下步骤，判断项目团队是否充分利用了足够多的社交平台，以优化与社区的沟通、认知、协作和支持。\n\n1.  **社交媒体平台检查**\n\
  \n    检查项目是否使用了足够数量的社交媒体平台，例如 `X`、`YouTube`、`Discord`、`Telegram`、`Medium`、`Reddit`\
  \ 和 `LinkedIn`。\n\n2.  **记录笔记，并以你自己的风格记录发现**\n\n3.  **将发现与基本面评估流程的其他部分相结合**\n\n\
  #### 结果评估\n\n理想情况下，项目应在本节所述的多个社交媒体渠道上保持活跃。若不然，建议保持谨慎，并判断是否存在潜在问题，例如人手不足、资金匮乏或团队承诺度低下。\n\
  \n### 关注者数量\n\n**评估目标：通过将项目在多个社交平台上的关注者数量与竞争对手进行比较，来评估其受欢迎程度。**\n\n一个项目在社交媒体平台上的关注者（或订阅者）数量，通常是评估其线上影响力的最直接指标。然而，这并非总是最关键的因素。通常而言，庞大的关注者基础意味着项目具有高知名度、高人气、高关注度以及社区对其的信心。话虽如此，对于什么是“良好”的关注者数量，并没有明确的基准，因为有许多因素在起作用。需要注意一些警示信号，比如关注者数量突然激增、每条帖子的点赞或评论数量极低，或者存在大量空白头像的资料——这些可能暗示着僵尸粉或虚假互动行为。因此，投资者需要通过考虑以下要素来分析关注者数量：\n\
  \n1.  **成立年份** – 正如第 4 章“核心产品”中“成立年份”一节所述，公司的成立年份是至关重要的信息。建议将关注者数量与公司成立年份结合起来分析，以便更准确地理解。在大多数情况下，一个五年前成立的项目自然比一个几个月前成立的项目更有可能拥有更多的关注者。\n\
  \n2.  **竞争对手关注者数量** – 投资者只应在同一加密货币细分领域内比较关注者数量，例如 `DeFi`、区块链网络、游戏、去中心化交易所（`DEX`）等。\n\
  \n3.  **社交媒体平台** – 始终在同一平台上比较竞争对手的关注者数量，例如 `X` 对比 `X`，或 `Discord` 对比 `Discord`。\n\
  \n专家建议\n\n要全面分析加密货币项目的社交媒体关注情况，包括 `Twitter`、`Discord` 和 `Telegram`，可以利用像 [AlphaGrowth](https://alphagrowth.io/makerdao)\
  \ 这样的平台。\n\n### 行动步骤\n\n按照以下步骤，通过将项目在多个社交平台上的关注者数量与竞争对手进行比较，来评估其受欢迎程度。\n\n1.  **社交媒体关注情况**\n\
  \    1.  确定项目在 `X`、`YouTube`、`Discord`、`Telegram`、`Medium`、`Reddit` 和 `LinkedIn`\
  \ 平台上的存在情况。\n    2.  访问项目官方网站，查找其社交媒体账号链接。\n    3.  记录每个平台上的关注者数量。\n\n2.  **竞争对手分析**\n\
  \    1.  访问 `CoinMarketCap.com`——或类似平台如 `CoinGecko` 或 `AlphaGrowth`——并选择项目所属的类别，例如\
  \ [Layer 1](https://coinmarketcap.com/view/layer-1/) 区块链项目。\n    2.  选择三个市值相近的竞争对手。\n\
  \    3.  访问每个竞争对手的社交媒体平台，并记录其关注者数量。\n    4.  比较这些关注者数量，并参考每个项目的成立年份以获得更全面的背景信息。\n\
  \n3.  **记录笔记，并以你自己的风格记录发现**\n\n4.  **将发现与基本面评估流程的其他部分相结合**\n\n#### 结果评估\n\n庞大的关注者数量值得称赞，但这并不能保证质量或成功。它表明该项目并非骗局，具有一定的知名度，并拥有足够的社区支持。该指标应与本章中的基础社交媒体指标结合使用。如果项目在多个平台上的关注者数量显著低于竞争对手，则可能预示着产品用例不佳、营销不力、知名度不足、内容质量低下以及项目管理团队不善。需要进一步调查。\n\
  \n### 发帖频率\n\n**评估目标：评估项目团队的社交媒体活跃度，以帮助判断团队成员是否仍在积极活动。**\n\n发帖频率是指公司或个人在特定时间范围内通过社交媒体平台、博客、通讯或播客发布新内容的频率。该指标显示了项目团队在不同社交媒体渠道上的活跃程度。至少，项目领导者和核心团队成员应在多个社交媒体上保持强大存在，原因包括：\n\
  \n- **活跃度** – 频繁发帖向社区表明公司仍在积极运作并努力。\n- **可信度** – 定期发布高质量内容有助于彰显在特定领域的专业性，从而建立信誉。\n\
  - **社交引擎优化（SEO）** – 通过频繁发帖，公司页面的 `SEO` 排名可能会更高，使其在搜索结果中更显眼。\n- **覆盖面** – 定期发帖有助于触达更多人，从而扩大受众范围。\n\
  - **受众参与度** – 定期发帖有助于保持受众的参与度。\n\n专家建议\n\n在分析项目的发帖活动时，建议快速浏览每条帖子，确保内容与团队的核心产品或服务相关。许多项目会发布大量“空话”，这些内容与实际价值主张无关，而是更广泛地关注市场状况或区块链相关材料。\n\
  \n### 行动步骤\n\n按照以下步骤评估项目团队的社交媒体活跃度，以帮助判断团队成员是否仍在积极活动。\n\n1.  **确定发帖频率**\n\n    确定项目团队在不同社交媒体平台上的发帖频率。\n\
  \    1.  访问项目官方网站。\n    2.  找到项目社交媒体图标所在处。\n    3.  访问团队使用的每个主要社交媒体平台，例如 `X`、`Telegram`\
  \ 和博客（`Medium`）。\n    4.  在每个平台上，统计团队在过去 30 天内的发帖数量，以衡量其活跃程度。\n\n2.  **竞争对手分析**\n\
  \n    将数据与热门及直接竞争对手进行比较。\n\n3.  **记录笔记，并以你自己的风格记录发现**\n\n4.  **将发现与基本面评估流程的其他部分相结合**\n\
  \n#### 结果评估\n\n主要目标是判断项目团队是否活跃并专注于产品。如果每个社交媒体平台（或至少是团队使用的主要平台）每月能看到大约十五到二十篇帖子，这将会令人赞赏。\n\
  \n\n\n### 内容参与度\n\n**评估目标：** 判断团队是否分享了高质量、有吸引力的内容，以及社区的反馈如何。\n\n评估项目在社交媒体上的帖子，关注点不只有数量；社区参与度同样至关重要，甚至更为关键。参与度的高低取决于项目团队能否通过有意义、有影响力且高质量的内容与社区建立联系。为了了解社区的活跃程度，投资者可以评估点赞、评论、转发、触及人数和曝光量等指标——这些数据能让你快速了解社区的健康状况和活跃度。\n\
  \n在任何社交媒体平台上发布的帖子，其互动方式都包括*点赞*、*转发*或*评论*（回复）。同时，*触及人数*用于识别看到该帖子的独立用户数量。图 14-1 是\
  \ [Polkadot 网络](https://polkadot.com/) 在 [X 平台](https://x.com/home) 上发布的一条帖子。该帖子获得了\
  \ 80.4k 次浏览（触及人数）、151 条评论、480 次转发和 823 个点赞。\n\n![Polkadot 宣传 Polkadot Decoded 2023\
  \ 活动的推文截图。推文宣布活动日期为 6 月 28 日至 29 日，在哥本哈根举行并提供线上参与方式，将有超过 100 位演讲者和区块链项目参与。推文提供了完整议程和门票的链接。文字下方是一张图片，显示三人正在桌边交谈，其中一人穿着印有“SCYTALE”字样的衬衫。该推文有\
  \ 80.4K 浏览、151 条评论、480 次转发和 823 个点赞。](img/648696_1_En_14_Fig1_HTML.jpg)\n\n图 14-1\n\
  \nPolkadot 网络在 X 平台发布的帖子，突出了评论、转发、点赞和浏览数（触及人数）([`​x.​com/​Polkadot/​status/​1664620666690351​105`](https://x.com/Polkadot/status/1664620666690351105))\n\
  \n### 参与率\n\n参与率 (ER) 衡量的是相对于点赞、反应、转发、评论、点击、投票和品牌提及次数等内容所生成的互动量。高 ER 代表强有力的参与和互动，而低\
  \ ER 则表示互动效果不佳。\n\n参与率以百分比形式呈现；百分比越高，参与率就越高，反之亦然。每个社交媒体平台都有不同的 ER。例如，表 14-1 展示了\
  \ X 平台、YouTube 和 LinkedIn 上从差到极佳的参与率范围。这些范围借鉴了 [Rival IQ](https://www.rivaliq.com/blog/social-media-industry-benchmark-report-2024/)\
  \ 和 [SocialInsider](https://www.socialinsider.io/social-media-benchmarks) 编制的 2024–2025\
  \ 年参与度基准数据，这些数据分析了每个平台上数百万条品牌帖子。然而，由于社交媒体发展、算法和策略的动态变化，参与率评分会持续波动。因此，在进行基本面分析时，建议核查每个平台最新的\
  \ ER。\n\n表 14-1\n\nX 平台、YouTube 和 LinkedIn 的社交媒体参与率\n\n| 参与率 |\n| --- |\n| 平台 |\
  \ 差 ER | 良好 ER | 极佳 ER |\n| --- | --- | --- | --- |\n| X 平台 | 低于 0.02% | 0.02%–0.09%\
  \ | 高于 0.09% |\n| YouTube | 低于 1% | 1%–3% | 高于 3% |\n| LinkedIn | 低于 0.5% | 0.5%–1.5%\
  \ | 高于 1.5% |\n\n根据衡量对象是触及人数、帖子数、曝光量、观看次数、粉丝数还是每日活跃度，计算参与率有多种方法。不过，我们将聚焦于一种主要的 ER\
  \ 计算方法：*基于触及人数的参与率* (ERR)。\n\n### 基于触及人数的参与率 (ERR)\n\n基于触及人数的参与率 (ERR) 公式衡量的是，在每篇帖子的基础上，与内容互动的用户占看过该内容用户的比例。这种方法比基于粉丝的参与率\
  \ (ERF) 更准确，因为它根据实际触及人数而非总粉丝数来衡量参与度，后者可能包含从未看过内容的用户。\n\n$$\\mathit{ERR}\\mspace{6mu}\
  \ = \\mspace{6mu}\\frac{\\textit{每篇帖子的总互动数}}{\\textit{每篇帖子的触及人数}}^{\\ast}\\ 100$$\n\
  \n**公式 14-1.** 基于触及人数计算参与率 (ERR) 的公式\n\n**计算示例：**\n\n使用 Polkadot 网络的帖子数据（图 14-1）。\n\
  \n*   每篇帖子的总互动数：\n\n151 (评论) + 480 (转发) + 823 (点赞) = 1454\n\n*   触及人数（浏览数）= 80,400\n\
  \nPolkadot 帖子的 ERR 计算如下：\n\n$$\\textit{\\textbf{Polkadot 帖子}}\\ \\mathbf{ERR} =\
  \ \\mspace{6mu}\\frac{1454}{80400}^{\\ast}\\ 100 = 1.81\\%$$\n\n**公式 14-2.** Polkadot\
  \ 网络在 X 平台社交媒体帖子的参与率 (ER)\n\n**专家提示**\n\n为获得更准确、更均衡的结果，请计算最近二十篇帖子的平均 ERR。\n\n###\
  \ 行动步骤\n\n按照以下步骤判断团队是否分享了高质量、有吸引力的内容以及社区的反馈情况。计算几篇帖子的参与率，以清晰了解情况。\n\n1.  **计算帖子参与率**\n\
  \n    确定项目在十到十五篇帖子中的平均参与率。\n\n    1.  通过项目网站上的官方链接，导航至该项目的一个或多个社交媒体频道。\n\n    2.\
  \  根据触及人数计算最近 10-15 篇帖子的参与率 (ERR)。将这些帖子的总互动数相加，除以帖子总数，再乘以 100 得出百分比。\n\n2.  **与平台参与度评级进行对比分析**\n\
  \n    将计算出的 ERR 与各个社交媒体平台当前的参与度评级进行比较。\n\n3.  **竞争对手分析**\n\n    将 ERR 结果与热门及直接竞争对手的结果进行比较。\n\
  \n4.  **以你自己的风格记录发现并做笔记**\n\n5.  **将发现与基本面评估流程的其他部分结合起来**\n\n**专家提示**\n\n在确定 ERR\
  \ 和 AVERR（平均 ERR）时，花点时间阅读每条帖子和评论，以判断社区对项目是否持有良好情绪。积极情绪总是值得赞赏的；然而，也要注意识别那些可能为进一步调查提供线索的负面评论。\n\
  \n#### 结果评估\n\n高参与率非常值得赞赏，尤其是当项目表现优于竞争对手时。然而，有些项目需要一段时间才能获得发展势头，特别是初创项目；因此，检查项目的启动时间非常重要。虽然参与率是一个重要指标，但不应赋予过重权重。投资者应始终将本章讨论的社交媒体基本分析的其他方面结合起来综合考量。\n\
  \n\n\n### 社区版主\n\n**评估目标：** 通过评估社交媒体版主的素质和工作表现，来衡量团队对支持其社区的投入程度。\n\n顾名思义，社区版主的职责是管理、维护并监督社区内的讨论。版主需要确保对话保持尊重、有序，并符合社区的目标和规则。通过这样做，他们帮助营造一个环境，让成员能够有效分享信息、交流想法、表达关切和观点，而不受垃圾信息、错误信息或冲突的干扰。在区块链领域，社区版主对于基于项目的社区至关重要，他们能在\
  \ X、Telegram、Discord 和 subreddit 等平台上促进有意义的互动。\n\n社区版主承担着一些特定的任务和职责，以维护一个稳定、高效、友好且信息共享的环境，例如：\n\
  \n-   **执行规则** – 版主帮助确保社区成员遵守规则和指南。\n-   **引导讨论** – 版主确保讨论内容与既定主题保持一致且相关。\n-   **解决冲突**\
  \ – 版主以友好的方式帮助控制和调解社区内的任何分歧、争论和冲突。\n-   **移除垃圾信息** – 版主快速识别并移除此类不相关或有危害的垃圾信息。\n\
  -   **教育** – 版主传达核心团队的官方更新，回答问题，并帮助新人理解区块链和项目的基本概念。\n-   **内容审核** – 版主决定频道上允许发布哪些内容。\n\
  -   **管理** – 版主经常组织和举办平台上的活动，例如与其他团队成员或区块链领域有影响力的人物进行采访（称为“问我任何问题”（AMA））。\n\n无论社交平台是什么，投资者都必须考察版主的表现、素质和效率。如果版主似乎缺席、响应缓慢、提供模糊或错误的信息，或者未能消除垃圾信息的威胁，这被视为一个危险信号。这可能是由于人员配置不足、资金短缺或团队投入不够所致；无论如何，这都不是一个好迹象，也不值得你投资。\n\
  \n### 行动步骤\n\n请按照以下步骤，通过评估社交媒体版主的素质和工作表现，来衡量团队对支持其社区的投入程度。\n\n1.  **版主素质与表现**\n\
  \    1.  通过项目网站上的官方链接，访问项目的一个或多个社交媒体频道，例如 Telegram。\n    2.  根据以下标准扫描并评估版主、频道和聊天记录：\n\
  \        1.  版主是否及时回答社区问题？\n        2.  版主的覆盖范围是否合理分布在不同关键时区——在社区活跃高峰期提供及时响应，即使无法严格做到\
  \ 24/7？\n        3.  社区是否收到持续的项目更新？\n        4.  是否提供了高质量的回复？\n        5.  版主是否以易于理解的方式回答问题和关切？\n\
  \        6.  频道的管理方式是否专业？\n        7.  版主对待社区是否友善和令人愉快？\n        8.  版主是否过滤了垃圾广告和与项目无关的内容？\n\
  \n2.  **以你自己的方式记录发现并整理笔记**\n\n3.  **将发现与其他基础评估部分的结论相结合**\n\n#### 结果评估\n\n版主的形象直接反映了项目及其运营者。因此，版主必须专业、有礼貌、响应迅速且以专业态度履行职责，从而建立信任并增加可信度。然而，如果他们未能履行职责，则建议投资者保持谨慎，并观察该项目在其余基础评估中的表现如何。\n\
  \n"
- '# 15. 资金与合作伙伴


  与传统公司类似，加密货币项目也需要资金来支付费用，以推动产品或服务的增长、扩大用户群、保障安全、维持日常运营，以及支付团队成员和区块链世界内各类专家的薪酬。因此，没有资金，大多数项目都无法生存。


  资金来源有多种形式，从大型机构和私人投资者，到像 ICO 这样的公开代币销售。本章将资金问题简化为通俗易懂的术语，包括资金来源、项目获得资金的原因以及融资的好处，同时还提供了一个易于遵循的评估框架，用于分析散户投资者面临的风险，并判断出资实体的可信度和声誉。此外，本章还为参与公开发行的投资者提供了一个重要检查清单，为降低风险和避免潜在骗局或损失提供了指导。


  本章还讨论了加密货币领域的合作伙伴关系。合作伙伴关系可以是“加密项目对加密项目”或“加密项目对企业”的形式，即区块链项目与传统公司合作。这两种类型的合作伙伴关系都很重要，它们允许公司整合资源、技术专长和技术，从而提升项目的价值输出，并有助于推动采用和创新。例如，加密项目之间的合作通常侧重于互操作性、流动性或跨链功能，而加密项目与企业合作则将区块链解决方案带入现实世界的产业。然而，投资者有责任核实项目团队声称的合作伙伴关系是否强大、有效且可信——本章提供了一套评估程序来帮助实现这一目标。


  理解资金与合作伙伴对加密货币项目的影响对投资者至关重要。实体和私人投资者的充足资金有助于确保项目能够达成开发里程碑。同时，资金来源可以极大地增强投资者信心，并提升项目的整体长期潜力。那些得到信誉良好的机构或强大战略合作伙伴支持的项目，往往比依赖未经核实来源的项目更值得信赖。花时间审查出资实体的可信度以及真正增值的合作伙伴关系，能为投资者更清晰地描绘出项目的潜在未来价值，更重要的是，能揭示其中涉及的风险。


  请注意，本章是为普通投资者编写的；因此，无需具备金融行业经验也能理解。相反，这种直截了当的方法为投资者概述了易于遵循的评估步骤。


  **本章讨论的基本要素：**


  -   机构投资

  -   私人融资

  -   公开融资

  -   合作伙伴关系


  事实


  超过 50% 的区块链项目——就像早期的科技初创公司一样——会在第一年内因资金耗尽而失败。通过了解资金的来源和用途，你已经领先于大多数投资者了。




  '
- '# 机构投资


  **评估目标：评估潜在的机构投资，以判断项目是否因机构支持而获得更高的可信度和更强的基本面。**


  区块链公司的机构投资，指的是对冲基金、投资银行、养老基金及其他大型金融实体等金融机构，对基于区块链的技术和数字“加密”资产进行投资的行为。尽管存在不确定性和高波动性，但近年来机构参与区块链领域的程度显著提升。驱动机构涉足数字资产的因素包括：高回报潜力、投资组合多元化、对冲风险、市场接受度与合法性的提高、机构基础设施（例如受监管的交易所）、竞争压力、投资者需求以及长期投资潜力。`bitcoin`
  通常是机构入场的首选，`Ethereum` 紧随其后，但如今许多机构产品也开始纳入其他大市值山寨币，例如 `Solana` 或 `Avalanche`，为投资者提供更广泛的投资敞口。然而近期，一些投资公司，例如
  [灰度投资](https://grayscale.com/)，已经开始投资并将多种数字资产纳入其投资组合。


  与个人或散户投资者不同，这些机构注入巨额资金，被视为区块链行业中最大的投资者。从数百万到数十亿美元的资金已投入并将继续由机构投入，这极大地主导了市场。机构有能力提升
  `bitcoin` 等主要数字资产的价格和市值，从而增加散户投资者的投资组合价值。同时，它们也拥有施加巨大抛售压力的能力，这常常导致市场状况惨淡。一个例子是，2021
  年 2 月 8 日，[特斯拉](https://www.tesla.com/) 购买了 15 亿美元的 `BTC`，导致 `bitcoin` 价格飙升。然而，特斯拉在
  2021 年卖出了 10%的持仓，并在 2022 年 7 月卖出了剩余的 75%。尽管特斯拉从中获得了 9.36 亿美元的利润，但此次抛售导致“加密”市场陷入金融动荡，摧毁了许多毫无经验的散户投资者。


  尽管如此，这些投资机构对“加密”市场也产生了积极影响。虽然更大的机构基础可以通过增加流动性来抑制日常波动，但其中一个参与者的超大规模买入或卖出仍可能引发价格在任一方向上的剧烈波动。投资机构还拥有各种交易和投资策略，这些策略有助于为散户投资者提供流动性，反之亦然。此外，机构投资极大地吸引了人们对区块链的关注，这增加了其可信度和合法性。机构通过多种方式投资数字资产，包括：


  * **资产负债表** – 将数字资产持有在资产负债表上，是机构投资加密货币最常用、最直接的方式。

  * **交易所交易基金（ETFs）** – 目前有多只 ETF 追踪 `bitcoin`、`Ethereum` 及其他数字资产的价格。这使得机构无需直接买卖底层资产即可投资数字资产。

  * **商品和服务支付** – 越来越多的企业现在接受使用 `BTC`、`ETH` 或稳定币进行结账——既可以通过 `BitPay` 或 `Coinbase Commerce`
  等处理商直接在链上支付，也可以通过 `PayPal`、`Stripe` 及类似网关提供的链下兑换服务。这为机构在支付供应商款项或结算发票时提供了使用数字资产的选择。


  ### 机构为何青睐 `bitcoin` 和 `Ethereum`


  机构投资者在投资数字资产时非常保守。事实上，与（本书撰写时）16300 个活跃项目相比，除了 `Grayscale` 多元化的数字资产组合及其他不太知名的机构外，大多数主流机构仅投资于
  `bitcoin` 和 `Ethereum`。这种机构投资策略的背后有四个核心原因：


  1. **流动性** – 机构投资公司在调整投资组合时，会买卖大量资产，因此充足的流动性对此类交易至关重要。`bitcoin` 因其高市值和巨大的日交易量最适合这一点，`Ethereum`
  次之。例如，在本书撰写时，`bitcoin` 的市值为 1.9 万亿美元，日交易量为 600 亿美元。

  2. **波动性降低** – 由于 `bitcoin` 和 `Ethereum` 拥有巨大的市值，与“加密”市场的其他部分相比，其波动性显著降低。这使得 `bitcoin`
  和 `Ethereum` 成为更稳定的投资，有助于缓解机构投资组合中的剧烈震荡。

  3. **风险降低** – 由于 `bitcoin` 和 `Ethereum` 是蓝筹主流的加密资产，与其他数字资产相比，其彻底崩盘或隔夜极端损失的风险显著降低。

  4. **基本面认可** – 机构投资者会进行严格、详细的基本面和技术分析，以确保资产符合其投资组合和策略要求。这些评估可能包含特定资产必须遵守的特殊标准和条件（例如监管或法律合规性），这使得许多加密货币项目被排除在考虑范围之外。


  随着区块链领域的发展和成熟，预计数字资产和区块链技术将得到更广泛的采用，这可能会为区块链领域带来更结构化的监管。这可能导致机构投资组合更加多元化。因此，通过确保项目团队透明且值得信赖来验证机构投资至关重要。


  ### 机构投资的类型


  机构投资公司有多种不同类型。核心的机构投资群体如表 15-1 所示。


  **表 15-1** 区块链领域的机构投资类型




