  \n1.  **共识机制**\n\n确定所使用的共识机制类型，例如 `PoW`、`PoS`、`DPoS`、`PoA` 等（如果项目采用 `DAG` 数据结构，请识别在其之上分层的独立共识算法）。对于\
  \ `dApps`，这将是底层区块链所采用的共识机制。\n\n    1. 将所使用的共识机制与表现优异、提供相同产品或服务的竞争对手所使用的机制进行比较。\n\
  \    2. 如果使用了不同的共识机制，请调查其原因。归根结底，只要合适的团队有充分的理由和证据，并且该机制已在其他项目上取得成功，那么使用不同的共识机制是可以接受的。\n\
  \n例如，对于一个去中心化交易所或游戏 `dApp`，若其需要高吞吐量和低延迟来处理大量交易，采用 `PoW` 共识机制是没有意义的。\n\n3. 如果共识机制基于未经验证的新技术，则强烈建议进行彻底研究，或考虑推迟投资，直到该技术在真实环境中得到成功验证。\n\
  \n2.  **吞吐量和区块时间**\n\n确定区块链的吞吐率（以每秒交易数 `TPS` 为单位）以及相应的区块时间。大多数区块链的此类信息可在 `Chainspect.​com/​dashboard`\
  \ 上找到。\n\n    1. 如果是 `dApp`，请检查项目所基于的区块链。此信息应能在白皮书、公司和社交渠道上清晰可见。\n    2. 理想情况下，高\
  \ `TPS` 和低区块时间是值得称赞的。作为参考，比特币在 30 天平均周期内的 `TPS` 为 `6.77tx/s`，区块时间为 `9m 44s`——参见图\
  \ 6-14 作为参考。尽管比特币是世界上最受欢迎和最强大的去中心化数字资产，但如果没有 Layer 2 扩容解决方案的帮助，其 `TPS` 和区块时间仍然被认为是较差的，不适合大多数需要高交易量的项目。\n\
  \    3. 另一方面，Polygon 的 `TPS`（`37.85 tx/s`）和区块时间 `2.18s` 如图 6-15 所示，对于当今推出的大多数项目来说，被认为是高度出色的。\n\
  \    4. 在研究 `TPS` 和区块时间时，建议始终将其与市值高、广为人知的流行竞争对手进行比较。\n\n> **事实**  \n> 具有高 `TPS`\
  \ 率和低区块时间的区块链，在面对高交易量情况时表现良好。此外，与低 `TPS` 和高区块时间的项目相比，这些区块链拥堵较少，Gas 费用也更低。\n\n###\
  \ 行动步骤\n\n请遵循以下步骤判断一个区块链项目是否具备强大的可扩展性特质，这将直接影响构建在其上的任何 `dApps` 的可扩展性。\n\n1.  **评估区块链可扩展性**\n\
  \n    使用“*如何衡量区块链可扩展性性能*”部分中概述的步骤，分析链的共识机制、吞吐量和区块时间，以确定其可扩展性潜力和效率。\n\n2.  **记录并用自己的方式整理研究结果**\n\
  \n3.  **将研究结果与基础评估流程的其他部分相结合**\n\n#### 结果评估\n\n如果区块链的 `TPS` 和区块时间性能与表现优异的竞争对手相比表现较差，则建议在其余基础评估完成之前谨慎行事。根据\
  \ `TPS` 和区块时间性能的糟糕程度，投资者应强烈考虑不投资该项目。\n\n### 安全性\n\n***评估目标：识别区块链项目的安全威胁，并采取措施保护网络和您的数字资产。***\n\
  \n区块链技术以其强大的安全特性而闻名，这些特性有助于保护数据免受各种攻击。这种安全性是通过非对称加密、共识机制和去中心化的协同作用实现的，为网络参与者提供安全可靠的保护。然而，与大多数系统一样，存在一些缺陷会危及区块链的安全性，进而危及投资者的数字资产投资。这些威胁因素包括\
  \ 51% 攻击、双重支付、争议性硬分叉或链重组攻击、供应商攻击、终端攻击、拒绝服务（`DoS`）攻击和 *女巫* 攻击。此外，项目团队的人力因素，例如糟糕的实践实施和整体能力不足，也可能危及区块链项目的完整性。\n\
  \n#### 投资者重要的安全检查\n\n如前所述，区块链或 `dApps` 有多种方式受到攻击，并窃取链上数字资产形式的资金。本节概述了这些不同类型的攻击，因为这有助于投资者了解并理解它们。然而，对于投资者甚至项目团队而言，预测项目是否会遭受攻击是极具挑战性的。大多数情况下，只有在攻击发生后，系统中先前未注意到的缺陷或漏洞才会暴露出来。因此，本节主要阐述投资者能够掌控的步骤和行动，以及如何实施它们来帮助保护其数字资产免受攻击。\n\
  \n\n\n### 51% 攻击\n\n在基于工作量证明（`PoW`）的区块链中，51% 攻击是指某个实体或团体控制了网络超过 50% 的挖矿算力（也称为哈希率）的情况。这不应与一群人拥有特定资产超过\
  \ 51% 的供应量相混淆。许多项目都曾遭受过 51% 攻击，包括 [Bitcoin Gold](https://bitcoingold.org/)（2018\
  \ 年及 2020 年再次发生）、2019 年的 [Ethereum Classic](https://ethereumclassic.org/) 以及 2018\
  \ 年的 [Verge](https://vergecurrency.com/)。\n\n当 51% 攻击发生时，攻击者控制了足够的哈希算力，能够比诚实矿工更快地找到有效的随机数（nonces）——从而更快地创建新区块，这使他们能够扩展一条私有链并推翻诚实的区块。这使得攻击者可以决定哪些区块是可接受的，从而阻止新交易获得确认，并停止网络参与者之间的交易。\n\
  \n通过控制大部分区块的挖矿，攻击者可以重组链——在先前已确认的区块下方创建分叉——来实现对自己交易的*双花*。然而，攻击者只能双花他们持有有效签名的交易，并且只有当攻击成功地使一笔支付失效，但仍能收到不可逆的商品或资产时，该攻击才有利可图。（关于\
  \ 51% 链重组和双花的分步解释，请参见 A. Antonopoulos 所著 *Mastering Bitcoin*，第 2 版，第 10 章 “挖矿与共识”，第\
  \ 270–273 页。）\n\n然而，在 51% 攻击开始之前已经被锁定并确认的交易极难被篡改。此外，交易在链上被确认的时间越长，其不可篡改性就越强，这使得操纵这些永久性交易几乎不可能。\n\
  \n**事实**\n\n攻击者无法撤销网络上他人的交易，也无法阻止用户向网络广播他们的交易。此外，51% 攻击无法创建新资产、窃取不相关方的资产，或改变区块奖励的功能。\n\
  \n##### 51% 攻击的可能性\n\n尽管 51% 攻击是可能的，但这是一项极具挑战性、复杂且成本高昂的任务，其成功可能性会随着网络通过增加更多挖矿节点而扩张而降低。首先，攻击者需要控制网络超过\
  \ 50% 的算力，并创建一条替代区块链——原始区块链的一个分叉——该分叉最终需要在某个特定时间点被接受，并且其哈希率需要超过原始链。\n\n即使想要有机会实现这一点，以比特币网络为例，也需要数千台*专用集成电路*（`ASIC`）矿机，每台\
  \ `ASIC` 矿机的成本大约为 10,000 美元。在较小的网络上发动 51% 攻击所需的 `ASIC` 矿机数量较少；然而，所需设备的成本可能超过攻击带来的收益。此外，除了成本之外，攻击者还必须控制网络\
  \ 51% 的哈希算力，并在精确的时间点引入被篡改的区块链。攻击者必须跟上区块的创建速度，或者在“诚实”区块链网络创建有效新区块之前插入他们的替代链。如果做不到这一点，51%\
  \ 攻击就会失败。\n\n##### 针对权益证明网络的 51% 攻击\n\n要使 51% 攻击在基于权益证明（`PoS`）的网络中发生，攻击者必须拥有 51%\
  \ 的质押原生资产（例如，质押的 `ETH`）。尽管这是可能的，但对于市值较大的项目来说，这种情况发生的可能性不大。此外，“*罚没*”是一种惩罚机制，它会检测并惩罚那些行为恶意或违背网络利益的验证者，通过自动“罚没”或没收攻击者的质押资产，导致其蒙受巨大经济损失。\n\
  \n### 共识机制\n\n选择共识机制是一项复杂的任务，因为它们具有不同的特性、优点和缺点，适用于不同的用例。在安全性方面，每种共识机制都提供了保护网络免受攻击的独特方法，但它们也存在特定的漏洞。表\
  \ 6-9 展示了最常见的共识机制及其在安全性方面的相关优缺点。投资者对这些机制有基本的了解，有助于在投资前更好地理解安全风险。\n\n**表 6-9** 共识机制的安全特性与缺陷\n\
  \n| 共识机制 | 优点 | 缺点 |\n| --- | --- | --- |\n| `工作量证明`（`PoW`） | 安全性高。 | − 尽管可能性不大，但仍存在\
  \ 51% 攻击的潜在风险。− 较小的网络面临算力中心化的风险。 |\n| `权益证明`（`PoS`） | 如果质押资产分布良好，能够抵抗 51% 攻击。 |\
  \ − 如果质押的代币很少或为零，网络可能存在“无利害关系”攻击的风险。− 如果少数人质押了大量资产，可能容易受到中心化风险的影响。 |\n| `委托权益证明`（`DPoS`）\
  \ | 即使只有一小群受信任的代表，也能维持安全性。 | − 由于少数代表控制网络，存在中心化风险。− 存在代表共谋进行恶意攻击的风险。 |\n| `提名权益证明`（`NPoS`）\
  \ | − 允许提名人选择他们信任的验证者，增强了去中心化和安全性。− 提名人可以更换验证者，降低了共谋风险。 | − 网络安全取决于质押分布以及提名人和验证者的行为。−\
  \ 如果少数验证者意外或恶意地获得不成比例的提名，存在中心化风险。− 如果质押的代币很少或为零，网络可能存在“无利害关系”攻击的风险。 |\n| `实用拜占庭容错`（`PBFT`）\
  \ | 高容错性，即使某些节点行为恶意也能确保安全。 | − 如果节点数量较少，容易受到女巫攻击。− 不适用于大型公共网络，在更大规模的环境中可能降低安全性。\
  \ |\n| `有向无环图`（`DAG`） | 在特定条件下能保持高交易吞吐量的同时维持安全性。 | − 容易受到中间人（`MITM`）攻击。− 由于缺乏线性区块链结构，维护安全性具有复杂性。\
  \ |\n| `权威证明`（`PoA`） | 通过有限数量的可信验证者提供高安全性。 | − 由于验证者是预先批准的，存在中心化风险，使系统更容易受到攻击。 |\n\
  \n#### 双花\n\n51% 攻击可能引发一个被称为*双花*的问题。在传统银行业背景下，当对账缺陷允许同一笔资金被花费两次时就会发生这种情况：例如，假设鲍勃的银行账户里有\
  \ 1,000 美元，他向爱丽丝发送了 400 美元。如果银行网络运行正常，鲍勃的余额将降至 600 美元，爱丽丝的余额将升至 400 美元；如果账本未能更新，鲍勃的余额将保持在\
  \ 1,000 美元，而爱丽丝仍然收到 400 美元，这允许鲍勃再次花费那 400 美元——即双花。\n\n区块链技术结合分布式账本技术（`DLT`）以及比特币的工作量证明（`PoW`）共识机制的引入，解决了双花问题。其工作原理是通过一个点对点的节点网络，每个节点都会验证广播到网络上的交易。网络节点共同协作，就交易是有效还是无效达成一致。如果一笔交易被认定为无效，它就不会被处理，从而消除了双花问题。\n\
  \n**事实**\n\n请注意，数字资产并不存储在钱包或任何去中心化数字资产存储应用中。数字资产存储在链上。数字钱包仅提供一个接口，当资产持有者输入其相应的安全密钥和密码，从而验证他们是资产的所有者时，用于访问这些资金。\n\
  \n\n\n#### 分叉\n\n与传统的中心化商业和应用类似，区块链也需要更新来提升性能并修复出现的问题。在加密领域，这些更新有时会导致所谓的“分叉”。在开源加密项目中，当矿工和网络参与者无法就`协议`的新提议变更和升级达成一致共识时，就会发生*分叉*。`协议`是一套组合的特定规则，网络中所有节点都遵循这些规则。一个`协议`有许多不同的目的和功能，包括：\n\
  \n-   通过消除对中央权威的需求、将控制权分布到整个网络以及定义区块大小和矿工奖励等关键参数，来维护去中心化\n-   确保网络中安全、高效且可靠的数据传输\n\
  -   维护和控制安全性\n-   共识机制的运作\n-   网络功能\n-   互操作性\n\n不幸的是，由于区块链设计的局限性以及矿工和网络参与者之间的分歧，这些`协议`升级有时不可避免地会将区块链分割成两个独立的区块链，各自遵循其独立的协议和社区。交易历史是共享的，并从一条区块链延续到另一条，但每条区块链走向不同的方向。分叉的过程取决于区块链的架构和用例，分叉通常分为两种类型：**软分叉**和**硬分叉**。\n\
  \n##### 软分叉与硬分叉\n\n如前所述，当矿工和网络参与者无法就`协议`的新提议变更和升级达成一致共识时，就会发生“分叉”。分叉有两种类型：软分叉和硬分叉——请参阅表\
  \ 6-10 了解这些分叉类型的对比。\n\n**表 6-10** 硬分叉与软分叉对比\n\n| 区块链软分叉与硬分叉 | | |\n| --- | --- |\
  \ --- |\n| | 软分叉 | 硬分叉 |\n| --- | --- | --- |\n| 定义 | 软分叉是对协议软件的向后兼容升级。 | 硬分叉是对协议软件的不向后兼容更改，通常会导致区块链永久性分裂。\
  \ |\n| 分叉（分裂） | 区块链无需永久性分裂。 | 区块链需要永久性分裂。 |\n| 兼容性 | 旧节点与新节点仍然兼容，这意味着运行旧协议版本的节点仍然可以验证新交易。\
  \ | 新节点不承认旧节点有效。旧节点将继续维护原始链，而新节点将运行和维护另一条“分叉”的区块链。 |\n| 分叉感知 | 当软分叉发生时，旧节点会被告知共识规则已更改。\
  \ | 当硬分叉发生时，网络上的所有节点都被要求进行更改并升级到新协议。未升级的节点将继续运行并留在现有链上。 |\n| 协议变更 | 新协议与旧协议兼容。旧节点会识别新区块为有效。\
  \ | 新协议与旧协议不兼容。旧节点不识别新区块为有效。 |\n| 分叉影响 | 软分叉通常引起的破坏较小，但仍可能引入主要功能或关键修复。 | 硬分叉破坏性更大，通常用于重大变更。\
  \ |\n| 矿工责任 | 矿工可以无需升级进行挖矿，但如果他们不遵循更严格的软分叉规则，其区块可能会被拒绝——因此实际上他们会升级以避免徒劳工作。 | 矿工必须更新其协议才能继续参与挖矿过程。\
  \ |\n| 代币持有者 | 代币持有者不受影响。 | 旧链上的代币持有者通常也会在新链上获得代币，因为它们共享相同的交易历史。 |\n| 示例 | 隔离见证（SegWit）比特币协议更新\
  \ | [比特币现金](https://www.investopedia.com/news/all-about-bitcoin-cash-hard-fork/)\
  \ |\n\n区块链项目的分叉极难预测，并且在大多数情况下，在项目生命周期的早期阶段是完全不可预测的。分叉的决定往往在链成熟且社区成员认为需要新的需求、升级和更新时形成。\n\
  \n> **事实**  \n> 通过先进技术，像波卡网络这样的基础设施项目不需要分叉即可升级和更新其区块链。\n\n##### 硬分叉的危险\n\n分叉的主要问题在于它带来了严重的安全威胁；这些包括：\n\
  \n-   当一个区块链项目经历硬分叉并分裂成两个独立的区块链和加密货币（每条链对应一种加密货币）时，最初会导致矿工和节点数量减少。这反过来会降低每条区块链的计算能力。如果任何恶意行为者联盟联合起来并控制超过\
  \ 50%的网络，就可能发生 51%攻击，从而使该项目极易受到双重支付和欺诈活动的影响。\n-   当区块链分叉时，会产生加密代币的 1:1 副本并复制到新的“分叉”链上。为了领取他们的新代币，持有者必须通过使用其私钥签名来证明其资产所有权。这为诈骗者提供了机会，他们冒充权威人士或团队成员，要求你点击欺诈链接并声称“在此处领取您的代币”。他们的意图是获取你的私钥以窃取你的资金。\n\
  -   对于软分叉和硬分叉，分叉前后时期和每个币的价格通常波动很大；因此，建议除非你有经验并制定了策略和计划，否则不要买卖你的资产。\n\n#### 女巫攻击\n\
  \n在无需许可的区块链中，最具挑战性的攻击是女巫攻击，恶意行为者（节点）创建多个虚假身份以获得对网络不成比例的巨大影响力。女巫攻击的目标是让这些恶意节点欺骗区块链网络，使其相信它们的身份是真实合法的。如果它们成功做到并且在网络上拥有足够多的恶意节点，它们就可以利用这种影响力来对抗诚实节点以获取自身利益。\n\
  \n> **事实**  \n> “Sybil”一词来源于弗洛拉·施莱伯 1973 年的一部小说，小说中有一个名为 Sybil 的角色，她患有与身份相关的疾病，经常以多重身份活动。\n\
  \n##### 女巫攻击的危险\n\n攻击者可以通过链上治理，在投票公投中使用多个虚假身份投票压制合法节点，从而恶意行事。此外，攻击者有可能拦截和分析 IP 地址等敏感用户数据，从而危及用户的隐私和安全。女巫攻击还可能损害区块链的完整性，导致潜在的资产损失、隐私泄露和交易数据损坏。它们还可能引发其他问题，例如拒绝接收或传输区块，以及屏蔽其他网络用户。区块链中的女巫攻击也可能导致*拒绝服务*（DoS）攻击。\n\
  \n> **事实**  \n> 2020 年，注重隐私的门罗币区块链遭受了一次持续十天的女巫攻击。尽管由于门罗币社区和勤奋的开发者团队的努力，攻击未能成功，但攻击者的目标是去匿名化平台交易。\n\
  \n\n\n"
- '# 拒绝服务攻击


  拒绝服务（DoS）攻击的目标是破坏网络、服务器或应用程序的可用性，阻止合法请求得到执行。攻击者通过发送大量请求来实施 DoS 攻击，导致受害者服务器过载，直至无法处理负载。需要注意的是，这些请求既可能是合法的，也可能是欺诈性的（垃圾信息）。无论如何，DoS
  攻击会耗尽服务器的`CPU`处理能力或网络的正常运作能力，降低交易吞吐量，从而阻碍合法交易的及时验证。


  幸运的是，由于区块链技术的去中心化特性，包括共识机制的保护属性，许多 DoS 攻击是可以预防的。然而，DoS 攻击，尤其是名为*分布式拒绝服务*（DDoS）的变种，在区块链领域仍然十分突出。顾名思义，DDoS
  攻击是一种大规模、分布式的 DoS 攻击类型，会影响整个网络参与者（例如区块链）的运作。当这种情况发生时，攻击者向区块链发送大量垃圾交易，填满区块数据，从而阻碍合法交易被添加到链上。最终，所有合法交易都将滞留在`mempool`中等待下一个区块，但由于系统故障而无法被添加。一种新型的
  DoS 攻击——区块链拒绝服务（BDoS）已经出现，其攻击目标是基于工作量证明（PoW）的区块链。BDoS 攻击破坏了挖矿奖励激励机制，攻击者投入资源诱使理性矿工停止挖矿，可能导致区块链瘫痪。


  **事实**


  Solana 区块链在 2022 年 1 月遭受了多次 DDoS 攻击，导致其离线约四个小时。


