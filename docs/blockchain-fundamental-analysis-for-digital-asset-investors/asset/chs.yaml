  \ |\n\n## 其他技术文档\n\n项目也可能会酌情提供额外的技术文档。这些文档大部分是技术教程，指导开发人员如何运行节点、在网络之上创建去中心化应用程序（dApp）、进行\
  \ dApp 集成、设置 API、进行质押等等。大多数项目都会提供此类技术文档；然而，不幸的是，文档质量因项目而异。这些文档必须达到一定标准，使得开发人员能够在很少需要项目团队帮助的情况下轻松使用和遵循，因为有时后者的帮助效率极低，并且常常会阻碍项目的发展。问题在于，大多数投资者没有开发经验，因此很难评估此类文档。如果您发现自己属于这一类，请查看项目的开发者论坛——通常可从项目网站访问——了解总体情绪，以及是否存在许多关于文档质量的投诉。\n\
  \n\n\n## 白皮书\n\n**评估目标**：评估项目白皮书，确保其合法性和质量，同时评估所提供产品或服务的潜在价值。\n\n“白皮书”一词源于英国政府，最早的例子之一是[《1922\
  \ 年丘吉尔白皮书》](https://en.wikipedia.org/wiki/White_paper)。这类文件是英国政府部门发布的一种立场文件或行业报告。“白皮书”一词本身源于其封面的颜色——当然是白色的。\n\
  \n第一份加密货币白皮书是比特币白皮书（图 3-1），由创始人[中本聪](https://en.wikipedia.org/wiki/Satoshi_Nakamoto)于\
  \ 2008 年撰写。自那以后，成千上万份白皮书由区块链公司、独立开发团队、去中心化自治组织和个体开发者撰写，每份都声称其产品、服务或技术代表着未来。然而，作为投资者，至关重要的是要理解，无论一个投资机会看起来多么诱人，并非每个项目都能成功；事实上，相比于现存项目的数量，成功的项目寥寥无几。因此，剔除“噪音”和基本面薄弱的项目，对于识别高质量、有利可图的项目至关重要。\n\
  \n![一份文件标题页，标题为《比特币：一种点对点的电子现金系统》，作者为中本聪。包含一段摘要，讨论了点对点版本的电子现金、数字签名以及防止双重支付的工作量证明。引言部分概述了无需可信第三方的电子支付系统的必要性，指出了当前系统的问题，并提出了使用密码学证明的解决方案。联系信息包括一个邮箱和一个网站。](img/648696_1_En_3_Fig1_HTML.jpg)\n\
  \n**图 3-1** 比特币白皮书第一页（承蒙 [`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf)\
  \ 提供）\n\n那么，白皮书到底是什么？白皮书是由项目团队生成的一份关键文档，为利益相关者提供与项目相关的技术性和非技术性信息。它界定了问题，更重要的是，提出了该问题的解决方案。一份白皮书包含最终定义整个项目及其所提供内容的关键方面，至少包括：核心目的、功能、用例、价值主张、设计与架构、代币经济学以及路线图。根据团队和项目的不同，有些白皮书比其他白皮书更详细、内容更丰富。\n\
  \n白皮书是一种战略性方式，用于呈现有价值、深入的信息，以满足目标受众的需求——解释项目的目的、技术和价值主张。此外，白皮书也是推广项目及其所提供价值的手段。例如，加密项目通常需要资金来将愿景和核心产品变为现实。白皮书在融资轮次中发挥作用，由项目团队向私募股权公司、机构、天使投资者和散户投资者——通过公开发行——展示，以帮助教育和寻求投资。白皮书是项目文档的主要参考点。通常可以通过项目的官方网站下载\
  \ `.pdf` 格式的文件找到它——这是迄今为止寻找白皮书最安全的地方。\n\n> **事实**  \n> 以太坊，一个智能合约平台，是白皮书的另一个绝佳案例——[`https://ethereum.org/en/whitepaper/`](https://ethereum.org/en/whitepaper/)\n\
  \n## 白皮书内容清单\n\n一份高质量的白皮书将包含有价值的信息，详细说明产品或服务的目的、它正在解决什么问题、价值主张、技术、架构、代币设计、激励机制、团队、代币经济学、资金、归属时间表、路线图以及相关的法律考量。需要注意的是，项目路线图通常作为单独的文件发布，或者发布时间晚于白皮书。项目路线图将在第\
  \ 11 章“项目路线图”中进行探讨。\n\n以下是被标准要求应包含在每份白皮书中的内容清单。\n\n1.  **产品/服务描述**\n    1.  正在解决的问题\n\
  \    2.  解决方案\n    3.  如何运作\n2.  **价值主张**\n3.  **技术**\n    1.  系统架构\n    2.  区块链类型\n\
  \    3.  共识机制/运作方式\n    4.  浏览器详细信息\n4.  **代币**\n    1.  代币目的\n    2.  代币类型/标准\n\
  5.  **代币经济学**\n    1.  代币供应量\n    2.  通胀/通缩/固定供应\n    3.  代币分配详情\n    4.  归属时间表详情\n\
  6.  **融资与合作伙伴**\n    1.  种子轮、私募轮、首次代币发行和首次去中心化交易所发行轮详情\n    2.  现有投资者名单\n    3.\
  \  现有合作伙伴名单\n7.  **奖励/激励措施**\n8.  **路线图/愿景**\n    1.  已完成的里程碑\n    2.  未来里程碑清单\n\
  \    3.  未来里程碑的时间表\n9.  **法律法规/文件**\n10. **参考资料/来源/脚注**\n11. **免责声明**\n\n## 白皮书的益处\n\
  \n白皮书是丰富的洞察来源，持续阅读它们可以在以下方面帮助投资者：\n\n- **技术评估** – 白皮书提供了对核心项目基本面的洞察，帮助读者理解项目的关键方面。\n\
  - **技术知识** – 白皮书充满了技术见解——通常也包括经济或治理细节——可以显著扩展你的区块链知识。\n- **投资决策** – 白皮书提供数据来帮助你评估项目，从而做出更明智的投资决策。\n\
  - **技术信心** – 你读的白皮书越多，就越容易理解。\n- **识别诈骗项目** – 白皮书帮助你快速识别诈骗项目。\n- **风险评估** – 白皮书描绘了项目所提供内容的现实图景，进而让投资者看到项目可能面临的关联风险、局限性和挑战。\n\
  - **新机遇** – 从白皮书中获得的新知识和理解，可以为你在区块链领域打开新的大门和机会。\n- **比较分析** – 通过阅读多份白皮书，投资者可以根据项目目标、技术和策略进行比较。这种比较有助于识别关键差异点和潜在机会。\n\
  \n> **警告**  \n> 白皮书是数字资产投资者唯一最关键的文档。至少，在阅读项目白皮书并了解你正在投资什么之前，不应进行任何投资。\n\n\n\n###\
  \ 白皮书风格\n\n白皮书风格多样。有些白皮书只有几页，视觉化程度高，包含大量图片，阅读时间在半小时到一两小时之间。强烈建议不要投资制作此类白皮书的项目。它们很可能是骗局，要么用例极差，要么严重缺乏资金——无论如何，都不值得承担这种风险。\n\
  \n而在另一端，复杂的项目或价值巨大的项目通常会生成非常详细、冗长的白皮书，通篇充斥着大量技术术语。这些白皮书的篇幅从几页到上百页不等。这类白皮书通常包含许多新投资者可能不理解的技术内容，初看时可能显得有些令人生畏。然而，这种质量的白皮书提供了对基本面评估过程以及任何数字资产投资决策都至关重要的关键信息。投资者在分析白皮书时必须高度警惕。项目团队常常会在白皮书中添加大量“水分”来充数，唯一目的就是欺骗投资者，让他们误以为产品或服务比实际更厉害。这些“水分”通常包含比特币的历史、当前的区块链相关新闻、关于区块链技术的通用信息，或类似的不必要内容——这是一个危险信号。白皮书应当清晰、无废话，并严格聚焦于项目提供的产品或服务。没有任何例外。\n\
  \n`Polkadot Network` 是一个强大、先进的区块链网络。图 3-2 展示了`Polkadot Network`白皮书的第一页。\n\n![标题为“波卡：异构多链框架的愿景，草案\
  \ 1”的文本文档，作者加文·伍德博士。摘要讨论了区块链架构问题，提出了一种用于可扩展性和安全性的异构多链解决方案。文档包括前言和介绍部分，论述了可扩展性、隔离性和治理等挑战。文本强调了需要一种具有改进交易处理能力和适应性的去中心化系统。](img/648696_1_En_3_Fig2_HTML.jpg)\n\
