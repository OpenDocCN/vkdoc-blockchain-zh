- "# 机构投资\n\n## 投资工具\n\n### 企业投资（[微策略](https://www.microstrategy.com/en)、[谷歌风投](https://www.gv.com/)、[英特尔资本](https://www.intelcapital.com/)、[IBM\
  \ 区块链](https://www.ibm.com/blockchain)、[富达投资](https://www.fidelity.com/)）\n\n企业投资公司是将利润或闲置现金用于投资，而非作为收入或存入银行账户的大型企业。它们通过直接投资或通过风险投资公司来实现。由于税收优势，企业投资是从公司提取资金的一种有吸引力的方式。例如，商业智能（BI）软件公司`微策略`截至\
  \ 2024 年 11 月 24 日，其比特币持有量已增至 386,700 BTC。\n\n### 投资信托（[灰度投资](https://grayscale.com/)）\n\
  \n投资信托是接收投资者资金并代表其投资于不同资产的金融产品。投资信托，也称为封闭式信托，允许投资者在公开市场上交易其份额。`灰度比特币信托（GBTC）`就是一个投资信托的例子。它允许投资者交易持有大量比特币的信托份额。`GBTC`\
