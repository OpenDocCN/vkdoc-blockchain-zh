  \ `OpenSea`, `Dapper Labs` |\n| 去中心化金融 (DeFi) | 一种利用区块链技术提供点对点金融服务、无需银行或其他中介的金融技术。真正去中心化的应用消除了对中介或中心化实体的需求。\
