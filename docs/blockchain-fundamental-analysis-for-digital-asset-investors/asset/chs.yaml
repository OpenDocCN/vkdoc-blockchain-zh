  \ 年左右的峰值。该图表包含不同指标和时间范围的选项，并高亮显示了 471.65 亿美元的总锁仓价值。](img/648696_1_En_9_Fig18_HTML.jpg)\n\
  \n**图 9-18** 以太坊的 TVL 和市值同步变化（数据来源：[`https://defillama.com/chain/Ethereum?chainTokenMcap=true`](https://defillama.com/chain/Ethereum?chainTokenMcap=true)）\n\
  \n\n\n### TVL 报告方式的差异\n\n不同的 DeFi 协议计算总锁定价值（`TVL`）的方式各不相同，理解这一点对于比较项目至关重要。例如，`AAVE`（图\
  \ 9-19，“方法论”部分）仅统计其合约中作为抵押品或用于赚取收益而锁定的代币——借出的代币不计入其 `TVL`。`AAVE` 的借出资产是单独计算的。然而，其他协议可能会将借出的代币、质押的币种或生息资产纳入其\
  \ `TVL` 计算。投资者必须了解 DeFi 协议如何计算 `TVL`，因为这在执行竞争对手分析时非常重要。需要注意的是，借出的资产并未被“锁定”在任何智能合约中，因此不应计入协议的\
  \ `TVL` 计算。\n\n![一张解释 TVL（总锁定价值）的方法论部分截图。其中说明 TVL 统计的是为抵押或收益而锁定在合约中的代币，不包括借出的代币，以防通过循环借贷导致数值膨胀。](img/648696_1_En_9_Fig19_HTML.jpg)\n\
  \n图 9-19\n\n`AAVE V3` DeFi 协议的 TVL 报告方法论（图片致谢 [`https://defillama.com/protocol/aave-v3?events=false`](https://defillama.com/protocol/aave-v3?events=false)）\n\
  \n### 行动步骤\n\n请遵循以下步骤来评估一个 DeFi 协议的总锁定价值（`TVL`），评估其随时间推移的表现，并根据其 `TVL` 比率、表现趋势和竞争对手分析，判断其是否被高估或低估。\n\
  \n1.  **总锁定价值（`TVL`）比率**\n\n    访问 [`CoinMarketCap`](https://coinmarketcap.com/)、[`DeFiLama`](https://defillama.com/)\
  \ 或 [`TokenTerminal`](https://tokenterminal.com/terminal) 查看一个 DeFi 资产的 `TVL`。\n\
  \    1.  计算 `TVL` 比率（`市值 / TVL`）\n\n    2.  `TVL` 比率是高于一还是低于一？（低于一表明该 DeFi 协议被低估，高于一则表明被高估。）\n\
  \n2.  **`TVL` 表现**\n\n    分析 `TVL` 的表现。\n    1.  该协议的 `TVL` 与所有链的总 `TVL` 相比如何？\n\
  \        1.  它是持续表现优异、保持稳定，还是处于下降趋势？\n\n    2.  它是否与市值变化相关？\n\n    3.  `TVL` 和市值之间是否存在有助于识别潜在入场和/或出场点的重复模式？\n\
  \n3.  **`TVL` 报告方式**\n\n    确定该 DeFi 协议是如何计算其 `TVL` 的。\n    1.  借出的资产是否被包含在 `TVL`\
  \ 中？\n        1.  借出的资产不应包含在 `TVL` 指标中。\n\n        2.  在进行竞争对手分析时，务必确保不同项目以类似方式计算\
  \ `TVL`。当使用多个 DeFi 聚合器进行项目比较时，应格外警惕，因为 `TVL` 的计算方法可能存在显著差异。\n\n4.  **竞争对手分析**\n\n\
  \    对 `TVL`、`TVL` 比率以及过往表现进行竞争对手分析。\n\n5.  **做笔记，并以你自己的风格记录发现**\n\n6.  **将发现与基本面评估过程的其他部分结合起来**\n\
  \n#### 结果评估\n\n如果 `TVL` 在上升，这通常是一个好兆头，表明更多投资者感兴趣、流动性正在增加、项目正在获得发展动力——这些都是积极的增长信号。一个稳定的\
  \ `TVL`，即使没有增长，也显示出稳定性和可靠性。但如果你看到 `TVL` 在下降，那么值得去探究其背后的原因。\n\n较低的 `TVL` 比率（大约为一或更低）可能暗示资产相对于其锁定价值被低估，这可能预示着一个好的投资机会。另一方面，较高的\
  \ `TVL` 比率可能意味着资产被高估，因此需谨慎对待。如果该比率持续大幅波动，在采取任何行动之前，应密切关注并评估该投资的稳定性或可持续性。\n\n## 费用与收入\n\
  \n***评估目标：评估 DeFi 协议的费用、收入分配和收益，以确定其财务健康状况、用户需求和增长潜力。***\n\n在 DeFi 领域，协议费用和收入是衡量项目财务健康、经济活动水平和未来潜力的关键绩效指标\
  \ (KPI)。理解协议的费用和收入模式对投资者至关重要。它能让人深入了解产生的总费用、分配给流动性提供者的部分，以及作为协议收入留存的部分。\n\n### 费用\n\
  \n与传统金融服务一样，与 DeFi 服务交互时需要收取费用，例如网络费用，以及基于用户使用特定协议功能（包括交易、借贷、质押和提供流动性）的收费。虽然费用相对较小，但随着时间的推移，它们会显著累积。例如，建立在\
  \ `Ethereum` 上的去中心化交易所（`DEX`）`Uniswap`，仅对代币兑换收取 0.3% 的费用。这些费用会按比例分配给存入流动性池以促进交易的流动性提供者。\n\
  \n**注意**\n\n不同的 DeFi 数据聚合器有时会采用不同的方法来计算所产生的协议费用。因此，检查费用计算方法至关重要，尤其是在使用不同聚合器比较数据时。\n\
  \n### 收入\n\n收入是协议在向用户（如流动性提供者、贷款人或质押参与者）分配后留存的那部分费用。这部分留存收入对协议的长期可持续性至关重要，因为它为持续的开发和日常运营提供了资金。协议的收入直接取决于其产生的费用。没有足够的用户参与，费用的产生就会受到影响，从而限制收入增长。因此，当一个协议有持续产生可观费用的历史时，这很好地表明用户参与度高，反过来——\n\
  \n**事实**\n\n费用反映了对协议服务的需求，而收入则体现了它如何将这种需求转化为持久价值。\n\n### 评估费用与收入\n\n本节根据三个关键标准分析某项资产产生的费用和收入：费用与收入的市场趋势、收入分配模型以及竞争对手比较。\n\
  \n\n\n#### 费用与收入市场趋势\n\n图 9-20 展示了构建在以太坊上的顶级流动性质押 DeFi 协议 [Lido](https://lido.fi/)\
  \ 的费用与收入情况。Lido 的年化费用估计为 8.3517 亿美元，收入为 8352 万美元。Lido 通过收取质押奖励的 10% 作为费用来实现盈利——8352\
  \ 万美元/8.3517 亿美元等于 10%。这笔费用在节点运营商（5%）和 Lido DAO（5%）之间分配。剩余的 90% 则分配给使用该 DeFi 平台进行质押服务的用户。\n\
  \n![面积图展示了 Lido (LDO) 随时间的财务数据，包含市值、LDO 价格和收入等部分。图表显示了费用和收入的趋势，不同颜色的区域代表不同指标。左侧面板列出了锁定总价值、市值和年化费用等财务统计数据。图表提供了按日、周、月或累计查看数据的选项。](img/648696_1_En_9_Fig20_HTML.jpg)\n\
  \n图 9-20\n\nLido DeFi 协议预估年化费用与收入（数据来源：[`https://defillama.com/protocol/lido?tvl=false&mcap=false&fees=true&revenue=true&events=false&groupBy=daily`](https://defillama.com/protocol/lido?tvl=false&mcap=false&fees=true&revenue=true&events=false&groupBy=daily)）\n\
  \nLido 从 2021 年中期到 2024 年 3 月期间，费用收入呈现稳定增长（积极信号），随后从 2024 年 3 月开始进入冷却期。这与 Lido 的市值（红色线条）以及整体加密货币市值（图\
  \ 9-21）从 2024 年 3 月到 2024 年 9 月同时进入日线下降趋势相关。这种一致性表明 Lido 的费用和收入模式对更广泛的市场状况反应灵敏。与许多其他协议一样，这种相关性是典型表现。然而，对于那些在加密货币市场上涨时费用和收入保持不变或下降的\
  \ DeFi 协议，应保持谨慎。相反，当市场处于下跌趋势时，那些费用和收入保持稳定或呈上升趋势的协议则值得研究。同时，建议将此数据与协议的总锁定价值（TVL）以及整个\
  \ DeFi 市场的总锁定价值进行比较，因为这可能提供有助于基本面评估（包括入场和出场点）的额外信息。\n\n![图表显示了加密货币的每日总市值（美元）。图中展示了一个下降通道形态，包含两条平行趋势线。X\
  \ 轴代表时间，范围从 2017 年末到 2018 年，Y 轴表示市值数值。图表突出了通道内的波动，并在末端出现了突破。](img/648696_1_En_9_Fig21_HTML.jpg)\n\
  \n图 9-21\n\n加密货币总市值从 2024 年 3 月到 2024 年 9 月进入日线下降趋势（数据来源：[`https://www.tradingview.com/x/vgCedYet/`](https://www.tradingview.com/x/vgCedYet/)）\n\
  \n#### 费用与收入分配模型\n\n表 9-4 展示了按总锁定价值（TVL）排名的五大借贷平台（[Aave](https://aave.com/)、[Just\
  \ Lend](https://justlend.org/)、[Compound Finance](https://compound.finance/)、[Venus\
  \ Protocol](https://venus.io/) 和 [Kamino Finance](https://app.kamino.finance/)）。该表列出了收取的总费用、分配给协议参与者的费用以及作为收入保留的费用。分配给协议参与者的费用与作为收入保留的费用之和，等于协议收取的总费用。费用分配比例占总额的\
  \ 64% 至 90%，而作为收入保留的比例则在 10% 至 36% 之间。（底层数据参见 [TokenTerminal](https://tokenterminal.com/)\
  \ 或 [DeFi Lama](https://defillama.com/) 的协议仪表板）。请注意，这些借贷平台的两个比例范围跨度都很大，但它们仍然是按 TVL\
  \ 排名最受欢迎的协议。有些平台将更多费用分配给收入，而另一些则分配给协议用户。\n\n费用有多少比例分配给协议参与者、多少比例作为收入，完全由协议方决定。在评估时，投资者并没有一个硬性的费用分配与收入模型基准。相反，更重要的是，关注费用、收入和\
  \ TVL 的历史数据，能更深入地了解协议的财务状况和稳健性。一个具有稳定费用收入和创收历史的 DeFi 协议被视为积极指标，尤其当它拥有经受住熊市考验的历史时。\n\
  \n从表 9-4 中可以看出，拥有最高 TVL 的 Aave，将最低比例的费用分配给贷方，并从收取的总费用中保留了最高的收入。与那些通过最大化费用分配来快速吸引用户的协议不同，Aave\
  \ 专注于可持续的长期增长。通过保留更高的收入比例，Aave 能够在不过度依赖外部资金的情况下维持创新。正因为这种模式，于 2017 年推出的 Aave 已经成为一个享有盛誉的\
  \ DeFi 借贷平台，拥有用户信任的、可观的费用和收入历史。然而，这并不意味着其他借贷、流动性质押、`DEXs` 或类似的 DeFi 平台，由于保留的收入比例低得多，就更不可靠或不值得信赖——每个协议都应基于具体情况进行评估，并与费用收入和历史记录良好的其他顶级项目进行比较。\n\
  \n表 9-4\n\n借贷 DeFi 协议费用分配（数据来源：[`https://defillama.com/`](https://defillama.com/)）\n\
  \n| 借贷 DeFi 协议费用分配 |\n| --- |\n| 协议 | TVL | 总费用 | 分配给 DeFi 参与者的费用 | 作为收入保留的费用 |\n\
  | --- | --- | --- | --- | --- |\n| Aave | 137.12 亿美元 | 3.9898 亿美元 | 2.5467 亿美元 |\
  \ 64% | 1.4431 亿美元 | 36% |\n| Just Lend | 43.73 亿美元 | 297 万美元 | 268.5 万美元 | 90%\
  \ | 284,748 美元 | 10% |\n| Compound Finance | 21.05 亿美元 | 1000 万美元 | 826 万美元 | 83%\
  \ | 174 万美元 | 17% |\n| Venus Protocol | 17.23 亿美元 | 5538 万美元 | 4658 万美元 | 84% |\
  \ 880 万美元 | 16% |\n| Kamino Finance | 16.06 亿美元 | 6145 万美元 | 4912 万美元 | 80% | 1233\
  \ 万美元 | 20% |\n\n标准的费用分配和收入模型存在例外情况。以 Uniswap 的去中心化交易所（DEX）为例，100% 的交易费用都分配给了流动性提供者，因此该协议目前不为\
  \ DAO 或国库保留任何收入。这是因为 Uniswap 平台是开源的，没有直接运营成本；它没有在以太坊上运行的中心化团队，而是由智能合约管理。通过治理，UNI\
  \ 代币持有者和社区成员——在 Uniswap Labs 的协助下——对提议的协议决策、升级和参数变更进行投票。并非所有项目都是如此；通常它们会有一个需要支付薪资的团队，并承担包括开发、市场营销、安全审计、社区建设等在内的各种运营成本。\n\
  \n\n\n### 竞争对手分析\n\n为了更全面地了解协议的总费用和收入情况，建议访问 [DeFi Lama](https://defillama.com/fees)（`https://defillama.com/fees`），选择“高级”模式，并按年收入进行筛选。表格数据可以轻松按\
  \ 24 小时、7 天和 30 天进行筛选。图 9-22 列出了过去一年按累计费用排名的表现最佳的 DeFi 区块链和协议。累计费用和收入持续走高的协议通常表明用户需求强劲，这可能值得进行更深入的研究，并视为长期投资机会。\n\
  \n此外，将市值与累计费用进行比较，可以洞察协议是被高估还是低估。例如，一个市值高但费用收入低的协议可能暗示着缺乏坚实基本面的炒作。另一方面，市值较低但费用收入高的协议则可能揭示一个被低估的机会。\n\
  \n![一张表格，展示了按费用和收入排名的加密货币。列包括名称、链、类别、市值、费用、收入和累计费用。以太坊、泰达币和比特币位列前三。市值和财务数据以十亿和百万为单位显示。表格每天\
  \ UTC 时间 00:00 更新，可按时间段和类别筛选。提供 CSV 文件下载选项。](img/648696_1_En_9_Fig22_HTML.jpg)\n\
  \n**图 9-22** — 按过去一年累计费用排名的 DeFi 区块链和协议（数据来源：`https://defillama.com/fees`）。\n\n\
  ### 行动步骤\n\n请按照以下步骤评估 DeFi 协议的费用、收入分配和收益，以判断其财务状况、用户需求和增长潜力。\n\n1.  **费用和收入数据**\
  \  \n    访问 [DeFiLama](https://defillama.com/) 或类似的 DeFi 数据聚合器，查看项目的费用和收入。\n\n2.\
  \  **分析费用结构和收入分配**  \n    针对以下几点分析费用分配和收入分配情况：\n    1.  协议如何产生费用和收入？\n    2.  DeFi\
  \ 聚合器（例如 DeFi Lama）计算协议费用的方式是否准确？\n    3.  收取的总费用中，有多少比例分配给了协议用户，有多少保留为收入？\n\n3.\
  \  **审视历史费用和收入趋势**  \n    在 DeFi Lama 上，筛选显示市值、费用和收入的协议图表数据，并针对以下几点进行评估：\n    1.\
  \  审查协议的费用和收入随时间变化的趋势。\n    2.  费用收入是否与市值同步？如果不同步，费用收入相对于市值是增加、减少还是保持不变？\n    3.\
  \  协议的市值是否与加密货币总市值同步？\n\n4.  **竞争对手分析**  \n    使用 DeFiLama 的高级筛选工具，检查同一 DeFi 领域（例如，借贷、质押和去中心化交易所）内主要竞争对手的费用和收入模式，并将这些数据作为评估其他协议业绩的基准。\n\
  \n5.  **做好笔记，并以自己的方式记录发现**\n\n6.  **将发现与其他基本面评估流程部分相结合**\n\n#### 结果评估\n\n如果协议显示出高且稳定的费用和收入，这表明需求强劲、值得信赖，并且可能是一项稳健的长期投资。将高比例费用分配给用户，而自身保留较低收入，这可能表明协议侧重于增长而非可持续性，对短期参与者具有吸引力。然而，长期投资者应保持谨慎，并确保在完成全面的基本面评估后，其结果依然是积极的。\n\
  \n在市场低迷期间收入下降表明存在市场依赖性，而在此类时期收入保持稳定或增长则表明用户参与度强。在费用和收入指标上超越竞争对手可能表明具有竞争优势。然而，这需要足够长的市场历史数据来支撑才更可靠。\n\
  \n## 交易笔数\n\n**评估目标：分析交易笔数，以帮助判断市场是进入牛市、熊市还是盘整阶段。**\n\n`交易笔数`指标表示特定时间段内某项数字资产成功交易的总次数。此指标有助于衡量特定网络或数字资产在一段时间内的活跃程度。分析交易笔数可以为投资者提供以下见解：\n\
  \n*   **网络增长和活跃度** – 高且不断增长的交易笔数通常与市场活跃度增加相关，这标志着一个健康、被广泛使用、且采用率可能正在增长的网络；但请注意，部分交易量可能来自低费用链上的\
  \ MEV/套利机器人或低价值撸毛转账。\n\n*   **趋势** – 分析交易笔数可以帮助投资者识别趋势。例如，当交易笔数突然飙升时，通常随后会出现单币价格下跌。相反，当交易笔数大幅下降时，通常意味着进入吸筹阶段。这也可能是网络问题、用户兴趣下降甚至网络攻击的早期预警信号。\n\
  \n*   **兴趣和采用率** – 链上交易笔数指标可以与活跃地址指标结合使用，以准确判断兴趣和采用率是否随时间增加。一个不断增长的网络（或数字资产）通常是未来增长和成功的积极信号。\n\
  \n图 9-23 展示了比特币的交易笔数（使用 14 日简单移动平均线），以便更平滑、更清晰地了解网络活动。从 2016 年到 2018 年初，图表显示交易笔数（橙色区域）和价格走势（黑色线）均稳步增长——这是牛市的典型迹象。当\
  \ 2018 年初单币价格开始快速下跌时，交易笔数也随之大幅下降，暗示着潜在的熊市。然而，尽管从 2018 年到 2019 年初价格走势持续下跌，交易笔数却逐渐增加。这明确表明市场对比特币兴趣浓厚，并可能是另一轮上涨的迹象。这一点在\
  \ 2019 年 2 月至 6 月间比特币从大约 3,500 美元涨至 13,000 美元时得到了证实。另一个可能预示牛市即将到来的迹象是，当价格走势下跌但交易笔数保持稳定。这在\
  \ 2022 年到 2023 年初期间可见一斑，随后价格走势在 2023 年底从大约 20,000 美元涨至 44,000 美元以上。\n\n**事实：** 链上交易笔数指标仅统计成功的交易。\n\
  \n![图表显示了 2016 年至 2024 年比特币交易笔数和价格的 14 日移动平均线。橙色区域代表交易笔数，黑色线代表美元价格。关键时期被标注出来：“牛市”期间交易笔数和价格均上涨，“冷却期”出现下跌，“潜在趋势逆转信号”表现为交易笔数上涨而价格下跌，“熊市盘整”期间交易笔数保持稳定。](img/648696_1_En_9_Fig23_HTML.jpg)\n\
  \n**图 9-23** — 比特币：交易笔数（数据来源：`https://studio.glassnode.com/metrics?a=BTC&category=Transactions&chartStyle=column&ema=0&m=transactions.Count&mAvg=6&mMedian=0&resolution=1month`）。\n\
  \n\n\n### 操作步骤\n\n请遵循以下步骤分析交易数量，以帮助判断市场是否进入牛市、熊市或盘整阶段。\n\n1.  **评估链上交易量指标**\n\n\
  \    访问 [Glassnode.​com](https://Glassnode.com)（或同类网站）查看`交易量`链上指标。\n    1.  分析交易量指标，以便更好地理解资产的增长、关注度，以及潜在的吸筹或派发机会。\n\
  \n2.  **做笔记，并用你自己的风格记录发现**\n\n3.  **将发现与基本面评估流程的其他部分相结合**\n\n#### 结果评估\n\n如果出现吸筹或派发机会，最好与本章讨论的其他链上指标相互印证。切勿仅依赖一两个指标；多个指标共同指向同一方向时，准确性更高。\n\
  \n### 通胀率\n\n**评估目标：追踪比特币的通胀情况，洞察供应稀释和价格上涨的早期信号。**\n\n*通胀率*指标追踪数字资产供应量的增长速度。请注意，本节讨论的链上指标特指比特币的通胀率，由于比特币的主导地位，其通胀率往往会波及整个市场——关于代币供应膨胀的更多细节，请参阅第\
  \ 8 章“代币经济学”中的“通胀型代币供应”一节。\n\n`Glassnode`将资产的通胀率定义为供应量净变化（发行量减去销毁量）除以当前供应量。许多权益证明（`PoS`）区块链由于共识机制的运作方式，往往会导致代币供应膨胀。这些通胀模型可以是供应量无限增加，也可以是设定供应上限，一旦达到该上限就不再创建新代币。\n\
  \n比特币的供应量固定但属于通胀型，每当网络挖出 21 万个区块（约每 4 年），挖矿奖励就会减半。图 9-24 追踪了比特币的链上通胀率指标（橙色线）和每枚币的价格（黑色线）。2012\
  \ 年，比特币的通胀率约为 44%，而到了 2024 年，该比率已降至约 1.8%。请注意，在 2012、2016 和 2020 年比特币通胀率下降的年份，每枚`BTC`的价格均出现了上涨——在撰写本文时，尚无法确认\
  \ 2024 年是否也会如此。比特币的挖矿奖励将持续到大约 2140 年，届时将达到预设的 2100 万枚代币上限。到那时，矿工将仅通过处理交易的费用获得奖励。\n\
  \n通胀率对长期投资者尤为重要，因为持续的代币通胀率会导致显著的稀释效应，降低流通中每枚代币的价值。理想情况下，通胀率应随着时间的推移而下降并逐渐趋缓，而不是保持不变——更糟的是，持续上升。\n\
  \n![折线图，标题为“BTC: 通胀率”，显示 2010 年至 2024 年的两个数据系列。橙色线代表通胀率，初始很高并随时间显著下降。黑色线代表美元价格，总体呈上升趋势并伴有波动。左侧\
  \ Y 轴为通胀率的对数坐标，右侧 Y 轴为价格的线性坐标。X 轴代表年份。图表来源：Glassnode。](img/648696_1_En_9_Fig24_HTML.jpg)\n\
  \n**图 9-24**\n\n比特币：链上通胀率指标（感谢[`https://studio.glassnode.com/metrics?a=BTC&category=&m=supply.InflationRate`](https://studio.glassnode.com/metrics?a=BTC&category=&m=supply.InflationRate)提供数据）\n\
  \n### 操作步骤\n\n按照以下步骤追踪比特币的通胀情况，洞察供应稀释和价格上涨的早期信号。\n\n1.  **追踪通胀率**\n\n    访问 [Glassnode.​com](https://Glassnode.com)\
  \ 追踪比特币的通胀详情。\n    1.  记录通胀率：它是随时间下降还是保持不变？\n    2.  当通胀率（如果）下降时，是否有价格走势的趋势？这是否暗示着潜在的吸筹或派发（获利了结）机会？\n\
  \n2.  **做笔记，并用你自己的风格记录发现**\n\n3.  **将发现与基本面评估流程的其他部分相结合**\n\n#### 结果评估\n\n当比特币的通胀率下降且每枚`BTC`的价格上涨时，这通常预示着潜在的吸筹机会。然而，如果价格没有反应，则可能涉及其他市场因素，需要保持谨慎。由于比特币在市场中占据主导地位，其通胀图表的结果不仅有助于识别比特币本身的机会，也有助于分析其他数字资产。此指标更适合长期投资者使用。\n\
  \n### 投资者工具\n\n**评估目标：利用投资者工具识别潜在的市场顶部、底部，以及潜在的吸筹和派发区域。**\n\n投资者工具由[Philip Swift](https://twitter.com/PositiveCrypto)创建，专为长期投资者设计，用于指示价格可能接近周期性顶部或底部的时期。该工具使用两条简单移动平均线（2\
  \ 年`MA`（绿色）和 2 年`MA`的 5 倍乘数（红色））以及每枚币的价格作为基础，来判断估值过低和过高的状态，具体如下：\n\n- **价格交易在 2\
  \ 年 MA（移动平均线）下方**通常与熊市周期的低点相吻合。\n- **价格交易在 2 年 MA 的 5 倍乘数（红线）上方**通常与牛市周期的顶部以及投资者降低风险的区域一致。\n\
  \n    ![折线图，标题为“比特币：投资者工具”，显示 2011 年至 2024 年比特币的美元价格。图表包含两条移动平均线：绿色线代表 730 天移动平均线，粉色线代表\
  \ 730 天移动平均线的五倍。比特币价格波动显著，在 2013 年、2017 年和 2021 年左右出现明显峰值。图表来源：Glassnode。](img/648696_1_En_9_Fig25_HTML.jpg)\n\
  \n    **图 9-25**\n\n    Glassnode 的投资者工具（感谢[`https://studio.glassnode.com/workbench/e9e05fce-ce4b-4138-5736-5d2bfadfdf94`](https://studio.glassnode.com/workbench/e9e05fce-ce4b-4138-5736-5d2bfadfdf94)提供数据）\n\
  \n### 操作步骤\n\n遵循以下步骤来帮助识别市场顶部、底部，以及潜在的吸筹和派发区域。\n\n1.  **识别最佳入场点**\n\n    访问 [Glassnode.​com](https://Glassnode.com)（或同类网站）查看并使用\
  \ Philip Swift 的*投资者工具*。\n    1.  判断价格行动的位置：是低于 2 年`MA`（绿线）、高于 2 年`MA`的 5 倍乘数（红线），还是位于两者之间。\n\
  \n2.  **做笔记，并用你自己的风格记录发现**\n\n3.  **将发现与基本面评估流程的其他部分相结合**\n\n#### 结果评估\n\n如果价格跌至\
  \ 2 年`MA`下方，则可能被低估——可以考虑增加仓位。如果价格接近或穿越 2 年`MA`的 5 倍乘数，则表明估值过高，可能是获利了结或降低风险的好时机。注意将这些水平线作为指导标志，帮助决定何时买入、持有或降低风险，并且应与其他链上市场分析工具结合使用。\n\
  \n\n\n"
- "# 获利中的供应量百分比\n\n**评估目标：**分析“获利中的供应量百分比”指标，以评估持有者当前的盈利状况，并识别潜在的吸筹区或派发区。\n\n当某个币种的当前价格高于其（或账户链上的钱包余额）上一次移动时的价格时，该币种被视为“处于盈利状态”；反之，若当前价格更低，则被视为“处于亏损状态”。了解有多少投资者持有的资产是盈利的、多少是亏损的，这一点非常宝贵。根据一般经验法则，处于盈利状态的持有者比例较高，可能预示着潜在的下行趋势反转；而处于亏损状态的持有者比例较高，则可能预示着潜在的上行趋势反转。\n\
  \n*获利中的供应量百分比* 这一链上指标衡量的是总流通供应量中处于盈利状态的百分比——该指标在图 9-26 中以比特币为例展示。X 轴代表时间，而 Y 轴同时代表供应量盈利的百分比和每\
  \ BTC 的价格。通常，当供应量盈利的百分比（橙色线）进入绿色区域（盈利人数占比低）时，这预示着潜在的吸筹区和即将到来的上行趋势反转。相反，当它进入红色区域（盈利人数占比高）时，则预示着潜在的派发区和即将到来的下行趋势反转。\n\
  \n虽然预测市场底部很诱人，但这非常困难，依赖这种策略可能会对你不利。相反，有时在吸筹区采用定投策略更有益，这样可以随时间分散风险，并有可能获得更低的平均入场价格。当`获利中的供应量百分比`进入红色区域时也是如此。在红色区域分批获利了结，比试图在最高点卖出更安全，并且通常利润更高。\n\
  \n![图表标题为“BTC: 获利中的供应量百分比（14 日移动平均线）”，显示从 2010 年到 2024 年以美元计价的比特币价格（黑色线）和获利中的供应量百分比（橙色线）。该图表分别用红色和绿色圆圈标出了峰值和谷底。左侧\
  \ Y 轴代表获利中的供应量百分比，右侧 Y 轴代表以美元计价的比特币价格，范围从 0.06 美元到 10 万美元。X 轴覆盖了从 2010 年到 2024 年的年份。背景在\
  \ 90%以上为红色阴影，在 30%以下为绿色阴影。](img/648696_1_En_9_Fig26_HTML.jpg)\n\n图 9-26\n\n显示流通供应量中处于盈利状态的百分比的链上指标（数据来源：[`https://studio.glassnode.com/metrics?a=BTC&m=supply.ProfitRelative&utm_source=gn_insights&utm_medium=insights_woc&utm_campaign=woc_25_2024`](https://studio.glassnode.com/metrics?a=BTC&m=supply.ProfitRelative&utm_source=gn_insights&utm_medium=insights_woc&utm_campaign=woc_25_2024)）\n\
  \n### 行动步骤\n\n请按照以下步骤分析`获利中的供应量百分比`指标，以评估持有者当前的盈利状况，并识别潜在的吸筹区或派发区。\n\n1.  **分析`获利中的供应量百分比`指标**\n\
  \n    访问 [`Glassnode.com`](https://Glassnode.com)（或同类网站）查看并使用*获利中的供应量百分比*这一链上指标。\n\
  \    1.  检查`获利中的供应量百分比`，看看该资产是处于绿色区域（盈利占比低）、红色区域（盈利占比高），还是介于两者之间。\n\n2.  **记录笔记并以你自己的风格记录发现**\n\
  \n3.  **将发现结果与基本面评估流程的其他部分相结合**\n\n#### 结果评估\n\n如果`获利中的供应量百分比`处于绿色区域（盈利的持有者很少），可以考虑在不同时间点逐步建仓，以帮助随时间分散风险，并有可能获得更低的平均入场价格。当`获利中的供应量百分比`进入红色区域（盈利的持有者很多）时，同样适用，因此请考虑在不同时间点逐步卖出你的持仓并锁定利润。\n\
  \n## 活跃地址数\n\n**评估目标：** 评估`活跃地址数`指标，以判断市场是否进入牛市阶段、熊市阶段或盘整期，并识别潜在的趋势反转或长期机会。\n\n\
  *活跃地址数*这一链上指标可描述为数字资产网络中活跃的唯一地址数量，这些地址可以是发送方或接收方。只有成功交易中涉及的活跃地址才会被计入此链上指标。活跃地址的增加表明网络用户增加，这对网络和投资者来说都是非常积极的信号。相反，活跃地址的减少或突然下降则预示着熊市的开始。图\
  \ 9-27 展示了*比特币：活跃地址数量（使用 30 日移动平均线）*。它将 X 轴上的比特币活跃地址数与 Y 轴上的每 BTC 价格进行比较。从 2015\
  \ 年到 2018 年，活跃地址数稳步增长，这与比特币价格上涨相关。然而，在 2018 年初，活跃地址数的急剧下降恰逢比特币价格的快速下跌和长达一年熊市的开始。2021\
  \ 年年中类似的下降与 5 月至 7 月的回调相对应，尽管价格后来在 2021 年 11 月创下历史新高——这表明活跃地址信号可以标记阶段性趋势变化，但并非决定性的周期定时器。\n\
  \n通过观察每个牛市开始时的活跃地址数量，可以看出强劲的网络增长。例如，如果新牛市开始时的活跃地址数量多于上一个牛市，这表明随着时间的推移，人们对这项资产的兴趣在增长。相反，如果活跃地址数量减少，则可能表明兴趣下降。图\
  \ 9-27 表明，自比特币创世区块以来，网络上的活跃地址数量总体呈逐步增长趋势，这对投资者来说非常积极。然而，从 2024 年初开始，比特币的活跃地址数量有所下降，而每币价格却从大约\
  \ 40,000 美元上涨到了 65,000 美元。这很好地说明了仅使用单一指标是不够的，而应该使用多个链上指标（如本章所述），才能更准确地了解资产和市场的整体情况。\n\
  \n![此图为面积图，显示了从 2016 年到 2024 年期间比特币活跃地址的数量（30 日移动平均线）。图表中用橙色阴影区域表示活跃地址数，黑色线表示以美元计价的比特币价格。左侧垂直轴显示活跃地址数量，范围从\
  \ 0 到 120 万；右侧垂直轴显示比特币价格，范围从 100 美元到 80,000 美元。该图表展示了指定时期内活跃地址数和比特币价格的趋势和波动。数据来源为\
  \ Glassnode。](img/648696_1_En_9_Fig27_HTML.jpg)\n\n图 9-27\n\n比特币：活跃地址数量（数据来源：[`https://studio.glassnode.com/metrics?a=BTC&category=&chartStyle=line&m=addresses.ActiveCount`](https://studio.glassnode.com/metrics?a=BTC&category=&chartStyle=line&m=addresses.ActiveCount)）\n\
  \n\n\n### 行动步骤\n\n虽然`活跃地址`链上指标主要适用于`BTC`和`ETH`等主流币种，但这些顶级资产主导着市场，使得该分析成为识别其他数字资产机会时的实用粗略指南。\n\
  \n请遵循以下步骤评估`活跃地址`指标，以判断市场是进入牛市、熊市还是盘整期，并识别潜在的趋势反转或长期机会。\n\n1.  **追踪活跃地址趋势**\n\n\
  \    访问 `Glassnode.com`（或同类平台）查看`BTC`的链上指标`活跃地址`。\n    1.  活跃地址数量是否与每枚币的价格相关？\n\
  \    2.  观察活跃地址在牛市和熊市中如何变化，以发现潜在的趋势反转。\n    3.  在每个牛市周期的开始，活跃地址是增多还是减少？\n\n2.  **记录笔记，并以你自己的风格记录发现**\n\
  \n3.  **将这些发现与基本面评估流程的其他部分相结合**\n\n#### 结果评估\n\n活跃地址的增加标志着网络增长，而减少则表明兴趣减弱和潜在的价格下跌。如果活跃地址增加但交易量持平，则表明参与度较低。然而，如果两者都上升，则确认了强劲的网络活动。在牛市中，地址增加与价格上涨一致；在熊市中，稳定的地址表明用户基础具有韧性，暗示可能存在长期机会。\n\
  \n"
- "# 余额超过 1 万枚比特币的地址数量\n\n**评估目标：** 评估持有超过 `1 万枚 BTC` 的`BTC`地址数量，以帮助衡量囤积和派发的区域。\n\n\
