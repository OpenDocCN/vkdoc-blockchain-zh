  \ Chain、Ethereum Mainnet、Fantom Opera、Gnosis、Harmony、Metis、Optimism、Polygon Mainnet\
  \ 和 Scroll。可以看到认领项目、验证团队和分享的选项。](img/648696_1_En_6_Fig8_HTML.jpg)\n\n**图 6-8**\n\
  Aave（DeFi 项目）显示其所在的所有可用链（生态系统）（数据来源：[`https://alphagrowth.io/aave`](https://alphagrowth.io/aave)）\n\
  \n### 行动步骤\n\n请遵循以下步骤评估第 0 层、第 1 层、第 2 层或第 3 层区块链项目以及构建在这些区块链之上的任何 dApp 的价值和潜力。\n\
  \n1.  **识别待评估的 L0、L1、L2 或 L3 生态系统**\n\n2.  **按照“**区块链第层‘生态系统’评估**”部分所述的方式评估该生态系统**\n\
  \n3.  **记笔记并以您自己的风格记录发现**\n\n4.  **将发现结果与基本面评估过程的其他部分相结合**\n\n\n\n#### 结果评估\n\n\
  如果评估结果表明生态系统状况不佳，建议记录你的发现，并稍后再次进行分析，以判断是否有进展的迹象。项目可能处于初创阶段，需要时间才能获得发展动力。无论如何，投资一个只有不到一百个项目的微型生态系统风险很高，除非它在基本面全面分析的每个其他方面都表现出色。\n\
  \n## 区块链三元悖论\n\n由以太坊创始人[维塔利克·布特林](https://en.wikipedia.org/wiki/Vitalik_Buterin)提出的*区块链*\
  \ *三元悖论*指出，定义区块链的三个关键要素——*去中心化*、*安全性*和*可扩展性*——无法完美共存。开发者们不断优化协议以平衡去中心化、安全性和可扩展性，但目前总需要做出一些权衡；随着区块链用户群的扩大，这三个要素中必然会有一个受到影响。在大多数情况下，如果一个区块链高度安全且可扩展性强，则去中心化会受到影响；或者如果一个区块链是去中心化且安全的，则可扩展性会受到影响。这是区块链技术最难以克服的挑战之一，并直接影响最终用户。关键挑战在于同时实现可扩展性、安全性和去中心化。\n\
  \n以太坊区块链就是一个例子。虽然以太坊高度安全且近乎完全去中心化，但它面临着严重的可扩展性问题。解决区块链三元悖论的战斗仍在继续。诸如卷叠、分片和模块化设计等持续的研究不断在削弱这个三元悖论，尽管完全解决它仍是未知数。[波卡网络](https://polkadot.network/)的中继链和平行链设计提高了可扩展性和互操作性，但这本身也伴随着去中心化方面的权衡——因此，三元悖论只是得到缓解，并未完全解决。\n\
  \n![一个说明区块链三元悖论的三角形示意图。顶部顶点标注为“去中心化”，文本为“任何人均可无门槛加入网络”。左下角顶点标注为“可扩展性”，文本为“高性能、高效且灵活的能力”。右下角顶点标注为“安全性”，文本为“一致性、弹性”。](img/648696_1_En_6_Fig9_HTML.jpg)\n\
  \n图 6-9\n\n区块链三元悖论\n\n在投资基于区块链的项目之前，了解其在可扩展性、安全性和去中心化方面的局限性与挑战至关重要。这些方面会显著影响项目的盈利能力、可用性和整体性能。以下各节将讨论区块链三元悖论的三个特征——去中心化、可扩展性和安全性——并强调在投资前需要考察的潜在风险和关键点。\n\
  \n### 去中心化\n\n**评估目标：确定项目是否存在可能损害其性能、安全性以及长期成功或可持续性的中心化特征。**\n\n本节涵盖中心化系统、去中心化系统和分布式账本技术。投资者需要了解这项技术的基础知识，因为它是区块链技术的支柱。将讨论实施特定中心化流程的项目所面临的长期风险。至关重要的是，这些中心化流程，如在线存储、治理结构和矿池，不能危及所提供产品或服务的长期安全性和性能。还将讨论影响去中心化的其他中心化因素，为投资者提供有价值的见解，以评估投资前的潜在痛点。\n\
  \n当一家新公司决定选择去中心化还是中心化网络时，没有绝对的正确或错误答案。这完全取决于业务类型、规格和运营要求。加密项目主要是去中心化的；然而，去中心化的程度因项目而异。许多项目在治理方面具有很强的中心化特征，这决定了区块链的整个运营和方向。这意味着一个中心化机构决定诸如质押、归属、代币分配、费用、挖矿奖励以及通胀和通缩率等要素。\n\
  \n去中心化最大的好处之一是它创造了透明度，并将投票权等真正的权力交还给社区。然而，当项目的部分环节是中心化的，这就违背了初衷。如果你正在投资去中心化的数字资产，务必仔细审视它们的去中心化程度。检查是否任何中心化方面可能影响项目的安全性、性能或长期成功。\n\
  \n表 6-2 详细说明了中心化、去中心化和分布式系统的结构。为简单起见，首先探讨中心化系统，然后是去中心化和分布式系统，包括去中心化分布式账本技术。\n\n\
  表 6-2\n\n中心化、去中心化和分布式通信系统\n\n| 中心化、去中心化和分布式通信系统 |\n| --- |\n| 中心化 | 去中心化 | 分布式 |\n\
  | --- | --- | --- |\n| ![网络流程图，显示一个中心主节点或服务器连接到多个计算机节点。中心节点用灰色表示，线条延伸到周围节点，形成星形结构。红色箭头将中心节点标注为“中心主节点服务器”，周围节点标注为“计算机节点”。](img/648696_1_En_6_Figa_HTML.jpg)\
  \ | ![网络结构图，显示两个主节点，分别标注为“中心主节点服务器”和“计算机节点”。每个主节点连接到几个较小的节点，形成星形模式。红色箭头指示节点间的数据流向，突出显示了网络中的层级关系和数据交换。](img/648696_1_En_6_Figb_HTML.jpg)\
  \ | ![网络拓扑图，节点间相互连接。每个节点用一个圆形表示，节点间的连线形成几何图案。两个节点由红色箭头指向标注“计算机节点”的文本，表明它们在网络中的角色。](img/648696_1_En_6_Figc_HTML.jpg)\
  \ |\n| **优点** | **优点** | **优点** |\n| • 简单、快速部署• 维护成本低廉• 一致性• 专用资源• 快速更新• 出色的用户界面/用户体验\
  \ | • 更高的灵活性/可扩展性• 更快的性能• 增强的隐私性• 高可用性• 自治/自我治理• 促进个人自由• 减少权力不对称 | • 极高的容错性• 速度和可扩展性•\
  \ 增强的透明度• 更高的可靠性与可用性• 改进的性能 |\n| **缺点** | **缺点** | **缺点** |\n| • 宕机风险增加• 高度依赖网络连接•\
  \ 安全风险较高• 可扩展性有限• 数据备份可能性较小 | • 维护成本高• 协调问题• 主服务器全部崩溃时宕机风险增加• 安全风险较高• 可扩展性有限 | •\
  \ 维护成本高• 协调问题• 有时难以达成共识 |\n\n\n\n#### 中心化系统\n\n中心化网络是当今最常用的系统类型。这是一种网络配置，参与者需要通过单一的中央权威机构才能相互通信。中央权威机构负责处理、存储和操作用户数据；访问通常需要基于权限，并仅限于获得批准的参与方，而非对网络上的所有人开放。如表\
  \ 6-2 所示，这个中央权威机构被称为“`中央主节点`”或“服务器”。连接到主节点的是若干标准节点（计算机），通常被称为“`客户端节点`”。客户端节点连接到主服务器，可以提交数据请求，而非直接执行这些请求。\n\
  \n在中心化网络中，只有已知且经过识别的参与方才能在此网络上进行交易。因此，来自客户端节点的所有交易或请求都可以被审计。一次简单的审计就能识别出网络中任何行为恶意的坏角色。在治理方面，整个网络由所有者或中央权威机构治理和控制。网络参与者对于网络的结构性变更或发展方向几乎没有权利或影响力。所有用户权限都由中央治理机构控制，并且通常受到限制。\n\
  \n重要的是要注意，在中心化系统中，所有网络参与者（客户端）无法在没有中心服务器（也称为“`主节点`”）的帮助下直接相互通信。如果中心节点发生故障，那么系统就会崩溃，并可能导致严重问题，例如安全漏洞和系统停机——这被称为“单点故障”。这种单点故障对黑客很有吸引力，一旦被攻破，数据很容易被网络中的恶意行为者利用。\n\
  \n中心化系统的一个例子是 `Dropbox`，其中每个用户都通过一个中央主节点进行通信和连接。假设鲍勃想通过 Dropbox 与爱丽丝分享一份文档。他首先会通过共享一个\
  \ Dropbox 链接（或等效方法）邀请爱丽丝查看该文档。当爱丽丝点击链接时，她会连接到 Dropbox 的主服务器（主节点），鲍勃已将文档存储并保存在那里。中心化系统是组织中最常见的一种系统类型，其中客户端向公司服务器发送请求并接收响应。其他类型的中心化系统包括传统银行、中心化数据库、AWS、YouTube、Reddit、IBM\
  \ 和 Wikipedia。\n\n#### 去中心化系统\n\n根据《韦氏词典》，“`去中心化`”可以定义为这样一个过程：组织的活动，特别是那些涉及规划和决策的活动，从中央权威地点或团体分散或委派出去。去中心化系统的一个重要因素是，在治理公投中，每个网络节点都拥有投票权。此外，不存在单一的实体或“`主节点`”来接收和响应请求。如表\
  \ 6-2 所示，在去中心化网络中至少有两个主节点。这些主节点可以相互通信，从而使网络上的所有节点（也称为对等点）能够彼此通信。大多数去中心化网络采用点对点（P2P）架构——节点之间直接对话，无需单一主节点——但一些项目采用联合或混合模型，这些模型仍然将控制权从单一中央实体分散出去。\n\
  \n以传统的云存储系统为例。在中心化系统中，当个人将数据上传并保存到“云端”时，数据会被发送并保存在一个称为数据中心的服务器场中。数据中心包含数千台存储我们信息的服务器和硬盘驱动器。不幸的是，这种系统存在许多缺陷。拥有这些云存储系统的组织完全控制着客户数据（或资产），有时这些数据会被利用来牟利。此外，数据中心是一个单点故障，这意味着如果该数据中心发生任何事情，例如破坏性火灾、病毒、网络攻击，或者互联网因某种原因停止工作，那么客户数据将处于严重危险之中。\n\
  \n去中心化解决了中心化系统中常见的问题。去中心化一个强大的核心要素是信息分布在众多节点上——通常是通过区块链系统中的分布式账本，尽管其他去中心化设计可能使用联合存储或八卦协议。这意味着去中心化系统不像中心化系统那样依赖于单一主节点或单点故障。因此，去中心化是一种网络冗余，确保没有更少的实体能够控制网络。这是去中心化的关键因素和优势之一。如果一个坏角色试图破坏一个节点，该尝试会被网络的其他部分拒绝，除非攻击者控制了其共识资源的多数——例如，在“`工作量证明`”链中超过总哈希算力的\
  \ 51%，或在“`权益证明`”网络中持有超级多数的质押代币——这些条件在经济和技术上都难以实现。\n\n通过链上治理，去中心化允许网络参与者——网络节点和代币持有者——在链上公投中投票，这有助于引导和控制区块链的运作。去中心化是公共开源区块链网络的一个基本属性，在这些网络中，参与者无需授权即可读取、写入数据并为共识做出贡献。\n\
  \n去中心化的区块链还提供了验证交易和智能合约的能力，而无需信任权威机构（例如银行）。它创造了抗审查性，因为没有中央权威机构可以治理和决定你的数字财产的命运。这也是近来人们将大量关注点从中心化系统转向去中心化系统的主要原因之一。例如，通过去中心化金融，人们拥有治理和控制自己资产的权利和许可，而无需任何中心化实体的干预——这被称为“`自主权`”，即自我治理个人资产的权利。此外，与中心化系统不同，去中心化提供了透明、高效、节约成本、建立可信生态系统，以及在某些情况下的隐私和匿名性等优势和特性。\n\
  \n\n\n#### 中心化与去中心化系统\n\n关于中心化与去中心化系统的争论一直存在。在决定采用中心化还是去中心化网络进行业务运营时，用户需求对企业起着重要作用，有些企业甚至选择混合模式。在某些情况下，使用去中心化网络可能不合时宜，或者无法满足中心管理机构所要求的规格。然而，尽管目前存在可扩展性和能耗问题，但去中心化系统每天都在进步，并且相对于传统的中心化系统具有显著优势。表\
  \ 6-3 重点列出了中心化与去中心化网络的优缺点。\n\n**表 6-3** 中心化与去中心化系统对比\n\n| 传统中心化系统与公共去中心化区块链对比 |\n\
  | --- |\n| 特性 | 中心化系统 | 去中心化系统 |\n| --- | --- | --- |\n| 所有权 | 服务提供商 | 所有用户 |\n\
  | 架构 | 客户端/服务器 | 去中心化分布式技术 |\n| 安全性 | 设计良好时可高度安全，但依赖单一管理域 | 减少单点故障，但引入新的攻击面和协调风险\
  \ |\n| 高可用性 | 是（通过冗余、负载均衡和故障转移机制） | 是 |\n| 容错性 | 是（通过冗余服务器、备份和自动故障转移实现） | 是 |\n\
  | 抗合谋性 | 基础，因其受控于一个群体甚至单个个体 | 高度抵抗，共识算法可确保防御对手 |\n| 应用架构 | 单一应用 | 应用复制到网络中的所有节点\
  \ |\n| 信任 | 消费者必须信任服务提供商 | 无需相互信任 |\n| 消费者成本 | 通常较高（服务商费用或订阅费） | 通常较低，但可能因网络费用（如\
  \ Gas 费）而飙升；成本因用例而异 |\n| 匿名性 | 通常有限（通常需要身份证明或 KYC；少数服务提供部分伪匿名） | 取决于协议；大多数是伪匿名而非完全匿名\
  \ |\n| 隐私性 | 否 | 是（但在大多数情况下，不包括交易数据） |\n| 透明性 | 否 | 是 |\n| 治理/投票权 | 否 | 是 |\n| 延迟\
  \ | 低延迟，直接通信最小化延迟 | 由于分布式共识，延迟较高 |\n| 能耗 | 低能耗 | 较高，尤其是在工作量证明（PoW）系统中 |\n\n####\
  \ 分布式账本技术\n\n分布式账本技术（DLT）是一种技术基础设施，允许在由互连节点（计算机）组成的网络数据库中同时进行访问、验证、记录和更新。可以将其视为一种去中心化的记录保存系统，其中多个分散的参与方（节点）共同协作，执行特定任务并维护一个共享数据库，即账本。当提出数据变更时，网络首先达成共识；一旦达成一致，新信息将被提交并在所有节点之间复制，确保账本的每个副本保持一致。\n\
  \n在分布式账本网络中，数据在对等节点之间共享，以完成特定任务，例如保护数据、达成共识、增强处理能力或带宽，或者建立一个无中心管理机构的全球结构。DLT 的概念已在多个行业中使用数十年，例如医疗保健领域用于存储医疗记录，供应链管理领域用于跟踪货物并为客户提供透明度，以及金融系统中的跨境支付、贸易融资以及简化清算和结算等流程。\n\
  \n在分布式系统中，网络节点和计算资源通常在地理上是分散的。这使得网络中的每个节点都能平等地处理和访问数据。在决策过程中，节点根据系统规则参与共识——例如，一些网络赋予每个节点一票，而其他网络则根据权益、声誉或指定角色来分配投票权重。DLT\
  \ 的主要优势之一是其高度容错性，这意味着即使一个或多个组件发生故障，系统仍能无中断地继续运行。这使得 DLT 非常安全可靠。\n\n![比较中心化账本和分布式账本的示意图。左侧的中心化账本显示三台计算机连接到一个由建筑物表示的中心管理机构，箭头表示数据流入和流出该管理机构。右侧的分布式账本显示多台计算机通过网络箭头直接互连，表示在没有中心管理机构的情况下的点对点数据交换。](img/648696_1_En_6_Fig10_HTML.jpg)\n\
  \n**图 6-10** 中心化账本与分布式账本对比（图片来源：[`imiblockchain.com/blockchain-vs-distributed-ledger-technology/`](https://imiblockchain.com/blockchain-vs-distributed-ledger-technology/)）\n\
  \n需要重点指出的是，与中心化系统不同，分布式账本是去中心化的，这意味着它没有单一故障点（主节点）——请参阅图 6-10。这大大降低了系统故障和攻击的风险，因为数据分布并在网络节点之间共享，而非由中心管理机构存储和控制。\n\
  \n\n\n### 区块链与分布式账本技术（DLT）\n\n区块链技术与分布式账本技术（DLT）相互关联但又有所不同。DLT 是一个总称，指代任何依赖共享数据库，在共享网络（根据用例，可以是公开/开放网络，也可以是许可/私有网络）中处理、记录和验证交易的系统。DLT\
  \ 有多种形式，而区块链采用的是一种特定类型的 DLT 实现方式，其中数据以“区块”为单位线性组织。每个区块都带有一个时间戳，以及指向前一个区块的链接，从而形成一条由区块组成的链条——这便是“区块链”名称的由来。\n\
  \n> **事实**  \n> 另一种类型的 DLT 是[有向无环图](https://www.sciencedirect.com/science/article/pii/S0895435621002407)（DAG），这是一种使用拓扑排序的去中心化数据结构，其中每个节点都指向单一方向，且不存在循环，能够在区块链系统中实现更快的交易速度和可扩展性——例如，[Fantom](https://fantom.foundation/)区块链就采用了\
  \ DAG 技术。\n\n虽然所有区块链都是一种分布式账本，但并非所有分布式账本都是区块链。区块链在几个关键方面与 DLT 存在显著区别。\n\n**表 6-4：区块链与\
  \ DLT 的主要区别**\n\n| 特性 | 区块链 | 分布式账本技术（DLT） |\n| --- | --- | --- |\n| **定义** | 一种\
  \ DLT 类型，数据以线性链接的区块形式存储，并使用加密哈希保证安全。 | 一种去中心化的记录保存系统，由多个节点协同工作，执行特定任务并维护一个共享数据库。\
  \ |\n| **结构** | 组织成线性链接的区块链条，每个区块包含交易数据。 | 可以组织成多种结构，例如基于区块的链、DAG（有向无环图）或其他配置。 |\n\
  | **不可篡改性** | 高度不可篡改；数据一旦写入区块，几乎无法更改。 | 因系统而异：某些 DLT 可能允许在特定条件下进行更改或修改。 |\n| **透明度**\
  \ | 通常是公开且透明的。 | 可以是公开、私有或需许可的，具有不同程度的透明度。 |\n| **效率** | 常因可扩展性问题而效率较低。 | 可能效率更高，尤其是在许可或私有环境中。\
  \ |\n| **用例** | 常用于加密货币、智能合约和公共账本。 | 应用广泛，包括供应链管理、医疗保健、金融等领域。 |\n| **可扩展性** | 通常存在可扩展性问题，尤其在使用基于工作量证明（PoW）的共识机制时。\
  \ | 一般来说更具可扩展性，因为不同的 DLT 可以针对性能和效率进行优化。 |\n| **安全性** | 由于密码学技术和去中心化特性，安全性很高。 | 安全性各异；虽然去中心化提供了稳健性，但某些\
  \ DLT 可能更注重速度而非安全性。 |\n| **灵活性** | 灵活性较低；它遵循严格的区块链条结构，可能限制其适应性。 | 灵活性更高，可以采用不同的结构和协议来满足特定的客户需求。\
  \ |\n\n最常用的采用 DLT 的区块链是比特币。比特币利用了*去中心化的公共分布式账本技术*，比特币网络中的节点通过共享账本达成共识、记录、共享、追踪和同步交易。为了使比特币节点在其分布式账本上达成共识，各节点之间需要达成一致，并根据协议设计，定义应包含在共享数据库中的交易数据。在比特币中，每笔交易被打包进一个区块，区块头包含一个加密哈希，用以链接到前一个区块——从而形成一个不可篡改的记录链条。\n\
  \n### 真正的去中心化\n\n区块链技术可以存在于不同程度去中心化的环境中。通常，加密项目被归类为去中心化。然而，在现实中，每个项目都存在各种中心化因素。项目方常常集成中心化流程以协助运营或满足其他定制需求，而这些需求在以去中心化方式实现时并不可行或难以完成。因此，尽管加密项目底层的节点结构是去中心化的，但大多数项目并非完全去中心化。\n\
  \n尽管付出了真诚的努力，但要实现真正的去中心化仍极其困难。以[Coinbase](https://www.coinbase.com/)为例，其稳定币 USDC\
  \ 本质上是中心化金融（CeFi），因为它与美元一比一挂钩，并由 Circle（一家受美国监管的单一企业发行商）发行和管理。此外，Coinbase 由一家名为[Coinbase\
  \ Global, Inc](https://www.sec.gov/Archives/edgar/data/1679788/000162828021003168/coinbaseglobalincs-1.htm)的中心化实体拥有和支持。许多加密货币项目都有中心化的开发团队来编写和维护代码，而不是公开允许任何人参与项目代码和方向的贡献。治理结构也常常是中心化的，诸如升级或协议变更等关键决策由项目内的一小部分人做出，而非通过透明的投票流程让更广泛的社区参与。\n\
  \n日益增加的*中心化层级*会影响去中心化区块链的安全性。它威胁到去中心化区块链的无需许可的特性，并为主流采用设置障碍。区块链技术的核心基础价值在于其“无需信任”，这意味着你无需信任第三方：银行、个人或任何可能在你与数字资产交易或持有之间起中间作用的中介。当引入各种中心化层级时，这种“无需信任”的因素就会被削弱，导致区块链用户在使用产品或服务时必须“信任”个人或中心化权威机构（例如，中心化软件、服务器和运营团队）。这会产生单点故障和针对性的恶意行为，从而抵消区块链技术所具有的全部价值和有益特性。在一个“去中心化”的加密项目中引入的每一个中心化层级，都会增加遭受攻击、被利用和发生故障的可能性。\n\
  \n> **事实**  \n> 去中心化程度极高的加密项目几乎不可能被监管，因为没有可以强制或制裁的特定个人或机构。这意味着中央机构无法将其关闭，例如比特币。\n\
  \n### 影响去中心化的中心化因素\n\n投资者在调查某个加密项目的中心化程度是否已经或将损害其性能和长期成功方面，扮演着重要角色。可以注意到，大多数项目都带有一定程度的中心化特征，但依然运营良好。然而，那些依赖许多中心化流程的项目会使投资者面临单点技术故障、内部人员对资金的控制以及突发监管干预的可能性，因此你的投资受损的可能性要高得多。\n\
  \n\n\n### 影响真正去中心化的因素\n\n1.  **代币分配/共识权力**\n\n    如果少数个人或机构持有代币供应量的绝大部分，项目将面临安全风险。如果大部分代币供应集中在少数代币持有者手中，他们就有能力通过治理投票轻易操纵重大决策。这对于采用权益证明（PoS）共识机制的项目来说是一个重大威胁。项目的原生代币必须在持有者之间均匀分布，以均衡分配共识权力。请注意，某些\
  \ PoS 链——例如卡尔达诺（Cardano）的 `Ouroboros` 协议——内置了诸如随机领导者选举和权益委托等保障措施，以限制大利益相关者的影响力。\n\
  \n2.  **挖矿算力分布**\n\n    挖矿节点分布指的是挖矿算力（哈希率）和交易验证在区块链网络不同参与者之间的分布情况。节点在验证交易和维护网络安全方面扮演着关键角色。一个分布良好、全球化的挖矿算力和节点网络能提升去中心化程度，显著降低单一实体控制网络的可能性，从而减少**51%\
  \ 攻击**的几率——更多细节见“51% 攻击”部分。\n\n3.  **治理结构**\n\n    治理是在组织、系统或网络内制定并实施决策的过程。主要有三种类型的治理结构：中心化、去中心化以及混合模式（兼具中心化和去中心化特征）。区块链治理将在“治理”部分进行探讨。\n\
  \n    1.  **中心化治理模式** – 在中心化治理结构中，决策权集中在项目团队或一小部分利益相关者手中。这个小群体做出所有决策、制定政策并执行规则。通常，任何变更都必须通过人工方式在链上实施，这需要开发者投入大量人力。\n\
  \n    2.  **去中心化治理模式** – 去中心化的“链上”治理模式将决策权分散到更广泛的参与群体中，将投票权交还给网络中的节点和利益相关者。这些决策通常在链上自动执行（取决于区块链的特性和功能）。该模式提倡一个公平、透明、民主的投票系统，任何单一实体都无法控制。比特币就是去中心化治理模式的一个例子。\n\
  \n    3.  **混合治理模式** – 大多数混合型“链下”治理模式由中心化和去中心化元素组成，社区和利益相关者可以进行投票。投票由项目团队收集、统计，并公开发布结果。尽管这种模式将权力交还给社区和利益相关者，但它严重缺乏透明度，因为投票无法在链上被公开追踪，除了信任项目团队的诚实之外别无选择。\n\
  \n4.  **基础设施、存储与运营**\n\n    区块链基础设施流程是帮助构建、支持和维护去中心化生态系统发展的基础要素，使其对最终用户可用。这些流程包括原生和第三方钱包、去中心化存储以及去中心化交易所（DEX），允许用户无需中介即可买卖数字资产。这消除了对中心化应用和服务的依赖。尽管具有挑战性，但一个真正去中心化的基础设施不应依赖中心化服务和应用，因为这会增加中心化风险，尤其是在这些风险叠加时。\n\
  \n    许多加密项目采用的一个更关键的中心化方面是中心化云存储。使用传统的中心化云存储系统存在风险，因为对中心化服务器（单一故障点）的依赖使其成为网络攻击的主要目标。一次黑客攻击可能导致网络分布问题、隐私泄露、数据丢失、社区信任丧失以及对个人投资造成破坏性影响。\n\
  \n    1.  **存储** – 类似区块链交易历史的数据应使用去中心化解决方案进行存储，以确保真正的去中心化。例如，应使用 [Akash Network](https://akash.network/)\
  \ 和 [IPFS](https://ipfs.io/)（星际文件系统）等去中心化服务，而不是 [亚马逊云服务](https://aws.amazon.com/)（AWS）等中心化服务。\n\
  \n    2.  **网站前端** – 网站的前端通常托管在中心化服务器上。开发者可以利用 Akash Network 和 IPFS 等去中心化服务来托管其网站前端数据。\n\
  \n    3.  **中心化交易所** – 中心化交易所面临被关闭或黑客攻击的风险。然而，避免使用 CEX（中心化交易所）是一个棘手的障碍，因为它们对资产的可见性和可访问性有重大影响。不过，对于加密资产的长期存储，强烈建议投资者将其资产存放在冷存储设备上，例如\
  \ [Trezor](https://trezor.io/) 或 [Ledger](https://www.ledger.com/)。\n\n5.  **开发者与支持者**\n\
  \n    由少数个人、开发者和机构集中负责开发与运营，可能会损害项目的性能、安全性和长期存续能力。这一点之所以重要，原因如下。\n\n    1.  ***存续能力***\
  \ – 如果核心团队（包括各团队成员、开发者、支持者）发生任何不测，项目将消亡、破产或以多种其他方式受到严重影响。参与加密货币项目的无关联的个人、开发者和机构越多，其去中心化程度就越高，从而减少不必要的风险。\n\
  \n    2.  ***安全性*** – 当项目由少数个人、开发者和机构运营时，更容易遭到黑客攻击或被内外部恶意行为者攻破。\n\n### 分层基础设施对去中心化的影响\n\
  \n区块链项目或 dApp 的去中心化程度，通常直接受到其所依赖的分层基础设施去中心化程度的影响。以 [Centrifuge](https://centrifuge.io/)\
  \ 为例，它建立在 [波卡网络](https://polkadot.network/) 之上。波卡正引领着最去中心化的零层协议的发展，因此 Centrifuge\
  \ 天然受益于这些去中心化特性。尽管 Centrifuge 仍然有能力控制和定制其自身的去中心化方面，但分析其底层的基础设施层是理解其去中心化潜力的一个坚实起点。\n\
  \n\n\n### 行动步骤\n\n在投资加密项目时，建议评估该项目的去中心化程度。完成此项任务有助于投资者识别出那些可能增加攻击风险，或损害项目长期生命力、成功性以及你投资回报的中心化环节。请记住，一个项目完全去中心化是极具挑战性的；然而，它越接近完全去中心化，就越能免受任何中心化攻击、操纵或故障的影响。\n\
  \n请遵循以下步骤来判断一个项目是否表现出可能损害其性能、安全性、长期成功或可持续性的中心化特征。更多详情请参阅“影响去中心化的中心化因素”部分。\n\n以下评估步骤的大部分（若非全部）答案通常可在白皮书、项目官网及官方博客文章中找到。如果存在任何未知信息，请通过公司的官方联系渠道和经过验证的社交媒体渠道联系项目团队和社区。\n\
  \n1.  **代币分配/共识权力**\n    1.  确定代币供应是否在资产持有者之间均匀分布。如果大部分供应集中在少数个人、机构和/或团队成员手中，这是一个危险信号。\n\
  \        1.  查阅白皮书以获取代币供应分配信息。在这里，你将找到团队、投资者和社区的分配比例（关于代币供应的更多内容见“代币经济学与设计”章节）。\n\
  \    2.  使用适用的区块浏览器（例如 [`Etherscan`](https://etherscan.io/) 或 [`BscScan`](https://bscscan.com/)）来验证持有大量代币供应的钱包。\n\
  \n此外，在 [`Google.com`](https://Google.com/) 上快速搜索也可以。例如，只需在 Google 中输入“Moonbeam largest\
  \ wallets”，即可搜索 Moonbeam 网络的前几大钱包持有者。第一个链接会将你带到显示 Moonbeam 顶级持有者的页面。处理前请始终验证 URL。\n\
  \n![一张表格，展示了 Moonbeam 区块链上按 GLMR 余额排名的顶级账户。包含地址、名称标签、GLMR 余额、占总供应百分比和交易次数等列。排名第一的账户持有\
  \ 162,744,607.41 GLMR，占总量的 17.49%，有 153 笔交易。其他账户包括 Binance 1 和 Bybit: Hot Wallet，余额和交易次数各有不同。该表格提供了页面数据下载选项。](img/648696_1_En_6_Fig11_HTML.jpg)\n\
  \n图 6-11\n\n按 GLMR 余额排名的顶级账户（数据来源于 [`https://moonscan.io/accounts`](https://moonscan.io/accounts)）\n\
  \n2.  **挖矿算力分布**\n\n如果没有公开的挖矿分布图，请直接联系项目团队获取数据。请注意，这些信息有时难以找到，这取决于网络，尤其是当它不是一个热门网络时。更详细的评估请参阅“51%\
  \ 攻击”部分。\n\n3.  **基础设施、存储与运营**\n    1.  审查项目官网、白皮书、官方博客文章和 dApp，以识别其基础设施、存储或运营中是否存在任何中心化组件（如果有的话）。\n\
  \    2.  如果项目团队使用中心化存储，而非诸如 [Akash Network](https://akash.network/) 和 [IPFS](https://ipfs.io/)（星际文件系统）等去中心化存储应用，则需极度谨慎。\n\
  \n4.  **治理结构**\n    1.  审查项目白皮书和其他技术文档，以确定团队是否实施了中心化、去中心化或混合治理模式。区块链治理将在“治理”部分进行更详细的探讨和评估。\n\
  \n5.  **开发者与支持者**\n    1.  是否有许多无关联的个人、开发者和机构参与该项目？你可以通过多种方式进行检查：\n        1.  查看公司网站，获取所有支持者和投资者的名单。\n\
  \        2.  前往 [`GitHub`](https://github.com/)，检查开发者数量以及项目是否开源。更多信息见第 10 章“项目团队”。\n\
  \        3.  在 [`LinkedIn`](https://www.linkedin.com/) 上查看公司页面，以了解所有内部参与该项目的人员。\n\
  \n6.  **做好笔记，用自己的风格记录发现**\n\n7.  **将发现结果与基本面评估流程的其他部分相结合**\n\n#### 结果评估\n\n项目团队在主要产品或服务中使用的中心化流程越少，通常实现的去中心化程度就越高。使用中心化流程并不一定是危险信号，但主要或完全使用去中心化软件流程的项目往往具有更高的安全性和对投资者的吸引力。\n\
  \n\n## 可扩展性\n\n**评估目标：** 判断区块链项目是否具备强大的可扩展性，这将直接影响在其上构建的任何去中心化应用（dApps）的可扩展性。\n\n\
  近年来，区块链经历了极高的人气和增长。然而，这是有代价的，一个关键的设计问题已经显现：它们在负载增加时无法扩展。在撰写本文时，可扩展性被认为是区块链基础设施的瓶颈。任何曾在链上发送过数字资产的人，都可能经历过由于网络拥塞而导致的极其缓慢的交易处理速度、高昂的燃料费和糟糕的用户体验——这是区块链可扩展性受限的典型症状。但区块链可扩展性究竟意味着什么？\n\
  \n区块链可扩展性指的是区块链在负载增加的情况下进行扩展并维持用户效率的能力。更进一步说，区块链可扩展性定义了一种能力：在支持高交易吞吐量的同时，能够持续增长以容纳越来越多的区块链参与者。需要注意的是，区块链可扩展性主要通过其*吞吐率*和*延迟*来衡量。\n\
  \n**吞吐量**\n\n对于区块链技术而言，*吞吐量*是指在任何给定时间内可以处理的交易数量的平均度量。吞吐量以**每秒交易数**（TPS）衡量，也可以每分钟交易数（TPM）来衡量。它反映了区块链在特定时间框架内处理特定数量交易的能力。\n\
  \n每个区块的交易数量和区块之间的时间间隔会影响区块链的吞吐量。例如，大约每十分钟（600 秒）生成一个新的比特币区块，在此期间平均处理约 4000 笔交易。TPS\
  \ 的计算方法是用交易数量除以秒数。因此，比特币的 TPS 约为 6.67（4000/600）。许多因素会影响区块链的 TPS 速率，例如延迟、区块大小与时间、共识机制以及可扩展性解决方案。所有这些要素都将在本节中解释。\n\
  \n如前所述，TPS 表明了区块链在任何给定时间可以处理多少笔交易。当一个区块链变得流行时，用户数量会呈指数级增长。对于大多数区块链而言，当这种情况发生时，额定\
  \ TPS 将变得不足，因为等待处理的交易数量超过了区块链的最大 TPS。此时，网络变得拥塞，导致用户效率低下。其原因不仅仅是 TPS 低，另一个因素是*延迟*，它是可扩展性的一个关键要素。\n\
  \n![图示说明了一个代表网络概念的蓝色圆柱形管道。一个标有“Throughput”的箭头指向管道内部，表示数据流。另一个标有“Bandwidth”的箭头指向管道的直径，表示容量。一个双头箭头标有“Latency”跨越管道的长度，表示延迟。](img/648696_1_En_6_Fig12_HTML.jpg)\n\
  \n图 6-12\n\n吞吐量、带宽和延迟的表示（图片致谢：[`https://shardeum.org/blog/latency-throughput-blockchain/`](https://shardeum.org/blog/latency-throughput-blockchain/)）\n\
  \n**延迟**\n\n延迟——通常称为区块纳入时间——是从交易广播到首个区块确认之间的时间，而最终确定性则标志着该区块变得不可逆转。这两者可能不同；在以太坊上，纳入时间平均约为\
  \ 12 秒，而完全最终确定性则需要约 13 分钟（两个纪元）。与 TPS（本质上是任何给定时间可以处理的交易数量）不同，最终确定性包含了从交易请求开始的完整过程，包括将交易打包进区块、广播到网络节点、区块验证，以及将区块添加到区块链中。\n\
  \n虽然高吞吐率对于系统高效处理大量交易至关重要，但最终目标是实现低延迟，以确保快速的交易处理和无缝的用户体验。尽管难以实现，但在吞吐量和延迟之间取得平衡对于区块链可扩展性至关重要。许多因素会影响延迟和吞吐量，包括共识机制、带宽、网络拥塞以及自身施加的扩展限制，例如为了增强安全性而设置最大区块大小。\n\
  \n**事实**\n\n比特币的首个确认大约在 10 分钟内到达，但经济上的最终确定性通常是在六个确认（约 60 分钟）之后计算。Moonbeam 在大约 1\
  \ 分钟内达到概率最终确定性，而 Fantom 的 Lachesis 协议在 1-2 秒内完成区块的最终确定。\n\n在比特币区块链上发送资产时，可扩展性问题尤为突出。由于比特币无法扩展——至少在没有侧链或二层网络（如闪电网络）帮助的情况下无法扩展——当大量用户执行交易时，它经常会变得拥塞。这对性能产生了巨大影响，表现为交易处理时间长、交易费用增加，从而影响了用户体验。\n\
  \n**带宽**\n\n在区块链的语境中，*带宽*指的是网络在特定时间内可以传输或处理的数据量（比特/秒）。带宽至关重要，因为它限制了用户或网络节点在给定时间范围内可以执行的操作数量。例如，可以把带宽想象成一条拥有最大且有限车道数的高速公路。在区块链中，这种限制对于维持稳定的网络运行、防止过载以及确保交易安全至关重要。\n\
  \n\n\n#### 区块链可扩展性术语\n\n表 6-5 列出了与区块链可扩展性相关的主要因素和常用术语。请注意，尽管所有这些因素都至关重要，且直接影响区块链的扩展能力，但其中某些项目，如智能合约复杂性、能源消耗、成本、区块大小和网络负载，对于大多数数字资产投资者而言被认为过于繁琐。因此，它们未被纳入本书的整体基础评估策略。然而，了解这些因素及其阻碍区块链可扩展性、性能和用户效率的能力是有益的。\n\
  \n**表 6-5**\n\n区块链可扩展性术语（致谢来源：[区块链及相关问题：当前研究主题综述：管理分析杂志：第 5 卷，第 4 期 – 获取访问权限 (tandfonline.com)](https://www.tandfonline.com/doi/full/10.1080/23270012.2018.1516523%253Fscroll%253Dtop%2526needAccess%253Dtrue)）\n\
  \n| 编号 | 因素 | 描述 |\n| --- | --- | --- |\n| 1 | 交易吞吐量 | 指协议在一秒内可处理的交易总数，以每秒交易数（TPS）衡量。高交易吞吐量备受推崇，前提是不影响去中心化或安全性。\
  \ |\n| 2 | 延迟 | 指从交易广播到其首次被包含在区块中（区块包含延迟）的时间。以秒或毫秒衡量。最终性——区块变得不可逆的时间点——是一个独立的衡量指标。\
  \ |\n| 3 | 存储 | 指区块链可能消耗的总空间/容量。 |\n| 4 | 区块大小 | 理想情况下，区块大小需达到平衡——较大的区块可提升容量，但会减慢传播速度，增加孤块风险。\
  \ |\n| 5 | 智能合约 | 智能合约的复杂性可能导致处理时间的延迟。 |\n| 6 | 计算能耗 | 指算法（或使用系统）在区块挖矿过程中是否消耗大量能源。根据共识机制的类型，某些区块链在挖矿和交易验证过程中会消耗更多能源和时间。\
  \ |\n| 7 | 网络负载 | 指网络正在承载的交易数量。网络拥塞是区块链负载增加的结果。 |\n| 8 | 成本问题 | 指在区块链中验证交易相关的总成本。\
  \ |\n| 9 | 节点数量 | 指区块链网络中可用的节点总数。高网络节点数会增加去中心化程度，但根据所使用的共识机制，对达成共识时间的影响因协议而异——某些设计（例如，雪崩协议或\
  \ Algorand）即使有数千个验证器也能维持低延迟的最终性。 |\n| 10 | 共识模型 | 共识机制代表批准/验证区块链交易的过程。 |\n\n###\
  \ 共识机制\n\n共识机制可被视为区块链架构的核心，可扩展性在此蓬勃发展。它们是区块链技术的重要组成部分，并在保障区块链网络的安全性、去中心化和可扩展性方面发挥着关键作用。正如《*区块链可扩展性挑战的系统文献综述*》中所述，Khan\
  \ D 指出，有二十篇期刊论文将共识机制列为关于公共区块链可扩展性的第二个最常讨论的因素。这些巧妙设计的共识机制还与区块链的吞吐量相关，而吞吐量又与区块链的整体性能相关联。\n\
  \n#### 什么是共识机制？\n\n共识机制是一种系统协议，规定了交易如何处理、验证以及添加到区块链中。当网络参与者在区块链上发起交易时，该交易会被广播到网络节点，并与其他交易一起放置在虚拟*区块*内。利用预先定义的共识机制，这些交易区块由网络节点验证，并逐块添加到区块链中。共识机制还负责整个网络中区块链的安全性和完整性。它们有多种不同类型和形式，每一种都会影响区块链的吞吐量、整体性能和安全性。\n\
  \n两种最常见的共识机制类型是工作量证明（PoW）和权益证明（PoS）。这两种共识机制都在无需任何可信权威机构的去中心化点对点网络上运行。其他常用的共识机制包括委托权益证明（DPoS）和权威证明（PoA）。一些网络则采用基于有向无环图（DAG）的数据结构，并结合独立的共识算法（例如，雪崩协议）。\n\
  \n\n\n"
- '# 工作量证明（PoW）


  `工作量证明（PoW）`是一种在区块链网络中使用的共识算法，用于确认交易并向区块链添加新区块。*挖矿*特指矿工们互相竞争，基于特定交易集解决数学问题（谜题）的活动，而`PoW`则是概述网络上验证交易规则与流程的通用框架。其底层逻辑支撑着像`比特币`这样的去中心化系统的运行。


  **事实**


  根据 `Digiconomist` 的比特币能源消耗指数（2025 年 4 月快照），该网络每笔链上交易消耗约 600 千瓦时——大致相当于普通美国家庭 20
  天的用电量。每笔交易的实际消耗会随`哈希率`、区块占用率和矿机效率而波动。


  当网络参与者发起一笔交易时，该交易会被放入一个*内存池*（也称为*mempool*），与其他未确认交易放在一起。`内存池`存储在每个节点上，可以描述为一个虚拟等候室，未确认和待处理的交易会在此停留，直到*矿工*对其进行处理并添加到下一个区块。`内存池`的数据会被发送到比特币网络的所有节点。节点从`内存池`中选择未确认交易，并将其放入一个未确认的区块中。


  **事实**


  在比特币早期，挖矿使用普通 CPU，后来是 GPU；如今，盈利性挖矿需要使用专用集成电路（`ASIC`）矿机。然而，运行一个完整的比特币节点仍然只需要具备足够存储和带宽的现成硬件。


  通过`工作量证明（PoW）`共识机制所概述的交易验证流程，每个拥有未确认区块的节点互相竞赛，争取第一个解开数学谜题，从而“确认”并验证它们正在处理的区块是否有效。这种验证和交易记录保存的过程被称为挖矿——即“工作量证明”中的“工作”。这个使用交易数据的数学谜题极其复杂，取决于区块目标以及编码在未确认区块中的区块`随机数（nonce）`。首先解开谜题的节点提供了“工作量证明”，并赢得组装下一个区块的权利，通常会从`内存池`中选择手续费最高的交易，然后将其提交到链上。此外，首先解开谜题的矿工还会赢得奖励。就比特币而言，矿工们会获得新挖出的
  BTC 作为激励——因此被称为“挖矿”——同时也会以 BTC 的形式收取交易手续费，作为处理网络交易的报酬。这种以挖矿奖励形式的激励措施，是防止节点作恶的一种手段。


  **事实**


  随着比特币接近其 2100 万枚的硬顶（区块补贴约在 2140 年结束），矿工将主要依赖交易手续费；到 2040 年，补贴已降至每区块低于 0.2 BTC。


  一旦区块被确认，它就会被广播给所有网络参与者，由网络上的其他节点进行二次确认和进一步验证。这为区块增加了稳定性和安全性，使其更难被篡改。已确认的区块会链接（引用）到前一个“父”区块的*哈希值*，形成一条*区块链*，因此得名*区块链*。这个*哈希值*由一种名为“安全哈希算法”（*SHA-256*）的数学加密哈希算法生成，并存储在每个区块的头部。将每个区块链接到其父区块的哈希序列，形成了一条可追溯到第一个区块（即*创世区块*）的链条——区块链。


  ![流程图展示了区块链交易过程。步骤 1：发起交易请求，由一个带有比特币符号的电脑表示。步骤 2：交易被打包进一个区块。步骤 3：区块被广播到区块链网络中的节点，由多台电脑表示。步骤
  4：节点对区块进行验证和确认。步骤 5：新区块被追加到区块链上。步骤 6：交易完成，由绿色圆圈表示。箭头指示了步骤之间的流程。](img/648696_1_En_6_Fig13_HTML.jpg)


  **图 6-13** 典型的加密货币交易（致谢：[`https://link.springer.com/content/pdf/10.1007/s10586-021-03301-8.pdf`](https://link.springer.com/content/pdf/10.1007/s10586-021-03301-8.pdf)）


  **事实**


  挖矿和工作量证明（`PoW`）是相关的概念——挖矿是使用算力解决复杂数学问题并验证区块链上新交易的过程，而工作量证明（`PoW`）是要求矿工执行此工作并相互竞争以创建新区块和赚取奖励的共识机制。


  如果恶意行为者试图通过更改区块的已确认数据（例如一个月前的数据）来破坏网络，那么直到那个时间点的所有区块哈希都必须一致并随之改变。由于所需算力巨大，这种情况极不可能发生。此外，比特币区块链被认为是一条*不可篡改*的、由反向链接的区块组成的链条，用于存储交易数据。区块越深，其不可篡改性就越强。如果这种极不可能的事件真的发生，攻击者需要控制比特币网络超过
  51%的挖矿哈希率——这被称为`51%攻击`。尽管可能，但人们怀疑这种情况是否会发生。这就是区块链如此安全的原因，也是它被视为*不可篡改*的原因。


  比特币网络上的一个典型区块包含特定信息；见下表。


  **表 6-6** 典型比特币区块数据


  | 字段 | 大小 | 描述 |

  | --- | --- | --- |

  | 4 字节 | 4 字节 | 区块的大小，以字节为单位 |

  | 区块头部 | 80 字节 | 来自区块头的若干字段 |

  | 交易计数器 | 可变（1-9 字节） | 区块中的交易总数（包括*币基交易*） |

  | 交易列表 | 可变 | 区块中的交易 |


  ## 网络流量增加的因素


  基于工作量证明（`PoW`）的网络，如比特币，以拥塞而闻名。网络拥塞是由大量交易引起的，其原因多种多样，例如区块链的普及、经济新闻、市场暴跌，甚至是知名人士（例如
  [埃隆·马斯克](https://en.wikipedia.org/wiki/Elon_Musk)）在社交媒体上发布关于某个项目的帖子。这可能导致网络参与者等待很长时间才能处理他们的交易。为了加快处理速度，用户通常会向网络矿工支付更高的交易手续费，以优先处理他们的交易。




  ##### 权益证明（PoS）


  权益证明（PoS）是一种共识机制，用于验证传入交易并将其作为新区块添加到区块链上。PoS 和 PoW 都由网络参与者而非中心化机构运营，并且两者的目的和最终目标相同；然而，交易验证过程却大相径庭。


  在 PoS 系统中，矿工被称为*验证者*。验证者承诺在区块链上的智能合约中“*质押*”其代币或硬币。验证者是通过综合考虑质押数量（有时也包括质押时长），同时加入随机性或轮换委员会的方案来选出的——例如，以太坊的信标链通过
  `RANDAO` 抽签来决定区块提议者；提议一个区块通常被称为铸造（或锻造）。验证者质押的币越多，被选中的机会就越大，这要求他们通过验证者流程锁定这些币。利用此方法的项目示例是[以太坊](https://ethereum.org/en/)区块链。以
  PoS 区块链原生新铸造代币形式的奖励，会发放给在验证过程中完成工作的验证者。验证者验证交易的时间越长，质押的代币数量越多，其权力也就会越大。


  PoS 通过惩罚那些不当验证有害或欺诈数据的恶意验证者来维护安全性和良好行为。如果发现验证者行为不端，其部分甚至全部质押金可能会被没收。在能源方面，PoS 比
  PoW 更节能、更具可扩展性；然而，它可能更容易受到中心化以及富余节点攻击的影响。表 6-7 简要总结并比较了 PoW 和 PoS 共识机制。


  **表 6-7** PoW 与 PoS 对比


  | PoW 与 PoS 对比 | |

  | --- | --- |

  | 工作量证明 (PoW) | 权益证明 (PoS) |

  | --- | --- |

  | 区块创建者被称为矿工。 | 区块创建者被称为验证者。 |

  | 交易处理和验证速度慢。 | 交易处理和验证速度快。 |

  | 成本高。挖矿过程需要昂贵的设备（`ASIC`）和能源。 | 成本低。主要要求是质押（代币或硬币）；验证可在消费级硬件上运行。 |

  | 不节能——矿工互相竞争。 | 节能——随机选择验证者。 |

  | 难以扩展。 | 更易于扩展。 |

  | 由于前期投入高，安全性强。 | 网络控制权可以被购买。 |

  | 矿工获得区块奖励。 | 验证者获得交易费作为奖励。 |

  | 存在 51% 攻击的可能性。 | 能抵抗 51% 攻击——社区可以移除合谋的验证者群体。 |


  ##### 其他类型的共识机制


  除了 PoW 和 PoS 之外，区块链技术中还使用了几种其他共识方法，包括以下几种：


  - **提名权益证明（`NPoS`）** – 这是权益证明（`PoS`）的一种变体，代币持有者提名验证者来保护网络安全。这些验证者通过创建新区块获得奖励。他们的奖励基于其质押数量和声誉。


  - **权威证明（`PoA`）** – 这是一种共识机制，通常用于私有链和许可链，其中只允许有限数量的授权验证者验证交易。


  - **有向无环图（`DAG`）** – 一种交易排序数据结构，而非共识机制。像 `IOTA`、`Hedera` 和 `Avalanche` 这样的网络将交易存储在
  `DAG` 中，并在其之上运行一个单独的共识层。与单条线性链相比，这种并行图结构允许多个验证者同时添加交易，从而提高了吞吐量并降低了延迟。


  - **实用拜占庭容错（`PBFT`）** – 这是一种提供高容错性的共识算法，确保区块链即使在某些节点发生故障或实施恶意行为时也能正常运行。它通常用于仅允许受信任节点访问的许可链和私有链中。


  - **委托权益证明（`DPoS`）** – 这是一种共识机制，代币持有者投票选举出一小组代表，由这些代表代表他们验证交易并创建新区块。著名的 `DPoS` 网络包括
  `EOS`、`Tron` 和 `Bitshares`。


  ##### 最具可扩展性的共识机制


  要确定最高效且最具可扩展性的共识机制颇具挑战性，因为这涉及诸多因素，例如区块链的类型（公有链、私有链、许可链、非许可链、中心化或去中心化）。此外，区块链的特定用途可能需要特定类型的共识机制来满足其产品或服务需求。然而，基于
  PoW 的区块链（例如比特币）——由于其所需的工作量、算力和工作量——被认为非常安全，但效率最低。


  本文讨论的许多共识机制，如 `PoS`、`NPoS` 和 `DPoS`，被认为比基于 PoW 的区块链更快速、更具可扩展性。比特币自成一派，因此很难将 PoW
  与基于 PoS（或类似机制）的项目进行比较。像 DeFi、DEX、游戏、物联网等需要极快速度和低交易成本的项目，通常会避免使用基于 PoW 的共识机制；相反，它们会采用
  `PoS` 或其类似变体。例如，在以太坊从 PoW 过渡到 `PoS` 之前，Uniswap 上的交易——尤其是在用户量高峰期——费用极高，有些交易花费数百美元，且处理时间漫长。随着以太坊采用
  `PoS` 共识机制，交易处理时间和成本已显著降低。


  #### 可扩展性改进解决方案


  为了克服可扩展性问题，区块链必须具备随着需求增加而提高其计算*吞吐量*并降低其*延迟*的能力。然而，实现这一目标通常需要付出代价。根据“区块链不可能三角”，随着区块链可扩展性的提高，去中心化和安全性会受到影响。确实，通过牺牲去中心化和安全性，可以实现更高的吞吐量和更低的延迟。例如，减少参与共识的全节点数量可以提高吞吐量，因为需要交换消息的验证者减少了。然而，削减全节点集合会降低去中心化程度和整体安全性；由于更少的验证者控制着更大的权力份额，发生
  [51% 攻击](https://d.docs.live.net/9aa056cd36528f9f/Documents/Blockchain%20Book/51%2525%20Attack)的可能性就会增加。（轻客户端或
  `SPV` 客户端不参与此计算，因为它们不在共识中投票。）


  幸运的是，持续不断的扩容解决方案正在开发中，其主要目标是帮助扩展主链（父链），例如以太坊，同时努力维持去中心化和安全性。为便于理解，扩容解决方案主要分为两组：*第一层扩容解决方案*和*第二层扩容解决方案*。




  '
- "# 第一层与第二层扩容方案\n\n区块链扩容方案主要分为两大类：第一层和第二层扩容方案。第一层扩容方案通过改变区块链系统的参数来提升性能，这些参数主要关注区块链的共识机制、网络层和数据结构（例如分片技术，它将状态和交易处理分散到相互协调的分片链中，这些分片链仍与主链共享安全性，涉及区块大小、区块生成时间及区块压缩）。\n\
  \n相比之下，第二层扩容方案（通常称为链下方案）是在现有的第一层基础上构建（分层）的。这些方案提出的扩容机制在主第一层区块链之外运行，但由于多种原因（包括资产与交易数据的转移，以及确保区块链的安全性与完整性）会与其通信和交互。第二层扩容方案包括侧链、Rollup、状态通道、支付通道和\
  \ Plasma 链。\n\n## 横向与纵向扩容方案\n\n第一层和第二层扩容方案进一步被组织和分类为两组：横向扩容与纵向扩容。\n\n横向扩容，也称为向外扩展，涉及向网络中添加更多节点，从而增加底层第一层区块链的吞吐量和容量。这是最流行的扩容方案类型，因为它能够在不大幅改变现有第一层区块链架构的情况下应对增长的需求。此外，与纵向扩容方法相比，横向扩容提供了更大的灵活性和更简便的升级途径，确保网络能够满足当前和未来的需求。横向扩容的一些缺点包括增加了复杂性；Rollup\
  \ 在链下执行交易，但将数据和加密证明提交回第一层。虽然它们继承了基础链的安全性，但乐观 Rollup 设置了一个争议窗口期，可能会延迟最终的提款。横向扩容方案较为复杂，导致成本更高，并可能在分布式系统中引发数据不一致的问题。此外，横向扩容可能会引入额外的延迟，因为请求需要被路由到合适的节点。\n\
  \n另一方面，纵向扩容方案是一种更传统的方法，专注于增强现有资源（如节点）的容量和性能。这通过升级硬件或向单个节点添加更多资源来实现。这使得单个区块链能拥有更强的处理能力和更大的内存，从而提高吞吐量、降低延迟。纵向扩容的一个缺点是，系统内的每个节点在可纵向扩展的程度上有其局限性。一旦达到这个极限，而系统仍需额外的可扩展性时，第二层扩容方案就变得可行了。值得注意的是，近年来，许多团队已不再致力于推动第一层进行纵向扩容，转而部署第二层横向解决方案，后者可以在不强制每个节点升级硬件的情况下增长容量。\n\
  \n简单来说，纵向和横向扩容可以用一家繁忙的餐厅来类比。为了应对顾客增长，可以采用纵向扩容，即在现有的桌子上增加更多椅子。例如，餐厅每张桌子都增加两把椅子，使每桌的就餐人数从四人增加到六人——这就是纵向扩容，即改变现有硬件（或软件）以适应和处理额外的需求。或者，当纵向扩容不再足够、无法应对餐厅外排队等位的长队时，就会实施横向扩容策略。在这种情况下，横向扩容方案意味着要在餐厅内添加额外的桌子，以便所有人能同时坐下就餐，无需长时间等待。横向扩容还包括开设更多分店和扩大业务规模。相同的概念也适用于区块链的扩容，而由于网络上用户数量庞大，横向扩容是目前最流行的方式。\n\
  \n表 6-8 列出了流行的第一层和第二层、横向和纵向扩容的区块链方案。\n\n**表 6-8**  \n第一层与第二层区块链扩容\n\n\n\n| 第一层与第二层区块链扩容解决方案\
