- "# 总锁仓价值 (TVL)\n\n**评估目标：评估 DeFi 协议的 TVL，分析其随时间的变化趋势，并判断其是被高估还是低估。**\n\n总锁仓价值（TVL）是指存入并锁定在\
  \ DeFi 协议或智能合约中的数字资产总价值。TVL 与总质押价值（TVS）不同，它不仅包含质押资产，还包含锁定在借贷、流动性池、挖矿策略及其他 DeFi 应用中的所有资产。许多\
  \ DeFi 协议都支持这些金融服务，其中一些较为流行的包括 [Lido](https://lido.fi/)、[AAVE](https://aave.com/)\
  \ 和 [Uniswap](https://app.uniswap.org/)。\n\nTVL 通常用于衡量 DeFi 协议的整体健康状况，TVL 的增长意味着流动性、可用性和受欢迎程度的提升，这直接影响协议的整体健康状况和成功与否。追踪\
  \ DeFi 中的 TVL 通常通过数据聚合器完成，例如 [DeFi Lama](https://defillama.com/)，同时也可以在 [CoinMarketCap](https://coinmarketcap.com/)\
