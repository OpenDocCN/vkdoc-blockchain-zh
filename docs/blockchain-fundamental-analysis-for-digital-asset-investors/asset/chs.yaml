  \ 7，960，705 笔，并展示了最新的 100 条记录。每笔交易都包含交易哈希、方法（转账）、区块号、时间、发送方、接收方、价值（以太币）和交易费用。页面顶部显示当前以太坊价格和\
  \ Gas 费用。](img/648696_1_En_4_Fig8_HTML.jpg)\n\n图 4-8\n\n`Etherscan`，以太坊主网区块浏览器，显示\
