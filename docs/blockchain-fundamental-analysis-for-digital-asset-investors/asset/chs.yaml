- "# 代币设计与应用场景\n\n**评估目标：** 通过评估代币的功能性、是否真正解决现实世界问题，以及其在生态系统中的整体必要性，来判断代币的应用场景是否具有真实且合理的用途。\n\
  \n加密货币代币的设计是其产品或服务不可或缺的一部分。有效的代币架构侧重于设计机制和结构，是确保协议安全性和投资者盈利能力的关键。总体目标是最大化代币的功能和价值，从而有助于提升代币单价。功能不足且核心目的不明确的劣质代币设计，会严重影响任何项目的成功。创新的、多用途的代币设计机制对于满足利益相关者和协议的需求至关重要。当利益相关者认可产品和代币本身的价值时，代币需求就会上升。在本节结束时，投资者将了解如何评估代币是否具有合法、可行的应用场景，以及其是否具备真实的用途和强大的价值获取机制。\n\
  \n如果一个代币的用途和功能无法得到合理解释，那么该项目注定会失败——换句话说，用户是否可以在没有代币的情况下操作项目的核心产品？如果没有有效的代币用例，并且无法确认项目的核心产品无法通过功能性代币来运作，投资者应避免投资。至关重要的是，代币必须具备必要的功能，使用户和客户能够享受产品，而这些功能是传统方法无法实现的。\n\
  \n那些转向区块链技术来解决现实世界问题或提高系统效率的传统公司，与那些创造没有任何真实需求的代币的公司相比，更有可能拥有合法的代币应用场景和需求。欺诈性公司通常会捏造极其拙劣的代币应用场景，并通过营销将其描绘成独特且具有吸引力的投资项目，其目的仅仅是通过首次代币发行（ICO）及其他类似的公开销售来筹集大量资金。因此，投资者必须掌握识别和区分那些基本面差、具有欺诈性的代币应用场景与那些具备良好且必要功能的合法应用场景的技能。\n\
  \n例如，考虑一家汽车经销商，它使用以太坊的智能合约创建了`CAR`代币。购车时，客户可以选择使用`CAR`代币（而非法定货币）支付，以此获得未来购车的奖励。乍一看，这似乎很有吸引力；然而，人们已经在使用现金购买汽车，且没有任何问题，并利用传统的忠诚度计划来获取奖励。因此，`CAR`代币的应用场景并不具备任何传统方法无法实现的合法用途或功能。不幸的是，这种情况在区块链世界中屡见不鲜，有时很难识别。事实是，大多数加密货币项目在第一年就失败了，无论它们从第一天起就是骗局，还是因为团队经验不足或缺乏资金；最终都归结为基本面极差的应用场景，毫无希望提供真正的价值或获得发展动力。\n\
  \n## 评估代币设计\n\n专门用一整本书来讨论代币设计也不为过，因为它本身就是一个专业领域。然而，对于本次基本面评估的目的而言，一个简化的分析就足够了。表\
  \ 7-5 展示了两个代币：`Chainlink`（LINK）和一个虚构代币`HotelStay`（HTS），在最少但有效的代币标准下进行了对比，这些标准有助于验证代币设计用例和功能的合法性。\n\
  \n**表 7-5** 代币设计合法性\n\n| 代币设计评估 |\n| --- |\n| 代币“合法性”标准 | `Chainlink`（LINK） | `HotelStay`（HTS）\
  \ |\n| --- | --- | --- |\n| **代币功能/实用性** | − 用于支付预言机服务费用。例如，使用`Chainlink`预言机获取链下数据需要支付`LINK`。−\
  \ 作为维持数据准确性的激励和抵押品。当数据提供商向智能合约提交信息时，如果提供不准确的数据，他们将面临质押的`LINK`丢失的风险。这激励数据提供商提供可靠的数据。−\
  \ 奖励通过质押`LINK`来帮助维护网络安全的持有者。− 预计`LINK`持有者将在计划中的治理框架上线后，参与去中心化的链上治理。 | − 专门用于酒店预订。−\
  \ 用作忠诚度奖励。 |\n| **解决现实世界问题** | 连接区块链和外部数据源。 | − 没有解决独特的问题。− 服务可与现有的传统支付和忠诚度系统配合使用。\
  \ |\n| **代币的必要性** | − 对预言机操作和网络安全至关重要。 | − 对于平台功能而言并非必需。− 可以被传统货币取代。 |\n\n如表 7-5\
  \ 的结果所示，`LINK`代币拥有许多对`Chainlink`预言机服务至关重要的基本功能。该代币是`Chainlink`提供的整体运营和服务（通过向智能合约提供现实世界数据，将外部数据源连接到区块链）中不可或缺的关键要素。另一方面，`HotelStay`并没有解决实际问题，也没有提高传统系统的效率，因此，利用区块链技术进行酒店预订没有任何益处。更具体地说，代币`HTS`不具备足以证明其作为“代币”合理性的重要功能，因为法定货币和传统忠诚度积分系统也能达到同样的效果。`HotelStay`的代币`HTS`不符合合法代币应用场景的条件，应被视为一个重大危险信号。\n\
  \n> **事实：** 如果一家公司的代币应用场景很薄弱，他们可能会试图隐瞒关键细节——这应被视为一个警告信号。拥有合法用例的知名公司是透明的，并提供关于其运营以及他们旨在解决的问题的充分信息。\n\
  \n### 行动步骤\n\n按照以下步骤评估代币的应用场景是否具有真实且合理的用途：评估其功能性、是否真正解决现实世界问题，以及其在生态系统中的整体必要性。\n\
  \n1. **代币设计与功能**  \n   审查官方项目文档，全面了解代币的功能、应用场景、用途等。\n\n2. **评估代币的合法性**  \n   根据表\
  \ 7-5 中指定的设计标准（*解决现实世界问题、代币功能/实用性以及代币的必要性*）对代币进行评估。\n\n3. **附加思考与问题**  \n   3.1.\
  \ 提议的应用场景能否通过传统（链下）解决方案实现？  \n   3.2. 团队是否强调了实施其产品或服务的任何显著优势？  \n   3.3. 对于该应用场景，选择链上而非链下是否有其他原因？\
  \  \n   3.4. 在链上还是链下使用产品或服务成本更低？  \n   3.5. 在链上还是链下使用相同的产品或服务更方便、更用户友好？  \n   3.6.\
  \ 在链上还是链下使用相同的产品或服务速度更快？\n\n4. **记录笔记并以你自己的风格记录调查结果**\n\n5. **将调查结果与基本面评估过程的其他部分相结合**\n\
  \n#### 结果评估\n\n在评估了代币的合法性后，如果确定该代币不符合合法应用场景的条件，建议避免进行任何形式的投资，无论规模大小。另一方面，一个基本面强大且功能合理的代币对投资者来说被视为一个绿灯信号。\n\
  \n\n\n## 代币价值累积流程与机制\n\n**评估目标：** 判断项目是否具备有效的代币价值累积流程与机制，以帮助确保持续的价值增长和长期的投资者需求。\n\
  \n理解代币价值累积流程，首先要掌握价值累积的概念——即代币生态系统如何创造需求、随时间维持需求，并将该需求转化为有形价值。在区块链领域，价值累积在于创建一种机制，将外部的使用或兴趣转化为协议内持久的经济效益。\n\
  \n理解代币价值累积流程，首先要掌握价值累积的概念——即代币生态系统如何随时间创造并维持需求，并将该需求*转化*为*已捕获价值*。在区块链领域，已捕获价值是指协议或代币生态系统保留在其系统内部，而非让其流出的经济价值。当协议或代币创建了一种机制，将外部需求或使用转化为可持续的内部价值形式时，就实现了价值捕获。例如，在去中心化金融协议中，用户通常需要支付协议费用才能访问服务——这笔费用（通常是交易的一部分）可以被协议“捕获”，用于再分配或增长。这个被捕获的价值随后可以再投资到系统中，用于奖励代币持有者，或储存在财库中以资助未来的增长。\n\
  \n分解来看，价值累积始于为代币创造需求，随着时间的推移维持这种需求，并——关键一步——捕获由此产生的部分经济活动（例如，通过费用、销毁或收入分享），使其回流到代币持有者和项目手中。\n\
  \n**事实：** 单纯的价格变动并不代表价值累积，价值也可能在没有立即价格变化的情况下累积。投资者关注协议如何独立于价格、通过需求来捕获、保留并反映价值，这一点至关重要。\n\
  \n## 代币价值累积流程与机制\n\n代币价值累积流程与机制是推动价值累积的工具，它们将实际效用与需求捕获和稀缺性机制（例如费用、销毁和质押锁定）相结合，使代币能够随时间吸收网络经济活动的一部分份额。在讨论为代币创造并维持需求时，本节概述的流程和机制就是人们长期持有或使用代币背后的“原因”。投资者有责任了解项目团队是否以及在如何实现价值累积。更具体地说，要验证是否采用了有效的价值累积流程和机制（如果有的话）。\n\
  \n### 代币价值累积流程\n\n代币价值累积流程主要有三种类型，如下所示：\n\n- **协议再投资**\n\n  此流程涉及收集一部分已获得的利润，并将其再投资回协议。这些资金用于支付开发者以及其他能够整体提升产品或服务的杂项费用。此策略能增加价值输出和代币累积。\n\
  \n  大部分利润通常会存放在财库中。任何产生收益的部署（例如质押和提供流动性）都应分散化、设置上限并经由治理批准，以避免过度集中的风险。财库资金得到维护，只在需要时才使用——这种类型的价值累积源于*未来机会*。然而，关键在于财库应由代币持有者治理，而非仅由项目团队掌控。请注意，本质上，这种价值累积是通过扩大协议财库并增加其未来潜力，间接提供给代币持有者，而非以经济利益的形式直接提供给代币持有者。\n\
  \n- **治理参与**\n\n  一个公平、去中心化的治理模型是价值累积的关键部分，因为它允许代币持有者影响协议随时间捕获和保留价值的方式——没有它，所有决策都由项目团队做出，导致项目高度中心化，并且在多数情况下缺乏可信度。这种引导协议发展的能力意味着投资者直接参与价值创造，而不仅仅是寄希望于价格上涨。关键治理领域包括与核心产品和服务相关的项目，以及利润分配与再投资策略等关键领域。通过治理做出的决策，其总体目标应是将价值保留在生态系统内部。\n\
  \n- **代币供应管理**\n\n  *代币供应管理*指的是如何管理代币供应，即减少和分配供应量。请注意，这并非关注启动时全部供应量的初始代币分配，而是关注由特定代币累积机制所产生的供应量减少和分配。例如，根据代币累积机制的不同，一部分代币供应可能会被销毁，因此理论上会创造对剩余供应的更高需求。或者，一部分交易费用可能会按比例分配给代币持有者。项目团队和利益相关者（通过治理）必须利用专门设计、符合产品和整体代币经济结构的代币累积设计机制，来有效管理和控制代币供应。一个现实中的例子是\
  \ BNB 智能链上的 `BNB`，其季度自动销毁机制会根据链上活动和收入永久移除一部分供应量。\n\n\n\n### 代币累积机制\n\n**代币累积机制**是区块链协议中的功能，旨在通过激励持有和可持续需求为代币创造长期价值。它们对投资者至关重要，因为它们能帮助代币随时间增值，而非仅追求快速买卖获利。这些机制内置于协议中，确保代币的长期需求——无论是通过质押奖励、回购，还是通过销毁代币来减少供应量。换言之，这些功能旨在持续为代币增加价值，使其更具吸引力而令人愿意持有而非立即抛售——这是随时间推移增强价值累积并吸引更多投资者的关键要素。代币累积机制有以下几种类型：\n\
  \n- **费用返还机制** —— 将部分交易手续费返还给代币持有者。\n- **通缩机制** —— 随时间推移减少代币供应量，从而提升需求和剩余代币的价值。通缩机制可以涵盖多种形式，例如：\n\
  \    - **交易即销毁** —— 按比例销毁部分交易手续费。\n    - **回购并销毁** —— 项目方（使用财库资金）在市场上回购部分代币并将其销毁。\n\
  - **服务机制** —— 用户可能需要使用代币支付费用才能享受核心产品。部分服务费有时会被销毁，这有助于产生需求。\n- **质押机制** —— 质押涉及锁定代币，减少流通供应量，从而产生需求。质押奖励也会根据质押的代币数量按比例分配给持有者。\n\
  - **治理机制** —— 随着链上治理的兴起，代币持有者可以对协议决策进行投票，有时会因其参与而获得奖励。通常，投资者的投票权与其持有的代币数量成正比，尽管有些协议通过替代模式来抑制过大的影响力——例如二次方投票，每增加一票所需代币成本呈指数级增长；信念投票，对锁定时间更长的代币所支持的投票赋予更大权重；或委托投票。\n\
  - **锁定机制** —— 项目方通常会向持有者提供激励，要求其将代币锁定一定期限。锁定机制将代币移出流通，从而产生需求。\n- **折扣效用机制** —— 当用户使用代币支付时，为其提供费用或价格减免，主要目的是吸引和留住用户；任何价值累积都是间接的，来源于这些折扣所产生的额外活动。\n\
  - **其他分发机制** —— 这可能包括空投、流动性引导和流动性挖矿。\n\n### 行动步骤\n\n请按照以下步骤判断项目是否具备有效的代币累积流程和机制，以帮助确保持续的价值增长和长期投资者需求。\n\
  \n1.  **识别代币累积流程和机制**\n    进行研究，以识别项目所采用的代币累积流程和机制。这些信息通常可通过官方项目文件获取，例如白皮书、博客、项目网站等。\n\
  \n2.  **评估代币累积流程和机制**\n    使用以下标准评估代币累积流程和机制。\n    1.  **机制的真实性** —— 投资者应确保代币累积流程和机制与项目白皮书一致，而非基于模糊的承诺。\n\
  \    2.  代币设计中内置了哪些类型的代币累积流程和机制？\n    3.  哪些因素导致代币或币种价值上涨，它们为何会产生这种效果？\n    4. \
  \ 代币价值的根本驱动因素是什么？\n    5.  除了潜在的价格上涨，代币持有者还能通过哪些方式从代币中获利？\n    6.  是否存在可能对代币价值产生负面影响的明显限制？\n\
  \    7.  项目方采取了哪些保护措施来确保代币的内在价值？\n    8.  协议如何产生收入（例如费用和价差），这些资金是如何在财库、核心团队和代币持有者之间保留或分配的？\n\
  \n3.  **竞品研究**\n    将项目的代币累积流程和机制与其他成功的竞争者进行比较，并依据以下标准进行评估。\n    1.  竞争对手是否拥有相同或不同的代币累积流程和机制？\n\
  \    2.  如果相同，他们的表现如何？代币是否提供了很大价值？\n    3.  如果使用了不同的代币累积流程和机制，它们是更有效、更具创新性，还是表现不佳？\n\
  \    4.  竞争对手在创造和保留收入以支撑代币价值方面是否更胜一筹？\n    5.  竞争对手的机制在设计上风险更小或限制更少吗？\n\n4.  **记笔记并以你自己的风格记录你的发现**\n\
  5.  **将这些发现与基本面评估过程的其他部分相结合**\n\n#### 结果评估\n\n如果项目团队已实施有效的代币和协议价值累积策略与机制——最好有经过验证的业绩记录和可验证的表现，那么基本面评估的这一部分结论是正面的。另一方面，如果团队缺乏有效的代币和协议价值累积机制，则应极度谨慎。\n\
  \n"
- '# 8. 代币经济学


  **代币经济学**（代币 + 经济学）描述了数字资产生态系统的完整经济和激励设计——涵盖供需、行为和治理激励、社区奖励机制以及效用设计。正如 Sean Au 和
  Thomas Power 在《代币经济学：区块链、ICO 和代币的加密转变》一书中概述的，代币经济学涉及设计和实施一个经济系统的概念，旨在使用代币激励社区中的特定行为，从而创建一个自我维持的经济体。它包括博弈论、机制设计以及管理加密资产的激励措施。它还涵盖了代币发行、代币销售、解锁和投资的整个过程。


  > **事实：** 博弈论是研究利益相关者如何通过预测他人行动来做出战略决策的学科，帮助他们在竞争市场中管理风险的同时最大化回报。


  将代币经济学视为数字资产在其自身经济体系中运作和发挥功能的系统。它不仅仅是关于供应动态；代币经济学还决定了赋予代币在其生态系统内价值和效用的规则。例如，通过运用博弈论和激励机制，代币经济学鼓励投资者持有代币并参与网络和产品服务。


  代币经济学的另一个非常重要的元素是设计和管理的代币供应。这涉及代币是如何创建、分配、释放进入流通、解锁的，以及有多少资产通过各种价值累积流程和机制被锁定或销毁。诸如流通供应量等供应动态数据直接影响代币的市值和每枚代币（或代币）的价格，这是投资者非常关心的。了解供应量是如何通过质押奖励或早期投资者分配而分布的，有助于投资者评估代币的长期潜力。


  > **事实：** 代币经济学是研究数字货币或代币如何创建和共享的学科。它类似于传统经济学，我们学习人们如何制造和交易像货币这样的物品，但通过代币经济学，交易在链上使用代币进行，一旦系统稳定，可以减少对银行或中间商的依赖。




  '
- "# 微观代币经济学与宏观代币经济学\n\n传统经济学通常分为两大主要类别：*微观经济学*和*宏观经济学*。微观经济学关注个人和小型企业主层面的供需关系，而宏观经济学则研究更广泛的经济领域，包括*国内生产总值*（GDP）、进出口等因素。类似地，在区块链世界中，代币经济学也可以通过*微观代币经济学*和*宏观代币经济学*的视角来理解。\n\
  \n`Microtokenomics`（微观代币经济学）指的是驱动区块链经济体中参与者功能与互动的各类特征。通货膨胀率与通货紧缩率、质押奖励调整、解锁期以及代币流通速度等因素，都是微观代币经济学的关键组成部分。\n\
  \n`Macrotokenomics`（宏观代币经济学）则涵盖了更广泛的元素，例如治理机制、生态系统增长以及流动性提供。这些变量的相互作用，共同构成了区块链生态系统中的整体“*代币经济*”。\n\
  \n## 为什么良好的代币经济学对投资者很重要？\n\n设计良好的代币经济结构，是成功项目的基础。由于供需特性直接影响并决定了代币的价值，因此具有吸引力的代币经济学深受投资者追捧。此外，理解代币经济结构还能帮助投资者预测资产未来的价值。\n\
  \n理解并分析加密项目的代币经济学，是基础评估过程中的重要一环。这是一个相对快速有效的过程，能提供宝贵的见解，帮助判断项目在长期内取得成功的可能性。本章将为您提供评估项目代币经济结构所需的工具和知识。\n\
  \n## 本章内容预览\n\n本章将探讨影响代币供应设计及其在生态系统中行为的基本代币经济学要素及相关指标。我们将解释供应动态——包括总供应量、流通供应量和最大供应量——以及通缩模型、通胀模型和固定模型等代币供应模型。同时，还会涵盖代币分配模型，详细说明代币分配如何影响市值和流动性等市场指标。最后，本章将探讨解锁时间表及其在创建可持续代币经济中的作用。\n\
  \n**本章讨论的基础知识：**\n\n*   `代币供应指标`\n*   `代币供应模型`\n*   `代币分配模型`\n*   `解锁时间表`\n\n##\
  \ 代币供应指标\n\n***评估目标：识别并评估总供应量、流通供应量和最大供应量的动态变化。***\n\n总供应量指标——包括流通供应量、总供应量和最大供应量——是投资者用来衡量数字资产可用性和稀缺性的关键指标。供应量指标确定了在任何特定时间点将存在多少代币（或币）。这些区块链世界特有的指标，可以让我们深入了解当前有多少代币在流通，总共存在多少代币，以及最终将有多少代币被解锁（释放）。与法定货币（其供应量可通过自由裁量的货币政策进行扩张）不同，许多区块链项目会在初始代币合约中固定总供应量或最大供应量，尽管某些协议保留了链上或可升级的机制，允许社区稍后更改这些限制。然而，流通供应量会随时间推移，根据代币销毁、质押和解锁时间表等链上机制而波动。评估这些指标有助于投资者识别具有强劲增长潜力的代币，避免那些容易发生极端通胀的代币，并总体上为评估代币在市场上的长期价值提供优势。\n\
  \n项目的代币供应指标通常可以在白皮书的代币经济学部分找到。但在大多数情况下，白皮书中详述的供应指标可能已经过时。这是因为供应指标会根据预定义的代币合约参数持续更新。例如，随着时间推移，根据预定义的代币合约参数，更多的币或代币会被释放到流通中，直到所有资产都按照项目团队设定的初始代币分配计划解锁完毕。此外，对于允许在初始分配供应量之外额外铸造的代币经济学项目，一旦创世代币全部分配完毕，其流通量将继续上升。另一方面，在通缩模型中——代币被永久地从流通中移除——如果没有其他抵消机制作用，流通供应量通常会相对于先前时期随着时间的推移而下降。因此，由于代币供应指标的动态性质，建议首先查看项目白皮书；然而，对于供应指标和其他相关财务数据的实时追踪，像\
  \ [CoinMarketCap](https://coinmarketcap.com/) 或 [CoinGecko](https://www.coingecko.com/)\
  \ 这样的数据源对加密货币投资者来说是必不可少的。\n\n图 8-1 显示了 Polkadot 网络在 `CoinMarketCap.com` 上的代币供应指标，包括流通供应量、总供应量和最大供应量。\n\
  \n![Polkadot (DOT) 加密货币市场页面的截图。价格为 4.42 美元，24 小时内上涨 4.11%。市值约为 66 亿美元，24 小时交易量约为\
  \ 1.29 亿美元。流通供应量为 1,497,347,250 DOT，总供应量相同，无最大供应量限制。右侧的折线图显示了所选时间段内的价格走势，总体呈上升趋势。导航标签包括图表、市场、新闻等。](img/648696_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1\n\nPolkadot 网络——流通供应量、总供应量和最大供应量（数据来源于 [`​coinmarketcap.​com/​currencies/​polkadot-new/​`](https://coinmarketcap.com/currencies/polkadot-new/)）\n\
  \n### 总供应量\n\n总供应量是指在任何给定时间点已创建并存世的币或代币的总数。这包括当前流通的、以及被锁定或预留的币或代币，减去已被销毁或永久移除的币的总数。请注意，总供应量不包括由于通货膨胀（即未来增发机制）而将在未来铸造的币。\n\
  \n图 8-1 显示，Polkadot 网络的总供应量约为 1,497,347,250 个 `DOT`（在本书撰写之时）。此外，请注意 Polkadot 的流通供应量现在也是\
  \ 1,497,347,250 个 `DOT`，与其最初分配的总供应量持平（所有大额解锁期已结束；只有持续的通货膨胀才会增加新的 `DOT`）。这意味着所有曾经被锁定的\
  \ `DOT` 现在都已释放进入流通。这对投资者来说是有价值的信息，因为它表明未来不会有大规模代币解锁进一步稀释供应（稀释通常会导致抛售压力增加，从而可能拉低每枚代币的价格）。\n\
  \n\n\n### 流通供应量\n\n`流通供应量`指当前在市场上流通的代币或硬币总数，不包括被锁定、预留或尚未释放的部分。与总供应量相比，该指标能更清晰地反映资产的市场可用性。虽然较高的流通供应量通常意味着资产分布更广泛，但较低的流通供应量往往会制造稀缺性，从而推高需求和单个资产的价格。\n\
  \n以 `Polkadot (DOT)` 为例，其流通供应量与总供应量一致，为 `1,497,347,250 DOT`，这意味着所有代币都已完全解锁并在市场上流通。这意味着未来不会有代币解锁进一步稀释市场，从而压低单个币价——这对于评估长期价格稳定性至关重要。此外，检查代币供应是固定、通缩还是通胀的也很重要，因为这会影响未来的代币供应动态和价格走势——更多内容请参见下一节“代币供应模型”。\n\
  \n### 最大供应量\n\n`最大供应量`是指将会被创造出来的硬币或代币的总数。它可以是上限固定的，即对可创造的数量设有硬性限制；也可以是无上限的，即由于通胀因素供应量无限。对于投资者而言，判断代币供应量是固定还是无限至关重要，因为上限固定的供应量通常会带来稀缺性，可能提升价值；而无上限的供应量则会随时间推移稀释价值。然而，一些项目也会采用通缩机制（例如代币销毁）来抵消通胀。例如，`Polkadot\
  \ 网络`（图 8-1）没有最大供应量，因为它采用通胀模式；但同时它也融入了通缩机制，例如销毁部分交易手续费，从而平衡通胀。当一个协议同时包含铸造和销毁机制时，投资者应比较年铸造率与计划销毁率，以确定净发行量——是通胀、通缩还是大致中性。\n\
  \n### 行动步骤\n\n按照以下步骤评估一个项目的流通供应量、总供应量和最大代币供应动态。\n\n1. **白皮书 – 代币供应量核查**\n\n   查阅白皮书，特别是代币经济学部分，以了解初始供应指标（流通供应量、总供应量和最大供应量）。如果这些供应指标未实时更新，可能不完全准确，但它们将提供一个基准，有助于与实时代币数据网站进行交叉验证，发现潜在差异。例如，一个固定的最大供应量将保持静态，在白皮书和诸如\
  \ `CoinMarketCap.com` 等网站上显示的数据应当一致。\n\n2. **流通供应量 vs. 总供应量**\n\n   在 `CoinMarketCap`\
  \ 上，比较流通供应量与总供应量。\n   1. 如果流通供应量低于总供应量，这意味着计划有更多代币解锁。这些解锁可能会增加抛售压力，并进一步压低每个代币的价格。\n\
  \   2. 如果流通供应量与总供应量相同，这意味着没有更多代币解锁计划，从而降低了进一步稀释的风险。\n\n3. **最大供应量**\n\n   通过白皮书和\
  \ `CoinMarketCap` 核实项目是否有上限或无限的最大供应量。有上限的供应量通常意味着稀缺性，可能提升需求；而无上限的代币供应量可能随时间推移面临供应稀释，从而可能压低每个代币的价格。\n\
  \n4. **做笔记，并以自己的方式记录发现**\n\n5. **将发现与基本面评估流程的其他部分结合**\n\n#### 结果评估\n\n代币供应指标没有绝对的对错。一个项目的总供应量和最大供应量通常取决于核心项目或服务的类型、运营及功能需求；因此，这些指标需要具体情况具体分析。然而，投资者应对流通供应量保持谨慎，特别是如果只有少量供应被释放到市场中，因为这可能随着更多代币解锁而对后续投资产生负面影响。\n\
  \n## 代币供应模型\n\n***评估目标：确定项目采用通缩、通胀还是固定供应模型，并根据未来的稀释风险、需求可持续性以及个人投资策略进行评估。***\n\n\
  代币供应可分为三种主要模型或类别：*通胀型*、*通缩型*和*固定型*。每种模型都适用于满足 Web3 或区块链项目的特定设计和功能。每种模型类型对代币价格及总供应量、最大供应量和流通供应量的影响各不相同。此外，共识机制和代币累积机制的设计类型也决定了代币供应是通胀、通缩还是固定的。对\
  \ `StakingRewards.com`（一个追踪质押收益率和代币通胀数据的公开仪表板）上前二十个网络的审查显示，大多数主流协议的目标是低个位数的净发行率（大约每年\
  \ 2–5%），以平衡验证者奖励与稀释，而个别项目可能旨在实现更高的通胀率——甚至是净通缩——具体取决于其协议设计和代币经济目标。\n\n### 通缩型代币供应\n\
  \n通缩型代币供应指总供应量随时间推移而减少的代币经济模型。这种减少可以通过代币销毁等机制实现，即一部分代币被永久性地从流通中移除——有关代币通缩机制的更多细节，请参见第\
  \ 7 章“代币设计与用途”。此概念旨在制造稀缺性，理论上，假设需求保持稳定或增加，随着供应减少，代币价值将被推高。通缩系统旨在维持长期价值增长，并在某些情况下抵消通胀，这使得它们对一些投资者具有吸引力。\n\
  \n在评估通缩系统时，建议投资者关注几个关键要素。首先，理解销毁机制，特别是销毁的频率、规模以及触发条件。这一点很重要，因为它有助于判断在特定时间段内将有多少代币留在流通中。虽然某些销毁可能随时间推移显著减少供应，但由于销毁率低，其他销毁可能影响甚微。通常来说，高销毁率在投资者中备受推崇，因为它创造了更多需求。然而，影响需求的变量众多，除了代币稀缺性之外，还包括代币的核心价值以及产品或服务。因此，对于销毁率，必须格外警惕。有些人会严重受到通缩供应和相关销毁率的影响而忽视全局——仅靠代币稀缺性无法拯救一个有缺陷的项目。为一个缺乏实际效用或用户兴趣的产品制造代币稀缺性，不太可能产生有意义的需求。人为的稀缺性无法弥补代币基础价值主张或采用潜力上的根本弱点。因此，只有当通缩供应与稳定或增长的需求相结合时，它才值得推崇。\n\
  \n专家提示\n\n聪明的加密货币投资者会看穿华丽的销毁率，转而关注效用、采用潜力和精心设计的销毁时间表这三大要素，以此评估代币真正的长期可行性。\n\n\n\n\
  ### 通缩型项目示例\n\n`BNB Chain`（`BNB`）是一种按季度执行的算法自动销毁机制，通过自动将代币从流通中移除并发送至销毁地址，从而减少`BNB`币的供应量。\n\
  \n`以太坊`（`ETH`）以太坊提供了一个代币供应如何同时采用通缩与通胀机制的范例。最初，以太坊的原生货币`ETH`主要是通胀型的，这意味着定期会有更多代币进入流通。然而，在\
  \ 2021 年 8 月 5 日，以太坊实施了一项名为`EIP-1559`的关键更新。此次更新引入了一种销毁机制，会销毁部分交易费用（称为\"基础费用\"），从而减少`ETH`的总供应量。如今，`ETH`的发行量（通胀）与`ETH`的销毁量（通缩）之间的平衡决定了以太坊是否面临通缩压力。例如，在网络使用量高的时期，会有更多`ETH`被销毁，供应量可能减少，从而产生通缩效应。另一方面，在网络活动低迷时期，销毁机制可能无法超过因`PoS`质押奖励而产生的新`ETH`发行量，此时便呈现通胀状态。\n\
  \n### 通胀型代币供应\n\n通胀型供应是指随着时间的推移，通过逐步增加流通中的代币数量来创造更大代币供应量的模式。与通缩型代币供应类似，采用通胀型代币供应系统的原因取决于产品/服务的功能与设计。共识机制的类型（例如`权益证明`或`权益证明质押`）在通胀型代币供应中起着重要作用。挖矿和质押等共识机制会将新代币引入流通，从而增加代币总供应量。因此，供应量会被稀释，这有时会对每个币或代币的价格产生负面影响。因此，如果对产品或服务的需求无法超过通胀率，投资者的投资可能会受到负面影响。\n\
  \n#### 规避通胀风险\n\n为了帮助降低通胀和投资贬值的风险，投资者通常会质押其数字资产——仅适用于`PoS`（`权益证明`）共识机制。通过质押（即锁定其持有的资产），投资者可以获得质押奖励。这些奖励可以交易、出售或重新质押以获取复利收益。将奖励重新质押以获取复利，本质上可以帮助投资者缓解通胀风险，因为他们能够持续维持或增加其在全网供应量中的质押份额。换句话说，这种投资者策略允许投资者的代币数量与整体代币供应量同步增长，从而保持其在供应量中的份额。然而，质押并非没有风险。根据项目要求，质押条款和条件通常包含锁定周期，在此期间投资者无法解除质押其资产，必须等待一定时间（例如一周、一个月等）之后才能操作。这种无法即时提现的限制对投资者来说是危险的。例如，如果由于团队成员负面新闻或黑客事件导致资产价值突然下跌，投资者将无法做出反应，而必须等到预定的锁定期结束。因此，在质押任何资产之前，仔细评估要质押哪些资产以及质押条款和条件非常重要。\n\
  \n#### 通胀型项目示例\n\n`KILT Protocol`（`KILT`）——KILT Protocol，一个去中心化身份区块链网络，由于通过质押来帮助确保网络安全，其供应是通胀型的。图\
  \ 8-2 展示了 KILT 区块奖励、通胀率以及前 60 年 KILT 币总分配量之间的关系。奖励率（紫色线）逐渐下降，而币的总分配量随时间推移而增加，这表明有更多币进入流通。但请注意，奖励率远高于初始通胀率，并且随着时间的推移，始终保持在相对于通胀率较高的水平。虽然这值得称赞，但除非投资者采用奖励复投策略，否则随着时间的推移，他们在代币总供应量中所占的百分比份额将会减少。\n\
  \n![折线图，标题为\"区块奖励与通胀\"，展示了 60 年内的三种趋势。紫色线代表奖励率百分比，起始较高并随时间下降。红色线显示通胀百分比，从 4%开始后急剧下降至接近零。蓝色线表示\
  \ KILT 币的总分配量（以百万计），稳步增长。X 轴标注为\"年份\"，Y 轴有两个刻度：左侧为百分比，右侧为百万。图例标识了各条线，图表日期为 2021\
  \ 年 8 月。](img/648696_1_En_8_Fig2_HTML.jpg)\n\n图 8-2\n\nKilt Protocol 的区块奖励与通胀（图表来源：[`kilt-protocol.org/files/Token-Economy.pdf`](https://kilt-protocol.org/files/Token-Economy.pdf)）\n\
  \n### 固定代币供应\n\n顾名思义，固定供应模型是一种代币供应模式，其拥有一个固定的或总数量的代币，且总数无法被超越。对于固定供应，达到供应上限后无法再铸造新代币，这可以造成稀缺性，并且如果需求保持，可能对价格起到支撑作用。固定代币供应会营造一种稀缺感，因为只有有限数量的代币或币种存在。\n\
  \n在分析固定代币供应时，识别并具体分析项目的流通供应量和最大供应量指标至关重要——其中最大供应量就是\"固定\"的供应值。流通供应量指标提供的是流通中的币的数量，而最大供应量代表的是代币将会存在的绝对上限。通过比较这两个指标，投资者可以判断是否会有更多币通过代币解锁（通过归属期）或通胀形式被释放到流通中。如果流通供应量等于最大供应量，则不会再有币或代币被释放到流通中。然而，如果流通供应量低于最大供应量，则预计供应量将进一步稀释，投资者应根据流通供应量相对于最大供应量的高低程度来评估这种稀释的严重性。\n\
  \n专家提示\n\n在评估采用固定代币供应的项目时，请考虑其用例和需求增长。仅凭稀缺性并不能保证价格上涨——现实世界的实用性和采用率同样重要。\n\n\n\n\
  ### “固定供应”项目示例\n\n`bitcoin (BTC)` 是一个固定供应项目的例子，其硬性（最高）上限为 2100 万枚。随着新币通过挖矿引入，比特币的供应设计会随着时间的推移从通胀型转变为通缩型（通胀率趋近于\
  \ 0%），直到达到 2100 万枚的固定上限。比特币的减半机制每四年发生一次，将挖矿奖励减少 50%，从而逐步降低新币的创造速度。这使得比特币从通胀状态转变为通缩状态，最终在达到上限后进入供应静态的非通胀状态。届时，矿工将不再获得区块奖励，其唯一激励将来自比特币网络用户支付的交易手续费。\n\
  \n图 8-3 展示了比特币通胀率随时间下降以及其货币基础随时间增长的情况。在早期，随着新币的迅速引入，比特币的通胀率接近 100%，但每次减半事件后，这一比率显著下降，预计到\
  \ 2140 年将趋近于零。与此同时，流通中的比特币总数（货币基础）起初增长迅速，但随着其接近 2100 万的最大供应量，增长速度逐渐放缓。这反映了比特币的通缩设计，确保了稀缺性，并支撑其作为价值储存手段的价值主张。\n\
  \n![图表标题为“比特币通胀率 vs. 时间”，显示两条线：红线代表年化通胀率，从 2009 年的 100%急剧下降到 2037 年的接近 0%；蓝线代表货币基础，在同一时期从\
  \ 0 稳步增加到 2100 万比特币。x 轴标记为“区块（千个）”，左侧 y 轴标记为“通胀率（年化）”，右侧 y 轴标记为“比特币（百万）”。x 轴上标出的关键年份包括\
  \ 2009 年、2013 年、2017 年、2021 年、2025 年、2029 年、2033 年和 2037 年。](img/648696_1_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3\n\n比特币通胀率随时间变化图（数据来源：[`www.bitcoinblockhalf.com/`](https://www.bitcoinblockhalf.com/)）\n\
  \n### 行动步骤\n\n请按照以下步骤来确定项目采用的是通缩、通胀还是固定供应模型，并根据未来的稀释风险、需求可持续性以及是否符合你的投资策略进行评估。\n\
  \n1.  **代币供应模型**\n\n    确定项目采用的代币供应模型，是*固定*、通胀还是通缩模型。\n    1.  **固定供应** – 不会创建新代币。\n\
  \    2.  **通胀供应** – 定期添加新代币。\n    3.  **通缩供应** – 代币数量随时间减少（通过销毁或类似机制）。\n\n2.  **流通供应量与最大供应量（重点关注固定供应）**\n\
  \n    在评估固定供应模型时，比较流通供应量与最大供应量至关重要。\n    1.  当流通供应量与最大供应量相同或几乎相同时，这很有吸引力，因为它消除了供应量的未来稀释或将其降至最低。\n\
  \    2.  如果很大一部分代币尚未进入流通，请根据你的投资策略判断未来的稀释程度是否可以接受。\n        1.  考察投资策略变量，例如是短期还是长期投资。你计划持有多久？除非有计划中的激进代币解锁，否则包括固定供应在内的供应模型，对短期投资者的影响小于对长期投资者的影响。\n\
  \        2.  如果是长期策略，请特别关注其他核心基本面因素，以帮助你判断它们是否会超过代币供应未来稀释的影响。\n\n3.  **通胀率（通胀模型）**\n\
  \n    在评估通胀供应模型时：\n    1.  检查通胀率及其分配方式（例如，质押奖励和挖矿奖励）。\n    2.  利用基本面分析的其他方面预测，项目的需求增长是否能超过通胀率，或者代币的价值是否会随着时间的推移而被稀释。\n\
  \    3.  是短期还是长期投资？短期投资者受到的影响小于长期投资者。\n    4.  如果是长期投资，你是否计划进行质押（针对基于 PoS 的项目）并复投以获得复利奖励？这有助于保持你在总供应量中的相同代币比例，从而抵消代币稀释对长期投资者的影响。\n\
  \n4.  **销毁机制与稀缺性（通缩模型）**\n\n    在评估通缩供应模型时：\n    1.  **不要依赖通缩代币供应来创造需求**。通缩供应是对现有具备高基本面、用户增长明显的产品的补充。\n\
  \    2.  调查销毁机制：\n        1.  销毁的频率如何？\n        2.  供应量减少了多少？\n        3.  触发销毁机制的条件是什么？\n\
  \        4.  代币销毁机制是否会在某个时间点结束？\n\n5.  **记录笔记并以你自己的风格记录发现**\n\n6.  **将发现结果与基本面评估过程的其他部分结合**\n\
  \n#### 结果评估\n\n代币供应并没有一种放之四海而皆准的方法；项目团队通常会选择最适合其产品的模型。核心设计、功能以及项目的长期愿景和目标将直接影响所选的代币模型。理想情况下，采用固定供应模型或具有主导通缩机制的项目对投资者更具吸引力。知道代币供应不会无限膨胀、导致供应持续稀释并进而影响投资，这会带来一种安全感。然而，强烈建议不要只关注这些方面。虽然通缩或固定供应很有吸引力，但它们并不能保证成功。此外，许多采用通胀模型的项目也取得了成功，这证明了效用、采用率和项目整体基本面等因素至关重要。\n\
  \n## 代币分配模型\n\n***评估目标：识别项目的代币分配模型，并确定其分配是否符合行业基准、确保公平性、支持长期增长和社区参与。***\n\n代币分配模型是一种策略，详细说明了加密项目如何在利益相关者（包括项目团队、开发者、顾问、早期支持者和投资者）之间分割和分配代币供应量。可以把它想象成切蛋糕并决定谁得到什么。决定每个分配类别（包括利益相关者）获得多少代币，会直接影响投资者以及项目的长期可行性和整体成功。代币分配模型的设计，包括决定总供应量和最大供应量如何由团队在熟练专业人士的帮助下执行。在此过程中会考虑许多因素，包括核心产品的功能、代币效用、供应模型类型、治理结构、分配机制、供需关系、用户需求以及其他相关领域。此类设计细节超出了本书的范围，并且不被视为本次分析所需部分。相反，我们将讨论代币分配，包括投资者需要关注的关键要素和警示信号。主要目标是确保代币供应分配不会过度集中在团队或早期支持者手中，而是将公平的份额分配给社区。\n\
  \n\n\n### 代币分配群体\n\n在代币经济设计阶段，代币供应会在不同群体之间进行分配，以帮助确保项目长期成功。通常，项目团队会决定代币供应如何划分以及每个分配类别的配额。影响这一决定的因素有很多，包括项目资金需求、开发者激励、社区增长和未来发展。表\
  \ 8-1 概述了通常会获得部分代币供应份额的最常见的分配类别类型。\n\n表 8-1 典型的代币分配群体\n\n| 代币分配类别 |  |  |\n| ---\
  \ | --- | --- |\n| 类别 | 定义 | 分配目的 |\n| --- | --- | --- |\n| 团队和创始人 | 项目的创建者、开发者和核心团队成员。\
  \ | 激励其工作、奉献精神以及对项目长期成功的贡献。 |\n| 合格投资者 | 投资于早期种子轮、风险投资和私募轮的合格投资者。 | 提供项目早期构建和发展所需的充足资金。\
  \ |\n| 合作伙伴和顾问 | 为各种合作交易和顾问预留的代币，以帮助加强项目。 | 与区块链公司的合作伙伴关系。意见领袖。营销顾问。技术顾问。财务顾问。 |\n\
  | 社区和生态系统激励 | 为社区贡献预留的代币，以激励参与和生态系统增长。 | 空投。生态系统奖励。农耕和流动性挖矿奖励。社区贡献者激励。市场营销。 |\n\
  | 财库储备 | 由去中心化自治组织、公司、创始机构或基金会持有的代币。 | 旨在通过以下方式维持项目的长期存续：运营和维护。维护安全。生态系统增长和发展。应急基金。研发。\
  \ |\n| 公共投资者 | 面向公众、散户投资者和消费者持有的代币。 | 以下一项或多项的公开销售：首次代币发行。首次去中心化交易所发行。首次交易所发行。众售。\
  \ |\n\n#### Uniswap 代币供应模型示例\n\n当 Uniswap 启动时，铸造了十亿个`UNI`代币。这些代币按照图 8-4 所示的进行了分配。这是一个值得称赞的代币分配模型，大部分代币份额分配给了社区激励计划。\n\
  \n![饼图标题为“创始 UNI 分配”，显示分配情况：社区占 60.00%（粉色），团队占 21.51%（蓝色），投资者占 17.80%（青色），顾问占 0.69%（紫色）。](img/648696_1_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4 Uniswap（承蒙 [`blog.uniswap.org/uni`](https://blog.uniswap.org/uni) 提供）\n\n\
  从图 8-4 可以看出，60%（6 亿`UNI`）分配给了社区，团队获得了 21.51%（2.151 亿`UNI`），早期投资者获得了 17.51%（1.78\
  \ 亿`UNI`），剩下 0.69%（6900 万`UNI`）给了项目顾问。请注意，大部分代币流向了社区。近 60%的`UNI`代币被分配给 Uniswap 社区，以全面推动生态系统增长和去中心化治理。这些代币主要用于通过空投奖励早期用户、支持流动性挖矿计划，以及赋能社区驱动的治理。这些代币中的很大一部分保存在治理财库中，用于资助社区项目、发放补助金，并进一步激励生态系统参与。\n\
  \n### 代币分配基准\n\n在代币分配方面，投资者的主要目标是确保代币的分配方式能够推动增长，同时保护公共投资者免受项目团队或早期种子轮投资者大量抛售的风险。在图\
  \ 8-5 中提出了一个建议的代币分配模型基准。虽然分配比例和相应的百分比会因项目而异，但出于多种原因，这种结构对投资者来说是值得称赞的。\n\n![饼图说明资源分布。最大的区块为蓝色，代表社区与生态系统发展（占\
  \ 43%）。其他区块包括：财库占 20%（橙色）、核心团队占 17%（黄色）、投资者占 10%（绿色），以及公开销售和合作伙伴与顾问各占 5%（分别为红色和青色）。](img/648696_1_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5 面向投资者的代币分配模型基准\n\n- **社区与生态系统发展** – 首先，最大份额预留给社区激励和生态系统发展。这对于项目的增长至关重要，因为它涵盖了多个领域，包括用户奖励、质押、挖矿、营销、流动性、贡献者计划和开发者补助——因此，这一分配至少应为\
  \ 40%或更多。例如，Uniswap（图 8-4）将其 60%的代币分配给社区，这在推动项目增长方面发挥了关键作用。通过这样做，他们减轻了项目团队和种子轮投资者早期抛售代币的风险。由于大部分代币用于激励社区，较小群体的任何抛售对整体生态系统和每个代币价格的影响都较小。\n\
  - **财库** – 大多数项目启动时会将初始供应量的 15%到 21%左右预留为财库（例如，Uniswap 约为 21%，Optimism 约为 20%，Polkadot\
  \ 约为 18%），这为项目提供了 3-5 年的运营、升级、补助和应急资金，而不会对流通量造成冲击。\n- **项目团队** – 17%到 20%是团队的标准分配比例——前提是他们值得拥有！\n\
  - **投资者** – 投资者的资金对于初创项目的建立很重要。然而，除非早期支持者提供极致的价值（除了资金之外），否则分配不应超过 10%。供应量的主体最好分配给社区激励储备和财库，这将从长远来看增加显著的价值。\n\
  - **合作伙伴与顾问** – 通常分配供应量的大约 5%。根据项目的复杂性，这一比例可能会略有增加。\n- **公开销售** – 传统上，公开销售——即在项目启动时将代币出售给公众——会分配总供应量的大约\
  \ 3-5%。然而，近年来出现了一个明显的转变，项目逐渐远离公开销售，而是更多地关注社区激励分配。例如，来自[UnlockInsights.app](https://insights.unlocks.app/)历史上的代币发行数据以及[CryptoRank.io](https://cryptorank.io/)的最新数据显示，公开销售份额从\
  \ 2018 年的大约 35%下降到 2025 年的仅约 3%-5%。这一转变对项目有利，有助于建立强大的社区，推动生态系统的有机增长。此外，它还减轻了早期投资者大规模抛售代币相关的风险。\n\
  \n\n\n### 行动步骤\n\n按照以下步骤识别项目的代币分配模型，并判断其分配是否与行业基准相符、确保公平性，并支持长期增长和社区参与。\n\n1.  **代币分配模型详情**\n\
  \    从白皮书、官方文档及其他可靠来源，审查与项目代币分配模型相关的信息。\n\n2.  **基准代币分配模型**\n    将项目的代币供应分配与本部分概述的基准模型进行比较。\n\
  \    -   是否存在团队或投资者代币分配过度的明显担忧？\n    -   社区激励储备金是否获得了最大分配？最低 40%是可取的。\n    -   国库是否获得了代币供应量的\
  \ 20%（或更多）？\n    -   其他可能对投资者不利的观察结果？\n\n3.  **竞争对手分析**\n    将项目的代币供应分配与同一细分领域内成功竞争对手的分配进行比较。\n\
  \    -   项目的代币与成功投资者相比如何？\n    -   这些竞争对手的代币分配是否存在已知问题或陷阱，而本项目已经从中学习并加以解决？\n   \
  \ -   与其竞争对手相比，项目的代币经济学透明度如何？更高的透明度可能是良好治理和承诺公平实践的标志。\n\n4.  **以你自己的风格记录发现并做笔记**\n\
  \n5.  **将发现与基本面评估流程的其他部分相结合**\n\n#### 评估结果\n\n代币供应的分配是一个关键的基本要素，在整个基本面分析中占有很大权重。因此，如果团队或投资者代币分配超过了社区激励分配，则视为可疑，建议远离投资。\n\
  \n如果与建议的代币分配基准存在显著偏差，建议在投资前联系项目团队寻求建议。请注意，可能存在一些微妙的情况，即代币分配类别与基准不同，但经过进一步研究后可以接受。例如，以\
  \ [Moonbeam Network](https://moonbeam.network/) 为例，由于其独特地参与了波卡（Polkadot）的平行链基础设施，其代币分配专门定制并设计用于容纳一些细微的分配类别，其中包括\
  \ *起飞社区活动、2021 年 Moonbeam 众贷分配以及平行链债券储备。*\n\n![饼图展示了不同类别的资金分配。最大的部分占 16.7%，用于“长期协议与生态系统开发”，其次是\
  \ 15%用于“国库”，14%用于“种子轮投资”。其他类别包括“战略投资”占 12%，“流动性计划”占 9.8%，以及较小的分配用于“起飞社区活动”、“2021\
  \ 年 Moonbeam 众贷”、“平行链债券资金”、“平行链债券储备”、“开发者采用计划”、“关键合作伙伴与顾问”、“PureStake 早期支持者”、“创始人及早期员工”和“未来员工激励”。每个部分都用颜色编码并标有百分比。](img/648696_1_En_8_Fig6_HTML.jpg)\n\
  \n图 8-6\nMoonbeam 网络，创世代币分配（致谢：[`​moonbeam.​foundation/​glimmer-token/​`](https://moonbeam.foundation/glimmer-token/)）\n\
  \n## 解锁时间表\n\n**评估目标：** 评估项目的解锁时间表，以确定其对代币供应稳定性、价格波动性以及项目团队对长期成功的承诺的影响。\n\n加密货币领域的“解锁”（Vesting）是指代币在一段设定时间内逐步释放给利益相关者。当代币逐步释放时，有助于减少突然的价格变化，而过早释放过多代币反而会增加价格波动，即使其目标是展示长期支持。对于投资者而言，分析解锁时间表是基本面分析的重要组成部分，因为它决定了项目启动后或在项目生命周期早期阶段的任何时期是否存在大量代币倾销的可能性。分析解锁时间表有助于衡量项目团队的投入和承诺程度，这体现在数年时间内缓慢且平衡的代币释放。\n\
  \n### 解锁时间表及相关术语\n\n理解与解锁相关的关键术语对加密货币投资者至关重要。它有助于阐明代币分配的工作方式、代币释放的条件，以及这些机制如何使利益相关者的利益与项目的长期成功保持一致。以下是每个投资者都应熟悉的与解锁相关的主要概念详解：\n\
  \n表 8-2\n解锁相关术语\n\n| 术语 | 描述 |\n| --- | --- |\n| 解锁期 | 代币逐步释放的时间范围。 |\n| 悬崖期 | *悬崖期*指的是代币开始逐步释放之前必须经过的初始时间。这些*悬崖期*的长度可能因预期分配类别而异。例如，项目团队成员或种子轮投资者可能适用\
  \ 24 个月的悬崖期，而公开发售参与者可能适用一个月的悬崖期，或在某些情况下没有悬崖期。 |\n| 线性解锁 | 代币在解锁期内以恒定速率释放。 |\n| 分级解锁\
  \ | 代币在特定时间间隔内分批释放，而非均匀释放。 |\n| 锁仓期 | 代币在智能合约中被锁定、不可转让的时间段，即使技术上已归属。 |\n| 完全解锁 |\
  \ 指所有代币完全由持有者拥有并可自由访问的时间点。 |\n| 代币解锁 | 指根据解锁时间表，特定数量的代币被释放进入流通的时间。 |\n| 解锁合约 | 一种根据解锁时间表自动处理代币释放的智能合约。\
  \ |\n| 里程碑式解锁 | 代币释放由特定目标或项目里程碑触发。 |\n\n**专业提示**\n\n在投资之前，请访问 [Tokenomist.​ai](https://tokenomist.ai/)\
  \ 查看所有即将到来的代币解锁的详细数据。建议不要在代币解锁前投资；相反，应等到代币解锁过去且每个币或代币的价格稳定后再进行。这种做法将为投资者省下金钱。\n\n\
  \n\n### 归属时间表评估\n\n本节对 [Immutable X](https://www.immutable.com/) 的归属时间表进行了分析与评估。Immutable\
  \ X 是一个基于区块链的协议，专为交易和创建非同质化资产（NFT）而设计。图 8-7 展示了 Immutable X 在创世时的代币供应分配情况，而图 8-8\
  \ 则以实时表格形式显示了相应的归属时间表。\n\n![IMX 代币的归属时间表表格，详细列出了生态发展、项目发展、私募轮、基金会储备、公募轮 1 和公募轮 2\
  \ 等不同轮次。每轮均包含 TGE 解锁百分比、锁仓期、已解锁与已锁定数量、下次解锁日期以及归属条款摘要。总供应量中，82.4% 已解锁，17.6% 处于锁定状态。](img/648696_1_En_8_Fig8_HTML.jpg)\n\
  \n图 8-8\n\nImmutable X 归属时间表（图表由 [`​cryptorank.​io/​price/​immutable-x/​vesting`](https://cryptorank.io/price/immutable-x/vesting)\
  \ 提供）\n\n![饼图展示了固定供应量 20 亿 $IMX 的代币分配。各部分分别为：51.72% 用于生态发展，25% 用于项目发展，13.86% 用于私募轮，5.42%\
  \ 用于公募轮，4% 用于基金会储备。每个部分都采用不同颜色，并附有用途说明，例如用户奖励、开发者资助和流动性储备。](img/648696_1_En_8_Fig7_HTML.jpg)\n\
  \n图 8-7\n\nImmutable X 代币分配（图表由 [`​imx.​community/​tokenomics`](https://imx.community/tokenomics)\
  \ 提供）\n\n归属时间表的第一列详细列出了分配类别，以及分配给每类分配的相应代币数量（与图 8-7 匹配）。标题为“TGE 摘要”的列详细说明了在代币生成事件（TGE）中解锁的占总供应量的百分比。TGE\
  \ 是指代币（或币）公开发布到市场的时刻。第三列概述了为每项分配设定的*锁仓期*，指明了代币发布后需要等待的解锁时间。\n\n### 基金会储备代币\n\n评估归属时间表时，首先要查看在代币生成事件（TGE）时哪些分配及其多大比例会被释放。如果\
  \ TGE 尚未发生，或者您已参与公募轮，这一点尤其重要。对于 Immutable X 而言，基金会储备是在 TGE 时唯一被释放的分配，并且已完全解锁；由于这些代币被指定用于长期项目需求，而非即时流动性，因此\
  \ TGE 后大规模抛售的风险已大大降低。然而，计划在 TGE 时购买代币的投资者仍需确定下一批代币计划何时进入流通，以及释放的比例是多少。\n\n### 公募轮代币\n\
  \n接下来计划释放的是*公募轮*代币（占总供应量的 5.42%）和*生态发展*分配，这两部分都计划在 TGE 后四周（四周锁仓期）释放。如摘要列所述，公募轮代币计划在三个月内每四周释放\
  \ 33%。根据 `CryptoRank.io` 和 `Tokenomist.ai` 等代币归属追踪平台的说法，这种释放时间表是常见做法；然而，情况并非总是如此，有些项目甚至会一次性释放其全部公募轮分配。这并无对错之分；不过，将释放时间分散在三个月内，往往有助于缓和剧烈的价格波动。\n\
  \n### 生态发展代币\n\n*生态发展*分配代币的释放结构更为复杂，时间跨度从 2021 年到 2025 年。这种释放时间表对投资者不构成威胁，因为这些代币释放缓慢，且专门用于生态发展。\n\
  \n### 项目发展代币\n\n*项目发展*分配遵循类似的释放时间表，但在任何代币释放之前有一个一年的锁仓期。从“已解锁-已锁定”列可以看出，这两项分配仍在持续释放，直到\
  \ 2025 年 10 月进行最终分配。在表格底部，显示剩余待分配代币为 3.517 亿枚，占总供应量的 17.6%。\n\n专业建议\n\n`Cryptorank.io`\
  \ 是一个分析实时加密货币归属时间表及其他一系列财务数据的绝佳网站。在这里，投资者可以直观地看到下一次代币解锁的时间，从而做好相应准备。\n\n### 私募轮代币\n\
  \n私募轮和种子轮代币的释放对大多数项目来说都是一个威胁。这些代币通常由机构投资者和私募股权公司以极低的单价买入。这些投资者一旦获得代币使用权，便寻求锁定利润，其结果导致市场承受巨大的抛售压力，从而压低代币单价。通常，这类投资者在出售时总是盈利的，因为他们购买代币的成本极低，相比之下，公募轮参与者以及在公开市场上购买代币的人则不然。根据项目的受欢迎程度，这些高端机构投资者获得\
  \ 10 倍到 50 倍的收益是常见情况。\n\n就 Immutable X 而言，*私募轮*代币有一个 11 个月的锁仓期，之后释放时间表从 2022 年 11\
  \ 月持续到 2024 年 4 月（约 17 个月）。与其他项目相比，这种锁仓期和释放结构值得称赞。许多项目允许私募轮和种子轮代币的一部分在 TGE 时释放，这会严重影响公募轮参与者和公开市场的买家，通常会导致严重的价格波动，对大多数缺乏经验的投资者和交易者产生负面影响。然而，IMX\
  \ 公募轮参与者相比之下得到了更好的保护，因为根据释放时间表，他们在私募轮代币之前就能收到全部代币。尽管如此，持有 IMX 代币的投资者通常会在私募轮代币释放前或释放时经历代币单价的轻微下跌。例如，在\
  \ 2022 年 11 月 3 日这批私募轮代币（占 13.90% 的 40.60% = 总供应量的 5.64%）释放后的头几天里，代币单价从大约 0.70 美元下跌超过\
  \ 40% 至 0.40 美元。虽然有经验的交易者可能会尝试利用这些剧烈波动，或者至少在这段时间内坚持持有其投资，但大多数投资者会恐慌性地抛售他们的代币，即使这意味着承受严重损失。请注意，大约七周后，IMX\
  \ 代币价格开始上涨，并在短短 11 周内价值翻了三倍。然而，情况并非总是如此，因此投资者有责任了解并为这种代币解锁做好准备。\n\n### 项目团队代币\n\n\
  由于 [Immutable X](https://www.immutable.com/) 团队并未获得代币分配，因此对投资者而言，唯一的潜在威胁是*私募轮*代币的释放。\n\
  \n专业建议\n\n在 TGE 时——即代币进入市场及其后几天——买入通常会带来双向的剧烈价格波动；上涨空间可能巨大，但下跌也同样残酷。因此，除非您确实信心十足（且经验丰富），否则更明智的做法是等待市场企稳后再入场。\n\
  \n\n\n### 解锁时间表基准\n\n解锁时间表并非一门精确的科学，会根据项目需求以及项目团队和顾问的偏好略有不同。一个诚实且专注的团队的核心目标是制定一个有助于维持项目长期成功的解锁时间表，同时减少严重的抛售压力，避免剧烈的价格波动。这意味着团队需要有足够的启动资金用于开发和运营，并确保代币能够缓慢且逐步地释放到流通中。这种解锁基准结构见表\
  \ 8-3。\n\n请注意，“释放时间表”为每项分配指定了“均匀分布”。这是一种理想情况，有助于最大限度地减少剧烈的价格波动（就加密货币领域而言）。另一种流行的选择是基于里程碑的解锁，即只有在项目达到特定的产品或生态系统目标时，才会释放新一批代币。话虽如此，项目在首次释放时释放\
  \ 10%–40% 的配额，然后在此之后均匀分布是很常见的。例如，对于合格投资者，在锁仓期结束后，可能会释放 25%，然后在接下来的三年内，将剩余的 75% 按日、周或月均匀分布。如前所述，问题通常越大，抛售压力就越大。因此，完全均匀分布，或者至少在\
  \ 15% 的初始释放中仅释放 10%，是值得称赞的。\n\n对于投资者而言，如果项目尚未启动或仍有大量代币未解锁，解锁时间表就很重要。然而，对于那些所有代币或币种已完全解锁的项目，解锁时间表往往不那么关键。如果遇到与表\
  \ 8-3 的重大偏差，请停下来，进一步调查，并且在调查结果令人满意且疑虑得到解决之前，不要进行投资。\n\n**表 8-3** 值得称道的解锁时间表和锁仓参数\n\
  \n| 解锁时间表基准 |\n| --- |\n| 分配对象 | TGE 解锁比例 | 锁仓期 | 释放时间表 |\n| --- | --- | --- | ---\
  \ |\n| 团队与创始人 | 0–5% | 1 或 2 年 | 至少 4 年（均匀分布） |\n| 合格投资者（私募/种子轮） | 0% | 1 或 2 年\
  \ | 至少 3 年（均匀分布） |\n| 合作伙伴与顾问 | 0% | 至少 1 年 | 至少 2 年（均匀分布） |\n| 社区与生态系统发展 | 30%\
  \ | 1 个月 | 至少 4 年（均匀分布） |\n| 财务储备 | 20% | 2 个月 | 至少 4 年（均匀分布）（用于维持稳定，支持项目的长期增长、发展和成功）\
  \ |\n| 公开销售投资者 | 0% | 1 个月 | 6 个月（均匀分布） |\n\n#### 专家提示\n\n投资者面临的一个持续挑战是，在评估解锁和分配时间表时，会用到不同的定义和术语。如有疑问，请联系项目团队以获取澄清。请记住，没什么可隐瞒的项目通常都有明确定义的供应分配和解锁时间表。\n\
  \n### 行动步骤\n\n遵循以下步骤来评估项目的解锁时间表，以确定其对代币供应稳定性、价格波动性以及项目团队对长期成功的承诺的影响。\n\n1. **查找解锁时间表**\
  \  \n   找到项目的解锁时间表。有时这很难找到，尤其是如果项目已经启动多年。首先，访问项目的官方网站和博客。还可以查看 `Cryptorank.io` 和\
  \ `Tokenomist.ai`，比较它们的数据，并通过社区渠道（Discord、Telegram 和治理论坛）交叉核对最新信息。如果团队已上传解锁时间表，`CoinGecko.com`\
  \ 和 `CoinMarketCap.com` 有时会托管这些信息。\n\n2. **评估解锁时间表**  \n   使用“解锁时间表评估”部分中概述的解锁时间表分析技术来评估解锁时间表的状态。\n\
  \   1. **TGE 解锁比例** – 检查在 TGE 时会释放多少代币供应量。是否存在任何令人担忧的分配在 TGE 时有高比例解锁，可能导致抛售压力和价格下跌？\n\
  \   2. **锁仓期** – 审查锁仓期。是否有没有锁仓期的分配？或者锁仓期很短的分配？是否有多个锁仓期在同一时间结束，可能导致价格剧烈波动和抛售压力？\n\
  \   3. **分配时间表** – 逐步的代币释放时间表比一次性大量释放更值得称赞。错开分配往往能最大限度地减少价格波动。\n   4. **社区与生态系统发展分配**\
  \ – 是否有部分生态系统发展代币在 TGE 时或 TGE 后不久释放？在初始代币一次性释放后，缓慢、逐步的代币释放是值得推崇的。\n   5. **合格投资者分配**\
  \ – 密切关注私募和种子轮代币的锁仓期和解锁时间表。早期支持者在第一时间卖出是很常见的，这会给代币价格带来下行压力。\n   6. **团队与顾问分配** –\
  \ 验证项目团队是否为其代币制定了合理的解锁时间表。一个较长的锁仓期表明团队对项目长期成功的承诺。\n\n3. **解锁时间表基准**  \n   将解锁时间表与“解锁时间表基准”部分中概述的解锁时间表进行比较。\n\
  \n4. **竞争对手分析**  \n   将解锁时间表与成功竞争对手的解锁时间表进行比较。\n   1. 是否有明显差异？如果有，这些差异会如何影响你的投资？\n\
  \n5. **记录笔记，并以你自己的风格记录发现**\n\n6. **将发现与基本面评估流程的其他部分结合起来**\n\n#### 评估结果\n\n如果你发现与解锁时间表基准存在显著偏差，或发现本节中讨论的类似问题，请暂缓进行任何投资。只有在你的疑虑得到充分解决和澄清后，才继续推进。\n\
  \n\n\n"
- '# 9. 财务指标


  本章将讨论数字资产的财务指标，包括链上和链下财务指标。链上指标指直接记录在区块链上的信息，例如总交易量、活跃地址数量以及当前处于盈利状态的流通供应百分比。另一方面，链下指标通常是记录在中心化服务器上的数据——例如来自中心化交易所的价格和交易量——并上报给诸如
  `CoinMarketCap.com` 等数字资产价格追踪网站。请注意，报告的交易所交易量可能会通过洗售交易或机器人活动被人为夸大，因此务必与链上数据以及来自信誉良好、受监管场所的交易量进行交叉核对。


  评估数字资产的历史财务数据，能够为项目整体表现、基本面健康状况以及自诞生以来是处于衰退还是增长趋势提供宝贵的洞察。这也包括其熊市和牛市的表现、稳定性以及未来潜力。通过使用多种链上财务指标，投资者可以识别和分析市场趋势及价格行为模式。在分析价格行为时，目标是利用一项或多项指标找到汇聚点，从而帮助预测每个币的资产价格未来走势。这种方法使投资者能够战略性地规划获利了结和买入策略，以适应吸筹区、派发区以及价格在这些区域之间波动的过渡区域。


  使用诸如 `市值（MC）`、`完全稀释估值（FDV）`、`总锁定价值（TVL）` 和 `总质押价值（TVS）` 等多种财务指标，投资者可以评估资产的受欢迎程度、可信度、用户互动、经济潜力以及整体表现。将这些数据与其他链上财务指标和技术分析相结合，能显著增强投资者的洞察力，从而在投资时实现更高效的风险管理，并更精确地确定入场和出场点位。


  ## 财务指标软件


  本章将使用多种财务指标软件来分析数字资产的财务和基本面健康状况。此类软件包括 [Glassnode](https://studio.glassnode.com/home)、[Bitcoin
  Magazine](https://www.bitcoinmagazinepro.com/) Pro、[CoinMarketCap](https://coinmarketcap.com/)
  和 [DeFi Lama](https://defillama.com/chains)。其他流行的加密资产财务指标软件还包括 [Token Terminal](https://tokenterminal.com/terminal)、[Messari](https://messari.io/)、[Dune
  Analytics](https://dune.com/home) 和 [Nansen](https://www.nansen.ai/)。


  `Glassnode` 是本章用于深入分析链上指标数据的主要软件，且多数采用比特币作为示例说明。该软件专为数字资产投资者设计，用于分析和评估那些标准金融市场的网络分析平台（例如交易图表和价格行为数据）无法实现的关键链上指标。`Glassnode`
  提供了数百种链上指标数据工具；因此，本书仅在范围内讨论最相关的指标。鼓励投资者研究并探索 `Glassnode` 以及类似网站，如 `Bitcoin Magazine
  Pro`、[CryptoQuant](https://cryptoquant.com/) 和 [CoinMetrics](https://coinmetrics.io/)，这些网站提供了直接从区块链获取的广泛链上数据分析资源。其中包括详细的指标仪表盘、可下载的
  API、量化交易和风险管理工具，以及适合多种投资策略的自主交易辅助工具。


  **事实**


  量化交易中的交易所风险管理，是一种通过使用由链上分析（如 `Glassnode` 的实时交易所流量仪表盘和 `Bitcoin Magazine Pro` 的）提供的自动化模型，来追踪各个交易所的流动性和杠杆变动，并动态调整头寸规模或对冲策略以限制回撤风险的实践。


  如前所述，需要注意的是，本章涵盖了多项链上指标，其中许多主要仅适用于比特币，某些情况下也适用于其他非常流行的币种和代币。原因在于，那些较新、规模较小且市值较低的币种和代币通常不被追踪，因此无法获取其数据水平。然而，由于比特币拥有最大的市值和最高的市场主导权，理解其价格波动能为投资者洞察其他山寨币和代币的潜在入场和出场点位提供宝贵依据。尽管如此，仍鼓励投资者探索不同的分析工具，因为大多数
  DeFi 项目都提供了充足的财务数据供评估——[DeFi Lama](https://defillama.com/chains) 对于所有 DeFi 项目来说都是一个极佳的选择。


  **本章讨论的基本指标：**


  - `市值和完全稀释估值`

  - `实现市值`

  - `实现市值与 HODL 波浪`

  - `流动性与交易量`

  - `总转账量`

  - `总质押价值（TVS）`

  - `总锁定价值（TVL）`

  - `费用与收入`

  - `交易次数`

  - `通胀率`

  - `投资者工具`

  - `供应量盈利百分比`

  - `活跃地址`

  - `余额大于 1 万比特币的地址数量`

  - `MVRV 比率`

  - `MVRV Z-Score`

  - `未实现净盈亏（NUPL）`

  - `哈希率`

  - `网络价值与交易信号（NVTS）`

  - `Stock-to-Flow 模型`


  ## 市值与完全稀释估值


  **评估目标：评估项目的市值和完全稀释估值（FDV），以确定潜在风险，包括未来代币稀释、通胀影响，以及是否符合你的投资策略。**


  识别并分析项目的财务估值是投资者首要也是最重要的评估步骤。项目的估值通过评估 `市值` 和 `完全稀释估值（FDV）` 来确定。市值基于流通中的代币，提供了项目当前价值的快照。而完全稀释估值——也称为完全稀释市值——则着眼于若所有代币都进入流通后其潜在的未来价值。`市值`
  和 `完全稀释估值` 最终都是由由买卖双方构成的市场来计算的，但它们的计算方式不同。




  ### 市值


  市值（Market Capitalization，简称 Market Cap）是指项目流通供应量的总市场价值，参见公式 9-1。需要明确的是，市值并不包含被锁定、归属、或尚未开采/铸造的代币。由于交易所有时会虚增交易量，而数据网站也可能误报流通供应量，因此在依赖市值数据前，建议从两到三个追踪平台（如`CoinMarketCap`、`CoinGecko`和`Messari`）获取数据，并对任何较大差异进行合理性检查。项目的市值是通过将流通供应量乘以每枚代币的价格计算得出的——例如，图
  9-1 展示了[波卡网络](https://polkadot.com/)的财务指标（数据来自[`CoinMarketCap.com`](https://CoinMarketCap.com/)）。波卡市值的计算方式如公式
  9-2 所示。


  ```

  市值 = 流通供应量 x 每枚代币价格

  ```


  ***公式 9-1.**计算市值的公式*


  ```

  15.1 亿 x 4.13 美元 = 62.2 亿美元（CoinMarketCap 取整为 62.1 亿美元）

  ```


  ***公式 9-2.**计算波卡网络市值的公式*


  ![波卡（DOT）加密货币仪表盘截图。当前价格为 4.13 美元，24 小时下跌 1.69%。市值为 621 亿美元，下跌 1.67%。过去 24 小时交易量为
  1.0243 亿美元，下跌 6.60%。完全稀释估值（FDV）为 62.1 亿美元。交易量与市值之比为 1.66%。总供应量为 15.1 亿枚 DOT，流通供应量相同。最大供应量为无限。](img/648696_1_En_9_Fig1_HTML.jpg)


  图 9-1


  波卡网络在 CoinMarketCap 上的财务数据（数据来源：[`https://coinmarketcap.com/currencies/polkadot-new/`](https://coinmarketcap.com/currencies/polkadot-new/)）


  ### 完全稀释估值


  完全稀释估值（Fully Diluted Valuation，简称 FDV）是指项目全部代币供应量（包括流通中的代币以及被锁定和归属的代币）的总市场价值。其计算方式是将最大供应量乘以代币价格，参见公式
  9-3。需要明确的是，市值仅指流通中的代币（流通供应量），而 FDV 则指当前流通中的代币加上尚未释放到流通中的锁定代币（最大供应量）——例如，图 9-2 展示了[雪崩](https://www.avax.network/)区块链网络的财务指标（数据来自[`CoinMarketCap.com`](https://CoinMarketCap.com/)）。雪崩的完全稀释估值计算方式如公式
  9-4 所示。


  ```

  完全稀释估值 = 最大供应量 x 每枚代币价格

  ```


  ***公式 9-3.**计算完全稀释估值（FDV）的公式*


  ```

  7.15 亿 x 29.28 美元 = 209.57 亿美元（CoinMarketCap 取整为 209.6 亿美元）

  ```


  ***公式 9-4.**计算波卡网络完全稀释估值（FDV）的公式*


  ![雪崩（AVAX）加密货币仪表盘截图，显示价格为 29.28 美元，24 小时上涨 0.18%。市值为 119.1 亿美元，上涨 0.18%。24 小时交易量为
  3.8017 亿美元，上涨 16.10%。完全稀释估值（FDV）为 209.6 亿美元。交易量与市值之比为 3.19%。总供应量为 4.4661 亿枚 AVAX，最大供应量为
  7.1575 亿枚 AVAX，流通供应量为 4.0661 亿枚 AVAX。](img/648696_1_En_9_Fig2_HTML.jpg)


  图 9-2


  雪崩财务数据（数据来源：[`https://coinmarketcap.com/currencies/avalanche/`](https://coinmarketcap.com/currencies/avalanche/)）


  专业建议


  比较市值与完全稀释估值，可以揭示是否存在即将释放大量代币的情况，这可能对代币价格产生影响。


  如果未指定最大供应量，则意味着供应量没有固定上限，因此对代币的总量没有限制。如果提供了最大供应量，最好在计算中使用它，因为它能考虑所有将被创建出来的代币，从而得到更准确的结果。但是，如果没有给出最大供应量，则应改用*总供应量*。


  ### 获取市值与 FDV


  投资者对于市值和完全稀释估值（FDV）哪个指标更重要存在许多争论。建议同时确定这两个指标并进行相互比较。如果 FDV 显著高于当前市值，则表明可能有许多代币计划在未来释放。如果
  FDV 与市值之间的差距很小，则意味着未来稀释的风险较低。


  雪崩（图 9-2）的 FDV 为`209.6 亿美元`，而市值仅为`119.1 亿美元`。这表明最大供应量中还有 43%（`1 - (11.91 / 20.96)`）将通过解锁和通胀释放到流通中。根据基本的供需原理，当一个项目向流通中释放更多代币而需求保持不变时，每枚代币的价格将会下跌。如果对该代币的需求增加，价格则会上升。因此，为谨慎起见，建议检查相应的归属时间表，以确定下一次和最后一次解锁计划的时间。请注意，投资者还需检查通胀预计何时结束。通胀可能在最后一次解锁后持续多年——在治理驱动的网络中，甚至可能被延长或调整，尤其是在没有固定供应上限的情况下。不过，这对自己投资的影响程度取决于计划持仓的时间长短——通胀持续五年或更长时间才达到硬顶（最大供应量）是一种常见情况。


  请注意，市值提供了当前估值，而完全稀释估值则侧重于未来的市场价值。因此，市值对短期投资者更为相关，而 FDV 则更适用于展望一两年或更长时间的长期投资者。尽管如此，检查并分析这两个指标相对快速，短期和长期投资者都应进行此操作。



