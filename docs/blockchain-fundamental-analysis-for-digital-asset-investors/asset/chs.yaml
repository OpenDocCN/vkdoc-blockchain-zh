- "# 区块链分层“生态系统”评估\n\n在投资零层（L0）、一层（L1）、二层（L2）和三层（L3）区块链时，将其作为生态系统而非单个项目来评估会更有益处。区块链生态系统是一个围绕特定区块链协议构建的、由基于链的应用程序、参与者和技术组成的互联网络。不要采用单一的类似\
  \ GDP 的指标，而应将区块链生态系统视为一个经济体，考察多项指标——网络活动、开发者参与度、总锁仓价值（`TVL`）和链上收入——来衡量其价值创造与创新能力。每个生态系统都应像评估一个“国家”那样进行评估，以便在特定的区块链评估标准下判断网络的整体健康状况和价值。\n\
  \n尽管技术（如互操作性、可扩展性和去中心化程度）非常重要，但区块链生态系统的潜在价值源于开发者增长与留存、基础设施技术实力、链上竞争以及协同软件集群等标准，并且也应依据这些标准进行评估。以下各节将详细介绍如何评估区块链网络生态系统，并为每个评估标准提供示例。\n\
  \n## 价值创造效率\n\n### 开发者增长与留存\n\n开发者的增长与留存对于生态系统的创新、效率和实力至关重要。图 6-3 展示了来自[`DeveloperReport.com`](https://DeveloperReport.com/)的一张图片，详细列出了顶级生态系统的月活跃开发者数量。该数据进一步细分为全职开发者人数和开发者总人数，并以百分比形式显示一年到两年内开发者数量是增加还是减少。投资者可以进一步操作该表格，查看每个生态系统中开发者数量的最高增长和最高减少情况。\n\
  \n![表格展示了截至 2024 年 7 月 1 日按月活跃开发者数量排名的顶级生态系统。列出了以太坊、Base、Polygon 等生态系统，包含全职开发者与开发者总数两列。标注了一年和两年的百分比变化，部分数值以绿色高亮表示增长，粉色高亮表示减少。以太坊拥有最高的开发者人数，而比特币最低。](img/648696_1_En_6_Fig3_HTML.jpg)\n\
  \n**图 6-3** – 顶级生态系统的月活跃开发者（数据来源：[`https://www.developerreport.com/`](https://www.developerreport.com/)）\n\
  \n**专业提示：** 查看由 [Electric Capital](https://www.electriccapital.com/) 生成的“[开发者报告](https://www.developerreport.com/developer-report?%253Fs%253Ddeveloper-report)”，可以深入了解顶级生态系统的开发者指标详情。\n\
  \n### 基础设施技术实力\n\n基础设施的可访问性以及功能和`dApps`的易用性（例如去中心化钱包以及用于购买、出售和交易数字资产的各种浏览器扩展）对于支持生态系统的发展至关重要。访问[`AlphaGrowth.io`](https://AlphaGrowth.io/)可以轻松获取特定生态系统中某一细分领域的软件应用数量。\n\
  \n从下拉菜单中选择所需的生态系统和`dApp`类型，即可显示所选生态系统中该特定细分领域的`dApps`数量。例如，图 6-4 显示了以太坊区块链上去中心化钱包应用的详细信息和数量——在编写本书时总共有\
  \ 62 个。\n\n![表格展示了按市值排名的以太坊区块链顶级钱包项目。列包括项目名称、类别、TVL、1 日和 30 日变化、市值、1 日和 30 日收入、用户数和交易量。表格突出显示了\
  \ Coin98、MATH 和 Bilira 为前三名项目。界面包含 TVL、MCap、收入、用户、Twitter、Telegram、Discord 和交易量等标签页，当前已选择“钱包”和“以太坊”。](img/648696_1_En_6_Fig4_HTML.jpg)\n\
  \n**图 6-4** – 按市值排名的以太坊区块链顶级钱包（数据来源：[`https://alphagrowth.io/projects/top-wallets-projects-on-ethereum-by-market-cap-value`](https://alphagrowth.io/projects/top-wallets-projects-on-ethereum-by-market-cap-value)）\n\
  \n**专业提示：** 由于以太坊是最古老、最成熟的智能合约平台，拥有最悠久的历史和最广泛的`dApp`生态系统，建议将所有发现与以太坊在相同的分析参数下进行比较。这将很好地表明与以太坊相比，该基础设施的技术实力水平如何。\n\
  \n除了去中心化钱包和各种类型的浏览器扩展之外，一个生态系统还必须拥有足够的开发者软件和基于学习的编码应用程序，并为加入生态系统的新创作者提供配套文档——通过快速简便的检查即可确定这一点。例如，通过简单的浏览器搜索以太坊开发者工具，可以定位到`Ethereum.org`上的以太坊学习工具（[`https://ethereum.org/en/developers/learning-tools/`](https://ethereum.org/en/developers/learning-tools/)）。以太坊的学习门户包含数十个应用程序，新手可以在其中学习编写代码并在测试环境中进行部署——参见图\
  \ 6-5。此外，以太坊还有大量可供使用的配套文档，涵盖了从初学者到高级的广泛专业知识，包括介绍、基础、智能合约和各类教程等类别。\n\n除了通过`Ethereum.org`提供的开发者软件和文档之外，还有许多网站提供学习工具、环境和配套文档，帮助新手学习以太坊的原生语言\
  \ [Solidity](https://soliditylang.org/)。将以太坊作为基准，因为它存在时间最长，并且提供了丰富的开发者工具和指南。\n\n\
  ![网页截图，标题为“通过编码学习”，展示了用于实验以太坊的工具。页面包含一个名为“代码沙箱”的板块，有六张卡片，每张代表一个不同的工具：Replit、DApp\
  \ World、Remix、Atlas、ChainIDE、Tenderly 和 Eth.build。每张卡片包含简短描述、相关技术（如 Solidity 和 web3）以及一个打开工具按钮。页面背景为深色，顶部有导航栏，包含学习、使用、构建、参与和研究等选项。](img/648696_1_En_6_Fig5_HTML.jpg)\n\
  \n**图 6-5** – 以太坊的学习门户，包含数十个应用程序，新手可在其中学习编写代码并在测试环境中部署（截图来源：[`https://ethereum.org/en/developers/learning-tools/`](https://ethereum.org/en/developers/learning-tools/)）\n\
  \n## 链上竞争与协同\n\n### 链上竞争\n\n为了支持并培育一个不断发展的生态系统，同一生态系统内相同细分领域的`dApps`之间必须存在充分的竞争。如果提供相同产品或服务的软件应用缺乏直接竞争，就会产生不良的垄断，阻碍创新，导致开发停滞、用户成本高昂，以及生态系统低效且不健康。\n\
  \n\n\n投资者检查链上竞争的最有效方式是访问[`AlphaGrowth.io`](https://AlphaGrowth.io/)，筛选所需的生态系统，再进一步筛选特定产品或服务。例如，图\
  \ 6-6 展示了来自[`AlphaGrowth.io`](https://AlphaGrowth.io/)（[`https://alphagrowth.io/projects/top-dex-projects-on-binance-smart-chain-by-tvl`](https://alphagrowth.io/projects/top-dex-projects-on-binance-smart-chain-by-tvl)）的一张图片，其中所有去中心化交易所（DEX），总共\
  \ 369 个，都构建在[币安智能链](https://www.bnbchain.org/en/bnb-smart-chain)上。BSC 上如此之高的 DEX\
  \ 数量表明活动频繁；然而，需要注意的是，这些项目中有许多是交易量低的简单分叉，因此除了关注宏观数据外，还需验证其质量和实际使用情况。\n\n![表格显示了币安智能链上各种去中心化交易所(DEX)的数据。列包括项目、类别、总锁定价值(TVL)、1\
  \ 日、7 日和 30 日百分比变化、市值(MCap)、1 日、7 日和 30 日收入、用户数和交易量。值得注意的条目包括 PancakeSwap，其 TVL\
