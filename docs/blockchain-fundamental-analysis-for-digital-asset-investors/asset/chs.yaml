- "# 预挖发射\n\n**示例：** [瑞波币](https://ripple.com/) 和 [恒星币](https://stellar.org/)\n\n\
  与公平发射模式相反，如今启动的大多数项目都采用预分配（通常称为“预挖”）方式。顾名思义，在预挖发射中，一定比例的总原生资产在发射前被预先挖出并分配给特定群体（例如创始团队、顾问、生态发展、投资者、私募和公募投资者等）。尽管这种方法有许多好处，但它通常会导致代币在初期高度集中于少数人手中（具体取决于代币分配结构），这可能引发中心化控制。有关代币分配细节的更多信息，请参见第\
  \ 8 章“代币经济学”中的“代币分配模型”部分。\n\n**优势**\n\n*   **推动项目启动** – 项目团队可以高效地出售预挖资产，以在营销、合作、开发等关键领域启动项目，从而更有效地推动项目启动。\n\
  *   **激励开发者** – 分配给开发者的预挖资产有助于激励其持续进行开发。\n*   **私募融资优势** – 来自私募投资公司的资金可以做好充分的财务准备，并为项目团队提供专业建议和策略，以辅助成功发射。\n\
  \n**劣势**\n\n*   **崩盘风险** – 如果没有合适的代币分配模型，由于代币集中在少数人手中，项目面临很高的失败风险，这会导致过度中心化和治理问题。\n\
  *   **社区不信任** – 可能导致社区缺乏信任，尤其是在存在不公平或缺乏透明度认知的情况下。\n*   **市场操纵** – 在发射时及随后的几周内，大型代币持有者施加巨大抛售压力的风险很高。\n\
  \n## 简化筛选公开发行项目\n\n查看正在进行和计划中的公开代币销售（包括 ICO、IDO 和 IEO）最有效的方式是通过专门的加密货币市场洞察和分析平台进行搜索，例如\
  \ [ICO Drops](https://icodrops.com/)、[CryptoRank](https://cryptorank.io/active-ico)\
  \ 和 [ICO Holder](https://icoholder.com/)。虽然公开发售项目很诱人，但切勿想当然地认为，仅仅因为它们是在合法平台上做广告和托管，风险就降低了——事实并非如此。这些网站很大程度上是列表聚合器，并不会对项目进行全面的尽职调查。这些平台上会持续推广新的加密货币初创公司，宣称它们将是下一个大项目。然而，鉴于新的加密货币初创公司风险最高，并且大多数在最初的炒作热潮过后就销声匿迹，因此在投资任何公开发售（`ICO`、`IEO`、`IDO`、`IFO`\
  \ 等）之前，进行充分的尽职调查至关重要。投资者有责任避开公开发售骗局，同时识别出基础面强劲、风险最低且投资回报最高的项目。\n\n在本节中，您将找到一系列快速基础检查清单，旨在帮助您筛选出骗局和基础面糟糕的项目。其目的是通过突出值得进一步关注的投资机会，来帮助简化您的公开发售项目筛选过程。但请注意，这些检查只是起点，一旦确定了初步筛选出的潜在公开发售投资项目，就需要按照本书所述进行完整、详细的基础面评估。\n\
  \n\n\n#### 项目概要\n\n每个为特定项目宣传 ICO、IDO、IEO 等公开发售的网站，都会包含一份价值主张摘要。例如，图 15-7 展示了摘自 [CryptoRank](https://cryptorank.io/)\
  \ 的 [*Patex Network*](https://patex.io/) 的详细信息。这些细节至少应包括：公开发售类型（如 IDO）、硬顶（45 万美元）、项目分类（如区块链基础设施），以及项目及其价值主张的摘要。\n\
  \n![一张网页截图，详细展示了 Patex 区块链生态系统。页面突出显示了一个正在进行的 IDO（初始 DEX 发行）代币销售，已筹集 45 万美元。关键信息包括代币价格\
  \ 0.950 美元，待售 105,263 个代币，以及 10 万美元的募资额。平台为 DAO Maker，锁仓规则为 TGE 解锁 15%，悬崖期 1 个月，线性释放期\
  \ 1 年，每日解锁。在“关于 Patex”部分，将其描述为针对拉丁美洲地区的解决方案，是监管机构与用户之间的桥梁。“什么是 Patex？”部分解释其为一种用于央行数字货币的第二层区块链、一个中心化加密货币交易所和一个社区奖励系统。右侧显示了一系列热门币种及其价格和百分比变化。](img/648696_1_En_15_Fig7_HTML.jpg)\n\
  \n图 15-7\n\n[Patex Network](https://patex.io/)——CryptoRank.io 上的项目概要（图片致谢 [`​cryptorank.​io/​ico/​patex`](https://cryptorank.io/ico/patex)）\n\
  \n> **警告**\n> \n> 那些缺乏技术评估能力的影响者，有时会被操控，去推广基本面很差且通常带有诈骗性质的公开发售项目。投资者必须自行进行基本面评估，不要依赖那些毫无可信度的影响者所传播的二手信息。\n\
  \n顾名思义，项目概要是对项目价值主张的简要总结。一份好的概要应当精确且切中要点。它应该包含关键信息，包括对独特用例及其所解决问题的简短描述。简而言之，高质量的用例能够解决已知问题——无论是针对加密货币项目还是传统中心化公司——或者提供某种价值主张，以补充如以太坊和比特币等重大项目，为整个区块链生态系统增加价值。投资者在审核公开发售项目的概要部分时，必须注意以下危险信号。\n\
  \n- **细节模糊** – 缺乏关于产品或服务的具体技术信息以及相应的价值主张。\n- **资金分配不明确** – 硬顶不清楚，或未说明资金将如何在项目内使用。\n\
  - **时间线不清晰** – 关于代币生成事件、产品发布或其他关键里程碑没有明确的时间线。\n- **模仿项目** – 用例或产品描述听起来与比特币或以太坊等重大项目相似。\n\
  - **匿名团队** – 没有提供关于团队（创始人、开发者等）的可见信息或资质证明，或者团队明确声明将保持匿名。\n- **不合规** – 无视 KYC/AML\
  \ 要求或其他法律准则——这对于受监管的发售（如 STO）是一个重大危险信号，但即使在无需许可的发售（如许多 ICO 或 IDO）中也值得注意。\n- **语法错误**\
  \ – 拼写错误或语法混乱表明缺乏专业性。\n\n> **警告**\n> \n> 当我刚开始投资数字资产时，我向一个骗局 ICO（首次代币发行）发送了一个 ETH。我受到了花哨、诡诈营销的影响，情绪占据了上风。直到发现自己被骗后，我才认真查看了那个网站。我注意到上面有很多拼写错误、低质量的图片、虚假的领英资料以及写得很差的白皮书。这是宝贵的教训。研究和尽职调查是关键。\n\
  \n#### 软顶与硬顶\n\n当加密货币项目通过公开代币销售获取资金时，会使用特定的财务参数，即*软顶*和*硬顶*。软顶和硬顶代表了项目旨在筹集的最低和最高资金额度。\n\
  \n**软顶** 是项目为能够启动或继续开发而旨在筹集的最低金额。它被视为项目在其路线图中实现基本目标所需的最低可行资金。如果未达到软顶，资金通常会返还给参与者——但前提是代币销售智能合约中编写了退款功能，因此投资者在出资前应始终审查这些条款。\n\
  \n**硬顶** 是项目旨在筹集的最高金额。项目资源需求决定了硬顶，通常包括用于开发、营销、运营、法律合规等领域的资金。一旦销售达到最大代币数量或筹集到目标资金金额（例如\
  \ 100 万美元），则不再接受更多出资，公开融资轮次将关闭。例如，假设一个团队决定设定 3000 万个代币的硬顶，并在公开发售正式结束日期前成功售出此数量，那么无论投资者是否仍有兴趣，代币销售都将结束。筹集的资金使团队能够全力继续开发。硬顶的核心目的是防止项目资金过剩，这可能与资金不足一样有害，因为它可能扭曲代币经济模型，并导致管理不善或资金浪费。\n\
  \n#### 硬顶分析\n\n如果公开代币销售的硬顶已达到，这是非常值得称赞的。这表明早期投资者对该项目感兴趣。例如，图 15-8 展示了一个名为 Neon Labs\
  \ 的项目的公开发售细节——它是一个基于 Solana 的以太坊虚拟机（EVM），使 dApp 开发者能够使用以太坊工具进行扩展并访问 Solana 的流动性。Neon\
  \ Labs 设定了 4500 万美元的硬顶，并完全实现了这一目标。Neon Labs 硬顶被触及的事实表明，该项目引起了显著的早期兴趣，这是一个积极信号。此外，不仅硬顶达到了，而且与其他通过公开发售融资的项目相比，4500\
  \ 万美元的额度也被认为是高的——这表明了强烈的兴趣。\n\n![一张网页截图，展示的是区块链服务 Neon。页面将 Neon Labs 描述为 Solana\
  \ 上的以太坊虚拟机，使 dApp 开发者能够在 Solana 上使用以太坊工具。主要文字写着“从两条链中与最佳者共同成长”，突出了每秒 4500 笔交易的高吞吐量和每笔交易\
  \ 0.000005 SOL 的低 Gas 费用。右侧部分显示了一个已于 2023 年 6 月 15 日结束的代币销售，筹集了 45,000,000 美元，达到了目标的\
  \ 100%。页面上还有“网站”和“白皮书”按钮，以及社交媒体图标。](img/648696_1_En_15_Fig8_HTML.jpg)\n\n图 15-8\n\
  \nICO Drops 上的 Neon Labs ICO：达到 4500 万美元硬顶（图片致谢 [`​icodrops.​com/​sophiaverse/​`](https://icodrops.com/sophiaverse/)）\n\
  \n> **专业提示**\n> \n> 通过评估项目是否已经盈利并需要额外资金，来验证指定融资硬顶的合理性。路线图中是否有重要的开发需求和里程碑？这笔资金是否用于提升公司价值？公司没有融资轮次能否生存？团队是否值得托付筹集的资金？谁控制着筹集的资金：团队、一个\
  \ DAICO 还是其他人？将这一点与竞争对手过去的融资轮次进行比较。\n\n\n\n### 代币标准\n\n审查代币标准有助于深入了解开发团队的工作投入和专业水平。例如，[ERC-20](https://ethereum.org/en/developers/docs/standards/tokens/erc-20/)\
  \ 代币只需极低技术门槛即可创建。然而，在项目自有公链上发行代币则需要耗费大量精力、投入和专业能力。可以说，从宏观层面看，那些投入大量时间、精力和资源进行开发的项目往往更真实可靠——至少在首次代币发行（ICO）阶段如此。相反，旨在欺骗或诈骗的项目通常只会投入最少的时间和资源，企图快速牟取暴利。因此，对于涉及\
  \ `ERC-20` 或类似易于创建的代币标准的公开发售，建议格外谨慎并进行更深入的初步筛选。这类代币开发简单，常被试图偷工减料或快速获利的项目使用。投资者也可在项目白皮书中找到代币标准的详细信息。\n\
  \n### 代币单价\n\n单独评估代币单价（或代币价格）可能具有误导性。例如，*项目 A* 公开发售单价为 `0.50 美元`，总供应量为 3000 万枚，其投资回报率（ROI）潜力高于\
  \ *项目 B*——后者单价同为 `0.50 美元`，但总供应量高达 100 亿枚。基于供需关系，*项目 A*（代币供应量较低）由于稀缺性、市场需求及较低的市值，盈利潜力更大，**价格**和**市值**翻倍的速度也更容易更快。\n\
  \n- *项目 A：市值 = 0.50 美元 x 3000 万 = 1500 万美元*\n- *项目 B：市值 = 0.50 美元 x 100 亿 = 50 亿美元*\n\
  \n因此，建议在评估项目代币经济学中的代币单价时，应综合考虑发行时的代币数量以及相关的释放计划——详见第 9 章“财务指标”中“市值与完全稀释估值”部分，其中对此有更详细的讨论。\n\
  \n图 15-9 展示了 Patex Network 代币（`PATEX`）的计划中的首次去中心化交易所发行（IDO），代币单价范围为 `0.95 美元` 至\
  \ `1.00 美元`。考虑到 Patex Network 的最大代币供应量仅为 `8,000,000`（`PATEX`），并将供应量的 `13.25%` 分配给\
  \ IDO 参与者（图 15-10），该项目值得进一步研究。更具体地说，基于这些细节，包括颇具吸引力的释放计划（图 15-11），此次 IDO 代币单价被认为具有吸引力。\n\
