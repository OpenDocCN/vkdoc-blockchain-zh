  \ 关注者。表格高亮显示了诸如“流动性质押”、“Cosmos 生态系统”和“NFT 市场”等类别。界面包括“所有类别”和“Cosmos”筛选器。数据呈现在深色主题布局中，绿色和红色文本分别表示正向和负向变化。](img/648696_1_En_6_Fig7_HTML.jpg)\n\
