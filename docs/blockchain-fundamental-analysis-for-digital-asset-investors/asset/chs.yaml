  NFT 还促进了现实世界资产的代币化，这是同质化代币无法实现的，因为它们无法在数字上表示独特性。构建于 *Polkadot 网络* 上的 [Centrifuge](https://centrifuge.io/)
  和构建于 *Kusama 网络* 上的 *Altair* 是首批将现实世界资产引入链上的协议。这家基于 `DeFi` 的公司使*中小型企业*或个人能够将发票、版税、高价值
  NFT、房地产甚至抵押贷款等现实世界资产代币化——而这仅仅是个开始。投资者为这些代币化资产提供流动性，作为回报，他们将获得稳定的链上奖励。这可以想象成在链上投资现实世界的公司。


  ### 封装代币


  封装代币的提出是为了克服不同区块链之间缺乏通信的问题。它们是在一条区块链上代表另一条区块链原生代币的数字资产，促进了跨链互操作性。其创建方式是通过锁定原始资产并在不同链（如以太坊）上铸造相应的封装版本，例如封装比特币（`WBTC`）。这一过程使比特币等资产能够参与去中心化金融（`DeFi`）应用，否则它们将无法兼容。虽然封装代币带来了流动性等优势，但同时也重新引入了信任问题，因为第三方托管人必须管理被锁定的基础资产。


  ### 稳定代币


  创建稳定代币是为了保持价值稳定，通常平均波动幅度不超过约百分之一。这些代币通常与法定货币（例如美元）挂钩，或者在某些情况下，甚至与黄金等大宗商品挂钩（例如 [Paxos
  Gold](https://paxos.com/paxgold/)）。根据稳定代币的不同，价格稳定性通过不同的方法来维持。例如，虽然一些稳定币由实物储备支持（抵押稳定币），但另一些则使用算法来调节供需（算法稳定币）。稳定代币对投资者很有吸引力，因为它们在等待投资机会时被认为是一种安全且稳定的价值储存手段。此外，许多稳定代币可以进行质押，让投资者在无需担心价格波动的情况下赚取质押奖励。




  ### 代币标准


  代币标准可描述为一套规则、条件和功能，允许在不同区块链协议上开发数字资产。代币标准规定了代币的运作方式，包括促进区块链、去中心化应用（`dApps`）和智能合约之间的交互。许多代币标准服务于不同的目的，包括同质化和非同质化资产、钱包集成、链上和链下事件以及多资产。


  最常见的代币标准是以太坊的 `ERC`（Ethereum Request for Comment，以太坊征求意见提案）——有关其他流行的 `ERC` 代币标准，请参见表
  7-2。以太坊的 `ERC-20` 代币标准是应用最广泛且最强大的标准之一。`ERC-20` 为 `USDT` 和 `DAI` 等同质化代币建立了标准。这意味着每个代币具有相同的特征，使得每个代币在类型和价值上都相同。在成为标准之前，`ERC`
  必须通过 `EIP`（以太坊改进提案）由社区进行审查、评议和接受。表 7-2 概述了 Ethereum.org 定义的常见 `ERC` 代币标准。符合 `ERC-20`
  标准的代币必须实现六个主要功能：


  **表 7-2** 常见的 ERC 加密代币标准


  | 代币名称 | 代币代码 | 代币类型 | 用途 |

  | --- | --- | --- | --- |

  | 以太坊征求意见提案 | `ERC-20` | 同质化 | 用于同质化（可互换）代币的标准接口，例如投票代币、质押代币或虚拟货币。 |

  | 以太坊征求意见提案 | `ERC-721` | 非同质化 | 用于非同质化代币的标准接口，例如艺术品或歌曲的产权证书。`ERC-721` 标准规定每个 `NFT`
  拥有全局唯一 ID，可转让，并可选择包含元数据。 |

  | 以太坊征求意见提案 | `ERC-777` | 同质化 | `ERC-777` 允许开发者通过外部*发送/接收钩子*添加额外功能，例如用于更好隐私保护的混币器合约，或在代币生态系统集成情况下的可选密钥恢复服务。（`ERC-777`
  改进了 `ERC-20` 并与之向后兼容。） |

  | 以太坊征求意见提案 | `ERC-1155` | 同质化/非同质化 | `ERC-1155` 允许更高效的交易和交易捆绑，从而节省成本。此代币标准允许创建实用代币（例如
  `$BAT`）和 [VeeFriends](https://veefriends.com/) 等非同质化代币。 |

  | 以太坊征求意见提案 | `ERC-4626` |  | 一种代币化金库标准，旨在优化和统一收益型金库的技术参数。 |

  | 以太坊征求意见提案 | `ERC-1238` | 同质化/非同质化 | 允许在一个智能合约中管理同质化和非同质化的不可转让代币。例如，在一次交易中铸造徽章和声誉积分。
  |


  1. `totalSupply` – 返回流通中的代币总供应量。

  2. `balanceOf` – 返回特定账户的代币余额。

  3. `transfer` – 将一定数量的代币从发送方转移到特定地址。

  4. `transferFrom` – 允许代表另一个账户转移代币，前提是该账户已获得授权。

  5. `approve` – 授权一个支出者从发送方账户中提取指定数额的代币。

  6. `allowance` – 返回一个支出者被允许从所有者账户中转移的剩余代币数量。


  并非所有区块链都采用以太坊的代币标准。事实上，大多数区块链基础设施都会生成一种特定于其区块链需求的代币标准。`BEP-20` 是币安智能链的代币标准，类似于 `TZIP-7`
  和 `TZIP-12` 是 Tezos 区块链的标准。区块链基础设施的增长导致产生了许多新的代币标准——其中一些标准在表 7-3 中进行了概述。


  **表 7-3** 常见的加密代币标准


  | 代币名称 | 代币代码 | 代币类型 | 用途 |

  | --- | --- | --- | --- |

  | Tezos 互操作性提案 | `TZIP-7` | 同质化 | 类似于 `ERC-20`，`TZIP-7` 实现了代币转移操作以及从其他账户支出代币的授权功能。
  |

  | Tezos 互操作性提案 | `TZIP-12` | 多资产/非同质化 | `TZIP-12`（`FA2`）是一个标准，旨在为合约开发者提供更强的表达能力以创建新型代币，同时为钱包集成商和外部开发者维护通用的接口标准。
  |

  | Tezos 互操作性提案 | `TZIP-10` | 钱包交互 | `TZIP-10` 是一个 Tezos 改进提案，规定了 `dApps` 与钱包交互的标准方式。
  |

  | NEO 增强提案 | `NEP-5` | 同质化 | 为代币化智能合约提供带有通用交互机制的系统。 |

  | NEO 增强提案 | `NEP-11` | 非同质化 | 创建 `NFT` 合约的标准。 |

  | 币安智能链演进提案 | `BEP-20` | 同质化 | `BEP-20` 是币安智能链上的一个代币标准，它扩展了 `ERC-20`。`BEP-20` 定义了代币如何被花费、谁可以花费它们以及其使用的其他规则。
  |


  ## 代币化资产


  资产代币化是区块链技术的一种扩展，它使得有形或无形对象可以被转换为可购买、出售和交易的数字资产（代币）。资产的代币化允许将该资产分割为一个或多个数字代币，从而实现投资者之间的共同所有权。投资者可以自由地数字化存储、交易和转让他们的真实或虚拟资产，无需任何中央依赖或第三方、实体或中介的干预，前提是此类转让符合相关司法管辖区的证券法、财产转让法或其他相关法规。有关可代币化的有形资产和无形资产的示例，请参考表
  7-4。


  **表 7-4** 可代币化的有形资产与无形资产示例


  | 有形资产（实物资产） | 无形资产（虚拟资产） |

  | --- | --- |

  | 房地产 | 产权证 |

  | 车辆 | 专利 |

  | 设备 | 商标 |

  | 库存 | 版权 |

  | 艺术品 | 软件 |

  | 贵金属（例如银、金和铂） | 许可证 |




