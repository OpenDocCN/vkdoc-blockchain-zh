  \ BTC 的挑战。\n\n### 交易所交易基金（[方舟投资](https://ark-invest.com/)、[Amplify 转型数据共享 ETF (BLOK)](https://amplifyetfs.com/blok/)、[范埃克比特币策略\
  \ ETF (XBTF)](https://www.vaneck.com/us/en/investments/bitcoin-strategy-etf-xbtf/overview/)、[ProShares\
  \ 比特币策略 ETF (BITO)](https://www.proshares.com/our-etfs/strategic/bito)）\n\n交易所交易基金（ETF）是在美国证券交易委员会注册的投资公司，为投资者提供将资金集中投资于股票、债券或其他数字资产的基金。正如其名，ETF\
  \ 在交易所进行交易，类似于股票，并跟踪基础资产的表现。此外，投资者还可能从基金中获得股息。大多数 ETF 由投资顾问进行专业管理。当投资者购买一份 ETF 份额时，他们就成为了该基金的\
  \ partial 所有者。ETF 可以专注于特定领域或行业，例如能源行业 ETF。就区块链领域而言，ETF 分为以下三种类型：\n\n1.  **区块链 ETF**\
  \ – 区块链 ETF 是主题型交易所交易基金，持有专注于开发区块链技术的公司股票。例如：[Amplify 转型数据共享 ETF (BLOK)](https://amplifyetfs.com/blok/)\n\
  2.  **实物数字资产 ETF** – 实物比特币 ETF 是一种提供现货数字资产价格敞口的 ETF。自 2024 年 1 月起，美国证券交易委员会已批准多只现货比特币（实物）ETF——例如，贝莱德\
  \ iShares 比特币信托 (IBIT) 和富达 Wise Origin 比特币基金 (FBTC)——使美国投资者能够受到监管地接入基础资产。\n3.  **数字资产期货\
  \ ETF** – 一种跟踪数字资产期货合约表现的交易所交易基金。它们是一种衍生投资证券，允许投资者推测特定资产的未来价格。例如，通过投资比特币期货 ETF，投资者无需持有数字货币本身即可获得比特币价格波动的敞口。示例：[范埃克比特币策略\
  \ ETF (XBTF)](https://www.vaneck.com/us/en/investments/bitcoin-strategy-etf-xbtf/overview/)\
  \ 和 [ProShares 比特币策略 ETF (BITO)](https://www.proshares.com/our-etfs/strategic/bito)\n\
  \n### 交易所交易产品（[富达 Wise Origin 比特币基金 (FBTC)](https://institutional.fidelity.com/advisors/investment-solutions/asset-classes/alternatives/fidelity-wise-origin-bitcoin-fund)）\n\
  \n交易所交易产品（ETP）是在交易所交易的一类金融证券。ETP 跟踪基础资产或指数的表现。一个例子是[富达 Wise Origin 比特币基金 (FBTC)](https://institutional.fidelity.com/advisors/investment-solutions/asset-classes/alternatives/fidelity-wise-origin-bitcoin-fund)。`FBTC`\
  \ 由富达数字资产托管的比特币 100% 实物支持，并在美国（Cboe BZX）和欧洲交易所交易。\n\n### 政府拨款（[欧盟区块链观察站](https://www.eublockchainforum.eu/)、[美国国家科学基金会\
  \ (NSF) 拨款](https://www.nsf.gov/)）\n\n政府拨款是政府机构为支持和促进区块链研发提供的非股权资助。[欧洲区块链观察站与论坛](https://www.eublockchainforum.eu/)是欧盟委员会的一项倡议，旨在加速欧盟内部的区块链创新和区块链生态系统发展，并帮助巩固欧洲作为这项变革性新技术全球领导者的地位。\n\
  \n### 银行贷款（[摩根大通](https://www.jpmorganchase.com/)、[美国银行](https://www.bankofamerica.com/)、[富国银行](https://www.wellsfargo.com/)）\n\
  \n银行向区块链公司提供传统贷款，以助力区块链技术和新兴“加密货币”初创项目的发展。\n\n## 机构投资优势\n\n-   **可信度** – 机构投资者通过先进的长线投资策略、基本面与技术分析（包括市场研究、风险管理、宏观经济趋势）以及机构级工具进行的广泛尽职调查，为项目和资产增添了可信度与合法性。这有助于吸引大量散户投资者，并鼓励进一步投资。\n\
  -   **机构采纳** – 机构投资者的崛起推动着更高的合规标准，提升了透明度、市场诚信度和投资者信心。\n-   **资本获取** – 通过大量机构投资，项目可以通过招募顶尖人才、加速开发和运营以及资助大规模营销活动，更快速、更高效地扩展规模。\n\
  -   **大额资金** – 机构投资者能够投入巨额资金，有助于降低波动性，同时增加稳定性。\n-   **流动性** – 机构投资者将成熟的交易策略带入区块链市场，有助于提高流动性和市场效率。\n\
  -   **能见度与兴趣** – 机构投资吸引更多的专业投资公司和传统市场投资者进入加密货币领域。\n\n## 机构投资劣势\n\n-   **监管审查** –\
  \ 机构投资者的参与可能会引起监管机构更多的关注，给项目带来额外的审查和合规挑战。\n-   **依赖少数投资者** – 如果项目过度依赖机构资金，这些投资者的退出或失败可能会危及整个项目。\n\
  -   **项目声誉** – 如果机构投资者抛售其持有的代币，可能会损害项目声誉，导致项目团队和所有其他利益相关者产生不确定性。\n-   **有限的风险承受能力**\
  \ – 大多数机构投资者会避开非常早期或高风险的项目，而专门的加密货币风投公司和专项基金仍可能会对其进行配置。\n-   **投资限制** – 根据项目注册地点的不同，机构投资者可能会被限制投资特定项目。\n\
  \n专业提示\n\n访问信誉良好的机构和私人投资公司的网站，研究它们所投资的项目。这些投资公司在投资前会进行专业的基本面和技术分析。\n\n\n\n### 机构投资评估\n\
  \n除比特币和以太坊之外的机构投资相当罕见，正因如此才更值得关注。当一家大型机构投资于某种另类数字资产时，可将其视为一个强烈的积极信号，因为这证实了该项目已通过严格评估并符合严格标准。识别这类资产对投资者而言可能是一个显著优势，因为机构参与意味着项目拥有扎实的基本面、合规性及强大的长期潜力。\n\
  \n#### 机构投资的验证\n\n来自企业、风险投资公司、对冲基金、银行及政府机构的机构资金，能为区块链项目带来极高的可信度，使其区别于仅通过公开发行融资的项目。因此，虽然并非关键因素，但若有声誉良好的投资机构投资于该项目，则是一大优势。\n\
  \n投资者可通过访问项目官方网站，并通过在线研究核实其所声称的投资情况来评估项目的机构支持度。例如，以 [Aave](https://aave.com/) 为例，浏览器搜索结果显示`Aave`是`Grayscale`投资产品中持有的基础资产之一，投资者可通过该基金间接获得风险敞口。这一点已通过`Grayscale`官方网站得到验证（图\
  \ 15-1），同时该资产也显示在`Grayscale DeFi Fund`的持仓中（图 15-2）。\n\n![表格展示了截至 2024 年 11 月 27\
  \ 日的加密货币持仓情况。表格列出了五项持仓：UNI (Uniswap)，每股 1.12405750 个资产，权重 59.03%；AAVE (Aave)以红色高亮显示，每股\
  \ 0.02202522 个资产，权重 17.72%；MKR (Maker)，每股 0.00130034 个资产，权重 9.48%；LDO (Lido DAO)，每股\
  \ 1.31388674 个资产，权重 9.09%；SNX (Synthetix)，每股 0.48249713 个资产，权重 4.68%。总持仓数为 5。](img/648696_1_En_15_Fig2_HTML.jpg)\n\
  \n图 15-2\n\nGrayscale DeFi 基金（图片来源于 [`grayscale.com/products/grayscale-decentralized-finance-fund/`](https://grayscale.com/products/grayscale-decentralized-finance-fund/)）\n\
  \n![表格列出了金融类加密资产。左列包括：Aave (AAVE)、MakerDao (MKR)、Synthetix (SNX)、Uniswap (UNI)。右列包括：Aerodrome\
  \ (AERO)、Ethena (ENA)、Injective Protocol (INJ)、Jupiter (JUP)*、Mantra (OM)、Ondo Finance\
  \ (ONDO)、Pendle (PENDLE)、THORChain (RUNE)。左侧注释说明：“金融类：包含旨在提供金融交易和服务的加密资产。”](img/648696_1_En_15_Fig1_HTML.jpg)\n\
  \n图 15-1\n\nGrayscale 2025 年数字资产组合（图片来源于 [`grayscale.com/assets-under-consideration-and-current-products/`](https://grayscale.com/assets-under-consideration-and-current-products/)）\n\
  \n### 行动步骤\n\n请遵循以下步骤来评估潜在的机构投资，以判断该项目是否因机构支持而获得了额外的可信度和更强的基本面。\n\n1. **判断是否存在机构投资**\
  \  \n   访问项目网站，判断该项目是否拥有任何形式的机构投资。投资该项目的公司通常列在主页面上一一特别是那些知名、可信的机构投资者。\n\n2. **核实机构投资**\
  \  \n   通过查看投资机构的官方网站，核实其声称的任何机构投资。确认该机构是否确实投资了该项目。\n\n3. **做好笔记，按自己的风格记录发现**\n\n\
  4. **将发现结果与基本面评估流程的其他部分相结合**\n\n#### 结果评估\n\n尽管机构投资具有诸多优势，但许多成功的项目在没有机构投资的情况下也同样蓬勃发展一一因此，它并非项目成功的关键因素。然而，如果项目拥有机构投资，应将其视为一个重大的积极因素。这代表该项目可能具备强大的基本面，因为它已通过了投资公司严格的基本面和技术评估。\n\
  \n## 私募融资\n\n***评估目标：验证并评估项目的私募融资情况，包括评估相关投资机构的声誉和专业能力。***\n\n区块链领域的私募融资是指由风险投资公司、天使投资人、私募股权公司或高净值个人等私人主体向区块链项目和基于\
  \ Web3 的公司进行的投资。虽然有时也包含机构投资，但它与代币发行或销售等公开发行方式不同，后者通常由散户投资者投入较小金额。私募融资通常涉及更大的投资金额，并可能附带特定条款，比如股权所有权、投票权、一定比例的代币供应或可转换债券。\n\
  \n### 私募融资类型\n\n私募融资公司有多种不同的类型一一这些类别详见表 15-2。\n\n表 15-2\n\n区块链行业中的私募融资方案类型\n\n\n\
  \n| 私人融资 |\n| --- |\n| 融资类型 | 描述 |\n| --- | --- |\n| 天使投资人（[纳瓦尔·拉维康特](https://nav.al/)、[蒂姆·德雷珀](https://www.timothydraper.com/)）\
  \ | 天使投资人是成功的创业者、商业专业人士或富裕的个人，他们为早期初创项目或公司提供资金，通常以换取股权为条件。天使投资人通常投资于高风险事业；除了资本投资外，他们通常会提供指导。`Tim\
  \ Draper` 是一位著名的天使投资人，投资过许多区块链公司。除了比特币和以太坊，`Tim Draper` 还投资了其他项目，包括[比特币现金 (BCH)](https://bitcoincash.org/)、[Tezos\
  \ (XTZ)](https://tezos.com/)、[瑞波币 (XRP)](https://ripple.com/)、[Polygon (POL)](https://www.polygon.com/)，以及向一家名为\
  \ [Aragon (ANT)](https://aragon.org/) 的新初创公司投资了 100 万美元。 |\n| 对冲基金（[Valmar Capital](https://www.valmar.io/)、[Bluesky\
  \ Capital](https://www.blueskycapitalmanagement.com/systematic-crypto/)） | 对冲基金是汇集私人及机构投资者资金的私人投资工具。它们从各种来源收集投资，然后跨不同资产类别（如证券、期货合约、期权、债券、货币和数字资产）以及金融市场实施交易策略。对冲基金通过收取管理服务费以及从为投资者赚取的利润中抽取一定百分比来产生收入。大多数美国专注于区块链的对冲基金顾问会向美国证券交易委员会（SEC）注册，但基金本身通常依据私募基金豁免条款（例如\
  \ `3(c)(1)` 或 `3(c)(7)`）运营，这意味着它们不受《投资公司法》全部规定的约束。尽管许多对冲基金策略旨在短期持有，但投资者的资本仍可能受到锁定期和预定赎回窗口的限制，因此流动性并非总是即时的。“*对冲基金通常被视为机构进入数字资产领域的门户*”。它们由行业投资专家和专业交易员管理，他们部署各种策略以帮助投资者最大化回报并降低风险。这些策略至少通常包括基本面和技术分析，同时利用市场波动并执行多头和空头头寸。针对不同的投资者，存在不同类型的对冲基金。对冲基金主要投资于货币、大宗商品、公开股票，以及近年来——数字资产。[Valmar\
  \ Capital](https://www.valmar.io/) 是一个面向机构投资者的数字资产对冲基金示例。该平台的运作方式是将资本分配到多种交易策略和交易风格（系统化与基本面策略），这些策略有助于形成一个全面、多元化的投资组合，从而帮助降低和减轻投资者的风险。\
  \ |\n| 风险投资公司（[Polychain Capital](https://polychain.capital/)、[Coinbase Ventures](https://www.coinbase.com/ventures)、[Pantera\
  \ Capital](https://panteracapital.com/)、[Blockchain Capital](https://www.blockchaincapital.com/)）\
  \ | 风险投资（VC）公司是资助新初创企业、早期阶段公司和创业项目的投资者，以此换取股权、资产以及可能的董事会席位。风险投资通常投资于可能盈利也可能不盈利，但具有长期盈利潜力的私营公司。因此，与投资于更成熟公司的对冲基金相比，风险投资策略被认为风险更高。此外，风险投资属于长期投资，投资者的资金会被锁定较长时间，被视为流动性差。风险资本融资的主要目标是为高增长潜力的企业提供财务支持、知识和行业专长、战略方向以及资源，以帮助这些公司成长。此外，风险投资公司还帮助处理监管障碍、业务发展、市场营销、社区建设和代币上市。这使得新初创公司和早期公司能够加速发展和扩大运营，从而实现快速扩张。一个著名的风险投资公司例子是\
  \ [Polychain Capital](https://polychain.capital/)。`Polychain Capital` 分析并投资于早期阶段的尖端区块链公司，包括\
  \ [Parity Technologies](https://www.parity.io/)、[0(1) Labs](https://o1labs.org/)\
  \ 和 [Web3 Foundation](https://web3.foundation/)。 |\n| 私募股权（[Franklin Templeton Blockchain\
  \ Fund II, L.P](https://www.sec.gov/Archives/edgar/data/1974921/000197492123000001/xslFormDX01/primary_doc.xml)）\
  \ | 顾名思义，私募股权是对私营公司的股权资本投资。在典型的私募股权交易中，资本从高净值个人、大型公司和机构筹集，以购买私营公司的股份，希望最终实现该股份价值的增长。私募股权投资是长期策略，期限从两年到十年以上不等。由于漫长的锁定期，投资者的资本被视为流动性差。私募股权公司通常更常与投资成熟企业相关联。然而，这些公司已开始对初创领域表现出越来越大的兴趣，其中一些公司已将资金分配给早期阶段投资。此外，近年来，私募股权公司已开始投资于更成熟的区块链公司，通常会购买大量股份。私募股权基金和风险资本基金都购买私营公司的股份，但它们的区别不仅仅在于时机：风险投资通常通过较小规模、基于里程碑的轮次来资助早期增长，而私募股权则将更大规模的资金池部署到后期或成熟公司中，通常采用并购或规模化策略以及独特的交易来源渠道。私募股权基金投资的公司比风险投资基金进入阶段的企业要成熟得多。私募股权基金在更晚的阶段投资这些公司，以确保公司承诺的技术或应用已被证明有效，并且公司已准备好规模化，从而降低基金的风险敞口。在撰写本书时，私募股权投资公司\
  \ [Franklin Templeton](https://www.franklintempleton.com/) 已向美国证券交易委员会（SEC）提交了一份名为“*Franklin\
  \ Templeton Blockchain Fund II, L.P*”的私募股权基金申请。这个 Blockchain Fund II 是一只私募股权基金，最低投资额为\
  \ 10 万美元。 |\n| 自筹资金（自我融资型初创公司） | “自筹资金”一词指的是个人如何通过个人财务或新公司的营业收入来创办和建立公司的过程。自我融资的创始人不会利用任何形式的外部投资，而是通过使用血汗股权（Sweat\
  \ Equity）、个人储蓄（包括从家人或朋友处借入或投资的资金）以及初始销售收入来自我资助业务。区块链项目经常采用自筹资金的方式来促进增长和扩张。自我融资的启动并不罕见——比特币（2009\
  \ 年，无预挖或外部融资）和 [Monero](https://www.chainbits.com/reviews/monero-review/)（2014 年，无首次代币发行（ICO）或风险投资背景）都是从创始人的血汗股权和社区矿工开始的，这证明了一个项目可以在没有外部资本的情况下成长。\
  \ |\n| 战略投资与合作伙伴关系 | 战略合作伙伴关系是两个或多个公司之间的关系，它们同意相互支持以帮助双方取得成功。尽管合作伙伴保持独立，但协作与伙伴关系旨在实现互惠互利、协同效应、长期利益、风险分担以及对联合行动的掌控。与纯粹旨在实现投资回报（ROI）的财务投资不同，战略合作伙伴关系通常是在公司需要在其现有业务中获取新能力时建立的。在区块链领域，这方面的例子可能包括“加密”项目投资于其他提供互补服务（如互操作性、可扩展性、安全性或创新）的项目。区块链领域战略合作伙伴关系的一个例子是\
  \ [Immutable](https://www.immutable.com/) 与 [Polygon Labs](https://polygon.technology/)\
  \ 的合作关系。`Immutable` 和 `Polygon Labs` 合作，利用零知识技术构建一条专用的游戏区块链，以加速去中心化游戏开发，推动 Web3\
  \ 更接近大规模普及。 |\n\n\n\n"
- "# 专业提示\n\n由区块链研发公司 [Web3 基金会](https://web3.foundation/) 资助的项目在投资者眼中备受推崇。该基金会处于区块链技术和去中心化网络（Web3）的前沿，致力于筛选高质量项目，培育用于去中心化网络软件协议的前沿应用。\n\
  \n## 私募融资优势\n\n-   **早期支持** – 私募融资公司更愿意对早期初创企业承担风险，而机构投资者则通常更青睐成熟项目。\n-   **投资灵活性**\
  \ – 某些私募工具，例如加密货币对冲基金，可以同时运行多头和空头策略，而私募股权和风险投资基金通常只做多。即便如此，与大多数传统机构基金相比，私募工具通常受到的投资组合授权限制更少。\n\
  -   **速度快** – 私募融资轮次比机构投资完成得更快，后者通常涉及更多的繁文缛节和尽职调查。\n-   **关系更紧密** – 天使投资者和其他私募出资方通常会促进更密切的个人关系，从而带来更多信任、更好的沟通和共识。\n\
  -   **信誉背书** – 私募融资为项目增加了可信度和合法性，因为私募融资公司通常会进行透彻的技术和基本面分析。\n-   **快速获得资金** – 通过私募融资，项目可以通过招聘顶尖人才、加速开发和运营、资助大规模营销活动等方式快速扩张。\n\
  -   **高风险投资** – 私募投资者，尤其是那些风险承受能力高的投资者，比机构投资者更愿意支持高风险项目。\n-   **战略合作伙伴关系** – 除了资金，私募融资公司往往还提供战略指导、运营专长以及人脉资源，例如其他投资者、潜在客户和合作伙伴，这些都有助于项目获得高价值的战略合作。\n\
  -   **监管推动** – 当大量私募资本涌入一个区块链项目时，可能会使该项目（有时甚至是整个行业）进入监管机构的视野，从而可能加速制定更清晰的合规和披露规则。\n\
  -   **增加流动性** – 对冲基金和类似的私募投资者通常采用短期策略来提高市场流动性，使散户和机构参与者都能受益。\n-   **专业知识和经验** –\
  \ 私募融资公司经常带来专业的知识、运营经验和战略专长，帮助项目克服复杂的挑战。\n\n## 私募融资劣势\n\n-   **市场波动性** – 如果没有合适的归属时间表，私募股权公司大规模撤资可能会对散户投资者产生负面影响，导致代币价格下跌和市场波动加剧。\n\
  -   **资金有限** – 私募融资通常比机构投资提供的资金少，可能不足以支持大型项目。\n-   **监管审查** – 私募融资可能会吸引监管机构更多的关注，从而带来额外的合规要求和审查。\n\
  -   **高股权占比** – 根据风险水平，私募投资者通常会要求较高的股权或代币供应比例。\n-   **法律风险** – 非正式或结构不当的私募融资交易可能导致法律诉讼，尤其是在监管合规问题未得到解决的情况下。\n\
  \n## 私募投资评估\n\n私募融资对项目可能非常有利，尤其是当资金来自信誉卓著的融资公司时。然而，一些加密货币项目会虚假声称获得了知名私募融资公司的支持，以提高自身可信度。因此，投资者在投资前，必须核实项目团队所做的任何私募融资声明，以及他们的过往业绩、声誉和能力。\n\
  \n### 核实私募融资\n\n投资者应通过直接与融资来源确认，来核实任何私募融资的声明。这旨在确定团队是否值得信赖、透明且诚实。一个简单的检查就能确认某家私募融资机构是否投资了一个项目。例如，图\
  \ 15-3 显示 [Acala Network](https://acala.network/) 声称 [Polychain Capital](https://polychain.capital/)\
  \ 是其项目的私募投资者。这一点可通过 Polychain Capital 的官方网站（图 15-4）得到验证，网站上显示 Acala 是其投资组合的一部分。\n\
  \n![工作列表界面的截图，展示了三家公司：=nil；、Acala Network 和 Agoric。每个列表都包含公司名称、标志、职位数量和描述性标签。Acala\
  \ Network 突出显示，带有“区块链和加密货币”、“金融”、“软件”、“11-50”和“IPO”等标签。每个列表都有“忽略”或“收藏”选项。](img/648696_1_En_15_Fig4_HTML.jpg)\n\
  \n图 15-4\n\nPolychain Capital——在其投资组合中确认 Acala Network（图片来源：[`​jobs.​polychain.​capital/​companies`](https://jobs.polychain.capital/companies)）\n\
  \n![各种公司和企业的标志以网格形式展示。标有“Polychain Capital”的标志以红色边框突出显示。其他可见的标志包括 Republic、Coinbase\
  \ Ventures、KR1、HasKey Capital、SNZ 等。此图片代表一组投资或金融实体。](img/648696_1_En_15_Fig3_HTML.jpg)\n\
  \n图 15-3\n\n[Acala Network](https://acala.network/) 的投资者（图片来源：[`​acala.​network/​`](https://acala.network/)）\n\
  \n### Crunchbase\n\n投资者可以使用 Crunchbase 来核实一家知名的风险投资公司是否投资了一个项目。Crunchbase 是一个为销售专业人士、CEO、风险投资家和投资者提供实时公司数据的平台。例如，通过使用\
  \ Crunchbase，投资者可以核实项目声称已获得的任何融资、筹集了多少资金以及资金来源。以 Acala Network 从 Polychain Capital\
  \ 获得融资为例——这一点已通过 Crunchbase 平台得到验证；见图 15-5。\n\n![“A 系列融资 - Acala Network”的投资总结截图，显示了\
  \ 16 位投资者。突出显示的“Polychain”条目显示了一个弹出窗口，其详细信息为：“Polychain Capital invests in cryptocurrency\
  \ and blockchain assets,”（Polychain Capital 投资加密货币和区块链资产）地点位于美国加利福尼亚州旧金山。列出了 204\
  \ 项投资和 7 项退出。其他投资者包括 ParaFi Capital、Pantera Capital、KR1 和 Hypersphere Ventures。可见一个“SAVE”（保存）按钮。](img/648696_1_En_15_Fig5_HTML.jpg)\n\
  \n图 15-5\n\n通过 Polychain Capital 验证 Acala Network 的融资（图片来源：[`​www.​crunchbase.​com/​funding_​round/​acala-network-series-a--bf148606`](https://www.crunchbase.com/funding_round/acala-network-series-a%252D%252Dbf148606)）\n\
  \n\n\n### 私募投资者的声誉与角色\n\n项目通常从多家私募投资公司获得资金，其中一些可能不像 `Polychain Capital`、`Coinbase\
  \ Ventures`、`Pantera Capital` 或 `Blockchain Capital` 这样知名。因此，对于长期投资者而言，研究和评估这些不太知名的公司的声誉及区块链经验至关重要。\n\
  \n此外，私募投资者通常能提供远超单纯资金的价值。如前所述，新成立的初创公司迫切需要并从经验丰富的私募投资公司那里获益良多，这些公司能提供优质的指导、专业知识以及专业人脉资源，助力项目充分发挥潜力。\n\
  \n在分析私募投资公司时，建议采用以下分析标准进行评估。可靠的公司信息通常可以通过在线研究获取，包括其官方网站和各种区块链社区论坛。\n\n1.  **过往业绩**\n\
  \    1.  他们此前资助过哪些区块链项目？\n    2.  他们此前资助的项目成功吗？\n2.  **投资方式**\n    1.  他们通常在一个项目中投资多长时间？\n\
  3.  **声誉**\n    1.  在网上能否找到关于该投资公司的负面或正面评价？\n    2.  他们在区块链社区中的口碑如何？\n4.  **超越资本的价值**\n\
  \    1.  除了资金，他们是否提供指导和技术专长？\n    2.  他们的顾问在区块链领域是否拥有良好、可信的声誉？\n5.  **合作关系与网络**\n\
  \    1.  他们能否带来战略联系和专业人脉网络？\n\n### 行动步骤\n\n请按照以下步骤验证和评估项目的私募融资情况，包括评估相关投资公司的声誉和专业知识。\n\
  \n1.  **私募投资公司**\n    浏览项目的官方渠道（如项目官网和博客），获取团队声称的私募投资公司名单。\n2.  **资金验证**\n    验证项目声称已获得的任何融资。\n\
  \    1.  访问私募投资公司的网站，查看其投资组合以核实项目融资情况。\n    2.  此外，通过 `Crunchbase` 平台进一步核实任何融资信息。\n\
  3.  **调研**\n    按照“私募投资者的声誉与角色”部分概述的评估标准，对每家私募投资公司进行调查。\n4.  **做笔记并用你自己的方式记录发现**\n\
  5.  **将发现与基本面评估流程的其他部分相结合**\n\n#### 结果评估\n\n私募投资者在区块链领域拥有良好的声誉、可靠的过往记录和高水平的专业知识，并能将这些优势惠及项目，这无疑是值得赞赏的。然而，并非要求项目必须拥有私募融资，只要项目能从其他渠道获得充足资金、拥有足够的专业人脉以及内部技术专长来执行其愿景即可。\n\
  \n## 公开发行\n\n**评估目标：将项目的公开发行融资模式评估为潜在的投资机会。**\n\n区块链领域的公开发行通常指向公众出售数字代币以筹集资金的过程。这些代币销售通过加密货币项目使用的各种公开发行模式来执行，以便为开发价值主张获得资金。项目团队选择的公开发行方案类型受多种因素影响，包括融资金额、融资上限、开发阶段、监管考量、复杂性、可信度和信任度。\n\
  \n### 公开发行模式类型\n\n本节将探讨不同类型的公开发行模式。了解每种融资模式的风险、缺点和局限性，有助于投资者在参与公开发行的代币销售时做出明智的投资决策。\n\
  \n#### 首次代币发行 (ICO)\n\n**示例：** [以太坊 ICO](https://icodrops.com/ethereum/) 和 [IOTA\
  \ ICO](https://icodrops.com/iota/)\n\n首次代币发行 (ICO) 是一种创业项目筹集资金的过程，作为交换，投资者获得受密码学保护的数字资产，这些资产旨在成为该项目在去中心化应用\
  \ (dApp) 上未来产品或服务的唯一支付手段。在 ICO 中，项目团队从头到尾组织和管理整个代币发行。这包括在代币销售后直接向 ICO 参与者分发代币（或币）、处理监管问题（如有）、以及通过官方渠道（如项目网站、博客或第三方\
  \ ICO 广告网站）制定和执行营销策略。\n\nICO 通常面向散户投资者，为他们提供在项目早期开发阶段获得早期参与的机会。ICO 参与者投资比特币 (BTC)、以太坊\
  \ (ETH)、泰达币 (USDT) 等数字资产，有时也使用法定货币，以换取项目的代币。这些代币（或币）可能代表持有者的各种权利或利益，例如访问产品服务、治理权，或某种形式的实用性和网络参与权。然而，从投资者的角度来看，投资\
  \ ICO 的核心原因之一是为了获得短期或长期的财务收益。\n\n尽管 ICO 有时能带来丰厚利润，但必须指出，与已建立的项目相比，它们被视为高风险投资。大多数通过\
  \ ICO 筹集资金的“加密货币”项目尚未拥有可用的产品或服务。这实质上意味着 ICO 参与者主要是在押注项目背后的团队。此外，除非高端机构或私募投资公司已经为\
  \ ICO 项目提供了资金，否则这些项目极不可能经受过专业、严格、复杂且昂贵的审计，这给 ICO 参与者带来了极高的风险。对于 ICO，无法保证项目或公司本身的质量或合法性，也无法保证代币或币的价值。许多“骗局”项目通过\
  \ ICO 募资，但很少或根本没有履行其承诺的意图。由于普遍存在的欺诈担忧，监管机构已经采取了打击行动——例如，美国证券交易委员会 (SEC) 在执法行动中一再裁定许多\
  \ ICO 属于未经注册的证券发行，并对多个发行方提起了诉讼。\n\n**了解你的客户 (KYC)** 是金融机构和企业用于验证潜在投资者身份以防止洗钱或欺诈等非法活动的流程。许多\
  \ ICO 对投资者施加了 `KYC` 限制。这会因为增加额外步骤而减少潜在投资者数量，延长通过 ICO 筹集资金所需的时间，并可能影响其整体表现。投资者可以通过\
  \ [ICO Drops](https://icodrops.com/)、[CryptoRank](https://cryptorank.io/active-ico)\
  \ 和 [ICO Holder](https://icoholder.com/) 等网站查找并获取 ICO 列表信息。参与 ICO 通常通过项目官网进行。\n\n\
  **成功的 ICO 案例包括**\n\n[以太坊 ICO](https://icodrops.com/ethereum/) – [以太坊](https://ethereum.org/en/)\
  \ 是一个智能合约和去中心化应用平台。它在 2014 年的 ICO 中筹集了约 1600 万美元，以每枚 0.31 美元的价格出售其代币。以太坊在 2021 年达到了\
  \ 4878 美元的历史最高价。\n\n[NEO ICO](https://icodrops.com/neo/) – [NEO](https://neo.org/)\
  \ 是一个中国区块链项目，旨在通过数字资产、数字身份和智能合约打造智能经济。NEO 在 2015 年至 2016 年的 ICO 中筹集了约 505 万美元，以每枚\
  \ 0.032 美元的价格出售代币。这些代币在 2018 年达到了 196 美元的历史最高价。\n\n\n\n"
- '# [IOTA ICO](https://icodrops.com/iota/) – [IOTA](https://www.iota.org/)


  `IOTA` 是一种为物联网设计的开源分布式账本和加密货币，于 2015 年筹集了约 59 万美元。`IOTA` 价格曾达到历史最高点 5.69 美元。


  ## 首次交易所发行（IEO）


  **示例：** [币安 Launchpad](https://launchpad.binance.com/en)、[OKEx Jumpstart](https://www.okx.com/jumpstart)
  和 [Gate.io](https://www.gate.io/startup)


  首次交易所发行（`IEO`）是一种数字资产募资活动，其中区块链项目（新成立或已成立）通过交易平台筹集资金，通过交易所直接向投资者出售代币。`IEO` 类似于首次代币发行（`ICO`），但在
  `IEO` 中，交易所代表初创公司管理和组织整个代币销售。募资所得代币通过交易所发放给投资者，而 `ICO` 则是直接发放给投资者。在营销方面，与项目方负责一切事务的
  `ICO` 相比，`IEO` 的优势包括社区管理、`SEO` 优化、影响者营销、多种营销策略以及`公关`推广。


  随着 `ICO` 失去吸引力，`IEO` 在近年来变得更加普遍。其中一个核心原因是 `IEO` 降低了风险水平。在 `IEO` 中，交易所的专业数字资产分析师会对希望在其平台上募资的项目进行详细的审计和分析。主要的数字资产交易所有维护声誉的需求，通常会筛选掉欺诈或质量低劣的项目——尽管少数项目仍可能通过其尽职调查的网。项目倾向选择
  `IEO` 的另一个原因是，代币发行后，项目在交易所上市的机会更大。这对项目至关重要，因为它为全球投资者提供了更多机会和渠道来接触该数字资产。


  大多数新初创公司和 `IEO` 平台面临的一个挑战是地域限制，某些投资者可能因其所在位置而被限制参与特定的 `IEO`。此外，与 `ICO` 不同，所有投资者必须在
  `IEO` 交易所注册，这可能会进一步限制投资金额。随着区块链行业的进一步成熟，越来越多的 `IEO` 正在推出。一些流行的 `IEO` 平台包括 [币安 Launchpad](https://launchpad.binance.com/en)、[OKEx
  Jumpstart](https://www.okx.com/jumpstart) 和 [Gate.io](https://www.gate.io/startup)。`IEO`
  这一募资方式在交易所与有前景的区块链初创公司之间创造了独特的协作环境，有助于确保透明度、流动性和信任。通过 `IEO` 募资并取得成功项目的例子包括 [Band
  Protocol](https://www.bandprotocol.com/company) 和 [Polygon (Matic) Network](https://polygon.technology/)，它们都利用币安
  Launchpad 完成了募资。


  ## 首次 DEX 发行（IDO）


  **示例：** [PancakeSwap](https://pancakeswap.finance/)、[TrustSwap](https://trustswap.com/)、[Polkastarter](https://polkastarter.com/)


  首次 DEX 发行（`IDO`）是一种利用去中心化交易所（`DEX`）来为新的初创“加密”项目进行代币销售的募资技术。`IDO` 为项目提供了一种快速高效的资本筹集方式。它们还为项目提供了接触大量潜在投资者的渠道，并能够建立忠诚的社区。`IDO`
  消除了对中心化交易所的需求以及启动募资活动的许可要求。同时，其费用也较低。项目团队通常只需支付部署新智能合约的燃料费，尽管许多启动平台也会收取额外的上市费用或要求一小部分募资额/代币。`IDO`
  流程最好描述为两个阶段：


  **第一阶段 – IDO 启动平台与孵化**


  募资项目向 `IDO` 启动平台提交一份“上市请求”，其中包含具体信息（白皮书、代币经济学、资本要求等）。`IDO` 启动平台（例如 TrustSwap、Polkastarter、PancakeSwap）会审核提交的信息，如果获批，项目团队需要满足平台的特定要求。这些要求可能包括某种形式的质押和白名单要求。重要的是要理解，这些“生态系统特定的启动平台”会孵化并培育项目，以增加项目长期成功的可能性。营销工作得以开展，所有
  `IDO` 信息，包括项目特定的基本面细节，都会向公众开放。在 `IDO` 当天，投资者通过 `IDO` 启动平台，进入资金池提前支付代币款项，实质上是为“欠条”代币（`IOU`
  风格代币）投入资金。从投资者处收集的资金将发送给项目团队，他们将其用于项目开发。接下来，会举办“代币生成活动”（`TGE`），在此期间生成代币并发送给所有 `IDO`
  参与者。


  **第二阶段 – IDO 代币上市**


  当 `IDO` 成功结束且 `TGE` 完成后，该代币会在去中心化交易所（`DEX`）上市交易——自动化做市商（`AMM`）包括 [Sushiswap](https://www.sushi.com/swap)
  或 [PancakeSwap](https://pancakeswap.finance/)。


  `IDO` 是 `ICO` 和 `IEO` 的替代方案；然而，尽管它们具有一些优势，但也存在局限性。在启动时，无需中心化交易所意味着通过 `IDO` 平台即可实现即时流动性（例如
  [PancakeSwap](https://pancakeswap.finance/)）。这意味着 `IDO` 平台上的投资者可以选择立即开始交易。此外，通过
  `IDO` 启动平台和自动化做市商启动项目，消除了项目在 `IEO` 中需要支付的高额上市费用。


  然而，在通过 `IDO` 启动平台和自动化做市商进行交互和投资时，必须极其谨慎。投资者在通过这些平台评估合适的 `IDO` 启动平台和募资项目时，必须格外警惕。此外，在许多情况下，尤其对于大型且备受瞩目的项目，投资者难以确保参与资格。`IDO`
  通常设有“反鲸鱼”措施，这意味着没有单个投资者可以购买大量代币。


  通过 `IDO` 启动平台成功募资并直接在 `IDO` 交易平台上市的项目示例包括 [Astar Network](https://astar.network/)、[Mantra
  DAO](https://www.mantraomniverse.com/) 和 [Ferrum Network](https://ferrum.network/)。


  ## 首次农场发行（IFO）


  **示例：** [PancakeSwap](https://pancakeswap.finance/ifo)


  还有一种名为首次农场发行（`IFO`）的 `IDO` 变体。这本质上与 `IDO` 相同，区别在于 `IFO` 中，投资者不是直接锁定其代币，而是必须首先在 DeFi
  流动性池（`LP`）中进行质押（耕种——提供流动性）以赚取 `LP` 代币。例如，在 PancakeSwap 上，一个希望通过 `IFO` 筹集 `BNB` 的项目要求用户质押（存入）`BNB-CAKE
  LP` 代币；当销售结束时，`CAKE` 部分被永久销毁，`BNB` 部分作为募资款项归项目团队所有，而参与者则收到新发行的代币。




