  \ | `Akiri`, `MedicalChain`, `Avaneer Health` |\n| 政府 | 区块链技术对政府多个领域产生积极影响，例如对外援助、执法、记录保存、薪资税征收、央行与政府智能合约，以及疫苗接种、贷款和学生补助金的追踪。\
