  \ 提供）\n\n\n\n### 交易速度与 Gas 费用的投资者分析\n\n遗憾的是，对于最佳交易速度和 Gas 费用，并没有一个简单的答案。接近即时的交易并附带免费\
  \ Gas 是终端用户体验的理想结果。然而，作为投资者，这种心态并不实际，因为它会排除许多潜在有价值的投资机会——更不用说矿工和验证者需要为他们在网络上完成的工作获得报酬，而不能仅仅依赖新铸造的代币作为支付。游戏、交易、`DeFi`\
  \ 平台和去中心化交易所（`DEXs`）等用例，受益于超快的交易速度和极低的 Gas 费用。没有任何参与者愿意为了游戏内购买或完成一笔去中心化交易所交易而等待十分钟。然而，在这些高频、实时的用例之外，超快的速度固然令人赞赏，但并非总是至关重要。\n\
  \n虽然很容易过分关注交易速度和 Gas 费用，但大多数现代区块链——尤其是那些辅以 Layer 2（`L2`）协议的区块链——可以在几秒钟内处理交易，最坏情况也不过一两分钟。因此，大多数利用具有实际用例的区块链或\
  \ `dApp` 的人，不需要等待十分钟才能完成一笔交易，除非他们特意使用传统的 `PoW` 网络。大多数其他区块链，包括采用权益证明（`PoS`）、委托权益证明（`DPoS`）或更新共识模型的第二层协议，通常可以在\
  \ 5 到 60 秒内完成交易，这对大多数应用来说已经足够好了。\n\n关于 Gas 费用，对于以太坊这样的网络，费用会根据网络流量和拥堵程度而波动，有时`美元`费用从几美分到几美元不等。作为投资者，主要关注的不仅仅是特定时刻的费用成本——更重要的是预测它们是否适用于所讨论的用例。例如，如果你想投资一个游戏项目，建议评估其费用是否足够低、稳定且快速，以提供更流畅、更高效的游戏体验。另一方面，如果评估的是一个借贷平台，60\
  \ 秒的延迟或小额费用可能根本无关紧要。尽管如此，这并非是说即时交易比等待 60 秒更值得赞赏；只是根据不同的用例，它们可能没那么关键。\n\n### 行动步骤\n\
  \n按照以下步骤确定一个项目是否提供与其实际用例需求相匹配的快速交易和低 Gas 费用。\n\n![折线图，标题为“7 天历史预言机 Gas 价格”，显示了从\
  \ 12 月 8 日到 12 月 13 日以 gwei 为单位的 Gas 价格。图表包含三条线：低 Gas 价格（绿色）、平均 Gas 价格（蓝色）和高 Gas\
  \ 价格（红色）。价格在 12 月 9 日达到峰值，然后在 12 月 13 日逐渐下降。来源：Etherscan.io。](img/648696_1_En_5_Fig7_HTML.jpg)\n\
