  \ **里程碑 3：能够将 Wasm Actor 部署到主网**——正在进行中。 **里程碑 3+：进一步增量协议重构以增强可编程性**——正在进行中。 |\n\
  | **技术复杂度** | 这些里程碑是否看起来需要目前业界未见过的先进技术或密码学技术？如果是，该团队有何优势来完成这些里程碑？ | 通过检查这些里程碑及相关任务，未发现技术挑战。然而，通过\
  \ Slack 与开发团队进一步研究并交流后发现，里程碑 3 遇到了一些技术问题，需要额外的研究和调查。里程碑 2 或 3+ 没有公开记录的技术挑战。团队很可能遇到了常见的障碍——大多数项目都会遇到——但任何细节似乎都留在了私密开发者频道内，因为在可获取的公开资料中未披露任何问题。\
  \ |\n| 完成拟议里程碑所需的平台技术工具是否可用？ | 是的。Filecoin 构建在 *星际文件系统（IPFS）*之上——这是一个先进的分布式文件存储协议，允许全球各地的计算机作为一个巨大的点对点网络的一部分来存储和提供文件。它自\
  \ 2015 年开始运行，被认为是文件存储和共享领域的领先协议之一。 |\n| **基础设施需求** | 团队是否拥有足够的测试环境，例如测试网或服务器设置，以支持持续开发和里程碑完成？\
  \ | 是的。Filecoin 拥有多个测试网环境，包括：[`Calibration`](https://docs.filecoin.io/networks/calibration/details/)\
  \ 测试网是最接近 Filecoin 主网的模拟环境，潜在存储提供者可在其中体验更真实的密封性能和硬件要求。[`Spacenet`](https://docs.filecoin.io/networks/spacenet/details/)\
  \ 是一个经过修改以支持星际共识（IPC）的 Filecoin 测试网。它为开发者提供了一个测试环境，用于部署其 FVM 用例，并利用 IPC 子网创新新的 Web3\
  \ 应用。 |\n| **资源可用性** | 团队是否能够接触到具备执行已知里程碑所需特定技能的开发人员或专家？ | Filecoin 在 GitHub 上显示有\
  \ 15 名直接开发者和 26 名协作者。通过与开发团队交流，我注意到他们缺乏开发者资源，并且正在进行网络团队重组，以帮助更有效地分配资源。请注意，当时不利的市场环境也可能影响资源。\
  \ |\n| 是否有足够的资金支持每个里程碑从启动到完成的开发工作？ | 是的。通过 Filecoin 的[`开发者资助系统`](https://grants.filecoin.io/)，Filecoin\
  \ 为那些为 Filecoin 生态系统带来显著价值的持续及现有贡献提供资助和奖励。 |\n| **时间线** | 根据目前已知的约束和挑战，设定的里程碑、日期和时间框架是否看起来现实？\
  \ | 尽管深入研究过 Filecoin 的博客文章、文档、Discord、Slack、GitHub 及其他公开渠道，但公开可用的硬性细节不足以判断即将到来的里程碑日期是否真的可以实现。这并不意味着团队无法交付——只是关键的时间安排和资源配置数据仍然保密（通常是出于法律、竞争或“工作进展中”的原因）。这种信息缺口在加密项目中很常见，因此，现实的路线图分析必须同样强调哪些信息未公开以及哪些已公开。\
  \ |\n| **执行表现** | 基于过去的里程碑执行表现，未来的里程碑是否看起来可以实现？ | 根据专门的 Filecoin 团队之前成功完成的里程碑，可以合理地说，他们能够通过新的开发者资源结构来执行剩余的里程碑。\
  \ |\n| 是否有可见的、经证明的成功完成里程碑的多年记录？ | 该路线图仅详述了自 2022 年（撰写本文时的一年前）以来成功完成的里程碑。过去带有里程碑的路线图似乎已无法访问。\
  \ |\n| 团队过去是否有未能实现的里程碑？注意时间表中是否存在明显的缺口或延迟。 | 官方未发布任何未完成里程碑的列表，但社区讨论暗示了一些团队尚未正式记录的进度延误。\
  \ |\n| 如果过去的里程碑未完成或未按时完成，这是由于内部因素还是外部因素？ | 部分里程碑已超过其路线图计划的日期。然而，工作并未停止。据推测，不利的市场环境——在撰写本书时——以及整个加密市场缺乏开发者参与可能是促成因素。\
  \ |\n| **最终/其他备注** | Filecoin 有成功执行并完成既定里程碑的历史。尽管在此次评估期间他们开发者资源不足，但开发者和贡献者对该项目显然充满热情，并完全致力于实现计划的里程碑。他们如此开放和透明，这建立了信任，并增强了项目的可信度。此外，在评估时不能忽视这个隐藏的细节。\
