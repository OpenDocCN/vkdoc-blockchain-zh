  \ *Polkadot 网络是一个独特的去中心化基础设施，值得进行持续的基本面评估以确定其投资潜力。* | *一个通过 dApp 钱包以奖励形式激励用户持有数字资产的项目。不提供价值——接收奖励不是一个用例（需要提供某种功能或服务来提供某种形式的价值）。*\
  \ *无市场需求 —— 没有解决任何问题。* *MysticMania 并不独特，也不值得投资。* |\n\n### 行动步骤\n\n遵循以下行动步骤来确定项目是否具有强大的产品用例、价值主张和真正的市场需求。\n\
  \n1.  **研究产品用例和价值主张**\n\n   阅读项目的白皮书、博客文章、公共代码仓库（例如，GitHub 提交历史）以及项目网站上的任何其他相关技术信息，以充分了解产品用例和价值主张。这一点至关重要，因为它为后续基本面评估过程奠定了基础。如果需要澄清或更多信息，请联系项目团队。\n\
  \n2.  **评估产品用例和价值主张**\n\n   以表 4-1 为模板，评估项目的产品用例和价值主张。\n\n3.  **做笔记并以你自己的风格记录你的发现**\n\
  \n4.  **将发现与基本面评估过程的其他部分结合起来**\n\n#### 评估结果\n\n避免投资于任何未能提供能产生实际价值且具有真实市场需求的强大产品用例的项目。虽然最初的炒作可能会或可能不会产生短期利润，但该项目最终注定会失败。\n\
  \n\n\n"
- "# 最小可行产品 (MVP)\n\n**评估目标：判断项目团队是否至少拥有可供测试的`MVP`（最小可行产品）。**\n\n最小可行产品（`MVP`）是指具备验证创意或概念所需的最基本功能，并能满足终端用户初始需求的产品。`MVP`的核心优势在于，它提供了一种在真实市场条件下用最少资源测试想法的方式，然后再进行全面开发和完整产品的发布。此外，`MVP`允许公司在开发早期阶段向潜在利益相关方展示其产品。在加密货币领域，这可能包括针对不同领域的`dApps`（去中心化应用），例如去中心化金融（`DeFi`）、游戏、非同质化代币（`NFTs`）、元宇宙，或专注于身份基础设施的`dApps`，如`KILT\
  \ Protocol`。\n\n`MVP`在项目生命周期的早期阶段使用，并且大多数情况下，表现为一个简单的`dApp`、`SDK`、协议模块或其他可演示的组件。已经通过代币生成事件（`TGE`）——即创建新代币并将其出售给投资者和支持者——启动的项目，极大概率至少拥有一个`MVP`。理想情况下，他们应该拥有一个测试版甚至最终可用的产品。在大多数情况下，已建立完善的项目拥有完整可用的产品；然而，他们可能需要一个`MVP`来测试新的应用功能或产品服务。\n\
  \n`MVP`之所以至关重要，有以下几个原因：\n\n- **建立终端用户基础** – `MVP`使项目能够快速进入市场，获得竞争优势，并开始建立用户基础。\n\
  - **市场验证** – `MVP`允许在真实环境中测试产品或服务并获得反馈。这使得项目团队能够在全面启动之前，用真实用户验证其概念并收集有价值的反馈。\n-\
  \ **技术可行性** – 开发`MVP`有助于尽早识别和解决技术挑战，包括基本的智能合约功能和初始集成工作；更复杂的项目——如自定义共识逻辑或完整的跨链互操作性——通常会在后续迭代中进行原型设计。\n\
  - **安全问题** – `MVP`使开发者能够在潜在安全漏洞、代码缺陷、错误和故障升级为更严重的问题之前，识别并修复它们。\n- **监管合规** – `MVP`有助于提前识别潜在的监管障碍和挑战，从而确保最终产品符合适用的法律法规。\n\
  - **投资吸引** – `MVP`有助于提供具体的概念验证，从而吸引利益相关方。\n- **社区建设** – 发布`MVP`有助于吸引早期利益相关者和社区成员，他们能够提供有价值的反馈，并为项目的发展、成功和长期生命力做出贡献。\n\
  - **发展势能** – `MVP`是吸引早期采用者的磁石，能够增强初始发展势能，这对项目的未来增长和成功至关重要。\n\n**专业提示**\n\n务必访问项目的社交媒体渠道，例如\
  \ Telegram、X、Discord 和 Reddit，以帮助评估更广泛社区对该产品的看法。\n\n## MVP、测试版对投资者的重要性\n\n在投资时，投资者必须检查项目是否拥有活跃的`MVP`或测试版。`MVP`总是在测试版之前发布。`MVP`是产品第一个可销售的最小功能版本，而测试版则是在最终精修版本发布前，向更多用户发布以在真实条件下进行测试的几乎最终版本。测试版的核心目标是在最终版本发布前，识别所有剩余的缺陷或错误。投资者需要验证团队是否至少发布了一个`MVP`用于测试——这对以下原因至关重要：\n\
  \n- **降低风险** – `MVP`显著降低了项目是骗局的可能性。\n- **验证进展** – `MVP`通过推动项目从概念阶段迈向可工作的产品，证明了团队的承诺和技术能力。\n\
  - **概念验证** – `MVP`验证了初步概念以及关于可用性的假设。\n- **终端用户测试** – `MVP`允许选定的终端用户群体（通常是社区成员）测试产品，并针对产品特性和可用性提供真实的反馈和见解。\n\
  - **未来潜力** – `MVP`为产品颠覆市场的潜力提供了宝贵的见解。\n\n**事实**\n\n如果发布了测试版或最终产品则更为理想，因为这表明团队已超越`MVP`阶段取得进展。\n\
  \n### 行动步骤\n\n请按照以下步骤确定项目是否至少发布了`MVP`或测试模型。\n\n1.  **判断是否存在 MVP、测试版或最终可用的产品**\n\n\
  \    访问项目网站，确认是否存在`MVP`、测试版或最终产品。这通常是一个简单的`dApp`、`SDK`、协议模块或其他终端用户可与产品或服务交互的可演示组件。`dApp`的链接通常通过一个标有“`启动应用`”（或类似文字）的按钮指示，并位于项目网站的首页。\n\
  \n2.  **记录笔记并以你自己的风格记录发现**\n\n3.  **将发现结果与基础评估流程的其他部分相结合**\n\n#### 结果评估\n\n如果没有`MVP`、测试版或完整可用的产品，建议不要进行投资。原因在于，如果没有可演示的概念验证，相关风险会显著增加，并且欺诈活动的潜在威胁会加剧这种风险。\n\
  \n\n\n## 产品测试\n\n**评估目标：验证其核心产品是否已完成或正在接受团队及社区的测试。**\n\n产品测试是项目产品开发阶段、成功与否及长期发展的关键组成部分。一旦开发出最小可行产品（MVP），就必须在正式发布前对其进行全面试用和测试。这有助于交付安全高效的产品，从而提升客户满意度和用户体验。\n\
  \n考虑到区块链领域绝大多数去中心化应用（dApp）都涉及金融属性，因此在使用具有实际货币价值的数字资产之前，必须对这些 dApp 进行彻底测试。因此，项目团队必须对其产品进行全面测试，并向社区提供清晰的演示，以验证概念和功能。\n\
  \nMVP 进入测试阶段（Beta）是值得高度赞赏的。在测试阶段，社区可以全面测试核心测试版模型的功能。这一阶段的执行对投资者至关重要，因为它证明了团队一直在努力交付所承诺的产品。此外，Beta\
  \ 测试阶段是一个核心交付成果，被视为项目路线图上的重要里程碑。达到 Beta 阶段能显著降低项目被判定为骗局的可能性，同时大大提升团队的可信度和整体价值。\n\
  \n一旦产品成型，强烈建议每位投资者亲自测试测试版模型的核心特性和功能。这将提供第一手信息和直接反馈，有助于整体基础评估的其他方面。然而，出于安全考虑，在与任何基于货币的去中心化应用交互时务必谨慎。为避免财务损失，建议仅使用没有货币价值的测试网通证（Testnet\
  \ Tokens，即测试代币）与此类 dApp 交互——尤其是仍处于测试阶段的 dApp。\n\n**专家提示**\n\n在与 dApp 或产品交互之前，建议先验证其代码的审计和安全审计结果，因为在测试新的\
  \ DeFi 流动性挖矿协议时，因编码缺陷而损失资产将极为不幸。\n\n## 测试网\n\n“`testnet`”（测试网）指的是一个安全的“`沙箱`”（sandbox）环境，核心产品（例如\
  \ dApp 或区块链）在部署到主网（Mainnet）之前，会在此环境中进行测试和实验——主网将在下一节详述。测试网是零风险、安全的备用区块链，它们几乎是独立的部署环境，复制了原始主网或正在运行的区块链的配置和工具。开发者和社区成员都使用测试网来帮助产品为在主网上正式发布做准备。它们有助于保护主网上的项目代码，免受未经测试的功能带来的潜在漏洞或损害。\n\
  \n例如，设想一个场景：项目团队开发了一个新的去中心化交易所（DEX），用户可以在其中买卖数字资产。在正式发布前，团队需要确保 DEX 产品的使用完全安全；因此，他们需要识别并修复任何可能对用户造成经济损失的有害\
  \ Bug 或缺陷。为此，会部署一个备用区块链——测试网——作为一个独立的网络，其配置模拟原始主网区块链。这有助于在 Beta 测试期间保护用户，同时也保护了将正式启动\
  \ DEX 的真实主网。在测试阶段，测试网代币（也称为虚拟代币）会分发给社区供测试使用。这增加了一层额外的安全保障，使开发团队和社区能够安全地与 DEX 交互，而不会损失资金。一旦所有\
  \ Bug、缺陷和代码漏洞都被识别并修复，相关的更新将被推送到主网。在项目团队确信所有更改和更新均已实施后，该 dApp 才能准备就绪，并安全地与具有实际货币价值的通证一起使用。\n\
  \n**专家提示**\n\n早期参与测试阶段的社区成员通常会因其努力和贡献而获得奖励。这提供了一个绝佳机会，可以接触那些未来可能具有价值的新兴项目。\n\n###\
  \ 测试网的优势\n\n- **零风险测试环境** – 提供一个安全环境，项目代码可在不损害产品的情况下进行安全测试和实验。这可能包括测试新功能、更新、智能合约和应用，而无需承担丢失真实资金或在主网上造成中断的风险。此外，开发者可以对区块链网络进行压力测试，以确定其如何处理高流量或高交易量。\n\
  - **成本效益** – 由于测试网通证没有实际价值，开发者可以在不产生使用真实数字资产高昂成本的情况下进行广泛测试。\n- **消除 Bug 和漏洞** –\
  \ 利用测试网有助于在将更改部署到主网之前，识别并修复 Bug、漏洞和其他问题，从而提高区块链应用的整体安全性。\n- **社区参与** – 测试网通过允许社区参与早期测试、反馈发现的任何问题，并有可能因付出努力而获得奖励，从而促进社区对产品的参与。\n\
  - **代码更新** – 新代码更新可以在主网上线前，安全地在测试网上实施和进行实验。\n- **促进创新** – 通过提供一个安全的实验环境，测试网促进了创新，使得激进的新想法在实施到主网之前，能够得到测试和完善。\n\
  \n**专家提示**\n\n拥有强大早期 Beta 测试者群体的项目，是项目可信度和认可度的绝佳标志。\n\n### 测试网示例\n\n以太坊有多个名称和特性各异的测试网。根据以太坊官方网站，以太坊有两个维护中的公共测试网：[Goerli](https://goerli.net/)\
  \ 和 [Sepolia](https://www.alchemy.com/faucets/ethereum-sepolia)。\n\n- **Goerli 测试网**\
  \ – 以太坊首个用于智能合约开发的跨客户端测试网。允许在安全环境中测试所有主网功能，且无需支付 Gas 费。不过，Goerli 正在逐步淘汰，并将完全迁移至\
  \ Sepolia 测试网。\n- **Sepolia 测试网** – 一个稳定的以太坊测试网，它与以太坊主网一起从工作量证明（PoW）合并为权益证明（PoS）。Sepolia\
  \ 是以太坊推荐的默认测试网，为开发者提供部署和测试 Solidity 智能合约及应用开发的基础设施。Sepolia ETH——一种仅用于测试目的而发行的测试网专属通证——用于支付\
  \ Sepolia 测试网上的 Gas 费。\n\n\n\n"
- '# 区块链浏览器


  区块链浏览器——或称`区块浏览器`——是一种基于网页的工具，用于实时查看和追踪区块链上的交易数据，包括地址、代币、智能合约、源代码、钱包地址、价格及其他活动。大多数人主要使用区块链浏览器来检查特定交易的状态，例如待处理、未确认或已确认。开发者出于多种原因使用区块浏览器（尤其是测试网区块浏览器），包括验证交易和区块数据，例如元数据、燃料费、燃料限制、区块确认数、交易时间以及其他杂项数据。


  每个独特的区块链基础设施通常提供一个主网区块浏览器，外加该链所运行的每个测试网的独立浏览器。所使用的浏览器类型取决于区块链项目开发的当前阶段。例如，当区块链仍在开发中时，所有交易都在测试网上进行，并在测试网区块浏览器上验证。另一方面，当开发和测试阶段完成后，所有线上交易都在主网上进行，并使用主网区块浏览器进行验证。在主网上线后，开发者可能会继续利用测试网来测试新功能和升级。这些内容先在测试网浏览器上验证，然后才部署到主网。图
  4-2 展示了名为 [EtherScan](https://etherscan.io/) 的以太坊主网区块浏览器，其中显示了来自名为 MakerDAO 的 DeFi
  项目的市场、财务和近期交易数据。


  **事实**

  在许多情况下，测试网、主网及相应的区块浏览器常常同时被使用。在这种情况下，主要产品可能已在主网上线并运行，与此同时，团队可能正在测试网上进行升级和新功能的开发与测试，随后再将代码推送到主网。


  ![以太坊主网区块浏览器的页面截图，显示“MakerDAO”项目（图片由 https://etherscan.io/token/0x0f51bb10119727a7e5ea3538074fb341f56b09ad
  提供）。](img/648696_1_En_4_Fig2_HTML.jpg)


  **图 4-2** 以太坊主网区块浏览器上显示的“MakerDAO”项目（图片由 [`https://etherscan.io/token/0x0f51bb10119727a7e5ea3538074fb341f56b09ad`](https://etherscan.io/token/0x0f51bb10119727a7e5ea3538074fb341f56b09ad)
  提供）


  区块浏览器上的每笔交易都通过一个`交易哈希`来标识，常缩写为“Txn Hash”。每次在区块链上发起交易时，都会自动计算出一个新的哈希值。每个交易哈希都包含与该特定交易相关的信息，包括交易状态（是否失败或成功）、发起方和接收方地址、所发送资产的类型、时间戳、交易费用以及燃料价格。


  ![区块链交易详情页面截图。显示一笔成功交易，哈希值为 0x4fea8c266493985dfc1002fa9cd536c1da6ef700e618c52071554382b0459f5。该交易在
  30 秒内得到确认，并有 229 个区块确认。涉及将 896.18 个 DAO 代币转移至 DAO Maker: Staking。发送方地址为 0xDee8f625F9F3B1a88574C997969B04，接收方地址为
  0x6d7b0989125aca3e79ef497d4b6a47。交易费用为 0.00138509947610119 ETH，相当于 5.22 美元。燃料价格为
  11.598593431 Gwei。另外提供详细信息和私人备注功能，但需要登录访问。](img/648696_1_En_4_Fig3_HTML.jpg)


  **图 4-3** 以太坊主网区块浏览器 Etherscan 上显示的“MakerDAO”交易数据（交易哈希以 59fg 结尾）（图片由 [`https://etherscan.io/tx/0xfe4a8c266943985dfc1002fa9cd536c1da6fe700e618c520751254382b0459f5`](https://etherscan.io/tx/0xfe4a8c266943985dfc1002fa9cd536c1da6fe700e618c520751254382b0459f5)
  提供）


  '
- '# 伪匿名性


  区块链上的大多数交易被视为`伪匿名`。这意味着，如果某个人的公开`假名`（钱包）地址曾与其身份关联，那么他们以该假名进行的所有行为都将与他们的真实身份联系起来。这种情况可能通过多种方式发生——例如，使用公开地址进行支付、打赏或捐赠，或者将该地址链接到中心化交易所经过
  KYC（了解你的客户）验证的账户。同样重要的是要注意，区块链上的交易可以一直追溯到`创世区块`，也就是在区块链上执行第一批交易的地方。因此，如果隐私是你的关切点，建议确保公开地址和你的身份信息的安全，并使其远离公众视野。




  '
- "# 测试网区块浏览器\n\n如前所述，每个测试网都有其独立且对应的区块浏览器，用于查看和分析测试网上的交易、区块、地址及其他活动。图 4-4 展示了**波卡的\
  \ Westend 测试网区块浏览器**。\n\n![区块链浏览器界面截图为“Westend”。顶部区域显示基本信息，包括规格版本和代币符号“WND”。链上数据显示最终块、已签名的外部函数、质押金额、持有者、转账及通胀率。折线图展示了一天的链上状态变化，伴随交易量波动。饼图显示代币分布，包括流通、质押及其他类别。最新区块和转账列表包含区块编号、外部函数、事件和时间戳。界面采用粉白配色方案。](img/648696_1_En_4_Fig4_HTML.jpg)\n\
  \n图 4-4 – SubScan 提供的波卡 Westend 测试网区块浏览器（图片来源：[`https://westend.subscan.io/`](https://westend.subscan.io/)）\n\
  \n左侧显示的是最新的“区块”——交易的数据包，而右侧则可以看到最新的单笔交易转账。请留意最新区块和交易的执行时间，分别为 8 秒前和 33 分钟前。这些数据对投资者极为有益，原因如下：\n\
  \n- **新产品测试阶段活动** – 对于处于早期阶段的项目，分析测试网交易将提供关键数据，判断团队是否已开始测试、已停止测试，或仍处于测试阶段。如果看到近期的交易以几秒到几分钟的间隔稳定流动，这是值得赞赏的，因为这证明团队仍在后台持续工作，并未放弃该项目。\n\
  \n- **成熟产品的持续改进** – 对于已成熟的项目（如波卡网络），希望在区块浏览器上看到测试网上以近期交易形式呈现的持续活动。这表明，尽管完整可用的产品已经存在，但波卡（以此为例）仍在后台针对可能的新功能、升级、修复潜在漏洞或缺陷等方面勤奋工作。\n\
  \n**事实** – 测试网区块浏览器提供与主网区块浏览器相同的信息和功能，但它是专门为测试网区块链设计的，而非主网区块链。\n\n项目团队在测试阶段使用的测试网将取决于\
  \ dApp 所构建的区块链基础设施（例如，[以太坊](https://ethereum.org/en/)、[波卡](https://polkadot.network/)、[索拉纳](https://solana.com/)、[MINA](https://minaprotocol.com/)）。然而，如果产品本身就是一个全新的区块链，团队将创建并使用自己的新测试网和测试网区块浏览器。例如，Moonbeam\
  \ 网络——一个基于波卡（Layer 0 区块链）构建的 Layer 1 区块链——创建了自己的测试网，名为 Moonbase Alpha——见图 4-5。\n\
  \n![Moonbase Alpha 测试网浏览器网页截图。页面分为两个主要部分：左侧为“最新区块”，右侧为“最新交易”。每个部分都列出了近期活动，详细内容包括区块编号、收集人地址、交易数量和时戳。顶部的搜索栏允许按地址、交易哈希、区块或代币进行筛选。页面标题包含主页、区块链、代币、NFT\
  \ 等导航链接。](img/648696_1_En_4_Fig5_HTML.jpg)\n\n图 4-5 – Moonbeam Networks 测试网（名为 Moonbase\
  \ Alpha）的“Moonbase Alpha”区块浏览器（图片来源：[`https://moonbase.moonscan.io/`](https://moonbase.moonscan.io/)）\n\
  \n**专家提示** – 无论项目是已成熟还是仍在开发中，始终检查其测试网区块浏览器上的交易。拥有持续稳定交易流的项目非常值得赞赏，因为这表明项目团队仍在后台勤奋工作。\n\
  \n### 行动步骤\n\n对于拥有大量追随者和可观市值的高度成熟的项目，无需检查其主要产品测试阶段的状态。然而，对于早期项目，强烈建议投资者验证其核心产品是否已经或正在由团队和社区进行测试。\n\
  \n请按照以下步骤验证其核心产品是否已经或正在由团队和社区进行测试。\n\n1. **确定 MVP、测试版或最终可用的产品是否可用**\n   访问项目网站，确认\
  \ MVP、测试版或最终产品是否可用。这通常是一个 dApp，以便最终用户与产品或服务交互。dApp 的链接通常标有“*启动应用*”（或类似字样）的按钮，并可在项目网站首页找到。\n\
  \n2. **项目路线图——产品测试时间表**\n   检查项目路线图中为产品测试阶段分配的日期。\n   - 团队是否已经完成了核心产品的测试阶段？\n  \
  \ - 测试计划何时开始？\n   - 如果测试未按照先前的时间表完成，要求团队为项目延迟提供合理的解释。\n\n3. **分析测试网交易**\n   确定团队已使用或将用于测试其产品或服务的测试网名称及对应的测试网区块浏览器。\n\
  \   - **新产品测试阶段活动** – 检查测试网“浏览器”交易，以验证产品测试阶段是否已开始或已完成。如果在测试网区块浏览器上看到近期的交易以几秒到几分钟的间隔稳定流动，这是值得赞赏的。\n\
  \   - **成熟产品的持续改进** – 通过识别测试网区块浏览器上近期且持续的交易流，验证团队是否正在后台针对新升级、新功能和潜在的 Bug 修复进行勤奋工作。\n\
  \n4. **做笔记并以你自己的风格记录发现**\n\n5. **将发现的结果与基础评估流程的其他部分相结合**\n\n#### 结果评估\n\n如果产品已正式发布，或者至少已通过测试阶段并获得社区的积极反馈，这是一个积极信号。但是，如果项目团队尚未开始或完成初始测试阶段，请谨慎行事。当团队反复错过测试里程碑、没有显示测试网活动，**并且**没有提供清晰的沟通或修订后的时间表时，应将其视为潜在的危险信号。新初创公司处于开发阶段一段时间是很常见的，如果项目尚未完成其产品测试阶段，这并不一定是危险信号。然而，需要更多的研究来更好地理解项目的进展和潜力。\n\
  \n在测试阶段，社区在产品或服务中遇到多个故障和错误是很常见的，大多数情况下这些产品是 dApp 或某种形式的客户界面。此阶段的主要目的是识别并解决这些问题。只要开发团队承认并处理社区的反馈和担忧，就不必过分担忧。\n\
  \n\n\n## 在主网上线\n\n**评估目标：判断项目代码（产品）是否已在主网上线。**\n\n主网是主要的区块链网络，真实交易在此发生，并使用具有实际经济价值的代币，而测试网代币（虚拟代币）仅用于测试目的。“在主网上线”一词在区块链领域中常用来描述区块链协议已完全开发、测试并部署到主网供公众使用的阶段。当项目团队确信协议运行正常后，他们会使用经过最终审计的代码库将代码部署到主网。所有交易随后将在实时网络上广播、验证并记录在分布式账本技术（区块链）上。在此阶段，用户可以使用具有真实货币价值的代币参与各种任务，例如通过挖矿验证交易、执行智能合约以及与去中心化应用程序（dApp）进行交互。\n\
  \n当项目在主网（也称为实时网络）上线时，即表示它已在主网（实时网络）上运行。测试阶段至此结束，所有已发现的错误和故障应已得到解决。对于项目团队而言，其产品在主网上线是一个重要的项目里程碑。这表明团队已对该产品进行研究、开发、测试并将其部署到实际应用中。此外，这也向社区表明，团队因其兑现承诺而变得更加值得信赖。\n\
  \n投资者需要确认项目代码是否在主网上线。这一点至关重要，因为那些核心产品经过测试并正式部署的项目，往往投资风险略低。此外，它还能让投资者检查并试用最终产品，从而更深入地了解其整体功能和价值主张。\n\
  \n### 如何判断项目代码（产品）是否在主网上线\n\n判断项目代码是否在主网上线的最快方法是，首先确认团队拥有一个可运行的产品，然后使用主网区块浏览器，验证是否能看到持续且近期的交易流。同时，大多数区块浏览器会显示区块链上发起的交易总数，该数字通常达到数百万级别。图\
  \ 4-6 显示了以太坊区块链在以太坊主网区块浏览器 Etherscan 上的近期交易记录和交易总数。\n\n![区块链浏览器界面截图，显示以太坊网络数据。顶部显示以太坊价格为\
  \ $3，764.43，市值为 $452，284，111，341.00，交易量为 2，393.15 百万笔（13.6 TPS），中位 Gas 价格为 8 Gwei。最新最终确认区块为\
  \ 20018126，最新安全区块为 20018190。左侧面板列出近期区块，包含区块号、费用接收者、交易数量和以太币数量。右侧面板显示最新交易，包含交易 ID、发送方和接收方地址以及以太币数量。右上角图表显示\
  \ 14 天交易历史。](img/648696_1_En_4_Fig6_HTML.jpg)\n\n图 4-6\n\n以太坊主网区块浏览器 Etherscan，每隔几秒显示以太坊网络上的近期交易以及链上交易总数——已执行\
  \ 2，393.15 百万笔交易（数据来源于 `https://etherscan.io/`）\n\n对于构建在区块链网络之上的 dApp 和基于代币的项目，只需在任何加密资产价格追踪网站（如\
  \ `CoinMarketCap.com` 或 `CoinGecko.com`）上找到代币的智能合约地址，然后将其输入到该项目所构建网络的主网区块浏览器中，即可找到交易总数和近期交易。\n\
  \n例如，图 4-7 显示了来自 `CoinMarketCap` 的截图，突出显示了 Chainlink（一个基于预言机的通信和信息传输项目）的智能合约地址。Chainlink\
  \ 的智能合约地址可以从 `CoinMarketCap` 复制并粘贴到 `Etherscan`（图 4-8）中，后者将显示 Chainlink 的近期交易和总交易数。\n\
