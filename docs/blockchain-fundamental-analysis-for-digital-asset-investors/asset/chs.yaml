  \n#### 结果评估\n\n根据表 9-3 中“投资者机会”一列的内容，评估评估结果。\n\n---\n\n## 总质押价值 (TVS)\n\n**评估目标：**\
  \ 评估某一数字资产的总质押价值（TVS）是随时间上升还是下降，从而洞察市场信心、用户参与度和受欢迎程度。\n\n特定资产的*总质押价值（TVS）* 代表主动绑定至该网络原生质押合约（例如，信标链中的\
  \ ETH）的代币的累计美元价值，不包括仅“锁定”在流动性池或 DeFi 池中的币种。较高的 TVS 值通常意味着该网络被数字资产投资者视为安全可信。相反，区块链\
  \ TVS 较低则表明其可能存在潜在问题、投资者持怀疑态度且不受欢迎。TVS 通常以美元表示；但某些平台也可能以 BTC 或 ETH 表示。\n\n图 9-14\
  \ 显示了来自 Glassnode.com 的以太坊 TVS（蓝色线）。它代表了从 2021 年到 2024 年间存入[ETH 2.0](https://etherscan.io/address/0x00000000219ab540356cbb839cbe05303d7705fa)合约的\
  \ ETH 数量。在此期间，无论 ETH 的单价（黑色线）如何波动，ETH 的 TVS 都呈稳定增长态势。这暗示了投资者对其的强力支持和广泛欢迎，同时也体现了高度安全的区块链所提供的安全性。\n\
  \n**专业提示：** 对于采用权益证明（PoS）共识机制的项目，建议投资者调查其 TVS 是呈增加还是减少趋势。\n\n![图表展示了 ETH 2.0 质押总价值随时间的变化，数据范围为\
  \ 2021 年 1 月至 2024 年 7 月。蓝色线代表总质押价值（以 ETH 计），呈稳步上升趋势。黑色线代表美元价格，呈现出涨跌波动。图表包含两个 Y\
  \ 轴：左侧为 ETH 质押量，右侧为美元价格。](img/648696_1_En_9_Fig14_HTML.jpg)\n\n**图 9-14** 以太坊，ETH\
  \ 2.0 总质押价值（数据来源：[`https://studio.glassnode.com/metrics?a=ETH&category=&m=eth2.StakingTotalVolumeSum`](https://studio.glassnode.com/metrics?a=ETH&category=&m=eth2.StakingTotalVolumeSum)）\n\
  \n### 操作步骤\n\n按照以下步骤评估某一数字资产的质押总价值（TVS）是随时间上升还是下降，从而洞察市场信心、用户参与度和受欢迎程度。\n\n虽然[Glassnode.com](https://Glassnode.com)主要为主流币种提供高级数据，但[DeFi\
  \ Lama](https://defillama.com/)和[TokenTerminal](https://tokenterminal.com/terminal)等平台则涵盖更广泛的数字资产。\n\
  \n1. **评估总质押价值**\n\n   访问 Glassnode.com（或 DeFi Lama、TokenTerminal），判断某一数字资产的质押总价值是随时间增加还是减少。\n\
  \   1. TVS 是随时间增加还是减少？\n\n2. **记录笔记，并以自己的风格记录发现**\n\n3. **将这些发现与基本面评估流程的其他部分相结合**\n\
  \n#### 结果评估\n\n如果 TVS 随时间逐渐增加，则情况良好。如果减少，这可能意味着对该资产的兴趣减弱。请注意，如果 TVS 在减少，这可能是价格下跌的早期信号（如果尚未发生的话）。必要时需进行更深入的研究。\n\
