  \n## 2. 链上协同效应\n\n每个加密货币项目都有特定的产品或服务为用户和客户创造价值——这被称为价值主张。与传统中心化公司类似，基于区块链的项目通常会整合和互补彼此的产品与服务，以提升客户价值。这些项目通常表现出协同效应，并且通常处于相同或相似的领域。此外，当它们协同工作时，能够创造出比独立运营更大的价值输出。\n\
  \n为了使生态系统蓬勃发展并充分发挥其潜力，它必须整合来自不同领域的多样化加密货币项目，以支持彼此的成长。有多种潜在的加密货币项目组合类型能够彼此产生协同效应，包括\
  \ DeFi dApp 与游戏、NFT 与 DeFi、稳定币与 DeFi、DeFi 与现实世界资产代币化应用、各种 L1、L2 和 L3 组合，以及 DEX 和分层区块链，例如[Sushi\
  \ 和 ZetaChain](https://www.sushi.com/blog/sushi-partners-with-zetachain)的案例。通过 Sushi\
  \ 与 ZetaChain 的集成，用户可以在多达 30 个区块链网络上交换原生 BTC，不过该功能依赖于跨链消息传递，并且正在分阶段推出。投资者有责任确认他们所投资的生态系统——无论是\
  \ L0、L1、L2 还是 L3——是否具备多样化的项目类型，并且每个类别中都有大量项目，以推动长期增长和协同效应。这一原则同样适用于投资生态系统内的一个基于\
  \ dApp 的项目。一个拥有多样化 dApp 并协同运作的大型、繁荣的生态系统，为项目充分发挥潜力提供了丰沃的环境。没有繁荣的生态系统，任何 dApp 的潜在增长都可能受到显著阻碍。投资者验证此信息的最有效方式是访问[`AlphaGrowth.io`](https://AlphaGrowth.io/)，在那里他们可以根据投资的是\
  \ dApp 还是分层区块链项目来筛选结果——文中提供了两种类型的示例以供参考。\n\n### 第层“生态系统”区块链项目投资\n\n要检查一个 L0、L1、L2\
  \ 或 L3 生态系统是否拥有多样化的项目类型，并且每种类型中都有大量项目，请访问[`AlphaGrowth.io`](https://AlphaGrowth.io/)并筛选您想要投资的项目。审查该生态系统中指定的项目类别，包括每个类别中的项目数量。例如，图\
  \ 6-7 展示了构建在[Cosmos 网络](https://cosmos.network/)（一个第零层区块链）上的一些项目，第二列显示了 Cosmos 生态系统中每个项目的类别。如果需要，也可以按类别进行筛选。始终将结果与流行的、一流的生态系统进行比较。\n\
