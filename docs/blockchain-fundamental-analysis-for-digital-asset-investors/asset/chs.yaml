  \ 14.793 gwei，具有相同基础费和优先费 1.408，费用为 1.08 美元，预计时间 30 秒。每个面板都包含一个表示 Gas 价格水平的笑脸表情符号。](img/648696_1_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6\n\n以太坊的 Gas 价格及相关交易速度（数据来源：[`https://etherscan.io/gastracker`](https://etherscan.io/gastracker)）\n\
  \n1. **确定交易速度和 Gas 费用**\n   1. 通过快速在线搜索，查找网络的 Gas 价格和交易速度。以以太坊为例，可以搜索“Ethereum’s\
  \ gas price and transaction speed native tracker”等关键词——参见图 5-6。\n   2. 如有“热力图”，建议通过其获取平均\
  \ Gas 价格——参见图 5-7。\n   3. 高级选项——如果你运行自己的节点（或使用公共的 `RPC` 网关），你可以直接通过网络的原生 API 调用获取当前\
  \ Gas 价格——例如，对于以太坊，`eth_gasPrice` 会以 wei 为单位返回值。\n\n2. **根据用例评估交易速度和 Gas 费用**\n\n\
  \   确定交易速度和 Gas 费用是否如本章讨论和提供的示例所述，与用例相符。此外，根据以下标准进行评估。\n   1. 项目的速度和费用是否符合其目的？\n\
  \   2. 网络的交易时间是否足够快？如果超过 1 分钟，请再次确认这对 `dApp` 用户是否合理。\n   3. 警惕那些过度宣传“零费用”的项目。\n\n\
  3. **竞争对手分析**\n\n   检查该项目的交易速度和 Gas 费用与竞争对手相比如何，看其是否在其用途上提供了更好的价值。\n\n4. **记录笔记并以你自己的风格记录你的发现**\n\
  \n5. **将发现与基本面评估过程的其他部分结合起来**\n\n#### 结果评估\n\n如果结果显示交易费用和 Gas 费用不适合用例需求和可操作性，则建议不要投资。\n\
  \n## 终端用户支持与沟通\n\n***评估目标：确定项目团队是否具备足够的客户和沟通支持策略。***\n\n客户支持和沟通在区块链行业中对项目团队和终端用户都起着至关重要的作用。区块链世界中不断引入新的复杂技术；因此，拥有可靠的支持和透明度是建立信任的关键。终端用户依赖项目团队的帮助来解决问题、提供指导，并回答关于产品或服务的技术性和非普遍性问题。团队还负责让终端用户了解最新信息，例如平台升级、路线图变更、新的合作伙伴关系以及其他关于产品或服务的重要新闻。\n\
  \n### 为什么客户支持和沟通很重要？\n\n项目团队的客户支持和沟通之所以重要，原因如下：\n\n- **透明度** – 持续更新平台开发、安全问题和政策变更，以维护用户信任。\n\
  - **参与度** – 当项目团队积极参与社区讨论和访谈，并回应用户咨询时，这有助于产生并维护一个强大且不断壮大的社区。\n- **教育** – 向社区提供资源，例如产品教程、文章以及关于安全实践和区块链技术的网络研讨会，以帮助教育用户。\n\
  - **反馈** – 沟通对于收集和响应用户反馈至关重要，从而改进产品或服务，解决社区的关切。\n- **社交媒体** – 在 `X`、`YouTube`、`Telegram`\
  \ 和 `Discord` 等社交平台上保持活跃，既能使用户了解最新信息，又能促进积极的社区情绪。\n\n\n\n"
- "# 评估项目的最终用户支持与沟通策略\n\n根据以下指标标准评估项目的最终用户支持水平和沟通策略。\n\n1. **多渠道支持** – 人们偏好的平台各不相同，因此项目团队应出现在主流社交媒体渠道上。至少，他们应在\
  \ `X`、`YouTube` 和 `Discord` 上保持存在。\n   - **任务** – 审查项目的社交或支持渠道，并记录典型的响应时间（包括高峰和非高峰时段）。\n\
  \n2. **支持覆盖范围** – 由于加密货币市场全天候运行，项目应争取覆盖多个时区的支持（例如，分时段安排版主或轮班制）。对于非常小或早期阶段的团队来说，实现真正的全天候覆盖可能不现实，但长时间的白天响应空白仍可能是一个危险信号。\n\
  \   - **任务** – 访问项目的社交媒体渠道及任何其他提供的支持渠道，分析团队对社区和最终用户做出响应的时间。\n\n3. **回复质量** – 项目团队支持回复的质量至关重要，应始终提供有用、清晰且专业的回复。\n\
  \   - **任务** – 分析团队在项目各社交媒体渠道上对用户查询的回复。这些回复对用户是否有帮助？\n\n4. **响应时间** – 项目团队应及时回答用户的疑问和问题。这有助于提高用户留存率和满意度。\n\
  \   - **任务** – 通过各支持渠道，衡量项目团队**或活跃的社区版主**对用户问题的平均响应时间。响应越快，意味着帮助越及时有效。对于社区运营的项目，几小时内的响应被认为是良好的，而在一小时内回复则非常出色。\n\
  \n5. **用户教程** – 确保平台和 dApp 的教程始终对用户可用至关重要。这包括安装流程、入门指南、操作规范、需要谨慎的关键方面、潜在错误、故障、小毛病以及任何其他能提高用户留存率和满意度的内容。\n\
  \   - **任务** – 访问项目网站，确认是否提供了 dApp 和平台教程。\n\n6. **项目、平台和 dApp 更新** – 项目团队必须及时传达各种项目、平台和\
  \ dApp 的更新。这也包括可能对用户造成危害的安全相关更新。\n   - **任务** – 访问项目的社交媒体渠道及任何其他提供的支持渠道，核实项目团队是否定期发布更新。社区是否因缺乏沟通和更新而出现任何负面反应？\n\
  \n### 行动步骤\n\n按照以下步骤判断项目团队是否拥有足够的客户支持和沟通策略。\n\n1. **有效的客户支持和沟通策略评估**\n   执行“评估项目的最终用户支持与沟通策略”部分中概述的任务。\n\
  \n2. **记录笔记并以你自己的风格记录调查结果**\n\n3. **将调查结果与基本面评估流程的其他部分相结合**\n\n#### 结果评估\n\n如果项目团队在本章讨论的六个关键最终用户支持和沟通指标中的某一个上表现不佳，这并不构成决定性失败。但是，如果在多个方面持续表现出弱势模式，请极度谨慎——注意潜在的危险信号。\n\
  \n## 数字资产交易所\n\n**评估目标：** 确定投资资产是否上线一级交易所，以确认其对投资者的可信度、合法性、流动性和可访问性。\n\n数字资产交易所是用户交易数字资产（例如加密货币、代币以及非同质化代币（NFT）等其他资产）的平台。这些交易所充当一个市场，连接希望买卖数字资产的用户，通常使用传统的法定货币或其他数字资产作为交换媒介。\n\
  \n随着数字资产市场的持续增长，数字资产交易所的作用变得越来越重要。这些平台为不断扩大的数字资产生态系统提供了必要的基础设施，使全球投资者能够接触到广泛的数字资产。因此，理解数字资产交易所的运作机制以及资产在主要平台上列出的重要性，对于寻求降低投资风险的投资者来说至关重要。数字资产交易所的主要关键角色和功能如下。\n\
  \n- 提供一个安全且用户友好的数字资产交易平台。\n- 通过供需动态建立市场价格。\n- 通过匹配买卖双方提供流动性。\n- 通过钱包便利数字资产的存储。\n\
  - 提供质押、杠杆/保证金交易及其他被动收入策略等功能。\n- 实施监管合规措施。\n- 进行上市审核——尽管标准因中心化交易所而异，有些中心化交易所主要为了收取前期费用而上线项目，因此尽职调查的深度可能不同。\n\
  - 提供交易工具、数据和分析的访问权限。\n\n### 数字资产交易所的类型\n\n数字资产交易所主要有两种类型：**中心化**和**去中心化**。尽管两种交易所类型服务于相同的目的，但它们的运作方式和功能不同。投资者需要了解每种类型的核心差异，以帮助识别项目的受欢迎程度、风险和潜在的未来增长。\n\
  \n### 中心化交易所（CEX）\n\n**示例：** [Coinbase](https://www.coinbase.com/)、[Bybit](https://www.bybit.com/en-US/)、[Kraken](https://www.kraken.com/)、[KuCoin](https://www.kucoin.com/)\n\
  \n**中心化交易所总数：** 253（截至撰写本书时）\n\n中心化交易所是一种数字资产交易平台，用户可以通过 [Coinbase](https://www.coinbase.com/)\
  \ 等中心化公司买卖和交易数字资产。这些交易所充当中介，促进买方和卖方之间的交易，同时保持对用户资金和交易的控制。\n\n中心化交易所通常提供视觉吸引人、用户友好的界面、广泛的交易对和高流动性，深受投资者欢迎。然而，它们也要求用户将资产和个人信息托付给交易所，这可能会使用户面临安全风险和隐私问题。虽然一些中心化交易所有财务支持和保险保障，但其他则没有。因此，你必须在使用前检查你想要使用的中心化交易所是否已投保，这样在发生攻击时你才能受到保护，被盗的资产将得到赔偿。\n\
  \n![显示 BTC-USD 价格随时间变动的蜡烛图。图表呈现涨跌波动，表明市场波动性。图表下方是成交量柱状图，代表交易量。右侧是订单簿和交易历史，显示近期交易和可用交易选项。界面包括买卖选项，并列出各种交易对。](img/648696_1_En_5_Fig8_HTML.jpg)\n\
  \n**图 5-8**\n\nCoinbase 中心化交易所（图片来源：[`https://www.coinbase.com/advanced-trade/spot/BTC-USD`](https://www.coinbase.com/advanced-trade/spot/BTC-USD)）\n\
  \n\n\n### 去中心化交易所（DEX）\n\n**示例：** [Uniswap](https://uniswap.org/)、[dYdX](https://dydx.exchange/)、[PancakeSwap](https://pancakeswap.finance/)\n\
  \n**DEX 总数：** 492 个（截至撰写本书时）\n\n去中心化交易所（DEX）本质上是一种去中心化应用（dApp），它使用户能够在不依赖中央机构或中介的情况下，点对点地交易数字资产。DEX\
  \ 利用区块链技术和智能合约来促进买卖双方之间的点对点交易，使用户能够连接自己的钱包，并始终掌控自己的资产和私钥。DEX 的另一个核心优势是它没有地域限制；因此，投资者可以自由地投资\
  \ DEX 上的任何资产，不受任何限制，也无需经过用户身份验证流程。\n\n![一个加密货币交易所界面的截图，背景为深色，带有彩色、模糊的圆形图案。中央文字为“随时随地兑换”。下方有输入卖出和买入金额的字段，并提供选择代币的选项。一个标有“连接钱包”的按钮清晰可见。顶部导航栏包括兑换、探索、NFT\
  \ 和矿池等选项以及一个搜索栏。底部注释提到该平台是以太坊及其他链上最大的买卖加密货币链上市场。](img/648696_1_En_5_Fig9_HTML.jpg)\n\
  \n图 5-9\n\nUniswap 去中心化交易所（DEX）（图片由 [`https://app.uniswap.org/`](https://app.uniswap.org/)\
  \ 提供）\n\n### 中心化交易所与去中心化交易所对比\n\n如前所述，CEX 和 DEX 代表了交易数字资产的两种截然不同的方式。每种交易所都提供一套独特的功能和权衡，以满足不同投资者的需求。通过分析这些差异，投资者可以在根据自身特定要求和投资目标选择最合适的交易平台时做出明智的决策。\n\
  \n### 顶级 CEX 上市的优势\n\n尽管 DEX 有许多优势，但在顶级的中心化交易所上市资产确实具有独特的优势。一个显著的好处是流动性更高，因为顶级中心化交易所通常会汇集更大的交易量——尽管流动性仍因交易所和具体交易对而异。这有助于实现更快的交易和更低的滑点，从而为投资者带来更流畅的最终用户体验和交易体验。\n\
  \n另一个显著优势是资产能获得更高的知名度和可信度。投资者通常认为顶级中心化交易所更加合法和值得信赖——交易所规模越大、声誉越好，其可信度和知名度就越高。主流一级交易所在批准项目上市之前，会对其进行严格的审查流程。这个审查过程通常包括评估项目白皮书、产品或服务、项目团队、基础设施、现有交易量（如果已上市）、监管合规性以及整体市场潜力等基本面因素。这种评估流程使\
  \ CEX 能够过滤掉潜在的骗局或低质量项目，保护投资者免受可能的损失。同时，这一过程也为代币吸引了更多用户和投资者，有助于其增长和普及。\n\n在顶级 CEX\
  \ 上的交易通常比在主链 DEX 上更快、更便宜；然而，值得注意的是，近年来 Layer-2 和其他优化的 DEX 在某些交易对上的表现已开始媲美甚至超越 CEX。在中心化交易所上，交易是链下撮合的，之后交易所会批量处理提现以进行链上结算——这避免了每笔交易的\
  \ Gas 费用，同时仍然依赖区块链进行最终结算。此外，许多顶级交易所提供分层费率结构，这意味着交易量越大，费用越低。例如，币安或 Kraken 等平台会为大额交易者或使用平台原生代币（例如币安上的\
  \ `BNB`）的用户提供折扣。\n\n综合所有这些因素，资产能够同时在 DEX 和声誉良好、值得信赖的顶级 CEX 上上市，是一大优势。双线上线提升了最终用户体验，因为\
  \ CEX 提供了快速交易速度、低费用、易用性和项目可信度；同时，DEX 则提供了透明度、全球可访问性、去中心化安全性和自我托管。\n\n**专业提示**\n\n\
  在确认正确的代币名称、代码，以及最重要的是其在 `CoinMarketCap` 上的合约地址之前，切勿投资任何项目。这一点尤其适用于在去中心化交易所上购买的代币，因为有成千上万种合法代币的欺诈性仿冒品被出售给缺乏经验的投资者。\n\
  \n\n\n### 顶级中心化交易所（CEX）资产验证\n\n鉴于在顶级中心化交易所上市具有诸多优势，建议投资者验证其数字资产是否已在信誉良好的顶级交易所获批并上市。通过以下几个简单步骤即可完成。\n\
  \n1.  **检查资产的 CEX 上市情况**\n    1.  使用 CoinMarketCap（`https://coinmarketcap.com/`）主页顶部的搜索栏，通过项目名称或股票代码搜索项目代币。参见\
  \ [Polkadot Network](https://polkadot.network/) 在图 5-10 中的示例。\n\n2.  通过仔细核对项目名称、股票代码，并访问网站链接和社交媒体，来验证代币的详细信息是否正确。同时，务必记下合约地址——这对于避免与名称相似的项目或潜在的骗局混淆至关重要。\n\
  \n3.  导航至“市场（Market）”标签页，查看代币上市的交易所列表以及每个交易所可用的相应交易对。参见 Polkadot Network 在图 5-12\
  \ 中的示例。\n\n2.  **识别排名靠前的一级数字资产交易所**\n    1.  从 CoinMarketCap 首页，在顶部菜单栏中选择“*交易所（Exchanges）*”，以查看在流量、流动性、交易量以及报告交易量真实性信心方面排名最高的交易所。例如，在\
  \ CoinMarketCap 的现货交易所排行榜上，币安（Binance）目前按报告交易量排名第一，Bybit 和 Coinbase 紧随其后。\n\n2.\
  \  投资者还可以查看顶级衍生品、去中心化和借贷平台的排名。\n\n![加密货币平台界面截图，显示搜索“Polkadot”。标签页包括 Cryptossets、DEX\
  \ Pairs、NFTs、Exchanges、Community 和 Categories。Polkadot 的市值为 130 亿美元，24 小时交易量为 5.768\
  \ 亿美元，当前价格为 8.53 美元，下跌 5.49%。可见清除按钮。](img/648696_1_En_5_Fig10_HTML.jpg)\n\n图 5-10\n\
  CoinMarketCap 网页顶部的资产搜索栏（图片由 `https://coinmarketcap.com/` 提供）\n\n![Polkadot (DOT)\
  \ 的加密货币仪表盘截图，排名第 16 位。当前价格为 8.59 美元，24 小时下跌 4.79%。市值为 131.3 亿美元，下跌 4.77%，24 小时交易量为\
  \ 5.7767 亿美元，下跌 19.34%。FDV 为 131.3 亿美元，交易量市值比为 4.42%。总供应量和流通供应量均为 15.2 亿 DOT。最大供应量为无限。显示合约地址：`0x7083609fce4d1d8dc0c979aab8c869ea2c873402`。包含网站、白皮书和浏览器（`polkadot.subscan.io`）的链接。](img/648696_1_En_5_Fig11_HTML.jpg)\n\
  \n图 5-11\nPolkadot Network “DOT” 币及项目详情（图片由 `https://coinmarketcap.com/currencies/polkadot-new/`\
  \ 提供）\n\n![表格显示各个交易所的 Polkadot 市场数据。列包括交易所名称、交易对、价格、深度百分比、24 小时交易量、交易量百分比和信心等级。列出的交易所有\
  \ Binance、Bybit、Coinbase Exchange、OKX、Upbit、Bitget、Kraken、KuCoin 和 HTX。所有条目均显示高信心等级。](img/648696_1_En_5_Fig12_HTML.jpg)\n\
  \n图 5-12\nPolkadot Network，可用的数字资产交易平台（图片由 `https://coinmarketcap.com/currencies/polkadot-new/`\
  \ 提供）\n\n![表格显示 CoinMarketCap 排名前 10 的加密货币现货交易所。列包括交易所名称、24 小时交易量、平均流动性、每周访问量、市场数量、币种数量、支持的法币以及\
  \ 7 日交易量图表。币安以 236 亿美元的交易量排名第一，其次是 Bybit 和 Coinbase Exchange。该表格提供了关于流量、流动性和交易量的见解。](img/648696_1_En_5_Fig13_HTML.jpg)\n\
  \n图 5-13\n来自 CoinMarketCap 的排名靠前的中心化数字资产交易所（图片由 `https://coinmarketcap.com/rankings/exchanges/`\
  \ 提供）\n\n1.  **将资产市场与顶级交易所进行比较**\n    1.  验证例如 Polkadot Network “DOT” 币所在的交易所是否属于\
  \ CoinMarketCap 上排名靠前的 CEX。如果它们出现在顶级交易所中，则表明其具有高度的可信度和合法性。例如，Polkadot 的 “DOT” 在排名前十的交易所中上市了九家，这表明其信誉度很高。\n\
  \n### 行动步骤\n\n按照以下步骤确定投资资产是否在一级交易所上市，以确认其对于投资者的可信度、合法性、流动性和可及性。\n\n1.  **验证资产是否在顶级交易所上市**\n\
  \n    按照“*顶级 CEX 资产验证*”部分概述的步骤，验证该资产是否在顶级中心化交易所上市。\n\n2.  **记录笔记，并以自己的方式记录调查结果**\n\
  \n3.  **将调查结果与基本面评估过程的其他部分相结合**\n\n#### 结果评估\n\n当数字资产在主要的一级数字交易所上市时，会显著提升项目的可见性、可信度和流动性，吸引更多投资者，并有助于资产在生态系统内的增长和采用。\n\
  \n如果投资者对某个未在任何知名交易所上市的特定数字资产感兴趣，那么务必谨慎行事，避免投资，除非在完成全面的基本面评估后获得了明确许可。这一点尤其适用于处于初期阶段的新创项目，这些项目可能未能通过或仍在经历一级交易所执行的严格审查流程。因此，务必意识到这些项目承担着额外的风险和流动性不足的可能性。\n\
  \n交易所的选择，无论是中心化、去中心化、低层级还是高层级交易所，都取决于投资者能够接受的风险水平。在做出任何投资决策之前，彻底了解相关风险至关重要。\n\n"
- '# 区块链架构


  本章将分析区块链项目的架构设计。区块链架构可以描述为管理点对点网络上核心操作及参与者交互的结构性基础设施设计。同样的原则也适用于传统企业，其中嵌入式系统和流程决定了日常运营、制造过程、营销策略、业务发展等。这些系统的设置和设计直接影响最终用户体验、效率、盈利能力以及公司的声誉。


  就区块链技术而言，架构设计会影响可扩展性、互操作性、网络拥塞程度、交易时间、交易速度、交易成本、功能性和安全性。因此，采用区块链技术的公司，其架构设计对项目的成功至关重要。目标是拥有一个快速、高效、高性能、多功能且具备出色互操作特性的区块链。


  **本章讨论的基本概念：**


  *   区块链架构层

  *   区块链三难困境

  *   公有链、私有链、联盟链和混合链

  *   无许可链和许可链

  *   匿名与隐私赋能区块链

  *   治理

  *   跨链互操作性




  '
- '# 区块链架构层


  **评估目标：评估第 0 层、第 1 层、第 2 层或第 3 层区块链项目的价值与潜力，以及构建在这些区块链之上的任何 `dApp`。**


  区块链层仅仅是系统中相互堆叠的不同层级，它们协同工作，共同实现使底层区块链更高效运行的总体目标。通常需要多个区块链层和协议层，因为区块链本身并不完美，且难以随着需求的增长进行扩展，从而导致网络拥堵、可用性差、交易处理速度慢以及
  Gas 费用高昂，给最终用户带来糟糕的体验。


  每一层都对下层进行补充，通过增加新功能或进行改进，从而创建一个更高效的系统。这些层级分别表示为：第 0 层（`L0`）、第 1 层（`L1`）、第 2 层（`L2`）和第
  3 层（`L3`）。这些层级共同改善了最终用户的整体体验，并旨在满足那些希望通过区块链技术优化其业务传统企业的需求。区块链公司致力于设计一个强大且能够自由扩展无任何限制的区块链系统。不幸的是，在撰写本书时，大多数区块链在没有分层协议帮助的情况下无法实现这一目标。


  值得注意的是，并非每个区块链都是多层的。有许多区块链并不依赖 `L2` 或 `L3` 来提供支持。在某些情况下，网络流量很小，使得额外的扩展层变得没有必要。一个新兴的或不太受欢迎的区块链可能也缺乏足够的用户基础来证明此类开发的合理性。此外，一些区块链在设计之初就具备了先进的原生可扩展性和互操作性功能，从而消除了对外部层的需求。例如，`Polkadot`
  利用其`中继链`和`平行链`来实现可扩展性和高吞吐量，完全绕开了对 `L2` 或 `L3` 解决方案的需求。


  通过理解区块链层，投资者可以做出明智的投资决策。本节第一部分将讨论四个架构层——`L0` 到 `L3` ——之间的区别，随后介绍一个评估流程，将这些层级作为独立的生态系统进行投资分析。


  ## 区块链层概览


  介绍区块链层最简单的方法是将它们比作建筑的不同部分——请参考以下类比。


  **第 0 层区块链 –** ***地基***


  `L0` 提供了基础性的基础设施，其他一切均构建于此之上。它还有助于连接多个区块链，使它们能够相互通信，并在彼此之间传输资产和信息。


  **第 1 层区块链 –** ***建筑主体***


  `L1` 是主要的区块链协议，它可以独立运行，也可以构建在 `L0` 之上。这一层负责交易的执行、验证以及链上活动和操作。


  **第 2 层协议 –** ***公用设施（空调、水电等）***


  `L2` 是一个优化层，其主要任务是提高 `L1` 的效率，帮助解放 `L1` 基础层，使其能够扩展并降低交易成本。


  **第 3 层协议 –** ***高级功能（智能系统）***


  `L3` ——构建于 `L2` 之上——为`dApps`和区块链基础设施提供额外的功能、性能和互操作性。


  表 6-1


  区块链分层架构结构


  | **第 3 层 (L3) 协议**（例如 Orbs Network） |

  | **第 2 层 (L2) 协议**（例如 Immutable X, Lightning Network） |

  | **第 1 层 (L1) 区块链**（例如 Ethereum, Binance Chain, Moonbeam, Cardano, bitcoin） |

  | **第 0 层 (L0) 区块链**（例如 Polkadot, Cosmos） |


  ## 第 0 层区块链


  **示例：** [Polkadot Network](https://polkadot.network/), [LayerZero](https://layerzero.network/),
  [Cosmos Network](https://cosmos.network/)


  第 0 层（`L0`）区块链可以运行自己的原生链，同时作为一个基础层，让更高级别的系统——例如第 1 层网络、第 2 层解决方案、侧链和 `dApps` ——在此基础上构建并独立运行。它们提供底层安全性，并实现无摩擦的跨链互操作性，促进构建于其上的所有区块链和平台之间的通信以及数据和资产的无缝交换。`L0`
  力求提供一次性解决方案，以解决业内已知的问题，例如区块链之间的可扩展性和互操作性，从而旨在为用户提供跨多个网络的无缝体验。此外，`L0` 允许开发者构建创新的、定制化的、可扩展的区块链和
  `dApps`，并具备增强的交易速度、链上治理、互操作性、质押和隐私等功能。


  `Polkadot Network` 是 `L0` 区块链的一个绝佳范例，它提供了“平行链”基础设施（图 6-1），拥有一个真正的多“平行”链应用环境，其中增强的可扩展性和跨链互操作性为跨多生态系统网络及更广阔的范围提供了无摩擦的通信和无缝的数据传输。


  ![图表展示了区块链网络结构。中心是一个标有“中继链”的大圆圈。周围是较小的结构，标有“平行链”，每个平行链都与中继链相连。这些结构包含标有“收集人”和“验证人”的组件。其中一个结构标有“桥梁”，表示与外部元素的连接。该图展示了网络内部的交互和连接性。](img/648696_1_En_6_Fig1_HTML.jpg)


  图 6-1


  Polkadot 网络平行链架构（图片引用自 [`https://guide.kusama.network/docs/polkadot-v1/`](https://guide.kusama.network/docs/polkadot-v1/)）


  ### Polkadot 区块链基础设施的核心组件


  图 6-1 展示了 Polkadot 的整体架构及对应组件。Polkadot 的`中继链`——以环形表示——充当系统的主链，其周围环绕着多个与之相连的平行链。每个平行链通过中继链相互通信。Polkadot
  架构中每个核心组件的功能（根据 Polkadot 网络的描述）如下：


  - **中继链** – Polkadot 的核心，负责网络的共享安全、共识和跨链互操作性。

  - **验证人** – 通过质押`DOT`、验证来自收集人的证明以及与其他验证人共同参与共识来保障中继链的安全。

  - **平行链** – 主权区块链，可以拥有自己的代币，并针对特定用例优化其功能。

  - **收集人** – 通过收集用户的碎片交易并为验证人生成证明来维护碎片。

  - **桥梁** – 允许平行链和平行线程连接外部网络（如以太坊和比特币）并进行通信。

  - **平行线程** – 与平行链类似，但采用按需付费模式；平行线程无需锁定`DOT`以长期租用插槽，而是在每次提交区块时支付少量费用，因此活动频率不高的项目可以避免持续连接带来的较高成本。




  ### 第一层区块链


  **示例：** [以太坊](https://ethereum.org/en/)、[BNB 链](https://www.bnbchain.org/en)、[月神网络](https://moonbeam.network/)


  第一层（L1）区块链，也称为*基础层*，提供了一个基于区块链的基础设施，开发者可以在此基础上构建各类服务、产品和软件应用。L1 通常是独立的区块链基础设施，提供并使用自身的共识机制来保障网络安全。它们依靠跨链桥和其他跨链互操作方法与其它区块链和生态系统进行通信。L1
  区块链的一个典型例子是以太坊，它承载了数千个提供广泛产品和服务的去中心化应用 (dApps)。这些 dApps 的著名示例包括 [Uniswap](https://uniswap.org/)、[Aave](https://aave.com/)
  和 [OpenSea](https://opensea.io/)。


  尽管 L1 通常是独立的基础设施，但有时它们会得到底层零层网络的支持，并在某些方面由其保障安全和支持。如前所述，任何构建在 L0 之上的 L1 都会继承令人称赞的优势，例如跨链互操作性、增强的安全性，以及构建易于使用的定制化
  L1 区块链的潜力。


  [月神网络](https://moonbeam.network/) 是一个构建在波卡网络（Polkadot Networks）L0 去中心化、安全且可扩展的平行链基础设施之上的
  L1 区块链的绝佳例子。许多 dApps，包括 [SushiSwap](https://www.sushi.com/swap)、[Band Protocol](https://www.bandprotocol.com/)
  和 [Curve](https://curve.fi/%2523/ethereum/swap)，都构建在月神网络上。然而，这些 dApps 受益于月神和波卡区块链基础设施的安全性，从而实现更强的跨链“多生态系统”互操作性、可扩展性、去中心化治理功能，以及低成本和快速交易处理。


  ### 第二层协议


  **示例：** [Immutable](https://www.immutable.com/)、[闪电网络](https://lightning.network/)、[Polygon
  zkEVM](https://polygon.technology/polygon-zkevm)


  第二层（L2）是建立在底层 L1 区块链之上的另一个区块链或链下协议解决方案的总称。L2 旨在解决父级 L1 区块链的问题，例如网络拥塞、可扩展性差、交易速度慢、交易费用高以及整体用户体验不佳。这是通过扩展底层
  L1 区块链来实现的，即提高吞吐量（在任意给定时间内能从一处处理到另一处的工作量）和交易处理速度。


  L2 协议的工作原理是，在将大量交易批量处理并在父区块链上返回和处理之前，先在链下进行验证。这减少并降低了 L1 区块链在典型共识和交易处理过程中必须执行的工作。需要注意的是，L2
  协议解决方案的安全性来源于其父级 L1 区块链。


  [Immutable X](https://www.immutable.com/) 是以太坊上的第二层协议，它通过使用 StarkWare 基于 ZK-STARK
  的 *validium* 系统，在不牺牲安全性或去中心化的前提下提升了吞吐量：交易批次被压缩成 *“有效性证明”* 形式并提交到以太坊进行最终验证，而数据本身则保存在链下。然后，该证明被发送到第一层父区块链（以太坊）进行处理。这项技术是
  [StarkWare](https://starkware.co/) 开发的 NFT 专用交易所、证明逻辑和卷叠技术的结合。Immutable 尖端的第二层 NFT
  交易协议每秒可处理超过 9,000 次 NFT 转账、交易和铸币。


  第二层协议的另一个例子是比特币[闪电网络](https://lightning.network/)。闪电网络在比特币区块链之上创建了第二层，它使用用户生成的微支付通道来帮助实现更快、更便宜的交易，而无需更改区块大小。


  ### 第三层协议


  **示例：** [*Orbs 网络*](https://www.orbs.com/)


  第三层（L3）协议——一个新兴的、定义相对松散、构建于 L2 解决方案之上的类别——旨在为 dApps 和底层区块链基础设施增加额外的功能、互操作性和性能。它们还为每个
  dApp 提供具有高度可定制选项和安全特性的应用特定功能。与 L2 协议一样，L3 协议继承并利用了底层 L1 区块链（例如以太坊区块链）的安全性。


  L3 的一个例子是 Orbs 网络，这是一个为广泛的链上 DeFi 应用（不仅仅是高级交易）而设计的区块链基础设施。Orbs 通过提供用于聚合流动性、算法和限价订单、去中心化衍生品以及其他金融模块的工具来增强
  DeFi 功能。


  ![一个金字塔图，展示了去中心化交易的概念。金字塔分为三层：底部的第一层标记为“安全性”，中间的第二层标记为“可扩展性”，顶部的第三层标记为“增强执行”。金字塔的顶部与“去中心化交易”相关联。背景是紫色到蓝色的渐变。](img/648696_1_En_6_Fig2_HTML.jpg)


  图 6-2


  Orbs——用于去中心化交易的第三层




