  \n**专家提示**\n\n当遇到复杂的路线图时，建议将其分解为对您有意义的简单条款。如需澄清或解释，请向社区团队成员寻求帮助。\n\n以太坊是一个复杂且不断演进的系统，拥有许多利益相关者，例如开发人员、研究人员、用户和验证者。因此，为路线图上的每个功能或升级提供准确的时间表具有挑战性。此外，开发、测试、审计、协调、共识和反馈等环节主要以开源方式管理，许多参与者在有空时贡献他们的时间。在撰写本文时，尽管仍有一些长期里程碑有待实现，但以太坊在过去十年中已经完成了许多重大升级，并持续推出新的改进——不过，对于像以太坊这样的项目，持续改进将永不止步。有关以太坊路线图的实时更新，请查看\
  \ [`https://ethroadmap.com/`](https://ethroadmap.com/)。\n\n此外，与许多其他开源项目一样，以太坊的路线图并非一成不变的计划。它是灵活的，并且可能会根据网络及其用户面临的新挑战、新机遇和新需求而发生变化。这种结构旨在支持持续创新，同时特别强调加强网络的安全性。\n\
  \n#### 需要考虑的因素\n\n许多因素共同决定了一个区块链项目的价值，包括价值主张、代币设计、代币经济学、编程语言、架构、项目团队和社区精神。然而，如果项目的核心技术交付成果未能准确、透明地执行并与既定目标保持一致，那么这些基础因素的重要性就会大大降低。未能实现这些关键技术组件可能会对产品的核心功能和实用性产生负面影响，从而损害团队的声誉以及项目的长期成功和可持续性。因此，投资者必须留出足够的时间，以正确理解并评估项目迄今为止的进展以及路线图中概述的未来技术交付成果。\n\
  \n虽然并非必要，但一些投资者会将他们的兴趣和技术知识与他们选择的投资类别相匹配，以帮助降低风险。例如，[以太坊](https://ethereum.org/en/)、[Polkadot](https://polkadot.com/)、[Moonbeam](https://moonbeam.network/)\
  \ 等基础设施项目可能会吸引一些投资者的注意。相比之下，其他人可能更了解 [The Sandbox](https://www.sandbox.game/en/)\
  \ 或 [Axie Infinity](https://axieinfinity.com/) 等游戏项目。然而，这通常会将投资者限制在加密货币世界中的一种投资类别，这可能不适合许多投资者，并可能错失其他潜在的投资机会。培养评估该领域广泛项目所需的技能和知识是更值得推崇的。\n\
  \n产品路线图也是用于竞争对手分析的绝佳比较工具。将路线图与一个强大的、成功的竞争对手的路线图进行比较和对比，有助于发现可能促成项目成功或导致其失败的优缺点。其中可能包括：\n\
  \n*   他们有哪些独特的卖点，例如能够吸引更广泛受众的功能或优势？\n*   他们的技术有何不同，是否提供了任何优势或弱点？\n*   他们的时间表是否现实，或者看起来过于激进？\n\
  *   他们的长期愿景在可持续性和市场趋势方面如何比较？\n*   他们是否符合当前的监管要求？\n*   他们的路线图或执行中是否存在明显的专业性缺失？\n\
  *   路线图是否定期更新以反映进展和变化？\n*   路线图是否为投资者提供了足够的细节，以真正了解项目方向？\n\n## 评估加密路线图\n\n使用特定的路线图评估标准来评估现实中的加密项目路线图。面对市场上各种不同类型的路线图，评估加密路线图可能看起来有些棘手。然而，在大多数情况下，可以使用相同的核心评估标准进行通用评估。无论评估何种类型的路线图，清晰的目标、远大的愿景、现实的里程碑和透明度等关键要素都至关重要。通过关注这些关键领域，投资者可以很好地判断一个项目是否在正确的轨道上，或者未能兑现其承诺。\n\
  \n首先，从正在评估的项目中找到项目路线图。如前所述，通常可以找到项目路线图的可靠来源是官方项目渠道，例如公司网站、白皮书、社交媒体和博客。需要注意的是，许多项目每年都会更新其路线图；请务必确保您拥有最新、最前沿的版本。\n\
  \n\n\n### 目标与目的\n\n***评估目的：判断项目路线图中的目标和里程碑是否清晰、切合实际、可衡量，并与项目愿景保持一致。***\n\n在本节中，将借助\
  \ SMART 评估参数对 [BNB Chain](https://www.bnbchain.org/en) 的目标与目的进行评估。此过程有助于投资者判断路线图中的目标和里程碑是否定义清晰、是否切实可行、是否可衡量，以及是否与项目愿景保持一致，从而确保团队能够成功执行。\n\
  \n如图 11-4 所示，`BNB Chain` 是一个产品开发路线图的示例。这些目标包括优化 `BNB` 区块链的性能、可扩展性、基础设施、去中心化程度和安全性。虽然其图形细节不如\
  \ 以太坊的产品开发路线图 丰富，但它像许多其他项目一样，聚焦于高层次交付成果。通常，这些可视化路线图会辅以对每个里程碑的深入讨论。对于 `BNB Chain`，可以在官方\
  \ `BNB Chain` 博客上找到每个交付成果的详细解释：[`https://www.bnbchain.org/en/blog/bnb-chain-tech-roadmap-2023`](https://www.bnbchain.org/en/blog/bnb-chain-tech-roadmap-2023)。\n\
  \n实现每个目标所需达成的具体目的都写在每个项目目标的下方。例如，为了实现第一个目标——优化性能，其具体目的是提高区块链的速度、可靠性和最终性。同样，请阅读 `BNB`\
  \ 博客以获取对该目标和目的的更详细描述。\n\n**专业提示**\n\n切勿仅仅依赖路线图中概述的高层次概览。务必深入研读团队围绕每个核心交付成果所提供的相关文档。这样可以获得更清晰、更透明的理解，并且可能会揭示可视化路线图中未包含的信息。\n\
  \n如前所述，SMART 目标对于团队在设计过程中和投资者在整体基本面评估中都至关重要。当根据 SMART 目标进行评估时，`BNB Chains` 获得了积极的结果——结果摘要如表\
  \ 11-2 所示。\n\n**表 11-2** `BNB chain` 的 SMART 目标分析（结果取自官方路线图及路线图细节，详见 [`https://www.bnbchain.org/en/blog/bnb-chain-tech-roadmap-2023/`](https://www.bnbchain.org/en/blog/bnb-chain-tech-roadmap-2023/)）\n\
  \n| `BNB Chain` — SMART 目标评估 |\n| --- |\n| 参数 | 发现结果 |\n| --- | --- |\n| **明确性**\
  \ | 路线图及 `BNB Chain` 博客中详述的每个目标都清晰易懂。例如，`BNB Chain` 计划通过与以太坊社区合作，为 `BSC` 开发性能最佳的\
  \ EVM 兼容客户端以提升可扩展性。此外，为了进一步增强可扩展性，它计划利用新兴技术，如 `ZKP` 和乐观汇总结，以及模块化扩展，如 `opBNB`（执行层）和\
  \ `BNB Greenfield`（数据可用性层），这两者都利用开源 `OP-Stack Bedrock` 框架，为 `dApps` 提供更便宜、可扩展且安全的解决方案。\
  \ |\n| **可衡量性** | 是的，目标是可衡量的。衡量单位因目标而异。例如，每秒交易数（`TPS`）是用于衡量性能的指标之一，而渐进式去中心化则可以通过多个与验证者相关的指标来追踪——例如，活跃验证者数量、其地理分布、治理参与率以及共识层正常运行时间。此外，其他目标则按完成、未完成或进行中来衡量。这些目标包括优化\
  \ `BNB Chain` 基础设施，例如用于增强钱包服务、消息传递与通信、区块链数据与索引查询、Web3 身份服务以及各种混合应用（包括供应链项目、治理投票、审计、发票流转、忠诚度计划和医疗记录）的多种工具和功能。\
  \ |\n| **可行性** | 基于 `BNB Chain` 之前设定、执行并完成的目标和目的，其 2023 年的工作目标，如增强可扩展性、基础设施、去中心化和安全性，被认为是在团队能力范围内可以实现的。例如，请参阅下面\
  \ `BNB Chain` 的 [2022 年已完成目标](https://www.bnbchain.org/en/blog/bnb-chain-tech-roadmap-2023/)\
  \ 作为参考。`BNB Chain` 已经证明了自己是一个优质的区块链基础设施（尽管有时因过于中心化而受到批评）。尽管如此，所述的目标对该公司来说似乎并非遥不可及。\
  \ ![展示 BNB 2022 年在不同主题下发展的表格。在“可扩展性”下，列出了 BSC 区块 Gas 限制、Parallel EVM 2.0、Fast Node\
  \ 和 Erigon 客户端。“去中心化数据经济”被提及但没有具体说明。“多链解决方案”包括 BNB SideChain 和 ZkBNB。“安全”以 AvengerDAO\
  \ 1.0 为特色。“持续深化去中心化”涵盖了开源 BNB Beacon 链、区块挖矿优化以及多项 BEP 计划。“BNB 大规模采用基础设施”包括钱包服务、去中心化存储、预言机、DAO\
  \ 工具、数据索引和 RPC 服务。](img/648696_1_En_11_Figa_HTML.jpg) |\n| **相关性** | 目标是相关的。`BNB\
  \ Chain` 的愿景是构建支撑世界并行虚拟生态系统的基础设施。为了实现这一目标，关键要素正是 `BNB Chain` 2023 年路线图中概述的具体目标（*增强可扩展性、基础设施、去中心化和安全性*）。因此，实现这些目标的具体目的具有相关性，并符合公司的宗旨和愿景。\
  \ |\n| **时限性** | 基本目标是有时限的，但基于年度时间框架，而不是季度或月度。鉴于这是一个包含多个交付成果的路线图，更细粒度的、基于具体功能的发布日期会在后续公布。\
  \ |\n\n![标题为“技术路线图 2023”的流程图，适用于 BNB Chain。它概述了关键关注领域：1. **性能**：提升区块链速度、可靠性和最终性。2.\
  \ **可扩展性**：提高吞吐量并实现 zkBNB EVM 兼容性。3. **基础设施**：改进开发工具，引入新服务并部署新型区块链。4. **去中心化**：增加验证者席位并实现验证者选择的民主化。5.\
  \ **安全性**：增强原生安全 DAO 并部署风险管理框架。该图表在视觉上使用箭头连接这些关注领域，强调了一项旨在技术进步的战略规划。](img/648696_1_En_11_Fig4_HTML.jpg)\n\
  \n**图 11-4** `BNB Chain` 2023 年技术路线图（致谢：[`www.bnbchain.org/en/blog/bnb-chain-tech-roadmap-2023/`](https://www.bnbchain.org/en/blog/bnb-chain-tech-roadmap-2023/)）\n\
  \n### 行动步骤\n\n请按照以下步骤评估项目路线图中的目标和里程碑是否清晰、切合实际、可衡量，并与项目愿景保持一致。\n\n1. **目标与目的**  \n\
  \   使用路线图，阅读并理解项目的目标与目的。\n\n2. **SMART 目标评估**  \n   使用 SMART 分析工具，评估项目的目标与目的。\n\n\
  3. **做笔记并以你自己的方式记录发现**\n\n4. **将发现与其他基本面评估流程部分相结合**\n\n\n\n#### 结果评估\n\n假设通过 SMART\
  \ 评估发现，存在目标模糊、不可衡量或不相关、期望不切实际、时间线定义不佳或难以实现的情况，则建议在进行更深入研究之前不要继续推进。根据评估中未达到标准要求的具体方面，通过可靠来源搜索更多信息，并在必要时联系团队。关键是要确保目标值得投入。投资一个轨迹不佳的项目风险极高，应不惜一切代价避免。\n\
  \n### 愿景与目的\n\n**评估目标：** 评估项目是否具备清晰的愿景和目的，能够解决现实世界的问题，与其核心目标保持一致，并对区块链生态系统的整体发展具有高价值。\n\
  \n评估的这一部分有助于投资者判断项目是否拥有清晰的愿景和目的，能够解决现实世界的问题，与其核心目标保持一致，并对区块链生态系统的整体发展具有高价值。\n\n\
  本节以 Polygon 网络为例，说明如何评估项目的愿景和目的。Polygon 被其自身定义为“为现有平台提供扩容解决方案的侧链/子链，旨在为去中心化应用/用户功能提供可扩展性和卓越的用户体验。”Polygon（原\
  \ Matic Network）致力于在不牺牲去中心化的前提下，解决可扩展性和可用性问题，并充分利用现有的开发者社区和生态系统。\n\n#### Polygon\
  \ 的愿景\n\nPolygon 技术的愿景可在项目[白皮书](https://polygon.technology/papers/pol-whitepaper)中找到。其中具体概述了项目的愿景如下：\n\
  \n> “Polygon 作为互联网价值层的愿景，是引领一个价值可以像我们今天创造和交换信息一样，自由地在全球范围内创造和交换的世界。一个能够实现更公平、更具包容性、更高效的人类组织和治理新形式的世界。我们坚信，实现这一愿景将极大地推动我们社会的进步。”\n\
  \n审视 Polygon 的愿景后，可以明显看出团队正充满热情地追求某些目标，例如：\n\n1.  “价值可以自由地在全球范围内创造和交换”——这里的**自由**和**全球**是关键，意味着数字资产的发送不受任何限制和中介干预。\n\
  2.  “一个能够实现更公平、更具包容性、更高效的人类组织和治理新形式的世界”——这里的**更公平**、**更具包容性**和**更高效**是关键——Polygon\
  \ 致力于在网络上实现更廉价、更快速的交易。\n3.  “我们坚信，实现这一愿景将极大地推动我们社会的进步。”——Polygon 希望为整个区块链生态系统增加价值，从而助力社会的进一步进步。\n\
  \n#### Polygon 路线图与愿景的一致性\n\n图 11-5 展示了 Polygon 的技术路线图。该路线图突出了 Polygon 在 2023 年实现的四个重要里程碑。这些里程碑如下：\n\
  \n![Polygon 2.0 推广截图，详细描述了“互联网价值层”的概念，重点强调了“无限可扩展性”和“统一流动性”。它概述了一系列统一 Polygon 协议的升级提案，关键日期为\
  \ 2023 年 6 月和 7 月，涉及 Polygon PoS、架构与堆栈、代币经济学和治理。图片包含一系列标有“以太坊”的互联蓝色方块视觉元素，并描述了一个用于无缝跨链交互的“zk\
  \ 驱动网络”。它强调了社区协作，并引用了“社区论坛”。](img/648696_1_En_11_Fig5_HTML.jpg)\n\n图 11-5\n\nPolygon\
  \ 技术组织的 2.0 路线图（图片由 [`https://polygon.technology/roadmap`](https://polygon.technology/roadmap)\
  \ 提供）\n\n1.  **Polygon PoS 升级至 ZK L2**\n2.  **协议架构**\n3.  **POL 代币经济学**\n4.  **治理的三大支柱**\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n#### 互联网的价值层\n\n正如 Polygon\
  \ 所描述的，价值层就是互联网，它本质上是一种无需通过中介和第三方即可发送和接收价值的能力。为了增强这一价值层，Polygon 计划通过实施路线图中概述的核心交付成果（`Polygon\
  \ PoS 向 ZK L2 的演进`、`协议架构`、`POL 代币经济学`以及`治理三大支柱`）来改进其技术的多个方面。在下面的分析中，我们将讨论这些里程碑，并将其与\
  \ Polygon 的愿景进行比较，以判断该项目是否仍与其最初的愿景保持一致。\n\n![一系列五个色彩缤纷、抽象的图板，包含蓝色和粉色的几何形状。每个图板都包含与\
  \ Polygon 2.0 相关的文本，标题包括：“介绍 Polygon 2.0：互联网的价值层”、“Polygon PoS 向 ZK L2 的演进”、“协议架构”、“POL\
  \ 代币经济学”和“治理三大支柱”。标有“阅读博客”、“Twitter 线程”、“白皮书”和“Polygon 2.0：治理支柱”的按钮，指示着进一步信息的链接。设计现代且视觉上引人入胜。](img/648696_1_En_11_Fig6_HTML.jpg)\n\
  \n图 11-6\n\nPolygon 技术路线图——关键交付成果（图片来自 [`https://polygon.technology/roadmap`](https://polygon.technology/roadmap)）\n\
  \n1.  `Polygon PoS 向 zkEVM Validium 的演进` – 正如 Polygon 所描述的，这是一个“将 Polygon PoS 升级为\
  \ zkEVM validium 的提案，这是一种 Validium 类型的二层网络，它使用零知识（ZK）证明，同时将交易数据保持在链下，引入了与 Rollup\
  \ 不同的信任假设”。\n\n![流程图比较 Polygon PoS 和 Polygon zkEVM Validium。左侧，Polygon PoS 显示“$2B\
  \ 质押，100 个验证者”，连接到“以太坊安全性”（“$42B 质押，500k 个验证者”）。一个箭头指向右侧，表示向 Polygon zkEVM Validium\
  \ 的过渡。此部分在“zk 安全性”下也显示“$2B 质押，100 个验证者”，并使用相同的质押和验证者详细信息链接到“以太坊安全性”。](img/648696_1_En_11_Fig7_HTML.jpg)\n\
  \n图 11-7\n\nPolygon PoS 向 zkEVM validium 的演进（图片来自 [`https://polygon.technology/blog/polygon-2-0-polygon-pos-zk-layer-2`](https://polygon.technology/blog/polygon-2-0-polygon-pos-zk-layer-2)）\n\
  \n**愿景一致性** – 这一里程碑交付成果与 Polygon 的愿景一致，它使 Polygon PoS 变得更加安全，同时具备低费用和高可扩展性，从而有助于提升整体的用户体验效率。\n\
  \n2.  **协议架构** – Polygon 提出了一个由 `质押层`、`互操作层`、`执行层`和`证明层`组成的四层架构设计。Polygon 2.0 提出的架构旨在提供无限的可扩展性和统一的流动性。此外，它还实现了\
  \ Polygon 作为互联网价值层的愿景，该愿景使全球经济准入民主化，允许在一个更加去中心化的系统中，无需看门人、寻租者或任何形式的中介即可交换价值（信息或资产）。\n\
  \n![标题为“基于 ZK 的协议架构”的图表，显示了四个标记层的堆叠：质押层、互操作层、执行层和证明层。这些层被描绘成垂直堆叠的 3D 区块。左下角有一个带有文字“polygon\
  \ 2.0”的标志。](img/648696_1_En_11_Fig8_HTML.jpg)\n\n图 11-8\n\nPolygon 2.0 协议架构（图片来自\
  \ [`https://polygon.technology/blog/polygon-2-0-protocol-vision-and-architecture`](https://polygon.technology/blog/polygon-2-0-protocol-vision-and-architecture)）\n\
  \n**愿景一致性** – 这一里程碑交付成果与 Polygon 的愿景一致，它在维护自主权的同时，允许资产自由地全球交换。此外，它通过增加区块链之间的互操作性，使个人能够灵活地将技术用于更多的用例和集成，从而有助于社会的进一步发展。\n\
  \n3.  **POL 代币经济学** – 最初使用 `MATIC` 代币的 Polygon，已推出了一项技术升级，用 `POL` 替代 `MATIC`。`POL`\
  \ 是下一代协议代币，旨在成为原生资产的主要工具——即超高效代币。更多细节请参见 [`https://docs.polygon.technology/pos/get-started/matic-to-pol/`](https://docs.polygon.technology/pos/get-started/matic-to-pol/)。与高效代币类似，它允许其持有者成为验证者并获得奖励，但有两个颠覆性的改进：\n\
  \    *   验证者可以验证任意数量的链——“多链验证”。\n    *   每条链都可以向验证者提供多种角色（以及相应的奖励）。\n\n**愿景一致性**\
  \ – 这一 Polygon 升级和里程碑交付成果与 Polygon 的愿景一致，它改变和改进了底层核心技术方面，带来了显著的可扩展性收益、生态系统安全性、生态系统支持和社区所有权。\n\
  \n4.  **Polygon 2.0 治理** – 提出一个面向未来的框架，用于对所有 Polygon 协议和生态系统进行去中心化的所有权和决策。这将赋予社区对\
  \ Polygon 网络的完全控制权以及对所有提案的最终决定权。\n\n该系统涉及三大治理支柱：`协议治理`、`系统智能合约治理`和`社区财库`。通过去中心化治理，代币持有者可以对这三大治理支柱进行投票。\n\
  \n![图示说明三大治理支柱。支柱一：协议治理，展示了一个风格化的柱基。支柱二：系统智能合约治理，采用了不同的柱式设计。支柱三：社区财库，展示了另一种独特的柱式风格。每个支柱都标记清晰且在视觉上各有不同，强调了治理的不同方面。](img/648696_1_En_11_Fig9_HTML.jpg)\n\
  \n图 11-9\n\nPolygon 的三大治理支柱（图片来自 [`https://polygon.technology/blog/polygon-2-0-governance`](https://polygon.technology/blog/polygon-2-0-governance)）\n\
  \n**愿景一致性** – 这一里程碑交付成果与 Polygon 的愿景一致，它提供了真正的治理功能，允许网络参与者自行管理其资产，并做出统一决策以引导 Polygon\
  \ 实现长期成功和持久发展。这有助于构建一个更加公平的世界，将权力交还给人民。\n\n### 行动步骤\n\n请按照以下步骤评估一个项目是否有清晰的愿景和目的，能否解决现实世界的问题，是否符合其核心目标，并被认为对区块链生态系统的整体增长具有高价值。\n\
  \n1.  **评估项目愿景与目的**\n\n    使用本节中对 Polygon 执行的评估流程。\n    1.  该项目是否有清晰的愿景？\n    2.\
  \  其愿景是否与其核心目标一致？\n    3.  该项目的愿景是否对区块链领域的整体增长有所贡献，并被视为高价值？\n    4.  该愿景与同一领域的其他区块链技术有何关联？\n\
  \    5.  该愿景是否奖励代币持有者？如果是，如何实现？\n    6.  是否还有其他观察结果？\n\n2.  **记录笔记并用你自己的方式记录你的发现**\n\
  \n3.  **将这些发现与基本面评估流程的其他部分结合起来**\n\n\n\n#### 结果评估\n\n如果项目愿景与其目标不一致，就需要密切关注了，因为这表明团队内部甚至都未达成一致。清晰的愿景通常表明团队清楚自己在做什么，但如果事情看起来偏离了轨道，则可能指向糟糕的规划或优先级的变更。当然，区块链项目有时需要转向——这在快速发展的领域中是正常的——并且这些变化如果能增加价值或帮助项目成长，甚至可能是一件好事。然而，重大变化需要团队给出解释。如果他们对此不坦诚，这可能是一个危险信号，并且我们有理由怀疑团队的透明度。信任至关重要，没有信任，项目可能会失去社区的支持。\n\
  \n### 里程碑可行性\n\n**评估目标：评估项目里程碑是否可行且现实。**\n\n这部分评估通过对照关键指标，例如当前里程碑状态、技术复杂性、基础设施需求、资源可用性、时间线和整体绩效，帮助投资者判断项目里程碑是否可行且现实。本节以\
  \ `Filecoin` 为例，展示里程碑评估如何揭示项目是否能够按计划为区块链生态系统交付价值。`Filecoin` 是一个流行的开源公共区块链和去中心化文件存储协议，旨在成为一种基于区块链的协作数字存储和数据检索方法。`Filecoin`\
  \ 由 `Protocol Labs` 开发，作为 *星际文件系统* (`IPFS`) 的激励层，允许用户出租未使用的硬盘空间。\n\n为什么选择 `Filecoin`？在本书我们审视过的数十个区块链路线图中，`Filecoin`\
  \ 的路线图因其清晰度、里程碑分解以及公开可用的进度记录而脱颖而出。许多项目只发布高层次要点（“第三季度 – 主网上线”，“第四季度 – 建立合作伙伴关系”），这些内容对于详细、逐步的项目里程碑可行性评估来说，提供的信息非常有限。相比之下，`Filecoin`\
  \ 将其目标分组为标签清晰、注明日期的里程碑，解释每个里程碑背后的技术意图，并维护着一条活跃的开发更新轨迹，包括 `GitHub` 仓库、`Slack` 频道和社区会议。这种详细程度使其成为读者学习如何评估里程碑是否现实、资金充足且在技术上可行的理想教学范例。\n\
  \n即使像 `Filecoin` 这样记录完善的项目，某些与里程碑相关的细节仍然难以追踪：团队日程会变动，障碍会在私人开发者聊天中得到解决，并且由于法律或竞争原因，一些项目会保密——这在加密货币领域相当普遍。当你深入研究任何路线图时，一个现实的期望是会遇到一些确凿的事实、社区的讨论和一些空白点；几乎没有项目会把所有事情都摊开来说，所以意识到这一点很重要。你可能并不总能确认早期的里程碑是否已经达成，所需的所有工具和预算是否为下一步做好准备，或者设定的日期根据现有信息是否听起来合理。`Filecoin`\
  \ 的路线图很好地展示了如何处理这些信息缺口，并提醒我们信息缺失是游戏的一部分，在做出任何判断之前需要仔细权衡。非常感谢 `Filecoin` 团队将如此详细的路线图公开。\n\
  \n图 11-10 展示了 *Filecoin 虚拟机* (`FVM`) 的路线图。`Filecoin 虚拟机` (`FVM`) 是 `Filecoin` 网络上智能合约的执行环境。它允许任何人交互存储在\
  \ `Filecoin` 存储网络上的元数据和交易，为 `Filecoin` 带来用户可编程性，并释放开放数据经济。正如 `Filecoin` 所概述的，`FVM`\
  \ 的目标是为 `Filecoin` 项目增加通用的可编程性。\n\n**专家提示**\n\n如果项目的路线图没有包含明确的时间表，请检查前几年的目标是否已完成。许多项目会每年更新其路线图，但通常避免设定具体的任务截止日期。回顾过去几年的进展，可以让你深入了解团队实现其目标的有效性。例如，可以看看\
  \ `BNB Chain` 的路线图：\n\n[`https://www.bnbchain.org/en/blog/bnb-chain-tech-roadmap-2023c`](https://www.bnbchain.org/en/blog/bnb-chain-tech-roadmap-2023c)\n\
  \n[`https://www.bnbchain.org/en/blog/bnb-chain-2024-tech-roadmap`](https://www.bnbchain.org/en/blog/bnb-chain-2024-tech-roadmap)\n\
  \n`Filecoin` 的虚拟机 (`FVM`) 项目里程碑在表 11-3 中列出。此评估流程或评估工具旨在帮助投资者识别潜在风险并衡量项目的里程碑可行性。此评估讨论了关键技术复杂性、资源可用性、基础设施需求、绩效和时间线等关键指标。在此分析过程中，我们从多个来源（如白皮书和官方项目渠道，如项目网站、`GitHub`、`Slack`\
  \ 和其他在线资源）查找了每个评估指标的信息。**免责声明：** 以下关于此项目的信息仅供说明之用，并在撰写本书时进行了更新。此外，务必注意，自本书撰写以来，`Filecoin`\
  \ 的里程碑状态极有可能已经更新。\n\n**表 11-3**\n\nFilecoin 路线图里程碑评估\n\n\n\n| Filecoin FVM — 里程碑评估\
  \ |\n| --- |\n| 评估参数 | 评估内容 | 评估结果 |\n| --- | --- | --- |\n| **剩余里程碑状态** | 根据路线图确定待完成的剩余里程碑数量。\
