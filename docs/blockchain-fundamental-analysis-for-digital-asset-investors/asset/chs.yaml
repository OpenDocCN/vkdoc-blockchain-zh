  \ 3D 分子状结构。](img/648696_1_En_3_Fig3_HTML.jpg)\n\n图 3-3\n\n`Moonbeam Network`资源与文档（图片来源：[`​docs.​moonbeam.​network/​`](https://docs.moonbeam.network/)）\n\
