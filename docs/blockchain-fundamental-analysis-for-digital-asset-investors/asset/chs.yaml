  \n## 如何评估 TVL 比率\n\n总锁仓价值（TVL）比率是一个主要用于评估 DeFi 资产是被高估还是低估的指标。其计算方法是将市值除以 TVL。根据经验法则，评估标准如下：\n\
  \n*   **TVL 比率高于 1** – 该资产可能被高估\n*   **TVL 比率低于 1** – 该资产可能被低估\n\n图 9-17 显示了 [Compound\
  \ Finance](https://compound.finance/) 的财务详情，包括市值、TVL 和 TVL 比率。Compound Finance 的\
  \ TVL 比率为 0.39。公式 9-6 和公式 9-7 展示了 Compound 的 TVL 比率计算公式和计算过程。\n\n![Compound（COMP）财务仪表板截图，显示价格为\
