  \ dApp 保护其数字资产，并因此获得原生代币激励。 |\n| ***用例*** | 区块链创建与运行：使用户能够利用 Polkadot 的平行链框架来构建、启动并运行定制的、稳健的、去中心化的区块链，以满足客户的需求和要求。\
