  \n实用提示\n关注项目路线图中的关键里程碑日期。代币的价值很可能会在里程碑交付前的炒作期之前飙升。在这些关键日期前一到两周设置提醒，以适应“谣言买入，新闻卖出”类型的场景。\n\
  \n### 行动步骤\n按照以下步骤评估项目里程碑是否可行且现实。\n\n1.  **评估里程碑可行性**\n    1.  审查项目路线图，确保你理解各个里程碑及其预期交付成果。\n\
  \    2.  使用本章列出的标准和指标评估项目里程碑。\n\n2.  **做笔记并以你自己的风格记录你的发现**\n\n3.  **将你的发现与基础评估过程的其他部分结合起来**\n\
  \n\n\n#### 结果评估\n\n如果根据评估参数分析后，项目里程碑显得不可行或不切实际，建议与团队协商以寻求解答。投资者应意识到项目经常错过里程碑截止日期。鉴于区块链技术的复杂性，结合内外部因素，项目因错过一两个里程碑截止日期不应被忽视。然而，如果团队有多次错过里程碑和时间表，且更重要的是，有多个被放弃的里程碑的明确记录，这将被视为一个危险信号。\n\
  \n### 透明度与问责制\n\n**评估目标：** 评估项目团队是否就路线图里程碑提供清晰、及时的更新，并公开沟通进展。\n\n项目团队应定期更新并向投资者及更广泛的社区传达强有力的加密路线图。这能使团队承担责任，并有助于维护项目的信任、透明度和信心。此外，定期更新的路线图表明团队没有隐瞒任何东西，坦诚地说明其按时完成的任务、哪些方面落后以及遇到的任何问题。\n\
  \n然而，实时更新的路线图很少见，许多项目团队每年或更长时间才重新审视并手动更新一次路线图。造成这种情况的常见原因可能是团队落后于截止日期、没有可提供更新、缺乏资金和其他资源、遭遇不必要的强烈反对、管理不善或仅仅是疏忽。\n\
  \n由于路线图更新频率因项目而异，且通常很少，这使得投资者有更多责任通过项目的官方渠道（例如 `Discord`、`GitHub`、`Slack`、`X` 和\
  \ `Telegram`）进行研究，与包括开发人员在内的团队成员沟通，以了解当前的里程碑状态。如果里程碑日期未达到，请向团队询问这些关键日期未能达到的合理解释以及为弥补失去的时间而计划采取的行动。团队必须提供诚实的答案和反馈，解释为何落后于计划、为何路线图未更新，以及根据具体情况的其他任何方面。在可能的情况下，要求团队通过公开链接或代码更新来支持他们的答案——同时要认识到，出于安全、法律或战略原因，某些进展可能保密。这是一项重要但有时繁琐的任务；所需时间因每个项目提供的支持级别而异。\n\
  \n### 行动步骤\n\n按照以下步骤评估项目团队是否就路线图里程碑提供清晰、及时的更新，并公开沟通进展。\n\n1.  **评估路线图状态**\n    1.\
  \  审查项目路线图，并确定里程碑、目标和目的是否明确指定，并已更新至当前状态。\n    2.  如果路线图尚未更新，请按照本节所述联系项目团队寻求澄清。\n\
  \        1.  确定里程碑的当前状态。\n        2.  确定延误的原因，例如技术问题、资源缺乏等。\n        3.  延误的原因看起来合理且正当，还是仅仅是借口？\n\
  \        4.  你是否感觉到团队在隐瞒信息？\n        5.  团队是否有应急计划来帮助弥补时间并完成剩余的里程碑？\n\n2.  **评估路线图透明度与问责制**\n\
  \    1.  路线图是否与当前项目状态和里程碑保持同步更新？\n    2.  团队在里程碑状态和路线图其他要素方面是否公开坦诚？\n    3.  团队是否同意更新路线图，以便所有利益相关者了解当前状态？\n\
  \n3.  **记录笔记并以你自己的风格记录你的发现**\n\n4.  **将发现与基本面评估过程的其他部分结合起来**\n\n#### 结果评估\n\n不幸的是，项目路线图定义明确但缺乏对单个里程碑进展的更新是很常见的，导致不清楚哪些里程碑、目标和目的已完成或仍在进行中。因此，如果遇到提供实时更新的路线图，应将其视为透明度和问责制的明确标志——这绝对是一个加分项。\n\
  \n如果你就路线图更新联系项目团队，并且团队对里程碑、进展和截止日期、技术挑战、资源缺乏、目标、目的以及整体项目表现持开放、诚实和乐于提供信息的态度，这应被视为一个积极信号。相反，如果你真心尝试通过多种渠道联系团队，却只得到含糊、敷衍或根本没有回应，请将此视为一个危险信号。这表明团队毫无透明度，也不承担责任，这反过来将对项目的长期可行性和成功产生负面影响。\n\
  \n### 比较竞争对手的路线图\n\n**评估目标：** 比较路线图，确定项目的目标、里程碑和功能是否切合实际、执行良好且独特，同时评估其交付和创新能力。\n\
  \n作为路线图评估的一部分，建议将路线图与直接竞争对手的路线图进行比较。这有助于比较目标、目的、愿景、里程碑、透明度、问责制以及技术挑战，有时有助于揭示在完整基本面分析过程中可能未被捕捉到的各种基本面因素。要警惕某些功能的缺失或新增、架构修改或实施，以及生态系统集成，这些都可能对项目产生负面或正面影响。鉴于项目具有不同的成熟度级别，投资者在比较路线图时必须检查已实现的功能。\n\
  \n比较路线图时，要从可行性角度进行分析，不仅要看里程碑截止日期，还要看功能集——有时路线图可能不切实际，没有证据或明确的执行计划。要警惕对其他路线图的复制，不仅在设计方面，还包括里程碑、功能、目标、目的等。当你将一个项目的路线图与其竞争对手并列比较时，专注于基础——目标、功能以及截止日期是否真正得到满足。如果大多数可比链已经在推出相同的桥接或标准，而某个项目却一直落后，这是一个警告信号。进行进一步调查以了解原因，这样你就能掌握所有关键信息，做出明智的决策。\n\
  \n### 行动步骤\n\n按照以下步骤比较路线图，确定项目的目标、里程碑和功能是否切合实际、执行良好且独特，同时评估其交付和创新能力。\n\n1.  **定位竞争对手的路线图**\n\
  \    确定项目的竞争对手并找到相应的路线图。\n\n2.  **比较路线图**\n    按照本节所述，比较和对照项目路线图与竞争对手的路线图。\n\n3.\
  \  **记录笔记并以你自己的风格记录你的发现**\n\n4.  **将发现与基本面评估过程的其他部分结合起来**\n\n#### 结果评估\n\n如果项目的路线图因其切合实际的目标和独特的功能而脱颖而出，则视为积极信号，值得进一步关注。然而，如果它模仿竞争对手或在可行性方面有所欠缺，则可能表明原创性有限——或者在最坏的情况下，存在可疑之处——因此请格外谨慎行事，并根据需要进行进一步调查。\n\
  \n\n\n"
- "# 12. 项目代码库\n\n本章将从构建核心产品所使用的各种编程语言以及执行开发过程的开发团队的相应表现两个方面，讨论和评估项目代码库。项目*代码库*是软件项目的完整源代码文件集合，包括构建、执行和维护应用程序所需的一切。在区块链领域，项目的代码库通常托管在像\
  \ GitHub 这样的平台上，这是一个关键要素，有助于开发团队和公众协作，从而最大化项目的质量和整体潜力。\n\n分析项目代码库是投资者应该认真对待的关键基础要素。它能深入了解团队在核心产品开发方面的表现。通过分析代码安全性、提交频率、使用的编程语言、源代码类型、审计以及其他因素，来评估项目团队在与项目代码相关的活动、效率和表现。到本章结束时，投资者将掌握快速评估项目代码库质量的知识和技能，这反映了团队的表现和承诺。\n\
  \n**本章讨论的基础知识：**\n\n- 编程语言介绍\n- 智能合约\n- GitHub\n- 开源与闭源软件\n- 编程语言\n- Git 提交\n- Git\
  \ 贡献者\n- Git Issues\n- 代码安全审计\n- Bug 赏金\n- 源代码\n\n## 编程语言介绍\n\n编程语言是程序员用来向计算机或机器传达指令以执行任务的正式语言。每种编程语言都有其自身的语法、句法和规则，常见的例子包括\
  \ Java、Solidity、Python、C++、JavaScript、Ruby、PHP 和 Swift。程序员（开发者）利用编程语言来构建软件应用程序、网站、移动应用和其他数字产品。编程语言的选择通常取决于软件和产品需求、程序员的专业知识和可用资源。\n\
  \n事实\n\n使用代码构建的软件程序只是一组指令，告诉计算机如何以及何时执行特定任务。\n\n在区块链领域，不同的编程语言用于开发去中心化应用程序（dApps）的前端和后端以及底层区块链基础设施。进一步细分，这些语言构建了与区块链相关的基本要素，包括分布式账本、共识机制、智能合约和网络节点。此外，编程语言定义了这些组件的规则、行为、交互和操作。例如，以太坊是最流行的区块链平台之一，它使用\
  \ Solidity（图 12-1），一种高级编程语言，来编写智能合约。\n\n![一个简单代币的 Solidity 智能合约代码截图。该代码指定了一个名为 \"\
  SimpleToken\" 的合约，包含余额、名称、符号、小数位数和总供应量的公共变量。构造函数使用名称 \"Rohas Nagpal\"、符号 \"ROHAS\"\
  、18 位小数和 1 千万亿的总供应量来初始化代币。一个名为 \"transfer\" 的函数允许在地址之间转移代币，确保发送者有足够的余额。代码使用 Solidity\
  \ 0.8.0 版本编写。](img/648696_1_En_12_Fig1_HTML.jpg)\n\n图 12-1\n\n一个简单代币的 Solidity 代码（致谢：[`blockchainblog.substack.com/p/how-to-write-compile-and-deploy-a`](https://blockchainblog.substack.com/p/how-to-write-compile-and-deploy-a)）\n\
  \n除了扎实掌握各种编程语言及其应用的知识外，深入了解区块链技术对于为项目选择最合适的语言至关重要。在一个典型的加密项目中，开发者会使用多种编程语言，每种语言都是根据其应用场景、优势和劣势来选择的。\n\
  \n图 12-2 展示了 Uniswap，一个主要使用 Solidity 编程语言构建的去中心化交易所（DEX）应用程序。\n\n![一个加密货币交易所界面的截图。屏幕显示一个兑换部分，有两个用于选择加密货币的下拉菜单，当前显示为\
  \ \"ETH\" 和 \"AAVE\"。有输入金额的输入框，两者都设置为零。兑换部分下方有一个 \"连接钱包\" 按钮。顶部导航栏包括 \"兑换\"、\"代币\"\
  、\"NFT\" 和 \"池\" 选项，以及一个用于搜索代币和 NFT 集合的搜索栏。界面设置为以太坊网络，右上角有一个 \"连接\" 按钮。背景为深色主题。](img/648696_1_En_12_Fig2_HTML.jpg)\n\
  \n图 12-2\n\nUniswap 去中心化交易所（DEX）应用程序（致谢：[`app.uniswap.org/#/swap`](https://app.uniswap.org/%2523/swap)）\n\
  \n## 智能合约\n\n智能合约，或称自动执行合约，是存储在区块链上的数字合约，旨在当两方或多方之间预先确定的协议的条款和条件得到满足时自动执行。它们非常可靠，运行在区块链网络上，并以其无需银行、律师和其他第三方等中介机构即可自行执行合约的能力而著称。智能合约标准定义了智能合约如何运行、交互以及利用底层区块链的规则。智能合约应用的一个例子是自动化买方和卖方之间的支付流程，当买方收到商品或服务时，资金会自动释放给卖方。如前所述，智能合约是用各种编程语言编写的。Solidity\
  \ 是 EVM 兼容链（例如，以太坊、BNB 智能链、Polygon、Avalanche、Fantom、Arbitrum 和 Optimism）上的主要智能合约语言。其他网络可能使用不同的语言，但\
  \ Solidity 在这些生态系统中仍然得到广泛支持。\n\n事实\n\n智能合约是一种计算机协议，可以在区块链上以数字方式促进、验证和执行两方或多方之间的合约。\n\
  \n### 智能合约的优势\n\n智能合约通常部署在区块链上并由其保护，具有独特的特性和优势。具体如下：\n\n- **自动执行** – 智能合约相对于传统合约的显著优势在于其自动执行性。智能合约预先用协议条款进行了编程（编码）。一旦这些预设条件被触发，就会发生一个事件，例如数字资产的转移。\n\
  \n- **防篡改/不可变性** – 包括所有协议条款在内的整个智能合约都在区块链上编码并执行，公共无许可区块链的不可变特性确保一旦智能合约的代码被记录和验证，它就变得防篡改。\n\
  \n- **无需可信权威机构** – 与传统合约不同，智能合约不需要法律团队或中央机构作为相关方之间的中间人。\n\n- **匿名性和去信任化** – 智能合约参与者可以保持完全匿名，并且无需相互信任即可进行交易。\n\
  \n- **透明性** – 所有智能合约交易都记录在公共区块链上，可见且可追溯，无需任何可信方。\n\n事实\n\n比特币交易是简单的智能合约：每个输出都在脚本条件下锁定代币（例如，有效签名、时间锁或多重签名）。这些有限的、非图灵完备的合约，为从以太坊开始出现的更具表现力、完全可编程的智能合约平台铺平了道路。\n\
  \n\n\n### 以太坊虚拟机（EVM）\n\n以太坊是首个先进的智能合约开发平台。自 2015 年 7 月上线以来，它一直是开发者和投资者中最受欢迎的平台。它允许用户完全自定义智能合约，从而创建各种去中心化应用（`dApps`），其中包括去中心化交易所、众筹平台、游戏、非同质化代币（`NFTs`）、博彩以及去中心化金融（`DeFi`）应用。\n\
  \n![展示区块链系统结构的示意图。流程图由五个水平层组成，从上到下依次标为：“dApps”、“智能合约”、“以太坊虚拟机”、“节点（区块链系统硬件）”，附注“分布式账本”，以及“互联网”。层之间的箭头表示交互关系。左侧注明“P2P\
  \ 网络”，涵盖顶部四层。](img/648696_1_En_12_Fig3_HTML.jpg)\n\n图 12-3\n\n以太坊虚拟机（`EVM`）（图片致谢\
  \ [`github.com/LearnWeb3DAO/Sophomore-Track/blob/main/Ethereum-Virtual-Machine.md`](https://github.com/LearnWeb3DAO/Sophomore-Track/blob/main/Ethereum-Virtual-Machine.md)）\n\
  \n以太坊通过其图灵完备的虚拟机——称为*以太坊虚拟机*（`EVM`）——实现了这一可能。`EVM`是一个虚拟且去中心化的运行时环境，智能合约在其中执行。可以将`EVM`视为以太坊的计算引擎，它负责执行智能合约并部署`dApps`。用`Solidity`编写的智能合约会被转换（或编译）成`EVM`能够理解的字节码。一份`EVM`的副本运行在网络中的每个完整节点上。\n\
  \n## GitHub\n\n**评估目标：探索并熟悉 GitHub 代码仓库与协作平台。**\n\n[GitHub](https://github.com/)\
  \ 是一项基于云的软件服务，帮助程序员和项目团队托管、协作、存储、管理及控制他们的代码仓库。它允许全球各地的开发者同时在单个或多个项目上进行协作，贡献代码、想法和反馈，以帮助开发和改进项目。可以将\
  \ GitHub 想象成面向开发者的互动式 Google Sheets。\n\n在 GitHub 上，开发团队可以授予成员、协作者以及公众不同的访问级别，以编辑和贡献代码。根据访问级别，每个用户被授予访问不同数量和敏感程度的信息及数据的权限。大多数加密项目都是开源的，这通常允许完整查看项目代码以及区块链或`dApp`的整体代码开发进度。此外，开源还允许公众拥有一系列权限，例如查看项目代码、发起拉取请求、提交代码问题以及查看最新的代码提交——这对投资者来说非常重要！\n\
  \n![代码编辑器截图，显示一个包含三个已更改文件的拉取请求。主显示文件是“section-list.tsx”，新增的代码以绿色高亮显示。代码包含处理 React\
  \ 应用中焦点事件的函数，例如 `onRowFocus`、`onRowKeyboardFocus` 和 `onRowBlur`。侧边栏显示暂存更改，带有描述字段和作者信息。该界面是典型版本控制系统的样子，表明文件修改和注释。](img/648696_1_En_12_Fig4_HTML.jpg)\n\
  \n图 12-4\n\n面向开发者的 GitHub 桌面界面（致谢 [`github.com/apps/desktop`](https://github.com/apps/desktop)）\n\
  \nGitHub 另一个强大的功能是它支持*开源*和*闭源*项目。开发者可以为开源或闭源项目创建公共和私有的代码仓库。这使得开发团队可以让公众查看、互动并参与项目代码，或者在涉及私有、敏感或专利材料（例如传统金融银行实体）时将其设为私有。\n\
  \n### 为什么 GitHub 对投资者很重要？\n\n像 GitHub 这样的软件服务为投资者提供了对核心产品开发的深入了解，包括项目活动、绩效和超越能力。这之所以重要，是因为投资者可以真正感受到团队对项目的投入程度。例如，一个代码提交（上传）频繁且遇到的问题数量少的代码仓库，表明团队工作勤奋，并正在为实现目标和按时完成任务做出切实的努力。\n\
  \nGitHub 的另一个核心优势在于其透明度和责任性。软件的开放性使公众、社区和潜在投资者能够仔细审查项目的代码库，发现任何漏洞或安全问题。快速解决未解决的错误和漏洞是另一个明确而积极的信号。GitHub\
  \ 还具备允许社区参与代码审查的功能，社区成员可以提交他们的发现，包括改进建议和错误修复。相反，维护关闭或不活跃仓库的项目会亮起警示红旗，因为这些项目可能透明度较低，更糟糕的是，可能已经被遗弃或存在欺诈行为。\n\
  \n### 操作步骤\n\n本书的后续章节需要您对 GitHub 有基本的了解，特别是要能够浏览项目界面，以分析团队在项目代码方面的各种表现和活动。\n\n1.\
  \  **熟悉 GitHub 并掌握导航**\n\n    熟悉 [GitHub.com](https://GitHub.com) 的界面和导航菜单。[YouTube.com](https://YouTube.com)\
  \ 上有多个视频可以帮助您了解该应用。例如，请参考以下链接中的示例：[`https://www.youtube.com/watch?v=w3jLJU7DT5E`](https://www.youtube.com/watch%253Fv%253Dw3jLJU7DT5E)\n\
  \n2.  **记笔记并以自己的风格记录发现**\n\n3.  **将发现与基础评估流程的其他部分相结合**\n\n#### 结果评估\n\n无需对结果进行评估。\n\
  \n\n\n"
- "# 开源与闭源软件\n\n**评估目标：** 判断加密项目是开源还是闭源，以评估其透明度、问责制水平，以及在代码库访问受限情况下所伴随的风险。\n\n*源代码*\
  \ 仅仅是人类可读指令（代码）的列表，是用于控制软件应用程序运行的构建模块。区块链领域的每个软件都是由一系列不同的编程语言编写的代码构建而成。这些软件分为两类：*开源软件*\
  \ 和 *闭源软件*。表 12-1 对比了开源软件与闭源软件的核心差异。\n\n**表 12-1** 开源软件与闭源软件对比\n\n| 方面 | 开源代码 |\
  \ 闭源代码 |\n| --- | --- | --- |\n| 定义 | 开源代码是指源代码对公众开放的软件。任何人都可以查看、修改和分发该代码。 | 闭源代码是指源代码保密的软件。只有获得授权的人才能查看、修改和分发该代码。\
  \ |\n| 安全性 | 由于代码受到社区、普通大众以及付费第三方代码审计公司的审查，安全性较高。 | 完全依赖于内部代码审查和付费第三方代码审计公司的审查。\
  \ |\n| 社区参与度 | 社区参与度高 | 不对社区开放 |\n| 开发者目标与动机 | 由创新、学习、自我实现以及为更广泛社区做贡献所驱动。 | 通常由利润和企业目标所驱动。\
  \ |\n| 代码改进与高效调试 | 通过社区反馈和协作实现持续改进。 | 改进是内部的，由于审查者较少，速度可能较慢。 |\n| 代码可靠性 | 非常可靠，经过社区的广泛测试。\
  \ | 可靠性取决于内部测试和资源。 |\n| 信任度 | 由于透明度高，社区信任度高。 | 信任度取决于公司的声誉。 |\n| 创新速度 | 由于社区和开发者基础多样化，创新速度快。\
  \ | 创新直接取决于公司的资源。 |\n| 控制权 | 控制权较低，因为社区可以修改代码，常常导致分叉。 | 对项目代码拥有完全控制权。 |\n| 合法使用与合规\
  \ | 只要遵守开源许可协议（可能要求注明出处和共享修改），个人可以自由复制、修改和使用代码。 | 代码的使用受公司许可条款的限制，通常禁止未经许可的复制或修改。\
  \ |\n\n**事实：** “源代码”一词是生成软件所有其他形式的原始来源。\n\n## 开源许可协议\n\n许可协议是软件组件的作者与用户之间的合同，声明了该软件在特定条件下可以在商业应用程序中何处使用、修改或分发。开源许可协议授予其他用户使用代码或将其用于新应用程序、或将其纳入不同项目的权限和权利。如果没有开源许可协议，软件程序就无法使用——即使代码库发布在\
  \ `GitHub` 上——因为在大多数司法管辖区，没有明确许可协议的代码自动被视为“保留所有权利”，因此他人没有复制、修改或重新分发的合法权利。开源许可协议有八十多种不同类型，每种都有不同的权限和限制。开源许可协议主要分为两大类：*著佐权（Copyleft）*\
  \ 和 *宽松（Permissive）* 许可协议。\n\n![Snyk 制作的软件许可协议对比表，分为著佐权（Copyleft）和宽松（Permissive）类别。表格包含每种许可协议的权限、条件和限制/免责声明。绿色圆圈表示允许的行为，红色圆圈表示限制。类别包括专利使用、源代码披露、许可声明、网络使用、相同许可、状态变更、责任、担保和商标使用。对比的许可协议包括\
  \ GPL、LGPL、MPL、Apache、MIT、BSD 和 Unlicense。](img/648696_1_En_12_Fig5_HTML.jpg)\n\n\
  **图 12-5** 开源许可协议——著佐权与宽松（图片致谢：[`snyk.io/learn/open-source-licenses/`](https://snyk.io/learn/open-source-licenses/)）\n\
  \n### 著佐权（Copyleft）许可协议\n\n著佐权许可协议是一种开源许可协议，授予任何人重用、修改和分发知识产权（软件）的权利，前提是所做的任何更改都必须在同一许可协议下共享，并且之后使用该软件的任何人也都享有同样的自由。常见的著佐权许可协议示例如下：\n\
  \n- **GNU 通用公共许可证（`GPL`）** – 要求任何使用了 `GPL` 代码的软件必须将其全部源代码在相同的 `GPL` 许可协议下公开。\n-\
  \ **GNU 宽通用公共许可证（`LGPL`）** – 允许在较大项目中使用小组件，而无需要求整个项目在相同的许可协议下分发。\n- **Affero 通用公共许可证（`AGPL`）**\
  \ – 扩展了 `GPL`，确保通过网络提供的软件也必须以 `GPL` 许可协议发布其源代码。\n- **Eclipse 公共许可证（`EPL`）** – 允许将\
  \ `EPL` 许可的代码与非 `EPL` 代码结合使用，只要对 `EPL` 代码的修改以 `EPL` 许可协议发布即可。\n- **Mozilla 公共许可证（`MPL`）**\
  \ – 允许在专有软件中使用 `MPL` 许可的代码，前提是这些代码保留在单独的文件中，并包含专利授权和版权声明。\n\n根据法律以及使用开源软件的条款和条件，必须向用户提供并展示许可协议（著佐权或宽松），通常通过包含在分发的软件或文档中来实现。图\
  \ 12-6 展示了 Moonbeam Networks 在其官方 `GitHub.com` 代码库上可见的开源 GNU 通用公共许可证 v3.0 图像。\n\n\
  ![GitHub 仓库页面的屏幕截图，属于 \"moonbeam-foundation\" 组织下的 \"moonbeam\" 项目。页面显示 \"LICENSE\"\
  \ 文件，其中包含 GNU 通用公共许可证 v3.0 的文本。左侧边栏显示仓库的文件结构，包括 \".cargo\"、\".github\" 和 \"docs\"\
  \ 等文件夹，以及 \"Cargo.toml\" 和 \"README.md\" 等文件。主区域显示许可证文本，以版权信息和关于自由软件的前言开头。顶部导航栏包含\
  \ \"Code\"、\"Issues\"、\"Pull requests\" 和 \"Actions\" 等选项。](img/648696_1_En_12_Fig6_HTML.jpg)\n\
  \n**图 12-6** Moonbeam 网络在 GitHub 上官方项目代码库中可见的开源 GNU 通用公共许可证（图片致谢：[`github.com/moonbeam-foundation/moonbeam/blob/master/LICENSE`](https://github.com/moonbeam-foundation/moonbeam/blob/master/LICENSE)）\n\
  \n\n\n#### 宽松许可证\n\n宽松许可证是一种开源许可证，允许任何人使用、修改和分发软件，只需满足最低限度的条件——通常只需保留原始版权声明和许可证文本（对于\
  \ `Apache 2.0` 协议，还需要保留归因 `NOTICE` 文件）。这意味着该软件及其衍生作品可以整合到专有或闭源产品中，而无需公开源代码或分享修改内容。一些常见的宽松许可证包括：\n\
  \n- **Apache 许可证** – 允许在不同的许可证下进行修改和创作衍生作品，但需包含许可证通知和专利授权。\n- **MIT 许可证** – 允许不受限制地使用代码，只要保留原始版权和许可证声明即可，作者不承担任何责任。\n\
  - **BSD 许可证** – 与 MIT 类似，允许代码在不同许可证下使用，且无需分发源代码。不过，其限制条件因 `BSD License` 的具体版本而异。\n\
  - **Unlicense 许可证** – 将代码置于公共领域，不附加任何条件，允许在任何条款下完全自由地使用和分发。\n\n#### 这对投资者意味着什么？\n\
  \n虽然闭源在隐私方面有一些优点，但这些优势仅对优先控制代码库、追求专有优势以及能够保护敏感信息免受公众审视的组织有利。闭源代码对加密货币领域的投资者几乎没有任何好处。从加密货币投资者的角度来看，透明度至关重要。开源项目提供的透明度使投资者能够评估团队在代码库方面的表现。当投资某个项目时，投资者承担着巨大的财务风险，却对代码库或团队的管理记录一无所知。此外，如表\
  \ 12-1 所示，开源代码通过开发者社区的审查，能促进社区对核心产品、创新、协作和安全性产生更高程度的信任。基于这些原因，建议数字资产投资者专注于投资本质上是开源的加密货币项目。\n\
  \n### 行动步骤\n\n请按照以下步骤判断一个加密货币项目是开源还是闭源，并评估其透明度、问责制以及在代码库访问受限情况下的相关风险。\n\n![Moonbeam\
  \ 源代码网页截图。该页面左侧有一个导航菜单，包含网络、愿景和源代码等选项。主要内容突出显示 Moonbeam 是一个开源项目，并提供了主仓库的链接：\"https:/github.com/moonbeam-foundation/moonbeam。\"\
  \ 页面还提供了 Substrate 和 Frontier 源代码的链接，以及通过 Element 贡献代码的联系链接。页面采用深色主题，白色文字。](img/648696_1_En_12_Fig7_HTML.jpg)\n\
  \n**图 12-7**  \n项目白皮书中概述的 Moonbeam 开源代码（图片来源：[`docs.moonbeam.network/learn/platform/code/`](https://docs.moonbeam.network/learn/platform/code/)）\n\
  \n1.  **项目代码仓库**  \n    找到项目代码仓库的官方链接。\n    1.  访问项目官方网站，搜索指向 `GitHub` 上代码库的链接。\n\
  \    2.  在少数情况下，有些项目可能使用 `GitLab` 或 `Bitbucket` 代替 `GitHub`。\n\n2.  **寻找开源许可证**\
  \  \n    在找到项目位于 `GitHub`（或其他平台）的代码库后，检查该项目是否拥有开源许可证。许可证通常位于项目代码仓库中，例如 Moonbeam\
  \ 网络的情况，如图 12-6 所示。\n    1.  开源许可证文件通常命名为 `LICENSE`。如果文件不明显，请务必使用关键词进行快速搜索。\n  \
  \  2.  找到许可证后，点击该文件会打开另一个页面，其中会显示许可证类型。\n    3.  访问 [`https://choosealicense.com/appendix/`](https://choosealicense.com/appendix/)，检查该许可证是否被列出，以验证并确认它确实是开源许可证。注意——加密货币领域使用的大多数开源许可证通常是第\
  \ 2.4.1 节“开源许可证”中提到的那些。  \n    如果找不到许可证，该项目很可能是闭源的。如果出现这种情况，请联系项目团队，要求其提供引用 URL\
  \ 作为支持证据来澄清。如果一个仓库声称是开源的，但不存在许可证文件，则从法律上讲，代码的所有权利均保留——请将此视为一个严重的危险信号，并要求团队提供合适的开源许可证。\n\
  \n3.  **项目白皮书**  \n    项目白皮书是技术信息的绝佳来源，通常会定义项目是开源还是闭源。继续以 Moonbeam 网络为例，如图 12-7\
  \ 所示，其中明确指出该项目是开源的，并提供了指向其在 `GitHub` 上代码库的链接，而开源许可证文件即位于该代码库中——如步骤 2 所述。\n\n4. \
  \ **记录笔记，并用你自己的方式记录发现**\n\n5.  **将发现与其他基本面评估流程的章节结合**\n\n#### 评估结果\n\n开放源代码的区块链和\
  \ Web3 去中心化应用程序备受推崇。闭源项目由于缺乏透明度和项目团队的问责制，被认为是高风险投资——除非遇到非常特殊的情况，否则应避免投资。\n\n## 编程语言\n\
  \n**评估目标：确认项目是否使用了多种知名的编程语言，这些语言需具备特定优势，以满足产品或服务的特定需求。**\n\n本节介绍区块链行业中用于构建区块链、去中心化应用程序及相关软件的热门编程语言。虽然数字资产投资者不需要具备“开发者”级别的知识，但确认使用的是否是知名的流行编程语言至关重要，因为这将有助于减轻未来与核心产品或服务相关的不可预见风险。此外，开发者团队使用多种编程语言也很重要，这些语言需具备能够满足正在开发的特定软件或应用程序需求的优势。例如，虽然\
  \ `Solidity` 主要用于编写智能合约，但其特性和优势无法与用于数据分析和机器学习任务的 `Python` 等语言相提并论。每种编程语言都有其独特的优势和劣势，具体取决于需求——无论是针对视觉效果、速度、安全性还是易用性。\n\
  \n表 12-2 展示了区块链开发中最流行的编程语言。\n\n**表 12-2**  \n区块链开发中常用的编程语言\n\n\n\n| 主流区块链编程语言 |\n\
  | --- |\n| 语言 | 采用状态 | 类型 | 描述 | 典型区块链用例 |\n| --- | --- | --- | --- | --- |\n| `Solidity`\
  \ | 主流 | 智能合约（EVM = 以太坊虚拟机） | 专为区块内程序设计的语言（语法有点类似 JavaScript）。 | 创建代币和链上资产；运行投票或金库规则；自动化\
  \ DeFi 操作 |\n| `C++` | 主流 | 通用（系统级） | 一种非常快速的编译型语言，允许程序员直接管理计算机内存。 | 构建完整的区块链节点；编写共识算法；编写加密库\
  \ |\n| `Python` | 主流 | 通用（脚本型） | 易读的脚本语言，拥有庞大的库支持，非常适合快速开发任务。 | 自动化链上交互；分析区块链数据；原型设计智能合约逻辑\
  \ |\n| `Java` | 主流 | 通用（JVM = Java 虚拟机） | 面向对象语言，在 Windows、macOS 和 Linux 上运行一致。\
  \ | 与链通信的企业中间件；基于 JVM 的节点软件；合约集成工具 |\n| `Rust` | 主流 | 通用（系统级） | 现代系统级语言：拥有 C 级别的速度以及内置的内存安全性。\
  \ | 高性能运行时；Web Assembly (WASM) 智能合约；安全的加密代码 |\n| `JavaScript` | 主流 | 通用（脚本型） | 网络语言；运行于每个浏览器以及通过\
  \ Node.js 运行在服务器上。 | 构建去中心化应用 (dApp) 前端；创建客户端库；编写轻量级后端服务 |\n| `Go (Golang)` | 主流\
  \ | 通用（系统级） | 谷歌开发的编译型语言，语法简洁，并发处理简单。 | 独立的节点软件；私有账本的链码；可扩展的后端工具 |\n| `C#` | 主流（细分领域）\
  \ | 通用（.NET） | 微软的 .NET 语言——强类型和自动垃圾回收。 | 基于 .NET 的跨平台节点；合约的企业级 API；桌面钱包或工具 |\n\
  | `Erlang` | 主流（细分领域） | 通用（函数式） | 为处理海量并发任务而构建的函数式语言，以其“永不崩溃”的特性著称。 | 始终在线的节点后端；点对点实时消息传递；容错模块\
  \ |\n| `TypeScript` | 主流 | 通用（脚本型） | JavaScript 加上静态类型——可在代码运行前捕获许多错误。 | 类型安全的 DApp\
  \ 用户界面；合约测试套件；开发者工具 |\n| `Ruby` | 主流（区块链中占次要地位） | 通用（脚本型） | 可读性极强的脚本语言，拥有丰富的“gem”包系统。\
  \ | 快速区块链原型设计；小型 Web 服务；命令行工具 |\n| `SQL` | 主流 | 领域特定（查询） | 用于查询关系型数据库的声明式语言。 | 查询链下区块链数据；构建分析仪表板；ETL（提取-转换-加载）流水线\
  \ |\n| `Vyper` | 实验性 | 智能合约（EVM） | 类 Python 的合约语言，去除复杂特性以利于审计。 | 安全性关键的合约；减少隐藏错误；简化正式审查流程\
  \ |\n| `Rholang` | 实验性 | 智能合约（并发） | 基于进程演算的语言；擅长并行、消息传递逻辑。 | 同时运行多项任务的合约；安全的链上协调；对复杂工作流建模\
  \ |\n| `OCaml` | 实验性 | 通用（函数式） | 快速的函数式语言，拥有强大的静态类型系统。 | 证明协议正确性；研究级节点代码；形式化验证的合约\
  \ |\n| `Scilla` | 实验性 | 智能合约（安全导向） | 强制采用清晰的状态机结构以避免常见陷阱的合约语言。 | 更安全的合约开发；状态变更的形式化分析；防止重入漏洞\
  \ |\n| `Simplicity` | 实验性 | 智能合约（正式 DSL = 领域特定语言） | 极简的、非图灵完备的语言，其程序可被证明是正确的。 |\
  \ 成本可预测的合约；行为数学证明；高级支付条件 |\n| `Michelson` | 实验性（行业内） | 智能合约（基于栈） | 具有严格类型的栈式机器语言，支持形式化证明。\
  \ | 资源可预测的链上逻辑；经数学验证的合约；可升级的治理代码 |\n| `Haskell` | 实验性（使用增长中） | 通用（函数式） | 纯函数式语言，拥有强大的类型系统和惰性求值特性。\
  \ | 高保证区块链协议；创建合约领域特定语言；验证复杂算法 |\n\n### 投资者对编程语言的分析\n\n建议投资者执行以下编程语言检查，以确认项目是否正在利用多种、知名且流行的、具有特定优势的语言来构建其核心产品或服务。\n\
  \n#### 评估非寻常编码语言\n\n表 12-2 列出了区块链开发中最流行的编程语言。然而，投资者偶尔可能会遇到使用该表中未提及语言的项目。这背后有多种潜在原因，例如该语言可能处于起步阶段、质量不高、在区块链开发中很少使用，或者用于某个在区块链世界中罕见或新颖的细微差别用例或特性。该项目的风险水平和严重程度取决于几个因素。例如，如果该语言仅用于代码库的\
  \ 1%，通常不会引起警觉。但是，如果遇到的特定语言占项目代码的很大比例，则需要更多研究来确定该语言是否对项目构成威胁。这项研究将涉及检查该语言是否已在其他加密项目中使用，以及这些项目是否成功且没有攻击或崩溃的历史。\n\
  \n图 12-8 是 [Moonbeam Networks](https://moonbeam.network/) 代码库的截图，显示了图像右下角所使用的编程语言。编程语言，包括\
  \ `TypeScript`、`Rust` 和 `Solidity`——所有这些都专门用于高性能和高安全性的区块链开发、dApp 和智能合约——合计占代码的 99.6%，只有\
  \ 0.3% 是用 [Shell](https://www.geeksforgeeks.org/introduction-linux-shell-shell-scripting/%2523what-is-shell)\
  \ 编程语言编写的。`Shell` 语言仅仅用于自动化任务、与操作系统交互，以及处理构建、配置和部署工作流。剩余的 0.1% 显示为 `Dockerfile`，这是开发人员用来创建\
  \ `Docker 镜像` 的工具，`Docker 镜像` 是软件的打包版本，确保它在计算机系统、服务器或云平台等不同环境中一致地运行。虽然 `Dockerfile`\
  \ 主要是一种开发工具，但它的存在可能标志着可复现的构建流程和团队的成熟度——这些因素可能对技术导向的投资者有影响。\n\n![一个名为“moonbeam”项目的\
  \ GitHub 仓库页面截图。页面显示了目录和文件列表，并附有最近的提交消息和时间戳。顶部栏显示 546 个分支和 201 个标签。右侧，有一段描述，说明它是一个基于\
  \ Polkadot 的以太坊兼容智能合约平行链。标签包括“ethereum”、“blockchain”和“substrate”。“Languages”部分显示了一个饼图，百分比为：TypeScript\
  \ 52.7%、Rust 43.5%、Solidity 3.4%、Shell 0.3% 和 Dockerfile 0.1%。该仓库有 2,302 次提交、917\
  \ 个星标和 328 个复刻。](img/648696_1_En_12_Fig8_HTML.jpg)\n\n图 12-8\n\nMoonbeam Network\
  \ 编程语言（图片来源：[`github.com/moonbeam-foundation/moonbeam`](https://github.com/moonbeam-foundation/moonbeam)）\n\
  \n\n\n### 编程语言多样性\n\n如前所述，开发团队在创建区块链项目或 dApp 时会使用多种编程语言，每种语言都因其与软件或应用相关的特定优势而被选中。作为投资者，验证代码库包含多种语言非常重要，同时也要确保产品正在使用合适的工具进行开发。这也有助于识别潜在的骗局，例如开发者可能仅用一两种语言向项目中注入大量代码，以制造合法产品的假象。\n\
  \n如图 12-8 所示，Moonbeam Network 总共使用了四种编程语言。相比之下，每个网络主要客户端仓库的 GitHub 语言统计数据显示，以太坊、Cosmos\
  \ 和比特币分别约有五种、五种和六种主流语言。这表明每个项目通常使用四到六种主流编程语言，被视为典型范围。请注意，较小的项目（主要是 dApp）平均可能只使用两到三种编程语言。然而，如果项目仅使用一种编程语言，则需极度谨慎。建议联系项目团队和社区以澄清疑问，更重要的是，与同一领域的成功竞争对手进行比较。\n\
  \n> **警告**\n> \n> 该基础指标仅适用于开源项目。如果项目是闭源的，则无法进行分析，除非开发团队授予你 GitHub 访问权限。\n\n### 行动步骤\n\
  \n按照以下步骤确定项目的代码库是否包含可信且多样的编程语言，以满足核心产品或服务的特定需求和功能要求。\n\n1.  **确定所使用的编程语言**\n   \
  \ 1.  找到项目 GitHub 或相应代码库软件的链接（通常位于项目网站的页脚）。\n    2.  在 GitHub 的“Languages”部分查看项目的编程语言。\n\
  \n2.  **编程语言与用例的契合度**\n    1.  审查项目所使用的语言，确认它们是否与项目或服务的应用特性相匹配。例如，对于区块链基础设施 Moonbeam\
  \ Network，用于区块链开发的编程语言 Rust 和 TypeScript 被广泛使用，占据了项目代码库的 96.2%。这些语言非常适合 Moonbeam\
  \ 的区块链服务。\n\n3.  **评估非常见编程语言**\n    1.  如果你遇到一种编程语言在项目中占很大比例，且未在表 12-2 中讨论，请对其进行研究，并考虑根据以下标准进行评估。\n\
  \        1.  为什么使用这种语言而不是传统的既定编程语言？\n        2.  这种编程语言发布多久了？\n        3.  这种编程语言是否已在其他加密货币或\
  \ Web3 项目中使用？如果是，这些项目在性能、可扩展性和速度方面是否成功？是否曾因漏洞或缺陷导致成功攻击？\n        4.  如果该语言尚未在区块链领域使用，请确定它是否用于构建中心化系统。如果是，开发者社区的总体反馈如何？\n\
  \n4.  **编程语言数量**\n    1.  审查项目团队使用的编程语言数量。虽然区块链网络可能使用四到六种语言，但 dApp 可能只使用两到三种编程语言。\n\
  \    2.  如果项目仅使用一种编程语言，请谨慎行事。联系团队和社区以澄清疑问，并与同一领域的成功竞争对手进行比较。\n\n5.  **以你自己的风格记录并记录你的发现**\n\
  \n6.  **将这些发现与基础评估流程的其他部分相结合**\n\n#### 评估结果\n\n假设项目所使用的编程语言是基于应用需求选择的，并且在区块链领域享有良好声誉且经过验证，那么这被认为是一个积极信号。如果不是，建议在通过充分研究消除任何疑虑或担忧之前不要投资。\n\
  \n## GitHub 贡献者\n\n**评估目标：** 确定开源贡献者的数量，确保开发团队保持活跃，并确认背景中正在取得持续进展。\n\n在 GitHub 上，贡献者是指通过提交代码、文档或其他技术资源为一个或多个仓库做出开源项目贡献的人。在\
  \ GitHub 上，贡献者是其提交（通常通过拉取请求）已合并到仓库中的任何人，无论他们当前是否拥有协作者（读写）权限。根据开源项目的规模和流行程度，贡献者人数可能从几个到几百个不等，他们持续为核心产品增加价值。贡献的类型因人而异，但通常与代码开发、底层基础设施、治理、用户体验、新创新、安全审计、测试与质量、文档以及研究相关。此外，全球贡献者的增加会提高项目的知名度和可信度，从而带来更强大的社区、降低开发成本以及主流采用。\n\
  \n开源贡献对于区块链项目的开发、长期成功和可持续性至关重要。贡献来自全球拥有不同视角、优势和技能集的开发者。这种全球协作有助于加速产品或服务的增长和质量。此外，由于贡献者众多，项目会经历严格的审查、过滤以及已发现的错误和代码漏洞的修复。\n\
  \n图 12-9 展示了 Moonbeam Networks 的官方 GitHub；贡献者数量——右下角的 58——仅包括其提交已合并到仓库默认分支（`main`）的开发者，因此\
  \ Moonbeam 的其他仓库可能列出更多贡献者。\n\n![moonbeam-foundation 的 GitHub 仓库页面“moonbeam”截图。页面显示目录和文件列表，以及最近的提交信息和时间戳。该仓库为公开仓库，有\
  \ 546 个分支和 202 个标签。右侧有一个“关于”部分，描述该项目为波卡上的以太坊兼容智能合约平台，相关关键词包括“substrate”和“parachain”。页面包含“Watch”、“Fork”和“Star”选项，当前计数分别为\
  \ 45 个 Watch、328 个 Fork 和 919 个 Star。右下角区域显示贡献者头像。](img/648696_1_En_12_Fig9_HTML.jpg)\n\
  \n图 12-9\n\nMoonbeam Network——贡献者（图片源自 `https://github.com/moonbeam-foundation/moonbeam`）\n\
  \n\n\n### 行动步骤\n\n请按照以下步骤来确定开源贡献者的数量，确保开发团队保持活跃，并确认项目在后端持续取得进展。\n\n1. **项目代码仓库**\n\
  \   找到项目代码仓库的官方链接。\n   1. 访问项目官方网站，并在`GitHub`上搜索代码库的链接。\n      1. 有些项目可能使用 [GitLab](https://about.gitlab.com/)\
  \ 或 [Bitbucket](https://bitbucket.org/product/) 而非`GitHub`。\n\n2. ***贡献者*** 数量\n\
  \   1. 在主代码仓库页面，导航至右下角查看贡献者数量。\n   2. 记录下项目贡献者的人数。\n\n3. **以你自己的风格做笔记并记录调查结果**\n\
  4. **将调查结果与基础评估流程的其他部分相结合**\n\n#### 评估结果\n\n看到大量活跃的开源贡献者为一个项目增添价值，这是值得赞赏的。然而，贡献者数量会因项目而异，这取决于项目启动时的规模（小型、中型或大型）、知名度、使用场景以及许多其他变量。为了获得更好的比较标准，建议将贡献者数量与成功的竞争对手进行对比，以确认在指定时间段内提交次数保持稳定或有所增加。\n\
  \n### Git 提交记录\n\n***评估目标：*** *通过分析`GitHub`上贡献者的代码提交次数，确定开发者的活跃度、生产力以及对该项目的长期兴趣。*\n\
  \n本部分旨在验证项目团队是否正在持续推进核心产品或服务的构建、更新和增强。许多项目团队声称通过社交媒体或其他渠道在幕后取得了进展，但这可能是一种虚假印象。虽然并非每个团队都是骗局，但一些项目缺乏透明度，并因多种不同原因（如项目被放弃、缺乏资金，甚至从一开始就是骗局）而处于半停滞或完全停滞状态。投资者有责任验证团队的声明是否准确，或者是否存在导致进展停滞的潜在问题。\n\
  \n验证项目在核心产品或服务方面进展情况的一个有效方法，是分析`GitHub`上每月的*提交*次数。“提交”是`Git`中的一个基本概念，代表项目在特定时间点的`快照`。这意味着每次提交都记录了当时每个文件的精确状态——`Git`会在底层重用未更改的文件\
  \ blob 以避免重复。例如，当开发者修改、重命名、删除或向项目源代码添加内容时，开发者可以提交一个提交——其中包含简要说明更改信息的消息——这会更新所有项目文件，从而提供整个项目的新`快照`。此操作会被记录为项目`GitHub`仓库中的一次提交。任何更改都可以与之前的（父级）提交进行比较。\n\
  \n通过分析这些提交，投资者可以判断一个项目是否仍在积极开发中，即使其进展从外部角度无法立即看出。此外，处于早期阶段的项目往往比五年前启动的项目更活跃，提交次数也更高。无论如何，对于一个项目，要确保长期成功和持久发展，持续进行包含新功能和创新的“提交”被认为是至关重要的。\n\
  \n#### 可取的月度提交贡献量\n\n每月提交多少次是合适的，并没有绝对的标准。这取决于项目生命周期阶段和知名度等变量。一个流行的开源无许可区块链项目，其月度提交次数会显著高于另一个知名度较低但基础同样扎实的项目。作为参考指标，从\
  \ 2023 年 9 月到 2024 年 9 月，`bitcoin`主仓库主分支的平均月度提交次数约为 257 次，`Chainlink`约为 224 次，`Moonbeam\
  \ Network`约为 24 次——参见图 12-10。从投资者的角度来看，如果月度提交次数超过约 15 次，则表明团队和社区仍在后台持续推进。\n\n![柱状图和折线图显示了随时间推移的提交活动。顶部是一个柱状图，橙色柱体代表从\
  \ 9 月 10 日至 9 月 1 日每周的提交次数，在 7 月 28 日那周达到 15 次提交的峰值。底部是一个折线图，绿色点代表从周日至周六的每日提交次数，在周五达到\
  \ 3 次提交的峰值。侧边栏列出了“脉冲”、“贡献者”和“提交”等选项。](img/648696_1_En_12_Fig10_HTML.jpg)\n\n图 12-10\n\
  \n`Moonbeam Network` 代码提交（数据来源：[`github.com/moonbeam-foundation/moonbeam/graphs/commit-activity`](https://github.com/moonbeam-foundation/moonbeam/graphs/commit-activity)）\n\
  \n同时建议投资者通过检查主仓库的平均提交次数是增加、减少还是持平，来评估开发者对该项目的兴趣程度——需要记住的是，提交数量会随着项目的路线图和计划里程碑而波动。可以通过进入项目的代码仓库，导航至“贡献者”来实现这一点——如图\
  \ 12-9 所示——这会将你引导至“贡献者”页面，以`Moonbeam Network`为例，如图 12-11 所示。页面顶部显示了`Moonbeam`的日期范围（从\
  \ 2020 年 2 月到 2024 年 12 月），代表了从项目启动到当前日期的提交次数。`Moonbeam`的图表显示，这些年来提交次数保持稳定，这是项目持续获得关注的积极信号。\n\
  \n![GitHub 仓库洞察页面截图，显示“moonbeam-foundation/moonbeam”。页面左侧有一个导航菜单，包含“脉冲”、“贡献者”和“社区标准”等选项。主区域显示了一个“贡献者”图表，标题为“随时间推移的提交”，展示了从\
  \ 2020 年 2 月 15 日到 2024 年 12 月 21 日的每周贡献情况。图表中蓝色柱体上下波动，代表每周的提交次数。顶部菜单包含“代码”、“问题”、“拉取请求”、“操作”、“项目”和“安全”等选项卡。](img/648696_1_En_12_Fig11_HTML.jpg)\n\
  \n图 12-11\n\n`Moonbeam Network` 的贡献者（数据来源：[`github.com/PureStake/moonbeam/graphs/contributors`](https://github.com/PureStake/moonbeam/graphs/contributors)）\n\
  \n\n\n### 行动步骤\n\n按照以下步骤，通过分析 GitHub 上贡献者的代码提交次数，来确定开发者活跃度、生产力以及对该项目的长期兴趣程度。\n\n\
  1.  **项目代码仓库**\n    找到项目代码仓库的官方链接。\n    - 访问项目官方网站，查找 GitHub 上代码库的链接。\n    - 有些项目可能使用\
  \ [GitLab](https://about.gitlab.com/) 或 [Bitbucket](https://bitbucket.org/product/)\
  \ 而非 GitHub。\n\n2.  **分析 GitHub 中的“提交”**\n    - 定位提交记录 – 在 GitHub 项目的首页，导航到“Insights”\
  \ ➤ “Commits”（参考图 12-10）。\n    - 统计提交次数 – 图表顶部的橙色条代表当年每周的提交次数（图 12-10）。\n      \
  \  - 点击每一周（橙色条）可查看该周内每天的提交次数。\n        - 要计算月均提交次数，可统计全年每周的提交次数总和，然后除以十二。\n\n3.\
  \  **评估贡献者“提交”图表**\n    检查自项目启动以来，平均提交次数是增加、减少还是保持不变。\n    - 在 GitHub 项目的首页，导航到右下角查看贡献者人数。\n\
  \    - 点击“Contributors”进入贡献者页面。\n    - 查看时间段，以了解开源开发者社区为该项目贡献了多长时间。\n    - 审查贡献者/提交图表，判断自项目启动以来，贡献者的提交次数是增加、保持不变还是逐渐减少。请注意，“Y”轴代表提交次数，“X”轴代表时间。\n\
  \n4.  **用自己的风格做笔记并记录发现**\n\n5.  **将发现与基础评估流程的其他部分相结合**\n\n#### 评估结果\n\n看到过去一个月平均有十五次提交是令人欣慰的。较少的提交次数，尤其是少于十次，可能会引发对幕后工作的质疑。当提交次数少于五次时，这应该被视为一个危险信号。\n\
  \n从长远来看，几年内的提交次数最好呈增加趋势，或至少保持稳定，因为这表明开发者社区对这个项目充满热情。如果这个指标逐渐减少，也并非一个绝对的硬性障碍。然而，这肯定是有原因的——在获得更清晰的图景之前，请保持谨慎。\n\
  \n## Git Issues\n\n**评估目标：通过评估项目在 GitHub 上已开启和已关闭的 Issues，来判断开发进度、团队响应速度和项目的整体健康状况。**\n\
  \n在 GitHub 上，每个项目都有一个名为“Issues”的仓库，所有关于 bug、功能请求、任务、改进、设计创新、文档和问题的已开启和已关闭的 Issues\
  \ 都会被记录在这里。大多数这些 Issues 都以某种方式或形式与项目代码相关。任何有权访问此仓库的人，即贡献者、项目维护者，甚至是遇到 bug 或有功能请求的用户，都可以创建\
  \ Issues 来报告问题、提出改进建议或提出问题。\n\n开源项目通常允许任何拥有 GitHub 账户的人创建并提交新的 Issue。Issue 生成后，会根据所需的技能集和重要性级别进行审查、分类、管理并分配给贡献者。图\
  \ 12-12 显示了 Moonbeam Network 的 Git Issue 仓库截图。在撰写本书时，Moonbeam 共有 435 个由开源社区和项目团队提交的\
  \ Issues——其中 410 个已关闭（有些标记为已解决，有些作为重复问题或“不予修复”而关闭），只有 25 个仍处于开放状态。这被认为是极好的情况，因为只有\
  \ 5.75%（25/435）的 Issues 处于开放状态，而 94.25%（410/435）已被解决。\n\n此外，通过查看已关闭的 Issues（图 12-13），投资者可以通过查看最近一次\
  \ Issues 被解决的日期来判断团队和社区是否最近取得了进展。以 Moonbeam Network 为例，在撰写本书时，多个 Issues 在过去两周内得到了解决。\n\
  \n如果一个项目有很高比例的问题处于开放且未解决的状态，这可能预示着代码质量差、资源有限或社区支持薄弱——但高使用率的项目也会积累大量 Issues，仅仅是因为有更多用户提交了它们，因此在判断整体健康状况之前，必须考虑上下文和活跃程度。\n\
  \n![Moonbeam 项目 GitHub Issues 页面截图，显示一个已关闭问题列表。突出显示的部分包括标题为“Error running Moonbeam\
  \ v0.42.1”、“Moonbeam v0.41.1 Crash”和“0.42.1: Skipped pubsub block & log notifications”等问题。每个问题显示作者、关闭状态和评论数。页面顶部包含筛选和排序选项。](img/648696_1_En_12_Fig13_HTML.jpg)\n\
  \n图 12-13 – Moonbeam Network——已关闭的问题（图片来源：[`github.com/moonbeam-foundation/moonbeam/issues?q=is%3Aissue+is%3Aclosed`](https://github.com/moonbeam-foundation/moonbeam/issues%253Fq%253Dis%253Aissue%252Bis%253Aclosed)）\n\
  \n![“moonbeam-foundation/moonbeam”仓库的 GitHub Issues 页面截图。页面显示一个开放问题列表，共有 25 个开放问题和\
  \ 410 个已关闭问题。每个问题条目包括标题、问题编号、作者、创建日期和评论数。顶部问题标题为“v42.1: Unknown issue causing block\
  \ and log subscriptions to stop working”，由 Ethic53606 在 5 天前创建。界面包括筛选、排序和创建新问题的选项，顶部有用于代码、拉取请求、操作、项目、安全和洞察的导航标签。](img/648696_1_En_12_Fig12_HTML.jpg)\n\
  \n图 12-12 – Moonbeam Network——未处理的开放问题（图片来源：[`github.com/moonbeam-foundation/moonbeam/issues`](https://github.com/moonbeam-foundation/moonbeam/issues)）\n\
  \n评估一个项目在 GitHub 上的已开启和已关闭 Issues 是一项有价值的必要工作，因为它可以揭示与开发、响应速度、用户体验以及所涉及的潜在风险相关的性能指标。这些性能指标如下：\n\
  \n- **开发进度** – 检查开放与关闭问题的比例以及最近解决问题的时间，能让投资者对开发团队的进展有一个不错的了解。\n- **团队响应速度** – 打开并查看几个\
  \ Issues，阅读团队与贡献者之间的对话，包括回复的日期，能很好地反映团队的响应速度。\n- **风险与回报** – 通过分析几个 Issues 中的问题和反馈，投资者可以更好地判断风险是否大于预期回报，或者反之。\n\
  - **用户体验** – 通过评估几个开放和关闭的 Issues，从潜在的投诉、问题、负面反馈和整体不满情绪角度，投资者可以了解用户和社区的使用体验如何。\n\n\
  \n\n### 操作步骤\n\n请按照以下步骤评估 GitHub 上项目的开放与关闭议题 (Issues)，以判断其开发进度、团队响应速度及整体项目健康状况。\n\
  \n1.  **项目代码仓库**\n    找到项目代码仓库的官方链接。\n    1.  访问项目官方网站，寻找指向 GitHub 代码库的链接。\n   \
  \     1.  某些项目可能使用 [GitLab](https://about.gitlab.com/) 或 [Bitbucket](https://bitbucket.org/product/)\
  \ 替代 GitHub。\n\n2.  **议题 (Issues) 仓库**\n    1.  在页面顶部搜索并打开“议题 (Issues)”仓库。\n   \
  \     1.  若未显示“议题 (Issues)”选项卡，表示仓库所有者已禁用议题功能。若选项卡可见但未列出任何议题，这可能意味着尚未创建任何议题，或所有者已限制仅对特定群组可见（这种情况较为罕见）。\n\
  \n3.  **评估开放与关闭的议题**\n    依据本节所述标准，对开放和关闭的议题进行评估。\n    1.  开发进度\n    2.  团队响应速度\n\
  \    3.  风险与回报\n    4.  用户体验\n\n4.  **记录笔记，并以你自己的风格记录发现**\n\n5.  **将发现结果与基础评估流程的其他部分相结合**\n\
  \n#### 评估结果\n\n相比于关闭的议题，开放议题占比较低是令人赞赏的——在成熟项目中，理想情况下应将开放议题比例控制在约 20% 以下（新项目在早期积压任务清除前，比例可能会更高）。然而，如果团队持续未能解决议题，这应被视为一个早期预警信号。这种情况通常会导致未解决的开放议题积压日益严重，从而对用户体验产生负面影响。相反，如果团队能够响应贡献者、开放与关闭议题的比例较低，并且近期内关闭了各类议题，这便是一个积极信号。\n\
  \n### 代码安全审计\n\n**评估目标：** 确定项目是否已进行代码安全审计，以确保其代码库安全、漏洞已修复，并能提供充分的防护以抵御攻击。\n\n在区块链领域，代码安全审计是对项目代码库的全面分析，旨在识别潜在的缺陷、漏洞、弱点或可能的攻击路径。此项安全检查涵盖项目的代码库，包括智能合约、协议、共识机制、去中心化应用\
  \ (dApps)、第三方服务等。审计的最终目标是确保项目的代码库安全、健壮、高效，并且不包含任何可能企图利用系统漏洞的恶意缺陷。\n\n> **注意**\n\
  > 至关重要的是，每个项目的整个代码库——包括智能合约、协议逻辑及配套库——都必须由专业认可的审计公司进行审计。\n\n### 为什么要进行代码安全审计？\n\n\
  虽然去中心化和强大的共识机制有助于防御攻击，但没有任何区块链或 dApp 能提供百分之百免于被攻击的保护。许多项目遭受攻击的频率可能超乎想象。例如，近年来已发生数十起攻击事件，涉及项目包括\
  \ [Ronin Network](https://roninchain.com/)（被盗 6.25 亿美元）、[Poly Network](https://www.poly.network/%2523/)（6.11\
  \ 亿美元）、[Penpie](https://www.pendle.magpiexyz.io/stake)（2700 万美元）、[Binance BNB Bridge](https://www.bnbchain.org/en/bnb-chain-bridge)（5.69\
  \ 亿美元）、[Bitmart](https://www.bitmart.com/en-US)（1.96 亿美元）、[Multichain](https://www.multichain.com/)（1.25\
  \ 亿美元）和 [Coincheck](https://coincheck.com/)（5.32 亿美元）。因此，无论规模大小，每个项目都必须进行严格的代码安全审计。若未能执行此操作，往往会给项目团队和投资者带来灾难性的财务损失。\n\
  \n> **专家提示**\n> 若要了解某个项目是否曾出现过安全问题，可以查阅以下资源：\n>\n> **Rekt**[`https://rekt.news/`](https://rekt.news/)\n\
  >\n> **Cointelegraph**[`https://cointelegraph.com/tags/security`](https://cointelegraph.com/tags/security)\n\
  >\n> **Cryptoslate**[`https://cryptoslate.com/hacks/Substack`](https://cryptoslate.com/hacks/Substack)\n\
  >\n> **Substack**[`https://substack.com/@blockthreat`](https://substack.com/%2540blockthreat)\n\
  >\n> **Web3 Is Going Great**[`https://web3isgoinggreat.com`](https://web3isgoinggreat.com)\n\
  \n另一方面，进行代码审计具有诸多益处，包括：降低被利用的风险、优化代码库以提升运行速度和效率、降低维护产品的成本与工作量、提升用户满意度、保护敏感数据以及促进代码一致性。因此，那些聘请专业代码安全公司审查其代码库并采纳其建议的项目，成功遭受攻击的风险要低得多。这种增加的安全层对投资者而言是一项显著优势，因为它减少了可能导致项目声誉和价值受损的安全漏洞可能性。\n\
  \n### 代码安全审计执行\n\n加密项目的代码审计通常由专门从事代码安全的第三方公司执行。目前有数十家区块链代码审计公司，它们大多提供相同的核心服务，但在专业水平和声誉方面各有不同。一些较为知名的区块链代码审计公司包括（但不限于）[Hacken](https://hacken.io/)、[Certik](https://www.certik.com/)、[Quanstamp](https://quantstamp.com/)\
  \ 和 [Trail of Bits](https://www.trailofbits.com/)。\n\n标准的代码安全审计通常包含以下步骤：\n\n1. \
  \ **界定范围** – 确定审计的目标及代码库中需要审计的部分。这可能包括审计各种智能合约、协议、区块链基础设施，或根据客户需求对以上全部或特定部分进行组合审计。\n\
  2.  **规划** – 与项目团队共同规划从开始到结束的审计各阶段。\n3.  **信息收集** – 收集有关区块链或 dApp、其相应代码库及相关文档的信息，以便全面理解系统。\n\
  4.  **代码分析** – 首先运行自动化扫描工具（社区版或商业版）以标记常见问题，然后通过各种工具和技术（包括静态分析、动态分析及手动代码审查）扫描代码库，查找缺陷、漏洞和弱点。\n\
  5.  **风险评估** – 根据严重程度和可能性，对已识别的缺陷、漏洞和弱点进行优先级排序。\n6.  **报告** – 审计完成后，向项目团队提交一份详细的审计报告。该报告包含所有已识别的缺陷和漏洞、其潜在影响以及消除这些问题的建议。\n\
  7.  **修复** – 开发人员与审计人员合作，修复已发现的缺陷、漏洞和弱点。\n8.  **重新测试** – 在所有已识别的问题得到纠正后，对代码库进行重新测试（在适用情况下），以确保系统无缺陷。\n\
  9.  **审计后支持** – 通常，审计公司会提供持续的指导和支持，以帮助维持高水平的安全性。这可能包括审计后监控，以跟踪已实施修复措施的有效性，并识别任何新的潜在威胁。\n\
  \n\n\n### 投资者代码安全审计检查\n\n遗憾的是，一些项目团队在代码安全方面比较松懈，直到遭受攻击、项目声誉受损时，才会认真对待。因此，投资者有责任确保已经进行了代码安全审计，并且至少关键的错误、漏洞和弱点已经得到解决。如果项目团队不处理审计公司发现的问题，这将是一个重大的危险信号，表明项目暴露在风险中，容易受到攻击。\n\
  \n**专业提示**\n\n投资者可以访问 `CoinMarketCap.com`，选择筛选条件 ➤ 添加筛选条件 ➤ 已审计，查看声称已完成代码审计的项目列表以及相应的审计公司；由于此标签为自行申报，务必通过项目已发布的报告或团队来确认审计情况。\n\
  \n![Polygon (MATIC) 加密货币数据截图。价格为 0.3698 美元，单日上涨 1.98%。市值为 1,696,095,152 美元，24 小时交易量为\
  \ 96,294,464 美元。流通供应量为 4,586,010,007 MATIC，总供应量为 10,000,000,000 MATIC。完全稀释市值为 3,698,411,363\
  \ 美元。以太坊合约地址部分显示。官方链接包括网站、白皮书和 GitHub。社交媒体链接包括 Twitter、Reddit、Telegram 和聊天。评分为 4.2\
  \ 星，基于 4 家机构评级。由 CertiK 审计。](img/648696_1_En_12_Fig14_HTML.jpg)\n\n**图 12-14** –\
  \ CoinMarketCap.com 上的 Polygon 网络，显示了由 CertiK 审计公司执行的代码安全审计（图片由 [`coinmarketcap.com/currencies/polygon/`](https://coinmarketcap.com/currencies/polygon/)\
  \ 提供）\n\n`CertiK` 是一家领先的代码安全公司，提供一套全面的工具来监控并帮助保护区块链领域，包括投资者。图 12-15 和图 12-16 展示了\
  \ [Polygon (MATIC)](https://polygon.technology/) 的代码安全审计报告摘要。根据由 `CertiK` 执行的 Polygon\
  \ 代码审计，其得分为 95.44 分（满分 100 分），在源代码安全方面被评为优秀。`CertiK` 为 Polygon 进行了两次不同的代码审计。图 12-15\
  \ 展示了 Polygon“MATIC 质押合约”的代码审计摘要，而图 12-16 则展示了驱动 MATIC 的 PoS（权益证明）桥接的 MATIC 智能合约的代码审计。尽管\
  \ MATIC 的 PoS 桥接这一具体工作范围在代码审计摘要中不可见，但它包含在完整的代码安全审计报告中，可以通过代码摘要中的“查看 PDF”按钮访问。该报告适用于\
  \ `CertiK` 为 Polygon 执行的两次审计。报告内容非常详细，值得一读，以了解所执行的工作范围及相关发现。\n\n![仪表盘截图，显示 Matic\
  \ 质押合约的代码审计摘要。类别得分为 95.44，处于前 10% 的百分位。代码审计历史显示有 14 个发现：1 个严重，0 个重大，0 个中等，2 个次要，11\
  \ 个信息性，其中 13 个已解决。方法包括人工审查和静态分析。审计时间线显示请求日期为 2020 年 7 月 24 日，修订日期为 2021 年 4 月 19\
  \ 日。提供查看 PDF 和发现选项。](img/648696_1_En_12_Fig16_HTML.jpg)\n\n**图 12-16** – 通过 Certik\
  \ 对“MATIC”进行的 Polygon 网络安全代码审计（图片由 [`skynet.certik.com/projects/polygon`](https://skynet.certik.com/projects/polygon)\
  \ 提供）\n\n![代码审计仪表盘截图，针对“Matic Staking Contract”。类别得分为 95.44，处于前 10% 的百分位。得分历史显示七天内略微上升了\
  \ +0.26。代码审计历史显示 10 个发现，其中 1 个已确认，10 个已解决，包括逻辑和控制流问题。使用的方法为静态分析和人工审查。审计时间线显示请求和修订在\
  \ 2021 年 1 月，最后一次审计于 2021 年 4 月 19 日交付。存在“查看 PDF”按钮。](img/648696_1_En_12_Fig15_HTML.jpg)\n\
  \n**图 12-15** – 通过 Certik 对“MATIC Staking Contract”进行的 Polygon 网络安全代码审计（图片由 [`skynet.certik.com/projects/polygon`](https://skynet.certik.com/projects/polygon)\
  \ 提供）\n\n`CertiK` 按严重程度对发现的问题进行分类——从信息性、次要、中等、重大到严重——尽管其他审计公司可能使用略有不同的标签来表示同等的风险级别。虽然\
  \ `CertiK` 提供的分数反映了源代码的整体状况，但投资者需要核实代码审计期间是否发现了任何被归类为严重或重大的问题，并且这些问题要么已解决，要么至少风险已得到缓解。在审计\
  \ Polygon 的 PoS 桥接“MATIC”智能合约时，`CertiK` 发现了十四个代码问题：一个严重、一个重大、两个次要和十个信息性——见图 12-16\
  \ 和图 12-17。尽管任何项目都必须处理中等、次要和信息性类别的问题，但项目团队必须立即处理严重和重大的问题。每个问题的相应状态在 Polygon 的完整和摘要代码报告中都是可见的。例如，Polygon\
  \ 报告的十四个代码问题中有十三个已得到解决，包括严重和重大的问题。这是一个很好的迹象，表明代码库是安全的，并且项目团队正在勤奋地工作，以保持项目代码库没有错误、漏洞和弱点。如果发现任何被归类为严重或重大的问题状态在几天内仍为“已确认”，则将其视为危险信号。\n\
  \n![漏洞摘要报告，包含饼图和详细发现。饼图显示分布：1 个严重，1 个重大，0 个中等，2 个次要，10 个信息性漏洞。总发现数为 14 个，其中 13 个已解决，1\
  \ 个已确认，0 个未解决。严重和重大风险各 1 个已解决。次要风险 2 个已解决。信息性风险 9 个已解决，1 个已确认。描述解释了每个风险类别的影响和性质。](img/648696_1_En_12_Fig17_HTML.jpg)\n\
  \n**图 12-17** – 来自 CertiK 的 Polygon“MATIC”代码审计报告，显示了代码审计的发现（图片由 [`skynet.certik.com/projects/polygon`](https://skynet.certik.com/projects/polygon)\
  \ 提供）\n\n![文档标题为“Review Notes”的截图，针对“Matic”。部分标记为“概述”，讨论了对 Matic 网络中 PoS（权益证明）桥接机制的智能合约的审计重点。它强调了确保退出机制的正确实现，以防止在侧链上利用代币提款。](img/648696_1_En_12_Fig18_HTML.jpg)\n\
  \n**图 12-18** – 来自 CertiK 的 Polygon“MATIC”代码审计报告，显示了审计的具体范围；驱动 MATIC 网络 PoS 桥接的智能合约（图片由\
  \ [`skynet.certik.com/projects/polygon`](https://skynet.certik.com/projects/polygon)\
  \ 提供）\n\n如前所述，还有许多其他代码安全审计公司为区块链领域提供服务。虽然本节以 `CertiK` 为例，但大多数代码安全审计公司都会制作格式类似的审计报告。例如，参见由\
  \ [Hacken](https://hacken.io/) 执行的币安储备证明（PoR）验证系统的代码安全审计（[`https://audits.hacken.io/binance/por-binance-por-code-audit-feb2023/`](https://audits.hacken.io/binance/por-binance-por-code-audit-feb2023/)）。\n\
  \n\n\n### 持续改进的代码监控\n\n一旦完成初步的代码安全审计并解决所有已发现的问题后，许多公司会提供持续性的代码监控服务，通常按月或按年进行。尽管这些服务被认为不如主要的代码安全审计那么关键，但持续改进监控有助于确保，在未来，任何新的漏洞、更新或对代码库的修改都能被及早发现，从而最大限度地降低安全漏洞风险，并长期维护软件的完整性。这种主动的方法使项目能够领先于潜在的威胁。\n\
  \n图 12-19 显示了通过 CertiK 进行的 Aave DeFi 项目审计报告的截图。这表明 [Aave](https://aave.com/) 在其网站、GitHub\
  \ 上的代码库以及社交媒体上拥有由 CertiK 驱动的主动监控。拥有主动代码安全监控的项目被黑客攻击的几率略低。大多数代码安全审计公司都提供后续支持，例如主动监控。因此，建议投资者检查该项目是否作为基本面评估的一部分，向任何代码安全审计公司使用了此项服务。\n\
  \n![监控仪表板截图，标题为“Skynet 主动监控”，用于实时项目资产监控。它显示了各个组件的状态：网站、代码仓库、智能合约和社交媒体，所有状态均标记为“活动”，并带有相应的图标。右侧有一个标记为“激活监控”的按钮。](img/648696_1_En_12_Fig19_HTML.jpg)\n\
  \n图 12-19\n\nCertiK 上对 Aave DeFi 项目进行的安全主动监控（感谢 [`skynet.certik.com/projects/aave?utm_source=CMC&utm_campaign=AuditByCertiKLink`](https://skynet.certik.com/projects/aave%253Futm_source%253DCMC%2526utm_campaign%253DAuditByCertiKLink)）\n\
  \n### 行动步骤\n\n请遵循以下步骤来确定项目是否已进行代码安全审计，以确保其代码库安全，漏洞已得到解决，从而提供足够的攻击防护。\n\n1.  **代码安全审计**\n\
  \n    判断项目的代码库是否已成功通过代码安全审计。有几种方法可以实现这一点。\n    1.  通过官方渠道联系项目团队，并索取审计报告的链接。必须通过消息或电子邮件提供审计报告的\
  \ URL 作为确认，但这还不够。\n    2.  访问 CoinMarketCap.com 主页，选择 *筛选* ➤ *添加筛选条件*，然后切换 *已审计*。这将显示已向\
  \ CoinMarketCap 报告其代码库审计情况的项目列表。\n    3.  通过你首选的浏览器进行简单搜索，可以帮助确定某个特定项目是否执行了代码安全审计，包括代码审计报告的链接——请确保\
  \ URL 的合法性。\n\n2.  **代码审计公司的可信度**\n\n    进行调研，核实执行代码审计的是否为一家专业、经认证、有资质且信誉良好的公司。同时，也要审查他们审计过的其他项目。\n\
  \n3.  **已发现代码问题的解决**\n\n    被评为严重和主要的代码问题必须已解决，或至少已得到缓解。\n    1.  检查项目的代码审计报告，确定是否有任何被评为*严重*和*主要*的代码错误具有*已解决*或*已缓解*的状态。\n\
  \        1.  务必检查审计报告是否定期更新。大多数情况下会更新；如果没有，请与项目团队联系以获取澄清。\n\n4.  **审计后支持审计**\n\n\
  \    在初次审计之后，对项目代码进行定期安全监控可降低被黑客攻击的风险。\n    1.  与项目团队核实，确认他们是否正在利用审计后的安全监控服务。\n\n\
  5.  **做好笔记并用你自己的方式记录你的发现**\n\n6.  **将这些发现与基本面评估流程的其他部分结合起来**\n\n#### 评估结果\n\n投资者应优先选择那些已进行全面代码审计，且所有*严重*和*主要*级别的代码错误均已解决的项目。不建议投资那些未经过专业代码安全审计公司进行代码审计的项目。这样的项目不仅代码库面临更高的潜在攻击风险，也反映出项目团队的不足。\n\
  \n## 漏洞赏金\n\n***评估目标：确定一个项目是否已发布、完成或计划了漏洞赏金计划，以评估其对代码安全的承诺。***\n\n作为帮助保护项目代码库安全的额外措施，加密项目会运行漏洞赏金计划——这是谷歌、微软和\
  \ Meta 等大型科技公司长期使用的方法——激励整个区块链行业的开发者和社区成员帮助识别项目代码中的错误、漏洞或弱点。关于如何发现漏洞、问题的严重性以及如何修复的建议等详细信息，都会在发送给项目团队的报告中详细说明。与专业的安全审计类似，漏洞赏金通常关注项目最有价值的组件——智能合约、桥梁、钱包或其他关键模块——尽管一些资金充足的项目会将赏金范围扩大到覆盖其整个代码库。漏洞赏金被认为是一种协作式的社区方法，有助于维护和提升区块链或\
  \ dApp 的整体代码安全性。\n\n事实\n\n漏洞赏金通常由“白帽黑客”执行，他们利用专业知识和技能来识别和修复项目代码库中的错误、漏洞和弱点。相反，“黑帽黑客”则利用这些漏洞谋取私利或进行恶意活动。\n\
  \n![网页截图，标题为“2024 年漏洞赏金计划”，来自 HackenProof。该页面突出显示了一个“隐藏宝石”板块，包含“账户抽象漏洞”部分，赏金高达 250,000\
  \ 美元，已支付金额为 12,000 美元。该计划于 2024 年 9 月 16 日开始，至 2024 年 12 月 19 日结束，已收到 50 份提交报告。下方显示了一个计划列表，包括\
  \ “gno.land”、“WEEX 网页与应用”、“Bluefin 现货合约”、“Mina 协议” 和 “AtomeOne”，每个都附有开始日期、最后更新、已提交报告以及高达\
  \ 10,000 美元或 15,000 美元的赏金。页面包含类别、项目类型、语言和平台的筛选器，共 216 条结果。](img/648696_1_En_12_Fig20_HTML.jpg)\n\
  \n图 12-20\n\nHackenProof 于 12 月启动的漏洞赏金计划，包括针对 Mina Protocol 2024 的计划（感谢 [`hackenproof.com/programs`](https://hackenproof.com/programs)）\n\
  \n除了代码安全之外，漏洞赏金对于项目团队与其社区之间的信任和透明度也至关重要。它还能鼓励积极的社区参与，从而有助于提高知名度和可信度。建议投资者确定正在评估的项目是否已计划、正在进行或已完成漏洞赏金计划。有几个网站允许投资者查看加密领域内过去、现在和未来计划的漏洞赏金。具体如下：\n\
  \n*   **HackenProof** — [`https://hackenproof.com/programs`](https://hackenproof.com/programs)\n\
  *   **CertiK** — [`https://skynet.certik.com/leaderboards/bug-bounty`](https://skynet.certik.com/leaderboards/bug-bounty)\n\
  *   **Immunefi** — [`https://immunefi.com/bug-bounty/`](https://immunefi.com/bug-bounty/)\n\
  *   **漏洞赏金雷达 (Bug Bounty Radar)** — [`https://bbradar.io/`](https://bbradar.io/)\n\
  *   **Bugcrowd** — [`https://www.bugcrowd.com/bug-bounty-list/`](https://www.bugcrowd.com/bug-bounty-list/)\n\
  \n\n\n### 行动步骤\n\n按照以下步骤，确定一个项目是否已发布、完成或计划实施漏洞赏金计划，以评估其对代码安全的承诺。\n\n1.  **项目漏洞赏金**\n\
  \    检查项目团队是否已完成、正在进行或已计划漏洞赏金计划。\n    1.  联系项目团队，获取其漏洞赏金相关信息（如有）。确保他们提供链接，以便你验证所获全部信息。\n\
  \    2.  研究主流的漏洞赏金网站和平台——特别是本节中提到的那些——以审查特定项目的漏洞赏金数据（如有）。\n\n2.  **漏洞赏金结果**\n  \
  \  如果漏洞赏金结果可用：\n    1.  判断项目团队是否已确认并解决已识别的关键和重大代码问题。\n        1.  出于安全考虑，一些项目倾向于对发现的任何漏洞保密，以维护安全并防止已披露漏洞被潜在利用。\n\
  \n3.  **用自己的风格记录结果并做好笔记**\n\n4.  **将该结果与基础评估流程的其他部分相结合**\n\n#### 评估结果\n\n如果区块链或去中心化应用（dApp）已执行过漏洞赏金计划，这是一个积极信号。尽管不太有利，但只要尚未发布漏洞赏金计划，并且已有专业的代码审计公司进行过代码安全审计，这并不一定是一个危险信号。\n\
  \n"
- "# 13. 激励与奖励\n\n基于加密资产的激励和奖励至关重要，原因有很多，包括推动用户参与、保障网络安全、提供流动性、促进网络增长、建设社区、引导行为参与、鼓励治理参与、维持经济稳定，以及营造更具吸引力的生态系统。这些要素是许多区块链网络和去中心化应用的功能、增长及可持续性的核心组成部分。\n\
  \n对于投资者而言，理解这些激励结构是评估项目可持续性和增长潜力的关键。本章也有助于那些有兴趣参与去中心化金融（DeFi）奖励协议的投资者，因为它讨论了每种 DeFi\
  \ 收益产生协议的利弊以及它们可能适合的投资者类型。高收益奖励可能看似诱人，但通常伴随着潜在风险，例如不可持续的奖励、代币通胀、中心化或欺诈。\n\n激励机制通过支付奖励来吸引参与者——在\
  \ DeFi 中通常被称为“收益”，但与工作量证明的“挖矿”不同——以鼓励其参与各种收益生成活动以及对网络的其他贡献。支付率取决于不同因素的程度，例如激励机制的類型、数字资产的稳定性、供需指标以及相关风险。收益生成过程是许多区块链网络和专注于\
  \ DeFi 的去中心化应用（dApp）的关键组成部分，是吸引投资者和网络参与者的主要动力。它们提供了在传统交易或投资之外赚钱的机会。与传统市场不同，区块链技术创造了多种专门设计的收益生成过程，使数字资产能够以最小的努力产生稳定的被动收入流。\n\
  \n收益生成过程属于区块链安全和 DeFi 的范畴。这些激励过程的结合有助于创建一个更安全、更高效且流动性更丰富的区块链生态系统，在该生态系统中，参与者在经济利益驱动下会以最有利于网络的方式行事。有多种收益生成过程可用，例如质押、流动性挖矿以及各种\
  \ DeFi 收益耕种过程。\n\n与 DeFi 收益耕种相关的术语，包括各种过程的命名约定，由于缺乏明确界定，仍然容易被误用。例如，有些人将收益耕种和流动性挖矿定义为不同的过程。然而，有些人认为，由于“收益”也通过流动性挖矿产生，因此它属于“收益耕种”的范畴。质押和挖矿也会产生“收益”；但有些人并不将这些过程称为典型的“收益生成”过程。随着时间的推移，这些分类之间的区别将变得更加清晰和明确。然而，只要理解了每个过程的概念，对这些实践的分类或贴标签在某种程度上是无关紧要的。此外，在本书中，为了清晰起见，激励机制被分为两大类：*主要激励机制*和*次要激励机制*。\n\
  \n强烈建议花足够的时间来评估主要和次要激励机制。尽管利润丰厚，但与金融市场相比，大多数收益生成过程伴随着高风险。因此，投资者，特别是那些寻求长期收益的投资者，必须彻底理解这些过程。这种理解将有助于选择符合投资者风险承受能力、时间投入和技术技能要求的合适收益生成过程。此外，分析这些收益生成机制也能揭示重要信息，帮助投资者了解网络的安全水平、流动性资源、波动程度，以及社区对网络或去中心化应用（dApp）的信任和信心。\n\
  \n**本章讨论的基本概念：**\n\n*   主要激励机制\n    *   质押\n    *   挖矿奖励\n    *   收益耕种\n    *  \
  \ 收益聚合器\n    *   治理奖励\n    *   边玩边赚奖励\n\n*   次要激励机制\n    *   空投\n    *   平台激励\n\
  \    *   测试版奖励\n    *   推荐计划\n    *   忠诚度奖励\n\n专业提示\n\n激励机制不仅仅是关于利润；它们通常预示着项目的成熟度及其与用户利益的契合度。寻找具有可持续奖励结构的项目，因为过于慷慨的激励可能意味着不可持续的代币经济模型。\n\
  \n## 主要激励机制\n\n主要激励奖励系统是收益生成过程，其中奖励通常以去中心化的方式在链上生成并自动分配，尽管某些质押或收益耕种方案通过托管或半中心化服务进行支付。这是通过挖矿、质押或智能合约控制的系统（包括\
  \ DeFi 收益生成机制和去中心化游戏中的边玩边赚激励）来实现的。在大多数情况下，由于去中心化和开源权限的好处，这些奖励机制不需要中心化权威机构。然而，在大多数情况下，需要支付交易费用。主要奖励激励机制包括：\n\
  \n*   **质押**\n*   **挖矿**\n*   **流动性挖矿**\n*   **收益耕种**\n*   **收益聚合器**\n*   **治理参与**\n\
  *   **边玩边赚**\n\n好的，作为高级文档工程师和翻译员，我将严格遵守您的注意事项，为您完成以下翻译工作。\n\n\n## 质押\n\n`质押` 指的是个人将其资产（币）在链上锁定，以帮助支持区块链网络的安全性，从而获得奖励的过程。质押参与者获得新奖励的比率被称为*奖励率*，它以给定一年内赚取多少奖励的百分比来衡量。\n\
  \n`质押` 在权益证明（`PoS`）区块链以及支持验证、安全性和维护操作的 `PoS` 区块链变体中得以实现。来自基于 `PoS` 的区块链的数字资产（原生币或代币）被“*质押*”，作为防止验证者作恶的保险。质押激励用户锁定（质押）他们的币，并根据每个投资者质押的金额提供“质押”奖励。质押的币越多，潜在奖励就越高。基于\
  \ `PoS` 的区块链示例包括 `Ethereum` (`ETH`)、`Solana` (`SOL`) 和 `Cosmos` (`ATOM`)。质押奖励率以\
  \ `APY`（年化收益率）百分比值表示。`APY` 值因协议而异；然而，成熟项目的典型奖励率在 2% 到 6% 之间。\n\n存在许多不同的质押流程，其质押资产的步骤略有不同。然而，质押数字资产最常见的、最基本步骤如下：\n\
  \n1.  **选择 PoS 数字资产** – 根据相关风险、资产稳定性、年度奖励百分比等变量，选择合适的 `PoS` 数字资产进行质押。\n2.  **选择质押服务**\
  \ – 运行您自己的验证者（自托管），或为您的 `PoS` 资产使用信誉良好的第三方质押服务。\n3.  **质押资产** – 质押您的资产。这可以直接通过钱包进行，也可以通过第三方质押服务进行。\n\
  4.  **监控奖励和资产价值** – 跟踪已分配的奖励和资产的市场价值。\n5.  **重新质押或领取奖励** – 根据协议指南，选择是将质押奖励再投资还是提取。\n\
  6.  **取消质押资产** – 取消质押并提取您的资产（如果需要）。请注意，在资产可提取之前，可能存在一个解锁期。\n\n以下各节将讨论各种质押变体和流程。每种质押流程的优缺点为投资者提供了更透彻的理解，有助于他们选择符合自身风险承受能力和时间投入的质押流程。此外，还将讨论评估长期成功的关键因素，如调整后的质押奖励、基于交易费用的收益、质押率以及流通量与最大供应量的关系。\n\
  \n### 验证者质押\n\n**示例：** [Polkadot Network](https://polkadot.network/)、[Ethereum](https://ethereum.org/en/)\
  \ 和 [Avalanche Network](https://www.avax.network/)\n\n如第 6 章“区块链架构”中“权益证明（`PoS`）”一节所述，验证者，也称为*区块创建者*，通过在区块链上验证交易来帮助维护安全性和系统效率。验证者质押大量数字资产（例如\
  \ `Ethereum` 需要 `32 ETH`）作为抵押品，如果验证者行为不诚实或疏忽，其部分资产可能会被罚没——只有在严重或屡次违规时才会罚没全部质押量。验证者负责检查（签署）网络中传播的新区块（包含交易）是否有效，并偶尔创建和传播新区块本身。\n\
  \n**优势**\n\n- **最大奖励** – 直接从协议中获得最大奖励，无需支付中介费用。\n- **完全控制** – 运行全节点提供。\n    - **私钥安全**\
  \ – 通过使用自己的私钥，验证者可以直接保护其质押资产，这增加了一层额外的安全性，因为他们无需将资产托付给第三方。\n    - **直接交易验证** – 能够不依赖第三方直接验证交易。\n\
  - **投票权** – 在大多数 `PoS` 区块链中，验证者有权参与治理流程，允许他们就网络的各种方面和方向进行投票。\n- **网络安全** – 验证者有助于加强网络安全。\n\
  - **透明度和信任** – 运行节点使验证者能够管理并监控自己的资金，无需中介机构。\n\n**劣势**\n\n- **技术知识** – 设置节点需要高水平的专业技术知识。\n\
  - **运营成本** – 运行节点需要以下条件：\n    - 高速互联网。\n    - 高性能、高效的操作系统。\n    - **硬件** – 维护运行\
  \ `Ethereum` 执行客户端和共识客户端的硬件，并保持与互联网连接。\n    - 足够数量的计算机 `SSD` 磁盘存储。例如，要运行一个 `Ethereum`\
  \ 节点，建议至少拥有 `2TB` 的 `SSD` 存储，并额外准备 `0.5TB` 到 `1TB` 作为预防措施。\n    - 电力成本增加，因为节点必须持续活动（在线），不能中断或停机。\n\
  - **积极参与** – 需要持续监控以确保节点始终在线并按预期运行。\n- **最低质押量** – 运行验证者节点有最低质押量要求，这可能会阻碍许多资金较少的个人参与。最低要求因网络而异。\n\
  - **罚没风险** – 恶意行为可能导致更大数量的质押资产被“罚没”。\n\n\n\n### 流动性质押\n\n**示例：** [Lido](https://lido.fi/)\
  \ 和 [Stader](https://www.staderlabs.com/)\n\n在传统的质押（*硬质押*）过程中，用户的资产会被锁定一段时间，无法轻易访问或交易。这降低了投资者的流动性，导致在锁定期结束或用户发起提前赎回之前，无法进行交易或将其用作抵押品。以太坊\
  \ 2.0 就是一个典型例子，用户需要在网络上质押 32 个以太币（`ETH`）。当质押参与者的 32 个 `ETH` 被锁定后，只要没有恶意行为，他们就会持续获得奖励。然而，在资金被质押期间，他们无法使用这些资金。问题在于，并非每个投资者都有\
  \ 32 个 `ETH`；因此，他们不符合参与以太坊质押流程的资格。流动性质押平台通过提供部分质押的机会，帮助缓解了这个问题。\n\n流动性质押（*软质押*）协议通过向质押方提供一种合成的*流动性质押衍生品*（`LSD`）来换取其质押资产，从而应对传统质押相关的问题。这种\
  \ `LSD`，也称为流动性质押代币（`LST`），由协议在用户质押时通过程序生成。`LST` 代表了质押资产的价值，是一种借据，为用户提供进一步的投资机会、更高的流动性和资本效率。这些\
  \ `LST` 在设计上是流动的，使用户能够交易它们，或将它们用于 DeFi 应用中，作为赚取额外被动收入策略的一部分。\n\n[Lido](https://lido.fi/)\
  \ 是一个知名的去中心化流动性质押提供商示例。Lido 允许用户质押以太坊，作为回报，用户会获得一种 `LST`，即 `stETH`（质押的 `ETH`）。这些\
  \ `stETH` 合成代币以 1:1 的目标比例（包括任何质押奖励或惩罚）反映用户在以太坊信标链上质押的 `ETH` 余额价值，尽管在市场剧烈需求或流动性有限期间，其市场价格可能偏离\
  \ 1 `ETH`。用户可自由使用 `stETH` 衍生代币作为额外 DeFi 策略的一部分，进行交易，或仅仅持有以备不时之需。Lido 用户可以通过兑换（销毁）`stETH`\
  \ 代币来取回其质押资产。\n\nLido 的协议由一个汇集用户质押并委托给独立验证者的质押池、`stETH` 代币以及一个用于治理的 DAO 组成。质押池使用预言机合约来监控\
  \ DAO 的验证者余额。DAO 对治理至关重要，它提供了一个去中心化的安全层，降低了在维持 `ETH` 与 `stETH` 锚定过程中出现单点故障的风险。它还负责监督协议更新并选择保险提供商，其资金库由通过\
  \ Lido 智能合约获得的质押奖励提供资金。\n\n![流程图展示了使用 Lido 进行以太坊质押的流程。用户向 Lido 质押合约发送 ETH，然后合约与以太坊存款合约交互。流程包含一个节点运营商的\
  \ ETH 账户和一个验证者节点，两者均以绿色高亮显示。过程涉及验证密钥以及通过 Lido DAO 阈值签名提款账户进行提现的可能性。箭头指示了 ETH 和 stETH\
  \ 交易的方向。](img/648696_1_En_13_Fig1_HTML.jpg)\n\n图 13-1\n\nLido 质押平台提供商上的以太坊质押框架（感谢\
  \ [`blog.lido.fi/how-lido-works/`](https://blog.lido.fi/how-lido-works/)）\n\n在流动性质押平台上，用户会根据原始质押代币持续赚取质押奖励。这些奖励可能会“融入”到衍生代币的价值中，也可能单独分配。\n\
  \n**优势**\n\n-   **流动性** – 与传统的质押不同，流动性质押以衍生数字资产的形式为质押参与者提供流动性。\n-   **提高资本效率** –\
  \ `LSD` 通过在不同的 DeFi 协议中利用合成资产来赚取额外收益，为用户提供了更多获得额外奖励的机会。\n-   **降低准入门槛** – 通过流动性质押提供商，资产较少的参与者可以进入各种质押池，根据其质押比例按比例分配奖励，从而赚取收益。\n\
  -   **防止价格暴跌** – 允许质押衍生品的持有人在价格严重暴跌时立即出售其资产，而不是在资产价值持续下跌的同时受制于解锁期。\n\n**劣势**\n\n\
  -   **安全风险** – 参与者面临与流动性质押相关的多个移动部件（例如各种质押和流动性池、智能合约、衍生资产和验证者）更高的风险。代码中的任何错误或漏洞都可能导致参与者损失部分或全部资产。\n\
  -   **复杂性** – 流动性质押过程比传统质押更难理解；因此，在质押前需要额外的谨慎和理解。\n-   **罚没风险** – 流动性质押过程也受到*罚没*机制的影响。任何验证者的不当行为或恶意活动都可能导致惩罚，其中部分或全部质押资产将被扣除。\n\
  \n\n\n#### 委托质押即服务（SaaS）\n\n**示例：** [BloxStaking](https://www.bloxstaking.com/)\
  \ 和 [Ethpool](https://ethpool.org/)\n\n`委托质押即服务`（SaaS）是由各类区块链公司提供的一种软件服务，它使用户无需拥有或维护运行验证节点所需的硬件和软件，即可参与到质押流程中。该流程通常包括：引导用户完成初始设置（如密钥生成和存款）；或由用户本地保管密钥，而运营商通过非托管的远程签名设置进行连接。这样，服务方就能代表你运行验证器，通常按月收费——Blox\
  \ Staking 就是这类设置的典型例子。\n\n正如 Ethereum.org 所述，在使用 SaaS 公司之前，考虑以下几个属性至关重要：\n\n1. \
  \ **开源** – 确保代码是开源的，并向公众开放，可供分叉和使用。\n2.  **已审计** – 核心代码经过了正式的审计，其结果已公开发布并可供公众查阅。\n\
  3.  **漏洞赏金** – 已在任何核心代码上执行了公开的漏洞赏金计划，以奖励用户安全地报告和/或修复漏洞。\n4.  **经过实战检验** – 该服务已面向公众提供并使用至少六个月，最好超过一年。\n\
  5.  **无需许可** – 用户无需特殊许可、账户注册或`了解你的客户`（KYC）验证即可参与该服务。\n6.  **执行客户端多样性** – 该服务不应让其运行的全部验证器中有超过\
  \ 50% 使用某个占多数的执行客户端。\n7.  **共识客户端多样性** – 该服务不应让其运行的全部验证器中有超过 50% 使用某个占多数的共识客户端。\n\
  8.  **自我托管** – 用户保持对所有验证器凭证（包括签名密钥和提款密钥）的保管权。\n\n**优势**\n\n-   **维护** – SaaS 平台通过确保软件和更新等服务器需求，来维持最佳的质押条件。\n\
  -   **易于使用** – 简化的质押流程，无需深厚的专业知识。\n-   **降低启动成本** – 无需购买硬件，包括高性能操作系统及充足的存储空间。\n\
  -   **可靠性** – 持续可靠的服务，无停机时间。\n\n**劣势**\n\n-   **控制权受限** – 与某些 SaaS 公司合作时，你可能无法完全控制验证节点。\n\
  -   **可审计性限制** – 一些 SaaS 平台使用专有的、闭源代码，限制了透明度，对于需要完全可审计系统以满足合规或安全要求的用户来说并不合适。\n-\
  \   **托管风险** – 如果服务提供商被黑客攻击，存在质押资产损失的风险。因此，非托管服务提供商更受青睐。\n-   **罚没风险** – 恶意行为可能导致更大数量的质押资产被“罚没”。\n\
  \n#### 中心化质押平台\n\n**示例：** [Bybit](https://www.bybit.com/)、[Coinbase](https://www.coinbase.com/)、[Binance](https://www.binance.com/)\
  \ 和 [Kraken](https://www.kraken.com/)\n\n由中心化实体运营的中心化质押平台，使用户能够质押基于 PoS 的数字资产以获取奖励。用户可以直接在平台上存入其资产或直接购买，这些资产随后会被质押并锁定一段预定的时间。\n\
  \n**优势**\n\n-   **用户友好** – 简单直接\n-   **易用性** – 无需技术知识\n-   **降低风险** – 降低了被罚没的风险，从而保护用户的质押资产\n\
  \n**劣势**\n\n-   **中心化** – 由于中心化，存在黑客攻击的风险\n-   **控制权有限** – 对其质押资产的控制较少\n-   **治理权**\
  \ – 可能无法参与网络上的治理投票\n-   **费用** – 由于中心化平台收取费用，导致收益减少\n\n#### 通过去中心化钱包质押\n\n**示例：**\
  \ [Lido](https://lido.fi/)、[Trust Wallet](https://trustwallet.com/)、[Trezor](https://trezor.io/)、[Exodus](https://www.exodus.com/)\
  \ 和 [MetaMask](https://metamask.io/)\n\n基于去中心化质押的钱包和服务提供商，使用户能够质押其 PoS 数字资产以赚取奖励。质押功能要么直接在钱包内原生提供，要么通过将钱包连接到去中心化质押协议来实现，因此没有中心化的管理机构介入，用户对自己的资产和密钥拥有完全控制权。\n\
  \n**优势**\n\n-   **自我托管** – 用户完全控制其数字资产和私钥。\n-   **安全性** – 由于直接参与质押，无需中间方，因此受到攻击的风险更低。\n\
  -   **透明度** – 所有质押操作都对社区开放以供审计。\n-   **更低费用** – 由于没有中心化中间方，费用可能更低。\n\n**劣势**\n\n\
  -   **复杂性** – 对于不了解区块链基础知识的人而言，可能存在技术挑战。\n-   **无客户支持** – 大多数去中心化质押服务提供商缺乏足够的客户支持。\n\
  -   **责任自负** – 用户对其质押资产的安全性和保障负有全部责任，需要时刻保持警惕。\n\n#### 投资者质押考量\n\n当参与权益证明（PoS）区块链上的质押时，投资者可以从两个主要来源获取奖励：*新铸造的代币*或*交易手续费*，或两者结合。每种方法对代币供应、通胀及潜在价值稳定性都有不同的影响。本节将分解这些奖励类型以及其他关键的质押因素，如实际奖励率和最优质押比率，以帮助投资者做出明智的决定。\n\
  \n##### 质押奖励：铸造奖励 vs 交易手续费奖励\n\n当网络参与者（例如，验证者）参与 PoS（或 PoS 变体，如 DPoS 和 LPoS）共识机制时，他们提供了验证交易和保护网络的服务。作为回报，他们会因自己的努力而获得“质押”奖励。这些奖励，也被称为*收益*，可以源自两个主要来源：交易手续费和新铸造的代币。\n\
  \n##### 来自铸造代币的奖励\n\n在这种质押奖励模型中，质押奖励是通过在区块链上新铸造的原生代币来产生的。这些新铸造的代币会分配给验证者，以奖励他们完成的工作。这种通胀型的奖励机制是\
  \ PoS 区块链采用的主要方法。\n\n**优势**\n\n-   **鼓励参与** – 持续的奖励流激励更多网络参与者质押其资产，从而进一步保障网络安全。\n\
  -   **稳定的奖励供应** – 为验证者和*质押者*提供稳定、持续且可预测的奖励，波动性小。\n\n**劣势**\n\n-   **代币供应稀释** – 这种方法最大的缺点是，由于创建新代币并将其引入流通供应，导致供应持续被稀释。如果通胀率超过网络扩展或采用的步伐，这可能会进一步使代币价格贬值，这对长期投资者可能不利。\n\
  -   **劝阻投资者** – 铸造新代币导致供应严重膨胀，可能会劝阻新投资者进行投资，从而进一步贬低项目的价值和声誉。\n\n\n\n### 交易手续费带来的奖励\n\
  \n质押奖励也可以来自交易手续费，这意味着以区块链原生代币（例如 `BNB`）支付的交易费用，被用于奖励验证者和质押参与者，以表彰他们在验证交易和维护区块链安全方面所做的努力。验证者通过交易手续费获得奖励的比率，通常取决于质押的代币数量、网络协议以及处理的交易数量。\n\
  \n这种方法的核心优势在于，用于支付交易手续费的数字资产已经存在于总供应量中。因此，这个过程只是将代币从“发送者”手中重新分配给验证者和质押参与者。无需创建新代币。因此，这个过程没有通货膨胀，也不会进一步稀释供应量。\n\
  \n**优点**\n\n-   **通胀控制** – 这种方法可以在不增加供应量的情况下支付验证者和质押参与者。\n-   **吸引投资者** – 投资者倾向于关注那些不会受代币供应膨胀影响的项目。\n\
  \n**缺点**\n\n-   **奖励不可预测** – 奖励会因交易量和网络使用情况而波动。这可能导致有时奖励很高，有时验证者和质押参与者获得的奖励却很少。\n\
  -   **采用障碍** – 需要控制交易手续费，使其不会阻碍区块链的发展。高昂的交易手续费可能会阻碍网络用户使用，而低廉的交易成本则为验证者和网络用户创造了激励性很强的机会。\n\
  \n尽管质押可能利润丰厚，但也并非没有风险。`Slashing`（罚没）是一种权益证明（PoS）机制，验证者因未能满足特定要求、行为恶意、未能达到某些条件或做出损害网络的行为而受到惩罚。此外，密切关注每枚代币的价格至关重要，这不仅是为了确保质押仍然值得，还因为它会影响总收益。\n\
  \n### 实际收益率\n\n在质押数字资产时，了解资产的通胀率及其对净质押奖励的影响至关重要。正如第 8 章“代币经济学”中“通胀型代币供应”一节所讨论的，对于通胀型代币供应，更多的代币会被持续不断地添加到流通中，导致总供应量随着时间的推移而增加。这会稀释每个代币持有者所占总供应量的份额，这意味着你的所有权比例会下降，除非你获得了等量的新铸造代币作为补偿。因此，在进行质押时，投资者需要关注的是*实际收益率*，而非仅仅获得更多正在不断稀释代币供应量的新铸造代币。\n\
  \n**专家提示**\n\n长期投资者应始终质押其资产，以防止其总供应份额因通胀而缩水。复利（或重新质押）奖励可以进一步抵消稀释效应，有助于在赚取额外奖励的同时维持价值。\n\
  \n与标准的“名义”收益率不同，*实际收益率*（以前称为“调整后质押奖励”）代表了实际的“净”质押收益，显示了投资者在考虑通胀或通缩因素后获得的真实奖励——以百分比表示。这有助于判断他们是在获得真实价值，还是仅仅持有了更多但已被稀释的代币。正的实际收益率表明分配的质押奖励超过了通胀率，投资者赚取了真正的净质押奖励。相反，负的实际收益率意味着，在考虑通胀因素后，质押奖励的价值不足，投资者可能在代币数量上增加了，但整体购买力却下降了。因此，强烈建议在投资某项资产之前考虑实际收益率，特别是如果你的目的是通过质押获得被动收入。但是，如果你是因为非常看好某项资产的基本面而投资，并且其实际收益率为负，那么质押可能仍然是值得的——这是一种复杂的情况。如果不进行质押，随着通胀稀释代币供应，你的持仓很可能会损失购买力。在这种情况下，选择质押至少实现盈亏平衡或减少损失，是比任由通胀逐渐侵蚀你投资价值更可取的选择。\n\
  \n实际收益率的计算公式如公式 13-1 所示。名义质押率是考虑通胀前的质押奖励，而通胀率是代币供应量每年增加的比率。\n\n```\n实际收益率 = ( (1\
  \ + 名义收益率) / (1 + 通胀率) ) - 1\n```\n\n***公式 13-1.** 计算实际收益率的公式*\n\n图 13-2 显示了来自 StakingRewards.com（一个加密货币质押和实时奖励分析平台）的\
  \ [以太坊](https://ethereum.org/en/) 和 [Solana](https://solana.com/) 的质押奖励数据。以太坊的收益率为\
  \ 3.39%，通胀率为 0.38%，实际收益率为 3%。这表明以太坊的通胀率几乎为零；因此，这 3% 的实际收益率来自交易手续费，而非通货膨胀，这对投资者来说非常有利。自以太坊转为权益证明模型并实施\
  \ EIP-1559 后，一部分交易手续费被销毁，另一部分则用于支持网络，包括质押奖励。\n\n\n\n另一方面，Solana 的奖励率为 6.31%，通胀率为\
  \ 5.32%，实际奖励率为 0.93%。这表明，在质押 SOL 时，尽管有较高的通胀率（6.31%），但高通胀率（5.32%）正在中和它，投资者实际上每年仅能获得\
  \ 0.93% 的奖励率。与以太坊不同，Solana 的奖励来自新铸造的货币，而非交易费。因此，其供应量正在持续稀释。然而，如果不进行质押，投资者的持仓比例将随着时间的推移而持续下降。Solana\
  \ 的最终通胀供应量预计将在 2031 年达到 1.5%。\n\n![以太坊与 Solana 质押指标对比。以太坊价格为 2,926.6 美元，上涨 16.84%。质押市值为\
  \ 1,006.9 亿美元，上涨 17.61%，质押率为 28.57%，上涨 0.18%。奖励率为 3.39%，上涨 0.16%。通胀率为 0.38%，上涨 0.09%，实际奖励率为\
  \ 3%，上涨 0.07%。Solana 价格为 198.15 美元，上涨 19.15%。质押市值为 788.5 亿美元，上涨 21.45%，质押率为 67.68%，上涨\
  \ 0.79%。奖励率为 6.31%，下降 0.17%。通胀率为 5.32%，下降 0.09%，实际奖励率为 0.93%，下降 0.08%。柱状图显示了过去 7\
  \ 天内两种加密货币的净质押流量。](img/648696_1_En_13_Fig2_HTML.jpg)\n\n**图 13-2**\n\n来自 StakingRewards.com\
  \ 的以太坊和 Solana 质押数据，展示了奖励率、通胀率和实际奖励率（数据来源：[`​www.​stakingrewards.​com/​assets/​proof-of-stake?​sort=​staking_​marketcap&​timeframe=​7d&​order=​desc&​byChange=​false&​columns=​reward_​rate%2Cprice%2Cstaking_​marketcap%2Cstaking_​ratio%2Cinflation_​rate%2Creal_​reward_​rate`](https://www.stakingrewards.com/assets/proof-of-stake%253Fsort%253Dstaking_marketcap%2526timeframe%253D7d%2526order%253Ddesc%2526byChange%253Dfalse%2526columns%253Dreward_rate%252Cprice%252Cstaking_marketcap%252Cstaking_ratio%252Cinflation_rate%252Creal_reward_rate)）\n\
  \n**以下四个条件可以定义一个理想的质押机会：**\n\n1.  当“实际奖励率”值高于“奖励率”值时。\n2.  当质押奖励来源于交易费而非铸造新币时。\n\
  3.  当流通供应量接近最大供应量时，表明剩余通胀很少。\n4.  当存在销毁机制时，整体代币供应量会减少。\n\n### 质押比率\n\n需要考虑的一个关键因素是质押比率，它以百分比表示。质押比率可以定义为经济体中质押的代币总量与总代币供应量之比。较高的质押比率通常表明社区对该项目的信任度更高，因为更多的用户愿意将其代币锁定一段时间。\n\
  \n在网络层面，整体质押比率与每个质押代币获得的奖励之间通常存在反比关系——当更多代币被质押时，相同的奖励池需要在更多参与者之间分配。随着质押代币数量的增加，由于奖励在更大的池子中分配，个人质押奖励往往会减少。另一方面，当未质押代币数量减少时（意味着质押的代币数量减少），个人质押奖励会增加，因为它们由更少的参与者分配。然而，无论年化收益率（APY）如何，个人质押的代币越多，他们获得的奖励就越多。这自然会吸引并导致更多的整体质押活动，从而在总体和个人层面创造更高的质押比率。\n\
  \n$$ \\text{质押比率} = \\left( \\frac{\\text{总质押代币量}}{\\text{总代币供应量}} \\right) \\times\
  \ 100 $$\n\n**公式 13-2.** 计算质押比率的公式\n\n例如，*项目 X 有 2.5 亿枚质押代币，总供应量为 10 亿枚代币。*\n$$\
  \ \\left( \\frac{250,000,000}{1,000,000,000} \\right) \\times 100 = 25\\% $$\n\n\
  **公式 13-3.** 虚构项目 X 的质押比率计算示例\n\n### 最优质押比率\n\n一个最优的质押比率可以平衡安全性、流动性、盈利能力、波动性和项目信任度。较高的质押比率意味着网络安全性更高，对项目的信心更强，但可能导致波动性增加和质押年化收益率（APY）较低。另一方面，质押代币数量少（即质押比率低）的项目往往波动性低，质押年化收益率（APY）高，但可能会损害网络安全性并引发投资者对项目情绪的质疑。表\
  \ 13-1 进一步简化了低质押比率和高质押比率的优缺点。\n\n**表 13-1** 低和高质押比率的后果\n\n| 质押比率——低与高的后果 |\n| ---\
  \ |\n| | 低质押比率（例如 0–5%） | 高质押比率（例如 95–100%） |\n| --- | --- | --- |\n| 网络安全性 | 差\
  \ | 优秀 |\n| 流动性 | 优秀 | 差 |\n| 奖励（APY） | 优秀 | 差 |\n| 信心/信任 | 差 | 优秀 |\n\n质押比率过高或过低都可能对项目的成功产生显著的负面影响。因此，根据经验法则，30%\
  \ 到 70% 之间的质押比率有助于平衡安全性、流动性、盈利能力、波动性和项目信任度等关键要素。这对于质押市值较低的项目尤其重要，有助于维持网络安全。大型网络只需\
  \ 20–30% 的代币被质押就能保持安全，因为锁定的价值巨大——例如，以太坊以 29% 的质押率锁定了约 870 亿美元，BNB Chain 仅以 21% 的质押率就确保了约\
  \ 190 亿美元的安全——同时保留了流动性并保持了较低的通胀。从投资者的角度来看，一个理想的质押机会是能够提供高年化收益率（APY），而又没有通常与高质押比率相关的缺点的机会。\n\
