  \n### 去中心化应用（dApp）投资\n\n在投资一个 dApp 时，投资者必须首先确定该 dApp 所属的生态系统（区块链网络）。一个拥有多样化 dApp\
  \ 并相互协同运作的大型、繁荣的生态系统，为项目（dApp）充分发挥潜力提供了丰沃的环境。相反，一个多元化程度差、网络内项目数量少的生态系统，将阻碍其内任何项目的成长。图\
  \ 6-8 来自[`AlphaGrowth.com`](https://AlphaGrowth.com/)，展示了一个名为[Aave](https://aave.com/)的\
  \ DeFi 项目，红色框高亮显示了 Aave 可用的所有区块链。\n\n一旦确定了 dApp 所在的生态系统名称，就可以按照“*第层‘生态系统’区块链项目投资*”中概述的步骤来评估该生态系统。如果\
  \ dApp 处于一个繁荣的生态系统中，那么它成功的机会要高于同一个 dApp 处于多元化程度差、项目数量少的生态系统中。\n\n![网页截图，标题为“AAVE\
  \ (AAVE) Token Crypto Analytics & User Data”。它包含导航标签，包括概览、竞争对手、社区统计、公司和链接。页面描述 Aave\
