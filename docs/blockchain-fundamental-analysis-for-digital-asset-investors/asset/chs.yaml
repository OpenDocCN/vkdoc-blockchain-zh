  \ 扩展和基于 SNARK 的轻客户端。其中还包含技术规格、协议改进以及量子安全签名和 EVM 增强等未来目标。](img/648696_1_En_11_Fig3_HTML.jpg)\n\
  \n图 11-3\n\n包含详细信息的以太坊路线图（感谢 [`​x.​com/​VitalikButerin/​status/​1588669782471368​704`](https://x.com/VitalikButerin/status/1588669782471368704)）\n\
  \n表 11-1 以“非开发者”易于理解的方式总结了以太坊的路线图，包含了每个对应阶段的目标。\n\n表 11-1\n\n以太坊从 PoW 到 PoS 的路线图（感谢\
  \ [`https://ethereum.org/en/roadmap/#what-changes-are-coming`](https://ethereum.org/en/roadmap/%2523what-changes-are-coming)）\n\
