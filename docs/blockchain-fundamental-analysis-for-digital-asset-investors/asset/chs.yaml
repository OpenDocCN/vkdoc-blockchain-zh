  \ 侧链”的蓝色区块。图中包含“欺诈证明”和“Plasma 退出队列”图标，以及一个从以太坊主网指向 MATIC 侧链的“存款桥”箭头。](img/648696_1_En_6_Fig20_HTML.jpg)\n\
  \n图 6-20\n\nPolygon（MATIC）/以太坊侧链（图片由 Polygon Matic 提供——[`https://polygon.technology/polygon-pos`](https://polygon.technology/polygon-pos)）\n\
  \n1. **跨链桥**\n\n跨链桥——本质上是一种软件应用——弥合了“鸿沟”，使得加密货币、包装代币、非同质化代币（NFT）或其他数字资产能够在区块链网络之间转移。代币桥的工作原理是：在源链上通过智能合约锁定或销毁代币，并在目标链上通过另一个智能合约解锁或铸造代币。跨链桥不受限于任何网络。然而，由于大多数代币桥依赖一个通常规模较小且中心化的验证节点集或多签机制，桥合约或任一连接链中的任何缺陷都使其成为黑客攻击的主要目标。可用的代币桥类型有很多种；主要的三种如下：\n\
  \   1. **销毁并铸造** – 在源链上销毁代币，然后通过在目标链上重新铸造来发行相同的代币。\n   2. **锁定并铸造** – 在源链的智能合约中锁定代币，然后在目标链上铸造这些代币的包装版本（通常称为桥接资产），反之亦然。\n\
  \   3. **锁定并解锁** – 在源链上锁定代币，然后从目标链的流动性池中解锁相同的代币。这类代币桥通常通过收入分成等激励计划来吸引桥两端的流动性。\n\n\
  **事实** `Binance Bridge` 是一个流行的跨链桥。它支持将资产从以太坊转移到 `Binance Smart Chain`（反之亦然）。此外，它允许用户将加密代币转换为与\
  \ Binance Chain 和 `BSC` 兼容的格式。\n\n2. **包装代币**\n\n包装代币是代表其他资产的数字资产，例如加密货币或黄金、房地产等传统资产。包装代币有助于促进不同协议区块链之间的资产转移和互操作性。需要注意的是，包装代币实际上并非在网络之间转移。相反，原始代币在源链上被锁定，同时一个托管人或桥合约在目标链上铸造等量的包装代币。例如，比特币（BTC）可以作为“包装”\
  \ BTC（`WBTC`）在以太坊区块链上使用。这为比特币持有者开启了一个全新的智能合约 dApp 世界以及诸如 DeFi（去中心化金融）等功能。\n\n3.\
  \ **侧链**\n\n侧链的目的是解决影响父级 L1 区块链的可扩展性问题。侧链通过减轻主链的计算负载来实现这一点，从而释放吞吐量，使主链能够处理更高数量的交易。此外，侧链通常会承载数千个\
  \ dApp，从而释放主链和整个生态系统的压力。\n\n\n\n\n侧链可以是公开的或私有的，每条侧链都拥有自己的代币、协议、共识机制和安全性——这与从主链（父链）获取安全性的\
  \ Layer 2 解决方案不同。侧链是独立的区块链网络，通过`双向锚定`连接到父区块链（即主网）。\n\n双向桥（通常称为双向锚定）允许用户在主网上锁定资产，同时在侧链上铸造或解锁等值资产。这样，无需传统的托管方，价值就能在两个网络之间转移。`Polygon\
  \ PoS`是一个著名的侧链示例。它与以太坊区块链并行运行，提供了一个独立的网络来增加交易带宽，相比以太坊降低了费用并提高了吞吐量。图`6-20`展示了以太坊（根链/主链）和\
  \ Polygon PoS（侧链）的架构，其中使用了`Plasma 检查点节点`来辅助交易验证。以下流程概述了数字资产如何从主网（父链）转移到侧链，反之亦然。\n\
  \n1.  数字资产并非真正从一条链转移到另一条链；相反，一旦智能合约（交易）被执行并验证，协议就会锁定主网上的数字资产，同时在侧链上解锁相同数量的资产，反之亦然。\n\
  2.  为了实现这一点，还需要一个`链下流程`，其目的是在主网和侧链之间传输数据。\n3.  智能合约执行后，会向主网（父链）发送一个信号，触发链下流程将交易信息“中继”到侧链，从而验证交易。\n\
  4.  随后，资金在侧链上释放，允许用户跨两条区块链转移数字资产。\n\n**事实**\n\n侧链通常拥有自己的共识协议，通过改善高交易费用、隐私和安全性等典型问题来补充主网。\n\
  \n![图示说明中心辐射模型。标签为“Cosmos Hub”的中心圆通过箭头连接到七个周围标有“Zone”的圆，展示了一种网络结构。](img/648696_1_En_6_Fig21_HTML.jpg)\n\
  \n**图 6-21** Cosmos 中心区块链架构（图片来源：`https://cointelegraph.com/learn/what-is-cosmos-a-beginners-guide-to-the-internet-of-blockchains`）\n\
  \n## 1. 区块链路由器\n\n区块链路由器通过支持多个区块链网络之间的通信和数据交换，帮助提高它们之间的互操作性。像传统路由器一样，区块链可以具备路由功能，这些功能根据通信协议分析和传输通信请求，并动态维护区块链网络的拓扑结构。\n\
  \n`Router Protocol`是区块链路由器的一个例子。Router Protocol 架构允许一条链上的合约安全且去中心化地与另一条链上的合约进行交互。这是通过验证源链（Router\
  \ Protocol）和目标链（例如以太坊）上的状态变更来实现的。通过这种方式，Router Chain 可以编写自定义逻辑来触发事件以响应这些外部状态变更。此外，Router\
  \ Chain 上的应用程序可以利用无信任的中继器网络，直接从 Router Chain 更新外部链的状态。\n\n## 2. 哈希锁定技术\n\n哈希时间锁定合约（HTLC）是一种跨链互操作性标准，它支持`哈希时间锁`等跨链原子操作。HTLC\
  \ 确保两个节点之间的任何转移都可以通过一个通常由智能合约（或在比特币等不可编程链上的原生脚本）调节的支付通道来完成。\n\n**事实** 原子交换可以定义为数字资产的交叉交换，其中一种资产无需第三方或中心化中介（例如去中心化交易所）即可兑换成另一种资产。\n\
  \nHTLC 最早由`闪电网络`使用，其设计极为巧妙。以下是 Alice（发送方）和 Bob（接收方）之间 BTC/ETH 交易的简化 HTLC 流程：\n\n\
  1.  Alice 对一段秘密代码进行哈希处理，获得`哈希锁` `h[1]`，并创建一个`时间锁` `t[1]`。\n2.  使用创建好的哈希锁和时间锁，Alice\
  \ 创建一个智能合约`c[a]`，在其中锁定她的资金资产（例如 2 BTC），并将相应的哈希值发送给 Bob。\n3.  当 Bob 收到 Alice 的哈希值（随机数）时，他可以查看并确认\
  \ Alice 已经对她的资产（2 BTC）进行了时间锁定。\n4.  Bob 随后使用 Alice 的哈希锁`h[1]`和他自己的时间锁`t[2]`，创建智能合约`c[b]`，并在其中锁定他的资产（3\
  \ ETH）。至关重要的是，Bob 的`t[2]`（时间）*必须小于 Alice 的* `t[1]`，*这样 Bob 才能有足够的时间从 Alice 那里索取他的资产。*\n\
  5.  Alice 从合约`c[b]`中解锁 Bob 的资金，从而揭示出秘密代码。\n6.  Bob 使用已揭示的秘密代码从合约`c[a]`中解锁 Alice\
  \ 的资金。\n\n**注意** 一旦 Bob 和 Alice 都验证了双方资产，所有权就会转移，交易数据会存储在每个区块链网络上。但是，如果 Bob 和 Alice\
  \ 在时间锁定期内没有验证资产，双方资产都会退回给原始发送方——在可编程链上通过合约到期自动执行，在比特币上则通过预先签名的退款交易执行。\n\n## 3. 公证人方案\n\
  \n公证人方案是一种互操作性解决方案，能够促进不同区块链上的网络参与者之间进行资产转移——换句话说，它们简化了跨链交易的任务。与侧链不同，公证人方案不是父链的扩展。相反，它们是管理整个流程的第三方，必须被信任能够诚实行事，这引入了中心化的信任假设。该第三方（公证人）可以访问两个账户（区块链\
  \ A 和 B）。它本质上充当了一个中间人，当区块链 A 上发生某个事件时进行验证，然后将此信息反馈给区块链 B。\n\n**其工作流程如下：**\n\n1.\
  \  **用户（1）** – 将资产从链 A 发送给公证人。\n2.  公证人锁定并确认用户（1）发送的数字资产。\n3.  公证人将其账户中的数字资产转移到目标链\
  \ B 上的用户（2）。\n\n**公证人分为两种类型：**\n\n- **单签名公证人** – 一种跨链互操作性解决方案，由公证人群体或系统选择的单个节点负责收集、验证和确认区块链之间的数据或资产转移。虽然这种设置非常高效，但它引入了中心化风险，因为整个过程依赖于单一的验证者——一个单点故障。\n\
  - **多重签名公证人** – 顾名思义，在多阶段公证系统中，从源链 A 收集的数据必须由多个公证人节点验证，这些节点需要达成超过三分之二或更多参与节点的共识。这种模型通过将验证工作分布在多个节点上，增强了安全性并降低了中心化风险。\n\
  \n## 4. 预言机\n\n\n\n\n"
- "# 预言机与跨链互操作性\n\n`预言机`是一种独特的技术，用于连接链下（现实世界）数据与链上数据，大多数预言机以链下或混合模式运行，在链间中继信息。通过这种方式，`预言机`向区块链提供可由触发器设置的信息，使智能合约在接收到真实世界的输入或输出时执行特定任务。此外，`预言机`也可在链上内部使用，实现多条区块链之间的互操作性，即所谓的**跨链预言机**。区块链行业中备受信赖的预言机技术领导者[Chainlink](https://chain.link/)将跨链预言机定义为一种能够“*在不同区块链之间读写信息，实现数据和资产跨链转移的互操作性技术，例如利用一条区块链上的数据触发另一条链上的操作，或跨链桥接资产，使其能够在原生区块链之外使用*”的技术。`预言机`为\
  \ Web3 提供了连接新旧传统系统、数据源及高级计算的核心技术。\n\n## 5. 独立的区块链解决方案\n\n一种直接的互操作性形式根植于区块链自身，其架构专门设计用于促进不同区块链之间的互操作，使它们能够无缝通信和共享信息。目前，多个独立的区块链项目致力于提供互操作性，以简化众多不同区块链与生态系统之间的通信、数据及资产转移——两个典型例子是波卡网络和\
  \ Cosmos 网络。\n\n### 5.1 波卡网络\n\n`波卡网络`是一个异构的多链系统，拥有最复杂且先进的互操作技术，由中继链、平行链、平行线程和桥接构成。`波卡`支持任何类型的数据或资产的跨链转移，而不仅限于通证。`波卡`采用一种名为`跨共识消息格式（XCM）`的独特技术。`XCM`实际上并不能在系统之间发送消息，它是一种规定消息传输应如何执行的消息格式，从而使`波卡`生态系统内的所有区块链（平行链和平行线程）无需使用桥接（桥接用于连接非波卡的外部网络，例如比特币和以太坊）即可在内部相互连接、发送和接收数据及资产。`波卡`技术的核心是中继链，它为整个系统提供统一的共识和安全保障，平行链共享来自中继链的安全保障。这类技术为未来的区块链及其互操作性功能树立了标杆。[Kusama](https://kusama.network/)（波卡的\
  \ Canary 网络）拥有并运行与`波卡网络`相同的架构设计。\n\n### 5.2 Cosmos 网络\n\n`Cosmos 网络`是一个由独立区块链组成的去中心化网络，旨在解决可扩展性和互操作性问题。该技术的核心是`Cosmos\
  \ Hub`，它使用`区块链间通信（IBC）`协议连接这些区块链（或称“区域”），见图 6-21。`IBC`协议使得兼容 IBC 的链之间能够进行安全通信以及数字资产和数据的转移。结合`Tendermint`共识算法（一种`拜占庭容错（BFT）`协议，即使部分节点发生故障或行为恶意，也能确保网络安全平稳运行），`Cosmos`为跨链交易构建了一个无缝、可扩展的生态系统。\n\
  \n## 跨链互操作性的优势\n\n跨链互操作性备受推崇的原因众多。其中一些甚至被认为对于优化用户效率和促进网络成功至关重要。本节将概述跨链互操作性的主要优势。*值得注意的是，缺乏这些*\
  \ *优势* *可能会凸显区块链网络在互操作性方面的局限，并最终影响其价值和未来发展。*\n\n- **跨链资产转移** – 区块链互操作性有助于资产在不同区块链网络的多个链之间进行转移。这拓宽并强化了整个区块链生态系统，为网络参与者提供了更高的灵活性、效率和互联性。\n\
  \n- **跨链自主身份** – 使区块链用户能够在单条区块链上安全地拥有和控制自己的身份，同时通过互操作性，在用户选择的多个区块链网络中展示该身份。这是通过将用户凭证锚定在一条与其他区块链网络具有高度互操作性的区块链上（*通过身份提供商，例如\
  \ KILT Protocol*）来实现的。之后用户无需付出太多努力即可在其主区块链之外使用这些凭证。\n\n- **网络效应** – “网络效应”一词最早由以太网共同发明人罗伯特·梅特卡夫（*梅特卡夫定律*）在\
  \ 20 世纪 80 年代初提出。梅特卡夫观察到，随着连接到网络的设备增多，网络对每个用户的价值呈指数级增长。在区块链的语境中，网络效应意义重大，因为随着网络用户数量的增加，这种效应会被放大。随着更多人使用一个区块链网络，会形成一个价值增长和用户交互增强的良性循环，从而支撑起许多加密货币和去中心化应用的价值。\n\
  \  - **服务与创新** – 更广泛的用户基础还能促进网络用户之间更显著的交互，从而催生新的应用、服务和用例。随着更多开发者和企业家探索区块链的可能性，会产生创新和投资的雪球效应，进而带来更高的采纳率和价值创造。\n\
  \n- **安全性** – 不断增长的用户群体会增强网络的整体安全性和可靠性。由于每个用户都在帮助验证和确认交易，网络会变得更加去中心化，也更难被操控或欺诈。这反过来又会吸引更多用户，进一步强化网络效应。\n\
  \n- **流动性** – 区块链互操作性对于提升 DeFi 生态系统的流动性至关重要。互操作性通过实现资产在不同网络间的高效转移，减少碎片化并提高市场效率，从而增加\
  \ DeFi 生态系统的流动性。这使得 DeFi 平台能够连接更多流动性来源，扩大其对更广泛资产和市场的访问范围。借助区块链互操作性，DeFi 协议用户可以无缝地在不同网络间转移资产，为用户提供更多交易机会并增加市场深度。这创造了一个更加互联的生态系统，用户可以在其中高效地交易资产，并获取更多样化的金融产品和服务。此外，DeFi\
  \ 平台的正常运行严重依赖流动性，因为资金的可用性决定了资产价格和交易过程的效率。\n\n\n\n*   **增强功能** – 区块链互操作性可以通过将多个生态系统的技术融合为一个，从而催生新的用例、应用和创新。这反过来有助于克服单一区块链网络的局限性。例如，开发者可以利用众多区块链网络的优势，创建一个更先进、更稳健、更高效的`dApp`生态系统。此外，开发者还可以创建并运行具有组合多链功能的`dApp`，以处理大规模交易、复杂数据结构以及多种类型的数字资产。\n\
  *   **多链代币交换** – 互操作性在允许用户轻松交换来自不同区块链网络的资产方面起着关键作用——这被称为`原子交换`。原子交换，也称为`原子跨链交易`，指的是在不同区块链网络之间交换加密货币和代币。\n\
  *   **协作与伙伴关系** – 区块链互操作性允许来自不同链的协议相互连接、共享数据和资源，这有助于形成新的伙伴关系和协作。\n\n### 投资者需考察区块链互操作性\n\
  \n投资时，务必牢记，一个区块链或`dApp`的未来价值，取决于其与其他区块链通信的互操作性水平。如果一个区块链网络无法轻易地与不同的网络交互——至少要与主要的蓝筹网络（比特币、以太坊、Polkadot\
  \ 等）交互——那么其增长和性能将在多方面受到阻碍。相对较新的小型网络，以及在这些网络上构建的相关`dApp`，如果无法获得诸如流动性增加、多链交易、原子交换、新创新与协作、跨链资产转移、优化的网络效应等关键且必不可少的要素，则面临最高风险。\n\
  \n区块链网络会实施多种区块链互操作性解决方案来相互连接和通信。这些解决方案包括跨链桥、侧链、包装代币、公证方案、哈希锁定、区块链路由器和预言机。识别并理解所讨论网络使用的互操作方法，最符合投资者的利益。更重要的是，这项考察将揭示区块链无法与其他链连接的相关问题或限制。\n\
  \n#### 审阅项目文档\n\n首先，审阅项目文档，包括白皮书、官方博客文章，以及通过项目网站或其他可靠来源找到的其他相关技术论文和文章中关于互操作性解决方案的措辞。此外，在你常用的浏览器上多次搜索该链的互操作性解决方案——务必输入大量关键词，包括跨链桥、侧链、包装代币、公证方案、哈希锁定、区块链路由器和预言机等。这将有助于揭示该区块链所提供的任何互操作特性。而且，通过官方渠道联系项目和开发团队将提供重要的见解。同时，务必通过向团队索要官方文章或项目文档的参考\
  \ URL 来验证所提供的信息。\n\n不幸的是，除非区块链专注于互操作性，否则项目白皮书有时不会详细说明他们计划用来连接其他链的具体互操作技术。或者，即使最初提供了相关措辞，其被上传的可能性也很小。然而，这些考察是必不可少的，并建议将其作为良好的起点。许多项目会展示近期资料、技术文章和文档的链接，这些内容通常比白皮书更新——取决于白皮书是否定期更新。彻底探索项目网站、深入挖掘并扫描所有可用链接始终是值得的。\n\
  \n#### 通过专注互操作性的区块链实现互操作性\n\n提供原生内置互操作性解决方案的底层区块链基础设施是最有效的互操作解决方案类型。假设该区块链在设计时就考虑到了互操作性。在这种情况下，其架构将在项目白皮书和相关技术文档中清晰详细地描述和解释，通常还会附有架构图和插图，以帮助简化繁重的技术术语。为了更好地理解，可以在\
  \ YouTube 上搜索解释视频，这些视频通常有助于以直观和简单的方式进行分解和解释。此外，开发者门户——通常通过项目的`Discord`频道——是寻求技术解释的另一个绝佳去处。\n\
  \n一旦对可互操作的设计基础设施有了很好的理解，请根据以下标准进行评估：\n\n1.  **原生互操作架构设计**\n    1.  区块链互操作架构设计如何运作？它是如何工作的？\n\
  \    2.  区块链基础设施如何与其他区块链生态系统连接？\n    3.  设计中是否使用了其他区块链互操作解决方案（例如，跨链桥、包装代币、侧链等），但这些方案位于核心内置互操作基础设施设计之外？\n\
  \n2.  **易用性与复杂性**\n    1.  该可互操作的区块链基础设施使其他区块链的连接变得容易还是困难？\n    2.  如果设计中使用了多种互操作解决方案，这是否为用户或开发者增加了额外的复杂性？\n\
  \    3.  跨链发送资产是否容易？\n    4.  是否支持主要的数字资产 Web3 钱包，如`MetaMask`、`TrustWallet`等？\n\n\
  3.  **兼容性便利性**\n    1.  与现有主流代币标准（如`ERC-20`、`ERC-721`等）的兼容性如何？\n    2.  是否目前支持来自主要蓝筹网络的代币标准？\n\
  \    3.  是否有用于与基于以太坊的资产交互的跨链桥或包装机制？\n    4.  该平台是否提供非技术性、用户友好的功能，用于在多个链之间迁移或操作现有代币？\n\
  \    5.  `WASM`使开发者能够使用`Rust`或`C++`等语言编写智能合约，简化了上手过程，并提供比以太坊的`EVM`更快、更安全的执行。\n \
  \       1.  该区块链是否支持基于`WASM`的智能合约？\n        2.  它能否运行为其他兼容`WASM`的区块链构建的合约？\n\n4.\
  \  **安全性**\n    1.  已实施的任何互操作解决方案是否存在任何已知的过往安全威胁或弱点？\n\n5.  **当前生态系统**\n    1. \
  \ 该区块链是否与以太坊、Polkadot 和 Solana 等流行的蓝筹生态系统实现互操作？\n    2.  它还兼容哪些其他生态系统？\n    3. \
  \ 总共与多少个生态系统实现互操作？\n\n6.  **声誉**\n    1.  该互操作基础设施是否有良好的记录？\n    2.  社区对其看法如何？\n\
  \    3.  有任何负面或正面反馈吗？\n    4.  是否有任何突出的重大关注点？\n\n7.  **项目支持**\n    1.  用于集成项目或跨链资产转移功能的开发者文档看起来是否直接易懂？\n\
  \    2.  开发者门户是否活跃，回复是否可见、快速且信息丰富？\n\n8.  **竞争对手**\n    1.  与竞争对手相比，整体表现如何？\n  \
  \  2.  它拥有更多还是更少的连接生态系统？\n    3.  跨链转移资产是更容易还是更困难？\n    4.  是否有任何其他显著观察到表明互操作架构设计质量差或质量高的迹象？\n\
  \n\n\n"
- "# 其他互操作性解决方案的访问途径\n\n除了提供原生内置互操作性解决方案的区块链之外，还有许多互操作性解决方案可供区块链网络实施，以实现彼此之间的连接与通信。这些解决方案包括跨链桥、侧链、封装代币、公证方案、哈希锁定、区块链路由器和预言机。识别并理解所采用的互操作方法，最符合投资者的利益。这将有助于提供有价值的见解，以衡量与其他链的互操作性水平及便捷程度。更重要的是，此项检查将揭示潜在的担忧或局限性，即区块链无法与不同网络连接，导致跨链资产转移效率低下。一旦确定了跨链互操作性解决方案的类型，就需要确保这些方案足够完善，并能通过其他生态系统实现增长。\n\
  \n在你充分了解所采用的互操作解决方案后，请根据以下标准进行评估：\n\n1.  **已采用的互操作解决方案**\n    1.  采用了哪些类型的互操作解决方案，例如跨链桥、侧链、封装代币、公证方案、哈希锁定、区块链路由器、预言机或其他类型？\n\
  \    2.  它们是如何运作的？\n    3.  是否采用了不止一种类型的互操作解决方案？如果是，原因是什么？\n\n2.  **可用性与复杂性**\n\
  \    1.  该互操作区块链解决方案是使其他区块链的连接变得更容易还是更困难？\n    2.  跨链发送资产是否容易？\n    3.  是否支持 `MetaMask`、`TrustWallet`\
  \ 等主流数字资产 Web3 钱包？\n\n3.  **兼容性**\n    1.  与现有主流代币标准（如 `ERC-20`、`ERC-721` 等）的兼容性如何？\n\
  \    2.  目前是否支持主流蓝筹网络（blue-chip networks）的代币标准？\n    3.  是否存在与以太坊资产交互的桥接或封装机制？\n\
  \    4.  该平台是否提供非技术性、用户友好的功能，用于跨多条链迁移或操作现有代币？\n    5.  `WASM` 使开发者能够使用 `Rust` 或\
  \ `C++` 等语言编写智能合约，简化了上手过程，并且执行速度比以太坊的 `EVM` 更快、更安全。\n        1.  该区块链是否支持基于 `WASM`\
  \ 的智能合约？\n        2.  它能否运行为其他兼容 `WASM` 的区块链构建的合约？\n\n4.  **安全性**\n    1.  所实施的任何互操作解决方案是否存在已知的过往安全威胁或弱点？\n\
  \n5.  **现有生态系统**\n    1.  该区块链是否与以太坊、Polkadot、Solana 等热门蓝筹生态系统实现互操作？\n    2.  还与哪些其他生态系统实现了互操作？\n\
  \    3.  总共与多少个生态系统实现了互操作？\n\n6.  **声誉**\n    1.  该链在这些互操作解决方案方面是否有良好的记录？\n    2.\
  \  社区对此有何看法？\n    3.  是否存在负面或正面反馈？\n    4.  是否有任何值得关注的重大事项？\n\n7.  **项目支持**\n  \
  \  1.  用于集成项目或跨链资产转移功能的开发者文档是否看起来直接明了且易于理解？\n    2.  开发者门户是否活跃，能看到快速且信息丰富的回复？\n\n\
  8.  **竞争对手**\n    1.  总体与竞争对手相比如何？\n    2.  它所连接的生态系统是更多还是更少？\n    3.  跨链转移资产是更容易还是更困难？\n\
  \    4.  互操作解决方案是否存在任何显示设计优劣的关键迹象？\n\n"
- "# 使用加密资产市场数据和价格追踪网站评估区块链互操作性\n\n作为评估项目互操作性的最后一步，投资者应确定有多少原生币或代币在其他网络上被表示、锁定或铸造。原生币（例如\
  \ `ETH`）或代币（例如 `UNI`）在多个网络上的分布范围越广，就越能表明项目的互操作性良好——尤其是当这些跨链表示是由项目核心团队发行或正式认可的，而非用户临时创建时——这将提升项目及其互联生态系统的增长潜力和采用率。另一方面，一个虚构的区块链项目\
  \ Capticious Network，其原生币 `XYZ` 仅在单一网络上表示，这表明 Capticious 与其他区块链网络之间存在严重的互操作性缺失。\n\
  \n图 6-22 显示了来自 `CoinMarketCap.com` 的两张截图。左侧图片突出显示了以太坊以及其他网络（红色框内），以太坊的 `ETH` 币在这些网络上被锁定或表示。目前有十四个不同的网络上有\
  \ `ETH` 币存在或被表示，这表明以太坊在多个区块链生态系统间具有高水平的互操作性。此外，这十四个连接的网络中的任何一个，与以太坊这样庞大的生态系统实现互操作后，都可继承跨链优势，包括流动性、多链交易、原子交换等。相比之下，一个网络的原生币仅在一个或两个其他网络上锁定或铸造，则被认为是较差的。\n\
  \n![该截图为以太坊（ETH）和 Uniswap（UNI）的加密货币数据对比。显示当前价格、市值、成交量及其他财务指标。以太坊价格为 2,678.60 美元，下跌\
  \ 2.21%；Uniswap 价格为 6.71 美元，下跌 3.86%。两部分均包含各区块链网络的合约地址、官方链接、社交媒体及网络浏览器。以太坊部分突出显示了\
  \ BNB 智能链合约，Uniswap 部分则展示了以太坊合约。其他详细信息包括价格表现和历史数据。](img/648696_1_En_6_Fig22_HTML.jpg)\n\
  \n图 6-22\n\n以太坊的 `ETH` 币在其他区块链上被锁定，以及 Uniswap 的 `UNI` 代币在不同区块链网络上被锁定（图片由 [`https://coinmarketcap.com/currencies/ethereum/`](https://coinmarketcap.com/currencies/ethereum/)\
  \ 和 [`https://coinmarketcap.com/currencies/uniswap/`](https://coinmarketcap.com/currencies/uniswap/)\
  \ 提供）\n\n图 6-22 右侧的图片突出显示了 [Uniswap](https://uniswap.org/)，这是一个去中心化交易所（`DEX`），允许用户在没有中心化第三方的情况下交易加密资产。Uniswap\
  \ 的 `UNI` 代币存在或被表示的生态系统显示在垂直红色框内。Uniswap 所构建的底层网络以太坊则显示在水平红色框内。请注意，`UNI` 代币可在包括原生网络以太坊在内的十二个网络上使用。这表明\
  \ `UNI` 是一个流行的代币，能够无缝集成到多个网络，提升了可访问性、可用性和采用率。除了代币本身的受欢迎程度之外，许多跨链表示是由第三方桥接或社区倡议创建的，而非\
  \ Uniswap 核心团队所创建；一个代币与其他链的集成，归功于底层区块链基础设施内置的互操作特性，以及本章讨论的各种互操作解决方案。\n\n### 行动步骤\n\
  \n按照以下步骤确定区块链的互操作性水平。\n\n1.  **确定互操作性水平**\n   \n   执行“投资者对区块链互操作性的检查”一节中讨论的活动。\n\
  \n2.  **做笔记，并以自己的风格记录你的发现**\n\n3.  **将这些发现与基础评估流程的其他部分结合起来**\n\n\n\n#### 结果评估\n\n\
  在投资新兴的小型区块链网络时，建议确保该网络与大型生态系统（例如，以太坊、比特币、Avalanche、Polkadot、Cosmos、Solana、Binance、Tron\
  \ 等）具有足够的互操作性。同样，在投资特定的 dApp 时，必须确保该 dApp 构建在蓝筹区块链上，或者至少构建在一个与一些更大、更受欢迎的生态系统具有足够互操作性的小型生态系统中。\n\
  \n"
- '# 7. 代币设计与用例


  代币设计是直接影响项目成功几率的關鍵方面。代币的设计决定了它在生态系统中的运作方式。它包含了特定的特性和规则，这些规则规定了代币在何处、何时以及如何使用，无论是用于交易、治理，还是代表项目中的所有权。


  每当为一个特定的用例设计代币时，由设计师和项目团队决定该代币将如何在平台和更广泛的生态系统中被使用。它的效用将在很大程度上取决于项目 dApp 和用例中的设计与功能需求。


  对于数字资产投资者来说，代币设计提供了宝贵的洞察力，有助于评估区块链项目的潜力。虽然一个具有高基本面品质代币的项目可能预示着长期可持续性，但一个设计不佳、几乎没有价值的代币则可能对项目产生负面影响。因此，有必要调查该代币在生态系统中是否具有合法的、无法被传统中心化公司解决的用例。


  代币设计的另一个关键方面是代币增值机制。代币增值机制是内置于代币设计中的专门策略，旨在随着时间的推移增加代币的效用和需求。这些方法和策略包括质押分发、回购销毁、费用返还、治理奖励等等。代币增值机制的质量越高，该代币对投资者的吸引力就越大。


  本章前半部分提供了各类数字资产的背景知识，例如加密货币、代币和山寨币。此外，还讨论了不同类型的代币，并介绍了通用的代币标准，随后剖析了代币设计的基本要素，赋予投资者评估代币设计内在价值所需的知识和技能。


  **本章讨论的基本概念：**


  -   加密代币、加密货币和山寨币

  -   代币标准

  -   代币设计

  -   代币增值过程与机制


  ## 加密代币、加密货币和山寨币


  加密代币、加密货币和山寨币都是由密码学技术保护的数字资产，它们使用基于数学的算法来确保数据安全并受到保护，确保其在数字交易过程中保持私密和真实。


  尽管并非有意为之，但诸如代币、加密货币（币）和山寨币等术语在投资者中被广泛误用。简而言之，加密货币（例如 `BTC` 和 `ETH`）——也被称为币——在其自己的区块链上运行，并且是该链的原生资产。另一方面，代币（例如
  `UNI` 和 `LINK`）是在现有区块链上创建的，并在去中心化应用程序（dApps）中发挥各种功能。最后，山寨币，或替代币（加密货币），本质上是指比特币之外的任何其他币种。本节将更详细地讨论加密代币、加密货币和山寨币。


  ### 加密货币


  加密货币——也称为“币”——是一种原生协议币，由其所运行的区块链协议直接发行，因此通常被称为区块链的原生货币。比特币及其原生币 `BTC` 就是一个典型的例子，也是最为人所知的加密货币。`BTC`
  具有真实的货币价值，可以在中心化和去中心化交易所进行交易，也可以用作在线商品和服务的支付方式。然而，加密货币币（也称为内建币）的核心目的和功能是保障区块链网络的安全。原生币用于支付费用，使垃圾攻击成本高昂，奖励区块生产的矿工/验证者，并覆盖其他链上成本，因此它们对于网络的安全和日常运行至关重要。它们也可以用作价值储存和交换媒介。


  事实


  原生币（例如 `BTC` 和 `ETH`）由其自身的基础链发行，并且是其不可或缺的一部分，而功能型代币通常是在现有链上发行；币可以被封装（例如 `WBTC`），以在其他网络上获得
  DeFi 功能。


  另一个币的例子是以太币（`ETH`），它是以太坊区块链的原生币。数以千计构建在以太坊网络之上的加密货币项目及其用户使用 `ETH` 支付费用并完成网络上的交易。`ETH`
  用于激励良好行为、保障网络安全、支付交易成本以及奖励矿工完成的计算工作。此外，开发者使用 `ETH` 支付在以太坊区块链上部署智能合约的相关费用。


  ### 山寨币


  山寨币，是替代币（加密货币）的简称，被投资者用来指代除比特币 `BTC` 之外的所有加密货币。这包括来自 Polkadot、Ethereum、Solana、Avalanche、BNB
  Smart Chain、Fantom 等众多区块链的大量币种。替代区块链旨在为用户提供更多功能和可扩展性方面的价值，尽管有些选择在某种程度上牺牲去中心化程度以换取更高的吞吐量或其他特性。以太坊区块链就是一个例子，其先进的可编程智能合约能力为用户释放了巨大价值，并为许多企业提供了解决方案，这些企业现在利用区块链技术来降低运营成本、建立信任并将权利返还给客户。


  ### 加密代币


  加密代币——在现有区块链上发行的数字资产——是许多 Web3 应用的关键构建模块，并受到底层分布式账本的保护。它们可以代表从数字资产到特定权限的任何东西，无论是现实世界、数字空间，甚至是法律协议中的内容。代币，或称应用型代币，是在现有区块链
  Layer 0 和 Layer 1 网络（如 Polkadot 网络和以太坊）之上创建的。与通常代表一种（数字）货币的原生币（例如 `BTC`）不同，代币代表各种可转移和可计数的商品，例如数字和实物资产、股份、投票权、会员资格、忠诚度积分以及其他效用。


  加密代币是通过在区块链上部署智能合约代码（例如，以太坊上的 `ERC-20` 或 `ERC-721` 合约）来发行的。加密代币使用分布式账本技术在区块链上进行存储、记录和管理。然而，代币的安全性和有效性依赖于基础层的共识（用于排序交易）及其智能合约代码（例如
  `ERC-20` 或 `ERC-721`）中嵌入的、用于强制执行余额、转账和供应量的验证逻辑。


  加密代币可以有多种用途，提供远超简单价值转移的功能。例如，其效用横跨多个领域，能够实现现实世界和数字资产的通证化、授予和管理权限、支持去中心化交互、实现支付、作为价值储存，甚至支付启用智能合约执行和
  DeFi 服务的 gas 费。




  ### 代币类型


  由于区块链技术的颠覆性影响，公司正在不断探索和创造利用区块链及其副产品——加密代币的新方式。区块链和智能合约技术允许公司对加密代币进行编程和定制，以满足其特定的需求和条件。加密代币使得创建新型公司成为可能，这些公司在交易数据和区块链记录保存方面可以实现自动化。本节将讨论加密代币的主要类型和分类。


  加密代币的主要类型如下：


  1.  **功能型代币**

  2.  **证券型代币**

  3.  **非同质化代币**

  4.  **封装代币**

  5.  **稳定型代币**


  ### 功能型代币


  去中心化应用（`dApps`）将加密代币（通常称为功能型代币）嵌入为本地支付手段，使网络参与者和用户能够与平台交互，包括其特定的产品、服务和功能。可以把功能型代币想象成一张可以兑现、交易或用于访问特定功能的门票或优惠券。功能型代币至少提供一个核心主要用途；然而，有些代币是多功能的——当然，这完全取决于行业和项目团队的创造力水平。功能型代币（或称平台代币）的运作与代币的设计架构以及所提供的产品或服务的功能直接相关。功能型代币可以授予用户访问特定功能的权限，使其能够对治理提案进行投票，在
  `DeFi` 项目中用作抵押品，或用于支付生态系统内的交易费用。例如，[Uniswap](https://uniswap.org/) 的 `UNI` 代币主要用作治理代币，允许持有者参与
  Uniswap 的治理公投，他们可以对升级和 `dApp` 的发展方向进行投票。


  ### 证券/股权代币


  证券型代币（`STO`）可以被视为金融证券的数字 Web3 版本。它们代表了公司股份所有权的转移。类似于购买传统公司的股权（股票）——所有权反映了公司的资产和任何未偿债务——当个人购买证券型代币时，他们本质上是在购买该加密货币公司的一份股份。


  证券型代币类似于股权份额：持有者获得对公司按比例的索取权——包括其资产、负债以及任何类似股息的现金流。然而，与功能型代币不同，证券型代币不会出现某些数字资产投资者所青睐的极端波动性。相反，证券型代币的价值会随着公司自身核心价值的提升而累积增值。


  在美国，证券型代币受到美国政府和美国证券交易委员会（`SEC`）的监管。由于这些规定，证券型代币受到严格的审查，这对新的加密货币初创公司来说可能是一场噩梦。因此，加密货币项目往往避开证券型代币，而倾向于使用功能型代币。


  美国最高法院使用*豪威测试*来确定根据[1933 年证券法](https://www.investopedia.com/terms/s/securitiesact1933.asp)和[1934
  年证券交易法](https://www.investopedia.com/terms/s/seact1934.asp)进行的交易是否属于“投资合同”。如果一项交易被认定为“投资合同”，那么该交易就被视为一种证券。*豪威测试*在决定一个代币是否应被视为证券（相对于功能型代币或类似代币）时，会审查加密货币代币的销售或发行行为。证券型代币的例子包括
  [tZero](https://tzero.com/) 和 [Blockchain Capital](https://blockchain.capital/)。


  ### 非同质化代币


  自 2014 年数字媒体艺术家 Kevin McCoy 创建了第一个名为 Quantum 的 `NFT`（图 7-1）以来，非同质化代币（`NFTs`）变得极为流行。但什么是
  `NFT`，它的用途是什么？在讨论 `NFTs` 之前，先了解同质化代币和非同质化代币之间的区别会大有裨益。


  ![一幅等高线图，显示六边形图案和同心线条。中心是亮粉色圆圈，向边缘过渡为深蓝色。背景为黑色，突出地图的鲜艳色彩。](img/648696_1_En_7_Fig1_HTML.jpg)


  **图 7-1** Quantum NFY（承蒙 Kevin McCoy 提供）


  根据 Merriam-Webster 词典，“*fungible*（同质化）”的定义是“*指具有这样一种性质的物品（如金钱或商品），其一部分或数量可以在偿还债务或结清账目时，由另一相等部分或数量所替代。*”就加密货币而言，以比特币为例，一单位
  `BTC`（1 `BTC`）可以等价交换为另一单位的 `BTC` 而没有任何增益或损失（交易费用除外），因为在任何给定时间，每一单位比特币都代表相等的价值。更具体地说，一个
  `BTC` 可以被分割成相等的部分（例如，四分之一），并可以按相同比例交换而没有任何增益或损失。大多数货币——无论是链上还是链下——都被设计成可同质化的，尽管一些稳定币或封装代币如果脱钩或面临流动性限制，可能会暂时失去同质化特性。抛开地域金融经济优势不谈，一
  `USD` 在纽约的价值与在美国任何其他州的价值是相同的。类似地，每一单位加密货币与同一货币的另一单位相等且可互换，即，1 `ETH` 可以交换为 1 `ETH`，或
  1 `SOL` 交换为 1 `SOL`，没有任何增益或损失。


  **表 7-1** 同质化代币与非同质化代币对比


  | 数字资产种类 |

  | --- |

  |   | 同质化代币 | 非同质化代币 |

  | --- | --- | --- |

  | 属性 | 相同且可互换 | 独特且不可互换 |

  | 价值交换 | 可按 1:1 交换（例如，1 `ETH` 换 1 `ETH`） | 不可按 1:1 交换（例如，`NFTs` 代表独特资产） |

  | 可分割性 | 可分割成更小的单位（例如，1 `ETH` 可分割为 `gwei`，或 20 美元可兑换成两张 10 美元钞票） | 不可分割（例如，一个 `NFT`
  或一张驾驶执照不能分解成更小的部分） |


  非同质化代币（`NFTs`）是不可同质化的，这意味着它们不可互换，因为它们不具有相等的价值。与同质化代币不同，`NFTs` 不可分割或合并，并且其本质上是唯一可识别的，这得益于其公开可验证的链上唯一
  ID 和预设特性。它们是可转让的，可以选择性地包含丰富的元数据，并且——通过诸如 `ERC-1155` 或分数化 `NFT` 金库等较新的机制——甚至可以以可分割或多副本的形式存在。


  如前所述，第一个 `NFT` 创建于 2014 年；然而，`NFTs` 直到 2017 年随着 [CryptoKitties](https://www.cryptokitties.co/)
  在以太坊区块链上的发布才开始进入主流视野。CryptoKitties 是一个独特的猫咪 `NFTs` 收藏系列，也是最早使用以太坊 `ERC-721` 代币标准的项目之一。与每个
  `NFT` 一样，每一个 CryptoKittie `NFT` 都有其独特的 ID 和特征。此外，CryptoKitties 收藏系列具有内置功能，使拥有两个或更多
  CryptoKitties `NFTs` 的持有者能够“繁殖”他们的 `NFT` 猫咪，从而产生每个 CryptoKittie 特征的独特组合。这项技术最初完全由以太坊区块链驱动，后来在全球艺术家和开发者浪潮的激发和塑造下，在随后的几年里催生了成千上万个新的
  `NFT` 收藏系列。




  #### NFT 用例


  NFT 背后的革命性技术专门旨在代表对数字或实物资产的所有权；然而，它已从静态艺术演变为与链下和链上资产代币化相关的众多用例。这包括数字音乐、教育证书的代币化，使用链上`物联网`进行供应链追踪、版权保护、游戏、忠诚度计划、`了解你的客户`程序、音乐会门票以及非营利组织。在游戏行业，玩家可以“铸造”游戏内
  NFT 资产，如服装、剑、帽子和盾牌，并可以选择在点对点系统中持有或交易。像 [Moonsama](https://marketplace.moonsama.com/collections)（构建于
  [Moonriver 网络](https://moonbeam.network/networks/moonriver/)之上）这样的创新项目推出了独特的 Moonsama
  NFT 合集——见图 7-2 和图 7-3。Moonsama NFT 持有者可以在元宇宙中使用他们的 NFT 来获得奖励。除了像 Moonsama 这样的项目所拥有的杰出构思、设计和独特性之外，社区的澎湃热情可以被视为另一个核心驱动力。


