  \ 2024 年初：可定制的 FVM，使其成为通用运行时。- 2024 年中：里程碑 3，能够将 Wasm Actor 部署到主网。- 2024 年：里程碑 3+，进一步增强可编程性的协议重构。时间线使用垂直线和每个里程碑的圆形标记直观表示。](img/648696_1_En_11_Fig10_HTML.jpg)\n\
