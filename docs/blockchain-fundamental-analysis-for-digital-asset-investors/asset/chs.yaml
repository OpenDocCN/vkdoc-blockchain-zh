  \n> **警告**\n> 切勿依赖或假定任何第三方网站上项目代币销售信息的准确性。始终通过官方资源（如项目官网、GitHub、博客或社交媒体渠道）核实所有项目数据。\n\
  \n### 项目白皮书\n\n如果项目连最基本的白皮书或精简白皮书都没有，请勿投资其公开发售。充斥着空洞术语的劣质白皮书和简陋的网站，仅需几千美元就能轻易生成。有关详细的白皮书评估步骤，请参阅第\
  \ 3 章“项目文档”。\n\n\n\n### 行动步骤\n\n按照以下步骤确定项目的公开发售融资模式，并将其评估为潜在的投资机会。请注意，这主要适用于计划通过预定公开发售活动进行投资的投资者。投资者可通过访问加密货币市场洞察与分析平台（如\
  \ [ICO Drops](https://icodrops.com/)、[CryptoRank](https://cryptorank.io/active-ico)\
  \ 和 [ICO Holder](https://icoholder.com/)）来查看活跃和预定的公开发售项目。\n\n1. **公平启动或预挖**\n  \
  \ 确定项目采用的是*公平启动*还是*预挖*代币分配模式。\n   - 每种模式的详细信息通常可在项目的官方网站、白皮书、博客及社交媒体渠道等一处或多处官方渠道中找到。\n\
  \n2. **公开发售融资模式**\n   如果采用预挖模式，需确定项目所使用的公开发售融资模式类型。\n   - 请分别查看表 15-3 中概述的公开发售融资模式及对比摘要。\n\
  \   - 该模式类型是否满足您的投资要求，例如公开发售的参与门槛、KYC/AML、筛选强度、监管、投资者保护、中心化程度等？\n\n3. **简化筛选公开发售项目**\n\
  \   通过本章讨论并总结如下快速评估步骤，筛选出具有高盈利潜力的公开发售机会。\n   - **项目摘要** – 审阅项目摘要，确认是否有清晰的产品描述、价值主张、具体技术细节，以及是否存在模糊描述、团队匿名、缺乏合规性等潜在警示信号。\n\
  \   - **软顶与硬顶** – 检查软顶和硬顶的详细信息，以判断融资目标是否切合实际，是否与项目路线图中的工作范围一致。此外，还需确定是否存在硬顶上限及其是否已达成。\n\
  \   - **代币标准** – 确认项目所采用的代币标准类型。由于自身创建带有原生代币的区块链项目涉及的工作量较大，这类项目诈骗的可能性相对较低。\n   -\
  \ **代币单价** – 结合代币经济学（包括总供应量、市值和释放计划）评估代币单价，以判断其实际盈利潜力。\n   - **项目白皮书** – 确定项目是否拥有白皮书，及其质量是否优良。\n\
  \   - **风险承受能力** – 评估您的风险承受能力，除非您能够接受本金可能损失的风险，否则切勿投资。\n\n4. **全面基础评估**\n   对通过公开发售简化筛选流程的项目进行完整的基础评估。\n\
  \n5. **以您自己的方式记录并整理发现**\n\n6. **将发现与其他基础评估环节相结合**\n\n#### 结果评估\n\n投资公开发售项目风险极高。在早期阶段，团队尚未证明其能力或整体潜力。在许多情况下，甚至没有经过验证的产品概念或可供测试的测试版。因此，投资者本质上是在押注团队能够兑现其承诺。由于五成的新项目在第一年后便会失败，因此在参与公开发售前，建议极度谨慎并进行充分的研究。投资者在参与公开发售前，应根据自身的知识、经验和财务状况仔细评估其风险承受能力。此外，当您预先选定了一个公开发售投资项目后，强烈建议按照本书所述进行完整的、深入的基础评估。\n\
  \n## 合作伙伴关系\n\n**评估目标：确定并评估项目的公开发售融资模式是否构成潜在的投资机会。**\n\n合作伙伴关系是指两方或多方为共同实现惠及各方的目标而达成的合作协议。合作伙伴关系通常形成于利益存在一定程度重叠的公司或个人之间，从而有助于改善彼此的表现、共享资源并为所有相关方创造可衡量的价值。然而，在区块链领域，某些合作伙伴关系往往更注重表面光鲜而非实质内容。\n\
  \n例如，有些合作伙伴关系能带来实际价值——如改进产品、扩展生态系统或解决实际问题——而另一些则只是作秀，目的是吸引投资者的关注。此外，许多公司仅因从另一家公司获得了服务，就宣称建立了“合作伙伴关系”——这并非真正的合作。作为投资者，辨别哪些合作伙伴关系是真实且能提供实际价值的，哪些并非如此，至关重要。\n\
  \n区块链世界中的合作伙伴关系有多种类型，涵盖加密对加密、基于区块链的中心化对中心化，以及加密对中心化的合作。本节将讨论各种类型的合作伙伴关系，以及那些真正能提供价值的合作。\n\
  \n### 加密对加密（C2C）商业伙伴关系\n\n加密对加密（C2C）伙伴关系是指在区块链领域内，两个加密项目之间直接建立的合作关系。这类合作关系通过实现平台集成、共享基础设施、增强流动性和扩展生态系统，从而提升加密产品与服务的价值。合法的\
  \ C2C 伙伴关系还能通过将项目介绍给彼此的社区来促进双方发展，这意味著更多的用户、开发者以及整体机遇。\n\n**温馨提示**\n\n为了提升知名度，项目方赞助各类活动已相当普遍。例如，`Crypto.com`\
  \ 赞助了 2022 年 FIFA 世界杯和终极格斗冠军赛（UFC）。尽管这完全可以接受，但请注意，这并非合作关系，而仅仅是赞助协议。虽然并非`Crypto.com`，但有些项目将赞助协议粉饰为合作伙伴关系，这是不准确且具有误导性的。\n\
  \nC2C 伙伴关系的一个例子是 [Immutable](https://www.immutable.com/) 与 [Polygon Labs](https://polygon.technology/)\
  \ 的合作。`Immutable` 是一家领先的 Web3 游戏公司，与主要 Layer 2（L2）区块链扩容平台 `Polygon Labs` 合作，共同推出了\
  \ `Immutable zkEVM`，这是一个专为游戏设计的、兼容以太坊的 L2 扩容解决方案。对于游戏社区来说，这堪称梦想成真，因为它通过提高可扩展性、速度和安全性，降低交易成本，增加新的游戏内功能，从整体上让游戏体验更流畅、更愉悦。\n\
  \n`Immutable` 与 `Polygon Labs` 的合作也使双方公司直接受益。例如，这次合作在游戏方面取得的进步吸引了更多的开发者和玩家加入 `Immutable`\
  \ 生态系统。同时，`Polygon` 巩固了其在游戏领域的声誉，获得了更高的曝光度和可信度，从而促进了 `Polygon` 的 zkEVM 技术的采用，并为新的合作打开了大门。\n\
  \n**专业提示**\n\n在评估和验证合作伙伴关系时，建议将所有声称的合作关系视为不存在或充其量是低质量的——“在证明清白之前，先视为有罪”。\n\n\n\n\
  ### 加密货币与实体经济（C2T）企业合作\n\n加密货币与实体经济（C2T）合作是指加密项目与专注区块链的传统企业之间的协作。C2T 合作旨在将区块链技术与传统业务相结合，从而为双方带来诸多益处。例如，加密项目与知名、成熟的传统企业合作，有助于提高其在区块链领域的采用率和可信度。传统企业通常通过提供各种集成方案、财务资源和行业专业知识来补充区块链公司的不足。另一方面，实施区块链解决方案可以提高运营效率，帮助简化流程、降低成本，并利用智能合约以去信任的方式实现流程自动化。将区块链与传统企业相结合，可以充分利用区块链的基本特性，从而全面推动创新和产品开发。\n\
  \n一个 C2T 合作的例子是 [Solana Pay](https://solanapay.com/) 与 [Shopify](https://www.shopify.com/)\
  \ 的协作。`Solana Pay` 是一个构建在 [Solana](https://solana.com/) 区块链上的部分去中心化支付协议，它与大型电商平台\
  \ `Shopify` 合作，允许商家接受以 `USDC`（一种与美元挂钩的稳定币）进行的支付。这为传统信用卡支付提供了一种无缝且经济高效的替代方案，商家和客户无需中介即可进行交易，成本更低。客户可以享受隐私保护，无需共享敏感的财务信息，并且通过加密支付集成，支付可以即时结算，无需担心汇率或额外费用。因此，这种类型的合作为\
  \ `Shopify` 等平台及其客户，以及为推动区块链的广泛普及和应用带来了巨大价值。\n\n**警告**\n\n为了获得知名度和可信度，加密项目可能会在其营销策略中包括被\
  \ `福布斯`、`彭博社` 或 `纽约时报` 等知名权威出版物报道的计划。尽管这些报道可能会吸引更广泛的受众和潜在投资者，但它们并非真实的新闻报道，更宜归类为付费推广。\n\
  \n### 传统对传统（T2T）企业合作\n\n传统对传统（T2T）合作是指两个专注加密领域的传统企业为了推进其共同的兴趣和目标而进行的合作。这类合作对于使区块链技术在现实世界中应用至关重要，因为它们有助于建立信任，并为加密领域之外的个人参与数字资产创造便捷的入口。\n\
  \n一个与加密相关的 T2T 合作例子是 [Paxos](https://paxos.com/) 与 [PayPal](https://www.paypal.com/us/home)\
  \ 的合作。`Paxos` 是一家受纽约金融服务部监管（获许可并接受其监督）的支付公司，为购买、出售和持有各种数字资产的 `PayPal` 用户提供底层的托管和流动性支持。此外，`PayPal`\
  \ 的数字美元 “`PayPal USD`” （[PYUSD](https://www.paypal.com/us/cshelp/article/what-is-paypal-usd-pyusd-HELP1005)）稳定币由美国国库逆回购协议支持，并“以美元存款、短期美国国债和类似的现金等价物作为支撑”。请注意，这种类型的合作提供了巨大价值，有助于无论市场状况如何，都能推动区块链技术和数字资产的普及。\n\
  \n**事实**\n\n最强大的合作是那些能够对产品或服务产生积极影响并增加显著价值的合作。任何其他的合作都可以被视为薄弱或不相关的合作。\n\n### 非合作关系的案例\n\
  \n识别骗局或低质量合作与识别高价值合作同样重要。欺诈项目通常会声称与信誉良好的公司有合作关系，以提升其可信度，即使实际上并不存在真正的关联，或者他们歪曲了对某公司服务的使用，将其说成是真正的合作。这些声明必须经过仔细审查，以验证其真实性。\n\
  \n因此，核实所呈现的合作类型以及合作双方是否在互相帮助至关重要。这些信息应始终从所涉各方的官方网站、新闻稿或其他可靠来源进行核实。在获得明确证据证明两家公司确实存在关联并正在利用各自的优势来增强产品和价值供给之前，投资者必须保持谨慎。务必通过官方渠道或声称的合作方的新闻稿来验证这些合作关系。对于无法提供其声称合作关系的明确证据的项目，应保持警惕。以下是一些与低质量合作相关的骗局的*虚构案例*。\n\
  \n1.  **Google Cloud 与 PlasmaPenguin 合作**\n\n    区块链项目 `Plasma Penguin` 与 `Google\
  \ Cloud` 合作，以集成并托管其部分许可区块链。这使得 `Plasma Penguin` 能够扩展其区块链，提供快速交易和低成本。\n\n    **这不是合法合作关系的原因**\n\
  \    1.  `Plasma Penguin` 只是像其他数千家公司一样，作为付费客户使用 `Google Cloud` 的服务。`Google Cloud`\
  \ 并非一个有助于共同利益或共享利益的战略合作伙伴。\n    2.  在线未找到 `Google Cloud` 发布的任何关于此类合作的官方声明。\n\n2.\
  \  **CactusSquid 与 PortGlobal 合作**\n\n    区块链项目 `CactusSquid` 宣布与供应链运营领域的知名全球领导者\
  \ `PortGlobal` 建立战略合作伙伴关系，通过创建一个安全透明的分类账来跟踪货物，减少欺诈，并在此过程中全面提高供应链效率。\n\n    **这不是合法合作关系的原因**\n\
  \    1.  经过仔细调查发现，`PortGlobal` 仅运行了一个小型试点项目来测试 `CactusSquid` 的区块链在其供应链管理系统中的应用——并未做出长期承诺。\n\
  \    2.  甚至没有证据表明 `PortGlobal` 已在其供应链系统中实施该区块链。因此，该公告完全是基于推测的结果，而非实际采取的行动。\n   \
  \ 3.  `PortGlobal` 未向 `CactusSquid` 投入任何资金或共享任何其他资源。`PortGlobal` 仅仅像其他客户一样，同意试用其服务和产品。因此，这不符合真正合作关系的条件。\n\
  \n3.  **Amazon Web Services (AWS) 与 FusionFerret 合作**\n\n    区块链项目 `FusionFerret`\
  \ 与 `AWS` 合作，通过 `AWS Marketplace` 提供各种区块链解决方案。这使得所有 `AWS` 用户都能接触到这些解决方案，以满足其业务和个人需求的独特应用。\n\
  \n    **这不是合法合作关系的原因**\n    1.  `AWS Marketplace` 对任何希望销售其软件产品的企业、实体或个人都是开放的。`FusionFerret`\
  \ 只是另一个在 `AWS` 平台上销售其产品的供应商——并无特殊之处。\n    2.  `AWS` 并未与 `FusionFerret` 协作，共同开发新的创新产品或为实现共同利益而共享资源。\n\
  \    3.  `FusionFerret` 只是像其他数千家公司一样，使用 `AWS` 的工具。\n    4.  在线未找到 `AWS` 发布的任何关于此类合作的官方声明。\n\
  \n**警告**\n\n虚假或误导性的合作关系表明项目团队缺乏透明度和诚信度，这构成了严重的警示信号。\n\n\n\n### 行动步骤\n\n遵循以下步骤和注意事项，有助于评估合作关系是否合法，且对双方公司真正有益。\n\
  \n1.  **识别合作方**\n\n    列出项目声称的合作方名单，这些信息通常可以在其官网上找到。请谨慎行事，假设所有声称的合作关系要么不存在，要么被夸大其词。\n\
  \n2.  **查证官方公告**\n\n    合作各方的官方公告至关重要。\n\n    1.  搜索相关公司发布的官方新闻稿或合作确认函。重要的是，合作双方都应通过官方渠道发布正式公告，详细说明合作的类型、价值利益和收益。\n\
  \n    2.  核实多个可信来源的信息是否一致，并确认合作细节。\n\n3.  **确定合作类型**\n\n    确定所涉合作关系的类型，并判断其是否为双方带来价值。\n\
  \n    1.  **加密-加密合作** – 寻找互惠互利点，例如共享基础设施、技术、专业网络及其他相关资源。\n\n    2.  **加密-传统合作**\
  \ – 验证区块链如何改进传统业务运营，或增加其曝光度和采用率。\n\n    3.  **传统-传统合作** – 确保该合作能在加密领域产生显著的区块链采用率和可用性。\n\
  \n4.  **检查交付成果与资源共享**\n\n    必须明确合作项目的交付成果。\n\n    1.  确定因合作而产生的、可衡量的共同利益或增值成果。这可能是一个创新的产品，或能够补充现有用户或生态系统的特定增值点。\n\
  \n    2.  检查共享资源，例如网络集成、技术基础设施（如预言机、API 和第 2 层扩展解决方案）、技术、生态系统工具、用户基础、流动性、金融资本、人力资本与专业知识等。\n\
  \n5.  **价值与收益**\n\n    确定该合作关系是否让每个合作方都受益并创造价值。\n\n    1.  例如，像 [Graph](https://thegraph.com/)\
  \ 和 [Fantom Network](https://fantom.foundation/) 这样的“加密-加密”合作，促进了跨链互操作性。这项合作通过使\
  \ *The Graph* 能够支持跨多条区块链查询数据，同时让 Fantom 开发者能够使用这些工具构建应用程序并与以太坊进行跨链兑换，从而增加了显著价值。\n\
  \n6.  **调查合作方的可信度**\n\n    研究相关合作方的过往记录，以判断其是否合法且信誉良好。合法的合作关系会公开其条款和收益。如果细节含糊不清或过度炒作，请深入调查或保持距离。\n\
  \n7.  **做笔记并以你自己的风格记录发现**\n\n8.  **将发现结果与基础评估流程的其他部分相结合**\n\n#### 结果评估\n\n如果评估的合作关系是合法的——双方均已确认，存在明确的共同价值，且有清晰的交付成果——则视为绿灯。反之，如果对双方均无实际价值，网上缺乏相关证据，或交付成果含糊不清，则建议在进行更深入的研究之前，暂时避免投资。如果项目方试图欺骗投资者，让他们相信已经获得了合法的合作，那么真正的问题是：他们还在哪些事情上撒了谎？请将此视为一个危险信号。投资者有责任确定项目团队声称的所有合作关系都是强有力的、有效的且可信的。\n\
  \n"
- '# 快速词汇表


  本快速词汇表收录了与加密领域内区块链或基于 dApp 的项目基本面分析相关的术语。这些术语在全书各处均有使用；因此，请将以下页面加入书签，以便快速查阅。


  ### 51% 攻击


  *   在基于工作量证明（PoW）的区块链语境中，**51% 攻击**指的是某个实体或团体控制了网络超过 50% 的算力（也称为哈希率）的情况。


  ### 架构层


  *   区块链架构是分层构建的——即代码或协议设计的不同层级——每一层都旨在处理特定的角色。第 0 层、第 1 层、第 2 层和第 3 层协同工作，以提高网络的安全性、速度、效率、互操作性以及跨区块链和去中心化应用（`dApps`）的整体用户体验。


  ### 增值机制


  *   **代币增值机制**是内置于代币设计中的特定策略，旨在随时间推移增加代币的价值。这些方法和技术包括质押分配、回购销毁、费用返还和治理奖励。


  ### bitcoin


  *   `bitcoin` 是第一个去中心化的数字货币和支付系统，运行在安全的点对点区块链上，无需中介即可实现无需信任的交易。


  ### 区块浏览器


  *   **区块链浏览器**（或 *block explorer*）是一种基于网络的工具，用于实时查看和追踪区块链上的交易数据，包括地址、代币、智能合约、源代码、钱包地址、价格及其他活动，以及通过历史（存档）记录查询。


  ### 区块链


  *   区块链是一种去中心化的、不可篡改的数字账本，负责记录跨计算机网络发生的交易，在没有中介的情况下确保透明度、安全性和信任。


  ### 区块链三难困境


  *   每个区块链都具备三个至关重要的特性：**去中心化**、**可扩展性**和**安全性**。*区块链三难困境*指的是在不牺牲其中一项的前提下，同时以最优水平实现这三者所面临的挑战。


  ### 流通供应量


  *   `Circulating Supply` 指的是目前在市场上可获取并活跃交易的总代币或硬币数量，不包括那些被锁定、预留或留待未来发行或开发的代币。


  ### 闭源


  *   “闭源”指的是其源代码为专有且不对外公开的软件，仅允许授权方进行修改或再分发。


  ### 代码库


  *   项目 *codebase* 是软件项目所有源代码文件的完整集合，包括构建、执行和维护应用程序所需的一切。


  ### 币


  *   加密货币（也称为“币”或“coin”）是一种原生的 **协议代币**，由其运行的区块链协议直接发行，这就是它常被称为区块链本地货币的原因。


  ### 共识


  *   共识是区块链网络参与者就区块内交易的有效性以及账本状态达成一致的过程，确保在没有中央权威的情况下实现准确性和信任。


  ### 共识机制


  *   共识机制是一种协议，确保区块链网络中的所有参与者就交易的有效性和账本状态达成一致。


  ### 密码学


  *   区块链中的**密码学**通过使用哈希和数字签名等数学技术，确保数据安全、保护用户身份，并保障交易不可篡改。


  ### 加密货币


  *   **加密货币**（也称为 crypto 或 coin）是一种由密码学保障安全的数字资产，运行在去中心化的区块链技术上，其主要目的是通过激励验证者或矿工维护共识并抵御攻击来保障网络安全。它也用作交易媒介和点对点支付。


  ### 跨链互操作性




