- '# 众贷


  **示例：** [Polkadot 网络](https://www.polkadot.network/) 和 [Kusama 网络](https://kusama.network/)


  加密货币众贷是一种区块链项目筹集资金并获得社区支持的新方法。与 ICO、IEO 和 IDO 等传统筹资活动（新的初创公司基本上向投资者出售代币）不同，在众贷中，项目向更广泛的社区借入代币（或币），然后利用筹集的资金为项目增加价值。作为回报，出借代币的社区成员会获得项目原生代币或其他激励作为奖励——可以将这些奖励视为普通贷款的利息。项目概述的预定条款和条件将规定此类标准，例如众贷的开始和结束日期、参与方式、奖励结构，以及借款人何时将最初出资返还给他们。


  利用众贷筹资机制的知名项目示例有 [Moonbeam 网络](https://moonbeam.network/) 和 [Moonriver 网络](https://moonbeam.network/networks/moonriver/)。这两个网络都从更大的社区借入资金（DOT、KSM），并将筹集到的资金分别用于竞拍并赢得
  [Polkadot 网络](https://www.polkadot.network/) 和 [Kusama 网络](https://kusama.network/)
  上的 [平行链](https://wiki.polkadot.network/docs/learn-parachains) 插槽。筹集到的资金还用于支付每条平行链约两年的租约费用。他们通过在整个平行链租约期内锁定筹集到的代币来实现这一点。因此，筹集到的代币在整个平行链租期内被锁定在众贷模块中，项目方无法动用或转移；在租期结束时，所有出资参与者的出资将被返还。此外，所有贡献者都会获得线性分配的奖励（GLMR
  和 MOVR），作为对其努力的认可。


  Polkadot 数字拍卖过程的核心优势之一是其独特的“蜡烛拍卖”流程。传统的开放式数字拍卖容易发生“拍卖狙击”，即竞标者等到最后一分钟试图“狙击”出价。然而，通过
  Polkadot 的“蜡烛拍卖”流程，可验证随机函数（VRF）决定了在拍卖期最后七天内的实际结束时间。这鼓励竞标者尽早真诚出价，使过程更加公平且不易被操纵。




  ### DAICO 融资


  **示例：** Aragon 和 [MolochDAO](https://molochdao.com/)


  2018 年，以太坊创始人 Vitalik Buterin 提出了一种去中心化自治首次代币发行（`DAICO`）。`DAICO` 是一种募资模式，旨在通过将 ICO
  的收益锁定在去中心化自治组织（`DAO`）的智能合约中，来增强投资者对 ICO 的信任。投资者被赋予投票权，这使得贡献者能够在关键里程碑未达成时，投票调整或停止“水龙头”（一种每秒滴流的资金机制），而不是审批每一笔具体支出。


  `DAICO` 是对 ICO 和 `DAO` 最佳理念与概念的一次独特融合，旨在保护投资者的资金免受诈骗和项目业绩不佳的影响。与 ICO 类似，`DAICO`
  首先发起一次募资活动，投资者贡献（例如 `ETH`、`USDT`）以换取项目的原生代币。然而，与 ICO 不同的是，`DAICO` 拥有一个“水龙头”机制。该“水龙头”的唯一目的是允许
  `DAO` 以秒为单位控制项目团队可获得的资金金额（资金分配）。因此，团队在任何特定时间点可用的资金量都受到限制。


  资金通过 `DAICO` 筹集；其中一部分将预留给团队、开发、市场营销、国库、奖励、流动性等用途。例如，如果向开发者分期付款（例如每月一次），而开发者需要的资金超过了“水龙头”当前的出水量，他们必须请求代币持有者投票提高“水龙头”的速率；治理机制不能批准一次性的大额支付——只能调整（或停止）这种持续的资金流。`DAO`
  有机会限制资金的访问权限，这有助于降低团队操纵代币和资金的风险。这种协同模式使得资金募集和分配尽可能透明和安全。此外，它赋予了代币持有者权力和控制权，从而保护了他们的投资。


  在 `DAO` 的治理结构中，股东可以对特定的代币相关决议进行投票，包括提高“水龙头”（增加流向团队的资金量）或永久自毁合约，届时代币持有者将按比例提取剩余资金。这旨在防止团队操纵代币和资金，督促其对高质量的工作和项目进展负责，并信守其在白皮书和路线图中做出的承诺与定义的里程碑。


  `DAICO` 的融资和治理模型在很大程度上仍处于理论阶段——仅有少数几个项目尝试过，目前尚无大规模的、长期运行的实例。然而，人们期望它能使得 ICO 资金的治理更加民主化，并为投资者提供一定程度的防欺诈保护。


