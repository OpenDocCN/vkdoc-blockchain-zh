  \ 名员工，913 位成员。成立于 2014 年。专业领域包括智能合约和区块链。](img/648696_1_En_4_Fig10_HTML.jpg)\n\n\
  图 4-10：以太坊创始年份——2014（数据来源：https://www.linkedin.com/company/ethereum/about/）\n\n\
  **事实：** 鉴于大量区块链项目在启动一年内就宣告失败，与那些仅有几个月工作基础的团队相比，拥有多年核心产品开发经验的团队所呈现的投资风险要低得多。\n\n\
  检查项目创始年份的另一个好方法是查看他们在 X 平台（原 Twitter）上建立账号的年份。在所有可用的社交平台中，X 是加密货币领域最受欢迎的平台之一，几乎所有项目都有其存在，并用作与社区互动的主要来源。当在\
  \ X 上设置账号时，它会锁定项目加入该平台的日期。虽然加入日期本身无法编辑，但账号有时可能被购买和更名——这是一种不常见但真实存在的可能性——因此请将该日期视为支持性证据而非确凿证明。图\
  \ 4-11 展示了 Moonbeam 网络，它于 **2020 年 1 月**加入 X。\n\n![“Moonbeam Network”的 X 平台（原 Twitter）个人资料截图，显示\
  \ 7,559 条帖子和 32.17 万关注者。标题图片采用风格化的景观设计，有一棵粉色树、一轮满月和文字“推动集成 WEB3”。个人资料描述提到为去中心化应用的构建者和用户推动集成的\
  \ web3，并由 Polkadot 提供安全保障。该账号于 2020 年 1 月加入。包含指向 Polkadot 和 moonbeam.network 的链接。](img/648696_1_En_4_Fig11_HTML.jpg)\n\
  \n图 4-11：Moonbeam 网络，加入日期（数据来源：https://x.com/MoonbeamNetwork）\n\n\n\n### 行动步骤\n\n\
  请按照以下步骤确定项目的创立年份，以评估其可信度，确保其技术保持最新，并核实团队声明的真实性。\n\n1.  **验证域名注册年份**\n\n    按照以下步骤确定项目域名的注册年份。\n\
  \    1.  访问项目官方网站，并复制其网址。\n    2.  访问名为 Duplichecker 的网站，网址为 `https://www.duplichecker.com/domain-age-checker.php`。\n\
  \    3.  将项目域名粘贴到“域名年龄查询”框中，然后选择“查询域名年龄”。这将会提供域名的注册年份。\n\n2.  **验证 X（原 Twitter）加入年份**\n\
  \n    按照以下步骤确定项目在 X 上建立公司资料的年份。\n    1.  访问项目官方网站。\n    2.  找到 X 的社交媒体图标。\n    3.\
  \  在 X 平台上，项目横幅下方会显示该项目加入该平台的年份。\n\n3.  **验证 LinkedIn 加入年份**\n\n    按照以下步骤确定项目在\
  \ LinkedIn 上建立公司资料的年份。\n    1.  访问项目官方网站。\n    2.  找到项目 LinkedIn 公司资料的超链接。\n   \
  \ 3.  导航至“关于”部分。\n    4.  创立年份将显示在“关于”部分的底部。\n\n#### 结果评估\n\n在大多数情况下，结果应显示域名和社交媒体资料的创建时间大致相同——除非域名是从他人处购得，这种情况可能性较低。尽管如此，这些信息应用来帮助核实团队关于其从事该产品开发时长的可信度。\n\
  \n例如，如果团队声称其主要产品将在两个月后发布，代币已在交易所交易，但其域名注册和社交平台加入日期仅为几周或几个月前，则需要更深入的调查——这会引起关注并可能成为危险信号。另一方面，如果项目创立于七年前，则必须对技术、产品和市场需求进行更深入的评估，以确保他们已更新了技术、产品体系及整体系统，从而保持竞争力。\n\
  \n"
- "# 5. 最终用户体验\n\n最终用户体验（`UX`）是直接影响用户采用率、项目长期成功以及在加密领域增长的关键因素。它涵盖了用户在与去中心化应用（`dApps`）、钱包、交易所、文档及其他相关方面交互时的完整旅程和满意度。包括交易速度、Gas\
  \ 费用、客服效率及地理访问限制等因素也会影响最终用户体验。投入足够时间和资源来提供无缝、直观且安全的 `UX` 的项目，能够确保用户无论其技术水平如何，都能轻松导航其用户界面。这还包括为所有用户提供清晰简洁的入门指导，以消除他们在以任何形式或程度与产品交互时可能产生的困惑，从而提高用户采用率。\n\
  \n本节将评估最终产品在各方面交互中的最终用户体验。流畅、直观且高效的最终用户体验至关重要，因为它直接影响用户留存率。高用户留存率表明在特定时期内，有相当比例的用户持续使用某项产品或服务；而低用户留存率则表明许多用户在开始使用后不久便停止了使用。不断扩大的用户基础通常与项目的增长和感知价值相关，并可能影响代币价格，但这种关系并非必然，因此最好将其与协议收入、代币供应变化和开发者活动等基本面进行交叉验证。\n\
  \n最终用户体验对投资者至关重要。一款设计精良、易于使用、界面直观且提供快速高效客服的无缝产品，能够直接提升用户采用率和留存率——这些是衡量项目增长和盈利潜力的关键指标。能够吸引并维持广泛用户基础的项目对投资者极具吸引力，因为它们代表了可持续的商业模式和市场需求。积极的最终用户体验可以提高加密项目的声誉和可信度，同时降低投资者风险。此外，一个精美、专业的\
  \ `UI` 通常比一个粗糙的 `MVP` 界面更能传递合法性的正面信号，并且通常表明团队致力于为最终用户提供最高质量的用户体验；然而，仅凭 `UI` 质量并不能下定论——一些可信的早期项目仍然采用最简设计，因此保持警惕很重要。这些关键因素，加上完美的最终用户体验，还能带来更高的用户参与度，从而有助于提升价值和投资回报。\n\
  \n以下章节将探讨最终用户与产品、团队互动的各个方面，以及其他增强或限制最终用户体验和互动的因素。\n\n**本章讨论的基本要素：**\n\n*   产品应用\
  \ UI/UX\n*   dApp 可用性和功能性评估\n*   交易速度和成本\n*   最终用户客户支持与沟通\n*   数字资产交易所\n\n## 产品应用\
  \ UI/UX\n\n**评估目标：评估项目网站、`dApp` 或其他界面是否提供了高质量的 UI/UX。**\n\n用户界面（`UI`）和用户体验（`UX`）是产品开发中两个至关重要的方面，涵盖了区块链领域的应用、界面、项目网站等多种产品类型。尽管这些术语经常互换使用，但它们是非常不同的概念。\n\
  \n`UI` 指的是网页或 `dApp` 的外观、感觉和交互性。它考虑的是按钮、图标、下拉菜单等交互元素。配色方案、字体选择和排版也被考虑在内，以帮助将所有元素融合在一起。人们常说\
  \ `UI` 在用户和产品之间建立了情感联系。另一方面，`UX` 指的是用户在与产品、服务、系统或应用交互时的整体体验。设计师负责确保产品界面的设计、交互内容和布局对用户而言是愉悦的、易于导航的、直观的，并且易于使用。设计师的另一项职责是了解最终用户将执行哪些活动，以优化相应的客户交互流程、消除摩擦点，并最大限度地减少完成这些任务所需的步骤。此外，良好的\
  \ `UX` 能够突出产品的价值，向客户阐明其能力和优势。\n\n\n\n### 区块链的用户界面与用户体验\n\n大多数加密项目都会提供*某种*面向用户的界面——无论是其自有的`dApp`、命令行工具，还是集成在第三方钱包中——让用户能够与产品进行交互。通常，面向用户的前端是托管在传统服务器上的网页或移动应用程序，而它则与区块链上的去中心化智能合约进行交互。每个项目都会针对其提供的特定产品或服务来创建和定制自己的`dApp`。每个`dApp`的界面也因项目类型或所提供的服务而千差万别。\n\
  \n图 5-1 展示了 Moonbeam Networks——一个用于构建跨链互连应用的智能合约平台——的`dApp`界面。Moonbeam 的`dApp`允许用户连接他们的去中心化钱包，并参与诸如质押、治理公投、资产管理、跨链转账以及各种其他相关活动等操作。\n\
  \n**表 5-1** 中心化交易所与去中心化交易所对比\n\n| 中心化与去中心化数字资产交易所对比 |\n| --- |\n| | 中心化交易所 (CEX)\
  \ | 去中心化交易所 (DEX) |\n| --- | --- | --- |\n| **用户界面** | 用户友好的界面和交易工具。 | 可用性通过更直观的设计正在改善，但总体上仍比\
  \ CEX 更复杂。 |\n| **用户体验** | 全面的客户支持和用户友好的界面。 | 客户支持有限或没有；用户必须独立处理问题。 |\n| **流动性**\
  \ | 由于用户基数大，流动性水平高。 | 通过流动性池和聚合器等创新手段增加流动性。 |\n| **交易对与法币支持** | 广泛的交易对，包括法币。 | 交易对和法币支持有限，但通过法币出入金通道和跨链协议正在改善。\
  \ |\n| **多链资产访问** | 资产可在多个区块链间轻松相互交易。 | 通过桥接和可互操作的区块链在多链交易方面取得了快速进展——但请注意，许多桥接是半中心化的，并且已成为频繁被攻击的目标。\
  \ |\n| **功能** | 高级交易工具和图表功能。 | 用户功能有限，但限价单和分析等高级工具的使用率正在增长。 |\n| **安全性** | 增强的安全措施，但由于中心化存在单点故障风险。\
  \ | 由于去中心化，降低了被黑客攻击和入侵的风险。 |\n| **监管合规性** | 通过 KYC 和 AML 流程遵守监管要求。 | 增强隐私性和抗审查能力。\
  \ |\n| **资产控制** | 托管式——用户无法完全控制其数字资产。 | 非托管式——用户保留对私钥和资产的控制权。 |\n| **隐私与匿名性** |\
  \ 要求披露个人信息。 | 允许更匿名的交易，尽管一些 DEX 正在集成合规工具。 |\n| **性能与可扩展性** | 快速交易和高整体速度（交易通过中心化服务器处理）。\
  \ | 由于区块链可扩展性问题，交易速度较慢，但 Layer 2 解决方案提高了速度。 |\n| **交易费用** | 费用结构对高交易量交易者可能很有吸引力，尽管一些\
  \ Layer-2 或优化链的 DEX 现在可以匹配甚至低于 CEX 的定价。 | 在拥堵的区块链上费用较高；在优化链或 Layer 2 上费用降低。 |\n\
  | **中心化风险** | 易受黑客攻击、安全漏洞和监管行动的影响。 | 由于去中心化，对这些风险有更强的抵抗力。 |\n| **透明度** | 缺乏完全的透明度，用户有时只有在成功转账或提现后才能收到交易哈希。\
  \ | 由于区块链技术，透明度更高。 |\n| **示例** | Binance、Coinbase、Gemini、Kraken、KuCoin。 | Uniswap、SushiSwap、PancakeSwap、Curve、1\
  \ inch、Balancer。 |\n\n![Moonbeam 质押仪表盘的截图。界面左侧有一个导航菜单，包含“首页”、“质押”和“治理”等选项。主区域显示质押信息，包括余额明细，分为“自由”、“已预留”和“已锁定”等类别。一个图表显示了最新的随时间变化的质押奖励。还有用于选择收集人、输入质押金额以及设置奖励自动复投的区域。底部有一条警告提示，建议用户在质押前进行尽职调查。](img/648696_1_En_5_Fig1_HTML.jpg)\n\
  \n**图 5-1** Moonbeam Networks `dApp` 界面（图片提供：[`apps.moonbeam.network/moonbeam/staking`](https://apps.moonbeam.network/moonbeam/staking)）\n\
  \nMoonbeam 的`dApp`界面设计简洁现代，并且提供了一个视觉上吸引人的可选深色主题。`dApp`中对比色的巧妙运用使主要功能得以凸显。其框架和整体布局极其简洁、一目了然，并且设计上易于访问——用户从左侧菜单选择选项，选择结果会显示在中央屏幕界面上。此外，`dApp`在所有屏幕尺寸和设备上都具有响应式设计，提升了无缝的用户体验。\n\
  \nMoonbeam 的用户体验设计通过融入直观的一键式选项和清晰的标签，并分类组织每个选项以便于导航，极大地减少了终端用户的操作摩擦。在其主要的“质押概览”仪表盘上，用户的质押详情是核心焦点，提供了质押风险、余额、状态、已获奖励以及验证人表现的综合概览。另一个吸引人的特点是诸如滑块之类的交互式元素，使用户能够控制要复投的质押奖励百分比。用户还可以在给定时间段内实时查看其质押奖励。此外，在使用`dApp`时，加载时间始终很快，提升了客户体验和满意度。\n\
  \n### 项目官网\n\n用户界面与用户体验同样适用于项目官网。通常，项目官网是投资者获取项目信息的首要“去处”之一，其中包含白皮书、`dApp`、社交媒体渠道以及其他相关信息的链接。第一印象至关重要；因此，项目官网拥有出色的用户界面与用户体验设计至关重要。\n\
  \n### 面向投资者的用户界面与用户体验分析技巧\n\n投资者无需成为用户界面与用户体验专家，就可以判断项目`dApp`或官网是否拥有良好的用户体验。通过日常使用各种软件、应用程序和网站，大多数人在潜意识里就能很好地判断一个网站或`dApp`是看起来粗糙、廉价、难以使用且违反直觉，还是设计流畅、易于使用、一目了然且视觉上吸引人。不幸的是，对设计糟糕、低于平均水平的用户界面与用户体验的网站或`dApp`的第一印象，会延续到项目的其他各个方面，包括产品和团队的表现。相反，良好的用户界面与用户体验会给新客户和终端用户留下积极而持久的印象，从而增加用户基础并提升投资者的兴趣。因此，项目拥有一个外观现代且用户界面与用户体验良好的`dApp`和官网至关重要。\n\
  \n**警告**\n\n> 如果一家公司不愿意花钱打造一个展示其产品的专业网站，这不禁让人怀疑他们在其他方面是否也在偷工减料。此外，如果你个人在使用项目官网、`dApp`或钱包时感到困难，应将其视为潜在的危险信号，并通过查看不同经验水平用户的反馈来验证该问题。\n\
  \n\n\n### 行动步骤\n\n按照以下步骤评估项目网站、dApp 或其他界面是否提供高质量的 UI/UX。\n\n1.  **评估 dApp 的 UI/UX\
  \ 设计**\n\n    评估 MVP、测试版或最终成品的功能界面。\n    1.  访问项目官方网站，找到产品界面（通常是一个 dApp）。这可能是一个\
  \ MVP、测试版或最终产品。\n    2.  使用在 Moonbeam 网络示例中应用的相同方法来分析产品的 UI/UX。\n       1.  界面是否直观且易于导航？\n\
  \       2.  设计中的颜色和字体流是否在视觉上保持一致且具有专业感？\n       3.  是否有丰富的功能来增强可用性，例如滑块、下拉菜单或按钮？\n\
  \       4.  当出现错误时，系统是否会提供清晰有用的反馈？是否有明确的错误提示或通知？\n       5.  产品在桌面端和移动设备上是否都能良好运行？\n\
  \       6.  加载速度是否足够快？\n\n2.  **评估项目网站的 UI/UX**\n\n    使用相同的 UI/UX 方法，分析项目官方网站的\
  \ UI/UX 质量。\n\n3.  **记录笔记，并用自己的风格记录分析结果**\n\n4.  **将分析结果与基本面评估流程的其他部分相结合**\n\n####\
  \ 结果评估\n\n如果项目网站、dApp 或任何其他界面的 UI/UX 很差，这不是一个好兆头。较差的 UI/UX 可能是由于资金不足、团队经验不足、管理不善或质量控制不佳造成的。无论原因如何，都将\
  \ UI/UX 不佳的项目视为一个早期预警信号，表明在考虑任何投资之前需要进行额外研究和谨慎监控。\n\n## dApp 可用性与功能性评估\n\n**评估目标：**\
  \ 评估 dApp 的可用性和功能性，以确定其是否可靠且用户友好。\n\n去中心化应用（dApp）的可用性和功能性对于任何项目的成功和普及都至关重要。假设一个\
  \ dApp 设计糟糕、漏洞百出且不可靠。那么，如果使用具有货币价值的数字资产进行交互，它就有可能赶走用户并导致财务损失——严重损害公司声誉。因此，在投资前测试\
  \ dApp 的功能性，看它是否能按承诺工作，始终是个好主意——尤其当这是一个有前景但迄今用户实际测试有限的新创项目时。\n\n在试用 dApp 的可用性和功能性时，如果项目仍处于产品测试阶段，务必使用测试网代币；否则，请使用具有货币价值但金额尽可能小的代币进行测试，以帮助将损失降到最低。这使投资者能够检查应用的表现如何、响应速度如何以及使用起来有多容易。流畅且用户友好的体验是一个好迹象，表明项目扎实且有真正价值，而故障或可用性问题则可能是潜在风险的危险信号。请记住，如果你在使用\
  \ dApp 时遇到困难——并且不同经验水平的用户也报告了类似问题——请将其视为危险信号（除非该 dApp 明显处于 MVP 或测试版阶段）。\n\n### 行动步骤\n\
  \n按照以下步骤评估 dApp 的可用性和功能性，以确定其是否可靠且用户友好。\n\n1.  **测试 dApp 的可用性和功能性**\n\n    探索 dApp\
  \ 的功能特性，试运行实际产品，并根据以下标准进行评估。\n    1.  是否遇到任何故障或意外错误？\n    2.  产品是否按预期工作？\n    3.\
  \  应用的响应速度和运行速度如何？是否有明显的延迟？\n    4.  是否有任何令人烦恼或导致不愉快体验的地方？\n\n2.  **记录笔记，并用自己的风格记录分析结果**\n\
  \n3.  **将分析结果与基本面评估流程的其他部分相结合**\n\n#### 结果评估\n\n如果 dApp 易于使用且运行流畅，这无疑是一个好迹象，表明项目走在正确的轨道上。但是，如果遇到故障、错误、延迟或缺陷，应将其视为危险信号，在项目团队解释并解决这些问题或疑虑之前不要进行投资。不过，如果结果不能令你满意，务必极度谨慎，不要投资。\n\
  \n## 交易速度与成本\n\n**评估目标：** 确定一个项目是否提供能满足其实际用例需求的快速交易和较低 Gas 费用。\n\n当汽车从 A 点移动到 B\
  \ 点时，两个主要指标是行程耗时和燃料成本。同样，区块链上的交易也通过两个关键指标来评估：交易速度可以指（1）首次被包含进区块的时间，或（2）在 N 次确认后达到最终性的时间——以太坊大约\
  \ 12 个区块，比特币大约 6 个区块——以及 Gas 费用，即在网络上执行交易所需的费用。交易速度和成本对用户体验至关重要。公司和网络参与者会避免使用费用高昂且交易缓慢的区块链，尤其是在他们可以选择其他交易处理速度快且\
  \ Gas 费用低的区块链的情况下。\n\n本节将讨论交易速度和成本，以及这类因素为何如此关键的原因，因为它们直接影响最终用户、企业和投资者的体验。\n\n###\
  \ 交易速度\n\n交易速度在区块链设计和终端用户体验中至关重要，原因如下。\n\n-   **dApp 的实时交易速度** – 许多 dApp 需要近乎即时的交易，例如去中心化金融（DeFi）、交易、游戏和物联网。缓慢的交易速度会限制在区块链上构建的应用类型。此外，交易时间慢和\
  \ Gas 费用波动常导致去中心化交易所（DEX）上的交易失败。\n-   **业务运营** – 大多数使用区块链的企业在日常运营中需要快速交易处理。例如，供应链管理和工资支付系统依赖及时的金融交易来支持核心运营和客户需求。\n\
  -   **用户体验** – 缓慢的交易速度可能导致不良的用户体验和挫败感，从而可能阻止他们再次使用该网络。\n-   **竞争力** – 提供快速交易速度的区块链比速度慢的区块链更具吸引力，从而能吸引更多用户和开发者加入平台。\n\
  -   **用户留存** – 如果没有快速的交易速度，网络的用户留存率很可能会下降。\n\n需要注意的是，区块链网络所需的交易速度取决于其特定的用例。例如，采用工作量证明（PoW）共识机制的比特币，主要被设计为结合在线数字货币支付的价值存储手段。由于比特币的主要目的是提供安全且去中心化的价值存储，超快的交易速度并非关键。然而，其他用例如\
  \ DeFi、去中心化交易所、游戏和类似应用则依赖快速、近乎即时的交易，以维持高效流畅的最终用户体验。这些应用通常利用更快的共识机制，如权益证明（PoS），来满足用户对性能的需求——更多关于共识机制的内容，请参见第\
  \ 6 章“区块链架构”中的“共识机制”部分。\n\n\n好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\
  \n### 交易“Gas”费用\n\n在区块链领域，“gas”是指支付给矿工或验证者的交易费用，用于补偿其在网络上处理和验证交易所需的计算能力。*Gas*费用使用进行该交易所在区块链的原生代币支付。例如，使用以太坊区块链时，费用以\
  \ `gwei`（gigawei）支付，它是 ETH 的极小单位——一 `gwei` 等于十亿分之一 ETH。\n\n与交易速度类似，所使用的共识机制是影响 Gas\
  \ 成本的主要变量。基于 PoW 的区块链——因其所需的大量计算能力——其交易费用高于基于 PoS 的区块链或类似技术，后者以低成本高效的方式验证交易。此外，Gas\
  \ 的费用会根据网络流量和拥堵情况而有所不同。网络流量的波动可能受到多种因素的影响，例如一天中的时段、重大事件、项目相关新闻、利率更新或知名人士的活动。\n\n\
  交易费用产生的收入在网络中承担着许多重要功能。它激励矿工通过验证和处理交易来保障网络安全。同时，它也使攻击者向系统发送垃圾信息以淹没系统的成本高昂，从而阻止网络滥用。此外，对于比特币而言，由于每次减半后区块奖励下降，交易费用日益成为补贴矿工收入的重要来源；其他具有持久或可变通胀率的网络，其长期安全性可能较少依赖交易费用。\n\
  \n### 低 Gas 成本的重要性\n\n-   **可访问性** – 低 Gas 成本使区块链对用户更具可访问性。\n-   **交易** – 低 Gas\
  \ 成本能够吸引各类去中心化交易所（DEX）的交易者。\n-   **可负担性** – 低 Gas 成本使用户参与区块链的负担更轻，这有助于提高用户采用率。\n\
  -   **鼓励开发** – 低 Gas 成本鼓励开发者在区块链上构建更复杂、更具创新性的应用程序，因为他们无需过分担心交易和智能合约执行的成本。\n-   **用户增长**\
  \ – 低交易成本鼓励更多（及更小额的）交易，这反过来又会吸引更多用户，放大网络效应并促进生态系统增长。\n\n> **事实**  \n> 共识机制是区块链网络采用的协议，用于就交易的有效性达成一致并防止双重支付，确保所有节点维护一份一致的账本副本。\n\
  \n### 如何查看交易速度和 Gas 费用\n\n通常可以通过在线搜索代币或通证的“Gas 追踪器”（Gas Tracker）网站来查找交易速度和 Gas 费用。例如，[Polygon](https://polygon.technology/)（MATIC）的交易速度和\
  \ Gas 费用如图 5-2 所示。通常，在链上发起交易时，用户可以选择支付更高的费用以获得更快的交易处理速度。在 Polygon 上，Gas 追踪器的层级（例如\
  \ `30 gwei` “快速”和 `31 gwei` “急速”）表明，在网络拥堵时，小幅增加费用*可以*加快确认速度，但当流量较低时，这种影响微乎其微。\n\n\
