- "# 区块链投资者端点安全\n\n区块链投资者端点安全是指旨在保护加密投资者在与区块链交互时的安全，并保护其数字资产免遭攻击者侵害的保护措施。攻击者通过拦截区块链本身来影响投资者，从而入侵并窃取该链的原生资产。攻击者也会利用投资者不良的安全措施和欺诈链接直接攻击投资者。\n\
  \n本节重点讨论如何保护投资者免受攻击者的侵害。文章讨论了访问区块链的设备、数字资产钱包、线上线下安全以及其他各类安全预防和保护措施。表 6-11 概述了这些针对区块链投资者的关键保护措施。\n\
  \n**表 6-11**  \n区块链投资者端点安全保护措施\n\n\n\n| 区块链投资者端点安全防护措施 |\n| --- |\n| **项目描述** |\
  \ **投资者操作** |\n| --- | --- |\n| 纸质登录信息笔记本 | 将数字资产钱包及加密货币交易所的登录名和密码记录在笔记本中，而非使用在线密码管理器，可增加一层安全保障。始终制作纸质备份，以防原始备份意外丢失或损毁。\
  \ |\n| 双因素认证（2FA） | 在手机、平板电脑或计算机上下载、安装并启用[谷歌身份验证器应用](https://play.google.com/store/apps/details%253Fid%253Dcom.google.android.apps.authenticator2%2526hl%253Den_GB%2526gl%253DUS)（或其他高评分的类似验证软件）。访问加密货币交易所或数字资产钱包时，使用双因素认证至关重要。\
  \ |\n| 密码 | 确保创建的密码冗长且安全，混合使用大量随机字母、数字和特殊字符。始终将密码保存在纸质笔记本中，并保留安全的离线备份。 |\n| 安全更新\
  \ | 确保所有设备均安装并更新了网络安全软件，以防止黑客攻击。设置每月一次闹钟提醒，扫描计算机是否存在潜在恶意软件。此外，建议考虑使用键盘加密软件。 |\n\
  | 登录信息 | 建议为每个新开设的加密货币交易所账户创建独立的专属电子邮箱地址。这样，即使某个账户被攻破，攻击者也难以访问所有资产账户。 |\n| 网址 |\
  \ 不幸的是，许多骗局和“仿冒”欺诈网站会使用与知名交易所完全相同的前端界面和相似的网址。这些攻击者的唯一目的就是诱骗人们输入登录信息，从而窃取其数字资产。请始终仔细核对网址，确保访问的是正确的网站。此外，将正确的网址添加为书签可作为额外的安全预防措施。\
  \ |\n| 私钥管理 | 安全存储私钥至关重要。存储私钥的方法有很多，包括纸钱包、硬件钱包、钢制种子胶囊、钢制种子钱包等。对于大多数投资者而言，存储方式的选择取决于您与加密货币资产的交互频率。但强烈建议将私钥及相关密码记录在记事本中并保留纸质副本。\
  \ |\n| 第三方钱包应用 | 不建议使用第三方钱包应用提供商来存储数字资产，除非该钱包应用背后的团队拥有无可挑剔且可信赖的声誉。 |\n| 手机安全 | 确保您的手机始终受信誉良好的网络安全软件保护，并设置密码保护。此外，如果设备丢失或被盗，应确保可以远程擦除手机数据。务必对您的手机号码保密。\
  \ |\n| 托管服务 | 托管服务涉及第三方（通常是交易所）持有用户的私钥。在此模式下，资产所有者需要信任托管服务提供商以保障其资产安全。如果认为必须使用托管服务，建议仅使用信誉良好且已投保以防攻击的托管服务。这些服务包括[Coinbase](https://www.coinbase.com/)\
  \ 和 [Gemini](https://www.gemini.com/eu) 交易所。 |\n| 非托管软件钱包 | 非托管服务让用户对自己的私钥拥有完全的控制权和责任。这提供了更高的安全性和隐私性，但全部责任和技术问题都落在了资产所有者身上。仅在绝对必要时才使用非托管软件钱包。虽然您完全掌控私钥，但如果设备被黑客攻击，您的资产仍面临风险。流行的非托管软件钱包包括\
  \ [Atomic Wallet](https://atomicwallet.io/)、[MetaMask](https://metamask.io/) 和 [Exodus](https://www.exodus.com/)\
  \ 钱包提供商。 |\n| 冷存储（硬件）钱包 | 冷存储钱包是一种物理离线数字资产存储钱包，不连接互联网。它提供非常高的安全性。务必确保从制造商正版链接或网站更新冷钱包的最新软件。此外，不要在连接到互联网的手机或计算机上存储任何冷存储访问代码。硬件钱包的例子有\
  \ [Trezor](https://trezor.io/) 和 [Ledger](https://www.ledger.com/)。 |\n| 虚拟专用网络（VPN）\
  \ | 使用 VPN 可以重定向您的网络流量以伪装您的 IP 地址，使得攻击者极难追踪您的确切位置。此外，VPN 会加密您通过互联网发送的信息，防止任何人拦截您的信息。这适用于所有网络交互，包括登录和登出加密货币交易所。VPN\
  \ 的例子包括 [NordVPN](https://nordvpn.com/)、[ProtonVPN](https://protonvpn.com/) 和 [Surfshark](https://surfshark.com/)。\
  \ |\n| 钓鱼链接 | 钓鱼链接是攻击者发送给投资者的欺诈性链接，目的是窃取投资者信息（包括登录名和密码），以窃取您的数字资产。这些链接通常通过电子邮件或社交媒体发送。应始终假定接收到的链接是欺诈性的。在未通过核对发件人邮箱地址确认链接来自可信来源之前，切勿点击。将鼠标悬停在链接上，查看并判断\
  \ URL 是否真实。如果您没有向某个服务商提出过特定请求，请立即忽略该电子邮件/链接。 |\n| 数字资产交易 | 在发起交易前，建议再次核对并确保输入的接收地址正确无误。如果交易使用了错误的接收地址，已发送的资金将永久丢失。作为安全预防措施，特别是对于加密货币新手，建议先发送少量金额以确认交易成功。\
  \ |\n| 遗产/身故处理 | 作为预防措施，建议您在生前写下关于如何访问您数字资产资金的说明文档，以防不测。该说明应包括所有密码、恢复种子、代码、短语、钱包名称、交易所名称、相关网址等。\
  \ |\n\n\n\n### 行动步骤\n\n投资者极难预判某一加密货币项目是否会遭受攻击或安全漏洞。攻击者通常会暴露加密货币项目中的缺陷和薄弱环节。但建议遵循以下预防和保护措施，以消除或显著降低重大财务损失的可能性，并确保更安全的投资体验。\n\
  \n*请注意，以下安全检查与预防措施排除了所有涉及项目\"代码\"或编程语言的安全威胁。由\"代码\"问题引发的威胁将在第**12**章\"项目代码库\"中讨论。*\n\
  \n1.  **51% 攻击**\n\n    从统计学角度看，加密货币项目遭受 51% 攻击的可能性不大。但以下提供两种保护投资者资产的措施。\n    1.\
  \  **低市值** – 低市值币种（例如，市值低于`$10m MC`的币种）面临 51% 攻击的风险最高；因此，投资此类币种时建议极度谨慎。通过限制对低市值、未成熟的加密资产的风险敞口来降低风险。\n\
  \n    2.  **PoW 共识机制** – 与其他类型的共识机制相比，基于 PoW 的项目更容易受到 51% 攻击。例如，采用`DPoS`共识机制（或类似变体）可降低\
  \ 51% 攻击的风险，因为代表或民选委员可以移除那些被怀疑策划 51% 攻击的恶意或共谋验证节点。投资前，务必研究并评估项目共识机制的利弊。\n\n2.  **分叉**\n\
  \n    如果出现\"分叉\"情况，请通过以下预防措施保护自己：\n    1.  仔细阅读并熟悉所有关于即将到来的分叉的文档。确保项目团队提供了关于分叉的信息，并且这些信息来自合法来源，例如公司官网上的项目官方博客。\n\
  \n    2.  不要偏离团队概述的、用于在分叉时保护投资者资产安全的分步程序。\n\n    3.  不要成为包含诈骗链接的欺诈性电子邮件的受害者。检查`URL`以确保其来自公司网站。如有疑问，请通过官方沟通渠道联系项目团队。\n\
  \n3.  **区块链投资者终端安全**\n\n    建议投资者遵循表 6-11 中列出的预防和保护措施，以促进与区块链的安全交互，并保护数字资产免受攻击者侵害。\n\
  \n4.  **做笔记并以自己的风格记录研究结果**\n\n5.  **将研究结果与基本面评估流程的其他部分结合起来**\n\n#### 结果评估\n\n正如所讨论的，预测加密货币项目是否会遭受未来攻击非常困难。然而，一旦投资者遵循了所概述的预防和保护措施，资产损失的可能性将显著降低。\n\
  \n## 公有链、私有链、联盟链和混合链\n\n***评估目标：确定项目是否运行在公有链上，以确保其提供透明度、不可篡改性和无需信任的特性，从而有助于相比其他区块链类型降低风险。***\n\
  \n区块链类型主要分为四大类：*公有链、私有链、联盟链和混合链*。每种区块链类型都有其特定用途以及相关的优缺点。没有绝对正确或错误的区块链类型，这完全取决于区块链的需求、功能和用例。然而，公有链因其高度去中心化、安全性、透明度、不可篡改性以及节点或私人实体之间无需信任的特点，在投资者中更受欢迎。表\
  \ 6-12 概述并比较了*公有链、私有链、联盟链和混合链*的核心区别。\n\n##### 表 6-12：公有链、私有链、联盟链和混合链的属性\n\n| 区块链分类\
  \ |\n| --- |\n| 属性 | 公有链 | 私有链 | 混合链 | 联盟链 |\n| --- | --- | --- | --- | --- |\n\
  | **共识的确定** | 所有矿工 | 单一组织 | 多种共识模型（由组织驱动） | 选定的、预先批准的节点 |\n| **读取权限** | 公开 | 公开或私有\
  \ | 公开或私有 | 公开或私有 |\n| **不可篡改性** | 接近完全不可篡改 | 可被篡改 | 部分不可篡改（取决于公有/私有规则）——可被篡改 |\
  \ 部分不可篡改（基于治理）——可被篡改 |\n| **效率** | 低（取决于扩展解决方案） | 高 | 高 | 高 |\n| **去中心化** | 是 |\
  \ 否 | 部分中心化 | 部分中心化 |\n| **共识过程** | 无需许可 | 需许可 | 需许可 | 需许可 |\n| **优势/好处** | 不可篡改、透明、无需信任、伪匿名、去中心化\
  \ | 隐私性、可扩展性、速度、访问控制、性能、治理控制 | 灵活性和可定制性、高安全性和可扩展性、增强的隐私性、增强的合规性 | 去中心化、访问控制、协作友好、可配置（通常可忽略）的交易成本\
  \ |\n| **劣势/问题** | 可扩展性差（通过 Layer 2 正在改善）、低`TPS`、高能耗（采用`PoW`时）、不适合存储敏感数据（无权限功能可用）\
  \ | 涉及信任、部分去中心化、缺乏透明度、受控治理、互操作性问题 | 透明度、成本、治理复杂性、互操作性问题 | 缺乏透明度、复杂性、部分去中心化、可维护性、基础设施成本、互操作性问题\
  \ |\n| **用例** | Web3 dApp 交互、加密货币/代币投资、文档验证 | 供应链——零售、医疗、金融服务、私人资产所有权 | 零售、供应链、银行、房地产\
  \ | 食品追踪、银行、支付、研究 |\n| **示例** | [比特币](https://bitcoin.org/en/)、[以太坊](https://ethereum.org/en/)\
  \ | [Hyperledger](https://www.hyperledger.org/)、[Quorum (kaleido.io)](https://www.kaleido.io/blockchain-platform/quorum)\
  \ | [XDC Network](https://xdc.org/) | [R3](https://r3.com/) |\n\n### 公有链\n\n*公有链*是一种开放、无需许可、透明且去中心化的区块链账本。它允许所有网络参与者检查和验证区块链上的交易，并参与共识过程。公有链网络中的每个参与者都可以贡献于控制机制，无需可信第三方即可就数据的单一状态达成一致。与私有链不同，公有链尽可能接近不可篡改，这意味着篡改区块链极其困难。每个用户都可以访问历史和当前记录，并且如果他们满足协议要求，可以运行挖矿（或验证）节点。公有链比私有链和联盟链具有更高的去中心化水平。公有链的示例有[比特币](https://bitcoin.org/en/)和[以太坊](https://ethereum.org/en/)。\n\
  \n\n\n### 公共区块链的优势\n\n- **去中心化** – 公共区块链是去中心化的，这意味着它们在没有中心化权威机构的情况下运行，为网络提供了更高的透明度和韧性。\n\
  - **透明度** – 公共区块链上的交易对所有参与者都是透明和开放的，这增加了信任并降低了欺诈风险。\n- **不可篡改性** – 公共区块链上的交易是不可篡改的，这意味着它们无法被更改或删除，因此具有很高的安全性。\n\
  - **激励机制** – 公共区块链使用加密货币等激励措施来鼓励参与者以非恶意的方式验证交易并维护网络。\n- **可访问性** – 公共区块链对任何人开放，无论其地理位置或财务状况如何，都能平等地访问网络。\n\
  \n### 公共区块链的劣势\n\n- **可扩展性** – 公共区块链可能会出现拥堵，因为其容量无法随用户数量线性增长；不过，第二层解决方案（如 Rollups、通道）正在逐步缓解这一限制。\n\
  - **隐私性** – 公共区块链是透明的，这意味着交易对所有参与者可见，这对于处理敏感信息的组织来说可能是一个劣势。\n- **监管挑战** – 一些公共区块链缺乏中心化权威机构和匿名特性，可能会带来监管方面的挑战。\n\
  \n总体而言，公共区块链在透明度、安全性和可访问性方面提供了显著优势，但也存在可扩展性、隐私性和监管挑战等局限性。在确定公共区块链是否适合特定用例时，应综合考虑这些因素。\n\
  \n![图解四种区块链网络类型：公共区块链、半私有区块链、私有区块链和联盟区块链。每个网络由相互连接的节点（以圆圈表示）构成，连接性和安全特性（以锁图标表示）各有不同。公共区块链具有开放连接，而私有区块链和联盟区块链则显示为受限访问，并带有更多安全元素。](img/648696_1_En_6_Fig16_HTML.jpg)\n\
  \n图 6-16：公共、私有、混合和联盟区块链架构结构（图片致谢：[`https://komodoplatform.com/en/academy/blockchain-technology-types/`](https://komodoplatform.com/en/academy/blockchain-technology-types/)）\n\
  \n## 私有区块链\n\n**私有**区块链是一种中心化的分布式账本，作为一个“满足组织隐私需求的封闭数据库”运行。在私有区块链中，节点对公众受限，只有获得组织权限许可的人才能运行完整节点、进行交易或验证/认证区块链的更改。参与者的身份和凭证必须经过身份验证、核实和授权，才能获得挖矿权限。此外，由于组织内部的各类严格政策，即使节点的所有凭证都符合要求，被拒绝访问的情况也并不罕见。一旦节点获得访问权限，所有者有权撤销访问权限，或覆盖、编辑、删除任何已执行并添加到账本中的交易数据。私有区块链通常比其他类型的区块链规模更小，由希望以高安全性和高速度执行智能合约的组织运营。\n\
  \n私有区块链是一种**需许可的**分布式账本，作为一个满足组织隐私需求的封闭数据库运行。在私有区块链中，节点对公众受限，只有获得组织许可的人才能运行完整节点、进行交易或验证/认证账本更改。参与者的身份和凭证必须经过身份验证、核实和授权，才能获得验证者权限；许多私有链完全摒弃了工作量证明挖矿，转而使用诸如`PBFT`或`Raft`等需许可的共识算法。此外，即使凭证齐全，严格的内部政策仍可能拒绝节点的访问。一旦节点获得访问权限，所有者可以撤销权限，或覆盖、编辑、删除已写入账本的交易数据。私有区块链通常比其他类型的区块链规模更小，由需要高速、高安全性智能合约执行的组织运营。私有区块链的一个例子是`Corda`。另一个例子是[Hyperledger\
  \ Fabric](https://www.lfdecentralizedtrust.org/projects/fabric)。\n\n> **事实**  \n\
  > 尽管私有、混合和联盟区块链可能有益于那些希望在保持私有性的同时利用区块链技术优势的组织，但它们不被认为是不可篡改的，这意味着区块链的交易历史可以被篡改和撤销。此外，它们引入了影响透明度的“信任”因素，这与区块链技术的核心优势相矛盾。\n\
  \n#### 私有区块链的优势\n\n- **隐私性** – 根据公司需求，私有区块链比公共区块链更具隐私性，因为它们只允许授权参与者访问和查看数据。\n- **可扩展性**\
  \ – 私有区块链每秒可处理的交易数（`TPS`）通常高于公共区块链，因此更快、更高效。\n- **治理控制** – 私有区块链使组织能够对网络的治理拥有更多控制权，允许它们制定自己的规则和标准，并在无外部干扰的情况下做出决策。\n\
  \n#### 私有区块链的劣势\n\n- **中心化** – 私有区块链比公共区块链更中心化，因为它们由单个组织或组织联盟拥有和运营。\n- **安全性** –\
  \ 私有区块链网络是中心化的，这增加了遭受攻击的风险。私有区块链的节点或成员较少，使其更容易受到安全威胁。\n- **透明度有限** – 私有区块链的透明度有限，因为它们只允许授权参与者访问和查看数据，这可能会限制信任并增加欺诈风险。\n\
  - **信任** – 由于私有区块链节点是中心化的，因此在系统中建立信任比较困难。\n- **互操作性** – 私有区块链可能难以与其他系统和区块链集成，这使得实现互操作性变得困难。\n\
  - **依赖性** – 私有区块链依赖于拥有和运营它们的组织或联盟所提供的基础设施和资源。\n\n\n\n### 混合区块链\n\n混合区块链（又称半私有区块链）融合了公有链和私有链的特点，通常兼具公有与私有属性，允许多个用户获得特定权限和能力。其核心理念在于取各类型区块链之长，同时尽可能规避其局限。例如，公有链以其透明性和不可篡改著称，但可能不适合处理敏感数据或保障隐私；而私有链虽能更好地控制数据隐私与访问权限，却缺乏公有链的透明性和安全性。\n\
  \n**事实：** 在混合区块链中，交易和记录通常不会公开；但如有需要，可以通过智能合约授予访问权限进行验证。\n\n在混合区块链中，公有链记录需要透明且公开可见的交易，而私有链则存储必须保密的敏感信息。这两条链通过通信层连接，实现两者间安全无缝的信息交换。混合区块链越来越受欢迎，因为它平衡了公有链和私有链的优势，适用于广泛的用例，包括零售和高度监管的市场（如银行业）。[XDC\
  \ Network](https://xdc.org/) 就是一个混合链：其公共账本锚定交易以实现透明度，而私有子网络则处理敏感数据——展示了单平台如何同时提供公有和许可功能。\n\
  \n![维恩图展示区块链类型。左圈为“无需许可”，标注为“公有”（无中央权威）。右圈为“需许可”，包含由单一权威控制的“私有”和由群体控制的“联盟”。重叠区域标注为“混合”，表示由单一权威控制且包含部分无需许可流程。每个区域均有代表其类型的图标。](img/648696_1_En_6_Fig17_HTML.jpg)\n\
  \n**图 6-17** 混合区块链（致谢：[`www.simplilearn.com`](http://www.simplilearn.com)）\n\n####\
  \ 混合区块链的优势\n\n- **灵活性** – 混合区块链可针对需要同时具备私有链和公有链功能及优势的特定用例进行定制。\n- **可扩展性** – 混合区块链部分中心化，允许根据需求扩展，从而支持高交易量和敏感数据存储。\n\
  - **隐私性** – 混合区块链通过使用私有链处理特定信息，可为敏感数据提供增强的隐私保护。\n- **合规性** – 混合区块链可设计为符合特定法规或行业标准。\n\
  \n#### 混合区块链的劣势\n\n- **透明度** – 混合区块链限制了对网络上特定信息的访问。\n- **复杂性** – 混合区块链的设计、开发和维护比单一区块链解决方案更复杂。\n\
  - **成本** – 由于需要额外的开发和维护，混合区块链解决方案可能成本更高。\n- **治理** – 混合区块链的治理结构可能更复杂，需要公有链和私有链之间进行谨慎协调。\n\
  - **互操作性** – 与不同区块链的交互和通信可能具有挑战性，从而限制了混合区块链解决方案的有效性。\n\n### 联盟区块链\n\n联盟区块链（也称联合区块链）介于公有和私有模型之间：它是需许可的，但由多个独立组织共同治理。然而，它与典型的混合链和私有链不同，因为它不归单一实体或个人所有。相反，它涉及多个组织成员在去中心化网络上协同工作。其在功能上的区别还在于，交易数据由多个成员组织提交，并仅由其预先批准的节点验证，而非开放给公众。它从区块链的公有或私有分支中选取节点来处理验证和共识过程。联盟区块链中的数据可以是公开或私有的，并被视为部分去中心化。联盟区块链的例子包括\
  \ [Hyperledger](https://www.hyperledger.org/)、[Hashed Health](https://hashedhealth.com/)\
  \ 和 [R3](https://www.r3.com/)。\n\n**事实：** 联盟区块链被归类为需许可区块链，因为只有选定的节点才被授权拥有读写权限。访问群体可以得到控制和限制，从而消除了单一实体在私有链上控制网络所带来的风险。\n\
  \n#### 联盟区块链的优势\n\n- **去中心化** – 联盟区块链是去中心化的，这意味着它们无需中央权威即可运行，为网络提供了更高的透明度和韧性。\n\
  - **访问控制** – 联盟区块链仅允许授权参与者访问和查看数据，提供了更好的隐私和安全性。\n- **治理** – 联盟区块链对网络治理提供了更多控制，因为各组织可以制定自己的规则和标准。\n\
  - **协作** – 联盟区块链鼓励组织间的协作，促进数据共享和资源共享。\n- **交易** – 交易速度快，且几乎无需交易费用。\n\n#### 联盟区块链的劣势\n\
  \n- **透明度** – 透明度低于公有链。\n- **复杂性** – 联盟区块链的设计、开发和维护比单一区块链解决方案更复杂。\n- **依赖性** – 联盟区块链依赖于拥有和运营它们的组织所提供的基础设施和资源。\n\
  - **基础设施成本** – 由于需要额外的开发和维护，实施联盟区块链解决方案可能成本高昂。\n- **可维护性** – 升级区块链是一项漫长且繁琐的任务，需要每个成员的许可。\n\
  - **共识** – 成员组织之间发生频繁争议的可能性较大。\n\n#### 这对投资者意味着什么？\n\n公有链通常为散户投资者带来的运营风险最低。公有开源性质促进了高度透明，这是区块链相对于传统中心化公司的核心优势之一。大多数已启动的基于区块链的项目都是公有且开源的，只有极少数属于私有、混合或联盟区块链。尽管如此，企业越来越多地部署私有或联盟网络，以在可信方之间实现更深层次的、特定领域的协作。\n\
  \n由于私有和混合区块链具有非透明或半透明的性质，它们往往给投资者带来高风险。此外，大多数投资者对这些类型的区块链不感兴趣，因为其中涉及信任问题，加之区块数据只能通过授权的治理流程修改，且任何编辑都会被记录以备审计。虽然联盟区块链提供了快速的交易速度，但它们也是半私有的，引入了“信任”因素，并且公共透明度有限——尽管授权成员通常可以完全访问账本。\n\
  \n\n\n### 行动步骤\n\n按照以下步骤判断项目是否运行在公有区块链上，以确保其具备透明度、不可篡改性和去信任化特性，从而相比其他区块链类型降低风险。\n\
  \n1.  **验证区块链类型**  \n    借助白皮书，确认该项目使用的是公有链、私有链、联盟链还是混合链。  \n    1. 如果采用公有链类型，则进入整体评估的下一部分。\
  \  \n    2. 如果使用的是私有链、联盟链或混合链，建议进一步研究其采用原因，并优先考虑放弃投资。\n\n2.  **记笔记并以你自己的方式记录发现**\n\
  \n3.  **将发现与基本面评估流程的其他部分相结合**\n\n#### 结果评估\n\n强烈建议在投资时倾向于选择公有链，因为私有链、联盟链或混合链对投资者而言风险过高。\n\
  \n### 无许可与有许可区块链\n\n**评估目标：判断区块链是否为无许可类型，以确保其提供完全的透明度、去中心化治理和开放的参与性。**\n\n区块链可进一步分为*有许可*和*无许可*两种。无许可或有许可指的是区块链在用户访问、透明度、验证和去中心化方面的治理方式。两种类型各有利弊；然而，出于多种原因，无许可区块链往往对投资者更具吸引力。\n\
  \n无许可区块链与有许可区块链最显著的区别在于，与有许可区块链不同，无许可区块链没有限制，允许开放参与，任何人都可以运行节点并尝试验证区块；投票权由算力（PoW）或质押代币（PoS）决定，而非事先批准。有许可区块链通过将共识协议的访问权限限制在少数几个被选中的治理节点来管理共识，这通常会导致中心化程度提高和恶意行为增加。因为有许可区块链要求网络节点信任治理节点以达成共识，它们背离了定义区块链技术的核心“去信任化”原则。\n\
  \n**事实**  \n有许可区块链不一定是私有的——访问权限可以限制给经过审查的参与者，而交易数据、状态证明甚至只读 API 仍可公开可见，从而将选择性成员资格与公开透明度相结合。\n\
  \n需要注意的是，根据定义，有许可区块链本质上并不必须是私有的。有许可区块链也可以是公有链，但访问受到管制。假设比特币，一条公有无许可区块链，决定转变为公有有许可区块链。这可以通过在比特币区块链顶层引入一个访问控制层来实现，该层验证用户身份，然后允许其访问区块链——尽管比特币绝无可能发生这种情况。表\
  \ 6-13 概述并比较了无许可区块链和有许可区块链。\n\n**表 6-13** 无许可与有许可类型区块链对比\n\n| 无许可与有许可区块链对比 |\n|\
  \ --- |\n|   | 无许可 | 有许可 |\n| --- | --- | --- |\n| 描述 | 无许可区块链是一种开放的公有区块链，意味着任何人都可以运行节点并参与共识验证。\
  \ | 有许可区块链是一个封闭网络。网络参与者必须获得许可才能参与共识验证。 |\n| 用途 | 数字资产交易、众筹、保险、去中心化金融、游戏 NFT、捐赠、分布式文件存储等。\
  \ | 通常由组织用于管理供应链、内部投票、创建合约、验证方间支付等。 |\n| 共识机制 | 通常使用工作量证明（PoW）或权益证明（PoS），任何人都可以参与交易验证。\
  \ | 通常使用权威证明（PoA）或实用拜占庭容错（PBFT），只有预先批准的一组节点（验证者）才能验证交易。 |\n| 特征/特性 | 完全去中心化、去信任化、透明\
  \ | 部分去中心化、需信任、部分透明 |\n| 区块链开发 | 开源 | 对公众封闭/由选定的开发者闭门开发 |\n| 可扩展性 | 存在可扩展性问题 | 比无许可链更具可扩展性，但中心化程度更高\
  \ |\n| 能耗 | 能耗成本因所用共识机制而异。 | 更节能 |\n| 交易速度 | 通常慢于有许可区块链。 | 快于无许可区块链 |\n| 治理 | 去中心化治理结构（由基于共识的协议治理。）\
  \ | 中心化治理结构（不由基于共识的协议治理——决策由网络成员在中心化预设层面做出。） |\n| 安全性 | 由于高度去中心化，安全性高。网络内恶意行为者串通的可能性降低。\
  \ | 安全性不如无许可区块链，其安全依赖于内部成员（节点）的诚信。 |\n\n**事实**  \n大多数公有区块链是无许可的，这意味着公共节点可以无需许可自由加入网络。网络上的每个节点都拥有完全的读写权限。\n\
  \n#### 这对投资者意味着什么？\n\n如表 6-13 所示，无许可区块链和有许可区块链各有其特定的优缺点。然而，投资者更青睐*无许可区块链*而非有许可区块链，原因如下。\n\
  \n-   **透明度** – 无许可区块链是完全透明的，这意味着所有用户都可以访问网络上的交易数据。透明度对于激励用户信任区块链网络至关重要。\n\n-  \
  \ **验证过程** – 无许可区块链允许公众有机会参与被称为*挖矿*的验证过程。无需任何许可权限或授权。\n\n-   **货币与实用效用** – 无许可区块链允许任何人购买原生代币，这些代币可用于网络上的各种链上功能（交易、治理活动等），也可能具有货币价值。\n\
  \n-   **去中心化** – 无许可网络是去中心化的，从而带来更高的安全性和社区信任度。\n\n### 行动步骤\n\n按照以下步骤确定区块链是否为无许可类型，以确保其提供完全的透明度、去中心化治理和开放的参与性。\n\
  \n1.  **验证是有许可还是无许可区块链**  \n    找到项目白皮书，搜索有关权限的措辞。通常，每个区块链白皮书中都会提及这一点。节点设置的技术帮助文档中也可能讨论到。如有疑问，请联系项目团队。\
  \  \n    1. 如果评估的项目是 dApp，则确定其构建在哪个底层区块链之上，然后继续判断该底层链是无许可还是有许可类型。\n\n2.  **记笔记并以你自己的方式记录发现**\n\
  \n3.  **将发现与基本面评估流程的其他部分相结合**\n\n#### 结果评估\n\n如果区块链是有许可的，它将带来不必要的风险，使其投资吸引力降低。大多数投资者之所以被加密货币项目吸引，是因为与无许可区块链相关的经济收益。因此，建议重点关注无许可区块链项目，它们提供更高的财务增长潜力。\n\
  \n\n\n"
- "# 支持匿名与隐私保护的区块链\n\n**评估目标：判断一个项目是否提供身份保护和隐私功能，以确保你的数据安全，并实现安全、匿名的交互。**\n\n几十年来，保护用户隐私一直是人们关注的主要问题。除了用户数据存储在易受单点攻击的中央化孤岛中的风险外，用户数据还可能被大型企业利用并出售以牟利。企业之间收集和共享用户数据，使其成为强大的垄断者，让小型企业极难与之竞争。当用户数据被出售时，它会被打包成较小的群体，卖给其他公司用于定向营销活动——这对用户及其数据来说是一场无休止的隐私斗争。此外，在线用户经常被要求提供敏感信息，如社会安全号码、护照、驾照和出生证明来验证身份，这导致黑客能够获取这些数据，进而被操纵并用于欺诈活动。\n\
  \n## 区块链如何帮助保护用户数据？\n\n区块链技术可保护用户数据免受上述威胁，从而最大限度地提升用户隐私和假名性。这是通过其独特的去中心化特性实现的，该特性支持在对等网络上进行安全、去中心化的数据存储。与传统的中心化数据服务器不同，区块链利用其去中心化结构和强大的验证机制来存储和复制用户数据，消除了单点故障的风险。\n\
  \n需要注意的是，并非所有加密货币项目都具备完整的用户隐私和匿名特性。大多数加密货币项目是“假名的”，这意味着用户使用一个称为`公共地址`的化名身份与区块链交互。这个`公共地址`为用户提供了隐私保护，并向公众隐藏了他们的真实身份。然而，如果人们能够将用户的身份与其`公共地址`关联起来，用户的假名性就可能被破解。例如，用户在其网站或社交媒体上发布`公共地址`作为支付方式、接收捐赠，或在中心化交易所进行交互。一旦人们将你的姓名与你的`公共地址`匹配，就可以通过在区块浏览器（例如，用于以太坊的[Etherscan](https://ether.io/)）中输入你的`公共地址`，快速确定你持有的资产。\n\
  \n所有假名的区块链交易都被认为是可追踪的，并且可以在区块链浏览器上被跟踪。然而，这种透明度的水平引发了关于隐私和潜在监控的担忧。因此，专注于隐私的特定区块链应运而生。这些区块链通过利用隐私保护功能来对抗可追踪性，阻止其他用户查看你的交易历史和资产。`Monero`区块链就是支持隐私功能的区块链的一个例子。虽然像`Monero`这样专注于隐私的区块链提供了出色的匿名性和隐私功能，但它们在一定程度上不受监管机构和执法部门的欢迎，因为它们被用于非法活动，例如洗钱或资助非法行动。\n\
  \n## 身份与数据保护\n\n匿名性和假名性之间的区别在于，匿名性使用户能够以完全无法识别身份的方式进行操作或发言。相比之下，假名性允许用户通过一个选定的名称或标识符被识别，从而隐藏其真实身份。像[Kilt\
  \ Protocol](https://www.kilt.io/)和[Mina Protocol](https://minaprotocol.com/)这样的区块链项目提供了真正的匿名性和身份隐私。这些区块链允许用户在线上匿名交互，并消除了提交护照或驾照等身份相关文件来验证身份的要求。\n\
  \n图 6-18 展示了 KILT Protocol 钱包的快照，该钱包允许用户在线与各种服务进行匿名交互。通过 Kilt 的独特技术，用户一旦验证了身份，就可以注册并登录许多网站和服务，而无需再次使用高度私密的个人信息来证明身份。例如，在注册中心化数字资产交易所时，用户无需提交护照、驾照和居住地址证明，而是通过提交一种加密“证明”来验证身份，该证明本质上可以验证——或驳回——用户的身份。\n\
  \n![数字界面显示名为“KILT Identity 1”的用户身份仪表盘，总余额为 8.3654 KILT。选项包括“发送”、“接收”、“查看交易”、“显示凭证”和“管理链上\
  \ DID”。背景为蓝色渐变色调。](img/648696_1_En_6_Fig18_HTML.jpg)\n\n图 6-18\n\nKilt 协议——Sporran\
  \ 身份钱包（Chrome 扩展）（图片由 `https://www.kilt.io/` 提供）\n\n#### 这对投资者意味着什么？\n\n像[Pirate\
  \ Chain](https://piratechain.com/)和 KILT Protocol 这类支持隐私功能的区块链相对较新，但随着时间的推移正变得越来越受欢迎。普通人在使用线上和线下服务时，都力求为其数据和身份提供更高的安全性及保护。鉴于大多数加密货币项目并不提供隐私功能，因此它们在进行投资时并非关键因素。此外，提供身份保护的隐私区块链是一个特定的细分领域。因此，在投资一个提供身份隐私的项目时，建议只与同一细分领域内的类似项目进行比较和评估。\n\
  \n**专家提示**\n\n除了投资目的之外，保护你的隐私至关重要，每个人都应享有这项权利。因此，探索像 KILT Protocol 这样的项目或许是值得的。\n\
  \n### 行动步骤\n\n按照以下步骤判断一个项目是否提供身份保护和隐私功能，以确保你的数据安全，并实现安全、匿名的交互。\n\n1.  **确定该项目是否具备隐私和身份保护功能**\n\
  \n    根据保护白皮书，确定该项目是否提供隐私和/或身份保护功能。\n\n2.  **做好笔记，并以你自己的风格记录你的发现**\n\n3.  **将发现与其他部分的基本面评估过程相结合**\n\
  \n#### 结果评估\n\n隐私和身份保护是专业领域，不会影响该细分领域之外项目的核心评估。\n\n\n\n### 治理\n\n**评估目标：** 确定区块链是否采用链上治理，以确保流程公平、透明，并受益于去中心化和自动化决策。\n\
  \n鉴于区块链治理的重要性，仅此主题便可著书立说。然而，根据本书的范围，本节将讨论区块链治理的要点。治理指的是确保问责制、透明度、响应能力、稳定性、包容性、赋权和广泛参与的结构和流程。更具体地说，区块链治理包含一套规则和流程，用于帮助规范区块链的发展方向和核心功能，包括整体架构、升级和新特性。白皮书通常会详细说明项目区块链治理模型的相关信息。\n\
  \n区块链通常会将治理功能整合到其原生币或代币中。`Polkadot Networks` 的原生币 `DOT` 就是一个例子。作为 Polkadot 治理模型的一部分，DOT\
  \ 持有者如果希望参与 Polkadot 的全民公投并投票，可以锁定他们的 DOT。\n\n就像每个国家都需要通过法律、法规和新的变革来自我治理一样，这一原则也适用于基于区块链的公司。然而，机构投资者、私人投资者和散户投资者对于什么对区块链网络最有利，通常持有不同的利益和观点。为了解决这些问题，有效的治理对于促进所有相关方之间的妥协、平等和调解至关重要。通过区块链治理，数字资产持有者有机会对最终影响项目长期成功和寿命的重要决策进行投票。\n\
  \n必须实施清晰、可维护、高效的区块链治理结构，以帮助提升项目的成功和社区精神。缺乏区块链治理可能导致许多问题，包括硬分叉和软分叉、社区分裂、代码漏洞以及社区和投资者兴趣丧失，所有这些都会影响项目的长期成功和寿命。强大的去中心化治理可以通过提供无摩擦的链上投票流程，让参与者能够为协议决策做出贡献，从而帮助缓解这些问题。\n\
  \n在设计、运营和管理区块链时，需要在广泛的技术架构领域做出重要决策。这些通常通过治理进行投票的决策，对区块链的成功至关重要。根据 Evrim Tan 在《公共部门的区块链治理》一书中的观点，一个典型的框架将治理决策分为九种类型，具体如下：\n\
  \n1.  基础设施架构\n2.  应用架构\n3.  互操作性\n4.  决策机制\n5.  激励机制\n6.  共识机制\n7.  治理组织\n8.  治理问责制\n\
  9.  治理控制\n\n## 区块链治理模型\n\n通过区块链治理的参与主要通过两种主要类型的治理模型实现：链上治理和链下治理。请注意，一些区块链也采用混合治理模型，其中结合了链上和链下治理的元素，以平衡去中心化和效率。它允许网络参与者对关键决策进行投票（链上），同时在需要时允许一个或多个中心化方快速高效地做出某些决策（链下）。然而，为了简化并满足基本的评估需求，本节仅关注链上和链下治理模型。\n\
  \n### 链下治理\n\n顾名思义，在链下治理中，所有决策、公开讨论、提案和集体商定的更新都以中心化的方式在链下进行。链下治理通常依赖于非正式流程，例如邮件列表讨论、GitHub\
  \ 拉取请求或改进提案框架（例如以太坊的 EIP）。虽然核心团队通常协调讨论并统计意见，但最终的更改仍取决于广泛的社区接受度——矿工、验证者和用户必须升级他们的软件才能使任何决策生效。\n\
  \n### 链上治理\n\n通过链上治理系统，所有正式的提案和投票阶段都记录在链上，而讨论则在链下进行，并由核心团队负责实施。与链下治理结构不同，链上治理仅在线进行；然而，一个由开发者组成的小组或委员会负责管理、协调并帮助利益相关者（如有需要）达成共识。在链上结构中，利益相关者包括矿工、开发者和资产持有者。\n\
  \n图 6-19 展示了 Polkassembly——Polkadot 生态系统中一个用于治理和协作的开源首要平台——用户可以在其中查看并参与 `Moonbeam\
  \ Network` 的链上治理流程。\n\n**事实**\n\nPolkadot 的原生代币 DOT 在治理、质押和绑定等链上活动中扮演着关键角色，允许利益相关者参与网络的运营和决策过程。\n\
  \n在链上公开投票期间，开发者通过代码更新提出称为改进提案的变更。每个利益相关者都有机会接受或拒绝该提议的变更。利益相关者使用其私钥进行验证和提交。许多网络采用代币加权投票（持有的原生币越多，投票权越大）；例如，持有\
  \ 10,000 枚币的参与者比持有 2,000 枚的参与者拥有更大的权重。其他协议则采用一验证者一票、二次方或基于声誉的方案。这为那些对区块链项目的成功有真正兴趣的投资者提供了激励。此外，一些加密货币项目会奖励参与治理公投的参与者。\n\
  \n![Polkassembly 网站显示“最新活动”部分的截图。它列出了各种活动，包含编号、标题、发布者、创建日期、类型和状态等列。活动包括公投和国库提案，状态如“已开始”、“已提议”、“已奖励”和“暂时搁置”。界面包含导航选项和一个登录按钮。](img/648696_1_En_6_Fig19_HTML.jpg)\n\
  \n**图 6-19** Polkassembly 是一个开源平台，用户可以在其中查看并参与 Moonbeam Network 的链上治理流程（图片致谢 [`https://moonbeam.network/tutorial/participate-in-moonbeam-governance-with-polkassembly/`](https://moonbeam.network/tutorial/participate-in-moonbeam-governance-with-polkassembly/)）\n\
  \n### 链下治理与链上治理对比\n\n表 6-14 概述了链上治理模型与链下治理模型之间的显著差异。请将其作为通用指南，而非针对具体项目的结论——每个协议都会以自己的方式调整规则，因此没有单一描述能适用于所有情况。作为背景参考，Polkadot\
  \ Network、Tezos 和 Decred 采用链上设置，而比特币的 BIP 和以太坊的 EIP 则采用链下流程。\n\n**表 6-14** 链上治理与链下区块链治理对比\n\
  \n\n好的，作为高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将以下英文文本翻译成中文。\n\n\n| 链下治理与链上治理的对比 |\n| ---\
  \ |\n|   | 链下治理 | 链上治理 |\n| --- | --- | --- |\n| 定义 | 治理规则和决策通过论坛、电话会议和改进草案在协议之外进行。\
  \ | 治理规则和决策嵌入协议代码中，并由智能合约执行。 |\n| 形式化与结构 | 非正式，由规范驱动。论坛、开发者会议和改进草案指导变更，没有法律约束力的规则。\
  \ | 正式，由规则驱动。智能合约程序定义了谁可以提出提案、如何投票以及如何计算门槛。 |\n| 透明度 | 相对不透明——讨论和决策在链下进行（例如，在邮件列表或电话会议上），这可能导致过程对外人来说不那么透明，甚至“隐藏”。\
  \ | 设计上透明——所有提案、投票和结果都记录在公共账本上，任何人都可以实时审计治理过程。 |\n| 决策制定过程 | 决策通过社会共识和线下协议产生。如果被接受，则通过网络参与者选择运行的软件更新来实施。\
  \ | 决策通过链上投票机制做出。利益相关者（例如，代币持有者）通过区块链对提案进行投票。 |\n| 信任要求 | 需要信任人。由于治理在账本之外运作，利益相关者必须依赖核心开发者、矿工或基金会领导者来遵守共识并执行决策。\
  \ | 信任协议——决策由代码和分布式共识强制执行，减少了对任何单一个体的依赖。 |\n| 升级机制 | 由社区协议驱动的软件更新。社区同意的软件发布推出升级；用户选择安装它们，如果太多人拒绝更新，链可能会分叉。\
  \ | 链上提案和代码修正在系统内决定。代币持有者对提案进行投票；一旦变更通过，协议会自动应用它——在大多数情况下无需链下争论。 |\n| 适应性 | 灵活——规则没有硬编码，因此社区可以在需要时修改或添加它们，尽管辩论可能会拖延。\
  \ | 僵化——规则已融入代码；一致但难以在没有新的链上投票的情况下快速更改。 |\n| 激励机制 | 没有原生代币奖励：参与取决于声誉、社区善意或其他链下福利，因为治理处于协议的激励层之外。\
  \ | 嵌入的代币奖励或质押债券激励投票者，并直接将治理行动与网络的经济成果联系起来。 |\n| 利益相关者参与 | 开放的讨论但非官方——任何人都可以参与，但通常由一小部分核心开发者和矿工决定，限制了更广泛的影响力。\
  \ | 设计上包容但不均衡——任何代币持有者都可以投票，但如果参与度低且大户占主导地位，则会引发去中心化方面的担忧（尽管一些协议对此有保护措施）。 |\n| 共识方式\
  \ | 粗略共识——没有固定的投票计数；同意是非正式衡量的，因此在某些情况下意见分歧时，决策可能模糊不清并拖延。 | 正式投票——多数或绝对多数规则提供快速、清晰的结果，但代币权重可能将权力倾斜向大户（尽管一些协议对此有保护措施）。\
  \ |\n| 复杂性 | 社会复杂性高——治理分散在聊天和论坛中，结构不清晰，难以审计。 | 技术复杂性高——构建智能合约代码繁重，但一旦上线，则完全在链上且易于审计。\
  \ |\n| 自动化与执行 | 手动——开发者推送更新；节点选择加入，但手动操作常导致延迟或错误。 | 自动化——协议自动执行批准的更改（尽管一些协议仍需要有限的手动步骤）。\
  \ |\n\n**事实**\n\n基于 Wasm 的运行时，[Polkadot 网络](https://wiki.polkadot.network/docs/learn-runtime-upgrades)能够实现无需分叉的升级——链上治理投票换入新代码，添加功能或修复错误，而无需硬分叉带来的中断。\n\
  \n#### 这对投资者意味着什么？\n\n区块链治理的话题远非独一无二，但关于区块链更适合链下还是链上治理模型，仍存在大量意见。链上和链下模型类型都有各自的论据。一个重要方面在于，类似于去中心化能够实现自治，链上治理能够以无需信任、透明的方式让所有利益相关者的声音被听到，从而允许“人民”自我治理区块链的方向。所有利益相关者都应该有机会通过一个平等透明的流程来投票并影响区块链的方向和成功，而不仅仅是高端网络投资者和投资实体。\n\
  \n可以说，链上治理的好处是因区块链类型以及待决策的类型和严重程度而异的。更具体地说，问题在于人类决策（链下）的好处是否超过了通过链上自动化流程进行的基于代码的规则决策（链上）的好处。尽管链上治理流程仍然依赖于所有利益相关者的想法和决策，但它不像传统的链下系统那样有大量的人际互动和讨论，这可能产生负面或正面的影响。\n\
  \n迈向一个更公平、更去中心化的世界，逐渐接近一个完全链上的治理模型在某种程度上是合乎逻辑的，考虑到它相对于传统链下治理流程的一系列优势。尽管仍有一些小问题，但已经取得了巨大的进步，一个去中心化、平等、高效且透明的治理流程现在就在我们面前。拥有这种链上治理功能的区块链可以被视为一种优势，极大地促进了区块链的整体进步和成功。\n\
  \n### 行动步骤\n\n遵循以下步骤来确定区块链是否使用链上治理，以确保一个公平、透明的流程，并受益于去中心化和自动化决策。\n\n1.  **确定所实施的治理结构类型**\n\
  \    1.  从项目白皮书中确定该区块链是采用链上还是链下治理模型。如有需要，可联系项目团队以获得进一步澄清。\n    2.  对于 dApp，其底层区块链在很大程度上影响其所采用的治理流程。研究\
  \ dApp 所构建的区块链，并审查它采用的是链上还是链下治理模型。\n\n2.  **用你自己的风格记下笔记并记录你的发现**\n\n3.  **将这些发现与基本面评估流程的其他部分相结合**\n\
  \n#### 结果评估\n\n具有完全链上治理技术的区块链基础设施，显著优于依赖传统链下模型的区块链。长期投资于基本面强劲且拥有完全链上治理技术的项目是值得赞赏的。一个项目是完全还是部分实施这项技术并不那么重要；知道底层基础设施包含了可供其使用的链上治理功能，是一个重大的基本面优势。\n\
  \n然而，如果项目拥有链下或部分中心化（混合）的治理协议，投资者也不应气馁，前提是存在一个包含社区参与的、坚实的、近乎透明的投票系统。这还应与某种形式的保证相结合，即没有单一群体为人们做出最终决定。\n\
  \n\n\n### 跨链互操作性\n\n***评估目标：评估网络的跨链互操作性水平。***\n\n跨链互操作性简单来说是指区块链与其他区块链自由通信的能力，从而促进信息、资产和数据之间的无缝转移。借助正确的跨链互操作性协议解决方案，一个区块链上的任何经济活动都可以在另一个区块链上得到呈现。将经济活动从一个区块链扩展到另一个区块链，将进而释放一个庞大的区块链生态系统，实现数据和资产的无摩擦自由流动——这是整体目标。然而，这并非易事。\n\
  \n试想一下，如果全球银行之间无法相互通信，将会造成怎样的破坏？资金转移将停止，引发完全混乱。同样，想象一下如果 `Gmail` 无法与 `Outlook` 或\
  \ `Yahoo` 通信，整个系统将崩溃，导致通信效率灾难性低下。同样的原理也适用于区块链网络。与人类不同，大多数区块链无法自然地相互通信（对话）；然而，少数区块链——例如内置\
  \ `IBC` 的 Cosmos，以及其 `XCM` 格式允许平行链交换消息的 Polkadot——是专为原生跨链通信而构建的。尽管这个问题并非区块链独有——许多科技产品在孤立的“茧房”中成熟——但生态系统仍在规模化方面挣扎，因为大多数网络都在自己独立的“茧房”内成长。区块链的构建方式多种多样，每种方式都满足并定制了广泛的应用需求；正因如此，它们彼此之间很少有共同点。存在一系列不同的区块链，它们在可扩展性、去中心化、安全性、隐私性、可编程性和互操作性方面各有优劣，相互竞争。然而，没有一个通用的区块链协议能够满足整个区块链生态系统的需求。这种区块链部落主义导致了大量的重复劳动，许多开发者选择在多个区块链上部署智能合约，进一步分裂了社区并引入了用户界面障碍。\n\
  \n以比特币为例；由于其特定的协议、编程语言和架构设计，比特币无法与（例如）以太坊自由通信。更具体地说，记录并存储在比特币网络上的资产和交易无法轻易地在其他区块链上呈现。同样的原理也适用于大多数区块链：由于它们独立的系统协议、编程语言、共识机制、架构设计以及其他影响因素——例如区块链功能和需求的不断演变——区块链无法以无摩擦的方式进行通信。由于这一障碍，来自特定区块链的数据、信息以及原生和衍生资产无法有机地转移。尽管协作显而易见，但每个网络都旨在发展自己独立的生态系统以争夺“王位”。新的创新架构设计努力解决互操作性问题；然而，目前尚无放之四海而皆准的解决方案。\n\
  \n## 互操作性解决方案\n\n区块链的价值受限于其与其他生态系统通信的互操作性能力与水平。区块链之间的互操作性释放了巨大的流动性和效用。为了增强这些能力，区块链网络正在拼命尝试通过各种技术来克服互操作性问题——本节将讨论这些技术。\n\
