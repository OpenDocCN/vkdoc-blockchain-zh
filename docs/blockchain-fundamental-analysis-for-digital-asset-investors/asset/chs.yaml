  \ 14.10%。交易量与市值比率为 8.08%。总锁仓价值（TVL）为 1,118,649,329 美元。市值与 TVL 比率为 0.39304167。流通供应量为\
  \ 8,069,677 COMP，总供应量和最大供应量均为 10,000,000 COMP。完全稀释市值为 541,866,858 美元。提供加入观察列表和追踪投资组合的选项。](img/648696_1_En_9_Fig17_HTML.jpg)\n\
