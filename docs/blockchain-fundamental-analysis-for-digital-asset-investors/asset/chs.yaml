- "# MVRV 比率\n\n**评估目标:** 使用 MVRV 比率，判断每枚代币的价格是高于还是低于其“公允价值”，从而识别潜在的买入和卖出区域。\n\n*市场价值与已实现价值*（`MVRV`）比率是市值与已实现市值的比率，有助于衡量市场情绪和潜在的转折点。投资者经常使用\
  \ `MVRV` 比率（公式 9-8）来了解每枚代币何时高于或低于“公允价值”，并评估市场盈利能力。市场价值与已实现价值的显著偏离可能预示着市场顶部和底部，反映了投资者极端未实现利润（顶部）或亏损（底部）的时期。\n\
  \n```\nMVRV = 市值 / 已实现市值\n```\n\n**公式 9-8.** `MVRV` 比率的计算公式\n\n图 9-29 展示了比特币的 `MVRV`\
  \ 比率。横轴代表时间，纵轴代表 `MVRV` 比率和每枚 `BTC` 的价格。当 `MVRV`（橙色线）低于 1（绿色线）时，大多数持有者处于亏损或盈亏平衡状态——这通常被视为一个买入信号。`MVRV`\
  \ 等于 1 意味着每枚代币的价格等于其已实现价格或盈亏平衡点，表明市场处于平衡状态。当 `MVRV` 升至 3.5 以上时（Glassnode 将 3.5 设为红色阈值，因为每个比特币周期顶部——2011\
  \ 年、2013 年、2017 年和 2021 年 2 月的局部高点——都峰值于 3.5 和 4 之间；这是一个经验观察到的“危险区域”，并非基于公式的值），表明可能出现市场顶部，导致大量获利了结——这种情况在\
  \ 2021 年初的比特币身上有所体现。上升趋势中的高 `MVRV` 值预示着不断增长的未实现利润，增加了抛售的可能性。相反，下降趋势中的低 `MVRV` 值表明相对于成本基础的市场价值下降，这可能意味着价值低估或需求疲软，具体取决于其他市场因素。有关\
  \ `MVRV` 比率解读的进一步细分，请参见表 9-5。\n\n![图表展示了 2020 年 7 月至 2024 年 7 月期间的 BTC 市场价值与已实现价值比率\
  \ (MVRV) 及美元价格。MVRV 比率以橙色线表示，价格以黑色线表示。MVRV 的关键水平线标记为 3.6 和 1.2，价格的关键水平线标记为 $60k\
  \ 和 $20k。该图表展示了两个指标随时间的变化情况。](img/648696_1_En_9_Fig29_HTML.jpg)\n\n**图 9-29** 比特币：市场价值与已实现价值比率\
  \ (`MVRV`) (数据来源：[`studio.glassnode.com/metrics?a=BTC&category=&m=market.Mvrv`](https://studio.glassnode.com/metrics?a=BTC&category=&m=market.Mvrv))\n\
  \n> **事实**  \n> `MVRV` 比率对于长期投资者尤其有价值，因为它突显了宏观的市场周期。然而，短期价格波动并不总是与 `MVRV` 信号相匹配。为了更准确地把握买卖时机，建议将\
  \ `MVRV` 与其他指标（如投资者工具、`NUPL`、交易量和已实现市值 `HODL` 波浪）结合使用。\n\n**表 9-5** `MVRV` 比率解读\n\
  \n| 比率值/描述 | 比率解读 |\n| --- | --- |\n| `MVRV` 值 < 1.0 | 大多数持有者处于亏损（或盈亏平衡）状态。表示市场投降和后期熊市积累。通常被视为买入信号。\
  \ |\n| `MVRV` = 1 | 每枚代币的价格等于已实现价格或盈亏平衡点。 |\n| `MVRV` > 3.5 | 可能的市场顶部。大量派发和获利了结的可能性增加。\
  \ |\n| 高值与上升趋势 | 代币供应的市场价值相对于已实现价值（成本基础）在增加。表明存在大量未实现利润，因此增加了锁定利润而进行代币派发的可能性。 |\n\
  | 低值与下降趋势 | 代币供应的市场价值相对于已实现价值（成本基础）在减少。表明投资者存在未实现亏损，可能预示着价值低估和需求动态不佳。 |\n\n### 行动步骤\n\
  \n按照以下步骤判断每枚代币的价格是高于还是低于其“公允价值”，从而识别潜在的买入和卖出区域。\n\n1. **使用 `MVRV` 比率识别买入和卖出区域**\
  \  \n   访问 `Glassnode.com`（或同等网站）查看并使用 *MVRV 比率* 链上指标。  \n   1. 通过分析图表数据确定资产的 `MVRV`\
  \ 比率。\n\n2. **做笔记并以你自己的方式记录你的发现**\n\n3. **将发现与其他基本面评估流程部分相结合**\n\n#### 结果评估\n\n\
  如果 `MVRV` 低于 1，考虑定期定投；如果介于 1 和 3.5 之间，考虑规划下一次的入场或离场；如果 `MVRV` 大于 3.5，考虑在固定时间间隔内获利了结。\n\
  \n## MVRV Z-Score\n\n**评估目标:** 使用 `MVRV Z-Score` 评估资产是被高估还是低估，并精准定位市场顶部和底部。\n\n\
  根据 `Glassnode.com` 的定义，*市场价值与已实现价值 (`MVRV`) Z-Score* 评估数字资产相对于其“公允价值”是被高估还是低估。它被定义为市值与已实现市值的差值与市值标准差之间的比率。一些投资者更喜欢\
  \ `MVRV Z-Score` 而非传统的 Z-Score（一种统计指标，表示特定价格点与平均价格的距离，以标准差表示），因为它将市场价值与已实现价值进行了比较。`MVRV\
  \ Z-Score` 的计算方法是取资产市场价值与其已实现市值之间的差值，然后除以市值的标准差，以突出与“公允价值”的偏差。\n\n```\nMVRV Z Score\
  \ = (市值 - 已实现市值) / 标准差(市值)\n```\n\n**公式 9-9.** `MVRV Z-Score` 的计算公式\n\n`MVRV-Z Score`\
  \ 被分解为不同的颜色区域。红色区域表示市场价值（市值）显著高于已实现价值（市值）。该区域通常与大量派发和获利了结相关。绿色区域表示市场价值远低于已实现价值，预示着潜在的市场底部和买入机会。\n\
  \n图 9-30 展示了带有 30 天移动平均线的比特币 `MVRV-Z Score` 数据。当 `MVRV Z-Score` 在 2013 年和 2017 年进入红色区域（市场顶部）时，随后都出现了价格下跌和趋势反转。相反，当它在\
  \ 2011 年、2015 年、2019 年和 2022 年进入绿色区域（市场底部）时，则标志着积累期的开始，随后是上升趋势。\n\n![图表标题为“BTC:\
  \ MVRV Z-Score (30 日移动平均线)”，显示两条线：橙色的 MVRV Z-Score 和黑色的比特币价格。图表时间跨度为 2010 年至 2024\
  \ 年。Z-Score 的峰值用红色圆圈标出，低谷用绿色圆圈标出。价格轴从 $0.02 到 $100k。背景包括表示重要 Z-Score 水平的阴影区域。图表数据来源于\
  \ Glassnode。](img/648696_1_En_9_Fig30_HTML.jpg)\n\n**图 9-30** 比特币：`MVRV Z-Score`\
  \ (数据来源：[`studio.glassnode.com/metrics?a=BTC&category=&m=market.MvrvZScore&zoom=all`](https://studio.glassnode.com/metrics?a=BTC&category=&m=market.MvrvZScore&zoom=all))\n\
  \n\n\n### 行动步骤\n\n按照以下步骤评估某项资产是被高估还是低估，并精准定位市场顶部和底部。\n\n1. **使用 MVRV Z-Score 识别买入和卖出区域**\n\
  \n   访问 `Glassnode.com`（或同类网站），查看并使用 *MVRV Z-Score* 链上指标。\n   - 通过分析图表数据，确定资产的 `MVRV\
  \ Z-Score`。\n\n2. **记录笔记，并以自己的风格整理发现**\n\n3. **将发现结果与基本面评估流程的其他部分相结合**\n\n#### 结果评估\n\
  \n当 `MVRV Z-Score` 进入红色区域时，说明资产被高估；因此，应考虑定期分批获利了结。当它处于绿色区域时，通常意味着资产被低估；因此，应考虑定期分批建仓。在这两个区域之间时需谨慎行事，参考其他指标以寻找更清晰的趋势，并规划下一次的进场和离场时机。\n\
  \n## 未实现净损益 (NUPL)\n\n**评估目标：** 使用 `NUPL` 来评估投资者情绪、市场氛围以及潜在的市场顶部和底部，从而发现买卖机会。\n\n\
  `未实现净损益 (NUPL)` 表示数字资产的相对未实现利润与相对未实现亏损之间的差额。这是一个通过将市值（当前总价值）减去已实现市值（成本基础），再除以市值计算得出的比率。\n\
  \n```\nNUPL = (市值 - 已实现市值) / 市值\n```\n\n**公式 9-10.** 计算 `NUPL` 的公式。\n\n`NUPL` 主要用于比特币，它反映了投资者的情绪状态（是盈利还是亏损），以及市场周期不同阶段的整体氛围。它还有助于识别市场顶部和底部，从而使投资者能够相应地规划进场和离场。\n\
  \n`NUPL` 包含五个水平的“彩色”区域，可从市场心理的角度进行解读。这些区域从*投降*区（红色）延伸至*狂喜*和贪婪区（蓝色）。当某项特定资产的 `NUPL`\
  \ 处于蓝色区域时，表明大多数投资者处于狂喜状态，且基本处于盈利。价格走势通常在 `NUPL` 处于此区域时达到顶峰。相反，当 `NUPL` 处于红色区域时，意味着投资者已向恶性下跌的市场屈服。在此期间，价格走势几乎触底，标志着熊市可能已见底，仅剩少数卖家。换句话说，`NUPL`\
  \ 以简化的彩色编码模式帮助投资者直观地了解市场周期。\n\n图 9-31 展示了比特币的 `NUPL` 图表（附带 7 日移动平均线）。x 轴代表时间与 `NUPL`，y\
  \ 轴代表每枚 BTC 的价格。请注意，当 `NUPL` 为绿色，特别是蓝色时，比特币的价格走势达到顶峰，随后通常会迅速下跌并出现趋势反转。另一方面，当比特币价格走势触底时，`NUPL`\
  \ 会跌入橙色和红色区域，这通常预示着市场底部即将到来，之后不久价格会急剧上涨。有关 `NUPL` 区域的更详细分解和说明，请参见表 9-6。\n\n**表 9-6**\
  \ 未实现净损益 (NUPL) 区域\n\n| 未实现净损益 (NUPL) 区域 |\n| --- |\n| NUPL 区域 | 颜色 | 描述 |\n| ---\
  \ | --- | --- |\n| 投降 (`NUPL < 0`) | 红色 | 代表市场底部，此时大多数投资者持有亏损。 |\n| 希望/恐惧 (`0 <\
  \ NUPL < 0.25`) | 橙色 | 过渡阶段，市场正从亏损中复苏，投资者持谨慎乐观态度。 |\n| 乐观/焦虑 (`0.25 < NUPL < 0.5`)\
  \ | 黄色 | 投资者信心增强，市场焦虑逐渐消退。 |\n| 信念/否认 (`0.5 < NUPL < 0.75`) | 绿色 | 处于牛市阶段，预计上升趋势将持续，部分人否认潜在的市场风险。\
  \ |\n| 狂喜/贪婪 (`NUPL > 0.75`) | 蓝色 | 大量投资者处于盈利状态并极度狂喜。通常，资产在此区域被高估，趋势反转即将来临。 |\n\n\
  ![显示比特币从 2011 年到 2024 年的未实现净损益 (NUPL) 作为 7 日移动平均线的图表。黑色线条代表以美元计价的比特币价格，范围从 2 美元到超过\
  \ 10 万美元。彩色区域表示市场情绪阶段：投降、希望、恐惧、乐观、焦虑、信念、否认、狂喜和贪婪。该图表突显了随时间推移，与价格变化相对应的情绪波动。](img/648696_1_En_9_Fig31_HTML.jpg)\n\
  \n**图 9-31** 比特币：未实现净损益 (NUPL) （数据来源： [`https://studio.glassnode.com/metrics?a=BTC&category=&m=indicators.NetUnrealizedProfitLoss&s=1452251288&u=1702857600&zoom=`](https://studio.glassnode.com/metrics?a=BTC&category=&m=indicators.NetUnrealizedProfitLoss&s=1452251288&u=1702857600&zoom=))\n\
  \n### 行动步骤\n\n按照以下步骤评估投资者情绪、市场氛围以及潜在的市场顶部和底部，以发现买卖机会。\n\n1. **识别市场情绪**\n\n   访问\
  \ `Glassnode.com`（或同类网站），查看并使用 `NUPL` 链上指标。\n   - 通过监控比特币（或其他资产）所处的颜色区域，判断整体市场情绪和投资者情绪。\n\
  \   - 如表 9-6 所述，评估 `NUPL` 区域。\n\n2. **追踪市场周期**\n   - 观察 `NUPL` 在不同区域间的运动，以识别市场周期的转变。\n\
  \n3. **记录笔记，并以自己的风格整理发现**\n\n4. **将发现结果与基本面评估流程的其他部分相结合**\n\n#### 结果评估\n\n如果 `NUPL`\
  \ 处于蓝色或绿色区域，应考虑在不同水平分批锁定利润，因为市场见顶和趋势反转很可能发生。在橙色和红色区域考虑分批建仓，因为这些水平通常预示着市场底部。\n\n\n\
  \n"
- "# 哈希率\n\n**评估目标：评估工作量证明网络的哈希率，以判断网络安全趋势、矿工参与度及其与市场状况和资产表现的相关性。**\n\n哈希率是衡量在工作量证明（`PoW`）区块链挖矿过程中，用于验证交易并保障网络安全所需的每秒计算能力的指标。通常，当网络哈希率随时间增长时，被视为积极信号。高哈希率意味着篡改或操纵区块链网络需要极高的计算能力，使得任何单一实体更难发动\
  \ `51%` 攻击。反之，低哈希率可能表明矿工参与度下降，这会削弱网络安全，因为恶意实体更容易控制网络超过 `50%` 的计算能力——这种情况被称为 `51%`\
  \ 攻击。哈希率突然、急剧下降可能是危险信号，预示着矿机关停、区域性断电或利润驱动的退出潮，会暂时侵蚀安全边际。\n\n对于长期投资者而言，哈希率持续下降的网络是一个重大危险信号。较低的哈希率可能表明矿工参与度降低，这会直接影响网络安全，使恶意实体更容易控制网络超过\
  \ `50%` 的计算能力——即所谓的 `51%` 攻击。一旦发生这种情况，攻击者可以通过双花来扰乱和操纵区块链，破坏网络的完整性。此外，低哈希率或哈希率下降通常与矿工盈利能力下降或由于交易费或区块奖励减少而缺乏保障网络安全的激励有关。这通常是用户交互不足的结果，其根源可能在于基础质量较差或市场状况不佳。\n\
  \n哈希率通常以每秒生成的哈希值数量来衡量。以下是常见的哈希率单位、其含义以及与之匹配的网络或设备示例。\n\n**表 9-7** 哈希率速度\n\n| 哈希率单位\
  \ | 每秒哈希次数 | 哈希率描述 |\n| --- | --- | --- |\n| `Kilohash` | 每秒 `1,000` 次哈希 | 极慢，可能代表单个基于\
  \ GPU 的矿机 |\n| `Megahash` | 每秒 `100 万` 次哈希 | 非常慢，可能代表单个基于 GPU 的矿机 |\n| `Gigahash`\
  \ | 每秒 `10 亿` 次哈希 | 小型矿池或可能代表一组 GPU 集群 |\n| `Terahash` | 每秒 `1 万亿` 次哈希 | 单个 `ASIC`\
  \ 矿机或大型矿池 |\n| `Petahash` | 每秒 `1 千万亿` 次哈希 | 大型矿池 |\n| `Exahash` | 每秒 `100 京` 次哈希\
  \ | 超大矿池或可能代表整个网络 |\n| `Zetahash` | 每秒 `10 垓` 次哈希 | 比特币网络于 2024 年首次达到；代表超大规模、全球级的\
  \ `PoW` 算力 |\n\n图 `[9-32]` 展示了比特币的哈希率。x 轴表示时间，y 轴表示比特币的哈希率和每枚币的价格。如图所示，比特币的哈希率从\
  \ 2010 年到大约 2015 年呈急剧上升趋势，并从 2015 年到 2024 年稳步增长。随着比特币哈希率的增加，其挖矿难度也随之提高。虽然这对矿工盈利能力产生负面影响，但它对整体网络安全做出了积极贡献，并表明了其持续受欢迎的程度。\n\
  \n![折线图展示了从 2015 年到 2024 年以太坊的平均哈希率和价格。蓝色线条代表哈希率，随时间稳步增长。黑色线条代表价格，波动显著，在 2021 年左右达到峰值后下跌并趋于稳定。该图包含两个\
  \ y 轴：左侧为哈希率，右侧为以美元计的价格。](img/648696_1_En_9_Fig33_HTML.jpg)\n\n**图 9-33** 以太坊转向\
  \ `PoS` 前的平均哈希率（图表来源：[`https://studio.glassnode.com/metrics?a=ETH&category=&ema=0&m=mining.HashRateMean&mAvg=14&mMedian=0&mScl=log`](https://studio.glassnode.com/metrics?a=ETH&category=&ema=0&m=mining.HashRateMean&mAvg=14&mMedian=0&mScl=log)）\n\
  \n![折线图展示了从 2009 年到 2024 年比特币的平均哈希率和价格（美元）。橙色线条代表哈希率，黑色线条代表比特币价格。这两个指标整体上随时间增长，比特币价格存在显著波动。该图表标注为“BTC：平均哈希率（14\
  \ 日移动平均线）”，数据来源为 Glassnode。](img/648696_1_En_9_Fig32_HTML.jpg)\n\n**图 9-32** 比特币哈希率（图表来源：[`https://studio.glassnode.com/metrics?a=BTC&category=&m=mining.HashRateMean&mScl=log`](https://studio.glassnode.com/metrics?a=BTC&category=&m=mining.HashRateMean&mScl=log)）\n\
  \n### 行动步骤\n\n请按照以下步骤评估 `PoW` 网络的哈希率，以判断网络安全趋势、矿工参与度及其与市场状况和资产表现的相关性。\n\n1. **检查网络哈希率**\n\
  \n   访问 `Glassnode.com`（或同类网站）查看并使用 `哈希率` 链上指标。\n   1. 追踪网络哈希率随时间的变化，判断其是呈上升、稳定还是下降趋势。\n\
  \n2. **分析哈希率与市场状况的关系**\n\n   将哈希率变化与资产价格变动及整体市场状况进行比较。\n\n3. **做笔记并用你自己的风格记录发现**\n\
  \n4. **将发现与基本面评估流程的其他部分相结合**\n\n#### 结果评估\n\n哈希率上升标志着网络安全性强、矿工参与度高且受欢迎。相反，哈希率下降——尤其是伴随着价格停滞或下跌时——则暗示网络安全正在减弱，矿工可能退出，这可能表明是时候重新评估或减少风险敞口了。\n\
  \n\n\n"
- "# 网络价值与交易量信号 (NVTS)\n\n**评估目标：评估 NVT 信号 (NVTS) 指标，以判断资产是否被低估或高估，从而识别潜在的买入或卖出机会以及可能的趋势反转。**\n\
  \n`NVT 信号 (NVTS)` 是传统 NVT 比率的升级版本，它提供了一种对投资者更友好的网络估值视角，相较于交易活动而言。传统 NVT 使用每日交易量，而\
  \ NVTS 则使用 90 日移动平均线——即将市值除以 7 天平均值——以平滑短期波动，使其更可靠地用于发现趋势。\n\n当 NVTS 较高时，表明网络的估值（市值）相对于交易量较高，暗示可能存在高估，因为网络的实际效用（以交易量衡量）不足以支撑其价格。投资者可能会将此解读为市场可能回调的预警信号。相反，当\
  \ NVTS 较低时，表明交易量相对于网络估值较为强劲，暗示可能存在低估，并且如果其他基本面因素也积极向好，则预示着潜在的买入机会。\n\n图 9-34 展示了比特币的\
  \ NVTS。x 轴代表时间（与 NVTS 相关联），y 轴代表每枚 BTC 的价格。请注意，当 NVT 信号骤降时（绿色圆圈），价格走势往往会反转向上。然而，必须谨慎行事，因为这并不总是意味着长期价格反转，例如\
  \ 2018 年的情况（紫色圆圈）。另一方面，当 NVT 信号达到峰值时（红色圆圈），随后通常会出现价格急剧下跌和趋势反转。\n\n![折线图，标题为“BTC：网络价值与交易量信号（7\
  \ 日移动平均线）”，显示了从 2011 年到 2024 年的两条线。黑线代表以美元计价的比特币价格，右侧 y 轴的值范围为 1 美元到 10 万美元。橙色线代表\
  \ NVT 信号，左侧 y 轴的值范围为 1 到 800。不同的点用彩色圆圈突出显示，表示重要的峰值和谷值。图表来源为 Glassnode。](img/648696_1_En_9_Fig34_HTML.jpg)\n\
  \n图 9-34\n比特币的网络价值与交易量信号（7 日移动平均线）（数据来源自 [`studio.glassnode.com/metrics?a=BTC&ema=0&m=indicators.Nvts&mAvg=7&mMedian=0&mScl=log&s=1264806612&u=1730505600&zoom=`](https://studio.glassnode.com/metrics?a=BTC&ema=0&m=indicators.Nvts&mAvg=7&mMedian=0&mScl=log&s=1264806612&u=1730505600&zoom=)）\n\
  \n### 操作步骤\n\n请按照以下步骤评估 NVT 信号 (NVTS) 指标，以判断资产是否被低估或高估，识别潜在的买入或卖出机会以及可能的趋势反转。\n\n\
  1. **识别高估与低估**\n\n   访问 Glassnode.com（或类似网站）查看并使用 `NVT 信号` 链上指标。\n   1. 检查您所评估资产的\
  \ NVTS 读数。\n\n2. **分析趋势反转**\n\n   当 NVTS 要么骤降要么达到峰值时，识别趋势反转的可能性。\n\n3. **记录笔记并以您自己的风格记录发现**\n\
  \n4. **将发现结果与基本面评估流程的其他部分相结合**\n\n#### 结果评估\n\n如果 NVTS 处于高位峰值，则资产可能被高估——考虑通过减少头寸来降低和管理风险。相反，如果\
  \ NVTS 较低，则可能表明低估，这可能会带来潜在的积累机会。请务必结合近期趋势反转进行验证，并寻找与其他链上指标指示器的协同效应。\n\n## 库存流量模型\n\
  \n**评估目标：评估库存流量模型，以帮助预测比特币的长期价格走势。**\n\n库存流量 (S2F) 模型最初是一种用于评估黄金和白银等稀缺资源价值的金融概念，通过计算资产的现有供应量与其年产量之比来实现。一位化名为\
  \ [Plan B](https://x.com/100trillionUSD) 的人士采用了这个 S2F 模型，并对其进行了修改，将其应用于比特币。在该模型中，比特币的稀缺性通过将其“库存”（所有已被挖掘并正在流通的比特币）除以其“流量”（每年新挖出并进入生态系统的比特币数量）来评估。\n\
  \n长期投资者使用此模型来帮助预测供应量上限为 2100 万枚的比特币的长期价格走势。由于比特币的发行是算法控制的，S2F 模型可以帮助估算 BTC 相对于黄金等其他资产的潜在未来价值。通过\
  \ `减半`——BTC 挖矿奖励每四年减少 50% 的过程——比特币将变得更加稀缺和难以获得，使 S2F 比率翻倍，并可能提升其价值。\n\n图 9-35 展示了由\
  \ [Bitcoin Magazine Pro](https://www.bitcoinmagazinepro.com/) 显示的比特币 S2F 模型。x 轴代表时间（与\
  \ S2F 比率相关联），y 轴代表每枚 BTC 的价格。为了减少市场波动的影响，S2F 比率线采用了 365 天平均值。价格线叠加在 S2F 比率线上方，彩色点标记了距离下一次比特币减半（在撰写本书时为\
  \ 2028 年）的天数。理论是，投资者可以通过观察预测的 S2F 线来预测价格可能走向何处。自 2012 年以来，比特币的价格总体上一直跟随 S2F 比率，围绕其波动，但总体与其上升轨迹保持一致。请注意价格如何每四年上涨一次，如标记比特币减半事件的垂直虚线所示。这是由于比特币挖矿奖励减半\
  \ 50%，使其变得更加稀缺。\n\n在 S2F 图表的底部是一个背离工具，或称为 `比特币库存流量偏差`，它显示了价格与库存流量之间的差异。它使投资者能够快速了解价格如何在市场周期中与库存流量相互作用。当价格移动到\
  \ S2F 线上方时，偏差线从绿色变为红色。相反，当价格移动到 S2F 线下方时，偏差工具从红色变为绿色。偏差线向任一方向偏离 S2F 水平的程度越大，潜在价格修正的可能性就越高，正如\
  \ S2F 偏差概念所指示的那样。\n\n![图表标题为“比特币：库存流量模型”，显示了从 2010 年到 2028 年以美元计价的比特币价格。y 轴代表 BTC\
  \ 价格，范围从 1 美元到 100 万美元，x 轴显示年份。图表包括一条表示价格变化的多色线、一条表示库存流量平均值的红线以及一条表示模型方差的绿线。右侧的颜色渐变表示距离下次减半的天数，范围从\
  \ 0 到 1400。关键事件如减半日期已被标记。图表带有“Bitcoin Magazine Pro”品牌标识。](img/648696_1_En_9_Fig35_HTML.jpg)\n\
  \n图 9-35\n比特币库存流量模型（数据来源自 [`www.bitcoinmagazinepro.com/charts/stock-to-flow-model/`](https://www.bitcoinmagazinepro.com/charts/stock-to-flow-model/)）\n\
  \n\n\n### 行动步骤\n\n请按照以下步骤评估`stock-to-flow`模型，以帮助预测比特币的长期价格走势。\n\n1.  **使用库存流量模型追踪比特币价格**\n\
  \n    访问 [Bitcoin Magazine](https://www.bitcoinmagazinepro.com/) Pro、`Glassnode.com`（或同类网站）查看并使用`S2F`链上指标。\n\
  \    1.  检查比特币当前价格相对于`S2F`比率线的位置。\n    2.  使用背离工具检查比特币相对于`S2F`模型是否被高估或低估。\n    3.\
  \  检查距离下一次减半事件还有多少天。\n    4.  定期监测比特币价格与`S2F`线的关系。\n\n2.  **使用背离工具判断市场情绪**\n\n \
  \   利用`S2F`图表底部的背离工具来评估潜在的买入或卖出信号。\n\n3.  **用自己的方式做笔记并记录发现**\n\n4.  **将发现结果与基本面评估流程的其他部分相结合**\n\
  \n#### 结果评估\n\n根据`S2F`模型，如果价格上涨超过`S2F`线，则可能被高估，这意味着潜在的获利了结机会。另一方面，如果价格跌破`S2F`比率线，则可能表明被低估，是一个有吸引力的投资入场点。在使用`S2F`模型指标时，请始终使用背离工具。\n\
  \n需要注意的是，尽管一些人对`S2F`模型持怀疑态度，且存在预期价格波动之外的情况，但根据历史趋势，该模型仍然证明了其有效性。尽管如此，建议仅将此工具作为评估长期投资机会的粗略指南。`S2F`模型还应与一系列其他链上及链下指标结合使用，以提高准确性。\n\
  \n"
- "# 10. 项目团队\n\n本章重点介绍加密项目评估中最关键、也最常被忽视的一个方面：项目团队。团队被视为项目的重要驱动力和长期成功的必要因素。无论是什么项目，核心产品都始于几个拥有共同愿景的人，他们共同努力将产品变为现实。\n\
  \n然而，无论技术多么创新或先进，如果没有一个敬业的团队来推动竞争力、用户参与、反馈、推广、合作和日常运营，项目最终也会失败。请注意，即便有一个规模相当的团队持续在开发产品，也仍然不够。一个敬业的团队还必须具备正确的技能、专长、背景和经验，才能增添有意义的价值——不仅用于开发核心产品，还要处理业务开发、市场营销、财务管理、法律合规、代币经济和代币设计等关键方面。\n\
  \n不幸的是，许多项目团队严重缺乏透明度，这直接降低了投资者的信任，并且往往会对项目的成功和可持续性产生负面影响。如果一个团队拒绝公开其身份，或隐瞒可能直接影响你投资的内问题，你还会继续支持吗？很可能不会——我也是。另一个关键要素包括团队的支持程度，以及他们是否执行了足够数量的访谈、与社区沟通、并解决所有问题和疑虑。\n\
  \n在本章结束时，投资者将更好地理解区块链项目背后的人员如何决定其成败。投资者将学习如何深入了解团队的背景、技能、公开形象以及在区块链领域的经验，以识别可靠的专业人士并发现任何危险信号。评估团队及其表现，能更清晰地判断该项目是否具备长久发展的能力——或者最好避而远之。\n\
  \n本章讨论的评估方法设计得相对简单，旨在为投资者提供一种直接且充分的方法，来评估区块链项目团队在经验、技术与非技术技能方面的表现。\n\n**本章讨论的基本面要素：**\n\
  \n- 公开身份\n- 项目团队成员\n- 背景与经验\n- 开发者团队规模\n- 项目支持\n- 团队访谈\n\n## 公开身份\n\n**评估目标：确定项目团队是公开分享其身份，还是保持匿名。**\n\
  \n项目团队被认为是核心产品或服务的初始驱动力，并在由内而外地塑造和发展项目中扮演着至关重要的角色。尽管其角色至关重要，但有些项目团队仍然保持匿名，这意味着他们的身份对公众是隐藏的。这背后有许多原因，包括保护自己免受负面攻击、维护隐私、应对监管合规问题，或者在区块链技术方面缺乏经验和能力。\n\
  \n**事实**\n\n比特币的匿名创造者，仅以中本聪这个名字为人所知，就是一个例子，说明一个由未知团队运作的项目也能取得杰出成就。\n\n在投资数字资产时，主要目标是降低风险。然而，当项目团队保持匿名时，由于缺乏问责制，财务损失的风险就会增加。这种透明度的缺乏使得欺诈活动（包括拉地毯骗局或价格操纵等骗局）更容易发生。另一方面，信誉良好的项目通常是开放和透明的；展示项目背后的团队能极大地建立用户和投资者的信任。公开可识别团队的核心优势如下：\n\
  \n- **信任** – 投资者、网络参与者和客户往往更信任一个开放透明的团队。信任有助于提升信誉和责任感，这对成功至关重要。\n- **问责制** – 有了可识别的团队，就有了额外的责任。团队成员需要履行其承诺，这提高了可靠性。\n\
  - **社区参与** – 公开身份的项目团队可以自由地与不断壮大的社区互动，分享新更新、进度报告和合作伙伴关系；回答问题；并公开处理社区和区块链参与者可能存在的疑虑。\n\
  - **信心** – 当投资者能够自由访问和评估团队成员的个人资料时，他们的信心会增强。\n- **合作伙伴关系** – 活跃在社交媒体、公共活动和问答环节，为建立新的合作伙伴关系、合资企业和其他独特机会敞开了大门。可见的团队还可以建立联系，并利用\
  \ LinkedIn 等平台的社交力量，其中一些关系可能会发展成为业务合作。\n- **专业人才** – 公开的项目团队极大地增加了吸引经验丰富的人才以组建全面团队的可能性。专业人士更倾向于加入一个能让自己被看见的团队，从而为他们的职业生涯增色添彩。\n\
  - **透明度** – 区块链技术的关键方面之一就是透明度。投资者、区块链用户和客户更倾向于青睐完全透明的项目，并证明他们没有什么可隐瞒的。\n- **挑战应对**\
  \ – 可见的团队能够更好地通过直接联系社区寻求帮助来克服障碍和挑战。\n\n**专业提示**\n\n如果某些团队成员的照片看起来可疑，请进行反向 [Google\
  \ 图片搜索](https://images.google.com/)，以确认这些头像照片是真实的还是从其他地方盗用的。\n\n\n\n### 行动步骤\n\n\
  请按照以下步骤判断项目团队是公开身份还是匿名运作。\n\n1.  **项目网站**  \n    检查项目网站上是否显示了团队成员的完整姓名、照片和职位头衔。请注意，项目网站上的任何团队简介都需通过\
  \ `LinkedIn` 进行验证。如果团队信息无法核实，请将其视为一个危险信号。\n\n2.  **LinkedIn**  \n    在 `LinkedIn`\
  \ 上搜索项目的公司页面，或点击项目网站上提供的链接。确认团队成员的 `LinkedIn` 个人资料是公开可查且对外开放的。\n\n3.  **线上曝光度**\
  \  \n    通过查看团队在社交媒体、项目博客、`X`、`Telegram` 上的活跃度，以及参与 `YouTube` 或播客访谈的情况，来评估其线上曝光度、透明度和可信度。\n\
  \n4.  **进行图片和名称搜索**  \n    在区块链世界内外，虚假图片和伪造的个人资料早已屡见不鲜。使用反向图片搜索来验证头像，并搜索团队成员姓名以确保其真实性。\n\
  \n5.  **自行记录并整理你的发现**\n\n6.  **将发现与其他基本面评估模块的结论相结合**\n\n#### 结果评估\n\n建议避开那些不对外公开身份的项目。既然有众多优质项目都将团队透明度作为优先考量，就无需为一个匿名团队承担额外的风险。\n\
  \n## 项目团队成员\n\n***评估目标：确定项目团队是否具备推动成功所需的关键专业人员。***\n\n项目团队可定义为出于相同兴趣和热情、共同开发和管理一个基于区块链的项目的一群人。一个典型的团队配置包含一套必要的专业领域组合，这对于交付高质量产品和实现长期成功至关重要。团队结构主要有两种类型，如下所示：\n\
  \n1.  **核心团队** – 负责做出关键决策、提供战略洞察并全面管理项目的主要团队成员。这些成员包括创始人、联合创始人、运营总监、市场营销专家、首席开发人员、业务拓展人员、法律专家、财务人员以及其他管理层角色。\n\
  \n2.  **扩展团队** – 为核心团队提供支持的个人。这些成员可能包括开源开发者、战略顾问、技术顾问、代币经济学与代币设计专家、财务顾问、社区经理以及意见领袖。\n\
  \n请注意，根据项目的规模和知名度，部分扩展团队成员可能会转为全职员工，成为核心团队的永久成员。此外，根据产品用例的不同，某些项目可能需要额外的专家来满足特定需求。例如，一个提供去中心化身份解决方案的项目，可能需要密码学安全或数据隐私合规方面的专家，以应对保护用户信息和遵守隐私法规方面的独特挑战。对于大多数项目而言，表\
  \ 10-1 中列出的专业人员构成了任何成功项目所必需的基础团队。\n\n**表 10-1** 加密项目团队中的关键专业人员\n\n| 区块链项目核心团队成员\
  \ | |\n| --- | --- |\n| 角色 | 职责 |\n| --- | --- |\n| 创始人/联合创始人及项目负责人 | 负责项目的愿景、方向和整体管理。\
  \ |\n| 开发者 | 精通软件开发、编程及区块链架构。负责构建并测试核心产品，例如 `dApp` 或区块链基础设施。 |\n| 设计师 | 负责核心产品及项目网站的\
  \ UI/UX 设计。 |\n| 经济学家/财务专家 | 协助设计项目的代币经济结构、代币设计及其他旨在实现可持续经济模型的财务考量。 |\n| 市场营销与公关专员\
  \ | 负责推广项目、管理公共关系并吸引投资者和用户。 |\n| 法律与合规专家 | 确保项目遵守相关法规及法律要求。 |\n| 业务拓展 | 负责制定增长战略、寻找新客户并助力项目的整体成功。\
  \ |\n| 代币经济学家/加密经济学专家 | 专攻代币生态系统的设计与优化，通过开发可持续经济模型、激励机制及治理框架来推动采用、协调利益相关者利益并确保生态系统的长期增长。\
  \ |\n| 顾问 | 为项目提供财务和技术方面的指导与支持。 |\n\n### 行动步骤\n\n请按照以下步骤确定项目团队是否包含推动成功所需的关键专业人员。\n\
  \n1.  **LinkedIn 公司页面**  \n    在项目网站上查找团队 `LinkedIn` 公司页面的链接，或在 `LinkedIn` 的“公司”分类下搜索以找到它。\n\
  \n2.  **按角色筛选**  \n    在 `LinkedIn` 公司页面上，按“人员”进行筛选。然后，搜索表 10-1 中列出的特定角色。\n    -\
  \   建议从创始人、CEO、联合创始人、软件开发人员、代币经济学家、业务拓展、市场营销等角色开始。\n    -   如果项目有独特的用例，请确认团队中包含满足其特定需求的专业人员，例如密码学安全专家、人工智能专家或数据隐私顾问。\n\
  \n3.  **自行记录并整理你的发现**\n\n4.  **将发现与其他基本面评估模块的结论相结合**\n\n#### 结果评估\n\n如果项目缺少在 `LinkedIn`\
  \ 公司简介页面上无法看到的必要团队成员，那么建议在联系团队澄清情况之前保持谨慎。请注意，这些成员对项目的成功至关重要，缺少他们，项目的某个或多个方面将受到影响，具体取决于团队缺失的是哪类专业人员。\n\
  \n\n\n"
- "# 背景与经验\n\n**评估目标：评估加密团队的法律合规性、背景与经验，确保其具备资质与能力，能够为项目的成功做出贡献。**\n\n项目团队，更具体地说，他们的背景、经验、声誉和技能，是决定项目成败的另一个关键因素。正如之前所讨论的，团队负责将项目变为现实，开发愿景、产品或服务，并执行整体战略。然而，即使确保了关键职位的人员配备，但如果每个成员缺乏高效完成手头任务的足够经验，也会损害项目的表现。虽然并非百分之百必要，但如果团队成员拥有区块链领域的经验，包括参与过以往成功的项目，这一点将非常值得赞赏。这样的专业知识使他们能够优化技能组合，从过去的错误中吸取教训，并从自身工作以及与其他区块链专业人士的合作中获得宝贵的见解。\n\
  \n深入调查团队历史的另一个关键原因是有助于避免欺诈项目和骗局。例如，2018 年，一个名为 [Pincoin](https://techcrunch.com/2018/04/13/exit-scammers-run-off-with-660-million-in-ico-earnings/%253Fguccounter%253D1%2526guce_referrer%253DaHR0cHM6Ly93d3cuZ29vZ2xlLmNvbS8%2526guce_referrer_sig%253DAQAAACtX5mBmXxM-LnsPnkC1W0ps3ERcpzVUZFnL7k_R-E1vsWzYTjUHaK7ugK0UiiyddZ-w6OkUbi2BNl7R7kfZrvKVm2qBKtZWUovJh68roCzR6naR6oqNvfqMGQ4gDyLUjkV3BgscQGUWuohArO6y84jdGZ1wt5T7wFymQ4obgVGI)\
  \ 的项目进行了首次代币发行（ICO），从大约 32,000 名投资者那里筹集了 6.6 亿美元。不久之后，该团队便卷款消失。另一家名为 [LoopX](https://www.zdnet.com/article/loopx-pulls-exit-scam-walks-away-with-4-5m-in-investor-funds/)\
  \ 的加密公司通过 ICO 筹集了 450 万美元后便销声匿迹，然后删除了其所有在线内容，让投资者血本无归。\n\n**事实**\n\n一个全面的项目团队应包含健康平衡的专业人士组合，他们在区块链、软件工程、金融、代币与代币经济学设计、市场营销和法律等领域拥有扎实的背景。\n\
  \n## 评估团队背景与经验\n\n分析项目团队的主要途径是通过领英（LinkedIn）。如果某个加密项目没有包含团队成员的领英页面，这是极不寻常的——如果发生这种情况，应将其视为一个危险信号。以下程序概述了评估不同项目团队成员的标准。请注意，团队成员的数量将根据项目的知名度而有所不同。例如，虽然一个新兴初创公司可能只有十到二十名成员，但像以太坊这样知名的项目则有超过数百名成员。话虽如此，并不需要评估所有成员，而应侧重于表\
  \ 10-1 中列出的关键角色。分析八到十个个人资料，就能对团队成员的质量、经验和可信度有一个全面的了解。\n\n1. **领英公司页面**\n\n   在项目网站上寻找团队领英公司页面的链接，或者在领英上搜索“公司”来找到它。\n\
  \n2. **按角色筛选**\n   1. 在领英上，在公司页面中按“人员”进行筛选。然后，搜索特定角色（例如，CEO 和开发者）以查看相应团队成员的资料。\n\
  \   2. 建议从创始人、CEO、联合创始人、软件开发者、代币经济学家、业务发展、市场营销等人员开始查看。\n\n3. **审查团队成员资料**\n\n  \
  \ 根据以下领英特定标准评估每个团队成员的个人资料。\n   1. **个人资料照片** – 确保该人员有头像。在谷歌图片上对该图片进行“反向图片搜索”，以帮助排除诈骗的可能性。\n\
  \   2. **关注者和人脉** – 该人员有粉丝和人脉吗？拥有 1000 以上的粉丝和 500 以上的人脉是值得赞赏的。\n   3. **关于部分** –\
  \ 这部分提供了个人工作经验和成就的简要总结。\n      1. 是否有任何在区块链技术方面或参与过往加密项目方面的突出点？\n      2. 是否有任何重大成就？\n\
  \   4. **动态** – 此部分仅显示个人在发布、分享和与其他帖子互动方面的动态。\n      1. 最近几天、几周和几个月内是否有足够的活跃度（这有助于证明个人资料的真实性和可信度）？\n\
  \      2. 是否有对帖子的互动？如果有，发表评论的人是否是合法资料？\n   5. **经历**\n      1. 他们之前曾在哪些公司工作过？\n\
  \      2. 他们在那里工作了多长时间？\n      3. 他们以前工作过的公司知名吗？\n      4. 这些公司在领英上有公司页面吗？如果有，它们看起来合法吗？\n\
  \      5. 该人员是否曾拥有或共同创立过以前的加密或金融公司？如果是，这些公司成功吗？\n      6. 该人员在以前的职位上有哪些任务和职责？\n\
  \      7. 在以往工作中获得的技能和专业知识是否与当前的项目和职位相辅相成？\n      8. 自从职业生涯开始以来，他们是否一直在进步？\n   6.\
  \ **教育** – 此部分列出了个人的全部教育经历。虽然拥有完整的区块链相关背景值得赞赏，但这并非必需。这适用于各种专业人士，包括网络开发者、营销专家以及法律和财务顾问。\n\
  \      1. 该人员是否拥有与其当前或过去职位相匹配的足够教育背景？\n      2. 该专业人士近期是否参加过课程以跟上技术进步的步伐？\n    \
  \  3. 专业学位、硕士和博士学位是否来自经认可的机构和大学？\n   7. **执照与认证** – 任何专业执照和认证都列在此部分。\n      1. 该人员是否拥有与项目需求互补的任何专业认证？\n\
  \      2. 这些执照和认证是近期获取且仍然有效的吗？\n      3. 这些执照和认证是否经过认证？\n   8. **技能** – 在此资料部分，个人列出了他们的技能。\n\
  \      1. 评估列出的技能，重点关注那些得到其他专业人士认可的技能。\n      2. 这些获得认可的技能是否与区块链项目所需的技能和专业知识相符？\n\
  \   9. **推荐信** – 在这里，你会找到来自其他专业人士（通常是曾与该人员共事的人）的推荐。由于任何人都可以给出推荐，因此最好进行一些快速核查：\n\
  \      1. 通过查看给出推荐的人的个人资料，来检查任何“推荐信”的有效性。\n      2. 检查双方的工作经历，以确定他们是否真的共事过。\n  \
  \ 10. **发表物** – 此部分列出了任何发表物。\n       1. 点击发表物的链接，检查其有效性。\n       2. 这些发表物是否与该专业人士在项目中的职位直接相关？\n\
  \n**专业提示**\n\n访问该人员以前工作过的领英公司页面。查看他们当前员工的资料以确保真实性。确保这些员工已填写了可验证的领英资料，并显示他们曾在合法的公司工作过。\n\
  \n\n\n### 行动步骤\n\n按照以下步骤评估加密货币团队的合法性、背景和经验，确保他们具备资质且有能力为项目成功做出贡献。\n\n1.  **通过领英评估项目团队的经验和背景**\
  \  \n    按照本节所述，评估项目团队的合法性、背景、经验及成就。\n\n2.  **通过其他来源进行核实**  \n    在网上搜索各种来源，查找有关该团队及其经验、成就等信息。查阅\
  \ [CoinDesk](https://www.coindesk.com/)、[The Defiant](https://thedefiant.io/)、[Pomp](https://www.youtube.com/c/anthonypompliano)、[CoinTelegraph](https://cointelegraph.com/)、[Decrypt](https://decrypt.co/)、[CryptoSlate](https://cryptoslate.com/)\
  \ 等网站的文章，以及 [X](https://x.com/home%253Flang%253Den) 和 [YouTube](https://www.youtube.com/)\
  \ 等社交媒体平台。\n\n3.  **记录笔记，并以你自己的风格记录发现**\n\n4.  **将发现与基本面评估流程的其他部分相结合**\n\n#### 评估结果\n\
  \n加密货币项目必须在领英上拥有公司页面，且团队成员必须是合法且完全可验证的。如果你无法确认这一点，请将其视为一个危险信号。至少，团队成员——尤其是核心团队成员——应具备区块链或金融领域的经验，这有助于建立对项目成功潜力的信心。\n\
  \n## 开发者团队规模\n\n**评估目标：确定项目团队的开发者人数，以确保项目拥有足够的人才来构建、改进和扩展其产品，同时保持竞争力。**\n\n开发者被认为是构成任何基于区块链的项目基础的、核心的基石要素之一。没有活跃的开发者基础，大多数项目会陷入停滞并面临僵化风险——尽管少数模因币或分叉链在无需大量持续工作的情况下仍能存续。开发者的职责涵盖从区块链基础设施开发、去中心化应用（dApps）、智能合约、通过\
  \ API 集成软件应用、发现和消除漏洞、产品测试、实施持续更新等诸多方面。\n\n规模适中的开发者团队对任何项目来说都是一项重要资产。拥有足够的开发者，工作可以高效分配，使每个开发者能专注于各自的专长领域，例如构建区块链基础设施、智能合约、去中心化应用、压力测试以及应对各种技术挑战。大型团队还能随项目扩展而成长，行动更迅速，并通过均衡分配工作负荷来避免过度疲劳。\n\
  \n在大多数情况下，项目会由几位核心团队开发者组成，并辅以更多来自社区的、为项目贡献力量的开源开发者——通常使用 [GitHub](https://github.com/)\
  \ 等软件进行协作。例如，在撰写本文时，[Polkadot Network](https://www.linkedin.com/company/polkadot-network/people/%253Fkeywords%253Ddevelopers)\
  \ 列出了大约三十位核心开发者——你可以在领英上看到一个大致的数字，但更可靠的衡量标准是其 GitHub，上面显示有 [409 位开源贡献者](https://github.com/paritytech/polkadot-sdk)。对于\
  \ Polkadot 这类热门项目，这样的开发者团队规模是标准的；然而，并非每个项目都如此。\n\n加密货币项目的团队规模，包括开发者人数，因诸多因素而异，例如项目类型（如\
  \ dApp 或基础设施）、项目阶段、项目预算、复杂程度，以及市场条件和劳动力需求等外部因素。新启动的项目的核心团队和开源贡献者人数会明显较少，而受欢迎且成功的项目则能吸引整个行业内开发者社区更多的关注，从而获得更多的核心团队和开源开发者。\n\
  \n鉴于所有这些变量，投资者很难精确预测一个项目应该拥有多少开发者。根据一般经验法则，核心团队中至少有十名开发者是值得赞赏的。开源开发者的人数会因项目的热门程度而有巨大差异；因此，建议通过评估直接竞争对手来获得准确的见解。\n\
  \n### 成立年份\n\n在分析项目核心团队的开发者人数时，考虑项目的成立年份是有益的。例如，假设一个项目仅仅在几个月前启动。在这种情况下，期望一个较小的团队是合理的，因为他们可能仍在积聚势头并吸引新成员加入社区。然而，对于一个已经存在一段时间（例如超过一年）但仍然只有少数开发者的项目来说，这被认为是一个危险信号。这可能表明他们的产品或服务不佳、资金困难、社区兴趣不高，或者这些因素兼而有之。考虑到成立年份，投资者可以更好地判断团队规模是否符合其成长阶段，以及这对项目的长期潜力可能意味着什么。\n\
  \n### 行动步骤\n\n按照以下步骤确定项目团队的开发者人数，以确保项目拥有足够的人才来构建、改进和扩展其产品，同时保持竞争力。\n\n1.  **确定项目团队的开发者人数**\n\
  \    1.  访问项目网站，找到其领英公司页面的链接，该链接通常位于“团队”或“关于”部分。如果找不到，请在领英上使用搜索栏中的“公司”过滤器搜索该项目。\n\
  \    2.  按“人员”进行筛选。\n    3.  **按专业职位筛选** – 在领英搜索栏中按开发者职位进行筛选（例如，搜索“开发者”、“软件工程师”、“区块链工程师”等）。这将显示在该项目团队中工作的开发者人数。\n\
  \    4.  **查看 GitHub 贡献者** – 打开项目的主要 GitHub 仓库，查看右侧面板上的“贡献者”模块；显示的数字是已提交代码的个人总数，可以快速了解项目周边的更广泛的开发者社区规模。\n\
  \n2.  **竞争对手分析**  \n    将核心团队的开发者人数与竞争对手进行比较。\n\n3.  **成立年份**  \n    访问项目的领英页面，进入“关于”部分，并查看底部的“成立”副标题，以此找到该加密货币公司的成立年份。有关成立年份的更多详情，请参阅第\
  \ 4 章“核心产品”中的“成立年份”一节。\n\n4.  **记录笔记，并以你自己的风格记录发现**\n\n5.  **将发现与基本面评估流程的其他部分相结合**\n\
  \n#### 评估结果\n\n如果项目已经存在超过一年，但核心开发者仍然少于十人，这表明缺乏成长和成功，是一个潜在的危险信号。对于仅成立几个月的新项目来说，拥有\
  \ 5-10 名核心开发者是正常现象。然而，超过二十人是值得赞赏的，因为这显示了强劲的活跃度和受欢迎程度。\n\n\n\n"
- "# 项目支持\n\n**评估目标：判断团队为其用户、开发者及更广泛社群所提供的支持水平。**\n\n提供充足的项目支持对于每一个加密项目都至关重要。理想情况下，核心团队——或者，在更去中心化的项目中，一个组织良好的贡献者社群——应提供清晰的资源，帮助用户、开发者和新手理解产品、其风险以及其所依赖的技术。如果团队支持不足，项目将难以获得发展动力，这被视为团队可扩展性有限且缺乏长期承诺的早期预警信号。\n\
  \n为了帮助判断项目团队是否提供了良好的项目支持水平，请使用以下标准进行评估。这些问题的答案通常可以在项目网站上找到，其中包含指向其技术文档、白皮书、开发者门户、社交渠道以及项目博客等其他资源的链接。如果明显缺乏此类信息，请将其视为一个危险信号，并联系项目团队寻求帮助和澄清。\n\
  \n1.  **可访问的用户教育资源**\n    1.  是否有足够的信息（例如指南、教程和常见问题解答）可供用户快速了解如何操作该产品或服务？\n    2.\
  \  是否提供了关于节点设置、验证者参与或类似技术任务的详细说明？\n    3.  团队是否提供了与项目相关的技术性和非技术性材料，包括区块链操作、安全性、最新发展、质押、耕作、挖矿、节点设置等？\n\
  \n2.  **开发者支持与资源**\n    1.  项目是否提供诸如 API（应用程序编程接口）、SDK（软件开发工具包）其他工具集、库以及相应的技术文档？\n\
  \    2.  是否有开发者可以寻求帮助的活跃论坛或沟通渠道？\n\n3.  **客户支持渠道**\n    1.  是否容易联系到项目团队？\n    2.\
  \  团队在 X、Discord、Telegram、YouTube 或电子邮件等平台上是否响应迅速？是否存在未回答的问题或疑虑？\n    3.  通过项目的社交媒体渠道分析社区评论和整体情绪。\n\
  \n4.  **社区参与度**\n    1.  检查团队是否举办过 AMA（“有问必答”活动）。这些活动在项目生命周期初期特别有用。\n    2.  团队是否在社交媒体上积极发帖？\n\
  \    3.  团队在技术更新、合作伙伴关系、内外挑战、其他问题或疑虑方面是否保持透明和开放？\n\n### 行动步骤\n\n按照以下步骤评估团队对其用户、开发者及更广泛社群的支持水平。\n\
  \n1.  **确定项目支持水平**\n    使用本节概述的分析标准，评估团队对其用户、开发者及更广泛社群的支持水平。\n\n2.  **做笔记并以你自己的风格记录你的发现**\n\
  \n3.  **将发现与基础评估过程的其他部分相结合**\n\n#### 结果评估\n\n如果项目团队未能提供足够的支持，例如没有清晰的资源、与社区和开发者群体沟通不畅，或整体缺乏透明度，则将其视为一个危险信号。\n\
  \n## 团队访谈\n\n**评估目标：判断项目团队是否举办 AMA，以及他们是否捕捉并满足了社区的疑问和关切。**\n\n团队访谈至关重要，因为它们可以帮助投资者和更广泛的社区深入了解团队成员、他们的经验、技术能力、专业知识、专业精神、愿景，以及他们计划如何在竞争激烈的市场中取得成功。它们为团队提供了一个绝佳的机会来证明其承诺和透明度，这是区块链世界成功的关键因素。团队访谈也有助于团队在投资者中建立信誉和信任，而投资者往往会因为之前的诈骗或欺诈案例而持怀疑态度。因此，团队访谈远不止是简单的问答；它们提供了一个展示责任感并建立与投资者及更广泛社区信任关系坚实基础的机会。\n\
  \n### “有问必答”AMA\n\n团队访谈是组织性活动，通常在各种社交媒体平台上进行。参与方包括团队（管理层和/或开发者）、访谈者（频道主持人）、利益相关者、开源协作者以及社区成员。这些访谈活动被称为**AMA**（“有问必答”）。AMA\
  \ 指的是一种问答形式的访谈模式，起源于 Reddit，现在被用于区块链领域。\n\n**事实**\n\nAMA 活动通常在项目启动前和代币生成事件（TGE）前后举办，尤其是对于营销优先的项目。构建优先的团队通常会在形成用户基础后才开始举办\
  \ AMA，并且可能会定期举行，以保持社区的参与度和信息更新。\n\nAMA 通常在 [Telegram](https://telegram.org/)、[Discord](https://discord.com/)\
  \ 和 [YouTube](https://www.youtube.com/) 等社交平台上举办，之后通常会发布在项目的官方博客页面或首选的社交渠道上。AMA\
  \ 的邀请会发布在项目的社交媒体页面上，并且通常会得到很好的宣传。在访谈期间，会讨论与核心产品和价值主张、持续开发、新功能、路线图和合作伙伴关系相关的典型话题和更新。此外，AMA\
  \ 也用于解决公司面临的重大关切或问题，例如网络攻击、管理层变动或监管事项。在 AMA 结束时，社区有机会向团队提问，并有机会因参与而赢得奖励。\n\n###\
  \ 行动步骤\n\n按照以下步骤判断项目团队是否举办 AMA，以及他们是否捕捉并满足了社区的疑问和关切。\n\n1.  **定位 AMA 活动**\n    搜索项目的社交媒体渠道，如\
  \ Telegram、X、Medium 和 YouTube，查找过去或现在举行 AMA 的迹象。\n\n2.  **评估 AMA 活动**\n    在参与或回顾过去的\
  \ AMA 时，从以下几个方面评估团队：\n    1.  **透明度** – 团队是否对其项目的当前状态、未来计划以及面临的任何挑战完全透明？\n    2.\
  \  **响应能力** – 团队如何回应棘手和关键的问题？回避此类关键问题可能会给投资者敲响警钟。\n    3.  **可信度** – 团队是否以团队背景（包括区块链相关经验和成就）的形式展示了足够的可信度？\n\
  \    4.  **愿景与战略** – 团队是否对项目的长期愿景和目标充满热情？\n\n3.  **AMA 频率**\n    项目团队定期参与 AMA 被认为是良好做法。\n\
  \n    研究团队多久举办或参与一次 AMA 会议：\n    1.  **正式启动前** – 一些项目安排每两周一次的 AMA，以建设社区、展示透明度、激发热情，并阐明项目的路线图和愿景。\n\
  \    2.  **正式启动后** – 在产品上线且项目运营进入稳定阶段后，通常每季度或每半年举行一次 AMA，以提供更新并回应社区和投资者的关切。\n  \
  \  3.  **测试网/构建阶段** – 以构建为先的团队通常在公共测试网或测试版上线时开始举办 AMA，每月举行一次，在主网上线前回答技术问题并收集反馈。\n\
  \n4.  **做笔记并以你自己的风格记录你的发现**\n\n5.  **将发现与基础评估过程的其他部分相结合**\n\n\n\n#### 结果评估\n\n如果\
  \ AMA 结果显示团队**透明、响应积极且充满热情**，这向投资者表明团队尽职尽责，并建立了对项目的信任。而糟糕的结果，例如**含糊其辞的答复或缺乏参与感**，则预示着项目内部存在潜在问题。**过多缺乏实质内容的\
  \ AMA** 可能只是噪音，而**过少**则暗示团队参与度不足。\n\n如果 AMA 结果展现出透明度、响应性和热情，这是一个良好信号，表明团队尽心尽责且值得信赖。另一方面，含糊的回答或缺乏参与可能预示着问题。同时，要注意\
  \ AMA 的频率是否过高，因为频繁的更新可能只是噪音，而次数过少则可能表明团队参与度不高。\n\n"
- '# 11. 项目路线图


  路线图是战略规划的直观呈现。它勾勒并定义了计划、目标和核心可交付成果，例如为达成预定成果所需执行的关键里程碑。可将路线图视为一种高效且易于理解的沟通工具，它将战略与所有重要里程碑的时间线结合起来，并与相应日程保持一致。此外，它还能为开发团队、利益相关者和潜在投资者提供指导，让他们清晰了解项目的发展方向和进度。


  路线图展现了项目团队的愿景，是推动对话、向潜在合作伙伴、早期投资者和公众投资者传达愿景的工具。与项目时间表相似，它也非常适合对关键可交付成果进行优先级排序、分配资源、识别瓶颈以及追踪重要截止日期。路线图并非一成不变的文档，本质上是动态的。此外，它应具有足够的灵活性，以适应不断变化的市场条件、功能升级、里程碑完成更新、用户需求和技术创新。项目路线图通常可通过公司官网、白皮书、社交媒体和博客等官方项目渠道获取。


  对于加密货币投资者而言，评估项目路线图至关重要，因为它表明了团队是否拥有清晰的愿景、周密的计划、现实的目标以及兑现承诺的能力。路线图不仅仅是时间表，其主要目的是让项目团队对其承诺负责。它能让投资者分析项目的愿景、目的和目标，并识别潜在的危险信号，例如未能按时完成的里程碑或含糊的承诺。


  区块链领域存在多种不同类型的路线图，将在本章稍后部分讨论。图 11-1 是一个区块链开发者路线图的示例。该路线图由 [*https://roadmap.sh/blockchain*](https://roadmap.sh/blockchain)
  创建，作为开发者的指南，帮助识别和导航区块链领域的各个开发区域。


  **本章讨论的基础知识：**


