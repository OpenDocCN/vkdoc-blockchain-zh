- fmt: '### Reaching Consensus


    How the transactions are ordered and included in the blockchain’s blocks will
    depend on the `consensus algorithm` of the network. Since we are dealing with
    a decentralized database, we need a way for all actors to agree on how changes
    are added to the chain. For instance, if a seller is offering an asset on the
    blockchain and two buyers rush to purchase it, how can a decentralized network
    decide who got first? Even worse, how do we prevent the seller from telling both
    buyers that they made the purchase and cash in twice?^([^(14)](#fn14)) We need
    a way to determine how transactions are chosen and ordered in order to have a
    single state of the blockchain. In other words, we need a way to establish a `consensus`
    on which blocks are added to the chain.


    Many public blockchains like Bitcoin or Ethereum rely on a consensus algorithm
    known as `proof-of-work`. A `proof-of-work` is a cryptographic proof that a significant
    amount of CPU cycles were spent performing a computation; in this case, computing
    a difficult number based on a block. In order for a block to be added to the blockchain,
    it must be accompanied by its `proof-of-work`. Any node can propose a new block
    and, if they submit it with its `proof-of-work`, it gets added to the blockchain.
    The node that gets to add a block receives a reward in return for their effort.^([^(15)](#fn15))
    Nodes that fulfill this role in the network are called `miners`,^([^(16)](#fn16))
    and whenever a new block is added, they all race to try and add the next to capture
    the corresponding reward.


    ### Note


    The mechanism for these proofs is actually quite simple. The identifier for every
    block in the chain is a hash that includes the identifier of the previous block,
    all transactions in the block, and a `nonce`. By changing the `nonce`, the calculated
    block’s digest will be completely different. In order to add a new block to the
    chain, this identifier must have a certain structure (begin with N zeros). Since
    it is not possible to predict what a digest will look like, a miner can only try
    calculating the block hash repeatedly while changing the `nonce` until he hits
    a digest that matches the requirements. This requires many attempts and is hence
    considered a `proof-of-work`.


    Remember that the entire infrastructure runs over a peer-to-peer decentralized
    network. This allows nodes to join and leave the network as they wish without
    requiring a centralized server. Here, the `proof-of-work` algorithm provides a
    way for new nodes to know which is the actual chain: they just need to look for
    the chain with the largest accumulated computing power invested.


    This also prevents a malicious actor from just altering a record on the chain
    and recomputing all subsequent block hashes, as we were discussing in the previous
    section. In order to do this, the attacker would need to solve all `proof-of-work`s
    from the block he changed onward, which requires more computing power than the
    rest of the miners in the network.


    ### Note


    There are other mechanisms for consensus besides `proof-of-work`. In Chapter [8](#476252_1_En_8_Chapter.xhtml),
    we will review with `proof-of-authority` and `proof-of-stake` as alternatives
    for building faster and smaller chains.


    The consensus algorithm is closely tied to the `finality` of the network. We say
    a transaction is `final` when we know it has been included in the blockchain and
    will not change. A transaction added in the most recent block is far from being
    considered `final`: if a miner manages to mine two blocks on a row starting from
    the next to last, they may generate a new chain that replaces the latest block
    and does not include that transaction.


    This is called a `reorganization`, and it is not uncommon in `proof-of-work` chains.
    To know that a transaction is `final`, we need to wait for several blocks to be
    mined on top of the one in which it was included, to ensure it will not change.
    The number of blocks will depend on the particular chain and how much confidence
    we need.


    ### On Throughput


    Solving a `proof-of-work` is computationally expensive by design. This by itself
    enforces a limit on the throughput of a blockchain, by forcing to solve a difficult
    puzzle every time a batch of transactions is to be added.


    However, there is another reason for limiting the number and complexity of transactions
    per second added to the chain: verifiability. In order to keep the blockchain
    decentralized, every node in the network needs to be able to verify that every
    transaction was legitimate and was carried out according to the established rules.
    If the network accepts a very large number of transactions per second, then only
    powerful devices would be able to verify the chain, leaving out of the network
    to any user that cannot access the necessary hardware. Thus, low throughput is
    related to guaranteeing public access to the blockchain.


    In particular, Ethereum is designed to handle about 15 transactions per second.
    Note that transactions can be more or less complex in Ethereum, since they may
    execute arbitrary computations, so this cap is actually related to how much effort
    is required to run and verify each of block’s transactions.


    Note that these few transactions per second are shared among all users and applications
    in the network, which is a very low limit even for a single traditional web application.
    We will see some approaches around this limitation in Chapter [8](#476252_1_En_8_Chapter.xhtml).


    ### From Bitcoin to Ethereum


    We have so far defined a blockchain as a public database, but we have not gone
    into *what* that database may contain. The first famous blockchain is used to
    track ownership of a digital currency, the bitcoin.


    Most of what we understand as a blockchain today was introduced in 2008 by Satoshi
    Nakamoto^([^(17)](#fn17)) in his “Bitcoin: A Peer-to-Peer Electronic Cash System”
    paper.^([^(18)](#fn18)) The paper is short and easy to read, and it packs most
    of the blockchain concepts used today. It introduces a “purely peer-to-peer version
    of electronic cash”, without any centralized owner or issuer.


    All in all, the Bitcoin blockchain is a public decentralized database that keeps
    track of the balance in bitcoin of its users and supports transactions for moving
    funds from one address to another. It is an implementation of a decentralized
    electronic payments platform.


    It’s worth mentioning that, besides plain transfers, Bitcoin also supports a limited
    scripting language. This language allows for constructs such as timelocks, which
    restrict a transfer from being executed until a certain time in the future, or
    multisignature transactions, which require multiple accounts to be in agreement
    to move an asset. However, what can be built with this language is still limited.


    It is with the goal to support arbitrary computation in the network that Ethereum
    came up.'
