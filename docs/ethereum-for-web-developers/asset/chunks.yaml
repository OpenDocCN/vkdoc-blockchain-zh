- fmt: '## Note


    The only way to get the return values from a function in a transaction is to call
    them from another contract: a contract that invokes `setGreeting` will have access
    to them, but an off-chain client that sends a transaction to the `Greeter` will
    not.


    Because of this reason, it is a common pattern in smart contract design that public
    state-changing functions emit an event with their return values (Listing [5-18](#476252_1_En_5_Chapter.xhtml#PC38)).
    This allows an externally owned account to call into such functions and retrieve
    the return values from the event arguments.


    ```

    function setGreeting(string memory _greeting)

    public payable returns (string memory, uint256)

    {

    greeting = _greeting;

    // This can only be accessed by a client off-chain

    emit GreetingSet(_greeting, address(this).balance);

    // This can only be accessed by another contract calling

    return (_greeting, address(this).balance);

    }

    Listing 5-18

    Emitting an event with data that mimics the return values, to make them accessible
    from a client

    ```


    ### A Transaction is Confirmed


    While it may be tempting to act upon a mined transaction immediately, transactions
    may be moved out of the blockchain due to reorganizations. This means that a mined
    transaction can go back to pending state and then either mined again or dropped
    — and can even produce different state changes when it is mined in a different
    context.


    Because of this, it may be prudent to wait for a certain number of confirmations
    before actually acting upon a transaction. What acting upon means depends on your
    use case, as well as the number of confirmations to wait. Remember that a confirmation
    is the number of blocks mined after the one that included a transaction: every
    new mined block is a new confirmation for your transaction. A reorganization becomes
    less and less probable as more blocks are added to the chain.


    Transaction confirmations can be measured by subscribing to new blocks on the
    network (see Chapter [4](#476252_1_En_4_Chapter.xhtml)), and counting the blocks
    since the transaction receipt. We can modify the code from the previous section
    to return only once a certain number of confirmations have occurred (Listing [5-19](#476252_1_En_5_Chapter.xhtml#PC39))
    instead of when the receipt is immediately available.


    ```

    function sendTransactionAwaitConfirmations(opts, confs) {

    const BLOCKS = ''newBlockHeaders'';

    return new Promise((resolve, reject) => {

    sendTransactionReturnHash(opts).then(hash => {

    const sub = web3.eth.subscribe(BLOCKS, (err, block) => {

    if (err) reject(err);

    // Instead of just checking that the receipt exists,

    // now we also check its age in blocks

    web3.eth.getTransactionReceipt(hash).then(receipt => {

    if (receipt &&

    block.number > receipt.blockNumber + confs) {

    sub.unsubscribe();

    resolve(receipt);

    }

    });

    });

    }).catch(reject);

    });

    }

    Listing 5-19

    Modifying the sendTransactionAwaitReceipt function to wait for a specific number
    of confirmations before returning the receipt. Note that it is important to fetch
    the transaction receipt again on every block, since it may have changed due to
    a chain reorganization

    ```


    Alternatively, `web3` also provides an event to track confirmations once the transaction
    was sent (Listing [5-20](#476252_1_En_5_Chapter.xhtml#PC40)), which performs a
    similar logic under the hood.


    ```

    > greeter.methods.setGreeting(''Hello!'')

    .send({ from, value })

    .on(''confirmation'', (number, receipt) => {

    if (number === 12) {

    console.log(receipt.events.GreetingSet.returnValues)

    }

    })

    Listing 5-20

    Awaiting 12 confirmations before acting upon a transaction using the confirmation
    event handler from web3

    ```


    ### Replacing a Transaction


    Transactions pending to be mined can be replaced by their sender, by hacking the
    nonce and gas price parameters. Remember that for a transaction to be valid, its
    nonce cannot have been previously used by its sender. Therefore, if the sender
    broadcasts a second transaction with the same nonce while the first one is still
    pending, both transactions will be eligible to be mined, though only one will.
    To enforce the second one to be picked, the sender only needs to issue it with
    a higher gas price than the first one.


    An easy way to test this is to issue a first transaction with a very low gas price
    to ensure it takes several blocks to be mined, so we have enough time to send
    the second one to replace it. Make sure to test this in a network without instant
    seal; otherwise, the first transaction will be mined immediately.


    ```

    // Send first transaction for a value of 0.02 ETH

    > let to = accounts[1]

    > let value = 2e16

    > let gasPrice = 100

    > let txOpts = { from, to, value, gasPrice };

    > let txHash = await sendTransactionReturnHash(txOpts)

    // Retrieve nonce

    > let { nonce } = await web3.eth.getTransaction(txHash)

    // Send replacement with different value and higher gas price

    > value = 1e16

    > gasPrice = 20e9

    > txOpts = { from, to, value, gasPrice, nonce}

    > let txHashReplace = await sendTransactionReturnHash(txOpts)

    // Verify that only the replacement tx got mined

    > await web3.eth.getTransactionReceipt(txHash)

    null

    > await web3.eth.getTransactionReceipt(txHashReplace)

    { status: true, ... }

    ```


    Replacement transactions have multiple uses, since the second transaction does
    not need to have anything in common with the original one, except for the nonce
    and the sender account:


    - The most common usage for replacement transactions is to speed up the original
    one. If you detect that a transaction is taking too long to be mined, you may
    simply resubmit it with the exact same parameters but a higher gas price to make
    it more attractive to miners. This is also a simple pattern to implement in terms
    of UX: if you are showing a loading indicator to your user while the tx is processing,
    you could display an option to resubmit it, after a long period of time without
    news. `Metamask` already includes this feature in its UI out of the box.


    - Another usage is to simply cancel a transaction. If the user wants to undo a
    transaction already sent, a viable option is to send a no-op replacement transaction
    that removes the previous one. A no-op transaction can be as simple as a transaction
    of 0 ETH with no data where the recipient address is the same as the sender.


    - Alternatively, a replacement transaction can be sent to change a parameter of
    a previous transaction, as a means to amend the previous one. This will depend
    heavily on your use case, and needs to be executable by the user quickly, since
    the window for getting a transaction replaced may be short if the original gas
    price was already high.'
