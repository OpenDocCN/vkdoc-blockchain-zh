    # 升级用户账户


    正如我们所看到的，身份合约可以为用户集成多种功能，例如双因素认证、社交恢复、每日转账限额等。这引出了一个问题：*应该*将这些合约构建成什么样。由于合约是不可变的，任何添加新功能的变更都需要用户放弃当前的身份并部署新的合约。然而，强迫用户将所有资产转移到新合约，就相当于要求他们在想使用新功能时，必须迁移到一个新的电子邮件账户——包括在他们可能使用的所有在线服务中更改电子邮件地址。


    尽管如此，在以太坊中，合约部署后实际上是可以升级的，从而允许像传统软件开发一样进行迭代部署和错误修复。要实现这一点，我们首先需要熟悉以太坊虚拟机（EVM）中的*委托调用*概念。


    ## `DELEGATECALL` 指令


    在 EVM 中，从一个合约到另一个合约的常规 `CALL` 就像从一个角色或进程向另一个发起调用：会创建一个新的上下文，其中加载被调用者的状态（存储和余额），调用者被设置为
    `msg.sender`，并执行被调用者的代码。另一方面，`DELEGATECALL` 的工作方式是执行被调用者的代码，但*保持调用者的原始上下文*。换句话说，存储、余额甚至
    `msg.sender` 都不会因 `DELEGATECALL` 而改变——只有正在执行的代码会改变。


    这个底层指令允许我们跳转到任意合约并执行其代码，而该代码实际上会修改当前合约的状态。被调用的合约则充当库的角色，^(¹⁰⁶) 仅用作共享代码的存储库，而不使用其自身状态。


    ## 委托代理


    `DELEGATECALL` 指令允许我们构建一个合约，该合约简单地将所有调用委托给另一个持有实际执行逻辑的合约。这些合约通常被称为*委托代理*，因为它们将所有调用委托给另一个合约；或者被称为*透明代理*，因为任何与之交互的客户端都察觉不到它们的存在。由代理调用、持有实际执行代码的合约通常被称为*逻辑合约*、*实现合约*或*主副本*。


    一个委托代理（列表 7-16）可以在 Solidity 中实现为一个合约，该合约将其实现合约的地址作为唯一的 state 变量，并且只有一个回退函数，在该函数中它将所有调用委托给实现合约。代理将在其构造函数中接收实现地址，并可选地接收用于初始化它的
    `calldata`。


    ```

    // 06-upgrading-identity-contracts/contracts/DelegateProxy.sol

    contract DelegateProxy {

    // 将地址存储在第一槽位

    // 目标合约必须将地址定义为第一个变量

    address private implementation;


    constructor(

    address _implementation,

    bytes memory _data

    ) public payable {

    implementation = _implementation;

    if (_data.length > 0) {

    (bool success,) = _implementation.delegatecall(_data);

    require(success);

    }

    }


    // 回退函数将所有调用委托给实现合约

    function () payable external {

    address impl = implementation;

    assembly {

    calldatacopy(0, 0, calldatasize)

    let result := delegatecall(

    gas, impl, 0, calldatasize, 0, 0

    )

    returndatacopy(0, 0, returndatasize)

    switch result

    case 0 { revert(0, returndatasize) }

    default { return(0, returndatasize) }

    }

    }

    }

    列表 7-16

    基于 github.com/zeppelinos/zos 代码实现的委托代理合约。注意回退函数中使用了汇编，因为 Solidity 不允许回退函数返回任意数据。如果我们不返回任何数据，那么任何对合约的调用都将产生空响应

    ```


    ### 注意事项


    在 EVM 中正确实现可升级性可能非常棘手，并且会有一些限制。例如，代理合约在创建时无法执行逻辑合约的构造函数，因此任何需要可升级的合约都必须依赖充当*初始化器*的常规函数。另一个问题是，如果将一个代理更新为具有不同
    state 变量集的逻辑合约，可能会无意中损坏合约的状态。如果你计划在应用中使用可升级合约（无论是智能账户还是其他任何合约），强烈建议使用现有的可升级性解决方案，而不是自行开发。


    这里的关键概念是，逻辑合约的地址不需要硬编码到代理中——它实际上可以保存在存储中。当这个地址被更改时，这就能有效地更新代理正在执行的代码，同时保留其状态和地址。我们现在可以将此功能添加到我们的身份合约中。


    ## 可升级身份


    有了这个新的构建块，我们可以部署一个单一的身份合约作为逻辑合约，并为每个用户部署一个代理。请记住，由于所有状态都保存在代理中，因此逻辑合约不需要多个副本，单个副本（像一个库）可以在多个代理之间共享。


    这不仅节省了部署时的 Gas 费用（因为代理合约比身份合约小得多，因此更便宜），还允许我们的用户在需要时随时升级到不同的身份合约。让我们将*升级*功能构建到我们新的可升级身份中（列表
    7-17）。


    ```

    // 06-upgrading-identity-contracts/.../UpgradeableIdentity.sol

    contract UpgradeableIdentity {

    // 第一个变量用于实现合约地址

    // 记住：代理使用了相同的变量位置！

    address private implementation;


    // 记录此实例是否已被初始化

    bool private initialized;


    // 初始化函数，替代构造函数

    function initialize(address owner) public payable {

    require(!initialized);

    initialized = true;

    accounts[owner] = true;

    emit AccountAdded(owner);

    }


    // 升级到新的实现

    function upgradeTo(

    address newImplementation

    ) onlyUserAccount public {

    implementation = newImplementation;

    }


    // 其余的身份合约代码在此...

    }

    列表 7-17

    支持可升级性的身份合约变体。注意，合约的第一个变量是实现合约地址，构造函数已被一个常规函数替代，该函数依靠一个标志来记录实例是否已被初始化。升级到不同的身份实现只需更改存储中第一个位置上的实现地址即可

    ```


    请记住，此合约上定义的任何 state 变量实际上都不会存储在此合约的存储中，而是存储在代理的存储中——这要归功于委托调用的魔力。例如，`initialized`
    标志实际上并没有在作为共享实现的单个 `UpgradeableIdentity` 合约上设置，而是在每个以此为后端的代理上设置。


    因此，此合约声明的第一个变量必须是实现地址，就像在代理中一样。此外，合约不能扩展定义额外合约变量的任何基础合约。这确保了实现地址存储在代理查找它的相同存储位置。^(¹⁰⁷)

    '
- fmt: '### Note


    Contract upgradeability is a contentious issue for many in Ethereum. Having immutable
    contracts allows users to trust an application by knowing that the rules defined
    by it will not be subject to change. Adding upgradeability breaks this guarantee.
    However, this is not an issue with upgradeability itself, but with *who* can decide
    when a contract is upgraded. Having a decentralized token being controlled by
    a single developer who can unilaterally modify the contract by, let’s say, adding
    a transaction tax, is definitely not good. On the other hand, a contract that
    has a clear owner (or set of owners) is a good candidate to be upgradeable – and
    in this an identity contract is a perfect example.


    Creating an identity contract for a user now implies deploying not a contract
    instance but a proxy – assuming we have already deployed the single shared implementation
    contract (Listing [7-18](#476252_1_En_7_Chapter.xhtml#PC26)).


    ```

    // 06-upgrading-identity-contracts/index.js

    // Logic contract is a pre-deployed instance of Identity

    let logic = new web3.eth.Contract(identityABI, identityAddr);

    // Build initialization data to call initialize(user)

    // when the proxy is created

    let initData = logic.methods.initialize(user).encodeABI();

    // Deploy the proxy using the identity contract as

    // its implementation, and setting user as its initial owner

    let proxy = await new web3.eth.Contract(proxyABI, null, { data: proxyBin })

    .deploy({ arguments: [logic.options.address, initData] })

    .send({ from: application, gasPrice: 1e9, value: 1e18 });

    Listing 7-18

    Creating a proxy to an identity contract. Note that we need to use the logic contract
    ABI to build the initialization data and then use it when deploying the proxy

    ```


    After the proxy is deployed, we can interact with it as if it were a regular identity
    contract. We need to create a new web3 contract object using the identity contract
    ABI, with the proxy’s address (Listing [7-19](#476252_1_En_7_Chapter.xhtml#PC27)).


    ```

    let proxyAddr = proxy.options.address;

    let identity = new web3.eth.Contract(identityABI, proxyAddr);

    await identity.methods

    .addAccount(anotherDevice)

    .send({ from: user });

    Listing 7-19

    Interacting with the newly deployed proxy as if it were a regular identity contract.
    The proxy will delegate all calls to the logic contract and behave exactly like
    one

    ```


    As with any other method from the identity contract, the user can call into the
    upgrade function and switch to a different implementation (Listing [7-20](#476252_1_En_7_Chapter.xhtml#PC28)).
    It is important to note though that the new implementation must have the same
    contract state variables as the original one; otherwise, the proxy’s state may
    be corrupted.


    ```

    await identity.methods

    .upgradeTo(identityV2addr)

    .send({ from: user });

    Listing 7-20

    Upgrading to a V2 of the identity contract. The user’s identity address is unmodified,
    as is its balance and state, but it has access to new code with potentially new
    features and bugfixes

    ```


    Implementing this pattern in smart accounts allows us to iteratively develop our
    application by gradually adding support for new features or fixing bugs and allows
    our users to adopt them when they want.


    A good example of a feature we may want to add to our identity contracts is meta
    transaction support, which we will see in the next section.


    ## Gasless Transactions


    One of the root problems on user onboarding is that interacting with the Ethereum
    network requires ETH to begin with in order to be able to pay for gas fees. This
    involves an annoying set of steps just to make an initial ETH purchase with other
    currency. Gas fees are also problematic in multi-device solutions: all of a user’s
    devices must hold a bit of ETH just to run any transactions, even when relying
    on a smart account to centralize the user identity.


    All of the above means that removing the requirement of gas for issuing Ethereum
    transactions yields major benefits in terms of usability. *Gasless transactions*,
    also referred to as *meta transactions*, tackle this problem by offering a mechanism
    to decouple the author of the transaction from the payer of the gas. In other
    words, an account can issue a transaction, while other pays for its execution.
    This allows users in your application to execute any transactions without needing
    to worry about having ETH to pay for their gas fees.


    ### Note


    Gasless transactions is one of the most actively developed techniques in the Ethereum
    ecosystem at the time of this writing, and already has many different flavors.
    This makes this section one of the most complex ones in the book. Feel free to
    gloss over the technical details, and consider looking into already established
    libraries, such as Universal Login, Marmo, or the Gas Station Network.


    ### Signatures in Ethereum


    To understand gasless transactions, we first need to review how signatures work
    in Ethereum. As we have seen before, an Ethereum transaction needs to be cryptographically
    *signed* with the sender’s private key in order to be valid. However, the user’s
    key can be used to sign not just a transaction, but any arbitrary message (Listing
    [7-21](#476252_1_En_7_Chapter.xhtml#PC29)).


    ```

    // 07-signing-messages/index.js

    // Import web3 and create an instance without a provider

    // since we will not be connecting to a node for now

    > const Web3 = require(''web3'');

    > const web3 = new Web3();

    // Sample address and corresponding private key

    > let address = ''0xaca94ef8bd5ffee41947b4585a84bda5a3d3da6e'';

    > let pk = ''0x829e924fdf021ba3dbbc4225ed'' +

    ''fece9aca04b929d6e75613329ca6f1d31c0bb4'';

    // Sign the hash of an arbitrary message

    > let message = ''Hello world''

    > let hash = web3.utils.keccak256(message);

    > let signed = web3.eth.accounts.sign(hash, pk)

    > signed.signature

    0x7fcfb176706502a00e58f74c15cd8151309d8b8a777eefd387eabc760a1aa7f6705699d1431155dfc7b1b1d7d88b3b24d07180107572b127a558b7a8b118cb4d1b

    Listing 7-21

    Using web3 to sign a message from a user with their private key108

    ```'
