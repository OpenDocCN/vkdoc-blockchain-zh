  trans: '

    ### 助记词


    一种去中心化的用户密钥备份替代方案是生成*助记词*。助记词是由一系列单词（通常为 12 到 24 个）组成的序列，便于用户手写保存。你在钱包创建账户时可能已经接触过它们。请记住，助记词仅作为密钥库丢失时的备份手段，因为要求用户每次使用应用时输入
    24 个单词序列是不合理的。


    助记词的主要优势在于，它提供了一种将数字信息（私钥）存储在传统物理介质（如纸张）中的方式。这样一来，即使用户的所有电子设备被盗或被黑客攻击，他们仍能通过这种传统方法恢复账户。


    不幸的是，无法从私钥逆向生成助记词。正如我们在第 5 章所见，推导过程是单向的：助记词用于计算扩展密钥，再由此派生出单个或多个私钥。这意味着如果你希望用户通过此方法备份账户，就需要从头构建该功能。


    为了创建助记词并从中派生种子，我们将使用`bip39`库。为了创建分层确定性钱包并派生私钥，我们将使用`ethereumjs-wallet`库（代码清单 7-9）。


    ```

    // 03-mnemonics/index.js

    const hdkey = require("ethereumjs-wallet/hdkey");

    const bip39 = require("bip39");

    let mnemonic = bip39.generateMnemonic();

    > sadness brief beauty strike donor capable recipe brand pretty hill orange inflict

    let hd = hdkey.fromMasterSeed(bip39.mnemonicToSeed(mnemonic));

    let path = "m/44''/60''/0''/0/0";

    let wallet = hdwallet.derivePath(path).getWallet();

    let pk = wallet.getPrivateKeyString();

    > 0xdc68f9ce62dd1f16eed...5f7feba7b3284d9

    代码清单 7-9

    创建助记词并派生对应的私钥。注意，通过使用不同的推导路径，可以从同一组助记词生成更多私钥

    ```


    这段代码允许你为用户账户生成助记词。请注意，你的用户需要在刷新页面之前将助记词保存在安全位置，因为你绝不应在任何地方存储明文的单词序列，这与存储未加密的私钥同样不安全。


    到目前为止，我们已经添加了若干机制来确保用户资金的安全，例如使用密码加密私钥，以及提供一组易于手写的单词用于备份。


    然而，我们同时也复制了最初试图避免的复杂性——这种复杂性导致大多数用户难以真正上手以太坊。尽管我们还会探讨其他方法，但本节的核心要点是让你了解可用的工具，从而在安全性、易用性和去中心化之间找到最适合你应用的平衡点。


    ## 智能账户


    本地钱包存在若干缺陷：不仅需要额外的保存步骤，而且对于从多个不同设备访问应用的用户而言，提供的选项非常有限。即使你可以依赖云服务在用户设备间同步加密的私钥，也无法实现从某台设备撤销访问权限。更糟糕的是，如果不将资金托管给第三方，就无法实现关键交易的双重身份验证等附加安全措施。


    幸运的是，我们已经拥有一个去中心化且安全的计算平台，可以依赖它为用户账户构建任何额外的安全性或恢复功能。这本质上是将用户的账户本身迁移到区块链上，作为合约存在。


    ### 身份即智能合约


    *智能账户*（也称为*身份合约*）的核心概念是：用户身份（及其资金）由一个智能合约代表，而不是由一个或多个外部拥有账户代表。用户控制着一个合约，该合约将用户的操作转发至其他应用程序，并集中持有用户的资产。从新设备管理此身份只需要注册一个新的外部拥有账户作为该合约的管理者即可。


    ### 注


    关于这些合约的研究有许多名称：身份合约、智能账户、"守门人"代理、多签钱包或钱包合约。这些合约通常与元交易或 Gas 中继（我们将在本章后面讨论）相伴相生。虽然很难确定谁最先提出了这个想法，但值得提及
    Alex Van de Sande、Philippe Castonguay、Panashe Mahachi、Austin Griffith、Christian
    Lundkvist 和 Fabian Vogelsteller 在此主题上的贡献。该领域的工作也受到了 Vitalik Buterin 提出的账户抽象提案^(¹⁰⁴)的启发，该提案旨在将外部拥有账户和合约账户合并为单一类型，并将签名验证的负担转移到
    EVM 上。


    将用户身份迁移到智能合约，使我们能够以无需信任的方式，直接在链上实现用户习惯的任何账户管理功能：


    - 用户可以注册多个设备，每个设备都有自己的外部拥有账户，用于管理同一个身份合约。

    - 不同的密钥可以拥有不同的访问权限：从管理身份合约本身，到仅能转移有限数量的资金。

    - 重大交易可能需要多个密钥共同确认操作，从而对关键操作实施双重身份验证（2FA）。

    - 可以通过指定一组受信任方来实现账户的社交恢复。这意味着你可以选择一个亲密朋友圈子，当你丢失密钥时，他们可以共同授予你重新访问身份合约的权限。该功能甚至可以扩展到遗嘱信托。


    请记住，使用智能账户并不能消除生成本地外部拥有账户的需求。如果用户尚未拥有支持 web3 的浏览器，我们的应用仍需要为每个设备创建一个本地密钥来管理身份合约。使用智能合约而非普通账户的改进之处在于，可以以去中心化的方式实现额外的安全性和恢复功能——例如，社交恢复可以作为手写
    24 词助记词的一种替代方案。

    '
- fmt: '### Sample Implementation


    The simplest version of an identity account (Listing [7-10](#476252_1_En_7_Chapter.xhtml#PC18))
    should handle two main concerns: managing the list of the user accounts authorized
    to operate on the contract and forwarding calls and transfers.


    ```

    // 04-identity-contracts/contracts/Identity.sol

    pragma solidity ^0.5.0;

    contract Identity {

    mapping(address => bool) public accounts;

    event AccountAdded(address indexed account);

    event AccountRemoved(address indexed account);

    constructor(address owner) public payable {

    accounts[owner] = true;

    emit AccountAdded(owner);

    }

    modifier onlyUser {

    require(accounts[msg.sender], "Sender is not recognized");

    _;

    }

    function addAccount(address newAccount) onlyUser public {

    accounts[newAccount] = true;

    emit AccountAdded(newAccount);

    }

    function removeAccount(address toRemove) onlyUser public {

    accounts[toRemove] = false;

    emit AccountRemoved(toRemove);

    }

    // Forward arbitrary calls and funds to a third party

    function forward(

    address to, uint256 value, bytes memory data

    ) onlyUser public returns (bytes memory) {

    (bool success, bytes memory returnData) =

    to.call.value(value)(data);

    require(success, "Forwarded call failed");

    return returnData;

    }

    // Empty fallback function to accept deposits

    function() external payable { }

    }

    Listing 7-10

    A very basic identity contract with support for managing user accounts and forwarding
    calls

    ```


    When this contract is first deployed, the user’s first account is registered.
    Any new account from a new device can then be registered from a previous one (Listing
    [7-11](#476252_1_En_7_Chapter.xhtml#PC19)).


    ```

    // 04-identity-contracts/index.js

    const identity = await new web3.eth.Contract(identityAbi)

    .deploy({ arguments: [mainDevice], data: identityBytecode })

    .send({ from: mainDevice, gasPrice: 1e9, value: 10e18 });

    await identity.methods.addAccount(anotherDevice)

    .send({ from: mainDevice });

    Listing 7-11

    Creating an identity contract funded with 10 ETH and adding a second device. In
    this example, mainDevice and anotherDevice are accounts created on the user’s
    devices

    ```


    Any of the two registered accounts can then use the `forward` method to send funds
    from the identity to a third party (Listing [7-12](#476252_1_En_7_Chapter.xhtml#PC20)).


    ```

    const emptyData = [];

    await identity.methods

    .forward(thirdParty, 1e18.toString(), emptyData)

    .send({ from: anotherDevice });

    await web3.eth.getBalance(identity.options.address);

    // => 9 ETH

    await web3.eth.getBalance(thirdParty);

    // => +1 ETH

    Listing 7-12

    Sending funds from the identity contract using anotherDevice

    ```


    Calling into another contract is similar; it just requires encoding the call to
    the contract and providing it as `data` to the forwarding function (Listing [7-13](#476252_1_En_7_Chapter.xhtml#PC21)).
    For example, we can call the `setGreeter` method from the `Greeter` contract we
    coded in previous chapters.


    ```

    const data = greeter.methods.setGreeting("Hey").encodeABI();

    await identity.methods

    .forward(greeter.options.address, "5000", data)

    .send({ from: anotherDevice });

    await greeter.methods.greet().call();

    // => "Hey"

    Listing 7-13

    Calling the setGreeting method of a greeter contract instance from the identity,
    including 5000 Wei in the transaction

    ```


    Most of the features discussed previously can be implemented on top of this base
    contract: accounts can be assigned different clearance levels, while restrictions
    based on the value transferred can be imposed on the forwarding function.


    A good example of this is a multi-signature wallet.^([(105)](#fn105)) These contracts
    are designed to have a number N of accounts registered, and every transaction
    requires at least M (with M < N) confirmations. While they are often used for
    safekeeping of large amounts of funds by distributing the keys among different
    members of a team, they can also be used for managing personal funds by assigning
    different keys to different devices.


    ### Deploying a Smart Account (Take One)


    Given that the focus of this chapter is to make user onboarding easier, requiring
    the user to not only generate a local externally owned account but also to deploy
    a contract, fund it, and register their devices on it seems like a step (or many)
    on the opposite direction.


    Nevertheless, many of these steps can be carried on by the application on behalf
    of the user – including deployments. After the user has performed a certain number
    of actions within our system, we can opt to deploy the identity contract on their
    behalf and transfer ownership of it to their account. Even though this implies
    costs in gas fees, in many cases this subsidy can be considered to be a necessary
    cost involved in user acquisition.


    However, a more decentralized (and cheaper for us) option is to rely on single-use
    addresses for setting up the contract. Our application can generate a local wallet
    behind the scenes to act as the initial owner of the identity contract (if the
    user does not have a web3 browser already), as well as a single-use address that
    can trigger the deployment and configuration of the smart account once funded.
    When the single-use address is funded from an exchange, the identity is deployed
    and seeded with a predefined amount of ETH. From that point on, the user operates
    directly via their new identity contract.


    ### Note


    Remember from the single-use addresses section that any extra funds sent to the
    address are irretrievably lost. The user must choose how much ETH they want to
    initially send to their identity and then create the transaction and fund it with
    exactly the resulting amount.


    Generating a single-use address for deploying a contract is similar to calling
    into a contract, with the difference that the transaction must be sent to the
    null address (Listing [7-14](#476252_1_En_7_Chapter.xhtml#PC22)).


    ```

    // 05-single-use-address-deploy-identity-contract/index.js

    let call = new web3.eth.Contract(identityABI)

    .deploy({ arguments:[owner], data: identityBytecode });

    let data = call.encodeABI(); // Encode data for deployment

    let gas = await call.estimateGas();

    let gasPrice = 1e9;

    let value = 1e18; // Seed identity with 1ETH on deployment

    let nonce = "0x00";

    let to = null; // Set tx recipient to null

    Listing 7-14

    Transaction parameters for deploying a contract. Note that the recipient is set
    as null, as we are creating a new contract instead of interacting with an existing
    one. Signature parameters are set as shown in the single-use addresses section
    of this chapter

    ```


    Another interesting property of this approach is that, since contract creation
    addresses are deterministic, it is possible to show the user their identity contract
    address *even before it is deployed* (Listing [7-15](#476252_1_En_7_Chapter.xhtml#PC23)).
    The address where a contract is deployed is a function of the sender''s address
    and nonce.


    ```

    const Util = require(''ethereumjs-util'');

    let deploymentAddress = ''0x'' + Util.generateAddress(

    Buffer.from(sender.substring(2), ''hex''),

    Buffer.from(nonce, ''hex'')

    ).toString(''hex'')

    Listing 7-15

    Precalculating the deployment address using the ethereumjs-util library

    ```


    However, an issue with this approach is that we are showing the user two different
    addresses: one address that he needs to fund one time for the deployment and another
    that will actually be their identity contract. This, compounded with the fact
    that any extra ETH sent to the address is lost, damages the user experience when
    setting up their smart account. We will analyze a more robust approach later in
    this chapter after we become familiarized with the concept of meta transactions.


    ### Note


    A much simpler option is to just have the user transfer their funds to their device
    account, whether it is local to our application or is managed by the web3 browser,
    and execute the deployment from it. However, this still has the issue of presenting
    two addresses to the user – one for initial funding and one for the identity.'
