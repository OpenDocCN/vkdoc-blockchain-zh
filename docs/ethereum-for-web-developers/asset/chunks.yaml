    \ will be adding later\n```\n\nWe will also initialize the component’s state in\
    \ its constructor to the following default, so the component starts in a loading\
    \ state until the user’s tokens are loaded.\n\n```\nconstructor(props) {\nsuper(props);\n\
    this.state = {\ntokens: [],\nloading: true\n};\n}\n```\n\nLet’s test this with\
    \ a simple `render` method that will just render the list of tokens by presenting\
    \ their IDs, reusing them as React keys as well.\n\n```\nrender() {\nconst { tokens,\
    \ loading } = this.state;\nif (loading) return \"Loading\";\nreturn (\n\nCollectible\
    \ Numbers\n\n{ tokens.map(token => (\n\n{ token.id.toString() }\n\n))}\n\n);\n\
    }\n```\n\nIf you check your react application in your browser, you should now\
    \ see the list of tokens that belong to the current user, assuming there are any.\
    \ We can now move onto the main feature of this app: sending a transaction to\
    \ mint a new token."
  trans: "\n### 创建合约对象\n\n我们首先创建一个 `src/contracts/ERC721.js` 文件，该文件用于初始化 web3 合约对象，并从\
    \ `Deploys.json` 文件中加载部署地址。然而，该文件位于项目根目录的 `artifacts` 文件夹内，在 `src` 文件夹之外。遗憾的是，`create-react-app`\
    \ 模板禁止我们从 `src` 文件夹外部导入任何内容。如果试图从我们的 React 应用程序中导入它，将会遇到以下错误。\n\n```\nYou attempted\
    \ to import ../../artifacts/Deploys.json which falls outside of the project src/\
    \ directory. Relative imports outside of src/ are not supported.\n```\n\n最简单的解决方法是，在\
    \ `src` 文件夹内创建一个指向 `artifacts` 文件夹的符号链接。我们可以通过以下命令来实现。\n\n```\n$ cd src\n$ ln\
    \ -ns ../artifacts\n```\n\n现在，我们就可以在应用中加载编译输出文件和部署文件了。请注意，从源文件夹外部加载文件的限制是 react-app\
    \ 独有的。如果你使用任何其他应用模板，很可能不会遇到此问题^(⁷⁸)。\n\n```\n// src/contracts/ERC721.js\nimport\
    \ Artifact from '../artifacts/ERC721PayPerMint.json';\nimport Deploys from '../artifacts/Deploys.json';\n\
    ```\n\n通过从第一个文件获取 ABI，我们可以编写一个函数来为我们的 `ERC721PayPerMint` 创建一个 web3 合约实例。\n\n```\n\
    // src/contracts/ERC721.js\nexport default function ERC721(web3,address=null,options={})\
    \ {\nconst abi = Artifact.compilerOutput.abi;\nreturn new web3.eth.Contract(abi,\
    \ address, { ...options });\n}\n```\n\n然后，我们可以从第二个文件中获取部署地址，并使用该地址实例化一个 `ERC721`\
    \ 合约（代码清单 5-24）。请注意，由于部署文件是按网络索引的，我们需要通过 `web3` 对象获取网络 ID。\n\n```\n// src/contracts/ERC721.js\n\
    import {\ngetWeb3, getAccount, getNetwork\n} from '../eth/network.js';\nexport\
    \ async function getDeployed() {\nconst web3 = getWeb3();\nconst from = await\
    \ getAccount();\nconst network = await getNetwork();\nconst address = Deploys[network];\n\
    if (!address) throw new Error(`在 ${network} 网络中找不到合约地址`);\nreturn ERC721(web3,\
    \ address, { from });\n}\n代码清单 5-24\n返回一个 web3 合约，该合约代表当前网络中 ERC721PayPerMint\
    \ 的已部署实例\n```\n\n### 根应用组件\n\n我们的根 `App` 组件（代码清单 5-25）与上一章中的组件类似。该组件的职责是加载默认账户和合约实例，并将其注入到将在\
    \ `src/components/ERC721.js` 中定义的主 `ERC721` 组件中。\n\n```\n// src/App.js\nimport\
    \ React, { Component } from 'react';\nimport { getDeployed } from './contracts/ERC721';\n\
    import { hasProvider, getAccount } from './eth/network';\nimport ERC721 from './components/ERC721';\n\
    class App extends Component {\nasync componentDidMount() {\nif (hasProvider())\
    \ {\nconst contract = await getDeployed();\nconst sender = await getAccount();\n\
    this.setState({ contract, sender });\n}\n}\nrender() {\nconst { contract, sender\
    \ } = this.state;\nreturn (\n\n{ (hasProvider() && contract && sender)\n? \n:\
    \ 请启用 Metamask 并重新加载\n}\n\n);\n}\n}\n代码清单 5-25\n根 App 组件的主要方法\n```\n\n不过请记住，如果用户在\
    \ Metamask 中更改了当前账户，我们需要刷新显示的信息，因为我们将列出用户的代币。我们可以通过在 `ethereum` 对象上安装一个监听器来检测账户变更，并通过将发送者附加为\
    \ React key^(⁷⁹) 来强制重新加载 `ERC721` 组件（代码清单 5-26）。\n\n```\n// src/App.js\nclass\
    \ App extends Component {\nasync componentDidMount() {\n// ...\nwindow.ethereum.on('accountsChanged',\
    \ async (accounts)=>{\nthis.setState({ sender: accounts[0] });\n});\n}\nrender()\
    \ {\n// ...\n\n// ...\n}\n}\n代码清单 5-26\n更新自代码清单 5-25 的方法，用于监听账户变更。当账户变更时，整个 ERC721\
    \ 组件会自动重新加载\n```\n\n### 主 ERC721 组件\n\n该组件将包含我们应用中的大部分逻辑：它将列出用户的代币，并允许用户通过一个简单的\
    \ *创建* 按钮来铸造新代币。让我们先从页面加载时列出已存在的代币开始。\n\n#### 列出已存在的代币\n\n枚举用户的非同质化代币可能比较棘手。`ERC721`\
    \ 标准提供了两个函数来实现此功能：`balanceOf` 和 `tokenOfOwnerByIndex`。前者返回用户的代币数量，后者则根据介于 0 和用户余额之间的索引返回代币\
    \ ID。为了避免这两个函数不同步，重要的是在查询时指定同一个区块号。\n\n```\n// src/components/ERC721.js\nclass\
    \ ERC721 extends Component {\nasync getTokensAtBlock(blockNumber) {\nconst { contract,\
    \ owner } = this.props;\n// 加载用户的代币数量\nconst strBalance = await contract.methods.balanceOf(owner)\n\
    .call({}, blockNumber);\nconst balance = parseInt(strBalance);\n// 检索每个代币的 ID\n\
    const queries = Array.from({length: balance}, (_,index)=>(\ncontract.methods.tokenOfOwnerByIndex(owner,index)\n\
    .call({}, blockNumber)\n));\nreturn await Promise.all(queries);\n}\n}\n```\n\n\
    基于上述函数，我们现在可以在组件的 *didMount* 生命周期事件中，将代币加载到组件的状态中（代码清单 5-27）。\n\n```\nasync componentDidMount()\
    \ {\nconst currentBlock = await getBlockNumber();\nconst tokenIds = await this.getTokensAtBlock(currentBlock);\n\
    const tokens = tokenIds.map(id => ({id, confirmed: true}));\nthis.setState({ tokens,\
    \ loading: false });\n}\n代码清单 5-27\n将用户代币加载到状态中。请注意，我们为这些代币添加了一个 confirmed 标志，以便将它们与稍后添加的新铸造代币区分开来\n\
    ```\n\n我们还需要在组件的构造函数中将其状态初始化为以下默认值，以便组件在用户代币加载完成之前处于加载状态。\n\n```\nconstructor(props)\
    \ {\nsuper(props);\nthis.state = {\ntokens: [],\nloading: true\n};\n}\n```\n\n\
    让我们用一个简单的 `render` 方法来测试一下，该方法仅通过呈现代币 ID 来列出代币列表，并同时将它们复用为 React key。\n\n```\n\
    render() {\nconst { tokens, loading } = this.state;\nif (loading) return \"加载中\"\
    ;\nreturn (\n\n收藏编号\n\n{ tokens.map(token => (\n\n{ token.id.toString() }\n\n\
    ))}\n\n);\n}\n```\n\n如果你在浏览器中检查你的 React 应用，假设存在代币，你现在应该能看到属于当前用户的代币列表。现在，我们可以进入本应用的主要功能了：发送一笔交易来铸造一个新的代币。\n"
- fmt: '### Minting New Tokens


    We will first create two methods in the `ERC721` component: one for checking whether
    the user can mint a specific token and another for actually minting it. Whether
    a user can mint a token depends on whether a token with that ID already exists
    or not.


    ```

    // src/components/ERC721.js

    class ERC721 extends Component {

    // ...

    async canMint(id) {

    const { contract } = this.props;

    const exists = await contract.methods.exists(id).call();

    return !exists;

    }

    }

    ```


    Minting will require actually sending a transaction to the contract, including
    the ID to be minted. As we have seen throughout this chapter, this requires estimating
    the gas and choosing a gas price to use. For the latter, we will define a `getGasPrice`
    helper function that will retrieve the current price from the Etherchain oracle.


    ```

    // src/eth/gasPrice.js

    import axios from ''axios'';

    import BN from ''bignumber.js'';

    const URL = ''https://www.etherchain.org/api/gasPriceOracle'';

    async function getGasPrice() {

    const { data: gasData } = await axios.get(URL);

    const bn = new BN(gasData.fast);

    return bn.shiftedBy(9).toString(10);

    }

    ```


    Using this helper, we can now define our `mint` function in the `ERC721` component.
    Remember that the value we need to send is directly proportional to the ID we
    are attempting to create, so higher numbers will actually cost more ETH to mint.


    ```

    // src/components/ERC721.js

    import { getGasPrice } from ''../eth/gasPrice'';

    import BN from ''bignumber.js'';

    class ERC721 extends Component {

    // ...

    async mint(id) {

    const { contract, owner } = this.props;

    const from = owner;

    const value = new BN(id).shiftedBy(12).toString(10);

    const gasPrice = await getGasPrice();

    const gas = await contract.methods.mint(owner, id)

    .estimateGas({ value, from });

    contract.methods.mint(owner, id)

    .send({ value, gas, gasPrice, from });

    }

    }

    ```


    We will now define a new small `Mint` component with a form with a controlled
    component, use `canMint` to check whether the create action is enabled, and trigger
    `mint` when the user chooses to create a token. We will pass the `mint` and `canMint`
    methods as props.


    ```

    // src/components/Mint.js

    import React, { Component } from ''react'';

    export default class Mint extends Component {

    constructor(props) {

    super(props);

    this.state = { value: "" };

    this.handleChange = this.handleChange.bind(this);

    this.handleMint = this.handleMint.bind(this);

    }

    async handleChange(event) {

    const value = event.target.value;

    this.setState({ value, mintable: false });

    if (value && value.length > 0) {

    const mintable = await this.props.canMint(value);

    if (value === this.state.value) {

    this.setState({ mintable });

    }

    }

    }

    async handleMint(event) {

    event.preventDefault();

    this.props.mint(this.state.value);

    this.setState({ value: "", mintable: false });

    }

    render() {

    const { value, mintable } = this.state;

    return (


    Create


    );

    }

    }

    ```


    We can wire this component into our main `ERC721` by adding the following markup
    in its `render` function. Note that this requires `bind`ing both functions to
    `this` in the `ERC721` constructor.


    ```

    // src/components/ERC721.js

    class ERC721 extends Component {

    constructor(props) {

    // ...

    this.mint = this.mint.bind(this);

    this.canMint = this.canMint.bind(this);

    }

    render() {

    // ...


    // ...

    }

    }

    ```


    Give this new version a try, and you should see the Metamask dialog when you hit
    the Create button in the `Mint` component. If you accept, a new token will be
    minted, but it will not be added to your list until you reload the page. Let’s
    fix that now.


    ### Reacting to Transaction Events


    The last piece of the puzzle is for our application to react to the lifecycle
    of the transactions issued. Whenever a new transaction is sent to mint a new token,
    we will add a new tentative token to our list and increase its confirmations as
    new blocks are mined. To do this, we will attach handlers to the transaction events
    for each of these scenarios in the `mint` method of the `ERC721` component.


    ```

    // src/components/ERC721.js

    class ERC721 extends Component {

    async mint(id) {

    // ...

    contract.methods.mint(owner, id)

    .send({ value, gas, gasPrice, from })

    .on(''transactionHash'', () => this.addToken(id))

    .on(''receipt'', () => this.confirmToken(id, 0))

    .on(''confirmation'', (n) => this.confirmToken(id, n))

    .on(''error'', (error) => this.failToken(id, error));

    }

    }

    ```


    Each of the handlers will respectively add a token to the list, mark it as confirmed,
    or flag it as errored. We are assuming that six confirmations is good enough for
    our current use case.


    ```

    // src/components/ERC721.js

    class ERC721 extends Component {

    addToken(id) {

    this.setState(state => ({

    ...state,

    tokens: [ ...state.tokens, { id }]

    }));

    }

    confirmToken(id, confirmations) {

    const confirmed = confirmations >= 6;

    this.setState(state => ({

    ...state,

    tokens: state.tokens.map(token => (

    token.id === id ? { id, confirmed } : token

    ))

    }));

    }

    failToken(id, error) {

    this.setState(state => ({

    ...state,

    tokens: state.tokens.filter(token => (

    token.id !== id

    ))

    }));

    }

    }

    ```


    We now have a list of `Token` objects, where each token is defined by its ID and
    whether it is pending, mined, or confirmed. Let’s use this information to display
    each token via a simple `Token` visual component in `src/components/Token.js`,
    which we can use instead of just displaying the token ID.


    ```

    // src/components/Token.js

    export default function({ token }) {

    const { id, confirmed } = token;

    const pending = typeof(confirmed) === "undefined";

    let status;

    if (pending) {

    status = "Pending";

    } else if (!confirmed) {

    status = "Awaiting confirmation";

    } else {

    status = "Confirmed";

    }

    return (


    {id.toString()}

    {status}


    );

    }

    ```


    In your own app, you may want to use other visual hints to report the status of
    each token, such as a color code – assisted by tooltips for explaining the concept
    of confirmation to the user.'
