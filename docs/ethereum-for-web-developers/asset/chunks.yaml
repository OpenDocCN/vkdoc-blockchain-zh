    with support for relayer rewards, based on a different EVM operation: CREATE2.


    #### The CREATE2 Instruction


    Ethereum has, since its first versions, provided a CREATE instruction for creating
    a new contract from another. The address of the newly created contract, as we
    saw earlier, is a function of the sender address and its nonce. While this allows
    for deterministic deployments, it also means that reserving an address is tricky,
    since the sender must not send any other transactions besides the deployment one
    to prevent changing its nonce.


    To solve this, a new CREATE2 instruction was introduced. This low-level operation
    works similar to CREATE, but also accepts a *salt* parameter: the deployment address
    is now calculated as a function of the sender, the salt, and the contract creation
    code. This allows for much more interesting flows by setting up a factory contract
    that spins up contracts using this instruction.


    ```

    Factory IdentityFactoryWithRewards {

    function deploy(

    bytes code, uint256 salt

    ) public returns (address) {

    address deployed;

    assembly {

    deployed:= create2(0, add(code,0x20), mload(code), salt)

    if iszero(extcodesize(deployed)) { revert(0, 0) }

    }

    return deployed;

    }

    }

    ```


    A user can now choose a contract, along with its constructor arguments, generate
    a random salt, and know the address where the resulting contract will be deployed.
    Not only that, but *anyone* who knows these parameters can now perform the deployment.


    This means that the user can simply share the creation parameters and salt, plus
    the address of the factory contract to be used, and have any relayer execute the
    transaction, without even needing to sign the transaction – and certainly not
    paying any gas. Should a relayer attempt to modify the code or creation parameters,
    the contract would end up deployed at a different address. Let’s use this approach
    to deploy our identity contracts, providing rewards to the relayers.'
  trans: '

    ### 原生元交易


    正如我们刚才所见，元交易需要使用身份合约作为“门卫代理”，来桥接用户实际交互的合约。身份合约持有处理已签名交易的逻辑，然后调用第三方合约，而第三方合约无需知晓元交易的存在。


    然而，如果应用合约本身已经支持处理元交易，则可以去除对身份合约的需求。这种方法被称为**原生元交易**，¹¹² 因为它内建在应用合约中，而不是通过代理身份合约来实现。


    举个例子，让我们为一个 `ERC721` 合约添加原生元交易支持，¹¹³ 允许任何持有非同质化代币的用户签署一笔交易，在不消耗 gas 的情况下完成代币转移（代码清单
    7-28）。该代码与我们之前使用的转发函数类似，但专门用于执行代币转移。


    ```

    // 08-meta-txs/contracts/ERC721WithNativeMetaTxs.sol

    pragma solidity ⁰.5.0;

    import "openzeppelin-solidity/contracts/token/ERC721/ERC721.sol";

    import "openzeppelin-solidity/contracts/cryptography/ECDSA.sol";

    contract ERC721WithNativeMetaTxs is ERC721 {

    using ECDSA for bytes32;

    // 追踪每个签名者的 nonce

    mapping (address => uint256) nonces;

    function signedTransferFrom(

    address from, address to, uint256 tokenId,

    uint256 nonce, bytes memory signature

    ) public {

    // 检索签名者

    bytes32 hash = getTransferHash(

    from, to, tokenId, nonce, signature

    ).toEthSignedMessageHash();

    address signer = hash.recover(signature);

    // 确保签名者有权处理此代币

    require(_isApprovedOrOwner(signer, tokenId));

    // 验证 nonce 并递增

    require(nonce == nonces[signer]);

    nonces[signer]++;

    // 执行转移

    _transferFrom(from, to, tokenId);

    }

    // 计算用于转移签名的哈希值

    function getTransferHash(

    address from, address to, uint256 tokenId, uint256 nonce

    ) public view returns (bytes32) {

    return keccak256(abi.encodePacked(

    from, to, tokenId, nonce, address(this)

    ));

    }

    }

    代码清单 7-28

    为 ERC721 合约添加原生元交易支持。注意现在需要为每个签名者追踪 nonce

    ```


    通过将这套逻辑直接整合到奖励代币合约中，我们的用户可以直接签署代币转移，随后由中继者发送并由 `ERC721` 合约执行。这使得拥有现有账户的用户无需部署身份合约即可受益于元交易（交易费用可由我们的应用补贴）。


    #### 原生元交易中的奖励


    将元交易逻辑直接迁移到应用合约虽然降低了用户的复杂性，但也带来了额外的问题：如何向中继者支付奖励。身份合约没有这个问题，因为它们已经持有用户的所有资产，可以直接转移资产给中继者作为报酬。


    对于 `ERC20` 代币，解决方案很简单：代币合约可以管理签名者的代币，并用这些代币直接向交易中继者转移奖励（代码清单 7-29）。


    ```

    // 08-meta-txs/contracts/ERC20WithNativeMetaTxs.sol

    function signedTransfer(

    address to, uint256 value,

    uint256 nonce, uint256 reward, bytes memory signature

    ) public {

    bytes32 hash = getTransferHash(

    to, value, nonce, reward

    ).toEthSignedMessageHash();

    address signer = hash.recover(signature);

    require(nonce == nonces[signer]);

    nonces[signer]++;

    _transfer(signer, msg.sender, reward);

    _transfer(signer, to, value);

    }

    代码清单 7-29

    一个支持元交易的 ERC20 合约中的示例 signedTransfer 函数，它使用相同的 ERC20 代币支付中继者奖励

    ```


    然而，这种方案不允许使用非该代币本身的任何货币作为奖励——例如，在该方案下无法使用 ETH 作为奖励。它也无法很好地适配其他资产。转移一个 `ERC721`
    非同质化代币的奖励应该是什么？数字化藏品不能切下一块奖励给中继者。


    解决这个问题的一个方法是依赖 `ERC20` 的 **授权** 机制。回顾第 3 章，`ERC20` 代币允许持有者指定其他地址来管理他们的资金。这样，用户可以向处理中继者奖励的应用合约授权其代币权限，然后该合约再将代币作为报酬发送给中继者。然而，此方法仍然要求用户在最初的
    `approve` 交易中支付 gas 费用——除非奖励代币合约本身原生支持授权的元交易。


    另一种选择是直接补贴用户的交易，由应用本身向中继者支付报酬。这需要在应用合约中加入精密的逻辑，以决定 *何时* 接受一笔元交易——否则，恶意中继者可能用虚假交易向应用发送
    spam，耗尽整个奖励池。这套逻辑将完全取决于你的具体用例，但请记住你有很大的灵活性：你的合约可以要求元交易包含一个由应用密钥签署的附加签名，这样你可以在链下进行验证，再批准交易执行。


    ### 重访智能账户部署


    我们将再次经历部署智能账户合约的过程。在“智能账户”一节中，我们讨论了如何使用一次性地址来完成部署，尽管它存在一些限制。现在我们将探索另一种基于不同 EVM
    操作码（`CREATE2`）且支持中继者奖励的方法。


    #### `CREATE2` 指令


    以太坊自诞生之初就提供了 `CREATE` 指令，用于从另一个合约创建新合约。正如我们之前所见，新创建合约的地址是发送者地址及其 nonce 的函数。虽然这可以实现确定性部署，但也意味着预留地址比较棘手，因为发送者在部署交易之外不得发送任何其他交易，以防止其
    nonce 改变。


    为了解决这个问题，引入了新的 `CREATE2` 指令。这个底层操作与 `CREATE` 类似，但额外接受一个 **盐值** 参数：部署地址现在被计算为发送者、盐值和合约创建代码的函数。这使得通过设置一个工厂合约来使用该指令生成合约，可以实现更有趣的流程。


    ```

    Factory IdentityFactoryWithRewards {

    function deploy(

    bytes code, uint256 salt

    ) public returns (address) {

    address deployed;

    assembly {

    deployed:= create2(0, add(code,0x20), mload(code), salt)

    if iszero(extcodesize(deployed)) { revert(0, 0) }

    }

    return deployed;

    }

    }

    ```


    现在，用户可以选择一个合约及其构造函数参数，生成一个随机盐值，并预先知道最终合约的部署地址。不仅如此，*任何* 知道这些参数的人都可以执行部署。


    这意味着用户只需分享创建参数、盐值以及要使用的工厂合约地址，就可以让任何中继者执行交易，甚至无需用户签署交易——当然也无需支付任何 gas 费用。如果中继者试图修改代码或创建参数，合约最终会部署到一个不同的地址。让我们用这种方法来部署我们的身份合约，并向中继者提供奖励。

    '
- fmt: '#### Deployment Rewards


    Before going into the code, we need to define how the payments to the relayer
    will be managed and which addresses will be initially funded by the user.


    Recall from the previous approach that one of the downsides of single-use addresses
    is that the user needs to fund from an exchange one address, but then his or her
    identity is spawned at a different one. Even worse, any additional funds sent
    to the single-use address are lost. Then, it is desirable if we can have the user
    fund the address of the identity contract directly.


    The easiest way to solve this is by having the Identity contract pay the relayer
    reward upon deployment, that is, in its constructor (Listing [7-30](#476252_1_En_7_Chapter.xhtml#PC43)).
    In this scenario, the relayer is by definition the account who initiated the transaction–
    or `tx.origin` in Solidity.


    ```

    // 08-meta-txs/contracts/IdentityFactoryWithRewards.sol

    contract IdentityWithReward is Identity {

    constructor(

    address owner, uint256 reward

    ) Identity(owner) public {

    tx.origin.transfer(reward);

    }

    }

    Listing 7-30

    Modified Identity contract that pays out a reward to the relayer of the transaction

    ```


    This approach allows the user to simply specify the owner account and the reward
    to be paid and broadcast those parameters along with the salt chosen, since these
    values alone are enough to determine the deployment address. Any relayer can then
    pick up this transaction, validate that there are enough funds on the deployment
    address to pay for the reward, and send the transaction to the factory contract.
    As a bonus, any surplus funds sent to the deployment address will still be there
    after the contract is created, ready to be used by their owner.


    #### Identity Contract Factory


    The factory contract then must provide a deployment function, callable by anyone,
    that accepts the Identity contract deployment parameters and salt (Listing [7-31](#476252_1_En_7_Chapter.xhtml#PC44)).
    This function assembles the creation code and performs the actual creation using
    the CREATE2 instruction.


    ```

    // 08-meta-txs/contracts/IdentityFactoryWithRewards.sol

    contract IdentityFactoryWithRewards {

    function deploy(

    address owner, uint256 reward, uint256 salt

    ) public returns (address) {

    bytes memory code = getCode(owner, reward);

    address identity;

    assembly {

    identity:= create2(0, add(code,0x20), mload(code), salt)

    if iszero(extcodesize(identity)) { revert(0, 0) }

    }

    return identity;

    }

    function getCode(

    address owner, uint256 reward

    ) internal pure returns (bytes memory) {

    return abi.encodePacked(

    type(IdentityWithReward).creationCode,

    abi.encode(owner, reward)

    );

    }

    }

    Listing 7-31

    Deploy function of an IdentityFactory contract. The creationCode property of the
    contract type returns the bytecode used in the creation, and any constructor arguments
    just need to be appended at the end

    ```


    Note that there is no need to validate the owner’s signature, since any change
    on the creation parameters would yield a different deployment address – one with
    no funds to pay back the reward to the relayer. Relayers should validate that
    the deployment address indeed has enough funds to pay back.


    An addition to this contract is a view function to obtain the deployment address
    given the constructor parameters and salt. This function can be used to tell the
    user on which address their identity contract will be deployed, that is, which
    address they need to fund.


    ```

    function getDeploymentAddress(

    address owner, uint256 reward, uint256 salt

    ) public view returns (address) {

    bytes memory code = getCode(owner, reward);

    bytes32 codeHash = keccak256(code);

    bytes32 rawAddress = keccak256(

    abi.encodePacked(

    bytes1(0xff),

    address(this),

    salt,

    codeHash

    )

    );

    return address(bytes20(rawAddress << 96));

    }

    ```


    Using this strategy, you can precalculate the address where a user’s identity
    will be created given a salt and share the address with him or her. The user acknowledges
    that address as their own and seeds it with funds from an exchange. This in turn
    triggers a relayer to create an identity contract at that address once it is funded.


    ### Note


    This strategy can actually be carried out with single-use addresses instead of
    CREATE2 using a slightly more complex flow. The application can select a relayer
    and create a single-use address that will spawn a new identity contract and send
    a reward to the pre-selected relayer. After the user funds the address where the
    identity is to be deployed, the relayer in turn funds the single-use addresses,
    executes the deployment, and receives the reward.


    ## Ethereum Names


    The last onboarding challenge we will tackle in this chapter is that of Ethereum
    addresses themselves. While addresses are central to any Ethereum application,
    as they identify the actors of a decentralized system, they are far from user-friendly.
    Asking a user to understand their 40-character string of apparent gibberish as
    their global identifier is not good design. To solve this issue, we will look
    into ENS (Ethereum Name Service).


    ### A DNS for Ethereum


    Most web developers are familiar with the concept of DNS (Domain Name Service),
    a protocol for mapping easily recognizable domain names (like `"google.com"`)
    to machine-friendly addresses (like `172.217.28.206`) that identify a server in
    the Internet Protocol.


    The Ethereum Name Service (or ENS) is an analogous protocol that resolves user-friendly
    names (like `"ethereumfoundation.eth"`) to Ethereum addresses (`0xfB6916095ca1df60bB79Ce92cE3Ea74c37c5d359`
    in this example, which is the Ethereum Foundation tip jar). Also like DNS, it
    supports registering non-address records (like content hashes or plain text),
    as well as reverse lookups.


    The components involved in ENS loosely mimic those of DNS, with the difference
    that they are implemented as smart contracts within the Ethereum network. The
    ENS **registry** itself is a singleton contract that keeps track of all domain
    names and their owners and maps each domain to a **resolver**. A resolver contract
    provides methods for resolving a name to an address and optionally additional
    information such as text, content hashes, or public key records. Finally, the
    ENS registry is updated via **registrars**, contracts that manage the registration
    of subdomains at different levels of the tree, each with its own policy.


    The most widely used top-level domain for ENS is `.eth`, operated by the so-called
    *.eth permanent registrar*. This registrar uses a commit-reveal scheme for purchasing
    second-level domains and allows anyone to chip in for extending a name registration.
    While it is possible to interact with this contract directly, it is suggested
    to use a tool (such as `mycrypto` or `myetherwallet`) to purchase and manage your
    second-level domains.'
