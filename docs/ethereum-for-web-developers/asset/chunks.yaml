- fmt: '## Summary


    Public blockchains like `Bitcoin` or `Ethereum` have traditionally sacrificed
    performance for trustlessness and security. While there are multiple efforts toward
    building `Ethereum 2.0`, which includes sharding mechanics that help the network
    scale, it is interesting to see many solutions sprouting that build on top of
    the existing infrastructure to solve the scalability problem.


    Some of the solutions presented in this chapter, such as early versions of `plasma`
    or `state channels`, are ready to use and in production today, helping real-life
    applications scale beyond the limits of the main `Ethereum` network.


    These solutions not only allow your application to achieve a higher transaction
    throughput, but they can also be used to provide a better user experience overall.
    `Channels` provide instant finality to peer-to-peer transactions if both parties
    behave appropriately instead of having to wait for a dozen confirmations. And
    `sidechains` can provide reliable block times much lower than the main network,
    with considerably lower gas fees.


    These techniques can even be combined: you can set up `state channels` between
    parties in a sidechain or even use channels as the actual asset being traded in
    a `plasma chain`. The sky is the limit here.


    How you leverage these solutions and present them to (or hide them from) your
    users will depend on what you are building. Remember what your users need from
    your application, and use the building blocks available to you to create the best
    possible experience.


    Happy coding!


