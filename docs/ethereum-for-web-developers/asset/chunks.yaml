  trans: '

    # 索引区块链数据


    我们将从索引区块链数据的问题入手。在此语境下，*索引*一词指的是从网络中收集特定信息（如代币余额、已发送的交易或已创建的合约），并将其存储在可查询的数据存储中（例如关系型数据库或
    ElasticSearch 等分析引擎），以便执行复杂查询的过程。在本章中，我们不会尝试索引整个链，而是会选择特定的数据集，并为其构建定制的解决方案。


    当你需要对记录数据进行任何类型的*聚合*（例如求和或求平均值）时，索引就是必要的，因为以太坊事件 API 并不适合执行此类操作。例如，无法轻易获得持有超过某个
    ERC20 资产余额的唯一地址数量——而这种查询在关系型数据库中执行起来非常简单。


    索引还可以通过充当查询缓存来提高查询大量事件时的性能。专用数据库回答事件查询的速度比普通以太坊节点快得多。


    ## 说明


    某些公共节点提供商（如 Infura）实际上在其节点之外，还包含了一个事件查询层（⁸¹），这极大地减少了它们为提供日志查询所耗费的基础设施资源。


    现在，我们将专注于一个具体的索引用例，并设计一个用于收集信息并建立索引的解决方案。


    ## 追踪 ERC20 代币持有者


    我们将追踪特定 ERC20 代币的持有者。请记住，ERC20 非同质化代币可以充当一种代币，每个地址都有一定的余额。然而，合约并未提供任何方法来实际列出它们。即使提供了，某些代币的用户基数也可能远超仅查询以太坊节点的客户端应用的处理能力。例如，在撰写本文时，OmiseGO
    (OMG) 代币拥有超过 65 万个唯一持有者（⁸²）。


    ### 重温 ERC20 接口


    我们将回顾 ERC20 合约接口，以确定我们将要使用的构建模块。抛开与授权额度相关的功能不谈，ERC20 标准包含以下方法和事件。


    ```

    function transfer(address to, uint256 value) returns (bool);

    function totalSupply() view returns (uint256);

    function balanceOf(address who) view returns (uint256);

    event Transfer(

    address indexed from, address indexed to, uint256 value

    );

    ```


    如前所述，与扩展的 ERC721 标准不同，ERC20 并未提供列出所有代币持有者的方法。构建这样一个列表的唯一方法是遍历每一个 *Transfer* 事件，并收集所有接收者地址。


    ## 注意


    某些 ERC20 合约在铸造新代币时不会发出 `Transfer` 事件，而是会发出一个非标准的 `Mint` 事件。在这种情况下，我们需要追踪这两个事件，才能构建完整的持有者集合。


    ### 查询转账事件


    我们将从查询给定合约的所有转账事件开始。我们将构建一个 `ERC20Indexer` 类，它依赖于一个 web3 连接提供者、一个 ERC20 代币地址以及一个开始查询的区块号（清单
    6-1）。添加最后一个参数仅出于性能考虑：查询代币合约部署之前的任何区块是没有意义的。


    ```

    // 01-indexing/simple-indexer.js

    const ERC20 = require(''openzeppelin-solidity/build/contracts/ERC20.json'');

    const BigNumber = require(''bignumber.js'');

    const Web3 = require(''web3'');

    class ERC20Indexer {

    constructor({ address, startBlock, provider } = {}) {

    this.holders = new Set();

    this.startBlock = startBlock;

    this.lastBlock = this.startBlock;

    this.web3 = new Web3(provider);

    this.contract = new this.web3.eth.Contract(

    ERC20.abi, address

    );

    }

    }

    清单 6-1

    我们将要处理的 ERC20Indexer 类的构造函数。我们再次依赖 openzeppelin-solidity@2.2.0 来获取 ERC20 合约的 ABI。我们将把所有代币持有者地址的列表存储在
    holders 集合中，lastBlock 字段将记录我们已处理的最后一个区块

    ```


    现在我们可以为此类添加第一个方法，用于获取给定合约的转账事件列表（清单 6-2）。由于这个列表可能超过单次请求所能容纳的大小（OMG 到目前为止已有超过 200
    万笔转账），我们需要将其拆分为多个请求，因此我们将从一个处理区块范围内所有事件的方法开始。


    ```

    async processBlocks(startBlock, endBlock) {

    for (let fromBlock = startBlock;

    fromBlock  this.reduceEvent(e));

    }

    }

    清单 6-2

    批量查询某个区块范围内的所有转账事件。这里的 BATCH_SIZE 应取决于合约每个区块的交易量

    ```


    此方法将从合约获取某个区块范围内的所有转账事件，并将其发送给一个 `reduceEvent` 函数（清单 6-3）。这个归约函数应接收一个事件并使用它来更新当前的代币持有者列表。


    ```

    const ZERO_ADDRESS = ''0x0000000000000000000000000000000000000000'';

    async reduceEvent(event) {

    const { to } = event.returnValues;

    if (to !== ZERO_ADDRESS) {

    this.holders.add(to);

    }

    }

    清单 6-3

    检索代币转账的接收者并将其添加到代币持有者列表中。转账到零地址通常代表代币被销毁，因此我们会将其排除在列表之外

    ```

    '
- fmt: "### Note\n\nIn a production implementation, you will not want to store the\
    \ list of holders in a JavaScript data structure in memory that is wiped out whenever\
    \ the process is stopped. You should rather use a database for storing all data\
    \ and serving your clients’ queries. The choice of the database engine is out\
    \ of the scope of this book, and depends heavily on your use case.\n\nHowever,\
    \ this method may yield some false positives. If an address ever held some balance\
    \ but then transferred it all, it will be added to our list of holders but never\
    \ removed. This means that we need to check that an address balance is non-zero\
    \ for listing it. Since we are at it, we will go an extra mile and track the current\
    \ balance for each holder. We have two options to do this, each with their own\
    \ pros and cons:\n\n- We can rely on the ERC20 `balanceOf` method to check the\
    \ balance of each address we add to our list. We can do this as soon as we find\
    \ a new address to add to our set, and have a holder with its balance ready. However,\
    \ this means that we are making an additional request for each token holder and\
    \ that we also need to re-run this query whenever we see a new block with new\
    \ transfers.\n\n- We can use the fact that the balance of any address in an ERC20\
    \ contract can be determined by just looking at the transfer events. Since we\
    \ are already querying them, we can track all movements to and from each address\
    \ and update them accordingly. This will require a bit more logic on our end,\
    \ but does not need any extra requests to the Ethereum network. Its downside is\
    \ that we cannot rely on the balance of an address until we have finished scanning\
    \ until the latest block in the chain.\n\nTo prioritize reducing the number of\
    \ requests, we will go with the second strategy (Listing [6-4](#476252_1_En_6_Chapter.xhtml#PC5)).\
    \ This means that our function to reduce an event will also need to account for\
    \ the *value* of each transfer.\n\n```javascript\nasync reduceEvent(event) {\n\
    \  const { from, to, value } = event.returnValues;\n  if (from !== ZERO_ADDRESS)\
    \ {\n    this.balances[from] = this.balances[from]\n      ? this.balances[from].minus(value)\n\
    \      : BigNumber(value).negated();\n  }\n  if (to !== ZERO_ADDRESS) {\n    this.balances[to]\
    \ = this.balances[to]\n      ? this.balances[to].plus(value)\n      : BigNumber(value);\n\
    \  }\n}\n```\n\n*Listing 6-4*  \nReducing an event to update the balances of each\
    \ holder. Here `balances` is an object that replaces the former set of holders.\
    \ Note that we are excluding the zero address both as sender and recipient, since\
    \ transfers from it represent minting events and transfers to it represent burns.\n\
    \nArmed with a class that can generate the list of holders and their balances\
    \ for a given range of blocks, we now need to keep this list up to date as new\
    \ blocks are mined (Listing [6-5](#476252_1_En_6_Chapter.xhtml#PC6)). We will\
    \ use polling for getting new blocks, though subscription is also a viable alternative.\n\
    \n```javascript\nconst CONFIRMATIONS = 12;\nconst INTERVAL = 1000;\n\nasync processNewBlocks()\
    \ {\n  const lastBlock = this.lastBlock;\n  const currentBlock = await this.web3.eth.getBlockNumber();\n\
    \  const confirmedBlock = currentBlock - CONFIRMATIONS;\n  if (!lastBlock || confirmedBlock\
    \ >= lastBlock) {\n    await this.processBlocks(lastBlock, confirmedBlock);\n\
    \    this.lastBlock = confirmedBlock + 1;\n  }\n}\n\nstart() {\n  this.timeout\
    \ = setTimeout(async () => {\n    await this.processNewBlocks()\n    this.start();\n\
    \  }, INTERVAL);\n}\n```\n\n*Listing 6-5*  \nPolling for new blocks and retrieving\
    \ any new transfer events. The `processNewBlocks` function will query the latest\
    \ block and call into `processBlocks` with the new blocks range, while the `start`\
    \ function kicks off an infinite loop that constantly polls and then sleeps for\
    \ 1 second.\n\nAn important detail of our implementation is that we will not process\
    \ up to the latest block, but only until a certain number of blocks ago. This\
    \ ensures that any transfer events we have processed are confirmed and will not\
    \ be rolled back as part of a reorganization. We will later look into strategies\
    \ for querying up to the most recent block and handling reorgs as we detect them.\n\
    \n### Sharing Our Data\n\nThe last step is to actually provide access to the data\
    \ we have gathered (Listing [6-6](#476252_1_En_6_Chapter.xhtml#PC7)). We will\
    \ set up a simple express server that exposes the set of balances in JSON format\
    \ upon an HTTP GET request.\n\n```javascript\nconst express = require('express')\n\
    const mapValues = require('lodash.mapvalues');\n\n// Sample values for testing\
    \ a mainnet token\nconst API_TOKEN = 'YOUR_INFURA_API_TOKEN';\nconst PROVIDER\
    \ = 'https://mainnet.infura.io/v3/' + API_TOKEN;\nconst ADDRESS = '0x00fdae9174357424a78afaad98da36fd66dd9e03';\n\
    const START_BLOCK = 6563800;\n\n// Initialize express application and indexer\n\
    const app = express()\nconst indexer = new Indexer({\n  address: ADDRESS,\n  startBlock:\
    \ START_BLOCK,\n  provider: PROVIDER\n});\n\n// Register route for querying balances\n\
    app.get('/balances.json', (_req, res) => {\n  res.send(\n    mapValues(indexer.balances,\
    \ b => b.toString(10))\n  );\n});\n\n// Start!\napp.listen(3000);\nindexer.start();\n\
    ```\n\n*Listing 6-6*  \nSimple express server that exposes the balances from the\
    \ indexer in an HTTP endpoint. The `mapValues` lodash helper is used to format\
    \ the `BigNumber` values before serializing them in JSON. Make sure to get an\
    \ Infura token to set the `API_TOKEN` variable.\n\nWe can test this script by\
    \ running it using `node` and in a different console use `curl` to query the balances\
    \ (Listing [6-7](#476252_1_En_6_Chapter.xhtml#PC8)). Make sure to wait a few seconds\
    \ so the script can process some blocks to gather transfer data.\n\n```bash\n\
    $ curl -s \"localhost:3000/balances.json\" | jq .\n{\n  \"0xB048...\": \"26000000000000000000000\"\
    ,\n  \"0x58b2...\": \"77997707535390983471493397\",\n  \"0x352B...\": \"4666667000000000000000000\"\
    ,\n  \"0xBC96...\": \"3000000000000000000000000\",\n  ...\n}\n```\n\n*Listing\
    \ 6-7*  \nQuerying the express endpoint to retrieve the token balances. We are\
    \ using the `jq` utility just to pretty-print the JSON output.\n\nThis naive implementation\
    \ makes use of the fact that all indexed data is stored in the indexer instance.\
    \ Keep in mind that for actual deployments you will want to store all data in\
    \ a separate datastore, such as a relational database. This will allow you to\
    \ run queries directly to the database and decouple the web server and indexer\
    \ processes so they run separately. It will also allow you to add aggregations,\
    \ filters, sorting, and paging from the client as needed: returning a list of\
    \ half a million token holders in a single request may not fare well in some scenarios.\n\
    \n### Handling Chain Reorganizations\n\nUp to this point, we have avoided the\
    \ issue of chain reorganizations by only processing transfers that can be considered\
    \ to be finalized, in other words, transfers that occurred enough blocks ago that\
    \ the chance of those blocks being removed from the chain is negligible. We will\
    \ now remove this restriction and see how we can safely process the latest events\
    \ by reacting properly to a reorg."
  raw: '### Note


    In a production implementation, you will not want to store the list of holders
    in a javascript data structure in memory that is wiped out whenever the process
    is stopped. You should rather use a database for storing all data and serving
    your clients’ queries. The choice of the database engine is out of the scope of
    this book, and depends heavily on your use case.


    However, this method may yield some false positives. If an address ever held some
    balance but then transferred it all, it will be added to our list of holders but
    never removed. This means that we need to check that an address balance is non-zero
    for listing it. Since we are at it, we will go an extra mile and track the current
    balance for each holder. We have two options to do this, each with their own pros
    and cons:


    *   We can rely on the ERC20 `balanceOf` method to check the balance of each address
    we add to our list. We can do this as soon as we find a new address to add to
    our set, and have a holder with its balance ready. However, this means that we
    are making an additional request for each token holder and that we also need to
    re-run this query whenever we see a new block with new transfers.


    *   We can use the fact that the balance of any address in an ERC20 contract can
    be determined by just looking at the transfer events. Since we are already querying
    them, we can track all movements to and from each address and update them accordingly.
    This will require a bit more logic on our end, but does not need any extra requests
    to the Ethereum network. Its downside is that we cannot rely on the balance of
    an address until we have finished scanning until the latest block in the chain.


    To prioritize reducing the number of requests, we will go with the second strategy
    (Listing [6-4](#476252_1_En_6_Chapter.xhtml#PC5)). This means that our function
    to reduce an event will also need to account for the *value* of each transfer.


    ```

    async reduceEvent(event) {

    const { from, to, value } = event.returnValues;

    if (from !== ZERO_ADDRESS) {

    this.balances[from] = this.balances[from]

    ? this.balances[from].minus(value)

    : BigNumber(value).negated();

    }

    if (to !== ZERO_ADDRESS) {

    this.balances[to] = this.balances[to]

    ? this.balances[to].plus(value)

    : BigNumber(value);

    }

    }

    Listing 6-4

    Reducing an event to update the balances of each holder. Here balances is an object
    that replaces the former set of holders. Note that we are excluding the zero address
    both as sender and recipient, since transfers from it represent minting events
    and transfers to it represent burns

    ```


    Armed with a class that can generate the list of holders and their balances for
    a given range of blocks, we now need to keep this list up to date as new blocks
    are mined (Listing [6-5](#476252_1_En_6_Chapter.xhtml#PC6)). We will use polling
    for getting new blocks, though subscription is also a viable alternative.


    ```

    const CONFIRMATIONS = 12;

    const INTERVAL = 1000;

    async processNewBlocks() {

    const lastBlock = this.lastBlock;

    const currentBlock = await this.web3.eth.getBlockNumber();

    const confirmedBlock = currentBlock - CONFIRMATIONS;

    if (!lastBlock || confirmedBlock >= lastBlock) {

    await this.processBlocks(lastBlock, confirmedBlock);

    this.lastBlock= confirmedBlock + 1;

    }

    }

    start() {

    this.timeout = setTimeout(async () => {

    await this.processNewBlocks()

    this.start();

    }, INTERVAL);

    }

    Listing 6-5

    Polling for new blocks and retrieving any new transfer events. The processNewBlocks
    function will query the latest block and call into processBlocks with the new
    blocks range, while the start function kicks off an infinite loop that constantly
    polls and then sleeps for 1 second

    ```


    An important detail of our implementation is that we will not process up to the
    latest block, but only until a certain number of blocks ago. This ensures that
    any transfer events we have processed are confirmed and will not be rolled back
    as part of a reorganization. We will later look into strategies for querying up
    to the most recent block and handling reorgs as we detect them.


    #### Sharing Our Data


    The last step is to actually provide access to the data we have gathered (Listing
    [6-6](#476252_1_En_6_Chapter.xhtml#PC7)). We will set up a simple express server
    that exposes the set of balances in JSON format upon an HTTP GET request.


    ```

    const express = require(''express'')

    const mapValues = require(''lodash.mapvalues'');

    // Sample values for testing a mainnet token

    const API_TOKEN = ''YOUR_INFURA_API_TOKEN'';

    const PROVIDER = ''https://mainnet.infura.io/v3/'' + API_TOKEN;

    const ADDRESS = ''0x00fdae9174357424a78afaad98da36fd66dd9e03'';

    const START_BLOCK = 6563800;

    // Initialize express application and indexer

    const app = express()

    const indexer = new Indexer({

    address: ADDRESS,

    startBlock: START_BLOCK,

    provider: PROVIDER

    });

    // Register route for querying balances

    app.get(''/balances.json'', (_req, res) => {

    res.send(

    mapValues(indexer.balances, b => b.toString(10))

    );

    });

    // Start!

    app.listen(3000);

    indexer.start();

    Listing 6-6

    Simple express server that exposes the balances from the indexer in an HTTP endpoint.
    The mapValues lodash helper is used to format the BigNumber values before serializing
    them in JSON. Make sure to get an Infura token to set the API_TOKEN variable

    ```


    We can test this script by running it using `node` and in a different console
    use `curl` to query the balances (Listing [6-7](#476252_1_En_6_Chapter.xhtml#PC8)).
    Make sure to wait a few seconds so the script can process some blocks to gather
    transfer data.


    ```

    $ curl -s "localhost:3000/balances.json" | jq .

    {

    "0xB048...": "26000000000000000000000",

    "0x58b2...": "77997707535390983471493397",

    "0x352B...": "4666667000000000000000000",

    "0xBC96...": "3000000000000000000000000",

    ...

    }

    Listing 6-7

    Querying the express endpoint to retrieve the token balances. We are using the
    jq83 utility just to pretty-print the JSON output

    ```


    This naive implementation makes use of the fact that all indexed data is stored
    in the indexer instance. Keep in mind that for actual deployments you will want
    to store all data in a separate datastore, such as a relational database. This
    will allow you to run queries directly to the database and decouple the web server
    and indexer processes so they run separately. It will also allow you to add aggregations,
    filters, sorting, and paging from the client as needed: returning a list of half
    a million token holders in a single request may not fare well in some scenarios.


    ### Handling Chain Reorganizations


    Up to this point, we have avoided the issue of chain reorganizations by only processing
    transfers that can be considered to be finalized, in other words, transfers that
    occurred enough blocks ago that the chance of those blocks being removed from
    the chain is negligible. We will now remove this restriction and see how we can
    safely process the latest events by reacting properly to a reorg.'
  trans: "\n### 注意事项\n\n在生产级实现中，你不应将持有者列表存储在内存中的 JavaScript 数据结构里，因为进程停止时该数据会被清空。更建议使用数据库来存储所有数据并响应客户端的查询请求。数据库引擎的选择不在本书讨论范围内，且在很大程度上取决于你的具体用例。\n\
    \n不过这种方法可能会产生一些误报。如果一个地址曾持有余额但后续全部转出，它会被添加到持有者列表中却永远不会被移除。这意味着我们需要验证地址余额非零才能将其列入列表。在此基础上，我们将更进一步，追踪每个持有者的当前余额。有两种实现方案，各有优劣：\n\
    \n- 我们可以依赖 ERC20 的`balanceOf`方法检查每个待添加地址的余额。一旦发现新地址即可立即查询，并准备好带有余额的持有者信息。但这意味着需要为每个代币持有者发起额外请求，并且每当发现包含新交易的新区块时都需要重新执行此查询。\n\
    \n- 我们可以利用 ERC20 合约中任何地址的余额仅通过查看转账事件即可确定的特性。由于我们已经在查询这些事件，可以追踪每个地址的转入转出动向并实时更新余额。这需要在代码端增加更多逻辑，但无需向以太坊网络发送额外请求。其缺点是在完成直到链上最新区块的扫描之前，我们无法依赖任何地址的余额。\n\
    \n为了优先减少请求次数，我们将采用第二种策略（清单 6-4）。这意味着我们的事件规约函数还需要处理每笔转账的*数值*。\n\n```javascript\n\
    async reduceEvent(event) {\n  const { from, to, value } = event.returnValues;\n\
    \  if (from !== ZERO_ADDRESS) {\n    this.balances[from] = this.balances[from]\n\
    \      ? this.balances[from].minus(value)\n      : BigNumber(value).negated();\n\
    \  }\n  if (to !== ZERO_ADDRESS) {\n    this.balances[to] = this.balances[to]\n\
    \      ? this.balances[to].plus(value)\n      : BigNumber(value);\n  }\n}\n```\n\
    \n*清单 6-4*  \n通过规约事件更新每个持有者的余额。这里的`balances`是一个替代了原有持有者集合的对象。请注意我们排除了零地址作为发送方和接收方的情况，因为来自零地址的转账代表铸币事件，而发往零地址的转账则代表销毁事件。\n\
    \n有了能够生成指定区块范围内持有者及其余额列表的类之后，我们需要在新区块被挖出时保持此列表的更新（清单 6-5）。我们将采用轮询方式获取新区块，不过订阅模式也是可行的替代方案。\n\
    \n```javascript\nconst CONFIRMATIONS = 12;\nconst INTERVAL = 1000;\n\nasync processNewBlocks()\
    \ {\n  const lastBlock = this.lastBlock;\n  const currentBlock = await this.web3.eth.getBlockNumber();\n\
    \  const confirmedBlock = currentBlock - CONFIRMATIONS;\n  if (!lastBlock || confirmedBlock\
    \ >= lastBlock) {\n    await this.processBlocks(lastBlock, confirmedBlock);\n\
    \    this.lastBlock = confirmedBlock + 1;\n  }\n}\n\nstart() {\n  this.timeout\
    \ = setTimeout(async () => {\n    await this.processNewBlocks()\n    this.start();\n\
    \  }, INTERVAL);\n}\n```\n\n*清单 6-5*  \n轮询新区块并获取所有新增的转账事件。`processNewBlocks`函数会查询最新区块，并调用`processBlocks`处理新区块范围，而`start`函数则启动一个无限循环，持续轮询后休眠\
    \ 1 秒。\n\n实现中的一个重要细节是：我们不会处理到最新区块，而只处理到一定数量的区块之前。这能确保我们处理的所有转账事件都已得到确认，不会因链重组而被回滚。后续我们将探讨如何查询最新区块以及检测到重组时的处理策略。\n\
    \n### 共享数据\n\n最后一步是实际提供已收集数据的访问接口（清单 6-6）。我们将搭建一个简单的 Express 服务器，通过 HTTP GET 请求以\
    \ JSON 格式公开余额数据。\n\n```javascript\nconst express = require('express')\nconst mapValues\
    \ = require('lodash.mapvalues');\n\n// 测试主网代币的示例值\nconst API_TOKEN = 'YOUR_INFURA_API_TOKEN';\n\
    const PROVIDER = 'https://mainnet.infura.io/v3/' + API_TOKEN;\nconst ADDRESS =\
    \ '0x00fdae9174357424a78afaad98da36fd66dd9e03';\nconst START_BLOCK = 6563800;\n\
    \n// 初始化 express 应用和索引器\nconst app = express()\nconst indexer = new Indexer({\n\
    \  address: ADDRESS,\n  startBlock: START_BLOCK,\n  provider: PROVIDER\n});\n\n\
    // 注册查询余额的路由\napp.get('/balances.json', (_req, res) => {\n  res.send(\n    mapValues(indexer.balances,\
    \ b => b.toString(10))\n  );\n});\n\n// 启动！\napp.listen(3000);\nindexer.start();\n\
    ```\n\n*清单 6-6*  \n通过 HTTP 端点暴露索引器余额的简单 Express 服务器。使用 lodash 的`mapValues`工具函数在序列化为\
    \ JSON 前格式化`BigNumber`值。请确保获取 Infura 令牌以设置`API_TOKEN`变量。\n\n我们可以通过`node`运行此脚本，在另一个控制台使用`curl`查询余额来测试（清单\
    \ 6-7）。请等待几秒让脚本处理一些区块以收集转账数据。\n\n```bash\n$ curl -s \"localhost:3000/balances.json\"\
    \ | jq .\n{\n  \"0xB048...\": \"26000000000000000000000\",\n  \"0x58b2...\": \"\
    77997707535390983471493397\",\n  \"0x352B...\": \"4666667000000000000000000\"\
    ,\n  \"0xBC96...\": \"3000000000000000000000000\",\n  ...\n}\n```\n\n*清单 6-7*\
    \  \n查询 Express 端点获取代币余额。我们使用`jq`工具美化 JSON 输出。\n\n这个基础实现利用了所有索引数据都存储在索引器实例中的特性。请记住，在实际部署中，你需要将所有数据存储在独立的数据库（如关系型数据库）中。这样既能直接对数据库执行查询，又能解耦\
    \ Web 服务器和索引器进程使它们独立运行，还能根据客户端需要添加聚合、过滤、排序和分页功能：在单个请求中返回包含五十万个代币持有者的列表在某些场景下可能表现不佳。\n\
    \n### 处理链重组\n\n到目前为止，我们通过仅处理可以视为最终确认的转账（即发生在足够多区块之前的转账，这些区块被从链中移除的概率可以忽略不计）来规避链重组问题。现在我们将移除这一限制，探讨如何通过正确响应重组来安全处理最新事件。\n"
- fmt: "```markdown\n#### 使用订阅\n\n检测并响应重组的最简单方法是通过订阅。对某个事件（例如 ERC20 的 `Transfer`）进行订阅，不仅会将新事件实时推送到我们的进程，还会通知因重组而*移除*的任何事件。这意味着我们可以编写\
    \ `reduceEvent` 函数的对应函数来撤销事件，并在以太坊节点推送事件移除时运行它（代码清单 [6-8](#476252_1_En_6_Chapter.xhtml#PC9)）。\n\
    \n```\n// 01-indexing/subs-indexer.js\nundoTransfer(event) {\n  const { from,\
    \ to, value } = event.returnValues;\n  if (from !== ZERO_ADDRESS) {\n    this.balances[from]\
    \ = this.balances[from].plus(value);\n  }\n  if (to !== ZERO_ADDRESS) {\n    this.balances[to]\
    \ = this.balances[to].minus(value);\n  }\n}\n```\n*代码清单 6-8 在我们的余额列表中撤销一个转账事件。此处的逻辑与\
    \ `reduceEvent` 方法中的逻辑相反。*\n\n这样，我们就不必依赖 `getPastEvents` 方法来轮询新区块，而是可以简单地打开一个订阅并监听事件的添加和移除（代码清单\
    \ [6-9](#476252_1_En_6_Chapter.xhtml#PC10)）。\n\n```\nasync function start() {\n\
    \  // Process all past blocks\n  const currentBlock = await this.web3.eth.getBlockNumber();\n\
    \  await this.processBlocks(this.startBlock, currentBlock);\n  // Subscribe to\
    \ new ones\n  this.subscription = this.contract.events\n    .Transfer({ fromBlock:\
    \ currentBlock + 1 })\n    .on('data', e => this.reduceEvent(e))\n    .on('changed',\
    \ e => this.undoTransfer(e.returnValues))\n    .on('error', err => console.error(\"\
    Error\", err));\n}\n```\n*代码清单 6-9 使用订阅来监控新事件以及因重组而移除的事件。当有新事件时触发 `data` 处理器，当事件因重组从链上移除时触发\
    \ `changed` 处理器。*\n\n然而，这种方法有一个主要缺点。如果在发生重组时与节点的 websocket 连接断开，我们的脚本将永远不会收到移除事件的通知。这意味着我们无法回滚已被撤销的转账，最终导致状态无效。另一个问题是订阅只返回新事件，因此如果在\
    \ `processBlocks` 调用与订阅建立之间有任何区块被挖出，我们可能会错过一些事件。接下来让我们尝试一种不同的、更简单的方法。我们首先需要手动检测重组的发生。\n\
    \n#### 检测重组\n\n当一条链分叉累积了比当前主链更多的总算力时，就会发生重组，并且该分叉成为正式链。如果不同的矿工集合在不同分叉上工作，就可能发生这种情况。\n\
    \n这意味着在重组中，一个或多个区块（从当前主链开始向前追溯）将被其他区块替换。这些新区块可能包含也可能不包含与之前区块相同的交易，并且它们的顺序也可能不同^([(84)](#fn84))，从而产生不同的结果。\n\
    \n我们可以通过检查区块标识符来检测重组。回顾第 [3](#476252_1_En_3_Chapter.xhtml) 章，每个区块都由其哈希值标识。这个哈希值是根据区块的数据和前一个区块的哈希值计算得出的。这就是区块链的本质：每个区块都与前一个区块相连。这意味着，如果不强制更改所有后续区块的标识符，就无法更改旧区块。\n\
    \n这正是我们能轻松检测重组的原因。当给定高度的区块的哈希值发生变化时，意味着该区块以及它之前的其他区块也可能发生了变化。然后，我们只需监视我们处理过的最后一个区块，如果其哈希值在任何时候发生变化，我们就向后扫描其他已变化的哈希值，直到检测到一个共同的祖先（代码清单\
    \ [6-10](#476252_1_En_6_Chapter.xhtml#PC11)）。\n\n让我们修改脚本，使用此策略添加重组检查，这将要求我们跟踪已处理区块的哈希值。\n\
    \n```\n// 01-indexing/reorgs-indexer.js\nasync processNewBlocks() {\n  // Track\
    \ current block number and its hash\n  const currentBlockNumber =\n    await this.web3.eth.getBlockNumber()\
    \ - CONFIRMATIONS;\n  const currentBlockHash =\n    await this.getBlockHash(currentBlockNumber);\n\
    \  // Check for possible reorgs\n  if (this.lastBlockNumber && this.lastBlockHash)\
    \ {\n    const newLastBlockHash\n      = await this.getBlockHash(this.lastBlockNumber);\n\
    \    if (this.lastBlockHash !== newLastBlockHash) {\n      // There was a reorg!\
    \ Undo all blocks affected,\n      // and reprocess blocks starting by the most\
    \ recent\n      // one that was not removed from the main chain\n      const lastBlock\
    \ = await this.undoBlocks();\n      this.lastBlockHash = lastBlock.hash;\n   \
    \   this.lastBlockNumber = lastBlock.number;\n    }\n  }\n  // Process blocks\
    \ from lastBlockNumber until currentBlock\n  // Update this.lastBlockNumber and\
    \ this.lastBlockHash\n  // ...\n}\nasync getBlockHash(number) {\n  const { hash\
    \ } = await this.web3.eth.getBlock(number);\n  return hash;\n}\n```\n*代码清单 6-10\
    \ 更新后的 `processNewBlocks` 函数，在每次迭代时检查重组。`undoBlocks` 函数（代码清单 6-12）应撤销所有与已移除区块相关的转账，并返回未受重组影响的最新区块。*\n\
    \n请注意，我们现在不仅跟踪最新的区块号，还跟踪其哈希值。每当我们开始新的迭代时，我们都会检查同一高度区块的哈希值是否发生变化。如果发生了变化，则说明我们遇到了重组，必须撤销所有来自已移除区块的更改。\n\
    ```"
  raw: '#### Using Subscriptions


    The easiest way to detect and react to a reorg is through subscriptions. A subscription
    on an event, such as on the ERC20 `Transfer`, will not only push new events to
    our process in real time but will also notify on any events *removed* due to a
    reorganization. This means that we can write the counterpart of our `reduceEvent`
    function to also undo an event and run it whenever the Ethereum node pushes an
    event removal (Listing [6-8](#476252_1_En_6_Chapter.xhtml#PC9)).


    ```

    // 01-indexing/subs-indexer.js

    undoTransfer(event) {

    const { from, to, value } = event.returnValues;

    if (from !== ZERO_ADDRESS) {

    this.balances[from] = this.balances[from].plus(value);

    }

    if (to !== ZERO_ADDRESS) {

    this.balances[to] = this.balances[to].minus(value);

    }

    }

    Listing 6-8

    Reverting a transfer event in our list of balances. The logic here is the reverse
    of that in the reduceEvent method

    ```


    This way, instead of polling for new blocks relying on the `getPastEvents` method,
    we can simply open a subscription and listen for events additions and removals
    (Listing [6-9](#476252_1_En_6_Chapter.xhtml#PC10)).


    ```

    async function start() {

    // Process all past blocks

    const currentBlock = await this.web3.eth.getBlockNumber();

    await this.processBlocks(this.startBlock, currentBlock);

    // Subscribe to new ones

    this.subscription = this.contract.events

    .Transfer({ fromBlock: currentBlock + 1 })

    .on(''data'', e => this.reduceEvent(e))

    .on(''changed'', e => this.undoTransfer(e.returnValues))

    .on(''error'', err => console.error("Error", err));

    }

    Listing 6-9

    Using subscriptions for monitoring new events and tracking removed ones due to
    reorganizations. The data handler fires whenever there is a new event and the
    changed one when the event is removed from the chain due to a reorganization

    ```


    However, this approach has a major downside. If the websocket connection to the
    node is lost when a reorg occurs, our script will never be notified of the removed
    events. This means that we will not roll back the reverted transfers and end up
    with an invalid state. Another issue is that subscriptions only return new events,
    so if any blocks are minted between the `processBlocks` call and the time the
    subscription is installed, we may miss some events. Let’s try a different, simpler
    approach then. We will first need to manually detect when a reorg has happened.


    #### Detecting a Reorganization


    A reorganization occurs when a chain fork gathers more accumulated hash power
    than the current head, and that fork becomes the official chain. This can happen
    if different sets of miners work on different forks.


    This means that in a reorganization, one or more blocks (starting backward from
    the current head) will be replaced by others. These new blocks may or may not
    contain the same transactions as the previous ones and may also be ordered differently,^([^(84)](#fn84))
    yielding different results.


    We can detect a reorganization by checking the block identifiers. Recall from
    Chapter [3](#476252_1_En_3_Chapter.xhtml) that each block is identified by its
    hash. This hash is calculated from the block’s data and the hash of the previous
    block. This is what constitutes a blockchain in its essence: the fact that each
    block is tied to the previous one. And this means that an old block cannot be
    changed without forcing a change in the identifiers of all subsequent blocks.


    This is exactly what allows us to easily detect a reorganization. When the hash
    of a block at a given height changes, it means that that block and potentially
    other blocks before it have changed as well. We can then just monitor the latest
    block we have processed, and if its hash changes at any point, we then scan backward
    for other changed hashes, until we detect a common ancestor (Listing [6-10](#476252_1_En_6_Chapter.xhtml#PC11)).


    Let’s modify our script to add a check for reorgs using this strategy, which will
    require us to keep track of the block hashes we have processed.


    ```

    // 01-indexing/reorgs-indexer.js

    async processNewBlocks() {

    // Track current block number and its hash

    const currentBlockNumber =

    await this.web3.eth.getBlockNumber() - CONFIRMATIONS;

    const currentBlockHash =

    await this.getBlockHash(currentBlockNumber);

    // Check for possible reorgs

    if (this.lastBlockNumber && this.lastBlockHash) {

    const newLastBlockHash

    = await this.getBlockHash(this.lastBlockNumber);

    if (this.lastBlockHash !== newLastBlockHash) {

    // There was a reorg! Undo all blocks affected,

    // and reprocess blocks starting by the most recent

    // one that was not removed from the main chain

    const lastBlock = await this.undoBlocks();

    this.lastBlockHash = lastBlock.hash;

    this.lastBlockNumber = lastBlock.number;

    }

    }

    // Process blocks from lastBlockNumber until currentBlock

    // Update this.lastBlockNumber and this.lastBlockHash

    // ...

    }

    async getBlockHash(number) {

    const { hash } = await this.web3.eth.getBlock(number);

    return hash;

    }

    Listing 6-10

    Updated processNewBlocks function that checks for reorgs on every iteration. The
    function undoBlocks (Listing 6-12) should undo all transfers related to removed
    blocks, returning the most recent block not affected by the reorganization

    ```


    Note that we are now keeping track of not just the latest block number but also
    its hash. Whenever we start a new iteration, we check if the hash for the block
    at that same height changed. If it did, then we have stumbled upon a reorganization
    and must revert all changes from the removed blocks.'
  trans: "\n```markdown\n#### 使用订阅\n\n检测并响应重组的最简单方法是通过订阅。对某个事件（例如 ERC20 的 `Transfer`）进行订阅，不仅会将新事件实时推送到我们的进程，还会通知因重组而*移除*的任何事件。这意味着我们可以编写\
    \ `reduceEvent` 函数的对应函数来撤销事件，并在以太坊节点推送事件移除时运行它（代码清单 6-8）。\n\n```\n// 01-indexing/subs-indexer.js\n\
    undoTransfer(event) {\n  const { from, to, value } = event.returnValues;\n  if\
    \ (from !== ZERO_ADDRESS) {\n    this.balances[from] = this.balances[from].plus(value);\n\
    \  }\n  if (to !== ZERO_ADDRESS) {\n    this.balances[to] = this.balances[to].minus(value);\n\
    \  }\n}\n```\n*代码清单 6-8 在我们的余额列表中撤销一个转账事件。此处的逻辑与 `reduceEvent` 方法中的逻辑相反。*\n\n\
    这样，我们就不必依赖 `getPastEvents` 方法来轮询新区块，而是可以简单地打开一个订阅并监听事件的添加和移除（代码清单 6-9）。\n\n```\n\
    async function start() {\n  // Process all past blocks\n  const currentBlock =\
    \ await this.web3.eth.getBlockNumber();\n  await this.processBlocks(this.startBlock,\
    \ currentBlock);\n  // Subscribe to new ones\n  this.subscription = this.contract.events\n\
    \    .Transfer({ fromBlock: currentBlock + 1 })\n    .on('data', e => this.reduceEvent(e))\n\
    \    .on('changed', e => this.undoTransfer(e.returnValues))\n    .on('error',\
    \ err => console.error(\"Error\", err));\n}\n```\n*代码清单 6-9 使用订阅来监控新事件以及因重组而移除的事件。当有新事件时触发\
    \ `data` 处理器，当事件因重组从链上移除时触发 `changed` 处理器。*\n\n然而，这种方法有一个主要缺点。如果在发生重组时与节点的 websocket\
    \ 连接断开，我们的脚本将永远不会收到移除事件的通知。这意味着我们无法回滚已被撤销的转账，最终导致状态无效。另一个问题是订阅只返回新事件，因此如果在 `processBlocks`\
    \ 调用与订阅建立之间有任何区块被挖出，我们可能会错过一些事件。接下来让我们尝试一种不同的、更简单的方法。我们首先需要手动检测重组的发生。\n\n####\
    \ 检测重组\n\n当一条链分叉累积了比当前主链更多的总算力时，就会发生重组，并且该分叉成为正式链。如果不同的矿工集合在不同分叉上工作，就可能发生这种情况。\n\
    \n这意味着在重组中，一个或多个区块（从当前主链开始向前追溯）将被其他区块替换。这些新区块可能包含也可能不包含与之前区块相同的交易，并且它们的顺序也可能不同^((84))，从而产生不同的结果。\n\
    \n我们可以通过检查区块标识符来检测重组。回顾第 3 章，每个区块都由其哈希值标识。这个哈希值是根据区块的数据和前一个区块的哈希值计算得出的。这就是区块链的本质：每个区块都与前一个区块相连。这意味着，如果不强制更改所有后续区块的标识符，就无法更改旧区块。\n\
    \n这正是我们能轻松检测重组的原因。当给定高度的区块的哈希值发生变化时，意味着该区块以及它之前的其他区块也可能发生了变化。然后，我们只需监视我们处理过的最后一个区块，如果其哈希值在任何时候发生变化，我们就向后扫描其他已变化的哈希值，直到检测到一个共同的祖先（代码清单\
    \ 6-10）。\n\n让我们修改脚本，使用此策略添加重组检查，这将要求我们跟踪已处理区块的哈希值。\n\n```\n// 01-indexing/reorgs-indexer.js\n\
    async processNewBlocks() {\n  // Track current block number and its hash\n  const\
    \ currentBlockNumber =\n    await this.web3.eth.getBlockNumber() - CONFIRMATIONS;\n\
    \  const currentBlockHash =\n    await this.getBlockHash(currentBlockNumber);\n\
    \  // Check for possible reorgs\n  if (this.lastBlockNumber && this.lastBlockHash)\
    \ {\n    const newLastBlockHash\n      = await this.getBlockHash(this.lastBlockNumber);\n\
    \    if (this.lastBlockHash !== newLastBlockHash) {\n      // There was a reorg!\
    \ Undo all blocks affected,\n      // and reprocess blocks starting by the most\
    \ recent\n      // one that was not removed from the main chain\n      const lastBlock\
    \ = await this.undoBlocks();\n      this.lastBlockHash = lastBlock.hash;\n   \
    \   this.lastBlockNumber = lastBlock.number;\n    }\n  }\n  // Process blocks\
    \ from lastBlockNumber until currentBlock\n  // Update this.lastBlockNumber and\
    \ this.lastBlockHash\n  // ...\n}\nasync getBlockHash(number) {\n  const { hash\
    \ } = await this.web3.eth.getBlock(number);\n  return hash;\n}\n```\n*代码清单 6-10\
    \ 更新后的 `processNewBlocks` 函数，在每次迭代时检查重组。`undoBlocks` 函数（代码清单 6-12）应撤销所有与已移除区块相关的转账，并返回未受重组影响的最新区块。*\n\
    \n请注意，我们现在不仅跟踪最新的区块号，还跟踪其哈希值。每当我们开始新的迭代时，我们都会检查同一高度区块的哈希值是否发生变化。如果发生了变化，则说明我们遇到了重组，必须撤销所有来自已移除区块的更改。\n\
    ```\n"
- fmt: '#### Reverting Changes


    When the reorganization is detected, we need to revert any transfers we have processed
    from the blocks removed. To do that, we first need to keep track of which transfers
    we processed on each block (Listing [6-11](#476252_1_En_6_Chapter.xhtml#PC12)).


    We will add a new field to our `Indexer` class: a stack containing one item per
    each block we have seen when processing a transfer event. Each item will hold
    the block number, hash, and the list of transfers it included. We will add new
    items to it whenever we reduce a new event.


    ```

    const last = require(''lodash.last'');

    async saveEvent(event) {

    // Add a new block if this event happened on a new one

    if (!last(this.eventsBlocks)

    || last(this.eventsBlocks).hash !== event.blockHash) {

    this.eventsBlocks.push({

    number: event.blockNumber,

    hash: event.blockHash,

    transfers: []

    });

    }

    // Include the transfer event on the latest block

    last(this.eventsBlocks)

    .transfers.push(event.returnValues);

    }

    ```


    *Listing 6-11 — Keeping track of transfer events per block. This function is called
    from `reduceEvent`. Note that this function must be invoked in order as new events
    are being processed to ensure the list of blocks remains sorted with the most
    recent block at its end.*


    Now that we have a list of the blocks we have processed, we can iterate it starting
    from the end and undo all the transfer events we have aggregated on our list of
    balances (Listing [6-12](#476252_1_En_6_Chapter.xhtml#PC13)).


    ```

    async undoBlocks() {

    while (this.eventsBlocks.length > 0) {

    // Check if the hash of the last block changed

    const lastBlock = last(this.eventsBlocks);

    const hash = await this.getBlockHash(lastBlock.number);

    // If it did not, then we know that all previous ones

    // have not changed either

    if (lastBlock.hash === hash)

    return lastBlock;

    // If it did, we undo all transfers for that block,

    // and iterate

    this.eventsBlocks.pop();

    lastBlock.transfers.forEach((t) =>

    this.undoTransfer(t)

    );

    }

    // We return an empty block if there are no more

    return { hash: null, number: null };

    }

    ```


    *Listing 6-12 — Walk backward the list of processed events and undo all transfers.
    This function must return the most recent block that was not removed in the reorganization,
    so the script can reprocess the chain from it. The function `undoTransfer` is
    analogous to the one presented in the subscriptions subsection earlier in this
    chapter.*


    To recap, the changes we have implemented to make our script robust against reorganizations
    are the following:


    1. When processing a transfer event, save its block number and hash on a list,
    appending the most recent ones at the end.

    2. When checking for new blocks, verify if the hash of the latest block we have
    processed has changed.

    3. If it did change, undo each transfer event that happened on each changed block,
    starting from the most recent one. When we reach an unchanged block, stop.

    4. Reset the latest block to the unchanged block, and resume processing from there.


    While these changes have introduced much complexity to our solution, they ensure
    that its state does not fall out of sync because of reorganizations. It will depend
    on your use case how you choose to handle them: ignoring the most recent blocks
    until they become confirmed, using subscriptions to let the node track removed
    events assuming a stable connection, or implementing a client-based design similar
    to this one.


    ### Unit Testing


    Up until now, we have overlooked a critical aspect of software development: tests.
    While testing is not substantially different in Ethereum than in other applications,
    we will use our indexer example to introduce some useful techniques specific to
    blockchain testing.


    #### Choosing a Node


    The first decision lies in choosing which node to use for our tests. Recall from
    earlier chapters that we can work with `ganache`, a blockchain simulator, or on
    an actual node, such as `Geth` or `Parity`, running on development mode. The former
    is lighter and provides additional methods for manipulating the blockchain state
    which are useful in unit tests. On the other hand, using an actual node will be
    more representative of the actual production setup for your application.


    A good compromise is to use `ganache` with instant seal for unit tests, while
    a `Geth` or `Parity` development node can be used for end-to-end integration tests,
    running with a fixed block time. This allows more fine-grained control in the
    unit tests and a more representative environment on integration.


    ### Note


    Whether unit tests should be allowed to call external services is typically a
    contentious issue in software development. In traditional applications, some developers
    prefer to set up a testing database to back their unit tests, while others stub
    all calls to it in order to test their code in isolation, arguing that a unit
    test must only exercise a single piece of code. Here, we will side with the former
    group and will connect to a `ganache` instance in our unit tests. Either way,
    this is only a matter of semantics on what we understand for a unit test.'
