- fmt: "### Creating the Contract Object\n\nWe will now create a `src/contracts/ERC721.js`\
    \ file that will initialize the web3 contract object, and load the deployment\
    \ address from the `Deploys.json` file. However, that file is in the `artifacts`\
    \ folder in our project root, outside the `src` folder. Unfortunately, the `create-react-app`\
    \ template prevents us from importing anything outside the `src` folder. If we\
    \ tried to import it from our react application, we would get the following error.\n\
    \n```\nYou attempted to import ../../artifacts/Deploys.json which falls outside\
    \ of the project src/ directory. Relative imports outside of src/ are not supported.\n\
    ```\n\nThe easiest way around this is to create a symlink to the `artifacts` folder\
    \ from within the `src` folder. We can do this with the following commands.\n\n\
    ```\n$ cd src\n$ ln -ns ../artifacts\n```\n\nWe can now load both the compiler\
    \ output and the deployment files in our app. Note that the limitation of loading\
    \ files from outside the source folder is exclusive to react-app. If you used\
    \ any other app template, you will probably not face this issue.^([^(78)](#fn78))\n\
    \n```\n// src/contracts/ERC721.js\nimport Artifact from '../artifacts/ERC721PayPerMint.json';\n\
    import Deploys from '../artifacts/Deploys.json';\n```\n\nBy retrieving the ABI\
    \ from the first, we can write a function to create a web3 contract instance for\
    \ our `ERC721PayPerMint`.\n\n```\n// src/contracts/ERC721.js\nexport default function\
    \ ERC721(web3,address=null,options={}) {\nconst abi = Artifact.compilerOutput.abi;\n\
    return new web3.eth.Contract(abi, address, { ...options });\n}\n```\n\nWe can\
    \ then retrieve the deployment address from the second and use it to instantiate\
    \ an `ERC721` contract at that address (Listing [5-24](#476252_1_En_5_Chapter.xhtml#PC55)).\
    \ Note that since the deployments file is indexed by network, we need to retrieve\
    \ the network ID via the `web3` object.\n\n```\n// src/contracts/ERC721.js\nimport\
    \ {\ngetWeb3, getAccount, getNetwork\n} from '../eth/network.js';\nexport async\
    \ function getDeployed() {\nconst web3 = getWeb3();\nconst from = await getAccount();\n\
    const network = await getNetwork();\nconst address = Deploys[network];\nif (!address)\
    \ throw new Error(`Could not find address for contract in network ${network}`);\n\
    return ERC721(web3, address, { from });\n}\nListing 5-24\nReturning a web3 contract\
    \ that represents the deployed instance of the ERC721PayPerMint in the current\
    \ network\n```\n\n### Root App Component\n\nOur root `App` component (Listing\
    \ [5-25](#476252_1_En_5_Chapter.xhtml#PC56)) will be similar to the one from our\
    \ previous chapter. This component will have the responsibility of loading both\
    \ the default account and the contract instance, and injecting it into a main\
    \ `ERC721` component to be defined in `src/components/ERC721.js`.\n\n```\n// src/App.js\n\
    import React, { Component } from 'react';\nimport { getDeployed } from './contracts/ERC721';\n\
    import { hasProvider, getAccount } from './eth/network';\nimport ERC721 from './components/ERC721';\n\
    class App extends Component {\nasync componentDidMount() {\nif (hasProvider())\
    \ {\nconst contract = await getDeployed();\nconst sender = await getAccount();\n\
    this.setState({ contract, sender });\n}\n}\nrender() {\nconst { contract, sender\
    \ } = this.state;\nreturn (\n\n{ (hasProvider() && contract && sender)\n? \n:\
    \ Please enable Metamask and reload\n}\n\n);\n}\n}\nListing 5-25\nMain methods\
    \ of the root App component\n```\n\nKeep in mind though that if the user changes\
    \ the current account in Metamask, we need to refresh the info displayed, since\
    \ we will be listing the user’s tokens. We can detect account changes by installing\
    \ a listener on the `ethereum` object and force a reload of the `ERC721` component\
    \ by attaching the sender as a React key^([^(79)](#fn79)) (Listing [5-26](#476252_1_En_5_Chapter.xhtml#PC57)).\n\
    \n```\n// src/App.js\nclass App extends Component {\nasync componentDidMount()\
    \ {\n// ...\nwindow.ethereum.on('accountsChanged', async (accounts)=>{\nthis.setState({\
    \ sender: accounts[0] });\n});\n}\nrender() {\n// ...\n\n// ...\n}\n}\nListing\
    \ 5-26\nUpdated methods from Listing 5-25 to monitor for account changes. When\
    \ the account is changed, the entire ERC721 component is automatically reloaded\n\
    ```\n\n### Main ERC721 Component\n\nThis component will contain most of the logic\
    \ in our application: it will list the user’s tokens and allow the user to mint\
    \ new ones via a simple *Create* button. Let’s start by listing existing tokens\
    \ when the page loads.\n\n#### Listing Existing Tokens\n\nEnumerating the non-fungible\
    \ tokens of a user can be tricky. The `ERC721` standard exposes two functions\
    \ to do this: `balanceOf` and `tokenOfOwnerByIndex`. The former returns the number\
    \ of tokens of a user, and the latter returns the token ID given an index between\
    \ zero and the user’s balance. In order to avoid the two methods falling out of\
    \ sync, it’s important to run all queries specifying a single block number.\n\n\
    ```\n// src/components/ERC721.js\nclass ERC721 extends Component {\nasync getTokensAtBlock(blockNumber)\
    \ {\nconst { contract, owner } = this.props;\n// Load number of tokens of the\
    \ user\nconst strBalance = await contract.methods.balanceOf(owner)\n.call({},\
    \ blockNumber);\nconst balance = parseInt(strBalance);\n// Retrieve the id of\
    \ every token\nconst queries = Array.from({length: balance}, (_,index)=>(\ncontract.methods.tokenOfOwnerByIndex(owner,index)\n\
    .call({}, blockNumber)\n));\nreturn await Promise.all(queries);\n}\n}\n```\n\n\
    Given the preceding function, we can now load the tokens into the component’s\
    \ state on its *didMount* lifecycle event (Listing [5-27](#476252_1_En_5_Chapter.xhtml#PC59)).\n\
    \n```\nasync componentDidMount() {\nconst currentBlock = await getBlockNumber();\n\
    const tokenIds = await this.getTokensAtBlock(currentBlock);\nconst tokens = tokenIds.map(id\
    \ => ({id, confirmed: true}));\nthis.setState({ tokens, loading: false });\n}\n\
    Listing 5-27\nLoading the user tokens into state. Note that we are adding a confirmed\
    \ flag to these tokens to distinguish them from the newly minted ones that we\
    \ will be adding later\n```\n\nWe will also initialize the component’s state in\
    \ its constructor to the following default, so the component starts in a loading\
    \ state until the user’s tokens are loaded.\n\n```\nconstructor(props) {\nsuper(props);\n\
    this.state = {\ntokens: [],\nloading: true\n};\n}\n```\n\nLet’s test this with\
    \ a simple `render` method that will just render the list of tokens by presenting\
    \ their IDs, reusing them as React keys as well.\n\n```\nrender() {\nconst { tokens,\
    \ loading } = this.state;\nif (loading) return \"Loading\";\nreturn (\n\nCollectible\
    \ Numbers\n\n{ tokens.map(token => (\n\n{ token.id.toString() }\n\n))}\n\n);\n\
    }\n```\n\nIf you check your react application in your browser, you should now\
    \ see the list of tokens that belong to the current user, assuming there are any.\
    \ We can now move onto the main feature of this app: sending a transaction to\
    \ mint a new token."
