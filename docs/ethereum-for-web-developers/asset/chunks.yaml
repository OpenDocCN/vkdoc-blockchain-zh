  trans: '

    ### 账户余额与代码


    给定一个地址，你可以查询该账户存储的 ETH，无论它是外部账户还是合约。此外，由于区块链历史不可篡改，你甚至可以查询该账户在更早时间点的余额（代码清单 4-5）。你能回溯的区块数量取决于你连接的是归档节点还是普通节点。


    ```

    > const addr = ''0xcafE1A77e84698c83CA8931F54A755176eF75f2C'';

    > const block = await web3.eth.getBlockNumber() - 10;

    > await web3.eth.getBalance(addr, block);

    ''180300794957635301822239''

    代码清单 4-5

    查询十个区块前某地址的余额

    ```


    请注意，ETH 余额**始终**以 Wei 为单位表示，这是 ETH 可分割的最小单位。1 ETH 等于 1e18 Wei（即 1 后面跟 18 个零）。你可以使用`web3`工具模块（代码清单
    4-6)）进行单位转换。


    ```

    > const balance = await web3.eth.getBalance(addr, block)

    > web3.utils.fromWei(balance)

    ''180300.794957635301822239''

    代码清单 4-6

    使用 web3.utils.fromWei 从 Wei 转换为 ETH。反向方法为 toWei

    ```


    你可能已注意到，在前面的代码片段中，ETH 余额返回的不是数字，而是**字符串**。这是为了避免在处理极大数值时丢失精度，因为 JavaScript 数字无法处理超大数量级。例如，在以下代码中，1822239
    wei 在转换为整数时会丢失。


    ```

    > parseInt(balance).toLocaleString();

    ''180,300,794,957,635,300,000,000''

    ```


    这一设计决策是`web3.js`库特有的。其他库则依赖 JavaScript 的`bignumber`实现，例如`bignumber.js`^(⁶³)或`bn.js`^(⁶⁴)。一旦语言中原生`bignumbers`^(⁶⁵)的支持趋于稳定，库很可能会切换过去。无论如何，重要的是你要记住，以太坊中的大多数数字无法用常规
    JavaScript 数字处理，否则你就有丢失精度的风险。


    除了余额，你还可以获取地址上的代码，并用它来检查该地址是合约还是外部账户。你还可以检查代码本身，看它是否与已知合约的二进制代码匹配。


    ```

    > await web3.eth.getCode(addr);

    ''0x6060604052361561011...''

    ```


    请记住，这种检查账户是合约还是外部账户的方法远非可靠。如果你从一个地址获取不到代码，并不一定意味着它就是外部账户：合约可能会在稍后部署到该地址，或者合约可能已部署在那里但最终自毁了。总而言之，对于特别敏感的操作，你应该避免依赖任意地址是外部账户还是合约的判断。


    ### 调用合约


    正如我们在第 2 章中看到的，你可以通过向其地址发出 JSON-RPC `call`来调用合约，从中查询信息。大多数合约都公开了 getter 函数，这些函数返回其当前状态的信息或执行纯计算；这些函数可以通过
    Solidity 中带有`view`或`pure`修饰符来识别。与本章中列出的所有函数一样，调用它们不会消耗任何 gas，因为网络中任何节点都可以响应调用，而且不需要在区块链上引入更改。


    这些调用可以使用`web3.js`中的`call`函数在底层执行，这需要手动提供目标地址和要发送到目标合约的原始数据。例如，`0x18160ddd`是用于访问
    ERC20 代币合约`totalSupply`的函数选择器^(⁶⁶)，因此我们可以在主网上的现有合约（例如 BAT 代币）上测试它，该合约返回`1.5e27`的十六进制表示。


    ```

    > const addr = ''0x0d8775f648430679a709e98d2b0cb6250d2887ef'';

    > await web3.eth.call({ to: addr, data: ''0x18160ddd'' });

    ''0x00000000...0004d8c55aefb8c05b5c000000''

    ```


    然而，我们通常会依赖`web3` Contract 抽象来与合约交互（代码清单 4-7）。如前所述，创建这样一个抽象需要合约的 ABI 及其地址。我们将使用
    ERC20 的 ABI^(⁶⁷)来重复前面的示例。


    ```

    > const abi = [

    {

    "constant": true,

    "inputs": [],

    "name": "totalSupply",

    "outputs": [{"name": "", "type": "uint256"}],

    "payable": false,

    "stateMutability": "view",

    "type": "function"

    }, ...

    ];

    > const erc20 = new web3.eth.Contract(abi, addr);

    > await erc20.methods.totalSupply().call()

    ''1500000000000000000000000000''

    代码清单 4-7

    通过 web3 合约对象访问同一代币的总供应量。注意输出如何根据其类型进行格式化，而不是以原始十六进制值返回

    ```


    ### 备注


    与`getBalance`一样，所有对合约的调用也可以包含一个可选的`block`参数，以防你需要查询合约在之前某个时间点的状态。请记住，请求链上太久远的区块的变更需要连接到归档节点，而归档节点并不总是可用。此外，还要注意，根据你的用例，谨慎的做法是只显示几十个区块前的数据，以保护自己免受可能的链重组影响。最近的数据通常总是可用的，无论节点是否保留归档。


    合约对象还可以用于获取函数选择器，这些选择器可以插入到底层调用或原始交易中。在下面这行代码中，`encodeABI`方法返回了我们在本节开头使用的数据选择器。


    ```

    > await erc20.methods.totalSupply().encodeABI()

    ''0x18160ddd''

    ```


    合约还公开了一个便捷的接口，用于访问 ABI 上声明的所有事件（代码清单 4-8），使得查询某个区块范围内的所有事件变得容易。


    ```

    > const block = await web3.eth.getBlockNumber();

    > const opts = { fromBlock: block - 100, toBlock: block };

    > await erc20.getPastEvents(''Transfer'', opts);

    [{address: ''0x0D8775F648430679A709E98d2b0Cb6250d2887EF'',

    blockNumber: 7060651,

    logIndex: 91,

    removed: false,

    transactionHash: ''0x3bd37...'',

    transactionIndex: 96,

    transactionLogIndex: ''0x0'',

    type: ''mined'',

    returnValues:

    Result {

    ''0'': ''0xAAAAA6...'',

    ''1'': ''0x664753...'',

    ''2'': ''1905510325611397921584'',

    from: ''0xAAAAA6...'',

    to: ''0x664753...'',

    value: ''1905510325611397921584'' },

    event: ''Transfer''

    }, ... ]

    代码清单 4-8

    获取主网上 BAT 代币在过去 100 个区块内发生的转账事件。在此示例中，以 0xAAAAA6 开头的地址向地址 0x664753 转账了 1.9e21
    个代币

    ```


    每个日志对象都告知了事件发生的区块和交易，以及事件的名称（此处为`Transfer`），并包含了触发事件时使用的参数。


    ## 检测变更


    现在我们将更深入地探讨事件。尽管我们已经知道如何查询过去的事件，但监听新事件是一种有用的方法，能在我们的应用中实时检测合约的变更。我们将看到三种不同的监控变更的方法。

    '
- fmt: '### Polling for New Blocks


    Polling is a simple yet effective method for reacting to changes (Listing [4-9](#476252_1_En_4_Chapter.xhtml#PC21)).
    Given that any change in the Ethereum network needs to be introduced via a new
    block in the chain, a perfectly valid approach is to just poll for new blocks,
    and re-read the contract state that you are interested in whenever a new block
    is mined. Since Ethereum blocks are generated every few seconds, a 1-second interval
    can be good enough.


    ```

    let block = null,

    totalSupply = null;

    const interval = setInterval(async function() {

    const newBlock = await web3.eth.getBlockNumber();

    if (newBlock !== block) {

    // update block number

    block = newBlock;

    // re-read relevant data from contract

    totalSupply = await erc20.methods.totalSupply().call();

    }

    }, 1000);

    Listing 4-9

    Polling for new blocks to update the totalSupply of an ERC20 contract. Though
    we could directly poll for the total supply, this approach is more efficient if
    there is more data that we need to update on every block

    ```


    Whenever a new block is spotted, you can query the contract your app is interacting
    with to retrieve its latest state and update your app accordingly if there were
    any changes. An alternative would be to run `getPastEvents` on the new block and
    only react if there were any events that affect your contract.


    ### Installing Event Filters


    *Event filters* are a mechanism provided by Ethereum nodes for retrieving new
    events that match a specified set of conditions. It works by allowing you to install
    an event filter **on a node** and then polling for any new events that match that
    filter. At a JSON-RPC level, this pattern is supported mainly by the following
    methods:


    - `newFilter` to install a new event filter on a node, which returns a filter
    ID

    - `getFilterChanges` that returns all new logs for a given filter ID since the
    last time this method was called

    - `uninstallFilter` to remove a filter given its ID


    Event filters still rely on polling a node for new changes, but they are more
    convenient to use, since it is now the node that keeps track of exactly what new
    events need to be sent to the client. This saves the client from needing to issue
    regular `getPastLogs` calls to check for new events and allows the node to precalculate
    the data to send if needed. It is also possible to install filters for new blocks
    and pending transactions that are sent to the node.


    ### Warning


    Some public nodes, such as the ones offered by Infura, may not support installing
    event filters. To work around this, Metamask ships with a web3 subprovider to
    fake the behavior of filters completely on the client side. This allows you to
    code your application using event filters without needing to worry about whether
    the node you are connecting to actually supports them. However, keep in mind that
    the performance gain you could get by using filters is completely lost in this
    scenario.


    At this point, it is worth going into what options can be specified for retrieving
    and polling events. These options can be used both when creating new filters and
    when getting past logs:


    - **Block ranges** can be used to specify which blocks to monitor for events.
    By default, filters are created to monitor the latest block mined.

    - One or more **addresses** where the logs originate from. Retrieving events from
    a web3 Contract object will automatically restrict the logs to the address of
    the contract instance.

    - The **topics** used to filter the events. Remember from Chapter [3](#476252_1_En_3_Chapter.xhtml)
    that EVM logs can have up to four indexed topics – these are used for filtering
    them during queries. The first topic is always the event selector, while the remaining
    topics are the indexed arguments from Solidity. A filter can impose restrictions
    on any of the topics, requesting a topic to optionally match a set of values.


    As an example, the following filter object can be used to retrieve all transfers
    of an ERC20 token sent to a group of three token holders during the last 1000
    blocks.


    ```

    > const block = await web3.eth.getBlockNumber();

    > const filter = { to: [holder1, holder2, holder3] };

    > const opts = { fromBlock: block - 1000, filter: filter };

    > await erc20.getPastEvents(''Transfer'', opts);

    ```


    The web3 library has no support for event filters. Instead, monitoring for events
    is done via the third and last mechanism for listening to changes: subscriptions.


    ### Creating Subscriptions


    A more advanced option to monitor events is to create a subscription. Event subscriptions
    work similar to event filters in that they are created in a node from a set of
    filters (block range, addresses, and topics) to indicate which events are of interest
    to the client. However, subscriptions do not require the client to poll for changes,
    but rely on two-way connections to directly push new events to the client. For
    this reason, subscriptions are only available on websockets or IPC connections
    and not on HTTP ones.


    ### Note


    Unlike event filters, Infura does support websocket connections, via the URL `wss://mainnet.infura.io/ws/v3/PROJECTID`.
    Still, in the event that the user chooses a custom node via a regular HTTP connection,
    Metamask also ships with a subprovider to fake subscriptions client-side by relying
    on polling. Again, this allows you to transparently use event subscriptions on
    your app, having a subprovider polyfill the feature if the connection or node
    does not support it.


    Under the hood, web3 uses subscriptions when you listen to an event (Listing [4-10](#476252_1_En_4_Chapter.xhtml#PC23)).
    This means that you will only be able to rely on events if you are running on
    a websocket or IPC connection, or you have a subprovider to polyfill for subscriptions.
    The web3 event emitter will report whenever a new event that matches the filter
    is available, when an error occurs, and when an event is removed from the blockchain
    due to a reorganization.


    ```

    > const filter = { to: [holder1, holder2, holder3] };

    > const sub = erc20.events.Transfer({ filter })

    .on(''data'', (evt) =>

    console.log(`New tx from ${evt.returnValues.from}`)

    )

    .on(''error'', (err) =>

    console.error(err)

    )

    .on(''changed'', (evt) =>

    console.log(`Removed tx from ${evt.returnValues.from}`)

    )

    Listing 4-10

    Setting up a subscription to monitor Transfer events on an ERC20 token contract.
    The `data` handler fires on every new event, while `error` fires upon an error
    in the subscription. Events removed from the chain due to a reorganization are
    fired in `changed`.

    ```


    Subscriptions are automatically cleared when the connection to the server is closed.
    Alternatively, they can be removed via the `unsubscribe()` method on the subscription
    object, or by using `web3.eth.clearSubscriptions()`, which removes all active
    subscriptions.


    As with event filters, it is possible to set up subscriptions for events from
    multiple addresses, as well as for new pending transactions or new blocks. Using
    the latter, a similar pattern to polling can be implemented, in which a subscription
    is installed to monitor for new blocks, and upon every block the state of the
    contract is re-read. Nevertheless, if the contract emits events for all state
    changes, monitoring them is much more efficient.


    ## Example Application


    We will now put together everything we learned in this chapter and build a web
    application for monitoring transfers on an ERC20 token. This application will
    just retrieve data from the token and not provide any interface for actually sending
    transactions.


    ### Setup


    We will once again use the `create-react-app` package to bootstrap our application.
    Needless to say, using this package is not required, but will simplify our setup
    and let us focus on building the app itself.


    ```

    npm init react-app erc20-app

    ```'
