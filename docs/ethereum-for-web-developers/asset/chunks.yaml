    \ rely on the main network to act as a secure decentralized base layer, on top\
    \ of which new consensus mechanisms are built. Hence, these scalability solutions\
    \ are said to belong to a *layer 2*, since they are not built as part of the Ethereum\
    \ protocol itself, but rather on top of it. Today, there are three main types\
    \ of layer 2 solutions:\n\n*   *Channels* are short-lived closed networks, typically\
    \ between two participants, where they exchange multiple transactions between\
    \ each other. Each party must acknowledge every transaction by signing it. To\
    \ open the channel, they first must make a deposit on a smart contract on the\
    \ Ethereum network. This contract can then validate their signatures to execute\
    \ the payouts when needed.\n\n*   *Sidechains* are parallel networks that use\
    \ a different consensus algorithm than the main network, such as proof of authority\
    \ or stake. These are usually bridged to the main network, allowing users to move\
    \ assets between the sidechain and the main chain. A variant of sidechains are\
    \ *plasma chains*, in which the good behavior of the sidechain can be fully enforced\
    \ by a smart contract on the main network.\n\n*   *External computation* solutions\
    \ do not provide a higher transaction throughput, but they do allow for more interesting\
    \ tasks to be performed in each transaction. They run computing-intensive tasks\
    \ outside the main network, tasks that would be prohibitively expensive to run\
    \ on the EVM, and then inject the result back.\n\nIn this chapter, we will explore\
    \ the first two solutions. Today there are several teams working on implementations\
    \ or new variations of each of them. We will mention some of them along the way,\
    \ but not without making our own attempts at each solution first.^([^(124)](#fn124))\n\
    \n## Channels\n\nChannels are a family of layer 2 scalability solutions that span\
    \ many different variants from unidirectional payment channels to counterfactual\
    \ generalized state channels. They can also be extrapolated to full channel networks\
    \ instead of isolated peer-to-peer solutions.\n\nWe will begin with *payment channels*.^([^(125)](#fn125))\
    \ In payment channels, two or more participants open a channel by making an initial\
    \ deposit on the main network and then perform multiple payments off-chain over\
    \ the channel. These payments are then settled trustlessly on a smart contract\
    \ on the main network.\n\n### Unidirectional Payment Channels\n\nThe easiest variant\
    \ of payment channels are *unidirectional payment channels*. Here, there are two\
    \ distinct parties involved: a recipient and a sender. These are usually a provider\
    \ that collects multiple payments in exchange for a service provided over time\
    \ and a user performing these payments. A good example of this is a player performing\
    \ microtransactions in a game.\n\n#### How do Channels Work?\n\nLet’s suppose\
    \ a scenario where a user needs to make several small purchases to a service provider.\
    \ It does not matter what the service provider is offering, only that the user\
    \ will need to perform *multiple payments to the same recipient over a period\
    \ of time* and that the provider needs a proof of each small payment to continue\
    \ providing the service.\n\nIf each and every one of these small payments is done\
    \ as a transaction on the blockchain, the accumulated transaction gas fees would\
    \ probably become considerable against the actual payments. Paying a 20-cent fee\
    \ to the network for each 20-cent payment is not a good deal. Furthermore, since\
    \ the service provider requires a proof after each payment, the confirmation times\
    \ would constantly add significant delays to the service.\n\nA solution could\
    \ be to have a trusted third party collect a large initial deposit from the user\
    \ and monitor the service being provided. The user then signs each of these *microtransactions*\
    \ with their private key, acknowledging each of the payments to be made. After\
    \ all micropayments have been made, the third party issues a single on-chain transaction\
    \ that includes the total payout to the service provider and returns the remainder\
    \ of the initial deposit to the user. Assuming both the user and the service provider\
    \ trust this party, this can reduce all micropayments to just two transactions\
    \ on the network: one for the deposit and the other for the payout.\n\nA *unidirectional\
    \ payment channel* is an implementation of this solution using a smart contract\
    \ as the trusted third party. The user is said to *open* a payment channel to\
    \ the service provider as they deploy the payment channel contract with the initial\
    \ deposit. The user sends each micropayment as a *signed message* directly to\
    \ the service provider. These messages are not sent on the Ethereum network, but\
    \ entirely off-chain via a separate protocol, such as HTTPS. When the service\
    \ provider wants to cash out, they can submit the signed messages to the payment\
    \ channel contract and collect their payments (Figure [8-1](#476252_1_En_8_Chapter.xhtml#Fig1)).\n\
    \n![../images/476252_1_En_8_Chapter/476252_1_En_8_Fig1_HTML.png](images/476252_1_En_8_Chapter/476252_1_En_8_Fig1_HTML.png)\n\
    \nFigure 8-1\n\nFlow diagram of a payment channel. The user first opens the channel\
    \ with an initial 1 ETH deposit. Every time the user needs to make a micropayment\
    \ to the service provider, they instead sign a message with the accumulated amount\
    \ to be paid and send it off-chain. When the provider wants to cash out, they\
    \ submit the latest signed message to the contract and receive their payout\n\n\
    Within a payment channel, most transactions happen completely off-chain, being\
    \ sent directly from the user to the recipient. This is why channels are considered\
    \ a *layer 2* solution, built on top of the main Ethereum network, the *layer\
    \ 1*, while inheriting many of its security properties.\n\nChannels have some\
    \ very interesting advantages over layer 1\\. After a channel has been opened,\
    \ any transaction sent through it has no gas fees, and once sent, they can also\
    \ be considered to be instantly finalized, since there is no need to wait for\
    \ any blocks to be mined to confirm it. Additionally, since transactions are exchanged\
    \ within the two participants, they are entirely private until they are submitted\
    \ to the blockchain."
  trans: '

    ## 什么是 Layer 2？


    以太坊区块链可视为一个单一的全球数据库，在网络中的每个节点上复制，需要处理每一笔发送的交易。仅仅这一点，在不考虑区块传播时间或工作量证明的情况下，就已经对可处理的交易总量施加了上限。


    > *核心限制在于，像以太坊这样的公共区块链要求每一笔交易都由网络中的每个节点处理。(...) 这是设计使然——也是公共区块链具有权威性的部分原因。节点无需依赖他人来告知当前区块链的状态。(...)
    这给以太坊的交易吞吐量带来了一个根本性限制：它不能超过我们愿意从单个节点要求的上限。*

    >

    > ——乔什·斯塔克，《理解以太坊的 Layer 2 扩容解决方案：状态通道、Plasma 和 Truebit》^(¹²³)


    但是，如果我们*不*要求每笔交易都通过整个网络运行呢？例如，在一小群参与者之间运行的一组交易，可以在一个独立的网络上处理。只有在特定时期之后，最终的余额才能上传到以太坊主网。


    这些并行（或*侧*）网络需要一定的安全保障——否则，我们直接使用常规数据库即可。关键在于，这些网络可以依赖主网作为一个安全的去中心化基础层，在其之上构建新的共识机制。因此，这些扩容解决方案被称为属于*Layer
    2*，因为它们并非作为以太坊协议本身的一部分构建，而是构建在其之上。如今，主要有三种类型的 Layer 2 解决方案：


    *   *通道*是短期存在的封闭网络，通常在两个参与者之间，他们在其中相互交换多笔交易。每一方都必须通过签署每笔交易来确认。要打开通道，他们首先需要在以太坊网络上的一个智能合约中存入一笔资金。然后，该合约可以在需要时验证他们的签名以执行支付。


    *   *侧链*是使用与主网不同的共识算法（如权威证明或权益证明）的并行网络。这些网络通常通过桥接连接到主网，允许用户在其与主链之间转移资产。侧链的一种变体是*Plasma
    链*，其中侧链的良好行为可以由主网上的一个智能合约完全强制执行。


    *   *外部计算*解决方案并不提供更高的交易吞吐量，但它们确实允许在每个交易中执行更有趣的任务。它们在主网之外运行计算密集型任务——这些任务如果在 EVM
    上运行将昂贵得难以承受——然后将结果注入回去。


    在本章中，我们将探讨前两种解决方案。如今，有几个团队正在致力于每种方案的实现或新的变体。我们将在过程中提及其中一些方案，但前提是我们先自己尝试每种方案。^(¹²⁴)


    ## 通道


    通道是 Layer 2 扩容解决方案的一个系列，涵盖从单向支付通道到反事实广义状态通道等多种不同变体。它们还可以扩展为完整的通道网络，而非孤立的点对点解决方案。


    我们将从*支付通道*开始。^(¹²⁵) 在支付通道中，两个或更多参与者通过在主网上存入初始资金来打开一个通道，然后在通道内进行多笔链下支付。这些支付最终在主网上的一个智能合约中无需信任地进行结算。


    ### 单向支付通道


    支付通道最简单的变体是*单向支付通道*。这里涉及两个不同的参与方：接收方和发送方。通常，一方是随时间提供服务的提供商，它收集多笔支付；另一方是执行这些支付的用户。一个很好的例子是在游戏中进行微交易支付的玩家。


    #### 通道如何工作？


    假设一个场景，用户需要向一个服务提供商进行多次小额购买。服务提供商提供什么并不重要，关键在于用户需要*在一段时间内向同一个接收方执行多笔支付*，并且提供商需要每笔小额支付的证明才能继续提供服务。


    如果每一笔这样的小额支付都作为区块链上的交易来完成，那么累积的交易燃料费相对于实际支付金额来说可能会相当可观。为每笔 20 美分的支付向网络支付 20 美分的手续费并不划算。此外，由于服务提供商在每次支付后都需要一个证明，确认时间会不断给服务带来显著的延迟。


    一种解决方案是让一个可信的第三方从用户那里收集一大笔初始存款，并监控正在提供的服务。然后，用户使用他们的私钥签署每一笔*微交易*，确认每笔将要进行的支付。在所有微支付完成后，第三方发起一笔链上交易，其中包括支付给服务提供商的总金额，并将初始存款的剩余部分返还给用户。假设用户和服务提供商都信任这个第三方，这可以将所有微支付减少为网络上的两笔交易：一笔用于存款，另一笔用于支付。


    *单向支付通道*是使用智能合约作为可信第三方的此方案实现。当用户部署带有初始存款的支付通道合约时，就被称为向服务提供商*打开*了一个支付通道。用户将每笔微支付作为*签名消息*直接发送给服务提供商。这些消息并非在以太坊网络上发送，而是完全通过一个独立的协议（如
    HTTPS）在链下发送。当服务提供商想要兑现时，他们可以将签名消息提交给支付通道合约并收取他们的支付（图 8-1）。


    ![../images/476252_1_En_8_Chapter/476252_1_En_8_Fig1_HTML.png](img/476252_1_En_8_Fig1_HTML.png)


    图 8-1


    支付通道的流程图。用户首先存入 1 ETH 的初始资金打开通道。每当用户需要向服务提供商进行微支付时，他们改为签署一条带有累计支付金额的消息，并将其在链下发送。当提供商想要兑现时，他们将最新的签名消息提交给合约，并收到他们的支付


    在支付通道内，大多数交易完全在链下发生，从用户直接发送给接收方。这就是为什么通道被认为是一种 *Layer 2* 解决方案，构建在以太坊主网（*Layer
    1*）之上，同时继承了其许多安全特性。


    与 Layer 1 相比，通道具有一些非常有趣的优势。通道打开后，通过其发送的任何交易都没有燃料费，并且一旦发送，它们也可以被认为是即时最终确认的，因为无需等待任何区块被挖出来确认。此外，由于交易在双方之间交换，在提交到区块链之前，它们完全是私密的。'
- fmt: '#### Implementing a Unidirectional Channel


    To illustrate how a unidirectional payment channel works, we will implement one
    from scratch (Listing [8-1](#476252_1_En_8_Chapter.xhtml#PC1)). Our payment channel
    will have a `sender` and a `recipient`, will hold the initial deposit by the `sender`,
    and will have a predetermined end time. After this specified end time, if the
    `recipient` has not collected their payment, the `sender` is allowed to withdraw
    the deposit. This mechanism is required to prevent the user deposit from being
    locked into the contract forever, if the service provider never submits the payment
    messages.


    ```solidity

    // contracts/PaymentChannel.sol

    pragma solidity ^0.5.0;

    import "openzeppelin-solidity/contracts/cryptography/ECDSA.sol";

    contract PaymentChannel {

    using ECDSA for bytes32;

    address payable sender;

    address payable recipient;

    uint256 endTime;

    bool closed;

    constructor(

    address payable _recipient, uint256 _endTime

    ) public payable {

    sender = msg.sender;

    recipient = _recipient;

    endTime = _endTime;

    }

    }

    ```

    *Listing 8-1* – Definition, state variables, and constructor for the unidirectional
    payment channel contract. We will be using the `ECDSA` library from `openzeppelin-solidity@2.1`
    to verify the signatures on the contract. Note that the constructor is `payable`,
    so the `sender` can make the initial deposit upon deployment.


    Since most transactions in a payment channel occur off-chain, we will need to
    implement only two methods. The first method, `close`, will be called by the service
    provider to submit the `sender`’s signature with the payout, collect their funds,
    and close the channel (Listing [8-2](#476252_1_En_8_Chapter.xhtml#PC2)).


    ### Note


    We will require that the `sender` always signs messages for the total to be paid
    out to the `recipient`. This allows us to just submit a single signed message
    to the contract, instead of having to process multiple ones.


    This method will only be callable by the `recipient` to prevent the `sender` from
    trying to prematurely close the channel with a message signed by them with zero
    value. Also, since the `sender` could sign a message for a total value greater
    than the deposit present in the channel, we need to limit the value transferred
    to the contract’s balance. It is up to the `recipient` to decide whether they
    will accept a payment note for more value than can be actually paid by the channel.^([^(126)](#fn126))


    After the payout to the `recipient` is done, all the remainder of the deposit
    is returned to the `sender`. Since the channel contract is of no further use at
    this point, we also destroy the contract to get a small gas refund.


    ```solidity

    // contracts/PaymentChannel.sol

    function close(

    uint256 value, bytes memory signature

    ) public {

    require(msg.sender == recipient);

    bytes32 hash = keccak256(

    abi.encodePacked(value, address(this))

    ).toEthSignedMessage();

    address signer = hash.recover(signature);

    require(signer == sender);

    uint256 funds = address(this).balance;

    recipient.transfer(funds < value ? funds : value);

    selfdestruct(sender); // destroys contract, sending funds to sender

    }

    ```

    *Listing 8-2* – Closing the payment channel by the `recipient`. This requires
    submitting a signed message by the `sender` with the value to be transferred.
    Note that the signed message also includes the address of the contract to prevent
    replay attacks on other channels with the same `sender`.


    The second function to implement will correspond to the unhappy path, in which
    the `recipient` never calls the `close` function, and the `sender` terminates
    the contract after the predetermined end period (Listing [8-3](#476252_1_En_8_Chapter.xhtml#PC3)).


    ```solidity

    // contracts/PaymentChannel.sol

    function forceClose() public {

    require(now > endTime);

    require(msg.sender == sender);

    selfdestruct(sender);

    }

    ```

    *Listing 8-3* – Forcefully closing the channel by the `sender` to recover the
    deposit if the `recipient` never cashes out.


    This implementation can be modified to exchange ERC20 tokens instead of ETH, thus
    opening the door to *token payment channels*. Instead of making an initial deposit
    of ETH, the `sender` must transfer ERC20 tokens to the channel contract as a deposit.
    These tokens are then transferred again once the channel is closed. Refer to `TokenPaymentChannel.sol`
    in the code samples for an implementation.'
