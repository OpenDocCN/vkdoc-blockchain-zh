  trans: '#### 测试我们的索引器


    现在，我们将为索引器编写一些单元测试。我们将使用 `ganache` 作为后端，`mocha` 作为测试运行器，`chai` 配合 `bignumber`
    插件来编写断言。


    第一步是部署一个 `ERC20` 代币供我们的索引器监控（清单 6-13）。我们将基于 OpenZeppelin 的默认 `ERC20` 实现进行扩展，增加一个公共铸造方法，以便轻松为想要测试的任何地址铸造代币。


    ```

    // 01-indexing/contracts/MockERC20.sol

    pragma solidity ⁰.5.0;

    import "openzeppelin-solidity/contracts/token/ERC20/ERC20.sol";

    contract MockERC20 is ERC20 {

    constructor () public { }

    function mint(address account, uint256 amount) public {

    _mint(account, amount);

    }

    }

    清单 6-13

    具有公共铸造方法的 ERC20 代币合约，允许任何人创建新代币。请勿在生产环境使用！

    ```


    现在，我们来为测试文件创建模板代码（清单 6-14）。我们需要导入所有相关组件，创建一个新的 `web3` 实例来与我们的 `ganache` 实例交互，并部署新合约。


    ```

    // 01-indexing/test/indexer.test.js

    const expect =

    require(''chai'').use(require(''chai-bignumber'')()).expect;

    const ERC20Artifact =

    require(''../artifacts/MockERC20.json'').compilerOutput;

    const Web3 = require(''web3'');

    const web3 = new Web3(''http://localhost:9545'');

    const ERC20 = new web3.eth.Contract(

    ERC20Artifact.abi, null,

    { data: ERC20Artifact.evm.bytecode.object }

    );

    describe(''indexer'', function () {

    before(''setup'', async function () {

    this.accounts = await web3.eth.getAccounts();

    this.erc20 = await ERC20.deploy().send({

    from: this.accounts[0], gas: 1e6

    });

    });

    });

    清单 6-14

    索引器测试套件的模板代码。它初始化了一个新的 web3 实例，并部署了一个 ERC20 代币合约实例。注意，为简洁起见，省略了一些 require 语句

    ```


    利用这个模板，我们现在可以在 `describe` 块中编写第一个测试，以检查合约中铸造的任何余额是否被索引器正确捕获（清单 6-15）。


    ```

    it(''record balances from minting'', async function () {

    const indexer = new Indexer({

    address: this.erc20.options.address

    provider: ''http://localhost:9545''

    });

    const [from, holder] = this.accounts;

    await this.erc20.methods.mint(holder, 1000).send({ from });

    await indexer.processNewBlocks();

    expect(indexer.getBalances()[holder])

    .to.be.bignumber.eq("1000");

    });

    清单 6-15

    检查通过铸造产生的转账是否被正确处理的测试。我们为刚部署的代币合约初始化一个新的 Indexer 实例，为一个地址铸造一些代币，然后运行索引器来检查结果

    ```


    我们可以用 `mocha` 运行这个测试。请确保在另一个终端中运行了一个 `ganache` 实例，并监听 9545 端口（清单 6-16）。


    ```

    $ ganache-cli -p 9545

    $ npx mocha

    清单 6-16

    分别启动 ganache 实例和运行测试套件。每个命令应在不同的终端中运行

    ```


    然而，如果我们运行测试，它会失败——索引器不会为持有者地址捕获任何余额。这是因为我们构建的索引器会忽略最新区块中的任何信息，只考虑经过一定数量确认后的转账。


    我们将使用 `ganache` 的 `mine` 方法来解决这个问题（清单 6-17）。这个方法在 Geth 或 Parity 中不可用，它会指示 `ganache`
    模拟挖出一个新区块。它像其他消息一样，通过底层 JSON-RPC 接口发送。


    ```

    function rpcSend(web3, method, ... params) {

    return require(''util'')

    .promisify(web3.currentProvider.send)

    .call(web3.currentProvider, {

    jsonrpc: "2.0", method, params

    });

    }

    function mineBlocks(web3, number) {

    return Promise.all(

    Array.from({ length: number }, () => (

    rpcSend(web3, "evm_mine")

    ))

    );

    }

    清单 6-17

    辅助方法，用于指示 ganache 挖出指定数量的区块。mineBlocks 中的代码会并行发送指定数量的请求，并在所有请求成功后返回

    ```


    现在，我们可以在测试中，在指示索引器处理新区块之前立即添加对 `mineBlocks` 的调用，然后重新运行测试，它会通过。


    #### 使用快照


    现在，我们可以编写更多测试来覆盖索引器的其他场景。然而，在任何良好的测试套件中，所有测试都应相互独立，但这里并非如此，因为我们只部署了一个 `ERC20`
    合约实例。这意味着某个测试中发生的任何铸造或转账操作，都会延续到后续测试中。


    虽然明显的解决方案是将 `before` 步骤替换为 `beforeEach` 步骤，以便为每个测试部署一个新的 `ERC20` 合约，但我们将借此机会引入
    `ganache` 特有的一个新概念：快照（清单 6-18）。快照允许我们保存模拟区块链的当前状态，运行一系列操作，然后回滚到保存的状态。


    ```

    function takeSnapshot(web3) {

    return rpcSend(web3, "evm_snapshot").then(r => r.result);

    }

    function revertToSnapshot(web3, id) {

    return rpcSend(web3, "evm_revert", id);

    }

    清单 6-18

    用于创建新快照（返回快照 ID）和根据指定 ID 回滚到特定快照的辅助函数

    ```


    快照的一个良好用例是通过消除为每个测试重新创建新状态的需求来节省时间（清单 6-19）。我们不必在每个测试中部署新的 `ERC20` 合约，只需部署一次，保存快照，执行一个测试，然后恢复快照以清除所有更改，再进行下一个测试。虽然这不会给我们的测试带来性能提升，但对于需要创建多个合约的更复杂设置套件来说，这将大有裨益。


    ```

    beforeEach(''take snapshot'', async function () {

    this.snapshotId = await takeSnapshot(web3);

    });

    afterEach(''revert to snapshot'', async function () {

    await revertToSnapshot(web3, this.snapshotId);

    });

    清单 6-19

    在每个测试之前创建新快照，并在测试结束后回滚到该快照。注意，同一个快照不能回滚多次，因此需要为每个测试创建一个新快照

    ```


    快照的另一个有趣用例是测试*重组*。在常规的 Geth 或 Parity 节点上触发重组很复杂，因为它需要搭建自己的私有节点网络，并通过断开和重新连接节点来模拟链分叉。另一方面，在
    `ganache` 上测试重组要简单得多：我们可以创建一个快照，挖出几个区块，然后回滚并挖出另一组具有不同交易集的区块。'
- fmt: "### Caution\n\nThis will not be equivalent to an actual chain reorganization,\
    \ since subscriptions will not report any *removed* events. Nevertheless, since\
    \ our indexer relies on plain polling for detecting any changes, using snapshots\
    \ will do in this case.\n\nLet’s write a test for checking that our indexer properly\
    \ handles chain reorganizations by undoing any balance changes from removed blocks\
    \ and processing new ones.\n\n```\nit('handles reorganizations', async function\
    \ () {\n  // Set up a new indexer\n  const indexer = new Indexer({\n    address:\
    \ this.erc20.options.address,\n    provider: 'http://localhost:9545'\n  });\n\
    \  // Mint balance for sender account and take a snapshot\n  const [from, sender,\
    \ r1, r2] = this.accounts;\n  await this.erc20.methods.mint(sender, 1000).send({\
    \ from });\n  const snapshotId = await takeSnapshot(web3);\n  // Transfer 200\
    \ tokens to r1 and r2, and mine confirmations\n  const transfer = this.erc20.methods.transfer;\n\
    \  await transfer(r1, 200).send({ from: sender });\n  await transfer(r2, 200).send({\
    \ from: sender });\n  await mineBlocks(web3, 12);\n  // Run the indexer and assert\
    \ that they were picked up\n  await this.indexer.processNewBlocks();\n  const\
    \ balances = this.indexer.getBalances();\n  expect(balances[sender]).to.be.bignumber.eq(\"\
    600\");\n  expect(balances[r1]).to.be.bignumber.eq(\"200\");\n  expect(balances[r2]).to.be.bignumber.eq(\"\
    200\");\n  // Rollback to simulate the reorg and send new transfers\n  await revertToSnapshot(web3,\
    \ snapshotId);\n  await methods.transfer(r1, 300).send({ from: sender });\n  await\
    \ mineBlocks(web3, 15);\n  // Check that the old state was discarded\n  await\
    \ this.indexer.processNewBlocks();\n  const newBalances = this.indexer.getBalances();\n\
    \  expect(newBalances[sender]).to.be.bignumber.eq(\"700\");\n  expect(newBalances[r1]).to.be.bignumber.eq(\"\
    300\");\n  expect(newBalances[r2]).to.be.bignumber.eq(\"0\");\n});\n```\n\n###\
    \ Note\n\nThese testing techniques can be used to test not only components that\
    \ interact with smart contracts but the smart contracts themselves. It is a good\
    \ practice to have a good test coverage in any code you deploy to the network,\
    \ especially considering you will not be able to modify it later (in most cases^([^(89)](#fn89)))\
    \ to fix any bugs.\n\n### A Note on Centralization\n\nFor the first time in this\
    \ book, we have introduced a server-side component to our applications. Instead\
    \ of just building a client-side-only app that connects directly to the blockchain,\
    \ we now have a new centralized dependency that is required for our application\
    \ to run. It can be argued that our application thus no longer qualifies as a\
    \ decentralized app, as it blindly trusts data returned by a server run by a single\
    \ team.\n\nDepending on the kind of data being queried, this can be alleviated\
    \ by having the client *verify* part of the data supplied by the server. Following\
    \ with the ERC20 balance example, a client could request the top 10 holders of\
    \ a token from the indexing server and then verify against the blockchain that\
    \ their balances are correct. They may still not be the top 10 – but at least\
    \ the client has a guarantee that the balances have not been tampered with.\n\n\
    However, this is not a solution to the problem, as not all data can be verified\
    \ against the blockchain without having to re-query all events. Furthermore, our\
    \ application now depends on a component that could go down at any time, rendering\
    \ it unusable.\n\nLet’s discuss two different approaches to this problem. The\
    \ upcoming discussion applies not just to indexing but also to any other off-chain\
    \ service, such as storage or intensive computation.\n\n#### Decentralized Services\n\
    \nOne approach to this problem is to look for *decentralized* off-chain solutions.\
    \ For instance, at the time of this writing, a GraphQL interface to blockchain\
    \ data named *EthQL*^([^(90)](#fn90)) is under review. This could be added as\
    \ part of the standard interface for all Ethereum nodes, allowing easier querying\
    \ of events from any client. As another example, `thegraph`^([^(91)](#fn91)) is\
    \ a project that offers customized GraphQL schemas for different protocols. They\
    \ rely on a token-incentivized decentralized network of nodes that keep such schemas\
    \ up to date and answer any queries from users.\n\nWhile elegant, these decentralized\
    \ solutions may not yet be ready for all use cases. Decentralized indexing or\
    \ computing solutions are still being designed. And even when ready, a generic\
    \ decentralized solution may not always cater for the specific needs of your application.\
    \ With this in mind, we will discuss a second approach.\n\n#### Centralized Applications\n\
    \nAn apparent non-solution to the problem is to just accept that applications\
    \ *can be centralized*. This may come as a controversial statement, having focused\
    \ strongly on decentralized applications throughout the book, but it does not\
    \ need to be.\n\nIt can be argued that the strength of a blockchain-based system\
    \ lies not in the application but in the protocol layer. By relying on the chain\
    \ as the ultimate source of truth and building open protocols that run on it,\
    \ any developer can freely build an application to interact with such protocols.\
    \ This gives a user the flexibility to move between different apps that act as\
    \ *gateways* to their data in a common decentralized protocol layer. Decentralization\
    \ is then understood as the freedom of being able to pack up and leave at any\
    \ time while preserving all data and network effects that arise from the shared\
    \ decentralized layers.\n\nThis rationale gives us as developers the freedom to\
    \ build solutions as powerful as we want in the application level by leveraging\
    \ any number of centralized components for querying, storage, computing, or any\
    \ other service we could need. These solutions have the potential to deliver a\
    \ much richer user experience than fully decentralized ones.\n\nAs you can imagine,\
    \ centralization is a contentious issue in the Ethereum development community.\
    \ There is no right or wrong answer to this topic, and the discussion will probably\
    \ keep evolving over time. Regardless of the approach you take, be sure to understand\
    \ the pros and cons of it and weigh them against the requirements of the solution\
    \ you are looking to build.\n\n## Storage\n\nWe will now focus on another problem\
    \ in Ethereum: storage. Storing data on the Ethereum blockchain is very expensive,\
    \ costing 625 gas per byte (rounded up to 32-byte slots), plus a base 68 per non-zero\
    \ byte just for sending that data to the blockchain. At 1 GWei gas price, this\
    \ means that storing a 100 KB PNG will cost about 0.07 ETH. On the other hand,\
    \ saving data in logs for off-chain access is much cheaper, costing 8 gas units\
    \ per byte, plus the base 68 for sending the data (this amounts to 1/10th of the\
    \ cost for our sample image), but is still expensive as we start scaling up. This\
    \ means we need to look into alternative solutions for storing large application\
    \ data.\n\n### Off-chain Storage\n\nFollowing a similar approach to the one we\
    \ used for indexing, we can set up a separate centralized server that provides\
    \ storage capabilities. Instead of storing the actual data on the blockchain,\
    \ we can store the URL from which we can retrieve that data off-chain. Of course,\
    \ this approach is only useful for data that is not needed for contract execution\
    \ logic, but rather for off-chain purposes - such as displaying an image associated\
    \ to an asset.\n\nAlong with the URL, we should also store the hash of the data\
    \ stored. This allows any client that retrieves that information to verify that\
    \ the storage server has not tampered with it. Even though data may be rendered\
    \ inaccessible due to the storage server going down, the hash guarantees that\
    \ any client can check that provided the data is correct. In other words, **we\
    \ may be sacrificing the availability of our data by moving it off-chain, but\
    \ not its integrity**.\n\nWe will pick up our ERC721 minting application from\
    \ the previous chapter as a sample use case to illustrate how this may be implemented\
    \ and store metadata associated to each token (such as a name and description)\
    \ in an off-chain site."
  raw: '### Caution


    This will not be equivalent to an actual chain reorganization, since subscriptions
    will not report any *removed* events. Nevertheless, since our indexer relies on
    plain polling for detecting any changes, using snapshots will do in this case.


    Let’s write a test for checking that our indexer properly handles chain reorganizations
    by undoing any balance changes from removed blocks and processing new ones.


    ```

    it(''handles reorganizations'', async function () {

    // Set up a new indexer

    const indexer = new Indexer({

    address: this.erc20.options.address

    provider: ''http://localhost:9545''

    });

    // Mint balance for sender account and take a snapshot

    const [from, sender, r1, r2] = this.accounts;

    await this.erc20.methods.mint(sender, 1000).send({ from });

    const snapshotId = await takeSnapshot(web3);

    // Transfer 200 tokens to r1 and r2, and mine confirmations

    const transfer = this.erc20.methods.transfer;

    await transfer(r1, 200).send({ from: sender });

    await transfer(r2, 200).send({ from: sender });

    await mineBlocks(web3, 12);

    // Run the indexer and assert that they were picked up

    await this.indexer.processNewBlocks();

    const balances = this.indexer.getBalances();

    expect(balances[sender]).to.be.bignumber.eq("600");

    expect(balances[r1]).to.be.bignumber.eq("200");

    expect(balances[r2]).to.be.bignumber.eq("200");

    // Rollback to simulate the reorg and send new transfers

    await revertToSnapshot(web3, snapshotId);

    await methods.transfer(r1, 300).send({ from: sender });

    await mineBlocks(web3, 15);

    // Check that the old state was discarded

    await this.indexer.processNewBlocks();

    const newBalances = this.indexer.getBalances();

    expect(newBalances[sender]).to.be.bignumber.eq("700");

    expect(newBalances[r1]).to.be.bignumber.eq("300");

    expect(newBalances[r2]).to.be.bignumber.eq("0");

    });

    ```


    ### Note


    These testing techniques can be used to test not only components that interact
    with smart contracts but the smart contracts themselves. It is a good practice
    to have a good test coverage in any code you deploy to the network, especially
    considering you will not be able to modify it later (in most cases^([^(89)](#fn89)))
    to fix any bugs.


    ### A Note on Centralization


    For the first time in this book, we have introduced a server-side component to
    our applications. Instead of just building a client-side-only app that connects
    directly to the blockchain, we now have a new centralized dependency that is required
    for our application to run. It can be argued that our application thus no longer
    qualifies as a decentralized app, as it blindly trusts data returned by a server
    run by a single team.


    Depending on the kind of data being queried, this can be alleviated by having
    the client *verify* part of the data supplied by the server. Following with the
    ERC20 balance example, a client could request the top 10 holders of a token from
    the indexing server and then verify against the blockchain that their balances
    are correct. They may still not be the top 10 – but at least the client has a
    guarantee that the balances have not been tampered with.


    However, this is not a solution to the problem, as not all data can be verified
    against the blockchain without having to re-query all events. Furthermore, our
    application now depends on a component that could go down at any time, rendering
    it unusable.


    Let’s discuss two different approaches to this problem. The upcoming discussion
    applies not just to indexing but also to any other off-chain service, such as
    storage or intensive computation.


    #### Decentralized Services


    One approach to this problem is to look for *decentralized* off-chain solutions.
    For instance, at the time of this writing, a GraphQL interface to blockchain data
    named *EthQL*^([^(90)](#fn90)) is under review. This could be added as part of
    the standard interface for all Ethereum nodes, allowing easier querying of events
    from any client. As another example, thegraph^([^(91)](#fn91)) is a project that
    offers customized GraphQL schemas for different protocols. They rely on a token-incentivized
    decentralized network of nodes that keep such schemas up to date and answer any
    queries from users.


    While elegant, these decentralized solutions may not yet be ready for all use
    cases. Decentralized indexing or computing solutions are still being designed.
    And even when ready, a generic decentralized solution may not always cater for
    the specific needs of your application. With this in mind, we will discuss a second
    approach.


    #### Centralized Applications


    An apparent non-solution to the problem is to just accept that applications *can
    be centralized*. This may come as a controversial statement, having focused strongly
    on decentralized applications throughout the book, but it does not need to be.


    It can be argued that the strength of a blockchain-based system lies not in the
    application but in the protocol layer. By relying on the chain as the ultimate
    source of truth and building open protocols that run on it, any developer can
    freely build an application to interact with such protocols. This gives a user
    the flexibility to move between different apps that act as *gateways* to their
    data in a common decentralized protocol layer. Decentralization is then understood
    as the freedom of being able to pack up and leave at any time while preserving
    all data and network effects that arise from the shared decentralized layers.


    This rationale gives us as developers the freedom to build solutions as powerful
    as we want in the application level by leveraging any number of centralized components
    for querying, storage, computing, or any other service we could need. These solutions
    have the potential to deliver a much richer user experience than fully decentralized
    ones.


    As you can imagine, centralization is a contentious issue in the Ethereum development
    community. There is no right or wrong answer to this topic, and the discussion
    will probably keep evolving over time. Regardless of the approach you take, be
    sure to understand the pros and cons of it and weigh them against the requirements
    of the solution you are looking to build.


    ## Storage


    We will now focus on another problem in Ethereum: storage. Storing data on the
    Ethereum blockchain is very expensive, costing 625 gas per byte (rounded up to
    32-byte slots), plus a base 68 per non-zero byte just for sending that data to
    the blockchain. At 1GWei gas price, this means that storing a 100kb PNG will cost
    about 0.07 ETH. On the other hand, saving data in logs for off-chain access is
    much cheaper, costing 8 gas units per byte, plus the base 68 for sending the data
    (this amounts to 1/10th of the cost for our sample image), but is still expensive
    as we start scaling up. This means we need to look into alternative solutions
    for storing large application data.


    ### Off-chain Storage


    Following a similar approach to the one we used for indexing, we can set up a
    separate centralized server that provides storage capabilities. Instead of storing
    the actual data on the blockchain, we can store the URL from which we can retrieve
    that data off-chain. Of course, this approach is only useful for data that is
    not needed for contract execution logic, but rather for off chain purposes - such
    as displaying an image associated to an asset.


    Along with the URL, we should also store the hash of the data stored. This allows
    any client that retrieves that information to verify that the storage server has
    not tampered with it. Even though data may be rendered inaccessible due to the
    storage server going down, the hash guarantees that any client can check that
    provided the data is correct. In other words, **we may be sacrificing the availability
    of our data by moving it off-chain, but not its integrity**.


    We will pick up our ERC721 minting application from the previous chapter as a
    sample use case to illustrate how this may be implemented and store metadata associated
    to each token (such as a name and description) in an off-chain site.'
  trans: "\n### 注意\n\n这不等同于实际的链重组，因为订阅不会报告任何*已移除*的事件。不过，由于我们的索引器依赖简单的轮询来检测任何变化，在这种情况下使用快照是可行的。\n\
    \n让我们编写一个测试，通过撤销已移除区块中的所有余额变动并处理新区块，来检验索引器能否正确处理链重组。\n\n```\nit('handles reorganizations',\
    \ async function () {\n  // 设置一个新的索引器\n  const indexer = new Indexer({\n    address:\
    \ this.erc20.options.address,\n    provider: 'http://localhost:9545'\n  });\n\
    \  // 为发送者账户铸造余额并拍摄快照\n  const [from, sender, r1, r2] = this.accounts;\n  await\
    \ this.erc20.methods.mint(sender, 1000).send({ from });\n  const snapshotId =\
    \ await takeSnapshot(web3);\n  // 向 r1 和 r2 转账 200 个代币，并挖掘确认区块\n  const transfer\
    \ = this.erc20.methods.transfer;\n  await transfer(r1, 200).send({ from: sender\
    \ });\n  await transfer(r2, 200).send({ from: sender });\n  await mineBlocks(web3,\
    \ 12);\n  // 运行索引器并断言这些转账已被捕获\n  await this.indexer.processNewBlocks();\n  const\
    \ balances = this.indexer.getBalances();\n  expect(balances[sender]).to.be.bignumber.eq(\"\
    600\");\n  expect(balances[r1]).to.be.bignumber.eq(\"200\");\n  expect(balances[r2]).to.be.bignumber.eq(\"\
    200\");\n  // 回滚以模拟重组并发送新的转账\n  await revertToSnapshot(web3, snapshotId);\n  await\
    \ methods.transfer(r1, 300).send({ from: sender });\n  await mineBlocks(web3,\
    \ 15);\n  // 检查旧状态已被丢弃\n  await this.indexer.processNewBlocks();\n  const newBalances\
    \ = this.indexer.getBalances();\n  expect(newBalances[sender]).to.be.bignumber.eq(\"\
    700\");\n  expect(newBalances[r1]).to.be.bignumber.eq(\"300\");\n  expect(newBalances[r2]).to.be.bignumber.eq(\"\
    0\");\n});\n```\n\n### 注\n\n这些测试技术不仅可以用来测试与智能合约交互的组件，也可以用来测试智能合约本身。为你部署到网络上的任何代码提供良好的测试覆盖率是一种良好实践，尤其是考虑到你之后（在大多数情况下^(⁸⁹)）将无法修改它来修复任何错误。\n\
    \n### 关于中心化的说明\n\n本书中，我们首次在应用程序中引入了服务器端组件。我们现在不再仅仅构建一个直接连接到区块链的纯客户端应用，而是有了一个应用运行所必需的新的中心化依赖项。可以说，我们的应用因此不再符合去中心化应用的标准，因为它盲目地信任由单个团队运行的服务器返回的数据。\n\
    \n根据被查询数据的类型，可以通过让客户端*验证*服务器提供的部分数据来缓解这个问题。沿用 ERC20 余额的例子，客户端可以从索引服务器请求某个代币的 top\
    \ 10 持有者，然后对照区块链验证他们的余额是否正确。他们可能仍然不是 top 10 持有者——但至少客户端可以保证余额未被篡改。\n\n然而，这并非问题的解决方案，因为并非所有数据都能在不重新查询所有事件的情况下对照区块链进行验证。此外，我们的应用现在依赖于一个可能随时宕机的组件，导致应用无法使用。\n\
    \n让我们讨论解决这个问题的两种不同方法。接下来的讨论不仅适用于索引，也适用于任何其他链下服务，例如存储或密集型计算。\n\n#### 去中心化服务\n\n\
    解决这个问题的一种方法是寻找*去中心化*的链下解决方案。例如，在撰写本文时，一个名为 *EthQL*^(⁹⁰) 的、面向区块链数据的 GraphQL 接口正在审查中。这可以作为所有以太坊节点标准接口的一部分添加，从而允许任何客户端更方便地查询事件。另一个例子是\
    \ `thegraph`^(⁹¹) 项目，它为不同的协议提供定制的 GraphQL 模式。它们依赖一个由代币激励的去中心化节点网络来保持这些模式的最新状态，并回答用户的任何查询。\n\
    \n虽然这些去中心化解决方案很优雅，但它们可能尚未准备好适用于所有用例。去中心化的索引或计算解决方案仍在设计中。即使准备就绪，通用的去中心化解决方案也可能无法始终满足你应用的特殊需求。考虑到这一点，我们将讨论第二种方法。\n\
    \n#### 中心化应用\n\n一个明显的“非解决方案”就是接受应用程序*可以是中心化的*。这听起来可能是一个有争议的说法，因为本书一直重点强调去中心化应用，但情况未必如此。\n\
    \n可以说，基于区块链的系统的优势不在于应用层，而在于协议层。通过依赖链作为最终真相来源，并构建在其上运行的开源协议，任何开发者都可以自由地构建应用来与这些协议交互。这赋予了用户灵活性，可以在充当通往公共去中心化协议层中数据*网关*的不同应用之间切换。因此，去中心化可以被理解为：能够在任何时候打包数据并离开，同时保留所有数据以及由共享去中心化层产生的网络效应。\n\
    \n这种理念赋予了我们作为开发者自由：在应用层，通过利用任意数量的中心化组件（用于查询、存储、计算或我们可能需要的任何其他服务），来构建我们想要的强大解决方案。这些解决方案有潜力提供比完全去中心化解决方案更丰富的用户体验。\n\
    \n正如你所想象的，中心化是以太坊开发者社区中一个有争议的问题。对于这个话题没有绝对正确或错误的答案，讨论可能会随着时间的推移而不断发展。无论你采取哪种方法，请确保理解其利弊，并根据你正在构建的解决方案的需求进行权衡。\n\
    \n## 存储\n\n现在我们将关注以太坊中的另一个问题：存储。将以太坊区块链上的数据存储非常昂贵，每字节花费 625 gas（向上取整到 32 字节的插槽），此外，仅仅将数据发送到区块链就需要为每个非零字节支付基础的\
    \ 68 gas。以 1 GWei 的 Gas 价格计算，存储一个 100 KB 的 PNG 图像将花费约 0.07 ETH。另一方面，将数据保存在日志中供链下访问要便宜得多，每字节花费\
    \ 8 个 gas 单位，外加发送数据的基础 68 gas（对于我们示例图像的成本来说，这相当于其 1/10），但随着我们开始扩展规模，它仍然很昂贵。这意味着我们需要寻找替代方案来存储大型应用数据。\n\
    \n### 链下存储\n\n遵循与我们用于索引类似的方法，我们可以设置一个独立的中心化服务器来提供存储能力。我们可以存储用于从链下检索该数据的 URL，而不是将实际数据存储在区块链上。当然，这种方法仅适用于合约执行逻辑不需要而仅用于链下目的的数据——例如显示与某个资产关联的图像。\n\
    \n与 URL 一起，我们还应该存储所存储数据的哈希值。这允许任何检索该信息的客户端验证存储服务器是否篡改了数据。即使由于存储服务器宕机导致数据无法访问，哈希值也保证了任何客户端在数据可用时都可以检查其正确性。换句话说，**我们可能通过将数据迁移到链下来牺牲其可用性，但不会牺牲其完整性**。\n\
    \n我们将以上一章中的 ERC721 铸造应用作为示例用例，来说明如何实现这一点，并将与每个代币关联的元数据（例如名称和描述）存储在链下站点上。\n"
- fmt: '### ERC721 Metadata Extension


    Before we go into the implementation, we will briefly review one of the extensions
    of the ERC721 standard: the metadata extension. This extension specifies that
    every token has an associated *token URI* that holds its metadata. This URI, which
    could be an HTTP URL, holds a JSON document with information on each token. This
    metadata can range from a canonical name, some description text, tags, authoring
    information, images, or any other fields specific to the domain of the collectible.


    ```

    function tokenURI(uint256 tokenId)

    external view returns (string memory);

    ```


    We will extend our ERC721 contract to include the `ERC721Metadata` base contract
    provided by the `openzeppelin-solidity@2.2.0` package, which tracks a URI per
    token.


    ```

    // 02-storage/contracts/ERC721PayPerMint.sol

    pragma solidity ^0.5.0;

    // import SafeMath, ERC721, ERC721Enumerable, ERC721Metadata

    contract ERC721PayPerMint

    is ERC721, ERC721Enumerable, ERC721Metadata {

    using SafeMath for uint256;

    constructor() public ERC721Metadata("PayPerMint", "PPM") { }

    function exists(uint256 id) public view returns (bool) {

    return _exists(id);

    }

    function mint(

    address to, uint256 tokenId, string memory tokenURI

    ) public payable returns (bool) {

    require(msg.value >= tokenId.mul(1e12));

    _mint(to, tokenId);

    _setTokenURI(tokenId, tokenURI);

    return true;

    }

    }

    ```


    Let’s modify our application to save metadata in a storage server and add the
    URL with the data to the token contract, along with the content hash.


    ### Saving Token Metadata


    We will modify our main `mint` method in the ERC721 component so that it accepts
    not just an ID but also a title and description string fields. We will save this
    data off-chain, obtain an URL, and pass it along to the following contract `mint`
    call.


    ```

    // 02-storage/src/components/ERC721.js

    async mint({ id, title, description }) {

    const { contract, owner } = this.props;

    const data = JSON.stringify({ id, title, description });

    const url = await save(data);

    const value = new BigNumber(id).shiftedBy(12).toString(10);

    const gasPrice = await getGasPrice();

    const gas = await contract.methods

    .mint(owner, id, url).estimateGas({ value, from: owner });

    contract.methods.mint(owner, id, url)

    .send({ value, gas, gasPrice, from: owner })

    .on(''transactionHash'', () => {

    this.addToken(id, { title, description });

    })

    }

    ```


    The `save` function will calculate the hash of the data, use it as an identifier,
    and store it in a storage server. Note that by using the hash as an identifier,
    any client can validate that the data retrieved has not been tampered with.


    ```

    // 02-storage/src/storage/local.js

    import { createHash } from ''crypto'';

    const server = ''http://localhost:3010'';

    export async function save(data) {

    let hash = createHash(''sha256'').update(data).digest(''hex'');

    let url = `${server}/${hash}`;

    await fetch(url, {

    method: ''POST'', mode: ''cors'', body: data,

    headers: { "Content-Type": "application/json" }

    });

    return url;

    }

    ```


    In this example, the server that receives the POST request is a NodeJS process
    that will accept arbitrary JSON data at an URL path, save it locally in a file,
    and then serve it upon a GET request. In an actual application, you may want to
    rely on real storage services.


    We can now load the tokens’ metadata on the initial load. We will add a call to
    a new `loadTokensData` function when the main component loads and after the list
    of existing tokens has been retrieved.


    ```

    // 02-storage/src/components/ERC721.js

    loadTokensData(tokens) {

    const { contract } = this.props;

    tokens.forEach(async ({ id }) => {

    // Retrieve metadata url from the contract

    const url = await contract.methods.tokenURI(id).call();

    // Retrieve data from the url

    const data = await fetch(url)

    .then(res => res.json()).catch(() => "");

    // Validate data integrity and update state

    const hash = createHash(''sha256'')

    .update(JSON.stringify(data)).digest(''hex'');

    const path = new URL(url).pathname.slice(1);

    if (path === hash) this.setTokenData(id, data);

    });

    }

    ```


    Note that the metadata integrity is verified by calculating its hash before accepting
    it. You can test it by modifying the saved metadata in your local filesystem (look
    in the `server/data` folder of the project) and checking that no metadata is displayed
    for the modified token.


    This allows us to associate additional data to each non-fungible token when we
    mint it, which can be actually leveraged by any application that displays token
    information. In that regard, you can think of token metadata as the equivalent
    of opengraph metadata for a regular HTML page.


    ### Interplanetary Storage


    As an alternative to centralized storage solutions, we can store our data in the
    *InterPlanetary File System* (IPFS). IPFS is “a distributed system for storing
    and accessing files, web sites, applications, and data.” In other words, it acts
    as a decentralized storage system.


    #### What is IPFS?


    IPFS acts as a peer-to-peer content distribution system. Any node can join the
    network, from a dedicated IPFS server to a regular user in their home computer.
    Whenever a user requests a file from the network, that file is downloaded from
    the nearest node that has the file and is made available for other users to download
    from this new location. Availability of a piece of content depends on having enough
    users willing to store the relevant files.


    Any data unit in IPFS is not identified by its location, as it is in most traditional
    file systems, but by its content. When requesting a file from the IPFS network,
    you address it by its identifier, which is nothing else than a hash of the content.
    This guarantees integrity of all content, since a client will validate all content
    received against its identifier. It also allows a client to request a file without
    needing to know *where* it is stored in the network.


    This implies that content in IPFS is immutable. Any changes to it require storing
    a new copy entirely under a new identifier. The previous file will be retained
    by the network as long as someone keeps a copy of it.


    All these properties make IPFS a good match for blockchain applications. The content
    hash verification we manually built in the previous section is already provided
    by the protocol itself. And by indexing the content identifier in the smart contract
    instead of its location, we can decouple the blockchain data from any centralized
    content provider.


    ### Note


    IPFS relies on users willing to save and share content for availability, which
    may make it look like a poor choice for building critical applications. Nevertheless,
    data availability for your application can be provided by relying on an IPFS pinning
    service. These are services that act as traditional storage servers, but they
    take part on the IPFS network by making *your* content available to all users
    – for a fee, that is.'
  raw: '#### ERC721 Metadata Extension


    Before we go into the implementation, we will briefly review one of the extensions
    of the ERC721 standard: the metadata extension (Listing [6-20](#476252_1_En_6_Chapter.xhtml#PC22)).
    This extension specifies that every token has an associated *token URI* that holds
    its metadata. This URI, which could be an HTTP URL, holds a JSON document with
    information on each token. This metadata can range from a canonical name, some
    description text, tags, authoring information, images, or any other fields specific
    to the domain of the collectible.


    ```

    function tokenURI(uint256 tokenId)

    external view returns (string memory);

    Listing 6-20

    Specification of the tokenURI method required by the ERC721 metadata extension

    ```


    We will extend our ERC721 contract (Listing [6-21](#476252_1_En_6_Chapter.xhtml#PC23))
    to include the `ERC721Metadata` base contract provided by the `openzeppelin-solidity@2.2.0`
    package, which tracks a URI per token.


    ```

    // 02-storage/contracts/ERC721PayPerMint.sol

    pragma solidity ^0.5.0;

    // import SafeMath, ERC721, ERC721Enumerable, ERC721Metadata

    contract ERC721PayPerMint

    is ERC721, ERC721Enumerable, ERC721Metadata {

    using SafeMath for uint256;

    constructor() public ERC721Metadata("PayPerMint", "PPM") { }

    function exists(uint256 id) public view returns (bool) {

    return _exists(id);

    }

    function mint(

    address to, uint256 tokenId, string memory tokenURI

    ) public payable returns (bool) {

    require(msg.value >= tokenId.mul(1e12));

    _mint(to, tokenId);

    _setTokenURI(tokenId, tokenURI);

    return true;

    }

    }

    Listing 6-21

    Updated ERC721 contract that accepts an associated tokenURI when minting a token.
    Recall that this contract required an amount of ETH proportional to the ID of
    the token for fun and profit

    ```


    Let’s modify our application to save metadata in a storage server and add the
    URL with the data to the token contract, along with the content hash.


    #### Saving Token Metadata


    We will modify our main mint method in the ERC721 component so that it accepts
    not just an ID but also a title and description string fields (Listing [6-22](#476252_1_En_6_Chapter.xhtml#PC24)).
    We will save this data off-chain, obtain an URL, and pass it along to the following
    contract *mint* call.


    ```

    // 02-storage/src/components/ERC721.js

    async mint({ id, title, description }) {

    const { contract, owner } = this.props;

    const data = JSON.stringify({ id, title, description });

    const url = await save(data);

    const value = new BigNumber(id).shiftedBy(12).toString(10);

    const gasPrice = await getGasPrice();

    const gas = await contract.methods

    .mint(owner, id, url).estimateGas({ value, from: owner });

    contract.methods.mint(owner, id, url)

    .send({ value, gas, gasPrice, from: owner })

    .on(''transactionHash'', () => {

    this.addToken(id, { title, description });

    })

    }

    Listing 6-22

    Updated mint method to handle token metadata. Note that this also requires modifying
    the Mint component by adding the title and description inputs, so the user can
    provide these values

    ```


    The save function will calculate the hash of the data, use it as an identifier,
    and store it in a storage server (Listing [6-23](#476252_1_En_6_Chapter.xhtml#PC25)).
    Note that by using the hash as an identifier,^([^(92)](#fn92)) any client can
    validate that the data retrieved has not been tampered with.


    ```

    // 02-storage/src/storage/local.js

    import { createHash } from ''crypto'';

    const server = ''http://localhost:3010'';

    export async function save(data) {

    let hash = createHash(''sha256'').update(data).digest(''hex'');

    let url = `${server}/${hash}`;

    await fetch(url, {

    method: ''POST'', mode: ''cors'', body: data,

    headers: { "Content-Type": "application/json" }

    });

    return url;

    }

    Listing 6-23

    Saving data to a local storage server, using the data hash as an identifier

    ```


    In this example, the server that receives the POST request is a NodeJS process
    that will accept arbitrary JSON data at an URL path, save it locally in a file,
    and then serve it upon a GET request. In an actual application, you may want to
    rely on real storage services.


    We can now load the tokens’ metadata on the initial load (Listing [6-24](#476252_1_En_6_Chapter.xhtml#PC26)).
    We will add a call to a new `loadTokensData` function when the main component
    loads and after the list of existing tokens has been retrieved.


    ```

    // 02-storage/src/components/ERC721.js

    loadTokensData(tokens) {

    const { contract } = this.props;

    tokens.forEach(async ({ id }) => {

    // Retrieve metadata url from the contract

    const url = await contract.methods.tokenURI(id).call();

    // Retrieve data from the url

    const data = await fetch(url)

    .then(res => res.json()).catch(() => "");

    // Validate data integrity and update state

    const hash = createHash(''sha256'')

    .update(JSON.stringify(data)).digest(''hex'');

    const path = new URL(url).pathname.slice(1);

    if (path === hash) this.setTokenData(id, data);

    });

    }

    Listing 6-24

    Loop through all current tokens and load their metadata by querying the contract
    to retrieve the URL where it is stored and then the URL to retrieve the actual
    metadata.

    ```


    Note that the metadata integrity is verified by calculating its hash before accepting
    it. You can test it by modifying the saved metadata in your local filesystem (look
    in the `server/data` folder of the project) and checking that no metadata is displayed
    for the modified token.


    This allows us to associate additional data to each non-fungible token when we
    mint it, which can be actually leveraged by any application that displays token
    information. In that regard, you can think of token metadata as the equivalent
    of opengraph metadata^([^(93)](#fn93)) for a regular HTML page.


    ### Interplanetary Storage


    As an alternative to centralized storage solutions, we can store our data in the
    *InterPlanetary File System* (IPFS). IPFS is “a distributed system for storing
    and accessing files, web sites, applications, and data.”^([^(94)](#fn94)) In other
    words, it acts as a decentralized storage system.


    #### What is IPFS?


    IPFS acts as a peer-to-peer content distribution system. Any node can join the
    network, from a dedicated IPFS server to a regular user in their home computer.
    Whenever a user requests a file from the network, that file is downloaded from
    the nearest node that has the file and is made available for other users to download
    from this new location. Availability of a piece of content depends on having enough
    users willing to store the relevant files.


    Any data unit in IPFS is not identified by its location, as it is in most traditional
    file systems, but by its content. When requesting a file from the IPFS network,
    you address it by its identifier, which is nothing else than a hash of the content.
    This guarantees integrity of all content, since a client will validate all content
    received against its identifier. It also allows a client to request a file without
    needing to know *where* it is stored in the network.


    This implies that content in IPFS is immutable. Any changes to it require storing
    a new copy entirely under a new identifier. The previous file will be retained
    by the network as long as someone keeps a copy of it.


    All these properties make IPFS a good match for blockchain applications. The content
    hash verification we manually built in the previous section is already provided
    by the protocol itself. And by indexing the content identifier in the smart contract
    instead of its location, we can decouple the blockchain data from any centralized
    content provider.


    ### Note


    IPFS relies on users willing to save and share content for availability, which
    may make it look like a poor choice for building critical applications. Nevertheless,
    data availability for your application can be provided by relying on an IPFS pinning
    service. These are services that act as traditional storage servers, but they
    take part on the IPFS network by making *your* content available to all users –
    for a fee, that is.'
  trans: '

    ### ERC721 元数据扩展


    在进入具体实现之前，我们先简要回顾一下 ERC721 标准的一个扩展：元数据扩展。该扩展规定每个代币都关联一个 *token URI*，其中包含该代币的元数据。这个
    URI（可以是 HTTP URL）保存了一个 JSON 文档，其中包含每个代币的信息。元数据可以包括规范名称、描述文本、标签、作者信息、图像，或任何其他与收藏品领域相关的字段。


    ```

    function tokenURI(uint256 tokenId)

    external view returns (string memory);

    ```


    我们将扩展 ERC721 合约，集成由 `openzeppelin-solidity@2.2.0` 包提供的 `ERC721Metadata` 基础合约，该合约会追踪每个代币的
    URI。


    ```

    // 02-storage/contracts/ERC721PayPerMint.sol

    pragma solidity ⁰.5.0;

    // 引入 SafeMath, ERC721, ERC721Enumerable, ERC721Metadata

    contract ERC721PayPerMint

    is ERC721, ERC721Enumerable, ERC721Metadata {

    using SafeMath for uint256;

    constructor() public ERC721Metadata("PayPerMint", "PPM") { }

    function exists(uint256 id) public view returns (bool) {

    return _exists(id);

    }

    function mint(

    address to, uint256 tokenId, string memory tokenURI

    ) public payable returns (bool) {

    require(msg.value >= tokenId.mul(1e12));

    _mint(to, tokenId);

    _setTokenURI(tokenId, tokenURI);

    return true;

    }

    }

    ```


    现在让我们修改应用，将元数据保存到存储服务器，并将包含数据的 URL 以及内容哈希一同添加到代币合约中。


    ### 保存代币元数据


    我们将修改 ERC721 组件中的主要 `mint` 方法，使其不仅接受 ID，还接受标题和描述字符串字段。我们会将这些数据保存到链下，获取一个 URL，并将其传递给接下来的合约
    `mint` 调用。


    ```

    // 02-storage/src/components/ERC721.js

    async mint({ id, title, description }) {

    const { contract, owner } = this.props;

    const data = JSON.stringify({ id, title, description });

    const url = await save(data);

    const value = new BigNumber(id).shiftedBy(12).toString(10);

    const gasPrice = await getGasPrice();

    const gas = await contract.methods

    .mint(owner, id, url).estimateGas({ value, from: owner });

    contract.methods.mint(owner, id, url)

    .send({ value, gas, gasPrice, from: owner })

    .on(''transactionHash'', () => {

    this.addToken(id, { title, description });

    })

    }

    ```


    `save` 函数将计算数据的哈希值，将其用作标识符，并存储到存储服务器中。请注意，通过使用哈希值作为标识符，任何客户端都可以验证检索到的数据是否被篡改过。


    ```

    // 02-storage/src/storage/local.js

    import { createHash } from ''crypto'';

    const server = ''http://localhost:3010'';

    export async function save(data) {

    let hash = createHash(''sha256'').update(data).digest(''hex'');

    let url = `${server}/${hash}`;

    await fetch(url, {

    method: ''POST'', mode: ''cors'', body: data,

    headers: { "Content-Type": "application/json" }

    });

    return url;

    }

    ```


    在这个例子中，接收 POST 请求的服务器是一个 NodeJS 进程，它会在一个 URL 路径下接受任意 JSON 数据，将其本地保存为文件，并在收到 GET
    请求时提供该数据。在实际应用中，你可能希望依赖真正的存储服务。


    现在，我们可以在初始加载时加载代币的元数据。我们将在主组件加载时以及获取到现有代币列表后，添加对新函数 `loadTokensData` 的调用。


    ```

    // 02-storage/src/components/ERC721.js

    loadTokensData(tokens) {

    const { contract } = this.props;

    tokens.forEach(async ({ id }) => {

    // 从合约中获取元数据 URL

    const url = await contract.methods.tokenURI(id).call();

    // 从 URL 中获取数据

    const data = await fetch(url)

    .then(res => res.json()).catch(() => "");

    // 验证数据完整性并更新状态

    const hash = createHash(''sha256'')

    .update(JSON.stringify(data)).digest(''hex'');

    const path = new URL(url).pathname.slice(1);

    if (path === hash) this.setTokenData(id, data);

    });

    }

    ```


    请注意，元数据的完整性是通过在接受数据前计算其哈希值来验证的。你可以通过修改本地文件系统中已保存的元数据（查看项目 `server/data` 文件夹），并检查修改后的代币是否不再显示元数据，来测试这一点。


    这使得我们在铸造每个非同质化代币时，可以为其关联额外的数据。任何展示代币信息的应用都可以实际利用这些数据。从这个角度来看，你可以将代币元数据视为等同于常规
    HTML 页面中的 opengraph 元数据。


    ### 星际存储


    作为中心化存储方案的替代，我们可以将数据存储在*星际文件系统*（IPFS）中。IPFS 是一个“用于存储和访问文件、网站、应用和数据的分布式系统”。换句话说，它充当了一个去中心化的存储系统。


    #### 什么是 IPFS？


    IPFS 作为一个点对点的内容分发系统运行。任何节点都可以加入网络，无论是专用的 IPFS 服务器，还是普通用户的家用计算机。当用户从网络请求一个文件时，该文件会从距离最近且拥有该文件的节点下载，并且该文件也会从这个新位置提供给其他用户下载。内容的可用性取决于是否有足够多的用户愿意存储相关文件。


    与大多数传统文件系统不同，IPFS 中的任何数据单元都不是通过其位置来标识的，而是通过其*内容*来标识的。当从 IPFS 网络请求文件时，你需要通过其标识符（也就是内容哈希）来定位它。这保证了所有内容的完整性，因为客户端会对照标识符验证接收到的所有内容。这也允许客户端请求文件时，无需知道它在网络中的*存储位置*。


    这意味着 IPFS 中的内容是不可变的。任何对内容的修改都需要在新标识符下存储一个全新的副本。只要有人保留副本，网络中就会保留之前的文件。


    所有这些属性使得 IPFS 成为区块链应用的绝佳选择。我们在上一节中手动构建的内容哈希验证，该协议本身就已经提供了。通过将内容标识符（而非其位置）索引到智能合约中，我们可以将区块链数据与任何中心化内容提供商解耦。


    ### 注意


    IPFS 依赖于用户愿意保存和共享内容以保证可用性，这可能会使其看起来不适合构建关键应用。尽管如此，你可以通过依赖 IPFS 固定服务来保证应用的数据可用性。这些服务扮演着传统存储服务器的角色，但它们通过向所有用户提供*你的*内容（当然，这是要收费的）来参与
    IPFS 网络。

    '
- fmt: "#### Using IPFS in Our Application\n\nTo enable IPFS support in our application,\
    \ we first need to connect to an IPFS node. This is similar to connecting to an\
    \ Ethereum node in order to access the Ethereum network, with the difference that\
    \ we do not need a private key or a currency to write any data to IPFS.\n\nWe\
    \ can either host our own IPFS public node as part of our application or rely\
    \ on a third-party provider. As an example, Infura provides not only Ethereum\
    \ public nodes but also IPFS nodes, meaning we can use their IPFS gateway directly.\n\
    \nHowever, it is also possible that a user is running their own IPFS node in their\
    \ computer. IPFS provides a browser extension, the IPFS companion,^([^(95)](#fn95))\
    \ that connects to a local node and makes the browser IPFS-enabled. This includes\
    \ adding support for `ipfs` links and injecting an `ipfs` object to the global\
    \ `window` object in all sites – much like Metamask adds an `ethereum` provider\
    \ object to all sites.\n\n### Note\n\nThere is also the option of running an IPFS\
    \ node *within your own web site*. The `js-ipfs` library provides a browser-compatible\
    \ implementation of the entire IPFS protocol, so you can start an IPFS daemon\
    \ as a user accesses your app. However, this can make your application much heavier,\
    \ and the in-app IPFS process is not as stable as a dedicated one. Because of\
    \ this, the suggested method for interacting with the network is to use the IPFS\
    \ HTTP API to connect to a separate node.\n\nOpening an IPFS connection in our\
    \ app is very similar to opening an Ethereum connection: we first check if there\
    \ is a global connection object available and, if not, fall back to a well-known\
    \ public node (Listing [6-25](#476252_1_En_6_Chapter.xhtml#PC27)). We will use\
    \ the `ipfs-http-client@30.1` JavaScript library for accessing the network, which\
    \ is an IPFS equivalent of `web3.js`.\n\n```\n// 02-storage/src/storage/ipfs.js\n\
    import ipfsClient from 'ipfs-http-client';\nasync function getClient() {\n  if\
    \ (window.ipfs && window.ipfs.enable) {\n    return await window.ipfs.enable({\n\
    \      commands: ['id', 'version', 'add', 'get']\n    });\n  } else {\n    return\
    \ ipfsClient({\n      host: 'ipfs.infura.io', port: '5001',\n      protocol: 'https',\
    \ 'api-path': '/api/v0/'\n    });\n  }\n}\n```\n\n*Listing 6-25*  \n*Creating\
    \ a new `ipfs` client instance. We first check whether the global object, injected\
    \ by the companion extension, is available. If not, we fall back to a connection\
    \ to the Infura IPFS gateway.*\n\nUsing this new IPFS client, we can now easily\
    \ save our token metadata to the IPFS network instead to a centralized server.\n\
    \n```\nexport async function save(data) {\n  const ipfs = await getClient();\n\
    \  const [result] = await ipfs.add(Buffer.from(data));\n  return `/ipfs/${result.path}`;\n\
    }\n```\n\nFetching the result back from the IPFS network given the URL is straightforward\
    \ as well. Note that we no longer need to verify its integrity, since the protocol\
    \ takes care of that automatically.\n\n```\nexport async function load(url) {\n\
    \  const ipfs = await getClient();\n  const [result] = await ipfs.get(url);\n\
    \  return JSON.parse(result.content.toString());\n}\n```\n\n#### Hosting Our Application\
    \ on IPFS\n\nIPFS can be used not only to store our application data but also\
    \ the application itself, for maximum decentralization. All our application’s\
    \ client-side code can be uploaded to IPFS and served from there. But how can\
    \ our users access it from a regular browser? Or address it without having to\
    \ specify a hash?\n\nThe first problem can be solved via IPFS gateways (see Listing\
    \ [6-26](#476252_1_En_6_Chapter.xhtml#PC30) for examples). An IPFS gateway is\
    \ a regular web site that serves content from the IPFS network. It allows you\
    \ to access any IPFS item at the path `/ipfs/CID`, where CID is the content hash\
    \ that identifies each object on the network.\n\n```\nhttps://gateway.ipfs.io/ipfs/QmeYYwD4y4DgVVdAzhT7wW5vrvmbKPQj8wcV2pAzjbj886/\n\
    https://ipfs.infura.io/ipfs/QmeYYwD4y4DgVVdAzhT7wW5vrvmbKPQj8wcV2pAzjbj886/\n\
    https://cloudflare-ipfs.com/ipfs/QmeYYwD4y4DgVVdAzhT7wW5vrvmbKPQj8wcV2pAzjbj886/\n\
    ```\n\n*Listing 6-26*  \n*You can access an older version of the `ipfs.io` web\
    \ site at the following addresses directly on your browser via any of the public\
    \ gateways listed. Since the ID of the content is its hash, you can be certain\
    \ that all gateways will serve exactly the same object.*\n\nThe second problem,\
    \ having user-friendly names for IPFS sites, can be solved using *DNSLink*. DNSLink\
    \ is a process for mapping DNS names to IPFS content using DNS TXT records.\n\n\
    Let’s say we want to map our site in IPFS to the domain `example.com`. By adding\
    \ a TXT record to `_dnslink.example.com` with the value `dnslink=/ipfs/CID`, any\
    \ IPFS gateway will automatically map any requests to `/ipfs/example.com` to the\
    \ specified content.\n\nNot only that, but we can also specify a CNAME DNS record\
    \ for our domain, pointing to a gateway. This allows us to automatically serve\
    \ our page at `example.com` directly from the IPFS-specified gateway.^([^(96)](#fn96))\
    \ To sum up, the full process for accessing our site would be:\n\n* A user makes\
    \ a request to `example.com`.\n* The DNS query answers with a CNAME to `gateway.ipfs.io`.\n\
    * The user sends a request to the IP of `gateway.ipfs.io` using `example.com`\
    \ as a Host header.\n* The gateway makes a DNS TXT query for both `example.com`\
    \ and `_dnslink.example.com` and obtains an IPFS CID as response.\n* The gateway\
    \ transparently serves the content from IPFS to the end user.\n\nAnother level\
    \ of indirection can be introduced by relying on *IPNS*, the InterPlanetary Name\
    \ System. This system allows you to have mutable links that refer to IPFS content,\
    \ though IPNS links are also hashes. You can then have your DNSLink point to your\
    \ IPNS name, instead of the IPFS ID, and update your site by just updating the\
    \ IPNS link to a new version of your content. This saves you from having to modify\
    \ your DNS TXT records whenever you deploy a new version of your site."
