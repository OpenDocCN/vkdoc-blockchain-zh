  trans: '

    ### 连接协议


    有三种不同的协议可用作交换 JSON-RPC 消息的传输层。节点可以被配置为处理其中任何一种。


    **HTTP** 协议是最简单的一种。它提供了一个基于 HTTP 的简单接口，用于 POST JSON 消息。某些节点可能设置在 HTTPS 加密连接之后，并且可能需要基本身份验证才能访问。一个简单的
    HTTPS 连接字符串示例如下：


    ```

    "https://user:password@example.com:8545/"

    ```


    一个更有趣的选择是 **websocket** 协议。websocket 连接是客户端和服务器之间持久的双向连接。这不仅允许客户端执行所有可用的 JSON-RPC
    调用，还可以订阅从节点推送到客户端的变更（稍后会详细介绍）。与 HTTP 连接一样，websocket 也可以建立在 SSL 之上，并且可能包含基本身份验证：


    ```

    "wss://user:password@example.com:8545/ws"

    ```


    最后，**IPC**（进程间通信）协议基于节点创建的本地 UNIX 域套接字。有权访问此套接字的客户端可以通过其文件名连接到它。这些连接旨在供能够访问与节点相同文件系统的进程使用，因此不用于
    Web 应用程序。


    ```

    "ipc://home/ubuntu/.ethereum/geth.ipc"

    ```


    ### 替代 API


    作为建立连接到节点 JSON-RPC 接口的替代方案，你可以选择从其他来源查询区块链数据。


    **Etherscan** (etherscan.io) 是一项集中式服务，它不仅提供一个基于 Web 的区块链浏览器，你可以在其中直观地检查发送到账户或从账户发送的所有交易，而且还提供一个纯
    HTTP API（清单 4-1），该 API 实现了 JSON-RPC 接口中存在的许多方法。


    ```

    # Etherscan API

    curl "https://api.etherscan.io/api

    ?module=proxy

    &action=eth_getTransactionCount

    &address=$ADDRESS

    &tag=latest

    &apikey=YourApiKeyToken"

    # 常规 JSON-RPC 调用

    {"jsonrpc":"2.0"

    ,"method":"eth_getTransactionCount"

    ,"params":["$ADDRESS","latest"]

    ,"id":1}

    清单 4-1

    向 Etherscan API（上文）执行 getTransactionCount 调用与标准 JSON-RPC 调用（下文）的示例。两者都返回相同的 JSON
    对象作为响应

    ```


    某些 JavaScript 库，例如 `ethers.js`，甚至包含抽象了到 Etherscan API 连接的 *provider* 对象，因此它可以像任何其他标准
    JSON-RPC 连接一样无缝使用。现在让我们来谈谈提供者的角色。


    ### 注意

    目前我们不深入讨论特定领域的 API。一个项目可能决定提供一个 API 来查询其领域的相关数据。你也可以选择设置一个集中式服务器，该服务器汇总来自你的协议的区块链数据，并将其中继到客户端应用程序。


    ### Provide 对象


    正如我们在构建第一个示例 DApp 时在第 2 章中简要看到的那样，与节点的连接由一个 javascript *provider* 对象管理。提供者的责任是抽象所使用的连接协议，并为发送
    JSON-RPC 消息和订阅通知提供一个最小接口。


    ### 注意

    在撰写本文时，来自不同库的提供者具有略有不同的 API。目前正在努力将最小提供者标准化为 EIP 1193，但仍处于草案阶段。


    例如，`web3` JavaScript 库^(⁶⁰) 提供了以下用于连接到 HTTP、websocket 或 IPC 接口的提供者（清单 4-2）。然后使用该提供者来初始化完整的
    `web3` 对象的实例。


    ```

    const Web3 = require(''web3'');

    const httpProvider = new

    Web3.providers.HttpProvider("https://example.com");

    const wsProvider = new

    Web3.providers.WebsocketProvider("wss://example.com");

    const ipcProvider = new

    Web3.providers.IpcProvider("/home/ubuntu/.ethereum/geth.ipc");

    const web3 = new Web3(provider);

    清单 4-2

    用于创建提供者并初始化 web3 实例的 web3@1.2.0 代码示例

    ```


    只有在需要手动设置与节点的连接时，才需要创建提供者实例。在大多数情况下，你实际上会将此责任委托给用户的启用了 web3 的浏览器。


    #### Metamask 和启用了 Web3 的浏览器


    在第 2 章之后，你现在应该熟悉 Metamask，它是一个浏览器扩展，充当 Web 应用程序和以太坊网络的桥梁。还有其他选项，例如适用于 Android
    的 Cipher 或 Opera 浏览器，尽管本书将重点介绍 Metamask，因为它是目前最广泛使用的工具。


    启用了 Web3 的浏览器通过将 *provider* 实例注入到全局作用域中来工作。这个提供者如何工作或其底层机制对你的 DApp 来说并不重要。DApp
    应该能够查询所需的任何信息，并让提供者解析它。


    请注意，可能需要 *启用* 此提供者才能访问用户的账户或请求签署交易（清单 4-3），这将提示用户接受来自 DApp 的请求以访问其账户信息。


    ```

    // Metamask 将 web3 提供者注入为 window.ethereum

    const Web3 = require(''web3'');

    const provider = window.ethereum;

    if (provider) {

    try {

    // 请求访问查询用户账户的权限

    await provider.enable();

    } catch (error) {

    // 用户拒绝了账户访问，但我们仍然可以

    // 运行网络查询

    }

    const web3 = new Web3(provider);

    }

    清单 4-3

    使用 Metamask 注入的提供者实例化 web3 对象的代码片段

    ```


    Metamask 默认通过 HTTPS 连接到 Infura 公共服务器。这使得任何下载了该扩展的用户都可以立即拥有一个与以太坊网络的连接并运行，而无需维护和同步自己的节点。尽管如此，Metamask
    也允许高级用户建立自定义连接到其他节点，例如他们自己的节点（图 4-1 和 4-2）。


    ![../images/476252_1_En_4_Chapter/476252_1_En_4_Fig2_HTML.jpg](img/476252_1_En_4_Fig2_HTML.jpg)


    图 4-2

    Metamask 用于选择要连接的节点的控件，在点击扩展对话框顶部的网络下拉菜单时显示。前四个是连接到 Infura 托管的公共节点


    ![../images/476252_1_En_4_Chapter/476252_1_En_4_Fig1_HTML.jpg](img/476252_1_En_4_Fig1_HTML.jpg)


    图 4-1

    Metamask 设置选项卡允许用户配置他们自己的节点连接


    #### 子提供者


    某些 web3 提供者也可能由 *子提供者* 组成。子提供者是一种非标准对象，它会拦截通过提供者进行的调用。除其他用途外，子提供者通过填补所使用的以太坊节点功能集中的任何空白来帮助提供通用接口。从这个意义上说，子提供者充当隐藏在提供者内部的
    polyfill。


    例如，连接到一个不提供 *filters* API（用于轮询特定更改）的节点的提供者，可能包含一个模拟该客户端功能的 *filter subprovider*。Metamask
    注入的 web3 提供者就是这种情况：由于 Infura 不提供 filters API，Metamask 通过自定义子提供者在提供者级别添加了该功能。这样，作为开发人员，你无需担心支持哪些
    API，并且无论回答你查询的是哪个节点，你都会得到一个一致的接口。


    我们将在下一章重新讨论子提供者，届时我们将讨论提供者和签名者，因为 Metamask 将其签名者实现为另一个子提供者。

