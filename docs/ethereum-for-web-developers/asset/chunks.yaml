- fmt: "#### Fixed Size Bytes\n\nSolidity also provides fixed size byte strings of\
    \ up to 32 bytes, in the form of the `bytes1`, `bytes2`, ..., `bytes32` data types.\
    \ Since these all fit within an EVM word, they are all handled as value types\
    \ as well, and behave similarly to integer types, only that they do not provide\
    \ any arithmetic functions. They do support comparison, bitwise, and shift operators,\
    \ plus an index access operator to retrieve a single byte from the array.\n\n\
    ```\nbytes32 data;\nuint8 index;\nbyte firstByte = data[0];\n```\n\nThese types\
    \ are often used to store hashes or identifiers, where the numeric value itself\
    \ is not relevant. For instance, precompiled hashing functions like `sha256` or\
    \ `ripemd160` return `bytes32` and `bytes20`, respectively.\n\n#### Addresses,\
    \ Contracts, and Transfers\n\nThe `address` data type represents any Ethereum\
    \ address. While any integer or byte type of at least 160 bits could be used to\
    \ store addresses, Solidity specifically provides this type to handle them. Addresses\
    \ also have specific properties for checking ETH balances, as well as for transferring\
    \ funds.\n\nSolidity differentiates addresses into two separate types: `address`\
    \ and `address payable`. The underlying representation for both is the same, and\
    \ the difference is that only the latter provides the `transfer` method for sending\
    \ ETH to it. This allows you to rely on the type system to decide which addresses\
    \ should be allowed to receive funds from your contracts. A non-payable address\
    \ only provides a `balance` property to query its ETH balance.\n\nThe following\
    \ quite uninteresting contract (Listing [3-8](#476252_1_En_3_Chapter.xhtml#PC11))\
    \ keeps track of an owner who created the contract and provides a single function\
    \ to forward funds to them.\n\n```\ncontract MyContract {\n    address payable\
    \ private owner;\n    address private lastContributor;\n\n    constructor(address\
    \ payable _owner) public {\n        owner = _owner;\n    }\n\n    function forward()\
    \ public payable {\n        uint256 ethReceived = msg.value;\n        require(ethReceived\
    \ > 0);\n        lastContributor = msg.sender;\n        owner.transfer(ethReceived);\n\
    \    }\n}\n```\n\nNote that the owner address needs to be stored as an `address\
    \ payable` type; otherwise, the compiler will throw an error when attempting to\
    \ compile `owner.transfer(ethReceived)`. On the other hand, `lastContributor`\
    \ can be a plain address, since it will never receive ETH from the contract.\n\
    \n### Note\n\nSolidity provides another function for sending ETH, which is `send`.\
    \ The difference between the two is that `send` returns a boolean value indicating\
    \ whether the ETH transfer was successful, and `transfer` throws a REVERT on failure.\
    \ To avoid errors caused by forgetting checking `send` return values, it is recommended\
    \ to always use `transfer`.\n\nAny contract defined in Solidity can also be used\
    \ as a type (Listing [3-9](#476252_1_En_3_Chapter.xhtml#PC12)). A contract instance\
    \ has all the public functions defined in the contract.\n\n```\ncontract Provider\
    \ {\n    function answer() public pure returns (uint256) {\n        return 42;\n\
    \    }\n}\n\ncontract Caller {\n    function fetchAnswer(Provider provider) public\
    \ {\n        uint256 answer = provider.answer();\n        // do something with\
    \ the answer\n    }\n}\n```\n\nInternally, a contract instance is stored as its\
    \ address, so contracts can be casted to and from the address type. This is useful\
    \ when attempting to check the balance of a contract or transfer funds to it,\
    \ since only the `address` type provides the `balance` and `transfer` methods.\n\
    \n```\nfunction sendFunds(MyContract recipient) {\n    recipient.transfer(1 eth);\
    \ // compile error\n    address(recipient).transfer(1 eth); // ok!\n}\n```\n\n\
    Contract types can also be used to deploy a new instance of a contract (Listing\
    \ [3-10](#476252_1_En_3_Chapter.xhtml#PC14)). You can leverage this to create\
    \ factory-like contracts that are used to set up and create other contracts.\n\
    \n```\ncontract Box {\n    uint256 public value;\n\n    constructor (uint256 _value)\
    \ public {\n        value = _value;\n    }\n}\n\ncontract Factory {\n    function\
    \ create(uint256 _value) public returns (Box) {\n        return new Box(_value);\n\
    \    }\n}\n```\n\nAlso, like many other languages, Solidity also provides a `this`\
    \ keyword that represents the current contract. The type of `this` is the contract\
    \ itself.\n\n```\nfunction forward(address payable beneficiary) public {\n   \
    \ uint256 myBalance = address(this).balance;\n    beneficiary.transfer(myBalance);\n\
    }\n```\n\n### Reference Types\n\n*Reference types* in Solidity include arrays,\
    \ strings, mappings, and structs. Unlike value types, which are always handled\
    \ by copy when assigning them or passing them as a parameter, reference types\
    \ usually pass a handle to an object that can be aliased or modified from another\
    \ function. We will review how this works with the most common reference type:\
    \ the array.\n\n#### Arrays, Bytes, and Strings\n\nSolidity supports both fixed\
    \ size and dynamic arrays. Array types are parametric, which means they are defined\
    \ as an array of a base type. This allows you to define dynamic integer arrays\
    \ like `uint256[]`, or fixed size address arrays like `address[4]`. You can even\
    \ work with arrays of arrays, but keep in mind that in Solidity the notation is\
    \ reversed as compared to other languages: `bool[][4]` is a fixed size array of\
    \ four dynamic arrays. Furthermore, you cannot return arrays of arrays in an external\
    \ function call.\n\nArrays have a `length` method to query their size and provide\
    \ an indexing operator to access or modify a position in the array. Dynamic arrays\
    \ also have `push` and `pop` methods to add or remove elements. Arrays are typically\
    \ iterated using a for-loop in Solidity (Listing [3-11](#476252_1_En_3_Chapter.xhtml#PC16)).\n\
    \n```\ncontract ArrayTest {\n    uint256[] array;\n\n    function sum() public\
    \ view returns (uint256) {\n        uint256 total = 0;\n        for (uint256 i\
    \ = 0; i < array.length; i++) {\n            total += array[i];\n        }\n \
    \       return total;\n    }\n\n    function add(uint256 value) public {\n   \
    \     array.push(value);\n    }\n}\n```"
  raw: '#### Fixed Size Bytes


    Solidity also provides fixed size byte strings of up to 32 bytes, in the form
    of the bytes1, bytes2, ..., bytes32 data types. Since these all fit within an
    EVM word, they are all handled as value types as well, and behave similarly to
    integer types, only that they do not provide any arithmetic functions. They do
    support comparison, bitwise, and shift operators, plus an index access operator
    to retrieve a single byte from the array.


    ```

    bytes32 data;

    uint8 index;

    byte firstByte = data[0];

    ```


    These types are often used to store hashes or identifiers, where the numeric value
    itself is not relevant. For instance, precompiled hashing functions like `sha256`
    or `ripemd160` return `bytes32` and `bytes20`, respectively.


    #### Addresses, Contracts, and Transfers


    The `address` data type represents any Ethereum address. While any integer or
    byte type of at least 160 bits could be used to store addresses, Solidity specifically
    provides this type to handle them. Addresses also have specific properties for
    checking ETH balances, as well as for transferring funds.


    Solidity differentiates addresses into two separate types: `address` and `address
    payable`. The underlying representation for both is the same, and the difference
    is that only the latter provides the `transfer` method for sending ETH to it.
    This allows you rely on the type system to decide which addresses should be allowed
    to receive funds from your contracts. A non-payable address only provides a `balance`
    property to query its ETH balance.


    The following quite uninteresting contract (Listing [3-8](#476252_1_En_3_Chapter.xhtml#PC11))
    keeps track of an owner who created the contract and provides a single function
    to forward funds to them.


    ```

    contract MyContract {

    address payable private owner;

    address private lastContributor;

    constructor(address payable _owner) public {

    owner = _owner;

    }

    function forward() public payable {

    uint256 ethReceived = msg.value;

    require(ethReceived > 0);

    lastContributor = msg.sender;

    owner.transfer(ethReceived);

    }

    }

    Listing 3-8

    Sample contract using address data types

    ```


    Note that the owner address needs to be stored as an `address payable` type; otherwise,
    the compiler will throw an error when attempting to compile `owner.transfer(ethReceived)`.
    On the other hand, `lastContributor` can be a plain address, since it will never
    receive ETH from the contract.


    ### Note


    Solidity provides another function for sending ETH, which is `send`. The difference
    between the two is that `send` returns a boolean value indicating whether the
    ETH transfer was successful, and `transfer` throws a REVERT on failure. To avoid
    errors caused by forgetting checking `send` return values, it is recommended to
    always use `transfer`.


    Any contract defined in Solidity can also be used as a type (Listing [3-9](#476252_1_En_3_Chapter.xhtml#PC12)).
    A contract instance has all the public functions defined in the contract.


    ```

    contract Provider {

    function answer() public pure returns (uint256) {

    return 42;

    }

    }

    contract Caller {

    function fetchAnswer(Provider provider) public {

    uint256 answer = provider.answer();

    // do something with the answer

    }

    }

    Listing 3-9

    Calling a contract public function from Solidity

    ```


    Internally, a contract instance is stored as its address, so contracts can be
    casted to and from the address type. This is useful when attempting to check the
    balance of a contract or transfer funds to it, since only the `address` type provides
    the `balance` and `transfer` methods.


    ```

    function sendFunds(MyContract recipient) {

    recipient.transfer(1 eth); // compile error

    address(recipient).transfer(1 eth); // ok!

    }

    ```


    Contract types can also be used to deploy a new instance of a contract (Listing
    [3-10](#476252_1_En_3_Chapter.xhtml#PC14)). You can leverage this to create factory-like
    contracts that are used to set up and create other contracts.


    ```

    contract Box {

    uint256 public value;

    constructor (uint256 _value) public {

    value = _value;

    }

    }

    contract Factory {

    function create(uint256 _value) public returns (Box) {

    return new Box(_value);

    }

    }

    Listing 3-10

    Creating a contract from Solidity

    ```


    Also, like many other languages, Solidity also provides a `this` keyword that
    represents the current contract. The type of `this` is the contract itself.


    ```

    function forward(address payable beneficiary) public {

    uint256 myBalance = address(this).balance;

    beneficiary.transfer(myBalance);

    }

    ```


    ### Reference Types


    *Reference types* in Solidity include arrays, strings, mappings, and structs.
    Unlike value types, which are always handled by copy when assigning them or passing
    them as a parameter, reference types usually pass a handle to an object that can
    be aliased or modified from another function. We will review how this works with
    the most common reference type: the array.


    #### Arrays, Bytes, and Strings


    Solidity supports both fixed size and dynamic arrays. Array types are parametric,
    which means they are defined as an array of a base type. This allows you to define
    dynamic integer arrays like `uint256[]`, or fixed size address arrays like `address[4]`.
    You can even work with arrays of arrays, but keep in mind that in Solidity the
    notation is reversed as compared to other languages: `bool[][4]` is an fixed size
    array of four dynamic arrays. Furthermore, you cannot return arrays of arrays
    in an external function call.


    Arrays have a `length` method to query their size and provide an indexing operator
    to access or modify a position in the array. Dynamic arrays also have `push` and
    `pop` methods to add or remove elements. Arrays are typically iterated using a
    for-loop in Solidity (Listing [3-11](#476252_1_En_3_Chapter.xhtml#PC16)).


    ```

    contract ArrayTest {

    uint256[] array;

    function sum() public view returns (uint256) {

    uint256 total = 0;

    for (uint256 i = 0; i < array.length; i++) {

    total += array[i];

    }

    return total;

    }

    function add(uint256 value) public {

    array.push(value);

    }

    }

    Listing 3-11

    Sample code for appending elements to an array and iterating them. Note that this
    example is subject to arithmetic overflow, since it is not using SafeMath for
    computing the sum over the array

    ```'
  trans: "\n#### 固定大小字节\n\nSolidity 还以 `bytes1`、`bytes2`、……、`bytes32` 数据类型的形式提供最多\
    \ 32 字节的固定大小字节字符串。由于它们都适配于 EVM 字，因此它们也都被作为值类型处理，行为与整数类型相似，只是不提供任何算术函数。它们支持比较、按位和移位运算符，以及一个索引访问运算符来从数组中检索单个字节。\n\
    \n```\nbytes32 data;\nuint8 index;\nbyte firstByte = data[0];\n```\n\n这些类型常用于存储哈希值或标识符，其数值本身并不重要。例如，预编译的哈希函数如\
    \ `sha256` 或 `ripemd160` 分别返回 `bytes32` 和 `bytes20`。\n\n#### 地址、合约和转账\n\n`address`\
    \ 数据类型代表任何以太坊地址。虽然任何至少 160 位的整数或字节类型都可以用来存储地址，但 Solidity 专门提供了此类型来处理它们。地址还具有检查\
    \ ETH 余额以及转账的特定属性。\n\nSolidity 将地址区分为两种类型：`address` 和 `address payable`。两者的底层表示相同，区别在于只有后者提供了向它发送\
    \ ETH 的 `transfer` 方法。这允许你依赖类型系统来决定哪些地址应该被允许从你的合约接收资金。一个非 payable 地址只提供一个 `balance`\
    \ 属性来查询其 ETH 余额。\n\n下面这个相当无趣的合约（列表 3-8）跟踪了创建合约的 owner，并提供了一个将资金转发给 owner 的函数。\n\
    \n```\ncontract MyContract {\n    address payable private owner;\n    address\
    \ private lastContributor;\n\n    constructor(address payable _owner) public {\n\
    \        owner = _owner;\n    }\n\n    function forward() public payable {\n \
    \       uint256 ethReceived = msg.value;\n        require(ethReceived > 0);\n\
    \        lastContributor = msg.sender;\n        owner.transfer(ethReceived);\n\
    \    }\n}\n```\n\n注意 owner 地址需要存储为 `address payable` 类型；否则，在尝试编译 `owner.transfer(ethReceived)`\
    \ 时，编译器将抛出错误。另一方面，`lastContributor` 可以是一个普通地址，因为它永远不会从合约接收 ETH。\n\n### 注意\n\n\
    Solidity 提供了另一个发送 ETH 的函数：`send`。两者的区别在于，`send` 返回一个布尔值指示 ETH 转账是否成功，而 `transfer`\
    \ 在失败时会抛出 REVERT。为避免因忘记检查 `send` 返回值而导致的错误，建议始终使用 `transfer`。\n\n在 Solidity 中定义的任何合约也可以用作一种类型（列表\
    \ 3-9）。合约实例拥有该合约中定义的所有公开函数。\n\n```\ncontract Provider {\n    function answer()\
    \ public pure returns (uint256) {\n        return 42;\n    }\n}\n\ncontract Caller\
    \ {\n    function fetchAnswer(Provider provider) public {\n        uint256 answer\
    \ = provider.answer();\n        // 对返回的答案进行处理\n    }\n}\n```\n\n在内部，合约实例以其地址形式存储，因此合约可以与地址类型相互转换。这在尝试检查合约余额或向其转账时非常有用，因为只有\
    \ `address` 类型提供了 `balance` 和 `transfer` 方法。\n\n```\nfunction sendFunds(MyContract\
    \ recipient) {\n    recipient.transfer(1 eth); // 编译错误\n    address(recipient).transfer(1\
    \ eth); // 正确！\n}\n```\n\n合约类型也可以用于部署合约的新实例（列表 3-10）。你可以利用这一点来创建用于设置和创建其他合约的工厂类合约。\n\
    \n```\ncontract Box {\n    uint256 public value;\n\n    constructor (uint256 _value)\
    \ public {\n        value = _value;\n    }\n}\n\ncontract Factory {\n    function\
    \ create(uint256 _value) public returns (Box) {\n        return new Box(_value);\n\
    \    }\n}\n```\n\n此外，与许多其他语言一样，Solidity 也提供了一个 `this` 关键字，代表当前合约。`this` 的类型就是合约本身。\n\
    \n```\nfunction forward(address payable beneficiary) public {\n    uint256 myBalance\
    \ = address(this).balance;\n    beneficiary.transfer(myBalance);\n}\n```\n\n###\
    \ 引用类型\n\nSolidity 中的*引用类型*包括数组、字符串、映射和结构体。与值类型在赋值或作为参数传递时始终通过拷贝处理不同，引用类型通常传递一个对象的句柄，该对象可以被另一个函数别名引用或修改。我们将结合最常见的引用类型——数组来回顾这是如何工作的。\n\
    \n#### 数组、字节数组和字符串\n\nSolidity 支持固定大小和动态数组。数组类型是参数化的，这意味着它们被定义为一个基于基本类型的数组。这允许你定义像\
    \ `uint256[]` 这样的动态整数数组，或像 `address[4]` 这样的固定大小地址数组。你甚至可以使用数组的数组，但请注意，Solidity\
    \ 中的表示法与其他语言相反：`bool[][4]` 是一个包含四个动态数组的固定大小数组。此外，你无法在外部函数调用中返回数组的数组。\n\n数组有一个\
    \ `length` 方法来查询其大小，并提供一个索引运算符来访问或修改数组中的某个位置。动态数组还有 `push` 和 `pop` 方法来添加或删除元素。在\
    \ Solidity 中，通常使用 for 循环来遍历数组（列表 3-11）。\n\n```\ncontract ArrayTest {\n    uint256[]\
    \ array;\n\n    function sum() public view returns (uint256) {\n        uint256\
    \ total = 0;\n        for (uint256 i = 0; i < array.length; i++) {\n         \
    \   total += array[i];\n        }\n        return total;\n    }\n\n    function\
    \ add(uint256 value) public {\n        array.push(value);\n    }\n}\n```\n"
- fmt: "### Warning\n\nUsing a for-loop over an unbounded array is risky, since it\
    \ may consume an arbitrarily high amount of gas, potentially more that fits in\
    \ a single block, rendering the function impossible to call. Always avoid looping\
    \ over an array that can grow out of control, or at least provide methods for\
    \ iterating it by batches of controllable size.\n\nRemember that arrays are reference\
    \ types instead of value types. Reference types contain, as their name indicates,\
    \ a reference to an object instead of the actual value. This means that, depending\
    \ on the context, assigning an array variable to another will not create a copy\
    \ but hand over a reference to the same array.\n\nWhether the array is copied\
    \ or a reference is passed depends on the *data location*. Data location may be\
    \ a confusing concept, since it does not have a direct equivalent in other languages,\
    \ and is an abstraction leakage from the EVM. Instead of trying to hide it and\
    \ lead to potentially surprising results, Solidity opts for surfacing this distinction\
    \ and forcing the programmer to be conscious about this important implementation\
    \ detail.\n\nAs we mentioned before, every contract has access to an internal\
    \ storage that can be used to persist data. And since this space is very expensive\
    \ to use, the EVM provides access to a memory heap for transient operations. These\
    \ are precisely the two main data locations that Solidity defines: `storage` and\
    \ `memory`. The third location is `calldata`, which refers to the space where\
    \ data is supplied in a transaction. For all practical purposes, `calldata` works\
    \ just like memory, only that it is immutable.\n\nData locations need to be specified\
    \ for every local variable or function parameter of a reference type. The only\
    \ case where data location is unneeded is when declaring contract state variables,\
    \ since these are always kept in storage. Note that when specifying locations\
    \ for function arguments, you need to adhere to the following rules:\n\n- External\
    \ functions can only accept `calldata` reference types.\n- Public functions can\
    \ only accept `memory` reference types.\n- Internal or private functions can only\
    \ accept `memory` or `storage` reference types.\n\nAssignment semantics then depend\
    \ on the location of a reference type (Listing [3-12](#476252_1_En_3_Chapter.xhtml#PC17)).\
    \ An assignment from a `memory` reference to another will just pass a reference\
    \ to the same object, and the same happens when assigning from a `storage` reference\
    \ to another. However, when assigning from a `memory` reference to a `storage`\
    \ one, Solidity will copy the entire memory array into storage.\n\n```\ncontract\
    \ DataLocations {\n    uint256[] public storageArray;\n\n    function test(uint256[]\
    \ memory memoryArray) public {\n        // We alias memoryArray to localMemory\n\
    \        uint256[] memory localMemory = memoryArray;\n        localMemory[0] =\
    \ 42;\n        require(localMemory[0] == memoryArray[0]);\n\n        // We copy\
    \ memoryArray into storageArray\n        storageArray = memoryArray;\n       \
    \ require(storageArray[0] == 42);\n\n        // We alias storageArray to localStorage\n\
    \        uint256[] storage localStorage = storageArray;\n        localStorage[0]\
    \ = 21;\n        require(localStorage[0] == storageArray[0]);\n\n        // And\
    \ changes to storageArray don't affect\n        // the original memoryArray\n\
    \        require(storageArray[0] != memoryArray[0]);\n    }\n}\n```\n\n*Listing\
    \ 3-12 – Demo of how the memory and storage location modifiers work in Solidity*\n\
    \nA special case of an array is `bytes`, which behaves exactly as a `byte[]` (i.e.,\
    \ a dynamic array of `byte`). However, this type is optimized and tightly packed\
    \ in memory or storage, so it should always be preferred over `byte[]`.\n\nAnother\
    \ special case are strings. A `string` is an immutable UTF-8-encoded byte array,\
    \ which doesn't allow indexed access. String literals are defined using double\
    \ quotes. Keep in mind that Solidity ships with almost no string manipulation\
    \ functions, so strings are mostly stored as immutable identifiers or descriptions.\n\
    \n```\nstring myString = \"foo\";\n```\n\nUnlike value types, when an array state\
    \ variable is defined as public, the implicit getter generated by Solidity accepts\
    \ an index parameter, to identify which item in the array is to be retrieved.\
    \ This only holds for regular dynamic arrays: `bytes` and `string` are returned\
    \ in a single call.\n\nAs an example, given the following contract with a public\
    \ dynamic array, string, and bytes, the following getters (Figure [3-5](#476252_1_En_3_Chapter.xhtml#Fig5))\
    \ are available:\n\n![../images/476252_1_En_3_Chapter/476252_1_En_3_Fig5_HTML.jpg](images/476252_1_En_3_Chapter/476252_1_En_3_Fig5_HTML.jpg)\n\
    \n*Figure 3-5 – Accessing a public dynamic array with a getter that requires an\
    \ index vs. getting a string or bytes variable*\n\n```\ncontract PublicArrays\
    \ {\n    uint256[] public numbers = [20,30,40];\n    string public text = \"foo\"\
    ;\n    bytes public data = hex\"20\";\n}\n```\n\n### Mappings\n\nMappings, also\
    \ referred to as hashes or dictionaries in other languages, are an associative\
    \ reference type in Solidity.\n\nLike arrays, they are parametric, in that they\
    \ contain elements from other types. Mappings go from keys to values, and they\
    \ accept any value type (plus `bytes` or `string`) as keys, and can handle any\
    \ type whatsoever (including other mappings) as values. Unlike arrays, however,\
    \ the only valid location for mappings is storage, not memory or calldata.\n\n\
    **Note:** Under the hood, mappings are hash tables that rely on the fact that\
    \ the storage space of a contract is large enough to ensure there will be no collisions\
    \ for two different keys, so they guarantee that access to a value is always in\
    \ constant time.\n\nAutogenerated public getters for mappings (Listing [3-13](#476252_1_En_3_Chapter.xhtml#PC20))\
    \ are similar to those of arrays, only that instead of accepting an index, they\
    \ accept a key (Figure [3-6](#476252_1_En_3_Chapter.xhtml#Fig6)). In the case\
    \ of nested mappings, a getter for a nested mapping will require a parameter for\
    \ each key in each nesting level and only return the innermost value.\n\n![../images/476252_1_En_3_Chapter/476252_1_En_3_Fig6_HTML.jpg](images/476252_1_En_3_Chapter/476252_1_En_3_Fig6_HTML.jpg)\n\
    \n*Figure 3-6 – Getting a value from a nested mapping requires providing a value\
    \ for each key in each nesting level*\n\n```\ncontract PublicMappings {\n    mapping(uint256\
    \ => string) public num2str;\n    mapping(uint256 => mapping(uint256 => string))\
    \ public num2num2str;\n\n    constructor() public {\n        num2str[10] = \"\
    foo\";\n        num2num2str[10][20] = \"bar\";\n    }\n}\n```\n\n*Listing 3-13\
    \ – Sample contract with autogenerated getters for two mappings: a simple one\
    \ and a nested one*\n\nAn important caveat about mappings in Solidity is that,\
    \ unlike other languages, there is no way to iterate the keys or values present\
    \ in the mapping. This is related to how mappings are implemented. If you do need\
    \ to keep track of the keys inserted into a mapping, you will need to keep a separate\
    \ array to store them.\n\n### Structs\n\nThe last reference type in Solidity are\
    \ structs (Listing [3-14](#476252_1_En_3_Chapter.xhtml#PC21)). As in C, structs\
    \ act as a named set of fields of other types.\n\n```\ncontract HasStruct {\n\
    \    struct MyStruct {\n        uint256 number;\n        string text;\n    }\n\
    \n    mapping(uint256 => MyStruct) structs;\n\n    constructor() public {\n  \
    \      structs[10] = MyStruct(20, \"foo\");\n    }\n\n    function getStruct(uint256\
    \ key) public view returns (uint256, string memory) {\n        MyStruct storage\
    \ s = structs[key];\n        return (s.number, s.text);\n    }\n}\n```\n\n*Listing\
    \ 3-14 – Sample usage of structs in a Solidity contract*\n\nStructs are mutable\
    \ and can be stored in a mapping or array, and they can contain other structs\
    \ or reference types as their own fields. Remember that, as with any other Solidity\
    \ types, structs are initialized with zeroes, so an empty struct is one where\
    \ every field is zero."
  raw: '### Warning


    Using a for-loop over an unbounded array is risky, since it may consume an arbitrarily
    high amount of gas, potentially more that fits in a single block, rendering the
    function impossible to call. Always avoid looping over an array that can grow
    out of control, or at least provide methods for iterating it by batches of controllable
    size.


    Remember that arrays are reference types instead of value types. Reference types
    contain, as their name indicates, a reference to an object instead of the actual
    value. This means that, depending on the context, assigning an array variable
    to another will not create a copy but hand over a reference to the same array.


    Whether the array is copied or a reference is passed depends on the *data location*.
    Data location may be a confusing concept, since it does not have a direct equivalent
    in other languages, and is an abstraction leakage from the EVM. Instead of trying
    to hide it and lead to potentially surprising results, Solidity opts for surfacing
    this distinction and forcing the programmer to be conscious about this important
    implementation detail.


    As we mentioned before, every contract has access to an internal storage that
    can be used to persist data. And since this space is very expensive to use, the
    EVM provides access to a memory heap for transient operations. These are precisely
    the two main data locations that Solidity defines: `storage` and `memory`. The
    third location is `calldata`, which refers to the space where data is supplied
    in a transaction. For all practical purposes, `calldata` works just like memory,
    only that it is immutable.


    Data locations need to be specified for every local variable or function parameter
    of a reference type. The only case where data location is unneeded is when declaring
    contract state variables, since these are always kept in storage. Note that when
    specifying locations for function arguments, you need to adhere to the following
    rules:


    *   External functions can only accept `calldata` reference types.


    *   Public functions can only accept memory reference types.


    *   Internal or private functions can only accept memory or storage reference
    types.


    Assignment semantics then depend on the location of a reference type (Listing
    [3-12](#476252_1_En_3_Chapter.xhtml#PC17)). An assignment from a memory reference
    to another will just pass a reference to the same object, and the same happens
    when assigning from a storage reference to another. However, when assigning from
    a memory reference to a storage one, Solidity will **copy** the entire memory
    array into storage.


    ```

    contract DataLocations {

    uint256[] public storageArray;

    function test(uint256[] memory memoryArray) public {

    // We alias memoryArray to localMemory

    uint256[] memory localMemory = memoryArray;

    localMemory[0] = 42;

    require(localMemory[0] == memoryArray[0]);

    // We copy memoryArray into storageArray

    storageArray = memoryArray;

    require(storageArray[0] == 42);

    // We alias storageArray to localStorage

    uint256[] storage localStorage = storageArray;

    localStorage[0] = 21;

    require(localStorage[0] == storageArray[0]);

    // And changes to storageArray don''t affect

    // the original memoryArray

    require(storageArray[0] != memoryArray[0]);

    }

    }

    Listing 3-12

    Demo of how the memory and storage location modifiers work in Solidity

    ```


    A special case of an array is `bytes` , which behaves exactly as a `byte[]` (i.e.,
    a dynamic array of `byte`). However, this type is optimized and tightly packed
    in memory or storage, so it should always be preferred over `byte[]`.


    Another special case are strings. A `string` is an immutable UTF-8-encoded byte
    array, which doesn’t allow indexed access. String literals are defined using double
    quotes. Keep in mind that Solidity ships with almost no string manipulation functions,
    so strings are mostly stored as immutable identifiers or descriptions.


    ```

    string myString = "foo";

    ```


    Unlike value types, when an array state variable is defined as public, the implicit
    getter generated by Solidity accepts an index parameter, to identify which item
    in the array is to be retrieved. This only holds for regular dynamic arrays: bytes
    and strings are returned in a single call.


    As an example, given the following contract with a public dynamic array, string,
    and bytes, the following getters (Figure [3-5](#476252_1_En_3_Chapter.xhtml#Fig5))
    are available:


    ![../images/476252_1_En_3_Chapter/476252_1_En_3_Fig5_HTML.jpg](images/476252_1_En_3_Chapter/476252_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Accessing a public dynamic array with a getter that requires an index vs. getting
    a string or bytes variable


    ```

    contract PublicArrays {

    uint256[] public numbers = [20,30,40];

    string public text = "foo";

    bytes public data = hex"20";

    }

    ```


    #### Mappings


    Mappings, also referred to as hashes or dictionaries in other languages, are an
    associative reference type in Solidity.


    Like arrays, they are parametric, in that they contain elements from other types.
    Mappings go from keys to values, and they accept any value type (plus bytes or
    strings) as keys, and can handle any type whatsoever (including other mappings)
    as values. Unlike arrays, however, the only valid location for mappings is storage,
    not memory or calldata.


    ### Note


    Under the hood, mappings are hash tables that rely on the fact that the storage
    space of a contract is large enough to ensure there will be no collisions for
    two different keys, so they guarantee that access to a value is always in constant
    time.


    Autogenerated public getters for mappings (Listing [3-13](#476252_1_En_3_Chapter.xhtml#PC20))
    are similar to those of arrays, only that instead of accepting an index, they
    accept a key (Figure [3-6](#476252_1_En_3_Chapter.xhtml#Fig6)). In the case of
    nested mappings, a getter for a nested mapping will require a parameter for each
    key in each nesting level and only return the innermost value.


    ![../images/476252_1_En_3_Chapter/476252_1_En_3_Fig6_HTML.jpg](images/476252_1_En_3_Chapter/476252_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Getting a value from a nested mapping requires providing a value for each key
    in each nesting level


    ```

    contract PublicMappings {

    mapping(uint256 => string)

    public num2str;

    mapping(uint256 => mapping(uint256 => string))

    public num2num2str;

    constructor() public {

    num2str[10] = "foo";

    num2num2str[10][20] = "bar";

    }

    }

    Listing 3-13

    Sample contract with autogenerated getters for two mappings: a simple one and
    a nested one

    ```


    An important caveat about mappings in Solidity is that, unlike other languages,
    there is no way to iterate the keys or values present in the mapping. This is
    related to how mappings are implemented. If you do need to keep track of the keys
    inserted into a mapping, you will need to keep a separate array to store them.


    #### Structs


    The last reference type in Solidity are structs (Listing [3-14](#476252_1_En_3_Chapter.xhtml#PC21)).
    As in C, structs act as a named set of fields of other types.


    ```

    contract HasStruct {

    struct MyStruct {

    uint256 number;

    string text;

    }

    mapping(uint256 => MyStruct) structs;

    constructor() public {

    structs[10] = MyStruct(20, "foo");

    }

    function getStruct(

    uint256 key

    ) public view returns (uint256, string memory) {

    MyStruct storage s = structs[key];

    return (s.number, s.text);

    }

    }

    Listing 3-14

    Sample usage of structs in a Solidity contract

    ```


    Structs are mutable and can be stored in a mapping or array, and they can contain
    other structs or reference types as their own fields. Remember that, as with any
    other Solidity types, structs are initialized with zeroes, so an empty struct
    is one where every field is zero.'
  trans: "\n### 警告\n\n对无界数组使用 for 循环是危险的，因为它可能消耗任意数量的 gas，甚至可能超过单个区块能容纳的 gas 上限，导致函数无法被调用。应始终避免遍历可能无限增长的数组，或者至少提供按可控大小分批迭代的方法。\n\
    \n请记住，数组是引用类型而非值类型。顾名思义，引用类型包含的是对一个对象的引用，而不是实际的值。这意味着，根据上下文的不同，将一个数组变量赋值给另一个变量并不会创建副本，而是传递一个指向同一数组的引用。\n\
    \n数组是复制还是传递引用，取决于其*数据位置*。数据位置可能是一个令人困惑的概念，因为它在其他语言中没有直接对应的概念，并且是 EVM 抽象泄漏的体现。Solidity\
    \ 没有试图隐藏这一区别而导致可能令人惊讶的结果，而是选择将这一差异显式化，迫使程序员意识到这个重要的实现细节。\n\n正如我们之前提到的，每个合约都可以访问一个用于持久化数据的内部存储。由于使用存储空间成本很高，EVM\
    \ 提供了内存堆用于临时操作。这正是 Solidity 定义的两种主要数据位置：`storage` 和 `memory` 。第三个位置是 `calldata`，它指的是在交易中提供数据的空间。在实际应用中，`calldata`\
    \ 的工作方式与 memory 类似，只不过它是不可变的。\n\n每个引用类型的局部变量或函数参数都需要指定数据位置。唯一不需要指定数据位置的情况是在声明合约状态变量时，因为它们始终保存在存储中。请注意，为函数参数指定位置时，需要遵循以下规则：\n\
    \n- 外部函数只能接受 `calldata` 引用类型。\n- 公有函数只能接受 `memory` 引用类型。\n- 内部或私有函数只能接受 `memory`\
    \ 或 `storage` 引用类型。\n\n赋值语义取决于引用类型的位置（清单 3-12）。从一个 `memory` 引用赋值给另一个只会传递对同一对象的引用，从一个\
    \ `storage` 引用赋值给另一个也是如此。但是，当从 `memory` 引用赋值给 `storage` 引用时，Solidity 会将整个内存数组复制到存储中。\n\
    \n```\ncontract DataLocations {\n    uint256[] public storageArray;\n\n    function\
    \ test(uint256[] memory memoryArray) public {\n        // 我们将 memoryArray 别名化为\
    \ localMemory\n        uint256[] memory localMemory = memoryArray;\n        localMemory[0]\
    \ = 42;\n        require(localMemory[0] == memoryArray[0]);\n\n        // 我们将\
    \ memoryArray 复制到 storageArray\n        storageArray = memoryArray;\n        require(storageArray[0]\
    \ == 42);\n\n        // 我们将 storageArray 别名化为 localStorage\n        uint256[]\
    \ storage localStorage = storageArray;\n        localStorage[0] = 21;\n      \
    \  require(localStorage[0] == storageArray[0]);\n\n        // 对 storageArray 的更改不会影响\n\
    \        // 原始的 memoryArray\n        require(storageArray[0] != memoryArray[0]);\n\
    \    }\n}\n```\n\n*清单 3-12 – 展示 memory 和 storage 位置修饰符在 Solidity 中的工作方式*\n\n数组的一个特例是\
    \ `bytes`，其行为完全类似于 `byte[]`（即一个 `byte` 的动态数组）。不过，该类型在内存或存储中经过了优化和紧凑打包，因此应始终优先使用它而不是\
    \ `byte[]`。\n\n另一个特例是字符串。`string` 是一个不可变的 UTF-8 编码字节数组，不允许按索引访问。字符串字面量使用双引号定义。请记住，Solidity\
    \ 几乎不提供字符串操作函数，因此字符串通常作为不可变的标识符或描述信息存储。\n\n```\nstring myString = \"foo\";\n```\n\
    \n与值类型不同，当数组状态变量被定义为 public 时，Solidity 生成的隐式 getter 函数会接受一个索引参数，以标识要检索数组中的哪个元素。这仅适用于常规的动态数组：`bytes`\
    \ 和 `string` 会在单次调用中返回。\n\n例如，给定以下包含公有动态数组、字符串和 bytes 的合约，可使用以下 getter 函数（图 3-5）：\n\
    \n![../images/476252_1_En_3_Chapter/476252_1_En_3_Fig5_HTML.jpg](img/476252_1_En_3_Fig5_HTML.jpg)\n\
    \n*图 3-5 – 使用需要索引的 getter 访问公有动态数组与获取字符串或 bytes 变量的对比*\n\n```\ncontract PublicArrays\
    \ {\n    uint256[] public numbers = [20,30,40];\n    string public text = \"foo\"\
    ;\n    bytes public data = hex\"20\";\n}\n```\n\n### 映射\n\n映射在其他语言中也称为哈希表或字典，是\
    \ Solidity 中的一种关联引用类型。\n\n与数组一样，它们是参数化的，因为它们包含其他类型的元素。映射从键映射到值，它们接受任何值类型（外加 `bytes`\
    \ 或 `string`）作为键，并且可以处理任何类型（包括其他映射）作为值。然而，与数组不同的是，映射唯一有效的位置是存储，而不是内存或 calldata。\n\
    \n**注意：** 在底层，映射是基于哈希表的，它们依赖于合约的存储空间足够大，以确保两个不同的键不会发生碰撞，从而保证对值的访问始终是常数时间。\n\n\
    映射的自动生成的公有 getter 函数（清单 3-13）与数组的类似，不同之处在于它们接受的是键而不是索引（图 3-6）。对于嵌套映射，嵌套映射的 getter\
    \ 函数需要为每个嵌套级别的每个键提供一个参数，并且只返回最内层的值。\n\n![../images/476252_1_En_3_Chapter/476252_1_En_3_Fig6_HTML.jpg](img/476252_1_En_3_Fig6_HTML.jpg)\n\
    \n*图 3-6 – 从嵌套映射中获取值需要为每个嵌套级别的每个键提供一个值*\n\n```\ncontract PublicMappings {\n  \
    \  mapping(uint256 => string) public num2str;\n    mapping(uint256 => mapping(uint256\
    \ => string)) public num2num2str;\n\n    constructor() public {\n        num2str[10]\
    \ = \"foo\";\n        num2num2str[10][20] = \"bar\";\n    }\n}\n```\n\n*清单 3-13\
    \ – 示例合约，包含两个映射（一个简单映射和一个嵌套映射）的自动生成 getter 函数*\n\n关于 Solidity 中映射的一个重要注意事项是，与其他语言不同，没有办法遍历映射中存在的键或值。这与映射的实现方式有关。如果你确实需要跟踪插入到映射中的键，则需要维护一个单独的数组来存储它们。\n\
    \n### 结构体\n\nSolidity 中的最后一种引用类型是结构体（清单 3-14）。与 C 语言类似，结构体作为一组其他类型字段的有名称集合。\n\n\
    ```\ncontract HasStruct {\n    struct MyStruct {\n        uint256 number;\n  \
    \      string text;\n    }\n\n    mapping(uint256 => MyStruct) structs;\n\n  \
    \  constructor() public {\n        structs[10] = MyStruct(20, \"foo\");\n    }\n\
    \n    function getStruct(uint256 key) public view returns (uint256, string memory)\
    \ {\n        MyStruct storage s = structs[key];\n        return (s.number, s.text);\n\
    \    }\n}\n```\n\n*清单 3-14 – 在 Solidity 合约中使用结构体的示例*\n\n结构体是可变的，可以存储在映射或数组中，并且它们可以包含其他结构体或引用类型作为自己的字段。请记住，与任何其他\
    \ Solidity 类型一样，结构体被初始化为零值，因此空结构体是指每个字段都为零的结构体。\n"
- fmt: '### Emitting Events


    Solidity provides an abstraction over transaction logs named *events*. A Solidity
    event is identified by a name and can have several arguments to provide additional
    data (Listing [3-15](#476252_1_En_3_Chapter.xhtml#PC22)). Since they are implemented
    as logs, a Solidity event can only be emitted, but not observed from a smart contract.
    We will later learn how to monitor or query events from a client.


    ```

    contract EmitsEvents {

    mapping(string => uint256) private counters;

    event CounterIncreased

    (string indexed key, uint256 newValue);

    function increase(string memory key) public {

    counters[key] += 1;

    emit CounterIncreased(key, counters[key]);

    }

    }

    Listing 3-15

    A smart contract that emits an event every time an increase function is called

    ```


    The event is declared using the `event` keyword and fired using `emit`. Note that,
    in the event declaration, some of its arguments can be flagged as `indexed`. These
    allow watching or querying events that have a certain value for that parameter.
    Whether to flag an argument as indexed or not will depend strictly on your use
    case.


    ### Note


    Due to EVM restrictions, indexed variable length arguments are not stored using
    their actual value, but with the hash of the value. This means that, in the example,
    you will be able to search for a particular key among all `CounterIncreased` events,
    but you will not be able to retrieve the actual key from a given event.


    Events are useful not just for monitoring a contract for changes but also as a
    replacement for return values in a transaction. Since it is not possible for a
    client to retrieve a return value from a method called in a transaction, it is
    common to emit an event with the value that needs to be obtained. The client then
    retrieves the events attached to the transaction receipt and extracts the value
    from there.


    ### Imports, Inheritance, and Libraries


    Solidity files can `import` other files (Listing [3-16](#476252_1_En_3_Chapter.xhtml#PC23)).
    The import statement is similar to javascript’s `require`, in that it pulls to
    the current file declarations from another. In Solidity, since the only top-level
    objects are contracts (plus libraries and interfaces, as we will see in a minute),
    an `import` allows you to refer to contracts defined in another file.


    ```

    // Callee.sol

    contract Callee {

    function f() external;

    }

    // MyContract.sol

    import "./Callee.sol";

    contract MyContract {

    function call(Callee c) public {

    c.f();

    }

    }

    Listing 3-16

    Sample usage of the import statement to load a contract defined in another file

    ```


    In the preceding example, `MyContract` pulls the definition of `Callee` by importing
    the file in which it is defined. Note that `Callee` does not define the implementation
    of the function `f`, so it is actually an abstract contract. Since this is enough
    for `MyContract` to know how to call into an instance of `Callee`, these files
    compile successfully. Moreover, since we are using `Callee` just as an interface
    definition, we can redefine the contract using the `interface` keyword:


    ```

    // Callee.sol

    interface Callee {

    function f() external;

    }

    ```


    ### Note


    When importing code from a dependency, typically as an npm package, the import
    statement refers to the package name. The exact syntax varies depending on the
    build tool in use, but it commonly follows the pattern `import "package-name/contracts/Contract.sol"`.


    A file can be imported not only to refer to another contract but also to extend
    from it. Solidity has support for multiple inheritance. This makes inheritance
    the default mechanism to extend functionality, or to pull in features from another
    contract, using base contracts as if they were mixins (Listing [3-17](#476252_1_En_3_Chapter.xhtml#PC25)).


    Derived contracts can access internal and public methods from the base contracts,
    as well as all struct, modifier, and event definitions. They can also override
    methods from base contracts.


    ```

    contract Timelocked {

    uint256 internal locktime;

    modifier whenNotLocked() {

    require(now > locktime);

    _;

    }

    }

    contract Ownable {

    address internal owner;

    modifier onlyOwner() {

    require(msg.sender == owner);

    _;

    }

    }

    contract MyContract is Timelocked, Ownable {

    constructor(uint256 _locktime) public {

    locktime = _locktime;

    owner = msg.sender;

    }

    function f() whenNotLocked onlyOwner public {

    // only reachable when called by the owner

    // and the contract is not locked

    }

    }

    Listing 3-17

    Typical pattern of base contracts that provide behaviors or aspects to be included
    similar to mixins in a contract. These base contracts define their own state,
    and provide modifiers or internal functions to be leveraged by the derived contract

    ```


    Last but not least, Solidity allows to define *libraries*, which are modules of
    helper functions, that may optionally be applied over a specific data type (Listing
    [3-18](#476252_1_En_3_Chapter.xhtml#PC26)). Depending on whether their functions
    are defined as internal or not, libraries are actually inlined in the contract
    that includes them or deployed separately and linked. A good example of a library
    is the previously mentioned `SafeMath`, which defines simple arithmetic operations
    with overflow checks.


    ```

    // Snip of the code of openzeppelin-solidity SafeMath.sol

    library SafeMath {

    function add(uint256 a, uint256 b)

    internal pure returns (uint256) {

    uint256 c = a + b;

    require(c >= a);

    return c;

    }

    }

    // MyContract.sol

    import "openzeppelin-solidity/contracts/math/SafeMath.sol";

    contract MyContract {

    uint256 value;

    function increase(uint256 x) public {

    value = SafeMath.add(value, x);

    }

    }

    Listing 3-18

    Sample usage of SafeMath in a contract

    ```


    Since it is frequent for libraries to define functions on a certain data type,
    such as `uint256` in the case of `SafeMath`, Solidity provides a convenience `using`
    statement (Listing [3-19](#476252_1_En_3_Chapter.xhtml#PC27)) that adds all methods
    of the library to all variables of a specified type. This is particularly powerful
    when combined with structs, since it allows us to define custom datatypes with
    their own set of functions.


    ```

    contract MyContract {

    using SafeMath for uint256;

    uint256 value;

    function increase(uint256 x) public {

    value = value.add(x);

    }

    }

    Listing 3-19

    Previous example rewritten with the using statement, which adds all methods in
    a library to a type in the scope of the contract

    ```


    ## Well-known Smart Contracts


    To wrap up this chapter on smart contracts, we will review two of the most well-known
    contract standards, which are ERC20 and ERC721. These correspond to fungible and
    non-fungible tokens, respectively. However, before diving into them, we will first
    introduce a concept that goes beyond the Solidity language: the ABI.


    ### Application Binary Interface


    The Application Binary Interface (ABI) of a contract is the set of public methods
    exposed by a contract. Think of it as its public API that can be called from an
    external account or another contract.


    The key concept behind the ABI is that it is language independent. It is a specification
    on how function calls, arguments, and return values should be encoded. This allows
    a contract written in Solidity to seamlessly interact with a contract written
    in another high-level language, such as Vyper.


    The ABI has a set of data types fairly close to those of Solidity, including addresses,
    integers (signed and unsigned), booleans, strings, arrays, and so on. The main
    exceptions are contract types, which are handled as plain addresses, and structs,
    which are encoded as tuples with all their fields.'
