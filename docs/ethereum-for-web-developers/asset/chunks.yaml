    ### R


    重入调用（Reentrant calls），中继器（Relayer），`Remix`，反向解析（Reverse resolution），`Rinkeby`，`Rivest–Shamir–Adleman`（`RSA`），`Ropsten`。


    ### S


    `SafeMath`，可扩展性（Scalability），二层解决方案（layer 2 solutions），侧链（sidechains），构建桥（build
    bridge），部署链（deploying chain），`plasma`链（plasma chains），权威证明（proof-of-authority），安全性/信任（security/trust）。侧链（Sidechains），一次性地址（Single-use
    addresses），定义，捐赠合约（donation contract），`ETH`数量（`ETH` amount），`ETH`捐赠（`ETH` donation），`ethereumjs-tx@1.3.7`库，无效签名错误（invalid
    signature error），监控余额（monitor balance），陷阱（pitfall），随机签名（random signature），交易（transaction），用户流程（user
    flow）。智能账户（Smart accounts），云服务（cloud services），部署地址（deployment address），`ETH`身份合约（`ETH`
