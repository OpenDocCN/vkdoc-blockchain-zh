    *   Alice signs 0.1 ETH by signing balances (0.8, 1.2) with nonce 3.


    *   Alice signs 0.1 ETH by signing balances (0.7, 1.3) with nonce 4.


    Let’s go through some possible scenarios based on this set of messages:


    *   When the exchange ends, Bob rightfully picks the latest message signed by
    Alice and uses it to close the channel. Note that it never makes sense for him
    to pick nonce 3 over 4, since 4 has a balance more beneficial to him, as it corresponds
    to a payment made by Alice.


    *   Bob never signs another message and never closes the channel. In response,
    Alice uploads the last message that was beneficial to her: the last one signed
    by Bob (nonce 2). She has no reason to submit any of the more recent ones where
    she performs additional payments. Alternatively, she could also attempt to close
    the channel as if no messages were exchanged.


    *   Alice maliciously uploads the message with nonce 2 to try to close the channel.
    Bob should immediately submit a more recent message, preferably the one with nonce
    4.


    *   Bob maliciously attempts to close the channel with the message with nonce
    1, where the balance was most in his favor. Then, Alice should submit the message
    with nonce 2 in response, as it is a more beneficial situation to her. This takes
    us to the previous scenario, where Bob should submit nonce 4.


    As we can see, by signing a message with increasing nonce with each micropayment,
    participants are then incentivized to always submit the latest message signed
    by their counterparty. This leads to the most recent message being used to close
    the channel.'
  trans: '

    #### 挑战期


    通过在通道关闭时增加一个*挑战期*，可以解决这种情况。当 Bob 请求关闭通道时，通道会进入一个固定时长的“关闭中”状态。在此期间，Alice 可以确认关闭通道，也可以提交一个更新的状态并启动一个新的关闭周期（图
    8-6）。


    如果她在挑战期内未能向通道发送任何交易，那么通道将关闭，并根据 Bob 提交的状态执行支付。这最后一种情况相当于接收方未提交消息，而发送方强制关闭通道。因此，增加挑战期消除了为通道设定预定义结束时间的必要。


    ### 注


    挑战期是第二层解决方案（不仅仅是通道）中非常常见的机制，我们将在本章稍后部分看到。该机制允许单方面执行某个操作，无需收集所有其他方的确认，但仍可让它们监视并应对不法行为。


    这种机制要求智能合约能够识别一条消息是否比另一条*更新*。换句话说，它要求对 Alice 和 Bob 之间交换的消息增加*排序*的概念。在之前的例子中，这使通道能够验证
    Alice 的消息比 Bob 的更新，从而丢弃 Bob 的消息而采用 Alice 的。


    这种排序是通过在每条消息中增加一个计数器或*nonce*（随机数）来处理的，该数值随着每条发送的消息递增。双方都应验证每条消息的 nonce 是否正确递增：如果一方收到一条带有重复
    nonce 的签名消息，应立即将其丢弃。


    ![../images/476252_1_En_8_Chapter/476252_1_En_8_Fig6_HTML.png](img/476252_1_En_8_Fig6_HTML.png)


    图 8-6


    延续之前的场景。Alice 发现 Bob 试图提交一个旧状态，于是提交了`S2`作为回应。挑战期结束后，合约根据提交的最新状态`S2`执行支付。


    这种挑战机制有一个重要缺点：通道中的参与方不能离线超过挑战期的时长。在我们的 Alice 和 Bob 示例中，如果通道的挑战期只有几个小时，Bob 完全可以在
    Alice 离线时提交对他有利的状态，这样等她重新上线时，通道已经关闭。另一方面，如果挑战期过长，当 Bob 试图合法关闭通道而 Alice 始终不接受关闭时，则可能导致资金被长期锁定。选择合适的挑战期在很大程度上取决于通道部署的具体应用场景。


    ### 注


    作为通道的补充，还有*瞭望塔*服务，它们可以在用户离线且对手方试图非法关闭通道时，代表用户监控通道。这些服务提供商可能会根据通道中锁定的价值，按比例收取费用。


    #### 一个示例交换


    为确保激励机制一致，Alice 会签署一些消息，其中余额向有利于 Bob 的方向变化，反之亦然。一个示例场景（双方初始存款均为 1 ETH）可能如下：


    *   Alice 签署了`0.4 ETH`，即签署余额`(0.6, 1.4)`^(\(¹³¹\))，nonce 为`1`。

    *   Bob 签署了`0.3 ETH`，即签署余额`(0.9, 1.1)`，nonce 为`2`。

    *   Alice 签署了`0.1 ETH`，即签署余额`(0.8, 1.2)`，nonce 为`3`。

    *   Alice 签署了`0.1 ETH`，即签署余额`(0.7, 1.3)`，nonce 为`4`。


    基于这组消息，我们来看几种可能的情景：


    *   交换结束时，Bob 合法地选择 Alice 签署的最新消息并用来关闭通道。请注意，他绝无理由选择`nonce 3`而非`nonce 4`，因为`nonce
    4`的余额对他更有利（这对应于 Alice 支付了一笔款项）。

    *   Bob 从未签署另一条消息，也从未关闭通道。作为回应，Alice 上传了最后一条对她有利的消息：Bob 签署的最后一条（`nonce 2`）。她没有理由提交任何她进行额外支付的更新消息。或者，她也可以尝试像从未交换过消息一样关闭通道。

    *   Alice 恶意上传`nonce 2`的消息，试图关闭通道。Bob 应立即提交一条更新的消息，最好是`nonce 4`的那条。

    *   Bob 恶意尝试用`nonce 1`的消息关闭通道，该消息的余额对他最有利。此时，Alice 应提交`nonce 2`的消息作为回应，因为这对她来说更有利。这就回到了前一个情景，Bob
    应提交`nonce 4`。


    正如我们所见，通过随着每笔微支付签署递增 nonce 的消息，参与者便有了始终提交对手方签署的最新消息的动力。这导致最终使用最新消息来关闭通道。

    '
- fmt: "### 实现双向通道\n\n现在我们将实现一个示例双向状态通道（参见[代码清单8-14](#476252_1_En_8_Chapter.xhtml#PC15)）。在我们的实现中，任何用户都可以通过提供对方签名的消息来请求关闭通道。然后，可以在另一方确认或挑战期结束时执行支付。\n\
    \n我们的通道将追踪每个用户的余额，初始化为他们各自存入的保证金。通道由其中一位用户创建，然后由第二位用户在存入自己的保证金后加入。^([^(132)](#fn132))\n\
    \n```\ncontract BidirectionalPaymentChannel {\n    using ECDSA for bytes32;\n\
    \    uint256 constant closePeriod = 1 days;\n    address payable user1;\n    address\
    \ payable user2;\n    uint256 balance1;\n    uint256 balance2;\n    uint256 lastNonce;\n\
    \    uint256 closeTime;\n    address closeRequestedBy;\n    constructor(address\
    \ payable _user2) public payable {\n        balance1 = msg.value;\n        user1\
    \ = msg.sender;\n        user2 = _user2;\n    }\n    function join() public payable\
    \ {\n        require(msg.sender == user2 && balance2 == 0);\n        balance2\
    \ = msg.value;\n    }\n}\n```\n*代码清单8-14 我们的双向状态通道实现的合约变量和初始化函数。我们使用与单向实现相同的`ECDSA`库*\n\
    \n完成设置后，我们现在可以查看合约的`close`函数（参见[代码清单8-15](#476252_1_En_8_Chapter.xhtml#PC16)）。该函数与单向通道中的函数类似，都验证用户对状态签名的有效性。然而，它并非立即执行支付，而是启动挑战（或关闭）周期。\n\
    \n```\nfunction closeWithState(\n    uint256 newBalance1, uint256 newBalance2,\n\
    \    uint256 nonce, bytes memory signature\n) public {\n    // 检查发送者是否为用户，状态是否合理，以及\n\
    \    // 在挑战情况下 nonce 是否递增\n    require(msg.sender == user1 || msg.sender == user2);\n\
    \    require(nonce > lastNonce);\n    require(newBalance1 + newBalance2 == address(this).balance);\n\
    \    // 验证签名是否属于另一方用户\n    bytes32 hash = keccak256(abi.encodePacked(\n      \
    \  newBalance1, newBalance2, nonce, address(this)\n    )).toEthSignedMessageHash();\n\
    \    address signer = hash.recover(signature);\n    require(signer == user1 ||\
    \ signer == user2);\n    require(signer != msg.sender);\n    // 更新余额、nonce，并启动挑战期\n\
    \    balance1 = newBalance1;\n    balance2 = newBalance2;\n    lastNonce = nonce;\n\
    \    closeRequestedBy = msg.sender;\n    closeTime = now;\n}\n```\n*代码清单8-15 双向状态通道的关闭函数。任何参与者都可以调用，前提是他们提交了由另一方用户签名的消息，且消息包含的\
    \ nonce 比上次提交的（如果有）更新*\n\n现在我们需要添加一个实际关闭通道的函数，可以由最初未发起关闭的用户调用，或在挑战期结束后被调用（参见[代码清单8-16](#476252_1_En_8_Chapter.xhtml#PC17)）。\n\
    \n```\nfunction confirmClose() public {\n    require(msg.sender == user1 || msg.sender\
    \ == user2);\n    bool challengeEnded = closeTime != 0\n        && closeTime +\
    \ closePeriod > now;\n    require(closeRequestedBy != msg.sender || challengeEnded);\n\
    \    user2.send(balance2);\n    selfdestruct(user1);\n}\n```\n*代码清单8-16 实际关闭双向支付通道并执行支付*\n\
    \n### 注意\n\n我们在`confirmClose`中使用`send`而不是`transfer`是为了防御攻击。如果`user2`是合约账户而非外部账户（EOA），它可以被编码为在每个传入的交易上回滚。这将使得`user1`永远无法关闭通道并取回初始保证金，因为向`user2`的`transfer`调用会失败并回滚整个交易。通过使用`send`，发送\
    \ ETH 可能会失败，但关闭操作允许成功。\n\n我们的实现还需要最后一个函数才能完整。如果其中一位用户从未签署任何消息，另一方需要能够请求关闭，将初始保证金返还给每个用户（参见[代码清单8-17](#476252_1_En_8_Chapter.xhtml#PC18)）。否则，最初创建通道的用户的资金可能会被永久锁定。\n\
    \n```\nfunction close() public {\n    require(msg.sender == user1 || msg.sender\
    \ == user2);\n    require(closeTime == 0);\n    closeRequestedBy = msg.sender;\n\
    \    closeTime = now;\n}\n```\n*代码清单8-17 从初始状态启动通道关闭*\n\n请注意，在关闭后，任何用户仍然可以调用`closeWithState`，以防一方恶意尝试在初始状态关闭通道。\n\
    \n### 优化与扩展\n\n我们迄今为止审查的支付通道实现相对简单，但还有很大的改进空间：\n\n*   一种可能的优化是使用**单一合约**来管理所有通道。不为每个通道部署一个合约，而是每个通道实际上是存储在单个支付通道合约中的一个结构体。这大大降低了创建新通道的成本，但代价是增加了复杂性。此外，它将所有参与者的资金集中在一个合约中，为漏洞打开了大门，攻击者可能因此同时耗尽所有通道的资金。\n\
    \n*   通道也可以修改为可重复使用。在我们的实现中，我们要求关闭通道才能执行支付，但我们可以在执行支付后保持通道开放。这使得部分资金可以被提取用于其他应用，而无需销毁通道合约。\n\
    \n*   在双向通道的情况下，可以通过添加一条由双方签名的特殊消息来优化通道关闭，该消息表示在某个状态下达成一致并最终确定。这条消息可以由任何参与者上传，并且不需要第二笔交易来确认关闭，也无需经历挑战期。\n\
    \n*   通道的一个有趣扩展是增加参与者数量。虽然在我们所有的示例中，我们探讨的都是两个成员之间的点对点通道，但可以涉及更多用户。随着用户数量的增加，协调可能变得更加复杂，因为消息可能需要由通道中的多个参与者签名才能被视为有效。\n\
    \n### 状态通道\n\n支付通道可以被视为更通用的通道类别——**状态通道**——的一个特例。状态通道允许用户交换关于*任何状态*的消息，而不是让两方交换关于待支付余额状态的签名消息。\n\
    \n例如，一个简单的游戏可以通过状态通道进行。玩家可以签署关于游戏状态的消息，比如棋盘上棋子的位置。移动棋子是通过发送带有移动信息或棋盘新配置的签名消息来完成的。\n\
    \n状态通道通常涉及初始保证金和支付，就像支付通道一样。决定支付的条件由游戏定义，并可以通过智能合约在链上强制执行。"
  raw: '#### Implementing a Bidirectional Channel


    We will now implement a sample bidirectional state channel (Listing [8-14](#476252_1_En_8_Chapter.xhtml#PC15)).
    In our implementation, any user can request the channel’s closure by providing
    a signed message by the other user. The payouts can then be executed either when
    the other party confirms it or when the challenge period ends.


    Our channel will keep track of the balance of each user, initialized to the deposit
    that each of them made. The channel is created by one of the users and then joined
    by the second as they make their own deposit.^([^(132)](#fn132))


    ```

    contract BidirectionalPaymentChannel {

    using ECDSA for bytes32;

    uint256 constant closePeriod = 1 days;

    address payable user1;

    address payable user2;

    uint256 balance1;

    uint256 balance2;

    uint256 lastNonce;

    uint256 closeTime;

    address closeRequestedBy;

    constructor(address payable _user2) public payable {

    balance1 = msg.value;

    user1 = msg.sender;

    user2 = _user2;

    }

    function join() public payable {

    require(msg.sender == user2 && balance2 == 0);

    balance2 = msg.value;

    }

    }

    Listing 8-14

    Contract variables and initialization functions of our bidirectional state channel
    implementation. We are using the same ECDSA library as in the unidirectional implementation

    ```


    Having the setup ready, we can now look into the `close` function of our contract
    (Listing [8-15](#476252_1_En_8_Chapter.xhtml#PC16)). This function is similar
    to the one from the unidirectional channel, in that it validates the user’s signature
    over the state. However, instead of executing the payout on the spot, it starts
    the challenge (or closing) period.


    ```

    function closeWithState(

    uint256 newBalance1, uint256 newBalance2,

    uint256 nonce, bytes memory signature

    ) public {

    // Check that sender is a user, state is sound, and

    // the nonce is increased in case of a challenge

    require(msg.sender == user1 || msg.sender == user2);

    require(nonce > lastNonce);

    require(newBalance1 + newBalance2 == address(this).balance);

    // Validate that the signature belongs to the other user

    bytes32 hash = keccak256(abi.encodePacked(

    newBalance1, newBalance2, nonce, address(this)

    )).toEthSignedMessageHash();

    address signer = hash.recover(signature);

    require(signer == user1 || signer == user2);

    require(signer != msg.sender);

    // Update balances, nonce, and start a challenge period

    balance1 = newBalance1;

    balance2 = newBalance2;

    lastNonce = nonce;

    closeRequestedBy = msg.sender;

    closeTime = now;

    }

    Listing 8-15

    Closing function for the bidirectional state channel. It can be called by any
    of the participants, as long as they submit a message signed by the other user,
    with a more recent nonce than the last one submitted (if there was one)

    ```


    Now we need to add a function to actually close the channel, callable either by
    the user who did not start the closure in the first place or after the challenge
    period ended (Listing [8-16](#476252_1_En_8_Chapter.xhtml#PC17)).


    ```

    function confirmClose() public {

    require(msg.sender == user1 || msg.sender == user2);

    bool challengeEnded = closeTime != 0

    && closeTime + closePeriod > now;

    require(closeRequestedBy != msg.sender || challengeEnded);

    user2.send(balance2);

    selfdestruct(user1);

    }

    Listing 8-16

    Effectively closing a bidirectional payment channel and executing the payouts

    ```


    ### Note


    We are using `send` instead of `transfer` in `confirmClose` to protect against
    an attack. If user2 is a contract account instead of an EOA, it can be coded to
    revert on every incoming transaction. This would make it impossible for user1
    to ever close the channel and recover the initial deposit, since the transfer
    call to user2 would fail, and revert the entire transaction. By using `send`,
    the sending of ETH may fail, but the close is allowed to succeed.


    Our implementation needs one last function to be complete. In case one of the
    users never signed any messages, the other needs to be able to request a closure,
    transferring the initial deposits back to each user (Listing [8-17](#476252_1_En_8_Chapter.xhtml#PC18)).
    Otherwise, the funds of the user who created the channel in the first place could
    end up locked for good.


    ```

    function close() public {

    require(msg.sender == user1 || msg.sender == user2);

    require(closeTime == 0);

    closeRequestedBy = msg.sender;

    closeTime = now;

    }

    Listing 8-17

    Starting a channel closure from the initial state

    ```


    Note that any user could still call `closeWithState` after close, in case a party
    maliciously attempted to close the channel on the initial state.


    #### Optimizations and Extensions


    The implementations we have reviewed so far of payment channels are relatively
    simple, but there is much room for improvement:


    *   One possible optimization is having a *single contract* for managing all channels.
    Instead of deploying one contract per channel, each channel is actually a struct
    stored in a single payment channel contract. This greatly reduces the cost of
    creating a new channel, but at the expense of added complexity. Furthermore, it
    centralizes the funds of all participants in a single contract, opening the door
    for bugs that could let an attacker drain the funds from all channels simultaneously.


    *   Channels could also be modified to be reused. In our implementations, we required
    the channel to be closed to execute the payouts, but we could leave the channel
    open after a payout is executed. This allows for part of the funds to be withdrawn
    to be used in other applications, without having to destroy the channel contract.


    *   In the case of bidirectional channels, channel closure can be optimized by
    adding a special message, signed by both users, that signals the agreed finalization
    at a certain state. This message can be uploaded by any participant and does not
    require either a second transaction to confirm the closure or going through the
    challenge period.


    *   An interesting extension to channels is to increase the number of participants.
    While in all of our examples we explore peer-to-peer channels with two members,
    a larger number of users can be involved. Coordination may become more complex
    as the number of users increase, since messages may be required to be signed by
    several participants in the channel to be considered valid.


    ### State Channels


    Payment channels can be seen as a specific case of a more general class of channels
    called *state channels* . Instead of having two parties exchanging signed messages
    regarding the state of balance to be paid out, state channels allow users to exchange
    messages regarding *any state*.


    As an example, a simple game could be carried over a state channel. The players
    can sign messages on the state of the game, such as the placement of the pieces
    in a board. Moving a piece is done by sending signed messages with the move or
    the new configuration of the board.


    State channels typically involve an initial deposit and a payout, much like payment
    channels. The conditions that rule the payout are defined by a game and can be
    enforced on-chain by a smart contract.'
