- fmt: '#### Creating a Single-use Address


    How are single-use addresses created? It is worth noting that they are not a special
    Ethereum construct, but the result of a clever hack. Also, creating them requires
    no initial gas at all.


    Recall from previous chapters that all Ethereum transactions need to be signed
    with the sender’s private key in order to be valid. The sender’s address can then
    be derived from the transaction’s signature, so the `from` is actually never included
    in the transaction’s data – it’s calculated from the signature when needed.


    To recap, sending a transaction involves the following steps:


    1. Pack the transaction parameters (recipient, gas, gas price, nonce, data, value,
    etc.) into a binary object.

    2. Hash the transaction binary and sign it with the sender’s private key.

    3. Broadcast the transaction’s binary and the signature.


    On the other hand, processing a transaction involves the following:


    1. Calculate the hash of the transaction binary.

    2. Derive the sender’s address (i.e., `from`) from the hash and the signature.

    3. Unpack the transaction binary into its parameters (recipient, gas, gas price,
    nonce, data, value, etc.).


    The trick for generating single-use addresses relies in sending a random signature
    with the transaction. Instead of actually signing the transaction in step 2, we
    just include a random set of bytes as a signature in step 3. This way, there is
    no private key associated with the process.


    When processing the transaction, this results in a random sender address derived
    from the signature. And given that the private key associated with this address
    is unknown, it is not possible to generate any other transaction for the same
    address. This effectively yields a single-use address that can only broadcast
    one specific transaction. Then, as soon as the address is funded with ETH, the
    gas fees can be covered, and the transaction can be broadcasted to the network.


    #### Sample Code


    We will use a variant of the `Donations` example from the previous section, with
    a single beneficiary and a single `donate` method, which accepts a string to be
    emitted in an event along with each donation (Listing [7-4](#476252_1_En_7_Chapter.xhtml#PC4)).
    We will then rely on a single-use address to interact with it.


    ```

    // 02-single-use-addresses/contracts/Donations.sol

    contract Donations {

    address payable wallet;

    event Donation(uint256 value, string text);

    constructor(address payable _wallet) public {

    wallet = _wallet;

    }

    function donate(string calldata text) external payable {

    require(msg.value > 0);

    emit Donation(msg.value, text);

    }

    function withdraw() external { ... }

    }

    Listing 7-4

    Simplified Donations contract that accepts a custom string that is emitted in
    an event in every donation

    ```


    Let’s assume that our user wants to send a 1 ETH donation with the traditional
    “Hello world”. We need to first generate the encoded `data` that executes that
    function and estimate the gas cost for executing the call.


    ```

    // 02-single-use-addresses/index.js

    let donations = new web3.eth.Contract(abi, address);

    let call = donations.methods.donate("Hello world");

    let data = call.encodeABI();

    let gas = await call.estimateGas({ value: 1e18 });

    ```


    ### Caution


    Keep in mind that actual gas usage may change depending on the state in which
    the transaction is executed. Due to the very nature of single-use addresses, if
    the transaction fails due to lack of gas, there is no way to execute it again
    with a higher allowance. This results in the user funds being locked in the address
    forever. If your function may end up consuming more gas in the future, make sure
    to account for it when building the transaction object in the upcoming steps.


    We now have all the necessary parameters to craft our transaction with a random
    signature. To build this transaction object, we will use the `ethereumjs-tx@1.3.7`
    library .


    ```

    const Tx = require(''ethereumjs-tx'');

    let tx = new Tx({

    value: 1e18,

    data,

    gas,

    gasPrice: 1e9,

    to: address,

    nonce: "0x0",

    v: networkId * 2 + 35,

    s: ''0x'' + ''2''.repeat(61),

    r: ''0x'' + ''3''.repeat(61)

    });

    let sender = tx.getSenderAddress().toString(''hex'');

    ```


    Most parameters in the preceding snippet should be familiar by now: the recipient
    address, the amount of ETH being sent, the gas allowance and price, and the transaction
    data. Since this transaction will be sent from a new address that has sent no
    other transactions, the nonce must be zero.


    The new parameters we see here are `v`, `r`, and `s`, which correspond to the
    transaction’s signature. The first of them must be derived from the chain id,^(99)
    while the two others are normally calculated from the user’s private key – we
    will replace them by an arbitrary bytes sequence here.


    ### Note


    It is important to use a recognizable fabricated sequence as `r` and `s`, such
    as a clear repetition of the same set of bytes, or a large amount of leading zeroes.
    Otherwise, a third party cannot know whether the resulting transaction object
    belongs indeed to a single-use address, or the signature was obtained from an
    actual private key. If a private key was indeed used to generate the transaction,
    then its holder can generate a different transaction when the user sends their
    funds to the allegedly single-use address.


    Now, if you try to run the preceding code to obtain the sender address, you will
    get an “Invalid Signature” error thrown by the `getSenderAddress` call. This is
    because not all signatures are valid in Ethereum – roughly half of them are. The
    easiest way around this is to just test with a few different values until we hit
    a valid arbitrary signature. For instance, we could increment `r` by one each
    time we get an invalid signature exception until we get to a valid value.


    ```

    const BN = require(''bignumber.js'');

    let sender = null;

    while (!sender) {

    try {

    sender = ''0x'' + tx.getSenderAddress().toString(''hex'');

    } catch(ex) {

    const r = new BN(''0x'' + tx.r.toString(''hex''));

    tx.r = ''0x'' + r.plus(1).toString(16);

    }

    }

    ```


    Armed with a valid pre-signed transaction, we can now try broadcasting it to the
    network.


    ```

    const rawTx = ''0x'' + tx.serialize().toString(''hex'');

    await web3.eth.sendSignedTransaction(rawTx);

    ```


    However, since we have not yet funded the sender address, we will get a “sender
    doesn''t have enough funds to send tx” error. Remember that the derived sender
    is a new account, so it will never have any previous funds.


    At this point, we should ask our users to fund the derived single-use address
    and monitor for balance changes on the address to broadcast the transaction when
    it has enough funds. To do this, we first need to calculate the exact amount of
    ETH needed: this is the gas allowance multiplied by the gas price, plus any value
    sent in the transaction.


    ```

    let required = (new BN(gas)).times(gasPrice).plus(value);

    ```


    ### Caution


    Remember that any extra ETH sent to a single-use address will be lost.


    Let’s now simulate that the user sends those funds to the single-use address.


    ```

    const [funder] = await web3.eth.getAccounts();

    await web3.eth.sendTransaction({

    from: funder, value: required, to: sender

    });

    ```


    We can now finally send our transaction to the network and verify that the event
    was correctly emitted.


    ```

    let rawTx = ''0x'' + tx.serialize().toString(''hex'');

    await web3.eth.sendSignedTransaction(rawTx);

    let events = await donations.getPastEvents(''Donation'');

    console.log(events[0].returnValues.text);

    // prints "Hello world "

    ```'
