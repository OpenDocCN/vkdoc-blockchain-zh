  trans: '

    ### 达成共识


    交易如何被排序并纳入区块链的区块，取决于网络的`共识算法`。由于我们面对的是一个去中心化数据库，因此需要一种方式让所有参与者就变更如何添加到链上达成一致。例如，如果卖家在区块链上提供一项资产，而两位买家争相购买，去中心化网络如何判定谁先成交？更糟的是，如何防止卖家同时告知两位买家都成功购买，从而重复获利？^(¹⁴)我们需要一种方法来确定交易如何被选择和排序，以维护区块链的唯一状态。换句话说，我们需要一种方式来确立哪些区块能够被添加到链上的`共识`。


    许多像比特币或以太坊这样的公有区块链，依赖于一种称为`工作量证明`的共识算法。`工作量证明`是一种加密证明，表明已消耗大量 CPU 周期执行计算；在此场景下，即基于一个区块计算出一个复杂的数字。一个区块要能被添加到区块链，必须附带其`工作量证明`。任何节点都可以提议一个新区块，并且如果提交时附带了`工作量证明`，它就会被添加到区块链中。成功添加区块的节点会因其付出的努力而获得奖励。^(¹⁵)在网络中履行此职责的节点被称为`矿工`^(¹⁶)，每当新区块被添加时，所有矿工都会竞相尝试添加下一个区块，以获取相应的奖励。


    ### 注意


    这些证明的机制其实相当简单。链中每个区块的标识符是一个哈希值，它包含了前一个区块的标识符、区块中的所有交易以及一个`随机数`。通过改变`随机数`，计算出的区块摘要会完全不同。要将新区块添加到链上，这个标识符必须具有特定的结构（以
    N 个零开头）。由于无法预测摘要的具体样式，矿工只能反复尝试计算区块哈希值，同时改变`随机数`，直到找到一个符合要求的摘要。这需要大量的尝试，因此被视为`工作量证明`。


    请记住，整个基础设施运行在一个点对点的去中心化网络上。这使得节点可以随意加入或离开网络，无需中心化服务器。在这里，`工作量证明`算法为新节点提供了一种识别真实链的方法：它们只需寻找累计投入计算力最大的那条链。


    这也能防止恶意行为者篡改链上的记录并重新计算所有后续区块的哈希值，正如我们在前一节讨论的那样。要做到这一点，攻击者需要从他篡改的那个区块开始，解决所有后续区块的`工作量证明`，这需要比网络中其他矿工更强大的计算能力。


    ### 注意


    除了`工作量证明`，还有其他的共识机制。在第 8 章中，我们将探讨`权威证明`和`权益证明`作为构建更快、更小规模链的替代方案。


    共识算法与网络的`最终性`紧密相关。当一个交易被确认已纳入区块链且不会改变时，我们就称其为`最终`交易。添加在最新区块中的交易远不能被视为`最终`：如果某个矿工成功地从倒数第二个区块开始连续挖出两个区块，他们可能生成一条新链，替换掉最新区块，从而不包含该交易。


    这被称为`重组`，在`工作量证明`链中并不罕见。要确认一个交易是`最终`的，我们需要等待其所在区块之上再挖掘出几个区块，以确保它不会改变。所需的区块数量取决于具体的链以及我们需要的置信度。


    ### 关于吞吐量


    按设计，求解一个`工作量证明`在计算上非常昂贵。这本身就通过对每次要添加一批交易时强制求解一个难题，限制了区块链的吞吐量。


    然而，限制每秒添加到链上的交易数量和复杂度还有另一个原因：可验证性。为了保持区块链的去中心化，网络中的每个节点都需要能够验证每一笔交易是否合法，并且是否按照既定规则执行。如果网络每秒接受大量交易，那么只有高性能设备才能验证这条链，从而将无法获得必要硬件的用户排除在网络之外。因此，低吞吐量与保证区块链的公共访问性有关。


    特别地，以太坊的设计目标约为每秒处理 15 笔交易。请注意，以太坊中的交易复杂程度可能不同，因为它们可以执行任意计算，因此这个上限实际上与运行和验证每个区块中的交易所需要的工作量有关。


    还要注意，这每秒几笔的交易量是由网络中所有用户和应用程序共享的，即使对于单个传统的 Web 应用来说，这也是一个非常低的限制。我们将在第 8 章看到围绕这一限制的一些解决方案。


    ### 从比特币到以太坊


    到目前为止，我们将区块链定义为一个公共数据库，但尚未深入探讨该数据库*可能包含*什么内容。第一个著名的区块链被用于追踪一种数字货币——比特币的所有权。


    我们今天所理解的大部分区块链概念，是由中本聪^(¹⁷)在 2008 年的论文“比特币：一种点对点的电子现金系统”^(¹⁸)中提出的。这篇论文简短易懂，囊括了当今使用的大部分区块链概念。它引入了一种“纯粹的点对点电子现金版本”，没有任何中心化的所有者或发行方。


    总而言之，比特币区块链是一个公共的去中心化数据库，它记录其用户的比特币余额，并支持从一个地址向另一个地址转移资金的交易。它是一个去中心化电子支付平台的实现。


    值得一提的是，除了简单的转账，比特币还支持一种有限的脚本语言。这种语言允许实现诸如时间锁（限制交易在未来的某个时间点之前无法执行）或多重签名交易（需要多个账户共同同意才能转移资产）等结构。然而，用这种语言能构建的内容仍然有限。


    正是为了在网络中支持任意计算，以太坊应运而生。

    '
- fmt: '# Smart Contracts


    Ethereum was introduced by Vitalik Buterin in 2013, and first launched in 2015.^([^(19)](#fn19))
    Its main differentiator was the concept of arbitrary code that could be executed
    in the blockchain in the form of smart contracts. A smart contract is a short
    program uploaded to the blockchain, which can react to transactions sent to it
    by executing arbitrary logic. Each smart contract has its own arbitrary state
    as well, which can be updated on any transaction and can keep any data whatsoever.
    And of course, a smart contract can also hold `ETH`, the native currency of the
    Ethereum network.


    In other words, the Ethereum network holds both a digital currency (the ether)
    and executable code (the smart contracts) with their own state.


    This flexibility allows Ethereum to implement many different constructs. For instance,
    a whole new coin can be easily implemented as a smart contract. The contract only
    needs to keep track of the balance of each user, and provide methods for securely
    transferring them. This allows new cryptocurrencies to be created on top of Ethereum
    with little effort.^([^(20)](#fn20))


    However, remember that all transactions are re-executed by all nodes in the network
    in order to be verified. This means that, while smart contracts may execute arbitrary
    code, this code must be *deterministic*. It must always yield the same result,
    no matter when or where it is run. It also cannot depend on any sources external
    to the blockchain; otherwise, the validity of the blockchain becomes dependent
    on those external sources. A smart contract may only query or interact with other
    smart contracts within the Ethereum network.


    # Gas Fees


    Allowing any user to send a transaction with arbitrary code that will be executed
    on every single node in the network is potentially dangerous. A malicious user
    could submit a piece of code extremely expensive to execute or one that never
    finishes.


    To guard against this, Ethereum introduces a concept called *gas*. Think of gas
    as the measure of the computing power required to process a transaction. In a
    transaction, complex operations will consume more gas than simpler ones. For instance,
    altering the storage of the contract is much more expensive than a simple arithmetic
    expression.


    A transaction sent to the network requires a gas allocation in order to be sent.
    This gas is paid for using `ETH`. Every line of code executed by the transaction
    consumes a bit of its gas, and if it drops to zero, the processing is immediately
    stopped, and the transaction fails. Nevertheless, its sender is still charged
    for the hassle of processing such a long-running process.


    The sender of a transaction can also set the gas price, indicating that they are
    willing to pay more (or less) than other users for the execution of their transaction.
    This is a way to get their transaction included in the blockchain faster (or cheaper)
    than other users, by making it more (or less) attractive to miners.


    # Decentralized Applications


    Smart contracts allow the building of *decentralized applications*, which will
    be our main focus throughout this book. Decentralized applications, or DApps,
    are client-side single-page web applications backed not by a server, but by a
    set of smart contracts on the blockchain. Instead of sending `HTTP` requests to
    a web server, users of the application send transactions to a smart contract on
    the Ethereum network. It is even possible to host the web application itself on
    a decentralized file storage system,^([^(21)](#fn21)) making the application completely
    independent of any centralized infrastructure.


    Instead of querying data from a centralized data store, decentralized applications
    use the blockchain as the source of truth. Data used to populate the app is either
    stored on the blockchain or on a remote storage location that is referred to from
    the blockchain. Likewise, the business logic of the application is encoded in
    a set of smart contracts. Users perform persistent actions on the app by sending
    transactions to its smart contracts.


    ## User Experience


    How does a DApp look and feel to a user? Some DApps will favor decentralization
    over ease of use and require users to access them with a specialized browser or
    browser extension. These extensions act as wallets, holding the user’s keys, and
    also as a gateway to the blockchain by providing a connection to an Ethereum node.
    Under the hood, they inject a `javascript` object that provides low-level methods
    for accessing blockchain data and sending transactions on behalf of the user.
    Whenever the application requests to send a transaction, the user is presented
    with a pop-up to approve it. This moves much complexity from the DApp onto the
    extension, but also requires a large effort from the user to get set up, by installing
    the extension, creating and backing up an account, and purchasing `ETH` to begin
    operating. We will use this approach to build our first DApp in Chapter [2](#476252_1_En_2_Chapter.xhtml)
    and revisit it more in-depth in Chapter [5](#476252_1_En_5_Chapter.xhtml) as we
    see the details of sending transactions.


    Other DApps have a more user-friendly approach, managing the keys on behalf of
    the user. It’s even possible for a user to be using a DApp without even noticing,
    if all its complexity is handled behind the scenes. However, this also means that
    the user is no longer in control of their own keys, but delegates this on the
    app. Also, if each app manages its own set of keys, interoperability is much more
    difficult, since the user will have a different identity on each service. We will
    explore user-friendly approaches, along with the challenges they pose, in Chapter
    [6](#476252_1_En_6_Chapter.xhtml). All in all, good apps offer different experiences
    to different users, depending on how familiar they are with Ethereum.


    Regardless of key management, all DApps need to account for the long confirmation
    times of the network. In traditional web apps, an action in the form of an `HTTP`
    request takes a few milliseconds to get to the web server and back. However, in
    Ethereum, a transaction may take several seconds to be mined, and even more to
    be confirmed. DApps need to take this into account when designing their interfaces
    and be prepared to handle reorganizations as well. We will learn more about these
    challenges in Chapters [4](#476252_1_En_4_Chapter.xhtml) and mostly 5.'
