- fmt: '### Note


    For the sake of this application, we are just loading the events from an arbitrary
    number of blocks ago, in order to seed the component with initial data as it loads.
    Depending on your use case, you may want to add an option to load more events
    (for instance, when the user scrolls to the end of the list) by firing subsequent
    `getPastEvents` calls.


    The render method for this component is straightforward: we will show a pure component
    to display each transfer in a list (Listing [4-19](#476252_1_En_4_Chapter.xhtml#PC38)).
    We will pass down the symbol and decimals to format the amount of tokens transferred
    in each event.


    ```

    render() {

    const { loading, transfers } = this.state;

    const { decimals, symbol } = this.props;

    if (loading) return "Loading...";

    return (

    { transfers.map(transfer => (


    )) }

    )

    }

    Listing 4-19

    Displaying each transfer in the collection by using a pure component that simply
    displays the data received

    ```


    Keep in mind that React requires us to assign a unique key to each element in
    a collection. To generate this key, we are using a `getLogId` helper function
    (Listing [4-20](#476252_1_En_4_Chapter.xhtml#PC39)) that combines the transaction
    hash in which the event occurred and the log index (i.e., the index of the particular
    event in the array of all logs emitted in the transaction). This combination is
    guaranteed to be unique.


    ```

    function getLogId(log) {

    return `${log.transactionHash}.${log.logIndex}`;

    }

    Listing 4-20

    Simple function for generating a unique identifier for a log. Note that web3.js
    already assigns an ID to a log entry, calculated as a hash over the same parameters.
    However, the hash is then truncated to 4 bytes, which may yield collisions if
    we are dealing with a large number of events

    ```


    For the `Transfer` pure component (Listing [4-21](#476252_1_En_4_Chapter.xhtml#PC40)),
    we will just rely on the `formatValue` helper function we used previously and
    fetch the `from`, `to`, and `value` arguments from the transfer object. As an
    extra, we will include a link to the transaction on etherscan so our users can
    review the transaction there, so they can perform an additional check on the data
    we display on our app.^([^(68)](#fn68))


    ```

    const ETHERSCAN_URL = ''https://etherscan.io/tx/'';

    export default function Transfer (props) {

    const { decimals, symbol, transfer } = props;

    const { from, to, value } = transfer.returnValues;

    const roundedValue = formatValue(value, decimals);

    const url = ETHERSCAN_URL + transfer.transactionHash;

    return (


    {from} to {to} for {roundedValue} {symbol}


    );

    }

    Listing 4-21

    Transfer component for displaying a single Transfer event loaded from the ERC20
    token contract

    ```


    With this code, every time we reload the page, we will see the transfers from
    the last 1000 blocks for the token. We can now add support for listening to new
    transfers as they occur.


    ### Monitoring New Transfers


    In order to monitor new transfers, we will install a *subscription* for `Transfer`
    events of this contract (Listing [4-22](#476252_1_En_4_Chapter.xhtml#PC41)), as
    we have already seen previously in this chapter. We will listen to all transfers
    starting from the block right after the one we used for fetching past events and
    unsubscribe once the component is unmounted (Listing [4-23](#476252_1_En_4_Chapter.xhtml#PC42)).


    ```

    componentWillUnmount() {

    const { eventSub } = this.state;

    if (eventSub) eventSub.unsubscribe();

    }

    Listing 4-23

    Code to stop listening for events when the component is to be unmounted from the
    tree. Even though we will never unmount the component in this particular application,
    it is a good practice to always remove the subscriptions when they are no longer
    used

    ```


    ```

    subscribe(contract, fromBlock) {

    const eventSub = contract.events.Transfer({ fromBlock })

    .on(''data'', (event) => {

    this.setState(state => ({

    ...state,

    transfers: [event, ...state.transfers]

    }));

    });

    this.setState({ eventSub });

    }

    Listing 4-22

    Subscription function to listen for new transfer events, to be called from componentDidMount,
    using erc20 and blockNumber+1 as arguments. Note that we are storing the subscription
    object in state to be able to unsubscribe later

    ```


    Your application should now show new transactions as they occur, without the need
    for refreshing the page. However, to make sure we properly handle all scenarios,
    we will add handlers for when a transfer event is removed from the blockchain
    due to a reorganization and for when the subscription fails (Listing [4-24](#476252_1_En_4_Chapter.xhtml#PC43)).


    ```

    subscribe(contract, fromBlock) {

    const eventSub = contract.events.Transfer({ fromBlock })

    .on(''data'', (event) => {

    this.setState(state => ({

    ...state,

    transfers: [event, ...state.transfers]

    }));

    })

    .on(''changed'', (event) => {

    this.setState(state => ({

    ...state,

    transfers: state.transfers.filter(t =>

    t.transactionHash !== event.transactionHash

    || t.logIndex !== event.logIndex

    )}))

    })

    .on(''error'', (error) => {

    this.setState({ error })

    });

    this.setState({ eventSub });

    }

    Listing 4-24

    Adding handlers for the changed and error events of the subscription. The former
    fires whenever an event is removed from the blockchain, so we remove it from our
    state, while the latter fires upon an error, which we add to our state to be displayed
    to the user

    ```


    ### Awaiting Confirmations


    As the last step in the application, we will avoid displaying unconfirmed transfers
    to the user. Instead of showing a transfer event as soon as we receive it, we
    will instead wait for a certain number of blocks to be added to the chain before
    rendering it in our list.


    In order to do this, we first need to monitor the current block number. We will
    add a subscription specifically for that (Listing [4-25](#476252_1_En_4_Chapter.xhtml#PC44)),
    though we could also poll the `getBlockNumber` method every second to achieve
    a similar result.


    ```

    async componentDidMount() {

    const blockNumber = await getWeb3().eth.getBlockNumber();

    this.setState({ blockNumber });

    const HEADERS = ''newBlockHeaders'';

    const blockSub = getWeb3().eth.subscribe(HEADERS)

