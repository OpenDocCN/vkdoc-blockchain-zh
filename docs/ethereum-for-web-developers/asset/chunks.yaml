  raw: '#### ERC20 Component


    This component shall receive the contract instance, knowing that all connection
    details have been settled by the parent component, and display it. We will start
    by retrieving some static information, such as the name, symbol, and number of
    decimals (Listing [4-15](#476252_1_En_4_Chapter.xhtml#PC33)). These are optional
    attributes according to the ERC20 standard, since they are never used as part
    of the contract’s logic; nevertheless, most tokens do implement them.


    We will also retrieve the token’s total supply. This is the total number of tokens
    created for this contract. Unlike the name, symbol, and decimals, there is no
    guarantee that this value will stay constant: some tokens have a continuous issuance
    model, which causes the total supply to increase on every block, while others
    may have a deflationary model where certain events actually burn tokens.


    For the sake of this app, we will work only with tokens with a fixed supply, so
    we will not need to refresh the total supply. Nevertheless, you could easily add
    a polling mechanism for updating the total supply on every call, as we have seen
    earlier in this chapter.


    ```

    class ERC20 extends Component {

    async componentDidMount() {

    const { contract } = this.props;

    const [name, symbol, decimals, totalSupply] =

    await Promise.all([

    contract.methods.name().call(),

    contract.methods.symbol().call(),

    contract.methods.decimals().call(),

    contract.methods.totalSupply().call(),

    ]);

    this.setState({ name, symbol, decimals, totalSupply });

    }

    }

    Listing 4-15

    React component for displaying information on the ERC20 token. Once again, we
    rely on the componentDidMount method to load async information to populate the
    state. By using Promise.all(), we fire all four requests simultaneously and only
    set the return values once we have obtained all of them

    ```


    We can now render this information by showing the token name and symbol to our
    users, as well as the total supply (Listing [4-16](#476252_1_En_4_Chapter.xhtml#PC34)).
    We will rely on the decimals of the token to format all the values we display.


    ```

    render() {

    if (!this.state.totalSupply) return "Loading...";

    const { name, totalSupply, decimals, symbol } = this.state;

    const formattedSupply = formatValue(totalSupply, decimals);

    return (

    {name} Token

    Total supply of {formattedSupply} {symbol}

    );

    }

    Listing 4-16

    Render method to display the static information of an ERC20 token. Note that the
    totalSupply is adjusted by the decimals of the token

    ```


    For the auxiliary `formatValue` function (Listing [4-17](#476252_1_En_4_Chapter.xhtml#PC35)),
    we will rely on `bignumber.js`, a library for manipulating and formatting big
    numbers in javascript. We will convert the total supply value to a bignumber instance,
    right-shift it (on base 10) by the number of decimals, and format the result as
    a string.


    ```

    // src/utils/format.js

    import BigNumber from ''bignumber.js'';

    BigNumber.config({ DECIMAL_PLACES: 4 });

    export function formatValue(value, decimals) {

    const bn = new BigNumber(value);

    return bn.shiftedBy(-decimals).toString(10);

    }

    Listing 4-17

    Auxiliary function to format token amounts based on the decimals property of the
    contract

    ```


    The output so far should look like Figure [4-3](#476252_1_En_4_Chapter.xhtml#Fig3),
    assuming you did not change the token address from the example.


    ![../images/476252_1_En_4_Chapter/476252_1_En_4_Fig3_HTML.jpg](images/476252_1_En_4_Chapter/476252_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Our sample application displaying the static information of the Augur REP token:
    name (Reputation), symbol (REP), and total supply (1.1e25) formatted with the
    token decimals (18)


    ### Displaying Transfer Events


    We will now add the last component of our application that will display the latest
    transfers of the token and listen for any new ones in real time.


    #### Loading Past Transfers


    Let’s start by adding a `Transfers` component to the ERC20 component we already
    have (Listing [4-18](#476252_1_En_4_Chapter.xhtml#PC36)), that will start out
    by loading past transfers. This component will receive the contract, decimals,
    and symbol as props from its parent: the first one to monitor for events and the
    other two to format values.


    ```

    render() {

    if (!this.state.totalSupply) return "Loading...";

    const { name, totalSupply, decimals, symbol } = this.state;

    const { contract } = this.props;

    const formattedSupply = formatValue(totalSupply, decimals);

    return (


    {name} Token

    Total supply of {formattedSupply} {symbol}


    Transfers


    );

    }

    Listing 4-18

    Updated render method from the ERC20 component to include the new Transfers component

    ```


    We will be loading all transfer events from the past 1000 blocks to seed the component.
    Attempting to load all transfers in history will probably fail, given that REP
    has over 75,000 transfers at the time of this writing, which is too large an amount
    to query from the node in a single request. There are other tokens with even more
    transfers, such as OMG, which is at over 2 million at the time of this writing.


    ```

    // src/components/Transfers.js

    import React, { Component } from ''react'';

    import { getWeb3 } from ''../eth/network'';

    export default class Transfers extends Component {

    async componentDidMount() {

    const { contract } = this.props;

    const blockNumber = await getWeb3().eth.getBlockNumber();

    const EVENT = ''Transfer'';

    const pastEvents = await contract.getPastEvents(EVENT, {

    fromBlock: blockNumber - 1000,

    toBlock: blockNumber

    });

    this.setState({

    loading: false,

    transfers: pastEvents.reverse()

    });

    }

    }

    ```'
  trans: "\n# ERC20 组件\n\n该组件负责接收合约实例，并知晓所有连接细节已由父组件处理完毕，随后展示该实例。我们将首先获取一些静态信息，例如名称、符号和小数位数（列表\
    \ 4-15）。根据 ERC20 标准，这些属于可选属性，因为它们从未用作合约逻辑的一部分；尽管如此，大多数代币确实实现了它们。\n\n我们还将获取代币的总供应量。这是为该合约创建的总代币数量。与名称、符号和小数位数不同，并非保证该值保持不变：某些代币采用**持续发行模式**，导致总供应量在每个区块上增加，而其他代币可能采用**通缩模式**，某些事件实际上会销毁代币。\n\
    \n就本应用而言，我们仅处理供应量固定的代币，因此无需刷新总供应量。不过，正如我们在本章前面看到的，你可以轻松添加一个轮询机制，以便在每次调用时更新总供应量。\n\
