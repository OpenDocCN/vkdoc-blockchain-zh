    \ 格式化后的总供应量 (1.1e25)。\n\n## 展示转账事件\n\n现在我们将添加应用的最后一个组件，该组件将展示代币的最新转账记录，并实时监听任何新转账事件。\n\
    \n### 加载历史转账\n\n首先，向已有的 ERC20 组件中添加一个 `Transfers` 组件（列表 4-18），该组件将首先加载历史转账记录。此组件将从其父组件接收\
