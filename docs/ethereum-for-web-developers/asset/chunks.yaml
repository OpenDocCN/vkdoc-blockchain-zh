    # 智能合约


    以太坊由维塔利克·布特林（Vitalik Buterin）于 2013 年提出，并于 2015 年首次上线。^(¹⁹) 其主要区别在于，它提出了在区块链中以智能合约形式执行任意代码的概念。智能合约是上传至区块链的简短程序，能够对发送给它的交易做出响应，并执行任意逻辑。每个智能合约还拥有自身独立的任意状态，该状态可在任何交易中更新，并能存储任何类型的数据。当然，智能合约也能持有以太坊网络的原生货币
    `ETH`。


    换句话说，以太坊网络既持有数字货币（以太币），又持有带有自身状态的可执行代码（智能合约）。


    这种灵活性使以太坊能够实现许多不同的构造。例如，一个全新的代币可以轻松地作为智能合约来实施。该合约只需跟踪每个用户的余额，并提供安全转账的方法。这使得新的加密货币可以毫不费力地在以太坊之上创建。^(²⁰)


    然而，请记住，所有交易都由网络中的所有节点为了验证而重新执行。这意味着，虽然智能合约可以执行任意代码，但该代码必须是*确定性的*。无论何时何地运行，它都必须产生相同的结果。它也不能依赖于区块链外部的任何来源；否则，区块链的有效性将依赖于这些外部来源。一个智能合约只能查询或与以太坊网络内的其他智能合约进行交互。


    # Gas 费用


    允许任何用户发送带有任意代码的交易，并且这些代码将在网络中的每个节点上执行，这潜在风险极高。恶意用户可能会提交一段执行成本极高或永不终止的代码。


    为了防止这种情况发生，以太坊引入了一个名为 *gas* 的概念。可以将 gas 视为处理交易所需计算能力的度量单位。在一笔交易中，复杂操作消耗的 gas 会比简单操作更多。例如，修改合约的存储要比执行一个简单的算术表达式昂贵得多。


    发送到网络的交易需要分配一定的 gas 才能被发送。这笔 gas 费用用 `ETH` 支付。交易执行的每一行代码都会消耗其一部分 gas，如果 gas 降至零，处理会立即停止，交易宣告失败。尽管如此，交易发送者仍需为处理这种长时间运行过程所耗费的资源而付费。


    交易发送者还可以设置 gas 价格，表明他们愿意比其他用户支付更多（或更少）的费用来执行自己的交易。通过使自己的交易对矿工更具（或更少）吸引力，这是一种让自己的交易比其他用户的交易更快（或更便宜）地被包含进区块链的方式。


    # 去中心化应用


    智能合约使得构建*去中心化应用*成为可能，这正是本书关注的焦点。去中心化应用（或称 DApps）是客户端单页 Web 应用，其后台并非服务器，而是区块链上的一组智能合约。应用用户不是向
    Web 服务器发送 `HTTP` 请求，而是向以太坊网络上的智能合约发送交易。甚至可以将 Web 应用本身托管在去中心化文件存储系统上^(²¹)，从而使应用完全独立于任何中心化基础设施。


    去中心化应用不是从中心化数据存储中查询数据，而是将区块链作为真相来源。用于填充应用的数据要么存储在区块链上，要么存储在区块链所引用的远程存储位置。同样，应用的业务逻辑也编码在一组智能合约中。用户通过向智能合约发送交易来对应用执行持久性操作。


    ## 用户体验


    DApp 给用户的观感和体验如何？一些 DApp 倾向于将去中心化置于易用性之上，并要求用户使用专门的浏览器或浏览器扩展来访问。这些扩展充当钱包，持有用户的密钥，同时也充当通往区块链的门户，提供与以太坊节点的连接。在底层，它们会注入一个
    `javascript` 对象，该对象提供用于访问区块链数据和代表用户发送交易的低级方法。每当应用请求发送交易时，用户会看到一个弹窗来批准该交易。这虽然将许多复杂性从
    DApp 转移到了扩展上，但也要求用户付出巨大努力来安装扩展、创建并备份账户、以及购买 `ETH` 才能开始操作。我们将在第 2 章中使用这种方法构建第一个
    DApp，并在第 5 章中更深入地探讨发送交易的细节时再次回顾。


    其他 DApp 则采用更用户友好的方法，代表用户管理密钥。用户甚至可能在毫无察觉的情况下使用 DApp，前提是所有的复杂性都在后台处理。然而，这也意味着用户不再掌握自己的密钥，而是将其委托给应用。此外，如果每个应用都管理自己的一套密钥，互操作性就会变得更加困难，因为用户在每个服务上都会有不同的身份。我们将在第
    6 章中探讨用户友好的方法及其带来的挑战。总而言之，优秀的应用会根据用户对以太坊的熟悉程度，为不同用户提供不同的体验。


    无论密钥管理方式如何，所有 DApp 都需要考虑网络漫长的确认时间。在传统 Web 应用中，以 `HTTP` 请求形式执行的操作只需几毫秒就能到达 Web
    服务器并返回。然而，在以太坊中，一笔交易可能需要数秒才能被挖出，甚至需要更长时间才能得到确认。DApp 在设计界面时必须考虑到这一点，并准备好应对链重组的情况。我们将在第
    4 章，以及主要在第 5 章中，了解更多关于这些挑战的知识。

    '
- fmt: '#### Degrees of Decentralization


    As we mentioned, a DApp can be fully decentralized: it can be hosted on a decentralized
    storage location, load its data from the blockchain, and rely on smart contracts
    for any business logic. Once launched, there is no centralized party that can
    stop or alter the application and no service that could go down preventing access
    to it. These applications are even resistant to censorship by any agent.


    However, this comes at a cost. Decentralized storage may be slow or occasionally
    unavailable if there are not enough replicas of the content. Running queries on
    the Ethereum network can be too slow for some use cases. And in some scenarios,
    even the hurdle of setting up an Ethereum account can be a show-stopper for our
    users. Fortunately, we can trade in some degrees of decentralization in exchange
    for improving the user experience.


    For instance, instead of loading data from the blockchain itself, we can set up
    a centralized server that acts as a cache, providing much faster access to the
    data we need on the client. The web application can still fall back to the chain
    itself if this server goes down or even validate the data it provides against
    the blockchain when needed for a critical operation. We will explore these solutions
    in Chapter [6](#476252_1_En_6_Chapter.xhtml).


    Another example is relaying our users’ transactions to the network, so they do
    not need to set up an account, purchase ETH to pay for gas fees, or even interact
    with the Ethereum network at all. We can create an ephemeral key for the client-side
    and use it to sign transactions that we submit to the blockchain on their behalf
    from a dedicated server. This alleviates many of the pains around user onboarding.
    We will explore this and other alternatives in Chapter [8](#476252_1_En_8_Chapter.xhtml).


    We can even build fully centralized applications that interact with a decentralized
    protocol powered by smart contracts on the Ethereum blockchain. The value of the
    blockchain here is not on the application layer, but on the protocol. By managing
    our users’ assets on a decentralized layer, we guarantee that their data is safe,
    and they can at any time transparently migrate to another application on top of
    the same trustless^([^(22)](#fn22)) protocol.


    All in all, the takeaway is that decentralization is not all or nothing. We can
    and have to choose the appropriate degree of decentralization to implement in
    our applications, knowing that it comes at a trade-off with its ease of use.


    ## Why Blockchain?


    The first question you should ask yourself when implementing a blockchain-based
    system is *whether you actually need a blockchain.*^([^(23)](#fn23))


    It is easy in technology to get carried away by hype cycles: you may be using
    a Kubernetes cluster to horizontally scale the load over your web application
    that would perfectly run on a single box, or you may be using state-of-the-art
    machine learning algorithms to infer trends from your dataset with less than 100
    entries that would better be visualized in an Excel spreadsheet. Millions have
    been spent in developing native mobile apps for presenting static info, since
    it was cooler than *just* a plain responsive web site.


    Blockchain is no exception to hype, with the aggravating factor that it can be
    used as an instrument for financial speculators as well. Always remember that
    just because you have a shiny new hammer on your hands, not everything becomes
    a nail. You should not try to hammer a blockchain into every system, but rather
    design a solution and then consider whether it would actually benefit from a blockchain.


    ### Advantages and Use Cases


    After the preceding disclaimer, we can now focus on where blockchains do shine
    and some suitable use cases for public blockchains or Ethereum in particular.^([^(24)](#fn24))


    *Decentralized finance* is one of the most popular use cases.^([^(25)](#fn25))
    The first blockchain, Bitcoin, was built as a decentralized payments platform,
    but financial applications of a blockchain can go much further. Smart contracts
    can be used to support many kinds of financial workflows, such as decentralized
    exchanges, derivatives, margin trading, insurance, credits, lending, investing,
    prediction markets, and so on. These `artifacts` traditionally required users
    to place their trust and their assets in a centralized institution – this increased
    the barrier of entry, and the institution often took a hefty fee for their services.
    Now, a smart contract in a public auditable blockchain can act as the institution
    supporting these financial services, acting on cryptocurrencies within the chain.


    In general, blockchains shine in scenarios where there was a need for a *trusted
    third party*, since they act as a credible neutral platform for several participants
    to interact securely. This holds not just on financial applications but also whenever
    there is a need to publicly verify the transparency of a process. For instance,
    in an online auction, it is possible to verify that bids from all participants
    are processed by having them submitted (encrypted) to the blockchain. If a participant
    sees that their bid was not considered, they can just show proof of their bid
    on the blockchain.


    By removing the need for a trusted third party, smart contracts can be used to
    create trustless *platforms* or *protocols.* Instead of building on top of a proprietary
    layer, where the rules of the game may be changed unilaterally by the owner, you
    could build on top of a decentralized platform. A good example is a marketplace:
    traditional big companies that operate application and services marketplaces can
    alter their terms and conditions (and their cut!) at any time. On the other hand,
    a marketplace coordinated by a smart contract is immutable and run by no one but
    the blockchain itself.


    Blockchains can also be used to prove existence of a piece of data.^([^(26)](#fn26))
    By submitting a signed digest of a document to the blockchain, anyone can then
    prove that certain data was published by a certain date. But, more interestingly,
    blockchains also allow to verify that a certain piece of data was *not* published.
    For instance, if a blockchain is used to store certificate revocations, then anyone
    can easily prove that a certificate was *not* revoked by just showing that the
    revocation was never uploaded to the chain, which acts as a neutral global database.


    Another advantage of a blockchain is that of *permanence*. If you, as a user,
    hold something of value on a digital system and the maintainer of such system
    disappears, along goes your stuff. This can be true not just for currencies but
    also for digital assets, such as collectibles or online achievements. Having digital
    assets registered on a blockchain guarantees that they are maintained independently
    of the organization that created them. It can even enable trading of those assets
    across the boundaries of the system where it was originally created.


    Some groups are also exploring new governance mechanisms by building *decentralized
    autonomous organizations* (DAOs) on Ethereum. In a DAO, a set of participants
    hold some form of voting power and can submit proposals which are then decided
    via a mechanism coded into the DAO smart contract.^([^(27)](#fn27)) The blockchain
    ensures the absolute transparency of the process and allows for rapidly experimenting
    with new ways of organizing groups around a common purpose.


    However, for all the advantages that come from a public blockchain, there are
    also major limitations imposed on what can be built.'
