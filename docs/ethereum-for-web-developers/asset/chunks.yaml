  trans: '

    #### 去中心化的程度


    正如我们之前提到的，一个 DApp 可以完全去中心化：它可以托管在去中心化存储位置，从区块链加载数据，并依赖智能合约处理所有业务逻辑。一旦启动，就没有中心化方可以停止或修改该应用，也不会有任何服务宕机导致无法访问。这些应用甚至能抵抗任何代理的审查。


    然而，这也需要付出代价。如果内容没有足够的副本，去中心化存储可能会变慢或偶尔不可用。在某些用例中，在以太坊网络上运行查询可能过于缓慢。在某些场景下，即使是设置以太坊账户这一障碍，也可能成为我们用户的绊脚石。幸运的是，我们可以牺牲一定程度的去中心化来换取用户体验的提升。


    例如，我们可以不直接从区块链本身加载数据，而是设置一个充当缓存的中心化服务器，从而在客户端更快速地访问所需数据。如果该服务器宕机，Web 应用仍然可以回退到链本身；在进行关键操作时，甚至可以针对区块链验证其提供的数据。我们将在第
    6 章探讨这些解决方案。


    另一个例子是将用户的交易中继到网络，这样他们就不需要设置账户、购买 ETH 来支付燃料费，甚至完全不需要与以太坊网络交互。我们可以为客户端创建一个临时密钥，并用它在客户端签署交易，然后通过专用服务器代表用户提交到区块链。这缓解了用户入门过程中的许多痛点。我们将在第
    8 章探讨这种方法及其他替代方案。


    我们甚至可以构建完全中心化的应用，这些应用与以太坊区块链上由智能合约驱动的去中心化协议进行交互。在这里，区块链的价值不在于应用层，而在于协议层。通过在去中心化层管理用户的资产，我们保证了他们数据的安全，并且他们可以随时透明地迁移到基于相同无信任^(²²)协议的其他应用之上。


    总而言之，关键在于去中心化并非全有或全无。我们可以而且必须选择适合我们应用的*去中心化程度*，同时意识到这需要与其易用性进行权衡。


    ## 为什么选择区块链？


    在实施基于区块链的系统时，你首先应该问自己的问题是*你是否真的需要区块链。*^(²³)


    在技术领域，很容易被炒作周期冲昏头脑：你可能会使用 Kubernetes 集群来水平扩展你的 Web 应用的负载，而它本可以完美地运行在单台服务器上；或者你可能会使用最先进的机器学习算法，从一个只有不到
    100 条记录的数据集中推断趋势，而这些数据更适合在 Excel 表格中可视化。数百万美元曾被用于开发仅展示静态信息的原生移动应用，仅仅因为它比*仅仅*做一个普通的响应式网站更酷。


    区块链也不例外，它甚至可能被用作金融投机者的工具。永远记住，仅仅因为你手里有了一把闪亮的新锤子，并不意味着所有东西都变成了钉子。你不应该试图将区块链硬塞进每一个系统，而应该先设计解决方案，然后再考虑它是否真的能从区块链中受益。


    ### 优势与用例


    在做出上述免责声明之后，我们现在可以聚焦于区块链真正擅长的领域，以及一些适用于公有区块链或特别是以太坊的用例。^(²⁴)


    *去中心化金融*是最流行的用例之一。^(²⁵) 第一个区块链——比特币，是作为去中心化支付平台构建的，但区块链的金融应用可以走得更远。智能合约可用于支持多种金融工作流程，例如去中心化交易所、衍生品、保证金交易、保险、信贷、借贷、投资、预测市场等等。这些`artifacts`传统上要求用户将他们的信任和资产托付给中心化机构——这提高了准入门槛，并且该机构通常会对其服务收取高昂的费用。现在，一个在公开可审计区块链上的智能合约可以充当支持这些金融服务的机构，处理链内的加密货币。


    通常，区块链在需要*可信第三方*的场景中大放异彩，因为它作为一个可信的中立平台，允许多个参与者安全地进行交互。这不仅适用于金融应用，也适用于任何需要公开验证过程透明度的场景。例如，在在线拍卖中，可以通过将所有参与者的出价（加密后）提交到区块链来验证其是否被处理。如果某个参与者发现其出价未被考虑，他们只需出示其在区块链上的出价证明即可。


    通过消除对可信第三方的需求，智能合约可用于创建无信任的*平台*或*协议*。你无需构建在专有层之上（该层的游戏规则可能被所有者单方面更改），而是可以构建在去中心化平台之上。一个很好的例子是市场：运营应用和服务市场的传统大公司可以随时更改其条款和条件（以及他们的分成！）。另一方面，由智能合约协调的市场是不可变的，由区块链本身而非任何人运行。


    区块链也可用于证明数据的存在性。^(²⁶) 通过将文档的签名摘要提交到区块链，任何人都可以证明某些数据是在某个日期之前发布的。但更有趣的是，区块链还可以验证某些数据*未被*发布。例如，如果区块链用于存储证书撤销信息，那么任何人都可以轻松证明某个证书*未被*撤销，只需展示该撤销信息从未被上传到链上即可，而该链充当了一个中立全局数据库的角色。


    区块链的另一个优势在于*持久性*。如果你作为用户，在一个数字系统中持有有价值的东西，而该系统的维护者消失了，你的东西也会随之消失。这不仅适用于货币，也适用于数字资产，如收藏品或在线成就。将数字资产注册在区块链上保证了它们独立于创建它们的组织而得以维护。它甚至可以实现这些资产在最初创建的体系边界之外的交易。


    一些团体也在探索新的治理机制，通过在以太坊上构建*去中心化自治组织* (DAO)。在 DAO 中，一组参与者持有某种形式的投票权，并可以提交提案，然后通过
    DAO 智能合约中编码的机制进行决策。^(²⁷) 区块链确保了流程的绝对透明，并允许围绕共同目标快速实验新的群体组织方式。


    然而，尽管公有区块链带来了诸多优势，但它也对可以构建的内容施加了重大限制。

    '
- fmt: '### Limitations


    One of the major limitations imposed by a public blockchain, as we already mentioned,
    is *transaction throughput*. Processing a dozen transactions per second is often
    not enough for a single application, much less for all applications built on the
    same chain to share. This is, however, the cost of decentralization. As Vitalik
    Buterin himself puts it: “Blockchains are NOT about cutting computational costs
    (at least relative to centralized servers). Blockchains are about incurring a
    sacrifice in the form of increased computational costs to achieve a decrease in
    social costs.”^([^(28)](#fn28))


    Nevertheless, there is much work toward scaling public blockchains. If a dozen
    transactions per second is too few to share among all applications in a blockchain,
    then we can build more blockchains and interconnect them. Or we can process batches
    of transactions outside the blockchain and then settle them all together in a
    single transaction. We will explore more about these approaches in Chapter [8](#476252_1_En_8_Chapter.xhtml),
    regarding scaling.


    Another major challenge for blockchains is that of *user onboarding*. While decentralization
    offers many benefits in terms of decreasing social costs, removing third parties,
    and providing privacy, it also makes approaching the platform more difficult.
    There is no central authority to hold your hand as you jump onto the platform
    and no one to ask for your help if you misplaced your private keys and lost all
    your funds. Furthermore, in order to interact with the Ethereum network, you first
    need to have ether in your possession, not to mention a wallet to hold them, which
    makes the setup process longer and more cumbersome than most users are willing
    to accept.


    Onboarding is being tackled as one of the major pain points in the usage of cryptocurrencies
    in applications, with many companies offering centralized solutions or acting
    as custodians for end users’ assets. Decentralized applications are also experimenting
    with smoother user onboarding flows, so users do not fall out of the funnel when
    asked to download a dedicated browser extension to interact with the app. We will
    go through many of these techniques to ease user onboarding in Chapter [7](#476252_1_En_7_Chapter.xhtml).


    Note that the limitations and use cases we have defined so far apply to blockchains
    that are public in nature, that is, networks where any participant can join to
    verify history, submit transactions, query the current data, or even act as a
    miner. However, there is another set of blockchains we have not explored so far.


    ### Non-public Blockchains


    When we first defined a blockchain, we described it as a *public* digital ledger.
    However, ever since Bitcoin appeared, there has been extensive work on *permissioned*
    blockchains, which challenge our preceding definition by removing the public nature
    of the chain. These blockchains limit which nodes are allowed to join the network
    or which are allowed to act as miners or send transactions.


    For instance, a growing pattern in the enterprise world is that of *federated*
    or *consortium* blockchains. These blockchains are managed by a group (consortium)
    of different institutions. Each member of the consortium controls a node in the
    network that acts as a whitelisted *validator* node and participates in a vote-based
    consensus algorithm for adding new blocks.^([^(29)](#fn29)) This removes the need
    of a proof-of-work, since consensus is reached by voting among a predefined set
    of nodes.


    These permissioned blockchains may also limit not only the nodes that act as miners
    but also which nodes join the network and are able to verify the transactions,
    or which accounts are able to submit transactions for processing.


    ### Note


    Some companies are taking this one step further and go with fully *private blockchains*,
    which are internal to the company, and only a single node has the permission to
    add new blocks. These chains are used mostly for auditability and tracing purposes.


    These changes allow federated blockchains to have a much higher transaction throughput
    than public blockchains. Also, by restricting the set of nodes that can participate
    in the network, they are automatically protected against spam, and can drop the
    requirement of paying for transaction fees.


    This allows permissioned blockchains to cater for a different set of use cases.
    For instance, federated chains are often used to settle global transactions among
    the different companies that form the consortium, without the restrictions on
    the number of transactions per second imposed by public blockchains. Here, the
    value of the blockchain lies in its auditability, and in removing the need of
    a *single* trusted party to hold the data shared among the consortium.


    While there are some disagreements on whether these permissioned chains can be
    considered *true blockchains* or not, the fact is that blockchain technology is
    making its way to the enterprise world. However, throughout this book we will
    focus on public blockchains only, specifically Ethereum. Nevertheless, much of
    the learning from public blockchains can be applied to the permissioned space
    as well.^([^(30)](#fn30))


    ## Summary


    Hopefully, this chapter served as an introduction to the world of blockchain and
    Ethereum. You should now have a basic understanding on what a blockchain is, when
    it makes sense to use one, and what are its limitations.


    We introduced basic concepts to which we will constantly return throughout the
    book, such as smart contracts, transactions, blocks, reorganizations, consensus,
    and nodes. We went from Bitcoin onto Ethereum and briefly mentioned permissioned
    blockchains as an alternative to the public chains.


