  trans: '

    ### 轮询新区块


    轮询是一种简单有效的响应变化的方法（代码清单 4-9）。由于以太坊网络中的任何变更都需要通过链上的新区块引入，因此一种完全有效的方法就是轮询新区块，并在新区块被挖出时重新读取你感兴趣的合约状态。由于以太坊区块每隔几秒就会生成一个，因此
    1 秒的间隔就足够了。


    ```

    let block = null,

    totalSupply = null;

    const interval = setInterval(async function() {

    const newBlock = await web3.eth.getBlockNumber();

    if (newBlock !== block) {

    // 更新区块号

    block = newBlock;

    // 从合约中重新读取相关数据

    totalSupply = await erc20.methods.totalSupply().call();

    }

    }, 1000);

    代码清单 4-9

    轮询新区块以更新 ERC20 合约的 totalSupply。虽然我们可以直接轮询 totalSupply，但如果需要在每个区块上更新的数据更多，这种方法会更高效

    ```


    每当发现新区块时，你可以查询你的应用所交互的合约以获取其最新状态，并在有变更时相应地更新你的应用。另一种方法是在新区块上运行 `getPastEvents`，并且仅在存在影响你合约的事件时才做出响应。


    ### 安装事件过滤器


    *事件过滤器*是以太坊节点提供的一种机制，用于检索匹配一组指定条件的新事件。它的工作原理是允许你在**节点上**安装一个事件过滤器，然后轮询匹配该过滤器的任何新事件。在
    JSON-RPC 层面，此模式主要由以下方法支持：


    - `newFilter` 用于在节点上安装新的事件过滤器，并返回一个过滤器 ID

    - `getFilterChanges` 返回自上次调用此方法以来，给定过滤器 ID 的所有新日志

    - `uninstallFilter` 用于根据 ID 移除过滤器


    事件过滤器仍然依赖于轮询节点以获取新变更，但它们使用起来更方便，因为现在是由节点来跟踪需要发送给客户端的具体新事件。这省去了客户端需要定期调用 `getPastLogs`
    来检查新事件的工作，并允许节点在需要时预先计算要发送的数据。此外，还可以为发送到节点的新区块和待处理交易安装过滤器。


    ### 警告


    某些公共节点（例如 Infura 提供的节点）可能不支持安装事件过滤器。为了解决这个问题，Metamask 内置了一个 web3 子提供程序（subprovider），用于在客户端完全模拟过滤器的行为。这允许你在编写应用代码时使用事件过滤器，而无需担心你连接的节点是否真正支持它们。但是，请记住，在这种情况下，使用过滤器可能带来的性能提升将完全丧失。


    现在，我们有必要探讨一下在检索和轮询事件时可以指定哪些选项。这些选项在创建新过滤器和获取历史日志时都可以使用：


    - **区块范围**可用于指定要监视事件的区块。默认情况下，过滤器创建后会监视最新挖出的区块。

    - 日志来源的一个或多个**地址**。从 web3 合约对象检索事件会自动将日志限制为合约实例的地址。

    - 用于过滤事件的**主题（topics）**。回顾第 3 章，EVM 日志最多可以有四个索引主题（indexed topics）——这些主题用于在查询期间进行过滤。第一个主题总是事件选择器（event
    selector），而其余主题是 Solidity 中的索引参数（indexed arguments）。过滤器可以对任何主题施加限制，要求某个主题可选的匹配一组值。


    例如，以下过滤器对象可用于检索最后 1000 个区块内发送给三个代币持有者组的所有 ERC20 代币转账。


    ```

    > const block = await web3.eth.getBlockNumber();

    > const filter = { to: [holder1, holder2, holder3] };

    > const opts = { fromBlock: block - 1000, filter: filter };

    > await erc20.getPastEvents(''Transfer'', opts);

    ```


    web3 库本身不支持事件过滤器。相反，监视事件是通过第三种也是最后一种监听变更的机制来完成的：订阅。


    ### 创建订阅


    监视事件的一种更高级选项是创建订阅。事件订阅的工作原理与事件过滤器类似，它们都是通过一组过滤器（区块范围、地址和主题）在节点上创建，以指示客户端对哪些事件感兴趣。然而，订阅不需要客户端轮询变更，而是依赖双向连接直接将新事件推送给客户端。因此，订阅仅适用于
    websocket 或 IPC 连接，而不适用于 HTTP 连接。


    ### 注释


    与事件过滤器不同，Infura 确实通过 URL `wss://mainnet.infura.io/ws/v3/PROJECTID` 支持 websocket
    连接。尽管如此，如果用户通过常规 HTTP 连接选择自定义节点，Metamask 也附带了一个子提供程序，通过依赖轮询在客户端模拟订阅功能。同样，这允许你在应用中透明地使用事件订阅，如果连接或节点不支持该功能，子提供程序会进行
    polyfill 填充。


    在底层，当你监听事件时，web3 会使用订阅（代码清单 4-10）。这意味着只有在你通过 websocket 或 IPC 连接运行时，或者你有一个用于 polyfill
    订阅的子提供程序时，才能依赖事件。当有匹配过滤器的新事件可用、发生错误或事件因区块链重组而被移除时，web3 事件发射器（event emitter）会进行报告。


    ```

    > const filter = { to: [holder1, holder2, holder3] };

    > const sub = erc20.events.Transfer({ filter })

    .on(''data'', (evt) =>

    console.log(`来自 ${evt.returnValues.from} 的新交易`)

    )

    .on(''error'', (err) =>

    console.error(err)

    )

    .on(''changed'', (evt) =>

    console.log(`已移除来自 ${evt.returnValues.from} 的交易`)

    )

    代码清单 4-10

    设置订阅以监视 ERC20 代币合约上的 Transfer 事件。`data` 处理程序在每个新事件时触发，而 `error` 在订阅出错时触发。由于链重组而从链上移除的事件会在
    `changed` 中触发。

    ```


    当与服务器的连接关闭时，订阅会自动清除。或者，可以通过订阅对象上的 `unsubscribe()` 方法，或使用 `web3.eth.clearSubscriptions()`
    来移除它们，后者会清除所有活动订阅。


    与事件过滤器一样，可以为来自多个地址的事件、新的待处理交易或新区块设置订阅。使用后者，可以实现类似于轮询的模式，即安装一个订阅来监视新区块，并在每个区块上重新读取合约状态。然而，如果合约对所有状态变更都发出事件，那么监视这些事件效率要高得多。


    ## 示例应用


    现在，我们将整合本章学到的所有内容，构建一个用于监视 ERC20 代币转账的 Web 应用程序。此应用仅从代币中检索数据，不提供任何用于实际发送交易的界面。


    ### 设置


    我们将再次使用 `create-react-app` 包来引导我们的应用。不用说，使用此包并非必需，但它能简化我们的设置，并让我们专注于构建应用本身。


    ```

    npm init react-app erc20-app

    ```

    '
- fmt: '### Dependencies


    Besides `web3`, we will install the `openzeppelin-solidity` package as a dependency.
    OpenZeppelin is an open source library of secure reusable smart contracts, and
    includes vetted implementations for some standards. We will use it to obtain the
    ABI of the `ERC20` contract that we need to create the `web3` Contract instance.
    We will also add `bignumber.js` for manipulating a few numeric values throughout
    the app.


    ```

    npm install web3@1.2.0 openzeppelin-solidity@2.1 bignumber.js@8.0

    ```


    As before, try running `npm start` to make sure that the sample react-app runs
    successfully. We can now start coding.


    ### Initializing Web3


    We will create a `network.js` file as before to manage a `web3` object to connect
    to the network. We will rely on the injected web3 provider, falling back to a
    websocket connection to Infura. Note that since we will not request access to
    user accounts, we can skip the `ethereum.enable()` call.


    ```

    // src/eth/network.js

    import Web3 from ''web3'';

    let web3;

    export function getWeb3() {

    if (!web3) {

    web3 = new Web3(window.ethereum

    || (window.web3 && window.web3.currentProvider)

    || "wss://mainnet.infura.io/ws/v3/PROJECT_ID");

    } return web3;

    }

    ```


    ### Note


    Make sure to use a valid URL for the fallback provider, by filling in with your
    Infura token, in case the user browsing the site does not have Metamask or a web3
    compatible browser. Note that it is websocket-based, since we will be using event
    subscriptions later on the app.


    ### The ERC20 Contract


    We will create a small function for initializing new web3 contract objects for
    ERC20s. Recall that in order to do this, we needed access to the `web3` object
    (which we have already set up), the contract ABI, and the address.


    ```

    // src/contracts/ERC20.js

    import ERC20Artifact from ''openzeppelin-solidity/build/contracts/ERC20Detailed.json'';

    export default function ERC20(web3, address = null) {

    const { abi } = ERC20Artifact;

    return new web3.eth.Contract(abi, address);

    }

    ```


    We retrieve the contract ABI from OpenZeppelin, while we’ll leave the address
    as a parameter for now. Now that we have all basic components set up, we can get
    started with the application views.


    ## Building the Application


    We will start with a main `App` component that will initialize the connection
    and set up the `ERC20` contract instance that we will be monitoring. Once we have
    the contract instance ready, we will begin by retrieving some information from
    it.


    ### Root Component


    The `App` component will be the root of our component tree (Listing [4-11](#476252_1_En_4_Chapter.xhtml#PC28)).
    This component will manage the connection to the network and the `ERC20` contract
    instance, both of which will be set up on the `componentDidMount` lifecycle method.


    Remember that this method is automatically fired by React when the component has
    mounted, and is the suggested event for retrieving async data. Of course, if you
    are using a particular state management library (such as Redux), your strategy
    for loading async data may be different.


    ```

    // src/App.js

    import React, { Component } from ''react'';

    import ERC20Contract from ''./contracts/ERC20'';

    import { getWeb3 } from ''./eth/network'';

    const ERC20_ADDRESS = "0x1985365e9f78359a9B6AD760e32412f4a445E862";

    class App extends Component {

    state = { loading: true };

    async componentDidMount() {

    const web3 = getWeb3();

    const erc20 = await ERC20Contract(web3, ERC20_ADDRESS);

    this.setState({ erc20, loading: false });

    }

    render() {

    return (


    { this.getAppContent() }


    );

    }

    getAppContent() {

    const { erc20 } = this.state;

    if (!erc20) {

    return (Connecting to network...);

    } else {

    return (ERC20 at {erc20.options.address});

    }

    }

    }

    Listing 4-11

    Initial version of the root App component for our application. Note that the highlighted
    line in componentDidMount that is setting up the ERC20 contract is using the factory
    method we built earlier

    ```


    Since the address in the preceding example refers to a contract on mainnet, the
    app will only work if we have a connection to the Ethereum main network. If we
    are connecting to another network, the contract will probably not exist at the
    address listed, causing the app to fail.


    ### Note


    If you are curious about the `ERC20` address chosen, it is the Augur REP token.
    Augur is a decentralized oracle and prediction market, and its main token is used
    reporting and disputing the outcome of events. If you want to experiment with
    other ERC20s, Etherscan provides a handy list of top tokens at `etherscan.io/tokens`.


    To handle this case, we will add a few lines to detect the current network, and
    validate that we are indeed on mainnet (Listing [4-12](#476252_1_En_4_Chapter.xhtml#PC29)).
    You can play with this by changing the current network on metamask while on the
    application.


    ```

    async componentDidMount() {

    const web3 = getWeb3();

    const networkId = await web3.eth.net.getId();

    const isMainnet = (networkId === 1);

    this.setState({ isMainnet });

    if (isMainnet) {

    const erc20 = await ERC20Contract(web3, ERC20_ADDRESS);

    this.setState({ erc20 });

    }

    this.setState({ loading: false });

    }

    Listing 4-12

    Checking that we are currently connected to mainnet. Note that the contract is
    only instantiated if we are on the correct network

    ```


    The `render` method needs to be changed accordingly to handle not just the loading
    and loaded states but also the state where we are not on mainnet.


    ```

    getAppContent() {

    const { loading, isMainnet, erc20 } = this.state;

    if (loading) {

    return (Connecting to network...);

    } else if (!isMainnet) {

    return (Please connect to Mainnet);

    } else {

    return (ERC20 at {erc20.options.address});

    }

    }

    ```


    We still have another issue to tackle: what if the connection just fails? The
    node we are connecting to may be offline, or the contract address could just be
    incorrect. We need to add proper error handling when we are retrieving blockchain
    data (Listing [4-13](#476252_1_En_4_Chapter.xhtml#PC31)).


    ```

    async componentDidMount() {

    const web3 = getWeb3();

    await this.checkNetwork(web3);

    await this.retrieveContract(web3);

    this.setState({ loading: false });

    }

    async checkNetwork(web3) {

    try {

    const networkId = await web3.eth.net.getId();

    const isMainnet = (networkId === 1);

    this.setState({ isMainnet });

    } catch (error) {

    console.error(error);

    this.setState({ error: `Error connecting to network` })

    }

    }

    async retrieveContract(web3) {

    if (!this.state.isMainnet) return;

    try {

    const erc20 = await ERC20Contract(web3, ERC20_ADDRESS);

    this.setState({ erc20 });

    } catch (error) {

    console.error(error);

    this.setState({ error: `Error retrieving contract` })

    }

    }

    Listing 4-13

    Updated componentDidMount method to add error handling. Note that the render method
    also needs to be updated accordingly to display the error message if it is present
    in the component state

    ```


    We can now focus on the token itself. Let’s create a new component named `ERC20`,
    display it instead of the contract’s address (Listing [4-14](#476252_1_En_4_Chapter.xhtml#PC32)),
    and start working on it.


    ```

    getAppContent() {

    const { loading, error, isMainnet, erc20 } = this.state;

    if (error) {

    return ({error});

    } else if (loading) {

    return (Connecting to network...);

    } else if (!isMainnet) {

    return (Please connect to Mainnet);

    } else {

    return ();

    }

    }

    Listing 4-14

    Updated render helper method to display an ERC20 component, which expects the
    erc20 contract instance as a property

    ```'
