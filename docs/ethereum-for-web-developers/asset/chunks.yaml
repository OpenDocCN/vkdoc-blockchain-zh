- fmt: '### Note


    You may have noted an HD Wallet section on the ganache output, which includes
    a mnemonic and an HD path. HD stands for hierarchical deterministic, and is a
    concept borrowed from Bitcoin for creating any number of accounts given an *extended*
    pair of private/public keys. Without going into technical details, a new pair
    of private/public keys can be created from the extended pair by providing different
    *derivation paths* (such as `m/44’/60’/0’/0/0`, `m/44’/60’/0’/0/1`, etc., as shown
    in the ganache output). The extended pair itself can be derived from a *mnemonic*:
    a set of randomly generated words which are much friendlier to remember or jot
    down. All in all, this allows an unlimited number of accounts to be securely derived
    from a single set of words. We will review this in-depth in Chapter [7](#476252_1_En_7_Chapter.xhtml).


    Ganache defaults to instant sealing, meaning that whenever a new transaction is
    received, a new block is automatically mined on the spot and added to the chain.
    To test this out, start a new ganache instance via `ganache-cli` (Listing [5-3](#476252_1_En_5_Chapter.xhtml#PC3)).
    On a different terminal, create a new project with `web3@1.2.0` and start a new
    console (Listing [5-2](#476252_1_En_5_Chapter.xhtml#PC2)), where we will execute
    a transaction.


    ```

    > ganache-cli -d

    Listening on 127.0.0.1:8545

    eth_gasPrice

    eth_getBalance

    eth_sendTransaction

    Transaction: 0x6c79e178...

    Gas usage: 21000

    Block Number: 1

    eth_getTransactionReceipt

    eth_getBalance

    Listing 5-3

    Output of the ganache log from the execution listed previously

    ```


    ```

    $ npm init -y

    $ npm install web3@1.2.0

    $ node --experimental-repl-await

    > // Load web3 and open a connection to the node

    > let Web3 = require(''web3'')

    > let web3 = new Web3(''http://localhost:8545'')

    > // Loads first two accounts as alice and bob

    > let [alice, bob] = await web3.eth.getAccounts()

    > // Checks bob''s initial balance (remember 1ETH = 1e18 Wei)

    > await web3.eth.getBalance(bob) / 1e18


    > // Send 1ETH from Alice to Bob

    > // Note that the transaction is mined immediately

    > web3.eth.sendTransaction({from: alice,to: bob,value: 1e18})

    > // Check bob''s balance again and see the additional 1ETH

    >  await web3.eth.getBalance(bob) / 1e18


    Listing 5-2

    Testing sending 1ETH between two of the accounts generated by ganache. Keep an
    eye on the ganache log as you send the transaction: you will note that it is processed
    and mined immediately

    ```


    Instead of having ganache mine a new block on every transaction, you can specify
    a `blockTime` (in seconds) which indicates the interval in which new blocks will
    be generated. While slower than instant seal, this is a better representation
    of how an actual chain works.


    You can also force ganache to mine a new block at any time by sending a special
    `evm_mine` instruction via its JSON-RPC interface (Listing [5-4](#476252_1_En_5_Chapter.xhtml#PC4)).
    This instruction is specific to ganache and is not part of the standard JSON-RPC
    API.


    ```

    > // Check the current block number

    > await web3.eth.getBlockNumber()


    > // Force ganache to mine a new block

    > let provider = web3.currentProvider

    > let send = util.promisify(provider.send).bind(provider)

    > await send({ method: ''evm_mine'' })

    > // Verify that the block number has increased

    > await web3.eth.getBlockNumber()


    Listing 5-4

    Adding a new block to a ganache development blockchain by sending an evm_mine
    call directly via the provider. Ganache also supports an evm_increaseTime call
    to fake the passing of time, which is particularly useful for automated tests

    ```


    By default, all chains generated by ganache are ephemeral: they are lost when
    the ganache process is stopped. This can be changed by starting ganache with a
    `db` option to store its state in a local folder, as shown in the following.


    ```

    $ mkdir -p ganachedb

    $ ganache-cli -d --db ganachedb

    ```


    Make sure to run `--help` to check all the available options: ganache is a very
    flexible tool for testing and allows you to set up whichever accounts you want
    with arbitrary balances. It can even fork off an existing chain for running dry
    runs of actions on actual networks.


    #### Geth or Parity Development Mode


    An alternative to using ganache for development is to work with a common Ethereum
    client, such as Geth or Parity, set on development mode. This mode creates a new
    private blockchain, managed entirely by the node, with optional instant seal.
    While they offer less flexibility for testing than ganache, they are more representative,
    since you connect your app to the same clients as you would do in production.


    ### Note


    While we will focus the rest of this section on Geth, make sure to check out Parity''s
    documentation as well to review the options available for its dev mode.


    To start geth in development mode, install it on your workstation and run the
    following command. Make sure to first stop the ganache instance we started earlier
    if it is still running, since both will attempt to use the same port.


    ```

    $ geth --datadir=geth-data --rpc --ws --dev --dev.period=1

    ```


    This will open the HTTP interface in the default 8545 port and the websocket interface
    in 8546. The `dev.period` option specifies the interval (in seconds) in which
    new blocks should be mined – omitting this option toggles instant seal as in ganache.
    Also, note the `datadir` option, which will store all blockchain data in the local
    `geth-data` directory; if you do not set this flag, geth will store all data in
    a default location in your home directory.


    Upon startup, Geth will create a single account with large amounts of ETH for
    development. Nevertheless, if you want to generate additional accounts, you may
    use the `account` subcommand, setting the same `datadir` as in the original geth
    command.


    ```

    $ geth --datadir=geth-data account new

    Your new account is locked with a password. Please give a password. Do not forget
    this password.

    Passphrase:

    Repeat passphrase:

    Address: {3975c2...}

    ```


    Geth will ask you for a passphrase to encrypt the account, which you may leave
    as empty for a development network (but definitely not for a real one!). All Ethereum
    clients keep user accounts encrypted, until the owner requires to use them. As
    such, to actually use the account, the owner must first unlock it by providing
    the passphrase. Let''s test this: we will once again start a `node` console and
    connect to the node.


    ```

    $ node --experimental-repl-await

    > // Load web3 and open a connection to the node

    > let Web3 = require(''web3'')

    > let web3 = new Web3(''http://localhost:8545'')

    > // List accounts on the node

    > let accounts = await web3.eth.getAccounts()

    [ ''0xC5A4bA36f7C0B4eD17455C1A578a6ab3Fb738245'', ...]

    > // Send a transaction from the always-unlocked dev account

    > await web3.eth.sendTransaction({ from: accounts[0], to: accounts[1], value:
    5e18 })

    { transactionHash: ''0x18737033...'', ... }

    > // Try sending a transaction from the newly created account

    > await web3.eth.sendTransaction({ from: accounts[1], to: accounts[0], value:
    1e18 })

    Returned error: authentication needed: password or unlock

    ```


    Unlocking an account requires access to the *personal* API, which is disabled
    by default on the HTTP interface. To avoid going into detail on how to configure
    API accesses for a node, we will simply restart the geth process supplying an
    `unlock` option with the comma-separated list of addresses we want to freely use.
    Geth will prompt for the account''s password upon startup.


    ```

    $ geth --datadir=geth-data --rpc --ws --dev --dev.period=1

    --unlock=3975c2...

    ```'
