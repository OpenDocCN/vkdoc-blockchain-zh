  trans: '

    ### 警告


    安装 `MetaMask` 时要格外小心。大多数与管理用户密钥或交易相关的软件都容易受到网络钓鱼攻击。下载时务必确保你访问的是官方 `MetaMask` 网站。


    下一步是为你的账户充值，以便与智能合约进行交互。在本书的示例中，我们将使用 `Rinkeby` 测试网络（或测试网）。`以太坊` 有多个测试网（`Ropsten`、`Rinkeby`、`Kovan`
    和 `Goerli`），每个都有其特点，并通过唯一的数字 ID 来标识：


    - `Ropsten`（ID `3`）是唯一基于工作量证明的测试网，这使得它与主网最为相似，但也很不可靠。由于网络上实际完成的工作量不多，出块时间不可预测，且该网络极易受到攻击。

    - `Rinkeby`（ID `4`）是一个基于权威证明的测试网，这意味着有一组受信任的节点有权向区块链添加新区块。这使得它比 `Ropsten` 更加稳定可靠。然而，由于所使用共识算法的限制，只有
    `Geth` 客户端可以连接到 `Rinkeby`。

    - `Kovan`（ID `42`）与 `Rinkeby` 类似，也是一个基于权威证明的测试网，但其共识算法与 `Parity` 客户端兼容，而非 `Geth`。

    - `Goerli`（ID `6`）是最新设立的测试网。它也使用权威证明，其优势在于与 `Geth` 和 `Parity` 客户端都兼容。


    有几个在线水龙头^(³⁶)可以获取测试网 `ETH` 用于尝试。使用其中一个水龙头为你刚刚在 `MetaMask` 上创建的某个账户申请代币。


    ### 注


    你对 `MetaMask` 的入门流程感觉如何？如果你觉得它复杂或有点冗长，现在请考虑一下你的用户。所有 `以太坊` 的新用户都需要经历一个类似的过程，额外的负担是他们必须在一个交易所注册，购买真正的主网
    `ETH` 来与你的应用交互，这通常需要完整的 `KYC` 流程。这就是为什么用户入门在 `以太坊` 上是一个巨大的挑战。有一些技术可以缓解这个问题，例如，在绝对必要之前不要求你的用户拥有
    `以太坊` 账户，或者基于元交易构建替代的入门流程。更多内容请参见第 `7` 章。


    ## 构建我们的应用


    我们将从 `create-react-app` 模板开始构建。确保已完成“设置环境”部分的所有步骤，你应该有一个简单的 `javascript` 应用，其
    `src` 文件夹下包含少量文件，并以 `index.js` 为核心。要验证一切运行正常，请运行 `npm run start`，然后在浏览器中打开 `localhost:3000`。你应该会看到
    `create-react-app` 包的默认初始屏幕，包括一个旋转的 `React` 徽标。


    ### 编译智能合约


    我们的 `DApp` 将由一个名为 `Counter` 的智能合约支持。在你的项目根目录下创建一个 `contracts` 文件夹，并添加一个 `Counter.sol`
    文件（清单 `2-3`）。


    ```

    // contracts/Counter.sol

    pragma solidity ⁰.5.0;

    contract Counter {

    uint256 public value;

    event Increased(uint256 newValue);

    function increase() public {

    value = value + 1;

    emit Increased(value);

    }

    }

    清单 2-3

    我们将在应用中使用的 Solidity 智能合约实现

    ```


    我们将在下一章深入探讨智能合约，但现在你可以开始识别合约中的重要部分：


    -   合约的状态 `value`，定义为 `256` 位的无符号整数，这是 `Solidity` 中的默认大小

    -   用于访问 `value` 的 getter 函数，由字段声明中使用 `public` 关键字生成

    -   `increase` 函数，用于通过交易递增 `value`

    -   `Increased` 事件，用于在 `value` 发生修改时发出信号


    你可以通过在其上运行 Solidity 编译器来测试合约是否正常：


    ```

    $ solc contracts/Counter.sol

    Compiler run successful, no output requested.

    ```


    我们需要指定编译输出的格式。我们特别关注合约公共接口的规范，即 `ABI`（`应用二进制接口`），这是我们的 `javascript` 应用与合约通信的方式。我们还需要二进制代码，以便在需要时可以将合约部署到网络。我们可以请求
    `Solidity` 编译器将这两个输出合并到一个我们可以使用的 `JSON` 文件中：


    ```

    solc --pretty-json --combined-json=abi,bin --overwrite \

    -o ./build/contracts contracts/Counter.sol

    ```


    ### 注


    从编译器输出此信息所需的标志可能因你使用的版本而异。上述代码适用于 `Solidity` `0.5.1`。


    上述命令将生成一个包含所有编译输出的文件 `build/contracts/combined.json`。请查看它，我们很快将用它来与我们的合约交互。

    '
- fmt: '### Connecting to the Network Via Web3


    As mentioned before, we will be using `web3.js` to connect to the Ethereum network.
    This requires a web3 *provider*, which is a small object that knows which node
    to connect to in order to place calls to smart contracts and send transactions
    to the network. In other words, as its name implies, the provider *provides* a
    connection to an Ethereum node and, from it, to the entire network.


    Depending on the library you are working with, the provider is sometimes conflated
    with the *signer.* The signer is another component that has the responsibility
    of signing transactions with the user’s keys, in the case that the keys are not
    managed by a local node. This is the case for most Dapps, since your average user
    will not have a node running, but depend on a public one. Because of this, the
    web3 provider injected by MetaMask acts both as a provider and as a signer. We
    will review these differences in depth later in the book.


    The web3 provider injected by MetaMask can be conveniently accessed from code
    via `Web3.givenProvider`. You can check this property to know if MetaMask is enabled
    in your users’ browser, and to create a new web3 object if available. We can keep
    this logic in a `network.js` file in our application (Listing [2-4](#476252_1_En_2_Chapter.xhtml#PC10)).


    ```

    // src/eth/network.js

    import Web3 from ''web3'';

    let web3;

    export function getWeb3() {

    if (!web3) {

    web3 = new Web3(Web3.givenProvider);

    }

    return web3;

    }

    Listing 2-4

    Snippet for creating a web3 object using the MetaMask provider. Note that this
    code will not work if the user does not have MetaMask installed.

    ```


    The web3 object created has a large number of methods available, most of them
    under the `web3.eth` namespace. For instance, we can query the list of the user’s
    accounts (Listing [2-5](#476252_1_En_2_Chapter.xhtml#PC11)) and retrieve the default
    one in use – which is the first one from the list.


    ```

    // src/eth/network.js

    export async function getAccount() {

    const web3 = getWeb3();

    const accounts = await web3.eth.getAccounts();

    return accounts[0];

    }

    Listing 2-5

    Function for retrieving the user’s current default account

    ```


    However, this method will not work for browsers that run in *privacy mode*. Privacy
    mode restricts accessing to user accounts until the user approves the application
    to retrieve the accounts held in MetaMask. To unlock this, we must work with a
    global `ethereum` object and enable it (Listing [2-6](#476252_1_En_2_Chapter.xhtml#PC12)).


    ```

    export async function getAccount() {

    const accounts = await window.ethereum.enable();

    return accounts[0];

    }

    Listing 2-6

    Function updated to handle Ethereum browsers’ privacy mode

    ```


    The async call to `ethereum.enable` will return once the user has granted their
    approval on MetaMask. Note that MetaMask will remember the user’s approval, so
    they are prompted to answer only the first time (Figure [2-1](#476252_1_En_2_Chapter.xhtml#Fig1)).


    ![../images/476252_1_En_2_Chapter/476252_1_En_2_Fig1_HTML.jpg](images/476252_1_En_2_Chapter/476252_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Users must accept the Dapp’s connection request in MetaMask


    Now that we have a `web3` object set up, as well as access to the user’s accounts,
    we will use them to build our interface to the `Counter` smart contract deployed
    on the Ethereum network.


    ### The Contract Interface


    In order to interact with our contract from the application, we need three things:


    *   A connection to the Ethereum network where our contract is deployed

    *   The address of the contract in the network

    *   The specification of the contract’s public functions, also known as the ABI
    (Application Binary Interface)


    The first item is covered in the previous section, and is encapsulated by the
    `web3` object we provisioned. As for the second item, we will use an already deployed
    instance in the Rinkeby network at the following address:


    ```

    0x1D2561D18dD2fc204CcC8831026d28375065ed53

    ```


    Remember that everything in the blockchain is public and indeleble, so once a
    contract is deployed, it becomes publicly available for all users to interact
    with and cannot be deleted. This means we can freely use this instance for testing
    the DApp.


    ### Note


    If you do not want to work with that particular contract instance or prefer to
    work on a different network, there is a deploy script on the code repository that
    you can use to set up your own instance.


    As for the ABI, we will make use of the output generated by the compiler previously.
    Copy the output json file into an `Artifacts.json` file in a new `contracts` folder
    in your application `src`. We can now parse it to obtain the ABI, and create a
    new web3 contract instance (Listing [2-7](#476252_1_En_2_Chapter.xhtml#PC14)).


    ```

    // src/contracts/Counter.js

    import Artifacts from ''./Artifacts.json'';

    export default function Counter(web3, address, options = {}) {

    const name = "contracts/Counter.sol:Counter";

    const artifact = Artifacts.contracts[name];

    const abi = JSON.parse(artifact.abi);

    return new web3.eth.Contract(abi, address, options);

    }

    Listing 2-7

    Function to create a Counter web3 contract object. Note that the function does
    not deploy a new contract, it just creates a javascript object that acts as a
    wrapper to a contract previously deployed at a specified address

    ```


    The web3 Contract abstraction is an object that acts as a facade for the actual
    Ethereum contract. It exposes javascript methods for all its public functions,
    which get translated into calls and transactions to the network under the hood.
    We will be using it in the following section to actually interact with the contract.


    Now that we have our factory-like function that can create new `Counter` contract
    abstractions given an address, we will use it to retrieve the deployed contract
    (Listing [2-8](#476252_1_En_2_Chapter.xhtml#PC15)).


    ```

    // src/contracts/Counter.js

    import { getWeb3, getAccount } from ''../eth/network.js'';

    export async function getDeployed() {

    const web3 = getWeb3();

    const from = await getAccount();

    const addr = "0x1D2561D18dD2fc204CcC8831026d28375065ed53";

    return Counter(web3, addr, { from });

    }

    Listing 2-8

    Code for obtaining a web3 contract instance of the Counter contract deployed on
    the Rinkeby network. Note that, to avoid hard-coding the address, you can also
    store the address as an environment variable, and retrieve it from process.env37

    ```


    Now that we have the means to interact with the deployed contract, we can build
    the React visual component for our user interface.


    ## Interacting with Our Smart Contract


    We will now progressively build our `Counter` visual component to allow the users
    of our DApp to interact with it. We will begin by retrieving the current value
    of the counter, then provide a means to send a transaction to modify its state,
    and then subscribe to real-time updates to it.'
