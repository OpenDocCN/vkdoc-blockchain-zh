- fmt: "### Sending a Transaction\n\nLet’s start by writing a function to send a transaction\
    \ to call the `increase` function on the `Counter` contract.\n\n```\nincreaseCounter()\
    \ {\nconst counter = this.props.contract;\nreturn counter.methods.increase().send();\n\
    }\n```\n\nAfter the previous section, the call to send the transaction should\
    \ be more familiar. Note that in this case we are using `send()` instead of `call()`.\
    \ This is because we need to actually send a transaction to affect the contract’s\
    \ state, instead of just querying data from the network.\n\nWe can now wire this\
    \ method to a button in our interface (Listing [2-13](#476252_1_En_2_Chapter.xhtml#PC21)),\
    \ and test it.\n\n```\nrender() {\nconst { value } = this.state;\nif (!value)\
    \ return \"Loading\";\nreturn (\n\nCounter value: { value.toString() }\n this.increaseCounter()}>\n\
    Increase counter\n\n);\n}\nListing 2-13\nUpdated render method to display a button\
    \ that increases the counter\n```\n\nIf you try this, you will be greeted with\
    \ Metamask’s dialog to confirm a transaction, which should look more or less like\
    \ Figure [2-2](#476252_1_En_2_Chapter.xhtml#Fig2).\n\n![../images/476252_1_En_2_Chapter/476252_1_En_2_Fig2_HTML.jpg](images/476252_1_En_2_Chapter/476252_1_En_2_Fig2_HTML.jpg)\n\
    \nFigure 2-2\n\nMetamask confirmation dialog to accept a transaction issued by\
    \ the application. Your users will be shown this dialog every time you try to\
    \ send a transaction on their behalf\n\nIf you refresh the page a few seconds\
    \ after confirming the transaction, you should see the new value of the counter.\
    \ However, to avoid requiring a page reload to update the value, we will query\
    \ the value again after the transaction is confirmed (Listing [2-14](#476252_1_En_2_Chapter.xhtml#PC22)).\n\
    \n```\nincreaseCounter() {\nconst counter = this.props.contract;\nreturn counter.methods.increase().send()\n\
    .on('receipt', async () => {\nconst value = await counter.methods.value().call();\n\
    this.setState({ value });\n});\n}\nListing 2-14\nQuery the counter’s value after\
    \ the transaction is mined\n```\n\nThe `send()` method returns an event emitter,\
    \ which allows us to listen for different events in the lifetime of a transaction.\
    \ For now, we are interested only on the event when the transaction is mined,\
    \ that is, included in a block in the chain. This event is referred to as `receipt`,\
    \ since it corresponds to when the transaction receipt object is available. If\
    \ we wanted, we could also check when the transaction was actually sent to a node,\
    \ or when it has reached a reasonable number of confirmations.\n\nNow, even if\
    \ the updated code does refresh the counter’s value, we need to let the user know\
    \ what is going on. The transaction’s confirmation takes several seconds, which\
    \ is definitely more than what a regular web 2.0 application usually takes.\n\n\
    We will track the transaction state (Listing [2-15](#476252_1_En_2_Chapter.xhtml#PC23))\
    \ to show a simple “Awaiting transaction” message to let the user know what is\
    \ going on, and disable the button in the meantime (Listing [2-16](#476252_1_En_2_Chapter.xhtml#PC24)).\
    \ We will also handle the case in which the transaction fails, so we don’t disable\
    \ the button permanently. Of course, in a real DApp, you may want to provide better\
    \ visual cues.\n\n```\nrender() {\nconst { value, increasing, error } = this.state;\n\
    if (!value) return \"Loading\";\nreturn (\n\nCounter value: { value.toString()\
    \ }\n this.increaseCounter()}>\nIncrease counter\n\n{ increasing && \"Awaiting\
    \ transaction\" }\n{ error && error.message }\n\n);\n}\nListing 2-16\nUpdated\
    \ render method to display a notification when a transaction is pending or has\
    \ failed, and disable the button until the transaction is finished\n```\n\n```\n\
    increaseCounter() {\nconst counter  = this.props.contract;\nthis.setState({ increasing:\
    \ true, error: null });\nreturn counter.methods.increase().send()\n.on('receipt',\
    \ async () => {\nconst value = await counter.methods.value().call();\nthis.setState({\
    \ value, increasing: false });\n})\n.on('error', (error) => {\nthis.setState({\
    \ error, increasing: false })\n});\n}\nListing 2-15\nUpdated increaseCounter function\
    \ to keep track of a flag to identify pending transactions and any error returned\n\
    ```\n\n### Note\n\nAs an alternative to waiting for the transaction to be mined,\
    \ we could also *optimistically update* the value. An optimistic update is a technique,\
    \ used in many asynchronous applications beyond DApps, that consists in assuming\
    \ that a transaction performed by the user will succeed and immediately updating\
    \ the value client-side. This way, the user perceives that the application reacts\
    \ almost instantly and can keep interacting with it and has immediate feedback\
    \ on the result of their actions.\n\nWhile this solution is good enough for a\
    \ single user interacting with a contract, it falls short when there are multiple\
    \ users involved. You can try this out by opening the web site from two different\
    \ browser windows: any changes made in one window will not affect the other, unless\
    \ the contract is queried again by reloading the page. To solve this issue, we\
    \ will rely on the last concept we introduced in the contract’s interface: events.\n\
    \n### Monitoring Updates Via Events\n\nA contract’s public interface is not just\
    \ composed of public functions. A contract may also emit custom *events* upon\
    \ certain transactions. Our `Counter` contract emits an event named `Increased`\
    \ every time the `increase` function is called, and includes the new value of\
    \ the counter as an argument.\n\nTo monitor all instances of this event, we will\
    \ subscribe to it when the component mounts and update the component state accordingly\
    \ (Listing [2-17](#476252_1_En_2_Chapter.xhtml#PC25)).\n\n```\nasync componentDidMount()\
    \ {\nconst counter = this.props.contract;\nconst initialValue = await counter.methods.value().call();\n\
    this.setState({ value: initialValue });\ncounter.events.Increased()\n.on('data',\
    \ (event) => {\nconst value = event.returnValues.newValue;\nthis.setState({ value\
    \ });\n});\n}\nListing 2-17\nSubscription to the Increased event, which updates\
    \ the component’s state whenever a new instance of the event is emitted\n```\n\
    \nNote that here we are referring to the `counter.events` property instead of\
    \ to the `counter.methods` like we did before. Here, the event emitter fires a\
    \ `data` event every time a new event is found, and includes the arguments of\
    \ the event.\n\nAlso, by updating the component’s state on every event, we no\
    \ longer need to query the contract state whenever a transaction is confirmed.\
    \ The receipt event handler on the `increaseCounter` function can be simplified\
    \ to the following.\n\n```\n.on('receipt', async () => {\nthis.setState({ increasing:\
    \ false });\n})\n```\n\nWith this new setup, you can now receive real-time updates\
    \ on a contract, regardless of where the state change originated from. Try again\
    \ opening two browser windows and increasing the counter from one of them, and\
    \ see how the change is reflected on both of them once the transaction is confirmed.\
    \ And if you are lucky, you may even stumble upon a change issued by another reader\
    \ of this book on the same contract instance.\n\n### Deploying the Application\n\
    \nAs you may have noticed, our sample application runs exclusively client-side.\
    \ All logic takes place on the browser, and the blockchain is used as a back end\
    \ to perform simple computations and persist a shared state among all users, acting\
    \ as a consensus layer on the state of the counter. This makes deployment straightforward,\
    \ since the DApp needs only to be hosted as a static site."
