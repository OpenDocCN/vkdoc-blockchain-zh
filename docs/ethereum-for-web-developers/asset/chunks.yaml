    Retrieving the initial value of the Counter when the component is mounted

    ```


    Note the call to the counter contract instance to retrieve the initial value.
    The web3js API for the call may seem awkward, but it has a rationale behind it:


    *   The `methods` property grants access to all the public methods defined in
    the contract’s ABI. They are not set at the contract instance itself, to prevent
    clashing with other methods specific to the web3 contract object.


    *   The `value()` call does not actually query the network, but simply builds
    a method call. If the function required any parameters, they would have to be
    supplied here.


    *   The `call()` invocation finally issues the query to the blockchain. We will
    review in the next chapter the difference between querying a method and issuing
    a transaction, but for now, all we need to know is that call() is used when we
    want to *retrieve* data from a contract.


    Once we have set the initial value in the component’s state, we can finally render
    it to our users (Listing [2-12](#476252_1_En_2_Chapter.xhtml#PC19)).


    ```

    render() {

    const { value } = this.state;

    if (!value) return "Loading";

    return (


    Counter value: { value.toString() }


    );

    }

    Listing 2-12

    Render method to display the counter’s value. Note that the value is only available
    after the initial query to the contract returns, so we need to handle the case
    where the value is not yet at our disposal

    ```


    By this point, you should be able to reload your application in your browser and
    see the value of the `Counter` instance on the Rinkeby network.


    ### Tip


    You can double-check the value displayed against the one reported by a blockchain
    explorer, such as Etherscan.^([^(41)](#fn41)) Etherscan is a blockchain explorer,
