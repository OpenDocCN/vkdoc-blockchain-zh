    \    balance1 = newBalance1;\n    balance2 = newBalance2;\n    lastNonce = nonce;\n\
    \    closeRequestedBy = msg.sender;\n    closeTime = now;\n}\n```\n*代码清单 8-15\
    \ 双向状态通道的关闭函数。任何参与者都可以调用，前提是他们提交了由另一方用户签名的消息，且消息包含的 nonce 比上次提交的（如果有）更新*\n\n现在我们需要添加一个实际关闭通道的函数，可以由最初未发起关闭的用户调用，或在挑战期结束后被调用（参见代码清单\
    \ 8-16）。\n\n```\nfunction confirmClose() public {\n    require(msg.sender == user1\
    \ || msg.sender == user2);\n    bool challengeEnded = closeTime != 0\n       \
    \ && closeTime + closePeriod > now;\n    require(closeRequestedBy != msg.sender\
    \ || challengeEnded);\n    user2.send(balance2);\n    selfdestruct(user1);\n}\n\
    ```\n*代码清单 8-16 实际关闭双向支付通道并执行支付*\n\n### 注意\n\n我们在`confirmClose`中使用`send`而不是`transfer`是为了防御攻击。如果`user2`是合约账户而非外部账户（EOA），它可以被编码为在每个传入的交易上回滚。这将使得`user1`永远无法关闭通道并取回初始保证金，因为向`user2`的`transfer`调用会失败并回滚整个交易。通过使用`send`，发送\
    \ ETH 可能会失败，但关闭操作允许成功。\n\n我们的实现还需要最后一个函数才能完整。如果其中一位用户从未签署任何消息，另一方需要能够请求关闭，将初始保证金返还给每个用户（参见代码清单\
    \ 8-17）。否则，最初创建通道的用户的资金可能会被永久锁定。\n\n```\nfunction close() public {\n    require(msg.sender\
    \ == user1 || msg.sender == user2);\n    require(closeTime == 0);\n    closeRequestedBy\
    \ = msg.sender;\n    closeTime = now;\n}\n```\n*代码清单 8-17 从初始状态启动通道关闭*\n\n请注意，在关闭后，任何用户仍然可以调用`closeWithState`，以防一方恶意尝试在初始状态关闭通道。\n\
    \n### 优化与扩展\n\n我们迄今为止审查的支付通道实现相对简单，但还有很大的改进空间：\n\n*   一种可能的优化是使用**单一合约**来管理所有通道。不为每个通道部署一个合约，而是每个通道实际上是存储在单个支付通道合约中的一个结构体。这大大降低了创建新通道的成本，但代价是增加了复杂性。此外，它将所有参与者的资金集中在一个合约中，为漏洞打开了大门，攻击者可能因此同时耗尽所有通道的资金。\n\
    \n*   通道也可以修改为可重复使用。在我们的实现中，我们要求关闭通道才能执行支付，但我们可以在执行支付后保持通道开放。这使得部分资金可以被提取用于其他应用，而无需销毁通道合约。\n\
    \n*   在双向通道的情况下，可以通过添加一条由双方签名的特殊消息来优化通道关闭，该消息表示在某个状态下达成一致并最终确定。这条消息可以由任何参与者上传，并且不需要第二笔交易来确认关闭，也无需经历挑战期。\n\
    \n*   通道的一个有趣扩展是增加参与者数量。虽然在我们所有的示例中，我们探讨的都是两个成员之间的点对点通道，但可以涉及更多用户。随着用户数量的增加，协调可能变得更加复杂，因为消息可能需要由通道中的多个参与者签名才能被视为有效。\n\
    \n### 状态通道\n\n支付通道可以被视为更通用的通道类别——**状态通道**——的一个特例。状态通道允许用户交换关于*任何状态*的消息，而不是让两方交换关于待支付余额状态的签名消息。\n\
    \n例如，一个简单的游戏可以通过状态通道进行。玩家可以签署关于游戏状态的消息，比如棋盘上棋子的位置。移动棋子是通过发送带有移动信息或棋盘新配置的签名消息来完成的。\n\
    \n状态通道通常涉及初始保证金和支付，就像支付通道一样。决定支付的条件由游戏定义，并可以通过智能合约在链上强制执行。\n"
- fmt: '#### Coding a Game into a State Channel


    Turn-based games are an excellent use case for a state channel, since they have
    some useful properties. For one, all of the game state can be safely exchanged
    between messages and processed on-chain if needed. Also, at any point in time,
    it is well-defined which player should play next, and there can be no disputes
    regarding who made a move first. Furthermore, the game’s state is all that is
    needed to resolve a challenge, as they do not depend on any external state.^([^(133)](#fn133))


    Let’s use the tic-tac-toe game as an example. The state can be defined as a 3x3
    matrix with three possible values per cell: circle, cross, or empty. The rules
    of the game are easy to encode, as well as the winning (or draw) conditions.


    Here, players will exchange messages with their moves, which can only be placing
    down one of their tokens. However, unlike in payment channels, each move (i.e.,
    each message) is *beneficial to the player who plays (signs) it* and not to the
    recipient. This poses a major shift in mechanics: a player is no longer incentivized
    to post the latest state submitted by their opponent, but the last move made *by
    themselves*. Let’s see an example:


    *   Alice plays X in the center, so she signs a message with only an X in the
    center and nonce 1, and sends it to Bob.

    *   Bob plays O in mid-right, signs with nonce 2, and sends it to Alice.

    *   Alice plays X in top-right, signs with nonce 3, and sends it to Bob.

    *   Bob plays O in mid-left, signs with nonce 4, and sends it to Alice.

    *   Alice wins playing X in bottom-left, signs it with nonce 5, and sends it to
    Bob.


    The board would then look like the following, with subscripts noting the turn
    when each move was done:


    |   |   | X[3] |

    |--- |--- |--- |

    | O[4] | X[1] | O[2] |

    | X[5] |   |   |


    After the last step, Bob should sign the message received by Alice and send it
    back to her, so she can upload it on-chain and claim her prize. However, if Bob
    was a sore loser, he could refuse to do so. In that case, Alice must be able to
    just upload the last state signed by Bob (4) on-chain, along with her winning
    move, and have the state channel verify that she has won. Note that this requires
    that **the state channel must be able to verify that her move is indeed a valid
    and winning move**.


    Bob could also simply stall the game. For instance, when he receives message 3
    from Alice, as he notices that he is going to lose the game, he could choose to
    stop playing. In this scenario, Alice must be able to go on-chain with the last
    state signed by Bob (2), along with her following move (3), and *challenge* Bob
    to move. If he does not respond on-chain within an allotted time, then the state
    channel should declare Alice winner. Here, we are using challenge periods not
    just for closures but also for enforcing moves.


    As we said, the state channel must be able to *verify* that a move is valid on-chain.
    Let’s see a scenario where this need becomes clear: instead of stalling as he
    receives winning message 5 from Alice, Bob decides to ignore that message. He
    then challenges her to move on-chain with a spurious state. He takes Alice’s previous
    signed state (3) and submits a new state to the contract with the following invalid
    board:


    | X[3] |   |   |

    |--- |--- |--- |

    |   | X[1] | O[2] |

    |   |   | O[4] |


    If the state channel contract were not able to verify that his move is invalid
    (he changed the location of X[3]), then Alice would be forced to respond on-chain
    with a move on top of this invalid board.


    ### Note


    An alternative to having the state channel contract validate every transition
    is to have it accept all transitions by default, but accept proofs that a certain
    move was invalid. In some cases, verifying a proof that a transition is invalid
    can be much easier than verifying the transition itself. Chess is a good example:
    verifying checkmate can be prohibitively expensive in terms of gas usage. A way
    around this is allowing any player to claim checkmate and have the opponent prove
    that it is not the case by submitting any valid move.^([^(134)](#fn134)) This
    pattern is simply another form of challenge-response and follows the motto “*verify,
    don’t compute*” of smart contracts.


    State channels are then inherently more complex than regular payment channels,
    since they require the logic of the game being played to verify state transitions.


    ### Note


    Most of the optimizations described for payment channels also apply to state channels.
    For instance, it could be possible to run multiple instances of a game between
    two participants over a state channel, without requiring to close and open a new
    channel every time a rematch is desired. Also, a state channel could be set up
    so its deposits are ERC20 or even non-fungible ERC721 tokens - imagine a representing
    a trophy as a digital collectible!'
