    function），资金给第三方（funds to third party），身份合约（identity contracts），多签钱包（multi-signature
    wallet），`setGreeter`方法，用户账户（user accounts），`DELEGATECALL`指令，委托代理（delegating proxies），身份合约（identity
    contract），`UpgradeableIdentity`合约，升级功能（upgrade feature），用户的身份（user’s identity）。智能账户部署（Smart
    accounts deployment），`CREATE`指令，`CREATE2`指令，身份合约工厂（identity contract factory），中继者奖励（relayer
    reward），`view`函数。智能合约交互（Smart contract interaction），`componentDidMount`，`React`事件，合约实例（contract
    instance），部署事件（deployment events），监控更新（monitor updates），文件`components/Counter.js`，查询（query），合约状态（contract’s
    state），交易（transaction），`Metamask`，查询（query），值（value），`render`方法，`send()`，跟踪状态（track
    state）。智能合约（Smart contracts），参与者模型（actor model），地址类型（address types），调用（calls），区块（blocks），日志（logs），节点（node），定义
    *vs.* 外部账户（external accounts），`gas`用量（gas usage），属性（properties），伪代码（pseudocode），交易（transaction），区块链（blockchain），广播（broadcasted），缺点（drawbacks），生命周期（lifecycle），日志（logs），挖矿（mined），nonce，属性（properties），重组（reorganization），`Solidity`代码，`ABI`，自动编译（auto-compile），自定义修饰符（custom
    modifiers），数据类型（data types），参见数据类型定义（SeeData types definition），部署合约（deploy contract），`EIP`，发出事件（emitting
    events），`ERC`，`ERC20`代币，参见`ERC20`代币，`ERC721`代币，参见`ERC721`代币/`NFT`，回退函数（fallback
    function），函数结构（function structure），导入语句（import statement），继承（inheritance），库（libraries），`myNumber`，`payability`修饰符，`payable`
