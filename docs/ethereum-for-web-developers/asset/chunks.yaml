- fmt: '### Note


    当通过 Metamask 运行`getGasPrice`时，一个子提供者会拦截该调用，并手动将 gas 价格计算为最近 N 个区块的中位数。然而，此方法仅考虑已挖掘交易中的数据，忽略了等待被包含进区块链的内存池中待处理交易的任何信息。


    作为替代方案，有一些中心化服务基于更复杂的计算，为以太坊主网提供实时 gas 估算（列表 [5-15](#476252_1_En_5_Chapter.xhtml#PC32)）。这些服务通常能返回更好的结果，但代价是为你的应用程序引入了中心化依赖。此类服务由
    Etherchain 或 EthGasStation 等提供，并为低、标准、快或最快交易处理提供 gas 价格。


    ```sh

    $ npm install axios@0.18.0

    $ node --experimental-repl-await

    // Setup web3 provider and contract

    > Web3 = require(''web3'')

    > GreeterJSON = require(''./artifacts/Greeter.json'')

    > let web3 = new Web3(''http://localhost:8545'')

    > let abi = GreeterJSON.compilerOutput.abi

    > let greeter = new web3.eth.Contract(abi, ADDRESS)

    // Retrieve gas price and send transaction

    > axios = require(''axios'')

    > let URL = ''https://www.etherchain.org/api/gasPriceOracle''

    > let { data: gasData } = await axios.get(URL)

    > let gasPrice = gasData.fast * 1e9

    > await greeter.methods.setGreeting(''Hello!'')

    .send({ from, value, gas, gasPrice })

    ```


    列表 5-15 从 Etherchain API 检索 gas 价格并在交易中使用。此代码片段使用`axios`包执行标准 HTTP GET 请求到该 API。


    ### 交易的生命周期


    现在我们已经知道如何配置交易的主要组成部分，是时候回顾一下交易发送后会发生什么，以及我们如何与之交互。


    #### 交易被发送


    当交易被发送到节点时，节点会执行一些基本检查，以确保交易有效且可以广播。例如，节点会检查发送者账户是否有足够资金，以及 gas 限额和价格值是否合理。


    如果交易被节点接受，它会返回一个交易哈希。此交易哈希充当区块链上交易的全局唯一标识符，并可用于稍后检索交易信息。


    ```javascript

    > let txHash = null

    > greeter.methods.setGreeting(''Hello!'')

    .send({ from, value })

    .on(''transactionHash'', (hash) => txHash = hash)

    ```


    ### 注意


    如果需要，客户端可以在离线状态下计算出交易哈希，只要该客户端拥有发送者的私钥，因为它完全依赖于交易的参数和签名。


    在返回交易哈希时，可以从任何已*看到*此交易的节点检索交易信息（列表 [5-16](#476252_1_En_5_Chapter.xhtml#PC34)），无论该交易是否已被挖掘。这些信息包括发送者、接收者、gas
    限额、价格、nonce、输入数据以及在发送交易时可能指定的所有内容。


    ```javascript

    > await web3.eth.getTransaction(txHash)

    { blockHash: ''0x0000...0'',

    blockNumber: null,

    from: ''0x...'',

    gas: 90000,

    gasPrice: ''1000000000'',

    hash: ''...'',

    input: ''0xa41368620...'',

    nonce: 470,

    to: ''0x...'',

    transactionIndex: 0,

    value: ''1000''

    }

    ```


    列表 5-16 交易发送后立即返回的交易信息。注意所有与区块相关的信息都是空的，因为交易尚未被挖掘。


    此时，交易尚未被挖掘，被称为处于*待处理*状态。任何尝试检索交易收据的操作都将简单地返回`null`。


    #### 交易被挖掘


    一段时间后，根据使用的 gas 价格和网络负载，交易应该会被挖掘。注意，无论交易成功与否，它都会被挖掘：回退的交易也会被包含在区块链中，并消耗其发送者的 gas
    费用。


    一旦交易被挖掘，其`getTransaction`信息将包含它被包含的区块编号和哈希，以及它在区块中的索引。同时，此时交易收据变为可用。


    ```javascript

    > await web3.eth.getTransactionReceipt(txHash)

    { transactionHash: ''0x...'',

    transactionIndex: 0,

    blockHash: ''0x...'',

    blockNumber: 29,

    gasUsed: 23235,

    cumulativeGasUsed: 23235,

    logs: [ ... ],

    status: true}

    ```


    收据包含交易在挖掘时执行生成的信息，例如实际使用的 gas、交易是否成功（如果交易没有回退，则状态标志为`true`）以及它发出的事件日志。


    ### 注意


    如果你通过`getTransactionReceipt`调用检查交易收据中的日志，你将只能获取事件的原始数据。这是因为客户端库没有足够的上下文来理解如何*解码*日志。它需要一个
    ABI 来指示事件名称和参数类型。


    我们可以通过检查新区块（通过轮询或订阅`newBlockHeaders`）并在看到新挖掘的区块时尝试检索交易收据（列表 [5-17](#476252_1_En_5_Chapter.xhtml#PC36)）来等待交易被挖掘。如果交易在新区块中成功挖掘，那么其收据将可用。


    ```javascript

    // Sends a transaction to the network and returns its hash

    function sendTransactionReturnHash(opts) {

    return new Promise((resolve, reject) => {

    web3.eth.sendTransaction(opts)

    .on(''transactionHash'', hash => resolve(hash))

    .on(''error'', err => reject(err));

    })

    }

    // Sends a transaction and awaits for it to be mined

    function sendTransactionAwaitReceipt(opts) {

    const BLOCKS = ''newBlockHeaders'';

    return new Promise((resolve, reject) => {

    sendTransactionReturnHash(opts).then(hash => {

    const sub = web3.eth.subscribe(BLOCKS, (err) => {

    if (err) reject(err);

    // Check for the receipt on every new block

    // If available, it means the tx was mined

    web3.eth.getTransactionReceipt(hash).then(receipt => {

    if (receipt) {

    sub.unsubscribe();

    resolve(receipt);

    }

    });

    });

    }).catch(reject);

    });

    }

    ```


    列表 5-17 订阅新区块头部以检查交易何时被成功挖掘。请注意，如果你有多个正在进行的交易，可能值得在所有交易之间共享一个`newBlockHeaders`订阅。


    如果使用 web3，也可以通过简单地等待`sendTransaction`方法（对于发送普通交易和触发合约函数上的交易都适用）来获取交易收据。这也提供了对事件的简便访问，这些事件基于发起交易的合约对象的
    ABI 进行了解码。


    ```javascript

    > let receipt = await greeter.methods.setGreeting(''Hey!'')

    .send({ from, value: 10000 })

    > let { events } = receipt

    > let { greeting, balance } = events.GreetingSet.returnValues

    > greeting

    ''Hey!''

    > balance

    ''30000''

    ```


    能够处理交易事件特别重要，因为*无法检索在交易中调用的函数的返回值*。如果你回顾合约代码，会看到我们的函数实际上返回了问候字符串和合约余额。然而，根据设计，这些值不是交易收据的一部分，并且无法从客户端获得。'
  raw: '### Note


    When running `getGasPrice` via Metamask, a subprovider intercepts the call and
    manually calculates the gas price as the median of the last N blocks.


    However, this method only considers data from transactions already mined, disregarding
    any information from pending transactions on the mempool awaiting to be included
    in the blockchain.


    As an alternative, there are centralized services that provide real-time gas estimates
    for the Ethereum main network (Listing [5-15](#476252_1_En_5_Chapter.xhtml#PC32)),
    based on more complex calculations. These services often return better results,
    but at the cost of introducing a centralized dependency on your application. Such
    services are offered by Etherchain or EthGasStation, among others, and provide
    gas prices for low, standard, fast, or fastest transaction processing.


    ```

    $ npm install axios@0.18.0

    $ node --experimental-repl-await

    // Setup web3 provider and contract

    > Web3 = require(''web3'')

    > GreeterJSON = require(''./artifacts/Greeter.json'')

    > let web3 = new Web3(''http://localhost:8545'')

    > let abi = GreeterJSON.compilerOutput.abi

    > let greeter = new web3.eth.Contract(abi, ADDRESS)

    // Retrieve gas price and send transaction

    > axios = require(''axios'')

    > let URL = ''https://www.etherchain.org/api/gasPriceOracle''

    > let { data: gasData } = await axios.get(URL)

    > let gasPrice = gasData.fast * 1e9

    > await greeter.methods.setGreeting(''Hello!'')

    .send({ from, value, gas, gasPrice })

    Listing 5-15

    Retrieving gas price from the Etherchain API and using it in a transaction. This
    snippet uses the axios package for performing a standard HTTP GET request to the
    API

    ```


    ### Lifecycle of a Transaction


    Now that we know how to configure the main components of a transaction, it is
    time to review what happens once a transaction is sent and how do we interact
    with it.


    #### A Transaction is Sent


    When a transaction is sent to a node, the node performs some basic checks to make
    sure the transaction is valid and can be broadcasted. For instance, the node checks
    that the sender account has enough funds, and that the gas allowance and price
    values are reasonable.


    If the transaction is accepted by the node, it returns a hash of the transaction.
    This transaction hash acts as a globally unique identifier of the transaction
    on the blockchain, and can be used to retrieve information on the transaction
    later.


    ```

    > let txHash = null

    > greeter.methods.setGreeting(''Hello!'')

    .send({ from, value })

    .on(''transactionHash'', (hash) => txHash = hash)

    ```


    ### Note


    If needed, the transaction hash can be calculated offline by a client, as long
    as the client has the sender’s private key, since it depends exclusively on its
    parameters and signature.


    By the time the transaction hash is returned, the transaction info can be retrieved
    from any node that has *seen* this transaction (Listing [5-16](#476252_1_En_5_Chapter.xhtml#PC34)),
    regardless of the transaction having been mined or not. This info includes the
    sender, recipient, gas allowance, price, nonce, input data, and everything that
    you may have specified when sending the transaction.


    ```

    > await web3.eth.getTransaction(txHash)

    { blockHash: ''0x0000...0'',

    blockNumber: null,

    from: ''0x...'',

    gas: 90000,

    gasPrice: ''1000000000'',

    hash: ''...'',

    input: ''0xa41368620...'',

    nonce: 470,

    to: ''0x...'',

    transactionIndex: 0,

    value: ''1000''

    }

    Listing 5-16

    Transaction information returned right after the transaction is sent. Note that
    all block-related information is empty, since the transaction has not been mined
    yet

    ```


    At this point, the transaction has not yet been mined and is said to be in *pending*
    state. Any attempts to retrieve the transaction receipt will simply return `null`
    .


    #### A Transaction is Mined


    After a while, depending on the gas price used and the network load, the transaction
    should be mined. Note that a transaction gets mined regardless of it being successful
    or not: reverted transactions are also included in the blockchain and consume
    a gas fee from their sender.


    Once the transaction is mined, its `getTransaction` information will include the
    block number and hash in which it was included, plus its index in the block. Also,
    at this point, the transaction receipt becomes available.


    ```

    > await web3.eth.getTransactionReceipt(txHash)

    { transactionHash: ''0x...'',

    transactionIndex: 0,

    blockHash: ''0x...'',

    blockNumber: 29,

    gasUsed: 23235,

    cumulativeGasUsed: 23235,

    logs: [ ... ],

    status: true}

    ```


    The receipt includes information generated when the transaction was executed during
    mining, such as the gas actually used, whether it succeeded (the status flag is
    `true` if the transaction did not revert), and the logs it emitted.


    ### Note


    If you inspect the logs in a transaction receipt obtained via a `getTransactionReceipt`
    call, you will only be able to fetch the raw data of an event. This is because
    the client library does not have enough context to understand how to *decode*
    the logs. It requires an ABI to indicate what are the event names and argument
    types.


    We can await for a transaction to be mined by checking for new blocks (either
    via polling or subscribing to `newBlockHeaders`) and attempting to retrieve the
    transaction receipt whenever a new mined block is seen (Listing [5-17](#476252_1_En_5_Chapter.xhtml#PC36)).
    If the transaction was successfully mined in the new block, then its receipt will
    be available.


    ```

    // Sends a transaction to the network and returns its hash

    function sendTransactionReturnHash(opts) {

    return new Promise((resolve, reject) => {

    web3.eth.sendTransaction(opts)

    .on(''transactionHash'', hash => resolve(hash))

    .on(''error'', err => reject(err));

    })

    }

    // Sends a transaction and awaits for it to be mined

    function sendTransactionAwaitReceipt(opts) {

    const BLOCKS = ''newBlockHeaders'';

    return new Promise((resolve, reject) => {

    sendTransactionReturnHash(opts).then(hash => {

    const sub = web3.eth.subscribe(BLOCKS, (err) => {

    if (err) reject(err);

    // Check for the receipt on every new block

    // If available, it means the tx was mined

    web3.eth.getTransactionReceipt(hash).then(receipt => {

    if (receipt) {

    sub.unsubscribe();

    resolve(receipt);

    }

    });

    });

    }).catch(reject);

    });

    }

