    # 1. Blockchains


    We will begin our journey with a brief introduction to Ethereum and blockchain
    technology in general, starting with Bitcoin. We will explain what makes a blockchain
    and when it makes sense to use one. We will also cover some cryptography basics
    before we start and later provide an overview of decentralized application development
    before we implement our first one in Chapter [2](#476252_1_En_2_Chapter.xhtml).'
  raw: "## A walkthrough of the chapters\n\nThe first chapter will be the only one\
    \ free of code. It will introduce what a blockchain is, with a bit on history\
    \ going from Bitcoin to Ethereum, plus the fundamental concepts of accounts, transactions,\
    \ and blocks, along with the basic bits of cryptography that will be needed throughout\
    \ the book. It will also briefly cover blockchain use cases, and introduce the\
    \ concept of decentralized applications.\n\nChapter two is fully hands-on. It\
    \ compensates for the lack of code on the previous one by going heads-on to develop\
    \ a complete decentralized application from scratch. Many concepts will be quickly\
    \ glossed over, but this chapter should help you understand in a practical way\
    \ how all the components fit together, so you have a clear idea of their role\
    \ when they are explored in depth later.\n\nChapter three is the only one unrelated\
    \ to web development. It provides a crash-course on smart contracts, a key construct\
    \ in Ethereum. Having a good understanding of smart contracts and knowing what\
    \ they can and cannot do will help you design the architecture of your applications.\
    \ Most of the chapter builds on Solidity, the most popular high-level language\
    \ for writing contracts.\n\nChapters four and five go back to web development,\
    \ going in-depth with very basic tasks: reading and writing data from the blockchain.\
    \ Gathering blockchain data is not like sending a SQL query to your average relational\
    \ database, and sending a transaction requires managing concepts like gas and\
    \ signatures. In blockchain development, long confirmation times and reorganizations\
    \ may dwarf the challenges you know from NoSQL databases’ eventual consistency.\
    \ These two chapters will present those issues, and several techniques for dealing\
    \ with them.\n\nChapter six will challenge decentralization itself. Up to this\
    \ point, all samples were built as a static single-page application using the\
    \ blockchain as its only back end. This chapter will introduce centralized components\
    \ to the architecture of a decentralized application, such as indexing and storage\
    \ solutions.\n\nFinally, chapters seven and eight deal with two of the most pressing\
    \ challenges in Ethereum development as of today: user onboarding and scalability.\
    \ Getting started in the Ethereum space for a non-technical user can be challenging,\
    \ as they get bombarded with concepts like private keys or mnemonics, in an unforgiving\
    \ space where they could lose all their funds if they make a mistake. Furthermore,\
    \ having a platform with a global throughput of a dozen transactions per second\
    \ severely limits the applications it can run – think of a cloud provider that\
    \ offers no more than twelve database writes per second shared across all its\
    \ clients. These two chapters explore these problems in depth, and include a survey\
    \ of the current solutions available. These are also the two scenarios most rapidly\
    \ changing, but the chapters will give you the basics to help you navigate this\
    \ space, so you can then build an outstanding Ethereum application.\n\n## The\
    \ mandatory disclaimer\n\nSecurity in software development is hard. Security in\
    \ blockchain development is even harder. Smart contract applications potentially\
    \ manage large amounts of funds, and are like sitting ducks to attackers in a\
    \ public executable environment.\n\n> *I want you to write a program that has\
    \ to run in a concurrent environment under Byzantine circumstances where any adversary\
    \ can invoke your program with any arguments of their choosing. The environment\
    \ in which your program executes (and hence any direct or indirect environmental\
    \ dependencies) is also under adversary control. If you make a single exploitable\
    \ mistake or oversight in the implementation, or even in the logical design of\
    \ the program, then either you personally or perhaps the users of your program\
    \ could lose a substantial amount of money. Where your program will run, there\
    \ is no legal recourse if things go wrong. Oh, and once you release the first\
    \ version of your program, you can never change it. It has be right first time.*\n\
    > \n> —Adrian Colyer, “Zeus: Analyzing safety of smart contracts” ^([^(10)](#fn10))\n\
    \nEven though all code samples in this book have been reviewed, they have not\
    \ been formally audited. And even if they were, there could still be an overseen\
    \ security bug. The goal of the code in this book is to teach you, not to be copy-pasted\
    \ into your application – we already have StackOverflow for that. Neither the\
    \ author nor the publisher of this book can offer any warranties on the security\
    \ of the code you will find here.\n\nBottom line is that you should not blindly\
    \ trust any code snippet from this book – or from any other source, for that matter.\
    \ Always make sure you have a good understanding of what you are doing, and have\
    \ your code reviewed and audited by third parties before going to production in\
    \ the Ethereum network.\n\n> *THE SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY\
    \ OF ANY KIND, EXPRESS OR IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES\
    \ OF MERCHANTABILITY, FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN\
    \ NO EVENT SHALL THE AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES\
    \ OR OTHER LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING\
    \ FROM, OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS\
    \ IN THE SOFTWARE.*\n\nWithout further ado, let’s get started.\n\nAcknowledgments\n\
    \nI want to thank, first and foremost, the awesome team at OpenZeppelin. OpenZeppelin\
    \ was my first contact with the mind-blowing world of Ethereum, and where I learned\
    \ everything that you will read throughout this book.\n\nI also want to thank\
