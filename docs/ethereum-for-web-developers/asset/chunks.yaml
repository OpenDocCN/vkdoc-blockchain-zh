  trans: '

    #### 将游戏编码为状态通道


    回合制游戏是状态通道的绝佳用例，因为它们具备一些有用的特性。首先，所有游戏状态都可以在消息之间安全地交换，并在必要时上链处理。其次，在任何时间点，都能明确定义下一步该由哪位玩家行动，且不会因谁先行动而产生争议。此外，解决争议只需要游戏状态本身，因为它们不依赖任何外部状态。^(¹³³)


    让我们以井字棋游戏为例。游戏状态可定义为一个 3x3 矩阵，每个单元格有三种可能的值：圆圈、叉号或空。游戏的规则以及获胜（或平局）条件都很容易编码。


    在这里，玩家通过交换消息来传递自己的落子，每次落子只能放置一个自己的棋子。然而，与支付通道不同，每次落子（即每条消息）对*发出（签名）该消息的玩家有利*，而不是对接收方有利。这带来了机制上的重大转变：玩家不再有动力提交对手发出的最新状态，而是提交*自己*做出的最后一步行动。让我们看一个例子：


    *   爱丽丝在中间下 X，因此她签名了一条只有中心位置是 X 且随机数为 1 的消息，并将其发送给鲍勃。

    *   鲍勃在右中位置下 O，签名随机数 2，发送给爱丽丝。

    *   爱丽丝在右上位置下 X，签名随机数 3，发送给鲍勃。

    *   鲍勃在左中位置下 O，签名随机数 4，发送给爱丽丝。

    *   爱丽丝在左下位置下 X 获胜，签名随机数 5，发送给鲍勃。


    此时棋盘将如下所示，下标数字表示每次落子的轮次：


    |   |   | X[3] |

    |---|---|---|

    | O[4] | X[1] | O[2] |

    | X[5] |   |   |


    最后一步之后，鲍勃应该签名爱丽丝发送的消息并将其发回给她，这样她就可以上链并领取奖励。然而，如果鲍勃输不起，他可能会拒绝这样做。在这种情况下，爱丽丝必须能够将她从鲍勃那里收到的最后签名状态（4）连同她的获胜落子一起上链，并让状态通道验证她确实获胜了。请注意，这要求**状态通道必须能够验证她的落子确实是有效且获胜的落子**。


    鲍勃也可能简单地拖延游戏。例如，当他收到爱丽丝的消息 3 时，他注意到自己快要输了，于是选择停止游戏。在这种情况下，爱丽丝必须能够将鲍勃签名的最后状态（2）以及她后续的落子（3）一起上链，并*挑战*鲍勃，让他行动。如果他在规定时间内没有在链上响应，那么状态通道应宣布爱丽丝获胜。这里，我们使用挑战期不仅是为了关闭通道，也是为了强制执行落子。


    正如我们所说，状态通道必须能够在链上*验证*落子是否有效。让我们看一个场景，这种需求变得显而易见：鲍勃没有在收到爱丽丝的获胜消息 5 时拖延，而是决定忽略该消息。然后他用一个虚假的状态在链上挑战她行动。他拿着爱丽丝之前签名的状态（3），向合约提交了一个新状态，其棋盘无效如下：


    | X[3] |   |   |

    |---|---|---|

    |   | X[1] | O[2] |

    |   |   | O[4] |


    如果状态通道合约无法验证他的行动无效（他改变了 X[3] 的位置），那么爱丽丝将被迫在链上基于这个无效棋盘做出回应。


    ### 备注


    另一种方案是让状态通道合约默认接受所有状态转换，但接受某个行动无效的证明。在某些情况下，验证一个转换无效的证明可能比验证转换本身要容易得多。国际象棋就是一个很好的例子：验证“将死”的燃料费用可能高得令人望而却步。一种解决方法是允许任何玩家声称“将死”，而让对手通过提交任何有效行动来证明并非如此。^(¹³⁴)
    这种模式只是另一种形式的挑战-响应，并遵循智能合约的“*验证，而非计算*”原则。


    因此，状态通道本质上比普通的支付通道更复杂，因为它们需要包含所玩游戏本身的逻辑来验证状态转换。


    ### 备注


    为支付通道描述的大多数优化也适用于状态通道。例如，两个参与者可以在一个状态通道上运行多个游戏实例，而不必在每次想要重赛时都要关闭和打开新的通道。此外，状态通道可以设置为接受
    ERC20 代币甚至非同质化的 ERC721 代币作为押金——想象一下将一个奖杯表示为数字收藏品！

    '
- fmt: "# Generalized State Channels\n\nAs we have seen, a state channel for a given\
    \ game has two main responsibilities: managing the channel itself and validating\
    \ the game’s transitions. This makes implementations more convoluted, as the logic\
    \ for both responsibilities is intertwined. It also makes state channel contracts\
    \ more expensive, as they need to include the logic on both the channel and the\
    \ game.\n\nThis has led to the development of *generalized state channels* frameworks.\
    \ Generalized state channels are channels that manage the users’ deposits and\
    \ allow new games or applications to be progressively *installed* on the channel.\
    \ This effectively decouples the state channel logic from the application logic.\n\
    \n> *Generalized state channels move all of the on-chain stateful components for\
    \ blockchain applications off-chain. Rather than require each application developer\
    \ to build an entire state channel architecture from scratch, a generalized state\
    \ channel generalized framework is one where state is deposited once and then\
    \ be used by any application or set of applications afterwards.*\n> \n> —Jeff\
    \ Coleman, Liam Horne, and Li Xuanji, “Counterfactual: Generalized State Channels”^([(135)](#fn135))\n\
    \nThis opens the door to a new level of channel reuse. Users can now play multiple\
    \ instances of a game and even play multiple different games over the same channel,\
    \ thus creating several subchannels within a single channel. Furthermore, we can\
    \ build dependencies between these subchannels, such as triggering a payment channel\
    \ only upon the resolution of a set of game subchannels.\n\nGeneralized state\
    \ channel solutions are heavily under development by different teams, though there\
    \ is work toward a common standard to provide some degree of interoperability\
    \ among them. Several of these implementations, such as the one from the Counterfactual\
    \ team, rely on the concept of *counterfactual* actions. Here, the term *counterfactual*\
    \ is used to refer to an action that any participant in the channel could take\
    \ on-chain but it is actually not and causes participants to act as if it had\
    \ actually happened.^([(136)](#fn136)) Let’s see what this means.\n\nIn our tic-tac-toe\
    \ state channel, we could say that Alice has *counterfactually* won if there is\
    \ a state signed by both Alice and Bob with her winning the game. Both players\
    \ know that any of them can submit the winning state to the smart contract on-chain\
    \ to trigger the payouts at any time. However, they can also decide to keep playing\
    \ a second match, knowing that Alice has already won the first and that it can\
    \ be taken on-chain whenever needed. In other words, players are dealing with\
    \ counterfactual state.\n\nApplications in a generalized state channel can be\
    \ *counterfactually installed*: if all participants play nicely and a dispute\
    \ never arises, then the application contract never needs to be actually created,\
    \ and the entire game can be resolved off-chain. This is also known as *counterfactual\
    \ instantiation* of a contract: a contract that could be deployed, but it is not.\n\
    \nThe fact that any player can go on-chain and enforce a certain action is enough\
    \ to promote good off-chain behavior – as long as it is complemented with a set\
    \ of penalizations for malicious players who force their opponents to waste gas\
    \ going on-chain.\n\nAll in all, counterfactual generalized state channels provide\
    \ an interesting framework that minimizes the number of on-chain actions and thus\
    \ reduces the latency and gas fees that are incurred every time an action must\
    \ be carried out on the Ethereum network. As an additional benefit, they also\
    \ provide a layer of privacy over the participants’ actions: if no transactions\
    \ except for the deposit and payouts are taken on-chain, then only the participants\
    \ know what messages were exchanged via the state channel.\n\n## Channel Networks\n\
    \nChannels are useful solutions when it comes to settling payments or state within\
    \ a fixed small set of participants (typically two). However, the solution falls\
    \ short when we want to connect a dynamic set of members: for each user we want\
    \ to transact with, we would need to go on-chain and open a new channel.\n\nTo\
    \ solve this problem, there are protocols for establishing *virtual channels*\
    \ between two peers, which leverage a path of channels that goes through multiple\
    \ intermediaries. This effectively creates a network built from point-to-point\
    \ connections, where any participant can connect to another as long as there is\
    \ a valid path between the two, much like the Internet itself.\n\n### Caution\n\
    \nThis section covers topics currently under heavy research and in ongoing development.\
    \ Use it as a starting point to run your own up-to-date research if you are considering\
    \ building on top of a state channel network.\n\nThe easiest construction in networks\
    \ comes once again from Bitcoin, which is *multi-hop payment channels*. This method\
    \ allows to securely route payments through one or more intermediaries. For instance,\
    \ Alice could send payments to an intermediary Ingrid with whom she has a payment\
    \ channel set up and have Ingrid relay them to Bob (assuming that Ingrid had a\
    \ channel with Bob as well). Due to how these channels are set up,^([(137)](#fn137))\
    \ Ingrid has no way to take these funds for herself.\n\nThis type of channels\
    \ leads directly to a simple and effective network layout, a *hub-and-spoke channel\
    \ network*, where multiple clients connect to a single hub that acts as an intermediary\
    \ for all of them. This way, setting up a single channel with the hub allows a\
    \ user to transact with anyone else on the network. On the other hand, it has\
    \ the downside of being centralized and requiring the hub to be available.\n\n\
    There are also several projects working on more interesting network layouts, such\
    \ as the Raiden Network,^([(138)](#fn138)) inspired by Bitcoin’s Lightning Network.\
    \ The ultimate goal for these networks is to allow for any two participants to\
    \ establish a shared channel, usually called a *virtual channel* or *metachannel*,\
    \ in a trustless manner. These need not to be just payment channels, but can be\
    \ full generalized state channels, and can potentially run without active participation\
    \ of the intermediaries on every exchange.\n\n## Sidechains\n\nAt their most basic\
    \ version, a *sidechain* is a parallel Ethereum network that potentially runs\
    \ a different consensus algorithm, such as *proof-of-authority*, and is connected\
    \ to the main network by a *bridge*. Working on smaller sizes allows sidechains\
    \ to achieve much higher throughputs than the main Ethereum network.\n\n### Note\n\
    \nWhile it is technically possible for a sidechain to use proof-of-work, this\
    \ is highly insecure. Remember that proof-of-work relies on an attacker being\
    \ unable to produce more computing power than the rest of the network. Since sidechains\
    \ tend to be small compared to the main network, their difficulty is also comparatively\
    \ low, which makes it easier for an attacker to mount an attack on them. This\
    \ is why most sidechains work with a closed set of miners or validators."
  raw: "#### Generalized State Channels\n\nAs we have seen, a state channel for a\
    \ given game has two main responsibilities: managing the channel itself and validating\
    \ the game’s transitions. This makes implementations more convoluted, as the logic\
    \ for both responsibilities is intertwined. It also makes state channel contracts\
    \ more expensive, as they need to include the logic on both the channel and the\
    \ game.\n\nThis has led to the development of *generalized state channels* frameworks.\
    \ Generalized state channels are channels that manage the users’ deposits and\
    \ allow new games or applications to be progressively *installed* on the channel.\
    \ This effectively decouples the state channel logic from the application logic.\n\
    \n> *Generalized state channels move all of the on-chain stateful components for\
    \ blockchain applications off-chain. Rather than require each application developer\
    \ to build an entire state channel architecture from scratch, a generalized state\
    \ channel generalized framework is one where state is deposited once and then\
    \ be used by any application or set of applications afterwards.*\n> \n> —Jeff\
    \ Coleman, Liam Horne, and Li Xuanji, “Counterfactual: Generalized State Channels”^([^(135)](#fn135))\n\
    \nThis opens the door to a new level of channel reuse. Users can now play multiple\
    \ instances of a game and even play multiple different games over the same channel,\
    \ thus creating several subchannels within a single channel. Furthermore, we can\
    \ build dependencies between these subchannels, such as triggering a payment channel\
    \ only upon the resolution of a set of game subchannels.\n\nGeneralized state\
    \ channel solutions are heavily under development by different teams, though there\
    \ is work toward a common standard to provide some degree of interoperability\
    \ among them. Several of these implementations, such as the one from the Counterfactual\
    \ team, rely on the concept of *counterfactual* actions. Here, the term *counterfactual*\
    \ is used to refer to an action that any participant in the channel could take\
    \ on-chain but it is actually not and causes participants to act as if it had\
    \ actually happened.^([^(136)](#fn136)) Let’s see what this means.\n\nIn our tic-tac-toe\
    \ state channel, we could say that Alice has *counterfactually* won if there is\
    \ a state signed by both Alice and Bob with her winning the game. Both players\
    \ know that any of them can submit the winning state to the smart contract on-chain\
    \ to trigger the payouts at any time. However, they can also decide to keep playing\
    \ a second match, knowing that Alice has already won the first and that it can\
    \ be taken on-chain whenever needed. In other words, players are dealing with\
    \ counterfactual state.\n\nApplications in a generalized state channel can be\
    \ *counterfactually installed*: if all participants play nicely and a dispute\
    \ never arises, then the application contract never needs to be actually created,\
    \ and the entire game can be resolved off-chain. This is also known as *counterfactual\
    \ instantiation* of a contract: a contract that could be deployed, but it is not.\n\
    \nThe fact that any player can go on-chain and enforce a certain action is enough\
    \ to promote good off-chain behavior – as long as it is complemented with a set\
    \ of penalizations for malicious players who force their opponents to waste gas\
    \ going on-chain.\n\nAll in all, counterfactual generalized state channels provide\
    \ an interesting framework that minimizes the number of on-chain actions and thus\
    \ reduces the latency and gas fees that are incurred every time an action must\
    \ be carried out on the Ethereum network. As an additional benefit, they also\
    \ provide a layer of privacy over the participants’ actions: if no transactions\
    \ except for the deposit and payouts are taken on-chain, then only the participants\
    \ know what messages were exchanged via the state channel.\n\n### Channel Networks\n\
    \nChannels are useful solutions when it comes to settling payments or state within\
    \ a fixed small set of participants (typically two). However, the solution falls\
    \ short when we want to connect a dynamic set of members: for each user we want\
    \ to transact with, we would need to go on-chain and open a new channel.\n\nTo\
    \ solve this problem, there are protocols for establishing *virtual channels*\
    \ between two peers, which leverage a path of channels that goes through multiple\
    \ intermediaries. This effectively creates a network built from point-to-point\
    \ connections, where any participant can connect to another as long as there is\
    \ a valid path between the two, much like the Internet itself.\n\n### Caution\n\
    \nThis section covers topics currently under heavy research and in ongoing development.\
    \ Use it as a starting point to run your own up-to-date research if you are considering\
    \ building on top of a state channel network.\n\nThe easiest construction in networks\
    \ comes once again from Bitcoin, which is *multi-hop payment channels*. This method\
    \ allows to securely route payments through one or more intermediaries. For instance,\
    \ Alice could send payments to an intermediary Ingrid with whom she has a payment\
    \ channel set up and have Ingrid relay them to Bob (assuming that Ingrid had a\
    \ channel with Bob as well). Due to how these channels are set up,^([^(137)](#fn137))\
    \ Ingrid has no way to take these funds for herself.\n\nThis type of channels\
    \ leads directly to a simple and effective network layout, a *hub-and-spoke channel\
    \ network*, where multiple clients connect to a single hub that acts as an intermediary\
    \ for all of them. This way, setting up a single channel with the hub allows a\
    \ user to transact with anyone else on the network. On the other hand, it has\
    \ the downside of being centralized and requiring the hub to be available.\n\n\
    There are also several projects working on more interesting network layouts, such\
    \ as the Raiden Network,^([^(138)](#fn138)) inspired by Bitcoin’s Lightning Network.\
    \ The ultimate goal for these networks is to allow for any two participants to\
    \ establish a shared channel, usually called a *virtual channel* or *metachannel*\
    \ , in a trustless manner. These need not to be just payment channels, but can\
    \ be full generalized state channels, and can potentially run without active participation\
    \ of the intermediaries on every exchange.\n\n## Sidechains\n\nAt their most basic\
    \ version, a *sidechain* is a parallel Ethereum network that potentially runs\
    \ a different consensus algorithm, such as *proof-of-authority,* and is connected\
    \ to the main network by a *bridge*. Working on smaller sizes allows sidechains\
    \ to achieve much higher throughputs than the main Ethereum network.\n\n### Note\n\
    \nWhile it is technically possible for a sidechain to use proof-of-work, this\
    \ is highly insecure. Remember that proof-of-work relies on an attacker being\
    \ unable to produce more computing power than the rest of the network. Since sidechains\
    \ tend to be small compared to the main network, their difficulty is also comparatively\
    \ low, which makes it easier for an attacker to mount an attack on them. This\
    \ is why most sidechains work with a closed set of miners or validators."
  trans: "\n# 广义状态通道\n\n正如我们所看到的，特定游戏的状态通道有两个主要职责：管理通道本身以及验证游戏的状态转换。由于这两个职责的逻辑相互交织，这使得实现变得更加复杂。同时，这也导致状态通道合约更加昂贵，因为它们需要同时包含通道和游戏两方面的逻辑。\n\
    \n这促使了*广义状态通道*框架的发展。广义状态通道是一种管理用户存款，并允许在通道上逐步*安装*新游戏或应用程序的通道。这有效地将状态通道逻辑与应用程序逻辑解耦。\n\
    \n> *广义状态通道将区块链应用的所有链上状态组件转移到链下。广义状态通道框架并非要求每个应用开发者从头构建整个状态通道架构，而是一种将状态存入一次，之后便可供任何应用或应用集使用的框架。*\n\
    > \n> — Jeff Coleman, Liam Horne, 和 Li Xuanji, “反事实：广义状态通道” ^((135))\n\n这为通道的复用开辟了新的层次。用户现在可以在同一个通道上运行一个游戏的多个实例，甚至玩多个不同的游戏，从而在单个通道内创建多个子通道。此外，我们还可以在这些子通道之间建立依赖关系，例如，仅在解决一组游戏子通道后才触发一个支付通道。\n\
    \n不同的团队正在大力开发广义状态通道解决方案，尽管各方正在努力制定一个通用标准以提供一定程度的互操作性。其中一些实现，例如来自 Counterfactual\
    \ 团队的那个，依赖于*反事实*行动的概念。在这里，术语*反事实*用来指代通道中的任何参与者本可以在链上采取但实际上并未采取，并导致参与者好像它真的发生了那样行动的行为。^((136))\
    \ 让我们看看这意味着什么。\n\n在我们的井字棋状态通道中，如果存在一个由 Alice 和 Bob 共同签名、证明她赢得了游戏的状态，我们可以说 Alice\
    \ *反事实地*赢了。两个玩家都知道，他们中的任何一方都可以随时将这个获胜状态提交给链上的智能合约来触发支付。然而，他们也可以决定继续玩第二局，因为他们知道\
    \ Alice 已经赢了第一局，并且该状态可以在需要时随时提交到链上。换句话说，玩家们正在处理反事实状态。\n\n广义状态通道中的应用可以*反事实地安装*：如果所有参与者都表现良好且从未发生争议，那么应用合约实际上无需被创建，整个游戏就可以在链下解决。这也被称为合约的*反事实实例化*：一个可以部署但实际并未部署的合约。\n\
    \n任何玩家都可以上链并强制执行某个特定动作这一事实，足以促进良好的链下行为——只要辅以对恶意玩家（那些强迫对手浪费 Gas 上链的玩家）的一系列惩罚措施。\n\
    \n总而言之，反事实广义状态通道提供了一个有趣的框架，它最大限度地减少了链上操作的数量，从而降低了在以太坊网络上每次执行操作时产生的延迟和 Gas 费用。另一个额外的好处是，它为参与者的行动提供了一层隐私保护：如果除了存款和支付之外没有其他交易上链，那么只有参与者知道通过状态通道交换了哪些消息。\n\
    \n## 通道网络\n\n对于在固定的小规模参与者（通常是两个）之间结算支付或状态，通道是一个有用的解决方案。然而，当我们需要连接一个动态的成员集合时，这个方案就显得力不从心了：对于每个我们想要进行交易的用户，我们都需要上链并打开一个新的通道。\n\
    \n为了解决这个问题，有一些协议用于在两个对等点之间建立*虚拟通道*，这些协议利用了经过多个中介的通道路径。这有效地从一个点到点的连接构建了一个网络，只要任意两个参与者之间存在一条有效路径，他们就可以相互连接，就像互联网本身一样。\n\
    \n### 注意\n\n本节涵盖当前正处于大量研究和持续开发中的主题。如果您正在考虑在状态通道网络之上进行构建，请将其作为进行您自己最新研究的起点。\n\n\
    网络中最简单的构建再次来自比特币，即*多跳支付通道*。这种方法允许通过一个或多个中介安全地路由支付。例如，Alice 可以向与她建立了支付通道的中介 Ingrid\
    \ 发送付款，然后让 Ingrid 将其转发给 Bob（假设 Ingrid 也与 Bob 有一个通道）。由于这些通道的建立方式，^((137)) Ingrid\
    \ 无法将这些资金据为己有。\n\n这种类型的通道直接引向一种简单有效的网络布局，即*星型通道网络*，其中多个客户端连接到一个充当所有客户端中介的单一中心枢纽。这样，用户只需与枢纽建立一个通道，就可以与网络上的任何人进行交易。另一方面，它的缺点是中心化，并且要求枢纽保持在线。\n\
    \n还有一些项目正在研究更有趣的网络布局，例如受比特币闪电网络启发的 Raiden 网络。^((138)) 这些网络的最终目标是允许任意两个参与者以无需信任的方式建立一个共享通道，通常称为*虚拟通道*或*元通道*。这些通道无需仅仅是支付通道，它们可以是完整的广义状态通道，并且可能在每次交换中无需中介的主动参与即可运行。\n\
    \n## 侧链\n\n在最基本的版本中，*侧链*是一个并行的以太坊网络，它可能运行不同的共识算法，例如*权威证明*，并通过*桥*与主网络相连。由于在规模较小的网络上运行，侧链能够实现比以太坊主网络高得多的吞吐量。\n\
    \n### 注意\n\n虽然侧链技术上可以使用工作量证明，但这是极不安全的。请记住，工作量证明依赖于攻击者无法生成比网络其余部分更多的算力。由于侧链相比主网络往往规模较小，其难度也相对较低，这使得攻击者更容易对其发动攻击。这就是为什么大多数侧链使用一个封闭的矿工或验证者集合。\n"
- fmt: '### Proof of Authority


    In proof-of-authority, or PoA for short, there is a predefined set of nodes that
    act as *validators* for the blocks being added to the network. Validators are
    the PoA equivalent of miners in PoW, in that they add new blocks. Every certain
    number of seconds, each of these validators, taking turns, proposes a new block.
    These blocks are broadcasted to the other validators and need to be approved by
    a majority of them to be added to the blockchain. The set of validators can be
    changed over time, with some validators being voted out and new ones allowed into
    the set.


    How the blocks are broadcasted, approved, and agreed upon depends on the specific
    *consensus* algorithm being used. Though there are many different consensus algorithms,
    such as Clique,^([^(139)](#fn139)) Aura,^([^(140)](#fn140)) Raft,^([^(141)](#fn141))
    or Istanbul BFT,^([^(142)](#fn142)) they all share the same basic scheme outlined
    previously. Different algorithms may offer different guarantees against malicious
    actors or nodes dropping from the network, as well as different performance.


    Another component of a sidechain is the connection to a main network, often called
    *bridge*. A bridge is a mechanism for users to move their assets between the main
    chain and the sidechain. As an example, a simple bridge could allow users to move
    their assets in a specific ERC20 from the main network to a sidechain by having
    the users lock their funds in a specific mainnet contract. Sidechain validators
    watch this contract and create the corresponding funds in the sidechain whenever
    they register a user locking funds on the main chain. We will implement this mechanism
    later in this chapter.


    #### Security and Trust


    The security of a vanilla PoA sidechain depends entirely on its validators. If
    a majority of them collude, they can effectively steal all user funds locked in
    the sidechain. Because of this, it is critical that the set of validators is composed
    of multiple different parties and are not all controlled by a single organization.
    A user should trust a PoA network only if he or she trusts a majority of the validator
    nodes.


    To disincentivize malicious behavior like this, some networks rely on proof-of-stake
    instead of proof-of-authority. In this scheme, the validator nodes are required
    to deposit (stake) a large amount of funds. If it is proven that they acted maliciously,
    then their stake is slashed as a penalty - though how this slashing is executed
    is another matter.


    It is important that the value a validator could gain by attacking the network
    is less than what he would lose in stake in order to keep the incentives in line.
    There are currently different approaches to proof-of-stake. However, from a user’s
    perspective, the experience is very similar to operating in a proof-of-authority
    network.


    ### Note


    Given that malicious validators may steal funds from users, the security guarantees
    from the sidechain are poorer than those of the main chain. This fact makes sidechains
    **not** to be considered layer 2 solutions under certain definitions. Nevertheless,
    there are constructs (such as Plasma, which we will see later) that allow the
    user to safeguard their assets by calling unlawful validator behavior on a main
    network contract.


    #### Deploying Our Own Chain


    To illustrate how a PoA network works,^([^(143)](#fn143)) we will manually set
    one up using the Geth Ethereum node client.^([^(144)](#fn144)) While Geth can
    run in the proof-of-work main Ethereum network, it can also be configured to run
    in PoA networks that use the Clique consensus algorithm (such as the Rinkeby testnet)
    and act as a validator node.


    Let’s start by setting up three miner nodes, which will all run on the same computer.
    We will first create new accounts for each miner. For convenience, we will use
    the same password for all accounts, so create a file `password.txt` containing
    a random string to be used as password. Then, create the addresses by running
    the following for each of the three miners, replacing `miner1` with `miner2` and
    `miner3`. Make sure the `password.txt` file is in the path where the command is
    run.


    ```

    $ geth --datadir miner1 --password password.txt account new

    > Address: {8305ccac...58269a7d}

    ```


    You should get three different addresses, which we will set up as the validators
    of this network (make sure to note them down). We will now create a *genesis*
    for our network. The genesis is the configuration for the network and will include
    which is the set of authorized validators, the consensus engine, the initial balances,
    the block gas limit, and so on. In geth, this information is compiled into a JSON
    configuration file which is used to bootstrap each node.


    Geth includes a tool named `puppeth` that simplifies the creation of such a file.
    Simply run `puppeth` in the console, and answer the questions prompted (Listing
    [8-18](#476252_1_En_8_Chapter.xhtml#PC20)). Give your network a name, create a
    new genesis, use clique proof-of-authority with 5-second blocks, and choose your
    miners as “accounts allowed to seal.” You should also pick a fourth account to
    be pre-funded or choose one of the existing validators to hold the initial ETH
    for your network.


    ```

    $ puppeth

    Please specify a network name to administer (no spaces, hyphens or capital letters
    please)

    > mysidechain

    What would you like to do? (default = stats)

    1\. Show network stats

    2\. Configure new genesis

    3\. Track new remote server

    4\. Deploy network components

    > 2

    What would you like to do? (default = create)

    1\. Create new genesis from scratch

    2\. Import already existing genesis

    > 1

    Specify your chain/network ID if you want an explicit one (default = random)

    > 1212

    Listing 8-18

    Fragment of the Geth puppeth configuration wizard to set up a PoA network with
    id 1212\. You should have a new mysidechain.json genesis file after going through
    it

    ```


    Before starting our Geth nodes, we will set up a *bootnode*. A bootnode is a node
    in the network whose sole purpose is to aid in the discovery of other nodes. We
    will use it to simplify the communication between our miner nodes.


    To set up a bootnode, we first need to create a boot key and use it to derive
    the bootnode *enode address* (Listing [8-19](#476252_1_En_8_Chapter.xhtml#PC21)).
    The enode address is a unique identifier of a node in the decentralized network,
    followed by the IP address and port where the node can be found. We will then
    start the bootnode using the generated boot key and have it listen on local port
    `30100`.^([^(145)](#fn145))


    ```

    $ bootnode -genkey boot.key

    $ bootnode -nodekey boot.key -writeaddress

    > c190f2af...ee34b40a

    $ bootnode -nodekey boot.key -addr :30100

    Listing 8-19

    Generating a boot key and running a bootnode

    ```'
