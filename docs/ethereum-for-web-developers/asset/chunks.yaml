  trans: '

    #### 创建一次性地址


    一次性地址是如何创建的？值得注意的是，它们并非以太坊的特殊构造体，而是巧妙技巧的产物。此外，创建此类地址完全无需初始燃料费。


    回顾前文，以太坊上的所有交易都必须使用发送者的私钥进行签名才能生效。发送者地址可以从交易签名中推导得出，因此 `from` 实际上从未包含在交易数据中——而是在需要时从签名计算而来。


    概括来说，发送交易包含以下步骤：


    1.  将交易参数（接收方、燃料费、燃料价格、nonce、数据、价值等）打包成二进制对象。

    2.  对交易二进制数据进行哈希，并使用发送者的私钥进行签名。

    3.  广播交易二进制数据及其签名。


    另一方面，处理交易则包含以下步骤：


    1.  计算交易二进制数据的哈希值。

    2.  从哈希和签名中推导出发送者地址（即 `from`）。

    3.  将交易二进制数据解包为其参数（接收方、燃料费、燃料价格、nonce、数据、价值等）。


    生成一次性地址的技巧在于随交易发送一个随机签名。我们并非在步骤 2 中实际签署交易，而是在步骤 3 中仅包含一组随机字节作为签名。这样一来，该过程便没有私钥与之关联。


    在处理交易时，这会从签名中推导出一个随机的发送者地址。鉴于与该地址关联的私钥未知，因此无法为同一地址生成任何其他交易。这有效地产生了一个只能广播一笔特定交易的一次性地址。然后，一旦该地址获得
    ETH 资金，就能覆盖燃料费，并将交易广播到网络。


    #### 示例代码


    我们将使用上一节中 `Donations` 示例的一个变体，它只有一个受益人和一个 `donate` 方法，该方法接受一个字符串，该字符串将在每次捐赠时通过事件发出（清单
    7-4）。然后我们将依赖一个一次性地址与其交互。


    ```

    // 02-single-use-addresses/contracts/Donations.sol

    contract Donations {

    address payable wallet;

    event Donation(uint256 value, string text);

    constructor(address payable _wallet) public {

    wallet = _wallet;

    }

    function donate(string calldata text) external payable {

    require(msg.value > 0);

    emit Donation(msg.value, text);

    }

    function withdraw() external { ... }

    }

    清单 7-4

    简化的 Donations 合约，接受一个自定义字符串，该字符串在每次捐赠时通过事件发出

    ```


    假设我们的用户想要发送一笔 1 ETH 的捐赠，并附带传统问候语 "Hello world"。我们需要首先生成执行该函数的编码后 `data`，并估算执行该调用的燃料成本。


    ```

    // 02-single-use-addresses/index.js

    let donations = new web3.eth.Contract(abi, address);

    let call = donations.methods.donate("Hello world");

    let data = call.encodeABI();

    let gas = await call.estimateGas({ value: 1e18 });

    ```


    ### 警告


    请记住，实际的燃料用量可能会根据交易执行时的状态而改变。由于一次性地址的本质特性，如果交易因燃料不足而失败，就无法以更高的限额再次执行该交易。这将导致用户的资金被永久锁定在该地址中。如果你的函数将来可能消耗更多燃料，请确保在后续步骤中构建交易对象时将其考虑在内。


    现在我们拥有了所有必要的参数，可以使用随机签名来构造我们的交易。为了构建这个交易对象，我们将使用 `ethereumjs-tx@1.3.7` 库。


    ```

    const Tx = require(''ethereumjs-tx'');

    let tx = new Tx({

    value: 1e18,

    data,

    gas,

    gasPrice: 1e9,

    to: address,

    nonce: "0x0",

    v: networkId * 2 + 35,

    s: ''0x'' + ''2''.repeat(61),

    r: ''0x'' + ''3''.repeat(61)

    });

    let sender = tx.getSenderAddress().toString(''hex'');

    ```


    现在，上述代码段中的大多数参数应该很熟悉了：接收方地址、发送的 ETH 数量、燃料限额和价格，以及交易数据。由于这笔交易将从尚未发送过任何交易的新地址发出，因此
    nonce 必须为零。


    我们在此看到的新参数是 `v`、`r` 和 `s`，它们对应于交易的签名。其中第一个参数必须从链 ID 推导得出，⁹⁹ 而另外两个通常根据用户的私钥计算得出——这里我们将用任意字节序列替换它们。


    ### 注解


    使用可识别的虚构序列作为 `r` 和 `s` 非常重要，例如相同字节组的明确重复，或大量前导零。否则，第三方无法知道生成的交易对象是否确实属于一次性地址，或者该签名是使用实际私钥获得的。如果确实使用了私钥来生成交易，那么当用户将资金发送到所谓的“一次性”地址时，其持有者可以生成另一笔不同的交易。


    现在，如果你尝试运行上面的代码来获取发送者地址，`getSenderAddress` 调用会抛出一个“无效签名”错误。这是因为并非所有签名在以太坊中都是有效的——大约只有一半是有效的。解决此问题的最简单方法是使用几个不同的值进行测试，直到找到一个有效的任意签名。例如，每次收到无效签名异常时，我们可以将
    `r` 增加 1，直到得到一个有效值。


    ```

    const BN = require(''bignumber.js'');

    let sender = null;

    while (!sender) {

    try {

    sender = ''0x'' + tx.getSenderAddress().toString(''hex'');

    } catch(ex) {

    const r = new BN(''0x'' + tx.r.toString(''hex''));

    tx.r = ''0x'' + r.plus(1).toString(16);

    }

    }

    ```


    有了有效的预签名交易，我们现在可以尝试将其广播到网络。


    ```

    const rawTx = ''0x'' + tx.serialize().toString(''hex'');

    await web3.eth.sendSignedTransaction(rawTx);

    ```


    然而，由于我们还没有为发送者地址提供资金，我们将收到“发送者没有足够资金发送交易”的错误。记住，推导出的发送者是一个新账户，因此它之前不会有任何资金。


    此时，我们应该要求用户为推导出的这个一次性地址提供资金，并监控该地址的余额变化，以便在余额充足时广播交易。为此，我们首先需要计算所需的精确 ETH 数量：即燃料限额乘以燃料价格，再加上交易中发送的任何价值。


    ```

    let required = (new BN(gas)).times(gasPrice).plus(value);

    ```


    ### 警告


    请记住，发送到一次性地址的任何额外 ETH 都将丢失。


    现在让我们模拟用户将那些资金发送到一次性地址的过程。


    ```

    const [funder] = await web3.eth.getAccounts();

    await web3.eth.sendTransaction({

    from: funder, value: required, to: sender

    });

    ```


    我们现在终于可以将交易发送到网络，并验证事件是否被正确触发了。


    ```

    let rawTx = ''0x'' + tx.serialize().toString(''hex'');

    await web3.eth.sendSignedTransaction(rawTx);

    let events = await donations.getPastEvents(''Donation'');

    console.log(events[0].returnValues.text);

    // 打印 "Hello world "

    ```

    '
- fmt: '# Application Local Accounts


    While in the previous sections we saw a few tricks for interacting with a smart
    contract application without needing an Ethereum account, we will now look into
    another alternative: creating an account for the user *within* the application.
    Instead of asking the user to download a web3-enabled browser or install an extension,
    we can manage the entire flow of creating a wallet directly in our app. This allows
    any user who navigates to our application being instantly supplied with an Ethereum
    address to start interacting. On the other hand, we also need to provide means
    for our users to safely back up their new wallets – without becoming custodians
    of their funds.


    ## Creating and Using a Local Wallet


    Creating an Ethereum account requires a set of random bytes to derive a private
    key, from which the address is calculated. We can use the `accounts` set of methods
    from the `web3@1.2.0` library to do so (Listing 7-5), which will automatically
    pull the needed entropy from the browser’s crypto API.


    ```

    let account = web3.eth.accounts.create();

    ```


    We can now use the private key from this account object to sign a transaction
    and broadcast it to the network (Listing 7-6).


    ```

    let tx = await web3.eth.accounts.signTransaction({

    to: account.address,

    value: 1e17,

    gas: 21000,

    gasPrice: 1e9 },

    account.privateKey);

    await web3.eth.sendSignedTransaction(tx.rawTransaction);

    ```


    To avoid having to generate, sign, and broadcast every transaction manually, the
    `web3` library allows to register an account as a wallet (Listing 7-7), which
    will automatically use it for sending any transaction.


    ```

    web3.eth.accounts.wallet.add(account);

    await web3.eth.sendTransaction({

    from: account.address,

    to: account.address,

    value: 1e17,

    gas: 21000

    });

    ```


    ### Note


    Recall from previous chapters that Metamask achieves a similar behavior using
    a `web3` subprovider. Instead of relying on the node to sign a transaction, the
    transaction is intercepted, signed client-side, and then broadcasted.


    ## Encrypted Keystores


    The following question is *how* to store the user’s wallet after generating it.
    The most direct approach is to just keep the private key in the browser’s local
    storage, so when the user visits our site again, we can easily reconstruct the
    account object.


    ```

    // Store private key in local storage

    localStorage.setItem("ethereum_pk", account.privateKey);

    // Load private key from local storage and re-create account

    let pk = localStorage.getItem("ethereum_pk");

    let account = web3.eth.accounts.privateKeyToAccount(pk);

    ```


    However, this option is extremely insecure, as the browser’s local storage should
    never be used to keep sensitive information, since it is vulnerable to XSS attacks
    – not to mention the fact that the keys are lost if the user clears the site data
    or loses the device. Storing plain private keys like this is only recommended
    when managing very low amounts of ETH and loss of funds is acceptable, in other
    words, when usability is prioritized over security.


    A safer approach is to encrypt the private key (Listing 7-8) before storing it
    – whether it is on the browser’s local storage, on a remote server, downloaded
    to the user’s computer, or synced across cloud storage. Ethereum’s *wallet v3
    format* is a standardized JSON that holds a private key encrypted with a password
    and is not easy to crack. It is used under the hood by the nodes to store your
    keys and can also be used in the browser to encrypt your users’ accounts before
    storing them.


    ```

    $ web3.eth.accounts.encrypt(account.privateKey, ''PASSWORD'');

    > { version: 3,

    id: ''b8c62b04-041c-49d6-966a-205bb5f70528'',

    address: ''af0a9c8d7f74dff1ce64f9c322108c336502bbd4'',

    crypto:

    { ciphertext: ''ba09a90b5...7b0e5e24da79d7f9efda613fd298'',

    cipherparams: { iv: ''2e72184026373b69d21ce157b1d93bba'' },

    cipher: ''aes-128-ctr'',

    kdf: ''scrypt'',

    kdfparams:

    { dklen: 32,

    salt: ''eab3860a...d1d378abbc55a65cae3c83e0a39e'',

    n: 8192,

    r: 8,

    p: 1 },

    mac: ''60177f2af3...bd900315e46e2d'' } }

    ```


    While this is a much more secure option, it introduces additional complexity by
    requesting a password from the user. Even though passwords are a common annoyance
    to web users, they are also used to being able to *reset* them whenever they forget
    them – an option that is not available in this case. If a user forgets the password
    to their keystore, its contents are lost for good.


    In addition to this problem, the keystore itself must not be misplaced. If you
    are storing the encrypted private key just in the browser and the user happens
    to clear local data or simply loses the device, then all funds are gone with it.
    You must ensure that users perform proper backups (asking them to download the
    keystore from your page and saving it elsewhere) or save them on a safe location
    in one of your application’s servers (assuming you have one!).


    ### Note


    There is a big difference between acting as a custodian of your users’ funds and
    acting as a backup location for storing their encrypted private keys. While on
    the former any hack to your servers implies a loss of funds to your users, the
    latter is just a convenience for your users to keep their encrypted keys secure.


    However, this difference may not be so big from a legal standpoint. Make sure
    to inform yourself on legal requirements in your jurisdiction if you do store
    users’ encrypted keystores server-side.'
