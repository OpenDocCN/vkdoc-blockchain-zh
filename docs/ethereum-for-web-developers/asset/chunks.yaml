    Listing 8-3

    Forcefully closing the channel by the sender to recover the deposit if the recipient
    never cashes out

    ```


    This implementation can be modified to exchange ERC20 tokens instead of ETH, thus
    opening the door to *token payment channels*. Instead of making an initial deposit
    of ETH, the sender must transfer ERC20 tokens to the channel contract as a deposit.
    These tokens are then transferred again once the channel is closed. Refer to `TokenPaymentChannel.sol`
    in the code samples for an implementation.'
  trans: '

    #### 实现单向通道


    为了说明单向支付通道的工作原理，我们将从头实现一个（清单 8-1）。我们的支付通道将包含一个`sender`（发送方）和一个`recipient`（接收方），由`sender`存入初始押金，并设定一个预定的结束时间。在此指定结束时间之后，如果`recipient`尚未收取其款项，则允许`sender`提取押金。这一机制是必要的，以防止如果服务提供方从未提交支付消息，用户押金被永久锁定在合约中。


    ```solidity

    // contracts/PaymentChannel.sol

    pragma solidity ⁰.5.0;

    import "openzeppelin-solidity/contracts/cryptography/ECDSA.sol";

    contract PaymentChannel {

    using ECDSA for bytes32;

    address payable sender;

    address payable recipient;

    uint256 endTime;

    bool closed;

    constructor(

    address payable _recipient, uint256 _endTime

    ) public payable {

    sender = msg.sender;

    recipient = _recipient;

    endTime = _endTime;

    }

    }

    ```

    *清单 8-1* – 单向支付通道合约的定义、状态变量和构造函数。我们将使用 `openzeppelin-solidity@2.1` 中的 `ECDSA`
    库来验证合约上的签名。注意构造函数是 `payable` 的，因此 `sender` 可以在部署时存入初始押金。


    由于支付通道中的大多数交易发生在链下，我们只需要实现两个方法。第一个方法 `close` 将由服务提供方调用，用于提交带有 payout（支付额）的 `sender`
    签名，收取其资金，并关闭通道（清单 8-2）。


    ### 注意


    我们将要求 `sender` 始终为应支付给 `recipient` 的总金额签署消息。这样我们就可以仅向合约提交一条签名的消息，而不必处理多条消息。


    此方法仅允许 `recipient` 调用，以防止 `sender` 试图通过签署一条价值为零的消息来提前关闭通道。此外，由于 `sender` 签署的消息总额可能大于通道中现有的押金，我们需要限制转移的金额不超过合约余额。由
    `recipient` 决定是否接受一个实际通道无法足额支付的付款单。^(¹²⁶)


    向 `recipient` 支付完成后，所有剩余押金将返还给 `sender`。由于此时通道合约不再有用，我们还会销毁合约以获取少量 gas 退款。


    ```solidity

    // contracts/PaymentChannel.sol

    function close(

    uint256 value, bytes memory signature

    ) public {

    require(msg.sender == recipient);

    bytes32 hash = keccak256(

    abi.encodePacked(value, address(this))

    ).toEthSignedMessage();

    address signer = hash.recover(signature);

    require(signer == sender);

    uint256 funds = address(this).balance;

    recipient.transfer(funds < value ? funds : value);

    selfdestruct(sender); // 销毁合约，并将资金发送给 sender

    }

    ```

    *清单 8-2* – 由 `recipient` 关闭支付通道。这需要提交一份由 `sender` 签名的、包含待转移金额的消息。注意，签名的消息中还包含了合约地址，以防止对同一
    `sender` 的其他通道进行重放攻击。


    需要实现的第二个函数对应不顺利的情况：`recipient` 从未调用 `close` 函数，`sender` 在预定的结束期限后终止合约（清单 8-3）。


    ```solidity

    // contracts/PaymentChannel.sol

    function forceClose() public {

    require(now > endTime);

    require(msg.sender == sender);

    selfdestruct(sender);

    }

    ```

    *清单 8-3* – 如果 `recipient` 从未兑现，`sender` 可通过强制关闭通道来收回押金。


    此实现可以修改为交换 ERC20 代币而非 ETH，从而为*代币支付通道*打开大门。`sender` 无需存入 ETH 押金，而是需要将 ERC20 代币转入通道合约作为押金。这些代币将在通道关闭时再次转出。有关实现，请参阅代码示例中的
    `TokenPaymentChannel.sol`。

    '
- fmt: '#### Building a Payments App


    We will now use our contract to build a simple application, where a sender can
    set up a payment channel contract with a recipient, send multiple micropayments
    via a direct off-chain connection, and eventually settle. As in previous chapters,
    we will use `create-react-app` for boilerplate.


    To keep the application simple, we will establish a connection between two browser
    windows opened on the same app in the same computer, one of them acting as a sender
    and the other as receiver. We will use broadcast channels[^(127)](#fn127) to pass
    messages between the two browser windows. In a real app, you will want to use
    a different method, such as WebRTC data channels,[^(128)](#fn128) along with a
    server to manage discovery among your users.


    We will make another simplification: instead of using Metamask, we will manage
    the accounts directly from the web application. This is to avoid difficulties
    with simulating two different accounts interacting with the same app on the same
    computer. We will call directly into ganache for sending transactions from both
    the sender and recipient accounts and for signing messages when needed.


    Our application will be built out of two main views: one for the sender and one
    for the recipient, both set up by a root `App` component. It will be the App’s
    responsibility to set up the web3 object and inject the sender and recipient addresses
    into the components. Refer to `src/App.js` in the code samples for its implementation.


    Let’s start with the Sender view. It will be the sender’s responsibility to open
    the channel by deploying the smart contract and making the initial deposit (Listing
    [8-4](#476252_1_En_8_Chapter.xhtml#PC4)). When this is done, we will notify the
    recipient via the broadcast channel. We will communicate using a custom protocol
    where we identify different message types by an `action` parameter, with a value
    of `CHANNEL_DEPLOYED` in this case.


    ```

    // src/components/Sender.js

    async deployChannel(deposit) {

    const { web3, sender, recipient } = this.props;

    // Deploy the contract and transfer initial deposit

    const from = sender;

    const endTime = +(new Date()) +(300 * 1000); // 5 min from now

    const channel = await PaymentChannel(web3)

    .deploy({ arguments: [recipient, endTime] })

    .send({ value: deposit.toString(), from, gas: 1e6 });

    // Notify the recipient via the broadcast channel

    const address = channel.options.address;

    this.broadcastChannel.postMessage({

    action: "CHANNEL_DEPLOYED", address

    });

    // Update sender state with deposit and channel object

    this.setState({ channel, deposit, sent: BN(0) });

    }

    Listing 8-4

    Sender component function to deploy the payment channel contract, fund it, and
    notify the recipient of its deployment. The App component passes the web3 instance
    and the sender and recipient addresses as props. Here, PaymentChannel is a function
    that returns a new web3 contract instance, and BN is a BigNumber constructor

    ```


    We will wire this function to a simple form (Figure [8-2](#476252_1_En_8_Chapter.xhtml#Fig2)),
    where we ask the user to choose the amount of ETH they want to deposit on the
    channel.


    ![../images/476252_1_En_8_Chapter/476252_1_En_8_Fig2_HTML.jpg](images/476252_1_En_8_Chapter/476252_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Simple payment channel deployment form. The code for this form can be found in
    `src/components/CreateChannel.js`


    Once the channel is deployed, our user should be able to send micropayments to
    the recipient[^(129)](#fn129) (Listing [8-5](#476252_1_En_8_Chapter.xhtml#PC5)).
    This means signing messages (not sending transactions) that include the total
    amount of ETH to be paid out to the recipient once the channel is closed. These
    messages are sent to the recipient via the same broadcast channel using a different
    `action` identifier.


    ```

    // src/components/Sender.js

    async sendEth(value) {

    const { web3, sender } = this.props;

    const { sent, channel } = this.state;

    // Calculate new accumulated ETH sent

    const newSent = sent.plus(value);

    // Sign it with the sender''s key

    const signature = await signPayment(

    web3, newSent, channel.options.address, sender

    );

    // Send the message to the recipient

    this.broadcastChannel.postMessage({

    action: "PAYMENT", sent: newSent.toString(), signature

    });

    // Update state with new total accumulated ETH sent

    this.setState({ sent: newSent });

    }

    Listing 8-5

    Sender function to send a micropayment to the recipient. Each message carries
    the total amount of ETH to be paid out. The component needs to keep track of the
    total sent so far, so the micropayment amount chosen by the user is added to that
    value before being signed and sent

    ```


    The signature is calculated on the hash of the total value to pay and the channel’s
    address (Listing [8-6](#476252_1_En_8_Chapter.xhtml#PC7)). Including the channel’s
    address in the signature prevents replay attacks, that is, reusing the same message
    in another channel opened by the same user.


    ```

    // src/contracts/PaymentChannel.js

    async function signPayment(web3, value, address, sender) {

    const hash = web3.utils.soliditySha3(

    { type: ''uint256'', value: value.toString() },

    { type: ''address'', value: address }

    );

    const signature = await web3.eth.sign(hash, sender);

    return signature;

    }

    Listing 8-6

    Signing each micropayment message using web3[^(130)](#fn130)

    ```


    Similar to the channel deployment, this action is presented to the user in a simple
    form where they choose the amount to transfer (Figure [8-3](#476252_1_En_8_Chapter.xhtml#Fig3)).
    We can also show some basic stats on the channel, such as its address, the total
    deposit, and how much ETH has been committed so far.


    ![../images/476252_1_En_8_Chapter/476252_1_En_8_Fig3_HTML.jpg](images/476252_1_En_8_Chapter/476252_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    Presenting the user the channel information and requesting the value to send via
    the channel. The code for these components can be found in `src/components/ChannelStats.js`
    and `src/components/SendEther.js`'
