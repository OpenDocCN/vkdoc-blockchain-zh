  trans: '#### 部署奖励


    在深入代码之前，我们需要定义如何管理支付给中继者的费用，以及哪些地址将由用户初始充值。


    回顾前文方案，一次性使用地址的缺点之一是：用户需要从交易所向一个地址充值，但其身份合约却部署在另一个不同的地址。更糟的是，任何发送到一次性使用地址的额外资金都会丢失。因此，理想情况是能直接让用户向身份合约地址充值。


    解决此问题的最简单方法，是在 Identity 合约部署时（即在构造函数中，参见清单 7-30）向中继者支付奖励。在此场景中，中继者自然就是发起交易的账户
    — 即 Solidity 中的 `tx.origin`。


    ```

    // 08-meta-txs/contracts/IdentityFactoryWithRewards.sol

    contract IdentityWithReward is Identity {

    constructor(

    address owner, uint256 reward

    ) Identity(owner) public {

    tx.origin.transfer(reward);

    }

    }

    清单 7-30

    修改后的 Identity 合约，用于向交易中继者支付奖励

    ```


    这种方法允许用户只需指定所有者账户和待支付的奖励，并将这些参数与选定的盐值一起广播，因为这些值本身就足够确定部署地址。任何中继者随后都可以接收此交易，验证部署地址上是否有足够资金来支付奖励，并将交易发送至工厂合约。额外的好处是，发送到部署地址的任何多余资金在合约创建后仍会保留在那里，供其所有者使用。


    #### 身份合约工厂


    工厂合约必须提供一个任何人都可调用的部署函数，该函数接受 Identity 合约的部署参数和盐值（清单 7-31）。此函数会组装创建码，并使用 CREATE2
    指令执行实际创建。


    ```

    // 08-meta-txs/contracts/IdentityFactoryWithRewards.sol

    contract IdentityFactoryWithRewards {

    function deploy(

    address owner, uint256 reward, uint256 salt

    ) public returns (address) {

    bytes memory code = getCode(owner, reward);

    address identity;

    assembly {

    identity:= create2(0, add(code,0x20), mload(code), salt)

    if iszero(extcodesize(identity)) { revert(0, 0) }

    }

    return identity;

    }

    function getCode(

    address owner, uint256 reward

    ) internal pure returns (bytes memory) {

    return abi.encodePacked(

    type(IdentityWithReward).creationCode,

    abi.encode(owner, reward)

    );

    }

    }

    清单 7-31

    IdentityFactory 合约的部署函数。合约类型的 creationCode 属性返回创建时使用的字节码，任何构造函数参数只需附加在末尾

    ```


    注意，无需验证所有者的签名，因为创建参数的任何变更都会产生一个不同的部署地址 — 一个没有资金来偿还中继者奖励的地址。中继者应验证部署地址确实有足够资金用于偿还。


    此合约还增加了一个视图函数，用于根据构造函数参数和盐值获取部署地址。该函数可用于告知用户其身份合约将在哪个地址部署，即他们需要充值的地址。


    ```

    function getDeploymentAddress(

    address owner, uint256 reward, uint256 salt

    ) public view returns (address) {

    bytes memory code = getCode(owner, reward);

    bytes32 codeHash = keccak256(code);

    bytes32 rawAddress = keccak256(

    abi.encodePacked(

    bytes1(0xff),

    address(this),

    salt,

    codeHash

    )

    );

    return address(bytes20(rawAddress << 96));

    }

    ```


    使用此策略，你可以预先计算出给定盐值下用户身份将被创建的地址，并与用户共享该地址。用户认可该地址为己所用，并从交易所向其充值。这进而会触发中继者，一旦地址获得资金，便在该地址创建身份合约。


    ### 注意


    实际上，此策略也可以使用一次性使用地址而非 CREATE2 来实现，流程稍微复杂一些。应用程序可以选择一个中继者，创建一个一次性使用地址，该地址将生成新的身份合约并向预选的中继者发送奖励。在用户向身份部署地址充值后，中继者则向一次性使用地址充值，执行部署，并收取奖励。


    ## 以太坊名称


    本章将要解决的最后一个用户入门挑战是以太坊地址本身。虽然地址对于任何以太坊应用都至关重要，因为它们标识着去中心化系统中的参与者，但它们远非用户友好。要求用户将一串
    40 字符的乱码理解为自己的全局标识符并非好的设计。为解决此问题，我们将研究 ENS（以太坊名称服务）。


    ### 以太坊的 DNS


    大多数 Web 开发者都熟悉 DNS（域名服务）的概念，这是一种将易于识别的域名（如 `"google.com"`）映射到机器友好地址（如 `172.217.28.206`）的协议，用于标识互联网协议中的服务器。


    以太坊名称服务（ENS）是一种类似的协议，它将用户友好的名称（如 `"ethereumfoundation.eth"`）解析为以太坊地址（在此示例中为 `0xfB6916095ca1df60bB79Ce92cE3Ea74c37c5d359`，即以太坊基金会的小费钱包）。与
    DNS 类似，它也支持注册非地址记录（如内容哈希或纯文本），以及反向查找。


    ENS 涉及的组件大致模仿了 DNS，不同之处在于它们是在以太坊网络内以智能合约形式实现的。ENS **注册表**本身是一个单例合约，负责跟踪所有域名及其所有者，并将每个域名映射到一个**解析器**。解析器合约提供了将名称解析为地址的方法，以及可选的附加信息，如文本、内容哈希或公钥记录。最后，ENS
    注册表通过**注册商**进行更新，这些合约负责管理树中不同层级的子域注册，每个都有其自己的策略。


    ENS 最广泛使用的顶级域名是 `.eth`，由所谓的 *.eth 永久注册商* 运营。该注册商使用提交-揭示方案来购买二级域名，并允许任何人出资延长名称注册。虽然可以直接与该合约交互，但建议使用工具（如
    `mycrypto` 或 `myetherwallet`）来购买和管理你的二级域名。'
- fmt: "### Names Resolution\n\nA key part of making your application ENS-aware is\
    \ to allow your users to enter ENS names wherever an address is required. Allowing\
    \ users to input ENS names in your application instead of addresses helps abstracting\
    \ the complexity of Ethereum addresses, which means one less concept your users\
    \ need to grasp to start using your app. This is the equivalent of allowing your\
    \ users to navigate to \"google.com\" by entering the domain name in their browser\
    \ instead of forcing them to type in its IP address.\n\nAs in DNS, translating\
    \ from ENS names to addresses is a process called *resolution* (Listing [7-32](#476252_1_En_7_Chapter.xhtml#PC46)).\
    \ Given the architecture of ENS, resolving a name is a two-step process: we first\
    \ need to query the central ENS registry to obtain the address of the *resolver\
    \ contract* for the name and then query the resolver to obtain the actual *address*\
    \ for that name. Domain names also need to be normalized and hashed via a process\
    \ called *namehash*.^([^(119)](#fn119))\n\n```javascript\n// 09-ens/01-resolve.js\n\
    const ensAddr = '0x314159265dd8dbb310642f98f50c066173c1259b';\nasync function\
    \ resolve (domain) {\nlet domainHash = namehash(domain);\nlet ens = new web3.eth.Contract(ensABI,\
    \ ensAddr);\nlet resAddr = await ens.methods.resolver(domainHash).call();\nlet\
    \ resolver = new web3.eth.Contract(resolverABI, resAddr);\nreturn await resolver.methods.addr(domainHash).call();\n\
    }\n```\n\n*Listing 7-32 – Resolving a domain name to an address using the central\
    \ ENS registry on mainnet*\n\nSince name resolution is a common operation, several\
    \ libraries implement this operation out of the box. In particular, the official\
    \ `ethereum-ens@0.7.6` javascript package provides bindings for most operations,\
    \ making name resolution much simpler.\n\n```javascript\nlet ens = new ENS(web3.eth.currentProvider);\n\
    let domain = \"ethereumfoundation.eth\";\nawait ens.resolver(domain).addr();\n\
    > 0xfB6916095ca1df60bB79Ce92cE3Ea74c37c5d359\n```\n\nAbstracting your users of\
    \ Ethereum addresses also means that your application must use Ethereum names\
    \ instead of raw addresses when displaying information. It is no good if your\
    \ users enter a user-friendly Ethereum name, and your application answers with\
    \ a plethora of 40-character hexadecimal strings.\n\nReverse resolution is supported\
    \ in ENS by querying a special `\"addr.reverse\"` domain, which maps from addresses\
    \ to full Ethereum names. This domain is managed separately from `\"eth\"`, and\
    \ users may choose not to register their addresses on it – so not every address\
    \ with an Ethereum name will have a record for reverse resolution.\n\n```javascript\n\
    address = '0xfB6916095ca1df60bB79Ce92cE3Ea74c37c5d359';\nawait ens.reverse(address).name();\n\
    > \"ethereumfoundation.eth\"\n```\n\n### Caution\n\nENS does not enforce the correctness\
    \ of reverse records; this means that anyone could register that their address\
    \ maps to `\"ethereumfoundation.eth\"`. To protect against this, you should always\
    \ run a forward name resolution on the result of a reverse resolution and verify\
    \ that it matches the original address.\n\n### Giving Names to Our Users\n\nENS\
    \ is a perfect match for smart accounts. Instead of requiring our users to remember\
    \ the address of the smart contract that is their on-chain identity, we can allow\
    \ them to assign it an Ethereum name.\n\nAs in DNS, instead of having them purchase\
    \ a second-level domain directly from a network information center (NIC), we can\
    \ allocate names within our own domain. Email is a good analogy of this and something\
    \ users are accustomed to – most people have an email account with a provider,\
    \ like `john@gmail.com`, instead of one managed by them, like `hello@john.com`.\
    \ Similarly, in ENS, we can allocate a subdomain for each user of our application,\
    \ like `john.myapp.eth`.\n\nTo implement this, we need to set up our own registrar\
    \ contract to manage our Ethereum domain and manage all subdomain registrations.\
    \ We will use a simple FIFS (first-in first-served) registrar contract that will\
    \ freely accept all subdomain registrations. Canonical implementations for this\
    \ and other contracts we will be using can be found in the `@ensdomains/ens@0.3.5`\
    \ and `@ensdomains/resolver@0.1.3` packages.\n\nThe first step is to actually\
    \ acquire a domain. While this is a non-trivial process on mainnet, ENS offers\
    \ FIFS registrars for `.test` domains in the test networks, with the restriction\
    \ that these registrations expire after 4 weeks. Let's start by registering a\
    \ test domain on the Rinkeby testnet (Listing [7-33](#476252_1_En_7_Chapter.xhtml#PC49)).\n\
    \n```javascript\n// 09-ens/02-register.js\nlet [owner, user] = await web3.eth.getAccounts();\n\
    let ensAddress = '0xe7410170f87102df0055eb195163a03b7f2bff4a';\nlet ens = new\
    \ web3.eth.Contract(ensABI, ensAddress);\n// Get top-level registrar for test\
    \ domains\nlet testRegistrarAddress = await ens.methods\n.owner(namehash('test')).call();\n\
    let testRegistrar = new web3.eth.Contract(\nfifsRegistrarABI, testRegistrarAddress);\n\
    // Register our domain name under our account\nlet name = 'myapp'; // try other\
    \ names if already registered\nlet domain = `${name}.test`;\nawait testRegistrar.methods\n\
    .register(hash(name), owner).send({ from: owner });\n```\n\n*Listing 7-33 – Registering\
    \ the Ethereum domain \"myapp.test\" on Rinkeby. The `hash` function in this code\
    \ snippet is `keccak256`*\n\nWe can now deploy our FIFS registrar contract, which\
    \ will freely allocate subdomains of `\"myapp.test\"`, and transfer ownership\
    \ of the domain to it.\n\n```javascript\n// Deploy new registrar contract\nlet\
    \ arguments = [ensAddress, namehash(domain)];\nlet myRegistrar = await\nnew web3.eth.Contract(fifsRegistrarABI)\n\
    .deploy({ data: fifsRegistrarBytecode, arguments })\n.send({ from: owner });\n\
    // Transfer ownership of our domain to our registrar\nlet myRegistrarAddress =\
    \ myRegistrar.options.address;\nawait ens.methods\n.setOwner(namehash(domain),\
    \ myRegistrarAddress)\n.send({ from: owner });\n```\n\nWe can now augment our\
    \ identity contracts with a method to register themselves on ENS using this registrar\
    \ (Listing [7-34](#476252_1_En_7_Chapter.xhtml#PC51)). This method takes three\
    \ steps:\n\n1. Registering a custom name (i.e., `\"john\"`) in our registrar and\
    \ appointing the Identity contract as the owner  \n2. Setting a resolver in the\
    \ ENS registry for the new identity name (`\"john.myapp.test\"`)  \n3. Setting\
    \ the identity contract address in the resolver from the previous step  \n\nWe\
    \ will be using a *public resolver* for step 2 of the process. A public resolver\
    \ is a public contract that accepts requests for managing the records of any address,\
    \ but only from the owner of that address. This saves us the trouble of having\
    \ to deploy a custom resolver for our app."
  raw: '### Names Resolution


    A key part of making your application ENS-aware is to allow your users to enter
    ENS names wherever an address is required. Allowing users to input ENS names in
    your application instead of addresses helps abstracting the complexity of Ethereum
    addresses, which means one less concept your users need to grasp to start using
    your app. This is the equivalent of allowing your users to navigate to “google.com”
    by entering the domain name in their browser instead of forcing them to type in
    its IP address.


    As in DNS, translating from ENS names to addresses is a process called *resolution*
    (Listing [7-32](#476252_1_En_7_Chapter.xhtml#PC46)). Given the architecture of
    ENS, resolving a name is a two-step process: we first need to query the central
    ENS registry to obtain the address of the *resolver contract* for the name and
    then query the resolver to obtain the actual *address* for that name. Domain names
    also need to be normalized and hashed via a process called *namehash.*^([^(119)](#fn119))


    ```

    // 09-ens/01-resolve.js

    const ensAddr = ''0x314159265dd8dbb310642f98f50c066173c1259b'';

    async function resolve (domain) {

    let domainHash = namehash(domain);

    let ens = new web3.eth.Contract(ensABI, ensAddr);

    let resAddr = await ens.methods.resolver(domainHash).call();

    let resolver = new web3.eth.Contract(resolverABI, resAddr);

    return await resolver.methods.addr(domainHash).call();

    }

    Listing 7-32

    Resolving a domain name to an address using the central ENS registry on mainnet

    ```


    Since name resolution is a common operation, several libraries implement this
    operation out of the box. In particular, the official `ethereum-ens@0.7.6` javascript
    package provides bindings for most operations, making name resolution much simpler.


    ```

    $ let ens = new ENS(web3.eth.currentProvider);

    $ let domain = "ethereumfoundation.eth";

    $ await ens.resolver(domain).addr();

    > 0xfB6916095ca1df60bB79Ce92cE3Ea74c37c5d359

    ```


    Abstracting your users of Ethereum addresses also means that your application
    must use Ethereum names instead of raw addresses when displaying information.
    It is no good if your users enter a user-friendly Ethereum name, and your application
    answers with a plethora of 40-character hexadecimal strings.


    Reverse resolution is supported in ENS by querying a special “addr.reverse” domain,
    which maps from addresses to full Ethereum names. This domain is managed separately
    from “eth,” and users may choose not to register their addresses on it – so not
    every address with an Ethereum name will have a record for reverse resolution.


    ```

    $ address = ''0xfB6916095ca1df60bB79Ce92cE3Ea74c37c5d359'';

    $ await ens.reverse(address).name();

    > "ethereumfoundation.eth"

    ```


    ### Caution


    ENS does not enforce the correctness of reverse records; this means that anyone
    could register that their address maps to “ethereumfoundation.eth”. To protect
    against this, you should always run a forward name resolution on the result of
    a reverse resolution and verify that it matches the original address.


    ### Giving Names to Our Users


    ENS is a perfect match for smart accounts. Instead of requiring our users to remember
    the address of the smart contract that is their on-chain identity, we can allow
    them to assign it an Ethereum name.


    As in DNS, instead of having them purchase a second-level domain directly from
    a network information center (NIC) , we can allocate names within our own domain.
    Email is a good analogy of this and something users are accustomed to – most people
    have an email account with a provider, like john@gmail.com, instead of one managed
    by them, like hello@john.com. Similarly, in ENS, we can allocate a subdomain for
    each user of our application, like *john.myapp.eth*.


    To implement this, we need to set up our own registrar contract to manage our
    Ethereum domain and manage all subdomain registrations. We will use a simple FIFS
    (first-in first-served) registrar contract that will freely accept all subdomain
    registrations. Canonical implementations for this and other contracts we will
    be using can be found in the `@ensdomains/ens@0.3.5` and `@ensdomains/resolver@0.1.3`
    packages.


    The first step is to actually acquire a domain. While this is a non-trivial process
    on mainnet, ENS offers FIFS registrars for `.test` domains in the test networks,
    with the restriction that these registrations expire after 4 weeks. Let’s start
    by registering a test domain on the Rinkeby testnet (Listing [7-33](#476252_1_En_7_Chapter.xhtml#PC49)).


    ```

    // 09-ens/02-register.js

    let [owner, user] = await web3.eth.getAccounts();

    let ensAddress = ''0xe7410170f87102df0055eb195163a03b7f2bff4a'';

    let ens = new web3.eth.Contract(ensABI, ensAddress);

    // Get top-level registrar for test domains

    let testRegistrarAddress = await ens.methods

    .owner(namehash(''test'')).call();

    let testRegistrar = new web3.eth.Contract(

    fifsRegistrarABI, testRegistrarAddress);

    // Register our domain name under our account

    let name = ''myapp''; // try other names if already registered

    let domain = `${name}.test`;

    await testRegistrar.methods

    .register(hash(name), owner).send({ from: owner });

    Listing 7-33

    Registering the Ethereum domain “myapp.test” on Rinkeby. The hash function in
    this code snippet is keccak256

    ```


    We can now deploy our FIFS registrar contract, which will freely allocate subdomains
    of “myapp.test,” and transfer ownership of the domain to it.


    ```

    // Deploy new registrar contract

    let arguments = [ensAddress, namehash(domain)];

    let myRegistrar = await

    new web3.eth.Contract(fifsRegistrarABI)

    .deploy({ data: fifsRegistrarBytecode, arguments })

    .send({ from: owner });

    // Transfer ownership of our domain to our registrar

    await ens.methods

    let myRegistrarAddress = myRegistrar.options.address;

    .setOwner(namehash(domain), myRegistrarAddress)

    .send({ from: owner });

    ```


    We can now augment our identity contracts with a method to register themselves
    on ENS using this registrar (Listing [7-34](#476252_1_En_7_Chapter.xhtml#PC51)).
    This method takes three steps:


    1.  Registering a custom name (i.e., “john”) in our registrar and appointing the
    Identity contract as the owner


    2.  Setting a resolver in the ENS registry for the new identity name (“john.myapp.test”)


    3.  Setting the identity contract address in the resolver from the previous step


    We will be using a *public resolver* for step 2 of the process. A public resolver
    is a public contract that accepts requests for managing the records of any address,
    but only from the owner of that address. This saves us the trouble of having to
    deploy a custom resolver for our app.'
  trans: '

    ### 名称解析


    让您的应用程序支持 ENS 的关键一步是允许用户在需要输入地址的地方输入 ENS 名称。允许用户在应用中输入 ENS 名称而非地址，有助于抽象掉以太坊地址的复杂性，这意味着用户需要掌握的概念少了一个，从而能更快上手使用。这等同于允许用户通过在浏览器中输入域名来访问“google.com”，而不是迫使他们输入其
    IP 地址。


    与 DNS 一样，将 ENS 名称转换为地址的过程称为*解析*（列表 7-32）。鉴于 ENS 的架构，解析一个名称需要两步：首先，我们需要查询中央 ENS
    注册表，以获取该名称对应的*解析器合约*地址；然后，查询该解析器以获取该名称的真实*地址*。域名还需要通过一个称为 *namehash* 的过程进行标准化和哈希处理。^(¹¹⁹)


    ```javascript

    // 09-ens/01-resolve.js

    const ensAddr = ''0x314159265dd8dbb310642f98f50c066173c1259b'';

    async function resolve (domain) {

    let domainHash = namehash(domain);

    let ens = new web3.eth.Contract(ensABI, ensAddr);

    let resAddr = await ens.methods.resolver(domainHash).call();

    let resolver = new web3.eth.Contract(resolverABI, resAddr);

    return await resolver.methods.addr(domainHash).call();

    }

    ```


    *列表 7-32 – 使用主网上的中央 ENS 注册表将域名解析为地址*


    由于名称解析是一项常见操作，多个库已经实现了开箱即用的此功能。特别是官方的 `ethereum-ens@0.7.6` JavaScript 包为大多数操作提供了绑定，使得名称解析更加简单。


    ```javascript

    let ens = new ENS(web3.eth.currentProvider);

    let domain = "ethereumfoundation.eth";

    await ens.resolver(domain).addr();

    > 0xfB6916095ca1df60bB79Ce92cE3Ea74c37c5d359

    ```


    让您的用户无需了解以太坊地址也意味着，您的应用在显示信息时应该使用以太坊名称而非原始地址。如果您的用户输入了一个用户友好的以太坊名称，而您的应用却以一大堆
    40 字符的十六进制字符串作为回应，那将毫无意义。


    ENS 支持反向解析，方法是查询一个特殊的 `"addr.reverse"` 域，该域将地址映射到完整的以太坊名称。这个域与 `"eth"` 是分开管理的，用户可以选择不在此域上注册他们的地址——因此，并非每个拥有以太坊名称的地址都会有反向解析的记录。


    ```javascript

    address = ''0xfB6916095ca1df60bB79Ce92cE3Ea74c37c5d359'';

    await ens.reverse(address).name();

    > "ethereumfoundation.eth"

    ```


    ### 注意事项


    ENS 并不强制反向记录的正确性；这意味着任何人都可以注册声称他们的地址映射到 `"ethereumfoundation.eth"`。为防止这种情况，您应该始终对反向解析的结果执行一次正向名称解析，并验证它是否与原始地址匹配。


    ### 为我们的用户命名


    ENS 是智能账户的完美搭配。我们不需要让用户记住作为其链上身份的智能合约地址，而是可以允许他们为其分配一个以太坊名称。


    与 DNS 类似，我们无需让他们直接从网络信息中心（NIC）购买二级域名，而是可以在我们自己的域名下分配名称。电子邮件是一个很好的类比，也是用户习惯的方式——大多数人拥有一个由提供商管理的电子邮件账户，例如
    `john@gmail.com`，而不是一个由他们自己管理的账户，例如 `hello@john.com`。类似地，在 ENS 中，我们可以为应用的每个用户分配一个子域名，例如
    `john.myapp.eth`。


    要实现这一点，我们需要部署我们自己的注册商合约来管理我们的以太坊域名，并管理所有子域名的注册。我们将使用一个简单的 FIFS（先到先得）注册商合约，该合约将免费接受所有子域名注册。我们将使用的该合约以及其他合约的规范实现可以在
    `@ensdomains/ens@0.3.5` 和 `@ensdomains/resolver@0.1.3` 包中找到。


    第一步是实际获取一个域名。虽然这在主网上是一个复杂的过程，但 ENS 在测试网络上为 `.test` 域提供了 FIFS 注册商，其限制是这些注册会在 4
    周后过期。让我们首先在 Rinkeby 测试网上注册一个测试域（列表 7-33）。


    ```javascript

    // 09-ens/02-register.js

    let [owner, user] = await web3.eth.getAccounts();

    let ensAddress = ''0xe7410170f87102df0055eb195163a03b7f2bff4a'';

    let ens = new web3.eth.Contract(ensABI, ensAddress);

    // 获取测试域的顶层注册商

    let testRegistrarAddress = await ens.methods

    .owner(namehash(''test'')).call();

    let testRegistrar = new web3.eth.Contract(

    fifsRegistrarABI, testRegistrarAddress);

    // 在您的账户下注册我们的域名

    let name = ''myapp''; // 如果已注册，请尝试其他名称

    let domain = `${name}.test`;

    await testRegistrar.methods

    .register(hash(name), owner).send({ from: owner });

    ```


    *列表 7-33 – 在 Rinkeby 上注册以太坊域名 "myapp.test"。此代码片段中的 `hash` 函数是 `keccak256`*


    现在，我们可以部署我们的 FIFS 注册商合约，它将自由分配 `"myapp.test"` 的子域名，并将该域名的所有权转移给它。


    ```javascript

    // 部署新的注册商合约

    let arguments = [ensAddress, namehash(domain)];

    let myRegistrar = await

    new web3.eth.Contract(fifsRegistrarABI)

    .deploy({ data: fifsRegistrarBytecode, arguments })

    .send({ from: owner });

    // 将我们域名的所有权转移给我们的注册商

    let myRegistrarAddress = myRegistrar.options.address;

    await ens.methods

    .setOwner(namehash(domain), myRegistrarAddress)

    .send({ from: owner });

    ```


    现在，我们可以增强我们的身份合约，增加一个方法，让它们通过此注册商在 ENS 上注册自己（列表 7-34）。此方法包含三个步骤：


    1.  在我们的注册商中注册一个自定义名称（例如 `"john"`），并指定身份合约为所有者

    2.  在 ENS 注册表中为新的身份名称（`"john.myapp.test"`）设置一个解析器

    3.  在上一步的解析器中设置身份合约地址


    我们将使用一个*公共解析器*来完成此过程的第二步。公共解析器是一个公共合约，它接受管理任何地址记录的请求，但只能由该地址的所有者发起。这为我们免去了为此应用部署自定义解析器的麻烦。

    '
- fmt: '### Note


    An alternative is to add resolver methods to our identity contract and just let
    the identity return its own address upon a resolution request. However, this adds
    more complexity to our contract.


    ```

    // 09-ens/contracts/IdentityWithENS.sol

    contract IdentityWithENS is Identity {

    function registerENS(

    bytes32 _hashLabel, bytes32 _node,

    ENS ens, FIFSRegistrar registrar, PublicResolver resolver

    ) onlyUserAccount public {

    registrar.register(_hashLabel, address(this));

    ens.setResolver(_node, address(resolver));

    resolver.setAddr(_node, address(this));

    }

    }

    Listing 7-34

    Identity contract function for registering a name and mapping it to the identity
    itself using our custom registrar and a public resolver. Code adapted from the
    UniversalLoginSDK repository120

    ```


    Registering an identity contract on ENS is then just a matter of having our user
    call into this function from one of their external accounts (Listing [7-35](#476252_1_En_7_Chapter.xhtml#PC52)).
    Note that the owner of the registered name is set to be the identity itself, so
    the user ultimately retains control of what to do with their subdomain.


    ```

    const publicResolverAddress =

    ''0xb14fdee4391732ea9d2267054ead2084684c0ad8'';

    let userName = `john`;

    let userDomain = `${userName}.${domain}`;

    await identity.methods.registerENS(

    hash(userName),

    namehash(userDomain),

    ensAddress,

    myRegistrar.options.address,

    publicResolverAddress

    ).send({ from: user });

    Listing 7-35

    Registering an identity contract as john.myapp.test using our custom registrar
    and a Rinkeby public resolver

    ```


    Running this process for every new user allows them to refer to their identity
    using a friendly name provided by our application – a name that can be carried
    on to other applications and be used as a global Ethereum identity, handled by
    ENS.


    ## Summary


    We have gone through several tools and techniques for handling user onboarding
    and account management in general, making this one of the most content-heavy chapters
    in this book: fallback functions, forwarding contracts, single-use addresses,
    local accounts, mnemonics, smart accounts, upgradeability, meta transactions,
    native meta transactions, reserved deployment addresses, and Ethereum names, among
    others. All of these techniques help in different aspects of user onboarding,
    and their trade-offs make it difficult to settle for one solution that fits all
    use cases.


    Work on user onboarding is still a very active field of research in Ethereum,
    and new mechanics to add to your toolbelt are bound to be developed in the near
    future. At the time of this writing, it is worth highlighting the work being done
    under Universal Logins.^([^(121)](#fn121)) Universal Logins is a framework that
    creates smart accounts for users, managed by local accounts automatically generated
    on each device, with support for meta transactions, as well as ENS for allowing
    users to easily connect to their accounts. It also promotes subsidizing early
    user actions to ease onboarding and reward users in-app who go the extra mile
    to strengthen the security of their accounts.


    Whatever solution you implement, remember that the more steps a user must go through
    to start using your application, the more likely it is for them to drop. On the
    other hand, sacrificing security for usability is a huge risk, given that “the
    worst user experience is when people lose their crypto.”^([^(122)](#fn122)) Striking
    the perfect compromise between the two for the use case you are building is no
    easy feat.


