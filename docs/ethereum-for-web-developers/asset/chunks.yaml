- fmt: "### Note\n\n智能合约的代码是不可变的。这意味着，一旦部署，智能合约就无法更改。虽然这符合现实世界合约的原始软件概念，但也给开发带来了一些挑战。它使迭代开发变得特别困难，并且合约在推送到生产网络之前必须完全没有错误。这就是为什么智能合约的安全性如此关键：智能合约不仅位于公共网络中，任何攻击者都可以自由与之交互，而且如果发现漏洞，原始开发者也无法修补。如果这个限制的前景令人生畏，请不要担心，因为有一些变通方法（^([^(44)](#fn44))）可用于升级智能合约，即使其代码是不可变的。\n\
    \n所有以太坊代码都不是原生运行的，而是由以太坊节点在以太坊虚拟机（`EVM`）上执行。`EVM`执行一种低级的、基于栈的汇编语言，操作32字节的字（`word`），通常被称为*EVM汇编*。该汇编拥有用于传统算术和逻辑运算、基本控制流以及一些以太坊特定操作的操作码，例如访问存储（`storage`）和内存（`memory`），或查询和管理`ETH`余额。还有用于计算哈希值或处理椭圆曲线签名（^([^(45)](#fn45))）的原语。值得一提的是，`EVM`不支持浮点运算，所有操作都在用作定点小数的256位整数上完成，以最小化数值错误的风险。\n\
    \n### Note\n\n在撰写本文时，基于`WebAssembly`的第二个后端（名为`eWASM`）正在开发中，作为执行以太坊代码的替代环境。由于它基于现有的`WebAssembly`技术，因此可以利用已经可用的工具链和优化，而无需从头开始重新实现。以太坊节点预计将能够接受并执行上述两种格式的智能合约代码。\n\
    \n`EVM`的执行模型旨在以性能换取简单性。所有事务都按顺序执行（即一个接一个），并且始终在单个执行线程中。这使得对智能合约的推理变得更容易：当合约响应一个事务执行一段代码时，你可以确保它不会同时收到可能影响当前线程的另一个事务。\n\
    \n然而，由于合约可以调用其他合约，`EVM`确实允许*重入调用*。例如，如果合约`A`调用合约`B`，`B`可以在同一笔事务中回调`A`。重入性可能难以推理，并且已成为生态系统中一些重大黑客事件的根源。2016年著名的`The\
    \ DAO`黑客事件（该事件在决定将被黑用户资金归还后，促使链分叉为以太坊和以太坊经典）就是由重入性漏洞造成的：\n\n> *在对以太坊代码进行审查时需要特别小心，以确保任何转移价值的函数都发生在所有状态更新之后，否则这些状态值将必然容易受到重入攻击。*\n\
    > \n> `—`Phil Daian, “Analysis of the DAO exploit”^([^(46)](#fn46))\n\n### Note\n\
    \n与大多数平台一样，除非你正在处理某些特别晦涩的功能，否则很少会直接用汇编语言编写智能合约。有几种专门为智能合约构建的高级语言，可以编译成`EVM`代码。其中最流行的是`Solidity`，我们将在后续部分进行回顾。\n\
    \n智能合约中的状态由其存储（`storage`）和余额（`balance`）组成。后者是两者中最直接的：以太坊中所有地址类型，无论是外部拥有账户还是智能合约，都有一个以`ETH`计价的关联余额。以太坊提供了用于查询这些余额（既可以从智能合约内部，也可以从网络外部）以及轻松转移余额的原语。\n\
    \n至于智能合约中的存储空间，它是极其巨大的：一个由2^256个插槽（每个插槽32字节）组成的可寻址空间。然而，在`EVM`中写入存储非常昂贵，因此应始终谨慎使用。\n\
    \n由于存储使用成本高昂，`EVM`还提供了另一个256位可寻址的临时空间，称为*内存*，它相当于其他环境中的内存堆，并且保证在事务之间被清除。\n\n###\
    \ Gas用量\n\n在以太坊网络上执行代码需要消耗*gas*。智能合约运行的每项操作都会消耗预定义的`gas`量，其中更复杂的操作消耗的`gas`比简单的操作更多。总而言之，`gas`只是执行成本的一种度量，旨在防止以太坊上出现过于复杂的计算。由于每笔事务都需要由网络上的每个全节点执行以进行验证，因此保持它们尽可能简单至关重要。这也是为什么在区块链上创建新数据的操作（例如写入存储或创建新合约）是`gas`消耗最高的操作之一。\n\
    \n`gas`是如何获得的？该过程在每个事务上自动处理。每当用户发送新事务时，他们会指定一个*gas价格*，即`ETH`与`gas`之间的兑换率。事务运行后，会计算使用的`gas`总量，然后使用此`gas`价格将其转换为`ETH`，并从发送者的余额中扣除。请注意，`gas`价格没有要求，它可以几乎任意高或低。然而，`gas`价格非常高的事务发送成本将极其昂贵；另一方面，`gas`价格非常低的事务对矿工没有吸引力，并且很可能永远不会被包含在区块链中。"
  raw: "### Note\n\nThe code of a smart contract is immutable. This means that once\
    \ deployed, a smart contract cannot be changed. While this is in line with the\
    \ original concept of real-life contracts made software, it poses some challenges\
    \ around development. It makes iterative development particularly difficult, and\
    \ the contract must also be bug-free before being pushed to the production network.\
    \ This is why security in smart contracts is such a critical issue: not only are\
    \ smart contracts sitting in a public network where any attacker can freely interact\
    \ with them, but if a vulnerability is found, there is no way for the original\
    \ developer to patch it. If the prospect of this limitation seems daunting, fear\
    \ not, for there are workarounds^([^(44)](#fn44)) that can be used for upgrading\
    \ smart contracts even if their code is immutable.\n\nAll Ethereum code is not\
    \ run natively, but executed by Ethereum nodes on the Ethereum Virtual Machine,\
    \ or EVM. The EVM executes a low-level stack-based assembly that operates with\
    \ 32-byte words, typically referred to as *EVM assembly*. This assembly has opcodes\
    \ for traditional arithmetic and logic operations, basic control flow, and some\
    \ Ethereum-specific operations such as accessing storage and memory, or querying\
    \ and managing ETH balance. There are also primitives for computing hashes or\
    \ working with elliptic curve signatures.^([^(45)](#fn45)) It is worth mentioning\
    \ that the EVM has no support for floating-point arithmetic, and all operations\
    \ are done on 256-bit integers used as fixed point decimals, to minimize the risk\
    \ of numerical errors.\n\n### Note\n\nAt the time of this writing, a second back\
    \ end based on WebAssembly, named eWASM, is under development, as an alternative\
    \ environment for executing Ethereum code. Since it is based on existing WebAssembly\
    \ technology, it will be possible to leverage the toolchain and optimizations\
    \ already available instead of having to reimplement them from scratch. Ethereum\
    \ nodes will be expected to accept and execute smart contract code in either format.\n\
    \nThe execution model of the EVM is designed to favor simplicity over performance.\
    \ All transactions are executed in a serial fashion (i.e. one after the other)\
    \ and always in a single execution thread. This makes reasoning on smart contracts\
    \ much easier: while a contract is executing a piece of code in response to a\
    \ transaction, you can be sure that it will not receive a simultaneous transaction\
    \ that could affect the current thread.\n\nHowever, since contracts can call other\
    \ contracts, the EVM does allow *reentrant calls*. For instance, if contract A\
    \ calls contract B, nothing prevents B to call back into A during the same transaction.\
    \ Reentrancy can be tricky to reason about and has been the source of some major\
    \ hacks in the ecosystem. The famous DAO hack in 2016, which prompted the chain\
    \ to fork into Ethereum and Ethereum Classic when it was decided to return the\
    \ funds to the hacked users, was possible due to a reentrancy bug:\n\n> *Special\
    \ care is required in reviews of Ethereum code to make sure that any functions\
    \ moving value occur after any state updates whatsoever, otherwise these state\
    \ values will be necessarily vulnerable to reentrancy.*\n> \n> `—`Phil Daian,\
    \ “Analysis of the DAO exploit”^([^(46)](#fn46))\n\n### Note\n\nAs in most platforms,\
    \ it is rare that you will find yourself coding smart contracts directly in assembly,\
    \ unless you are working in some particularly obscure feature. There are several\
    \ high-level languages, built specifically for smart contracts, that compile to\
    \ EVM code. The most popular of them is Solidity, which we will review in the\
    \ upcoming sections.\n\nState in a smart contract is comprised of its storage\
    \ and balance. The latter is the most straightforward of the two: all address\
    \ types in Ethereum, regardless of being externally owned accounts or smart contracts,\
    \ have an associated balance in ETH. Ethereum provides primitives for querying\
    \ such balances (both from within a smart contract and from outside the network),\
    \ and for easily transferring it.\n\nAs for the storage space in a smart contract,\
    \ it is extremely large: it is an addressable space of 2^256 slots of 32 bytes\
    \ each. However, writing to storage in the EVM is very costly, so it should always\
    \ be used with care.\n\nSince storage usage is expensive, the EVM also provides\
    \ another 256-bit-addressable transient space called the *memory*, which is equivalent\
    \ to a memory heap in other environments, and is guaranteed to be cleared in-between\
    \ transactions.\n\n### Gas Usage\n\nExecuting code in the Ethereum network costs\
    \ *gas*. Every operation run by a smart contract consumes a predefined amount\
    \ of gas, where more complex operations consume more gas than simpler ones. All\
    \ in all, gas is just a measure of execution cost, designed to prevent excessively\
    \ complex computations on Ethereum. Since every transaction needs to be executed\
    \ by every full node on the network to verify it, it is critical to keep them\
    \ as simple as possible. This is also why operations that create new data on the\
    \ blockchain, such as writing to storage or creating a new contract, are among\
    \ the most costly ones in terms of gas.\n\nHow is gas obtained? The process is\
    \ handled automatically on every transaction. Whenever a user sends a new transaction,\
    \ they specify a *gas price*, which is the conversion rate between ETH and gas.\
    \ After the transaction is run, the total amount of gas used is calculated, which\
    \ gets converted to ETH using this gas price, and then deducted from the sender’s\
    \ balance. Note that there are no requirements on gas price, and it can be nearly\
    \ arbitrarily high or low. However, transactions with a very high gas price will\
    \ be extremely costly to send; on the other hand, transactions with a very low\
    \ gas price will be unattractive to miners, and will most likely never be included\
    \ in the blockchain."
