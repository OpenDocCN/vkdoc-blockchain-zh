  trans: '

    ## 摘要


    像 `Bitcoin` 或 `Ethereum` 这样的公共区块链，传统上为了去信任化和安全性而牺牲了性能。虽然目前有多项工作致力于构建 `Ethereum
    2.0`（其中包括有助于网络扩容的分片机制），但有趣的是，我们看到许多解决方案正在现有基础设施之上萌芽，以解决可扩展性问题。


    本章介绍的一些解决方案，例如早期版本的 `plasma` 或 `state channels`，目前已准备就绪并投入生产，帮助现实应用突破主 `Ethereum`
    网络的性能极限。


    这些解决方案不仅能让你的应用获得更高的交易吞吐量，还能用于整体上提供更好的用户体验。如果双方行为得当，`Channels` 可以为点对点交易提供即时最终性，而无需等待数十次确认。`Sidechains`
    则能提供远低于主网络的可靠出块时间，并且燃料费显著更低。


    这些技术甚至可以组合使用：你可以在侧链中的各方之间设置 `state channels`，甚至将通道本身作为 `plasma chain` 中实际交易的资产。这里的可能性是无限的。


    如何利用这些解决方案，并将其呈现给用户（或对用户隐藏），将取决于你正在构建的内容。请记住用户对你的应用的需求，并利用你手头可用的构建模块，来创造最佳体验。


