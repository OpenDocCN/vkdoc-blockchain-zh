    transactions. Having them running their own nodes is still out of the question.


    As such, and in order to help the Ethereum adoption process easier, there are
    a number of *public nodes* available. An Ethereum node is said to be a public
    node when it holds no private keys, is available to the public, and is used to
    answer blockchain queries and relay pre-signed transactions.


    In particular, **Infura** (Japanese for “infrastructure”) is a service that provides
    HTTP and websocket endpoints to public full nodes for the Ethereum Mainnet, as
    well as for the Kovan, Ropsten, and Rinkeby testnets. Due to its reliability,
    and to the fact that it is free to use, it is widely used by many decentralized
    apps and wallets.


    ### The JSON-RPC Interface


    All Ethereum nodes, regardless of the particular implementation, expose a set
    of well-known methods, which compose the *JSON-RPC interface*. As the name implies,
    this is a JSON-based API for executing remote procedure calls, and constitutes
    the low-level interface for a client to interact with a node. Common methods include
    `call`, `sendTransaction`, `getBlockByNumber`, `accounts`, or `getBalance`. There
    are even methods for querying the state of the node itself, such as whether its
    syncing or how many peers it is connected to.


    ### Note


    Given it is a low-level interface, it is odd that you will find yourself building
    JSON-RPC calls manually. Most libraries (such as web3.js or ethers.js) will take
    care of generating the calls on your behalf and provide you with the responses.
    Nevertheless, it is always useful to understand what is going on under the hood
    in case you stumble upon a dreadful abstraction leakage.


    It is worth mentioning that certain nodes may not implement all methods. For instance,
    the Infura HTTP endpoint does not offer costly operations such as `newFilter`
    (more on filters later in this chapter). This will be important to keep in mind
    when we discuss how to connect our app to the Ethereum network.'
  trans: '

    ## 本章小结


    在本章中，我们介绍了什么是智能合约，以及它如何由代码和状态组成，从而区别于外部拥有账户。我们回顾了什么是交易、交易的生命周期，以及交易如何与智能合约交互并可能修改其状态——这与静态调用（用于查询合约但不修改合约）相反。我们还介绍了一些概念，例如燃料用量和价格，这些对于向网络发送交易的客户端来说尤为重要。


    我们还学习了 Solidity 作为编写智能合约的高级编程语言。Solidity 的基本单元是合约，它由状态变量和函数组成，函数可以通过修饰符进行修饰，并可能触发事件。Solidity
    合约可以继承自多个其他合约，或者包含库，以此实现代码的模块化。这个介绍远未涵盖所有 Solidity 概念，并且遗漏了开发生产级智能合约代码时至关重要的几个安全见解，但足以让你理解智能合约并能够编写小型系统。


    最后，我们回顾了智能合约中最常用的两个构建模块——由 `ERC20` 和 `ERC721` 定义的通证。它们分别代表了同质化通证和数字收藏品，大多数应用都基于其中之一（或两者）运行。


    总的来说，本章的主要目标并非让你成为智能合约开发专家，而是理解一些关键概念，这些概念在开发由这些合约支撑的 Web 应用时会非常有用。


    # 4. 查询网络


    在关于编写智能合约的“不那么简短”的插曲之后，我们将回顾连接到以太坊网络以检索数据的不同方式。我们将涵盖不同的连接方法以及监听变化的模式，并在一个用于监控
    `ERC20` 通证转账的示例应用中将其整合在一起。


    ## 连接到网络


    从网络检索数据的第一步，实际上是连接到一个以太坊节点。由于 Web 应用不直接连接到网络，它们需要依赖一个节点来回答关于区块链状态的任何查询。我们将从回顾节点类型、连接方法和
    Provider 对象开始。


    ### 关于全节点和轻节点


    一个典型的以太坊节点是 `Geth` 或 `Parity` 实例⁵⁹，它拥有区块链的（部分或全部）副本，能够回答来自客户端（例如 DApp）的查询，并转发交易（更多内容将在下一章介绍）。拥有完整区块链副本的节点称为*全节点*。这些节点要么拥有区块链历史中的所有数据，要么可以重新计算这些数据。大多数客户端默认以这种模式运行。


    全节点也可能存储所有历史数据。这些节点被称为*归档节点*，由于支持它们需要大量的磁盘空间——在撰写本文时接近 2TB——因此它们要稀少得多。当你需要查询旧区块中的特定信息，例如一年前某个合约的状态或某个账户的余额时，就需要用到归档节点。


    作为全节点的替代方案，一些节点可能以*轻客户端*模式运行。这些节点只保存区块头，并按需从网络请求信息。它们运行起来比全节点轻量得多，因此适合移动设备，但作为
    DApp 的后端则不是很好的选择，因为查询的解析时间会更长。


    #### Infura 和公共节点


    关于节点的下一个问题是，哪些节点可供我们的应用程序使用。在理想的去中心化场景中，每个用户都应该运行自己的完整以太坊节点，以便自行验证所有交易，并避免信任第三方。移动设备或物联网设备上的用户可能会选择运行轻节点，这些节点会信任其他节点来转发信息，但无论如何仍会进行验证。


    在当前的格局下，我们用户中只有一小部分会真正运行以太坊节点。大多数用户还只是在学习以太坊是什么，并想知道如何购买他们的第一个 ETH 来支付燃料费，以启动他们的初始交易。让他们运行自己的节点目前还不可行。


    因此，为了帮助简化以太坊的采用过程，有许多*公共节点*可用。当一个以太坊节点不持有私钥、向公众开放、并用于回答区块链查询和转发预签名交易时，它就被称为公共节点。


    特别地，**Infura**（日语中“基础设施”的意思）是一项服务，它为以太坊主网以及 Kovan、Ropsten 和 Rinkeby 测试网提供 HTTP
    和 WebSocket 端点，连接到公共全节点。由于其可靠性以及免费使用的特性，它被许多去中心化应用和钱包广泛使用。


    ### JSON-RPC 接口


    所有以太坊节点，无论其具体实现如何，都公开一组众所周知的方法，这些方法构成了 *JSON-RPC 接口*。顾名思义，这是一个基于 JSON 的 API，用于执行远程过程调用，并构成了客户端与节点交互的底层接口。常见的方法包括
    `call`、`sendTransaction`、`getBlockByNumber`、`accounts` 或 `getBalance`。甚至还有用于查询节点本身状态的方法，例如其是否正在同步或连接了多少个对等节点。


    ### 注意


    鉴于它是一个底层接口，你不太可能需要手动构建 JSON-RPC 调用。大多数库（例如 `web3.js` 或 `ethers.js`）会替你生成调用并提供响应。不过，了解底层的工作原理总是有好处的，以防你遇到令人头疼的抽象泄漏问题。


    值得一提的是，某些节点可能没有实现所有方法。例如，Infura HTTP 端点不提供诸如 `newFilter`（本章稍后将详细介绍过滤器）之类的开销较大的操作。当我们在讨论如何将应用连接到以太坊网络时，记住这一点很重要。

    '
- fmt: '### Connection Protocols


    There are three different protocols that can be used as a transport for interchanging
    JSON-RPC messages. Nodes can be configured to handle any of them.


    The **HTTP** protocol is the simplest one. It provides a simple HTTP-based interface
    for POSTing JSON messages. Certain nodes may be set up behind HTTPS-encrypted
    connections, and may require basic authentication to access them. A simple HTTPS
    connection string looks like the following:


    ```

    "https://user:password@example.com:8545/"

    ```


    A more interesting alternative is the **websocket** protocol. A websocket connection
    is a persistent two-way connection between a client and a server. This allows
    a client to not only perform all the available JSON-RPC calls but also to subscribe
    to changes that are pushed from the node to the client (more on this later). Like
    HTTP connections, websockets may also be established over SSL, and potentially
    include basic authentication:


    ```

    "wss://user:password@example.com:8545/ws"

    ```


    Finally, the **IPC** (inter-process communication) protocol is based on a local
    UNIX domain socket created by the node. Clients with access to the socket may
    connect to it via its filename. These connections are meant to be used by processes
    with access to the same filesystem as the node, and as such are not used on web
    apps.


    ```

    "ipc://home/ubuntu/.ethereum/geth.ipc"

    ```


    ### Alternative APIs


    As an alternative to establishing a connection to the JSON-RPC interface of a
    node, you may opt to query blockchain data from a different source.


    **Etherscan** (etherscan.io) is a centralized service that provides not only a
    web-based blockchain explorer where you can visually check all transactions sent
    to and from an account but also a plain HTTP API (Listing [4-1](#476252_1_En_4_Chapter.xhtml#PC4))
    that implements many of the methods present in the JSON-RPC interface.


    ```

    # Etherscan API

    curl "https://api.etherscan.io/api

    ?module=proxy

    &action=eth_getTransactionCount

    &address=$ADDRESS

    &tag=latest

    &apikey=YourApiKeyToken"

    # Regular JSON-RPC call

    {"jsonrpc":"2.0"

    ,"method":"eth_getTransactionCount"

    ,"params":["$ADDRESS","latest"]

    ,"id":1}

    Listing 4-1

    Example of executing a getTransactionCount call to the etherscan API (preceding)
    vs. the standard JSON-RPC call (following). Both return the same JSON object as
    a response

    ```


    Certain javascript libraries, such as `ethers.js`, even include *provider* objects
    that abstract a connection to the Etherscan API, so it can be used seamlessly
    as any other standard JSON-RPC connection. Let’s now go into the role of the provider.


    ### Note

    We are not dwelling into domain-specific APIs at this point. A project may decide
    to offer an API to query relevant data from its domain. You may also choose to
    set up a centralized server that aggregates blockchain data from your protocol,
    and relays it to client-side apps.


    ### The Provider Object


    As we briefly saw in Chapter [2](#476252_1_En_2_Chapter.xhtml) while building
    our first sample DApp, the connection to a node is managed by a *provider* javascript
    object. It is the provider’s responsibility to abstract the connection protocol
    being used and offer a minimal interface for sending JSON-RPC messages and subscribing
    to notifications.


    ### Note

    At the moment of this writing, providers from different libraries have slightly
    different APIs. There is an effort to standardize the minimal provider as EIP
    1193, but is still a draft.


    For example, the `web3` javascript library^([^(60)](#fn60)) offers the following
    providers for connecting to HTTP, websocket, or IPC interfaces (Listing [4-2](#476252_1_En_4_Chapter.xhtml#PC5)).
    The provider is then used to initialize an instance of the full `web3` object.


    ```

    const Web3 = require(''web3'');

    const httpProvider = new

    Web3.providers.HttpProvider("https://example.com");

    const wsProvider = new

    Web3.providers.WebsocketProvider("wss://example.com");

    const ipcProvider = new

    Web3.providers.IpcProvider("/home/ubuntu/.ethereum/geth.ipc");

    const web3 = new Web3(provider);

    Listing 4-2

    Example web3@1.2.0 code for creating a provider and initializing a web3 instance

    ```


    You will only need to create a provider instance if you have to manually set up
    a connection to a node. In most scenarios, you will actually delegate this responsibility
    to the user’s web3-enabled browser.


    #### Metamask and Web3-enabled Browsers


    After Chapter [2](#476252_1_En_2_Chapter.xhtml), you should now be familiar with
    Metamask , the browser extension that acts as a bridge for a web application and
    the Ethereum network. There are other options as well, such as the Cipher or the
    Opera browsers for Android, though we will focus on Metamask throughout the book,
    as it is the most widespread tool at the moment.


    Web3-enabled browsers work by injecting a *provider* instance in the global scope.
    How this provider works or how it is backed should not be of importance for your
    DApp. The DApp should be able to query whichever information it needs and let
    the provider resolve it.


    Note that this provider may need to be *enabled* in order to gain access to the
    user’s accounts or request to sign transactions (Listing [4-3](#476252_1_En_4_Chapter.xhtml#PC6)),
    which will prompt the user to accept a request from the DApp to access his accounts
    information.


    ```

    // Metamask injects the web3 provider as window.ethereum

    const Web3 = require(''web3'');

    const provider = window.ethereum;

    if (provider) {

    try {

    // Request access to querying the accounts of the user

    await provider.enable();

    } catch (error) {

    // User denied account access, but we can still

    // run queries to the network

    }

    const web3 = new Web3(provider);

    }

    Listing 4-3

    Snippet for instantiating a web3 object using a provider injected by Metamask

    ```


    Metamask connects by default to the Infura public servers via HTTPS. This allows
    any user who has downloaded the extension to have a connection to the Ethereum
    network up and running right away, without needing to maintain and sync their
    own nodes. Nevertheless, Metamask also allows advanced users to set up their own
    custom connections to other nodes, such as their own (Figures [4-1](#476252_1_En_4_Chapter.xhtml#Fig1)
    and [4-2](#476252_1_En_4_Chapter.xhtml#Fig2)).


    ![../images/476252_1_En_4_Chapter/476252_1_En_4_Fig2_HTML.jpg](images/476252_1_En_4_Chapter/476252_1_En_4_Fig2_HTML.jpg)


    Figure 4-2

    Metamask control for choosing the node to connect to, displayed when clicking
    the network drop-down at the top of the extension dialog. The first four are connections
    to public nodes hosted by Infura


    ![../images/476252_1_En_4_Chapter/476252_1_En_4_Fig1_HTML.jpg](images/476252_1_En_4_Chapter/476252_1_En_4_Fig1_HTML.jpg)


    Figure 4-1

    Metamask settings tab allows a user to configure their own connection to a node


    #### Subproviders


    Certain web3 providers may also be composed of *subproviders*. A subprovider is
    a non-standard object that intercepts calls made via the provider. Among other
    uses, subproviders help provide a common interface by filling in any gaps in the
    feature set of the Ethereum node being used. In this sense, subproviders act as
    polyfills hidden within the provider.


    As an example, a provider that connects to a node that does not offer the *filters*
    API (used for polling for specific changes) may include a *filter subprovider*
    that emulates that feature client-side. Such is the case with the web3 provider
    injected by Metamask: since Infura does not offer the filters API, Metamask adds
    that feature at the provider level via a custom subprovider. This way, you as
    a developer do not need to worry about which APIs are supported, and are given
    a consistent interface regardless of the node answering your queries.


    We will revisit subproviders in the next chapter, where we discuss about providers
    and signers, since Metamask implements its signer as another subprovider.'
