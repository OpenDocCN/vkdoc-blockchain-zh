    # 一个示例 DApp


    在本章中，我们将从头开始构建一个完整的 DApp。虽然我们不会深入探讨每个步骤的细节，但本章将帮助你识别构建去中心化应用所涉及的所有组件。在接下来的章节中，我们将重点讲解每个不同的部分，但你可以随时回顾这些页面，以理解每个部分在整体架构中的位置。


    ## 关于我们的 DApp


    我们将创建一个实现为 DApp 的全局**计数器**。用户应该能够查看计数器的值，并通过发送交易来递增它。尽管这个应用没有实际用途，但它将有助于我们逐一了解
    DApp 的各个组件。

    '
- fmt: "### Our Requirements\n\nOur application will hold a single counter as its\
    \ state, and allow any Ethereum user to increase it through a transaction. At\
    \ the same time, any user accessing the DApp should be able to see real-time updates\
    \ to the counter's value.\n\nThe application will not manage any ETH at all and\
    \ will not have any kind of access control. As long as a user can reach the DApp,\
    \ they should be able to freely interact with it.\n\n### The Smart Contract\n\n\
    Ethereum smart contracts are small programs deployed in the Ethereum blockchain.\
    \ Every contract has its own code and internal state. In this application, we\
    \ will store the counter's value in the contract's state. The contract will also\
    \ provide a getter for any client to easily query its value, as well as a method\
    \ to increase it by sending a transaction to the contract (Listing [2-1](#476252_1_En_2_Chapter.xhtml#PC1)).\n\
    \n```\npragma solidity ^0.5.0;\ncontract Counter {\n    uint256 public value;\n\
    \    function increase() public {\n        value = value + 1;\n    }\n}\n```\n\
    \nThe smart contract should also provide an *event* for clients to listen for\
    \ real-time updates to its state (Listing [2-2](#476252_1_En_2_Chapter.xhtml#PC2)).\
    \ Every transaction in Ethereum may optionally fire one or more events, and a\
    \ client can subscribe to a particular set of them, as a means to be notified\
    \ of any changes to a contract.\n\n```\npragma solidity ^0.5.0;\ncontract Counter\
    \ {\n    uint256 public value;\n    event Increased(uint256 newValue);\n    function\
    \ increase() public {\n        value = value + 1;\n        emit Increased(value);\n\
    \    }\n}\n```\n\nNow, this implementation shows all the basic ways in which a\
    \ smart contract provides an interface for a client to interact with it:\n\n-\
    \ A `getter` to query the internal state of the contract, `value`. It is autogenerated\
    \ by the use of the `public` keyword when declaring the field. Querying a contract\
    \ is fast and does not involve sending a transaction, and so it does not require\
    \ gas or even having an Ethereum account.\n- A function to modify the state of\
    \ the contract, `increase`. These functions require a transaction to be sent,\
    \ which require ETH to be executed. As such, they require having a funded account.\n\
    - The `Increased` event, to listen for updates to the contract state. Any client\
    \ can request to subscribe to a set of events from a contract, to get notifications\
    \ of any changes to it.\n\nWe will go into detail on smart contracts in the next\
    \ chapter. For now, these concepts will do in order to build our DApp.\n\n###\
    \ The Architecture\n\nWe will build a traditional DApp for this example. The application\
    \ will be backed by a smart contract in the Ethereum network, which will act as\
    \ a distributed database for the Dapp's users. The front-end will be set up as\
    \ a regular client-side javascript application.\n\nFor the glue between the javascript\
    \ front-end and the Ethereum network, we will rely on a web3-enabled web browser.\
    \ This is a kind of browser that allows the user to connect not only to the Internet\
    \ but also to the Ethereum network via a node of their own choice. It also manages\
    \ the user's private keys and transaction signing.\n\nThe most popular web3-enabled\
    \ browser is MetaMask,^([(31)](#fn31)) which is not a browser per se but a plugin,\
    \ that provides all the required features. MetaMask keeps track of the user private\
    \ keys, allows connections to a list of predefined nodes or to a custom one, and\
    \ prompts the user to accept any transaction that the current page is trying to\
    \ send on their behalf.\n\nFrom the developer's perspective, MetaMask injects\
    \ a global connection provider to an Ethereum node, and intercepts all transactions\
    \ for signing them with its own keys.\n\n### Setting Up the Environment\n\nBefore\
    \ we start building the DApp, we will set up our development environment, as well\
    \ as the required tools for interacting with and testing our DApp.\n\n#### Development\
    \ Toolchain\n\nThe basic setup for our development environment will be the one\
    \ required to build a simple client-side-only javascript application. Make sure\
    \ to have `nodejs` and `npm` installed^([(32)](#fn32)) on your development machine\
    \ to get started.\n\nWe will jumpstart our application by relying on the `create-react-app`\
    \ package. This is a package, provided by the Facebook development team, that\
    \ initializes a new preconfigured React web application. This will allow us to\
    \ save most of the setup time and focus on building the DApp.\n\n```\nnpm init\
    \ react-app counter-app\n```\n\nAs for the Ethereum-specific libraries, while\
    \ there are many development frameworks available, we will stick to the bare minimum\
    \ for this example. The only Ethereum-related javascript library we will be using\
    \ is `web3.js`.^([(33)](#fn33)) This is a library whose development is backed\
    \ by the Ethereum foundation and is regarded by many as the de facto canonical\
    \ library.\n\n```\nnpm install web3@1.2.0\n```\n\nRegarding the Ethereum build\
    \ toolchain, we will again focus on the minimum set of tools needed. First we\
    \ will install the Solidity compiler, in order to compile the smart contracts.^([(34)](#fn34))\
    \ Make sure you install version 0.5.0 or above.\n\n```\n$ solc ––version\nsolc,\
    \ the solidity compiler commandline interface\nVersion: ...\n```\n\nThen, in order\
    \ to set up automated tests for our application, we will install `ganache`. `Ganache`\
    \ is a process that exposes a similar interface to an Ethereum node and simulates\
    \ an entire Ethereum blockchain by itself. It is particularly useful in development\
    \ environments or for running unit tests.\n\n```\nnpm install -g ganache-cli\n\
    ```\n\nBy default, `ganache` immediately mines a new block for every transaction\
    \ sent, eliminating the time to wait until a transaction is confirmed. This makes\
    \ it easy for using it as a back end while coding, but keep in mind that a `ganache`\
    \ environment will be drastically different, especially in terms of user experience,\
    \ to a real one.\n\n#### Web3 Browser\n\nWe will now set up a web3-enabled browser,\
    \ using MetaMask. Remember that there are other web3-ready browsers, but at the\
    \ time of this writing, MetaMask is the most popular way to interact with DApps.\n\
    \nStart out by installing the MetaMask plugin^([(35)](#fn35)) for your browser\
    \ – it supports Chrome, Firefox, Opera, and Brave. After installation, MetaMask\
    \ will prompt you to create a password to encrypt your accounts and will present\
    \ you with the secret backup phrase. Make sure to write down this phrase: in the\
    \ event that you lose your MetaMask wallet, you can regenerate it using this phrase.\
    \ Otherwise, all funds contained in it will be irremediably lost."
  raw: '### Our Requirements


    Our application will hold a single counter as its state, and allow any Ethereum
    user to increase it through a transaction. At the same time, any user accessing
    the DApp should be able to see real-time updates to the counter’s value.


    The application will not manage any ETH at all and will not have any kind of access
    control. As long as a user can reach the DApp, they should be able to freely interact
    with it.


    ### The Smart Contract


    Ethereum smart contracts are small programs deployed in the Ethereum blockchain.
    Every contract has its own code and internal state. In this application, we will
    store the counter’s value in the contract’s state. The contract will also provide
    a getter for any client to easily query its value, as well as a method to increase
    it by sending a transaction to the contract (Listing [2-1](#476252_1_En_2_Chapter.xhtml#PC1)).


    ```

    pragma solidity ^0.5.0;

    contract Counter {

    uint256 public value;

    function increase() public {

    value = value + 1;

    }

    }

    Listing 2-1

    Initial implementation of the smart contract backing our sample DApp

    ```


    The smart contract should also provide an *event* for clients to listen for real-time
    updates to its state (Listing [2-2](#476252_1_En_2_Chapter.xhtml#PC2)). Every
    transaction in Ethereum may optionally fire one or more events, and a client can
    subscribe to a particular set of them, as a means to be notified of any changes
    to a contract.


    ```

    pragma solidity ^0.5.0;

    contract Counter {

    uint256 public value;

    event Increased(uint256 newValue);

    function increase() public {

    value = value + 1;

    emit Increased(value);

    }

    }

    Listing 2-2

    Updated implementation to emit an event every time the increase method is invoked

    ```


    Now, this implementation shows all the basic ways in which a smart contract provides
    an interface for a client to interact with it:


    *   A `getter` to query the internal state of the contract, `value`. It is autogenerated
    by the use of the `public` keyword when declaring the field. Querying a contract
    is fast and does not involve sending a transaction, and so it does not require
    gas or even having an Ethereum account.


    *   A function to modify the state of the contract, `increase`. These functions
    require a transaction to be sent, which require ETH to be executed. As such, they
    require having a funded account.


    *   The `Increased` event, to listen for updates to the contract state. Any client
    can request to subscribe to a set of events from a contract, to get notifications
    of any changes to it.


    We will go into detail on smart contracts in the next chapter. For now, these
    concepts will do in order to build our DApp.


    ### The Architecture


    We will build a traditional DApp for this example. The application will be backed
    by a smart contract in the Ethereum network, which will act as a distributed database
    for the Dapp’s users. The front-end will be set up as a regular client-side javascript
    application.


    For the glue between the javascript front-end and the Ethereum network, we will
    rely on a web3-enabled web browser. This is a kind of browser that allows the
    user to connect not only to the Internet but also to the Ethereum network via
    a node of their own choice. It also manages the user’s private keys and transaction
    signing.


    The most popular web3-enabled browser is MetaMask,^([^(31)](#fn31)) which is not
    a browser per se but a plugin, that provides all the required features. MetaMask
    keeps track of the user private keys, allows connections to a list of predefined
    nodes or to a custom one, and prompts the user to accept any transaction that
    the current page is trying to send on their behalf.


    From the developer’s perspective, MetaMask injects a global connection provider
    to an Ethereum node, and intercepts all transactions for signing them with its
    own keys.


    ### Setting Up the Environment


    Before we start building the DApp, we will set up our development environment,
    as well as the required tools for interacting with and testing our DApp.


    #### Development Toolchain


    The basic setup for our development environment will be the one required to build
    a simple client-side-only javascript application. Make sure to have nodejs and
    npm installed^([^(32)](#fn32)) on your development machine to get started.


    We will jumpstart our application by relying on the `create-react-app` package.
    This is a package, provided by the Facebook development team, that initializes
    a new preconfigured React web application. This will allow us to save most of
    the setup time and focus on building the DApp.


    ```

    npm init react-app counter-app

    ```


    As for the Ethereum-specific libraries, while there are many development frameworks
    available, we will stick to the bare minimum for this example. The only Ethereum-related
    javascript library we will be using is `web3.js`.^([^(33)](#fn33)) This is a library
    whose development is backed by the Ethereum foundation and is regarded by many
    as the de facto canonical library.


    ```

    npm install web3@1.2.0

    ```


    Regarding the Ethereum build toolchain, we will again focus on the minimum set
    of tools needed. First we will install the Solidity compiler, in order to compile
    the smart contracts.^([^(34)](#fn34)) Make sure you install version 0.5.0 or above.


    ```

    $ solc ––version

    solc, the solidity compiler commandline interface

    Version: ...

    ```


    Then, in order to set up automated tests for our application, we will install
    ganache. Ganache is a process that exposes a similar interface to an Ethereum
    node and simulates an entire Ethereum blockchain by itself. It is particularly
    useful in development environments or for running unit tests.


    ```

    npm install -g ganache-cli

    ```


    By default, ganache immediately mines a new block for every transaction sent,
    eliminating the time to wait until a transaction is confirmed. This makes it easy
    for using it as a back end while coding, but keep in mind that a ganache environment
    will be drastically different, especially in terms of user experience, to a real
    one.


    #### Web3 Browser


    We will now set up a web3-enabled browser, using MetaMask. Remember that there
    are other web3-ready browsers, but at the time of this writing, MetaMask is the
    most popular way to interact with DApps.


    Start out by installing the MetaMask plugin^([^(35)](#fn35)) for your browser –
    it supports Chrome, Firefox, Opera, and Brave. After installation, MetaMask will
    prompt you to create a password to encrypt your accounts and will present you
    with the secret backup phrase. Make sure to write down this phrase: in the event
    that you lose your MetaMask wallet, you can regenerate it using this phrase. Otherwise,
    all funds contained in it will be irremediably lost.'
  trans: "\n### 我们的需求\n\n我们的应用程序将仅维护一个计数器作为其状态，并允许任何以太坊用户通过交易来增加它。同时，任何访问该去中心化应用（DApp）的用户都应能够实时看到计数器数值的更新。\n\
    \n该应用程序完全不管理任何以太币（ETH），也不设置任何访问控制。只要用户能够访问 DApp，他们就可以自由地与之交互。\n\n### 智能合约\n\n\
    以太坊智能合约是部署在以太坊区块链上的小型程序。每个合约都有自己的代码和内部状态。在本应用中，我们将把计数器的数值存储在合约的状态中。合约还将提供一个获取函数（getter），供任何客户端轻松查询其数值，以及一个通过向合约发送交易来增加数值的方法（列表\
    \ 2-1）。\n\n```\npragma solidity ⁰.5.0;\ncontract Counter {\n    uint256 public\
    \ value;\n    function increase() public {\n        value = value + 1;\n    }\n\
    }\n```\n\n智能合约还应提供一个*事件*，供客户端监听其状态的实时更新（列表 2-2）。以太坊中的每笔交易都可以选择触发一个或多个事件，客户端可以订阅特定的事件集，以此作为接收合约状态变更通知的方式。\n\
    \n```\npragma solidity ⁰.5.0;\ncontract Counter {\n    uint256 public value;\n\
    \    event Increased(uint256 newValue);\n    function increase() public {\n  \
    \      value = value + 1;\n        emit Increased(value);\n    }\n}\n```\n\n现在，这个实现展示了智能合约为客户端提供交互接口的所有基本方式：\n\
    \n- 一个`获取函数`（getter），用于查询合约的内部状态`value`。该函数是通过在声明字段时使用`public`关键字自动生成的。查询合约速度很快，且无需发送交易，因此不需要燃料费（gas），甚至不需要拥有以太坊账户。\n\
    - 一个修改合约状态的函数`increase`。这些函数需要发送交易，执行交易需要消耗以太币（ETH）。因此，它们需要有一个已充值的账户。\n- 事件`Increased`，用于监听合约状态的更新。任何客户端都可以请求订阅合约中的一组事件，以获取合约的任何变更通知。\n\
    \n我们将在下一章详细介绍智能合约。目前，这些概念足以帮助我们构建 DApp。\n\n### 架构\n\n我们将在本示例中构建一个传统的 DApp。该应用程序将以以太坊网络中的智能合约作为后端，该合约充当\
    \ DApp 用户的分布式数据库。前端将作为一个常规的客户端 JavaScript 应用程序来搭建。\n\n为了连接 JavaScript 前端和以太坊网络，我们将依赖一个支持\
    \ web3 的网页浏览器。这种浏览器允许用户不仅连接到互联网，还可以通过自己选择的节点连接到以太坊网络。它还管理用户的私钥和交易签名。\n\n最流行的支持\
    \ web3 的浏览器是 MetaMask^((31))，它本身并非浏览器，而是一个插件，提供了所有必需的功能。MetaMask 负责跟踪用户的私钥，允许连接预定义的节点列表或自定义节点，并提示用户接受当前页面代表他们发送的任何交易。\n\
    \n从开发者的角度来看，MetaMask 会向以太坊节点注入一个全局的连接提供者，并拦截所有交易，使用自己的密钥对其进行签名。\n\n### 设置环境\n\n\
    在开始构建 DApp 之前，我们将设置开发环境，以及与 DApp 交互和测试所需的工具。\n\n#### 开发工具链\n\n我们开发环境的基本配置将是构建一个简单的纯客户端\
    \ JavaScript 应用程序所需的配置。确保你的开发机器上已经安装了 `nodejs` 和 `npm`^((32)) 才能开始。\n\n我们将依赖 `create-react-app`\
    \ 包来快速启动我们的应用程序。这是由 Facebook 开发团队提供的一个包，用于初始化一个新的预配置的 React Web 应用程序。这将帮助我们节省大部分设置时间，并专注于构建\
    \ DApp。\n\n```\nnpm init react-app counter-app\n```\n\n至于以太坊特定的库，虽然有许多开发框架可用，但本示例中我们将坚持使用最低限度的工具。我们将使用的唯一与以太坊相关的\
    \ JavaScript 库是 `web3.js`^((33))。该库的开发由以太坊基金会支持，被许多人视为事实上的标准库。\n\n```\nnpm install\
    \ web3@1.2.0\n```\n\n关于以太坊构建工具链，我们同样只关注所需的最小工具集。首先，我们将安装 Solidity 编译器，以便编译智能合约^((34))。确保安装\
    \ 0.5.0 或更高版本。\n\n```\n$ solc ––version\nsolc, the solidity compiler commandline\
    \ interface\nVersion: ...\n```\n\n然后，为了为我们的应用程序设置自动化测试，我们将安装 `ganache`。`Ganache`\
    \ 是一个进程，它暴露了与以太坊节点类似的接口，并自行模拟整个以太坊区块链。它在开发环境或运行单元测试时特别有用。\n\n```\nnpm install\
    \ -g ganache-cli\n```\n\n默认情况下，`ganache` 会为发送的每笔交易立即挖出一个新区块，省去了等待交易确认的时间。这使得它在编码时很容易用作后端，但请记住，`ganache`\
    \ 环境与真实环境相比会有显著差异，尤其是在用户体验方面。\n\n#### Web3 浏览器\n\n现在，我们将使用 MetaMask 设置一个支持 web3\
    \ 的浏览器。请记住，还有其他支持 web3 的浏览器，但在撰写本文时，MetaMask 是与 DApp 交互最流行的方式。\n\n首先为你的浏览器安装 MetaMask\
    \ 插件^((35))——它支持 Chrome、Firefox、Opera 和 Brave。安装后，MetaMask 会提示你创建一个密码来加密你的账户，并会向你显示秘密备份短语。请务必记下这个短语：如果你丢失了\
    \ MetaMask 钱包，可以使用这个短语重新生成它。否则，钱包中的所有资金将不可挽回地丢失。\n"
- fmt: '### Warning


    Be extra careful when installing `MetaMask`. Most software related to managing
    user keys or transactions is prone to be subject to phishing attacks. Always ensure
    you are accessing the official `MetaMask` site when downloading.


    Next step is to actually fund your account in order to interact with smart contracts.
    For the examples throughout this book, we will be using the `Rinkeby` test network
    (or testnet). `Ethereum` has several testnets (`Ropsten`, `Rinkeby`, `Kovan`,
    and `Goerli`), each with its own characteristics and identified by a unique numeric
    ID:


    - `Ropsten` (id `3`) is the only proof-of-work-based testnet, which makes it the
    most similar one to mainnet, but is also very unreliable. As there is not much
    actual work being done on the network, block times are unpredictable, and the
    network is highly susceptible to attacks.

    - `Rinkeby` (id `4`) is a proof-of-authority-based testnet, which means that there
    are a set of trusted nodes which have the authority to add new blocks to the blockchain.
    This makes it much more stable and reliable than `Ropsten`. However, due to limitations
    of the consensus algorithm used, only `Geth` clients can connect to `Rinkeby`.

    - `Kovan` (id `42`) is similar to `Rinkeby`, in that it is a proof-of-authority-based
    testnet, but its consensus algorithm is compatible with `Parity` clients instead
    of `Geth`.

    - `Goerli` (id `6`) is the most recent testnet set up. It uses proof-of-authority
    as well, with the advantage that it is compatible with both `Geth` and `Parity`
    clients.


    There are several online faucets^([^(36)](#fn36)) to obtain testnet `ETH` to play
    around. Use one of them to request funds for one of the accounts you have just
    created on `MetaMask`.


    ### Note


    How did you find the onboarding process on `MetaMask`? If you think it was complicated
    or a bit long, now think of your users. All first-time users to `Ethereum` need
    to go through a similar process, with the additional burden of having to sign
    up in an exchange to purchase real mainnet `ETH` to interact with your app, which
    often requires a full `KYC` process. This is why user onboarding is such a challenge
    on `Ethereum`. There are techniques to mitigate this issue, such as not requiring
    your users to have an `Ethereum` account until it is absolutely needed, or alternative
    onboarding flows built on meta transactions. More on this later in Chapter `[7](#476252_1_En_7_Chapter.xhtml)`!


    ## Building Our Application


    We will start building from the `create-react-app` template. Make sure to have
    run all the steps on the “Setting up the environment” section, and you should
    have a simple `javascript` app with a handful of files under the `src` folder,
    built around `index.js`. To verify that everything is running smoothly, run `npm
    run start` and open your browser in `localhost:3000`. You should see the default
    initial screen of the `create-react-app` package, including a rotating `React`
    logo.


    ### Compiling the Smart Contract


    Our `DApp` will be backed by a single smart contract, `Counter`. Create a `contracts`
    folder in the root of your project, and add a `Counter.sol` file (Listing `[2-3](#476252_1_En_2_Chapter.xhtml#PC7)`).


    ```

    // contracts/Counter.sol

    pragma solidity ^0.5.0;

    contract Counter {

    uint256 public value;

    event Increased(uint256 newValue);

    function increase() public {

    value = value + 1;

    emit Increased(value);

    }

    }

    Listing 2-3

    Smart contract implementation in Solidity that we will use in our application

    ```


    We will go more in-depth on smart contracts in the next chapter, but for now you
    can start identifying the important pieces of the contract:


    - The contract’s state, `value`, defined as an unsigned integer of `256` bits,
    the default size in `Solidity`

    - The getter to access `value`, generated by the use of the `public` keyword in
    the declaration of the field

    - The `increase` function to increment `value` via a transaction

    - The `Increased` event used to signal when a modification of `value` has occurred


    You can test that the contract is fine by running the solidity compiler on it:


    ```

    $ solc contracts/Counter.sol

    Compiler run successful, no output requested.

    ```


    We need to specify the format in which we want to output the compilation. We are
    interested especially in the specification of the public interface of the contract,
    or `ABI` (`Application Binary Interface`), which is how our `javascript` application
    will communicate with the contract. We also want the binary code, so we can deploy
    the contract to the network if we need to do so. We can request the `Solidity`
    compiler to output these two in a single `JSON` file we can then use:


    ```

    solc --pretty-json --combined-json=abi,bin --overwrite \

    -o ./build/contracts contracts/Counter.sol

    ```


    ### Note


    The flags needed to output this information from the compiler may change depending
    on the version you are working with. The preceding code works for `Solidity` `0.5.1`.


    The preceding command will generate a file `build/contracts/combined.json` with
    all the compilation output. Take a look at it, and we will soon use it to interact
    with our contract.'
