    [8-18](#476252_1_En_8_Chapter.xhtml#PC20)). Give your network a name, create a
    new genesis, use clique proof-of-authority with 5-second blocks, and choose your
    miners as “accounts allowed to seal.” You should also pick a fourth account to
    be pre-funded or choose one of the existing validators to hold the initial ETH
    for your network.


    ```

    $ puppeth

    Please specify a network name to administer (no spaces, hyphens or capital letters
    please)

    > mysidechain

    What would you like to do? (default = stats)

    1\. Show network stats

    2\. Configure new genesis

    3\. Track new remote server

    4\. Deploy network components

    > 2

    What would you like to do? (default = create)

    1\. Create new genesis from scratch

    2\. Import already existing genesis

    > 1

    Specify your chain/network ID if you want an explicit one (default = random)

    > 1212

    Listing 8-18

    Fragment of the Geth puppeth configuration wizard to set up a PoA network with
    id 1212\. You should have a new mysidechain.json genesis file after going through
    it

    ```


    Before starting our Geth nodes, we will set up a *bootnode*. A bootnode is a node
    in the network whose sole purpose is to aid in the discovery of other nodes. We
    will use it to simplify the communication between our miner nodes.


    To set up a bootnode, we first need to create a boot key and use it to derive
    the bootnode *enode address* (Listing [8-19](#476252_1_En_8_Chapter.xhtml#PC21)).
    The enode address is a unique identifier of a node in the decentralized network,
    followed by the IP address and port where the node can be found. We will then
    start the bootnode using the generated boot key and have it listen on local port
    `30100`.^([^(145)](#fn145))


    ```

    $ bootnode -genkey boot.key

    $ bootnode -nodekey boot.key -writeaddress

    > c190f2af...ee34b40a

    $ bootnode -nodekey boot.key -addr :30100

    Listing 8-19

    Generating a boot key and running a bootnode

    ```'
  trans: '

    ### 权威证明


    在权威证明（简称 PoA）中，存在一组预定义的节点，它们作为区块的*验证者*，负责向网络中添加新区块。验证者相当于 PoW 中的矿工，其作用是添加新区块。每隔一定秒数，这些验证者会轮流提议一个新的区块。这些区块会被广播给其他验证者，并且需要得到其中大多数验证者的批准，才能被添加到区块链中。验证者集合可以随时间变化，一些验证者可能被投票移除，新的验证者则被允许加入。


    区块的广播、批准和达成共识的方式取决于所使用的具体*共识*算法。虽然存在许多不同的共识算法，例如 Clique、^(¹³⁹) Aura、^(¹⁴⁰) Raft、^(¹⁴¹)
    或 Istanbul BFT，^(¹⁴²) 但它们都遵循前面概述的基本框架。不同的算法可能针对恶意行为者或节点断连提供不同的保障，性能也各不相同。


    侧链的另一个组成部分是与主网络的连接，通常称为*桥梁*。桥梁是一种机制，允许用户在主链和侧链之间转移资产。例如，一个简单的桥梁可以让用户将其特定 ERC20
    资产从主网络转移到侧链，具体做法是让用户在特定的主网合约中锁定其资金。侧链验证者会监控这个合约，一旦检测到用户在主链上锁定资金，便在侧链中创建相应的资产。我们将在本章后续部分实现这种机制。


    #### 安全与信任


    简易版 PoA 侧链的安全性完全依赖于其验证者。如果大多数验证者合谋，他们可以有效地窃取所有锁定在侧链中的用户资金。因此，验证者集合必须由多个不同的参与方组成，而非由一个组织控制，这一点至关重要。只有当用户信任大多数验证节点时，才应该信任
    PoA 网络。


    为了抑制此类恶意行为，一些网络采用权益证明而非权威证明。在这种机制下，验证节点需要存入（质押）大量资金。如果证实其行为恶意，他们的质押金将被削减作为处罚——尽管具体如何执行削减是另一个问题。


    重要的是，验证者通过攻击网络可能获得的收益必须低于其可能损失的质押金，以保持激励机制的一致性。目前存在多种不同的权益证明方法。然而，从用户的角度来看，体验与在权威证明网络中操作非常相似。


    ### 注意


    鉴于恶意验证者可能窃取用户资金，侧链的安全保障比主链要差。这一事实使得侧链在某些定义下**不**被视为二层网络解决方案。不过，存在一些构造（例如我们稍后将介绍的
    Plasma）允许用户通过在主网合约上举报违规验证者的行为来保护自己的资产。


    #### 部署我们自己的链


    为了说明 PoA 网络是如何工作的，^(¹⁴³) 我们将使用 Geth 以太坊节点客户端手动搭建一个。^(¹⁴⁴) Geth 不仅可以在以太坊工作量证明主网络上运行，也可以配置为在采用
    Clique 共识算法（例如 Rinkeby 测试网）的 PoA 网络中运行，并充当验证节点。


    让我们首先设置三个矿工节点，它们都将运行在同一台计算机上。我们将为每个矿工创建新账户。为方便起见，我们将为所有账户设置相同的密码，因此创建一个文件 `password.txt`，其中包含一个用作密码的随机字符串。然后，为三个矿工分别运行以下命令来创建地址，记得将
    `miner1` 替换为 `miner2` 和 `miner3`。确保 `password.txt` 文件位于运行命令的路径下。


    ```

    $ geth --datadir miner1 --password password.txt account new

    > Address: {8305ccac...58269a7d}

    ```


    你会得到三个不同的地址，我们将把它们设置为此网络的验证者（请务必记下它们）。现在，我们将为网络创建一个*创世区块*。创世区块是网络的配置信息，包括授权验证者集合、共识引擎、初始余额、区块
    gas 限制等。在 Geth 中，这些信息被编译成一个 JSON 配置文件，用于引导每个节点。


    Geth 包含一个名为 `puppeth` 的工具，可以简化此类文件的创建过程。只需在控制台中运行 `puppeth`，然后回答提示的问题即可（列表 8-18）。给你的网络命名，创建一个新的创世区块，使用区块间隔为
    5 秒的 clique 权威证明，并选择你的矿工作为“允许封印的账户”。你还应该选择第四个账户作为预充值账户，或者选择一个现有的验证者来持有网络的初始以太币。


    ```

    $ puppeth

    Please specify a network name to administer (no spaces, hyphens or capital letters
    please)

    > mysidechain

    What would you like to do? (default = stats)

    1\. Show network stats

    2\. Configure new genesis

    3\. Track new remote server

    4\. Deploy network components

    > 2

    What would you like to do? (default = create)

    1\. Create new genesis from scratch

    2\. Import already existing genesis

    > 1

    Specify your chain/network ID if you want an explicit one (default = random)

    > 1212

    列表 8-18

    使用 Geth 的 puppeth 配置向导为 id 为 1212 的 PoA 网络设置创世区块的片段。完成上述步骤后，你将得到一个新的 mysidechain.json
    创世文件。

    ```


    在启动我们的 Geth 节点之前，我们将设置一个*引导节点*。引导节点是网络中唯一目的是帮助发现其他节点的节点。我们将用它来简化矿工节点之间的通信。


    要设置引导节点，我们首先需要创建一个引导密钥，并用它来生成引导节点的*enode 地址*（列表 8-19）。Enode 地址是去中心化网络中节点的唯一标识符，后跟可找到该节点的
    IP 地址和端口。然后，我们将使用生成的引导密钥启动引导节点，并让它监听本地的 `30100` 端口。^(¹⁴⁵)


    ```

    $ bootnode -genkey boot.key

    $ bootnode -nodekey boot.key -writeaddress

    > c190f2af...ee34b40a

    $ bootnode -nodekey boot.key -addr :30100

    列表 8-19

    生成引导密钥并运行引导节点

    ```

    '
