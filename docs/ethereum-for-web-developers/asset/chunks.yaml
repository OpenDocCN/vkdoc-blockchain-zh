    ### Compiling the Smart Contract


    Our DApp will be backed by a single smart contract, `Counter`. Create a `contracts`
    folder in the root of your project, and add a `Counter.sol` file (Listing [2-3](#476252_1_En_2_Chapter.xhtml#PC7)).


    ```

    // contracts/Counter.sol

    pragma solidity ^0.5.0;

    contract Counter {

    uint256 public value;

    event Increased(uint256 newValue);

    function increase() public {

    value = value + 1;

    emit Increased(value);

    }

    }

    Listing 2-3

    Smart contract implementation in Solidity that we will use in our application

    ```


    We will go more in-depth on smart contracts in the next chapter, but for now you
    can start identifying the important pieces of the contract:


    *   The contract’s state, `value`, defined as an unsigned integer of 256 bits,
    the default size in Solidity


    *   The getter to access `value`, generated by the use of the `public` keyword
    in the declaration of the field


    *   The `increase` function to increment `value` via a transaction


    *   The `Increased` event used to signal when a modification of `value` has occurred


    You can test that the contract is fine by running the solidity compiler on it:


    ```

    $ solc contracts/Counter.sol

    Compiler run successful, no output requested.

    ```


    We need to specify the format in which we want to output the compilation. We are
    interested especially in the specification of the public interface of the contract,
    or ABI (Application Binary Interface), which is how our javascript application
    will communicate with the contract. We also want the binary code, so we can deploy
    the contract to the network if we need to do so. We can request the Solidity compiler
    to output these two in a single JSON file we can then use:


    ```

    solc --pretty-json --combined-json=abi,bin --overwrite \

    -o ./build/contracts contracts/Counter.sol

    ```


    ### Note


    The flags needed to output this information from the compiler may change depending
    on the version you are working with. The preceding code works for Solidity 0.5.1.


    The preceding command will generate a file build/contracts/combined.json with
