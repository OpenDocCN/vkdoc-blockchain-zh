    }

    modifier minDeposit(uint256 value) {

    require(msg.value > 0);

    _;

    }

    function ownerDeposits()

    onlyOwner minDeposit(1 ether) payable public {

    // here we know that the sender is the owner,

    // and has transferred at least 1 ETH

    }

    }

    Listing 3-4

    Using custom modifiers for access control

    ```


    Modifiers are defined with the `modifier` keyword and yield the call to the original
    function via an underscore. They are then applied to a function by listing them
    by name in the function’s definition. Modifiers can even accept arguments, which
    must be provided when applied to a function.


    #### Fallback Function


    A contract may define a function without a name. This function is referred to
    as the *fallback function* and is invoked if the contract receives a call that
    does not match any other function.


    Even though they can be used as catch-all functions in contracts, the main use
    case of fallback functions is handling plain ETH transfers (Listing [3-5](#476252_1_En_3_Chapter.xhtml#PC7)).
    When you transfer funds to a contract address, you typically do not include anything
    in the transaction’s `data`. Fallback functions allow contracts to do something
    in response to that transfer, or perform checks on the transfer itself.


    ```

    contract NotCheap {

    function() external payable {

    require(msg.value >= 1 ether);

    }

    }

    Listing 3-5

    Using a fallback function to prevent a contract from accepting transfers that
    are below 1 ETH

    ```


    Note that when transferring ETH from Solidity code using the `transfer` method,
    only a very small gas stipend will be allocated. This is due to security reasons
    in order to prevent reentrancy attacks when transferring funds. What this means
    is that the fallback function should only perform very simple checks or operations,
    or risk running out of gas when receiving ETH, thus reverting the transfer transaction.
    Even a write to storage is more expensive than the gas stipend available in a
    plain transfer.


    ### Warning


    Fallback functions are also required to signal whether a contract can receive
    ETH. If a contract does not define a payable fallback function, then no plain
    ETH transfers can be sent to it. This prevents from accidentally sending funds
    to a contract that cannot handle them, thus locking the funds.


    ### Value Data Types


    Solidity supports the traditional basic data types, such as `bool` or u`int`,
    plus some more complex data types such as `array`, `mapping`, or `struct`. We
    will start with the most simple data types: value types (Listing [3-6](#476252_1_En_3_Chapter.xhtml#PC8)).


    ```

    pragma solidity ^0.5.0;

    contract MyContract {

    bool private myFlag;

    uint256 private myUnsignedNumber;

    int256 private mySignedNumber;

    address private myAddress;

    }

    Listing 3-6

    Overview of value data types in a contract

    ```


    #### Booleans and Equality


    Boolean literals are denoted by the keywords `true` and `false`. The usual logical
    operations are available, using the same symbols, and with the same short-circuit
    semantics as in javascript:


    *   Negation `!x`


    *   Conjunction `x && y`


    *   Disjunction `x || y`


    On the other hand, equality comparison operators `==` and `!=` actually behave
    as javascript’s `===` and `!==`. Solidity will not coerce types when comparing
    and will throw a compiler error when attempting to compare objects of two different
    types. This holds for all data types, not just booleans.


    #### Integers and Arithmetic


    Integer types can be both signed and unsigned, and can be defined of different
    sizes – from 8 to 256 bits in steps of 8\. The usual arithmetic, shifting, and
    bitwise operations are available, as well as comparison operators:


    *   uint8, uint16, uint24, ..., uint256 are unsigned integer types.


    *   int8, int16, int24, ..., int256 are signed integer types.


    Since integer types are often used to represent *value* in smart contracts, unsigned
    integers are much more common than signed. Also, since fixed or floating-point
    values are not (fully) supported, it is common to represent all values using integers
    with a fixed amount of decimals. This is especially true of ETH balances, which
    are always expressed in *wei*, the smallest divisible unit of ETH: `1e18 wei`
    are equal to 1 ETH. Solidity even provides suffixes for working with these units:
    the literal `1 ether` is actually the integer value `1e18`. There are also suffixes
    for working with time values, such as `minutes`, `hours`, `days`, and `weeks`.
    In these cases, the base unit is the second, so `3 minutes` is compiled to the
    integer value `180`.


    A word of warning: all integer arithmetic operations in Solidity are unchecked;
    this means that it is possible to silently overflow. This is especially risky
    when dealing with unsigned numbers associated to value. For instance, accidentally
    decreasing a variable that represents someone’s balance below zero would actually
    turn that value into nearly `2`^(`^255`). For this reason it is strongly suggested
    to always use `SafeMath`^([^(54)](#fn54)) (Listing [3-7](#476252_1_En_3_Chapter.xhtml#PC9)),
    a library provided by the OpenZeppelin framework that adds overflow checks to
    every arithmetic operation (more on imports and libraries later).


    ```

    import "openzeppelin-solidity/contracts/math/SafeMath.sol";

    contract MyContract {

    using SafeMath for uint256;

    uint256 private myNumber;

    function unsafeDecrease(uint256 x) {

    // if x > myNumber, myNumber will silently wrap around

    myNumber = myNumber - x;

    }

    function safeDecrease(uint256 x) {

    // if x > myNumber, this will throw an error

    myNumber = myNumber.sub(x);

    }

    }

    Listing 3-7

    Example of SafeMath usage for arithmetic operations

    ```


    We will review how to use imports and libraries later in this chapter. For now,
    keep in mind that directly using arithmetic operators in Solidity, without going
    through SafeMath, is a potential security risk.'
  trans: '

    #### 可支付修饰器（Payability Modifiers）


    函数可以选择定义为 `payable`（清单 3-3）。这告诉 Solidity 该函数在被调用时可以接收 ETH。如果你试图向一个未定义为 `payable`
    的函数发送 ETH，编译器会抛出一个错误。这可以防止意外地将余额发送到没有准备处理它的合约，从而可能将 ETH 锁定在合约中。


    ```

    contract Payable {

    function canPay() public payable {  }

    function cannotPay() public { }

    }

    contract Payer {

    function pay(Payable p, uint256 eth) public {

    // 此语法用于在函数调用时发送以太币

    p.canPay.value(eth)();

    // 此代码无法编译

    p.cannotPay.value(eth)();

    }

    }

    清单 3-3

    Solidity 中可支付函数与非可支付函数的对比

    ```


    Solidity 还会添加运行时检查，以确保没有余额被发送到非可支付函数。例如，如果你试图从外部账户向合约的非可支付函数发送 ETH，你将收到一个 `revert`
    错误。


    #### 自定义修饰器（Custom Modifiers）


    Solidity 允许你定义自己的函数修饰器。这些代码块可以作为过滤器在函数执行前后运行，甚至可以调用其他合约函数、管理存储或根据当前消息做出反应。


    关于当前调用的信息可以通过名为 `msg` 的上下文变量获得，其中包括接收到的 ETH `value`（数量）、调用的 `sender`（发送方）地址、提供的
    `gas`（燃料）、`gas price`（燃料价格）等。


    修饰器的一个典型用例是访问控制（清单 3-4）。通过定义谁可以调用修饰器中的函数，你随后可以轻松地通过使用修饰器在多个函数间重用该逻辑。


    ```

    contract OwnerDepositable {

    address public owner;

    constructor(address _owner) public {

    owner = _owner;

    }

    modifier onlyOwner {

    require(msg.sender == owner);

    _;

    }

    modifier minDeposit(uint256 value) {

    require(msg.value > 0);

    _;

    }

    function ownerDeposits()

    onlyOwner minDeposit(1 ether) payable public {

    // 这里我们知道发送者是所有者，

    // 并且已经转账至少 1 ETH

    }

    }

    清单 3-4

    使用自定义修饰器进行访问控制

    ```


    修饰器使用 `modifier` 关键字定义，并通过下划线将调用交还给原始函数。然后，通过在函数的定义中按名称列出它们，将其应用于函数。修饰器甚至可以接受参数，这些参数在应用于函数时必须提供。


    #### 回退函数（Fallback Function）


    合约可以定义一个没有名称的函数。该函数被称为*回退函数*，如果合约收到一个不匹配任何其他函数的调用，则会调用它。


    尽管它们可以用作合约中的兜底函数，但回退函数的主要用例是处理纯 ETH 转账（清单 3-5）。当你向合约地址转账资金时，通常不会在交易的 `data` 中包含任何内容。回退函数允许合约对该转账做出响应，或对转账本身执行检查。


    ```

    contract NotCheap {

    function() external payable {

    require(msg.value >= 1 ether);

    }

    }

    清单 3-5

    使用回退函数防止合约接受低于 1 ETH 的转账

    ```


    请注意，当使用 `transfer` 方法从 Solidity 代码中转账 ETH 时，只会分配非常少量的燃料补贴。这是出于安全原因，以防止在转账资金时发生重入攻击。这意味着回退函数应该只执行非常简单的检查或操作，否则在接收
    ETH 时可能会耗尽燃料，从而导致转账交易被回滚。即使是一次存储写入，其成本也高于普通转账中可用的燃料补贴。


    ### 警告


    回退函数还需要指示合约是否可以接收 ETH。如果合约没有定义可支付的回退函数，则不能向其发送任何纯 ETH 转账。这可以防止意外地将资金发送到无法处理它们的合约，从而导致资金被锁定。


    ### 值数据类型


    Solidity 支持传统的、基本的数据类型，例如 `bool` 或 `uint`，以及一些更复杂的数据类型，例如 `array`、`mapping` 或
    `struct`。我们将从最简单的数据类型开始：值类型（清单 3-6）。


    ```

    pragma solidity ⁰.5.0;

    contract MyContract {

    bool private myFlag;

    uint256 private myUnsignedNumber;

    int256 private mySignedNumber;

    address private myAddress;

    }

    清单 3-6

    合约中值数据类型的概览

    ```


    #### 布尔值和相等性


    布尔字面量由关键字 `true` 和 `false` 表示。通常的逻辑运算可用，使用相同的符号，并具有与 javascript 相同的短路语义：


    *   否定 `!x`

    *   合取 `x && y`

    *   析取 `x || y`


    另一方面，相等比较运算符 `==` 和 `!=` 实际上表现得像 javascript 的 `===` 和 `!==`。Solidity 在进行比较时不会强制转换类型，并且在尝试比较两个不同类型的对象时会抛出编译器错误。这适用于所有数据类型，而不仅仅是布尔值。


    #### 整数和算术运算


    整数类型可以是有符号和无符号的，并且可以定义为不同的大小——从 8 位到 256 位，以 8 位为步长。通常的算术、移位和位运算，以及比较运算符都是可用的：


    *   `uint8`、`uint16`、`uint24`、...、`uint256` 是无符号整数类型。

    *   `int8`、`int16`、`int24`、...、`int256` 是有符号整数类型。


    由于整数类型通常用于表示智能合约中的*价值*，无符号整数比有符号整数常见得多。此外，由于不（完全）支持定点或浮点数值，通常使用具有固定小数位数的整数来表示所有价值。ETH
    余额尤其如此，它总是以 *wei*（ETH 最小的可分割单位）表示：`1e18 wei` 等于 1 ETH。Solidity 甚至为处理这些单位提供了后缀：字面量
    `1 ether` 实际上是整数值 `1e18`。还有用于处理时间值的后缀，例如 `minutes`、`hours`、`days` 和 `weeks`。在这些情况下，基本单位是秒，所以
    `3 minutes` 被编译为整数值 `180`。


    一句警告：Solidity 中所有整数算术运算都不进行溢出检查；这意味着可能会发生静默溢出。这在处理与价值相关的无符号数时尤其危险。例如，意外地将代表某人余额的变量减少到零以下，实际上会使该值变成接近
    `2²⁵⁵`。出于这个原因，强烈建议始终使用 `SafeMath`（清单 3-7），这是一个由 OpenZeppelin 框架提供的库，它为每个算术运算添加了溢出检查（稍后会有更多关于导入和库的内容）。


    ```

    import "openzeppelin-solidity/contracts/math/SafeMath.sol";

    contract MyContract {

    using SafeMath for uint256;

    uint256 private myNumber;

    function unsafeDecrease(uint256 x) {

    // 如果 x > myNumber，myNumber 将静默地回绕

    myNumber = myNumber - x;

    }

    function safeDecrease(uint256 x) {

    // 如果 x > myNumber，这将抛出一个错误

    myNumber = myNumber.sub(x);

    }

    }

    清单 3-7

    算术运算中使用 SafeMath 的示例

    ```


    我们将在本章稍后部分回顾如何使用导入和库。目前请记住：在 Solidity 中直接使用算术运算符而不通过 `SafeMath`，是一个潜在的安全风险。

