    # 8. Scalability


    In the previous chapter, we addressed user onboarding challenges, one of the two
    main issues for Ethereum mass adoption. The second of them, which we will tackle
    in this chapter, is scalability. The Ethereum network, as it is today, can handle
    about 15 transactions per second – and this throughput must be shared among all
    Ethereum applications globally. This has led to single applications cluttering
    the entire network due to a spike in their usage to the point of rendering all
    dapps unusable for brief periods. In this chapter, we will introduce state channels
    and sidechains, two of the most widely used scalability solutions.'
