- fmt: '#### Confirmations for Existing Tokens


    When loading the initial list of tokens in this component, we assumed that all
    of those tokens were already *confirmed*, that is, they were already mined several
    blocks ago. However, this may not be the case. You can easily test this yourself
    by simply reloading the page right after sending a transaction and seeing how
    a token awaiting confirmation incorrectly goes into confirmed state.


    There are many techniques for dealing with these situation, some of which we will
    see in the next chapter. We will go with a simple approach in this case, and favor
    simplicity over efficiency.


    First of all, instead of loading all tokens from the current block on page load,
    we will load two sets of tokens: one from the current block and one from six blocks
    ago. We will consider all tokens from six blocks ago as confirmed, while all new
    tokens from the current block will be flagged as unconfirmed. Let’s update the
    `didMount` handler on the `ERC721` main component (Listing [5-28](#476252_1_En_5_Chapter.xhtml#PC70))
    to implement this change.


    ```

    // src/components/ERC721.js

    const CONFIRMATIONS = 6;

    class ERC721 extends Component {

    async componentDidMount() {

    const currentBlock = await getBlockNumber();

    const confirmedBlock = currentBlock – CONFIRMATIONS;

    const confirmedTokenIds = await this

    .getTokensAtBlock(confirmedBlock)

    .catch(() => []);

    const latestTokenIds = await this

    .getTokensAtBlock(currentBlock);

    const unconfirmedTokenIds = latestTokenIds

    .filter(id => !confirmedTokenIds.includes(id));

    const tokens = confirmedTokenIds

    .map(id => ({ id, confirmed: true }))

    .concat(unconfirmedTokenIds

    .map(id => ({ id, confirmed: false })

    ));

    this.setState({ tokens, loading: false });

    }

    }

    Listing 5-28

    Get confirmed and unconfirmed token lists, and set the confirmed flag accordingly
    on the token collection. Note the catch block when querying the confirmedTokenIds,
    as the call will throw if the contract had not been created at confirmedBlock,
    in which case all tokens should be unconfirmed

    ```


    This will allow us to properly display the status of each token when the page
    loads. However, any tokens listed as unconfirmed will remain on that state until
    a full page reload. We need to update their status once they reach the required
    number of confirmations.


    We will do that by subscribing to new blocks and re-checking the ownership of
    each of the unconfirmed tokens *six blocks ago*. Once enough new blocks are mined,
    we will be able to move these new tokens to a confirmed state. Let’s add a new
    method (Listing [5-29](#476252_1_En_5_Chapter.xhtml#PC71)) to be called from the
    `didMount` handler.


    ```

    // src/components/ERC721.js

    class ERC721 extends Component {

    subscribeUnconfirmedTokens(unconfirmedIds) {

    if (unconfirmedIds.length === 0) return;

    const { contract, owner } = this.props;

    this.newBlocksSub = getWeb3().eth

    .subscribe(''newBlockHeaders'', (err, { number }) => {

    unconfirmedIds.forEach(async (id) => {

    const confirmedOwner = await contract.methods

    .ownerOf(id).call({}, (number – CONFIRMATIONS))

    .catch(() => null);

    if (areAddressesEqual(confirmedOwner, owner)) {

    this.confirmToken(id, CONFIRMATIONS);

    unconfirmedIds = unconfirmedIds.filter(i => id!==i);

    if (unconfirmedIds.length === 0) {

    this.newBlocksSub.unsubscribe();

    }

    }

    });

    });

    }

    }

    Listing 5-29

    Subscribe to new blocks, and re-check the ownership of each token six blocks before
    the current one. If a token belongs to the current user six blocks ago, we consider
    it to be confirmed. Once all pending tokens have been processed, we close the
    subscription

    ```


    Keep in mind that in this example, we are only tracking new tokens created by
    minting, and any new tokens *transferred* to the user will not be shown until
    the page is reloaded. We are also assuming that the user does not transfer out
    their own tokens. If your application needs to handle these scenarios, then monitoring
    `Transfer` events is a much safer approach than only watching transactions sent
    by the user from the application. We will build around that concept in the next
    chapter.


    ### Next Steps


    The next steps for your app would be to move to a more interesting network, starting
    with a testnet such as `Rinkeby`, and eventually move onto `Mainnet`. You can
    spin up a local `Geth` or `Parity` node connected to such network (using the `light
    syncmode` to speed up the sync process) and rely on the `deploy.js` script or
    use an online tool like `MyCrypto`^([^(80)](#fn80)) or `Remix` for deploying the
    contract. Once deployed, all interactions will be managed by `Metamask` – just
    remember to switch to the correct network.


    ## Summary


    In this chapter, we reviewed how to set up a local development environment by
    relying on either `ganache` or a full Ethereum client. We then went through the
    process of compiling and deploying contracts to the network, either via using
    the vanilla `solc` compiler or the `sol-compiler` wrapper. We also reviewed how
    `Metamask` works when using it for sending transactions and unlocking the user
    accounts.


    Once we had ironed out the details of setting up the environment, we went in-depth
    on the process of sending a transaction, focusing especially in gas estimation
    and defining a gas price. We then reviewed the lifecycle of a transaction and
    how we can access specific events such as when it is mined or confirmed. We also
    went through a few of the most common errors when sending a transaction and how
    the process of replacement works.


    To illustrate all these concepts, we built a small application, similar to the
    one from the previous chapter but this time around non-fungible tokens. Starting
    from a list of the user’s existing tokens, we allowed the user to mint new ones
    and monitored the lifecycle of such transactions. In the next chapter, where we
    will cover concepts such as indexing and storage, we will also learn some additional
    techniques regarding handling reorganizations and testing, which can also be applied
    to this kind of applications.


    # 6. Indexing and Storage


    In the last two chapters, we learned how to read from and write to the Ethereum
    network. Reads can be made as regular calls to contracts, or by querying logged
    events, while writes are always performed in the context of a transaction. However,
    these operations only accommodate for basic use cases. If we want to display aggregate
    data from the blockchain, querying events client-side quickly falls short. Similarly,
    if we want to store large amounts of information in a contract, gas costs make
    it economically infeasible. In this chapter, we will work with off-chain components
    to solve both problems. We will first go through the process of indexing blockchain
    data in a server to query it from a client application and then go into off-chain
    storage solutions. We will also review techniques for handling reorganizations
    and testing along the way, as well as discussing the value of centralized vs.
    decentralized solutions.'
