    #### Using Snapshots


    We can now write more tests that exercise other scenarios of our indexer. However,
    in any good test suite, all tests should be independent from each other, which
    is not the case here since we are deploying a single instance of our ERC20 contract.
    This means that any minting or transfers that occur in a test will be carried
    on to the following ones.


    While the obvious solution is to just replace our `before` step with a `beforeEach`
    step,^([^(88)](#fn88)) so a new ERC20 is deployed for each test, we will use this
    opportunity to introduce a new concept specific to ganache: snapshots (Listing
    [6-18](#476252_1_En_6_Chapter.xhtml#PC19)). Snapshots allow us to save the current
