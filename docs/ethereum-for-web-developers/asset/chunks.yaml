  trans: '

    ## 说明


    从交易中获取函数返回值的唯一方法是经由另一个合约进行调用：调用 `setGreeting` 的合约可以访问这些返回值，但向 `Greeter` 发送交易的非链上客户端则无法获取。


    基于此，在智能合约设计中，一个常见模式是让公开的状态修改函数通过事件携带其返回值（清单 5-18）。这使得外部拥有账户可以调用此类函数，并从事件参数中检索返回值。


    ```

    function setGreeting(string memory _greeting)

    public payable returns (string memory, uint256)

    {

    greeting = _greeting;

    // 此操作仅可由非链上客户端访问

    emit GreetingSet(_greeting, address(this).balance);

    // 此操作仅可由其他调用合约访问

    return (_greeting, address(this).balance);

    }

    清单 5-18

    通过发出携带模拟返回值数据的事件，使客户端能够访问这些数据

    ```


    ### 交易已确认


    虽然立即对已挖出的交易采取行动可能颇具诱惑力，但由于区块链重组，交易可能会被移出区块链。这意味着，已挖出的交易可能回到待处理状态，随后要么被再次挖出，要么被丢弃——甚至在挖出时因环境不同而产生不同的状态变更。


    因此，在实际对交易采取行动之前，等待一定数量的确认或许是明智之举。何为“采取行动”取决于你的使用场景，以及需要等待的确认数量。请记住，确认数是指在包含某交易的区块之后新增的区块数量：每新增一个挖出区块，就相当于你的交易获得了一次新的确认。随着区块链上区块的不断叠加，重组发生的概率会越来越小。


    交易确认可以通过订阅网络上的新区块（参见第 4 章），并统计自收到交易回执以来产生的区块数来衡量。我们可以修改上一节的代码，使其不再在回执立即可用时返回，而是等待一定数量的确认后才返回（清单
    5-19）。


    ```

    function sendTransactionAwaitConfirmations(opts, confs) {

    const BLOCKS = ''newBlockHeaders'';

    return new Promise((resolve, reject) => {

    sendTransactionReturnHash(opts).then(hash => {

    const sub = web3.eth.subscribe(BLOCKS, (err, block) => {

    if (err) reject(err);

    // 现在不仅检查回执是否存在，

    // 还会检查回执所在区块的后续区块数量

    web3.eth.getTransactionReceipt(hash).then(receipt => {

    if (receipt &&

    block.number > receipt.blockNumber + confs) {

    sub.unsubscribe();

    resolve(receipt);

    }

    });

    });

    }).catch(reject);

    });

    }

    清单 5-19

    修改 sendTransactionAwaitReceipt 函数，使其在返回回执前等待指定的确认数。请注意，在每个新区块上重新获取交易回执非常重要，因为它可能因区块链重组而发生变化

    ```


    另外，`web3` 还提供了一种事件机制，用于在交易发送后跟踪确认状态（清单 5-20），其底层执行了类似的逻辑。


    ```

    > greeter.methods.setGreeting(''Hello!'')

    .send({ from, value })

    .on(''confirmation'', (number, receipt) => {

    if (number === 12) {

    console.log(receipt.events.GreetingSet.returnValues)

    }

    })

    清单 5-20

    利用 web3 的确认事件处理器，在采取行动前等待交易获得 12 次确认

    ```


    ### 替换交易


    通过操纵 nonce 和 gas 价格参数，发送方可以替换处于待挖矿状态的交易。请记住，一笔交易要有效，其 nonce 不能是发送方之前使用过的。因此，如果发送方在第一笔交易仍处于待处理状态时，广播了第二笔
    nonce 相同的交易，那么这两笔交易都有资格被挖出，但最终只会有一笔成功。为了让矿工优先选择第二笔交易，发送方只需将其 gas 价格设置得比第一笔高即可。


    测试这一功能的一个简单方法是：先发送一笔 gas 价格极低的交易，确保它需要多个区块才能被挖出，这样我们就有足够的时间发送第二笔交易来替换它。请务必在未启用即时密封的网络中进行测试；否则，第一笔交易会立即被挖出。


    ```

    // 发送第一笔交易，金额为 0.02 ETH

    > let to = accounts[1]

    > let value = 2e16

    > let gasPrice = 100

    > let txOpts = { from, to, value, gasPrice };

    > let txHash = await sendTransactionReturnHash(txOpts)

    // 获取 nonce

    > let { nonce } = await web3.eth.getTransaction(txHash)

    // 发送替换交易，金额不同，gas 价格更高

    > value = 1e16

    > gasPrice = 20e9

    > txOpts = { from, to, value, gasPrice, nonce}

    > let txHashReplace = await sendTransactionReturnHash(txOpts)

    // 验证只有替换交易被挖出

    > await web3.eth.getTransactionReceipt(txHash)

    null

    > await web3.eth.getTransactionReceipt(txHashReplace)

    { status: true, ... }

    ```


    替换交易有多种用途，因为第二笔交易除了 nonce 和发送方账户外，无需与原始交易有任何共同之处：


    - 替换交易最常见的用途是加速原始交易。如果你发现某笔交易挖矿时间过长，可以直接用完全相同的参数重新提交，但设置更高的 gas 价格，使其对矿工更具吸引力。在用户体验方面，这也是一个简单的实现模式：如果在交易处理期间向用户显示加载指示器，那么在长时间未收到反馈后，你可以提供一个重新提交的选项。`Metamask`
    已经在其用户界面中内置了此功能。


    - 另一个用途是直接取消交易。如果用户希望撤销已经发送的交易，一个可行的方案是发送一笔无操作替换交易来移除前一笔交易。无操作交易可以非常简单，例如一笔发送方与接收方地址相同、金额为
    0 ETH 且不含数据的交易。


    - 或者，也可以发送替换交易来更改前一交易的某个参数，以此作为对原始交易的修正。这很大程度上取决于你的具体使用场景，并且需要用户能够快速执行，因为如果原始交易的
    gas 价格已经很高，替换交易的时间窗口可能会很短。

    '
- fmt: '# Error Handling


    When sending a transaction to the network, there are many things that can potentially
    go wrong. Your application should be prepared to handle them, and inform your
    user accordingly:


    - At any point in time, you may lose the connection to the node. Needless to say,
    this will impact not just sending transactions but also any kind of operation,
    read or write, with the network. You will typically get an *Invalid JSON-RPC response*
    error in these scenarios, since your library will get an empty response from the
    unreachable node.


    - The transaction being sent may not be valid. This could be due to one of its
    parameters not being well-formed, such as a non-hexadecimal string for an address,
    or an outright invalid value. As an example of the latter, if you try to send
    a transaction with a gas allowance of 1, you will get an *intrinsic gas too low*
    error. These errors are usually caught by your library, while trying to build
    the transaction to send.


    - The sender account may not have enough funds for the specified value, gas allowance,
    and gas price of the transaction. These errors are generally reported by the node
    before the transaction is even broadcasted.


    - When replacing transactions, attempting to replace a mined transaction will
    yield a *nonce too low* error even before the transaction is sent to the network.
    Similarly, most clients will prevent you from trying to replace a transaction
    without increasing the gas price.


    - Transactions that execute contract code may fail due to a REVERT or an ABORT
    raised by the contract. Contracts written in Solidity 0.4.22 and up can include
    a revert reason, which can be used to determine the cause of the error. This is
    only detected once the transaction has been actually mined, and the sender funds
    have been spent to pay for the gas of the execution.


    - When estimating the required gas for a transaction, an *always failing transaction*
    error means that the estimation fails since the transaction raises an error. This
    can be used to detect a failing transaction before actually sending it to the
    network and spending gas.


    - Even if you estimate the gas required for a transaction, the conditions under
    which the transaction is mined may differ to the ones when the gas was estimated.
    An out-of-gas error will be raised in these scenarios, and only once the transaction
    was already mined.


    - After the transaction is sent, if the gas price was too low or the network too
    busy, it may fail to be mined. Most libraries will eventually time out, and inform
    you that the transaction was not found after a certain number of blocks. Be aware
    that if the node your user is connecting to is out of sync, then the transaction
    may actually get mined, but the node will never see it, raising this error.


    ## Note


    Keep in mind that the actual error messages may depend on the library you are
    using, and in some cases, the client you are connecting to (Geth, Parity, or Ganache).


    Most of the preceding errors can be caught in web3 using an `error` event handler,
    similar to the transaction sent, receipt, or confirmation events. Input formatting
    errors, on the other hand, will raise an exception immediately.


    ```

    > let [from, to] = await web3.eth.getAccounts()

    > web3.eth.sendTransaction({ from, to, gas: 1 })

    .on(''error'', err => console.error(err.message))

    Returned error: intrinsic gas too low

    ```


    ## Example Application


    As in the previous chapter, we will now set up a sample application that covers
    many of the concepts we have reviewed in this chapter. In this case, we will set
    up a simple interface for allowing a user to create (*mint*) new digital collectibles
    using a modified ERC721 contract.


    ### Setup


    Our setup will be similar to that of previous chapters, relying on `create-react-app`
    for the client boilerplate,^([^(77)](#fn77)) as we will be building a client-side-only
    application.


    ```

    npm init react-app erc721-app

    ```


    #### Dependencies


    Along with the same set of dependencies as in our ERC20 app, we will also install
    the solidity compiler, and the `axios` library for performing HTTP requests.


    ```

    $ npm install web3@1.2.0 openzeppelin-solidity@2.1 bignumber.js@8.0 axios@0.18.0

    $ npm install --save-dev @0x/sol-compiler@2.0.2

    ```


    Make sure you have also installed either `ganache-cli`, `Geth`, or `Parity`, as
    described earlier in this chapter, in order to spin up a local development network.'
