  trans: '

    ### 连接我们的组件


    我们首先创建一个文件 `components/Counter.js`（代码清单 2-9）。目前这将是一个空的 React 组件^(³⁸)。


    ```

    // src/components/Counter.js

    import React, { Component } from ''react'';

    class Counter extends Component {

    render() {

    return (

    此处显示计数器

    );

    }

    }

    代码清单 2-9

    用于渲染 Counter 合约并与之交互的空 React 组件。我们将迭代地为其添加功能

    ```


    这个组件将从 `App.js` 根组件接收 `Counter` 合约实例。检索该实例并在准备好后将其注入 `Counter` 可视化组件是 App 的责任。让我们修改由
    `create-react-app` 自动生成的 `src/App.js` 文件，以加载合约实例（代码清单 2-10）。


    ```

    import ''./App.css'';

    import React, { Component } from ''react'';

    import Counter from ''./components/Counter'';

    import { getDeployed } from ''./contracts/Counter'';

    class App extends Component {

    state = { counter: null };

    async componentDidMount() {

    const counter = await getDeployed();

    this.setState({ counter });

    }

    render() {

    const { counter } = this.state;

    return (


    { counter && <Counter contract={counter} /> }


    );

    }

    }

    export default App;

    代码清单 2-10

    App 根组件的代码。我们使用根 App 状态来存储合约实例，并将其作为属性传递给子组件

    ```


    我们依赖 `componentDidMount` React 事件来加载 Counter 合约实例^(³⁹)，并将其存储在组件的状态中。仅当此实例可用时，我们才渲染
    `Counter` 可视化组件。


    ### 注意


    到目前为止，你可能已经意识到我们在这个 DApp 中缺少错误管理。例如，我们没有处理用户没有 MetaMask、合约地址不正确或网络连接丢失的情况。这是有意为之的决定，因为我们的目标是聚焦于理想路径，并快速概览
    DApp 的构成要素。在接下来的章节中，随着我们深入探讨每个主题，我们也将涵盖所有可能出错的情况。


    此时，你应该能够通过 `npm start` 运行你的应用程序，并检查一切是否正常渲染。确保已安装并解锁 MetaMask，且连接到 Rinkeby 网络。


    现在我们已经连接好了整个应用程序，是时候专注于 `Counter` 可视化组件本身了。


    ### 查询合约状态


    我们将从在组件上显示 `Counter` 合约的值开始（代码清单 2-11）。由于在组件的生命周期内我们不会更改 `Counter` 实例，我们可以在 React
    组件挂载时简单地检索该值。^(⁴⁰)


    ```

    // src/components/Counter.js

    async componentDidMount() {

    const counter = this.props.contract;

    const initialValue = await counter.methods.value().call();

    this.setState({ value: initialValue });

    }

    代码清单 2-11

    组件挂载时检索 Counter 的初始值

    ```


    请注意调用 counter 合约实例以检索初始值的方法。web3js 的调用 API 可能看起来有些别扭，但它背后有其逻辑：


    *   `methods` 属性允许访问合约 ABI 中定义的所有公开方法。它们并不直接设置在合约实例本身，这是为了防止与 web3 合约对象特有的其他方法发生冲突。

    *   `value()` 调用实际上并不查询网络，而是简单地构建一个方法调用。如果该函数需要任何参数，则必须在此处提供。

    *   `call()` 调用最终向区块链发出查询。我们将在下一章中审查查询方法与发起交易之间的区别，但目前我们只需要知道，当我们想从合约 *检索* 数据时使用
    `call()`。


    一旦我们在组件状态中设置了初始值，就可以最终将其渲染给用户了（代码清单 2-12）。


    ```

    render() {

    const { value } = this.state;

    if (!value) return "加载中";

    return (


    计数器值: { value.toString() }


    );

    }

    代码清单 2-12

    用于显示计数器值的渲染方法。请注意，该值仅在初始查询合约返回后才可用，因此我们需要处理值尚未就绪的情况

    ```


    至此，你应该能够在浏览器中重新加载应用程序，并看到 Rinkeby 网络上 `Counter` 实例的值。


    ### 提示


    你可以通过区块链浏览器（例如 Etherscan）来双重核对显示的值。^(⁴¹) Etherscan 是一个区块链浏览器，一个为地址和交易提供可视化界面的网站，可用于主网和大多数测试网络。查找合约地址，在
    “Read Contract” 选项卡下，你将能够检查计数器的值。


    我们的下一步将是允许用户通过发起交易来增加计数器的值。

