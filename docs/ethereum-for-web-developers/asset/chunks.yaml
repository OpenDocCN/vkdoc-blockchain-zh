  raw: '### Note


    Solidity supports function overloading; this means having two functions in the
    same contract with the same name but different arguments. While useful for certain
    scenarios, several client-side libraries, especially those in javascript, do not
    always have good support for them. Furthermore, it can be argued that overloaded
    functions make code more difficult to follow, and other smart contract languages
    have even made the explicit design decision to not support function overloading.


    Another interesting keyword in this sample contract is `require`. It allows you
    to check for a condition and throw an error (an EVM revert) if it doesn’t hold.
    It is commonly used to check for preconditions in functions.


    Remember that your contract is exposed to everyone on the blockchain. This means
    that any attacker can send a transaction to any public function with any parameters
    they wish. This makes a very compelling case for adding as many `require` statements
    as you need to always validate the inputs to your functions.


    Before delving deeper into Solidity code, let’s try out our first contract in
    Remix. Copy the code for `MyContract` into the newly created `MyContract.sol`
    file tab in Remix, and wait for it to auto-compile. Then open the *Run* tab on
    the right side of the IDE (Figure [3-3](#476252_1_En_3_Chapter.xhtml#Fig3)). This
    will allow you to configure the environment where you want to deploy your contract:
    choose *JavaScript VM* to run the code in a simulated blockchain in your browser,
    and pick any of the provided *Accounts*.


    ![../images/476252_1_En_3_Chapter/476252_1_En_3_Fig3_HTML.jpg](images/476252_1_En_3_Chapter/476252_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Deploying a contract via Remix


    To deploy your contract, choose `MyContract` from the contracts drop-down, enter
    an initial value to be used for the constructor we had defined, and accept the
    transaction. This will deploy the contract to your in-browser environment, which
    will execute almost instantly. Remember that when working in a real blockchain,
    the deployment will actually take several seconds.


    You will notice that a new log entry showed up at in the middle-bottom panel (Figure
    [3-4](#476252_1_En_3_Chapter.xhtml#Fig4)). This has detailed information on the
    transaction executed. Take some time to go through it and understand all the info
    listed, referring back to the “Transactions” section in this chapter.


    ![../images/476252_1_En_3_Chapter/476252_1_En_3_Fig4_HTML.jpg](images/476252_1_En_3_Chapter/476252_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Details of a transaction as shown in Remix’s console


    Also, on the bottom of the right sidebar of the IDE, you will now see that an
    instance of `MyContract` is listed under the *Deployed Contracts* section, including
    the address at which it was deployed. Expanding it will give you access to the
    public functions of the contract: `increase` and `getValue`. Try calling both
    of them, using different values for `increase`, to play around with the contract
    and check out the transactions generated.


    Remember the distinction we made earlier between transactions and calls to contracts:
    the former broadcasts a transaction to the entire network that may change the
    state of a contract or the balance of an address, while the latter simply queries
    a single node to retrieve a value. Since `getValue` is flagged as a method that
    does not modify the contract (via the `view` keyword), Remix automatically issues
    a call to the contract when you execute it instead of a transaction. On the other
    hand, since `increase` does alter the contract’s state, it spawns a new transaction
    every time you call it.


    We will now go more in depth into Solidity. Feel free to copy the code samples
    into Remix, deploy them, and interact with them. Remember that if you change the
    code of a contract, you will need to deploy a new instance of it in order to interact
    with the new version, since already deployed contracts cannot be changed. Also,
    refer to the Solidity documentation if you want to explore a particular topic
    in detail.


    ### What’s in a Function?


    A function definition in Solidity has the following structure:


    *   A function name


    *   A set of typed parameters


    *   A visibility modifier


    *   A pay-ability modifier


    *   A set of custom modifiers


    *   A set of return values


    A function may then look like the following. Note that a function may return more
    than a single value, expressed as a tuple.


    ```

    function myFunction(uint256 param1, bool param2)

    public payable onlyOwner

    returns (uint256, bool);

    ```


    #### Visibility Modifiers


    As in most object-oriented languages, functions in Solidity can specify different
    visibility or access modifiers, that control whether a function can be called
    from outside the contract or not. Solidity provides the following four access
    levels:


    *   External


    *   Public


    *   Internal


    *   Private


    **Private** functions can only be called from within the same contract. Under
    the hood, they are implemented as a `jump` to another part of the contract’s code.
    This means that a call to a private function does not create a new scope, with
    associated call data, value, gas, and so on. Instead, it executes within the same
    scope of the caller, what makes the call itself cheap in terms of gas usage. **Internal**
    functions work exactly the same, only that they allow derived contracts to call
    them (equivalent to `protected` in other languages).


    On the other hand, **external** functions can only be called from an external
    account or from another contract. External functions are used to define the exposed
    surface of a contract and are usually where most input argument checks are made.
    When a contract calls into another, it does by making an EVM `call`, which creates
    a new scope, with its own call data, transferred value, gas, and so on. This is
    more expensive than a jump to an internal or private function, but it is required
    by the EVM. Note that it is possible to call an external function from the same
    contract where it is defined, but this requires an EVM call as well.


    If you have an external function that you would also need to call from within
    your contract, you would label it as a **public** function. Public functions are
    a mix between external and internal: they support being called from both outside
    the contract and from within. The compiler is smart enough to use an internal
    cheap jump if the function is called from within the same contract, but creates
    a new EVM call if calling a public function from another contract.


    Note that state variables also have their own set of visibility modifiers, which
    are `public`, `internal`, and `private`, though they have slightly different semantics.
    A private state variable can only be accessed from within the same contract and
    an internal one from the same contract and from any derived contract as well (as
    is the case with functions). However, the public modifier, when applied to a state
    variable, acts as an internal modifier and defines an implicit getter function
    with the same name as the state variable (Listing [3-2](#476252_1_En_3_Chapter.xhtml#PC4)).


    ```

    contract ExplicitGetter {

    uint256 internal _value;

    function value() public returns (uint256) {

    return _value;

    }

    }

    contract ImplicitGetter {

    uint256 public value;

    }

    Listing 3-2

    Example of using a getter function vs. the public state variable modifier. Both
    contracts are equivalent in terms of the getter. There is one caveat though: implicit
    getters cannot be overridden by derived contracts

    ```'
