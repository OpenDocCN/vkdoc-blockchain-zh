    \n智能合约中的状态由其存储（`storage`）和余额（`balance`）组成。后者是两者中最直接的：以太坊中所有地址类型，无论是外部拥有账户还是智能合约，都有一个以`ETH`计价的关联余额。以太坊提供了用于查询这些余额（既可以从智能合约内部，也可以从网络外部）以及轻松转移余额的原语。\n\
    \n至于智能合约中的存储空间，它是极其巨大的：一个由 2²⁵⁶ 个插槽（每个插槽 32 字节）组成的可寻址空间。然而，在`EVM`中写入存储非常昂贵，因此应始终谨慎使用。\n\
    \n由于存储使用成本高昂，`EVM`还提供了另一个 256 位可寻址的临时空间，称为*内存*，它相当于其他环境中的内存堆，并且保证在事务之间被清除。\n\n\
    ### Gas 用量\n\n在以太坊网络上执行代码需要消耗*gas*。智能合约运行的每项操作都会消耗预定义的`gas`量，其中更复杂的操作消耗的`gas`比简单的操作更多。总而言之，`gas`只是执行成本的一种度量，旨在防止以太坊上出现过于复杂的计算。由于每笔事务都需要由网络上的每个全节点执行以进行验证，因此保持它们尽可能简单至关重要。这也是为什么在区块链上创建新数据的操作（例如写入存储或创建新合约）是`gas`消耗最高的操作之一。\n\
    \n`gas`是如何获得的？该过程在每个事务上自动处理。每当用户发送新事务时，他们会指定一个*gas 价格*，即`ETH`与`gas`之间的兑换率。事务运行后，会计算使用的`gas`总量，然后使用此`gas`价格将其转换为`ETH`，并从发送者的余额中扣除。请注意，`gas`价格没有要求，它可以几乎任意高或低。然而，`gas`价格非常高的事务发送成本将极其昂贵；另一方面，`gas`价格非常低的事务对矿工没有吸引力，并且很可能永远不会被包含在区块链中。\n"
- fmt: "### Note\n\nThere are some services, such as the ETH gas station,^([^(47)](#fn47))\
    \ which provide real-time statistics on gas price costs for the Ethereum network.\
    \ This provides you with info on the average gas price to use to send a transaction.\n\
    \nAdditionally to the gas price, the transaction sender must specify a maximum\
    \ gas allowance to be used during execution. If the transaction reaches a point\
    \ where it has used all the gas allowed, it stops running and reports an out-of-gas\
    \ error. This allows a user to control up to how much they are willing to spend\
    \ on a transaction. Conversely, this also allows the network to check that a user\
    \ has enough ETH for paying for execution before actually running the code by\
    \ checking that the sender’s balance is at least the maximum gas allowance times\
    \ the specified gas price.\n\nNote that Ethereum nodes can be used to query an\
    \ estimation of the gas required to run a transaction, assuming the context where\
    \ it runs does not change. This allows dynamic calculation of how much gas should\
    \ be attached to a transaction instead of needing to hard-code it for every call\
    \ issued by your system.\n\nHowever, since the amount of gas used depends on which\
    \ operations were executed, which in turn depend on the context where the transaction\
    \ is run, the estimation performed by a node may not always be representative.\
    \ For example, given the following pseudocode for a smart contract:\n\n```\nif\
    \ balance > 1ETH:\n    run_expensive_operation\nelse:\n    return true\n```\n\n\
    If the estimation is run when the contract’s balance is below 1 ETH, then the\
    \ gas estimation will be low, and the user may send the transaction to the network\
    \ using that value. However, before the transaction is actually picked up by a\
    \ miner, another transaction may front-run the original one and increase the contract’s\
    \ balance to be over 1 ETH. This would cause the original transaction to actually\
    \ require a much higher amount of gas, and end up failing with an out-of-gas error.\
    \ You should be aware of these situations when coding interactions with the network\
    \ by always adding a reasonable buffer to the gas allowance on top of the estimated\
    \ amounts and retrying transactions with updated estimations if needed.\n\n###\
    \ Transactions\n\nTo recap, in order to interact with a smart contract, an external\
    \ account must sign and broadcast a transaction directed to the contract’s address.\
    \ The network then executes the smart contract’s code, with all data contained\
    \ in the transaction (and the contract’s state) as context.\n\nA transaction is\
    \ a message with the following properties:\n\n*   A sender address, which is always\
    \ an externally owned account\n*   A destination address\n*   An amount of ETH\
    \ to transfer, which can be zero\n*   A binary data field, which packs the arguments\
    \ for the smart contract to execute\n*   A nonce\n*   Maximum gas allowance\n\
    *   Gas price, for converting between gas and ETH\n\nTransactions can also be\
    \ sent to another externally owned account. In these cases, data is typically\
    \ left empty, as the purpose is only to transfer ETH between accounts. However,\
    \ they also consume gas, albeit a small amount compared to those sent to smart\
    \ contracts.\n\n### Note\n\nAt the lowest level, the transaction does not actually\
    \ include the sender address as a property. It is retrieved from the transaction’s\
    \ signature.\n\nThe only field in a transaction that we have not yet reviewed\
    \ is the *nonce*. This is an incremental integer value that ensures that all transactions\
    \ sent from an account are processed in order: a nonce cannot skip a value and\
    \ is always equal to the number of executed plus pending transactions sent from\
    \ the address. It is also part of the network’s replay protection. Typically,\
    \ you will not need to deal with nonces explicitly.\n\nThe lifecycle of a transaction\
    \ is a bit complex, since transactions need to be picked up by a miner and confirmed\
    \ in order to be considered final (Figure [3-1](#476252_1_En_3_Chapter.xhtml#Fig1)).\n\
    \n![../images/476252_1_En_3_Chapter/476252_1_En_3_Fig1_HTML.png](images/476252_1_En_3_Chapter/476252_1_En_3_Fig1_HTML.png)\n\
    \nFigure 3-1 Lifecycle of an Ethereum transaction\n\nThe first step in a transaction’s\
    \ lifecycle is to be sent to an Ethereum node. This could be a private node owned\
    \ by the user or a public node with no accounts associated. On the former, signing\
    \ is typically handled by the node, which holds the user’s private keys; on the\
    \ latter, transactions are signed by client software and then sent to the node.\
    \ In either case, the node checks that the transaction is valid by trying to execute\
    \ it locally, and if it is, it broadcasts it to the network.\n\nBroadcasted transactions\
    \ are said to be *pending*, since they have not yet been included in a block,\
    \ but are waiting on what is called the *mempool*. The time until the transaction\
    \ is processed by a miner and added to the blockchain will typically depend on\
    \ network congestion and the gas price of the transaction itself – as we mentioned\
    \ before, higher gas prices lead to more attractive transactions which are mined\
    \ faster.\n\n### Note\n\nPending transactions can be *replaced* before they are\
    \ mined. After a transaction is broadcasted, and before it is picked up by a miner,\
    \ you may send another transaction with the same nonce and a higher gas price.\
    \ Upon seeing both pending transactions, miners will prefer the new one, which\
    \ will render the original one invalid since it has an outdated nonce. Replacing\
    \ transactions is used to correct a mistake or to increase the gas price of the\
    \ same transaction to speed up its confirmation, but it is not a technique very\
    \ widely used. We will review this in Chapter [5](#476252_1_En_5_Chapter.xhtml).\n\
    \nEventually, the transaction is *mined* and included in a block. However, due\
    \ to how the consensus algorithm in Ethereum works, it is still possible that\
    \ a chain *reorganization* occurs, and the block that included this transaction\
    \ is replaced by a different one. This is only likely to occur in very recently\
    \ mined blocks. With every new block mined on top of it, the chance of a block\
    \ being plucked out of the chain gets slimmer. A dozen confirmations (i.e., new\
    \ blocks mined) is good enough for most scenarios, but you may want to wait for\
    \ even more depending on your use case.\n\nIt is possible for a single account\
    \ to have multiple pending transactions, since it is not required by the protocol\
    \ to wait for a transaction to be mined or confirmed before sending the next one.\
    \ The nonce ensures that all pending transactions will be processed by miners\
    \ in the correct order.\n\nTransactions in Ethereum may not always be successful.\
    \ A transaction can fail due to a variety of reasons, such as running out of gas\
    \ during execution, or because of a failed precondition check in the smart contract\
    \ code. Smart contracts can enforce checks on the parameters with which they are\
    \ called, which may cause a transaction to fail if it does not pass all preconditions.\
    \ Transactions are atomic, meaning that they are all or nothing in terms of changes\
    \ to state. In other words, a failing transaction will not persist any changes\
    \ to the blockchain, except for the deduction of the gas execution fee from the\
    \ sender’s balance. As such, when a transaction you sent fails, you can be confident\
    \ that the state of your contracts on-chain was not altered in any way."
  raw: '### Note


    There are some services, such as the ETH gas station,^([^(47)](#fn47)) which provide
    real-time statistics on gas price costs for the Ethereum network. This provides
    you with info on the average gas price to use to send a transaction.


    Additionally to the gas price, the transaction sender must specify a maximum gas
    allowance to be used during execution. If the transaction reaches a point where
    it has used all the gas allowed, it stops running and reports an out-of-gas error.
    This allows a user to control up to how much they are willing to spend on a transaction.
    Conversely, this also allows the network to check that a user has enough ETH for
    paying forexecution before actually running the code by checking that the sender’s
    balance is at least the maximum gas allowance times the specified gas price.


    Note that Ethereum nodes can be used to query an estimation of the gas required
    to run a transaction, assuming the context where it runs does not change. This
    allows dynamic calculation of how much gas should be attached to a transaction
    instead of needing to hard-code it for every call issues by your system.


    However, since the amount of gas used depends on which operations were executed,
    which in turn depend on the context where the transaction is run, the estimation
    performed by a node may not always be representative. For example, given the following
    pseudocode for a smart contract:


    ```

    if balance > 1ETH:

    run_expensive_operation

    else:

    return true

    ```


    If the estimation is run when the contract’s balance is below 1 ETH, then the
    gas estimation will be low, and the user may send the transaction to the network
    using that value. However, before the transaction is actually picked up by a miner,
    another transaction may front-run the original one and increase the contract’s
    balance to be over 1 ETH. This would cause the original transaction to actually
    require a much higher amount of gas, and end up failing with an out-of-gas error.
    You should be aware of these situations when coding interactions with the network
    by always adding a reasonable buffer to the gas allowance on top of the estimated
    amounts and retrying transactions with updated estimations if needed.


    ### Transactions


    To recap, in order to interact with a smart contract, an external account must
    sign and broadcast a transaction directed to the contract’s address. The network
    then executes the smart contract’s code, with all data contained in the transaction
    (and the contract’s state) as context.


    A transaction is a message with the following properties:


    *   A sender address, which is always an externally owned account


    *   A destination address


    *   An amount of ETH to transfer, which can be zero


    *   A binary data field, which packs the arguments for the smart contract to execute


    *   A nonce


    *   Maximum gas allowance


    *   Gas price, for converting between gas and ETH


    Transactions can also be sent to another externally owned account. In these cases,
    data is typically left empty, as the purpose is only to transfer ETH between accounts.
    However, they also consume gas, albeit a small amount compared to those sent to
    smart contracts.


    ### Note


    At the lowest level, the transaction does not actually include the sender address
    as a property. It is retrieved from the transaction’s signature.


    The only field in a transaction that we have not yet reviewed is the *nonce*.
    This is an incremental integer value that ensures that all transactions sent from
    an account are processed in order: a nonce cannot skip a value and is always equal
    to the number of executed plus pending transactions sent from the address. It
    is also part of the network’s replay protection. Typically, you will not need
    to deal with nonces explicitly.


    The lifecycle of a transaction is a bit complex, since transactions need to be
    picked up by a miner and confirmed in order to be considered final (Figure [3-1](#476252_1_En_3_Chapter.xhtml#Fig1)).


    ![../images/476252_1_En_3_Chapter/476252_1_En_3_Fig1_HTML.png](images/476252_1_En_3_Chapter/476252_1_En_3_Fig1_HTML.png)


    Figure 3-1


    Lifecycle of an Ethereum transaction


    The first step in a transaction’s lifecycle is to be sent to an Ethereum node.
    This could be a private node owned by the user or a public node with no accounts
    associated. On the former, signing is typically handled by the node, which holds
    the user’s private keys; on the latter, transactions are signed by client software
    and then sent to the node. In either case, the node checks that the transaction
    is valid by trying to execute it locally, and if it is, it broadcasts it to the
    network.


    Broadcasted transactions are said to be *pending*, since they have not yet been
    included in a block, but are waiting on what is called the *mempool*. The time
    until the transaction is processed by a miner and added to the blockchain will
    typically depend on network congestion and the gas price of the transaction itself –
    as we mentioned before, higher gas prices lead to more attractive transactions
    which are mined faster.


    ### Note


    Pending transactions can be *replaced* before they are mined. After a transaction
    is broadcasted, and before it is picked up by a miner, you may send another transaction
    with the same nonce and a higher gas price. Upon seeing both pending transactions,
    miners will prefer the new one, which will render the original one invalid since
    it has an outdated nonce. Replacing transactions is used to correct a mistake
    or to increase the gas price of the same transaction to speed up its confirmation,
    but it is not a technique very widely used. We will review this in Chapter [5](#476252_1_En_5_Chapter.xhtml).


    Eventually, the transaction is *mined* and included in a block. However, due to
    how the consensus algorithm in Ethereum works, it is still possible that a chain
    *reorganization* occurs, and the block that included this transaction is replaced
    by a different one. This is only likely to occur in very recently mined blocks.
    With every new block mined on top of it, the chance of a block being plucked out
    of the chain gets slimmer. A dozen confirmations (i.e., new blocks mined) is good
    enough for most scenarios, but you may want to wait for even more depending on
    your use case.


    It is possible for a single account to have multiple pending transactions, since
    it is not required by the protocol to wait for a transaction to be mined or confirmed
    before sending the next one. The nonce ensures that all pending transactions will
    be processed by miners in the correct order.


    Transactions in Ethereum may not always be successful. A transaction can fail
    due to a variety of reasons, such as running out of gas during execution, or because
    of a failed precondition check in the smart contract code. Smart contracts can
    enforce checks on the parameters with which they are called, which may cause a
    transaction to fail if it does not pass all preconditions. Transactions are atomic,
    meaning that they are all or nothing in terms of changes to state. In other words,
    a failing transaction will not persist any changes to the blockchain, except for
    the deduction of the gas execution fee from the sender’s balance. As such, when
    a transaction you sent fails, you can be confident that the state of your contracts
    on-chain was not altered in any way.'
  trans: "\n### 注意\n\n有些服务，例如 ETH 加油站，^(⁴⁷) 会提供以太坊网络燃料价格的实时统计数据。这为你提供了发送交易时应使用的平均燃料价格信息。\n\
    \n除了燃料价格，交易发送方还必须指定执行期间允许使用的最大燃料限额。如果交易在达到允许使用的全部燃料时仍未执行完毕，它将停止运行并报告燃料耗尽错误。这使用户能够控制他们愿意为交易支付的最高成本。反之，这也允许网络在实际运行代码前，通过检查发送方余额是否至少等于最大燃料限额乘以指定燃料价格，来验证用户是否有足够的\
    \ ETH 支付执行费用。\n\n请注意，假设运行交易的上下文环境不变，可以使用以太坊节点查询运行该交易所需的预估燃料量。这允许动态计算一笔交易应附带多少燃料，而不必为你系统发出的每次调用都硬编码该数值。\n\
    \n然而，由于实际消耗的燃料量取决于执行了哪些操作，而这些操作又取决于交易运行的上下文环境，因此节点执行的预估并不总能代表实际情况。例如，考虑以下智能合约的伪代码：\n\
    \n```\nif balance > 1ETH:\n    run_expensive_operation\nelse:\n    return true\n\
    ```\n\n如果在合约余额低于 1 ETH 时进行预估，那么燃料估算值会偏低，用户可能会使用该值将交易发送到网络。但是，在实际被矿工打包之前，可能有另一笔交易抢先于原始交易，并将合约余额增加到超过\
    \ 1 ETH。这将导致原始交易实际需要更高的燃料量，并最终因燃料耗尽错误而失败。在与网络进行交互编码时，你应该意识到这些情况，始终在预估量的基础上为燃料限额增加一个合理的缓冲区，并在需要时使用更新后的预估量重试交易。\n\
    \n### 交易\n\n回顾一下，为了与智能合约交互，外部账户必须签署并广播一笔指向合约地址的交易。然后，网络会以交易中包含的所有数据（以及合约的状态）作为上下文来执行智能合约的代码。\n\
    \n一笔交易是包含以下属性的消息：\n\n*   发送方地址，这始终是一个外部拥有账户\n*   目标地址\n*   要转移的 ETH 数量，可以为 0\n\
    *   一个二进制数据字段，用于打包要由智能合约执行的参数\n*   一个 nonce 值\n*   最大燃料限额\n*   燃料价格，用于在燃料和 ETH\
    \ 之间进行换算\n\n交易也可以发送给另一个外部拥有账户。在这些情况下，数据域通常为空，因为唯一目的是在账户之间转移 ETH。然而，它们同样会消耗燃料，只是与发送给智能合约的交易相比消耗量较少。\n\
    \n### 注意\n\n在最低层面上，交易实际上并不将发送方地址作为属性包含在内。它是从交易的签名中推导出来的。\n\n交易中我们尚未提到的唯一字段是 *nonce*。这是一个递增的整数值，用于确保从一个账户发送的所有交易按顺序处理：nonce\
    \ 不能跳过某个值，并且始终等于该地址已发送的已执行交易与待处理交易的数量之和。它也是网络重放保护的一部分。通常，你无需显式处理 nonce。\n\n交易的生命周期有点复杂，因为交易需要被矿工打包并确认，才能被视为最终状态（图\
    \ 3-1）。\n\n![../images/476252_1_En_3_Chapter/476252_1_En_3_Fig1_HTML.png](img/476252_1_En_3_Fig1_HTML.png)\n\
    \n图 3-1 以太坊交易的生命周期\n\n交易生命周期的第一步是发送给一个以太坊节点。这可以是用户拥有的私有节点，也可以是未关联任何账户的公共节点。在前一种情况下，签名通常由持有用户私钥的节点处理；在后一种情况下，交易由客户端软件签名，然后发送给节点。无论哪种情况，节点都会通过尝试在本地执行来检查交易的有效性，如果有效，则将其广播到网络中。\n\
    \n已广播的交易被认为是“待处理”的，因为它们尚未被包含在区块中，而是在所谓的“交易内存池”中等待。交易被矿工处理并添加到区块链所需的时间通常取决于网络拥堵程度和交易本身的燃料价格——正如我们之前提到的，更高的燃料价格会使得交易更具吸引力，从而被更快地挖出。\n\
    \n### 注意\n\n待处理的交易在被挖出之前可以被“替换”。在一笔交易广播之后，在被矿工打包之前，你可以发送另一笔具有相同 nonce 但更高燃料价格的交易。矿工看到两笔待处理交易后，会优先选择新交易，这会使原始交易因\
    \ nonce 过时而失效。替换交易用于纠正错误或提高同一笔交易的燃料价格以加快确认速度，但这并非非常广泛使用的技术。我们将在第 5 章中讨论这一点。\n\n\
    最终，交易会被“挖出”并包含在一个区块中。然而，由于以太坊共识算法的工作方式，仍有可能发生链“重组”，包含此交易的区块被另一个区块取代。这种情况只可能发生在刚刚挖出的区块上。随着在其之上不断挖出新区块，该区块被从链中移除的可能性会越来越小。十几个确认（即新挖出的区块）对于大多数场景来说已经足够，但根据你的用例，你可能希望等待更多确认。\n\
    \n一个账户可能有多个待处理交易，因为协议不要求在发送下一笔交易之前等待前一笔交易被挖出或确认。Nonce 确保了所有待处理交易将被矿工按正确顺序处理。\n\
    \n以太坊上的交易并非总能成功。交易可能因多种原因失败，例如执行期间燃料耗尽，或智能合约代码中的前置条件检查失败。智能合约可以对其被调用时的参数执行检查，如果未通过所有前置条件，则可能导致交易失败。交易是原子性的，这意味着就状态变更而言，它们要么全部执行，要么全部不执行。换句话说，失败的交易不会在区块链上持久化任何更改，除了从发送方余额中扣除燃料执行费。因此，当你发送的交易失败时，你可以确信链上合约的状态并未以任何方式被改变。\n"
- fmt: "### Note\n\nFailed transactions are either `ABORT'`ed or `REVERT'`ed. The\
    \ difference between the two is that the former will consume all gas up to the\
    \ maximum allowance of the transaction, whereas the latter only consumes the gas\
    \ used up to the point where the transaction failed. Smart contracts usually fire\
    \ a `REVERT` when a precondition check fails, so as not to waste user’s gas.\n\
    \nDuring execution, a transaction may *log* arbitrary information. These logs\
    \ cannot be accessed from another smart contract and are only visible from outside\
    \ the Ethereum network itself, such as from a front-end interface. Logged data\
    \ may be structured and even *indexed*, allowing clients to search for specific\
    \ events. We will work with logs more in-depth when we tackle Solidity’s *events*.\n\
    \n### Calls\n\nWhile transactions are the only way to perform a change in the\
    \ Ethereum blockchain, they are not the only way to interact with smart contracts.\
    \ Any off-chain client can perform a query on a smart contract by making a static\
    \ *call* to it.\n\nCalls are different from transactions in that they do not need\
    \ to be signed and are not broadcasted to the Ethereum network, and thus cannot\
    \ make any changes to the blockchain state and do not cost any gas. Calls are\
    \ always resolved by the node that receives them and are only used for querying\
    \ data from a smart contract.\n\nA call executes smart contract code just like\
    \ a transaction does, the only difference is that any changes performed during\
    \ a call are not persisted, and the return value of a call is sent back to the\
    \ sender (unlike transactions, where the sender has no way to get a return value\
    \ back). If transactions can be thought of as setters that change the state of\
    \ a smart contract, calls would be the getters.\n\nCalls can even be issued on\
    \ older blocks. Since all data in the blockchain is persisted, the state of the\
    \ chain on every block,^([^(48)](#fn48)) so a call to a smart contract can be\
    \ made in the context of an older block. This feature is not used very often,\
    \ but can be used to reconstruct the history of a contract, although *logs* are\
    \ the preferred method to do this.\n\n## Solidity\n\nSolidity is an object-oriented\
    \ statically typed language, with curly-braced syntax inspired in Javascript,\
    \ and support for multiple inheritance. It is the most popular language for smart\
    \ contract development. At the time of this writing, the latest minor version\
    \ available is 0.5, which we will be using throughout the book.\n\nThe basic unit\
    \ of Solidity code is a `contract`, which is similar to a class, but compiles\
    \ to code that spawns a new smart contract. Solidity contracts can have state\
    \ variables, which are persisted in the contract’s storage, and can define functions\
    \ that are executed upon a call or a transaction. The language also supports modifiers,\
    \ events, libraries, complex data types, and other concepts that we will explore\
    \ in this section.\n\nWe will only be making an overview of Solidity, covering\
    \ the required features to be able to understand and make small changes to a smart\
    \ contract system. It is strongly suggested that you go through the Solidity documentation^([^(49)](#fn49))\
    \ to learn more in-depth about the language, and it is also a good idea to review\
    \ security best practices before rolling out your contracts.^([^(50)](#fn50))\n\
    \n### Remix\n\nBefore going into Solidity itself, we will introduce Remix,^([^(51)](#fn51))\
    \ a tool for quickly prototyping Solidity code (Figure [3-2](#476252_1_En_3_Chapter.xhtml#Fig2)).\
    \ Remix is a full in-browser IDE for Solidity development. It bundles a Solidity\
    \ code editor, a compiler, and an EVM runtime. The EVM runtime allows you to locally\
    \ deploy and test your smart contracts in a mock environment. Remix can also be\
    \ connected to any Ethereum node, allowing you to manage your smart contract on\
    \ any network, whether it is a local development network or the main Ethereum\
    \ network (also referred to as *mainnet*).\n\n![../images/476252_1_En_3_Chapter/476252_1_En_3_Fig2_HTML.jpg](images/476252_1_En_3_Chapter/476252_1_En_3_Fig2_HTML.jpg)\n\
    \nFigure 3-2\n\nScreenshot of remix IDE at remix.ethereum.org\n\nRemix has several\
    \ features for developing, analyzing, deploying, interacting with, and debugging\
    \ smart contracts. We will focus on the most fundamental ones, but feel free to\
    \ play around with the tool.\n\nTo start, add a new file by clicking the plus\
    \ sign on the top left of the IDE, and create a new `MyContract.sol` file. On\
    \ the right side of the screen, in the *Compile tab*, make sure you are using\
    \ the compiler version 0.5.0, and choose to *auto-compile* your contracts. We\
    \ will use this to test our first Solidity contract.\n\n### Note\n\nThe Solidity\
    \ compiler, written in C++, is not only compiled to native code but also to javascript\
    \ using Emscripten. This allows you to compile a Solidity smart contract directly\
    \ in your browser.\n\n### Your First Solidity Contract\n\nWe will start with a\
    \ very simple Solidity contract (Listing [3-1](#476252_1_En_3_Chapter.xhtml#PC2)).\
    \ This contract will hold a single integer value `myNumber` and provide a constructor\
    \ to set its initial value, a public function to increase it by a certain amount,\
    \ and a public getter to retrieve it.\n\n```\npragma solidity ^0.5.0;\ncontract\
    \ MyContract {\n    uint256 private myNumber;\n    constructor(uint256 initialValue)\
    \ public {\n        myNumber = initialValue;\n    }\n    function increase(uint256\
    \ x) public {\n        require(x > 0);\n        myNumber = myNumber + x;\n   \
    \ }\n    function getValue() public view returns (uint256) {\n        return myNumber;\n\
    \    }\n}\nListing 3-1\nSimple Solidity contract, implementing a counter\n```\n\
    \nLet’s go through this contract. First thing to notice is the `pragma` directive\
    \ to set a required Solidity compiler version that corresponds to the code. A\
    \ compiler that does not match the required version will refuse to compile the\
    \ file. In particular, `^0.5.0` indicates any version that starts with `0.5`.^([^(52)](#fn52))\n\
    \nNext is a `contract` block, which defines a smart contract to be deployed. The\
    \ contract can define several state variables, such as `myNumber` in the example,\
    \ which will be saved to storage in the EVM.\n\n### Note\n\nStorage is always\
    \ initialized to zero in the EVM. This means that all state variables in Solidity\
    \ are zero by default. To prevent any billion-dollar mistakes, Solidity does not\
    \ have `null` values.^([^(53)](#fn53))\n\nA contract can define multiple functions\
    \ that will be executed in its context and will have access to its storage. Functions\
    \ must always define the type of their arguments and their return type, if any.\
    \ Also, functions can have different visibilities, depending on whether they can\
    \ only be called internally within the contract or from outside, and can be restricted\
    \ to not modify the contract’s storage, like `getValue` in the example. A `constructor`\
    \ can be optionally defined and is run when the contract is deployed."
  raw: '### Note


    Failed transactions are either ABORT’ed or REVERT’ed. The difference between the
    two is that the former will consume all gas up to the maximum allowance of the
    transaction, whereas the latter only consumes the gas used up to the point where
    the transaction failed. Smart contracts usually fire a REVERT when a precondition
    check fails, so as not to waste user’s gas.


    During execution, a transaction may *log* arbitrary information. These logs cannot
    be accessed from another smart contract and are only visible from outside the
    Ethereum network itself, such as from a front-end interface. Logged data may be
    structured and even *indexed*, allowing clients to search for specific events.
    We will work with logs more in-depth when we tackle Solidity’s *events*.


    ### Calls


    While transactions are the only way to perform a change in the Ethereum blockchain,
    they are not the only way to interact with smart contracts. Any off-chain client
    can perform a query on a smart contract by making a static *call* to it.


    Calls are different from transactions in that they do not need to be signed and
    are not broadcasted to the Ethereum network, and thus cannot make any changes
    to the blockchain state and do not cost any gas. Calls are always resolved by
    the node that receives them and are only used for querying data from a smart contract.


    A call executes smart contract code just like a transaction does, the only difference
    is that any changes performed during a call are not persisted, and the return
    value of a call is sent back to the sender (unlike transactions, where the sender
    has no way to get a return value back). If transactions can be thought of as setters
    that change the state of a smart contract, calls would be the getters.


    Calls can even be issued on older blocks. Since all data in the blockchain is
    persisted, the state of the chain on every block,^([^(48)](#fn48)) so a call to
    a smart contract can be made in the context of an older block. This feature is
    not used very often, but can be used to reconstruct the history of a contract,
    although *logs* are the preferred method to do this.


    ## Solidity


    Solidity is an object-oriented statically typed language, with curly-braced syntax
    inspired in Javascript, and support for multiple inheritance. It is the most popular
    language for smart contract development. At the time of this writing, the latest
    minor version available is 0.5, which we will be using throughout the book.


    The basic unit of Solidity code is a `contract`, which is similar to a class,
    but compiles to code that spawns a new smart contract. Solidity contracts can
    have state variables, which are persisted in the contract’s storage, and can define
    functions that are executed upon a call or a transaction. The language also supports
    modifiers, events, libraries, complex data types, and other concepts that we will
    explore in this section.


    We will only be making an overview of Solidity, covering the required features
    to be able to understand and make small changes to a smart contract system. It
    is strongly suggested that you go through the Solidity documentation^([^(49)](#fn49))
    to learn more in-depth about the language, and it is also a good idea to review
    security best practices before rolling out your contracts.^([^(50)](#fn50))


    ### Remix


    Before going into Solidity itself, we will introduce Remix,^([^(51)](#fn51)) a
    tool for quickly prototyping Solidity code (Figure [3-2](#476252_1_En_3_Chapter.xhtml#Fig2)).
    Remix is a full in-browser IDE for Solidity development. It bundles a Solidity
    code editor, a compiler, and an EVM runtime. The EVM runtime allows you to locally
    deploy and test your smart contracts in a mock environment. Remix can also be
    connected to any Ethereum node, allowing you to manage your smart contract on
    any network, whether it is a local development network or the main Ethereum network
    (also referred to as *mainnet*).


    ![../images/476252_1_En_3_Chapter/476252_1_En_3_Fig2_HTML.jpg](images/476252_1_En_3_Chapter/476252_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Screenshot of remix IDE at remix.ethereum.org


    Remix has several features for developing, analyzing, deploying, interacting with,
    and debugging smart contracts. We will focus on the most fundamental ones, but
    feel free to play around with the tool.


    To start, add a new file by clicking the plus sign on the top left of the IDE,
    and create a new `MyContract.sol` file. On the right side of the screen, in the
    *Compile tab*, make sure you are using the compiler version 0.5.0, and choose
    to *auto-compile* your contracts. We will use this to test our first Solidity
    contract.


    ### Note


    The Solidity compiler, written in C++, is not only compiled to native code but
    also to javascript using Emscripten. This allows you to compile a Solidity smart
    contract directly in your browser.


    ### Your First Solidity Contract


    We will start with a very simple Solidity contract (Listing [3-1](#476252_1_En_3_Chapter.xhtml#PC2)).
    This contract will hold a single integer value `myNumber` and provide a constructor
    to set its initial value, a public function to increase it by a certain amount,
    and a public getter to retrieve it.


    ```

    pragma solidity ^0.5.0;

    contract MyContract {

    uint256 private myNumber;

    constructor(uint256 initialValue) public {

    myNumber = initialValue;

    }

    function increase(uint256 x) public {

    require(x > 0);

    myNumber = myNumber + x;

    }

    function getValue() public view returns (uint256) {

    return myNumber;

    }

    }

    Listing 3-1

    Simple Solidity contract, implementing a counter

    ```


    Let’s go through this contract. First thing to notice is the `pragma` directive
    to set a required Solidity compiler version that corresponds to the code. A compiler
    that does not match the required version will refuse to compile the file. In particular,
    `^0.5.0` indicates any version that starts with `0.5`.^([^(52)](#fn52))


    Next is a `contract` block, which defines a smart contract to be deployed. The
    contract can define several state variables, such as `myNumber` in the example,
    which will be saved to storage in the EVM.


    ### Note


    Storage is always initialized to zero in the EVM. This means that all state variables
    in Solidity are zero by default. To prevent any billion-dollar mistakes, Solidity
    does not have `null` values.^([^(53)](#fn53))


    A contract can define multiple functions that will be executed in its context
    and will have access to its storage. Functions must always define the type of
    their arguments and their return type, if any. Also, functions can have different
    visibilities, depending on whether they can only be called internally within the
    contract or from outside, and can be restricted to not modify the contract’s storage,
    like `getValue` in the example. A `constructor` can be optionally defined and
    is run when the contract is deployed.'
  trans: "\n### 注意\n\n失败的交易要么被`ABORT`（中止），要么被`REVERT`（回滚）。两者的区别在于：前者会消耗交易最大许可额度内的全部\
    \ gas，而后者仅消耗交易失败前的 gas。智能合约通常在前提条件检查失败时触发`REVERT`，以避免浪费用户的 gas。\n\n在执行过程中，交易可能会*记录*任意信息。这些日志无法从其他智能合约访问，只能在以太坊网络外部（例如前端界面）查看。日志数据可以是结构化的，甚至可以被*索引*，从而让客户端能够搜索特定事件。在后续探讨\
    \ Solidity 的*事件*时，我们将更深入地处理日志。\n\n### 调用\n\n虽然交易是在以太坊区块链中执行状态变更的唯一方式，但它们并非与智能合约交互的唯一途径。任何链下客户端都可以通过对智能合约发起静态*调用*来执行查询。\n\
    \n调用与交易的不同之处在于：调用无需签名，也不会广播到以太坊网络，因此无法更改区块链状态，也不需要消耗任何 gas。调用始终由接收它的节点处理，仅用于从智能合约中查询数据。\n\
    \n调用执行智能合约代码的方式与交易相同，唯一区别在于：调用期间所做的任何更改都不会持久化，并且调用的返回值会直接返回给发送方（与交易不同——交易发送方无法获取返回值）。如果将交易视为改变智能合约状态的“设置器”，那么调用就是“获取器”。\n\
    \n调用甚至可以对较早的区块发出。由于区块链中的所有数据都是持久化的，每个区块上的链状态都是已知的^(⁴⁸)，因此可以在较早区块的上下文中对智能合约发起调用。这一功能并不常用，但可用于重构合约的历史记录——尽管*日志*是更常用的方法。\n\
    \n## Solidity\n\nSolidity 是一种面向对象的静态类型语言，其花括号语法受 Javascript 启发，并支持多重继承。它是智能合约开发中最流行的语言。在撰写本文时，最新的次要版本是\
    \ 0.5，本书将全程使用该版本。\n\nSolidity 代码的基本单元是`contract`（合约），它类似于类，但编译后会生成部署新智能合约的代码。Solidity\
    \ 合约可以包含状态变量（持久化存储在合约的存储空间中），也可以定义通过调用或交易执行的函数。该语言还支持修饰符、事件、库、复杂数据类型以及其他概念，我们将在本节中逐一探讨。\n\
    \n我们仅对 Solidity 进行概述，涵盖理解和微调智能合约系统所需的基本特性。强烈建议你阅读 Solidity 文档^(⁴⁹)以更深入地学习该语言，并且在部署合约前审阅安全最佳实践也是个好主意^(⁵⁰)。\n\
    \n### Remix\n\n在深入学习 Solidity 之前，我们先介绍 Remix^(⁵¹)——一个用于快速原型化 Solidity 代码的工具（图\
    \ 3-2）。Remix 是一个完全在浏览器中运行的 Solidity 开发 IDE，集成了 Solidity 代码编辑器、编译器和 EVM 运行时。EVM\
    \ 运行时允许你在模拟环境中本地部署和测试智能合约。Remix 还可以连接到任何以太坊节点，让你能够在任何网络（无论是本地开发网络还是主以太坊网络，也称为*主网*）上管理智能合约。\n\
    \n![../images/476252_1_En_3_Chapter/476252_1_En_3_Fig2_HTML.jpg](img/476252_1_En_3_Fig2_HTML.jpg)\n\
    \n图 3-2\n\nremix.ethereum.org 上的 Remix IDE 截图\n\nRemix 提供了开发、分析、部署、交互及调试智能合约的多项功能。我们将聚焦于最基础的功能，但你可以自由探索该工具的其他特性。\n\
    \n首先，点击 IDE 左上角的加号添加新文件，创建一个名为`MyContract.sol`的文件。在屏幕右侧的*编译*选项卡中，确保使用编译器版本 0.5.0，并选择*自动编译*合约。我们将用它来测试第一个\
    \ Solidity 合约。\n\n### 注意\n\nSolidity 编译器用 C++编写，不仅会编译为原生代码，还会通过 Emscripten 编译为\
    \ JavaScript。这使你能够直接在浏览器中编译 Solidity 智能合约。\n\n### 你的第一个 Solidity 合约\n\n让我们从一个非常简单的\
    \ Solidity 合约开始（代码清单 3-1）。该合约将持有一个整型值`myNumber`，并提供构造函数来设置其初始值、一个公开函数来增加指定数值，以及一个公开的获取器来检索当前值。\n\
    \n```\npragma solidity ⁰.5.0;\ncontract MyContract {\n    uint256 private myNumber;\n\
    \    constructor(uint256 initialValue) public {\n        myNumber = initialValue;\n\
    \    }\n    function increase(uint256 x) public {\n        require(x > 0);\n \
    \       myNumber = myNumber + x;\n    }\n    function getValue() public view returns\
    \ (uint256) {\n        return myNumber;\n    }\n}\n代码清单 3-1\n实现计数器的简单 Solidity\
    \ 合约\n```\n\n让我们逐行分析这个合约。首先注意到的是`pragma`指令，它设定了与代码对应的 Solidity 编译器版本要求。不符合所需版本的编译器将拒绝编译该文件。具体来说，`⁰.5.0`表示任何以`0.5`开头的版本。^(⁵²)\n\
    \n接下来是`contract`代码块，它定义了一个待部署的智能合约。合约可以定义多个状态变量（如示例中的`myNumber`），这些变量将保存在 EVM\
    \ 的存储空间中。\n\n### 注意\n\n在 EVM 中，存储空间始终初始化为零。这意味着 Solidity 中所有状态变量默认值都是零。为避免任何价值数十亿美元的错误，Solidity\
    \ 没有`null`值。^(⁵³)\n\n合约可以定义多个函数，这些函数将在其上下文中执行，并可访问其存储空间。函数必须始终定义参数类型和返回类型（如有）。此外，函数可以具有不同的可见性，具体取决于它们是仅在合约内部调用还是可从外部调用；也可以限制为不修改合约的存储空间（如示例中的`getValue`）。可选的`constructor`（构造函数）在合约部署时执行。\n\
    \n"
- fmt: "### Note\n\nSolidity supports function overloading; this means having two\
    \ functions in the same contract with the same name but different arguments. While\
    \ useful for certain scenarios, several client-side libraries, especially those\
    \ in JavaScript, do not always have good support for them. Furthermore, it can\
    \ be argued that overloaded functions make code more difficult to follow, and\
    \ other smart contract languages have even made the explicit design decision to\
    \ not support function overloading.\n\nAnother interesting keyword in this sample\
    \ contract is `require`. It allows you to check for a condition and throw an error\
    \ (an EVM revert) if it doesn’t hold. It is commonly used to check for preconditions\
    \ in functions.\n\nRemember that your contract is exposed to everyone on the blockchain.\
    \ This means that any attacker can send a transaction to any public function with\
    \ any parameters they wish. This makes a very compelling case for adding as many\
    \ `require` statements as you need to always validate the inputs to your functions.\n\
    \nBefore delving deeper into Solidity code, let’s try out our first contract in\
    \ Remix. Copy the code for `MyContract` into the newly created `MyContract.sol`\
    \ file tab in Remix, and wait for it to auto-compile. Then open the *Run* tab\
    \ on the right side of the IDE (Figure [3-3](#476252_1_En_3_Chapter.xhtml#Fig3)).\
    \ This will allow you to configure the environment where you want to deploy your\
    \ contract: choose *JavaScript VM* to run the code in a simulated blockchain in\
    \ your browser, and pick any of the provided *Accounts*.\n\n![../images/476252_1_En_3_Chapter/476252_1_En_3_Fig3_HTML.jpg](images/476252_1_En_3_Chapter/476252_1_En_3_Fig3_HTML.jpg)\n\
    \n**Figure 3-3** Deploying a contract via Remix\n\nTo deploy your contract, choose\
    \ `MyContract` from the contracts drop-down, enter an initial value to be used\
    \ for the constructor we had defined, and accept the transaction. This will deploy\
    \ the contract to your in-browser environment, which will execute almost instantly.\
    \ Remember that when working in a real blockchain, the deployment will actually\
    \ take several seconds.\n\nYou will notice that a new log entry showed up at in\
    \ the middle-bottom panel (Figure [3-4](#476252_1_En_3_Chapter.xhtml#Fig4)). This\
    \ has detailed information on the transaction executed. Take some time to go through\
    \ it and understand all the info listed, referring back to the \"Transactions\"\
    \ section in this chapter.\n\n![../images/476252_1_En_3_Chapter/476252_1_En_3_Fig4_HTML.jpg](images/476252_1_En_3_Chapter/476252_1_En_3_Fig4_HTML.jpg)\n\
    \n**Figure 3-4** Details of a transaction as shown in Remix's console\n\nAlso,\
    \ on the bottom of the right sidebar of the IDE, you will now see that an instance\
    \ of `MyContract` is listed under the *Deployed Contracts* section, including\
    \ the address at which it was deployed. Expanding it will give you access to the\
    \ public functions of the contract: `increase` and `getValue`. Try calling both\
    \ of them, using different values for `increase`, to play around with the contract\
    \ and check out the transactions generated.\n\nRemember the distinction we made\
    \ earlier between transactions and calls to contracts: the former broadcasts a\
    \ transaction to the entire network that may change the state of a contract or\
    \ the balance of an address, while the latter simply queries a single node to\
    \ retrieve a value. Since `getValue` is flagged as a method that does not modify\
    \ the contract (via the `view` keyword), Remix automatically issues a call to\
    \ the contract when you execute it instead of a transaction. On the other hand,\
    \ since `increase` does alter the contract's state, it spawns a new transaction\
    \ every time you call it.\n\nWe will now go more in depth into Solidity. Feel\
    \ free to copy the code samples into Remix, deploy them, and interact with them.\
    \ Remember that if you change the code of a contract, you will need to deploy\
    \ a new instance of it in order to interact with the new version, since already\
    \ deployed contracts cannot be changed. Also, refer to the Solidity documentation\
    \ if you want to explore a particular topic in detail.\n\n### What’s in a Function?\n\
    \nA function definition in Solidity has the following structure:\n\n* A function\
    \ name\n* A set of typed parameters\n* A visibility modifier\n* A pay-ability\
    \ modifier\n* A set of custom modifiers\n* A set of return values\n\nA function\
    \ may then look like the following. Note that a function may return more than\
    \ a single value, expressed as a tuple.\n\n```\nfunction myFunction(uint256 param1,\
    \ bool param2)\npublic payable onlyOwner\nreturns (uint256, bool);\n```\n\n####\
    \ Visibility Modifiers\n\nAs in most object-oriented languages, functions in Solidity\
    \ can specify different visibility or access modifiers, that control whether a\
    \ function can be called from outside the contract or not. Solidity provides the\
    \ following four access levels:\n\n* External\n* Public\n* Internal\n* Private\n\
    \n**Private** functions can only be called from within the same contract. Under\
    \ the hood, they are implemented as a `jump` to another part of the contract's\
    \ code. This means that a call to a private function does not create a new scope,\
    \ with associated call data, value, gas, and so on. Instead, it executes within\
    \ the same scope of the caller, what makes the call itself cheap in terms of gas\
    \ usage. **Internal** functions work exactly the same, only that they allow derived\
    \ contracts to call them (equivalent to `protected` in other languages).\n\nOn\
    \ the other hand, **external** functions can only be called from an external account\
    \ or from another contract. External functions are used to define the exposed\
    \ surface of a contract and are usually where most input argument checks are made.\
    \ When a contract calls into another, it does by making an EVM `call`, which creates\
    \ a new scope, with its own call data, transferred value, gas, and so on. This\
    \ is more expensive than a jump to an internal or private function, but it is\
    \ required by the EVM. Note that it is possible to call an external function from\
    \ the same contract where it is defined, but this requires an EVM call as well.\n\
    \nIf you have an external function that you would also need to call from within\
    \ your contract, you would label it as a **public** function. Public functions\
    \ are a mix between external and internal: they support being called from both\
    \ outside the contract and from within. The compiler is smart enough to use an\
    \ internal cheap jump if the function is called from within the same contract,\
    \ but creates a new EVM call if calling a public function from another contract.\n\
    \nNote that state variables also have their own set of visibility modifiers, which\
    \ are `public`, `internal`, and `private`, though they have slightly different\
    \ semantics. A private state variable can only be accessed from within the same\
    \ contract and an internal one from the same contract and from any derived contract\
    \ as well (as is the case with functions). However, the public modifier, when\
    \ applied to a state variable, acts as an internal modifier and defines an implicit\
    \ getter function with the same name as the state variable (Listing [3-2](#476252_1_En_3_Chapter.xhtml#PC4)).\n\
    \n```\ncontract ExplicitGetter {\n    uint256 internal _value;\n    function value()\
    \ public returns (uint256) {\n        return _value;\n    }\n}\n\ncontract ImplicitGetter\
    \ {\n    uint256 public value;\n}\n```\n\n**Listing 3-2** Example of using a getter\
    \ function vs. the public state variable modifier. Both contracts are equivalent\
    \ in terms of the getter. There is one caveat though: implicit getters cannot\
