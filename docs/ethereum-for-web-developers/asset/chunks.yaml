    *To Ale, my soon-to-be-wife, who supported me through the many days that went
    on while writing this book.*


    *To my parents, both computer scientists, who passed down their passion on to
    me.*


    ## Introduction


    It was not easy to write a book on Ethereum. Ethereum is one of the fastest evolving
    technologies I have ever seen. It builds on an entirely new computing model that
    did not even exist five years ago, and has undergone countless transformations
    since its conception. Writing something as static as a book feels an almost futile
    attempt to try to capture it. Combining this with web development, another area
    known for its rapid-changing environment, seemed like a daunting task.


    Nevertheless, there are concepts that have become fundamental to developing blockchain-based
    applications. Even if the space is new, we are seeing many new chains being launched
    ^([¹](#fn1)) after Bitcoin and Ethereum, and all share many of its basic building
    blocks. Those are the concepts that this book attempts to capture, seen from the
    perspective of a web developer. I believe they will be as helpful in several years’
    time as they are today, even if the tools and practices we rely on change completely.


    Throughout the book, you may read many disclaimers in the form of *at the time
    of this writing*, to emphasize things that are bound to change in the near future
    – some of them even did in the time it took me to write and review each chapter.
    However, it is important for you to keep in mind that the disclaimer applies to
    the entire book, as the Ethereum ecosystem is in constant evolution.


    ## Who this book is for


    This book is for me a few years ago, before entering the blockchain space. I had
    worked as a full stack developer for several years, and moving into Ethereum rocked
    the foundations of how I had been building and thinking applications.


    At that moment, it was surprisingly difficult to find comprehensive material to
    understand all the aspects of Ethereum needed to build a decentralized application.
    And it still is today, for information is mostly fragmented, and often tailored
    for a specific toolset.


    So, this book is for developers experienced in web applications, who want to apply
    their skillset to this new decentralized platform that is Ethereum. What we are
    seeing is much like the mobile revolution, which completely changed how we interacted
    with the web over a decade ago. It required developers to relearn and adjust to
    a new paradigm. The same is happening now.


    With that in mind, this book presents, on top of traditional web development,
    the new concepts that come from having an Ethereum network at your disposal.


    ## What you should know


    Being written for web developers, this book assumes that you already know and
    master what a web application is, are comfortable with `javascript` as a development
    language, and understand concepts such as client-server architecture, relational
    databases, the HTTP request/response cycle, and DNS.


    In particular, we will make use of `React` as a front-end library to simplify
    the development of many examples throughout the book. Considering that `React`
    has existed for longer than Ethereum itself, and given its popularity today, it
    seems like an adequate choice. We will not rely on any framework or state-management
    solution, as we will keep our examples simple and focused on the Ethereum side
    of the picture.


    Even though we will be working with a cryptocurrency, it is not necessary to have
    prior knowledge of cryptography or currencies to approach this book. We will be
    covering the basics of hashing and public key cryptography in the first chapter,
    and briefly go through financial incentives in the last ones. Of course, if either
    of those areas are of interest to you, blockchain is a fantastic place to exercise
    them.


    ## The working environment


    Much of this book is composed of code samples. Even if the value of this book
    relies on the concepts it attempts to pass on to you, each chapter includes several
    code snippets or full applications to help illustrate them. With that in mind,
    you may want to have an environment ready to reproduce the experiments listed.


    All code samples are written in Javascript `ES6`, were developed and tested on
    an Ubuntu Linux system, and run on `nodejs` ^([²](#fn2)) `10.16` from a `bash`
    shell. With Javascript being multiplatform, the samples should seamlessly run
    on OSX or Windows environments, though your mileage may vary. That said, having
    `npm` ^([³](#fn3)) working and being able to run a `create-react-app` ^([⁴](#fn4))
    locally should be enough for most code samples. Certain chapters may also require
    you to install and run an Ethereum node, such as `Geth` ^([⁵](#fn5)) or `Parity
    Ethereum`. ^([⁶](#fn6)) Refer to their websites for platform-specific instructions
    for installing them.


    We will make very limited usage of Ethereum-specific tools and libraries throughout
    the book. We will limit ourselves to a single Javascript library for interacting
    with the Ethereum network, ^([⁷](#fn7)) plus a tool for simplifying the compilation
    of smart contracts, ^([⁸](#fn8)) and a library of standard contracts to avoid
    reimplementing them from scratch. ^([⁹](#fn9)) The tooling and framework space
    in Ethereum changes fast, and I wanted to avoid tying the book to one of them.
    Nevertheless, when you start your new Ethereum application, relying on an existing
    framework such as `OpenZeppelin`, `Buidler`, `Truffle`, `Embark`, or `Etherlime`
    may help you speed things up.'
