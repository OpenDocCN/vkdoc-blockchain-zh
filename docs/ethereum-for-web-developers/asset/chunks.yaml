    to check for the market value of the reward token against the execution cost to
    determine the profit. Not only that, but it also needs to ensure there is enough
    liquidity in the market to trade such token for ETH when they want to cash out
    their profits – and that is without considering the fees for that exchange.


    In other words, paying relayer rewards in a protocol-specific ERC20 is useful
    if the relayer infrastructure you are using is specific to your application, but
    ETH or a widespread ERC20^([^(111)](#fn111)) may be a better option for working
    with decentralized relayers.'
  trans: '

    ### 估算利润


    在此场景中生成签名交易的代码与前一场景类似，唯一的区别在于用户现在需要包含 gas 价格、gas 上限和奖励的值。前两个值的估算方法可见第 5 章，具体做法是使用类似
    `ethgasstation` API 或 `gasPrice` JSON-RPC 方法这类价格预言机来获取 gas 价格，并对即将发送的交易执行 `estimateGas`
    来估算 gas 上限。奖励值可能取决于其他因素，但必须大于中继者的总执行成本，这样才能激励其转发交易。


    在此场景中，中继者不仅需要转发请求的交易，还需通过计算利润来评估是否应该转发。预估利润低于某个阈值的交易应被丢弃；如果多个交易（来自不同身份）排队等待处理，则可依据利润高低来决定优先执行顺序。


    利润可以通过实际估算整个调用过程，将估算结果乘以 gas 价格，再从奖励中减去该值来轻松计算。


    ```

    // 08-meta-txs/02-identity-with-rewards.js

    let estimatedGas = await identity.methods

    .forward(reward, gasPrice, gasLimit,

    recipient, value, data, signature)

    .estimateGas({ from: relayer, gasPrice });

    let estimatedProfit =

    BN(reward).minus(BN(estimatedGas).times(gasPrice));

    ```


    需要留意的是，如果用户请求了更高的 `gasLimit`，交易实际所需的 gas 值可能会高于估算值。为了实际执行交易，中继者应发送相当于 `gasLimit`
    加上处理元交易所需额外 gas 的 gas 配额。这笔额外 gas 大致可以计算为直接向接收方合约发送交易与通过身份合约作为元交易发送之间的差值。在我们的实现中，这个差值约为
    60K gas，不过该值并非恒定不变：它会根据交易数据的大小产生轻微波动。


    ```

    await identity.methods

    .forward(reward, gasPrice, gasLimit,

    recipient, value, data, signature)

    .send({ from: relayer, gasPrice, gas: gasLimit + 60000 });

    ```


    请注意，如果估算值与实际使用量存在差异，这个差值实际上可能会导致交易成本超出中继者的预期，因为中继者可能会设置更高的 gas 配额。


    ### 实物支付


    交易执行的 gas 费用以 ETH 支付，因为它是以太坊网络的原生货币。然而，没有任何因素强制我们必须以同种货币向中继者支付奖励，因为在以太坊上还有许多其他交换媒介：每一种可替代代币（ERC20）都是潜在的货币。


    这为我们打开了允许用户仅使用代币进行交易的大门，因为不再需要 ETH 来支付 gas 费用。如果我们的应用程序建立在基于代币的协议之上，这一点尤其具有吸引力：我们可以随着用户参与我们的网络，将代币发送给他们，而这些代币又可用于支付中继者奖励。我们的用户永远无需持有或购买任何
    ETH；他们只需使用我们应用的代币。


    支持代币支付的代码是对之前代码的直接修改。我们在转发函数中添加了一个新的 `rewardToken` 参数，并在此参数设置为零地址时，向该地址发送代币或发送
    ETH。


    ```

    // 08-meta-txs/contracts/IdentityWithTokenRewards.sol

    import "openzeppelin-solidity/contracts/token/ERC20/IERC20.sol";

    function forward(

    uint256 reward, address rewardToken,

    uint256 gasPrice, uint256 gasLimit,

    address to, uint256 value, bytes memory data,

    bytes memory signature

    ) public returns (bytes memory) {

    // 验证交易的 gas 价格

    require(tx.gasPrice >= gasPrice, "Gas price too low");

    // 获取已签名交易的哈希值

    bytes32 hash = getHash(

    reward, rewardToken, gasPrice, gasLimit, to, value, data

    ).toEthSignedMessageHash();

    // 检索签名者地址并验证

    address signer = hash.recover(signature);

    require(accounts[signer], "Signer not registered");

    // 递增 nonce，执行调用，并通知成功

    nonce++;

    require(gasleft() >= gasLimit);

    (bool success, bytes memory returnData) =

    to.call.value(value).gas(gasLimit)(data);

    emit Forwarded(nonce, success, msg.sender);

    // 向中继者支付奖励

    if (rewardToken == address(0)) {

    msg.sender.transfer(reward);

    } else {

    require(IERC20(rewardToken).transfer(msg.sender, reward));

    }

    return returnData;

    }

    ```


    需要牢记的是，虽然这种机制在你的应用启动中继者用代币换取执行服务时特别有用，但它也给去中心化的中继者带来了额外的困难。一个进行桌面挖矿的随机中继者现在需要检查奖励代币相对于执行成本的市场价值，以确定利润。不仅如此，它还需要确保市场上有足够的流动性，以便在想要兑现利润时将该代币兑换为
    ETH——而这还没有考虑兑换所需的费用。


    换句话说，如果你使用的中继基础设施是特定于你的应用的，那么用协议特定的 ERC20 代币支付中继者奖励是有效的；但若要与去中心化的中继者合作，ETH 或一种广泛流通的
    ERC20 代币^(¹¹¹) 可能是更好的选择。

    '
- fmt: '### Native Meta Transactions


    Meta transactions, as we have just seen, require the use of an identity contract
    to act as a bouncer proxy to the actual contracts the user is interacting with.
    The identity contract holds the logic to process the signed transactions and then
    calls into a third-party contract, which does not require to be aware of meta
    transactions.


    However, it is possible to remove the need for identity contracts if the application
    contracts already have support for processing meta transactions. This approach
    is named *native meta transactions*,[^(112)](#fn112) since it is built-in natively
    on the application contracts, instead of requiring a proxy identity contract.


    As an example, let’s add native meta transactions to an `ERC721` contract,[^(113)](#fn113)
    allowing any user who holds a non-fungible token to sign a transaction to have
    it transferred without expending gas (Listing [7-28](#476252_1_En_7_Chapter.xhtml#PC40)).
    The code is similar to the forwarding function we have been working with, except
    that it is specialized to just perform token transfers.


    ```

    // 08-meta-txs/contracts/ERC721WithNativeMetaTxs.sol

    pragma solidity ^0.5.0;

    import "openzeppelin-solidity/contracts/token/ERC721/ERC721.sol";

    import "openzeppelin-solidity/contracts/cryptography/ECDSA.sol";

    contract ERC721WithNativeMetaTxs is ERC721 {

    using ECDSA for bytes32;

    // Track nonces per signer

    mapping (address => uint256) nonces;

    function signedTransferFrom(

    address from, address to, uint256 tokenId,

    uint256 nonce, bytes memory signature

    ) public {

    // Retrieve signer

    bytes32 hash = getTransferHash(

    from, to, tokenId, nonce, signature

    ).toEthSignedMessageHash();

    address signer = hash.recover(signature);

    // Ensure signer can handle this token

    require(_isApprovedOrOwner(signer, tokenId));

    // Validate nonce and increase it

    require(nonce == nonces[signer]);

    nonces[signer]++;

    // Execute the transfer

    _transferFrom(from, to, tokenId);

    }

    // Calculates the hash to be signed for a transfer

    function getTransferHash(

    address from, address to, uint256 tokenId, uint256 nonce

    ) public view returns (bytes32) {

    return keccak256(abi.encodePacked(

    from, to, tokenId, nonce, address(this)

    ));

    }

    }

    Listing 7-28

    Adding native meta transactions to an ERC721 contract. Note that the nonces now
    need to be tracked per signer

    ```


    By bundling this logic in the reward token contract itself directly, our users
    can directly sign token transfers that are then sent by a relayer and executed
    by the `ERC721` contract. This allows a user with an existing account to benefit
    from meta transactions (which could be subsidized by our application) without
    having to deploy an identity contract.


    #### Rewards in Native Meta Transactions


    While moving the meta transaction logic to the application contract directly reduces
    complexity for the user, it introduces an additional difficulty: how to handle
    rewards to relayers. Identity contracts did not face this problem since they already
    held all of the user’s assets, so they could directly transfer them to relayers
    as payment.


    In the case of `ERC20` tokens, the solution is simple: the token contract can
    manage the signer’s tokens and directly transfer the reward to the relayer of
    the transaction using those very tokens (Listing [7-29](#476252_1_En_7_Chapter.xhtml#PC41)).


    ```

    // 08-meta-txs/contracts/ERC20WithNativeMetaTxs.sol

    function signedTransfer(

    address to, uint256 value,

    uint256 nonce, uint256 reward, bytes memory signature

    ) public {

    bytes32 hash = getTransferHash(

    to, value, nonce, reward

    ).toEthSignedMessageHash();

    address signer = hash.recover(signature);

    require(nonce == nonces[signer]);

    nonces[signer]++;

    _transfer(signer, msg.sender, reward);

    _transfer(signer, to, value);

    }

    Listing 7-29

    Sample signedTransfer function in an ERC20 contract that supports meta transactions
    and relayer rewards using the same ERC20 token

    ```


    However, this solution does not allow any rewards in any currency that is not
    that same token – for instance, ETH rewards are not possible under this scheme.
    It also does not translate well to other assets. What would be the reward for
    transferring an `ERC721` non-fungible token? A digital collectible cannot have
    a piece removed and given to a relayer as a reward.


    A way around this problem is to rely on `ERC20` *approvals*. Recall from Chapter
    [3](#476252_1_En_3_Chapter.xhtml) that `ERC20` tokens allow holders to appoint
    other addresses to manage their funds. This way, a user could grant an approval
    on their tokens to the application contract processing the relayer rewards, which
    then sends the tokens to the relayer as payment. This approach, however, still
    requires the user to have ETH to pay gas fees in the initial `approve` transaction
    – unless the reward token contract itself has native meta transaction support
    for approvals.


    Another option is to simply subsidize the user’s transactions and have the application
    itself pay out to the relayers. This requires careful logic in the application
    contract to determine *when* to accept a meta transaction – otherwise, a malicious
    relayer could spam the application with fake transactions and drain the entire
    reward pool. Such logic will depend entirely on your use case, but keep in mind
    that you have much flexibility: your contracts may require the meta transaction
    to have an additional signature by an application key, so you can perform validations
    off-chain to approve a transaction for execution.


    ### Revisiting Smart Accounts Deployment


    We will go once more through the process of deploying a smart account contract.
    In the “Smart accounts” section, we discussed how to do this using single-use
    addresses, though it had certain limitations. We will now explore another approach,
    with support for relayer rewards, based on a different EVM operation: `CREATE2`.


    #### The `CREATE2` Instruction


    Ethereum has, since its first versions, provided a `CREATE` instruction for creating
    a new contract from another. The address of the newly created contract, as we
    saw earlier, is a function of the sender address and its nonce. While this allows
    for deterministic deployments, it also means that reserving an address is tricky,
    since the sender must not send any other transactions besides the deployment one
    to prevent changing its nonce.


    To solve this, a new `CREATE2` instruction was introduced. This low-level operation
    works similar to `CREATE`, but also accepts a *salt* parameter: the deployment
    address is now calculated as a function of the sender, the salt, and the contract
    creation code. This allows for much more interesting flows by setting up a factory
    contract that spins up contracts using this instruction.


    ```

    Factory IdentityFactoryWithRewards {

    function deploy(

    bytes code, uint256 salt

    ) public returns (address) {

    address deployed;

    assembly {

    deployed:= create2(0, add(code,0x20), mload(code), salt)

    if iszero(extcodesize(deployed)) { revert(0, 0) }

    }

    return deployed;

    }

    }

    ```


    A user can now choose a contract, along with its constructor arguments, generate
    a random salt, and know the address where the resulting contract will be deployed.
    Not only that, but *anyone* who knows these parameters can now perform the deployment.


    This means that the user can simply share the creation parameters and salt, plus
    the address of the factory contract to be used, and have any relayer execute the
    transaction, without even needing to sign the transaction – and certainly not
    paying any gas. Should a relayer attempt to modify the code or creation parameters,
    the contract would end up deployed at a different address. Let’s use this approach
    to deploy our identity contracts, providing rewards to the relayers.'
