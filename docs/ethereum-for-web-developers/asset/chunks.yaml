    We can either host our own IPFS public node as part of our application or rely
    on a third-party provider. As an example, Infura provides not only Ethereum public
    nodes but also IPFS nodes, meaning we can use their IPFS gateway directly.


    However, it is also possible that a user is running their own IPFS node in their
    computer. IPFS provides a browser extension, the IPFS companion,^([^(95)](#fn95))
    that connects to a local node and makes the browser IPFS-enabled. This includes
    adding support for ipfs links and injecting an `ipfs` object to the global window
    object in all sites – much like Metamask adds an `ethereum` provider object to
    all sites.


    ### Note


    There is also the option of running an IPFS node *within your own web site*. The
    `js-ipfs` library provides a browser-compatible implementation of the entire IPFS
    protocol, so you can start an IPFS daemon as a user accesses your app. However,
    this can make your application much heavier, and the in-app IPFS process is not
    as stable as a dedicated one. Because of this, the suggested method for interacting
    with the network is to use the IPFS HTTP API to connect to a separate node.


    Opening an IPFS connection in our app is very similar to opening an Ethereum connection:
    we first check if there is a global connection object available and, if not, fall
    back to a well-known public node (Listing [6-25](#476252_1_En_6_Chapter.xhtml#PC27)).
    We will use the `ipfs-http-client@30.1` javascript library for accessing the network,
    which is an IPFS equivalent of `web3.js`.


    ```

    // 02-storage/src/storage/ipfs.js

    import ipfsClient from ''ipfs-http-client'';

    async function getClient() {

    if (window.ipfs && window.ipfs.enable) {

    return await window.ipfs.enable({

    commands: [''id'', ''version'', ''add'', ''get'']

    });

    } else {

    return ipfsClient({

    host: ''ipfs.infura.io'', port: ''5001'',

    protocol: ''https'', ''api-path'': ''/api/v0/''

    });

    }

    }

    Listing 6-25

    Creating a new ipfs client instance. We first check whether the global object,
    injected by the companion extension, is available. If not, we fall back to a connection
    to the Infura IPFS gateway

    ```


    Using this new IPFS client, we can now easily save our token metadata to the IPFS
    network instead to a centralized server.


    ```

    export async function save(data) {

    const ipfs = await getClient();

    const [result] = await ipfs.add(Buffer.from(data));

    return `/ipfs/${result.path}`;

    }

    ```


    Fetching the result back from the IPFS network given the URL is straightforward
    as well. Note that we no longer need to verify its integrity, since the protocol
    takes care of that automatically.


    ```

    export async function load(url) {

    const ipfs = await getClient();

    const [result] = await ipfs.get(url);

    return JSON.parse(result.content.toString());

    }

    ```


    #### Hosting Our Application on IPFS


    IPFS can be used not only to store our application data but also the application
    itself, for maximum decentralization. All our application’s client-side code can
    be uploaded to IPFS and served from there. But how can our users access it from
    a regular browser? Or address it without having to specify a hash?


    The first problem can be solved via IPFS gateways (see Listing [6-26](#476252_1_En_6_Chapter.xhtml#PC30)
    for examples). An IPFS gateway is a regular web site that serves content from
    the IPFS network. It allows you to access any IPFS item at the path `/ipfs/CID`,
    where CID is the content hash that identifies each object on the network.


    ```

    https://gateway.ipfs.io/ipfs/QmeYYwD4y4DgVVdAzhT7wW5vrvmbKPQj8wcV2pAzjbj886/

    https://ipfs.infura.io/ipfs/QmeYYwD4y4DgVVdAzhT7wW5vrvmbKPQj8wcV2pAzjbj886/

    https://cloudflare-ipfs.com/ipfs/QmeYYwD4y4DgVVdAzhT7wW5vrvmbKPQj8wcV2pAzjbj886/

    Listing 6-26

    You can access an older version of the ipfs.io web site at the following addresses
    directly on your browser via any of the public gateways listed. Since the ID of
    the content is its hash, you can be certain that all gateways will serve exactly
    the same object

    ```


    The second problem, having user-friendly names for IPFS sites, can be solved using
    *DNSLink*. DNSLink is a process for mapping DNS names to IPFS content using DNS
    TXT records.


    Let’s say we want to map our site in IPFS to the domain `example.com`. By adding
    a TXT record to `_dnslink.example.com` with the value `dnslink=/ipfs/CID`, any
    IPFS gateway will automatically map any requests to `/ipfs/example.com` to the
    specified content.


    Not only that, but we can also specify a CNAME DNS record for our domain, pointing
    to a gateway. This allows us to automatically serve our page at `example.com`
    directly from the IPFS-specified gateway.^([^(96)](#fn96)) To sum up, the full
    process for accessing our site would be


    *   A user makes a request to `example.com`.


    *   The DNS query answers with a CNAME to `gateway.ipfs.io`.


    *   The user sends a request to the IP of `gateway.ipfs.io` using `example.com`
    as a Host header.


    *   The gateway makes a DNS TXT query for both `example.com` and `_dnslink.example.com`
    and obtains an IPFS CID as response.


    *   The gateway transparently serves the content from IPFS to the end user.


    Another level of indirection can be introduced by relying on *IPNS*, the InterPlanetary
    Name System. This system allows you to have mutable links that refer to IPFS content,
    though IPNS links are also hashes. You can then have your DNSLink point to your
    IPNS name, instead of the IPFS ID, and update your site by just updating the IPNS
    link to a new version of your content. This saves you from having to modify your
    DNS TXT records whenever you deploy a new version of your site.'
