    We can now try compiling our contract using the `sol-compiler`.


    ```

    $ npx sol-compiler

    Artifact for ERC721PayPerMint does not exist

    Compiling 1 contracts (ERC721PayPerMint.sol) with Solidity v0.5.2...

    ERC721PayPerMint artifact saved!

    ```


    There should now be an `ERC721PayPerMint.json` file in the `artifacts` folder.
    Let’s add a short script `scripts/deploy.js` for retrieving the compiled bytecode
    and deploying the contract to the local network, using a modified version of the
    deployment code we wrote earlier in this chapter (Listing [5-22](#476252_1_En_5_Chapter.xhtml#PC47)).
    We will also store the deployment address in a `Deploys.json` file, which we will
    then retrieve from the application.


    ```

    // scripts/deploy.js

    const Web3 = require(''web3'');

    const fs = require(''fs'');

    const path = require(''path'');

    // Deploys any artifact from the default account

    async function deploy(artifact, arguments, opts) {

    const providerUrl = process.env.PROVIDER_URL

    || ''http://localhost:8545'';

    const web3 = new Web3(providerUrl);

    const from = (await web3.eth.getAccounts())[0];

    const data = artifact.compilerOutput.evm.bytecode.object;

    const abi = artifact.compilerOutput.abi;

    const Contract = new web3.eth.Contract(abi, null, { data });

    const gasPrice = 1e9;

    const instance = await Contract.deploy({ arguments })

    .send({ from, gasPrice, ...opts });

    const address = instance.options.address;

    const network = await web3.eth.net.getId();

    save(network, address);

    console.log(address);

    }

    // Saves deployment address to a Deploys.json file

    function save(network, address) {

    const file = path.join(

    __dirname, ''..'', ''artifacts'', ''Deploys.json''

    );

    const deployments = fs.existsSync(file)

    ? JSON.parse(fs.readFileSync(file)) : {};

    deployments[network] = address;

    const content = JSON.stringify(deployments, null, 2);

    fs.writeFileSync(file, content);

    }

    // Deploys our ERC721PayPerMint contract

    function main() {

    const artifactPath = ''../artifacts/ERC721PayPerMint.json'';

    const artifact = require(artifactPath);

    return deploy(artifact, [], { gas: 5e6, gasPrice: 1e9 });

    }

    main();

    Listing 5-22

    Script for deploying the ERC721PayPerMint contract to a network specified by the
    PROVIDER_URL environment variable, and storing the deployment address indexed
    by network ID. Note that the main function can be modified to easily deploy other
    contracts

    ```


    Now, with the ganache-cli process (or the Geth or Parity development node) listening
    on port 8545, try running the deployment script.


    ```

    node scripts/deploy.js

    ```


    You should then see a `Deploys.json` file in the `artifacts` folder with the network
    ID and the deployment address. Note that the ID and deployment address you get
    may differ.


    ```

    $  cat artifacts/Deploys.json

    {

    "155164184873": "0x0E696947A06550DEf604e82C26fd9E493e576337"

    }

    ```


    Now that we have our contract set up on our local network, we can start working
    on the web application itself.


    ### The Application


    Our application will follow a similar structure than the previous one. We will
    have separate folders for interacting with the Ethereum network, for managing
    contract `artifacts`, and for the React components.


    #### Initializing the Web3 Instance


    We will set up a `src/eth/network.js` file (Listing [5-23](#476252_1_En_5_Chapter.xhtml#PC50))
    with the code necessary to instantiate a new web3 object from the injected provider,
    along with a few methods that we will be using later throughout the app.


    ```

    // src/eth/network.js

    import Web3 from ''web3'';

    let web3;

    export function getWeb3() {

    if (!web3) {

    web3 = new Web3(Web3.givenProvider);

    }

    return web3;

    }

    export function hasProvider() {

    return !!Web3.givenProvider;

    }

    export async function getAccount() {

    const accounts = await window.ethereum.enable();

    return accounts[0];

    }

    export async function getBlockNumber() {

    return web3.eth.getBlockNumber();

    }

    export async function getNetwork() {

    return web3.eth.net.getId();

    }

    Listing 5-23

    Network file to initialize a new web3 object given the injected provider

    ```


    Note that the `getAccount` method is especially important, since it includes the
    call to *enable* the provider. This is what allows us to access the list of accounts
    of the user.'
