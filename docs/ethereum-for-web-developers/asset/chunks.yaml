    Public key cryptography can be implemented via many different algorithms, one
    of the most popular ones being Rivest–Shamir–Adleman (better known as RSA). Ethereum,
    however, relies on an Elliptic Curve Digital Signature Algorithm, or ECDSA. This
    algorithm also allows to *recover* the public key, given a message and its signature.


    Armed with these two cryptography concepts, we can now finally get started and
    take on how a blockchain is built.


    ## Blockchain 101


    A blockchain is a decentralized indelible public digital ledger. We can think
    of a blockchain as a distributed database, where, once a record has been confirmed,
    it can never be removed or altered and where no single authority has control over
    this database, which is replicated across all nodes in a peer-to-peer network.
    What is actually stored in this database may vary: it could be a currency, a registry
    of assets, or even executable code.


    ### Transactions and Blocks


    In a blockchain, every state change is part of a *transaction*. Think of a transaction
    as an atomic write operation from a user in the global database that may alter
    one or more records. Any user in the network can submit a transaction to be executed.


    How transactions are processed is part of the blockchain *state transition rules*.
    The blockchain transitions from one state to another by processing each transaction
    it receives. For instance, a blockchain that manages a currency may process transactions
    as transfers of its currency between two accounts: it reduces the sender’s balance
    and increases the recipient’s by the same amount. Other blockchains even allow
    transactions to create and execute full programs on the chain.


    When a user sends a transaction, they must cryptographically *sign* it with their
    private key. This way, the blockchain can enforce that only a specific user can
    move a certain asset or alter a certain record. This introduces a notion of *ownership*
    by the holder of a key.


    ### Note


    Public blockchains do not require their users to sign up. They can just create
    a new key pair to start signing transactions to participate in the network. However,
    they may require their users to have a currency associated to the blockchain for
    their transactions to be processed.


    Transactions are batched together in *blocks*, which are then chained together
    to form the actual blockchain. The blocks constitute the history of the blockchain,
    each of them packing a set of transactions that change its state. How transactions
    are chosen and ordered in each block depends on the blockchain *consensus rules*,
    which we will see in a few pages.


    When a block is added to the blockchain, it is propagated through the peer-to-peer
    network to all nodes. Each node will re-execute all transactions in the block
    locally in order to check if they are indeed valid, rejecting the block if they
    notice any illegal change. This means that each transaction is actually executed
    once per every single node in the entire network. This allows the blockchain to
    be completely decentralized, since each node checks all transactions that are
    run. However, it comes at a cost: the computational overhead imposes a cap on
    the number of transactions that can be processed per second by the network. In
    other words, performance is traded in exchange for decentralization.


    Given this high cost of processing a change in a blockchain, all transactions
    require a *fee* to be paid. This fee is usually paid in a currency native to the
    blockchain (such as bitcoin in the Bitcoin network^([^(12)](#fn12)) or ether in
    Ethereum). Regardless of who is the beneficiary of this fee, which we will see
    in a few pages, the goal of the fee is to prevent attackers from flooding the
    network with transactions that need to be processed by every single node, and
    to provide an incentive to the nodes that add new blocks to the chain.


    #### Chain of Hashes


    Blockchains are resistant to changes by keeping a *digest* of their entire history
    on every block. Each block in the chain is identified by a hash computed over
    its own transactions, as well as over the hash of the previous block (Figure [1-1](#476252_1_En_1_Chapter.xhtml#Fig1)).


    ![../images/476252_1_En_1_Chapter/476252_1_En_1_Fig1_HTML.png](images/476252_1_En_1_Chapter/476252_1_En_1_Fig1_HTML.png)


    Figure 1-1


    How a blockchain is constructed. Each block is identified by a hash of the previous
    block, plus all its own transactions. We will see the role of the nonce in the
    next section. Image from the Bitcoin paper ^([^(13)](#fn13))


    With this scheme, any change on any transaction on any block in the chain will
    cause all subsequent hashes to change, making any modification trivial to detect.
    For instance, if an attacker tried to alter a transaction that happened ten blocks
    ago, not only the digest of that block would change but also that of the next
    block (since it is calculated based on the previous block hash) and so forth until
    the head of the chain.


    However, for this mechanism to be useful to prevent an attacker from modifying
    the blockchain and distributing a spurious copy in the network, it must be *difficult*
    for the attacker to regenerate all blocks. That’s where the proof-of-work comes
    in.'
  trans: '

    # 密码学速成


    在深入讲解区块链之前，我们先回顾两个密码学概念，它们是大多数区块链的关键基石：哈希和公钥密码学。如果你已经熟悉它们，可以跳过本节。


    ## 哈希函数


    *密码学哈希函数*是一种纯粹的确定性函数，它将来自大空间的输入映射到固定集合中的输出。这些输出通常被称为输入的*摘要*。例如，输入可以是本书序言的全部文本，其摘要可能是来自
    128 位值空间的十六进制值 `01cc88cda97d50346743ae58bb3ebe75`。


    不探讨形式化定义，一个安全的哈希函数应当具有*抗碰撞性*。这意味着，实际上不可能找到两个不同的输入，它们会产生相同的摘要。哈希函数还应当是*不可逆的*：仅凭摘要，实际上不可能找到一个能产生该摘要的输入。此外，对输入的微小改动应当导致输出摘要的巨大变化——两个相似的输入应当产生截然不同的摘要。哈希函数还应当能根据其输入相对快速地计算出来，因此验证输入与其摘要是否匹配是一项简单的任务。


    哈希函数是维护区块链完整性的核心，也是工作量证明共识机制的基础。我们将在后文看到这两种应用。


    ## 公钥密码学


    *公钥密码学*（或称*非对称密码学*）是一种依赖于密钥对的加密系统：一把私钥，仅其所有者知晓；一把对应的公钥，与世界共享。用公钥加密的字符串只能用私钥解密。任何想要给用户发送秘密消息的人，都可以使用接收者的公钥进行加密，因为只有私钥持有者才能解密。


    密钥对也可以反过来用作*数字签名*。用户可以发送一条消息，以及用其私钥加密的消息摘要。任何接收者随后都可以使用公钥来验证该摘要确实是由私钥所有者签名的。


    这些签名是公链中的认证机制。每个公钥都关联一把私钥，私钥应由其所有者安全保管，并授予对区块链中其拥有资产的访问权限。


    公钥密码学可以通过多种不同的算法来实现，其中最流行的算法之一是 Rivest–Shamir–Adleman（更广为人知的名字是 RSA）。然而，以太坊依赖于椭圆曲线数字签名算法，即
    ECDSA。该算法还允许从给定的消息及其签名中*恢复*出公钥。


    掌握了这两个密码学概念，我们现在终于可以开始了解区块链是如何构建的了。


    # 区块链基础


    区块链是一个去中心化的、不可篡改的公共数字账本。我们可以将区块链视为一个分布式数据库，一旦某条记录被确认，就永远无法删除或更改，并且没有任何单一权威机构能够控制这个数据库，该数据库会在点对点网络中的所有节点上复制。这个数据库中实际存储的内容可能各不相同：它可以是货币、资产登记簿，甚至是可执行的代码。


    ## 交易与区块


    在区块链中，每一次状态变更都是一笔*交易*的一部分。可以将交易视为用户对全局数据库的一次原子写入操作，它可能会更改一条或多条记录。网络中的任何用户都可以提交一笔待执行的交易。


    交易如何处理是区块链*状态转换规则*的一部分。区块链通过处理其收到的每笔交易，从一个状态转换到另一个状态。例如，管理货币的区块链可以将交易处理为两个账户之间的货币转账：它减少发送方的余额，并增加接收方相同数量的余额。其他区块链甚至允许交易在链上创建和执行完整的程序。


    当用户发送交易时，他们必须使用自己的私钥对其进行密码学*签名*。这样，区块链就可以确保只有特定用户才能移动特定的资产或更改特定的记录。这引入了由密钥持有者拥有的*所有权*概念。


    ### 注


    公链不要求其用户注册。他们只需创建一个新的密钥对，即可开始签名交易以参与网络。然而，它们可能要求用户持有与区块链相关的货币，才能处理其交易。


    交易会被批量打包成*区块*，这些区块再链接在一起形成实际的区块链。区块构成了区块链的历史，每个区块都打包了一组改变其状态的交易。在每个区块中如何选择和排序交易，取决于区块链的*共识规则*，我们将在后文介绍。


    当一个区块被添加到区块链时，它会通过点对点网络传播到所有节点。每个节点都会在本地重新执行区块中的所有交易，以检查它们是否确实有效，如果发现任何非法更改，则拒绝该区块。这意味着每笔交易实际上会在整个网络中的每一个节点上执行一次。这使得区块链能够完全去中心化，因为每个节点都会检查所有运行的交易。然而，这是有代价的：计算开销给网络每秒能处理的交易数量设置了上限。换句话说，用性能换取了去中心化。


    鉴于在区块链中处理变更的高昂成本，所有交易都需要支付*费用*。这笔费用通常以区块链的原生货币支付（例如比特币网络中的比特币^(¹²)或以太坊中的以太币）。无论这笔费用的受益者是谁（我们将在后文看到），其目的都是防止攻击者用需要在每个节点上处理的交易来淹没网络，并为添加新区块到链上的节点提供激励。


    ### 哈希链


    区块链通过在每个区块上保存其整个历史的*摘要*来抵抗更改。链中的每个区块都由一个哈希来标识，该哈希是根据其自身的交易以及前一个区块的哈希计算得出的（图 1-1）。


    ![../images/476252_1_En_1_Chapter/476252_1_En_1_Fig1_HTML.png](img/476252_1_En_1_Fig1_HTML.png)


    图 1-1


    区块链的构建方式。每个区块由前一个区块的哈希加上其自身的所有交易来标识。我们将在下一节看到随机数的作用。图片来自比特币论文^(¹³)


    通过这种方案，对链上任何区块中任何交易的任何更改都会导致所有后续哈希发生改变，使得任何修改都极易被检测。例如，如果攻击者试图篡改十笔交易前的某个交易，不仅该区块的摘要会改变，下一个区块的摘要也会改变（因为它是基于前一个区块哈希计算的），并会一直影响到链头。


    然而，要使这种机制有效阻止攻击者修改区块链并向网络分发虚假副本，攻击者必须*很难*重新生成所有区块。这就是工作量证明的用武之地。

