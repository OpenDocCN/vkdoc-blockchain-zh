- fmt: '# Summary


    In this chapter, we have gone in-depth into how to extract data from the Ethereum
    network and feed it into our app. We started out by reviewing how connections
    to nodes work, listing the protocols available for the `JSON-RPC` interface, and
    looking into the `Provider` object used by `web3` and other libraries to manage
    the underlying connection. We also learned that there are different types of nodes
    available and how a `Provider`, such as the one injected by `web3`-enabled browsers,
    may abstract away some of these differences via the usage of subproviders.


    Using `web3.js` as a sample library, we studied what kind of queries we could
    issue to the blockchain: general network information, address-specific data such
    as balance and code, and calls to existing contracts. When connecting to an archive
    node, these queries can be issued to any block in the past, not just the most
    recent ones.


    We also studied different ways for monitoring changes to contracts in real time
    in our applications. While polling is a classic method that is always available,
    event filters or subscriptions may be more interesting options due to better performance
    or faster notification times.


    To wrap up the chapter, we built an application for retrieving information from
    an `ERC20` token contract, and monitor all its transfer events using subscriptions.
    In the next chapter, we will learn how to make changes to the blockchain, going
    into all the details involved in sending a new transaction to the network.


    Footnotes [1](#476252_1_En_4_Chapter.xhtml#Fn1_source) [2](#476252_1_En_4_Chapter.xhtml#Fn2_source)
    [3](#476252_1_En_4_Chapter.xhtml#Fn3_source) [4](#476252_1_En_4_Chapter.xhtml#Fn4_source)
    [5](#476252_1_En_4_Chapter.xhtml#Fn5_source) [6](#476252_1_En_4_Chapter.xhtml#Fn6_source)
    [7](#476252_1_En_4_Chapter.xhtml#Fn7_source) [8](#476252_1_En_4_Chapter.xhtml#Fn8_source)
    [9](#476252_1_En_4_Chapter.xhtml#Fn9_source) [10](#476252_1_En_4_Chapter.xhtml#Fn10_source)


    # 5. Sending Transactions


    After reviewing in the previous chapter how to read data and monitor changes on
    the network, we will now go into how to write data by sending transactions. We
    will start by setting up a development environment for easily playing with smart
    contracts, then move into a `web3`-enabled context, and finally go into the details
    of issuing transactions and monitoring their lifecycle. Once again, we will wrap
    up with a sample application that puts all the learnings of the chapter together.


    ## Setting Up the Environment


    Before going into the details of transactions, we will first set up a development
    environment for building and testing our applications.


    ### Development Nodes


    Instead of using a remote public node for our application, this time we will work
    with a local private node. Recall from the previous chapter that a node is said
    to be *private* when it holds a set of accounts and their private keys, so it
    can be used for signing transactions. This makes them friendlier for scripting
    and testing, since we do not need to worry about account management on our code
    and can delegate that responsibility to the node itself.


    Running a local node has another benefit, which is that we can create our own
    network instead of connecting to an existing one. This is useful for development
    and especially for automated testing, since we do not need to wait for long networking
    or mining times – we can set up our own network with near-instant mining. Such
    networks are usually called *development networks*.


    The usual workflow when building an application is to rely on a local development
    node for coding and unit testing, then move to a testnet for a more realistic
    environment, and eventually go onto mainnet as you deploy to production.


    #### Using Ganache


    One of the most widely used client for development is *ganache* (formerly known
    as *testrpc*). Ganache is a tool exclusively built for development: it does not
    connect to any Ethereum network – it just starts and runs a new development chain.
    It also creates a set of random testing accounts, seeded with a bunch of ETH each,
    and exposes their private key and mnemonic (Listing 5-1).


    ```

    $ npm install -g ganache-cli@6.4

    $ ganache-cli -d

    Ganache CLI v6.4.3 (ganache-core: 2.5.5)

    Available Accounts

    ==================

    (0) 0x90f8bf6a479f320ead074411a4b0e7944ea8c9c1 (~100 ETH)

    (1) 0xffcf8fdee72ac11b5c542428b35eef5769c409f0 (~100 ETH)

    ...

    Private Keys

    ==================

    (0) 0x4f3edf983ac636a65a...

    (1) 0x6cbed15c793ce57650...

    ...

    HD Wallet

    ==================

    Mnemonic:      myth like bonus scare over problem client lizard pioneer submit
    female collect

    Base HD Path:  m/44''/60''/0''/0/{account_index}

    ...

    Listening on 127.0.0.1:8545

    ```


    Listing 5-1: Globally installing and running a local development network using
    Ganache. Note the `-d` flag, which stands for deterministic: with this, ganache
    will always generate the same set of accounts. Otherwise, the accounts and mnemonic
    change from run to run.'
