  trans: '

    ### 注意


    在底层，web3 的 `sign` 方法会在消息前加上字符串 `"\x19Ethereum Signed Message:\n"` 及其长度，然后对其进行哈希运算后再签名。这样做是为了避免用户被诱导签署一笔实际交易。大多数
    API，甚至是节点或硬件钱包中的 API，都会自动处理这一过程。


    给定原始消息及其签名，可以恢复出最初用于签名的私钥所对应的地址。


    ```

    > hash = web3.utils.keccak256(message);

    > web3.eth.accounts.recover(hash, signed.signature)

    0xACa94ef8bD5ffEE41947b4585a84BdA5a3d3DA6E

    ```


    这种恢复操作不仅可以从链下脚本中完成，还可以在智能合约内部进行（清单 [7-22]），因为 Solidity 提供了执行此任务的 `ecrecover` 函数。我们将通过
    `openzeppelin-solidity@2.2.0` 库中的 ECDSA 合约来使用它，该合约提供了更友好的接口并执行额外的检查。


    ```

    // 07-signing-messages/contracts/Signatures.sol

    pragma solidity ⁰.5.0;

    import "openzeppelin-solidity/contracts/cryptography/ECDSA.sol";

    contract Signatures {

    using ECDSA for bytes32;

    function recover(

    string memory message, bytes memory signature

    ) public pure returns (address) {

    bytes32 hash = keccak256(bytes(message));

    return hash.toEthSignedMessageHash().recover(signature);

    }

    }

    清单 7-22

    依赖 OpenZeppelin 的 ECDSA 从消息和其签名中恢复签名者的简单合约

    ```


    我们可以验证，使用与之前相同的参数调用前述合约中的 `recover` 函数会产生相同的签名者（清单 [7-23]）。


    ```

    > await signatures.methods

    .recover(message, signed.signature).call();

    0xACa94ef8bD5ffEE41947b4585a84BdA5a3d3DA6E

    清单 7-23

    使用前面列出的智能合约从原始消息中恢复签名者。此处，signatures 是一个代表已部署智能合约实例的 web3 合约实例。

    ```


    以太坊签名通常用于链下验证用户是否控制某个账户，或者账户所有者是否通过签署特定消息表明意图（例如在链下投票中）。但签名也可以用于链上，以验证账户所有者打算*执行*某个特定操作。这就是元交易的应用场景。


    ### 引入元交易


    *元交易*或称*燃气费免除交易*，与常规交易类似，它是由接收方、转移的 ETH 数量、调用中包含的数据集、燃气限额和价格以及 nonce 组成的签名元组。然而，元交易并非直接广播到网络，而是被包装在另一笔交易中，并发送到一个特定的合约。该合约知道如何解包嵌套交易、验证其签名并执行请求的操作。


    请注意，首先接收并处理该交易的合约实际上是在复现以太坊协议相同的行为：它验证嵌套交易的签名和 nonce，并使用指定的值和数据对接收方执行调用。


    那么，元交易的价值何在？关键在于，元交易可以由*不同于*签署原始意图的账户*中继*到网络。这解耦了打算执行操作的用户和为其支付燃气费的用户，从而有效*允许任何用户在不需任何燃气费的情况下执行交易*，只要另一个用户愿意为其付费即可。因此，元交易涉及两个主要角色：


    - **用户**：签署希望执行的元交易，但不会将其发送到网络。

    - **中继者**：获取该交易，将其包装在自己的交易中，发送给合约，并为其执行支付费用。


    我们将在本章后续部分深入探讨中继者。首先，让我们从智能合约层面深入元交易的实现。


    #### 基于我们的智能账户进行构建


    元交易需要一个能够处理它们、验证它们、检查签名者是否有权执行请求的操作，并代表其执行操作的合约。幸运的是，我们已经拥有一个可以持有资金并代表用户持有的不同账户执行操作的合约：身份合约。


    我们将修改一直在构建的身份合约，以处理元交易。我们的转发函数现在将接收一个由用户账户之一预先签名的元交易，而不是来自其中一个账户的直接调用。


    这样一来，用户无需向身份合约发送实际交易，只需签署一个操作，然后由中继者发送即可。这使得用户能够**将他们的所有资金存放在一个智能账户中，而无需在其设备上持有任何
    ETH 来支付燃气费**。让我们看看在修改后的身份合约中这看起来如何（清单 [7-24]）。


    ```

    // 08-meta-txs/contracts/IdentityWithMetaTxs.sol

    // 防止重放攻击

    uint256 public nonce;

    // 使用 ECDSA 库来恢复签名者

    using ECDSA for bytes32;

    // 将操作转发给接收方，并验证签名者

    // 注意：不再需要 onlyUser 修饰符

    function forward(

    address to, uint256 value, bytes memory data,

    bytes memory signature

    ) public returns (bytes memory) {

    // 获取被签名的交易的哈希值

    bytes32 hash = getHash(to, value, data)

    .toEthSignedMessageHash();

    // 恢复签名者地址并验证

    address signer = hash.recover(signature);

    require(accounts[signer], "签名者未注册");

    // 增加 nonce 并执行调用

    nonce++;

    (bool success, bytes memory returnData) =

    to.call.value(value)(data);

    require(success, "转发调用失败");

    return returnData;

    }

    // 返回预签名交易的哈希值

    function getHash(

    address to, uint256 value, bytes memory data

    ) public view returns (bytes32) {

    return keccak256(abi.encodePacked(

    to, value, data, nonce, address(this)

    ));

    }

    清单 7-24

    来自身份合约（本章前面介绍过）的修改后转发函数，用于处理元交易

    ```


    首先要注意的是，`forward` 方法除了需要原始参数外，还需要一个 `signature`。该签名是基于一个哈希值计算得出的，该哈希值包含了所有交易参数（接收方、值和数据），外加两个额外项：


    - **验证者地址**：即检查签名的合约地址。

    - **nonce**：每执行一笔交易就会递增。


    包含验证者地址是为了防止发送给其他验证者的元交易在此处被重复使用，而 nonce 则用于防止重放攻击（即多次中继同一笔交易）。生成的哈希值会加上神奇的前缀
    `"\x19Ethereum Signed Message:\n"`，使其能够与常规以太坊交易区分开来，然后再次进行哈希运算。


    ### 注意


    某些实现会追踪每个签名者的 nonce，而不是合约全局共用的 nonce。这严格取决于你的使用场景：如果多个白名单账户可能同时发送元交易，那么你应该使用签名者特定的
    nonce。


    接下来是对发送者的验证。请注意，合约不再检查 `msg.sender` 是否为注册账户——它现在检查的是交易的*签名者*是否已注册。`msg.sender`
    变得无关紧要，因为在此阶段谁中继了交易并不重要。


    最后，在执行交易之前，nonce 会递增。这可以防止同一笔交易被恶意中继者多次发送到合约。

    '
- fmt: '### Note


    It is worth mentioning that almost all smart account, identity contract, or bouncer
    proxy implementations include some variant of meta transactions. Once the user
    identity is moved on-chain, it does not make sense to keep them bound to the restrictions
    of the protocol, such as having the sender account pay for the gas of its transactions.


    #### Sending Meta Transactions


    We will pick up the example from the smart accounts section, this time by sending
    a meta transaction to a `Greeter` contract from our Identity contract. The first
    step (Listing [7-25](#476252_1_En_7_Chapter.xhtml#PC34)) is for the user to sign
    the transaction to be executed.


    ```

    // 08-meta-txs/01-identity-with-meta-txs.js

    let recipient = greeter.options.address;

    let value = 5000;

    let data = greeter.methods.setGreeting("Hey").encodeABI();

    let hash = await identity.methods

    .getHash(recipient, value, data).call();

    let signature = web3.eth.accounts.sign(hash, pk).signature;

    Listing 7-25

    User crafts and signs transaction to be relayed. Here pk is the private key of
    the user, and greeter is an instance of a contract which has a setGreeting method

    ```


    The resulting transaction, along with its signature, is then sent to a relayer
    via HTTP or another off-chain transport. The relayer should validate the transaction,
    wrap it, and then send it to the user’s identity contract (Listing [7-26](#476252_1_En_7_Chapter.xhtml#PC35)).


    ```

    await identity.methods

    .forward(recipient, value, data, signature)

    .send({ from: relayer });

    await greeter.methods.greet().call();

    // => Hey

    Listing 7-26

    Relayer calls into the forwarding function of the identity contract with the parameters
    and the signature provided by the user. The identity contract will in turn call
    into the greeter, which changes its state

    ```


    We are deliberately omitting from this example how the user communicates with
    the relayer or how the relayer decides whether to pay for the user’s transaction.
    This will vary from application to application. For instance, an application could
    provide a centralized relayer at a well-known URL, which pays for every transaction
    to a contract in their system. It may also force users to go through a CAPTCHA
    to prevent spamming.


    There are also efforts toward building fully decentralized relayer networks, in
    which the logic on whether paying for a user transaction is actually part of the
    application’s smart contracts. These efforts also include approaches where the
    relayers are paid back for their execution, as we will see in the next section.^([^(110)](#fn110))


    ### Relayers and Rewards


    The relayer is ultimately a process with a public interface (usually HTTP) that
    accepts signed messages from users, validates them, wraps them in a transaction,
    and pushes them to the network. For this last step, the relayer uses an account
    of its own – the gas fees are deducted from that account’s balance.


    In all of our examples so far, we have assumed that the gas cost for executing
    the meta transactions was covered by the owner of the application. This owner
    would spin up a relayer and freely forward all transactions for users of their
    own application.


    However, it is possible for the users to actually *pay back* to the relayer serving
    them. An addition to the forwarding function is to send some ETH back to the relayer
    (i.e., the `msg.sender`) to cover the costs of the execution. This way, the user
    does pay the gas fees associated with their transactions – only that they are
    paid from their smart account, entirely removing the need to keep ETH for gas
    in each of their devices.


    This opens the door for new incentive systems: the relayer does not need to be
    centralized by the application owner and subsidize the execution costs, but it
    can be decentralized and just profit from relaying transactions. This leads to
    a new concept of *desktop mining*, where users can earn fees not from computational-intensive
    proof-of-work, but from relaying meta transactions for other users.


    #### Relayer Reward


    The easiest way to implement a payback to the relayer is to include a *reward*
    along with each request for execution. The relayer can then decide whether to
    relay the transaction or not, depending on the estimated execution cost for it.


    The user can even request a specific gas price and gas allowance for its transaction
    and verify that these are satisfied within the identity contract. This prevents
    relayers from sending transactions with very low gas prices, paying lower fees
    at the expense of a user’s time.


    Let’s modify the forwarding function once again to account for all of the above
    (Listing [7-27](#476252_1_En_7_Chapter.xhtml#PC36)). We will need to add parameters
    for specifying both the reward and the gas requirements and have these signed
    by the user as well.


    ```

    // 08-meta-txs/contracts/IdentityWithRewards.sol

    event Forwarded(uint256 nonce, bool success, address relayer);

    function forward(

    uint256 reward, uint256 gasPrice, uint256 gasLimit,

    address to, uint256 value, bytes memory data,

    bytes memory signature

    ) public returns (bytes memory) {

    // Validate gas price of the transaction

    require(tx.gasPrice >= gasPrice, "Gas price too low");

    // Get hash of the transaction that was signed

    bytes32 hash = getHash(

    reward, gasPrice, gasLimit, to, value, data

    ).toEthSignedMessageHash();

    // Retrieve signer address and validate

    address signer = hash.recover(signature);

    require(accounts[signer], "Signer not registered");

    // Increase nonce, execute call, and inform success

    nonce++;

    require(gasleft() >= gasLimit);

    (bool success, bytes memory returnData) =

    to.call.value(value).gas(gasLimit)(data);

    emit Forwarded(nonce, success, msg.sender);

    // Pay back to the relayer

    msg.sender.transfer(reward);

    return returnData;

    }

    function getHash(

    uint256 reward, uint256 gasPrice, uint256 gasLimit,

    address to, uint256 value, bytes memory data

    ) public view returns (bytes32) {

    return keccak256(abi.encodePacked(

    reward, gasPrice, gasLimit,

    to, value, data, nonce, address(this)

    ));

    }

    Listing 7-27

    Forwarding function of the identity contract with support for relayer rewards.
    The modified sections are highlighted in bold

    ```


    An important change in the preceding snippet is that the function no longer requires
    the forwarded call to be successful (`require(success)`). The rationale for this
    is that if the forwarded call failed and reverted the entire transaction, then
    the relayer would not receive any reward, but would still lose the gas fees from
    the execution of the reverted transaction. To avoid punishing a relayer for a
    failed transaction that was correctly relayed, we drop that requirement. And to
    allow for determining whether forwarded call reverted, we add an event that reports
    the success in each transaction.


    Also, note that the gas price validation is performed at the beginning of the
    method, since gas price is relative to the entire transaction, and cannot be changed
    in-between contract calls. Gas limit, on the other hand, can be enforced on each
    call within the transaction, so we can revert if there is not enough gas left.
    In this case, it is the relayer’s responsibility to include additional gas on
    the request to account for the meta transaction processing (which is about 60K
    in this implementation).'
