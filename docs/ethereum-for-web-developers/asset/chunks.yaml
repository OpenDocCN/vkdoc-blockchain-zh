  trans: '

    ### 通过 Web3 连接网络


    如前所述，我们将使用 `web3.js` 连接以太坊网络。这需要一个 web3 *提供者*，它是一个小型对象，知道需要连接哪个节点来调用智能合约并向网络发送交易。换句话说，顾名思义，提供者*提供*了与以太坊节点的连接，并由此连接到整个网络。


    根据你所使用的库，提供者有时会与*签名者*混淆。签名者是另一个组件，负责使用用户的密钥对交易进行签名，这种情况适用于密钥不由本地节点管理。大多数 DApp
    都是这种情况，因为普通用户不会运行节点，而是依赖公共节点。因此，由 MetaMask 注入的 web3 提供者同时充当了提供者和签名者。我们将在本书后面深入探讨这些差异。


    通过代码可以方便地使用 `Web3.givenProvider` 访问由 MetaMask 注入的 web3 提供者。你可以检查该属性，以了解用户浏览器中是否启用了
    MetaMask，如果可用，则创建一个新的 web3 对象。我们可以将此逻辑保存在应用程序的 `network.js` 文件中（代码清单 2-4）。


    ```

    // src/eth/network.js

    import Web3 from ''web3'';

    let web3;

    export function getWeb3() {

    if (!web3) {

    web3 = new Web3(Web3.givenProvider);

    }

    return web3;

    }

    代码清单 2-4

    使用 MetaMask 提供者创建 web3 对象的代码片段。请注意，如果用户未安装 MetaMask，此代码将无法运行。

    ```


    创建的 web3 对象拥有大量可用方法，其中大部分位于 `web3.eth` 命名空间下。例如，我们可以查询用户账户列表（代码清单 2-5），并检索当前使用的默认账户（即列表中的第一个账户）。


    ```

    // src/eth/network.js

    export async function getAccount() {

    const web3 = getWeb3();

    const accounts = await web3.eth.getAccounts();

    return accounts[0];

    }

    代码清单 2-5

    用于检索用户当前默认账户的函数

    ```


    然而，该方法不适用于在*隐私模式*下运行的浏览器。隐私模式限制访问用户账户，直到用户批准应用程序检索 MetaMask 中持有的账户。要解除此限制，我们必须使用全局的
    `ethereum` 对象并进行启用（代码清单 2-6）。


    ```

    export async function getAccount() {

    const accounts = await window.ethereum.enable();

    return accounts[0];

    }

    代码清单 2-6

    更新后的函数，用于处理以太坊浏览器的隐私模式

    ```


    对 `ethereum.enable` 的异步调用将在用户在 MetaMask 上授予批准后返回。请注意，MetaMask 会记住用户的批准，因此仅首次访问时会提示用户确认（图
    2-1）。


    ![../images/476252_1_En_2_Chapter/476252_1_En_2_Fig1_HTML.jpg](img/476252_1_En_2_Fig1_HTML.jpg)


    图 2-1


    用户必须在 MetaMask 中接受 DApp 的连接请求


    现在我们已经设置好了 `web3` 对象，并可以访问用户账户，我们将使用它们来构建与部署在以太坊网络上的 `Counter` 智能合约的接口。


    ### 合约接口


    为了从应用程序与我们的合约交互，我们需要三样东西：


    *   连接到部署了我们合约的以太坊网络

    *   合约在网络中的地址

    *   合约公共函数的规范，也称为 ABI（应用程序二进制接口）


    第一项在上一节中已涵盖，并由我们配置的 `web3` 对象封装。至于第二项，我们将使用一个已部署在 Rinkeby 网络上的实例，其地址如下：


    ```

    0x1D2561D18dD2fc204CcC8831026d28375065ed53

    ```


    请记住，区块链上的一切都是公开且不可篡改的，因此一旦合约部署，它就会对所有用户公开可用以供交互，并且无法删除。这意味着我们可以自由地使用此实例来测试 DApp。


    ### 注意


    如果你不想使用该特定合约实例，或者更倾向于在其他网络上工作，代码仓库中有一个部署脚本，你可以用它来设置自己的实例。


    至于 ABI，我们将使用之前编译器生成的输出。将输出的 json 文件复制到应用程序 `src` 中新建的 `contracts` 文件夹下的 `Artifacts.json`
    文件中。现在，我们可以解析它来获取 ABI，并创建一个新的 web3 合约实例（代码清单 2-7）。


    ```

    // src/contracts/Counter.js

    import Artifacts from ''./Artifacts.json'';

    export default function Counter(web3, address, options = {}) {

    const name = "contracts/Counter.sol:Counter";

    const artifact = Artifacts.contracts[name];

    const abi = JSON.parse(artifact.abi);

    return new web3.eth.Contract(abi, address, options);

    }

    代码清单 2-7

    用于创建 Counter web3 合约对象的函数。请注意，该函数不会部署新合约，它只是创建一个 JavaScript 对象，作为此前在指定地址部署的合约的包装器。

    ```


    web3 的 Contract 抽象是一个对象，它充当实际以太坊合约的外观。它为所有公共函数暴露了 JavaScript 方法，这些方法在底层会被转换为对网络的调用和交易。我们将在下一节中使用它来实际与合约交互。


    现在我们已经有了一个类似工厂的函数，可以根据给定地址创建新的 `Counter` 合约抽象，我们将用它来获取已部署的合约（代码清单 2-8）。


    ```

    // src/contracts/Counter.js

    import { getWeb3, getAccount } from ''../eth/network.js'';

    export async function getDeployed() {

    const web3 = getWeb3();

    const from = await getAccount();

    const addr = "0x1D2561D18dD2fc204CcC8831026d28375065ed53";

    return Counter(web3, addr, { from });

    }

    代码清单 2-8

    用于获取部署在 Rinkeby 网络上的 Counter 合约的 web3 合约实例的代码。请注意，为了避免硬编码地址，你也可以将地址存储为环境变量，并通过
    process.env37 进行检索。

    ```


    现在我们已经有了与已部署合约交互的方法，可以构建用于用户界面的 React 可视化组件了。


    ## 与我们的智能合约交互


    现在，我们将逐步构建 `Counter` 可视化组件，以允许 DApp 用户与之交互。我们将首先获取计数器的当前值，然后提供发送交易以修改其状态的方法，最后实现对其实时更新的订阅。

    '
- fmt: '### Wiring Our Component


    Let’s start by creating a file `components/Counter.js` (Listing [2-9](#476252_1_En_2_Chapter.xhtml#PC16)).
    This will be an empty React component^([^(38)](#fn38)) for now.


    ```

    // src/components/Counter.js

    import React, { Component } from ''react'';

    class Counter extends Component {

    render() {

    return (

    Counter be here

    );

    }

    }

    Listing 2-9

    Empty React component for rendering the Counter contract and interacting with
    it. We will be iteratively adding features to it

    ```


    This component will receive from the `App.js` root component the `Counter` contract
    instance. It will be the App’s responsibility to retrieve such instance and inject
    into the `Counter` visual component once ready. Let’s modify the `src/App.js`
    file that was autogenerated by `create-react-app` to load the contract instance
    (Listing [2-10](#476252_1_En_2_Chapter.xhtml#PC17)).


    ```

    import ''./App.css'';

    import React, { Component } from ''react'';

    import Counter from ''./components/Counter'';

    import { getDeployed } from ''./contracts/Counter'';

    class App extends Component {

    state = { counter: null };

    async componentDidMount() {

    const counter = await getDeployed();

    this.setState({ counter });

    }

    render() {

    const { counter } = this.state;

    return (


    { counter && <Counter contract={counter} /> }


    );

    }

    }

    export default App;

    Listing 2-10

    Code for the App root component. We use the root App state to store the contract
    instance, and pass it to the child component as a property

    ```


    We are relying on the `componentDidMount` React event to load the Counter contract
    instance^([^(39)](#fn39)) and storing it in the component’s state. Only when this
    instance is available we render the `Counter` visual component.


    ### Note


    By now, you may have realized that we are missing error management in this DApp.
    For instance, we are not handling the case where the user does not have MetaMask,
    or if the contract’s address is incorrect, or if the connection to the network
    is lost. This is a deliberate decision, as the goal is to focus on the happy path
    and provide a quick overview of what constitutes a DApp. In the upcoming chapters,
    as we go deeper into each subject, we will also cover everything that can potentially
    go wrong.


    At this point, you should be able to run your application via `npm start` and
    check that everything is rendering correctly. Make sure to have MetaMask installed,
    unlocked, and connected to the Rinkeby network.


    Now that we have all of our application wired, it’s time to focus on the `Counter`
    visual component itself.


    ### Querying the Contract’s State


    We will begin by displaying the value of the `Counter` contract on our component
    (Listing [2-11](#476252_1_En_2_Chapter.xhtml#PC18)). Since we will not be changing
    the `Counter` instance during the lifetime of our component, we can simply retrieve
    that value when the React component is mounted.^([^(40)](#fn40))


    ```

    // src/components/Counter.js

    async componentDidMount() {

    const counter = this.props.contract;

    const initialValue = await counter.methods.value().call();

    this.setState({ value: initialValue });

    }

    Listing 2-11

    Retrieving the initial value of the Counter when the component is mounted

    ```


    Note the call to the counter contract instance to retrieve the initial value.
