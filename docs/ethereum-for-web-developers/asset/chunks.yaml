- fmt: '### Note


    Behind the scenes, web3 `sign` method prefixes the message with the string `"\x19Ethereum
    Signed Message:\n"` and its length and then hashes it before signing. This is
    done to avoid tricking users into signing an actual transaction. Most APIs, even
    those part of the nodes or in hardware wallets, will handle this automatically.


    Given the original message and its signature, it is possible to recover the address
    that corresponds to the private key used to sign it in the first place.


    ```

    > hash = web3.utils.keccak256(message);

    > web3.eth.accounts.recover(hash, signed.signature)

    0xACa94ef8bD5ffEE41947b4585a84BdA5a3d3DA6E

    ```


    The recovery can be done not just from an off-chain script but also from within
    a smart contract (Listing [7-22]), as Solidity provides an `ecrecover` function
    that performs this task. We will use it via the ECDSA contract from the `openzeppelin-solidity@2.2.0`
    library, which offers a friendlier interface and performs additional checks.


    ```

    // 07-signing-messages/contracts/Signatures.sol

    pragma solidity ^0.5.0;

    import "openzeppelin-solidity/contracts/cryptography/ECDSA.sol";

    contract Signatures {

    using ECDSA for bytes32;

    function recover(

    string memory message, bytes memory signature

    ) public pure returns (address) {

    bytes32 hash = keccak256(bytes(message));

    return hash.toEthSignedMessageHash().recover(signature);

    }

    }

    Listing 7-22

    Simple contract that relies on OpenZeppelin''s ECDSA to recover the signer from
    a message and its signature

    ```


    We can check that calling the `recover` function from the preceding contract using
    the same parameters as before yields the same signer (Listing [7-23]).


    ```

    > await signatures.methods

    .recover(message, signed.signature).call();

    0xACa94ef8bD5ffEE41947b4585a84BdA5a3d3DA6E

    Listing 7-23

    Recovering the signer from the original message using the smart contract listed
    before. Here, signatures is a web3 contract instance that represents a deployed
    instance of the smart contract

    ```


    Ethereum signatures are typically used off-chain to verify that a user controls
    a certain account, or that the owner of an account signals an intention (for instance,
    in off-chain voting) by signing a specific message. But signatures can also be
    used on-chain to verify that the owner of an account intends to *execute* a certain
    action. This is where meta transactions come in.


    ### Introducing Meta Transactions


    A *meta transaction* or *gasless transaction* is similar to a regular transaction
    in that it is a signed tuple of a recipient, an amount of ETH transferred, a set
    of data included in the call, a gas allowance and price, and a nonce. However,
    instead of being broadcasted to the network, the meta transaction is wrapped within
    another transaction and sent to a particular contract. This contract knows how
    to unwrap the nested transaction, verify its signature, and execute the requested
    action.


    Note that the contract that first receives and processes the transaction is actually
    reproducing the same behavior as the Ethereum protocol: it verifies the nested
    transaction signature and nonce and performs a call to a recipient with the specified
    value and data.


    What is the value of meta transactions then? The key is that the meta transaction
    can be *relayed* to the network by a different account than the one who signed
    the original intent. This decouples the user who intends to execute an action
    and the user who pays for its gas, effectively *allowing any user to execute a
    transaction without requiring any gas*, that is, as long as another user is willing
    to pay for it. Meta transactions involve two main actors then:


    - The user, who signs a meta transaction that they want to be executed, but does
    not send it to the network

    - The relayer, who picks up that transaction, wraps it in another transaction
    of their own, and sends it to a contract, paying for its execution


    We will go into relayers later in this chapter. Let''s dive into the implementation
    of meta transactions first, at the smart contract level.


    #### Building on Our Smart Accounts


    Meta transactions require a contract that can process them, validate them, check
    that the signer is authorized to perform the action requested, and carry it out
    on their behalf. Fortunately, we already have a contract that can hold funds and
    carry actions on behalf of different accounts held by a user: the identity contract.


    We will modify the identity contract we have been building to handle meta transactions.
    Our forwarding function will now receive a meta transaction pre-signed by one
    of the user accounts instead of a direct call from one of them.


    This way, instead of having to actually send a transaction to the identity contract,
    the user can just sign an action and have a relayer send it. This allows the user
    to **hold all of their funds in a single smart account, without requiring any
    ETH on their devices to pay for gas fees**. Let''s see how this looks like in
    a modified identity contract (Listing [7-24]).


    ```

    // 08-meta-txs/contracts/IdentityWithMetaTxs.sol

    // Prevent replay attacks

    uint256 public nonce;

    // Use ECDSA library for retrieving the signer

    using ECDSA for bytes32;

    // Forward an action to a recipient validating the signer

    // Note that the onlyUser modifier is no longer needed

    function forward(

    address to, uint256 value, bytes memory data,

    bytes memory signature

    ) public returns (bytes memory) {

    // Get hash of the transaction that was signed

    bytes32 hash = getHash(to, value, data)

    .toEthSignedMessageHash();

    // Retrieve signer address and validate

    address signer = hash.recover(signature);

    require(accounts[signer], "Signer is not registered");

    // Increase nonce and execute the call

    nonce++;

    (bool success, bytes memory returnData) =

    to.call.value(value)(data);

    require(success, "Forwarded call failed");

    return returnData;

    }

    // Returns the hash for a pre-signed transaction

    function getHash(

    address to, uint256 value, bytes memory data

    ) public view returns (bytes32) {

    return keccak256(abi.encodePacked(

    to, value, data, nonce, address(this)

    ));

    }

    Listing 7-24

    Modified forward function from the Identity contract (presented earlier in this
    chapter) to handle meta transactions

    ```


    The first thing to notice is that the `forward` method requires a `signature`
    as well as its original parameters. This signature is computed over a hash that
    includes all transaction parameters (recipient, value, and data), plus two additional
    items:


    - The address of the validator, which is the contract checking the signature

    - A nonce, increased on every transaction executed


    The address of the validator is included to prevent a meta transaction sent to
    another validator to be reused in this one, while the nonce prevents replay attacks
    (i.e., relaying the same transaction multiple times). The resulting hash gets
    the magic prefix `"\x19Ethereum Signed Message:\n"` prepended, so it is distinguishable
    from a regular Ethereum transaction, and is then hashed again.


    ### Note


    Certain implementations track a nonce per signer instead of one global to the
    contract. This depends strictly on your use case: if it is possible that multiple
    whitelisted accounts will be sending meta transactions at the same time, then
    you should have signer-specific nonces.


    Next is the validation of the sender. Note that the contract no longer checks
    that `msg.sender` is a registered account – it now checks that the *signer* of
    the transaction is. The `msg.sender` becomes irrelevant, since who relayed the
    transaction does not matter at this stage.


    Finally, and before executing the transaction, the nonce is increased. This prevents
    the same transaction to be sent to the contract multiple times by a malicious
    relayer.'
