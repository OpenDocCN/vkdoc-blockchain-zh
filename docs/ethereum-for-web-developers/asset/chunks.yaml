  trans: '

    #### 现有代币的确认


    在本组件加载初始代币列表时，我们假设所有这些代币都已被*确认*，即它们已在数个区块之前被挖出。但实际情况并非总是如此。您可以通过在发送交易后立即重新加载页面来轻松测试这一点，并观察一个待确认的代币如何错误地进入已确认状态。


    处理这种情况有多种技术，其中一些我们将在下一章中看到。在本例中，我们将采用一种简单的方法，优先考虑简洁性而非效率。


    首先，我们不再在页面加载时从当前区块加载所有代币，而是加载两组代币：一组来自当前区块，另一组来自六个区块之前。我们将所有来自六个区块之前的代币视为已确认，而当前区块中的所有新代币将被标记为未确认。让我们更新`ERC721`主组件上的`didMount`处理程序（清单
    5-28）来实现这一更改。


    ```

    // src/components/ERC721.js

    const CONFIRMATIONS = 6;

    class ERC721 extends Component {

    async componentDidMount() {

    const currentBlock = await getBlockNumber();

    const confirmedBlock = currentBlock – CONFIRMATIONS;

    const confirmedTokenIds = await this

    .getTokensAtBlock(confirmedBlock)

    .catch(() => []);

    const latestTokenIds = await this

    .getTokensAtBlock(currentBlock);

    const unconfirmedTokenIds = latestTokenIds

    .filter(id => !confirmedTokenIds.includes(id));

    const tokens = confirmedTokenIds

    .map(id => ({ id, confirmed: true }))

    .concat(unconfirmedTokenIds

    .map(id => ({ id, confirmed: false })

    ));

    this.setState({ tokens, loading: false });

    }

    }

    清单 5-28

    获取已确认和未确认的代币列表，并在代币集合上相应地设置已确认标志。注意查询 confirmedTokenIds 时的 catch 块，因为如果在 confirmedBlock
    时合约尚未创建，该调用将抛出异常，在这种情况下，所有代币都应视为未确认

    ```


    这将使我们能够在页面加载时正确显示每个代币的状态。然而，任何标记为未确认的代币将保持该状态，直到完全重新加载页面。一旦它们达到所需的确认次数，我们需要更新它们的状态。


    我们将通过订阅新区块并重新检查每个未确认代币在*六个区块前*的所有权来实现这一点。一旦挖出足够多的新区块，我们就能将这些新代币移至已确认状态。让我们添加一个新方法（清单
    5-29），从`didMount`处理程序中调用它。


    ```

    // src/components/ERC721.js

    class ERC721 extends Component {

    subscribeUnconfirmedTokens(unconfirmedIds) {

    if (unconfirmedIds.length === 0) return;

    const { contract, owner } = this.props;

    this.newBlocksSub = getWeb3().eth

    .subscribe(''newBlockHeaders'', (err, { number }) => {

    unconfirmedIds.forEach(async (id) => {

    const confirmedOwner = await contract.methods

    .ownerOf(id).call({}, (number – CONFIRMATIONS))

    .catch(() => null);

    if (areAddressesEqual(confirmedOwner, owner)) {

    this.confirmToken(id, CONFIRMATIONS);

    unconfirmedIds = unconfirmedIds.filter(i => id!==i);

    if (unconfirmedIds.length === 0) {

    this.newBlocksSub.unsubscribe();

    }

    }

    });

    });

    }

    }

    清单 5-29

    订阅新区块，并重新检查每个代币在当前区块之前六个区块时的所有权。如果一个代币在六个区块前属于当前用户，我们就认为它已被确认。一旦所有待处理的代币都被处理完毕，我们就关闭订阅

    ```


    请记住，在此示例中，我们仅跟踪通过铸造创建的新代币，任何*转移*给用户的代币在页面重新加载之前都不会显示。我们还假设用户不会转移出自己的代币。如果您的应用程序需要处理这些场景，那么监控`Transfer`事件是一种比仅跟踪应用程序中用户发送的交易更安全的方法。我们将在下一章围绕这个概念进行构建。


    ### 后续步骤


    您的应用程序的下一步是迁移到更有趣的网络，从`Rinkeby`等测试网开始，最终迁移到`主网`。您可以启动连接到此类网络的本地`Geth`或`Parity`节点（使用`light
    syncmode`来加速同步过程），并依赖`deploy.js`脚本或使用`MyCrypto`^(⁸⁰)或`Remix`等在线工具来部署合约。一旦部署完成，所有交互将由`Metamask`管理——只需记得切换到正确的网络即可。


    ## 总结


    在本章中，我们回顾了如何通过依赖`ganache`或完整的以太坊客户端来搭建本地开发环境。然后，我们经历了使用原生`solc`编译器或`sol-compiler`包装器将合约编译并部署到网络的过程。我们还回顾了在使用`Metamask`发送交易和解锁用户账户时它的工作原理。


    在解决了设置环境的细节之后，我们深入探讨了发送交易的过程，特别关注了 Gas 估算和 Gas 价格的定义。接着，我们回顾了交易的生命周期以及如何访问特定事件，例如交易被挖出或确认时的事件。我们还介绍了一些发送交易时最常见的错误以及替换交易的工作原理。


    为了阐明所有这些概念，我们构建了一个小型应用程序，类似于上一章的应用程序，但这次是针对非同质化代币的。我们从用户现有代币的列表开始，允许用户铸造新的代币，并监控这些交易的生命周期。在下一章中，我们将涵盖索引和存储等概念，并学习一些关于处理重组和测试的额外技术，这些技术也可以应用于此类应用程序。


    # 6. 索引与存储


    在过去的两个章节中，我们学习了如何从以太坊网络读取数据和向以太坊网络写入数据。读取可以通过对合约进行常规调用或查询已记录的事件来完成，而写入则总是在交易的上下文中执行。然而，这些操作仅适用于基本用例。如果我们想要展示来自区块链的聚合数据，客户端查询事件很快便会力不从心。同样，如果我们想在合约中存储大量信息，Gas
    成本使其在经济上不可行。在本章中，我们将使用链下组件来解决这两个问题。我们首先将介绍在服务器中对区块链数据进行索引的过程，以便从客户端应用程序查询数据，然后介绍链下存储解决方案。在此过程中，我们还将回顾处理重组和测试的技术，并讨论中心化与去中心化解决方案的价值。

    '
- fmt: '# Indexing Data


    We will begin with the problem of indexing blockchain data. In this context, by
    *indexing* we refer to the action of collecting certain pieces of information
    from the network (such as token balances, sent transactions, or contracts created)
    and storing them in a queryable data store, such as a relational database or an
    analytics engine like ElasticSearch, in order to perform complex queries. Throughout
    this chapter, instead of attempting to index the entire chain, we will choose
    a specific dataset and build a solution tailored for it.


    Indexing is necessary whenever you need to perform any kind of *aggregation* over
    logged data, such as a sum or an average, since the Ethereum events API is not
    fit for doing so. For instance, it is not possible to easily obtain the number
    of unique addresses that hold more than a certain balance of an ERC20 asset –
    a query that is trivial to run on a relational database.


    Indexing can also be used to improve performance when querying large numbers of
    events, by acting just as a query cache. A dedicated database can answer event
    queries much faster than a regular Ethereum node.


    ## Note


    Certain public node providers, such as Infura, actually include an events query
    layer,^([^(81)](#fn81)) separate from their nodes, in order to greatly reduce
    their infrastructure footprint for serving logs.


    We will now focus on a specific indexing use case and design a solution for collecting
    the information to index.


    ## Tracking ERC20 Token Holders


    We will track the token holders of a specific ERC20 coin. Remember that ERC20
    non-fungible tokens can act as a coin, where each address has a certain balance.
    However, the contract offers no methods to actually list them. Even if it did,
    some tokens have a user base that would vastly exceed the capabilities of a client-side-only
    application querying an Ethereum node. For example, at the time of this writing,
    the OmiseGO (OMG) token has over 650,000 unique holders.^([^(82)](#fn82))


    ### Revisiting the ERC20 Interface


    We will review the ERC20 contract interface to identify the building blocks we
    will be using. Leaving aside functionality related to allowances, the ERC20 standard
    includes these methods and events.


    ```

    function transfer(address to, uint256 value) returns (bool);

    function totalSupply() view returns (uint256);

    function balanceOf(address who) view returns (uint256);

    event Transfer(

    address indexed from, address indexed to, uint256 value

    );

    ```


    As mentioned, unlike the extended ERC721 standard, ERC20 does not provide a method
    to list all token holders. The only way to build such a list is by going through
    every *Transfer* event and collect all recipient addresses.


    ## Caution


    Certain ERC20 contracts do not emit a `Transfer` event when minting new tokens,
    but rather emit a non-standard `Mint` event. In such cases, we would need to track
    both events in order to build the complete set of holders.


    ### Querying Transfer Events


    We will begin by querying all transfer events from a given contract. We will build
    an `ERC20Indexer` class, relying on a web3 connection provider, an ERC20 token
    address, and a block number to start querying from (Listing [6-1](#476252_1_En_6_Chapter.xhtml#PC2)).
    This last parameter is added only for performance reasons: it does not make sense
    to query any blocks before the token contract was deployed.


    ```

    // 01-indexing/simple-indexer.js

    const ERC20 = require(''openzeppelin-solidity/build/contracts/ERC20.json'');

    const BigNumber = require(''bignumber.js'');

    const Web3 = require(''web3'');

    class ERC20Indexer {

    constructor({ address, startBlock, provider } = {}) {

    this.holders = new Set();

    this.startBlock = startBlock;

    this.lastBlock = this.startBlock;

    this.web3 = new Web3(provider);

    this.contract = new this.web3.eth.Contract(

    ERC20.abi, address

    );

    }

    }

    Listing 6-1

    Constructor for the ERC20Indexer class we will be working on. We are once again
    depending on openzeppelin-solidity@2.2.0 to get the ERC20 contract ABI. We will
    store the list of all token holder addresses on the holders set, and the lastBlock
    field will keep track of the last block we have processed

    ```


    We can now add a first method to this class to get the list of transfer events
    from a given contract (Listing [6-2](#476252_1_En_6_Chapter.xhtml#PC3)). Since
    that list is potentially larger than what we can fit in a single request (OMG
    has over 2 million transfers up to date), we will need to break it into multiple
    requests, so we will start with a method that processes all events in a range
    of blocks.


    ```

    async processBlocks(startBlock, endBlock) {

    for (let fromBlock = startBlock;

    fromBlock  this.reduceEvent(e));

    }

    }

    Listing 6-2

    Querying all transfer events from a range of blocks in batches. Here BATCH_SIZE
    should depend on the volume of transactions per block of the contract

    ```


    This method will get all transfer events in a block range from a contract and
    send them to a `reduceEvent` function (Listing [6-3](#476252_1_En_6_Chapter.xhtml#PC4)).
    This reducing function should receive an event and use it to update the current
    list of token holders.


    ```

    const ZERO_ADDRESS = ''0x0000000000000000000000000000000000000000'';

    async reduceEvent(event) {

    const { to } = event.returnValues;

    if (to !== ZERO_ADDRESS) {

    this.holders.add(to);

    }

    }

    Listing 6-3

    Retrieving the recipient of a token transfer to add it to the list of token holders.
    Transfers to the zero address are usually tokens being burnt, so we will keep
    it out of our list

    ```'
