  trans: '

    ### EIP 与 ERC


    作为一个去中心化协议，对以太坊的所有改进通常首先以提案（或 EIP，以太坊改进提案）的形式出现，供社区讨论。这些提案涵盖了从核心协议本身的变更到为兼容性定义的应用程序级标准。后者被称为以太坊征求意见稿（或
    ERC，沿用了互联网工程任务组使用的 RFC 命名规范）。这些标准尤为重要，因为它们定义了合约要使用的通用 ABI 和语义。它们充当大型应用的构建模块，并通过设定社区达成一致的通用接口来促进可复用性。两种最流行的智能合约标准——同质化代币和非同质化代币，分别被定义为
    `ERC20` 和 `ERC721`。


    ### ERC20 代币


    在 `ERC20` 标准中定义的代币，可能是以太坊应用中最常见的构建模块。核心上，一个 `ERC20` 合约会跟踪每个代币持有者地址的余额，并提供查询和管理这些余额的方法（清单
    3-20）。代币可以作为任何项目的去中心化货币。因此，任何团队都可以轻松在以太坊网络上推出自己的加密货币，而无需搭建自己的区块链。尽管如此，代币除了作为货币之外还有更多用途。代币的目的由使用它的协议赋予：它可用于表示对某个特定项目的担保，或是在去中心化组织中的投票权。如今许多项目都依赖于一个（有时是多个）`ERC20`
    代币。


    ```

    interface ERC20 {

    function totalSupply()

    external view returns (uint256);

    function balanceOf(address who)

    external view returns (uint256);

    function allowance(address owner, address spender)

    external view returns (uint256);

    function transfer(address to, uint256 value)

    external returns (bool);

    function approve(address spender, uint256 value)

    external returns (bool);

    function transferFrom(

    address from, address to, uint256 value

    ) external returns (bool);

    event Transfer(

    address indexed from,

    address indexed to,

    uint256 value

    );

    event Approval(

    address indexed owner,

    address indexed spender,

    uint256 value

    );

    }

    清单 3-20

    ERC20 标准完整接口

    ```


    理解 `ERC20` 代币的第一步是窥探其状态。一个同质化代币由一个从用户到余额的映射支持，该映射通过 `balanceOf` 获取器暴露。


    ```

    function balanceOf(address who)

    external view returns (uint256);

    ```


    余额通过调用 `transfer` 来修改。用户可以选择将其一定数量的代币转移到另一个地址——无论是合约还是外部账户。每当调用此方法时，会触发 `Transfer`
    事件以记录该操作。


    ```

    function transfer(address to, uint256 value)

    external returns (bool);

    ```


    在余额转移这一基本行为之上，还有一个概念是授权。用户可以批准任何地址代表其管理最多一定数量的代币。代币授权的状态可以通过 `allowance` 获取器查询。


    ```

    function allowance(address owner, address spender)

    external view returns (uint256);

    ```


    要为某个地址设置授权，合约提供了 `approve` 方法，调用时需触发 `Approval` 事件。请注意，用户可以为任意高数量的代币设置授权——无论他们是否实际拥有这些代币。


    ```

    function approve(address spender, uint256 value)

    external returns (bool);

    ```


    当授权账户转移拥有者的代币时，授权额度会被消耗。如果地址 A 允许 B 代表其最多使用 20 个代币，那么在 B 转移了 A 的 5 个代币后，剩余授权额度将为
    15。代表另一个用户进行转移通过 `transferFrom` 方法完成，该方法会同时影响余额和授权。


    ```

    function transferFrom(

    address from, address to, uint256 value

    ) external returns (bool);

    ```


    此外，该标准还包括三个可选的获取器：`name`、`symbol` 和 `decimals`。它们常被钱包或其他客户端软件用来根据代币地址显示其信息。该标准并未规定代币最初如何分发，或总供应量如何随时间变化。某些代币在创建时设定了固定供应量，并分配到一个单一地址，由该地址手动分发。其他代币则可以随时间铸造，并根据特定规则进行分发。


    ### 提示


    `ERC20` 标准的规范且经过审计的实现可以从 OpenZeppelin 合约包中获得，因此你无需自行实现。

    '
- fmt: "### ERC721 Non-fungible Tokens\n\nThe `ERC721` standard (Listing 3-21) defines\
    \ the specification for digital collectibles, also called non-fungible tokens\
    \ (often abbreviated NFTs). NFTs are different from the traditional `ERC20` token\
    \ in that each token is identifiable and different from the other. As such, a\
    \ user no longer has a number of tokens, but has a particular set of unique identifiable\
    \ tokens, each with its own metadata associated to it. As an analogy, if `ERC20`\
    \ tokens can be used to represent a currency, `ERC721` tokens can be used to represent\
    \ collectible cards.\n\nThe interface for `ERC721` is heavily inspired from `ERC20`,\
    \ with the difference that all operations act on identifiable tokens and not on\
    \ a balance. `ERC721` also introduces a few additions over `ERC20` which we will\
    \ now review.\n\n```\ncontract ERC721 is IERC165 {\n    function balanceOf(address\
    \ owner) public view returns (uint256 balance);\n    function ownerOf(uint256\
    \ tokenId) public view returns (address owner);\n    function approve(address\
    \ to, uint256 tokenId) public;\n    function getApproved(uint256 tokenId) public\
    \ view returns (address operator);\n    function setApprovalForAll(address operator,\
    \ bool _approved) public;\n    function isApprovedForAll(address owner, address\
    \ operator) public view returns (bool);\n    function transferFrom(address from,\
    \ address to, uint256 tokenId) public;\n    function safeTransferFrom(address\
    \ from, address to, uint256 tokenId) public;\n    function safeTransferFrom(address\
    \ from, address to, uint256 tokenId, bytes data) public;\n    event Transfer(address\
    \ indexed from, address indexed to, uint256 indexed tokenId);\n    event Approval(address\
    \ indexed owner, address indexed approved, uint256 indexed tokenId);\n    event\
    \ ApprovalForAll(address indexed owner, address indexed operator, bool approved);\n\
    }\n```\nListing 3-21 Interface of the `ERC721` standard\n\nThe first methods for\
    \ querying the number of tokens held by an address, as well as for querying whether\
    \ a particular token belongs to an address, are quite straightforward.\n\n```\n\
    function balanceOf(address owner) public view returns (uint256 balance);\nfunction\
    \ ownerOf(uint256 tokenId) public view returns (address owner);\n```\n\nThroughout\
    \ the standard, tokens are identified by an opaque `uint256` value. While some\
    \ implementations use incremental numbers for IDs, this is not required at all.\n\
    \nNote that the standard does not provide any way of actually listing the existing\
    \ tokens or the tokens that belong to a user. To solve this, there is an optional\
    \ extension (Listing 3-22) that provides methods for enumerating all the tokens\
    \ in existence, as well as the tokens of a particular user.\n\n```\nfunction totalSupply()\
    \ public view returns (uint256);\nfunction tokenOfOwnerByIndex(address owner,\
    \ uint256 index) public view returns (uint256 tokenId);\nfunction tokenByIndex(uint256\
    \ index) public view returns (uint256);\n```\nListing 3-22 `ERC721Enumerable`\
    \ optional extension\n\nTo avoid returning an arbitrarily large array with all\
    \ the tokens created, or all the tokens that belong to a user, this `Enumerable`\
    \ extension provides means to know the total number of tokens (or the number of\
    \ tokens that belong to a user) and to iterate through them via an index.\n\n\
    Like `ERC20`, `ERC721` has the concept of allowances, though managed slightly\
    \ differently. `ERC721` allows an owner to designate one or more spenders for\
    \ each of their tokens individually and at the same time to designate one or more\
    \ addresses to manage all of their tokens on their behalf. The latter are sometimes\
    \ called operators. These two concepts – approval for a particular token or for\
    \ all tokens – are queried and set via the following methods, and reflected by\
    \ the `Approval` and `ApprovalForAll` events.\n\n```\nfunction approve(address\
    \ to, uint256 tokenId) public;\nfunction getApproved(uint256 tokenId) public view\
    \ returns (address operator);\nfunction setApprovalForAll(address operator, bool\
    \ _approved) public;\nfunction isApprovedForAll(address owner, address operator)\
    \ public view returns (bool);\n```\n\n`ERC721` does not include a `transfer` method.\
    \ Instead, all token transfers are to be handled via `transferFrom`, which requires\
    \ the spender to specify not only the token to transfer and the destination but\
    \ also the current owner. If the current owner does not match the `from` parameter,\
    \ the transfer is rejected.\n\n```\nfunction transferFrom(address from, address\
    \ to, uint256 tokenId) public;\n```\n\nThis standard includes two other methods\
    \ for managing transfers:\n\n```\nfunction safeTransferFrom(address from, address\
    \ to, uint256 tokenId) public;\nfunction safeTransferFrom(address from, address\
    \ to, uint256 tokenId, bytes data) public;\n```\n\nThe safe transfer methods check\
    \ that the recipient of the token can actually manage them, by calling into a\
    \ specified `onERC721Received` method in the recipient (Figure 3-7). If the recipient\
    \ does not implement this method, the transfer is aborted. This prevents tokens\
    \ from being accidentally lost by sending to contracts that cannot manage them,\
    \ thus locking them forever, which is a common problem in `ERC20`. As such, it\
    \ is recommended to always prefer this method over the plain `transferFrom`.\n\
    \n![../images/476252_1_En_3_Chapter/476252_1_En_3_Fig7_HTML.png](images/476252_1_En_3_Chapter/476252_1_En_3_Fig7_HTML.png)\n\
    \nFigure 3-7 Execution flow of an `ERC721` safe transfer\n\nAn overload of this\
    \ method includes an extra `data` parameter. This data is forwarded on the `onERC721Received`\
    \ call and can be used by the recipient to decide whether to accept the token\
    \ to be transferred.\n\nAnother part of `ERC721` is the requirement to implement\
    \ `ERC165` (Listing 3-23). `ERC165` provides a standard way to query whether a\
    \ contract implements an interface or not. This allows users or other contracts\
    \ to actually check if any given address responds to a method before attempting\
    \ to call into it. In the context of `ERC721`, this means that you can actually\
    \ ask an address whether it is an `ERC721` contract or not. However, keep in mind\
    \ that whether the actual implementation is correct or malicious is an entirely\
    \ different subject.\n\n```\nfunction supportsInterface(bytes4 interfaceId) external\
    \ view returns (bool);\n```\nListing 3-23 Interface of `ERC165`. The `interfaceId`\
    \ is a well-known identifier set for every standard and is often composed of the\
    \ hash of the public function signatures\n\nThe last component of `ERC721` is\
    \ an optional extension for metadata (Listing 3-24). This extension not only includes\
    \ the name and symbol getters that were also present in `ERC20` (note that decimals\
    \ do not make sense in this context, since non-fungible tokens are not divisible)\
    \ but also a way to fetch metadata information for any given token.\n\n```\nfunction\
    \ name() external view returns (string);\nfunction symbol() external view returns\
    \ (string);\nfunction tokenURI(uint256 tokenId) public view returns (string);\n\
    ```\nListing 3-24 Metadata optional extension for `ERC721`\n\nWhile the format\
    \ of `tokenURI` is not defined and is left for implementers to choose,^([^(57)](#fn57))\
    \ it provides a standard way to obtain information on a particular token instance,\
    \ such as an image or a blurb of text that describes it. `tokenURI` often points\
    \ to an off-chain^([^(58)](#fn58)) resource that contains a manifest for the token."
  raw: '### ERC721 Non-fungible Tokens


    The ERC721 standard (Listing [3-21](#476252_1_En_3_Chapter.xhtml#PC34)) defines
    the specification for digital collectibles, also called non-fungible tokens (often
    abbreviated NFTs). NFTs are different from the traditional ERC20 token in that
    each token is identifiable and different from the other. As such, a user no longer
    has a number of tokens, but has a particular set of unique identifiable tokens,
    each with its own metadata associated to it. As an analogy, if ERC20 tokens can
    be used to represent a currency, ERC721 tokens can be used to represent collectible
    cards.


    The interface for ERC721 is heavily inspired from ERC20, with the difference that
    all operations act on identifiable tokens and not on a balance. ERC721 also introduces
    a few additions over ERC20 which we will now review.


    ```

    contract ERC721 is IERC165 {

    function balanceOf(address owner)

    public view returns (uint256 balance);

    function ownerOf(uint256 tokenId)

    public view returns (address owner);

    function approve(address to, uint256 tokenId)

    public;

    function getApproved(uint256 tokenId)

    public view returns (address operator);

    function setApprovalForAll

    (address operator, bool _approved)

    public;

    function isApprovedForAll

    (address owner, address operator)

    public view returns (bool);

    function transferFrom

    (address from, address to, uint256 tokenId)

    public;

    function safeTransferFrom

    (address from, address to, uint256 tokenId)

    public;

    function safeTransferFrom

    (address from, address to, uint256 tokenId, bytes data)

    public;

    event Transfer(

    address indexed from,

    address indexed to,

    uint256 indexed tokenId

    );

    event Approval(

    address indexed owner,

    address indexed approved,

    uint256 indexed tokenId

    );

    event ApprovalForAll(

    address indexed owner,

    address indexed operator,

    bool approved

    );

    }

    Listing 3-21

    Interface of the ERC721 standard

    ```


    The first methods for querying the number of tokens held by an address, as well
    as for querying whether a particular token belongs to an address, are quite straightforward.


    ```

    function balanceOf(address owner)

    public view returns (uint256 balance);

    function ownerOf(uint256 tokenId)

    public view returns (address owner);

    ```


    Throughout the standard, tokens are identified by an opaque `uint256` value. While
    some implementations use incremental numbers for IDs, this is not required at
    all.


    Note that the standard does not provide any way of actually listing the existing
    tokens or the tokens that belong to a user. To solve this, there is an optional
    extension (Listing [3-22](#476252_1_En_3_Chapter.xhtml#PC36)) that provides methods
    for enumerating all the tokens in existence, as well as the tokens of a particular
    user.


    ```

    function totalSupply()

    public view returns (uint256);

    function tokenOfOwnerByIndex

    (address owner, uint256 index)

    public view returns (uint256 tokenId);

    function tokenByIndex(uint256 index)

    public view returns (uint256);

    Listing 3-22

    ERC721Enumerable optional extension

    ```


    To avoid returning an arbitrarily large array with all the tokens created, or
    all the tokens that belong to a user, this Enumerable extension provides means
    to know the total number of tokens (or the number of tokens that belong to a user)
    and to iterate through them via an index.


    Like ERC20, ERC721 has the concept of allowances, though managed slightly different.
    ERC721 allows an owner to designate one or more spenders for each of their tokens
    individually and at the same time to designate one or more addresses to manage
    all of their tokens on their behalf. The latter are sometimes called *operators*.
    These two concepts – approval for a particular token or for all tokens – are queried
    and set via the following methods, and reflected by the `Approval` and `ApprovalForAll`
    events.


    ```

    function approve(address to, uint256 tokenId)

    public;

    function getApproved(uint256 tokenId)

    public view returns (address operator);

    function setApprovalForAll

    (address operator, bool _approved)

    public;

    function isApprovedForAll

    (address owner, address operator)

    public view returns (bool);

    ```


    ERC721 does not include a `transfer` method . Instead, all token transfers are
    to be handled via `transferFrom`, which requires the spender to specify not only
    the token to transfer and the destination but also the current owner. If the current
    owner does not match the `from` parameter, the transfer is rejected.


    ```

    function transferFrom

    (address from, address to, uint256 tokenId)

    public;

    ```


    This standard includes two other methods for managing transfers:


    ```

    function safeTransferFrom

    (address from, address to, uint256 tokenId)

    public;

    function safeTransferFrom

    (address from, address to, uint256 tokenId, bytes data)

    public;

    ```


    The safe transfer methods check that the recipient of the token can actually manage
    them, by calling into a specified `onERC721Received` method in the recipient (Figure
    [3-7](#476252_1_En_3_Chapter.xhtml#Fig7)). If the recipient does not implement
    this method, the transfer is aborted. This prevents tokens from being accidentally
    lost by sending to contracts that cannot manage them, thus locking them forever,
    which is a common problem in ERC20\. As such, it is recommended to always prefer
    this method over the plain `transferFrom`.


    ![../images/476252_1_En_3_Chapter/476252_1_En_3_Fig7_HTML.png](images/476252_1_En_3_Chapter/476252_1_En_3_Fig7_HTML.png)


    Figure 3-7


    Execution flow of an ERC721 safe transfer


    An overload of this method includes an extra `data` parameter. This data is forwarded
    on the `onERC721Received` call and can be used by the recipient to decide whether
    to accept the token to be transferred.


    Another part of ERC721 is the requirement to implement ERC165 (Listing [3-23](#476252_1_En_3_Chapter.xhtml#PC40)).
    ERC165 provides a standard way to query whether a contract implements an interface
    or not. This allows users or other contracts to actually check if any given address
    responds to a method before attempting to call into it. In the context of ERC721,
    this means that you can actually *ask* an address whether it is an ERC721 contract
    or not. However, keep in mind that whether the actual implementation is correct
    or malicious is an entirely different subject.


    ```

    function supportsInterface(bytes4 interfaceId)

    external view returns (bool);

    Listing 3-23

    Interface of ERC165\. The interfaceId is a well-known identifier set for every
    standard and is often composed of the hash of the public function signatures

    ```


    The last component of ERC721 is an optional extension for metadata (Listing [3-24](#476252_1_En_3_Chapter.xhtml#PC41)).
    This extension not only includes the `name` and symbol `getters` that were also
    present in ERC20 (note that decimals do not make sense in this context, since
    non-fungible tokens are not divisible) but also a way to fetch metadata information
    for any given token.


    ```

    function name() external view returns (string);

    function symbol() external view returns (string);

    function tokenURI(uint256 tokenId)

    public view returns (string);

    Listing 3-24

    Metadata optional extension for ERC721

    ```


    While the format of `tokenURI` is not defined and is left for implementers to
    choose,^([^(57)](#fn57)) it provides a standard way to obtain information on a
    particular token instance, such as an image or a blurb of text that describes
    it. Token URI often points to an off-chain^([^(58)](#fn58)) resource that contains
    a manifest for the token.'
  trans: "\n### ERC721 非同质化代币\n\n`ERC721` 标准（清单 3-21）定义了数字收藏品的规范，也称为非同质化代币（通常缩写为 NFT）。NFT\
    \ 与传统的 `ERC20` 代币不同，在于每个代币都是可识别且彼此独特的。因此，用户不再拥有一定数量的代币，而是拥有一组特定的、唯一可识别的代币，每个代币都关联有其自身的元数据。打个比方，如果\
    \ `ERC20` 代币可以用于代表一种货币，那么 `ERC721` 代币可以用于代表收藏卡牌。\n\n`ERC721` 的接口在很大程度上借鉴了 `ERC20`，区别在于所有操作都作用于可识别的代币，而非余额。`ERC721`\
    \ 还在 `ERC20` 的基础上引入了一些新增内容，我们现在就来回顾一下。\n\n```\ncontract ERC721 is IERC165 {\n\
    \    function balanceOf(address owner) public view returns (uint256 balance);\n\
    \    function ownerOf(uint256 tokenId) public view returns (address owner);\n\
    \    function approve(address to, uint256 tokenId) public;\n    function getApproved(uint256\
    \ tokenId) public view returns (address operator);\n    function setApprovalForAll(address\
    \ operator, bool _approved) public;\n    function isApprovedForAll(address owner,\
    \ address operator) public view returns (bool);\n    function transferFrom(address\
    \ from, address to, uint256 tokenId) public;\n    function safeTransferFrom(address\
    \ from, address to, uint256 tokenId) public;\n    function safeTransferFrom(address\
    \ from, address to, uint256 tokenId, bytes data) public;\n    event Transfer(address\
    \ indexed from, address indexed to, uint256 indexed tokenId);\n    event Approval(address\
    \ indexed owner, address indexed approved, uint256 indexed tokenId);\n    event\
    \ ApprovalForAll(address indexed owner, address indexed operator, bool approved);\n\
    }\n```\n清单 3-21 `ERC721` 标准的接口\n\n用于查询某个地址持有的代币数量，以及查询特定代币是否属于某个地址的前几个方法，相当直观。\n\
    \n```\nfunction balanceOf(address owner) public view returns (uint256 balance);\n\
    function ownerOf(uint256 tokenId) public view returns (address owner);\n```\n\n\
    在整个标准中，代币由一个不透明的 `uint256` 值标识。虽然某些实现使用递增的数字作为 ID，但这一点并非必需。\n\n请注意，该标准并未提供任何实际列出已存在代币或属于某个用户的代币的方法。为了解决这个问题，有一个可选的扩展（清单\
    \ 3-22）提供了枚举所有已存在代币以及特定用户代币的方法。\n\n```\nfunction totalSupply() public view returns\
    \ (uint256);\nfunction tokenOfOwnerByIndex(address owner, uint256 index) public\
    \ view returns (uint256 tokenId);\nfunction tokenByIndex(uint256 index) public\
    \ view returns (uint256);\n```\n清单 3-22 `ERC721Enumerable` 可选扩展\n\n为了避免返回包含所有已创建代币或属于某个用户的所有代币的任意大型数组，这个\
    \ `Enumerable` 扩展提供了了解代币总数（或属于某个用户的代币数量）并通过索引进行迭代遍历的方法。\n\n与 `ERC20` 类似，`ERC721`\
    \ 也有授权（allowances）的概念，但管理方式略有不同。`ERC721` 允许所有者为其每个代币单独指定一个或多个花费者，同时也可以指定一个或多个地址代其管理其所有代币。后者有时被称为操作员。这两个概念——针对特定代币或所有代币的授权——通过以下方法进行查询和设置，并由\
    \ `Approval` 和 `ApprovalForAll` 事件反映出来。\n\n```\nfunction approve(address to, uint256\
    \ tokenId) public;\nfunction getApproved(uint256 tokenId) public view returns\
    \ (address operator);\nfunction setApprovalForAll(address operator, bool _approved)\
    \ public;\nfunction isApprovedForAll(address owner, address operator) public view\
    \ returns (bool);\n```\n\n`ERC721` 不包含 `transfer` 方法。相反，所有代币转移都通过 `transferFrom`\
    \ 处理，这要求花费者不仅要指定要转移的代币和目的地，还要指定当前所有者。如果当前所有者与 `from` 参数不匹配，则转移会被拒绝。\n\n```\nfunction\
    \ transferFrom(address from, address to, uint256 tokenId) public;\n```\n\n该标准还包含另外两个用于管理转移的方法：\n\
    \n```\nfunction safeTransferFrom(address from, address to, uint256 tokenId) public;\n\
    function safeTransferFrom(address from, address to, uint256 tokenId, bytes data)\
    \ public;\n```\n\n安全转移方法通过调用接收者中指定的 `onERC721Received` 方法（图 3-7）来检查代币的接收者是否确实能管理它们。如果接收者没有实现此方法，则转移会被中止。这防止了代币因被发送到无法管理它们的合约而意外丢失，从而永久锁定，这是\
    \ `ERC20` 中的一个常见问题。因此，建议始终优先使用此方法而非普通的 `transferFrom`。\n\n![../images/476252_1_En_3_Chapter/476252_1_En_3_Fig7_HTML.png](img/476252_1_En_3_Fig7_HTML.png)\n\
    \n图 3-7 `ERC721` 安全转移的执行流程\n\n此方法的一个重载包含一个额外的 `data` 参数。该数据会在 `onERC721Received`\
    \ 调用中转发，并可供接收者用于决定是否接受要转移的代币。\n\n`ERC721` 的另一部分是实现 `ERC165`（清单 3-23）的要求。`ERC165`\
    \ 提供了一种查询合约是否实现某个接口的标准方法。这使得用户或其他合约能够在尝试调用某地址的方法之前，实际检查该地址是否会响应。在 `ERC721` 的上下文中，这意味着你可以实际询问某个地址它是否是一个\
    \ `ERC721` 合约。但是，请记住，实际实现是否正确或恶意完全是另一回事。\n\n```\nfunction supportsInterface(bytes4\
    \ interfaceId) external view returns (bool);\n```\n清单 3-23 `ERC165` 的接口。`interfaceId`\
    \ 是为每个标准设定的已知标识符，通常由公共函数签名的哈希值构成\n\n`ERC721` 最后一个组件是一个可选的元数据扩展（清单 3-24）。此扩展不仅包含了\
    \ `ERC20` 中也存在的名称和符号获取函数（请注意，在此上下文中小数位数没有意义，因为非同质化代币不可分割），还提供了一种获取任何给定代币元数据信息的方法。\n\
    \n```\nfunction name() external view returns (string);\nfunction symbol() external\
    \ view returns (string);\nfunction tokenURI(uint256 tokenId) public view returns\
    \ (string);\n```\n清单 3-24 `ERC721` 的可选元数据扩展\n\n虽然 `tokenURI` 的格式并未定义，留待实现者自行选择，^(⁵⁷)\
    \ 但它提供了一种标准方法来获取特定代币实例的信息，例如描述它的图像或一段文本简介。`tokenURI` 通常指向包含该代币清单的链下^(⁵⁸)资源。\n"
- fmt: '## Summary


    Throughout this chapter, we have presented what a smart contract is and how it
    is composed of code and state, differentiating it from an externally owned account.
    We have reviewed what a transaction is, its lifecycle, and how it interacts with
    a smart contract, potentially modifying its state – in opposition to static calls,
    used to query contracts without changing them. We have also presented some concepts
    such as gas usage and price, which are of particular importance to clients issuing
    transactions to the network.


    We have also studied Solidity as a high-level programming language for coding
    smart contracts. Solidity''s basic unit is a contract, which is composed of state
    variables and functions, which can be decorated with modifiers and potentially
    emit events. Solidity contracts can extend from multiple other contracts, or include
    libraries, as a means to modularizing code. This introduction was far from covering
    all Solidity concepts and left out several security insights that are vital when
    developing production-level smart contract code, but is enough for you to understand
    smart contracts and be able to code small systems.


    Last, we reviewed two of the most widely used building blocks in smart contracts
    – tokens, defined in `ERC20` and `ERC721`. These cover fungible tokens and digital
    collectibles, respectively, and most applications operate on either (or both)
    of the two.


    Overall, the main goal of this chapter is not for you to become an expert in smart
    contract development, but to understand key concepts that will be useful when
    developing web applications backed by these contracts.


    # 4. Querying the Network


    After a not-so-brief interlude on writing smart contracts, we will review the
    different ways to connect to the Ethereum network to retrieve data. We will cover
    different connection methods, as well as patterns for listening to changes, and
    put it all together in a sample application for monitoring transfers of an `ERC20`
    token.


    ## Connecting to the Network


    The first step in retrieving data from the network is to actually connect to an
    Ethereum node. Since web applications do not connect directly to the network,
    they depend on a node to answer any queries on the blockchain state. We will start
    by reviewing node types, connection methods, and the provider object.


    ### About Full and Light Nodes


    A typical Ethereum node is a `Geth` or `Parity` instance^(59) that has its own
    copy (partial or full) of the blockchain, can answer queries from clients (such
    as a DApp), and relays transactions (more on this in the next chapter). A node
    with a full copy of the blockchain is called a *full node*. These nodes either
    have or can recompute any data from the blockchain history. Most clients run in
    this mode by default.


    Full nodes may also store all historical data. These nodes are called *archive
    nodes*, and they are much more infrequent, due to the large amount of disk size
    needed to support them – nearly 2TB at the time of this writing. They are required
    in case you want to query particular information from older blocks, such as the
    state of a contract or a balance of an account from a year ago.


    As an alternative to full nodes, some nodes may run in *light client* mode. These
    nodes keep only the block headers, and request information from the network as
    needed. They are much lighter to run than full nodes, which make them suitable
    for mobile devices, but make a poor choice for the back end of a DApp, since queries
    take longer to resolve.


    #### Infura and Public Nodes


    The next question about nodes is which ones are available for our applications.
    In an ideal decentralized scenario, every user should be running their own full
    Ethereum node, in order to validate all transactions themselves, and avoid trusting
    a third party. Users on mobile or IOT devices may choose to run light nodes instead,
    which would trust other nodes to relay the information but nevertheless verify
    it.


    In the current landscape, a small fraction of our users will actually be running
    an Ethereum node. Most of them will be just learning what Ethereum is about, and
    wondering how to buy their first ETH to pay for the gas to fuel their initial
    transactions. Having them running their own nodes is still out of the question.


    As such, and in order to help the Ethereum adoption process easier, there are
    a number of *public nodes* available. An Ethereum node is said to be a public
    node when it holds no private keys, is available to the public, and is used to
    answer blockchain queries and relay pre-signed transactions.


    In particular, **Infura** (Japanese for "infrastructure") is a service that provides
    HTTP and websocket endpoints to public full nodes for the Ethereum Mainnet, as
    well as for the Kovan, Ropsten, and Rinkeby testnets. Due to its reliability,
    and to the fact that it is free to use, it is widely used by many decentralized
    apps and wallets.


    ### The JSON-RPC Interface


    All Ethereum nodes, regardless of the particular implementation, expose a set
    of well-known methods, which compose the *JSON-RPC interface*. As the name implies,
    this is a JSON-based API for executing remote procedure calls, and constitutes
    the low-level interface for a client to interact with a node. Common methods include
    `call`, `sendTransaction`, `getBlockByNumber`, `accounts`, or `getBalance`. There
    are even methods for querying the state of the node itself, such as whether its
    syncing or how many peers it is connected to.


    ### Note


    Given it is a low-level interface, it is odd that you will find yourself building
    JSON-RPC calls manually. Most libraries (such as `web3.js` or `ethers.js`) will
    take care of generating the calls on your behalf and provide you with the responses.
    Nevertheless, it is always useful to understand what is going on under the hood
    in case you stumble upon a dreadful abstraction leakage.


    It is worth mentioning that certain nodes may not implement all methods. For instance,
    the Infura HTTP endpoint does not offer costly operations such as `newFilter`
    (more on filters later in this chapter). This will be important to keep in mind
    when we discuss how to connect our app to the Ethereum network.'
