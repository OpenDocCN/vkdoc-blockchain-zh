  trans: '

    ### 说明


    值得一提的是，几乎所有智能账户、身份合约或弹跳代理的实现都包含了某种元交易的变体。一旦用户身份转移到了链上，继续将其限制在协议规则中（例如要求发送者账户为其交易支付
    Gas 费）便不再合理。


    #### 发送元交易


    我们将以智能账户章节中的示例为基础，这次通过向身份合约中的 `Greeter` 合约发送一笔元交易。第一步（代码清单 7-25）是让用户签署待执行的交易。


    ```

    // 08-meta-txs/01-identity-with-meta-txs.js

    let recipient = greeter.options.address;

    let value = 5000;

    let data = greeter.methods.setGreeting("Hey").encodeABI();

    let hash = await identity.methods

    .getHash(recipient, value, data).call();

    let signature = web3.eth.accounts.sign(hash, pk).signature;

    代码清单 7-25

    用户构建并签署待转发的交易。其中 pk 是用户的私钥，greeter 是一个包含 setGreeting 方法的合约实例。

    ```


    生成的交易及其签名随后通过 HTTP 或其他链下传输方式发送给中继器。中继器应验证该交易，将其打包，然后发送到用户的身份合约（代码清单 7-26）。


    ```

    await identity.methods

    .forward(recipient, value, data, signature)

    .send({ from: relayer });

    await greeter.methods.greet().call();

    // => Hey

    代码清单 7-26

    中继器使用用户提供的参数和签名，调用身份合约的转发函数。身份合约随后会调用 greeter 合约，改变其状态。

    ```


    我们有意在此示例中省略了用户如何与中继器通信，以及中继器如何决定是否为用户支付交易费用的细节。这因应用场景而异。例如，一个应用可以在一个众所周知的 URL
    上提供中心化的中继器，为其系统中任何合约的每笔交易支付费用。它也可能强制用户通过验证码，以防止垃圾请求。


    此外，人们也在努力构建完全去中心化的中继器网络，其中是否为用户交易支付费用的逻辑，实际上是应用智能合约的一部分。这些努力还包括某些方法，让中继者能够因执行而获得补偿，我们将在下一节中看到这一点。


    ### 中继器与奖励


    中继器本质上是一个具有公共接口（通常是 HTTP）的进程，它接收来自用户的已签名消息，验证消息，将其封装成交易，然后推送到网络中。在执行这最后一步时，中继器使用自己的账户——Gas
    费用将从该账户余额中扣除。


    在我们目前所有的示例中，我们都假设执行元交易所需的 Gas 费用由应用所有者承担。该所有者会启动一个中继器，并免费为其应用的所有用户转发交易。


    然而，用户实际上有可能*补偿*为其服务的中继器。一种对转发功能的补充是向中继器（即 `msg.sender`）发送一些 ETH 以覆盖执行成本。这样一来，用户确实支付了与其交易相关的
    Gas 费用——只不过这些费用是从他们的智能账户中支付的，从而完全无需在每个设备中保留用于支付 Gas 的 ETH。


    这为新型激励机制打开了大门：中继器不再需要由应用所有者集中控制并补贴执行成本，而是可以成为去中心化的，仅通过中继交易来获取利润。这引出了一个名为*桌面挖矿*的新概念，用户无需进行计算密集型的证明工作量，而是通过为其他用户中继元交易来赚取费用。


    #### 中继器奖励


    实现向中继器补偿的最简单方法是在每个执行请求中包含一笔*奖励*。然后，中继器可以根据预估的执行成本来决定是否中继该交易。


    用户甚至可以为其交易指定特定的 Gas 价格和 Gas 限额，并在身份合约中验证这些要求是否得到满足。这可以防止中继器以极低的 Gas 价格发送交易，从而以牺牲用户的时间为代价来支付更低的费用。


    让我们再次修改转发函数，以涵盖上述所有内容（代码清单 7-27）。我们需要添加参数来指定奖励和 Gas 要求，并且这些参数也需要由用户签名。


    ```

    // 08-meta-txs/contracts/IdentityWithRewards.sol

    event Forwarded(uint256 nonce, bool success, address relayer);

    function forward(

    uint256 reward, uint256 gasPrice, uint256 gasLimit,

    address to, uint256 value, bytes memory data,

    bytes memory signature

    ) public returns (bytes memory) {

    // 验证交易的 Gas 价格

    require(tx.gasPrice >= gasPrice, "Gas price too low");

    // 获取已签名的交易哈希

    bytes32 hash = getHash(

    reward, gasPrice, gasLimit, to, value, data

    ).toEthSignedMessageHash();

    // 恢复签名者地址并进行验证

    address signer = hash.recover(signature);

    require(accounts[signer], "Signer not registered");

    // 增加 nonce，执行调用，并通知结果

    nonce++;

    require(gasleft() >= gasLimit);

    (bool success, bytes memory returnData) =

    to.call.value(value).gas(gasLimit)(data);

    emit Forwarded(nonce, success, msg.sender);

    // 向中继器支付奖励

    msg.sender.transfer(reward);

    return returnData;

    }

    function getHash(

    uint256 reward, uint256 gasPrice, uint256 gasLimit,

    address to, uint256 value, bytes memory data

    ) public view returns (bytes32) {

    return keccak256(abi.encodePacked(

    reward, gasPrice, gasLimit,

    to, value, data, nonce, address(this)

    ));

    }

    代码清单 7-27

    支持中继器奖励的身份合约转发函数。修改部分以粗体高亮显示。

    ```


    在上述代码片段中，一个重要的变化是函数不再要求转发的调用必须成功（`require(success)`）。这样做的理由是：如果转发的调用失败并回滚了整个交易，那么中继器将无法收到任何奖励，但仍然会因执行回滚的交易而损失
    Gas 费用。为了避免正确转发交易的中继器因失败的交易而受到惩罚，我们移除了这个要求。此外，为了能够判断转发的调用是否回滚，我们添加了一个事件来报告每笔交易的成功状态。


    另外请注意，Gas 价格的验证是在方法开头执行的，因为 Gas 价格针对的是整个交易，并且在合约调用之间无法更改。另一方面，Gas 限额可以在交易内的每次调用上强制执行，因此如果剩余
    Gas 不足，我们可以回滚。在这种情况下，中继器有责任在请求中包含额外 Gas 以应对元交易的处理开销（在此实现中约为 60K）。

    '
- fmt: '### Estimating Profits


    The code for generating the signed transaction in this scenario is analogous to
    the previous one, with the only difference that the user now needs to include
    values for the gas price, the gas limit, and the reward. The first two can be
    estimated as seen in Chapter [5](#476252_1_En_5_Chapter.xhtml) by using a price
    oracle like the `ethgasstation` API or the `gasPrice` JSON-RPC method for the
    gas price and running an `estimateGas` on the transaction to be sent for the gas
    limit. The value for the reward may depend on other factors, but must be greater
    than the total execution cost for the relayer, to have an incentive to relay the
    transaction.


    In this scenario, the relayer needs not only to relay the requested transaction
    but also to evaluate whether it should – by calculating the profit. Transactions
    with an estimated profit below a certain threshold should be dropped, and if multiple
    transactions (from different identities) are enqueued, the profit can be used
    to prioritize which to execute first.


    The profit can be easily calculated by actually estimating the entire call, multiplying
    the estimate by the gas price, and subtracting that from the reward.


    ```

    // 08-meta-txs/02-identity-with-rewards.js

    let estimatedGas = await identity.methods

    .forward(reward, gasPrice, gasLimit,

    recipient, value, data, signature)

    .estimateGas({ from: relayer, gasPrice });

    let estimatedProfit =

    BN(reward).minus(BN(estimatedGas).times(gasPrice));

    ```


    Keep in mind that the transaction may actually require a higher gas value than
    the estimated if the user requested a higher `gasLimit`. To actually execute the
    transaction, the relayer should send a gas allowance equal to `gasLimit` plus
    the additional gas required to process the meta transaction. This additional gas
    can be roughly calculated as the difference between sending a transaction directly
    to the recipient contract and sending it via the identity as a meta transaction.
    In our implementation, that difference amounts to 60K gas approximately, though
    this value is not constant: it fluctuates slightly depending on the size of the
    transaction’s data.


    ```

    await identity.methods

    .forward(reward, gasPrice, gasLimit,

    recipient, value, data, signature)

    .send({ from: relayer, gasPrice, gas: gasLimit + 60000 });

    ```


    Note that this difference may actually cause the transaction to cost more than
    the relayer expected in case the estimation and the actual usage differ, as the
    relayer could be setting a higher gas allowance.


    ### Payment in Kind


    Gas fees from transaction execution are paid in ETH, since it is the native currency
    of the Ethereum network. However, nothing forces us to pay the rewards to relayers
    in the same currency, as there are plenty of other media of exchange on Ethereum:
    every fungible token (ERC20) is a potential currency.


    This opens the door to allowing our users to transact exclusively using a token,
    since ETH is no longer needed to pay for gas fees. This is especially interesting
    if our application is built on top of a token-based protocol: it allows us to
    send tokens to our users as they engage in our network, which are in turn used
    to pay for relayer rewards. Our users never need to hold or purchase any ETH;
    they only work with our application’s token.


    The code for supporting payment in tokens is a direct modification from the previous
    one. We add a new `rewardToken` parameter to the forwarding function and send
    tokens on that address or ETH if this parameter is set to the zero address.


    ```

    // 08-meta-txs/contracts/IdentityWithTokenRewards.sol

    import "openzeppelin-solidity/contracts/token/ERC20/IERC20.sol";

    function forward(

    uint256 reward, address rewardToken,

    uint256 gasPrice, uint256 gasLimit,

    address to, uint256 value, bytes memory data,

    bytes memory signature

    ) public returns (bytes memory) {

    // Validate gas price of the transaction

    require(tx.gasPrice >= gasPrice, "Gas price too low");

    // Get hash of the transaction that was signed

    bytes32 hash = getHash(

    reward, rewardToken, gasPrice, gasLimit, to, value, data

    ).toEthSignedMessageHash();

    // Retrieve signer address and validate

    address signer = hash.recover(signature);

    require(accounts[signer], "Signer not registered");

    // Increase nonce, execute call, and inform success

    nonce++;

    require(gasleft() >= gasLimit);

    (bool success, bytes memory returnData) =

    to.call.value(value).gas(gasLimit)(data);

    emit Forwarded(nonce, success, msg.sender);

    // Pay back to the relayer

    if (rewardToken == address(0)) {

    msg.sender.transfer(reward);

    } else {

    require(IERC20(rewardToken).transfer(msg.sender, reward));

    }

    return returnData;

    }

    ```


    Keep in mind that while this mechanism is particularly useful when your application
    spins up relayers that trade tokens for executions, it imposes additional difficulties
    for decentralized relayers. A random relayer performing desktop mining now needs
    to check for the market value of the reward token against the execution cost to
    determine the profit. Not only that, but it also needs to ensure there is enough
    liquidity in the market to trade such token for ETH when they want to cash out
    their profits – and that is without considering the fees for that exchange.


    In other words, paying relayer rewards in a protocol-specific ERC20 is useful
    if the relayer infrastructure you are using is specific to your application, but
    ETH or a widespread ERC20^([^(111)](#fn111)) may be a better option for working
    with decentralized relayers.'
  raw: '#### Estimating Profits


    The code for generating the signed transaction in this scenario is analogous to
    the previous one, with the only difference that the user now needs to include
    values for the gas price, the gas limit, and the reward. The first two can be
    estimated as seen in Chapter [5](#476252_1_En_5_Chapter.xhtml) by using a price
    oracle like the ethgasstation API or the gasPrice JSON-RPC method for the gas
    price and running an `estimateGas` on the transaction to be sent for the gas limit.
    The value for the reward may depend on other factors, but must be greater than
    the total execution cost for the relayer, to have an incentive to relay the transaction.


    In this scenario, the relayer needs not only to relay the requested transaction
    but also to evaluate whether it should – by calculating the profit. Transactions
    with an estimated profit below a certain threshold should be dropped, and if multiple
    transactions (from different identities) are enqueued, the profit can be used
    to prioritize which to execute first.


    The profit can be easily calculated by actually estimating the entire call, multiplying
    the estimate by the gas price, and subtracting that from the reward.


    ```

    // 08-meta-txs/02-identity-with-rewards.js

    let estimatedGas = await identity.methods

    .forward(reward, gasPrice, gasLimit,

    recipient, value, data, signature)

    .estimateGas({ from: relayer, gasPrice });

    let estimatedProfit =

    BN(reward).minus(BN(estimatedGas).times(gasPrice));

    ```


    Keep in mind that the transaction may actually require a higher gas value than
    the estimated if the user requested a higher `gasLimit`. To actually execute the
    transaction, the relayer should send a gas allowance equal to `gasLimit` plus
    the additional gas required to process the meta transaction. This additional gas
    can be roughly calculated as the difference between sending a transaction directly
    to the recipient contract and sending it via the identity as a meta transaction.
    In our implementation, that difference amounts to 60K gas approximately, though
    this value is not constant: it fluctuates slightly depending on the size of the
    transaction’s data.


    ```

    await identity.methods

    .forward(reward, gasPrice, gasLimit,

    recipient, value, data, signature)

    .send({ from: relayer, gasPrice, gas: gasLimit + 60000 });

    ```


    Note that this difference may actually cause the transaction to cost more than
    the relayer expected in case the estimation and the actual usage differ, as the
    relayer could be setting a higher gas allowance.


    #### Payment in Kind


    Gas fees from transaction execution are paid in ETH, since it is the native currency
    of the Ethereum network. However, nothing forces us to pay the rewards to relayers
    in the same currency, as there are plenty of other media of exchange on Ethereum:
    every fungible token (ERC20) is a potential currency.


    This opens the door to allowing our users to transact exclusively using a token,
    since ETH is no longer needed to pay for gas fees. This is especially interesting
    if our application is built on top of a token-based protocol: it allows us to
    send tokens to our users as they engage in our network, which are in turn used
    to pay for relayer rewards. Our users never need to hold or purchase any ETH;
    they only work with our application’s token.


    The code for supporting payment in tokens is a direct modification from the previous
    one. We add a new `rewardToken` parameter to the forwarding function and send
    tokens on that address or ETH if this parameter is set to the zero address.


    ```

    // 08-meta-txs/contracts/IdentityWithTokenRewards.sol

    import "openzeppelin-solidity/contracts/token/ERC20/IERC20.sol";

