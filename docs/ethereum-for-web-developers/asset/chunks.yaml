  raw: '### Note


    We did not need to use the genesis configuration file for the bootnode, since
    the bootnode does need any information on whether the network is running a proof
    of work or authority or who the validators are. It only needs to know where the
    nodes are to share this information with the network.


    Now that we have a bootnode running and a genesis configuration file, it is time
    to actually start the network. In three different terminals, start the three different
    Geth validator nodes (Listing [8-20](#476252_1_En_8_Chapter.xhtml#PC22)), configured
    to mine (i.e., seal) new blocks, and expose the JSON-RPC API locally over HTTP.


    ```

    geth \

    --datadir miner1 \

    --port 30201 \

    --rpc --rpcaddr localhost --rpcport 12001 \

    --rpcapi ''eth,personal'' \

    --networkid 1212 \

    --gasprice 10000 \

    --unlock 8305ccac...58269a7d \

    --password password.txt \

    --mine \

    --bootnodes ''enode://c190f2af...ee34b40a@127.0.0.1:30100''

    Listing 8-20

    Starting the Geth validator nodes using the genesis configuration and bootnode
    ID generated earlier. Run this command three times in different terminals, one
    for each validator, changing the unlocked address, datadir, port, and rpcport

    ```


    Our network should be now running, sealing a new block every 5 seconds. Take a
    look at the logs from the three validators to see how they progress.


    We can now spin up a new client node and connect to the existing network (Listing
    [8-21](#476252_1_En_8_Chapter.xhtml#PC23)). Remember that even though the set
    of validators is limited, the network is still public and any node can connect
    to it. We can use its console to check how the latest block number increases every
    5 seconds, running `web3.eth.blockNumber`.


    ```

    $ geth \

    --datadir node1 --port 30204 \

    --rpc --rpcaddr localhost --rpcport 12004 \

    --rpcapi ''eth,personal'' \

    --networkid 1212 \

    --bootnodes ''enode://c190f2af...ee34b40a@127.0.0.1:30100'' \

    console

    Listing 8-21

    Spinning a new node to join the network, with a console enabled. Note that we
    are not authenticating this new node in any way, since the network is public for
    anyone to join

    ```


    Let’s now connect this network with an existing one, such as Rinkeby.


    #### Building a Bridge


    We will build a simple bridge, exclusively dependent on the validator accounts,
    using a contract deployed on both the main network and the sidechain, in addition
    to a script being run by each validator. In this model, the steps for a user moving
    into a sidechain and later exiting would be the following:


    1.  The user transfers funds to the bridge contract on mainnet.


    2.  The bridge contract retains the funds and emits an event.


    3.  The validators note the event, and each of them calls into the bridge contract
    on the sidechain side requesting to unlock the same amount of funds.


    4.  The user gets their funds in the sidechain and uses them to operate there.


    5.  Once the user wants to exit the sidechain, the same process is repeated by
    transferring the sidechain funds to the sidechain bridge contract and having the
    validators unlock them on the mainnet bridge contract.


    We will begin by building the bridge contract. This contract will have two main
    responsibilities: (1) accepting and locking user funds and (2) unlocking them
    at the request of the validators. Note that we will deploy two instances of the
    contract, one in each chain. The locking function on one chain will have its counterpart
    on the unlocking function of the other chain and vice versa.


    ### Note


    In this example, we are building a bridge that accepts ETH and dispenses the native
    currency of the sidechain on the other end. However, we could also build bridges
    that accept a certain ERC20 token on the main chain or even non-fungible ERC721
    assets.


    To begin with, the bridge will need to know the validators’ addresses (Listing
    [8-22](#476252_1_En_8_Chapter.xhtml#PC24)). We will also specify how many validators
    need to agree to release a user’s funds. In our scenario with three validators,
    we will release the funds with just two of them agreeing in case one of them drops.


    ```

    pragma solidity ^0.5.0;

    contract Bridge {

    uint256 threshold;

    mapping(address => bool) validators;

    constructor(

    uint256 _threshold,

    address[] memory _validators

    ) public payable {

    threshold = _threshold;

    for (uint256 i = 0; i < _validators.length; i++) {

    validators[_validators[i]] = true;

    }

    }

    }

    Listing 8-22

    Definition of the bridge contract, which is initialized with the validators’ addresses

    ```


    Note that we are making the constructor payable. When deploying the contract in
    the sidechain, we need to seed this contract with the maximum amount of ETH we
    want to allow our users to transfer from the main network (Rinkeby in this case)
    to our sidechain, so the contract can unlock those funds when prompted by the
    validators.


    We will now go into the locking function (Listing [8-23](#476252_1_En_8_Chapter.xhtml#PC25)),
    which is quite simple. We need to accept the sender’s funds, allowing them to
    specify a recipient address on the other end of the bridge, and emit an event.
    We will assign an autoincremental ID to each locking operation, so the validators
    can refer to it when unlocking on the other end.


    ```

    event Locked(uint256 id, uint256 amount, address recipient);

    uint256 lastId;

    function lock(address recipient) public payable {

    require(msg.value > 0);

    emit Locked(++lastId, msg.value, recipient);

    }

    Listing 8-23

    Lock function of the bridge contract

    ```


    Last but not least, we will work on the unlock function (Listing [8-24](#476252_1_En_8_Chapter.xhtml#PC26)).
    This function will be called by the validators on the other end of the bridge.
    Each validator should authorize unlocking the funds that correspond to a locking
    operation that happened on the other end. Keep in mind that since there is no
    on-chain communication between both ends of the bridge, it is the validators responsibility
    to unlock the correct amount of funds to the address requested by the user.


    ```

    mapping(uint256 => Request) requests;

    struct Request {

    uint256 amount;

    address payable recipient;

    bool paid;

    uint256 approveCount;

    mapping(address => bool) approvedBy;

    }

    event Unlocked(uint256 id, uint256 amount, address recipient);

    function unlock(

    uint256 id, uint256 amount, address payable recipient

    ) public {

    Request storage request = requests[id];

    require(validators[msg.sender]);

    require(!request.approvedBy[msg.sender]);

    require(request.recipient == address(0)

    || request.recipient == recipient);

    require(request.amount == 0 || request.amount == amount);

    request.approveCount++;

    request.approvedBy[msg.sender] = true;

    request.recipient = recipient;

    request.amount = amount;

    if (request.approveCount >= threshold && !request.paid) {

    request.paid = true;

    recipient.transfer(amount);

    emit Unlocked(id, amount, recipient);

    }

    }

    Listing 8-24

    Unlocking function of the token bridge. The first time a validator requests an
    unlock, we will create a new unlock request and then log an approval every time
    it is called again. When the required number of approvals is reached, the funds
    are unlocked

    ```'
  trans: "\n### 注意\n\n我们不需要为引导节点使用创世配置文件，因为引导节点无需了解网络是否运行工作量证明或权威证明，也不关心验证者是谁。它只需知道节点所在位置，以便将信息分享给网络。\n\
    \n现在我们已经启动了一个引导节点并准备好了创世配置文件，是时候真正启动网络了。在三个不同的终端中，启动三个不同的 Geth 验证节点（Listing 8-20），配置它们挖掘（即封印）新区块，并在本地通过\
    \ HTTP 暴露 JSON-RPC API。\n\n```\ngeth \\\n--datadir miner1 \\\n--port 30201 \\\n\
    --rpc --rpcaddr localhost --rpcport 12001 \\\n--rpcapi 'eth,personal' \\\n--networkid\
    \ 1212 \\\n--gasprice 10000 \\\n--unlock 8305ccac...58269a7d \\\n--password password.txt\
    \ \\\n--mine \\\n--bootnodes 'enode://c190f2af...ee34b40a@127.0.0.1:30100'\nListing\
    \ 8-20\n使用之前生成的创世配置和引导节点 ID 启动 Geth 验证节点。在三个不同的终端中各运行一次此命令，每次对应一个验证节点，并更改解锁地址、数据目录、端口和\
    \ RPC 端口\n```\n\n我们的网络现在应该正在运行，每 5 秒封印一个新区块。查看三个验证节点的日志，以了解它们的进展。\n\n现在我们可以启动一个新的客户端节点并连接到现有网络（Listing\
    \ 8-21）。请记住，尽管验证节点集合有限，但网络仍然是公开的，任何节点都可以连接。我们可以使用其控制台检查最新区块编号如何每 5 秒增长一次，运行 `web3.eth.blockNumber`。\n\
    \n```\n$ geth \\\n--datadir node1 --port 30204 \\\n--rpc --rpcaddr localhost --rpcport\
    \ 12004 \\\n--rpcapi 'eth,personal' \\\n--networkid 1212 \\\n--bootnodes 'enode://c190f2af...ee34b40a@127.0.0.1:30100'\
    \ \\\nconsole\nListing 8-21\n启动一个新节点加入网络，并启用控制台。注意，我们没有以任何方式验证这个新节点，因为网络是公开的，任何人都可以加入\n\
    ```\n\n现在让我们将这个网络与一个现有网络（如 Rinkeby）连接起来。\n\n### 构建一个桥接\n\n我们将构建一个简单的桥接，完全依赖于验证者账户，使用一个部署在主网络和侧链上的合约，以及每个验证者运行的一个脚本。在这个模型中，用户进入侧链然后退出的步骤如下：\n\
    \n1. 用户将资金转移到主网上的桥接合约。\n2. 桥接合约保留资金并发出一个事件。\n3. 验证者注意到该事件，每个验证者调用侧链上的桥接合约，请求解锁相同数量的资金。\n\
    4. 用户在侧链中获得资金并使用它们进行操作。\n5. 一旦用户想要退出侧链，重复相同的过程：将侧链资金转移到侧链桥接合约，由验证者在主网桥接合约上解锁它们。\n\
    \n我们将从构建桥接合约开始。该合约有两个主要职责：(1) 接收并锁定用户资金，(2) 根据验证者的请求解锁资金。注意，我们将在每条链上部署合约的两个实例。一条链上的锁定功能对应于另一条链上的解锁功能，反之亦然。\n\
    \n### 注意\n\n在此示例中，我们构建了一个接收 ETH 并在另一端发放侧链原生货币的桥接。然而，我们也可以构建在主链上接受特定 ERC20 代币甚至非可替代的\
    \ ERC721 资产的桥接。\n\n首先，桥接合约需要知道验证者的地址（Listing 8-22）。我们还需要指定需要多少验证者同意才能释放用户资金。在我们有三个验证者的场景中，如果其中一个失效，我们只需两个验证者同意即可释放资金。\n\
    \n```\npragma solidity ⁰.5.0;\ncontract Bridge {\n    uint256 threshold;\n   \
    \ mapping(address => bool) validators;\n    constructor(\n        uint256 _threshold,\n\
    \        address[] memory _validators\n    ) public payable {\n        threshold\
    \ = _threshold;\n        for (uint256 i = 0; i < _validators.length; i++) {\n\
    \            validators[_validators[i]] = true;\n        }\n    }\n}\nListing\
    \ 8-22\n桥接合约的定义，使用验证者地址进行初始化\n```\n\n注意我们将构造函数设为可支付。在侧链部署合约时，我们需要向该合约注入我们允许用户从主网络（本例中为\
    \ Rinkeby）转移到侧链的最大 ETH 数量，以便合约在验证者提示时可以解锁这些资金。\n\n现在我们来编写锁定函数（Listing 8-23），这个函数相当简单。我们需要接收发送者的资金，允许他们指定桥接另一端的接收者地址，并发出一个事件。我们将为每个锁定操作分配一个自增\
    \ ID，以便验证者在另一端解锁时可以引用该 ID。\n\n```\nevent Locked(uint256 id, uint256 amount, address\
    \ recipient);\nuint256 lastId;\nfunction lock(address recipient) public payable\
    \ {\n    require(msg.value > 0);\n    emit Locked(++lastId, msg.value, recipient);\n\
    }\nListing 8-23\n桥接合约的锁定函数\n```\n\n最后但同样重要的是，我们来编写解锁函数（Listing 8-24）。该函数将由桥接另一端的验证者调用。每个验证者应授权解锁与另一端锁定操作对应的资金。请记住，由于桥接两端之间没有链上通信，验证者有责任将正确数量的资金解锁到用户请求的地址。\n\
    \n```\nmapping(uint256 => Request) requests;\nstruct Request {\n    uint256 amount;\n\
    \    address payable recipient;\n    bool paid;\n    uint256 approveCount;\n \
    \   mapping(address => bool) approvedBy;\n}\nevent Unlocked(uint256 id, uint256\
    \ amount, address recipient);\nfunction unlock(\n    uint256 id, uint256 amount,\
    \ address payable recipient\n) public {\n    Request storage request = requests[id];\n\
    \    require(validators[msg.sender]);\n    require(!request.approvedBy[msg.sender]);\n\
    \    require(request.recipient == address(0)\n        || request.recipient ==\
    \ recipient);\n    require(request.amount == 0 || request.amount == amount);\n\
    \    request.approveCount++;\n    request.approvedBy[msg.sender] = true;\n   \
    \ request.recipient = recipient;\n    request.amount = amount;\n    if (request.approveCount\
    \ >= threshold && !request.paid) {\n        request.paid = true;\n        recipient.transfer(amount);\n\
    \        emit Unlocked(id, amount, recipient);\n    }\n}\nListing 8-24\n代币桥接的解锁函数。当验证者首次请求解锁时，我们将创建一个新的解锁请求，并在每次再次调用时记录一次批准。当达到所需批准数量时，资金即被解锁\n\
    ```\n"
- fmt: '### Caution


    This implementation allows a malicious validator to prevent a user’s funds from
    being unlocked. The validator could spam the bridge contract with spurious unlock
    requests for upcoming request IDs. This way, when the honest validators actually
    try to honor the unlock request, the parameters (such as amount or recipient)
    will not match and the operation will fail. We will ignore this attack, since
    the purpose of this bridge is to just illustrate basic usage. Nevertheless, this
    serves as a reminder that even the most simple implementations may be hiding security
    issues, and you should always work with reviewed and audited contracts.


    We can now deploy this contract on both networks (Listing [8-25](#476252_1_En_8_Chapter.xhtml#PC27)),
    using the set of validators we defined earlier and choosing a required threshold
    of two approvals for unlocking. Remember to also transfer a large amount of funds
    to the contract when deploying it on the sidechain, so it has funds to unlock
    when requested.


    ```

    const Web3 = require(''web3'');

    const Artifact = require(''../artifacts/Bridge.json'');

    const web3 = new Web3(PROVIDER_URL);

    const abi = Artifact.compilerOutput.abi;

    const data = Artifact.compilerOutput.evm.bytecode.object;

    const Bridge = new web3.eth.Contract(abi, null, { data });

    const bridge = await Bridge.deploy({

    arguments: [THRESHOLD, VALIDATORS]

    }).send({

    from: FROM, gas: 1e6, gasPrice: GAS_PRICE, value: VALUE

    });

    console.log("Bridge deployed at", bridge.options.address);

    Listing 8-25

    Deployment script for the bridge contract. Run this twice with different PROVIDER_URLs:
    one for the Rinkeby Ethereum network and the other for the sidechain

    ```


    Finally, we need to set up the watcher scripts that will be run by each validator
    (Listing [8-26](#476252_1_En_8_Chapter.xhtml#PC28)). These scripts will watch
    the bridge contract in one network for `Locked` events and execute the corresponding
    unlock on the other side.


    ```

    const Web3 = require(''web3'');

    const Artifact = require(''../artifacts/Bridge.json'');

    const abi = Artifact.compilerOutput.abi;

    const remoteWeb3 = new Web3(REMOTE_PROVIDER_URL);

    const localWeb3 = new Web3(LOCAL_PROVIDER_URL);

    const remoteBridge = new remoteWeb3.eth.Contract(abi, REMOTE);

    const localBridge = new localWeb3.eth.Contract(abi, LOCAL);

    remoteBridge.events.Locked().on(''data'', function(e) {

    const { id, amount, recipient } = e.returnValues;

    localBridge.methods

    .unlock(id, amount, recipient)

    .send({ from: VALIDATOR, gas: 1e6, gasPrice: GAS_PRICE });

    });

    localBridge.events.Locked().on(''data'', function(e) {

    const { id, amount, recipient } = e.returnValues;

    remoteBridge.methods

    .unlock(id, amount, recipient)

    .send({ from: VALIDATOR, gas: 1e6, gasPrice: GAS_PRICE });

    });

    Listing 8-26

    Watcher script to be run on each validator. Note that we create two web3 instances:
    one connecting to the main network, where we listen for events on the remote end
    of the bridge, and the other to the local network, where we execute the unlock
    operations. We then do the converse, allowing funds to go from the sidechain back
    to the main network

    ```


    We can now run this script on each of the validator nodes (or at least on two
    of them). Once it is running, try calling the `lock` function in the Rinkeby end
    of the bridge. A few seconds later, you should have your funds ready to use on
    the chosen address in your sidechain.


    In an actual application, you need to decide how much of this complexity you want
    to expose to your users. As we have seen in Chapter [7](#476252_1_En_7_Chapter.xhtml),
    onboarding is already troublesome enough, and adding another step requiring to
    send funds from one network to another is not a good idea.


    However, you can actually leverage an application-specific sidechain for improving
    onboarding. You can directly fund your users’ initial accounts on your sidechain
    or build a viral inviting scheme where existing users can invite new ones directly
    on the cheaper and faster sidechain. The bridge is then only used for advanced
    users who want to transfer value from or to the main network, but to an Ethereum
    neophyte the application simply runs smoothly and fast, without knowing how it
    is backed.


    A good example of this, already mentioned in the previous chapter, is the Burner
    Wallet.^([^(146)](#fn146)) This wallet operates on a proof-of-authority sidechain^([^(147)](#fn147))
    with four different teams acting as validators. Users are quickly onboarded by
    receiving a link with a pre-funded account on the sidechain and can easily transact
    with others thanks to low gas costs and 5-second blocks. For the most advanced
    users, there is an option to move the funds onto the main Ethereum network or
    even seed their burner wallets from their mainnet accounts.


    ### Plasma Chains


    The state of the art in terms of layer 2 solutions at the time of this writing
    are plasma chains,^([^(148)](#fn148)) originally designed by Vitalik Buterin and
    Joseph Poon in 2017.


    Plasma chains are different from sidechains in that their security can be enforced
    by the main chain (or *parent chain*, in plasma terminology) and thus does not
    depend exclusively on the consensus mechanism of the sidechain. This means that
    if the set of validators on the child chain (called *plasma operators*) misbehaves,
    any user can build a cryptographic proof and take it to a smart contract on the
    main chain (called *root contract*). If there is no foul play, transactions on
    the child chain occur with the reduced gas cost and latency typical of a sidechain.


    However, this additional security comes at a cost. Whenever a user wants to exit
    the child chain (i.e., transfer their assets back to the main chain), they must
    go through a *challenge period*, similar to the one we saw in state channels.
    If a malicious validator creates a fake block where he stole a user’s assets and
    uses it to take over those assets in the main chain, the user can submit a fraud
    proof during this challenge period and regain their assets. As such, exiting a
    plasma chain is not instant and requires a user to wait a certain period of time.^([^(149)](#fn149))


    Also, since a smart contract needs to be able to process whether a set of transactions
    on the child chain was legitimate, the operations allowed on the child chain cannot
    be overly complex. In particular, no plasma implementations at the time of this
    writing support arbitrary smart contracts and only provide the means for exchanging
    assets between users. Research on this topic is done under *generalized plasma*
    implementations.


    On the flip side, plasma chains are designed for having a tree-like structure.
    The parent chain of a plasma chain can be *another* plasma chain, allowing for
    massive scalability by simply composing plasma chains within others. This means
    that if an application-specific plasma chain becomes overcrowded, it can simply
    spawn new children and move clusters of users to them.


    It is worth mentioning that plasma itself is not a specification but a framework
    for building scalable layer 2 infrastructure. This has led to the development
    of many different flavors of plasma by different teams, such as minimal viable
    plasma, plasma cash, plasma debit, or plasma prime.^([^(150)](#fn150)) It is most
    likely that by the time this book reaches your hands, there will be new major
    developments on this front.'
