    \ {\nconst counter = this.props.contract;\nconst initialValue = await counter.methods.value().call();\n\
    this.setState({ value: initialValue });\ncounter.events.Increased()\n.on('data',\
    \ (event) => {\nconst value = event.returnValues.newValue;\nthis.setState({ value\
    \ });\n});\n}\nListing 2-17\nSubscription to the Increased event, which updates\
    \ the component’s state whenever a new instance of the event is emitted\n```\n\
    \nNote that here we are referring to the `counter.events` property instead of\
    \ to the `counter.methods` like we did before. Here, the event emitter fires a\
    \ `data` event every time a new event is found, and includes the arguments of\
    \ the event.\n\nAlso, by updating the component’s state on every event, we no\
    \ longer need to query the contract state whenever a transaction is confirmed.\
    \ The receipt event handler on the `increaseCounter` function can be simplified\
    \ to the following.\n\n```\n.on('receipt', async () => {\nthis.setState({ increasing:\
    \ false });\n})\n```\n\nWith this new setup, you can now receive real-time updates\
    \ on a contract, regardless of where the state change originated from. Try again\
    \ opening two browser windows and increasing the counter from one of them, and\
    \ see how the change is reflected on both of them once the transaction is confirmed.\
    \ And if you are lucky, you may even stumble upon a change issued by another reader\
    \ of this book on the same contract instance.\n\n### Deploying the Application\n\
    \nAs you may have noticed, our sample application runs exclusively client-side.\
    \ All logic takes place on the browser, and the blockchain is used as a back end\
    \ to perform simple computations and persist a shared state among all users, acting\
    \ as a consensus layer on the state of the counter. This makes deployment straightforward,\
    \ since the DApp needs only to be hosted as a static site."
  trans: "\n### 发送交易\n\n首先，我们来编写一个函数，用于发送交易以调用 `Counter` 合约的 `increase` 函数。\n\n```\n\
    increaseCounter() {\nconst counter = this.props.contract;\nreturn counter.methods.increase().send();\n\
    }\n```\n\n经过上一节的讲解，调用发送交易应该更熟悉了。注意，这里我们使用的是 `send()` 而不是 `call()`。这是因为我们需要实际发送一笔交易来改变合约的状态，而不仅仅是查询网络数据。\n\
    \n现在我们可以将此方法绑定到界面中的一个按钮（代码清单 2-13）并测试它。\n\n```\nrender() {\nconst { value } =\
    \ this.state;\nif (!value) return \"加载中\";\nreturn (\n\n计数器值: { value.toString()\
    \ }\n this.increaseCounter()}>\n增加计数器\n\n);\n}\n代码清单 2-13\n更新后的 render 方法，用于显示一个增加计数器的按钮\n\
    ```\n\n如果你尝试此操作，Metamask 会弹出一个确认交易对话框，界面大致如图 2-2 所示。\n\n![../images/476252_1_En_2_Chapter/476252_1_En_2_Fig2_HTML.jpg](img/476252_1_En_2_Fig2_HTML.jpg)\n\
    \n图 2-2\n\nMetamask 确认对话框，用于接受应用程序发出的交易。每次您尝试代表用户发送交易时，用户都会看到此对话框。\n\n如果你在确认交易几秒后刷新页面，你应该会看到计数器的新值。但是，为了避免要求用户刷新页面来更新值，我们将在交易确认后再次查询该值（代码清单\
    \ 2-14）。\n\n```\nincreaseCounter() {\nconst counter = this.props.contract;\nreturn\
    \ counter.methods.increase().send()\n.on('receipt', async () => {\nconst value\
    \ = await counter.methods.value().call();\nthis.setState({ value });\n});\n}\n\
    代码清单 2-14\n交易被挖矿后查询计数器的值\n```\n\n`send()` 方法返回一个事件发射器，使我们能够监听交易生命周期中的不同事件。目前，我们只关心交易被挖矿（即被包含在区块链的一个区块中）时的事件。此事件称为\
    \ `receipt`，因为它对应的是交易收据对象可用的时刻。如果需要，我们也可以检查交易是否已实际发送到节点，或是否已达到合理数量的确认。\n\n现在，即使更新后的代码刷新了计数器的值，我们也需要让用户了解发生了什么。交易确认需要几秒钟的时间，这无疑比常规的\
    \ Web 2.0 应用程序通常所需的时间更长。\n\n我们将跟踪交易状态（代码清单 2-15）以显示简单的“等待交易”消息，让用户知道正在发生什么，并在此期间禁用按钮（代码清单\
    \ 2-16）。我们还将处理交易失败的情况，以免永久禁用按钮。当然，在一个真正的 DApp 中，你可能希望提供更好的视觉提示。\n\n```\nrender()\
    \ {\nconst { value, increasing, error } = this.state;\nif (!value) return \"加载中\"\
    ;\nreturn (\n\n计数器值: { value.toString() }\n this.increaseCounter()}>\n增加计数器\n\n\
    { increasing && \"等待交易\" }\n{ error && error.message }\n\n);\n}\n代码清单 2-16\n更新后的\
    \ render 方法，用于在交易待处理或失败时显示通知，并在交易完成前禁用按钮\n```\n\n```\nincreaseCounter() {\nconst\
    \ counter  = this.props.contract;\nthis.setState({ increasing: true, error: null\
    \ });\nreturn counter.methods.increase().send()\n.on('receipt', async () => {\n\
    const value = await counter.methods.value().call();\nthis.setState({ value, increasing:\
    \ false });\n})\n.on('error', (error) => {\nthis.setState({ error, increasing:\
    \ false })\n});\n}\n代码清单 2-15\n更新后的 increaseCounter 函数，用于跟踪一个标识符以识别待处理的交易和任何返回的错误\n\
    ```\n\n### 注意\n\n作为等待交易被挖矿的替代方案，我们也可以采用*乐观更新*的方式更新值。乐观更新是一种用于 DApp 之外的许多异步应用程序中的技术，它包括假设用户执行的交易将成功，并立即在客户端更新值。这样，用户会觉得应用程序几乎瞬时做出了响应，可以继续与其交互，并立即获得他们操作结果的反馈。\n\
    \n虽然对于单个用户与合约交互来说，这个解决方案已经足够，但是在涉及多个用户时，它就显得不足了。你可以通过从两个不同的浏览器窗口打开网站来尝试：在一个窗口中所做的任何更改都不会影响另一个窗口，除非通过刷新页面重新查询合约。为了解决这个问题，我们将依赖于我们在合约接口中介绍的最后一种概念：事件。\n\
    \n### 通过事件监控更新\n\n合约的公共接口不仅仅包含公共函数。合约在特定交易发生时还可以发出自定义的*事件*。我们的 `Counter` 合约在每次调用\
    \ `increase` 函数时都会发出一个名为 `Increased` 的事件，并将计数器的新值作为参数包含在内。\n\n为了监控此事件的所有实例，我们将在组件挂载时订阅它，并相应地更新组件状态（代码清单\
    \ 2-17）。\n\n```\nasync componentDidMount() {\nconst counter = this.props.contract;\n\
    const initialValue = await counter.methods.value().call();\nthis.setState({ value:\
    \ initialValue });\ncounter.events.Increased()\n.on('data', (event) => {\nconst\
    \ value = event.returnValues.newValue;\nthis.setState({ value });\n});\n}\n代码清单\
    \ 2-17\n订阅 Increased 事件，每当发出事件的新实例时，该订阅会更新组件的状态\n```\n\n注意，这里我们引用的是 `counter.events`\
    \ 属性，而不是像之前那样引用 `counter.methods`。在这里，事件发射器在每次发现新事件时都会触发一个 `data` 事件，并包含事件的参数。\n\
    \n此外，通过在每次事件时更新组件状态，我们不再需要在交易确认时查询合约状态。`increaseCounter` 函数上的收据事件处理器可以简化为如下所示。\n\
    \n```\n.on('receipt', async () => {\nthis.setState({ increasing: false });\n})\n\
    ```\n\n通过这种新设置，无论状态变更源自何处，您现在都可以接收合约的实时更新。再次尝试打开两个浏览器窗口，并从其中一个窗口增加计数器，看看交易确认后，两个窗口是如何同时反映这一变化的。如果你运气好，甚至可能遇到本书的另一个读者在同一个合约实例上发出的更改。\n\
    \n### 部署应用程序\n\n你可能已经注意到，我们的示例应用程序完全在客户端运行。所有逻辑都在浏览器中进行，而区块链则作为后端来执行简单的计算并在所有用户之间持久化共享状态，充当计数器状态的共识层。这使得部署变得简单，因为\
    \ DApp 只需作为静态站点托管即可。\n"
- fmt: '# Summary


    In this chapter, we have gone through the process of developing a simple DApp,
    providing our users with a basic web-based interface for a single smart contract.
    We have explored how to read state from a contract and send transactions to it
    and how to monitor events for real-time updates.


    We have built our entire application relying on just two libraries: `web3js` for
    interacting with the Ethereum network and `React` as a presentation framework.
    Given the pace at which libraries and frameworks change in both the JavaScript
    and the Ethereum ecosystems, the goal has been (and will be throughout this book)
    to use as few dependencies as possible and focus on the concepts behind building
    a DApp instead of on the specific APIs of the tools of the moment. Of course,
    this does not mean that you should not rely on such tools when building your own
    DApp, since they may be of great help. Make sure to check out `OpenZeppelin`,
    `Truffle`, `Buidler`, `Etherlime`, `Embark`, `Clevis`, and whatever is available
    by the time this book reaches your hands.


    All in all, this chapter should have helped as an overview to the entire development
    process and components of a DApp. We have glossed over the deployments of the
    contracts themselves, as well as account and ETH management in general. We have
    not covered many edge cases or error situations that arise when dealing with a
    blockchain-based back end. Nevertheless, throughout the book, we will go in-depth
    in all these topics, plus new and more advanced ones, and revisit each step the
    building of a DApp on more interesting examples.


    # 3. A Crash Course on Smart Contracts


    Smart contracts are the key component in Ethereum. They hold the logic to be executed
    on the network, keep track of their own state, and can interact with other smart
    contracts as well. However, they have some limitations, such as restricted computation
    per transaction and expensive storage costs. They also cannot initiate new transactions
    – they depend on external accounts to trigger them. And since they run on the
    Ethereum network, they cannot directly interact with anything outside it. In this
    chapter, we will


    - Define Ethereum smart contracts, as opposed to externally owned accounts

    - Identify the components of a transaction, such as data, gas limit, and price

    - Learn how to write a contract in Solidity

    - Go through Solidity modifiers, data types, and events

    - Review how inheritance works in Solidity

    - Present the ERC20 and ERC721 widely used token standards


    ## What is a Smart Contract?


    The concept of smart contract was coined by Nick Szabo in the 1990s, referring
    to self-executing code in a public network that could capture the concept of a
    real-life contract and enforce it via code.


    > The basic idea behind smart contracts is that many kinds of contractual clauses
    (such as collateral, bonding, delineation of property rights, etc.) can be embedded
    in the hardware and software we deal with, in such a way as to make breach of
    contract expensive (if desired, sometimes prohibitively so) for the breacher.

    >

    > —Nick Szabo


    In the Ethereum network, a smart contract is represented as code, deployed at
    an address, with its own state. The code is executed on every transaction sent
    to it and can perform arbitrary computation, read and write to its own storage,
    and potentially call other contracts in the network. A smart contract can also
    hold and transfer ETH, just like any other Ethereum address.


    ### Note


    Since smart contracts are powered by code that can execute any computation, they
    are not actually limited to financial contractual clauses. For instance, they
    can be used to express different kinds of agreement or consensus, or even governance
    mechanisms.


    A good analogy for a smart contract in software is an *actor*. In the actor model,
    a system is composed of stand-alone units called actors that receive messages
    and execute code in response to it, modifying their own internal state and potentially
    interacting with other actors in the system. Smart contracts can also be thought
    of as *reducer functions* in functional terms: given a transaction and the contract''s
    state, the smart contract returns an updated state.


    ### External Accounts vs. Smart Contracts


    When a smart contract is deployed on the Ethereum network, it is created at a
    new *address*. This address acts as an identifier for a smart contract: whenever
    a user (or another contract) wants to interact with it, they send a *transaction*
    to that particular address.


    *Externally owned accounts* (often abbreviated EOAs), on the other hand, are accounts
    owned by real-life users – or by any agent outside the network. They are also
    represented by addresses, which use the exact same format as the ones that identify
    smart contracts. As such, references to a user or a smart contract are equal in
    Ethereum: they are just addresses. This allows sending ETH to a recipient, without
    needing to differentiate whether it is an address backed by a smart contract or
    managed by an end user.


    However, there are a few differences between smart contract and externally owned
    accounts that are worth mentioning:


    - First and foremost, a smart contract account has *code* that is executed on
    every transaction. Sending a transaction to an externally owned account does not
    trigger any execution on the network.

    - Smart contract accounts cannot initiate transactions. A smart contract can only
    react to an incoming message, and potentially call into other contracts in the
    process, but they cannot start a new transaction by themselves. A contract that
    needs to execute on a timely basis (similar to a cron job) or upon an event (such
    as balance being moved between certain addresses) needs an EOA to call into it
    to trigger the operation.

    - Only externally owned accounts have a corresponding *private key*. Private keys
    are used for signing new transactions sent to the network as a means of authentication.
    Smart contracts cannot initiate new transactions, so there is no need for them
    to sign any operation.


    ### Note


    An implication of this last difference is that only externally owned accounts
    can *sign* arbitrary messages. A private key can be used not only to sign Ethereum
    transactions but also plain text messages with any information. For example, a
    user may sign a message attesting his identity (such as "I am spalladino on Github"),
    and anyone (even a contract) can recover the Ethereum address that corresponds
    to that signature. This allows them to verify that the owner of that account is
    who wrote that message. The fact that a smart contract does not have a private
    key means that it is not possible for it to sign a message.


    ### Code and State


    A smart contract has two main properties: its code and its state. A contract''s
    state is composed of its ETH balance (since all Ethereum addresses have an associated
    balance) and its storage (where the value of its variables is persisted).


    Code in a smart contract is typically short, since its execution "time" has a
    tight upper bound, defined by the Ethereum network. The code is run every time
    a transaction is received by the contract, and has access to the contract''s local
    storage, and the transaction''s context.'
