    # 总结


    在本章中，我们走过了开发一个简单 DApp 的完整流程，为我们的用户提供了一个基于 Web 的基础界面，用于与单个智能合约交互。我们探讨了如何从合约中读取状态、如何向它发送交易，以及如何监听事件以实现实时更新。


    我们仅依靠两个库构建了整个应用：用于与以太坊网络交互的 `web3js` 和作为展示框架的 `React`。鉴于 JavaScript 和以太坊生态系统中库和框架的变化速度，本书的目标一直是（并且将始终是）尽可能减少依赖，专注于构建
    DApp 背后的核心概念，而不是聚焦于当下特定工具的具体 API。当然，这并不意味着你在构建自己的 DApp 时不应该依赖这类工具，因为它们可能会带来极大的帮助。请务必了解一下
    `OpenZeppelin`、`Truffle`、`Buidler`、`Etherlime`、`Embark`、`Clevis` 以及任何在你阅读本书时可能出现的工具。


    总而言之，本章应能帮助你从整体上概览 DApp 的整个开发流程及其各个组成部分。我们略微跳过了合约本身的部署，以及账户和 ETH 管理的一般性问题。我们也没有涵盖在处理基于区块链的后端时可能出现的许多边界情况或错误场景。尽管如此，在整本书中，我们将深入探讨所有这些主题，以及更新、更高级的内容，并通过更有趣的示例重新审视构建
    DApp 的每一步。


    # 3. 智能合约速成课


    智能合约是以太坊的核心组成部分。它们持有要在网络上执行的逻辑，跟踪自身的状态，并且还可以与其他智能合约交互。然而，它们也有一些局限性，例如每笔交易的计算能力受限，以及昂贵的存储成本。它们也无法发起新的交易——它们依赖外部账户来触发执行。并且，由于它们在以太坊网络上运行，它们无法直接与网络外部的任何事物交互。在本章中，我们将：


    -   定义以太坊智能合约，并将其与外部拥有账户进行对比

    -   识别交易的组成部分，例如数据、燃料限制和燃料价格

    -   学习如何使用 Solidity 编写合约

    -   了解 Solidity 的修饰器、数据类型和事件

    -   回顾 Solidity 中的继承机制

    -   介绍广泛使用的 ERC20 和 ERC721 代币标准


    ## 什么是智能合约？


    “智能合约”这个概念的提出者可以追溯到 20 世纪 90 年代的尼克·萨博（Nick Szabo），它指的是在公共网络上能够捕捉现实世界合约概念并通过代码强制执行的自执行代码。


    > 智能合约背后的基本思想是，许多种类的合同条款（例如抵押、担保、产权界定等）可以嵌入到我们使用的硬件和软件中，使得违约对违约方代价高昂（如果需要，有时甚至高到令人望而却步）。

    >

    > ——尼克·萨博


    在以太坊网络中，智能合约以代码的形式呈现，部署在一个地址上，并拥有自己的状态。代码会在每次向其发送交易时执行，可以执行任意计算、读写自身的存储空间，并可能调用网络中的其他合约。智能合约也可以像任何其他以太坊地址一样持有和转移
    ETH。


    ### 注意


    由于智能合约由可以执行任意计算的代码驱动，它们实际上并不局限于金融合约条款。例如，它们可以用来表达不同类型的协议或共识，甚至是治理机制。


    在软件领域，一个很好的智能合约类比是**参与者**模型。在参与者模型中，系统由称为参与者的独立单元组成，这些参与者接收消息并执行代码作为响应，修改自己的内部状态，并可能与系统中的其他参与者交互。从功能上讲，智能合约也可以被视为**归约函数**：给定一笔交易和合约的当前状态，智能合约返回一个更新后的状态。


    ### 外部账户 vs. 智能合约


    当一个智能合约部署到以太坊网络时，它会在一个新的**地址**上被创建。这个地址作为智能合约的标识符：每当用户（或其他合约）想要与之交互时，他们会向该特定地址发送一笔**交易**。


    另一方面，**外部拥有账户**（通常缩写为 EOA）是由现实世界用户——或网络外部的任何代理——拥有的账户。它们也由地址表示，使用的格式与标识智能合约的地址完全相同。因此，在以太坊中，对用户或智能合约的引用是平等的：它们都只是地址。这使得可以向接收方发送
    ETH，而无需区分该地址是由智能合约支持还是由最终用户管理。


    然而，智能合约账户和外部拥有账户之间存在一些值得注意的区别：


    -   首先也是最重要的，智能合约账户拥有**代码**，该代码会在每笔交易上执行。向外部拥有账户发送交易不会触发网络上的任何执行。

    -   智能合约账户无法发起交易。智能合约只能响应传入的消息，并可能在此过程中调用其他合约，但它们自己无法启动新交易。一个需要按时执行（类似于定时任务）或根据事件（例如余额在特定地址之间转移）执行的合约，需要有一个外部拥有账户（EOA）来调用它以触发操作。

    -   只有外部拥有账户拥有对应的**私钥**。私钥用于签署发送到网络的新交易，作为身份验证的一种手段。智能合约无法发起新交易，因此它们不需要签署任何操作。


    ### 注意


    最后一个区别的一个影响是，只有外部拥有账户可以**签署**任意消息。私钥不仅可用于签署以太坊交易，还可用于签署包含任何信息的纯文本消息。例如，用户可以签署一条消息来证明其身份（例如“我是
    Github 上的 spalladino”），任何人（甚至是合约）都可以恢复出与该签名对应的以太坊地址。这使他们能够验证该账户的所有者就是撰写该消息的人。智能合约没有私钥这一事实意味着它不可能签署消息。


    ### 代码和状态


    智能合约有两个主要属性：其代码和其状态。合约的状态由其 ETH 余额（因为所有以太坊地址都有关联余额）及其存储空间（其中持久化保存其变量的值）组成。


    智能合约中的代码通常很短，因为其执行“时间”有一个由以太坊网络定义的严格上限。合约每次收到交易时都会执行代码，并且代码可以访问合约的本地存储空间以及交易的上下文。

