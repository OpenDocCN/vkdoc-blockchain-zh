  trans: '

    #### 构建一个支付应用


    现在，我们将使用我们的合约来构建一个简单的应用。在该应用中，发送方可以和一个接收方建立支付通道合约，通过直接的链下连接发送多笔微支付，并最终进行结算。和之前的章节一样，我们将使用
    `create-react-app` 作为模板。


    为了保持应用的简单性，我们将在同一台电脑的同一应用上打开两个浏览器窗口，其中一个充当发送方，另一个充当接收方，并在它们之间建立连接。我们将使用广播频道¹²⁷在两个浏览器窗口之间传递消息。在一个真实的应用中，你可能会想使用不同的方法，例如
    WebRTC 数据通道¹²⁸，并配合一个服务器来管理用户之间的发现。


    我们将做出另一个简化：我们将直接在 web 应用中管理账户，而不是使用 Metamask。这样做是为了避免在同一台电脑上模拟两个不同账户与同一个应用交互时遇到的困难。当需要从发送方和接收方账户发送交易或签署消息时，我们将直接调用
    Ganache。


    我们的应用将由两个主要视图构成：一个用于发送方，一个用于接收方，两者都由一个根级 `App` 组件设置。App 组件负责设置 web3 对象，并将发送方和接收方的地址注入到子组件中。具体实现请参考代码示例中的
    `src/App.js`。


    我们从发送方视图开始。发送方负责通过部署智能合约并存入初始保证金来开启通道（清单 8-4）。当这一步完成后，我们将通过广播频道通知接收方。我们将使用一个自定义协议进行通信，在该协议中，我们通过
    `action` 参数来标识不同的消息类型，此处其值为 `CHANNEL_DEPLOYED`。


    ```

    // src/components/Sender.js

    async deployChannel(deposit) {

    const { web3, sender, recipient } = this.props;

    // 部署合约并存入初始保证金

    const from = sender;

    const endTime = +(new Date()) +(300 * 1000); // 从现在起 5 分钟

    const channel = await PaymentChannel(web3)

    .deploy({ arguments: [recipient, endTime] })

    .send({ value: deposit.toString(), from, gas: 1e6 });

    // 通过广播频道通知接收方

    const address = channel.options.address;

    this.broadcastChannel.postMessage({

    action: "CHANNEL_DEPLOYED", address

    });

    // 用保证金和通道对象更新发送方状态

    this.setState({ channel, deposit, sent: BN(0) });

    }

    清单 8-4

    发送方组件功能：部署支付通道合约、为其提供资金，并通知接收方其已部署。App 组件将 web3 实例以及发送方和接收方地址作为 props 传递。这里，PaymentChannel
    是一个返回新的 web3 合约实例的函数，BN 是一个 BigNumber 构造函数

    ```


    我们将把这个函数连接到一个简单的表单（图 8-2），在表单中我们要求用户选择他们想要存入通道的 ETH 数量。


    ![../images/476252_1_En_8_Chapter/476252_1_En_8_Fig2_HTML.jpg](img/476252_1_En_8_Fig2_HTML.jpg)


    图 8-2


    简单的支付通道部署表单。该表单的代码可以在 `src/components/CreateChannel.js` 中找到


    一旦通道部署完成，我们的用户应该能够向接收方发送微支付（清单 8-5）。这涉及到对包含关闭通道后应支付给接收方的 ETH 总额的消息进行签名（而非发送交易）。这些消息通过同一个广播频道，使用不同的
    `action` 标识符发送给接收方。


    ```

    // src/components/Sender.js

    async sendEth(value) {

    const { web3, sender } = this.props;

    const { sent, channel } = this.state;

    // 计算新的累计已发送 ETH

    const newSent = sent.plus(value);

    // 用发送方的密钥对其进行签名

    const signature = await signPayment(

    web3, newSent, channel.options.address, sender

    );

    // 将消息发送给接收方

    this.broadcastChannel.postMessage({

    action: "PAYMENT", sent: newSent.toString(), signature

    });

    // 用新的累计已发送 ETH 总额更新状态

    this.setState({ sent: newSent });

    }

    清单 8-5

    发送方功能：向接收方发送一笔微支付。每条消息都携带了待支付的 ETH 总额。组件需要跟踪到目前为止已发送的总金额，因此在签名和发送之前，用户选择的微支付金额会被累加到该值上

    ```


    签名的计算基于待支付总额和通道地址的哈希值（清单 8-6）。在签名中包含通道地址可以防止重放攻击，即防止同一位用户打开的另一个通道中重复使用相同的消息。


    ```

    // src/contracts/PaymentChannel.js

    async function signPayment(web3, value, address, sender) {

    const hash = web3.utils.soliditySha3(

    { type: ''uint256'', value: value.toString() },

    { type: ''address'', value: address }

    );

    const signature = await web3.eth.sign(hash, sender);

    return signature;

    }

    清单 8-6

    使用 web3 对每条微支付消息进行签名¹³⁰

    ```


    与通道部署类似，该操作也通过一个简单的表单呈现给用户，用户可以在其中选择要转账的金额（图 8-3）。我们还可以展示通道的一些基本统计信息，例如它的地址、总保证金以及到目前为止已承诺的
    ETH 数量。


    ![../images/476252_1_En_8_Chapter/476252_1_En_8_Fig3_HTML.jpg](img/476252_1_En_8_Fig3_HTML.jpg)


    图 8-3


    向用户展示通道信息并请求通过通道发送的金额。这些组件的代码可以在 `src/components/ChannelStats.js` 和 `src/components/SendEther.js`
    中找到

    '
- fmt: '### Note


    For the sake of brevity, we will skip the implementation of the `forceClose` call
    by the sender in this example.


    We can now turn our focus to the recipient view. Within our app, the recipient
    needs to do nothing but monitor the sender’s actions until they decide to cash
    out. We will first install a listener for the sender’s messages to react upon
    them (Listing [8-7](#476252_1_En_8_Chapter.xhtml#PC8)), calling different functions
    depending on the message action (Listing [8-8](#476252_1_En_8_Chapter.xhtml#PC9)).


    ```

    // src/components/Recipient.js

    handleMessage(data) {

    const action = data.action;

    switch (action) {

    case "CHANNEL_DEPLOYED":

    this.onChannelDeployed(data);

    break;

    case "PAYMENT":

    this.onPaymentReceived(data);

    break;

    default:

    console.error("Unexpected message", data);

    }

    }

    Listing 8-8

    Delegating to different handler functions, discriminating on the message action

    ```


    ```

    // src/components/Recipient.js

    const bc = new BroadcastChannel(''payments'');

    bc.onmessage = (evt) => this.handleMessage(evt.data);

    this.broadcastChannel = bc;

    Listing 8-7

    Initializing a new broadcast channel for receiving messages from the sender and
    adding an event handler. This code is part of the Recipient component constructor

    ```


    Let’s see first how the recipient should react to a new channel deployed (Listing
    [8-9](#476252_1_En_8_Chapter.xhtml#PC10)). Besides updating its own state by adding
    a reference to the channel, the recipient should inspect the channel’s deposit
    to know up to how much the sender is able to pay. The recipient should also check
    that the contract deployed is indeed a payment channel. We can do that by checking
    that the bytecode deployed matches the code of the channel (Listing [8-10](#476252_1_En_8_Chapter.xhtml#PC11)).


    ```

    // src/components/Recipient.js

    async function checkBytecode(web3, address) {

    const actual = await web3.eth.getCode(address);

    const { compilerOutput } = Artifact;

    const expected = compilerOutput.evm.deployedBytecode.object;

    return actual === expected;

    }

    Listing 8-10

    Checking the bytecode deployed at an address against the one in the contract compiled
    Artifact. Note that we check against the deployedBytecode of the contract, not
    the bytecode, since the latter includes the constructor code that is not saved
    in the blockchain

    ```


    ```

    // src/components/Recipient.js

    async onChannelDeployed(data) {

    const { web3 } = this.props;

    if (!await checkBytecode(web3, data.address)) {

    console.error("Contract bytecode does not match");

    return;

    }

    const deposit = await web3.eth.getBalance(data.address);

    this.setState({

    channel: PaymentChannel(web3, data.address),

    deposit: BN(deposit),

    received: BN(0)

    });

    }

    Listing 8-9

    Recipient reacts to a new channel deployed by validating it, retrieving its deposit,
    and updating its own state. Here, PaymentChannel is a function that returns a
    web3 contract instance at the specified address

    ```


    The other message the recipient has to process is a payment message. Here, we
    need to validate the sender’s signature and update the recipient state with the
    latest value transferred (Listing [8-11](#476252_1_En_8_Chapter.xhtml#PC12)).
    We also need to save the associated signature, as we will need it to close the
    channel.


    ```

    // src/components/Recipient.js

    onPaymentReceived(data) {

    const sent = BN(data.sent);

    const received = this.state.received;

    if (this.verifyMessage(data) && sent.gt(received)) {

    this.setState({

    received: sent,

    signature: data.signature

    });

    }

    }

    verifyMessage(data) {

    const { web3, sender } = this.props;

    const { channel } = this.state;

    const signer = recoverPayment(

    web3, data.sent, channel.options.address, data.signature

    );

    return areAddressesEqual(signer, sender);

    }

    Listing 8-11

    Recipient reacts to a payment message, updating the total ETH received and the
    corresponding signature. Validating each message implies recovering the signing
    address and checking it against the sender, since an invalid signature would yield
    a different signer address. We also discard any messages with a total payment
    less than the latest total

    ```


    Recovering the sender’s signature can then be implemented using the `recover`
    method from the web3 library (Listing [8-12](#476252_1_En_8_Chapter.xhtml#PC13)).


    ```

    // src/contracts/PaymentChannel.js

    function recoverPayment(web3, value, address, signature) {

    const hash = web3.utils.soliditySha3(

    { type: ''uint256'', value: value.toString() },

    { type: ''address'', value: address }

    );

    return web3.eth.accounts.recover(hash, signature);

    }

    Listing 8-12

    Helper function to recover the signer of a payment message. Note that the hash
    over which the signature is recovered is calculated exactly like in the signPayment
    method

    ```


    The recipient is shown the current state of the channel, the total ETH received,
    as well as the option to close the channel at any time (Figure [8-4](#476252_1_En_8_Chapter.xhtml#Fig4)).


    ![../images/476252_1_En_8_Chapter/476252_1_En_8_Fig4_HTML.jpg](images/476252_1_En_8_Chapter/476252_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Recipient interface with information on current balance and channel stats, including
    how much ETH has been sent via the channel


    The last step to implement on the recipient is closing the channel by sending
    a transaction to the channel contract with the latest value and signature (Listing
    [8-13](#476252_1_En_8_Chapter.xhtml#PC14)). This settles all micropayments by
    sending the accumulated value to the recipient and the remainder of the deposit
    back to the sender.


    ```

    // src/components/Recipient.js

    async closeChannel() {

    const { web3, recipient } = this.props;

    const { channel, signature, received } = this.state;

    // Send closing transaction

    await channel.methods.close(

    received.toString(), signature

    ).send({ from: recipient });

    // Update the recipient''s balance

    const balance = BN(await web3.eth.getBalance(recipient));

    this.setState({ channel: null, balance });

    }

    Listing 8-13

    Closing the channel by the recipient using the latest value and signature sent
    by the sender

    ```


    After this method is called, the channel contract should be destroyed, and the
    recipient should have received the sum of all micropayments made by the sender.


    Now that we have a working application built on top of unidirectional payment
    channels, it’s time to move into more interesting flavors of channels.


    ## Bidirectional Payment Channels


    Another scenario for payment channels is that of two equal parties exchanging
    funds between each other. Instead of having a distinguished sender and a recipient,
    both participants in the channel can send and receive funds.


    This symmetry in the participants’ roles makes the channel implementation more
    difficult. Which of the two participants should be allowed to close the channel
    in this model? Since they are equals, they both should be allowed to do so, but
    this introduces a problem.


    Let’s say Alice and Bob are exchanging microtransactions. At some point, Bob sends
    a very large payment through the channel to Alice, but before she can cash out,
    he submits an old message to the channel and closes it. The problem then is that
    a malicious participant can attempt to close the channel *at an older state* when
    it is convenient for them (Figure [8-5](#476252_1_En_8_Chapter.xhtml#Fig5)).


    ![../images/476252_1_En_8_Chapter/476252_1_En_8_Fig5_HTML.jpg](images/476252_1_En_8_Chapter/476252_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    Bidirectional payment channel scenario in which Bob attempts to close the channel
    with an older state, in detriment of Alice'
  raw: '### Note


    For the sake of brevity, we will skip the implementation of the `forceClose` call
    by the sender in this example.


    We can now turn our focus to the recipient view. Within our app, the recipient
    needs to do nothing but monitor the sender’s actions until they decide to cash
    out. We will first install a listener for the sender’s messages to react upon
    them (Listing [8-7](#476252_1_En_8_Chapter.xhtml#PC8)), calling different functions
    depending on the message action (Listing [8-8](#476252_1_En_8_Chapter.xhtml#PC9)).


    ```

    // src/components/Recipient.js

    handleMessage(data) {

    const action = data.action;

    switch (action) {

    case "CHANNEL_DEPLOYED":

    this.onChannelDeployed(data);

    break;

    case "PAYMENT":

    this.onPaymentReceived(data);

    break;

    default:

    console.error("Unexpected message", data);

    }

    }

    Listing 8-8

    Delegating to different handler functions, discriminating on the message action

    ```


    ```

    // src/components/Recipient.js

    const bc = new BroadcastChannel(''payments'');

    bc.onmessage = (evt) => this.handleMessage(evt.data);

    this.broadcastChannel = bc;

    Listing 8-7

    Initializing a new broadcast channel for receiving messages from the sender and
    adding an event handler. This code is part of the Recipient component constructor

    ```


    Let’s see first how the recipient should react to a new channel deployed (Listing
    [8-9](#476252_1_En_8_Chapter.xhtml#PC10)). Besides updating its own state by adding
    a reference to the channel, the recipient should inspect the channel’s deposit
    to know up to how much the sender is able to pay. The recipient should also check
    that the contract deployed is indeed a payment channel. We can do that by checking
    that the bytecode deployed matches the code of the channel (Listing [8-10](#476252_1_En_8_Chapter.xhtml#PC11)).


    ```

    // src/components/Recipient.js

    async function checkBytecode(web3, address) {

    const actual = await web3.eth.getCode(address);

    const { compilerOutput } = Artifact;

    const expected = compilerOutput.evm.deployedBytecode.object;

    return actual === expected;

    }

    Listing 8-10

    Checking the bytecode deployed at an address against the one in the contract compiled
    Artifact. Note that we check against the deployedBytecode of the contract, not
    the bytecode, since the latter includes the constructor code that is not saved
    in the blockchain

    ```


    ```

    // src/components/Recipient.js

    async onChannelDeployed(data) {

    const { web3 } = this.props;

    if (!await checkBytecode(web3, data.address)) {

    console.error("Contract bytecode does not match");

    return;

    }

    const deposit = await web3.eth.getBalance(data.address);

    this.setState({

    channel: PaymentChannel(web3, data.address),

    deposit: BN(deposit),

    received: BN(0)

    });

    }

    Listing 8-9

    Recipient reacts to a new channel deployed by validating it, retrieving its deposit,
    and updating its own state. Here, PaymentChannel is a function that returns a
    web3 contract instance at the specified address

    ```


    The other message the recipient has to process is a payment message. Here, we
    need to validate the sender’s signature and update the recipient state with the
    latest value transferred (Listing [8-11](#476252_1_En_8_Chapter.xhtml#PC12)).
    We also need to save the associated signature, as we will need it to close the
    channel.


    ```

    // src/components/Recipient.js

    onPaymentReceived(data) {

    const sent = BN(data.sent);

    const received = this.state.received;

    if (this.verifyMessage(data) && sent.gt(received)) {

    this.setState({

    received: sent,

    signature: data.signature

    });

    }

    }

    verifyMessage(data) {

    const { web3, sender } = this.props;

    const { channel } = this.state;

    const signer = recoverPayment(

    web3, data.sent, channel.options.address, data.signature

    );

    return areAddressesEqual(signer, sender);

    }

    Listing 8-11

    Recipient reacts to a payment message, updating the total ETH received and the
    corresponding signature. Validating each message implies recovering the signing
    address and checking it against the sender, since an invalid signature would yield
    a different signer address. We also discard any messages with a total payment
    less than the latest total

    ```


    Recovering the sender’s signature can then be implemented using the `recover`
    method from the web3 library (Listing [8-12](#476252_1_En_8_Chapter.xhtml#PC13)).


    ```

    // src/contracts/PaymentChannel.js

    function recoverPayment(web3, value, address, signature) {

    const hash = web3.utils.soliditySha3(

    { type: ''uint256'', value: value.toString() },

    { type: ''address'', value: address }

    );

    return web3.eth.accounts.recover(hash, signature);

    }

    Listing 8-12

    Helper function to recover the signer of a payment message. Note that the hash
    over which the signature is recovered is calculated exactly like in the signPayment
    method

    ```


    The recipient is shown the current state of the channel, the total ETH received,
    as well as the option to close the channel at any time (Figure [8-4](#476252_1_En_8_Chapter.xhtml#Fig4)).


    ![../images/476252_1_En_8_Chapter/476252_1_En_8_Fig4_HTML.jpg](images/476252_1_En_8_Chapter/476252_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Recipient interface with information on current balance and channel stats, including
    how much ETH has been sent via the channel


    The last step to implement on the recipient is closing the channel by sending
    a transaction to the channel contract with the latest value and signature (Listing
    [8-13](#476252_1_En_8_Chapter.xhtml#PC14)). This settles all micropayments by
    sending the accumulated value to the recipient and the remainder of the deposit
    back to the sender.


    ```

    // src/components/Recipient.js

    async closeChannel() {

    const { web3, recipient } = this.props;

    const { channel, signature, received } = this.state;

    // Send closing transaction

    await channel.methods.close(

    received.toString(), signature

    ).send({ from: recipient });

    // Update the recipient''s balance

    const balance = BN(await web3.eth.getBalance(recipient));

    this.setState({ channel: null, balance });

    }

    Listing 8-13

    Closing the channel by the recipient using the latest value and signature sent
    by the sender

    ```


    After this method is called, the channel contract should be destroyed, and the
    recipient should have received the sum of all micropayments made by the sender.


    Now that we have a working application built on top of unidirectional payment
    channels, it’s time to move into more interesting flavors of channels.


    ### Bidirectional Payment Channels


    Another scenario for payment channels is that of two equal parties exchanging
    funds between each other. Instead of having a distinguished sender and a recipient,
    both participants in the channel can send and receive funds.


    This symmetry in the participants’ roles makes the channel implementation more
    difficult. Which of the two participants should be allowed to close the channel
    in this model? Since they are equals, they both should be allowed to do so, but
    this introduces a problem.


    Let’s say Alice and Bob are exchanging microtransactions. At some point, Bob sends
    a very large payment through the channel to Alice, but before she can cash out,
    he submits an old message to the channel and closes it. The problem then is that
    a malicious participant can attempt to close the channel *at an older state* when
    it is convenient for them (Figure [8-5](#476252_1_En_8_Chapter.xhtml#Fig5)).


    ![../images/476252_1_En_8_Chapter/476252_1_En_8_Fig5_HTML.jpg](images/476252_1_En_8_Chapter/476252_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    Bidirectional payment channel scenario in which Bob attempts to close the channel
    with an older state, in detriment of Alice'
  trans: '

    ### 注意事项


    为简洁起见，本示例将跳过发送方调用 `forceClose` 的具体实现。


    现在，我们可以将注意力转向接收方视图。在我们的应用中，接收方无需执行任何操作，只需监控发送方的行为，直到他们决定提取资金。我们将首先为发送方的消息安装一个监听器，以便对消息做出反应（代码清单
    8-7），并根据消息行为调用不同的函数（代码清单 8-8）。


    ```

    // src/components/Recipient.js

    handleMessage(data) {

    const action = data.action;

    switch (action) {

    case "CHANNEL_DEPLOYED":

    this.onChannelDeployed(data);

    break;

    case "PAYMENT":

    this.onPaymentReceived(data);

    break;

    default:

    console.error("Unexpected message", data);

    }

    }

    代码清单 8-8

    根据消息行为，将任务委派给不同的处理函数

    ```


    ```

    // src/components/Recipient.js

    const bc = new BroadcastChannel(''payments'');

    bc.onmessage = (evt) => this.handleMessage(evt.data);

    this.broadcastChannel = bc;

    代码清单 8-7

    初始化一个新的广播通道，用于接收来自发送方的消息，并添加事件处理程序。此代码是接收方组件构造函数的一部分

    ```


    我们先来看看接收方应如何响应新部署的通道（代码清单 8-9）。除了通过添加通道引用来更新自身状态外，接收方还应检查通道的存款金额，以了解发送方最多能支付多少。接收方还应验证部署的合约确实是支付通道。我们可以通过检查部署的字节码是否与通道的字节码匹配来完成验证（代码清单
    8-10）。


    ```

    // src/components/Recipient.js

    async function checkBytecode(web3, address) {

    const actual = await web3.eth.getCode(address);

    const { compilerOutput } = Artifact;

    const expected = compilerOutput.evm.deployedBytecode.object;

    return actual === expected;

    }

    代码清单 8-10

    检查部署在指定地址上的字节码是否与合约编译产物中的字节码一致。请注意，我们检查的是合约的 deployedBytecode，而不是 bytecode，因为后者包含未保存在区块链中的构造函数代码

    ```


    ```

    // src/components/Recipient.js

    async onChannelDeployed(data) {

    const { web3 } = this.props;

    if (!await checkBytecode(web3, data.address)) {

    console.error("Contract bytecode does not match");

    return;

    }

    const deposit = await web3.eth.getBalance(data.address);

    this.setState({

    channel: PaymentChannel(web3, data.address),

    deposit: BN(deposit),

    received: BN(0)

    });

    }

    代码清单 8-9

    接收方对新部署的通道做出响应：验证通道、检索其存款金额，并更新自身状态。此处，PaymentChannel 是一个函数，用于返回指定地址处的 web3 合约实例

    ```


    接收方需要处理的另一条消息是支付消息。在这里，我们需要验证发送方的签名，并用最新的转账金额更新接收方状态（代码清单 8-11）。我们还需要保存关联的签名，因为关闭通道时会用到它。


    ```

    // src/components/Recipient.js

    onPaymentReceived(data) {

    const sent = BN(data.sent);

    const received = this.state.received;

    if (this.verifyMessage(data) && sent.gt(received)) {

    this.setState({

    received: sent,

    signature: data.signature

    });

    }

    }

    verifyMessage(data) {

    const { web3, sender } = this.props;

    const { channel } = this.state;

    const signer = recoverPayment(

    web3, data.sent, channel.options.address, data.signature

    );

    return areAddressesEqual(signer, sender);

    }

    代码清单 8-11

    接收方对支付消息做出响应，更新已收到的 ETH 总额和相应的签名。验证每条消息意味着恢复签名地址并与发送方进行核对，因为无效签名会生成不同的签名者地址。我们还会丢弃任何总支付金额小于最新总额的消息

    ```


    然后，可以使用 web3 库中的 `recover` 方法实现恢复发送方签名（代码清单 8-12）。


    ```

    // src/contracts/PaymentChannel.js

    function recoverPayment(web3, value, address, signature) {

    const hash = web3.utils.soliditySha3(

    { type: ''uint256'', value: value.toString() },

    { type: ''address'', value: address }

    );

    return web3.eth.accounts.recover(hash, signature);

    }

    代码清单 8-12

    辅助函数，用于恢复支付消息的签名者。请注意，恢复签名所依据的哈希值计算方式与 signPayment 方法中的完全相同

    ```


    接收方界面会展示通道的当前状态、已收到的 ETH 总额，以及随时关闭通道的选项（图 8-4）。


    ![../images/476252_1_En_8_Chapter/476252_1_En_8_Fig4_HTML.jpg](img/476252_1_En_8_Fig4_HTML.jpg)


    图 8-4


    接收方界面，显示当前余额和通道统计信息，包括通过通道发送的 ETH 数量


    接收方实现的最后一步是关闭通道：向通道合约发送一笔包含最新金额和签名的交易（代码清单 8-13）。这将结算所有微支付，将累计金额发送给接收方，并将剩余存款退还发送方。


    ```

    // src/components/Recipient.js

    async closeChannel() {

    const { web3, recipient } = this.props;

    const { channel, signature, received } = this.state;

    // 发送关闭交易

    await channel.methods.close(

    received.toString(), signature

    ).send({ from: recipient });

    // 更新接收方余额

    const balance = BN(await web3.eth.getBalance(recipient));

    this.setState({ channel: null, balance });

    }

    代码清单 8-13

    接收方使用发送方发送的最新金额和签名关闭通道

    ```


    调用此方法后，通道合约应被销毁，接收方应已收到发送方支付的所有微支付总和。


    至此，我们已经构建了一个基于单向支付通道的可用应用，现在可以探讨更有趣的通道变体了。


    ## 双向支付通道


    支付通道的另一种场景是两方对等体之间互相交换资金。在这种模式下，没有区分明确的发送方和接收方，通道中的两个参与者都可以发送和接收资金。


    参与者角色的这种对称性使得通道实现更加复杂。在这种模型中，允许哪个参与者关闭通道？由于双方是平等的，因此应该都允许关闭，但这会引入一个问题。


    假设 Alice 和 Bob 正在进行微交易。某一时刻，Bob 通过通道向 Alice 发送了一笔非常大的支付，但在 Alice 提现之前，Bob 向通道提交了一条旧消息并关闭了通道。问题在于，恶意参与者可能会试图*在对自己有利的旧状态*下关闭通道（图
    8-5）。


    ![../images/476252_1_En_8_Chapter/476252_1_En_8_Fig5_HTML.jpg](img/476252_1_En_8_Fig5_HTML.jpg)


    图 8-5


    双向支付通道场景：Bob 试图使用旧状态关闭通道，从而损害 Alice 的利益

    '
- fmt: '#### Challenge Periods


    This situation is solved by adding a *challenge period* to the closure of the
    channel. When Bob requests the channel to be closed, it goes into a "closing"
    state for a fixed period of time. During this period, Alice can either confirm
    the closure of the channel, or she can submit a more recent state and start a
    new closing period (Figure [8-6](#476252_1_En_8_Chapter.xhtml#Fig6)).


    If she fails to send any transaction to the channel during the challenge period,
    then the channel is closed and the payouts executed according to the state submitted
    by Bob. This last case is the equivalent of the recipient not submitting a message
    and having the sender run a forced close. So, adding a challenge period removes
    the need for having a predefined end time for the channel.


    ### Note


    Challenge periods are a very common mechanism in layer 2 solutions, not just channels,
    as we will see later in this chapter. These allow an action to be carried away
    unilaterally without having to collect confirmations from every other party, but
    still let them watch for unlawful behavior and act upon it.


    This mechanism requires the smart contract to recognize when a message is *more
    recent* than another. In other words, it requires adding a notion of *ordering*
    to the messages interchanged by Alice and Bob. In the previous example, this allows
    the channel to be able to verify that Alice''s message is more recent than Bob''s
    and hence discard Bob''s in favor of Alice''s.


    This ordering is handled within the protocol by adding a counter or *nonce* to
    each message, which is increased with each message sent. Both parties should validate
    that the nonce is properly increased on each message: if one receives a signed
    message with a repeated nonce, they should immediately discard it.


    ![../images/476252_1_En_8_Chapter/476252_1_En_8_Fig6_HTML.png](images/476252_1_En_8_Chapter/476252_1_En_8_Fig6_HTML.png)


    Figure 8-6


    Continuation of the previous scenario. Alice sees that Bob attempted to submit
    an older state and submits `S2` in response. After the challenge period ends,
    the contract executes the payouts according to the most recent state submitted,
    `S2`.


    These challenge mechanics have an important drawback: parties in the channel cannot
    be offline for any longer than the length of the challenge period. In our Alice
    and Bob example, if the channel has a challenge period of a few hours, Bob could
    just submit the state that is convenient for him while Alice is offline, so when
    she comes back online, the channel would already be closed. On the other hand,
    extremely long challenge periods can lead to locked deposits for long periods
    of time, if Bob attempts to rightfully close the channel and Alice never accepts
    the closure. Choosing the correct challenge period will depend heavily on the
    use case where the channel is deployed.


    ### Note


    As a complement to channels, there are *watchtower* services that can monitor
    a channel on behalf of the user in case they go offline and their counterpart
    attempts to unlawfully close the channel. These providers may demand a fee in
    exchange for their services proportional to the value locked in the channel.


    #### A Sample Exchange


    To ensure incentives are aligned, Alice signs messages where the balance changes
    in favor of Bob and the other way around. A sample scenario, where both start
    with a deposit of 1 ETH, could be the following:


    *   Alice signs `0.4 ETH` by signing balances `(0.6, 1.4)`^(\([^131](#fn131)\))
    with `nonce 1`.

    *   Bob signs `0.3 ETH` by signing balances `(0.9, 1.1)` with `nonce 2`.

    *   Alice signs `0.1 ETH` by signing balances `(0.8, 1.2)` with `nonce 3`.

    *   Alice signs `0.1 ETH` by signing balances `(0.7, 1.3)` with `nonce 4`.


    Let''s go through some possible scenarios based on this set of messages:


    *   When the exchange ends, Bob rightfully picks the latest message signed by
    Alice and uses it to close the channel. Note that it never makes sense for him
    to pick `nonce 3` over `nonce 4`, since `nonce 4` has a balance more beneficial
    to him, as it corresponds to a payment made by Alice.

    *   Bob never signs another message and never closes the channel. In response,
    Alice uploads the last message that was beneficial to her: the last one signed
    by Bob (`nonce 2`). She has no reason to submit any of the more recent ones where
    she performs additional payments. Alternatively, she could also attempt to close
    the channel as if no messages were exchanged.

    *   Alice maliciously uploads the message with `nonce 2` to try to close the channel.
    Bob should immediately submit a more recent message, preferably the one with `nonce
    4`.

    *   Bob maliciously attempts to close the channel with the message with `nonce
    1`, where the balance was most in his favor. Then, Alice should submit the message
    with `nonce 2` in response, as it is a more beneficial situation to her. This
    takes us to the previous scenario, where Bob should submit `nonce 4`.


    As we can see, by signing a message with increasing nonce with each micropayment,
    participants are then incentivized to always submit the latest message signed
    by their counterparty. This leads to the most recent message being used to close
    the channel.'
