    });

    this.setState({ blockSub });

    // Subscribe to new transfers and load previous ones

    // ...

    }

    Listing 4-25

    Updated section of componentDidMount to set the initial block number in the component’s
    state, and add a subscription to update it as new blocks are received

    ```


    Now we can limit our component to just render the transfer events that happened
    at least a number of blocks ago (Listing [4-26](#476252_1_En_4_Chapter.xhtml#PC45)).
    By checking the block number in which the transaction occurred against current
    block number, we can easily implement this filter.


    ```

    render() {

    const { transfers, blockNumber } = this.state;

    const confirmed = transfers.filter((transfer) => (

    blockNumber - transfer.blockNumber > 12

    ));

    // Render only confirmed transfers

    // ...

    }

    Listing 4-26

