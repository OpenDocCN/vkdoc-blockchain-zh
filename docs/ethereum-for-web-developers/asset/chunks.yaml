  trans: '

    # 应用程序本地账户


    在前面的章节中，我们了解了一些无需以太坊账户即可与智能合约应用交互的技巧，现在我们将探讨另一种替代方案：在应用程序*内部*为用户创建账户。我们无需要求用户下载支持
    Web3 的浏览器或安装扩展程序，而是可以直接在应用中管理创建钱包的完整流程。这样一来，任何访问我们应用的用户都能立即获得一个以太坊地址并开始交互。另一方面，我们也需要为用户提供安全备份新钱包的方法，同时避免成为其资金的托管方。


    ## 创建并使用本地钱包


    创建以太坊账户需要一组随机字节来生成私钥，进而计算出地址。我们可以使用 `web3@1.2.0` 库中的 `accounts` 方法集来实现此操作（代码清单
    7-5），该方法会自动从浏览器的加密 API 中获取所需的熵值。


    ```

    let account = web3.eth.accounts.create();

    ```


    现在，我们可以使用该账户对象中的私钥对交易进行签名，并将其广播到网络上（代码清单 7-6）。


    ```

    let tx = await web3.eth.accounts.signTransaction({

    to: account.address,

    value: 1e17,

    gas: 21000,

    gasPrice: 1e9 },

    account.privateKey);

    await web3.eth.sendSignedTransaction(tx.rawTransaction);

    ```


    为避免手动生成、签名和广播每笔交易，`web3` 库允许将账户注册为钱包（代码清单 7-7），该钱包将自动用于发送任何交易。


    ```

    web3.eth.accounts.wallet.add(account);

    await web3.eth.sendTransaction({

    from: account.address,

    to: account.address,

    value: 1e17,

    gas: 21000

    });

    ```


    ### 注意


    回顾之前的章节，Metamask 通过 `web3` 的子提供程序实现了类似行为。交易并非依赖节点签名，而是被拦截后在客户端完成签名，然后再广播出去。


    ## 加密密钥库


    接下来的问题是生成用户钱包后*如何*存储。最直接的方法是将私钥保留在浏览器的本地存储中，这样当用户再次访问我们的网站时，我们可以轻松地重建账户对象。


    ```

    // 将私钥存储到本地存储

    localStorage.setItem("ethereum_pk", account.privateKey);

    // 从本地存储加载私钥并重新创建账户

    let pk = localStorage.getItem("ethereum_pk");

    let account = web3.eth.accounts.privateKeyToAccount(pk);

    ```


    然而，这种做法极其不安全，因为浏览器的本地存储绝不应用来保存敏感信息，它很容易受到 XSS 攻击——更不用说如果用户清除站点数据或丢失设备，这些密钥也将一并丢失。仅当管理的
    ETH 数量非常少且资金损失可接受时，才建议以这种方式存储明文私钥，换句话说，就是当可用性优先于安全性时。


    一种更安全的方法是在存储之前对私钥进行加密（代码清单 7-8）——无论是存储在浏览器的本地存储、远程服务器、下载到用户电脑，还是跨云存储同步。以太坊的*钱包
    v3 格式*是一种标准化的 JSON，其中包含用密码加密的私钥，且不易被破解。节点在底层使用这种格式来存储你的密钥，浏览器中也可用它来加密用户账户后再存储。


    ```

    $ web3.eth.accounts.encrypt(account.privateKey, ''PASSWORD'');

    > { version: 3,

    id: ''b8c62b04-041c-49d6-966a-205bb5f70528'',

    address: ''af0a9c8d7f74dff1ce64f9c322108c336502bbd4'',

    crypto:

    { ciphertext: ''ba09a90b5...7b0e5e24da79d7f9efda613fd298'',

    cipherparams: { iv: ''2e72184026373b69d21ce157b1d93bba'' },

    cipher: ''aes-128-ctr'',

    kdf: ''scrypt'',

    kdfparams:

    { dklen: 32,

    salt: ''eab3860a...d1d378abbc55a65cae3c83e0a39e'',

    n: 8192,

    r: 8,

    p: 1 },

    mac: ''60177f2af3...bd900315e46e2d'' } }

    ```


    虽然这是一种更安全的选择，但它需要用户输入密码，从而增加了额外的复杂性。尽管密码对网络用户而言是常见的烦恼，但他们也习惯了在忘记密码时能够*重置*密码——而在此情况下，该选项不可用。如果用户忘记了密钥库密码，其中的内容将永久丢失。


    除了这个问题，密钥库本身也不得丢失。如果你仅将加密后的私钥存储在浏览器中，而用户恰好清除了本地数据或丢失了设备，那么所有资金都会随之丢失。你必须确保用户进行适当的备份（要求他们从你的页面下载密钥库并保存到其他地方），或者将密钥库保存在你应用服务器的安全位置（假设你有服务器！）。


    ### 注意


    充当用户资金的托管方与充当存储其加密私钥的备份位置之间存在着巨大差异。前者意味着对服务器的任何黑客攻击都会导致用户资金损失，而后者只是方便用户安全保存其加密密钥。


    然而，从法律角度来看，这种差异可能没那么大。如果你确实在服务器端存储了用户的加密密钥库，请务必了解你所在司法管辖区的法律要求。'
- fmt: '### Mnemonics


    A decentralized alternative for backing up your user keys is to generate a *mnemonic*.
    Mnemonics are sequences of words (usually between 12 and 24) that can be easily
    written down by a human for safekeeping, and you have probably already stumbled
    upon them when creating an account in a wallet. Keep in mind that they are meant
    just as a means of backup if the keystore is lost, as it is not reasonable to
    ask your users for a 24-word sequence every time they want to use your application.


    The main benefit of mnemonics is that they provide a way to store digital information
    (a private key) in a traditional physical medium (a piece of paper). This way,
    even if a user gets all their electronic devices stolen or hacked, they can still
    rely on an old-fashioned method for restoring their accounts.


    Unfortunately, it is not possible to generate a mnemonic from a private key. As
    we have seen in Chapter [5](#476252_1_En_5_Chapter.xhtml), the derivation process
    is one way: the mnemonic is used to calculate an extended key, from which one
    or more private keys are derived in turn. This means that if you want to allow
    your users to back up their accounts via this method, you need to build it from
    scratch.


    To create a mnemonic and derive a seed from it, we will use the `bip39` library.
    To create a hierarchical deterministic wallet from it and derive a private key,
    we will use the `ethereumjs-wallet` library (Listing [7-9](#476252_1_En_7_Chapter.xhtml#PC17)).


    ```

    // 03-mnemonics/index.js

    const hdkey = require("ethereumjs-wallet/hdkey");

    const bip39 = require("bip39");

    let mnemonic = bip39.generateMnemonic();

    > sadness brief beauty strike donor capable recipe brand pretty hill orange inflict

    let hd = hdkey.fromMasterSeed(bip39.mnemonicToSeed(mnemonic));

    let path = "m/44''/60''/0''/0/0";

    let wallet = hdwallet.derivePath(path).getWallet();

    let pk = wallet.getPrivateKeyString();

    > 0xdc68f9ce62dd1f16eed...5f7feba7b3284d9

