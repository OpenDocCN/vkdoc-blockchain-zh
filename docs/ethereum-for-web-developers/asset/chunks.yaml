  trans: '

    # 错误处理


    向网络发送交易时，有许多潜在问题可能发生。你的应用程序应做好处理这些问题的准备，并据此告知用户：


    -   在任何时间点，你都可能丢失与节点的连接。毋庸置疑，这不仅会影响发送交易，还会影响与网络进行的任何操作（读或写）。在这些场景下，你通常会收到一个*无效的
    JSON-RPC 响应*错误，因为你的库无法从不可达的节点获得任何响应。


    -   正在发送的交易可能无效。这可能是由于其某个参数格式不正确，例如地址使用了非十六进制字符串，或是某个值完全无效。对于后者，如果你尝试发送一个 gas
    限额为 1 的交易，你将收到一个*内在 gas 过低*错误。这些错误通常会在你的库尝试构建待发送交易时被捕获。


    -   发送者账户可能没有足够的资金来支付交易的指定金额、gas 限额和 gas 价格。这些错误通常由节点在交易广播之前报告。


    -   在替换交易时，尝试替换一个已被挖出的交易会在交易发送到网络之前就产生*nonce 过低*错误。类似地，大多数客户端会阻止你在不提高 gas 价格的情况下尝试替换交易。


    -   执行合约代码的交易可能因合约触发的`REVERT`或`ABORT`而失败。使用 Solidity 0.4.22 及以上版本编写的合约可以包含回滚原因，这可用于确定错误原因。这仅在交易实际被挖出之后才能检测到，并且发送者的资金已被用于支付执行的
    gas 费用。


    -   在估算交易所需 gas 时，*总是失败的交易*错误意味着估算失败，因为交易本身触发了错误。这可用于在实际发送交易并消耗 gas 之前检测到一个失败交易。


    -   即使你估算了一笔交易所需的 gas，交易被挖出时的条件也可能与估算 gas 时的条件不同。在这些情况下，会引发“gas 耗尽”错误，并且这只能在交易已被挖出后检测到。


    -   交易发送后，如果 gas 价格过低或网络过于拥挤，交易可能无法被挖出。大多数库最终会超时，并通知你在一定数量的区块后未能找到该交易。请注意，如果用户连接的节点不同步，那么交易实际上可能已被挖出，但节点永远不会看到它，从而引发此错误。


    ## 注意


    请记住，实际的错误消息可能取决于你使用的库，以及在某些情况下，你连接的客户端（Geth、Parity 或 Ganache）。


    上述大多数错误都可以在 web3 中使用`error`事件处理程序捕获，类似于交易发送、收据或确认事件。另一方面，输入格式错误会立即引发异常。


    ```

    > let [from, to] = await web3.eth.getAccounts()

    > web3.eth.sendTransaction({ from, to, gas: 1 })

    .on(''error'', err => console.error(err.message))

    Returned error: intrinsic gas too low

    ```


    ## 示例应用


    如同上一章，我们现在将搭建一个示例应用程序，涵盖本章中我们回顾的许多概念。在这个案例中，我们将搭建一个简单界面，允许用户使用修改过的 ERC721 合约来创建（*铸造*）新的数字收藏品。


    ### 设置


    我们的设置将与前面的章节类似，依赖`create-react-app`作为客户端样板，^(⁷⁷)因为我们构建的是一个纯客户端应用。


    ```

    npm init react-app erc721-app

    ```


    #### 依赖项


    除了 ERC20 应用中使用的相同依赖项集合外，我们还将安装 solidity 编译器，以及用于执行 HTTP 请求的`axios`库。


    ```

    $ npm install web3@1.2.0 openzeppelin-solidity@2.1 bignumber.js@8.0 axios@0.18.0

    $ npm install --save-dev @0x/sol-compiler@2.0.2

    ```


    请确保你已按照本章前面所述安装了 `ganache-cli`、`Geth` 或 `Parity`，以便启动一个本地开发网络。

    '
- fmt: '#### Contract Deployment


    For this application, we will code, compile, and deploy our own contract `contracts/ERC721PayPerMint.sol`（Listing
    [5-21](#476252_1_En_5_Chapter.xhtml#PC45)）。This will be a contract based on the
    default `ERC721` implementation, which we will pull from the OpenZeppelin contracts
    library, with an additional method to create new instances in exchange for a fee
    in ETH. The ETH will remain in the contract until its owner decides to withdraw
    it.


    ```

    // contracts/ERC721PayPerMint.sol

    pragma solidity ^0.5.2;

    import

    "openzeppelin-solidity/contracts/math/SafeMath.sol";

    import

    "openzeppelin-solidity/contracts/ownership/Ownable.sol";

    import

    "openzeppelin-solidity/contracts/token/ERC721/ERC721.sol";

    import

    "openzeppelin-solidity/contracts/token/ERC721/ERC721Enumerable.sol";

    contract ERC721PayPerMint

    is ERC721, ERC721Enumerable, Ownable {

    using SafeMath for uint256;

    function exists(uint256 tokenId)

    public view returns (bool) {

    return _exists(tokenId);

    }

    function mint(address to, uint256 tokenId)

    public payable returns (bool) {

    require(msg.value >= tokenId.mul(1e12), "Insufficient payment");

    _mint(to, tokenId);

    return true;

    }

    function withdraw()

    public onlyOwner {

    msg.sender.transfer(address(this).balance);

    }

    }

    Listing 5-21

    Modified ERC721 token that will back our application. It provides a public minting
    function so users can create new tokens for a fee, as well as a view function
    to check for the existence of a token

    ```


    We can now try compiling our contract using the `sol-compiler`.


    ```

    $ npx sol-compiler

    Artifact for ERC721PayPerMint does not exist

    Compiling 1 contracts (ERC721PayPerMint.sol) with Solidity v0.5.2...

    ERC721PayPerMint artifact saved!

    ```


    There should now be an `ERC721PayPerMint.json` file in the `artifacts` folder.
    Let’s add a short script `scripts/deploy.js` for retrieving the compiled bytecode
    and deploying the contract to the local network, using a modified version of the
    deployment code we wrote earlier in this chapter (Listing [5-22](#476252_1_En_5_Chapter.xhtml#PC47)).
    We will also store the deployment address in a `Deploys.json` file, which we will
    then retrieve from the application.


    ```

    // scripts/deploy.js

    const Web3 = require(''web3'');

    const fs = require(''fs'');

    const path = require(''path'');

    // Deploys any artifact from the default account

    async function deploy(artifact, arguments, opts) {

    const providerUrl = process.env.PROVIDER_URL

    || ''http://localhost:8545'';

    const web3 = new Web3(providerUrl);

    const from = (await web3.eth.getAccounts())[0];

    const data = artifact.compilerOutput.evm.bytecode.object;

    const abi = artifact.compilerOutput.abi;

    const Contract = new web3.eth.Contract(abi, null, { data });

    const gasPrice = 1e9;

    const instance = await Contract.deploy({ arguments })

    .send({ from, gasPrice, ...opts });

    const address = instance.options.address;

    const network = await web3.eth.net.getId();

    save(network, address);

    console.log(address);

    }

    // Saves deployment address to a Deploys.json file

    function save(network, address) {

    const file = path.join(

    __dirname, ''..'', ''artifacts'', ''Deploys.json''

    );

    const deployments = fs.existsSync(file)

    ? JSON.parse(fs.readFileSync(file)) : {};

    deployments[network] = address;

    const content = JSON.stringify(deployments, null, 2);

    fs.writeFileSync(file, content);

    }

    // Deploys our ERC721PayPerMint contract

    function main() {

    const artifactPath = ''../artifacts/ERC721PayPerMint.json'';

    const artifact = require(artifactPath);

    return deploy(artifact, [], { gas: 5e6, gasPrice: 1e9 });

    }

    main();

    Listing 5-22

    Script for deploying the ERC721PayPerMint contract to a network specified by the
    PROVIDER_URL environment variable, and storing the deployment address indexed
    by network ID. Note that the main function can be modified to easily deploy other
    contracts

    ```


    Now, with the `ganache-cli` process (or the `Geth` or `Parity` development node)
    listening on port `8545`, try running the deployment script.


    ```

    node scripts/deploy.js

    ```


    You should then see a `Deploys.json` file in the `artifacts` folder with the network
    ID and the deployment address. Note that the ID and deployment address you get
    may differ.


    ```

    $  cat artifacts/Deploys.json

    {

    "155164184873": "0x0E696947A06550DEf604e82C26fd9E493e576337"

    }

    ```


    Now that we have our contract set up on our local network, we can start working
    on the web application itself.


    ### The Application


    Our application will follow a similar structure than the previous one. We will
    have separate folders for interacting with the Ethereum network, for managing
    contract `artifacts`, and for the React components.


    #### Initializing the Web3 Instance


    We will set up a `src/eth/network.js` file (Listing [5-23](#476252_1_En_5_Chapter.xhtml#PC50))
    with the code necessary to instantiate a new `web3` object from the injected provider,
    along with a few methods that we will be using later throughout the app.


    ```

    // src/eth/network.js

    import Web3 from ''web3'';

    let web3;

    export function getWeb3() {

    if (!web3) {

    web3 = new Web3(Web3.givenProvider);

    }

    return web3;

    }

    export function hasProvider() {

    return !!Web3.givenProvider;

    }

    export async function getAccount() {

    const accounts = await window.ethereum.enable();

    return accounts[0];

    }

    export async function getBlockNumber() {

    return web3.eth.getBlockNumber();

    }

    export async function getNetwork() {

    return web3.eth.net.getId();

    }

    Listing 5-23

    Network file to initialize a new web3 object given the injected provider

    ```


    Note that the `getAccount` method is especially important, since it includes the
    call to *enable* the provider. This is what allows us to access the list of accounts
    of the user.'
