    channels），编码游戏（coding a game），定义（definition），通用状态通道框架（generalized state channel
    framework），网络（networks）。


    ### T


    双因素认证（Two-factor authentication）。


    ### U


    单向支付通道（Unidirectional payment channels），构建支付应用（building payment app），转账金额（amount
    to transfer），广播通道（broadcast channels），检查字节码（checking bytecode），关闭通道（closing channel），接收方（recipient），发送方（sender），组件函数（component
    function），发送者消息（sender’s messages），总`ETH`接收量（total `ETH` received），从零开始实现（implement
    from scratch），`working`，`unsubscribe()`方法。用户入门（User onboarding），`ETH`问题（`ETH`
    problems），智能账户（smart accounts）。


    ### V


    虚拟通道/元通道（Virtual channel/metachannel）。


    ### W, X, Y, Z


    `wallet` v3 格式，`web3` `Contract`抽象（`web3` `Contract` abstraction），`websocket`协议。'
