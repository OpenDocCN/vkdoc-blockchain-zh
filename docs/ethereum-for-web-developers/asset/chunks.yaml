- fmt: '# Upgrading User Accounts


    As we have seen, identity contracts can pack multiple features for your users,
    such as two-factor authentication, social recovery, daily transfer limits, and
    more. This begs the question of *what* to build into these contracts. As contracts
    are immutable, any change to add a new feature would require your users to ditch
    their current identity and deploy a new one. However, forcing a user to move all
    their assets to a new contract is the equivalent of forcing them to move to a
    new email account whenever they want access to a new feature – including changing
    their email in all online services they may be using.


    Nevertheless, it is possible in Ethereum to actually upgrade a contract after
    it has been deployed, thus allowing iterative deployment and bugfixing as in traditional
    software development. To implement this, we first need to become familiarized
    with the concept of *delegate calls* in the Ethereum Virtual Machine, or EVM.


    ## The `DELEGATECALL` Instruction


    A regular `CALL` from one contract to another in the EVM works as a call from
    an actor or process to another: a new context is created, where the state (storage
    and balance) of the callee is loaded, the caller is set to `msg.sender`, and the
    code of the callee is executed. On the other hand, a `DELEGATECALL` works by executing
    the code of the callee but *maintaining the original context of the caller*. In
    other words, storage, balance, and even `msg.sender` are not changed by a `DELEGATECALL`
    – only the code being executed is.


    This low-level instruction allows us to jump into an arbitrary contract and execute
    its code, where that code actually modifies the state of the current contract.
    The called contract then acts as a library,^([^(106)](#fn106)) being used only
    as a repository of shared code, but not using its state.


    ## Delegating Proxies


    The `DELEGATECALL` instruction allows us to build a contract that simply delegates
    all calls to another contract which holds the actual logic to be executed. These
    contracts are usually called *delegating proxies*, since they delegate all calls
    to another contract, or *transparent proxies*, as any client interacting with
    them is oblivious to their existence. The contract being called by the proxy that
    holds the code being actually executed is usually called *logic contract*, *implementation
    contract*, or *master copy*.


    A delegating proxy (Listing [7-16](#476252_1_En_7_Chapter.xhtml#PC24)) can be
    implemented in Solidity as a contract that keeps the address of its implementation
    contract as its only state variable and only has a fallback function in which
    it delegates all calls to it. The proxy will receive the implementation address
    in its constructor and optionally `calldata` to initialize it.


    ```

    // 06-upgrading-identity-contracts/contracts/DelegateProxy.sol

    contract DelegateProxy {

    // Stores address in the first slot

    // Target contract must define address as the first variable

    address private implementation;

    constructor(

    address _implementation,

    bytes memory _data

    ) public payable {

    implementation = _implementation;

    if (_data.length > 0) {

    (bool success,) = _implementation.delegatecall(_data);

    require(success);

    }

    }

    // Fallback function delegates all calls to implementation

    function () payable external {

    address impl = implementation;

    assembly {

    calldatacopy(0, 0, calldatasize)

    let result := delegatecall(

    gas, impl, 0, calldatasize, 0, 0

    )

    returndatacopy(0, 0, returndatasize)

    switch result

    case 0 { revert(0, returndatasize) }

    default { return(0, returndatasize) }

    }

    }

    }

    Listing 7-16

    Implementation of a delegating proxy contract based on the code from github.com/zeppelinos/zos.
    Note the usage of assembly in the fallback function, since Solidity does not allow
    a fallback function to return arbitrary data. And if we did not return any data,
    then any calls to our contract would yield an empty response

    ```


    ### Caution


    Upgradeability in the EVM can be very tricky to implement correctly, and it imposes
    some restrictions. For instance, a proxy contract cannot execute a constructor
    of a logic contract when it is created, so any contract to be upgradeable needs
    to rely on regular functions that act as *initializers*. Another issue is that
    updating a proxy to a logic contract with a different set of state variables may
    also inadvertently corrupt the contract’s state. If you are planning on relying
    on upgradeable contracts in your application, whether they are smart accounts
    or any other contract, it is strongly recommended that you use an existing upgradeability
    solution instead of rolling out your own.


    The key concept here is that the address of the logic contract does not need to
    be hard-coded into the proxy – it can actually be kept in storage. When this address
    is changed, this effectively updates the code being executed by the proxy while
    keeping its state and address. We can now add this feature to our identity contracts.


    ## Upgradeable Identities


    Armed with this new building block, we can deploy a single identity contract to
    act as a logic contract and deploy one proxy for each of our users. Remember that
    since all state is kept in the proxy, there is no need for more than one copy
    of the logic contract, and a single one can be shared (like a library) among multiple
    proxies.


    This not only saves gas in deployments, since proxy contracts are much smaller
    (and thus cheaper) than identity contracts, but also allows our users to upgrade
    to a different identity contract whenever they want. Let''s build the *upgrade*
    feature into our new upgradeable identities (Listing [7-17](#476252_1_En_7_Chapter.xhtml#PC25)).


    ```

    // 06-upgrading-identity-contracts/.../UpgradeableIdentity.sol

    contract UpgradeableIdentity {

    // First variable is used for the implementation contract

    // Remember that the proxy uses the same variable position!

    address private implementation;

    // Keep track whether this instance has been initialized

    bool private initialized;

    // Initializer function instead of a constructor

    function initialize(address owner) public payable {

    require(!initialized);

    initialized = true;

    accounts[owner] = true;

    emit AccountAdded(owner);

    }

    // Upgrades to a new implementation

    function upgradeTo(

    address newImplementation

    ) onlyUserAccount public {

    implementation = newImplementation;

    }

    // The rest of the Identity contract code goes here...

    }

    Listing 7-17

    Variant of the identity contract with support for upgradeability. Note that the
    first contract variable is the implementation contract address, and the constructor
    has been replaced by a regular function that relies on a flag to keep track of
    whether the instance has been initialized or not. Upgrading to a different identity
    implementation just requires changing the implementation address in the first
    position of storage

    ```


    Keep in mind that any state variables defined on this contract will not be actually
    stored on this contract''s storage, but in the proxy''s – thanks to the magic
    of delegate calls. For instance, the `initialized` flag is not actually set on
    the single `UpgradeableIdentity` contract deployed as a shared implementation,
    but is set on each of the proxies that are backed by it.


    Because of this, the first variable declared on this contract must be the implementation
    address, as in the proxy. Also, the contract cannot extend from any base contract
    that defines additional contract variables. This ensures that the implementation
    address is stored in the same position in storage as where the proxy will look
    for it.^([^(107)](#fn107))'
