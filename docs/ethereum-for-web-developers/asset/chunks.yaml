  trans: '

    ### 发出事件


    Solidity 提供了一种名为*事件*的交易日志抽象。一个 Solidity 事件通过名称标识，可以包含多个参数以提供附加数据（清单 3-15）。由于事件是以日志形式实现的，因此
    Solidity 事件只能被发出，而无法在智能合约内部被观测到。我们稍后将学习如何从客户端监控或查询事件。


    ```

    contract EmitsEvents {

    mapping(string => uint256) private counters;

    event CounterIncreased

    (string indexed key, uint256 newValue);

    function increase(string memory key) public {

    counters[key] += 1;

    emit CounterIncreased(key, counters[key]);

    }

    }

    清单 3-15

    一个智能合约，每次调用 increase 函数时都会发出一个事件

    ```


    事件通过 `event` 关键字声明，并使用 `emit` 触发。请注意，在事件声明中，部分参数可以被标记为 `indexed`。这允许监控或查询该参数具有特定值的事件。是否将参数标记为
    indexed 完全取决于你的具体用例。


    ### 注意


    由于 EVM 的限制，被索引的可变长度参数并非以其实际值存储，而是以该值的哈希值存储。这意味着，在示例中，你可以在所有 `CounterIncreased`
    事件中搜索特定的键，但无法从某个事件中检索出该键的实际值。


    事件不仅用于监控合约变更，还可作为交易中返回值的替代方案。由于客户端无法获取在交易中调用的方法的返回值，通常的做法是用事件发出需要获取的值。然后，客户端检索附加在交易收据上的事件，并从中提取该值。


    ### 导入、继承和库


    Solidity 文件可以 `import` 其他文件（清单 3-16）。import 语句类似于 JavaScript 的 `require`，能够将其他文件中的声明引入当前文件。在
    Solidity 中，由于唯一的顶层对象是合约（以及库和接口，我们稍后将介绍），因此 `import` 允许你引用在其他文件中定义的合约。


    ```

    // Callee.sol

    contract Callee {

    function f() external;

    }

    // MyContract.sol

    import "./Callee.sol";

    contract MyContract {

    function call(Callee c) public {

    c.f();

    }

    }

    清单 3-16

    使用 import 语句加载在其他文件中定义的合约的示例

    ```


    在上例中，`MyContract` 通过导入定义了 `Callee` 的文件来获取其定义。请注意，`Callee` 并未定义函数 `f` 的具体实现，因此它实际上是一个抽象合约。由于这对
    `MyContract` 来说已足以知道如何调用 `Callee` 的实例，这些文件可以成功编译。此外，由于我们仅将 `Callee` 用作接口定义，我们可以使用
    `interface` 关键字重新定义该合约：


    ```

    // Callee.sol

    interface Callee {

    function f() external;

    }

    ```


    ### 注意


    当从依赖项（通常作为 npm 包）导入代码时，import 语句引用的是包名。具体语法因使用的构建工具而异，但通常遵循 `import "package-name/contracts/Contract.sol"`
    的模式。


    导入文件不仅是为了引用另一个合约，还可以用于继承它。Solidity 支持多重继承。这使得继承成为扩展功能或从其他合约引入特性的默认机制，将基础合约视为混入（mixin）来使用（清单
    3-17）。


    派生合约可以访问基础合约的内部和公共方法，以及所有的结构体、修饰器和事件定义。它们还可以重写基础合约中的方法。


    ```

    contract Timelocked {

    uint256 internal locktime;

    modifier whenNotLocked() {

    require(now > locktime);

    _;

    }

    }

    contract Ownable {

    address internal owner;

    modifier onlyOwner() {

    require(msg.sender == owner);

    _;

    }

    }

    contract MyContract is Timelocked, Ownable {

    constructor(uint256 _locktime) public {

    locktime = _locktime;

    owner = msg.sender;

    }

    function f() whenNotLocked onlyOwner public {

    // 仅当由 owner 调用且合约未锁定时才能到达此处

    }

    }

    清单 3-17

    基础合约的典型模式，提供类似于合约中混入的行为或方面。这些基础合约定义自己的状态，并提供修饰器或内部函数供派生合约使用

    ```


    最后但同样重要的是，Solidity 允许定义*库*，它们是辅助函数的模块，可以选择性地应用于特定的数据类型（清单 3-18）。根据其函数是否被定义为内部函数，库要么被内联到包含它的合约中，要么被单独部署并进行链接。一个很好的库示例是之前提到的
    `SafeMath`，它定义了带有溢出检查的简单算术运算。


    ```

    // openzeppelin-solidity SafeMath.sol 代码片段

    library SafeMath {

    function add(uint256 a, uint256 b)

    internal pure returns (uint256) {

    uint256 c = a + b;

    require(c >= a);

    return c;

    }

    }

    // MyContract.sol

    import "openzeppelin-solidity/contracts/math/SafeMath.sol";

    contract MyContract {

    uint256 value;

    function increase(uint256 x) public {

    value = SafeMath.add(value, x);

    }

    }

    清单 3-18

    在合约中使用 SafeMath 的示例

    ```


    由于库经常为特定数据类型定义函数（例如 `SafeMath` 中的 `uint256`），Solidity 提供了一种便捷的 `using` 语句（清单 3-19），该语句将库的所有方法添加到指定类型的所有变量中。当与结构体结合使用时，这尤其强大，因为它允许我们定义具有自己函数集的自定义数据类型。


    ```

    contract MyContract {

    using SafeMath for uint256;

    uint256 value;

    function increase(uint256 x) public {

    value = value.add(x);

    }

    }

    清单 3-19

    使用 using 语句重写的上一个示例。using 语句将库中的所有方法添加到合约作用域内的一个类型中

    ```


    ## 知名智能合约


    为了结束本章关于智能合约的内容，我们将回顾两种最著名的合约标准：ERC20 和 ERC721。它们分别对应同质化代币和非同质化代币。然而，在深入探讨它们之前，我们将首先介绍一个超越
    Solidity 语言本身的概念：ABI。


    ### 应用程序二进制接口


    合约的应用程序二进制接口（ABI）是合约暴露的所有公共方法的集合。可以将其视为可从外部账户或其他合约调用的公共 API。


    ABI 背后的关键概念是它与语言无关。它是一种关于函数调用、参数和返回值如何编码的规范。这使得用 Solidity 编写的合约能够与用其他高级语言（如 Vyper）编写的合约无缝交互。


    ABI 拥有一组与 Solidity 相当接近的数据类型，包括地址、整数（有符号和无符号）、布尔值、字符串、数组等。主要例外是合约类型（被当作普通地址处理）和结构体（被编码为包含所有字段的元组）。

    '
- fmt: '### EIPs and ERCs


    Being a decentralized protocol, all improvements to Ethereum often start as a
    proposal (or EIP, Ethereum Improvement Proposal) to be discussed by the community.
    These proposals encompass from changes to the core protocol itself to application-level
    standards defined for compatibility. The latter are referred to as Ethereum Request
    for Comments (or ERC, following the RFC nomenclature used by the Internet Engineering
    Task Force). These are of particular importance, since they define the common
    ABIs and semantics of contracts to be used. They act as building blocks for larger
    applications and foster reusability by setting a common interface agreed upon
    by the community. Two of the most popular smart contract standards, fungible and
    non-fungible tokens, are defined as ERCs – `ERC20` and `ERC721`, respectively.


    ### ERC20 Tokens


    Tokens, defined in the `ERC20` standard, are probably the most common building
    block of Ethereum applications. In its core, an `ERC20` contract keeps track of
    a balance for every token holder address and provides methods for querying and
    managing such balances (Listing 3-20). A token can act as a decentralized currency
    for any project. As such, any team can easily roll out their own cryptocurrency
    on top of the Ethereum network, without needing to set up their own blockchain.
    Nevertheless, tokens have more uses besides currency. The purpose of the token
    is given to it by the protocol in which it is used: it can be used to signal vouching
    for a particular item, or voting power in a decentralized organization. Many projects
    nowadays rely on one (or sometimes more) `ERC20` token.


    ```

    interface ERC20 {

    function totalSupply()

    external view returns (uint256);

    function balanceOf(address who)

    external view returns (uint256);

    function allowance(address owner, address spender)

    external view returns (uint256);

    function transfer(address to, uint256 value)

    external returns (bool);

    function approve(address spender, uint256 value)

    external returns (bool);

    function transferFrom(

    address from, address to, uint256 value

    ) external returns (bool);

    event Transfer(

    address indexed from,

    address indexed to,

    uint256 value

    );

    event Approval(

    address indexed owner,

    address indexed spender,

    uint256 value

    );

    }

    Listing 3-20

    Complete interface of the ERC20 standard

    ```


    The first step to understand an `ERC20` token is to glimpse its state. A fungible
    token is backed by a mapping from a user to a balance, which is exposed by the
    `balanceOf` getter.


    ```

    function balanceOf(address who)

    external view returns (uint256);

    ```


    Balances are modified via invocations to `transfer`. A user can choose to transfer
    a certain amount of their tokens to another address – either a contract or an
    external account. Whenever this method is invoked, the `Transfer` event is emitted
    to log the action.


    ```

    function transfer(address to, uint256 value)

    external returns (bool);

    ```


    An addition to this basic behavior of balance transfer is the concept of allowances.
    A user can approve any address to manage up to a certain number tokens on their
    behalf. The state of the token allowances can be queried via the `allowance` getter.


    ```

    function allowance(address owner, address spender)

    external view returns (uint256);

    ```


    To set an allowance for an address, the contract provides the `approve` method,
    which is required to emit an `Approval` event when called. Note that a user may
    set an approval for an arbitrarily high number of tokens – regardless of whether
    they own them or not.


    ```

    function approve(address spender, uint256 value)

    external returns (bool);

    ```


    Allowances are consumed as the spender account transfers tokens of the owner.
    If address A has allowed B to spend up to 20 tokens on their behalf, after B transfers
    5 of A’s tokens, the remaining allowance will be 15. Transferring on behalf of
    another user is done via the `transferFrom` method, which will affect both balances
    and allowances.


    ```

    function transferFrom(

    address from, address to, uint256 value

    ) external returns (bool);

    ```


    Additionally, the standard includes three optional getters: `name`, `symbol`,
    and `decimals`. These are often used by wallets or other client software to display
    information about a token given its address. The standard does not specify how
    tokens are initially distributed or how their total supply evolves over time.
    Certain tokens have a fixed supply set when created and assigned to a single address
    which manually distributes them. Others can be minted over time and distributed
    based on certain rules.


    ### Tip


    A canonical and audited implementation of the `ERC20` standard can be obtained
    from the OpenZeppelin contracts package, so you don’t need to implement your own.'
