  trans: '

    #### 撤销更改


    当检测到重组时，我们需要撤销从被移除区块中已处理的所有转账。为此，我们首先需要追踪在每个区块上处理了哪些转账（代码清单 6-11）。


    我们将向 `Indexer` 类添加一个新字段：一个栈结构，其中包含处理转账事件时遇到的每个区块对应的一个条目。每个条目将包含区块编号、哈希值以及该区块包含的转账列表。每当处理一个新事件时，我们都会向其中添加新条目。


    ```

    const last = require(''lodash.last'');

    async saveEvent(event) {

    // 如果此事件发生在新区块上，添加新区块

    if (!last(this.eventsBlocks)

    || last(this.eventsBlocks).hash !== event.blockHash) {

    this.eventsBlocks.push({

    number: event.blockNumber,

    hash: event.blockHash,

    transfers: []

    });

    }

    // 将转账事件包含在最新区块中

    last(this.eventsBlocks)

    .transfers.push(event.returnValues);

    }

    ```


    *代码清单 6-11 — 追踪每个区块的转账事件。此函数由 `reduceEvent` 调用。请注意，当处理新事件时，必须按顺序调用此函数，以确保区块列表保持有序，且最新区块位于列表末尾。*


    现在我们有了已处理区块的列表，可以从末尾开始遍历，并撤销我们在余额列表中汇总的所有转账事件（代码清单 6-12）。


    ```

    async undoBlocks() {

    while (this.eventsBlocks.length > 0) {

    // 检查最后一个区块的哈希值是否发生变化

    const lastBlock = last(this.eventsBlocks);

    const hash = await this.getBlockHash(lastBlock.number);

    // 如果未变化，则表明之前的所有区块也未变化

    if (lastBlock.hash === hash)

    return lastBlock;

    // 如果已变化，则撤销该区块的所有转账，并继续迭代

    this.eventsBlocks.pop();

    lastBlock.transfers.forEach((t) =>

    this.undoTransfer(t)

    );

    }

    // 如果没有更多区块，则返回空区块

    return { hash: null, number: null };

    }

    ```


    *代码清单 6-12 — 反向遍历已处理事件列表并撤销所有转账。此函数必须返回重组中未被移除的最新区块，以便脚本能从此处重新处理链。函数 `undoTransfer`
    类似于本章前面订阅小节中介绍的函数。*


    总结一下，为了使脚本能够抵御重组，我们实施的更改如下：


    1.  在处理转账事件时，将其区块编号和哈希值保存到列表中，并在末尾追加最新区块的信息。

    2.  在检查新区块时，验证我们已处理的最后一个区块的哈希值是否已更改。

    3.  如果哈希值已更改，则从最近更改的区块开始，撤销每个已更改区块上发生的所有转账事件。当遇到未更改的区块时，停止操作。

    4.  将最新区块重置为未更改的区块，并从中断处恢复处理。


    虽然这些更改给我们的解决方案带来了许多复杂性，但它们确保了系统状态不会因重组而失去同步。如何处理它们取决于你的具体用例：可以忽略最近区块直到它们被确认，可以使用订阅让节点在假设连接稳定的情况下追踪移除的事件，或者实现类似于本方案中基于客户端的设计。


    ### 单元测试


    到目前为止，我们忽略了软件开发的一个关键方面：测试。虽然在以太坊中进行测试与其他应用程序没有本质区别，但我们将使用索引器示例来介绍一些特定于区块链测试的有用技术。


    #### 选择节点


    第一个决定在于为测试选择哪个节点。回想一下前面的章节，我们可以使用 `ganache`（一个区块链模拟器），或者在实际节点（如以开发模式运行的 `Geth`
    或 `Parity`）上工作。前者更轻量，并提供了额外的操作方法，可用于操作区块链状态，这在单元测试中非常有用。另一方面，使用实际节点更能代表应用程序的实际生产环境。


    一个好的折衷方案是在单元测试中使用带有即时密封功能的 `ganache`，而对于端到端集成测试，则可以使用以固定区块时间运行的 `Geth` 或 `Parity`
    开发节点。这允许在单元测试中进行更细粒度的控制，并在集成测试中提供更具代表性的环境。


    ### 注意


    单元测试是否应该允许调用外部服务通常是软件开发中一个颇具争议的问题。在传统应用中，一些开发者倾向于设置测试数据库来支持他们的单元测试，而另一些开发者则模拟所有对其的调用，以便隔离测试代码，他们认为单元测试必须只执行单段代码。在这里，我们将站在前者一边，并在单元测试中连接到
    `ganache` 实例。无论如何，这只是我们如何理解单元测试的语义问题。

    '
- fmt: '#### Testing Our Indexer


    We will now write some unit tests for our indexer. We will use `ganache` as a
    back end, `mocha` as a test runner, and `chai` with the `bignumber` plugin for
    writing assertions.


    The first step is to deploy an `ERC20` token for our indexer to monitor (Listing
    [6-13](#476252_1_En_6_Chapter.xhtml#PC14)). We will extend the default `ERC20`
    implementation from OpenZeppelin with a public minting method, so we can easily
    mint tokens for any addresses we want to test.


    ```

    // 01-indexing/contracts/MockERC20.sol

    pragma solidity ^0.5.0;

    import "openzeppelin-solidity/contracts/token/ERC20/ERC20.sol";

    contract MockERC20 is ERC20 {

    constructor () public { }

    function mint(address account, uint256 amount) public {

    _mint(account, amount);

    }

    }

    Listing 6-13

    ERC20 token contract with a public minting method, which allows anyone to create
    new tokens. Do not use in production!

    ```


    Let’s create the boilerplate for our test file (Listing [6-14](#476252_1_En_6_Chapter.xhtml#PC15)).
    We will need to import all the relevant components, create a new instance of `web3`
    for interacting with our `ganache` instance, and deploy the new contract.


    ```

    // 01-indexing/test/indexer.test.js

    const expect =

    require(''chai'').use(require(''chai-bignumber'')()).expect;

    const ERC20Artifact =

    require(''../artifacts/MockERC20.json'').compilerOutput;

    const Web3 = require(''web3'');

    const web3 = new Web3(''http://localhost:9545'');

    const ERC20 = new web3.eth.Contract(

    ERC20Artifact.abi, null,

    { data: ERC20Artifact.evm.bytecode.object }

    );

    describe(''indexer'', function () {

    before(''setup'', async function () {

    this.accounts = await web3.eth.getAccounts();

    this.erc20 = await ERC20.deploy().send({

    from: this.accounts[0], gas: 1e6

    });

    });

    });

    Listing 6-14

    Boilerplate code for a test suite for the Indexer. It initializes a new web3 instance
    and deploys an instance of the ERC20 token contract. Note that some require statements
    were removed for brevity

    ```


    Using this template, we can now write our first test within our `describe` block,
    to check that any balances minted in our contract are correctly picked up by the
    indexer (Listing [6-15](#476252_1_En_6_Chapter.xhtml#PC16)).


    ```

    it(''records balances from minting'', async function () {

    const indexer = new Indexer({

    address: this.erc20.options.address

    provider: ''http://localhost:9545''

    });

    const [from, holder] = this.accounts;

    await this.erc20.methods.mint(holder, 1000).send({ from });

    await indexer.processNewBlocks();

    expect(indexer.getBalances()[holder])

    .to.be.bignumber.eq("1000");

    });

    Listing 6-15

    Test for checking that transfers from minting are correctly processed. We initialize
    a new Indexer instance for the newly deployed token contract, mint some tokens
    for an address, and execute the indexer to check the result

    ```


    We can run this test with `mocha`. Make sure to have a `ganache` instance running
    in another terminal and listening on port 9545 (Listing [6-16](#476252_1_En_6_Chapter.xhtml#PC17)).


    ```

    $ ganache-cli -p 9545

    $ npx mocha

    Listing 6-16

    Starting a ganache instance and running the test suite respectively. Each command
    should be run on a different terminal

    ```


    However, if we run our test, it will fail – the indexer will not pick up any balance
    for the holder address. This is because we built our indexer to ignore any information
    from the latest blocks and only consider transfers after a certain number of confirmations.


    We will fix this using the `mine` method from `ganache` (Listing [6-17](#476252_1_En_6_Chapter.xhtml#PC18)).
    This method, not available in Geth or Parity, tells `ganache` to simulate a new
    block being mined. It is sent as any other message via the low-level JSON-RPC
    interface.


    ```

    function rpcSend(web3, method, ... params) {

    return require(''util'')

    .promisify(web3.currentProvider.send)

    .call(web3.currentProvider, {

    jsonrpc: "2.0", method, params

    });

    }

    function mineBlocks(web3, number) {

    return Promise.all(

    Array.from({ length: number }, () => (

    rpcSend(web3, "evm_mine")

    ))

    );

    }

    Listing 6-17

    Helper method to instruct ganache to mine a certain number of blocks. The code
    in mineBlocks fires a chosen number requests in parallel and returns when all
    of them have succeeded

    ```


    We can now add a call to `mineBlocks` right before instructing our indexer to
    process new blocks in our test, run it again, and see it pass.


    #### Using Snapshots


    We can now write more tests that exercise other scenarios of our indexer. However,
    in any good test suite, all tests should be independent from each other, which
    is not the case here since we are deploying a single instance of our `ERC20` contract.
    This means that any minting or transfers that occur in a test will be carried
    on to the following ones.


    While the obvious solution is to just replace our `before` step with a `beforeEach`
    step, so a new `ERC20` is deployed for each test, we will use this opportunity
    to introduce a new concept specific to `ganache`: snapshots (Listing [6-18](#476252_1_En_6_Chapter.xhtml#PC19)).
    Snapshots allow us to save the current state of the simulated blockchain, run
    a set of operations, and then roll back to the saved state.


    ```

    function takeSnapshot(web3) {

    return rpcSend(web3, "evm_snapshot").then(r => r.result);

    }

    function revertToSnapshot(web3, id) {

    return rpcSend(web3, "evm_revert", id);

    }

    Listing 6-18

    Helper functions for taking a new snapshot, which returns the snapshot id, and
    for reverting to a specific snapshot given its id

    ```


    A good use case for snapshots is to save time by removing the need to re-create
    a new state for each test (Listing [6-19](#476252_1_En_6_Chapter.xhtml#PC20)).
    Instead of deploying a new `ERC20` contract on each test, we just deploy it once,
    save a snapshot, execute a test, and restore the snapshot to clear out any changes
    before running the next test. While this will not offer any performance improvements
    in our tests, suites with a more complex setup that require creating multiple
    contracts will benefit from it.


    ```

    beforeEach(''take snapshot'', async function () {

    this.snapshotId = await takeSnapshot(web3);

    });

    afterEach(''revert to snapshot'', async function () {

    await revertToSnapshot(web3, this.snapshotId);

    });

    Listing 6-19

    Taking a new snapshot before each test, and reverting back to it once the test
    has ended. Note that we cannot revert to the same snapshot more than once, so
    we need to create a new one for each test

    ```


    Another interesting use case of snapshots is for testing *reorganizations*. Triggering
    a reorganization on a regular Geth or Parity node is complex, as it involves setting
    up our own private node network, and disconnecting and reconnecting nodes to simulate
    the chain split. On the other hand, testing a reorganization on `ganache` is much
    simpler: we can take a snapshot, mine a few blocks, and then roll back and mine
    another set of blocks with a different set of transactions.'
