- fmt: "### Choosing the Right Connection\n\nUp to this point, we have reviewed different\
    \ kinds of nodes (full and light, public and private), as well as different connection\
    \ protocols (`ipc`, `http`, and `websockets`). We have also learned how to set\
    \ up a `provider` object and how to enable the one injected by a `web3`-enabled\
    \ browser. Given all these options, it begs the question of which connection we\
    \ should choose for *querying information from a DApp*.\n\n#### Respecting the\
    \ Choice of the User\n\nFirst and foremost, if our user is using a `web3`-enabled\
    \ browser, our DApp should rely on the provider injected by it. A `web3`-enabled\
    \ browser means the user is already part of the Ethereum ecosystem, and could\
    \ be potentially running a node of their own. As such, we need to provide them\
    \ with the means to choose which node they want to use when browsing our DApp.\n\
    \nWhile we could reimplement Metamask’s interface for choosing a network connection,\
    \ it makes little sense to do so. A user who wishes to connect to an alternative\
    \ node will already be running Metamask or another `web3`-enabled browser, and\
    \ have already preconfigured their own nodes. Therefore, an injected `web3` provider\
    \ should always be our first choice for connecting to the network.\n\nKeep in\
    \ mind that providers need to be enabled in order to access the list of accounts\
    \ of the user. Nevertheless, if the application does not need this information,\
    \ this step can be skipped.\n\n#### Using a Public Node\n\nThe next option is\
    \ simple: connect to a public node. You can either set up your own for your DApp\
    \ or use one from Infura. Going with your own node has all the benefits and drawbacks\
    \ of rolling out your own infrastructure: you do not depend on a third party,\
    \ but you need to watch out for the health of your nodes. Remember that nothing\
    \ prevents an arbitrary number of users from connecting to your node, so you should\
    \ be prepared for surges in traffic. Because of this, it may be easier to just\
    \ rely on an external infrastructure provider.\n\nAs an alternative to Infura,\
    \ you can also rely on a public API such as that of Etherscan. `Ethers.js`, an\
    \ alternative to `web3.js`, connects by default to Infura, and falls back to Etherscan\
    \ if the connection fails.\n\nNote that in all cases where your DApp relies on\
    \ a third party, it is relying on a foreign centralized service for fetching data\
    \ from the blockchain. Since one of the strong points of DApps is precisely decentralization,\
    \ adding a component that needs to be trusted may be a step backward in this direction.\
    \ It is up to you to decide on the trade-off between convenience and decentralization\
    \ for the users of your DApp. As such, a good rule of thumb is to use an injected\
    \ provider if found, and fall back to a centralized service otherwise.\n\n####\
    \ Putting it all Together\n\nThe code in Listing [4-4](#476252_1_En_4_Chapter.xhtml#PC7)\
    \ attempts to load the injected provider from a `web3` browser, both modern and\
    \ legacy ones. If it fails, it falls back to using an Infura secure `websocket`\
    \ endpoint. The provider is used to create a `web3.js` instance, but the same\
    \ code can be repurposed for other libraries.\n\n```javascript\nasync function\
    \ getWeb3() {\n  // Modern web3 browsers\n  if (window.ethereum) {\n    const\
    \ web3 = new Web3(window.ethereum);\n    // Only if we need access to user accounts\n\
    \    try {\n      await window.ethereum.enable();\n    } catch (error) {\n   \
    \   console.error(\"No access to user accounts\");\n    }\n    return web3;\n\
    \  }\n  // Legacy web3 browsers\n  else if (window.web3) {\n    return new Web3(window.web3.currentProvider);\n\
    \  }\n  // Standard browser\n  else {\n    return new Web3(\"wss://mainnet.infura.io/ws/v3/TOKEN\"\
    );\n  }\n}\n```\n*Listing 4-4 Code snippet for initializing a web3 connection\
    \ for a DApp, based on the code provided by metamask.io*\n\n## Retrieving Data\n\
    \nNow that we know how to connect to the network, we can start actually retrieving\
    \ data. We will review how to access network information, account balances, perform\
    \ static calls, and subscribe to events. As before, we will be using `web3@1.2.0`\
    \ as a library to interact with the Ethereum network, but other libraries should\
    \ provide similar features.\n\n### Network Information\n\nWe can start out by\
    \ querying general network information. To begin with, it is a good practice to\
    \ always check that you are connected to the expected network. If your application\
    \ is meant to be used on the Rinkeby test network, you do not want a user to be\
    \ accidentally using a connection to Mainnet. To do this, you can get the identifier\
    \ of the network you are connected to and compare it to the identifier of the\
    \ expected network.\n\n```\n> await web3.eth.net.getId()\n```\n\nNetworks are\
    \ identified by a numeric identifier. Mainnet is 1, Ropsten is 3, Rinkeby is 4,\
    \ and Kovan is 42. Ephemeral development networks are typically set up with higher\
    \ IDs.\n\n### Note\n\nLike most requests to an external data source in JavaScript,\
    \ calls to the Ethereum network are asynchronous operations. Different libraries\
    \ may have different ways to handle this, either by using callbacks or returning\
    \ promises. In particular, `web3.js` supports traditional error-first callbacks\
    \ as well as promi-events. Promi-events are promise objects which double as an\
    \ event emitter, allowing you to listen to different stages of the asynchronous\
    \ operation. They will become more relevant in the next chapter. For now, we will\
    \ simply use the `async-await` syntax for working with promises.\n\nAnother piece\
    \ of information we can get from the network is the current block number. Polling\
    \ this value can let us know when a new block was added to the chain, potentially\
    \ including transactions that have modified the state of the contracts we are\
    \ working with, thus triggering a re-read in our app.\n\n```\n> await web3.eth.getBlockNumber()\n\
    ```\n\nWe can also get detailed information from a block, such as its hash, the\
    \ total gas used, its miner, and a list of all the transactions included in it.\
    \ Note that we can refer to a block either by number, hash, or the string `latest`\
    \ to signal that we want the latest block on the chain.\n\n```\n> await web3.eth.getBlock('latest')\n\
    { author: '0xea674fdde...',\n  gasLimit: 8000029,\n  gasUsed: 1808896,\n  hash:\
    \ '0xcdb2699b240ece675611aa...',\n  number: 7059810,\n  transactions:\n   [ '0xca7d315abc76988ddcfa49...',\n\
    \     '0x9b72090bbabe017d4bcf5b...',\n     '0xa50150e448a0cc40a29986...',\n  \
    \   ... ],\n  ... }\n```\n\nWe can also get information not on the network but\
    \ on the node itself. For instance, we can query the software version that a node\
    \ is running, and even warn our users if there is a known issue on that release.\n\
    \n```\n> await web3.eth.getNodeInfo()\n'Parity-Ethereum//v2.1.11-stable-e9194b0-20190107/x86_64-linux-gnu/rustc1.31.1'\n\
    ```\n\nAnother potentially useful check is whether the node is up to date with\
    \ the rest of the chain. Nodes that have been just set up may not have synced\
    \ yet, so they will not be able to return recent information from the network.\
    \ If a node is no longer syncing, you can safely rely on it.\n\n```\n> await web3.eth.isSyncing()\n\
    false\n```\n\nThere is more information you can query from a node. Make sure to\
    \ check out the `web3.js` reference^([^(62)](#fn62)) for additional methods."
  raw: '### Choosing the Right Connection


    Up to this point, we have reviewed different kinds of nodes (full and light, public
    and private), as well as different connection protocols (ipc, http, and websockets).
    We have also learned how to set up a provider object and how to enable the one
    injected by a web3-enabled browser. Given all these options, it begs the question
    of which connection we should choose for *querying information from a DApp*.


    #### Respecting the Choice of the User


    First and foremost, if our user is using a web3-enabled browser, our DApp should
    rely on the provider injected by it. A web3-enabled browser means the user is
    already part of the Ethereum ecosystem, and could be potentially running a node
    of their own. As such, we need to provide them with the means to choose which
    node they want to use when browsing our DApp.


    While we could reimplement Metamask’s interface for choosing a network connection,
    it makes little sense to do so. A user who wishes to connect to an alternative
    node will already be running Metamask or another web3-enabled browser, and have
    already preconfigured their own nodes. Therefore, an injected web3 provider should
    always be our first choice for connecting to the network.


    Keep in mind that providers need to be enabled in order to access the list of
    accounts of the user. Nevertheless, if the application does not need this information,
    this step can be skipped.


    #### Using a Public Node


    The next option is simple: connect to a public node. You can either set up your
    own for your DApp or use one from Infura. Going with your own node has all the
    benefits and drawbacks of rolling out your own infrastructure: you do not depend
    on a third party, but you need to watch out for the health of your nodes. Remember
    that nothing prevents an arbitrary number of users from connecting to your node,
    so you should be prepared for surges in traffic. Because of this, it may be easier
    to just rely on an external infrastructure provider.


    As an alternative to Infura, you can also rely on a public API such as that of
    Etherscan. Ethers.js, an alternative to web3.js, connects by default to Infura,
    and falls back to Etherscan if the connection fails.


    Note that in all cases where your DApp relies on a third party, it is relying
    on a foreign centralized service for fetching data from the blockchain. Since
    one of the strong points of DApps is precisely decentralization, adding a component
    that needs to be trusted may be a step backward in this direction. It is up to
    you to decide on the trade-off between convenience and decentralization for the
    users of your DApp. As such, a good rule of thumb is to use an injected provider
    if found, and fall back to a centralized service otherwise.


    #### Putting it all Together


    The code in Listing [4-4](#476252_1_En_4_Chapter.xhtml#PC7) attempts to load the
    injected provider from a web3 browser, both modern and legacy ones. If it fails,
    it falls back to using an Infura secure websocket endpoint. The provider is used
    to create a web3.js instance, but the same code can be repurposed for other libraries.


    ```

    async function getWeb3() {

    // Modern web3 browsers

    if (window.ethereum) {

    const web3 = new Web3(window.ethereum);

    // Only if we need access to user accounts

    try {

    await window.ethereum.enable();

    } catch (error) {

    console.error("No access to user accounts");

    }

    return web3;

    }

    // Legacy web3 browsers

    else if (window.web3) {

    return new Web3(window.web3.currentProvider);

    }

    // Standard browser

    else {

    return new Web3("wss://mainnet.infura.io/ws/v3/TOKEN");

    }

    }

    Listing 4-4

    Code snippet for initializing a web3 connection for a DApp, based on the code
    provided by metamask.io

    ```


    ## Retrieving Data


    Now that we know how to connect to the network, we can start actually retrieving
    data. We will review how to access network information, account balances, perform
    static calls, and subscribe to events. As before, we will be using `web3@1.2.0`
    as a library to interact with the Ethereum network, but other libraries should
    provide similar features.


    ### Network Information


    We can start out by querying general network information. To begin with, it is
    a good practice to always check that you are connected to the expected network.
    If your application is meant to be used on the Rinkeby test network, you do not
    want a user to be accidentally using a connection to Mainnet. To do this, you
    can get the identifier of the network you are connected to and compare it to the
    identifier of the expected network.


    ```

    > await web3.eth.net.getId()


    ```


    Networks are identified by a numeric identifier. Mainnet is 1, Ropsten is 3, Rinkeby
    is 4, and Kovan is 42\. Ephemeral development networks are typically set up with
    higher IDs.


    ### Note


    Like most requests to an external data source in javascript, calls to the Ethereum
    network are asynchronous operations. Different libraries may have different ways
    to handle this, either by using callbacks or returning promises. In particular,
    web3.js supports traditional error-first callbacks as well as promi-events. Promi-events
    are promise objects which double as an event emitter, allowing you to listen to
    different stages of the asynchronous operation. They will become more relevant
    in the next chapter. For now, we will simply use the async-await syntax for working
    with promises.


    Another piece of information we can get from the network is the current block
    number. Polling this value can let us know when a new block was added to the chain,
    potentially including transactions that have modified the state of the contracts
    we are working with, thus triggering a re-read in our app.


    ```

    > await web3.eth.getBlockNumber()


    ```


    We can also get detailed information from a block, such as its hash, the total
    gas used, its miner, and a list of all the transactions included in it. Note that
    we can refer to a block either by number, hash, or the string `latest` to signal
    that we want the latest block on the chain.


    ```

    > await web3.eth.getBlock(''latest'')

    { author: ''0xea674fdde...'',

    gasLimit: 8000029,

    gasUsed: 1808896,

    hash: ''0xcdb2699b240ece675611aa...'',

    number: 7059810,

    transactions:

    [ ''0xca7d315abc76988ddcfa49...'',

    ''0x9b72090bbabe017d4bcf5b...'',

    ''0xa50150e448a0cc40a29986...'',

    ... ],

    ... }

    ```


    We can also get information not on the network but on the node itself. For instance,
    we can query the software version that a node is running, and even warn our users
    if there is a known issue on that release.


    ```

    > await web3.eth.getNodeInfo()

    ''Parity-Ethereum//v2.1.11-stable-e9194b0-20190107/x86_64-linux-gnu/rustc1.31.1''

    ```


    Another potentially useful check is whether the node is up to date with the rest
    of the chain. Nodes that have been just set up may not have synced yet, so they
    will not be able to return recent information from the network. If a node is no
    longer syncing, you can safely rely on it.


    ```

    > await web3.eth.isSyncing()

    false

    ```


    There is more information you can query from a node. Make sure to check out the
    web3.js reference^([^(62)](#fn62)) for additional methods.'
  trans: "\n### 选择合适的连接方式\n\n到目前为止，我们回顾了不同类型的节点（全节点和轻节点、公共节点和私有节点），以及不同的连接协议（`ipc`、`http`\
    \ 和 `websockets`）。我们还学习了如何设置 `provider` 对象，以及如何启用由支持 `web3` 的浏览器注入的 provider。鉴于所有这些选项，自然引出一个问题：在\
    \ *从 DApp 查询信息* 时，我们应该选择哪种连接方式。\n\n#### 尊重用户的选择\n\n首先，如果我们的用户使用的是支持 `web3` 的浏览器，那么\
    \ DApp 应当依赖该浏览器注入的 provider。支持 `web3` 的浏览器意味着用户已经是以太坊生态系统的一部分，并且可能正在运行自己的节点。因此，我们需要为用户提供一种方式，让他们在浏览我们的\
    \ DApp 时选择想要使用的节点。\n\n虽然我们可以重新实现 Metamask 的网络连接选择界面，但这样做意义不大。希望连接到其他节点的用户会已经运行了\
    \ Metamask 或其他支持 `web3` 的浏览器，并且已经预先配置好了自己的节点。因此，注入的 `web3` provider 应始终是我们连接网络的首选。\n\
    \n请记住，需要启用 provider 才能访问用户账户列表。不过，如果应用程序不需要此信息，则可以跳过这一步。\n\n#### 使用公共节点\n\n下一个选择很简单：连接到公共节点。你可以为自己的\
    \ DApp 搭建自己的节点，也可以使用 Infura 提供的节点。使用自己的节点具有部署自有基础设施的所有优缺点：你不依赖于第三方，但需要关注节点的运行状况。请记住，没有任何机制能阻止任意数量的用户连接到你的节点，因此你应当为流量激增做好准备。正因如此，依赖外部基础设施提供商可能会更简单。\n\
    \n作为 Infura 的替代方案，你也可以依赖像 Etherscan 这样的公共 API。作为 `web3.js` 的替代方案，`Ethers.js` 默认连接到\
    \ Infura，并在连接失败时回退到 Etherscan。\n\n请注意，在所有情况下，如果你的 DApp 依赖第三方，它就是在依赖外部的中心化服务来从区块链获取数据。由于\
    \ DApp 的强项之一正是去中心化，添加一个需要被信任的组件可能在这一方向上是一种倒退。你需要自行决定，为 DApp 用户权衡便利性与去中心化之间的关系。因此，一个好的经验法则是：如果找到注入的\
    \ provider 则使用它，否则回退到中心化服务。\n\n#### 整合方案\n\n清单 4-4 中的代码尝试从现代和旧版两种 `web3` 浏览器加载注入的\
    \ provider。如果加载失败，则回退到使用 Infura 的安全 `websocket` 端点。该 provider 用于创建 `web3.js` 实例，但同样的代码也可用于其他库。\n\
    \n```javascript\nasync function getWeb3() {\n  // 现代 web3 浏览器\n  if (window.ethereum)\
    \ {\n    const web3 = new Web3(window.ethereum);\n    // 仅在需要访问用户账户时\n    try\
    \ {\n      await window.ethereum.enable();\n    } catch (error) {\n      console.error(\"\
    无法访问用户账户\");\n    }\n    return web3;\n  }\n  // 旧版 web3 浏览器\n  else if (window.web3)\
    \ {\n    return new Web3(window.web3.currentProvider);\n  }\n  // 标准浏览器\n  else\
    \ {\n    return new Web3(\"wss://mainnet.infura.io/ws/v3/TOKEN\");\n  }\n}\n```\n\
    *清单 4-4 基于 metamask.io 提供的代码，用于初始化 DApp 的 web3 连接的代码片段*\n\n## 检索数据\n\n现在我们已经知道如何连接到网络，可以开始实际检索数据了。我们将回顾如何访问网络信息、账户余额、执行静态调用以及订阅事件。和之前一样，我们将使用\
    \ `web3@1.2.0` 作为与以太坊网络交互的库，但其他库也应提供类似功能。\n\n### 网络信息\n\n我们可以从查询通用网络信息开始。首先，始终检查你是否连接到了预期的网络，这是一个好习惯。如果你的应用程序是为在\
    \ Rinkeby 测试网络上使用而设计的，你不希望用户意外地使用了与主网的连接。为此，你可以获取当前所连接网络的标识符，并将其与预期网络的标识符进行比较。\n\
    \n```\n> await web3.eth.net.getId()\n```\n\n网络由数字标识符来标识。主网是 1，Ropsten 是 3，Rinkeby\
    \ 是 4，Kovan 是 42。临时的开发网络通常使用更高的 ID 进行设置。\n\n### 备注\n\n与 JavaScript 中对外部数据源的大多数请求一样，对以太坊网络的调用是异步操作。不同的库可能以不同的方式处理这个问题，要么使用回调函数，要么返回\
    \ promise。具体来说，`web3.js` 既支持传统的错误优先回调，也支持 promi-event。Promi-event 是兼具事件发射器功能的\
    \ promise 对象，允许你监听异步操作的不同阶段。它们在下一章中将变得更加重要。现在，我们将简单地使用 `async-await` 语法来处理 promise。\n\
    \n我们可以从网络中获取的另一条信息是当前区块号。轮询这个值可以让我们知道何时有新区块被添加到链上，其中可能包含修改我们正在使用的合约状态的交易，从而触发我们在应用中重新读取数据。\n\
    \n```\n> await web3.eth.getBlockNumber()\n```\n\n我们还可以获取一个区块的详细信息，例如其哈希值、使用的总\
    \ gas、其矿工以及其中包含的所有交易列表。请注意，我们可以通过区块号、哈希值或字符串 `latest` 来引用一个区块，以表示我们想要链上的最新区块。\n\
    \n```\n> await web3.eth.getBlock('latest')\n{ author: '0xea674fdde...',\n  gasLimit:\
    \ 8000029,\n  gasUsed: 1808896,\n  hash: '0xcdb2699b240ece675611aa...',\n  number:\
    \ 7059810,\n  transactions:\n   [ '0xca7d315abc76988ddcfa49...',\n     '0x9b72090bbabe017d4bcf5b...',\n\
    \     '0xa50150e448a0cc40a29986...',\n     ... ],\n  ... }\n```\n\n我们还可以获取关于节点本身而非网络的信息。例如，我们可以查询节点运行的软件版本，甚至可以在该版本存在已知问题时警告用户。\n\
    \n```\n> await web3.eth.getNodeInfo()\n'Parity-Ethereum//v2.1.11-stable-e9194b0-20190107/x86_64-linux-gnu/rustc1.31.1'\n\
    ```\n\n另一个可能有用的是检查节点是否与链的其余部分保持同步。刚搭建好的节点可能尚未完成同步，因此它们无法返回来自网络的近期信息。如果节点不再同步，你就可以安全地依赖它。\n\
    \n```\n> await web3.eth.isSyncing()\nfalse\n```\n\n你还可以从节点查询更多信息。请务必查看 `web3.js`\
    \ 参考文档^(⁶²)以获取更多方法。\n"
- fmt: '### Account Balances and Code


    Given an address, you can query the ETH stored by that account, regardless of
    it being an externally owned account or a contract. Furthermore, since blockchain
    history is indelible, you can even query the balance of the account in an earlier
    point in time (Listing [4-5](#476252_1_En_4_Chapter.xhtml#PC13)). The number of
    blocks you can go back will depend on whether you are working with an archive
    or a regular node.


    ```

    > const addr = ''0xcafE1A77e84698c83CA8931F54A755176eF75f2C'';

    > const block = await web3.eth.getBlockNumber() - 10;

    > await web3.eth.getBalance(addr, block);

    ''180300794957635301822239''

    Listing 4-5

    Querying the balance of an address from ten blocks ago

    ```


    Note that ETH balances are **always** expressed in Wei, which is the smallest
    unit in which an ETH can be subdivided. One ETH is equivalent to 1e18 Wei (i.e.,
    1 followed by 18 zeros). You can use the `web3` utils module (Listing [4-6](#476252_1_En_4_Chapter.xhtml#PC14))
    to convert between them.


    ```

    > const balance = await web3.eth.getBalance(addr, block)

    > web3.utils.fromWei(balance)

    ''180300.794957635301822239''

    Listing 4-6

    Using web3.utils.fromWei for converting from Wei to ETH. The reverse method is
    toWei

    ```


    You may have noted from the preceding snippets that ETH balance is returned not
    as a number but as a **string**. This is meant to avoid losing precision when
    dealing with very large numbers, since JavaScript numbers cannot deal with very
    large magnitudes. As an example, 1822239 wei are lost in the conversion to integer
    in the following code.


    ```

    > parseInt(balance).toLocaleString();

    ''180,300,794,957,635,300,000,000''

    ```


    This decision is specific to the `web3.js` library. Other libraries rely on JavaScript
    `bignumber` implementations, such as `bignumber.js`^([^(63)](#fn63)) or `bn.js`^([^(64)](#fn64)).
    It is most likely that once support for native `bignumbers`^([^(65)](#fn65)) is
    stabilized in the language, libraries will switch to it. Either way, what is important
    is that you keep in mind that most numbers in Ethereum cannot be handled using
    regular JavaScript numbers, or you risk losing precision.


    Besides balances, you can also get the code at an address, and use it to check
    whether an address is a contract or an externally owned account. You can also
    check the code itself to see if it matches the binary from a known contract.


    ```

    > await web3.eth.getCode(addr);

    ''0x6060604052361561011...''

    ```


    Keep in mind that this method for checking whether an account is a contract or
    not is far from robust. If you get no code from an address, it does not necessarily
    mean it is externally owned: a contract may be deployed to that address later,
    or a contract may have been deployed there but was eventually self-destructed.
    All in all, you should avoid relying on whether an arbitrary address is externally
    owned or not for particularly sensitive operations.


    ### Calling into a Contract


    As we saw in Chapter [2](#476252_1_En_2_Chapter.xhtml), you can call into a contract
    to query information from it by issuing a JSON-RPC `call` to its address. Most
    contracts expose getter functions that return information on their current state
    or perform pure calculations; these functions can be identified as they are tagged
    with the `view` or `pure` modifiers in Solidity. Like all the functions listed
    in this chapter, calling into them does not cost any gas, since the call can be
    answered by any node in the network, and does not need to introduce a change on
    the blockchain.


    These calls can be executed at a low level using the `call` function from `web3.js`,
    which requires manually providing the target address and the raw data to send
    to the target contract. As an example, `0x18160ddd` is the function selector^([^(66)](#fn66))
    for accessing the `totalSupply` of an ERC20 token contract, so we can test it
    against an existing contract on mainnet, such as the BAT token on mainnet, which
    returns the hexadecimal representation of `1.5e27`.


    ```

    > const addr = ''0x0d8775f648430679a709e98d2b0cb6250d2887ef'';

    > await web3.eth.call({ to: addr, data: ''0x18160ddd'' });

    ''0x00000000...0004d8c55aefb8c05b5c000000''

    ```


    However, we will typically rely on the `web3` Contract abstraction for interacting
    with a contract (Listing [4-7](#476252_1_En_4_Chapter.xhtml#PC18)). Creating one
    of these, as we saw before, requires the contract’s ABI and its address. We will
    replicate the preceding example using the ABI for the ERC20.^([^(67)](#fn67))


    ```

    > const abi = [

    {

    "constant": true,

    "inputs": [],

    "name": "totalSupply",

    "outputs": [{"name": "", "type": "uint256"}],

    "payable": false,

    "stateMutability": "view",

    "type": "function"

    }, ...

    ];

    > const erc20 = new web3.eth.Contract(abi, addr);

    > await erc20.methods.totalSupply().call()

    ''1500000000000000000000000000''

    Listing 4-7

    Accessing the same token’s total supply via the web3 Contract object. Note how
    the output is formatted based on its type instead of returned as a raw hexadecimal
    value

    ```


    ### Note


    Like `getBalance`, all calls to a contract can also include an optional `block`
    parameter, in case you want to query a contract’s state at a previous point in
    time. Remember that requesting changes for a block too long ago in the chain requires
    a connection to an archive node, which is not always available. Also keep in mind
    that, depending on your use case, it may be prudent to only display information
    from a dozen blocks ago, to shield yourself against possible chain reorgs. Data
    this recent is usually always available, regardless of the node keeping an archive
    or not.


    The Contract object can also be used to obtain the function selectors that can
    be plugged into low-level calls or raw transactions. In the following line, the
    `encodeABI` method returns the data selector that we used at the beginning of
    this section.


    ```

    > await erc20.methods.totalSupply().encodeABI()

    ''0x18160ddd''

    ```


    Contracts also expose a handy interface to all events declared on the ABI (Listing
    [4-8](#476252_1_En_4_Chapter.xhtml#PC20)), making it easy to query all events
    in a block range.


    ```

    > const block = await web3.eth.getBlockNumber();

    > const opts = { fromBlock: block - 100, toBlock: block };

    > await erc20.getPastEvents(''Transfer'', opts);

    [{address: ''0x0D8775F648430679A709E98d2b0Cb6250d2887EF'',

    blockNumber: 7060651,

    logIndex: 91,

    removed: false,

    transactionHash: ''0x3bd37...'',

    transactionIndex: 96,

    transactionLogIndex: ''0x0'',

    type: ''mined'',

    returnValues:

    Result {

    ''0'': ''0xAAAAA6...'',

    ''1'': ''0x664753...'',

    ''2'': ''1905510325611397921584'',

    from: ''0xAAAAA6...'',

    to: ''0x664753...'',

    value: ''1905510325611397921584'' },

    event: ''Transfer''

    }, ... ]

    Listing 4-8

    Obtaining the transfer events on the BAT token on mainnet that occurred in the
    past 100 blocks. In this example, the address starting with 0xAAAAA6 transferred
    1.9e21 tokens to address 0x664753

    ```


    Each log object informs of the block and the transaction where it occurred, as
    well as the name of the event (in this case, `Transfer`), and includes the parameters
    with which it was emitted.


    ## Detecting Changes


    We will now go deeper into events. Even though we now know how to query past events,
    listening to new events is a useful method to detect changes to a contract in
    our application in real time. We will see three different ways for monitoring
    changes.'
