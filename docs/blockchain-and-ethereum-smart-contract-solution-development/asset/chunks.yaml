    \n### Sidebar – Key Distributed Systems Terms and Definitions\n\n-   **Node:**\
    \ Any participant in a distributed system.\n-   **Network:** Connectivity among\
    \ nodes in a distributed system.\n-   **Partition:** Any disruption in the network\
    \ between nodes.\n-   **Partition tolerance:** System is resilient/robust to partitions.\n\
    -   **Fault (or failure):** Any error in the system, including device failures,\
    \ software failures (including software defects), and communication protocol failures.\n\
    -   **Byzantine fault:** When components fail, there is imperfect information\
    \ on whether a component has failed or not.\n-   **Byzantine Fault Tolerance (BFT):**\
    \ Any mechanism to be robust/resilient to Byzantine Faults. Examples include consensus\
    \ protocols and error detection/correction mechanisms.\n-   **Availability:**\
    \ Data (also known as state) always observable (or measurable) and can be updated.\n\
    -   **Scaling/scalability:** Operations perform without any degradation regardless\
    \ of the number of nodes (or users) in the network.\n-   **Replicas:** Replication\
    \ of data and/or state is an essential component of distributed systems. The mechanism\
    \ of sharing data and/or state defines the distributed system.\n-   **Atomicity:**\
    \ An atomic transaction is an indivisible and irreducible series of operations\
    \ such that either all occur or nothing occurs.\n-   **Consistency:** After each\
    \ operation, all replicas reach the same state.\n-   **Strict consistency:** Immediate\
    \ consistency after each operation.\n-   **Eventual consistency:** Consistent\
    \ over time, but can take an arbitrary amount of time.\n-   **Liveness:** People\
    \ actually use the distributed system regularly; that is, the state of the distributed\
    \ system or the data in the distributed system are regularly changing. Liveness\
    \ means active use.\n\n**References**\n\nLamport, L., Shostak, R., Pease, M. The\
    \ Byzantine generals problem. From Concurrency: The works of Leslie Lamport. Editor\
    \ Malkhi, D. October 2019. Pages 203–226 [https://doi.org/10.1145/3335772.3335936](https://doi.org/10.1145/3335772.3335936)\n\
    \nBrewer, E. CAP twelve years later: How the \"rules\" have changed,\" in Computer,\
    \ vol. 45, no. 2, pp. 23–29, Feb. 2012, doi: 10.1109/MC.2012.37\n\n## Chapter\
    \ 3 Blockchain Components and Architecture\n\nThe four components of blockchain\
    \ that working together create its enormous potential to alleviate economic inefficiencies\
    \ in our current system are distributed ledgers, privacy preservation, algorithms\
    \ for distributed systems consensus, and smart contracts.\n\n**Introduction**\n\
    \nThe core capabilities of blockchain that have the potential to drive enormous\
    \ business benefits are a distributed ledger of cumulative transactions, computers\
    \ with identical copies of the distributed ledger communicating with one another\
    \ and staying in sync, privacy-preserving transactions that limit sharing of identity\
    \ with only those who need to know, and the encoding of the terms and conditions\
    \ underlying value exchange transactions in software that can be automatically\
    \ executed to ensure the valid consummation of a transaction. These core capabilities\
    \ are enabled by technology concepts from cryptography, digital signatures, distributed\
    \ systems, and peer-to-peer networking.\n\n© Weijia Zhang and Tej Anand 2022 \
    \ \nW. Zhang and T. Anand, *Blockchain and Ethereum Smart Contract Solution Development*,"
