    # 第 1 章：区块链的商业与经济动机


    `contracts`。Lacity（2018）描述了区块链能力带来的八种商业价值来源：各方直接交易，实时可见交易状态，无需对账，拥有可靠的审计追踪（`provenance`），自动执行合同条款，降低交易费用，掌控自身数据，以及具备容错性。


    表 1-3 总结了我们所描述的区块链能力如何解决当前经济体系中的低效问题。在此，我们不加限定或细节地描述区块链能力。实际上，存在诸多限定条件，它们共同构成了当前技术的局限性。这些内容将在后续章节中详细阐述。


    ## 表 1-3：区块链能力解决经济低效问题的潜力


    | **经济低效问题** | **区块链能力** |

    | --- | --- |

    | 1. 交易结算时间 | 自动执行约定且充分理解的共识协议，让交易一旦提交便无法篡改，从而缩短交易结算时间。 |

    | 2. 向第三方支付的费用 | 点对点交易消除了强大的中心化第三方，降低了费用。区块链中的费用旨在激励交易各方维护共识协议的运行及分布式账本的同步。 |

    | 3. 数据相关的重复工作、返工与对账工作（三个“R”） | 分布式账本的真实一致副本、充分理解的共识协议以及基于软件的智能合约将大幅减少此类低效问题。
    |

    | 4. 政府法规与非政府组织规则的约束 | 互不信任的各方无需第三方协助即可交易的能力，降低了对政府法规以及会员制与倡导型非政府组织规则的依赖。 |

    | 5. 欺诈行为 | 共识协议和智能合约的透明性减少了欺诈机会。 |

    | 6. 隐私权衡 | 保护隐私的加密和哈希技术使各方能够在交易时不失去对自身数据的控制。 |

    | 7. 数据安全风险 | 缺乏中心化的专有数据源减少了安全漏洞目标；加密、哈希技术以及重建分布式账本的能力降低了安全漏洞的影响。 |


    ## 第 1 章：区块链的商业与经济动机


    在非常高层、甚至可以说是理想化的概念层面，我们看到区块链的核心能力有潜力积极改善当前经济体系中的低效问题。区块链能够延续由我们称之为 ERP 软件和互联网的技术集合所开启的对经济生产力的积极影响。


    本书的全部内容在于：在清醒认识当前能力局限性的基础上，以及了解区块链研发方向的趋势，从而将这些愿景付诸实践。尽管首个区块链实现——比特币——于 2008 年（13
    年前）发布，但这项技术的商业应用仍处于早期阶段。


    ## 章节总结/关键要点


    本章的关键要点如下：


    - 自 20 世纪 60 年代中期以来，技术创新速度迅猛，形成了我们称之为 ERP 软件和互联网的技术集合。这些技术集合基于标准化、业务流程精简、数字化和全球化，对经济产生了非常积极的影响。

    - 货币作为交换媒介，促进经济体内的交易。货币被赋予的价值代表了交易各方之间的共识。货币机制在不同社会的不同时期不断演变，最终由主权国家政府掌控。这种广泛'
- fmt: '# 区块链的商业与经济动机


    ## 替代货币形式的盛行


    与政府货币并存，为数字货币或加密货币提供了一种可能的路径及理由。


    - 当前经济体系基于交易双方之间的价值交换。交易双方之间缺乏信任的问题并未被基础经济体系所克服，这导致了收费高昂、权力集中且价值极低的第三方机构、政府强加的法规及非政府组织制定的规则，以及专有数据和流程。

    - 当前经济体系存在限制生产力提升的低效问题。这些经济低效可归类为：交易结算时间；支付给第三方的费用；与数据相关的重复工作、返工与对账工作；政府法规与非政府组织规则的约束；欺诈行为；隐私权衡；以及数据安全风险。

    - 区块链的核心能力包括：分布式账本、点对点交易、公认的共识协议、保护隐私的加密与哈希技术、不可篡改的交易，以及基于软件的智能合约。

    - 区块链的核心能力有潜力通过以下方式积极影响当前经济体系中的低效问题：在不依赖第三方的情况下，使互不信任的双方能够进行点对点交易。区块链的分布式账本可以减少专有数据，而智能合约则能为交易双方提供所需的透明度。


    ## 第一章 区块链的商业与经济动机


    在下一章中，我们将开始了解支撑区块链能力（这些能力前景广阔）的核心底层技术。这些核心底层技术包括：密码学、分布式系统以及点对点网络。尽管这些技术已存在一段时间，并且仍在不断改进，但正是它们巧妙的整合赋予了区块链非凡的能力。


    ---


    **边栏**


    **边栏1：1美元价值几何？**


    如果货币不以黄金等商品为支撑，我们如何确定货币的价值？当我们提出这个问题时，会得到各种不同的答案，从“嗯，由政府决定”到“取决于我想买什么以及我认为它值多少钱”。


    这两种答案都只说对了一半。


    我们作为消费者，通过选择是否以标价购买商品来决定1美元的价值。如果有足够多的人拒绝以某一价格购买商品，卖家就必须降价；如果更多的人愿意以某一标价购买商品，卖家要么生产更多该商品，要么提高价格。通过这种方式，我们集体且直接地决定了1美元的价值。


    然而，政府也有工具可以增加或减少货币供应量，从而间接控制1美元的价值。在美国，这些工具由美联储执行，包括设定利率、购买/出售特定类型的资产，以及确定某些面额的货币有效/无效。


    一些政府滥用了它们的权力，腐败地操纵其货币价值，给普通民众造成了苦难。这种滥用的例子包括：一些国家出现的恶性通货膨胀，这摧毁了货币的价值；以及其他国家任意废除某些面额货币的行为。


    **边栏2：替代货币**


    虽然我们最常使用政府发行的货币（也称为法定货币）进行交易，但我们也使用几种不由政府发行或担保的替代货币进行交易。这些替代货币包括：


    - **常旅客积分** – 由航空公司发放，用于奖励使用其服务或其合作伙伴服务的旅客。'
