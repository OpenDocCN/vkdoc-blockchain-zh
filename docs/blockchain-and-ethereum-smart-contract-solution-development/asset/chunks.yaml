- fmt: "`are growing exponentially, projects such as Uniswap and Compound`  \nhave\
    \ billions of dollars of assets managed by smart contracts. If there is a security\
    \ breach with the smart contract code, the impact is huge. It is always a good\
    \ practice to have a design to put a threshold on the amount of funds that can\
    \ be impacted if there is a security breach.\n\n## Make Your Smart Contract Open\
    \ Source and Leverage the Community Effort to Harden the Security\n\nSmart contracts\
    \ are used to power the DeFi world where there are no central authorities and\
    \ big IT teams to bring trust and security to the platform. It is therefore important\
    \ for the project community to play a critical role in hardening the smart contracts.\
    \ Unlike legacy financial applications where software vendors use their engineering\
    \ resources and services to ensure security and quality, smart contracts are normally\
    \ open sourced so that the community and users can review the codes to make sure\
    \ that the business logics are accurately encapsulated in the source code. Community\
    \ developers are encouraged to review the source code, and big bounties are provided\
    \ for experts who are able to find any functional, cosmetic, or security defects.\
    \ Smart contracts are also deployed to testnets first with alpha and beta releases,\
    \ and communities are requested to find defects and rewarded with bug bounties.\
    \ Because dApps powered with smart contracts are normally projects that can issue\
    \ tokens, sometimes, community developers are rewarded with project tokens when\
    \ they find security issues or defects. Healthy and growing projects that manage\
    \ billions of dollars of crypto assets always have enthusiastic community developers\
    \ who work hard to improve the security of smart contracts.\n\n## Yes, There Are\
    \ Blockchain Security Whitehats\n\nSometimes, smart contracts get hacked with\
    \ different endings. It happened several times that “hackers” did not have intention\
    \ to steal the fund, but rather to teach a lesson to the project team. So if a\
    \ security breach does happen, it is important to watch where the funds get moved\
    \ to. Hackers who have intention to use the stolen funds will normally transfer\
    \ the fund to a “mixer” to hide the identity and remove the traceability of the\
    \ fund. Whitehat hackers will just move the fund to a security location, tell\
    \ the project team about the security breach, let the project team fix issues,\
    \ and then move the fund back. So if a security breach does happen, don’t panic;\
    \ the result might not be as bad as it looks.\n\n## Have Smart Contract Audited\n\
    \nSmart contracts auditing is a good practice to harden security. A security audit\
    \ is a practice to hire an external professional company to evaluate and review\
    \ token economy, smart contracts design, and code implementation. Auditors use\
    \ automatic security scanning tools and manual penetration testing to produce\
    \ a thorough report of the smart contracts. The security scan of smart contracts\
    \ can reveal static security errors in syntax and programming styles. More in-depth\
    \ review of smart contracts will require experts to go through each smart contract\
    \ in UML diagrams and figure out the relationship between functions and inspect\
    \ potential vulnerabilities. Sometimes, meetings are held by the project team\
    \ and audit team to go through the smart contract design to figure out if the\
    \ end-to-end flow has security issues. Any issues found are labelled with severity\
    \ levels, and critical issues will need to be fixed in order for the product to\
    \ be released. A security audit can not only improve security of smart contracts\
    \ from catastrophic failure, it is also required when the project team later decides\
    \ to work with other partners or wants to license their smart contracts to other\
    \ companies. Security audits have been a growing business in the blockchain industry,\
    \ and there are often backlogs with audit requests. Expedited audit normally requires\
    \ much higher fees; therefore, security audit time should be built into the project\
    \ release schedule."
