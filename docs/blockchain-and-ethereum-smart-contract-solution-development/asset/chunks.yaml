- fmt: '# Chapter 2


    This high throughput will come at the cost of sacrificing eventual consistency,
    and hence, throughput will be reduced because we will not be able to unequivocally
    say if the majority of the nodes in the blockchain have added the block. The scalability
    limitation is thus driven by design trade-offs.


    The first design trade-off is how often a block is committed to the blockchain.
    If we commit a block too often, then we have a high chance that many of the nodes
    might be out of sync because they might have not yet received the latest block
    due to network latency. If we don’t commit a block often enough, then we will
    reduce the transactions per second scalability of the blockchain.


    The second design trade-off we make is how large should a block be. If a block
    is large, then we can scale the blockchain much more than if a block is small.
    But if a block is large, then it will take longer to be transmitted through the
    network, creating issues related to network latency, and we have a high chance
    that many of the nodes might be out of sync because they might have not yet received
    the latest block. This design trade-off should be carefully considered by system
    designers when designing blockchain applications. The design trade-off itself
    is not a limitation. The design trade-off results in constraints on scalability
    and trustworthiness, resulting in scalability limitations. Several engineering
    solutions have been proposed to alleviate this limitation. We will discuss some
    of these solutions in Chapter [5](https://doi.org/10.1007/978-1-4842-8164-2_5).


    ## The Third Limitation: Risk of Nefarious Activities


    The third limitation that we will describe is the risk of nefarious activities.
    This limitation is of concern for public permissionless blockchain networks. The
    question is, are people more inclined to conduct illicit transactions because
    they are less likely to be caught if they are conducting these transactions anonymously?
    The general belief is that the answer to this question is the affirmative, and
    there is anecdotal evidence reported in the media that this is indeed the case.


    There are two mitigating factors for this limitation. First is the property of
    provenance that creates an extensive audit trail of the lineage of the value exchanged
    in all transactions. This lineage can be used to trace the source of suspect transactions.
    Second, if any participants in the blockchain have obtained their wallet (or private/public
    keys) from a centralized exchange, these entities are required by “Know Your Customer”
    (KYC) regulations to disclose the mapping of the keys to the identity of the participant.


    ## The Fourth and Fifth Limitations: Change Management and Confidentiality Risk


    The fourth and the fifth limitation, change management and confidentiality risk,
    respectively, are both related to smart contracts. Once transactions are committed
    to a blockchain, they are immutable; that is, they cannot be changed. Smart contracts
    that represent the terms of a transaction within software are also committed to
    the blockchain either within the (data structure of the) transaction where they
    apply or independently, and then the address where they are committed is referenced
    by transactions that are governed by these smart contracts.


    Smart contracts once committed are immutable, creating the change management limitation.
    Smart contracts once committed cannot be changed either to address software defects
    or to make adjustments due to changing business requirements. The only recourse
    available to participants is to voluntarily cease using the problematic smart
    contract. There have been well-publicized instances where this limitation has
    led to a financial loss for participants and also the withdrawal of participants
    from a blockchain network.


    Once smart contracts are committed to the blockchain network, for public blockchains,
    these smart contracts are visible to all participants. This creates a situation
    where business parties can potentially disclose.'
