- fmt: 'regulation, most of it well intentioned, but history tells us that the eventual
    consequences for the increased regulation will end up having unintended consequences
    that are contrary to our desired purpose.


    **Fraud** – Up to this point, we have described an economic system that is rife
    with fee-charging third parties that add little or no value, rules and regulations
    that end up stifling innovation and preserving the *status quo*, parties transacting
    with each other using proprietary data and business process, and transaction settlement
    terms with ambiguity that the parties to a transaction do not fully understand.
    Another way of characterizing our economic system is that it is complex and opaque
    – a veritable black box. This is an ideal situation for fraudsters, hucksters,
    and criminals to find and exploit loopholes. Fraud takes a big bite out of many
    industries. For example, fraud in healthcare is estimated to be 3% to 10% of total
    healthcare spend (Simborg, 2008)；the US Chamber of Commerce has estimated that
    10% of insurance claims contain some fraud (Hoyt, 1990)；based on a survey of supply
    chain employees in manufacturing, median losses due to interorganizational supply
    chain fraud were estimated to be 9% of a firm’s total revenue (DuHadway, Talluri,
    Ho, Buckhoff, 2019).


    In addition to the obvious economic loss associated with fraud as illustrated
    earlier, firms also invest in labor and capital costs to establish and maintain
    an infrastructure to prevent fraud, and an indirect consequence of fraud is the
    enactment of new rules and regulations to protect the public from fraud (we have
    already seen the unintended consequences of rules and regulations).


    **Privacy trade-offs** – Our current economic systems for enabling transactions
    require all parties to disclose their private data to multiple parties, multiple
    times with little or no safeguards or control for how this data will be maintained
    and used after the underlying transaction is settled. Consequently, data sovereigns
    have lost control of their data. While economic studies have been attempted to
    quantify what value consumers put on their data (Acquisti, John, Loewenstein,
    2013), we have not found studies that quantify the direct cost for data sovereigns
    for losing control of their data.


    Indirect costs for data disclosure include agreements that parties negotiate with
    each other to protect their data and shield themselves against liability if the
    data were to be disclosed inappropriately, labor and capital invested to set up
    and maintain infrastructure to ensure compliance with these agreements, and the
    usual costs associated with regulations and rules that are being promulgated by
    governments to ostensibly protect customers against unauthorized data disclosure
    or data loss.


    **Data security risks** – Proprietary data stores that underlie our economic system
    are magnets for hackers to breach and pilfer valuable data. The Institute for
    Applied Network Security (IANS) estimates that technology firms tend to spend
    10.4% of their overall Information Technology (IT) budget on security (Williams,
    2021). The equivalent percentage for the finance and insurance firms is 9.7%,
    and for healthcare.'
