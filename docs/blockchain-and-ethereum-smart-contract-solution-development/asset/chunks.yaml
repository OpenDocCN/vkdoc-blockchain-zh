- fmt: '# 第5章 区块链实现概述：比特币、以太坊和超级账本


    矿工节点现在已准备好开始挖矿过程。挖矿过程涉及生成哈希值。哈希函数的输入是`nVersion`、`hashPrevBlock`、`hashMerkleRoot`、`nTime`、`nBits`和`nNonce`字段的值。`nNonce`的值由矿工设置。如果计算出的哈希具有`nBits`指定的前导零数量，则矿工已找到该区块的哈希。如果生成的哈希没有适当数量的前导零，矿工可以更改`nNonce`的值并重新计算。`nNonce`是区块头中矿工可以更改以搜索有效哈希的唯一字段。更改`nNonce`以重新计算哈希，直到找到有效哈希的迭代过程就是比特币的挖矿过程。比特币中的这种挖矿算法被称为工作量证明（PoW）。[10](#index_split_003.html#p191)


    我们之前在[第2章](https://doi.org/10.1007/978-1-4842-8164-2_2)中了解到，计算哈希是一个非常高效的计算过程。然而，搜索`nNonce`可能值的大搜索空间可能需要大量的计算能力。这种计算需求对于比特币的安全性和可信度非常重要。由于发现区块的哈希需要大量的计算能力，对区块的任何更改都需要重新发现该区块以及在该区块之后添加的所有其他区块的哈希。这降低了尝试更改已提交区块的可能性。随着更多的区块随后链接到该区块，尝试更改任何区块的可能性会进一步降低。


    虽然发现区块的哈希在计算上非常昂贵，但验证哈希是否有效却是一个计算高效的过程。一旦矿工节点确定了区块头的`nNonce`值，它就会将该区块（区块头和所有交易）传输给其对等节点。¹⁰
    当节点接收到该区块时，它会（一次）重新计算哈希以验证其有效性，并确认所有交易也是有效的。一旦该区块被验证，它就会将其链接到具有匹配`hashPrevHeader`的区块。


    当一个节点收到一个有效区块并将其添加到其区块链中后，如果它参与了挖矿过程，它会停止该过程，重置其内存池，并选择一个新的有效交易子集来开始创建下一个区块的过程。


    在任何给定时间，多个比特币矿工节点都在努力创建新区块。假设有两个节点正在努力创建区块N。我们将这些新区块称为候选区块：区块N(A)和区块N(B)。假设区块N(A)首先完成并广播其区块。另一个节点——我们称之为节点Q——接收区块N(A)并将其添加到其区块链中，如图[5-6](#index_split_003.html#p193)所示（时间T
    = t）。由于网络延迟，比特币网络中的所有节点不会同时收到区块N(A)。事实上，正在努力创建区块N(B)的节点没有收到区块N(A)，而是继续完成区块N(B)的创建，并将其广播给其对等节点。当节点Q收到区块N(B)时，它也将此区块附加到区块N上，如图[5-6](#index_split_003.html#p193)所示（时间T
    = t + 1）。区块链现在出现了一个分叉。这种分叉被称为自然分叉，因为它是区块链网络自然运行的产物。在时间T = t + 1时，我们无法做出判断。


    ---


    ¹⁰ 发现能够产生有效哈希的`nNonce`正确值要求矿工在消耗计算能力方面做工作。呈现已发现的`nNonce`值以及区块头中所有其他字段的值，代表了矿工已完成工作的证明。'
