    # 第 6 章 以太坊架构与概览


    公开主网是以太坊的生产区块链，以太币具有价值，并可在交易所进行交易。在本节中，我们提及了与以太坊区块链交互所需的最简可行工具集，包括钱包、浏览器、节点客户端、智能合约
    IDE，以及 Web3。


    ## MetaMask：与以太坊区块链交互的最简方式


    要获得以太坊区块链的实操经验，最简单的步骤之一就是使用钱包创建一个账户，并进行一些简单的加密货币发送和接收交易。在以太坊中，这可以通过使用 `MetaMask`
    实现。`MetaMask` 是一个 Web 扩展程序，可以安装到网页浏览器中，用于创建账户并与以太坊交互，具体步骤如下：


    *步骤 1：安装 `MetaMask` 扩展程序并创建加密账户*


    前往 [`metamask.io`](https://metamask.io) 并将 `MetaMask` 安装到您的网络浏览器中，例如 Chrome 或
    Firefox。


    安装完成后，打开 `MetaMask` 并记下钱包的助记词。该助记词由 12 个英文单词组成，用于代表钱包的私钥。此助记词必须安全存储，因为如果 `MetaMask`
    被意外卸载，或者计算机系统停止工作需要重新安装 `MetaMask` 时，需要使用它来恢复钱包。一旦您使用 `MetaMask` 创建了一个加密账户，就会获得一个该账户的公共地址。此地址也称为账户地址，可用于接收发送给该账户的加密货币。


    *步骤 2：为 `MetaMask` 账户充值*


    根据您连接的以太坊区块链类型，为钱包账户充值的方式可能有所不同。


    -   对于由开发者创建或通过 `ganache_cli` 创建的开发用区块链，会默认创建并充值一些账户。启动该开发区块链的人，其拥有的账户中会自动铸造一些以太币。开发者可以将这些已充值的账户导入到他们的
    `MetaMask` 钱包中。


    -   对于诸如 `Rinkeby`、`Kovan`、`Ropsten` 和 `Goerli` 等测试网，可以通过水龙头获取测试代币。开发者可以前往水龙头网址，粘贴一条包含钱包账户公共地址的社交媒体消息，并将其发送到水龙头网络服务器。之后，水龙头会向消息中指定的地址发送少量测试网以太币。


    -   对于以太坊主网，以太币需要通过购买获得。这可以通过在 `Coinbase` 等服务商处开设交易所账户，并使用法定货币支付来换取以太币。


    *步骤 3：发送和接收代币*


    一旦加密账户创建并充值完成，用户就可以开始发送和接收代币了。


    要发送代币，只需点击“发送”，填写 `Nonce`（交易序号）、接收金额和接收方地址，并在核实信息后点击“发送”。


    要接收代币，只需将账户地址提供给发送方，让发送方向该地址发送加密货币即可。


    ## Etherscan：最全面的区块链浏览器


    当交易被传输到以太坊并执行时，它们会引起以太坊在账户余额、区块、交易、智能合约和事件日志等方面的状态变化。以太坊区块链仅在其存储中记录原始数据。为了浏览区块链并理解其内容，部分数据需要经过处理并存储在数据库中，以便于查询和可视化展示。`Etherscan`
    是一个提供卓越以太坊区块链浏览体验的网络服务。要使用 `Etherscan`，只需打开任意网络浏览器，并将网址指向 `http://etherscan.io`。


    您可以使用 `Etherscan` 浏览器浏览以太坊区块链上的每一个账户、智能合约、区块和交易。对于需要通过编程方式使用区块链数据的开发者，`Etherscan`
    还提供了 API 函数和 API 密钥，以便将动态的以太坊区块链数据集成到您的去中心化应用中。

    '
- fmt: '与其他以太坊区块链浏览器一样，仅适用于以太坊公共区块链，例如主网（mainnet）、Rinkeby、Kovan、Ropsten 和 Goerli；它不适用于开发用区块链。


    **Geth：以太坊区块链的瑞士军刀**


    `Geth` 代表 Go Ethereum，是一个独立的以太坊客户端。它可以在操作系统上作为挖矿节点运行以赚取以太币，或作为 RPC 节点为客户端应用程序提供
    RPC 服务。我们建议开发者下载一个版本的 `geth`，并按照以下步骤将其用作沙盒来与以太坊区块链交互。


    **第6章 以太坊架构与概述**


    *任务1：准备一个 Geth 独立客户端*


    `Geth` 客户端仓库位于 [https://geth.ethereum.org/downloads/](https://geth.ethereum.org/downloads/)。


    你也可以从 GitHub 的以下位置下载：

    [https://github.com/ethereum/go-ethereum](https://github.com/ethereum/go-ethereum)


    `Geth` 客户端受主流操作系统支持，如 Linux、Windows 和 MacOS。由于它是开源的，建议开发者在 Linux 系统（如 Ubuntu）中运行它。


    要从源代码编译 `geth`，需要安装 Go 编程语言编译器。开发者可以使用 Golang 编译器进行 `geth` 编译。


    *任务2：运行 Geth 应用程序*


    `geth` 应用程序可以使用各种选项运行。完整说明位于 [https://geth.ethereum.org/docs/](https://geth.ethereum.org/docs/)。你可以使用
    `--miner` 选项运行它来进行挖矿，但此方式不推荐，因为以太坊的挖矿难度级别很高，在工作量证明（POW）区块链中几乎不可能与大型矿池竞争。


    `Geth` 可以作为沙盒运行，用于以下功能：

    - 使用 `geth` 构建一个开发用区块链。

    - 使用 `geth` 作为完整的区块链客户端，下载整个以太坊测试网或主网区块链。

    - 使用 `geth` 作为 RPC 服务，查询区块链信息并将交易广播到所有区块链节点。

    - 使用 `geth` 作为 JavaScript 控制台与区块链交互。


    *任务3：与 Geth RPC 服务交互*


    一旦 `geth` 节点设置完成并运行了 RPC 服务，用户就可以使用钱包、应用程序或 JavaScript 控制台连接到 RPC 端点。


    **第6章 以太坊架构与概述**


    **A. 通过 MetaMask 自定义 RPC 连接**


    要从 MetaMask 连接到 RPC 服务，只需打开 MetaMask，点击打开网络列表，然后选择“自定义 RPC”以打开一个新的网络小部件。指定一个网络名称，输入
    RPC 端点和网络的 `chainId`。`chainId` 是一个对所有区块链都唯一的标识符，由以太坊标准 `EIP-155` 指定。如果你正在构建一个开发网络，你可以在创世文件中指定一个
    `chainId`。你可以选择指定区块链的货币符号以及区块浏览器的 URL。点击“保存”以挂载新的 RPC 节点。


    一旦 MetaMask 挂载到之前指定的 RPC 节点，它将与节点所连接的区块链进行交互。你可以使用 MetaMask 通过 RPC 节点为开发用区块链发送和接收交易。


    **B. 通过 JavaScript 控制台**


    `Geth` 不仅可以作为区块链节点运行，还可以作为客户端附接到 RPC 端点并启动一个命令行控制台，为区块链提供交互式脚本功能。


    要附接到一个 RPC 节点并打开 JavaScript 控制台，只需输入：

    ```

    geth attach [rpc_url]

    ```


    **第6章 以太坊架构与概述**


    此处，`rpc_url` 是启用了 RPC 服务的以太坊客户端节点的 RPC 端点。


    JavaScript 控制台将允许用户查询区块信息、余额、交易、区块链同步状态、事件日志等。有关 JavaScript 控制台的语法，请参考以下文档：

    [https://geth.ethereum.org/docs/interface/javascript-console](https://geth.ethereum.org/docs/interface/javascript-console)，控制台语法。'
  raw: 'as other Ethereum blockchain browsers, only works with Ethereum public


    blockchains, such as mainnet, Rinkeby, Kovan, Ropsten, and Goerli; it


    does not work with development blockchains.


    **Geth: The Swiss Army Knife for the**


    **Ethereum Blockchain**


    Geth stands for Go Ethereum and is a stand-alone Ethereum client that


    can run on an operating system as a miner node to earn Ether, or as an


    RPC node to provide RPC services to client applications. We recommend


    developers download a version of geth and use it as a sandbox with


    following steps to interact with Ethereum blockchain.


    Chapter 6 ethereum arChiteCture and Overview


    *Task 1: Prepare a geth standalone client*


    Geth client repository is located at [https://geth.ethereum.org/](https://geth.ethereum.org/downloads/)


    [downloads/.](https://geth.ethereum.org/downloads/)


    You can also download it from GitHub at the following location:


    [https://github.com/ethereum/go- ethereum.](https://github.com/ethereum/go-ethereum)


    Geth client is supported by major operating systems such as Linux,


    Windows, and MacOS. Since it is open source, it is recommended that


    developers run it in Linux systems such as Ubuntu.


    To compile geth from its source code, the Go programming language


    compiler will need to be installed. Developers can use the Golang


    compiler for geth compilation.


    *Task 2: Run geth application*


    The geth application can run with various options. The full instruction


    is locate[d in https://geth.ethereum.org/docs/](https://geth.ethereum.org/docs/).
    You can run it with the --miner option to do mining, but this is not recommended
    because


    Ethereum mining difficulty level is high, and it is almost impossible to


    compete with big mining pools in proof-of-work (POW) blockchains.


    Geth can run as a sandbox for the following functions:


    • Use geth to build a development blockchain.


    • Use geth as a full blockchain client to download the


    whole Ethereum testnet or mainnet blockchain.


    • Use geth as an RPC service to query blockchain


    information and broadcast transactions to all


    blockchain nodes.


    • Use geth as a JavaScript console to interact with


    blockchains.


    *Task 3: Interact with geth RPC service*


    Once a geth node is set up with RPC service running, users can use


    wallets, applications, or the JavaScript console to connect to the RPC


    endpoint.


    Chapter 6 ethereum arChiteCture and Overview


    A. Through MetaMask custom RPC connection


    To connect to an RPC service from MetaMask, simply


    open MetaMask, click to open the Network list, and


    choose Custom RPC to open up a new network widget.


    Specify a network name, and enter the RPC endpoint


    and the chainId of the network. The chainId is an


    identifier that is unique for all blockchains as specified


    by Ethereum standard EIP-155\. If you are working on


    building a development network, you can specify a


    chainId in the genesis file. You can optionally specify


    the currency symbol for the blockchain and a URL


    for the block browser. Click Save to attach the new


    RPC node.


    Once MetaMask is attached to the RPC node specified


    earlier, it will interact with the blockchain to which


    the node is connected. You can use MetaMask to send


    and receive transactions through the RPC node for a


    development blockchain.


    B. Through JavaScript console


    Geth can run not only as a blockchain node but also


    as a client to attach to an RPC endpoint and involve a


    command-line console to provide interactive scripting


    to the blockchain.


    To attach to an RPC node and open up a JavaScript


    console, simply type


    geth attach [rpc_url]


    Chapter 6 ethereum arChiteCture and Overview


    Here, rpc_url is the RPC endpoint for an Ethereum


    client node with RPC service enabled.


    The JavaScript console will allow users to query block


    information, balances, transactions, blockchain


    syncing status, event logs, etc. For JavaScript console


    syntax, refer to the following document.


    [https://geth.ethereum.org/docs/interface/](https://geth.ethereum.org/docs/interface/javascript-console)


    [javascript- console](https://geth.ethereum.org/docs/interface/javascript-console),
    Console syntax'
