    1. 支付交易用于将以太币从一个账户发送到另一个账户。

    2. 智能合约创建交易用于在区块链上实例化智能合约。

    3. 智能合约执行交易则根据智能合约中的业务逻辑，在账户之间转移资金。


    以太坊的关键成就之一是创建了以太坊虚拟机（EVM），即世界计算机。以太坊虚拟机位于区块链之上，充当编译器，将以 Solidity 语言编写的智能合约软件编译成
    EVM 可执行的所谓 EVM 字节码，如图 5-11 所示。正是这种字节码在区块链上被执行。区块链网络需要耗费算力来运行智能合约，所有节点都必须执行该智能合约；执行智能合约的交易所有者需要支付
    Gas（以以太币计价）作为执行智能合约的费用。


    **图 5-11.** 以太坊虚拟机


    以太坊的愿景是创建分布式应用程序（dApps）。这一愿景已经实现，目前已有数千个以太坊 dApp 投入生产，并推动了围绕区块链的热潮。创建 dApp 涉及智能合约以及与之交互的前端的开发、测试和部署。图
    5-12 展示了 dApp 的架构以及可供 dApp 开发者使用的开发工具示例。


    **图 5-12.** 以太坊 dApp 架构和开发工具


    - Truffle 是一个用于创建 Solidity 软件的交互式开发环境。

    - Ganache 提供了一个开发区块链，用于在开发过程中测试智能合约软件。

    - Drizzle 是一组库，提供了从 dApp 前端进行账户和合约实例化的功能。我们将 dApp 架构称为 Web 3.0 架构，以区别于 Web 2.0
    架构，并将 dApp 的前端称为 Web3 前端。

    - dApp 前端通过一组远程过程调用（RPC）与 EVM 和区块链交互。Infura 将这些 RPC 封装成一个 API（应用程序编程接口），从而简化了
    dApp 的开发。

    - MetaMask 是一个 Chrome 插件和一个软件钱包。


    这些工具简化了分布式应用程序（dApps）的开发。


    ## Hyperledger


    Hyperledger 是一种区块链实现，用于在交易方之间（例如供应链中的各方）开发企业级商业应用。


    Hyperledger 区块链解决方案由 Linux 基金会提供和管理。这是一项旨在推进跨行业区块链技术应用于企业商业应用的协作成果。自 2016 年 2
    月成立以来，Hyperledger 协作组织现已拥有超过 200 个成员组织。


    Hyperledger 拥有开源、开放标准、开放透明的治理机制。这种治理模式为软件界的许多人熟悉且适应，因为它长期被 Linux 和 Apache 这两个知名的操作系统和
    Web 开发平台所采用。


    Hyperledger 附带高度模块化的框架和工具，可以集成在一起使用。


    让我们看看 Hyperledger 提供的一些工具和框架（另请参见图 5-13）：


    - Hyperledger Aries、Indy 和 URSA 是用于管理加密身份并在区块链网络中传递这些身份的工具和框架。

    - Hyperledger Fabric 是其中的核心分布式账本。'
- fmt: '# Hyperledger生态系统概述


    ## 智能合约与共识机制


    在Hyperledger生态系统中，针对Hyperledger Fabric，您可以使用`Go`编程语言编写智能合约。您还可以插入不同的共识机制。


    - **Hyperledger Besu** 是一个为Hyperledger生态系统构建的以太坊客户端。在这里，您可以使用Solidity编程语言编写智能合约，并创建私有或公共的许可区块链。

    - **Hyperledger Sawtooth** 是一个框架和工具集，帮助您使用经过时间证明（PoET）或实用拜占庭容错（PBFT）共识机制构建区块链应用程序。

    - **Iroha** 专为基于物联网的区块链应用程序设计，并使用`C++`编程语言。

    - **Hyperledger Cactus** 是一个区块链集成工具，运行在不同区块链上的应用程序可以相互通信和协作。

    - **Cello** 是一个操作仪表板，可用于跟踪多个区块链应用程序。

    - **Hyperledger Explorer** 提供了一个非常简单的基于Web的界面来查询区块链中的数据。


    ![](index-208_1.jpg)


    * **Hyperledger Quilt** 是一个用于跨账本支付机制的Java实现。在这里，您可以处理加密货币支付以及法定货币支付。法定货币是由主权政府发行的货币。


    ***图5-13.** Hyperledger生态系统*


    Hyperledger提供了非常丰富的开发工具集，可用于构建企业级业务应用程序。迄今为止，所有使用Hyperledger构建的应用程序都使用了许可区块链。其中许多应用程序是私有许可的，但也可以是公共许可的。


    ## Bitcoin、Ethereum和Hyperledger对比


    在本节中，我们将对比Bitcoin、Ethereum和Hyperledger，然后快速回顾过去几年区块链领域发生的令人兴奋的发展。


    Bitcoin是区块链的原始实现，我们将使用以下标准对比Bitcoin、Ethereum和Hyperledger：


    - 它们的目的分别是什么？

    - 它们使用什么治理机制？

    - 它们使用什么货币？

    - 它们的挖矿奖励是什么？

    - 它们的底层数据结构和共识机制是什么？


    Bitcoin用于支付。它原生地用于将价值从一方转移到另一方。Ethereum被构建为一个通用开发平台，您可以在其中促进支付，同时构建分布式应用程序。Hyperledger也被设计为一个通用的企业级应用程序开发工具。


    Bitcoin由比特币改进提案（BIP）治理，该提案试图在所有Bitcoin节点之间达成共识。一旦一定比例的Bitcoin节点同意提议的更改，共识即被视为达成，社区同意迁移到下一个版本。那些不同意的节点可以通过创建硬分叉来走自己的路。


    Ethereum区块链也使用以太坊改进提案（EIP），并且在Vitalik Buterin的领导下有一个核心小组来推动这一过程。


    Hyperledger的治理基于Linux基金会，人员和公司在此合作，贡献他们的服务、项目、框架和工具。


    Bitcoin的原生货币是`BTC`，较低面额的单位是`Satoshi`。Ethereum的原生货币是`Ether`，较低面额的单位是`Finney`、`Wei`和`Szabo`。Hyperledger没有原生货币。它的目的较少基于支付，更多是关于数据共享和建立信任。


    Bitcoin当前的挖矿奖励是`6.25 BTC`。我们看到，在2020年5月，这一奖励从`12.5 BTC`减半。Ethereum的挖矿奖励是`2 Ether`。Hyperledger没有挖矿奖励的概念。


    Bitcoin的核心数据结构是交易。在Ethereum中，……'
