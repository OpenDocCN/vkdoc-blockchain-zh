- fmt: '对每个区块链使用一个`chainId`对交易进行签名。这样，由Alice为以太坊主网（ETH）签名的交易就无法被重新发送到以太坊经典（ETC）链上，从而避免双重支付。


    在EIP-155中，部分`chainId`已预先分配，如下表所示（图11-2）。要获取新的`chainId`，代表区块链社区的管理员需要访问`https://github.com/ethereum-lists/chains`，并提交一个拉取请求（pull
    request）来注册新的`chainId`。`chainId`的分配遵循先到先得的原则，以确保`chainId`不会发生冲突。


    **图 11-2.** 以太坊主网和测试网中定义的`ChainId`


    尽管EIP-155解决了不同区块链之间的重放攻击问题，但它也存在一些缺点，包括`chainId`是自行定义的，且未与区块链属性绑定。恶意用户可能会构建一个`chainId`与其他区块链相同的区块链。这可能导致跨链交易被发送到错误的目标区块链。另一个缺点是，当一条区块链分叉为两条区块链时（例如ETH和ETC），这两条区块链将具有相同的`chainId`，从而引发冲突。


    ## 规范与解决方案


    为了克服基于简单数字的`chainId`的缺点，可以使用一个32字节的`crosschainId`，为跨链ID添加更多信息，使其功能更强大。该`crosschainId`可以包含创世区块哈希和校验和，以便第三方应用程序和用户能够验证该跨链ID对于特定区块链是否有效。


    `crosschainId`的规范已作为以太坊改进协议（EIP）3220发布，如下所示。


    ### EIP-3220：跨链标识符规范


    #### 简单摘要


    一种能够处理分叉的、可自我验证的唯一区块链标识符。


    #### 摘要


    *跨链ID是一个32字节的十六进制字符串，其中部分字节从区块链哈希中提取，部分字节由人工定义以描述区块链的特性。我们还提出了一种注册与查找服务，用于从跨链ID中检索区块链元数据。*


    #### 动机


    *随着比特币和以太坊的成功，EOS、Ripple、Litecoin、Besu、Wanchain等各种区块链相继被开发出来并以惊人的速度发展。此外，还存在其他私有链和联盟链，例如Hyperledger
