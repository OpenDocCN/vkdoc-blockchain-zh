    顶层是第一层`layer 1`或称为根区块链`root blockchain`，在此上下文中即为以太坊主网。Plasma智能合约被部署到以太坊主网上，其具备以下功能。


    **供用户在第一层存入资产的存款函数`Deposit function`**：该存款函数允许用户向某Plasma智能合约发送一笔包含特定资产价值的交易。用户通过存款函数发送的资产将由该Plasma智能合约锁定在主网上。智能合约将创建一个记录，并生成与此存款相关的新代币。之后，存款函数可以触发一个存款事件`deposit
    event`以通知Plasma区块链。该代币及其价值将被复制到Plasma区块链中，并作为第二层区块链的资产使用。


    **用于第二层Plasma区块链向第一层根链提交交易默克尔树的SubmitPlasmaTxRecord函数**：Plasma区块链中的交易记录在默克尔树结构中，默克尔树的根节点会被发送到父链或根区块链。


    **允许用户将资产从第二层链提取到第一层区块链的StartWithdraw函数**：该函数通常由用户直接调用，或由连接第一层和第二层区块链的运营者调用。此函数的调用者应提供Plasma区块编号、交易索引ID`indexid`、交易记录、默克尔证明`Merkle
    proof`以及'
