    Verification implies that all parties in a transaction need to be able to view
    the transactions and have knowledge that these transactions have been committed
    to the blockchain network. If public verification is required, then we need to
    ensure that the privacy of the transacting parties is preserved by making it possible
    for them to transact anonymously on the blockchain. We should therefore select
    a public permissioned blockchain. If we do not require public verification of
    transactions, then a private permissioned blockchain will be sufficient to meet
    our needs.


    We recommend diligently going through this flowchart with its relatively simple
    tests to determine if the business problem requires blockchain or not. In addition,
    if the use of blockchain is likely to be beneficial, the flowchart helps identify
    the type of blockchain that is most suitable to address the business problem.
    Doing this upfront is important because the design trade-offs we have to make
    vary with the type of blockchain that we believe is most appropriate.


    In the next section, we will review the design decisions that we will need to
    make to implement an application using blockchain.


    ## Blockchain Application Design Decisions


    Developing a blockchain-based application is a complex undertaking involving alignment
    and coordination across stakeholders with approaches rooted in equity and democracy,
    as well as seemingly simple technical decisions that can nevertheless have broad
    consequences. In this section, we will go through the design decisions that we
    believe are critical for all blockchain-based applications. This section discusses
    seven design decisions: transactions, tokens, smart contracts, data, consensus
    mechanism, stakeholder organization, and development stack. These seven design
    criteria are not independent – a design decision for one criterion can constrain
    or inform the design decisions in the other criteria.


    Many of the design decisions will also be informed by the economic inefficiencies
    being addressed, the theme(s) of the blockchain application, and the type of blockchain
    being implemented – topics that were covered earlier in the chapter. Finally,
    the seven design criteria outlined here are not comprehensive, and each blockchain
    application will require additional design decisions that will be specific to
    the application being created and the business problem being addressed.


    - **Transactions** – This design decision addresses the question “What is the
    transaction semantics that the blockchain is going to be facilitating?”


    In the examples in the book so far, we have described transactions such as payment
    for the sale of a comic book, the deposit of money in a bank account, and the
    deposit of interest in a bank account. The transaction thus is the building block
    of value exchange. We all intuitively understand payment transactions, where some
    form of money is transferred between parties. We can also think of transactions
    that represent the transfer of other types of digital assets between parties,
    or some digital representation of a physical asset among parties. We can also
    think of the transfer of a digital representation of some type of rights as a
    transaction. For example, a transaction could represent the granting of access
    to a set of data. We can also think of the act of providing answers to a survey
    as a transaction, where our answers represent the transfer of value (in terms
    of our knowledge or opinion) to another party.


    Transactions therefore raise questions such as follows: “Where in the transaction
    is the value?” “How is that value apparent?” “How will the value be digitally
    represented?” In the next design decision, we will discuss the concept of tokens,
    which can be helpful in answering these questions. The answers to these questions
    will determine the underlying economics of the blockchain.


    Finally, we have described a transaction as the transfer of value from one party
    to another – a one-way transfer.'
