    # 第一章 区块链的商业与经济动因


    在`企业`中，这一比例为 7.3%（Williams, 2021）。随着 IT 预算的不断增长，这是一笔理论上来讲完全属于防御性质、且无法推动企业创新与生产力的巨额投资。这项投资也未能阻止企业发生高调的安全漏洞事件，而一次安全漏洞就可能给企业带来巨大的经济和声誉损害，这还不包括高管（有时甚至包括首席执行官）因此失业的代价。


    与数据安全相关的间接成本，在于获取所有必要安全审批的缓慢且昂贵的过程，这严重抑制了创新与增长。间接后果还包括为保护公众免受数据泄露影响而制定的各种规则与法规。时至今日，我们已深知这些规则与法规带来的意外后果。


    在本节中，我们详细讨论了价值交换体系中固有的经济低效问题。当前体系受益于技术创新，这些创新最终体现在 ERP 软件带来的标准化与业务流程精简，以及互联网及其相关创新所创造的数字化与全球化。然而，当前体系并未克服交易各方之间与生俱来的信任缺失，这导致了专有数据存储与业务流程的出现、强有力的第三方收费机构，以及基于会员制的专业和倡导组织制定的政府法规与规则。在下一节中，我们将从宏观层面探讨区块链是否有潜力积极改善当前交换体系中的经济低效问题。


    ## 区块链解决当前经济低效问题的潜力


    我们尚未描述区块链技术的能力、支撑这些能力的底层技术、这些能力目前的局限性，或如何利用这些能力的实现细节。我们将在本书后续章节中详细阐述这些内容。在本章中，我们要求您暂且接受区块链核心能力的表面价值，正是这些能力使其有望解决当前经济体系中的低效问题。


    区块链创建了一个包含累积交易的*分布式账本*。所有交易方都持有该账本真实且完全相同的副本，当交易完成时，这些副本会保持同步并保持一致。交易方无需相互信任，即可在不涉及第三方的情况下进行*点对点*交易结算。交易方也无需披露在单笔交易背景之外或对未参与交易方有意义的身份信息——区块链交易通过使用*加密*和*哈希*技术，旨在保护隐私。在交易完成并提交至分布式账本之前，所有交易方必须达成共识。该*共识协议*由所有交易方共同商定，各方对其有充分理解，且未经交易方同意，任何中心化机构都无法更改。一旦交易被提交至分布式账本，几乎不可能对该交易进行更改或篡改（*不可篡改性*）。交易方可以创建基于软件的合约，用以代表交易执行的条款——这些基于软件的合约被称为*智能*合约。

