- fmt: '# 区块链实现概述：比特币、以太坊和HyperLedger


    编程语言方面，以太坊还简化并加强了对交易和支出的追踪。比特币软件会追踪每一笔交易、其输入、输出以及所有交易中的未花费交易输出（UTXO），即使需要一直追溯到最初的创世区块。


    在比特币中，如果一笔交易产生一个比特币的输出，另一笔交易产生半个比特币的输出，第三笔交易产生另外半个比特币的输出，我们无法将这三者合并以在钱包中创建两个比特币，除非创建一笔新交易并为此支付交易费用。比特币会分别追踪这三笔交易的`UTXO`，如图[5-9](#index_split_003.html#p201)所示。


    **图5-9.** 比特币UTXO与以太坊账户对比


    ## 第5章 区块链实现概述：比特币、以太坊和HyperLedger


    以太坊没有仅仅追踪交易，而是创建了一种账户结构，其中归属于同一账户的交易可以被汇集和聚合。这带来了其他优势，例如我们理论上可以在账户中隔离并持有基于以太坊原生代币或以太坊货币（Ether）的各种不同类型资产或代币。


    当然，Solidity为使以太币成为一种高度可编程货币而提供的广泛功能也伴随着相关风险。


    - Solidity的灵活性使得部署的智能合约更可能存在缺陷。这是一个不可避免的现实——软件越多，出现错误的可能性就越大；当软件容易创建时，也容易犯错，等等。在区块链中，一旦智能合约被部署并提交到区块链，它便是不可变的。软件缺陷无法修复。唯一可行的补救措施是希望人们不再使用有缺陷的智能合约——但如果智能合约缺陷能为用户创造经济利益，这种情况就不太可能发生。因此，这带来了很大的风险。

    - 以太坊的状态比比特币更大；也就是说，以太坊在链上存储的数据比比特币更多。这可能会引入延迟和计算问题。

    - 执行智能合约的交易需要补偿区块链网络执行该智能合约的计算成本。这种成本被称为Gas，它取决于智能合约的复杂性和规模。


    ![图5-10相关描述](index-203_1.jpg)


    ## 第5章 区块链实现概述：比特币、以太坊和HyperLedger


    - 在Solidity智能合约部署到区块链之前，它会被编译成字节码。然而，有一种选项允许除了字节码之外，还可以部署智能合约的可读版本。虽然这提高了透明度，但也可能带来隐私和保密性风险。


    以太坊背后的货币是Ether。Ether的较低面额分别为`Finney`、`Szabo`和`Wei`，如图[5-10](#index_split_003.html#p203)所示。`Finney`、`Szabo`和`Wei`都是加密货币世界的杰出人物，他们早期都参与了比特币社区。


    **图5-10.** Ether面额


    以太坊有两种类型的账户：外部拥有账户和合约账户。外部拥有账户是最常见的。它们拥有余额，并存储在钱包中。合约账户存储并执行智能合约代码。合约账户还关联着一个余额，代表相关智能合约持有的可编程货币余额。


    区块链中的交易请求改变区块链的状态。与比特币所有交易都是同一类型（即从一个地址向另一个地址发送比特币的支付交易）不同，以太坊有三种类型的交易；交易不限于发送支付。


    ![章节示意图](index-204_1.png)


    ## 第5章 区块链实现概述：比特币、以太坊和HyperLedger'
