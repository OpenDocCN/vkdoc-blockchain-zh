    \ `encodeABI()` 函数进行打包。\n- **通过 `sendTransaction` 函数发送交易**。\n\n```javascript\n\
    function setMessage() {\n    if (!ethEnabled()) {\n        alert(\"Please install\
    \ an Ethereum-compatible browser or extension like MetaMask to use this dApp!\"\
    );\n    }\n    web3.eth.getAccounts(function(err, accounts) {\n        var myContract\
    \ = new web3.eth.Contract(messagestorage_abi, messagestorage_contract.toLowerCase());\n\
    \        var gene = $('.cluegene input').val();\n        var auctionData = myContract.methods.storeMessage(gene).encodeABI();\n\
    \        var tx_genescience = web3.eth.sendTransaction({\n            from: accounts[0].toLowerCase(),\n\
    \            to: messagestorage_contract.toLowerCase(),\n            data: auctionData\n\
    \        }, function(err, transactionHash) {\n            document.getElementById(\"\
    SetMessageValue\").innerHTML = \"setMessage tx:\" + transactionHash;\n       \
    \ })\n    })\n}\n```\n\n# 第 7 章 使用 Solidity 编写智能合约\n\n## 获取消息函数\n与 `setMessage`\
    \ 函数类似，`getMessage` 函数也会创建一个智能合约对象，并在智能合约中调用 `retrieve` 函数。由于 `getMessage` 是一个不向区块链写入数据的函数，因此可以直接调用\
    \ `call()` 函数。此 `call()` 函数不需要 MetaMask 签署交易，也不消耗 gas 费用。\n\n```javascript\nfunction\
    \ getMessage() {\n    if (!ethEnabled()) {\n        alert(\"Please install an\
    \ Ethereum-compatible browser or extension like MetaMask to use this dApp!\");\n\
    \    }\n    var myContract = new web3.eth.Contract(messagestorage_abi, messagestorage_contract.toLowerCase());\n\
    \    var tx_getmessage = myContract.methods.retrieve().call(function(err, result)\
    \ {\n        document.getElementById(\"GetMessageValue\").innerHTML = \"message\
    \ retrieved:\" + result;\n    })\n}\n```\n\n# 第 7 章 使用 Solidity 编写智能合约\n\n## 本章小结\n\
    在本章中，我们通过示例、语法、数据结构、函数、事件、客户端应用、安全性、测试、调试和部署，描述了 Solidity 编程。这应该为去中心化应用的基本 Solidity\
    \ 编程打下良好的基础。\n\n# 第 8 章 安全注意事项\n\n## 引言\n在前几章中，我们已经探讨了 Solidity 智能合约编程的许多方面。我们涵盖了\
    \ Solidity 编程语法，使用 Remix 或 Truffle 编译源代码，以及将字节码部署到嵌入式 EVM 或开发区块链。我们还提到了代币经济和代币设计，例如选择同质化或非同质化代币，以及使用代币来代表业务用例中的资产和元素。\n\
    \n在存储和通信方面，我们讨论了以太坊区块链状态和事件概念的重要性，以及不同的网络，例如主网、Rinkeby 测试网和 Ropsten 测试网。\n\n在架构方面，我们讨论了构建端到端解决方案的方法，包括构建连接到以太坊区块链的区块链节点、部署智能合约、开发\
    \ Web 客户端或移动应用，以及使用 Web3 将客户端与区块链连接起来。\n\n在本章中，我们将介绍以太坊区块链和智能合约的安全性。安全性是软件开发中最重要的方面之一。它在以太坊区块链中扮演着更重要的角色，原因如下图\
    \ [8-1] 所示：\n\n© Weijia Zhang and Tej Anand 2022  \nW. Zhang and T. Anand, *Blockchain\
    \ and Ethereum Smart Contract Solution Development*,  \n[`doi.org/10.1007/978-1-4842-8164-2_8`](https://doi.org/10.1007/978-1-4842-8164-2_8#DOI)\n\
    \n![图 8-1: 区块链安全与传统 IT 安全相比的复杂性](img/index-331_1.jpg)\n\n### 第 8 章 安全注意事项\n\n\
    ***图 8-1.** 区块链安全与传统 IT 安全相比的复杂性*\n\n- **区块链的去中心化特性** – 任何编写并部署到区块链的代码都将在数千台机器上运行。任何人都可以访问并运行区块链代码。\n\
    - **补丁和可升级性的限制** – 由于区块链的不可变性，已部署的智能合约...\n"
- fmt: '# 区块链安全考虑


    区块链无法被修改。这增加了去中心化应用升级的难度。当在区块链应用中发现安全缺陷时，修补应用的成本很高，有时甚至需要对区块链进行分叉。


    - **无需信任且无需许可的环境** – 对于公有链而言，客户端节点和去中心化应用都对全球参与者开放。没有中心化机构来检查参与者的资质。也没有安全边界来阻止恶意参与者加入。


    - **区块链的隐私性和匿名性** – 区块链用户可以保持匿名。智能合约函数无法检查用户资料。黑客可以实施区块链攻击，获取资产，并保持身份不明。


    - **对业务的高价值影响** – 智能合约通常代码量较小。较大的项目可能有数千行代码，而其他项目可能只有几百行。智能合约管理着高价值的加密资产，每次攻击都可能给去中心化应用带来灾难性后果。一些去中心化应用因智能合约中的简单错误而遭受了巨大损失。


    过去已发现多起智能合约漏洞。我们可以将这些安全问题分类为功能性安全漏洞和可攻击性安全漏洞。功能性安全漏洞是明显的代码错误，可以通过正常交易并由善意用户导致资金损失。智能合约的功能性安全漏洞包括以下内容。


    ## 智能合约中的功能性安全漏洞


    ### 资金死锁


    这是一种安全漏洞，智能合约可以接收资金转账，但会无限期地将资金锁定在智能合约中。例如，智能合约可以实现一个`receive`函数来接收资金，但没有实现用于发送或转账的函数。在这种情况下，发送到智能合约的资金将由该智能合约拥有，但无法将资金转出。类似于黑洞，这是一种只进不出的情况。


    ### 资金泄漏


    这是一种功能安全漏洞，可能导致非特权用户泄漏资金。这通常是由于缺乏访问权限和权限检查造成的。例如，如果某个函数具有资金转账能力，但被声明为`public`且未验证用户对资金的拥有权，就可能造成安全漏洞。在`Solidity`智能合约编程中，有多个地方可以强制执行安全性，包括将函数的作用域设置为`public`或`private`，设置所有权访问权限，以及使用`require`和`assert`确保在继续执行下一行代码之前满足访问条件。当铸造或转移代币时，智能合约需要确保函数的调用者是所有者、管理员或该函数的授权用户。在智能合约中定义角色非常重要，每个角色都将具有有限的访问权限。以`CryptoKitty`为例，定义了四个角色，包括智能合约所有者、项目CEO、COO和CFO。对于`mint`函数，智能合约将铸造权定义给COO。你必须成为该项目的COO才能铸造NFT代币。还有一个`pause/unpause`函数，用于通过暂停智能合约的执行来处理紧急情况，该权限授予CEO。CFO可以执行与拍卖相关的其他操作。智能合约的所有者也是一个关键角色。通常，将智能合约部署到区块链的人默认是智能合约的所有者。此所有者可以随后将所有权转让给另一个用户、一个智能合约地址，甚至放弃所有权。由于智能合约的所有者拥有最高的访问权限，因此保护其私钥至关重要。'
