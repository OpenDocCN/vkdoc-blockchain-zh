- fmt: '# Chapter 3: Blockchain Components and Architecture


    Friends involved in the sales of comics wants to sell her *Archie* comics.


    We will now repeat the same process. Fatima will sell her comics, her friends
    will purchase the comics, we will have proof that Fatima indeed has the right
    to sell her comics, all the individuals who are purchasing the comics are authorized
    to spend the money to buy the comics, each sales transaction is recorded individually
    on a sheet of paper by all the individuals involved, and it is verified and validated
    that everyone is recording all the sales transactions correctly. Once ten sales
    transactions have been recorded, all the parties involved will once again try
    to come to consensus by solving a puzzle.


    This time, there is a twist though. The watermark that results after this puzzle
    is solved will have information in it from the first watermark. This time, let’s
    assume that Chen, another of Candice’s and Fatima’s friends, is the first to solve
    the puzzle. Chen will declare that they have solved the puzzle, make copies of
    their sheet of paper, and send these copies to everyone involved in the comic
    books sale. When people receive Chen’s sheet of paper, they will be able to quickly
    verify that Chen solved the puzzle correctly; they will also notice information
    from the watermark in the first sheet of paper from Marco in the watermark on
    the sheet of paper sent by Chen. This will be their clue that the sheet of paper
    sent by Chen needs to be attached to the sheet of paper from Marco.


    Chen’s sheet of paper is our second block, and it is attached to, or chained to,
    the previous block from Marco. We now have the first two blocks of our blockchain!
    Please note that if someone were to alter the sheet of paper from Marco, resulting
    in the watermark on that sheet of paper changing, they will also need to change
    the sheet of paper from Chen because this sheet of paper has information from
    the previous watermark. So now changing the first block is even more difficult.


    We can now imagine the earlier process repeating itself several times. After every
    ten sales transactions, a new sheet of paper with a watermark having information
    from the previous sheet of paper gets attached. In other words, more blocks are
    added to our blockchain. As more blocks are chained together, it becomes progressively
    harder to change the previous blocks. We can say with much confidence that each
    block in the blockchain is immutable, and all the transactions in any block cannot
    be altered. We can also see that there is an audit trail for all the sales transactions.
    We call this audit trail `provenance`.


    You might ask, what would happen to the sheets of paper where the parties were
    cheating? Well, if someone solves a puzzle on such a sheet of paper and sends
    it to everyone, two possible things could happen: (1) people might reject this
    sheet of paper because they will not be able to verify the watermark or the transactions
    on this sheet of paper, or (2) they will not be able to attach this sheet of paper
    to another sheet of paper because they do not have a sheet with a watermark that
    matches the information for the previous sheet’s watermark on this sheet of paper.


    This is how a blockchain maintains the accuracy and integrity of all its rules
    and data even though we cannot guarantee that all the participants in the blockchain
    are trustworthy. This is a very important point, and you must already be making
    the connection to Byzantine Fault Tolerance from [Chapter 2 and inefficiencies
    in our economy](https://doi.org/10.1007/978-1-4842-8164-2_2) because our systems
    do not ensure trust among the parties involved in a value exchange from [Chapter
    1](https://doi.org/10.1007/978-1-4842-8164-2_1).


    In this section, we have used a hypothetical example, with some fancy illustration
    too far … but please bear with me.'
