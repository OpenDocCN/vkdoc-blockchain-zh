    所示。这个哈希值被称为默克尔根哈希，它代表所有交易中包含的信息。因此，从某种意义上说，默克尔根过程将所有交易的体积缩减为这一个哈希值。任何交易的更改都会导致默克尔根哈希改变区块头，从而使该区块的哈希值无效。


