    ***Figure 2-7.** The process of digital signatures*


    ## Chapter 2 Overview Of Core Technologies Supporting Blockchain


    So far in this section, we have discussed how asymmetric key cryptography solves
    the limitation of a trusted secure channel requirement by symmetric key cryptography
    and how digital signatures solve the limitation of the lack of a foolproof guarantee
    of the identity of the sender of asymmetric key cryptography.


    We are not yet done though!


    Digital signatures as we have described them so far also have a limitation. They
    are slow, and they create an enormous amount of information. We are sending double
    the amount of data, and our networks and transmission are not free. If digital
    signatures are implemented as we have described them so far, they will be expensive
    and slow and result in delays due to network latency.


    `Hashing` is a technique that can help us address this limitation with digital
    signatures. To get a good sense of what `hashing` is, let’s start by looking at
    mathematical functions.


    In general, a mathematical function works like this: You give an input `x` to
    a function `f`, and you will get output `y`. We say `y` is equal to `f` of `x`.
    If the function was square root, we would get the square root of `x`. If `x` equals
    to 9, then `f` of `x`, where `f` is square root, will lead to `y` being 3 (actually,
    + or - 3).


    Figure 2-8 provides a classification of functions into two types. They can be
    two-way maps or one-way maps. Two-way maps are functions where given `x`, we can
    get `y` and given `y`, we can get `x`. For one-way functions, given `x`, we can
    get `y`, but given `y`, we cannot get `x`. Functions like `Sum` and `Average`
    are examples of one-way functions.


    ![](index-67_1.png)


    ## Chapter 2 Overview Of Core Technologies Supporting Blockchain


    ***Figure 2-8.** Types of functions*


    One-way functions are also called reduce functions because the output represents
    a reduction of several inputs into one output. Encryption and decryption are two-way
    map functions where we can take plain text, encrypt it to get ciphertext, and
    then decrypt the ciphertext to get back the plain text. `Hashing` is a one-way
    reduce function. What `hashing` does is reduce the data volume and storage of
    the input. No matter the length of input, a hash function will produce a fixed
    length output. Relational databases, for example, have hashed indexes, and these
    indexes speed up search, inserts, updates, and deletes in the database.


    The best thing about `hashing` is that it is an extremely scalable high-performing
    function. We say that these functions have a complexity `O (1)`, pronounced as
    Big 0-1\. Big 0-1 means that the hashing algorithm is going to perform at the
    same speed no matter the size of the input.


    Let’s take a simple example of a hash function. Let’s say we have three strings
    – `ABC`, `DEFG`, and `GHI`. You can see that these strings are not of equal length.
    For our hashing function, we are going to map `A` to 1, `B` to 2, `C` to 3, and
    so on. We will add the numbers that our letters are mapped to in a string and
    then apply the `mod` function. The `mod` function takes two numbers as input and
    returns the remainder when the first number is divided by the second number. So
    `a mod (6,5)` will return 1 – when 6 is divided by 5, we get 1 as a remainder.
    For our example strings, to hash `ABC`, we are going to sum `ABC` to get 6, and
    then we will do a `mod (6, 5)` to get a 1\. So the hash of `ABC` is 1\. The hash
    of `DEFG` is 2 – `DEFG` sums to 22, and `mod (22, 5)` gives us 2\. Similarly,
    the hash of `GHI` is 4\. Table 2-3 is a summary of the hashed values.

