    This section has provided an in-depth description of how Bitcoin works. While
    the technical details were simplified, no important technical details were omitted.
    Next, we examine the economics of Bitcoin.


    ## Bitcoin Economics


    In the previous section, we have described the structure of transactions in Bitcoin,
    how transactions are validated, the mining process used to create blocks, and
    the process used to add blocks to the blockchain. We also discussed how when a
    miner creates a block, they are compensated through the `coinbase` transaction
    that includes transaction fees and a block reward. The block reward results in
    the "creation," "minting," or "mining" of new Bitcoins.


    One of the design goals that Nakamoto had when the Bitcoin blockchain network
    was created was to limit the supply of Bitcoins. This was motivated by the point
    of view that the power governments have over the money supply is abused by expanding
    the supply of money. This was considered inflationary, and it was felt excess
    supply can lead to the debasement and devaluation of a currency. So not only did
    Nakamoto intend Bitcoin to be free from government intervention, but in order
    to protect the value of Bitcoin, Nakamoto limited the supply of Bitcoins. The
    Bitcoin software is designed such that only 21 million Bitcoins will ever be minted.


    The smooth and trustworthy operation of the Bitcoin network depends on mining
    nodes volunteering to expend their compute power, their electricity, and other
    resources to create new blocks. Because miners expend resources, they are compensated
    with the block reward through the `coinbase` transaction. When Bitcoin was launched
    in 2008, this block reward was 50 Bitcoins. The Bitcoin software "halves" this
    reward after the creation of 210,000 incremental blocks or approximately every
    four years as shown in Figure 5-7.


    ***Figure 5-7.** Bitcoin block reward halving*


    In 2012, the block reward was halved to 25 Bitcoins. In July of 2016, it was reduced
    to 12.5 Bitcoins, and on May 11, 2020, at around 3 p.m. Eastern time, the reward
    was reduced to 6.25 Bitcoins. By 2140, we will reach the 21 million Bitcoin limit
    in the Bitcoin software. From that point onward, there will be no more block reward
    for miners. The only compensation that will be available to miners for the resources
    they expend on mining will have to come from transaction fees.


    When there is no more block reward, we say that Bitcoin has reached equilibrium
    economics.


    Let us do some simple mathematics to understand how much the mining process might
    be costing the economy. We already know that we create a block every ten minutes.
    That means we create six blocks an hour; that means we create 144 blocks a day;
    and that translates to 52,560 blocks being created each year as shown in Figure
    5-8.


    ***Figure 5-8.** Bitcoin economics*


    With the block reward per block of 50 Bitcoins per block for the first 210,000
    blocks, we can calculate that approximately 10 million Bitcoins were mined for
    the first four years. Approximately 5 million Bitcoins were mined for the next
    four years and so on. At the current US dollar-to-Bitcoin conversion rate, this
    is equivalent to tens to hundreds of billions of dollars in wealth being created
    for miners.


    That''s a lot of money. That''s how big this Bitcoin economy can be, and it kind
    of makes you pause and think whether this is sustainable. Is this something that
    can go on? Will volunteer miners continue to create blocks if the only compensation
    they receive is transaction fees? Will the transaction fees be low enough to support
    value exchange? Will I ever'
