- fmt: '除了比特币，以太坊也是公有无许可区块链的一个例子。我们将在第[5](https://doi.org/10.1007/978-1-4842-8164-2_5)章中了解更多关于以太坊的内容，然后本书的第二部分将专门讨论以太坊。


    如前所述，由多个工具和框架组成的超级账本生态系统是最著名且最成功的私有许可区块链实现。我们将在第[5](https://doi.org/10.1007/978-1-4842-8164-2_5)章中对超级账本进行一个非常高级别的概述。


    企业以太坊和瑞波是私有无许可区块链的例子。在私有无许可区块链中，参与者在加入网络之前需要获得许可，并被授予访问特定功能的权限，例如创建和验证区块（参与共识）。以瑞波为例，为了创建和验证区块，形成了一个验证者网络[.7](#index_split_001.html#p112)。在私有无许可区块链中，各方可以匿名进行交易。企业以太坊是以太坊的一个版本，供企业开发基于区块链的应用程序。


