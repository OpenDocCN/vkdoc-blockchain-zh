    # 区块链的商业与经济驱动力


    ## 基于现金的法定货币交易


    ## 7. 数据安全风险


    专有的集中式数据存储库对恶意行为者而言是极具诱惑的攻击目标，便于其入侵并窃取数据。


    **交易结算时间** – 根据交易类型和行业的不同，交易结算可能需要数天、数周甚至数月。例如，美国境内的现金转账结算需要 1 到 3 个工作日。同样，信用卡交易结算也需要
    1 到 3 个工作日。跨境现金转账的结算时间则取决于转账金额、汇出国和汇入国，通常需要 5 到 14 个工作日。此外，一些医疗交易从价值交换点到完全结算，耗时长达六个月的情况也并不罕见。类似地，企业间一些涉及供应链的交易，完全结算至少需要三个月，有时甚至长达一年。漫长的结算周期导致了效率低下：企业不得不保留比实际需求更多的现金流来“支撑”业务运营；未结算的资金成为闲置资产，无法有效利用；汇率波动给交换的价值带来不确定性；此外，部分交易会因不可预见的技术（或其他）原因而最终失败。这些由结算周期过长引发的问题，也迫使企业在结算过程中投入人力来追踪交易进程。


    **支付给第三方的费用** – 像 Visa、Mastercard 和美国运通这样的信用卡处理公司，会收取交易金额 1.3%至 3.5%的费用来处理交易（Daly,
    2021）。据 Statista（2021）数据显示，2019 年美国信用卡交易总额为 3.96 万亿美元。这并非企业支付的唯一费用。他们还需要向支付处理商、交换费、评估费和处理费缴纳一定比例的费用（Daly,
    2021）。大多数企业会通过提高商品价格的方式将这部分成本转嫁给消费者，在某些情况下，企业还会将这些费用作为交易的附加费单独列出。电汇（Napoletano,
    2020）以及其他银行间转账同样存在类似的费用。消费者可能无法完全了解所有这些费用。除了这些显而易见的费用支出外，企业还会产生额外的成本，包括：与第三方维护合同和合同关系的费用；追踪和核对费用的劳动力成本；数据传输基础设施的搭建和维护费用；以及因数据共享带来的安全和保密风险的管理成本。虽然我们可以认为在一个经济体中促进交易本身是价值增值，但严格从效用角度来看，这些公司之所以能创造价值，仅仅是因为现有的交易机制无法让互不信任的企业之间实现有保障的交易。


    **与数据相关的低效率** – 此前，我们已经阐述了为何我们当前的经济体系会导致企业创建并维护其专有数据。这里，我们将描述由此产生的经济低效问题。为了方便学生记忆这些经济低效点，我们创造了三个以“R”开头的词来对其进行归纳。这三个“R”分别是：冗余工作（Redundant
    work）、返工（Rework）和对账工作（Reconciliation work）。


    专有数据导致参与交易的多个方重复进行相同的工作，浪费了本可用于其他能提高生产力的事务上的精力。让我们看几个冗余工作的例子。在医疗系统中，所有医疗机构都需要核实那些有权在该机构工作的临床医生的资质。一位临床医生通常需要从能够证明其资质真实性的机构处收集所有资质证明，然后提交给……

