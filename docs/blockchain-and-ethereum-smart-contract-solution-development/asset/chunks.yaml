    \ _____ 可靠、安全和可信。  \n    a. 更  \n    b. 更不  \n    c. 一点也不\n\n## 第 2 章 支撑区块链的核心技术概述\n\
    \n### 边栏 – 关键分布式系统术语与定义\n\n- **节点：** 分布式系统中的任何参与者。\n- **网络：** 分布式系统中节点之间的连接。\n\
    - **分区：** 节点间网络中的任何中断。\n- **分区容错性：** 系统对分区的弹性/鲁棒性。\n- **故障（或失效）：** 系统中的任何错误，包括设备故障、软件故障（含软件缺陷）以及通信协议故障。\n\
    - **拜占庭故障：** 当组件发生故障时，关于组件是否已故障的信息不完善。\n- **拜占庭容错：** 任何用于对拜占庭故障具有鲁棒性/弹性的机制。示例包括共识协议以及错误检测/纠正机制。\n\
    - **可用性：** 数据（也称为状态）始终可观察（或可测量）并可更新。\n- **扩展/可扩展性：** 无论网络中节点（或用户）数量如何，操作执行时性能不会下降。\n\
    - **副本：** 数据和/或状态的复制是分布式系统的基本组成部分。共享数据和/或状态的机制定义了分布式系统。\n- **原子性：** 原子事务是一系列不可分割且不可缩减的操作，要么全部发生，要么什么都没发生。\n\
    - **一致性：** 每次操作后，所有副本都达到相同状态。\n- **严格一致性：** 每次操作后立即一致。\n- **最终一致性：** 随时间推移最终一致，但达到一致所需时间不确定。\n\
    - **活跃性：** 用户定期实际使用分布式系统；也就是说，分布式系统的状态或其中的数据定期发生变化。活跃性意味着有积极的使用。\n\n**参考文献**\n\
    \nLamport, L.，Shostak, R.，Pease, M. 拜占庭将军问题。摘自《并发：Leslie Lamport 著作集》。编辑 Malkhi,\
    \ D.。2019 年 10 月。第 203–226 页 [`doi.org/10.1145/3335772.3335936`](https://doi.org/10.1145/3335772.3335936)\n\
    \nBrewer, E. CAP 十二年之后：\"规则\"如何改变，《计算机》杂志，第 45 卷，第 2 期，第 23–29 页，2012 年 2 月，doi:\
    \ 10.1109/MC.2012.37\n\n## 第 3 章 区块链组件与架构\n\n区块链的四大组件协同工作，创造了缓解当前系统经济低效的巨大潜力，这些组件分别是：分布式账本、隐私保护、分布式系统共识算法以及智能合约。\n\
    \n**引言**\n\n区块链能够驱动巨大商业效益的核心能力包括：累积交易的分布式账本、拥有相同分布式账本副本并相互通信同步的计算机、限制身份仅向需要知道的人共享的隐私保护交易，以及将价值交换交易背后的条款编码到软件中，该软件可自动执行以确保交易有效完成。这些核心能力得益于来自密码学、数字签名、分布式系统以及对等网络的技术概念。\n\
