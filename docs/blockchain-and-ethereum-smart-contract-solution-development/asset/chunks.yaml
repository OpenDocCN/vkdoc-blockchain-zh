- fmt: "# Owner Account\n\nChapter 8: Security Considerations\n\n## Disabled Smart\
    \ Contract\n\nThis is another functional security hole where a non-privileged\
    \ user can call a function to kill the smart contract. This is another thing that\
    \ needs to be watched. In a smart contract, there might be a function that can\
    \ be executed to disable the whole smart contract by clearing the states, storage,\
    \ and settings. If this function is incidentally called, it will completely ruin\
    \ the smart contract.\n\n## Orphan Smart Contract\n\nWhen a smart contract is\
    \ deployed, the account that sends the deployment transaction is the owner, and\
    \ it has high privilege administration rights to the smart contract. Sometimes,\
    \ to increase the degree of decentralization, the owner might transfer the ownership\
    \ to another owner account, a smart contract, or denounce the ownership. Once\
    \ ownership of a smart contract is transferred or denounced after the deployment,\
    \ the original owner does not have the right to administer the smart contract\
    \ anymore. It is thus important to come up with a smart contract ownership plan\
    \ during the design process. Once the smart contract is deployed and ownership\
    \ transferred or denounced, there is no way to pause or upgrade the smart contracts\
    \ when an emergency situation arises in the decentralized applications.\n\n##\
    \ Attackable Security Holes in Smart Contracts\n\nThis kind of security breach\
    \ is caused by users with malicious intent. It is less obvious than functional\
    \ security holes and very difficult to be discovered. Hackers will normally need\
    \ to construct artificial transactions and carry out multiple steps of attacks.\
    \ The attackers also remain anonymous and have methods to transfer the funds.\
    \ These kinds of breaches can also include attacking blockchain nodes and Web3\
    \ clients and environments outside the smart contracts. Other breaches have also\
    \ happened with hackers doing the following: (1) calling faulty internal functions\
    \ with malicious transactions; (2) changing outside parameters and conditions\
    \ for a function call; (3) changing whitelist addresses and names; and (4) attacking\
    \ Oracle. The following are some examples of attackable security holes:\n\n###\
    \ Example 1: Pay bill to arbitrary accounts\n\nThe following is a code snippet\
    \ with a security hole:\n\n```solidity\npragma solidity ^0.8.6;\n\ncontract PayIssue\
    \ {\n    function payBill ( address payable recipient, uint256 x_amount ) public\
    \ payable {\n        recipient.transfer(x_amount);\n    }\n}\n```\n\nIn the preceding\
    \ code, there is a function called `payBill(address payable recipient, uint256\
    \ x_amount) public payable`. This `payBill` function when called will simply transfer\
    \ `x_amount` of Ether to the `recipient` address specified in the function. This\
    \ function is `payable`, which allows the funds to transfer to a receiver. `Payable`\
    \ is a new keyword in Solidity to specify whether a function or an address can\
    \ transfer or receive funds.\n\nOne main functional security error with this smart\
    \ contract is that it does not check the privilege of the users calling the function.\
    \ As this function is `public` and `payable`, anyone can call this function and\
    \ transfer funds to an arbitrary address they specify. In fact, users can call\
    \ this smart contract to deprive all the funds owned by the smart contract and\
    \ send them to the hackers address. A simple error in function access scope can\
    \ cause loss of assets and destroy an otherwise promising project.\n\n### Example\
    \ 2: No guarding of kill or selfdestruct function\n\nThere was a security incident\
    \ in which a `kill` function is coded in a smart contract but does not have privilege\
    \ checking and eventually caused 300 million in loss of funds. In a community\
    \ Telegram chat group, a transaction hash is posted. The message sender claimed\
    \ to be a newbie in Ethereum but had just sent a transaction to call a `kill`\
    \ function in a smart contract. Because the `kill` function does not check user\
    \ privilege, the function call was executed and effectively reset the storage\
    \ of the smart contract."
