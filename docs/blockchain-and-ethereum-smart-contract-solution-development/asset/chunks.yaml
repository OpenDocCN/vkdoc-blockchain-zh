    为了克服基于简单数字的`chainId`的缺点，可以使用一个 32 字节的`crosschainId`，为跨链 ID 添加更多信息，使其功能更强大。该`crosschainId`可以包含创世区块哈希和校验和，以便第三方应用程序和用户能够验证该跨链
    ID 对于特定区块链是否有效。


    `crosschainId`的规范已作为以太坊改进协议（EIP）3220 发布，如下所示。


