- fmt: '# Chapter 1 Business and Economic Motivation for Blockchain


    `started` becoming viable for widespread adoption in the business world.


    The first of these technologies was Enterprise Resource Planning (`ERP`) software
    with the release of the `R/2` system in 1992 and the `R/3` system in 1999 from
    SAP (Thomson, 2020). The second technology is what we now ubiquitously call the
    internet. The term “internet” was formally defined in 1995 (Leiner et al., 1997)
    even though the internet was already being commercialized. Some noteworthy early
    innovative companies that commercialized the internet were Yahoo and Amazon (both
    founded in 1994), Netflix (founded in 1997), and Google (founded in 1998).


    From a business standpoint, these collections of technologies provided two competing
    thrusts. The mainframe, relational database management systems, and `ERP` software
    appeared to create value by standardization and centralization. On the other hand,
    the personal computer and the internet appeared to create value by decentralization.
    As businesses adopted these technologies, they made design trade-offs that fit
    their worldview and culture to find the optimal point on the centralization-decentralization
    continuum. The business value for firms successfully adopting `ERP` software came
    from clarifying the strategic intent of a business and then relentlessly reengineering
    business processes and systems to match this strategic intent (Treacy and Wiersema,
    1995). The business value for firms successfully adopting the internet came from
    also clarifying strategic intent and then relentlessly digitizing, streamlining
    business processes (akin to reengineering), and globalizing to increase margin,
    reduce costs, and increase share of wallet (Porter, 2001).


    We have been working with these technologies across several businesses for the
    last 30 years, and even after all these years, successful adoption for `ERP` software
    and the internet is still a work in process. These two technologies are also rapidly
    converging with `ERP` software increasingly available as a Software as a Service
    (`SaaS`). During our time working with companies to adopt these technologies,
    there are a few “truisms” that we have come to understand about these technologies.


    First, these technologies have achieved success by either preserving the existing
    power structures or by creating new sources of power that started off as egalitarian
    but ended up becoming highly centralized and controlling. For example, both `ERP`
    and internet implementations did very little to change the power dynamic between
    a business and its suppliers or customers. `ERP`s were usually internally focused,
    and to obtain executive sponsorship and deal with change management issues, they
    tended to strengthen existing power centers within a firm. The internet initially
    created a sense that power would shift to customers by creating transparency and
    access to information; however, it ended up creating new sources of power with
    centralized platforms such as Facebook, Amazon, Google, Uber, and Airbnb. We are
    only now beginning to grapple with the unintended consequences of these new sources
    of power.


    Second, it is not clear if these collections of technologies improved productivity
    by reducing work. It is clearer that productivity was improved by shifting work
    to settings where it could be done cheaper, or by streamlining (and even automating)
    the flow of information, or by shifting work to customers by making them feel
    that they had more control.


    Third, the goal of these technologies was data sharing and information exchange
    ostensibly to eliminate information silos, promote interoperability, and optimize
    business planning. While this was a laudable goal and drove operational efficiency,
    the benefits flowed disproportionately to the most powerful firms in the supply
    chain since'
