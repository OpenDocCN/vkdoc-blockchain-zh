    # 第 11 章 构建团队项目


    前面的例子展示了如何构建一个添加跨链 ID 的网页，以与已部署的智能合约进行交互。也可以为其他功能构建类似的页面，例如列出跨链 ID、修改`chainId`信息、批准或撤销跨链
    ID 等。


    ## 安全审查


    安全性需要考虑许多因素。应遵循[第 8 章](https://doi.org/10.1007/978-1-4842-8164-2_8)中的安全指南。智能合约中的每个功能都应有权限检查。例如，在修改跨链
    ID 信息时，应检查请求者，确保其为跨链 ID 的原始注册者。第二个检查是跨链 ID 的状态应处于`"Pending"`状态。如果跨链 ID 处于`"Verified"`或`"Revoked"`状态，则其信息不能被修改。


    另一个重要方面是确保只有管理员才能批准或撤销跨链 ID 的注册。该管理员可以是一个单一账户，也可以是联盟中的多签账户。管理员可以将其所有权转移给另一个账户。


    除了智能合约的安全性，还应对网页的安全性进行评估。对于要部署到生产环境的服务，最佳实践是进行安全审计和白盒测试，以确保不存在重大安全漏洞。


    ## 部署至测试网


    在编写智能合约和网页图形界面的代码时，开发者可以拥有一个开发系统和本地网络服务来测试项目。本地开发完成后，可以将其部署到公开的测试网供外部用户测试。以太坊测试网有多种选择。以太坊区块链有四个流行的可用测试网，包括
    Ropsten、Kovan、Rinkeby 和 Goerli 测试网。这里提到的所有测试网都使用权威证明（POA）共识，并且比主网更快。要使用这些测试网，首先将
    MetaMask 钱包连接到您希望部署智能合约的测试网（图 11-8）。测试网已添加到 MetaMask 中。如果您看不到列出的测试网，只需单击“显示/隐藏测试网”以打开配置小部件，并将“显示测试网”设置为“开”。


    ***图 11-8.** 通过 MetaMask 连接以太坊主网或测试网*


    将 MetaMask 钱包设置为指定的测试网后，测试人员需要获取一些测试以太币来测试 dApp。这些测试网都通过专用的水龙头提供少量用于测试目的的以太币。水龙头地址和区块浏览器
    URL 如下所示（图 11-9）：


    ***图 11-9.** 以太坊测试网水龙头地址*


    一旦智能合约部署到测试网，并且网页设置为访问该智能合约，项目团队就可以宣布进行 alpha

