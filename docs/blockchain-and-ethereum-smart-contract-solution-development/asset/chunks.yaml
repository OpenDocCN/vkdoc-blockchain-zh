- fmt: 'Let''s now step back and look at the components of Bitcoin as shown in


    Figure[5-2.](#index_split_003.html#p180)


    ***Figure 5-2.** Components of Bitcoin*


    - First, let’s examine a transaction.


    The transaction, as in the example we just saw, was from Alex to Sonia; it had
    Alex''s public key, and it had Sonia''s public key; the transaction was signed
    by Alex''s private key, and the condition for Sonia to spend the money was that
    she needs to have access to her private key, and if she does, then she can spend
    the money.


    - Next, let’s look at a block.


    A block is a list of transactions with a block header that contains information
    about all the transactions in that block.


    - A block chain is several blocks that are connected together.


    The key aspect of blockchain is that the block header for block `N` has the hash
    that was discovered for block `N minus one`, and the block header for block `N
    plus 1` will have the hash that was discovered for block `N`. This is how blocks
    are connected in the blockchain. With these connections in place, any change that
    is made to any one of the transactions in block `N minus 1` will change its hash,
    which will then require that we discover the hash for block `N` and block `N plus
    1`. Since discovering the hash takes computational power, any change in a block
    after blocks have been chained to it is extremely difficult, if not impossible.
    This is what gives blockchains the property of immutability or tamper resistance
    (Yaga, Mell, Roby & Scarfone, 2018). [4](#index_split_003.html#p181)


    - Any node in a Bitcoin implementation has four software components.


    These four components are the `Wallet`, the `Distributed Ledger`, the `Miner`,
    and the `Network`.


    The `wallet` software component is responsible for formatting the transaction,
    maintaining custody of the public and private keys of the owner, and interfacing
    with the distributed ledger to perform simple verification of transaction inputs.


    The `distributed ledger` software component manages the blockchain and provides
    other software components an interface with the blockchain and the data in the
    blockchain.


    The `miner` software component interfaces with the blockchain and executes the
    computational processes to discover the hash for a block.


    The `network` software component is responsible for the peer-to-peer communication
    of transactions and blocks with peer Bitcoin nodes.


    A Bitcoin node can choose to execute all these four software components, or it
    can choose just to have the `wallet`, or the `distributed ledger`, or the `miner`
    software component. A Bitcoin node can also choose one or more combinations of
    these software components. All Bitcoin nodes, however, need to include the `network`
    software component.


    This flexibility is in concert with the peer-to-peer networking ethos of Bitcoin.
    Needless to say, Bitcoin software is open source software that is free to download
    and relatively easy to install. [5](#index_split_003.html#p182) It does not require
    the purchase of any special purpose hardware. All one needs is a (any) computer
    and an internet connection.


    Next, we look at the structure of the Bitcoin transaction in more detail.


    Table[5-1](#index_split_003.html#p183) shows the salient fields of the Bitcoin
    transaction data structure.


    ***Table 5-1.** Bitcoin transaction data structure*


    | Name of field | Description of the field |

    | :--- | :--- |

    | `tx_in_count` | the number of inputs into a transaction. |

    | `tx_in` | the structure for each input that is part of this transaction |

    | `tx_out_count` | the number of outputs from a transaction |

    | `tx_out` | the structure for each output from this transaction |'
