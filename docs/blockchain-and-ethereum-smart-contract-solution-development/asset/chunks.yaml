    **CHAPTER 6**


    **Ethereum Architecture**


    **and Overview**


    **Introduction**


    The Ethereum blockchain is a fascinating platform that uses innovative


    smart contract capability to empower decentralized applications in


    almost all major business sectors. Pioneered by Vitalik Buterin and several


    cofounders, Ethereum has gone through the milestones of initial launch,


    stable coins, ICO (Initial Coin Offering), DeFi (Decentralized Finance),


    DAO (Decentralized Autonomous Organization), NFT (nonfungible


    tokens), and L2 (Layer 2) for scalability. The Ethereum blockchain and


    infrastructure are transitioning to POS (proof of stake) with sharding and


    are on the way to impose big impacts on CBDC (Central Bank Digital


    Currency) and enterprise blockchains with promising potential. After


    years of astronomical growth, Ethereum has reached a market cap of $400


    billion, just trailing behind Bitcoin. Compared with bitcoin, the Ethereum


    blockchain has advantages such as supporting the Ethereum Virtual


    Machine (EVM) and smart contracts, supporting more diverse use cases,


    and being more nimble by changing consensus from POW to POS to save


    energy costs.


    © Weijia Zhang and Tej Anand 2022


    W. Zhang and T. Anand, *Blockchain and Ethereum Smart Contract Solution Development*,


    [https://doi.org/10.1007/978-1-4842-8164-2_6](https://doi.org/10.1007/978-1-4842-8164-2_6#DOI)


    ![](index-221_1.jpg)


    Chapter 6 ethereum arChiteCture and Overview


    Ethereum is a complex and dynamic platform that has been


    consistently expanding. Learning the Ethereum blockchain is not easy.


    It takes tremendous effort to truly understand Ethereum architecture


    and master the skill set for carrying out smart contract and decentralized


    application development. To lower the barrier of learning of the Ethereum


    blockchain platform, we separate the content of this part of the book into


    three tracks as shown in Figure [6-1](#index_split_003.html#p221). The first track
    is business oriented with focus on an overview of Ethereum, its ecosystems, decentralization,
    and


    token economy design. The second track is for technical programming


    to develop a smart contract project and covers Ethereum architecture,


    Solidity programming, debugging, testing, security checking, and


    deployment. The third track is a project track to build and deliver a hands-


    on decentralized application from user requirement to token design, to


    blockchain smart contract and client implementations.


    ***Figure 6-1.** Three tracks/pillars for Ethereum smart contract*


    *development*


    ![](index-222_1.jpg)


    Chapter 6 ethereum arChiteCture and Overview


    Both business and technical track contents will be covered in


    subsequent chapters. This chapter is focused on the following three main


    topics: (1) Ethereum architecture and its components; (2) Ethereum


    ecosystem projects; and (3) Ethereum tools required for smart contract


    development.


    **Ethereum Architecture**


    There are different ways to present the Ethereum blockchain architecture.


    One of the architectural representations is developed by the Enterprise


    Ethereum Alliance (EEA) and shown in Figur[e 6-2](#index_split_003.html#p222).
    Similar to the


    Open Systems Interconnection (OSI) that models internet network


    representation into seven layers, the EEA divides Ethereum architecture


    into five layers containing network, core blockchain, enterprise


    components, tooling, and applications layers.


    ***Figure 6-2.** Ethereum blockchain components architecture and*


    *overview*


    Chapter 6 ethereum arChiteCture and Overview


    **Network Layer**


    The network layer located at the bottom of the architectural diagram is


    exactly the same as the TCP/IP/P2P internet network. Although sometimes


    people view blockchain as a new generation of internet, the Ethereum


    blockchain itself does not change anything on the network level. The


    network layer provides three key capabilities for the Ethereum blockchain:


    discovering blockchain, communicating with network nodes, and


    managing peer nodes.'
  trans: "\n# 第 6 章\n\n## 以太坊架构与概述\n\n### 简介\n\n以太坊区块链是一个极具吸引力的平台，它利用创新的智能合约能力，为几乎所有主要业务领域的去中心化应用赋能。由**维塔利克·布特林**及多位联合创始人开创，以太坊经历了初始发布、稳定币、ICO（首次代币发行）、DeFi（去中心化金融）、DAO（去中心化自治组织）、NFT（非同质化代币）以及用于扩展性的\
    \ L2（第二层）等里程碑。以太坊区块链及其基础设施正过渡至采用分片技术的 POS（权益证明），并有望对 CBDC（中央银行数字货币）和企业级区块链产生重大影响，潜力巨大。经过数年的飞速增长，以太坊的市值已达到\
    \ 4000 亿美元，仅次于比特币。与比特币相比，以太坊区块链具有支持以太坊虚拟机（EVM）和智能合约、支持更多样化的用例、以及通过将共识机制从 POW 改为\
    \ POS 来节约能源成本从而更具灵活性的优势。\n\n© Weijia Zhang and Tej Anand 2022  \nW. Zhang and\
    \ T. Anand, *Blockchain and Ethereum Smart Contract Solution Development*,  \n\
    [`doi.org/10.1007/978-1-4842-8164-2_6`](https://doi.org/10.1007/978-1-4842-8164-2_6#DOI)\n\
    \n![](img/index-221_1.jpg)\n\n以太坊是一个复杂且动态的平台，一直在持续扩展。学习以太坊区块链并非易事。真正理解以太坊架构并掌握进行智能合约和去中心化应用开发所需的技能，需要付出巨大的努力。为了降低以太坊区块链平台的学习门槛，我们将本书此部分的内容分为三条主线，如图\
    \ 6-1 所示。第一条主线以业务为导向，侧重于以太坊概述、其生态系统、去中心化以及代币经济设计。第二条主线面向技术编程，用于开发一个智能合约项目，涵盖以太坊架构、Solidity\
    \ 编程、调试、测试、安全检查和部署。第三条主线是一个项目实践线，用于构建并交付一个动手的去中心化应用，涵盖从用户需求到代币设计，再到区块链智能合约和客户端实现的全过程。\n\
    \n***图 6-1.** 以太坊智能合约开发的三大主线/支柱*\n\n![](img/index-222_1.jpg)\n\n业务和技术主线的内容将在后续章节中介绍。本章主要聚焦于以下三个主题：（1）以太坊架构及其组件；（2）以太坊生态项目；（3）智能合约开发所需的以太坊工具。\n\
    \n### 以太坊架构\n\n有多种方式可以呈现以太坊区块链的架构。其中一种架构表示由企业以太坊联盟（EEA）开发，如图 6-2 所示。类似于将互联网网络表示建模为七层的开放系统互连（OSI）模型，EEA\
    \ 将以太坊架构分为五层：网络层、核心区块链层、企业组件层、工具层和应用层。\n\n***图 6-2.** 以太坊区块链组件架构与概述*\n\n### 网络层\n\
    \n位于架构图底部的网络层与 TCP/IP/P2P 互联网网络完全相同。尽管有时人们将区块链视为新一代互联网，但以太坊区块链本身并未在网络层面上做出任何改变。网络层为以太坊区块链提供了三项关键能力：发现区块链、与网络节点通信以及管理对等节点。\n"
- fmt: '# Ethereum Architecture and Overview


    Ethereum is a permissionless public blockchain, which means that any client node
    can join the Ethereum blockchain without a centralized authority. Each client
    node can be identified through a public and private key pair through secp256k1
    elliptic curve cryptography. The client node’s private key is also called `nodeKey`,
    and the public key is called `nodeId`. The `nodeKey` is used to sign the communication
    packets, and the public key is used to verify the signed messages by the peers
    to ensure the packets have not been tampered with. `nodeId` can also be appended
    with the IP address and port number of a node to form an entry called an `enode`.
    `enode`s are used as client nodes’ public identifiers for peer-to-peer communications.


    Ethereum uses boot nodes to help client nodes discover the blockchain. When a
    client node starts up, it can take in inputs such as bootnode’s `enode` and maximum
    peer number. If no bootnode information is specified, the client will use the
    default bootnode in the Ethereum blockchain. Client nodes first connect to the
    bootnode and get the `enode` information of other peers and then start connecting
    with new peers to expand their peer pool. The default peer number for a client
    node is 25, and administrators can expand it to a larger number such as 256 or
    even 1024. Ethereum client nodes are connected through peer-to-peer pools to form
    the whole Ethereum blockchain.


    Once a client node joins the Ethereum network through peer-to-peer connection,
    it can start syncing up blocks, receiving and sending transactions, proposing
    new blocks, etc. Ethereum client nodes are constantly downloading new blocks to
    their local data storage, so a fast network and a large disk space are needed
    for node operation. It is very important to safeguard `nodeKey`, as client nodes
    need to sign peer-to-peer communication packets with their `nodeKey`.


    Sometimes, peer pools are not connected properly due to lack of peers, slow network
    of peers, or even malfunctioning peers. In that case, client node administrators
    can manually add or delete peers in their own peer pool. The number of peers connected
    and the peers’ information can be retrieved using Web3 APIs.


    ## Core Blockchain Layer


    One of the key technical innovations of blockchain lies in its core blockchain
    layer. There are three important components at this layer: consensus, EVM, and
    storage.


    One unique novelty of blockchain is its capability to reach computational consensus
    among participating nodes. The first blockchain consensus is POW, that is, proof
    of work, invented in the Bitcoin blockchain. POW consumes a lot of energy in computing
    cryptographic hashes through arrays after arrays of heavy computation machines
    in mining farms. Currently, the computing power of Bitcoin has consumed more energy
    than the electricity usage of a medium-sized country.


    Ethereum also uses proof of work for the current mainnet, but it is transitioning
    to proof of stake (POS) in Ethereum 2. The difference between proof of stake and
    proof of work is that proof of stake actually takes into consideration the amount
    of Ether staked in the Ethereum system, so that the more Ether staked, the higher
    chance to be selected to propose blocks.


    Besides POW and POS, there are other blockchain consensus such as POA and BFT.
    POA, proof of authority, is used more for enterprise blockchains or Ethereum testnets.
    Only authorized nodes whose `nodeId` is recorded in a whitelist configuration
    file can join the blockchain to propose blocks. For enterprise blockchains, there
    is BFT (Byzantine fault tolerant) consensus. This is a very well-adopted consortium
    blockchain consensus. With BFT, any node can propose a block, and the proposal
    will be accepted with a certain number of verification votes. For example, you
    can have ten nodes for a BFT consensus blockchain, and they will accept a block
    when three votes verify the block. You can also adjust the percentage.'
