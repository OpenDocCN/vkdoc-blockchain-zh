    # 3 本节的优秀阅读参考资料为门格尔（1892 年）的著作。


    # 第 1 章 区块链的商业与经济动机


    在个体#1 与个体#2 之间，用*x*单位的某种商品换取*y*单位的另一种商品，这构成了**汇率**。我们在此描述的交易被称为以物易物。


    举个例子，假设我是个体#1，有几条面包但没有黄油；而我的朋友是个体#2，有几块黄油但没有面包。如果我们进行交换——我送给他一些多余的面包换取黄油，比如我用半条面包换取四分之一块黄油——那么双方都会受益，处境变得更好。用半条面包换取四分之一块黄油的汇率，就代表了我和朋友之间感知并达成共识的面包与黄油的相对价值，而汇率正是构成这份合约的唯一条件。一旦我拿到黄油，朋友拿到面包，我们的交易便完成了结算。


    让我们进一步拓展这个例子。此时我的朋友很想喝茶。他认识另一个有多余茶叶的人（个体#3）。个体#3 不需要黄油，但他愿意用半磅茶叶换取一条面包。于是我的朋友先和我交换黄油与面包，现在他拥有了多余的面包，可以用一条面包换取半磅茶叶的汇率，来与个体#3
    交换茶叶。这是一个多方交换的实例。各自的汇率是构成我和朋友之间、以及朋友和个体#3 之间合约的唯一条件。现在，我们可以让情况更复杂一些，比如我根据对朋友茶叶需求程度的判断来调整汇率，但暂不讨论。表
    1-1 总结了这些交易以及商品所有权的变化，假设初始时我拥有 4 条面包，我的朋友拥有 4 块黄油，个体#3 拥有 4 磅茶叶。


    ## 第 1 章 区块链的商业与经济动机


    **表 1-1.** 简单的交换交易（以物易物）


    | **时间：t = 0**（起始点） | **时间：t = 1**（第一笔交易结算后） | **时间：t = 2**（第二笔交易结算后） |

    | --- | --- | --- |

    | 个体#1 拥有的商品 | 4 条面包 | 3.5 条面包，¼块黄油 | 2.5 条面包，¾块黄油 |

    | 个体#2 拥有的商品 | 4 块黄油 | ½条面包，3 ¾块黄油 | ½条面包，3 ¼块黄油，½磅茶叶 |

    | 个体#3 拥有的商品 | 4 磅茶叶 | 4 磅茶叶 | 3 ½磅茶叶，1 条面包 |


    现在，考虑到与个体#2 交易的过程，个体#1、#2 和#3 自然会得出结论：面包是比黄油或茶叶更易于被接受的交换商品。基于这一判断，他们也有理由认为，拥有多余的面包是值得的，因为面包可以用来交换其他东西。一般来说，如果某种商品稀缺且被大众看重，那么它就更有可能被接受为交换媒介。如果我们能找到一种人人都愿意接受作为交换媒介的商品，那么这种商品就可以被称为**普遍接受的交换媒介**。这便是货币定义的由来。在社会中，货币就是那种被普遍接受为交换媒介的商品。


    关于我们这个相当简化的例子，还有几点值得注意：


    1. 交换发生在个体之间——这些是点对点交换（关于这一点在技术层面的更多含义，请参考第[2 章](https://doi.org/10.1007/978-1-4842-8164-2_2)）。

    2. 没有第三方介入，因此结算交易无需支付任何费用。

    3. 可以合理推断，这种无需费用的点对点交换之所以可能，是因为个体#1 和#2 彼此认识且相互信任。

    '
- fmt: '# other and individual #2 and #3 knew and trusted each other.


    Various societies have been on a quest for goods that can serve as money. Different
    societies have used commodities such as gold, silver, and other precious metals
    as money. Yet other societies have used grains and other crops or shells as forms
    of money. In the prisons in the United States, cigarettes and ramen noodles get
    used as money. An interesting story about money comes from the island of Yap in
    the South Pacific, where a quartz-like crystal, called `rai`, was used as money
    (Bryan, 2004). `Rai` were mined from a neighboring island, and the people of Yap
    judged the value of `rai` based on how difficult and dangerous they thought it
    was to mine and transport the `rai`. People have referred to `rai` as the “original”
    Bitcoin (Dockrill, 2019).


    There are several challenges or drawbacks with money that is based on commodities.
    For one, commodities can be heavy and cumbersome to transport, making it difficult
    for parties to “send” money to each other. Commodity-based money can also be difficult
    to produce with production costs dependent on a host of factors such as weather,
    geography, and the cost of labor. All of these costs will vary over time and be
    different for different societies. Access to the commodity (or the level of scarcity)
    that is being used for money will also not be uniform across different societies,
    [4](#index_split_000.html#p26) leading to the possibilities that different societies
    end up using different commodities as their basis for money. Commodities can also
    be difficult to measure or evaluate in real time and on the spot. Over time, many
    countries settled on gold as a basis for money. Gold was scarce, it was highly
    desired, and it could be evaluated by its weight and purity by people with tools
    and expertise. However, gold has the other drawbacks of commodity money, so political
    authority by nations was used to create denominations of money (currency), in
    paper and coins. The value of the total amount of money in circulation was guaranteed
    by reserves of gold held by that nation. Over time, this backing of the gold reserve
    was removed, [5 and money](#index_split_000.html#p27) was guaranteed merely by
    the centralized political power of the nation that created the currency. We call
    currency backed by the political power of a nation as “fiat” [6 currency](#index_split_000.html#p27).
    So does the US government really decide what the value of a dollar is? Please
    see the sidebar [7](#index_split_000.html#p27) “What is $1 worth?” for discussion
    on this topic. Is a nation the only institution that issues fiat currency? Please
    see the sidebar - “Alternate Currencies” for a discussion on this topic.


    The discussion up to this point has equipped us to define the three fundamental
    properties of money now more formally:


    1. **Medium of exchange** – Money is something that is acceptable by everyone
    as a medium of exchange of transactions. This usually implies that money can be
    used repeatedly and has a long life (durable) and it can be carried and transported
    easily (portable).


    2. **Store of value** – People can assume that the value of their money will be
    stable; that is, it will not change or only change predictably over time.'
