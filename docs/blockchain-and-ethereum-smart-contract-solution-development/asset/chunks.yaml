- fmt: '• The second example we’ll look at is the blockchain sponsored by Walmart
    for food safety. This is also implemented in `Hyperledger`. It includes Walmart
    and all of its food suppliers. The goal is to track each food item from the farm
    to the store to the consumers. This not only improves the transparency and visibility
    of goods in the supply chain but also helps rapidly track the source of any health
    issue. In the past, if there was an *E. coli* breakout, it would take Walmart
    weeks to track down the source of the issue. This leads to food waste and uncertainty
    among consumers. Now, with this blockchain-based system, Walmart can track a breakout
    in hours and alert the public. This allows Walmart to only recall the product
    that is affected rather than unnecessarily wasting a lot more product.


    ## Blockchain Entertainment Applications


    In this section, we will describe the potential of blockchain applications in
    the arts and entertainment industry, or broadly, in the creative intellectual
    property industry.


    This industry as a whole, like healthcare, includes a lot of complexity where
    the relationship between the artist and the appreciator is mediated by several
    third parties ostensibly for the purpose of economies of scale, marketing, and
    branding. However, these third parties tend to take an enormous chunk of value
    out of the exchange between the artist and the appreciator, negatively impacting
    both the artist and the appreciator.


    Let’s take a look at the complexities:


    • Each piece of art, whether it’s music, audio, or any kind of intellectual property,
    can have multiple creators, and the remuneration among the multiple artists is
    usually quite complex.

    • Art can be distributed via multiple media with complex different remuneration
    arrangements, so somebody can have the rights to a particular media for a particular
    amount of time and for a particular geography. The rights of art are sliced and
    diced in ways that add to the inherent complexity of the remuneration.

    • There are usually two types of remuneration in the art industry: first, the
    acquisition of the original piece of art or intellectual property and second,
    the reuse remuneration, also known as royalties. Royalties can be paid when art
    is reused either in its entirety or when portions of it are reused.

    • There are also scenarios where some of the art is commissioned on a work-for-hire
    basis, and the remuneration of this kind of art can be even more complex.

    • Remuneration especially related to reuse, or royalties, can take months to be
    distributed.


    While the complexity of the remuneration creates a need for platforms and third
    parties for the efficient and scalable distribution of art, the third parties
    who are the owners of these platforms have outsized power over the artists. The
    platform tells artists what their royalty-related remuneration should be, and
    they can either take it as is or they can request an audit. Most audits can take
    an enormously long time, and in the audit, the data is completely controlled by
    the platform or by the third party giving them enormous amounts of power.


    The appreciator ends up being a passive consumer even though the value of art
    is directly created by its consumption by the appreciator. There is very little
    interaction happening between the appreciator and the artist, and the artist is
    really not controlling the relationship even though it might seem like they are.


    With this background, let’s look at the inefficiencies in the arts and entertainment
    industry.


    • Transactions take, what seems like, forever to settle. It is not uncommon for
    royalty-related transactions to take over a year to settle.

    • While third parties are needed for marketing and distribution scale, the balance
    of power is tilted disproportionately toward the third parties who control the
    platform.

    • Data is centralized and not shared, audit rights are cumbersome, and in most
    cases, efficient ledgers'
