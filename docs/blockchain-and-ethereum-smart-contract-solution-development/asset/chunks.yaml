    \n在本示例中，我们演示如何编写一个网页来与已部署的智能合约交互。为了使演示成为一个端到端的体验，我们执行以下操作将智能合约部署到开发环境。\n\n###\
    \ 步骤1：创建以太坊开发区块链\n\n通过下载`geth`应用并运行以下命令来创建以太坊开发区块链：\n\n```\n./geth --datadir test-chain-dir\
    \ --http --dev --http.corsdomain \"https://remix.ethereum.org,http://remix.ethereum.org\"\
    \n```\n\n此命令创建一个私有的开发区块链，并允许Remix开发工具与之交互。数据存储位于`test-chain-dir`中，并且默认会生成一个开发账户。该账户的密钥库位置位于`test-chain-dir/keystore`目录中。此地址和密钥库可用于管理该账户。\n\
    \n更多详情，请参考 [http://geth.ethereum.org/docs/getting-started/dev-mode](http://geth.ethereum.org/docs/getting-started/dev-mode)。使用`geth\
    \ attach <IPC_LOCATION>`连接到节点，并使用`eth.sendTransaction`从`coinbase`向目标账户发送交易。\n\n\
    一旦开发区块链启动，下一步就是将智能合约部署到其上。这里，我们开发一个具有两个函数`storeMessage`和`retrieve`的智能合约。\n\n```\n\
