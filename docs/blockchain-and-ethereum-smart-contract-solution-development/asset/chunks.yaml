- fmt: "# Solidity Unit Testing and Debugging\n\n## Special Test Functions\n\nThe\
    \ following special functions are available: `beforeEach`, `beforeAll`, `afterEach`,\
    \ and `afterAll`.\n\n```solidity\nfunction beforeAll() public {\n    // <instantiate\
    \ contract>\n    vs = new VariableScope();\n    // Assert.equal(uint(1), uint(1),\
    \ \"1 should be equal to 1\");\n}\n\nfunction checkNotEqual() public {\n    //\
    \ Use 'Assert' methods: https://remix-ide.readthedocs.io/en/latest/assert_library.html\n\
    \    address x1 = vs.x.address;\n    address x2 = vs.localVariable();\n    Assert.notEqual(x1,\
    \ x2, \"variables are supposed to be not equal\");\n}\n```\n\nIn the test suite\
    \ code, the source file is imported, and the `VariableScope` smart contract `vs`\
    \ is instantiated. Then the `checkNotEqual()` function is called to generate a\
    \ local and global variable `x` in `vs` and then make a comparison.\n\nThe test\
    \ suite is run in Remix and shows that it passes the Unit Test (Figure 7-14),\
    \ meaning that the global variable and local variable are indeed different even\
    \ though they have the same name.\n\n![Unit test run example](index-312_1.jpg)\n\
    \n**Figure 7-14.** Unit test run example\n\nUsing the Remix Solidity Unit Testing\
    \ plug-in, it is very easy to write scripts to test smart contracts.\n\nIt is\
    \ important to note that test files in the Solidity Unit Test plug-in will not\
    \ support functions with parameters. For smart contracts with parameters, there\
    \ should be a wrapper test file that will call the functions with parameters from\
    \ another function that does not have parameters.\n\nBesides the Remix plug-in\
    \ for unit testing, Truffle also has good unit test modules that support manual\
    \ and automatic testing. The workflow and functionality are similar to the Remix\
    \ plug-in.\n\n# Solidity Debug\n\nSometimes, Solidity smart contracts might encounter\
    \ issues during executions. It would be good to step through the execution of\
    \ each source code and analyze various debugging information such as call stacks\
    \ and local variable values. Solidity does have some debugging tools that can\
    \ help with this. Here, we introduce the Debugger plug-in for Remix.\n\n![Debugger\
    \ plug-in](index-313_1.jpg)\n\n## Enable the Debugger\n\nTo enable the Remix debugger,\
    \ simply open the Plugin Manager and type in `debugger` in the search box and\
    \ enable this plug-in (Figure 7-15).\n\n**Figure 7-15.** Enabling debugger plugin\
    \ in Remix\n\n## Launch the Debugger\n\nOnce the debugger is enabled, a bug-like\
    \ icon will show up in the plug-in panel. To debug a Solidity program, developers\
    \ need to compile a contract source code, deploy the smart contract to a local\
    \ EVM, and then create a transaction to get a transaction hash. After that, developers\
    \ can enter the transaction ID to the debugger configuration panel and start the\
    \ debugging process (Figure 7-16):\n\n![Launching Solidity debugger](index-314_1.jpg)\n\
    \n**Figure 7-16.** Launching Solidity debugger\n\n## Debug the Smart Contract\n\
    \nWhen the debugger is started, a debugging window as shown in the following will\
    \ pop up, and developers can step through the code to see the execution of each\
    \ line of code. The debugger supports step functions such as `step into`, `step\
    \ over`, and `step into breaking point`.\n\nThe debugger shows all the EVM execution\
    \ context, storage, and calling stack information including function stacks, Solidity\
    \ locals, Solidity state, step details, stack, memory, storage, call stack, call\
    \ data, global variables, return value, and full storage changes. Some of the\
    \ information might not be available, but the debugger generally gives a good\
    \ amount of bytecode execution information (Figure 7-17).\n\n![Stepping through\
    \ a debugging program](index-315_1.jpg)\n\n**Figure 7-17.** Stepping through a\
    \ debugging program\n\nOne thing that is not obvious with the debugger is how\
    \ to add a breakpoint. To add a breakpoint, simply open the source code in the\
    \ edit window and click at the line number (not the code).\n\n![Breakpoint lines](index-316_1.jpg)"
