- fmt: '# Boolean Type


    Operation of two boolean type variables will be true if either variable is true.


    Two boolean variables can also be compared. Two boolean variables are equal if
    they are both true or both false. Sometimes, a boolean variable can be conditionally
    checked in an `if` statement. `If(variable)` returns `true` if the variable is
    true, and `false` if the variable is false.


    Since a boolean variable consumes only one bit storage and there are multiple
    operations that can be used to operate on boolean variables, it is recommended
    that developers use boolean type rather than other data types if possible for
    storage efficiency.


    # Integer Type


    Integer data type is used to represent a positive integer (unsigned) or any integer
    (signed). In Solidity, the signed or unsigned integer can be in different sizes
    represented by the amount of bits allocated for an integer variable. For example,
    `uint8` means an 8-bit unsigned integer. `uint8` can hold values from 0 up to
    `2^8-1` (0–255). `uint256` can hold values from 0 to `2^256-1`. Between `uint8`
    and `uint256`, there are also various integer data types in incremental size increase
    of 8 bit (1 byte). Signed data types differ from unsigned ones as it can represent
    both positive and negative integers. For example, `int8` can hold values from
    -128 to 127 (range of `-2^7` to `2^7-1`). `int256` can hold values from `-2^255`
    to `2^255-1`. `int` can also have various sizes at an incremental step of 8 bit,
    such as `int8`, `int16`, `int24`, `int32` up to `int256`.


    If the bit number is not specified in the integer type, it is default to 256.
    `uint` and `int` are aliases for `uint256` and `int256`, respectively.


    Solidity also has built-in operators for integer type variables. This is shown
    in the following table (Figure 7-1):


    ***Figure 7-1.** Operators for Integer Datatype*


    Since smart contracts can be written to handle large sums of assets, it is important
    to ensure that the math is fully accurate. The boundary conditions and validity
    of inputs should be checked thoroughly. Many libraries have been written to let
    developers reuse the math components and to prevent hackers attacking smart contracts
    through security holes in math functions. For example, `SafeMath` is a good library
    to use to handle mathematics operations. Developers can download `SafeMath` libraries
    by OpenZeppelin and import the smart contract to use the class and functions in
    the library.


    # Address Type


    Address is a unique identifier of a crypto account in blockchains. Address type
    is a data structure that is not defined in conventional programming languages
    such as C or Java but is essential in smart contract programming languages. Ethereum
    blockchain uses a 20-byte hex value to represent a crypto address.


    When you create an account in Ethereum, three items are generated. The first item
    is a private key. This is the unique key to access the account and should be kept
    by the account owner and never revealed to other people. The second item is a
    public key that is used to represent the account and can be published. A public
    key can be used to encrypt a message, and only the private key can decrypt the
    message. The third item is an address derived from a public key. An address is
    actually a simplification of the public key. Simply apply `Keccak-256` hashing
    to the public key and then take the last 20 bytes; the output is the address for
    the account. Since each byte can represent two hex numbers, it is actually a hex
    string with 40 digits such as `0x1F2D3A67b8E96039BbAC84EB4BC0913c0c16778c`.


    In Solidity code, address data type is a representation of an asset account. When
    declaring an address variable, the developer needs to specify whether this address
    can receive external funds or not. This can be done by using the keyword `payable`.


    If an address is declared payable, it can receive funds sent to this address.'
