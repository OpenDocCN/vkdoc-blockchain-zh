    对每个区块链使用一个`chainId`对交易进行签名。这样，由 Alice 为以太坊主网（ETH）签名的交易就无法被重新发送到以太坊经典（ETC）链上，从而避免双重支付。


    在 EIP-155 中，部分`chainId`已预先分配，如下表所示（图 11-2）。要获取新的`chainId`，代表区块链社区的管理员需要访问`https://github.com/ethereum-lists/chains`，并提交一个拉取请求（pull
    request）来注册新的`chainId`。`chainId`的分配遵循先到先得的原则，以确保`chainId`不会发生冲突。


    **图 11-2.** 以太坊主网和测试网中定义的`ChainId`


    尽管 EIP-155 解决了不同区块链之间的重放攻击问题，但它也存在一些缺点，包括`chainId`是自行定义的，且未与区块链属性绑定。恶意用户可能会构建一个`chainId`与其他区块链相同的区块链。这可能导致跨链交易被发送到错误的目标区块链。另一个缺点是，当一条区块链分叉为两条区块链时（例如
    ETH 和 ETC），这两条区块链将具有相同的`chainId`，从而引发冲突。


