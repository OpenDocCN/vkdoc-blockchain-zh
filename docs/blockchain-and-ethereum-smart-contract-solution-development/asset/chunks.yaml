    \ 32字节`crosschainId`的定义\n\n## 原理\n\n我们考虑了多种替代规范，例如使用随机的唯一十六进制字符串来表示区块链。这种方法的缺点是，随机ID无法用于验证区块链的内在身份，例如创世区块的区块哈希。第二种替代方案是直接使用创世区块哈希作为跨链操作的区块链ID。其缺点是，此ID不包含区块链属性的信息，并且在区块链分叉为两条链时会出现问题。\n\
    \n## 向后兼容性\n\n`CrosschainId`与`EIP-155`向后兼容。跨链ID包含一个4字节的段，用于记录基于`EIP-155`的`chainId`。\n\
    \n## 安全考虑\n\n- **跨链ID冲突：** 两个区块链可能包含相同的跨链ID，从而导致资产被错误地转移到错误的区块链。\n  此安全问题通过将跨链ID的哈希与创世区块的哈希进行比较来解决。如果匹配，则跨链ID验证通过。如果不匹配，则将跨链ID与分叉区块哈希进行比较。如果没有区块哈希与跨链ID哈希匹配，则跨链ID无法验证。\n\
