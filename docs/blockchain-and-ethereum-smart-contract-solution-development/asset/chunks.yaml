- fmt: '# Blockchain Components and Architecture


    Each client, thus obfuscating its identity as well as segregating deposits from
    each client into different accounts, the public key of the client (the client
    may also choose a different public key for each party it transacts with, thus
    obfuscating its identity), the amount of money being deposited, and an authentication
    indicating two facts. First, that the client indeed has ownership of the money
    they intend to deposit. Second, the node initiating the transaction has access
    to the client''s corresponding private key for signing the transaction.


    2. The software on the client''s node will have the network addresses of one or
    more peer nodes that are executing the same software, and it will transmit the
    transaction to these nodes.


    3. The nodes that receive the transaction will validate the format of the transaction
    and verify that the transaction is authenticated based on the rules in the software.
    Each node then does two things. First, it transmits this transaction to other
    peer nodes whose network address it has. Second, it includes this transaction
    into a list of valid transactions it has previously received. This process continues
    until all peer nodes have received the transaction. If a node receives a transaction
    that it has previously received, then it will not transmit it any further. Please
    note that all the nodes do not receive the transaction at the same time, unlike
    our conceptual narrative earlier in the chapter.


    4. Concurrently, with the process of receiving, validating, and transmitting transactions,
    each node also selects a subset of valid transactions and starts the process of
    creating a block. The process of creating a block, the consensus protocol, is
    also called mining. This new block will include information about the previous
    block in the chain that this block needs to be connected to. Once a node successfully
    creates a block, it transmits the block to the peer nodes whose network address
    it has.


    5. Once a node receives a block, it validates whether the block has been created
    following the agreed-upon protocol and if all the transactions in the block are
    valid. If that is the case, then this node does four things: it transmits this
    block to the peer nodes whose network address it has (this process will continue
    until all the nodes have received the block; again, notice that all the nodes
    do not receive the block at the same time); it will append this block to the appropriate
    block in the blockchain on this node; it stops its current process of creating
    a block; and it starts the process of creating a new block with a subset of the
    remaining valid transactions (i.e., it will remove the valid transactions in the
    block that was just added to the blockchain from its list of pending valid transactions).


    6. It is only after the deposit transaction has been added to a block and the
    block has been appended to the blockchain that we can say that the deposit transaction
    has been completed. In other words, the money from the client is deposited at
    the bank in the client''s account.


    Steps 1 through 6 explain how transactions are created, how transactions are validated,
    and how transactions are communicated to all the nodes in a blockchain; how privacy
    of the parties involved in a transaction is maintained; how a subset of transactions
    are "packaged" into a block through mining or the execution of the consensus protocol;
    and how blocks are communicated to all the nodes in the blockchain. These steps
    explain how the narrative at the beginning of the chapter of creating a distributed
    ledger and making sure that all parties have the same copy of the distributed
    ledger is technically implemented.


    Steps 1 through 6 are also followed for other types of transactions such as withdrawals.
    Please also note that these steps can also be executed to transfer money between
    any nodes; that is, parties are not limited to transactions between banks, nor
    are they required to include the bank.'
