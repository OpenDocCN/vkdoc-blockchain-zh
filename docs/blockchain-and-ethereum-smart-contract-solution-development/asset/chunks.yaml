- fmt: "# Cryptography, Distributed Systems, and Peer-to-Peer Networks\n\n`cryptography`,\
    \ `distributed systems`, and `peer-to-peer networks` are essential for understanding\
    \ not only the immense potential that value exchange using blockchain provides\
    \ but also the design limitations of blockchain. It is this understanding of potential\
    \ as well as limitations that is critical to the successful implementation of\
    \ blockchain applications so that the economic inefficiencies that were described\
    \ in the first chapter can be mitigated.\n\n## Chapter Summary / Key Takeaways\n\
    \nKey takeaways from this chapter are as follows:\n\n- A business-level understanding\
    \ of the technology concepts related to `cryptography`, `distributed systems`,\
    \ and `peer-to-peer networks` is important to understand blockchain.\n- `cryptography`\
    \ requirements for data at rest can be met by symmetric key encryption mechanisms.\n\
    - `cryptography` requirements for data in transit can be met with asymmetric or\
    \ public/private key encryption mechanisms and digital signatures.\n- `Hashing`\
    \ is an important function used in conjunction with asymmetric key encryption\
    \ to optimize the amount of information that is communicated for digital signatures.\n\
    - `Distributed systems` purport to address real-world issues of complexity, failures,\
    \ and consistency with goals of scalability, fault tolerance, and meaningful consistency\
    \ semantics, respectively. `Distributed systems` use data partitioning, replication,\
    \ and consensus mechanisms to achieve these goals.\n- The `CAP theorem` postulates\
    \ that distributed systems can only achieve two of the three following characteristics:\
    \ strong consistency of data, high availability of data, and network partition\
    \ tolerance.\n- `Peer-to-peer networks` are egalitarian compute networks where\
    \ all peer computers or nodes have equal power and similar functionality.\n- A\
    \ `blockchain` is a peer-to-peer network of computers with design trade-offs across\
    \ the dimensions of scalability, availability, fault tolerance, and consistency.\n\
    \nIn the first two chapters, we have completed reviewing the economic potential\
    \ of blockchain and the core technologies (`cryptography`, `distributed systems`,\
    \ and `peer-to-peer networks`) that underlie blockchain implementations. In the\
    \ next chapter, we will start the process of describing how transactions are conducted\
    \ within a blockchain and provide a business-level description of the capabilities\
    \ within a blockchain, the notion of a distributed ledger, the categorization\
    \ of various blockchain implementations, and a summary of blockchain limitations\
    \ that should be taken into account when implementing blockchain applications.\n\
    \n## Quiz Questions\n\n1. Take the plain text `\"PIZZA BY THE BEACH\"`, and use\
    \ the `Offset the Alphabet by 4 letters` algorithm as our encryption technique\
    \ to generate the ciphertext. What is the resulting ciphertext?\n2. Please review\
    \ a clip from the movie *The Imitation Game* at [www.youtube.com/watch?v=mwFWMM9APLs](http://www.youtube.com/watch?v=mwFWMM9APLs)\
    \ and answer the following questions:\n   a. What is the cipher that the Germans\
    \ use? Was it a hardware cipher or a software cipher?\n   b. How often were the\
    \ Germans changing the key used with this cipher?\n   c. How did Alan Turing and\
    \ his team crack the key for the cipher?\n   d. Why was the computer `\"Christopher\"\
    ` able to find the key for the cipher?\n3. What are the advantages and limitations\
    \ of symmetric key cryptography?\n4. ______ technique is used to address the limitations\
    \ of digital signatures.\n5. What does `\"data at rest\"`, `\"data in transit\"\
    `, and `\"data in use\"` mean?\n6. What encryption technique is most suitable\
    \ for data at rest?\n7. What encryption technique is most suitable for data in\
    \ transit?\n8. How do distributed systems achieve the goal of fault tolerance?\n\
    9. What are the two types of uncertainty that need to be overcome in a fault-tolerant\
    \ distributed system?\n10. How much accuracy is needed for proper functioning\
    \ of computers in a distributed system?\n    a. 25%\n    b. 50%\n    c. 51%\n\
    \    d. 75%"
