    \n## CLI客户端\n\nCLI客户端是使用命令行界面运行与以太坊区块链交互的脚本。这通常在单元测试或项目的自动脚本化中完成。CLI对于那些喜欢基于文本输入而不是基于GUI浏览的人来说非常方便。\n\
