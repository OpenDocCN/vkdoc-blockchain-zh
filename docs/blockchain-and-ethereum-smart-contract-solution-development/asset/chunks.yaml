    ## Chapter 3: Blockchain Components and Architecture


    The foundational concept in blockchain is that of a `transaction`. A transaction
    is initiated by one party to transfer value to one or more parties based on mutually
    agreed terms and conditions. Computers connected to one another through a peer-to-peer
    network leveraging the internet communicate a transaction to all computers once
    they have been initiated. The software on each computer is able to autonomously
    and independently verify the validity of the transaction by executing a software-encoded
    version of terms and conditions that govern the transaction, accumulating a subset
    of transactions into a `block`, and communicating this block to peer computers
    that can all connect this block to previously created blocks, creating a blockchain.
    All the computers in the network are incentivized to work based on mutually agreed-upon
    rules, and any computer that is not following the rules can be easily detected
    and ignored.


    Our goal in this chapter is to provide a conceptual and technical elucidation
    of the four components of a blockchain: distributed ledgers, privacy, consensus,
    and smart contracts.


    We start by describing the conceptual and technical details of the logical mechanics
    of transactions, the rules for the creation of blocks, and their chaining to previously
    created blocks. The blockchain thus created represents the ledger within a blockchain.
    The rules represent the consensus mechanism that has been adopted by the blockchain
    network to keep all the peer computers in sync – veritably making the ledger a
    distributed ledger. This description is first illustrated by a narrative of human
    peers conducting a series of transactions and then translating this narrative
    into a technical explanation.


    We also describe how the structure within a transaction encrypts information so
    as to preserve the privacy of the parties in a transaction. Finally, we explain
    how the terms and conditions that govern a transaction are encoded within a `smart
    contract`.


    We also describe a categorization of blockchains that puts blockchain implementation
    on a continuum of how centralized or distributed they are. We end the chapter
    with a discussion about the limitations of blockchain.


    ### Conceptual Overview of Blockchain Components


    In this section, we will conceptually describe the various components of a blockchain
    system by examining a set of illustrative[^1] transactions as if they were happening
    on a blockchain.


    Let’s start with Candice. Candice has decided to sell many of her Marvel comics.
    These comics are prized by children, and she expects many of her friends to want
    to buy one of her comics. In this illustration, in order to simplify the conceptual
    components of blockchain, we will assume that Candice and her friends are aware
    of each other’s identity. When Candice offers the first comic for sale, her friend
    Marco purchases it. We are going to assume that all of Candice’s friends know
    Marco, and they all know that Marco has purchased the comic and the price that
    Marco paid for the comic.


    Mechanically, how might that have worked?


    For this example, we will assume that Candice and her friends are in communication
    with each other throughout the sale of the comics. They have individual sheets
    of a special paper on which they will record each sales transaction of the comics
    Candice has for sale. They have also invented and agreed upon a mechanism for
    confirming that each transaction is valid and that they are all recording the
    transaction on their individual sheet of paper correctly. One mechanism by which
    they could


