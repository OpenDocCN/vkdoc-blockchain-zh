- fmt: '# Chapter 2: Overview of Core Technologies Supporting Blockchain


    ## Cryptology and Digital Signatures


    In this section, we will describe the basics of cryptology and digital signature.
    It is very important for businesses who want to leverage blockchain to understand
    these basics.


    `Figure 2-1` shows a high-level illustration of the encryption-decryption process
    of cryptology. We start with plain text that everyone can read, and then we encrypt
    the text into text that everyone cannot read. We call this cipher text. When this
    cipher text is decrypted, we get our original plain text back.


    ***Figure 2-1.** High-level encryption-decryption process*


    `Figure 2-2` is an illustration of the encryption-decryption process. Let''s start
    with the plain text `HELLO`. We can encrypt this using an algorithm called offset
    the alphabet. In this example, we will offset the alphabet by four letters, so
    `H` becomes `L`, `E` becomes `I`, `L` becomes `P`, `L` becomes `P` again, and
    `O` becomes `S`. Encrypting `HELLO` using this algorithm results in the cipher
    text `LIPPS`. To make sense of the cipher text, `LIPPS`, a recipient will need
    to know how it was encrypted, that is, if a recipient that does not have this
    knowledge will not be able to make meaning from the cipher text. When we decrypt
    `LIPPS`, we will apply the algorithm in reverse and get `HELLO`. `L` will become
    `H` and `I` will become `E` and so on. This is a simple description of the encryption-decryption
    process.


    ***Figure 2-2.** Encryption-decryption illustration*


    Cryptology consists of two fields. One is called cryptography, and the second
    is called cryptanalysis. Cryptography is the science of using mathematics to encrypt
    and decrypt data to store sensitive information and transmit it across insecure
    networks. Cryptanalysis is the science of analyzing and breaking secure communications.
    In some sense, cryptanalysis is the science of "cracking the code." Strong cryptography
    results in ciphertext that is very difficult to break. Strong cryptography is
    what we are interested in.


    At a very high level, cryptography works as follows: we take plain text and pass
    it through a cryptographic algorithm, a cipher, and the cipher working with a
    key converts the plain text into ciphertext (`Figure 2-3`). In our previous example,
    our cipher was "offset the alphabet," and our key was `4`. `Figure 2-4` depicts
    this process.


    ***Figure 2-3.** Cryptography in action*


    ***Figure 2-4.** Cryptography in action illustration*


    Let''s now look at a specific type of cryptography called symmetric key cryptography.
    In symmetric key cryptography, the key used to do the encryption is the same as
    the key used to do the decryption (`Figure 2-5`). Obviously, the algorithm is
    the same, but here, the key is also the same. That means the recipient of ciphertext
    needs to know the key that was used to do the encryption.


    ***Figure 2-5.** Symmetric key cryptography*


    Symmetric key cryptography is fast, simple, and high performing. Symmetric key
    algorithms can be implemented either in hardware or software. This is the preferred
    method for encrypting data when it is not transmitted and is kept in one place
    (also known as "data at rest").


    This integration makes it possible to abstract the terms and conditions underlying
    the value exchange and represent them in software that can be executed on multiple
    computers.


    In this chapter, we start by reviewing technology concepts of cryptography and
    digital signatures, followed by the concepts of distributed systems and peer-to-peer
    network architectures. We then describe how these concepts are integrated to create
    the core capabilities of blockchain.


