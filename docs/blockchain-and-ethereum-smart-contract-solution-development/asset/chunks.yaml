    ## 任务 4：使用 Truffle 控制台与区块链交互


    Truffle 提供 `console` 命令来与连接的区块链节点交互。共有两种类型的控制台可用。一种是与测试网或主网区块链连接的控制台，可通过以下命令启动：


    `truffle console`


    另一种是与开发用区块链连接的控制台，可通过以下命令启动：


    `truffle develop`


    普通控制台与开发控制台的主要区别在于：普通控制台连接到现有区块链，而开发控制台会创建一个嵌入式区块链、默认账户并发行代币供开发者使用。


    # 第 6 章 以太坊架构与概览


    一旦启动 `Truffle` 控制台，开发者便可使用它查询区块链信息、发送和接收代币，以及调用智能合约函数。要调用智能合约函数，需遵循以下步骤：


    - 在控制台中，根据合约地址和相应的 ABI 实例化一个智能合约对象。

    - 从区块链中获取一个账户。

    - 使用发送方账户及其他参数调用实例化的智能合约函数。


    完整示例可参考以下位置：


    [www.trufflesuite.com/docs/truffle/getting-started/interacting-with-your-contracts](https://www.trufflesuite.com/docs/truffle/getting-started/interacting-with-your-contracts)


    Truffle 是一个功能非常全面且复杂的系统。本节仅提及编译、部署及测试智能合约所需的功能。详情请参阅 Truffle 官方网站：


    [www.trufflesuite.com/docs/truffle/quickstart](http://www.trufflesuite.com/docs/truffle/quickstart)


    ## Remix：最便捷的基于 Web 的智能合约开发工具


    Remix 是一套基于 Web 的智能合约编程套件，使用起来非常方便。Remix 可以以浏览器网页形式运行，也可以作为桌面应用程序运行。要在浏览器中使用 Remix，只需打开
    Chrome 或 Firefox 浏览器，并访问以下地址：


    [`remix.ethereum.org`](https://remix.ethereum.org)


    ![](img/index-250_1.jpg)


    # 第 6 章 以太坊架构与概览


    ***图 6-6.** Remix 编译器*


    如图 6-6 所示，该 IDE 包含四个区域：左侧的图标面板、中间的侧面板、右上角的主面板以及左下角的终端。


    - **图标面板** – 显示文件浏览器、Remix 插件、插件管理器及常规设置图标。

    - **侧面板** – 选中插件时显示源代码文件及各插件的图形用户界面。

    - **主面板** – 显示每个智能合约的源文件内容。可在该面板中编辑源文件。

    - **终端** – 显示编译、部署及与区块链交互的结果。也可在该面板中运行脚本。


    # 第 6 章 以太坊架构与概览


    在 `Remix` Web 控制台中，您可轻松尝试以下任务：


    ### 任务 1：设置并安装插件


    `Remix IDE`（集成开发环境）使用组件模型向系统添加基础功能及第三方插件。默认情况下，图标面板会激活并显示三个基础组件：文件浏览器、Solidity
    编译以及部署与运行交易。这三个组件足以满足快速开发智能合约的需求。对于调试、安全扫描和可视化等其他操作，开发者可点击插件管理器图标，然后选择要激活的插件。


    开发者可根据需要激活或停用插件。图标面板还包含一个设置按钮，点击后可打开设置页面，配置图形用户界面主题、源代码编辑器、GitHub 访问权限等。一旦插件被激活，开发者即可点击各个插件进行使用。

