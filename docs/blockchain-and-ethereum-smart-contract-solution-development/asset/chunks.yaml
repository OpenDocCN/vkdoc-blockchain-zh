    As you can see in Table [2-3](#index_split_001.html#p68), no matter the length
    of the input string, the output is a fixed length string.


    We are sure by now you can tell that there is a problem with hashing. This problem
    is called collision. `ABC` and `CBA` are going to result in the same hash, and
    that''s not good.


    Computer scientists have developed sophisticated hashing algorithms that minimize
    the chance of collision. They don''t guarantee that we will never have a collision,
    but these hash algorithms have proven that the probability of having a collision
    is not something we need to worry about.


    Table [2-4](#index_split_001.html#p68) provides a summary of two hash algorithms
    that guarantee collision is minimized to such an extent that for all practical
    purposes, we can operate as if there are no collisions.


