    To manage the three critical success factors, it used to also be


    important to select business problems for technology solutions after a


    careful analysis of differentiation impact and feasibility. For blockchain


    applications, this continues to be the case. Figur[e 4-1 sho](#index_split_002.html#p128)ws
    the factors that we recommend be considered for differentiation impact and feasibility


    with each factor measured for an industry or a value chain ecosystem as


    a whole.


    ![](index-128_1.png)


    Chapter 4 BloCkChain Business appliCations


    ***Figure 4-1.** Factors to evaluate the differentiation impact and*


    *feasibility of a technology deployment*


    For a preliminary analysis, we recommend a high, medium, or low


    characterization for each differentiation impact factor. All the factors have


    a direct relationship with differentiation impact; that is, a high revenue


    impact implies a high differentiation impact. The overall differentiation


    impact for a technology initiative, aggregated across all factors, will be the


    highest characterization across all the factors. For the implementation


    feasibility analysis, we recommend a similar high, medium, or low


    characterization for each factor. All factors except business process


    change have a direct relationship with implementation feasibility.


    Business process change has an inverse relationship with implementation


    feasibility; that is, when business process change is assessed to be high,


    the implementation feasibility will be low. The overall implementation


    feasibility for a technology initiative, aggregated across factors, will be


    the lowest characterization across all factors. With this analysis, we


    recommend selecting those initiatives that have a high differentiation


    impact and a high implementation feasibility. If none of the initiatives


    have such a characterization, then our recommendation is to adjust the


    scope of the initiative to arrive at such a characterization.


    Chapter 4 BloCkChain Business appliCations


    In this chapter, we will first discuss criteria that apply only to the


    selection and design of blockchain applications, starting with an


    assessment of whether blockchain is necessary to solve the business


    problem. We will end this chapter by describing illustrative applications of


    blockchain in finance, healthcare, supply chain, and entertainment.


    **Is a Blockchain Necessary?**


    In this section, we will describe the types of business problems that are


    likely to require blockchain technology to address.


    We start by examining if the business problem is related to the


    economic inefficiencies that were described in Chapt[er 1 th](https://doi.org/10.1007/978-1-4842-8164-2_1)at
    blockchain has the potential to address. Is the business problem dealing with
    one or


    more of the following seven opportunities?'
  trans: "\n# 第 4 章 区块链商业应用\n\n- [`doi.org/10.1007/978-1-4842-8164-2_4`](https://doi.org/10.1007/978-1-4842-8164-2_4#DOI)\n\
    \n部署工作需覆盖所有受影响的管理层级和个人。  \n3. 对技术部署工作进行灵活管理，以控制预算、范围、时间线及质量。\n\n这些因素依然是区块链应用的关键成功要素。如果非要说有什么变化，那就是它们如今更加重要，同时也更难以实现。对于区块链应用而言，分析单元从单个公司（或企业、组织）转移到了企业所处的整个价值链生态系统，包括其竞争对手、供应商、合作伙伴和客户。我们不再需要关注对单个企业至关重要的业务成果（如库存周转率、劳动生产率、客户留存率和客户份额），而是需要关注与整个价值链相关的业务成果，例如整体行业生产率和盈利能力。此外，那些易于实现（即相对容易衡量和达成）的财务成果，例如月末财务处理耗时、客户付款回收周期以及营运资本金额，对于区块链网络而言已不再适用。\n\
    \n为了管理这三个关键成功要素，以往在仔细分析差异化影响和可行性之后，选择合适的技术解决方案来解决业务问题也同样重要。对于区块链应用而言，这一点依然如此。图\
    \ 4-1 展示了一个行业或整个价值链生态系统在衡量每个因素时，我们建议考虑的差异化影响和可行性评估因素。\n\n![](img/index-128_1.png)\n\
    \n**图 4-1.** 评估技术部署差异化影响和可行性的因素。\n\n在初步分析中，我们建议对每个差异化影响因素进行高、中、低三个层级的描述。所有因素与差异化影响均呈直接关系；也就是说，高收入影响意味着高差异化影响。跨所有因素汇总后，技术方案的总体差异化影响将是各因素中的最高描述等级。对于实施可行性分析，我们同样建议对每个因素进行高、中、低三个层级的描述。除业务流程变更外，所有因素均与实施可行性呈直接关系。业务流程变更与实施可行性呈反向关系；也就是说，当评估认为业务流程变更程度较高时，实施可行性就会较低。跨所有因素汇总后，技术方案的总体实施可行性将是各因素中的最低描述等级。基于此分析，我们建议选择那些差异化影响高且实施可行性高的方案。如果没有任何方案符合此特征，那么我们的建议是调整方案的范围，直至达到此特征。\n\
    \n在本章中，我们将首先讨论仅适用于区块链应用选择和设计的标准，从评估区块链对于解决业务问题是否必要开始。最后，我们将通过描述区块链在金融、医疗、供应链和娱乐领域的应用实例来结束本章。\n\
    \n## 区块链是否必要？\n\n在本节中，我们将描述可能需要区块链技术来解决的业务问题类型。\n\n我们首先审视该业务问题是否与[第 1 章](https://doi.org/10.1007/978-1-4842-8164-2_1)中描述的经济低效问题相关，而区块链恰有潜力解决这些问题。该业务问题是否涉及以下七个机会中的一个或多个？\n"
- fmt: '1. **Time to settle transactions**


    2. **Fees paid to third parties for nonvalue activities**


    3. **Data-related redundant work, rework, and reconciliation work**


    4. **Constraints imposed by government regulations and other nongovernmental rules**


    5. **High incidence of fraud**


    6. **Privacy leaks during value exchange**


    7. **Data security risks**


    A system designer can analyze a business problem and determine if there are opportunities
    related to more than one of the seven economic inefficiencies; then they could
    proceed with further analysis of the suitability of blockchain. Alternatively,
    a system designer can study a particular industry and determine if more than one
    of these seven economic inefficiencies exist and identify business use cases for
    the application of blockchain[.1](#index_split_002.html#p130)


    The next step in determining if you need a blockchain would be to take the analysis
    of the business use cases with the seven economic inefficiencies and evaluate
    if the solution designs could be characterized into one of the three application
    themes that align with the capabilities of a blockchain network. These three application
    themes are as follows:


    1. **Payments** – The first application theme is associated with digitizing payments
    between multiple parties perhaps across geographic boundaries. These payments
    could involve the transfer of fungible or nonfungible physical or digital assets.
    Fungible assets are where all the assets are equivalent, and nonfungible assets
    are where each asset is unique.


    2. **Transparency** – The second application theme is associated with creating
    transparency and visibility among multiple parties involved in value exchange
    perhaps across geographical boundaries with varying regulatory jurisdictions.
    The transparency and visibility could be associated with the status of business
    process progress, product and service attributes, financial forecasts, or the
    provenance of data that are being shared between the parties.


    3. **Data sovereignty** – The third application theme is associated with protecting
    the ownership and control of data that morally and legally belongs to a sovereign
    individual. Control is defined across two dimensions: the ascertainment of accuracy
    and the granting of access rights. Access rights can be granted for read only;
    for read and update; or for custody for a limited period of time or in perpetuity;
    and for all of the data or only for selected components of the data.


    Similar to how a business case can address several of the seven economic inefficiencies,
    it can also require a solution design with one or more application themes. As
    long as the application functionality can be teased apart and the design patterns
    associated with the three themes applied, system design can be made manageable.


    However, we should not decide on the suitability of using blockchain just based
    on the economic inefficiencies being addressed and the application themes that
    are apparent. As we have discussed in the previous chapter, any blockchain application
    is a distributed systems solution and will involve careful design trade-offs.
    This makes the development of blockchain applications a complex endeavor. Building
    an application with a centralized database or even a distributed database is going
    to end up being relatively simpler than building a blockchain application. The
    last piece of analysis that we recommend is an analysis of the underlying transactions
    that the blockchain application will support. This analysis is depicted as a flowchart
    and shown in Figure [4-2](#index_split_002.html#p132). This flowchart has been
    adapted from Wust and Gervais (2018).


    ![](index-132_1.png)


    ***Figure 4-2.** Transaction-based analysis to determine the suitability of blockchain
    to address a business problem*


