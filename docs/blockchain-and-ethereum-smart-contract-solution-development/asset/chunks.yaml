    ## 第四章 区块链商业应用


    交易所和经纪商（请注意，这些可能并非去中心化）、托管和钱包提供商，以及 NFT。接下来，我们将探讨区块链在医疗健康领域的应用。


    ### 区块链医疗健康应用


    在本节中，我们将重点讨论美国的医疗健康系统，尽管本节描述的许多内容同样适用于依赖政府和私人健康保险组合支付医疗费用的其他医疗系统。理论上，我们描述的部分应用也可能有益于政府运营的单支付方医疗系统，但由于我们对此类系统缺乏经验，我们无法自信地做出这一论断。


    在美国的医疗健康系统中，消费者与临床服务提供者互动，例如初级保健医生、专科医生、护士、治疗师、药剂师、临床技师、家庭健康助理、医院健康系统、诊断实验室、药房、疗养院和家庭保健提供者。医疗健康中的价值交换发生在医疗消费者与临床服务提供者之间的互动过程中。然而，临床服务提供者在此过程中所提供价值的报酬，却要通过一个复杂的第三方管理机构网络来实现，如图
    4-6 所示。这些第三方管理机构主要包括医疗保险公司和处方药福利管理公司。此外，还有受医疗保险公司委托的其他参与者，他们提供数据验证、数据聚合、临床必要性验证及其他表面上看是为了帮助消费者和优化医疗开支的服务，但实际上却阻碍了消费者与临床服务提供者之间的价值交换，并模糊了医疗服务的成本。


    ![](img/index-159_1.png)


    **图 4-6.** *美国医疗健康系统中的第三方管理机构*


    根据美国医疗保险和医疗补助服务中心（CMS）的数据，2020 年，美国医疗健康支出的每一美元份额分配如下：19


    - 联邦政府支出 36 美分。

    - 消费者支出 26 美分。

    - 私营企业支出 17 美分。

    - 州和地方政府支出 14 美分。

    - 其他私营实体支出约 7 美分。


    由于联邦、州和地方政府的支出资金来自公民纳税人，消费者实际上通过直接和间接支出，承担了医疗健康总费用的 76%。这些支出中的一部分，流向了那些提供支付计算、收款和报销平台的营利性第三方管理机构。

