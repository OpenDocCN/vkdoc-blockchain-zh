    **About the Authors**


    **Dr. Weijia Zhang** teaches a smart contract development course at the University
    of Texas. He has extensive R&D knowledge and engineering experience in blockchain,
    cognitive sciences, mental modeling, computational fluid dynamics (`CFD`), software
    modeling, computer technologies, and industrial standards. Weijia has published
    over 30 research and technical papers and is named as an inventor for over 20
    patents, granted and pending, in computer and digital technology. He has also
    served as a technical committee voting member to publish the Solution Deployment
    Descriptor (`SDD`) by the Organization for the Advancement of Structured Information
    Standards (`OASIS`).


    **Dr. Tej Anand** is a Clinical Professor at the Smith School of Business, University
    of Maryland, and a visiting lecturer at the School of Professional Studies, Columbia
    University. Tej spent the first part of his career working in AI/Data research
    at Philips Research, Nielsen, and NCR/Teradata, and the second part of his career
    as a business-technology executive at Golden Books, CA Technologies, MedcoHealth,
    and CareCentrix.


    xv


    About the Authors


    Tej’s research interests include blockchain governance, firm-wide analytics maturity,
    and business leader traits for successful technology adoption.


    Tej was previously an Assistant Clinical Professor at McCombs School of Business
    at the University of Texas in Austin.


    xvi


    ![index-16_1.jpg](index-16_1.jpg)


    **About the Technical Reviewer**


    **Prasanth Sahoo** is a thought leader, an adjunct professor, a technical speaker,
    and a full-time practitioner in blockchain, DevOps, cloud, and Agile working for
    PDI Software. He was awarded the “Blockchain and Cloud Expert of the Year Award
    2019” from TCS Global Community for his knowledge share within academic services
    to the community. He is passionate about driving digital technology initiatives
    by handling various community initiatives through coaching, mentoring, and grooming
    techniques.


    Prasanth has a patent under his name, and to date, he has interacted reaching
    over 50,000 professionals, mostly within the technical domain. He is a working
    group member in the Blockchain Council, CryptoCurrency Certification Consortium,
    Scrum Alliance, Scrum Organization, and International Institute of Business Analysis.


    xvii


    **Acknowledgments**


    This book is partially based on the courses we taught at the McCombs School of
    Business at The University of Texas at Austin, the School of Professional Studies
    at Columbia University, and the Smith School of Business at The University of
    Maryland in College Park.


    We would not be writing this book if Prof. Prabhudev Konana, Prof. Sriram Vishwanath,
    and Dr. Caryn Conley did not work extremely hard to get our course approved at
    the University of Texas at Austin. Prof. Arthur Langer was instrumental in getting
    the course approved at Columbia.

