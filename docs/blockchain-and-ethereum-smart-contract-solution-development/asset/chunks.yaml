- fmt: "# Chapter 2 Overview of Core Technologies Supporting Blockchain\n\n## Approaches\
    \ That Are Considered to Implement the Goals\n\n**Figure 2-10.** Summary of issues,\
    \ goals, and approaches for distributed systems\n\nChapter 2 Overview of Core\
    \ Technologies Supporting Blockchain sidebar provides a list of distributed systems\
    \ terms and their definitions that are essential as a reference when designing\
    \ blockchain applications.\n\nThe last concept regarding distributed systems relevant\
    \ for blockchain that we need to understand is the CAP theorem. The CAP theorem\
    \ was postulated by computer scientist Eric Brewer. For more information and discussion,\
    \ please see Brewer (2012). The CAP theorem states that a distributed system can\
    \ only achieve two of the three goals of strong consistency, high availability,\
    \ and network partition tolerance with respect to data. Please note that the theorem\
    \ makes no claims regarding the performance of a system. The implications of this\
    \ theorem are as follows:\n\n- If we would like to guarantee high availability\
    \ of all data all the time for updates and we would also like to guarantee that\
    \ all data are consistent across all replicas and data partitions, then we cannot\
    \ guarantee network partition tolerance; that is, we would not be able to guarantee\
    \ availability of the system and its data if we were to experience a network failure.\n\
    \n- If we would like to always guarantee high availability of all data for updates\
    \ and we would also like to guarantee network partition tolerance, then we cannot\
    \ guarantee that all data will be consistent across all replicas and data partitions.\n\
    \n  *A network partition means that there are computers that are supposed to be\
    \ connected to one another but there is no working network path connecting these\
    \ computers – we say that there is a partition. Note that this use of the term\
    \ “partition” is different from our earlier use of partition where we partitioned\
    \ the computation and data so that it could be executed on multiple computers\
    \ – we shall refer to this as a data partition.*\n\n- If we would like to guarantee\
    \ that network partition tolerance and we would also like to guarantee that all\
    \ data are consistent across all replicas and data partitions, then we cannot\
    \ guarantee that all data will be available all the time for making updates.\n\
    \nNo system designer wants to completely give up on any of the three properties\
    \ of high availability, strong consistency, and network partition tolerance. The\
    \ CAP theorem forces system designers to think through the trade-offs that they\
    \ can afford to make and at the same time meet all, or the majority of, the business\
    \ requirements. Distributed systems are engineered to balance high availability\
    \ of data for updates, strong consistency of data, and network partition tolerance.\n\
    \nIn this section, we have reviewed at a very high business level the concepts\
    \ of distributed systems that will be important for us in the design of blockchain\
    \ applications. We will review in the last section of this chapter how blockchain\
    \ implementations make the design trade-offs necessitated by the distributed system\
    \ concepts that we have reviewed in this chapter.\n\nIn the next section, we will\
    \ review concepts related to peer-to-peer networking.\n\n## Peer-to-Peer Networking\n\
    \nBlockchain systems are made up of computers, also known as compute nodes, or\
    \ simply nodes, connected to one another in a peer-to-peer network. In this section,\
    \ our focus will be to identify and understand the differences between traditional\
    \ computer network architectures and peer-to-peer network architectures.\n\n*In\
    \ this sense, there are no purely distributed systems. Most distributed systems\
    \ have some components that are centralized.*\n\n![Figure 2-11](index-83_1.png)\n\
    \n**Figure 2-11.** Traditional computer network architecture\n\nFigure 2-11 represents\
    \ an illustrative traditional computer network architecture. The cloud in Figure\
    \ 2-11 represents the computer network, which makes it possible for the computers\
    \ connected to the network to communicate with one another through some type of\
    \ networking path.\n\nIn Figure 2-11, we are showing two types of computers. Let’s\
    \ call the computers in red as client computers. Client computers are usually\
    \ looking for something. They want to be serviced. Let’s call the computers in\
    \ black as servers. They respond to requests for service from clients, and if\
    \ a client is authorized to request that service, then the server fulfills the\
    \ request.\n\nWe can think of many types of servers based on the types of service\
    \ they provide. Database servers, for example, respond to requests for creating,\
    \ reading, updating, and deleting data. Domain name servers (DNS) provide a phone\
    \ book–type service, given the name of a website they provide the network address\
    \ of the server that hosts that website. Web servers receive requests for specific\
    \ web pages, and they “serve up” those pages. We also have firewalls that act\
    \ as servers and servers that do specialized computations, and so on.\n\nIn a\
    \ traditional computer network architecture, we have two types of computers: the\
    \ clients and the servers. The servers in some sense have power over the clients.\
    \ They control who is authorized to access their services, what services they\
    \ will provide, what are the semantics of the service, what is the syntax for\
    \ requesting the service, when they will provide the service, and the speed at\
    \ which they will provide the service to different types of clients. If a server\
    \ is not available, for any reason whatsoever, then the clients will not receive\
    \ any of their services, and in fact, the clients might not even know that the\
    \ server is not available. A server can also unilaterally change any aspect of\
    \ the service they provide, even though in practical terms, a server is not likely\
    \ to do that because the value proposition and utility of any server depend directly\
    \ on how many clients use their service.\n\nIn many cases, there is also centralized\
    \ ownership of the servers; that is, even though there can be multiple computer\
    \ servers that all provide the same type of service, they could all be owned by\
    \ the same party. This centralized ownership of the servers and their specialization\
    \ can introduce constraints in the performance, cost, and functionality of the\
    \ overall network.\n\nLet’s now turn to peer-to-peer networks. Figure 2-12 represents\
    \ an illustrative peer-to-peer network. In this figure, the cloud once again represents\
    \ the network, and you can see that all computers are connected to one another\
    \ through the network represented by the cloud; that is, all computers can communicate\
    \ with one another through some network path.\n\n*Perhaps we should make clear\
    \ that a peer-to-peer network is a specific case (or topology) of a distributed\
    \ system.*\n\n![Figure 2-12](index-85_1.png)\n\n**Figure 2-12.** Peer-to-peer\
    \ network architecture\n\nIn Figure 2-12, all the computers have the same color,\
    \ and we can either say that they are all clients or that they are all servers.\
    \ In some sense, all computers are the same. They can provide the same function.\
    \ Each computer might not be connected to another computer with a direct path,\
    \ but they are connected in a sense where every computer can communicate with\
    \ every other computer without availing of any specialized service on another\
    \ computer. In this sense, there is no computer in a peer-to-peer network that\
    \ has power over any of the other computers. Each computer is independent. Each\
    \ computer has the same power. Each computer can"
