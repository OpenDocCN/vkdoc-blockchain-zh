    \ should be specified as well. The execution results will be shown in the same\
    \ panel, and some output will be shown in the terminal panel.\n\n## Chapter 6:\
    \ Ethereum Architecture and Overview\n\n**Summary**\n\nThree topics are mentioned\
    \ in this chapter: overview of the Ethereum blockchain, ecosystem and dApps, and\
    \ essential tools for smart contract developments. In the next chapter, the Solidity\
    \ programming and deployment technology will be covered to teach how to build\
    \ decentralized applications with smart contracts.\n\n# Chapter 7: Programming\
    \ Smart Contract with Solidity\n\n**Introduction: What We Learned in the Last\
    \ Chapter**\n\nIn the previous chapter, we discussed Ethereum architecture, ecosystem,\
    \ and decentralized applications. We also described development tools such as\
    \ `MetaMask`, `Remix`, `Truffle`, and `Geth`. In this chapter, we are going to\
    \ learn detailed Solidity programming skills for smart contract and decentralized\
    \ application development.\n\n**What Is Smart Contract**\n\nSmart contract is\
    \ an overloaded phrase. Although there are different interpretations for smart\
    \ contract, we define it as follows:\n\n>“A smart contract is an executable computer\
    \ program that runs on Ethereum Virtual Machine (`EVM`) on the blockchain to access\
    \ and alter the states of blockchain blocks.”\n\nDifferent from conventional computer\
    \ programs that normally run on one single system, smart contracts run on every\
    \ node of the blockchain.\n\n© Weijia Zhang and Tej Anand 2022  \nW. Zhang and\
    \ T. Anand, *Blockchain and Ethereum Smart Contract Solution Development*, [https://doi.org/10.1007/978-1-4842-8164-2_7](https://doi.org/10.1007/978-1-4842-8164-2_7)\n\
    \nChapter 7: Programming Smart Contract with Solidity\n\nFor Ethereum, smart contracts\
    \ are compiled as executable bytecode and deployed to Ethereum blockchain. The\
    \ bytecodes of a smart contract are sent through the data field of a transaction.\
    \ Once the transaction is included in a block, a smart contract address is generated,\
    \ and the bytecode is stored in that address. To call a function in a smart contract,\
    \ a transaction is sent to the smart contract address, and the function name and\
    \ input data are supplied through the data field of the transaction. When a transaction\
    \ to call a smart contract is sent to a node, the Ethereum Virtual Machine loads\
    \ the bytecode from the smart contract address and executes the function.\n\n\
    For a business person, a smart contract defines business attributes and processing\
    \ logic to let multiple parties execute and witness the processing of the business\
    \ logic to ensure transparency, reliability, fault tolerance, immutability, and\
    \ integrity for all parties (when the smart contract is well written).\n\nSmart\
    \ contracts differ from stand-alone computer programs because they are on all\
    \ the machines and all parties have access to the smart contract to take advantage\
    \ of transparency, reliability, and other benefits of blockchain.\n\nBut this\
    \ is only the case where the smart contract is well written. If a smart contract\
    \ is poorly written, then all these benefits go away."
