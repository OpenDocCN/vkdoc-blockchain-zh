- fmt: "# transaction processing\n\nThe edge F is for interactions and communications\
    \ between a validator node and a beacon node. Proof-of-Stake (POS) miners need\
    \ to run client nodes to request tasks from the beacon chain, package transactions,\
    \ validate blocks, and propose blocks. Ethereum 2 architecture separates beacon\
    \ nodes from validator nodes. The beacon node does the work of managing communications\
    \ and management of epoch, slots, random number generation, and validator selections.\
    \ The validator nodes do the processing of transactions and blocks. The miner-specific\
    \ information such as miner credentials is only stored in validator nodes, not\
    \ in the beacon node. The communication between beacon nodes and miner nodes is\
    \ done through `RPC` protocol.\n\nThe edge G is beacon nodes to propose beacon\
    \ blocks to the beacon chain. Each beacon node will synchronize with the beacon\
    \ chain, manage stakers registry, organize validators into committees, manage\
    \ epoch and slots, generate a random number, assign validator roles, and propose\
    \ new blocks to the beacon chain.\n\nFrom Ethereum 2 architectural topology and\
    \ interactions, it is clear that Ethereum 1 mainnet is still an essential component\
    \ of Ethereum 2. The staking power of POS comes from the assets designated by\
    \ owners to participate in the POS consensus for Ethereum 2. It is important to\
    \ understand the process for Ethereum 1 to migrate to Ethereum 2.\n\n## Migrating\
    \ from Ethereum 1 to Ethereum 2: POS\n\n### Deposit, Staking, and Slashing\n\n\
    The migration from Ethereum 1 to Ethereum 2 has been done in a phased approach.\
    \ The first phase of Ethereum 2 is to build a beacon chain based on proof-of-stake\
    \ consensus. In the following, we mention some important concepts and steps for\
    \ staking Ethereum 1 asset to migrating to Ethereum 2.\n\nThe assets of the proof\
    \ of stake are deposited in Ethereum 1 mainnet through a deposit smart contract.\
    \ In the following, a snippet of deposit contract interface is shown.\n\n```solidity\n\
    // Deposit contract interface based on the following specs for\n// Ethereum 2:\n\
    // https://github.com/ethereum/eth2.0-specs\n\ninterface IDepositContract {\n\
    \    /// @notice A processed deposit event.\n    event DepositEvent(\n       \
    \ bytes pubkey,\n        bytes withdrawal_credentials,\n        bytes amount,\n\
    \        bytes signature,\n        bytes index\n    );\n\n    /// @notice Submit\
    \ a Phase 0 DepositData object.\n    /// @param pubkey A BLS12-381 public key.\n\
    \    /// @param withdrawal_credentials Commitment to a public\n    /// key for\
    \ withdrawals.\n    /// @param signature A BLS12-381 signature.\n    /// @param\
    \ deposit_data_root The SHA-256 hash of the SSZ-\n    /// encoded DepositData\
    \ object.\n    /// Used as a protection against malformed input.\n    function\
    \ deposit(\n        bytes calldata pubkey,\n        bytes calldata withdrawal_credentials,\n\
    \        bytes calldata signature,\n        bytes32 deposit_data_root\n    ) external\
    \ payable;\n\n    /// @notice Query the current deposit root hash.\n    /// @return\
    \ The deposit root hash.\n    function get_deposit_root() external view returns\
    \ (bytes32);\n\n    /// @notice Query the current deposit count.\n    /// @return\
    \ The deposit count encoded as a little endian\n    /// 64-bit number.\n    function\
    \ get_deposit_count() external view returns (bytes memory);\n}\n```\n\nThe deposit\
    \ smart contract uses a sparse Merkle tree to store the stake deposit records\
    \ and use a deposit event to notify external programs such as beacon nodes. Major\
    \ functions supported by this smart contract include `deposit()`, `get_deposit_root()`,\
    \ and `get_deposit_count()`. When depositing a stake, users need to supply information\
    \ such as public key, withdrawal credential, owner signature, and deposit data\
    \ root hash. The deposit amount is in `msg.value` and hence is not a function\
    \ parameter. The deposit ID is incremented automatically and does not need to\
    \ be supplied.\n\nWhen depositing assets to the deposit smart contract, one key\
    \ point to remember is that Ethereum 1 public key and private key pair curve has\
    \ been replaced with `BLS12-381` curve that is more versatile."
