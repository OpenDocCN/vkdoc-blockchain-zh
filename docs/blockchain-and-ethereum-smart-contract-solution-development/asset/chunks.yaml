    ## Chapter 1 Business and Economic Motivation for Blockchain


    In this section, we have seen how value exchange is the foundation of our economy.
    For the economy to function with firms that do not trust each other, third parties
    and government regulations proliferate. Third parties charge fees without adding
    commensurate value, slow the process, and become power centers with inordinate
    influence. We also elaborated on the role of data, specifically proprietary data
    about the exchange that nontrusting parties involved in value exchange begin to
    create.


    In the next section, we will delve deeper into the economic inefficiencies that
    are created by our current *modus operandi*. We will end this chapter by describing
    at a very high level why and how blockchain can reduce the current economic inefficiencies.


    ### Current Economic Inefficiencies


    We started this chapter with the assertion that the arc of technology innovation
    that led to the creation of ERP software and the internet has led to extraordinary
    productivity improvements for businesses. These improvements came about through
    standardization, centralization, digitization, and globalization. The capture
    and harnessing of data played a critical role in these improvements. Our current
    economic inefficiencies stem from the fact that the current technology innovations
    did not address the lack of trust among the parties involved in value exchange.
    Many of our economic inefficiencies stem directly from the processes, institutions,
    protocols, and other mechanisms we have developed to operate in a business environment
    lacking in trust. We have identified seven sources of economic inefficiencies,
    and they are summarized in Table [1-2](#index_split_000.html#p39) and elaborated
    in this section.


    ### Chapter 1 Business and Economic Motivation for Blockchain


    ***Table 1-2.** Seven sources of economic inefficiency*


    | Economic inefficiency | Brief description |

    | --- | --- |

    | 1. time to settle transactions | In the current business environment, transactions
    can take days, weeks, or months to settle. |

    | 2. fees paid to third parties | Financial institutions such as banks and credit
    card processors charge fees to process currency exchange transactions. |

    | 3. data-related redundant work, rework, and reconciliation work (the three r’s)
    | Since each party involved in a business maintains proprietary data, they incur
    unnecessary costs creating, maintaining, and reconciling these data. |

    | 4. Constraints from government regulations and rules from nongovernmental organizations
    | Government regulations, created ostensibly to help, lead to increased unnecessary
    costs. In some industries, firms voluntarily agree to adhere to rules imposed
    by nongovernmental industry groups that can also add costs and stifle innovation.
    |

    | 5. fraud | The complexity in our current systems for value exchange and the
    lack of transparency create opportunities for fraud. |

    | 6. privacy trade-offs | To transact in our current system, individuals have
    to part with identifying data that negates the privacy of |'
