- fmt: "For a carbon credit project example, refer to the following repository:\n\n\
    [https://github.com/masaun/tokenized-carbon-credit-marketplace/](https://github.com/masaun/tokenized-carbon-credit-marketplace/blob/main/smart-contract/contracts/GreenNFT.sol)\n\
    \n[`blob/main/smart-contract/contracts/GreenNFT.sol`](https://github.com/masaun/tokenized-carbon-credit-marketplace/blob/main/smart-contract/contracts/GreenNFT.sol)\n\
    \n**Token Taxonomy Initiative**\n\nCarbon credit token, solar token, electricity\
    \ token, parts token, system token, and water token can all be classified as enterprise\
    \ tokens and can be designed using a more formal definition of tokens. Organizations\
    \ such as the Enterprise Ethereum Alliance (EEA) and InterWork Alliance (IWA)\
    \ have been working on Token Taxonomy Initiatives (TTI) to develop a token framework\
    \ that can be formalized and used to tokenize all identifiable assets in complex\
    \ enterprise use cases.\n\nThe token taxonomy infrastructure and framework have\
    \ the following goals and key features:\n\n- Blockchain agnostic, meaning that\
    \ it is not dependent on `Solidity`, `Haskell`, `WASM`, or `Java` programming\
    \ languages for different blockchains\n- Understandable for both business and\
    \ technical professionals\n- Descriptive as well as programmable\n- Address broad\
    \ usage scenarios for the enterprise and public blockchains\n- Aim for ease of\
    \ use, improved interoperability, easier communication, and faster and more secure\
    \ development\n\nThe following picture (Figure 10-2) shows the hierarchy of token\
    \ taxonomy. Different from `ERC20` and `ERC721` where tokens are defined in specification\
    \ and coded into smart contract, the Token Taxonomy Framework (TTF) defines tokens\
    \ in three layers. The first layer is the template layer where the property, formula,\
    \ and behavior of the tokens are defined. The token templates can be generic,\
    \ such as the loyalty token template or inventory token template. The second layer\
    \ is the class layer when templates are assigned parameters to create token classes.\
    \ For example, loyalty token templates can be applied with airline loyalty or\
    \ hotel loyalty parameters to create an airline loyalty token class or hotel loyal\
    \ token class. The token class can then be instantiated into instances such as\
    \ a Delta or AA airlines loyalty token.\n\n***Figure 10-2.** Token Taxonomy example*\n\
    \nWhen using this framework for an Ethereum smart contract, the template layer\
    \ is similar to `ERC20` or `ERC721` specifications. The class layer extends the\
    \ `ERC20` smart contracts into airline loyalty tokens or hotel tokens. The instance\
    \ layer constructs specific tokens with the token smart contract constructor function\
    \ during deployment.\n\n`TTF` also defines several fundamental attributes for\
    \ a formalized token, including the following:\n\n**Token unit** – The unit of\
    \ a token that can be `Fractional`, `Whole`, or `Singleton`.  \n`Fractional` means\
    \ that the token can be divided into fractional units.  \n`Whole` means that the\
    \ token cannot be divided but can have multiple copies.  \n`Singleton` means that\
    \ the token cannot be divided and has a quantity of `1`.\n\n**Value type** – If\
    \ the token has value, its value type is `Intrinsic`. If a token is a representation\
    \ of a physical or digital item that has value, its value type is `Reference`.\n\
    \n**Representation type** – Tokens that do not have individual identities are\
    \ called common or fungible tokens. Tokens that have an index or serial number\
    \ are called unique or nonfungible tokens.\n\n**Template type** – Templates describe\
    \ the basic characteristics of tokens. Primitive tokens such as `ERC20` or `ERC721`\
    \ are single tokens. More complex tokens can be created by extending the basic\
    \ tokens. A hybrid token can have a parent token as well as child tokens of different\
    \ types.\n\nBesides the fundamental properties mentioned earlier, the tokens defined\
    \ in `TTF` can also have behavioral properties that allow them to be mintable,\
    \ transferable, and burnable."
  raw: 'For a carbon credit project example, refer to the following repository:


    [https://github.com/masaun/tokenized- carbon- credit- marketplace/](https://github.com/masaun/tokenized-carbon-credit-marketplace/blob/main/smart-contract/contracts/GreenNFT.sol)


    [blob/main/smart- contract/contracts/GreenNFT.sol](https://github.com/masaun/tokenized-carbon-credit-marketplace/blob/main/smart-contract/contracts/GreenNFT.sol)


    **Token Taxonomy Initiative**


    Carbon credit token, solar token, electricity token, parts token, system


    token, and water token can all be classified as enterprise tokens and can


    be designed using a more formal definition of tokens. Organizations such


    as the Enterprise Ethereum Alliance (EEA) and InterWork Alliance (IWA)


    have been working on Token Taxonomy Initiatives (TTI) to develop a token


    framework that can be formalized and used to tokenize all identifiable


    assets in complex enterprise use cases.


    The token taxonomy infrastructure and framework have the following


    goals and key features:


    • Blockchain agnostic, meaning that it is not dependent


    on Solidity, Haskell, WASM, or Java programming


    languages for different blockchains


    ![](index-401_1.png)


    Chapter 10 Fund a projeCt: tokens and Gas Fees


    • Understandable for both business and technical


    professionals


    • Descriptive as well as programmable


    • Address broad usage scenarios for the enterprise and


    public blockchains


    • Aim for ease of use, improved interoperability,


    easier communication, and faster and more secure


    development


    The following picture (Figur[e 10-2) sho](#index_split_006.html#p401)ws the hierarchy
    of token


    taxonomy. Different from ERC20 and ERC721 where tokens are defined


    in specification and coded into smart contract, the Token Taxonomy


    Framework (TTF) defines tokens in three layers. The first layer is the


    template layer where the property, formula, and behavior of the tokens


    are defined. The token templates can be generic, such as the loyalty token


    template or inventory token template. The second layer is the class layer


    when templates are assigned parameters to create token classes. For


    example, loyalty token templates can be applied with airline loyalty or


    hotel loyalty parameters to create an airline loyalty token class or hotel


    loyal token class. The token class can then be instantiated into instances


    such as a Delta or AA airlines loyalty token.


    ***Figure 10-2.** Token Taxonomy example*


    Chapter 10 Fund a projeCt: tokens and Gas Fees


    When using this framework for an Ethereum smart contract, the


    template layer is similar to ERC20 or ERC721 specifications. The class


    layer extends the ERC20 smart contracts into airline loyalty tokens or hotel


    tokens. The instance layer constructs specific tokens with the token smart


    contract constructor function during deployment.


    TTF also defines several fundamental attributes for a formalized token,


    including the following:


    **Token unit** – The unit of a token that can be Fractional, Whole, or


    Singleton.


    Fractional means that the token can be divided into fractional units.


    Whole means that the token cannot be divided but can have


    multiple copies.


    Singleton means that the token cannot be divided and has a


    quantity of 1.


    **Value type** – If the token has value, its value type is Intrinsic. If a token


    is a representation of a physical or digital item that has value, its value type


    is Reference.


    **Representation type** – Tokens that do not have individual identities


    are called common or fungible tokens. Tokens that have an index or serial


    number are called unique or nonfungible tokens.


    **Template type** – Templates describe the basic characteristics of


    tokens. Primitive tokens such as ERC20 or ERC721 are single tokens. More


    complex tokens can be created by extending the basic tokens. A hybrid


    token can have a parent token as well as child tokens of different types.


    Besides the fundamental properties mentioned earlier, the tokens


    defined in TTF can also have behavioral properties that allow them to be


    mintable, transferable, and burnable.'
  trans: '

    如需查看碳信用项目示例，请参阅以下仓库：


    [`github.com/masaun/tokenized-carbon-credit-marketplace/`](https://github.com/masaun/tokenized-carbon-credit-marketplace/blob/main/smart-contract/contracts/GreenNFT.sol)


    [`blob/main/smart-contract/contracts/GreenNFT.sol`](https://github.com/masaun/tokenized-carbon-credit-marketplace/blob/main/smart-contract/contracts/GreenNFT.sol)


    **代币分类学倡议**


    碳信用代币、太阳能代币、电力代币、零部件代币、系统代币和水资源代币均可归类为企业代币，并可使用更正式的定义进行设计。企业以太坊联盟和互联工作联盟等组织一直致力于**代币分类学倡议**（Token
    Taxonomy Initiative, TTI），以开发一套可形式化并用于对复杂企业用例中所有可识别资产进行代币化处理的代币框架。


    代币分类的基础设施与框架具有以下目标及关键特性：


    -   区块链无关性，即不依赖于针对不同区块链的`Solidity`、`Haskell`、`WASM`或`Java`编程语言

    -   业务人员和技术专业人士均能理解

    -   既可描述也可编程

    -   适用于企业和公共区块链的广泛使用场景

    -   力求易用性、改善互操作性、简化沟通，并实现更快、更安全的开发


    下图（图 10-2）展示了代币分类的层级结构。与在规范中定义并编码为智能合约的`ERC20`和`ERC721`不同，代币分类框架（Token Taxonomy
    Framework, TTF）将代币分为三个层级。第一层是模板层，用于定义代币的属性、公式和行为。代币模板可以是通用的，例如积分代币模板或库存代币模板。第二层是类层，为模板分配参数以创建代币类别。例如，积分代币模板可应用航空公司积分或酒店积分参数，从而创建航空公司积分代币类或酒店积分代币类。代币类随后可实例化为具体实例，例如达美航空或美国航空的航空公司积分代币。


    ***图 10-2.** 代币分类示例*


    在将本框架用于以太坊智能合约时，模板层类似于`ERC20`或`ERC721`规范。类层将`ERC20`智能合约扩展为航空公司积分代币或酒店代币。实例层则在部署期间通过代币智能合约的构造函数构造出具体的代币。


    `TTF`还为一个形式化的代币定义了若干基本属性，包括：


    **代币单位** —— 代币的单位，可为`Fractional`（可分割）、`Whole`（整体）或`Singleton`（单一）。

    `Fractional`意味着该代币可被分割为更小的单位。

    `Whole`意味着该代币不可分割，但可以存在多份复制。

    `Singleton`意味着该代币不可分割，且数量为`1`。


    **价值类型** —— 如果代币本身具有价值，其价值类型为`Intrinsic`（内在型）。如果代币代表某个具有价值的实物或数字物品，其价值类型为`Reference`（引用型）。


    **表示类型** —— 没有个体身份的代币称为同质化代币。拥有索引或序列号的代币称为非同质化代币。


    **模板类型** —— 模板描述了代币的基本特征。原始代币如`ERC20`或`ERC721`是单一代币。可以通过扩展基本代币来创建更复杂的代币。混合代币可以同时拥有一个父代币以及多个不同类型的子代币。


    除了上述基本属性外，`TTF`中定义的代币还可以具有行为属性，使其可铸造、可转移和可销毁。

    '
- fmt: '# Transferability, Mintability, Burnability


    `Transferability` is the ability to transfer ownership of the token. Both `ERC20`
    and `ERC721` tokens are transferable.


    `Mintability` is the ability to issue new tokens of the class. Creating new diplomas
    for graduating students is an example of minting.


    `Burnability` is the ability to remove tokens from the supply. Some projects can
    burn project tokens to decrease the circulating number of token supply.


    The `TTI` might seem to be abstract when viewed from the framework point of view.
    It is actually quite useful to build generic tools such as a token designer that
    can be used to create tokens through a `GUI` that supports drag-and-drop features.
    Developers or users do not need to write smart contract code for tokens. The code
    will be automatically generated when users define tokens through text or `GUI`
    tools. The work of `TTI` is still in progress and is currently not accepted as
    a standard yet.


    # Token Economy Consideration


    ## Token Allocation


    When reward tokens are proposed and designed, they need to be awarded to those
    who contribute to the projects. Normally, stakeholders such as project teams,
    funders, and communities will need to be considered. For example, the `Filecoin`
    project is a blockchain-based decentralized storage network. The project team
    built a persistent storage service on top of the `IPFS` protocol that allows data
    users to use `Filecoin` to incentivize miners to provide long-term data storage
    and availability. `Filecoin` tokens are designed as a fungible token that uses
    the percentage chart, shown in the following diagram (Figure [10-3], to allocate
    `Filecoin` tokens.


    ![](index-404_1.jpg)


    **Figure 10-3.** Filecoin token allocation


    For the `Filecoin` project, the maximum number of tokens created will be 20 billion.
    Five percent of the tokens are allocated to the `Filecoin` Foundation to facilitate
    governance of the `Filecoin` network, fund critical development projects, support
    the growth of the `Filecoin` ecosystem, and advocate for `Filecoin` and the decentralized
    web. Another 4.5% of the tokens are allocated to the `Protocol Labs` team and
    contributors, and 10.5% are for the `Protocol Labs` company. The `Filecoin` project
    allocates 10% of their tokens for the fundraising. The majority of tokens are
    allocated to miners to support storage mining rewards, block rewards, and other
    operations such as faucets and storage incentives. The final 15% of the tokens
    are reserved for future mining services and rewards.


    ## Token Distribution


    Once the tokens are allocated, there are different ways to distribute the tokens
    to the receivers, as shown in the following diagram (Figure [10-4]):


    **Figure 10-4.** Token Distribution methods


    # Gas Fee Consideration


    When funding a project, there are many factors to consider. The Ethereum blockchain
    has been made sustainable with a gas economy in which each transaction is paid
    by senders to blockchain miners. If a project is building a new blockchain, then
    the gas fee mechanism should be considered thoroughly to ensure a sustainable
    network system. For projects that build decentralized applications, the cost of
    gas consumption should be examined to make sure the high gas cost of transactions
    will not become a showstopper for the applications. In the following, we discuss
    how Ethereum gas works and if there exist ways to lower gas fees in smart contract
    development.


    ## What Is Ethereum Gas?


    In the Ethereum blockchain, gas can be viewed as the cost of performing transactions
    or as the mechanism to power the blockchain ecosystem. When a transaction is sent
    to the blockchain, a small amount of ether needs to be specified and paid to the
    miner in order for the Ethereum blockchain node to take in the transaction to
    a block. The higher the gas fee, the higher the possibility for mining nodes to
    include the transaction.'
  raw: 'Transferability is the ability to transfer ownership of the token. Both


    ERC20 and ERC721 tokens are transferable.


    Mintability is the ability to issue new tokens of the class. Creating new


    diplomas for graduating students is an example of minting.


    Chapter 10 Fund a projeCt: tokens and Gas Fees


    Burnability is the ability to remove tokens from the supply. Some


    projects can burn project tokens to decrease the circulating number of


    token supply.


    The TTI might seem to be abstract when viewed from the framework


    point of view. It is actually quite useful to build generic tools such as


    a token designer that can be used to create tokens through a GUI that


    supports drag-and-drop features. Developers or users do not need to write


    smart contract code for tokens. The code will be automatically generated


    when users define tokens through text or GUI tools. The work of TTI is still


    in progress and is currently not accepted as a standard yet.


    **Token Economy Consideration**


    **Token Allocation**


    When reward tokens are proposed and designed, they need to be awarded


    to those who contribute to the projects. Normally, stakeholders such as


    project teams, funders, and communities will need to be considered. For


    example, the Filecoin project is a blockchain-based decentralized storage


    network. The project team built a persistent storage service on top of the


    IPFS protocol that allows data users to use Filecoin to incentivize miners


    to provide long-term data storage and availability. Filecoin tokens are


    designed as a fungible token that uses the percentage chart, shown in the


    following diagram (Figure [10-3), t](#index_split_006.html#p404)o allocate Filecoin
    tokens.


    ![](index-404_1.jpg)


    Chapter 10 Fund a projeCt: tokens and Gas Fees


    ***Figure 10-3.** Filecoin token allocation*


    For the Filecoin project, the maximum number of tokens created


    will be 20 billion. Five percent of the tokens are allocated to the Filecoin


    Foundation to facilitate governance of the Filecoin network, fund critical


    development projects, support the growth of the Filecoin ecosystem, and


    advocate for Filecoin and the decentralized web. Another 4.5% of the


    tokens are allocated to the Protocol Labs team and contributors, and 10.5%


    are for the Protocol Labs company. The Filecoin project allocates 10%


    of their tokens for the fundraising. The majority of tokens are allocated


    to miners to support storage mining rewards, block rewards, and other


    operations such as faucets and storage incentives. The final 15% of the


    tokens are reserved for future mining services and rewards.


    **Token Distribution**


    Once the tokens are allocated, there are different ways to distribute the


    tokens to the receivers, as shown in the following diagram (Figur[e 10-4):](#index_split_006.html#p405)


    Chapter 10 Fund a projeCt: tokens and Gas Fees


    ***Figure 10-4.** Token Distribution methods*


    **Gas Fee Consideration**


    When funding a project, there are many factors to consider.


    The Ethereum blockchain has been made sustainable with a gas


    economy in which each transaction is paid by senders to blockchain


    miners. If a project is building a new blockchain, then the gas fee


    mechanism should be considered thoroughly to ensure a sustainable


    network system. For projects that build decentralized applications, the cost


    of gas consumption should be examined to make sure the high gas cost


    Chapter 10 Fund a projeCt: tokens and Gas Fees


    of transactions will not become a showstopper for the applications. In the


    following, we discuss how Ethereum gas works and if there exist ways to


    lower gas fees in smart contract development.


    **What Is Ethereum Gas?**


    In the Ethereum blockchain, gas can be viewed as the cost of performing


    transactions or as the mechanism to power the blockchain ecosystem.


    When a transaction is sent to the blockchain, a small amount of ether


    needs to be specified and paid to the miner in order for the Ethereum


    blockchain node to take in the transaction to a block. The higher the gas


    fee, the higher the possibility for mining nodes to include the transaction.'
