  trans: "\n*JAMA.* 2019;322(15):1501–1509. doi:10.1001/jama.2019.13978\n\nPapanicolas,\
    \ I., Woskie, L., Jha, A. 2018. 美国及其他高收入国家的医疗保健支出. *JAMA.* 2018;319(10):1024–1039.\
    \ doi:10.1001/jama.2018.1150\n\nZhuang, Y., Sheets, L. R., Shae, Z., Chen, Y.\
    \ W., Tsai, J., & Shyu, C. R. (2020). 应用区块链技术提升临床试验招募效率. *AMIA ... 年度研讨会论文集. AMIA\
    \ 研讨会,* 2019, 1276–1285\n\n## **第五章**\n\n## **区块链实现概述：比特币、以太坊与超级账本**\n\n2008 年问世的比特币被认为是区块链的首个实现。后续的区块链实现在比特币基础上进行了改进，旨在简化应用开发、提升可扩展性，并增强可创建应用类型的多功能性。\n\
    \n## **引言**\n\n本书开篇从基础出发，探讨了当前技术未能解决的七大经济低效问题——交易结算时间、向第三方支付的无效增值活动费用、与数据相关的冗余工作（三大\
    \ R：重复工作、返工与对账）、政府与非政府组织的规章制度、欺诈、隐私权衡以及数据安全。我们将此归因于现有系统无法在本质上互不信任的交易方之间建立信任。\n\
    \n在回顾了密码学、分布式系统及点对点网络相关技术的能力与设计问题后，我们讨论了如何整合这些技术以构建包含四大核心组件的区块链系统：分布式账本、隐私保护、共识机制与智能合约。\n\
    \n在概念层面探讨了区块链的四大组件如何协同解决七大经济低效问题后，我们深入研究了区块链何时适合用于解决商业问题；提供了构建基于区块链应用的设计指南，并举例说明了区块链在金融、医疗、供应链及娱乐领域的应用案例。\n\
    \n掌握这些知识后，我们认为有必要且适宜从足够的技术深度去理解最初的加密货币及区块链实现——比特币。\n\n比特币通过一篇化名为中本聪（Nakamoto，2008）发表的论文面世，其时正逢次贷金融危机动摇了人们对银行体系的信心。尽管比特币并非首个实现的电子现金系统，但它首次纳入了缓解双重支付问题的可信解决方案（Lee,\
    \ Choi & Rhee, 2003）。中本聪于 2009 年 1 月 3 日创建了比特币区块链中的第一个区块（即创世区块），为自己挖出 50 枚比特币；随后于\
    \ 2009 年 1 月 12 日，向密码学家哈尔·芬尼发送了 10 枚比特币，[这是区块链上的第一笔交易。]（1 a cr）*哈尔·芬尼于 2014 年去世时的讣告\
    \ – [www.nytimes.com/2014/08/31/business/hal-finney-cryptographer-and-bitcoin-pioneer-dies-at-58.html](http://www.nytimes.com/2014/08/31/business/hal-finney-cryptographer-and-bitcoin-pioneer-dies-at-58.html)*\n\
    \n在中本聪将原始论文分享至某电子邮件列表后，\n\n**版权声明：** © 2022 张伟嘉与 Tej Anand  \nW. Zhang 与 T. Anand,\
    \ *区块链与以太坊智能合约解决方案开发*, [`doi.org/10.1007/978-1-4842-8164-2_5`](https://doi.org/10.1007/978-1-4842-8164-2_5#DOI)\n"
- fmt: 'In the list, there were a flurry of comments from other researchers, highlighting
    issues that Nakamoto responded to. The email thread is archived at [https://satoshi.nakamotoinstitute.org/emails/cryptography/threads/1/#014810](https://satoshi.nakamotoinstitute.org/emails/cryptography/threads/1/#014810).


    In this chapter, we will describe Bitcoin at a technical level. [2 W](#index_split_003.html#p178)e
    will also provide a very brief overview of Ethereum and Hyperledger and a comparison
    of these three blockchain implementations. We also provide a brief overview of
    several consensus protocols that are being considered and used instead of the
    consensus protocol used in Bitcoin. We will end this chapter with a very brief
    summary of recent emerging developments.


    ## Bitcoin Transactions, Blocks, and Mining


    Let us start by looking at the life cycle of a Bitcoin transaction by reviewing
    how the Bitcoin blockchain will instantiate a payment from Alex to Sonia as shown
    in Figure [5-1](#index_split_003.html#p178).


    **Figure 5-1.** Bitcoin transaction life cycle


    Alex starts by opening his digital Bitcoin wallet. In this wallet, Alex has all
    the money that he can theoretically spend. Alex now wants to spend some of his
    money by sending it to Sonia. To do that, he scans or copies Sonia''s address.
    This is Sonia''s public key. He then fills the amount that he would like to send,
    and he decides what fee he wants to give for this transaction. He then hits the
    proverbial send button. So look at how Alex is in control and determines the transaction
    fee that he wants to spend.


    Once Alex has entered Sonia’s address and entered the amount of money he wants
    to send and the transaction fee that he is willing to pay, Alex''s wallet software
    signs this transaction with Alex''s private key, formats the transaction that
    will include the conditions that the receiver (Sonia) will need to meet (custody
    of their private key) to spend the money, and communicates this transaction to
    other nodes that are running the Bitcoin software.


    When a Bitcoin node receives Alex’s transaction, it verifies that the transaction
    is formatted correctly, the addresses in the transaction are valid, and Alex met
    the conditions that were imposed on him before he could spend the money that he
    is now sending to Sonia. The node [3 then](#index_split_003.html#p179) adds this
    transaction to a list of verified transactions that it maintains.


    Some Bitcoin nodes serve as “miners” – these mining nodes package valid transactions
    into a block. To create a block, the mining nodes do the equivalent of solving
    a puzzle. They execute a computational process to find a hash that has a specific
    pattern. This is a process we will describe in much more detail later in the chapter.
    Once this hash is found, the mining process is complete, and a new block has been
    created. The mining node adds this new block to the blockchain on the node and
    transmits the new block to other Bitcoin nodes. Each node that receives the block
    verifies the block by ensuring that the block leads to a valid hash and all the
    transactions contained in the block are valid. The verified block is then added
    to the blockchain by each node.


    > Whenever we say that a node has taken an action, what we are really saying is
    that the Bitcoin software running on that node is programmed to take that action.


    ![](index-180_1.png)


    Once the block with Alex’s transaction is added to the blockchain, Alex has successfully
    sent the money to Sonia. Sonia now has this money available in her wallet, and
    whenever she applies her private key, assuming that was the condition that Sonia
    had to meet to spend the money, she will be able to spend the money.'
