    # Chapter 1 Business and Economic Motivation for Blockchain


    Between individual #1 and individual #2. The *x* units of one good for *y* units
    of another good is the **exchange rate**. The transaction we have described here
    is called a barter.


    Let’s consider, for example, if I am individual #1 and have several loaves of
    bread but no butter and a friend of mine is individual #2 and has several sticks
    of butter but no bread. We would both be better off and come out ahead if I gave
    some of my surplus bread to my friend in exchange for butter – let’s say I give
    half a loaf of bread to get a quarter stick of butter. The exchange rate of a
    half a loaf of bread for a quarter stick of butter then represents the perceived
    and agreed relative value of bread and butter between my friend and me, and the
    exchange rate is the only condition that makes up the contract. As soon as I have
    the butter and my friend has the bread, our transaction has been settled.


    Let’s build this example further. My friend now has a craving for tea. My friend
    knows another person (individual #3) who has a surplus of tea. Individual #3 has
    no need for butter, but individual #3 is willing to exchange half a pound of tea
    for a loaf of bread. So my friend exchanges butter for bread with me and now has
    a surplus of bread that can be exchanged for tea with an exchange rate of half
    a pound of tea for a loaf of bread. This is an example of a multiparty exchange.
    The respective exchange rates are the only conditions that make up the contracts
    between me and my friend and my friend and individual #3. Now we could make this
    more complex, if I adjusted the exchange rate based on my perception of my friends’
    need for tea, but for now, we will not do that. Table [1-1](#index_split_000.html#p25)
    summarizes the transactions and the change in ownership of goods assuming I started
    with 4 loaves of bread, my friend started with 4 sticks of butter, and individual
    #3 started with 4 pounds of tea.


    ## Chapter 1 Business and Economic Motivation for Blockchain


    **Table 1-1.** Simple exchange transactions (barter)


    | **Time: t = 0** (starting point) | **Time: t = 1** (first transaction has settled)
    | **Time: t = 2** (second transaction has settled) |

    | --- | --- | --- |

    | Goods owned by individual #1 | 4 loaves of bread | 3.5 loaves of bread, ¼ stick
    of butter | 2.5 loaves of bread, ¾ stick of butter |

    | Goods owned by individual #2 | 4 sticks of butter | ½ a loaf of bread, 3 ¾ sticks
    of butter | ½ a loaf of bread, 3 ¼ sticks of butter, ½ a pound of tea |

    | Goods owned by individual #3 | 4 pounds of tea | 4 pounds of tea | 3 ½ pounds
    of tea, 1 loaf of bread |


    Now, given how the transaction with individual #2 transpired, it would be reasonable
    for individuals #1, #2, and #3 to conclude that bread was a far more acceptable
    good for exchange than butter or tea. With this judgment, it would also be reasonable
    to assume that all individuals would consider it worthwhile to have surplus bread,
    because bread can be exchanged for something else. In general, if a good was scarce
    and it was valued by people, then it would be more likely to be accepted as a
    medium of exchange. If we could find such a good that everyone would accept as
    a medium of exchange, then we would call this good a **universally acceptable
    medium of exchange**. This is how we get to the definition of money. In society,
    money is that good which is universally accepted as a medium of exchange.


    A few other points to note about our rather simplistic example:


    1. The exchanges were happening between individuals – these were peer-to-peer
    exchanges (more about the technical implications of this in Chapter [2](https://doi.org/10.1007/978-1-4842-8164-2_2)).

    2. There was no third party involved, and therefore, no fees were paid to settle
    the transactions.

    3. It would be reasonable to assume that the peer-to-peer exchange without fees
    was possible because individuals #1 and #2 knew and trusted each other.'
