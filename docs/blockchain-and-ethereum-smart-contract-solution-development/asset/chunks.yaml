    \ and the proof to verify that the knowledge statement is true or false.\n\n**Figure\
    \ 9-8.** zk-SNARK proof and verification\n\nFully understanding zero knowledge\
    \ proof and `zk-SNARK` requires a strong mathematical background. Here, we summarize\
