- fmt: '# DAO Platforms


    `contracts` to manage an organization or community. The DAO platforms provide
    registration services and assign identities to constituents. Each member of the
    community can propose proposals and can also vote on proposals. There are many
    DAO platforms in the blockchain space already. In fact, many projects such as
    Compound and Uniswap have their own DAO communities and governing tokens to vote
    for proposals in the community.


    ## Decentralized Insurance Platform


    The Decentralized Insurance Platform allows smart contracts to manage the signing
    up of insurance services, provide insurance service from various sources, and
    then manage claims for the insured accounts. For example, if you want to prevent
    a heavy loss from a Bitcoin price crash, you can actually send a transaction to
    a smart contract to pay a premium as insurance, and there are people on the provider
    side who will accept the insurance request. All the terms of insurance are recorded
    and enforced through smart contracts. If unexpected events happen and trigger
    the insurance actions, the smart contract will execute the corresponding function
    and compensate the insured person.


    ## Decentralized KYC and Identity


    `KYC` (Know Your Customers) and Identity are services and tools to identify a
    real person and gather needed personal information to be in compliance with regulations.
    There are projects such as Civic, Hydro, Sovrin, and uPort that provide decentralized
    identity service for decentralized applications. To build `KYC` features within
    a decentralized application is quite challenging. It is much easier just to use
    a third-party `KYC` service.


    ## Stablecoin


    One of the challenges of cryptocurrencies is its volatility. Bitcoin and Ether’s
    values fluctuate a lot, and using them to represent values for products and services
    will cause fluctuations in prices. Stablecoin is an asset that has relatively
    stable values when pegged with fiat currencies. These stablecoins are normally
    `ERC20` tokens in the Ethereum blockchain. Their values are maintained to be stable
    in several ways. For example, a stablecoin can be backed by US dollars with a
    one-to-one ratio. These stablecoins include Gemini Dollar, TrueUSD, USD Coin,
    etc, as reported in some publications.


    There are other kinds such as MakerDAO’s Dai that are an aggregation of various
    assets and controlled by automatic burning and minting of stablecoins to make
    the value stable.


    In summary, there are many big decentralized applications built on Ethereum already
    in almost all major categories. There are some applications that are still emerging.
    Small smart contract projects such as rental sharing, on-demand music service,
    and decentralized voting platforms are all possible projects that can be built
    with smart contracts. Smart contract development is a fascinating area. Developers
    can find unlimited possibilities to develop revolutionary decentralized applications
    once they learn how to program smart contracts.


    ---


    # Chapter 6: Ethereum Architecture and Overview


    ## Tools to Set Up a Smart Contract Development Environment


    There are multiple ways to set up environments to interact with the Ethereum blockchain.
    Figure [6-5](#index_split_004.html#p239) shows an overview of various tools and
    components.


    ***Figure 6-5.** Some basic tools for Ethereum blockchain*


    The top layer shows various kinds of Ethereum blockchains. `Ganache` tool produces
    a local and single-node Ethereum blockchain and allows for development and quick
    testing of smart contracts and clients. Development blockchain allows developers
    to change the genesis file and start a fully controlled blockchain. Developers
    can issue Ether tokens in the development blockchain and can decide on a permissioned
    list for blockchain nodes. Testnets are public Ethereum blockchains that are built
    by the Ethereum community for testing purposes. Testnet Ether tokens can be obtained
    through some public faucets. There is no tradable'
