- fmt: "# Data Types\n\nA struct variable type is defined with the following syntax:\n\
    \n```\nstruct struct_type{\n    datatype_1 variable_1;\n    datatype_2 variable_2;\n\
    \    ...\n}\n```\n\nHere, `struct_type` is the struct to be defined. `datatype_1`,\
    \ `datatype_2`, etc., are data types that are native with Solidity or defined\
    \ by the user.\n\nAn example of defining a struct is shown here:\n\n```\nenum\
    \ Experience{ENTRY, JUNIOR, SENIOR, EXPERT};\nenum Skillset{SOLIDITY, PROTOCOL,\
    \ BOTH};\nstruct Developer {\n    address addr;\n    Experience level;\n    uint\
    \ hourly_rate;\n    Skillset skill;\n}\nDeveloper guru1;\n```\n\nIn the preceding\
    \ example, a `Developer` struct is defined that contains four components: an account\
    \ address of the developer, an enum of experience level, an hourly rate of `uint`\
    \ type, and skill of `enum` type. The variable `guru1` is declared as a `Developer`\
    \ struct type variable.\n\nTo refer to components inside a struct, use “`.`” symbol.\
    \ For example, to set values to `guru1` in the preceding example, do the following:\n\
    \n```\nguru1.address = 0x1B2E2A67b8E96039BbAC84EB4BC0913c0c16668D;\nguru1.level\
    \ = Experience.EXPERT;\nguru1.hourly_rate = 80;\nguru1.skil = Skillset.SOLIDITY;\n\
    ```\n\nBesides setting values individually as shown earlier, a struct variable\
    \ can be assigned values through struct constructor as shown in the following:\n\
    \n```\nguru1 = Developer(0x1B2E2A67b8E96039BbAC84EB4BC0913c0c16668D,\n    Experience.EXPERT,\n\
    \    80,\n    Skillset.SOLIDITY\n)\n```\n\nIf there are multiple developers such\
    \ as `guru1`, `guru2`, and `guru3`, a mapping combined with struct can be used.\
    \ For example, an `uint` can be mapped to a `Developer` struct to refer to a list\
    \ of developers:\n\n```\nmapping(uint=>Developer) developers;\n```\n\nHere, `developers`\
    \ is a mapping variable. Each developer can be referred to as `developer[0]`,\
    \ `developer[1]`, etc.\n\nMapping combined with struct can provide very sophisticated\
    \ data types that can address most of the data type tasks in Solidity programming.\n\
    \nIn summary, Solidity provides a way to define new types in the form of structs.\
    \ The following code snippet shows an example of `Donor` struct that contains\
    \ an address and the donation amount:\n\n```\ncontract Charity {\n    // Defines\
    \ a struct with two fields.\n    struct Donor {\n        address addr;\n     \
    \   uint donation_amount;\n    }\n    // define a mapping\n    mapping (uint =>Donors)\
    \ donors;\n    //...\n}\n```\n\n# Blockchain Specific Variables\n\nFrequently,\
    \ smart contracts need to get information from blockchain itself and use blockchain\
    \ data in the functions. Solidity actually defines some global variables to refer\
    \ to the blockchain state and transaction data. The common ones are global variables\
    \ and functions defined in the following table (Figure 7-4). There are two major\
    \ variables: `msg` (message global variable) and `block` (the blockchain variable).\n\
    \n***Figure 7-4.** Special blockchain variables and functions*\n\nMost of the\
    \ global variables listed in the preceding table are self-explanatory. There are\
    \ a few variables that need further clarification.\n\nThe `msg` variable mainly\
    \ defines the parameters and data inside a transaction. Every time when a transaction\
    \ is sent to Ethereum blockchain, the `msg` object can be referred by a smart\
    \ contract to extract the following information:\n\n- `msg.value` – This is the\
    \ amount of Ether that is sent to the receiver. It is in the unit of wei.\n- `msg.data`\
    \ – This is the data field in a transaction. It is the user input data that is\
    \ sent to a smart contract to process.\n- `msg.sig` – This is the signature of\
    \ the sender who sent the transaction.\n- `msg.sender` – This is the address of\
    \ the sender. It is important to check the address of the sender to ensure that\
    \ the sender is authorized to perform actions on the smart contract functions.\n\
    - `block.blockhash` – The `block.blockhash` is a special function that takes in\
    \ a block number and outputs its block hash.\n- `block.difficulty` – Outputs the\
    \ difficulty of blockchain mining."
