    ***表 2-3.** 使用模函数的哈希值*


    如表 2-3 所示，无论输入字符串的长度如何，输出都是一个固定长度的字符串。


    我们相信，到现在你一定能看出哈希存在一个问题。这个问题被称为碰撞。`ABC` 和 `CBA` 会产生相同的哈希值，这显然是不好的。


    计算机科学家已经开发出精密的哈希算法，可以将碰撞的概率降至最低。它们不能保证永远不会发生碰撞，但这些哈希算法已经证明，碰撞发生的概率无需我们担忧。


    表 2-4 总结了两种哈希算法，它们确保将碰撞最小化到这样的程度：在所有的实际应用场景中，我们可以假定不存在碰撞。


    ***表 2-4.** 两种哈希算法概要*


    ![](img/index-69_1.png)


    ## 第 2 章 支持区块链的核心技术概述


    在了解哈希的背景知识后，我们将重新审视数字签名。这一次，海伦不再向马可发送两条消息（一条用马可的公钥加密，另一条用海伦的私钥加密），而是发送一条用马可公钥加密的消息。然后，海伦对原始消息进行哈希处理，得到一组精简的数据（也称为消息摘要）。接着，海伦用她的私钥对哈希后的消息进行签名，并将其发送给马可（见图
    2-9）。通过对消息进行哈希处理，海伦大大减少了发送给马可的数据量。


    ***图 2-9.** 哈希数字签名*


    马可现在会用他的私钥解密收到的、用其公钥加密的消息，从而得到原始消息。接着，他会获取加密的哈希数字签名，并用海伦的公钥解密，得到原始消息的哈希值。然后，马可将对原始消息（由他的私钥解密得到）进行哈希处理。当这个哈希值与解密得到的哈希值匹配时，马可就获得了确凿的保证：海伦是消息的发送者。


    以上讨论表明，哈希可以解决数字签名数据传输量过大的问题。


    总之，在本节中，我们回顾了对称密钥加密技术，并了解了它在安全数据传输方面的局限性（双方需要互相认识，并投入基础设施以安全地传输密钥）。这一局限性由非对称密钥加密技术解决，在该技术中，每一方都拥有一个公钥和一个私钥，消息用一方的公钥加密，用该方的私钥解密，从而消除了传输密钥的需求。非对称密钥加密技术本身也有一个局限性：无法确凿地保证发送方的身份。这一局限性由数字签名解决，即发送两条消息，一条用接收方的公钥加密，另一条用发送方的私钥加密。数字签名也有局限性：它使每条消息需要传输的数据量翻倍。这一局限性由哈希数字签名解决。


    在结束本节关于密码学的讨论前，让我们回顾数据的三种状态——静态数据、传输中数据和使用中数据——以及在这三种状态下如何保护数据安全。


    - **静态数据** 指存储在计算机上，或者更准确地说，存储在由计算机管理的非易失性存储设备上的数据。对称密钥加密技术是静态数据加密的理想选择。笔记本电脑、个人电脑以及用于数据库的服务器的存储，都使用对称密钥加密技术进行加密。这就是我们丢失笔记本电脑时无需担心数据被盗的原因。

    - **传输中数据** 指通过计算机网络从计算机 A 传输到计算机 B 的数据。

    '
- fmt: '# Chapter 2 Overview Of Core Technologies Supporting Blockchain


    Network such as the internet. Asymmetric or public/private key cryptography with
    hashed digital signatures is ideal for data-in-transit encryption. To secure data
    in transit, we need to guarantee that when data arrives, it has not been tampered
    with; it is confidential; that is, it has not been seen by anyone; and we have
    a foolproof guarantee of the identity of the sender. Asymmetric or public/private
    key cryptography with hashed digital signatures ensures that all these conditions
    can be guaranteed.


    - **Data in use** means we are using the data in an application. To secure data
    in use, we want to make sure that data is only accessed by people with a need
    to know. To accomplish this, we use policy safeguards in conjunction with technology.
    Policies include rules for access to systems and authorization based on the need
    for access to data. Technology solutions include data masking and data redaction.


    In this section, we have reviewed at a very high business level the concepts of
    cryptography and digital signatures. We will review in the last section of this
    chapter how the cryptography concepts from this section are pertinent to blockchain
    implementations. In the next section, we will review concepts related to distributed
    systems.


    ## Distributed Systems


    Blockchain systems are distributed systems; that is, computation and data related
    to a blockchain system are distributed across multiple computers that can communicate
    with one another through a computer network. In this section, we will review the
    benefits of distributed systems and the design issues and trade-offs that should
    be kept in mind when dealing with distributed systems.


    Definitionally, we can think of a distributed system as composed of multiple independent
    computers that all coordinate among themselves to fulfill a common goal. For these
    multiple independent computers to coordinate their work, they have to be able
    to communicate with one another through some form of network connectivity. The
    common goal that these multiple independent computers are trying to achieve is
    determined by the software that they are running.


    There are two views of distributed systems:


    1. The optimists think of a distributed system as a collection of independent
    computers that to anyone using that system appear to work as one single coherent
    computer.

    2. The pessimists, on the other hand, think of a distributed system as a collection
    of computers when the crash of a computer you have never heard of before prevents
    you from completing your work. This was described by Leslie Lamport, a computer
    scientist associated with a great deal of seminal work around distributed systems,
    in an email archived at [https://lamport.azurewebsites.net/pubs/distributed-system.txt](https://lamport.azurewebsites.net/pubs/distributed-system.txt).


    We will further our understanding of distributed systems by reviewing three real-world
    issues that distributed systems are designed to mitigate.


    1. **Complexity** – Our systems are becoming increasingly complex. The software
    that powers our systems has more lines of code and increased functionality evolved
    over many years with changing teams of software developers. These software systems
    generate increasingly vast amounts of data of varying types. Our software systems
    are used by a large number of people (“users”), and often, it is difficult to
    predict the number of users who will use the software at the same time (concurrent
    users).


    To mitigate the real-world issue of complexity, the goal of distributed systems
    is **scalability**. We want to scale our systems so that they can function correctly
    with complex software that is changing all the time, large volumes of data with
    data types such as numbers, structured text (known format), unstructured text
    (unknown format and length).'
