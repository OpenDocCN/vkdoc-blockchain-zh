    ## Chapter 4 Blockchain Business Applications


    Exchanges and brokerages (remember, these might not be decentralized), custody
    and wallet providers, and NFTs. Next, we examine blockchain applications for healthcare.


    ### Blockchain Healthcare Applications


    In this section, we will focus on the healthcare system in the United States,
    even though much of what we will describe in this section could apply to healthcare
    systems that rely on a combination of government and private health insurance
    to pay for healthcare. Some of the applications we describe could, theoretically,
    be beneficial to government-run single-payer healthcare systems as well, but because
    of our lack of experience with such systems, we do not feel comfortable making
    that claim.


    In the healthcare system in the United States, consumers interact with clinical
    providers such as primary care physicians, specialty physicians, nurses, therapists,
    pharmacists, clinical technicians, home health aides, hospital health systems,
    diagnostic laboratories, pharmacies, nursing homes, and home healthcare providers.
    The value exchange in health care happens during the interactions between the
    healthcare consumer and the clinical provider. However, the remuneration for the
    clinical provider for the value provided during the exchange goes through a complex
    web of third-party administrators as shown in Figure [4-6](#index_split_002.html#p159).
    These third-party administrators include for the most part healthcare insurance
    companies and prescription benefit managers. There are other actors involved as
    well who work at the behest of the health insurance companies, providing data
    verification, data aggregation, clinical necessity verification, and other such
    services that are ostensibly set up to assist consumers and optimize healthcare
    spend, but in reality act as barriers to value exchange between the consumers
    and clinical provider and obfuscate the cost of healthcare services.


    ![](index-159_1.png)


    **Figure 4-6.** *Third-party administrators in the US healthcare system*


    According to the Centers for Medicare and Medicaid Services (CMS), in 2020, the
    share of every dollar spent on healthcare was broken down as follows:[19](#index_split_002.html#p159)


    - The federal government spends 36 cents.

    - The consumer spends 26 cents.

    - Private businesses spend 17 cents.

    - State and local government spend 14 cents.

    - Other private entities spend about 7 cents.


    Since federal, state, and local government spending is funded by citizen taxpayers,
    consumers are shouldering, in total, 76% of healthcare spend through direct and
    indirect outlays. These outlays are in part funding the for-profit third-party
    administrators who are providing the platform for payment calculation, collection,
    and reimbursement.'
