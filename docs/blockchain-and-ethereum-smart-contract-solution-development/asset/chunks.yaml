- fmt: '# Bitcoin Transaction Structure


    A Bitcoin transaction consists of a number of inputs and a number of outputs.
    The inputs into a Bitcoin transaction are the Bitcoins in our wallet that we intend
    to spend. The outputs describe how we intend to spend these Bitcoins. The outputs
    from one Bitcoin transaction become inputs for future Bitcoin transactions – cementing
    the notion of value exchange in our economy. Later we will describe a special
    kind of transaction that only has outputs, but no inputs.


    To understand this structuring of inputs and outputs, let’s take the analogy of
    cash money in our physical wallet. If in your physical wallet you had two five-dollar
    bills, one ten-dollar bill and one one-dollar bill. Let''s say you needed to spend
    17 dollars. Characterizing this transaction in the structure of a Bitcoin transaction,
    you will have three inputs: the ten-dollar bill and two five-dollar bills. With
    the denominations of money available to you, this is the only way you can spend
    17 dollars. Your transaction will need at least one output, the 17 dollars that
    you want to spend (based on how Bitcoin transactions are structured, it does not
    matter that there is no 17-dollar bill), directed to the address of the person
    you want to send this money to. If you do not have any other output in the transaction,
    then the difference between your inputs and your outputs becomes the transaction
    fee for the miner node that will include your transaction in a block. In this
    case, the transaction fee will be 20 – 17 or three dollars. Let’s say you only
    want to pay a transaction fee of one dollar. You will then need two outputs: the
    17 dollars that you want to spend and a “change” of two dollars back to you (see
    the following flowchart).


    Any input into a transaction must be an output of some other transaction. This
    is how Bitcoin keeps an audit trail or provenance of all the money being spent.
    We will explain this further when we drill down into the structure for the inputs
    into a transaction and the outputs from a transaction – what we have shown in
    Table 5-2 is conceptual.


    **Table 5-2.** Summary of values in a notional transaction


    | Name of field | Value |

    |---|---|

    | `tx_in_count` | |

    | `tx_in` | |

    | `tx_out_count` | |

    | `tx_out` | |

    | receiver address | 17 |

    | Your address | 2 |


    ## Coinbase Transaction


    Before we go any further, let’s understand a specific type of transaction called
    the coinbase transaction. This is the transaction that only has outputs and no
    inputs. The coinbase transaction is the sum of the transaction fees from all the
    transactions in the block and a reward given to the miner for expending computational
    power to discover the hash needed to create a block. In this sense, the reward
    portion of the coinbase transaction “creates” new Bitcoins, or we can say that
    the coinbase transaction results in new Bitcoins being “mined.” The reward portion
    of the Bitcoins in a coinbase transaction therefore is also sometimes referred
    to as the mining reward, or the coinbase reward, or the block reward. The Bitcoins
    in the coinbase transaction are sent to one or more addresses specified by the
    miner.


    For example, if a block has ten transactions and the transaction fee in each transaction
    is 0.01 BTC, the coinbase transaction will result in 6.35 BTCs being sent to the
    miner since the current block reward is 6.25 BTCs. Later in our discussion on
    Bitcoin equilibrium economics, we will discuss the history of block rewards.


    ## Audit Trail in Bitcoin


    Except for the coinbase transaction, every input in a transaction has to be an
    output from a previous transaction. Figure 5-3 shows how the Bitcoin blockchain
    creates and maintains an audit trail of all the money being spent.


    **Figure 5-3.** Audit trail of money being spent in Bitcoin


    Transaction `T1` has three inputs that were outputs from other transactions.'
