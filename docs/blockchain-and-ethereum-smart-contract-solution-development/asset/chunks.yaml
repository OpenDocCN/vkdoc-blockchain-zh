- fmt: "# Chapter 4 BloCKChain Business appliCations\n\n- [https://doi.org/10.1007/978-1-4842-8164-2_4](https://doi.org/10.1007/978-1-4842-8164-2_4#DOI)\n\
    \nDeployment across all levels of management and individuals who will be impacted.\
    \  \n3. Adaptable management of the technology deployment effort to control budget,\
    \ scope, timeline, and quality.\n\nThese factors continue to be critical success\
    \ factors for blockchain applications. If anything, they are now even more important\
    \ and even more difficult to achieve. With blockchain applications, the unit of\
    \ analysis shifts from a firm (or company, or enterprise) to the entire value\
    \ chain ecosystem that a firm operates in, including its competitors, suppliers,\
    \ partners, and customers. Instead of business outcomes such as inventory turns,\
    \ labor productivity, customer retention, and customer share that are important\
    \ for one firm, we would need business outcomes that are relevant for the entire\
    \ value chain, such as overall industry productivity and profitability. Also,\
    \ low-hanging (i.e., relatively easily measurable and achievable) financial outcomes\
    \ such as elapsed time for month-end financial processing, elapsed time to collect\
    \ payments from customers, and amount of working capital are no longer relevant\
    \ for a blockchain network.\n\nTo manage the three critical success factors, it\
    \ used to also be important to select business problems for technology solutions\
    \ after a careful analysis of differentiation impact and feasibility. For blockchain\
    \ applications, this continues to be the case. [Figure 4-1](index_split_002.html#p128)\
    \ shows the factors that we recommend be considered for differentiation impact\
    \ and feasibility with each factor measured for an industry or a value chain ecosystem\
    \ as a whole.\n\n![](index-128_1.png)\n\n**Figure 4-1.** Factors to evaluate the\
    \ differentiation impact and feasibility of a technology deployment.\n\nFor a\
    \ preliminary analysis, we recommend a high, medium, or low characterization for\
    \ each differentiation impact factor. All the factors have a direct relationship\
    \ with differentiation impact; that is, a high revenue impact implies a high differentiation\
    \ impact. The overall differentiation impact for a technology initiative, aggregated\
    \ across all factors, will be the highest characterization across all the factors.\
    \ For the implementation feasibility analysis, we recommend a similar high, medium,\
    \ or low characterization for each factor. All factors except business process\
    \ change have a direct relationship with implementation feasibility. Business\
    \ process change has an inverse relationship with implementation feasibility;\
    \ that is, when business process change is assessed to be high, the implementation\
    \ feasibility will be low. The overall implementation feasibility for a technology\
    \ initiative, aggregated across factors, will be the lowest characterization across\
    \ all factors. With this analysis, we recommend selecting those initiatives that\
    \ have a high differentiation impact and a high implementation feasibility. If\
    \ none of the initiatives have such a characterization, then our recommendation\
    \ is to adjust the scope of the initiative to arrive at such a characterization.\n\
    \nIn this chapter, we will first discuss criteria that apply only to the selection\
    \ and design of blockchain applications, starting with an assessment of whether\
    \ blockchain is necessary to solve the business problem. We will end this chapter\
    \ by describing illustrative applications of blockchain in finance, healthcare,\
    \ supply chain, and entertainment.\n\n## Is a Blockchain Necessary?\n\nIn this\
    \ section, we will describe the types of business problems that are likely to\
    \ require blockchain technology to address.\n\nWe start by examining if the business\
    \ problem is related to the economic inefficiencies that were described in [Chapter\
    \ 1](https://doi.org/10.1007/978-1-4842-8164-2_1) that blockchain has the potential\
    \ to address. Is the business problem dealing with one or more of the following\
    \ seven opportunities?"
