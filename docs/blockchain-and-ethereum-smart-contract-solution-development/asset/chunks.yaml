    # Chapter 8 Security Considerations


    **Summary**


    In summary, we just cannot overemphasize the importance of security in blockchains.
    Security breaches and bad things have happened in the past, are happening now,
    and will happen in the future. So when you write Solidity smart contracts, make
    sure the security procedures are followed; always go above and beyond to let the
    community test the smart contracts out before rolling them out to the blockchain
    mainnet.


    # Chapter 9 Layer 2 and Ethereum 2


    ## Problem with Ethereum Mainnet


    The Ethereum mainnet is designed as a public blockchain rather than an Enterprise
    platform; hence, it lacks privacy, performance, scaling, and permissioning capacities.


    With regard to privacy, Ethereum mainnet stores all data in a permissionless fashion,
    and everyone has access to the data. All sensitive data will need to be encrypted
    before being sent to the blockchain, and transactions need to be obfuscated through
    smart contracts. Some institutes and states will not allow certain categories
    of data to be published to the public blockchain. Thus, the use of the public
    mainnet is limited to storing hashes or URLs of data resources. The original data
    are stored in private blockchains or nodes, and verified through public chains
    and channels.


    For performance and scalability, Ethereum mainnet has already hit a bottleneck.
    The release of CryptoKitties has caused congestion in the Ethereum blockchain.
    Transaction fees have reached over $100 per transaction and hence limit feasible
    transactions to high-value and low-frequency applications. In order to speed up
    transactions, sometimes, users have to set high gas prices to increase the chance
    for their transactions to be included by miners to their proposed blocks.


    For permissioning, public blockchains are designed as permissionless, but there
    are use cases where applications do want to have access control due to security
    and regulation considerations. The "public" nature of Ethereum mainnet deters
    some uses such as certificate issuance and personnel database.


    To solve the issues in Ethereum mainnet, many Ethereum Improvement Proposals and
    solutions have been proposed, including layer 2 and Ethereum 2. In this chapter,
    we discuss new scalability technologies for Ethereum, including layer 2 and Ethereum
    2. The following illustration (Figure 9-1) shows the classification of scalability
    solutions of Ethereum, and they are explained in detail in their respective sections.


    **Figure 9-1.** Overview of scalability solutions for Ethereum blockchain


    ## Layer 2 Technology


    Layer 2 is a suite of technologies to improve the performance and scalability
    of Ethereum layer 1 mainnet by moving the computing and storage of transactions
    from onchain to offchain through smart contracts. Onchain transactions require
    running EVM on all nodes and storing all states on Ethereum blockchain, hence
    decreasing performance and scalability. The mechanism for the layer 2 solution
    is to move some of the transactions off the main chain and only record the vital
    information on the mainnet to ensure security and transparency. One major difference
    between layer 2 and Ethereum 2 is that layer 2 uses smart contracts to connect
    offchain resources to the mainnet and thus does not require the mainnet blockchain
    to have a hard fork. Layer 2 solutions can be implemented by third-party projects
    using the existing Ethereum mainnet.


    There are several L2 mechanisms that are available, including state channel, plasma,
    and rollup; each has its own unique features.


