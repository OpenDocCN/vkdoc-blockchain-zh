- fmt: 'It is quite common for developers to have variables declared but not used.


    In Solidity, all computations and storage consume gas for the transactions. Therefore,
    it is best practice to remove all functions and variables that are defined but
    not used for the deployed smart contracts.


    ## Compiler Vulnerabilities


    ### Outdated Compilers


    Compiler version compatibility is a complex issue. Solidity allows a smart contract
    to be declared as applied to a single version of compiler, or a range of compilers.
    Although it is recommended to use the latest compilers, there is a challenge of
    compatibility with older versions of libraries. Sometimes, libraries were written
    by third parties, or in the public domain, rewriting them to the latest version
    is not easy. Developers should look at both the compilation errors and warnings
    to ensure that the versions are compatible.


    Chapter 7 programming Smart ContraCt with Solidity


    ### Randomness Vulnerability


    #### Vulnerability: Weak Randomness from Blockchain Attributes


    Smart contracts do not communicate with external programs directly and do not
    have a good source of random number generators. Sometimes, in applications such
    as gaming or lottery, there is a need for using random numbers. Developers need
    to know that some blockchain attributes are not as random as what they seem to
    be. For example, Ethereum miners might manipulate `block.timestamp` or `blockhash`
    by controlling block generation time or packaging different transactions.


    For applications that require a high degree of randomness, it is recommended to
    use external randomness generators and Oracle to bring the randomness to smart
    contracts.


    ### Signature Vulnerability


    #### Vulnerability: Signature Manipulation


    Sometimes, smart contracts implement cryptographic functions to verify signed
    messages and perform transfer operations accordingly. To ensure security, the
    smart contract functions need to ensure that the signed messages are authentic
    and the message cannot be replayed. When using a message, a private key and a
    message are supplied as input to create a signature. One important thing to note
    is that the signature is not unique. A hacker can manipulate `(r,s,v)` parameters
    to create a different yet valid signature for the same private key and message.
    Hence, signature or hash cannot be used as a unique identifier of a message transaction.
    Otherwise, hackers can take advantage of this by creating different valid signatures
    to replay previously signed messages.


    For example, the following `msgid` is not unique and should not be used as an
    identifier for the signed message:


    Chapter 7 programming Smart ContraCt with Solidity


    ```

    bytes32 msgid = keccak256(abi.encodePacked(getTransferHash(_to,

    _value, _gasPrice, _nonce), _signature));

    require(!signatureUsed[msgid]);

    ```


    Here, `msgid` is supposed to be unique for the same message signed by a private
    key. However, since `_signature` is not unique, `msgid` can be made different,
    and the same signed message can be replayed multiple times to trigger other actions
    that might involve asset transfer.


    To fix this problem, simply remove `_signature` in the hashing function to make
    the `msgid` to be unique to block the replay of the message.


    ```

    bytes32 msgid = keccak256(abi.encodePacked(getTransferHash(_to,

    _value, _gasPrice, _nonce)));

    require(!signatureUsed[msgid]);

    ```


    ## Module Summary


    Security is the most essential component for smart contract development. To ensure
    security, there should be a security framework in place, and developers should
    also focus on details for each line of code. There will be more discussion of
    security in Chapter [8](https://doi.org/10.1007/978-1-4842-8164-2_8).


    ## Module 5: Tools, Test, and Debug


    In Chapter [1](https://doi.org/10.1007/978-1-4842-8164-2_1), we discussed basic
    tools such as setting up a smart contract development environment by using Truffle
    and Remix to compile and deploy smart contracts. In this module, we continue to
    introduce useful tools such as smart contract visualization tools, security scanning
    tools,'
