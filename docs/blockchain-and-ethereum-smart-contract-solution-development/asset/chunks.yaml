- fmt: '# Chapter 2: Overview of Core Technologies Supporting Blockchain


    If the other computers in the system are functional or not. They might be down;
    they might be up; they might be partially functional. Second, every computer in
    a distributed system does not know if all the other computers on the network are
    trustworthy. Are they working as designed or have they been compromised? Are they
    sending messages that are malicious and deceptive?


    The problem of overcoming these two uncertainties is referred to as achieving
    Byzantine Fault Tolerance[\[1\]](#index_split_001.html#p76)BFT.


    Most distributed systems achieve Byzantine Fault Tolerance through algorithms
    that are called consensus protocols. Consensus protocols help computers in a distributed
    system ensure the veracity of communication from other computers. Several BFT
    algorithms ensure accurate functioning of the system if at least 51% of the computers
    in the distributed system are functioning as expected. If 51% or more computers
    maliciously collude, they can hack the distributed system for their own nefarious
    purpose. Since distributed systems are made up of independent computers, the larger
    the number of computers, the more difficult it would be for 51% of the computers
    to collude. For example, if a distributed system had only three computers, then
    we needed two computers to collude. However, if a distributed system included
    1,000 computers, then we would need 501 computers to collude. It is much easier
    for 2 people to collude and conspire than for 501 people to collude and conspire.


    3. **Consistency** – The third real-world issue that distributed systems need
    to mitigate arises directly from the approaches to mitigating the issues of complexity
    and failures – partitioning and replication. When computation and data are partitioned
    for scalability and data and computation are replicated for fault tolerance, then
    ensuring consistency among all these replicas or partitions is important, but
    difficult.


    How do you make sure that these computers connected over a network are consistent
    with one another not only syntactically but also semantically?


    One way distributed systems achieve the goal of consistency is through rigorous
    agreements as to how and at what frequency they will all make sure they have synchronized.
    These agreements are designed into the system ahead of time and consist of messages
    that are exchanged and algorithms that can ensure the veracity of the messages.
    `Checksum` can be considered a very simple example of such a mechanism. With `checksum`,
    each piece of data is assigned a `checksum` value that can be the sum of the bits
    in the message, or the number of bits in the message, or a hash of the data being
    transmitted. The `checksum` is transmitted in addition to and separately from
    the data that was transmitted. Computers who receive the data have the algorithm
    to compute the `checksum`, and if the `checksum` that they compute does not match
    the `checksum` that is transmitted, then they know that there was an error in
    the transmission.


    The mechanisms used for consistency create constraints on performance (speed)
    and add costs (sometimes, significant) to distributed systems implementation.
    Therefore, consistency mechanisms that are implemented represent design trade-offs
    that are engineered based on the business problems that are being addressed by
    the distributed system. Over time, two distinct approaches related to consistency
    have been researched, designed, and implemented.


    ---


    **Footnote:**


    1. Byzantine Fault Tolerance alludes to the problem that Byzantine Generals need
    to overcome when they are coordinating an attack on a city that they have surrounded.
    They can only communicate by messenger, and each general does not know if they
    have received the message that was sent, if a message was indeed sent, or if the
    message they are receiving is from a general who had decided to betray the cause
    (Lamport, Shostak, and Pease, 2019).'
