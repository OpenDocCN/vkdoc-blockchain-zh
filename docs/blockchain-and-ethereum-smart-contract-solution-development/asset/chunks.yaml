    ## Ethereum


    Part 2 of this book takes a deep dive into Ethereum and Enterprise Ethereum, explaining
    how blockchain business applications can be developed using Ethereum. In this
    section, we provide a brief overview of Ethereum and the implementation differences
    with Bitcoin. Ethereum is an alternate implementation of blockchain, different
    from Bitcoin in some very important ways.


    In the previous section, we saw that in Bitcoin, the terms and conditions underlying
    transactions had to be very simple. Bitcoin wanted to keep the smart contract
    very simple because complicated smart contracts had risks of high computation
    costs and a higher likelihood of software defects.


    The founder of Ethereum, `Vitalik Buterin`[^13], who was involved early on in
    the Bitcoin community, felt that while Bitcoin was great digital money, the scripting
    language, `Bitcoin Script`, that was used to specify smart contracts was too weak.
    In addition to value exchange payments facilitated by Bitcoin, Buterin envisioned
    a class of decentralized applications that would be enabled by the features of
    distributed ledgers, privacy preservation, consensus, and smart contracts. Buterin
    outlined a vision of a smart contract language that would be a lot more robust
    and enable the creation of sophisticated decentralized applications on top of
    the blockchain. He wanted to create a Turing complete language for smart contracts
    that supported loops and complicated conditional branching.


    Ethereum includes a very easy JavaScript like language, called `Solidity`, to
    enable the development of smart contracts that could represent real-world business
    logic associated with transaction terms and conditions.


    The availability of `Solidity` has led to Ethereum being referred to by some as
    programmable money or programmable currency. The blockchain applications developed
    with Ethereum are sometimes referred to as dApps or distributed applications.


