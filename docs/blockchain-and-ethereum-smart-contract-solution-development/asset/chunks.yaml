    `Marco` now gets two messages: One message is decrypted by their private key (Signature
    Verification in Figure 2-7), and the second message is decrypted with `Helen`’s
    public key. When these two decrypted messages match, `Marco` has a foolproof guarantee
    that they are the intended recipient of the message and `Helen` was the sender
