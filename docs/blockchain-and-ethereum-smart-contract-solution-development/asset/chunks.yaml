    2  个密钥对需要通过一个新工具生成，该工具会提供一个 24 词的助记词短语。与以太坊 1 不同，以太坊 2 的账户同时拥有提款密钥和验证者密钥。一组助记词短语可以生成多个提款公钥，而一个提款密钥可以派生出多个验证者密钥。


    ## 通过权益证明质押运行以太坊 2 验证者节点


    运行验证者节点将从以太坊 2 区块链获得奖励。与比特币或以太坊挖矿不同，以太坊 2 基于权益证明，因此，只要节点在线且正常运行，所有节点都能获得奖励。以以太币价值计算，奖励回报率约为年化
    3–8%。以下是搭建以太坊 2 挖矿节点的主要步骤。


    首先，以太坊 2 依赖于以太坊 1。因此，仍然需要一个以太坊 1 节点。这个节点可以用 `geth` 搭建，也可以是一个拥有静态 IP 的稳定公共节点。


    其次，用户需要分配质押资金。运行一个验证者节点至少需要 32 个以太币。用户还需要考虑，如果他们的节点离线，将会受到惩罚，导致质押余额减少。


    第三，用户需要准备一个存款账户。有一个存款工具可以用于生成助记词短语，并派生出提款密钥和验证者密钥。这些密钥极其重要，必须妥善保管。如果助记词短语和提款密钥丢失，那么为以太坊
    2 锁定的以太币也将丢失。


    第四，下载并运行信标节点和验证者节点。有多家供应商提供运行信标节点和验证者节点的软件包。


    最后，使用脚本或第三方工具将资产存入存款合约。存款事件会被信标节点检测到。存款会处于待处理状态一段时间，然后变为激活状态。


    一个需要考虑的重要因素是，与工作量证明共识不同，权益证明机制会对验证者施加惩罚。以太坊信标链对验证者实施两种惩罚。一种是怠惰惩罚，用于惩罚离线或不提出/证明区块的验证者节点。另一种是罚没，用于惩罚构建或证明恶意区块的验证者。建议验证者运行监控程序，以确保其节点积极且正确地运行。


    目前已经开发了许多工具和解决方案。用户可以查看以太坊 2 网站，了解推荐的工具。


    ## 以太坊 2 的不确定性


    尽管以太坊 2 被认为是以太坊主网可扩展性解决方案的一个有前途的方案，但该项目仍存在一些不确定性。例如，分片链仍未最终确定。关于分片在安全性和质押经济方面有很多争论。建议读者对以太坊
    2 的路线图、实现和部署保持开放的态度。


    ## 总结


    在本章中，我们解释了几种第 2 层可扩展性解决方案，包括状态通道、Plasma、Rollups 以及以太坊 2 技术。每种技术都有其优缺点。在设计去中心化应用时，考虑应用的使用模式并选择最可行的技术来扩展解决方案至关重要。


    ## 第 10 章 为项目提供资金：代币与燃料费


    ### 引言


    在前面的章节中，我们讨论了智能合约编码、开发和部署的技术层面，以及区块链安全性和可扩展性。在本章中，我们将从智能合约的业务和技术两方面讨论如何为项目提供资金。


    以太坊已经实现了几个与项目融资相关的里程碑，例如首次代币发行（ICO）、非同质化代币（NFT）、去中心化金融（DeFi）和去中心化自治组织（DAO）。可以预见，证券型代币发行（STO）、中央银行数字货币（CBDC）以及其他去中心化'
- fmt: "# 应用将很快获得普及。所有这些用例都有一个共同且关键的元素：代币。下面，我们将描述如何使用代币来表示资产以资助项目，以及如何使用智能合约来编程代币。\n\
    \n© Weijia Zhang and Tej Anand 2022\n\nW. Zhang and T. Anand, *Blockchain and\
    \ Ethereum Smart Contract Solution Development*,\n<https://doi.org/10.1007/978-1-4842-8164-2_10>\n\
    \n## 第十章 资助项目：代币与 Gas 费\n\n### 用于资助生态系统项目的代币\n\n#### ICO 与 DeFi 中的代币\n\n以太坊中的\
    \ ICO 是一种在 2017 年左右流行的筹资机制。它由 `ERC20` 代币实现，该代币使得代币在以太坊生态系统中可编程、可分发和可交易。`ERC20`\
    \ 代币是同质化的，这意味着它仅具有价值，且彼此之间无法区分。`ERC20` 代币遵循位于以下 URL 的 `EIP-20` 规范：<https://eips.ethereum.org/EIPS/eip-20>\n\
    \n在 `ERC20` 规范中，定义了几个标准函数以及两个事件，所有发行 `ERC20` 代币的智能合约都需要相应地实现它们。函数规范如下：\n\n```\n\
    // 返回代币的名称\nfunction name() public view returns (string)\n\n// 返回代币的符号。通常是几个大写字母，可选。\n\
    function symbol() public view returns (string)\n\n// 返回代币使用的小数位数。\nfunction decimals()\
    \ public view returns (uint8)\n\n// 返回代币的总供应量\nfunction totalSupply() public view\
    \ returns (uint256)\n\n// 返回地址为 _owner 的账户余额。\nfunction balanceOf(address _owner)\
    \ public view returns (uint256 balance)\n\n// 将 _value 数量的代币转移到地址 _to，并且必须触发 Transfer\
    \ 事件。\nfunction transfer(address _to, uint256 _value) public returns (bool success)\n\
    \n// 将 _value 数量的代币从地址 _from 转移到地址 _to，并且必须触发 Transfer 事件。\nfunction transferFrom(address\
    \ _from, address _to, uint256 _value) public returns (bool success)\n\n// 允许 _spender\
    \ 多次从你的账户提款，最高可达 _value 数量。如果再次调用此函数，它将用 _value 覆盖当前的 allowance。\nfunction approve(address\
    \ _spender, uint256 _value) public returns (bool success)\n\n// 返回 _spender 仍然被允许从\
    \ _owner 提取的金额。\nfunction allowance(address _owner, address _spender) public view\
    \ returns (uint256 remaining)\n```\n\n**事件**\n\n```\n// 此事件必须在代币被转移时触发，包括零值转移\n\
    event Transfer(address indexed _from, address indexed _to, uint256 _value)\n\n\
    // 此事件必须在任何对 approve(address _spender, uint256 _value) 的成功调用时触发\nevent Approval(address\
    \ indexed _owner, address indexed _spender, uint256 _value)\n```\n\n有两个已经为 `EIP-20`\
    \ 标准实现的智能合约包：`OpenZeppelin` 包和 `ConsenSys` 包。开发者可以扩展这些包，并通过几行自定义代码创建他们自己的 `ERC20`\
    \ 代币。例如，通过导入 `OpenZeppelin` 的 `ERC20` 包，开发者可以创建一个名为 `DEVELOPER_TOKEN`、符号为 `DEV`，并带有可自定义的总供应量作为构造函数输入的\
    \ `ERC20` 代币：\n\n```\n// contracts/DEVToken.sol\n// SPDX-License-Identifier: MIT\n\
    pragma solidity ^0.8.0;\n\nimport \"@openzeppelin/contracts/token/ERC20/ERC20.sol\"\
    ;\n\ncontract DEVToken is ERC20 {\n    constructor(uint256 initialSupply) ERC20(\"\
    DEVELOPER_TOKEN\", \"DEV\") {\n        _mint(msg.sender, initialSupply);\n   \
    \ }\n}\n```\n\n当上述智能合约以指定的 `initialSupply` 部署时，部署的代币的总供应量 (`totalSupply`) 将等于\
    \ `initialSupply`。一旦创建了 `ERC20` 代币，就可以编写另一个智能合约。"
