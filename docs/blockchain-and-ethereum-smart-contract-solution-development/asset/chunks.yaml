- fmt: '# Chapter 3: Blockchain Components and Architecture


    When they want to transfer money among themselves. The bank is just another peer
    node. It does not have any extraordinary power[.6](#index_split_001.html#p108)


    `Jimmy Song`, who is one of the proponents of Bitcoin and a leading authority
    and investor, summarizes the difference between databases and blockchain as follows:


    > “The main thing distinguishing a blockchain from a normal database is that there
    are specific rules about how to put data into the database. That is, it cannot
    conflict with some other data that’s already in the database (consistent), it’s
    append-only (immutable), and the data itself is locked to an owner (ownable),
    it’s replicable and available. Finally, everyone agrees on what the state of the
    things in the database are (canonical) without a central party (decentralized).”
    (Song, 2018)


    All the peer nodes in the network agree on the state of the data in the blockchain
    database. We call that a canonical state, and the peer nodes come to that agreement
    without having a central party so this is decentralized and the database is a
    distributed ledger.


    While privacy-preserving distributed ledgers mitigate the issues we outlined with
    centralized ledgers, they are always more difficult to implement than centralized
    ledgers. As we saw, distributed ledgers on different nodes will all not get to
    the canonical state at the same time, making it almost impossible to implement
    ACID semantics with blockchain. The nodes in the blockchain also conduct redundant
    computation, ostensibly “wasting” resources. We will discuss the limitations with
    blockchain in more detail later in this chapter. Due to the difficulty in implementing
    distributed ledger (or blockchain)–based applications, they should only be considered
    when necessitated by the underlying business problem. In [Chapter 4](https://doi.org/10.1007/978-1-4842-8164-2_4),
    we will discuss how system designers can determine if the business problem necessitates
    the use of blockchain.


    In the chapter so far, we have reviewed three of the four conceptual components
    of blockchain: distributed ledgers, consensus, and privacy. The fourth component
    of blockchain is smart contracts, and we will discuss this component later in
    the chapter when we provide a summary of all the blockchain components. Next,
    we will discuss a classification approach for different types of blockchain implementations.


    ## Blockchain Implementation Categorization


    So far in this book, we have discussed blockchains as aiming for being as distributed
    and decentralized as practically possible. In this section, we will review a classification
    of blockchains that are in the continuum of being distributed and decentralized.
    This continuum helps us evaluate the type of blockchain that will best fit the
    business problem we are grappling with.


    We classify blockchain along two dimensions: access and privacy. The access dimension
    determines who is allowed to participate in the blockchain network. Participation
    in the blockchain would imply getting access to the blockchain software, creating
    a node that executes this software, and being connected to one or more peer nodes.
    The privacy dimension determines whether transactions require information identifying
    the parties involved in the transaction or not.


    For our classification, the access dimension can take on two possible values:
    public or private. The privacy dimension can also take on two possible values:
    permissioned and permissionless. Our classification then results in four possible
    types of blockchains: private permissioned, public permissioned, private permissionless,
    and public permissionless as shown in Figure [3-1](#index_split_001.html#p110).


    ![](index-110_1.png)


    **Figure 3-1.** *Blockchain implementation categorization*'
