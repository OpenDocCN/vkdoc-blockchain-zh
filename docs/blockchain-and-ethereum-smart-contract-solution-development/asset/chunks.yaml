    ## Bitcoin、Ethereum 和 Hyperledger 对比


    在本节中，我们将对比 Bitcoin、Ethereum 和 Hyperledger，然后快速回顾过去几年区块链领域发生的令人兴奋的发展。


    Bitcoin 是区块链的原始实现，我们将使用以下标准对比 Bitcoin、Ethereum 和 Hyperledger：


    - 它们的目的分别是什么？

    - 它们使用什么治理机制？

