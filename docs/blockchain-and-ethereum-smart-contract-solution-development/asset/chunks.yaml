  trans: "\n# 数据类型\n\n结构体变量类型通过以下语法定义：\n\n```\nstruct 结构体类型{\n    数据类型 _1 变量 _1;\n\
    \    数据类型 _2 变量 _2;\n    ...\n}\n```\n\n其中，`struct_type` 是要定义的结构体名称。`datatype_1`、`datatype_2`\
    \ 等均为 Solidity 原生支持或用户自定义的数据类型。\n\n以下展示了一个定义结构体的示例：\n\n```\nenum Experience{ENTRY,\
    \ JUNIOR, SENIOR, EXPERT};\nenum Skillset{SOLIDITY, PROTOCOL, BOTH};\nstruct Developer\
    \ {\n    address addr;\n    Experience level;\n    uint hourly_rate;\n    Skillset\
    \ skill;\n}\nDeveloper guru1;\n```\n\n在上述示例中，定义了一个名为 `Developer` 的结构体，它包含四个组成部分：开发者的账户地址、经验等级枚举、`uint`\
    \ 类型的时薪以及 `enum` 类型的技能水平。变量 `guru1` 被声明为 `Developer` 结构体类型的变量。\n\n若要访问结构体中的成员，需使用“`.`”符号。例如，为上述示例中的\
    \ `guru1` 赋值，应执行以下操作：\n\n```\nguru1.address = 0x1B2E2A67b8E96039BbAC84EB4BC0913c0c16668D;\n\
    guru1.level = Experience.EXPERT;\nguru1.hourly_rate = 80;\nguru1.skil = Skillset.SOLIDITY;\n\
    ```\n\n除了像上面这样逐一设置值之外，还可以通过结构体构造函数来为结构体变量赋值，如下所示：\n\n```\nguru1 = Developer(0x1B2E2A67b8E96039BbAC84EB4BC0913c0c16668D,\n\
    \    Experience.EXPERT,\n    80,\n    Skillset.SOLIDITY\n)\n```\n\n如果有多个开发者，例如\
    \ `guru1`、`guru2` 和 `guru3`，则可以使用映射与结构体的组合。例如，可以将一个 `uint` 映射到一个 `Developer` 结构体，以引用一个开发者列表：\n\
    \n```\nmapping(uint=>Developer) developers;\n```\n\n在这里，`developers` 是一个映射变量。每个开发者可以分别被引用为\
    \ `developer[0]`、`developer[1]` 等。\n\n映射与结构体的组合能够提供非常复杂的数据类型，可以解决 Solidity 编程中的大部分数据类型处理任务。\n\
    \n总而言之，Solidity 提供了一种以结构体形式定义新类型的方法。以下代码片段展示了包含地址和捐款金额的 `Donor` 结构体示例：\n\n```\n\
    contract Charity {\n    // 定义一个包含两个字段的结构体\n    struct Donor {\n        address\
    \ addr;\n        uint donation_amount;\n    }\n    // 定义一个映射\n    mapping (uint\
    \ =>Donors) donors;\n    //...\n}\n```\n\n# 区块链特定变量\n\n智能合约经常需要从区块链本身获取信息，并在函数中使用区块链数据。Solidity\
    \ 实际上定义了一些全局变量来引用区块链状态和交易数据。常见的全局变量和函数如下表所示（图 7-4）。主要包含两个主要变量：`msg`（消息全局变量）和 `block`（区块链变量）。\n\
    \n***图 7-4.** 特殊的区块链变量与函数*\n\n上表中列出的大多数全局变量是自解释的。但有少数几个变量需要进一步澄清。\n\n`msg` 变量主要定义了交易中的参数和数据。每次向以太坊区块链发送交易时，智能合约都可以引用\
    \ `msg` 对象来提取以下信息：\n\n- `msg.value` —— 这是发送给接收方的以太币数量，以 wei 为单位。\n- `msg.data`\
    \ —— 这是交易中的数据字段，是发送到智能合约进行处理用户输入数据。\n- `msg.sig` —— 这是发送交易者的签名。\n- `msg.sender`\
    \ —— 这是发送者的地址。检查发送者地址非常重要，以确保发送者有权对智能合约函数执行操作。\n- `block.blockhash` —— `block.blockhash`\
    \ 是一个特殊函数，它接受一个区块编号并输出该区块的哈希值。\n- `block.difficulty` —— 输出区块链挖矿的难度。\n"
- fmt: '# Solidity 中的全局变量与事件


    ## 全局变量


    `block.gaslimit` – Defines the gas limit for the latest block.


    `block.number` – The latest block number.


    `gasleft()` – Returns the gas left for a transaction.


    `now` – The current timestamp.


    Another global variable is `tx` reserved for the transactions.


    `tx.gasprice` – Shows the gas price of the transaction.


    `tx.origin` – Original sender of the transaction. This is the same in single function
    calls as `msg.sender`.


    ## Module 3: Events


    ### What Is Ethereum Event


    Ethereum events are important concepts that are related to how to message smart
    contract states and communicate with external programs. Event type is an inheritable
    member of smart contract that is built into Solidity programming language. Solidity
    provides syntaxes for defining an event format and emitting an event.


    ### Where Are Events Stored


    Once an event is emitted, the corresponding event data is stored in the transaction
    logs. The event data is the list of arguments passed to the `emit` event function.
    The transaction logs are accessible through smart contract addresses by external
    programs. Although events are stored in transaction logs, its content is not accessible
    by smart contracts. Smart contracts can emit events but cannot access events that
    are emitted.


    ### How to Define an Event


    Defining an event is very simple; just use the `event` keyword to define an event
    name with a list of attributes as the following:


    ```

    event eventName(dataType_1 [indexed] attribute_1, dataType_2 [indexed] attribute_2,
    ..., dataType_n [indexed] attribute_n);

    ```


    Here:

    - `event` is the keyword to define an event.

    - `eventName` is a name of the event.

    - `dataType_1`, `dataType_2`, `dataType_n` are lists of data types defined in
    Solidity.

    - `attribute_1`, `attribute_2`, `attribute_n` are lists of attribute names specified
    by the developers.

    - `indexed` is a reserved keyword to allow a search for these events using the
    indexed parameters as filters.


    For example, to define an event when a token is minted, use the following event
    definition as example:


    ```

    event Mint(address indexed receiver, uint amount);

    ```


    In the example above, a `Mint` event is defined with two attributes. The first
    attribute is the address of the receiver to which the minted token is sent. The
    address is indexed, meaning that this is a searchable attribute. The second attribute
    is the amount of token that is minted. The event does not need to specify the
    token name or mint time as these can be inferred from the smart contract address
    and the block time for the transaction.


    In summary, an event definition basically defines an event name and a list of
    attributes. Once an event is defined, it can be called with parameters to emit
    an event.


    ### How to Emit an Event


    Once an event type is defined, it can be emitted and recorded in the transaction
    log as controlled by smart contract function. The syntax to emit an event is shown
    here:


    ```

    emit eventName(parameter_1, parameter_2, ..., parameter_n);

    ```


    Here:

    - `emit` is the keyword to trigger an emission of an event.

    - `eventName` is the event type defined by the developer using the `event` keyword.

    - `parameter_1`, `parameter_2`, `parameter_n` are the parameters for the attributes
    defined in the event type. The parameter data type should match the data type
    of the event attributes.


    An event type can be called to emit as many events as needed. For example, the
    `Mint` event as defined in the last section can emit an event each time a mint
    operation is performed.


    ```

    emit Mint(0x1F2D3A67b8E96039BbAC84EB4BC0913c0c16778c, 200);

    ```


    In the example above, an event is emitted to show that 200 tokens have been minted
    to the specified address of `0x1F2D3A67b8E96039BbAC84EB4BC0913c0c16778c`.


    When an event is emitted, its data is actually saved onto the transaction log.
    The event can be viewed by using a block explorer to look into the transaction
    log section of a transaction. The log can be accessed.'
