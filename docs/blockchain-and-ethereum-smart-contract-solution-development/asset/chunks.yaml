- fmt: '# Ethereum Architecture and Overview


    Users can then trade their tokens with assets in the liquidity pool.


    ## Automatic Price Adjustment


    With the Uniswap liquidity pool, the amount of both tokens in a token pair `(X,
    Y)` needs to be balanced. If the amount of token `X` increases, then the amount
    for token `Y` decreases, and the price of token `Y` increases. This triggers negative
    feedback to balance the pool.


    ## Arbitration


    Arbitration is a process for traders to balance the price fluctuation in a liquidity
    pool. When the amount of token `X` in token pair `(X, Y)` increases, the amount
    of token `Y` decreases, and the price of token `Y` increases. The arbitrator then
    sees that token `Y`''s price is higher than in other exchanges and will sell token
    `Y` from other exchanges to Uniswap to increase the supply of token `Y` to balance
    the liquidity pool. When the liquidity pool is balanced, the token prices should
    be similar to the token prices in other exchanges.


    Using the Automated Market Maker mechanism, Uniswap was able to grow the TLV (total
    locked value) to 5 billion dollars within three years of development with an impressive
    5% day-over-day growth.


    ## NFT Applications


    The NFT is a kind of token that has a unique identification and cannot be replaced
    or swapped with another. The specification of the NFT is in `ERC721` and in a
    later version of `ERC1440`. One key feature of `ERC721` is a field called `id`
    that contains a unique value for each token. `ERC721` is most frequently used
    to represent creative artwork. Projects in NFT include 0xcert, OpenSea, Decentraland,
    CryptoPunk, etc.


    `0xcert` is an SDK tool set that allows you to develop NFTs. Most of the tokens
    issued in Ethereum for `ERC20` are fungible, meaning that there is no difference
    between token items. Fungible tokens are value based and like dollar bills are
    swappable. For NFTs, each token is different, and they are not replaceable. For
    example, a certificate or diploma can be represented as a nonfungible token because
    it is uniquely issued by an institute to a particular person. In the future, there
    will be more and more dApps developed to work with nonfungible tokens. For example,
    original art works, court documents, and college certificates all belonged to
    this category.


    OpenSea allows users to submit NFT works for sale or buy NFT collections with
    cryptocurrencies. They also support auctions so that the highest bidders are granted
    the right to purchase an NFT artwork by smart contract. All transactions are controlled
    by smart contracts automatically, and no manual intervention or third-party hosts
    are needed.


    ## Oracle Service


    An Oracle service is used to provide connection between blockchain and conventional
    IT systems. Blockchain is self-confined, and there is no direct way for a blockchain
    client to talk to web servers directly. This is most likely designed for security
    considerations. Neither Bitcoin or Ethereum blockchains have a web API integrated
    on chain to call web services hosted by conventional IT systems. In order for
    blockchains to interact with conventional IT systems, Oracle services need to
    be used.


    Chainlink is one of the most popular Oracle services that allow linkage of traditional
    web services with Ethereum blockchain. If you have a decentralized application
    that needs to get outside data, you need to use an Oracle service. For example,
    if your smart contract needs to get weather information, you have to use an Oracle
    service, as the blockchain itself does not have any weather information. To get
    information about FIAT/CBDC values, currency exchange rate, or cryptocurrency
    values, you need to connect to Oracle services provided by banks or third parties
    services as well.


    There are other Oracle services provided by Provable and Band projects. Provable
    project also provides some SDK and example code to work with Oracle services with
    dApps and is very convenient.


    ## DAO Platforms


