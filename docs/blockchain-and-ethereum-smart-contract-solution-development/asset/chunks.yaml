    以确保交易的有效性。在这段等待期内，乐观汇总智能合约允许第三方提供欺诈证明，以判定某个汇总无效并索取奖励代币。奖励给欺诈证明者的代币来自聚合器存入的汇总交易押金。如果某个聚合器提供了有效的欺诈证明，该聚合器存入的押金将被没收。


