    Marco 正在以 12 美元购买该漫画；所有朋友提供摄影证据，证明他们已在其个人记录单上准确记录了该交易。此机制确保 Candice 的朋友们持有的所有记录单都包含完全相同的信息，并且采用所有参与者都能理解的完全相同的格式编写。这就是我们
    **分布式账本** 的开端。


    让我们推进这个过程。Candice 继续出售她的漫画。她卖给 Ebony、Reena、Rodney、Tariq 和 Tasha。每当她的任何朋友购买其中一本漫画时，记录方式完全相同——记录在
    Candice 和她的所有朋友（包括购买漫画的个人）持有的个人记录单上。他们继续这样做，直到记录了十笔销售交易。[²] 然后，他们试图达成 **共识**。


    这意味着什么？


    尽管 Candice 和她的朋友们发明并同意了一种机制，确保他们各自的个人记录单上拥有相同的数据，但某个朋友仍有可能决定欺骗，并持有一张包含不同数据的记录单。我们在此描述的共识过程将确保，即使一方或多方不遵守所有商定的规则，整个系统仍然有能力维护其所有规则和数据的准确性和完整性。


    还记得吗，当我们开始这个示例时，我们说过 Candice 和她的朋友们都拥有“特殊的”记录单？这些记录单之所以特殊，是因为它们包含一个有待解决的隐藏谜题。一旦这个谜题被解决，纸张会自动产生一个无法被更改的水印。[³]
    为了使共识过程生效，Candice 的大多数朋友都在努力解决他们记录单上的这个隐藏谜题。谁先解决谜题，就宣布他们已解决，然后将他们带有水印的记录单副本发送给所有参与者（Candice
    和她的所有朋友），并附上漫画的销售记录。在此指出以下这点也将有所帮助：虽然谜题不容易解决，但验证谜题是否已正确解决却极其容易。当人们收到带有已解决谜题（由水印表示）的记录单时，他们会验证谜题已解决，然后停止自己解决谜题，销毁他们自己的记录单（不带水印），并用带有水印的记录单替换它。


    假设 Maurice 先解决了谜题，并且 Maurice 的记录单副本被发送给所有人。每个人都可以验证 Maurice 正确解决了谜题。一旦验证完毕，他们就停止自己解决谜题的工作。他们扔掉自己的记录单。Maurice
    的记录单现在成为最近十笔交易的官方记录。Maurice 的记录单带有水印，如果有人试图更改该记录单上的任何内容，水印将会消失。[⁴] 这张记录单就是这十笔交易的官方记录。这是我们分布式账本中的第一个
    **区块**。


    因为这张记录单无法更改，我们说它是 **不可变的**。


    交易中的所有参与方达成共识并在分布式账本中创建区块的过程，被称为 **共识协议**。


    现在让我们进一步展开这个示例。Fatima，另一个……


    [²]: 我们将在后面讨论比特币时看到，为什么在本示例中我们决定以 10 笔交易为准。

    [³]: 第三章 区块链组件与架构

    [⁴]: 指向此处的脚注或参考。

