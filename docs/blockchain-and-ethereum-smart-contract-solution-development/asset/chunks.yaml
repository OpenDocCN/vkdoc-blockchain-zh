- fmt: "# CHAPTER 6\n\n## Ethereum Architecture and Overview\n\n### Introduction\n\
    \nThe Ethereum blockchain is a fascinating platform that uses innovative smart\
    \ contract capability to empower decentralized applications in almost all major\
    \ business sectors. Pioneered by Vitalik Buterin and several cofounders, Ethereum\
    \ has gone through the milestones of initial launch, stable coins, ICO (Initial\
    \ Coin Offering), DeFi (Decentralized Finance), DAO (Decentralized Autonomous\
    \ Organization), NFT (nonfungible tokens), and L2 (Layer 2) for scalability. The\
    \ Ethereum blockchain and infrastructure are transitioning to POS (proof of stake)\
    \ with sharding and are on the way to impose big impacts on CBDC (Central Bank\
    \ Digital Currency) and enterprise blockchains with promising potential. After\
    \ years of astronomical growth, Ethereum has reached a market cap of $400 billion,\
    \ just trailing behind Bitcoin. Compared with bitcoin, the Ethereum blockchain\
    \ has advantages such as supporting the Ethereum Virtual Machine (EVM) and smart\
    \ contracts, supporting more diverse use cases, and being more nimble by changing\
    \ consensus from POW to POS to save energy costs.\n\n© Weijia Zhang and Tej Anand\
    \ 2022  \nW. Zhang and T. Anand, *Blockchain and Ethereum Smart Contract Solution\
    \ Development*,  \n[https://doi.org/10.1007/978-1-4842-8164-2_6](https://doi.org/10.1007/978-1-4842-8164-2_6#DOI)\n\
    \n![](index-221_1.jpg)\n\nEthereum is a complex and dynamic platform that has\
    \ been consistently expanding. Learning the Ethereum blockchain is not easy. It\
    \ takes tremendous effort to truly understand Ethereum architecture and master\
    \ the skill set for carrying out smart contract and decentralized application\
    \ development. To lower the barrier of learning of the Ethereum blockchain platform,\
    \ we separate the content of this part of the book into three tracks as shown\
    \ in Figure [6-1](#index_split_003.html#p221). The first track is business oriented\
    \ with focus on an overview of Ethereum, its ecosystems, decentralization, and\
    \ token economy design. The second track is for technical programming to develop\
    \ a smart contract project and covers Ethereum architecture, Solidity programming,\
    \ debugging, testing, security checking, and deployment. The third track is a\
    \ project track to build and deliver a hands-on decentralized application from\
    \ user requirement to token design, to blockchain smart contract and client implementations.\n\
    \n***Figure 6-1.** Three tracks/pillars for Ethereum smart contract development*\n\
    \n![](index-222_1.jpg)\n\nBoth business and technical track contents will be covered\
    \ in subsequent chapters. This chapter is focused on the following three main\
    \ topics: (1) Ethereum architecture and its components; (2) Ethereum ecosystem\
    \ projects; and (3) Ethereum tools required for smart contract development.\n\n\
    ### Ethereum Architecture\n\nThere are different ways to present the Ethereum\
    \ blockchain architecture. One of the architectural representations is developed\
    \ by the Enterprise Ethereum Alliance (EEA) and shown in Figure [6-2](#index_split_003.html#p222).\
    \ Similar to the Open Systems Interconnection (OSI) that models internet network\
    \ representation into seven layers, the EEA divides Ethereum architecture into\
    \ five layers containing network, core blockchain, enterprise components, tooling,\
    \ and applications layers.\n\n***Figure 6-2.** Ethereum blockchain components\
    \ architecture and overview*\n\n### Network Layer\n\nThe network layer located\
    \ at the bottom of the architectural diagram is exactly the same as the TCP/IP/P2P\
    \ internet network. Although sometimes people view blockchain as a new generation\
    \ of internet, the Ethereum blockchain itself does not change anything on the\
    \ network level. The network layer provides three key capabilities for the Ethereum\
    \ blockchain: discovering blockchain, communicating with network nodes, and managing\
    \ peer nodes."
