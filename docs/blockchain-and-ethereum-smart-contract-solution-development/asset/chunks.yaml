    \n## Chapter 4 Blockchain Business Applications\n\n- **Smart contracts** – So\
    \ far, we have seen that a transaction represents the semantics of the value exchange\
    \ and tokens represent the units of value exchange. Smart contracts are the executable\
    \ software representation of the terms of the exchange. Earlier, when we described\
    \ that a deposit in a bank account would lead to interest being deposited into\
    \ a bank account, it is the smart contract associated with the deposit that determines\
    \ the rate of interest and the frequency of interest payment deposits. The design\
    \ question for blockchain application designers is determining the number of smart\
    \ contracts that will be needed, the logic of each smart contract, and the process\
    \ for developing, validating, and testing the smart contract. Different blockchain\
    \ implementations provide varying programming languages for their smart contracts\
    \ and varying development tools. In the next chapter, we will provide a very brief\
    \ overview of the Ethereum smart contract development tools. In Part 2 of this\
    \ book, distributed application development using Ethereum will be discussed in\
    \ depth.\n\nThere are two complications with smart contracts. Both these complications\
    \ have a bearing on the complexity of the business logic that is encoded in the\
    \ smart contract. The first complication is related to the computational power\
    \ required to execute the smart contract. In general, smart contracts with more\
    \ complexity can include sophisticated loops and several nested levels of conditional\
    \ logic. Since a smart contract is executed by every node in the blockchain, the\
    \ party on whose behest a node is expending computational and electrical power\
    \ will need to provide compensation. Smart contracts with complicated logic can\
    \ be costly. For example, if the smart contract to compute the interest for a\
    \ deposit was very complicated, then the owner of the bank account and/or the\
    \ bank will have to pay for the execution of the smart contract, reducing their\
    \ financial incentive.\n\nThe second complication arises from the fact that once\
    \ a smart contract is committed to the blockchain, it cannot be changed. The more\
    \ complicated the logic within a smart contract, the greater the probability that\
    \ our test and validation processes have been unable to find all the software\
    \ defects. Any remaining software defect can lead to financial or security vulnerabilities.\
    \ Mehar et al. (2019) provide a critical analysis of a defect in an Ethereum smart\
    \ contract that set out to implement"
