- fmt: '# In Addition to Rewarding Miners, the Gas Mechanism Also Increases the Cost
    of Network Attacks


    In addition to rewarding miners, the gas mechanism also increases the cost of
    network attacks by malicious users. In a public blockchain, everyone can access
    the network and send transactions to the miners. Without an appropriate gas fee,
    tremendous amounts of transactions may be sent to the network, causing congestion
    issues or even halting the network. The gas fee is a well-designed mechanism to
    maintain a sustainable network and balance decentralized application ecosystems.


    ## Understand Ethereum Gas with Gas Station Analogy


    Gas in Ethereum is a complex concept. It is difficult to grasp its meaning and
    implication for the blockchain network and application ecosystem. In this section,
    we will use a gas station analogy to help readers better understand gas usage
    in Ethereum (Figure 10-5).


    ![](index-407_1.png)


    **Figure 10-5.** Gas Station Analogy


    Gas in transportation is used as fuel to power vehicles to move people and goods
    from one location to another. On the other hand, gas in Ethereum is used to power
    the Ethereum network to make it more secure and less congested and to incentivize
    blockchain miners. Gas in Ethereum is used to pay for transferring assets, deploying
    smart contracts, or calling smart contract functions.


    In a gas station, the gas price is normally marked as dollars per gallon, while
    in Ethereum, the gas price is also used to refer to the unit price of gas. The
    concept of the gas price is not that straightforward. The gas price unit in Ethereum
    is `wei` per gas unit, where `wei` is the smallest unit of ether. One ether is
    equal to `10` to the power of `18 wei`. The gas unit refers to the mining cost
    in Ethereum. It is manually defined in the gas cost table in the Ethereum yellow
    paper. For example, an addition operation has a gas cost of `3`, and multiplication
    has a gas cost of `5`. The total gas fee will be equal to the gas price multiplied
    with the gas consumed.


    In the Ethereum gas mechanism, there is also the concept of gas limits. This is
    the maximum amount of gas a single transaction can consume. The reason to have
    a gas limit is to protect the sender account. Sometimes, a smart contract might
    go into a computation loop and drain the whole account balance if there is no
    gas limit set. For a car, the gas limit is the gas tank capacity. When a gas limit
    is set and the consumption of gas exceeds that limit, the transaction will be
    marked as failed, and the state is reverted back to its original state.


    There are two kinds of transactions, the first of which is a simple asset transfer
    to move assets from one account to another. These asset transfers will consume
    `21,000 Gwei` gas. The second transaction type is the smart contract call. The
    gas consumption is much more than the common asset transfer.


    Furthermore, for the Ethereum blockchain, there is also a maximum block gas limit.
    This is the limit of gas for all transactions in a block.


    Finally, the gas consumed here is in the unit of `wei`. Normally, the actual cost
    is measured in USD in which the gas consumed is multiplied by the price of ether
    to get the fiat cost.


    ## Quantize Gas Expenses in a Smart Contract Program


    When a decentralized application is deployed, one of the biggest costs for the
    users is the gas fee. The gas fee for Ethereum mainnet transactions has been skyrocketing
    and sometimes reaches over 200 USD for a single transaction. Hence, the feasibility
    study of the project will need to include a gas fee expenses analysis to see if
    the project is financially sustainable.


    For example, some people have proposed using blockchain to build a decentralized
    music service. Quantitative analysis can help determine the cost feasibility for
    storing musical data, both for musical bits and metadata.


    ---


