    \  \n   [crypto-not-in-kansas-anymore-](http://www.lw.com/thoughtLeadership/gli2021-blockchain-crypto-not-in-kansas-anymore-)\
    \ 是了解代币监管环境的两个优秀资源。\n\n## 第 4 章 区块链商业应用\n\n- **智能合约** – 到目前为止，我们看到交易代表了价值交换的语义，而代币代表了价值交换的单位。智能合约是交换条款的可执行软件表示。之前，当我们描述银行存款将导致利息存入账户时，正是与存款关联的智能合约决定了利率和利息支付的频率。区块链应用设计人员的设计问题是确定需要多少个智能合约、每个智能合约的逻辑，以及开发、验证和测试智能合约的流程。不同的区块链实现为其智能合约提供了不同的编程语言和不同的开发工具。在下一章中，我们将简要概述以太坊智能合约的开发工具。在本书的第二部分，我们将深入讨论使用以太坊的分布式应用开发。\n\
    \n智能合约存在两个复杂之处。这两个复杂之处都会影响智能合约中编码的业务逻辑的复杂度。第一个复杂之处与执行智能合约所需的计算能力有关。一般来说，更复杂的智能合约可能包含复杂的循环和多层嵌套的条件逻辑。由于每个区块链节点都会执行智能合约，因此节点为之消耗算力和电力的当事方需要提供补偿。逻辑复杂的智能合约可能会成本高昂。例如，如果用于计算存款利息的智能合约非常复杂，那么银行账户所有者和/或银行将不得不为智能合约的执行付费，从而降低其经济利益。\n\
    \n第二个复杂之处在于，一旦智能合约被提交到区块链，就无法更改。智能合约内的逻辑越复杂，我们的测试和验证过程未能发现所有软件缺陷的概率就越大。任何残留的软件缺陷都可能导致财务或安全漏洞。Mehar\
    \ 等（2019 年）对一个旨在实现某功能的以太坊智能合约中的缺陷进行了批判性分析。\n"
- fmt: "# a Decentralized Autonomous Organization (DAO)\n\nThat resulted in several\
    \ million dollars being withdrawn in a manner incongruous with the intent of the\
    \ developers of the smart contract. Eventually, resolving this defect resulted\
    \ in a schism in the Ethereum community.\n\nA careful, deliberate, and parsimonious\
    \ design of smart contracts followed by a diligent development, test, and validation\
    \ process is extremely important for blockchain applications. The stakes are higher\
    \ in public permissionless blockchain networks than they are in private permissioned\
    \ blockchain networks.\n\n# Chapter 4 Blockchain Business Applications\n\n- **Data**\
    \ – It can be flippantly said that any blockchain is nothing but bits and bytes\
    \ of data, most of it cryptographically protected. This comment is true, and it\
    \ implies that most of the value from a blockchain comes from the meanings assigned\
    \ to and the interpretations made of these data. Therefore, the design of the\
    \ data structures (or data models) that support a blockchain is an important design\
    \ consideration for blockchain system designers.\n\nIn addition to designing a\
    \ data model that has high fidelity to the business problem being addressed and\
    \ ensuring clarity and comprehension of this model by all stakeholders, a design\
    \ issue that all application designers need to confront, blockchain system designers\
    \ also have to deal with three design challenges that are specific to blockchain.\n\
    \nThe first design challenge involves determining the data that will be stored\
    \ on the blockchain (on-chain) and the data that will be stored off-chain. The\
    \ on-chain data is the distributed ledger, and it is replicated on every node\
    \ in the blockchain network. The size of the on-chain data is one of the factors\
    \ that drives the scalability (transactions per second) and consistency of data\
    \ on the nodes. It also drives that amount of computational cost that will be\
    \ incurred by each node. For these reasons, we should only store data on the blockchain\
    \ that is absolutely necessary. Please keep in mind that this design decision\
    \ is available only to system designers who are developing their own blockchain\
    \ implementations, or using a private permissioned blockchain such as `Hyperledger`.\
    \ For applications built using `Ethereum`, the on-chain transaction data structure\
    \ is predetermined (and built in). For `Hyperledger`-based blockchain applications,\
    \ privacy-related regulations should be one of the considerations in determining\
    \ if data will be stored on-chain. As we have seen, once data is committed to\
    \ the chain, it is very difficult (almost impossible) to remove that data. If\
    \ personally identifiable information (PII) or personal health information (PHI)\
    \ is stored on a blockchain, then compliance with privacy laws that give customers\
    \ the right to remove their data would not be possible. [6,7](#index_split_002.html#p144)\n\
    \nThe second design challenge involves determining where and how the off-chain\
    \ data will be stored and managed. If the off-chain data is centralized, then\
    \ that has the potential of defeating the trust-related objectives of the application\
    \ – How can we trust the data that is not on the blockchain? This has come to\
    \ be known as the “oracle” problem (Caldarelli, 2020). A preferred approach for\
    \ storing off-chain data is by using distributed file systems (Huang, Lin, Zheng,\
    \ Zheng, and Bian, 2020) such as `IPFS`. [8](#index_split_002.html#p144)\n\nThe\
    \ third design challenge is the mechanism for integrating, or linking, the off-chain\
    \ data with the on-chain data. This integration is usually achieved through smart\
    \ contracts. The “oracle” problem manifests itself through the requirements that\
    \ smart contracts have for accessing real-world authoritative\n\n---\n\n6 This\
    \ is not an issue for pubic permissionless blockchains since public keys are not\
    \ (at least at this time) considered PII.  \n7 The implication of encrypted PII\
    \ or PHI on the blockchain with respect to privacy regulations is as of yet unclear.\
    \  \n8 [www.ipfs.io for more information](http://www.ipfs.io)."
