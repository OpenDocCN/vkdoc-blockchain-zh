    `is a sparse Merkle tree`, most of the sibling nodes will be `null` or predefined.
    These nodes can be presented by a `bit=0` to mean that the default hash value
    should be used. If the bit is set to `1`, then the changed hash value should be
    used. In the simple sparse Merkle tree shown earlier, for the `tokenId=0` `leaf_a`
    node, the proof is `hash_b` and `hash_c_d`. Since `hash_b` is `hash_null`, which
    is already known, the proof can have a bit proof showing `01` uses first `bit=0`
    to mean that the first hash is `hash_null`, which is already known, and the second
    bit is `1` to mean that the modified hash should be used. This cuts down the proof
    size almost by half. If there are more nodes and the data is sparsely populated,
    the proof size can be decreased dramatically.


    Overall, with sparse Merkle trees, the proof size is decreased, and the computational
    workload is decreased as well.


    There are many alterations in implementing Plasma Layer 2 technology. With both
    Plasma and state channels, Layer 1 does not have full information about Layer
    2. Therefore, the security of Plasma or state channel depends on Layer 2 providing
    proof and transactions to the layer. This dependency on Layer 2 limits the usage
    of state channel and Plasma.


    The third type of Layer 2 technology is called rollup. This is different from
    Plasma or state channels. In Layer 2 rollup, the transactions are actually repackaged
    and then performed in the Layer 1 blockchain. With rollup, the Layer 1 blockchain
    no longer needs to ask users or Layer 2 operators for proof and transaction data.
    In the following, we describe how rollup works.


    ## Layer 2 Rollup


    In previous sections, we discussed Layer 2’s state channel and Plasma. State channel
    has the advantage of only interacting with Layer 1 when opening or closing the
    state channel. However, state channels will require participants to be enrolled
    in the channel and cannot send transactions to an arbitrary address. Layer 2 Plasma
    solved this problem by using operators to send Layer 2 transaction Merkle tree
    root to the Layer 1 storage. However, Plasma Layer 2 has the limitation of relying
    on Layer 2 to store and provide proofs and challenges. In this section, we introduce
    a third Layer 2 technology called rollup. Rollup is a technology that repackages
    transactions in Layer 2 and sends them as a batch transaction to Layer 1. The
    parameters in the batch transactions are optimized to save gas fee and increase
    scalability.


    There are two kinds of rollup technology that are being developed. One is using
    fraud proof that allows participants to challenge Layer 2 to Layer 1 transactions.
    Typical fraud proof solutions are called optimistic Layer 2 solutions such as
    Arbitrum, Polygon, and Optimism. Another kind is called validity proof that uses
    validation methods such as zero knowledge proof to interact between Layer 2 and
    Layer 1. Validity proof Layer 2 solutions include zk-rollup, zksync, etc.


    ### Optimistic Layer 2


    An overview of optimistic rollup is shown in the following diagram of Figure 9-6.
    The top layer shows the Layer 1 blockchain such as Ethereum mainnet. An optimistic
    rollup smart contract is deployed to the Layer 1 mainnet. There are several major
    functions for the rollup smart contract. For example, the smart contract has a
    function to receive transactions from Layer 2 blockchain in a Merkle tree format
    and process these transactions on Layer 1.


    On Layer 2, there is a similar blockchain built with OVM (Optimistic Virtual Machine).
    OVM supports smart contracts and can process transactions. The transactions on
    Layer 2 are arranged based on the transaction time. The ordering of transactions
    is done by sequencers. The ordering of transactions is very important as there
    might be dependencies among these transactions.


    When transactions in Layer 2 are repackaged and rolled up to Layer 1, there will
    be a wait period as Layer 1 does not have enough information.'
