    var account0 = 0;\n\nethereumButton.addEventListener('click', () => {\n    getAccount();\n\
    });\n\nasync function getAccount() {\n    const accounts = await ethereum.request({\
    \ method: 'eth_requestAccounts' });\n    account0 = accounts[0];\n    showAccount.innerHTML\
