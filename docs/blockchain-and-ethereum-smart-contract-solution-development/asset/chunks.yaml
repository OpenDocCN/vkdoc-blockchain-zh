    ## Architecture


    The architecture of the crosschain identity service is shown in the following
    diagram (Figure [11-4). T](#index_split_006.html#p423)he blockchain shown on the
    bottom layer provides security and immutability for the service. The middle layer
    is the smart contracts with functions such as adding crosschain ID, query ID,
    approve or revoke ID, modify ID, etc. The smart contract can query or save states
    to the blockchain through EVM. The top layer is the GUI layer that renders web
    pages, processes user inputs, and communicates with smart contracts with Web3
    and MetaMask wallet. The Web3 layer will need to connect with an RPC node in order
    to access smart contracts.


    ![](index-423_1.png)


    **Chapter 11 Building team projects**


    ***Figure 11-4.** *Crosschain ID service architecture*


    ## Design the Smart Contract


    When designing the smart contract, the following factors are considered: actors
    and roles, data structures, events, and functions.


    ### Roles


    Three roles are defined for the crosschain ID service smart contract. The `owner`
    is a role who deploys the smart contract. This `owner` owns the smart contract
    and has the privilege to assign an administrator for the smart contract. The administrator
    (`admin`) manages the crosschain IDs and can approve or revoke a crosschain ID.
    Then there are also regular users who can query crosschain IDs, add a new crosschain
    ID, or modify its information.


    **Chapter 11 Building team projects**


    ### Events


