    # 个体 #2 和 #3 彼此了解并信任对方。


    各个社会都曾探寻过能够充当货币的商品。有些社会将黄金、白银及其他贵金属等商品用作货币，而另一些社会则使用谷物、农作物或贝壳作为货币形式。在美国的监狱里，香烟和方便面被当作货币使用。关于货币，一个有趣的故事来自南太平洋的雅浦岛，在那里一种名为
    `rai` 的类石英晶体曾被用作货币（Bryan，2004）。`Rai` 是从邻近岛屿开采的，雅浦岛人根据他们认为开采和运输 `rai` 的难度及危险性来判断其价值。人们将
    `rai` 称为“原始版”比特币（Dockrill，2019）。


    以商品为基础的货币存在若干挑战或缺点。首先，商品可能笨重且不便运输，使得交易双方难以“发送”货币给对方。以商品为基础的货币也可能难以生产，因为其生产成本取决于天气、地理和劳动力成本等一系列因素。所有这些成本都会随时间变化，且不同社会间存在差异。不同社会对用作货币的商品（或称稀缺程度）的获取也并不均匀，4
    这可能导致不同社会最终使用不同的商品作为其货币基础。商品还难以实时或现场进行测量或评估。随着时间的推移，许多国家将黄金作为货币的基础。黄金稀缺、备受追捧，且人们可以借助工具和专业知识通过其重量和纯度进行评估。然而，黄金存在商品货币的其他缺点，因此国家政治权力被用来创造以纸币和硬币形式存在的货币面额（通货）。流通中的货币总量价值由该国持有的黄金储备担保。随着时间的推移，这种黄金储备的支持被取消，5
    货币 仅由创建该货币的国家的中央政治权力担保。我们将由国家政治权力支持的通货称为“法定”6 货币。那么，美国政府真的决定了美元的价值吗？请参阅边栏 7 “1
    美元值多少？” 对此话题的讨论。国家是发行法定货币的唯一机构吗？请参阅边栏“替代货币”对此话题的讨论。


    至此，我们已经能够更正式地定义货币的三个基本属性：


    1. **交易媒介** – 货币是所有人都能接受的用于交换交易的中介。这通常意味着货币可以反复使用、寿命长（耐用），且易于携带和运输（便携）。


    2. **价值储藏** – 人们可以假定其货币价值是稳定的；即它不会改变，或只会随时间可预测地变化。

    '
- fmt: 'Achieving this goal is to ensure that the amount of money in circulation (the
    money supply) remains relatively constant over time. High rates of inflation tend
    to reduce the confidence people have in a currency.


    3\. **Unit of account** – This is the name of the currency and the value or “units”
    assigned to different denominations of that currency. A dollar is a unit by which
    we can accurately represent the worth of goods, services, assets, and liabilities
    in an economy. For a unit of account to inspire confidence, it should be a good
    store of value. In addition, every instance of the same denomination should be
    uniform in terms of its purchasing power. For example, every `$1` bill has the
    same purchasing power. It should also be fungible; that is, there is no difference
    between two `$1` bills, they are completely interchangeable. Finally, money should
    be divisible; that is, a `$10` bill can be broken down into two `$5` bills, ten
    `$1` bills, or five `$2` bills.


    With this definition of money, based on our current knowledge about Bitcoin, can
    we say whether it can be categorized as money? At this stage of its evolution,
    the answer to this question is a resounding no. Bitcoin cannot be considered a
    medium of exchange because even though it is scarce, there are not yet enough
    people or businesses who are willing to accept Bitcoin as a medium of exchange.
    Bitcoin also cannot be considered a store of value since its value fluctuates
    greatly day to day when compared to fiat currency. In some aspects, Bitcoin can
    be considered a unit of account, it is fungible, and it is divisible. However,
    Bitcoin cannot accurately represent the worth of goods, services, assets, and
    liabilities because of its volatility.


    Most exchanges of currency in the economy today are not settled by the direct
    exchange of paper currency (also known as cash). In the next section, we will
    see how this creates the necessity for third parties and government regulations.
    Let us, however, end this section by looking at the similarity of transactions
    conducted using cash with transactions conducted using Bitcoin.


    - Both cash and Bitcoin transactions are anonymous and privacy preserving.

    - Both cash and Bitcoin if lost cannot be recovered.

    - Cash and Bitcoin usually belong to whoever has possession, though the meaning
    of possession is different.

    - Cash and Bitcoin are both difficult to counterfeit.


    We hope that the understanding of money from this section clarifies for you that
    Bitcoin, while unique in its implementation, is conceptually in line with the
    evolution of money, even if in its current state, we cannot categorize it as money.


    In the next section, we will broaden our aperture and look at value exchange in
    the economy as a whole, how and why third parties are needed, how and why government
    and other organizations impose regulations, and how collectively this creates
    a range of inefficiencies in the economic system.


    ## Economy As Value Exchange


    To understand how value exchange is the basis of all economic activity, let us
    revisit an old monetary riddle (Henderson, 2012).


    It’s a slow day in some little town … The sun is hot … the streets are deserted.
    Times are tough, everybody is in debt, and everybody lives on credit.


    On this particular day a rich tourist from back west is driving thru town. He
    stops at the motel and lays a `$100` bill on the desk saying he wants to inspect
    the rooms upstairs in order to pick one to spend the night.


    As soon as the man walks upstairs, the owner grabs the bill and runs next door
    to pay his debt to the butcher. The butcher takes the `$100` and runs down the
    street to retire his debt to the pig farmer. The pig farmer takes the `$100` and
    heads off to pay his bill at the feed store. The guy at the Farmer’s Co-op takes
    the `$100` and runs to pay his debt to the local prostitute, who has also been
    facing hard times and has had to offer her services on credit.'
