- fmt: "# Dynamic Array\n\nWhen a dynamic array is declared, its size will need to\
    \ be set with a length in the code execution.\n\nTo set the array length, use\
    \ the following syntax:\n\n`array_name = new data_type[](size);`\n\nHere, `array_name`\
    \ is the array variable name. `data_type` is the data type name, and `size` is\
    \ an `uint` that represents the intended size of the array. For example, the array\
    \ variables mentioned earlier can be set to the following length:\n\n```\n*balances\
    \ = new uint[](9); // set balances array size to 9*\n*students_addresses = new\
    \ address[](10);*\n*// set students_addresses array size to 10*\n```\n\n## Mapping\
    \ Data Type\n\nBesides `address` data type, another important one is `mapping`\
    \ type. `Mapping` data type associates two variables like an associative array.\
    \ `Mapping` type is an important data type because it correlates two or more variables.\n\
    \nTo declare mapping types, use the following syntax:\n\n`mapping(key_type =>\
    \ value_type)`\n\nThe `key_type` can be any elementary type such as built-in types\
    \ like `uint`, `address`, `bytes`, and `string`. The `key_type` can also be user-defined\
    \ or complex types like contract types, enums, mappings, structs, and any array\
    \ type. `value_type` can be any type, including mappings.\n\nThe following defines\
    \ a mapping of address array with balance for each array element:\n\n```\n*address\
    \ student_address;*\n*uint score;*\n*mapping(student_address => score) public\
    \ scores;*\n```\n\nThe preceding example defines `student_address` as an `address`\
    \ data type and a `score` as `uint` type. Then `student_address` is mapped to\
    \ `score`. To assign a score to a student, use the following syntax as example:\n\
    \n```\nstudent_1_address = *0x1B2E2A67b8E96039BbAC84EB4BC0913c0c16668D;*\n*score_1\
    \ = 90;*\n*scores[student_1_address] = score_1;*\n// This example sets the score\
    \ for student 1 to be 90.\n```\n\nTo retrieve the score of student 1, simply enter\
    \ the student's address to the `scores` variable:\n\n`scores[student_1_address]\
    \ // This will return 90.`\n\nA `mapping` is a versatile data type that associates\
    \ two variables without a predefined size. This is used frequently in smart contracts.\n\
    \n## Enum Data Type\n\n`Enum` is a data type that enumerates a variable to have\
    \ only some predefined values. By restricting the values in an `enum` variable,\
    \ the chance to make mistakes is decreased.\n\nThe syntax for defining an `enum`\
    \ is:\n\n`enum enum_type_name{VALUE_LIST};`\n\nHere, `enum` is the data type keyword,\
    \ and `enum_type_name` is the name of the `enum` type. `VALUE_LIST` is a list\
    \ of values separated by comma.\n\nOnce an `enum` type is defined, it can be used\
    \ to declare an `enum` variable:\n\n`enum_type_name variable_name;`\n\nFor example,\
    \ in order to limit the role of a decentralized organization, the `role` variable\
    \ can be an `enum` data type such as:\n\n```\n*enum DAO_ROLES{SECRETARY, ACCOUNTANT,\
    \ LEGAL, MEMBER};*\n*DAO_ROLES newMember;*\n*newMember = DAO_ROLES.MEMBER;*\n\
    ```\n\nIn the preceding example, `DAO_ROLES` is declared as an `enum` that can\
    \ have the values of `SECRETARY`, `ACCOUNTANT`, `LEGAL`, and `MEMBER`. The `DAO_ROLES`\
    \ is used to declare a variable `newMember`. This new member is assigned a value\
    \ of `DAO_ROLES.MEMBER`.\n\nBy using `enum`, it reduces the values for a variable\
    \ to a limited list and hence is less error prone.\n\nIn the following, a code\
    \ snippet is shown to illustrate how to use an `enum` to define variables:\n\n\
    ```\n*pragma solidity ^0.6.0;*\n*contract enum_example {*\n\t*enum DAO_ROLES{\
    \ SECRETARY, ACCOUNTANT, LEGAL, MEMBER};*\n\t*// define an enum type*\n\t*DAO_ROLES\
    \ latestMember; // define an enum variable*\n\t*function setRoleSECRETARY() public\
    \ { // declare a function*\n\t*to set latestMember to be a SECRETARY role*\n\t\
    \t*latestMember = DAO_ROLES.SECRETARY;*\n\t*}*\n\t*function getRole() public view\
    \ returns (DAO_ROLES)*\n\t*{ // Query the role of the latest member*\n\t\t*return\
    \ latestMember;*\n\t*}*\n*}*\n```\n\n## Struct Data Type\n\n`Struct` is the abbreviation\
    \ of structure. Similar to struct in other programming languages, Solidity supports\
    \ `struct` data type to group a number of variables together. The group of variables\
    \ can have different types."
