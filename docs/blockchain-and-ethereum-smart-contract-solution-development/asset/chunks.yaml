    ## Chapter 3 Blockchain Components and Architecture


    In this section, we have described five limitations of blockchain: energy consumption,
    scalability, risk of nefarious activities, change management, and confidentiality
    risk. These limitations should be kept in mind when we design business applications
    using blockchain.


    ### Chapter Summary/Key Takeaways


    Key takeaways from this chapter are as follows:


    - A `transaction` is the foundational concept in blockchain, and it is initiated
    by one party to transfer value to one or more parties based on mutually agreed
    terms and conditions. In a blockchain, parties transact with one another through
    peer-to-peer computer nodes. Each node can independently verify and validate each
    transaction that it receives.

    - A `block` is a packaging of valid transactions – the process used by all the
    nodes in a blockchain to create blocks is known as the `consensus protocol`. Each
    new block is logically connected to a previous block, creating the blockchain.
    The consensus protocol makes it difficult to change the transactions in a block
    once it has been added to the blockchain. This is why blocks in a blockchain are
    considered immutable.

    - A blockchain maintains an audit trail of the value being transferred between
    parties. This audit trail is known as the provenance of a transaction.

    - The blockchain is a distributed ledger because conceptually all nodes have an
    exact replica of the chain of blocks. New blocks can be added to the blockchain,
    and previously added blocks cannot be altered, making blockchain an append-only
    distributed ledger.

    - Privacy is preserved in the blockchain by including only the public keys of
    the parties involved in the transaction – each party controls who is able to map
    their public key to their identity.

    - `Smart contracts` embed in executable code the terms and conditions for consummating
    the transaction.

    - Conceptually, the four components of a blockchain are distributed ledgers, privacy
    preservation, consensus mechanisms, and smart contracts.

    - There are four possible types of blockchains: private permissioned, public permissioned,
    private permissionless, and public permissionless.

    - A blockchain has five limitations: energy consumption, scalability, risk of
    nefarious activity, smart contract change management, and smart contract confidentiality.


    In the first three chapters, we have completed reviewing the economic potential
    of blockchain, the core technologies (cryptography, distributed systems, and peer-to-peer
    networks) that underlie blockchain implementations, and a conceptual description
    of the core components of blockchain. In the next chapter, we will describe criteria
    that can be used to decide if a business problem requires a blockchain solution,
    guidelines for making design decisions for blockchain applications, and illustrative
    applications of blockchain.


    ### Sidebar – Blockchain Terminology


    - **Block:** A data structure that holds a list of transactions and a header.

    - **Blockchain:** A data structure that links blocks together.

    - **Transaction:** A data structure that encodes information about the transfer
    of payments between parties.'
