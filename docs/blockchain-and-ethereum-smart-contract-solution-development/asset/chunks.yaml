    # 以太坊架构与概述


    用户随后可以用自己的代币与流动性池中的资产进行交易。


    ## 自动价格调整


    在 Uniswap 流动性池中，代币对 `(X, Y)` 中的两种代币数量需要保持平衡。如果代币 `X` 的数量增加，那么代币 `Y` 的数量就会减少，同时代币
    `Y` 的价格上涨。这会触发负反馈机制来平衡资金池。


    ## 套利


    套利是交易者平衡流动性池中价格波动的过程。当代币对 `(X, Y)` 中的代币 `X` 数量增加时，代币 `Y` 的数量减少，代币 `Y` 的价格上涨。套利者看到代币
    `Y` 的价格高于其他交易所后，会从其他交易所卖出代币 `Y` 到 Uniswap，以增加代币 `Y` 的供应量来平衡流动性池。当流动性池恢复平衡时，代币价格应与其他交易所的价格相近。


    通过使用自动化做市商机制，Uniswap 在三年内将 TVL（总锁仓价值）增长到了 50 亿美元，并实现了惊人的 5% 的日环比增长率。


    ## NFT 应用


    NFT 是一种具有唯一标识且不可被其他代币替换或交换的代币。NFT 的规范定义在 `ERC721` 以及后续版本 `ERC1440` 中。`ERC721`
    的一个关键特性是名为 `id` 的字段，它为每个代币包含一个唯一值。`ERC721` 最常用于代表创意艺术作品。NFT 领域的项目包括 0xcert、OpenSea、Decentraland、CryptoPunk
    等。


    `0xcert` 是一个允许你开发 NFT 的 SDK 工具集。以太坊上为 `ERC20` 发行的大多数代币是可互换的，这意味着代币项目之间没有区别。可互换代币基于价值，如同美元钞票一样可以互换。而对于
    NFT，每个代币都是不同的，且不可替代。例如，证书或文凭可以表示为非同质化代币，因为它是由某个机构为特定个人唯一签发的。未来，将会有越来越多的 dApp 被开发出来以处理非同质化代币。例如，原创艺术品、法庭文件和大学证书都属于这一类。


    OpenSea 允许用户提交 NFT 作品进行销售，或使用加密货币购买 NFT 藏品。它们还支持拍卖，使得出价最高者有权通过智能合约购买 NFT 艺术品。所有交易均由智能合约自动控制，无需人工干预或第三方托管。


    ## 预言机服务


    预言机服务用于提供区块链与传统 IT 系统之间的连接。区块链是自封闭的，区块链客户端无法直接与网络服务器通信。这很可能是出于安全考虑而设计的。无论是比特币还是以太坊区块链，都没有在链上集成
    Web API 来调用由传统 IT 系统托管的网络服务。为了使区块链能够与传统 IT 系统交互，需要使用预言机服务。


    Chainlink 是最流行的预言机服务之一，它允许将传统网络服务与以太坊区块链连接起来。如果你有一个需要获取外部数据的去中心化应用程序，你需要使用预言机服务。例如，如果你的智能合约需要获取天气信息，你必须使用预言机服务，因为区块链本身不包含任何天气信息。要获取法定货币/央行数字货币的价值、货币汇率或加密货币价值等信息，你也需要连接由银行或第三方服务提供的预言机服务。


    还有由 Provable 和 Band 项目提供的其他预言机服务。Provable 项目还提供了一些 SDK 和示例代码，用于 dApp 与预言机服务协作，非常方便。


    ## DAO 平台


    DAO（去中心化自治组织）是一个使用智能

