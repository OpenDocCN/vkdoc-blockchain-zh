    \n这是一个漏洞，用户或黑客可以调用函数来销毁智能合约的功能，使其无法恢复。这发生在著名的Parity“我不小心杀死了它”的漏洞中，一名匿名用户调用了Parity多重签名钱包组件中的`kill`函数并销毁了该组件。该漏洞导致总计513,774.16个以太币无法被资产所有者访问。为了防止这种情况发生，应尽量减少使用`kill`函数、放弃所有权函数和`destruct`函数，除非绝对必要。自毁函数包括`suicide`或`selfdestruct`函数。\n\
    \n```\n// This is a selfdestruct function that will remove the\n// contract and\
    \ send the remaining asset to the sender address\npragma solidity ^0.4.22;\n\n\
    contract SimpleSuicide {\n    function sudicideAnyone() {\n        selfdestruct(msg.sender);\n\
    \    }\n}\n```\n\n**漏洞：使用Solidity已弃用函数**\n\n某些旧版Solidity中的函数已被弃用并替换为新函数，如图[7-5](#index_split_004.html#p288)所示。编译时，请关注警告并用新函数替换已弃用的函数。\n\
    \n***图7-5.** Solidity中的已弃用函数*\n\n**漏洞：`Delegatecall`到不可信的被调用方**\n\nSolidity支持`delegatecall`函数，该函数将使用调用合约的相同执行上下文调用另一个智能合约。这意味着`msg.sender`和`msg.value`对于调用方和被调用方是相同的。如果被调用方地址不可信，则会导致调用合约的安全问题。\n\
    \n**漏洞：由失败函数调用导致的拒绝服务**\n\n外部调用可能失败，且不应停止其余执行步骤。开发者应避免在单笔交易中组合多个调用。合约函数应具有处理失败调用的逻辑。在向用户发送资金时，最好让用户通过发起交易来“拉取”资金，而不是使用智能合约将资产推送给一组用户。\n\
    \n**漏洞：竞态条件和交易顺序依赖**\n\n区块链不会按提交顺序执行交易。交易由矿工打包，矿工倾向于打包具有较高燃料费的交易。当不同智能合约中的函数调用存在依赖关系时，这会导致某些智能合约函数出现问题。例如，ERC20同质化代币有一个`approve`函数，用于指定另一个用户使用一定数量的代币。然后有一个`transfer`函数，可以转移不超过已批准金额的资金。假设Alice批准Bob使用金额为`m`的资金，然后更改批准金额为`n`，在此期间，Bob发送了两笔交易，分别转移金额`n`和`m`。由于交易并非严格按照顺序执行，Bob的第一笔转账可能落在Alice的第一次批准和第二次批准之间，而Bob的第二笔转账则落在第二次批准之后。这将允许Bob提取`m\
