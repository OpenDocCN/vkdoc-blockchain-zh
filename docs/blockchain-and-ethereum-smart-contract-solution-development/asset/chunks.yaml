  trans: '

    ### **图 1-3.** 数据在价值交换中的作用


    - 首先，所有交换交易都会产生数据。这些数据作为交易记录，用于审计、监控、分析和规划。

    - 其次，所有交换交易都受数据约束。这些数据设定了合同参数，规定了交易结算的条件。

    - 数据所扮演的第三个角色，将价值的定义扩展至包括数据交换本身作为一种固有价值来源。数据在这一角色上仍处于萌芽阶段，其底层合同也仍在演变之中。


    基于对第三方参与的这一理解，让我们进一步深入探讨两家企业之间的价值交换交易。


    `图 1-4` 展示了前文讨论过的金融机构的参与情况。


    ![图 1-4](img/index-35_1.jpg)


    ## 第 1 章 区块链的商业与经济动机


    ### **图 1-4.** 第三方在价值交换中的作用


    企业之间的现金通过各自的金融机构进行交换。每家金融机构都会收取费用。此外，政府也会介入，对金融机构之间的交换交易进行监管。如果企业位于不同国家，且交换交易是跨境交易，则可能涉及多个政府。政府还会介入那些据称为公平裁决交易双方潜在纠纷而制定的法规。诸如此类的法规很少是中立的，通常偏向于交易中更强大且具有政治关联的企业。我们认为政府和金融机构的参与，对交换交易几乎没有或根本没有增加价值。除了金融机构和政府之外，`图
    1-4` 还展示了另一类企业的参与。这些企业被称为“第三方物流”供应商。这些公司通过协助运输、仓储、调度和配送，帮助企业之间进行货物交换。第三方物流供应商在货物交换中增加了价值，并执行了参与交换的主要企业委托给它们的任务。


    ![图 1-4（续）](img/index-36_1.png)


    ## 第 1 章 区块链的商业与经济动机


    我们已经知道数据在价值交换中扮演的关键角色。`图 1-5` 展示了这在交易企业之间是如何体现的。


    ### **图 1-5.** 交易企业之间的专有数据


    每家企业都会创建数据来记录交易，并管理那些管控企业之间交易的数据。我们天真地期望：(1) 这两家企业捕获相同或相似的数据；(2) 两家企业的数据是等价的；(3)
    两家企业能够查询并理解彼此的数据。然而，我们的期望很可能会落空。每家企业使用不同的流程和不同的系统，并有着不同的目标，导致创建出的数据只有该企业的人员才能理解。如果你推断这种对彼此数据缺乏理解会导致开展业务困难，那么你是对的。在下一节中，我们将看到这种专有数据是经济效率低下的根源。


    在本节结束前，我们来看一下货物从制造商到达消费者手中所需的所有交换的复杂性。`图 1-6` 描绘了这一供应链。你可以看到，在企业和消费者之间进行交换之前，企业之间存在着多次企业对企业（B2B）的交换。


    ![图 1-6](img/index-37_1.png)


