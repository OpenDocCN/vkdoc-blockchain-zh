- fmt: "For example, `sol2uml` package is a versatile tool to generate UML from smart\
    \ contract source code; it can also fetch UML for smart contract deployed to Ethereum\
    \ blockchain.\n\nTo install `sol2uml`, simply type the following command by using\
    \ node package manager (npm):\n\n```\nnpm install sol2uml --only=production\n\
    ```\n\nOnce `sol2uml` is installed, it can be run with various parameters as shown\
    \ in the following help menu:\n\n```\n$ sol2uml -h\nUsage: sol2uml <fileFolderAddress>\
    \ [options]\nGenerates UML diagrams from Solidity source code.\nIf no file, folder\
    \ or address is passed as the first\nargument, the working folder is used.\nWhen\
    \ a folder is used, all *.sol files are found in that\nfolder and all subfolders.\n\
    If an Ethereum address with a 0x prefix is passed, the\nverified source code from\
    \ Etherscan will be used.\n\nOptions:\n  -v, --verbose run with debugging statements\n\
    \  -f, --outputFormat <value> output file format: svg, png,\n                \
    \          dot or all (default: \"svg\")\n  -o, --outputFileName <value> output\
    \ file name\n  -d, --depthLimit <depth> number of sub folders that\n         \
    \                 will be recursively searched\n                          for\
    \ Solidity files. Default\n                          -1 is unlimited (default:\
    \ -1)\n  -n, --network <network> mainnet, ropsten, kovan,\n                  \
    \        rinkeby or goerli (default:\n                          \"mainnet\")\n\
    \  -k, --etherscanApiKey <key> Etherscan API Key\n  -c, --clusterFolders Cluster\
    \ contracts into\n                          source folders\n  -h, --help output\
    \ usage information\n```\n\nTo generate UML diagram for smart contracts in a local\
    \ directory, type the following command:\n\n```\nsol2uml ./contracts\n```\n\n\
    Here, `./contracts` is the directory location for smart contract files.\n\n`sol2uml`\
    \ can also fetch UML files for smart contracts deployed to Ethereum blockchain.\
    \ For example, to get a UML for a particular address in the Ropsten blockchain,\
    \ run the following command:\n\n```\nsol2uml smartcontract_address -n ropsten\n\
    ```\n\nHere, `smartcontract_address` is the address of the smart contract that\
    \ has been deployed to Ethereum blockchain. `-n ropsten` means that this is for\
    \ smart contracts in the Ropsten blockchain.\n\nTo understand a UML diagram, we\
    \ use part of a smart contract for USDT ERC20 token. This UML diagram as shown\
    \ in Figure 7-11 can be fetched by typing the following address in a browser URL:\n\
    \n```\nhttps://etherscan.io/viewsvg?t=1&a=0xdAC17F958D2ee523a2206206994597C13D831ec7\n\
    ```\n\n![Figure 7-11. UML diagram for USDT ERC20 token](index-306_1.png)\n\nIn\
    \ this diagram, each box represents a smart contract class, an interface, or a\
    \ library.\n\nThere are multiple sections for each box. The top bar is the smart\
    \ contract name. Then each scope of variables and functions are grouped into their\
    \ respective sections such as `internal`, `public`, and `external`. Each section\
    \ contains a list of variable names, function names, and parameters.\n\nLines\
    \ with arrows are drawn between boxes to represent entity relationships. If smart\
    \ contract A uses smart contract B, meaning that B is a parent of A, then a directed\
    \ line is drawn from B to A. If entity A is an abstract smart contract or an interface,\
    \ then a dash line instead of a solid line is drawn.\n\nIn Solidity, an abstract\
    \ class is a special smart contract in which functions are defined but not implemented.\
    \ The contract that uses or inherits an abstract smart contract will need to implement\
    \ those functions defined. Also interfaces are special smart contracts in which\
    \ only function names are defined. There are no variables declared in interfaces.\n\
    \nBesides interfaces, smart contracts can also define and call library functions.\
    \ Libraries in Solidity are defined with the `library` keyword and have functions\
    \ that can be called by other smart contracts. Library is stateless and cannot\
    \ have state variables.\n\n**Solidity Test**\n\n**Solidity Unit Testing: A Remix\
    \ Plug-in for Testing**"
