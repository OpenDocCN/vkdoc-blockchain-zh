    ## 7. Data Security Risks


    Proprietary centralized data stores are inviting targets for malicious actors
    to breach and harness.


    **Time to settle transactions** – Depending on the type of transaction and industry,
    transactions can take days, weeks, or even months to settle. For example, cash
    transfers within the United States can take 1 to 3 business days to settle. Similarly,
    credit card transactions can also take 1 to 3 business days to settle. Cross-border
    cash transfers can take 5 to 14 business days to settle depending on the amount
    of money being transferred, the originating country, and the destination country.
    It is also not uncommon for some healthcare transactions to take as much as six
    months to completely settle from the point of value exchange. Similarly, it is
    not uncommon for some supply chain–oriented transaction between firms to take
    at least three months and sometime up to a year to completely settle. These long
    settlement times create inefficiencies by requiring companies to have more cash
    flow to “float” their business than necessary, unsettled money is an idle asset
    that cannot be productively deployed, exchange rate fluctuations cause uncertainty
    in the value being exchanged, and some transaction end up not being successful
    due to unforeseen technical (or other) reasons. These issues with long settlement
    times also drive firms to invest in labor to track the transactions while the
    settlement is in process.


    **Fees to third parties** – Credit card processing firms such as Visa, Mastercard,
    and American Express charge in the range of 1.3% to 3.5% of the value of the transaction
    to process the exchange (Daly, 2021). According to Statista (2021), in 2019, the
    total value of credit card transactions in the United States was $3.96 trillion.
    These are not the only fees firms pay. They also pay a cut to the payment processor,
    interchange fees, assessment fees, and processing fees (Daly, 2021). Most firms
    pass this cost back to the consumer in terms of higher prices, and in some cases,
    firms show these fees as an additional charge on a transaction. There are similar
    fees associated with wire transfers (Napoletano, 2020) and other bank-to-bank
    transfers. Consumers might not have transparency on all these fees. In addition
    to the obvious expense associated with the fees, firms also incur additional costs
    associated with the maintenance of contracts and contractual relationships with
    the third parties, labor to track and reconcile the fees, setup and maintenance
    of data transmission infrastructure, and the management of the security and confidentiality
    risks associated with sharing of data. While we can consider the facilitating
    of exchange in an economy to be a net value add, we can also assert that from
    a strict utility perspective, these firms are only adding value because the available
    exchange mechanisms do not allow firms that do not trust each other to transact
    with surety.


    **Data-related inefficiencies** – Previously, we have described the reasons that
    our current economic system results in firms creating and maintaining their proprietary
    data. Here, we will describe the resulting economic inefficiencies. To make these
    economic inefficiencies memorable for the students to remember, we have coined
    the three “Rs” to label these inefficiencies. The three R’s are redundant work,
    rework, and reconciliation work.


    Proprietary data makes several parties who are going to engage in a transaction
    duplicate the same work, wasting effort that could be spent on something else
    to drive productivity. Let’s look at a few examples of redundant work. In the
    healthcare system, all health systems need to verify the credentials of the clinicians
    that have privileges to work at that health system. A clinician usually collects
    all their credentials from parties that can certify the authenticity of the credentials.
    The clinician then submits'
