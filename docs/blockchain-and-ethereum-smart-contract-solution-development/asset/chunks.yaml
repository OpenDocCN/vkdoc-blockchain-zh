- fmt: "# 构建去中心化应用的投票与升级机制\n\n项目通过构建投票机制来决定项目的运营和升级。项目团队发行治理代币并将其分发给社区成员。投票权与治理代币的数量成正比。社区成员可以通过赚取治理代币来提高其投票能力。当提出新功能或升级时，该提案会被发送到投票系统，每位社区成员可以投票支持或拒绝该提案。被接受的提案由开发者以开源方式实施，然后部署到主网。\n\
    \n一个主要的挑战是，当发现安全漏洞时如何升级已部署的智能合约。由于没有中央权威机构，社区需要投票决定是否进行升级。然而，由于区块链是不可变的，已部署的智能合约无法被打补丁或升级。\n\
    \n在这种情况下，智能合约需要重新部署。在重新部署新智能合约时，由旧智能合约管理的代币需要迁移到新智能合约。当新智能合约部署后，所有网页和 Web3 接口都应指向新的智能合约地址。这是一个非常繁琐且容易出错的过程。\n\
    \n有时，编写可升级的智能合约是更好的选择。这需要将一个智能合约拆分为两个或多个智能合约。第一个智能合约是一个入口智能合约，功能非常简单，例如接收一个地址并调用该地址的目标智能合约。目标智能合约是实现了大部分功能的合约。如果目标智能合约存在安全漏洞并需要升级，可以部署一个新的目标智能合约，并将新地址发送给入口智能合约。当入口智能合约接收到新的目标智能合约地址时，它会调用新的目标智能合约。通过这种可升级的智能合约设计，网页和\
    \ CLI 无需重新配置，因为入口智能合约的地址保持不变。\n\n为了最优地运营去中心化应用，构建一些服务来监控关键参数是至关重要的。例如，应监控总的代币铸造量，以确保黑客没有铸造额外的代币。还可以监控交易吞吐量和\
    \ gas 费用，以确保 dApp 处于健康的运行状态。此外，还应监控 EVM 的升级和以太坊的硬分叉，以确保去中心化应用不会受到负面影响。\n\n最后，一个充满活力的社区是成功运营去中心化应用的关键。构建一个\
    \ dApp 的过程与构建一个社区密不可分。只有社区积极参与，去中心化应用才能持续、发展并抵御严重的攻击。\n\n## 索引\n\n**A**\n\n* \
