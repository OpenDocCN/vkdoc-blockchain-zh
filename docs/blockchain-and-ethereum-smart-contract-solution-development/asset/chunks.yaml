- fmt: '# Ethereum Blockchain Ecosystem and DeFi Projects


    Before building a project using the smart contract development technology, it
    is essential to learn about the current Ethereum ecosystems. There are thousands
    of smart contracts and dApps deployed to the Ethereum blockchain already. We will
    walk through some of these projects so that you are aware of what kinds of projects
    are available already. It is better to brainstorm new ideas rather than reinvent
    the wheel.


    In more detail, the Tooling and Applications Layers for developers will be discussed
    in the subsequent chapters.


    ## Wallet to Manage Assets


    The first class of blockchain applications are wallets that are used to manage
    assets.


    In traditional finance, if you want to manage your asset, you most likely will
    go to a bank to open an account and let the bank manage the asset for you. But
    in the Ethereum blockchain, the assets are stored in a distributed ledger, and
    therefore, there are multiple ways to manage it.


    ### Hosted Service


    You can open an account with `Coinbase` and let `Coinbase` host the management
    of your crypto asset. When `Coinbase` is hosting your asset, you do not manage
    the private key for the asset; rather, you create a login account with the `Coinbase`
    service and let `Coinbase` do the transactions on your behalf. These kinds of
    services are centralized. There are asset management services around the world
    that offer services similar to `Coinbase`.


    For users who prefer managing assets without a central portal, they can have full
    control of their assets by using `Coinbase` wallets that store their private keys
    locally. `Coinbase` wallets allow users to create accounts by themselves and do
    the asset management directly with the blockchain without going through a custodian.


    ### MetaMask


    `MetaMask` is one of the most popular web browser extension wallets and most versatile
    to use. Figure 6-3 shows how `MetaMask` interacts with blockchain to manage assets.


    **Figure 6-3.** MetaMask workflow


    `MetaMask` can be installed on the Chrome or Firefox browser. For Chrome installation,
    you simply download it from Chrome web store and install it to your browser. When
    `MetaMask` is first launched, it will create crypto accounts for you. Instead
    of generating private keys directly, `MetaMask` uses BIP39 specifications to generate
    mnemonic words, i.e. seed phrases, that are 12 common and easy-to-remember English
    words. The seed phrase can be used to generate multiple private keys and addresses.
    You need to write down the seed phrases in order to recover `MetaMask` accounts
    if the extension is uninstalled.


    ### MyEtherWallet


    `MyEtherWallet` (`MEW`) is an open source, client-side interface that allows users
    to interact directly with the Ethereum blockchain without having to join a centralized
    exchange. Figure 6-4 shows the workflow of transactions from user action to the
    blockchain.


    **Figure 6-4.** MyEtherWallet workflow


    Although `MyEtherWallet` only works on the client side with no blockchain information
    sent back to the web server for processing and storage, there are still possibilities
    for phishing attacks. Using a hardware or mobile wallet of `MyEtherWallet` is
    recommended. The web-based `MyEtherWallet` is not recommended and should be used
    in offline settings only.


    ### Fortmatic


    `Fortmatic` is another kind of wallet that allows users to create accounts with
    their social identities. This is similar to a PayPal service where you can create
    an account with an email address. `Fortmatic` provides APIs to connect with various
    web-based decentralized applications and is very convenient for users who do not
    mind using a custodian wallet for crypto transactions and applications.


    In this section, we mention asset management tools such as the web wallet, web
    extension wallet, mobile wallet, and custodian wallet.'
