  trans: "\n# 19 [www.cms.gov/files/document/highlights.pdf](http://www.cms.gov/files/document/highlights.pdf)\n\
    \n## 第四章 区块链商业应用\n\n除了第三方管理机构及其委托的服务提供商之外，医疗体系中还有其他利益相关者。这些利益相关者包括制药厂商、医疗设备制造商，以及为临床服务提供者、消费者和第三方管理机构提供信息技术的公司。这些利益相关者与消费者之间的价值交换需要经过临床服务提供者的批准和授权。然而，第三方管理机构也负责管理对这些利益相关者的报酬支付，这常常使本已复杂的三方价值交换变得更加复杂。\n\
    \n除了这些利益相关者，美国的医疗体系还包括联邦层面的研究、公共卫生和监管机构，例如 CMS（医疗保险和医疗补助服务中心）、FDA（美国食品药品监督管理局）、CDC（美国疾病控制与预防中心）以及\
    \ NIH（美国国立卫生研究院）。州和地方政府所属的监管及公共卫生组织也在美国医疗服务的提供中扮演着重要角色。最后，代表医疗保险公司的倡导组织、药品福利管理组织、医院医疗系统、制药厂商以及临床服务提供者（医生、护士和药剂师）都在努力推动医疗政策向有利于自身的方向倾斜。需要指出的是，虽然存在针对特定疾病（如自闭症、硬皮病、乳腺癌）消费者的倡导组织，但总体上并没有一个为普通消费者发声的组织。\n\
    \n我们花费笔墨来描述所有这些利益相关者，是为了让大家理解医疗体系的复杂性是如何掩盖消费者与临床服务提供者之间的价值交换的。医疗体系中的权力在很大程度上已下放给第三方管理机构和倡导组织，尽管它们在价值交换中并非必需。\n\
    \n## 第四章 区块链商业应用\n\n现在，让我们通过考察主要的七类经济低效现象，来审视医疗体系中的经济低效问题：\n\n- **医疗体系中交易的结算时间：**\
    \ 总体而言，大约 80%的医疗赔付计算索赔能在两周内结清；剩下 20%的索赔可能需要六个月以上才能结算。CMS 估计 2020 年的医疗支出为 4.1 万亿美元。[²⁰]\
    \ 这个庞大数字的 20%相当于超过了 8000 亿美元，这代表着一个巨大的改进机会。\n\n- **为无增值活动向第三方支付的费用：** 我们可以将医疗保险公司和药品福利管理公司的利润，以及倡导组织的年度预算支出，视为是为无增值活动向第三方支付的费用。\n\
    \n- **与数据相关的重复工作、返工及对账工作：** 我们的数据问题导致了行政浪费、不必要的医疗护理以及本可避免的错误。Shrank、Rogstad 和\
    \ Parekh（2019 年）报告并证实，在约 4 万亿美元的医疗支出中，有 30%被视为浪费或无增值。我们认为这并未包括与第三方相关的低效问题。[²⁰]\n\
    \n此外，美国在行政管理任务上的医疗支出金额领先于所有国家（Papanicolas、Woskie 和 Jha，2018 年）。\n\n- **欺诈：** LexisNexis\
    \ 在 2011 年的一项估计认为，医疗支出中有 3%因欺诈而损失。[²¹] 其他估计则更接近 5.5%。2020 年医疗支出的 3%大约相当于 1200\
    \ 亿美元。\n\n[²⁰]: [www.cms.gov/files/document/highlights.pdf](http://www.cms.gov/files/document/highlights.pdf)\
    \ 。参见 CMS 重点文件，2021 财年，图 11。  \n[²¹]: LexisNexis，“新研究显示医疗欺诈率每年为 6.9%”，新闻稿（LexisNexis\
    \ Risk Solutions，2011 年 3 月 31 日）。\n"
