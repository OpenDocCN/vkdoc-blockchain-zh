    ## Chapter 1: Business and Economic Motivation for Blockchain


    At a very high conceptual, perhaps even aspirational, level, we see that the core
    capabilities of blockchain have the potential to positively impact the inefficiencies
    in the current economic system. Blockchain can continue the positive impact to
    economic productivity that was started by the collection of technologies that
    we have labeled as ERP software and the internet.


    This book is all about how to operationalize these aspirations with a clear-eyed
    understanding of the limitations of the current capabilities and where the arc
    of research and development within blockchain is headed. While Bitcoin, the first
    blockchain implementation was released in 2008 (13 years ago), we are still in
    the early innings of the business adoption of this technology.


