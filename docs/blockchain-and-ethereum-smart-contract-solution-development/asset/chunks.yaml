    **关于作者**


    **张伟佳博士**在德克萨斯大学教授智能合约开发课程。他在区块链、认知科学、心智建模、计算流体动力学（`CFD`）、软件建模、计算机技术和工业标准方面拥有丰富的研发知识和工程经验。张博士已发表超过
    30 篇研究和技术论文，并作为发明人拥有 20 多项计算机与数字技术领域的专利（已授权和正在申请中）。他还曾担任技术委员会投票成员，推动结构化信息标准促进组织（`OASIS`）发布了解决方案部署描述符（`SDD`）。


    **Tej Anand 博士**是马里兰大学史密斯商学院临床教授，哥伦比亚大学专业研究学院客座讲师。Tej 的职业生涯前半段在飞利浦研究院、尼尔森和 NCR/Teradata
    从事人工智能/数据研究，后半段则在 Golden Books、CA Technologies、MedcoHealth 和 CareCentrix 担任商业技术高管。


    xv


    关于作者


    Tej 的研究兴趣包括区块链治理、全企业分析成熟度以及推动技术成功采纳的商业领导者特质。


    Tej 此前曾在德克萨斯大学奥斯汀分校麦库姆斯商学院担任助理临床教授。


    xvi


    ![index-16_1.jpg](img/index-16_1.jpg)


    **关于技术审校者**


    **Prasanth Sahoo** 是 PDI Software 的思想领袖、兼职教授、技术演讲者，以及区块链、DevOps、云服务和敏捷领域的全职实践者。因其在学术服务社区中的知识分享，荣获
    TCS 全球社区颁发的“2019 年度区块链与云专家奖”。他热衷于通过指导、辅导和培养技巧处理各类社区倡议，推动数字技术计划。


    Prasanth 拥有一项以自己名字命名的专利，至今已与超过 50,000 名专业人士（主要集中在技术领域）进行过交流。他是区块链委员会、加密货币认证联盟、Scrum
    联盟、Scrum 组织以及国际商业分析研究所的工作组成员。


    xvii


    **致谢**


    本书部分基于我们在以下机构讲授的课程：德克萨斯大学奥斯汀分校麦库姆斯商学院、哥伦比亚大学专业研究学院，以及马里兰大学帕克分校史密斯商学院。


    如果没有 Prabhudev Konana 教授、Sriram Vishwanath 教授和 Caryn Conley 博士在德克萨斯大学奥斯汀分校为批准我们课程所付出的巨大努力，我们不会撰写此书。Arthur
    Langer 教授在哥伦比亚大学推动课程获批方面发挥了关键作用。


