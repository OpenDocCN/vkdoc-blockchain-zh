    Fabric 区块链是最广泛使用的私有许可区块链平台。多个成功的企业级商业应用已使用`Hyperledger Fabric`开发。在[第 4 章](https://doi.org/10.1007/978-1-4842-8164-2_4)中，我们将系统性地回顾系统设计师如何确定哪种类型的区块链实现最适合其业务问题。


