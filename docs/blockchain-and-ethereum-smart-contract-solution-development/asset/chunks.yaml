    \n**任务2：浏览、编辑并编译智能合约**\n\nRemix在Web服务器中打包了一些示例智能合约。  \n点击`File Explorer`图标，打开智能合约浏览面板。智能合约的源文件可以创建为新文件，也可以从`Gist`、`GitHub`、`Swarm`、`IPFS`或`HTTPS\
    \ URL`等仓库导入。需要注意的是，如果源文件是从外部仓库导入的，修改后的文件不会写回原仓库，需要手动操作。例如，工作区可以作为`gist`发布到`GitHub`仓库中。对于`IPFS`、`HTTPS`和`Swarm`等其他仓库，则需要手动在Remix之外进行上传。\n\
    \n要编译智能合约，首先浏览源文件，然后点击想要编辑的文件。文件内容会显示在主面板上。开发者可以使用内置编辑器直接修改源代码。文件编辑完成后，点击`Solidity\
    \ Compiler`按钮，这会在侧面板中启动一个编译器GUI。在选择好Solidity编译器版本和EVM后，开发者可以点击`Compile`按钮开始编译。任何编译错误都会显示在编译器面板上，并提示开发者修改源代码以修复错误。一旦智能合约编译成功，就会生成字节码和`ABI`文件。\n\
    \n需要注意的是，修改后的源代码仅存储在浏览器中，需要额外步骤才能保存到永久存储。可以通过将文件下载到本地存储，或者将文件发布到`GitHub`存储中的新`gist`来实现。由于Remix浏览器没有持久化存储，如果浏览器数据被清除，编辑过但未下载或未发布的文件将会丢失。为了将Remix浏览器与持久化存储同步，需要将Remix网页连接到本地存储。这可以通过在后台运行`remixd`来实现，它为Remix提供共享的持久化存储。\n\
