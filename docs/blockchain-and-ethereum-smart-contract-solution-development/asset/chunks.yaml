  trans: "\n# 所有者账户\n\n第 8 章：安全考虑\n\n## 禁用智能合约\n\n这是另一种功能安全漏洞，非特权用户可以调用某个函数来终止智能合约。这是另一个需要留意的问题。在智能合约中，可能存在一个可执行的函数，通过清除状态、存储和设置来禁用整个智能合约。如果这个函数被无意中调用，将完全摧毁该智能合约。\n\
    \n## 孤儿智能合约\n\n当智能合约被部署时，发送部署交易的账户就是所有者，它对该智能合约拥有高级管理权限。有时，为了提高去中心化程度，所有者可能会将所有权转移给另一个所有者账户、一个智能合约，或者放弃所有权。一旦智能合约的所有权在部署后被转移或放弃，原所有者就不再拥有管理该智能合约的权利。因此，在设计过程中制定一个智能合约所有权计划至关重要。一旦智能合约被部署且所有权被转移或放弃，当去中心化应用中出现紧急情况时，就无法暂停或升级这些智能合约了。\n\
    \n## 智能合约中可被攻击的安全漏洞\n\n这类安全漏洞是由恶意用户造成的。它们比功能性安全漏洞更隐蔽，且极难被发现。黑客通常需要构造人工交易并执行多个步骤的攻击。攻击者也保持匿名，并有办法转移资金。这类漏洞还可能包括攻击区块链节点、Web3\
    \ 客户端以及智能合约外部的环境。其他已发生的漏洞还包括黑客进行以下操作：(1) 通过恶意交易调用有问题的内部函数；(2) 改变函数调用的外部参数和条件；(3)\
    \ 更改白名单地址和名称；(4) 攻击预言机。以下是一些可被攻击的安全漏洞示例：\n\n### 示例 1：向任意账户支付账单\n\n以下是一个存在安全漏洞的代码片段：\n\
    \n```solidity\npragma solidity ⁰.8.6;\n\ncontract PayIssue {\n    function payBill\
    \ ( address payable recipient, uint256 x_amount ) public payable {\n        recipient.transfer(x_amount);\n\
    \    }\n}\n```\n\n在上述代码中，有一个名为 `payBill(address payable recipient, uint256 x_amount)\
    \ public payable` 的函数。这个 `payBill` 函数在被调用时，会简单地将 `x_amount` 数量的以太币转移到函数指定的 `recipient`\
    \ 地址。该函数是 `payable` 的，允许资金转移到接收者。`Payable` 是 Solidity 中的一个新关键字，用于指定某个函数或地址是否可以转移或接收资金。\n\
    \n这个智能合约的一个主要功能性安全错误是，它没有检查调用该函数的用户权限。由于这个函数是 `public` 且 `payable` 的，任何人都可以调用它，并将资金转移到他们指定的任意地址。事实上，用户可以调用这个智能合约来耗尽该合约拥有的所有资金，并将其发送到黑客的地址。函数访问范围上的一个简单错误就可能导致资产损失，并毁掉一个原本前景光明的项目。\n\
    \n### 示例 2：未保护 kill 或 selfdestruct 函数\n\n曾发生过一起安全事件，一个智能合约中编写了 `kill` 函数，但没有权限检查，最终导致了\
    \ 3 亿美元的资产损失。在一个社区 Telegram 聊天群组中，有人发布了一个交易哈希。消息发送者声称自己是以太坊新手，但刚刚发送了一笔交易来调用某个智能合约中的\
    \ `kill` 函数。由于该 `kill` 函数未检查用户权限，这个函数调用被执行了，并有效地重置了该智能合约的存储。\n"
- fmt: '智能合约被销毁后，其中锁定的3亿资金将无法恢复。`kill`、`destroy`、`selfdestruct`或`renounce`等函数属于高度特权操作，可能导致智能合约失效。执行这些函数时，必须对调用参数实施全面检查，确保不存在安全风险。


    ## 智能合约安全最佳实践


    前文已介绍功能性和可攻击性安全漏洞及示例。如图[8-2](#index_split_005.html#p337)所示，现在我们将讨论设计智能合约和编写代码的良好安全实践。


    ![](index-337_1.jpg)


    **图8-2.** 区块链安全最佳实践


    ### 制定安全风险缓解计划


    以太坊及任何公有区块链都是开放、无需许可的系统，恶意参与者与善意参与者对智能合约拥有同等访问权限。必须建立"智能合约可能存在缺陷和安全漏洞"的认知，并准备相应的缓解方案。例如，在`CryptoKitty`的智能合约中实现了`pause`函数，仅CEO可暂停或恢复该合约。若发生安全攻击，CEO可发送交易调用`pause`函数，暂停`CryptoKitties`的铸造和拍卖。


    此外，需权衡去中心化与可升级性。区块链本质不可篡改，因此智能合约默认应不可更改。但另一方面，编写完全无缺陷或漏洞的`Solidity`代码几乎不可能。更好的做法是将智能合约分为两类：一类是稳定且不可更新的合约，另一类是动态且可由特权管理员升级的合约。Web3客户端调用的智能合约应作为代理合约（不可升级且地址固定），而由代理合约调用的其他合约则可升级。当智能合约因修复缺陷而升级后，新部署合约的地址将在代理合约中更新，无需修改Web3客户端。


    ### 同时检查主源代码和库


    安全漏洞不仅可能出现在您编写的代码中，也可能存在于导入智能合约的库中。库代码可能使用不同版本的`Solidity`编写，从而增加集成复杂性和安全风险。例如，部分库使用`Solidity
    0.4`版本编写，而您正在开发的主智能合约可能使用`0.8`版本。`Solidity 0.4`不支持某些安全特性，需进行修改才能集成这些库，这反而增加了整体智能合约的漏洞风险。因此，确保主代码与库的版本兼容至关重要，安全审查、审计和测试也应包含库代码。


    ### 设置资金上限


    鉴于智能合约的复杂性，为合约函数设置可处理的资产价值上限是明智之举。智能合约可设置全局上限，每个具有资产转移能力的函数在转移前都会比较待转移资产与该上限。若超出上限，函数将拒绝执行转移。这提供了额外的安全防护，防止资产损失。实际上，`ERC20`智能合约的`approve`函数可设置用户调用`transfer`函数时的最大可转移资金限额。


    由于智能合约处理的加密货币总价值'
