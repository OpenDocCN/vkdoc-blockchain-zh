- fmt: '### **Figure 1-3.** The role of data in value exchange


    - First, all exchange transactions create data. These data serve as a record of
    the transaction and are used for auditing, monitoring, analysis, and planning.

    - Second, all exchange transactions are governed by data. These are data that
    set the parameters of the contract that stipulate the conditions for the settlement
    of the transaction.

    - The third role played by data expands the definition of value to include the
    exchange of data as an inherent source of value. This role played by data is still
    nascent, and the underlying contracts are still evolving.


    With this understanding of the involvement of third parties, let’s drill down
    further into value exchange transaction between two firms.


    `Figure 1-4` shows the involvement of financial institutions as discussed previously.


    ![Figure 1-4](index-35_1.jpg)


    ## Chapter 1 Business and Economic Motivation for Blockchain


    ### **Figure 1-4.** The role of third parties in value exchange


    Cash between firms is exchanged through their respective financial institutions.
    Each financial institution charges fees. In addition, the government gets involved
    by regulating exchange transactions between the financial institutions. Multiple
    governments can be involved if the firms are in different countries and the exchange
    transactions are cross-border transactions. Governments also get involved with
    regulations that are purportedly put in place to fairly adjudicate potential disputes
    between the transacting parties. Regulations such as these are rarely neutral
    and usually are biased to the more powerful and politically connected firm in
    the transaction. We would categorize the involvement of the government and financial
    institutions as adding very little or no value to the exchange transactions. In
    addition to financial institutions and the government, `Figure 1-4` also shows
    the involvement of another type of firms. These firms are referred to as “third-party
    logistics” (TPL) providers. These firms assist in the exchange of goods between
    firms by helping with transportation, storage, scheduling, and distribution. TPL
    providers add value in the exchange of goods and execute tasks that the principal
    firms involved in the exchange delegate to them.


    ![Figure 1-4 (continued)](index-36_1.png)


    ## Chapter 1 Business and Economic Motivation for Blockchain


    We already know the key role data play during value exchange. `Figure 1-5` shows
    how this manifests itself among transacting firms.


    ### **Figure 1-5.** Proprietary data among transacting firms


    Each firm creates data to record the transaction and manages data that governs
    the transactions between the firms. We would naively expect that (1) these two
    firms are capturing the same or similar data, (2) the data at the two firms is
    equivalent, and (3) the two firms can interrogate and understand each other’s
    data. Our expectations are likely to be dashed. Each firm uses different processes
    and different systems and has varying objectives that result in the creation of
    data that only people in that firm can understand. You would be correct if you
    surmise that this lack of understanding of each other’s data causes difficulties
    in conducting business. We will see in the next section that this proprietary
    data is the cause of economic inefficiencies.


    We end this section by looking at the complexity of all the exchanges that are
    necessary for goods from a manufacturer to make their way to a consumer. `Figure
    1-6` depicts this supply chain. You can see that there are several business-to-business
    exchanges between firms before there can be an exchange between a firm and a consumer.


    ![Figure 1-6](index-37_1.png)


    ## Chapter 1 Business and Economic Motivation for Blockchain


    Raw material or part suppliers exchange their goods with manufacturers for cash
    payment. Manufacturers create their product and then exchange it with Distributors,
    who then exchange it with Wholesalers, who in turn exchange it with'
