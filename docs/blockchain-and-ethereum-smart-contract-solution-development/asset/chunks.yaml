    # BFT 共识的验证投票机制


    BFT 共识的一个优势是其**单一区块最终性**，这意味着一旦一个区块被提议并验证，它就是最终的，并且不会回滚。


    ## 与以太坊兼容区块链的共识机制


    除了与以太坊兼容的区块链中提到的四种共识机制外，还有其他共识机制正在被其他区块链采用或正在开发中。基本上，所有公共区块链都是无许可网络，所有企业区块链都是许可网络。`POW`
    和 `POS` 共识适用于公共区块链的无许可网络，而 `POA` 和 `BFT` 适用于企业区块链的许可网络。


    ## EVM（以太坊虚拟机）


    `EVM`，即以太坊虚拟机，是以太坊区块链的另一项创新。`EVM` 是以太坊节点的关键组件，因为它执行智能合约的字节码。`EVM` 和智能合约的能力驱动了数千个去中心化应用，使以太坊区块链成为继比特币之后的第二代区块链。关于
    `EVM` 的更多细节将在第 [7](https://doi.org/10.1007/978-1-4842-8164-2_7) 章的智能合约编程中讨论。


    ## 核心区块链层的存储


    存储是核心区块链层中的另一个重要组件。当 `EVM` 运行智能合约时，它需要存储大量数据，并且需要存储状态。当你查看 `EVM` 时，有数千台机器在运行相同的程序，并且相同的状态必须保存在每台机器上。你不能把所有东西都扔到以太坊存储上。有些人询问是否可以在以太坊区块链上存储视频，答案是否定的，因为他们的视频需要存储在数千台机器上，这太昂贵了。也许你只能存储媒体的
    32 字节哈希值，但不能存储整个视频。


    ## 智能合约的 Gas 费用


    在编写智能合约程序时，你还需要注意每次存储的 Gas 费用。Gas 费用可能很昂贵。如今，对于一个正常大小的智能合约交易，以太坊 Gas 费用几乎达到 100
    美元，因此如果智能合约消耗大量 CPU 时间或大量存储，它就无法运行。这是以太坊公共区块链面临的挑战——目前，它的成本太高了。当 Gas 费用高时，单笔交易可能花费
    60 到 100 美元。因此，在编写和运行智能合约程序时，你需要考虑 Gas 消耗。


    ## 企业组件层


    以太坊公共区块链存在一些局限性；因此，`EEA`（企业以太坊联盟）在其架构中添加了企业区块链组件。对企业来说，有三件重要的事情：首先是隐私，其次是性能，第三是企业的许可。


    在原始架构中，以太坊公共区块链在设计上并未考虑这些企业特性。以太坊公共区块链不支持隐私。公共区块链上的所有交易都是公开的。发送方和接收方的地址以及交易金额对于扫描区块链状态和日志的外部人员是可见的。


    第二点是，以太坊区块链的性能不佳，因为 Gas 机制、交易和存储结构以及 `EVM` 不够快速和优化。这为 Polkadot 等替代区块链提供了竞争机会。以太坊区块链的联合创始人
    Galvin Wood 提出了另一个名为 Polkadot 的区块链，他们声称该区块链运行更快更好。Polkadot 还用 `WASM` 替换了 `EVM`，使智能合约开发更类似于
    Web 开发。


    以太坊公共区块链还有另一个缺点，与权限相关。以太坊的公共区块链是无许可的，每个人都可以加入区块链并挖掘区块。这增加了以太坊公共区块链的安全性和稳定性挑战。


    ## 工具层


    以太坊区块链拥有最全面的工具来帮助开发者。

    '
- fmt: '开发者与用户构建并使用去中心化应用。首先，存在诸如`Truffle`和`Remix`等编译工具，它们可以编译和部署用`Solidity`编写的智能合约。还有其他工具能够编译其他编程语言。除了编译工具，还有集成库，例如`OpenZeppelin`源码库，它可以被导入到`Solidity`智能合约代码中，以加速开发并实现模块化。


    以太坊还拥有丰富的钱包工具，用于访问资产和使用`dApp`。存在硬件钱包，如`Ledger`和`Trezor`，它们将私钥存储在硬件设备中。对于硬件钱包，所有交易都在硬件设备内签名，私钥永远不会离开该设备。对于加密货币用户来说，硬件钱包是最安全的选择。


    此外，还有桌面钱包，需要安装在笔记本电脑或台式机系统上才能与区块链账户交互。此外，还有移动钱包，作为独立应用程序在手持设备上运行。对于使用网页界面运行`dApp`的用户，`MetaMask`是最流行的一款。它是一个网络插件或扩展程序，适用于`Chrome`或`Firefox`等网页浏览器。它也可以与硬件钱包集成，以结合网络的便利性和硬件设备的安全性。当你安装`MetaMask`时，它会生成一个12个单词的助记词短语，并创建一个与该助记词短语关联的账户。用户需要写下这个短语，以便在扩展程序或插件被意外卸载时恢复`MetaMask`账户。


    ## 第6章 以太坊架构与概述


    对于钱包或客户端连接以太坊区块链，使用`JSON RPC`协议来连接以太坊区块链和智能合约。`JSON RPC`是区块链节点与`Web3`客户端之间的通信协议。区块链节点运行在以太坊区块链上，可以通过专用端口开放一个`RPC`服务。然后，`Web3`客户端连接到此`RPC`端口，并在客户端和区块链之间交换信息。`RPC`服务器可以是`dApp`应用提供的独立区块链节点，也可以是像`Infura`这样的第三方提供的代理节点。诸如`Infura`的项目提供大量的以太坊节点供客户端使用。客户端应用程序可以使用API密钥连接到`Infura`节点。


    总之，编译工具（如`Remix`和`Truffle`）、智能合约库（如`OpenZeppelin`）、钱包（如硬件钱包、移动钱包和`MetaMask`钱包）以及`JSON
    RPC`，为在以太坊区块链上开发和构建去中心化应用提供了主要的工具能力。


    ## 应用层


    应用层包含软件应用、代币和智能合约语言。


    首先，软件应用包含以下三个要素：


    *   **一个Web界面**：去中心化应用需要一个Web图形用户界面（`GUI`）。

    *   **一个dApp连接器**：连接器使用`web3`将网页与区块链智能合约连接起来。

    *   **区块链上的智能合约**：智能合约为你的应用提供业务和交易逻辑。


    应用层中第二个重要组成部分是代币。这是区块链所独有的，并且代币经济对于维持区块链和去中心化应用至关重要。代币设计包括：发行哪种类型的代币、代币的供应量、谁管理代币供应的控制权，以及是应该生成新代币还是复用以太坊上的现有代币。


    智能合约语言也是一个需要考虑的主要因素。除了`Solidity`，还有诸如`Vyper`、`Yul`、`FE`和`Serpent`等其他语言可以用来编写智能合约。


    总之，以太坊区块链架构包含以下层：网络层、核心区块链层、企业区块链层、工具层和应用层。每一层都为以太坊区块链提供基本功能。我们将在后续篇幅中对其进行描述。'
