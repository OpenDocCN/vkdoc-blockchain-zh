    ## Module 6: Client Considerations


    In Chapter [6](https://doi.org/10.1007/978-1-4842-8164-2_6), and previous modules
    of Chapter [7, w](https://doi.org/10.1007/978-1-4842-8164-2_7)e discussed how
    to program Solidity smart contracts and deploy them to blockchains. Once smart
    contracts are deployed to a blockchain, they are accessible publicly and will
    never be removed or altered once the blocks are finalized. Smart contracts are
    bytecodes that are not user-friendly. To interact with dApps, clients need to
    be developed to facilitate user interaction with smart contracts.


    The clients for dApps can be web browsers, mobile application, desktop application,
    or command-line interface (CLI). In this module, we will discuss the pros and
    cons of these clients and also give examples for building a dApp client.


    ### Types of dApp Clients


    dApp clients can be in a graphic user interface (GUI) format or command-line interface
    (CLI) format. The GUI format can be web-based app, mobile app, or desktop app
    that requires user inputs and operations as shown in the following figure. CLI
    formats are normally for automatically scripting to perform testing or for application
    programming interfaces. In the following diagram (Figure [7-19), w](#index_split_005.html#p317)e
    describe different kinds of clients.


    ***Figure 7-19.** Types of clients for decentralized applications*


    ### Browser Client


    Browser client is the most basic user experience for a decentralized application.
    Users are directly introduced to a website to use the dApp. For example, to access
    CryptoKitty dApp, users just need to point their web browser t[o www.cryptokitty.com](http://www.cryptokitty.com).
    As shown in the client topology diagram, the browser needs a web extension/plug-in
    to connect to an Ethereum node through RPC protocol. The most common web extension
    is MetaMask. MetaMask serves as a crypto wallet for web applications.


    To design a web application with a crypto account interaction, developers need
    to develop web pages that connect to MetaMask or other wallets. When a user connects
    to a URL through a browser, the browser script will check if MetaMask is installed
    and prompt users to install it if not found. This is normally called “Connecting
    Wallet.” Normally, JavaScript scripts are written to use the Web3 library to connect
    to Ethereum nodes. We will have a detailed coding example later in this module.


    One of the challenges of browser-based dApp is the security of wallet. Since browsers
    are prone to hacker attack, it is possible that MetaMask storage and private keys
    might be hacked in some browsers. It is recommended that when storing large amounts
    of crypto assets, hardware wallets should be used. MetaMask does support connecting
    to hardware wallets to sign transactions to ensure safety of the wallet.


    ### Mobile Clients


    Mobile apps can also be developed to interact with smart contracts in the Ethereum
    blockchain. Since mobile apps normally do not have a large footprint, they rely
    on API or RPC to communicate with blockchain nodes. Similar to web wallet, mobile
    wallet does not have hardware grade security, and it should not be used to store
    large amounts of crypto assets.


    ### Desktop Client


    Both web client and mobile client need to connect to external nodes to interact
    with the Ethereum blockchain. Desktop clients have enough

