  trans: '

    # 除奖励矿工外，Gas 机制还能提高网络攻击成本


    除奖励矿工外，Gas 机制还能提高恶意用户发起网络攻击的成本。在公有区块链中，任何人都可以访问网络并向矿工发送交易。如果没有适当的 Gas 费用，大量交易可能会涌入网络，造成拥堵问题，甚至导致网络瘫痪。Gas
    费用是一种设计精妙的机制，用于维持网络的可持续性并平衡去中心化应用生态系统。


    ## 通过加油站类比理解以太坊 Gas


    以太坊中的 Gas 是一个复杂的概念，难以把握其含义及其对区块链网络和应用生态系统的影响。本节将通过加油站类比帮助读者更好地理解以太坊中的 Gas 使用（图
    10-5）。


    ![](img/index-407_1.png)


    **图 10-5.** 加油站类比


    交通中的 Gas 用作燃料，驱动车辆将人员和货物从一个地方运送到另一个地方。而以太坊中的 Gas 则用于驱动以太坊网络，使其更安全、更少拥堵，并激励区块链矿工。以太坊中的
    Gas 用于支付资产转移、部署智能合约或调用智能合约函数。


    在加油站中，油价通常以美元/加仑标示；而在以太坊中，Gas 价格也用于指代 Gas 的单价。Gas 价格的概念并非那么直观。以太坊中 Gas 价格的单位是每单位
    Gas 的`wei`，其中`wei`是以太坊的最小单位。一个以太币等于`10`的`18 wei`次方。Gas 单位指的是以太坊中的挖矿成本，在以太坊黄皮书的
    Gas 成本表中手动定义。例如，加法操作的 Gas 成本为`3`，乘法操作的 Gas 成本为`5`。总的 Gas 费用等于 Gas 价格乘以消耗的 Gas
    量。


    在以太坊的 Gas 机制中，还存在 Gas 限额的概念。这是单笔交易可消耗的最大 Gas 量。设置 Gas 限额的目的是为了保护发送方账户。如果没有设置 Gas
    限额，智能合约有时可能进入计算循环，耗尽整个账户余额。对汽车而言，Gas 限额就是油箱容量。当设置了 Gas 限额，且 Gas 消耗超过该限额时，交易将被标记为失败，状态将回滚到原始状态。


    交易分为两种：第一种是简单的资产转移，将资产从一个账户转移到另一个账户。这类资产转移将消耗`21,000 Gwei`的 Gas。第二种交易类型是智能合约调用，其
    Gas 消耗量远高于普通资产转移。


    此外，对于以太坊区块链，还存在一个最大区块 Gas 限额。这是一个区块中所有交易的 Gas 总量限制。


    最后，此处消耗的 Gas 单位是`wei`。通常，实际成本以美元衡量，将消耗的 Gas 量乘以以太币价格即可得到法币成本。


    ## 量化智能合约程序中的 Gas 费用


    当去中心化应用部署时，用户面临的最大成本之一就是 Gas 费用。以太坊主网交易的 Gas 费用一直在飙升，有时单笔交易甚至超过 200 美元。因此，项目的可行性研究需要包含
    Gas 费用分析，以评估项目在财务上是否可持续。


    例如，有人提出使用区块链构建去中心化音乐服务。量化分析有助于确定存储音乐数据（包括音乐比特和元数据）的成本可行性。


    ---


    *第 10 章 项目融资：代币与 Gas 费用*

    '
- fmt: '# 第10章 资助项目：代币与Gas费


    如第7章所述，Solidity智能合约被编译成字节码，然后部署到区块链上并执行。每条字节码指令包含一个操作码（`opcode`）和操作数（`operands`）。各种操作码的Gas成本在以太坊黄皮书中列出，并在EIP中新增了一些操作码和修改。以下是各类操作码的Gas成本总结（图10-6）。


    ***图10-6.** 各类操作码的Gas成本*


    ***图10-6.**（续）*


    从Gas成本表中可以看出，算术运算（如加法、减法、乘法、除法）以及逻辑运算（如`AND`/`OR`）的Gas成本仅为2到5个单位，可视为低Gas费操作。环境操作（如获取发送者地址、以太币值和区块编号）同样是低Gas操作，仅消耗2个Gas单位。内存操作则更为复杂。对单个256位字的操作，加载（`MLOAD`）成本为2，存储（`MSTORE`）成本为3。然而，内存存储还会产生额外的内存扩展成本。当存储更多数据时，会涉及内存成本。内存存储操作的成本并非线性，我们将在下表中进一步说明。


    最昂贵的操作码操作是向区块链存储数据。向区块链存储数据时，非零值的每个字成本为20,000 Gas单位，零值则为5,000 Gas单位。从区块链加载数据的成本为每字200
    Gas单位。


    表中还定义了与程序计数器相关的操作，如`JUMP`、`JUMPI`、`PC`和`JUMPDEST`，它们分别消耗1到10个Gas单位。


    停止程序操作的Gas成本差异很大。操作码`STOP`或`RETURN`用于停止函数的执行。`RETURN`操作码还会将输出数据返回给调用函数。这两个操作码都不消耗Gas。


    `REVERT`是一种在遇到问题时必须撤销对区块链所有更改的操作。分配给交易但未使用的剩余Gas将返还给发送者。`SELFDESTRUCT`操作停止执行并注册一个账户以供后续使用。此操作码至少消耗5000
    Gas单位。


    上表显示了操作码和字负载级别的Gas成本。对于存储操作，成本并非一定是线性的。例如，对于内存存储操作，存在额外的内存扩展成本。`MSTORE`和`MSTORE8`的总成本定义为内存扩展成本与静态存储操作成本之和，如下所示：


    ```

    gas_cost_operation = (new_mem_size_words ^ 2 // 512) + (3 * new_mem_size_words)

    ```


    下表（图10-7）显示了栈、内存和持久化存储在字、千字节和兆字节数据大小下的存储成本。


    ***图10-7.** 各类别和大小的存储Gas成本*


    对于栈操作，没有额外的内存扩展成本。`POP`、`PUSHX`、`DUPX`和`SWAPX`每个字的Gas成本分别定义为2、3、3和3。在以太坊中，一个字的长度为256位（即32字节）。由于1千字节等于32个字（1024字节/32字节），因此每千字节的Gas成本是每字Gas成本的32倍。因此，`POP`、`PUSH`、`DUP`和`SWAP`的每KB
    Gas成本分别为64、96、96和96。同理，由于1MB是1KB的1024倍，`POP`、`PUSH`、`DUP`和`SWAP`的每MB Gas成本分别为65,536、98,304、98,304和98,304。


    对于内存操作，当扩展到KB和MB级别时更为复杂。


    第一次`MLOAD`没有内存扩展成本。1KB的Gas成本等于每字Gas成本（96）的32倍，即96；每MB的成本是每KB成本的1024倍，即98,304。


    对于`MSTORE`和`MSTORE8`，都存在内存扩展成本，公式如上所述。每KB和每MB的成本为……'
  raw: 'As explained in Chapt[er 7, S](https://doi.org/10.1007/978-1-4842-8164-2_7)olidity
    smart contracts are compiled into bytecodes and then deployed to and executed
    on the blockchain. Each


    bytecode command contains an opcode and operands. The gas costs for


    various opcodes are shown in the Ethereum yellow paper with some added


    opcodes and modification in EIPs. The following is the summary of the gas


    costs for categories of opcodes (Figure [10-6](#index_split_006.html#p409)).


    ***Figure 10-6.** Gas costs for various opcodes*


    Chapter 10 Fund a projeCt: tokens and Gas Fees


    ***Figure 10-6.*** ( *continued*)


    As we can see from the gas cost table, arithmetic operations such as


    addition, subtraction, multiplication, division, and logical operations


    such as AND/OR only cost about 2 to 5 gas units and can be viewed as


    low gas fee operations. Environment operations such as getting sender


    address, ether value, and block number are also low gas operations that


    only consume 2 gas units. The memory manipulating operations are more


    complex. The operation on a single 256-bit word is only 2 for loading and


    3 for storing. However, memory storage also has an additional memory


    expansion cost. When more data is stored, there is a cost for memory.


    The cost for memory storage operations is not linear. We will explain this


    further with the next table.


    Chapter 10 Fund a projeCt: tokens and Gas Fees


    The most expensive opcode operation is storing to the blockchain.


    When storing data to the blockchain, the cost per word is 20,000 gas


    units for a nonzero value and 5,000 for a zero value. Loading data from


    blockchain is 200 gas units per word.


    There are program counter–related operations such as JUMP, JUMPI,


    PC, and JUMPDEST defined in the table as well. They cause 1 to 10 gas


    units, respectively.


    Halting program operations have very different gas costs. Opcode


    STOP or RETURN is used to halt the execution of a function. The RETURN


    opcode also returns output data to the calling function. Both opcodes do


    not consume gas.


    REVERT is an operation that encounters an issue and has to undo all


