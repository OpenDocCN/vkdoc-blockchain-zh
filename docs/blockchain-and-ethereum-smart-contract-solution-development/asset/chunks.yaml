    and technical aspects of smart contracts.


    Ethereum has achieved several milestones relevant to project funding, such as
    the Initial Coin Offering (ICO), Nonfungible Token (NFT), decentralized finance
    (DeFi), and Decentralized Autonomous Organization (DAO). It is foreseeable that
    the Security Token Offering (STO), Central Bank Digital Currency (CBDC), and other
    decentralized'
