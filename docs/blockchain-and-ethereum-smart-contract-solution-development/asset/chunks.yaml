- fmt: "# 19 [www.cms.gov/files/document/highlights.pdf](http://www.cms.gov/files/document/highlights.pdf)\n\
    \n## Chapter 4 BloCkChain Business appliCations\n\nIn addition to the third-party\
    \ administrators and their delegated service providers, there are other stakeholders\
    \ in the healthcare system. These stakeholders include pharmaceutical manufacturers,\
    \ medical device manufacturers, and firms that provide information technology\
    \ to clinical providers, consumers, and third-party administrators. The value\
    \ exchange of these stakeholders with the consumer requires approval and authorization\
    \ by clinical providers. However, third-party administrators are responsible for\
    \ managing remuneration to these stakeholders as well and often further complicate\
    \ this tri-party value exchange.\n\nIn addition to these stakeholders, the healthcare\
    \ system in the United States includes research, public health, and regulatory\
    \ agencies at the federal level such as CMS, the Food and Drug Administration\
    \ (FDA), the Centers for Disease Control and Prevention (CDC), and the National\
    \ Institutes of Health (NIH). Regulatory and public health organizations from\
    \ state and local governments also play an important role in the delivery of healthcare\
    \ in the United States. Finally, advocacy organizations that represent the health\
    \ insurance companies, the prescription benefit managers, the hospital health\
    \ systems, the pharmaceutical manufacturers, and the clinical providers (doctors,\
    \ nurses, and pharmacists) work hard to tilt healthcare policy in their favor.\
    \ It should be noted that there isn’t an organized advocacy group for consumers\
    \ in general, though there are advocacy groups for consumers who are dealing with\
    \ specific health conditions (such as autism, scleroderma, and breast cancer).\n\
    \nWe take the time to describe all these stakeholders so that it can be understood\
    \ how the complexity of the healthcare system overshadows the value exchange between\
    \ the consumer and the clinical provider. Power in the healthcare system has by\
    \ and large devolved to the third-party administrators and the advocacy groups,\
    \ even though they are superfluous in the value exchange.\n\n## Chapter 4 BloCkChain\
    \ Business appliCations\n\nLet us now look at the economic inefficiencies in the\
    \ healthcare system by examining the seven main economic inefficiencies:\n\n-\
    \ **Time to settle transactions in the healthcare system:** In general, about\
    \ 80% of healthcare claims for payment calculation are finalized in less than\
    \ two weeks; the remaining 20% of claims can take over six months to settle. CMS\
    \ estimates that healthcare spending in 2020 was $4.1 trillion.[^20] Twenty percent\
    \ of this large number is more than $800 billion representing an immense improvement\
    \ opportunity.\n\n- **Fees paid to third parties for non-value-added activities:**\
    \ We can consider the profits at the health insurance companies and pharmaceutical\
    \ benefit managers as well as the annual budgeted spend of the advocacy organizations\
    \ as if they are fees paid to third parties for non-value-added activities.\n\n\
    - **Data-related redundant work, rework, and reconciliation work:** We have data\
    \ issues that lead to administrative waste, unnecessary care, and avoidable errors.\
    \ Shrank, Rogstad, and Parekh (2019) report and confirm that 30% of the approximately\
    \ $4 trillion spent on healthcare is considered waste or non-value-added. We believe\
    \ this does not include the inefficiencies related to the third parties.[^20]\n\
    \nIn addition, the United States leads all countries in the amount of healthcare\
    \ dollars that are spent on administrative tasks (Papanicolas, Woskie, and Jha,\
    \ 2018).\n\n- **Fraud:** A 2011 estimate from LexisNexis estimated that 3% of\
    \ spending in healthcare is lost to fraud.[^21] Other estimates put the cost of\
    \ fraud in healthcare to be closer to 5.5%. Three percent of 2020 healthcare spending\
    \ would be the equivalent of approximately $120 billion.\n\n[^20]: [www.cms.gov/files/document/highlights.pdf](http://www.cms.gov/files/document/highlights.pdf)\
    \ . See Figure 11 in the CMS Highlights document, FY2021.  \n[^21]: LexisNexis,\
    \ “New Study Reveals Healthcare Fraud Rate is 6.9 Percent Annually,” Press Release\
    \ (LexisNexis Risk Solutions, March 31, 2011)."
