- fmt: "`simply do not exist.`\n\n-   `Fraud` can consist of impersonation, unauthorized\
    \ duplication, and creating fake works.\n\nIn addition to all these inefficiencies,\
    \ the regulations in this industry favor the platforms and the third parties.\
    \ This is an industry that is ripe for disruption with blockchain. While there\
    \ is a lot of incumbent power as well as legacy technology and operations, this\
    \ industry has been disrupted before and can be disrupted again. Previous disruptions\
    \ in the industry ended up creating new centers of power and did not really alter\
    \ the relationship between the artist and the appreciator.\n\nThe potential for\
    \ blockchain is to have a disruption that does not result in another centralized\
    \ source of power.\n\n## Chapter Summary/Key Takeaways\n\nKey takeaways from this\
    \ chapter are as follows:\n\n-   Applications developed using blockchain should\
    \ be mindful of all the lessons learned and critical success factors associated\
    \ with large-scale technology deployments.\n-   Blockchain-based solutions are\
    \ suitable for business problems related to time to settle transactions; fees\
    \ paid to third parties for non-value-added activities; data-related redundant\
    \ work, rework, and reconciliation work; constraints imposed by government regulations\
    \ and other nongovernmental rules; high incidence of fraud; privacy leaks during\
    \ value exchange; and data security risks.\n\n## Chapter 4 Blockchain Business\
    \ Applications\n\n-   Blockchain solutions are suitable for applications related\
    \ to payments, transparency, and data sovereignty.\n-   Blockchain solutions should\
    \ be preferred over traditional solutions only if multiple parties are expected\
    \ to write to a transaction ledger, these parties do not trust one another, and\
    \ no convenient and trusted third party is available.\n-   The implementation\
    \ of blockchain-based solutions requires system designers to make design decisions\
    \ related to transactions, tokens, smart contracts, data, consensus mechanism,\
    \ stakeholder organization, and development stack.\n-   The themes addressed by\
    \ blockchain applications in the financial services industry include payments\
    \ with quicker settlement times and reduced fees, creation and management of digital\
    \ assets, simplification and automation of operational processes, and the resulting\
    \ increase in transparency.\n-   Target blockchain healthcare applications are\
    \ focused on reducing economic inefficiencies related to the three R’s, increasing\
    \ operational transparency, and giving consumers control over their data.\n- \
    \  Blockchain applications in the supply chain are focused on improving transparency,\
    \ reducing administrative waste, speeding cross-border payments, and tackling\
    \ fraud.\n\n## Chapter 4 Blockchain Business Applications\n\n-   Entertainment\
    \ applications with blockchain tackle transparency, reduction of settlement times\
    \ and administrative waste, as well as balancing power between artists and centralized\
    \ platforms.\n\nIn the next chapter, you will learn about the technical details\
    \ of the Bitcoin blockchain implementation. We will also provide a quick overview\
    \ of Ethereum and Hyperledger; a comparison of Bitcoin, Ethereum, and Hyperledger\
    \ Fabric; and a quick rundown of emerging blockchain developments.\n\n## Quiz\
    \ Questions\n\n1.  What is the application theme that does not align with the\
    \ capabilities of a blockchain solution?\n    a. Payments\n    b. Business process\
    \ reengineering\n    c. Data sovereignty\n    d. Transparency\n2.  True or False:\
    \ A blockchain solution is not needed if multiple parties write to a transaction\
    \ ledger in the presence of a trusted and convenient third party.\n3.  What type\
    \ of blockchain should be used if all parties who write to a transaction ledger\
    \ are known and public verification of transactions is not needed?\n    a. Permissionless\n\
    \    b. Private permissioned\n    c. Public permissioned\n    d. None of the above\n\
    \n## Chapter 4 Blockchain Business Applications\n\n4.  Among the blockchain application\
    \ layers listed in the following, which layer is considered “Layer 1” of a blockchain\
    \ implementation?\n    a. Physical layer\n    b. Network layer\n    c. Blockchain\
    \ layer\n    d. Integration layer\n    e. Application layer"
