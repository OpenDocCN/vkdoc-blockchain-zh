    \nIt is very important to look at the same variable names appearing in different\
    \ contexts and make sure correct values are associated with the variable.\n\n\
    ## Vulnerability: Authorization Through `tx.origin`\n\nSolidity smart contracts\
    \ can use `tx.origin` as a global variable to refer to the original sender of\
    \ the transaction. Since a user or a smart contract can call a smart contract\
    \ function that might be malicious, it is not a good practice to use `tx.origin`\
    \ for authentication. Instead, `msg.sender` should be used for authentication\
    \ as this is always the true address of the smart contract that calls another\
    \ smart contract. For example, in the following programming, `tx.origin` is used\
    \ to check if the sender is the owner of the smart contract. This might have vulnerability\
    \ as the `tx.origin` account might call a malicious smart contract and then call\
    \ this `sendTo` function to bypass the required check to send the fund to a receiver\
    \ specified by the hacker.\n\n```\npragma solidity 0.4.24;\n\ncontract MyContract\
    \ {\n    address owner;\n\n    function MyContract() public {\n        owner =\
    \ msg.sender;\n    }\n\n    function sendTo(address receiver, uint amount) public\
    \ {\n        require(tx.origin == owner); // This should be changed to tx.sender\n\
    \        receiver.transfer(amount);\n    }\n}\n```\n\n## Vulnerability: Using\
    \ Block Values to Represent Time\n\nSome smart contracts will need to handle operations\
    \ such as asset locking or release that has dependency on time. Solidity has some\
    \ special global variables such as `block.timestamp` and `block.number` that can\
    \ be used to represent or infer elapsed time. However, since the block mining\
    \ is not accurate and can be manipulated by miners, it is not recommended to use\
    \ the block parameters as time stamps for functions that have time dependencies.\
    \ Sometimes, it would be good to use time information from an Oracle implementation.\n\
    \n## Vulnerability: Writing to Arbitrary Storage Locations\n\nEthereum EVM stores\
    \ data in persistent locations for each account or smart contract address. It\
    \ is important to protect the data storage location from malicious overwrites.\
    \ Although Solidity does not support location pointers, there is still a possibility\
    \ for writing data to wrong addresses. For example, in a dynamic array, if the\
    \ array length is not set properly, the out-of-bound index will not be detected\
    \ and cause the out-of-bound write to be valid. For example, in the following\
    \ example, a dynamic length array `bonusRecord` is defined. The `PopBonus` function\
    \ pops up one item at a time and decrements the length of the `bonusRecord` array.\
    \ However, since `require(0 <= bonusRecord.length)` does not block length in 0\
    \ case, the next line of code `bonusRecord.length--` will cause an underflow,\
    \ making the `bonusRecord` length to be 0564039457584007913129639935.\n\nAnd since\
    \ the array length is so large, the array index can be any number, and the value\
    \ can be written to arbitrary storage locations:\n\n```\nuint[] private bonusRecord;\n\
    address private owner;\n\nfunction PushBonus(uint c) public {\n    bonusRecord.push(c);\n\
    }\n\nfunction PopBonus() public {\n    require(0 <= bonusRecord.length);\n   \
    \ // This is a bug. Once the length is zero, it should not allow the PopBonus\
    \ operation\n    bonusRecord.length--;\n}\n\nfunction UpdateBonusRecordAt(uint\
    \ idx, uint c) public returns (uint){\n    require(idx < bonusRecord.length);\n\
    \    bonusRecord[idx] = c;\n    return bonusRecord.length;\n}\n```\n\nTo fix the\
    \ preceding arbitrary write issue, simply change `require(0 <= bonusRecord.length)`\
    \ to `require(0 < bonusRecord.length)`.\n\n## Vulnerability: Unused Variables"
