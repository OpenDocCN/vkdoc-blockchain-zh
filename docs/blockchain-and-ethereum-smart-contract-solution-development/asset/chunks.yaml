  trans: '

    1. **交易结算时间**


    2. **为非增值活动向第三方支付的费用**


    3. **与数据相关的重复性工作、返工及对账工作**


    4. **政府法规及其他非政府规则施加的限制**


    5. **高发的欺诈行为**


    6. **价值交换过程中的隐私泄露**


    7. **数据安全风险**


    系统设计人员可以分析一个业务问题，判断其是否涉及上述七种经济低效现象中的多种情况；若存在，则可进一步分析区块链的适用性。或者，系统设计人员可以研究特定行业，判断其中是否存在上述七种经济低效现象中的多种情况，并识别出适用于区块链的应用业务场景.1。


    判断是否需要使用区块链的下一步，是将业务用例分析与七种经济低效现象相结合，并评估解决方案设计是否可归入与区块链网络能力相符的三大应用主题之一。这三大应用主题如下：


    1. **支付** – 第一个应用主题涉及多方之间跨越地理边界的数字化支付。这些支付可能涉及可替代或不可替代的实物或数字资产转移。可替代资产是指所有资产价值等同，而不可替代资产则指每个资产都具有唯一性。


    2. **透明度** – 第二个应用主题涉及在价值交换的多方之间建立透明度和可见性，此类交换可能跨越地理边界及不同的司法管辖区。透明度和可见性可体现在业务流程进度状态、产品与服务属性、财务预测或各方共享数据的溯源信息方面。


    3. **数据主权** – 第三个应用主题涉及保护道德和法律上属于主权个体的数据所有权和控制权。控制权涵盖两个维度：准确性的确认与访问权限的授予。访问权限可授予只读、读写、有限期或永久托管权限，并可针对全部数据或仅部分数据组件。


    正如一个业务案例可能同时解决七种经济低效现象中的多种问题一样，它的解决方案设计也可能需要整合一个或多个应用主题。只要能够将应用功能进行拆解，并应用与三大主题相关的设计模式，系统设计便可实现可控管理。


    然而，我们不应仅凭所解决的经济低效现象和显现的应用主题来判断区块链的适用性。正如前一章所述，任何区块链应用都是分布式系统解决方案，都需要谨慎的设计权衡。这使得区块链应用的开发成为一项复杂的工作。与构建区块链应用相比，使用集中式数据库甚至分布式数据库构建应用会相对简单。我们推荐的最后一项分析，是对区块链应用所支持的底层交易进行分析。该分析以流程图形式呈现，如图
    4-2 所示。此流程图改编自 Wust 和 Gervais (2018) 的研究。


    ![](img/index-132_1.png)


    ***图 4-2.** 基于交易分析确定区块链解决业务问题的适用性*


    流程图中的第一个测试提出了一个问题：该系统的解决方案是否……'
- fmt: 'We are considering for the business problem requires a transaction ledger;
    that is, will the system create a record of transactions representing the exchange
    of value in terms of how value was defined in Chapter [1](https://doi.org/10.1007/978-1-4842-8164-2_1)
    (currency, goods, services, data)? If the answer to this question is no, then
    we can be certain that the business problem does not require a blockchain-based
    systems solution.


    If a transaction ledger is required, then we move on to the next test in the flowchart.
    This test asks the question to determine if multiple parties will need to write
    to the transaction ledger. If only one party needs to write to the transaction
    ledger, then the answer to that question will be no, and then we can be certain
    that the benefits of a blockchain-based solution will not outweigh the costs and
    complexity of developing a blockchain-based solution. If multiple parties will
    indeed be required to write to the transaction ledger, then the answer to that
    question is yes, and we will need to move to the third test in the flowchart.


    ## Chapter 4 Blockchain Business Applications


    The third test asks the question to determine whether trusted convenient parties
    are available and acceptable to all the parties involved in the value exchange.
    The words "trusted" and "convenient" may be subjective, so let''s qualify them
    a bit more. For the answer to this test to be a yes, all parties involved in the
    value exchange in the entire value chain ecosystem should answer in the affirmative.
    This will help resolve conflicts such as a third party being trusted by the more
    powerful parties in the value exchange but not by the others. Convenience can
    be further specified based on the fees charged and the services provided. All
    parties should consider the fee charged to be acceptable and commensurate with
    the services offered by the third party. If the answer to this question is yes,
    then we can be certain that the benefits of a blockchain-based solution will not
    outweigh the costs and complexity of developing a blockchain-based solution. If
    the answer to the question for the third test is no, then we move to the fourth
    test in the flowchart.


    The fourth test asks the question to determine if our business problem will result
    in a system design where all the parties who will need to write to the transaction
    ledger are known in advance. If all the parties are not known in advance, then
    we will most definitely benefit by having a blockchain-based solution. Furthermore,
    we will need a permissionless blockchain to implement the system solution. If
    all the parties who will need to write to the transaction ledger are known in
    advance, then we move to the fifth test in the flowchart.


    The fifth test asks the question to determine if all the known parties who are
    expected to write to the transaction ledger are trusted. Similar to the question
    in the third test, this question is subjective as well. We will qualify this question
    similar to how we qualified the third question. For the answer to this test to
    be a yes, all parties involved in the value exchange in the entire value chain
    ecosystem should answer in the affirmative. If all parties trust all the other
    parties who will need to write to the transaction ledger, then the answer to this
    question is yes, and we can be certain that the benefits of a blockchain-based
    solution will not outweigh the costs and complexity of developing a blockchain-based
    solution. If all the parties who are expected to write to the transaction ledger
    cannot be trusted, then we will most definitely benefit by having a blockchain-based
    solution. Furthermore, we will need a permissioned blockchain to implement the
    system solution. We move to the sixth test in the flowchart to determine the type
    of permissioned blockchain that will be most appropriate.


    The sixth test asks the question to determine if transactions that are written
    to the transaction ledger will need public verification. Public'
