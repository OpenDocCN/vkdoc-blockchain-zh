    # Chapter 11 Building team projects


    The preceding example shows how to build an add crosschain ID web page to interact
    with a deployed smart contract. Similar pages can be built for other functions
    for listing crosschain IDs, modifying `chainId` information, approving or revoking
    crosschain IDs, etc.


    ## Security Review


    There are many factors to be considered for security. The security guideline in
    [Chapter 8](https://doi.org/10.1007/978-1-4842-8164-2_8) should be followed. Each
    function in the smart contract should have a privilege check. For example, when
    modifying the crosschain ID information, there should be a check on the requester
    to ensure that it is the original registrator of the crosschain ID. The second
    check is that the status of the crosschain ID should be in `"Pending"` state.
    If the crosschain ID is in `"Verified"` or `"Revoked"` state, its information
    cannot be modified.


    Another important item is to ensure that only the administrator can approve or
    revoke a crosschain ID registration. This administrator can be a single account
    or a multisign account from a consortium. An administrator can transfer its ownership
    to another account.


    Besides security for the smart contract, the web pages security should also be
    evaluated. For a service to be deployed for production, it is a best practice
    to have a security audit and white box testing to ensure that there is no major
    security vulnerability.


    ## Deploy to Testnet


    When writing the code for smart contract and web GUI, developers can have a development
    system and a local web service to test the project. Once local development is
    completed, it can be deployed to public testnet for external users to test it.
    There are several options for Ethereum testnet. For the Ethereum blockchain, there
    are four popular testnets that are available, including Ropsten, Kovan, Rinkeby,
    and Goerli testnets. All the testnets mentioned here use proof-of-authority (POA)
    consensus and are faster than the mainnet. To use these testnets, first connect
    the MetaMask wallet to the testnet you want the smart contract to be deployed
    to ([Figure 11-8](#index_split_006.html#p441)). The testnets have been added to
    the MetaMask already. If you cannot see the testnet listed, simply click at show/hide
    testnets to open up the configuration widget and set "show the testnets" to "on."


    ***Figure 11-8.** Connecting to the Ethereum mainnet or testnet through MetaMask*


    Once the MetaMask wallet is set to the designed testnet, testers need to get some
    testing ether to test the dApp. These testnets all provide a small amount of ether
    for testing purposes through dedicated faucets. The faucet addresses and block
    browser URLs are shown in the following ([Figure 11-9](#index_split_006.html#p442)):


    ***Figure 11-9.** Ethereum testnet faucet addresses*


    Once a smart contract is deployed to testnet and the web pages are set up to access
    the smart contract, the project team can announce alpha'
