    # 比特币交易结构


    一笔比特币交易由若干输入和若干输出组成。交易中的输入是我们钱包里打算花费的比特币，输出则描述了我们打算如何使用这些比特币。一笔交易的输出会成为后续交易的输入——这巩固了经济中价值交换的概念。稍后我们会介绍一种特殊类型的交易，它只有输出而没有输入。


    为了理解这种输入与输出的结构，我们以实体钱包中的现金为例。假设你的实体钱包里有两张五美元钞票、一张十美元钞票和一张一美元钞票。现在需要花费 17 美元。用比特币交易的结构来描述这笔交易，你将拥有三个输入：十美元钞票和两张五美元钞票。以你手头的钞票面额来看，这是唯一能凑够
    17 美元的方式。这笔交易至少需要一个输出，即你想要花费的 17 美元（根据比特币交易的构造方式，即使没有 17 美元面额的钞票也不影响），这笔钱将被发送到你想要转账的地址。如果你在交易中不设置其他输出，那么输入与输出之间的差额将成为矿工节点的交易费——这些矿工会将你的交易打包进区块。在这种情况下，交易费将是
    20 减 17，即 3 美元。假设你只想支付 1 美元交易费，那么你需要两个输出：你想要花费的 17 美元，以及返还给你的 2 美元"找零"（请参考以下流程图）。


    交易中的任何输入都必须是其他交易的某个输出。这就是比特币对所有已花费资金进行审计追踪或溯源的方式。当我们深入分析交易输入和输出的结构时，会进一步解释这一点——表
    5-2 展示的是概念性说明。


    **表 5-2.** 假设交易中的数值汇总


    | 字段名称 | 数值 |

    |---|---|

    | `tx_in_count` | |

    | `tx_in` | |

    | `tx_out_count` | |

    | `tx_out` | |

    | 接收方地址 | 17 |

    | 你的地址 | 2 |


    ## Coinbase 交易


    在进一步讨论之前，我们先了解一种特殊类型的交易——coinbase 交易。这种交易只有输出，没有输入。Coinbase 交易包含区块中所有交易的交易费总和，以及给予矿工的奖励——矿工因消耗算力发现创建区块所需的哈希值而获得报酬。从这个意义上说，coinbase
    交易中的奖励部分"创造"了新的比特币，或者我们可以说 coinbase 交易使得新比特币被"挖出"。因此，coinbase 交易中的比特币奖励部分有时也被称为挖矿奖励、coinbase
    奖励或区块奖励。Coinbase 交易中的比特币会被发送到矿工指定的一个或多个地址。


    例如，如果某个区块包含十笔交易，每笔交易的交易费为 0.01 BTC，那么由于当前区块奖励为 6.25 BTC，coinbase 交易将向矿工发送 6.35
    BTC。在后续讨论比特币均衡经济学时，我们会探讨区块奖励的历史演变。


    ## 比特币的审计追踪


    除了 coinbase 交易，交易中的每个输入都必须是前一笔交易的某个输出。图 5-3 展示了比特币区块链如何对所有已花费资金创建并维护审计追踪。


    **图 5-3.** 比特币中已花费资金的审计追踪


    交易`T1`有三个输入，这些输入都是其他交易的输出。

