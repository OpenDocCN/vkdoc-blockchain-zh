- fmt: '1. Payment transactions send Ether from one account to another account.

    2. Smart contract creation transactions that instantiate the smart contract on
    the blockchain.

    3. Smart contract execution transactions that move money between accounts based
    on the business logic in the smart contract.


    One of the key achievements of Ethereum was the creation of the Ethereum Virtual
    Machine (EVM) or the World Computer. The Ethereum Virtual Machine sits on top
    of the blockchain and functions as a compiler that takes smart contract software
    written in Solidity and compiles it for the EVM into what is called EVM bytecode
    as shown in Figure [5-11](#index_split_003.html#p204). It is this bytecode that
    is executed on the blockchain. The blockchain network is going to expend computational
    power to run the smart contract, and all the nodes are going to have to execute
    the smart contract; the owner of the transaction executing the smart contract
    pays Gas in Ether for the execution of the smart contract.


    **Figure 5-11.** The Ethereum Virtual Machine


    The vision with Ethereum was the creation of distributed applications or dApps.
    This vision has been realized, and there are currently thousands of Ethereum dApps
    in production driving the excitement around blockchain. The creation of a dApp
    involves the development, testing, and deployment of smart contracts and a front
    end that interacts with the blockchain. Figure [5-12](#index_split_003.html#p205)
    shows the architecture of a dApp and examples of development tools that are available
    to dApp developers.


    **Figure 5-12.** Ethereum dApp architecture and development tools


    - Truffle is an interactive development environment for the creation of Solidity
    software.

    - Ganache provides a development blockchain for the testing of the smart contract
    software during development.

    - Drizzle is a set of libraries that provide functionality for account and contract
    instantiation from the front end of a dApp. We call the dApp architecture a Web
    3.0 architecture to differentiate it from the Web 2.0 architecture and the front
    end of the dApp as the Web3 front end.

    - The dApp front end interacts with the EVM and the blockchain through a set of
    remote procedure calls (RPCs). Infura encapsulates these RPCs into an API (Application
    Programming Interface) that eases the development of the dApp.

    - MetaMask is a Chrome plug-in and a software wallet.


    These tools simplify the development of distributed applications or dApps.


    ## Hyperledger


    Hyperledger is the blockchain implementation that is used to develop enterprise
    business applications between transacting parties such as those in a supply chain.


    The Hyperledger blockchain solution is provided and managed by the Linux Foundation.
    This is a collaborative effort created to advance cross-industry blockchain technologies
    for enterprise business applications. Founded in February 2016, there are now
    more than 200 member organizations in the Hyperledger collaborative.


    Hyperledger has an open source, open standards, open and transparent governance
    mechanism. This is a governance model that many in the software world are familiar
    and comfortable with because it is the governance used by Linux and Apache, two
    well-known operating systems and web development platforms, respectively, for
    a long time.


    Hyperledger comes with frameworks and tools that are highly modular technologies
    that can be integrated together.


    Let''s look at some of the tools and frameworks that are available with Hyperledger
    (please also see Figure [5-13](#index_split_003.html#p208)):


    - Hyperledger Aries, Indy, and URSA are tools and frameworks used to manage cryptographic
    identity and communicate these identities across the blockchain network.

    - Hyperledger Fabric is the core distributed ledger within'
