    # 以太坊 2.0 架构概览


    ## 信标链


    以太坊信标链是一条关键的权益证明区块链，它连接着质押者与分片。质押者来自以太坊 1.0 主网账户，他们将其以太资产发送到一个质押智能合约，以参与信标链的区块生成。分片则是存储和计算类的区块链，它们扩展了
    `EVM` 的功能以及主网的状态存储。


    ## 分片


    分片是以太坊区块链的一种全新架构，它允许多条区块链组成的层级结构独立处理交易，然后将区块哈希值汇总到其父分片，并最终将哈希值存储到信标链上。分片使得一组区块链能够同时处理交易和执行智能合约，从而显著提升了以太坊
    1.0 主网的可扩展性。


    ## 以太坊 2.0 架构概览


    以太坊 2.0 是以太坊 1.0 的扩展，新增了信标链和分片链。下图（图 9-9）展示了以太坊 2.0 的架构概览。


    ![](img/index-382_1.png)


    **图 9-9.** *以太坊 2.0 拓扑结构与工作流程*


    以太坊 2.0 包含三条区块链，其中包括原有的以太坊主网。以太坊主网为以太坊 2.0 的权益证明机制提供质押资产。信标链是一条基于权益证明的区块链，它记录质押信息、生成随机数、提议验证者，并与分片链连接以记录分片链的数据和交易默克尔树。此外，还存在多条分片链，用于存储以太坊
    2.0 的数据，执行 `EVM` 计算并处理交易。


    针对上述以太坊 2.0 的三种区块链，为了生成和验证区块，我们需要提及四种类型的客户端节点。第一种是以太坊 1.0 客户端节点，例如为以太坊 1.0 主网生成区块的
    `geth` 客户端。第二种是信标节点，它们为信标链提议区块。第三种是信标链的验证节点。验证器节点将通过信标链节点来生成或验证信标链区块。第四种是分片节点，负责分片链的区块生成。


    上述区块链节点通过点对点协议或 `RPC` 协议相互连接和通信。图中若干交互/边被标记为 A、B、C、D、E、F 和 G。


    边 A 是账户所有者钱包与以太坊 1.0 节点之间的交互。该交互允许用户在钱包中构建并签署交易，然后将签名后的交易发送给以太坊 1.0 客户端节点。客户端节点随后验证交易并将其打包成一个新区块。在图中，钱包仅连接到一个以太坊
    1.0 节点，因为目前还没有能够与信标链交互的以太坊 2.0 钱包。


    边 B 代表以太坊 1.0 客户端节点查看以太坊 1.0 主网区块和交易，或将区块写入区块链。在以太坊 2.0 的背景下，交互 B 主要用于质押者将资产质押到部署在以太坊
    1.0 主网上的以太坊 2.0 质押智能合约。一旦资产作为质押物被存入，智能合约函数将触发一个事件，以显示质押地址和金额。


    边 C 是以太坊 1.0 客户端节点与信标节点之间的交互。以太坊 1.0 区块链中的质押信息应对信标节点可见。信标节点使用 `RPC` 连接客户端节点，并获取由质押智能合约触发的所有事件。当从以太坊主网检索到新的质押信息时，信标节点会生成一个区块来记录该新质押信息。


    边 D 用于信标节点与分片节点之间的交互。边 E 用于分片节点为分片链提议区块。分片节点负责执行数据存储和

