    ## 第九章 二层网络与以太坊 2.0


    对于 ERC721 非同质化代币（NFT），存在一个 NFT 标识符来表示`tokenId`，用以指代代币的索引。这个`uint32`类型的`tokenId`可以转换为更小尺寸的整数，如`uint32`和`uint64`。


    可以构建一棵默克尔树来表示 NFT 的`tokenId`。在这棵默克尔树结构中，每个代币由一个叶子节点表示。对于大小为`n`的`uint`类型的`tokenId`，叶子节点的数量将为`2^n`。例如，`uint8`类型的`tokenId`将拥有`2⁸=256`个叶子节点。同理，`uint16`、`uint32`和`uint64`的叶子数量分别为
    65536、4294967296 和 18446744073709551616。


    叶子节点的位置等同于`tokenId`。从左到右的叶子索引排列范围为 0 到`(2^n-1)`。叶子节点的内容是一个`byte32`数据，即 NFT 代币交易的哈希值。Plasma
    交易格式是一个元组`(slot, previousBlock, denomination, owner, hash)`。其中，`slot`与表示叶子节点索引的`tokenId`相同；`previousBlock`是包含该
    tokenId 所有者转账记录的区块编号；`denomination`在 NFT 场景下默认为 1；`owner`是本次代币转账的新所有者；而`hash`则是对其他参数进行`sha256`或`keccak256`哈希运算的结果。计算得到哈希值后，该值将被插入到`slot`或`tokenId`对应位置的叶子节点中。


    对于从 0 到`2^n-1`的 tokenId 范围，从根节点到叶子节点需要`n`层节点。如果将叶子节点标记为第 0 层，那么根节点将位于第`n-1`层。对于大小为`uint16`的
    tokenId，将有 16 层；而`uint64`则有 64 层。


    默克尔树可以初始化为一棵空默克尔树，其中所有叶子节点均为空值的哈希。


    对于第 0 层，节点的哈希内容为`hash_null = H(null) = sha256(null) = e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855`。


    第 1 层 `hash_null_null = H(H(null), H(null))`


    第 2 层 `hash` 为 `hash_null_null_null_null = H(H(H(null), H(null)), H(H(null), H(null)))`


    以此类推，直到达到默克尔树的根节点。


    此处，`H(x)`是一个哈希函数，如`sha256`或`keccak256`，它接收一个字符串作为输入并生成一个`bytes32`哈希值。`H(x, y)`则是一个函数，用于将`x`和`y`打包后再计算其哈希值。


    这些预计算的值可用于证明计算，以提高效率。


    当发生一笔交易时，将计算出一个`bytes32`哈希值并存储在一个叶子节点中。相应地，该叶子节点的所有父节点都将更新，直至默克尔树的根节点。如果一棵默克尔树有`n`层，每次更新叶子节点将触发`n-1`次父节点更新。


    每个区块都将拥有一棵默克尔树。由于每个区块的交易数量远小于可能的 tokenId 数量，默克尔树将呈现稀疏填充状态。大部分节点将为 null。从叶子节点到根节点的路径上的父节点将沿用前述表格中计算的默认值，这些值可以用一个比特位来表示，而非完整的
    32 字节哈希。交易涉及的节点在默克尔树中分散分布的特性，使得这种存储结构得名为**稀疏默克尔树**。


    与 Plasma MVP 不同，Plasma Cash 的证明使用两个列表：一个是针对空值或其父节点预计算哈希的简化比特列表；另一个是拼接而成的`bytes32`哈希列表。使用比特列表的原因是为了节省存储空间和计算开销，因为大多数节点未被修改且拥有预定义值。


