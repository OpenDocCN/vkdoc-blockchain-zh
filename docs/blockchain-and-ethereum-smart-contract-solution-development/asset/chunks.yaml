    在 Tapscott 和 Tapscott（2018）提供的代币分类法中，他们将以太坊描述为一种协议代币，因为它可以通过智能合约用于创建其他类型的衍生代币，用于分布式应用程序（`dApps`）。这些衍生代币可以是代表股票、债券和其他金融资产的安全代币。衍生代币也可以是自然资产代币，代表可以交易的碳、空气、水、土地以及其他自然资源资产。Freni、Ferro
    和 Moncada（2020）对代币分类法进行了文献综述，然后提出了他们自己的分类法。Ankenbrand、Bieri、Cortivo、Hoehener 和
    Hardjono（2020）描述了用于对代表加密和非加密资产的代币进行分类的 14 个属性。Tapscott（2020）发表了对代币分类框架（`Token
    Taxonomy Framework`，简称`TTF`）的审查，这是一套由 InterWork Alliance（`IWA`）³ 创建的标准，定义了构成代币的各种工件。`IWA`是一个非营利性的会员制组织。


    ³ [`interwork.org/frameworks/token-taxonomy-framework/`](https://interwork.org/frameworks/token-taxonomy-framework/)。`IWA`于
    2021 年与全球区块链商业委员会合并 – [`gbbcouncil.org/membership/`](https://gbbcouncil.org/membership/)


    在本书中，我们将描述两种我们认为与应用程序开发相关的代币分类。

    '
- fmt: '# Token Classification


    The first classification categorizes tokens into native or nonnative tokens. Native
    tokens are generated by the consensus mechanism of the blockchain network, and
    they are a representation of a digital asset on their own. Their value is market
    driven and based on perception and sentiment that is not necessarily tied to any
    other physical or digital asset.


    Methodologies borrowed from valuing companies are being proposed to value native
    tokens. In general, there are two types of valuation methodologies: technical
    and fundamental. At a simplistic level, technical methods rely on trends, historical
    valuation, and historical reaction to events to value companies (or the stocks
    of companies). Fundamental methodologies rely on metrics such as earnings per
    share, revenue, profit margin, growth rate, and revenue per employee to value
    companies. Please note that these methods are not an exact science and different
    people can arrive at different valuations using the same underlying metrics and
    trends.


    Using the fundamental methodology, valuation of native tokens (cryptocurrencies)
    is based on metrics such as the number of transactions, the number of users, and
    the concentration/distribution of the nodes executing the consensus mechanism.
    According to us, these metrics are similar to the metrics used to value internet
    companies in the early days before the dot-com crash. We believe that it is prudent
    to view such valuation methods with a certain level of skepticism. Given the anonymity
    of transactions, many of the metrics that these methods rely upon can be easily
    gamed. Valuing crypto assets or cryptocurrencies is still in a very nascent stage.


    Nonnative tokens are derived from native tokens. Nonnative tokens are mapped to
    either physical assets or other digital assets and derive their value from the
    assets they are mapped to. When we develop enterprise business blockchain applications,
    we are interested in nonnative tokens that we will map to the assets or payment
    currencies that we will be exchanging. An example of a specific nonnative payment
    currency token is a stable coin. The value of a stable coin is mapped to one or
    more national currencies.


    # Chapter 4: Blockchain Business Applications


    The second classification categorizes tokens as fungible tokens or nonfungible
    tokens (NFTs). Fungible tokens can be exchanged one for another, and two tokens
    of the same denomination have the same value. A dollar is a fungible token – the
    ten-dollar bill in my pocket can be interchanged for the ten-dollar bill in your
    pocket since both have the same value. NFTs are one-of-a-kind assets; that is,
    each NFT is unique. One NFT cannot be interchanged with another NFT. An NFT on
    a blockchain is nothing but a “block of data” that cannot be changed, and its
    ownership can be authenticated. Ownership of an NFT can be exchanged, presumably
    for some payment, and that payment then signifies that value that has been ascribed
    to an NFT. We can think of NFTs as a mechanism to prevent counterfeiting of art,
    memorabilia, or anything that any individual determines to be art[.4](#index_split_002.html#p140)


    We end the discussion on tokens by pointing out that the regulation of tokens
    depends on how a token is interpreted. If a token is considered a security, then
    in the United States, it falls under the jurisdiction of the Securities and Exchange
    Commission (SEC). If a token is considered a commodity, then in the United States,
    it falls under the jurisdiction of the Commodity Futures Trading Commission (CFTC).
    Similarly, depending on the use and interpretation of tokens, several other regulatory
    agencies could be involved.[5](#index_split_002.html#p140) Regulation for tokens
    is an area blockchain system designers should pay attention to while designing
    their applications and keep in mind that the regulation is nascent and evolving.'
