- fmt: '# Ethereum 2 Architectural Overview


    ## Beacon Chain


    Ethereum beacon chain is an essential proof-of-stake blockchain that connects
    stakers and shards. The stakers are from Ethereum 1 mainnet accounts that send
    their ether asset to a staking smart contract to participate in the beacon chain
    block generations. The shards are storage and computational blockchains that expand
    the features of `EVM` and state storage of the mainnet.


    ## Sharding


    Sharding is a new architecture of Ethereum blockchains that allow a hierarchical
    set of blockchains to process transactions independently and then aggregate block
    hashes to its parent shard and eventually store the hash on the beacon chain.
    Sharding allows a cluster of blockchains to process transactions and execute smart
    contracts simultaneously and hence dramatically improve the scalability of Ethereum
    1 mainnet.


    ## Ethereum 2 Architectural Overview


    Ethereum 2 is an extension of Ethereum 1 with added beacon chains and sharding
    chains. The following diagram (Figure 9-9) shows an overview of Ethereum 2’s architecture.


    ![](index-382_1.png)


    **Figure 9-9.** *Ethereum 2 topology and workflow*


    There are three blockchains in Ethereum 2 including the legacy Ethereum mainnet.
    The Ethereum mainnet provides the staking assets for Ethereum 2’s proof-of-stake
    mechanism. The beacon chain is a proof-of-stake-based blockchain that records
    the staking information, generates random numbers, proposes validators, and connects
    with sharding blockchain to record the data and transaction Merkle tree of sharding
    blockchains. Then there are also multiple sharding blockchains that are used to
    store Ethereum 2 data and carry out `EVM` computations and process transactions.


    To generate and validate blocks for the three types of blockchains mentioned earlier
    for Ethereum 2, there are four types of client nodes that we want to mention.
    The first one is the Ethereum 1 client nodes such as `geth` client that generate
    blocks for Ethereum 1 mainnet. The second one is beacon nodes that propose blocks
    for the beacon chain. The third one is validation nodes for the beacon chain.
    The validator node will generate or validate beacon chain blocks through beacon
    chain nodes. Then the fourth one is the sharding nodes that are responsible for
    blocks of the sharding blockchains.


    The blockchain nodes mentioned earlier connect and communicate with one another
    through peer-to-peer or `RCP` protocols. Several interactions/edges in the diagram
    are labeled as A, B, C, D, E, F, and G.


    The edge A is an interaction of an account owner wallet with Ethereum 1 node.
    The interaction allows a user to construct and sign a transaction in a wallet
    and then send the signed translation to an Ethereum 1 client node. The client
    node then validates the transaction and packages to a new block. In the diagram,
    the wallet is only connected to an Ethereum 1 node as there is currently no Ethereum
    2 wallet to interact with the beacon chain yet.


    The edge B represents Ethereum 1 client nodes to view Ethereum 1 mainnet blocks
    and transactions or write blocks to the blockchain. In the context of Ethereum
    2, the interaction B is mainly for a staker to stake an asset to the Ethereum
    2 staking smart contract deployed on Ethereum 1 mainnet. Once an asset is deployed
    as a stake, the smart contract function will emit an event to show the staking
    address and amount.


    The edge C is an interaction between an Ethereum 1 client node and a beacon node.
    The staking information in Ethereum 1 blockchain should be visible to the beacon
