- fmt: "[https://web3js.readthedocs.io/en/v1.2.9/](https://web3js.readthedocs.io/en/v1.2.9/)\n\
    \nEthereum JavaScript API\n\nC. Through a third-party application such as `Truffle`\
    \ or `Remix`\n\nThird-party applications will attach to an RPC endpoint to interact\
    \ with Ethereum blockchains. Smart contract compiling tools such as `Truffle`\
    \ and `Remix` all have features to connect to an RPC server. Once an RPC endpoint\
    \ is connected, the smart contract bytecode files that are compiled will be sent\
    \ to the attached RPC server and then broadcasted to the rest of the blockchain\
    \ network.\n\n`Geth` is the most popular Ethereum client adopted by the developer\
    \ community. Besides `geth`, there are other clients such as Java-based `Besu`\
    \ and `quorum` clients that can be used. `Geth` nodes can download the full blockchain\
    \ to local storage, so having a system with hundreds of gigabyte storage is a\
    \ requirement for running `geth` in full node mode.\n\n## Chapter 6 Ethereum Architecture\
    \ and Overview\n\n### Truffle: The Most Comprehensive Smart Contract Development\
    \ Tool\n\n`Truffle` is a smart contract development tool that allows users to\
    \ compile, test, debug, and deploy `Solidity` code. It is easy to try out `Truffle`\
    \ in a sandbox to get a good understanding about how to compile and deploy smart\
    \ contracts.\n\n#### Task 1: Install Truffle package\n\nThe `Truffle` package\
    \ can be downloaded and installed through node package manager (`npm`):\n\n```\n\
    npm install -g truffle\n```\n\nHere, the flag `g` means to install it globally\
    \ so that the `Truffle` application can be launched from any directory.\n\n####\
    \ Task 2: Prepare a project\n\n`Truffle` has an `init` command that allows a developer\
    \ to create a sandbox project for smart contracts. Simply go to a target directory\
    \ and run the following command:\n\n```\ntruffle init\n```\n\nA sample project\
    \ will be created with sample smart contract and configuration files. You can\
    \ also replace the sample smart contract with your own smart contract and use\
    \ a new configuration file.\n\n#### Task 3: Compile and deploy a smart contract\n\
    \nBefore compiling or deploying a smart contract, the `Truffle` configuration\
    \ file will need to be configured. The `Truffle` tool uses the default file name\
    \ of `truffle-config.js` file to look for the configuration. This configuration\
    \ file has two major components to configure. The first is the network component,\
    \ where you need to specify which blockchain network the compiled smart contract\
    \ will be deployed onto. The configuration for the network will include network\
    \ name, host address for the RPC endpoint, port number for the RPC endpoint, and\
    \ `network_id`. The second configuration component is the compiler. For compiler\
    \ configuration, the `Solidity` compiler version will need to be specified.\n\n\
    ```\nmodule.exports = {\n  networks: {\n    development: {\n      host: \"127.0.0.1\"\
    ,\n      port: 8545,\n      network_id: \"*\" // Match any network id\n    }\n\
    \  },\n  compilers: {\n    solc: {\n      version: \"^0.8.0\"\n    }\n  }\n};\n\
    ```\n\nOnce the project is ready for compilation, simply run:\n\n```\ntruffle\
    \ compile\n```\n\nThe compiled result will be stored in the directory of `build`.\
    \ This directory will contain the bytecode and ABI (Application Bytecode Interface)\
    \ files. Smart contract bytecodes are the executable codes that will be deployed\
    \ to the blockchain. The ABI code is used as a function lookup map for external\
    \ applications to call the smart contract.\n\nTo deploy a compiled smart contract\
    \ from `Truffle`, simply type:\n\n```\ntruffle deploy\n```\n\nThis command will\
    \ invoke deployment operation using the `truffle-config.js` file. It will deploy\
    \ the smart contract to the network by using the RPC client service specified\
    \ in the network section of the configuration file.\n\nThere is one more thing\
    \ that needs to be emphasized. When deploying a smart contract, the developer\
    \ needs to have a wallet to send the deployment transaction to the blockchain.\
    \ For development blockchains, because this is internal and there are no security\
    \ concerns, a user can simply add a wallet address in the configuration file.\
    \ For production deployment, strict production security procedures will need to\
    \ be followed."
