  trans: "\n# 交易处理\n\n边 F 表示验证节点与信标节点之间的交互与通信。权益证明（POS）矿工需要运行客户端节点，从信标链请求任务、打包交易、验证区块并提议区块。以太坊\
    \ 2 架构将信标节点与验证节点分离。信标节点负责管理通信以及时代（epoch）、时段（slot）、随机数生成和验证节点选举等工作。验证节点负责处理交易和区块。矿工特定信息（如矿工资质凭证）仅存储在验证节点中，而不在信标节点中。信标节点与矿工节点之间的通信通过`RPC`协议进行。\n\
    \n边 G 表示信标节点向信标链提议信标区块。每个信标节点将与信标链同步，管理质押者注册表，将验证节点组织成委员会，管理时代和时段，生成随机数，分配验证节点角色，并向信标链提议新区块。\n\
    \n从以太坊 2 的架构拓扑和交互来看，以太坊 1 主网仍然是以太坊 2 的重要组成部分。POS 的质押能力来源于资产所有者指定参与以太坊 2 POS 共识的资产。理解以太坊\
    \ 1 向以太坊 2 迁移的过程至关重要。\n\n## 从以太坊 1 迁移到以太坊 2：POS\n\n### 存款、质押与罚没\n\n从以太坊 1 到以太坊\
    \ 2 的迁移采用分阶段方式。以太坊 2 的第一阶段是构建基于权益证明共识的信标链。下文提及质押以太坊 1 资产以迁移至以太坊 2 的一些重要概念和步骤。\n\
    \n权益证明的资产通过存款智能合约存入以太坊 1 主网。以下是存款合约接口的代码片段。\n\n```solidity\n// 存款合约接口基于以下以太坊 2\
    \ 规范：\n// https://github.com/ethereum/eth2.0-specs\n\ninterface IDepositContract\
    \ {\n    /// @notice 已处理的存款事件。\n    event DepositEvent(\n        bytes pubkey,\n\
    \        bytes withdrawal_credentials,\n        bytes amount,\n        bytes signature,\n\
    \        bytes index\n    );\n\n    /// @notice 提交阶段 0 的 DepositData 对象。\n   \
    \ /// @param pubkey BLS12-381 公钥。\n    /// @param withdrawal_credentials 提现公钥的承诺。\n\
    \    /// @param signature BLS12-381 签名。\n    /// @param deposit_data_root 经过 SSZ\
    \ 编码的 DepositData 对象的 SHA-256 哈希值。\n    /// 用于防止格式错误的输入。\n    function deposit(\n\
    \        bytes calldata pubkey,\n        bytes calldata withdrawal_credentials,\n\
    \        bytes calldata signature,\n        bytes32 deposit_data_root\n    ) external\
    \ payable;\n\n    /// @notice 查询当前存款根哈希。\n    /// @return 存款根哈希。\n    function\
    \ get_deposit_root() external view returns (bytes32);\n\n    /// @notice 查询当前存款计数。\n\
    \    /// @return 以小端序 64 位数字编码的存款计数。\n    function get_deposit_count() external\
    \ view returns (bytes memory);\n}\n```\n\n存款智能合约使用稀疏默克尔树存储质押存款记录，并通过存款事件通知信标节点等外部程序。该智能合约支持的主要功能包括`deposit()`、`get_deposit_root()`和`get_deposit_count()`。用户在进行质押存款时，需提供公钥、提现凭证、所有者签名和存款数据根哈希等信息。存款金额包含在`msg.value`中，因此不是函数参数。存款\
    \ ID 会自动递增，无需提供。\n\n向存款智能合约存入资产时，需牢记一个关键点：以太坊 1 的公钥/私钥对曲线已被替换为功能更丰富的`BLS12-381`曲线。\n"
- fmt: '2 key pair will need to be generated through a new tool with a 24-word mnemonic
    phrase. Different from Ethereum 1, Ethereum 2 has both withdraw keys and validator
    keys for an account. One set of mnemonic phrases can generate multiple withdraw
    public keys, and one withdraw key can derive multiple validator keys.


    ## Run an Ethereum 2 Validator Node with POS Staking


    Running a validator node will get rewards from Ethereum 2 blockchain. Unlike Bitcoin
    or Ethereum mining, Ethereum 2 is based on proof of stake, and hence, all the
    nodes will get rewarded if the nodes are online and function correctly. The reward
    return rate is about 3–8% APR at ether value. The following shows major steps
    to build an Ethereum 2 mining node.


    Firstly, Ethereum 2 depends on Ethereum 1. Therefore, an Ethereum 1 node is still
    needed. This node can be built with `geth` or can be a stable public node with
    a static IP.


    Secondly, users need to allocate staking funds. A minimum of 32 ethers is needed
    to run a validator node. Users also need to consider that if their node goes down,
    there is a penalty that will decrease the staking balance.


    Thirdly, users need to prepare a deposit account. There is a deposit tool that
    can be used to generate mnemonic phrases and derive withdrawal keys and validator
    keys. These keys are extremely important and should be safeguarded. If the mnemonic
    phrases and withdrawal keys are lost, the locked ether for Ethereum 2 will be
    lost.


    Fourthly, download and run beacon nodes and validator nodes. There are multiple
    vendors who provide the packages to run beacon and validator nodes.


    And finally, use scripts or third-party tools to deposit assets to deposit contracts.
    The deposited event will be detected by the beacon node. The deposit will be in
    pending state for a certain time and then become active.


    One important factor to consider is that unlike proof-of-work consensus, the proof-of-stake
    mechanism implements penalties for validators. The Ethereum beacon chain implemented
    two penalties for validators. One is the inactivity penalty that punishes validator
    nodes that are offline or do not propose/attest a block. Another one is slashing
    that punishes validators that construct or attest malicious blocks. It is recommended
    that validators run a monitoring program to ensure that their nodes are working
    actively and correctly.


    Many tools and solutions have been developed on this. Users can check the Ethereum
    2 website to see the recommended ones.


    ## Uncertainties with Ethereum 2


    Although Ethereum 2 has been viewed as a promising solution for Ethereum mainnet
    scalability solutions, there are still some uncertainties about this project.
    For example, the sharding chain is still not finalized. There has been a lot of
    debates on sharding regarding security and the staking economy. It is recommended
    that readers keep an open mind on the road map, implementation, and rollout of
    Ethereum 2.


    ## Summary


    In this chapter, we explained various layer 2 scalability solutions including
    state channel, plasma, rollups, as well as Ethereum 2 technology. Each technology
    has its pros and cons. When designing decentralized applications, it is important
    to consider the usage models of the applications and choose the most feasible
    technology to scale out the solutions.


