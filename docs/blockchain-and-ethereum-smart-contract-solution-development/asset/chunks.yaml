  trans: "\n4. 请参阅使用以太坊创建 NFT 的分步指南：[www.wsj.com](https://www.wsj.com/articles/i-gave-my-mom-a-crypto-wallet-a-simple-guide-to-nfts-blockchain-and-more-11639404001?st=sweoi7bt6baes4o&reflink=desktopwebshare_permalink)\
