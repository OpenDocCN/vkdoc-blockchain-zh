    to prove that the transactions are valid. During this wait period, the optimistic
    rollup smart contract allows third parties to provide fraud proof to disqualify
    a rollup and to claim reward tokens. The reward to fraud prover comes from the
    rollup transaction stakes deposited by the aggregators. If an aggregator provides
    valid faulty proof, the stake deposited by the aggregator will be forfeited.


    ![Figure 9-6](index-375_1.png)


    ***Figure 9-6.** Overview of Optimistic Rollup*


    Since optimistic rollup relies on fraud proof to ensure that the transactions
    in layer 2 are properly propagated to layer 1, there is an overhead of several
    days to one week for the rollup transactions to be finalized in layer 1. This
    means that to claim assets in layer one, users will need to wait for up to one
    week to clear all the challenges posted on the rollups. This is a bottleneck for
    optimistic rollup. To overcome the limitation of fraud proof mechanism, the validation
    proof method is proposed to allow transactions to use rollup proof to prove their
    validity.


    In the following, we describe `zk-SNARK` (Zero-Knowledge Succinct Non-interactive
    Argument of Knowledge) for validation proof rollup.


    ## zk-SNARK Layer 2


    `zk-SNARK` is a layer 2 rollup scalability solution that uses zero knowledge proof
    to ensure the rollup transactions from layer 2 to layer 1 are always in a valid
    state. Zero Knowledge proof is a technology for a party to prove that a statement
    is true without revealing what information is processed and how the conclusion
    is derived. `zk-SNARK` stands for Zero-Knowledge Succinct Non-interactive Argument
    of Knowledge. `zk-SNARK` is a special zero knowledge proof whose mechanism has
    the following characteristics:


    - **Succinct** – The proof is short and easily verifiable. This is best for onchain
    verification, where the gas costs for the Ethereum, and other networks are expensive
    and many nodes will need to verify the same statement.

    - **Non-interactive** – Proof generation and verification do not require users’
    manual interventions. The offchain applications can programmably generate proofs,
    and onchain smart contracts can verify proofs.

    - **Argument of Knowledge** – Meaning that the statements can be confirmed or
    falsified with zero knowledge proof system. The communications parties gain knowledge
