    `Block N(A)`和`Block N(B)`中的哪一个最终会成为区块链的一部分。在时间`T = t + 2`时，节点`Q`收到了`Block N(A)+1`。如图[5-6](#index_split_003.html#p193)所示，节点`Q`将`Block
    N(A)+1`添加到`Block N`上。


    ![](index-193_1.png)


    **第5章 区块链实现概览：比特币、以太坊和超级账本**


    **图5-6.** 自然分叉示意图


    在时间`T = t + 2`时，`Block N(A)`最终成为区块链一部分的可能性高于`Block N(B)`成为区块链一部分的可能性。在任何给定时间，比特币都将最长的链视为有效区块链。每个节点都试图延长最长的链。此图例与[第2章](https://doi.org/10.1007/978-1-4842-8164-2_2)中讨论的最终一致性的`BASE`语义一致。


    与前述描述类似，我们还应该承认，有些节点可能在收到`Block N`之前就收到了`Block N(A)+1`。如果一个节点收到了一个块，但由于`hashPrevBlock`与其链中已有的块不匹配而无法将其添加到区块链，则它会将该块保存为孤儿块。如果稍后该节点收到了`Block
    N(A)`，那么此时，`Block N(A)`和`Block N(A)+1`都会被添加到区块链中。


    在任何给定时间，区块链的叶节点不一致的可能性很高。最终一致性的概念向我们保证，最终所有节点都将达成一致，并且远离区块链叶节点的节点保持一致的可能性很高。


    基于上述原因，谨慎的做法是，在一笔交易所在区块之上又链接了几个区块之前，不应认为该交易已结算。对于大额交易，经验法则是等待六个区块链接到某个区块之后，才认为该区块已被不可变地添加到区块链中。


    让我们为一位决定接受比特币作为支付方式的商家解释这一点。商家将分享他们的地址（公钥），潜在客户可以使用该地址向其付款。如果客户在时间`t`从该商家处购买商品，他们将发起一笔交易；在时间`t`之后的某个时刻，该交易将被添加到一个候选区块中；再之后某个时刻，该候选区块将被添加到区块链中。一旦商家确认包含该交易的区块已被添加到区块链，他们可以再等待几个区块添加到该区块之后，然后将该交易视为完全确认。此时，商家就可以将货物运送给客户。[11](#index_split_003.html#p194)


    比特币软件被设计为每十分钟向区块链添加一个新区块。这是一个设计决策，代表了一种权衡，即在尽可能快地结算交易的同时，确保各个节点上的区块链不同步的时间尽可能短。


    比特币软件如何确保实现这一设计目标？在每创建2016个区块后，比特币软件会计算矿工创建新区块所花费的平均时间。如果这个时间大于十分钟，那么它会降低由`nBits`表示的难度级别，以便矿工能够更快地创建区块。为了降低难度级别，比特币软件会减少矿工需要找到的哈希值中所需的前导零的数量。另一方面，如果创建区块的平均时间少于十分钟，那么比特币软件会增加所需的前导零数量。


    11 交易的智能合约可以有一个条件，即商家在能够确认已发货之前，不能花费这笔钱。

