    虽然`币安`、`Gemini`、`Coinbase`和`FTX`等加密货币交易所被用于人们交易加密货币，但它们的交易平台拥有集中式账本，并伴有我们之前讨论过的所有相关风险和陷阱。加密货币交易所还需要遵守与“了解你的客户”相关的法规。从这些加密货币交易所获得的钱包可能会被执法机构传唤，以获取个人身份与其公钥之间的映射关系。


    `CBDC`是各国央行正在推出的货币，作为法定货币的数字等价物。中国于 2020 年 4 月启动了数字人民币`e-CNY`试点，并于 2022 年 1 月扩大了试点范围。`e-CNY`通过移动应用程序运行，据估计，`e-CNY`应用程序拥有超过
    2.6 亿用户。印度披露了在 2023 年初推出数字卢比的计划。在美国，美联储于 2022 年 1 月发布了一份白皮书，以“就`CBDC`总体而言，以及就美国`CBDC`的潜在收益和风险，促进广泛且透明的公开对话”。虽然`CBDC`的经济潜力令人印象深刻，但尚不清楚主权国家政府是否正在或将会使用分布式账本或区块链来实施`CBDC`。他们可以选择将`CBDC`作为集中式账本来实施。这将极大地扩大政府权力，进一步集中国家内的货币和金融活动。`CBDC`还将进一步增强国家的监视能力，并消除现金的匿名性。在倡导或采用`CBDC`之前，我们需要审查其底层实施以及`CBDC`将运行的监管制度。


    以上是对区块链金融应用的快速概述，我们实际上只是触及了皮毛。根据`CB Insights`的数据，2021 年针对`DeFi`的风险投资资金增长了`851%`。

