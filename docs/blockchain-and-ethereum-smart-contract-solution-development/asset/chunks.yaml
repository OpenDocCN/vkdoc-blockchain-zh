- fmt: '# Chapter 2 Overview of Core Technologies Supporting Blockchain


    There is, however, a limitation with symmetric key cryptography for data that
    is transmitted. It requires that the recipient of the data have the key, which
    means the key needs to be transmitted securely from the sender to the recipient.
    This means these two parties must trust each other and establish a trusted channel
    for the transmission of the key. Setting up this trusted secure channel can be
    expensive. Due to this limitation, symmetric key cryptography gets limited to
    parties who know one another and who can afford to invest in setting up a trusted
    channel infrastructure.


    Table [2-1](#index_split_001.html#p63) provides a summary of some of the popular
    algorithms that are used for strong symmetric key cryptography.


    **Table 2-1.** Summary of strong symmetric key algorithms


    Next, let us review another cryptography method, called asymmetric key cryptography,
    or public/private key cryptography. In this method, there are two keys. There
    is a public key that can be shared and a private key that is not shared. Both
    the sender and recipient of data have a public key and a private key. Let’s look
    at an example. Helen wants to transmit a message to Marco securely. Marco’s public
    key is known to Helen, so Helen will encrypt the message using Marco’s public
    key. When Marco receives the message, they decrypt the message using their private
    key that is only known to them. When Marco is successful in decrypting the message,


    they know that the data was intended for them. Please note that in this method,
    unlike symmetric key cryptography, only the encrypted message is transmitted.
    No key is transmitted.


    **Figure 2-6.** Asymmetric or public/private key cryptography


    In asymmetric key cryptography, there is no need to set up a trusted secure channel.
    This now makes it possible for more people and parties to use cryptography – parties
    no longer have to know one another, and they do not need to invest in setting
    up infrastructure to securely share keys.


    While asymmetric key cryptography resolves the limitation with symmetric key cryptography,
    it has its own limitation. This limitation is as follows: Marco knows that they
    have received a message intended for them because they have successfully decrypted
    the message with their private key. Marco, however, cannot be certain that the
    message was sent by Helen. The message could have been sent by anyone who knew
    Marco’s public key. While Helen can communicate to Marco that they sent the message,
    Marco does not have a foolproof guarantee. Marco could have received the message
    from anyone. We will discuss later how to address this limitation with asymmetric
    key cryptography.


    Table [2-2](#index_split_001.html#p65) provides a summary of some of the popular
    algorithms that are used for strong asymmetric or public/private key cryptography.
    These are all very efficient algorithms that result in strong cryptography and
    are unlikely to be broken for many years, even perhaps with the advent of quantum
    computing.


    **Table 2-2.** Summary of strong asymmetric key algorithms


    One way to address the limitation of not having a foolproof guarantee of the identity
    of the sender with asymmetric key cryptography is to use digital signatures.


    Let’s look at an example: Helen wants to send a message to Marco. This time, Helen
    is actually going to send the same message twice. The first message is encrypted
    by Marco’s public key, and Marco can decrypt this message with their private key
    (asymmetric key cryptography shown in Figure [2-6](#index_split_001.html#p64)).
    The second message will be encrypted by Helen’s private key, and Marco can decrypt
    this message with Helen’s public key. The second message is Helen’s digital signature
    (private key) as shown in Figure [2-7](#index_split_001.html#p65).'
