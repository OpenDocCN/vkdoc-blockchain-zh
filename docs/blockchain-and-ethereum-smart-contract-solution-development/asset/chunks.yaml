  trans: '

    实现这一目标是为了确保流通中的货币总量（货币供应量）随时间保持相对稳定。高通胀率往往会削弱人们对某种货币的信心。


    3. **记账单位** – 这是指货币的名称以及该货币不同面值所对应的价值或“单位”。美元是一种单位，我们可借此准确衡量经济体中商品、服务、资产和负债的价值。要使记账单位赢得信任，它应当是一种良好的价值储藏手段。此外，相同面值的每一张货币在其购买力方面应当统一。例如，每张`$1`纸币都具有相同的购买力。它还应具有可互换性；也就是说，两张`$1`纸币之间没有区别，它们完全可以互换。最后，货币应当具有可分性；即一张`$10`钞票可以拆分为两张`$5`钞票、十张`$1`钞票或五张`$2`钞票。


    基于我们目前对比特币的了解，根据这一定义，我们能判断它是否属于货币范畴吗？在其发展的现阶段，这个问题的答案是一个响亮的“不”。比特币不能被视为交换媒介，因为尽管它稀缺，但目前还没有足够多的人或企业愿意接受比特币作为交换媒介。比特币也不能被视为价值储藏手段，因为与法定货币相比，其价值每日波动巨大。在某些方面，比特币可以被视为一种记账单位，它具有可互换性和可分性。然而，由于其波动性，比特币无法准确衡量商品、服务、资产和负债的价值。


    当今经济中的大多数货币兑换并非通过纸币（又称现金）的直接交换来结算。在下一节中，我们将看到这种情况如何催生了对第三方和政府监管的需求。不过，让我们在结束本节之前，先看看使用现金进行的交易与使用比特币进行的交易的相似之处。


    - 现金交易和比特币交易都是匿名的，并能保护隐私。

    - 现金和比特币一旦丢失均无法找回。

    - 现金和比特币通常属于占有者，尽管占有的含义有所不同。

    - 现金和比特币都难以伪造。


    我们希望你对本节中关于货币的理解能够阐明：比特币虽然在实现方式上独一无二，但在概念上符合货币的演化进程，即使就其当前状态而言，我们尚不能将其归类为货币。


    在下一节中，我们将拓宽视野，从整体上审视经济中的价值交换，了解为何以及如何需要第三方，政府和其他组织为何以及如何实施监管，以及这些因素如何共同导致经济体系中产生一系列低效问题。


    ## 经济即价值交换


    为了理解价值交换如何构成一切经济活动的基础，让我们重温一个古老的货币谜题（Henderson, 2012）。


    某个小镇上，生意冷清……烈日当空……街道空无一人。时世艰难，人人负债，所有人都靠赊账生活。


    就在这一天，一位来自西部的富游客开车穿过小镇。他在汽车旅馆停下，将一张`$100`钞票放在柜台上，说他想要检查楼上的房间，以便挑选一间过夜。


    就在男子上楼后，旅馆老板抓起钞票，跑到隔壁去还欠肉铺老板的债。肉铺老板拿着这`$100`钞票沿街跑去，还清了欠养猪户的债。养猪户拿着`$100`钞票去饲料店付清了他的账单。农民合作社的人拿着`$100`钞票跑去还他欠当地妓女的债，这位妓女也正面临困境，不得不提供赊账服务。

    '
- fmt: 'She, in a flash, rushes to the motel and pays off her room bill with the motel
    owner.


    The motel proprietor now places the `$100` back on the counter so the rich traveler
    will not suspect anything.


    At that moment the traveler comes down the stairs, picks up the `$100` bill, states
    that the rooms are not satisfactory, pockets the money & leaves.


    NOW, … no one produced anything … and no one earned anything … however the whole
    town is out of debt and is looking to the future with much optimism.


    This is interesting, isn’t it?


    From an accounting standpoint, everyone had a debt, but they also had a credit.
    For example, the motel proprietor had a debt with the butcher and a credit with
    the prostitute, and so on. In aggregate, none of them had a debt even without
    the sequence of exchanges triggered by the rich traveler. We just needed the first
    exchange to trigger the domino. Exchange of value keeps our economy humming and
    allows us to take on additional debt against perhaps offsetting credit we might
    have.


    In general, the economy includes four atomic types of exchange (see Figure 1-1).
    Exchange can happen between two individuals. An individual is a producer, and
    another individual is the consumer. This is the type of exchange we have described
    so far in all our examples. The second type of economic exchange can happen between
    a firm and an individual. Here, the firm is a producer, and an individual is a
    consumer. This is the classic exchange between a manufacturer producing a good
    and a customer purchasing that good. This is also referred to as a business-to-consumer
    exchange. The third type of economic exchange can happen between two firms. Here,
    one firm is a producer, and another firm is a consumer. An example could be one
    firm producing a part that is used by another firm in creating their product.
    This is also referred to as a business-to-business exchange. The fourth type of
    economic exchange can happen between an individual and a firm. This is the classic
    exchange between an employee who provides service to their employer and the employer
    providing compensation in terms of wages, bonus, equity, and benefits.


    ![Figure 1-1. Four atomic value exchanges](index-32_1.jpg)


    Most exchange transactions in the economy are a combination of one or more of
    the four atomic transactions. The parties in a transaction do not have to be geographically
    proximate, and the transactions do not settle immediately, as we have described
    in our simplified examples. Figure 1-2 characterizes the exchange of value among
    the transacting parties into three types: Currency, Goods, and Services.


    ![Figure 1-2. Type of value](index-33_1.jpg)


    Currency (or money, or cash) is involved in all transactions. Parties can exchange
    Currency with each other, either to make change or to change the unit of the currency
    (cross-border transactions), or parties can exchange goods for money or services
    for money. The parties usually transact by creating credit or accounts receivables
    and debit or accounts payables. The timing of payments for the transactions and
    penalties associated with late payment are all determined by stipulated contracts
    between parties. The parties exchange money through banks or other financial institutions
    since it is not possible to physically give money. Sometimes, firms need cash
    to fund operations so they borrow money by pledging collateral. Since transactions
    do not settle immediately, involve multiple parties, and include the tracking
    of credit and debit, all transactions need to be recorded. This is usually done
    by a party in a ledger. This creates the importance of data in all exchange transactions.
    Figure 1-3 shows three critical roles played by data.


    ![Figure 1-3. Roles played by data](index-34_1.jpg)'
