    ## 架构


    跨链身份服务的架构如下图所示（图 11‑4）。底层的区块链为该服务提供安全性与不可篡改性。中间层是智能合约层，包含添加跨链 ID、查询 ID、批准或撤销 ID、修改
    ID 等功能。智能合约可通过 EVM 查询或保存状态到区块链。顶层是 GUI 层，负责渲染网页、处理用户输入，并通过 Web3 和 MetaMask 钱包与智能合约通信。Web3
    层需要连接一个 RPC 节点才能访问智能合约。


    ![](img/index-423_1.png)


    **第 11 章 构建团队项目**


    ***图 11-4.*** 跨链 ID 服务架构。


    ## 设计智能合约


    在设计智能合约时，需考虑以下要素：角色、数据结构、事件和函数。


    ### 角色


    跨链 ID 服务的智能合约定义了三种角色。`owner`（所有者）是部署智能合约的角色。此`所有者`拥有智能合约，并有权为智能合约指定管理员。管理员（`admin`）负责管理跨链
    ID，可以批准或撤销某个跨链 ID。此外，还有普通用户，他们可以查询跨链 ID、添加新的跨链 ID 或修改其信息。


    **第 11 章 构建团队项目**


    ### 事件


    当用户对智能合约执行操作时，可以触发多种事件，以便客户端应用程序查询发生了什么。定义了四个事件：


    -   **AddChainId** – 当向服务中添加新的跨链 ID 时触发此事件。

    -   **VerifyChainId** – 当跨链 ID 经管理员验证并批准时触发此事件。

    -   **RevokeChainId** – 当跨链 ID 被管理员撤销时触发此事件。

    -   **ModifyChainIdInfo** – 当注册者修改跨链 ID 的元数据时触发此事件。


    ### 数据结构


    定义了几种数据结构。有一个 `chainidInfo` 数据结构，包含区块链的 `manager`（管理者）地址、`long name`（长名称）、`short
    name`（短名称）、`category`（类别）和 URL 字符串。有一个 `Status` 枚举，其值包括 `Pending`（待处理）、`Verified`（已验证）和
    `Revoked`（已撤销）。`Pending` 表示跨链 ID 刚注册时的状态。`Verified` 表示管理员批准该跨链 ID 的状态。`Revoked`
    表示管理员发现该跨链 ID 存在问题并拒绝其注册时的状态。此外，还有几个映射数据结构，例如 `idStatus` 和 `idInfo`，允许智能合约查询跨链
    ID 的状态和元数据信息。最后，还有一个 `legacyIds` 映射，用于将旧 ID 与新的跨链 ID 对应起来。


    **第 11 章 构建团队项目**


    ### 函数


    为智能合约定义了以下函数：


    -   **`addChainId`** – 此函数向服务中添加一个新的跨链 ID。任何用户均可调用。

    -   **`changeAdmin`** – 此函数更改服务的管理员。只能由智能合约的所有者调用。

    -   **`approveChainId`** – 此函数将跨链 ID 的状态更改为 `Verified`。只能由智能合约服务的管理员调用。

    -   **`revokeChainId`** – 此函数将跨链 ID 的状态更改为 `Revoked`。只能由智能合约服务的管理员调用。

    -   **`modifyChainIdInfo`** – 此函数修改跨链 ID 的元数据信息。可由跨链 ID 的管理者调用。

    -   **`getChainIdStatus`** – 此函数返回跨链 ID 的状态。

    -   **`getChainIdFromLegacyId`** – 此函数返回与某个旧 ID 关联的跨链 ID。

    -   **`getChainIdInfo`** – 此函数返回某个 `chainId` 的元数据信息。


