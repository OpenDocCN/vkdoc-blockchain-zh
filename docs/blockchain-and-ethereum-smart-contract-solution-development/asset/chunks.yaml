    \ other high-income countries. *JAMA.* 2018;319(10):1024–1039. doi:10.1001/jama.2018.1150\n\
    \nZhuang, Y., Sheets, L. R., Shae, Z., Chen, Y. W., Tsai, J., & Shyu, C. R. (2020).\
    \ Applying Blockchain Technology to Enhance Clinical Trial Recruitment. *AMIA\
    \ ... Annual Symposium proceedings. AMIA Symposium,* 2019, 1276–1285\n\n## **CHAPTER\
    \ 5**\n\n## **Blockchain Implementations Overview: Bitcoin, Ethereum, and Hyperledger**\n\
    \nBitcoin, introduced in 2008, is considered the first implementation of blockchain.\
    \ Subsequent implementations of blockchain have made changes to Bitcoin to ease\
    \ application development, improve scalability, and enhance versatility in terms\
    \ of the types of applications that can be created.\n\n## **Introduction**\n\n\
    We started this book by grounding ourselves and understanding the seven economic\
    \ inefficiencies – time to settle transactions; fees paid to third parties for\
    \ non-value-added activities; data-related redundant work, rework, and reconciliation\
    \ work (the three Rs); rules and regulations from governmental and nongovernmental\
    \ organizations; fraud; privacy trade-off; and data security – that our current\
    \ technologies have not been able to address. We attributed this to the inability\
    \ of our systems to create trust among inherently untrusting transacting parties.\n\
    \nAfter reviewing the capabilities and design issues with technologies associated\
    \ with cryptography, distributed systems, and peer-to-peer networking, we discussed\
    \ how these technologies can be integrated to create a blockchain system that\
    \ includes four major components: distributed ledger, privacy preservation, consensus,\
    \ and smart contracts.\n\nAfter conceptually exploring how these four components\
    \ of blockchain work together to address the seven economic inefficiencies, we\
    \ took an in-depth look at when blockchain is a suitable technology for addressing\
    \ business problems; we provided design guidelines for building blockchain-based\
    \ applications and provided examples of use cases for blockchain applications\
    \ in finance, healthcare, supply chain, and entertainment.\n\nArmed with all this\
    \ knowledge, we feel it is necessary and appropriate to understand at a sufficient\
    \ technical depth the original cryptocurrency and blockchain implementation, Bitcoin.\n\
    \nBitcoin was introduced to the world through a paper published under the pseudonym\
    \ Nakamoto (2008), to coincide with the subprime financial crisis that had undermined\
    \ confidence in the banking system. Though Bitcoin was not the first electronic\
    \ cash system implemented, it was the first system to include a credible solution\
    \ for mitigating the double spend problem (Lee, Choi & Rhee, 2003). Nakamoto created\
    \ the first block, referred to as the genesis block, in the Bitcoin blockchain\
    \ on Jan 3, 2009, mining 50 BTCs (Bitcoins) for himself, and then on Jan 12, 2009,\
    \ sent ten BTCs to Hal Finney, [1 a cr](#index_split_003.html#p177)yptographer,\
    \ as the first transaction on the 1 Hal Finney’s obituary when he passed away\
    \ in 2014 – [www.nytimes.com/2014/08/31/business/hal-finney-cryptographer-and-bitcoin-pioneer-dies-at-58.html](http://www.nytimes.com/2014/08/31/business/hal-finney-cryptographer-and-bitcoin-pioneer-dies-at-58.html)\n\
    \nBlockchain. After Nakamoto shared the original paper to an email\n\n**Copyright\
