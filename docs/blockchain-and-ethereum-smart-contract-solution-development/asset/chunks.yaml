    \ Web3`环境使用`MetaMask`扩展，通过`MetaMask`配置将Remix与外部区块链连接。这种方式不使用Remix，而是由`MetaMask`连接到区块链，并作为代理将智能合约部署到目标区块链。`Web3\
    \ provider`环境将Remix与一个RPC端点连接，将智能合约部署到该RPC服务器，然后广播到网络的其他部分。\n\n除了选择区块链网络环境，开发者还需要指定一个用于发送部署交易的账户。该账户需要有一些以太币来支付部署的Gas费用。该账户也将成为智能合约的所有者。还有其他一些杂项参数需要配置。`Gas\
