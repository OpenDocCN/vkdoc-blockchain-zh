  trans: "\n# 第 2 章 支撑区块链的核心技术概述\n\n## 实现目标的方法\n\n**图 2-10.** 分布式系统问题、目标与方法总结\n\n\
    第 2 章《支撑区块链的核心技术概述》侧边栏提供了一份分布式系统术语及其定义的列表，这些术语在设计区块链应用时是必不可少的参考依据。\n\n关于与区块链相关的分布式系统，我们需要掌握的最后一个概念是\
    \ CAP 定理。CAP 定理由计算机科学家埃里克·布鲁尔提出。更多信息和讨论请参见布鲁尔（2012 年）的著作。CAP 定理指出，分布式系统在数据方面，只能同时实现强一致性、高可用性和网络分区容忍性这三个目标中的两个。请注意，该定理并未对系统的性能做出任何断言。该定理的含义如下：\n\
    \n-   如果我们希望始终保证所有数据更新的高可用性，并且也希望保证所有数据在所有副本和数据分区之间保持一致，那么我们就无法保证网络分区容忍性；也就是说，如果遇到网络故障，我们将无法保证系统及其数据的可用性。\n\
    \n-   如果我们希望始终保证所有数据更新的高可用性，并且也希望保证网络分区容忍性，那么我们就无法保证所有数据在所有副本和数据分区之间保持一致。\n\n\
    \    *网络分区意味着某些本应相互连接的计算机之间没有可用的网络路径——我们称这种情况为分区。请注意，这里“分区”一词的用法与我们之前将计算和数据划分以便在多台计算机上执行时的用法不同——后者我们称之为数据分区。*\n\
    \n-   如果我们希望保证网络分区容忍性，并且也希望保证所有数据在所有副本和数据分区之间保持一致，那么我们就无法保证所有数据时刻可用于更新。\n\n没有系统设计师愿意完全放弃高可用性、强一致性和网络分区容忍性这三个特性中的任何一个。CAP\
    \ 定理迫使系统设计师思考他们能够承受的权衡，同时满足全部或大部分业务需求。分布式系统的设计宗旨是在数据更新的高可用性、数据的强一致性和网络分区容忍性之间取得平衡。\n\
    \n在本节中，我们从非常高的业务层面回顾了分布式系统的概念，这些概念对于设计区块链应用至关重要。我们将在本章最后一节回顾区块链实现如何根据本章所讨论的分布式系统概念进行设计权衡。\n\
    \n在下一节中，我们将回顾与点对点网络相关的概念。\n\n## 点对点网络\n\n区块链系统由计算机组成，这些计算机也称为计算节点，或简称为节点，它们通过点对点网络相互连接。在本节中，我们的重点是识别并理解传统计算机网络架构与点对点网络架构之间的差异。\n\
    \n*从这个意义上说，不存在纯粹的分布式系统。大多数分布式系统都包含一些集中式组件。*\n\n![图 2-11](img/index-83_1.png)\n\
    \n**图 2-11.** 传统计算机网络架构\n\n图 2-11 展示了一个示意性的传统计算机网络架构。图 2-11 中的云代表计算机网络，它使得连接到网络的计算机能够通过某种网络路径相互通信。\n\
    \n在图 2-11 中，我们展示了两种类型的计算机。我们把红色的计算机称为客户端计算机。客户端计算机通常有所需求，它们需要被服务。我们把黑色的计算机称为服务器。它们响应客户端的服务请求，如果客户端被授权请求该服务，则服务器执行该请求。\n\
    \n根据提供的服务类型，我们可以想到多种类型的服务器。例如，数据库服务器响应创建、读取、更新和删除数据的请求。域名服务器提供类似电话簿的服务，根据网站名称提供托管该网站的服务器网络地址。网络服务器接收特定网页的请求，并“提供”这些页面。还有防火墙充当服务器，以及执行专门计算的服务器，等等。\n\
    \n在传统的计算机网络架构中，我们有两种类型的计算机：客户端和服务器。从某种意义上说，服务器对客户端拥有控制权。它们控制着谁有权访问其服务、提供哪些服务、服务的语义是什么、请求服务的语法是什么、何时提供服务，以及针对不同类型客户端的服务速度。如果服务器因任何原因不可用，客户端将无法获得任何服务，事实上，客户端甚至可能不知道服务器不可用。服务器也可以单方面改变其提供的服务的任何方面，尽管在实际中，服务器不太可能这样做，因为任何服务器的价值主张和效用直接取决于有多少客户端使用其服务。\n\
    \n在许多情况下，服务器也由单一实体集中拥有；也就是说，即使可能存在多台提供相同类型服务的计算机服务器，它们也可能由同一方所有。这种服务器的集中所有权及其专业化可能会给整个网络的性能、成本和功能带来限制。\n\
    \n现在让我们转向点对点网络。图 2-12 展示了一个示意性的点对点网络。在此图中，云再次代表网络，您可以看到所有计算机都通过云所代表的网络相互连接；也就是说，所有计算机都可以通过某种网络路径相互通信。\n\
    \n*也许我们应该明确一点，点对点网络是分布式系统的一个特定情况（或拓扑结构）。*\n\n![图 2-12](img/index-85_1.png)\n\n\
    **图 2-12.** 点对点网络架构\n\n在图 2-12 中，所有计算机颜色相同，我们可以说它们都是客户端，或者说它们都是服务器。从某种意义上说，所有计算机都是相同的。它们可以提供相同的功能。每台计算机可能没有直接路径连接到另一台计算机，但它们以某种方式连接，使得每台计算机无需利用其他计算机上的任何专门服务，就能与所有其他计算机通信。从这个意义上说，在点对点网络中，没有哪台计算机拥有超越其他计算机的权力。每台计算机都是独立的。每台计算机拥有同等的权力。每台计算机都可以\n"
- fmt: 'Peer-to-peer network nodes have the same functionality as the other computers,
    if it so chooses. Each computer can communicate with every other computer, and
    they provide services to each other without any discrimination. If any one computer
    in a peer-to-peer network decides to leave the network (they are free to do that!),
    there is no loss of functionality for the entire peer-to-peer network. It can
    continue to function without any degradation.


    A peer-to-peer network is a more egalitarian and democratic architecture than
    a traditional computer network architecture. While nothing prevents one party
    from owning multiple nodes, it is highly unlikely (even impossible) for one party
    to own all the nodes in a peer-to-peer network. The most egalitarian peer-to-peer
    networks have nodes that are powered by open source software that are available
    to everyone and have no restrictions on who can join the peer-to-peer network.
    In the past, peer-to-peer networks have been set up for exchanging files, music,
    data, software, and games. Special-purpose peer-to-peer networks where all nodes
    (peers) are not equal have also been set up for voice and video calls using the
    internet.


    In general, we can surmise that those in power tend not to like peer-to-peer networking
    architectures, perhaps because they are not able to control them or profit from
    them. Blockchain is a peer-to-peer network of computer nodes for the purpose of
    exchanging value. Perhaps those in power might feel threatened by it!


    Let’s not get ahead of ourselves though. In the next section, we will discuss
    how cryptology, distributed systems, and peer-to-peer network architectures come
    together for a successful blockchain implementation.


    ## Blockchain Technology Integration


    A blockchain is a clever implementation of cryptology, distributed systems, and
    peer-to-peer networks to create a decentralized system chain. In this section,
    we review at a high level how these technologies are integrated and what functionality
    each technology provides to a blockchain implementation. We start in the reverse
    order in which these technologies were discussed in this section.


    We usually consider a centralized system as an antonym of a distributed system
    where one physical computer is capable of providing all the functionality needed
    to meet the requirements of the business. We also use the term “centralized” to
    characterize the ownership of a system. If all the computers in a distributed
    system are owned by a single party, then we refer to such a distributed system
    as having centralized ownership. When the computers in a distributed system are
    owned by multiple parties, then we refer to such a distributed system as having
    decentralized ownership. In this sense, blockchain is a distributed and decentralized
    system. For systems with decentralized ownership, mechanisms to govern all the
    parties become an important characteristic. Governance mechanisms are needed to
    maintain and update the distributed system.


    All blockchain implementations consist of computers (or nodes) connected in a
    peer-to-peer network. This means that every computer in a blockchain implementation
    is capable of having the same functionality as any other computer. Blockchain
    software is freely available, and in its most robust decentralized implementation,
    nodes can join the network anytime they want, and they can leave the network anytime
    they want without appealing to any permission granting authority. In their purest
    implementation, no one computer has power over any other computer in a blockchain,
    and no one computer has the power to dictate anything about what another computer
    can do.


    Since blockchain consists of computers connected in a peer-to-peer network, it
    is a distributed system. It solves real-world problems related to complexity (scalability),
    failures (fault tolerance), and consistency.'
