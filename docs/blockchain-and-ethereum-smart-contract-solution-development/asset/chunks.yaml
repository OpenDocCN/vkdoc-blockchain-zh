    \    }\n\n    /**\n     * @dev Return value\n     * @return value of 'message'\n\
    \     */\n    function retrieve() public view returns (string memory){\n     \
    \   return message;\n    }\n}\n```\n\n### 步骤 2：编译并将智能合约部署到开发区块链\n\n编写好智能合约后，使用\
    \ Remix 或 Truffle 编译它。要使用 Remix，只需访问 [`remix.ethereum.org`](http://remix.ethereum.org/)\
    \ 并为上述智能合约创建一个文件。成功编译后，会生成一个应用二进制接口（ABI）文件和字节码文件。字节码文件将被部署到区块链上。ABI 将用于 dApp 客户端与智能合约交互。需要通过点击\
    \ ABI 按钮复制 ABI，并将其保存到客户端代码中。在本示例中，以下 ABI 文件描述了智能合约中定义的函数和变量的格式：\n\n```\n[\n  \
    \  {\n        \"inputs\": [],\n        \"name\": \"retrieve\",\n        \"outputs\"\
    : [\n            {\n                \"internalType\": \"string\",\n          \
    \      \"name\": \"\",\n                \"type\": \"string\"\n            }\n\
    \        ],\n        \"stateMutability\": \"view\",\n        \"type\": \"function\"\
    \n    },\n    {\n        \"inputs\": [\n            {\n                \"internalType\"\
    : \"string\",\n                \"name\": \"messageInput\",\n                \"\
    type\": \"string\"\n            }\n        ],\n        \"name\": \"storeMessage\"\
    ,\n        \"outputs\": [],\n        \"stateMutability\": \"nonpayable\",\n  \
    \      \"type\": \"function\"\n    }\n]\n```\n\n### 步骤 3：部署智能合约\n\n一旦智能合约编译完成，进入部署面板并部署到开发区块链。\n"
