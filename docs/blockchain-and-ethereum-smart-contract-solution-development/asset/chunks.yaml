    # DAO 平台


    用于管理组织或社区的`合约`。DAO 平台提供注册服务，并为成员分配身份。社区中的每个成员都可以提出提案，也可以对提案进行投票。区块链领域已经存在许多 DAO
    平台。事实上，诸如 Compound 和 Uniswap 等许多项目都拥有自己的 DAO 社区和治理代币，用于对社区提案进行投票。


    ## 去中心化保险平台


    去中心化保险平台允许智能合约管理保险服务的注册，提供来自不同来源的保险服务，然后为投保账户管理理赔。例如，如果你想防止因比特币价格暴跌而遭受重大损失，你可以向智能合约发送一笔交易来支付保费作为保险，而供应方会有人接受该保险请求。所有保险条款都通过智能合约记录并强制执行。如果发生意外事件并触发了保险行为，智能合约将执行相应功能并对投保人进行赔偿。


    ## 去中心化 KYC 与身份


    `KYC`（了解你的客户）和身份是用于识别真实人员并收集所需个人信息以符合监管要求的服务与工具。现有诸如 Civic、Hydro、Sovrin 和 uPort
    等项目，为去中心化应用提供去中心化身份服务。在去中心化应用内构建`KYC`功能颇具挑战性。使用第三方`KYC`服务则要容易得多。


    ## 稳定币


    加密货币面临的挑战之一是其波动性。比特币和以太坊的价值波动很大，用它们来代表产品和服务的价值会导致价格不稳定。稳定币是一种在与法定货币挂钩时价值相对稳定的资产。这些稳定币通常是以太坊区块链上的`ERC20`代币。它们通过多种方式保持价值稳定。例如，一种稳定币可以与美元以一对一的比例挂钩。据一些出版物报道，这些稳定币包括
    Gemini Dollar、TrueUSD、USD Coin 等。


    还有其他类型，例如 MakerDAO 的 Dai，它是多种资产的聚合，通过自动销毁和铸造稳定币来控制其价值，使其保持稳定。


    总而言之，以太坊上已经构建了许多大型的去中心化应用，几乎涵盖了所有主要类别。还有一些应用仍在兴起中。小型智能合约项目，例如租赁共享、按需音乐服务和去中心化投票平台，都是可以用智能合约构建的潜在项目。智能合约开发是一个迷人的领域。开发者一旦学会如何编写智能合约，就能发现无限的可能性，去开发革命性的去中心化应用。


    ---


    # 第 6 章：以太坊架构与概述


    ## 搭建智能合约开发环境的工具


    有多种方式可以搭建与以太坊区块链进行交互的环境。图 6-5 展示了各种工具和组件的概览。


    ***图 6-5.** 以太坊区块链的一些基本工具*


    顶层展示了各种类型的以太坊区块链。`Ganache`工具能够生成一个本地单节点的以太坊区块链，便于开发和快速测试智能合约及客户端。开发链允许开发者修改创世文件并启动一个完全可控的区块链。开发者可以在开发链上发行以太币代币，并决定区块链节点的许可名单。测试网是由以太坊社区构建、用于测试目的的公共以太坊区块链。测试网以太币代币可以通过一些公共水龙头获取。它们没有交易价值。'
- fmt: '# Chapter 6 Ethereum Architecture and Overview


    The public mainnet is the production blockchain of Ethereum, and the Ethers have
    value and can be traded in exchanges. In this section, we mention minimal viable
    tool sets including wallet, browser, node client, smart contract IDE, and Web3
    to interact with Ethereum blockchains.


    ## MetaMask: The Simplest Way to Interact with the Ethereum Blockchain


    To get hands-on experience with the Ethereum blockchain, one of the easiest steps
    is to use a wallet to create an account and do some simple transactions of sending
    and receiving crypto tokens. This can be done in Ethereum by using `MetaMask`.
    `MetaMask` is a web extension that can be installed onto a web browser to create
    accounts to interact with Ethereum with the following steps:


    *Step 1: Install the `MetaMask` extension and create crypto accounts*


    Go to [https://metamask.io](https://metamask.io) and install `MetaMask` to your
    web browser such as Chrome or Firefox.


    After the installation, open `MetaMask` and write down the mnemonic passphrase
    of the wallet. The passphrase is 12 English words that are used to represent the
    private key of a wallet. This passphrase needs to be stored securely because it
    is needed to recover the wallet if the `MetaMask` is mistakenly uninstalled or
    the computer system stops working and the `MetaMask` needs to be reinstalled.
    Once you create a crypto account with `MetaMask`, there will be a public address
    for the account. This address is also called the account address and can be used
    to receive cryptocurrency for the account.


    *Step 2: Fund `MetaMask` account*


    Depending on the type of Ethereum blockchain you are connecting with, there might
    be different ways to get the wallet account funded.


    - For development blockchains that are created by developers or through `ganache_cli`,
    there will be some default accounts created and funded. Whoever starts the development
    blockchain will have some Ethers minted automatically in the accounts owned by
    the developer. Developers can import these funded accounts to their `MetaMask`
    wallet.


    - For testnets such as `Rinkeby`, `Kovan`, `Ropsten`, and `Goerli`, the test token
    can be obtained through a faucet. Developers can go to the faucet URL, paste a
    social media message with the wallet account’s public address, and send it to
    the faucet web server. The faucet will then send a small amount of testnet Ether
    to the address specified in the message.


    - For mainnet Ethereum, the Ether needs to be purchased. This can be done by opening
    an exchange account from services such as `Coinbase` and paying with FIAT to get
    Ether.


    *Step 3: Send and receive tokens*


    Once the crypto account is created and funded, users can start sending and receiving
    tokens.


    To send tokens, simply click Send and fill in `Nonce`, receiving amount, and receiver
    address and then click “Send” after verifying information.


    To receive tokens, just give the account address to the sender, and let the sender
    send cryptocurrency to that address.


    ## Etherscan: The Most Comprehensive Blockchain Browser


    When transactions are transported to and executed in Ethereum, they induce Ethereum
    state changes in account balances, blocks, transactions, smart contracts, and
    event logs. The Ethereum blockchain only records raw data in its storage. To browse
    the blockchain and make sense of it, some of the data will need to be processed
    and stored in databases for easy query and visualization. `Etherscan` is a web
    service that provides an excellent Ethereum blockchain browsing experience. To
    use `Etherscan`, simply open any web browser and point the URL to `http://etherscan.io`.


    You can use the `Etherscan` browser to browse every account, smart contract, block,
    and transaction in Ethereum blockchain. For developers who need to use the blockchain
    data programmatically, `Etherscan` also provides API functions and an API key
    to integrate dynamic Ethereum blockchain data into your decentralized applications.'
