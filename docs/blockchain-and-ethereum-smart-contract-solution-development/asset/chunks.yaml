  trans: "\n# 开发区块链（图 7-20）\n\n![图 7-20](img/index-323_1.jpg)\n\n第 7 章：使用 Solidity\
    \ 编写智能合约\n\n**图 7-20.** Remix 智能合约部署面板\n\n此处，`Environment` 应指定 `Web3` 提供者，并指向开发链的端点\
    \ `http://127.0.0.1:8545`。\n\n智能合约成功部署后，将返回一个智能合约地址，显示在屏幕底部，如下所示：\n\n`0x16d29C0A07dcDBe6e1097257Ee39DEe18136d672`\n\
    \n开发者可以复制此智能合约地址，供 Web 浏览器进行交互。\n\n## 第 4 步：编写 Web 客户端与智能合约交互\n\n为了让 Web 客户端与智能合约交互，需要以下几个参数，包括：\n\
    \n- **区块链的 RPC 端点** – 这是区块链的入口。在本例中，它是 `http://127.0.0.1:8545`。诸如 MetaMask 之类的\
    \ Web 钱包需要通过此 RPC 端点连接到区块链。\n- **智能合约的 ABI** – 在智能合约编译时生成。\n- **智能合约地址** – 该地址在智能合约成功部署后返回。\n\
    \n下面，我们提供了一个 HTML/JavaScript 页面来展示与智能合约交互的用户界面。HTML 部分展示了按钮的布局，JavaScript 部分展示了与智能合约交互的脚本代码。\n\
    \n以下展示了 HTML/脚本代码的 Web 用户界面（图 7-21）。\n\n![图 7-21](img/index-325_1.png)\n\n在图形用户界面的左侧，有三个按钮：允许用户连接钱包并获取钱包地址、设置要写入区块链的消息、以及检索消息。右上方是\
    \ MetaMask 的弹出窗口，允许用户签署交易与区块链交互。\n\n**图 7-21.** 与智能合约交互的用户界面示例\n\n下方展示了三个 HTML\
    \ 按钮的代码片段：\n\n`Connect Wallet` 按钮将触发 `enableEthereumButton` 并获取钱包账户地址。\n\n```html\n\
    <DIV class=\"container\">\n  <H1 class=\"display-4\">消息存储</H1>\n  <P>点击连接钱包</P>\n\
    \  <P><BUTTON class=\"btn btn-secondary enableEthereumButton\">连接钱包</BUTTON><BR>\n\
    \  钱包地址:<span class=\"showAccount\"></span></P>\n</DIV>\n```\n\n`Set Message`\
    \ 按钮将触发 JavaScript 中的 `setMessage()` 函数。\n\n```html\n<P>输入一条字符串作为消息</P>\n<DIV\
    \ class=\"cluegene\">\n  <LABEL for=\"cluegene\"><B>要设置的消息</B></LABEL>\n  <INPUT\
    \ type=\"text\" class=\"ignore-form-control\" id=\"cluegene\" placeholder=\"\"\
    \ value=\"[我的消息]\" size=\"20\" required=\"\">\n</DIV>\n<P><A class=\"btn btn-secondary\"\
    \ onclick=\"setMessage()\" role=\"button\">设置消息</A></P>\n```\n\n`Retrieve Message`\
    \ 按钮将触发 `getMessage()` 函数：\n\n```html\n<DIV class=\"row\" id=\"getmessagerow\"\
    >\n  <DIV class=\"col-lg-6 text-center\">\n    <H2>从区块链获取消息</H2>\n    <P>点击检索消息</P>\n\
    \    <P><A class=\"btn btn-secondary\" onclick=\"getMessage()\" role=\"button\"\
    >检索消息</A></P>\n    <DIV id=\"GetMessageValue\"></DIV>\n  </DIV>\n</DIV>\n```\n\
    \n这三个函数在 JavaScript 代码中实现。\n\n为了获取钱包地址，会发送一个 `eth_requestAccounts` 请求，作为以太坊请求来获取\
    \ MetaMask 启用的账户。\n\n```javascript\nasync function getAccount() {\n  const accounts\
    \ = await ethereum.request({ method: 'eth_requestAccounts' });\n  const account\
    \ = accounts[0];\n  account0 = account;\n  showAccount.innerHTML = account;\n\
    }\n```\n\n对于设置消息，按以下工作流程编码：\n\n- `setMessage` 函数首先检查是否安装了 MetaMask。如果已安装，则获取与\
    \ MetaMask 关联的账户。\n- JavaScript 代码使用...创建智能合约对象\n"
- fmt: "### 指定合约地址和 ABI 信息\n`ABI` 可以存放在单独的文件中以便导入。\n\n- **交易的数据打包**：此步骤从输入字段获取要设置的消息，并使用嵌入的\
    \ `encodeABI()` 函数进行打包。\n- **通过 `sendTransaction` 函数发送交易**。\n\n```javascript\n\
    function setMessage() {\n    if (!ethEnabled()) {\n        alert(\"Please install\
    \ an Ethereum-compatible browser or extension like MetaMask to use this dApp!\"\
    );\n    }\n    web3.eth.getAccounts(function(err, accounts) {\n        var myContract\
    \ = new web3.eth.Contract(messagestorage_abi, messagestorage_contract.toLowerCase());\n\
    \        var gene = $('.cluegene input').val();\n        var auctionData = myContract.methods.storeMessage(gene).encodeABI();\n\
    \        var tx_genescience = web3.eth.sendTransaction({\n            from: accounts[0].toLowerCase(),\n\
    \            to: messagestorage_contract.toLowerCase(),\n            data: auctionData\n\
    \        }, function(err, transactionHash) {\n            document.getElementById(\"\
    SetMessageValue\").innerHTML = \"setMessage tx:\" + transactionHash;\n       \
    \ })\n    })\n}\n```\n\n# Chapter 7 使用 Solidity 编写智能合约\n\n## 获取消息函数\n与 `setMessage`\
    \ 函数类似，`getMessage` 函数也会创建一个智能合约对象，并在智能合约中调用 `retrieve` 函数。由于 `getMessage` 是一个不向区块链写入数据的函数，因此可以直接调用\
    \ `call()` 函数。此 `call()` 函数不需要 MetaMask 签署交易，也不消耗 gas 费用。\n\n```javascript\nfunction\
    \ getMessage() {\n    if (!ethEnabled()) {\n        alert(\"Please install an\
    \ Ethereum-compatible browser or extension like MetaMask to use this dApp!\");\n\
    \    }\n    var myContract = new web3.eth.Contract(messagestorage_abi, messagestorage_contract.toLowerCase());\n\
    \    var tx_getmessage = myContract.methods.retrieve().call(function(err, result)\
    \ {\n        document.getElementById(\"GetMessageValue\").innerHTML = \"message\
    \ retrieved:\" + result;\n    })\n}\n```\n\n# Chapter 7 使用 Solidity 编写智能合约\n\n\
    ## 本章小结\n在本章中，我们通过示例、语法、数据结构、函数、事件、客户端应用、安全性、测试、调试和部署，描述了 Solidity 编程。这应该为去中心化应用的基本\
    \ Solidity 编程打下良好的基础。\n\n# CHAPTER 8 安全注意事项\n\n## 引言\n在前几章中，我们已经探讨了 Solidity 智能合约编程的许多方面。我们涵盖了\
    \ Solidity 编程语法，使用 Remix 或 Truffle 编译源代码，以及将字节码部署到嵌入式 EVM 或开发区块链。我们还提到了代币经济和代币设计，例如选择同质化或非同质化代币，以及使用代币来代表业务用例中的资产和元素。\n\
    \n在存储和通信方面，我们讨论了以太坊区块链状态和事件概念的重要性，以及不同的网络，例如主网、Rinkeby 测试网和 Ropsten 测试网。\n\n在架构方面，我们讨论了构建端到端解决方案的方法，包括构建连接到以太坊区块链的区块链节点、部署智能合约、开发\
    \ Web 客户端或移动应用，以及使用 Web3 将客户端与区块链连接起来。\n\n在本章中，我们将介绍以太坊区块链和智能合约的安全性。安全性是软件开发中最重要的方面之一。它在以太坊区块链中扮演着更重要的角色，原因如下图\
    \ [8-1] 所示：\n\n© Weijia Zhang and Tej Anand 2022  \nW. Zhang and T. Anand, *Blockchain\
    \ and Ethereum Smart Contract Solution Development*,  \n[https://doi.org/10.1007/978-1-4842-8164-2_8](https://doi.org/10.1007/978-1-4842-8164-2_8#DOI)\n\
    \n![图 8-1: 区块链安全与传统 IT 安全相比的复杂性](index-331_1.jpg)\n\n### Chapter 8 安全注意事项\n\n\
    ***图 8-1.** 区块链安全与传统 IT 安全相比的复杂性*\n\n- **区块链的去中心化特性** – 任何编写并部署到区块链的代码都将在数千台机器上运行。任何人都可以访问并运行区块链代码。\n\
    - **补丁和可升级性的限制** – 由于区块链的不可变性，已部署的智能合约..."
