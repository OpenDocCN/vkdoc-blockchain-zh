- fmt: "# Token Minting and Distribution\n\nTo handle the minting and distribution\
    \ of the token, this smart contract is sometimes called the crowdsale smart contract\
    \ when used for ICOs. A smart contract for crowdsale normally contains the following\
    \ functions:\n\n- **Ratio of token and ether** – The ratio of ether and the target\
    \ token.\n- **Time of the crowdsale** – The start time and end time when the token\
    \ is available for distribution.\n- **KYC/AML** – The crowdsale can have a white\
    \ list for senders who can participate in the crowdsale.\n- **Refunds** – The\
    \ smart contract can also implement the functions to refund the token.\n\nBesides\
    \ crowdfunding, `ERC20` tokens are extensively used in other decentralized finance\
    \ (DeFi) projects such as Compound for lending, Uniswap for exchanges, and USDC\
    \ for stablecoins.\n\nIn the Ethereum community, there are also some discussions\
    \ on whether the `ERC20` token is a utility token or a security token. These are\
    \ country or state specific and should be consulted with legal professionals.\n\
    \n## Token in NFT\n\nDifferent from `ERC20` tokens, nonfungible tokens (NFT) are\
    \ distinguishable and can be used to represent ownership. For example, birth certificates,\
    \ diplomas, and rental contracts are all nonfungible and have clear ownership.\n\
    \nAn NFT is specified as an `EIP-721` standard to represent:\n- Physical assets\
    \ such as houses, cars, and artwork\n- Virtual collectables such as digital art\
    \ and collectable cards\n- “Negative assets” such as loans and debt\n\nThe detailed\
    \ specification of the `EIP-721` is located in the following URL: [https://eips.ethereum.org/EIPS/eip-721](https://eips.ethereum.org/EIPS/eip-721)\n\
    \nSimilar to the `ERC20` token, the `ERC721` NFT also defines the token name,\
    \ token symbol, and total supply. There are some major differences for the NFT:\n\
    - Each NFT token has an index that is unique.\n- Each NFT token has an owner.\n\
    - Since NFTs can point to a physical or virtual asset outside the blockchain,\
    \ there is an interface `ERC721Metadata` that defines a function called `tokenURL`.\n\
    ```\nfunction tokenURI(uint256 _tokenId) external view returns (string);\n```\n\
    This `tokenURL` function takes an input of `_tokenId` and returns a Universal\
    \ Resource Identifier (URI) that points to an NFT item defined in a conventional\
    \ digital system.\n- Each NFT token can be transferred from one owner to another\
    \ with the following function:\n```\nfunction transferFrom(address _from, address\
    \ _to, uint256 _tokenId) external payable;\n```\n- There are also other functions\
    \ or interfaces that help NFT tokens to be assigned, transferred, or identified.\n\
    \nNFT tokens based on the `EIP-721`/`ERC721` standard have been implemented by\
    \ several projects. For example, 0xcert and OpenZeppelin have implemented `ERC721`\
    \ token smart contract packages. Developers can easily extend the `ERC721` package\
    \ and create their own `ERC721` nonfungible tokens.\n\nFor example, for a college\
    \ to create an NFT for their students’ diplomas, the smart contract can be written\
    \ with the following sample code:\n\n```\n// SPDX-License-Identifier: MIT\npragma\
    \ solidity ^0.7.0;\n\nimport \"https://github.com/OpenZeppelin/openzeppelin-contracts/blob/release-v3.4/contracts/token/ERC721/ERC721.sol\"\
    ;\n\ncontract TTCDiploma is ERC721 {\n    uint private _tokenIds;\n    address\
    \ admin;\n\n    constructor() ERC721(\"TexasTechnologyCollegeDiploma\", \"TTC\"\
    ) public {\n        admin = msg.sender;\n    }\n\n    function issueDiploma(address\
    \ student, string memory tokenURI) public returns (uint256) {\n        require(msg.sender\
    \ == admin); // only admin can issue diploma.\n        _tokenIds++;\n        uint256\
    \ newDiplomaId = _tokenIds;\n        _mint(student, newDiplomaId);\n        _setTokenURI(newDiplomaId,\
    \ tokenURI);\n        return newDiplomaId;\n    }\n}\n```\n\nIn this program,\
    \ the `TTCDiploma` smart contract is written to issue diplomas for students. When\
    \ the smart contract is deployed, the token name and token symbol are provided.\
    \ Also, the smart contract deployment address is assigned as the admin address.\
