- fmt: '# Signatures


    When users withdraw assets from the plasma blockchain, the assets in the plasma
    chain will be burned, and then the assets originally deposited on the layer 1
    chain will be distributed to the target user. To ensure that the burning operation
    and unlock operation are secure, there will be a wait period for the `StartWithdraw`
    function to distribute the funds to the users. This is to ensure that the assets
    in layer 2 are burned before the same value of asset in layer 1 is distributed.
    During this wait period, anyone can challenge this withdrawal by providing proofs
    from the plasma blockchain.


    `ChallengeWithdraw` function that allows any user or operator to provide evidence
    to challenge the withdrawal transaction waiting to be validated: The caller of
    this function needs to provide a withdrawal ID that is challenged and other inputs
    such as Merkle root and proofs that are similar to the `StartWithdraw` function.
    The inputs from `StartWithdraw` function and `ChallengeWithdraw` function are
    compared and validated. If the challenge is successful, then the `StartWithdraw`
    transaction will be voided.


    ## Operators


    Operators connect plasma blockchain with layer 1 root chain. It watches deposit
    events in layer 1 and then generates a new token ID to represent the one in the
    mainnet and then mint the same value of tokens in the plasma chain. Once the new
    token is generated on the plasma blockchain, the depositor owns the token and
    can send the token to any user in the layer 2 chain. Operators will also submit
    plasma blockchain Merkle tree root records to the layer 1 blockchain. Users can
    withdraw their assets to layer 1 using smart contract functions calls on blockchain.
    If the withdrawal is requested in layer 2, the operator will also pass the request
    to layer 1 for processing.


    ## Transactions or Smart Contracts on Layer 2


    In the plasma layer 2 chain, users can send regular transactions among each other.
    The plasma chain can also implement smart contract capability to withdraw assets
    to the layer 1 blockchain. The transactions in the plasma chain are packaged into
    a Merkle tree and saved as a blockchain state. The root of the Merkle is sent
    to the layer 1 chain for record.


    ## Plasma Chain


    Plasma chains can be implemented in various ways. Since the security of the plasma
    chain is coupled with the root chain and receipts of transactions are sent to
    the receiver, plasma chains do not need to have full consensus to ensure security.
    The plasma chain can be implemented in various ways. In one implementation, a
    plasma chain can be implemented as a server that takes user transaction inputs
    and also has a Merkle tree structure or a database to store transactions. The
    plasma chain can also be implemented as a POA (proof of authority) or BFT (Byzantine
    Fault Tolerance) blockchain. In this POA or BFT plasma blockchain, a couple of
    permissioned nodes create a blockchain to accept plasma layer transactions. The
    root of the transaction Merkle tree is then calculated and sent to the root blockchain
    for record and verification. The plasma chain can also be implemented as a POS
    (proof of stake) chain where anyone can run a node by staking an asset to a smart
    contract on the root chain. The assets staked in the plasma chain are to secure
    the plasma chain. If there is a collusion of nodes in the plasma chain, the stakes
    of these nodes get slashed through a smart contract on the root chain.


    ![](index-361_1.png)


    ## Transaction Merkle Tree Example


    Ethereum blockchains leverage the Merkle tree extensively. A Merkle tree is a
    data structure that arranges data/message and its respective hash in a hierarchical
    tree structure to ensure data integrity and processing efficiency. There are multiple
    Merkle trees. A standard Merkle tree is the one that records the elements and
    their hash in a binary tree structure as shown in the following diagram (Figure
    [9-4](#index_split_006.html#p361)):


    ***Figure 9-4.** A standard Merkle tree example*'
