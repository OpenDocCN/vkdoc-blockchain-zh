    ## Task 4: Use the Truffle Console to Interact with Blockchains


    Truffle provides a `console` command to interact with the attached blockchain
    node. There are two types of consoles available. One is a console that is connected
    to a testnet or mainnet blockchain. This console is launched through the following
    command:


    `truffle console`


    Another console is connected to a development blockchain. This console is launched
    through the following command:


    `truffle develop`


    The major difference between a regular console and a development console is that
    a regular console connects to an existing blockchain, while a development console
    creates an embedded blockchain, default accounts, and issued tokens for use by
    the developers.


    # Chapter 6 Ethereum Architecture and Overview


    Once a `Truffle` console is launched, developers can use it to query blockchain
    information, send and receive tokens, and call smart contract functions. To call
    a smart contract function, the following steps are followed:


    - From the console, instantiate a smart contract object from its address and corresponding
    ABI.

    - Get an account from the blockchain.

    - Call the instance smart contract function with a sender account and other parameters.


    The full example can be referenced at the following location:


    [www.trufflesuite.com/docs/truffle/getting-started/interacting-with-your-contracts](https://www.trufflesuite.com/docs/truffle/getting-started/interacting-with-your-contracts)


    Truffle is a very comprehensive and complex system. This section only mentions
    the features needed for compiling, deploying, and testing smart contracts. For
    details, refer to the Truffle office website:


    [www.trufflesuite.com/docs/truffle/quickstart](http://www.trufflesuite.com/docs/truffle/quickstart)


    ## Remix: The Most Convenient Web-Based Smart Contract Development Tool


    Remix is a web-based smart contract programming suite that is very easy to use.
    Remix can run as a browser web page or as a desktop application. To use Remix
    on a browser, simply open the Chrome or Firefox browser and point to the following
    location:


    [https://remix.ethereum.org](https://remix.ethereum.org)


    ![](index-250_1.jpg)


    # Chapter 6 Ethereum Architecture and Overview


    ***Figure 6-6.** Remix compiler*


    There are four sections in the IDE: the icon panel on the left, the side panel
    in the middle, the main panel on the top right, and the terminal on the bottom
    left as shown in Figure 6-6.


    - **Icon panel** – Shows the file explorer, remix plug-ins, plug-in manager, and
    general setup icon.

    - **Side panel** – Shows source code files and GUI for each plug-in when selected.

    - **Main panel** – Shows the source file content for each smart contract. Source
    files can be edited in this panel.

    - **Terminal** – Shows the result of compilation, deployment, and interaction
    with the blockchain. Can also run scripts on this panel.


    # Chapter 6 Ethereum Architecture and Overview


    For the `Remix` web console, you can easily experiment with the following tasks:


    ### Task 1: Set Up and Install Plug-ins


    The `Remix IDE` (integrated development environment) uses component models to
    add basic features and third-party plug-ins to the system. The icon panel by default
    activates and shows three basic components: the file explorer, Solidity compilation,
    and deploy and run transactions. These three components should be sufficient for
    quick smart contract development. For other operations such as debugging, security
    scan, and visualization, developers can click the Plugin Manager icon and select
    the intended plug-in to activate.


    Plug-ins can be activated or deactivated as needed by the developers. The icon
    panel also contains a settings button that can launch a settings page to configure
    the theme of the GUI, the source code editor, access to GitHub, etc. Once plug-ins
    are activated, developers can click each plug-in.'
