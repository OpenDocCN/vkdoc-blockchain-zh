- fmt: '***Figure 9-5.** A Sparse Merkle tree example*


    ## Chapter 9 Layer 2 and Ethereum 2


    For ERC721 NFT token, there is an NFT identifier to represent the `tokenId` to
    represent the index of the token. This `uint32` `tokenId` can be casted to a smaller
    size integer such as `uint32` and `uint64`.


    A Merkle tree can be constructed to represent the `tokenId` of an NFT. In this
    Merkle tree structure, each token is represented by a leaf node. For a `tokenId`
    of size `n` of `uint`, the number of leaf nodes will be `2^n`. For example, the
    `tokenId` of `uint8` will have a leaf number of `2^8=256`. Similarly, the leaf
    numbers for `uint16`, `uint32`, and `uint64` are 65536, 4294967296, and 18446744073709551616,
    respectively.


    The location of the leaf node is equivalent to the `tokenId`. The leaf indexes
    from left to right are arranged from 0 to `(2^n-1)`. The content of the leaf node
    is a `byte32` data that is the hash of a transaction of NFT token. The Plasma
    transaction format is a tuple of `(slot, previousBlock, denomination, owner, hash)`.
    Here, `slot` is the same as `tokenId` that represents the index of the leaf node,
    `previousBlock` is the block number that contains this tokenId’s owner transfer,
    `denomination` is default to 1 for NFT case, `owner` is the new owner for this
    token transfer, and `hash` is a `sha256` or `keccak256` hashing of the other parameters.
