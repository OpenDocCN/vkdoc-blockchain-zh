  trans: "\n例如，`sol2uml` 包是一款多功能工具，可从智能合约源代码生成 UML；它还能获取已部署到以太坊区块链的智能合约的 UML 图。\n\n\
    要安装 `sol2uml`，只需使用 Node 包管理器 (npm) 输入以下命令：\n\n```\nnpm install sol2uml --only=production\n\
    ```\n\n安装 `sol2uml` 后，可根据下方帮助菜单所示，使用各种参数运行它：\n\n```\n$ sol2uml -h\nUsage: sol2uml\
    \ <fileFolderAddress> [options]\n从 Solidity 源代码生成 UML 图。\n如果第一个参数未传入文件、文件夹或地址，\n\
    则使用当前工作文件夹。\n当使用文件夹时，将查找该文件夹及其所有子文件夹中\n所有 *.sol 文件。\n如果传入带有 0x 前缀的以太坊地址，\n则将使用来自\
    \ Etherscan 的已验证源代码。\n\nOptions:\n  -v, --verbose                     运行并输出调试语句\n\
    \  -f, --outputFormat <value>        输出文件格式：svg、png、\n                       \
    \             dot 或 all（默认值：\"svg\"）\n  -o, --outputFileName <value>      输出文件名\n\
    \  -d, --depthLimit <depth>          将被递归搜索的 Solidity\n                      \
    \              文件的子文件夹数量。默认\n                                    值 -1 表示无限制（默认值：-1）\n\
    \  -n, --network <network>           mainnet、ropsten、kovan、\n                \
    \                    rinkeby 或 goerli（默认值：\n                                 \
    \   \"mainnet\"）\n  -k, --etherscanApiKey <key>       Etherscan API 密钥\n  -c,\
    \ --clusterFolders              将合约聚类到源文件夹\n  -h, --help                     \
    \   输出使用信息\n```\n\n要为本地目录中的智能合约生成 UML 图，请输入以下命令：\n\n```\nsol2uml ./contracts\n\
    ```\n\n这里，`./contracts` 是智能合约文件所在的目录。\n\n`sol2uml` 还可以获取已部署到以太坊区块链的智能合约的 UML 文件。例如，要获取\
    \ Ropsten 区块链中特定地址的 UML 图，请运行以下命令：\n\n```\nsol2uml smartcontract_address -n ropsten\n\
    ```\n\n这里，`smartcontract_address` 是已部署到以太坊区块链的智能合约地址。`-n ropsten` 表示这是针对 Ropsten\
    \ 区块链中的智能合约。\n\n为了理解 UML 图，我们使用 USDT ERC20 代币的部分智能合约作为示例。通过在图 7-11 所示的浏览器 URL\
    \ 中输入以下地址，可获取此 UML 图：\n\n```\nhttps://etherscan.io/viewsvg?t=1&a=0xdAC17F958D2ee523a2206206994597C13D831ec7\n\
    ```\n\n![图 7-11. USDT ERC20 代币的 UML 图](img/index-306_1.png)\n\n在此图中，每个方框代表一个智能合约类、一个接口或一个库。\n\
    \n每个方框有多个区域。顶部区域是智能合约名称。然后，变量和函数各自的范围被分组到相应区域，例如 `internal`、`public` 和 `external`。每个区域包含变量名、函数名和参数的列表。\n\
    \n方框之间绘制了带有箭头的线条，以表示实体关系。如果智能合约 A 使用智能合约 B，意味着 B 是 A 的父级，则从 B 到 A 绘制一条有向线。如果实体\
    \ A 是一个抽象智能合约或接口，则绘制虚线而不是实线。\n\n在 Solidity 中，抽象类是一种特殊的智能合约，其中函数已定义但未实现。使用或继承抽象智能合约的合约需要实现那些已定义的函数。此外，接口是特殊的智能合约，其中只定义了函数名。接口中不声明变量。\n\
    \n除了接口，智能合约还可以定义和调用库函数。Solidity 中的库使用 `library` 关键字定义，并具有可被其他智能合约调用的函数。库是无状态的，不能拥有状态变量。\n\
    \n**Solidity 测试**\n\n**Solidity 单元测试：用于测试的 Remix 插件**\n"
- fmt: "\n参考：[https://remix-ide.readthedocs.io/en/latest/unittesting.html](https://remix-ide.readthedocs.io/en/latest/unittesting.html)\n\
    \n`Solidity`拥有一套优秀的工具来提供单元测试或自动化测试。当编写好智能合约源码后，开发者可以编写测试程序来封装智能合约，从而执行自动化测试。诸如`Remix`和`Truffle`等工具都具备测试套件，以帮助编写和执行测试程序。下文将介绍作为`Remix`插件的`Solidity\
    \ Unit Test`。\n\n要激活`Solidity Unit Testing`插件，只需点击插件管理面板，输入`Solidity Unit Testing`进行搜索，然后点击`Activate`按钮激活该插件，如图\
    \ [7-12](#index_split_005.html#p308) 所示：\n\n![](index-308_1.jpg)\n\n***图 7-12.**\
    \ 用于 Solidity 单元测试的插件*\n\n需要注意的一点是，`Solidity Unit Test`插件中的测试文件不支持带参数的函数。对于带有参数的智能合约，应有一个包装测试文件，该文件会从另一个无参数的函数中调用带参数的函数。\n\
    \n要运行`Solidity Unit Testing`，首先点击插件图标打开单元测试面板。然后选择一个目录用于存放测试套件文件。在下面的截图中，选择`unit_test`目录存放测试文件。接着，开发者需要为源码智能合约生成一个测试文件（图\
    \ [7-13](#index_split_005.html#p309)）。\n\n![](index-309_1.jpg)\n\n***图 7-13.**\
    \ 生成 Solidity 单元测试文件*\n\n要为某个源文件生成测试文件，首先在文件视图面板中打开该源码智能合约并使其处于活动状态。然后选择测试文件将存放的目录。点击“Generate”按钮，即可在为视图面板中打开的文件所指定的目录下生成一个测试文件。\n\
    \n一旦生成测试套件文件，它会在文件视图面板中自动打开。该测试套件将包含用于测试源合约的基本代码模板。它包含测试库导入、目标源文件导入以及测试函数桩的代码段。开发者随后可以初始化目标智能合约，模拟对该智能合约的函数调用，并使用内置的逻辑检查函数来断言测试结果。\n\
    \n例如，以下代码展示了如何编写单元测试代码来测试全局变量和局部变量是否相同。源码非常简单。变量`x`在代码开头被声明为全局变量。然后，`x`又在`localVariable`函数中被声明为局部变量。\n\
    \n```\npragma solidity >=0.4.22 <0.9.0;\n\ncontract VariableScope {\n    address\
    \ public x = 0x1f2D3A67B8E96039bbAc84eB4bC0913C0c16778c;\n\n    function localVariable()\
    \ public view returns (address x) {\n        address x = 0x1111111111111111111111111111111111111111;\n\
    \        return x; // Will return 0x1111111111111111111111111111111111111111;\n\
    \    }\n\n    function globalVariable() public view returns (address) {\n    \
    \    return x; // Will return 0x1f2D3A67B8E96039bbAc84eB4bC0913C0c16778c;\n  \
    \  }\n}\n```\n\n单元测试的目的是检查变量`x`在全局作用域和局部作用域中是否相同。为测试此功能，生成并修改了以下测试套件：\n\n```\n\
    pragma solidity >=0.4.22 <0.9.0;\n\n// This import is automatically injected by\
    \ Remix\nimport \"remix_tests.sol\";\n\n// This import is required to use custom\
    \ transaction context\n// Although it may fail compilation in 'Solidity Compiler'\
    \ plugin\n// But it will work fine in 'Solidity Unit Testing' plugin\nimport \"\
    remix_accounts.sol\";\n\nimport \"../variable_scope.sol\";\n\n// File name has\
    \ to end with '_test.sol', this file can contain more than one testSuite contracts\n\
    contract testSuite {\n    VariableScope vs;\n\n    /// 'beforeAll' runs before\
    \ all other tests\n"
  raw: '[https://remix- ide.readthedocs.io/en/latest/unittesting.html](https://remix-ide.readthedocs.io/en/latest/unittesting.html)


    Solidity has a good set of tools to provide unit tests or automatic


    tests. When source smart contracts are written, developers can write test


    programs to wrap around the smart contract to perform automatic tests.


    Tools such as Remix and Truffle all have test suites to help writing and


    executing test programs. In the following, we mention Solidity Unit Test as


    a Remix plug-in.


    To activate Solidity Unit Testing plug-in, simply click at the Plugin


    Manager panel and type in Solidity Unit Testing to search. Then click the


    Activate button to activate the plug-in as shown in Figure [7-12](#index_split_005.html#p308):


    ![](index-308_1.jpg)


    Chapter 7 programming Smart ContraCt with Solidity


    ***Figure 7-12.** Plugin for Solidity unit testing*


    One thing to note is that test files in Solidity Unit Test plug-in will not


    support functions with parameters. For smart contracts with parameters,


    there should be a wrapper test file that will call the functions with


    parameters from another function that does not have parameters.


    To run Solidity Unit Testing, first, click at the plug-in icon to bring up


    the unit testing panel. Then choose a directory to store the test suite files.


    In the following screenshot, a directory of unit_test is chosen for the test


    files. Then developers need to generate a test file for the source smart


    contracts (Figur[e 7-13](#index_split_005.html#p309)).


    ![](index-309_1.jpg)


    Chapter 7 programming Smart ContraCt with Solidity


    ***Figure 7-13.** Generation of Solidity unit test file*


    To generate a test file for a source file, first, open the source smart


    contract and make it active in the file view panel. Then select the directory


    where the test file will reside. Click the “Generate” button to generate a test


    file in the specified directory for the file that is opened in the view panel.


    Once a test suite file is generated, it is automatically opened in the file


    view panel. This test suite will have the basic code template for testing the


    source contract. It has code segments of test library import, target source


    files import, and testing function stubs. Developers can then initialize a


    target smart contract and simulate the function calls for the smart contract


    and then use the built-in logical checking function to assert the test results.


    For example, the following code shows how to write unit test code to


    test if the global variables and local variables are the same. The source


    code is very simple. Variable x is declared as a global variable at the


    beginning of the code. And then x is also declared as a local variable in the


    function of localVariable.


    Chapter 7 programming Smart ContraCt with Solidity


    *pragma solidity >=0.4.22 <0.9.0;*


    *contract VariableScope {*


    *address public x = 0x1f2D3A67B8E96039bbAc84eB4bC0913C0c16778c;*


    *function localVariable() public view returns (address x) {*


    *address x = 0x1111111111111111111111111111111111111111;*


    *return x; // Will return*


    *0x1111111111111111111111111111111111111111;*


    *}*


    *function globalVariable() public view returns (address) {*


    *return x; // Will return*


    *0x1f2D3A67B8E96039bbAc84eB4bC0913C0c16778c;*


    *}*


    *}*


    The unit test is to check if the variable x is the same at the global scope


    and local scope. To test this, the following test suite is generated and


    modified:


    *pragma solidity >=0.4.22 <0.9.0;*


    *// This import is automatically injected by Remix*


    *import "remix_tests.sol";*


    *// This import is required to use custom transaction context*


    *// Although it may fail compilation in ''Solidity*


    *Compiler'' plugin*


    *// But it will work fine in ''Solidity Unit Testing'' plugin*


    *import "remix_accounts.sol";*


    *import "../variable_scope.sol";*


    Chapter 7 programming Smart ContraCt with Solidity


    *// File name has to end with ''_test.sol'', this file can contain*


    *more than one testSuite contracts*


    *contract testSuite {*


    *VariableScope vs;*


    */// ''beforeAll'' runs before all other tests*'
  trans: "\n\n参考：[`remix-ide.readthedocs.io/en/latest/unittesting.html`](https://remix-ide.readthedocs.io/en/latest/unittesting.html)\n\
    \n`Solidity`拥有一套优秀的工具来提供单元测试或自动化测试。当编写好智能合约源码后，开发者可以编写测试程序来封装智能合约，从而执行自动化测试。诸如`Remix`和`Truffle`等工具都具备测试套件，以帮助编写和执行测试程序。下文将介绍作为`Remix`插件的`Solidity\
    \ Unit Test`。\n\n要激活`Solidity Unit Testing`插件，只需点击插件管理面板，输入`Solidity Unit Testing`进行搜索，然后点击`Activate`按钮激活该插件，如图\
    \ 7-12 所示：\n\n![](img/index-308_1.jpg)\n\n***图 7-12.** 用于 Solidity 单元测试的插件*\n\n\
    需要注意的一点是，`Solidity Unit Test`插件中的测试文件不支持带参数的函数。对于带有参数的智能合约，应有一个包装测试文件，该文件会从另一个无参数的函数中调用带参数的函数。\n\
    \n要运行`Solidity Unit Testing`，首先点击插件图标打开单元测试面板。然后选择一个目录用于存放测试套件文件。在下面的截图中，选择`unit_test`目录存放测试文件。接着，开发者需要为源码智能合约生成一个测试文件（图\
    \ 7-13）。\n\n![](img/index-309_1.jpg)\n\n***图 7-13.** 生成 Solidity 单元测试文件*\n\n要为某个源文件生成测试文件，首先在文件视图面板中打开该源码智能合约并使其处于活动状态。然后选择测试文件将存放的目录。点击“Generate”按钮，即可在为视图面板中打开的文件所指定的目录下生成一个测试文件。\n\
    \n一旦生成测试套件文件，它会在文件视图面板中自动打开。该测试套件将包含用于测试源合约的基本代码模板。它包含测试库导入、目标源文件导入以及测试函数桩的代码段。开发者随后可以初始化目标智能合约，模拟对该智能合约的函数调用，并使用内置的逻辑检查函数来断言测试结果。\n\
    \n例如，以下代码展示了如何编写单元测试代码来测试全局变量和局部变量是否相同。源码非常简单。变量`x`在代码开头被声明为全局变量。然后，`x`又在`localVariable`函数中被声明为局部变量。\n\
    \n```\npragma solidity >=0.4.22 <0.9.0;\n\ncontract VariableScope {\n    address\
    \ public x = 0x1f2D3A67B8E96039bbAc84eB4bC0913C0c16778c;\n\n    function localVariable()\
    \ public view returns (address x) {\n        address x = 0x1111111111111111111111111111111111111111;\n\
    \        return x; // Will return 0x1111111111111111111111111111111111111111;\n\
    \    }\n\n    function globalVariable() public view returns (address) {\n    \
    \    return x; // Will return 0x1f2D3A67B8E96039bbAc84eB4bC0913C0c16778c;\n  \
    \  }\n}\n```\n\n单元测试的目的是检查变量`x`在全局作用域和局部作用域中是否相同。为测试此功能，生成并修改了以下测试套件：\n\n```\n\
    pragma solidity >=0.4.22 <0.9.0;\n\n// This import is automatically injected by\
