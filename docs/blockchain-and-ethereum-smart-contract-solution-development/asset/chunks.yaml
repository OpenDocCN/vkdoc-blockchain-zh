    large investment that is theoretically completely defensive and not driving innovation
    and productivity in a firm. This investment has also not prevented firms from
    having high-profile breaches, and a single security breach can cause significant
    economic and reputational harm to a firm, not including job loss for senior executives,
    sometimes including the Chief Executive Officer.


    Indirect costs related to data security are the significant dampening of innovation
    and growth due to the slow and costly process of obtaining all requisite security
    approvals. The indirect consequence also includes the inevitable rules and regulations
    to protect the public from data breaches. By now, we know the unintended consequences
    of rules and regulations.


    In this section, we have discussed at length the economic inefficiencies that
    are inherent in our value exchange systems. Our current systems have benefited
    by technology innovations that have culminated in the standardization and business
    process streamlining from ERP software and the digitization and globalization
    created by the internet and innovations associated with the internet. The current
    systems have not overcome the innate lack of trust among transacting parties,
    leading to the creation of proprietary data stores and business processes, powerful
    fee-charging third parties, and governmental regulations and rules from membership-based
    professional and advocacy organizations. In the next section, we will examine
    at a very high level if blockchain has the potential to positively impact the
    economic inefficiencies in our current exchange systems.


    ## Blockchain''s Potential to Address Current Economic Inefficiencies


    We have not yet described the capabilities of blockchain technology, what underlying
    technologies enable these capabilities, the current limitations of these capabilities,
    or the implementation details of how these capabilities can be harnessed. We will
    elaborate this in the forthcoming chapters in the book. In this chapter, we will
    ask you to take at face value the core capabilities of blockchain that create
    its promise to address the inefficiencies in our current economic system.


    Blockchain creates a *distributed ledger* of cumulative transactions. All transacting
    parties have an authentically identical copy of this ledger, and as transactions
    are consummated, these copies stay in sync and identical. Transacting parties
    do not need to trust each other and can settle transactions *peer to peer* without
    the involvement of third parties. Transacting parties also do not have to share
    information about their identity that will be meaningful outside the context of
    an individual transaction and for parties who are not involved in the transaction
    – blockchain transactions are designed to be privacy preserving through the use
    of *encryption* and *hashing*. Before transactions are consummated and committed
    to the distributed ledger, all transacting parties have to arrive at a consensus.
    This *consensus protocol* is agreed to by all transacting parties, it is well
    understood by them, and it cannot be changed by any centralized authority without
    the agreement of transacting parties. Once a transaction is committed to the distributed
    ledger, it is almost impossible to alter or tamper with this transaction ( *immutable*).
    Transacting parties can create software-based contracts that represent the terms
    for the execution of transactions – these software-based contracts are referred
    to as *smart* contracts.'
