    ## Chapter 2 Overview Of Core Technologies Supporting Blockchain


    With this background on hashing, we will revisit digital signatures. This time
    rather than sending two messages to Marco (one encrypted by Marco''s public key
    and the second encrypted by Helen''s private key), Helen sends the message once
    encrypted with Marco''s public key. Then Helen takes the original message and
    hashes it to get a reduced set of data (also known as a message digest). Helen
    then takes the hashed message, signs it with their private key, and sends it to
    Marco (see Figure [2-9](#index_split_001.html#p69)). By hashing the message, Helen
    has greatly reduced the volume of data that is sent to Marco.


    ***Figure 2-9.** Hashed digital signatures*


    Marco will now take the message they got that was encrypted with their public
    key and decrypt it with their private key and retrieve the original message. They
    will then take the encrypted hashed digital signature and decrypt it with Helen''s
    public key and get the hash of the original message. Next, Marco will take the
    original message (decrypted by their private key) and hash it. When this hash
    matches the decrypted hash, Marco has a foolproof guarantee that Helen was the
    sender of the message.


    The previous discussion shows that hashing can address the limitation of excessive
    amount of data transmission of digital signatures.


    In summary, in this section, we have reviewed symmetric key cryptography and understood
    its limitation related to secure data transmission (parties needed to know each
    other and invest in infrastructure to securely transmit the key). This limitation
    was resolved by asymmetric key cryptography where each party had a public and
    a private key and messages were encrypted by a party''s public key and decrypted
    by the party''s private key, eliminating the need to transmit the key. Asymmetric
    key cryptography itself had a limitation that there was no foolproof guarantee
    of the identity of the sender. This limitation was resolved by digital signatures,
    where two messages were sent, one encrypted by the public key of the recipient
    and the second encrypted by the private key of the sender. Digital signatures
    had the limitation that they doubled the amount of data that needed to be transmitted
    for each message. This limitation was resolved by hashing digital signatures.


    Before concluding this section on cryptography, let''s review three states of
    data – data at rest, data in transit, and data in use – and how data can be secured
    in each of these three states.


    - **Data at rest** means data are stored on a computer or more precisely the nonvolatile
    storage managed by a computer. Symmetric key cryptography is ideal for data-at-rest
    encryption. Storage in laptops, personal computers, and servers used for databases
    are encrypted using symmetric key cryptography. This is what makes it possible
    for us to not worry about data theft when we lose a laptop.

    - **Data in transit** means data are being communicated from computer A to computer
    B using a computer network.'
