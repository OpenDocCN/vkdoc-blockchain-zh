  其效率足以实际用于等离子交易。针对同质化与非同质化代币，已有多种更复杂的默克尔树格式被提出。下文将介绍 `Plasma MVP` 与 `Plasma Cash`。


  ## 第 9 章 第 2 层与以太坊 2


  `Plasma MVP` 使用标准的默克尔树，该树通过 `UTXO` 记录交易并将根哈希提交至根链。Vitalik 提出了以下用于默克尔树叶节点的未花费交易输出（`UTXO`）格式：


  ```

  [blknum1, txindex1, oindex1, sig1, # Input 1

  blknum2, txindex2, oindex2, sig2, # Input 2

  newowner1, denom1, # Output 1

  newowner2, denom2, # Output 2

  fee]

  ```


  该叶节点格式使用两个输入和两个输出。两个输入允许用户合并两个 `UTXO` 以发送至一个地址。两个输出允许用户将部分 `UTXO` 发送给一个用户，并将其余部分发送给另一个用户。在此叶节点格式中，`blknum1`、`txindex1`
  和 `oindex1` 分别表示输入 1 的区块编号、交易索引和输出索引。这唯一标识了交易默克尔树的叶节点。`sig1` 用于签名交易，以确保发送者是 `UTXO`
  的所有者。类似地，`blknum2`、`txindex2`、`oindex2` 和 `sig2` 表示输入 2 的区块编号、交易索引、输出索引和签名。对于输出，`newowner1`
  和 `denom1` 表示分配给新所有者 1 的代币数量。`newowner2` 和 `denom2` 表示分配给新所有者 2 的代币数量。最后，交易中的 `fee`
  是为等离子交易支付的代币数量。


  使用 `UTXO` 格式的默克尔树节点，交易可以被唯一标识，无需遍历默克尔树来查询其他交易。为了进一步提高查询效率，`blknum`、`txindex` 和 `oindex`
  可以合并为一个 `uint256` 整数。


  ### 第 9 章 第 2 层与以太坊 2


  这样，通过以下转换，一个整数即可唯一标识一个 `UTXO` 交易：


  ```

  utxo_index = blknum * 1000000000 + txindex * 10000 + oindex;

  ```


  要从 `utxo_index` 中提取出 `blknum`、`txindex` 和 `oindex`，可使用下列方法：


  ```

  Blknum = utxo_index / 1000000000;

  Txindex = (utxo % 1000000000) / 10000;

  oindex = utxo_index - blknum * 1000000000 - txindex * 10000;

  ```


  通过使用 `UTXO` 格式，`Plasma MVP` 能够在等离子链上高效地使用 `UTXO` 格式记录同质化代币。用户也可以在根链上提取他们的资产或 `UTXO`。要提交提现请求，只需发送一个
  `utxo_index` 以标识 `UTXO` 的位置、交易本身、默克尔根以及签名。智能合约将执行以下操作以将资金分配给根链的新所有者：


  - 检查提现请求的发送者是否与 `UTXO` 的所有者相同。

  - 确保交易已由发送者签名。

  - 验证输出 1 与输出 2 的金额加上交易手续费等于输入 1 与输入 2 的总和。

  - 确保发送者的 `UTXO` 尚未被花费。这需要一些时间来确认。


  一旦所有有效性检查通过，根链上的等离子智能合约将把根链上的资产分配给新所有者。


