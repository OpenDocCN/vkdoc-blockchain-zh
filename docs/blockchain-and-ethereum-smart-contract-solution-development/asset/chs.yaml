- "# 密码学、分布式系统与点对点网络\n\n`密码学`、`分布式系统`和`点对点网络`不仅对于理解区块链实现价值交换所蕴含的巨大潜力至关重要，而且对于理解区块链的设计局限性也必不可少。正是对这种潜力与局限性的理解，对于成功实施区块链应用至关重要，这样才能缓解第一章中所描述的经济低效问题。\n\
  \n## 章节总结/关键要点\n\n本章的关键要点如下：\n\n-   从业务层面理解与`密码学`、`分布式系统`和`点对点网络`相关的技术概念，对于理解区块链非常重要。\n\
  -   静态数据的`密码学`需求可以通过对称密钥加密机制来满足。\n-   传输中数据的`密码学`需求可以通过非对称或公钥/私钥加密机制以及数字签名来满足。\n\
  -   `哈希`是一种与不对称密钥加密结合使用的重要函数，用于优化数字签名中传输的信息量。\n-   `分布式系统`旨在解决现实世界中的复杂性、故障和一致性问题，其目标分别是可扩展性、容错性和有意义的一致性语义。`分布式系统`通过数据分区、复制和共识机制来实现这些目标。\n\
  -   `CAP 定理`假定，分布式系统只能实现以下三个特性中的两个：数据的强一致性、数据的高可用性以及网络分区容错性。\n-   `点对点网络`是一种平等的计算网络，其中所有对等计算机或节点具有同等的权力和相似的功能。\n\
  -   `区块链`是一个计算机的点对点网络，其在可扩展性、可用性、容错性和一致性等多个维度上进行了设计权衡。\n\n在前两章中，我们完成了对区块链经济潜力以及支撑区块链实现的核心技术（`密码学`、`分布式系统`和`点对点网络`）的回顾。在下一章中，我们将开始描述区块链内交易是如何进行的，并从业务层面介绍区块链的功能、分布式账本的概念、各种区块链实现的分类，以及在实施区块链应用时应考虑的一些区块链局限性总结。\n\
  \n## 测验问题\n\n1.  以纯文本`\"PIZZA BY THE BEACH\"`为例，使用`“按字母表偏移 4 位”`算法作为加密技术来生成密文。得到的密文是什么？\n\
