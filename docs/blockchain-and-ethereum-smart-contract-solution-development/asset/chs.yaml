  在实现 Plasma 二层网络技术时存在许多变体。无论是 Plasma 还是状态通道，一层网络都不完全了解二层网络的信息。因此，Plasma 或状态通道的安全性取决于二层网络向一层网络提供证明和交易。这种对二层网络的依赖性限制了状态通道和
  Plasma 的使用范围。


  第三种二层网络技术被称为 Rollup。这与 Plasma 或状态通道有所不同。在二层网络 Rollup 中，交易实际上被重新打包，然后在一层网络区块链上执行。通过
  Rollup，一层网络区块链不再需要向用户或二层网络运营者索要证明和交易数据。下面我们将描述 Rollup 的工作原理。


  ## 二层网络 Rollup


  在前面的章节中，我们讨论了二层网络的状态通道和 Plasma。状态通道的优势在于仅在打开或关闭状态通道时才与一层网络交互。然而，状态通道要求参与者注册到该通道中，并且无法向任意地址发送交易。Plasma
  二层网络通过使用运营者将二层网络交易默克尔树根发送到一层网络存储来解决此问题。但 Plasma 二层网络的局限性在于它依赖二层网络来存储并提供证明和挑战。在本节中，我们将介绍第三种二层网络技术——Rollup。Rollup
  是一种将二层网络中的交易重新打包，并作为批量交易发送到一层网络的技术。批量交易中的参数经过优化，以节省 gas 费用并提升可扩展性。


  目前正在开发两种 Rollup 技术。一种是使用欺诈证明，允许参与者对从二层网络提交到一层网络的交易提出质疑。典型的欺诈证明解决方案被称为乐观二层网络解决方案，例如
  Arbitrum、Polygon 和 Optimism。另一种称为有效性证明，它使用诸如零知识证明之类的验证方法在二层网络和一层网络之间进行交互。有效性证明的二层网络解决方案包括
  zk-rollup、zksync 等。


