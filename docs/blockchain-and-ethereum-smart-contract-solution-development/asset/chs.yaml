  为 Plasma Cash 的叶子节点提供证明的机制与 Plasma MVP 不同。在 MVP 默克尔树中，证明是一个节点哈希列表，可用于与叶子节点一起计算得出根节点哈希。它通常是目标叶子节点或其父节点的兄弟节点哈希拼接而成的列表。而对于
  Plasma Cash，由于



