  天。这拉开了对账拉锯战的序幕。保险公司的数名员工与这家小公司的两名员工召开电话会议，以厘清差异。经过两小时的激烈讨论，双方仍未能理解问题所在。于是，他们决定以电子表格形式交换数据，以呈现各自对情况的专有理解。经过数轮数据交换和多人参与的电话会议，双方最终决定和解，保险公司向服务提供商支付
  150 万美元。双方都不满意。这家小型服务提供商感觉被骗走了 50 万美元，而大型保险公司则感觉被骗走了 130 万美元。双方的信任进一步受损。雪上加霜的是，他们的专有系统仍然不同步，只是被人为地进行了对账。


  我们可以设想更多类似的无谓且徒劳的对账工作示例。请再次注意，数据交换是电子化的，并使用了双方先前商定的协议。问题在于，由于交易双方之间缺乏信任，以及经济体系无法克服这种信任缺失，导致对彼此专有数据缺乏理解。


  ## 第 1 章 区块链的商业和经济动机


  **法规与规则约束** – 正如我们之前所述，一个经济体系若使那些价值存疑的第三方扮演重要角色，并依赖向这些第三方支付的费用来克服信任缺失，则会招致政府出台法规来处理冲突和竞争利益。这些商业法规无一例外地倾向于拥有政治权力的大型企业，并无意中为整个经济价值链带来了低效率。除了政府的法规外，还有许多非政府组织，例如美国医学会（AMA）、美国注册会计师协会（AICPA）和美国律师协会（ABA）（仅列举全球成千上万个此类倡导组织中的三个美国组织），为其成员制定规则和治理准则。虽然这些规则的目的是编纂道德实践，但这些规则之所以必要，再次是因为经济体系本身无法克服交易各方之间固有的信任缺失。这些规则最终成为保护现状的强大力量，增强了最强大成员的影响力，并普遍扼杀了创新。所有这些法规和规则导致价值链整体经济效率低下。除此之外，企业还必须投入人力和资本来建立和维护合规框架，以跟踪所有规则和法规的遵守情况，企业还会因故意或非故意的合规失败而支付罚款。更重要的是，小型企业不得不持续应对因无法控制法规和规则未来可能如何变化而带来的不确定性成本，这扼杀了创新。另一方面，大型企业则承担巨额的倡导和游说费用，以施加影响并争夺一定程度的控制权。为了想象在没有法规和规则约束的情况下可能产生的效率，我们可以看看那些最初免于监管的技术（如互联网）所带来的创新如何刺激了经济生产力。然而，由于互联网本身并未克服交易各方之间固有的信任缺失，我们现在正看到要求加强监管的呼声日益高涨。




  监管，大部分初衷是好的，但历史告诉我们，监管加强的最终后果往往会产生与预期目标相悖的意外结果。


  **欺诈** – 到目前为止，我们所描述的经济体系充斥着收取费用却几乎没有增加价值的第三方，最终扼杀创新并维持*现状*的规章制度，使用专有数据和业务流程进行交易的各方，以及交易各方未能完全理解的、存在含糊之处的交易结算条款。另一种描述我们经济体系的方式是：它复杂且不透明——一个名副其实的黑箱。这为欺诈者、骗子和犯罪分子寻找和利用漏洞提供了理想的环境。欺诈行为对许多行业造成了巨大冲击。例如，医疗保健领域的欺诈估计占医疗保健总支出的
  3%至 10%（Simborg, 2008）；美国商会估计，10%的保险索赔包含某种欺诈行为（Hoyt, 1990）；基于对制造业供应链员工的调查，因组织间供应链欺诈造成的损失中位数估计占公司总收入的
  9%（DuHadway, Talluri, Ho, Buckhoff, 2019）。


  除了前面所述与欺诈相关的明显经济损失外，企业还需要投入人力和资本成本来建立和维护防止欺诈的基础设施，而欺诈的一个间接后果是颁布新的规则和法规来保护公众免受欺诈侵害（我们已经看到了规则和法规的意外后果）。


  **隐私权衡** – 我们当前用于促成交易的经济体系要求所有参与方多次向多方披露其私人数据，而对于这些数据在基础交易结算后如何维护和使用，几乎没有安全保障或控制。因此，数据主权人已经失去了对其数据的控制。尽管已经尝试进行经济研究以量化消费者对其数据的价值评估（Acquisti,
  John, Loewenstein, 2013），但我们尚未发现能够量化数据主权人因失去数据控制权而带来的直接成本的研究。


  数据披露的间接成本包括：各方为保护其数据以及在数据被不当披露时规避责任而相互协商的协议；为建立和维护确保遵守这些协议的基础设施而投入的人力和资本；以及政府为表面上保护客户免受未经授权的数据披露或数据丢失而颁布的法规和规则所产生的通常成本。


  **数据安全风险** – 构成我们经济体系基础的专有数据存储库是黑客入侵和窃取有价值数据的磁石。应用网络安全研究所（IANS）估计，科技公司倾向于将其整体信息技术（IT）预算的
  10.4%用于安全（Williams, 2021）。金融和保险公司以及医疗保健机构的这一比例分别为 9.7%和。




