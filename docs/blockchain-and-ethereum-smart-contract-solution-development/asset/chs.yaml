- "# 第 2 章\n\n这种高吞吐量将以牺牲最终一致性为代价，因此吞吐量将会降低，因为我们无法明确判断区块链中的大多数节点是否已经添加了该区块。由此，可扩展性受到设计权衡的制约。\n\
  \n第一个设计权衡是区块提交到区块链的频率。如果区块提交过于频繁，那么许多节点很可能因网络延迟尚未收到最新区块而不同步。如果区块提交不够频繁，则会降低区块链每秒交易的可扩展性。\n\
  \n第二个设计权衡是区块的大小。如果区块较大，那么区块链的可扩展性将远超区块较小的情况。但区块较大时，通过网络传输所需时间更长，从而引发网络延迟相关的问题，并且许多节点很可能因尚未收到最新区块而不同步。系统设计者在设计区块链应用时应仔细考量这一设计权衡。设计权衡本身并非局限，而是会产生对可扩展性和可信度的约束，进而导致可扩展性受限。目前已提出多种工程解决方案来缓解这一局限。我们将在第[5](https://doi.org/10.1007/978-1-4842-8164-2_5)章中讨论其中部分方案。\n\
  \n## 第三个局限：恶意活动风险\n\n我们将描述的第三个局限是恶意活动风险。这一局限主要关乎公共无许可区块链网络。问题在于：人们是否更倾向于进行非法交易，因为匿名交易使得他们被抓获的可能性更低？普遍观点认为答案是肯定的，并且媒体报道的传闻证据表明情况确实如此。\n\
  \n针对这一局限有两个缓解因素。首先是可追溯性特性，它能对所有交易中交换价值的来源形成广泛的审计追踪。这种溯源可用于追查可疑交易的来源。其次，如果区块链的任何参与者是通过中心化交易所获得其钱包（或私钥/公钥），这些实体需遵守\"\
  了解你的客户\"（KYC）法规，披露密钥与参与者身份的映射关系。\n\n## 第四和第五个局限：变更管理与保密性风险\n\n第四和第五个局限——变更管理与保密性风险，两者均与智能合约相关。一旦交易被提交到区块链，它们便是不可篡改的；即无法更改。代表软件中交易条款的智能合约也会被提交到区块链——要么在其适用的交易（数据结构）中，要么独立提交，然后受这些智能合约约束的交易会引用其所提交的地址。\n\
  \n智能合约一旦提交便不可篡改，由此产生变更管理局限。已提交的智能合约无法更改，既不能修复软件缺陷，也无法根据变化的业务需求进行调整。参与者仅有的补救措施是自愿停止使用有问题的智能合约。已有广为人知的案例表明，这一局限曾导致参与者蒙受经济损失，甚至使参与者退出区块链网络。\n\
  \n一旦智能合约被提交到区块链网络，对于公共区块链而言，所有参与者都能看到这些智能合约。这就造成了商业各方可能泄露信息的局面。\n\n\n\n他们向竞争对手透露了机密的商业条款。虽然这有助于提高透明度，但也可能损害保密性和竞争力。\n\
  \n在某些情况下，智能合约的可见性也可能被市场参与者用作共谋的机制。\n\n例如，请参阅 [www.facebook.com/FOX7austin/videos/four-texas-men-arrested-when-child-porn-website-is-shut-down/427236648217288/](http://www.facebook.com/FOX7austin/videos/four-texas-men-arrested-when-child-porn-website-is-shut-down/427236648217288/)\
  \ 上的新闻报道。\n\n## 第三章 区块链组件与架构\n\n在本节中，我们描述了区块链的五大局限：能源消耗、可扩展性、恶意活动风险、变更管理以及保密性风险。在使用区块链设计商业应用时，应牢记这些局限。\n\
  \n### 章节总结/关键要点\n\n本章的关键要点如下：\n\n-   `交易`是区块链中的基础概念，由一方发起，根据双方商定的条款与条件向一方或多方转移价值。在区块链中，各方通过点对点计算机节点进行交易。每个节点都能独立验证并确认其收到的每一笔交易。\n\
  -   `区块`是有效交易的数据包——区块链中所有节点用来创建区块的过程称为`共识协议`。每个新区块在逻辑上与前一个区块相连，从而形成区块链。共识协议使得一旦区块被添加到区块链中，就很难更改其中的交易。这就是区块链中的区块被认为不可篡改的原因。\n\
  -   区块链维护着各方之间价值转移的审计追踪。这种审计追踪被称为交易的*溯源*。\n-   区块链是一种分布式账本，因为从概念上讲，所有节点都拥有完全相同的区块链副本。新区块可以添加到区块链中，而先前添加的区块无法更改，这使得区块链成为一种仅可追加的分布式账本。\n\
  -   区块链通过仅包含交易各方的公钥来保护隐私——每一方都控制着谁能将其公钥映射到其身份。\n-   `智能合约`将完成交易所需的条款与条件嵌入可执行代码中。\n\
  -   从概念上讲，区块链的四个组件是：分布式账本、隐私保护、共识机制和智能合约。\n-   区块链有四种可能的类型：私有许可链、公有许可链、私有非许可链和公有非许可链。\n\
  -   区块链有五大局限：能源消耗、可扩展性、恶意活动风险、智能合约变更管理以及智能合约保密性。\n\n在前三章中，我们完成了对区块链的经济潜力、支持区块链实现的核心技术（密码学、分布式系统和点对点网络）以及区块链核心组件的概念性描述的回顾。下一章，我们将介绍可用于判断某个商业问题是否需要区块链解决方案的标准、为区块链应用做设计决策的指导方针，以及区块链的示例性应用。\n\
  \n### 侧边栏 – 区块链术语\n\n-   **区块：** 一种数据结构，包含一系列交易和一个区块头。\n-   **区块链：** 一种将区块链接在一起的数据结构。\n\
  -   **交易：** 一种数据结构，编码了关于各方之间支付转移的信息。\n\n\n\n包括该转移的条款和条件。\n\n-   **分布式账本**：区块链中的数据，复制在点对点网络架构中连接的计算机上。\n\
  -   **不可篡改性**：一旦交易被包含在区块中且该区块已添加到区块链，更改交易中任何信息的难度。\n-   **来源**：在任何交易中花费的资金的可审计追踪。\n\
  -   **隐私性**：控制交易参与方身份信息可用性的能力。\n-   **挖矿**：为解决加密谜题以创建要添加到区块链的区块的过程。\n-   **智能合约**：为完成交易而对条款和交易进行编码的软件。\n\
  \n## 第 3 章 区块链组件与架构\n\n**测验题**\n\n1.  从概念上讲，区块链的四个组件是什么？\n2.  所有参与交易的相关方创建新区块的过程称为什么？\n\
  \    a. 隐私保护\n    b. 共识协议\n    c. 验证\n    d. 确认\n3.  判断题：一旦区块被添加到区块链，修改其中的交易非常困难。\n\
  4.  在区块链中难以更改交易的性质称为什么？\n    a. 来源\n    b. 不可篡改性\n    c. 计算复杂性\n    d. 可扩展性\n5.\
  \  在连续的区块链交易中，对交换价值的审计追踪称为什么？\n    a. 来源\n    b. 价值链\n    c. 链表\n    d. 智能合约\n\n\
  ## 第 3 章 区块链组件与架构\n\n6.  简要描述区块链与数据库的不同之处。\n7.  解释“区块链是一种保护隐私的交易账本”的含义。\n8.  以下哪项不是区块链的限制？\n\
  \    a. 可扩展性\n    b. 能源消耗\n    c. 非法活动\n    d. 数据丢失\n9.  与智能合约相关的两个区块链限制是`_____________`和`____________________`。\n\
  10. 以下哪项不是区块链中过度能源消耗的驱动因素？\n    a. 冗余计算\n    b. 共识机制\n    c. 网络通信\n11. 简要解释私有区块链和公有区块链的区别。\n\
  12. 简要解释许可型区块链和非许可型区块链的区别。\n\n## 第 3 章 区块链组件与架构\n\n**参考文献**\n\nSong, J. Why blockchain\
  \ is hard. May, 2018\\. [`jimmysong.medium.com/why-blockchain-is-hard-60416ea4c5c`](https://jimmysong.medium.com/why-blockchain-is-hard-60416ea4c5c)\n\
  \nGupta, M. Blockchain for dummies. 2017\\. John Wiley & Sons, Hoboken, NJ\n\n##\
  \ 第 4 章 区块链商业应用\n\n使用区块链技术开发的应用程序有潜力带来生产力的阶跃式提升。然而，并非所有业务问题都需要区块链解决方案。区块链应用比传统应用构建起来更复杂，只有在业务问题需要时才应构建。\n\
  \n**引言**\n\n尽管区块链应用程序在商业和社会方面前景广阔，它们归根结底是技术部署。从 20 世纪 70 年代末采用关系数据库管理系统，到 20 世纪\
  \ 90 年代采用企业资源规划应用程序，再到当前正在进行的数字化转型，我们学到了关于技术部署的几个经验。这些经验包括以下关键成功因素的重要性：\n\n1.  清晰理解、阐述和管理业务成果或业务成效\n\
  2.  高层管理者的支持以及对变革管理的持续关注，以建立和维护对技术的支持和热情\n\n© Weijia Zhang and Tej Anand 2022  \n\
  W. Zhang and T. Anand, *Blockchain and Ethereum Smart Contract Solution Development*,\n\
  \n\n\n"
- "# 第 4 章 区块链商业应用\n\n- [`doi.org/10.1007/978-1-4842-8164-2_4`](https://doi.org/10.1007/978-1-4842-8164-2_4#DOI)\n\
  \n部署工作需覆盖所有受影响的管理层级和个人。  \n3. 对技术部署工作进行灵活管理，以控制预算、范围、时间线及质量。\n\n这些因素依然是区块链应用的关键成功要素。如果非要说有什么变化，那就是它们如今更加重要，同时也更难以实现。对于区块链应用而言，分析单元从单个公司（或企业、组织）转移到了企业所处的整个价值链生态系统，包括其竞争对手、供应商、合作伙伴和客户。我们不再需要关注对单个企业至关重要的业务成果（如库存周转率、劳动生产率、客户留存率和客户份额），而是需要关注与整个价值链相关的业务成果，例如整体行业生产率和盈利能力。此外，那些易于实现（即相对容易衡量和达成）的财务成果，例如月末财务处理耗时、客户付款回收周期以及营运资本金额，对于区块链网络而言已不再适用。\n\
  \n为了管理这三个关键成功要素，以往在仔细分析差异化影响和可行性之后，选择合适的技术解决方案来解决业务问题也同样重要。对于区块链应用而言，这一点依然如此。图 4-1\
  \ 展示了一个行业或整个价值链生态系统在衡量每个因素时，我们建议考虑的差异化影响和可行性评估因素。\n\n![](img/index-128_1.png)\n\n\
  **图 4-1.** 评估技术部署差异化影响和可行性的因素。\n\n在初步分析中，我们建议对每个差异化影响因素进行高、中、低三个层级的描述。所有因素与差异化影响均呈直接关系；也就是说，高收入影响意味着高差异化影响。跨所有因素汇总后，技术方案的总体差异化影响将是各因素中的最高描述等级。对于实施可行性分析，我们同样建议对每个因素进行高、中、低三个层级的描述。除业务流程变更外，所有因素均与实施可行性呈直接关系。业务流程变更与实施可行性呈反向关系；也就是说，当评估认为业务流程变更程度较高时，实施可行性就会较低。跨所有因素汇总后，技术方案的总体实施可行性将是各因素中的最低描述等级。基于此分析，我们建议选择那些差异化影响高且实施可行性高的方案。如果没有任何方案符合此特征，那么我们的建议是调整方案的范围，直至达到此特征。\n\
  \n在本章中，我们将首先讨论仅适用于区块链应用选择和设计的标准，从评估区块链对于解决业务问题是否必要开始。最后，我们将通过描述区块链在金融、医疗、供应链和娱乐领域的应用实例来结束本章。\n\
  \n## 区块链是否必要？\n\n在本节中，我们将描述可能需要区块链技术来解决的业务问题类型。\n\n我们首先审视该业务问题是否与[第 1 章](https://doi.org/10.1007/978-1-4842-8164-2_1)中描述的经济低效问题相关，而区块链恰有潜力解决这些问题。该业务问题是否涉及以下七个机会中的一个或多个？\n\
  \n\n\n1. **交易结算时间**\n\n2. **为非增值活动向第三方支付的费用**\n\n3. **与数据相关的重复性工作、返工及对账工作**\n\n\
  4. **政府法规及其他非政府规则施加的限制**\n\n5. **高发的欺诈行为**\n\n6. **价值交换过程中的隐私泄露**\n\n7. **数据安全风险**\n\
  \n系统设计人员可以分析一个业务问题，判断其是否涉及上述七种经济低效现象中的多种情况；若存在，则可进一步分析区块链的适用性。或者，系统设计人员可以研究特定行业，判断其中是否存在上述七种经济低效现象中的多种情况，并识别出适用于区块链的应用业务场景.1。\n\
  \n判断是否需要使用区块链的下一步，是将业务用例分析与七种经济低效现象相结合，并评估解决方案设计是否可归入与区块链网络能力相符的三大应用主题之一。这三大应用主题如下：\n\
  \n1. **支付** – 第一个应用主题涉及多方之间跨越地理边界的数字化支付。这些支付可能涉及可替代或不可替代的实物或数字资产转移。可替代资产是指所有资产价值等同，而不可替代资产则指每个资产都具有唯一性。\n\
  \n2. **透明度** – 第二个应用主题涉及在价值交换的多方之间建立透明度和可见性，此类交换可能跨越地理边界及不同的司法管辖区。透明度和可见性可体现在业务流程进度状态、产品与服务属性、财务预测或各方共享数据的溯源信息方面。\n\
  \n3. **数据主权** – 第三个应用主题涉及保护道德和法律上属于主权个体的数据所有权和控制权。控制权涵盖两个维度：准确性的确认与访问权限的授予。访问权限可授予只读、读写、有限期或永久托管权限，并可针对全部数据或仅部分数据组件。\n\
  \n正如一个业务案例可能同时解决七种经济低效现象中的多种问题一样，它的解决方案设计也可能需要整合一个或多个应用主题。只要能够将应用功能进行拆解，并应用与三大主题相关的设计模式，系统设计便可实现可控管理。\n\
  \n然而，我们不应仅凭所解决的经济低效现象和显现的应用主题来判断区块链的适用性。正如前一章所述，任何区块链应用都是分布式系统解决方案，都需要谨慎的设计权衡。这使得区块链应用的开发成为一项复杂的工作。与构建区块链应用相比，使用集中式数据库甚至分布式数据库构建应用会相对简单。我们推荐的最后一项分析，是对区块链应用所支持的底层交易进行分析。该分析以流程图形式呈现，如图\
  \ 4-2 所示。此流程图改编自 Wust 和 Gervais (2018) 的研究。\n\n![](img/index-132_1.png)\n\n***图\
  \ 4-2.** 基于交易分析确定区块链解决业务问题的适用性*\n\n流程图中的第一个测试提出了一个问题：该系统的解决方案是否……\n\n\n我们正在考虑的业务问题是否需要交易账本；也就是说，系统是否会创建代表价值交换的交易记录，其价值定义方式与第[1](https://doi.org/10.1007/978-1-4842-8164-2_1)章（货币、商品、服务、数据）中定义的方式相同？如果这个问题的答案是否定的，那么我们可以确定该业务问题不需要基于区块链的系统解决方案。\n\
  \n如果需要交易账本，那么我们就进入流程图中的下一个测试。这个测试提出的问题是：是否有多方需要向交易账本写入数据？如果只有一方需要写入交易账本，那么该问题的答案就是“否”，此时我们可以确定，基于区块链的解决方案所带来的好处不会超过开发该方案所需的成本与复杂性。如果确实需要多方写入交易账本，那么答案就是“是”，我们就需要进入流程图中的第三个测试。\n\
  \n## 第 4 章 区块链业务应用\n\n第三个测试提出的问题是：是否存在受信任且方便的第三方，且该第三方能被所有参与价值交换的各方所接受？\"受信任\"和\"\
  方便\"这两个词可能具有主观性，因此我们稍作进一步的限定。要使此测试的答案为“是”，整个价值链生态系统中所有参与价值交换的各方都应给出肯定的回答。这有助于解决冲突，例如某个第三方被价值交换中较强势的一方信任，但未被其他方信任。方便性可以根据收取的费用和提供的服务来进一步明确。所有各方都应认为收取的费用可以接受，并且与第三方提供的服务相称。如果这个问题的答案是“是”，那么我们可以确定，基于区块链的解决方案所带来的好处不会超过开发该方案所需的成本与复杂性。如果第三个测试的答案为“否”，那么我们就进入流程图中的第四个测试。\n\
  \n第四个测试提出的问题是：我们的业务问题是否会导致一个系统设计，其中所有需要向交易账本写入数据的各方都是事先已知的？如果并非所有各方都事先已知，那么采用基于区块链的解决方案几乎肯定会带来好处。此外，我们需要一个无许可区块链来实现该系统解决方案。如果所有需要向交易账本写入数据的各方都是事先已知的，那么我们就进入流程图中的第五个测试。\n\
  \n第五个测试提出的问题是：所有预期要向交易账本写入数据的已知各方是否都可信？与第三个测试中的问题类似，这个问题也具有主观性。我们将参照限定第三个问题的方式来限定这个问题。要使此测试的答案为“是”，整个价值链生态系统中所有参与价值交换的各方都应给出肯定的回答。如果所有各方都信任其他需要写入交易账本的各方，那么该问题的答案就是“是”，此时我们可以确定，基于区块链的解决方案所带来的好处不会超过开发该方案所需的成本与复杂性。如果所有预期要写入交易账本的各方并非都可信，那么采用基于区块链的解决方案几乎肯定会带来好处。此外，我们需要一个许可区块链来实现该系统解决方案。接着我们进入流程图中的第六个测试，以确定最合适的许可区块链类型。\n\
  \n第六个测试提出的问题是：写入交易账本的交易是否需要公开验证。公开\n\n\n"
- '# 排版后的文本


  验证意味着交易中的所有参与方都需要能够查看交易，并知晓这些交易已被提交至区块链网络。如果需要公开验证，则必须确保交易方的隐私得到保护，使其能够在区块链上匿名进行交易。因此，我们应当选择公有许可区块链。若无需公开验证交易，则私有许可区块链即可满足需求。


  我们建议仔细遵循此流程图及其相对简单的测试项，以判断业务问题是否需要区块链。此外，如果使用区块链可能带来益处，该流程图还有助于确定最适合解决业务问题的区块链类型。提前完成这一步骤至关重要，因为我们需要做出的设计权衡会随我们认定的最优区块链类型而变化。


  在下一节中，我们将回顾使用区块链实现应用时需要作出的设计决策。


  ## 区块链应用设计决策


  开发基于区块链的应用是一项复杂的工作，需要以公平和民主为根基，协调各方利益相关者达成共识，同时还要做出看似简单却能产生广泛影响的技术决策。在本节中，我们将逐一探讨我们认为对所有基于区块链的应用都至关重要的设计决策。本节将讨论七项设计决策：交易、代币、智能合约、数据、共识机制、利益相关者组织以及开发技术栈。这七项设计标准并非相互独立——对某一项标准的决策可能会限制或影响其他标准的设计决策。


  许多设计决策还需参考所要解决的经济低效问题、区块链应用的主题以及正在实施的区块链类型——这些内容已在章节前文讨论过。最后，此处列出的七项设计标准并不详尽，每个区块链应用都需要根据其创建目的和所解决的业务问题，进行额外的特定设计决策。


  - **交易** – 这项设计决策要回答的问题是：“区块链将要促进的交易语义是什么？”


  在本书至今的示例中，我们描述过诸如漫画书销售的付款、银行存款以及银行利息存入等交易。因此，交易是价值交换的基本构建单元。我们都凭直觉理解付款交易——即某种形式的货币在双方之间转移。我们也可以将交易视为其他类型数字资产在双方之间的转移，或是实物资产在各方之间的某种数字表示形式。我们同样可以将某种权利的数字化表示转移视为一项交易。例如，一项交易可以代表授予对某组数据的访问权限。我们还可以将提供调查问卷答案的行为视为交易，其中我们的答案代表了向另一方转移价值（以我们的知识或见解的形式）。


  因此，交易引出了如下问题：“交易中的价值体现在何处？”“该价值如何显现？”“价值将如何以数字形式表示？”在下一个设计决策中，我们将讨论代币的概念，这有助于回答这些问题。这些问题的答案将决定区块链的底层经济原理。


  最后，我们用“价值从一方转移到另一方”来描述交易——这是一种单向转移。




  '
- '# 值的转移


  值的转移是一个双向过程。从第 1 章中我们知道，值的转移是一个双向过程。当我们为商品或服务付款时，我们期望根据我们在同意付款金额时产生的预期，收到所述的商品或服务。同样，当我们向银行账户存款时，我们期望根据我们在开立银行账户（又是一笔交易！）或向账户存款时同意的条款，收到存入我们账户的利息。因此，我们可以看到有多种类型的交易，并且交易之间的关系对于我们理解交易整体的业务含义和价值至关重要。这就需要我们设计嵌入链接在相关交易之间，以便能够重建交易的业务含义。


  在其最简单的形式中，交易是一种价值的交换，但正如你所见，要创建能解决当前系统中经济低效问题的应用程序，交易语义确实会变得更加复杂。


  - **代币（`Tokens`）**——在很高的层面上，代币是将被交换的价值单位的数字表示。对于任何区块链应用程序，我们都应该理解代币在应用程序中的作用、所需代币的类型（一种类型或多种类型）、将生成的代币数量、生成代币的过程（包括生成频率），以及各方将如何感知和确定代币的价值。²
  理解生成代币的成本和激励措施也很重要。


  一些最著名（尽管并非总是被充分理解）的代币是加密货币，例如比特币（`Bitcoin`）和以太币（`Ether`），它们对应于两种不同的区块链实现：比特币和以太坊。我们将在下一章详细回顾比特币，并对以太坊进行简要概述。以太坊将在本书的第二部分进行完整描述。比特币和以太币代币也被称为原生代币，因为它们是通过构成区块链实现的软件执行而在区块链上创建的。


  ² 代币价值的最终确定可能与市场情绪相关，并基于各种有形的和无形的以及内生的和外生的因素。


  在 Tapscott 和 Tapscott（2018）提供的代币分类法中，他们将以太坊描述为一种协议代币，因为它可以通过智能合约用于创建其他类型的衍生代币，用于分布式应用程序（`dApps`）。这些衍生代币可以是代表股票、债券和其他金融资产的安全代币。衍生代币也可以是自然资产代币，代表可以交易的碳、空气、水、土地以及其他自然资源资产。Freni、Ferro
  和 Moncada（2020）对代币分类法进行了文献综述，然后提出了他们自己的分类法。Ankenbrand、Bieri、Cortivo、Hoehener 和 Hardjono（2020）描述了用于对代表加密和非加密资产的代币进行分类的
  14 个属性。Tapscott（2020）发表了对代币分类框架（`Token Taxonomy Framework`，简称`TTF`）的审查，这是一套由 InterWork
  Alliance（`IWA`）³ 创建的标准，定义了构成代币的各种工件。`IWA`是一个非营利性的会员制组织。


  ³ [`interwork.org/frameworks/token-taxonomy-framework/`](https://interwork.org/frameworks/token-taxonomy-framework/)。`IWA`于
  2021 年与全球区块链商业委员会合并 – [`gbbcouncil.org/membership/`](https://gbbcouncil.org/membership/)


  在本书中，我们将描述两种我们认为与应用程序开发相关的代币分类。




  '
- '# 代币分类


  第一种分类将代币划分为原生代币与非原生代币。原生代币由区块链网络的共识机制生成，它们本身就是数字资产的代表形式。其价值由市场驱动，基于认知和情绪，不一定与任何其他实体或数字资产挂钩。


  目前有人提出借鉴公司估值的方法来对原生代币进行估值。总体而言，存在两种估值方法论：技术分析与基本面分析。简单来说，技术分析方法依赖趋势、历史估值以及市场对事件的历史反应来评估公司（或公司股票）。基本面分析方法则依赖每股收益、收入、利润率、增长率以及人均收入等指标来评估公司。需要注意的是，这些方法并非精确科学，不同的人可能使用相同的基础指标和趋势得出不同的估值结果。


  运用基本面方法论，原生代币（加密货币）的估值基于交易数量、用户数量以及执行共识机制的节点集中度/分散度等指标。我们认为，这些指标与互联网公司在互联网泡沫破裂前早期的估值指标相似。我们建议应对此类估值方法持一定程度的怀疑态度。由于交易的匿名性，这些方法所依赖的许多指标很容易被操纵。加密资产或加密货币的估值仍处于非常初级的阶段。


  非原生代币来源于原生代币。非原生代币映射到实体资产或其他数字资产，其价值源于所映射的资产。当开发企业级区块链应用时，我们关注的是将要映射到资产或交换支付货币的非原生代币。非原生支付代币的一个具体例子是稳定币。稳定币的价值映射到一种或多种国家法定货币。


  '
- "# 第 4 章：区块链商业应用\n\n第二种分类将代币划分为同质化代币与非同质化代币（NFT）。同质化代币可以相互兑换，且面额相同的两个代币具有同等价值。美元就是一种同质化代币——我口袋里的十美元钞票可以与你口袋里的十美元钞票互换，因为两者价值相同。NFT\
  \ 则是独一无二的资产；也就是说，每个 NFT 都是唯一的。一个 NFT 不能与另一个 NFT 互换。区块链上的 NFT 本质上就是一段无法更改的“数据块”，其所有权可以被验证。NFT\
  \ 的所有权可以交换（通常需要支付对价），这笔支付则代表了赋予该 NFT 的价值。我们可以将 NFT 视为一种防止艺术品、纪念品或任何个人认定为艺术品的东西被伪造的机制.4。\n\
  \n我们以指出代币监管取决于其解释方式作为本次讨论的结尾。如果代币被视为证券，那么在美国，它属于证券交易委员会（SEC）的管辖范围。如果代币被视为商品，那么在美国，它属于商品期货交易委员会（CFTC）的管辖范围。同样，根据代币的用途和解释方式，多个其他监管机构也可能参与其中\
  \ 5。代币监管是区块链系统设计者在设计应用时应关注的领域，并需牢记该监管尚处于萌芽且不断发展的阶段。\n\n\n\n4. 请参阅使用以太坊创建 NFT 的分步指南：[www.wsj.com](https://www.wsj.com/articles/i-gave-my-mom-a-crypto-wallet-a-simple-guide-to-nfts-blockchain-and-more-11639404001?st=sweoi7bt6baes4o&reflink=desktopwebshare_permalink)\
  \  \n   [com/articles/i-gave-my-mom-a-crypto-wallet-a-simple-guide-to-nfts-](https://www.wsj.com/articles/i-gave-my-mom-a-crypto-wallet-a-simple-guide-to-nfts-blockchain-and-more-11639404001?st=sweoi7bt6baes4o&reflink=desktopwebshare_permalink)\
  \  \n   [blockchain-and-more-11639404001?st=sweoi7bt6baes4o&reflink=desktopweb](https://www.wsj.com/articles/i-gave-my-mom-a-crypto-wallet-a-simple-guide-to-nfts-blockchain-and-more-11639404001?st=sweoi7bt6baes4o&reflink=desktopwebshare_permalink)\
  \  \n   [share_permalink](https://www.wsj.com/articles/i-gave-my-mom-a-crypto-wallet-a-simple-guide-to-nfts-blockchain-and-more-11639404001?st=sweoi7bt6baes4o&reflink=desktopwebshare_permalink)\n\
  \n5. [www.globallegalinsights.com/practice-areas/blockchain-laws-and-](http://www.globallegalinsights.com/practice-areas/blockchain-laws-and-regulations/usa)\
  \  \n   [regulations/usa](http://www.globallegalinsights.com/practice-areas/blockchain-laws-and-regulations/usa)\
  \ 和 [www.lw.com/thoughtLeadership/gli2021-blockchain-](http://www.lw.com/thoughtLeadership/gli2021-blockchain-crypto-not-in-kansas-anymore-)\
  \  \n   [crypto-not-in-kansas-anymore-](http://www.lw.com/thoughtLeadership/gli2021-blockchain-crypto-not-in-kansas-anymore-)\
  \ 是了解代币监管环境的两个优秀资源。\n\n## 第 4 章 区块链商业应用\n\n- **智能合约** – 到目前为止，我们看到交易代表了价值交换的语义，而代币代表了价值交换的单位。智能合约是交换条款的可执行软件表示。之前，当我们描述银行存款将导致利息存入账户时，正是与存款关联的智能合约决定了利率和利息支付的频率。区块链应用设计人员的设计问题是确定需要多少个智能合约、每个智能合约的逻辑，以及开发、验证和测试智能合约的流程。不同的区块链实现为其智能合约提供了不同的编程语言和不同的开发工具。在下一章中，我们将简要概述以太坊智能合约的开发工具。在本书的第二部分，我们将深入讨论使用以太坊的分布式应用开发。\n\
  \n智能合约存在两个复杂之处。这两个复杂之处都会影响智能合约中编码的业务逻辑的复杂度。第一个复杂之处与执行智能合约所需的计算能力有关。一般来说，更复杂的智能合约可能包含复杂的循环和多层嵌套的条件逻辑。由于每个区块链节点都会执行智能合约，因此节点为之消耗算力和电力的当事方需要提供补偿。逻辑复杂的智能合约可能会成本高昂。例如，如果用于计算存款利息的智能合约非常复杂，那么银行账户所有者和/或银行将不得不为智能合约的执行付费，从而降低其经济利益。\n\
  \n第二个复杂之处在于，一旦智能合约被提交到区块链，就无法更改。智能合约内的逻辑越复杂，我们的测试和验证过程未能发现所有软件缺陷的概率就越大。任何残留的软件缺陷都可能导致财务或安全漏洞。Mehar\
  \ 等（2019 年）对一个旨在实现某功能的以太坊智能合约中的缺陷进行了批判性分析。\n\n\n\n"
- '# 去中心化自治组织（DAO）


  这导致数百万美元以不符合智能合约开发者意图的方式被提取。最终，解决这一缺陷导致了以太坊社区的分裂。


  对区块链应用而言，对智能合约进行审慎、周密且精简的设计，并辅以勤勉的开发、测试和验证流程，是极其重要的。在公共无许可区块链网络中，相关风险比在私有许可区块链网络中更高。


  '
- "# 第 4 章 区块链商业应用\n\n- **数据**——可以轻率地说，任何区块链都不过是受密码保护的数据比特和字节。这种说法是正确的，它意味着区块链的大部分价值源于对这些数据赋予的含义和做出的解释。因此，支持区块链的数据结构（或数据模型）的设计，是区块链系统设计者需要重点考虑的设计因素。\n\
  \n除了要设计与所解决的商业问题高度吻合的数据模型，并确保所有利益相关者都能清晰理解该模型之外（这是所有应用设计者都需要面对的设计问题），区块链系统设计者还必须应对区块链特有的三个设计挑战。\n\
  \n第一个设计挑战涉及确定哪些数据将存储在区块链上（链上），哪些数据将存储在链下。链上数据就是分布式账本，它会在区块链网络的每个节点上复制。链上数据的大小是驱动节点可扩展性（每秒交易数）和数据一致性的因素之一。它也会驱动每个节点将产生的计算成本。因此，我们应该只将绝对必要的数据存储在区块链上。请记住，这一设计决策仅适用于正在开发自有区块链实现、或使用诸如\
  \ `Hyperledger` 等私有许可区块链的系统设计者。对于使用 `Ethereum` 构建的应用，链上交易数据结构是预先确定的（且内置的）。对于基于 `Hyperledger`\
  \ 的区块链应用，隐私相关的法规应成为判断数据是否存储在链上的考量因素之一。正如我们所看到的，数据一旦提交到链上，就极难（几乎不可能）将其移除。如果个人身份信息（PII）或个人健康信息（PHI）存储在区块链上，那么遵守赋予客户删除其数据权利的隐私法律将不可能实现。\
  \ 6,7\n\n第二个设计挑战涉及确定链下数据将如何存储和管理以及存储在何处。如果链下数据是中心化的，那么这可能会破坏应用与信任相关的目标——我们如何信任不在区块链上的数据？这就是所谓的“预言机”问题（Caldarelli，2020）。一种更受青睐的存储链下数据的方法是使用诸如\
  \ `IPFS` 这样的分布式文件系统（Huang，Lin，Zheng，Zheng，and Bian，2020）。8\n\n第三个设计挑战是集成或链接链下数据与链上数据的机制。这种集成通常通过智能合约实现。“预言机”问题通过智能合约访问现实世界权威数据的需求体现出来。\n\
  \n---\n\n6 对于公共无许可区块链而言，这并非问题，因为公钥（至少目前）不被视为个人身份信息。  \n7 在区块链上加密的个人身份信息或个人健康信息对隐私法规的影响尚不明确。\
  \  \n8 更多信息请访问 [www.ipfs.io](http://www.ipfs.io)。\n\n\n\n数据（`data`）。例如，在我们之前描述的智能合约中，银行存款会产生利息，我们需要知道利率。如果这个利率是基于联邦基金利率[⁹]的浮动利率，那么我们需要与能够提供此信息的外部数据源进行集成。\n\
  \n- **共识（`Consensus`）** – 使用私有许可区块链的区块链应用的下一个设计挑战是确定最适合解决所涉业务问题的共识机制。\n\n在诸如`Hyperledger`这样的私有许可区块链应用平台中，共识机制是可插拔的。系统设计者常用的一种共识机制是让拥有区块创建权限的多数节点明确验证一个区块——这不需要解决谜题。在此基础上可以有多种变体。\n\
  \n如果你使用的是公有（许可或无许可）区块链平台，那么共识机制已经为你确定。总体而言，与私有区块链的共识机制相比，公有区块链需要计算上更加稳健的共识机制（如果你的身份已知，那么共谋并破坏区块链网络的可能性较小）。\n\
  \n如果你计划为应用使用公有区块链，那么区块链平台提供的共识机制可能会成为你决策过程中的一个考量因素。在下一章我们详细讨论`Bitcoin`时，将描述`Bitcoin`使用的共识机制。我们还会介绍其他可用的共识机制。对于公有区块链，在计算稳健性的要求与能耗方面的可持续性担忧之间取得平衡至关重要。\n\
  \n**利益相关者组织（`Stakeholder organization`）：** 这仅是针对许可区块链应用的设计决策。我们需要确定最合适的区块链网络治理与结构，以促进区块链网络长期成功与存续。\n\
  \n图 4-3 显示了三种可能的区块链网络。\n\n***图 4-3.** 区块链利益相关者组织模型*\n\n基于联盟的网络有多个创始方，他们共同治理区块链网络，招募成员，并在他们之间以及为成员确定决策权。联盟通常提供成员可以使用的技术平台，并协助他们进行实施和培训。在银行、保险及其他行业中，已有多个基于联盟的网络正在运行或被提议。基于联盟的网络应注意避免违反反垄断法规或被指控共谋。\n\
  \n创始人主导的网络通常始于一个在特定行业或价值链中实力强大的公司。这家公司通常与一家技术公司合作，提出一个由其赞助的区块链解决方案，并招募其供应商，在少数情况下也会招募客户和竞争对手作为成员加入。创始人负责该区块链网络的治理以及为创始人确定决策权。我们可以将此类型的区块链视为围绕创始人中心化并将权力集中于创始人。从很多方面来看，它可以被视为类似于中心化的数据共享系统，而回顾过去，这些系统并未改善低效的“三个\
  \ R”（冗余工作、返工与对账工作）。通过赋予每个成员自己独立的分布式账本副本，这种方法有望减少不信任，并可能推动采用。\n\n[⁹]: [`fred.stlouisfed.org/series/FEDFUNDS`](https://fred.stlouisfed.org/series/FEDFUNDS)\
  \ 显示了自 1960 年以来联邦基金利率的变化情况。\n\n\n\n在本节所述的三个利益相关方组织中，社区型网络是最为去中心化和民主的。在这里，个人或组织汇聚一堂，共同协作开发区块链应用。社区成员通过民主方式共同商定决策权分配与治理机制。他们可能会决定与科技公司合作，帮助社区成员采用、安装区块链技术并接受相关培训。社区型网络的例子包括艺术家们合作开发区块链网络，以保护和实现知识产权的货币化。社区型区块链网络需要深入思考，如何根据新成员（这些成员可能未参与区块链网络的初始创建）的反馈和意见来演进其治理机制。\n\
  \n在本节中，我们讨论了针对许可型区块链网络的管理和治理相关的设计决策。虽然治理也是公有区块链面临的问题，但使用公有区块链进行应用开发的系统设计师无法对此施加影响。\n\
  \n在本节中，我们没有讨论与发起方、角色以及负责创建基于区块链应用的项目的利益相关方责任相关的组织决策。虽然这些决策对于确保项目成功至关重要且关键，并且可能比非区块链技术项目的类似决策更为复杂，但我们并未将其视为与基于区块链解决方案的实施相关的设计决策。\n\
  \n**技术栈：** 区块链应用系统设计师需要应对的最后一个设计决策，是理解区块链应用的架构层次、为支持应用开发需要选择的开发工具，以及为确保区块链应用质量将采用的应用流程。\n\
  \n让我们首先了解 Lesavre、Varin 和 Yaga（2021）所述并如图 4-4 所示的五个架构层次。\n\n![](img/index-149_1.png)\n\
  \n***图 4-4.** 区块链应用架构层次*\n\n物理层由区块链网络中任何节点计算机所使用的硬件组成。总体而言，我们希望我们的区块链是硬件无关的，并能支持多样化的硬件-操作系统配置。特别地，一个好的设计方法是不要求任何专用硬件——作为最佳实践，我们更倾向于物理层采用通用硬件。\n\
  \n网络层由管理区块链网络对等节点之间点对点通信的软件组成。\n\n图 4-4 中描绘的区块链层有时被称为区块链实现的第 1 层。它包含了区块链内全局数据的存储结构和机制——分布式账本、执行共识协议的服务以及智能合约的执行环境。这些能力统称为基础协议层。智能合约层包含可由基础协议层执行的已编译智能合约软件。智能合约层中的软件有时被称为链码——因为这是将在区块链每个节点上执行的软件。区块链系统设计师无需关注与基础协议层相关的实现细节，只需了解其工作原理以评估效率和功耗需求即可。区块链系统设计师需要将重点放在开发上。\n\
  \n\n\n在开发区块链应用程序时，企业需要理解其业务流程所需的链代码或智能合约。在开发智能合约软件时，他们需要了解智能合约执行环境所支持的编程结构。在这一层中，需要开发工具来支持应用程序开发过程。这些工具至少包括一个开发区块链账本和一个交互式开发环境，以支持智能合约的创建和测试。\n\
  \n集成层（如图 4-4 所示，有时被称为区块链实现的第 2 层）需要为所有链下数据以及需要在“链下”执行的软件（称为链下代码）提供存储结构和机制。链下代码在高级层面有两个功能：满足区块链层中智能合约的数据需求，并将来自区块链层的数据转换为满足应用层需求的数据。在集成层中，所需开发工具将是用于访问区块链层的`API`（应用程序编程接口）。集成层还可以包括支持与其他区块链或其他数据和计算资源集成的中间件软件。\n\
  \n> 你可能会不时在媒体上读到关于区块链实现中创新的报道。这些创新有时会被称为第 1 层或第 2 层创新，具体取决于这些创新在区块链架构中所处的位置。进行第\
  \ 1 层变更并使其被采用，通常比进行第 2 层变更要复杂得多。\n\n![图 4-4 区块链分层架构](img/index-151_1.jpg)\n\n**第\
  \ 4 章 区块链商业应用**\n\n应用层包含区块链应用的界面。该层可以是基于网页的应用或移动应用。此层承载着存储用户私钥的钱包。该层的开发工具可以包括钱包浏览器插件。\n\
  \n图 4-5 展示了区块链应用的高层级开发周期。\n\n***图 4-5. 区块链应用开发流程***\n\n该流程包括：在开发区块链实例上创建代表应用或应用用户的账户。如果所使用的区块链实现有原生（或协议）代币，则需为这些账户注入资金。其余工作涉及：开发相关的智能合约；将这些智能合约编译为字节码；签名并部署智能合约（首先部署到开发区块链实例，然后部署到测试区块链实例，有时称为测试网）；然后通过应用接口与应用程序交互并进行测试。一旦测试和验证完成，就可以按照类似的过程（创建账户、注资（如果需要）、签名并部署智能合约）将应用部署到生产区块链（有时称为主网）。\n\
  \n**第 4 章 区块链商业应用**\n\n在本节中，我们详细回顾了区块链系统设计者需要应对的七个设计决策。接下来，我们将描述金融、医疗、供应链和娱乐领域的典型区块链应用。\n\
  \n**区块链应用**\n\n区块链应用正被构想并实施于多种行业中。理解这些案例研究的三个绝佳来源是：Hyperledger 基金会（[www.hyperledger.org/learn/case-studies](http://www.hyperledger.org/learn/case-studies)），以及区块链研究所（[www.blockchainresearchinstitute.org](http://www.blockchainresearchinstitute.org/7914-2/)）。\n\
  \n\n\n"
- '# 排版结果


  [blockchainresearchinstitute.org/7914-2/](http://www.blockchainresearchinstitute.org/7914-2/)，以及企业以太坊联盟（[`entethalliance.org/use-cases/`](https://entethalliance.org/use-cases/)）。我们将使用通用结构描述区块链应用。


  首先，从行业现状的高级描述入手，理解困扰该行业的经济低效问题。然后，列举区块链应用能够缓解经济低效问题的业务领域。在某些情况下，我们将提供已投入生产的区块链应用的具体示例。


  ## 区块链金融应用


  金融服务行业可视为包含以下领域：银行业；信用卡业务；股票、债券、商品及其他金融工具的托管与交易；贷款承销；贷款发起与服务；以及从企业兼并收购到投资建议的一系列咨询服务。虽然由于这些领域似乎都存在相似的经济低效问题，我们可以将它们统称为金融服务，但它们在运营上却大相径庭，而在多个领域运营的公司必须应对复杂的监管，以确保一个领域的服务不被用于操纵另一个领域的服务。


  金融服务行业是典型的第三方中介，尽管在某些领域它们确实增加了基于知识的价值，例如创建衍生金融工具以及提供教育、咨询和顾问服务。每当我们讨论降低经济低效问题时，都将涉及劳动力的巨大转移和颠覆。因此，强调一个行业中具有增长潜力的增值领域至关重要。


  金融服务行业的能力依赖于庞大且复杂的运营栈，其中包括：转账与结算的清算所、信用卡处理网络、资产所有权的托管管理，以及交易记录保存和监管合规所需的审计、对账和报告。在当前系统环境中，这些运营服务既必不可少又成本高昂。提供这些服务的公司需要收回成本并盈利，这就导致了我们虽抱怨却不得不承认其在当前环境下必要性的费用。在某些情况下，这些费用高得离谱，且不一定只代表成本加利润，而是基于市场承受能力以及公司能逃脱监管的定价。


  与长结算时间（从股票交易的 24 小时结算到国际转账的 14 天结算不等）及第三方费用相关的经济低效，并非金融行业需要应对的唯一经济低效问题。政府监管的约束以及对专业组织制定的规则/规范的自愿接受也导致了经济低效，尽管许多监管、规则和规范起初都出于良好意图。参与金融服务行业要求消费者做出巨大的隐私权衡，并使用金融行业和/或政府监管规定的机制来建立身份。因某种原因无法满足这些要求的消费者将被排除在金融服务行业之外。美国联邦存款保险公司（FDIC）估计，2019
  年美国有 5.4%的家庭（即 710 万户）处于“无银行账户”状态（[www.fdic.gov/analysis/household-survey/index.html](http://www.fdic.gov/analysis/household-survey/index.html)）。




