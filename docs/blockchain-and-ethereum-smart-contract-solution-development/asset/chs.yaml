- "# 第 11 章 构建团队项目\n\n前面的例子展示了如何构建一个添加跨链 ID 的网页，以与已部署的智能合约进行交互。也可以为其他功能构建类似的页面，例如列出跨链\
  \ ID、修改`chainId`信息、批准或撤销跨链 ID 等。\n\n#### 安全审查\n\n安全性需要考虑许多因素。应遵循[第 8 章](https://doi.org/10.1007/978-1-4842-8164-2_8)中的安全指南。智能合约中的每个功能都应有权限检查。例如，在修改跨链\
  \ ID 信息时，应检查请求者，确保其为跨链 ID 的原始注册者。第二个检查是跨链 ID 的状态应处于`\"Pending\"`状态。如果跨链 ID 处于`\"\
  Verified\"`或`\"Revoked\"`状态，则其信息不能被修改。\n\n另一个重要方面是确保只有管理员才能批准或撤销跨链 ID 的注册。该管理员可以是一个单一账户，也可以是联盟中的多签账户。管理员可以将其所有权转移给另一个账户。\n\
  \n除了智能合约的安全性，还应对网页的安全性进行评估。对于要部署到生产环境的服务，最佳实践是进行安全审计和白盒测试，以确保不存在重大安全漏洞。\n\n####\
  \ 部署至测试网\n\n在编写智能合约和网页图形界面的代码时，开发者可以拥有一个开发系统和本地网络服务来测试项目。本地开发完成后，可以将其部署到公开的测试网供外部用户测试。以太坊测试网有多种选择。以太坊区块链有四个流行的可用测试网，包括\
  \ Ropsten、Kovan、Rinkeby 和 Goerli 测试网。这里提到的所有测试网都使用权威证明（POA）共识，并且比主网更快。要使用这些测试网，首先将\
  \ MetaMask 钱包连接到您希望部署智能合约的测试网（图 11-8）。测试网已添加到 MetaMask 中。如果您看不到列出的测试网，只需单击“显示/隐藏测试网”以打开配置小部件，并将“显示测试网”设置为“开”。\n\
  \n***图 11-8.** 通过 MetaMask 连接以太坊主网或测试网*\n\n将 MetaMask 钱包设置为指定的测试网后，测试人员需要获取一些测试以太币来测试\
  \ dApp。这些测试网都通过专用的水龙头提供少量用于测试目的的以太币。水龙头地址和区块浏览器 URL 如下所示（图 11-9）：\n\n***图 11-9.**\
  \ 以太坊测试网水龙头地址*\n\n一旦智能合约部署到测试网，并且网页设置为访问该智能合约，项目团队就可以宣布进行 alpha\n\n\n\n#### 将去中心化应用部署到主网\n\
  \n在向用户发布或测试版程序时，测试计划需要社区成员参与试用去中心化应用并报告项目中发现的问题。通常情况下，会向报告问题的用户发放赏金。由于区块链的不可篡改性，去中心化应用在部署到主网之前，必须在测试网上进行彻底测试。\n\
  \n## 部署到主网\n\n一旦去中心化应用在测试网上经过彻底测试，就可以部署到以太坊主网。将智能合约部署到生产网络的工具和方法与测试网相同。生产网络没有水龙头，部署智能合约所需的以太币需要购买。部署需要使用非托管账户，开发者实际持有私钥。Coinbase\
  \ 和 PayPal 等公司托管的账户无法使用。开发者需要拥有账户的私钥才能部署智能合约。\n\n此外，部署到主网时还需考虑以下几个因素。\n\n首先是安全性。部署智能合约是通过向区块链的地址`0`发送交易来完成的。智能合约地址仅通过对发送者地址和该交易的`nonce`进行哈希运算生成。交易的`data`字段将是智能合约的字节码，并保存到区块链上计算出的地址上。一旦智能合约部署完成，该智能合约的所有者就是发送该交易的发送者。该发送者可能被授予修改区块链的权限。保护智能合约所有者地址非常重要。有时，智能合约所有者可以调用一个函数来放弃所有权或将其所有权转让给另一个外部拥有账户。\n\
  \n其次，智能合约地址需要在可信媒体上发布。用户通过向智能合约地址发送交易来与之交互。如果用户将交易发送到错误的智能合约地址，虚假的智能合约可能会截获发送给它的资金。\n\
  \n第三，与项目智能合约关联的代币需要从用户的钱包中添加。应向用户提供相关说明。对于大多数加密货币钱包，代币不会自动添加到钱包中。用户需要通过添加智能合约、代币符号、小数位数等信息来将代币添加到钱包。这些信息来自项目团队，并应发布给用户。\n\
  \n第四，应选择一个稳定的 RPC 节点并连接到 MetaMask 或其他钱包。`RPC`节点是一个以太坊客户端节点，它将所有区块同步到系统并打开与 Web3\
  \ 客户端的连接。`RPC`节点可以由第三方或项目团队自己拥有。无论哪种情况，都应保护`RPC`节点免受攻击。\n\n最后，网页和智能合约应正确集成。在网页中，`Web3`对象构造交易并将请求发送到区块链。评估`Web3`和其他脚本以确保它们不被篡改非常重要。\n\
  \n一旦智能合约部署到主网，它就对全世界开放。除了项目团队提供的 Web 门户和 CLI 等接口外，第三方开发者也可以编写应用程序来访问该智能合约。由于区块链的“开放性”、“去中心化”和“不可篡改性”，去中心化应用的运行比常规应用更具挑战性，需要进一步讨论。\n\
  \n#### 运营与升级考量\n\n由于去中心化应用不应该有中心化的所有者和管理者，因此需要建立一个能够管理去中心化应用运营和升级的社区。许多\n\n\n\n\
  #### 构建去中心化应用的投票与升级机制\n\n项目通过构建投票机制来决定项目的运营和升级。项目团队发行治理代币并将其分发给社区成员。投票权与治理代币的数量成正比。社区成员可以通过赚取治理代币来提高其投票能力。当提出新功能或升级时，该提案会被发送到投票系统，每位社区成员可以投票支持或拒绝该提案。被接受的提案由开发者以开源方式实施，然后部署到主网。\n\
  \n一个主要的挑战是，当发现安全漏洞时如何升级已部署的智能合约。由于没有中央权威机构，社区需要投票决定是否进行升级。然而，由于区块链是不可变的，已部署的智能合约无法被打补丁或升级。\n\
  \n在这种情况下，智能合约需要重新部署。在重新部署新智能合约时，由旧智能合约管理的代币需要迁移到新智能合约。当新智能合约部署后，所有网页和 Web3 接口都应指向新的智能合约地址。这是一个非常繁琐且容易出错的过程。\n\
  \n有时，编写可升级的智能合约是更好的选择。这需要将一个智能合约拆分为两个或多个智能合约。第一个智能合约是一个入口智能合约，功能非常简单，例如接收一个地址并调用该地址的目标智能合约。目标智能合约是实现了大部分功能的合约。如果目标智能合约存在安全漏洞并需要升级，可以部署一个新的目标智能合约，并将新地址发送给入口智能合约。当入口智能合约接收到新的目标智能合约地址时，它会调用新的目标智能合约。通过这种可升级的智能合约设计，网页和\
  \ CLI 无需重新配置，因为入口智能合约的地址保持不变。\n\n为了最优地运营去中心化应用，构建一些服务来监控关键参数是至关重要的。例如，应监控总的代币铸造量，以确保黑客没有铸造额外的代币。还可以监控交易吞吐量和\
  \ gas 费用，以确保 dApp 处于健康的运行状态。此外，还应监控 EVM 的升级和以太坊的硬分叉，以确保去中心化应用不会受到负面影响。\n\n最后，一个充满活力的社区是成功运营去中心化应用的关键。构建一个\
  \ dApp 的过程与构建一个社区密不可分。只有社区积极参与，去中心化应用才能持续、发展并抵御严重的攻击。\n\n## 索引\n\n**A**\n\n*   `Atomic\
