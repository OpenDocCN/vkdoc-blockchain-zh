  ### 第 9 章 第 2 层与以太坊 2


  ##### 用于 Plasma Cash 的交易默克尔树


  通过前面提到的 `Plasma MVP`，用户可以通过 `UTXO` 向终端用户发送同质化资产。然而，`Plasma MVP` 并未解决非同质化代币的问题。`UTXO`
  虽然包含交易的金额，但不需要唯一 ID。`Plasma Cash` 是 `UTXO` 的一种扩展，其中每个代币都被分配了一个用于记录和转移的序列号。


  尽管现金或货币通常被认为是同质化的，但 `Plasma Cash` 实际上最适合处理类似于 `ERC721` 或具有唯一标识性的非同质化资产。


  为了允许默克尔树处理非同质化代币，提出了一种稀疏默克尔树来确保代币的唯一性。下图（图 9-5）说明了稀疏默克尔树如何为非同质化代币工作。




