  \n##### JavaScript 示例\n\n在上述 `addCrosschainid.html` 文件中，包含多个 JavaScript 文件。`web3.min.js`\
  \ 文件是面向浏览器的 JavaScript Web3 实现，这是一个可以从网络下载的开源文件。`enableEthereum.js` 文件用于实现\"连接钱包\"\
  按钮的点击事件。点击该按钮将触发一个函数调用，以获取连接到浏览器的钱包地址。在此 `enableEthereum.js` 脚本中，`ethereumButton`\
  \ 对象对应\"连接钱包\"按钮，并注册了一个点击事件处理器来调用 `getAccount()` 函数。`getAccount` 函数调用 Web3 的 `eth_requestAccounts`\
  \ 方法检索 MetaMask 中的账户，并将第一个账户赋值给 `account0`，供其他脚本引用。此处，`showAccount` 对象是一个 `Div`\
  \ 对象，该对象将填充从 `getAccount()` 函数调用中获取的账户地址。\n\n```\n// ----------- enableEthereum.js\
  \ ---------------------------\nconst ethereumButton = document.querySelector('.enableEthereumButton');\n\
  const showAccount = document.querySelector('.showAccount');\nvar account0 = 0;\n\
  \nethereumButton.addEventListener('click', () => {\n    getAccount();\n});\n\nasync\
  \ function getAccount() {\n    const accounts = await ethereum.request({ method:\
  \ 'eth_requestAccounts' });\n    account0 = accounts[0];\n    showAccount.innerHTML\
  \ = account0;\n}\n```\n\n一旦 `enableEthereum.js` 检索到账户，用户即可输入区块 0 哈希值、旧链 ID 和区块链名称，并点击\"\
  添加跨链 ID\"按钮注册新的区块链 ID。此功能在 `addCrosschainid.js` JavaScript 中实现。该脚本中，当网页上的\"添加跨链\
  \ ID\"按钮被点击时，会调用 `addChainid()` 函数。该函数首先检查 MetaMask 钱包是否已启用并连接。若未连接，系统将提示用户安装 MetaMask\
  \ 扩展；若已连接，则使用跨链 ID 智能合约的 ABI 和合约地址构建一个名为 `myContract` 的智能合约对象。ABI 和合约地址在单独的 `crosschainid_info.js`\
  \ 文件中指定。\n\n`myContract` 对象支持 `addChainId` 方法，该方法接收区块哈希值、旧链 ID 和链名称作为参数。这些参数通过网页中的输入字段获取。调用智能合约函数有多种方式。本示例中，首先通过以下代码计算智能合约函数调用的数据：\n\
  \n```\nvar chainidData = myContract.methods.addChainId(blockhash, legacyid, chainname).encodeABI();\n\
  ```\n\n然后，通过 `web3.eth.sendTransaction` 操作将 `chainidData` 发送至智能合约。交易回执会被返回并显示在网页上。\n\
