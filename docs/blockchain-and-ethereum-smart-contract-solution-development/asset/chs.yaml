  ##### 以太坊主网上的 Plasma 智能合约


  顶层是第一层`layer 1`或称为根区块链`root blockchain`，在此上下文中即为以太坊主网。Plasma 智能合约被部署到以太坊主网上，其具备以下功能。


  **供用户在第一层存入资产的存款函数`Deposit function`**：该存款函数允许用户向某 Plasma 智能合约发送一笔包含特定资产价值的交易。用户通过存款函数发送的资产将由该
  Plasma 智能合约锁定在主网上。智能合约将创建一个记录，并生成与此存款相关的新代币。之后，存款函数可以触发一个存款事件`deposit event`以通知
  Plasma 区块链。该代币及其价值将被复制到 Plasma 区块链中，并作为第二层区块链的资产使用。


  **用于第二层 Plasma 区块链向第一层根链提交交易默克尔树的 SubmitPlasmaTxRecord 函数**：Plasma 区块链中的交易记录在默克尔树结构中，默克尔树的根节点会被发送到父链或根区块链。


  **允许用户将资产从第二层链提取到第一层区块链的 StartWithdraw 函数**：该函数通常由用户直接调用，或由连接第一层和第二层区块链的运营者调用。此函数的调用者应提供
  Plasma 区块编号、交易索引 ID`indexid`、交易记录、默克尔证明`Merkle proof`以及




  ##### 签名


  当用户从等离子区块链提取资产时，等离子链上的资产将被销毁，随后原本抵押在第一层链上的资产将分发给目标用户。为确保销毁操作和解锁操作的安全性，`StartWithdraw`
  函数将设置一段等待期，之后才会将资金分配给用户。此举是为了确保在第一层分发等值资产之前，第二层的资产已被销毁。在这段等待期内，任何人都可以通过提供等离子区块链上的证明来质疑此次提现。


  `ChallengeWithdraw` 函数允许任何用户或操作者提供证据，以质疑尚待验证的提现交易：该函数的调用者需要提供被质疑的提现 ID，以及其他输入，例如与
  `StartWithdraw` 函数类似的 Merkle 根和证明。系统将比较并验证来自 `StartWithdraw` 函数和 `ChallengeWithdraw`
  函数的输入。如果质疑成功，那么该笔 `StartWithdraw` 交易将失效。


  ##### 操作者


  操作者负责连接等离子区块链和第一层根链。它会监控第一层的存款事件，随后生成一个新的代币 ID 来表示主网中的对应资产，并在等离子链中铸造等值的代币。一旦新代币在等离子区块链上生成，存款人就拥有了该代币，并可以将其发送给第二层链中的任何用户。操作者还会将等离子区块链的
  Merkle 树根记录提交到第一层区块链。用户可以通过在区块链上调用智能合约函数，将其资产提取到第一层。如果第二层发起了提现请求，操作者也会将该请求传递到第一层进行处理。


  ##### 第二层的交易或智能合约


  在等离子第二层链中，用户可以相互发送常规交易。等离子链也可以实现智能合约功能，将资产提取到第一层区块链。等离子链上的交易会被打包成 Merkle 树，并保存为区块链状态。该
  Merkle 树的根会被发送到第一层链进行记录。


  ##### 等离子链


  等离子链可以通过多种方式实现。由于等离子链的安全性依托于根链，且交易收据会被发送给接收者，因此等离子链不需要完全共识来确保安全。等离子链可以通过多种方式实现。在一种实现方式中，等离子链可以作为一个服务器，接收用户交易输入，并拥有
  Merkle 树结构或数据库来存储交易。等离子链也可以实现为 POA（权威证明）或 BFT（拜占庭容错）区块链。在这种 POA 或 BFT 等离子区块链中，少数几个获得许可的节点会创建一个区块链，用于接收等离子层的交易。然后计算交易
  Merkle 树的根，并将其发送到根区块链进行记录和验证。等离子链还可以实现为 POS（权益证明）链，任何人都可以通过将资产抵押到根链上的智能合约来运行节点。抵押在等离子链中的资产用于保护等离子链的安全。如果等离子链中的节点发生共谋，这些节点的抵押资产将通过根链上的智能合约被罚没。


