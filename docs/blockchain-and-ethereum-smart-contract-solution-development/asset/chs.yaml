  \ Web 应用程序。一种流行的客户端应用是通过基于 Web 的浏览器渲染 GUI，并使用 MetaMask 作为钱包发送交易。接下来，我们将演示如何构建与智能合约交互的网页。\n\
  \n通常，与智能合约交互的网页包含以下组件：\n\n- 用于渲染 GUI 的 HTML 页面\n- 用于处理用户输入和智能合约输出的 JavaScript\n\
  - 用于 JavaScript 和智能合约函数调用的 Web3\n- 用于签名交易的 MetaMask 插件或扩展\n\n以 `crosschainId` 服务为例，设计了以下\
