- "# 第九章 第二层与以太坊 2\n\n- 设计一个 `zk-SNARK`，首要任务是定义一个证明任务。此任务即定义一个函数来验证某个陈述。\n- 随后，将定义好的验证函数进行扁平化处理，并归约成多个算术运算步骤。这些算术运算有时被称为零知识电路。电路可以接收私有和公共输入，并生成相应的输出。\n\
  - 一旦算术电路被定义，就可以通过一个设置过程生成证明密钥和验证密钥。证明密钥交给证明者，验证密钥交给验证者。验证者可以是一个智能合约。\n- 证明者可以在链下使用证明密钥进行计算，并生成一个证明。\n\
  - 然后将该证明和公共数据发送给一个验证智能合约进行验证。\n\n`zk-SNARK` 目前仍在开发中，可以预见，更多研究将催生出适用于第二层汇总的、更优的 `zk-SNARK`\
  \ 机制。\n\n#### 以太坊 2\n\n### 以太坊 2 的主要变化\n\n以太坊 2 和第二层都是为了解决以太坊主网的可扩展性问题并提高能源效率而开发的。事实上，第二层解决方案有时会被戏称为以太坊\
  \ 1.5。以太坊 2 是对以太坊 1 的一项前景广阔的网络升级，其包含以下新的组件和特性。\n\n##### 从 POW 转向 POS\n\n与工作量证明（`POW`）共识机制相比，权益证明（`POS`）机制具有能效高、可扩展性更强、激励更优以及出块时间更短等优势。`POS`\
  \ 允许一个系统拥有额外的计算能力来执行诸如托管多个质押账户或运行服务以连接信标链或侧链等额外工作。\n\n\n\n##### 以太坊 2.0 架构概览\n\n\
  ##### 信标链\n\n以太坊信标链是一条关键的权益证明区块链，它连接着质押者与分片。质押者来自以太坊 1.0 主网账户，他们将其以太资产发送到一个质押智能合约，以参与信标链的区块生成。分片则是存储和计算类的区块链，它们扩展了\
  \ `EVM` 的功能以及主网的状态存储。\n\n##### 分片\n\n分片是以太坊区块链的一种全新架构，它允许多条区块链组成的层级结构独立处理交易，然后将区块哈希值汇总到其父分片，并最终将哈希值存储到信标链上。分片使得一组区块链能够同时处理交易和执行智能合约，从而显著提升了以太坊\
  \ 1.0 主网的可扩展性。\n\n##### 以太坊 2.0 架构概览\n\n以太坊 2.0 是以太坊 1.0 的扩展，新增了信标链和分片链。下图（图 9-9）展示了以太坊\
  \ 2.0 的架构概览。\n\n![](img/index-382_1.png)\n\n**图 9-9.** *以太坊 2.0 拓扑结构与工作流程*\n\n以太坊\
  \ 2.0 包含三条区块链，其中包括原有的以太坊主网。以太坊主网为以太坊 2.0 的权益证明机制提供质押资产。信标链是一条基于权益证明的区块链，它记录质押信息、生成随机数、提议验证者，并与分片链连接以记录分片链的数据和交易默克尔树。此外，还存在多条分片链，用于存储以太坊\
  \ 2.0 的数据，执行 `EVM` 计算并处理交易。\n\n针对上述以太坊 2.0 的三种区块链，为了生成和验证区块，我们需要提及四种类型的客户端节点。第一种是以太坊\
  \ 1.0 客户端节点，例如为以太坊 1.0 主网生成区块的 `geth` 客户端。第二种是信标节点，它们为信标链提议区块。第三种是信标链的验证节点。验证器节点将通过信标链节点来生成或验证信标链区块。第四种是分片节点，负责分片链的区块生成。\n\
  \n上述区块链节点通过点对点协议或 `RPC` 协议相互连接和通信。图中若干交互/边被标记为 A、B、C、D、E、F 和 G。\n\n边 A 是账户所有者钱包与以太坊\
  \ 1.0 节点之间的交互。该交互允许用户在钱包中构建并签署交易，然后将签名后的交易发送给以太坊 1.0 客户端节点。客户端节点随后验证交易并将其打包成一个新区块。在图中，钱包仅连接到一个以太坊\
  \ 1.0 节点，因为目前还没有能够与信标链交互的以太坊 2.0 钱包。\n\n边 B 代表以太坊 1.0 客户端节点查看以太坊 1.0 主网区块和交易，或将区块写入区块链。在以太坊\
  \ 2.0 的背景下，交互 B 主要用于质押者将资产质押到部署在以太坊 1.0 主网上的以太坊 2.0 质押智能合约。一旦资产作为质押物被存入，智能合约函数将触发一个事件，以显示质押地址和金额。\n\
  \n边 C 是以太坊 1.0 客户端节点与信标节点之间的交互。以太坊 1.0 区块链中的质押信息应对信标节点可见。信标节点使用 `RPC` 连接客户端节点，并获取由质押智能合约触发的所有事件。当从以太坊主网检索到新的质押信息时，信标节点会生成一个区块来记录该新质押信息。\n\
  \n边 D 用于信标节点与分片节点之间的交互。边 E 用于分片节点为分片链提议区块。分片节点负责执行数据存储和\n\n\n\n##### 交易处理\n\n边 F\
  \ 表示验证节点与信标节点之间的交互与通信。权益证明（POS）矿工需要运行客户端节点，从信标链请求任务、打包交易、验证区块并提议区块。以太坊 2 架构将信标节点与验证节点分离。信标节点负责管理通信以及时代（epoch）、时段（slot）、随机数生成和验证节点选举等工作。验证节点负责处理交易和区块。矿工特定信息（如矿工资质凭证）仅存储在验证节点中，而不在信标节点中。信标节点与矿工节点之间的通信通过`RPC`协议进行。\n\
  \n边 G 表示信标节点向信标链提议信标区块。每个信标节点将与信标链同步，管理质押者注册表，将验证节点组织成委员会，管理时代和时段，生成随机数，分配验证节点角色，并向信标链提议新区块。\n\
  \n从以太坊 2 的架构拓扑和交互来看，以太坊 1 主网仍然是以太坊 2 的重要组成部分。POS 的质押能力来源于资产所有者指定参与以太坊 2 POS 共识的资产。理解以太坊\
  \ 1 向以太坊 2 迁移的过程至关重要。\n\n## 从以太坊 1 迁移到以太坊 2：POS\n\n### 存款、质押与罚没\n\n从以太坊 1 到以太坊 2\
  \ 的迁移采用分阶段方式。以太坊 2 的第一阶段是构建基于权益证明共识的信标链。下文提及质押以太坊 1 资产以迁移至以太坊 2 的一些重要概念和步骤。\n\n\
  权益证明的资产通过存款智能合约存入以太坊 1 主网。以下是存款合约接口的代码片段。\n\n```solidity\n// 存款合约接口基于以下以太坊 2 规范：\n\
  // https://github.com/ethereum/eth2.0-specs\n\ninterface IDepositContract {\n  \
  \  /// @notice 已处理的存款事件。\n    event DepositEvent(\n        bytes pubkey,\n     \
  \   bytes withdrawal_credentials,\n        bytes amount,\n        bytes signature,\n\
  \        bytes index\n    );\n\n    /// @notice 提交阶段 0 的 DepositData 对象。\n    ///\
  \ @param pubkey BLS12-381 公钥。\n    /// @param withdrawal_credentials 提现公钥的承诺。\n\
  \    /// @param signature BLS12-381 签名。\n    /// @param deposit_data_root 经过 SSZ\
  \ 编码的 DepositData 对象的 SHA-256 哈希值。\n    /// 用于防止格式错误的输入。\n    function deposit(\n\
  \        bytes calldata pubkey,\n        bytes calldata withdrawal_credentials,\n\
  \        bytes calldata signature,\n        bytes32 deposit_data_root\n    ) external\
  \ payable;\n\n    /// @notice 查询当前存款根哈希。\n    /// @return 存款根哈希。\n    function get_deposit_root()\
  \ external view returns (bytes32);\n\n    /// @notice 查询当前存款计数。\n    /// @return\
  \ 以小端序 64 位数字编码的存款计数。\n    function get_deposit_count() external view returns (bytes\
  \ memory);\n}\n```\n\n存款智能合约使用稀疏默克尔树存储质押存款记录，并通过存款事件通知信标节点等外部程序。该智能合约支持的主要功能包括`deposit()`、`get_deposit_root()`和`get_deposit_count()`。用户在进行质押存款时，需提供公钥、提现凭证、所有者签名和存款数据根哈希等信息。存款金额包含在`msg.value`中，因此不是函数参数。存款\
  \ ID 会自动递增，无需提供。\n\n向存款智能合约存入资产时，需牢记一个关键点：以太坊 1 的公钥/私钥对曲线已被替换为功能更丰富的`BLS12-381`曲线。\n\
  \n\n\n2  个密钥对需要通过一个新工具生成，该工具会提供一个 24 词的助记词短语。与以太坊 1 不同，以太坊 2 的账户同时拥有提款密钥和验证者密钥。一组助记词短语可以生成多个提款公钥，而一个提款密钥可以派生出多个验证者密钥。\n\
  \n## 通过权益证明质押运行以太坊 2 验证者节点\n\n运行验证者节点将从以太坊 2 区块链获得奖励。与比特币或以太坊挖矿不同，以太坊 2 基于权益证明，因此，只要节点在线且正常运行，所有节点都能获得奖励。以以太币价值计算，奖励回报率约为年化\
  \ 3–8%。以下是搭建以太坊 2 挖矿节点的主要步骤。\n\n首先，以太坊 2 依赖于以太坊 1。因此，仍然需要一个以太坊 1 节点。这个节点可以用 `geth`\
  \ 搭建，也可以是一个拥有静态 IP 的稳定公共节点。\n\n其次，用户需要分配质押资金。运行一个验证者节点至少需要 32 个以太币。用户还需要考虑，如果他们的节点离线，将会受到惩罚，导致质押余额减少。\n\
  \n第三，用户需要准备一个存款账户。有一个存款工具可以用于生成助记词短语，并派生出提款密钥和验证者密钥。这些密钥极其重要，必须妥善保管。如果助记词短语和提款密钥丢失，那么为以太坊\
  \ 2 锁定的以太币也将丢失。\n\n第四，下载并运行信标节点和验证者节点。有多家供应商提供运行信标节点和验证者节点的软件包。\n\n最后，使用脚本或第三方工具将资产存入存款合约。存款事件会被信标节点检测到。存款会处于待处理状态一段时间，然后变为激活状态。\n\
  \n一个需要考虑的重要因素是，与工作量证明共识不同，权益证明机制会对验证者施加惩罚。以太坊信标链对验证者实施两种惩罚。一种是怠惰惩罚，用于惩罚离线或不提出/证明区块的验证者节点。另一种是罚没，用于惩罚构建或证明恶意区块的验证者。建议验证者运行监控程序，以确保其节点积极且正确地运行。\n\
  \n目前已经开发了许多工具和解决方案。用户可以查看以太坊 2 网站，了解推荐的工具。\n\n##### 以太坊 2 的不确定性\n\n尽管以太坊 2 被认为是以太坊主网可扩展性解决方案的一个有前途的方案，但该项目仍存在一些不确定性。例如，分片链仍未最终确定。关于分片在安全性和质押经济方面有很多争论。建议读者对以太坊\
  \ 2 的路线图、实现和部署保持开放的态度。\n\n## 总结\n\n在本章中，我们解释了几种第 2 层可扩展性解决方案，包括状态通道、Plasma、Rollups\
  \ 以及以太坊 2 技术。每种技术都有其优缺点。在设计去中心化应用时，考虑应用的使用模式并选择最可行的技术来扩展解决方案至关重要。\n\n## 第 10 章 为项目提供资金：代币与燃料费\n\
  \n#### 引言\n\n在前面的章节中，我们讨论了智能合约编码、开发和部署的技术层面，以及区块链安全性和可扩展性。在本章中，我们将从智能合约的业务和技术两方面讨论如何为项目提供资金。\n\
  \n以太坊已经实现了几个与项目融资相关的里程碑，例如首次代币发行（ICO）、非同质化代币（NFT）、去中心化金融（DeFi）和去中心化自治组织（DAO）。可以预见，证券型代币发行（STO）、中央银行数字货币（CBDC）以及其他去中心化\n\
  \n\n"
- "# 应用将很快获得普及。所有这些用例都有一个共同且关键的元素：代币。下面，我们将描述如何使用代币来表示资产以资助项目，以及如何使用智能合约来编程代币。\n\n\
  © Weijia Zhang and Tej Anand 2022\n\nW. Zhang and T. Anand, *Blockchain and Ethereum\
  \ Smart Contract Solution Development*,\n<https://doi.org/10.1007/978-1-4842-8164-2_10>\n\
  \n## 第十章 资助项目：代币与 Gas 费\n\n#### 用于资助生态系统项目的代币\n\n##### ICO 与 DeFi 中的代币\n\n以太坊中的\
  \ ICO 是一种在 2017 年左右流行的筹资机制。它由 `ERC20` 代币实现，该代币使得代币在以太坊生态系统中可编程、可分发和可交易。`ERC20` 代币是同质化的，这意味着它仅具有价值，且彼此之间无法区分。`ERC20`\
  \ 代币遵循位于以下 URL 的 `EIP-20` 规范：<https://eips.ethereum.org/EIPS/eip-20>\n\n在 `ERC20`\
  \ 规范中，定义了几个标准函数以及两个事件，所有发行 `ERC20` 代币的智能合约都需要相应地实现它们。函数规范如下：\n\n```\n// 返回代币的名称\n\
  function name() public view returns (string)\n\n// 返回代币的符号。通常是几个大写字母，可选。\nfunction\
  \ symbol() public view returns (string)\n\n// 返回代币使用的小数位数。\nfunction decimals()\
  \ public view returns (uint8)\n\n// 返回代币的总供应量\nfunction totalSupply() public view\
  \ returns (uint256)\n\n// 返回地址为 _owner 的账户余额。\nfunction balanceOf(address _owner)\
  \ public view returns (uint256 balance)\n\n// 将 _value 数量的代币转移到地址 _to，并且必须触发 Transfer\
  \ 事件。\nfunction transfer(address _to, uint256 _value) public returns (bool success)\n\
  \n// 将 _value 数量的代币从地址 _from 转移到地址 _to，并且必须触发 Transfer 事件。\nfunction transferFrom(address\
  \ _from, address _to, uint256 _value) public returns (bool success)\n\n// 允许 _spender\
  \ 多次从你的账户提款，最高可达 _value 数量。如果再次调用此函数，它将用 _value 覆盖当前的 allowance。\nfunction approve(address\
  \ _spender, uint256 _value) public returns (bool success)\n\n// 返回 _spender 仍然被允许从\
  \ _owner 提取的金额。\nfunction allowance(address _owner, address _spender) public view\
  \ returns (uint256 remaining)\n```\n\n**事件**\n\n```\n// 此事件必须在代币被转移时触发，包括零值转移\n\
  event Transfer(address indexed _from, address indexed _to, uint256 _value)\n\n//\
  \ 此事件必须在任何对 approve(address _spender, uint256 _value) 的成功调用时触发\nevent Approval(address\
  \ indexed _owner, address indexed _spender, uint256 _value)\n```\n\n有两个已经为 `EIP-20`\
  \ 标准实现的智能合约包：`OpenZeppelin` 包和 `ConsenSys` 包。开发者可以扩展这些包，并通过几行自定义代码创建他们自己的 `ERC20`\
  \ 代币。例如，通过导入 `OpenZeppelin` 的 `ERC20` 包，开发者可以创建一个名为 `DEVELOPER_TOKEN`、符号为 `DEV`，并带有可自定义的总供应量作为构造函数输入的\
  \ `ERC20` 代币：\n\n```\n// contracts/DEVToken.sol\n// SPDX-License-Identifier: MIT\n\
  pragma solidity ⁰.8.0;\n\nimport \"@openzeppelin/contracts/token/ERC20/ERC20.sol\"\
  ;\n\ncontract DEVToken is ERC20 {\n    constructor(uint256 initialSupply) ERC20(\"\
  DEVELOPER_TOKEN\", \"DEV\") {\n        _mint(msg.sender, initialSupply);\n    }\n\
  }\n```\n\n当上述智能合约以指定的 `initialSupply` 部署时，部署的代币的总供应量 (`totalSupply`) 将等于 `initialSupply`。一旦创建了\
  \ `ERC20` 代币，就可以编写另一个智能合约。\n\n\n\n##### 代币铸造与分发\n\n为了处理代币的铸造与分发，该智能合约在用于 ICO 时有时也被称为众售智能合约。众售智能合约通常包含以下功能：\n\
  \n- **代币与以太币的比率** – 以太币与目标代币之间的兑换比率。\n- **众售时间** – 代币可供分发的开始与结束时间。\n- **KYC/AML**\
  \ – 众售可以设置一个白名单，只有白名单中的发送者才能参与众售。\n- **退款** – 智能合约还可以实现代币退款功能。\n\n除了众筹，`ERC20` 代币也广泛应用于其他去中心化金融（DeFi）项目，例如\
  \ Compound（借贷）、Uniswap（交易所）和 USDC（稳定币）。\n\n在以太坊社区中，关于 `ERC20` 代币是功能型代币还是证券型代币也存在一些讨论。这些问题因国家或地区而异，应咨询法律专业人士。\n\
  \n##### NFT 中的代币\n\n与 `ERC20` 代币不同，非同质化代币（NFT）是可区分的，可用于代表所有权。例如，出生证明、文凭和租赁合同都是非同质化的，具有明确的所有权。\n\
  \nNFT 被定义为 `EIP-721` 标准，用于代表：\n- 实物资产，如房屋、汽车和艺术品\n- 虚拟收藏品，如数字艺术和收藏卡\n- “负资产”，如贷款和债务\n\
  \n`EIP-721` 的详细规范位于以下网址：[`eips.ethereum.org/EIPS/eip-721`](https://eips.ethereum.org/EIPS/eip-721)\n\
  \n与 `ERC20` 代币类似，`ERC721` NFT 也定义了代币名称、代币符号和总供应量。但 NFT 有以下一些主要区别：\n- 每个 NFT 代币都有一个唯一的索引。\n\
  - 每个 NFT 代币都有一个所有者。\n- 由于 NFT 可以指向区块链外部的实物或虚拟资产，因此存在一个 `ERC721Metadata` 接口，该接口定义了一个名为\
  \ `tokenURL` 的函数。\n```\nfunction tokenURI(uint256 _tokenId) external view returns\
  \ (string);\n```\n此 `tokenURL` 函数接收 `_tokenId` 作为输入，并返回一个指向传统数字系统中定义的 NFT 项目的统一资源标识符（URI）。\n\
  - 每个 NFT 代币可以通过以下函数从一个所有者转移到另一个所有者：\n```\nfunction transferFrom(address _from, address\
  \ _to, uint256 _tokenId) external payable;\n```\n- 还有其他函数或接口帮助 NFT 代币进行分配、转移或识别。\n\
  \n基于 `EIP-721`/`ERC721` 标准的 NFT 代币已被多个项目实现。例如，0xcert 和 OpenZeppelin 已经实现了 `ERC721`\
  \ 代币智能合约包。开发者可以轻松地扩展 `ERC721` 包，创建自己的 `ERC721` 非同质化代币。\n\n例如，为了给学生的文凭创建 NFT，可以使用以下示例代码编写智能合约：\n\
  \n```\n// SPDX-License-Identifier: MIT\npragma solidity ⁰.7.0;\n\nimport \"https://github.com/OpenZeppelin/openzeppelin-contracts/blob/release-v3.4/contracts/token/ERC721/ERC721.sol\"\
  ;\n\ncontract TTCDiploma is ERC721 {\n    uint private _tokenIds;\n    address admin;\n\
  \n    constructor() ERC721(\"TexasTechnologyCollegeDiploma\", \"TTC\") public {\n\
  \        admin = msg.sender;\n    }\n\n    function issueDiploma(address student,\
  \ string memory tokenURI) public returns (uint256) {\n        require(msg.sender\
  \ == admin); // 只有管理员才能颁发文凭。\n        _tokenIds++;\n        uint256 newDiplomaId\
  \ = _tokenIds;\n        _mint(student, newDiplomaId);\n        _setTokenURI(newDiplomaId,\
  \ tokenURI);\n        return newDiplomaId;\n    }\n}\n```\n\n在这个程序中，编写了 `TTCDiploma`\
  \ 智能合约用于为学生颁发文凭。部署智能合约时，提供了代币名称和代币符号。同时，智能合约的部署地址被指定为管理员地址。只有管理员才能执行特权操作，例如颁发文凭。在\
  \ `issueDiploma` 函数中，\n\n\n\n`the sender`被检查是否具有管理员权限。如果有，则递增`tokenId`，并生成一个新的文凭\
  \ ID。然后，这个新的`diplomaId`被分配一个`tokenURI`，该 URI 指向一个外部源，用于检索该 ID 对应的文凭。当学生想要检索文凭时，他们只需签署一条消息并将其发送到`diplomaId`指定的\
  \ URI。由该 URI 指向的文凭服务器将检查已签名的消息，以验证请求者是该文凭的合法所有者，然后将文凭输出给请求者。\n\n"
- '# 第 10 章 资助项目：代币与 Gas 费


  NFT 代币可用于许多领域。已经有许多项目为 NFT 艺术品和收藏品提供市场。诸如`OpenSea`和`Decentraland`等项目在 NFT 市场中很受欢迎。


  ## DeFi 中的代币（Compound、Uniswap 和稳定币）


  在[第 1 章](https://doi.org/10.1007/978-1-4842-8164-2_1)中，提到了几个 DeFi 项目，例如去中心化借贷平台、去中心化交易所和稳定币。所有
  DeFi 项目都使用一个或多个 ERC20 代币作为资产代币或治理代币。下面，我们举几个例子。


  `Compound`是一个去中心化借贷平台项目，允许用户无需通过银行等中介机构即可借出或借入加密货币。贷方可以将其资产代币发送到`Compound`智能合约，并接收`cTokens`，用以代表存入借贷池的资产数量。`cTokens`可以赚取利息，也可以进行交易。借款人可以从`Compound`协议中借入加密货币。为了借入加密资产，借款人需要提供其他加密资产作为抵押品。抵押品计算基于代币价格馈送和已发布的公式。如果借入的资产无法偿还，且抵押品价值低于确保借款余额安全的阈值，则可以根据智能合约中编写的规则清算抵押品。


  `cTokens`代表在借贷协议中提供的加密资产。此外，`Compound`还发行了一种名为`COMP`的治理代币。通过在借贷协议中提供或借出资产可以获得`COMP`。`COMP`代币可用于对提案进行投票。所有`cTokens`和`COMP`代币都是
  ERC20 代币。


  `Uniswap`是一个使用自动做市商（AMM）机制的去中心化交易所平台。不同用户可以在不依赖中心化交易所的情况下交易其加密资产。`Uniswap`流动性提供者为流动性池提供成对的加密资产作为交易对。然后，交易者使用流动性池中的资产进行交易。


  针对`Uniswap`和其他类似的去中心化交易所平台，设计了两种代币。第一种代币称为流动性提供者（LP）代币，它代表供应商对流动性池的贡献。LP 代币是一种 ERC20
  代币，特定于某个交易对。每个交易对都有自己的 LP 代币。另一种`Uniswap`代币是`UNI`代币，它也是一种 ERC20 代币。`UNI`代币是一种治理代币，可用于在`Uniswap`生态系统内对提案进行投票。


  像`DAI`、`USDT`和`USDC`这样的稳定币都是 ERC20 格式的代币，可以进行交易或转账。在 ERC20 格式之上，还构建了基于供需自动铸造和销毁等附加功能，以保持其价值稳定。稳定币的价值可以通过几种机制保持稳定，例如法币抵押、加密货币抵押或算法机制。


  尽管大多数 DeFi 代币都是 ERC20 代币，但它们并不完全相同，因为每个 DeFi 都在标准 ERC20 代币之上构建了附加功能。DeFi 项目都是开源的，其代币代码可以在公共源代码仓库中查看和审查。


  ## 企业级/标准化（普适）代币



  ICO 由一种 ERC20 代币支持，这使得代币能够在以太坊生态系统中实现可编程、可分发和可交易。


  ERC20 代币是一种同质化代币，各个代币之间无法区分。NFT 里程碑由 ERC721 赋予能力，该标准允许代币具有唯一性、可追溯性、可交换性和可交易性。STO
  由 ERC1400 赋予能力，该标准允许所有者拥有实体资产的一部分。代币与去中心化应用密不可分。


  ## 第 10 章 为项目融资：代币与 Gas 费


  公共区块链中的代币是开放、无需许可的，旨在进行大规模分发。对于企业而言，需要一种更加结构化和正式的代币框架，这种代币可以跨不同的私有区块链进行传播，并且易于设计和定制。


  企业代币在多个领域具有潜在用途，包括以下方面：


  **供应链代币**


  在供应链中，资产可以对应零件、库存、订单、发货、贷款和提单。所有这些资产都可以被代币化并记录在区块链中。对这些资产的操作可以建模为区块链中的交易。IBM、FedEx、微软和埃森哲等企业都在构建区块链解决方案，以帮助解决供应链问题，从而提高效率、增强可追溯性并最大化透明度。供应链中使用的代币类型比
  DeFi 中常用的 `ERC20` 或 `ERC721` 更广泛。在供应链系统中，所有可识别的物品都可以被代币化并记录在区块链中。


  **行业特定代币**


  代币可以扩展为代表所有可识别的物品，并可用于所有行业中，代表物理、数字或虚拟资产。例如，在可再生能源领域，太阳能或风能发电可以被代币化并进行交易。下面我们描述如何使用碳信用代币来表征和代币化二氧化碳排放，以及这些信用额度如何在市场上进行交易（图
  [10-1] (#index_split_006.html#p399)）。


  ![](img/index-399_1.png)


  ***图 10-1.* 碳信用代币（CCT）概述**


  为了建立碳信用市场，相关机构首先需要铸造并发行一个 ERC20 代币来代表二氧化碳减排量。碳信用机构首先创建一个`Carbon Credit Token`（`CCT`），使用诸如“United
  Groups’ Carbon Credit”这样的名称、`CCT`符号以及二氧化碳减排总量。初始碳信用额度由机构账户铸造并拥有。只有该机构拥有转移或授予碳信用额度的特权。


  为了管理碳信用额度，机构将指定审计员来审查和审计来自绿色能源供应商的请求，以决定这些申请是否可以被批准。如果申请获得批准，将会触发一个事件，显示项目 ID 和信用额度数量。


  为了申请碳信用额度，绿色能源供应商将首先创建一个 NFT 代币来表示该项目。这个 NFT 代币是唯一的，并指向项目记录。项目团队随后提交一份申请，其中包含二氧化碳减排量和所请求的碳信用额度的信息。与该项目相关的
  NFT 还将拥有一个统一资源定位符，指向记录该项目所有相关文档和报告的外部来源。一旦这些数据被写入区块链，就会触发一个 Claim 事件，通知审计员去审计申请中的信息。在申请被审计和批准后，机构会将碳信用额度转移到绿色能源供应商的账户。然后，供应商可以将
  CCT 资产发送到碳信用市场进行交易。


  在消费端，需要碳信用额度以满足配额的生产商或消费者将从市场购买碳信用额度。为购买 CCT 资产而支付给绿色能源供应商的加密货币，可用于扩大绿色能源供应商的工作，以生产更多的可再生能源。




  如需查看碳信用项目示例，请参阅以下仓库：


  [`github.com/masaun/tokenized-carbon-credit-marketplace/`](https://github.com/masaun/tokenized-carbon-credit-marketplace/blob/main/smart-contract/contracts/GreenNFT.sol)


  [`blob/main/smart-contract/contracts/GreenNFT.sol`](https://github.com/masaun/tokenized-carbon-credit-marketplace/blob/main/smart-contract/contracts/GreenNFT.sol)


  **代币分类学倡议**


  碳信用代币、太阳能代币、电力代币、零部件代币、系统代币和水资源代币均可归类为企业代币，并可使用更正式的定义进行设计。企业以太坊联盟和互联工作联盟等组织一直致力于**代币分类学倡议**（Token
  Taxonomy Initiative, TTI），以开发一套可形式化并用于对复杂企业用例中所有可识别资产进行代币化处理的代币框架。


  代币分类的基础设施与框架具有以下目标及关键特性：


  -   区块链无关性，即不依赖于针对不同区块链的`Solidity`、`Haskell`、`WASM`或`Java`编程语言

  -   业务人员和技术专业人士均能理解

  -   既可描述也可编程

  -   适用于企业和公共区块链的广泛使用场景

  -   力求易用性、改善互操作性、简化沟通，并实现更快、更安全的开发


  下图（图 10-2）展示了代币分类的层级结构。与在规范中定义并编码为智能合约的`ERC20`和`ERC721`不同，代币分类框架（Token Taxonomy
  Framework, TTF）将代币分为三个层级。第一层是模板层，用于定义代币的属性、公式和行为。代币模板可以是通用的，例如积分代币模板或库存代币模板。第二层是类层，为模板分配参数以创建代币类别。例如，积分代币模板可应用航空公司积分或酒店积分参数，从而创建航空公司积分代币类或酒店积分代币类。代币类随后可实例化为具体实例，例如达美航空或美国航空的航空公司积分代币。


  ***图 10-2.** 代币分类示例*


  在将本框架用于以太坊智能合约时，模板层类似于`ERC20`或`ERC721`规范。类层将`ERC20`智能合约扩展为航空公司积分代币或酒店代币。实例层则在部署期间通过代币智能合约的构造函数构造出具体的代币。


  `TTF`还为一个形式化的代币定义了若干基本属性，包括：


  **代币单位** —— 代币的单位，可为`Fractional`（可分割）、`Whole`（整体）或`Singleton`（单一）。

  `Fractional`意味着该代币可被分割为更小的单位。

  `Whole`意味着该代币不可分割，但可以存在多份复制。

  `Singleton`意味着该代币不可分割，且数量为`1`。


  **价值类型** —— 如果代币本身具有价值，其价值类型为`Intrinsic`（内在型）。如果代币代表某个具有价值的实物或数字物品，其价值类型为`Reference`（引用型）。


  **表示类型** —— 没有个体身份的代币称为同质化代币。拥有索引或序列号的代币称为非同质化代币。


  **模板类型** —— 模板描述了代币的基本特征。原始代币如`ERC20`或`ERC721`是单一代币。可以通过扩展基本代币来创建更复杂的代币。混合代币可以同时拥有一个父代币以及多个不同类型的子代币。


  除了上述基本属性外，`TTF`中定义的代币还可以具有行为属性，使其可铸造、可转移和可销毁。




  '
- '# 可转移性、可铸造性与可销毁性


  `可转移性`是指转移代币所有权的功能。`ERC20`和`ERC721`代币均具备可转移性。


  `可铸造性`是指发行同类新代币的功能。为毕业生创建新文凭就是铸造的一个示例。


  `可销毁性`是指从流通总量中移除代币的功能。某些项目可以销毁项目代币，以减少代币流通总量。


  从框架角度来看，`TTI`可能显得有些抽象。但实际上，它在构建通用工具（例如通过支持拖放功能的`GUI`来创建代币的代币设计器）时非常有用。开发者或用户无需为代币编写智能合约代码。当用户通过文本或`GUI`工具定义代币时，代码将自动生成。`TTI`的工作仍在进行中，目前尚未被接受为标准。


  #### 代币经济考量


  ##### 代币分配


  当设计并提出奖励代币时，需要将其授予对项目有所贡献的人员。通常需要考虑项目团队、资助者和社区等利益相关方。例如，`Filecoin`项目是一个基于区块链的去中心化存储网络。该项目团队在`IPFS`协议之上构建了持久化存储服务，允许数据用户使用`Filecoin`激励矿工提供长期数据存储和可用性。`Filecoin`代币被设计为同质化代币，采用如下饼图（图[10-3]）所示的比例进行分配。


  ![](img/index-404_1.jpg)


  **图 10-3.** Filecoin 代币分配


  对于`Filecoin`项目，创建的代币最大数量为 200 亿枚。其中 5%的代币分配给`Filecoin`基金会，用于促进`Filecoin`网络的治理、资助关键开发项目、支持`Filecoin`生态系统的发展，并推广`Filecoin`及去中心化网络。另有
  4.5%的代币分配给`Protocol Labs`团队及贡献者，10.5%分配给`Protocol Labs`公司。`Filecoin`项目将 10%的代币用于募资。大多数代币分配给矿工，用于支持存储挖矿奖励、区块奖励以及其他运营（如水龙头和存储激励）。最后
  15%的代币保留用于未来挖矿服务及奖励。


