  \ 10.1109/MC.2012.37\n\n## 第 3 章 区块链组件与架构\n\n区块链的四大组件协同工作，创造了缓解当前系统经济低效的巨大潜力，这些组件分别是：分布式账本、隐私保护、分布式系统共识算法以及智能合约。\n\
  \n**引言**\n\n区块链能够驱动巨大商业效益的核心能力包括：累积交易的分布式账本、拥有相同分布式账本副本并相互通信同步的计算机、限制身份仅向需要知道的人共享的隐私保护交易，以及将价值交换交易背后的条款编码到软件中，该软件可自动执行以确保交易有效完成。这些核心能力得益于来自密码学、数字签名、分布式系统以及对等网络的技术概念。\n\
