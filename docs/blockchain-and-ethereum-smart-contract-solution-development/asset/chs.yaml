  \n`Sriram Vishwanath`、`Karl Kreder` 博士、`Vijay Rathna` 先生和 `Anand Anandalingam` 教授曾在不同时期与我们共同讲授这门课程，我们从他们身上学到的经验也反映在了本书中。\n\
  \n本书得益于所有课程中那些富有创造力、学识渊博且勤奋努力的助教们的出色工作。这些助教包括：`Alan Orwick`、`Yihe Liu`、`Parikshit\
  \ Hegde`、`Cody Morton`、`Joseph Dowdall`、`Shubhangkar Jain`、`Roque Martinez`、`Ajay\
  \ Nyamati`、`Denzell Ford` 和 `Nicholas Khami`。`Shubhangkar` 花了大量时间帮助我们编写第 1 部分的测验题。\n\
  \n我们还受益于 `Matthew Vaughan`、`Jennifer Hoeritz` 和 `Joshua Shannon-Chastain` 提供的创新性教学设计支持。本书中的几幅图表看起来赏心悦目，这要归功于\
  \ `Nicholas Bonneau` 和 `Shohreh Anand` 博士提供的图形设计专业知识。\n\n我们还要感谢那些为建立有益的学术界与产业界联系提供了帮助的行业专家，正是这些联系让我们的教学内容能够跟上最前沿的区块链技术。`Ron\
  \ Resnick` 在开创代币分类学概念方面发挥了关键作用，我们在代币化章节中提到了这一点。`Conor Svensson` 提供了关于企业以太坊架构的深入讨论，我们在[第\
  \ 6 章](https://doi.org/10.1007/978-1-4842-8164-2_6)中探讨了这一点。`Jack Lu`、`Peter Robinson`、`Chaals\
  \ Nevile` 和 `Dan Reecer` 分享了他们对跨链技术的见解，我们相信这种技术将连接公共区块链和企业区块链。我们还要感谢 `Dan Burnett`\
  \ 博士、`Ken Fromm`、`James Harsh` 和 `Brittany Mauck` 组织了许多区块链研讨会和会议，这些活动加深了我们对区块链技术及其教育的理解。\n\
  \n我们相信，编写区块链教育书籍是一项繁琐的任务，没有家人的无条件支持是无法完成的。我们感谢他们的宽容、持续的支持和爱。\n\n"
- "# 第 1 章：区块链的商业与经济动机\n\n在我们的社会中，很难想象有哪个业务流程不是由计算机硬件、软件和网络的组合来支持、中介或完全自动化的。在本书中，计算机硬件、软件、网络以及数据与流程分析、用户体验设计和系统设计等相关学科统称为信息技术。已有研究证实信息技术对商业生产力具有广泛而积极的影响（Loveman,\
  \ 1993; Brynjolfsson, 1991）。在本章中，我们首先列举自 20 世纪 60 年代中期以来推动商业生产力提升的信息技术创新，目的是理解那些尚未受到影响的商业方面，因为这些正是区块链有潜力发挥作用的领域。\n\
  \n© Weijia Zhang and Tej Anand 2022  \nW. Zhang and T. Anand, *区块链与以太坊智能合约解决方案开发*,\
  \  \n<https://doi.org/10.1007/978-1-4842-8164-2_1>\n\n#### 引言\n\n我们认为，1964 年 4 月\
  \ IBM 大型机的发布（Cortada, 2019）标志着信息技术开始成为推动商业发展的主导力量。随后是 1970 年关系数据库管理系统的发明（Codd, 1970）、1976\
  \ 年以太网的发明（Metcalfe and Boggs, 1976），以及 1981 年个人电脑的诞生（Baldwin, 2019）。到了 20 世纪 90\
  \ 年代，两项自 60 年代中期以来一直在发展的技术...\n\n\n"
- '# 第 1 章 区块链的商业与经济动机


  `开始`在商业世界中变得可行并得以广泛采用。


  这些技术中的第一种是企业资源规划（`ERP`）软件，以 1992 年发布的`R/2`系统和 1999 年发布的`R/3`系统为代表，均由 SAP 公司推出（Thomson,
  2020）。第二种技术是我们如今无处不在的互联网。"互联网"一词于 1995 年被正式定义（Leiner 等人，1997），尽管当时互联网已经在商业化进程中。一些值得注意的早期创新企业包括雅虎和亚马逊（均成立于
  1994 年）、Netflix（成立于 1997 年）以及谷歌（成立于 1998 年）。


  从商业角度来看，这些技术集合提供了两种相互竞争的驱动力。大型机、关系型数据库管理系统和`ERP`软件似乎通过标准化和集中化来创造价值。另一方面，个人电脑和互联网则似乎通过去中心化来创造价值。随着企业采用这些技术，它们进行了符合自身世界观和文化的设计权衡，以求在集中化与去中心化的连续谱上找到最佳平衡点。成功采用`ERP`软件的企业，其商业价值源于明确企业的战略意图，然后不懈地重组业务流程和系统以匹配这一战略意图（Treacy
  and Wiersema, 1995）。成功采用互联网的企业，其商业价值同样源于明确战略意图，然后不懈地进行数字化、简化业务流程（类似于重组），并实现全球化，以提高利润率、降低成本并增加客户钱包份额（Porter,
  2001）。


  过去 30 年间，我们在多家企业中与这些技术打交道，即便历经这么多年，成功采用`ERP`软件和互联网仍然是一个进行中的过程。这两种技术也在迅速融合，`ERP`软件越来越多地以软件即服务（`SaaS`）的形式提供。在我们与企业合作采用这些技术的过程中，我们逐渐认识到关于这些技术的几个"不言而喻的道理"。


  首先，这些技术之所以取得成功，要么是因为它们保留了现有的权力结构，要么是因为它们创造了新的权力来源——这些来源起初看似平等，但最终变得高度集中且具有控制力。例如，`ERP`和互联网的实施都几乎未能改变企业与供应商或客户之间的权力动态。`ERP`系统通常专注于内部事务，为了获得高管支持并处理变革管理问题，它们往往强化了公司内部的现有权力中心。互联网最初通过创造透明度和信息获取渠道，让人感觉权力将转移给客户；然而，它最终却通过
  Facebook、亚马逊、谷歌、Uber 和 Airbnb 等集中化平台创造了新的权力来源。我们现在才刚刚开始应对这些新权力来源所带来的意外后果。


  其次，尚不清楚这些技术集合是否通过减少工作量来提高生产力。更明确的是，生产力的提高是通过将工作转移到成本更低的环境，或者通过简化（甚至自动化）信息流，或者通过让客户感觉自己拥有更多控制权而将工作转移给客户来实现的。


  第三，这些技术的目标是数据共享和信息交换，表面上是为了消除信息孤岛、促进互操作性并优化业务规划。尽管这是一个值得称赞的目标，也确实提升了运营效率，但其收益却不成比例地流向了供应链中最具实力的企业，因为



  他们规定了信息交换的形式。在此目标的背景下，各方之间也完全缺乏信任。这种缺乏信任导致企业创建了用于数据共享的管道，这些管道本身就是孤岛，同时企业还囤积自己专有的信息语义。在最好的情况下，这为一些企业带来了局部利益；在最坏的情况下，除了那些已经占据主导地位的企业外，这增加了所有其他企业的工作量和成本。


  第四点，或许也是最重要的一点，企业间缺乏信任导致企业目前使用的支付机制得以保留，尽管各方之间的连接性有所增强，结算时间略有改善。政府、银行和清算所的角色保持不变，这仍然是生产力提升的障碍，并导致非增值活动的成本增加。每当我们夸张地宣称互联网实际上并未改善支付效率时，我们的学生就会以`Venmo`、`PayPal`和`Square`等公司带来的改进来质疑我们。毫无疑问，这些公司确实做出了渐进式的改进；然而，如果揭开帷幕，我们会发现这些公司依赖的是那些一直存在的清算所和银行。像`Venmo`这样的公司之所以能制造出显著改进的印象，是因为这些公司在补贴消费者的费用。我们认为，一旦这些公司规模扩大、实现盈利并俘获消费者，这些补贴就会消失。


  我们认为，在看待区块链时，我们应该将前面讨论的四个“公理”牢记于心。比特币系统（Nakamoto，2008）引入了比特币这种数字货币，它是第一个为“双花”问题（Chohan，2021）提供可行解决方案的数字货币，也是一种在缺乏信任的各方之间、无需可信第三方即可实现结算的支付机制，还是一个为所有各方提供所有交易完整副本的分布式账本。尽管人们高度关注比特币的价格，但正是比特币所有三个特性的整合，才共同具备了解决企业资源计划系统和互联网都未能充分解决的“公理”的潜力。


  在本章中，我们首先简要介绍货币的历史。这将帮助我们理解为什么像比特币 2 这样的货币并非人们可能认为的那样异想天开，以及货币兑换中复杂性的来源是什么。然后，我们将抽象化我们的讨论，将整个经济视为价值的交换。这将帮助我们理解全球供应链中价值交换复杂性的来源。这些复杂性直接导致了当前经济体系中的低效率，而企业资源计划软件和互联网尚未充分解决这些问题。在本章结尾，我们将探讨为什么区块链有潜力解决这些经济低效问题，从而开创一个被称为
  Web3 的生产力新时代。


  **货币简史 3**


  为了理解货币的概念及其随时间的演变，我们从这样一个情景开始：一个人（个体#1）拥有某种商品的剩余，而另一种商品短缺。让我们假设有另一个个体（个体#2），个体#1
  认识他，他拥有个体#1 短缺的商品，并且短缺个体#1 所拥有的剩余商品。现在，为了解决他们的短缺问题，个体#1 愿意用一些数量（比如`x`）的剩余商品，与个体#2
  交换一些数量（比如`y`）的短缺商品。在我们的术语中，这种交换构成了一次**交易**，而完成此交易的条件则被视为一份**合同**。


