  一笔比特币交易由若干输入和若干输出组成。交易中的输入是我们钱包里打算花费的比特币，输出则描述了我们打算如何使用这些比特币。一笔交易的输出会成为后续交易的输入——这巩固了经济中价值交换的概念。稍后我们会介绍一种特殊类型的交易，它只有输出而没有输入。


  为了理解这种输入与输出的结构，我们以实体钱包中的现金为例。假设你的实体钱包里有两张五美元钞票、一张十美元钞票和一张一美元钞票。现在需要花费 17 美元。用比特币交易的结构来描述这笔交易，你将拥有三个输入：十美元钞票和两张五美元钞票。以你手头的钞票面额来看，这是唯一能凑够
