  \    d. 为什么计算机`\"Christopher\"`能够找到该密码的密钥？\n3.  对称密钥加密的优点和局限性是什么？\n4.  ______ 技术用于解决数字签名的局限性。\n\
  5.  `\"静态数据\"`、`\"传输中数据\"`和`\"使用中数据\"`分别指什么？\n6.  哪种加密技术最适合静态数据？\n7.  哪种加密技术最适合传输中数据？\n\
  8.  分布式系统如何实现容错性的目标？\n9.  在容错分布式系统中，需要克服哪两种不确定性？\n10. 分布式系统中计算机正常运行需要多高的准确度？\n \
