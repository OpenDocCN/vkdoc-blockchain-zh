  \n\n[`doi.org/10.1007/978-1-4842-8164-2_3`](https://doi.org/10.1007/978-1-4842-8164-2_3#DOI)\n\
  \n## 第 3 章：区块链组件与架构\n\n区块链的基本概念是`交易`。交易由一方发起，根据双方同意的条款和条件向一方或多方转移价值。通过利用互联网的点对点网络相互连接的计算机，在交易发起后会将该交易传达给所有计算机。每台计算机上的软件能够通过执行交易管控条款的软件编码版本，自主且独立地验证交易的有效性，将一组交易累积成一个`区块`，并将该区块传达给对等节点计算机，这些计算机可以将该区块连接到先前创建的区块，从而形成区块链。网络中的所有计算机都基于共同商定的规则进行工作，任何不遵循规则的计算机都能被轻易识别并忽略。\n\
  \n本章的目标是从概念和技术层面阐明区块链的四个组成部分：分布式账本、隐私、共识和智能合约。\n\n我们首先从概念和技术细节上描述交易的逻辑机制、区块创建的规则，以及区块如何与先前创建的区块链接。由此创建的区块链代表了区块链中的账本。这些规则代表了区块链网络所采用的共识机制，该机制用于保持所有对等节点计算机同步——从而真正使账本成为分布式账本。我们先通过一段叙述来描述人类同行进行的一系列交易，然后将这段叙述转化为技术层面的解释。\n\
  \n我们还将描述交易内部的结构如何对信息进行加密，以保护交易各方的隐私。最后，我们解释管控交易的条款和条件如何被编码在`智能合约`中。\n\n我们还将介绍区块链的分类方式，这种分类将区块链的实现置于一个从中心化到分布化的连续谱系中。本章将以关于区块链局限性的讨论作为结尾。\n\
  \n### 区块链组件的概念性概述\n\n在本节中，我们将通过分析一组说明性[¹]交易来从概念上描述区块链系统的各个组成部分，就好像这些交易发生在区块链上一样。\n\
  \n让我们从坎迪斯开始。坎迪斯决定出售她的许多漫威漫画。这些漫画深受孩子们喜爱，她预计许多朋友会想要购买其中一本。在此例中，为简化区块链的概念组件，我们假设坎迪斯和她的朋友们彼此知晓身份。当坎迪斯首次出售漫画时，她的朋友马可购买了它。我们假设坎迪斯的所有朋友都认识马可，并且他们都知道马可购买了这本漫画以及马可支付的价格。\n\
  \n从机制上讲，这可能是如何运作的呢？\n\n在这个例子中，我们假设坎迪斯和她的朋友们在整个漫画销售过程中保持相互沟通。他们每人持有一张特殊的纸张，用于记录坎迪斯待售漫画的每笔销售交易。他们还发明并商定了一种机制，用于确认每笔交易的有效性，并确保每个人都能正确地在自己那张纸上记录交易。他们可以采用的一种机制是——\n\
