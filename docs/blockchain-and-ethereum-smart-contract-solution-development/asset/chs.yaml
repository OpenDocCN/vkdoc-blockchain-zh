- '# 第 6 章 以太坊架构与概览


  ***图 6-6.** Remix 编译器*


  如图 6-6 所示，该 IDE 包含四个区域：左侧的图标面板、中间的侧面板、右上角的主面板以及左下角的终端。


  - **图标面板** – 显示文件浏览器、Remix 插件、插件管理器及常规设置图标。

  - **侧面板** – 选中插件时显示源代码文件及各插件的图形用户界面。

  - **主面板** – 显示每个智能合约的源文件内容。可在该面板中编辑源文件。

  - **终端** – 显示编译、部署及与区块链交互的结果。也可在该面板中运行脚本。


  '
- "# 第 6 章 以太坊架构与概览\n\n在 `Remix` Web 控制台中，您可轻松尝试以下任务：\n\n##### 任务 1：设置并安装插件\n\n`Remix\
  \ IDE`（集成开发环境）使用组件模型向系统添加基础功能及第三方插件。默认情况下，图标面板会激活并显示三个基础组件：文件浏览器、Solidity 编译以及部署与运行交易。这三个组件足以满足快速开发智能合约的需求。对于调试、安全扫描和可视化等其他操作，开发者可点击插件管理器图标，然后选择要激活的插件。\n\
  \n开发者可根据需要激活或停用插件。图标面板还包含一个设置按钮，点击后可打开设置页面，配置图形用户界面主题、源代码编辑器、GitHub 访问权限等。一旦插件被激活，开发者即可点击各个插件进行使用。\n\
  \n\n\n### 第 6 章 以太坊架构与概览\n\n在`icon`中，侧面板会显示相应插件的界面和 GUI 详情。\n\n**任务 2：浏览、编辑并编译智能合约**\n\
  \nRemix 在 Web 服务器中打包了一些示例智能合约。  \n点击`File Explorer`图标，打开智能合约浏览面板。智能合约的源文件可以创建为新文件，也可以从`Gist`、`GitHub`、`Swarm`、`IPFS`或`HTTPS\
  \ URL`等仓库导入。需要注意的是，如果源文件是从外部仓库导入的，修改后的文件不会写回原仓库，需要手动操作。例如，工作区可以作为`gist`发布到`GitHub`仓库中。对于`IPFS`、`HTTPS`和`Swarm`等其他仓库，则需要手动在\
  \ Remix 之外进行上传。\n\n要编译智能合约，首先浏览源文件，然后点击想要编辑的文件。文件内容会显示在主面板上。开发者可以使用内置编辑器直接修改源代码。文件编辑完成后，点击`Solidity\
  \ Compiler`按钮，这会在侧面板中启动一个编译器 GUI。在选择好 Solidity 编译器版本和 EVM 后，开发者可以点击`Compile`按钮开始编译。任何编译错误都会显示在编译器面板上，并提示开发者修改源代码以修复错误。一旦智能合约编译成功，就会生成字节码和`ABI`文件。\n\
  \n需要注意的是，修改后的源代码仅存储在浏览器中，需要额外步骤才能保存到永久存储。可以通过将文件下载到本地存储，或者将文件发布到`GitHub`存储中的新`gist`来实现。由于\
  \ Remix 浏览器没有持久化存储，如果浏览器数据被清除，编辑过但未下载或未发布的文件将会丢失。为了将 Remix 浏览器与持久化存储同步，需要将 Remix\
  \ 网页连接到本地存储。这可以通过在后台运行`remixd`来实现，它为 Remix 提供共享的持久化存储。\n\n**任务 3：部署智能合约并执行函数**\n\
  \n智能合约编译成功后，开发者可以使用“`deploy and run transactions`”插件来部署智能合约并运行交易。点击`Deploy and Run\
  \ transactions`图标后，部署 GUI 会提示开发者选择网络连接环境、部署账户、要部署的智能合约、Gas 费用等，如图 6-7 所示。\n\n![图\
  \ 6-7](img/index-253_1.jpg)\n\n**图 6-7.** Remix 编译器组件\n\n有三种部署环境：`JavaScript VM`、`injected\
  \ Web3`和`Web3 provider`。`JavaScript VM`是一种将 EVM 嵌入到 Remix 网页中的环境，是一个未实际连接区块链的模拟用例。这是部署和测试智能合约最简单的情况。`injected\
  \ Web3`环境使用`MetaMask`扩展，通过`MetaMask`配置将 Remix 与外部区块链连接。这种方式不使用 Remix，而是由`MetaMask`连接到区块链，并作为代理将智能合约部署到目标区块链。`Web3\
  \ provider`环境将 Remix 与一个 RPC 端点连接，将智能合约部署到该 RPC 服务器，然后广播到网络的其他部分。\n\n除了选择区块链网络环境，开发者还需要指定一个用于发送部署交易的账户。该账户需要有一些以太币来支付部署的\
  \ Gas 费用。该账户也将成为智能合约的所有者。还有其他一些杂项参数需要配置。`Gas limit`指定了交易可以消耗的最大 Gas 量。`Value`是……\n\
  \n\n\n`要发送到目标地址的代币`。对于智能合约部署，`Value`（价值）字段无关紧要，应设为零。所有参数正确设置后，点击`Deploy`（部署）按钮即可发送部署交易。某些智能合约的构造函数可能需要输入参数。这种情况下，需在`Deploy`按钮旁的输入字段中指定这些参数。\n\
  \n智能合约成功部署后，会返回一个地址，即智能合约地址。开发者可通过点击部署界面底部显示的地址来浏览区块链。部署的智能合约随后将显示变量名及其值、函数以及其他内部存储信息。开发者随后可向某个函数输入参数并执行该函数。调用智能合约函数时，开发者实际上是在发送一笔交易；因此，需要一个账户来支付交易费用，并且也需要指定交易参数。执行结果将显示在同一面板中，部分输出则显示在终端面板中。\n\
  \n## 第六章：以太坊架构与概览\n\n**总结**\n\n本章涉及三个主题：以太坊区块链概览、生态系统与去中心化应用，以及智能合约开发的基本工具。下一章将介绍\
  \ Solidity 编程与部署技术，讲解如何使用智能合约构建去中心化应用。\n\n"
- "# 第七章：使用 Solidity 进行智能合约编程\n\n**引言：上一章学习内容回顾**\n\n在上一章中，我们讨论了以太坊架构、生态系统和去中心化应用。我们还介绍了诸如\
  \ `MetaMask`、`Remix`、`Truffle` 和 `Geth` 等开发工具。在本章中，我们将学习用于智能合约和去中心化应用开发的详细 Solidity\
  \ 编程技巧。\n\n**什么是智能合约**\n\n智能合约是一个含义过载的短语。尽管对智能合约有不同解释，我们对其定义如下：\n\n>“智能合约是一种可执行的计算机程序，它运行在区块链上的以太坊虚拟机（`EVM`）中，用于访问和修改区块链块的状态。”\n\
  \n与通常运行在单个系统上的传统计算机程序不同，智能合约运行在区块链的每个节点上。\n\n© 魏佳·张 和 泰杰·阿南德 2022  \nW. 张 和 T. 阿南德，《区块链与以太坊智能合约解决方案开发》，[`doi.org/10.1007/978-1-4842-8164-2_7`](https://doi.org/10.1007/978-1-4842-8164-2_7)\n\
  \n第七章：使用 Solidity 进行智能合约编程\n\n对于以太坊而言，智能合约被编译为可执行的字节码并部署到以太坊区块链上。智能合约的字节码通过交易的数据字段发送。一旦该交易被包含在一个区块中，就会生成一个智能合约地址，字节码则存储在该地址中。要调用智能合约中的函数，需向该智能合约地址发送一笔交易，并通过交易的数据字段提供函数名称和输入数据。当调用智能合约的交易被发送至某个节点时，以太坊虚拟机将从智能合约地址加载字节码并执行该函数。\n\
  \n对于商业人士而言，智能合约定义了业务属性和处理逻辑，使多方能够执行并见证业务逻辑的处理过程，从而确保对所有参与方（当智能合约编写良好时）的透明度、可靠性、容错性、不可篡改性和完整性。\n\
  \n智能合约与独立的计算机程序不同，因为它们存在于所有机器上，且所有参与方都能访问该智能合约，从而受益于区块链的透明度、可靠性及其他优势。\n\n但这仅适用于智能合约编写良好的情况。如果智能合约编写不佳，则所有这些优势都将不复存在。\n\
  \n\n\n```markdown\n对于技术人员而言，智能合约是一种计算机程序，可以在区块链上进行编码、编译、测试、部署和执行。\n\n从技术角度来看，“智能合约”这个短语可能指代几种不同的事物。\n\
  \n首先，它可以指智能合约的源代码。其次，它可以指编译后的智能合约字节码。第三，它可以指部署在区块链上的智能合约。\n\n当智能合约被编译时，会生成两个文件：一个字节码文件和一个`ABI`（应用程序字节码接口）。智能合约的字节码可以部署到以太坊区块链，并由以太坊虚拟机执行。`ABI`代码是对智能合约的定义和描述，而非可执行代码。第三方应用程序使用`ABI`文件来解析已部署的智能合约中定义了哪些函数，以及如何与它们交互。\n\
  \n当智能合约被“部署”到区块链时，会通过计算发送者地址和交易随机数（使用递归长度前缀（`RLP`）序列化编码）的`Keccak-256`哈希值来生成一个智能合约地址。智能合约也可以部署到不同的区块链，例如测试网或主网。同一个智能合约地址可能指向不同的区块链。\n\
  \n重要的是要知道，“智能合约”在不同的场景和上下文中被使用。在接下来的章节中，我们将详细介绍智能合约编程。\n\n#### Solidity 编程语言是什么\n\
  \n`Solidity`是最流行的以太坊智能合约编程语言。`Solidity`源代码可以使用简单的文本编辑器或通过`Remix`或`Microsoft Visual\
  \ Studio`等`IDE`进行编辑。为了让`Solidity`代码在以太坊节点上运行，需要完成几件事情。\n\n首先，源代码需要被编译成可以被以太坊虚拟机（`EVM`）解释和执行的字节码。其次，你需要将智能合约字节码部署到区块链或`EVM`模拟器上以便执行。\n\
  \n字节码是一种可以由以太坊虚拟机执行的程序。字节码程序包含每一步的操作数、数据和存储。`EVM`引擎解释每一步的指令并执行这些指令。\n\n如第[6](https://doi.org/10.1007/978-1-4842-8164-2_6)章所述，`Remix`是一个基于网页的集成开发环境（`IDE`），因此开发者可以在`remix.ethereum.org`这个`URL`指定的网页上编写代码。这对于练习智能合约的编写、编译和测试非常方便。第[6](https://doi.org/10.1007/978-1-4842-8164-2_6)章已经介绍了`Remix`，本节将重点介绍如何编写`Solidity`程序。\n\
  \n#### 模块 1：Hello World Solidity 示例\n\n让我们来看第一个示例，`HelloWorld.sol`，如下所示：\n\n```solidity\n\
  /**\n * *SPDX-License-Identifier: MIT*\n * *@title HelloWorld*\n * *@dev Implements\
  \ the hello world program*\n */\n\npragma solidity >=0.7.0 <0.9.0;\n\ncontract HelloWorld\
  \ {\n    string helloworld = \"Hello World\";\n\n    function justHelloWorld() public\
  \ view returns(string memory) {\n        return helloworld;\n    }\n\n    function\
  \ showHelloWorld(string memory me) public view returns(string memory) {\n      \
  \  string memory result = string(abi.encodePacked(helloworld, \" from \", me));\n\
  \        return result;\n    }\n}\n```\n\n在这个`helloworld.sol`示例中，首先是一些注释，描述了该智能合约的内容，然后是实现了两个函数的`HelloWorld`智能合约。第一个函数`justHelloWorld()`简单地输出字符串“HelloWorld”，第二个函数接受一个名为“me”的输入变量，然后输出“HelloWorld\
  \ from [me]”。这个简单的智能合约可以在区块链上编译、部署和执行。接下来，我们将描述智能合约`Solidity`代码的语法。\n\n##### Solidity\
  \ 注释\n```\n\n\n##### 注释在 Solidity 中的使用\n\n注释在 Solidity 中被广泛使用，以确保程序员和需要使用并信任智能合约的第三方用户能够清晰理解智能合约。Solidity\
  \ 支持两种注释。\n\n第一种是双正斜杠 `//`，用于注释整行或行尾部分，如下所示。\n\n```\n// 这是注释整行\nreturn \"Hello World\"\
  ; // 这是注释行尾部分\n```\n\n第二种语法是用 `/*` 和 `*/` 将文本括起来以注释整个段落。为了提高可读性，被注释段落中的每一行都可以以 `*`\
  \ 开头。\n\n```\n/**\n * HelloWorld 程序演示了一个简单的智能合约，\n * 当调用 HelloWorld 函数时返回一个 \"Hello\
  \ World\" 字符串。\n * 这是一个开源程序，无需许可即可复制或修改。\n */\n```\n\n##### Solidity 程序与版本声明\n\n\
  Solidity 源代码以 `pragma` 编译器指令开头，后跟 `solidity`，然后是版本规范。编译器指令是指导编译器解析并执行特定操作的指令。关键字\
  \ `pragma solidity` 指示编译器将源代码视为 Solidity 编程语言。\n\n```\n// pragma: 告知编译器编程语言和编译器版本\n\
  pragma solidity ⁰.5.2;\n\n// 指定确切的次版本号\npragma solidity >0.5.2;\n\n// 指定更新的版本\n\
  pragma solidity >0.5.2, <0.6.2; // 指定一个范围\n```\n\nSolidity 编程语言版本采用 `x.y.z` 格式，例如\
  \ `0.8.10`。其中，`x`、`y`、`z` 是可以包含 `0` 的数字。`x` 是主版本号，`y` 是次版本号，`z` 是补丁号。为了方便起见，由于 Solidity\
  \ 中的 `x` 长期以来一直是 `0`，因此 `y` 被称为“主版本”，`z` 被称为次版本。\n\nSolidity 语言版本部分可以有多种形式，例如以下：\n\
  \n```\n~0.5.0   // 表示与 Solidity 精确匹配。\n⁰.5.0   // 表示主版本匹配。此版本适用于任何 0.5.z，但不适用于 0.4.z\
  \ 或 0.6.z。\n>0.5.2;  // 指定更新的版本。此版本适用于任何比 0.5.2 更新的版本。\n>=0.5.2, =<0.6.2; // 指定一个版本范围。可以选择任何大于或等于\
  \ 0.5.2 但小于或等于 0.6.2 的版本。\n```\n\nSolidity 中的版本控制至关重要，因为 Solidity 程序在区块链上运行，一旦部署就无法更新或修补到更新的版本。\n\
  \n对于开发者来说，Solidity 版本可能会出现几个问题。由于智能合约无法升级或替换，因此确保源代码以其“最佳”版本编写非常重要，如下所示。\n\n-  \
  \ **确切的最新版本**：这是推荐的选项。但是，尽管建议指定确切的版本号，但在某些情况下需要灵活性以解决与其他库的兼容性问题。\n-   **确切的旧版本**：当代码与最新的编译器不兼容，并且将其移植到最新编译器需要太多精力时使用。\n\
  -   **支持主版本**：这提供了更大的灵活性，特别是当代码范围有限并且可以作为各种版本智能合约的库使用时。\n-   **指定版本范围**：当代码本身包含各种版本的库，并且智能合约并非关键任务时使用。\n\
  \n牢记 Solidity 编程正在不断发展，其语法也随着不同版本而变化，这一点非常重要。有时，开发者可能拥有适用于版本 `0.5` 的源代码，但在版本 `0.8`\
  \ 下编译失败。因此，关注 Solidity 源代码或库的版本兼容性是一个好习惯。\n\n##### 导入 Solidity 文件\n\n在 Solidity\
  \ 和版本声明之后，通常有一个 `import` 语句，用于将外部 Solidity 文件拉入源代码。\n\n\n\n##### Solidity 基础\n\n\
  `Solidity` 是一种面向对象编程语言，且非常模块化。开发者将源代码分离到不同文件和库中，并将所需文件导入到主源代码中。\n\n许多 `Solidity`\
  \ 智能合约是开源的，开发者可以直接从开源仓库导入库。最流行的开源智能合约库之一是来自 `OpenZeppelin` 的库（[`github.com/OpenZeppelin/openzeppelin-contracts`](https://github.com/OpenZeppelin/openzeppelin-contracts)）。诸如\
  \ `SafeMath`、`ERC20`、`ERC721`、所有权和预言机等代码都可以从 `OpenZeppelin` 复用。\n\n#### 导入源文件\n\n\
  要导入另一个源文件，只需使用以下格式：\n\n- `import filename` – 这将从本地目录导入一个文件。\n- `import full_filename_with_path`\
  \ – 这将通过绝对路径导入一个文件。\n- `import github_location` – 此语法将从 `GitHub` 位置导入一个文件。\n\n你还可以导入文件并为其指定一个简单的引用名称，例如：\n\
  \n`import filename as XYZ`：这里，`XYZ` 可用于引用所导入的特定智能合约。\n\n#### 构造函数\n\n构造函数是一种在智能合约部署期间执行的特殊函数。它用于定义在部署阶段分配的参数，或运行算法以根据部署环境动态设置某些参数。\n\
  \n#### 函数修饰器\n\n函数修饰器类似于宏，它被定义一次后可用于多个函数。例如，以下是一个检查交易发送者是否为所有者的修饰器。如果是，则验证通过；如果不是，则抛出异常。`_`\
  \ 符号是函数代码将被插入并执行的位置。\n\n```\nmodifier onlyOwner {\n    require(msg.sender == owner);\n\
  \    _;\n}\n```\n\n```\nfunction setMessage(string memory str) onlyOwner {\n   \
  \ //Do_Something\n}\n```\n\n在上述代码中，`setMessage` 函数带有一个修饰器，用于检查发送者是否为智能合约的所有者。如果是，则\
  \ `Do_Something` 代码将在 `require` 语句之后的 `_` 位置执行。修饰器的最佳用途是简化智能合约中多个函数的冗余代码。一旦定义了修饰器，它就可以在任何地方使用。\n\
  \n#### 区块链访问范围：纯/视图/可支付函数\n\n定义函数时有多种范围和权限。函数的范围描述了函数在数据是否可修改以及可访问哪些数据方面的边界。\n\n\
  - 如果函数被定义为 `pure`，则它是一个自包含函数。函数变量是局部的，函数不会访问区块链。它仅接收输入、处理并返回输出。`pure` 函数不依赖于区块链状态。\n\
  - 对于 `view` 函数，它可能访问区块链并从区块链获取一些只读数据以进行计算。`view` 函数不会改变区块链的状态。\n- 对于 `payable` 函数，区块链状态可以被改变。对于任何将引发资产转移的函数，都应为该函数和地址分配\
  \ `payable` 类型。\n\n关于 `pure`、`view` 和 `payable` 函数的一个常见问题是它们是否都消耗 `Gas` 费用。显然，`payable`\
  \ 函数总是消耗 `Gas` 费用，因为它改变了区块链状态。对于 `view` 函数，它仅检索区块链数据，而 `pure` 函数甚至不访问区块链状态。关于 `pure`\
  \ 和 `view` 函数是否消耗 `Gas` 的问题取决于函数的调用方式。如果 `pure` 和 `view` 函数是通过交易调用的，则交易会产生 `Gas`\
  \ 费用，因为运行该函数会消耗 `CPU` 时间。如果 `pure` 和 `view` 函数不是通过交易调用的，则不会产生 `Gas` 费用。\n\n\n\n\
  #### 降低 Gas 费用的函数特性\n\n没有任何 Gas 费用。可以通过直接连接客户端到以太坊节点、实例化本地节点中的智能合约对象并直接调用函数的方式来调用`pure`和`view`函数。直接调用智能合约函数不会生成交易。该操作可以由本地节点完成，而无需产生\
  \ Gas 费用。因此，关于`pure`或`view`函数是否消耗 Gas 的问题，答案取决于函数调用是否涉及交易。任何由交易触发的函数调用都会产生 Gas 费用。Gas\
  \ 费用可以通过 EIP-1559 中的 Gas 费用消耗表进行计算。\n\n#### 函数访问范围：`public`、`external`、`internal`\
  \ 和 `private`\n\n函数的访问范围定义了谁可以访问这些函数。这与`view`/`pure`/`payable`函数类型不同，后者定义了函数是否会访问区块链，以及如果访问，是读取还是写入区块链。\n\
  \nSolidity 函数有四种访问范围：`public`、`external`、`internal`和`private`范围。`public`函数意味着您可以从外部区块链客户端调用此函数。如果某个函数需要通过\
  \ Web3 客户端调用，则将其定义为`public`。`external`函数可以被另一个智能合约调用。Solidity 支持导入外部智能合约并调用在其他智能合约中定义的函数。调用外部智能合约的语法是`contractName.functionName()`。如果同一个智能合约调用`external`函数，请使用`this.functionName()`来引用同一合约内的调用。\n\
  \n`internal`函数可以被同一智能合约或派生智能合约中的其他函数调用。最后，`private`函数只能被同一智能合约中的函数调用，这是限制最严格的范围。\n\
  \n第七章 使用 Solidity 进行智能合约编程\n\n#### 模块 2：Solidity 数据类型\n\n数据类型是数据的一种支持格式和分类，它告诉编译器和执行引擎如何解释编程语言。与任何现代编程语言类似，Solidity\
  \ 拥有一套良好的支持数据类型。通常，理解数据类型有助于程序员提高代码安全性和执行效率。对于 Solidity，了解和关注数据类型还有额外的原因。首先，调用智能合约函数的用户需要为计算步骤的存储和处理支付\
  \ Gas 费用。Gas 消耗可能相当昂贵，对于以太坊主网交易，有时每笔交易达到 200 美元。其次，智能合约函数对全世界开放。任何人都可以调用智能合约的`public`函数。如果变量的数据类型定义不当（例如分配了过多空间），恶意用户可能会向数据注入垃圾信息，导致性能问题甚至使智能合约函数调用的进程停滞。第三，与\
  \ Java 编程语言相比，Solidity 仅支持有限的数据类型。`double`和`float`等数据类型在 Solidity 编程语言中不受支持。\n\n\
  ##### `bool`（布尔类型）\n\n布尔是编程语言中最简单的数据类型。它仅使用一个存储位来表示变量的`true`或`false`状态。在 Solidity\
  \ 中，可以使用`bool`关键字将变量声明为布尔类型，如下所示：\n\n```solidity\nbool new_member;\n```\n\n以下是一些可以应用于布尔数据类型的逻辑运算符：\n\
  \n- `!`（逻辑非）\n- `&&`（逻辑与，即“且”）\n- `||`（逻辑或，即“或”）\n- `==`（等于）\n- `!=`（不等于）\n\n使用布尔数据类型时，感叹号`!`可以用于对布尔类型进行取反。取反操作将`true`状态变为`false`，将`false`状态变为`true`。对布尔类型的其他操作可以是`&&`或`||`。两个布尔类型的`&&`操作仅在两者都为`true`时为`true`。`||`操作则在至少一个为`true`时为`true`。\n\
  \n\n\n##### 布尔类型\n\n对两个布尔类型变量进行或运算，如果其中任意一个变量为真，则结果为真。\n\n两个布尔变量也可以进行比较。如果两个布尔变量同为真或同为假，则它们相等。有时，可以在\
  \ `if` 语句中对布尔变量进行条件判断。`If(variable)` 在变量为真时返回 `true`，在变量为假时返回 `false`。\n\n由于布尔变量仅占用一个比特的存储空间，且存在多种可用于操作布尔变量的运算，建议开发者在可能的情况下优先使用布尔类型而非其他数据类型，以提高存储效率。\n\
  \n##### 整数类型\n\n整数数据类型用于表示正整数（无符号）或任意整数（有符号）。在 Solidity 中，有符号或无符号整数可以有不同的尺寸，具体由分配给整数变量的比特位数决定。例如，`uint8`\
  \ 表示一个 8 位无符号整数，其取值范围为 0 到 `2⁸-1`（即 0–255）。`uint256` 的取值范围为 0 到 `2²⁵⁶-1`。在 `uint8`\
  \ 和 `uint256` 之间，还存在多种以 8 比特（1 字节）为增量递增的整数数据类型。有符号数据类型与无符号数据类型的不同之处在于，它可以表示正数和负数。例如，`int8`\
  \ 的取值范围为 -128 到 127（即 `-2⁷` 到 `2⁷-1`）。`int256` 的取值范围为 `-2²⁵⁵` 到 `2²⁵⁵-1`。`int` 也可以有以\
  \ 8 比特为增量步长的各种尺寸，例如 `int8`、`int16`、`int24`、`int32`，一直到 `int256`。\n\n如果整数类型未指定比特位数，则默认为\
  \ 256 位。`uint` 和 `int` 分别是 `uint256` 和 `int256` 的别名。\n\nSolidity 还内置了用于整数类型变量的运算符。如下表（图\
  \ 7-1）所示：\n\n***图 7-1.** 整数数据类型的运算符*\n\n由于智能合约可用于处理大量资产，确保数学运算完全准确至关重要。应对边界条件和输入的有效性进行彻底检查。许多库已被编写出来，以便开发者重用数学组件，并防止黑客通过数学函数中的安全漏洞攻击智能合约。例如，`SafeMath`\
  \ 是一个用于处理数学运算的优秀库。开发者可以下载 OpenZeppelin 的 `SafeMath` 库，然后导入该智能合约以使用库中的类和函数。\n\n#####\
  \ 地址类型\n\n地址是区块链中加密账户的唯一标识符。地址类型是一种在 C 或 Java 等传统编程语言中未定义的数据结构，但在智能合约编程语言中至关重要。以太坊区块链使用\
  \ 20 字节的十六进制值来表示加密地址。\n\n当你在以太坊中创建账户时，会生成三项内容。第一项是私钥，这是访问账户的唯一密钥，应由账户所有者保管，且绝不能向他人透露。第二项是公钥，用于代表该账户，可以公开。公钥可用于加密消息，且只有私钥才能解密该消息。第三项是从公钥派生出的地址。地址实际上是公钥的简化形式。只需对公钥应用\
  \ `Keccak-256` 哈希运算，然后取最后 20 个字节，输出结果即为该账户的地址。由于每个字节可表示两个十六进制数字，因此它实际上是一个 40 位的十六进制字符串，例如\
  \ `0x1F2D3A67b8E96039BbAC84EB4BC0913c0c16778c`。\n\n在 Solidity 代码中，地址数据类型是资产账户的表示形式。在声明地址变量时，开发者需要指定该地址是否可以接收外部资金。这可以通过使用关键字\
  \ `payable` 来实现。\n\n如果将地址声明为 payable，则该地址可以接收发送到该地址的资金。\n\n\n\n`address`。否则，智能合约将拒绝任何发送到该账户的资金。`payable`关键字是一种额外的保护措施，以确保只有有效的账户才能接收转入的资产。\n\
  \n下面展示了如何定义一个不可支付和可支付的地址示例。\n\n```\n// address type is a twenty byte hex variable\n\
  address account_spending;\naccount_spending = 0x1F2D3A67b8E96039BbAC84EB4BC0913c0c16778c;\n\
  address payable account_receiving;\naccount_receiving = 0xDda897285Ce46CG78D786a9e993286AaC68c45bC;\n\
  ```\n\n在前面的示例中，定义了两个地址变量。第一个是`account_spending`，它是一个不可支付的账户。该账户不能用于接收任何资金，但可以从其自身账户发送资金。第二个名为`account_receiving`的变量具有`payable`属性，因此可以发送或接收该账户的资金。\n\
  \n另外需要指出的是，`address`不仅可以作为账户的标识，还可以指向一个智能合约实例。智能合约地址是已部署智能合约的入口点。此地址可用于表示已部署的智能合约，并调用该智能合约内部的函数。\n\
  \n**字节数组**\n\n字节数组（图 7-2）使用数组来表示从 1 到 32 字节的固定长度字节。以下定义了各种类型的字节数组以及可应用于该数组的位运算。\n\
  \n*图 7-2. 字节数组数据类型*\n\n注意：\n`byte`等同于`byte1`。\n\n要定义一个字节数组，请使用以下语法：\n\n```\nbyte1\
  \ b1;\nbyte2 b2;\nByte32 b32;\n```\n\n在前面的示例中，`b1`、`b2`和`b32`分别代表一个 1 字节、2 字节和 32\
  \ 字节的变量。\n\n要检索字节数组变量`x`的元素，请使用`x[i]`，其中`i`的范围从 0 到字节大小，以获取索引`i`处的字节。\n\n下图展示了字节数组的操作（图\
  \ 7-3）。\n\n*图 7-3. 字节数组操作*\n\n**固定大小数组**\n\n固定大小数组是任意数据类型的索引数组，例如：\n\n```\ndata_type\
  \ array_name[array_size]\n```\n\n此处，`data_type`是任何数据类型，如`uint`、`address`和`byte`，例如：\n\
  \n```\nuint balances[30]; // 一个固定大小的无符号整数数组\naddress students[25];\n// 一个地址数组，存储\
  \ 25 名学生的账户地址\n```\n\n固定大小数组可以在声明期间通过赋值数据值来初始化，或者稍后通过为变量元素赋值来初始化。\n\n```\nuint balances[5]\
  \ = [10, 20, 30, 40, 50]; // 声明一个无符号整数类型的 balances 数组，并为每个元素赋值。\nuint balances[]\
  \ = [10, 20, 30, 40, 50]; // 声明一个无符号整数类型的 balances 数组，并为每个元素赋值。数组大小被省略，其大小等于赋给数组的值的数量。\n\
  ```\n\n要为数组元素赋值，只需使用以下语法：\n\n```\narray_name[index] = data_value;\n```\n\n此处，`array_name`是数组变量名，`index`是数组元素的索引，`data_value`是赋给该元素的值。示例如下：\n\
  \n```\nbalances[3] = 300; // 将值 300 赋给 balances 数组的索引 3。\n```\n\n**动态大小数组**\n\n\
  在 Solidity 中，数组具有连续的内存地址。第一个元素指向最低地址，最后一个元素指向最高地址。对于固定大小数组，数组的大小在编译时设置。对于动态大小数组，数组大小在运行时设置。要声明一个动态大小数组，请使用以下语法：\n\
  \n```\ndata_type[] array_name;\n```\n\n此处，`data_type`是数据类型的名称，如`uint`和`address`。`array_name`是数组变量名，如`balances`和`students_addresses`。\n\
  \n```\nuint[] balances;\naddress[] students_addresses;\n```\n\n\n\n##### 动态数组\n\n\
  声明动态数组时，需要在代码执行时为其设置一个长度值。\n\n设置数组长度时，使用以下语法：\n\n`array_name = new data_type[](size);`\n\
  \n此处，`array_name`是数组变量名，`data_type`是数据类型名，`size`是一个表示目标数组大小的`uint`类型值。例如，前面提到的数组变量可以设置如下长度：\n\
  \n```\n*balances = new uint[](9); // 将 balances 数组大小设置为 9*\n*students_addresses\
  \ = new address[](10);*\n*// 将 students_addresses 数组大小设置为 10*\n```\n\n##### 映射数据类型\n\
  \n除了`address`数据类型，另一个重要的类型是`mapping`类型。`Mapping`数据类型像关联数组一样关联两个变量。由于它能关联两个或多个变量，因此是一种重要的数据类型。\n\
  \n要声明映射类型，请使用以下语法：\n\n`mapping(key_type => value_type)`\n\n`key_type`可以是任何基础类型，例如`uint`、`address`、`bytes`和`string`等内置类型。`key_type`也可以是用户自定义或复杂类型，如合约类型、枚举、映射、结构体以及任何数组类型。`value_type`可以是任何类型，包括映射。\n\
  \n以下定义了一个将地址数组与每个数组元素的余额进行映射的映射：\n\n```\n*address student_address;*\n*uint score;*\n\
  *mapping(student_address => score) public scores;*\n```\n\n上述示例将`student_address`定义为`address`数据类型，将`score`定义为`uint`类型。然后将`student_address`映射到`score`。要为某个学生分配成绩，请使用以下语法示例：\n\
  \n```\nstudent_1_address = *0x1B2E2A67b8E96039BbAC84EB4BC0913c0c16668D;*\n*score_1\
  \ = 90;*\n*scores[student_1_address] = score_1;*\n// 此示例将学生 1 的成绩设置为 90。\n```\n\n\
  要获取学生 1 的成绩，只需将该学生的地址输入到`scores`变量中：\n\n`scores[student_1_address] // 这将返回 90。`\n\
  \n`mapping`是一种多功能的数据类型，它能在没有预定义大小的情况下关联两个变量。这在智能合约中经常使用。\n\n##### 枚举数据类型\n\n`Enum`是一种数据类型，它枚举一个变量，使其只能拥有一些预定义的值。通过限制`enum`变量中的值，可以减少出错的可能性。\n\
  \n定义`enum`的语法是：\n\n`enum enum_type_name{VALUE_LIST};`\n\n这里，`enum`是数据类型关键字，`enum_type_name`是`enum`类型的名称。`VALUE_LIST`是一个由逗号分隔的值列表。\n\
  \n一旦定义了`enum`类型，就可以用它来声明一个`enum`变量：\n\n`enum_type_name variable_name;`\n\n例如，为了限制去中心化组织的角色，`role`变量可以是一个`enum`数据类型，如下所示：\n\
  \n```\n*enum DAO_ROLES{SECRETARY, ACCOUNTANT, LEGAL, MEMBER};*\n*DAO_ROLES newMember;*\n\
  *newMember = DAO_ROLES.MEMBER;*\n```\n\n在前面的示例中，`DAO_ROLES`被声明为一个枚举，它可以拥有值`SECRETARY`、`ACCOUNTANT`、`LEGAL`和`MEMBER`。然后使用`DAO_ROLES`声明了一个变量`newMember`。这个新成员被赋予了一个值`DAO_ROLES.MEMBER`。\n\
  \n通过使用`enum`，它可以将变量的值限制在一个有限的列表中，因此更不容易出错。\n\n下面展示了一段代码片段，用以说明如何使用`enum`来定义变量：\n\
  \n```\n*pragma solidity ⁰.6.0;*\n*contract enum_example {*\n\t*enum DAO_ROLES{ SECRETARY,\
  \ ACCOUNTANT, LEGAL, MEMBER};*\n\t*// 定义一个枚举类型*\n\t*DAO_ROLES latestMember; // 定义一个枚举变量*\n\
  \t*function setRoleSECRETARY() public { // 声明一个函数*\n\t*将 latestMember 设置为 SECRETARY\
  \ 角色*\n\t\t*latestMember = DAO_ROLES.SECRETARY;*\n\t*}*\n\t*function getRole() public\
  \ view returns (DAO_ROLES)*\n\t*{ // 查询最新成员的角色*\n\t\t*return latestMember;*\n\t\
  *}*\n*}*\n```\n\n##### 结构体数据类型\n\n`Struct`是结构体的缩写。与其他编程语言中的结构体类似，Solidity 支持`struct`数据类型来将多个变量组合在一起。这些变量可以拥有不同的类型。\n\
  \n\n\n##### 数据类型\n\n结构体变量类型通过以下语法定义：\n\n```\nstruct 结构体类型{\n    数据类型 _1 变量 _1;\n\
  \    数据类型 _2 变量 _2;\n    ...\n}\n```\n\n其中，`struct_type` 是要定义的结构体名称。`datatype_1`、`datatype_2`\
  \ 等均为 Solidity 原生支持或用户自定义的数据类型。\n\n以下展示了一个定义结构体的示例：\n\n```\nenum Experience{ENTRY,\
  \ JUNIOR, SENIOR, EXPERT};\nenum Skillset{SOLIDITY, PROTOCOL, BOTH};\nstruct Developer\
  \ {\n    address addr;\n    Experience level;\n    uint hourly_rate;\n    Skillset\
  \ skill;\n}\nDeveloper guru1;\n```\n\n在上述示例中，定义了一个名为 `Developer` 的结构体，它包含四个组成部分：开发者的账户地址、经验等级枚举、`uint`\
  \ 类型的时薪以及 `enum` 类型的技能水平。变量 `guru1` 被声明为 `Developer` 结构体类型的变量。\n\n若要访问结构体中的成员，需使用“`.`”符号。例如，为上述示例中的\
  \ `guru1` 赋值，应执行以下操作：\n\n```\nguru1.address = 0x1B2E2A67b8E96039BbAC84EB4BC0913c0c16668D;\n\
  guru1.level = Experience.EXPERT;\nguru1.hourly_rate = 80;\nguru1.skil = Skillset.SOLIDITY;\n\
  ```\n\n除了像上面这样逐一设置值之外，还可以通过结构体构造函数来为结构体变量赋值，如下所示：\n\n```\nguru1 = Developer(0x1B2E2A67b8E96039BbAC84EB4BC0913c0c16668D,\n\
  \    Experience.EXPERT,\n    80,\n    Skillset.SOLIDITY\n)\n```\n\n如果有多个开发者，例如 `guru1`、`guru2`\
  \ 和 `guru3`，则可以使用映射与结构体的组合。例如，可以将一个 `uint` 映射到一个 `Developer` 结构体，以引用一个开发者列表：\n\n\
  ```\nmapping(uint=>Developer) developers;\n```\n\n在这里，`developers` 是一个映射变量。每个开发者可以分别被引用为\
  \ `developer[0]`、`developer[1]` 等。\n\n映射与结构体的组合能够提供非常复杂的数据类型，可以解决 Solidity 编程中的大部分数据类型处理任务。\n\
  \n总而言之，Solidity 提供了一种以结构体形式定义新类型的方法。以下代码片段展示了包含地址和捐款金额的 `Donor` 结构体示例：\n\n```\n\
  contract Charity {\n    // 定义一个包含两个字段的结构体\n    struct Donor {\n        address addr;\n\
  \        uint donation_amount;\n    }\n    // 定义一个映射\n    mapping (uint =>Donors)\
  \ donors;\n    //...\n}\n```\n\n##### 区块链特定变量\n\n智能合约经常需要从区块链本身获取信息，并在函数中使用区块链数据。Solidity\
  \ 实际上定义了一些全局变量来引用区块链状态和交易数据。常见的全局变量和函数如下表所示（图 7-4）。主要包含两个主要变量：`msg`（消息全局变量）和 `block`（区块链变量）。\n\
  \n***图 7-4.** 特殊的区块链变量与函数*\n\n上表中列出的大多数全局变量是自解释的。但有少数几个变量需要进一步澄清。\n\n`msg` 变量主要定义了交易中的参数和数据。每次向以太坊区块链发送交易时，智能合约都可以引用\
  \ `msg` 对象来提取以下信息：\n\n- `msg.value` —— 这是发送给接收方的以太币数量，以 wei 为单位。\n- `msg.data` ——\
  \ 这是交易中的数据字段，是发送到智能合约进行处理用户输入数据。\n- `msg.sig` —— 这是发送交易者的签名。\n- `msg.sender` ——\
  \ 这是发送者的地址。检查发送者地址非常重要，以确保发送者有权对智能合约函数执行操作。\n- `block.blockhash` —— `block.blockhash`\
  \ 是一个特殊函数，它接受一个区块编号并输出该区块的哈希值。\n- `block.difficulty` —— 输出区块链挖矿的难度。\n\n\n\n#####\
  \ Solidity 中的全局变量与事件\n\n##### 全局变量\n\n`block.gaslimit` – 定义最新区块的燃料限制。\n\n`block.number`\
  \ – 最新的区块编号。\n\n`gasleft()` – 返回交易剩余的燃料量。\n\n`now` – 当前时间戳。\n\n另一个全局变量是 `tx`，专门用于表示交易。\n\
  \n`tx.gasprice` – 显示交易的燃料价格。\n\n`tx.origin` – 交易的原始发送者。在单次函数调用中，它与 `msg.sender`\
  \ 相同。\n\n#### 模块 3：事件\n\n##### 什么是以太坊事件\n\n以太坊事件是重要的概念，与如何传递智能合约状态以及如何与外部程序通信相关。事件类型是\
  \ Solidity 编程语言内置的一种智能合约可继承成员。Solidity 提供了定义事件格式和触发事件的语法。\n\n##### 事件存储在何处\n\n一旦事件被触发，相应的事件数据就会存储在交易日志中。事件数据是传递给\
  \ `emit` 事件函数的参数列表。外部程序可以通过智能合约地址访问这些交易日志。尽管事件存储在交易日志中，但其内容对智能合约是不可访问的。智能合约可以触发事件，但不能访问已触发的事件。\n\
  \n##### 如何定义事件\n\n定义事件非常简单：只需使用 `event` 关键字，配合一个事件名称和一系列属性即可，如下所示：\n\n```\nevent\
  \ eventName(dataType_1 [indexed] attribute_1, dataType_2 [indexed] attribute_2,\
  \ ..., dataType_n [indexed] attribute_n);\n```\n\n其中：\n- `event` 是定义事件的关键字。\n- `eventName`\
  \ 是事件的名称。\n- `dataType_1`、`dataType_2`、`dataType_n` 是在 Solidity 中定义的数据类型列表。\n- `attribute_1`、`attribute_2`、`attribute_n`\
  \ 是由开发者指定的属性名称列表。\n- `indexed` 是一个保留关键字，允许使用带索引的参数作为过滤器来搜索这些事件。\n\n例如，要定义一个代币铸造事件，请使用以下事件定义示例：\n\
  \n```\nevent Mint(address indexed receiver, uint amount);\n```\n\n在上述示例中，定义了一个包含两个属性的\
  \ `Mint` 事件。第一个属性是铸造代币接收者的地址。该地址被设置为索引，意味着这是一个可搜索的属性。第二个属性是铸造的代币数量。该事件无需指定代币名称或铸造时间，因为这些信息可以从智能合约地址和交易的区块时间推断出来。\n\
  \n总之，事件定义基本上就是定义一个事件名称和一系列属性。事件一旦定义完成，就可以通过传递参数来触发并发出事件。\n\n##### 如何触发事件\n\n事件类型在定义后，即可被触发并记录到交易日志中，该过程由智能合约函数控制。触发事件的语法如下所示：\n\
  \n```\nemit eventName(parameter_1, parameter_2, ..., parameter_n);\n```\n\n其中：\n\
  - `emit` 是用于触发事件的关键字。\n- `eventName` 是开发者使用 `event` 关键字定义的事件类型。\n- `parameter_1`、`parameter_2`、`parameter_n`\
  \ 是事件类型中定义的属性对应的参数。参数的数据类型应与事件属性的数据类型匹配。\n\n一个事件类型可以根据需要被多次调用以触发多个事件。例如，上一节定义的 `Mint`\
  \ 事件可以在每次执行铸造操作时触发一个事件。\n\n```\nemit Mint(0x1F2D3A67b8E96039BbAC84EB4BC0913c0c16778c,\
  \ 200);\n```\n\n在上述示例中，触发了一个事件，表明已有 200 个代币被铸造并发送到指定地址 `0x1F2D3A67b8E96039BbAC84EB4BC0913c0c16778c`。\n\
  \n当事件被触发时，其数据实际上会被保存到交易日志中。可以通过使用区块链浏览器查看交易的日志部分来观察该事件。该日志可以被访问。\n\n\n\n通过智能合约的地址访问。日志不能在智能合约内部被访问。智能合约不能在一个函数中发出事件，然后调用另一个函数来处理发出的事件。事件只能通过外部程序（如客户端程序）访问。`Web3`库有一些事件访问函数调用，可用于检索或搜索事件。\n\
  \n**事件示例**\n\n一旦我们了解了事件的定义和发射，编写事件就非常简单。下面展示了一个`DepositEvent`合约，它发出存款记录：\n\n```\n\
  pragma solidity ⁰.8.0;\n\ncontract DepositEvent {\n    event Deposit(address indexed\
  \ depositor_address, uint indexed deposit_id, uint deposit_amount); // 定义了一个 Deposit\
  \ 事件，其属性为存款人地址、存款人 ID（或存款编号）和存款金额\n\n    function deposit(uint deposit_id) public\
  \ payable {\n        emit Deposit(msg.sender, deposit_id, msg.value); // 发射一个 Deposit\
  \ 事件，其发送者地址、deposit_id 和 deposit_amount 等于交易中转移的以太币。\n    }\n}\n```\n\n在这个例子中，定义了一个`DepositEvent`类的片段。在该类中，全局定义了一个`Deposit`事件。有一个`deposit`函数，它接收`deposit_id`作为输入，并发出一个包含`depositor_address`、`deposit_id`和`deposit_amount`的事件。`depositor_address`和`deposit_amount`直接从特殊变量`msg`中获取。\n\
  \n事件是一种允许智能合约与外部程序通信的传递方法。区块链是高度自封闭的，智能合约不能直接访问外部程序。在这种情况下，事件成为外部程序和智能合约之间的消息传递机制。由于事件存在于交易日志中，而交易日志是以太坊状态的一部分，因此发出事件会导致消耗\
  \ gas，应谨慎设计。\n\n**模块 4：安全**\n\n安全是 Solidity 编程最重要的方面。在第[8](https://doi.org/10.1007/978-1-4842-8164-2_8)章中，我们用了整整一章描述区块链安全。在本模块中，我们将讨论\
  \ Solidity 编程中的安全性。\n\n**函数漏洞**\n\n**函数可见性错误**\n\n这是一种漏洞，即函数可见性未被指定，或者本应是私有的函数被指定为`public`。在早期版本的\
  \ Solidity 编译器中，函数的可见性默认为`public`。函数应被正确指定为`external`、`public`、`internal`或`private`。\n\
  \n以下示例展示了这种漏洞的一个例子。第一个函数有一个输入检查，并调用第二个函数。第一个函数被声明为`public`，并且需要由客户端应用程序接收用户输入来调用。第二个函数存在漏洞，因为它被声明为`public`，但在没有检查发送者有效性的情况下就发送了资金。\n\
  \n```\npragma solidity ⁰.4.24;\n\ncontract HashForEther {\n    function withdrawWinnings()\
  \ public {\n        // 如果地址的最后 8 个十六进制字符为 0，则为赢家。\n        require(uint32(msg.sender)\
  \ == 0);\n        _sendWinnings();\n    }\n\n    function _sendWinnings() public\
  \ { // 安全错误。此函数应声明为 private\n        msg.sender.transfer(this.balance);\n    }\n\
  }\n```\n\n要修复此漏洞，只需将第二个函数声明为`private`。\n\n**漏洞：未检查函数调用的返回值**\n\n这是一种漏洞，即未检查函数调用的返回值。当调用一个函数并返回错误时，后续程序仍然执行。检查返回值、异常并相应地处理返回值非常重要。\n\
  \n**漏洞：以太币提现操作未受保护**\n\n这是一个严重的漏洞。它可能在许多情况下发生。提现功能应受到多方面因素的保护。首先，函数的可见性应该是正确的。其次，输入的地址\n\
  \n\n\n需要检查以确保发送者有权提取资金。此外，构造函数代码需要得到保护。构造函数在运行时字节码中运行，可以被黑客调用以执行代码。\n\n**漏洞：自毁函数**\n\
  \n这是一个漏洞，用户或黑客可以调用函数来销毁智能合约的功能，使其无法恢复。这发生在著名的 Parity“我不小心杀死了它”的漏洞中，一名匿名用户调用了 Parity\
  \ 多重签名钱包组件中的`kill`函数并销毁了该组件。该漏洞导致总计 513,774.16 个以太币无法被资产所有者访问。为了防止这种情况发生，应尽量减少使用`kill`函数、放弃所有权函数和`destruct`函数，除非绝对必要。自毁函数包括`suicide`或`selfdestruct`函数。\n\
  \n```\n// This is a selfdestruct function that will remove the\n// contract and\
  \ send the remaining asset to the sender address\npragma solidity ⁰.4.22;\n\ncontract\
  \ SimpleSuicide {\n    function sudicideAnyone() {\n        selfdestruct(msg.sender);\n\
  \    }\n}\n```\n\n**漏洞：使用 Solidity 已弃用函数**\n\n某些旧版 Solidity 中的函数已被弃用并替换为新函数，如图 7-5\
  \ 所示。编译时，请关注警告并用新函数替换已弃用的函数。\n\n***图 7-5.** Solidity 中的已弃用函数*\n\n**漏洞：`Delegatecall`到不可信的被调用方**\n\
  \nSolidity 支持`delegatecall`函数，该函数将使用调用合约的相同执行上下文调用另一个智能合约。这意味着`msg.sender`和`msg.value`对于调用方和被调用方是相同的。如果被调用方地址不可信，则会导致调用合约的安全问题。\n\
  \n**漏洞：由失败函数调用导致的拒绝服务**\n\n外部调用可能失败，且不应停止其余执行步骤。开发者应避免在单笔交易中组合多个调用。合约函数应具有处理失败调用的逻辑。在向用户发送资金时，最好让用户通过发起交易来“拉取”资金，而不是使用智能合约将资产推送给一组用户。\n\
  \n**漏洞：竞态条件和交易顺序依赖**\n\n区块链不会按提交顺序执行交易。交易由矿工打包，矿工倾向于打包具有较高燃料费的交易。当不同智能合约中的函数调用存在依赖关系时，这会导致某些智能合约函数出现问题。例如，ERC20\
  \ 同质化代币有一个`approve`函数，用于指定另一个用户使用一定数量的代币。然后有一个`transfer`函数，可以转移不超过已批准金额的资金。假设 Alice\
  \ 批准 Bob 使用金额为`m`的资金，然后更改批准金额为`n`，在此期间，Bob 发送了两笔交易，分别转移金额`n`和`m`。由于交易并非严格按照顺序执行，Bob\
  \ 的第一笔转账可能落在 Alice 的第一次批准和第二次批准之间，而 Bob 的第二笔转账则落在第二次批准之后。这将允许 Bob 提取`m + n`个代币，而不是预期的`n`或`m`金额。\n\
  \n修复函数调用中的竞态条件并不容易。确保函数依赖关系的一种方法是使用秘密盐值和哈希方法。发送者将拥有一个秘密盐值，并生成该盐值的哈希值。然后，函数发送者将使用哈希值和地址调用已批准的函数。智能合约将把哈希值保存到区块链。发送者随后将盐值发送给接收者。接收者随后调用请求。\n\
  \n\n\n#### 智能合约安全漏洞\n\n##### 带秘密盐值的函数\n\n函数使用一个秘密盐值。智能合约计算该盐值的哈希值，并与智能合约保存的哈希值进行比较。如果匹配，请求函数将处理接收者的请求；如果不匹配，请求将被拒绝。这确保了后续两次函数调用的一一对应关系。\n\
  \n##### 漏洞：断言违反\n\n`assert()` 是一个函数调用，用于确保被求值的语句始终为真。这与用于检查语句条件的 `require()` 函数不同。`assert()`\
  \ 的结果绝不应该为 `false`。如果 `assert()` 函数返回 `false` 结果，则意味着代码中存在严重错误。\n\n##### 漏洞：跨合约调用陷入循环\n\
  \nSolidity 智能合约支持调用另一个智能合约。如果两个智能合约相互调用对方的功能，调用有可能陷入循环并消耗所有资金，如下例所示：\n\n```solidity\n\
  // security_callee.sol:\npragma solidity 0.8.0;\n\ncontract Bob {\n    function\
  \ ping(address c) public {\n        //do something\n        return;\n    }\n}\n\n\
  contract Mallory {\n    fallback() external {\n        Bob(msg.sender).ping(address(this));\n\
  \    }\n}\n```\n\n```solidity\n// security_caller.sol\ncontract Bob {\n    bool\
  \ sent = false;\n    \n    function ping(address c) external {\n        if (!sent)\
  \ {\n            c.call{value:2}(\"\");\n            sent = true;\n        }\n \
  \   }\n}\n```\n\n上述示例展示了跨智能合约调用如何可能陷入循环。\n\n在这个例子中，`security_callee.sol` 和 `security_caller.sol`\
  \ 都被部署到区块链上。`security_caller.sol` 中的 `Bob` 合约调用一个名为 `ping` 的函数，该函数接收一个来自外部程序的输入。`ping`\
  \ 函数随后使用 `Mallory` 合约地址调用另一个智能合约。`Mallory` 合约具有一个回退函数，该函数会接收来自 `Bob` 合约的 `ping`\
  \ 函数调用。在 `Mallory` 合约中，`Bob` 合约也被调用，从而导致一个循环：`Bob` 调用 `Mallory` 中的回退函数，而 `Mallory`\
  \ 又调用 `Bob` 的 `ping` 函数。循环中的每一步都会向 `Mallory` 合约发送 2 wei 的价值。\n\n##### 数据类型与数据漏洞\n\
  \n##### 漏洞：变量值溢出或下溢\n\n当算术运算导致变量的新值超过最大值或低于最小值时，就会发生这种情况。\n\n```solidity\nuint256\
  \ const PRICE_PER_TOKEN = 2;\n\nfunction buy(uint256 numTokens) public payable {\n\
  \    require(msg.value == numTokens * PRICE_PER_TOKEN);\n    balanceOf[msg.sender]\
  \ += numTokens;\n}\n```\n\n要修复此漏洞，请检查值的范围。如果可能，请使用 `SafeMath` 库，该库会检查算术运算的边界。\n\n\
  ##### 漏洞：状态变量被遮蔽\n\n对于智能合约，存在状态变量和函数特定变量。状态变量也可以在每个函数中引用。如果一个变量名同时被定义为状态变量和函数变量，那么函数中定义的变量将具有优先权，并遮蔽被定义为状态变量的变量。因此，检查函数中变量的上下文和作用域非常重要。以下智能合约展示了状态变量如何在函数中被遮蔽：\n\
  \n```solidity\npragma solidity 0.8.0;\n\ncontract ShadowingVariables {\n    uint\
  \ n = 2;\n    address public x = 0x1f2D3A67B8E96039bbAc84eB4bC0913C0c16778c;\n\n\
  \    function test_shadow1() public view returns (uint n) {\n        return n; //\
  \ 将返回 0\n    }\n\n    function test_shadow2() public view returns (address x) {\n\
  \        address x = 0x1111111111111111111111111111111111111111;\n        return\
  \ x; // 将返回 0x1111111111111111111111111111111111111111\n    }\n\n    function test_shadow3()\
  \ public view returns (address x) {\n        return x; // 将返回 0x0000000000000000000000000000000000000000\n\
  \    }\n}\n```\n\n在该智能合约中，声明了状态变量 `uint n` 和 `address x`。`test_shadow1` 函数将 `n`\
  \ 声明为返回变量。它将\n\n\n\n`return 0`，它未被赋值，将采用默认值 0。\n\n第二个函数 `test_shadow2` 重新定义了地址 `x`，并分配了一个新地址\
  \ `0x1111111111111111111111111111111111111111`，并将返回该地址。\n\n第三个函数 `test_shadow3`\
  \ 重新声明了地址 `x`，但未分配地址值。因此，它将返回默认地址值 `0x0000000000000000000000000000000000000000`。\n\
  \n**重要**的是要关注同一变量名出现在不同上下文中的情况，并确保与该变量关联的是正确的值。\n\n##### 漏洞：通过 `tx.origin` 进行授权\n\
  \nSolidity 智能合约可以使用 `tx.origin` 作为全局变量来引用交易的原始发送者。由于用户或智能合约可能调用恶意的智能合约函数，因此使用 `tx.origin`\
  \ 进行身份验证并非良好实践。相反，应使用 `msg.sender` 进行身份验证，因为它总是调用另一个智能合约的智能合约的真实地址。例如，在以下编程示例中，使用\
  \ `tx.origin` 来检查发送者是否是智能合约的所有者。这可能存在漏洞，因为 `tx.origin` 账户可能调用一个恶意的智能合约，然后调用此 `sendTo`\
  \ 函数，从而绕过必要的检查，将资金发送给黑客指定的接收者。\n\n```\npragma solidity 0.4.24;\n\ncontract MyContract\
  \ {\n    address owner;\n\n    function MyContract() public {\n        owner = msg.sender;\n\
  \    }\n\n    function sendTo(address receiver, uint amount) public {\n        require(tx.origin\
  \ == owner); // 这应改为 tx.sender\n        receiver.transfer(amount);\n    }\n}\n```\n\
  \n##### 漏洞：使用区块值表示时间\n\n一些智能合约需要处理依赖于时间的操作，例如资产锁定或释放。Solidity 有一些特殊的全局变量，例如 `block.timestamp`\
  \ 和 `block.number`，可用于表示或推断经过的时间。然而，由于区块挖矿并不精确，并且可能被矿工操纵，因此不建议将有时间依赖性的函数中的区块参数用作时间戳。有时，使用来自预言机实现的时间信息会更好。\n\
  \n##### 漏洞：写入任意存储位置\n\n以太坊 EVM 为每个账户或智能合约地址将数据存储在持久化位置。保护数据存储位置免受恶意覆盖非常重要。虽然 Solidity\
  \ 不支持位置指针，但仍然有可能将数据写入错误的地址。例如，在动态数组中，如果未正确设置数组长度，则将不会检测到越界索引，从而导致越界写入有效。在下面的例子中，定义了一个动态长度数组\
  \ `bonusRecord`。`PopBonus` 函数每次弹出一个项目，并减少 `bonusRecord` 数组的长度。但是，由于 `require(0 <=\
  \ bonusRecord.length)` 并未阻止长度为 0 的情况，下一行代码 `bonusRecord.length--` 将导致下溢，使 `bonusRecord`\
  \ 长度变为 0564039457584007913129639935。\n\n由于数组长度如此之大，数组索引可以是任何数字，并且该值可以写入任意存储位置：\n\
  \n```\nuint[] private bonusRecord;\naddress private owner;\n\nfunction PushBonus(uint\
  \ c) public {\n    bonusRecord.push(c);\n}\n\nfunction PopBonus() public {\n   \
  \ require(0 <= bonusRecord.length);\n    // 这是一个错误。一旦长度为零，就不应允许 PopBonus 操作\n  \
  \  bonusRecord.length--;\n}\n\nfunction UpdateBonusRecordAt(uint idx, uint c) public\
  \ returns (uint){\n    require(idx < bonusRecord.length);\n    bonusRecord[idx]\
  \ = c;\n    return bonusRecord.length;\n}\n```\n\n要修复上述任意写入问题，只需将 `require(0 <=\
  \ bonusRecord.length)` 更改为 `require(0 < bonusRecord.length)`。\n\n##### 漏洞：未使用的变量\n\
  \n\n\n开发者声明了变量却未使用，这是相当常见的情况。\n\n在 Solidity 中，所有计算和存储都会消耗交易的 Gas。因此，最佳实践是移除所有已定义但未在已部署的智能合约中使用的函数和变量。\n\
  \n##### 编译器漏洞\n\n##### 过时的编译器\n\n编译器版本兼容性是一个复杂的问题。Solidity 允许将智能合约声明为适用于单个编译器版本或一系列编译器。虽然建议使用最新的编译器，但与旧版本库的兼容性是一个挑战。有时，库是由第三方编写的，或者属于公共领域，将它们重写为最新版本并不容易。开发人员应同时查看编译错误和警告，以确保版本兼容。\n\
  \n使用 Solidity 编程智能合约（第 7 章）\n\n##### 随机性漏洞\n\n##### 漏洞：来自区块链属性的弱随机性\n\n智能合约不直接与外部程序通信，也缺乏良好的随机数生成来源。有时，在游戏或彩票等应用中，需要使用随机数。开发人员需要知道，某些区块链属性并不像看起来那么随机。例如，以太坊矿工可能通过控制区块生成时间或打包不同的交易来操纵\
  \ `block.timestamp` 或 `blockhash`。\n\n对于需要高随机性的应用，建议使用外部随机数生成器和预言机将随机性引入智能合约。\n\n\
  ##### 签名漏洞\n\n##### 漏洞：签名篡改\n\n有时，智能合约会实现加密函数来验证签名的消息，并据此执行转账操作。为了确保安全，智能合约函数需要确保签名的消息是真实的，并且消息不能被重放。当使用消息时，私钥和消息作为输入来创建签名。需要注意的一个重要点是，签名不是唯一的。黑客可以操纵\
  \ `(r,s,v)` 参数，为相同的私钥和消息创建不同的但有效的签名。因此，签名或哈希不能用作消息交易的唯一标识符。否则，黑客可以利用这一点，通过创建不同的有效签名来重放先前签名的消息。\n\
  \n例如，以下 `msgid` 不是唯一的，不应用作签名消息的标识符：\n\n使用 Solidity 编程智能合约（第 7 章）\n\n```\nbytes32\
  \ msgid = keccak256(abi.encodePacked(getTransferHash(_to,\n_value, _gasPrice, _nonce),\
  \ _signature));\nrequire(!signatureUsed[msgid]);\n```\n\n此处，对于由同一私钥签名的相同消息，`msgid`\
  \ 本应是唯一的。然而，由于 `_signature` 不是唯一的，`msgid` 可以变得不同，因此相同的签名消息可以被多次重放以触发其他可能涉及资产转移的操作。\n\
  \n要解决这个问题，只需在哈希函数中移除 `_signature`，使 `msgid` 唯一，从而阻止消息的重放。\n\n```\nbytes32 msgid\
  \ = keccak256(abi.encodePacked(getTransferHash(_to,\n_value, _gasPrice, _nonce)));\n\
  require(!signatureUsed[msgid]);\n```\n\n#### 模块总结\n\n安全是智能合约开发中最基本的组成部分。为了确保安全，应该建立安全框架，并且开发人员还应关注每一行代码的细节。第\
  \ [8](https://doi.org/10.1007/978-1-4842-8164-2_8) 章将对安全性进行更多讨论。\n\n#### 模块 5：工具、测试与调试\n\
  \n在第 [1](https://doi.org/10.1007/978-1-4842-8164-2_1) 章中，我们讨论了基本工具，例如使用 Truffle\
  \ 和 Remix 搭建智能合约开发环境来编译和部署智能合约。在本模块中，我们继续介绍有用的工具，例如智能合约可视化工具、安全扫描工具，\n\n\n"
- "# 7 使用 Solidity 编写智能合约\n\n##### 工具\n\n##### MythX：安全扫描工具\n\n`MythX` 是一个安全扫描工具，以付费服务的形式通过\
  \ `mythx.io` 发布，也可作为命令行（`CLI`）包或其它工具的插件使用。\n\n此处，我们说明如何将 `MythX` 作为 `Remix` 的插件使用。要使用\
  \ `Remix`，请遵循[第 6 章](https://doi.org/10.1007/978-1-4842-8164-2_6)的说明启动您的应用程序。\n\n\
  要启用 `MythX`，只需单击插件管理器图标打开管理器。在搜索框中输入“`mythx`”，即可看到 `MYTHX SECURITY VERIFICATION`\
  \ 插件。单击 `Activate` 按钮激活此插件（图 7-6）。\n\n***图 7-6.** 在 `Remix` 中激活 `MythX` 安全扫描工具*\n\
  \n![](img/index-300_1.jpg)\n\n一旦 `MYTHX SECURITY VERIFICATION` 被激活，它需要与 `MythX`\
  \ 云服务通信以执行扫描。开发者需要从 `mythx.io` 网站申请 `API` 密钥，并在插件设置中输入 `API` 令牌信息（图 7-7）。\n\n***图\
  \ 7-7.** 使用 `MythX` API 需要登录*\n\n`MythX` 安全扫描还提供了 `Truffle` 工具的插件以及 `Visual Studio\
  \ Code` IDE 工具的扩展。需要注意的一点是，`MythX` 安全验证是一项付费服务。开发者需要为安全扫描服务支付订阅费。\n\n![](img/index-301_1.jpg)\n\
  \n##### Solidity 静态分析：Remix 的安全插件\n\n与需要支付订阅费进行安全扫描的 `MythX` 不同，`Remix` 的 `Solidity\
  \ Static Analysis`（`SSA`）插件是免费的，并且提供了静态代码扫描的基本功能。要启用 `SSA`，只需打开插件管理器并输入 `Solidity\
  \ Static Analysis`，然后单击 `Activate` 按钮激活它（图 7-8）。\n\n***图 7-8.** 在 `Remix` 中使用 `Solidity\
  \ Static Analysis` 进行安全扫描*\n\n插件激活后，单击插件面板上的图标，它将开始分析 `Remix` 屏幕上的活动 `Solidity`\
  \ 程序。`SSA` 不仅扫描源代码中的安全漏洞，还会检查 `gas` 消耗、`ERC`（`Ethereum Request for Comment`）以及一些杂项分析（图\
  \ 7-9）。开发者可以过滤要分析并显示的分类。\n\n![](img/index-302_1.jpg)\n\n***图 7-9.** 运行 `Solidity\
  \ Static Analysis` 扫描*\n\n![](img/index-303_1.jpg)\n\n尽管静态分析工具对于捕获一些明显的漏洞非常有帮助，但它们不应取代更复杂的安全审计和渗透测试，尤其是对于处理资产转移的智能合约。\n\
  \n##### Solidity 转 UML：智能合约可视化工具\n\n`Solidity` 是一种易于理解的面向对象编程语言。有时，当一个 `dApp` 项目中有许多函数和智能合约时，理解智能合约的工作流程会变得很有挑战性。在这种情况下，将\
  \ `Solidity` 代码转换为`统一建模语言`（`UML`）以可视化智能合约和函数之间的关系会是一个好方法。\n\n##### 用于 Remix 的 Solidity\
  \ 转 UML 工具\n\n有几种工具可以将 `Solidity` 转换为 `UML`。`Remix` 也为这个目的提供了一个插件。只需激活 `Solidity\
  \ UML` 并启动该插件，即可将 `Solidity` 代码转换为 `UML` 图（图 7-10）。\n\n***图 7-10.** `Solidity` 转\
  \ `UML` 的插件*\n\n一旦 `Solidity 2 UML` 插件被激活，它就可以用来解析 `Solidity` 智能合约并生成 `UML` 图。\n\
  \n##### 独立的 Solidity 转 UML 工具\n\n除了 `Remix` 插件之外，还有 `Node.js` 包或 `CLI` 包也可以用来生成\
  \ `UML` 图。\n\n\n\n例如，`sol2uml` 包是一款多功能工具，可从智能合约源代码生成 UML；它还能获取已部署到以太坊区块链的智能合约的 UML\
  \ 图。\n\n要安装 `sol2uml`，只需使用 Node 包管理器 (npm) 输入以下命令：\n\n```\nnpm install sol2uml --only=production\n\
  ```\n\n安装 `sol2uml` 后，可根据下方帮助菜单所示，使用各种参数运行它：\n\n```\n$ sol2uml -h\nUsage: sol2uml\
  \ <fileFolderAddress> [options]\n从 Solidity 源代码生成 UML 图。\n如果第一个参数未传入文件、文件夹或地址，\n\
  则使用当前工作文件夹。\n当使用文件夹时，将查找该文件夹及其所有子文件夹中\n所有 *.sol 文件。\n如果传入带有 0x 前缀的以太坊地址，\n则将使用来自\
  \ Etherscan 的已验证源代码。\n\nOptions:\n  -v, --verbose                     运行并输出调试语句\n\
  \  -f, --outputFormat <value>        输出文件格式：svg、png、\n                         \
  \           dot 或 all（默认值：\"svg\"）\n  -o, --outputFileName <value>      输出文件名\n\
  \  -d, --depthLimit <depth>          将被递归搜索的 Solidity\n                        \
  \            文件的子文件夹数量。默认\n                                    值 -1 表示无限制（默认值：-1）\n\
  \  -n, --network <network>           mainnet、ropsten、kovan、\n                  \
  \                  rinkeby 或 goerli（默认值：\n                                    \"\
  mainnet\"）\n  -k, --etherscanApiKey <key>       Etherscan API 密钥\n  -c, --clusterFolders\
  \              将合约聚类到源文件夹\n  -h, --help                        输出使用信息\n```\n\n要为本地目录中的智能合约生成\
  \ UML 图，请输入以下命令：\n\n```\nsol2uml ./contracts\n```\n\n这里，`./contracts` 是智能合约文件所在的目录。\n\
  \n`sol2uml` 还可以获取已部署到以太坊区块链的智能合约的 UML 文件。例如，要获取 Ropsten 区块链中特定地址的 UML 图，请运行以下命令：\n\
  \n```\nsol2uml smartcontract_address -n ropsten\n```\n\n这里，`smartcontract_address`\
  \ 是已部署到以太坊区块链的智能合约地址。`-n ropsten` 表示这是针对 Ropsten 区块链中的智能合约。\n\n为了理解 UML 图，我们使用 USDT\
  \ ERC20 代币的部分智能合约作为示例。通过在图 7-11 所示的浏览器 URL 中输入以下地址，可获取此 UML 图：\n\n```\nhttps://etherscan.io/viewsvg?t=1&a=0xdAC17F958D2ee523a2206206994597C13D831ec7\n\
  ```\n\n![图 7-11. USDT ERC20 代币的 UML 图](img/index-306_1.png)\n\n在此图中，每个方框代表一个智能合约类、一个接口或一个库。\n\
  \n每个方框有多个区域。顶部区域是智能合约名称。然后，变量和函数各自的范围被分组到相应区域，例如 `internal`、`public` 和 `external`。每个区域包含变量名、函数名和参数的列表。\n\
  \n方框之间绘制了带有箭头的线条，以表示实体关系。如果智能合约 A 使用智能合约 B，意味着 B 是 A 的父级，则从 B 到 A 绘制一条有向线。如果实体 A\
  \ 是一个抽象智能合约或接口，则绘制虚线而不是实线。\n\n在 Solidity 中，抽象类是一种特殊的智能合约，其中函数已定义但未实现。使用或继承抽象智能合约的合约需要实现那些已定义的函数。此外，接口是特殊的智能合约，其中只定义了函数名。接口中不声明变量。\n\
  \n除了接口，智能合约还可以定义和调用库函数。Solidity 中的库使用 `library` 关键字定义，并具有可被其他智能合约调用的函数。库是无状态的，不能拥有状态变量。\n\
  \n**Solidity 测试**\n\n**Solidity 单元测试：用于测试的 Remix 插件**\n\n\n\n\n参考：[`remix-ide.readthedocs.io/en/latest/unittesting.html`](https://remix-ide.readthedocs.io/en/latest/unittesting.html)\n\
  \n`Solidity`拥有一套优秀的工具来提供单元测试或自动化测试。当编写好智能合约源码后，开发者可以编写测试程序来封装智能合约，从而执行自动化测试。诸如`Remix`和`Truffle`等工具都具备测试套件，以帮助编写和执行测试程序。下文将介绍作为`Remix`插件的`Solidity\
  \ Unit Test`。\n\n要激活`Solidity Unit Testing`插件，只需点击插件管理面板，输入`Solidity Unit Testing`进行搜索，然后点击`Activate`按钮激活该插件，如图\
  \ 7-12 所示：\n\n![](img/index-308_1.jpg)\n\n***图 7-12.** 用于 Solidity 单元测试的插件*\n\n\
  需要注意的一点是，`Solidity Unit Test`插件中的测试文件不支持带参数的函数。对于带有参数的智能合约，应有一个包装测试文件，该文件会从另一个无参数的函数中调用带参数的函数。\n\
  \n要运行`Solidity Unit Testing`，首先点击插件图标打开单元测试面板。然后选择一个目录用于存放测试套件文件。在下面的截图中，选择`unit_test`目录存放测试文件。接着，开发者需要为源码智能合约生成一个测试文件（图\
  \ 7-13）。\n\n![](img/index-309_1.jpg)\n\n***图 7-13.** 生成 Solidity 单元测试文件*\n\n要为某个源文件生成测试文件，首先在文件视图面板中打开该源码智能合约并使其处于活动状态。然后选择测试文件将存放的目录。点击“Generate”按钮，即可在为视图面板中打开的文件所指定的目录下生成一个测试文件。\n\
  \n一旦生成测试套件文件，它会在文件视图面板中自动打开。该测试套件将包含用于测试源合约的基本代码模板。它包含测试库导入、目标源文件导入以及测试函数桩的代码段。开发者随后可以初始化目标智能合约，模拟对该智能合约的函数调用，并使用内置的逻辑检查函数来断言测试结果。\n\
  \n例如，以下代码展示了如何编写单元测试代码来测试全局变量和局部变量是否相同。源码非常简单。变量`x`在代码开头被声明为全局变量。然后，`x`又在`localVariable`函数中被声明为局部变量。\n\
  \n```\npragma solidity >=0.4.22 <0.9.0;\n\ncontract VariableScope {\n    address\
  \ public x = 0x1f2D3A67B8E96039bbAc84eB4bC0913C0c16778c;\n\n    function localVariable()\
  \ public view returns (address x) {\n        address x = 0x1111111111111111111111111111111111111111;\n\
  \        return x; // Will return 0x1111111111111111111111111111111111111111;\n\
  \    }\n\n    function globalVariable() public view returns (address) {\n      \
  \  return x; // Will return 0x1f2D3A67B8E96039bbAc84eB4bC0913C0c16778c;\n    }\n\
  }\n```\n\n单元测试的目的是检查变量`x`在全局作用域和局部作用域中是否相同。为测试此功能，生成并修改了以下测试套件：\n\n```\npragma solidity\
  \ >=0.4.22 <0.9.0;\n\n// This import is automatically injected by Remix\nimport\
  \ \"remix_tests.sol\";\n\n// This import is required to use custom transaction context\n\
  // Although it may fail compilation in 'Solidity Compiler' plugin\n// But it will\
  \ work fine in 'Solidity Unit Testing' plugin\nimport \"remix_accounts.sol\";\n\n\
  import \"../variable_scope.sol\";\n\n// File name has to end with '_test.sol', this\
  \ file can contain more than one testSuite contracts\ncontract testSuite {\n   \
  \ VariableScope vs;\n\n    /// 'beforeAll' runs before all other tests\n```\n\n\n\
  \n\n##### Solidity 单元测试与调试\n\n##### 特殊测试函数\n\n以下特殊函数可用：`beforeEach`、`beforeAll`、`afterEach`\
  \ 和 `afterAll`。\n\n```solidity\nfunction beforeAll() public {\n    // <实例化合约>\n\
  \    vs = new VariableScope();\n    // Assert.equal(uint(1), uint(1), \"1 应等于 1\"\
  );\n}\n\nfunction checkNotEqual() public {\n    // 使用 'Assert' 方法：https://remix-ide.readthedocs.io/en/latest/assert_library.html\n\
  \    address x1 = vs.x.address;\n    address x2 = vs.localVariable();\n    Assert.notEqual(x1,\
  \ x2, \"变量应不相等\");\n}\n```\n\n在测试套件代码中，导入了源文件，并实例化了 `VariableScope` 智能合约 `vs`。然后调用\
  \ `checkNotEqual()` 函数，在 `vs` 中生成本地变量和全局变量 `x`，并进行比较。\n\n该测试套件在 Remix 中运行，结果显示其通过了单元测试（图\
  \ 7-14），这意味着即使全局变量和局部变量名称相同，它们也确实不同。\n\n![单元测试运行示例](img/index-312_1.jpg)\n\n**图\
  \ 7-14.** 单元测试运行示例\n\n使用 Remix Solidity 单元测试插件，编写脚本测试智能合约变得非常容易。\n\n需要注意的是，Solidity\
  \ 单元测试插件中的测试文件不支持带参数的函数。对于带参数的智能合约，应有一个包装测试文件，该文件从另一个无参数函数中调用带参数的函数。\n\n除了用于单元测试的\
  \ Remix 插件外，Truffle 也拥有良好的单元测试模块，支持手动和自动测试。其工作流程和功能与 Remix 插件类似。\n\n##### Solidity\
  \ 调试\n\n有时，Solidity 智能合约在执行过程中可能会遇到问题。能够逐步执行每段源代码并分析各种调试信息（如调用堆栈和局部变量值）会很有帮助。Solidity\
  \ 确实有一些调试工具可以协助完成这项工作。在此，我们介绍 Remix 的 Debugger 插件。\n\n![调试器插件](img/index-313_1.jpg)\n\
  \n##### 启用调试器\n\n要启用 Remix 调试器，只需打开插件管理器，在搜索框中输入 `debugger`，然后启用此插件（图 7-15）。\n\n\
  **图 7-15.** 在 Remix 中启用调试器插件\n\n##### 启动调试器\n\n启用调试器后，插件面板中会出现一个类似 Bug 的图标。要调试 Solidity\
  \ 程序，开发者需要编译合约源代码，将智能合约部署到本地 EVM，然后创建一笔交易以获取交易哈希。之后，开发者可以将交易 ID 输入调试器配置面板，并开始调试过程（图\
  \ 7-16）：\n\n![启动 Solidity 调试器](img/index-314_1.jpg)\n\n**图 7-16.** 启动 Solidity 调试器\n\
  \n##### 调试智能合约\n\n启动调试器后，会弹出如下所示的调试窗口，开发者可以单步执行代码，查看每一行代码的执行情况。调试器支持单步功能，如 `step\
  \ into`（步入）、`step over`（步过）和 `step into breaking point`（步入断点）。\n\n调试器显示所有 EVM 执行上下文、存储和调用堆栈信息，包括函数堆栈、Solidity\
  \ 局部变量、Solidity 状态、步骤详情、堆栈、内存、存储、调用堆栈、调用数据、全局变量、返回值和完整的存储变更。某些信息可能不可用，但调试器通常会提供大量的字节码执行信息（图\
  \ 7-17）。\n\n![单步执行调试程序](img/index-315_1.jpg)\n\n**图 7-17.** 单步执行调试程序\n\n调试器一个不太明显的地方是如何添加断点。要添加断点，只需在编辑窗口中打开源代码，然后点击行号（而不是代码本身）。\n\
  \n![断点行](img/index-316_1.jpg)\n\n\n\n\n`source code itself`）。行号旁会显示一个蓝点，表示已在该行插入断点（图\
  \ 7-18）。\n\n***图 7-18.** 在源代码中添加断点*\n\n尽管调试器是调试 Solidity 程序的绝佳工具，但我们发现，在调试更复杂的智能合约时，调试窗口中仍无法查看某些信息。将智能合约模块化，以简化单元测试和调试，是一个良好的实践。\n\
  \n#### 模块 6：客户端注意事项\n\n在[第 6 章](https://doi.org/10.1007/978-1-4842-8164-2_6)及[第\
  \ 7 章](https://doi.org/10.1007/978-1-4842-8164-2_7)的前几个模块中，我们讨论了如何编写 Solidity 智能合约并将其部署到区块链上。一旦智能合约部署到区块链，它们便公开可访问，且一旦区块被最终确定，就永远不会被删除或修改。智能合约是字节码，对用户并不友好。为了与去中心化应用（dApp）交互，需要开发客户端以方便用户与智能合约进行交互。\n\
  \ndApp 的客户端可以是网页浏览器、移动应用、桌面应用或命令行界面（CLI）。在本模块中，我们将讨论这些客户端的优缺点，并给出构建 dApp 客户端的示例。\n\
  \n##### dApp 客户端的类型\n\ndApp 客户端可以采用图形用户界面（GUI）格式或命令行界面（CLI）格式。GUI 格式可以是基于网页的应用、移动应用或桌面应用，需要用户输入和操作，如下图所示。CLI\
  \ 格式通常用于自动执行测试脚本或作为应用程序编程接口。在下图（图 7-19）中，我们描述了不同类型的客户端。\n\n***图 7-19.** 去中心化应用的客户端类型*\n\
  \n##### 浏览器客户端\n\n浏览器客户端是去中心化应用最基本的用户体验。用户直接访问一个网站来使用 dApp。例如，要访问 CryptoKitty dApp，用户只需将他们的网页浏览器指向\
  \ [www.cryptokitty.com](http://www.cryptokitty.com)。如客户端拓扑图所示，浏览器需要通过 RPC 协议，借助网页扩展/插件连接到以太坊节点。最常见的网页扩展是\
  \ MetaMask。MetaMask 充当网页应用的加密货币钱包。\n\n为了设计一个具有加密账户交互功能的网页应用，开发者需要开发能够连接到 MetaMask\
  \ 或其他钱包的网页。当用户通过浏览器连接到某个网址时，浏览器脚本会检查 MetaMask 是否已安装，如果未找到则会提示用户安装。这通常称为“连接钱包”。通常，会编写\
  \ JavaScript 脚本，使用 Web3 库连接到以太坊节点。我们将在本模块后面的内容中给出详细的编码示例。\n\n基于浏览器的 dApp 面临的挑战之一是钱包的安全性。由于浏览器容易受到黑客攻击，在某些浏览器中，MetaMask\
  \ 的存储和私钥有可能被窃取。建议在存储大量加密资产时，使用硬件钱包。MetaMask 确实支持连接到硬件钱包以签署交易，从而确保钱包的安全。\n\n#####\
  \ 移动客户端\n\n也可以开发移动应用与以太坊区块链上的智能合约进行交互。由于移动应用通常占用的资源较小，它们依赖 API 或 RPC 与区块链节点通信。与网页钱包类似，移动钱包不具备硬件级别的安全性，不应用于存储大量加密资产。\n\
  \n##### 桌面客户端\n\n网页客户端和移动客户端都需要连接到外部节点才能与以太坊区块链交互。桌面客户端拥有足够的\n\n\n##### 存储与计算能力\n\
  \n存储与计算能力可能足以独立运行一个以太坊节点。这意味着桌面客户端可以自带其 RPC 服务器，而不依赖于第三方 RPC 节点。一个缺点是桌面应用需要安装，并且需要有桌面环境来运行应用程序。\n\
  \n##### CLI 客户端\n\nCLI 客户端是使用命令行界面运行与以太坊区块链交互的脚本。这通常在单元测试或项目的自动脚本化中完成。CLI 对于那些喜欢基于文本输入而不是基于\
  \ GUI 浏览的人来说非常方便。\n\n每个客户端都有其自身的优缺点，我们看到 Web 客户端正变得越来越流行。在下面的内容中，我们提供了一个为已部署的智能合约设计网页的用例。\n\
  \n##### 与智能合约交互的 Web 客户端示例\n\n在本示例中，我们演示如何编写一个网页来与已部署的智能合约交互。为了使演示成为一个端到端的体验，我们执行以下操作将智能合约部署到开发环境。\n\
  \n##### 步骤 1：创建以太坊开发区块链\n\n通过下载`geth`应用并运行以下命令来创建以太坊开发区块链：\n\n```\n./geth --datadir\
  \ test-chain-dir --http --dev --http.corsdomain \"https://remix.ethereum.org,http://remix.ethereum.org\"\
  \n```\n\n此命令创建一个私有的开发区块链，并允许 Remix 开发工具与之交互。数据存储位于`test-chain-dir`中，并且默认会生成一个开发账户。该账户的密钥库位置位于`test-chain-dir/keystore`目录中。此地址和密钥库可用于管理该账户。\n\
  \n更多详情，请参考 [`geth.ethereum.org/docs/getting-started/dev-mode`](http://geth.ethereum.org/docs/getting-started/dev-mode)。使用`geth\
  \ attach <IPC_LOCATION>`连接到节点，并使用`eth.sendTransaction`从`coinbase`向目标账户发送交易。\n\n\
  一旦开发区块链启动，下一步就是将智能合约部署到其上。这里，我们开发一个具有两个函数`storeMessage`和`retrieve`的智能合约。\n\n```\n\
  // SPDX-License-Identifier: GPL-3.0\npragma solidity >=0.7.0 <0.9.0;\n\n/**\n *\
  \ @title MessageStorage\n * @dev Store & retrieve value in a variable\n */\ncontract\
  \ MessageStorage {\n    string message;\n\n    /**\n     * @dev Store value in variable\n\
  \     * @param messageInput value to store\n     */\n    function storeMessage(string\
  \ memory messageInput) public {\n        message = messageInput;\n    }\n\n    /**\n\
  \     * @dev Return value\n     * @return value of 'message'\n     */\n    function\
  \ retrieve() public view returns (string memory){\n        return message;\n   \
  \ }\n}\n```\n\n##### 步骤 2：编译并将智能合约部署到开发区块链\n\n编写好智能合约后，使用 Remix 或 Truffle 编译它。要使用\
  \ Remix，只需访问 [`remix.ethereum.org`](http://remix.ethereum.org/) 并为上述智能合约创建一个文件。成功编译后，会生成一个应用二进制接口（ABI）文件和字节码文件。字节码文件将被部署到区块链上。ABI\
  \ 将用于 dApp 客户端与智能合约交互。需要通过点击 ABI 按钮复制 ABI，并将其保存到客户端代码中。在本示例中，以下 ABI 文件描述了智能合约中定义的函数和变量的格式：\n\
  \n```\n[\n    {\n        \"inputs\": [],\n        \"name\": \"retrieve\",\n    \
  \    \"outputs\": [\n            {\n                \"internalType\": \"string\"\
  ,\n                \"name\": \"\",\n                \"type\": \"string\"\n     \
  \       }\n        ],\n        \"stateMutability\": \"view\",\n        \"type\"\
  : \"function\"\n    },\n    {\n        \"inputs\": [\n            {\n          \
  \      \"internalType\": \"string\",\n                \"name\": \"messageInput\"\
  ,\n                \"type\": \"string\"\n            }\n        ],\n        \"name\"\
  : \"storeMessage\",\n        \"outputs\": [],\n        \"stateMutability\": \"nonpayable\"\
  ,\n        \"type\": \"function\"\n    }\n]\n```\n\n##### 步骤 3：部署智能合约\n\n一旦智能合约编译完成，进入部署面板并部署到开发区块链。\n\
  \n\n\n##### 开发区块链（图 7-20）\n\n![图 7-20](img/index-323_1.jpg)\n\n第 7 章：使用 Solidity\
  \ 编写智能合约\n\n**图 7-20.** Remix 智能合约部署面板\n\n此处，`Environment` 应指定 `Web3` 提供者，并指向开发链的端点\
  \ `http://127.0.0.1:8545`。\n\n智能合约成功部署后，将返回一个智能合约地址，显示在屏幕底部，如下所示：\n\n`0x16d29C0A07dcDBe6e1097257Ee39DEe18136d672`\n\
  \n开发者可以复制此智能合约地址，供 Web 浏览器进行交互。\n\n##### 第 4 步：编写 Web 客户端与智能合约交互\n\n为了让 Web 客户端与智能合约交互，需要以下几个参数，包括：\n\
  \n- **区块链的 RPC 端点** – 这是区块链的入口。在本例中，它是 `http://127.0.0.1:8545`。诸如 MetaMask 之类的 Web\
  \ 钱包需要通过此 RPC 端点连接到区块链。\n- **智能合约的 ABI** – 在智能合约编译时生成。\n- **智能合约地址** – 该地址在智能合约成功部署后返回。\n\
  \n下面，我们提供了一个 HTML/JavaScript 页面来展示与智能合约交互的用户界面。HTML 部分展示了按钮的布局，JavaScript 部分展示了与智能合约交互的脚本代码。\n\
  \n以下展示了 HTML/脚本代码的 Web 用户界面（图 7-21）。\n\n![图 7-21](img/index-325_1.png)\n\n在图形用户界面的左侧，有三个按钮：允许用户连接钱包并获取钱包地址、设置要写入区块链的消息、以及检索消息。右上方是\
  \ MetaMask 的弹出窗口，允许用户签署交易与区块链交互。\n\n**图 7-21.** 与智能合约交互的用户界面示例\n\n下方展示了三个 HTML 按钮的代码片段：\n\
  \n`Connect Wallet` 按钮将触发 `enableEthereumButton` 并获取钱包账户地址。\n\n```html\n<DIV class=\"\
  container\">\n  <H1 class=\"display-4\">消息存储</H1>\n  <P>点击连接钱包</P>\n  <P><BUTTON\
  \ class=\"btn btn-secondary enableEthereumButton\">连接钱包</BUTTON><BR>\n  钱包地址:<span\
  \ class=\"showAccount\"></span></P>\n</DIV>\n```\n\n`Set Message` 按钮将触发 JavaScript\
  \ 中的 `setMessage()` 函数。\n\n```html\n<P>输入一条字符串作为消息</P>\n<DIV class=\"cluegene\"\
  >\n  <LABEL for=\"cluegene\"><B>要设置的消息</B></LABEL>\n  <INPUT type=\"text\" class=\"\
  ignore-form-control\" id=\"cluegene\" placeholder=\"\" value=\"[我的消息]\" size=\"\
  20\" required=\"\">\n</DIV>\n<P><A class=\"btn btn-secondary\" onclick=\"setMessage()\"\
  \ role=\"button\">设置消息</A></P>\n```\n\n`Retrieve Message` 按钮将触发 `getMessage()` 函数：\n\
  \n```html\n<DIV class=\"row\" id=\"getmessagerow\">\n  <DIV class=\"col-lg-6 text-center\"\
  >\n    <H2>从区块链获取消息</H2>\n    <P>点击检索消息</P>\n    <P><A class=\"btn btn-secondary\"\
  \ onclick=\"getMessage()\" role=\"button\">检索消息</A></P>\n    <DIV id=\"GetMessageValue\"\
  ></DIV>\n  </DIV>\n</DIV>\n```\n\n这三个函数在 JavaScript 代码中实现。\n\n为了获取钱包地址，会发送一个 `eth_requestAccounts`\
  \ 请求，作为以太坊请求来获取 MetaMask 启用的账户。\n\n```javascript\nasync function getAccount() {\n\
  \  const accounts = await ethereum.request({ method: 'eth_requestAccounts' });\n\
  \  const account = accounts[0];\n  account0 = account;\n  showAccount.innerHTML\
  \ = account;\n}\n```\n\n对于设置消息，按以下工作流程编码：\n\n- `setMessage` 函数首先检查是否安装了 MetaMask。如果已安装，则获取与\
  \ MetaMask 关联的账户。\n- JavaScript 代码使用...创建智能合约对象\n\n\n\n##### 指定合约地址和 ABI 信息\n`ABI`\
  \ 可以存放在单独的文件中以便导入。\n\n- **交易的数据打包**：此步骤从输入字段获取要设置的消息，并使用嵌入的 `encodeABI()` 函数进行打包。\n\
  - **通过 `sendTransaction` 函数发送交易**。\n\n```javascript\nfunction setMessage() {\n \
  \   if (!ethEnabled()) {\n        alert(\"Please install an Ethereum-compatible\
  \ browser or extension like MetaMask to use this dApp!\");\n    }\n    web3.eth.getAccounts(function(err,\
  \ accounts) {\n        var myContract = new web3.eth.Contract(messagestorage_abi,\
