  \ Coinbase）尚未支持 | 许多主流交易所（如 Coinbase）尚未支持 |\n| 图灵完备 | 是 | 否 | 否 |\n\n以下列表总结了以太坊、EOS.IO\
  \ 和 NEO 区块链平台的优缺点：\n\n*   以太坊最大的优点是它是第一个也是最受欢迎的智能合约平台，拥有最多的开发者、第三方工具、支持、文档和社区支持。最大的缺点是使用\
  \ PoW 带来的可扩展性问题；在撰写本文时，正在进行硬分叉以解决此缺点并将以太坊迁移到 PoS。另一个缺点是源代码每字节 200 gas 的成本；如果你的代码未经优化，这会很昂贵，尤其是你需要不断重新发布代码时。最后，对像\
  \ Solidity 这样不太流行的编程语言的支持不够理想。\n\n*   EOS 的优势在于其可扩展性以及无需改动即可每秒处理数百万笔交易的能力，以及使用 WASM\
  \ 实现更快的代码执行。EOS 支持 C 和 C++，并且其区块链本身用 C++ 编写，这使其具有优势，因为 C 语言的开发者基础比 Solidity 更庞大。然而，EOS\
  \ 在采用率方面仍有很长的路要走，提供 10 亿美元的资金对有合适想法的公司和个人可能很有用。其高排名和出色的特性并不足以取代以太坊它所声称的主导地位。只有时间能给出答案。\n\
  \n*   NEO 支持主流编程语言（C#、VB.NET、Java 和 Python），这使其具有巨大优势，因为大量开发者可以通过较小的学习曲线进行编码。此外，合约计算的高效和低成本是其优势；然而，NEO\
  \ 是三个平台中社区支持最小的，每年注册数字资产所需的 5,000 NeoGas 的硬性规定可能会让许多潜在项目望而却步。\n\n## 下一步做什么\n\n试试这些资源：\n\
  \n*   在此处阅读 NEO 文档：[`http://docs.neo.org`](http://docs.neo.org)。该网站包括示例 NeoContract\
  \ 的教程、创建 NEO 节点、NEO 实用工具、白皮书等。\n*   访问 [`https://neo.org/client`](https://neo.org/client)\
  \ 查找第三方 NEO 钱包。\n*   对于调试，请查看 `Neunity.Adapter` 或 `Neo-Debugger` 以在 IDE 中编写测试用例并运行源代码：[`https://github.com/CityOfZion/neo-debugger-tools/releases`](https://github.com/CityOfZion/neo-debugger-tools/releases)。\n\
  *   创建更多的 NeoContract，并包含通过 `neo.EventHub` 分发的 `SmartContractEvent`；订阅并测试你的合约。\n\
  \n\n\n## 摘要\n\n在本章中，我介绍了 NEO 区块链和 NEO 合约。你了解了 NEO 的高级区块链架构，并学习了 NEO 的智能经济。你配置了本地环境，升级了\
  \ Xcode，安装了 Visual Studio 2017 IDE 和 .NET Core。\n\n你安装了 Docker，因此现在可以创建容器；你下载了 neo-compiler\
  \ 并生成了 `neon.dll`。最后，你构建了 `neo-cli`，以便管理钱包并执行其他 RPC 操作。\n\n接着，你通过安装 `neo-python`\
  \ 和 `neo-privatenet-docker` 创建了一个本地 NEO 私有测试网。你引导了该测试网，启动了 NEO bash，然后能够启动你的网络并领取\
  \ NEO 和 GAS。\n\n此外，我还介绍了安装 NEO 工具过程中可能遇到的问题。\n\n然后，你创建了两个“Hello, World”项目，一个用 C#\
  \ 编写，另一个用 Python 编写，并成功将这些项目编译成了 NEO 虚拟机的字节码（AVM）文件。你学习了如何将这些文件发布到 NEO 测试网区块链以及\
  \ NEO 主网上。\n\n最后，我对以太坊、EOS 和 NEO 进行了比较，以帮助你更好地理解这些平台之间的差异，以及在选择智能合约平台时应参考的标准。\n\n"
- "# 8. Hyperledger\n\n在前面的章节中，我介绍了专注于加密货币的区块链技术。事实上，到目前为止介绍的每个项目都包含其自身的货币。Hyperledger\
  \ 则不同；它不附带任何货币，尽管你可以在需要时创建一种代币。相反，Hyperledger 的创建目标是成为一个开源平台，旨在利用区块链来满足商业需求。\n\n\
  Hyperledger 始于 2015 年，是 Digital Asset 和 IBM 在一场黑客马拉松中贡献的开源区块链（现在该区块链被称为 Hyperledger\
  \ Fabric），随后扩展为由多个可插拔模块组成，整个项目称为 Hyperledger，旨在提高区块链的性能和可靠性，以便你可以组装模块来创建适合你业务需求的独特平台。\n\
  \n#### 注意\n\nHyperledger 项目采用伞式战略模块化架构，由一组用于为企业创建定制区块链解决方案的可插拔组件组成。该架构旨在提供可扩展性、性能、机密性、弹性和灵活性。请注意，如果你查阅\
  \ Hyperledger 的文档，经常会看到“分布式账本技术”（DLT）这个术语；它与“区块链”是同义词。\n\n## Hyperledger 概述\n\n\
  模块化架构允许你调整诸如区块链的共识机制之类的内容，以及管理存储、设置身份服务、为你设置的身份设置权限，并创建智能合约（在 Hyperledger Fabric\
  \ 中，智能合约被称为*链码*）。在编程语言方面，Hyperledger 的链码使用 Go（Golang）编写；但是，你可以利用 Hyperledger Composer\
  \ 工具使用 JavaScript。然后，链码可用于实现和自动化业务逻辑。\n\nHyperledger 项目的管理团队由十名成员组成，在撰写本文时，执行董事是\
  \ Brian Behlendorf。此外，根据 `developer.ibm.com` 的数据，来自 27 个组织的 159 名工程师为 Hyperledger\
  \ Fabric v1.0 做出了贡献。\n\n> “*Hyperledger* 是一个开源开发项目，旨在惠及基于 Hyperledger 的解决方案提供商和用户生态系统。它专注于能够在各种工业领域应用的区块链相关用例。”\n\
  > \n> — Brian Behlendorf（Hyperledger 执行董事）\n\nHyperledger 由 Linux 基金会托管。在应用方面，它得到了\
  \ IBM、Intel、SAP 等大型企业公司的支持，并且被 Oracle、Accenture、The National Association of Realtors、Deutsche\
  \ Borse Group、Sony Global Education 等众多机构所采用。\n\nHyperledger 的共识机制允许节点网络在“无操作”（无共识）机制和一种称为实用拜占庭容错（PBFT）的协议之间进行选择。PBFT\
  \ 共识通过赋予节点完全控制权来使两个或多个节点达成一致。这阻止了网络上的其他节点强制生成区块，从而防止了潜在的双花攻击，就像你在 PoW 中看到的 51% 的潜在挖矿攻击那样。Hyperledger\
  \ 让你掌控共识机制，并且可以限制对交易的访问。这带来了更高的性能和可扩展性，因为需要就区块达成一致的节点更少。此外，PBFT 为网络提供了隐私性，这比你在其他区块链中看到的完全透明性更适合商业应用。\n\
  \n为了让你了解 Hyperledger 的灵活性，你可以使用动态共识并启用所谓的*热插拔*功能，即在网络运行时替换共识算法（使用 Hyperledger Sawtooth\
  \ 实现）。\n\n专注于加密货币的区块链通常提供交易和网络数据的透明性，因为它们处理的是资金且大多涉及不受信任的成员。然而，这也限制了灵活性以及你可以对网络进行修改的程度和可控制的程度，因为你受制于一套规则。Hyperledger\
  \ 没有自身货币的支持，并提供了更精细的控制。\n\nHyperledger 项目以基本功能构建，采用原汁原味的设计，旨在让开发者能够尽可能定制一切，从区块链的共识机制到\
  \ Web 界面身份的权限，从而向成员提供有限的数据。\n\n这种模块化架构方法允许开发者创建特定、定制、个性化的区块链，以精确满足业务需求。Hyperledger\
  \ 包含以下主要的开源框架和工具。\n\n- Hyperledger 框架：\n    - *Hyperledger Fabric (IBM 贡献)*：这是一个带有\
  \ Node.js、Java 和 GoLang SDK 的许可区块链基础设施。Hyperledger Fabric 是 Hyperledger 的核心，支持使用\
  \ GoLang 和 JavaScript（利用 Hyperledger Composer 或原生方式）编写的链码。该区块链基于背书者/排序者架构。你将在本章后面部分了解更多信息。\n\
  \    - *Hyperledger Burrow*：这是一个按规范构建的以太坊虚拟机。\n    - *Hyperledger Indy*：将其视为独立体。这是一个用于在分布式账本上运行独立身份的工具和库。\n\
  \n\n\n### Hyperledger\n\n## Hyperledger 框架\n\n- **Hyperledger Iroha**：此框架专为移动应用设计；其代码基于\
  \ `Hyperledger Fabric`。\n\n- **Hyperledger Grid**：这是一个基于分布式账本的供应链解决方案。该框架封装了数据类型、模型和智能合约的\
  \ `Hyperledger` 实现，并展示了构建供应链业务解决方案的实用方法。\n\n- **Hyperledger Sawtooth（由英特尔贡献）**：此框架包含动态共识机制，支持在运行中的网络上热切换共识算法。这是一种更传统的区块链架构。\n\
  \n- **Hyperledger 工具**：\n    - **Hyperledger Caliper**：这是一个区块链基准测试工具。\n\n- **Hyperledger\
  \ Cello**：这是一个按需提供的区块链模块工具包，用于创建、管理和终止区块链。\n\n- **Hyperledger Composer**：此工具具有协作功能，可与\
  \ `Hyperledger Fabric` 配合使用，为面向企业的链码和区块链应用构建区块链。\n\n- **Hyperledger Explorer**：这是一个用于查看、调用、部署以及查询区块、交易和网络数据的模块。\n\
  \n- **Hyperledger URSA**：这是一个共享的密码学库；其中包含多个共享项目，例如若干不同签名方案（基础密码库）的实现，以及 Z-mix（零知识证明）（`https://github.com/hyperledger-labs/z-mix`）。\n\
  \n- **Hyperledger Quilt/Interledger.js**：这是一个跨账本协议（ILP），意指账本间的原子交换。该支付协议支持跨分布式和非分布式账本转移资产（价值）。它有两种实现方式：Java\
  \ 版本称为 `Quilt`，JavaScript 版本称为 `Interledger.js`。\n\n可以构建一个 `Hyperledger` 项目，使得交易既透明又能在需要时保密。例如，设想以下业务需求：一家航空公司想向另一家企业（比如\
  \ Expedia）出售座位。该航空公司的业务需求是创建自己的区块链来跟踪库存、创建交易、设定价格并保持数据机密。航空公司可以从区块链中获益，但它不需要加密货币，也不想公开分享所有数据。该航空公司可以利用\
  \ `Hyperledger` 设置一个私有许可网络，而无需像在公有账本上那样将数据暴露给全世界。\n\n然后，航空公司可以通过签发访问受限的加密密钥来设置特定身份的特殊权限，并将这些密钥仅提供给特定参与方。例如，只有一家组织（比如\
  \ Expedia）能够查看与 Expedia 相关的交易、座位定价和航班信息；而其他身份（如实际客户）只能查看与其账户和航班信息相关的预订信息。\n\n财务团队可以持有提供更多数据的加密密钥，例如利润与亏损、燃油成本以及其他内部所需的数据。这对企业来说是有益的，因为他们可以在账本上运行数据，而不是在更容易受到黑客攻击的中心化数据库上运行数据。\n\
  \n如您所见，`Hyperledger` 是一个庞大的项目，涵盖了六个框架以及五个工具。在一章中涵盖所有这些内容是不切实际的；事实上，它完全可以写成一本完整的书。在本章中，我将为您提供一个良好的基础，帮助您理解\
  \ `Hyperledger` 的基本概念，然后您可以自行继续尝试其他平台和工具。本章将重点介绍 `Hyperledger Fabric`，因为它是最流行的 `Hyperledger`\
  \ 平台。\n\n### 理解 Hyperledger Fabric\n\n正如我之前指出的，`Hyperledger Fabric` 是一个开源框架实现，旨在用于私有且基于许可的业务网络。\n\
  \n在本章中，您将创建私有网络许可身份，然后创建一个链码来实现特定的业务逻辑。\n\n`Hyperledger Fabric` 被设计为 `Hyperledger`\
  \ 的基础，然后您可以使用 `Hyperledger` 的模块化架构，根据您的业务需求添加特定模块。一个 `Hyperledger Fabric` 网络由以下组件组成：\n\
  \n- **资产（Assets）**：资产是代表价值的键值对。价值可以是任何东西，例如文档、股票或加密货币代币。每个资产都持有状态和所有权。\n\n- **共享账本（Shared\
  \ ledger）**：共享账本持有自己的一份账本副本，其中包含资产的状态。该账本被称为*世界状态*。共享账本还持有区块链的副本，该副本通过记录交易历史来存储资产的所有权。\n\
  \n- **智能合约（链码）**：`Hyperledger Fabric` 将智能合约称为*链码*，可以用 `Go`（`GoLang`）或 `JavaScript`（`Node.js`）进行编程。链码可以与共享账本、资产和交易进行交互。这里没有什么新东西；您在其他区块链中已经看到过。链码包含业务逻辑，并且可以设置背书策略。\n\
  \n\n\n#### Note\n\n在 Hyperledger Fabric 中，用户可以定义链码执行的资产背书策略。背书策略设置所需同意的节点对等体，以决定一个接受的事务是否有效，并将其添加到共享账本中。\n\
  \n- **成员服务提供者（`MSP`）**：`MSP` 是管理数字证书的证书颁发机构；它管理用户 ID 并认证网络上的所有参与者。所有成员必须是已知身份才能在\
  \ Fabric 上进行交易。这是因为网络是私有的，且基于权限。`MSP` 用于认证和验证这些成员的身份和权限。`MSP` 使用一个名为 `cryptogen`\
  \ 的证书生成工具。要更好地理解 `MSP`，请访问此处文档：[`https://hyperledger-fabric.readthedocs.io/en/latest/msp.html`](https://hyperledger-fabric.readthedocs.io/en/latest/msp.html)。\n\
  \n- **对等节点（`Peer nodes`）**：Hyperledger Fabric 网络构建于由网络成员拥有和贡献的对等节点之上。节点可以是组织或个人。节点持有共享账本，并且可以执行链码。节点可以访问账本数据；它们可以背书事务并与应用程序交互。节点可以拥有背书对等体的权限或背书者的角色。对等节点接收排序后的账本状态更新作为所接收区块的一部分，以维护账本或\
  \ Hyperledger 所称的“世界状态”（world state）。\n\n- **通道（`Channel`）**：通道可由一组对等节点创建。一组节点可以创建一个单独的事务账本。通道类似于你在第\
  \ [3] 章创建自己的区块链时所建立的 P2P 通道。\n\n- **组织（`Organizations`）**：每个对等节点贡献资源，共同形成集体网络。拥有者组织可以通过\
  \ `MSP` 使用数字证书分配对等节点。此外，来自不同组织的对等节点可以加入同一个通道。拥有独立对等节点的组织能够共享相同的 `MSP`。最佳实践是为每个组织设置一个\
  \ `MSP`。\n\n- **排序服务（`Ordering service`）**：该服务将事务打包成区块。然后，区块可以广播给共享 P2P 通道上的对等节点和客户端。该通道以相同的逻辑顺序向所有对等节点输出相同的消息。一致的逻辑顺序被称为“原子交付”（atomic\
  \ delivery）。\n\n请查看图 [8-1]，该图是构成 Hyperledger Fabric 各组件的图示。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig1_HTML.jpg](img/475651_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1\n\nHyperledger Fabric 图形化解释。图片来源：developer.ibm.com。\n\n让我们使用图 [8-1] 中鸟瞰式的图形化概述来走一遍\
  \ Fabric 网络。Hyperledger Fabric 网络充当客户端应用程序的后端层。\n\n客户端应用程序可以是任何东西，例如 DApp、门户、业务活动或网站；这些类型的应用程序是前端层，它们可以通过编程\
  \ Hyperledger Fabric SDK 或 REST Web 服务来访问链码、事务和事件。客户端调用链码节点，该节点使用 SDK 与网络交互。与迄今为止介绍的传统区块链不同，Fabric\
  \ 的特殊之处在于并非所有对等节点都具有相同权限。\n\n同样与传统区块链不同的是，Hyperledger Fabric 不允许未知身份在网络上进行交易。组织（称为“成员”）构建\
  \ Hyperledger Fabric 网络，每个成员可以通过 `MSP` 设置其节点对等体。你可以在图 [8-1] 中看到，示例中有 `ORG1 MSP`\
  \ 和 `ORG2 MSP`。\n\n对等节点可以在网络中设置不同的规则：背书对等体、锚点对等体和排序对等体。\n\n- **背书对等体（`Endorser peer`）**：它接收请求以验证事务并执行链码。背书者可以批准或不批准该事务。只有背书节点执行链码，因此无需在所有对等节点上安装链码。\n\
  \n- **锚点对等体（`Anchor peer`）**：这些对等体接收消息，并向组织中的其他对等体发送消息。P2P 网络由不同的通道组成，这些通道可以设置权限，因此不会对网络上的所有人可见。\n\
  \n- **排序对等体（`Orderer peer`）**：该对等体处理共享账本，并负责维护整个网络的状态。排序对等体生成区块并广播给所有对等体。排序对等体可以设置为\
  \ `Solo` 或 `Kafka` 模式。\n\n- **`Solo`**：用于开发，存在单点故障。你将在本章中为开发环境设置此模式。\n\n- **`Kafka`**：用于生产环境。Kafka\
  \ 构建时具有容错特性。\n\n你将创建链码并将其部署到 `Solo` 对等体上的 Fabric 网络，然后你将能够访问并运行函数。要发送事务，你的客户端应用程序可以连接到\
  \ SDK 并创建一个事务。然后该事务被发送给进行背书的 `Solo` 对等体，该对等体验证签名并发送背书签名。背书签名被发送到排序服务。在生产环境中，排序服务随后会将事务发送给所有网络连接的节点，这些节点更新其账本上的世界状态。\n\
  \n我鼓励你访问 Hyperledger 页面以了解更多信息并阅读白皮书：[`https://www.hyperledger.org/projects/fabric`](https://www.hyperledger.org/projects/fabric)。\n\
  \n## 安装 Hyperledger Fabric 和 Composer\n\n开始使用 Hyperledger 网络的一个好方法是安装 Hyperledger\
  \ Fabric 和 Composer。你将通过安装所有工具和库以及 Hyperledger Fabric 和 Composer 来搭建环境；然后，通过启动和停止\
  \ Hyperledger Fabric 并检查 Composer 的库是否安装正确，来验证安装是否成功。\n\n### 前提条件\n\nHyperledger\
  \ Fabric 和 Hyperledger Composer 依赖许多工具和库，并且由于每个用户使用不同的机器，这个过程可能不会快速和简单，并且可能会限制 Hyperledger\
  \ 的适应性。我已将此过程分解为以下步骤：\n\n1. 验证已安装的前提条件。\n2. 更新 Git。\n3. 安装 Node Version Manager。\n\
  4. 更新 Node.js。\n5. 安装 VSCode。\n6. 安装 Hyperledger Composer 扩展。\n7. 安装 Hyperledger\
  \ Composer 基本 CLI 工具。\n8. 安装 Hyperledger Fabric。\n\n建议你访问 Hyperledger Fabric 前提条件页面，因为版本和要求可能已更改：[`https://hyperledger.github.io/composer/v0.19/installing/installing-prereqs.html`](https://hyperledger.github.io/composer/v0.19/installing/installing-prereqs.html)。\n\
  \n在开始之前，建议你更新并升级 Brew（如果你有一段时间没有这样做的话）。\n\n```\n> brew update && brew upgrade\n\
  ```\n\n\n  \n#### 验证已安装的先决条件  \n\n安装 Hyperledger Fabric 需要一系列先决条件；不过，如果你一直跟随本书各章节的操作，大多数先决条件应该已经安装到你的计算机上了。\
  \  \n\n对于操作系统，Fabric 至少需要 macOS 10.12 版本。你可以通过电脑左上角的菜单检查版本。点击苹果图标，选择“关于本机”。概览选项卡会打开并显示\
  \ macOS 版本。如果你运行的是较旧版本，请点击“软件更新”按钮获取 10.12 更新。撰写本文时，macOS 被称为 Mojave，版本号为 10.14.4。\
  \  \n\n你还需要 Xcode 和 Docker。这些在前面的章节中已经安装过，但你需要确认它们已安装且版本正确。只需运行 `xcode-select --version`\
  \ 命令来确保 Xcode 正在运行。你可以将你的结果与我的进行对比，如下所示：  \n\n```\n> xcode-select -v  \nxcode-select\
  \ version 2354.  \n> docker --version  \nDocker version 19.03.0-beta3, build c55e026\
  \  \n```\n\n你需要 Docker-Compose 1.8 或更高版本。  \n\n```\n> docker-compose --version \
  \ \ndocker-compose version 1.24.0, build 0aa59064  \n```\n\n你需要 `npm` v5.x 或更高版本。\
  \  \n\n```\n> npm --version  \n6.8.0  \n```\n\n你需要 Python 2.7.x 或更高版本。  \n\n```\n\
  > python --version  \nPython 2.7.10  \n```\n\n#### 更新 Git  \n\n安装要求 Git 2.2.x 或更高版本。然而，Mac\
  \ 自带的是较旧版本的 Git；你可以通过以下命令检查版本：  \n\n```\n> git --version  \ngit version 2.20.1 (Apple\
  \ Git-117)  \n```\n\n要升级 Git，你将通过 Brew 安装 Git，并将计算机设置为使用 Brew 中的 Git 版本，而不是 Mac\
  \ 自带的版本。首先，通过 Brew 安装 Git。  \n\n```\n> brew install git  \n```\n\n接下来，你将设置路径指向新的\
  \ Git 位置；使用 vim 或你喜欢的文本编辑器。  \n\n```\n> vim ~/.bash_profile  \n```\n\n将以下内容添加到 `PATH`\
  \ 中：  \n\n```\n#git point to brew  \nPATH=/usr/local/bin:$PATH  \n```\n\n别忘了在保存并退出\
  \ bash profile 文件后运行 `.bash_profile`，以确保更改生效。  \n\n```\n> . ~/.bash_profile  \n\
  ```\n\n最后，你可以验证 Git 的版本。  \n\n```\n> git --version  \n```\n\n现在你已指向通过 Brew 安装的 Git\
  \ 位置，将来升级 Git 时，只需运行以下命令：  \n\n```\n> brew upgrade git  \ngit version 2.21.0  \n\
  ```\n\n#### 安装 Node 版本管理器 (nvm)  \n\n需要 Node 版本管理器 (`nvm`)。要下载或更新 `nvm`，请查看 GitHub\
  \ 页面 [`github.com/creationix/nvm/blob/master/README.md`](https://github.com/creationix/nvm/blob/master/README.md)\
  \ 并运行以下命令：  \n\n```\n> curl -o- https://raw.githubusercontent.com/creationix/nvm/v0.33.0/install.sh\
  \ | bash  \n```\n\n安装完成后，你可以确认是否安装正确。打开一个新终端，输入以下命令。我的版本是 0.34.0。  \n\n```\n> nvm\
  \ --version  \n0.34.0  \n```\n\n#### 更新 Node.js  \n\nNode 需要是 8 版本。要检查你运行的版本，请运行以下命令：\
  \  \n\n```\n> node --version  \n```\n\n撰写本文时，`hyperledger.github.io` 页面上列出的先决条件要求安装最新的（长期支持）Node\
  \ 版本；然而，这会导致致命错误，并且在 GitHub 上已记录了一个错误。Node.js 9 版本在撰写本文时也不被支持。  \n\n为了让 Hyperledger\
  \ Composer 正常工作，你将安装 node 8 并将 `nvm` 指向 node 8。  \n\n```\n> nvm install 8  \n> npm\
  \ config delete prefix  \n> nvm use 8  \n```\n\n你可以确认 node 8 已安装并正确设置。  \n\n```\n\
  > node --version  \nv8.15.0  \n```\n\n### 安装带 Hyperledger Composer 扩展的 VSCode  \n\
  \n建议你安装带 Hyperledger Composer 扩展的 Visual Studio Code (VSCode)，并将其用作代码编辑器。该扩展提供代码高亮功能，是一个专业的免费\
  \ IDE。首先，从这里下载 VSCode：[`code.visualstudio.com`](https://code.visualstudio.com)。点击“Download\
  \ for Mac”，如图 8-2 所示。  \n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig2_HTML.jpg](img/475651_1_En_8_Fig2_HTML.jpg)\
  \  \n\n图 8-2  \n\nVisual Studio Code 安装页面  \n\n安装完成后，启动 VSCode。  \n\n要安装 Hyperledger\
  \ Composer 扩展，点击 VSCode 左侧菜单，从左侧菜单栏中选择“扩展”（两个方块图标），在搜索框中输入 **Hyperledger Composer**。选择：Hyperledger\
  \ Composer。然后点击“安装”。最后，点击“重新加载”以激活它。参见图 8-3。  \n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig3_HTML.jpg](img/475651_1_En_8_Fig3_HTML.jpg)\
  \  \n\n图 8-3  \n\nVSCode Hyperledger Composer 扩展  \n\n#### Hyperledger Composer\
  \ 必备 CLI 工具  \n\n你将安装 Hyperledger Composer 必备 CLI 工具，包括 `composer-rest-server`、Composer\
  \ Playground 和 Yeoman 生成器。  \n\n要安装 Composer CLI，请运行以下命令。  \n\n```\n> npm install\
  \ -g composer-cli @0.19  \n```\n\n### 注意  \n\n我使用的是 0.19 版本。Hyperledger 的最新版本 0.20.6\
  \ 存在一些与所有工具和库相关的已知错误，因此我使用的是旧版本的 Hyperledger Composer 和 Hyperledger Fabric。这种情况可能会改变，因此你可能需要查看文档并安装其他版本。此外，我汇总了在安装和运行\
  \ Hyperledger Composer 和 Fabric 时可能遇到的许多潜在错误；请参阅本章后面的“错误故障排除”部分。  \n\n接下来，安装用于生成\
  \ Hyperledger Composer 应用程序的 Yeoman 工具，该工具使用 `generator-hyperledger-composer`。执行以下命令：\
  \  \n\n```\n> npm install -g generator-hyperledger-composer@0.19  \n```\n\n现在，你可以使用\
  \ `npm` 全局安装 Composer Playground。  \n\n```\n> npm install -g composer-playground@0.19\
  \  \n```\n\nComposer 的一部分是一个名为 `composer-rest-server` 的工具，它生成一个基于 loopback 的 REST\
  \ 接口，以便访问你将创建的网络。要安装该工具，请执行以下命令：  \n\n```\n> npm install -g composer-rest-server@0.19\
  \  \n> npm install -g Yeoman  \n```\n\n你可以通过运行 `--version` 标志来验证安装是否成功。  \n\n```\n\
  > composer --version  \nv0.19.20  \n> composer-rest-server --version  \nv0.15.2\
  \  \n> composer-playground --version  \n0.20.6  \n```\n\n要确保生成器工具已安装，如果你运行 `Yeoman`\
  \ 命令，它应列出 Hyperledger Composer 生成器。  \n\n```\n> Yeoman  \n```\n\n它将输出以下内容：  \n\n\
  ```\n? 'Allo! 你想做什么？ (使用方向键)  \n运行一个生成器  \n◻ Hyperledger Composer  \n```\n\n按 Control+C\
  \ 退出 `Yeoman` 命令。  \n\n\n\n### 使用 Docker 安装 Composer Playground\n\n除了通过`npm`全局安装\
  \ Composer 工具外，您还可以使用 Docker 运行 Hyperledger Composer Playground；只需运行容器并指定`composer-playground`作为名称即可。它将在\
  \ 8080 端口上运行。\n\n```\ndocker run --name composer-playground --publish 8080:8080\
  \ hyperledger/composer-playground\n```\n\n该 Docker 命令会下载镜像，如图 8-4 所示。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig4_HTML.jpg](img/475651_1_En_8_Fig4_HTML.jpg)\n\
  \n*图 8-4. Composer-playground Docker 容器输出*\n\n若要取消容器，请按下`Control+C`。\n\n现在，若要在浏览器中通过\
  \ 8080 端口运行 Playground，请按`Command+T`打开一个新的终端窗口，并运行`open`命令。\n\n```\nopen http://localhost:8080\n\
  ```\n\n您将看到 Hyperledger Composer Playground 欢迎页面，如图 8-5 所示。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig5_HTML.jpg](img/475651_1_En_8_Fig5_HTML.jpg)\n\
  \n*图 8-5. Playground 欢迎界面*\n\n请记住，要停止 Docker，可以运行`stop`命令。\n\n```\ndocker stop composer-playground\n\
  ```\n\n若要移除`composer-playground`名称以便再次使用，您需要运行以下命令：\n\n```\ndocker rm --force composer-playground\n\
  ```\n\n### 安装 Hyperledger Fabric 开发服务器\n\n在撰写本文时，Hyperledger Fabric 的最新版本是 v1.4.1；您应该访问\
  \ GitHub 页面以获取最新版本和文档，因为版本可能会发生变化；请参见[`github.com/hyperledger/fabric`](https://github.com/hyperledger/fabric)。\n\
  \nHyperledger Fabric 开发服务器提供不同版本可供选择。您将搭建一个 Hyperledger Fabric v1.2 网络用于开发。然后，您可以部署使用\
  \ Hyperledger Composer 构建的区块链业务网络，并测试您的应用程序。\n\n创建一个目录来下载 Fabric；我选择了`~/fabric-dev-servers`，但您可以选择任意目录。\n\
  \n```\nmkdir ~/fabric-dev-servers && cd ~/fabric-dev-servers\n```\n\n您将使用`curl`来获取安装\
  \ Hyperledger Fabric 所需的`.tar.gz`文件，如下所示：\n\n```\ncurl -O https://raw.githubusercontent.com/hyperledger/composer-tools/master/packages/fabric-dev-servers/fabric-dev-servers.tar.gz\n\
  ```\n\n使用`tar`解压您下载的文件。\n\n```\ntar xzf fabric-dev-servers.tar.gz\n```\n\n解压完成后，您将获得一些脚本文件，可帮助快速启动\
  \ Hyperledger Fabric 实例。运行`ls`命令，您可以看到`.sh`文件以及其他有用的文件。\n\n```\nls\nstartFabric.sh\n\
  teardownAllDocker.sh\nstopFabric.sh\nteardownFabric.sh\n```\n\n当您运行 Composer 的`–v`命令时，可以检查您正在运行的版本。您看到您确实安装了\
  \ Hyperledger Composer v0.19，因此根据文档，您需要使用 Hyperledger Fabric v1.1，并且可以将 Fabric 启动超时时间设置为\
  \ 30 秒；这是运行脚本后等待网络启动的时间。\n\n```\nexport FABRIC_VERSION=hlfv11\nexport FABRIC_START_TIMEOUT=30\n\
  ```\n\n### 提示\n\n如果您运行的是不同版本的 Hyperledger Composer，请查看 GitHub 页面以了解需要设置哪个版本的 Fabric：[`github.com/hyperledger/composer-tools/tree/master/packages/fabric-dev-servers`](https://github.com/hyperledger/composer-tools/tree/master/packages/fabric-dev-servers)。\n\
  \n要启动您的 Hyperledger Fabric 网络，首先需要执行下载 Fabric 的脚本；这可能需要一些时间，具体取决于您的网络连接情况。\n\n```\n\
  ./downloadFabric.sh\n```\n\n就是这样；您应该会看到如图 8-6 所示的输出。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig6_HTML.jpg](img/475651_1_En_8_Fig6_HTML.jpg)\n\
  \n*图 8-6. 下载 Hyperledger Fabric 输出*\n\n下载完成后，您可以确认已拥有 Docker 容器。\n\n```\ndocker\
  \ image ls hyperledger/*\nhyperledger/fabric-ca\nhyperledger/fabric-orderer\nhyperledger/fabric-peer\n\
  hyperledger/fabric-ccenv\nhyperledger/fabric-couchdb\n```\n\n### 网络连接配置文件\n\n有一个名为`DevServer_connection.json`的网络连接配置文件\
  \ JSON。在本节中，您将修改该文件以适配您即将创建的 Docker localhost 容器。在修改文件之前，最好先制作一个副本。\n\n```\ncd ~/fabric-tools/\n\
  cp DevServer_connection.json DevServer_connection-backup.json\n```\n\n将原始文件中的排序节点、对等节点和证书颁发机构指向\
  \ localhost，因为您将在网络中以 Docker 容器的方式运行 Composer Rest Server，并访问这些网络上的主机名。使用`vim`或您喜欢的编辑器编辑`DevServer_connection`文件。\n\
  \n```\nvim DevServer_connection.json\n```\n\n请参见图 8-7。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig7_HTML.jpg](img/475651_1_En_8_Fig7_HTML.jpg)\n\
  \n*图 8-7. 修改 devServer.json 指向本地主机*\n\n您还需要编辑 hosts 文件，将主机指向本地服务器上的 127.0.0.1。\n\
  \n```\nsudo vim /etc/hosts\n#### fabric\n127.0.0.1 orderer.example.com peer0.org1.example.com\
  \ ca.org1.example.com\n```\n\n### 启动本地 Hyperledger Fabric 业务网络\n\n首次运行 Hyperledger\
  \ Fabric 时，需要执行命令来启动本地 Hyperledger Fabric 实例并为管理员生成身份证。默认管理员名为`PeerAdmin`。要开始，请运行`start\
  \ fabric`命令。\n\n```\n./startFabric.sh\n```\n\n预期输出将确认您的变量。\n\n```\nDevelopment only\
  \ script for Hyperledger Fabric control\nRunning 'startFabric.sh'\nFABRIC_VERSION\
  \ is set to [version number]\n...\nCreating network \"composer_default\" with the\
  \ default driver\nCreating ca.org1.example.com\nCreating orderer.example.com\n```\n\
  \n作为启动脚本的一部分，您可以看到确认`composer_default` Docker 网络已创建，并且容器正在所创建的网络中运行的输出行。这些容器能够使用自定义主机名进行通信：`ca.org1.example.com`\
  \ 和 `orderer.example.com`。\n\n### 创建管理员身份证\n\n现在您已有一个正在运行的网络，最后一个设置步骤是创建凭据。您可以使用\
  \ Hyperledger Composer 创建 Hyperledger Fabric 所称的`.card`文件。您可以通过执行以下命令生成管理员身份证：\n\
  \n```\n./createPeerAdminCard.sh\n```\n\n您可以将您的输出与我的输出进行比较，如图 8-8 所示。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig8_HTML.jpg](img/475651_1_En_8_Fig8_HTML.jpg)\n\
  \n*图 8-8. Hyperledger Composer 生成身份证*\n\n要确认身份证创建成功，请使用`<card name>`执行以下命令：\n\n\
  ```\ncomposer card list --card PeerAdmin@hlfv1\n```\n\n该命令会输出有关身份证的信息。请参见图 8-9。\n\
  \n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig9_HTML.jpg](img/475651_1_En_8_Fig9_HTML.jpg)\n\
  \n*图 8-9. Hyperledger Composer 卡片列表*\n\n### 停止 Hyperledger Fabric\n\n暂时让 Fabric\
  \ 保持运行状态，但完成练习后，您可以通过执行`stop`命令来关闭 Hyperledger Fabric 运行时。\n\n```\n./stopFabric.sh\n\
  ```\n\n此外，您还应在开发周期结束时执行`teardown`脚本，以确保释放内存。\n\n```\n./teardownFabric.sh\n```\n\n\
  #### 注意\n\n如果您运行了`teardown`脚本，下次启动运行时时，您将需要像首次启动步骤一样创建一个新的 PeerAdmin 卡片。请参见以下步骤。\n\
  \n\n\n## 重新创建 PeerAdmin 身份卡\n\n当你使用以下命令停止并拆除网络后：\n\n```\n> ./stopFabric.sh\n> ./teardownFabric.sh\n\
  ```\n\n你需要重新创建管理员身份卡，因此只需执行以下相同的命令即可：\n\n```\n> ./startFabric.sh\n> ./createPeerAdminCard.sh\n\
  > composer card list --card PeerAdmin@hlfv1\n```\n\n按照图 8-10 中的流程操作是个好主意，该图展示了启动卡、停止卡、创建卡和拆除网络所需执行的步骤。\n\
  \n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig10_HTML.jpg](img/475651_1_En_8_Fig10_HTML.jpg)\n\
  \n图 8-10 Fabric-dev-servers 启动-停止流程。图片来源：github.com/hyperledger/composer-tools。\n\
  \n## Hyperledger Composer\n\n现在你已经安装并运行了 Hyperledger Fabric 网络，下一步是编写链码。你可以使用 Go\
  \ 语言原生地在 Hyperledger Fabric 中编写链码；不过，你也可以利用 Hyperledger Composer 通过 JavaScript 编码来帮助创建链码和区块链应用程序，而无需使用\
  \ Go 语言。Hyperledger Composer 获取定义文件并生成业务网络存档（`.bna`）文件，然后你可以将这些文件部署到 Hyperledger\
  \ 网络上运行。Composer 易于使用，不仅面向开发者，也面向业务人员。\n\nHyperledger Composer 由三个组件组成（见图 8-11）。\n\
  \n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig11_HTML.jpg](img/475651_1_En_8_Fig11_HTML.jpg)\n\
  \n图 8-11 Hyperledger Composer 图形化说明。图片来源：developer.ibm.com。\n\n- **业务网络存档 (.bna)**：由打包在一起的四个文件组成。\n\
  - **Hyperledger Composer Playground**：用于配置和部署网络，以及在不部署区块链的情况下测试代码。\n- **REST API\
  \ 支持**：暴露出可供前端客户端（如去中心化应用）使用的功能。\n\n## 使用 Playground 实现“Hello, World”\n\n你将创建一个“Hello,\
  \ World”应用程序，并使用 Playground 将其部署到网络上。首先，通过命令行打开 Playground 并执行以下命令：\n\n```\n> composer-playground\n\
  ```\n\n或者，你也可以使用 Docker。打开后，点击“Let's Blockchain!”关闭欢迎界面。\n\n### 部署业务网络\n\n接下来，选择“Deploy\
  \ a new business network”（部署新业务网络）。在部署向导中，输入基本信息，例如在“Give your new Business Network\
  \ a name”（为新业务网络命名）输入框中输入 `hello-network`。\n\n选择中间的 `empty-business-network` 网络定义，然后点击“Deploy”（部署），如图\
  \ 8-12 所示。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig12_HTML.jpg](img/475651_1_En_8_Fig12_HTML.jpg)\n\
  \n图 8-12 Hyperledger Composer Playground 部署新业务网络向导\n\n系统会为你的网络创建一个管理员身份卡。要连接到网络，请点击“Connect\
  \ now”（立即连接）链接，如图 8-13 所示。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig13_HTML.jpg](img/475651_1_En_8_Fig13_HTML.jpg)\n\
  \n图 8-13 连接到 `hello-network` 业务网络定义\n\n现在你已连接到该业务网络定义网络，你可以定义模型并对其进行操作。\n\n### 业务网络存档\
  \ (.bna)\n\n业务网络模型包括资产以及这些资产相关的交易。Hyperledger Composer 需要将以下内容打包在一起：一个网络模型文件、一个\
  \ JavaScript 文件（`.js`）、一个访问控制文件（`.acl`）和一个查询文件（`.qry`）。这些定义文件用于生成你的网络。\n\n- **网络模型\
  \ (.cto)**：该文件定义了资产、交易以及可以与这些资产交互的参与者。该文件使用名为 CTO（源自原始项目名 Concerto）的建模语言创建。\n- **JavaScript\
  \ 文件 (.js)**：该文件定义了交易处理器函数，即链码。\n- **访问控制 (ACL) (.acl)**：该文件包含定义不同参与者权限的访问控制规则。\n\
  - **查询 (.qry)**：该文件定义了可在网络中运行的查询。\n\nHyperledger Composer 接收这四个文件，并创建一个打包为存档（`.bna`）文件的业务网络定义。这些\
  \ `.bna` 文件可以部署在 Hyperledger Fabric 网络上。\n\n然后，你可以编写一个客户端应用程序（例如去中心化应用），该应用程序可以使用\
  \ Hyperledger Composer API 来访问你通过 Hyperledger Fabric 网络编写的智能合约（`.bna` 功能）。\n\n###\
  \ 添加模型文件\n\n要创建模型文件，你可以添加组成 `.bna` 存档的文件。例如，要添加一个模型文件，请点击“Add a file”（添加文件），选择“Model\
  \ File (.cto)”（模型文件），然后点击“Add”（添加），如图 8-14 所示。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig14_HTML.jpg](img/475651_1_En_8_Fig14_HTML.jpg)\n\
  \n图 8-14 向业务网络模型添加文件\n\n对于 `.cto` 文件，你将定义处理函数和交易。\n\n对于命名空间，你将使用一个名为 Skynet 的虚构公司，并使用类型为\
  \ `String` 的标识符 ID。你还将创建一个 `msg` 字符串和一个交易 `Hello`，并传递包含消息的 `Myfunction` 资产。\n\n\
  ```\nnamespace org.skynet.mymodel\nasset Myfunction identified by id {\no String\
  \ id\no String msg\n}\ntransaction Hello {\n--> Myfunction check\n}\n```\n\n###\
  \ 添加链码\n\n接下来，通过点击“Add a file”（添加文件）来添加一个 JS 文件。编写链码作为打印消息到控制台的交易逻辑，如下所示：\n\n```\n\
  /**\n@param {org.skynet.mymodel.Hello} hello\n@transaction\n*/\nfunction hello(hello)\
  \ {\nconsole.log(\"Hello \" + hello.check.msg);\n}\n```\n\n交易代表链码，即应用程序的业务逻辑。请注意，注释表明该代码是一个交易函数及其命名空间。点击“Deploy\
  \ changes”（部署更改）以更新你的定义模型。\n\n### 创建资产\n\n接下来，为了测试模型，你将创建一个新资产，进行扩展并存储它。为此，请点击右上角的\
  \ `+ Create New Asset`（创建新资产）。创建新资产向导将打开，如图 8-15 所示。模型已经包含一个 ID；但在此示例中，你将把它改为 `001`（但该字符串可以是任意字符串）。对于消息，你将传递\
  \ `world`。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig15_HTML.jpg](img/475651_1_En_8_Fig15_HTML.jpg)\n\
  \n图 8-15 创建新资产向导\n\n### 访问控制\n\n请注意，在“定义”(Define)选项卡的左下方，有一个访问控制选项，其中包含 `permissions.acl`\
  \ 文件，如图 8-16 所示。\n\n如你所见，这些规则授予了非常开放的“允许所有”访问权限，这些权限是可以更改的。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig16_HTML.png](img/475651_1_En_8_Fig16_HTML.png)\n\
  \n图 8-16 你的 `hello-network` 上的 ACL 权限文件\n\n\n\n#### 测试模型\n\n现在模型实例已保存，您可以提交交易来调用该交易。在左侧，点击\"\
  提交交易\"按钮。提交交易向导随即打开。将 `ID` 设置为 `001`，如图 8-17 所示。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig17_HTML.jpg](img/475651_1_En_8_Fig17_HTML.jpg)\n\
  \n图 8-17\nHyperledger Playground，提交交易向导\n\n在测试前，请打开开发者控制台以便查看 JavaScript 消息。对于 Safari\
  \ 浏览器，请按照以下说明操作。\n\n在顶部菜单中，选择 Safari ➤ 偏好设置。点击\"高级\"选项卡，然后勾选\"在菜单栏中显示'开发'菜单\"复选框。\n\
  \n完成这些步骤后，您会在顶部菜单中看到\"开发\"选项。选择\"显示 JavaScript 控制台\"（或按 `Command+Option+C` 键）。\n\
  \n接下来，点击\"提交\"；您将在 JavaScript 控制台中看到\"Hello world\"消息，如图 8-18 所示。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig18_HTML.jpg](img/475651_1_En_8_Fig18_HTML.jpg)\n\
  \n图 8-18\nJavaScript 控制台中显示的\"Hello world\"消息\n\n#### 导入/导出模型\n\n要导出模型，您可以生成业务网络归档文件（`.bna`）。此\
  \ `.bna` 文件随后可部署到生产环境。您只需点击\"导出\"链接即可，如图 8-19 所示。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig19_HTML.jpg](img/475651_1_En_8_Fig19_HTML.jpg)\n\
  \n图 8-19\n导出 `.bna` 文件\n\nPlayground 会生成 `hello-network.bna` 文件，该文件将下载到您的计算机上。\n\
  \n同样地，您可以导入一个 `.bna` 文件：点击\"添加文件\"链接，然后在\"从您的计算机上传文件...\"下，您可以浏览或拖放该 `.bna` 文件。\n\
  \n导入/导出功能不仅用于发布，还可以与他人共享模型以进行测试、开发或其他用途。我已将 `hello-network.bna` 文件包含在本书的代码中，欢迎导入使用；请参见\
  \ [`https://github.com/Apress/the-blockchain-developer/chapter8/hello-network`](https://github.com/Apress/the-blockchain-developer/chapter8/hello-network)。\n\
  \n`.bna` 文件实际上就是一个名为 `bna` 的 zip 文件夹。事实上，您可以将 `.bna` 文件复制为 `.zip` 文件并解压缩。\n\n```\n\
  > cp hello-network.bna hello-network.zip\n> unzip hello-network.zip\n```\n\n`VSCode`\
  \ 可用作您整个 Hyperledger 项目的集成开发环境。例如，既然您已经解压了文件，可以打开 VSCode，并将模型文件 `models/org.example.model.cto`\
  \ 拖放到 VSCode 中。您会看到代码已高亮显示，如图 8-20 所示。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig20_HTML.jpg](img/475651_1_En_8_Fig20_HTML.jpg)\n\
  \n图 8-20\nVSCode 中的模型 CTO 文件\n\n您之前使用 Web 界面在 Composer Playground 中编写了文件。这种方式对开发者的技术要求较低；然而，较大的项目可能包含复杂的业务逻辑、事件、多笔交易和测试，因此建议使用\
  \ VSCode 创建和管理项目文件，然后将这些文件上传到 Playground 进行部署。\n\n### Playground 在线版\n\nHyperledger\
  \ Composer Playground 有一个在线版本，访问地址为 [`https://composer-playground.mybluemix.net/`](https://composer-playground.mybluemix.net/)。您可以使用之前相同的步骤来创建您的网络和文件。请参见图\
  \ 8-21。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig21_HTML.jpg](img/475651_1_En_8_Fig21_HTML.jpg)\n\
  \n图 8-21\nComposer Playground\n\n要测试 Playground 在线版，您可以导入之前创建的 `hello-network.bna`\
  \ 文件。为此，首先点击\"Let's Blockchain!\"，然后在\"2. MODEL NETWORK STARTER TEMPLATE\"下选择\"\
  拖拽到此处上传或浏览\"，并上传 `hello-network.bna` 文件。点击右下角的\"部署\"按钮。您将看到网络已创建。点击\"立即连接\"链接以连接到新网络。请参见图\
  \ 8-22。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig22_HTML.jpg](img/475651_1_En_8_Fig22_HTML.jpg)\n\
  \n图 8-22\n`hello-network` 连接链接\n\n您可以重复相同的步骤来创建资产并进行测试，就像在本地 Playground 上所做的那样。\n\
  \n#### 使用 Yeoman 创建业务网络\n\n您使用了 Hyperledger Playground 来生成业务网络。Hyperledger Playground\
  \ 不仅面向开发者，也因其简易性而面向业务所有者；不过，您也可以在终端中创建网络。\n\nYeoman 提供了一个可用的向导。如果您不熟悉 Yeoman，它通过命令行提供了一个向导生成器。您可以运行\
  \ `Yeoman` 并选择 Hyperledger Composer 和业务网络生成器，或者运行以下命令：\n\n```\n> Yeoman hyperledger-composer:businessnetwork\n\
  ```\n\n请记住，Hyperledger Composer 不仅可用于生成业务网络，还可用于 Angular、LoopBack 和模型。请参见图 8-23。\n\
  \n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig23_HTML.jpg](img/475651_1_En_8_Fig23_HTML.jpg)\n\
  \n图 8-23\n使用 Yeoman 向导生成 `hello-network`\n\n`hello-network` 文件夹被生成，其中包含 `permissions.acl`、`models`、`features`、`test`\
  \ 和 `lib`。接下来，要创建 `.bna` 文件，您可以使用 Hyperledger Composer。请参见图 8-24。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig24_HTML.jpg](img/475651_1_En_8_Fig24_HTML.jpg)\n\
  \n图 8-24\n使用 Hyperledger Composer 生成 `hello-network` BNA 文件\n\n```\n> cd hello-network\n\
  > composer archive create -t dir -n .\n```\n\n运行 `ls` 命令，确认已生成 `hello-network@0.0.1.bna`\
  \ 文件。\n\n```\n> ls *.bna\nhello-network@0.0.1.bna\n```\n\n## 部署到本地 Hyperledger Fabric\
  \ 网络\n\n要将 `.bna` 文件部署到本地 Hyperledger Fabric 网络，请运行 `composer network install` 命令，并指定\
  \ `.bna` 文件以及身份卡。\n\n```\n> cd ~/fabric-dev-servers/\n> composer network install\
  \ --archiveFile ~/Desktop/hello-network.bna --card PeerAdmin@hlfv1\n```\n\n这将产生如图\
  \ 8-25 所示的成功输出。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig25_HTML.jpg](img/475651_1_En_8_Fig25_HTML.jpg)\n\
  \n图 8-25\n安装本地 Hyperledger Fabric 命令输出\n\n## 运行 \"hello-network\" 网络\n\nHyperledger\
  \ Composer 是一个应用程序开发框架，用于构建基于 Hyperledger Fabric 的区块链应用。\n\nHyperledger Composer\
  \ 根据您创建的业务网络定义生成 REST API。这是通过一个称为 LoopBack 连接器的方式实现的。您可以将这些 REST API 用于：a) 客户端（例如去中心化应用）；b)\
  \ 与非区块链客户端（例如网站）集成。这让您可以像使用任何带有中间件的数据库一样使用区块链账本。这非常强大。\n\nHyperledger Composer 可以生成一个\
  \ REST 接口。您可以在自己的计算机上运行 Hyperledger Fabric 并生成一个 GUI，然后使用此 GUI 与运行在您计算机上的网络进行交互，就像在真实的生产服务器上一样。\n\
  \n\n\n### 启动“hello-network”业务网络和管理员卡\n\n要运行你的“hello-network”网络，请执行以下命令，并参见图 8-26\
  \ 中的输出：\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig26_HTML.jpg](img/475651_1_En_8_Fig26_HTML.jpg)\n\
  \n图 8-26  \n启动业务网络\n\n```\n> composer network start --networkName hello-network\
  \ --networkVersion 0.0.2-deploy.3 -A admin -S adminpw -c PeerAdmin@hlfv1 --file\
  \ networkadmin.card\n```\n\n要确认操作成功，你可以运行 `docker ps` 命令。你应该能看到已创建的 `dev-peer0.org1.example.com-hello-network-0.0.2-deploy.3-0`\
  \ 镜像，如图 8-27 所示。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig27_HTML.jpg](img/475651_1_En_8_Fig27_HTML.jpg)\n\
  \n图 8-27  \nDocker 容器 hello-network\n\n```\n> docker ps\n```\n\n### 导入业务卡\n\n接下来，导入一张新的网络管理员卡，这样你就可以在你启动的业务网络中使用\
  \ `admin@hello-network`。\n\n```\n> composer card import --file networkadmin.card\n\
  ```\n\n此命令将导入网络管理员卡，其中将包含 `admin@hello-network`。\n\n```\n> composer network ping\
  \ --card admin@hello-network\n```\n\n你可以将你的输出与我的输出进行对比，如图 8-28 所示。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig28_HTML.jpg](img/475651_1_En_8_Fig28_HTML.jpg)\n\
  \n图 8-28  \n导入业务网络卡\n\n## 后续方向\n\n从这里开始，你可以为你的用户选择多种身份验证策略。例如，你可以根据组织正在使用的方案，选择\
  \ Google OAUTH2.0、SAML、`Passport-JWT` 或 LDAP。\n\n然后，你将能够在多用户模式下运行 REST 服务器，并测试与你创建的客户端应用程序（例如你之前创建的那个）的交互。\n\
  \n以下是一些可以帮助你设置应用程序以认证多个用户的文章：\n\n*   `Passport-JWT`：[`https://hyperledger.github.io/composer/latest/tutorials/google_oauth2_rest`](https://hyperledger.github.io/composer/latest/tutorials/google_oauth2_rest)\n\
  *   Google OAUTH2.0：`hyperledger/fabric-ca docker hyperledger/fabric-orderer hyperledger/fabric-peer\
  \ hyperledger/fabric-ccenv hyperledger/fabric-couchdb`\n\nHyperledger 是一个大型项目，由五个主要平台和五个主要工具组成。本章仅关注\
  \ Hyperledger Fabric。不过，我们鼓励你继续尝试其他 Hyperledger 平台和工具，例如 Hyperledger Sawtooth，包括设置环境、创建账户、编写更复杂的链码，以及部署链码并将其连接到去中心化应用。\n\
  \n要获取更多入门信息，请访问官方网站：[`https://sawtooth.hyperledger.org/docs/seth/releases/latest/getting_started.html`](https://sawtooth.hyperledger.org/docs/seth/releases/latest/getting_started.html)。\n\
  \n事实上，你可以在以下网址找到关于所有平台和工具的更多信息：[`https://www.hyperledger.org/`](https://www.hyperledger.org/)。\n\
  \n最后，请将 Hyperledger 开发者中心加入书签：[`https://developer.ibm.com/technologies/blockchain/`](https://developer.ibm.com/technologies/blockchain/)。\n\
  \n## 错误排查\n\nHyperledger 的设计初衷是简洁明了，允许你将多台不同机器上的模块拼接在一起，但这并不意味着没有问题。Hyperledger\
  \ 是为更高级的用户设置的，可能需要系统管理员权限来设置服务器。你可能已经遇到了一些错误，因此我将它们汇总在本节中。\n\n### Composer 运行时安装错误或找不到卡\n\
  \n如果你遇到如下错误：\n\n*   “composer runtime install error card not found peerAdmin”\n\
  *   “错误：找不到卡：`PeerAdmin@hlfv1`”\n\n这是因为管理员身份证创建不成功，或者未遵循正确的流程；你只需删除该身份证并重新创建即可。你需要删除\
  \ `composer` 文件夹，创建一个新文件夹，然后重新运行命令。\n\n```\n> rm -rf ~/.composer\n> mkdir ~/.composer\n\
  > ./createPeerAdminCard.sh\n```\n\n### Docker 未授权认证错误\n\n在下载 Hyperledger Fabric\
  \ 时，你可能会遇到以下错误：\n\n*   “unauthorized: authentication required”\n\n这是向 Docker Hub\
  \ 进行身份验证或代理时出现问题，与 Hyperledger Fabric 无关。\n\n要尝试修复此问题，请将你的计算机时间设置为与 UTC 时区一致：[`https://www.timeanddate.com/worldclock/timezone/utc`](https://www.timeanddate.com/worldclock/timezone/utc)。\n\
  \n在 [`https://hub.docker.com`](https://hub.docker.com) 创建一个 Docker 账户，然后登录。\n\n\
  ```\n> docker login\n```\n\n或者，在登出后重试。\n\n```\n> docker logout\n```\n\n### Docker\
  \ 容器冲突错误\n\n当你为某个项目使用 Docker 容器时，可能需要重新创建容器或停止某个容器；否则，你可能会遇到冲突错误。\n\n你需要做的就是停止并移除该容器。\n\
  \n```\n> docker stop [容器 id]\n> docker rm [容器 id]\n```\n\n### 提示\n\n如果你已经创建了一个 Mongo-Docker\
  \ 容器或任何其他会导致冲突的 Docker 容器，那么在尝试创建一个新的容器时，你将收到以下冲突错误：“容器名称已被容器 [容器 id] 使用。”你需要做的就是停止该容器并将其移除。\n\
  \n```\n> docker stop [容器 id]\n> docker rm [容器 id]\n```\n\n### 版本不匹配与清理\n\n如果你使用的\
  \ Hyperledger Composer 和 Hyperledger Fabric 版本不匹配，你可能会收到以下错误：\n\n*   “正在启动业务网络定义。这可能需要一分钟...\
  \ 错误：尝试启动业务网络时出错。错误：无法连接到任何对等事件中心。需要至少连接一个事件中心以接收提交事件。命令失败。”\n\n在 Hyperledger Fabric\
  \ 1.2 配合 Hyperledger Composer 0.20.6 的情况下也会出现此错误，因为存在一个未修复的 bug。要修复此问题，你需要检查你的 Hyperledger\
  \ Composer 版本，通过 `npm` 卸载，并重新安装 Hyperledger Fabric。\n\n此外，如果你需要完全清理，你需要停止并拆除 Fabric。要删除\
  \ Docker 镜像，删除 `fabric-dev-servers` ，最后删除 Composer，请遵循以下流程：\n\n```\n> cd ~/fabric-tools\n\
  > ./stopFabric.sh\n> ./teardownFabric.sh\n```\n\n接下来，停止 Docker 容器，移除它们，并通过运行以下命令移除所有\
  \ Docker 镜像：\n\n```\n> docker kill $(docker ps -q)\n> docker rm $(docker ps -a -q)\
  \ –f\n> docker rmi $(docker images -q) -f\n```\n\n现在你可以完全删除 `fabric-dev-servers`。\n\
  \n```\n> rm -rf ~/fabric-dev-servers\n```\n\n要移除 Composer 和管理员身份证，请运行以下命令：\n\n```\n\
  > sudo rm -rf ~/.composer\n> npm uninstall -g composer-cli\n```\n\n`npm uninstall`\
  \ 命令将输出一条确认信息，表明该库已卸载。\n\n\n\n## 总结\n\n本章中，我介绍了 `Hyperledger`，帮助你入门并理解其强大之处。我讲解了\
  \ `Hyperledger` 生态系统和术语，让你深入了解构成网络的各个组件以及可用的主要 `Hyperledger` 平台和工具。你安装了 `Hyperledger\
  \ Fabric` 和 `Hyperledger Composer`，并确保安装了必要的依赖库。你使用 `Playground` 创建了“Hello, World”应用程序，以及在本地网络上部署的\
  \ `.bna` 文件。我提到了 `Hyperledger Playground Online`，并解释了如何使用 `Yeoman generator` 生成网络。我介绍了构成\
  \ `.bna` 存档文件的各个部分，包括处理 ID 卡。我还介绍了潜在的错误和故障排除，以确保你的安装顺利进行。最后，我提供了一些关于从何处继续学习 `Hyperledger`\
  \ 的建议。\n\n在下一章中，你将学习如何使用 `Angular` 构建去中心化应用（dapp）。Dapp 可以与你在前三章中开发的智能合约交互，并且是区块链生态系统中的一个重要组成部分。\n\
  \n"
- "# 9. 使用 Angular 构建 Dapp：第一部分\n\n在前几章中，我介绍了不同的区块链，你学习了如何创建可与区块链交互的智能合约。你在 `Ethereum`、`NEO`、`EOS`\
  \ 和 `Hyperledger` 中创建了智能合约。在第一章中，我将过程分解为五个层面：共识层、记账/出块层、传播层、语义层和应用层。在开发周期中，智能合约是应用层的一部分；然而，如果没有一个允许最终用户与区块链交互的前端界面，应用层就是不完整的。\n\
  \n### 提示\n\n很多时候你会听到去中心化应用（dapp）被直接称为智能合约。智能合约是自动执行的合约。Dapp 使用智能合约，但运行在点对点（P2P）网络上，而不是单机系统上。\n\
  \n开发者和更懂行的用户可以通过前面章节提到的命令行界面和工具与你创建的智能合约交互，但对于所有其他用户来说，开发一个能够与区块链交互的前端应用程序是必不可少的。这可以通过创建一个去中心化应用（dapp）来实现。在本章和下一章中，你将借助\
  \ `Angular` 创建一个去中心化应用，以便用户能够通过友好直观的用户界面（UI）与智能合约交互。我将这个过程分为两部分。\n\n本章涵盖的第一部分包含以下主题：\n\
  \n- 开发 dapp，包括其优势和分类\n- 使用 `Angular`，包括其架构、优势、前置条件以及创建 `Angular` 骨架应用\n- 创建和样式化\
  \ `Angular` 自定义组件\n\n第 10 章涵盖的第二部分包含以下主题：\n\n- 使用 `Truffle` 创建 dapp 的智能合约\n- 将智能合约与\
  \ dapp 集成\n- 链接并将你的 dapp 连接到 `Ethereum` 网络\n\n让我们开始吧。\n\n## 什么是 Dapp？\n\n*去中心化应用*（缩写为\
  \ ÐApp、dapp、Dapp、dApp 或 DApp，发音为“dee-app”）是一种能够与智能合约交互的 Web 应用程序。Dapp 运行在区块链上，并利用分布式账本。`Ethereum`\
  \ 区块链目前是运行 dapp 最流行的平台；然而，你看到过的其他分布式账本技术（DLT）也提供了创建 dapp 的能力。我在前面章节中介绍了 `NEO`、`EOS`\
  \ 和 `Hyperledger`；其他还包括 `ICON`、`Cardano` 和 `Hashgraph (Hedera)`。\n\n> *“一切可以去中心化的事物终将去中心化。”*\n\
  >\n> ——David Johnston，DApp Fund 首席执行官 [`https://github.com/DavidJohnstonCEO/DecentralizedApplications`](https://github.com/DavidJohnstonCEO/DecentralizedApplications)\n\
  \n如果你曾经开发过标准的桌面、Web 或移动应用程序，你会发现 dapp 既有相似之处，又非常不同。\n\nDapp 是使用与你构建其他任何应用相同的工具和语言构建的，但要将一个应用归类为\
  \ dapp，它需要满足以下标准：\n\n- *开源*：其代码以开源形式发布，不应由单个实体掌控（中心化）。请记住，应用可以根据提出的改进建议和市场反馈调整其自身协议；然而，所有更改都由其用户的共识驱动。\n\
  - *去中心化*：Dapp 利用区块链或 P2P 网络。\n- *激励机制*：Dapp 使用数字资产进行融资。\n- *算法/协议*：Dapp 通常生成代币并包含共识机制，例如\
  \ `PoW`、`PoS`，甚至其自有的机制。\n\n这些标准确保了 dapp 不会像你从 `iTunes` 或 `Google Play` 等市场下载的其他应用那样出现停机；dapp\
  \ 也将控制权交给社区，而不是单个实体。这些标准可能意义重大。例如，`Apple` 和 `Google` 经常因应用不满足其任意或基于金钱的政策而拒绝它们。这些策略并非总是合理，也并非总是符合最终用户的最佳利益；它们通常是为了阻止竞争对手的使用或为了获取金钱利益。\n\
  \n许多人认为，基于开源代码、在去中心化区块链上实现、并由使用特定共识机制生成的代币提供资金的 dapp，是所有业务的未来。只有时间能给出答案。\n\n此外，开源软件是一个优势，因为它允许用户查看源代码并可能为其做出贡献。使用区块链进行去中心化，可以发挥区块链作为\
  \ DLT 的优势，并作为传统单服务器数据库的替代品。\n\n最后，向账本添加记录/交易通常是通过使用代币完成的，而代币的共识机制也是 dapp 所有用户之间的协议。\n\
  \n### Dapp 的分类\n\n除了上述标准，dapp 还可以进行分类。分类基于 dapp 所利用的基础设施，可以细分为以下三类：\n\n- *专用区块链\
  \ dapp*：这类 dapp 直接使用专用区块链；例如 `bitcoin`、`Ethereum`、`EOS` 和 `NEO`。\n- *依赖另一区块链的 dapp*：例如，`Omni\
  \ Layer Protocol`（原名 `Mastercoin`）是一种建立在 `bitcoin` 区块链之上的数字货币和通信协议。\n- *依赖构建在另一区块链之上的另一协议的\
  \ dapp*：这类 dapp 使用建立在另一区块链之上的协议。一个例子是使用 `Omni Layer Protocol` 的安全网络。\n\n一个有助于理解分类概念的好例子是\
  \ `USDT (Tether)` 代币。该代币基于两种区块链发行过两次：`bitcoin` 和 `Ethereum`。在这种情况下，存在两种类型的 `USDT`。最初基于\
  \ `bitcoin` 的版本是通过使用 `Omni Layer Protocol` 生成代币实现的，而基于 `Ethereum` 的 `USDT` 则兼容 `Ethereum`\
  \ 的 `ERC20` 标准。请看图 9-1。\n\n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig1_HTML.jpg](img/475651_1_En_9_Fig1_HTML.jpg)\n\
  \n**图 9-1** USDT 的分类表示\n\n\n\n### DApp 项目\n\n大多数 DApp 要么直接构建在以太坊区块链之上，要么使用区块链来管理其代币。然而，也有一些\
  \ DApp 甚至构建了它们自己专用的区块链。请查看表 9-1，其中列举了一些不同类型的 DApp 及其分类。\n\n**表 9-1** DApp 示例及分类\n\
  \n| **DApp** | **描述** | **分类** | **代币** | **区块链** |\n| --- | --- | --- | --- | ---\
  \ |\n| Ethlance | 职位发布和自由职业者招聘的市场，收取 0% 费用。 | 直接使用以太坊 | 无代币 | 以太坊区块链 |\n| Golem\
  \ | 闲置计算能力的全球市场。 | 基于以太坊的代币 | GNT | 以太坊区块链 |\n| SAFE 网络 | 数据存储和通信网络。 | 实现依赖于构建在另一区块链（比特币）之上的另一协议（Omni\
  \ 协议） | SFE | 比特币 |\n\n除了表 9-1 中的信息，还有很多资源可以找到更多的 DApp；这两个网站提供了 DApp 列表供你查阅：[`https://dapps.ethercasts.com/`](https://dapps.ethercasts.com/)\
  \ 和 [`https://coinsutra.com`](https://coinsutra.com)。\n\n### 如何创建你自己的 DApp？\n\n\
  比特币和区块链的成功带来了 DApp 的爆发式增长。开发者和企业主创建了一个开发 DApp 的基本流程。你不必完全照搬这个流程，并且它在你阅读时可能已经发生了变化；然而，许多已发布的\
  \ DApp 都遵循了这一流程。该流程包含以下五个步骤：\n\n1.  撰写白皮书。\n2.  发起首次代币发行（ICO）。\n3.  开发 DApp。\n4.\
  \  发布 DApp。\n5.  营销 DApp。\n\n让我们回顾一下这些步骤。\n\n#### 撰写白皮书\n\n白皮书类似于公司面向投资者的商业计划书。然而，它的目标受众不仅仅是投资者；它还是技术蓝图。白皮书既是技术文档也是商业计划书，它应该解释要解决的问题，以及\
  \ DApp 的概念、功能和技术细节。\n\n就像在商业计划书中一样，包含你的独特卖点（USP）、路线图、团队成员简历、能力和历史记录是一个好主意，这有助于建立可信度。\n\
  \n#### 注意\n\n独特卖点（USP）是你的 DApp 旨在解决的问题。\n\n白皮书发布后，最好在早期阶段、开发之前，从同行和社区那里获得反馈。社交媒体、论坛和出版物常被用来推广\
  \ DApp 并帮助建立可信度。\n\n#### 发起首次代币发行\n\n白皮书发布后，下一步是发起 ICO，出售代币以资助和支持你的 DApp。你的代币应该有存在的理由，而不是与市场上已有的其他代币相同，因此你应该解释你的\
  \ DApp 为何以及如何需要自己的代币。\n\n你还需要决定 DApp 的分类类型，这将决定你是否需要以下部分或全部内容：1) 发行代币，2) 设置使用费用，3)\
  \ 拥有专用区块链，4) 拥有挖矿机制，5) 设置费用分配，6) 奖励投资者，7) 分配费用以支付你业务的不同部门：支持、开发、营销和业务。\n\n#### 开发\
  \ DApp\n\n开发应该是开源的，GitHub 通常用于存放开发工作的代码仓库。在每次发布时，最好让投资者和其他人知晓，以便围绕你的项目建立用户和开发者社区。许多\
  \ DApp 试图获取资金但未能交付可用的产品；你要让自己与众不同，并避免与监管机构产生潜在问题。（我将在第 11 章中讨论监管机构。）\n\n#### 发布\
  \ DApp\n\n发布你的 DApp，并包含发布说明、文档、路线图和维护计划。满足承诺的发布日期至关重要。\n\n#### 营销 DApp\n\n最后一步是营销。除了传统营销之外，DApp\
  \ 在早期阶段或发布后通常会雇佣或与推广者合作以传播消息。DApp 另一个独特的营销方面是让代币在交易所上市。这是最终的认可标志。一些交易所设有投票系统来选择下一个要上市的代币。一些交易所滥用了这一流程，对代币上市收取高额费用。例如，在币安交易所上市一个功能型代币的费用可能在\
  \ 50 万到 300 万美元之间。\n\n许多早期投资者，包括 DApp 所有者，如果代币在主流交易所上市，他们就能够“套现”，因为上市通常会导致价格上涨；然而，DApp\
  \ 上市变得越来越困难，它需要提供真正的价值。欺诈者经常会被揭露，代币上市后很快就会被摘牌。\n\n## 为什么选择 Angular？\n\n对于 DApp，就像任何传统应用一样，你可以为发布应用的设备编写原生应用（使用设备支持的语言，例如\
  \ iOS 的 Xcode）；然而，实践表明，使用框架可以加速开发。例如，如果你想复用同一段代码，并将其部署到具有不同屏幕尺寸的多个设备上，这对小团队来说可能是一个挑战。Angular\
  \ 帮助你同时为 Web、移动端和桌面端构建跨平台的现代应用。Angular CLI 和组件开发套件（CDK）可以帮助加速应用的开发。\n\n使用 Angular\
  \ 的好处在于以下几点：\n\n- 庞大的社区支持\n- 企业级架构和扩展性\n- 跨平台支持\n- 文档完善\n\nAngular 是一个结构化框架，能让你创建前端客户端应用。其各个部分松散耦合并以模块化方式组织，从而减少了需要编写的代码量，增加了灵活性，使代码更易于阅读，并缩短了开发时间。\n\
  \nAngular 允许开发者组合一套工具集，用于构建一个完全适合你应用需求的框架。你可以使用 HTML 作为模板语言，并扩展 HTML 的语法，使应用的组件易于阅读。除了\
  \ HTML，编码使用 TypeScript 完成，它将 JavaScript 转变为面向对象的编程语言，并为你提供企业级开发环境。\n\n此外，Angular\
  \ 结构良好，并且根据可访问性富互联网应用（ARIA）标准构建，可实现完全可访问性，因此你的应用或网站可以正确地为残障人士构建。\n\nAngular 还能很好地与其他\
  \ JavaScript 库配合使用，因此你可以使用 `npm` 管理器安装诸如以太坊 JavaScript API `web3.js` 之类的库。最后，Angular\
  \ 的特性可以轻松修改或替换，以满足你的确切需求。\n\n#### 注意\n\n*Angular* 一词意指具有多个角度或由角度测量。Angular 是一个结构化框架，能让你为\
  \ Web、移动端和桌面端创建前端客户端应用。它是一个用于动态应用开发的开源前端框架。\n\nAngular 最重要的特性是数据绑定和依赖注入。这些有助于减少代码量。此外，Angular\
  \ 已存在多年，如今已是第七个版本。\n\n\n\n#### 注意\n\n依赖注入是一种设计模式技术。顾名思义，它意味着通过注入代码的方式，将一个对象作为另一个对象的依赖项来使用。\n\
  \nAngular 2 是对 AngularJS 的彻底重写，并带来了重大变化；不过，从 Angular 2 到版本 8 之间没有重大差异。\n\n在撰写本文时，Angular\
  \ 的最新发布版本是 7.3.1，该版本增加了一些功能，例如：\n\n*   *依赖项*：升级了依赖项，并增加了对 TypeScript 3.1、RxJS 6.3\
  \ 和 Node 10 的支持。\n*   *包预算*：你可以为应用程序的大小设置警告，以确保不超过限制（默认为 2 MB）。\n*   *Angular CLI*：通过运行\
  \ CLI 向导，你可以添加路由等组件，并决定 CSS 的格式。\n*   *Angular Material 的组件开发工具包（CDK）*：新增功能，如开箱即用的虚拟滚动、拖放功能，以及对原生选择字段的\
  \ `mat-form-field` 支持。（我将在本章后面介绍 Material。）\n\nAngular 8 处于第二个发布候选版本 (rc.2) 阶段，预期功能主要是为了提升性能。它将包含一个名为\
  \ Angular Ivy 的改进版视图引擎，改进对支持 ES2015+ 的现代浏览器的 JavaScript 上传，支持使用 Web Worker 来进行繁重的硬件处理，支持\
  \ TypeScript，并提供一个基准测试工具等。\n\n### 提示\n\n我选择了 Angular，但 Angular 并不是唯一能加快开发速度的框架。你可以使用其他框架，例如\
  \ React (<https://reactjs.org>)，并获得类似的好处。这个决定实际上取决于个人喜好和你团队的技能组合。你完全可以主要将项目文件复制到\
  \ React 项目，从而轻松地将此项目转换为 React 项目。\n\n### 创建一个 Angular 去中心化应用\n\n在本节中，你将创建一个实际的去中心化应用，该应用将连接到以太坊网络，并从一个账户向另一个账户转移资金。这通常是任何去中心化应用的核心功能。例如，你可以构建一个销售产品、提供服务，或向用户支付测验费用的去中心化应用，所有这些类型都需要有一个转移代币/通证的机制。在本章的这部分，你将使用\
  \ Angular 创建一个去中心化应用。\n\n在环境和部署方面，你将使用第 5 章中使用过的 Truffle Web 框架，因为它有助于快速创建智能合约。Truffle\
  \ 不仅能帮助你编译智能合约；它能完成将智能合约注入到 Web 应用程序所需的一切工作，并且可以运行测试套件。你还将再次使用 MetaMask，以便在浏览器中获得一个安全的区块链账户。最后，你将使用并运行\
  \ Ganache 来创建一个本地区块链 RPC 服务器，用于测试和开发。\n\n#### 前置条件\n\n你所需的大多数工具都已安装。Angular 需要 Node\
  \ 和 `npm` 管理器，这些你之前已经安装过。通过运行带有 `-v` 标志的库来确认安装了正确的版本，就像你在前面的章节中所做的那样。\n\n```\n>\
  \ node -v\n> npm -v\n```\n\n如果你没有安装 `npm` 和 `node`，只需运行以下命令：\n\n```\n> brew install\
  \ node\n```\n\n为你当前的用户赋予 `npm` 所有权，这样你就不需要使用 `sudo` 来安装库了。\n\n```\n> sudo chown\
  \ -R $USER:$GROUP ~/.npm\n> sudo chown -R $USER:$GROUP ~/.config\n```\n\n建议你升级 `npm`\
  \ 以确保使用的是最新版本；在撰写本文时，最新版本是 6.9.0。\n\n```\n> [sudo] npm install -g npm\n+npm@6.9.0\n\
  ```\n\n#### Angular CLI\n\n接下来，你需要安装 Angular 命令行界面（CLI）。对于 Angular CLI，建议（但不是必须）使用\
  \ `sudo` 和 `allow-root` 进行安装，并确保 Angular CLI 拥有正确的权限。你将安装 Angular 最新的稳定发布版本 7.3.9。\n\
  \n```\n> sudo npm install -g @angular/cli@7.3.9 --unsafe-perm=true --allow-root\n\
  + @angular/cli@7.3.9\nadded 363 packages from 197 contributors in 13.691s\n```\n\
  \n你也可以安装最新版本的 Angular，但使用较新的 Angular 版本时，你的示例代码可能会失效。\n\n```\n> sudo npm install\
  \ -g @angular/cli --unsafe-perm=true --allow-root\n```\n\n要验证安装是否成功，请运行版本标志，你应该会看到版本\
  \ 7.3.9；图 9-2 显示了预期的输出。\n\n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig2_HTML.jpg](img/475651_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2\n\nAngular CLI 安装验证\n\n```\n> ng version\n```\n\n\n\n### 创建 Angular 项目\n\
  \n现在你已经安装了主要的工具和库，可以继续从零开始创建项目了——这需要下载其他必要的库、测试库和构建脚本，并建立自己的文件夹结构。但为了加快这个过程，你可以使用\
  \ Angular 种子项目，它包含一个骨架项目，能帮助你快速启动项目。\n\n使用 Angular 种子项目可以让你遵循 Angular 的最佳实践，快速高效地开始开发。使用样板骨架代码既有优点也有缺点。你可以自行决定是否在未来的项目中继续使用这个骨架，但对于这个演示应用来说，它非常理想。\n\
  \n使用 Angular 种子骨架创建项目有很多方法。这里我将展示两种方案：使用 Angular CLI 和使用 WebStorm。\n\n`ng new` 命令将运行一个脚本，为你创建应用。你可以运行\
  \ CLI 的 `new` 命令，并将 `ethdapp` 作为你的应用名称。\n\n```\n> cd ~/desktop\n> ng new ethdapp\n\
  Would you like to add Angular routing? (y/N) y\nWhich stylesheet format would you\
  \ like to use? CSS\n```\n\n注意，我在这里添加了路由，并决定使用 CSS 作为样式格式。这些内容将在本章后面详细介绍。\n\n安装完成后，它会输出所有创建的文件。\n\
  \n```\nCREATE ethdapp/README.md (1024 bytes)\nCREATE ethdapp/angular.json (3557\
  \ bytes)\nCREATE ethdapp/package.json (1313 bytes)\n...\n```\n\n切换到新创建的文件夹，确认你已经拥有了初始文件和目录。\n\
  \n```\n> cd ethdapp\n```\n\n运行以下命令，它会分析你的 `package.json` 配置文件并提供建议：\n\n```\n> ng\
  \ update\n```\n\n你可以运行以下命令来遵循这些建议：\n\n```\n> ng update --all\n```\n\n接下来，全局安装 Bower。Bower\
  \ 是一个常用于 Angular 的包管理器。在撰写本文时，其版本为 1.8.8。\n\n```\n> npm install -g bower\n> bower\
  \ -v\n1.8.8\n```\n\n我们来概述一下工作区中创建的内容以及启动项目文件（见图 9-3）。\n\n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig3_HTML.jpg](img/475651_1_En_9_Fig3_HTML.jpg)\n\
  \n**图 9-3** Angular CLI 创建的 Ethdapp 文件\n\n*   ****新工作区**：这是名为 `ethdapp` 的根文件夹。\n\
  *   **e2e 文件夹**：包含端到端测试项目，位于 `ethdapp/e2e`。测试文件夹包含 Jasmin 库的 JSON 配置文件。\n*   **src\
  \ 文件夹**：这是你的项目文件夹，包含项目的所有文件。\n  * 初始骨架应用项目，位于 `ethdapp/src/app`\n  * 带有入口文件 `index.html`\
  \ 的 `assets` 文件夹\n  * 其他配置文件\n*   **.gitignore**：在这里列出你希望在上传到 Git 时忽略的任何文件和文件夹。\n\
  *   **angular.json**：这是你的项目配置文件，包含项目的相关信息。\n*   **package.json**：这是 `npm` 管理器配置文件，包含你将在项目中使用的所有库。\n\
  *   **README.MD**：这是关于你项目的文档；它将作为项目的“主页”文档，也是开发者首先阅读以获取项目运行说明的文件。\n*   **tsconfig.json**：这是\
  \ TypeScript 配置文件。\n*   **tslint.json**：这是 Lint 配置文件，用于设置你的最佳实践格式化、间距等。\n\n####\
  \ 启动应用\n\n要查看你的实际去中心化应用（dapps），你将使用 `ng serve` 命令，它会构建应用、启动开发服务器、监视源文件，并在你修改这些文件时重新构建应用。`--open`\
  \ 标志会在浏览器的 4200 端口上打开应用，地址为 `http://localhost:4200/`。运行带有 `open` 标志的 `ng serve`\
  \ 命令。\n\n```\n> ng serve --open\n```\n\n你应该会在浏览器中看到正在运行的去中心化应用，如图 9-4 所示。\n\n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig4_HTML.jpg](img/475651_1_En_9_Fig4_HTML.jpg)\n\
  \n**图 9-4** 在浏览器中运行的 Angular 种子应用\n\n骨架应用包含指向教程、文档和 Angular 博客的链接。通过浏览“Hero 之旅”和\
  \ CLI 文档，你可以很好地理解 Angular 的工作原理，而将 Angular 博客加入书签则可以让你获得未来版本发布和公告的更新。\n\n要停止应用服务，请在终端中按\
  \ `Command+C`。\n\n#### 使用 WebStorm 创建 Angular 项目\n\n启动 Angular 种子项目的另一个方法是利用你之前章节中使用过的\
  \ WebStorm IDE。WebStorm 允许你导入已创建的种子项目，或者创建一个新的种子项目。\n\n要导入你使用 Angular CLI `ng new`\
  \ 命令创建的 `ethdapp` 项目，请打开 WebStorm，选择 **File** ➤ **Open**，然后导航到 `ethdapp` 目录。这样就完成了；WebStorm\
  \ 会自动导入该项目。\n\n或者，要在 WebStorm 中启动一个新的 Angular 种子项目，请从顶部菜单中选择 **File** ➤ **New**\
  \ ➤ **Project**。接下来，选择 **Angular CLI** 并将你的项目命名为 **ethdapp**。使用下拉菜单选择 Angular CLI\
  \ 的版本，如图 9-5 所示。\n\n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig5_HTML.jpg](img/475651_1_En_9_Fig5_HTML.jpg)\n\
  \n**图 9-5** 在 WebStorm 中生成 Angular 种子项目\n\n现在项目已创建，你可以运行相同的命令，使用 WebStorm 底部菜单中的终端选项卡，如图\
  \ 9-6 所示。\n\n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig6_HTML.jpg](img/475651_1_En_9_Fig6_HTML.jpg)\n\
  \n**图 9-6** 在 WebStorm 的终端中启动 ethdapp\n\n```\n> ng serve –open\n```\n\n你可以从本书的仓库下载骨架应用：[`https://github.com/Apress/the-blockchain-developer/chapter9/step1.zip`](https://www.scala-sbt.org/1.x/docs/Installing-sbt-on-Windows.html)。\n\
  \n下载你的步骤后，请确保运行 `npm install`，因为我移除了 `node` 模块以减小项目体积。\n\n```\n> npm install\n```\n\
  \n**注意：** 我从项目中排除了 `node_modules`，它保存了项目的所有依赖项。由于体积原因，通常不将其包含在项目中；你可以使用 `npm install`\
  \ 命令来安装它。\n\n\n\n##### 确保与 Angular CLI 版本不冲突\n\n你可以通过 WebStorm 或 `ng` 命令创建 Angular\
  \ 种子项目，并且需要检查全局 Angular CLI 与本地项目 Angular CLI 是否存在版本不匹配。当配置文件指向先前版本时，或者你之前使用过旧版本\
  \ Angular 时，可能会出现这种情况。具体表现为：本地项目中的 Angular 版本低于计算机上安装的全局 Angular 版本。\n\n为确保不发生这种情况，请运行任意\
  \ `ng` 命令。如果存在此问题，你将看到以下错误消息：\n\n```\n> ng\nYour global Angular CLI version (7.3.9)\
  \ is greater than your local\nversion (6.2.9). The local Angular CLI version is\
  \ used.\n```\n\n如果继续使用这些设置，你将运行 6.x 版本而不是 7.x 版本。要解决此问题，你需要从开发环境中卸载 Angular CLI，然后安装\
  \ 7.x 版本。\n\n```\n> npm uninstall --save-dev angular-cli\n> npm install --save-dev\
  \ @angular/cli@7.3.9\n```\n\n请注意，你使用了 `--save-dev` 标志，这样新版本将保存到你的 `package.json`\
  \ 项目文件中。现在，再次运行版本命令，你应该会看到正确的版本，且没有警告消息。\n\n```\n> ng --version\nAngular CLI: 7.3.2\n\
  ```\n\n现在，你已经确认运行的是正确版本的 Angular CLI，就可以继续开发并对种子启动应用进行更改了。\n\n#### Angular 组件\n\n\
  Angular 的最佳实践是使用模型-视图-控制器（MVC）风格的架构。与其他成熟框架一样，Angular 支持分离关注点的编码方式。\n\nAngular MVC\
  \ 包含以下三个元素：\n\n*   **模型**：包含应用程序数据和 Angular 数据绑定，允许数据反射。\n\n> **注意**：数据绑定中的反射是指，与数据绑定的元素会在数据发生任何变化时自动反映该变化。例如，你将价格变化绑定到多个视图元素，一旦价格变化数据更新，所有视图元素都会自动更新。\n\
  \n*   **视图**：包含 HTML 或模板以及指令。\n\n*   **控制器**：是连接模型和视图的粘合剂。控制器获取数据，应用业务逻辑，并将结果发送到视图。\n\
  \n你可能还记得，当你运行 `serve` 命令时，Angular 的欢迎页面打开了。欢迎组件就是应用程序外壳。该外壳由一个名为 `AppComponent`\
  \ 的 Angular 组件控制。\n\n组件是 Angular 应用程序的基本构建块。它们在屏幕上显示数据，监听用户输入，并根据输入执行操作。\n\n你将创建一个名为\
  \ `transfer` 的组件，用于将代币转移到另一个地址。要创建 `transfer` 组件，请运行 `ng generate component` 命令。\n\
  \n```\n> ng g c components/transfer\n```\n\n请注意，你使用了 `g` 和 `c` 这两个缩写，分别代表 \"generate\"\
  \ 和 \"component\"，但你也可以使用完整名称而不是缩写。\n\n`ng` 命令为你生成了以下四个文件：\n\n*   `transfer.component.css`：组件的\
  \ CSS 样式\n*   `transfer.component.html`：组件模板，用 HTML 编写\n*   `transfer.component.spec.ts`：测试文件\n\
  *   `transfer.component.ts`：组件类代码，用 TypeScript 编写\n\n这四个文件共同构成了 `transfer` 组件的实现。你可以在图\
  \ 9-7 中看到文件夹结构。\n\n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig7_HTML.jpg](img/475651_1_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7\n\n传输组件文件结构\n\n应用程序的结构通常由页眉、页脚和导航菜单组成，以便你可以导航到不同的局部视图。\n\n使用这种页眉和页脚组件的架构可以帮助你创建不同的视图，并将页面视图拆分成独立的文件。将每个部分视为一个独立的可复用\
  \ UI 模块。Angular Seed 提倡这种架构，并已创建了欢迎组件。让我们创建一个启动组件，一个页眉组件和一个页脚组件。\n\n```\n> ng g\
  \ c components/start\n> ng g c components/header\n> ng g c components/footer\n```\n\
  \n你可以在输出中看到，每个组件都生成了以下文件：\n\n```\nCREATE src/app/components/[component-name]/[component-name].component.css\n\
  CREATE src/app/components/[component-name]/[component-name].component.html\nCREATE\
  \ src/app/components/[component-name]/[component-name].component.spec.ts\nCREATE\
  \ src/app/components/[component-name]/[component-name].component.ts\n```\n\n除了这些文件之外，你可以打开\
  \ `ethdapp/src/app/app.module.ts`，注意到每次创建组件时，`app.module.ts` 文件都会被修改。`app.module.ts`\
  \ 文件是 Angular 中最重要的文件之一；它是用 TypeScript 编写的应用程序控制器。控制器是一个全局文件，它将你的组件连接在一起，因此你希望在应用程序中使用的每个组件都需要在该文件中定义。如果你没有使用\
  \ `ng` 脚本，则需要自己修改 `app.module.ts` 来链接新组件。\n\n由于你使用了 CLI，这些导入会自动为你包含在内：\n\n```\n\
  import { TransferComponent } from './components/transfer/transfer.component';\n\
  import { StartComponent } from './components/start/start.component';\nimport { HeaderComponent\
  \ } from './components/header/header.component';\nimport { FooterComponent } from\
  \ './components/footer/footer.component';\n```\n\n\n\n### 路由模块\n\n另一个重要的文件及良好的实践是创建应用路由模块。该文件充当控制器，用于指示\
  \ Angular 如何在应用的不同视图之间导航。\n\n通常，为应用生成路由时无需手动操作，因为在创建应用时，您已决定创建名为 `app-routing` 的路由文件。\n\
  \n如果需要创建 `app-routing` 文件，可以运行以下 `module` 命令：\n\n```\n> ng generate module app-routing\
  \ --flat --module=app\nCREATE src/app/app-routing.module.ts\nUPDATE src/app/app.module.ts\n\
  ```\n\n请注意，这次在命令中您使用的是完整名称 `generate module`，而不是仅使用首字母 `g` 和 `m`。两种方式的效果相同。\n\n\
  `generate module` 命令会为 `src/app/app-routing.module.ts` 创建清单 9-1 所示的初始代码。\n\n```\n\
  import { NgModule } from '@angular/core';\nimport { Routes, RouterModule } from\
  \ '@angular/router';\nconst routes: Routes = [];\n@NgModule({\nimports: [RouterModule.forRoot(routes)],\n\
  exports: [RouterModule]\n})\nexport class AppRoutingModule { }\n清单 9-1\napp-routing\
  \ 初始启动代码\n```\n\n初始代码包含一个导入 Angular 代码和模块标签的 `import` 语句。接下来，用清单 9-2 中的代码替换 `app-routing.module.ts`\
  \ 文件中的预填充代码。\n\n```\nimport { NgModule } from '@angular/core';\nimport { CommonModule\
  \ } from '@angular/common';\nimport { RouterModule, Routes } from '@angular/router';\n\
  import { StartComponent } from './components/start/start.component';\nimport { TransferComponent\
  \ } from './components/transfer/transfer.component';\nconst routes: Routes = [\n\
  { path: '', redirectTo: '/start', pathMatch: 'full' },\n{ path: 'start', component:\
  \ StartComponent },\n{ path: 'transfer', component: TransferComponent }\n];\n@NgModule({\n\
  declarations: [],\nimports: [ RouterModule.forRoot(routes), CommonModule ],\nexports:\
  \ [ RouterModule ]\n})\nexport class AppRoutingModule { }\n清单 9-2\n用于路由视图的 app-routing\
  \ 代码\n\n在清单 9-2 中，您导入了将要使用的视图组件，分别是 `start` 和 `transfer`。它们将充当网站上的网页或移动应用中的局部视图。路由告诉应用哪个视图对应哪个关键字，最后您设置\
  \ `import` 语句来告知 Angular 哪些模块可以访问该模块。\n\n现在路由已设置完毕，您可以获取页面的页脚、页眉和主体进行显示。只需打开 `src/app/app.component.html`，将欢迎页面的\
  \ HTML 代码更新为以下三行：\n\n要测试对应用所做的更改，无需重新发布应用或运行任何脚本；只需保存文件，然后在终端中运行之前执行过的相同 `serve`\
  \ 命令即可。\n\n```\n> ng serve\n⌈wdm⌋: Compiled successfully.\n```\n\n`serve` 脚本包含监视文件更改并自动更新应用的脚本，因此当您修改文件后，只需返回浏览器即可。大多数情况下，甚至无需刷新网页，更改就会自动生效。访问\
  \ `http://localhost:4200` 即可查看更改。\n\n如果您想直接跳转到转账页面，只需在设置路由机制时，在 URL 末尾添加所选的关键字：`http://localhost:4200/transfer`。参见图\
  \ 9-8。\n\n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig8_HTML.jpg](img/475651_1_En_9_Fig8_HTML.jpg)\n\
  \n图 9-8\n\nEthdapp 的页眉、页脚和转账页面\n\n您可以在此处下载此步骤的代码：[`https://github.com/Apress/the-blockchain-developer/chapter9/step2.zip`](https://www.scala-sbt.org/1.x/docs/Installing-sbt-on-Windows.html)\
  \ 。\n\n### 为 Angular 应用设置样式\n\n目前您的应用尚未设置样式，仅显示带有页眉、页面和页脚的文本；不过在开始设置样式之前，了解 Angular\
  \ 样式架构会对您有所帮助，以确保不会产生过于庞大难以管理的层叠样式表 (CSS) 文件。您可以在全局级别设置整个应用所需的样式，也可以为单个组件设置独特的特定样式。\n\
  \n此外，快速从零开始构建一个具有样式的应用会很棒。这可以通过 Angular Material 实现。Angular Material 为您提供了一种捷径，无需费心考虑跨浏览器、跨设备编程，即可为应用获得一致的“外观”。让我们来看看。\n\
  \n#### Angular 样式架构\n\nAngular 设置了一个全局 CSS 文件。该 CSS 文件名为 `style.css`，位于项目的根目录。`src/style.css`\
  \ 包含您希望在整个应用中使用的样式，例如字体、主题、所有组件的样式等。\n\n如您所见，每个组件还包含一个私有的 CSS 文件。特定的组件 CSS 文件用于存放该组件独有的样式。\n\
  \n例如，`/src/app/components/footer/footer.component.css` 存放了专用于页脚组件的样式。\n\n#### Angular\
  \ Material\n\n目前，您的入门应用运行快速，因为它包含的代码极少；然而，随着您向应用添加越来越多的组件、资源和样式，可能会出现性能问题。您的应用很容易变得臃肿，而每毫秒的延迟都很关键。\n\
  \n另一个潜在问题是测试。所有不同的浏览器、浏览器版本、屏幕尺寸和设备都需要进行测试，从头创建页面需要严格的测试和质量保证 (QA) 团队，以确保其在所有设备上表现一致。\n\
  \nAngular Material 解决了所有这些问题，同时还提供了可访问性和国际化支持。这是因为 Angular Material 专为 Angular 优化，并由\
  \ Angular 团队构建，因此能够与 Angular 无缝集成。它已经通过了所有兼容性测试。\n\n更多信息，请查看 Angular Material 入门页面：[`https://material.angular.io/guide/getting-started`](https://material.angular.io/guide/getting-started)\
  \ 。\n\n#### 安装 Angular Material\n\n有几种安装 Material 的方式。由于您已安装 Angular DevKit，只需运行\
  \ `ng add` 命令即可获取 Angular Material 库。您需要先安装 `cdk`，因为它是一个依赖项。\n\n```\n> ng add @angular/cdk\n\
  ```\n\n接下来，安装 Material。\n\n```\n> ng add @angular/material\n```\n\n请注意，输出会询问您想要哪个主题颜色并附有链接。我将在本章下一节介绍主题，但现在，请选择第一个或您喜欢的任何颜色。\n\
  \n```\n? 选择预构建主题名称，或选择“custom”自定义主题： (使用方向键)\n□ 靛蓝/粉红       [ 预览: https://material.angular.io?theme=indigo-pink\
  \ ]\n深紫/琥珀       [ 预览: https://material.angular.io?theme=deeppurple-amber ]\n粉红/蓝灰\
  \       [ 预览: https://material.angular.io?theme=pink-bluegrey ]\n紫色/绿色       [ 预览:\
  \ https://material.angular.io?theme=purple-green ]\n```\n\n您还可以设置手势识别和动画。\n\n```\n\
  ? 设置 HammerJS 用于手势识别？ Yes\n? 为 Angular Material 设置浏览器动画？ Yes\n```\n\n预期输出应显示已更新的文件：\n\
  \n```\nUPDATE package.json\nUPDATE angular.json\nUPDATE src/app/app.module.ts\n\
  UPDATE src/index.html\nUPDATE src/styles.css\n```\n\n\n#### 导入 Angular Material\
  \ 模块\n\n接下来，你需要修改应用，使其包含 Angular Material 的动画、Material 图标、手势支持以及组件模块。\n\n在你的项目中，你只会使用组件模块，而不会用到\
  \ Angular Material 提供的所有功能；你需要做的是为你想要使用的每个组件导入 `NgModule`。打开 `src/app/app.module.ts`\
  \ 并添加 `import` 语句。\n\n```\nimport {\nMatButtonModule,\nMatCheckboxModule,\nMatInputModule,\n\
  MatSelectModule,\nMatDatepickerModule,\nMatNativeDateModule\n} from '@angular/material';\n\
  ```\n\n接下来，更新 `@NgModule` 中的 `imports` 数组，以包含你导入的 Material 模块。\n\n```\nimports:\
  \ [\nBrowserModule,\nAppRoutingModule,\nBrowserAnimationsModule,\nMatButtonModule,\n\
  MatInputModule,\nMatDatepickerModule,\nMatNativeDateModule,\nMatCheckboxModule,\n\
  MatSelectModule\n]\n```\n\n就是这样。现在你可以访问所包含的 Angular Material 组件了。\n\n#### 为你的 Angular\
  \ Material 应用设置主题\n\n现在你已经可以访问 Angular Material 组件，可以使用主题来设置它们的样式。*主题*是一组颜色，这些颜色将用于你的\
  \ Angular Material 组件。\n\n在 Angular Material 中，主题是通过创建多个调色板来生成的。\n\n-   *主色板*：这些颜色是所有屏幕和组件中最常用的。\n\
  -   *强调色板*：这些颜色用于按钮和交互元素。\n-   *警告色板*：这些颜色用于错误提示。\n-   *前景色板*：这些颜色用于文本和图标。\n-  \
  \ *背景色板*：这些颜色用于元素的背景。\n\n在 Angular Material 中，所有主题样式都是在构建时静态生成的，以避免拖慢应用启动速度。\n\n\
  Angular Material 预置了几个预构建的主题 CSS 文件。你可能还记得，在安装 Material 时，你曾可以选择要使用的主题。\n\n这些主题文件还包含了核心组件的所有样式（所有组件通用的样式），因此你只需在应用中包含一个\
  \ Angular Material 的 CSS 文件。你可以直接从 `@angular/material/prebuilt-themes` 将一个主题文件引入到你的应用程序中。\n\
  \n以下是可用的预构建主题：\n\n-   `deeppurple-amber.css`\n-   `indigo-pink.css`\n-   `pink-bluegrey.css`\n\
  -   `purple-green.css`\n\n你在这里使用的是 Angular CLI，因此可以简单地将你想要的样式包含在全局的 `src/styles.css`\
  \ 文件中。\n\n最初它包含以下初始预代码：\n\n```\nhtml, body { height: 100%; }\nbody { margin: 0;\
  \ font-family: 'Roboto', sans-serif; }\n```\n\n在文档顶部添加以下 `import` 语句：\n\n```\n@import\
  \ \"~@angular/material/prebuilt-themes/indigo-pink.css\";\n```\n\n在打开 `src/style.css`\
  \ 文件的同时，你还可以创建一个容器、一个段落和一个按钮的样式，以便在应用的不同页面中使用。\n\n```\np {\npadding-left: 20px;\n\
  font-size: 12px;\n}\n.container {\nmargin-right: auto;\nmargin-left: auto;\npadding:\
  \ 20px 15px 30px;\nwidth: 750px;\n}\nbutton {\ncolor: #ffffff;\nbackground-color:\
  \ #611BBD;\nborder-color: #130269;\ndisplay: inline-block;\nmargin-bottom: 0;\n\
  font-weight: normal;\ntext-align: center;\nvertical-align: middle;\ntouch-action:\
  \ manipulation;\ncursor: pointer;\nwhite-space: nowrap;\npadding: 6px 12px;\nfont-size:\
  \ 12px;\nline-height: 1.42857143;\nborder-radius: 4px;\n-webkit-user-select: none;\n\
  -moz-user-select: none;\n-ms-user-select: none;\nuser-select: none;\n}\n```\n\n\
  你可以将你的文件与我的进行比较：[`https://github.com/Apress/the-blockchain-developer/chapter9/step3.zip`](https://github.com/Apress/the-blockchain-developer/chapter9/step3.zip)。\n\
  \n### 创建内容\n\n此时，你已经拥有了一个带有头部、主体和底部的基本应用框架。主体部分可以通过更改浏览器中的 URL 在起始页面和转账页面之间切换。你还导入并注入了\
  \ Material 模块，并为应用设置了全局样式。下一步是创建实际内容，替换你放置在头部、底部和起始组件中的临时文本消息。\n\n#### 底部组件\n\n\
  对于底部组件，你只需替换公司的版权信息。要执行此操作，你需要做的是打开 `src/app/components/footer/footer.component.html`\
  \ 并替换默认代码。\n\n```\nfooter works!\n\n```\n\n通过创建一个带有你添加到全局 CSS 文件中的样式的 `div` 容器来替换这段代码。\n\
  \n```\n<div class=\"container\">\nCopyright (c) 2019 Company Name. All Rights Reserved.\n\
  </div>\n```\n\n你还需要为底部组件创建一个特定的样式，这样每次使用 `<p>` 标签时，字体大小为 12px 且左内边距为 0。打开 `src/app/components/footer/footer.component.css`\
  \ 并插入以下内容：\n\n```\np {\npadding-left: 0;\nfont-size: 11px;\n}\n```\n\n请注意，你定义了两遍\
  \ `<p>` 标签，一次在全局 CSS 文件中，一次在组件级别。发生的情况是，组件中的 `<p>` 样式会覆盖全局的 `<p>` 样式，因此你可以在底部组件中使用\
  \ `<p>` 标签，而在其他组件（如起始页面和转账页面）中使用不同的 `<p>` 标签，同时保持你的 HTML 代码不包含 CSS 代码。\n\n#### 头部组件\n\
  \n对于头部组件，你将创建一个导航菜单，以便能够在起始页面和转账页面之间切换。对于头部组件特定的样式，打开 `src/app/components/header/header.component.css`\
  \ 并添加导航列表样式。\n\n```\n.nav {\nmargin-bottom: 0;\npadding-left: 0;\nlist-style: none;\n\
  }\nli {\ndisplay: block;\nfloat: left;\nwidth: 100px;\nheight: 25px;\npadding: 5px;\n\
  }\n.nav>li>a {\nmargin-bottom: 0;\npadding-left: 0;\nfont-weight: 500;\nfont-size:\
  \ 12px;\ntext-transform: uppercase;\nposition: relative;\n}\n```\n\n对于 `src/app/components/header/header.component.html`，你需要创建一个容器以及一个包含两个指向起始页面和转账页面链接的列表。为此，请替换初始代码：\n\
  \n```\nheader works!\n\n```\n\n为以下内容：\n\n```\n<div class=\"container\">\n<ul class=\"\
  nav\">\n<li><a routerLink=\"/start\" routerLinkActive=\"active\">home</a></li>\n\
  <li><a routerLink=\"/transfer\" routerLinkActive=\"active\">transfer</a></li>\n\
  </ul>\n</div>\n```\n\n现在的分布式应用（dapp）包含了基本的样式和可用的导航功能，如图 9-9 所示。\n\n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig9_HTML.jpg](img/475651_1_En_9_Fig9_HTML.jpg)\n\
  \n图 9-9：具有基本样式和可用导航功能的 Ethdapp\n\n你可以在此处下载此步骤的代码：[`https://github.com/Apress/the-blockchain-developer/chapter9/step4.zip`](https://github.com/Apress/the-blockchain-developer/chapter9/step4.zip)。\n\
  \n\n### 转账组件\n\n`transfer`组件将包含一个表单，用于提交以将以太坊币从一个账户地址转账到另一个账户地址。你将使用表单模块来加快表单的创建。为此，你需要像处理其他\
  \ Material 模块一样，在 `app.module.ts` 中包含 Material 的 `FormsModule` 和 `ReactiveFormsModule`\
  \ 表单模块。\n\n打开 `src/app/app.module.ts` 并添加以下 `import` 语句：\n\n```typescript\nimport\
  \ { FormsModule, ReactiveFormsModule } from '@angular/forms';\n```\n\n你还需要更新 `imports`\
  \ 语句：\n\n```typescript\nimports: [\n  FormsModule,\n  ReactiveFormsModule,\n  ..\n\
  ]\n```\n\n你将使用 `<mat-form-field>` 标签，它代表一个组件，用于包装多个 Angular Material 组件并应用常见的文本字段样式，如下划线、浮动标签和提示消息。这将加快开发速度，因为你无需实现所有这些功能并在多个设备/浏览器上进行测试。\n\
  \n表单字段是名为 `<mat-form-field>` 的包装组件。你可以使用任何表单字段控件（如输入框、文本区域、列表等）。\n\n你可以在此处找到关于 mat-forms\
  \ 的信息：[`https://material.angular.io/components/form-field/overview`](https://material.angular.io/components/form-field/overview)。\n\
  \n对于 `src/app/components/transfer/transfer.component.ts`，你将更新初始代码。首先，你需要导入将要使用的组件；在这种情况下，你需要初始化类并使用表单、表单控件和验证器。\n\
  \n```typescript\nimport {FormBuilder, FormControl, FormGroup, Validators} from '@angular/forms';\n\
  ```\n\n然后，你需要更新组件定义以实现 `OnInit` 方法：\n\n```typescript\nexport class TransferComponent\
  \ implements OnInit {\n```\n\n你将使用一个标志来指示表单是否已提交，并创建一个表单组实例，以及一个名为 `user` 的对象来保存用户信息。\n\
  \n```typescript\nformSubmitted: Boolean = false;\nuserForm: FormGroup;\nuser: any;\n\
  ```\n\n为了验证你的表单，你需要在表单填写不正确的情况下定义消息。每个表单控件都需要使用必填字段和消息来定义。\n\n```typescript\naccount_validation_messages\
  \ = {\n  'transferAddress': [\n    { type: 'required', message: '转账地址是必填项' },\n\
  \    { type: 'minLength', message: '转账地址长度必须为 42 个字符' },\n    { type: 'maxLength',\
  \ message: '转账地址长度必须为 42 个字符' }\n  ],\n  'amount': [\n    { type: 'required', message:\
  \ '金额是必填项' },\n    { type: 'pattern', message: '金额必须为正数' }\n  ],\n  'remarks': [\n\
  \    { type: 'required', message: '备注是必填项' }\n  ]\n};\n```\n\n当你创建构造函数时，需要包含 `FormBuilder`\
  \ 组件以便能够生成表单。\n\n```typescript\nconstructor(private fb: FormBuilder) { }\n```\n\n\
  当你的组件初始化时，你将把 `formSubmitted` 标志设置为 `false`，并为用户信息设置默认值。然后，你将调用一个方法来获取用户的账户和余额，该方法将在稍后实现。最后，你将调用\
  \ `createForms` 方法来生成表单。\n\n```typescript\nngOnInit() {\n  this.formSubmitted =\
  \ false;\n  this.user = {address: '', transferAddress: '', balance: '', amount:\
  \ '', remarks: ''};\n  this.getAccountAndBalance();\n  this.createForms();\n}\n\
  ```\n\n`createForms` 方法将通过传递验证器和数据来生成表单控件。\n\n```typescript\ncreateForms() {\n \
  \ this.userForm = this.fb.group({\n    transferAddress: new FormControl(this.user.transferAddress,\
  \ Validators.compose([\n      Validators.required,\n      Validators.minLength(42),\n\
  \      Validators.maxLength(42)\n    ])),\n    amount: new FormControl(this.user.amount,\
  \ Validators.compose([\n      Validators.required,\n      Validators.pattern('^[+]?([.]\\\
  \\d+|\\\\d+[.]?\\\\d*)$')\n    ])),\n    remarks: new FormControl(this.user.remarks,\
  \ Validators.compose([\n      Validators.required\n    ]))\n  });\n}\n```\n\n`getAccountAndBalance`\
  \ 方法将设置用户账户的地址和余额；目前你使用的是虚拟数据，但你将在本章稍后实现实际的服务。\n\n```typescript\ngetAccountAndBalance\
  \ = () => {\n  const that = this;\n  that.user.address = '0xd8d0101f83e79fb4e8d21134f5325e64816bd6a0';\n\
  \  that.user.balance = 0;\n  // TODO: 获取数据\n}\n```\n\n最后，一旦你提交表单，你需要一个方法来处理数据并调用服务。`submitForm`\
  \ 将通过检查表单是否有效来使用，稍后你将调用将要创建的服务组件。\n\n```typescript\nsubmitForm() {\n  if (this.userForm.invalid)\
  \ {\n    alert('transfer.components :: submitForm :: 表单无效');\n    return;\n  } else\
  \ {\n    console.log('transfer.components :: submitForm :: this.userForm.value');\n\
  \    console.log(this.userForm.value);\n    // TODO: 服务调用\n  }\n}\n```\n\n对于 `transfer.component.html`，你将设置表单标签，以便在表单提交后调用\
  \ `submitForm` 方法。\n\n```html\n<form [formGroup]=\"userForm\" (ngSubmit)=\"submitForm()\"\
  >\n```\n\n接下来，你将创建包裹的 `div` 并使用数据绑定来显示用户的账户地址和余额。\n\n```html\n<div class=\"transfer-container\"\
  >\n  <p>地址: {{user.address}} </p>\n  <p>余额: {{user.balance}} Eth</p>\n</div>\n```\n\
  \n请注意，你使用了尚未定义的 `transfer-container` 样式；你将在 CSS 文件中定义它，它将用于格式化你的表单。\n\n对于表单控件，你需要输入框来输入转账目标的账户、金额和消息。你还需要设置验证。\n\
  \n```html\n<mat-form-field>\n  <input matInput placeholder=\"转账地址\" formControlName=\"\
  transferAddress\" required>\n  <mat-error *ngFor=\"let validation of account_validation_messages.transferAddress\"\
  >\n    <mat-error *ngIf=\"userForm.get('transferAddress').hasError(validation.type)\"\
  >{{validation.message}}</mat-error>\n  </mat-error>\n</mat-form-field>\n\n<mat-form-field>\n\
  \  <input matInput placeholder=\"金额\" formControlName=\"amount\" required>\n  <mat-error\
  \ *ngFor=\"let validation of account_validation_messages.amount\">\n    <mat-error\
  \ *ngIf=\"userForm.get('amount').hasError(validation.type)\">{{validation.message}}</mat-error>\n\
  \  </mat-error>\n</mat-form-field>\n\n<mat-form-field>\n  <textarea matInput placeholder=\"\
  备注\" formControlName=\"remarks\" required></textarea>\n  <mat-error *ngFor=\"let\
  \ validation of account_validation_messages.remarks\">\n    <mat-error *ngIf=\"\
  userForm.get('remarks').hasError(validation.type)\">{{validation.message}}</mat-error>\n\
  \  </mat-error>\n</mat-form-field>\n```\n\n最后，记得关闭 `div` 和表单，并包含一个提交按钮。\n\n```html\n\
  <button mat-raised-button color=\"primary\" type=\"submit\">转账以太币</button>\n```\n\
  \n</form>\n```\n\n对于 `transfer.component.css`，你将使用 `.transfer-container` div 来水平格式化你的表单。\n\
  \n```css\n.transfer-container {\n  display: flex;\n  flex-direction: column;\n}\n\
  .transfer-container > * {\n  width: 100%;\n}\n```\n\n就是这样。现在，你可以在浏览器中检查你的 dapp，你应该能够看到用户的默认数据，测试表单，验证它，并提交表单。参见图\
  \ 9-10。\n\n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig10_HTML.jpg](img/475651_1_En_9_Fig10_HTML.jpg)\n\
  \n**图 9-10** Ethdapp 转账页面，包含用户信息、验证器和提交按钮\n\n你可以在此处下载此步骤：[`https://github.com/Apress/the-blockchain-developer/chapter9/step5.zip`](https://github.com/Apress/the-blockchain-developer/chapter9/step5.zip)。\n\
  \n---\n\n### Angular 指令\n\n在 Angular 中创建指令使你能够仅用几行代码就能创建自己的自定义 HTML 标签，就像你在 Material\
  \ 表单中看到的那样。你能够包含包装了许多组件的自定义标签。从高层次来看，指令是 DOM 元素上的标记。这些标记可以指向任何 DOM 组件，从属性到元素名称，甚至是注释或\
  \ CSS 类。然后，这些标记会告诉 AngularJS 的 HTML 编译器附加指定的行为，或根据特定逻辑转换整个 DOM 元素及其子元素。\n\nAngular\
  \ 内置了许多这样的指令。然而，在开发过程中，你很有可能需要创建自己的指令。你的 dapp 目前很简单，所以你不需要创建任何指令，并且解释这一点超出了本章的范围。当你确实需要生成一个骨架指令时，请像生成其他组件一样使用\
  \ Angular CLI。\n\n```bash\n> ng generate directive {指令名称}\n```\n\n尽管你没有在你的应用中创建指令，但我还是想向你介绍这个概念，因为这是创建\
  \ Angular 项目不可或缺的一部分。\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n\
  ## 总结\n\n在本章中，你深入探讨了什么是去中心化应用，并了解了去中心化应用的分类和项目。你学习了如何通过将过程分解为五个步骤来启动自己的去中心化应用项目：撰写白皮书、启动首次代币发行、开发去中心化应用、发布它，以及营销你的去中心化应用。\n\
  \n接着，你探讨了为什么要使用 Angular。然后，你创建了一个 Angular 去中心化应用，首先确保安装了先决条件，并安装了 Angular CLI。之后，你创建了一个\
  \ Angular 项目并运行了该应用。\n\n接下来，你学习了如何将你的 Angular 项目导入 WebStorm 或创建一个新项目。你了解了构成 Angular\
  \ 的各个部分，例如组件、模块和指令。你还通过学习 Angular 样式架构和使用 Angular Material，了解了如何为去中心化应用设置样式。\n\n\
  你开始构建组件并创建内容；你将应用拆分为页脚、页眉和主体，并创建了一个名为 `transfer` 的自定义组件，其中包含一个表单，以便稍后能够转移代币。\n\n\
  在下一章中，你将创建一个转账智能合约和一个 Truffle 开发项目，并且连接到 Ganache 开发网络。你将学习如何通过 Truffle 与以太坊网络交互以及测试你的智能合约。你还会将你的去中心化应用与以太坊网络的\
  \ `web3` 库链接起来，并通过 MetaMask 进行连接。\n\n"
- "# 使用 Angular 构建去中心化应用：第二部分\n\n在上一章中，你开始开发你的去中心化应用。具体来说，你了解了去中心化应用的分类和项目，并且你可以将自己的去中心化应用项目分解为五个步骤。然后，你探讨了为什么要使用\
  \ Angular 及其优势。接着，你创建了一个 Angular 项目，首先确保安装了先决条件，然后安装了 Angular CLI。你了解了构成 Angular\
  \ 的各个部分，例如组件、模块和指令。你还通过学习 Angular 样式架构和使用 Angular Material，了解了如何为去中心化应用设置样式。你开始构建自己的自定义组件并创建内容；你将应用拆分为页脚、页眉和主体，并创建了一个你将在本章中使用的自定义\
  \ `transfer` 组件。\n\n在本章中，我将介绍以下内容：\n\n-   使用 Truffle 创建去中心化应用的智能合约\n-   将智能合约集成到你的去中心化应用的\
  \ Angular 项目中\n-   链接你的去中心化应用并将其连接到以太坊网络\n\n你将使用我迄今为止一直在介绍的工具：Angular CLI、Truffle、`ganache-cli`\
  \ 和 MetaMask。你将使用 Truffle 创建一个用于你的去中心化应用的智能合约，然后你将使用 `web3` 库连接到以太坊本地网络，并调用智能合约的函数和事件。MetaMask\
  \ 将用于管理和连接到你的账户。\n\n> **提示** 建议你在阅读本章之前先完成上一章和第 5 章，以便充分理解此处的示例，这些示例建立在第 9 章和第 5\
  \ 章的概念、工具和已安装库的基础之上。\n\n## 转账智能合约\n\n在上一章中，你的应用中已经有了用于转移代币的前端逻辑；然而，你还没有一个与区块链交互的智能合约。智能合约可以在前端部分之前、之后或并行创建（如果你与一个开发团队一起工作）。\n\
  \n你已经在第 5 章中创建了一个以太坊智能合约，因此本节中的步骤对你来说应该很熟悉。请随时重温第 5 章以刷新记忆，因为对于本章中使用的工具和命令，我不会深入涉及太多细节。\n\
  \n首先，你将在你的 `ethdapp` 项目中创建一个新文件夹来存放 Truffle 项目。你可以在此处下载你中断时的最新步骤：[`https://github.com/Apress/the-blockchain-developer/chapter9/step5.zip`](https://github.com/Apress/the-blockchain-developer/chapter9/step5.zip)。在由多个开发人员参与的实际项目中，智能合约可能是一个独立项目。为了简单起见，你将其包含在你的项目中，这样你就可以使用\
  \ WebStorm 终端窗口底部的选项卡来运行命令。\n\n首先，在你的项目中创建一个名为 `truffle` 的文件夹，并初始化 Truffle 来创建项目。你可以在图\
  \ 10-1 中看到预期的输出。\n\n![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig1_HTML.jpg](img/475651_1_En_10_Fig1_HTML.jpg)\n\
  \n**图 10-1** 创建 Truffle 项目的输出\n\n```\n> mkdir ethdapp/truffle\n> cd truffle\n> truffle\
  \ init\n```\n\n> **提示** 如果你遇到“Error: Truffle Box”之类的错误，请卸载 Truffle，然后重新安装并重试。\n\n\
