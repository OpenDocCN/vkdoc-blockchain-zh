  \ -g truffle\n```\n\n重新安装或全新安装后，再次运行 `truffle init` 命令，并确保在新的终端窗口中运行测试以确认更改已生效。\n\
  \n```\n> truffle compile\n> truffle migrate\n> truffle test\n```\n\n你可以将你的结果与我的结果进行比较，如图\
  \ 10-2 所示。\n\n![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig2_HTML.jpg](img/475651_1_En_10_Fig2_HTML.jpg)\n\
  \n**图 10-2** Truffle 编译、迁移和测试你的项目\n\n### 创建智能合约\n\n你将创建一个智能合约并将其命名为 `Transfer.sol`；将其放在此处：`truffle/contracts/Transfer.sol`。该合约将允许你将资金从一个账户转移到另一个账户。首先，导航到\
  \ Truffle 中合约的位置，并使用编辑器创建一个新文件。\n\n```\n> cd ethapp/truffle/contracts\n> vim Transfer.sol\n\
  ```\n\n完整的 `Transfer.sol` 代码如下所示：\n\n```\npragma solidity ⁰.5.0;\ncontract Transfer\
  \ {\n    address payable from;\n    address payable to;\n    constructor() public\
  \ {\n        from = msg.sender;\n    }\n    event Pay(address _to, address _from,\
  \ uint amt);\n    function pay( address payable _to ) public payable returns (bool)\
  \ {\n        to = _to;\n        to.transfer(msg.value);\n        emit Pay(to, from,\
  \ msg.value);\n        return true;\n    }\n}\n```\n\n让我们浏览一下这段代码。首先，你需要定义将要使用的\
  \ `solidity` 版本和合约名称。\n\n```\npragma solidity ⁰.5.0;\ncontract Transfer {\n```\n\
  \n接下来，定义发送方和接收方地址以及构造函数。\n\n```\naddress payable from;\naddress payable to;\nconstructor()\
  \ public {\n    from = msg.sender;\n}\n```\n\n你将使用一个 `Pay` 事件，该事件将在使用 `pay` 函数时被触发。\n\
  \n```\nevent Pay(address _to, address _from, uint amt);\n```\n\n`pay` 函数使用 `Pay`\
  \ 事件与网络交互并执行实际的转账操作。\n\n```\nfunction pay( address payable _to ) public payable\
  \ returns (bool) {\n    to = _to;\n    to.transfer(msg.value);\n    emit Pay(to,\
  \ from, msg.value);\n    return true;\n}\n}\n```\n\n\n\n#### 就这样。你保持了基础和简单，只有一个事件和一个函数。\n\
  你可以从这里下载这一步的代码：[`https://github.com/Apress/the-blockchain-developer/chapter10/step1.zip`](https://github.com/Apress/the-blockchain-developer/chapter10/step1.zip)。\n\
  \n## 创建 Truffle 开发网络\n\n下一步是用以下配置替换 `truffle/truffle-config.js` 文件：\n\n```javascript\n\
  module.exports = {\nnetworks: {\ndevelopment: {\nhost: \"127.0.0.1\",\nport: 8545,\n\
  network_id: \"*\",\ngas: 5000000,\ngasPrice: 100000000000\n}\n}\n};\n```\n\n请注意，你指向了\
  \ 8545 端口，这将在本章稍后运行 MetaMask 时为你提供帮助。\n\n## 部署智能合约\n\n你需要的另一个配置文件是部署合约文件。创建一个部署文件，并将其命名为\
  \ `truffle/migrations/2_deploy_contracts.js`。在这个配置文件中，你只需要指向所创建的 `Transfer` 智能合约\
  \ SOL 代码。\n\n```javascript\nvar Transfer = artifacts.require(\"./Transfer.sol\"\
  );\nmodule.exports = function(deployer) {\ndeployer.deploy(Transfer);\n};\n```\n\
  \n现在，你已经准备好使用 Ganache 在 8545 端口上创建你的网络，因此导航到 Truffle 项目，并运行以下命令：\n\n```bash\n> cd\
  \ ethdapp/truffle\n> ganache-cli -p 8545\n```\n\n**提示**  \n如果你遇到诸如“NODE_MODULE_VERSION\
  \ 不匹配”之类的错误，请卸载并重新安装 `ganache-cli`。然后打开一个新的终端窗口，确保它运行正常。\n\n如果需要重新安装 `ganache-cli`，请运行以下命令：\n\
  \n```bash\n> npm uninstall -g ganache-cli\n> npm install -g ganache-cli\n```\n\n\
  为了确保它运行正常，请运行以下命令：\n\n```bash\n> ganache-cli help\n```\n\n接下来，在一个新的终端窗口中，让我们在 `ganache`\
  \ 仍在运行时编译并部署你的合约。\n\n```bash\n> truffle compile\n```\n\n编译输出应显示成功，并在 `Contract`\
  \ 文件夹中创建你的合约。\n\n```\nCompiling ./contracts/Transfer.sol...\nWriting artifacts to\
  \ ./build/contracts\n```\n\n创建的文件是 `Transfer.json`，你将在你的去中心化应用中使用它与网络进行交互。接下来，你将使用\
  \ `migrate` 命令部署合约。\n\n```bash\n> truffle migrate --network development\n```\n\n\
  输出应确认合约已迁移到网络，如图 10-3 所示。\n\n![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig3_HTML.jpg](img/475651_1_En_10_Fig3_HTML.jpg)\n\
  \n**图 10-3** Truffle 迁移项目\n\n输出摘要还应显示部署成功并产生了费用。\n\n```\nSummary\n=======\n> Total\
  \ deployments:   2\n> Final cost:          0.0525573 ETH\n```\n\n## Truffle 控制台\n\
  \n现在你已经编译并部署了合约，为了与网络交互，请启动一个控制台，如下所示：\n\n```bash\n> truffle console --network development\n\
  ```\n\n关于你可以对 Truffle CLI 运行的命令，一个很好的资源是 Ethereum JavaScript API 维基页面，网址是：[`https://github.com/ethereum/wiki/wiki/JavaScript-API`](https://github.com/ethereum/wiki/wiki/JavaScript-API)。\n\
  \n### 账户\n\n如果你运行 `getAccounts`，你将获得与你的钱包关联的账户列表。\n\n```javascript\ntruffle(development)>\
  \ web3.eth.getAccounts()\n[ '0x1eFf25A40C82EA65BC88E45d02368897EC922FEf',\n'0xC135058b33d5df78636Cf14b74F281f95c4a407c',\n\
  '0xe682300Ef633F7d4f0d8Cb07c1bAD5d9B4eaE974'\n....]\n```\n\n然后，你可以将 `address1` 和\
  \ `address2` 定义为第一个和第二个账户。\n\n```javascript\ntruffle(development)> web3.eth.getAccounts().then(\
  \ function(a){address1=a[0]})\nundefined\ntruffle(development)> web3.eth.getAccounts().then(\
  \ function(a){address2=a[1]})\nundefined\n```\n\n现在它们已被定义，你可以调用它们，并在输出中获得第一个和第二个账户。\n\
  \n```javascript\ntruffle(development)> address1\n'0x1eFf25A40C82EA65BC88E45d02368897EC922FEf'\n\
  truffle(development)> address2\n'0xC135058b33d5df78636Cf14b74F281f95c4a407c'\n```\n\
  \n你也可以使用 `getBalance` 来获取这些地址中的余额。\n\n```javascript\ntruffle(development)> web3.eth.getBalance(address1)\n\
  '99942134400000000000'\ntruffle(development)> web3.eth.getBalance(address2)\n'100000000000000000000'\n\
  ```\n\n### 测试智能合约的转账\n\n现在你已经定义了两个地址，并且知道这些账户中的余额，你可以定义你的合约并在账户之间转移一些资金。为此，首先定义合约并将其命名为\
  \ `transferSmartContract`。\n\n```javascript\ntruffle(development)> Transfer.deployed().then(function(instance){transferSmartContract\
  \ = instance;})\nundefined\n```\n\n接下来，运行你定义的 `transferSmartContract` 变量，以确保它工作正常并显示对象值。\n\
  \n```javascript\n> transferSmartContract\n```\n\n现在，你可以使用智能合约在两个账户之间转移资金。账户 2 有一个整齐的整数金额，因此你将转移\
  \ 5 个以太币。\n\n```javascript\n> transferSmartContract.pay(address2, {from: address1,\
  \ value: 5});\n```\n\n命令输出显示了关于交易和挖矿的信息。现在你可以看到更新后的余额。\n\n```javascript\n> web3.eth.getBalance(address1);\n\
  '99942134399999999995'\n> web3.eth.getBalance(address2);\n'100000000000000000005'\n\
  ```\n\n如你所见，余额发生了变化，你成功在两个地址之间转移了代币。\n\n## 链接到以太坊网络\n\n你的合约已在终端中运行；下一步是让你的去中心化应用与合约交互。这是通过\
  \ `web3.js` 完成的，它是一个库的集合，允许你使用 HTTP 或 IPC 连接与本地或远程以太坊节点进行交互。首先，导航回你的 Angular 项目文件夹，然后使用\
  \ `--save` 标志安装 `web3.js`，以保存你正在安装的库。\n\n```bash\n> cd ethdapp/\n> npm install web3\
  \ –save\n+ web3@1.0.0-beta.55\n```\n\n如果安装顺利，你将在输出中看到已安装的版本。在撰写本文时，`web3` 的版本是 1.0.0-beta55。\n\
  \n你还需要安装 `truffle-contract`，它提供了包装代码，使与合约的交互更加容易。在撰写本文时，最新版本是 4.0.7，但当你阅读本书时，它可能会发生变化。\n\
  \n```bash\n>  npm install truffle-contract –save\n+ truffle-contract@4.0.15\n```\n\
  \n**提示**  \n`web3` 1.0.0 beta 版本和 `truffle-contract` 4.0.15 版本是与 Angular 7.3.x 兼容的最新版本。但是，这种情况可能会发生变化，因此请注意你正在安装的版本，以确保其兼容性并避免错误。如果你遇到兼容性问题，请使用精确的\
  \ `@[版本]` 重新安装，例如 `@4.0.15`。\n\n## 转账服务\n\n现在你已经安装了库，可以继续了。在本节中，你将创建并编写一个服务类。服务类将成为你与\
  \ `web3` 交互的前端中间层。首先，你可以使用 `ng s` 标志，该标志代表“service”。\n\n```bash\n> ng g s services/transfer\
  \ --module=app.module\nCREATE src/app/services/transfer.service.spec.ts\nCREATE\
  \ src/app/services/ transfer.service.ts\n```\n\n你将用与 `web3` 交互的逻辑替换服务类的初始代码。首先，你将定义将使用的库，即\
  \ Angular 核心以及你安装的 `truffle-contract` 和 `web3` 库。\n\n```typescript\nimport { Injectable\
  \ } from '@angular/core';\nconst Web3 = require('web3');\nimport * as TruffleContract\
  \ from 'truffle-contract';\n```\n\n接下来，你将定义稍后将使用的三个变量：`require`、`window` 和 `tokenAbi`。请注意，`tokenAbi`\
  \ 指向从合约 SOL 文件编译出的 ABI 文件。\n\n```typescript\ndeclare let require: any;\ndeclare\
  \ let window: any;\nconst tokenAbi = require('../../../truffle/build/contracts/Transfer.json');\n\
  ```\n\n你需要访问根目录才能与 `web3` 交互，因此需要将其注入到你的项目中。\n\n```typescript\n@Injectable({\nprovidedIn:\
  \ 'root'\n})\n```\n\n接下来，定义类定义、`account` 和 `web3` 变量，以及 `init web3`。\n\n\n好的，这是根据您的要求翻译的中文文档。\n\
  \n\n```typescript\nexport class TransferService {\nprivate _account: any = null;\n\
  private readonly _web3: any;\nconstructor() {\nif (typeof window.web3 !== 'undefined')\
  \ {\nthis._web3 = window.web3.currentProvider;\n} else {\nthis._web3 = new Web3.providers.HttpProvider('http://localhost:8545');\n\
  }\nwindow.web3 = new Web3(this._web3);\nconsole.log('transfer.service :: this._web3');\n\
  console.log(this._web3);\n}\n```\n\n注意，你在代码中包裹了 `console.log` 消息，这样你可以在浏览器开发者工具的控制台消息部分看到这些消息，以帮助你理解正在发生的事情。为此，请在开发者工具模式下打开浏览器。对于\
  \ Chrome，选择 查看 ➤ 开发者 ➤ 开发者工具。\n\n你需要一个 `async` 方法来获取账户地址和余额，因此你可以使用一个 promise 函数。如果之前没有检索到你的账户，你将像在终端中那样调用\
  \ `web3.eth.getAccounts` 来检索数据。你还需要处理出错时的错误代码。\n\n```\nprivate async getAccount():\
  \ Promise {\nconsole.log('transfer.service :: getAccount :: start');\nif (this._account\
  \ == null) {\nthis._account = await new Promise((resolve, reject) => {\nconsole.log('transfer.service\
  \ :: getAccount :: eth');\nconsole.log(window.web3.eth);\nwindow.web3.eth.getAccounts((err,\
  \ retAccount) => {\nconsole.log('transfer.service :: getAccount: retAccount');\n\
  console.log(retAccount);\nif (retAccount.length > 0) {\nthis._account = retAccount[0];\n\
  resolve(this._account);\n} else {\nalert('transfer.service :: getAccount :: no accounts\
  \ found.');\nreject('No accounts found.');\n}\nif (err != null) {\nalert('transfer.service\
  \ :: getAccount :: error retrieving account');\nreject('Error retrieving account');\n\
  }\n});\n}) as Promise;\n}\nreturn Promise.resolve(this._account);\n}\n```\n\n类似地，你需要一个服务方法来与账户交互并获取其余额。你像在终端中那样使用\
  \ `web3.eth.getBalance` 并包裹一些错误检查。你还需要将其设置为一个 promise。需要 promise 的原因在于这些调用是 `async`\
  \ 的，而 JavaScript 并非如此。\n\n```\npublic async getUserBalance(): Promise {\nconst account\
  \ = await this.getAccount();\nconsole.log('transfer.service :: getUserBalance ::\
  \ account');\nconsole.log(account);\nreturn new Promise((resolve, reject) => {\n\
  window.web3.eth.getBalance(account, function(err, balance) {\nconsole.log('transfer.service\
  \ :: getUserBalance :: getBalance');\nconsole.log(balance);\nif (!err) {\nconst\
  \ retVal = {account: account, balance: balance};\nconsole.log('transfer.service\
  \ :: getUserBalance :: getBalance :: retVal');\nconsole.log(retVal);\nresolve(retVal);\n\
  } else {\nreject({account: 'error', balance: 0});\n}\n});\n}) as Promise;\n}\n```\n\
  \n最后，你需要一个方法来传递表单中的值，并将付款从一个账户转移到另一个账户。使用合约的 `pay` 方法并包裹一些错误检查。\n\n```\ntransferEther(value)\
  \ {\nconst that = this;\nconsole.log('transfer.service :: transferEther to: ' +\
  \ value.transferAddress + ', from: ' + that._account + ', amount: ' + value.amount);\n\
  return new Promise((resolve, reject) => {\nconsole.log('transfer.service :: transferEther\
  \ :: tokenAbi');\nconsole.log(tokenAbi);\nconst transferContract = TruffleContract(tokenAbi);\n\
  transferContract.setProvider(that._web3);\nconsole.log('transfer.service :: transferEther\
  \ :: transferContract');\nconsole.log(transferContract);\ntransferContract.deployed().then(function(instance)\
  \ {\nreturn instance.pay(\nvalue.transferAddress,\n{\nfrom: that._account,\nvalue:\
  \ value.amount\n});\n}).then(function(status) {\nif (status) {\nreturn resolve({status:\
  \ true});\n}\n}).catch(function(error) {\nconsole.log(error);\nreturn reject('transfer.service\
  \ error');\n});\n});\n}\n}\n```\n\n现在你已经完成了转账服务，可以连接 `transfer.component` 来获取用户的账户地址和余额，并在表单填写完毕后能够转账。\n\
  \n首先，你需要定义创建的服务组件。打开 `src/app/component/transfer/transfer.component.ts` 并在文档顶部添加\
  \ `import` 语句。\n\n```\nimport {TransferService} from '../../services/transfer.service';\n\
  ```\n\n对于组件定义，将 `TransferService` 作为 provider 添加。\n\n```\n@Component({\n..\nproviders:\
  \ [TransferService]\n})\n```\n\n另外，将 `TransferService` 添加到构造函数中，以便你可以在类中使用它。\n\n\
  ```\nconstructor(private fb: FormBuilder,\nprivate transferService: TransferService)\
  \ { }\n```\n\n接下来，更新 `getAccountAndBalance` 方法，使其包含对服务类的调用，以检索用户的实际账户和余额。\n\n```\n\
  getAccountAndBalance = () => {\nconst that = this;\nthis.transferService.getUserBalance().then(function(retAccount:\
  \ any) {\nthat.user.address = retAccount.account;\nthat.user.balance = retAccount.balance;\n\
  console.log('transfer.components :: getAccountAndBalance :: that.user');\nconsole.log(that.user);\n\
  }).catch(function(error) {\nconsole.log(error);\n});\n}\n```\n\n最后，更新 `submitForm`\
  \ 以调用 `transferEther` 进行转账和支付。将此处显示的 `submitForm TODO` 注释替换为对服务调用的调用：\n\n```\n//\
  \ TODO: service call\n```\n\n然后传递用户提交的数据：\n\n```\nthis.transferService.transferEther(this.userForm.value).then(function()\
  \ {\n}).catch(function(error) {\nconsole.log(error);\n});\n});\n```\n\n你可以从此处下载完整的步骤：[`https://github.com/Apress/the-blockchain-developer/chapter10/step2.zip`](https://github.com/Apress/the-blockchain-developer/chapter10/step2.zip)。\n\
  \n## 连接 MetaMask\n\n至此，你的去中心化应用代码已经完成。但是，如果你现在测试你的去中心化应用，`web3` 将无法连接到账户。你需要做的是连接到\
  \ MetaMask。\n\n这里存在一个与去中心化应用相关的隐私问题，恶意网站能够注入代码以查看用户的活动和以太坊地址，然后查找余额、交易历史和个人信息。这些恶意网站进而能够代表用户发起未经授权的交易，用户可能意外批准未经授权的交易并损失资金。\n\
  \n为了避免这些问题并连接你的 Angular 服务，你将通过 MetaMask 将浏览器连接到网络。你已经使用过 MetaMask，因此它应该已经安装。\n\n\
  让我们稍作回顾。你可能还记得，你通过 `ganache-cli` 在端口 8545 上启动了一个网络。\n\n```\n> ganache-cli -p 8545\n\
  ```\n\n并且你将 Truffle 连接到了该网络。\n\n```\n> truffle migrate --network development\n```\n\
  \n然后，你能够在端口 8545 上连接并在终端中运行命令。\n\n你现在可以在浏览器中连接 MetaMask。要连接，请选择 MetaMask，然后在下拉菜单中选择\
  \ Localhost 8545。参见图 10-4。\n\n![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig4_HTML.jpg](img/475651_1_En_10_Fig4_HTML.jpg)\n\
  \n**图 10-4** 将 MetaMask 连接到端口 8545 上的私有网络\n\n请注意，你在本章前面选择了端口 8545。它是 MetaMask 上的默认端口，因此通过选择下拉菜单项（而不是指向自定义端口），可以轻松地在你的私有网络上连接。但是，当你检查账户列表时，你并没有看到任何账户。你之所以看不到账户，是因为每次启动网络时，你都需要更新账户。有两种方法可以用账户列表更新\
  \ MetaMask。\n\n*选项 1*：当你运行 Ganache 时，使用 `m` 标志传递代表你在 Ganache 中拥有的私钥的助记词。例如，命令如下所示：\n\
  \n```\n> ganache-cli -p 8545 -m 'journey badge medal slender behind junk develop\
  \ produce spy enemy transfer room'\n```\n\n*选项 2*：当你运行 `ganache-cli` 时，你将看到账户列表、私钥和助记词。\n\
  \n```\n> ganache-cli -p 8545\n```\n\n查找此输出并复制助记词。\n\n\n\n```\nHD 钱包\n==================\n\
  助记词：`journey badge medal slender behind junk develop produce spy enemy transfer\
  \ room`\n基础 HD 路径：`m/44'/60'/0'/0/{account_index}`\n```\n\n接着，退出 MetaMask 并手动粘贴该助记词。点击右键并选择“退出”，如图\
  \ 10-5 所示。\n\n![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig5_HTML.jpg](img/475651_1_En_10_Fig5_HTML.jpg)\n\
  \n*图 10-5* 退出 MetaMask 账户\n\n退出后，欢迎页面会重新出现，其下方有一个链接，写着“使用账户种子短语导入”。点击该链接，如图 10-6\
  \ 所示。\n\n![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig6_HTML.jpg](img/475651_1_En_10_Fig6_HTML.jpg)\n\
  \n*图 10-6* MetaMask 欢迎页面\n\n现在，您可以选择密码并点击“恢复”来粘贴助记词，如图 10-7 所示。\n\n![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig7_HTML.jpg](img/475651_1_En_10_Fig7_HTML.jpg)\n\
  \n*图 10-7* 使用助记词恢复 MetaMask 账户\n\n## 测试你的 Dapp 功能\n\n现在，您终于可以测试您的 dapp 了。浏览器刷新后，您将看到地址和余额。接下来，填写表单并初始化一笔转账。注意，MetaMask\
  \ 会弹出窗口以确认转账。这是一项额外的安全措施，确保只有经过授权的转账才能获得批准。见图 10-8。\n\n![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig8_HTML.jpg](img/475651_1_En_10_Fig8_HTML.jpg)\n\
  \n*图 10-8* 完成转账的 MetaMask 通知\n\n## 后续方向\n\n继续完善您创建的 dapp。例如，您可以进行以下操作：\n\n*   创建一个用户服务类和一个共享服务类，用于保存用户信息和共享信息\n\
  *   创建登录/退出服务\n*   创建切换账户的选项\n*   创建侧边菜单，以优化应用导航\n*   更新智能合约并添加更多方法和事件\n\n## 本章小结\n\
  \n在本章中，您创建了一个转账智能合约和 Truffle 开发项目，并连接到了 Ganache 本地开发网络。您学习了如何通过 Truffle 与以太坊网络交互，以及如何测试您的智能合约。您通过命令行测试了使用智能合约进行资金转账。最后，您使用自己创建的\
  \ Angular `TransferService` 组件，将您的 dapp 与以太坊网络连接起来。通过 `web3` 库，您进行了一些服务调用。最后，您连接了\
  \ MetaMask 来管理您的账户。\n\n在下一章中，您将学习区块链的安全性与合规性。\n\n"
- "# 11. 安全性与合规性\n\n如您所见，大多数区块链都是去中心化的，并且通常保护各参与方的身份信息。然而，大多数与区块链相关的代码都涉及存储一些机密数据，例如用户的个人信息、密码、加密货币和钱包。\n\
  \n区块链相关代码的特性使其成为黑客攻击的目标。\n\n*   代码通常为了透明性和吸引贡献者而开源。\n*   现有的许多代码尚不成熟，不足以被视为发布版本。\n\
  *   在加密货币相关的区块链中，数据丢失不仅仅意味着隐私泄露。一旦资金转移，追踪起来很困难，并且这种转移很可能是不可逆的。\n\n随着区块链技术越来越流行，越来越多的人投身于区块链，这些担忧被放大了。事实上，关于区块链相关损失的报道日益增多，新闻媒体几乎每天都会报道新的攻击事件。例如，在本书撰写期间，币安交易所被盗\
  \ 4000 万美元。此外，在过去 12 个月中，估计有 2300 万美元因双花攻击被盗。同样地，惊人的 15 亿美元从加密货币交易所被盗。\n\n事后分析报告有时会展示一种复杂的盗窃手法，您需要成为天才才能防范。然而，大多数攻击是很容易预防的，它们仅仅源于简单的疏忽，或是没有使用能够揭示漏洞的工具。\n\
  \n> “智者解决问题，天才预防问题。”\n> ——阿尔伯特·爱因斯坦\n\n作为专业人士，对信任您的客户负责，同时为了维护您的声誉和履行受托责任，您有责任降低这些风险并确保数据安全。在开发周期的所有阶段都应考虑安全措施；事实上，安全应该是您开发工作中最重要的方面。然而，指望我在一章之内涵盖安全性的所有方面是不现实的，因为已知的特定攻击有上千种之多。\n\
  \n除了安全性，另一个需要解决的问题是合规性。监管机构一直在塑造技术，特别是区块链行业，每个地理位置都有多种需要遵守的法规。由于每天都有新的攻击手段被发明，监管法律也经常修订。理解常见的攻击、安全性、隐私、合规性和法规是一项具有挑战性的任务。\n\
  \n在本章中，我将为您提供关于安全思维的见解，并帮助您提高对安全、隐私和合规性的认识。本章分为三个部分。\n\n*   **安全准备**：我将涵盖您在开发平台之前和期间应考虑的领域。\n\
  *   **常见的区块链攻击**：我将介绍一些最著名和最常见的区块链攻击。\n*   **开发周期**：我将为您提供一个推荐的开发周期，以便您将安全性和合规性考虑进去。\n\
  \n具体来说，我将涵盖安全测试、隐私和合规性要求，以确保您的代码尽可能多地考虑到各种场景，从而帮助保护用户数据。我将介绍导致巨大损失的常见区块链相关网络攻击，以及特定于区块链网络的攻击。我将说明这些攻击作为用户和开发者本应如何预防。最后，我将介绍一个推荐的开发周期，您可以使用它来降低损失风险和平台关闭的可能性。\n\
  \n## 安全性与合规性准备\n\n在本节中，我将介绍您在安全测试方面需要考虑的一般领域，以及实现安全准备意味着什么。此外，您将通过以欧洲和美国的法规为例，理解实现合规准备意味着什么。最后，我将重点介绍您在开发周期中以及在发布代码之前应考虑的建议。\n\
  \n### 安全准备\n\n在传统的编码环境中，您需要考虑安全测试，以发现代码中的安全缺陷，确保代码按预期正常运行，并且数据得到保护。\n\n> **注意**\
  \  \n> *安全测试* 是一个旨在发现代码中安全缺陷的过程，以确保代码和数据都按预期工作。\n\n安全测试包括以下措施：\n\n\n\n- **机密性**：确保用户信息得到保护。示例是在安全套接层（SSL）连接后设置会员专区，该连接使用加密技术保护通过互联网传输的数据。\n\
  \n- **信息完整性**：保护信息不被篡改。示例是在数据于系统不同层之间传递时对其进行加密和解密。\n\n- **身份验证**：确认用户身份，并确保系统可信。示例是登录系统。\n\
  \n- **可用性**：确保系统正常运行。示例是安装防火墙以防止攻击。\n\n- **授权**：确保请求者被允许接收服务或执行操作。示例是创建一个超级账本许可型区块链，将访问权限限制给特定实体。\n\
  \n- **不可否认性**：确保在发送和接收消息时存在确认系统，以防止各方否认收到消息。示例是发送电子邮件通知以确认数字资产转账。\n\n## 合规准备\n\n\
  除了这些传统的安全测试考量外，您还需要考虑区块链特定的安全性和本地合规性，以确保您的平台符合监管要求。\n\n> **注意**\n> **安全合规性**对实体而言是一个法律问题。它是提供隐私建议以及改进安全性的监管标准。\n\
  \n合规性并不直接关注安全性；然而，许多本地合规要求会考虑安全性，并确保用户和数据都得到保护，因此它们间接地相互关联。许多大公司同时聘请安全和合规专家，以确保两者都得到满足。\n\
  \n您可能会想，为什么我甚至需要考虑法规？区块链不是旨在去中心化吗？确实如此；然而，近年来，由于持续的欺诈和攻击造成了重大损失，监管机构已对区块链运营商采取行动，许多国家也已制定隐私政策和安全措施。因此，您需要检查合规性和安全法规，以确保不违反任何法律。\n\
  \n事实上，许多机构和当局已发布研究论文，分析区块链与数据保护法规之间的关系，以及如何为实现“合规准备”做好准备。\n\n> **注意**\n> **合规准备**确保实施满足治理要求。区块链在世界许多地方并不豁免于任何适用的法律和法规。\n\
  \n例如，在欧洲和美国，存在与数据保护影响评估（`DPIA`）和通用数据保护条例（`GDPR`）相关的合规立法和政策，这些法规具体描述了哪些信息不允许存储在区块链上。\n\
  \n不过，这不仅仅是关于哪些数据可以存储、哪些不能存储；许多国家已实施隐私法律，限制可以跨地理边界传输的数据类型。\n\n与区块链社区中许多认为合规法律只是为了限制和控制区块链技术取代传统机构的人不同，许多规则是为了保护投资者免受损失，以及保护用户的隐私。此外，一些国家有法律法规要求您进行记录保存并存储用户数据，以帮助防止欺诈、洗钱和恐怖主义。\n\
  \n例如，2013 年，美国的《1970 年银行保密法》（`BSA`）和金融犯罪执法网络（`FinCEN`）向交易所和首次代币发行（`ICO`）发布了指南，将其归类为**货币服务企业**（`MSB`），这些企业需要遵守注册、报告和记录保存的规定。这意味着在美国，交易所和`ICO`需要向`FinCEN`注册为`MSB`。\n\
  \n忽视合规性可能导致传票、罚款、关闭甚至刑事指控。例如，在欧洲，`GDPR`设定了遵守特定合规性的最后期限。无法遵守的公司面临被处以巨额罚款的风险。这适用于移动设备、电视应用、网络门户、网站、`API`和云存储。事实上，2019\
  \ 年，法国国家信息与自由委员会（`CNIL`）对谷歌处以 5000 万欧元罚款。另一个例子是稳定币`tether`，在撰写本文时，纽约最高法院已下令其在`Bitfinex`交易所冻结其代币的转账。\n\
  \n每个地理位置在处理区块链技术方面都有特定要求，因此在开发软件之前，了解法律、安全和隐私规则非常重要。\n\n事实上，每个地理边界的监管机构都可以制定自己的规则。以美国和欧洲为例，它们对区块链有不同的规则，如果您有来自这些国家/地区的访客，即使只有一位，您也应遵守这些法规。在本章中，您将以美国和欧洲为例进行探讨；但是，您需要检查每个特定地理位置以了解当地适用的具体规则。\n\
  \n## 美国合规性\n\n美国有安全法规和资金转账法律，要求您遵守特定州的法律，如果您转移加密货币，甚至可能需要申请州许可证。在美国处理区块链相关技术的机构是**证券交易委员会**（`SEC`）和**另类交易系统**（`ATS`）。\n\
  \n在撰写本文时，`SEC`将首次代币发行（`ICO`）和**证券型代币发行**（`STO`）都视为证券。因此，它们受《1934 年证券交易法》的约束，该法概述了如何在实体之间转让证券。例如，`SEC`要求交易所向国家证券交易所和/或`ATS`注册。\n\
  \n> **提示**\n> `STO`和`ICO`在美国都被视为证券；然而，`STO`在投资者中比`ICO`更受欢迎，因为许多`ICO`在 2018 年和 2019\
  \ 年被迫向投资者退款。\n\n交易所也受特定法规约束；例如，处理衍生品的交易所需要向**商品期货交易委员会**（`CFTC`）注册为**CFTC 交易所**或**指定合约市场**（`DCM`），因为《1936\
  \ 年商品交易法》（`CEA`）有此要求。\n\n\n\n#### 注意事项\n\n为更好地了解如何在美国实现合规，请阅读 NIST 的以下报告：[`https://nvlpubs.nist.gov/nistpubs/ir/2018/NIST.IR.8202.pdf`](https://nvlpubs.nist.gov/nistpubs/ir/2018/NIST.IR.8202.pdf)。\n\
  \n## 欧盟合规\n\n欧盟正在制定针对区块链和加密市场的具体要求；这些要求将考虑名为了解你的客户（`KYC`）和反洗钱（`AML`）法规。关于数字资产，欧盟目前的法规并不反对加密-法币和法币-加密交易所。主要关注点在于确保加密货币不被用于资助非法活动，如洗钱和恐怖主义。为应对这些关切，加密平台需要根据`KYC`对客户进行尽职调查，并报告任何可疑交易。\n\
  \n为更好地了解如何在欧洲实现合规，请阅读以下`EUBOF`和`CNIL`报告：\n\n- [`https://www.eublockchainforum.eu/sites/default/files/reports/eu_observatory_blockchain_in_government_services_v1_2018-12-07.pdf`](https://www.eublockchainforum.eu/sites/default/files/reports/eu_observatory_blockchain_in_government_services_v1_2018-12-07.pdf)\n\
  - [`https://www.cnil.fr/sites/default/files/atoms/files/blockchain.pdf`](https://www.cnil.fr/sites/default/files/atoms/files/blockchain.pdf)\n\
  \n### 提示\n\n法规经常变更；请密切关注`SEC`、`EUBOF`以及您平台所在地区的其他组织发布的消息和信息。如果您使用社交媒体，请关注这些组织的账号或将新闻更新加入您的阅读列表。\n\
  \n## 就绪建议\n\n通过提高认知，您可以同时实现合规和安全就绪，从而确保您的平台为上线做好准备，并有助于防止遭受攻击者或政府关停。\n\n由于不同地理区域的合规要求各不相同，全球范围内并没有一套确切的规则可以确保就绪；然而，有一些关键要素是良好的实践做法，可以帮助您做好安全与合规准备。在后续章节中，我将介绍特定的攻击类型；以下通用建议是您在开发应用时应考虑的基本建议。\n\
  \n- **地理位置**：如果您打算让哪怕一个用户在您的平台注册，您就需要在该用户所在地实现合规，并了解当地的法规政策。\n\n- **解决问题**：确保您确实在解决一个问题。问问自己，我的独特卖点（`USP`）是什么？不要仅仅为了跟风而利用区块链。2017\
  \ 年的 ICO 热潮已经结束，许多代币被下架，ICO 项目也被迫退还投资者资金。\n\n- **基于权限的区块链**：如果您正在构建基于权限的区块链，您应该定义成员角色，例如管理员、发布者、用户等。\n\
  \n- **隐私**：关于提供用户信息，越多越好。在隐私问题上尽可能多地告知您的用户。当您收集数据时，越少越好；只收集您需要的数据。以下是一些关于隐私的具体建议。\n\
  \n> **提示** 基于`CNIL`、`NIST`和`EUBOF`的报告，请遵循《通用数据保护条例》（`GDPR`）来实施您的代码。\n\n- **隐私政策**：制定隐私政策，让用户知晓哪些信息被存储，哪些信息与第三方共享。例如，在您的隐私政策中告知用户会将日志数据记录到分析工具中。\n\
  \n- **退订**：在您的平台上发布用于处理与隐私政策相关的同意、撤回和投诉的表单或电子邮件地址。\n\n- **政策变更**：将任何隐私政策的变更通知用户。\n\
  \n- **收集用户数据**：在收集所有用户信息时采取极简方法；仅存储必要的数据。\n\n- **收集的数据**：将运营平台所需的数据与其他收集的数据分开。\n\
  \n- **匿名化**：考虑以完全匿名化的方式实施您的平台。\n\n- **地理位置**：在存储数据时，确保按照该地理位置的规定收集数据。\n\n- **权限**：在存储任何数据（例如在\
  \ Cookie、本地数据库或云端）时，请求用户许可。\n\n- **清除所有内容**：用户登出后，清除 Cookie、会话和其他存储。允许用户清除您平台上使用的任何第三方工具的数据。\n\
  \n- **清理**：允许用户删除数据并清理历史记录。\n\n- **导出**：允许用户导出数据。\n\n- **告知**：将任何数据泄露事件告知用户。\n\n\
  以下是通用安全建议：\n\n- **安全套接层（SSL）**：在整个 Web 应用中，尤其是请求和导出数据时，应始终使用`HTTPS`。\n\n- **零知识证明（ZKP）**：对于区块链，请使用零知识证明（`ZKP`）；参见[`https://github.com/topics/zero-knowledge-proofs`](https://github.com/topics/zero-knowledge-proofs)。\n\
  \n> **注意** `ZKP`是一种方法，一方可以向验证者证明他们知道某个值（例如`x`）。现实中的类比是敲门并提供暗语以进入私密的会员专属俱乐部。\n\n\
  - **加密**：使用同态加密或安全多方计算。\n\n- **安全认证系统**：使用安全的认证系统，例如`OAuth 2.0`标准。示例：[`https://developer.github.com/apps/building-oauth-apps/`](https://developer.github.com/apps/building-oauth-apps/)。\n\
  \n- **服务超时与限制**：对延迟响应的服务设置超时机制，以确保不会导致服务阻塞（降速）。对登录尝试实施节流限制。在所有地方设置安全握手。\n\n- **常见安全漏洞**：防范常见安全漏洞，例如分布式拒绝服务（`DDoS`）和跨域资源共享（`CORS`）。\n\
  \n> **注意** `CORS`使用额外的 HTTP 头，允许运行在一个域上的应用程序访问不同域服务器上的资源。\n\n- **敏感信息**：使用加密方法将密码及任何其他敏感信息以哈希数据形式保存。\n\
  \n- **IP 限制**：限制可以访问您端口的 IP 地址。例如，不要让任何 IP 地址拥有 root 和 FTP 访问权限，仅限您自己的 IP 地址。\n\n\
  - **安全度量**：将安全措施纳入开发周期（请参见本章后面的“开发周期”部分）。\n\n总而言之，我回顾了安全就绪的含义、什么是安全测试以及如何做到合规就绪。您了解了美国和欧盟关于区块链技术的合规法规，最后，我介绍了在开发周期早期阶段应考虑的安全就绪建议。在本章的下一节中，您将了解可能导致重大损失的具体加密钱包攻击以及如何防范它们。\n\
  \n## 常见区块链攻击\n\n在本节中，我将介绍一些最著名、最常见的区块链攻击。我将这些攻击分为三类。\n\n- **钱包网络攻击**：针对加密货币钱包。\n\
  - **区块链网络攻击**：针对区块链 P2P 网络。\n- **平台攻击**：针对支持区块链的平台，例如交易所、网站和借贷平台。\n\n\n\n**钱包网络攻击**\n\
  \n请谨记，尽管我将攻击过程分为三类，但这些攻击大多采用不同的技术和针对不同的目标，其最终目的都是为了获取加密货币私钥。\n\n在本节中，我将回顾针对加密货币钱包的具体网络攻击。正如本章开头所强调的，一旦加密货币资金被转移，追踪起来就不那么容易，因为它们可以从一个钱包转移到另一个钱包，且除非网络中大多数节点同意更改区块，否则转移是不可逆的。\n\
  \n> *“每一把锁，都有人在尝试撬开或闯入。”*\n>\n> — 大卫·伯恩斯坦\n\n常见的钱包攻击形式多样，但结果都是导致用户丢失私钥。攻击者通常先发起“钓鱼攻击”，获取用户的机密信息，然后就能将资金从账户中转出。\n\
  \n**注意**  \n*钓鱼攻击*（可理解为“钓取信息”）是一种试图欺诈性地获取用户机密信息（如用户名、密码、账号等）的手段。攻击者通过电子邮件等电子通信方式，将自己伪装成可信赖的实体。\n\
  \n事实上，除了 Bitconnect 和 iFan 等加密货币骗局之外，与钱包相关的盗窃行为造成了加密货币资产领域的第二大损失，总额接近 50 亿美元（见图\
  \ 11-1）。\n\n![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig1_HTML.jpg](img/475651_1_En_11_Fig1_HTML.jpg)\n\
  \n**图 11-1** 最大的加密货币盗窃事件\n\n应对钱包攻击的最佳解决方案是：在不使用加密货币时，将其从交易所中完全取出，存入你自己的“冷钱包”集中存储中。这可以通过硬件钱包来实现，例如\
  \ `Nano`、`Trezor`、`KeepKey` 等。将加密货币转移到冷钱包能提供最高级别的保护，并可避免像 Mt. Gox 事件那样的交易所损失——当时管理员密码被破解，导致许多用户丢失了钱包密钥。\n\
  \n**注意**  \n*冷存储*是一种将加密货币私钥保存在 U 盘、纸钱包或其他数据存储介质上，并置于安全位置的方法。可以把它想象成你自家的银行。\n\n在下一节中，你将了解常见的钱包攻击。我将提供事后分析，以帮助确保作为开发者和用户的你，不会重蹈他人的覆辙。\n\
  \n### 在线钱包钓鱼-恶意软件攻击\n\n在线钱包因连接互联网，比离线钱包更容易受到攻击。例如，近期针对 `Electrum` 钱包发起的一次钓鱼-恶意软件攻击，就造成了超过\
  \ 100 万美元的损失。\n\n**注意**  \n恶意软件由 *malicious*（恶意）和 *software*（软件）两个词组合而成。这种软件旨在破坏、损害或非法访问受害者的计算机。\n\
  \n该攻击由黑客设置恶意服务器实施；当用户钱包连接到其中一台服务器并试图发送一笔比特币交易时，攻击者的代码会显示一条看似官方的消息，告知用户需要更新他们的 `Electrum`\
  \ 钱包，并附带一个虚假的 URL 链接，用于下载一个包含恶意软件的假冒版 `Electrum` 钱包。\n\n一旦用户使用攻击者的 URL 并下载了新的假冒版\
  \ `Electrum`，钱包会要求用户重新输入密码，这些密码随后便被发送给黑客。黑客获取了用户的登录信息后，便能够登录到真实的 `Electrum` 钱包，并将用户的私钥转移到他们自己的钱包中。\n\
  \n### 事后分析\n\n作为用户，除了完全避免使用在线钱包并采用冷存储之外，你还可以通过以下方式降低风险：\n\n*   *只下载官方软件*：不要从钱包官方网站以外的任何来源下载在线钱包或进行升级。将光标悬停在链接上检查\
  \ URL，但不要点击。尤其要注意微小的拼写错误；看看你是否能发现这里的细微拼写差异：`paypaI.com`、`Electrom.com`。\n*   *保护你的信息*：谨慎对待通过电子邮件分享的信息。要求你确认账户凭据的邮件，必须是你认可的商家发送的，并且是由你主动发起的请求。\n\
  *   *确保认证*：下载钱包软件并检查 GPG 签名。切勿将你的加密货币资产私钥交给任何“官方”代表。\n*   *识别虚假支持电话*：进行网络钓鱼以获取你信息的公司，通常会使用虚假的支持电话号码。许多人通过谷歌搜索查找公司电话号码，从而成为这种攻击的受害者。\n\
  \n作为开发者，你应该做到以下几点：\n\n*   *使用 GPG 签名验证*：实现 GPG 签名验证。\n\n> **提示**  \n> `GPG`/`GNU`\
  \ 是一套加密软件，用于通过检查下载文件对应的签名来确保真实性。为防止钱包攻击，请实施 `GPG` 或 GNU Privacy Guard。作为用户，也别忘了检查实际的\
  \ `GPG`/`GNU` 本身是否经过认证并来自开发者。\n\n*   *教育你的用户*：创建页面、视频教程和博客文章，教育你的用户，防止他们犯常见错误。\n\
  \n### 键盘记录器恶意软件\n\n大多数恶意软件旨在损害你的计算机。可用于窃取加密货币的常见恶意软件是键盘记录器或屏幕抓取器。这类软件会记录你输入的所有内容，并截取你的计算机屏幕截图，企图捕获密码和个人信息。这类攻击在家用电脑上发生的可能性较小，因为攻击者需要将一个实际的通用串行总线（USB）设备连接到你的计算机来记录按键；然而，在你使用公共电脑时，例如在酒店大堂或图书馆，就可能发生这种情况。\n\
  \n### 事后分析\n\n如前所述，在家中使用电脑时，你被键盘记录器攻击的可能性较小；但是，在登录公共电脑时，务必小心谨慎，检查该电脑上是否连接了 USB 设备，并避免访问你的重要账户。在你的个人电脑上（以\
  \ Mac 为例），检查“活动监视器”以确保你识别所有在后台运行的服务。如有必要，通过网络搜索来查找你不认识的服务，如果发现任何可疑之处，请停止并移除该服务和应用程序。安装反病毒软件，如果仍有疑虑，请重装操作系统。\n\
  \n### 粉尘攻击\n\n粉尘攻击是指攻击者发送一笔微小（粉尘）交易。黑客利用这笔交易要么是向区块链网络发送垃圾邮件以占用区块空间，要么是标记目标地址，希望用户随后花费这些加密货币，从而帮助攻击者通过追踪交易历史来识别用户的个人信息。\n\
  \n### 事后分析\n\n作为用户，不要花费无法识别的交易。  \n作为开发者，实现“币控制”功能，以便将无法识别的交易标记为“不要花费”，使其不被包含在你的交易中。\
  \  \n阅读关于比特币的隐私文档，其中提供了保护隐私的宝贵信息，可适用于许多场景：[`https://en.bitcoin.it/wiki/Privacy`](https://en.bitcoin.it/wiki/Privacy)。\n\
  \n### 热钱包攻击\n\n在热钱包攻击中，攻击者通过钓鱼、密码破解或任何其他方法，从“热钱包”（即私钥在线存储的钱包）中获取钱包的私钥。一旦私钥从在线网络中被提取出来，攻击者就可以将这些密钥转移到他们自己的钱包中。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我已遵循您的所有注意事项和示例格式，将给定的英文文本翻译成了中文。\n\n\n#### 注意事项\n\n`交易所`将用户的加密货币私钥在线存储在所谓的*热钱包*或运营钱包中。之所以将这些私钥存储在线，是为了允许从钱包进行实时提现。\n\
  \n#### 事后反思\n\n作为用户，避免这些损失的最佳方法是将您的加密货币保存在您自己控制的冷钱包中，而不是中心化交易所中。\n\n作为开发者，请执行以下操作：\n\
  \n*   **保留冷钱包**：将用户的密钥存储在冷存储中，并尽可能避免使用热钱包。例如，Coinbase.com 声称其将 98% 的用户资金保存在分布在各地的保险箱内的纸质备份中。\n\
  *   **加密私钥**：如果需要将私钥存储在与在线网络连接的存储设备上，至少要使用强加密密钥对密钥进行加密。\n*   **监控异常活动**：例如，许多交易所对大宗提现进行人工审批。\n\
  \n## 区块链网络攻击\n\n在本节中，我将介绍针对区块链网络的常见攻击。\n\n### Sybil 攻击\n\nSybil 这个名字是多发性人格障碍患者的代名词。\n\
  \n#### 注意\n\n区块链 Sybil 攻击是指某个实体试图通过创建多个身份并控制多个节点来影响 P2P 网络。\n\nSybil 攻击通过创建多个虚假账户来控制网络。控制这些多个账户的实体随后可以影响网络，因为他们在民主网络中拥有额外的投票权。一个易于理解此概念的例子是\
  \ 2017 年的美国大选，一个实体（俄罗斯）通过创建多个社交媒体账户并控制其内容来影响选举过程。\n\n区块链的例子是，攻击者试图通过在 P2P 网络上创建多个\
  \ Sybil 身份来获得超过诚实节点的投票权。通过获得多数投票，攻击者可以拒绝接收区块或传输虚假区块。如果 Sybil 攻击的规模足够大，它们就能够控制 P2P\
  \ 网络的大部分算力并更改区块，这便构成了双花攻击。\n\n#### 事后反思\n\n作为开发者，您可以通过使 Sybil 攻击变得不切实际来阻止它们。如果发动\
  \ Sybil 攻击需要付出成本，例如创建账户、运行服务器、消耗电力等，那么这可能会阻止攻击或使其不切实际。然而，请确保考虑到那些需要创建多个账户的合法用户。\n\
  \n事实上，流行的区块链一直在考虑如何应对 Sybil 攻击。例如，比特币的 `PoW` 共识算法需要大量的处理能力，因此创建区块的速率与总算力成正比。这阻止了攻击者，因为矿工更愿意进行实际挖矿，而不是冒着在失败的\
  \ Sybil 攻击中遭受损失的风险。类似地，`PoS` 共识算法需要质押代币，因此攻击者将面临损失这些代币的风险。\n\n此外，正如您在之前的章节中所见，以太坊、EOS\
  \ 和 NEO 的 `dapps` 部署都包含了高昂的成本。以太坊的最低费用为 32,000 gas 外加每字节 200 gas，EOS 约为 120 个代币，NEO\
  \ 的固定成本为 100 到 1,000 gas。除此之外，许多区块链（如比特币、以太坊和 NEO）都会收取交易费，这有助于阻止攻击者。同样，EOS 不收取交易费，但它使用“信任链”来对抗攻击者。\n\
  \n#### 注意\n\n*信任链*是一种对抗 Sybil 攻击的方法，它在允许新身份加入网络之前要求信任。信任链的一种版本可以包括允许用户创建新账户，但在特定时间内不授予其完全权限。\n\
  \nEOS 为每个新账户向开发者收取 1 到 4 美元的费用；显然，开发者会不愿意创建账户，并且会采取措施来使账户获得批准。\n\n另一种对抗 Sybil 攻击的方法是将层级结构从民主制改为精英制（由经过筛选的人管理）。创建时间较早且声誉良好的用户将比新账户拥有更大的权重。可以参考\
  \ Stackoverflow.com 或 Wikipedia.com 的声誉系统；参见 [`https://stackoverflow.com/help/whats-reputation`](https://stackoverflow.com/help/whats-reputation)。\n\
  \n### 双花或 51% 攻击\n\n在本书的前面部分，我讨论了针对加密货币潜在的“双花”攻击，即恶意节点获得对区块链网络超过 50% 算力的控制权，从而能够篡改和操纵区块。像比特币和以太坊这样的大型区块链，由于矿工竞争，需要极高的资源门槛，因此不容易被\
  \ 51% 攻击所攻破。例如，根据 [`https://www.crypto51.app`](https://www.crypto51.app) 的数据，在撰写本文时，攻击比特币的理论成本为\
  \ 257,472 美元；参见图 11-2。\n\n![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig2_HTML.jpg](img/475651_1_En_11_Fig2_HTML.jpg)\n\
  \n**图 11-2** 对多种区块链进行 51% 攻击的理论成本\n\n然而，较小的区块链一直是 51% 攻击的目标。这发生在 Verge 区块链上，它在两次攻击中损失了近\
  \ 300 万美元。比特币黄金遭受了 1800 万美元的最大损失，以太坊经典损失了 110 万美元。实际上，在 2018 年和 2019 年不到一年的时间里，总损失达到了\
  \ 2300 万美元；参见图 11-3。\n\n![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig3_HTML.png](img/475651_1_En_11_Fig3_HTML.png)\n\
  \n**图 11-3** 从 2018 年到 2019 年 1 月的双花损失\n\n#### 事后反思\n\n作为投资者，您应该检查攻击您有兴趣投资的区块链的成本，以及该区块链是否存在安全网机制。\n\
  \n区块链开发者应该创建某种安全网机制，例如，创建一个哈希来保存每个区块所有交易和余额的快照，然后将该哈希存储到更大的区块链中。例如，您可以像在第 4 章中所做的那样，利用比特币的\
  \ `OP_RETURN` 功能，将哈希作为备份存储起来，以防发生 51% 攻击。\n\n事实上，[`http://komodoplatform.com`](http://komodoplatform.com)\
  \ 通过创建延迟工作量证明（`dPoW`）安全机制，成功解决了双花问题。\n\n### 矿工勒索软件\n\n正如我所提到的，比特币迄今未受这些 51% 攻击的影响；然而，黑客找到了一种通过勒索软件攻击矿工来影响区块链的新方法。\n\
  \n#### 注意\n\n勒索软件是一种恶意软件，旨在阻止对计算机的访问，直到支付赎金。这个名字是*赎金*和*软件*两个词的组合。\n\n黑客使用与勒索软件攻击个人电脑类似的技术来锁定矿机。在个人电脑上，恶意软件（例如\
  \ NotPetya 勒索软件）会被下载并安装，然后能够锁定用户的计算机，直到向某个钱包地址支付赎金。\n\n到目前为止，勒索软件只针对个人电脑；然而，像 `hAnt`\
  \ 这样的新型勒索软件开始瞄准矿工。`hAnt` 的安装方式尚不清楚，但据估计，它可能是随某个版本的矿机固件一起被下载的。然后勒索软件就能访问矿机的固件并控制矿机。\n\
  \n\n\n攻击者会在管理员登录时显示一条消息，威胁称如果不支付比特币赎金或感染其他设备，矿机将因过热而损毁。这可以通过关闭风扇来实现，如图 11-4 所示。截至目前，仅有`Antminer`和`Avalon`制造的比特币和莱特币矿机受到影响，但这种攻击理论上可以对任何矿机实施。\n\
  \n![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig4_HTML.jpg](img/475651_1_En_11_Fig4_HTML.jpg)\n\
  \n**图 11-4**  \n`hAnt`勒索软件消息。  \n图片来源：`sensorstechforum.com`。\n\n### 事后分析\n\n清除勒索软件并非易事。该软件可能内置了一个“触发陷阱”（`tripwire`）脚本，一旦矿机断开互联网连接，就会损坏矿机。要解决此问题，首先需要从矿机的安全数字（SD）卡中精确移除勒索软件。此外，矿场长时间离线会造成巨大损失。\n\
  \n最佳方法是完全避免此类攻击，即只从官方供应商网站下载固件升级，不信任任何其他来源。\n\n### 对等网络的日蚀攻击\n\n信息型日蚀攻击（`Eclipse\
  \ Attack`）可以单独实施，也可作为 51%攻击等其他攻击的一部分。攻击者通过操控网络，使节点仅与恶意节点通信，从而控制对等网络中某个节点对信息的访问权。随后，攻击者可以操纵挖矿过程和共识机制。\n\
  \n### 事后分析\n\n运行分析、模拟和实验，以寻找抵御日蚀攻击的应对措施。关于提高比特币安全性的优秀研究及应对日蚀攻击的潜在对策（同样适用于许多其他区块链网络），可参见以下链接：[`https://hackernoon.com/eclipse-attacks-on-blockchains-peer-to-peer-network-26a62f85f11`](https://hackernoon.com/eclipse-attacks-on-blockchains-peer-to-peer-network-26a62f85f11)。\n\
  \n### 路由攻击\n\n互联网路由攻击包括`BGP`劫持，以及针对互联网服务提供商（`ISP`）的恶意攻击，这些攻击同样可以针对区块链实施。\n\n> **注意**\
  \  \n> `BGP`劫持是一种恶意重定向互联网流量的攻击手段。通过虚假声明拥有某一组 IP 地址（IP 前缀）的所有权来实现。\n\n大型矿场集中在少数几个地理位置，这使得它们成为针对`ISP`类型攻击的理想目标。攻击者可以实施以下攻击：\n\
  \n*   **分区攻击（`Partition Attack`）**：`ISP`可以通过劫持少量 IP 前缀来分割 P2P 网络。\n*   **延迟攻击（`Delay\
  \ Attack`）**：`ISP`延迟发往或来自区块链节点的流量，导致区块传播延迟，从而减慢交易速度。\n\n这些攻击类型不仅可能降低节点收益，还可能因网络中影响力节点减少而演变为\
  \ 50%攻击。此外，这些攻击还能阻止交易所等大型实体发送交易。\n\n### 事后分析\n\n创建自定义脚本或安装硬件来监控网络。许多`ISP`提供付费的网络安全监控和攻击防御解决方案。有关更多有助于缓解此类攻击的解决方案，请参阅“DoS\
  \ 和 DDoS 攻击”事后分析章节。\n\n### 平台攻击\n\n比特币的区块链网络在设计上是安全的，并且已被证明是可靠的。比特币于 2009 年发布，截至撰写本文时，其区块链网络尚未遭受过成功的攻击。\n\
  \n比特币区块链具有高安全性的原因在于数据分布在各个节点之间。此外，挖矿需要消耗大量能源，因此攻击比特币网络的成本可能高于挖矿本身，攻击者可能冒着损失资金的风险去尝试攻击。然而，这并不是唯一原因；比特币能够经受住时间考验的一个重要因素是它是开源的，这使得开发者能够根据安全专家的研究和建议快速实施变更。\n\
  \n尽管如此，这并不能保证其他平台的安全，这些平台提供建立在安全区块链之上的服务，例如交易所、借贷平台、钱包服务以及存储私钥的`dapp`。\n\n例如，交易所持有数十亿美元的存款，成为黑客的完美目标。如前所述，交易所以私钥的形式存储用户的加密货币，其中一些密钥保存在热钱包中，以实现实时提现和交易。未能妥善处理这些私钥可能导致损失。\n\
  \n`Mt. Gox` 2011 年的安全漏洞就是一个很好的例子。这次攻击的发生是因为黑客破解了一名`Mt. Gox`审计员的密码，并成功将 80 万个比特币转移到自己的账户。除了`Mt.\
  \ Gox`，关于交易所因加密货币丢失而关闭的新闻也层出不穷。\n\n如图 11-5 所示，最大的一笔损失接近 10 亿美元，来自`Mt. Gox`的两次攻击；而加密货币历史上最大的盗窃案则是由\
  \ 2018 年对`Coincheck`交易所网络的攻击造成的。\n\n![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig5_HTML.jpg](img/475651_1_En_11_Fig5_HTML.jpg)\n\
  \n**图 11-5**  \n最大的交易所`BTC`损失情况\n\n在下一节中，我将回顾一些最大的攻击事件，并就如何预防这些攻击提出建议。\n\n### 凭证攻击\n\
  \n与身份验证相关的攻击（例如密码破解）造成了数百万美元的损失。\n\n*   **对交易所的直接攻击**：如前所述，`Mt. Gox`在 2011 年的 51%攻击造成了两次独立的损失：2,609\
  \ BTC 和超过 750,000 BTC。黑客成功获取了审计员的凭证，并将这些比特币转移到了黑客的地址。\n*   **对用户的攻击**：因接管用户账户而造成的损失高达数百万美元。例如，电话公司仅凭简单的账单信息就允许接管手机号码。黑客可以将号码转至新的运营商，然后利用短信验证批准重置交易所账户的密码。\n\
  \n### 事后分析\n\n作为用户，避免这些损失的最佳方式是将您的加密资产存储在冷钱包中，而不是中心化交易所。\n\n在您自己的计算机上：\n\n*   **SSL**：不要在未安装`SSL`证书的网站上注册。\n\
  *   **强密码**：使用长度较长、包含数字、字母和特殊字符的唯一且强密码。\n*   **唯一密码**：不要在不同平台上重复使用相同的密码。\n*   **多层安全**：设置所有推荐的安全层，例如短信验证、启用双重身份验证（`2FA`）、电子邮件确认等。\n\
  *   **杀毒软件**：安装付费或免费的病毒扫描软件。在个人电脑上，`Avast`安全软件拥有免费版本，被 4.35 亿人使用：[`https://www.avast.com`](https://www.avast.com)。它包含一个`Chrome`浏览器插件，可以警告钓鱼网站。\n\
  *   **VPN**：尽可能使用`VPN`连接，尤其是在公共且不安全的网络上。\n\n\n\n## 安全实践指南\n\n### 避免恶意软件和勒索软件\n\n\
  注意安装的软件来源，确保来自信誉良好的供应商。安装过程中请阅读所有信息，不要直接同意所有提示。安装能够预防勒索软件的防护工具。\n\n> **提示**：将加密资产保存在冷钱包中自行控制，不要存放在中心化交易所。为重要账户设置比短信验证更多的安全层，例如双因素认证（2FA）、邮件验证和\
  \ IP 限制。\n\n### 开发者安全实践\n\n作为开发者，密码破解是入侵 Web 应用最常见的方式。应实施安全测试机制，确保系统要求使用强加密密码。此类解决方案的一个优秀示例是`John\
  \ the Ripper`密码破解工具：[`https://github.com/magnumripper/JohnTheRipper`](https://github.com/magnumripper/JohnTheRipper)。\n\
  \n此外，请实施以下措施：\n\n- **保护凭据**：使用多层机制保护用户凭据。\n- **强密码**：在创建账户和重置密码时强制使用强密码。\n- **启用\
  \ 2FA**：设置双因素认证（2FA），例如`Google Authenticator`就是常见方案。\n- **确认机制**：对转账等重要操作，要求同时进行短信确认和邮件验证。\n\
  - **存储**：将用户敏感数据（如私钥）加密后存储在与互联网隔离的服务器上。\n- **加密**：在所有页面使用 SSL。使用 AES-256 加密。密码哈希采用成本因子为\
  \ 12。\n- **锁定账户**：限制登录尝试次数，多次失败后锁定账户。\n\n### 个人开发电脑安全\n\n- **远程连接**：使用强登录密码，特别是通过远程方式连接时。\n\
  - **加密数据**：加密硬盘驱动器。进入系统偏好设置，选择“隐私与安全性”，点击“开启 FileVault”。\n- **闲置锁定**：在“通用”标签页的“高级”中，设置为闲置\
  \ 5 分钟后退出登录，并启用屏幕锁定（选择“需要管理员密码才能访问系统偏好设置”）。\n- **防火墙**：在计算机上设置防火墙；在“防火墙”标签页中开启防火墙。\n\
  - **VPN**：在不安全的网络环境下工作时使用 VPN。\n- **软件**：注意安装的软件来源，确保来自信誉良好的供应商。\n- **库**：尽量避免以\
  \ root 权限安装代码库。\n\n### 缺陷代码\n\n缺陷代码是造成损失的最大原因之一。这一问题已变得极为严重，许多大公司为白帽黑客设置赏金以发现漏洞，这使得黑客指出缺陷（而非窃取）也能获利。\n\
  \n> **说明**：白帽黑客是道德人士，他们通过未经授权访问数据来指出系统缺陷。\n\n例如，2014 年，黑客利用 Poloniex 的提款代码缺陷进行攻击。该公司未公开被盗比特币的确切数量。\n\
  \n### 事后分析\n\n作为开发者：\n\n- **SQL 注入**：通过测试和实施 SQL 注入过滤器来防范。更多信息可参考：[`http://sqlmap.org/`](http://sqlmap.org/)。\n\
  \n> **注意**：SQL 注入攻击是指黑客通过文本输入框传递非法 SQL 语句来获取内容。攻击者可利用此漏洞对 SQL 数据库进行添加、修改或删除数据操作。\n\
  \n- **CSRF 攻击**：黑客利用服务请求修改和检索数据，并验证 POST、PUT 和 DELETE 请求的真实性。为防范此类攻击，建议：\n  - **限制\
  \ IP**：设置服务仅响应特定 IP 地址。\n  - **使用工具和库**：查找防范 CSRF 攻击的工具，可参考：[`https://github.com/0xInfection/XSRFProbe`](https://github.com/0xInfection/XSRFProbe)。\n\
  \n- **跨站脚本攻击（XSS）**：使用以下工具和库防范 XSS 攻击：\n  - [`https://pentest-tools.com/website-vulnerability-scanning/xss-scanner-online`](https://pentest-tools.com/website-vulnerability-scanning/xss-scanner-online)\n\
  \  - [`https://github.com/topics/xss-scanner`](https://github.com/topics/xss-scanner)\n\
  \n> **注意**：XSS 攻击是通过向受信任网站注入恶意代码来执行的。\n\n### 依赖包后门攻击\n\n依赖包后门攻击始于社会工程攻击，包括注入恶意代码。\n\
  \n> **说明**：社会工程攻击中，攻击者扮演骗子角色，隐藏真实身份和动机以获取访问权限或数据。例如，收到看似来自经理的合法邮件，要求提供特定信息。\n\n\
  例如，2018 年底，一名黑客成功将恶意代码插入`event-stream`（一个`npm`JavaScript 库：[`https://www.npmjs.com/package/event-stream`](https://www.npmjs.com/package/event-stream)）。该库被数百万人使用，目标是一家名为\
  \ Bitpay 的公司，该公司拥有一个名为`copay`的 Git 库。`copay`是一个开源钱包，托管在 GitHub 上（[`https://github.com/bitpay/copay`](https://github.com/bitpay/copay)）。与许多开源库一样，开发者并未因`event-stream`的工作获得报酬，后来失去兴趣，将项目交给新的维护者。新维护者注入了针对`copay`的恶意代码，该代码捕获账户余额超过\
  \ 100 比特币或 1000 比特币现金的账户详情和私钥。`copay`在 5.0.2 版本中更新了依赖库，包含攻击者代码，导致数百万损失。该代码捕获受害者账户数据和私钥，通过服务调用将数据发送到攻击者服务器而不被发现。\n\
  \n此攻击的详细内容和分析可参考：\n- [`https://blog.npmjs.org/post/180565383195/details-about-the-event-stream-incident`](https://blog.npmjs.org/post/180565383195/details-about-the-event-stream-incident)\n\
  - [`https://snyk.io/blog/a-post-mortem-of-the-malicious-event-stream-backdoor/`](https://snyk.io/blog/a-post-mortem-of-the-malicious-event-stream-backdoor/)\n\
  \n### 事后分析\n\n作为用户，如本章所建议，将加密资产存放在冷钱包中。作为开发者，处理开源库时需要谨慎。开源模型依赖众多软件包，但只有少数开发者维护这些库，可能导致恶意接管。为帮助防范此类风险，运行`npm\
  \ audit`检测任何易受攻击的依赖项：\n\n```\n> npm audit\n```\n\n在漏洞数据库（如 snyk.io 网站：[`https://snyk.io/vuln`](https://snyk.io/vuln)）中检查并测试代码是否存在已知漏洞。\n\
  \n不要将`package.json`文件设置为包含自动更新库：\n\n```\n\"dependencies\": { \"some-library\": \"\
  latest\" }\n```\n\n而应检查所需更新库的拉取请求，并手动检查所使用依赖项的更改。使用库的特定版本：\n\n```\n\"dependencies\"\
  : { \"some-library\": \"1.0.0\" }\n```\n\n`npm install`也是如此。安装特定库，尤其是对于不太知名的库：\n\
  \n```\n> npm install -g some-library@1.0.0\n```\n\n\n\n## DoS 与 DDoS 攻击\n\n*拒绝服务*（DoS）攻击是一种常见的攻击手段，旨在阻止用户访问服务。*分布式拒绝服务*（DDoS）攻击与\
  \ DoS 类似，但其并非利用单一机器进行攻击，攻击者会使用多台机器同时发起攻击。由于使用了多台机器，攻击成功的概率更高，且更难定位攻击者的确切位置。\n\n\
  交易所和网站是 DoS 与 DDoS 攻击的常见目标。例如，比特币黄金正式上线时，就曾遭遇 DDoS 攻击，导致网站宕机数小时。流行的区块链网络内置了简单的 DoS\
  \ 防御机制，但许多网络仍无法抵御更复杂的攻击。\n\n最常见的攻击类型如下：\n\n-   *缓冲区溢出*：此类攻击向目标服务发送超出其处理能力的流量。攻击者可借此导致目标服务崩溃，甚至控制该服务。\n\
  -   *ICMP 洪水*：也称为\"死亡之 ping\"或\"Smurf 攻击\"，此类攻击通过迫使某个节点向所有节点分发虚假数据包，导致网络过载。\n- \
  \  *SYN 洪水*：攻击者发送连接请求但从不完成验证，随后利用服务器上所有开放端口发起攻击，直至服务器崩溃。\n-   *NTP/DNS 放大攻击*：针对\
  \ NTP 服务器的攻击，攻击者发送大量 UDP 数据包并伪造源 IP 地址，使 NTP 服务器误以为这些数据包来自目标主机的合法流量。过载将导致 NTP 服务器崩溃。\n\
  \n### 事后分析\n\n作为开发者，你需要考虑 DoS/DDoS 攻击并实施相应的防御措施。请参考以下示例：\n\n-   *过滤恶意流量*：\n    -\
  \   *脚本*：一种防御方法是编写脚本检测 DoS/DDoS 攻击。请查看 GitHub 上的 DDoS 防护库：[`https://github.com/topics/ddos-protection`](https://github.com/topics/ddos-protection)。[`http://vddos.voduy.com/`](http://vddos.voduy.com/)\
  \ 是一个流行的选择。\n    -   *防火墙*：使用防火墙阻止恶意流量。见图 11-6。\n\n![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig6_HTML.jpg](img/475651_1_En_11_Fig6_HTML.jpg)\n\
  \n**图 11-6** DDoS 防护反向代理说明。图片来源：vddos.voduy.com。\n\n-   *专用硬件*：采购并部署专用硬件以缓解 DDoS\
  \ 攻击。该硬件部署在数据中心中服务器和路由器前端，能够检测并过滤恶意流量。此类硬件的示例包括来自[`www.fortinet.com`](http://www.fortinet.com)\
  \ 的`FortiDDoS`。\n-   *ISP*：互联网服务提供商（ISP）向客户提供 DDoS 缓解方案。例如，亚马逊提供的 Shield 服务使所有 AWS\
  \ 客户都能受益于自动化防护，并提供更高级别的攻击防护；详情请参阅[`https://aws.amazon.com/shield`](https://aws.amazon.com/shield)。\n\
  -   *云端缓解*：部分云服务提供 DoS/DDoS 缓解方案。这些服务会清洗流量以消除恶意流量。一家流行的服务商是[`cloudflare.com`](http://cloudflare.com)，它提供免费标准版和付费企业版。\n\
  \n关于区块链网络的 DoS/DDoS 攻击，需要研究现有的区块链防御实现，例如比特币 Satoshi 客户端防护（已在`0.7.0`版本中实现）；详情请参阅[`https://en.bitcoin.it/wiki/Weaknesses`](https://en.bitcoin.it/wiki/Weaknesses)。\n\
  \n总而言之，我回顾了针对平台的常见攻击。你了解了凭证攻击、有缺陷的代码、依赖后门攻击以及 DoS/DDoS 攻击。此外，我回顾了帮助你降低风险并防御这些攻击的方法。在下一节中，我将为你提供一个建议的开发周期，你可以采用它来帮助降低风险，并使用方法论的方法来防止攻击。\n\
  \n## 开发周期\n\n正如你在本章所见，你的平台需要确保安全并防范潜在攻击。你不能依赖运气，需要确保利用所有可用措施来降低平台遭受攻击的风险，并确保实施与所在地区相关的所有最新法规。\n\
  \n该过程可分为以下几个阶段：\n\n-   *设计与编码*\n-   *发现、审计与测试*\n-   *就绪评估*\n-   *发布*\n\n如图 11-7\
  \ 所示，每个阶段都可能导致返回设计与编码阶段，因为发现的任何结果都可能构成安全风险或致命问题。\n\n![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig7_HTML.jpg](img/475651_1_En_11_Fig7_HTML.jpg)\n\
  \n**图 11-7** 建议的开发周期，以降低安全与合规风险\n\n> **提示**  \n> 此开发周期是一个基本方法。你可以自由采用适合自身平台和需求的其它方法。\n\
  \n### 设计与编码\n\n在设计与编码阶段之前及期间，你应该整合本章前文讨论的所有安全、隐私和合规要素。这些要素应纳入平台的所有组成部分，包括页面、登录系统、隐私页面、第三方插件集成、服务创建、服务器设置等等。\n\
  \n强烈建议你为自己独特的平台创建一份专属的核对清单，列出需要整合和考虑的所有要素。不可能存在一份放之四海而皆准的清单。每个平台都应有其独特的清单。此外，当你开始一个新的开发周期时，可能需要更新需求。例如，假设你想让平台支持新的地区，这就需要一份新的清单。\n\
  \n### 发现、审计与测试\n\n此步骤可细分为三个步骤。这三个步骤相互交织、彼此依赖，因此应将其视为一个阶段。具体步骤如下：\n\n-   *发现*：查明平台上使用的各种版本，例如库、固件、软件、第三方\
  \ SDK 等的版本。\n-   *审计*：审计你的代码和平台，以发现常见问题、服务的可访问性，以及可能导致平台性能下降或无法访问的性能问题。\n-   *测试*：这是你实际对平台运行测试的阶段。目的是识别平台正在使用的系统和服务的潜在安全漏洞。\n\
  \n\n\n#### 发现阶段\n\n发现阶段的核心在于查明平台中使用的各组件版本。例如，你需要通过发现阶段来确定当前使用的固件版本。了解版本信息至关重要，因为某个组件的版本可能已被标记为存在安全漏洞或已遭弃用。随后，可依据发现阶段的结果进行审计与测试，为识别平台中的潜在漏洞提供依据。\n\
  \n在发现检查过程中，你可能会因版本问题而需要回溯至编码与设计阶段。例如，一旦你更改了某个库或固件的版本，代码可能无法正常运行，此时可能需要重构代码。\n\n\
  #### 审计阶段\n\n在审计阶段，你应当对特定的潜在问题进行系统性审查。\n\n正如会计师审计公司的财务状况，甚至本书也经过团队审计一样，你的平台需要通过审计和测试来确保代码遵循最佳实践，从而提升性能、可访问性，并满足安全与法规合规要求。\n\
  \n审计检查可由你所在的平台团队自行完成，但通常更建议由独立实体执行。需要认识到，不能期望审计能发现所有需要解决的问题。基于区块链的平台还应重视安全审计与合规审计。\n\
  \n## 安全审计\n\n安全审计可以采用完全手动的方式，或者利用自动化工具进行漏洞评估、安全评估和渗透测试，以确定需要解决的事项。目前存在超过 1500 种攻击手段，因此，在开发周期中至少在一定程度上依赖自动化审计工具作为核心环节，并确保平台能够规避常见问题，是一个明智之举。即使聘请第三方审计机构，也最好在启动更严格的审计前，先自行检查一遍常见问题。\n\
  \n## 合规审计\n\n在区块链领域，不仅需要检查安全层面，还必须进行合规审计，以确保隐私保护和法规遵循符合法律要求。\n\n与安全审计类似，合规审计可以由第三方审计机构或内部团队完成。如本章前面所述，不同地区的立法者关注的许多问题都与安全漏洞相关。正如我指出的，合规法规可能频繁变动，且在不同地区存在差异，因此，合规评估通常更适合采用手动方式而非自动化方式。\n\
  \n### 测试阶段\n\n发现与审计阶段都依赖测试来提出修复平台问题的建议。就测试而言，主要分为三种类型。\n\n*   **动态测试**：测试攻击者可能利用的漏洞。攻击者试图利用你的平台时，无法访问你的代码和平台，因此此类测试是在无法获取源代码的情况下进行的。\n\
  *   **静态测试**：这是一种由内而外的方法，用于测试平台源代码中的漏洞。这种测试能够提供平台及其所依赖库的更深入、实时的快照。\n*   **渗透测试**：模拟真实的恶意攻击。渗透测试可以基于已发现的漏洞，进一步获取对平台的访问权限。这有助于理解攻击者能够获取到何种程度的机密信息访问权。\n\
  \n测试可以通过自动化工具进行，但建议也安排人工测试人员执行手动测试，后者可以凭借经验和知识发现自动化工具未能识别的漏洞。\n\n## 自动化工具\n\n有许多测试工具可以辅助你完成上述三种类型的测试。例如，针对库的静态测试，我在前面已经提到了\
  \ `npm audit`，它可以检测依赖项版本中是否存在漏洞。\n\n```\n> npm audit\n```\n\n对于 Web 应用，谷歌 Chrome\
  \ 开发者工具提供了内置的审计工具，如图 11-8 所示。\n\n![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig8_HTML.jpg](img/475651_1_En_11_Fig8_HTML.jpg)\n\
  \n图 11-8 谷歌 Chrome 开发者工具审计报告\n\n浏览器的开发者工具提供了一个简单的 Web 代理网络工具；然而，这些工具可能缺少你所需的一些功能，例如导出数据、运行模拟和过滤数据。你可能会发现，在审计阶段使用第三方\
  \ Web 代理工具会更有用。Web 代理工具主要是一个网络协议分析器，可以提供网络协议的详细信息、数据包信息、解密等。两款流行的工具是 Charlesproxy\
  \ 和 Wireshark。\n\n*   [`https://www.charlesproxy.com/`](https://www.charlesproxy.com/)\n\
  *   [`https://www.wireshark.org/`](https://www.wireshark.org/)\n\n至于自动化渗透测试工具，市面上有很多。以下是一些流行工具的例子：\n\
  \n1.  **安全自动化工具**\n    1.  **OWASP Zed 攻击代理（ZAP）**：这包括流行的免费安全工具。请参阅 [`www.owasp.org/index.php/OWASP_Zed_Attack_Proxy_Project`](http://www.owasp.org/index.php/OWASP_Zed_Attack_Proxy_Project)。\n\
  \    2.  **Burp Suite**：该自动化工具包含免费的社区版和付费版。请参阅 [`www.portswigger.net/burp`](http://www.portswigger.net/burp)。\n\
  2.  **Metasploit**：该工具基于`exploit`，旨在突破平台的安全措施。你可以通过图形界面或命令行运行它。请参阅 [`https://www.rapid7.com/products/metasploit/download/editions/`](https://www.rapid7.com/products/metasploit/download/editions/)。\n\
  3.  **CORE Impact**：Core Impact Pro 测试移动设备渗透、密码识别与破解等。它也提供图形界面和命令行界面，但价格较高。请参阅 [`https://www.coresecurity.com/core-impact/`](https://www.coresecurity.com/core-impact/)。\n\
  4.  **Netsparker**：这包括一个 Web 应用扫描器，可帮助识别诸如访问敏感数据等漏洞，并提供解决方案建议。它涉及 SQL 注入和本地文件包含（LFI）。渗透测试模拟内部或外部的未授权攻击。请参阅\
  \ [`https://www.netsparker.com/`](https://www.netsparker.com/)。\n5.  **谷歌免费安全工具（ratproxy）**：请参阅\
  \ [`https://code.google.com/archive/p/ratproxy/`](https://code.google.com/archive/p/ratproxy/)。\n\
  6.  **Kali Linux 操作系统**：此工具面向黑客，预装了许多黑客工具。该操作系统可作为虚拟机运行在你的 Mac/PC 上。\n7.  SQL 注入工具：\n\
  \    1.  **Sqlmap**：这是一个开源的渗透自动化测试工具，用于检测和利用 SQL 注入漏洞。请参阅 [`https://sqlmap.org`](https://sqlmap.org)。\n\
  \    2.  **SQLNinja**：此工具检查针对微软 SQL Server 的 SQL 注入漏洞。请参阅 [`https://sqlninja.sourceforge.net`](https://sqlninja.sourceforge.net)。\n\
  \    3.  **名为 Hackbar 的 Firefox 插件**：此测试可帮助你测试网站安全，包括 SQL 注入和跨站脚本（XSS）漏洞。请参阅 [`https://www.addons.mozilla.org/en-US/firefox/addon/hackbartool/`](https://www.addons.mozilla.org/en-US/firefox/addon/hackbartool/)。\n\
  \n> **注意**：文件包含漏洞允许攻击者利用应用程序中实现的动态文件包含功能（例如 jQuery 的`$.getScript`）来插入文件。该文件随后通过用户输入上传，且缺乏适当的验证来检查该文件。解决方案是为动态文件包含功能实施验证，以确保其来源和内容。\n\
  \n这里列举的自动化安全测试工具只是冰山一角；不过，你可以在线查看一些精选的自动化安全测试工具列表，以找到完全符合你特定测试需求的工具。\n\n\n\n- [`https://github.com/topics/testing-tools`](https://github.com/topics/testing-tools)\n\
  - [`https://github.com/atinfo/awesome-test-automation`](https://github.com/atinfo/awesome-test-automation)\n\
  - [`https://forum.bugcrowd.com/t/researcher-resources-tools/167`](https://forum.bugcrowd.com/t/researcher-resources-tools/167)\n\
  \n遵循 OWASP 物联网测试指南和 OWASP 物联网测试讲义中的建议：\n\n- 打印并遵循：[`www.owasp.org/images/2/2d/Iot_testing_methodology.JPG`](https://www.owasp.org/images/2/2d/Iot_testing_methodology.JPG)\n\
  - 遵循此检查清单：[`www.owasp.org/index.php/IoT_Testing_Guides`](http://www.owasp.org/index.php/IoT_Testing_Guides)\n\
  \n在发现、审计和测试阶段，你很可能会发现一些小型到大型的漏洞，这些漏洞可能需要你回到编码阶段，重复此过程，直到你的平台通过所有测试。\n\n## 就绪评估\n\
  \n一旦你的平台通过了发现、审计和测试阶段，你就可以深入审视区块链应用的技术层面，以确保安全性和合规性已得到落实。这需要通过手动运行安全性与合规性评估来完成。\n\
  \n## 安全性与合规性评估\n\n此评估建立在你之前阶段进行的漏洞评估之上。在发布之前，建议你添加手动验证步骤，以确认行业和/或内部安全标准已应用于你的平台，并评估风险与暴露程度。此阶段还应包括我在本章第一部分讨论的安全性就绪问题。\n\
  \n此外，验证内容还可能包括以下方面：\n\n- 检查对平台的授权访问并确认系统设置\n- 检查平台及服务器日志\n- 确保符合现行法规\n- 检查并跟踪错误代码和消息\n\
  - 审查最新的隐私与法律要求\n- 审查设计与架构文档，确保代码满足这些要求\n- 执行代码审查\n\n请记住，安全性与合规性评估着眼于全局，你不应只关注单个漏洞的具体暴露程度，而应整体审视平台。评估可能会发现其他不可接受的风险和暴露，这将要求你回到设计和编码阶段，从头开始这一过程。\n\
  \n## 发布\n\n一旦你的平台通过了就绪评估阶段，即可发布平台。建议对实际生产代码再次运行相同的测试和检查，以确保平台仍然通过测试和评估。完成此周期后，你可以为新的开发周期重复此过程。\n\
  \n## 后续方向\n\n- 一份与区块链安全相关的优秀资源链接可在线上获取：[`https://github.com/1522402210/BlockChain-Security-List`](https://github.com/1522402210/BlockChain-Security-List)。\n\
  - 针对你的具体平台和地区，创建一份合规性与安全性检查清单。\n- 如果你拥有平台/网站，请对你现有的平台或网站运行审计和自动化测试工具。\n\n## 总结\n\
  \n在本章中，我将区块链流程的安全性与合规性分解为三个部分：安全性就绪、常见区块链攻击以及推荐的开发周期。第一部分作为引言，帮助你更好地理解构建安全平台所需的术语和思维模式。我涵盖了安全性测试与合规性就绪，并特别以美国和欧盟的合规要求为例。我讨论了在设计和编码阶段应考虑的安全性就绪建议。然后，我介绍了导致数十亿美元损失的常见区块链攻击。这些攻击主要针对加密钱包，但也涉及区块链网络和基于区块链的平台。最后，我为你提供了推荐的开发周期，以确保你考虑到所有必要的安全性与合规性问题。\n\
  \n在下一章，也是最后一章中，你将探索超越加密货币的区块链。我将介绍区块链的力量以及如何利用它，并讨论特定行业的去中心化，分析几个被区块链颠覆的行业及具体案例研究。\n\
  \n"
- "# 12. 超越加密货币的区块链\n\n当你接近本书的最后几页时，我想激发你的灵感，帮助你看到区块链技术在未来几年可能实现的潜力。加密货币通过引入比特币，为法定货币提供了替代方案，铺平了道路。尽管比特币的发明已超过十年（它于\
  \ 2008 年被引入），但区块链仍处于起步阶段。然而，它有望成为 21 世纪最有用的技术创新之一。\n\n话虽如此，技术集成和被大众广泛接受的道路仍然漫长且崎岖，区块链已经经历了多次起伏，这些起伏由金融投机、安全性、性能、信任、可扩展性和法规驱动（更不用说来自骗子和黑客的加密攻击）。这些担忧让许多人成为怀疑论者。尽管如此，区块链不可被忽视。它有潜力改善所有行业，并成为像互联网或传真机一样巨大的全球化技术创新。\n\
  \n区块链的潜力已被许多人认可。事实上，仅在 2019 年，公司预计将在区块链技术上投资超过 30 亿美元。通过审视当前正在开发的项目，整体图景表明加密货币并非最终疆域，而仅仅是个开始，因为许多区块链项目正扩展到加密货币之外，颠覆的也不仅仅是法定货币。\n\
  \n事实上，许多大型企业正以各种方式将区块链技术整合到其系统中。数百家初创公司正逐渐进入主流视野，区块链技术的潜在应用似乎无穷无尽，并且在许多情况下，区块链开辟了新的潜在收入流和商业模式。\n\
  \n> “20 年后，我们都会回顾并得出结论，比特币就像互联网本身一样，是一个具有影响力的创新平台。”\n> ——马克·安德森\n\n本章分为两个部分。首先，我将介绍如何利用区块链，并详细说明利用区块链技术元素时可能实现的潜力。然后，我将通过讨论几个被区块链颠覆的行业并展示具体案例研究，来探讨行业的去中心化。了解区块链技术的力量、能力以及技术创新，可以让你洞察如何将区块链技术创新应用于你自己的全新项目或现有项目与行业。\n\
  \n## 利用区块链\n\n\n在讨论行业去中心化之前，我们先快速回顾一下现在即可实现的区块链具体元素。虽然我之前章节已涵盖本节所有内容，但接下来我将围绕如何在项目中应用这些元素进行展开。我将讨论以下内容：\n\
  \n- 币\n- 代币\n- 账本\n- 智能合约与去中心化应用\n\n这些区块链元素可以单独使用、组合使用，或作为区块链与非区块链项目的混合体，用于实现独特的应用程序。\n\
  \n## 币\n\n区块链技术始于比特币，现已扩展到超过 2000 种上市加密货币，总市值达数十亿美元。许多通过首次代币发行上市的币，除了试图让发行方和投资者获利外，并未提供太多实际价值。然而，创建币并使用区块链作为加密货币进行快速、低成本的全球支付的能力，已经激励了很多人。加密货币用例凸显了区块链的可靠性，因为它能够替代法定货币。\n\
  \n> “货币的未来是数字货币。”\n> ——比尔·盖茨\n\n截至撰写本文时，某些国家的大部分人口都听说过加密货币，但它尚未成为主流。但本节中你会看到，一些正在推进的项目有望推动币进入主流应用。例如，2018\
  \ 年 12 月，媒体报道称 Facebook 正在为其 WhatsApp 用户开发一种“稳定币”，并正在与交易所洽谈上市事宜，该稳定币将“与一篮子不同外币挂钩，而非仅与美元挂钩”。Facebook\
  \ 拥有庞大用户群，其采用将进一步提升人们对加密货币的认知。\n\n> **注意：** *稳定币*是一种旨在最小化价格波动的加密货币，因为它们与更“稳定”的资产（或一篮子稳定资产）挂钩，例如货币或黄金等交易所交易商品。\n\
  \n此外，你已看到一些例子，说明币本身能提供超出其面值的价值。\n\n- *比特币现金（BCH）彩色币*：利用 BCH 协议创建代币化资产，允许你在 BCH 上添加代币。\n\
  - *比特币*：利用比特币的`OP_RETURN`参数，允许你在交易中存储数据。\n\n这些例子突显了币的潜力，因为它们不仅可以传递数字货币价值，还能传递更多价值。\n\
  \n## 代币\n\n加密代币是可用于表示特定资产数字余额的记账单位。例如，比特币是一种加密代币，因为它结合使用了数字签名与所有权；然而，并非所有加密代币都是加密货币。\n\
  \n代币可以通过独特数据创建，被称为*非同质化代币*（NFT），用于代表完全独特的事物。这些 NFT 不可互换，因为具有完全相同数据的代币只有一个。\n\n>\
  \ **注意：** 与本质上可互换的加密货币数字资产币或许多实用代币不同，NFT 是一种代表独特事物的特殊加密代币。这些代币不可互换，因为它们无法被替代。\n\n\
  NFT 和实用代币都使用代币化过程，允许你创建*证券*。证券将数字资产的所有权碎片化，通过创建数字代币实现。每个代币代表资产中的一定比例所有权。使用区块链使得监管链和所有权证明不可篡改，这为某些应用带来了优势，因为信息无法像在常规数据库中那样被更改。\n\
  \n> **注意：** 在此上下文中，监管链是指记录数据传输或分析序列的“纸质追踪记录”。\n\n在实践中，这可以应用于数字资产和实物资产。例如，Kik 消息应用（https://www.kik.com）将其公司转变为数字资产，并开始出售代表公司部分所有权的代币。Kik\
  \ 成功筹集了 1 亿美元，可用于发展其平台。它所做的是一种反向首次代币发行：不是在创建公司之前筹集资金，而是在公司运营之后出售部分所有权，就像公司在股票市场“上市”一样。\n\
  \n> **提示：** 请记住，本章未提及的许多其他行业也有潜力通过利用区块链技术获益。我挑选了几个例子来启发你；但是，你应该自行研究调查，以发现更多行业。\n\
  \n此外，代币可以复兴旧概念。例如，一些付费电话和火车曾使用代币；这些代币除了在付费电话或火车站使用外，没有任何其他价值。美元也曾与政府金库中的黄金数量挂钩，因此在\
  \ 1971 年之前持有美元时，你拥有的实际上是美国政府金库中黄金的代币。类似地，如今稳定币代币代表法定货币，例如使用以太坊创建的`DAI`、`GUSD`、`TUSD`、`USDC`和`USDT`代币。这些代币基于公司将法定货币存入托管账户并向监管机构注册公司。\n\
  \n代币可以代表任何数字或物理价值，例如：\n\n- 股票\n- 期权\n- 数字债务\n- 法定货币\n- 所有权\n- 服务权利\n\n代币还可以组合多种资产。例如，一个代币可以代表一篮子不同股票或一篮子不同法定货币。可能性是无限的，正如你在之前的章节中所见，有许多区块链（如以太坊、EOS、超级账本和\
  \ NEO）可以提供创建代币的简便机制。\n\n## 账本\n\n区块链账本可以用作不仅仅针对加密货币的去中心化数据存储。传统的云存储服务是中心化的，你需要将宝贵的信息或数字资产托付给单一实体。而使用区块链，数据存储本身可以变得去中心化。诸如\
  \ PirateBay、Limelight 等 P2P 网络已被证明能够将来自全球不同计算机的数据片段拼接在一起，以存储视频、音乐、图像和软件等数字资产。尽管许多此类\
  \ P2P 网络侵犯了版权材料，并在许多国家被视为非法，但区块链 P2P 网络可以由合法发布者共享文件，同时限制授权客户的访问。区块链的工作方式与这些 P2P\
  \ 网络类似，可用于存储任何数据。事实上，`Storj`（https://storj.io/）和`Sia`（https://sia.tech）就是基于区块链的云存储示例，旨在提高安全性、降低成本并减少依赖性。用户可以在不使用时租出其存储容量，从而创建一个前所未有的全新市场。将区块链用作去中心化数据存储，并结合币和代币等其他区块链元素，可以创造出有趣的新可能性。\n\
  \n\n\n## 智能合约与去中心化应用\n\n正如你所见，智能合约是云端的编程语言；它们让你能够针对区块链进行编码。智能合约被创建为具有法律约束力、可编程的数字文档。与传统协议一样，智能合约设定了一系列双方或多方共同认可的规则。\n\
  \n当合同义务得到履行时，资金可以自动释放，从而无需第三方介入安排。将智能合约用于法律事务，可能成为比纸质合同更好的选择，因为它稳定、诚实，且不易出现人为错误。使用智能合约，中间人（中间人可能是律师、托管代理人、公证人、银行家、贷款官员等）就不再需要了。\n\
  \n在本书中，你在多个区块链平台上创建了智能合约。利用这些智能合约，你能够创建去中心化应用的前端界面来使用智能合约，并发布该应用。\n\n事实上，公司正在使用智能合约来自动化许多服务。例如，Slock.it\
  \ 为租赁可用设备创建了支付功能；这些设备可以是任何物品，如自行车、汽车，甚至工具箱。同样，Fizzy（`https://fizzy.axa/`）会追踪航班延误情况，并在航班延误时自动为乘客退款。这些服务都是自动完成的；你无需排队等候，也无需被电话客服从一个部门转接到另一个部门。此外，这些退款可以自动发生。这些合约为用户和企业节省了时间、精力和金钱。同时，客户服务得到了改善，而且由于这些服务是自动化的，还可以减少所需的员工数量。\n\
  \n总而言之，在本节中，我介绍了从商业角度来看，哪些已有的功能可以利用区块链技术来实现。我涵盖了除了加密货币之外，你还能用代币做什么，包括使用代币代表任何价值、使用区块链账本作为去中心化数据库，以及利用智能合约和去中心化应用在云端编写代码。通过结合这些要素，你将获得更快捷、更可靠且去除了中间人的服务。\n\
  \n## 行业与垂直领域的去中心化\n\n在本节中，我将向你展示来自几个行业的示例，以及区块链如何在不同行业中以垂直和水平的方式被利用或可能被利用。我所涵盖的这些行业，在将区块链应用于现有行业或全新的“绿地”项目时，可以为你提供灵感。\n\
  \n> **注意**\n> 在此语境下，*垂直*特指特定领域，而*水平*则指可以被所有人或任何领域采用。\n\n我将涵盖以下行业：\n\n-   金融\n- \
  \  网络安全\n-   房地产\n-   移动\n-   供应链改善\n-   加密消息平台\n-   选举与投票\n-   市场营销\n-   医疗保健\n\
  -   游戏\n\n在当今世界，许多行业相互依赖，技术与实体业务之间也存在大量交叉。例如，房地产依赖金融行业。由于需要能够验证文件和身份，金融行业依赖安全性。市场营销依赖于数据收集和预测。这些跨界和服务的融合有潜力创造无缝的用户体验，从而加速区块链的安全性、可靠性和全球化进程；提高交易执行速度；并为所有相关方降低费用。\n\
  \n### 金融\n\n就金融行业而言，你可以将参与者分为两组：小型金融集团和大型金融机构。小型金融集团可以是初创公司、零售商、小型银行以及个人所有公司。大型机构则包括投资集团、大型银行以及世界\
  \ 500 强企业。\n\n小型金融集团多年来一直在尝试加密货币和区块链技术。而对于大型金融机构来说，与加密货币的关系一直是爱恨交加；许多金融 CEO 和专家一直在批评加密货币，摩根大通首当其冲，称任何被发现交易比特币的员工为“愚蠢”，金融专家沃伦·巴菲特则称比特币为“妄想”并“吸引骗子”。然而，当谈到区块链技术本身时，情况则不同。摩根大通今年宣布创建了自己的区块链，名为`Quorum`，以及自己的数字货币`JPM\
  \ Coin`。\n\n许多其他大型金融公司也开始慢慢接受区块链技术。加密货币交易所已经通过了纳斯达克的审查流程。纳斯达克、花旗和 Visa 已经向基于区块链的初创公司`Chain.com`投资了\
  \ 3000 万美元。纳斯达克还认可了 Overstock.com 对比特币支付选项的全面支持，以及尚未发布的平台`Roobee`（`https://roobee.io`），这是一个为散户投资者开发的投资平台。\n\
  \n总的来说，小型和大型金融集团都可以从区块链中获益的领域有很多。我将涵盖三个领域：货币、基础设施和数字资产。\n\n- **货币：** 这用加密货币取代了法定货币，作为一种电子现金系统。任何人都可以持有代币并进行快速、低成本的支付，从而摆脱中间人（如银行和信用卡）。目前围绕加密货币取代法定货币的担忧主要包括价格的波动性（因为许多代币的起伏）、信任问题，以及如何创建和接受转账、管理钱包的知识。这些担忧可能会让许多人感到不安，尤其是那些不精通技术的人。大型金融机构可以通过创建自己的加密货币和/或接受现有加密货币的转账，将加密货币资金的转移正式化并推向主流，从而从中受益。当然，由于中间人再次介入，可能会涉及一些费用；然而，加密货币有潜力像\
  \ Visa、法定货币、自动清算所（ACH）、交易所交易基金（ETF）等其他支付方式一样，被主流用作一种支付方式。然后，用户可以通过与受信任的方打交道，在全球范围内发送资金。以下是一些案例研究：\n\
  \    - `Coinpayments`（`https://www.coinpayments.net`）、`BitPay`（`https://bitpay.com/`）和`Abra`（`https://www.abra.com/`）只是接受加密货币支付的商家的几个例子。\n\
  \    - 银行支持的代币是另一个例子。摩根大通宣布，该银行将开始一项试验，将其借给企业的万亿美元转换为`JPM Coin`。这代表了第一家主要银行发行的首个代币。\n\
  \n- **基础设施：** 公司可以用区块链取代现有的基础设施，如中心化数据库，以实现更高的安全性和降低成本。加密货币转账的一个担忧是，用户需要明白自己在做什么，否则就有损失资金的风险。以下是一些案例研究：\n\
  \n\n\n## 区块链应用场景\n\n### 金融服务\n\n- **资金转账**：西联汇款正在测试瑞波币（XRP），以验证能否通过区块链优化现有结算系统，加速资金转移。但就目前而言，西联汇款声称尚未证实使用\
  \ XRP 能加快转账速度。据西联汇款 CEO 希克梅特·埃塞克表示：\"我们在墨西哥（我们最大的汇款通道之一）进行了测试……以我们目前的效率来看，我们尚未发现瑞波币能带来效率提升。\"\
  \n\n- **记账**：摩根大通的 Quorum 区块链（`https://www.jpmorgan.com/global/Quorum`）正在被金融机构用于追踪财务数据。\n\
  \n- **数字资产**：正如我所提到的，区块链可以通过代币创建数字资产。这些资产可以是任何金融工具。以下是一些案例研究：\n\n  - **Chain**（`https://chain.com/`）：提供名为\"\
  序列\"的服务。它利用区块链基础设施，让组织能够使用 GitHub 上的开源代码从零构建金融服务；参见 `https://github.com/chain`。\n\
  \n  - **Openchain**（`https://www.openchain.org`）：这是一家专注于发行和管理数字资产的初创公司。\n\n  - **Symbiont.io**（`https://symbiont.io/solutions`）：致力于推动区块链在金融服务领域的大规模应用。此外，纳斯达克已投资了\
  \ Symbiont.io。\n\n### 网络安全\n\n正如上一章讨论安全时所述，针对身份盗窃的网络钓鱼、恶意软件及其他黑客攻击已司空见惯。许多身份盗窃案件源于黑客破解用户密码。区块链不再依赖密码验证用户身份，而是通过密码学保护数字身份，有望彻底革新这一领域。其原理是为每个用户分配私钥——如同区块链分配公钥/私钥对的方式——然后用这些密钥验证用户身份并查找属于该用户的交易。\n\
  \n此外，数据验证对许多人来说是一个痛苦且费时的过程。想想你需要办理护照、公证文件或更新驾照时的情形。这些流程耗费大量精力与时间。区块链可以在加快处理速度的同时，确保并验证文件的所有权与真实性，而且你只需在家中就能完成所有操作，无需排队或填写繁琐的表格。\n\
  \n这些技术可应用于以下场景：\n\n- 护照\n- 数字身份\n- 驾照与身份证\n- 电子公民身份\n- 出生证明\n- 结婚/离婚证明\n- 文件公证\n\
  - 在线账户登录\n\n部分应用案例如下：\n\n- **身份验证**：提供区块链 ID 的公司可用于登录应用和网站、数字签名文件等，从而降低身份盗窃风险。以下是一些案例研究：\n\
  \n  - **Guardtime**（`https://guardtime.com`）：这家区块链公司通过使用无密钥签名基础设施（KSI）交易，增强了数据认证协议。其代码根据接收到的指令（而非密码）授予或拒绝网络访问权限。Guardtime\
  \ 的知名客户之一是威瑞森。\n\n  - **Keybase**（`https://keybase.io`）：Keybase 维护着一个加密密钥目录，用于映射社交媒体身份。用户随后可以使用加密聊天和云存储服务。\n\
  \n  - **Onename**（`https://onename.com`）：该公司在其 Blockstack 网络上为用户提供`.id`命名空间。\n\n\
  \  - **ShoCard**（`https://shocard.com`）：这项身份服务旨在为银行和金融机构提供用户认证方式。\n\n- **数据验证**：你可以利用区块链为区块链上的任何数据、文件、业务流程或几乎任何内容创建可验证的记录。以下是一些案例研究：\n\
  \n  - **Factom**（`https://www.factom.com`）：提供 REST API 用于读取、写入和搜索其 Factom 区块链条目及平台，包括\
  \ SDK、文档以及用于验证和调试条目的区块链浏览器。\n\n  - **存在证明**（`https://proofofexistence.com`）：该公司通过交易的加时间戳属性来验证文件的存在性。\n\
  \n  - **Tierion**（`https://tierion.com`）：类似于存在证明。Tierion 提供证明和链锚点服务。链锚点通过将数据锚定到比特币区块链来保护数据，而证明则利用区块链的时间戳属性作为公证。戴尔和\
  \ Xero 等公司均使用该服务。它还拥有一个开发者门户：`https://chainpoint.org`。\n\n### 房地产\n\n房地产行业有望从区块链技术的垂直与水平应用中获益。如果你曾参与过房地产交易，你会知道这些交易通常复杂且不透明，涉及大量文书工作以及难以追踪的环节，例如与中介打交道、房产检查、产权过户、融资、公证，以及许多情况下的律师参与。流程中存在诸多痛点。区块链有助于降低成本、增强安全性、提升隐私保护并加速处理流程。\n\
  \n结合之前讨论的一些要素，这些解决方案可以提供身份识别、文件验证和金融服务等多方面价值：\n\n- 确认身份\n- 安全识别买卖双方\n- 确保所有权\n-\
  \ 按需保密信息\n- 验证文件\n- 房产尽职调查\n- 进行金融交易\n- 资金转账\n- 在各方（如中介和卖家）之间分配资金\n- 支付账单\n\n解决这些环节的区块链服务可以加快流程，同时减少文书工作并降低成本。\n\
  \n以下是一些案例研究：\n\n- **Harbor**（`https://goharbor.io`）：提供基于以太坊 ERC-20 标准的代币，允许将货币作为证券进行转售。它是一个用于基金、私募股权和商业地产等数字证券的平台。\n\
  \n- **Ubitquity**（`https://www.ubitquity.io`）：提供基于区块链平台的房地产 SaaS 服务，主要面向抵押贷款、产权和金融公司。它与全球的实体合作收集房产信息和文件。Ubitquity\
  \ 提供了与其区块链平台集成的 API（`https://www.ubitquity.io/`）。\n\n- **Propy**（`https://propy.com/browse/`）：该公司通过\
  \ ICO 筹集了超过 1500 万美元，并声称可在购买房产时帮助人们节省高达 25%的费用，同时避免电汇和欺诈风险。Propy 支持以任何货币（包括加密货币）处理支付。\n\
  \n\n\n### 排版后的文本\n\n*Silentnotary*（[*https://silentnotary.com*](https://silentnotary.com)）、*Dnote*（[*www.dnote.online*](http://www.dnote.online)）以及\
  \ *Blocknotary*（[*https://www.blocknotary.com*](https://www.blocknotary.com)）：这些只是提供去中心化公证服务的公司中的几个例子。其概念类似于“存在性证明”。该公司负责验证身份，并利用区块链的时间戳属性来验证文件。区块链会记录某个特定时间点的哈希值，从而能够用于确认某个事物在该时间点的存在性。该时间戳可在法庭上使用，其效力与传统公证相同。这些服务可以消除对实体公证人的需求。事实上，许多州如亚利桑那州、佛罗里达州、肯塔基州、路易斯安那州、内布拉斯加州和内华达州，已经接受电子公证契约。\n\
  \n*ShelterZoom*（[*https://www.shelterzoom.com*](https://www.shelterzoom.com)）：这家公司面向买家、卖家和租客。交易通过以太坊的智能合约完成。\n\
  \n*StreetWire*（[*http://www.streetwire.net/*](http://www.streetwire.net/)）：这家公司将实体房地产资产代币化，并提供数据管理服务。\n\
  \n### 移动端\n\n基于区块链的服务能够惠及用户，并解决与移动设备相关的痛点。以下是一些例子：\n\n*   **隐私**：全球各地的用户对隐私的缺失感到厌倦，因为社交媒体、电信和互联网公司利用用户数据并分享数据获利，以此占用户的便宜。\n\
  *   **去中心化应用（Dapps）**：支持去中心化应用可以让用户访问大量新服务，而无需受移动应用商店的审查。\n*   **收入**：手机可以通过挖矿、撰写评论赚取代币等方式产生收入，从而减少用户的月度账单。\n\
  \n事实上，移动行业已经认识到其潜力，并正在利用区块链为用户提供更多控制权、价值和隐私，许多知名公司今年已登上了头条新闻。\n\n> “电信和互联网公司通过控制数据获得了巨大价值。通过将应用去中心化，我们可以将这些数据置于智能合约中，有效地将控制权交还给创作者和用户。”以及“许多我们称之为点对点或‘去中心化’的服务，仍然建立在中心化网络之上。我们正在改变这一点。”\n\
  >\n> ——Pundi X 创始人兼首席执行官 Zac Cheah\n\n以下是一些案例研究：\n\n*   *Electroneum*（[*https://electroneum.com/m1/*](https://electroneum.com/m1/)）：这是来自名为\
  \ Electroneum 的公司的一款新手机。它具有以下特点：\n    *   **ETN 云挖矿**：用户通过运行云挖矿应用，每月最多可挖取价值 3 美元的\
  \ ETN。\n    *   **低廉价格**：其售价低至 80 美元。\n    *   **硬件/软件**：这是一款安卓设备，运行 8.1 Go 版本系统，搭载四核\
  \ 1.3GHz CPU，支持 4G 宽带蜂窝网络技术和双 SIM 卡。\n*   *HTC*（[*https://www.htc.com/*](https://www.htc.com/)）：该手机支持多种去中心化应用。\n\
  *   *Pundi X*（[*https://pundix.com*](https://pundix.com)）：这家公司重新设计了其 XPhone，预计于\
  \ 2019 年底发布销售。它将包含以下特性：\n    *   **区块链模式**：服务可以独立于中心化运营商运行。用户无需中心化服务提供商，即可通过区块链节点路由电话、消息和数据。\n\
  \    *   **X 按钮**：允许用户切换到区块链模式。\n*   *三星 Galaxy S10*（[*https://www.samsung.com/us/mobile/galaxy-s10/*](https://www.samsung.com/us/mobile/galaxy-s10/)）：该手机包含以下特性：\n\
  \    *   **内置加密钱包**：具有私钥存储功能，支持比特币、以太坊、Cosmo Coin 和游戏加密货币 Enjin Coin。\n    *   **去中心化应用**：它开箱即支持去中心化应用。\n\
  \    *   **Cosmo 币 (COSM)**：支持 Cosmo 代币，该代币为韩国区块链提供动力。\n    *   **赚取代币**：用户可以通过在应用中撰写评论来赚取\
  \ Cosmo 代币。\n    *   **支付**：支持使用加密货币进行非接触式支付。\n\n### 供应链\n\n通过将区块链作为私有的去中心化账本，企业可以在全球范围内更好地存储和使用自己的数据，从而大大受益。如您所见，区块链能够以一种不可篡改且诚实的方式来存储、监控和优化数据，这可以应用于供应链。供应链可以分解为以下要素：\n\
  \n*   **监管链**：您可以追溯资产的拥有权链条。\n*   **产品身份**：您可以将序列号或其他产品识别信息存储在区块链上，允许所有相关方（制造商、分销商、零售商和消费者）验证物品的真伪。跟踪供应链可以在许多方面提供帮助，例如消除假冒产品。\n\
  *   **监控**：您可以实时追踪从原材料到成品的供应链。\n\n以下是一些案例研究：\n\n*   *Blockverify*（[*www.blockverify.io*](http://www.blockverify.io)）：这家公司利用区块链采取防伪措施，通过识别假冒产品、防止产品复制，并使公司能够验证其产品并监控其供应链。\n\
  *   *英国航空*（[*https://www.britishairways.com*](https://www.britishairways.com)）：这家公司使用区块链来确保航班信息的准确性。它还在测试\
  \ VChain（[*https://www.vchain.tech*](https://www.vchain.tech)），这是一个用于替代安全检查的验证系统。\n\
  *   *Inxeption*（[*https://www.inxeption.com*](https://www.inxeption.com)）：UPS 已与\
  \ Inxeption 平台合作，以改善商户的供应链。\n*   *马士基*（[*https://maersk.com/*](https://maersk.com/)）：这家全球最大的航运公司已与\
  \ IBM 合作，创建了一个 Hyperledger 区块链来监控船舶货物。\n*   *Tracr*（[*https://www.tracr.com*](https://www.tracr.com)）：全球最大的钻石生产商戴比尔斯利用区块链技术，为其注册钻石创建不可篡改且永久的数字记录，以减少冲突钻石（“血钻”）。\n\
  *   *沃尔玛*：这家公司正在使用区块链，允许其员工在商店的应用中扫描商品，并监控产品从制造到上架的全过程。\n\n### 加密消息传递\n\n在第 1 章中，我介绍了密码学，以及恩尼格玛密码机如何被用于军事通信中加密和解密消息。区块链源于消息传递，并且可用于发送可靠的加密消息。通过利用去中心化账本匿名发送消息、不发送用户隐私数据，甚至可以隐藏用户的\
  \ IP 地址，区块链可用于更新传统的端到端消息加密解决方案。\n\n以下是一些案例研究：\n\n*   *ADAMANT*（[*https://adamant.im*](https://adamant.im)）：这是一个开源的私人信使，并带有加密货币支付选项。参见\
  \ [*https://github.com/adamant-im*](https://github.com/adamant-im)。\n*   *Crypviser*（[*https://crypviser.network*](https://crypviser.network)）：这是一个私人消息平台。\n\
  *   *Matrix*（[*https://matrix.org/blog/home/*](https://matrix.org/blog/home/)）：这是一个拥有开源代码的聊天生态系统；参见\
  \ [*https://github.com/matrix-org/matrix.org*](https://github.com/matrix-org/matrix.org)。\n\
  \n\n\n## 选举与投票\n\n投票操纵和选举诚信是真实存在的问题；攻击者已知会运用诸如女巫攻击（Sybil attack）等技术来操纵选举。毫不意外，由于整个流程常常含糊不清，经常出现重新计票、舞弊指控和不信任的情况。投票需要对选民身份进行认证，并确保记录保存、选票追踪和计票的安全可靠。\n\
  \n区块链有潜力彻底改变选民投票的方式，并能够以一种诚实、公开的方式加快完成这一流程的速度。区块链工具可在整个过程中作为基础设施共同使用。这或许能消除重新计票的必要性，并建立公众对选举的信任。\n\
  \n`Voatz` 和 `Votem` 都指出了利用区块链进行投票的一些潜在优势。\n\n-   **可验证性**：选民可以验证选票是否按预期投出，并检测出虚假结果。\n\
  -   **透明度**：政府和独立的外部机构可以确认投票结果，因为当结果存储在公共区块链上时，它们是透明的。\n-   **安全性**：与传统的单一服务器系统上只有一个中心化计算机不同，区块链上的投票数据分布在众多节点上，这使得篡改结果（如入侵单一系统）变得更加困难。\n\
  \n以下是一些案例研究：\n\n-   **FollowMyVote** ([`followmyvote.com`](https://followmyvote.com))：这是一个处于测试阶段的选举平台。\n\
  -   **Voatz** ([`voatz.com/`](https://voatz.com/))：这家公司旨在让投票更安全、更便捷。它已与丹佛市和西弗吉尼亚州合作，提供移动投票试点项目。\n\
  -   **Votem** ([`votem.com`](https://votem.com))：这个投票平台专注于移动端，旨在保障全球选举中的投票安全。\n\n\
  ## 市场营销\n\n传统分析师以不透明的方式整合来自不同来源的数据，然后以多种方式使用这些数据，例如将数据货币化、进行预测、制定商业决策等等。然而，如果数据是虚假的，代价会很高。据估计，虚假数据收集每年造成的损失超过十亿美元。\n\
  \n正如你所见，区块链账本能够以精确且不可篡改的方式，将其他数据与交易一起记录。这些数据随后可用于支持规划、分析和预测，以及追踪供应链。使用区块链去中心化账本可以更准确地捕获数据，因为它减少了人为错误和数据篡改。一旦营销数据被捕获，就可以被娱乐、体育、音乐、金融等多个行业以及机器学习算法进行分析。\n\
  \n将区块链用作不可篡改的数据库，您可以追踪保管链（chain of custody），这已经在本章涵盖的许多区块链行业中得以应用。在本节中，我将重点介绍那些专注于数据方面公司。这些数据随后可用于预测、潜在客户挖掘和决策制定。\n\
  \n在线广告商依赖每次点击付费率、社交媒体上的关注者数量和分析数据，而验证统计数据准确性并确保公司为广告正确付费可能是一项艰巨的任务。曾发生过许多追踪和衡量错误，导致企业支付过高费用。造成这些计算错误的原因是，发送的流量可能来自机器人（人为虚增统计数据），或来自安全攻击（如女巫攻击）中的虚假关注者。这些计算错误已导致广告业损失数十亿美元。\n\
  \n区块链可以记录一条加密且透明的流量链（类似于保管链），以透明的方式帮助确定点击的广告和关注的用户是否来自真实受众。此外，区块链可以通过提供基于智能合约的协议和即时加密货币支付，帮助品牌与影响者建立联系，并更轻松地触达消费者。\n\
  \n以下是一些案例研究：\n\n-   **AdChain** ([`metax.io/en/products/adchain_registry/`](https://metax.io/en/products/adchain_registry/))：这是一个由社区策划的广告支持网站列表，为广告商提供适合其广告投放的最佳网站的认可印章。\n\
  -   **Augur** ([`www.augur.net`](https://www.augur.net))：这是一个基于以太坊的预测市场协议，允许用户预测事件。该平台为准确预测设置了奖励系统，使用户可以对股票、体育赛事、总统选举预测等各种事项下注。\n\
  -   **BOOSTO** ([`boosto.io/`](https://boosto.io/))：这是一个去中心化应用商店，品牌可以确保合作伙伴能够触达品牌所要求的消费者。智能合约用于达成协议，一旦相关方商定的条款得到满足，便使用其自有加密货币进行支付。\n\
  -   **SWIPECrypto** ([`www.swipecrypto.com/`](https://www.swipecrypto.com/))：这个数据货币化平台包含一个隐私和数据共享协议，以及奖励数据输入的治理层。\n\
  -   **Wibson** ([`wibson.org`](https://wibson.org))：该平台允许用户在保护隐私的同时，出售其个人信息以获取收益。\n\
  \n\n\n### 医疗保健\n\n医疗保健行业存在许多具体的痛点，区块链可以帮助解决这些问题。例如，与高端品牌一样，药品伪造也是制药行业的一大问题，因为在发展中国家销售的药品中，有\
  \ 10%到 30%是假药。这些假药给医疗保健公司造成了数十亿美元的损失。大部分假药是在印度或中国生产的。此外，许多假药含有错误的成分或剂量，将患者的健康置于危险之中。\n\
  \n由制药公司控制的私有区块链可以登记药品，并确保假药因其未被登记在账本上而被发现。\n\n根据 Bisresearch 的数据，到 2025 年，区块链市场预计将增长并达到\
  \ 50 亿美元以上：[`https://bisresearch.com/industry-report/global-blockchain-in-healthcare-market-2025.html`](https://bisresearch.com/industry-report/global-blockchain-in-healthcare-market-2025.html)。\n\
  \n> *“全球医疗保健区块链市场预计在 2018 年至 2025 年间以 63.85%的年复合增长率增长，到 2025 年将达到 56.1 亿美元的价值。在整个预测期内，使用区块链进行医疗保健数据交换将贡献最大的市场份额，到\
  \ 2025 年将达到 18.9 亿美元，原因是区块链被用于解决医疗保健信息系统中最普遍的问题，即与互操作性和非标准化相关的问题，这些问题在该行业造成了数据孤岛。”*\n\
  >\n> ——Bisresearch\n\n此外，医疗保健行业可以利用区块链来存储所有关于药品的重要信息，并更好地分析和处理信息。\n\n- **识别患者**：像\
  \ CHIME 和 HIMSS 这样的组织近二十年来一直在推动创建患者身份卡。创建一个唯一的患者标识符可以很容易地通过区块链解决，并确保不存在不匹配的患者电子健康记录（EHR），因为这会引发患者护理错误。\n\
  \n- **追踪药品**：正如我所提到的，假药可能含有错误的成分并对患者造成伤害。假药的互联网销售额占整个市场的 750 亿美元。区块链可用于登记所有真药的序列号。\n\
  \n- **追踪药品效果**：区块链可以创建一个公开的患者账本，用于报告特定药物的效果。该系统可以验证用户是否确实购买了该药物以及患者的病情。利用这些数据可以为制药公司或任何相关实体提供宝贵信息。\n\
  \n以下是一些案例研究：\n\n- **Ambrosus** ([`ambrosus.com/#mission`](https://ambrosus.com/%2523mission))：这个区块链系统旨在追踪临床试验和药品的监管链。食品和制药企业可以使用该平台优化供应链可见性和质量保证。\n\
  \n- **ConnectingCare** ([`www.simplyvitalhealth.com/`](https://www.simplyvitalhealth.com/))：在这里，患者和医疗服务提供者可以共享健康数据。它允许各种独特的应用，从计算成本到患者控制自己隐私的能力，甚至允许用户出售他们的数据用于研究。\n\
  \n- **FarmaTrust** ([`www.farmatrust.com`](https://www.farmatrust.com))：该系统旨在通过使用区块链作为账本来阻止假药。\n\
  \n- **Hashed Health** ([`hashedhealth.com`](https://hashedhealth.com))：旨在通过使数据更加透明和易于访问来解决资质问题。该平台有一个专业资质交换系统，成员可以验证各种医疗专业人员的资质并跟踪其记录。这可以加快招聘流程，并提供专业人员医疗保健职业生涯不可篡改的历史记录。\n\
  \n- **MedicalChain** ([`medicalchain.com/en/`](https://medicalchain.com/en/))：该系统通过使用区块链实现患者与医生的互动。该项目通过\
  \ MedTokens 获得资金。患者可以完全访问和控制自己的个人健康数据，并可以通过移动设备授予医生访问其健康记录的权限，同时数据在区块链上安全存储；或者患者佩戴腕带，当患者失去意识时，医疗专业人员可以扫描腕带以获取其病史。\n\
  \n- **MedRec** ([`medrec.media.mit.edu/`](https://medrec.media.mit.edu/))：该系统通过以太坊智能合约在区块链上提供电子健康记录（EHR）。\n\
  \n- **MTBC** ([`www.mtbc.com`](https://www.mtbc.com))：这是一个大型参与者，旨在通过使用区块链来改进电子健康记录（EHR）。患者将能够允许将记录从一个医生转移到另一个医生。区块链\
  \ API 在 Hyperledger 平台上运行。\n\n- **Phros** ([`phros.io/#home`](https://phros.io/%2523home))：该系统由台北医学大学附设医院和数字国库公司（DTCO）发布，旨在共享健康数据的同时确保数据隐私。目标是将患者的所有医疗信息都放置在区块链上。\n\
  \n- **美国国防部、美国国防后勤局**：这些机构正在试验一个基于区块链的系统，该系统允许通过区块链账本添加和跟踪数据，为多个机构的救援工作提供实时信息流，以帮助拯救生命和降低成本。参见[`https://www.dla.mil/AboutDLA/News/NewsArticleView/Article/1720207/troop-support-event-poses-question-how-and-where-can-blockchain-help/`](https://www.dla.mil/AboutDLA/News/NewsArticleView/Article/1720207/troop-support-event-poses-question-how-and-where-can-blockchain-help/)。\n\
  \n### 游戏\n\n游戏行业可以通过利用区块链账本存储信息，以及实现使用加密市场进行 NFT 交易以购买游戏相关物品的混合游戏，从而从区块链中受益。这种区块链的应用已经在进行中。索尼正利用区块链记录\
  \ PlayStation 网络上谁拥有什么。《堡垒之夜》的开发商 Epic Games 已与一家区块链公司合作，微软正在使用区块链处理向开发者支付的 Xbox\
  \ Live 版税，并且许多其他公司也在试验区块链的应用。此外，还有一个区块链游戏联盟（BGA），成员包括育碧、ConsenSys、Everdreamsoft\
  \ 和 Enjin 等公司。BGA 的目标是将区块链和游戏结合起来开发解决方案，并制定标准和最佳实践。\n\n以下是案例研究：\n\n- **Beyond the\
  \ Void** ([`beyond-the-void.net/`](https://beyond-the-void.net/))：这是一款利用以太坊区块链，允许玩家通过\
  \ NFT 交易购买、出售和交易“装饰性游戏内物品”的游戏。\n\n\n\n## 区块链在游戏和音乐行业的应用\n\n### 游戏\n\n- **加密卡牌游戏**：这些游戏类似于传统卡牌游戏，但卡牌并非实体，而是非同质化代币。卡牌使用\
  \ `ERC-721` 以太坊代币创建。交易卡可以交换或以街机对战风格游玩。这些卡牌可能价格不菲。例如，2018 年，`CryptoKitties` 以 111,000\
  \ 美元售出一只猫，`Gods Unchained` 以 60,000 美元售出一张卡牌。示例包括 `CryptoKitties`（[`www.cryptokitties.co`](https://www.cryptokitties.co)）、`Gods\
  \ Unchained`（[`godsunchained.com`](https://godsunchained.com)）和 `Spells of Genesis`（[`spellsofgenesis.com`](https://spellsofgenesis.com)）。\n\
  \n- **育碧的 HashCraft**：这是一个未发布的原型，将区块链作为核心玩法，利用区块链账本作为数据库，使玩家能够成为游戏的建造者。\n\n- **瘟疫猎人**（[`store.steampowered.com/app/746530/Plague_hunter/`](https://store.steampowered.com/app/746530/Plague_hunter/)）：这是一款免费游玩的策略游戏，内置基于\
  \ `Ethereum` 的市场，使用 `NFT` 交易来买卖武器和“猎人”。`Plague Hunters` 通过了索尼的审核流程，并计划在 PlayStation\
  \ 4 上发布。它是首款在主流主机上提供 `NFT` 代币交易的区块链游戏。\n\n除了这些案例研究，还有一个专门的网站用于追踪与游戏相关的区块链技术进步：[`blockchaingamer.net/`](https://blockchaingamer.net/)。该资源可提供有关当前趋势和新闻的宝贵信息。\n\
  \n### 音乐\n\n在当前的市场中，许多音乐行业的艺术家、制作人、粉丝和消费者都感到沮丧，而区块链对他们来说似乎是新鲜空气，因为它有潜力解决许多痛点。\n\n\
  例如，许多艺术家和制作人花费大量时间和资源来打入市场、发布作品并进入顶级音乐流媒体平台。一旦艺术家进入像 Pandora、Spotify 这样的大型流媒体平台，他们可以接触到\
  \ 2.5 亿客户；然而，许多艺术家对支付结构以及获得报酬所需的时间感到不满。例如，Spotify 上的一首歌需要超过 152,000 次来自付费用户的播放，才能为艺术家带来区区\
  \ 100 美元的收入。大部分收入都流向了长长一串的中介中间商。艺术家不仅收入微薄，有时甚至需要数年才能拿到这些报酬。\n\n通过利用区块链，艺术家可以在以下方面受益：\n\
  \n- **提高艺术家收入**：区块链可以提供透明且公平的报酬。内容提供商的收入份额可以以公平透明的方式分配。\n- **简化收入流程**：区块链可以提供一种更快捷的方式，使用加密货币立即向艺术家支付版税。\n\
  - **自动分配收入**：智能合约可用于为参与内容创作的每个人（如词曲作者）设定支付结构。\n- **更好地与客户联系**：粉丝可以直接投资并与艺术家建立联系。\n\
  - **存储数据**：区块链可用于在公共账本上存储信息，用于数字版权管理（DRM）、艺术家、资产、活动、场地等。\n- **提供流媒体服务**：区块链的点对点网络可用于流式传输音乐。当前的音乐流媒体服务要么费用高昂，要么包含过多广告。\n\
  \n音乐平台的集成需要考虑音乐格式和行业标准，例如：\n\n- **通用作品注册（CWR）**（[www.cmrra.ca/](http://www.cmrra.ca/)）：这是注册和修订音乐作品的标准格式。\n\
  - **DDEX**（[`ddex.net`](http://ddex.net)）：通过接收来自领先媒体公司、音乐许可组织、数字服务提供商和技术中介的数据，建立一个数字供应链联盟并创建标准。\n\
  \n与游戏领域的 BGA 联盟类似，音乐行业也成立了一个组织来跟进区块链发展。开放音乐倡议（[open-music.org](http://open-music.org)）探索使用区块链来帮助识别合法的音乐权利持有者和创作者，以便现代化和简化版税支付流程，使艺术家能够获得公平的版税。这可以通过利用区块链提高透明度和更好地分析数据来实现。著名会员包括\
  \ Soundcloud、Red Bull Media、Netflix、Sony、YouTube 和 Spotify。\n\n类似于黑客松竞赛，`Smackathon`（[`www.smackathon.co`](https://www.smackathon.co)）每年举办一次，旨在寻找音乐行业基于区块链的有趣创意。例如，在\
  \ 2018 年，有人发明了一个区块链平台，用于根据听众收听歌曲的每秒时长向他们付费，并提供粉丝互动工具。\n\n观察一些更知名的项目，你会发现存在相似想法的重复。这强化了音乐行业确实存在需要解决的痛点。以下是一些案例研究：\n\
  \n- **Audius**（[`audius.co/`](https://audius.co/)）：它使用区块链点对点网络作为流媒体服务。`Audius` 还利用区块链通过智能合约进行支付，立即向艺术家发送报酬。\n\
  - **BitSong**（[`bitsong.io/en`](https://bitsong.io/en)）：该公司声称是第一个使用区块链点对点网络进行音乐流媒体播放的。艺术家可以上传歌曲并附加广告。每播放一个广告，艺术家和听众可以获得广告商投入利润的\
  \ 90%。该平台包含一个名为 `$BTSG` 的代币，用于向独立艺术家捐款和购买音乐。\n- **Blokur**（[`www.blokur.com`](https://www.blokur.com)）：`Blokur`\
  \ 平台结合了人工智能和区块链。区块链用作数据库，允许出版商编录其音乐，然后社区可以批准或拒绝。`AI` 算法自动解决数据冲突，例如权利纠纷，以确保原创艺术家获得报酬。已有\
  \ 50,000 名词曲作者和 7,000 名出版商在其上发布了作品。\n- **Choon**（[`choon.co`](https://choon.co)）：它利用区块链进行音乐流媒体播放和数字支付，以加快艺术家的报酬支付。艺术家可以为每首歌曲使用以太坊的智能合约来分配贡献者的收入。其他功能包括为新艺术家众筹，以及奖励创建播放列表的用户。\n\
  - **eMusic**（[`www.emusic.com`](https://www.emusic.com)）：它使用区块链和以太坊智能合约进行音乐分发和版税支付，使用一种名为\
  \ `eMusic` 的加密代币。\n- **Inmusik**（[`inmusik.co`](https://inmusik.co)）：它有一种名为 `$OUND`\
  \ 的加密代币。声音被归类为“证券化音乐”，粉丝可以“投资”艺术家以分享收益。粉丝还可以通过发现新歌、投票选出最佳艺术家和支持社区来赚取代币。艺术家可以创建“军队”，获得投资者，并在每百万次流媒体播放中赚取超过\
  \ 20,000 美元。\n- **MediaChain**（[www.mediachain.io](http://www.mediachain.io)）：被\
  \ Spotify 收购，`MediaChain` 利用区块链账本在不同的应用程序和组织之间共享信息，为每条信息分配唯一标识符。`MediaChain` 还与艺术家合作，通过智能合约确保他们获得公平报酬。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n## 区块链项目与资源\n\n###\
  \ 区块链音乐平台\n\n-   **Mycelia** ([myceliaformusic.org](http://myceliaformusic.org)):\
  \ 使用区块链账本保存“创意护照”，其中包含歌曲信息，包括 ID、致谢、商业合作伙伴和支付机制。艺术家可以创建智能合约支付系统，在贡献者之间分配收益。\n\n\
  -   **MusicLife** ([`www.musiclife.io`](https://www.musiclife.io)): MusicLife 创建了一款名为\
  \ Echo 的媒体应用（[`www.app-echo.com/index/download`](http://www.app-echo.com/index/download)），拥有数百万用户。该平台使用区块链快速处理交易并进行记账。它创建了自己的生态系统，并发行了名为`$MITC`的代币。该算法允许艺术家声明音乐版权并获得报酬。用户既可以赚取代币，也可以进行购买。\n\
  \n-   **Musicoin** ([`musicoin.org`](https://musicoin.org)): 这是一个音乐区块链流媒体平台。Musicoin\
  \ 创建了一种名为`$MUSIC`的币，用于交易音乐相关购买。版税收入和打赏会立即到达艺术家手中。\n\n-   **Ujo Music** ([`www.ujomusic.com`](https://www.ujomusic.com)):\
  \ 该区块链被用作数据库，保存艺术家的音乐所有权。使用智能合约和加密货币自动向艺术家支付版税，并使粉丝可以直接打赏艺术家。艺术家可以免费上传歌曲、控制许可和管理发行。粉丝每播放\
  \ 100 次流媒体需支付`$1`的小额费用。\n\n-   **Viberate** ([`www.viberate.com/fan`](https://www.viberate.com/fan)):\
  \ 使用区块链账本。Viberate 声称是世界上最大的现场音乐数据库，在撰写本文时，它拥有来自 230 个国家的 46 万名艺术家、50 万场活动和 10 万个场地。Viberate\
  \ 不雇用数据录入人员来插入和更新艺术家、活动和场地信息，而是使用`$VIB`加密代币支付给贡献者。\n\n-   **VOISE** ([`www.voise.com`](https://www.voise.com)):\
  \ 这是一个由区块链驱动的应用，使用名为`$VOISE`的以太坊代币。艺术家可以上传内容。用户的版税几乎全部支付给艺术家，从而去除了中间商。\n\n## 下一步该去哪里\n\
  \n区块链已经在许多行业中使用，并且有潜力在横向和纵向层面改变和改善许多行业。我在本章中只介绍了少数几个；其他行业包括博彩、保险、娱乐等。我鼓励你对自己感兴趣的行业进行研究，并查看关于当前区块链项目的最新新闻、趋势和更新。\n\
  \n## 总结\n\n这本书是一次理解区块链技术的旅程。本章提供了一个宏观的概览，描述了区块链的可能性，我希望它能激发你利用区块链技术的灵感。\n\n正如我所指出的，有许多用例使用区块链取代中心化服务并不会带来太多价值；然而，在许多特定用途中，区块链平台已经使行业受益。区块链有助于消除冗长的中间商名单，缩小用户与实体之间的差距，自动化支付，提高数据完整性，加快服务速度，使交易全球化，提高安全性，降低成本，并增加可靠性。\n\
  \n在本章的第一部分，我介绍了如何通过审视目前你可以直接使用的工具来利用区块链。我将币、代币、账本、智能合约和去中心化应用确定为可以快速接入区块链以改进现有平台的主要元素。在本章的第二部分，我介绍了许多可以从区块链技术中受益或已经受益的具体行业，并列出了正在开发或已经发布的特定区块链相关想法的案例研究。\n\
  \n区块链技术前景广阔，其用例和功能仍在不断发展。在未来几年，预计区块链的使用将增加，并导致在更多行业和领域进行更广泛的实验。具备区块链知识的开发者被认为是一种宝贵的资源。\n\
  \n我要感谢你，亲爱的读者，购买这本书，并祝贺你完成了本章和本书。我希望这本书为你提供了有价值的信息、良好的代码示例和参考点，这将激励你创建区块链技术。祝你在可能承担的任何新项目中好运。\n\
  \n"
