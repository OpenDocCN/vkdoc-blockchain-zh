  trans: '

    ### 第四步：使用 LevelDB 存储区块链的练习


    **LevelDB**


    在本练习中，你将实现一个用于存储区块的数据库。你可以从这里下载完整的练习代码：[`https://github.com/Apress/the-blockchain-developer/tree/master/chapter3/step4/blockchain`](https://github.com/Apress/the-blockchain-developer/tree/master/chapter3/step4/blockchain)。请记得运行
    `install` 命令以获取所有 `npm` 模块。


    ```

    > npm install

    ```


    若要从上一步开始独立完成，你需要使用一个 Node.js 的 LevelDB 封装库，以便通过代码与 LevelDB 进行通信。通过 `npm` 安装此库。


    ```

    > npm install level --save

    ```


    接着，创建一个用于保存数据库的目录。


    ```

    > mkdir db

    ```


    现在你可以实现数据库了。在 `chain.js` 库中，你将添加一些代码，将区块保存到 LevelDB 数据库中，如清单 3-7 所示。


    ```

    let level = require(''level''),

    fs = require(''fs'');

    let db;

    let createDb = (peerId) => {

    let dir = __dirname + ''/db/'' + peerId;

    if (!fs.existsSync(dir)){

    fs.mkdirSync(dir);

    db = level(dir);

    storeBlock(getGenesisBlock());

    }

    }

    ```


    如你所见，你使用了 Node.js 的原生类 `__dirname` 来获取目录路径，因为你需要完整的路径来保存数据库。


    由于你将在同一台机器上运行 P2P 网络的多个实例，因此无法为每个节点使用相同的路径，因为数据库需要相互隔离。你可以将每个数据库的位置设置在单独的路径中，并使用文件夹名称作为节点的
    ID；这样每个数据库就可以存储在 `db` 文件夹中。同时请注意，你保存了第一个区块 `getGenesisBlock()`。


    接下来，创建一个 `storeBlock` 方法来存储新区块。


    ```

    let storeBlock = (newBlock) => {

    db.put(newBlock.index, JSON.stringify(newBlock), function (err) {

    if (err) return console.log(''哦哦！'', err) // 某种 I/O 错误

    console.log(''--- 正在插入区块索引：'' + newBlock.index);

    })

    }

    ```


    当你使用 `generateNextBlock` 方法生成一个新块时，现在可以将其存储到 LevelDB 数据库中。


    ```

    storeBlock(newBlock);

    ```


    你还将添加一个方法，以便从 LevelDB 数据库中检索区块。


    ```

    let getDbBlock = (index, res) => {

    db.get(index, function (err, value) {

    if (err) return res.send(JSON.stringify(err));

    return(res.send(value));

    });

    }

    ```


    请确保将 `createDb` 和 `getDbBlock` 方法暴露出来。


    ```

    if (typeof exports != ''undefined'' ) {

    exports.createDb = createDb;

    exports.getDbBlock = getDbBlock;

    }

    ```


    最后，在你的 P2P 网络代码中，你只需要在启动代码时创建一个数据库即可。


    ```

    chain.createDb(myPeerId.toString(''hex''));

    ```


    要查看代码的实际运行效果，请运行一个 P2P 网络实例。


    ```

    > node p2p.js

    ```


    你可以使用带有 `-f` 标志的 `tail` 命令，监控 `db` 文件夹中的数据库数据。终端将保持打开状态，并能在新区块生成时显示它们（参见图 3-7
    中的输出）。


    ![../images/475651_1_En_3_Chapter/475651_1_En_3_Fig7_HTML.jpg](img/475651_1_En_3_Fig7_HTML.jpg)


    图 3-7：使用 `tail` 命令查看 LevelDB 数据库，显示正在生成的新区块


    ```

    > cd step4/db/[我们的节点 ID]

    > tail –f 000003.log

    ```


    在本练习中，你创建了一个 LevelDB 数据库。你正在存储区块，这样你就可以检索它们，而不必依赖缓存。我在这里将事情简化了；如果这是一个真正的区块链应用，你需要实现以下步骤：


    1.  减轻所有可能的安全风险。

    2.  从 LevelDB 数据库中存储和检索区块。

    3.  创建一个方法用于恢复 LevelDB 中的条目。

    4.  清理旧数据库，因为每次初始化时都会创建新的数据库。


    ## 创建区块链钱包


    在加密货币中，钱包是必需的，以便奖励生成区块的矿工，以及创建和发送交易。在本节中，你将创建一个钱包。你需要创建一对公钥和私钥，这不仅仅是为了验证用户身份，更是为了能够存储和检索用户拥有的数据。你将创建一个带有公钥和私钥的钱包。


    在比特币中，钱包的原始软件是你在第二章下载的比特币核心协议；它需要自 2009 年以来所有交易的完整账本，在撰写本文时已超过 150 GB。因此，大多数使用的钱包都是“轻量级”钱包，或称为**简化支付验证**（SPV）钱包，它们与比特币核心同步。在区块链领域，有许多不同类型的钱包可用，从在线钱包到纸质钱包（将私钥写在纸上）。


    在继续之前，让我们先快速了解一下如何与比特币钱包进行通信。回想一下，在第二章中，你能够获取某个比特币钱包的余额。为了更好地理解钱包，你可以使用比特币核心创建一个比特币钱包。


    首先，你需要运行比特币守护进程。


    ```

    > bitcoind –printtoconsole

    ```


    接着，你可以请求一个地址。


    ```

    > bitcoin-cli help getnewaddress

    ```


    然后，你可以将私钥导出到一个文本文件中。


    ```

    > bitcoin-cli dumpwallet ~/mywallet.txt

    ```


    你可以找到私钥的位置并查看该密钥。


    ```

    > vim /Users/[位置]/mywallet.txt

    ```


    作为参考，请在此处查看 C++ 比特币核心钱包代码：


    ```

    > vim /[比特币核心位置]/bitcoin/src/wallet/init.cpp

    ```

    '
- fmt: '### Step 5: Wallet Exercise


    **Create a Blockchain Wallet**


    In this exercise, you will generate public-private keys to be used for your wallet.
    You can download the complete exercise from [`https://github.com/Apress/the-blockchain-developer/tree/master/chapter3/step5/blockchain`](https://github.com/Apress/the-blockchain-developer/tree/master/chapter3/step5/blockchain)
    and run the `npm install` command. Additionally, create a folder named `wallet`.


    ```

    > npm install

    > mkdir wallet

    ```


    You will be using the `elliptic-curve` cryptography library implementation to
    generate private-public key combos. Note that the `elliptic-curve` library uses
    `secp256k1` as the ECDSA curve algorithm.


    **Note** *Elliptical curve cryptography* (ECC) is the public key encryption technique
    used by bitcoin. It’s based on elliptic curve theory to generate the cryptographic
    keys. `Secp256k1` is the graph elliptic curve ECDSA algorithm.


    To install the library, run the following command:


    ```

    > npm install elliptic --save

    ```


    Next, add a file and name it `wallet.js`. Take a look at the complete code in
    Listing [3-8](#475651_1_En_3_Chapter.xhtml#PC54).


    *Listing 3-8. wallet.js*


    ```

    let EC = require(''elliptic'').ec,

    fs = require(''fs'');

    const ec = new EC(''secp256k1''),

    privateKeyLocation = __dirname + ''/wallet/private_key'';

    exports.initWallet = () => {

    let privateKey;

    if (fs.existsSync(privateKeyLocation)) {

    const buffer = fs.readFileSync(privateKeyLocation, ''utf8'');

    privateKey = buffer.toString();

    } else {

    privateKey = generatePrivateKey();

    fs.writeFileSync(privateKeyLocation, privateKey);

    }

    const key = ec.keyFromPrivate(privateKey, ''hex'');

    const publicKey = key.getPublic().encode(''hex'');

    return({''privateKeyLocation'': privateKeyLocation, ''publicKey'': publicKey});

    };

    const generatePrivateKey = () => {

    const keyPair = ec.genKeyPair();

    const privateKey = keyPair.getPrivate();

    return privateKey.toString(16);

    };

    ```


    In the wallet file, you create and initialize the EC context.


    ```

    const ec = new EC(''secp256k1''),

    ```


    You then store the location of your wallet’s private key, `privateKeyLocation`.


    ```

    privateKeyLocation = __dirname + ''/wallet/private_key'';

    ```


    Next, you are able to create a method `exports.initWallet` to generate the actual
    public-private key, `generatePrivateKey`.


    ```

    const keyPair = ec.genKeyPair();

    const privateKey = keyPair.getPrivate();

    ```


    Notice that you will be generating a new wallet only if one doesn’t exist.


    ```

    if (fs.existsSync(privateKeyLocation))

    ```


    In this exercise, you create a `wallet.js` file utilizing the Elliptic Curve Cryptography
    library to generate your private-public key combo.


    To see the code working, add the following code temporarily at the end of the
    `wallet.js` file . The script will create the public and private keys.


    ```

    let wallet = this;

    let retVal = wallet.initWallet();

    console.log(JSON.stringify(retVal));

    ```


    Next, create a `wallet` directory to store the private key and run the script.
    The code will initialize the script and create your public key.


    ```

    > mkdir wallet

    > node wallet.js

    > cat wallet/private_key

    ```


    When you run the `node wallet.js` command, you can see the public key. See Figure
    [3-8](#475651_1_En_3_Chapter.xhtml#Fig8) for the output.


    ![../images/475651_1_En_3_Chapter/475651_1_En_3_Fig8_HTML.jpg](images/475651_1_En_3_Chapter/475651_1_En_3_Fig8_HTML.jpg)


    Figure 3-8


    Generating a wallet’s private-public key


    Remember to comment out these lines because in the next exercise, you will create
    an API to be able to create your keys via the browser.


    ## Creating an API


    The next step is creating an application program interface (API) to be able to
    access the code you write. This is an important part of a blockchain, as you want
    to access your blocks and wallet or any other P2P network operation using an HTTP
    service. In this section, you will be using the `express` library, as it’s easy
    to run, and you will be able to create your API easily.


    ### Step 6: API P2P Blockchain Exercise


    **Creating API**


    In this exercise, you will create an API to interact with your P2P blockchain
    network. You can download the complete exercise from here: [`https://github.com/Apress/the-blockchain-developer/tree/master/chapter3/step6/blockchain`](https://github.com/Apress/the-blockchain-developer/tree/master/chapter3/step6/blockchain).


    You will be creating the following services:


    *   `blocks`: Retrieves all the blocks in the blockchain

    *   `getBlock`: Retrieves a specific block by index

    *   `getDBBlock`: Retrieves a block from the database

    *   `getWallet`: Creates a new wallet by generating a public-private key


    You will install `express` and `body-parser`. These libraries will allow you to
    create a server and display pages in the browser.


    ```

    > npm install express body-parser --save

    ```


    You also need to import the `wallet.js` file you created.


    ```

    let express = require("express"),

    bodyParser = require(''body-parser''),

    wallet = require(''./wallet'');

    ```


    Next, you create a method called `initHttpServer` that will initiate the server
    and create the services. As you utilize different instances of the P2P network
    and run instances on the same computer, you want to utilize different port numbers.
    It’s common to use port 80 or 8081 for HTTP services but not required. What you
    will do is pass the random port number you are using and utilize the `slice` method
    to get the last two digits of the port number.


    ```

    let initHttpServer = (port) => {

    let http_port = ''80'' + port.toString().slice(-2);

    let app = express();

    app.use(bodyParser.json());

    ```


    The `Blocks` service will be retrieving all of your blocks.


    ```

    app.get(''/blocks'', (req, res) => res.send(JSON.stringify( chain.blockchain )));

    ```


    The `getBlock` service will be retrieving one block based on an index.


    ```

    app.get(''/getBlock'', (req, res) => {

    let blockIndex = req.query.index;

    res.send(chain.blockchain[blockIndex]);

    });

    ```


    The `getDBBlock` service will be retrieving a LevelDB database entry based on
    an index.


    ```

    app.get(''/getDBBlock'', (req, res) => {

    let blockIndex = req.query.index;

    chain.getDbBlock(blockIndex, res);

    });

    ```


    The `getWallet` service will be utilizing the `wallet.js` file you created in
    the previous step and generate your public-private key pair.


    ```

    app.get(''/getWallet'', (req, res) => {

    res.send(wallet.initWallet());

    });

    ```


    Lastly, you will utilize the `Express listen` method.


    ```

