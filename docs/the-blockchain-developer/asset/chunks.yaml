    \ `web3` library and\nconnect via MetaMask.\n\n10. Build Dapps with Angular: Part\n\
    II\n\nIn the previous chapter, you started developing your dapp.\nSpecifically,\
    \ you learned about dapp classifications and projects and\nthat you can break\
    \ your own dapp project into five steps. You then\nlooked at why to use Angular\
    \ and its benefits. Next, you created an\nAngular project, first ensuring the\
