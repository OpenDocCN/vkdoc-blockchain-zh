    #### Creating a Business Network with Yeoman


    You used Hyperledger Playground to generate your business network. Hyperledger
    Playground is aimed not just for developers but also at business owners because
    of its simplicity; however, you can also create a network in Terminal.


    Yeoman provides a wizard you can use. If you are unfamiliar with Yeoman, it provides
    a wizard generator through the command line. You can either run `Yeoman` and select
    Hyperledger Composer and the Business Network generator or run the following:


    ```

    > Yeoman hyperledger-composer:businessnetwork

    ```


    Keep in mind that Hyperledger Composer can be used for more than just generating
    the business network; it can be used for Angular, LoopBack, and Model as well.
    See Figure [8-23](#475651_1_En_8_Chapter.xhtml#Fig23).


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig23_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig23_HTML.jpg)


    Figure 8-23

    Generating `hello-network` with the Yeoman wizard


    The `hello-network` folder is generated and includes `permissions.acl`, `models`,
    `features`, `test`, and `lib`. Next, to create the `.bna` file, you can use Hyperledger
    Composer. See Figure [8-24](#475651_1_En_8_Chapter.xhtml#Fig24).


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig24_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig24_HTML.jpg)


    Figure 8-24

    Generating the `hello-network` BNA file with Hyperledger Composer


    ```

    > cd hello-network

    > composer archive create -t dir -n .

    ```


    Run the `ls` command and confirm that the `hello-network@0.0.1.bna` file is generated.


    ```

    > ls *.bna

    hello-network@0.0.1.bna

    ```


    ## Deploying on a Local Hyperledger Fabric Network


    To deploy the `.bna` file to a local Hyperledger Fabric network, run the `composer
    network install` command and point to the `.bna` file while specifying the identity
    card.


    ```

    > cd ~/fabric-dev-servers/

    > composer network install --archiveFile ~/Desktop/hello-network.bna --card PeerAdmin@hlfv1

    ```


    This will result in the successful output shown in Figure [8-25](#475651_1_En_8_Chapter.xhtml#Fig25).


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig25_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig25_HTML.jpg)


    Figure 8-25

    Installing local Hyperledger Fabric command output


    ## Running the "hello-network" Network


    Hyperledger Composer is the application development framework for building blockchain
    applications based on Hyperledger Fabric.


    Hyperledger Composer generates REST APIs based on the business network definition
    you created. This is done using what is called a LoopBack connector. You can take
    these REST APIs to be used by a) a client such as a dapp b) integrate with non-blockchain
    clients such as a web site. That allows you to use the blockchain ledger just
    as you would use any other database with a middleware. That is powerful.


    Hyperledger Composer can generate a REST interface. You can run Hyperledger Fabric
    on your computer and generate a GUI that you can then use to interact with the
    network running on your computer just like it would be on a real production server.'
