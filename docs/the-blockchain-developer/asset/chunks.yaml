- fmt: "### Proof of Stake\n\n`PoS` was created by Sunny King and Scott Nadal in 2012\
    \ as an alternative to solve the `PoW` cons mentioned earlier.\n\n`PoS` relies\
    \ on how many coins a peer holds. The peer needs to stake the number of coins\
    \ it wants to mine.\n\nInstead of hashing power, we have stake power, and there\
    \ is no dependency on energy consumption because there is no puzzle to solve.\
    \ `PoS` provides a similar hashing block scheme to Bitcoin's `PoW`, but it limits\
    \ the number of peers. This provides the needed security yet lowers the cost and\
    \ power consumption. A network fee is provided to peers instead of giving a reward\
    \ for solving a mathematical puzzle as in `PoW`.\n\n`PoS` determines what peer\
    \ does the work by the size of the stake the peer holds. This achieves a distributed\
    \ consensus at less energy and less cost. `DDOS` attacks and frauds are still\
    \ possible. However, attackers cannot transact more digital currency than they\
    \ are staking. Otherwise, they would lose their deposits, so the chances are lower\
    \ for an attack. Keep in mind that attackers can stake other people's coins and\
    \ won’t care to lose these coins as they are not theirs, so there are still ways\
    \ for a `DDOS` attack.\n\nAny peer can participate in the mining process by staking\
    \ coins in order to validate a new transaction. To become a miner, there are two\
    \ options; you can stake your coins to be used by a trustworthy node (but you\
    \ can lose your coin via a fraud of the `PoS` network by the node), or you can\
    \ submit a full node to be selected as a miner. Decentralization is limited as\
    \ only a few miners can hold most of the coins and have majority control. For\
    \ the work, each miner gets selected randomly; it’s not based on solving a puzzle.\
    \ Take a look at Table [1-1](#475651_1_En_1_Chapter.xhtml#Tab1), which compares\
    \ `PoW` and `PoS`.\n\n**Table 1-1**  \n*PoW vs. PoS*\n\n| Category | PoW | PoS\
    \ |\n| :--- | :--- | :--- |\n| Generating new blocks | First miner to solve problem\
    \ selected based on hashing power | Random selection based on stake power (how\
    \ many coins a peer holds) |\n| Reward | Block reward | Network fees |\n| Energy\
    \ and resource consumption | ASIC miner and large footprint | Little resource\
    \ and low energy consumption |\n\nYou can set a staking wallet that holds the\
    \ coins you need for the `PoS`. Your coins can earn a return annually in some\
    \ blockchain networks.\n\nHere is a list of some popular cryptocurrency coins\
    \ that use `PoS`:\n\n*   **Dash**: You need 1,000 units to be a master node. It\
    \ gives an annual return of approximately 7.5 percent per year.\n*   **NEO**:\
    \ Staking wallets return approximately 5.5 percent per year. There’s no need to\
    \ mine; you get gas coins just by holding coins.\n*   **Others**: `LSK`, `PIVX`,\
    \ `NAV`, `RDD`, `BEAN`, `Linda`, `DCR`, `NEBL`, `OK`, `STRAT`.\n\nAlthough some\
    \ coins provide annual returns, keep in mind that in case the coin market cap\
    \ stays stable, a single coin will be worth less over time, as new coins are generated.\
    \ By staking a wallet, the hold (`HODL`) wallet’s value is less affected as you\
    \ get more coins to maintain your wallet value. Similar to how a bank gives you\
    \ an `X%` interest rate and the inflation is `X%`, your balance shows more funds,\
    \ but realistically you own the same amount of money.\n\n### Note\n\n`HODL` is\
    \ a slang term coined in association with cryptocurrency to describe holding cryptocurrency\
    \ disregarding price fluctuation.\n\nLet’s examine `NEO` as an example. You won’t\
    \ need to mine `NEO` to get a reward. You will get gas coin just for holding coins\
    \ as a reward for help with staking transactions. You can calculate how much gas\
    \ coin you will receive by using this URL: [`https://neotogas.com/`](https://neotogas.com/)\
    \ . At the time of writing, if you purchase five `NEO` coins and hold them for\
    \ a year, you will get 0.4799 gas coins (currently at a price of $7.73) by placing\
    \ them in staking wallets. See Figure [1-4](#475651_1_En_1_Chapter.xhtml#Fig4).\n\
    \n![../images/475651_1_En_1_Chapter/475651_1_En_1_Fig4_HTML.jpg](images/475651_1_En_1_Chapter/475651_1_En_1_Fig4_HTML.jpg)\n\
    \n**Figure 1-4**  \n*Neotogas.com gas staking calculation*\n\nI encourage you\
    \ to read the white paper about `PoS` here: [`https://peercoin.net/assets/paper/peercoin-paper.pdf`](https://peercoin.net/assets/paper/peercoin-paper.pdf)\
    \ .\n\n### Delegated Proof of Stake\n\nDelegated proof of stake is a census algorithm\
    \ method invented by Dan Larimer discussed in the white paper at [`https://github.com/EOSIO/Documentation/blob/master/TechnicalWhitePaper.md`](https://github.com/EOSIO/Documentation/blob/master/TechnicalWhitePaper.md)\
    \ . `DPoS` is aimed at improving `PoS` cons by providing a democracy instead of\
    \ the random process of selecting a miner.\n\n### Note\n\nIn `DPoS`, the miners\
    \ are called *block producers*.\n\n`DPoS` achieves a technological democracy by\
    \ splitting the process of mining into two parts.\n\n*   **Election**: When electing\
    \ a group of block producers, there are only 21 block producers instead of unlimited\
    \ as with `PoW`.\n*   **Scheduling production**: Each one of the 21 block producers\
    \ takes turns to produce a block every 3 seconds.\n\nThe election process provides\
    \ a technological democracy and ensures stakeholders are in control because large\
    \ stakeholders have the most to lose if a network fails.\n\nEach block producer\
    \ takes a turn at producing a block, and the longest possible chain gets adopted\
    \ (just like in `PoW`). Take a look at a normal operation, as shown in Figure\
    \ [1-5](#475651_1_En_1_Chapter.xhtml#Fig5). You’ll see that each peer 1 through\
    \ 3 gets its turn to produce the longest chain block. Anytime an honest peer node\
    \ sees a valid strictly longer chain, it will switch from its current fork to\
    \ the longer one.\n\n![../images/475651_1_En_1_Chapter/475651_1_En_1_Fig5_HTML.jpg](images/475651_1_En_1_Chapter/475651_1_En_1_Fig5_HTML.jpg)\n\
    \n**Figure 1-5**  \n*DPoS normal operation*\n\n`DPoS` is able to continue and\
    \ function even when most of the producers fail. Figure [1-6](#475651_1_En_1_Chapter.xhtml#Fig6)\
    \ shows a minority fork, where peer 2 only gets to post the longest chain once\
    \ during a cycle. During a fail process, the community can vote and replace a\
    \ failed peer producer, in this case peer 1, or peer producers until the network\
    \ resumes to normal operation.\n\n![../images/475651_1_En_1_Chapter/475651_1_En_1_Fig6_HTML.jpg](images/475651_1_En_1_Chapter/475651_1_En_1_Fig6_HTML.jpg)\n\
    \n**Figure 1-6**  \n*DPoS minority fork*\n\nThis white paper describes in detail\
    \ this process and how blocks are being produced and the rules to handle fail\
    \ chains: `https://steemit.com/dpos/@dantheman/dpos-consensus-algorithm-this-missing-white-paper`.\n\
    \nSetting a community of block producers and staked users who agree to these sets\
    \ of rules gives the efficiency of `PoS` with the decentralized way that `PoW`\
    \ operates. `DPoS` uses the power of stakeholders to approve voting of the consensus\
    \ algorithm rules such as incentive fees, block intervals, forks, and transaction\
    \ sizes.\n\nThese rules can be fine-tuned by the elected delegates. This type\
    \ of consensus can decrease the transaction time significantly (1 second versus\
    \ 10 minutes for `PoW`). Further, the consensus protocol is designed to protect\
    \ all the participants against unwanted interference of a group of nodes as possible\
    \ in `POW`. Examples of popular `DPOS` blockchains are `Bitshares`, `Steem`, and\
    \ `EOS`."
  raw: '#### Proof of Stake


    PoS was created by Sunny King and Scott Nadal in 2012 as an alternative to solve
    the PoW cons mentioned earlier.


    PoS relies on how many coins a peer holds. The peer needs to stake the number
    of coins it wants to mine.


    Instead of hashing power, we have stake power, and there is no dependency on energy
    consumption because there is no puzzle to solve. PoS provides a similar hashing
    block scheme to bitcoin’s PoW, but it limits the number of peers. This provides
    the needed security yet lowers the cost and power consumption. A network fee is
    provided to peers instead of giving a reward for solving a mathematical puzzle
    as in PoW.


    PoS determines what peer does the work by the size of the stake the peer holds.
    This achieves a distributed consensus at less energy and less cost. DDOS attacks
    and frauds are still possible. However, attackers cannot transact more digital
    currency than they are staking. Otherwise, they would lose their deposits, so
    the chances are lower for an attack. Keep in mind that attackers can stake other
    people coins and won’t care to lose these coins as they are not theirs, so there
    are still ways for a DDOS attack.


    Any peer can participate in the mining process by staking coins in order to validate
    a new transaction. To become a miner, there are two options; you can stake your
    coins to be used by a trustworthy node (but you can lose your coin via a fraud
    of the PoS network by the node), or you can submit a full node to be selected
    as a miner. Decentralization is limited as only a few miners can hold most of
    the coins and have majority control. For the work, each miner gets selected randomly;
    it’s not based on solving a puzzle. Take a look at Table [1-1](#475651_1_En_1_Chapter.xhtml#Tab1),
    which compares PoW and PoS.


    Table 1-1


    PoW vs. PoS


    | Category | PoW | PoS |

    | --- | --- | --- |

    | Generating new blocks | First miner to solve problem selected based on hashing
    power | Random selection based on stake power (how many coins a peer holds) |

    | Reward | Block reward | Network fees |

    | Energy and resource consumption | ASIC miner and large footprint | Little resource
    and low energy consumption |


    You can set a staking wallet that holds the coins you need for the PoS. Your coins
    can earn a return annually in some blockchain networks.


    Here is a list of some popular cryptocurrency coins that use PoS:


    *   ***Dash***: You need 1,000 units to be a master node. It gives an annual return
    of approximately 7.5 percent per year.


    *   ***NEO***: Staking wallets return approximately 5.5 percent per year. There’s
    no need to mine; you get gas coins just by holding coins.


    *   ***Others***: LSK, PIVX, NAV, RDD, BEAN, Linda, DCR, NEBL, OK, STRAT.


    Although some coins provide annual returns, keep in mind that in case the coin
    market cap stays stable, a single coin will be worth less over time, as new coins
    are generated. By staking a wallet, the hold (HODL) wallet’s value is less affected
    as you get more coins to maintain your wallet value. Similar to how a bank gives
    you an X% interest rate and the inflation is X%, your balance shows more funds,
    but realistically you own the same amount of money.


    ### Note


    HODL is a slang term coined in association with cryptocurrency to describe holding
    cryptocurrency disregarding price fluctuation.


    Let’s examine NEO as an example. You won’t need to mine NEO to get a reward. You
    will get gas coin just for holding coins as a reward for help with staking transactions.
    You can calculate how much gas coin you will receive by using this URL: [`https://neotogas.com/`](https://neotogas.com/)
    . At the time of writing, if you purchase five NEO coins and hold them for a year,
    you will get 0.4799 gas coins (currently at a price of $7.73) by placing them
    in staking wallets. See Figure [1-4](#475651_1_En_1_Chapter.xhtml#Fig4).


    ![../images/475651_1_En_1_Chapter/475651_1_En_1_Fig4_HTML.jpg](images/475651_1_En_1_Chapter/475651_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Neotogas.com gas staking calculation


    I encourage you to read the white paper about PoS here: [`https://peercoin.net/assets/paper/peercoin-paper.pdf`](https://peercoin.net/assets/paper/peercoin-paper.pdf)
    .


    #### Delegated Proof of Stake


    Delegated proof of stake is a census algorithm method invented by Dan Larimer
    discussed in the white paper at [`https://github.com/EOSIO/Documentation/blob/master/TechnicalWhitePaper.md`](https://github.com/EOSIO/Documentation/blob/master/TechnicalWhitePaper.md)
    . DPoS is aimed at improving PoS cons by providing a democracy instead of the
    random process of selecting a miner.


    ### Note


    In DPoS, the miners are called *block producers*.


    DPoS achieves a technological democracy by splitting the process of mining into
    two parts.


    *   **Election**: When electing a group of block producers, there are only 21
    block producers instead of unlimited as with PoW.


    *   **Scheduling production**: Each one of the 21 block producers takes turns
    to produce a block every 3 seconds.


    The election process provides a technological democracy and ensures stakeholders
    are in control because large stakeholders have the most to lose if a network fails.


    Each block producer takes a turn at producing a block, and the longest possible
    chain gets adopted (just like in PoW). Take a look at a normal operation, as shown
    in Figure [1-5](#475651_1_En_1_Chapter.xhtml#Fig5). You’ll see that each peer
    1 through 3 gets its turn to produce the longest chain block. Anytime an honest
    peer node sees a valid strictly longer chain, it will switch from its current
    fork to the longer one.


    ![../images/475651_1_En_1_Chapter/475651_1_En_1_Fig5_HTML.jpg](images/475651_1_En_1_Chapter/475651_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    DPoS normal operation


    DPoS is able to continue and function even when most of the producers fail. Figure
    [1-6](#475651_1_En_1_Chapter.xhtml#Fig6) shows a minority fork, where peer 2 only
    gets to post the longest chain once during a cycle. During a fail process, the
    community can vote and replace a failed peer producer, in this case peer 1, or
    peer producers until the network resumes to normal operation.


    ![../images/475651_1_En_1_Chapter/475651_1_En_1_Fig6_HTML.jpg](images/475651_1_En_1_Chapter/475651_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    DPoS minority fork


    This white paper describes in detail this process and how blocks are being produced
    and the rules to handle fail chains: `https://steemit.com/dpos/@dantheman/dpos-consensus-algorithm-this-missing-white-paper`.


    Setting a community of block producers and staked users who agree to these sets
    of rules gives the efficiency of PoS with the decentralized way that PoW operates.
    DPoS uses the power of stakeholders to approve voting of the consensus algorithm
    rules such as incentive fees, block intervals, forks, and transaction sizes.


    These rules can be fine-tuned by the elected delegates. This type of consensus
    can decrease the transaction time significantly (1 second versus 10 minutes for
    PoW). Further, the consensus protocol is designed to protect all the participants
    against unwanted interference of a group of nodes as possible in POW. Examples
    of popular DPOS blockchains are Bitshares, Steem, and EOS.'
  trans: "\n### 权益证明（PoS）\n\n`PoS`（权益证明）于 2012 年由 Sunny King 和 Scott Nadal 创建，旨在解决之前提到的`PoW`（工作量证明）的缺陷。\n\
    \n`PoS`依据的是节点持有的货币数量。节点需要质押其希望挖矿的货币数量。\n\n与算力不同，这里使用的是权益算力，并且不依赖能源消耗，因为无需解决数学难题。`PoS`提供了与比特币的`PoW`类似的哈希区块方案，但它限制了节点的数量。这既提供了所需的安全性，又降低了成本和功耗。网络会向节点支付手续费，而不是像`PoW`那样因解决数学难题而给予奖励。\n\
    \n`PoS`根据节点所持权益的大小来决定由哪个节点执行工作。这能以更低的能耗和成本实现分布式共识。`DDoS`攻击和欺诈仍然可能发生。然而，攻击者不能交易超过其质押数量的数字货币。否则，他们将损失其押金，因此攻击的可能性较低。请注意，攻击者可以使用他人的币进行质押，并且不介意损失这些币，因为不是自己的，所以`DDoS`攻击仍有可乘之机。\n\
    \n任何节点都可以通过质押货币来参与挖矿过程，以验证新的交易。要成为矿工，有两种选择：你可以质押自己的货币，委托给一个可信节点使用（但可能因节点在`PoS`网络中的欺诈行为而损失你的货币），或者你可以提交一个完整节点，以便被选为矿工。去中心化程度有限，因为只有少数矿工可能持有大部分货币并拥有多数控制权。矿工的工作是通过随机选择确定的；这不是基于解谜。请看表\
    \ 1-1，它对比了`PoW`和`PoS`。\n\n**表 1-1**  \n*PoW 与 PoS 对比*\n\n| 类别 | PoW | PoS |\n\
    | :--- | :--- | :--- |\n| 生成新区块 | 基于算力，选择最先解出难题的矿工 | 基于权益算力（节点持有的货币数量）随机选择 |\n\
    | 奖励 | 区块奖励 | 网络手续费 |\n| 能源与资源消耗 | ASIC 矿机，高能耗 | 资源消耗少，能耗低 |\n\n你可以设置一个质押钱包，用于存放`PoS`所需的货币。在某些区块链网络中，你的货币每年可以获得一定收益。\n\
    \n以下是一些使用`PoS`的热门加密货币列表：\n\n*   **达世币（Dash）**：需要持有 1000 单位才能成为主节点。年回报率约为 7.5%。\n\
    *   **小蚁（NEO）**：质押钱包年回报率约为 5.5%。无需挖矿；仅通过持有货币即可获得 GAS 币。\n*   **其他币种**：`LSK`, `PIVX`,\
    \ `NAV`, `RDD`, `BEAN`, `Linda`, `DCR`, `NEBL`, `OK`, `STRAT`。\n\n尽管一些币种提供年度回报，但请记住，如果币种市值保持稳定，随着新币的产生，单个币的价值会随时间降低。通过质押钱包，你获得的币会增多以维持钱包价值，因此持有（`HODL`）钱包的价值受影响较小。这类似于银行给你`X%`的利率，而通货膨胀率也是`X%`，你的账户余额显示资金更多，但实际上你拥有的货币购买力相同。\n\
    \n### 注意\n\n`HODL`是一个与加密货币相关的俚语，意指无视价格波动而持有加密货币。\n\n让我们以`NEO`为例。你无需通过挖取`NEO`来获得奖励。只需要持有货币，并因帮助质押交易而获得\
    \ GAS 币作为奖励。你可以通过以下网址计算你将获得多少 GAS 币：[`https://neotogas.com/`](https://neotogas.com/)\
    \ 。撰写本文时，如果你购买五个`NEO`币并将其放入质押钱包持有一年，你将获得 0.4799 个 GAS 币（目前价格为 7.73 美元）。见图 1-4。\n\
    \n![../images/475651_1_En_1_Chapter/475651_1_En_1_Fig4_HTML.jpg](img/475651_1_En_1_Fig4_HTML.jpg)\n\
    \n**图 1-4**  \n*Neotogas.com 的 GAS 质押计算*\n\n我鼓励你在此处阅读关于`PoS`的白皮书：[`https://peercoin.net/assets/paper/peercoin-paper.pdf`](https://peercoin.net/assets/paper/peercoin-paper.pdf)\
    \ 。\n\n### 委托权益证明（DPoS）\n\n委托权益证明是一种共识算法方法，由 Dan Larimer 发明，在[`https://github.com/EOSIO/Documentation/blob/master/TechnicalWhitePaper.md`](https://github.com/EOSIO/Documentation/blob/master/TechnicalWhitePaper.md)的白皮书中已有讨论。`DPoS`旨在通过提供民主机制（而非选择矿工的随机过程）来改进`PoS`的缺陷。\n\
    \n### 注意\n\n在`DPoS`中，矿工被称为*区块生产者*。\n\n`DPoS`通过将挖矿过程分为两部分来实现技术民主。\n\n*   **选举**：在选举一组区块生产者时，只有\
    \ 21 个区块生产者，而不是像`PoW`那样无限多个。\n*   **调度生产**：这 21 个区块生产者中的每一个轮流每 3 秒生产一个区块。\n\n\
    选举过程提供了一种技术民主，并确保利益相关者处于控制地位，因为大型利益相关者在网络失败时损失最大。\n\n每个区块生产者轮流生产一个区块，并且采用最长的可行链（就像在`PoW`中一样）。看一下正常运行的情况，如图\
    \ 1-5 所示。你会看到节点 1 到 3 依次获得生产最长链区块的机会。任何时候，诚实节点看到一个有效的严格更长的链时，都会从其当前的分叉切换到更长的链上。\n\
    \n![../images/475651_1_En_1_Chapter/475651_1_En_1_Fig5_HTML.jpg](img/475651_1_En_1_Fig5_HTML.jpg)\n\
    \n**图 1-5**  \n*DPoS 正常运行*\n\n即使大多数生产者失效，`DPoS`也能继续运行。图 1-6 展示了一个少数分叉的情况，其中节点\
    \ 2 在一个周期内只有机会发布一次最长链。在故障过程中，社区可以投票并替换失效的生产者节点（本例中为节点 1），或多个生产者节点，直到网络恢复正常运行。\n\
    \n![../images/475651_1_En_1_Chapter/475651_1_En_1_Fig6_HTML.jpg](img/475651_1_En_1_Fig6_HTML.jpg)\n\
    \n**图 1-6**  \n*DPoS 少数分叉*\n\n这份白皮书详细描述了这一过程、区块是如何生成的以及处理失效链的规则：`https://steemit.com/dpos/@dantheman/dpos-consensus-algorithm-this-missing-white-paper`。\n\
    \n建立一个由区块生产者和同意这套规则的质押用户组成的社区，就能兼具`PoS`的效率和`PoW`运作方式的去中心化特性。`DPoS`利用利益相关者的权力来批准共识算法的规则，例如激励费用、区块间隔、分叉和交易大小。\n\
    \n这些规则可以由当选的代表进行微调。这种类型的共识可以显著减少交易时间（对于`PoW`是 1 秒对比 10 分钟）。此外，该共识协议旨在保护所有参与者免受可能在`PoW`中出现的一组节点的恶意干扰。流行的`DPoS`区块链示例包括`Bitshares`、`Steem`和`EOS`。\n"
- fmt: '### Mining Layer


    What the miners are doing behind the scenes on networks could be described as
    competition to do the blockchain’s work, which is really doing the network bookkeeping.
    For bitcoin and most coins out there that utilize PoW, each peer needs to hold
    the entire public ledger, which holds a record of all the transactions that were
    ever conducted. PoW miners are based on computing power and pools, while other
    networks take into account other considerations.


    For bitcoin, transactions must be validated by the miners who check the ledger,
    ensure the sender is not transferring funds it doesn’t have, and only then add
    the transaction to the ledger. Finally, to ensure protection from hackers, the
    miners seal these transactions behind multiple layers of computational work, requiring
    too much work for a hacker to possibly achieve. This service is rewarded by providing
    bitcoins as a fee to the miner.


    For bitcoin, the size of each batch of coins drops by half about every four years;
    around 2140 (unless a faster calculation than SHA2 is discovered), it will be
    cut to zero, and the total number of bitcoins in circulation will be 21 million.


    ### Propagation Layer


    The propagation layer is responsible for deciding how the shared ledger and the
    blocks are transmitted on the P2P network. This layer is described in detail in
    the blockchain white papers.


    Each of the peers can transmit a new transaction to other nodes on the network.
    This architecture allows nodes to communicate indirectly. For instance, you can
    send a transaction affecting two wallets without each wallet being connected directly
    to each other.


    Any node that receives a valid transaction it has not seen before will immediately
    forward it to all other nodes to which it is connected. This is a propagation
    technique known as *flooding*. Thus, the transaction rapidly propagates out across
    the P2P network, reaching a large percentage of the nodes within seconds.


    ### Semantic Layer


    The semantic layer takes care of how new blocks relate to previous blocks and
    provides the protocol for verifying the consensus rules.


    As you have seen, there are different types of consensus mechanisms based on how
    many trusted machines are connected, staking, speed, hashing power, and more,
    but they do work similarly to how new blocks are related with previous blocks
    to ensure security. Every blockchain has specifications. In this layer, transactions
    happen where coins/tokens are transferred between accounts. I discussed the best
    block chain and how each block contains data, and a chain of blocks has each block
    referencing the block preceding it. The consensus in the blockchain holds the
    same blocks in their validated best block chain and follows the same rules (consensus
    rules). That’s how a blockchain ensures security.


    ### Application Layer


    This layer takes care of deploying applications on top of the blockchain.


    For instance, dapps, smart contracts, exchanges, and sites that provide information
    about a blockchain are applications built on top of blockchains.


    For the application layer, the blockchain needs to expose APIs. Different blockchains
    are similar as they all provide a way for a client to communicate with the network.


    Bitcoin offers a full node, which is currently about 27 GB and includes a fully
    enforced node and all the rules of the blockchain. That is needed for mining as
    well as ensuring the peer you run that gets connected to the application layer
    is synced with the latest blocks.


    These full nodes contribute to the functionality of the P2P network and help support
    the network and its security.


    It’s common for a blockchain to also offer a “light” node version. In fact, the
    bitcoin light client is referencing a trusted full node’s copy of the blockchain.
    The light client allows users to interact with the bitcoin’s blockchain and makes
    and confirms transactions without committing the large 27 GB disk space, which
    helps less capable devices such as mobile.


    It’s important to understand that a light client is trustworthy and does not include
    all the consensus rules. A full node is trustless and will reject blocks that
    violate consensus rules, even if all the other nodes on the network recognize
    the transaction as valid.


    I used NEO as an example of a popular PoS blockchain. NEO also provides NEO-CLI,
    which includes an API that supports a consensus function that can be used for
    the application layer.


    Similarly, EOS delegated proof of stake provides a full-node and light-node option.
    You will start noticing that although there are many blockchain options out there,
    there are many similarities in the way the blockchain is implemented.


    ## Summary


    In this chapter, I laid the foundations and explained basic concepts regarding
    blockchain; I explained concepts such as encryption and decryption, cryptography,
    digital assets, cryptography, and cryptocurrency.


    I covered the pieces that make up a blockchain, including blocks, double spending,
    cryptocurrency, cryptomining, cryptominers, and cryptocurrency wallets. I covered
    different types of cryptocurrencies: bitcoin, tokens, and altcoins.


    Lastly, I covered the blockchain P2P network and the different layers that make
    up the network: consensus layer, miner layer, propagation layer, semantic layer,
    and application layer. You also learned about the peer-to-peer network core logic
    and proof of work (PoW), proof of stake (PoS), and delegated proof of stake blockchain
    (DPOS).


    In this chapter, I introduced many terms that will be useful throughout this book
    such as digital asset, public and private keys, decentralized, double spending,
    smart contracts, and HODL.


    In the next chapter, you will install and learn about the bitcoin core API as
    well as learn how to create a full peer in different blockchains. This will enable
    you to access the blockchain P2P network and even be able to understand and create
    peers that can act as miners.


    # 2. Blockchain Nodes


    In the previous chapter, I covered basic concepts related to blockchain and the
    pieces that make up an individual blockchain. I covered how blockchain technology
    solved the double spending problem by utilizing a P2P network, which led to the
    creation of a global distributed shared ledger and digital cash. The blockchain
    P2P network is stitched together by connecting multiple nodes, and in this chapter,
    you will be taking a closer look at the nodes that make up the network.


    The nodes or peers are machines that maintain the transactions and records on
    the blockchain network. Each cryptocurrency has its own blockchain and nodes;
    however, I will cover how to install three different blockchains that utilize
    different consensus mechanisms.


    In addition, I will cover how to interact with a node. I will be using the bitcoin
    core API as an example so you will have a better understanding of the ledger,
    blocks, transactions, and wallets. These concepts will continue to lay out the
    foundations and basic concepts that are needed in the next chapters.'
