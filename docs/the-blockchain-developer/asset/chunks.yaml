    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig11_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig11_HTML.jpg)


    Figure 8-11


    Hyperledger Composer graphical explanation. Photo credit: developer.ibm.com.


    *   *Business network archive (.bna)* : This consists of four files packaged together.


    *   *Hyperledger Composer Playground*: This is used to configure and deploy network
    as well as test code without rolling out a blockchain.


    *   *REST API support*: This exposes functions to be used by front-end clients
    such as dapps.


    ## “Hello, World” with Playground


    You will be creating a “Hello, World” application and deploying it on the network
    using Playground. To get started, open Playground via the command line and execute
    this command:


    ```

    > composer-playground

    ```


    Alternatively, you can use Docker. Once it’s open, dismiss the welcome screen
    by clicking “Let’s Blockchain!”


    ### Deploying a Business Network


    Next, select “Deploy a new business network.” In the deploy wizard, insert the
    basic information, such as typing **hello-network** in the “Give your new Business
    Network a name” input box.


    Select the middle “empty-business-network” network definition and click Deploy,
    as shown in Figure [8-12](#475651_1_En_8_Chapter.xhtml#Fig12).


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig12_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig12_HTML.jpg)


    Figure 8-12


    Hyperledger Composer Playground, deploying new business network wizard


    The ID card for an admin is created for your network. To connect to the network,
    click the “Connect now” link, as shown in Figure [8-13](#475651_1_En_8_Chapter.xhtml#Fig13).


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig13_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig13_HTML.jpg)


    Figure 8-13


    Connecting to the hello-network business network definition


    You are now connected to the business network definition network, and you can
    define and work with the model.


    ### Business Network Archive (.bna)


    The business network model includes assets and the transactions related to these
    assets. Hyperledger Composer needs the following to be packaged together: a network
    model file, a JavaScript file (`.js`), an access control file (`.acl`), and a
    query file (`.qry`). These files are definition files that generate your network.


    *   *Network model (.cto)*: This is the file that defines the assets, transactions,
    and participants who can interact with these assets. The file is created with
    a modeling language called CTO (named after the original project name, Concerto).


    *   *JavaScript file (.js)*: This is the file that defines the transaction processor
    functions. It is the chaincode.


    *   *Access control (ACL) (.acl)*: This is the file that contains the access control
    rules that define the rights of the different participants.


    *   *Query (.qry)*: This is the file that defines the queries that can run in
    a network.


    Hyperledger Composer takes these four files and creates a business network definition
    that is packaged as an archive (`.bna`) file. The `.bna` files can be deployed
    on the Hyperledger Fabric network.


    You can than write a client application such as a dapp that can use Hyperledger
    Composer APIs to access the smart contract (`.bna` functions) that you write through
    the Hyperledger Fabric network.


    ### Adding the Model File


    To create the model file , you can add the files that make up the `.bna` archive.
    For instance, to add a model file. Click “Add a file,” select Model File (.cto),
    and click Add, as shown in Figure [8-14](#475651_1_En_8_Chapter.xhtml#Fig14).


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig14_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig14_HTML.jpg)


    Figure 8-14


    Adding a file to the business network model


    For the `.cto` file, you will define the processing function and transaction.


    For the namespace, you will use a fictional company called Skynet, with an identified
    ID of type `String`. You will also create a `msg` string and a transaction `Hello`
    and pass the `Myfunction` asset that will include the message.


    ```

    namespace org.skynet.mymodel

    asset Myfunction identified by id {

    o String id

    o String msg

    }

    transaction Hello {

    --> Myfunction check

    }

    ```


    ### Adding Chaincode


    Next, you will add a JS file by clicking “Add a file.” Write chaincode as the
    logic of the transaction to print the message to the console, as shown here:


    ```

    /**

    @param {org.skynet.mymodel.Hello} hello

    @transaction

    */

    function hello(hello) {

    console.log("Hello " + hello.check.msg);

    }

    ```


    Transactions represent the chaincode, which is the business logic of your application.
    Notice that the comments state that the code is a function for a transaction and
    the namespace. Click “Deploy changes” to update your definition model.


    ### Creating an Asset


    Next, to test the model, you will create a new asset, extend it, and store it.
    To do that, click + Create New Asset at the top-right corner. The create new asset
    wizard opens, as shown in Figure [8-15](#475651_1_En_8_Chapter.xhtml#Fig15). The
    model already has an ID; however, for this example, you will change it to 001
    (but the string can be any string). For the message, you will pass `world`.


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig15_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig15_HTML.jpg)


    Figure 8-15


    Create New Asset Wizard


    ### Access Control


    Notice that there is an Access Control option with the `permissions.acl` file
    as part of the Define tab at the bottom left of the screen, as shown in Figure
    [8-16](#475651_1_En_8_Chapter.xhtml#Fig16).


    As you can see, the rules grant wide-open “allow all” access, which can be changed.


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig16_HTML.png](images/475651_1_En_8_Chapter/475651_1_En_8_Fig16_HTML.png)


    Figure 8-16


    ACL permission file on your hello-network'
