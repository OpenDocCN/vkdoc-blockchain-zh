  trans: '

    ### 安装 EOS 全节点


    在 Ubuntu 服务器配置好 8 GB 内存和 25 GB 硬盘后，即可克隆项目并进行构建。


    ```

    > git clone https://github.com/EOSIO/eos --recursive

    > cd eos

    > ./eosio_build.sh #大约需要 30 分钟到一小时

    ```


    构建完成后，将会看到如图 2-13 所示的画面。


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig13_HTML.jpg](img/475651_1_En_2_Fig13_HTML.jpg)


    图 2-13

    EOS 全节点构建完成输出


    通过运行 `-h` 标志获取命令列表，确保守护进程正常工作。


    ```

    > cd build/programs/nodeos

    > ./nodeos -h #命令列表

    ```


    现在可以运行 EOS 节点守护进程；图 2-14 显示了输出结果。


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig14_HTML.jpg](img/475651_1_En_2_Fig14_HTML.jpg)


    图 2-14

    EOS 全节点运行中


    ```

    > ./nodeos -e -p eosio --plugin eosio::chain_api_plugin --plugin eosio::history_api_plugin

    ```


    EOS 在 [`https://developers.eos.io/`](https://developers.eos.io/) 提供一个门户网站，可帮助您快速上手节点、去中心化应用程序、智能合约、代币等。在后续章节中，您将进一步与
    EOS 平台交互。


    ### 营销与上架


    既然已成功运行 EOS 节点，您需要开展营销活动以争取当选。您可以将提交资料设置为类似于以下网址的格式：[`https://github.com/consenlabs/eos-bp-profile`](https://github.com/consenlabs/eos-bp-profile)。


    接下来，您即可准备接收投票。您可以通过 imToken 2.0 应用（iPhone 或 Android）进行投票。该应用提供区块生产者投票功能，请按照以下指南操作：[`https://medium.com/imtoken/guide-imtoken-2-0-block-producers-voting-141983f9a76e`](https://medium.com/imtoken/guide-imtoken-2-0-block-producers-voting-141983f9a76e)。


    ### 终止 EOS 节点


    请务必终止节点，以免产生费用，因为此机器配置不属于 Amazon 的免费套餐服务器。与之前操作相同，依次选择：EC2 仪表板 ➤ 运行实例 ➤ 操作 ➤ 实例状态
    ➤ 终止。


    同时，还需要终止您创建的 25 GB 卷。从左侧导航菜单中选择“卷”，然后选择“操作”➤“分离卷”。接着选择“删除卷”。参见图 2-15。


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig15_HTML.jpg](img/475651_1_En_2_Fig15_HTML.jpg)


    图 2-15

    分离卷并删除卷


    ## Bitcoin Core API


    作为开发者，您需要深入了解一项技术的工作原理。为了更全面地理解区块链，尤其是比特币区块链，您将下载并安装比特币核心代码。之前基于比特币核心搭建的全节点和比特币矿工，既可以通过源代码编译，也可以使用预编译的可执行文件。


    之前您已在计算机上搭建了一个能够挖矿的比特币节点。要使用比特币核心 API，您需要一个全节点。那么，全节点和矿工之间有什么区别呢？


    全节点是区块链的完整副本，能够验证自创世区块以来区块链上发生的所有交易。截至撰写本文时，这需要占用 180 GB 的存储空间。不过，您会发现，可以将全节点配置为不下载整个账本。全节点无需解决任何数学难题，哈希计算也不是其关注点。


    矿工是网络中的一个节点；但正如您所见，其职责是通过处理交易并找出存储信息的最佳区块（或哈希）来生成区块。矿工们相互竞争，通常需要花费约 10 分钟来找到问题解决方案。全节点则将区块永久保存在数据库中，并由其他节点进行验证。相比之下，矿工无需了解之前的所有区块，只需知道前一个区块，并专注于哈希计算。然而，比特币矿工确实需要下载整个
    180 GB 的区块链账本。


    在接下来的练习中，您将安装并配置一个全节点，以连接和使用比特币核心 API。

    '
- fmt: '### Installing and Configuring a Full Bitcoin Node


    **Setting Up Your System**


    In this exercise, you will set up your environment and then download, configure,
    and start a full working node of Bitcoin. This will come in handy as you continue
    to examine how Bitcoin and blockchain work. You will be using the Bitcoin Core
    source code. Bitcoin Core code includes docs that give complete instructions for
    installing the code on different OSs. In this book, I am focusing on macOS, so
    I am providing instructions to expedite the installation process for your convenience;
    however, you can install Bitcoin Core on other platforms. Here is the link for
    the complete instructions for Mac and PC:


    - macOS install instructions: [https://github.com/bitcoin/bitcoin/blob/master/doc/build-osx.md](https://github.com/bitcoin/bitcoin/blob/master/doc/build-osx.md)

    - Windows: [https://github.com/bitcoin/bitcoin/blob/master/doc/build-windows.md](https://github.com/bitcoin/bitcoin/blob/master/doc/build-windows.md)


    To get started, you need Xcode and the Xcode tools installed, so this would be
    a good time to install these tools if you don''t have them already. To check whether
    Xcode is installed on your computer, open a command-line terminal by clicking
    the Spotlight Search and type Terminal.


    At the command line, type the following command to check whether you have Xcode
    installed:


    ```

    > xcode-select –v

    ```


    It should return `xcode-select` and the version number, as shown in Figure 2-16.


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig16_HTML.jpg](images/475651_1_En_2_Chapter/475651_1_En_2_Fig16_HTML.jpg)


    **Figure 2-16** Terminal `xcode-select` version


    If you don''t have Xcode installed, you can download it from [https://developer.apple.com/xcode/](https://developer.apple.com/xcode/).


    > **Note:** This installation can take hours, depending on your Internet connection.


    Now that you have Xcode downloaded, execute the command-line tools for Xcode.


    ```

    > xcode-select –install

    ```


    With command-line tools installed, you can install Homebrew and the `wget` tools
    by using these commands:


    ```

    > /usr/bin/ruby -e "$(curl –fsSL https://raw.githubusercontent.com/Homebrew/install/master/install)"

    > brew install wget

    ```


    After Homebrew and `wget` are installed, you are able to install the rest of the
    needed dependencies for Bitcoin Core, as shown here:


    ```

    > brew install automake berkeley-db4 libtool boost miniupnpc openssl pkg-config
    protobuf python qt libevent qrencode librsvg

    ```


    **Installing Bitcoin Core**


    At this point you have the needed tools and dependencies installed, and you can
    clone the Bitcoin Core repository, compile, and run it.


    ```

    > git clone https://github.com/bitcoin/bitcoin.git

    > cd bitcoin/

    ```


    Now, you can build the Berkeley DB version 4, used by the Bitcoin Core node:


    ```

    > ./contrib/install_db4.sh .

    ```


    Continue the installation:


    ```

    > ./autogen.sh

    > ./configure

    > make

    > make check && sudo make install

    ```


    Bitcoin Core code includes two tools: `bitcoind` and `bitcoin-cli`.


    - **`bitcoind` (the Bitcoin daemon):** This implements the Bitcoin protocol for
    remote procedure call (RPC) use. Once it''s installed, you can make API calls.
    There is a list of all the API calls here: [https://en.bitcoin.it/wiki/Original_Bitcoin_client/API_Calls_list](https://en.bitcoin.it/wiki/Original_Bitcoin_client/API_Calls_list).

    - **`bitcoin-cli` (the Bitcoin command-line interface):** This enables you to
    interact with the Bitcoin Core daemon. To ensure the installation went well, you
    can check that the Bitcoin daemon and `bitcoin-cli` are configured and working
    as expected.


    To ensure these tools were installed correctly, you can execute the `which` command
    on these tools to get the location of them.


    ```

    > which bitcoind

    > which bitcoin-cli

    ```


    The output returns the location of `bitcoind` and `bitcoin-cli`:


    ```

    /usr/local/bin/bitcoind

    /usr/local/bin/bitcoin-cli

    ```


    **Configuring and Compiling Bitcoin Core**


    Next, you want to configure a node. Each Bitcoin Core node does not do mining
    but contributes to the Bitcoin network and consists of clients, miners, wallets,
    and so on. To configure the node, you can find the configuration files'' location
    by typing the following command in Terminal:


    ```

    > bitcoind -printtoconsole

    ```


    After a few seconds, stop this service (Control+C). The command shows the `bitcoin.conf`
    configuration file location. See Figure 2-17 for the output.


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig17_HTML.jpg](images/475651_1_En_2_Chapter/475651_1_En_2_Fig17_HTML.jpg)


    **Figure 2-17** `bitcoin.conf` file location


    ```

    > Using config file /[path]/.bitcoin/bitcoin.conf

    ```


    At the time of writing, a full-index Bitcoin Core node requires 2 GB RAM and at
    least 180 GB of disk space ([https://blockchain.info/charts/blocks-size](https://blockchain.info/charts/blocks-size)).
    Additionally, as the Bitcoin nodes send and receive transactions and blocks constantly,
    you will need a fast internet connection.


    The full node is advisable for a working project running a miner as you can run
    a dedicated server and interact with the `bitcoind` via `bitcoin-cli`; however,
    for the purpose of this book, most of the time you won''t need a full node. I
    recommend that you constrain Bitcoin node resource usage on your computer so it
    won''t hog your computer''s resources and internet bandwidth.


    To limit your node from downloading the entire shared ledger, use `vim` or your
    favorite editor to edit the `bitcoin.conf` file.


    ```

    > vim /[path]/.bitcoin/bitcoin.conf

    ```


    After `vim` opens up `bitcoin.conf`, paste the following configurations:


    ```

    alertnotify=myemailscript.sh "Alert: %s"

    prune=3000

    maxconnections=10

    dbcache=150

    maxmempool=100

    maxsendbuffer=500

    maxreceivebuffer=2000

    txindex=0

    ```


    Make sure you don''t erase the following lines already there:


    ```

    rpcuser=bitcoinrpcrpc

    password=[password]

    ```


    For your knowledge, the configuration file holds the following parameters:


    - **`prune`:** Utilizing `prune`, you can limit the disk usage. Set this to 3000.

    - **`maxconnections`:** By setting a limited `maxconnections` value, you are limiting
    the maximum number of nodes to ten connections.

    - **`dbcache`:** In `dbcache`, you reduce the size of the UTXO cache from 300
    MiB to 100 MiB.

    - **`maxsendbuffer` and `maxreceivebuffer`:** You can limit the memory buffer
    per connection to the number you set; for instance, set `maxreceivebuffer` to
    2000 MB.

    - **`txindex`:** Set this to 1 to get transaction data for any transaction on
    the blockchain; however, this will use up more disk space.


    **Running Bitcoin Core Daemon**


    Now that you have configured your node, you can start the Bitcoin Core daemon.
    To run the `bitcoind`, execute the following command in Terminal:


    ```

    > bitcoind -printtoconsole

    ```


    The first time running the daemon, it will download the blockchain. This can take
    several hours (depending on your Internet connection). Because you set the parameter
    to print to the console (`-printtoconsole`), you will be able to watch the process
    as it downloads the entire blockchain. See Figure 2-18.


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig18_HTML.jpg](images/475651_1_En_2_Chapter/475651_1_En_2_Fig18_HTML.jpg)


    **Figure 2-18** Bitcoin Core daemon (`bitcoind`)


    While the process is running, open a second Terminal window to query the `bitcoind`
    and interact with the APIs via the `bitcoin-cli`. Note: you can call the help
    feature and get help about the available APIs. For instance, to get a list of
    all available APIs, use this:


    ```

    > bitcoin-cli --help # outputs list of command-line options.

    > bitcoin-cli help # outputs list of RPC commands when the daemon is running.

    > bitcoin-cli help getblockhash # get help on specific API, for instance "getblockhash"

    ```'
