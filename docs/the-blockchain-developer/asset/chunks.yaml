    \ --wallet-url http://localhost:8888'\n```\n\n通过运行`get info`命令确认其工作正常。\n\n```\n\
    > cleos-mainnet get info\n```\n\n这里我将避免重复公共测试网部分中的相同步骤，以及花费真实现金在“HelloWorld”示例智能合约上。但是，我将介绍资源分配，因为你需要深入理解它才能在主网上发布智能合约。\n"
- fmt: '### Resource Allocation Explained


    I spoke a bit about resource allocation when I covered testnets, as you needed
    to get EOS tokens to publish your smart contract on a public testnet.


    For mainnet, you need actual EOS tokens to buy RAM and create your account. There
    are three types of resources consumed by EOS.IO accounts.


    - **Disk**: Bandwidth and log storage (disk)

    - **CPU**: Staking computation and computational backlog (CPU)

    - **RAM**: Staking state storage


    ### Buy RAM on Mainnet


    To free up RAM, you need to delete data from the account state mechanism, and
    then the RAM can be sold on the RAM marketplace at the current RAM price. The
    RAM marketplace price can be found here: [`https://www.feexplorer.io/EOS_RAM_price`](https://www.feexplorer.io/EOS_RAM_price).


    ### Create an EOS.IO Account on Mainnet


    EOS.IO accounts are necessary, as they are needed to interact with the EOS.IO
    network and create an account. As I explained previously, someone who already
    has an account needs to vouch for creating new accounts. If you don’t have someone
    with an EOS account who can create your account, you can get an account created
    with third-party providers. The third-party providers normally charge you a fee.
    For instance, you can download EOS Lynx on your phone and pay $2 to create an
    EOS.IO account.


    ### Change Your Account’s Public and Private Keys


    Once you get a mainnet account, you are not done. You need to make sure you change
    your private key before funding your account, as the service that creates your
    account could just store your private keys and take your funds. You are already
    familiar with all these steps; the only new command here is `remove_key`, which
    removes the old key from your wallet. You create a new key, unlock your wallet,
    reset the permissions with the new key, and remove the old public key as well
    as import the new private key. Follow these steps:


    ```

    > cleos create key

    > cleos wallet unlock

    > cleos set account permission [ACCOUNT NAME] active [PUBLIC KEY] owner -p [ACCOUNT
    NAME]@owner

    > cleos set account permission MYACCOUNT owner [PUBLIC KEY] -p [ACCOUNT NAME]@owner

    > cleos wallet remove_key [OLD PUBLIC KEY]

    > cleos wallet import [PRIVATE KEY]

    ```


    ### CPU and Bandwidth Allocations


    To get bandwidth and CPU, you need to allocate EOS tokens, and the resource will
    be available automatically for you proportional to the amount held in the staking
    contract period.


    For instance, during the staking window, say you would like to consume 1 CPU unit.
    To do so, you would need to compete with other accounts so you have 0.1 percent
    of all CPU-staked tokens under your account or have someone else delegate these
    tokens to your account.


    After the staking period, the consumed resources free up, and you can reuse the
    same staked tokens, so there’s no need to keep purchasing more EOS tokens each
    time. The EOS tokens can be undelegated after you are done.


    ## Where to Go from Here


    EOS.IO offers an online resource with links; see [`https://developers.eos.io`](https://developers.eos.io).
    The developer resource provides valuable documentation as well as information
    about other tools I did not cover such as these:


    - **State handler**: `demux-js`

    - **JavaScript library**: `eosjs`


    I also recommend exploring the EOS GitHub smart contracts examples, which can
    help you learn about all the functionally and what’s possible with EOS.IO.


    ## Summary


    In this chapter, I covered the EOS.IO blockchain in more detail. You set up a
    local testnet environment by installing the EOS.IO and EOSIO.CDT libraries and
    learned how to configure `keosd` and `nodeos`. You learned about EOS.IO wallets,
    including how to create, delete, and back up wallets as well as how to create
    a wallet with custom names and perform operations such as opening, locking, and
    unlocking a wallet.


    Next, I covered a wallet’s key pairs and how to spin and re-spin up a local node
    (`nodeos`) `to` run a local block producer. You learned about active and owner
    permissions as well as single-signature (single-sig) and multisignature (multisig)
    accounts.


    To understand EOS.IO smart contracts, you created a “HelloWorld” smart contract
    and tokens by first creating accounts and then writing C++ code. You then compiled
    and generated WebAssembly and ABI files as well as Ricardian contracts. You then
    learned how to deploy the contracts you created and interact with them. Once your
    tokens were generated, you were able to issue and transfer tokens between accounts.


    You continued by connecting to a public testnet block producer to test your smart
    contracts in a more realistic environment, and lastly you learned how to connect
    and publish on mainnet and learned about resource allocations on an EOS.IO network.


    In the next chapter, I will cover NEO blockchain wallets and NEO smart contracts.


    # 7. NEO Blockchain and Smart Contracts


    In Chapter [1](#475651_1_En_1_Chapter.xhtml), I covered the NEO proof of stake
    (PoS) blockchain consensus mechanism. In Chapter [2](#475651_1_En_2_Chapter.xhtml),
    you created a NEO bookkeeping node on AWS Ubuntu and learned how to request a
    consensus authority certificate and get elected as a bookkeeper.


    In this chapter, I will expand on the NEO blockchain, and you will learn how to
    set up a local environment, do operations in NEO wallets, create smart contracts
    (NeoContracts), and publish. In this chapter, I will cover NEO’s blockchain high-level
    architecture and how to set up your local environment, create a local testnet
    chain, create “Hello, World” projects in both C# and Python, publish these smart
    contracts, and learn the criteria to compare Ethereum versus EOS versus NEO.


    As you can see, understanding smart contracts, blockchain, and the process of
    publishing is similar between projects, and covering three projects is sufficient
    to gain an understanding of how to work with the rest of the 40 (at the time of
    writing) projects available for writing smart contracts that are out there.'
