    \nFigure 11-4\nhAnt ransomware message.\nImage credit: sensorstechforum.com.\n\
    \nPostmortem\nGetting rid of the ransomware is not easy. The software may be built\n\
    with a “tripwire” script that can damage the miner if the miner\ndisconnects from\
    \ the Internet. To solve this problem, you need to first\nremove the ransomware\
    \ surgically from the miner’s Secure Digital (SD)\ncards. Additionally, a mining\
    \ farm going offline for a period of time is\ncostly.\nThe best approach is to\
    \ avoid this attack altogether by not\ndownloading a firmware upgrade from any\
    \ source than the official\nvendor’s web site.\n\nEclipse Attack on the P2P Network\n\
    An informational eclipse attack  can be conducted on\nits own or as part of a\
    \ different attack, such as a 51 percent attack.\nThe attackers gain control over\
    \ a peer’s access to information in the\nP2P network by manipulating the network\
    \ so that nodes communicate only\nwith malicious nodes. The attacker can then\
    \ manipulate the mining and\nthe consensus mechanism.\n\nPostmortem\nRun analysis,\
    \ simulations, and\nexperiments to find countermeasures to avoid an eclipse attack.\
    \ Good\nresearch with potential countermeasures to increase bitcoin’s security\n\
    countermeasures against an eclipse attack can be found here (and can be\napplied\
    \ to many other blockchain networks): [`https://hackernoon.com/eclipse-attacks-on-blockchains-peer-to-peer-network-26a62f85f11`](https://hackernoon.com/eclipse-attacks-on-blockchains-peer-to-peer-network-26a62f85f11)\
    \ .\n\nRouting Attacks\nInternet routing\nattacks \ninclude BGP hijacks, and malicious\
    \ attacks against Internet service providers\n(ISPs) can be also executed against\
    \ blockchains.\n\nNote\nA BGP hijack is a maliciously rerouted Internet traffic\
    \ attack. This\nis done by falsely announcing ownership of groups of IP addresses\
    \ (IP\nprefixes).\n\nLarge mining farms are centralized in a few geographical\
    \ locations,\nwhich makes them ideal for an ISP type of attack. Attackers can\
    \ commit\nthe following:\n\n*   ***Partition attack***: An ISP can partition\n\
    \    the P2P network by hijacking a few IP prefixes.\n\n*   ***Delay attack***:\
    \ An ISP delays traffic to\n    and from a blockchain node, which results in a\
    \ delay in the block\n    propagation, slowing transactions.\n\nThese types of\
    \ attacks could reduce a node’s revenue as well as turn\ninto a 50 percent attack\
    \ as fewer nodes influence the network.\nAdditionally, these attacks can also\
    \ prevent the transaction from being\nsent by large entities such as exchanges.\n\
    \nPostmortem\nCreate a custom script or install\nhardware to monitor the network.\
    \ Many ISPs provide a paid solution to\nmonitor the network and prevent an attack.\
    \ Refer to the “DoS and DDoS\nAttacks” postmortem section for more solutions that\
    \ can help mitigate\nthis attack.\n\nPlatform Attack\nBitcoin’s blockchain\nnetwork\
    \ is by design a secure network and has proven reliable.\nBitcoin was released\
    \ in 2009, and there has not been a successful attack\non bitcoin’s blockchain\
    \ network at the time of writing.\nThe reason bitcoin’s blockchain has a high\
    \ level of security is that\nthe data is distributed between nodes. Additionally,\
    \ mining bitcoin is\nenergy expensive, so attacking bitcoin’s network could cost\
    \ more than\nmining itself, and attackers risk losing money just attempting an\n\
    attack. However, that’s not the only reason; a big contributing factor\nto bitcoin\
    \ withstanding the test of time is that it’s open source and\nenables developers\
    \ to quickly implement changes based on research and\nrecommendations by security\
    \ experts.\nWith that being said, that does not keep other platforms safe that\n\
    provide services built on top of safe blockchains, such as exchanges,\nlending\
    \ platforms, wallet-based services, and dapps that store private\nkeys.\nFor instance,\
    \ exchanges hold billions in deposits and make a perfect\ntarget for hackers.\
    \ As mentioned, exchanges store the user’s crypto in\nthe form of private keys,\
    \ and some of these keys are kept online in a\nhot wallet to allow real-time withdrawals\
    \ and trading. Not handling\nthese private keys with care can cause losses.\n\
    Mt. Gox’s 2011 security breach is a good example. This attack\nhappened because\
    \ a hacker was able to crack the password of a Mt. Gox\nauditor and was able to\
    \ transfer 800,000 bitcoins to himself. Besides\nMt. Gox, there is a constant\
    \ stream of news about exchanges shutting\ndown due to loss of crypto.\n\nAs you\
    \ can see from Figure [11-5](#475651_1_En_11_Chapter.xhtml#Fig5), the biggest\n\
    loss of close to $1 billion was by Mt. Gox in two attacks, and the\nlargest theft\
    \ in crypto history was caused by an attack on the Coincheck\nexchange network\
    \ in 2018.\n\n![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig5_HTML.jpg](images/475651_1_En_11_Chapter/475651_1_En_11_Fig5_HTML.jpg)\n\
    \nFigure 11-5\nBiggest exchanges losses of BTC\n\nIn the next section, I will\
    \ review some of the\nlargest attacks and give you recommendations for how these\
    \ attacks could\nbe prevented.\n\nCredential Attacks\n\nAuthentication-related\
    \ attacks such as password cracking\ncaused losses in the millions.\n\n*   *Direct\
    \ attack on exchanges*: As mentioned, Mt. Gox’s 51\n    percent attack in 2011\
    \ caused two separated losses: 2,609 BTC and over\n    750,000 BTC. Hackers were\
    \ able to get an auditor’s credentials and\n    transferred these bitcoins to\
    \ the hacker’s address.\n\n*   *Attack on users*: Millions in losses occurred\
    \ because of\n    taking over users’ accounts. For instance, phone companies enabled\
    \ the\n    takeover of cell phone numbers by providing simple billing information.\n\
    \    Hackers can port a number to a new provider and can then approve a reset\n\
    \    password of accounts on exchanges using SMS verifications.\n\nPostmortem\n\
    As a user, the best way to avoid these\nlosses is to keep your crypto assets in\
    \ a cold wallet and not on\ncentralized exchanges.\n\nOn your own computer:\n\n\
    *   *SSL*: Don’t register on sites that don’t have an SSL\n    certificate.\n\n\
    *   *Strong passwords*: Use unique and strong passwords long\n    in length and\
    \ include numbers, characters, and special\n    characters.\n\n*   *Unique passwords*:\
    \ Don’t reuse the same password on\n    different platforms.\n\n*   *Layers of\
    \ security*: Set up all recommended layers of\n    security such as SMS, 2FA enabled,\
    \ e-mail confirmation, and so\n    on.\n\n*   *Antivirus*: Install paid or free\
    \ virus-scanning software.\n    On personal computers, Avast security has a free\
    \ version used by 435\n    million people: [`https://www.avast.com`](https://www.avast.com)\
    \ . It includes a plugin for Chrome that warns against\n    phishing sites.\n\n\
    *   *VPN*: Use VPN connection as much as possible especially\n    on a network\
    \ that is public and isn’t secured."
  trans: "\n攻击者会在管理员登录时显示一条消息，威胁称如果不支付比特币赎金或感染其他设备，矿机将因过热而损毁。这可以通过关闭风扇来实现，如图 11-4\
    \ 所示。截至目前，仅有`Antminer`和`Avalon`制造的比特币和莱特币矿机受到影响，但这种攻击理论上可以对任何矿机实施。\n\n![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig4_HTML.jpg](img/475651_1_En_11_Fig4_HTML.jpg)\n\
    \n**图 11-4**  \n`hAnt`勒索软件消息。  \n图片来源：`sensorstechforum.com`。\n\n## 事后分析\n\n清除勒索软件并非易事。该软件可能内置了一个“触发陷阱”（`tripwire`）脚本，一旦矿机断开互联网连接，就会损坏矿机。要解决此问题，首先需要从矿机的安全数字（SD）卡中精确移除勒索软件。此外，矿场长时间离线会造成巨大损失。\n\
    \n最佳方法是完全避免此类攻击，即只从官方供应商网站下载固件升级，不信任任何其他来源。\n\n## 对等网络的日蚀攻击\n\n信息型日蚀攻击（`Eclipse\
    \ Attack`）可以单独实施，也可作为 51%攻击等其他攻击的一部分。攻击者通过操控网络，使节点仅与恶意节点通信，从而控制对等网络中某个节点对信息的访问权。随后，攻击者可以操纵挖矿过程和共识机制。\n\
    \n### 事后分析\n\n运行分析、模拟和实验，以寻找抵御日蚀攻击的应对措施。关于提高比特币安全性的优秀研究及应对日蚀攻击的潜在对策（同样适用于许多其他区块链网络），可参见以下链接：[`https://hackernoon.com/eclipse-attacks-on-blockchains-peer-to-peer-network-26a62f85f11`](https://hackernoon.com/eclipse-attacks-on-blockchains-peer-to-peer-network-26a62f85f11)。\n\
    \n## 路由攻击\n\n互联网路由攻击包括`BGP`劫持，以及针对互联网服务提供商（`ISP`）的恶意攻击，这些攻击同样可以针对区块链实施。\n\n> **注意**\
    \  \n> `BGP`劫持是一种恶意重定向互联网流量的攻击手段。通过虚假声明拥有某一组 IP 地址（IP 前缀）的所有权来实现。\n\n大型矿场集中在少数几个地理位置，这使得它们成为针对`ISP`类型攻击的理想目标。攻击者可以实施以下攻击：\n\
    \n*   **分区攻击（`Partition Attack`）**：`ISP`可以通过劫持少量 IP 前缀来分割 P2P 网络。\n*   **延迟攻击（`Delay\
    \ Attack`）**：`ISP`延迟发往或来自区块链节点的流量，导致区块传播延迟，从而减慢交易速度。\n\n这些攻击类型不仅可能降低节点收益，还可能因网络中影响力节点减少而演变为\
    \ 50%攻击。此外，这些攻击还能阻止交易所等大型实体发送交易。\n\n### 事后分析\n\n创建自定义脚本或安装硬件来监控网络。许多`ISP`提供付费的网络安全监控和攻击防御解决方案。有关更多有助于缓解此类攻击的解决方案，请参阅“DoS\
    \ 和 DDoS 攻击”事后分析章节。\n\n## 平台攻击\n\n比特币的区块链网络在设计上是安全的，并且已被证明是可靠的。比特币于 2009 年发布，截至撰写本文时，其区块链网络尚未遭受过成功的攻击。\n\
    \n比特币区块链具有高安全性的原因在于数据分布在各个节点之间。此外，挖矿需要消耗大量能源，因此攻击比特币网络的成本可能高于挖矿本身，攻击者可能冒着损失资金的风险去尝试攻击。然而，这并不是唯一原因；比特币能够经受住时间考验的一个重要因素是它是开源的，这使得开发者能够根据安全专家的研究和建议快速实施变更。\n\
    \n尽管如此，这并不能保证其他平台的安全，这些平台提供建立在安全区块链之上的服务，例如交易所、借贷平台、钱包服务以及存储私钥的`dapp`。\n\n例如，交易所持有数十亿美元的存款，成为黑客的完美目标。如前所述，交易所以私钥的形式存储用户的加密货币，其中一些密钥保存在热钱包中，以实现实时提现和交易。未能妥善处理这些私钥可能导致损失。\n\
    \n`Mt. Gox` 2011 年的安全漏洞就是一个很好的例子。这次攻击的发生是因为黑客破解了一名`Mt. Gox`审计员的密码，并成功将 80 万个比特币转移到自己的账户。除了`Mt.\
    \ Gox`，关于交易所因加密货币丢失而关闭的新闻也层出不穷。\n\n如图 11-5 所示，最大的一笔损失接近 10 亿美元，来自`Mt. Gox`的两次攻击；而加密货币历史上最大的盗窃案则是由\
    \ 2018 年对`Coincheck`交易所网络的攻击造成的。\n\n![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig5_HTML.jpg](img/475651_1_En_11_Fig5_HTML.jpg)\n\
    \n**图 11-5**  \n最大的交易所`BTC`损失情况\n\n在下一节中，我将回顾一些最大的攻击事件，并就如何预防这些攻击提出建议。\n\n## 凭证攻击\n\
    \n与身份验证相关的攻击（例如密码破解）造成了数百万美元的损失。\n\n*   **对交易所的直接攻击**：如前所述，`Mt. Gox`在 2011 年的\
    \ 51%攻击造成了两次独立的损失：2,609 BTC 和超过 750,000 BTC。黑客成功获取了审计员的凭证，并将这些比特币转移到了黑客的地址。\n\
    *   **对用户的攻击**：因接管用户账户而造成的损失高达数百万美元。例如，电话公司仅凭简单的账单信息就允许接管手机号码。黑客可以将号码转至新的运营商，然后利用短信验证批准重置交易所账户的密码。\n\
    \n### 事后分析\n\n作为用户，避免这些损失的最佳方式是将您的加密资产存储在冷钱包中，而不是中心化交易所。\n\n在您自己的计算机上：\n\n*  \
    \ **SSL**：不要在未安装`SSL`证书的网站上注册。\n*   **强密码**：使用长度较长、包含数字、字母和特殊字符的唯一且强密码。\n*   **唯一密码**：不要在不同平台上重复使用相同的密码。\n\
    *   **多层安全**：设置所有推荐的安全层，例如短信验证、启用双重身份验证（`2FA`）、电子邮件确认等。\n*   **杀毒软件**：安装付费或免费的病毒扫描软件。在个人电脑上，`Avast`安全软件拥有免费版本，被\
    \ 4.35 亿人使用：[`https://www.avast.com`](https://www.avast.com)。它包含一个`Chrome`浏览器插件，可以警告钓鱼网站。\n\
    *   **VPN**：尽可能使用`VPN`连接，尤其是在公共且不安全的网络上。\n"
- fmt: "# 安全实践指南\n\n## 避免恶意软件和勒索软件\n\n注意安装的软件来源，确保来自信誉良好的供应商。安装过程中请阅读所有信息，不要直接同意所有提示。安装能够预防勒索软件的防护工具。\n\
    \n> **提示**：将加密资产保存在冷钱包中自行控制，不要存放在中心化交易所。为重要账户设置比短信验证更多的安全层，例如双因素认证（2FA）、邮件验证和IP限制。\n\
    \n## 开发者安全实践\n\n作为开发者，密码破解是入侵Web应用最常见的方式。应实施安全测试机制，确保系统要求使用强加密密码。此类解决方案的一个优秀示例是`John\
    \ the Ripper`密码破解工具：[`https://github.com/magnumripper/JohnTheRipper`](https://github.com/magnumripper/JohnTheRipper)。\n\
    \n此外，请实施以下措施：\n\n- **保护凭据**：使用多层机制保护用户凭据。\n- **强密码**：在创建账户和重置密码时强制使用强密码。\n- **启用2FA**：设置双因素认证（2FA），例如`Google\
    \ Authenticator`就是常见方案。\n- **确认机制**：对转账等重要操作，要求同时进行短信确认和邮件验证。\n- **存储**：将用户敏感数据（如私钥）加密后存储在与互联网隔离的服务器上。\n\
    - **加密**：在所有页面使用SSL。使用AES-256加密。密码哈希采用成本因子为12。\n- **锁定账户**：限制登录尝试次数，多次失败后锁定账户。\n\
    \n## 个人开发电脑安全\n\n- **远程连接**：使用强登录密码，特别是通过远程方式连接时。\n- **加密数据**：加密硬盘驱动器。进入系统偏好设置，选择“隐私与安全性”，点击“开启FileVault”。\n\
    - **闲置锁定**：在“通用”标签页的“高级”中，设置为闲置5分钟后退出登录，并启用屏幕锁定（选择“需要管理员密码才能访问系统偏好设置”）。\n- **防火墙**：在计算机上设置防火墙；在“防火墙”标签页中开启防火墙。\n\
    - **VPN**：在不安全的网络环境下工作时使用VPN。\n- **软件**：注意安装的软件来源，确保来自信誉良好的供应商。\n- **库**：尽量避免以root权限安装代码库。\n\
    \n## 缺陷代码\n\n缺陷代码是造成损失的最大原因之一。这一问题已变得极为严重，许多大公司为白帽黑客设置赏金以发现漏洞，这使得黑客指出缺陷（而非窃取）也能获利。\n\
    \n> **说明**：白帽黑客是道德人士，他们通过未经授权访问数据来指出系统缺陷。\n\n例如，2014年，黑客利用Poloniex的提款代码缺陷进行攻击。该公司未公开被盗比特币的确切数量。\n\
    \n### 事后分析\n\n作为开发者：\n\n- **SQL注入**：通过测试和实施SQL注入过滤器来防范。更多信息可参考：[`http://sqlmap.org/`](http://sqlmap.org/)。\n\
    \n> **注意**：SQL注入攻击是指黑客通过文本输入框传递非法SQL语句来获取内容。攻击者可利用此漏洞对SQL数据库进行添加、修改或删除数据操作。\n\n\
    - **CSRF攻击**：黑客利用服务请求修改和检索数据，并验证POST、PUT和DELETE请求的真实性。为防范此类攻击，建议：\n  - **限制IP**：设置服务仅响应特定IP地址。\n\
    \  - **使用工具和库**：查找防范CSRF攻击的工具，可参考：[`https://github.com/0xInfection/XSRFProbe`](https://github.com/0xInfection/XSRFProbe)。\n\
    \n- **跨站脚本攻击（XSS）**：使用以下工具和库防范XSS攻击：\n  - [`https://pentest-tools.com/website-vulnerability-scanning/xss-scanner-online`](https://pentest-tools.com/website-vulnerability-scanning/xss-scanner-online)\n\
    \  - [`https://github.com/topics/xss-scanner`](https://github.com/topics/xss-scanner)\n\
    \n> **注意**：XSS攻击是通过向受信任网站注入恶意代码来执行的。\n\n## 依赖包后门攻击\n\n依赖包后门攻击始于社会工程攻击，包括注入恶意代码。\n\
    \n> **说明**：社会工程攻击中，攻击者扮演骗子角色，隐藏真实身份和动机以获取访问权限或数据。例如，收到看似来自经理的合法邮件，要求提供特定信息。\n\n\
    例如，2018年底，一名黑客成功将恶意代码插入`event-stream`（一个`npm`JavaScript库：[`https://www.npmjs.com/package/event-stream`](https://www.npmjs.com/package/event-stream)）。该库被数百万人使用，目标是一家名为Bitpay的公司，该公司拥有一个名为`copay`的Git库。`copay`是一个开源钱包，托管在GitHub上（[`https://github.com/bitpay/copay`](https://github.com/bitpay/copay)）。与许多开源库一样，开发者并未因`event-stream`的工作获得报酬，后来失去兴趣，将项目交给新的维护者。新维护者注入了针对`copay`的恶意代码，该代码捕获账户余额超过100比特币或1000比特币现金的账户详情和私钥。`copay`在5.0.2版本中更新了依赖库，包含攻击者代码，导致数百万损失。该代码捕获受害者账户数据和私钥，通过服务调用将数据发送到攻击者服务器而不被发现。\n\
    \n此攻击的详细内容和分析可参考：\n- [`https://blog.npmjs.org/post/180565383195/details-about-the-event-stream-incident`](https://blog.npmjs.org/post/180565383195/details-about-the-event-stream-incident)\n\
    - [`https://snyk.io/blog/a-post-mortem-of-the-malicious-event-stream-backdoor/`](https://snyk.io/blog/a-post-mortem-of-the-malicious-event-stream-backdoor/)\n\
    \n### 事后分析\n\n作为用户，如本章所建议，将加密资产存放在冷钱包中。作为开发者，处理开源库时需要谨慎。开源模型依赖众多软件包，但只有少数开发者维护这些库，可能导致恶意接管。为帮助防范此类风险，运行`npm\
    \ audit`检测任何易受攻击的依赖项：\n\n```\n> npm audit\n```\n\n在漏洞数据库（如snyk.io网站：[`https://snyk.io/vuln`](https://snyk.io/vuln)）中检查并测试代码是否存在已知漏洞。\n\
    \n不要将`package.json`文件设置为包含自动更新库：\n\n```\n\"dependencies\": { \"some-library\"\
    : \"latest\" }\n```\n\n而应检查所需更新库的拉取请求，并手动检查所使用依赖项的更改。使用库的特定版本：\n\n```\n\"dependencies\"\
    : { \"some-library\": \"1.0.0\" }\n```\n\n`npm install`也是如此。安装特定库，尤其是对于不太知名的库：\n\
    \n```\n> npm install -g some-library@1.0.0\n```"
  raw: "*   *Avoid malware and ransomware*: Be mindful of software you\n    install\
    \ and ensure it’s from a reputable vendor. Read all messages\n    during the installation;\
    \ don’t just agree to all messages. Install\n    software that prevents ransomware.\n\
    \nTip\nKeep your crypto assets under your own control in a cold wallet and\nnot\
    \ on centralized exchanges. Set up more layers than just SMS\nverifications on\
    \ important accounts. Security layers can be 2FA\nauthentication, e-mail verifications,\
    \ and IP restriction.\n\nAs a developer, password cracking is the most\ncommon\
    \ way of gaining access to a web app. Implement a security tester\nthat ensures\
    \ the system demands a strong encrypted password.\nA good example of such a solution\
    \ is the John the Ripper password\ncracker: [`https://github.com/magnumripper/JohnTheRipper`](https://github.com/magnumripper/JohnTheRipper)\
    \ .\n\nIn addition, implement the following:\n\n*   *Protect credentials*: Protect\
    \ your users’ credentials using\n    multiple layers.\n\n*   *Strong password*:\
    \ Enforce strong passwords on account\n        creation and reset passwords.\n\
    \n*   *2FA enabled*: Set up a two-factor authentication (aka 2FA\n        enabled);\
    \ a popular example is Google Authenticator.\n\n*   *Confirmation*: Require both\
    \ SMS confirmation and an\n        e-mail verification on important operations\
    \ such as transfers.\n\n*   *Storage*: Store users’ sensitive data (such as private\n\
    \    keys) encrypted and on servers that are disconnected from the\n    Internet.\n\
    \n*   *Encryption*: Use SSL on all pages. Use AES-256\n    encryption. Hash passwords\
    \ with a cost factor of 12.\n\n*   *Lock account*: Limit login attempts and lock\
    \ an account\n    once multiple failed attempts occur.\n\n*   On your development\
    \ personal computer:\n\n*   *Remote connection*: Use strong login passwords especially\n\
    \        if you connect remotely to your machine.\n\n*   *Encrypt data*: Encrypt\
    \ your hard drive to turn encryption\n        on. Go to System Preferences and\
    \ select Privacy & Security. Click\n        Turn On FileVault.\n\n*   *Lock on\
    \ inactive*: On the General tab under Advanced, set\n        it up to log out\
    \ after five minutes of inactivity and enable screen\n        locking by selecting\
    \ “require an admin password to access system-wide\n        preference.”\n\n*\
    \   *Firewall*: Set up a firewall on your computer; on the\n        Firewall tab,\
    \ turn on the firewall.\n\n*   *VPN*: Use a VPN when working on a\n        none-secure\
    \ network.\n\n*   *Software*: Be mindful of software you are installing and\n\
    \        ensure it is from a reputable vendor.\n\n*   *Libraries*: Avoid installing\
    \ code libraries with root\n        access if possible.\n\nFaulty Code\nFaulty\
    \ code is\none of the biggest reasons for losses. It has become so significant\
    \ that\nmany large companies set bounties for white-hat hackers to discover\n\
    bugs, making it profitable for hackers to point out flaws instead of\nsteal.\n\
    \nNote\nA white-hat hacker is a moral person who gains unauthorized access to\n\
    data to point out flaws in a system.\n\nFor example, hackers exploited a faulty\
    \ withdrawal code in Poloniex\nin 2014\\. The exact number of bitcoin stolen was\
    \ not shared by the\ncompany.\n\nPostmortem\n\nAs developers:\n\n*   *SQL injections*:\
    \ Avoid SQL injections by testing and\n    implementing SQL injection filters.\
    \ You can find more information here:\n     [`http://sqlmap.org/`](http://sqlmap.org/)\
    \ .\n\n**Note** A SQL injection is an attack where a hacker\n    passes illegal\
    \ SQL statements through a text entry input box to gain\n    access to content.\
    \ The hackers can then use this vulnerability to add,\n    change, or delete data\
    \ from a SQL database.\n\n*   *CSRF attack*: The hacker exploits service requests\
    \ to modify and\n    retrieve data and verify the authenticity of POST, PUT, and\
    \ DELETE\n    requests. To avoid this, follow these recommendations:\n\n*   *Restrict\
    \ IPs*: Set services to respond to certain IPs\n        only.\n\n*   *Set tools\
    \ and libraries*: Find tools to avoid CSRF\n        attacks here: [`https://github.com/0xInfection/XSRFProbe`](https://github.com/0xInfection/XSRFProbe)\
    \ .\n\n*   *Cross-site scripting (XSS)*: Avoid XSS by using tools and\n    libraries\
    \ such as these:\n\n*   [`https://pentest-tools.com/website-vulnerability-scanning/xss-scanner-online`](https://pentest-tools.com/website-vulnerability-scanning/xss-scanner-online)\n\
    \n*   [`https://github.com/topics/xss-scanner`](https://github.com/topics/xss-scanner)\n\
    \nNote\nXSS attacks are executed by an injection of malicious code into a\ntrusted\
    \ website.\n\nDependency Backdoor Attack\nA dependency backdoor\nattack \nstarts\
    \ as a social engineering attack and includes the injection of\nmalicious code.\n\
    \nNote\nA social engineering attack, the engineer is a conman. The attacker\n\
    conceals his true identity and motives to gain access or data. For\ninstance,\
    \ you get an email that seem legit from your manager asking for\na specific information.\n\
    \nFor instance, in late 2018, a hacker was able to successfully insert\nmalicious\
    \ code into `event-stream`, an\n`npm` JavaScript\nlibrary ( [`https://www.npmjs.com/package/event-stream`](https://www.npmjs.com/package/event-stream)\
    \ ). The library is used by millions and targets a\ncompany called Bitpay, which\
    \ has a Git library called `copay`. `copay` is an open\nsource wallet hosted on\
    \ GitHub ( [`https://github.com/bitpay/copay`](https://github.com/bitpay/copay)\
    \ ).\nLike many open source libraries, the\ndeveloper was not being paid for the\
    \ work on `event-stream` and lost\ninterest in the project before giving it away\
    \ to a new maintainer. The\nnew maintainer injected malicious code that targets\
    \ `copay`. The code\ncaptures account details and private keys from accounts having\
    \ a balance\nof more than 100 bitcoin or 1,000 bitcoin cash. `copay` then updated\n\
    its dependency library on versions 5.0.2 and included the attacker code,\nwhich\
    \ resulted in a loss of millions.\nThe code captured the victims’ account data\
    \ and private keys and\nthen, using a service call, sent the data to the attacker\
    \ server\nundetected.\n\nThe complete detail and analysis of this attack can be\
    \ found here:\n\n*   [`https://blog.npmjs.org/post/180565383195/details-about-the-event-stream-incident`](https://blog.npmjs.org/post/180565383195/details-about-the-event-stream-incident)\n\
    \n*   [`https://snyk.io/blog/a-post-mortem-of-the-malicious-event-stream-backdoor/`](https://snyk.io/blog/a-post-mortem-of-the-malicious-event-stream-backdoor/)\n\
    \nPostmortem\n\nAs a user, as recommended throughout this chapter, place crypto\
    \ in a\ncold wallet. As a developer, be cautious when handling open source\nlibraries.\
    \ The open source model relies on many packages, but few\ndevelopers support the\
    \ libraries, which could enable a malicious\ntakeover. To help avoid this, run\
    \ `npm audit` to detect\nany vulnerable dependency.\n\n```\n> npm audit\n```\n\
    \nCheck and test your code for any reported vulnerabilities on a\nvulnerability\
    \ database, such as the snyk.io site: [`https://snyk.io/vuln`](https://snyk.io/vuln)\
    \ .\n\nDo not set your `package.json` file to\ninclude an automatic update of\
    \ libraries.\n\n```\n\"dependencies\": { \"some-library\": \"latest\" }\n```\n\
    \nInstead, check pull requests on the\nlibraries you want to update and check\
    \ changes manually for the\ndependencies you use. Use a library-specific version.\n\
    \n```\n\"dependencies\": { \"some-library\": \"1.0.0\" }\n```\n\nIt’s the same\
    \ with `npm install`. Install specific libraries, especially on less known\nlibraries.\n\
    \n```\n> npm install -g some-library@1.0.0\n```"
  trans: "\n# 安全实践指南\n\n## 避免恶意软件和勒索软件\n\n注意安装的软件来源，确保来自信誉良好的供应商。安装过程中请阅读所有信息，不要直接同意所有提示。安装能够预防勒索软件的防护工具。\n\
    \n> **提示**：将加密资产保存在冷钱包中自行控制，不要存放在中心化交易所。为重要账户设置比短信验证更多的安全层，例如双因素认证（2FA）、邮件验证和\
    \ IP 限制。\n\n## 开发者安全实践\n\n作为开发者，密码破解是入侵 Web 应用最常见的方式。应实施安全测试机制，确保系统要求使用强加密密码。此类解决方案的一个优秀示例是`John\
    \ the Ripper`密码破解工具：[`https://github.com/magnumripper/JohnTheRipper`](https://github.com/magnumripper/JohnTheRipper)。\n\
    \n此外，请实施以下措施：\n\n- **保护凭据**：使用多层机制保护用户凭据。\n- **强密码**：在创建账户和重置密码时强制使用强密码。\n- **启用\
    \ 2FA**：设置双因素认证（2FA），例如`Google Authenticator`就是常见方案。\n- **确认机制**：对转账等重要操作，要求同时进行短信确认和邮件验证。\n\
    - **存储**：将用户敏感数据（如私钥）加密后存储在与互联网隔离的服务器上。\n- **加密**：在所有页面使用 SSL。使用 AES-256 加密。密码哈希采用成本因子为\
    \ 12。\n- **锁定账户**：限制登录尝试次数，多次失败后锁定账户。\n\n## 个人开发电脑安全\n\n- **远程连接**：使用强登录密码，特别是通过远程方式连接时。\n\
    - **加密数据**：加密硬盘驱动器。进入系统偏好设置，选择“隐私与安全性”，点击“开启 FileVault”。\n- **闲置锁定**：在“通用”标签页的“高级”中，设置为闲置\
    \ 5 分钟后退出登录，并启用屏幕锁定（选择“需要管理员密码才能访问系统偏好设置”）。\n- **防火墙**：在计算机上设置防火墙；在“防火墙”标签页中开启防火墙。\n\
    - **VPN**：在不安全的网络环境下工作时使用 VPN。\n- **软件**：注意安装的软件来源，确保来自信誉良好的供应商。\n- **库**：尽量避免以\
    \ root 权限安装代码库。\n\n## 缺陷代码\n\n缺陷代码是造成损失的最大原因之一。这一问题已变得极为严重，许多大公司为白帽黑客设置赏金以发现漏洞，这使得黑客指出缺陷（而非窃取）也能获利。\n\
    \n> **说明**：白帽黑客是道德人士，他们通过未经授权访问数据来指出系统缺陷。\n\n例如，2014 年，黑客利用 Poloniex 的提款代码缺陷进行攻击。该公司未公开被盗比特币的确切数量。\n\
    \n### 事后分析\n\n作为开发者：\n\n- **SQL 注入**：通过测试和实施 SQL 注入过滤器来防范。更多信息可参考：[`http://sqlmap.org/`](http://sqlmap.org/)。\n\
    \n> **注意**：SQL 注入攻击是指黑客通过文本输入框传递非法 SQL 语句来获取内容。攻击者可利用此漏洞对 SQL 数据库进行添加、修改或删除数据操作。\n\
    \n- **CSRF 攻击**：黑客利用服务请求修改和检索数据，并验证 POST、PUT 和 DELETE 请求的真实性。为防范此类攻击，建议：\n  -\
    \ **限制 IP**：设置服务仅响应特定 IP 地址。\n  - **使用工具和库**：查找防范 CSRF 攻击的工具，可参考：[`https://github.com/0xInfection/XSRFProbe`](https://github.com/0xInfection/XSRFProbe)。\n\
    \n- **跨站脚本攻击（XSS）**：使用以下工具和库防范 XSS 攻击：\n  - [`https://pentest-tools.com/website-vulnerability-scanning/xss-scanner-online`](https://pentest-tools.com/website-vulnerability-scanning/xss-scanner-online)\n\
    \  - [`https://github.com/topics/xss-scanner`](https://github.com/topics/xss-scanner)\n\
    \n> **注意**：XSS 攻击是通过向受信任网站注入恶意代码来执行的。\n\n## 依赖包后门攻击\n\n依赖包后门攻击始于社会工程攻击，包括注入恶意代码。\n\
    \n> **说明**：社会工程攻击中，攻击者扮演骗子角色，隐藏真实身份和动机以获取访问权限或数据。例如，收到看似来自经理的合法邮件，要求提供特定信息。\n\n\
    例如，2018 年底，一名黑客成功将恶意代码插入`event-stream`（一个`npm`JavaScript 库：[`https://www.npmjs.com/package/event-stream`](https://www.npmjs.com/package/event-stream)）。该库被数百万人使用，目标是一家名为\
    \ Bitpay 的公司，该公司拥有一个名为`copay`的 Git 库。`copay`是一个开源钱包，托管在 GitHub 上（[`https://github.com/bitpay/copay`](https://github.com/bitpay/copay)）。与许多开源库一样，开发者并未因`event-stream`的工作获得报酬，后来失去兴趣，将项目交给新的维护者。新维护者注入了针对`copay`的恶意代码，该代码捕获账户余额超过\
    \ 100 比特币或 1000 比特币现金的账户详情和私钥。`copay`在 5.0.2 版本中更新了依赖库，包含攻击者代码，导致数百万损失。该代码捕获受害者账户数据和私钥，通过服务调用将数据发送到攻击者服务器而不被发现。\n\
    \n此攻击的详细内容和分析可参考：\n- [`https://blog.npmjs.org/post/180565383195/details-about-the-event-stream-incident`](https://blog.npmjs.org/post/180565383195/details-about-the-event-stream-incident)\n\
    - [`https://snyk.io/blog/a-post-mortem-of-the-malicious-event-stream-backdoor/`](https://snyk.io/blog/a-post-mortem-of-the-malicious-event-stream-backdoor/)\n\
    \n### 事后分析\n\n作为用户，如本章所建议，将加密资产存放在冷钱包中。作为开发者，处理开源库时需要谨慎。开源模型依赖众多软件包，但只有少数开发者维护这些库，可能导致恶意接管。为帮助防范此类风险，运行`npm\
    \ audit`检测任何易受攻击的依赖项：\n\n```\n> npm audit\n```\n\n在漏洞数据库（如 snyk.io 网站：[`https://snyk.io/vuln`](https://snyk.io/vuln)）中检查并测试代码是否存在已知漏洞。\n\
    \n不要将`package.json`文件设置为包含自动更新库：\n\n```\n\"dependencies\": { \"some-library\"\
    : \"latest\" }\n```\n\n而应检查所需更新库的拉取请求，并手动检查所使用依赖项的更改。使用库的特定版本：\n\n```\n\"dependencies\"\
    : { \"some-library\": \"1.0.0\" }\n```\n\n`npm install`也是如此。安装特定库，尤其是对于不太知名的库：\n\
    \n```\n> npm install -g some-library@1.0.0\n```\n"
- fmt: "# DoS and DDoS Attacks\n\nA *denial-of-service* (DoS) attack is a common attack\
    \ intended to prevent users from accessing a service. A *distributed denial-of-service*\
    \ (DDoS) attack is similar to DoS, but instead of the attacker utilizing a single\
    \ machine to attack, the attacker uses multiple machines all attacking at the\
    \ same time. Because of the usage of multiple machines, the chances of a successful\
    \ attack increases, and it’s harder to pinpoint the attacker’s exact location.\n\
    \nExchanges and web sites are popular targets for DoS and DDoS attacks. For instance,\
    \ when bitcoin gold officially launched, it was targeted by a DDoS attack that\
    \ ended up crashing the web site for hours. Popular blockchain networks have a\
    \ simple built-in DoS prevention mechanism; however, many networks are not protected\
    \ against more sophisticated attacks.\n\nThe most common types of attacks are\
    \ as follows:\n\n- *Buffer overflow*: This attack sends more traffic to the target\
    \ service than the service is able to handle. This attack can give the attacker\
    \ the ability to crash and even control the targeted service.\n- *ICMP flood*:\
    \ Also known as “the ping of death” or a “smurf attack,” this attack is intended\
    \ to overload the network by forcing a node to distribute bogus packets to all\
    \ nodes, which results in an overload on the network.\n- *SYN flood*: A request\
    \ to connect is sent, but it never gets fully authenticated. The requester then\
    \ attacks all the open ports on the server until the server crashes.\n- *NTP/DNS\
    \ amplification*: This is an attack on NTP servers, where the attacker sends a\
    \ large number of UDP packets and spoofs the source IP address, making the NTP\
    \ server believe that these packets are legit traffic from the intended target.\
    \ The overload causes the NTP server to crash.\n\n## Postmortem\n\nAs a developer,\
    \ you need to take DoS/DDoS attacks into account and implement countermeasures\
    \ against them. See the following examples:\n\n- *Filter bad traffic*:\n  - *Script*:\
    \ One way to prevent is to implement a script to check for DoS/DDoS attacks. Check\
    \ out the GitHub DDoS protection libraries: [`https://github.com/topics/ddos-protection`](https://github.com/topics/ddos-protection).\
    \ [`http://vddos.voduy.com/`](http://vddos.voduy.com/) is a popular one.\n  -\
    \ *Firewall*: Use a firewall to block bad traffic. See Figure [11-6](#475651_1_En_11_Chapter.xhtml#Fig6).\n\
    \n![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig6_HTML.jpg](images/475651_1_En_11_Chapter/475651_1_En_11_Fig6_HTML.jpg)\n\
    \n**Figure 11-6** DDoS protection reverse proxy explained. Photo credit: vddos.voduy.com.\n\
    \n- *Dedicated hardware*: Purchase and deploy dedicated hardware to handle mitigations\
    \ of DDoS attacks. The hardware sits in a data center in front of the servers\
    \ and routers and can detect and filter malicious traffic. An example of such\
    \ hardware is `FortiDDoS` from [`www.fortinet.com`](http://www.fortinet.com).\n\
    - *ISP*: ISPs provide DDoS mitigation solutions to customers. For instance, Amazon\
    \ provides a shield where all AWS customers benefit from automatic protections\
    \ and provides a higher-tier levels of protection against attacks; see [`https://aws.amazon.com/shield`](https://aws.amazon.com/shield).\n\
    - *Cloud mitigation*: Some cloud services provide DoS/DDoS mitigation. These services\
    \ scrub the traffic to eliminate any malicious traffic. A popular provider is\
    \ [`cloudflare.com`](http://cloudflare.com), which provides a free standard version\
    \ and paid enterprise solution.\n\nIn terms of a blockchain network DoS/DDoS attack,\
    \ examine existing blockchain prevention implementations such as the bitcoin satoshi\
    \ client protection, which was implemented in version `0.7.0`; see [`https://en.bitcoin.it/wiki/Weaknesses`](https://en.bitcoin.it/wiki/Weaknesses).\n\
    \nTo summarize, I reviewed common attacks on platforms. You looked at credential\
    \ attacks, faulty code, dependency backdoor attacks, and DoS/DDoS attacks. Additionally,\
    \ I reviewed ways to help you reduce the risk and prevent these attacks. In the\
    \ next section, I will give you a suggested development cycle you can employ to\
    \ help reduce the risks and to use a methodological approach to prevent attacks.\n\
    \n## Development Cycle\n\nAs you saw throughout this chapter, your platform needs\
    \ to be secure and protected against potential attacks. You cannot rely on luck\
    \ and need to ensure you use all the available measures to reduce the risk of\
    \ an attack on your platform as well as ensure you implement all the latest regulations\
    \ related to your locale.\n\nThe process can be broken into the following phases:\n\
    \n- *Design and coding*\n- *Discover, audit, and test*\n- *Readiness assessment*\n\
    - *Release*\n\nAs you can see from Figure [11-7](#475651_1_En_11_Chapter.xhtml#Fig7),\
    \ each phase can result in going back to the design and coding phase as the findings\
    \ can result in a security risk or a showstopper.\n\n![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig7_HTML.jpg](images/475651_1_En_11_Chapter/475651_1_En_11_Fig7_HTML.jpg)\n\
    \n**Figure 11-7** Suggested development cycle to reduce security and compliance\
    \ risks\n\n> **Tip**  \n> This development is a basic approach for a development\
    \ cycle. Feel free to employ your own approach or a different approach that fits\
    \ your platform and needs better.\n\n### Design and Coding\n\nPrior to and during\
    \ the design and coding phase, you should incorporate all the security, privacy,\
    \ and compliance elements discussed in the early part of this chapter. These should\
    \ be taken into account for all the elements of your platform, including the pages,\
    \ login system, privacy page, integrations with third-party plugins, the creation\
    \ of services, setting up servers, and so on.\n\nIt is a good idea for you to\
    \ create your own checklist of everything that needs to be incorporated and taken\
    \ into account that specifically applies to your unique platform. It’s not possible\
    \ to get one list that fits everything. Every platform should have a unique checklist.\
    \ Additionally, as you start a new development cycle, you may need to update the\
    \ requirements. For instance, let’s say you want your platform to be supported\
    \ in a new locale; this will require a new checklist.\n\n### Discovery, Audit,\
    \ and Test\n\nThis step can be broken into three steps. The steps are intertwined\
    \ and rely on one another, so you should consider these steps as one phase. These\
    \ steps are as follows:\n\n- *Discovery*: Find out the versions used in your platforms\
    \ such as versions of libraries, firmware, software, third-party SDKs, and so\
    \ on.\n- *Audit*: Audit your code and platform to find common problems, accessibility\
    \ of your services, and performance issues that can degrade and make your platform\
    \ inaccessible.\n- *Test*: This is when you run actual tests against your platform.\
    \ The purpose is to identify the systems and services that your platform is using\
    \ and potential security vulnerabilities."
