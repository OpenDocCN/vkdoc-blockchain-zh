    ### Transactions that Require Multisignature

    So far you have been doing standard “single-signature transactions,” as you needed
    only one signee with one signature to sign a transaction and perform the transfer.
    However, the bitcoin network supports a more complicated transaction. These transactions
    can be set to require a signature of multiple signees. For instance, institutions,
    partners, spouses, or programmed scripts may want to have all parties sign instead
    of just one. These cases would need all the users’ private keys before funds could
    be sent.


    To do a multiple-signees transaction, you will create two separate wallets for
    testing. You can run bitcoin core on two separate machines and use the RPC calls
    to generate a new public address for each wallet, or you can download the Electrum
    wallet at [`https://electrum.org/#download`](https://electrum.org/%2523download)
    and run it in testnet mode to generate your second wallet.


    As a first example, you will run Electrum because you can use its built-in multisignature
    wallet to understand this process. Once you complete downloading Electrum, run
    Electrum as testnet via the command line.


    ```

    > open -n /Applications/Electrum.app --args –testnet

    ```


    ### Setting Electrum with a Multisignature Wallet

    After Electrum starts, select “Multi-signature wallet” for the create wallet option
    and then click Next. See Figure [4-12](#475651_1_En_4_Chapter.xhtml#Fig12).


    ![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig12_HTML.jpg](images/475651_1_En_4_Chapter/475651_1_En_4_Fig12_HTML.jpg)


    Figure 4-12 Electrum multisignature wallet


    On the next screen, you can select how many cosigners are required and how many
    signatures are needed. These transactions are often referred to as *M-of-N transactions*,
    for instance, a 2-of-3 scenario. A 2-of-3 would mean you need at least two private
    keys (signatures) from three cosigners to authorize the transaction. You can move
    the sliders to better understand this feature, as shown in Figure [4-13](#475651_1_En_4_Chapter.xhtml#Fig13).


    ![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig13_HTML.jpg](images/475651_1_En_4_Chapter/475651_1_En_4_Fig13_HTML.jpg)


    Figure 4-13 Electrum multisignature wallet cosigners and signatures


    Here, select a 2-of-2 multisignature wallet, which means two cosigners and two
    signatures. Then click the Next button. On the following screen, click “Create
    a new seed” and click the Next button.


    On the following screen, you can choose the seed type. Standard means `P2PKH`
    or SegWit, which means a `P2SH-SEGWIT`, so select Standard and click Next.


    For the next step, you are given a seed that represents your private key. Store
    your seed and be careful not to share it with anyone. You are then provided with
    what Electrum calls your *master* public key, and you are asked to share it with
    your cosigners, as shown in Figure [4-14](#475651_1_En_4_Chapter.xhtml#Fig14).


    ![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig14_HTML.jpg](images/475651_1_En_4_Chapter/475651_1_En_4_Fig14_HTML.jpg)


    Figure 4-14 Electrum install wizard master public key'
  raw: 'As you have seen, to create a transaction, you generate a signature from the
    wallet’s public hash and the private key hash. The transaction output script takes
    the public key and the signature and checks to see whether you have a match to
    the public key hash. If results are true, you are able to spend the coins; otherwise,
    you can’t.


    ### Note


    A public key visible in the transaction is a type of transaction called Pay to
    Pubkey (P2PK). A hidden public key as you have been using is a type of transaction
    called Pay to PubKey Hash (P2PKH).


    You will sign your transaction via P2PKH to match your wallet’s type. There are
    two ways to sign the transaction; you can use `signrawtransactionwithkey` or `signrawtransactionwithwallet`.


    These two signed methods are available in 0.18.0 RPC, including inputs for raw
    transactions in a serialized hex-encoded format.


    The `signrawtransactionwithwallet` command format is as follows:


    ```

    signrawtransactionwithwallet "hexstring" ( [{"txid":"id","vout":n,"scriptPubKey":"hex","redeemScript":"hex"},...]
    sighashtype )

    ```


    Notice that the `signrawtransactionwithwallet` command allows you to include a
    second argument called “prevtxs”. “prevtxs” is formatted as an array that includes
    the previous transaction outputs. If you decide to utilize and insert value for
    “prevtxs” the transaction will depends on the previous transaction that may not
    even be in the blockchain yet. In case you don’t need this feature just set “prevtxs”
    to null.


    The `signrawtransactionwithkey` command format is as follows:


    ```

    signrawtransactionwithkey "hexstring" ["privatekey1",...]

    ```


    Notice that the second argument is a base58-encoded array of private keys that
    will be the only keys used to sign the transaction. The third optional argument
    is an array of previous transaction outputs that this transaction depends on but
    may not yet be in the blockchain.


    In our case, you will not include the second argument because your transaction
    does not need to depend on other conditions.


    ```

    > bitcoin-cli signrawtransactionwithwallet $rawtxhex

    {

    "hex": "",

    "complete": true

    }

    ```


    The previous command returned signed, hex-encoded data in the JSON response. Use
    that data to set the hex for the `signedtx` variable.


    ```

    > signedtx=""

    ```


    That’s it; you can now send your transaction via the `sendrawtransaction` command.


    ```

    > bitcoin-cli sendrawtransaction $signedtx

    ff75dbb08da6f4dc6463dd32d8f9b1a4781e1eeee338e93e82820d0fdfbd43ff

    ```


    The output gets you a `txid` response that you can check in the Blockchain Explorer
    as you did before. You can also verify that the funds were removed from your account
    via the `getbalance` command.


    ```

    > bitcoin-cli getbalance

    0.09413028

    ```


