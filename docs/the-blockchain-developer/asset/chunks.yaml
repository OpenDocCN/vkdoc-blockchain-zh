    # 以太坊对比 EOS 对比 NEO：智能合约开发者视角的对决


    至此，我已经涵盖了三个主要的智能合约开发区块链平台，很难不对它们进行比较。然而，在比较这三个平台时，需要考虑的因素非常多。此外，在撰写本文时，已有超过 40
    个区块链项目可供你选择部署智能合约。每个项目都有其优缺点，本书无法一一涵盖。相反，我将侧重于具体的评判标准，试图帮助你理解，在从我目前介绍的三个平台中选择一个时，需要考虑哪些因素。


    有一个组织试图对这些不同的区块链进行评级，它叫做中国电子信息产业发展研究院（CCID）。CCID 利用来自中国最负盛名的教育机构（包括清华大学和北京大学）的教授和研究人员的贡献，综合考虑特性、采用率以及许多其他指标，对每个区块链进行排名。然而，这些排名经常变动，你应在网站
    [`http://special.ccidnet.com/pub-bc-eval/index.shtml`](http://special.ccidnet.com/pub-bc-eval/index.shtml)
    上查看最新的区块链排名。请注意，在撰写本文时，EOS 和以太坊已连续第四次在 CCID 榜单上保持领先地位。


    此外，决定使用哪个区块链来发布智能合约还应考虑更多因素，例如你团队的能力、资金、所需的交易数量、所需的账户数量、钱包、交易所等等。


    在判断一个区块链的健康状况时，另一个要考虑的主要指标是用户和开发者的采用情况。你可以通过查看以下网站来了解不同智能合约平台的当前 dApp 数量：


    *   *EOS*: [`https://dappradar.com/eos-dapps`](https://dappradar.com/eos-dapps)

    *   *以太坊*: [`https://dappradar.com/dapps`](https://dappradar.com/dapps)

    *   *NEO*: [`http://ndapp.org/`](http://ndapp.org/)


    浏览 dApp 列表时请记住，尽管在撰写本文时 Dappradar.com 上列出了 6,050 个 dApp，但只有 106,938 个用户，这表明实际被使用的
    dApp 很少，大规模普及尚未到来。


    另外请注意，此比较在撰写本文时有效，且基于我个人的观点。在选择理想的区块链以满足你的智能合约需求之前，你应该进行自己的研究和尽职调查。表 7-1 提供了比较。


    **表 7-1** 以太坊对比 EOS 对比 NEO 智能合约比较


    | 类别 | 以太坊 | EOS | NEO |

    | --- | --- | --- | --- |

    | 采用率 | 目前保持领先 | 稳步增长 | 三者中最低 |

    | CCID 排名 | 第 2 名 | 第 1 名 | 第 5 名 |

    | 共识机制 | PoW | DPoS | dBFT |

    | 每秒交易数 | 15 | 百万级 | 每秒 10,000 笔交易 |

    | dApp 部署成本 | 最低 32,000 gas 费用，加上每字节源代码 200 gas | ~120 EOS | 固定费用 100 到 1,000
    gas；ICO 注册数字资产需 5,000 gas；每年续费 5,000 gas |

    | 交易成本 | 0.05 到 3.5 美元 | 0 美元（但是，创建新账户每账户需支付 1 到 4 美元，由应用开发者承担） | 初始 10 gas 免费执行，系统调用和指令需付费（见白皮书）
    |

    | 可扩展性 | 不支持；等待硬分叉 | 支持 | 支持 |

    | 开发工具 | 来自项目和社区的成熟开发工具，包括开发框架、IDE、通信和测试工具 | 开发工具尚需升级；调试仍采用原始方法 | 成熟的开发工具 |

    | 文档 | 项目和社区均有完善的文档 | `Developers.EOS.IO` 文档和社区教程未能与 EOS.IO GitHub 变更保持同步；存在许多关于安装的
    GitHub 问题 | 项目文档（[`http://docs.neo.org`](http://docs.neo.org)）和社区教程 |

    | 社区支持 | 以太坊社区基金（ECF），获得组织支持：微软、英特尔、亚马逊、摩根大通，甚至政府参与 | 承诺投入 *10 亿* 美元资金，专注于 EOS
    生态系统发展 | 已举办并支持了超过 100 场社区活动 |

    | 开发语言 | Solidity, Bamboo, Vyper, LLL, Flint | C, C++ | C#, VB.NET, F#, Java,
    Kotlin 以及 Python；未来计划支持更多语言 |

    | 市值 | 14,068,553,166 美元 | 2,341,702,969 美元 | 488,507,580 美元 |

    | dApp 数量 | *1,324* | 226 | 少于 100 |

    | 钱包 | 桌面和硬件钱包，选项多于 EOS 和 NEO | 桌面和硬件钱包 | 桌面和硬件钱包 |

    | 大型交易所支持 | 所有主流交易所均可交易 | 许多主流交易所（如 Coinbase）尚未支持 | 许多主流交易所（如 Coinbase）尚未支持 |

    | 图灵完备 | 是 | 否 | 否 |


    以下列表总结了以太坊、EOS.IO 和 NEO 区块链平台的优缺点：


    *   以太坊最大的优点是它是第一个也是最受欢迎的智能合约平台，拥有最多的开发者、第三方工具、支持、文档和社区支持。最大的缺点是使用 PoW 带来的可扩展性问题；在撰写本文时，正在进行硬分叉以解决此缺点并将以太坊迁移到
    PoS。另一个缺点是源代码每字节 200 gas 的成本；如果你的代码未经优化，这会很昂贵，尤其是你需要不断重新发布代码时。最后，对像 Solidity 这样不太流行的编程语言的支持不够理想。


    *   EOS 的优势在于其可扩展性以及无需改动即可每秒处理数百万笔交易的能力，以及使用 WASM 实现更快的代码执行。EOS 支持 C 和 C++，并且其区块链本身用
    C++ 编写，这使其具有优势，因为 C 语言的开发者基础比 Solidity 更庞大。然而，EOS 在采用率方面仍有很长的路要走，提供 10 亿美元的资金对有合适想法的公司和个人可能很有用。其高排名和出色的特性并不足以取代以太坊它所声称的主导地位。只有时间能给出答案。


    *   NEO 支持主流编程语言（C#、VB.NET、Java 和 Python），这使其具有巨大优势，因为大量开发者可以通过较小的学习曲线进行编码。此外，合约计算的高效和低成本是其优势；然而，NEO
    是三个平台中社区支持最小的，每年注册数字资产所需的 5,000 NeoGas 的硬性规定可能会让许多潜在项目望而却步。


    ## 下一步做什么


    试试这些资源：


    *   在此处阅读 NEO 文档：[`http://docs.neo.org`](http://docs.neo.org)。该网站包括示例 NeoContract
    的教程、创建 NEO 节点、NEO 实用工具、白皮书等。

    *   访问 [`https://neo.org/client`](https://neo.org/client) 查找第三方 NEO 钱包。

    *   对于调试，请查看 `Neunity.Adapter` 或 `Neo-Debugger` 以在 IDE 中编写测试用例并运行源代码：[`https://github.com/CityOfZion/neo-debugger-tools/releases`](https://github.com/CityOfZion/neo-debugger-tools/releases)。

    *   创建更多的 NeoContract，并包含通过 `neo.EventHub` 分发的 `SmartContractEvent`；订阅并测试你的合约。

