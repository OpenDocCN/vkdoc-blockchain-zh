- fmt: "### Sending Testnet Coins via the Bitcoin Core Wallet GUI\n\nYou initialized\
    \ a Bitcoin Core instance with the `testnet` flag; however, there is another even\
    \ easier way to send and receive coins. Bitcoin Core includes a GUI wallet you\
    \ can use. You will be utilizing the GUI software that comes out of the box with\
    \ Bitcoin Core. To get started, terminate the `bitcoind` daemon in Terminal by\
    \ pressing `Control+C` and then run `bitcoin-qt` in a command-line terminal with\
    \ the `testnet` flag so you connect to testnet and not mainnet.\n\n```bash\n>\
    \ bitcoin-qt –testnet\n```\n\nThis command opens a new window and then syncs with\
    \ the testnet blockchain. Just as before, if you did not complete a testnet sync,\
    \ it may take hours, depending on your Internet connection, as shown in Figure\
    \ [4-5](#475651_1_En_4_Chapter.xhtml#Fig5). However, at the wallet GUI, you will\
    \ see an estimated time for how long the sync will take.\n\n![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig5_HTML.jpg](images/475651_1_En_4_Chapter/475651_1_En_4_Fig5_HTML.jpg)\n\
    \n*Figure 4-5* — Bitcoin wallet testnet GUI sync with testnet network\n\nAs before,\
    \ you need to wait for the sync to complete; only then can you retrieve your wallet’s\
    \ public key address and spend your coins. In the Overview menu you will see the\
    \ balances, including the confirmed (Available) funds and the unconfirmed (Pending)\
    \ funds. You can also get a list of transactions by clicking the Transactions\
    \ button at the top. See Figure [4-6](#475651_1_En_4_Chapter.xhtml#Fig6).\n\n\
    ![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig6_HTML.jpg](images/475651_1_En_4_Chapter/475651_1_En_4_Fig6_HTML.jpg)\n\
    \n*Figure 4-6* — Bitcoin Core wallet overview screen\n\nTo create a new wallet’s\
    \ public key address, click Receive at the top and then click the Request Payment\
    \ button. This will generate an address for your wallet, as shown in Figure [4-7](#475651_1_En_4_Chapter.xhtml#Fig7).\n\
    \n![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig7_HTML.jpg](images/475651_1_En_4_Chapter/475651_1_En_4_Fig7_HTML.jpg)\n\
    \n*Figure 4-7* — Bitcoin Core wallet, receive coins screen\n\nAs you can see,\
    \ the GUI created a QR code for your convenience. You can scan it when you send\
    \ coins, where this feature is supported. Now, let’s go ahead and send some more\
    \ coins to your wallet via the testnet faucet at [`https://live.blockcypher.com/btc-testnet/`](https://live.blockcypher.com/btc-testnet/).\n\
    \nAs you can see, you can then receive coins just as you did via the command line.\
    \ Next, you will send some coins.\n\nYou will be sending 0.01 BTC back to the\
    \ testnet faucet for other developers to use. To do so, click the Send button\
    \ at the top of the GUI and paste in the testnet faucet wallet address that was\
    \ provided to you when you sent coins to your wallet.\n\nNotice that there is\
    \ a Choose button next to Transaction Fee in the Bitcoin Core wallet GUI. This\
    \ allows you to select the fee, as well as the number of confirmations. It also\
    \ includes a way to enable a “replace by” fee. This feature allows you to change\
    \ the fee in case the fee is too low and the transaction is not getting included\
    \ in the block. See Figure [4-8](#475651_1_En_4_Chapter.xhtml#Fig8).\n\n![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig8_HTML.jpg](images/475651_1_En_4_Chapter/475651_1_En_4_Fig8_HTML.jpg)\n\
    \n*Figure 4-8* — Bitcoin Core wallet send screen\n\nThe testnet faucet sends coins\
    \ to the wallet address you provided. When you send and receive coins, you get\
    \ a notification pop-up from the GUI and an updated balance on the overview screen.\
    \ Click the Transactions button to see the transaction’s information. You can\
    \ also click each transaction to see the actual transaction data. This is similar\
    \ to what you saw with the `listtransactions` command. See Figure [4-9](#475651_1_En_4_Chapter.xhtml#Fig9).\n\
    \n![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig9_HTML.jpg](images/475651_1_En_4_Chapter/475651_1_En_4_Fig9_HTML.jpg)\n\
    \n*Figure 4-9* — Bitcoin Core wallet transaction\n\n### Raw Transaction\n\nSo\
    \ far you have received one transaction into your wallet via the command line\
    \ as well as coins using the Bitcoin Core GUI. You also were able to view confirmations,\
    \ the fees balance, and transactions. If you send funds back to the testnet faucet\
    \ and receive coins, things are simple. This is called a one-input, one-output\
    \ transaction, as you have one sender and one receiver, and you spent the same\
    \ amount you received (minus the fees). In real life, transactions can become\
    \ more complex as there are many use cases where there are one input and multiple\
    \ outputs or multiple inputs and multiple outputs. Bitcoin Core provides you with\
    \ sets of commands to access a raw transaction (`RawTransaction`) so you can have\
    \ more granular control over your transaction.\n\nYou will start with the simple\
    \ one-input, one-output transaction via the RPC command line.\n\n**Note:**  \n\
    Creating and understanding `RawTransaction` is useful for building software, as\
    \ you have full granular control over your transaction. However, making mistakes\
    \ can result in a catastrophic outcome and loss of coins, so use caution and double-check\
    \ everything before sending any funds.\n\nWhen you receive a transaction, the\
    \ transaction stays in a state called *unspent transaction output* (UTXO) in your\
    \ wallet. To send a one-input, one-output transaction, you need your amount to\
    \ be equal to the funds you want to send. You can then generate a new UTXO for\
    \ the receiver you are sending the coins to. The receiver can use these UTXOs\
    \ to send transactions to a new receiver or receivers, and this process can continue\
    \ endlessly.\n\n**Note:**  \nA UTXO is an individual incoming coin transaction\
    \ in your wallet. When you receive multiple transactions to one or multiple wallets’\
    \ addresses, each stays as a UTXO, so you will have multiple UTXOs. To create\
    \ a new outgoing transaction, you collect one or more UTXOs as needed depending\
    \ on how much you are trying to send.\n\nNow, what if your UTXO includes a larger\
    \ amount than you would like to spend? Then you would need to send the remaining\
    \ of the coins back to your wallet. To get a list of unspent coins, you can use\
    \ the `listunspent` command.\n\nClose the Bitcoin Core GUI wallet via `Control+C`\
    \ and start the daemon again with the `testnet` flag.\n\n```bash\n> bitcoind -testnet\n\
    ```\n\nWhen you run the `getbalance` command, you get your wallet’s balance, which\
    \ includes the two transactions you received from [`https://live.blockcypher.com/btc-testnet/`](https://live.blockcypher.com/btc-testnet/)\
    \ less the transaction you sent back to the testnet faucet.\n\n```bash\n> bitcoin-cli\
    \ getbalance\n0.18505841\n```\n\nI would like to point out that at any time you\
    \ can use the `-named` flag instead of using order arguments. The named argument\
    \ is useful to ensure you are not making mistakes when working with mainnet. For\
    \ instance, a `getbalance` command with the named argument would look as follows:\n\
    \n```bash\n> bitcoin-cli -named getbalance minconf=2\n0.18505841\n```\n\nNext,\
    \ let’s take a look at the `listunspent` command. As the name suggests, it returns\
    \ JSON with transactions for coins you did not spend, in other words, your UTXOs.\
    \ The `listunspent` command also returns JSON with a variable called `vout`, which\
    \ represents the index number of the output in a transaction."
