  trans: '好的，作为一名高级文档工程师和翻译员，我已遵循您的所有注意事项和示例格式，将给定的英文文本翻译成了中文。



    # 注意事项


    `交易所`将用户的加密货币私钥在线存储在所谓的*热钱包*或运营钱包中。之所以将这些私钥存储在线，是为了允许从钱包进行实时提现。


    ## 事后反思


    作为用户，避免这些损失的最佳方法是将您的加密货币保存在您自己控制的冷钱包中，而不是中心化交易所中。


    作为开发者，请执行以下操作：


    *   **保留冷钱包**：将用户的密钥存储在冷存储中，并尽可能避免使用热钱包。例如，Coinbase.com 声称其将 98% 的用户资金保存在分布在各地的保险箱内的纸质备份中。

    *   **加密私钥**：如果需要将私钥存储在与在线网络连接的存储设备上，至少要使用强加密密钥对密钥进行加密。

    *   **监控异常活动**：例如，许多交易所对大宗提现进行人工审批。


    # 区块链网络攻击


    在本节中，我将介绍针对区块链网络的常见攻击。


    ## Sybil 攻击


    Sybil 这个名字是多发性人格障碍患者的代名词。


    ### 注意


    区块链 Sybil 攻击是指某个实体试图通过创建多个身份并控制多个节点来影响 P2P 网络。


    Sybil 攻击通过创建多个虚假账户来控制网络。控制这些多个账户的实体随后可以影响网络，因为他们在民主网络中拥有额外的投票权。一个易于理解此概念的例子是 2017
    年的美国大选，一个实体（俄罗斯）通过创建多个社交媒体账户并控制其内容来影响选举过程。


    区块链的例子是，攻击者试图通过在 P2P 网络上创建多个 Sybil 身份来获得超过诚实节点的投票权。通过获得多数投票，攻击者可以拒绝接收区块或传输虚假区块。如果
    Sybil 攻击的规模足够大，它们就能够控制 P2P 网络的大部分算力并更改区块，这便构成了双花攻击。


    ### 事后反思


    作为开发者，您可以通过使 Sybil 攻击变得不切实际来阻止它们。如果发动 Sybil 攻击需要付出成本，例如创建账户、运行服务器、消耗电力等，那么这可能会阻止攻击或使其不切实际。然而，请确保考虑到那些需要创建多个账户的合法用户。


    事实上，流行的区块链一直在考虑如何应对 Sybil 攻击。例如，比特币的 `PoW` 共识算法需要大量的处理能力，因此创建区块的速率与总算力成正比。这阻止了攻击者，因为矿工更愿意进行实际挖矿，而不是冒着在失败的
    Sybil 攻击中遭受损失的风险。类似地，`PoS` 共识算法需要质押代币，因此攻击者将面临损失这些代币的风险。


    此外，正如您在之前的章节中所见，以太坊、EOS 和 NEO 的 `dapps` 部署都包含了高昂的成本。以太坊的最低费用为 32,000 gas 外加每字节
    200 gas，EOS 约为 120 个代币，NEO 的固定成本为 100 到 1,000 gas。除此之外，许多区块链（如比特币、以太坊和 NEO）都会收取交易费，这有助于阻止攻击者。同样，EOS
    不收取交易费，但它使用“信任链”来对抗攻击者。


    ### 注意


    *信任链*是一种对抗 Sybil 攻击的方法，它在允许新身份加入网络之前要求信任。信任链的一种版本可以包括允许用户创建新账户，但在特定时间内不授予其完全权限。


    EOS 为每个新账户向开发者收取 1 到 4 美元的费用；显然，开发者会不愿意创建账户，并且会采取措施来使账户获得批准。


    另一种对抗 Sybil 攻击的方法是将层级结构从民主制改为精英制（由经过筛选的人管理）。创建时间较早且声誉良好的用户将比新账户拥有更大的权重。可以参考 Stackoverflow.com
    或 Wikipedia.com 的声誉系统；参见 [`https://stackoverflow.com/help/whats-reputation`](https://stackoverflow.com/help/whats-reputation)。


    ## 双花或 51% 攻击


    在本书的前面部分，我讨论了针对加密货币潜在的“双花”攻击，即恶意节点获得对区块链网络超过 50% 算力的控制权，从而能够篡改和操纵区块。像比特币和以太坊这样的大型区块链，由于矿工竞争，需要极高的资源门槛，因此不容易被
    51% 攻击所攻破。例如，根据 [`https://www.crypto51.app`](https://www.crypto51.app) 的数据，在撰写本文时，攻击比特币的理论成本为
    257,472 美元；参见图 11-2。


    ![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig2_HTML.jpg](img/475651_1_En_11_Fig2_HTML.jpg)


    **图 11-2** 对多种区块链进行 51% 攻击的理论成本


    然而，较小的区块链一直是 51% 攻击的目标。这发生在 Verge 区块链上，它在两次攻击中损失了近 300 万美元。比特币黄金遭受了 1800 万美元的最大损失，以太坊经典损失了
    110 万美元。实际上，在 2018 年和 2019 年不到一年的时间里，总损失达到了 2300 万美元；参见图 11-3。


    ![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig3_HTML.png](img/475651_1_En_11_Fig3_HTML.png)


    **图 11-3** 从 2018 年到 2019 年 1 月的双花损失


    ### 事后反思


    作为投资者，您应该检查攻击您有兴趣投资的区块链的成本，以及该区块链是否存在安全网机制。


    区块链开发者应该创建某种安全网机制，例如，创建一个哈希来保存每个区块所有交易和余额的快照，然后将该哈希存储到更大的区块链中。例如，您可以像在第 4 章中所做的那样，利用比特币的
    `OP_RETURN` 功能，将哈希作为备份存储起来，以防发生 51% 攻击。


    事实上，[`http://komodoplatform.com`](http://komodoplatform.com) 通过创建延迟工作量证明（`dPoW`）安全机制，成功解决了双花问题。


    ## 矿工勒索软件


    正如我所提到的，比特币迄今未受这些 51% 攻击的影响；然而，黑客找到了一种通过勒索软件攻击矿工来影响区块链的新方法。


    ### 注意


    勒索软件是一种恶意软件，旨在阻止对计算机的访问，直到支付赎金。这个名字是*赎金*和*软件*两个词的组合。


    黑客使用与勒索软件攻击个人电脑类似的技术来锁定矿机。在个人电脑上，恶意软件（例如 NotPetya 勒索软件）会被下载并安装，然后能够锁定用户的计算机，直到向某个钱包地址支付赎金。


    到目前为止，勒索软件只针对个人电脑；然而，像 `hAnt` 这样的新型勒索软件开始瞄准矿工。`hAnt` 的安装方式尚不清楚，但据估计，它可能是随某个版本的矿机固件一起被下载的。然后勒索软件就能访问矿机的固件并控制矿机。

