    \ technology and digital identity to digitize assets and automate the management\
    \ of digital assets using smart contracts. Using a distributed network, it aims\
    \ to create a ‘Smart Economy’. ”*\n> \n> —Neo.org\n\nNEO transactions are charges\
    \ with NEO gas tokens. The NEO genesis block includes 100 million NEO. Half were\
    \ sold to early investors, and half were locked in NEO smart contract tokens.\
    \ Each year 15 million NEO tokens are unlocked to be used for the NEO development\
    \ team to fund development goals. NEO charges fees for transactions as well as\
    \ a smart contract’s related transactions. The NEO fee structure related to smart\
    \ contracts is listed in the NEO white paper: [`http://docs.neo.org/en-us/sc/systemfees.html`](http://docs.neo.org/en-us/sc/systemfees.html)\
    \ .\n\nIn term of programming languages, NEO smart contracts support the NeoVM\
    \ (NEO’s Universal Lightweight Virtual Machine) compiler, Microsoft.net, Java,\
    \ Kotlin, Go, and Python.\n\nHere are some notable NEO development features:\n\
    \n*   NEO can create smart contract tokens built with the Communications Standard\
    \ (NEP5). These tokens are able to communicate with other NEO tokens.\n\n*   Smart\
    \ contracts can communicate with other blockchains (this feature is called NeoX).\n\
    \n*   NEO can pass information via a file sharing protocol (called NeoFS).\n\n\
    *   It uses a lattice-based cryptographic mechanism called quantum-safe (NeoQS).\n\
    \nNEO’s “smart economy” infrastructure (I will explain this concept in the next\
    \ section) enables smart contracts to support front-end applications and integrate\
    \ with other smart contracts and other blockchains through an open API.\n\nNEO’s\
    \ open API allows you to integrate data from external sources. Figure [7-1](#475651_1_En_7_Chapter.xhtml#Fig1)\
    \ shows a high-level architecture diagram of the NeoVM. The NeoVM core is the\
    \ deployment box (the dashed box). As you can see, the external data with the\
    \ execution engine (green box) enables smart contracts to interact and perform\
    \ operations. Then data can be stored on the NEO distributed ledger.\n\n> *“We\
    \ hope the platform can be used for different front end scenarios, such as the\
    \ Digital asset wallet, Forum, Voting, Profile management and Mobile applications.\
    \ The platform also features an open API that can be used for integration with\
    \ other systems.”*\n> \n> —Da Hongfei, Zhao Chen founder of NEO\n\n![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig1_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1\n\nNEO’s virtual machine architecture diagram. Image credit: docs.neo.org.\n\
    \n### What Is NEO’s Smart Economy?\n\nNEO coined the term *smart economy*, which\
    \ explains NEO’s vision. This vision consists of changing your existing market\
    \ from a traditional economy to the smart economy with the power of a decentralized\
    \ blockchain. To achieve this goal, NEO integrates digital assets, digital identities,\
    \ and smart contracts into its platform.\n\n### Note\n\nNEO’s smart economy vision\
    \ is aimed to change the way existing markets work, from a traditional economy\
    \ to a “smart economy,” with the power of a decentralized blockchain. This is\
    \ achieved by integrating digital assets, digital identities, and smart contracts.\n\
    \nNEO’s smart economy concept consists of integrating the following three components:\n\
    \n*   *NEO digital assets*: These assets contain electronic data and can be programmed.\
    \ Placing the digital assets on a blockchain provides the benefit of PoS blockchains,\
    \ such as decentralization, trust, traceability, and transparency. The NEO blockchain\
    \ enables users to register, trade, and transfer different types of assets. Physical\
    \ assets get digitization through digital identity; then these digital assets\
    \ can be protected by law through validation. For an ICO, it costs 5,000 gas to\
    \ register a digital asset. Then there is a renewal fee of 5,000 gas per year.\n\
    \n*   *NEO digital identity*: This is the digitization of the identity of individuals,\
    \ organizations, or any other entities. A NEO digital identity is based on the\
    \ public key infrastructure (PKI) X.509 standard implementation that also supports\
    \ web of trust point-to-point certificates.\n\n*   *NEO smart contract*: Smart\
    \ contracts on NEO are called NeoContracts, and they support the C#, VB.NET, F#,\
    \ Java, Kotlin, and Python languages. Supporting these languages gives the benefits\
    \ of having sophisticated development, debugging, and compilation in the Visual\
    \ Studio, Eclipse, and WebStorm IDEs. NeoVM is built for scalability.\n\n## Setting\
    \ Up Your Local Environment\n\nAs mentioned, NEO supports enterprise-level programming\
    \ languages such as C#, VB.NET, F# Java, Kotlin, and Python. This selection of\
    \ programming languages gives NEO an advantage in building NeoContracts because\
    \ you can utilize the Visual Studio 2017 IDE, which offers enterprise tools for\
    \ development. In this chapter, I will be using the following .NET tools:\n\n\
    *   *Visual Studio 2017 IDE* : To follow along, install the Visual Studio (VS)\
    \ Community Edition for Mac.\n\n*   *.NET Core*: To follow along, install .NET\
    \ Core to be able to publish DLL library files.\n\nIn addition to .NET, you need\
    \ the following tools:\n\n*   *Xcode 10.1*: You need Xcode 10.2 for the tools\
    \ and libraries you will be installing.\n\n*   *Docker*: Docker is a popular tool\
    \ for creating containers and integrating software. You will be using Docker for\
    \ your private net to run a whole NEO blockchain to simulate four consensus nodes\
    \ in a single, lightweight Docker container.\n\n*   *neo-compiler*: The NEO compiler\
    \ is needed to turn your code to an `.avm` file that can be deployed on the NEO\
    \ blockchain.\n\n*   *neo-cli*: You will install and use the NEO command-line\
    \ tools for wallets, operations, and RPC calls to the NEO API.\n\nNow that you\
    \ know what needed, let’s get started.\n\n### Xcode 10.2\n\nAt the time of writing,\
    \ you need Xcode with at least version 10.1 for the tools and libraries needed\
    \ for NEO. The latest Xcode at the time of writing is Xcode 10.2.1.\n\nYou can\
    \ check whether you already have Xcode installed via the command line.\n\n```\n\
    > xcodebuild --version\nXcode 10.1\nBuild version 10B61\n```\n\nThis command will\
    \ output the version if Xcode is installed. If you need to upgrade or install,\
    \ visit the Apple developer portal: [`https://developer.apple.com/download/`](https://developer.apple.com/download/)\
    \ ."
  trans: '

    ### NEO 的高级区块链架构


    NEO 成立于 2014 年，最初名为“小蚁股”（AntShares），由达鸿飞和张铮文创立，随后于 2015 年 6 月在 GitHub 上以 NEO 为名开源。NEO
    的共识机制称为拜占庭容错（`dBFT`），这是一种改进的权益证明（PoS）机制。这种机制使得 NEO 成为一个可扩展的区块链。记账节点被随机选中来验证交易，并且每秒可支持多达
    10,000 笔交易。


    > *“NEO 是一个由社区驱动的非盈利区块链项目。它利用区块链技术和数字身份，通过智能合约实现资产数字化以及数字资产的自动化管理。它旨在利用分布式网络创建一个‘智能经济’。”*

    >

    > — Neo.org


    NEO 的交易费用以 NEO 的 GAS 代币支付。NEO 的创世区块包含 1 亿枚 NEO。其中一半出售给了早期投资者，另一半则锁定在 NEO 智能合约代币中。每年有
    1500 万枚 NEO 代币被解锁，用于 NEO 开发团队资助开发目标。NEO 对交易以及智能合约相关交易收取费用。与智能合约相关的 NEO 费用结构在 NEO
    白皮书中列出：[`http://docs.neo.org/en-us/sc/systemfees.html`](http://docs.neo.org/en-us/sc/systemfees.html)。


    在编程语言方面，NEO 智能合约支持 `NeoVM`（NEO 的通用轻量级虚拟机）编译器、Microsoft .NET、Java、Kotlin、Go 和 Python。


    以下是一些值得注意的 NEO 开发特性：


    - NEO 可以创建基于通信标准（`NEP5`）构建的智能合约代币。这些代币能够与其他 NEO 代币进行通信。

    - 智能合约可以与其他区块链进行通信（此特性称为 `NeoX`）。

    - NEO 可以通过文件共享协议（称为 `NeoFS`）传递信息。

    - 它采用一种基于格密码的加密机制，称为量子安全机制（`NeoQS`）。


    NEO 的“智能经济”基础设施（我将在下一节解释此概念）使智能合约能够支持前端应用，并通过开放 API 与其他智能合约以及其他区块链进行集成。


    NEO 的开放 API 允许您集成来自外部来源的数据。图 7-1 展示了 `NeoVM` 的高级架构图。`NeoVM` 核心是部署框（虚线框）。如您所见，外部数据与执行引擎（绿色框）使智能合约能够交互并执行操作。然后，数据可以存储在
    NEO 的分布式账本上。


    > *“我们希望该平台可用于不同的前端场景，例如数字资产钱包、论坛、投票、个人资料管理和移动应用。该平台还具备一个开放 API，可用于与其他系统集成。”*

    >

    > — 达鸿飞，NEO 联合创始人


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig1_HTML.jpg](img/475651_1_En_7_Fig1_HTML.jpg)


    图 7-1 — NEO 的虚拟机架构图。图片来源：`docs.neo.org`。


    ### 什么是 NEO 的智能经济？


    NEO 创造了 *智能经济* 这个术语，它诠释了 NEO 的愿景。这个愿景包括借助去中心化区块链的力量，将您现有的市场从传统经济转变为智能经济。为实现这一目标，NEO
    将数字资产、数字身份和智能合约集成到其平台中。


    ### 注意


    NEO 的智能经济愿景旨在通过去中心化区块链的力量，改变现有市场的运作方式，从传统经济转变为“智能经济”。这是通过集成数字资产、数字身份和智能合约来实现的。


    NEO 的智能经济概念包含以下三个组成部分的集成：


    - *NEO 数字资产*：这些资产包含电子数据并且是可编程的。将数字资产置于区块链上可以带来权益证明（PoS）区块链的优势，例如去中心化、信任、可追溯性和透明度。NEO
    区块链使用户能够注册、交易和转让不同类型的资产。实物资产通过数字身份实现数字化；然后这些数字资产可以通过验证受到法律保护。对于首次代币发行（ICO），注册一个数字资产需要花费
    5000 个 GAS。之后每年需缴纳 5000 个 GAS 的续期费。


    - *NEO 数字身份*：这是个人、组织或任何其他实体身份的数字化。NEO 数字身份基于公钥基础设施（`PKI`）X.509 标准实现，该标准也支持信任网的点对点证书。


    - *NEO 智能合约*：NEO 上的智能合约称为 `NeoContracts`，它们支持 C#、VB.NET、F#、Java、Kotlin 和 Python
    语言。支持这些语言能够带来在 Visual Studio、Eclipse 和 WebStorm IDE 中进行复杂开发、调试和编译的好处。`NeoVM` 是为可扩展性而构建的。


    ## 设置您的本地环境


    如前所述，NEO 支持企业级编程语言，例如 C#、VB.NET、F#、Java、Kotlin 和 Python。这种编程语言的选择使 NEO 在构建 `NeoContracts`
    方面具有优势，因为您可以利用 Visual Studio 2017 IDE，该 IDE 提供用于开发的企业级工具。在本章中，我将使用以下 .NET 工具：


    - *Visual Studio 2017 IDE*：若要跟上操作，请安装适用于 Mac 的 Visual Studio (VS) Community 版。

    - *.NET Core*：若要跟上操作，请安装 .NET Core 以便能够发布 DLL 库文件。


    除了 .NET，您还需要以下工具：


    - *Xcode 10.1*：您需要 Xcode 10.2 来获取将要安装的工具和库。

    - *Docker*：Docker 是用于创建容器和集成软件的流行工具。您将把 Docker 用于您的私有网络，以运行一个完整的 NEO 区块链，从而在单个轻量级
    Docker 容器中模拟四个共识节点。

    - *neo-compiler*：需要 NEO 编译器来将您的代码转换为可在 NEO 区块链上部署的 `.avm` 文件。

    - *neo-cli*：您将安装并使用 NEO 命令行工具来处理钱包、操作以及对 NEO API 的 RPC 调用。


    现在您已经了解了所需工具，让我们开始吧。


    ### Xcode 10.2


    在撰写本文时，您需要安装至少版本为 10.1 的 Xcode，以获取 NEO 所需的工具和库。撰写本文时最新的 Xcode 版本是 Xcode 10.2.1。


    您可以通过命令行检查是否已安装 Xcode。


    ```

    > xcodebuild --version

    Xcode 10.1

    Build version 10B61

    ```


    如果已安装 Xcode，此命令将输出版本号。如果您需要升级或安装，请访问 Apple 开发者门户：[`https://developer.apple.com/download/`](https://developer.apple.com/download/)。

    '
- fmt: '### Install Visual Studio 2017 IDE


    Next, download and install the latest version of Visual Studio (VS) Community
    Edition for Mac. The community edition is free and can be downloaded from the
    following URL: [`https://visualstudio.microsoft.com/vs/community/`](https://visualstudio.microsoft.com/vs/community/).


    For future reference, to uninstall a portion or all of VS, follow the instructions
    here: [`https://docs.microsoft.com/en-us/visualstudio/mac/uninstall#net-core-script`](https://docs.microsoft.com/en-us/visualstudio/mac/uninstall%2523net-core-script).


    The complete VS 2017 consumes a lot of disk space; however, you don''t need all
    the packages downloaded. You need only Xamarin Workbooks in order to develop NeoContracts,
    so only download what''s needed.


    During the installation process, the wizard gives you an option of what platforms
    and tools to install. Select Xamarin Workbooks by clicking the checkbox and click
    the Install button. See Figure [7-2](#475651_1_En_7_Chapter.xhtml#Fig2).


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig2_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig2_HTML.jpg)


    **Figure 7-2** Visual Studio Community Edition for Mac install wizard


    ### Install .NET Core


    You will be installing .NET Core so you will be able to publish DLL libraries
    files via the command line. This will be done via the `dotnet publish` command.
    To download it, go to the dotnet Microsoft site; see Figure [7-3](#475651_1_En_7_Chapter.xhtml#Fig3).


    [`https://dotnet.microsoft.com/download`](https://dotnet.microsoft.com/download)


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig3_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig3_HTML.jpg)


    **Figure 7-3** Downloading Microsoft dotnet core


    You will be downloading both: Build apps - SDK v2.2.101 and Run apps - Runtime
    v2.2.0.


    To confirm the installation went well, run the `dotnet --version` command.


    ```

    > dotnet --version

    2.2.101

    ```


    This command will output the dotnet version, which at the time of writing is 2.2.101.


    If the SDK is not installed, you will get the following error message:


    ```

    Did you mean to run dotnet SDK commands? Please install dotnet SDK from: http://go.microsoft.com/fwlink/?LinkID=798306&clcid=0x409

    ```


    You can also output your machine info via the `info` command.


    ```

    > dotnet --info

    ```


    #### Install Docker


    Next, you will install Docker. Docker is needed to create a container that you
    will be using to create your local blockchain.


    - **Download Docker from here**: [`https://download.docker.com/mac/beta/Docker.dmg`](https://download.docker.com/mac/beta/Docker.dmg)

    - **Installation instructions**: [`https://runnable.com/docker/install-docker-on-macos`](https://runnable.com/docker/install-docker-on-macos)


    Once Docker is downloaded and installed, double-click Docker from the Applications
    menu to get Docker running. You will see the Docker icon in the top menu on your
    computer. You can verify it''s installed correctly by typing `docker` at the command
    line; it lists the Docker commands.


    ```

    > docker

    ```


    Run `docker ps` to view containers running to ensure you do not get any error
    messages.


    ```

    > docker ps

    ```


    If Docker is not running, you will get the following message:


    ```

    Cannot connect to the Docker daemon at unix:///var/run/docker.sock. Is the docker
    daemon running?

    ```


    Just open Docker in case you get this message. Additionally, if your container
    is not running but it was already created, you can use the `-a` (all) flag and
    find the container ID.


    ```

    > docker ps –a

    List containers

    ```


    Then when you have the container ID, you can start that container.


    ```

    > docker start [CONTAINER ID]

    ```


    For now, you won''t see any list of containers as you have not created your containers
    yet.


    ### Download NeoCompiler and Generate neon.dll


    To create your NeoContract, you need to generate an `.avm` file. To do so, you
    need to create a `neon.dll` file to be able to generate the smart contract. To
    get started, you will clone the neo-compiler to your desktop and then generate
    the `neon.dll` file.


    ```

    > cd ~/Desktop

    > git clone https://github.com/neo-project/neo-compiler

    > cd ~/Desktop/neo-compiler/neon/

    ```


    To publish your self-contained `.avm` file, you need to set a runtime identifier.
    You can set the `neon.csproj` runtime identifier to the correct OS. As I am using
    a Mac and not a PC here, I need to change the `neon.csproj` file. To follow along,
    first make a copy of the original.


    ```

    > cp neon.csproj neon.csproj.backup

    ```


    I am using vim, but feel free to use your favorite editor.


    ```

    > vim neon.csproj

    ```


    Once the file is open, replace the following configuration, which sets a target
    framework.


    > **Note:** You can compare your output and settings with my project here: `chapter7/NEO/neo-compiler/neon/`.
    Also, you can find `neon.csproj` there.


    ```

    2016-2017 The Neo Project

    Neo.Compiler.MSIL

    2.3.1.1

    The Neo Project

    netcoreapp2.0

    anycpu

    neon

    Exe

    Neo.Compiler.MSIL

    osx.10.12-x64

    Neo.Compiler

    The Neo Project

    Neo.Compiler.MSIL

    Neo.Compiler.MSIL

    RELEASE;NETCOREAPP1_0

    none

    False

    true

    true

    ```


    Now `publish` pointing to the runtime identifier `osx.10.11-x64` by passing the
    `RuntimeIdentifier` setting param.


    ```

    > dotnet publish -r osx.10.11-x64

    ```


    The compiler created your `neon.dll` file here:


    ```

    bin/Debug/netcoreapp2.0/osx.10.11-x64/publish/neon.dll

    ```


    See Figure [7-4](#475651_1_En_7_Chapter.xhtml#Fig4) for the output.


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig4_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig4_HTML.jpg)


    **Figure 7-4** Compiling neon.dll for the target osx.10.11-x64


    ### neo-cli to Generate a NEO Node


    Next, you want to create a full NEO node. To generate a full NEO node, there are
    two full-node options.


    - **neo-gui**: This can be used by both developers and NEO users. It can be used
    to do basic user-client operations such as managing wallets but also publishing
    smart contracts. It has a visual user interface. However, it works only on Windows
    at the time of writing.


    - **neo-cli**: This provides an external API for basic wallet operations. It also
    helps other nodes keep a consensus with the network and generate new blocks.


    In this case, I am installing on a Mac, so you will be using `neo-cli` to manage
    your wallet via the command line. However, it''s good for you to know that you
    can install `neo-gui` and create a virtual PC that way.


    #### neo-cli


    For `neo-cli`, you need to install the LevelDB package as it''s a dependency.
    As you recall, you already installed LevelDB in Chapter [3](#475651_1_En_3_Chapter.xhtml)
    via Homebrew. If you did not install LevelDB previously, here is the command again:


    ```

    > brew install leveldb

    ```


    Alternatively, you can check if you have it and upgrade.


    ```

    > brew upgrade leveldb

    ```


    Next, clone `neo-cli` to your desktop.


    ```

    > cd ~/Desktop

    > git clone https://github.com/neo-project/neo-cli

    ```


    Now, you can use dotnet to publish `neo-cli` from the source code you downloaded.


    ```

    > cd neo-cli

    > dotnet restore

    > dotnet publish -c Release

    ```


    The `.dll` file should be created in the `Release` folder; see Figure [7-5](#475651_1_En_7_Chapter.xhtml#Fig5)
    for the output.


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig5_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig5_HTML.jpg)


    **Figure 7-5** Building the neo-cli DLL


    > **Note:** You can compare your output and settings with my project here: `chapter7/NEO/neo-cli`.


    To run the `.dll` file, you use `dotnet` and the location of the DLL file, which
    starts a NEO command-line terminal.


    ```

    > cd bin/Release/netcoreapp2.1/

    > dotnet neo-cli.dll.

    ```


    `neo-cli` also supports plugins. For instance, you can enable logs in `neo-cli`
    with application logs, or you can improve security in RPC nodes via RPC Security.
    A list of plugins can be found here: [`https://github.com/neo-project/neo-plugins`](https://github.com/neo-project/neo-plugins).'
