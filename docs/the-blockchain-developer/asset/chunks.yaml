    ```javascript

    const job = new CronJob(''30 ∗ ∗ ∗ ∗ ∗'', function() {

    let index = 0; // 第一个区块

    if (lastBlockMinedBy) {

    let newIndex = registeredMiners.indexOf(lastBlockMinedBy);

    index = ( newIndex+1 > registeredMiners.length-1) ? 0 : newIndex + 1;

    }

