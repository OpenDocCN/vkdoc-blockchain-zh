    遵循 OWASP 物联网测试指南和 OWASP 物联网测试讲义中的建议：


    - 打印并遵循：[`www.owasp.org/images/2/2d/Iot_testing_methodology.JPG`](https://www.owasp.org/images/2/2d/Iot_testing_methodology.JPG)

    - 遵循此检查清单：[`www.owasp.org/index.php/IoT_Testing_Guides`](http://www.owasp.org/index.php/IoT_Testing_Guides)


    在发现、审计和测试阶段，你很可能会发现一些小型到大型的漏洞，这些漏洞可能需要你回到编码阶段，重复此过程，直到你的平台通过所有测试。


    ## 就绪评估


    一旦你的平台通过了发现、审计和测试阶段，你就可以深入审视区块链应用的技术层面，以确保安全性和合规性已得到落实。这需要通过手动运行安全性与合规性评估来完成。


    ## 安全性与合规性评估


    此评估建立在你之前阶段进行的漏洞评估之上。在发布之前，建议你添加手动验证步骤，以确认行业和/或内部安全标准已应用于你的平台，并评估风险与暴露程度。此阶段还应包括我在本章第一部分讨论的安全性就绪问题。


    此外，验证内容还可能包括以下方面：


    - 检查对平台的授权访问并确认系统设置

    - 检查平台及服务器日志

    - 确保符合现行法规

    - 检查并跟踪错误代码和消息

    - 审查最新的隐私与法律要求

    - 审查设计与架构文档，确保代码满足这些要求

    - 执行代码审查


    请记住，安全性与合规性评估着眼于全局，你不应只关注单个漏洞的具体暴露程度，而应整体审视平台。评估可能会发现其他不可接受的风险和暴露，这将要求你回到设计和编码阶段，从头开始这一过程。


    ## 发布


    一旦你的平台通过了就绪评估阶段，即可发布平台。建议对实际生产代码再次运行相同的测试和检查，以确保平台仍然通过测试和评估。完成此周期后，你可以为新的开发周期重复此过程。


    ## 后续方向


    - 一份与区块链安全相关的优秀资源链接可在线上获取：[`https://github.com/1522402210/BlockChain-Security-List`](https://github.com/1522402210/BlockChain-Security-List)。

    - 针对你的具体平台和地区，创建一份合规性与安全性检查清单。

    - 如果你拥有平台/网站，请对你现有的平台或网站运行审计和自动化测试工具。


    ## 总结


    在本章中，我将区块链流程的安全性与合规性分解为三个部分：安全性就绪、常见区块链攻击以及推荐的开发周期。第一部分作为引言，帮助你更好地理解构建安全平台所需的术语和思维模式。我涵盖了安全性测试与合规性就绪，并特别以美国和欧盟的合规要求为例。我讨论了在设计和编码阶段应考虑的安全性就绪建议。然后，我介绍了导致数十亿美元损失的常见区块链攻击。这些攻击主要针对加密钱包，但也涉及区块链网络和基于区块链的平台。最后，我为你提供了推荐的开发周期，以确保你考虑到所有必要的安全性与合规性问题。


    在下一章，也是最后一章中，你将探索超越加密货币的区块链。我将介绍区块链的力量以及如何利用它，并讨论特定行业的去中心化，分析几个被区块链颠覆的行业及具体案例研究。


    # 12. 超越加密货币的区块链


    当你接近本书的最后几页时，我想激发你的灵感，帮助你看到区块链技术在未来几年可能实现的潜力。加密货币通过引入比特币，为法定货币提供了替代方案，铺平了道路。尽管比特币的发明已超过十年（它于
    2008 年被引入），但区块链仍处于起步阶段。然而，它有望成为 21 世纪最有用的技术创新之一。


    话虽如此，技术集成和被大众广泛接受的道路仍然漫长且崎岖，区块链已经经历了多次起伏，这些起伏由金融投机、安全性、性能、信任、可扩展性和法规驱动（更不用说来自骗子和黑客的加密攻击）。这些担忧让许多人成为怀疑论者。尽管如此，区块链不可被忽视。它有潜力改善所有行业，并成为像互联网或传真机一样巨大的全球化技术创新。


    区块链的潜力已被许多人认可。事实上，仅在 2019 年，公司预计将在区块链技术上投资超过 30 亿美元。通过审视当前正在开发的项目，整体图景表明加密货币并非最终疆域，而仅仅是个开始，因为许多区块链项目正扩展到加密货币之外，颠覆的也不仅仅是法定货币。


    事实上，许多大型企业正以各种方式将区块链技术整合到其系统中。数百家初创公司正逐渐进入主流视野，区块链技术的潜在应用似乎无穷无尽，并且在许多情况下，区块链开辟了新的潜在收入流和商业模式。


    > “20 年后，我们都会回顾并得出结论，比特币就像互联网本身一样，是一个具有影响力的创新平台。”

    > ——马克·安德森


    本章分为两个部分。首先，我将介绍如何利用区块链，并详细说明利用区块链技术元素时可能实现的潜力。然后，我将通过讨论几个被区块链颠覆的行业并展示具体案例研究，来探讨行业的去中心化。了解区块链技术的力量、能力以及技术创新，可以让你洞察如何将区块链技术创新应用于你自己的全新项目或现有项目与行业。


    ## 利用区块链'
- fmt: '在讨论行业去中心化之前，我们先快速回顾一下现在即可实现的区块链具体元素。虽然我之前章节已涵盖本节所有内容，但接下来我将围绕如何在项目中应用这些元素进行展开。我将讨论以下内容：


    - 币

    - 代币

    - 账本

    - 智能合约与去中心化应用


    这些区块链元素可以单独使用、组合使用，或作为区块链与非区块链项目的混合体，用于实现独特的应用程序。


    ## 币


    区块链技术始于比特币，现已扩展到超过2000种上市加密货币，总市值达数十亿美元。许多通过首次代币发行上市的币，除了试图让发行方和投资者获利外，并未提供太多实际价值。然而，创建币并使用区块链作为加密货币进行快速、低成本的全球支付的能力，已经激励了很多人。加密货币用例凸显了区块链的可靠性，因为它能够替代法定货币。


    > “货币的未来是数字货币。”

    > ——比尔·盖茨


    截至撰写本文时，某些国家的大部分人口都听说过加密货币，但它尚未成为主流。但本节中你会看到，一些正在推进的项目有望推动币进入主流应用。例如，2018年12月，媒体报道称Facebook正在为其WhatsApp用户开发一种“稳定币”，并正在与交易所洽谈上市事宜，该稳定币将“与一篮子不同外币挂钩，而非仅与美元挂钩”。Facebook拥有庞大用户群，其采用将进一步提升人们对加密货币的认知。


    > **注意：** *稳定币*是一种旨在最小化价格波动的加密货币，因为它们与更“稳定”的资产（或一篮子稳定资产）挂钩，例如货币或黄金等交易所交易商品。


    此外，你已看到一些例子，说明币本身能提供超出其面值的价值。


    - *比特币现金（BCH）彩色币*：利用BCH协议创建代币化资产，允许你在BCH上添加代币。

    - *比特币*：利用比特币的`OP_RETURN`参数，允许你在交易中存储数据。


    这些例子突显了币的潜力，因为它们不仅可以传递数字货币价值，还能传递更多价值。


    ## 代币


    加密代币是可用于表示特定资产数字余额的记账单位。例如，比特币是一种加密代币，因为它结合使用了数字签名与所有权；然而，并非所有加密代币都是加密货币。


    代币可以通过独特数据创建，被称为*非同质化代币*（NFT），用于代表完全独特的事物。这些NFT不可互换，因为具有完全相同数据的代币只有一个。


    > **注意：** 与本质上可互换的加密货币数字资产币或许多实用代币不同，NFT是一种代表独特事物的特殊加密代币。这些代币不可互换，因为它们无法被替代。


    NFT和实用代币都使用代币化过程，允许你创建*证券*。证券将数字资产的所有权碎片化，通过创建数字代币实现。每个代币代表资产中的一定比例所有权。使用区块链使得监管链和所有权证明不可篡改，这为某些应用带来了优势，因为信息无法像在常规数据库中那样被更改。


    > **注意：** 在此上下文中，监管链是指记录数据传输或分析序列的“纸质追踪记录”。


    在实践中，这可以应用于数字资产和实物资产。例如，Kik消息应用（https://www.kik.com）将其公司转变为数字资产，并开始出售代表公司部分所有权的代币。Kik成功筹集了1亿美元，可用于发展其平台。它所做的是一种反向首次代币发行：不是在创建公司之前筹集资金，而是在公司运营之后出售部分所有权，就像公司在股票市场“上市”一样。


    > **提示：** 请记住，本章未提及的许多其他行业也有潜力通过利用区块链技术获益。我挑选了几个例子来启发你；但是，你应该自行研究调查，以发现更多行业。


    此外，代币可以复兴旧概念。例如，一些付费电话和火车曾使用代币；这些代币除了在付费电话或火车站使用外，没有任何其他价值。美元也曾与政府金库中的黄金数量挂钩，因此在1971年之前持有美元时，你拥有的实际上是美国政府金库中黄金的代币。类似地，如今稳定币代币代表法定货币，例如使用以太坊创建的`DAI`、`GUSD`、`TUSD`、`USDC`和`USDT`代币。这些代币基于公司将法定货币存入托管账户并向监管机构注册公司。


    代币可以代表任何数字或物理价值，例如：


    - 股票

    - 期权

    - 数字债务

    - 法定货币

    - 所有权

    - 服务权利


    代币还可以组合多种资产。例如，一个代币可以代表一篮子不同股票或一篮子不同法定货币。可能性是无限的，正如你在之前的章节中所见，有许多区块链（如以太坊、EOS、超级账本和NEO）可以提供创建代币的简便机制。


    ## 账本


    区块链账本可以用作不仅仅针对加密货币的去中心化数据存储。传统的云存储服务是中心化的，你需要将宝贵的信息或数字资产托付给单一实体。而使用区块链，数据存储本身可以变得去中心化。诸如PirateBay、Limelight等P2P网络已被证明能够将来自全球不同计算机的数据片段拼接在一起，以存储视频、音乐、图像和软件等数字资产。尽管许多此类P2P网络侵犯了版权材料，并在许多国家被视为非法，但区块链P2P网络可以由合法发布者共享文件，同时限制授权客户的访问。区块链的工作方式与这些P2P网络类似，可用于存储任何数据。事实上，`Storj`（https://storj.io/）和`Sia`（https://sia.tech）就是基于区块链的云存储示例，旨在提高安全性、降低成本并减少依赖性。用户可以在不使用时租出其存储容量，从而创建一个前所未有的全新市场。将区块链用作去中心化数据存储，并结合币和代币等其他区块链元素，可以创造出有趣的新可能性。'
