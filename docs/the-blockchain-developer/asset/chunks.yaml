- fmt: '### Bookkeeping Node Deployment


    Now that you have the `dotnet` core environment installed, you can install additional
    dependencies and check out the NEO project.


    ```bash

    > sudo apt-get install libleveldb-dev sqlite3 libsqlite3-dev libunwind8-dev

    > git clone https://github.com/neo-project/neo-cli

    > git branch -a

    > git checkout v3.0

    > git checkout head

    ```


    To run the NEO node, you will need version 1.1.2 of .NET Core. Download the SDK
    binary; for Ubuntu 16.4, the commands are listed here: [`https://www.microsoft.com/net/download/linux-package-manager/ubuntu16-04/sdk-2.1.300`](https://www.microsoft.com/net/download/linux-package-manager/ubuntu16-04/sdk-2.1.300).


    Next, run the `dpkg` package manager to install the package:


    ```bash

    > wget -q https://packages.microsoft.com/config/ubuntu/16.04/packages-microsoft-prod.deb

    > sudo dpkg -i packages-microsoft-prod.deb

    ```


    Now you can restore the NEO build and compile, as shown here:


    ```bash

    > dotnet restore

    > dotnet publish -c Release

    ```


    Once you compile the code, you get the location of the DLLs.


    ```bash

    neo-cli -> /home/ubuntu/neo-cli/neo-cli/bin/Release/netcoreapp2.0/neo-cli.dll
    .

    neo-cli -> /home/ubuntu/neo-cli/neo-cli/bin/Release/netcoreapp2.0/publish/

    ```


    Run the full node:


    ```bash

    > dotnet /home/ubuntu/neo-cli/neo-cli/bin/Release/netcoreapp2.0/neo-cli.dll .

    ```


    This command opens a terminal command call `neo` with the version.


    ```

    NEO-CLI Version: 3.0.0.0

    ```


    In the `neo` terminal, you can query the version to ensure it’s working correctly.


    ```

    neo> show state

    ```


    You can also create a wallet.


    ```

    neo> create wallet wallet.db3

    ```


    This command will request a password.


    ```

    password: [select a password]

    password: [select a password]

    ```


    Then it generates a public key and address for your wallet.


    ```

    address: AXZmWZckF55xb1p566No2qh19uj8vt5d2R

    pubkey: 03b80edc66c9324077c8c1c4bbad1e1ace7e1b7e8ac63945a3b5bb9f642f4520f1

    ```


    You now have a NEO node on an AWS machine, and you are able to interact with the
    NEO command-line interface (CLI). In the next chapters, you will be interacting
    with the CLI. Feel free to get a head start and review the documentation for smart
    contracts and dapp development at the NEO site here: [`http://docs.neo.org/en-us/node/cli.html`](http://docs.neo.org/en-us/node/cli.html).


    ### Request Consensus Authority Certificate


    Now that you have a working node on a qualified Ubuntu server, you can obtain
    a consensus authority certificate. The NEO white paper discusses the need to have
    an actual real identity:


    > *“DBFT combines digital identity technology, meaning the bookkeepers can be
    a real name of the individual or institution. Thus, it is possible to freeze,
    revoke, inherit, retrieve, and affect judicial decisions on them. This facilitates
    the registration of compliant financial assets in the NEO network. The NEO network
    plans to support such operations when necessary.”*


    You can obtain CA certificates from OnChain/Neo directly. Additionally, you can
    find more information on the NEO forums: [`https://www.reddit.com/r/NEO/`](https://www.reddit.com/r/NEO/).
    This process is beyond the scope of this book, but it’s needed in order to be
    selected as a node.


    ### Getting Gas


    To be selected as a node, you also need 1,000 gas to stake in order to become
    a bookkeeper. The easiest way to purchase gas is on exchanges. The other option
    is to hold NEO, and you will get 0.33 gas per 1,000. See Figure [2-11](#475651_1_En_2_Chapter.xhtml#Fig11)
    shows a button to claim gas coins once you hold NEO coins.


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig11_HTML.jpg](images/475651_1_En_2_Chapter/475651_1_En_2_Fig11_HTML.jpg)


    **Figure 2-11** — Neotracker.io provides a Claim Gas option


    A simple calculation of prices of NEO and gas at the time of writing shows it’s
    a large investment.


    ### Elected as a Bookkeeper


    NEO is an electronic democracy, and NEO holders can vote on who should be a bookkeeper.
    At the time of writing, the NEO team has not implemented the voting features;
    however, they are likely to be implemented in the near future as the GitHub wiki
    shows a payment structure with fees, including 10 gas for voting a bookkeeper:
    [`https://github.com/neo-project/neo/wiki/Network-Protocol`](https://github.com/neo-project/neo/wiki/Network-Protocol).


    For now, stop the EC2 node so you won’t be charged. To stop the instance, select
    **EC2 Dashboard** ➤ **Running instances** ➤ **Actions** ➤ **Instance State** ➤
    **Stop**. See Figure [2-12](#475651_1_En_2_Chapter.xhtml#Fig12).


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig12_HTML.jpg](images/475651_1_En_2_Chapter/475651_1_En_2_Fig12_HTML.jpg)


    **Figure 2-12** — AWS, stop instance action


    > **Tip:** Amazon can charge storage fees for the EBS volumes attached to a stopped
    instance. The cost is five cents per gigabyte. Amazon provides one year for free.
    To completely avoid being charged, you need to “terminate” the instance instead
    of just stopping it. You can make sure you are not charged at this URL: [`https://console.aws.amazon.com/billing/home`](https://console.aws.amazon.com/billing/home).


    ### Create an EOS Block Producer


    You will now learn how to run a full EOS node on a dedicated server; you just
    need to make sure you meet the minimum hardware requirement. The requirements
    are listed here: [`https://developers.eos.io/eosio-nodeos/docs/install-nodeos`](https://developers.eos.io/eosio-nodeos/docs/install-nodeos).


    At the time of writing, the system requirements on all platforms are as follows:


    - 7 GB RAM free required

    - 20 GB of available storage


    You will learn how to set up an Ubuntu server. I will be using AWS. In AWS, select
    **Ubuntu Server 16.04 LTS (HVM), SSD Volume Type** ➤ **Choose an Instance Type**
    ➤ **General purpose** ➤ **t2.large**. This type of machine has 8 GB RAM free.


    An EOS node needs at least 20 GB of a storage space, so you’ll set this machine
    to 25 GB to be safe. To do that, select **Configure Instance Detail**. Next select:
    **add storage**. In the next window select: **Size (GiB)** 25 GB. The next wizard
    window you will be able to: **Review and Launch**. Launch the instance.


    For security, set the same settings as you did for the NEO full-node server: select
    an existing security group. Next, select: `launch-wizard-1` that includes port
    22 for SSH and public HTTP/HTTPS. Now we can: **Review and Launch** in the next
    window and lastly, **Launch**.


    In the key pairs, use the same key you created for NEO or create a new key. To
    select the same key, select **Choose an existing key pair**. We will call the
    key: `EOS`.


    That’s it. You can now update the SSH config file with the new server to be able
    to connect quickly.


    ```

    > vim ~/.ssh/config

    ```


    And paste the following:


    ```

    Host EOS

    HostName [ip address]

    User ubuntu

    IdentityFile /[location of key]/EOS.pem

    ```


    Now you can connect to the EOS server.


    ```

    > ssh EOS

    ```'
