    \ 命令如下所示：\n\n```bash\n> bitcoin-cli -named getbalance minconf=2\n0.18505841\n\
    ```\n\n接下来，让我们看看 `listunspent` 命令。顾名思义，它返回一个 JSON，其中包含你尚未花费的币的交易，换句话说，就是你的 UTXO。`listunspent`\
    \ 命令还返回一个包含名为 `vout` 变量的 JSON，该变量表示交易中输出的索引号。\n"
