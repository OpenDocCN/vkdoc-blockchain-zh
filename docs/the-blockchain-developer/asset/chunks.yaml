  trans: "\n# 智能合约与去中心化应用\n\n正如你所见，智能合约是云端的编程语言；它们让你能够针对区块链进行编码。智能合约被创建为具有法律约束力、可编程的数字文档。与传统协议一样，智能合约设定了一系列双方或多方共同认可的规则。\n\
    \n当合同义务得到履行时，资金可以自动释放，从而无需第三方介入安排。将智能合约用于法律事务，可能成为比纸质合同更好的选择，因为它稳定、诚实，且不易出现人为错误。使用智能合约，中间人（中间人可能是律师、托管代理人、公证人、银行家、贷款官员等）就不再需要了。\n\
    \n在本书中，你在多个区块链平台上创建了智能合约。利用这些智能合约，你能够创建去中心化应用的前端界面来使用智能合约，并发布该应用。\n\n事实上，公司正在使用智能合约来自动化许多服务。例如，Slock.it\
    \ 为租赁可用设备创建了支付功能；这些设备可以是任何物品，如自行车、汽车，甚至工具箱。同样，Fizzy（`https://fizzy.axa/`）会追踪航班延误情况，并在航班延误时自动为乘客退款。这些服务都是自动完成的；你无需排队等候，也无需被电话客服从一个部门转接到另一个部门。此外，这些退款可以自动发生。这些合约为用户和企业节省了时间、精力和金钱。同时，客户服务得到了改善，而且由于这些服务是自动化的，还可以减少所需的员工数量。\n\
    \n总而言之，在本节中，我介绍了从商业角度来看，哪些已有的功能可以利用区块链技术来实现。我涵盖了除了加密货币之外，你还能用代币做什么，包括使用代币代表任何价值、使用区块链账本作为去中心化数据库，以及利用智能合约和去中心化应用在云端编写代码。通过结合这些要素，你将获得更快捷、更可靠且去除了中间人的服务。\n\
    \n# 行业与垂直领域的去中心化\n\n在本节中，我将向你展示来自几个行业的示例，以及区块链如何在不同行业中以垂直和水平的方式被利用或可能被利用。我所涵盖的这些行业，在将区块链应用于现有行业或全新的“绿地”项目时，可以为你提供灵感。\n\
    \n> **注意**\n> 在此语境下，*垂直*特指特定领域，而*水平*则指可以被所有人或任何领域采用。\n\n我将涵盖以下行业：\n\n-   金融\n\
    -   网络安全\n-   房地产\n-   移动\n-   供应链改善\n-   加密消息平台\n-   选举与投票\n-   市场营销\n-   医疗保健\n\
    -   游戏\n\n在当今世界，许多行业相互依赖，技术与实体业务之间也存在大量交叉。例如，房地产依赖金融行业。由于需要能够验证文件和身份，金融行业依赖安全性。市场营销依赖于数据收集和预测。这些跨界和服务的融合有潜力创造无缝的用户体验，从而加速区块链的安全性、可靠性和全球化进程；提高交易执行速度；并为所有相关方降低费用。\n\
    \n## 金融\n\n就金融行业而言，你可以将参与者分为两组：小型金融集团和大型金融机构。小型金融集团可以是初创公司、零售商、小型银行以及个人所有公司。大型机构则包括投资集团、大型银行以及世界\
    \ 500 强企业。\n\n小型金融集团多年来一直在尝试加密货币和区块链技术。而对于大型金融机构来说，与加密货币的关系一直是爱恨交加；许多金融 CEO 和专家一直在批评加密货币，摩根大通首当其冲，称任何被发现交易比特币的员工为“愚蠢”，金融专家沃伦·巴菲特则称比特币为“妄想”并“吸引骗子”。然而，当谈到区块链技术本身时，情况则不同。摩根大通今年宣布创建了自己的区块链，名为`Quorum`，以及自己的数字货币`JPM\
    \ Coin`。\n\n许多其他大型金融公司也开始慢慢接受区块链技术。加密货币交易所已经通过了纳斯达克的审查流程。纳斯达克、花旗和 Visa 已经向基于区块链的初创公司`Chain.com`投资了\
    \ 3000 万美元。纳斯达克还认可了 Overstock.com 对比特币支付选项的全面支持，以及尚未发布的平台`Roobee`（`https://roobee.io`），这是一个为散户投资者开发的投资平台。\n\
    \n总的来说，小型和大型金融集团都可以从区块链中获益的领域有很多。我将涵盖三个领域：货币、基础设施和数字资产。\n\n- **货币：** 这用加密货币取代了法定货币，作为一种电子现金系统。任何人都可以持有代币并进行快速、低成本的支付，从而摆脱中间人（如银行和信用卡）。目前围绕加密货币取代法定货币的担忧主要包括价格的波动性（因为许多代币的起伏）、信任问题，以及如何创建和接受转账、管理钱包的知识。这些担忧可能会让许多人感到不安，尤其是那些不精通技术的人。大型金融机构可以通过创建自己的加密货币和/或接受现有加密货币的转账，将加密货币资金的转移正式化并推向主流，从而从中受益。当然，由于中间人再次介入，可能会涉及一些费用；然而，加密货币有潜力像\
    \ Visa、法定货币、自动清算所（ACH）、交易所交易基金（ETF）等其他支付方式一样，被主流用作一种支付方式。然后，用户可以通过与受信任的方打交道，在全球范围内发送资金。以下是一些案例研究：\n\
    \    - `Coinpayments`（`https://www.coinpayments.net`）、`BitPay`（`https://bitpay.com/`）和`Abra`（`https://www.abra.com/`）只是接受加密货币支付的商家的几个例子。\n\
    \    - 银行支持的代币是另一个例子。摩根大通宣布，该银行将开始一项试验，将其借给企业的万亿美元转换为`JPM Coin`。这代表了第一家主要银行发行的首个代币。\n\
    \n- **基础设施：** 公司可以用区块链取代现有的基础设施，如中心化数据库，以实现更高的安全性和降低成本。加密货币转账的一个担忧是，用户需要明白自己在做什么，否则就有损失资金的风险。以下是一些案例研究：\n"
- fmt: "# Blockchain Use Cases\n\n## Financial Services\n\n- **Transferring funds**:\
    \ Western Union is testing Ripple (XRP) to see whether it can optimize the existing\
    \ settlement system to expedite the transfer of funds with blockchain. For the\
    \ time being, Western Union claims it has not proved that using XRP can expedite\
    \ transfers. “We tested with Mexico, one of our biggest corridors…and with the\
    \ efficiency that we have currently, we didn’t find the efficiency with Ripple\
    \ yet,” according to Western Union CEO Hikmet Ersek.\n\n- **Bookkeeping**: J.P.\
    \ Morgan’s Quorum blockchain (`https://www.jpmorgan.com/global/Quorum`) is being\
    \ used by institutions to keep track of financial data.\n\n- **Digital assets**:\
    \ As I mentioned, blockchain can be used to create digital assets using tokens.\
    \ These assets can be any financial vehicle. Here are some case studies:\n\n \
    \ - **Chain** (`https://chain.com/`): This offers what is called a sequence. It\
    \ uses blockchain infrastructure to let organizations build financial services\
    \ from the ground up with open source code on GitHub; see `https://github.com/chain`.\n\
    \n  - **Openchain** (`https://www.openchain.org`): This is a startup focused on\
    \ issuing and managing digital assets.\n\n  - **Symbiont.io** (`https://symbiont.io/solutions`):\
    \ This brings mass adoption of blockchain to financial services. Additionally,\
    \ NASDAQ has invested in Symbiont.io.\n\n## Cybersecurity\n\nAs you saw in the\
    \ previous chapter when I covered security, phishing-malware and other hacker\
    \ attacks aimed at identity theft have become a common practice. Many identity\
    \ thefts are due to a hacker cracking a user’s password. Instead of relying on\
    \ a password to authenticate a user, blockchain has the potential to revolutionize\
    \ digital identities by using cryptography to secure them. This is done by assigning\
    \ each user private keys in the same way blockchain attaches private/public keys\
    \ and then uses these keys to authenticate a user and find transactions that belong\
    \ to a user.\n\nIn addition, verifying data can be an agonizing process and a\
    \ major pain point for many people. Think about when you need to get a passport,\
    \ notarize a document, or renew your driver’s license. These processes involve\
    \ a lot of effort and time. Blockchain can help ensure and verify the document’s\
    \ ownership and authenticity while expediting the time it takes, and you can do\
    \ it all from the comfort of your home instead of waiting in a line or filling\
    \ out a complex form.\n\nThese techniques can be applied to the following:\n\n\
    - Passports\n- Digital identity\n- Driver’s license and ID\n- E-residency\n- Birth\
    \ certificates\n- Wedding/divorce certificates\n- Notary of documents\n- Online\
    \ account login\n\nSome use cases include the following:\n\n- **Verifying identity**:\
    \ Companies that offer blockchain IDs can be used to sign in on apps and web sites,\
    \ digitally sign documents, and so on, reducing the risk of identity theft. Here\
    \ are some case studies:\n\n  - **Guardtime** (`https://guardtime.com`): This\
    \ is a blockchain company that has enhanced data authentication protocols by using\
    \ Keyless Signature Infrastructure (KSI) transactions. The code either grants\
    \ or denies access to the network based on the command received instead of a password.\
    \ A prominent client of Guardtime is Verizon.\n\n  - **Keybase** (`https://keybase.io`):\
    \ Keybase holds an encryption key directory to map social media identities. Users\
    \ can then use encrypt chat and cloud storage.\n\n  - **Onename** (`https://onename.com`):\
    \ This company provides you with an `.id` namespace on its Blockstack network.\n\
    \n  - **ShoCard** (`https://shocard.com`): This identity service is aimed at providing\
    \ banks and financial institutions with a way to authenticate users.\n\n- **Verifying\
    \ data**: You can use blockchain to create a verifiable record of any data, file,\
    \ business process, or just about anything on the blockchain. Here are some case\
    \ studies:\n\n  - **Factom** (`https://www.factom.com`): This provides a REST\
    \ API to read, write, and search its Factom blockchain entries and platform, which\
    \ includes SDKs, documentation, and a blockchain explorer to verify and debug\
    \ entries.\n\n  - **Proof of Existence** (`https://proofofexistence.com`): This\
    \ company verifies the existence of files via the transaction’s timestamped property.\n\
    \n  - **Tierion** (`https://tierion.com`): This is similar to Proof of Existence.\
    \ Tierion offers proof and chainpoint. Chainpoint protects data by anchoring it\
    \ to the bitcoin’s blockchain, and the proof is using blockchain’s timestamp property\
    \ as a notary. This service is used by companies such as Dell and Xero. It also\
    \ has a developer portal: `https://chainpoint.org`.\n\n## Real Estate\n\nThe real\
    \ estate industry can potentially benefit from utilizing blockchain technology\
    \ vertically and horizontally. If you have ever been involved in a real estate\
    \ transaction, you know they are often complex and nontransparent and include\
    \ a lot of paperwork and hard-to-follow moving pieces such as dealing with agents,\
    \ property checks, deeds, financing, notaries, and in many cases attorneys. There\
    \ are many pain points in the process. Blockchain can help reduce the costs, increase\
    \ security, increase privacy, and expedite the process.\n\nCombined with some\
    \ of the elements discussed previously, these solutions can provide value such\
    \ as identity, verify documents, and financial:\n\n- Confirming identity\n- Securely\
    \ identifying both buyer and sellers\n- Ensuring ownership\n- Keeping information\
    \ private and on a need-to-know basis\n- Verifying documents\n- Due diligence\
    \ on property\n- Conducting financial transactions\n- Transferring funds\n- Distributing\
    \ funds between parties such as agents and sellers\n- Paying bills\n\nBlockchain\
    \ services addressing these elements can speed up the process and at the same\
    \ time reduce paperwork and decrease costs.\n\nHere are some case studies:\n\n\
    - **Harbor** (`https://goharbor.io`): This provides an Ethereum ERC-20 token that\
    \ allows for the resale of currency as security. It’s a platform for digital securities\
    \ such as funds, private equity, and commercial real estate.\n\n- **Ubitquity**\
    \ (`https://www.ubitquity.io`): This offers a real estate SaaS platform utilizing\
    \ the blockchain platform aimed at mortgage, title, and financial companies. It\
    \ works with entities around the globe to gather property information and documents.\
    \ Ubitquity offers an API for integration with its blockchain platform (`https://www.ubitquity.io/`).\n\
    \n- **Propy** (`https://propy.com/browse/`): This company raised an ICO of more\
    \ than $15 million and claims it can save people up to 25 percent in fees when\
    \ buying property as well as avoid wire and fraud. Propy processes payments in\
    \ any currency, including crypto."
