    CLI with the local project Angular CLI. This can happen when setting files pointing
    to a previous version, or you may have used Angular in the past with an older
    version. What happens is that your local project Angular shows an older version
    than the global Angular installed on your computer.


    To ensure this is not the case, run any `ng` command, and if this issue exists,
    you will see the following error message:


    ```

    > ng

    Your global Angular CLI version (7.3.9) is greater than your local

    version (6.2.9). The local Angular CLI version is used.

    ```


    If you continue with these settings, you will be running version 6.x instead of
    7.x. To fix this, what you need to do is uninstall the Angular CLI from your dev
    environment and then install version 7.x.


    ```

    > npm uninstall --save-dev angular-cli

    > npm install --save-dev @angular/cli@7.3.9

    ```


    Notice that you use the `--save-dev` flag so the new version will be saved in
    your `package.json` project file. Now if you run the version command again, you
    should see the correct version with no warning messages.


    ```

    > ng --version

    Angular CLI: 7.3.2

    ```


    Now that you have ensured you are running the correct version of Angular CLI,
    you are ready to continue development and make changes to the seed starter app.


    #### Angular Components


    An Angular best practice is to use a Model View Controller (MVC)–style architecture.
    Angular supports coding with a separation of concerns just like any other mature
    framework.


    The Angular MVC includes the following three elements:


    *   *Model*: This contains the application’s data and Angular data binding, which
    allows reflection of data.


    ### Note


    reflection in relation to data binding, elements bound to a data and any data
    change is automatically reflected. For instance, you bind price change to multiple
    view elements and once the price change data is updated all the view elements
    are updated automatically.


    *   *View*: This contains the HTML or a template and directives.


    *   *Controller*: This is the glue holding the model and the view together. The
    controller takes the data, applies business logic, and sends the results to the
    view.


    As you probably recall, Angular’s welcome page opened when you were running the
    `serve` command. The welcome component is the application shell. The shell is
    controlled by an Angular component named `AppComponent`.


    Components are the fundamental building blocks of an Angular application. They
    display data on the screen, listen for user input, and take action based on that
    input.


    You will be creating a component called `transfer` that you will be using to transfer
    coins to another address. To create the `transfer` component, run the `ng generate
    component` command.


    ```

    > ng g c components/transfer

    ```


    Notice that you used the shortcuts `g` and `c` that stand for “generate” and “component,”
    respectively, but you can also use the full name instead of the abbreviation.


    The `ng` command generated the four following files for you:


    *   `transfer.component.css`: Component’s specific CSS styles


    *   `transfer.component.html`: Component template, written in HTML


    *   `transfer.component.spec.ts`: Testing file


    *   `transfer.component.ts`: Component class code, written in TypeScript


    These four files together act as the implementation of the `transfer` component.
    You can see the folder structure in Figure [9-7](#475651_1_En_9_Chapter.xhtml#Fig7).


    ![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig7_HTML.jpg](images/475651_1_En_9_Chapter/475651_1_En_9_Fig7_HTML.jpg)


    Figure 9-7


    Transfer component file structure


    An application’s structure is usually created with a header, a footer, and a navigation
    menu so you can navigate to different partial views.


    Using this architecture of header and footer components can help you create different
    views and split the page view into separate files. Think of each piece as a stand-alone
    reusable UI module. Angular Seed promotes this type of architecture and comes
    with the welcome component already created. Let’s create a start component, a
    header, and footer components.


    ```

    > ng g c components/start

    > ng g c components/header

    > ng g c components/footer

    ```


    You can see in the output that each component generated the following files:


    ```

    CREATE src/app/components/[component-name]/[component-name].component.css

    CREATE src/app/components/[component-name]/[component-name].component.html

    CREATE src/app/components/[component-name]/[component-name].component.spec.ts

    CREATE src/app/components/[component-name]/[component-name].component.ts

    ```


    In addition to these files, you can open `ethdapp/src/app/app.module.ts` and notice
    that the `app.module.ts` file was modified every time you created a component.
    The `app.module.ts` file is one of the most important files in Angular; it’s the
    app controller written in TypeScript. The controller is a global file that will
    tie your components together, so every component you want to use in your app needs
    to be defined in that file. If you did not use the `ng` script, you will need
    to modify `app.module.ts` yourself to link to the new component.


    Since you used the CLI, these imports are included automatically for you:


    ```

    import { TransferComponent } from ''./components/transfer/transfer.component'';

    import { StartComponent } from ''./components/start/start.component'';

    import { HeaderComponent } from ''./components/header/header.component'';

    import { FooterComponent } from ''./components/footer/footer.component'';

    ```'
  trans: '

    ##### 确保与 Angular CLI 版本不冲突


    你可以通过 WebStorm 或 `ng` 命令创建 Angular 种子项目，并且需要检查全局 Angular CLI 与本地项目 Angular CLI
    是否存在版本不匹配。当配置文件指向先前版本时，或者你之前使用过旧版本 Angular 时，可能会出现这种情况。具体表现为：本地项目中的 Angular 版本低于计算机上安装的全局
    Angular 版本。


    为确保不发生这种情况，请运行任意 `ng` 命令。如果存在此问题，你将看到以下错误消息：


    ```

    > ng

    Your global Angular CLI version (7.3.9) is greater than your local

    version (6.2.9). The local Angular CLI version is used.

    ```


    如果继续使用这些设置，你将运行 6.x 版本而不是 7.x 版本。要解决此问题，你需要从开发环境中卸载 Angular CLI，然后安装 7.x 版本。


    ```

    > npm uninstall --save-dev angular-cli

    > npm install --save-dev @angular/cli@7.3.9

    ```


    请注意，你使用了 `--save-dev` 标志，这样新版本将保存到你的 `package.json` 项目文件中。现在，再次运行版本命令，你应该会看到正确的版本，且没有警告消息。


    ```

    > ng --version

    Angular CLI: 7.3.2

    ```


    现在，你已经确认运行的是正确版本的 Angular CLI，就可以继续开发并对种子启动应用进行更改了。


    #### Angular 组件


    Angular 的最佳实践是使用模型-视图-控制器（MVC）风格的架构。与其他成熟框架一样，Angular 支持分离关注点的编码方式。


    Angular MVC 包含以下三个元素：


    *   **模型**：包含应用程序数据和 Angular 数据绑定，允许数据反射。


    > **注意**：数据绑定中的反射是指，与数据绑定的元素会在数据发生任何变化时自动反映该变化。例如，你将价格变化绑定到多个视图元素，一旦价格变化数据更新，所有视图元素都会自动更新。


    *   **视图**：包含 HTML 或模板以及指令。


    *   **控制器**：是连接模型和视图的粘合剂。控制器获取数据，应用业务逻辑，并将结果发送到视图。


    你可能还记得，当你运行 `serve` 命令时，Angular 的欢迎页面打开了。欢迎组件就是应用程序外壳。该外壳由一个名为 `AppComponent`
    的 Angular 组件控制。


    组件是 Angular 应用程序的基本构建块。它们在屏幕上显示数据，监听用户输入，并根据输入执行操作。


    你将创建一个名为 `transfer` 的组件，用于将代币转移到另一个地址。要创建 `transfer` 组件，请运行 `ng generate component`
    命令。


    ```

    > ng g c components/transfer

    ```


    请注意，你使用了 `g` 和 `c` 这两个缩写，分别代表 "generate" 和 "component"，但你也可以使用完整名称而不是缩写。


    `ng` 命令为你生成了以下四个文件：


    *   `transfer.component.css`：组件的 CSS 样式

    *   `transfer.component.html`：组件模板，用 HTML 编写

    *   `transfer.component.spec.ts`：测试文件

    *   `transfer.component.ts`：组件类代码，用 TypeScript 编写


    这四个文件共同构成了 `transfer` 组件的实现。你可以在图 9-7 中看到文件夹结构。


    ![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig7_HTML.jpg](img/475651_1_En_9_Fig7_HTML.jpg)


    图 9-7


    传输组件文件结构


    应用程序的结构通常由页眉、页脚和导航菜单组成，以便你可以导航到不同的局部视图。


    使用这种页眉和页脚组件的架构可以帮助你创建不同的视图，并将页面视图拆分成独立的文件。将每个部分视为一个独立的可复用 UI 模块。Angular Seed 提倡这种架构，并已创建了欢迎组件。让我们创建一个启动组件，一个页眉组件和一个页脚组件。


    ```

    > ng g c components/start

    > ng g c components/header

    > ng g c components/footer

    ```


    你可以在输出中看到，每个组件都生成了以下文件：


    ```

    CREATE src/app/components/[component-name]/[component-name].component.css

    CREATE src/app/components/[component-name]/[component-name].component.html

    CREATE src/app/components/[component-name]/[component-name].component.spec.ts

    CREATE src/app/components/[component-name]/[component-name].component.ts

    ```


    除了这些文件之外，你可以打开 `ethdapp/src/app/app.module.ts`，注意到每次创建组件时，`app.module.ts` 文件都会被修改。`app.module.ts`
    文件是 Angular 中最重要的文件之一；它是用 TypeScript 编写的应用程序控制器。控制器是一个全局文件，它将你的组件连接在一起，因此你希望在应用程序中使用的每个组件都需要在该文件中定义。如果你没有使用
    `ng` 脚本，则需要自己修改 `app.module.ts` 来链接新组件。


    由于你使用了 CLI，这些导入会自动为你包含在内：


    ```

    import { TransferComponent } from ''./components/transfer/transfer.component'';

    import { StartComponent } from ''./components/start/start.component'';

    import { HeaderComponent } from ''./components/header/header.component'';

    import { FooterComponent } from ''./components/footer/footer.component'';

    ```

    '
- fmt: '### Routing Module


    Another important file and a good practice to create is an app-routing module.
    This file acts as a controller to instruct Angular how to navigate to different
    views in your app.


    Normally, to generate a route for your app, you do not need to manually do so,
    since during the creation of your app, you decided to create the routing file
    called `app-routing`.


    If you need to create the `app-routing` file, you can run the following `module`
    command:


    ```

    > ng generate module app-routing --flat --module=app

    CREATE src/app/app-routing.module.ts

    UPDATE src/app/app.module.ts

    ```


    Notice that this time in your command you are using the full name `generate module`
    instead of just the first letters of `g` and `m`. Both options work the same way.


    The `generate module` command creates the initial code shown in Listing [9-1](#475651_1_En_9_Chapter.xhtml#PC24)
    for `src/app/app-routing.module.ts`.


    ```

    import { NgModule } from ''@angular/core'';

    import { Routes, RouterModule } from ''@angular/router'';

    const routes: Routes = [];

    @NgModule({

    imports: [RouterModule.forRoot(routes)],

    exports: [RouterModule]

    })

    export class AppRoutingModule { }

    Listing 9-1

    app-routing Initial Startup Code

    ```


    The initial code includes an `import` statement to Angular code and module tag.
    Next, replace the pre-populated code of `app-routing.module.ts` file with the
    code in Listing [9-2](#475651_1_En_9_Chapter.xhtml#PC25).


    ```

    import { NgModule } from ''@angular/core'';

    import { CommonModule } from ''@angular/common'';

    import { RouterModule, Routes } from ''@angular/router'';

    import { StartComponent } from ''./components/start/start.component'';

    import { TransferComponent } from ''./components/transfer/transfer.component'';

    const routes: Routes = [

    { path: '''', redirectTo: ''/start'', pathMatch: ''full'' },

    { path: ''start'', component: StartComponent },

    { path: ''transfer'', component: TransferComponent }

    ];

    @NgModule({

    declarations: [],

    imports: [ RouterModule.forRoot(routes), CommonModule ],

    exports: [ RouterModule ]

    })

    export class AppRoutingModule { }

    Listing 9-2

    app-routing Code to Route Views

    ```


    In Listing [9-2](#475651_1_En_9_Chapter.xhtml#PC24), you imported the view components
    you will be using; these are `start` and `transfer`. They will act as web pages
    on a web site or partial views on a mobile app. The route tells your app what
    view to match with what keyword, and lastly you set `import` statements to tell
    Angular who can access this module.


    Now that the routing is set, you can get the footer, header, and body of the page
    to display. All you have to do is open `src/app/app.component.html` and update
    from the welcome page’s HTML code to the following three lines:


    To test the changes you made to your application, you don’t need to publish your
    app again or run any scripts; just save the files and run the same `serve` command
    you ran before in Terminal.


    ```

    > ng serve

    ⌈wdm⌋: Compiled successfully.

    ```


    The `serve` script includes scripts to watch for changes in files and update your
    app automatically, so all you have to do when you make a change to your files
    is go back to the browser. Most of the time you won’t even need to refresh your
    web page; the changes will be there automatically. Navigate to `http://localhost:4200`
    to see the changes.


    If you would like to go directly to the transfer page, all you have to do is add
    the keyword you selected at the end of the URL as you set up the routing mechanism:
    `http://localhost:4200/transfer`. See Figure [9-8](#475651_1_En_9_Chapter.xhtml#Fig8).


    ![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig8_HTML.jpg](images/475651_1_En_9_Chapter/475651_1_En_9_Fig8_HTML.jpg)


    Figure 9-8


    Ethdapp header, footer, and transfer page


    You can download this step here: [`https://github.com/Apress/the-blockchain-developer/chapter9/step2.zip`](https://www.scala-sbt.org/1.x/docs/Installing-sbt-on-Windows.html)
    .


    ### Styling an Angular App


    Your app at this point is not styled and only shows text with a header, the page,
    and a footer; however, before you start styling, it’s helpful to understand the
    Angular style architecture to ensure you don’t end up with a Cascading Style Sheets
    (CSS) file that is too big to manage. You can style your app on a global level
    with styles that you need across your entire app as well as a specific style unique
    to only one component.


    Additionally, it would be neat to sprint from zero to a styled app quickly. This
    can be done with Angular Material. Angular Material gives you a shortcut to get
    a consistent “look” to your app without all the hassle of thinking about cross-browser,
    cross-device programming. Let’s take a look.


    #### Angular-Style Architecture


    Angular is set up to have a global CSS file. That CSS file is called `style.css`,
    and you can find it in the root of the project. `src/style.css` holds the styles
    that you want to use for your entire app, such as fonts, themes, styles for all
    the components, and so on.


    As you have seen, each component also includes a private CSS file. The specific
    component CSS file is where you put styles that are unique and used only for that
    component.


    For instance, `/src/app/components/footer/footer.component.css` holds the styles
    specific for the footer component.


    #### Angular Material


    Right now, your starter application is fast because it includes minimal code;
    however, there is a potential performance issue as you add more and more components,
    assets, and style to your app. You can get your app bloated easily, and every
    millisecond delay counts.


    The other potential issue is testing. All the different browsers, versions of
    browsers, screen sizes, and devices need to be tested, and creating your pages
    from scratch will require rigid testing and a quality assurance (QA) team to ensure
    it works consistently across devices.


    Angular Material solves all these issues plus provides accessibility and internationalization.
    That is because Angular Material is optimized for Angular and built by the Angular
    team, so it integrates seamlessly with Angular. It has already passed all these
    compatibility tests.


    For more information, check the Angular Material getting started page: [`https://material.angular.io/guide/getting-started`](https://material.angular.io/guide/getting-started)
    .


    #### Install Angular Material


    There are a few ways to install Material. Because you have installed the Angular
    DevKit, you are able to just run the `ng add` command to get the Angular Material
    library. You need to first install `cdk` because it’s a dependency.


    ```

    > ng add @angular/cdk

    ```


    Next, install Material.


    ```

    > ng add @angular/material

    ```


    Notice that the output asks you which theme color you would like with links. I
    will cover themes in the next section of this chapter, but for now, select the
    first or any color you prefer.


    ```

    ? Choose a prebuilt theme name, or "custom" for a custom theme: (Use arrow keys)

    □ Indigo/Pink       [ Preview: https://material.angular.io?theme=indigo-pink ]

    Deep Purple/Amber  [ Preview: https://material.angular.io?theme=deeppurple-amber
    ]

    Pink/Blue Grey     [ Preview: https://material.angular.io?theme=pink-bluegrey
    ]

    Purple/Green       [ Preview: https://material.angular.io?theme=purple-green ]

    ```


    You can also set up gesture recognitions and animations.


    ```

    ? Set up HammerJS for gesture recognition? Yes

    ? Set up browser animations for Angular Material? Yes

    ```


    The expected output should be showing the files that were updated:


    ```

    UPDATE package.json

    UPDATE angular.json

    UPDATE src/app/app.module.ts

    UPDATE src/index.html

    UPDATE src/styles.css

    ```'
