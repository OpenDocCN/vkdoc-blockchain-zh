    file with this book’s code, so feel free to import it; see [`https://github.com/Apress/the-blockchain-developer/chapter8/hello-network`](https://github.com/Apress/the-blockchain-developer/chapter8/hello-network)
    .


    The `.bna` file is nothing more than a zip folder named `bna`. In fact, you can
    copy the `.bna` file as `.zip` and unzip the files.


    ```

    >  cp hello-network.bna hello-network.zip

    > unzip hello-network.zip

    ```


    VSCode can be used as your IDE for your entire Hyperledger project. For instance,
    now that you have unzipped your files, you can open VSCode and drag and drop the
    model file `models/org.example.model.cto` into VSCode. You can see that the code
    is highlighted, as shown in Figure [8-20](#475651_1_En_8_Chapter.xhtml#Fig20).


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig20_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig20_HTML.jpg)


    Figure 8-20


    Model CTO file in VSCode


    You wrote your files in Composer Playground using the web interface. This suite
    is a less developer savvy approach; however, a larger project can include complex
    business logic, events, many transactions, and testing, so it is advisable to
    create your project and manage files with VSCode and then upload those files into
    Playground for deployment.


    ### Playground Online


    Hyperledger Composer Playground has an online version available at [`https://composer-playground.mybluemix.net/`](https://composer-playground.mybluemix.net/)
    . You can use the same steps you used before to create your network and files.
    See Figure [8-21](#475651_1_En_8_Chapter.xhtml#Fig21).


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig21_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig21_HTML.jpg)


    Figure 8-21


    Composer Playground


    To test Playground Online, you can import the `hello-network.bna` file you created
    previously. To do so, first click “Let’s Blockchain!” and under “2\. MODEL NETWORK
    STARTER TEMPLATE” select “Drop here to upload or browse” and upload the `hello-network.bna`
    file. Click the Deploy button at the bottom-right corner. You can see the network
    created. Click the “Connect now” link to connect to the new network. See Figure
    [8-22](#475651_1_En_8_Chapter.xhtml#Fig22).


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig22_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig22_HTML.jpg)


    Figure 8-22


    hello-network connect link


    You can repeat the same steps to create an asset and test, just as you have done
    on the local playground.


    #### Creating a Business Network with Yeoman


    You used Hyperledger Playground to generate your business network. Hyperledger
    Playground is aimed not just for developers but also at business owners because
    of its simplicity; however, you can also create a network in Terminal.


    Yeoman provides a wizard you can use. If you are unfamiliar with Yeoman, it provides
    a wizard generator through the command line. You can either run `Yeoman` and select
    Hyperledger Composer and the Business Network generator or run the following:


    ```

    > Yeoman hyperledger-composer:businessnetwork

    ```


    Keep in mind that Hyperledger Composer can be used for more than just generating
    the business network; it can be used for Angular, LoopBack, and Model as well.
    See Figure [8-23](#475651_1_En_8_Chapter.xhtml#Fig23).


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig23_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig23_HTML.jpg)


    Figure 8-23


    Generating hello-network with the Yeoman wizard


    The `hello-network` folder is generated and includes `permissions.acl`, `models`,
    `features`, `test`, and `lib`. Next, to create the `.bna` file, you can use Hyperledger
    Composer. See Figure [8-24](#475651_1_En_8_Chapter.xhtml#Fig24).


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig24_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig24_HTML.jpg)


    Figure 8-24


    Generating the hello-network BNA file with Hyperledger Composer


    ```

    > cd hello-network

    > composer archive create -t dir -n .

    ```


    Run the `ls` command and confirm that the `hello-network@0.0.1.bna` file is generated.


    ```

    > ls *.bna

    hello-network@0.0.1.bna

    ```


    ## Deploying on a Local Hyperledger Fabric Network


    To deploy the `.bna` file to a local Hyperledger Fabric network, run the `composer
    network install` command and point to the `.bna` file while specifying the identity
    card.


    ```

    > cd ~/fabric-dev-servers/

    > composer network install --archiveFile ~/Desktop/hello-network.bna --card PeerAdmin@hlfv1

    ```


    This will result in the successful output shown in Figure [8-25](#475651_1_En_8_Chapter.xhtml#Fig25).


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig25_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig25_HTML.jpg)


    Figure 8-25


    Installing local Hyperledger Fabric command output


    ## Running the “hello-network” Network


    Hyperledger Composer is the application development framework for building blockchain
    applications based on Hyperledger Fabric.


    Hyperledger Composer generates REST APIs based on the business network definition
    you created. This is done using what is called a LoopBack connector. You can take
    these REST APIs to be used by a) a client such as a dapp b) integrate with non-blockchain
    clients such as a web site. That allows you to use the blockchain ledger just
    as you would use any other database with a middleware. That is powerful.


    Hyperledger Composer can generate a REST interface. You can run Hyperledger Fabric
    on your computer and generate a GUI that you can then use to interact with the
    network running on your computer just like it would be on a real production server.'
  trans: '

    ### 测试模型


    现在模型实例已保存，您可以提交交易来调用该交易。在左侧，点击"提交交易"按钮。提交交易向导随即打开。将 `ID` 设置为 `001`，如图 8-17 所示。


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig17_HTML.jpg](img/475651_1_En_8_Fig17_HTML.jpg)


    图 8-17

    Hyperledger Playground，提交交易向导


    在测试前，请打开开发者控制台以便查看 JavaScript 消息。对于 Safari 浏览器，请按照以下说明操作。


    在顶部菜单中，选择 Safari ➤ 偏好设置。点击"高级"选项卡，然后勾选"在菜单栏中显示''开发''菜单"复选框。


    完成这些步骤后，您会在顶部菜单中看到"开发"选项。选择"显示 JavaScript 控制台"（或按 `Command+Option+C` 键）。


    接下来，点击"提交"；您将在 JavaScript 控制台中看到"Hello world"消息，如图 8-18 所示。


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig18_HTML.jpg](img/475651_1_En_8_Fig18_HTML.jpg)


    图 8-18

    JavaScript 控制台中显示的"Hello world"消息


    ### 导入/导出模型


    要导出模型，您可以生成业务网络归档文件（`.bna`）。此 `.bna` 文件随后可部署到生产环境。您只需点击"导出"链接即可，如图 8-19 所示。


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig19_HTML.jpg](img/475651_1_En_8_Fig19_HTML.jpg)


    图 8-19

    导出 `.bna` 文件


    Playground 会生成 `hello-network.bna` 文件，该文件将下载到您的计算机上。


    同样地，您可以导入一个 `.bna` 文件：点击"添加文件"链接，然后在"从您的计算机上传文件..."下，您可以浏览或拖放该 `.bna` 文件。


    导入/导出功能不仅用于发布，还可以与他人共享模型以进行测试、开发或其他用途。我已将 `hello-network.bna` 文件包含在本书的代码中，欢迎导入使用；请参见
    [`https://github.com/Apress/the-blockchain-developer/chapter8/hello-network`](https://github.com/Apress/the-blockchain-developer/chapter8/hello-network)。


    `.bna` 文件实际上就是一个名为 `bna` 的 zip 文件夹。事实上，您可以将 `.bna` 文件复制为 `.zip` 文件并解压缩。


    ```

    > cp hello-network.bna hello-network.zip

    > unzip hello-network.zip

    ```


    `VSCode` 可用作您整个 Hyperledger 项目的集成开发环境。例如，既然您已经解压了文件，可以打开 VSCode，并将模型文件 `models/org.example.model.cto`
    拖放到 VSCode 中。您会看到代码已高亮显示，如图 8-20 所示。


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig20_HTML.jpg](img/475651_1_En_8_Fig20_HTML.jpg)


    图 8-20

    VSCode 中的模型 CTO 文件


    您之前使用 Web 界面在 Composer Playground 中编写了文件。这种方式对开发者的技术要求较低；然而，较大的项目可能包含复杂的业务逻辑、事件、多笔交易和测试，因此建议使用
    VSCode 创建和管理项目文件，然后将这些文件上传到 Playground 进行部署。


    ### Playground 在线版


    Hyperledger Composer Playground 有一个在线版本，访问地址为 [`https://composer-playground.mybluemix.net/`](https://composer-playground.mybluemix.net/)。您可以使用之前相同的步骤来创建您的网络和文件。请参见图
    8-21。


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig21_HTML.jpg](img/475651_1_En_8_Fig21_HTML.jpg)


    图 8-21

    Composer Playground


    要测试 Playground 在线版，您可以导入之前创建的 `hello-network.bna` 文件。为此，首先点击"Let''s Blockchain!"，然后在"2.
    MODEL NETWORK STARTER TEMPLATE"下选择"拖拽到此处上传或浏览"，并上传 `hello-network.bna` 文件。点击右下角的"部署"按钮。您将看到网络已创建。点击"立即连接"链接以连接到新网络。请参见图
    8-22。


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig22_HTML.jpg](img/475651_1_En_8_Fig22_HTML.jpg)


    图 8-22

    `hello-network` 连接链接


    您可以重复相同的步骤来创建资产并进行测试，就像在本地 Playground 上所做的那样。


    #### 使用 Yeoman 创建业务网络


    您使用了 Hyperledger Playground 来生成业务网络。Hyperledger Playground 不仅面向开发者，也因其简易性而面向业务所有者；不过，您也可以在终端中创建网络。


    Yeoman 提供了一个可用的向导。如果您不熟悉 Yeoman，它通过命令行提供了一个向导生成器。您可以运行 `Yeoman` 并选择 Hyperledger
    Composer 和业务网络生成器，或者运行以下命令：


    ```

    > Yeoman hyperledger-composer:businessnetwork

    ```


    请记住，Hyperledger Composer 不仅可用于生成业务网络，还可用于 Angular、LoopBack 和模型。请参见图 8-23。


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig23_HTML.jpg](img/475651_1_En_8_Fig23_HTML.jpg)


    图 8-23

    使用 Yeoman 向导生成 `hello-network`


    `hello-network` 文件夹被生成，其中包含 `permissions.acl`、`models`、`features`、`test` 和 `lib`。接下来，要创建
    `.bna` 文件，您可以使用 Hyperledger Composer。请参见图 8-24。


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig24_HTML.jpg](img/475651_1_En_8_Fig24_HTML.jpg)


    图 8-24

    使用 Hyperledger Composer 生成 `hello-network` BNA 文件


    ```

    > cd hello-network

    > composer archive create -t dir -n .

    ```


    运行 `ls` 命令，确认已生成 `hello-network@0.0.1.bna` 文件。


    ```

    > ls *.bna

    hello-network@0.0.1.bna

    ```


    ## 部署到本地 Hyperledger Fabric 网络


    要将 `.bna` 文件部署到本地 Hyperledger Fabric 网络，请运行 `composer network install` 命令，并指定
    `.bna` 文件以及身份卡。


    ```

    > cd ~/fabric-dev-servers/

    > composer network install --archiveFile ~/Desktop/hello-network.bna --card PeerAdmin@hlfv1

    ```


    这将产生如图 8-25 所示的成功输出。


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig25_HTML.jpg](img/475651_1_En_8_Fig25_HTML.jpg)


    图 8-25

    安装本地 Hyperledger Fabric 命令输出


    ## 运行 "hello-network" 网络


    Hyperledger Composer 是一个应用程序开发框架，用于构建基于 Hyperledger Fabric 的区块链应用。


    Hyperledger Composer 根据您创建的业务网络定义生成 REST API。这是通过一个称为 LoopBack 连接器的方式实现的。您可以将这些
    REST API 用于：a) 客户端（例如去中心化应用）；b) 与非区块链客户端（例如网站）集成。这让您可以像使用任何带有中间件的数据库一样使用区块链账本。这非常强大。


    Hyperledger Composer 可以生成一个 REST 接口。您可以在自己的计算机上运行 Hyperledger Fabric 并生成一个 GUI，然后使用此
    GUI 与运行在您计算机上的网络进行交互，就像在真实的生产服务器上一样。

