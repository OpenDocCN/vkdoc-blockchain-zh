    \ file and includes information about your project.\n- **package.json**: This\
    \ is the `npm` manager configuration file and includes all the libraries you will\
    \ be using in your project.\n- **README.MD**: This is documentation about your\
    \ project; this will be the “home page” document of your project and the first\
    \ file developers will read to get instructions on how to get the project running.\n\
    - **tsconfig.json**: This is the TypeScript config file.\n- **tslint.json**: This\
    \ is the Lint config file used to set your best-practice formatting, spacing,\
    \ and the like.\n\n#### Serve the Application\n\nTo see your actual dapps, you\
    \ will be using the `ng serve` command, which builds the app, starts the development\
    \ server, watches the source files, and rebuilds the app as you make changes to\
    \ those files. The `--open` flag opens the app in a browser on port 4200 here:\
    \ `http://localhost:4200/`. Run the `ng serve` command with the `open` flag.\n\
    \n```\n> ng serve --open\n```\n\nYou should see the dapp running in your browser,\
    \ as shown in Figure [9-4](#475651_1_En_9_Chapter.xhtml#Fig4).\n\n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig4_HTML.jpg](images/475651_1_En_9_Chapter/475651_1_En_9_Fig4_HTML.jpg)\n\
    \n**Figure 9-4** Angular seed app running in the browser\n\nThe skeleton app includes\
    \ links to a tour, documentation, and an Angular blog. By going through the “Tour\
    \ of Heroes” and the CLI documentation, you can get a good understanding of how\
    \ Angular works, and bookmarking the Angular blog can give you updates on future\
    \ releases and announcements.\n\nTo stop the application from serving, press `Command+C`\
    \ in Terminal.\n\n#### Angular Project with WebStorm\n\nAnother option for firing\
    \ up the Angular seed project is utilizing the WebStorm IDE, which you have been\
    \ using in previous chapters. WebStorm allows you to either import the seed project\
    \ you created or create a new seed project.\n\nTo import the `ethdapp` project\
    \ you created with the Angular CLI `ng new` command, open WebStorm, select **File**\
    \ ➤ **Open**, and navigate to the `ethdapp` directory. That’s it; WebStorm will\
    \ automatically import the project.\n\nAlternatively, to start a new Angular seed\
    \ project in WebStorm, select **File** ➤ **New** ➤ **Project** from the top menu.\
    \ Next, select **Angular CLI** and name your project **ethdapp**. Use the drop-down\
    \ menu to select the version of the Angular CLI, as shown in Figure [9-5](#475651_1_En_9_Chapter.xhtml#Fig5).\n\
    \n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig5_HTML.jpg](images/475651_1_En_9_Chapter/475651_1_En_9_Fig5_HTML.jpg)\n\
    \n**Figure 9-5** Generating the Angular seed project in WebStorm\n\nNow that the\
    \ project is created, you can run the same command, utilizing the Terminal tab\
    \ in the bottom menu of WebStorm, as shown in Figure [9-6](#475651_1_En_9_Chapter.xhtml#Fig6).\n\
    \n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig6_HTML.jpg](images/475651_1_En_9_Chapter/475651_1_En_9_Fig6_HTML.jpg)\n\
    \n**Figure 9-6** Serving ethdapp in WebStorm’s Terminal\n\n```\n> ng serve –open\n\
    ```\n\nYou can download the skeleton application from the book repository: [`https://github.com/Apress/the-blockchain-developer/chapter9/step1.zip`](https://www.scala-sbt.org/1.x/docs/Installing-sbt-on-Windows.html).\n\
    \nWhen you download your steps, make sure you run `npm install` because I stripped\
    \ out the `node` module to decrease the size of the project.\n\n```\n> npm install\n\
    ```\n\n**Note:** I excluded `node_modules`, which holds all the project’s dependencies,\
    \ from the project. It’s common not to include it with a project because of its\
    \ size; you can install it with the `npm install` command."
  raw: "#### Create an Angular Project\n\nNow that you have the main tools and libraries\
    \ installed, you can proceed and create your project from scratch by downloading\
    \ other needed libraries, test libraries, and build scripts, as well as make your\
    \ own folder structure; however, to expedite this process, you can use the Angular\
    \ seed project that includes a skeleton project to quickly bootstrap your project.\n\
    \nUsing the Angular seed project can help you start development quickly and efficiently,\
    \ following Angular's best practices. There are pros and cons of using boilerplate\
    \ skeleton code. You can decide on your own if you want to use this skeleton for\
    \ future projects, but for this demo app, it is ideal.\n\nThere are many ways\
    \ you can create your project using the Angular seed skeleton. I will be showing\
    \ you two options here: using the Angular CLI and using WebStorm.\n\nThe `ng new`\
    \ command will run a script that will create your app. You can run the CLI `new`\
    \ command and give the name `ethdapp` as your app name.\n\n```\n> cd ~/desktop\n\
    > ng new ethdapp\nWould you like to add Angular routing? (y/N) y\nWhich stylesheet\
    \ format would you like to use? CSS\n```\n\nNotice that I added routing here and\
    \ decided to use CSS for styles. I will get more into these later in the chapter.\n\
    \nOnce installation is complete, it will output all the files that are created.\n\
    \n```\nCREATE ethdapp/README.md (1024 bytes)\nCREATE ethdapp/angular.json (3557\
    \ bytes)\nCREATE ethdapp/package.json (1313 bytes)\n...\n```\n\nChange directories\
    \ to the newly created folder and confirm you have the initial files and directories.\n\
    \n```\n> cd ethdapp\n```\n\nRunning the following command will analyze your `package.json`\
    \ config file with recommendations:\n\n```\n> ng update\n```\n\nYou can run the\
    \ following command to follow the recommendations:\n\n```\n> ng update --all\n\
    ```\n\nNext, install Bower globally. Bower is a package manager that is used often\
    \ with Angular. At the time of writing, it’s at version 1.8.8.\n\n```\n> npm install\
    \ -g bower\n> bower -v\n1.8.8\n```\n\nLet’s do a walk-through of what was created\
    \ in a workspace and the starter project files (see Figure [9-3](#475651_1_En_9_Chapter.xhtml#Fig3)).\n\
    \n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig3_HTML.jpg](images/475651_1_En_9_Chapter/475651_1_En_9_Fig3_HTML.jpg)\n\
    \nFigure 9-3\n\nEthdapp files created by Angular CLI\n\n*   *A new workspace*:\
    \ This is the root folder named `ethdapp`.\n\n*   *e2e folder*: This contains\
    \ an end-to-end test project, located here: `ethdapp/e2e`. The testing folder\
    \ includes the Jasmin library’s JSON configuration file.\n\n*   *src folder*:\
    \ This is your project folder, which includes all the files of your project.\n\
    \    *   An initial skeleton app project, located here: `ethdapp/src/app`\n\n\
    \    *   The `assets` folder with the entry file `index.html`\n\n    *   Other\
    \ configuration files\n\n*   *.gitignore*: Here you list any files and folders\
    \ that you would like to ignore when you upload your project to Git.\n\n*   *angular.json*:\
    \ This is your project configuration file and includes information about your\
    \ project.\n\n*   *package.json*: This is the `npm` manager configuration file\
    \ and includes all the libraries you will be using in your project.\n\n*   *README.MD*:\
    \ This is documentation about your project; this will be the “home page” document\
    \ of your project and the first file developers will read to get instructions\
    \ on how to get the project running.\n\n*   *tsconfig.json*: This is the TypeScript\
    \ config file.\n\n*   *tslint.json*: This is the Lint config file used to set\
    \ your best-practice formatting, spacing, and the like.\n\n##### Serve the Application\n\
    \nTo see your actual dapps, you will be using the `ng serve` command , which builds\
    \ the app, starts the development server, watches the source files, and rebuilds\
    \ the app as you make changes to those files. The `--open` flag opens the app\
    \ in a browser on port 4200 here: `http://localhost:4200/`. Run the `ng serve`\
    \ command with the `open` flag.\n\n```\n> ng serve --open\n```\n\nYou should see\
    \ the dapp running in your browser, as shown in Figure [9-4](#475651_1_En_9_Chapter.xhtml#Fig4).\n\
    \n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig4_HTML.jpg](images/475651_1_En_9_Chapter/475651_1_En_9_Fig4_HTML.jpg)\n\
    \nFigure 9-4\n\nAngular seed app running in the browser\n\nThe skeleton app includes\
    \ links to a tour, documentation, and an Angular blog. By going through the “Tour\
    \ of Heroes” and the CLI documentation, you can get a good understanding of how\
    \ Angular works, and bookmarking the Angular blog can give you updates on future\
    \ releases and announcements.\n\nTo stop the application from serving, press Command+C\
    \ in Terminal.\n\n##### Angular Project with WebStorm\n\nAnother option for firing\
    \ up the Angular seed project is utilizing the WebStorm IDE, which you have been\
    \ using in previous chapters. WebStorm allows you to either import the seed project\
    \ you created or create a new seed project.\n\nTo import the ethdapp project you\
    \ created with the Angular CLI `ng new` command, open WebStorm, select File ➤\
    \ Open, and navigate to the `ethdapp` directory. That’s it; WebStorm will automatically\
    \ import the project.\n\nAlternatively, to start a new Angular seed project in\
    \ WebStorm, select File ➤ New ➤ Project from the top menu. Next, select Angular\
    \ CLI and name your project **ethdapp**. Use the drop-down menu to select the\
    \ version of the Angular CLI, as shown in Figure [9-5](#475651_1_En_9_Chapter.xhtml#Fig5).\n\
    \n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig5_HTML.jpg](images/475651_1_En_9_Chapter/475651_1_En_9_Fig5_HTML.jpg)\n\
    \nFigure 9-5\n\nGenerating the Angular seed project in WebStorm\n\nNow that the\
    \ project is created, you can run the same command, utilizing the Terminal tab\
    \ in the bottom menu of WebStorm, as shown in Figure [9-6](#475651_1_En_9_Chapter.xhtml#Fig6).\n\
    \n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig6_HTML.jpg](images/475651_1_En_9_Chapter/475651_1_En_9_Fig6_HTML.jpg)\n\
    \nFigure 9-6\n\nServing ethdapp in WebStorm’s Terminal\n\n```\n> ng serve –open\n\
    ```\n\nYou can download the skeleton application from the book repository: [`https://github.com/Apress/the-blockchain-developer/chapter9/step1.zip`](https://www.scala-sbt.org/1.x/docs/Installing-sbt-on-Windows.html)\
    \ .\n\nWhen you download your steps, make sure you run `npm install` because I\
    \ stripped out the `node` module to decrease the size of the project.\n\n```\n\
    > npm install\n```\n\n### Note\n\nI excluded `node_modules`, which holds all the\
    \ project’s dependencies, from the project. It’s common not to include it with\
    \ a project because of its size; you can install it with the `npm install` command."
  trans: "\n### 创建 Angular 项目\n\n现在你已经安装了主要的工具和库，可以继续从零开始创建项目了——这需要下载其他必要的库、测试库和构建脚本，并建立自己的文件夹结构。但为了加快这个过程，你可以使用\
    \ Angular 种子项目，它包含一个骨架项目，能帮助你快速启动项目。\n\n使用 Angular 种子项目可以让你遵循 Angular 的最佳实践，快速高效地开始开发。使用样板骨架代码既有优点也有缺点。你可以自行决定是否在未来的项目中继续使用这个骨架，但对于这个演示应用来说，它非常理想。\n\
    \n使用 Angular 种子骨架创建项目有很多方法。这里我将展示两种方案：使用 Angular CLI 和使用 WebStorm。\n\n`ng new`\
    \ 命令将运行一个脚本，为你创建应用。你可以运行 CLI 的 `new` 命令，并将 `ethdapp` 作为你的应用名称。\n\n```\n> cd ~/desktop\n\
    > ng new ethdapp\nWould you like to add Angular routing? (y/N) y\nWhich stylesheet\
    \ format would you like to use? CSS\n```\n\n注意，我在这里添加了路由，并决定使用 CSS 作为样式格式。这些内容将在本章后面详细介绍。\n\
    \n安装完成后，它会输出所有创建的文件。\n\n```\nCREATE ethdapp/README.md (1024 bytes)\nCREATE ethdapp/angular.json\
    \ (3557 bytes)\nCREATE ethdapp/package.json (1313 bytes)\n...\n```\n\n切换到新创建的文件夹，确认你已经拥有了初始文件和目录。\n\
    \n```\n> cd ethdapp\n```\n\n运行以下命令，它会分析你的 `package.json` 配置文件并提供建议：\n\n```\n>\
    \ ng update\n```\n\n你可以运行以下命令来遵循这些建议：\n\n```\n> ng update --all\n```\n\n接下来，全局安装\
    \ Bower。Bower 是一个常用于 Angular 的包管理器。在撰写本文时，其版本为 1.8.8。\n\n```\n> npm install -g\
    \ bower\n> bower -v\n1.8.8\n```\n\n我们来概述一下工作区中创建的内容以及启动项目文件（见图 9-3）。\n\n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig3_HTML.jpg](img/475651_1_En_9_Fig3_HTML.jpg)\n\
    \n**图 9-3** Angular CLI 创建的 Ethdapp 文件\n\n*   ****新工作区**：这是名为 `ethdapp` 的根文件夹。\n\
    *   **e2e 文件夹**：包含端到端测试项目，位于 `ethdapp/e2e`。测试文件夹包含 Jasmin 库的 JSON 配置文件。\n*   **src\
    \ 文件夹**：这是你的项目文件夹，包含项目的所有文件。\n  * 初始骨架应用项目，位于 `ethdapp/src/app`\n  * 带有入口文件 `index.html`\
    \ 的 `assets` 文件夹\n  * 其他配置文件\n*   **.gitignore**：在这里列出你希望在上传到 Git 时忽略的任何文件和文件夹。\n\
    *   **angular.json**：这是你的项目配置文件，包含项目的相关信息。\n*   **package.json**：这是 `npm` 管理器配置文件，包含你将在项目中使用的所有库。\n\
    *   **README.MD**：这是关于你项目的文档；它将作为项目的“主页”文档，也是开发者首先阅读以获取项目运行说明的文件。\n*   **tsconfig.json**：这是\
    \ TypeScript 配置文件。\n*   **tslint.json**：这是 Lint 配置文件，用于设置你的最佳实践格式化、间距等。\n\n####\
    \ 启动应用\n\n要查看你的实际去中心化应用（dapps），你将使用 `ng serve` 命令，它会构建应用、启动开发服务器、监视源文件，并在你修改这些文件时重新构建应用。`--open`\
    \ 标志会在浏览器的 4200 端口上打开应用，地址为 `http://localhost:4200/`。运行带有 `open` 标志的 `ng serve`\
    \ 命令。\n\n```\n> ng serve --open\n```\n\n你应该会在浏览器中看到正在运行的去中心化应用，如图 9-4 所示。\n\n\
    ![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig4_HTML.jpg](img/475651_1_En_9_Fig4_HTML.jpg)\n\
    \n**图 9-4** 在浏览器中运行的 Angular 种子应用\n\n骨架应用包含指向教程、文档和 Angular 博客的链接。通过浏览“Hero 之旅”和\
    \ CLI 文档，你可以很好地理解 Angular 的工作原理，而将 Angular 博客加入书签则可以让你获得未来版本发布和公告的更新。\n\n要停止应用服务，请在终端中按\
    \ `Command+C`。\n\n#### 使用 WebStorm 创建 Angular 项目\n\n启动 Angular 种子项目的另一个方法是利用你之前章节中使用过的\
    \ WebStorm IDE。WebStorm 允许你导入已创建的种子项目，或者创建一个新的种子项目。\n\n要导入你使用 Angular CLI `ng\
    \ new` 命令创建的 `ethdapp` 项目，请打开 WebStorm，选择 **File** ➤ **Open**，然后导航到 `ethdapp`\
    \ 目录。这样就完成了；WebStorm 会自动导入该项目。\n\n或者，要在 WebStorm 中启动一个新的 Angular 种子项目，请从顶部菜单中选择\
    \ **File** ➤ **New** ➤ **Project**。接下来，选择 **Angular CLI** 并将你的项目命名为 **ethdapp**。使用下拉菜单选择\
    \ Angular CLI 的版本，如图 9-5 所示。\n\n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig5_HTML.jpg](img/475651_1_En_9_Fig5_HTML.jpg)\n\
    \n**图 9-5** 在 WebStorm 中生成 Angular 种子项目\n\n现在项目已创建，你可以运行相同的命令，使用 WebStorm 底部菜单中的终端选项卡，如图\
    \ 9-6 所示。\n\n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig6_HTML.jpg](img/475651_1_En_9_Fig6_HTML.jpg)\n\
    \n**图 9-6** 在 WebStorm 的终端中启动 ethdapp\n\n```\n> ng serve –open\n```\n\n你可以从本书的仓库下载骨架应用：[`https://github.com/Apress/the-blockchain-developer/chapter9/step1.zip`](https://www.scala-sbt.org/1.x/docs/Installing-sbt-on-Windows.html)。\n\
    \n下载你的步骤后，请确保运行 `npm install`，因为我移除了 `node` 模块以减小项目体积。\n\n```\n> npm install\n\
    ```\n\n**注意：** 我从项目中排除了 `node_modules`，它保存了项目的所有依赖项。由于体积原因，通常不将其包含在项目中；你可以使用 `npm\
    \ install` 命令来安装它。\n"
- fmt: '##### Ensure No Mismatch with Angular CLI Version


    You can create your Angular seed project either with WebStorm or through the `ng`
    command, and you need to check that there is no mismatch of the global Angular
    CLI with the local project Angular CLI. This can happen when setting files pointing
    to a previous version, or you may have used Angular in the past with an older
    version. What happens is that your local project Angular shows an older version
    than the global Angular installed on your computer.


    To ensure this is not the case, run any `ng` command, and if this issue exists,
    you will see the following error message:


    ```

    > ng

    Your global Angular CLI version (7.3.9) is greater than your local

    version (6.2.9). The local Angular CLI version is used.

    ```


    If you continue with these settings, you will be running version 6.x instead of
    7.x. To fix this, what you need to do is uninstall the Angular CLI from your dev
    environment and then install version 7.x.


    ```

    > npm uninstall --save-dev angular-cli

    > npm install --save-dev @angular/cli@7.3.9

    ```


    Notice that you use the `--save-dev` flag so the new version will be saved in
    your `package.json` project file. Now if you run the version command again, you
    should see the correct version with no warning messages.


    ```

    > ng --version

    Angular CLI: 7.3.2

    ```


    Now that you have ensured you are running the correct version of Angular CLI,
    you are ready to continue development and make changes to the seed starter app.


    #### Angular Components


    An Angular best practice is to use a Model View Controller (MVC)–style architecture.
    Angular supports coding with a separation of concerns just like any other mature
    framework.


    The Angular MVC includes the following three elements:


    * **Model**: This contains the application’s data and Angular data binding, which
    allows reflection of data.


    > **Note**: reflection in relation to data binding, elements bound to a data and
    any data change is automatically reflected. For instance, you bind price change
    to multiple view elements and once the price change data is updated all the view
    elements are updated automatically.


    * **View**: This contains the HTML or a template and directives.


    * **Controller**: This is the glue holding the model and the view together. The
    controller takes the data, applies business logic, and sends the results to the
    view.


    As you probably recall, Angular’s welcome page opened when you were running the
    `serve` command. The welcome component is the application shell. The shell is
    controlled by an Angular component named `AppComponent`.


    Components are the fundamental building blocks of an Angular application. They
    display data on the screen, listen for user input, and take action based on that
    input.


    You will be creating a component called `transfer` that you will be using to transfer
    coins to another address. To create the `transfer` component, run the `ng generate
    component` command.


    ```

    > ng g c components/transfer

    ```


    Notice that you used the shortcuts `g` and `c` that stand for “generate” and “component,”
    respectively, but you can also use the full name instead of the abbreviation.


    The `ng` command generated the four following files for you:


    * `transfer.component.css`: Component’s specific CSS styles

    * `transfer.component.html`: Component template, written in HTML

    * `transfer.component.spec.ts`: Testing file

    * `transfer.component.ts`: Component class code, written in TypeScript


    These four files together act as the implementation of the `transfer` component.
    You can see the folder structure in Figure [9-7](#475651_1_En_9_Chapter.xhtml#Fig7).


    ![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig7_HTML.jpg](images/475651_1_En_9_Chapter/475651_1_En_9_Fig7_HTML.jpg)


    Figure 9-7


    Transfer component file structure


    An application’s structure is usually created with a header, a footer, and a navigation
    menu so you can navigate to different partial views.


    Using this architecture of header and footer components can help you create different
    views and split the page view into separate files. Think of each piece as a stand-alone
    reusable UI module. Angular Seed promotes this type of architecture and comes
    with the welcome component already created. Let’s create a start component, a
    header, and footer components.


    ```

    > ng g c components/start

    > ng g c components/header

    > ng g c components/footer

    ```


    You can see in the output that each component generated the following files:


    ```

    CREATE src/app/components/[component-name]/[component-name].component.css

    CREATE src/app/components/[component-name]/[component-name].component.html

    CREATE src/app/components/[component-name]/[component-name].component.spec.ts

    CREATE src/app/components/[component-name]/[component-name].component.ts

    ```


    In addition to these files, you can open `ethdapp/src/app/app.module.ts` and notice
    that the `app.module.ts` file was modified every time you created a component.
    The `app.module.ts` file is one of the most important files in Angular; it’s the
    app controller written in TypeScript. The controller is a global file that will
    tie your components together, so every component you want to use in your app needs
    to be defined in that file. If you did not use the `ng` script, you will need
    to modify `app.module.ts` yourself to link to the new component.


    Since you used the CLI, these imports are included automatically for you:


    ```

    import { TransferComponent } from ''./components/transfer/transfer.component'';

    import { StartComponent } from ''./components/start/start.component'';

    import { HeaderComponent } from ''./components/header/header.component'';

    import { FooterComponent } from ''./components/footer/footer.component'';

    ```'
