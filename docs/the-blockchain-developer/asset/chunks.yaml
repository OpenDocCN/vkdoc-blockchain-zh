- fmt: '# Creating a Command-Line Interface


    For the last step in this chapter, you will be creating a command-line interface
    (`CLI`). The `CLI` is needed to be able to easily access the services you created.
    I won’t get into the entire internal process of the `CLI` script, as it’s beyond
    the scope of this chapter; however, you can download the whole example and review
    it.


    ## Step 7: CLI Exercise


    **Block Command**


    In this exercise, you will create a `CLI` to interact with and access your P2P
    blockchain network. You can download the complete exercise from here: [`https://github.com/Apress/the-blockchain-developer/tree/master/chapter3/step7/blockchain`](https://github.com/Apress/the-blockchain-developer/tree/master/chapter3/step7/blockchain).


    Next, install the libraries you will be utilizing to run promises, run the `async`
    function, add colors to the console, and store cookies.


    ```

    > npm babel-polyfill async update-notifier handlebars colors nopt --save

    ```


    In the `block.js` command, you will be setting two commands: `get` and `all`.
    Take a look at the entire code in Listing [3-9](#475651_1_En_3_Chapter.xhtml#PC72).


    ```javascript

    let logger = require(''../logger'');

    function Block(options) {

    this.options = options;

    }

    Block.DETAILS = {

    alias: ''b'',

    description: ''block'',

    commands: [''get'', ''all''],

    options: {

    create: Boolean

    },

    shorthands: {

    s: [''--get''],

    a: [''--all'']

    },

    payload: function(payload, options) {

    options.start = true;

    },

    };

    Block.prototype.run = function() {

    let instance = this,

    options = instance.options;

    if (options.get) {

    instance.runCmd(''curl http://localhost:'' + options.argv.original[2] + ''/getBlock?index=''
    + options.argv.original[3]);

    }

    if (options.all) {

    instance.runCmd(''curl http://localhost:'' + options.argv.original[2] + ''/blocks'');

    }

    };

    Block.prototype.runCmd = function(cmd) {

    const { exec } = require(''child_process'');

    logger.log(cmd);

    exec(cmd, (err, stdout, stderr) => {

    if (err) {

    logger.log(`err: ${err}`);

    return;

    }

    logger.log(`stdout: ${stdout}`);

    });

    };

    exports.Impl = Block;

    ```


    **Listing 3-9** Block Command Code


    As you can see, the `wallet.js` command will include the `get` and `all` methods
    to point to a `curl` command to run the HTTP service call.


    **Wallet Command**


    Similarly, the `block.js` command will include a `create` method and a `curl`
    command to run the HTTP service call. See Listing [3-10](#475651_1_En_3_Chapter.xhtml#PC73).


    ```javascript

    let logger = require(''../logger'');

    function Wallet(options) {

    this.options = options;

    }

    Wallet.DETAILS = {

    alias: ''w'',

    description: ''wallet'',

    commands: [''create''],

    options: {

    create: Boolean

    },

    shorthands: {

    c: [''--create'']

    },

    payload: function(payload, options) {

    options.start = true;

    },

    };

    Wallet.prototype.run = function() {

    let instance = this,

    options = instance.options;

    if (options.create) {

    instance.runCmd(''curl http://localhost:'' + options.argv.original[2] + ''/getWallet'');

    }

    };

    Wallet.prototype.runCmd = function(cmd) {

    const { exec } = require(''child_process'');

    logger.log(cmd);

    exec(cmd, (err, stdout, stderr) => {

    if (err) {

    logger.log(`err: ${err}`);

    return;

    }

    logger.log(`stdout: ${stdout}`);

    });

    };

    exports.Impl = Wallet;

    ```


    **Listing 3-10** Wallet Command Code


    Now that you have your commands set up, you can add your `CLI` to the `bash_profile`
    as an alias to be able to run the `CLI` from any path location.


    ```

    > vim ~/.bash_profile

    alias cli=''node /[project location]/step7/bin/bin/cli.js

    ```


    Save and run `bash_profile` to apply these changes.


    ```

    > . ~/.bash_profile

    ```


    You can call the `CLI` once you run the P2P and know the ports you are using.


    ```

    > cli block --get [port] 1 #port #index

    > cli block –all [port] #port

    > cli wallet --create [port]

    ```


    For instance, run an instance of the P2P network in Terminal.


    ```

    > node p2p.js

    ```


    Next, open a new window terminal and run the `CLI` command to retrieve the first
    generated block.


    ```

    > cli block --get [port] 1

    ```


    You can see the output in Figures [3-10](#475651_1_En_3_Chapter.xhtml#Fig10) and
    [3-11](#475651_1_En_3_Chapter.xhtml#Fig11).


    ![../images/475651_1_En_3_Chapter/475651_1_En_3_Fig11_HTML.jpg](images/475651_1_En_3_Chapter/475651_1_En_3_Fig11_HTML.jpg)


    **Figure 3-11** Retrieving blocks on port 8057


    ![../images/475651_1_En_3_Chapter/475651_1_En_3_Fig10_HTML.jpg](images/475651_1_En_3_Chapter/475651_1_En_3_Fig10_HTML.jpg)


    **Figure 3-10** Running the P2P blockchain network on port 8057


    In this exercise, you created two commands for getting blocks and creating your
    wallet. This is a starting point for your `CLI`, and you will be able to continue
    to add commands as needed.


    ## Where to Go from Here


    I already mentioned that the code in this chapter does not take into account many
    use cases and has no security to keep it simple. There are many things you can
    do to improve the code.


    *   **Confirmations**: Each miner sends a message with a block. You can create
    a confirmation system to ensure the integrity of the data.

    *   **Transactions/data**: You could implement transactions or data objects to
    address double spending, transaction validation, and coinbase transactions.

    *   **levelDB**: Once the P2P is initialized, you can create a script to retrieve
    and write all the blocks into the `LevelDB` database, validate them, and clean
    the database as needed.


    ## Summary


    This chapter covered how to create your very own basic P2P blockchain network;
    you were able to send and receive messages and include blocks in these messages.
    You were able to register and unregister miners and implement a simple `PoS` consensus
    mechanism. You created new blocks and sent them between the peers. You also set
    up a name-value `LevelDB` database to store blocks. You continued and created
    a wallet that consists of private-public key pairs. Lastly, you created ways to
    communicate with your P2P network via API services and the `CLI`. In the next
    chapter, you will be diving deep into understanding bitcoin wallets and transactions
    by interacting with the bitcoin core API.


    # Bitcoin Wallets and Transactions


    In this chapter, you will be diving deep into bitcoin’s core RPC and learn about
    wallets and transactions. You will learn how to utilize legacy and `SegWit`’s
    bitcoin wallets. You will extract a wallet’s public and private keys.


    The majority of this chapter will deal with transactions, from sending funds in
    a simple way utilizing bitcoin’s testing blockchain to more complex transactions.
    Additionally, you will learn how to send coins via bitcoin’s core wallet GUI,
    and you will learn how to view transactions in the Block Explorer and understand
    confirmations. You will look into raw transactions and learn how to create a raw
    transaction with one output as well as how to create transactions with multiple
    users signing them. Additionally, you will replace your transaction and set a
    lock time. You will also learn the difference between pay options and fees.


    Lastly, I will cover how to pass data in a raw transaction. By the end of this
    chapter, you will have a much better understanding of transactions, wallets, fees,
    payment options, and bitcoin’s core RPC.'
  raw: '## Creating a Command-Line Interface


    For the last step in this chapter, you will be creating a command-line interface
    (CLI ). The CLI is needed to be able to easily access the services you created.
    I won’t get into the entire internal process of the CLI script, as it’s beyond
    the scope of this chapter; however, you can download the whole example and review
    it.


    ### Step 7: CLI Exercise


    **Block Command**


    In this exercise, you will create a CLI to interact with and access your P2P blockchain
    network. You can download the complete exercise from here: [`https://github.com/Apress/the-blockchain-developer/tree/master/chapter3/step7/blockchain`](https://github.com/Apress/the-blockchain-developer/tree/master/chapter3/step7/blockchain)
    .


    Next, install the libraries you will be utilizing to run promises, run the async
    function, add colors to the console, and store cookies.


    ```

    > npm babel-polyfill async update-notifier handlebars colors nopt --save

    ```


    In the `block.js` command, you will be setting two commands: `get` and `all`.
    Take a look at the entire code in Listing [3-9](#475651_1_En_3_Chapter.xhtml#PC72).


    ```

    let logger = require(''../logger'');

    function Block(options) {

    this.options = options;

    }

    Block.DETAILS = {

    alias: ''b'',

    description: ''block'',

    commands: [''get'', ''all''],

    options: {

    create: Boolean

    },

    shorthands: {

    s: [''--get''],

    a: [''--all'']

    },

    payload: function(payload, options) {

    options.start = true;

    },

    };

    Block.prototype.run = function() {

    let instance = this,

    options = instance.options;

    if (options.get) {

    instance.runCmd(''curl http://localhost:'' + options.argv.original[2] + ''/getBlock?index=''
    + options.argv.original[3]);

    }

    if (options.all) {

    instance.runCmd(''curl http://localhost:'' + options.argv.original[2] + ''/blocks'');

    }

    };

    Block.prototype.runCmd = function(cmd) {

    const { exec } = require(''child_process'');

    logger.log(cmd);

    exec(cmd, (err, stdout, stderr) => {

    if (err) {

    logger.log(`err: ${err}`);

    return;

    }

    logger.log(`stdout: ${stdout}`);

    });

    };

    exports.Impl = Block;

    Listing 3-9

    Block Command Code

    ```


    As you can see, the `wallet.js` command will include the `get` and `all` methods
    to point to a `curl` command to run the HTTP service call.


