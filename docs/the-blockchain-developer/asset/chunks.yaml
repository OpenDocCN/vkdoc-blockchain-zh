    在这个练习中，你成功地将节点注册为矿工，生成了新区块，并与其它节点共享了区块。你使用了一个简单的权益证明（PoS）作为共识机制，并通过创建三个节点来测试功能。该共识机制较为简单，并未考虑所有可能出现的用例或安全性问题。下一步，你将把区块保存到LevelDB数据库中。


    ## 在LevelDB中存储区块


    如果你让区块链运行数小时，你会发现创建的区块数量不断增加，这可能会成为一个问题，因为目前这些区块存储在计算机的内存缓存中。随着区块数量的增加，内存使用量也会增长，最终会导致代码崩溃。此外，如果不将区块存入数据库，你将无法启动和停止你的P2P网络，因为区块并没有被保存。


    为了应对这些及其它用例，你将使用LevelDB数据库。


    ### 注意


    LevelDB数据库以一种称为“层级上升”和“层级下降”的方式存储键值对。对于区块链网络来说，这是一个理想的选择。事实上，比特币不仅使用LevelDB来存储区块信息，还用它来存储交易信息。参见[`https://github.com/bitcoin-core/leveldb`](https://github.com/bitcoin-core/leveldb)。'
