  trans: '好的，这是根据您的要求和示例格式翻译的中文版本。



    ### 挖矿层


    矿工在网络后台所做的事情，可以描述为争夺完成区块链工作（即网络记账）的权利。对于比特币和大多数采用工作量证明（PoW）的币种而言，每个节点都需要保存完整的公共账本，该账本记录了所有曾经发生过的交易。PoW
    矿工依赖于计算能力和矿池，而其他网络则会考虑其他因素。


    对于比特币而言，交易必须由矿工验证，他们需要检查账本，确保发送方没有转移其不拥有的资金，然后才能将交易添加到账本中。最后，为了确保免受黑客攻击，矿工将这些交易封存在多层计算工作之后，这使得黑客几乎不可能完成如此巨大的工作量。作为这项服务的奖励，矿工会获得比特币作为手续费。


    对于比特币，每批产出的币的数量大约每四年减半一次；到 2140 年左右（除非发现比 SHA2 更快的计算方法），这一数量将减少到零，届时流通中的比特币总量将达到
    2100 万枚。


    ### 传播层


    传播层负责决定共享账本和区块如何在 P2P 网络上进行传输。区块链白皮书中对此层有详细描述。


    每个节点都可以将新交易传输给网络中的其他节点。这种架构允许节点之间进行间接通信。例如，你可以发送一笔涉及两个钱包的交易，而无需这两个钱包直接相互连接。


    任何收到一个之前从未见过的有效交易的节点，都会立即将其转发给所有与其相连的其他节点。这是一种被称为*泛洪*的传播技术。因此，该交易会在 P2P 网络中迅速传播，在几秒钟内就能到达大部分节点。


    ### 语义层


    语义层负责处理新区块如何与之前的区块关联，并提供用于验证共识规则的协议。


    如你所见，根据连接的可信机器数量、质押机制、速度、算力等因素，存在不同类型的共识机制，但它们在新区块如何与先前区块关联以确保安全性方面的工作原理类似。每个区块链都有其规范。在这个层面，交易发生，即币/代币在账户之间转移。我之前讨论了最佳区块链，以及每个区块如何包含数据，并且区块链中的每个区块都引用其前一个区块。区块链中的共识机制使其所有节点都持有相同的已验证的最佳区块链，并遵循相同的规则（共识规则）。这就是区块链确保安全性的方式。


    ### 应用层


    该层负责在区块链之上部署应用程序。


    例如，去中心化应用（dapps）、智能合约、交易所以及提供区块链信息的网站，都是构建在区块链之上的应用程序。


    对于应用层，区块链需要公开应用程序接口（API）。不同的区块链是相似的，它们都为客户端与网络通信提供了一种方式。


    比特币提供了一个完整节点，目前大约占用 27GB 空间，并包含一个完全执行的节点以及区块链的所有规则。这对于挖矿以及确保你运行的、连接到应用层的节点与最新区块同步是必需的。


    这些完整节点有助于实现 P2P 网络的功能，并帮助支持网络及其安全性。


    区块链通常也会提供一个“轻量级”节点版本。实际上，比特币轻客户端引用的是可信完整节点的区块链副本。轻客户端允许用户与比特币区块链进行交互，并创建和确认交易，而无需提交巨大的
    27GB 磁盘空间，这有助于支持移动设备等性能较弱的设备。


    理解轻客户端是可信的，但不包含所有共识规则，这一点很重要。一个完整节点是不信任任何人的，它会拒绝违反共识规则的区块，即使网络上的所有其他节点都认为该交易是有效的。


    我以 NEO 为例，它是一种流行的 PoS 区块链。NEO 也提供 NEO-CLI，它包含一个支持共识功能的 API，可用于应用层。


    类似地，EOS 委托权益证明提供了全节点和轻节点选项。你会开始注意到，尽管市面上的区块链选项很多，但在区块链的实现方式上存在许多相似之处。


    ## 总结


    在本章中，我奠定了基础，解释了有关区块链的基本概念；我解释了诸如加密和解密、密码学、数字资产、密码学和加密货币等概念。


    我讨论了构成区块链的各个部分，包括区块、双重支付、加密货币、加密挖矿、加密矿工和加密货币钱包。我涵盖了不同类型的加密货币：比特币、代币和山寨币。


    最后，我讨论了区块链 P2P 网络以及构成该网络的不同层面：共识层、矿工层、传播层、语义层和应用层。你还了解了点对点网络核心逻辑以及工作量证明（PoW）、权益证明（PoS）和委托权益证明区块链（DPOS）。


    在本章中，我介绍了一些将在本书中很有用的术语，例如数字资产、公钥和私钥、去中心化、双重支付、智能合约和 HODL。


    在下一章中，你将安装并学习比特币核心 API，并学习如何在不同的区块链中创建一个完整的节点。这将使你能够访问区块链 P2P 网络，甚至能够理解并创建可以充当矿工的节点。


    # 2. 区块链节点


    在上一章中，我介绍了与区块链相关的基本概念以及构成单个区块链的各个部分。我介绍了区块链技术如何通过利用 P2P 网络来解决双重支付问题，这导致了全球分布式共享账本和数字现金的诞生。区块链
    P2P 网络通过连接多个节点而拼接在一起，在本章中，你将更仔细地审视构成该网络的节点。


    节点或对等机是维护区块链网络上交易和记录的机器。每种加密货币都有自己的区块链和节点；但是，我将介绍如何安装三种采用不同共识机制的区块链。


    此外，我还将介绍如何与节点进行交互。我将以比特币核心 API 为例进行讲解，以便你能更好地理解账本、区块、交易和钱包。这些概念将继续为后续章节所需的基础知识和基本概念打下基础。

    '
- fmt: '# Running a Blockchain Node


    As we mentioned, the blockchain P2P network consists of peers that store a full
    copy of all the blocks in the network, which is the shared ledger. Each blockchain
    validates blocks via a specific consensus mechanism and is able to reject blocks
    that do not conform with the set of rules agreed on by the network. To be able
    to connect to blocks and execute commands, you need to have a peer connected to
    the blockchain. In this chapter, you will be setting up a full node and will learn
    how to get rewarded for helping the network; therefore, you will fully understand
    how the nodes on different networks operate. You will be creating nodes for the
    following: bitcoin, NEO, and EOS. Because blockchain technologies operate on different
    consensus mechanisms, they also have different names for the node capable of managing
    the blockchain.


    - For bitcoin, a node that can create blocks is called a *miner*.

    - For NEO, a node that has management rights is called a *bookkeeping node*.

    - For EOS, a node running the underlying network layer and able to process all
    transactions is called a *block producer*.


    The reason I selected these blockchains is so you can examine how different peers
    working on different networks with different consensus mechanism operate. Once
    you are able to work with different blockchains, you will start noticing a pattern
    and be well rounded in blockchain technology.


    ## Create a Bitcoin Miner


    In this section, you will turn your own computer into a bitcoin cryptominer and
    start cryptomining. Before doing that, you need to understand that the hashing
    power of your computer is not going to generate enough hash power for the mining
    of bitcoin to be profitable. Nevertheless, it will allow you to fully understand
    the full cycle, and you may be able to find other coins where mining using your
    CPU/GPU is profitable such as ETN, BCN, XMR, and ETH. The process is similar in
    all PoW-based networks.


    Today, for a miner to be profitable, it’s a matter of hash rate and power consumption,
    price of electricity, bitcoin puzzle difficulty rate, and maintenance costs as
    well as other factors.


    ### Note


    *Hash rate* is the number of calculations in a second that your computer can perform
    trying to solve the mathematical puzzle.


    In the early days of bitcoin, your desktop could use your central processing unit
    (CPU) or graphics processing unit (GPU) for processing bitcoin, and it would have
    been enough for bitcoin mining to be profitable. Your computer would have been
    able to support the bitcoin network; however, the competition has increased, and
    you now need a field programmable gate array (FPGA) or application-specific integrated
    circuit (ASIC) miner to be profitable.


    What are ASIC and FPGA miners? An FPGA is an integrated circuit that is able to
    be configured after being built. The miners have better performance than CPUs
    and GPUs mining; they can hash 750 megahashes per second.


    ASICs are computers that have an integrated circuit dedicated to performing the
    single task of mining instead of operating as a regular computer. There is nothing
    more on that computer; everything else was stripped out.


    This makes the computer much faster and more efficient in processing transactions,
    and it is able to hash more. At the time of writing, there are ASICs that can
    hash over 56 TH/sec, and they use less power than older generation ASCIs.


    This type of mining equipment is not only unique to bitcoin; at the time of writing,
    there are ASIC miners for other cryptocurrency such as litecoin, zCash, ethereum,
    and others.


    To get started, you first need mining software. There is a lot of mining software
    to choose from. For instance macOS users can, this one is free, open source, and
    easy to use: [`http://downloads.fabulouspanda.co.uk/macminer/`](http://downloads.fabulouspanda.co.uk/macminer/).


    Once you have downloaded the software, install it. Next, you need to join a mining
    pool. Here I’ll show how to connect to Antpool, the largest bitcoin pool; however,
    any pool would work. Sign up on Antpool here: [`https://www.antpool.com`](https://www.antpool.com).


    Antpool calls a miner a *worker*. You can create a worker by clicking the Dashboard
    tab, then clicking the Worker link, and finally clicking Create Worker, as shown
    in Figure [2-1](#475651_1_En_2_Chapter.xhtml#Fig1).


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig1_HTML.jpg](images/475651_1_En_2_Chapter/475651_1_En_2_Fig1_HTML.jpg)


    **Figure 2-1** Antpool dashboard page for creating a mining worker


    Now that you have your worker ready, you will set up your miner as a CPU miner
    utilizing your CPU, and for your GPU, you could set your miner to utilize your
    graphics card.


    Open the MacMiner software you downloaded and click File and then Preference option
    from the File drop menu. In the Preferences section, set the miner as a CPU and/or
    GPU miner, as shown in Figure [2-2](#475651_1_En_2_Chapter.xhtml#Fig2).


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig2_HTML.png](images/475651_1_En_2_Chapter/475651_1_En_2_Fig2_HTML.png)


    **Figure 2-2** MacMiner preferences


    In the next step of the preferences, you set the pool URL and your username. Antpool
    is set up without a password, so it’s not needed, and the pool URL is listed on
    the Antpool site:


    ```

    startum+tcp://startum.antpool.com:3333

    ```


    See Figure [2-3](#475651_1_En_2_Chapter.xhtml#Fig3).


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig3_HTML.png](images/475651_1_En_2_Chapter/475651_1_En_2_Fig3_HTML.png)


    **Figure 2-3** MacMiner Preferences window for setting up a miner pool


    That’s it. Click the Start button to start mining and click Stop to stop mining,
    as shown in Figure [2-4](#475651_1_En_2_Chapter.xhtml#Fig4).


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig4_HTML.jpg](images/475651_1_En_2_Chapter/475651_1_En_2_Fig4_HTML.jpg)


    **Figure 2-4** MacMiner starting a miner


    Six years ago, you would have been able to mine more than 100 BTC on your GPU.
    As you can see, my mining power on my 2018 MacBook resulted in 13.74 Mh (Mega
    hashes) of hashing power.


    There are many resources online to help you calculate mining profitability; try
    [`http://www.bitcoinx.com/profit/`](http://www.bitcoinx.com/profit/). As expected
    and according to their calculation, it would not be profitable at the current
    conditions.


    ## Create a NEO Bookkeeping Node


    Previously I introduced NEO as an example of a popular PoS blockchain.


    In this section, you will be setting up a node (NEO calls these *bookkeeping nodes*)
    and getting the machine ready so it can be selected to help manage the network
    and receive a transaction reward.


    ### Note


    NEO does not call its managing node a miner. A miner can be an analogy for the
    hard work that nodes do to maintain a PoW-based blockchain. As NEO uses the PoS
    census algorithm and uses a technological democracy to selecting the managing
    nodes, there is no hashing power and no hard labor when using the PoW census algorithm.
    To better understand how Neo node works, it is recommended to read the NEO white
    paper at [`https://github.com/neo-project/docs/blob/master/en-us/whitepaper.md`](https://github.com/neo-project/docs/blob/master/en-us/whitepaper.md).


    The node validates the blockchain blocks and pays in a cryptocurrency coin called
    *gas*. To be selected, you need to set a full node on a capable machine. The minimum
    required machine is listed on the NEO project wiki at [`https://github.com/neo-project/neo/wiki/Bookkeeping-Node-Deployment`](https://github.com/neo-project/neo/wiki/Bookkeeping-Node-Deployment).


    Next, you need to obtain a consensus authority certificate and get staking gas
    to be nominated as a bookkeeping node.'
