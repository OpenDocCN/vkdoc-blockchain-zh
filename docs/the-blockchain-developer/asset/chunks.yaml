- fmt: "### `Ganache` Simulated Full-Node Client\n\n`Ganache` (previously known as\
    \ `ethereumjs-testrpc`) allows you to run a simulated full-node client of Ethereum\
    \ on your machine and to interact with your contract via a CLI. This tool is useful\
    \ because you will be setting up a development network and a private testnet network\
    \ to test your smart contract code.\n\nJust as you saw in the previous chapter,\
    \ setting up a testnet network allows you to test your code with pretend money\
    \ before committing your code to mainnet. I decided to use `Ganache` in this chapter\
    \ as it is part of the `Truffle` development suite and integrates well with `Truffle`.\n\
    \n#### Install `Ganache`\n\nTo get started, you can install `Ganache` globally\
    \ with `npm` and confirm it’s working correctly by calling the `help` command.\n\
    \n```\n> npm install -g ganache-cli\n> ganache-cli help\n```\n\nIf you have installation\
    \ issues or want to get more information regarding the tool, visit the `Ganache`\
    \ GitHub page: [`https://github.com/trufflesuite/ganache-cli`](https://github.com/trufflesuite/ganache-cli).\
    \ You can also check the version of CLI by running this command:\n\n```\n> ganache-cli\
    \ -v\n```\n\nThis command outputs the version. At the time of writing, the `Ganache`\
    \ CLI is version v6.4.3 (`ganache-core`: 2.5.5).\n\n#### `Ganache` CLI: Listen\
    \ to Port\n\nYou can run `Ganache` on your machine while you develop and debug\
    \ your contracts. To do this, you set up the `Ganache` CLI in Terminal to listen\
    \ to the port you will be setting in `truffle.js` later in this chapter.\n\n```\n\
    > ganache-cli -p 8584\n```\n\nNotice that at this point there is nothing running\
    \ on port 8584, so let’s assume you will be setting up port 8584. The command\
    \ should output the following:\n\n```\nListening on 127.0.0.1:8584\n```\n\n##\
    \ `IntelliJ IDEA` Plugin for Solidity\n\nIn Chapter [3](#475651_1_En_3_Chapter.xhtml),\
    \ you downloaded and used `WebStorm` as your IDE to develop your blockchain. `WebStorm`\
    \ is a subset of `IntelliJ IDEA` and has a plugin for the `Solidity` language,\
    \ which provides an easy way to write your contracts. Also, it provides highlights\
    \ and code completion to make development easier. You can use the `WebStorm` version\
    \ you previously installed and just add the `Solidity` plugin. To do so, first\
    \ download the plugin here: [`https://plugins.jetbrains.com/plugin/9475-intellij-solidity`](https://plugins.jetbrains.com/plugin/9475-intellij-solidity).\n\
    \nTo get the plugin installed, follow these steps:\n\n1.  Select `WebStorm` ➤\
    \ Preferences (or press `command + ,`).\n2.  Select `Plugins`.\n3.  Search in\
    \ “Plugins” for “`Solidity`”. It will say “No Plugins founds.” With a link to\
    \ “Search in repositories”. Click the “Search in repositories” link. “Intellij-Solidity”\
    \ plugin will show. See Figure [5-2](#475651_1_En_5_Chapter.xhtml#Fig2).\n4. \
    \ Install both “Intellij-Solidity” plugins: LANGUAGES and INSPECTION. See Figure\
    \ [5-2](#475651_1_En_5_Chapter.xhtml#Fig2).\n5.  Click `IntelliJ-Solidity` ➤ install.\
    \ See Figure [5-2](#475651_1_En_5_Chapter.xhtml#Fig2).\n    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig2_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig2_HTML.jpg)\n\
    \    Figure 5-2\n    Installing `IntelliJ-Solidity` and `Solidity Solhint` in\
    \ `WebStorm`\n6.  Under `Plugins` search for `Solidity Solhint`. It will say “No\
    \ Plugins founds.” With a link to “Search in repositories”. Click the “Search\
    \ in repositories” link. Click `Solidity Solhint INSPECTION` ➤ and then click\
    \ Install.\n7.  Restart `WebStorm`.\n\nNote that if you are a Visual Studio fan,\
    \ there is also a `Solidity` extension for Visual Studio; see [`https://marketplace.visualstudio.com/items?itemName=ConsenSys.Solidity`](https://marketplace.visualstudio.com/items%253FitemName%253DConsenSys.Solidity).\
    \ At the time of writing, the plugin works only for Visual Studio 2015 or earlier.\n\
    \nKeep in mind that, as always, you can use your favorite IDE, text editor, or\
    \ even `vim` to write your code; there’s no need to buy an IDE.\n\n## `Truffle`\
    \ Suite\n\nYou will be using `Truffle` as it’s one of the most popular tools and\
    \ has integrated libraries that help expedite the development cycle. `Truffle\
    \ Suite` includes `Truffle`, `Ganache`, and `Drizzle`; see Figure [5-3](#475651_1_En_5_Chapter.xhtml#Fig3).\n\
    \n> *“Truffle is a development environment, testing framework and asset pipeline\
    \ for Ethereum, aiming to make life as an Ethereum developer easier.”*\n>\n> *—*\
    \ [`https://github.com/trufflesuite/truffle`](https://github.com/trufflesuite/truffle)\n\
    \nThe `Truffle` documentation includes installation instructions, which can be\
    \ found at [`https://truffleframework.com/docs`](https://truffleframework.com/docs).\n\
    \n![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig3_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig3_HTML.jpg)\n\
    Figure 5-3\n`Truffle Suite` documentation\n\nTo get started, open a new Terminal\
    \ window and install `Truffle` globally on your machine (at the time of writing,\
    \ the current `Truffle` version is 5.0.14). Then ensure it’s installed correctly\
    \ by running the `help` command to view a list of all available commands.\n\n\
    ```\n> npm install -g truffle\n+ truffle@5.0.14\n> truffle help\nTruffle v5.0.14\
    \ - a development framework for Ethereum\nUsage: truffle <command> [options]\n\
    ```\n\n### Create Your Smart Contracts\n\nTo get started, let’s create your folder\
    \ and initialize the `Truffle` wizard to generate all the code needed to get started.\
    \ In Terminal, type the following:\n\n```\n> mkdir MySmartContract && cd $_\n\
    > truffle init\n```\n\nThese commands create a folder named `MySmartContract`\
    \ and change the directory location to the new project; then the `truffle init`\
    \ command initializes the project. You can see the output in Figure [5-4](#475651_1_En_5_Chapter.xhtml#Fig4).\n\
    \n![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig4_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig4_HTML.jpg)\n\
    Figure 5-4\nCreating the `MySmartContract` project and initializing with the `truffle\
    \ init` command\n\nNext, open `WebStorm` and open the project you created by selecting\
    \ `File` ➤ `Open`. Navigate to the `MySmartContract` project directory and click\
    \ `Open`. `WebStorm` will open the project, as shown in Figure [5-5](#475651_1_En_5_Chapter.xhtml#Fig5).\n\
    \n![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig5_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig5_HTML.jpg)\n\
    Figure 5-5\n`MySmartContract` open in `WebStorm`\n\nEVM supports many programming\
    \ languages such as Solidity, JavaScript, GO, C++, Python, Java, Ruby, Web Assembly,\
    \ Rust, and Haskell. In this section, you will be using Solidity as it’s the most\
    \ popular Ethereum programming language for smart contracts at the time of writing.\
    \ Solidity is based on ECMAScript and influenced by JavaScript, C++, and Python.\
    \ Solidity has an advantage as you are able to deploy your smart contract transactions\
    \ on other various blockchain platforms beside Ethereum, such as Ethereum Classic,\
    \ Tendermint, ErisDB, and Counterparty.\n\nSolidity uses the `.sol` file extension;\
    \ in fact, if you check in the `contracts` folder of your project, you will find\
    \ a file called `Migrations.sol`, as shown in Figure [5-5](#475651_1_En_5_Chapter.xhtml#Fig5).\
    \ This file was generated automatically for you when you initialized the `Truffle`\
    \ wizard. The migration files help you deploy contracts to the Ethereum network.\
    \ As your project progresses, you will create new migration files."
  raw: "## Ganache Simulated Full-Node Client\n\nGanache (previously known as ethereumjs-testrpc)\
    \ allows you to run a simulated full-node client of Ethereum on your machine and\
    \ to interact with your contract via a CLI. This tool is useful because you will\
    \ be setting up a development network and a private testnet network to test your\
    \ smart contract code.\n\nJust as you saw in the previous chapter, setting up\
    \ a testnet network allows you to test your code with pretend money before committing\
    \ your code to mainnet. I decided to use Ganache in this chapter as it is part\
    \ of the Truffle development suite and integrates well with Truffle.\n\n### Install\
    \ Ganache\n\nTo get started, you can install Ganache globally with `npm` and confirm\
    \ it’s working correctly by calling the `help` command.\n\n```\n> npm install\
    \ -g ganache-cli\n> ganache-cli help\n```\n\nIf you have installation issues or\
    \ want to get more information regarding the tool, visit the Ganache GitHub page:\
    \ [`https://github.com/trufflesuite/ganache-cli`](https://github.com/trufflesuite/ganache-cli)\
    \ . You can also check the version of CLI by running this command:\n\n```\n> ganache-cli\
    \ -v\n```\n\nThis command outputs the version. At the time of writing, the Ganache\
    \ CLI is version v6.4.3 (ganache-core: 2.5.5).\n\n### Ganache CLI: Listen to Port\n\
    \nYou can run Ganache on your machine while you develop and debug your contracts.\
    \ To do this, you set up the Ganache CLI in Terminal to listen to the port you\
    \ will be setting in `truffle.js` later in this chapter.\n\n```\n> ganache-cli\
    \ -p 8584\n```\n\nNotice that at this point there is nothing running on port 8584,\
    \ so let’s assume you will be setting up port 8584\\. The command should output\
    \ the following:\n\n```\nListening on 127.0.0.1:8584\n```\n\n## IntelliJ IDEA\
    \ Plugin for Solidity\n\nIn Chapter [3](#475651_1_En_3_Chapter.xhtml), you downloaded\
    \ and used WebStorm as your IDE to develop your blockchain. WebStorm is a subset\
    \ of IntelliJ IDEA and has a plugin for the Solidity language, which provides\
    \ an easy way to write your contracts. Also, it provides highlights and code completion\
    \ to make development easier. You can use the WebStorm version you previously\
    \ installed and just add the Solidity plugin. To do so, first download the plugin\
    \ here: [`https://plugins.jetbrains.com/plugin/9475-intellij-solidity`](https://plugins.jetbrains.com/plugin/9475-intellij-solidity)\
    \ .\n\nTo get the plugin installed, follow these steps:\n\n1.  Select WebStorm\
    \ ➤ Preferences (or press command + ,).\n\n2.  Select Plugins.\n\n3.  Search in\
    \ “Plugins” for “*Solidity*”. It will say “No Plugins founds.” With a link to\
    \ “Search in repositories”. Click the “Search in repositories” link. “Intellij-Solidity”\
    \ plugin will show. See Figure [5-2](#475651_1_En_5_Chapter.xhtml#Fig2).\n\n4.\
    \  Install both “Intellij-Solidity” plugins: LANGUAGES and INSPECTION. See Figure\
    \ [5-2](#475651_1_En_5_Chapter.xhtml#Fig2).\n\n5.  Click IntelliJ-Solidity ➤ install.\
    \ See Figure [5-2](#475651_1_En_5_Chapter.xhtml#Fig2).\n\n    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig2_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig2_HTML.jpg)\n\
    \n    Figure 5-2\n\n    Installing IntelliJ-Solidity and Solidity Solhint in WebStorm\n\
    \n6.  Under Plugins search for Solidity Solhint. It will say “No Plugins founds.”\
    \ With a link to “Search in repositories”. Click the “Search in repositories”\
    \ link. Click Solidity Solhint INSPECTION ➤ and then click Install.\n\n7.  Restart\
    \ WebStorm.\n\nNote that if you are a Visual Studio fan, there is also a Solidity\
    \ extension for Visual Studio; see [`https://marketplace.visualstudio.com/items?itemName=ConsenSys.Solidity`](https://marketplace.visualstudio.com/items%253FitemName%253DConsenSys.Solidity)\
    \ . At the time of writing, the plugin works only for Visual Studio 2015 or earlier.\n\
    \nKeep in mind that, as always, you can use your favorite IDE, text editor, or\
    \ even vim to write your code; there’s no need to buy an IDE.\n\n## Truffle Suite\n\
    \nYou will be using Truffle as it’s one of the most popular tools and has integrated\
    \ libraries that help expedite the development cycle. Truffle Suite includes Truffle,\
    \ Ganache, and Drizzle; see Figure [5-3](#475651_1_En_5_Chapter.xhtml#Fig3).\n\
    \n> *“Truffle is a development environment, testing framework and asset pipeline\
    \ for Ethereum, aiming to make life as an Ethereum developer easier.”*\n\n> *—*\
    \ [`https://github.com/trufflesuite/truffle`](https://github.com/trufflesuite/truffle)\n\
    \nThe Truffle documentation includes installation instructions, which can be found\
    \ at [`https://truffleframework.com/docs`](https://truffleframework.com/docs)\
    \ .\n\n![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig3_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3\n\nTruffle Suite documentation\n\nTo get started, open a new Terminal\
    \ window and install Truffle globally on your machine (at the time of writing,\
    \ the current Truffle version is 5.0.14). Then ensure it’s installed correctly\
    \ by running the `help` command to view a list of all available commands.\n\n\
    ```\n> npm install -g truffle\n+ truffle@5.0.14\n> truffle help\nTruffle v5.0.14\
    \ - a development framework for Ethereum\nUsage: truffle  [options]\n```\n\n###\
    \ Create Your Smart Contracts\n\nTo get started, let’s create your folder and\
    \ initialize the Truffle wizard to generate all the code needed to get started.\
    \ In Terminal, type the following:\n\n```\n> mkdir MySmartContract && cd $_\n\
    > truffle init\n```\n\nThese commands create a folder named `MySmartContract`\
    \ and change the directory location to the new project; then the `truffle init`\
    \ command initializes the project. You can see the output in Figure [5-4](#475651_1_En_5_Chapter.xhtml#Fig4).\n\
    \n![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig4_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig4_HTML.jpg)\n\
    \nFigure 5-4\n\nCreating the MySmartContract project and initializing with the\
    \ truffle init command\n\nNext, open WebStorm and open the project you created\
    \ by selecting File ➤ Open. Navigate to the `MySmartContract` project directory\
    \ and click Open. WebStorm will open the project, as shown in Figure [5-5](#475651_1_En_5_Chapter.xhtml#Fig5).\n\
    \n![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig5_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig5_HTML.jpg)\n\
    \nFigure 5-5\n\nMySmartContract open in WebStorm\n\nEVM supports many programming\
    \ languages such as Solidity, JavaScript, GO, C++, Python, Java, Ruby, Web Assembly,\
    \ Rust, and Haskell. In this section, you will be using Solidity as it’s the most\
    \ popular Ethereum programming language for smart contracts at the time of writing.\
    \ Solidity is based on ECMAScript and influenced by JavaScript, C++, and Python.\
    \ Solidity has an advantage as you are able to deploy your smart contract transactions\
    \ on other various blockchain platforms beside Ethereum, such as Ethereum Classic,\
    \ Tendermint, ErisDB, and Counterparty.\n\nSolidity uses the `.sol` file extension;\
    \ in fact, if you check in the `contracts` folder of your project, you will find\
    \ a file called `Migrations.sol`, as shown in Figure [5-5](#475651_1_En_5_Chapter.xhtml#Fig5).\
    \ This file was generated automatically for you when you initialized the Truffle\
    \ wizard. The migration files help you deploy contracts to the Ethereum network.\
    \ As your project progresses, you will create new migration files."
  trans: "\n### `Ganache` 模拟全节点客户端\n\n`Ganache`（之前被称为 `ethereumjs-testrpc`）允许你在自己的机器上运行一个以太坊模拟全节点客户端，并通过命令行界面与你的合约进行交互。这个工具非常有用，因为你将建立一个开发网络和一个私有测试网络来测试你的智能合约代码。\n\
    \n正如你在上一章所见，搭建一个测试网络可以让你在将代码部署到主网之前，使用虚拟货币来测试代码。我决定在本章中使用 `Ganache`，因为它是 `Truffle`\
    \ 开发套件的一部分，并且与 `Truffle` 集成良好。\n\n#### 安装 `Ganache`\n\n首先，你可以通过 `npm` 全局安装 `Ganache`，并通过调用\
    \ `help` 命令来确认其是否正确运行。\n\n```\n> npm install -g ganache-cli\n> ganache-cli help\n\
    ```\n\n如果你遇到安装问题，或想获取关于该工具的更多信息，请访问 `Ganache` 的 GitHub 页面：[`https://github.com/trufflesuite/ganache-cli`](https://github.com/trufflesuite/ganache-cli)。你也可以通过运行以下命令来检查\
    \ CLI 的版本：\n\n```\n> ganache-cli -v\n```\n\n该命令会输出版本信息。在撰写本书时，`Ganache` CLI 的版本是\
    \ v6.4.3（`ganache-core`: 2.5.5）。\n\n#### `Ganache` CLI：监听端口\n\n你可以在开发和调试合约时，在自己的机器上运行\
    \ `Ganache`。为此，你需要在终端中设置 `Ganache` CLI，使其监听你将在本章稍后在 `truffle.js` 中设置的端口。\n\n```\n\
    > ganache-cli -p 8584\n```\n\n请注意，此刻没有任何程序在 8584 端口上运行，因此我们假设你将设置端口 8584。该命令应输出以下内容：\n\
    \n```\nListening on 127.0.0.1:8584\n```\n\n## 用于 Solidity 的 `IntelliJ IDEA` 插件\n\
    \n在第 3 章中，你下载并使用了 `WebStorm` 作为你的集成开发环境来开发区块链。`WebStorm` 是 `IntelliJ IDEA` 的一个子集，并且有一个针对\
    \ `Solidity` 语言的插件，这为编写合约提供了一种简便的方法。此外，它还提供高亮显示和代码补全功能，使开发更加容易。你可以使用之前安装的 `WebStorm`\
    \ 版本，只需添加 `Solidity` 插件即可。为此，首先在此处下载插件：[`https://plugins.jetbrains.com/plugin/9475-intellij-solidity`](https://plugins.jetbrains.com/plugin/9475-intellij-solidity)。\n\
    \n要安装该插件，请遵循以下步骤：\n\n1.  选择 `WebStorm` ➤ 偏好设置（或按 `command + ,` 键）。\n2.  选择 `Plugins`。\n\
    3.  在“插件”中搜索“`Solidity`”。它会显示“未找到插件。”并附带一个“在仓库中搜索”的链接。点击“在仓库中搜索”链接。将会显示“Intellij-Solidity”插件。见图\
    \ 5-2。\n4.  安装两个“Intellij-Solidity”插件：LANGUAGES 和 INSPECTION。见图 5-2。\n5.  点击 `IntelliJ-Solidity`\
    \ ➤ 安装。见图 5-2。\n    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig2_HTML.jpg](img/475651_1_En_5_Fig2_HTML.jpg)\n\
    \    图 5-2\n    在 `WebStorm` 中安装 `IntelliJ-Solidity` 和 `Solidity Solhint`\n6.\
    \  在 `Plugins` 下搜索 `Solidity Solhint`。它会显示“未找到插件。”并附带一个“在仓库中搜索”的链接。点击“在仓库中搜索”链接。点击\
    \ `Solidity Solhint INSPECTION` ➤ 然后点击安装。\n7.  重启 `WebStorm`。\n\n请注意，如果你是 Visual\
    \ Studio 的爱好者，Visual Studio 也有一个 `Solidity` 扩展；参见 [`https://marketplace.visualstudio.com/items?itemName=ConsenSys.Solidity`](https://marketplace.visualstudio.com/items%253FitemName%253DConsenSys.Solidity)。在撰写本书时，该插件仅适用于\
    \ Visual Studio 2015 或更早版本。\n\n请记住，一如既往，你可以使用你喜欢的集成开发环境、文本编辑器，甚至是 `vim` 来编写代码；没有必要购买集成开发环境。\n\
    \n## `Truffle` 套件\n\n你将使用 `Truffle`，因为它是最流行的工具之一，并且拥有有助于加快开发周期的集成库。`Truffle Suite`\
    \ 包括 `Truffle`、`Ganache` 和 `Drizzle`；见图 5-3。\n\n> *“Truffle 是一个针对以太坊的开发环境、测试框架和资源管道，旨在让以太坊开发者的生活变得更轻松。”*\n\
    >\n> *—* [`https://github.com/trufflesuite/truffle`](https://github.com/trufflesuite/truffle)\n\
    \n`Truffle` 文档中包含了安装说明，可以在 [`https://truffleframework.com/docs`](https://truffleframework.com/docs)\
    \ 找到。\n\n![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig3_HTML.jpg](img/475651_1_En_5_Fig3_HTML.jpg)\n\
    图 5-3\n`Truffle Suite` 文档\n\n要开始，请打开一个新的终端窗口，并在你的机器上全局安装 `Truffle`（在撰写本书时，当前 `Truffle`\
    \ 版本是 5.0.14）。然后运行 `help` 命令来查看所有可用命令的列表，以确保其安装正确。\n\n```\n> npm install -g truffle\n\
    + truffle@5.0.14\n> truffle help\nTruffle v5.0.14 - a development framework for\
    \ Ethereum\nUsage: truffle <command> [options]\n```\n\n### 创建你的智能合约\n\n首先，让我们创建你的文件夹并初始化\
    \ `Truffle` 向导，以生成开始所需的所有代码。在终端中，输入以下内容：\n\n```\n> mkdir MySmartContract && cd\
    \ $_\n> truffle init\n```\n\n这些命令创建了一个名为 `MySmartContract` 的文件夹，并将目录位置更改到新项目；然后，`truffle\
    \ init` 命令初始化该项目。你可以在图 5-4 中看到输出。\n\n![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig4_HTML.jpg](img/475651_1_En_5_Fig4_HTML.jpg)\n\
    图 5-4\n创建 `MySmartContract` 项目并使用 `truffle init` 命令进行初始化\n\n接下来，打开 `WebStorm`，并通过选择\
    \ `File` ➤ `Open` 打开你创建的项目。导航到 `MySmartContract` 项目目录并点击 `Open`。`WebStorm` 将打开该项目，如图\
    \ 5-5 所示。\n\n![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig5_HTML.jpg](img/475651_1_En_5_Fig5_HTML.jpg)\n\
    图 5-5\n在 `WebStorm` 中打开的 `MySmartContract`\n\nEVM 支持许多编程语言，如 Solidity、JavaScript、GO、C++、Python、Java、Ruby、Web\
    \ Assembly、Rust 和 Haskell。在本节中，你将使用 Solidity，因为它是目前针对智能合约最流行的以太坊编程语言。Solidity\
    \ 基于 ECMAScript，并受到 JavaScript、C++ 和 Python 的影响。Solidity 有一个优势，就是除了以太坊之外，你还可以将你的智能合约交易部署到其他各种区块链平台上，例如以太坊经典、Tendermint、ErisDB\
    \ 和 Counterparty。\n\nSolidity 使用 `.sol` 文件扩展名；实际上，如果你检查项目中的 `contracts` 文件夹，你会发现一个名为\
    \ `Migrations.sol` 的文件，如图 5-5 所示。这个文件是在你初始化 `Truffle` 向导时自动生成的。迁移文件帮助你向以太坊网络部署合约。随着项目的发展，你将创建新的迁移文件。\n"
- fmt: '### Connect Truffle to the Ganache Network


    Next, you will customize your environment by calling your network `development`
    and setting the URL and port. As you recall, you are already running Ganache and
    have programmed your network to listen on `127.0.0.1`, port `8584`. You’ll use
    these settings for deploying your contracts on your Ethereum blockchain network.


    To get started, open `MySmartContract/truffle-config.js` and inside the `network`
    object add a `development` object with these configuration settings:


    ```

    module.exports = {

    networks: {

    development: {

    host: "127.0.0.1",

    port: 8584,

    network_id: "∗",

    gas: 4712388,

    gasPrice: 100000000000

    }

    }

    }

    ```


    You set the `host`, `port`, and `network_id`, as well as the `gas` and `gasPrice`
    parameters. The following is according to Truffle docs (`https://truffleframework.com/docs/truffle/reference/configuration#networks`):


    - `gas`: This is the gas limit used for deploys. The default is `4712388`.

    - `gasPrice`: This is the gas price used for deploys. The default is `100000000000`
    (100 Shannon).


    You are setting the default values, which you can achieve also by omitting the
    `gas` and `gasPrice` tags; however, for the live mainnet network, at the time
    of writing, I recommend setting a 21,000 gas price that is a reasonable value.
    Check the ETH Gas Station (`https://ethgasstation.info/`) to figure out how much
    the `gasPrice` value should be, as shown in Figure 5-6.


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig6_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig6_HTML.jpg)


    **Figure 5-6** Ethgasstation.info calculates a recommended gas price


    As you can see, at the time of writing, paying a fiat of $0.014 provides a standard
    5.6 transaction time.


    You have set up a development environment only; however, as you move your code
    from development to a public testnet network and then production, you can add
    more environments to the `truffle-config.js` file.


    ### “Hello, World” Smart Contract


    As mentioned, smart contracts are account objects on the Ethereum blockchain;
    you can write functions to interact with other contracts, send coins, make decisions,
    and store data. Generally speaking, the contracts are built to be decentralized;
    however, keep in mind they can be programmed with a regulated option, making them
    centralized. For instance, the Ethereum Gemini dollar has the option to freeze
    transactions or even reverse them, and other coins can be built with a self-destruct
    function by the owner.


    You’ll start by creating a simple “Hello, World” contract. This is the minimum
    code, and the intention here is not to create anything useful but to help you
    understand how to create a smart contract.


    In Terminal, at the project location, create a new contract and call it `HelloWorldContract`
    using the command `truffle`.


    ```

    > truffle create contract HelloWorldContract

    ```


    If the CLI worked correctly and without errors, it doesn’t output anything.


    Next, open the contract you created; it will show up under `contracts/HelloWorldContract.sol`.
    As you can see, the Truffle wizard created your contract for you.


    This first smart contract is a minimal working example; it just holds a message
    and allows you to retrieve the message by calling your main function. Replace
    the existing code in `contracts/HelloWorldContract.sol` with the following below:


    ```

    pragma solidity ^0.5.0;

    contract HelloWorldContract {

    string greeting;

    constructor() public {

    greeting = ''Hello World'';

    }

    function greet() public view returns (string memory) {

    return greeting;

    }

    }

    ```


    As you can see, Solidity scripting is similar to JavaScript or C++, and it’s easy
    to read. The first line of code is the Solidity compiler version; you will be
    using `0.5.0`. In the `HelloWorldContract` constructor, you are setting the `greeting`
    variable to `''Hello World''`. The main function is `greet()`. Once you call the
    main function, you can retrieve the value of the `greeting` variable.


    ### “MD5SmartContract” Smart Contract


    Now you will create a second contract that is more practical. This contact will
    allow you to store the MD5 hash you stored in the previous chapter, but this time
    you will be able to interact with it instead of just storing the MD5 data on the
    blockchain.


    In Terminal, at the project level, create a new contract called `MD5SmartContract`
    using the command `truffle`.


    ```

    > truffle create contract MD5SmartContract

    ```


    Next, open the contract you created called `contracts/RegisterContract.sol`. You
    will be running the following contract:


    ```

    pragma solidity ^0.5.0;

    contract MD5SmartContract {

    bytes32 public signature;

    event signEvent(bytes32 signature);

    constructor() public {

    }

    function sign(string memory document) public {

    signature = sha256(bytes(document));

    emit signEvent(signature);

    }

    }

    ```


    The code creates a variable called `signature`. Then your main function signs
    your document. You pass the document MD5, and using SHA256, you sign the document.
    You create an event to get dispatched once you sign your document.


    **Note:** Secure Hash Algorithm (SHA) is one of a number of cryptographic hash
    functions. A cryptographic hash function acts as a signature for text or data;
    it is one-way and cannot be decrypted. The generated SHA256 hash is a fixed-size,
    256 bits (32 bytes), and almost unique.


    ### Create Truffle Migration Files for Your Smart Contract Deployment


    As mentioned, Truffle migration files help you deploy your contracts on the Ethereum
    network. You will create a migration file for your deployment. To do so, create
    a new deployment file; call it `2_deploy_contracts.js`, and place the file here:
    `migrations/2_deploy_contracts.js`. You can point to the smart contract code you
    created as follows:


    ```

    const HelloWorldContract = artifacts.require("HelloWorldContract.sol");

    module.exports = function(deployer) {

    deployer.deploy(HelloWorldContract);

    };

    ```


    Create another deployment file, called `3_deploy_contracts.js`, and place the
    file here: `migrations/3_deploy_contracts.js`.


    ```

    const MD5SmartContract = artifacts.require("MD5SmartContract.sol");

    module.exports = function(deployer) {

    deployer.deploy(MD5SmartContract);

    };

    ```


    At this point, your project includes two smart contracts and migration files.
    You can compare your project directory and files with mine; see Figure 5-7.


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig7_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig7_HTML.jpg)


    **Figure 5-7** MySmartContract including two smart contracts and migration files


    Another technique for lazier developers is to use the Truffle create wizard to
    generate the migration file.


    ```

    > truffle create migration deploy_my_contract

    ```


    This command generates the migration file automatically for you.


    ### Compile Your Smart Contract with Truffle


    In a separate Terminal window, you will run Truffle to compile your smart contract.
    The `compile` command turns your Solidity code to bytecode, which can be interpreted
    by the EVM. For now, Ganache simulates the EVM.


    ```

    > truffle compile

    ```


    You can see your contract’s bytecode in the JSON file found here: `build/contracts/HelloWorldContract.json`
    and `build/contracts/MD5SmartContract.json`. Look for the `bytecode` tag shown
    here:


    ```

    "bytecode": "0x608060405234801561001057600080fd5b5061031...",

    ```


    **Note:** Keep in mind that ideally you should delete the contract’s `contracts/*.json`
    file manually before compiling again. This will ensure the latest code gets compiled
    because the CLI does not always recognize changes right away.'
  raw: '### Connect Truffle to the Ganache Network


    Next, you will customize your environment by calling your network `development`
    and setting the URL and port. As you recall, you are already running Ganache and
    have programmed your network to listen on 127.0.0.1, port 8584\. You’ll use these
    settings for deploying your contracts on your Ethereum blockchain network.


    To get started, open `MySmartContract/truffle-config.js` and inside the network
    object add a development object with these configuration settings:


    ```

    module.exports = {

    networks: {

    development: {

    host: "127.0.0.1",

    port: 8584,

    network_id: "∗",

    gas: 4712388,

    gasPrice: 100000000000

    }

    }

    ```


    You set the host, port, and network ID, as well as the `gas` and `gasPrice` parameters.
    The following is according to Truffle docs ( [`https://truffleframework.com/docs/truffle/reference/configuration#networks`](https://truffleframework.com/docs/truffle/reference/configuration%2523networks)
    `)`:


    *   `gas`: This is the gas limit used for deploys. The default is 4712388.


    *   `gasPrice`: This is the gas price used for deploys. The default is 100000000000
    (100 Shannon).


    You are setting the default values, which you can achieve also by omitting the
    `gas` and `gasPrice` tags; however, for the live mainnet network, at the time
    of writing, I recommend setting a 21,000 gas price that is a reasonable value.
    Check the ETH Gas Station ( [`https://ethgasstation.info/`](https://ethgasstation.info/)
    ) to figure out how much the `gasPrice` value should be, as shown in Figure [5-6](#475651_1_En_5_Chapter.xhtml#Fig6).


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig6_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Ethgasstation.info calculates a recommended gas price


    As you can see, at the time of writing, paying a fiat of $0.014 provides a standard
    5.6 transaction time.


    You have set up a development environment only; however, as you move your code
    from development to a public testnet network and then production, you can add
    more environments to the `truffle-config.js` file.


    ### “Hello, World” Smart Contract


    As mentioned, smart contracts are account objects on the Ethereum blockchain;
    you can write functions to interact with other contracts, send coins, make decisions,
    and store data. Generally speaking, the contracts are built to be decentralized;
    however, keep in mind they can be programmed with a regulated option, making them
    centralized. For instance, the Ethereum Gemini dollar has the option to freeze
    transactions or even reverse them, and other coins can be built with a self-destruct
    function by the owner.


    You’ll start by creating a simple “Hello, World” contract. This is the minimum
    code, and the intention here is not to create anything useful but to help you
    understand how to create a smart contract.


    In Terminal, at the project location, create a new contract and call it `HelloWorldContract`
    using the command `truffle`.


    ```

    > truffle create contract HelloWorldContract

    ```


    If the CLI worked correctly and without errors, it doesn’t output anything.


    Next, open the contract you created; it will show up under `contracts/HelloWorldContract.sol`.
    As you can see, the Truffle wizard created your contract for you.


    This first smart contract is a minimal working example; it just holds a message
    and allows you to retrieve the message by calling your main function. Replace
    the existing code in `contracts/HelloWorldContract.sol` with the following below;


    ```

    pragma solidity ^0.5.0;

    contract HelloWorldContract {

    string greeting;

    constructor() public {

    greeting = ''Hello World'';

    }

    function greet() public view returns (string memory) {

    return greeting;

    }

    }

    ```


    As you can see, Solidity scripting is similar to JavaScript or C++, and it’s easy
    to read. The first line of code is the Solidity compiler version; you will be
    using 0.5.0\. In the `HelloWorldContract` constructor , you are setting the `greeting`
    variable to `''Hello World''`. The main function is `greet()`. Once you call the
    main function, you can retrieve the value of the `greeting` variable.


    ### “MD5SmartContract” Smart Contract


    Now you will create a second contract that is more practical. This contact will
    allow you to store the MD5 hash you stored in the previous chapter, but this time
    you will be able to interact with it instead of just storing the MD5 data on the
    blockchain.


    In Terminal, at the project level, create a new contract called `MD5SmartContract`
    using the command `truffle`.


    ```

    > truffle create contract MD5SmartContract

    ```


    Next, open the contract you created called `contracts/RegisterContract.sol`. You
    will be running the following contact:


    ```

    pragma solidity ^0.5.0;

    contract MD5SmartContract {

    bytes32 public signature;

    event signEvent(bytes32 signature);

    constructor() public {

    }

    function sign(string memory document) public {

    signature = sha256(bytes(document));

    emit signEvent(signature);

    }

    }

    ```


    The code creates a variable call signature. Then your main function signs your
    document. You pass the document MD5, and using SHA256, you sign the document.
    You create an event to get dispatched once you sign your document.


    ### Note


    Secure Hash Algorithm (SHA) is one of a number of cryptographic hash functions.
    A cryptographic hash function acts as a signature for text or data; it is one-way
    and cannot be decrypted. The generated SHA256 hash is a fixed-size, 256 bits (32
    bytes), and almost unique.


    ### Create Truffle Migration Files for Your Smart Contract Deployment


    As mentioned, Truffle migration files help you deploy your contracts on the Ethereum
    network. You will create a migration file for your deployment. To do so, create
    a new deployment file; call it `2_deploy_contracts.js`, and place the file here:
    mig`r`ations/`2_deploy_contracts.js`. You can point to the smart contract code
    you created as follows:


    ```

    const HelloWorldContract = artifacts.require("HelloWorldContract.sol");

    module.exports = function(deployer) {

    deployer.deploy(HelloWorldContract);

    };

    ```


    Create another deployment file, called `3_deploy_contracts.js`, and place the
    file here: `migrations/3_deploy_contracts.js`.


    ```

    const MD5SmartContract = artifacts.require("MD5SmartContract.sol");

    module.exports = function(deployer) {

    deployer.deploy(MD5SmartContract);

    };

    ```


    At this point, your project includes two smart contracts and migration files.
    You can compare your project directory and files with mine; see Figure [5-7](#475651_1_En_5_Chapter.xhtml#Fig7).


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig7_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    MySmartContract including two smart contracts and migration files


    Another technique for lazier developers is to use the Truffle create wizard to
    generate the migration file.


    ```

    > truffle create migration deploy_my_contract

    ```


    This command generates the migration file automatically for you.


    ### Compile Your Smart Contract with Truffle


    In a separate Terminal window, you will run Truffle to compile your smart contract.
    The `compile` command turns your Solidity code to bytecode, which can be interpreted
    by the EVM. For now, Ganache simulates the EVM.


    ```

    > truffle compile

    ```


    You can see your contract’s bytecode in the JSON file found here: `build/contracts/HelloWorldContract.json`
    and `build/contracts/MD5SmartContract.json`. Look for the bytecode tag shown here:


    ```

    "bytecode": "0x608060405234801561001057600080fd5b5061031...",

    ```


    ### Note


    Keep in mind that ideally you should delete the contract’s `contracts/∗.json`
    file manually before compiling again. This will ensure the latest code gets compiled
    because the CLI does not always recognize changes right away.'
  trans: '

    ### 将 Truffle 连接至 Ganache 网络


    接下来，你需要自定义环境，将网络命名为`development`，并设置 URL 和端口。回想一下，你已经运行了 Ganache，并将网络监听地址设为`127.0.0.1`，端口`8584`。你将使用这些设置将合约部署到你的以太坊区块链网络上。


    首先，打开`MySmartContract/truffle-config.js`，在`network`对象内添加一个包含以下配置的`development`对象：


    ```

    module.exports = {

    networks: {

    development: {

    host: "127.0.0.1",

    port: 8584,

    network_id: "∗",

    gas: 4712388,

    gasPrice: 100000000000

    }

    }

    }

    ```


    你已设置了`host`（主机）、`port`（端口）、`network_id`（网络 ID）以及`gas`（燃料）和`gasPrice`（燃料价格）参数。以下是
    Truffle 文档（`https://truffleframework.com/docs/truffle/reference/configuration#networks`）中的说明：


    - `gas`：部署时使用的燃料限制。默认值为`4712388`。

    - `gasPrice`：部署时使用的燃料价格。默认值为`100000000000`（100 Shannon）。


    你设置的是默认值，你也可以通过省略`gas`和`gasPrice`标签来达到相同的效果；不过，对于正式主网，在撰写本文时，我建议将燃料价格设置为 21,000，这是一个合理的值。请参考
    ETH Gas Station（`https://ethgasstation.info/`）来确定具体的`gasPrice`值，如图 5-6 所示。


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig6_HTML.jpg](img/475651_1_En_5_Fig6_HTML.jpg)


    **图 5-6** Ethgasstation.info 计算推荐的燃料价格


    如图所示，在撰写本文时，支付 0.014 美元的法币即可获得标准的 5.6 秒交易时间。


    你目前仅设置了一个开发环境；但当你将代码从开发环境迁移到公共测试网络，再到生产环境时，可以在`truffle-config.js`文件中添加更多环境。


    ### “Hello, World”智能合约


    如前所述，智能合约是以太坊区块链上的账户对象；你可以编写函数来与其他合约交互、发送代币、做出决策以及存储数据。通常来说，智能合约被构建为去中心化的；但请记住，也可以通过编程添加监管选项，使其中心化。例如，以太坊
    Gemini 美元提供了冻结交易甚至撤销交易的选项，而其他代币可以由所有者构建自毁功能。


    你将从创建一个简单的“Hello, World”合约开始。这是最小化的代码，此处目的并非创建有用的东西，而是帮助你理解如何创建智能合约。


    在终端中，进入项目目录，使用`truffle`命令创建一个新合约，并命名为`HelloWorldContract`。


    ```

    > truffle create contract HelloWorldContract

    ```


    如果 CLI 正确无误地运行，它不会输出任何内容。


    接下来，打开你创建的合约，它位于`contracts/HelloWorldContract.sol`路径下。如你所见，Truffle 向导已经为你创建了合约。


    这第一个智能合约是一个最小化的可运行示例；它仅存储一条消息，并允许你通过调用主函数来检索该消息。用以下代码替换`contracts/HelloWorldContract.sol`中的现有内容：


    ```

    pragma solidity ⁰.5.0;

    contract HelloWorldContract {

    string greeting;

    constructor() public {

    greeting = ''Hello World'';

    }

    function greet() public view returns (string memory) {

    return greeting;

    }

    }

    ```


    如你所见，Solidity 脚本语言类似于 JavaScript 或 C++，易于阅读。第一行代码是 Solidity 编译器版本；你将使用`0.5.0`版本。在`HelloWorldContract`构造函数中，你将`greeting`变量设置为`''Hello
    World''`。主函数是`greet()`。一旦调用主函数，你就可以检索`greeting`变量的值。


    ### “MD5SmartContract”智能合约


    现在你将创建第二个更实用的合约。这个合约将允许你存储上一章中保存的 MD5 哈希值，但这次你可以与之交互，而不仅仅是把 MD5 数据存储在区块链上。


    在终端中，进入项目目录，使用`truffle`命令创建一个新合约，并命名为`MD5SmartContract`。


    ```

    > truffle create contract MD5SmartContract

    ```


    接下来，打开你创建的合约，它位于`contracts/RegisterContract.sol`路径下。你将运行以下合约：


    ```

    pragma solidity ⁰.5.0;

    contract MD5SmartContract {

    bytes32 public signature;

    event signEvent(bytes32 signature);

    constructor() public {

    }

    function sign(string memory document) public {

    signature = sha256(bytes(document));

    emit signEvent(signature);

    }

    }

    ```


    代码创建了一个名为`signature`的变量。然后，你的主函数签署你的文档。你传入文档的 MD5 值，并使用 SHA256 对文档进行签名。一旦你签署了文档，就会触发一个事件。


    **注：** 安全哈希算法（SHA）是众多密码哈希函数之一。密码哈希函数充当文本或数据的签名；它是单向的，无法解密。生成的 SHA256 哈希值是一个固定大小的
    256 位（32 字节），并且几乎是唯一的。


    ### 为智能合约部署创建 Truffle 迁移文件


    如前所述，Truffle 迁移文件帮助你在以太坊网络上部署合约。你需要为部署创建一个迁移文件。为此，创建一个新的部署文件，命名为`2_deploy_contracts.js`，并将其放置在`migrations/2_deploy_contracts.js`路径下。你可以像这样指向你创建的智能合约代码：


    ```

    const HelloWorldContract = artifacts.require("HelloWorldContract.sol");

    module.exports = function(deployer) {

    deployer.deploy(HelloWorldContract);

    };

    ```


    创建另一个部署文件，命名为`3_deploy_contracts.js`，并将其放置在`migrations/3_deploy_contracts.js`路径下。


    ```

    const MD5SmartContract = artifacts.require("MD5SmartContract.sol");

    module.exports = function(deployer) {

    deployer.deploy(MD5SmartContract);

    };

    ```


    此时，你的项目包含两个智能合约和迁移文件。你可以将你的项目目录和文件与我的进行比较；见图 5-7。


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig7_HTML.jpg](img/475651_1_En_5_Fig7_HTML.jpg)


    **图 5-7** MySmartContract 包含两个智能合约和迁移文件


    对于更懒的开发人员，另一种技术是使用 Truffle 创建向导生成迁移文件。


    ```

    > truffle create migration deploy_my_contract

    ```


    此命令会自动为你生成迁移文件。


    ### 使用 Truffle 编译智能合约


    在另一个终端窗口中，运行 Truffle 来编译你的智能合约。`compile`命令将你的 Solidity 代码转换为 EVM 可解释的字节码。目前，Ganache
    模拟了 EVM。


    ```

    > truffle compile

    ```


    你可以在`build/contracts/HelloWorldContract.json`和`build/contracts/MD5SmartContract.json`的
    JSON 文件中查看合约的字节码。查找如下所示的`bytecode`标签：


    ```

    "bytecode": "0x608060405234801561001057600080fd5b5061031...",

    ```


    **注：** 请记住，理想情况下，在再次编译之前，你应该手动删除合约的`contracts/*.json`文件。这将确保编译的是最新的代码，因为 CLI 并非总能立即识别更改。

