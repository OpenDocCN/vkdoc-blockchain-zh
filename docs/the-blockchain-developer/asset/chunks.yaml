- fmt: '### Dapp Projects


    Most dapps are built directly on top of the Ethereum blockchain or use a blockchain
    for their tokens. However, there are some dapps that even build their own dedicated
    blockchain. Take a look at Table [9-1](#475651_1_En_9_Chapter.xhtml#Tab1) for
    a sample of different dapps and their classifications.


    **Table 9-1** Example of Dapps and Classifications


    | **Dapp** | **Description** | **Classification** | **Token** | **Blockchain**
    |

    | --- | --- | --- | --- | --- |

    | Ethlance | Marketplace for job postings and hiring freelancers. 0 percent fees.
    | Uses Ethereum directly | No token | Ethereum blockchain |

    | Golem | Global market for idle computer power. | Token based on Ethereum | GNT
    | Ethereum blockchain |

    | The SAFE Network | Data storage and communications network. | Implementation
    relying on another protocol (Omni protocol) that is built on top of another blockchain
    (bitcoin) | SFE | Bitcoin |


    In addition to the information in Table [9-1](#475651_1_En_9_Chapter.xhtml#Tab1),
    there are many resources to find more dapps; these two web sites provide a list
    of dapps that you can check: [`https://dapps.ethercasts.com/`](https://dapps.ethercasts.com/)
    and [`https://coinsutra.com`](https://coinsutra.com).


    ### How Do You Create Your Own Dapp?


    The success of bitcoin and blockchain have brought an explosion of dapps. Developers
    and business owners have created a basic process to follow for developing dapps.
    You don’t need to follow this exactly, and it may change by the time of writing;
    however, many of the published dapps out there have followed this process. The
    process consists of these five steps:


    1.  Write a white paper.

    2.  Launch an initial coin offering (ICO).

    3.  Develop the dapp.

    4.  Launch your dapp.

    5.  Market your dapp.


    Let’s review these steps.


    #### Write a White Paper


    The white paper is similar to a company’s business plan aimed at investors. However,
    it targets more than just investors; it’s the technical blueprint. The white paper
    is the technical document as well as the business plan and should explain the
    problem being solved and the concept, features, and technical aspects of the dapp.


    Just like in a business plan, it’s a good idea to include your unique selling
    proposition (USP), road map, members’ résumés, capabilities, and history to help
    establish credibility.


    ### Note


    The unique selling proposition (USP) is the problem your dapp is aiming to solve.


    Once the white paper is published, it is good to get feedback from peers and the
    community in the early stages and prior to development. Social media, forms, and
    publications are often used to promote dapps and help create credibility.


    #### Launch an Initial Coin Offering


    Once the white paper is published, the next step is to launch an ICO and sell
    coins or tokens to fund and support your dapp. The coin should have a reason for
    existence, rather than be the same as another coin/token out there, so you should
    explain how and why your dapp needs its own token or coin.


    You also need to decide on the type of classification for your dapp, which will
    determine whether you will need any or all of the following: 1) issue token, 2)
    set usage fees, 3) have a dedicated blockchain, 4) have a mining mechanism, 5)
    set the allocation of fees, 6) reward investors, 7) allocate fees to pay for different
    departments of your business: support, development, marketing, and business.


    #### Develop the Dapp


    Development should be open source, and GitHub is usually used for repos for the
    development effort. On every release, it’s a good idea to let investors and others
    know of a release to build users and a developer community around your project.
    Many dapps have tried to get funds and delivered no usable products; set yourself
    apart and avoid potential problems with regulators. (I will cover regulators in
    Chapter [11](#475651_1_En_11_Chapter.xhtml).)


    #### Launch Your Dapp


    Launch your dapp and include your release notes, documentation, road map, and
    maintenance plan. It’s crucial to meet the promised launch date.


    #### Market Your Dapp


    The last step is marketing. In addition to traditional marketing, dapps often
    hire or work with prompters during early phases or after release to get the word
    out. Another unique marketing aspect for a dapp is to get the coin/token listed
    on exchanges. This is the final stamp of recognition. Some exchanges have a voting
    system put in place to select the next coin/token to be listed. Some exchanges
    have been abusing this process and charging hefty fees to list a token or coin.
    For instance, a utility token listing on Binance exchange can cost from $0.5 million
    to $3 million.


    Many early investors including dapp owners have been able to “cash out” if a token
    is listed on major exchanges as its price often goes up high because of the listing;
    however, it has become more and more difficult for a dapp to be listed, and it
    needs to provide real value. Fraudsters are often exposed, and coins/tokens get
    de-listed as quickly as they are listed.


    ## Why Angular?


    With dapps, just like with any traditional app, you can write your application
    natively to the device you publish your app to (in the supported language of your
    device such as Xcode for iOS); however, it has been proven that using a framework
    can speed up development. For instance, if you want to utilize the same code and
    deploy your application on multiple devices with different screen sizes, that
    can become a challenge for a small team. Angular helps you build cross-platform
    modern applications for web, mobile, and desktop at the same time. The Angular
    CLI and Component Dev Kit (CDK) can help accelerate the development of apps.


    Using Angular can be beneficial because of the following factors:


    - Large community support

    - Enterprise architecture and scaling

    - Cross-platform support

    - Documentation


    Angular is a structural framework and enables you to create front-end client-side
    applications. The pieces are loosely coupled and structured in a modular fashion,
    resulting in less code to write, added flexibility, easier-to-read code, and quicker
    development time.


    Angular allows the developer to put together a toolset for building a framework
    that will fit your exact application’s needs. You can use HTML as your template
    language and extend HTML’s syntax so the application’s components can be read
    easily. Other than HTML, the coding is done with TypeScript, which turns JavaScript
    into an object-oriented programming language and gives you an enterprise-level
    environment.


    Additionally, Angular is well structured and built to be fully accessible, in
    accordance with accessible rich Internet applications (ARIAs), so your app or
    site can be built correctly for people with disabilities.


    Angular also gets along well with other JavaScript libraries so you can install
    libraries such as the Ethereum JavaScript API `web3.js` with `npm` manager. Lastly,
    Angular’s features can be easily modified or replaced to fit your exact needs.


    ### Note


    The word *angular* means having multiple angles or measured by an angle. Angular
    is a structural framework and enables you to create front-end client-side applications
    for the Web, mobile, and desktop. It is an open source, front-end framework for
    dynamic app development.


    Angular’s most significant features are data binding and dependency injection.
    These can help decrease code. Also, Angular has been around for years; it’s on
    its seventh release.'
