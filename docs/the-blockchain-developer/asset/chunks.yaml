- fmt: "## Summary\n\nIn this chapter, I covered the NEO blockchain and NEOContracts.\
    \ You looked at NEO’s high-level blockchain architecture and learned about NEO’s\
    \ smart economy. You set your local environment and upgraded Xcode, installed\
    \ Visual Studio 2017 IDE, and installed .NET Core.\n\nYou installed Docker, so\
    \ you can now create containers, and you downloaded neo-compiler and generated\
    \ `neon.dll`. Lastly, you built the `neo-cli` so you can manage your wallet and\
    \ run other RPC operations.\n\nNext, you created a local NEO private testnet by\
    \ installing `neo-python` and `neo-privatenet-docker`. You bootstrapped the testnet\
    \ and started NEO bash and were then able to start your network and claim NEO\
    \ and gas.\n\nAdditionally, I covered potential problems during the installation\
    \ of your NEO tools.\n\nNext, you created two “Hello, World” projects, one in\
    \ C# and one in Python, and were able to compile these projects into the NEO virtual\
    \ machine’s bytecode (AVM) files. You took these files and learned how to publish\
    \ them on the NEO testnet blockchain as well as on the NEO mainnet.\n\nLastly,\
    \ I compared Ethereum versus EOS versus NEO to help you better understand the\
    \ differences between these platforms as well what criteria to look at when selecting\
    \ a platform for your smart contracts.\n\n# 8. Hyperledger\n\nIn previous chapters,\
    \ I covered blockchain technologies that are focused on cryptocurrency, and in\
    \ fact, each project I have covered so far has included its own currency. Hyperledger\
    \ is different; it does not have a currency attached, although you can create\
    \ a coin if needed. Instead, Hyperledger was created with the aim of being an\
    \ open source platform targeted at utilizing blockchain to fit business needs.\n\
    \nHyperledger started in 2015 as an open source blockchain contributed by Digital\
    \ Asset and IBM as a result of a hackathon (now the blockchain is called Hyperledger\
    \ Fabric), and it extended to consists of multiple pluggable modules and the entire\
    \ project is called Hyperledger aimed at improving a blockchain’s performance\
    \ and reliability so you can assemble modules to create your own unique platform\
    \ to fit your business needs.\n\n### Note\n\nThe Hyperledger project is an umbrella\
    \ strategy modular architecture consisting of a collection of pluggable components\
    \ that are used to create custom blockchain solutions for businesses. The Hyperledger\
    \ architecture aims to provide scalability, performance, confidentiality, resiliency,\
    \ and flexibility. Note that if you visit Hyperledger’s documentation, you’ll\
    \ often see the term *distributed ledger technology* (DLT); this term is synonymous\
    \ with *blockchain*.\n\n## Hyperledger Overview\n\nThe modular architecture allows\
    \ you to adjust things like the blockchain’s consensus mechanism, as well as manage\
    \ storage, set services for identities, set permissions for the identities you\
    \ set, and create smart contracts (in Hyperledger Fabric, smart contracts are\
    \ called *chaincode*). In terms of programming languages, Hyperledger’s chaincode\
    \ is written in Go (Golang); however, you can utilize JavaScript with the Hyperledger\
    \ Composer tool. Chaincode can then be used to implement and automate the business\
    \ logic.\n\nThe Hyperledger project’s managing team consists of ten members, and\
    \ the executive director at the time of writing is Brian Behlendorf. In addition,\
    \ 159 engineers from 27 organizations contributed to Hyperledger Fabric v1.0,\
    \ according to `developer.ibm.com`.\n\n> “*Hyperledger* is an open source development\
    \ project to benefit an ecosystem of Hyperledger based solution providers and\
    \ users. It is focused on blockchain related use cases that will work under a\
    \ variety of industrial sectors.”\n> \n> —Brian Behlendorf (executive director,\
    \ Hyperledger)\n\nHyperledger is hosted by the Linux Foundation, and in terms\
    \ of adoption, it’s supported by large enterprise companies such as IBM, Intel,\
    \ and SAP, as well as implemented by Oracle, Accenture, The National Association\
    \ of Realtors, Deutsche Borse Group, Sony Global Education, and many others.\n\
    \nThe Hyperledger consensus mechanism allows the network of nodes to choose between\
    \ a no-op (no consensus) mechanism and an agreement protocol called Practical\
    \ Byzantine Fault Tolerance (PBFT). The PBFT consensus enables two or more nodes\
    \ to agree by giving the nodes full control. This precludes other nodes on the\
    \ network from forcing a block, which can prevent potential double spending attacks,\
    \ as you saw with PoW’s 51 percent potential for mining attacks. Hyperledger gives\
    \ control over the consensus mechanism, and you can restrict access to transactions.\
    \ This results in improved performance and scalability as there are fewer nodes\
    \ that need to agree on a block. Additionally, PBFT provides privacy for the network,\
    \ which fits businesses better instead of providing full transparency as you have\
    \ seen in other blockchains.\n\nTo give you an idea about Hyperledger’s flexibility,\
    \ you can use a dynamic consensus and enable what is called *hot swapping*, where\
    \ you replace the consensus algorithms while the network is running (done with\
    \ Hyperledger Sawtooth).\n\nBlockchains focused on cryptocurrency usually provide\
    \ transparency of transactions and network data, because they are dealing with\
    \ funds and mostly untrusted members. However, this also limits the flexibility\
    \ and how much you can modify the network and how much you can control as you\
    \ are limited by the set of rules. Hyperledger is not backed by its own currency\
    \ and provides more granular control.\n\nHyperledger project was built with basic\
    \ functionality, vanilla flavor, with the intention of enabling developers to\
    \ customize as much as possible, from the blockchain’s consensus mechanism to\
    \ the web interface identity’s permissions, which provides limited data to members.\n\
    \nThis modular architecture approach allows developers to create specific customized\
    \ personalized blockchains to fit exact business needs. Hyperledger contains the\
    \ following main open source frameworks and tools.\n\n- Hyperledger frameworks:\n\
    \    - *Hyperledger Fabric (contributed by IBM)*: This is a permission blockchain\
    \ infrastructure with SDKs for Node.js, Java, and GoLang. Hyperledger Fabric is\
    \ the heart of Hyperledger and supports chaincode in GoLang and JavaScript (utilizing\
    \ Hyperledger Composer or natively). Blockchain is based on the endorser/orderer\
    \ architecture. You’ll learn more about this later this chapter.\n    - *Hyperledger\
    \ Burrow*: This is an Ethereum VM built to specification.\n    - *Hyperledger\
    \ Indy*: Think independent. This is a tool and library for running independent\
    \ identities on distributed ledgers."
