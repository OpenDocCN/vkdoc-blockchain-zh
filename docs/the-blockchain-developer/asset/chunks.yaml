    \n```\n> bitcoin-cli getnewaddress\n2Msggcttx7wDDbcib6yD8ng2oKRdq8Bz4wV\n```\n\
    \nNext, you can set the two cosigners’ addresses.\n\n```\n> address1=2Msggcttx7wDDbcib6yD8ng2oKRdq8Bz4wV\n\
    > address2=mxaFFFW5CFfJi6fbhn1qFDi8gv6eFsSBKQ\n```\n\nEnsure the address is correct\
    \ via the `validateaddress` command.\n\n```\n> bitcoin-cli validateaddress $address2\n\
    ```\n\nYou need both cosigners’ public keys to create your cosigner wallet. You\
    \ already have the Electrum wallet’s public key; now you need bitcoin core’s RPC\
    \ public key. To get this, you use the `getaddressinfo` command to take a look\
    \ at the RPC JSON response and `pubkey` variable.\n\n```\n> bitcoin-cli getaddressinfo\
    \ $address1\n{\n\"address\": \"2Msggcttx7wDDbcib6yD8ng2oKRdq8Bz4wV\",\n\"scriptPubKey\"\
    : \"a91404d0a132b5796d4462f39865d56af4ff7255d1b287\",\n\"ismine\": true,\n\"iswatchonly\"\
    : false,\n\"isscript\": true,\n\"iswitness\": false,\n\"script\": \"witness_v0_keyhash\"\
    ,\n\"hex\": \"001440bbb1a949badb3a12a941a44bc994f7127c595c\",\n\"pubkey\": \"\
    034ffed96ffc416b90daa97df5c09b618d7fbf99076ed8100900cfa0890e763ac0\",\n\"embedded\"\
    : {\n\"isscript\": false,\n\"iswitness\": true,\n\"witness_version\": 0,\n\"witness_program\"\
    : \"40bbb1a949badb3a12a941a44bc994f7127c595c\",\n\"pubkey\": \"034ffed96ffc416b90daa97df5c09b618d7fbf99076ed8100900cfa0890e763ac0\"\
    ,\n\"address\": \"tb1qgzamr22fhtdn5y4fgxjyhjv57uf8ck2u4glnj9\",\n\"scriptPubKey\"\
    : \"001440bbb1a949badb3a12a941a44bc994f7127c595c\"\n},\n\"label\": \"\",\n\"timestamp\"\
    : 1541782726,\n\"hdkeypath\": \"m/0'/0'/9'\",\n\"hdseedid\": \"572deaa922cbf31076701942878c3e5fc2e23b60\"\
    ,\n\"hdmasterkeyid\": \"572deaa922cbf31076701942878c3e5fc2e23b60\",\n\"labels\"\
    : [\n{\n\"name\": \"\",\n\"purpose\": \"receive\"\n}\n]\n}\n```\n\nNow, you are\
    \ ready to create your cosigners’ multisigned address via the `createmultisig`\
    \ command because you have both cosigners’ public keys.\n\n```\n> bitcoin-cli\
    \ -named createmultisig nrequired=2 keys=\"'[\"034ffed96ffc416b90daa97df5c09b618d7fbf99076ed8100900cfa0890e763ac0\"\
    ,\"038e6fb8b842c750eb68bfccfd0fa1aa1ce8e455d58137e260a067e6d2fb853ea6\"]\"'\n\
    {\n\"address\": \"2MtBkhgVLJ6VA1nFbjam36iUY1dCiWFf4ix\",\n\"redeemScript\": \"\
    5221034ffed96ffc416b90daa97df5c09b618d7fbf99076ed8100900cfa0890e763ac021038e6fb8b842c750eb68bfccfd0fa1aa1ce8e455d58137e260a067e6d2fb853ea652ae\"\
    \n}\n```\n\nNext, you need to pick a UTXO `txid` and `vout` to sign your transaction,\
    \ just as you did in previous raw transactions.\n\n```\n> bitcoin-cli listunspent\n\
    [\n{\n\"txid\": \"ea3fb46ab103d15120e02ed6b60e3d83b265fed26794e3ed739496b62445410b\"\
    ,\n\"vout\": 0,\n...\n]\n```\n\nThen you set the `utxo_txid` property.\n\n```\n\
    > utxo_txid=ea3fb46ab103d15120e02ed6b60e3d83b265fed26794e3ed739496b62445410b\n\
    > utxo_vout=0\n> recipient=\"mv4rnyY3Su5gjcDNzbMLKBQkBicCtHUtFB\"\n> rawtxhex=$(bitcoin-cli\
    \ -named createrawtransaction inputs=\"'[ { \"txid\": \"'$utxo_txid'\", \"vout\"\
    : '$utxo_vout' } ]\"' outputs=\"'{ \"'$recipient'\": 0.001}\"')\n```\n\nNow decode\
    \ and set the `hexstring` property.\n\n```\n> bitcoin-cli -named decoderawtransaction\
    \ hexstring=$rawtxhex\n> bitcoin-cli signrawtransactionwithwallet $rawtxhex\n\
    {\n\"hex\": \"\"\
    ,\n\"complete\": true\n}\n```\n\nLastly, sign your transaction via the `signedtx`\
    \ command.\n\n```\n> signedtx=\"\"\
    \n```\n\nYou are ready to send your transaction using `sendrawtransaction` value.\n\
    \n```\n> bitcoin-cli sendrawtransaction $signedtx\n```"
  raw: '### Note


    The Electrum public master key is part of the Electrum Hierarchical Deterministic
    (HD) wallet that generates an address for you based on a master seed that can
    be used to back up all your funds. The seed consists of words used to retrieve
    your wallet’s private keys; losing your seeds would mean losing your private keys.


    Click Next, and you can enter a cosigner’s public key or private key. See Figure
    [4-15](#475651_1_En_4_Chapter.xhtml#Fig15).


    ![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig15_HTML.jpg](images/475651_1_En_4_Chapter/475651_1_En_4_Fig15_HTML.jpg)


    Figure 4-15


    Electrum install wizard cosigner key


    On the next screen of the wizard, you will be using the master private key of
    your bitcoin core’s wallet to allow Electrum to sign the second wallet on your
    behalf. You can retrieve the private key from inside your private key backup file.
    It shows under `extended private masterkey`.


    ```

    > vim /Users/[location]/mywallet.txt

    # extended private masterkey: [key]

    ```


    The Electrum wizard sets your cosigners for you, and the next step of the install
    wizard asks you to set up your password, if you like, for extra security.


    That’s it. Now that the wizard has completed setting up your account, you can
    send and receive funds from and to your cosigner wallet. Click Receive at the
    top to get your wallet address, as shown in Figure [4-16](#475651_1_En_4_Chapter.xhtml#Fig16).


    ![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig16_HTML.jpg](images/475651_1_En_4_Chapter/475651_1_En_4_Fig16_HTML.jpg)


    Figure 4-16


    Electrum wallet receive address and QR code


    You will be using Coinfaucet.eu again to fund your new wallet: [`https://coinfaucet.eu/en/btc-testnet/`](https://coinfaucet.eu/en/btc-testnet/)
    .


    Then you can send these coins back to the Coinfaucet.eu wallet’s address after
    the coins have been confirmed; here is Coinfaucet.eu wallet’s address:


    ```

    2N7RzS3j2eKHVj1E5yV7iGuwfgUtobrCnrc

    ```


    Since you have been providing both of the cosigner’s private keys, this transaction
    will be happening using the `send` command. However, in case you set two accounts
    and provide only one public key, the second cosigner would need to approve this
    transaction on his account before the send command will actually send the coins.


    Similarly, you can do this transaction via the RPC command line.


    To get started, click File ➤ Delete at the top of Electrum to create a standard
    wallet instead of a cosigner wallet.


    Once this wallet is removed, you can start over and create a new Standard (P2PKH)
    wallet that you will be using as the second cosigner. To retrieve your wallet’s
    address, click the View link at the top and then click Addresses.


    Next, right-click an address for which you’d like to see its public key. This
    will show the address public key. See Figure [4-17](#475651_1_En_4_Chapter.xhtml#Fig17).


    ![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig17_HTML.jpg](images/475651_1_En_4_Chapter/475651_1_En_4_Fig17_HTML.jpg)


    Figure 4-17


    Electrum Standard wallet address and public key


    *   Here is the example’s wallet address: `mxaFFFW5CFfJi6fbhn1qFDi8gv6eFsSBKQ`


    *   Here is the example’s public key: `038e6fb8b842c750eb68bfccfd0fa1aa1ce8e455d58137e260a067e6d2fb853ea6`


    Next, you will create a new address for your cosigner via command-line RPC.


    ```

    > bitcoin-cli getnewaddress

    2Msggcttx7wDDbcib6yD8ng2oKRdq8Bz4wV

    ```


    Next, you can set the two cosigners’ addresses.


    ```

    > address1=2Msggcttx7wDDbcib6yD8ng2oKRdq8Bz4wV

    > address2=mxaFFFW5CFfJi6fbhn1qFDi8gv6eFsSBKQ

    ```


    Ensure the address is correct via the `validateaddress` command.


    ```

    > bitcoin-cli validateaddress $address2

    ```


    You need both cosigners’ public keys to create your cosigner wallet. You already
    have the Electrum wallet’s public key; now you need bitcoin core’s RPC public
    key. To get this, you use the `getaddressinfo` command to take a look at the RPC
    JSON response and `pubkey` variable.


    ```

    > bitcoin-cli getaddressinfo $address1

    {

    "address": "2Msggcttx7wDDbcib6yD8ng2oKRdq8Bz4wV",

    "scriptPubKey": "a91404d0a132b5796d4462f39865d56af4ff7255d1b287",

    "ismine": true,

    "iswatchonly": false,

    "isscript": true,

    "iswitness": false,

    "script": "witness_v0_keyhash",

    "hex": "001440bbb1a949badb3a12a941a44bc994f7127c595c",

    "pubkey": "034ffed96ffc416b90daa97df5c09b618d7fbf99076ed8100900cfa0890e763ac0",

    "embedded": {

    "isscript": false,

    "iswitness": true,

    "witness_version": 0,

    "witness_program": "40bbb1a949badb3a12a941a44bc994f7127c595c",

    "pubkey": "034ffed96ffc416b90daa97df5c09b618d7fbf99076ed8100900cfa0890e763ac0",

    "address": "tb1qgzamr22fhtdn5y4fgxjyhjv57uf8ck2u4glnj9",

    "scriptPubKey": "001440bbb1a949badb3a12a941a44bc994f7127c595c"

    },

    "label": "",

    "timestamp": 1541782726,

    "hdkeypath": "m/0''/0''/9''",

    "hdseedid": "572deaa922cbf31076701942878c3e5fc2e23b60",

    "hdmasterkeyid": "572deaa922cbf31076701942878c3e5fc2e23b60",

    "labels": [

    {

    "name": "",

    "purpose": "receive"

    }

    ]

    }

    ```


    Now, you are ready to create your cosigners’ multisigned address via the `createmultisig`
    command because you have both cosigners’ public keys.


    ```

    > bitcoin-cli -named createmultisig nrequired=2 keys="''["034ffed96ffc416b90daa97df5c09b618d7fbf99076ed8100900cfa0890e763ac0","038e6fb8b842c750eb68bfccfd0fa1aa1ce8e455d58137e260a067e6d2fb853ea6"]"''

    {

    "address": "2MtBkhgVLJ6VA1nFbjam36iUY1dCiWFf4ix",

    "redeemScript": "5221034ffed96ffc416b90daa97df5c09b618d7fbf99076ed8100900cfa0890e763ac021038e6fb8b842c750eb68bfccfd0fa1aa1ce8e455d58137e260a067e6d2fb853ea652ae"

    }

    ```


    Next, you need to pick a UTXO `txid` and `vout` to sign your transaction, just
    as you did in previous raw transactions.


    ```

    > bitcoin-cli listunspent

    [

    {

    "txid": "ea3fb46ab103d15120e02ed6b60e3d83b265fed26794e3ed739496b62445410b",

    "vout": 0,

    ...

    ]

    ```


    Then you set the `utxo_txid` property.


    ```

    > utxo_txid=ea3fb46ab103d15120e02ed6b60e3d83b265fed26794e3ed739496b62445410b

    > utxo_vout=0

    > recipient="mv4rnyY3Su5gjcDNzbMLKBQkBicCtHUtFB"

    > rawtxhex=$(bitcoin-cli -named createrawtransaction inputs="''[ { "txid": "''$utxo_txid''",
    "vout": ''$utxo_vout'' } ]"'' outputs="''{ "''$recipient''": 0.001}"'')

    ```


    Now decode and set the `hexstring` property.


    ```

    > bitcoin-cli -named decoderawtransaction hexstring=$rawtxhex

    > bitcoin-cli signrawtransactionwithwallet $rawtxhex

    {

    "hex": "",

    "complete": true

    }

    ```


    Lastly, sign your transaction via the `signedtx` command.


    ```

    > signedtx=""

    ```


    You are ready to send your transaction using `sendrawtransaction` value.


    ```

    > bitcoin-cli sendrawtransaction $signedtx

    ```'
  trans: "\n### 注意\n\nElectrum 公钥主密钥是 Electrum 分层确定性钱包的一部分，该钱包基于一个主种子为你生成地址，这个主种子可用于备份你所有的资金。种子由用于检索你钱包私钥的单词组成；丢失种子就意味着丢失你的私钥。\n\
    \n点击“下一步”，你可以输入联合签名者的公钥或私钥。参见图 4-15。\n\n![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig15_HTML.jpg](img/475651_1_En_4_Fig15_HTML.jpg)\n\
    \n图 4-15  \nElectrum 安装向导 - 联合签名者密钥\n\n在向导的下一个屏幕中，你将使用比特币核心钱包的主私钥，让 Electrum 代表你签署第二个钱包。你可以从你的私钥备份文件中检索该私钥。它显示在\
    \ `extended private masterkey` 下方。\n\n```\n> vim /Users/[位置]/mywallet.txt\n# extended\
    \ private masterkey: [key]\n```\n\nElectrum 向导会为你设置联合签名者，安装向导的下一步会要求你设置密码（如果你愿意），以增强安全性。\n\
    \n就是这样。现在向导已完成账户设置，你可以向你的联合签名者钱包发送资金，或从中接收资金。点击顶部的“接收”获取你的钱包地址，如图 4-16 所示。\n\n\
    ![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig16_HTML.jpg](img/475651_1_En_4_Fig16_HTML.jpg)\n\
    \n图 4-16  \nElectrum 钱包 - 接收地址和二维码\n\n你将再次使用 Coinfaucet.eu 为你的新钱包注资：[`https://coinfaucet.eu/en/btc-testnet/`](https://coinfaucet.eu/en/btc-testnet/)。\n\
    \n然后，在交易被确认后，你可以将这些币发送回 Coinfaucet.eu 钱包的地址；以下是 Coinfaucet.eu 钱包的地址：\n\n```\n\
    2N7RzS3j2eKHVj1E5yV7iGuwfgUtobrCnrc\n```\n\n由于你一直提供两个联合签名者的私钥，这笔交易将使用 `send` 命令进行。但是，如果你设置了两个账户但只提供了一个公钥，那么第二个联合签名者需要在其账户上批准此交易后，`send`\
    \ 命令才会实际发送币。\n\n类似地，你可以通过 RPC 命令行执行此交易。\n\n首先，点击 Electrum 顶部的“文件 ➤ 删除”以创建一个标准钱包，而不是联合签名者钱包。\n\
    \n一旦此钱包被移除，你就可以重新开始，创建一个新的标准（P2PKH）钱包，将其用作第二个联合签名者。要检索你的钱包地址，请点击顶部的“查看”链接，然后点击“地址”。\n\
    \n接下来，右键单击你想要查看其公钥的地址。这将显示该地址的公钥。参见图 4-17。\n\n![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig17_HTML.jpg](img/475651_1_En_4_Fig17_HTML.jpg)\n\
    \n图 4-17  \nElectrum 标准钱包 - 地址和公钥\n\n- 此处是示例钱包地址：`mxaFFFW5CFfJi6fbhn1qFDi8gv6eFsSBKQ`\n\
    - 此处是示例公钥：`038e6fb8b842c750eb68bfccfd0fa1aa1ce8e455d58137e260a067e6d2fb853ea6`\n\
    \n接下来，你将通过命令行 RPC 为你的联合签名者创建一个新地址。\n\n```\n> bitcoin-cli getnewaddress\n2Msggcttx7wDDbcib6yD8ng2oKRdq8Bz4wV\n\
    ```\n\n接着，你可以设置两个联合签名者的地址。\n\n```\n> address1=2Msggcttx7wDDbcib6yD8ng2oKRdq8Bz4wV\n\
    > address2=mxaFFFW5CFfJi6fbhn1qFDi8gv6eFsSBKQ\n```\n\n通过 `validateaddress` 命令确保地址正确。\n\
    \n```\n> bitcoin-cli validateaddress $address2\n```\n\n你需要两个联合签名者的公钥来创建你的联合签名者钱包。你已经有了\
    \ Electrum 钱包的公钥；现在你需要比特币核心的 RPC 公钥。为此，你可以使用 `getaddressinfo` 命令查看 RPC JSON 响应中的\
    \ `pubkey` 变量。\n\n```\n> bitcoin-cli getaddressinfo $address1\n{\n\"address\"\
    : \"2Msggcttx7wDDbcib6yD8ng2oKRdq8Bz4wV\",\n\"scriptPubKey\": \"a91404d0a132b5796d4462f39865d56af4ff7255d1b287\"\
    ,\n\"ismine\": true,\n\"iswatchonly\": false,\n\"isscript\": true,\n\"iswitness\"\
    : false,\n\"script\": \"witness_v0_keyhash\",\n\"hex\": \"001440bbb1a949badb3a12a941a44bc994f7127c595c\"\
    ,\n\"pubkey\": \"034ffed96ffc416b90daa97df5c09b618d7fbf99076ed8100900cfa0890e763ac0\"\
    ,\n\"embedded\": {\n\"isscript\": false,\n\"iswitness\": true,\n\"witness_version\"\
    : 0,\n\"witness_program\": \"40bbb1a949badb3a12a941a44bc994f7127c595c\",\n\"pubkey\"\
    : \"034ffed96ffc416b90daa97df5c09b618d7fbf99076ed8100900cfa0890e763ac0\",\n\"\
    address\": \"tb1qgzamr22fhtdn5y4fgxjyhjv57uf8ck2u4glnj9\",\n\"scriptPubKey\":\
    \ \"001440bbb1a949badb3a12a941a44bc994f7127c595c\"\n},\n\"label\": \"\",\n\"timestamp\"\
    : 1541782726,\n\"hdkeypath\": \"m/0'/0'/9'\",\n\"hdseedid\": \"572deaa922cbf31076701942878c3e5fc2e23b60\"\
    ,\n\"hdmasterkeyid\": \"572deaa922cbf31076701942878c3e5fc2e23b60\",\n\"labels\"\
    : [\n{\n\"name\": \"\",\n\"purpose\": \"receive\"\n}\n]\n}\n```\n\n现在，你已经准备好通过\
    \ `createmultisig` 命令创建你的联合签名者多重签名地址，因为你已经拥有了两个联合签名者的公钥。\n\n```\n> bitcoin-cli\
    \ -named createmultisig nrequired=2 keys=\"'[\"034ffed96ffc416b90daa97df5c09b618d7fbf99076ed8100900cfa0890e763ac0\"\
    ,\"038e6fb8b842c750eb68bfccfd0fa1aa1ce8e455d58137e260a067e6d2fb853ea6\"]\"'\n\
    {\n\"address\": \"2MtBkhgVLJ6VA1nFbjam36iUY1dCiWFf4ix\",\n\"redeemScript\": \"\
    5221034ffed96ffc416b90daa97df5c09b618d7fbf99076ed8100900cfa0890e763ac021038e6fb8b842c750eb68bfccfd0fa1aa1ce8e455d58137e260a067e6d2fb853ea652ae\"\
    \n}\n```\n\n接下来，你需要挑选一个 UTXO `txid` 和 `vout` 来签署你的交易，就像你在之前的原始交易中所做的那样。\n\n```\n\
    > bitcoin-cli listunspent\n[\n{\n\"txid\": \"ea3fb46ab103d15120e02ed6b60e3d83b265fed26794e3ed739496b62445410b\"\
    ,\n\"vout\": 0,\n...\n]\n```\n\n然后设置 `utxo_txid` 属性。\n\n```\n> utxo_txid=ea3fb46ab103d15120e02ed6b60e3d83b265fed26794e3ed739496b62445410b\n\
    > utxo_vout=0\n> recipient=\"mv4rnyY3Su5gjcDNzbMLKBQkBicCtHUtFB\"\n> rawtxhex=$(bitcoin-cli\
    \ -named createrawtransaction inputs=\"'[ { \"txid\": \"'$utxo_txid'\", \"vout\"\
    : '$utxo_vout' } ]\"' outputs=\"'{ \"'$recipient'\": 0.001}\"')\n```\n\n现在解码并设置\
    \ `hexstring` 属性。\n\n```\n> bitcoin-cli -named decoderawtransaction hexstring=$rawtxhex\n\
    > bitcoin-cli signrawtransactionwithwallet $rawtxhex\n{\n\"hex\": \"\"\
    ,\n\"complete\": true\n}\n```\n\n最后，通过 `signedtx` 命令签署你的交易。\n\n```\n> signedtx=\"\
    \"\
    \n```\n\n你已经准备好使用 `sendrawtransaction` 值发送交易了。\n\n```\n> bitcoin-cli sendrawtransaction\
    \ $signedtx\n```\n"
- fmt: "### Replaceable Transactions and Locktime\n\nWhen creating a `RawTransaction`\
    \ with the `createrawtransaction` command, you can include two additional variables\
    \ you can utilize: `locktime` and `replaceable`.\n\n```\ncreaterawtransaction\
    \ [{\"txid\":\"id\",\"vout\":n},...] [{\"address\":amount},{\"data\":\"hex\"},...]\
    \ ( locktime ) ( replaceable )\n```\n\nYou can learn more about these arguments\
    \ here:  \n[`https://bitcoincore.org/en/doc/0.17.0/rpc/rawtransactions/createrawtransaction/`](https://bitcoincore.org/en/doc/0.17.0/rpc/rawtransactions/createrawtransaction/)\n\
    \nAs the name suggests, `replaceable` allows a raw transaction to be replaced\
    \ by a new transaction with higher fees. This happens when the fee you set is\
    \ too low, causing the transaction not to go through. For instance, if the fee\
    \ you are trying to pay is too high, you can get the following error message:\n\
    \n```\nabsurdly-high-fee, 11563419 > 10000000 (code 256)\n```\n\nBitcoin Core\
    \ supports the `locktime` argument in the raw transaction; this argument allows\
    \ you to send transactions at some time in the future, and until they’re sent,\
    \ the sender can cancel the transaction.\n\nThere are two options. Block height\
    \ is used for small numbers, and UNIX timestamps are used for big numbers. These\
    \ arguments mean that the transaction is not inserted into the block until the\
    \ conditions are met.\n\n### Note\n\nBlock height is the number of blocks in the\
    \ chain between any specific block and the first chain block on the chain.\n\n\
    ## Bitcoin Colored Coins\n\nBitcoin transactions hold a property called `OP_RETURN`.\
    \ This property can be used to hold up to 80 bytes of data, which can be used\
    \ for passing data. This may not seem much, but it’s enough for proof of ownership\
    \ or passing small pieces of data to authenticate. Utilizing the `OP_RETURN` property\
    \ is done by setting the data code word in the `vout` property of the transaction.\
    \ To pass the data we want to include in your transaction, you still need to send\
    \ funds for the transaction to be included in the blockchain, but you can set\
    \ the recipient to be your own wallet in case you don’t want to pay someone. That\
    \ way you get to store data in the Bitcoin persistence blockchain and you only\
    \ need to pay the transaction fee as you don’t pay anyone.\n\n### Note\n\n`OP_RETURN`\
    \ is the opcode script that defines the transaction as valid or invalid; it can\
    \ be used to insert data into the transaction that will result in storing that\
    \ data in the Bitcoin blockchain. Keep in mind that there are different opinions\
    \ about whether it’s okay to utilize this property. Some believe that storing\
    \ non-currency data in the blockchain is a bad idea because there are less costly\
    \ and more efficient ways to store data; it really depends on usage.\n\n### Sending\
    \ a Transaction with OP_RETURN\n\nBefore you set your transaction, you will want\
    \ to introduce a small lightweight utility program called `jq` to streamline creating\
    \ a `RawTransaction` object. This is a command-line JSON processor that you can\
    \ use to process your RPC JSON in the terminal. You can download it from [`https://stedolan.github.io/jq/download`](https://stedolan.github.io/jq/download).\n\
    \nInstall it with Brew.\n\n```\n> brew install jq\n```\n\nThe `jq` utility allows\
    \ you to retrieve pieces of the returned JSON so you will be able to stream your\
    \ transaction quicker and with fewer mistakes.\n\nNext, you can set some data\
    \ to send via the `OP_RETURN` param. This example will create an MD5 for a file.\
    \ In real life, this can be a version of a contract between parties or any piece\
    \ of code you need.\n\n### Note\n\nThe Message-Digest 5 (MD5) algorithm is a function\
    \ that generates a 128-bit hash value. It’s common to create a file that holds\
    \ checksum files to ensure the integrity of data because each file change would\
    \ result in a new MD5 result.\n\nYou can pick one of Bitcoin’s core files such\
    \ as `config.log` to generate an MD5 hash and set the `op_return_data` variable.\n\
    \n```\n> md5 config.log\nMD5 (config.log) = 634ef85e038cea45bd20900fc97e09dc\n\
    > op_return_data=\"634ef85e038cea45bd20900fc97e09dc\"\n```\n\nAs you saw previously\
    \ in this chapter, you can use the `listunspent` command to select your UTXO that\
    \ you want to spend.\n\n```\n> bitcoin-cli listunspent\n```\n\nNow using the `jq`\
    \ utility, you can stream the process, so you don’t need to do a copy and paste\
    \ and can avoid errors.\n\n```\n> utxo_txid=$(bitcoin-cli listunspent | jq -r\
    \ '.[0] | .txid')\n> utxo_vout=$(bitcoin-cli listunspent | jq -r '.[0] | .vout')\n\
    > recipient=$(bitcoin-cli getrawchangeaddress)\n```\n\nNotice a few things here.\
    \ You set the first JSON item `[0]` here, but you can set any item you want, such\
    \ as `[1]` or `[2]`. Also, notice that you need to run the `listunspent` command\
    \ to find out the \"amount\" the UTXO has. For this example, the amount is `0.1166341`,\
    \ and since you want to pay `0.00000200` for fees (200 satoshis), you will be\
    \ sending `0.1166321` in total.\n\nIf you don’t set the fee correctly, you may\
    \ end up spending too much on fees or getting an error message such as the following:\n\
    \n```\n-    min relay fee not met, 29  10000000 (code 256)\n```\n\nYou can use\
    \ the `echo` command to ensure your variable is set correctly. Then you can continue\
    \ and set your transaction’s data.\n\n```\n> rawtxhex=$(bitcoin-cli -named createrawtransaction\
    \ inputs=\"'[ { \"txid\": \"'$utxo_txid'\", \"vout\": '$utxo_vout' } ]\"' outputs=\"\
    '{ \"data\": \"'$op_return_data'\", \"'$recipient'\": 0.1166321}\"')\n```\n\n\
    Next, you need to sign and send the transaction.\n\n```\n> signedtx=$(bitcoin-cli\
    \ signrawtransactionwithwallet $rawtxhex | jq -r '.hex')\n> bitcoin-cli sendrawtransaction\
    \ $signedtx\n43a14c3b1ac446e4774c5338e5ae4e23839ab65a38c45da8b790f4449b090ae5\n\
    ```\n\nNow, you can track the `RawTransaction` object on the testnet Blockchain\
    \ Explorer ledger, as shown in Figure 4-18. Here’s the URL:  \n[`https://live.blockcypher.com/btc-testnet/tx/43a14c3b1ac446e4774c5338e5ae4e23839ab65a38c45da8b790f4449b090ae5/`](https://live.blockcypher.com/btc-testnet/tx/43a14c3b1ac446e4774c5338e5ae4e23839ab65a38c45da8b790f4449b090ae5/)\n\
    \n![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig18_HTML.jpg](images/475651_1_En_4_Chapter/475651_1_En_4_Fig18_HTML.jpg)\n\
    \n**Figure 4-18** Block Explorer testnet, transaction with data\n\nAs you can\
    \ see in Figure 4-18, you are getting the message \"Data Embedded in Transaction\
    \ with Unknown Protocol.\" If you were to design some software that uses this\
    \ method on a regular basis, you would want to include a keyword to identify your\
    \ data.\n\n### Bitcoin’s Colored Coins\n\nThe colored coins name stuck from Bitcoin\
    \ Core’s older implementations of the EPOBC protocol, where an asset is associated\
    \ with satoshis (thus \"coloring\"). Now you are able to achieve coloring with\
    \ the `OP_RETURN` param.\n\n`OP_RETURN` colored your coins and provided a new\
    \ capability for Bitcoin’s blockchain, as you were able to embed data that provided\
    \ proof of ownership. You can also set other conditions to happen at a specific\
    \ time or pass data related to the transaction you inserted into the blockchain.\
    \ `OP_RETURN` is powerful, and later in this book you will see how `OP_RETURN`\
    \ is utilized in production-grade projects to solve all sorts of issues."
  raw: '### Replaceable Transactions and Locktime


    When creating a `RawTransaction` with the `createrawtransaction` command you can
    includes two more variables you can utilize: `locktime` and `replaceable`.


    ```

    createrawtransaction [{"txid":"id","vout":n},...] [{"address":amount},{"data":"hex"},...]
    ( locktime ) ( replaceable )

    ```


    You can learn more about these arguments here:


    [`https://bitcoincore.org/en/doc/0.17.0/rpc/rawtransactions/createrawtransaction/`](https://bitcoincore.org/en/doc/0.17.0/rpc/rawtransactions/createrawtransaction/)


    As the name suggests, `replaceable` allows a raw transaction to be replaced by
    a new transaction with higher fees. This happens when the fee you set is too low,
    causing the transaction not to go through. For instance, if the fee you are trying
    to pay is too high, you can get the following error message:


    ```

    absurdly-high-fee, 11563419 > 10000000 (code 256)

    ```


    Bitcoin core supports the `locktime` argument in the raw transaction; this argument
    allows you to send transactions at some time in the future, and until they’re
    sent, the sender can cancel the transaction.


    There are two options. Block height is used for small numbers, and UNIX timestamps
    are used for big numbers. These arguments mean that the transaction is not inserted
    into the block until the conditions are met.


    ### Note


    Block height is the number of blocks in the chain between any specific block and
    the first chain block on the chain.


    ## Bitcoin Colored Coins


    Bitcoin transactions hold a property called `OP_RETURN`. This property can be
    used to hold up to 80 bytes of data, which can be used for passing data. This
    may not seem much, but it’s enough for proof of ownership or passing small pieces
    of data to authenticate. Utilizing the `OP_RETURN` property is done by setting
    data code word in the `vout` property of the transaction. To pass the data we
    want to include in your transaction, you still need to send funds for the transaction
    to be included in the blockchain, but you can set the recipient to be your own
    wallet in case you don’t want to pay someone. That way you get to store data in
    the Bitcoin persistence Blockchain and you only need to pay the transaction fee
    as you don’t pay anyone.


    ### Note


    `OP_RETURN` is the opcode script that defines the transaction as valid or invalid;
    it can be used to insert data into the transaction that will result in storing
    that data in the bitcoin blockchain. Keep in mind that there are different opinions
    about whether it’s okay to utilize this property. Some believe that storing noncurrency
    data in the blockchain is a bad idea; because there are less costly and more efficient
    ways to store data, it really depends on usage.


    ### Sending a Transaction with OP_RETURN


    Before you set your transaction, you will want to introduce a small lightweight
    utility program called `jq` to streamline creating a `RawTranaction` object. This
    is a command-line JSON processor that you can use to process your RPC JSON in
    the terminal. You can download it from [`https://stedolan.github.io/jq/download`](https://stedolan.github.io/jq/download)
    .


    Install it with Brew.


    ```

    > brew install jq

    ```


    The `jq` utility allows you to retrieve pieces of the returned JSON so you will
    be able to stream your transaction quicker and with fewer mistakes.


    Next, you can set some data to send via the `OP_RETURN` param. This example will
    create an MD5 for a file. In real life, this can be a version of a contract between
    parties or any piece of code you need.


    ### Note


    The Message-Digest 5 (MD5) algorithm is a function that generates a 128-bit hash
    value. It’s common to create a file that holds checksum files and that ensures
    the integrity of data because each file change would result in a new MD5 result.


    You can pick one of bitcoin’s core files such as `config.log` to generate an MD5
    hash and set the `op_return_data` variable.


    ```

    > md5 config.log

    MD5 (config.log) = 634ef85e038cea45bd20900fc97e09dc

    > op_return_data="634ef85e038cea45bd20900fc97e09dc"

    ```


    As you saw previously in this chapter, you can use the `listunspent` command to
    select your UTXO that you want to spend.


    ```

    > bitcoin-cli listunspent

    ```


    Now using the `jq` utility, you can stream the process, so you don’t need to do
    a copy and paste and can avoid errors.


    ```

    > utxo_txid=$(bitcoin-cli listunspent | jq -r ''.[0] | .txid'')

    > utxo_vout=$(bitcoin-cli listunspent | jq -r ''.[0] | .vout'')

    > recipient=$(bitcoin-cli getrawchangeaddress)

    ```


    Notice a few things here. You set the first JSON item [0] here, but you can set
    any item you want, such as [1] or [2]. Also, notice that you need to run the `listunspent`
    command to find out the “amount” the UTXO has. For this example, the amount is
    0.1166341, and since you want to pay 0.00000200 for fees (200 satoshis), you will
    be sending 0.1166321 in total.


    If you don’t set the fee correctly, you may end up spending too much on fees or
    getting an error message such as the following:


    ```

    -    min relay fee not met, 29  10000000 (code 256)

    ```


    You can use the `echo` command to ensure your variable is set correctly. Then
    you can continue and set your transaction’s data.


    ```

    > rawtxhex=$(bitcoin-cli -named createrawtransaction inputs="''[ { "txid": "''$utxo_txid''",
    "vout": ''$utxo_vout'' } ]"'' outputs="''{ "data": "''$op_return_data''", "''$recipient''":
    0.1166321}"'')

    ```


    Next, you need to sign and send the transaction.


    ```

    > signedtx=$(bitcoin-cli signrawtransactionwithwallet $rawtxhex | jq -r ''.hex'')

    > bitcoin-cli sendrawtransaction $signedtx

    43a14c3b1ac446e4774c5338e5ae4e23839ab65a38c45da8b790f4449b090ae5

    ```


    Now, you can track the `RawTransaction` object on the testnet Blockchain Explorer
    ledger, as shown in Figure [4-18](#475651_1_En_4_Chapter.xhtml#Fig18). Here’s
    the URL:


    [`https://live.blockcypher.com/btc-testnet/tx/43a14c3b1ac446e4774c5338e5ae4e23839ab65a38c45da8b790f4449b090ae5/`](https://live.blockcypher.com/btc-testnet/tx/43a14c3b1ac446e4774c5338e5ae4e23839ab65a38c45da8b790f4449b090ae5/)


    ![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig18_HTML.jpg](images/475651_1_En_4_Chapter/475651_1_En_4_Fig18_HTML.jpg)


    Figure 4-18


    Block Explorer testnet, transaction with data


    As you can see in Figure [4-18](#475651_1_En_4_Chapter.xhtml#Fig18), you are getting
    the message “Data Embedded in Transaction with Unknown Protocol.” If you were
    to design some software that uses this method on a regular basis, you would want
    to include a keyword to identify your data.


    ### Bitcoin’s Colored Coins


    The colored coins name stuck from bitcoin core’s older implementations of the
    EPOBC protocol where an asset is associated with satoshis (thus “coloring”). Now
    you are able to achieve coloring with the `OP_RETURN` param .


    `OP_RETURN` colored your coins and provided a new capability for bitcoin’s blockchain,
    as you were able to embed data that provided proof of ownership. You can also
    set other conditions to happen at a specific time or pass data related to the
    transaction you inserted into the blockchain. `OP_RETURN` is powerful, and later
    in this book you will see how `OP_RETURN` is utilized in production-grade projects
    to solve all sorts of issues.'
  trans: "\n### 可替换交易与锁定时间\n\n使用 `createrawtransaction` 命令创建 `RawTransaction` 时，可以包含两个可调用的附加变量：`locktime`\
    \ 和 `replaceable`。\n\n```\ncreaterawtransaction [{\"txid\":\"id\",\"vout\":n},...]\
    \ [{\"address\":amount},{\"data\":\"hex\"},...] ( locktime ) ( replaceable )\n\
    ```\n\n您可以通过以下链接详细了解这些参数：  \n[`https://bitcoincore.org/en/doc/0.17.0/rpc/rawtransactions/createrawtransaction/`](https://bitcoincore.org/en/doc/0.17.0/rpc/rawtransactions/createrawtransaction/)\n\
    \n顾名思义，`replaceable` 允许一笔原始交易被另一笔手续费更高的新交易替换。当您设置的手续费过低导致交易无法通过时，就会发生这种情况。例如，如果您试图支付的手续费过高，可能会收到以下错误信息：\n\
    \n```\nabsurdly-high-fee, 11563419 > 10000000 (code 256)\n```\n\nBitcoin Core\
    \ 在原始交易中支持 `locktime` 参数；该参数允许您在未来的某个时间发送交易，并且在交易发送前，发送方可以取消交易。\n\n有两种选项。小数值使用区块高度，大数值使用\
    \ UNIX 时间戳。这些参数意味着交易只有在条件满足时才会被插入区块。\n\n### 注意\n\n区块高度是指链上任意区块与创世区块之间的区块数量。\n\n\
    ## 比特币彩色币\n\n比特币交易拥有一个名为 `OP_RETURN` 的属性。该属性最多可容纳 80 字节的数据，可用于传递数据。这看似不多，但对于所有权证明或传递少量数据进行验证来说已经足够。利用\
    \ `OP_RETURN` 属性是通过在交易的 `vout` 属性中设置数据代码字来实现的。要传递您希望包含在交易中的数据，您仍然需要发送资金才能使交易被包含在区块链中，但如果您不想向他人付款，可以将收款方设置为自己的钱包。这样，您就能将数据存储在比特币持久化区块链中，并且由于不需要向任何人付款，只需支付交易手续费。\n\
    \n### 注意\n\n`OP_RETURN` 是定义交易有效或无效的操作码脚本；它可用于将数据插入交易，从而将该数据存储在比特币区块链中。请记住，关于是否可以利用该属性存在不同意见。有些人认为在区块链中存储非货币数据不是一个好主意，因为存在成本更低、效率更高的数据存储方式；这实际上取决于具体用途。\n\
    \n### 发送包含 OP_RETURN 的交易\n\n在设置交易之前，您需要引入一个名为 `jq` 的轻量级小型实用程序，以简化创建 `RawTransaction`\
    \ 对象的过程。这是一个命令行 JSON 处理器，您可以用它在终端中处理 RPC JSON。您可以从 [`https://stedolan.github.io/jq/download`](https://stedolan.github.io/jq/download)\
    \ 下载它。\n\n使用 Brew 安装。\n\n```\n> brew install jq\n```\n\n`jq` 实用程序允许您检索返回的 JSON\
    \ 片段，从而能够更快、更少出错地处理交易。\n\n接下来，您可以设置一些数据，通过 `OP_RETURN` 参数发送。此示例将为文件创建一个 MD5。在实际应用中，这可以是双方之间的合同版本，或者您需要的任何代码片段。\n\
    \n### 注意\n\n消息摘要算法 5（MD5）是一种生成 128 位哈希值的函数。通常，它会创建一个包含校验和的文件，以确保数据的完整性，因为每次文件更改都会产生新的\
    \ MD5 结果。\n\n您可以选择 Bitcoin Core 的某个核心文件，例如 `config.log`，来生成 MD5 哈希值并设置 `op_return_data`\
    \ 变量。\n\n```\n> md5 config.log\nMD5 (config.log) = 634ef85e038cea45bd20900fc97e09dc\n\
    > op_return_data=\"634ef85e038cea45bd20900fc97e09dc\"\n```\n\n正如您在本章前面所见，您可以使用\
    \ `listunspent` 命令选择要花费的 UTXO。\n\n```\n> bitcoin-cli listunspent\n```\n\n现在，使用\
    \ `jq` 实用程序，您可以流式处理该过程，这样就不需要进行复制粘贴，并能避免错误。\n\n```\n> utxo_txid=$(bitcoin-cli\
    \ listunspent | jq -r '.[0] | .txid')\n> utxo_vout=$(bitcoin-cli listunspent |\
    \ jq -r '.[0] | .vout')\n> recipient=$(bitcoin-cli getrawchangeaddress)\n```\n\
    \n请注意以下几点。这里设置了第一个 JSON 项 `[0]`，但您可以设置任何需要的项，例如 `[1]` 或 `[2]`。另外，请注意您需要运行 `listunspent`\
    \ 命令来查找 UTXO 的“金额”。在本例中，金额为 `0.1166341`，由于您希望支付 `0.00000200` 作为手续费（200 聪），您总共将发送\
    \ `0.1166321`。\n\n如果您没有正确设置手续费，最终可能会支付过高的手续费，或者收到如下错误信息：\n\n```\n-    min relay\
    \ fee not met, 29  10000000 (code 256)\n```\n\n您可以使用 `echo` 命令确保变量设置正确。然后，您可以继续设置您的交易数据。\n\
    \n```\n> rawtxhex=$(bitcoin-cli -named createrawtransaction inputs=\"'[ { \"txid\"\
    : \"'$utxo_txid'\", \"vout\": '$utxo_vout' } ]\"' outputs=\"'{ \"data\": \"'$op_return_data'\"\
    , \"'$recipient'\": 0.1166321}\"')\n```\n\n接下来，您需要签署并发送交易。\n\n```\n> signedtx=$(bitcoin-cli\
    \ signrawtransactionwithwallet $rawtxhex | jq -r '.hex')\n> bitcoin-cli sendrawtransaction\
    \ $signedtx\n43a14c3b1ac446e4774c5338e5ae4e23839ab65a38c45da8b790f4449b090ae5\n\
    ```\n\n现在，您可以在测试网区块链浏览器账本上跟踪 `RawTransaction` 对象，如图 4-18 所示。URL 如下：  \n[`https://live.blockcypher.com/btc-testnet/tx/43a14c3b1ac446e4774c5338e5ae4e23839ab65a38c45da8b790f4449b090ae5/`](https://live.blockcypher.com/btc-testnet/tx/43a14c3b1ac446e4774c5338e5ae4e23839ab65a38c45da8b790f4449b090ae5/)\n\
    \n![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig18_HTML.jpg](img/475651_1_En_4_Fig18_HTML.jpg)\n\
    \n**图 4-18** 测试网区块浏览器，包含数据的交易\n\n如图 4-18 所示，您会看到“交易中嵌入了未知协议的数据”这条消息。如果您要设计某种定期使用此方法的软件，您需要包含一个关键词来标识您的数据。\n\
    \n### 比特币的彩色币\n\n“彩色币”这个名称源于 Bitcoin Core 较早版本的 EPOBC 协议，在该协议中，资产与聪相关联（因此称为“着色”）。现在，您可以通过\
    \ `OP_RETURN` 参数实现着色。\n\n`OP_RETURN` 为您的币着色，并为比特币区块链提供了新功能，因为您能够嵌入提供所有权证明的数据。您还可以设置在特定时间触发的其他条件，或传递与您插入到区块链的交易相关的数据。`OP_RETURN`\
    \ 非常强大，在本书后面，您将看到 `OP_RETURN` 如何在生产级项目中用于解决各种问题。\n"
- fmt: '# Summary


    In this chapter, you dove deep into the bitcoin core RPC. You generated a legacy
    and SegWit bitcoin wallets, and you were able to retrieve the wallet’s private
    keys and better understand the Elliptic Curve Digital Signature Algorithm (ECDSA)
    and how the public and private keys are created.


    You spent the majority of this chapter looking into transactions; you sent coins
    with bitcoin’s daemon on testnet as well as utilizing bitcoin’s core wallet GUI
    to send coins. After coins were sent, you learned how to view your transactions
    in bitcoin’s Block Explorer. You continued by looking into `RawTransaction` and
    learned how to generate transactions with one output as well as more complex transactions
    with multiple signers via Electrum as well as the command line.


    Additionally, you learned other options such as replacing your transaction for
    a change of fee as well as setting the `locktime` variable. You learned the difference
    between P2PKH and P2SH-SEGWIT. Lastly, I covered how to pass data using the `OP_RETURN`
    params, which can be used for bitcoin colored coins or just to pass additional
    data utilizing bitcoin’s blockchain for more than spending coins. In the next
    chapter, you will take a closer look at Ethereum and how to write smart contracts.


    # 5. Ethereum Wallets and Smart Contracts


    In Chapter 1, I introduced Ethereum when I covered bitcoin, altcoins, and different
    consensus mechanisms. Specifically, I covered Ethereum’s PoW consensus and how
    utilizing Ethereum enables developers to create their own smart contracts and
    tokens. I mentioned that the Ethereum tokens can be generated as Ethereum requests
    for comment (ERCs) such as ERC-20, ERC-223, or ERC-777. In Chapter 3, you created
    your own blockchain, and I covered bitcoin wallets and transactions.


    In this chapter, I will be expanding on Ethereum in more detail. Ethereum allows
    you to create code (*smart contracts*) to handle funds utilizing blockchain technology
    to overcome downtime and third-party interference. The Ethereum platform is mostly
    credited to Vitalik Buterin and Gavin Wood. According to the Ethereum web site,
    the definition of Ethereum is as follows:


    > *“Ethereum is a decentralized platform that runs smart contracts: applications
    that run exactly as programmed without any possibility of downtime, censorship,
    fraud or third-party interference.”*

    >

    > —Ethereum.org


    In previous chapters, you were able to pass and store data such as the bitcoin
    colored coins use case with the `OP_RETURN` param. This is useful because you’re
    able to generate an MD5 hash of a file and store it on bitcoin’s network. The
    MD5 you stored could be of a document, a contract, or anything you want. However,
    as you saw, bitcoin is limited to only storing the information, and you were unable
    to interact with the data. Specifically, you are able to pass and store data on
    the network, but you are unable to run code against your file such as to perform
    operations against your data. Ethereum solves this lack of functionality by allowing
    you to create a smart contract utilizing the power of blockchain.


    ### Note


    Smart contracts are programmable code used to handle funds. The code runs on its
    own, absent of the need of third parties. Solidity is a popular Ethereum contact-oriented
    programming language and can be used to write smart contracts and deploy the code
    on multiple blockchains.


    At the heart of Ethereum is the Ethereum Virtual Machine (EVM). The EVM is where
    the smart contracts run in Ethereum. A good way to help you understand the EVM
    is to think about the EVM as a distributed global computer where the smart contracts
    can be executed.


    ### Note


    The EVM is a distributed global computer to run arbitrary, algorithmic, complex
    code. More simply, the EVM consists of all the nodes in the Ethereum network connected
    as a singular consensus and able to take a smart contract’s code, process it,
    and execute it. The EVM uses 256 bits as the fundamental consensus mechanism;
    it can handle a 1 TB block, and the standard block time is 15 seconds.


    Decentralized application developers write smart contracts and then run the code
    on the EVM with the help of front-end code. See Figure 5-1. The EVM executes the
    code in parallel connections on all the connected Ethereum nodes. This ensures
    the consensus of the nodes. The size of the Ethereum blockchain can be as big
    as 1 TB at the time of writing versus bitcoin’s block height, which is limited
    to 4 MB per block. Additionally, bitcoin takes about 10 minutes to create a new
    block versus 15 seconds on the EVM.


    Although it is advantageous for the decentralized code to run as a singular consensus,
    there are also drawbacks. For instance, the smart contract’s code is slower and
    more expensive than a traditional computer as it runs on all nodes.


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig1_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Ethereum 10,000-foot perspective. Photo credit: xbt.net.


    To run an Ethereum miner, you need to run a full-node EVM. The miners are running
    a PoW consensus mechanism to verify transactions just like bitcoin. During the
    mining process, five coins are mined on every block. Just as you saw with NEO
    in Chapter 1, the Ethereum miners get paid for running smart contracts with Ethereum
    coins, which get changed into what is called *gas*.


    ### Note


    Ethereum gas is a fraction of an Ethereum token. Ethereum gas is changed and used
    by the contract to pay the miner for their efforts. Think of a car. It needs gas
    to operate, and so does Ethereum. Absent Ethereum gas, you cannot execute the
    smart contract.


    Because Ethereum offers the ability to build interesting applications, the platform
    has been acknowledged for its potential and is utilized in one way or another
    by Microsoft, Intel, Amazon, J.P. Morgan, and even governments. This has turned
    Ethereum into an extensive ecosystem with many options to choose from to help
    you create your smart contracts easily. You can choose from a large number of
    development tools, apps communicating with other tools, best practices, infrastructure,
    testing, security, monitoring tools, and much more.


    It can be overwhelming and confusing to choose tools to use, especially when many
    of the tools are still in alpha, beta, or not fully tested. However, keep in mind
    that by now you are already equipped with a good fundamental understanding of
    blockchain technologies, including transactions, wallets, and how it all works.
    Additionally, the blockchain you developed in Chapter 3 was in JavaScript utilizing
    Node.js, which is fundamental for many Ethereum tools. There are two lists that
    I recommend you bookmark, listed here:


    *   [`https://github.com/ConsenSys/ethereum-developer-tools-list`](https://github.com/ConsenSys/ethereum-developer-tools-list)

    *   [`https://github.com/ConsenSys/ethereum-developer-tools-list/blob/master/EcosystemResources.md`](https://github.com/ConsenSys/ethereum-developer-tools-list/blob/master/EcosystemResources.md)


    These resources provide an extensive list of all the development tools and resources
    related to Ethereum. It’s beyond the scope of this book to cover all these different
    tools, but I recommend you review these tools at some point if you focus on Ethereum
    development so you can make your own determination about which tool fits your
    project best.


    In this chapter, I will be focusing on Ethereum smart contracts and running them
    on a testnet, just as you have done in the previous chapters for bitcoin. I will
    show how to set up your development tools and IDE and give you basic information
    for dapp mainnet deployment, which I will expand upon in later chapters in this
    book.'
