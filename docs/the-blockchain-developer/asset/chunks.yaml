- fmt: '# Bitcoin Core RPC Resources


    You learned how to interact with `bitcoin core` utilizing the `bitcoin` daemon
    and `bitcoin core` function as an HTTP JSON-RPC server, and you are now able to
    make calls and receive JSON responses. In this section, you will build on these
    skills to understand wallets and transactions.


    The first step is to initialize and run the `bitcoin` daemon.


    ```

    > bitcoind –printtoconsole

    ```


    Then in a different Terminal window, you can view the available RPC commands by
    running the `help` command.


    ```

    > bitcoin-cli help

    ```


    You can also request help on any command you run by adding `help` before the command.
    For instance, add `help` before the `getnewaddress` command like this:


    ```

    > bitcoin-cli help getnewaddress

    ```


    At the time of writing, the latest RPC version is `bitcoin core` version `v0.18.99.0-56376f336`
    (release build); as new versions of `bitcoin core` are released, the commands
    in this chapter may change, so it’s useful to check [`https://bitcoincore.org/en/doc/`](https://bitcoincore.org/en/doc/)
    for the latest RPC commands.


    Note that documentation for `v0.18` is not live at the time of writing; `v0.17`
    is the latest doc ([`https://bitcoincore.org/en/doc/0.17.0/`](https://bitcoincore.org/en/doc/0.17.0/)).
    In the menu on the right, select `RAWTRANSACTIONS` and `WALLET` for a list of
    RPC commands relevant to this chapter.


    ### Note


    In addition to `bitcoin core` documentation, there are two free web resources
    that can help you better understand the `bitcoin` RPC command line beyond what
    is covered in this chapter. They are [`https://github.com/ChristopherA/Learning-bitcoin-from-the-Command-Line`](https://github.com/ChristopherA/Learning-bitcoin-from-the-Command-Line)
    and [`http://learnmeabitcoin.com/guide/transactions`](http://learnmeabitcoin.com/guide/transactions).


    ## Bitcoin Wallet


    In Chapter [2](#475651_1_En_2_Chapter.xhtml), you queried a wallet’s available
    funds via the `getbalance` command, and you created a new `bitcoin` wallet utilizing
    the `getnewaddress` command.


    In Chapter [3](#475651_1_En_3_Chapter.xhtml), you created your very own blockchain
    wallet for your blockchain; you did so by creating a `wallet.js` file utilizing
    the `Elliptic Curve Cryptography Node.js` library and generating a private-public
    key combo that you then were able to expose using a CLI. In this section, I will
    expand on this knowledge by looking at bitcoin’s core and how wallets and transactions
    are generated.


    Bitcoin allows users to send and receive coins. A user can generate a wallet,
    which holds a public key, and the sender will send the coins to the receiver’s
    wallet’s public key address.


    Sending coins follows the same process but in reverse. The receiver provides the
    sender with a wallet’s public key address where they expect to be paid, and the
    sender sends coins to that public key address. The wallet address is the public
    key that was generated by the public/private key hashing algorithm. The receiver
    can generate a new public key every time the user expects payment. Users who don’t
    need to be anonymous can use just one public key for multiple transactions; however,
    bitcoin’s original vision encourages users to give a different public key for
    each transaction, as well as set many private keys that correspond with many public
    keys. The private keys are stored in a wallet, and each public key represents
    a wallet address.


    ### Create a Legacy Wallet Address and Retrieve Private Keys


    The most common bitcoin address and the type you generated in Chapter [2](#475651_1_En_2_Chapter.xhtml)
    is called a Pay to PubKey Hash (P2PKH) address. P2PKH is the public key, and the
    public key address gets hashed by an algorithm.


    Bitcoin also supports the P2SH-SEGWIT protocol, which I will discuss later in
    this chapter.


    ### Note


    Segregated Witness (SegWit) was an addition to `bitcoin core` code via a soft
    fork that increased bitcoin’s block size limit by removing the signature data
    that unlocks the transaction. When the unlocking code is removed, the additional
    space is used to include more transactions in the chain.


    To generate an address with P2SH-SEGWIT and P2PKH support, just run the following:


    ```

    > bitcoin-cli getnewaddress

    2N96AMUEX4VMNTApPAbUaA6wzP4V9QrbveK

    ```


    To generate the P2PKH address, you will be using the `legacy` flag.


    ```

    > bitcoin-cli getnewaddress "" legacy

    13oWKiVQ7C5Ewwjv6KRpP3Xm5YstzqFixT

    ```


    As you can see, the commands return the public keys. The wallet’s private keys
    can be viewed via dumping the keys into a file, as you did previously, or just
    by using the `dumpprivkey` command.


    ```

    > bitcoin-cli dumpprivkey "13oWKiVQ7C5Ewwjv6KRpP3Xm5YstzqFixT"

    L5gDpFvfEkUSFeMSQb92kueD1BuX4JeZLAhQkXoEtjcZMog3uXB4

    ```


    Private keys should not be shared with anyone, as they unlock the funds associated
    with the public address. With that said, I am sharing this one with you here as
    a learning example.


    ### Note


    Protect your private keys. If your private keys are lost, you lose your coins/funds.


    As you know, you are able to dump the private keys into a text file.


    ```

    > bitcoin-cli dumpwallet ~/mywallet.txt

    {

    "filename": "/Users/Eli/mywallet.txt"

    }

    ```


    Then, you can get the location of the wallet and can view your keys.


    ```

    > vim /Users/[location]/mywallet.txt

    ```


    The data file you saved contains not only the public and private keys but also
    transactions related to your wallet.


    Another useful RPC feature, as you might recall, is that you can query the `bitcoin`
    daemon for a specific wallet’s funds.


    ```

    > bitcoin-cli getbalance 1Mr2G632PfQuq4uJXRBNWLoRKH71Qwor51

    ```


    To get the available funds in your wallet, you just run the `getbalance` command,
    which returns a `0` balance because you have not deposited any funds yet.


    ```

    > bitcoin-cli getbalance

    0.00000000

    ```


    ### Pay to Witness a Public Key Hash (P2WPKH): SegWit Soft Fork


    Bitcoin (BTC) and bitcoin cash (BCH) have hard-forked mainly over a disagreement
    of the block size, meaning how much data can be included in each block. In 2017,
    `bitcoin core` code was hard-forked into `bitcoin cash` and allowed to increase
    the block’s size limit. In 2019, `bitcoin cash` forked once again because of a
    dispute over several new features for each fork.


    The block size limitation in bitcoin means transactions sometimes have to wait
    to be included in a block; however, because of the 1 MB limitation, they might
    not be included in the next block, causing slow transaction times when there too
    many transactions in the network, resulting in an increase of miner fees. To correct
    this, `bitcoin` open source developers created a soft fork and included Segregated
    Witness (SegWit). SegWit increased bitcoin’s block size limit by removing the
    signature data that unlocks the transaction. When the unlocking code is removed,
    the additional space can be used to include more transactions in the chain. This
    method increases the block size to 4 MB.'
  raw: '## Bitcoin Core RPC Resources


    You learned how to interact with bitcoin core utilizing the bitcoin daemon and
    bitcoin core function as an HTTP JSON-RPC server, and you are now able to make
    calls and receive JSON responses. In this section, you will build on these skills
    to understand wallets and transactions.


    The first step is to initialize and run the bitcoin daemon.


    ```

    > bitcoind –printtoconsole

    ```


    Then in a different Terminal window, you can view the available RPC commands by
    running the `help` command.


    ```

    > bitcoin-cli help

    ```


    You can also request help on any command you run by adding `help` before the command.
    For instance, add `help` before the `getnewaddress` command like this:


    ```

    > bitcoin-cli help getnewaddress

    ```


    At the time of writing, the latest RPC version is bitcoin core version v0.18.99.0-56376f336
    (release build); as new versions of bitcoin core are released, the commands in
    this chapter may change, so it’s useful to check [`https://bitcoincore.org/en/doc/`](https://bitcoincore.org/en/doc/)
    for the latest RPC commands.


    Note that documentation for v0.18 is not live at the time of writing; v0.17 is
    the latest doc ( [`https://bitcoincore.org/en/doc/0.17.0/`](https://bitcoincore.org/en/doc/0.17.0/)
    ). In the menu on the right, select RAWTRANSACTIONS and WALLET for a list of RPC
    commands relevant to this chapter.


    ### Note


    In addition to bitcoin core documentation, there are two free web resources that
    can help you better understand the bitcoin RPC command line beyond what is covered
    in this chapter. They are [`https://github.com/ChristopherA/Learning-bitcoin-from-the-Command-Line`](https://github.com/ChristopherA/Learning-bitcoin-from-the-Command-Line)
    and [`http://learnmeabitcoin.com/guide/transactions`](http://learnmeabitcoin.com/guide/transactions)
    .


    ## Bitcoin Wallet


    In Chapter [2](#475651_1_En_2_Chapter.xhtml), you queried a wallet’s available
    funds via the `getbalance` command, and you created a new bitcoin wallet utilizing
    the `getnewaddress` command.


    In Chapter [3](#475651_1_En_3_Chapter.xhtml), you created your very own blockchain
    wallet for your blockchain; you did so by creating a `wallet.js` file utilizing
    the Elliptic Curve Cryptography Node.js library and generating a private-public
    key combo that you then were able to expose using a CLI. In this section, I will
    expand on this knowledge by looking at bitcoin’s core and how wallets and transactions
    are generated.


    Bitcoin allows users to send and receive coins. A user can generate a wallet,
    which holds a public key, and the sender will send the coins to the receiver’s
    wallet’s public key address.


    Sending coins follows the same process but in reverse. The receiver provides the
    sender with a wallet’s public key address where they expect to be paid, and the
    sender sends coins to that public key address. The wallet address is the public
    key that was generated by the public/private key hashing algorithm. The receiver
    can generate a new public key every time the user expects payment. Users who don’t
    need to be anonymous can use just one public key for multiple transactions; however,
    bitcoin’s original vision encourages users to give a different public key for
    each transaction, as well as set many private keys that correspond with many public
    keys. The private keys are stored in a wallet, and each public key represents
    a wallet address.


    ### Create a Legacy Wallet Address and Retrieve Private Keys


    The most common bitcoin address and the type you generated in Chapter [2](#475651_1_En_2_Chapter.xhtml)
    is called a Pay to PubKey Hash (P2PKH) address. P2PKH is the public key, and the
    public key address gets hashed by an algorithm.


    Bitcoin also supports the P2SH-SEGWIT protocol, which I will discuss later in
    this chapter.


    ### Note


    Segregated Witness (SegWit) was an addition to bitcoin core code via a soft fork
    that increased bitcoin’s block size limit by removing the signature data that
    unlocks the transaction. When the unlocking code is removed, the additional space
    is used to include more transactions in the chain.


    To generate an address with P2SH-SEGWIT and P2PKH support, just run the following:


    ```

    > bitcoin-cli getnewaddress

    2N96AMUEX4VMNTApPAbUaA6wzP4V9QrbveK

    ```


    To generate the P2PKH address, you will be using the `legacy` flag.


    ```

    > bitcoin-cli getnewaddress "" legacy

    13oWKiVQ7C5Ewwjv6KRpP3Xm5YstzqFixT

    ```


    As you can see, the commands return the public keys. The wallet’s private keys
    can be viewed via dumping the keys into a file, as you did previously, or just
    by using the `dumpprivkey` command.


    ```

    > bitcoin-cli dumpprivkey "13oWKiVQ7C5Ewwjv6KRpP3Xm5YstzqFixT"

    L5gDpFvfEkUSFeMSQb92kueD1BuX4JeZLAhQkXoEtjcZMog3uXB4

    ```


    Private keys should not be shared with anyone, as they unlock the funds associated
    with the public address. With that said, I am sharing this one with you here as
    a learning example.


    ### Note


    Protect your private keys. If your private keys are lost, you lose your coins/funds.


    As you know, you are able to dump the private keys into a text file.


    ```

    > bitcoin-cli dumpwallet ~/mywallet.txt

    {

    "filename": "/Users/Eli/mywallet.txt"

    }

    ```


    Then, you can get the location of the wallet and can view your keys.


    ```

    > vim /Users/[location]/mywallet.txt

    ```


    The data file you saved contains not only the public and private keys but also
    transactions related to your wallet.


    Another useful RPC feature, as you might recall, is that you can query the bitcoin
    daemon for a specific wallet’s funds.


    ```

    > bitcoin-cli getbalance 1Mr2G632PfQuq4uJXRBNWLoRKH71Qwor51

    ```


    To get the available funds in your wallet, you just run the `getbalance` command,
    which returns a 0 balance because you have not deposited any funds yet.


    ```

    > bitcoin-cli getbalance

    0.00000000

    ```


    ### Pay to Witness a Public Key Hash (P2WPKH): SegWit Soft Fork


    Bitcoin (BTC) and bitcoin cash (BCH) have hard-forked mainly over a disagreement
    of the block size, meaning how much data can be included in each block . In 2017,
    bitcoin core code was hard-forked into bitcoin cash and allowed to increase the
    block’s size limit. In 2019, bitcoin cash forked once again because of a dispute
    over several new features for each fork.


    The block size limitation in bitcoin means transactions sometimes have to wait
    to be included in a block; however, because of the 1 MB limitation, they might
    not be included in the next block, causing slow transaction times when there too
    many transactions in the network, resulting in an increase of miner fees. To correct
    this, bitcoin open source developers created a soft fork and included Segregated
    Witness (SegWit). SegWit increased bitcoin’s block size limit by removing the
    signature data that unlocks the transaction. When the unlocking code is removed,
    the additional space can be used to include more transactions in the chain. This
    method increases the block size to 4 MB.'
  trans: '

    # Bitcoin Core RPC 资源


    你已经学会如何利用 `bitcoin` 守护进程与 `bitcoin core` 交互，`bitcoin core` 作为一个 HTTP JSON-RPC
    服务器，现在你可以发送调用并接收 JSON 响应。在本节中，你将基于这些技能深入理解钱包和交易。


    第一步是初始化并运行 `bitcoin` 守护进程。


    ```

    > bitcoind –printtoconsole

    ```


    然后在另一个终端窗口中，你可以通过运行 `help` 命令查看可用的 RPC 命令。


    ```

    > bitcoin-cli help

    ```


    你也可以通过在任意命令前添加 `help` 来请求该命令的帮助信息。例如，在 `getnewaddress` 命令前添加 `help`，如下所示：


    ```

    > bitcoin-cli help getnewaddress

    ```


    在撰写本文时，最新的 RPC 版本是 `bitcoin core` 版本 `v0.18.99.0-56376f336`（发布版）；随着 `bitcoin core`
    新版本的发布，本章中的命令可能会发生变化，因此建议查阅 [`https://bitcoincore.org/en/doc/`](https://bitcoincore.org/en/doc/)
    获取最新的 RPC 命令。


    请注意，`v0.18` 版本的文档在撰写本文时尚未上线；`v0.17` 是目前最新的文档（[`https://bitcoincore.org/en/doc/0.17.0/`](https://bitcoincore.org/en/doc/0.17.0/)）。在右侧菜单中，选择
    `RAWTRANSACTIONS` 和 `WALLET`，即可查看与本章相关的 RPC 命令列表。


    ### 注意


    除了 `bitcoin core` 文档外，还有两个免费的网页资源可以帮助你更好地理解本章未涵盖的 `bitcoin` RPC 命令行操作。它们是 [`https://github.com/ChristopherA/Learning-bitcoin-from-the-Command-Line`](https://github.com/ChristopherA/Learning-bitcoin-from-the-Command-Line)
    和 [`http://learnmeabitcoin.com/guide/transactions`](http://learnmeabitcoin.com/guide/transactions)。


    ## Bitcoin 钱包


    在第 2 章中，你通过 `getbalance` 命令查询了钱包的可用资金，并通过 `getnewaddress` 命令创建了一个新的 `bitcoin`
    钱包。


    在第 3 章中，你为自己的区块链创建了第一个区块链钱包；你通过利用 `Elliptic Curve Cryptography Node.js` 库创建了一个
    `wallet.js` 文件，并生成了一个公私钥组合，随后通过命令行界面将其导出。在本节中，我将通过分析比特币核心以及钱包和交易的生成方式，进一步扩展你的这些知识。


    Bitcoin 允许用户发送和接收币。用户可以生成一个包含公钥的钱包，发送者将币发送到接收者钱包的公钥地址。


    发送币的过程与此相同，只是方向相反。接收者向发送者提供一个期望收款的钱包公钥地址，发送者将币发送到该公钥地址。钱包地址是通过公私钥哈希算法生成的公钥。接收者可以在每次期望收款时生成一个新的公钥。无需匿名的用户可以对多笔交易使用同一个公钥；然而，bitcoin
    的原始愿景鼓励用户为每笔交易提供不同的公钥，并设置多个私钥以对应多个公钥。私钥存储在钱包中，每个公钥代表一个钱包地址。


    ### 创建传统钱包地址并检索私钥


    最常见的一种 bitcoin 地址，也是你在第 2 章中生成的那种类型，称为“支付到公钥哈希（P2PKH）”地址。P2PKH 是公钥，公钥地址会通过算法进行哈希处理。


    Bitcoin 也支持 P2SH-SEGWIT 协议，我将在本章后面讨论这一点。


    ### 注意


    隔离见证（SegWit）是通过一次软分叉对 `bitcoin core` 代码的补充，它通过移除解锁交易所需的签名数据，提高了比特币的区块大小限制。当解锁代码被移除后，多出的空间可用于在链上包含更多交易。


    要生成支持 P2SH-SEGWIT 和 P2PKH 的地址，只需运行以下命令：


    ```

    > bitcoin-cli getnewaddress

    2N96AMUEX4VMNTApPAbUaA6wzP4V9QrbveK

    ```


    要生成 P2PKH 地址，你需要使用 `legacy` 标志。


    ```

    > bitcoin-cli getnewaddress "" legacy

    13oWKiVQ7C5Ewwjv6KRpP3Xm5YstzqFixT

    ```


    如你所见，这些命令返回了公钥。钱包的私钥可以通过将密钥转储到文件来查看，就像你之前做的那样，或者直接使用 `dumpprivkey` 命令。


    ```

    > bitcoin-cli dumpprivkey "13oWKiVQ7C5Ewwjv6KRpP3Xm5YstzqFixT"

    L5gDpFvfEkUSFeMSQb92kueD1BuX4JeZLAhQkXoEtjcZMog3uXB4

    ```


    私钥不应与任何人分享，因为它们可以解锁与公钥地址关联的资金。话虽如此，我在此与你分享这个私钥仅作为学习示例。


    ### 注意


    保护你的私钥。如果私钥丢失，你将失去你的币/资金。


    如你所知，你可以将私钥转储到一个文本文件中。


    ```

    > bitcoin-cli dumpwallet ~/mywallet.txt

    {

    "filename": "/Users/Eli/mywallet.txt"

    }

    ```


    然后，你可以获取钱包的位置并查看你的密钥。


    ```

    > vim /Users/[location]/mywallet.txt

    ```


    你保存的数据文件不仅包含公钥和私钥，还包含与你的钱包相关的交易。


    你可能还记得，另一个有用的 RPC 功能是，你可以向 `bitcoin` 守护进程查询特定钱包的资金。


    ```

    > bitcoin-cli getbalance 1Mr2G632PfQuq4uJXRBNWLoRKH71Qwor51

    ```


    要获取你钱包中的可用资金，只需运行 `getbalance` 命令，该命令会返回 `0` 余额，因为你还没有存入任何资金。


    ```

    > bitcoin-cli getbalance

    0.00000000

    ```


    ### 支付到见证公钥哈希（P2WPKH）：SegWit 软分叉


    比特币（BTC）和比特币现金（BCH）曾因区块大小的分歧（即每个区块可以包含多少数据）而硬分叉。2017 年，`bitcoin core` 代码硬分叉为 `bitcoin
    cash`，并允许增加区块大小限制。2019 年，`bitcoin cash` 再次分叉，原因是对于每次分叉的若干新特性存在争议。


    比特币的区块大小限制意味着交易有时必须等待才能被包含在区块中；然而，由于 1 MB 的限制，它们可能无法被包含在下一个区块中，当网络中有太多交易时，会导致交易确认时间变慢，进而导致矿工费用增加。为了解决这个问题，`bitcoin`
    开源开发者创建了一次软分叉，并引入了隔离见证（SegWit）。SegWit 通过移除解锁交易所需的签名数据，增加了比特币的区块大小限制。当解锁代码被移除后，多出的空间可用于在链上包含更多交易。这种方法将区块大小增加到了
    4 MB。

