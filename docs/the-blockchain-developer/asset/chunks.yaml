  trans: "\n# Hyperledger\n\n## Hyperledger 框架\n\n- **Hyperledger Iroha**：此框架专为移动应用设计；其代码基于\
    \ `Hyperledger Fabric`。\n\n- **Hyperledger Grid**：这是一个基于分布式账本的供应链解决方案。该框架封装了数据类型、模型和智能合约的\
    \ `Hyperledger` 实现，并展示了构建供应链业务解决方案的实用方法。\n\n- **Hyperledger Sawtooth（由英特尔贡献）**：此框架包含动态共识机制，支持在运行中的网络上热切换共识算法。这是一种更传统的区块链架构。\n\
    \n- **Hyperledger 工具**：\n    - **Hyperledger Caliper**：这是一个区块链基准测试工具。\n\n- **Hyperledger\
    \ Cello**：这是一个按需提供的区块链模块工具包，用于创建、管理和终止区块链。\n\n- **Hyperledger Composer**：此工具具有协作功能，可与\
    \ `Hyperledger Fabric` 配合使用，为面向企业的链码和区块链应用构建区块链。\n\n- **Hyperledger Explorer**：这是一个用于查看、调用、部署以及查询区块、交易和网络数据的模块。\n\
    \n- **Hyperledger URSA**：这是一个共享的密码学库；其中包含多个共享项目，例如若干不同签名方案（基础密码库）的实现，以及 Z-mix（零知识证明）（`https://github.com/hyperledger-labs/z-mix`）。\n\
    \n- **Hyperledger Quilt/Interledger.js**：这是一个跨账本协议（ILP），意指账本间的原子交换。该支付协议支持跨分布式和非分布式账本转移资产（价值）。它有两种实现方式：Java\
    \ 版本称为 `Quilt`，JavaScript 版本称为 `Interledger.js`。\n\n可以构建一个 `Hyperledger` 项目，使得交易既透明又能在需要时保密。例如，设想以下业务需求：一家航空公司想向另一家企业（比如\
    \ Expedia）出售座位。该航空公司的业务需求是创建自己的区块链来跟踪库存、创建交易、设定价格并保持数据机密。航空公司可以从区块链中获益，但它不需要加密货币，也不想公开分享所有数据。该航空公司可以利用\
    \ `Hyperledger` 设置一个私有许可网络，而无需像在公有账本上那样将数据暴露给全世界。\n\n然后，航空公司可以通过签发访问受限的加密密钥来设置特定身份的特殊权限，并将这些密钥仅提供给特定参与方。例如，只有一家组织（比如\
    \ Expedia）能够查看与 Expedia 相关的交易、座位定价和航班信息；而其他身份（如实际客户）只能查看与其账户和航班信息相关的预订信息。\n\n\
    财务团队可以持有提供更多数据的加密密钥，例如利润与亏损、燃油成本以及其他内部所需的数据。这对企业来说是有益的，因为他们可以在账本上运行数据，而不是在更容易受到黑客攻击的中心化数据库上运行数据。\n\
    \n如您所见，`Hyperledger` 是一个庞大的项目，涵盖了六个框架以及五个工具。在一章中涵盖所有这些内容是不切实际的；事实上，它完全可以写成一本完整的书。在本章中，我将为您提供一个良好的基础，帮助您理解\
    \ `Hyperledger` 的基本概念，然后您可以自行继续尝试其他平台和工具。本章将重点介绍 `Hyperledger Fabric`，因为它是最流行的\
    \ `Hyperledger` 平台。\n\n# 理解 Hyperledger Fabric\n\n正如我之前指出的，`Hyperledger Fabric`\
    \ 是一个开源框架实现，旨在用于私有且基于许可的业务网络。\n\n在本章中，您将创建私有网络许可身份，然后创建一个链码来实现特定的业务逻辑。\n\n`Hyperledger\
    \ Fabric` 被设计为 `Hyperledger` 的基础，然后您可以使用 `Hyperledger` 的模块化架构，根据您的业务需求添加特定模块。一个\
    \ `Hyperledger Fabric` 网络由以下组件组成：\n\n- **资产（Assets）**：资产是代表价值的键值对。价值可以是任何东西，例如文档、股票或加密货币代币。每个资产都持有状态和所有权。\n\
    \n- **共享账本（Shared ledger）**：共享账本持有自己的一份账本副本，其中包含资产的状态。该账本被称为*世界状态*。共享账本还持有区块链的副本，该副本通过记录交易历史来存储资产的所有权。\n\
    \n- **智能合约（链码）**：`Hyperledger Fabric` 将智能合约称为*链码*，可以用 `Go`（`GoLang`）或 `JavaScript`（`Node.js`）进行编程。链码可以与共享账本、资产和交易进行交互。这里没有什么新东西；您在其他区块链中已经看到过。链码包含业务逻辑，并且可以设置背书策略。\n"
- fmt: '## Note


    在 Hyperledger Fabric 中，用户可以定义链码执行的资产背书策略。背书策略设置所需同意的节点对等体，以决定一个接受的事务是否有效，并将其添加到共享账本中。


    - **成员服务提供者（`MSP`）**：`MSP` 是管理数字证书的证书颁发机构；它管理用户 ID 并认证网络上的所有参与者。所有成员必须是已知身份才能在
    Fabric 上进行交易。这是因为网络是私有的，且基于权限。`MSP` 用于认证和验证这些成员的身份和权限。`MSP` 使用一个名为 `cryptogen`
    的证书生成工具。要更好地理解 `MSP`，请访问此处文档：[`https://hyperledger-fabric.readthedocs.io/en/latest/msp.html`](https://hyperledger-fabric.readthedocs.io/en/latest/msp.html)。


    - **对等节点（`Peer nodes`）**：Hyperledger Fabric 网络构建于由网络成员拥有和贡献的对等节点之上。节点可以是组织或个人。节点持有共享账本，并且可以执行链码。节点可以访问账本数据；它们可以背书事务并与应用程序交互。节点可以拥有背书对等体的权限或背书者的角色。对等节点接收排序后的账本状态更新作为所接收区块的一部分，以维护账本或
    Hyperledger 所称的“世界状态”（world state）。


    - **通道（`Channel`）**：通道可由一组对等节点创建。一组节点可以创建一个单独的事务账本。通道类似于你在第 [3] 章创建自己的区块链时所建立的
    P2P 通道。


    - **组织（`Organizations`）**：每个对等节点贡献资源，共同形成集体网络。拥有者组织可以通过 `MSP` 使用数字证书分配对等节点。此外，来自不同组织的对等节点可以加入同一个通道。拥有独立对等节点的组织能够共享相同的
    `MSP`。最佳实践是为每个组织设置一个 `MSP`。


    - **排序服务（`Ordering service`）**：该服务将事务打包成区块。然后，区块可以广播给共享 P2P 通道上的对等节点和客户端。该通道以相同的逻辑顺序向所有对等节点输出相同的消息。一致的逻辑顺序被称为“原子交付”（atomic
    delivery）。


    请查看图 [8-1]，该图是构成 Hyperledger Fabric 各组件的图示。


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig1_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig1_HTML.jpg)


    图 8-1


    Hyperledger Fabric 图形化解释。图片来源：developer.ibm.com。


    让我们使用图 [8-1] 中鸟瞰式的图形化概述来走一遍 Fabric 网络。Hyperledger Fabric 网络充当客户端应用程序的后端层。


    客户端应用程序可以是任何东西，例如 DApp、门户、业务活动或网站；这些类型的应用程序是前端层，它们可以通过编程 Hyperledger Fabric SDK
    或 REST Web 服务来访问链码、事务和事件。客户端调用链码节点，该节点使用 SDK 与网络交互。与迄今为止介绍的传统区块链不同，Fabric 的特殊之处在于并非所有对等节点都具有相同权限。


    同样与传统区块链不同的是，Hyperledger Fabric 不允许未知身份在网络上进行交易。组织（称为“成员”）构建 Hyperledger Fabric
    网络，每个成员可以通过 `MSP` 设置其节点对等体。你可以在图 [8-1] 中看到，示例中有 `ORG1 MSP` 和 `ORG2 MSP`。


    对等节点可以在网络中设置不同的规则：背书对等体、锚点对等体和排序对等体。


    - **背书对等体（`Endorser peer`）**：它接收请求以验证事务并执行链码。背书者可以批准或不批准该事务。只有背书节点执行链码，因此无需在所有对等节点上安装链码。


    - **锚点对等体（`Anchor peer`）**：这些对等体接收消息，并向组织中的其他对等体发送消息。P2P 网络由不同的通道组成，这些通道可以设置权限，因此不会对网络上的所有人可见。


    - **排序对等体（`Orderer peer`）**：该对等体处理共享账本，并负责维护整个网络的状态。排序对等体生成区块并广播给所有对等体。排序对等体可以设置为
    `Solo` 或 `Kafka` 模式。


    - **`Solo`**：用于开发，存在单点故障。你将在本章中为开发环境设置此模式。


    - **`Kafka`**：用于生产环境。Kafka 构建时具有容错特性。


    你将创建链码并将其部署到 `Solo` 对等体上的 Fabric 网络，然后你将能够访问并运行函数。要发送事务，你的客户端应用程序可以连接到 SDK 并创建一个事务。然后该事务被发送给进行背书的
    `Solo` 对等体，该对等体验证签名并发送背书签名。背书签名被发送到排序服务。在生产环境中，排序服务随后会将事务发送给所有网络连接的节点，这些节点更新其账本上的世界状态。


    我鼓励你访问 Hyperledger 页面以了解更多信息并阅读白皮书：[`https://www.hyperledger.org/projects/fabric`](https://www.hyperledger.org/projects/fabric)。


    ## 安装 Hyperledger Fabric 和 Composer


    开始使用 Hyperledger 网络的一个好方法是安装 Hyperledger Fabric 和 Composer。你将通过安装所有工具和库以及 Hyperledger
    Fabric 和 Composer 来搭建环境；然后，通过启动和停止 Hyperledger Fabric 并检查 Composer 的库是否安装正确，来验证安装是否成功。


    ### 前提条件


    Hyperledger Fabric 和 Hyperledger Composer 依赖许多工具和库，并且由于每个用户使用不同的机器，这个过程可能不会快速和简单，并且可能会限制
    Hyperledger 的适应性。我已将此过程分解为以下步骤：


    1. 验证已安装的前提条件。

    2. 更新 Git。

    3. 安装 Node Version Manager。

    4. 更新 Node.js。

    5. 安装 VSCode。

    6. 安装 Hyperledger Composer 扩展。

    7. 安装 Hyperledger Composer 基本 CLI 工具。

    8. 安装 Hyperledger Fabric。


    建议你访问 Hyperledger Fabric 前提条件页面，因为版本和要求可能已更改：[`https://hyperledger.github.io/composer/v0.19/installing/installing-prereqs.html`](https://hyperledger.github.io/composer/v0.19/installing/installing-prereqs.html)。


    在开始之前，建议你更新并升级 Brew（如果你有一段时间没有这样做的话）。


    ```

    > brew update && brew upgrade

    ```'
  raw: '### Note


    In Hyperledger Fabric, users can define an asset endorsement policy for the execution
    of a chaincode. The endorsement policies set the node peers that are needed in
    order to agree on an accepted transaction to be valid and added to the shared
    ledger.


    *   *Membership services provider (MSP)* *:* The MSP is the certificate authority
    that manages the digital certificate; it manages user IDs and authenticates all
    participants on the network. All members must be known identities in order to
    transact on Fabric. That’s because the network is private and based on permissions.
    The MSP is used to authenticate and validate these members’ identities and permissions.
    The MSP uses a certificate generation tool called *cryptogen* . To understand
    MSP better, visit the documentation here: [`https://hyperledger-fabric.readthedocs.io/en/latest/msp.html`](https://hyperledger-fabric.readthedocs.io/en/latest/msp.html)
    .


    *   *Peer nodes*: The Hyperledger Fabric network is built on peer nodes that are
    owned and contributed by members of the network. A node can be an organization
    or an individual. Nodes hold shared ledgers and can execute chaincode. Nodes can
    access ledger data; they can endorse transactions and interface with applications.
    Nodes can have permission to endorse peers or role for endorsers. Peer nodes receive
    ordered ledger state updates as part of the blocks they receive in order to maintain
    the ledger, or what Hyperledger calls *world state*.


    *   *Channel*: Channels can be created by a collection of peer nodes. A group
    of nodes can create a separate ledger of transactions. A channel is similar to
    the P2P channel you created when you formed your own blockchain in Chapter [3](#475651_1_En_3_Chapter.xhtml).


    *   *Organizations*: Each peer node contributes resources, and together they form
    the collective network. The owning organization can assign peer nodes using a
    digital certificate through the MSP. Additionally, peer nodes from different organizations
    can join a channel. Organizations with separate peer nodes are able to share the
    same MSPs. Best practice is to have one MSP for each organization.


    *   *Ordering service:* This service packages transactions into blocks. Blocks
    can then be broadcast to peer nodes and clients on the shared P2P channel. The
    channel outputs the same messages with the same logical order to all peer nodes.
    A consistent logical order is called *atomic delivery*.


    Take a look at Figure [8-1](#475651_1_En_8_Chapter.xhtml#Fig1), which is a graphical
    representation of the components that make up Hyperledger Fabric.


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig1_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Hyperledger Fabric graphical explanation. Photo credit: developer.ibm.com.


    Let’s walk through the Fabric network using the 10,000-foot graphical overview
    in Figure [8-1](#475651_1_En_8_Chapter.xhtml#Fig1). The Hyperledger Fabric network
    acts as the back-end layer for client applications.


    A client application can be anything such as a dapp, portal, business activity,
    or web site; these types of applications are the front-end layer, and they can
    access chaincodes, transactions, and events through coding the Hyperledger Fabric
    SDK or a REST web service. The client calls a chaincode node, which uses the SDK
    to interact with the network. Unlike the traditional blockchains covered so far,
    Fabric is different because not all peer nodes have the same permissions.


    Also unlike traditional blockchains, Hyperledger Fabric does not allow unknown
    identities to transact on the network. Organizations, which are called *members*,
    build the Hyperledger Fabric network, and each member can set up their node peers
    through the MSP. You can see in Figure [8-1](#475651_1_En_8_Chapter.xhtml#Fig1)
    that the example has ORG1 MSP and ORG 2 MSP.


    Peer nodes can be set up with different rules in the network: endorser peer, anchor
    peer, and orderer peer.


    *   *Endorser peer* *:* This receives a request to validate the transaction and
    execute chaincode. The endorser can approve or disapprove the transaction. Only
    the endorsing peer executes chaincode, so there’s no need to install chaincode
    on all peer nodes.


    *   *Anchor peer* *:* These peers receive messages and send messages to other
    peers in the organization. The P2P network is made up of the different channels
    that can be set up with permissions so they are not visible to everyone on the
    network.


    *   *Orderer peer* *:* This peer handles the shared ledger and is responsible
    for keeping state across the network. The orderer peer generates blocks and broadcasts
    to all peers. The orderer peer can be set as Solo or Kafka.


    *Solo:* This is used for development with a single point of failure. That’s what
    you’ll set for your development environment in this chapter.


    *Kafka:* This is used for production. Kafka is built with fault-tolerant features.


    You’ll create chaincode and deploy it to the Fabric network on a Solo peer, and
    then you will be able to access and run functions. To send a transaction, your
    client application can connect to the SDK and create a transaction. The transaction
    is then sent to the endorsing Solo peer, which verifies the signature and sends
    an endorsement signature. The endorsement signature is sent out to the ordering
    service. In production, the ordering service will then send the transactions to
    all network-connected peers, which update their world state on their ledger.


    I encourage you to visit the Hyperledger page to learn more and read the white
    papers: [`https://www.hyperledger.org/projects/fabric`](https://www.hyperledger.org/projects/fabric)
    .


    ## Installing Hyperledger Fabric and Composer


    A good place to start with a Hyperledger network is to install Hyperledger Fabric
    and Composer. You will be setting up the environment by installing all the tools
    and libraries as well as Hyperledger Fabric and Composer; then you will verify
    installation went well by starting and stopping Hyperledger Fabric and checking
    that Composer’s libraries installed correctly.


    ### Prerequisites


    Hyperledger Fabric and Hyperledger Composer rely on many tools and libraries,
    and because each user uses a different machine, it is possible that this process
    won’t be quick and easy and will probably limit the adaptation of the Hyperledger.
    I have broken the process down to these steps:


    1.  Verify the already installed prerequisites.


    2.  Update Git.


    3.  Install Node Version Manager.


    4.  Update Node.js.


    5.  Install VSCode.


    6.  Install Hyperledger Composer Extension.


    7.  Install the Hyperledger Composer Essential CLI tools.


    8.  Install Hyperledger Fabric.


    It’s recommended that you visit the Hyperledger Fabric prerequisites page as the
    versions and requirements may have changed: [`https://hyperledger.github.io/composer/v0.19/installing/installing-prereqs.html`](https://hyperledger.github.io/composer/v0.19/installing/installing-prereqs.html)
    .


    Before getting started, it’s recommended that you update and upgrade Brew if you
    haven’t done so for a while.


    ```

    > brew update && brew upgrade

    ```'
  trans: '

    ## Note


    在 Hyperledger Fabric 中，用户可以定义链码执行的资产背书策略。背书策略设置所需同意的节点对等体，以决定一个接受的事务是否有效，并将其添加到共享账本中。


    - **成员服务提供者（`MSP`）**：`MSP` 是管理数字证书的证书颁发机构；它管理用户 ID 并认证网络上的所有参与者。所有成员必须是已知身份才能在
    Fabric 上进行交易。这是因为网络是私有的，且基于权限。`MSP` 用于认证和验证这些成员的身份和权限。`MSP` 使用一个名为 `cryptogen`
    的证书生成工具。要更好地理解 `MSP`，请访问此处文档：[`https://hyperledger-fabric.readthedocs.io/en/latest/msp.html`](https://hyperledger-fabric.readthedocs.io/en/latest/msp.html)。


    - **对等节点（`Peer nodes`）**：Hyperledger Fabric 网络构建于由网络成员拥有和贡献的对等节点之上。节点可以是组织或个人。节点持有共享账本，并且可以执行链码。节点可以访问账本数据；它们可以背书事务并与应用程序交互。节点可以拥有背书对等体的权限或背书者的角色。对等节点接收排序后的账本状态更新作为所接收区块的一部分，以维护账本或
    Hyperledger 所称的“世界状态”（world state）。


    - **通道（`Channel`）**：通道可由一组对等节点创建。一组节点可以创建一个单独的事务账本。通道类似于你在第 [3] 章创建自己的区块链时所建立的
    P2P 通道。


    - **组织（`Organizations`）**：每个对等节点贡献资源，共同形成集体网络。拥有者组织可以通过 `MSP` 使用数字证书分配对等节点。此外，来自不同组织的对等节点可以加入同一个通道。拥有独立对等节点的组织能够共享相同的
    `MSP`。最佳实践是为每个组织设置一个 `MSP`。


    - **排序服务（`Ordering service`）**：该服务将事务打包成区块。然后，区块可以广播给共享 P2P 通道上的对等节点和客户端。该通道以相同的逻辑顺序向所有对等节点输出相同的消息。一致的逻辑顺序被称为“原子交付”（atomic
    delivery）。


    请查看图 [8-1]，该图是构成 Hyperledger Fabric 各组件的图示。


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig1_HTML.jpg](img/475651_1_En_8_Fig1_HTML.jpg)


    图 8-1


    Hyperledger Fabric 图形化解释。图片来源：developer.ibm.com。


    让我们使用图 [8-1] 中鸟瞰式的图形化概述来走一遍 Fabric 网络。Hyperledger Fabric 网络充当客户端应用程序的后端层。


    客户端应用程序可以是任何东西，例如 DApp、门户、业务活动或网站；这些类型的应用程序是前端层，它们可以通过编程 Hyperledger Fabric SDK
    或 REST Web 服务来访问链码、事务和事件。客户端调用链码节点，该节点使用 SDK 与网络交互。与迄今为止介绍的传统区块链不同，Fabric 的特殊之处在于并非所有对等节点都具有相同权限。


    同样与传统区块链不同的是，Hyperledger Fabric 不允许未知身份在网络上进行交易。组织（称为“成员”）构建 Hyperledger Fabric
    网络，每个成员可以通过 `MSP` 设置其节点对等体。你可以在图 [8-1] 中看到，示例中有 `ORG1 MSP` 和 `ORG2 MSP`。


    对等节点可以在网络中设置不同的规则：背书对等体、锚点对等体和排序对等体。


    - **背书对等体（`Endorser peer`）**：它接收请求以验证事务并执行链码。背书者可以批准或不批准该事务。只有背书节点执行链码，因此无需在所有对等节点上安装链码。


    - **锚点对等体（`Anchor peer`）**：这些对等体接收消息，并向组织中的其他对等体发送消息。P2P 网络由不同的通道组成，这些通道可以设置权限，因此不会对网络上的所有人可见。


    - **排序对等体（`Orderer peer`）**：该对等体处理共享账本，并负责维护整个网络的状态。排序对等体生成区块并广播给所有对等体。排序对等体可以设置为
    `Solo` 或 `Kafka` 模式。


    - **`Solo`**：用于开发，存在单点故障。你将在本章中为开发环境设置此模式。


    - **`Kafka`**：用于生产环境。Kafka 构建时具有容错特性。


    你将创建链码并将其部署到 `Solo` 对等体上的 Fabric 网络，然后你将能够访问并运行函数。要发送事务，你的客户端应用程序可以连接到 SDK 并创建一个事务。然后该事务被发送给进行背书的
    `Solo` 对等体，该对等体验证签名并发送背书签名。背书签名被发送到排序服务。在生产环境中，排序服务随后会将事务发送给所有网络连接的节点，这些节点更新其账本上的世界状态。


    我鼓励你访问 Hyperledger 页面以了解更多信息并阅读白皮书：[`https://www.hyperledger.org/projects/fabric`](https://www.hyperledger.org/projects/fabric)。


    ## 安装 Hyperledger Fabric 和 Composer


    开始使用 Hyperledger 网络的一个好方法是安装 Hyperledger Fabric 和 Composer。你将通过安装所有工具和库以及 Hyperledger
    Fabric 和 Composer 来搭建环境；然后，通过启动和停止 Hyperledger Fabric 并检查 Composer 的库是否安装正确，来验证安装是否成功。


    ### 前提条件


    Hyperledger Fabric 和 Hyperledger Composer 依赖许多工具和库，并且由于每个用户使用不同的机器，这个过程可能不会快速和简单，并且可能会限制
    Hyperledger 的适应性。我已将此过程分解为以下步骤：


    1. 验证已安装的前提条件。

    2. 更新 Git。

    3. 安装 Node Version Manager。

    4. 更新 Node.js。

    5. 安装 VSCode。

    6. 安装 Hyperledger Composer 扩展。

    7. 安装 Hyperledger Composer 基本 CLI 工具。

    8. 安装 Hyperledger Fabric。


    建议你访问 Hyperledger Fabric 前提条件页面，因为版本和要求可能已更改：[`https://hyperledger.github.io/composer/v0.19/installing/installing-prereqs.html`](https://hyperledger.github.io/composer/v0.19/installing/installing-prereqs.html)。


    在开始之前，建议你更新并升级 Brew（如果你有一段时间没有这样做的话）。


    ```

    > brew update && brew upgrade

    ```

    '
- fmt: '#### Verifying the Already Installed Prerequisites


    There is a long list of prerequisites for installing Hyperledger Fabric; however,
    if you have been following along with this book’s chapters, most of the prerequisites
    should already be installed on your computer.


    For the operating system (OS), Fabric needs at least macOS 10.12. You can check
    your version via the top-left menu on your computer. Click the Apple icon, and
    click About This Mac. The Overview tab opens and shows the macOS version. If you
    are running an older version, then get the 10.12 update by clicking the software
    Update button. At the time of writing, macOS is called Mojave at version 10.14.4.


    You also need Xcode and Docker. These were already installed in previous chapters,
    but you need to confirm they are installed and are the correct versions. Just
    run the `xcode-select --version` command to ensure Xcode is running. You can compare
    your results with mine, shown here:


    ```

    > xcode-select -v

    xcode-select version 2354.

    > docker --version

    Docker version 19.03.0-beta3, build c55e026

    ```


    You need Docker-Compose version 1.8 or higher.


    ```

    > docker-compose --version

    docker-compose version 1.24.0, build 0aa59064

    ```


    You need `npm` version v5.x or higher.


    ```

    > npm --version

    6.8.0

    ```


    You need Python 2.7.x or higher.


    ```

    > python --version

    Python 2.7.10

    ```


    #### Updating Git


    The installation is requesting Git 2.2.x or higher. However, Mac comes with an
    older version of Git; you can check your version with this:


    ```

    > git --version

    git version 2.20.1 (Apple Git-117)

    ```


    To upgrade Git, you will be installing Git via Brew and set your machine to use
    the Git version in Brew instead of the one that comes with Mac. First, install
    Git via Brew.


    ```

    > brew install git

    ```


    Next, you will set your path to point to the new Git location; use vim or your
    favorite text editor.


    ```

    > vim ~/.bash_profile

    ```


    Add the following to the `PATH`:


    ```

    #git point to brew

    PATH=/usr/local/bin:$PATH

    ```


    Don’t forget to run `.bash_profile` after you save and quit the bash profile file
    to ensure the changes take effect.


    ```

    > . ~/.bash_profile

    ```


    Lastly, you can verify the version of Git.


    ```

    > git --version

    ```


    You are now pointing to the location of Git you installed with Brew, and for a
    future upgrade of Git, you can just run the following:


    ```

    > brew upgrade git

    git version 2.21.0

    ```


    #### Installing Node Version Manager (nvm)


    Node Version Manager (`nvm`) is needed. To download or update `nvm`, check the
    GitHub page at [https://github.com/creationix/nvm/blob/master/README.md](https://github.com/creationix/nvm/blob/master/README.md)
    and run this command:


    ```

    > curl -o- https://raw.githubusercontent.com/creationix/nvm/v0.33.0/install.sh
    | bash

    ```


    Once the installation is completed, you can confirm it’s installed correctly.
    Open a new terminal, and type the following. I have version 0.34.0 installed.


    ```

    > nvm --version

    0.34.0

    ```


    #### Updating Node.js


    Node needs to be version 8. To check what you are running, run this command:


    ```

    > node --version

    ```


    At the time of writing, the prerequisites `hyperledger.github.io` page stated
    that you should install the latest (long-term support) version of Node; however,
    it has been generating fatal errors and has a recorded bug on GitHub. Node.js
    version 9 is not supported either at the time of writing.


    To get Hyperledger Composer to work, you will be installing node 8 and pointing
    `nvm` to use node 8.


    ```

    > nvm install 8

    > npm config delete prefix

    > nvm use 8

    ```


    You can confirm node 8 is installed and set correctly.


    ```

    > node --version

    v8.15.0

    ```


    ### Installing VSCode with Hyperledger Composer Extension


    It’s recommended that you install Visual Studio Code (VSCode) with the Hyperledger
    Composer extension and use it as your code editor. The extension will provide
    code highlighting and is a professional free IDE. To get started, download VSCode
    from here: [https://code.visualstudio.com](https://code.visualstudio.com). Click
    Download for Mac, as shown in Figure [8-2](#475651_1_En_8_Chapter.xhtml#Fig2).


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig2_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Visual Studio Code installation page


    Once installation is complete, launch VSCode.


    To install the Hyperledger Composer extension, click VSCode’s left menu, select
    Extensions (two square icons) from the left menu bar, and type **Hyperledger Composer**
    in the search box. Select: Hyperledger Composer. Then click Install. Lastly, Reload
    to activate it. See Figure [8-3](#475651_1_En_8_Chapter.xhtml#Fig3).


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig3_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    VSCode Hyperledger Composer extension


    #### Hyperledger Composer Essential CLI Tools


    You will be installing the Hyperledger Composer Essential CLI tools including
    `composer-rest-server`, Composer Playground, and the Yeoman generator.


    To install the Composer CLI, run the following command.


    ```

    > npm install -g composer-cli @0.19

    ```


    ### Note


    I am using version 0.19. There are some open bugs with Hyperledger’s latest version,
    0.20.6, in connection with all the tools and libraries, so I am using a previous
    version of Hyperledger Composer and Hyperledger Fabric. This may change, so you
    may want to check the documentation and install another version. Also, I assembled
    many potential bugs you may run into during installing and running Hyperledger
    Composer and Fabric; see the “Error Troubleshooting” section later in this chapter.


    Next, install the Yeoman tool for generating Hyperledger Composer applications,
    which utilizes `generator-hyperledger-composer`. Execute the following command:


    ```

    > npm install -g generator-hyperledger-composer@0.19

    ```


    You can now install Composer Playground globally with `npm`.


    ```

    > npm install -g composer-playground@0.19

    ```


    Part of Composer is a tool called `composer-rest-server` that generates a loopback-based
    REST interface to be able to access the network you will create. To install the
    tool, execute this command:


    ```

    > npm install -g composer-rest-server@0.19

    > npm install -g Yeoman

    ```


    You can verify that the installation went well by running the `--version` flag.


    ```

    > composer --version

    v0.19.20

    > composer-rest-server --version

    v0.15.2

    > composer-playground --version

    0.20.6

    ```


    To ensure the generator tool was installed, if you run the `Yeoman` command, it
    should list Hyperledger Composer generator.


    ```

    > Yeoman

    ```


    It will output the following:


    ```

    ? ''Allo! What would you like to do? (Use arrow keys)

    Run a generator

    ◻ Hyperledger Composer

    ```


    Press Control+C to get out of the `Yeoman` command.'
