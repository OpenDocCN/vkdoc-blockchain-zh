- fmt: '### Installing Composer Playground with Docker


    In addition to installing Composer tools globally with `npm`, you can run Hyperledger
    Composer Playground with Docker; just run the container and assign `composer-playground`
    as the name. You will be running it on port 8080.


    ```

    docker run --name composer-playground --publish 8080:8080 hyperledger/composer-playground

    ```


    The Docker command downloads the image, and you can see the output in Figure [8-4](#475651_1_En_8_Chapter.xhtml#Fig4).


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig4_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig4_HTML.jpg)


    *Figure 8-4. Composer-playground docker container output*


    To cancel the container, press `Control+C`.


    Now to run Playground in the browser on port 8080, open a new Terminal window
    by pressing `Command+T` and run the `open` command.


    ```

    open http://localhost:8080

    ```


    You can see the Hyperledger Composer Playground welcome page, as shown in Figure
    [8-5](#475651_1_En_8_Chapter.xhtml#Fig5).


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig5_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig5_HTML.jpg)


    *Figure 8-5. Playground welcome screen*


    Keep in mind that to stop Docker, you can run the `stop` command.


    ```

    docker stop composer-playground

    ```


    To remove the `composer-playground` name so you can use it again, you will need
    to run the following command:


    ```

    docker rm --force composer-playground

    ```


    ### Installing Hyperledger Fabric Dev Servers


    At the time of writing, Hyperledger Fabric’s latest version is v1.4.1; you should
    visit the GitHub page to find out the latest version and documentation as this
    may change; see [https://github.com/hyperledger/fabric](https://github.com/hyperledger/fabric).


    The Hyperledger Fabric dev servers have different versions to choose from. You
    will be setting up a Hyperledger Fabric v1.2 network for your development. You
    then can deploy your blockchain business networks built with Hyperledger Composer
    and test your applications.


    Create a directory to download Fabric; I picked `~/fabric-dev-servers`, but you
    can choose any directory.


    ```

    mkdir ~/fabric-dev-servers && cd ~/fabric-dev-servers

    ```


    You’ll use `curl` to get the `.tar.gz` file you need to install Hyperledger Fabric,
    as shown here:


    ```

    curl -O https://raw.githubusercontent.com/hyperledger/composer-tools/master/packages/fabric-dev-servers/fabric-dev-servers.tar.gz

    ```


    Use `tar` to extract the files you downloaded.


    ```

    tar xzf fabric-dev-servers.tar.gz

    ```


    Once these are extracted, you have script files to help you quickly spin up a
    Hyperledger Fabric instance. Run the `ls` command, and you can see the `.sh` files
    among other useful files.


    ```

    ls

    startFabric.sh

    teardownAllDocker.sh

    stopFabric.sh

    teardownFabric.sh

    ```


    When you run the Composer `–v` command, you can check the version you are running.
    You saw that you indeed installed Hyperledger Composer v0.19, so you will need
    to use Hyperledger Fabric v1.1 according to the documentation, and you can also
    set the starting Fabric timeout to 30 seconds; that’s the wait time once you run
    the script to ensure the network is running.


    ```

    export FABRIC_VERSION=hlfv11

    export FABRIC_START_TIMEOUT=30

    ```


    ### Tip


    If you are running a different version of Hyperledger Composer, check the GitHub
    page to see which version of Fabric you need to set: [https://github.com/hyperledger/composer-tools/tree/master/packages/fabric-dev-servers](https://github.com/hyperledger/composer-tools/tree/master/packages/fabric-dev-servers).


    To spin up your Hyperledger Fabric network, you need to first execute the download
    Fabric script; this can take some time, depending on your Internet connection.


    ```

    ./downloadFabric.sh

    ```


    That’s it; you should see the output shown in Figure [8-6](#475651_1_En_8_Chapter.xhtml#Fig6).


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig6_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig6_HTML.jpg)


    *Figure 8-6. Downloading the Hyperledger Fabric output*


    Once the download is complete, you can confirm you have Docker containers.


    ```

    docker image ls hyperledger/*

    hyperledger/fabric-ca

    hyperledger/fabric-orderer

    hyperledger/fabric-peer

    hyperledger/fabric-ccenv

    hyperledger/fabric-couchdb

    ```


    ### Network Connection Profile


    There is a network connection profile JSON file called `DevServer_connection.json`.
    In this section, you will modify the file to fit with the Docker localhost container
    you will create. Before you modify the file, it’s a good idea to make a copy first.


    ```

    cd ~/fabric-tools/

    cp DevServer_connection.json DevServer_connection-backup.json

    ```


    Change the original file’s orderers, peers, and certificate authorities to point
    to localhost as you will be running Composer Rest Server as the Docker container
    in the network and will access these hostnames on the network. Edit the `DevServer_connection`
    file with `vim` or your favorite editor.


    ```

    vim DevServer_connection.json

    ```


    See Figure [8-7](#475651_1_En_8_Chapter.xhtml#Fig7).


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig7_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig7_HTML.jpg)


    *Figure 8-7. Changing devServer.json to point to localhost*


    You also need to edit the hosts to point to 127.0.0.1 on the local server.


    ```

    sudo vim /etc/hosts

    # fabric

    127.0.0.1 orderer.example.com peer0.org1.example.com ca.org1.example.com

    ```


    ### Spinning Off a Local Hyperledger Fabric Business Network


    The first time you run Hyperledger Fabric, you need to execute commands to start
    a local Hyperledger Fabric instance and issue an ID card for the admin. The default
    admin is called `PeerAdmin`. To get started, run the `start fabric` command.


    ```

    ./startFabric.sh

    ```


    The expected output is confirming your variables.


    ```

    Development only script for Hyperledger Fabric control

    Running ''startFabric.sh''

    FABRIC_VERSION is set to [version number]

    ...

    Creating network "composer_default" with the default driver

    Creating ca.org1.example.com

    Creating orderer.example.com

    ```


    As part of the start script, you can see the output lines that confirm that the
    `composer_default` Docker network was created and running the containers in the
    created network. The containers are able to communicate using the custom hostnames:
    `ca.org1.example.com` and `orderer.example.com`.


    ### Creating an Admin ID Card


    Now that you have a network running, the last setup step is to create credentials.
    You can use Hyperledger Composer to create what Hyperledger Fabric calls a `.card`
    file. You can generate the admin ID card by executing the following command:


    ```

    ./createPeerAdminCard.sh

    ```


    You can compare your output with mine, which is shown in Figure [8-8](#475651_1_En_8_Chapter.xhtml#Fig8).


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig8_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig8_HTML.jpg)


    *Figure 8-8. Hyperledger Composer generate card*


    To confirm the card was created correctly, execute the following command with
    `<card name>`:


    ```

    composer card list --card PeerAdmin@hlfv1

    ```


    This command outputs information about the ID card. See Figure [8-9](#475651_1_En_8_Chapter.xhtml#Fig9).


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig9_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig9_HTML.jpg)


    *Figure 8-9. Hyperledger Composer card list*


    ### Stopping Hyperledger Fabric


    Leave Fabric running for now, but once you complete your exercises, you can shut
    down the Hyperledger Fabric runtime by executing the `stop` command.


    ```

    ./stopFabric.sh

    ```


    Also, you should execute the `teardown` script at the completion of your development
    cycle to ensure the memory is freed.


    ```

    ./teardownFabric.sh

    ```


    ### Note


    If you run the `teardown` script, the next time you start the runtime, you’ll
    need to create a new PeerAdmin card just like you did with the first-time startup
    steps. See the following steps.'
