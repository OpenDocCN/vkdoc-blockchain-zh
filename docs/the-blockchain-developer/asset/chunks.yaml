- fmt: 'As you have seen, to create a transaction, you generate a signature from the
    wallet’s public hash and the private key hash. The transaction output script takes
    the public key and the signature and checks to see whether you have a match to
    the public key hash. If results are true, you are able to spend the coins; otherwise,
    you can’t.


    ### Note

    A public key visible in the transaction is a type of transaction called Pay to
    Pubkey (`P2PK`). A hidden public key as you have been using is a type of transaction
    called Pay to PubKey Hash (`P2PKH`).


    You will sign your transaction via `P2PKH` to match your wallet’s type. There
    are two ways to sign the transaction; you can use `signrawtransactionwithkey`
    or `signrawtransactionwithwallet`.


    These two signed methods are available in `0.18.0 RPC`, including inputs for raw
    transactions in a serialized hex-encoded format.


    The `signrawtransactionwithwallet` command format is as follows:

    ```

    signrawtransactionwithwallet "hexstring" ( [{"txid":"id","vout":n,"scriptPubKey":"hex","redeemScript":"hex"},...]
    sighashtype )

    ```


    Notice that the `signrawtransactionwithwallet` command allows you to include a
    second argument called `prevtxs`. `prevtxs` is formatted as an array that includes
    the previous transaction outputs. If you decide to utilize and insert value for
    `prevtxs` the transaction will depends on the previous transaction that may not
    even be in the blockchain yet. In case you don’t need this feature just set `prevtxs`
    to null.


    The `signrawtransactionwithkey` command format is as follows:

    ```

    signrawtransactionwithkey "hexstring" ["privatekey1",...]

    ```


    Notice that the second argument is a base58-encoded array of private keys that
    will be the only keys used to sign the transaction. The third optional argument
    is an array of previous transaction outputs that this transaction depends on but
    may not yet be in the blockchain.


    In our case, you will not include the second argument because your transaction
    does not need to depend on other conditions.


    ```

    > bitcoin-cli signrawtransactionwithwallet $rawtxhex

    {

    "hex": "",

    "complete": true

    }

    ```


    The previous command returned signed, hex-encoded data in the JSON response. Use
    that data to set the hex for the `signedtx` variable.


    ```

    > signedtx="0200000000010138451f62a8800b09a94504ae0ff20d7729e71ba5a8a9f483d80ba9739b1ce95000000000171

    60014c27b4e6bd8eb821ee80a239e0edd59070f57233dffffffff0140420f00000000001976a9149f9a7abd600c0caa0398

    3a77c8c3df8e062cb2fa88ac0247304402205cc4b04859e34aa6b1e924745f33a7643fbe45fcd6e900fdaa29281feae3f8f6

    022059d4083a3cf81c3bb82267931660afb8ffc4bae87ede8dfa11efcb6af6a14ac90121028926735fcd5bf6580e6f669c24

    0da8975dddf23a6d4015e4e0bc1ca3f1d2b7f100000000"

    ```


    That’s it; you can now send your transaction via the `sendrawtransaction` command.


    ```

    > bitcoin-cli sendrawtransaction $signedtx

    ff75dbb08da6f4dc6463dd32d8f9b1a4781e1eeee338e93e82820d0fdfbd43ff

    ```


    The output gets you a `txid` response that you can check in the Blockchain Explorer
    as you did before. You can also verify that the funds were removed from your account
    via the `getbalance` command.


    ```

    > bitcoin-cli getbalance

    0.09413028

    ```


    As well as `listunspent` command.


    ```

    > bitcoin-cli listunspent

    [

    {

    "txid": "be05d068d1245f1c60ea4229c00eb5e96f2a5c5527f1deb7c6de5e1e20a4b4db",

