- fmt: '## Healthcare


    There are many specific pain points in the healthcare industry that blockchain
    can help solve. For instance, just as with high-end brands, drug counterfeiting
    is a major problem in the pharmaceutical industry as 10 percent to 30 percent
    of all the drugs sold in developing countries are counterfeit. These counterfeits
    amount to a loss to healthcare companies of billions of dollars. Most of the counterfeit
    drugs are manufactured in either India or China. Additionally, many of the counterfeit
    drugs contain the wrong ingredients or wrong dose, putting patients’ health at
    risk.


    Private blockchains controlled by a pharmaceutical company can register drugs
    and ensure that fake drugs get discovered as they won’t be registered on their
    ledger.


    According to Bisresearch, the blockchain market is expected to grow and reach
    more than $5 billion by 2025: [`https://bisresearch.com/industry-report/global-blockchain-in-healthcare-market-2025.html`](https://bisresearch.com/industry-report/global-blockchain-in-healthcare-market-2025.html).


    > *“A global blockchain in the healthcare market is expected grow at a CAGR of
    63.85% from 2018 to 2025, to reach a value of $5.61 billion by 2025. The use of
    blockchain for healthcare data exchange will contribute the largest market share
    throughout the forecast period, reaching a value of $1.89 billion by 2025, owing
    to the use of blockchain to solve the most widespread problem in healthcare information
    systems related to interoperability and nonstandardization that has created data
    silos in the industry.”*

    >

    > —Bisresearch


    In addition, the healthcare industry can utilize blockchain to benefit from storing
    all kinds of important information about drugs as well as analyzing and processing
    information better.


    - **Identifying patients**: Organizations such as CHIME and HIMSS have been pushing
    to create patient identity cards for almost two decades. The creation of a unique
    patient identifier can be easily solved with blockchain and ensure there are no
    mismatched patient electronic health records (EHRs), which leads to errors in
    patient care.


    - **Tracing drugs**: As I mentioned, counterfeits can hold the wrong ingredients
    and cause harm to patients. Internet sales of counterfeit drugs account for $75
    billion of the total market. Blockchain can be utilized to register all the authentic
    drugs’ serial numbers.


    - **Tracking drug results**: Blockchain can make it possible create a public ledger
    of patients to report the results of a specific drug. The system can validate
    that the user actually purchased the drug and the patient’s condition. Using this
    data can provide valuable information to the pharmaceutical company or any related
    entity.


    Here are some case studies:


    - **Ambrosus** ([https://ambrosus.com/#mission](https://ambrosus.com/%2523mission)):
    This blockchain system is aimed at following the chain of custody of clinical
    trials and pharmaceuticals. Food and pharmaceutical enterprises can use the platform
    to optimize supply chain visibility and QA.


    - **ConnectingCare** ([https://www.simplyvitalhealth.com/](https://www.simplyvitalhealth.com/)):
    Here, patients and providers can share health data. It allows all kinds of unique
    applications, from calculating costs to the patient’s ability to control their
    privacy to even allowing users to sell their data for research.


    - **FarmaTrust** ([https://www.farmatrust.com](https://www.farmatrust.com)): This
    is aimed at stopping counterfeit drugs with the usage of blockchain as a ledger.


    - **Hashed Health** ([https://hashedhealth.com](https://hashedhealth.com)): This
    is aimed at solving credential problem by making data more transparent and easily
    accessible. The platform has a professional credentials exchange, where members
    can verify the credentials of and track records of various health professionals.
    This can expedite the hiring process and provide an unalterable history of a professional’s
    healthcare career history.


    - **MedicalChain** ([https://medicalchain.com/en/](https://medicalchain.com/en/)):
    This enables patient–doctor interactions through the usage of blockchain. The
    project is funded through MedTokens. Patients have full access and control over
    their own personal health data and can grant doctors access to their health record
    via their mobile devices, while data is secure on the blockchain or via wristbands
    on patients, which medical professionals can scan to access a person’s medical
    history if they are unconscious.


    - **MedRec** ([https://medrec.media.mit.edu/](https://medrec.media.mit.edu/)):
    This provides EHRs on the blockchain via an Ethereum smart contract.


    - **MTBC** ([https://www.mtbc.com](https://www.mtbc.com)): This is a large player
    aimed at improving EHR with the usage of blockchain. A patient will have the ability
    to allow the transfer of records from one doctor to another. The blockchain API
    runs on the Hyperledger platform.


    - **Phros** ([https://phros.io/#home](https://phros.io/%2523home)): This was released
    by Taipei Medical University Hospital and Digital Treasury Corporation (DTCO)
    to share health data while ensuring data privacy. The goal is to place all of
    a patient’s medical information on the blockchain.


    - **U.S. Department of Defense, U.S. Defense Logistics Agency**: These organizations
    are experimenting with a blockchain-based system that would allow data to be added
    and tracked through a blockchain ledger, providing a live feed of multiple agencies’
    relief efforts in order to help save lives and reduce costs. See [`https://www.dla.mil/AboutDLA/News/NewsArticleView/Article/1720207/troop-support-event-poses-question-how-and-where-can-blockchain-help/`](https://www.dla.mil/AboutDLA/News/NewsArticleView/Article/1720207/troop-support-event-poses-question-how-and-where-can-blockchain-help/).


    ## Gaming


    Games can benefit from blockchain by utilizing a blockchain ledger to store information
    as well as implement hybrid games that use a crypto marketplace for NFT transactions
    to purchase game-related items. This usage of blockchain is already in motion.
    Sony is utilizing blockchain to record who owns what on the PlayStation Network.
    Fortnite creator Epic Games has partnered with a blockchain firm, Microsoft is
    using blockchain to handle Xbox Live royalty payments to developers, and many
    other companies are experimenting with blockchain usage. Additionally, there is
    a Blockchain Game Alliance (BGA), which includes companies such as Ubisoft, ConsenSys,
    Everdreamsoft, and Enjin. The goal of BGA is to combine blockchain and gaming
    to develop solutions and develop standards and best practices.


    Here are case studies:


    - **Beyond the Void** ([https://beyond-the-void.net/](https://beyond-the-void.net/)):
    This is a game that utilizes Ethereum’s blockchain to allow players to buy, sell,
    and trade “cosmetic in-game items” using NFT transactions.'
