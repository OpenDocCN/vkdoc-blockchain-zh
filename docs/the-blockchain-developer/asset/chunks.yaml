- fmt: "攻击者会在管理员登录时显示一条消息，威胁称如果不支付比特币赎金或感染其他设备，矿机将因过热而损毁。这可以通过关闭风扇来实现，如图[11-4](#475651_1_En_11_Chapter.xhtml#Fig4)所示。截至目前，仅有`Antminer`和`Avalon`制造的比特币和莱特币矿机受到影响，但这种攻击理论上可以对任何矿机实施。\n\
    \n![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig4_HTML.jpg](images/475651_1_En_11_Chapter/475651_1_En_11_Fig4_HTML.jpg)\n\
    \n**图 11-4**  \n`hAnt`勒索软件消息。  \n图片来源：`sensorstechforum.com`。\n\n## 事后分析\n\n清除勒索软件并非易事。该软件可能内置了一个“触发陷阱”（`tripwire`）脚本，一旦矿机断开互联网连接，就会损坏矿机。要解决此问题，首先需要从矿机的安全数字（SD）卡中精确移除勒索软件。此外，矿场长时间离线会造成巨大损失。\n\
    \n最佳方法是完全避免此类攻击，即只从官方供应商网站下载固件升级，不信任任何其他来源。\n\n## 对等网络的日蚀攻击\n\n信息型日蚀攻击（`Eclipse\
    \ Attack`）可以单独实施，也可作为51%攻击等其他攻击的一部分。攻击者通过操控网络，使节点仅与恶意节点通信，从而控制对等网络中某个节点对信息的访问权。随后，攻击者可以操纵挖矿过程和共识机制。\n\
    \n### 事后分析\n\n运行分析、模拟和实验，以寻找抵御日蚀攻击的应对措施。关于提高比特币安全性的优秀研究及应对日蚀攻击的潜在对策（同样适用于许多其他区块链网络），可参见以下链接：[`https://hackernoon.com/eclipse-attacks-on-blockchains-peer-to-peer-network-26a62f85f11`](https://hackernoon.com/eclipse-attacks-on-blockchains-peer-to-peer-network-26a62f85f11)。\n\
    \n## 路由攻击\n\n互联网路由攻击包括`BGP`劫持，以及针对互联网服务提供商（`ISP`）的恶意攻击，这些攻击同样可以针对区块链实施。\n\n> **注意**\
    \  \n> `BGP`劫持是一种恶意重定向互联网流量的攻击手段。通过虚假声明拥有某一组IP地址（IP前缀）的所有权来实现。\n\n大型矿场集中在少数几个地理位置，这使得它们成为针对`ISP`类型攻击的理想目标。攻击者可以实施以下攻击：\n\
    \n*   **分区攻击（`Partition Attack`）**：`ISP`可以通过劫持少量IP前缀来分割P2P网络。\n*   **延迟攻击（`Delay\
    \ Attack`）**：`ISP`延迟发往或来自区块链节点的流量，导致区块传播延迟，从而减慢交易速度。\n\n这些攻击类型不仅可能降低节点收益，还可能因网络中影响力节点减少而演变为50%攻击。此外，这些攻击还能阻止交易所等大型实体发送交易。\n\
    \n### 事后分析\n\n创建自定义脚本或安装硬件来监控网络。许多`ISP`提供付费的网络安全监控和攻击防御解决方案。有关更多有助于缓解此类攻击的解决方案，请参阅“DoS和DDoS攻击”事后分析章节。\n\
    \n## 平台攻击\n\n比特币的区块链网络在设计上是安全的，并且已被证明是可靠的。比特币于2009年发布，截至撰写本文时，其区块链网络尚未遭受过成功的攻击。\n\
    \n比特币区块链具有高安全性的原因在于数据分布在各个节点之间。此外，挖矿需要消耗大量能源，因此攻击比特币网络的成本可能高于挖矿本身，攻击者可能冒着损失资金的风险去尝试攻击。然而，这并不是唯一原因；比特币能够经受住时间考验的一个重要因素是它是开源的，这使得开发者能够根据安全专家的研究和建议快速实施变更。\n\
    \n尽管如此，这并不能保证其他平台的安全，这些平台提供建立在安全区块链之上的服务，例如交易所、借贷平台、钱包服务以及存储私钥的`dapp`。\n\n例如，交易所持有数十亿美元的存款，成为黑客的完美目标。如前所述，交易所以私钥的形式存储用户的加密货币，其中一些密钥保存在热钱包中，以实现实时提现和交易。未能妥善处理这些私钥可能导致损失。\n\
    \n`Mt. Gox` 2011年的安全漏洞就是一个很好的例子。这次攻击的发生是因为黑客破解了一名`Mt. Gox`审计员的密码，并成功将80万个比特币转移到自己的账户。除了`Mt.\
    \ Gox`，关于交易所因加密货币丢失而关闭的新闻也层出不穷。\n\n如图[11-5](#475651_1_En_11_Chapter.xhtml#Fig5)所示，最大的一笔损失接近10亿美元，来自`Mt.\
    \ Gox`的两次攻击；而加密货币历史上最大的盗窃案则是由2018年对`Coincheck`交易所网络的攻击造成的。\n\n![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig5_HTML.jpg](images/475651_1_En_11_Chapter/475651_1_En_11_Fig5_HTML.jpg)\n\
    \n**图 11-5**  \n最大的交易所`BTC`损失情况\n\n在下一节中，我将回顾一些最大的攻击事件，并就如何预防这些攻击提出建议。\n\n## 凭证攻击\n\
    \n与身份验证相关的攻击（例如密码破解）造成了数百万美元的损失。\n\n*   **对交易所的直接攻击**：如前所述，`Mt. Gox`在2011年的51%攻击造成了两次独立的损失：2,609\
    \ BTC和超过750,000 BTC。黑客成功获取了审计员的凭证，并将这些比特币转移到了黑客的地址。\n*   **对用户的攻击**：因接管用户账户而造成的损失高达数百万美元。例如，电话公司仅凭简单的账单信息就允许接管手机号码。黑客可以将号码转至新的运营商，然后利用短信验证批准重置交易所账户的密码。\n\
    \n### 事后分析\n\n作为用户，避免这些损失的最佳方式是将您的加密资产存储在冷钱包中，而不是中心化交易所。\n\n在您自己的计算机上：\n\n*  \
    \ **SSL**：不要在未安装`SSL`证书的网站上注册。\n*   **强密码**：使用长度较长、包含数字、字母和特殊字符的唯一且强密码。\n*   **唯一密码**：不要在不同平台上重复使用相同的密码。\n\
    *   **多层安全**：设置所有推荐的安全层，例如短信验证、启用双重身份验证（`2FA`）、电子邮件确认等。\n*   **杀毒软件**：安装付费或免费的病毒扫描软件。在个人电脑上，`Avast`安全软件拥有免费版本，被4.35亿人使用：[`https://www.avast.com`](https://www.avast.com)。它包含一个`Chrome`浏览器插件，可以警告钓鱼网站。\n\
    *   **VPN**：尽可能使用`VPN`连接，尤其是在公共且不安全的网络上。"
