- fmt: "# Smart Contracts and Dapps\n\nAs you have seen, smart contracts are the programming\
    \ of the cloud; they allow you to code against a blockchain. Smart contracts are\
    \ created to be legally binding, programmable, digital documents. Just like traditional\
    \ agreements, smart contracts create a set of rules to which two or more parties\
    \ agree.\n\nWhen the contractual obligations are met, funds can be automatically\
    \ released, eliminating the need for a third party to be involved in the arrangement.\
    \ Utilizing smart contracts for legal concerns can potentially become a better\
    \ alternative to paper as they are stable, honest, and less prone to human errors.\
    \ Using a smart contract, the middleman is not needed (middlemen can be attorneys,\
    \ escrow agents, notaries, bankers, loan officers, and so on).\n\nIn this book,\
    \ you created smart contracts on multiple blockchain platforms. Using these smart\
    \ contracts, you were able to create a dapp’s front-end interface to utilize the\
    \ smart contract and publish the dapp.\n\nIn fact, companies are using smart contracts\
    \ to automate many services. For instance, Slock.it created payments for renting\
    \ usable devices; these devices can be any object such as bikes, cars, or even\
    \ toolboxes. Similarly, Fizzy (`https://fizzy.axa/`) tracks flight delays and\
    \ automatically refunds passengers when flights are delayed. These services are\
    \ done automatically; you don’t need to stand in lines or be passed along by phone\
    \ representatives from one department to another. Additionally, these refunds\
    \ can occur automatically. These contracts are saving the user and the businesses\
    \ time, effort, and money. Additionally, customer service is improved, and as\
    \ these services are automated, this can reduce the number of employees you need.\n\
    \nTo summarize, in this section, I covered what’s readily available from a business\
    \ point of view that you can implement utilizing blockchain technology. I covered\
    \ what you can do with coins beyond crypto, including using tokens to represent\
    \ any value, using the blockchain ledger as a decentralized database, and writing\
    \ code in the cloud utilizing smart contracts and dapps. By combining these elements,\
    \ you get expedited services that are more reliable and cut out the middleman.\n\
    \n# Decentralization of Industries and Verticals\n\nIn this section, I will show\
    \ you examples from a few industries and how blockchain is utilized or can be\
    \ utilized vertically and horizontally across different industries. The industries\
    \ I am covering can serve as inspiration when implementing blockchain into an\
    \ existing industry or for a new greenfield project.\n\n> **Note**\n> In this\
    \ context, *vertical* means specifically in a particular field, and *horizontal*\
    \ can be adopted by everyone or any field.\n\nI will be covering the following\
    \ industries:\n\n- Financial\n- Cybersecurity\n- Real estate\n- Mobile\n- Supply\
    \ chain improvement\n- Encrypted messaging platforms\n- Elections and voting\n\
    - Marketing\n- Healthcare\n- Gaming\n\nIn today’s world, many industries rely\
    \ on one another, and there is much crossover between technology and brick-and-mortar\
    \ businesses. For instance, real estate relies on the financial industry. The\
    \ financial industry relies on security as there is a need to be able to verify\
    \ documents and identities. Marketing relies on collecting data and forecasting.\
    \ These crossovers and a mashup of services have the potential to create a seamless\
    \ user experience that expedites the security, reliability, and globalization\
    \ of blockchain; increases the speed of executing transactions; and offers lower\
    \ costs to everyone involved.\n\n## Financial\n\nIn terms of the financial industry,\
    \ you can split the actors into two groups: small financial groups and major financial\
    \ institutions. Small financial groups can be startups, retailers, small banks,\
    \ and individually owned companies. Major institutions include investment groups,\
    \ large banks, and Fortune 500 companies.\n\nSmall financial groups have been\
    \ experimenting with crypto and blockchain for years now. In regard to major financial\
    \ institutions, it has been a love-hate relationship in regard to crypto; many\
    \ financial CEOs and gurus have been criticizing crypto, with J.P. Morgan leading\
    \ the way by calling any employee caught trading bitcoin “stupid” and with financial\
    \ guru Warren Buffett calling bitcoin “delusion” and “attracts charlatans.” However,\
    \ when it comes to the blockchain technology itself, it’s a different story. J.P.\
    \ Morgan announced this year the creation of its own blockchain called `Quorum`\
    \ and its own coin called `JPM Coin`.\n\nMany other major financial companies\
    \ are also starting to slowly warm up to the blockchain technology. Crypto exchanges\
    \ have already passed through the Nasdaq’s vetting process. NASDAQ, Citi, and\
    \ Visa have invested $30 million in the blockchain-based startup `Chain.com`.\
    \ NASDAQ also recognized Overstock.com’s full support of a bitcoin payment option\
    \ as well as the not-yet-published platform `Roobee` (`https://roobee.io`), an\
    \ investment platform developed for retail investors.\n\nIn general, there are\
    \ many areas in which both small and major financial groups can benefit from blockchain.\
    \ I will be covering three: currency, infrastructure, and digital assets.\n\n\
    - **Currency:** This replaces fiat with crypto as an electronic cash system. Anyone\
    \ can hold coins and pay quickly and inexpensive, cutting out the middle man (such\
    \ as banks and credit cards). The current concerns around crypto replacing fiat\
    \ currency are the volatility of price (because of the fluctuations of many coins),\
    \ trust, and knowledge of how to create and accept a transfer and manage a wallet.\
    \ These concerns can make many uneasy, especially ones who are not technology\
    \ savvy. The large financial institutions can benefit from crypto by formalizing\
    \ the transfer of crypto funds to the mainstream by creating their own cryptocurrency\
    \ and/or accepting transfers of existing crypto. Sure, there will probably be\
    \ a fee involved as the middleman is getting involved again; however, crypto can\
    \ potentially be used by the mainstream as a payment method just like other methods\
    \ such as Visa, fiat currency, automated clearinghouses (ACHs), exchange-traded\
    \ funds (ETFs), and so on. Users can then send funds around the globe while dealing\
    \ with a trusted party. Here are some case studies:\n    - `Coinpayments` (`https://www.coinpayments.net`),\
    \ `BitPay` (`https://bitpay.com/`), and `Abra` (`https://www.abra.com/`) are just\
    \ a few examples of merchants that accept crypto payments.\n    - Bank-backed\
    \ coins are another example. J.P. Morgan announced that the bank was starting\
    \ a trial by transforming a trillion dollars that the bank lends to corporations\
    \ to `JPM Coin`. This represents the first coin from a major bank.\n\n- **Infrastructure:**\
    \ Companies can replace existing infrastructure such as a centralized database\
    \ with blockchain to achieve better security and reduce costs. One of the concerns\
    \ with a crypto transfer is that the user needs to understand what they are doing\
    \ or risk losing funds. Here are some case studies:"
