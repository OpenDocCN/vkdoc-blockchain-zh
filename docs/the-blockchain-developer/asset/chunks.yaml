  trans: "\n### 转账组件\n\n`transfer`组件将包含一个表单，用于提交以将以太坊币从一个账户地址转账到另一个账户地址。你将使用表单模块来加快表单的创建。为此，你需要像处理其他\
    \ Material 模块一样，在 `app.module.ts` 中包含 Material 的 `FormsModule` 和 `ReactiveFormsModule`\
    \ 表单模块。\n\n打开 `src/app/app.module.ts` 并添加以下 `import` 语句：\n\n```typescript\nimport\
    \ { FormsModule, ReactiveFormsModule } from '@angular/forms';\n```\n\n你还需要更新 `imports`\
    \ 语句：\n\n```typescript\nimports: [\n  FormsModule,\n  ReactiveFormsModule,\n \
    \ ..\n]\n```\n\n你将使用 `<mat-form-field>` 标签，它代表一个组件，用于包装多个 Angular Material 组件并应用常见的文本字段样式，如下划线、浮动标签和提示消息。这将加快开发速度，因为你无需实现所有这些功能并在多个设备/浏览器上进行测试。\n\
    \n表单字段是名为 `<mat-form-field>` 的包装组件。你可以使用任何表单字段控件（如输入框、文本区域、列表等）。\n\n你可以在此处找到关于\
    \ mat-forms 的信息：[`https://material.angular.io/components/form-field/overview`](https://material.angular.io/components/form-field/overview)。\n\
    \n对于 `src/app/components/transfer/transfer.component.ts`，你将更新初始代码。首先，你需要导入将要使用的组件；在这种情况下，你需要初始化类并使用表单、表单控件和验证器。\n\
    \n```typescript\nimport {FormBuilder, FormControl, FormGroup, Validators} from\
    \ '@angular/forms';\n```\n\n然后，你需要更新组件定义以实现 `OnInit` 方法：\n\n```typescript\nexport\
    \ class TransferComponent implements OnInit {\n```\n\n你将使用一个标志来指示表单是否已提交，并创建一个表单组实例，以及一个名为\
    \ `user` 的对象来保存用户信息。\n\n```typescript\nformSubmitted: Boolean = false;\nuserForm:\
    \ FormGroup;\nuser: any;\n```\n\n为了验证你的表单，你需要在表单填写不正确的情况下定义消息。每个表单控件都需要使用必填字段和消息来定义。\n\
    \n```typescript\naccount_validation_messages = {\n  'transferAddress': [\n   \
    \ { type: 'required', message: '转账地址是必填项' },\n    { type: 'minLength', message:\
    \ '转账地址长度必须为 42 个字符' },\n    { type: 'maxLength', message: '转账地址长度必须为 42 个字符'\
    \ }\n  ],\n  'amount': [\n    { type: 'required', message: '金额是必填项' },\n    {\
    \ type: 'pattern', message: '金额必须为正数' }\n  ],\n  'remarks': [\n    { type: 'required',\
    \ message: '备注是必填项' }\n  ]\n};\n```\n\n当你创建构造函数时，需要包含 `FormBuilder` 组件以便能够生成表单。\n\
    \n```typescript\nconstructor(private fb: FormBuilder) { }\n```\n\n当你的组件初始化时，你将把\
    \ `formSubmitted` 标志设置为 `false`，并为用户信息设置默认值。然后，你将调用一个方法来获取用户的账户和余额，该方法将在稍后实现。最后，你将调用\
    \ `createForms` 方法来生成表单。\n\n```typescript\nngOnInit() {\n  this.formSubmitted\
    \ = false;\n  this.user = {address: '', transferAddress: '', balance: '', amount:\
    \ '', remarks: ''};\n  this.getAccountAndBalance();\n  this.createForms();\n}\n\
    ```\n\n`createForms` 方法将通过传递验证器和数据来生成表单控件。\n\n```typescript\ncreateForms() {\n\
    \  this.userForm = this.fb.group({\n    transferAddress: new FormControl(this.user.transferAddress,\
    \ Validators.compose([\n      Validators.required,\n      Validators.minLength(42),\n\
    \      Validators.maxLength(42)\n    ])),\n    amount: new FormControl(this.user.amount,\
    \ Validators.compose([\n      Validators.required,\n      Validators.pattern('^[+]?([.]\\\
    \\d+|\\\\d+[.]?\\\\d*)$')\n    ])),\n    remarks: new FormControl(this.user.remarks,\
    \ Validators.compose([\n      Validators.required\n    ]))\n  });\n}\n```\n\n\
    `getAccountAndBalance` 方法将设置用户账户的地址和余额；目前你使用的是虚拟数据，但你将在本章稍后实现实际的服务。\n\n```typescript\n\
    getAccountAndBalance = () => {\n  const that = this;\n  that.user.address = '0xd8d0101f83e79fb4e8d21134f5325e64816bd6a0';\n\
    \  that.user.balance = 0;\n  // TODO: 获取数据\n}\n```\n\n最后，一旦你提交表单，你需要一个方法来处理数据并调用服务。`submitForm`\
    \ 将通过检查表单是否有效来使用，稍后你将调用将要创建的服务组件。\n\n```typescript\nsubmitForm() {\n  if (this.userForm.invalid)\
    \ {\n    alert('transfer.components :: submitForm :: 表单无效');\n    return;\n  }\
    \ else {\n    console.log('transfer.components :: submitForm :: this.userForm.value');\n\
    \    console.log(this.userForm.value);\n    // TODO: 服务调用\n  }\n}\n```\n\n对于 `transfer.component.html`，你将设置表单标签，以便在表单提交后调用\
    \ `submitForm` 方法。\n\n```html\n<form [formGroup]=\"userForm\" (ngSubmit)=\"submitForm()\"\
    >\n```\n\n接下来，你将创建包裹的 `div` 并使用数据绑定来显示用户的账户地址和余额。\n\n```html\n<div class=\"transfer-container\"\
    >\n  <p>地址: {{user.address}} </p>\n  <p>余额: {{user.balance}} Eth</p>\n</div>\n\
    ```\n\n请注意，你使用了尚未定义的 `transfer-container` 样式；你将在 CSS 文件中定义它，它将用于格式化你的表单。\n\n对于表单控件，你需要输入框来输入转账目标的账户、金额和消息。你还需要设置验证。\n\
    \n```html\n<mat-form-field>\n  <input matInput placeholder=\"转账地址\" formControlName=\"\
    transferAddress\" required>\n  <mat-error *ngFor=\"let validation of account_validation_messages.transferAddress\"\
    >\n    <mat-error *ngIf=\"userForm.get('transferAddress').hasError(validation.type)\"\
    >{{validation.message}}</mat-error>\n  </mat-error>\n</mat-form-field>\n\n<mat-form-field>\n\
    \  <input matInput placeholder=\"金额\" formControlName=\"amount\" required>\n \
    \ <mat-error *ngFor=\"let validation of account_validation_messages.amount\">\n\
    \    <mat-error *ngIf=\"userForm.get('amount').hasError(validation.type)\">{{validation.message}}</mat-error>\n\
    \  </mat-error>\n</mat-form-field>\n\n<mat-form-field>\n  <textarea matInput placeholder=\"\
    备注\" formControlName=\"remarks\" required></textarea>\n  <mat-error *ngFor=\"\
    let validation of account_validation_messages.remarks\">\n    <mat-error *ngIf=\"\
    userForm.get('remarks').hasError(validation.type)\">{{validation.message}}</mat-error>\n\
    \  </mat-error>\n</mat-form-field>\n```\n\n最后，记得关闭 `div` 和表单，并包含一个提交按钮。\n\n```html\n\
    <button mat-raised-button color=\"primary\" type=\"submit\">转账以太币</button>\n```\n\
    \n</form>\n```\n\n对于 `transfer.component.css`，你将使用 `.transfer-container` div 来水平格式化你的表单。\n\
    \n```css\n.transfer-container {\n  display: flex;\n  flex-direction: column;\n\
    }\n.transfer-container > * {\n  width: 100%;\n}\n```\n\n就是这样。现在，你可以在浏览器中检查你的 dapp，你应该能够看到用户的默认数据，测试表单，验证它，并提交表单。参见图\
    \ 9-10。\n\n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig10_HTML.jpg](img/475651_1_En_9_Fig10_HTML.jpg)\n\
    \n**图 9-10** Ethdapp 转账页面，包含用户信息、验证器和提交按钮\n\n你可以在此处下载此步骤：[`https://github.com/Apress/the-blockchain-developer/chapter9/step5.zip`](https://github.com/Apress/the-blockchain-developer/chapter9/step5.zip)。\n\
    \n---\n\n### Angular 指令\n\n在 Angular 中创建指令使你能够仅用几行代码就能创建自己的自定义 HTML 标签，就像你在 Material\
    \ 表单中看到的那样。你能够包含包装了许多组件的自定义标签。从高层次来看，指令是 DOM 元素上的标记。这些标记可以指向任何 DOM 组件，从属性到元素名称，甚至是注释或\
    \ CSS 类。然后，这些标记会告诉 AngularJS 的 HTML 编译器附加指定的行为，或根据特定逻辑转换整个 DOM 元素及其子元素。\n\nAngular\
    \ 内置了许多这样的指令。然而，在开发过程中，你很有可能需要创建自己的指令。你的 dapp 目前很简单，所以你不需要创建任何指令，并且解释这一点超出了本章的范围。当你确实需要生成一个骨架指令时，请像生成其他组件一样使用\
    \ Angular CLI。\n\n```bash\n> ng generate directive {指令名称}\n```\n\n尽管你没有在你的应用中创建指令，但我还是想向你介绍这个概念，因为这是创建\
    \ Angular 项目不可或缺的一部分。\n"
- fmt: "# Summary\n\nIn this chapter, you took a deep dive into what a dapp is and\
    \ looked at dapp classifications and projects. You learned how to start your own\
    \ dapp project by breaking the process into five steps: writing a white paper,\
    \ launching an ICO, developing the dapp, launching it, and marketing your dapp.\n\
    \nYou then looked at why to use Angular. Next, you created an Angular dapp, first\
    \ ensuring the prerequisites were installed and installing the Angular CLI. Then\
    \ you created an Angular project and served the application.\n\nNext, you learned\
    \ how to import your Angular project to WebStorm or create a new project. You\
    \ looked at the pieces that make Angular such as components, modules, and directives.\
    \ You also learned how to style the dapp by understanding Angular-style architecture\
    \ and working with Angular Material.\n\nYou started building components and created\
    \ content; you split your app into a footer, header, and body and created a custom\
    \ component called `transfer` that includes a form to be able to later transfer\
    \ tokens.\n\nIn the next chapter, you will create a transfer smart contract and\
    \ a Truffle development project as well as connect to the Ganache development\
    \ network. You will learn how to work with the Ethereum network via Truffle and\
    \ test your smart contract. You also will link your dapp with the Ethereum Network's\
    \ `web3` library and connect via MetaMask.\n\n# Build Dapps with Angular: Part\
    \ II\n\nIn the previous chapter, you started developing your dapp. Specifically,\
    \ you learned about dapp classifications and projects and that you can break your\
    \ own dapp project into five steps. You then looked at why to use Angular and\
    \ its benefits. Next, you created an Angular project, first ensuring the prerequisites\
    \ were installed and then installing the Angular CLI. You looked at the pieces\
    \ that make up Angular such as components, modules, and directives. You also learned\
    \ how to style a dapp by understanding Angular-style architecture and working\
    \ with Angular Material. You started building your own custom components and creating\
    \ content; you split your app into a footer, header, and body and created a custom\
    \ `transfer` component that you will be using in this chapter.\n\nIn this chapter,\
    \ I will cover the following:\n\n- Creating the dapp's smart contract with Truffle\n\
    - Integrating a smart contract in your dapp's Angular project\n- Linking and connecting\
    \ your dapp to the Ethereum network\n\nYou will be utilizing the tools I have\
    \ been covering so far: the Angular CLI, Truffle, `ganache-cli`, and MetaMask.\
    \ You will create a smart contract that you will use for your dapp with Truffle,\
    \ and then you'll use the `web3` library to connect to the Ethereum local network\
    \ and call the smart contract's functions and events. MetaMask will be used to\
    \ manage and connect to your account.\n\n> **Tip** It's recommended that you complete\
    \ the previous chapter and Chapter 5 prior to going through this chapter in order\
    \ to fully understand the examples here, which build on the concepts, tools, and\
    \ installed libraries from Chapters 9 and 5.\n\n## Transfer a Smart Contract\n\
    \nYou already have the front-end logic to transfer tokens in your app from the\
    \ previous chapter; however, you don't have a smart contract to interact with\
    \ the blockchain. Smart contracts can be created before the front-end portion,\
    \ after, or in parallel (if you work with a team of developers).\n\nYou already\
    \ created an Ethereum smart contract in Chapter 5, so the steps in this section\
    \ should be familiar to you. Feel free to revisit Chapter 5 to refresh your memory,\
    \ as I won't go into much detail regarding the tools and commands used in this\
    \ chapter.\n\nTo get started, you will create a new folder in your `ethdapp` project\
    \ to hold the Truffle project. You can download the latest step, where you left\
    \ off from, here: [`https://github.com/Apress/the-blockchain-developer/chapter9/step5.zip`](https://github.com/Apress/the-blockchain-developer/chapter9/step5.zip).\
    \ In real-life projects with multiple developers, the smart contract could be\
    \ a separate project. For simplicity, you will be including it in your project\
    \ so you can utilize the WebStorm Terminal window's bottom tab to run commands.\n\
    \nStart by creating a folder called `truffle` inside your project and initialize\
    \ Truffle to create the project. You can see the expected output in Figure 10-1.\n\
    \n![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig1_HTML.jpg](images/475651_1_En_10_Chapter/475651_1_En_10_Fig1_HTML.jpg)\n\
    \n**Figure 10-1** Output of creating a Truffle project\n\n```\n> mkdir ethdapp/truffle\n\
    > cd truffle\n> truffle init\n```\n\n> **Tip** If you get errors such as \"Error:\
    \ Truffle Box,\" uninstall Truffle, and then re-install it and try again.\n\n\
    To re-install `truffle` in case of error messages, remove `truffle` globally and\
    \ install it again.\n\n```\n> npm uninstall -g truffle\n```\n\nIf you do not have\
    \ Truffle installed or need to re-install Truffle globally, run the `install`\
    \ command.\n\n```\n> npm install -g truffle\n```\n\nAfter re-installing or performing\
    \ a fresh install, run the `truffle init` command again and make sure you run\
    \ the test in a new Terminal window to ensure the changes were applied.\n\n```\n\
    > truffle compile\n> truffle migrate\n> truffle test\n```\n\nYou can compare your\
    \ results with mine, shown in Figure 10-2.\n\n![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig2_HTML.jpg](images/475651_1_En_10_Chapter/475651_1_En_10_Fig2_HTML.jpg)\n\
    \n**Figure 10-2** Truffle compiling, migrating, and testing your project\n\n###\
    \ Create a Smart Contract\n\nYou'll create a smart contract and call it `Transfer.sol`;\
    \ put it here: `truffle/contracts/Transfer.sol`. The contract will allow you to\
    \ transfer funds from one account to another. First navigate to the location of\
    \ the contracts in Truffle and use an editor to create a new file.\n\n```\n> cd\
    \ ethapp/truffle/contracts\n> vim Transfer.sol\n```\n\nThe complete `Transfer.sol`\
    \ code is listed here:\n\n```\npragma solidity ^0.5.0;\ncontract Transfer {\n\
    \    address payable from;\n    address payable to;\n    constructor() public\
    \ {\n        from = msg.sender;\n    }\n    event Pay(address _to, address _from,\
    \ uint amt);\n    function pay( address payable _to ) public payable returns (bool)\
    \ {\n        to = _to;\n        to.transfer(msg.value);\n        emit Pay(to,\
    \ from, msg.value);\n        return true;\n    }\n}\n```\n\nLet's walk through\
    \ the code. First you need to define the `solidity` version you will be using\
    \ and the contract name.\n\n```\npragma solidity ^0.5.0;\ncontract Transfer {\n\
    ```\n\nNext, define the from and to addresses and the constructor.\n\n```\naddress\
    \ payable from;\naddress payable to;\nconstructor() public {\n    from = msg.sender;\n\
    }\n```\n\nYou will be using a `Pay` event that will be dispatched once the `pay`\
    \ function is used.\n\n```\nevent Pay(address _to, address _from, uint amt);\n\
    ```\n\nThe `pay` function uses the `Pay` event to interact with the network and\
    \ do the actual transfer.\n\n```\nfunction pay( address payable _to ) public payable\
    \ returns (bool) {\n    to = _to;\n    to.transfer(msg.value);\n    emit Pay(to,\
    \ from, msg.value);\n    return true;\n}\n}\n```"
