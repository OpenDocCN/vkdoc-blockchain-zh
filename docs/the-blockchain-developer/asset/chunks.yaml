    # 总结


    在本章中，你深入研究了比特币核心 RPC。你生成了一个传统钱包和一个 SegWit 比特币钱包，并能够检索钱包的私钥，更好地理解了椭圆曲线数字签名算法（ECDSA）以及公钥和私钥是如何生成的。


    本章大部分时间都在研究交易；你通过比特币守护程序在测试网上发送了币，并利用比特币核心钱包图形界面发送了币。发送完成后，你学习了如何在比特币的区块浏览器中查看交易。接着，你研究了`RawTransaction`，并学会了如何生成单笔输出的交易，以及通过
    Electrum 和命令行生成涉及多个签名者的更复杂交易。


    此外，你还学习了其他选项，例如为更改手续费而替换交易，以及设置`locktime`变量。你了解了 P2PKH 和 P2SH-SEGWIT 之间的区别。最后，我介绍了如何使用`OP_RETURN`参数传递数据，这可用于比特币染色币，或者仅仅为了利用比特币区块链传递附加数据，而不仅仅是花费币。在下一章中，你将更深入地研究以太坊以及如何编写智能合约。


    # 5. 以太坊钱包与智能合约


    在第 1 章中，我在介绍比特币、山寨币和不同共识机制时提到了以太坊。具体来说，我介绍了以太坊的工作量证明（PoW）共识机制，以及如何利用以太坊让开发者创建自己的智能合约和代币。我提到以太坊代币可以作为以太坊征求意见（ERC）生成，例如
    ERC-20、ERC-223 或 ERC-777。在第 3 章中，你创建了自己的区块链，并且我介绍了比特币钱包和交易。


    在本章中，我将更详细地展开介绍以太坊。以太坊允许你创建代码（*智能合约*）来处理资金，利用区块链技术来克服停机时间和第三方干扰。以太坊平台主要归功于 Vitalik
    Buterin 和 Gavin Wood。根据以太坊网站的说法，以太坊的定义如下：


    > *“以太坊是一个运行智能合约的去中心化平台：应用程序完全按照编程方式运行，不会出现停机、审查、欺诈或第三方干扰。”*

    >

    > ——Ethereum.org


    在前面的章节中，你能够传递和存储数据，例如使用`OP_RETURN`参数的比特币染色币用例。这很有用，因为你可以生成文件的 MD5 哈希并将其存储在比特币网络上。你存储的
    MD5 可以是文档、合同或任何你想要的东西。然而，正如你所见，比特币仅限于存储信息，你无法与数据进行交互。具体来说，你能够在网络上传递和存储数据，但无法针对你的文件运行代码，例如对数据执行操作。以太坊通过允许你利用区块链的力量创建智能合约，解决了这种功能缺失的问题。


    ### 注意


    智能合约是用于处理资金的可编程代码。代码自行运行，无需第三方参与。Solidity 是一种流行的以太坊面向合约编程语言，可用于编写智能合约并将代码部署到多个区块链上。


    以太坊的核心是以太坊虚拟机（EVM）。EVM 是智能合约在以太坊中运行的地方。帮助你理解 EVM 的一个好方法是，将 EVM 视为一个分布式的全球计算机，智能合约可以在其上执行。


    ### 注意


    EVM 是一台分布式的全球计算机，用于运行任意的、算法化的、复杂的代码。更简单地说，EVM 由以太坊网络中的所有节点组成，这些节点连接成一个单一的共识体，能够接收智能合约的代码，处理并执行它。EVM
    使用 256 位作为基本共识机制；它可以处理 1 TB 的区块，标准区块时间为 15 秒。


    去中心化应用程序（dapp）开发者编写智能合约，然后借助前端代码在 EVM 上运行代码。见图 5-1。EVM 在所有连接的以太坊节点上以并行连接的方式执行代码。这确保了节点的共识。在撰写本文时，以太坊区块链的大小可能达到
    1 TB，而比特币的区块高度限制为每个区块 4 MB。此外，比特币创建新区块大约需要 10 分钟，而 EVM 上仅需 15 秒。


    尽管去中心化代码作为单一共识运行是有利的，但也存在缺点。例如，智能合约的代码比传统计算机更慢、更昂贵，因为它要在所有节点上运行。


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig1_HTML.jpg](img/475651_1_En_5_Fig1_HTML.jpg)


    图 5-1


    以太坊万米高空视角。图片来源：xbt.net。


    要运行以太坊矿工，你需要运行一个全节点 EVM。矿工像比特币一样运行工作量证明（PoW）共识机制来验证交易。在挖矿过程中，每个区块会挖出五个币。正如你在第
    1 章中看到的 NEO 一样，以太坊矿工会通过运行智能合约获得以太币作为报酬，这些以太币会被转换成所谓的*Gas*。


    ### 注意


    以太坊 Gas 是以太坊代币的一个极小单位。以太坊 Gas 由合约兑换并使用，用于支付矿工的工作。想象一辆汽车，它需要汽油才能运行，以太坊也是如此。没有以太坊
    Gas，你就无法执行智能合约。


    由于以太坊提供了构建有趣应用程序的能力，该平台因其潜力而受到认可，并以各种方式被微软、英特尔、亚马逊、摩根大通甚至政府所利用。这使以太坊变成了一个庞大的生态系统，提供了许多可供选择的方案，帮助你轻松创建智能合约。你可以从大量的开发工具、与其他工具通信的应用程序、最佳实践、基础设施、测试、安全、监控工具等中进行选择。


    选择要使用的工具可能会让人不知所措和困惑，尤其是当许多工具仍处于 alpha、beta 阶段或未经充分测试时。但是请记住，到目前为止，你已经具备了区块链技术的基本理解，包括交易、钱包以及它们的工作原理。此外，你在第
    3 章中开发的区块链是使用 Node.js 的 JavaScript 编写的，而 Node.js 是许多以太坊工具的基础。有两个列表我建议你收藏，如下所示：


    *   [`https://github.com/ConsenSys/ethereum-developer-tools-list`](https://github.com/ConsenSys/ethereum-developer-tools-list)

    *   [`https://github.com/ConsenSys/ethereum-developer-tools-list/blob/master/EcosystemResources.md`](https://github.com/ConsenSys/ethereum-developer-tools-list/blob/master/EcosystemResources.md)


    这些资源提供了与以太坊相关的所有开发工具和资源的详尽列表。涵盖所有这些不同的工具超出了本书的范围，但我建议你在某个时间点研究一下这些工具，特别是如果你专注于以太坊开发，这样你就可以自行判断哪种工具最适合你的项目。


    在本章中，我将重点介绍以太坊智能合约，并在测试网上运行它们，就像你在前面章节中对比特币所做的那样。我将展示如何设置你的开发工具和集成开发环境（IDE），并提供有关去中心化应用程序（dapp）主网部署的基本信息，我将在本书后续章节中对此进行详细阐述。

