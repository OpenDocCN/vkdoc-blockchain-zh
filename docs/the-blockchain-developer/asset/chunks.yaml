  trans: "\n# 区块链应用场景\n\n## 金融服务\n\n- **资金转账**：西联汇款正在测试瑞波币（XRP），以验证能否通过区块链优化现有结算系统，加速资金转移。但就目前而言，西联汇款声称尚未证实使用\
    \ XRP 能加快转账速度。据西联汇款 CEO 希克梅特·埃塞克表示：\"我们在墨西哥（我们最大的汇款通道之一）进行了测试……以我们目前的效率来看，我们尚未发现瑞波币能带来效率提升。\"\
    \n\n- **记账**：摩根大通的 Quorum 区块链（`https://www.jpmorgan.com/global/Quorum`）正在被金融机构用于追踪财务数据。\n\
    \n- **数字资产**：正如我所提到的，区块链可以通过代币创建数字资产。这些资产可以是任何金融工具。以下是一些案例研究：\n\n  - **Chain**（`https://chain.com/`）：提供名为\"\
    序列\"的服务。它利用区块链基础设施，让组织能够使用 GitHub 上的开源代码从零构建金融服务；参见 `https://github.com/chain`。\n\
    \n  - **Openchain**（`https://www.openchain.org`）：这是一家专注于发行和管理数字资产的初创公司。\n\n  -\
    \ **Symbiont.io**（`https://symbiont.io/solutions`）：致力于推动区块链在金融服务领域的大规模应用。此外，纳斯达克已投资了\
    \ Symbiont.io。\n\n## 网络安全\n\n正如上一章讨论安全时所述，针对身份盗窃的网络钓鱼、恶意软件及其他黑客攻击已司空见惯。许多身份盗窃案件源于黑客破解用户密码。区块链不再依赖密码验证用户身份，而是通过密码学保护数字身份，有望彻底革新这一领域。其原理是为每个用户分配私钥——如同区块链分配公钥/私钥对的方式——然后用这些密钥验证用户身份并查找属于该用户的交易。\n\
    \n此外，数据验证对许多人来说是一个痛苦且费时的过程。想想你需要办理护照、公证文件或更新驾照时的情形。这些流程耗费大量精力与时间。区块链可以在加快处理速度的同时，确保并验证文件的所有权与真实性，而且你只需在家中就能完成所有操作，无需排队或填写繁琐的表格。\n\
    \n这些技术可应用于以下场景：\n\n- 护照\n- 数字身份\n- 驾照与身份证\n- 电子公民身份\n- 出生证明\n- 结婚/离婚证明\n- 文件公证\n\
    - 在线账户登录\n\n部分应用案例如下：\n\n- **身份验证**：提供区块链 ID 的公司可用于登录应用和网站、数字签名文件等，从而降低身份盗窃风险。以下是一些案例研究：\n\
    \n  - **Guardtime**（`https://guardtime.com`）：这家区块链公司通过使用无密钥签名基础设施（KSI）交易，增强了数据认证协议。其代码根据接收到的指令（而非密码）授予或拒绝网络访问权限。Guardtime\
    \ 的知名客户之一是威瑞森。\n\n  - **Keybase**（`https://keybase.io`）：Keybase 维护着一个加密密钥目录，用于映射社交媒体身份。用户随后可以使用加密聊天和云存储服务。\n\
    \n  - **Onename**（`https://onename.com`）：该公司在其 Blockstack 网络上为用户提供`.id`命名空间。\n\
    \n  - **ShoCard**（`https://shocard.com`）：这项身份服务旨在为银行和金融机构提供用户认证方式。\n\n- **数据验证**：你可以利用区块链为区块链上的任何数据、文件、业务流程或几乎任何内容创建可验证的记录。以下是一些案例研究：\n\
    \n  - **Factom**（`https://www.factom.com`）：提供 REST API 用于读取、写入和搜索其 Factom 区块链条目及平台，包括\
    \ SDK、文档以及用于验证和调试条目的区块链浏览器。\n\n  - **存在证明**（`https://proofofexistence.com`）：该公司通过交易的加时间戳属性来验证文件的存在性。\n\
    \n  - **Tierion**（`https://tierion.com`）：类似于存在证明。Tierion 提供证明和链锚点服务。链锚点通过将数据锚定到比特币区块链来保护数据，而证明则利用区块链的时间戳属性作为公证。戴尔和\
    \ Xero 等公司均使用该服务。它还拥有一个开发者门户：`https://chainpoint.org`。\n\n## 房地产\n\n房地产行业有望从区块链技术的垂直与水平应用中获益。如果你曾参与过房地产交易，你会知道这些交易通常复杂且不透明，涉及大量文书工作以及难以追踪的环节，例如与中介打交道、房产检查、产权过户、融资、公证，以及许多情况下的律师参与。流程中存在诸多痛点。区块链有助于降低成本、增强安全性、提升隐私保护并加速处理流程。\n\
    \n结合之前讨论的一些要素，这些解决方案可以提供身份识别、文件验证和金融服务等多方面价值：\n\n- 确认身份\n- 安全识别买卖双方\n- 确保所有权\n\
    - 按需保密信息\n- 验证文件\n- 房产尽职调查\n- 进行金融交易\n- 资金转账\n- 在各方（如中介和卖家）之间分配资金\n- 支付账单\n\n\
    解决这些环节的区块链服务可以加快流程，同时减少文书工作并降低成本。\n\n以下是一些案例研究：\n\n- **Harbor**（`https://goharbor.io`）：提供基于以太坊\
    \ ERC-20 标准的代币，允许将货币作为证券进行转售。它是一个用于基金、私募股权和商业地产等数字证券的平台。\n\n- **Ubitquity**（`https://www.ubitquity.io`）：提供基于区块链平台的房地产\
    \ SaaS 服务，主要面向抵押贷款、产权和金融公司。它与全球的实体合作收集房产信息和文件。Ubitquity 提供了与其区块链平台集成的 API（`https://www.ubitquity.io/`）。\n\
    \n- **Propy**（`https://propy.com/browse/`）：该公司通过 ICO 筹集了超过 1500 万美元，并声称可在购买房产时帮助人们节省高达\
    \ 25%的费用，同时避免电汇和欺诈风险。Propy 支持以任何货币（包括加密货币）处理支付。\n"
- fmt: "# 排版后的文本\n\n*Silentnotary* ( [*https://silentnotary.com*](https://silentnotary.com)\
    \ ), *Dnote* ( [*www.dnote.online*](http://www.dnote.online) ), and *Blocknotary*\
    \ ( [*https://www.blocknotary.com*](https://www.blocknotary.com) ): These are\
    \ just a few examples of companies that offer a decentralized notary. The concept\
    \ is similar to Proof of Existence. The company verifies identity, and using blockchain’s\
    \ timestamp property it can verify documents. Blockchain captures the hash at\
    \ a specific point in time, which can then be utilized to confirm the existence\
    \ of something at that time. The timestamp can be used in a court of law and in\
    \ the same way as a traditional notary. These services can eliminate the need\
    \ for a physical notary. In fact, many states such as Arizona, Florida, Kentucky,\
    \ Louisiana, Nebraska, and Nevada are already accepting e-notaries of deeds.\n\
    \n*ShelterZoom* ( [*https://www.shelterzoom.com*](https://www.shelterzoom.com)\
    \ ): This company is aimed at buyers, sellers, and renters. Sales are done using\
    \ Ethereum’s smart contracts.\n\n*StreetWire* ( [*http://www.streetwire.net/*](http://www.streetwire.net/)\
    \ ): This company tokenized physical real estate assets as well as providing data\
    \ management services.\n\n## Mobile\n\nBlockchain-based services can benefit users\
    \ and help pain points related to mobile devices. Here are some examples:\n\n\
    * *Privacy*: Users around the globe are getting fed up with the lack of privacy\
    \ as social media, telecommunications, and Internet companies are taking advantage\
    \ of them by holding users’ data and sharing the data for profit.\n* *Dapps*:\
    \ Supporting dapps can provide access to large numbers of new services without\
    \ being censored by the mobile app’s store.\n* *Income*: Mobile phones can generate\
    \ income via mining, leaving reviews for coins, etc., reducing the monthly bills\
    \ for the user.\n\nIn fact, the mobile industry has recognized the potential and\
    \ is harnessing blockchain to provide the user with more control, value, and privacy,\
    \ with many big names making headlines this year.\n\n> “Telecommunications and\
    \ Internet companies have derived tremendous value from controlling data. By decentralizing\
    \ apps, we can put this data onto a smart contract, effectively giving control\
    \ back to creators and to users,” and “Much of what we call peer-to-peer or ‘decentralized’\
    \ services continue to be built upon centralized networks. We are changing that.”\n\
    > \n> —Pundi X founder and CEO Zac Cheah\n\nHere are some case studies:\n\n* *Electroneum*\
    \ ( [*https://electroneum.com/m1/*](https://electroneum.com/m1/) ): This is a\
    \ new phone from a company called Electroneum. It has the following features:\n\
    \  * *ETN cloud mining*: Users can mine up to $3 worth of ETN per month by running\
    \ the cloud mining application.\n  * *Low price*: It has a low price tag of $80.\n\
    \  * *Hardware/software*: It is an Android device running version 8.1 Go, powered\
    \ by a quad-core 1.3GHz CPU and supports 4G broadband cellular network technology\
    \ and dual SIM cards.\n* *HTC* ( [*https://www.htc.com/*](https://www.htc.com/)\
    \ ): This supports multiple dapps.\n* *Pundi X* ( [*https://pundix.com*](https://pundix.com)\
    \ ): This company has redesigned its XPhone, estimated to be released for purchase\
    \ in late 2019. It will include the following:\n  * *Blockchain mode*: Services\
    \ can operate independently of centralized carriers. Users can route phone calls,\
    \ messages, and data via blockchain nodes without a centralized service provider.\n\
    \  * *X button*: This allows users to switch to blockchain mode.\n* *Samsung Galaxy\
    \ S10* ( [*https://www.samsung.com/us/mobile/galaxy-s10/*](https://www.samsung.com/us/mobile/galaxy-s10/)\
    \ ): This includes the following:\n  * *Built-in crypto wallet*: This has private\
    \ key storage with support for bitcoin, Ethereum, Cosmo Coin, and Enjin Coin,\
    \ a gaming cryptocurrency.\n  * *Dapps*: It has out-of-the-box support for dapps.\n\
    \  * *Cosmo coin (COSM)*: It has support for the cosmo token, which powers the\
    \ South Korean blockchain.\n  * *Earn coins*: Users can earn cosmo tokens in exchange\
    \ for leaving reviews in the app.\n  * *Payment*: It has support for contactless\
    \ payments with crypto.\n\n## Supply Chain\n\nCompanies can benefit greatly by\
    \ utilizing blockchain as a private decentralized ledger to better store and use\
    \ their own data globally. As you have seen, blockchain can store, monitor, and\
    \ optimize data in an immutable and honest way that can be applied to supply chains.\
    \ The supply chain can be broken down into these elements:\n\n* *Chain of custody*:\
    \ You can trace the chain of ownership of an asset.\n* *Product identity*: You\
    \ can store serial numbers or other product identification information on a blockchain\
    \ allowing all parties (manufacturers, distributors, retailers, and consumers)\
    \ to verify an item’s authenticity. Keeping track of supply chains can help in\
    \ many ways such as eliminating counterfeit products.\n* *Monitor*: You can trace\
    \ in real time supply chains, from raw Materials to a finished good.\n\nHere are\
    \ some case studies:\n\n* *Blockverify* ( [*www.blockverify.io*](http://www.blockverify.io)\
    \ ): This company uses blockchain for anticounterfeit measures by identifying\
    \ counterfeits, preventing the duplication of products, and enabling companies\
    \ to verify their products and monitor their supply chains.\n* *British Airways*\
    \ ( [*https://www.britishairways.com*](https://www.britishairways.com) ): This\
    \ company uses blockchain to ensure that flight information is correct. It is\
    \ also testing VChain ( [*https://www.vchain.tech*](https://www.vchain.tech) ),\
    \ a verification system to replace security checks.\n* *Inxeption* ( [*https://www.inxeption.com*](https://www.inxeption.com)\
    \ ): UPS has teamed up with the Inxeption platform to improve merchant supply\
    \ chains.\n* *Maersk* ( [*https://maersk.com/*](https://maersk.com/) ): The world’s\
    \ largest shipping company has teamed up with IBM to create a Hyperledger blockchain\
    \ to monitor the cargo of ships.\n* *Tracr* ( [*https://www.tracr.com*](https://www.tracr.com)\
    \ ): This is used by De Beers, the largest diamond producer utilizing blockchain\
    \ technology, to create an immutable and permanent digital record for registered\
    \ diamonds to cut down on conflict (“blood”) diamonds.\n* *Walmart*: This company\
    \ is using blockchain to allow its employees to scan goods in the store’s app\
    \ and monitor the product from manufacturing to the store’s floor.\n\n## Encrypted\
    \ Messaging\n\nIn Chapter [1](#475651\\_1\\_En\\_1\\_Chapter.xhtml), I covered\
    \ cryptography and how the Enigma machines were used to encrypt and decrypt messages\
    \ in military communication. Blockchain is derived from messaging, and it can\
    \ be used to send reliable encrypted messaging. Blockchain can be used to update\
    \ traditional solutions for end-to-end messaging encryption by leveraging a decentralization\
    \ ledger to send messages anonymously and without a private user’s data being\
    \ sent, even masking the user’s IP address.\n\nHere are some case studies:\n\n\
    * *ADAMANT* ( [*https://adamant.im*](https://adamant.im) ): This is an open source\
    \ private messenger with a crypto payment option. See [*https://github.com/adamant-im*](https://github.com/adamant-im)\
    \ .\n* *Crypviser* ( [*https://crypviser.network*](https://crypviser.network)\
    \ ): This is a private message platform.\n* *Matrix* ( [*https://matrix.org/blog/home/*](https://matrix.org/blog/home/)\
    \ ): This is a chat ecosystem with open source code; see [*https://github.com/matrix-org/matrix.org*](https://github.com/matrix-org/matrix.org)\
    \ ."
