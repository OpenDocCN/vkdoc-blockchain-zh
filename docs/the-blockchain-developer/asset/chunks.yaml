  trans: '

    ### 路由模块


    另一个重要的文件及良好的实践是创建应用路由模块。该文件充当控制器，用于指示 Angular 如何在应用的不同视图之间导航。


    通常，为应用生成路由时无需手动操作，因为在创建应用时，您已决定创建名为 `app-routing` 的路由文件。


    如果需要创建 `app-routing` 文件，可以运行以下 `module` 命令：


    ```

    > ng generate module app-routing --flat --module=app

    CREATE src/app/app-routing.module.ts

    UPDATE src/app/app.module.ts

    ```


    请注意，这次在命令中您使用的是完整名称 `generate module`，而不是仅使用首字母 `g` 和 `m`。两种方式的效果相同。


    `generate module` 命令会为 `src/app/app-routing.module.ts` 创建清单 9-1 所示的初始代码。


    ```

    import { NgModule } from ''@angular/core'';

    import { Routes, RouterModule } from ''@angular/router'';

    const routes: Routes = [];

    @NgModule({

    imports: [RouterModule.forRoot(routes)],

    exports: [RouterModule]

    })

    export class AppRoutingModule { }

    清单 9-1

    app-routing 初始启动代码

    ```


    初始代码包含一个导入 Angular 代码和模块标签的 `import` 语句。接下来，用清单 9-2 中的代码替换 `app-routing.module.ts`
    文件中的预填充代码。


    ```

    import { NgModule } from ''@angular/core'';

    import { CommonModule } from ''@angular/common'';

    import { RouterModule, Routes } from ''@angular/router'';

    import { StartComponent } from ''./components/start/start.component'';

    import { TransferComponent } from ''./components/transfer/transfer.component'';

    const routes: Routes = [

    { path: '''', redirectTo: ''/start'', pathMatch: ''full'' },

    { path: ''start'', component: StartComponent },

    { path: ''transfer'', component: TransferComponent }

    ];

    @NgModule({

    declarations: [],

    imports: [ RouterModule.forRoot(routes), CommonModule ],

    exports: [ RouterModule ]

    })

    export class AppRoutingModule { }

    清单 9-2

    用于路由视图的 app-routing 代码


    在清单 9-2 中，您导入了将要使用的视图组件，分别是 `start` 和 `transfer`。它们将充当网站上的网页或移动应用中的局部视图。路由告诉应用哪个视图对应哪个关键字，最后您设置
    `import` 语句来告知 Angular 哪些模块可以访问该模块。


    现在路由已设置完毕，您可以获取页面的页脚、页眉和主体进行显示。只需打开 `src/app/app.component.html`，将欢迎页面的 HTML 代码更新为以下三行：


    要测试对应用所做的更改，无需重新发布应用或运行任何脚本；只需保存文件，然后在终端中运行之前执行过的相同 `serve` 命令即可。


    ```

    > ng serve

    ⌈wdm⌋: Compiled successfully.

    ```


    `serve` 脚本包含监视文件更改并自动更新应用的脚本，因此当您修改文件后，只需返回浏览器即可。大多数情况下，甚至无需刷新网页，更改就会自动生效。访问 `http://localhost:4200`
    即可查看更改。


    如果您想直接跳转到转账页面，只需在设置路由机制时，在 URL 末尾添加所选的关键字：`http://localhost:4200/transfer`。参见图
    9-8。


    ![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig8_HTML.jpg](img/475651_1_En_9_Fig8_HTML.jpg)


    图 9-8


    Ethdapp 的页眉、页脚和转账页面


    您可以在此处下载此步骤的代码：[`https://github.com/Apress/the-blockchain-developer/chapter9/step2.zip`](https://www.scala-sbt.org/1.x/docs/Installing-sbt-on-Windows.html)
    。


    ### 为 Angular 应用设置样式


    目前您的应用尚未设置样式，仅显示带有页眉、页面和页脚的文本；不过在开始设置样式之前，了解 Angular 样式架构会对您有所帮助，以确保不会产生过于庞大难以管理的层叠样式表
    (CSS) 文件。您可以在全局级别设置整个应用所需的样式，也可以为单个组件设置独特的特定样式。


    此外，快速从零开始构建一个具有样式的应用会很棒。这可以通过 Angular Material 实现。Angular Material 为您提供了一种捷径，无需费心考虑跨浏览器、跨设备编程，即可为应用获得一致的“外观”。让我们来看看。


    #### Angular 样式架构


    Angular 设置了一个全局 CSS 文件。该 CSS 文件名为 `style.css`，位于项目的根目录。`src/style.css` 包含您希望在整个应用中使用的样式，例如字体、主题、所有组件的样式等。


    如您所见，每个组件还包含一个私有的 CSS 文件。特定的组件 CSS 文件用于存放该组件独有的样式。


    例如，`/src/app/components/footer/footer.component.css` 存放了专用于页脚组件的样式。


    #### Angular Material


    目前，您的入门应用运行快速，因为它包含的代码极少；然而，随着您向应用添加越来越多的组件、资源和样式，可能会出现性能问题。您的应用很容易变得臃肿，而每毫秒的延迟都很关键。


    另一个潜在问题是测试。所有不同的浏览器、浏览器版本、屏幕尺寸和设备都需要进行测试，从头创建页面需要严格的测试和质量保证 (QA) 团队，以确保其在所有设备上表现一致。


    Angular Material 解决了所有这些问题，同时还提供了可访问性和国际化支持。这是因为 Angular Material 专为 Angular 优化，并由
    Angular 团队构建，因此能够与 Angular 无缝集成。它已经通过了所有兼容性测试。


    更多信息，请查看 Angular Material 入门页面：[`https://material.angular.io/guide/getting-started`](https://material.angular.io/guide/getting-started)
    。


    #### 安装 Angular Material


    有几种安装 Material 的方式。由于您已安装 Angular DevKit，只需运行 `ng add` 命令即可获取 Angular Material
    库。您需要先安装 `cdk`，因为它是一个依赖项。


    ```

    > ng add @angular/cdk

    ```


    接下来，安装 Material。


    ```

    > ng add @angular/material

    ```


    请注意，输出会询问您想要哪个主题颜色并附有链接。我将在本章下一节介绍主题，但现在，请选择第一个或您喜欢的任何颜色。


    ```

    ? 选择预构建主题名称，或选择“custom”自定义主题： (使用方向键)

    □ 靛蓝/粉红       [ 预览: https://material.angular.io?theme=indigo-pink ]

    深紫/琥珀       [ 预览: https://material.angular.io?theme=deeppurple-amber ]

    粉红/蓝灰       [ 预览: https://material.angular.io?theme=pink-bluegrey ]

    紫色/绿色       [ 预览: https://material.angular.io?theme=purple-green ]

    ```


    您还可以设置手势识别和动画。


    ```

    ? 设置 HammerJS 用于手势识别？ Yes

    ? 为 Angular Material 设置浏览器动画？ Yes

    ```


    预期输出应显示已更新的文件：


    ```

    UPDATE package.json

    UPDATE angular.json

    UPDATE src/app/app.module.ts

    UPDATE src/index.html

    UPDATE src/styles.css

    ```

    '
- fmt: '#### Import Angular Material Modules


    Next, you want to modify your app to have Angular Material include animations,
    Material icons, gesture support, and component modules.


    In your project, you will only be using component modules and not all the features
    that Angular Material has to offer; what you need to do is import `NgModule` for
    each component you want to use. Open `src/app/app.module.ts` and add the `import`
    statements.


    ```

    import {

    MatButtonModule,

    MatCheckboxModule,

    MatInputModule,

    MatSelectModule,

    MatDatepickerModule,

    MatNativeDateModule

    } from ''@angular/material'';

    ```


    Next, update the `import` statements of `@NgModule` to include the Material modules
    you imported.


    ```

    imports: [

    BrowserModule,

    AppRoutingModule,

    BrowserAnimationsModule,

    MatButtonModule,

    MatInputModule,

    MatDatepickerModule,

    MatNativeDateModule,

    MatCheckboxModule,

    MatSelectModule

    ]

    ```


    That’s it. You can now have access to the Angular Material components you included.


    #### Theme Your Angular Material App


    Now that you have access to the Angular Material components, you can use themes
    to style them. A *theme* is a set of colors that will be used on your Angular
    Material components.


    In Angular Material, a theme is created by creating multiple palettes.


    - *Primary palette*: These are the colors most used across all screens and components.

    - *Accent palette*: These are the colors used for the button and interactive elements.

    - *Warn palette*: These are the colors for errors.

    - *Foreground palette*: These are the colors for text and icons.

    - *Background palette*: These are the colors for an element’s backgrounds.


    In Angular Material, all theme styles are generated statically at build time to
    avoid slowing the app on startup.


    Angular Material comes prepackaged with several prebuilt theme CSS files. As you
    probably recall, you had an option of selecting a theme to use when you installed
    Material.


    These theme files also include all of the styles for the core (styles common to
    all components), so you have to include only a single CSS file for Angular Material
    in your app. You can include a theme file directly into your application from
    `@angular/material/prebuilt-themes`.


    These are the available prebuilt themes:


    - `deeppurple-amber.css`

    - `indigo-pink.css`

    - `pink-bluegrey.css`

    - `purple-green.css`


    You are using Angular CLI here, so you can simply include the style you want in
    the global `src/styles.css` file.


    Originally it has this initial precode:


    ```

    html, body { height: 100%; }

    body { margin: 0; font-family: ''Roboto'', sans-serif; }

    ```


    Add the following `import` statement at the top of the document:


    ```

    @import "~@angular/material/prebuilt-themes/indigo-pink.css";

    ```


    While you have the `src/style.css` file open, you can also create a style for
    a container, a paragraph, and a button that you can use across your app for your
    pages.


    ```

    p {

    padding-left: 20px;

    font-size: 12px;

    }

    .container {

    margin-right: auto;

    margin-left: auto;

    padding: 20px 15px 30px;

    width: 750px;

    }

    button {

    color: #ffffff;

    background-color: #611BBD;

    border-color: #130269;

    display: inline-block;

    margin-bottom: 0;

    font-weight: normal;

    text-align: center;

    vertical-align: middle;

    touch-action: manipulation;

    cursor: pointer;

    white-space: nowrap;

    padding: 6px 12px;

    font-size: 12px;

    line-height: 1.42857143;

    border-radius: 4px;

    -webkit-user-select: none;

    -moz-user-select: none;

    -ms-user-select: none;

    user-select: none;

    }

    ```


    You can compare your files with mine: [`https://github.com/Apress/the-blockchain-developer/chapter9/step3.zip`](https://github.com/Apress/the-blockchain-developer/chapter9/step3.zip).


    ### Creating Content


    At this point, you have a skeleton app with a header, body, and footer. The body
    can be switched between your start page and transfer page by changing the URL
    in the browser. You also imported and injected Material modules and set up global
    styles for your app. The next step is to create actual content to replace the
    temporary text message you placed in your header, footer, and start components.


    #### Footer Component


    For the footer component, you will just replace the message for your company copyright.
    To do so, all you need to do is open `src/app/components/footer/footer.component.html`
    and replace the default code.


    ```

    footer works!


    ```


    Replace the code by creating a `div` container with the style you added to the
    global CSS file.


    ```

    <div class="container">

    Copyright (c) 2019 Company Name. All Rights Reserved.

    </div>

    ```


    You are also going to create a specific style for the footer component, so every
    time you use the `p` tag, your font will be size 12px with no padding on the left.
    Open `src/app/components/footer/footer.component.css` and insert the following:


    ```

    p {

    padding-left: 0;

    font-size: 11px;

    }

    ```


    Notice that you defined the `<p>` tag twice, once in the global CSS file and one
    at the component level. What’s going to happen is that the global `<p>` tag will
    be overwritten by the component `<p>`, so you can use the `<p>` tag for your footer
    and a different `<p>` tag for other components such as the start and transfer
    pages while keeping your HTML code free of CSS code.


    #### Header Component


    For the header component, you will create a navigation menu to be able to switch
    between the start page and the transfer page. For styles specific to the header
    component, open `src/app/components/header/header.component.css` and add the nav
    list styles.


    ```

    .nav {

    margin-bottom: 0;

    padding-left: 0;

    list-style: none;

    }

    li {

    display: block;

    float: left;

    width: 100px;

    height: 25px;

    padding: 5px;

    }

    .nav>li>a {

    margin-bottom: 0;

    padding-left: 0;

    font-weight: 500;

    font-size: 12px;

    text-transform: uppercase;

    position: relative;

    }

    ```


    For `src/app/components/header/header.component.html`, you create a container
    and a list of the two links to the pages start and transfer. To do so replace
    the initial code:


    ```

    header works!


    ```


    with the following:


    ```

    <div class="container">

    <ul class="nav">

    <li><a routerLink="/start" routerLinkActive="active">home</a></li>

    <li><a routerLink="/transfer" routerLinkActive="active">transfer</a></li>

    </ul>

    </div>

    ```


    The working dapp now includes basic styling and functional navigation, as shown
    in Figure 9-9.


    ![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig9_HTML.jpg](images/475651_1_En_9_Chapter/475651_1_En_9_Fig9_HTML.jpg)


    Figure 9-9: Ethdapp with basic styling and working navigation


    You can download this step here: [`https://github.com/Apress/the-blockchain-developer/chapter9/step4.zip`](https://github.com/Apress/the-blockchain-developer/chapter9/step4.zip).'
