  trans: '

    ### DApp 项目


    大多数 DApp 要么直接构建在以太坊区块链之上，要么使用区块链来管理其代币。然而，也有一些 DApp 甚至构建了它们自己专用的区块链。请查看表 9-1，其中列举了一些不同类型的
    DApp 及其分类。


    **表 9-1** DApp 示例及分类


    | **DApp** | **描述** | **分类** | **代币** | **区块链** |

    | --- | --- | --- | --- | --- |

    | Ethlance | 职位发布和自由职业者招聘的市场，收取 0% 费用。 | 直接使用以太坊 | 无代币 | 以太坊区块链 |

    | Golem | 闲置计算能力的全球市场。 | 基于以太坊的代币 | GNT | 以太坊区块链 |

    | SAFE 网络 | 数据存储和通信网络。 | 实现依赖于构建在另一区块链（比特币）之上的另一协议（Omni 协议） | SFE | 比特币 |


    除了表 9-1 中的信息，还有很多资源可以找到更多的 DApp；这两个网站提供了 DApp 列表供你查阅：[`https://dapps.ethercasts.com/`](https://dapps.ethercasts.com/)
    和 [`https://coinsutra.com`](https://coinsutra.com)。


    ### 如何创建你自己的 DApp？


    比特币和区块链的成功带来了 DApp 的爆发式增长。开发者和企业主创建了一个开发 DApp 的基本流程。你不必完全照搬这个流程，并且它在你阅读时可能已经发生了变化；然而，许多已发布的
    DApp 都遵循了这一流程。该流程包含以下五个步骤：


    1.  撰写白皮书。

    2.  发起首次代币发行（ICO）。

    3.  开发 DApp。

    4.  发布 DApp。

    5.  营销 DApp。


    让我们回顾一下这些步骤。


    #### 撰写白皮书


    白皮书类似于公司面向投资者的商业计划书。然而，它的目标受众不仅仅是投资者；它还是技术蓝图。白皮书既是技术文档也是商业计划书，它应该解释要解决的问题，以及 DApp
    的概念、功能和技术细节。


    就像在商业计划书中一样，包含你的独特卖点（USP）、路线图、团队成员简历、能力和历史记录是一个好主意，这有助于建立可信度。


    ### 注意


    独特卖点（USP）是你的 DApp 旨在解决的问题。


    白皮书发布后，最好在早期阶段、开发之前，从同行和社区那里获得反馈。社交媒体、论坛和出版物常被用来推广 DApp 并帮助建立可信度。


    #### 发起首次代币发行


    白皮书发布后，下一步是发起 ICO，出售代币以资助和支持你的 DApp。你的代币应该有存在的理由，而不是与市场上已有的其他代币相同，因此你应该解释你的 DApp
    为何以及如何需要自己的代币。


    你还需要决定 DApp 的分类类型，这将决定你是否需要以下部分或全部内容：1) 发行代币，2) 设置使用费用，3) 拥有专用区块链，4) 拥有挖矿机制，5)
    设置费用分配，6) 奖励投资者，7) 分配费用以支付你业务的不同部门：支持、开发、营销和业务。


    #### 开发 DApp


    开发应该是开源的，GitHub 通常用于存放开发工作的代码仓库。在每次发布时，最好让投资者和其他人知晓，以便围绕你的项目建立用户和开发者社区。许多 DApp
    试图获取资金但未能交付可用的产品；你要让自己与众不同，并避免与监管机构产生潜在问题。（我将在第 11 章中讨论监管机构。）


    #### 发布 DApp


    发布你的 DApp，并包含发布说明、文档、路线图和维护计划。满足承诺的发布日期至关重要。


    #### 营销 DApp


    最后一步是营销。除了传统营销之外，DApp 在早期阶段或发布后通常会雇佣或与推广者合作以传播消息。DApp 另一个独特的营销方面是让代币在交易所上市。这是最终的认可标志。一些交易所设有投票系统来选择下一个要上市的代币。一些交易所滥用了这一流程，对代币上市收取高额费用。例如，在币安交易所上市一个功能型代币的费用可能在
    50 万到 300 万美元之间。


    许多早期投资者，包括 DApp 所有者，如果代币在主流交易所上市，他们就能够“套现”，因为上市通常会导致价格上涨；然而，DApp 上市变得越来越困难，它需要提供真正的价值。欺诈者经常会被揭露，代币上市后很快就会被摘牌。


    ## 为什么选择 Angular？


    对于 DApp，就像任何传统应用一样，你可以为发布应用的设备编写原生应用（使用设备支持的语言，例如 iOS 的 Xcode）；然而，实践表明，使用框架可以加速开发。例如，如果你想复用同一段代码，并将其部署到具有不同屏幕尺寸的多个设备上，这对小团队来说可能是一个挑战。Angular
    帮助你同时为 Web、移动端和桌面端构建跨平台的现代应用。Angular CLI 和组件开发套件（CDK）可以帮助加速应用的开发。


    使用 Angular 的好处在于以下几点：


    - 庞大的社区支持

    - 企业级架构和扩展性

    - 跨平台支持

    - 文档完善


    Angular 是一个结构化框架，能让你创建前端客户端应用。其各个部分松散耦合并以模块化方式组织，从而减少了需要编写的代码量，增加了灵活性，使代码更易于阅读，并缩短了开发时间。


    Angular 允许开发者组合一套工具集，用于构建一个完全适合你应用需求的框架。你可以使用 HTML 作为模板语言，并扩展 HTML 的语法，使应用的组件易于阅读。除了
    HTML，编码使用 TypeScript 完成，它将 JavaScript 转变为面向对象的编程语言，并为你提供企业级开发环境。


    此外，Angular 结构良好，并且根据可访问性富互联网应用（ARIA）标准构建，可实现完全可访问性，因此你的应用或网站可以正确地为残障人士构建。


    Angular 还能很好地与其他 JavaScript 库配合使用，因此你可以使用 `npm` 管理器安装诸如以太坊 JavaScript API `web3.js`
    之类的库。最后，Angular 的特性可以轻松修改或替换，以满足你的确切需求。


    ### 注意


    *Angular* 一词意指具有多个角度或由角度测量。Angular 是一个结构化框架，能让你为 Web、移动端和桌面端创建前端客户端应用。它是一个用于动态应用开发的开源前端框架。


    Angular 最重要的特性是数据绑定和依赖注入。这些有助于减少代码量。此外，Angular 已存在多年，如今已是第七个版本。

    '
- fmt: '### Note


    Dependency injection is a design pattern technique. As the name suggests, it means
    using one object as a dependency to another object by injecting the code.


    Angular 2 was a complete rewrite of AngularJS and offered a major change; however,
    there are no major differences between Angular 2 up to version 8.


    The latest release version of Angular at the time of writing is 7.3.1, and in
    this version, a few features were added such as the following:


    *   *Dependencies*: The dependencies were upgraded, and support for TypeScript
    3.1, RxJS 6.3, and Node 10 was added.

    *   *Bundle budget*: You can set a warning for the size of the application to
    ensure you don’t exceed the limit (the default is 2 MB).

    *   *Angular CLI*: By running the CLI wizard, you can add components such as routing
    and decide on the format of the CSS.

    *   *Component Dev Kit (CDK) of Angular Material*: Add new features such as out-of-the-box
    virtual scrolling, drag and drop, and `mat-form-field` support for native select
    fields. (I’ll cover Material later in this chapter.)


    Angular 8 is at release candidate 2 (rc.2), and the features expected are mostly
    to improve performance. It will include an improved view engine called Angular
    Ivy, improved upload of JavaScript for modern browsers that support ES2015+, support
    for web workers to use hardware for heavy lifting, support for TypeScript, a benchmarks
    tool, and more.


    ### Tip


    I selected Angular, but Angular is not the only framework that can help expedite
    development. You can use other frameworks such as React (<https://reactjs.org>)
    and achieve similar benefits. This decision is really a matter of personal taste
    and your team’s skill set. You could easily convert this project to a React project
    mostly by copying your project’s files over to the React project.


    ### Creating an Angular Dapp


    In this section, you will be creating an actual dapp that will connect to the
    Ethereum network and transfer funds from one account to another. This is often
    the core feature of any dapp out there. For instance, you can build a dapp that
    sells products, provides services, or pays users to take quizzes, and all these
    types would need to have a mechanism in place to transfer coins/tokens. In this
    section of this chapter, you will be creating a dapp utilizing Angular.


    In terms of environment and deployment, you will be using the Truffle web framework
    you used in Chapter [5](#475651_1_En_5_Chapter.xhtml), as it offers benefits for
    quickly creating a smart contract. Truffle is able to do more than just help compile
    your smart contract; it does everything you need to inject your smart contract
    into a web app and can run the test suite. You are also going to utilize MetaMask
    again to get a secure blockchain account in the browser. Lastly, you will use
    and run Ganache to create a local blockchain RPC server to test and develop against.


    #### Prerequisites


    Most of what you need is already installed. Angular needs Node and `npm` manager,
    which you have installed previously. Confirm the correct version is installed
    by running the libraries with the `-v` flag, just as you have done in previous
    chapters.


    ```

    > node -v

    > npm -v

    ```


    In case you do not have `npm` and `node`, just run the following command:


    ```

    > brew install node

    ```


    Give `npm` ownership for your user so you won’t need to use `sudo` to install
    libraries.


    ```

    > sudo chown -R $USER:$GROUP ~/.npm

    > sudo chown -R $USER:$GROUP ~/.config

    ```


    It’s recommended that you upgrade `npm` to ensure you are using the latest version;
    at the time of writing, it’s 6.9.0.


    ```

    > [sudo] npm install -g npm

    +npm@6.9.0

    ```


    #### Angular CLI


    Next, you need to install the Angular command-line interface (CLI). For Angular
    CLI, it’s recommended (but not required) to install Angular CLI with `sudo` and
    `allow-root` and ensure Angular CLI will have the correct privileges. You will
    be installing version 7.3.9, which is the latest stable release version of Angular.


    ```

    > sudo npm install -g @angular/cli@7.3.9 --unsafe-perm=true --allow-root

    + @angular/cli@7.3.9

    added 363 packages from 197 contributors in 13.691s

    ```


    You could also install the latest version of Angular but your example code may
    break, with newer versions of Angular.


    ```

    > sudo npm install -g @angular/cli --unsafe-perm=true --allow-root

    ```


    To verify installation went well, run the version flag, and you should see version
    7.3.9; Figure [9-2](#475651_1_En_9_Chapter.xhtml#Fig2) shows the expected output.


    ![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig2_HTML.jpg](images/475651_1_En_9_Chapter/475651_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Angular CLI installation verification


    ```

    > ng version

    ```'
