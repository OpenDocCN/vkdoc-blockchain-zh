    service is free, and returning these coins will benefit the next developer who
    needs them.


    You can read more about testnet here: [`https://en.bitcoin.it/wiki/Testnet`](https://en.bitcoin.it/wiki/Testnet)
    . At the time of writing, testnet3 is the latest blockchain used for testing.


    You will be using coinfaucet.eu, which can be found at [`https://coinfaucet.eu/en/btc-testnet/`](https://coinfaucet.eu/en/btc-testnet/)
    . However, there are other faucets in case this one ceases to exist. The first
    step is to send coins to your wallet. First generate a new P2PKH wallet address
    using the following command:


    ```

    > bitcoin-cli getnewaddress "" legacy

    mnMs77edsGV8VKwtB3d7fsnvrNuZ8ECKfh

    ```


    As you can see, the output you receive is the public key that you can use to receive
    funds. Next, paste that address into [`https://coinfaucet.eu`](https://coinfaucet.eu)
    , choose “Bitcoin testnet,” verify you are not a robot, and click the “Get bitcoins!”
    button, as shown in Figure [4-2](#475651_1_En_4_Chapter.xhtml#Fig2).


    ![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig2_HTML.jpg](images/475651_1_En_4_Chapter/475651_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Coin testnet faucet, requesting funds for testing


    Once the coins have been sent to your wallet, you receive a confirmation with
    the `tx` number, as shown in Figure [4-3](#475651_1_En_4_Chapter.xhtml#Fig3).


    ![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig3_HTML.jpg](images/475651_1_En_4_Chapter/475651_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Coin testnet faucet, bitcoins have been sent


    ### Note


    Keep in mind that these faucet testnet sites often go offline, and you may need
    to find a new faucet testnet site. For your convenience, here is another one that
    is working at the time of writing: [`https://testnet-faucet.mempool.co/`](https://testnet-faucet.mempool.co/)
    .


    ### Viewing Transactions on Block Explorer


    On the testnet faucet, you can monitor the bitcoins that have been sent just as
    can be done on the maintest production bitcoin’s blockchain. This is done in the
    testnet Blockchain Explorer; see the “tx” link, as shown in Figure [4-3](#475651_1_En_4_Chapter.xhtml#Fig3).
    As you recall, “tx ID” stands for the transaction ID. Alternatively, you can paste
    that transaction ID directly into the Block Explorer at [`https://live.blockcypher.com/btc-testnet/`](https://live.blockcypher.com/btc-testnet/)
    . See Figure [4-4](#475651_1_En_4_Chapter.xhtml#Fig4).


    ![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig4_HTML.jpg](images/475651_1_En_4_Chapter/475651_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    Viewing transaction information on live.blockcypher.com


    In fact, every transaction that ever occurs on the blockchain is publicly available
    to view by anyone in the Blockchain Explorer; that includes all the transaction
    data except for the users’ private keys. Although the transaction data is publicly
    available, the identifying information about the owner is not public information
    and is not needed to perform transactions. What connects the user to the coins
    you send is the private key associated with the public key.


    Similarly, you can do the same check of information via the RPC command line.
    You already know how to check your wallet’s balance, as shown here:


    ```

    > bitcoin-cli getbalance

    0.0000000

    ```


    When coins have been received, they will not be available to spend until the transaction
    has been confirmed by the mined blocks’ confirmations. That’s why if you check
    your balance right away, it will still show 0.


    You will be able to see the coins as unconfirmed via the `getunconfirmedbalance`
    command right after your transaction is included in the next block. To check,
    run the `getunconfirmedbalance` command.


    ```

    > bitcoin-cli getunconfirmedbalance

    0.10413028

    ```


    Once you have enough confirmations, the `getbalance` command will show your new
    balance, and `getunconfirmedbalance` will show 0.


    Similarly, you can be more specific and request the minimum confirmations to be
    2.


    ```

    > bitcoin-cli getbalance "*" 2

    ```


    ### Note


    A transaction stays “unconfirmed” until the next new block is created. Once the
    new block is created, the new transaction is verified and included in that block.
    Now, the transaction will have one confirmation. About ten minutes pass, and a
    new block is created, and the transaction is confirmed again. Each confirmation
    increases the safety of the transaction, and the chances of the transaction being
    reversed decrease. The norm on exchanges is that four to six confirmations are
    required to allow you to use the coins; it may be wise to wait for even sixty
    confirmations for large amounts of coins, which takes about ten hours.


    Another useful command is the `listtransactions` command; it provides the full
    list of transaction data related to your wallet.


    ```

    > bitcoin-cli listtransactions

    [

    {

    "address": "mnMs77edsGV8VKwtB3d7fsnvrNuZ8ECKfh",

    "category": "receive",

    "amount": 0.10413028,

    "label": "",

    "vout": 0,

    "confirmations": 420,

    "blockhash": "0000000000125d2714882704562c8442a6700c58a41cad0b4108305474be3bb1",

    "blockindex": 4,

    "blocktime": 1541783585,

    "txid": "645a34a5cbdd66b126e6f81560dc79957c6e1a175a68f8ad23ca7fd38046df85",

    "walletconflicts": [

    ],

    "time": 1541783585,

    "timereceived": 1541890511,

    "bip125-replaceable": "no"

    }

    ]

    ```'
