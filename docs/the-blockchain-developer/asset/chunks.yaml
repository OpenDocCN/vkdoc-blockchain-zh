- fmt: "### Starting the “hello-network” Business Network and Admin Card\n\nTo run\
    \ your “hello-network” network, run the following command, and see the output\
    \ in Figure [8-26](#475651_1_En_8_Chapter.xhtml#Fig26):\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig26_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig26_HTML.jpg)\n\
    \nFigure 8-26  \nStarting the business network\n\n```\n> composer network start\
    \ --networkName hello-network --networkVersion 0.0.2-deploy.3 -A admin -S adminpw\
    \ -c PeerAdmin@hlfv1 --file networkadmin.card\n```\n\nTo confirm this worked,\
    \ you can run the `docker ps` command. You should see the `dev-peer0.org1.example.com-hello-network-0.0.2-deploy.3-0`\
    \ image created, as shown in Figure [8-27](#475651_1_En_8_Chapter.xhtml#Fig27).\n\
    \n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig27_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig27_HTML.jpg)\n\
    \nFigure 8-27  \nDocker container hello-network\n\n```\n> docker ps\n```\n\n###\
    \ Importing a Business Card\n\nNext, import a new network admin card so you can\
    \ use `admin@hello-network` in the business network you started.\n\n```\n> composer\
    \ card import --file networkadmin.card\n```\n\nThis command imports the network\
    \ admin card, which will include `admin@hello-network`.\n\n```\n> composer network\
    \ ping --card admin@hello-network\n```\n\nYou can compare your output with mine,\
    \ which is shown in Figure [8-28](#475651_1_En_8_Chapter.xhtml#Fig28).\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig28_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig28_HTML.jpg)\n\
    \nFigure 8-28  \nImporting the business network card\n\n## Where to Go from Here\n\
    \nFrom here you can choose from many passport strategies for your users. For example,\
    \ you can use Google OAUTH2.0, SAML, `Passport-JWT`, or LDAP, depending on what\
    \ your organization is using.\n\nThen you will be able to run a REST server in\
    \ multiuser mode and test the interaction with a client application such as the\
    \ one you created.\n\nHere are couple of articles that can help you with the process\
    \ of setting up your app for authenticating multiple users:\n\n*   `Passport-JWT`:\
    \ [`https://hyperledger.github.io/composer/latest/tutorials/google_oauth2_rest`](https://hyperledger.github.io/composer/latest/tutorials/google_oauth2_rest)\n\
    *   Google OAUTH2.0: `hyperledger/fabric-ca docker hyperledger/fabric-orderer\
    \ hyperledger/fabric-peer hyperledger/fabric-ccenv hyperledger/fabric-couchdb`\n\
    \nHyperledger is a large project, and it consists of five major platforms as well\
    \ as five major tools. This chapter focused only on Hyperledger Fabric. However,\
    \ you are encouraged to continue experimenting with other Hyperledger platforms\
    \ and tools such as Hyperledger Sawtooth, including setting up an environment,\
    \ creating an account, writing a more complex chaincode, and deploying as well\
    \ as connecting your chaincode to a dapp.\n\nTo get more information on getting\
    \ started, visit the official web site here: [`https://sawtooth.hyperledger.org/docs/seth/releases/latest/getting_started.html`](https://sawtooth.hyperledger.org/docs/seth/releases/latest/getting_started.html).\n\
    \nIn fact, you can find more information about all the platforms and tools here:\
    \ [`https://www.hyperledger.org/`](https://www.hyperledger.org/).\n\nLastly, bookmark\
    \ the Hyperledger dev center here: [`https://developer.ibm.com/technologies/blockchain/`](https://developer.ibm.com/technologies/blockchain/).\n\
    \n## Error Troubleshooting\n\nHyperledger was built to be plain and allows you\
    \ to stitch together modules on many different machines, but not without problems.\
    \ Hyperledger is set up for more advanced users and may request system admin privileges\
    \ to set up servers. You may have encountered a few errors, so here I have compiled\
    \ them into this section.\n\n### Composer Runtime Install Error or Card Not Found\n\
    \nIf you get errors such as these:\n\n*   “composer runtime install error card\
    \ not found peerAdmin”\n*   “Error: Card not found: `PeerAdmin@hlfv1`”\n\nit’s\
    \ because the admin ID card was not created successfully or the correct process\
    \ wasn’t followed; all you need to do is remove the ID card and re-create it.\
    \ You need to remove the `composer` folder, create a new folder, and run the command\
    \ again.\n\n```\n> rm -rf ~/.composer\n> mkdir ~/.composer\n> ./createPeerAdminCard.sh\n\
    ```\n\n### Docker Unauthorized Authentication Required Error\n\nYou may get the\
    \ following error while downloading Hyperledger Fabric:\n\n*   “unauthorized:\
    \ authentication required”\n\nThere are issues with authenticating or proxying\
    \ to Docker Hub and not Hyperledger Fabric.\n\nTo try to fix this, set your computer\
    \ time to match UTC time zone: [`https://www.timeanddate.com/worldclock/timezone/utc`](https://www.timeanddate.com/worldclock/timezone/utc).\n\
    \nCreate an account with Docker at [`https://hub.docker.com`](https://hub.docker.com),\
    \ and then log in.\n\n```\n> docker login\n```\n\nAlternatively, try again after\
    \ you logged out.\n\n```\n> docker logout\n```\n\n### Docker Container Conflicting\
    \ Errors\n\nWhen you are using the Docker container for a project, you might need\
    \ to re-create a container or stop a container; otherwise, you may get conflicting\
    \ errors.\n\nAll you need to do is stop and remove the container.\n\n```\n> docker\
    \ stop [container id]\n> docker rm [container id]\n```\n\n### Tip\n\nIf you already\
    \ created a Mongo-Docker container or any other Docker container that creates\
    \ a conflict, you will get the following conflict error when you try to create\
    \ a new one: “The container name is already in use by container [container id].”\
    \ All you need to do is stop the container and remove it.\n\n```\n> docker stop\
    \ [container id]\n> docker rm [container id]\n```\n\n### Mismatch and Cleanup\n\
    \nIf you have a mismatch between Hyperledger Composer and Hyperledger Fabric versions,\
    \ you may get the following error:\n\n*   “Starting business network definition.\
    \ This may take a minute... Error: Error trying to start business network. Error:\
    \ Failed to connect to any peer event hubs. It is required that at least 1 event\
    \ hub has been connected to receive the commit event Command failed.”\n\nThis\
    \ error is also generated on Hyperledger Fabric 1.2 with Hyperledger Composer\
    \ 0.20.6 because there is an open bug. To fix this, you need to check your Hyperledger\
    \ Composer and uninstall through `npm`, as well as re-install Hyperledger Fabric.\n\
    \nAdditionally, if you need to completely clean up, you need to stop and tear\
    \ down Fabric. To remove the Docker images, remove `fabric-dev-servers`, and lastly\
    \ remove Composer, follow this process:\n\n```\n> cd ~/fabric-tools\n> ./stopFabric.sh\n\
    > ./teardownFabric.sh\n```\n\nNext, stop the Docker containers, remove them, and\
    \ also remove all the Docker images by running these commands:\n\n```\n> docker\
    \ kill $(docker ps -q)\n> docker rm $(docker ps -a -q) –f\n> docker rmi $(docker\
    \ images -q) -f\n```\n\nYou can now completely remove `fabric-dev-servers`.\n\n\
    ```\n> rm -rf ~/fabric-dev-servers\n```\n\nTo remove Composer and admin ID card,\
    \ run these commands:\n\n```\n> sudo rm -rf ~/.composer\n> npm uninstall -g composer-cli\n\
    ```\n\nThe `npm uninstall` command will output a confirmation that the library\
    \ was uninstalled."
