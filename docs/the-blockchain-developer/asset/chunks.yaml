    \ and destroy the miner. This can be achieved by turning off the\nfans if the\
    \ victims don’t infect other devices or pay a bitcoin ransom,\nas shown in Figure\
    \ [11-4](#475651_1_En_11_Chapter.xhtml#Fig4). So far, only\nbitcoin and litecoin\
