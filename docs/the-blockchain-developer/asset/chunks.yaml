    **挖出一个新区块**


    与比特币每 10 分钟生成一个区块不同，你的区块链将进行改进，每 30 秒生成一个区块。为了实现这一点，你已经安装了用于 Node.js 的开源 `cron`
    库。`cron` 库的工作原理与 Linux 的 `cron` 相同。你可以利用 `cron` 库来设置每隔多久再次调用同一段代码，这里将用于每 30 秒调用你的矿工。

