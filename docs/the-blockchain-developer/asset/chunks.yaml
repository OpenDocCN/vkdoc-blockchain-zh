    *.*


    As you can see, you can then receive coins just as you did via the command line.
    Next, you will send some coins.


    You will be sending 0.01 BTC back to the testnet faucet for other developers to
    use. To do so, click the Send button at the top of the GUI and paste in the testnet
    faucet wallet address that was provided to you when you sent coins to your wallet.


    Notice that there is a Choose button next to Transaction Fee in the bitcoin core
    wallet GUI. This allows you to select the fee, as well as the number of confirmations.
    It also includes a way to enable a “replace by” fee. This feature allows you to
    change the fee in case the fee is too low and the transaction is not getting included
    in the block. See Figure [4-8](#475651_1_En_4_Chapter.xhtml#Fig8).


    ![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig8_HTML.jpg](images/475651_1_En_4_Chapter/475651_1_En_4_Fig8_HTML.jpg)


    Figure 4-8


    Bitcoin core wallet send screen


    The testnet faucet sends coins to the wallet address you provided. When you send
    and receive coins, you get a notification pop-up from the GUI and an updated balance
    on the overview screen. Click the Transactions button to see the transaction’s
    information. You can also click each transaction to see the actual transaction
    data. This is similar to what you saw with the `listtransactions` command. See
    Figure [4-9](#475651_1_En_4_Chapter.xhtml#Fig9).


    ![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig9_HTML.jpg](images/475651_1_En_4_Chapter/475651_1_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Bitcoin core wallet transaction


    #### Raw Transaction


    So far you have received one transaction into your wallet via the command line
    as well as coins using the bitcoin core GUI. You also were able to view confirmations,
    the fees balance, and transactions. If you send funds back to the testnet faucet
    and receive coins, things are simple. This is called a one-input, one-output transaction,
    as you have one sender and one receiver, and you spent the same amount you received
    (minus the fees). In real life, transactions can become more complex as there
    are many use cases where there are one input and multiple outputs or multiple
    inputs and multiple outputs. Bitcoin core provides you with sets of commands to
    access a raw transaction (`RawTransaction`) so you can have more granular control
    over your transaction.


    You will start with the simple one-input, one-output transaction via the RPC command
    line.


    ### Note


    Creating and understanding `RawTransaction` is useful for building software, as
    you have full granular control over your transaction. However, making mistakes
    can result in a catastrophic outcome and loss of coins, so use caution and double-check
    everything before sending any funds.


    When you receive a transaction, the transaction stays in a state called *unspent
    transaction output* (UTXO) in your wallet. To send a one-input, one-output transaction,
    you need your amount to be equal to the funds you want to send. You can then generate
    a new UTXO for the receiver you are sending the coins to. The receiver can use
    these UTXOs to send transactions to a new receiver or receivers, and this process
    can continue endlessly.


    ### Note


    A UTXO is an individual incoming coin transaction in your wallet. When you receive
    multiple transactions to one or multiple wallets’ addresses, each stays as a UTXO,
    so you will have multiple UTXOs. To create a new outgoing transaction, you collect
    one or more UTXOs as needed depending on how much you are trying to send.


    Now, what if your UTXO includes a larger amount than you would like to spend?
    Then you would need to send the remaining of the coins back to your wallet. To
    get a list of unspent coins, you can use the `listunspent` command.


    Close the bitcoin core GUI wallet via Control+C and start the daemon again with
    the testnet flag.


    ```

    > bitcoind -testnet

    ```


    When you run the `getbalance` command, you get your wallet’s balance, which includes
    the two transactions you received from [`https://live.blockcypher.com/btc-testnet/`](https://live.blockcypher.com/btc-testnet/)
    less the transaction you sent back to the testnet faucet.


    ```

    > bitcoin-cli getbalance

    0.18505841

    ```


    I would like to point out that at any time you can use the `-named` flag instead
    of using order arguments. The named argument is useful to ensure you are not making
    mistakes when working with mainnet. For instance, a `getbalance` command with
    the named argument would look as follows:


    ```

    > bitcoin-cli -named getbalance minconf=2

    0.18505841

    ```


    Next, let’s take a look at the `listunspent` command. As the name suggests, it
    returns JSON with transactions for coins you did not spend, in other words, your
    UTXOs. The `listunspent` command also returns JSON with a variable called `vout`
    , which represents the index number of the output in a transaction.'
  trans: "\n### 通过比特币核心钱包图形界面发送测试网币\n\n你已使用 `testnet` 标志初始化了一个比特币核心实例；不过，还有一种更简便的收发币方式。比特币核心包含一个图形界面钱包可供使用。你将使用比特币核心自带的图形界面软件。要开始操作，请在终端中按下\
    \ `Control+C` 终止 `bitcoind` 守护进程，然后在命令行终端中运行带有 `testnet` 标志的 `bitcoin-qt`，以便连接到测试网而非主网。\n\
    \n```bash\n> bitcoin-qt –testnet\n```\n\n此命令将打开一个新窗口，并与测试网区块链同步。与之前一样，如果你尚未完成测试网同步，根据你的网络连接情况，可能需要数小时，如图\
    \ 4-5 所示。不过，在钱包图形界面中，你会看到同步所需的预估时间。\n\n![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig5_HTML.jpg](img/475651_1_En_4_Fig5_HTML.jpg)\n\
    \n*图 4-5* —— 比特币钱包测试网图形界面与测试网网络同步\n\n和之前一样，你需要等待同步完成；只有这样你才能获取钱包的公钥地址并花费你的币。在“总览”菜单中，你会看到余额，包括已确认（可用）资金和未确认（待处理）资金。你还可以点击顶部的“交易”按钮获取交易列表。参见图\
