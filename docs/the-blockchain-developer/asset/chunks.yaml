    Follow the OWASP IoT testing guide and OWASP IoT testing handout recommendations:


    - Print and follow: [https://www.owasp.org/images/2/2d/Iot_testing_methodology.JPG](https://www.owasp.org/images/2/2d/Iot_testing_methodology.JPG)

    - Follow this checklist: [`www.owasp.org/index.php/IoT_Testing_Guides`](http://www.owasp.org/index.php/IoT_Testing_Guides)


    During the discover, audit, and test phases, you most likely will find small to
    major vulnerabilities that may require you to go back to the coding phase and
    rinse and repeat this process until your platform passes all the tests.


    ## Readiness Assessment


    Once your platform passes the discover, audit, and test phases, you are ready
    to take an in-depth look at the technical aspects of the blockchain application
    to ensure security and compliance have been implemented. That is done by running
    a security and compliance assessment manually.


    ## Security and Compliance Assessment


    This assessment builds upon the vulnerability assessments you did in previous
    phases. Prior to release, it’s recommended that you add a manual verification
    step to confirm that industry and/or internal security standards have been applied
    to your platform and assess the risks and exposure. This phase should also include
    the security readiness concerns I discussed in the first part of this chapter.


    In addition, verification could examine the following:


    - Checking authorized access to your platform and confirming system settings

    - Examining platform and server logs

    - Ensuring compliance with current regulations

    - Checking and tracking error codes and messages

    - Examining the latest privacy and laws

    - Examining the design and architecture documents to ensure the code meets these
    requirements

    - Performing a code review


    Keep in mind that the security and compliance assessment is the bigger picture,
    and you shouldn’t be looking at specific exposure of just one vulnerability. Instead,
    look at the platform as a whole. The assessments may find additional risks and
    exposures that are not acceptable, which will require you to go back to the design
    and coding phase and start this process all over again.


    ## Release


    Once your platform has passed the readiness assessment phase, publish your platform.
    It’s advised to run the same tests and checks again on the actual production code
    to ensure the platform is still passing the tests and assessments. Once you have
    completed this cycle, you can rinse and repeat this process for your new development
    cycle.


    ## Where to Go from Here


    - A good resource with links related to blockchain security is available online:
    [`https://github.com/1522402210/BlockChain-Security-List`](https://github.com/1522402210/BlockChain-Security-List).

    - Create a compliance and security checklist, taking into account your specific
    platform and locale.

    - If you have a platform/site, run the audit and automated testing tool on your
    existing platform or site.


    ## Summary


    In this chapter, I broke down the security and compliance of the blockchain process
    into three parts: security readiness, common blockchain attacks, and a recommended
    development cycle. The first part served as an introduction so you could better
    understand the terms and mind-set of building a secure platform. I covered security
    testing and compliance readiness, looking specifically at the United States and
    the Europe Union compliance requirements as examples. I covered security readiness
    recommendations to take into account during the design and coding phase. Then
    I covered common blockchain attacks that resulted in billions of dollars in losses.
    These attacks were targeting mostly crypto wallets, but also blockchain networks
    and blockchain-based platforms. Lastly, I gave you a recommended development cycle
    to ensure you take into account all the needed security and compliance issues.


    In the next and last chapter, you will explore blockchain beyond just crypto.
    I will cover the power of blockchain and how it can be harnessed, as well as the
    decentralization of specific industries, examining a few industries being disrupted
    by blockchain and specific case studies.


    # 12. Blockchain Beyond Crypto


    As you are approaching the last pages of this book, I wanted to inspire you and
    help you see what’s possible in the coming years from the blockchain technology.
    Crypto paved the way by providing an alternative to fiat currency with the introduction
    of bitcoin. Although the invention of bitcoin was more than a decade ago (it was
    introduced in 2008), blockchain is still in its infancy. However, it’s poised
    to potentially become one the most useful technological innovations of the 21st
    century.


    With that said, the road for technological integration and adoption by the masses
    is still long and bumpy, and blockchain has already experienced multiple ups and
    downs, driven by financial speculation, security, performance, trust, scalability,
    and regulation (not to mention crypto attacks from charlatans and hackers). These
    concerns have caused many to become skeptics. Despite all this, blockchain cannot
    be ignored. It has the potential to improve all industries and become as big of
    a globalized technological innovation as the Internet or the fax machine.


    The potential of blockchain has been recognized by many, and in fact, in 2019
    alone, companies are expected to invest more than $3 billion in blockchain technologies.
    By examining the current projects in development, the bigger picture shows that
    cryptocurrency is not the final frontier but just the beginning, because many
    blockchain projects are expanding beyond just cryptocurrency and disrupting more
    than just fiat currencies.


    In fact, many large corporations are incorporating blockchain technologies into
    their systems in one way or another. Hundreds of startups are slowly entering
    the mainstream, the potential utilization of blockchain technology seems limitless,
    and in many cases, blockchain opens up new potential revenue streams and new business
    models.


    > “We’ll all look back in 20 years and conclude that bitcoin was an influential
    platform for innovation as the Internet itself was.”

    > —Marc Andreessen


    This chapter is broken into two parts. First I will cover how blockchain can be
    harnessed and expand on what’s possible when utilizing elements of blockchain
    technologies. Then I will cover the decentralization of industries by discussing
    a few industries being disrupted by blockchain and by showing specific case studies.
    Understanding the power and capabilities of blockchain technology and the technological
    innovations can give you insight into how you can harness the blockchain technological
    innovations for your own new greenfield project or an existing project and industry.


    ## Harnessing Blockchain'
