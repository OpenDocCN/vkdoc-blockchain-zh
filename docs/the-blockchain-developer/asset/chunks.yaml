- fmt: "**Wallet Cyberattacks**\n\nKeep in mind that although I have broken the process\
    \ down into three categories, most of these attacks use different techniques and\
    \ different targets but have the same goal of capturing crypto private keys.\n\
    \nIn this section, I will review specific cyber attacks directed at crypto wallets.\
    \ As I highlighted at the beginning of this chapter, once crypto funds are transferred,\
    \ it’s not easy to track them down as they can be transferred from one wallet\
    \ to another, and the transfer is irreversible, unless the majority of peers on\
    \ the network agree to change the block.\n\n> *“For every lock, there is someone\
    \ out there trying pick it or break in.”*\n>\n> —David Bernstein\n\nCommon wallet\
    \ attacks can come in many shapes and forms by producing the same result of the\
    \ user losing their private keys. The attacker often starts as a “phishing attack”\
    \ resulting in a user’s confidential information being compromised, and then the\
    \ perpetrator is able to transfer funds out of the account.\n\n**Note**  \nA *phishing\
    \ attack* (think fishing for information) is an attempt to fraudulently capture\
    \ a user’s confidential information such as usernames, passwords, account numbers,\
    \ and so on. This is done by using electronic communication such as e-mail to\
    \ disguise the attacker as a trustworthy entity.\n\nIn fact, other than crypto\
    \ scams such as Bitconnect and iFan, wallet-related theft has resulted in the\
    \ second biggest losses in crypto assets, amounting to close to $5 billion (see\
    \ Figure 11-1).\n\n![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig1_HTML.jpg](images/475651_1_En_11_Chapter/475651_1_En_11_Fig1_HTML.jpg)\n\
    \n**Figure 11-1** Biggest crypto theft incidents\n\nThe best solution against\
    \ a wallet attack is removing cryptocurrency from exchanges altogether when not\
    \ in use and placing these cryptos in your own “cold wallet” centralized storage.\
    \ This can be achieved with hardware wallets such as `Nano`, `Trezor`, `KeepKey`,\
    \ and so on. Moving crypto to a cold wallet gives you the highest level of protection\
    \ and avoids exchange losses such as the Mt. Gox incidents where the admin’s password\
    \ was cracked and many users lost their wallet keys.\n\n**Note**  \n*Cold storage*\
    \ is a method of keeping crypto’s private keys on a USB drive, paper wallet, or\
    \ other data storage medium in a safe location. Think of it as being your own\
    \ bank.\n\nIn the next section, you will be looking at common wallet attacks.\
    \ I will provide a postmortem analysis to help ensure you don’t repeat the same\
    \ mistakes others did, both as a developer and as a user.\n\n## Online Wallet\
    \ Phishing-Malware Attacks\n\nOnline wallets are more prone to attacks than offline\
    \ wallets as they are connected to the Internet. For instance, a phishing-malware\
    \ attack was carried out recently against `Electrum`’s wallet and caused more\
    \ than $1 million in losses.\n\n**Note**  \nMalware comes from a mashup of the\
    \ words *malicious* and *software*. The software is built to disrupt, damage,\
    \ or gain access to the victim computer.\n\nThis was done by the hacker setting\
    \ up malicious servers; then when a user wallet got connected to one of those\
    \ servers and tried to send a BTC transaction, the attacker’s code showed an official-looking\
    \ message telling the user they needed to update their `Electrum` wallet, along\
    \ with a false URL to download a fake version of `Electrum`’s wallet with malware.\n\
    \nOnce the user used the attacker URL and downloaded the new fake version of `Electrum`,\
    \ the wallet requested the user to re-enter their passwords, which was then sent\
    \ to the hacker. Then the hacker was equipped with the login information of the\
    \ user and was able to log into the real `Electrum`’s wallet and transfer the\
    \ user’s private keys into their own wallet.\n\n### Postmortem\n\nAs a user, besides\
    \ avoiding online wallets altogether and using cold storage, you can reduce the\
    \ risk by doing the following:\n\n*   *Download only official software*: Do not\
    \ download online wallets or upgrade from any other source other than the wallet’s\
    \ official web site. Check URLs by hovering over links but not clicking them.\
    \ Especially check for small misspelling; see if you can notice the little misspellings\
    \ here: `paypaI.com`, `Electrom.com`.\n*   *Protect your information*: Be careful\
    \ with information shared via e-mail. E-mails requesting that you confirm your\
    \ account credentials need to be sent from the business you recognize and by you\
    \ initiating the request.\n*   *Ensure authentication*: Download the wallet’s\
    \ software and check the GPG signature. Never give away your crypto assets’ private\
    \ keys to any “official” representative.\n*   *Recognize false support phone number*:\
    \ Often companies that are phishing for your information use a fake support number.\
    \ Many do a Google search to find the phone number of companies and fall victim\
    \ of this attack.\n\nAs a developer, you should do the following:\n\n*   *Use\
    \ GPG signature verification*: Implement GPG signature verification.\n\n> **Tip**\
    \  \n> `GPG`/`GNU` is a suite of cryptographic software used in encryption to\
    \ ensure authenticity by checking signatures against the downloaded files. To\
    \ ensure the prevention of wallet attacks, implement `GPG` or GNU Privacy Guard.\
    \ As a user, don’t forget to also check that the actual `GPG`/`GNU` itself is\
    \ authenticated and from the developer.\n\n*   *Educate your users*: Set pages,\
    \ video tutorials, and blog posts to educate your users and prevent users from\
    \ making common mistakes.\n\n## Keylogger Malware\n\nMost malware software intends\
    \ to harm your computer. Popular malware software that can be used to extract\
    \ your cryptos is a keylogger or screen scraper. This software records everything\
    \ you type as well as takes screenshots of your computer in an attempt to capture\
    \ passwords and personal information. These types of attacks are less likely to\
    \ happen at home, as the attacker needs to attach an actual Universal Serial Bus\
    \ (USB) key to your computer to record the key log; however, this can happen when\
    \ you use a public computer, for example, at a hotel lobby or a library.\n\n###\
    \ Postmortem\n\nAs mentioned, at home you are less likely to be attacked by a\
    \ keylogger; however, when logging into a public computer, be cautious, check\
    \ if there is a USB key attached to that computer, and avoid accessing your important\
    \ accounts. At your own computer, on a Mac, check Activity Monitor to ensure you\
    \ recognize all the services that are running in the background. If needed, do\
    \ a web search to find any services you don’t recognize, and if anything looks\
    \ odd, stop and remove the service and app. Install antivirus software and re-install\
    \ your OS if in doubt.\n\n## Dust Attack\n\nA dust attack is done by the attacker\
    \ sending a tiny (dust) transaction that the hackers use either to spam the blockchain\
    \ network and take up a block space or to mark the targeted addresses in hopes\
    \ that the user transacts these cryptos, which can help the attacker identify\
    \ a user’s personal information by tracing the transaction history.\n\n### Postmortem\n\
    \nAs a user, do not spend unrecognized transactions.  \nAs a developer, implement\
    \ a coin control feature so unrecognized transactions can be marked as “Do Not\
    \ Spend” and not be included with your transactions.  \nRead the privacy document\
    \ regarding bitcoin, which provides valuable information regarding protecting\
    \ privacy that can apply to many scenarios: [`https://en.bitcoin.it/wiki/Privacy`](https://en.bitcoin.it/wiki/Privacy).\n\
    \n## Hot Wallet Attack\n\nIn a hot wallet attack, the attacker retrieves the wallet’s\
    \ private keys from a “hot wallet” where the private keys are stored online by\
    \ way of phishing, password cracking, or any other method. Once the private keys\
    \ are pulled from an online network, attackers can transfer these keys to their\
    \ own wallet."
