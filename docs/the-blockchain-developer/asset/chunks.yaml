    在本练习中，你成功生成了创世区块，并创建了通过发送消息请求来请求和接收区块的机制。请求和接收区块的能力使你可以同步新加入 P2P 网络的节点。在创建创世区块后，你还需要同步任何额外生成的区块。


    ## 注册矿工并创建新区块


    到目前为止，你已经拥有一个基础的 P2P 网络，能够连接网络中的节点、创建创世区块以及发送和接收区块。下一步是能够生成新区块。正如你在第 2 章所见，工作量证明（PoW）基于创建一个数学难题，并奖励最先找到解决方案的矿工。但是，在本示例中，你将采用权益证明（PoS）的方法，即信任每个矿工来生成区块。每个节点将注册为矿工，并轮流挖矿。图
    3-5 概述了每个矿工生成区块的过程。


    ![../images/475651_1_En_3_Chapter/475651_1_En_3_Fig5_HTML.jpg](img/475651_1_En_3_Fig5_HTML.jpg)


