  trans: "\n# 排版后的文本\n\n*Silentnotary*（[*https://silentnotary.com*](https://silentnotary.com)）、*Dnote*（[*www.dnote.online*](http://www.dnote.online)）以及\
    \ *Blocknotary*（[*https://www.blocknotary.com*](https://www.blocknotary.com)）：这些只是提供去中心化公证服务的公司中的几个例子。其概念类似于“存在性证明”。该公司负责验证身份，并利用区块链的时间戳属性来验证文件。区块链会记录某个特定时间点的哈希值，从而能够用于确认某个事物在该时间点的存在性。该时间戳可在法庭上使用，其效力与传统公证相同。这些服务可以消除对实体公证人的需求。事实上，许多州如亚利桑那州、佛罗里达州、肯塔基州、路易斯安那州、内布拉斯加州和内华达州，已经接受电子公证契约。\n\
    \n*ShelterZoom*（[*https://www.shelterzoom.com*](https://www.shelterzoom.com)）：这家公司面向买家、卖家和租客。交易通过以太坊的智能合约完成。\n\
    \n*StreetWire*（[*http://www.streetwire.net/*](http://www.streetwire.net/)）：这家公司将实体房地产资产代币化，并提供数据管理服务。\n\
    \n## 移动端\n\n基于区块链的服务能够惠及用户，并解决与移动设备相关的痛点。以下是一些例子：\n\n*   **隐私**：全球各地的用户对隐私的缺失感到厌倦，因为社交媒体、电信和互联网公司利用用户数据并分享数据获利，以此占用户的便宜。\n\
    *   **去中心化应用（Dapps）**：支持去中心化应用可以让用户访问大量新服务，而无需受移动应用商店的审查。\n*   **收入**：手机可以通过挖矿、撰写评论赚取代币等方式产生收入，从而减少用户的月度账单。\n\
    \n事实上，移动行业已经认识到其潜力，并正在利用区块链为用户提供更多控制权、价值和隐私，许多知名公司今年已登上了头条新闻。\n\n> “电信和互联网公司通过控制数据获得了巨大价值。通过将应用去中心化，我们可以将这些数据置于智能合约中，有效地将控制权交还给创作者和用户。”以及“许多我们称之为点对点或‘去中心化’的服务，仍然建立在中心化网络之上。我们正在改变这一点。”\n\
    >\n> ——Pundi X 创始人兼首席执行官 Zac Cheah\n\n以下是一些案例研究：\n\n*   *Electroneum*（[*https://electroneum.com/m1/*](https://electroneum.com/m1/)）：这是来自名为\
    \ Electroneum 的公司的一款新手机。它具有以下特点：\n    *   **ETN 云挖矿**：用户通过运行云挖矿应用，每月最多可挖取价值 3\
    \ 美元的 ETN。\n    *   **低廉价格**：其售价低至 80 美元。\n    *   **硬件/软件**：这是一款安卓设备，运行 8.1 Go\
    \ 版本系统，搭载四核 1.3GHz CPU，支持 4G 宽带蜂窝网络技术和双 SIM 卡。\n*   *HTC*（[*https://www.htc.com/*](https://www.htc.com/)）：该手机支持多种去中心化应用。\n\
    *   *Pundi X*（[*https://pundix.com*](https://pundix.com)）：这家公司重新设计了其 XPhone，预计于\
    \ 2019 年底发布销售。它将包含以下特性：\n    *   **区块链模式**：服务可以独立于中心化运营商运行。用户无需中心化服务提供商，即可通过区块链节点路由电话、消息和数据。\n\
    \    *   **X 按钮**：允许用户切换到区块链模式。\n*   *三星 Galaxy S10*（[*https://www.samsung.com/us/mobile/galaxy-s10/*](https://www.samsung.com/us/mobile/galaxy-s10/)）：该手机包含以下特性：\n\
    \    *   **内置加密钱包**：具有私钥存储功能，支持比特币、以太坊、Cosmo Coin 和游戏加密货币 Enjin Coin。\n    * \
    \  **去中心化应用**：它开箱即支持去中心化应用。\n    *   **Cosmo 币 (COSM)**：支持 Cosmo 代币，该代币为韩国区块链提供动力。\n\
    \    *   **赚取代币**：用户可以通过在应用中撰写评论来赚取 Cosmo 代币。\n    *   **支付**：支持使用加密货币进行非接触式支付。\n\
    \n## 供应链\n\n通过将区块链作为私有的去中心化账本，企业可以在全球范围内更好地存储和使用自己的数据，从而大大受益。如您所见，区块链能够以一种不可篡改且诚实的方式来存储、监控和优化数据，这可以应用于供应链。供应链可以分解为以下要素：\n\
    \n*   **监管链**：您可以追溯资产的拥有权链条。\n*   **产品身份**：您可以将序列号或其他产品识别信息存储在区块链上，允许所有相关方（制造商、分销商、零售商和消费者）验证物品的真伪。跟踪供应链可以在许多方面提供帮助，例如消除假冒产品。\n\
    *   **监控**：您可以实时追踪从原材料到成品的供应链。\n\n以下是一些案例研究：\n\n*   *Blockverify*（[*www.blockverify.io*](http://www.blockverify.io)）：这家公司利用区块链采取防伪措施，通过识别假冒产品、防止产品复制，并使公司能够验证其产品并监控其供应链。\n\
    *   *英国航空*（[*https://www.britishairways.com*](https://www.britishairways.com)）：这家公司使用区块链来确保航班信息的准确性。它还在测试\
    \ VChain（[*https://www.vchain.tech*](https://www.vchain.tech)），这是一个用于替代安全检查的验证系统。\n\
    *   *Inxeption*（[*https://www.inxeption.com*](https://www.inxeption.com)）：UPS\
    \ 已与 Inxeption 平台合作，以改善商户的供应链。\n*   *马士基*（[*https://maersk.com/*](https://maersk.com/)）：这家全球最大的航运公司已与\
    \ IBM 合作，创建了一个 Hyperledger 区块链来监控船舶货物。\n*   *Tracr*（[*https://www.tracr.com*](https://www.tracr.com)）：全球最大的钻石生产商戴比尔斯利用区块链技术，为其注册钻石创建不可篡改且永久的数字记录，以减少冲突钻石（“血钻”）。\n\
    *   *沃尔玛*：这家公司正在使用区块链，允许其员工在商店的应用中扫描商品，并监控产品从制造到上架的全过程。\n\n## 加密消息传递\n\n在第 1 章中，我介绍了密码学，以及恩尼格玛密码机如何被用于军事通信中加密和解密消息。区块链源于消息传递，并且可用于发送可靠的加密消息。通过利用去中心化账本匿名发送消息、不发送用户隐私数据，甚至可以隐藏用户的\
    \ IP 地址，区块链可用于更新传统的端到端消息加密解决方案。\n\n以下是一些案例研究：\n\n*   *ADAMANT*（[*https://adamant.im*](https://adamant.im)）：这是一个开源的私人信使，并带有加密货币支付选项。参见\
    \ [*https://github.com/adamant-im*](https://github.com/adamant-im)。\n*   *Crypviser*（[*https://crypviser.network*](https://crypviser.network)）：这是一个私人消息平台。\n\
    *   *Matrix*（[*https://matrix.org/blog/home/*](https://matrix.org/blog/home/)）：这是一个拥有开源代码的聊天生态系统；参见\
    \ [*https://github.com/matrix-org/matrix.org*](https://github.com/matrix-org/matrix.org)。\n"
- fmt: '# Elections and Voting


    Voting manipulation and electoral integrity are real problems; attackers have
    been known to use techniques such as Sybil attack to manipulate elections. Not
    surprisingly, many times there are recounts, accusations of fraud, and distrust
    as the whole process is often vague. Voting requires the authentication of the
    voters’ identities and secure record keeping, vote tracking, and tallying.


    Blockchain has the potential to revolutionize how voters cast their votes and
    could expedite the speed of completing this process in an honest and open way.
    Blockchain tools could be used together as the infrastructure from start to finish.
    This could potentially eliminate the need for recounts and could build public
    trust in elections.


    `Voatz` and `Votem` both point to a few potential advantages of utilizing blockchain
    for voting.


    - **Verification**: Voters can verify that a vote was cast as intended and detect
    false results.

    - **Transparency**: Governments and independent outside parties can confirm a
    vote’s results as they are transparent when stored on a public blockchain.

    - **Security**: Instead of one centralized computer on a traditional server system,
    voting data on the blockchain is distributed on many nodes, making it harder to
    alter results like when hacking into a single system.


    Here are some case studies:


    - **FollowMyVote** ([https://followmyvote.com](https://followmyvote.com)): This
    is an election platform in beta.

    - **Voatz** ([https://voatz.com/](https://voatz.com/)): This company wants to
    make voting safer and more accessible. It has already teamed up with the City
    of Denver and West Virginia to offer a mobile voting pilot.

    - **Votem** ([https://votem.com](https://votem.com)): This voting platform is
    focused on mobile to secure votes in elections across the globe.


    # Marketing


    Traditional analysts combine data from different sources in a nontransparent way
    and then use the data in many ways such as to monetize data, make a prediction,
    make businesses decisions, and so on. However, if the data is false, the cost
    is high. False data gathering is estimated to cost more than $1 billion in losses
    every year.


    As you have seen, the blockchain ledger can include other data with the transactions
    in a precise and immutable manner. The data can then be used to support planning,
    analysis, and forecasting, as well as follow supply chains. Data can be captured
    more accurately with a blockchain decentralized ledger because it reduces human
    error and data alteration. Once marketing data is captured, it can be analyzed
    by many industries such as entertainment, sports, music, and finance as well as
    by machine learning algorithms.


    Using blockchain as an immutable database, where you can follow the chain of custody,
    is already in use in many of the blockchain industries covered in this chapter.
    In this section, I will highlight companies that focus on just the data aspect.
    The data can then be used for forecasting, leads, and decision-making.


    Online advertisers rely on pay-per-click rates, followers on social media, and
    analytics, and it can become a challenging task to verify the accuracy of statistics
    and ensure companies are billed correctly for advertisements. There have been
    many tracking and measurement miscalculations, causing businesses to overpay.
    The reason for the miscalculations is that the traffic sent can come from bots,
    artificially bolstering stats, or fake followers in security attacks such as a
    Sybil attack. These miscalculations have resulted in billions of dollars in losses
    in the advertising industry.


    Blockchain can record an encrypted and transparent chain of traffic (like chain
    of custody) to help determine whether the ads clicked and followers are coming
    from real audiences in a transparent way. Additionally, blockchain can help connect
    brands with influencers and reach consumers easier by offering an agreement based
    on a smart contract and immediate crypto payment.


    Here are some case studies:


    - **AdChain** ([https://metax.io/en/products/adchain_registry/](https://metax.io/en/products/adchain_registry/)):
    This is a community-curated list of ad-supported web sites to provide advertisers
    with a stamp of approval on the web sites best suited for serving their ads.

    - **Augur** ([https://www.augur.net](https://www.augur.net)): This is a prediction
    market protocol based on Ethereum, allowing users to forecast events. The platform
    incorporates a reward system for accurate predictions, enabling users to bet on
    everything including stocks, sports, presidential predictions, and more.

    - **BOOSTO** ([https://boosto.io/](https://boosto.io/)): This is a decentralized
    app store, where brands can ensure that partners are reaching the consumers that
    the brand requests. Smart contracts are used for agreements, and payment are made
    once the terms decided on by the parties involved have been met utilizing its
    own crypto.

    - **SWIPECrypto** ([https://www.swipecrypto.com/](https://www.swipecrypto.com/)):
    This data monetization platform includes a privacy and data sharing protocol,
    as well as governance layers that reward data entry.

    - **Wilbson** ([https://wibson.org](https://wibson.org)): This allows users to
    sell their private information for profit, while protecting privacy.'
