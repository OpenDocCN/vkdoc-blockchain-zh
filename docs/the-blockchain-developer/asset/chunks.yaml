- fmt: '# Create a Local NEO Private Testnet


    You can run your NeoContracts on public testnets just as you have done with other
    blockchains; however, it’s much better to run your own private testnet so you
    have full control of it. A private testnet can be on the cloud, but you will have
    to pay for the service provider, so it’s better if you set up your testnet on
    your local box.


    As evident by the documentation, the tools for NEO were primarily developed for
    PC users. However, because of the tools developed by the City of Zion community
    (CoZ, [`https://github.com/CityOfZion`](https://github.com/CityOfZion)), running
    a private chain is possible on any platform with Docker and Python.


    The steps you need to take to run a local NEO private testnet are as follows:


    1. *Install `neo-python`*: This allows you to run a full NEO node and to interact
    with the blockchain.

    2. *Create `neo-privatenet-docker`*: This allows you to run a whole NEO blockchain
    with four consensus nodes in a single, lightweight Docker container.

    3. *Create a NEO wallet*: This connects to the private net and creates a wallet.

    4. *Claim*: This is initially 100,000,000 NEO.

    5. *Bootstrap the testnet*: This synchronizes the network.


    ## Python 3.6


    `neo-python` needs Python 3.6 or later. Mac comes out of the box with Python,
    and you can verify you have `python3` installed via the `--version` command.


    ```

    > python3 --version

    Python 3.6.x

    ```


    If you are running a previous version of Python and need to install/re-install
    Python, follow these steps:


    ```

    > brew unlink python

    ```


    Next, install Python with Brew.


    ```

    > brew install --ignore-dependencies https://raw.githubusercontent.com/Homebrew/homebrew-core/f2a764ef944b1080be64bd88dca9a1d80130c558/Formula/python.rb

    ```


    Now switch the Python versions.


    ```

    > brew switch python 3.7.0

    > brew switch python 3.6.5_1

    ```


    In case you don’t have `pip` installed, run this:


    ```

    > curl -O https://bootstrap.pypa.io/get-pip.py

    > sudo python get-pip.py

    > pip

    ```


    ## Install `neo-python`


    Next, clone `neo-python` from the City of Zion and check out the development branch.


    ```

    > cd ~/Desktop

    > git clone https://github.com/CityOfZion/neo-python.git

    > cd neo-python

    > git checkout development

    ```


    You can create a virtual environment using Python 3.6 and then run the `activate`
    script.


    ```

    > python3.6 -m venv venv

    > source venv/bin/activate

    ```


    Ensure you have the latest `pip` version by running this command:


    ```

    (venv)> pip install --upgrade pip

    ```


    Now you can install the package in an editable form.


    ```

    (venv)> pip install -e .

    ```


    You can compare your output with mine; for the steps you took so far, see Figure
    [7-6](#475651_1_En_7_Chapter.xhtml#Fig6).


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig6_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig6_HTML.jpg)


    Figure 7-6 — `neo-python` installation output


    To confirm the installation went well, run the `--version` command. At the time
    of writing, it outputs version 0.8.3.


    ```

    > np-prompt --version

    neo-python v0.8.3-dev

    ```


    Now you can open a NEO bash with the `np-prompt` command. To exit bash, run the
    `exit` command.


    ```

    > np-prompt

    neo>exit

    ```


    ## Install `neo-privatenet-docker`


    You already installed Docker, so now you can create a Docker container that will
    create four NEO nodes to create a private testnet. Go ahead and install the Docker
    container on your desktop and build the files, as shown here:


    ```

    > cd ~/Desktop

    > git clone https://github.com/CityOfZion/neo-privatenet-docker.git

    > cd neo-privatenet-docker

    > ./docker_build.sh

    ```


    After the image is built, you can start a private network like this:


    ```

    > ./docker_run.sh

    Successfully built #build number

    ```


    ### Note


    If Docker needs to be restarted or is not running, run the following command:


    ```

    > ./docker_run.sh

    ```


    ## Start a Network and Claim Initial NEO and Gas


    Next, you will start your private network, create your wallet, and claim the initial
    NEO and 40 gas. This is done by running the `docker_run_and_create_wallet.sh`
    script. You can see the output in Figure [7-7](#475651_1_En_7_Chapter.xhtml#Fig7).


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig7_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig7_HTML.jpg)


    Figure 7-7 — `docker_run_and_create_wallet` script output


    ```

    > ./docker_run_and_create_wallet.sh

    ```


    Once the process is completed, you can get a confirmation of the two files that
    were created (see Figure [7-7](#475651_1_En_7_Chapter.xhtml#Fig7)).


    * `neo-privnet.wallet`: This file is a wallet that you can use with `neo-python`.

    * `neo-privnet.wif`: This file is a WIF private key you can import into other
    clients, such as `neo-gui`.


    These files give you access to the wallet containing the NEO and gas for your
    private network. The script automatically claimed the NEO and gas for you.


    You can check Docker and see the `neo-privnet` container running, as shown in
    Figure [7-8](#475651_1_En_7_Chapter.xhtml#Fig8).


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig8_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig8_HTML.jpg)


    Figure 7-8 — `neo-privnet` Docker container running


    ```

    > docker ps

    ```


    ## Bootstrapping the Testnet


    Now that you have a private testnet running, you need to bootstrap the testnet
    blockchain database. This synchronizes the network and is done by running `np-bootstrap`.
    This can take a while; once completed, you will get confirmation.


    ```

    > np-bootstrap -n

    confirm

    Successfully downloaded bootstrap chain!

    ```


    Notice that you use the `-n` flag to get database notifications.


    ## Start NEO Bash


    Now that you have your private testnet container running with four nodes and you
    bootstrap your testnet database, you can start a `neo-cli` bash by calling the
    `prompt.py` command.


    ```

    > cd ~/Desktop/neo-python/neo/bin

    > python3.6 prompt.py -p

    ```


    Once you run this command, the NEO bash opens, and you can use the `state` command
    to view information about the blockchain, as shown in Figure [7-9](#475651_1_En_7_Chapter.xhtml#Fig9).


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig9_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig9_HTML.jpg)


    Figure 7-9 — Information about your blockchain via the `state` command


    ```

    neo> state

    ```


    `neo-cli` offers access to many RPC calls via the NEO API; however, the wallet
    needs to be open to run these commands. You can open your wallet with the `wallet`
    command and the file location. This command will ask for the wallet’s password.
    For the password, use `coz`.


    ```

    neo> wallet open ~/Desktop/neo-privatenet-docker/neo-privnet.wallet

    password: coz

    ```


    Next, rebuild the wallet and call the `wallet` command. You will see the NEO and
    NeoGas fake testnet coins available (see Figure [7-10](#475651_1_En_7_Chapter.xhtml#Fig10)).


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig10_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig10_HTML.jpg)


    Figure 7-10 — `neo-privnet` wallet showing claimed coins


    ```

    neo> wallet rebuild

    neo> wallet

    ```


    To close the wallet and exit bash, use the `wallet close` command and exit.


    ```

    neo> wallet close

    neo> exit

    ```


    You have succeeded in creating a private NEO blockchain running on a testnet with
    100 million NEO and 40.0 NeoGas claimed coins that you can use for development.'
  raw: '## Create a Local NEO Private Testnet


    You can run your NeoContracts on public testnets just as you have done with other
    blockchains; however, it’s much better to run your own private testnet so you
    have full control of it. A private testnet can be on the cloud, but you will have
    to pay for the service provider, so it’s better if you set up your testnet on
    your local box.


    As evident by the documentation, the tools for NEO were primarily developed for
    PC users. However, because of the tools developed by the City of Zion community
    (CoZ, [`https://github.com/CityOfZion`](https://github.com/CityOfZion) ), running
    a private chain is possible on any platform with Docker and Python.


    The steps you need to take to run a local NEO private testnet are as follows:


    1.  *Install neo-python*: This allows you to run a full NEO node and to interact
    with the blockchain.


    2.  *Create neo-privatenet-docker*: This allows you to run a whole NEO blockchain
    with four consensus nodes in a single, lightweight Docker container.


    3.  *Create a NEO wallet*: This connects to the private net and creates a wallet.


    4.  *Claim*: This is initially 100,000,000 NEO.


    5.  *Bootstrap the testnet*: This synchronize*s* the network*.*


    ### Python 3.6


    `neo-python` needs Python 3.6 or later. Mac comes out of the box with Python,
    and you can verify you have `python3` installed via the `--version` command.


    ```

    > python3 --version

    Python 3.6.x

    ```


    If you are running a previous version of Python and need to install/re-install
    Python, follow these steps:


    ```

    > brew unlink python

    ```


    Next, install Python with Brew.


    ```

    > brew install --ignore-dependencies https://raw.githubusercontent.com/Homebrew/homebrew-core/f2a764ef944b1080be64bd88dca9a1d80130c558/Formula/python.rb

    ```


    Now switch the Python versions.


    ```

    > brew switch python 3.7.0

    > brew switch python 3.6.5_1

    ```


    In case you don’t have pip installed, run this:


    ```

    > curl -O https://bootstrap.pypa.io/get-pip.py

    > sudo python get-pip.py

    > pip

    ```


    ### Install neo-python


    Next, clone `neo-python` from the City of Zion and check out the development branch.


    ```

    > cd ~/Desktop

    > git clone https://github.com/CityOfZion/neo-python.git

    > cd neo-python

    > git checkout development

    ```


    You can create a virtual environment using Python 3.6 and then run the `activate`
    script.


    ```

    > python3.6 -m venv venv

    > source venv/bin/activate

    ```


    Ensure you have the latest pip version by running this command:


    ```

    (venv)> pip install --upgrade pip

    ```


    Now you can install the package in an editable form.


    ```

    (venv)> pip install -e.

    ```


    You can compare your output with mine; for the steps you took so far, see Figure
    [7-6](#475651_1_En_7_Chapter.xhtml#Fig6).


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig6_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig6_HTML.jpg)


    Figure 7-6


    neo-python installation output


    To confirm the installation went well, run the `--version` command. At the time
    of writing, it outputs version 0.8.3.


    ```

    > np-prompt --version

    neo-python v0.8.3-dev

    ```


    Now you can open a NEO bash with the `np-prompt` command. To exit bash, run the
    `exit` command.


    ```

    > np-prompt

    neo>exit

    ```


    ### Install neo-privatenet-docker


    You already installed Docker, so now you can create a Docker container that will
    create four NEO nodes to create a private testnet. Go ahead and install the Docker
    container on your desktop and build the files, as shown here:


    ```

    > cd ~/Desktop

    > git clone https://github.com/CityOfZion/neo-privatenet-docker.git

    > cd neo-privatenet-docker

    >./docker_build.sh

    ```


    After the image is built, you can start a private network like this:


    ```

    >./docker_build.sh

    Successfully built #build number

    ```


    ### Note


    If Docker needs to be restarted or is not running, run the following command:


    `> ./docker_run.sh`


    ### Start a Network and Claim Initial NEO and Gas


    Next, you will start your private network, create your wallet, and claim the initial
    NEO and 40 gas. This is done by running the `docker_run_and_create_wallet.sh`
    script. You can see the output in Figure [7-7](#475651_1_En_7_Chapter.xhtml#Fig7).


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig7_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig7_HTML.jpg)


    Figure 7-7


    docker_run_and_create_wallet script output


    ```

    > ./docker_run_and_create_wallet.sh

    ```


    Once the process is completed, you can get a confirmation of the two files that
    were created (see Figure [7-7](#475651_1_En_7_Chapter.xhtml#Fig7)).


    *   *neo-privnet.wallet*: This file is a wallet that you can use with `neo-python`
    .


    *   *neo-privnet.wif*: This file is a WIF private key you can import into other
    clients, such as `neo-gui`.


    These files give you access to the wallet containing the NEO and gas for your
    private network. The script automatically claimed the NEO and gas for you.


    You can check Docker and see the `neo-privnet` container running, as shown in
    Figure [7-8](#475651_1_En_7_Chapter.xhtml#Fig8).


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig8_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig8_HTML.jpg)


    Figure 7-8


    neo-privnet Docker container running


    ```

    > docker ps

    ```


    ### Bootstrapping the Testnet


    Now that you have a private testnet running, you need to bootstrap the testnet
    blockchain database. This synchronizes the network and is done by running `np-bootstrap`.
    This can take a while; once completed, you will get confirmation.


    ```

    > np-bootstrap -n

    confirm

    Successfully downloaded bootstrap chain!

    ```


    Notice that you use the `–n` flag to get database notifications.


    ### Start NEO Bash


    Now that you have your private testnet container running with four nodes and you
    bootstrap your testnet database, you can start a `neo-cli` bash by calling the
    `prompt.py` command.


    ```

    > cd ~/Desktop/neo-python/neo/bin

    > python3.6 prompt.py –p

    ```


    Once you run this command, the NEO bash opens, and you can use the `state` command
    to view information about the blockchain, as shown in Figure [7-9](#475651_1_En_7_Chapter.xhtml#Fig9).


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig9_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Information about your blockchain via the state command


    ```

    neo> state

    ```


    `neo-cli` offers access to many RPC calls via the NEO API; however, the wallet
    needs to be open to run these commands. You can open your wallet with the `wallet`
    command and the file location. This command will ask for the wallet’s password.
    For the password, use `coz`.


    ```

    neo> wallet open ~/Desktop/neo-privatenet-docker/neo-privnet.wallet

    password: coz

    ```


    Next, rebuild the wallet and call the `wallet` command. You will see the NEO and
    NeoGas fake testnet coins available (see Figure [7-10](#475651_1_En_7_Chapter.xhtml#Fig10)).


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig10_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig10_HTML.jpg)


    Figure 7-10


    neo-privnet wallet showing claimed coins


    ```

    neo> wallet rebuild

    neo> wallet

    ```


    To close the wallet and exit bash, use the `wallet close` command and exit.


    ```

    neo> wallet close

    neo> exit

    ```


    You have succeeded in creating a private NEO blockchain running on a testnet with
    100 million NEO and 40.0 NeoGas claimed coins that you can use for development.'
  trans: '

    # 搭建本地 NEO 私有测试网


    你可以像在其他区块链上一样，在公有测试网上运行你的 NeoContracts；不过，最好还是运行自己的私有测试网，这样你就能完全掌控它。私有测试网可以部署在云端，但你需向服务商付费，因此在本地机器上搭建测试网是更优选择。


    从文档可以看出，NEO 的工具主要面向 PC 用户开发。然而，得益于 City of Zion 社区（CoZ, [`https://github.com/CityOfZion`](https://github.com/CityOfZion)
    ）开发的工具，任何支持 Docker 和 Python 的平台都可以运行私有链。


    运行本地 NEO 私有测试网的步骤如下：


    1. *安装 `neo-python`*：这将使你能够运行一个完整的 NEO 节点并与区块链进行交互。

    2. *创建 `neo-privatenet-docker`*：这将使你能够在一个轻量级的 Docker 容器中运行包含四个共识节点的完整 NEO 区块链。

    3. *创建 NEO 钱包*：这将连接到私有网络并创建一个钱包。

    4. *领取*：初始状态为 100,000,000 个 NEO。

    5. *引导测试网*：这将同步网络。


    ## Python 3.6


    `neo-python` 需要 Python 3.6 或更高版本。Mac 系统自带 Python，你可以通过 `--version` 命令确认是否已安装 `python3`。


    ```

    > python3 --version

    Python 3.6.x

    ```


    如果你运行的是旧版 Python 并需要安装/重装 Python，请遵循以下步骤：


    ```

    > brew unlink python

    ```


    接下来，使用 Brew 安装 Python。


    ```

    > brew install --ignore-dependencies https://raw.githubusercontent.com/Homebrew/homebrew-core/f2a764ef944b1080be64bd88dca9a1d80130c558/Formula/python.rb

    ```


    现在切换 Python 版本。


    ```

    > brew switch python 3.7.0

    > brew switch python 3.6.5_1

    ```


    如果你没有安装 `pip`，请运行以下命令：


    ```

    > curl -O https://bootstrap.pypa.io/get-pip.py

    > sudo python get-pip.py

    > pip

    ```


    ## 安装 `neo-python`


    接下来，从 City of Zion 克隆 `neo-python` 并切换到 development 分支。


    ```

    > cd ~/Desktop

    > git clone https://github.com/CityOfZion/neo-python.git

    > cd neo-python

    > git checkout development

    ```


    你可以使用 Python 3.6 创建一个虚拟环境，然后运行 `activate` 脚本。


    ```

    > python3.6 -m venv venv

    > source venv/bin/activate

    ```


    通过运行以下命令确保你拥有最新的 `pip` 版本：


    ```

    (venv)> pip install --upgrade pip

    ```


    现在你可以以可编辑的形式安装该包。


    ```

    (venv)> pip install -e .

    ```


    你可以将你的输出与我的进行对比；到目前为止你完成的步骤，请参见图 7-6。


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig6_HTML.jpg](img/475651_1_En_7_Fig6_HTML.jpg)


    图 7-6 — `neo-python` 安装输出


    为确认安装成功，请运行 `--version` 命令。在撰写本文时，它输出版本号 0.8.3。


    ```

    > np-prompt --version

    neo-python v0.8.3-dev

    ```


    现在你可以使用 `np-prompt` 命令打开一个 NEO bash 界面。要退出 bash，请运行 `exit` 命令。


    ```

    > np-prompt

    neo>exit

    ```


    ## 安装 `neo-privatenet-docker`


    你已经安装了 Docker，现在可以创建一个 Docker 容器，该容器将创建四个 NEO 节点以形成私有测试网。请继续在你的桌面上安装 Docker 容器并构建文件，如下所示：


    ```

    > cd ~/Desktop

    > git clone https://github.com/CityOfZion/neo-privatenet-docker.git

    > cd neo-privatenet-docker

    > ./docker_build.sh

    ```


    镜像构建完成后，你可以像这样启动私有网络：


    ```

    > ./docker_run.sh

    Successfully built #build number

    ```


    ### 注意


    如果 Docker 需要重启或未运行，请执行以下命令：


    ```

    > ./docker_run.sh

    ```


    ## 启动网络并领取初始 NEO 和 Gas


    接下来，你将启动私有网络，创建钱包，并领取初始 NEO 和 40 个 Gas。这通过运行 `docker_run_and_create_wallet.sh`
    脚本来完成。你可以在图 7-7 中看到输出。


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig7_HTML.jpg](img/475651_1_En_7_Fig7_HTML.jpg)


    图 7-7 — `docker_run_and_create_wallet` 脚本输出


    ```

    > ./docker_run_and_create_wallet.sh

    ```


    过程完成后，你会得到所创建的两个文件的确认信息（参见图 7-7）。


    * `neo-privnet.wallet`：这是一个可与 `neo-python` 配合使用的钱包文件。

    * `neo-privnet.wif`：这是一个 WIF 私钥文件，你可以导入其他客户端，例如 `neo-gui`。


    这些文件使你可以访问包含私有网络 NEO 和 Gas 的钱包。脚本已自动为你领取了 NEO 和 Gas。


    你可以检查 Docker，查看 `neo-privnet` 容器是否正在运行，如图 7-8 所示。


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig8_HTML.jpg](img/475651_1_En_7_Fig8_HTML.jpg)


    图 7-8 — 正在运行的 `neo-privnet` Docker 容器


    ```

    > docker ps

    ```


    ## 引导测试网


    现在你已经有了一个正在运行的私有测试网，需要引导测试网的区块链数据库。这可以同步网络，通过运行 `np-bootstrap` 来完成。这可能需要一些时间；完成后，你会收到确认信息。


    ```

    > np-bootstrap -n

    confirm

    Successfully downloaded bootstrap chain!

    ```


    注意，你使用了 `-n` 标志来获取数据库通知。


    ## 启动 NEO Bash


    现在你已经让私有测试网容器运行着四个节点，并且已引导测试网数据库，你可以通过调用 `prompt.py` 命令来启动一个 `neo-cli` bash 界面。


    ```

    > cd ~/Desktop/neo-python/neo/bin

    > python3.6 prompt.py -p

    ```


    运行此命令后，NEO bash 界面打开，你可以使用 `state` 命令查看区块链的信息，如图 7-9 所示。


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig9_HTML.jpg](img/475651_1_En_7_Fig9_HTML.jpg)


    图 7-9 — 通过 `state` 命令查看你的区块链信息


    ```

    neo> state

    ```


    `neo-cli` 通过 NEO API 提供了对许多 RPC 调用的访问；但是，需要打开钱包才能运行这些命令。你可以使用 `wallet` 命令和文件位置打开钱包。该命令会要求输入钱包密码。密码请使用
    `coz`。


    ```

    neo> wallet open ~/Desktop/neo-privatenet-docker/neo-privnet.wallet

    password: coz

    ```


    接下来，重建钱包并调用 `wallet` 命令。你将看到可用的 NEO 和 NeoGas 假测试网代币（参见图 7-10）。


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig10_HTML.jpg](img/475651_1_En_7_Fig10_HTML.jpg)


    图 7-10 — 显示已领取代币的 `neo-privnet` 钱包


    ```

    neo> wallet rebuild

    neo> wallet

    ```


    要关闭钱包并退出 bash，请使用 `wallet close` 命令然后退出。


    ```

    neo> wallet close

    neo> exit

    ```


    你已经成功创建了一个在测试网上运行的私有 NEO 区块链，其中包含 1 亿个 NEO 和 40.0 个 NeoGas 的已领取代币，可供你用于开发。


