    \ between two addresses.\n\nLink with the Ethereum Network\n\nYou got your contract\
    \ working in Terminal; the next step is for your\ndapp to interact with the contract.\
    \ This is done via `web3.js`, which is a\ncollection of libraries allowing you\
    \ to interact with a local or remote\nEthereum node\nusing an HTTP or IPC connection.\
    \ First navigate back into your Angular\nproject folder and then install `web3.js`\
    \ with the flag\n`--save` to save\nthe library you are installing.\n\n```\n> cd\
    \ ethdapp/\n> npm install web3 –save\n+ web3@1.0.0-beta.55\n```\n\nIf installation\
    \ went well, you will see in the output that the\nversion did install. At the\
    \ time of writing, `web3` is at version\n1.0.0-beta55.\n\nYou also need to install\
    \ `truffle-contract`,\nwhich provides wrapper code that makes interaction with\
    \ your contract easier. At the\ntime of writing, the latest is version 4.0.7 but\
    \ will probably change by\nthe time you are reading this book.\n\n```\n>  npm\
    \ install truffle-contract –save\n+ truffle-contract@4.0.15\n```\n\nTip\n`web3`\
    \ version\n1.0.0 beta and `truffle-contract`\nversion 4.0.15 are the latest versions\
    \ and compatible with Angular\n7.3.x. However, this can change, so watch the version\
    \ you are installing\nto ensure it’s compatible and to avoid errors. Re-install\
    \ with exact\n`@[version]`, for\ninstance @4.0.15, if you run into compatibility\
    \ issues.\n\nTransfer Service\n\nNow that you have your libraries installed,\n\
    you can continue. In this section, you will create and write a service\nclass.\
    \ A service class is going to be your front-end middle layer to\ninteract with\
    \ `web3`. To get started,\nyou can utilize the `ng s` flag, which stands for “service.”\n\
    \n```\n> ng g s services/transfer --module=app.module\nCREATE src/app/services/transfer.service.spec.ts\n\
    CREATE src/app/services/ transfer.service.ts\n```\n\nYou will replace the service\
    \ class’s initial code with logic to interact\nwith `web3`.\nFirst you will define\
    \ the libraries you will be using, which are the\nAngular core and\nthe `truffle-contract`\
    \ and\n`web3` libraries\nyou installed.\n\n```\nimport { Injectable } from '@angular/core';\n\
    const Web3 = require('web3');\nimport * as TruffleContract from 'truffle-contract';\n\
    ```\n\nNext, you will define three variables you will be using later: `require`,\
    \ `window`, and `tokenAbi`. Notice that\n`tokenAbi` points\nto the ABI file\n\
    you compiled from the contract SOL file.\n\n```\ndeclare let require: any;\ndeclare\
    \ let window: any;\nconst tokenAbi = require('../../../truffle/build/contracts/Transfer.json');\n\
    ```\n\nYou need access to root to interact with `web3`, so you need to\ninject\
    \ it into your project.\n\n```\n@Injectable({\nprovidedIn: 'root'\n})\n```\n\n\
    Next, define the class definition, the `account` and `web3` variables, and\n`init\
    \ web3` ."
  trans: "\n# 就这样。你保持了基础和简单，只有一个事件和一个函数。\n你可以从这里下载这一步的代码：[`https://github.com/Apress/the-blockchain-developer/chapter10/step1.zip`](https://github.com/Apress/the-blockchain-developer/chapter10/step1.zip)。\n\
    \n## 创建 Truffle 开发网络\n\n下一步是用以下配置替换 `truffle/truffle-config.js` 文件：\n\n```javascript\n\
    module.exports = {\nnetworks: {\ndevelopment: {\nhost: \"127.0.0.1\",\nport: 8545,\n\
    network_id: \"*\",\ngas: 5000000,\ngasPrice: 100000000000\n}\n}\n};\n```\n\n请注意，你指向了\
    \ 8545 端口，这将在本章稍后运行 MetaMask 时为你提供帮助。\n\n## 部署智能合约\n\n你需要的另一个配置文件是部署合约文件。创建一个部署文件，并将其命名为\
    \ `truffle/migrations/2_deploy_contracts.js`。在这个配置文件中，你只需要指向所创建的 `Transfer` 智能合约\
    \ SOL 代码。\n\n```javascript\nvar Transfer = artifacts.require(\"./Transfer.sol\"\
    );\nmodule.exports = function(deployer) {\ndeployer.deploy(Transfer);\n};\n```\n\
    \n现在，你已经准备好使用 Ganache 在 8545 端口上创建你的网络，因此导航到 Truffle 项目，并运行以下命令：\n\n```bash\n\
    > cd ethdapp/truffle\n> ganache-cli -p 8545\n```\n\n**提示**  \n如果你遇到诸如“NODE_MODULE_VERSION\
    \ 不匹配”之类的错误，请卸载并重新安装 `ganache-cli`。然后打开一个新的终端窗口，确保它运行正常。\n\n如果需要重新安装 `ganache-cli`，请运行以下命令：\n\
    \n```bash\n> npm uninstall -g ganache-cli\n> npm install -g ganache-cli\n```\n\
    \n为了确保它运行正常，请运行以下命令：\n\n```bash\n> ganache-cli help\n```\n\n接下来，在一个新的终端窗口中，让我们在\
    \ `ganache` 仍在运行时编译并部署你的合约。\n\n```bash\n> truffle compile\n```\n\n编译输出应显示成功，并在\
    \ `Contract` 文件夹中创建你的合约。\n\n```\nCompiling ./contracts/Transfer.sol...\nWriting\
    \ artifacts to ./build/contracts\n```\n\n创建的文件是 `Transfer.json`，你将在你的去中心化应用中使用它与网络进行交互。接下来，你将使用\
    \ `migrate` 命令部署合约。\n\n```bash\n> truffle migrate --network development\n```\n\
    \n输出应确认合约已迁移到网络，如图 10-3 所示。\n\n![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig3_HTML.jpg](img/475651_1_En_10_Fig3_HTML.jpg)\n\
    \n**图 10-3** Truffle 迁移项目\n\n输出摘要还应显示部署成功并产生了费用。\n\n```\nSummary\n=======\n> Total\
    \ deployments:   2\n> Final cost:          0.0525573 ETH\n```\n\n## Truffle 控制台\n\
    \n现在你已经编译并部署了合约，为了与网络交互，请启动一个控制台，如下所示：\n\n```bash\n> truffle console --network\
    \ development\n```\n\n关于你可以对 Truffle CLI 运行的命令，一个很好的资源是 Ethereum JavaScript API\
    \ 维基页面，网址是：[`https://github.com/ethereum/wiki/wiki/JavaScript-API`](https://github.com/ethereum/wiki/wiki/JavaScript-API)。\n\
    \n### 账户\n\n如果你运行 `getAccounts`，你将获得与你的钱包关联的账户列表。\n\n```javascript\ntruffle(development)>\
    \ web3.eth.getAccounts()\n[ '0x1eFf25A40C82EA65BC88E45d02368897EC922FEf',\n'0xC135058b33d5df78636Cf14b74F281f95c4a407c',\n\
    '0xe682300Ef633F7d4f0d8Cb07c1bAD5d9B4eaE974'\n....]\n```\n\n然后，你可以将 `address1`\
    \ 和 `address2` 定义为第一个和第二个账户。\n\n```javascript\ntruffle(development)> web3.eth.getAccounts().then(\
    \ function(a){address1=a[0]})\nundefined\ntruffle(development)> web3.eth.getAccounts().then(\
    \ function(a){address2=a[1]})\nundefined\n```\n\n现在它们已被定义，你可以调用它们，并在输出中获得第一个和第二个账户。\n\
    \n```javascript\ntruffle(development)> address1\n'0x1eFf25A40C82EA65BC88E45d02368897EC922FEf'\n\
    truffle(development)> address2\n'0xC135058b33d5df78636Cf14b74F281f95c4a407c'\n\
    ```\n\n你也可以使用 `getBalance` 来获取这些地址中的余额。\n\n```javascript\ntruffle(development)>\
    \ web3.eth.getBalance(address1)\n'99942134400000000000'\ntruffle(development)>\
    \ web3.eth.getBalance(address2)\n'100000000000000000000'\n```\n\n### 测试智能合约的转账\n\
    \n现在你已经定义了两个地址，并且知道这些账户中的余额，你可以定义你的合约并在账户之间转移一些资金。为此，首先定义合约并将其命名为 `transferSmartContract`。\n\
    \n```javascript\ntruffle(development)> Transfer.deployed().then(function(instance){transferSmartContract\
    \ = instance;})\nundefined\n```\n\n接下来，运行你定义的 `transferSmartContract` 变量，以确保它工作正常并显示对象值。\n\
    \n```javascript\n> transferSmartContract\n```\n\n现在，你可以使用智能合约在两个账户之间转移资金。账户 2\
    \ 有一个整齐的整数金额，因此你将转移 5 个以太币。\n\n```javascript\n> transferSmartContract.pay(address2,\
    \ {from: address1, value: 5});\n```\n\n命令输出显示了关于交易和挖矿的信息。现在你可以看到更新后的余额。\n\n```javascript\n\
    > web3.eth.getBalance(address1);\n'99942134399999999995'\n> web3.eth.getBalance(address2);\n\
    '100000000000000000005'\n```\n\n如你所见，余额发生了变化，你成功在两个地址之间转移了代币。\n\n## 链接到以太坊网络\n\
    \n你的合约已在终端中运行；下一步是让你的去中心化应用与合约交互。这是通过 `web3.js` 完成的，它是一个库的集合，允许你使用 HTTP 或 IPC\
    \ 连接与本地或远程以太坊节点进行交互。首先，导航回你的 Angular 项目文件夹，然后使用 `--save` 标志安装 `web3.js`，以保存你正在安装的库。\n\
    \n```bash\n> cd ethdapp/\n> npm install web3 –save\n+ web3@1.0.0-beta.55\n```\n\
    \n如果安装顺利，你将在输出中看到已安装的版本。在撰写本文时，`web3` 的版本是 1.0.0-beta55。\n\n你还需要安装 `truffle-contract`，它提供了包装代码，使与合约的交互更加容易。在撰写本文时，最新版本是\
    \ 4.0.7，但当你阅读本书时，它可能会发生变化。\n\n```bash\n>  npm install truffle-contract –save\n\
    + truffle-contract@4.0.15\n```\n\n**提示**  \n`web3` 1.0.0 beta 版本和 `truffle-contract`\
    \ 4.0.15 版本是与 Angular 7.3.x 兼容的最新版本。但是，这种情况可能会发生变化，因此请注意你正在安装的版本，以确保其兼容性并避免错误。如果你遇到兼容性问题，请使用精确的\
    \ `@[版本]` 重新安装，例如 `@4.0.15`。\n\n## 转账服务\n\n现在你已经安装了库，可以继续了。在本节中，你将创建并编写一个服务类。服务类将成为你与\
    \ `web3` 交互的前端中间层。首先，你可以使用 `ng s` 标志，该标志代表“service”。\n\n```bash\n> ng g s services/transfer\
    \ --module=app.module\nCREATE src/app/services/transfer.service.spec.ts\nCREATE\
    \ src/app/services/ transfer.service.ts\n```\n\n你将用与 `web3` 交互的逻辑替换服务类的初始代码。首先，你将定义将使用的库，即\
    \ Angular 核心以及你安装的 `truffle-contract` 和 `web3` 库。\n\n```typescript\nimport { Injectable\
    \ } from '@angular/core';\nconst Web3 = require('web3');\nimport * as TruffleContract\
    \ from 'truffle-contract';\n```\n\n接下来，你将定义稍后将使用的三个变量：`require`、`window` 和 `tokenAbi`。请注意，`tokenAbi`\
    \ 指向从合约 SOL 文件编译出的 ABI 文件。\n\n```typescript\ndeclare let require: any;\ndeclare\
    \ let window: any;\nconst tokenAbi = require('../../../truffle/build/contracts/Transfer.json');\n\
    ```\n\n你需要访问根目录才能与 `web3` 交互，因此需要将其注入到你的项目中。\n\n```typescript\n@Injectable({\n\
    providedIn: 'root'\n})\n```\n\n接下来，定义类定义、`account` 和 `web3` 变量，以及 `init web3`。\n"
- fmt: '```typescript

    export class TransferService {

    private _account: any = null;

    private readonly _web3: any;

    constructor() {

    if (typeof window.web3 !== ''undefined'') {

    this._web3 = window.web3.currentProvider;

    } else {

    this._web3 = new Web3.providers.HttpProvider(''http://localhost:8545'');

    }

    window.web3 = new Web3(this._web3);

    console.log(''transfer.service :: this._web3'');

    console.log(this._web3);

    }

    ```


    注意，你在代码中包裹了 `console.log` 消息，这样你可以在浏览器开发者工具的控制台消息部分看到这些消息，以帮助你理解正在发生的事情。为此，请在开发者工具模式下打开浏览器。对于
    Chrome，选择 查看 ➤ 开发者 ➤ 开发者工具。


    你需要一个 `async` 方法来获取账户地址和余额，因此你可以使用一个 promise 函数。如果之前没有检索到你的账户，你将像在终端中那样调用 `web3.eth.getAccounts`
    来检索数据。你还需要处理出错时的错误代码。


    ```

    private async getAccount(): Promise {

    console.log(''transfer.service :: getAccount :: start'');

    if (this._account == null) {

    this._account = await new Promise((resolve, reject) => {

    console.log(''transfer.service :: getAccount :: eth'');

    console.log(window.web3.eth);

    window.web3.eth.getAccounts((err, retAccount) => {

    console.log(''transfer.service :: getAccount: retAccount'');

    console.log(retAccount);

    if (retAccount.length > 0) {

    this._account = retAccount[0];

    resolve(this._account);

    } else {

    alert(''transfer.service :: getAccount :: no accounts found.'');

    reject(''No accounts found.'');

    }

    if (err != null) {

    alert(''transfer.service :: getAccount :: error retrieving account'');

    reject(''Error retrieving account'');

    }

    });

    }) as Promise;

    }

    return Promise.resolve(this._account);

    }

    ```


    类似地，你需要一个服务方法来与账户交互并获取其余额。你像在终端中那样使用 `web3.eth.getBalance` 并包裹一些错误检查。你还需要将其设置为一个
    promise。需要 promise 的原因在于这些调用是 `async` 的，而 JavaScript 并非如此。


    ```

    public async getUserBalance(): Promise {

    const account = await this.getAccount();

    console.log(''transfer.service :: getUserBalance :: account'');

    console.log(account);

    return new Promise((resolve, reject) => {

    window.web3.eth.getBalance(account, function(err, balance) {

    console.log(''transfer.service :: getUserBalance :: getBalance'');

    console.log(balance);

    if (!err) {

    const retVal = {account: account, balance: balance};

    console.log(''transfer.service :: getUserBalance :: getBalance :: retVal'');

    console.log(retVal);

    resolve(retVal);

    } else {

    reject({account: ''error'', balance: 0});

    }

    });

    }) as Promise;

    }

    ```


    最后，你需要一个方法来传递表单中的值，并将付款从一个账户转移到另一个账户。使用合约的 `pay` 方法并包裹一些错误检查。


    ```

    transferEther(value) {

    const that = this;

    console.log(''transfer.service :: transferEther to: '' + value.transferAddress
    + '', from: '' + that._account + '', amount: '' + value.amount);

    return new Promise((resolve, reject) => {

    console.log(''transfer.service :: transferEther :: tokenAbi'');

    console.log(tokenAbi);

    const transferContract = TruffleContract(tokenAbi);

    transferContract.setProvider(that._web3);

    console.log(''transfer.service :: transferEther :: transferContract'');

    console.log(transferContract);

    transferContract.deployed().then(function(instance) {

    return instance.pay(

    value.transferAddress,

    {

    from: that._account,

    value: value.amount

    });

    }).then(function(status) {

    if (status) {

    return resolve({status: true});

    }

    }).catch(function(error) {

    console.log(error);

    return reject(''transfer.service error'');

    });

    });

    }

    }

    ```


    现在你已经完成了转账服务，可以连接 `transfer.component` 来获取用户的账户地址和余额，并在表单填写完毕后能够转账。


    首先，你需要定义创建的服务组件。打开 `src/app/component/transfer/transfer.component.ts` 并在文档顶部添加
    `import` 语句。


    ```

    import {TransferService} from ''../../services/transfer.service'';

    ```


    对于组件定义，将 `TransferService` 作为 provider 添加。


    ```

    @Component({

    ..

    providers: [TransferService]

    })

    ```


    另外，将 `TransferService` 添加到构造函数中，以便你可以在类中使用它。


    ```

    constructor(private fb: FormBuilder,

    private transferService: TransferService) { }

    ```


    接下来，更新 `getAccountAndBalance` 方法，使其包含对服务类的调用，以检索用户的实际账户和余额。


    ```

    getAccountAndBalance = () => {

    const that = this;

    this.transferService.getUserBalance().then(function(retAccount: any) {

    that.user.address = retAccount.account;

    that.user.balance = retAccount.balance;

    console.log(''transfer.components :: getAccountAndBalance :: that.user'');

    console.log(that.user);

    }).catch(function(error) {

    console.log(error);

    });

    }

    ```


    最后，更新 `submitForm` 以调用 `transferEther` 进行转账和支付。将此处显示的 `submitForm TODO` 注释替换为对服务调用的调用：


    ```

    // TODO: service call

    ```


    然后传递用户提交的数据：


    ```

    this.transferService.transferEther(this.userForm.value).then(function() {

    }).catch(function(error) {

    console.log(error);

    });

    });

    ```


    你可以从此处下载完整的步骤：[`https://github.com/Apress/the-blockchain-developer/chapter10/step2.zip`](https://github.com/Apress/the-blockchain-developer/chapter10/step2.zip)。


    ## 连接 MetaMask


    至此，你的去中心化应用代码已经完成。但是，如果你现在测试你的去中心化应用，`web3` 将无法连接到账户。你需要做的是连接到 MetaMask。


    这里存在一个与去中心化应用相关的隐私问题，恶意网站能够注入代码以查看用户的活动和以太坊地址，然后查找余额、交易历史和个人信息。这些恶意网站进而能够代表用户发起未经授权的交易，用户可能意外批准未经授权的交易并损失资金。


    为了避免这些问题并连接你的 Angular 服务，你将通过 MetaMask 将浏览器连接到网络。你已经使用过 MetaMask，因此它应该已经安装。


    让我们稍作回顾。你可能还记得，你通过 `ganache-cli` 在端口 8545 上启动了一个网络。


    ```

    > ganache-cli -p 8545

    ```


    并且你将 Truffle 连接到了该网络。


    ```

    > truffle migrate --network development

    ```


    然后，你能够在端口 8545 上连接并在终端中运行命令。


    你现在可以在浏览器中连接 MetaMask。要连接，请选择 MetaMask，然后在下拉菜单中选择 Localhost 8545。参见图 [10-4](#475651_1_En_10_Chapter.xhtml#Fig4)。


    ![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig4_HTML.jpg](images/475651_1_En_10_Chapter/475651_1_En_10_Fig4_HTML.jpg)


    **图 10-4** 将 MetaMask 连接到端口 8545 上的私有网络


    请注意，你在本章前面选择了端口 8545。它是 MetaMask 上的默认端口，因此通过选择下拉菜单项（而不是指向自定义端口），可以轻松地在你的私有网络上连接。但是，当你检查账户列表时，你并没有看到任何账户。你之所以看不到账户，是因为每次启动网络时，你都需要更新账户。有两种方法可以用账户列表更新
    MetaMask。


    *选项 1*：当你运行 Ganache 时，使用 `m` 标志传递代表你在 Ganache 中拥有的私钥的助记词。例如，命令如下所示：


    ```

    > ganache-cli -p 8545 -m ''journey badge medal slender behind junk develop produce
    spy enemy transfer room''

    ```


    *选项 2*：当你运行 `ganache-cli` 时，你将看到账户列表、私钥和助记词。


    ```

    > ganache-cli -p 8545

    ```


