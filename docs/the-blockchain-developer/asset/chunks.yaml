    ```


    At the time of writing, a full-index bitcoin core node requires 2 GB RAM and at
    least 180 GB of disk space ( [`https://blockchain.info/charts/blocks-size`](https://blockchain.info/charts/blocks-size)
    ). Additionally, as the bitcoin nodes send and receive transactions and blocks
    constantly, you will need a fast internet connection.


    The full node is advisable for a working project running a miner as you can run
    a dedicated server and interact with the bitcoind via Bitcoin-CLI; however, for
    the purpose of this book, most of the time you won’t need a full node. I recommend
    that you constrain bitcoin node resources usage on your computer so it won’t hog
    your computer’s resources and Internet bandwidth.


    To limit your node from downloading the entire shared ledger, use vim or your
    favorite editor to edit the `bitcoin.conf` file.


    ```

    > vim /[path]/.bitcoin/bitcoin.conf

    ```


    After vim opens up `bitcoin.conf`, paste the following configurations:


    ```

    alertnotify=myemailscript.sh "Alert: %s"

    prune=3000

    maxconnections=10

    dbcache=150

    maxmempool=100

    maxsendbuffer=500

    maxreceivebuffer=2000

    txindex=0

    ```


    Make sure you don’t erase the following lines already there:


    ```

    rpcuser=bitcoinrpcrpc

    password=[password]

    ```


    For your knowledge, the configuration file holds the following params:


    *   ***prune***: Utilizing `prune`, you can limit the disk usage. Set this to
    3000.


    *   ***Maxconnections***: By setting a limited `maxconnections` value, you are
    limiting the maximum nodes number to ten connections


    *   ***dbcache***: In `dbcache`, you reduce the size of the UTXO cache from 300
    MiB to 100 MiB.


    *   ***Maxsendbuffer and maxreceivebuffer***: You can limit the memory buffer
    per connection to the number you set; for instance, set `maxreceivebuffer` to
    2000 MB.


    *   ***Txindex***: Set this to 1 to get transaction data for any transaction on
    the blockchain; however, this will use up more disk space.


    **Running Bitcoin Core Daemon**


    `N`ow that you have configured your node, you can start the bitcoin core daemon.
    To run the bitcoind, execute the following command in Terminal:


    ```

    > bitcoind -printtoconsole

    ```


    The first time running the daemon, it will download the blockchain. This can take
    several hours (depending on your Internet connection). Because you set the parameter
    to print to the console (`-printtoconsole`), you will be able to watch the process
    as it downloads the entire blockchain. See Figure [2-18](#475651_1_En_2_Chapter.xhtml#Fig18).


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig18_HTML.jpg](images/475651_1_En_2_Chapter/475651_1_En_2_Fig18_HTML.jpg)


    Figure 2-18


    Bitcoin core daemon (bitcoind)


    While the process is running, open a second Terminal window to query the bitcoind
    interact with the APIs via the bitcoin-cli. Note: you can call the help feature
    and get help about the available APIs. For instance, to get a list of all available
    APIs, use this:


    ```

    > bitcoin-cli --help # outputs list of command-line options.

    > bitcoin-cli help # outputs list of RPC commands when the daemon is running.

    > bitcoin-cli help getblockhash # get help on specific API, for instance "getblockhash";

    ```'
  trans: '

    ### 安装并配置完整比特币节点


    **系统设置**


    在本练习中，您将搭建环境，然后下载、配置并启动一个完整的比特币工作节点。随着您继续研究比特币和区块链的工作原理，这将非常实用。您将使用比特币核心源代码。比特币核心代码包含的文档提供了在不同操作系统上安装该代码的完整说明。本书中，我将重点介绍
    macOS，因此为方便起见，提供了加速安装过程的说明；不过，您也可以在其他平台上安装比特币核心。以下是适用于 Mac 和 PC 的完整说明链接：


    - macOS 安装说明：[`github.com/bitcoin/bitcoin/blob/master/doc/build-osx.md`](https://github.com/bitcoin/bitcoin/blob/master/doc/build-osx.md)

    - Windows 安装说明：[`github.com/bitcoin/bitcoin/blob/master/doc/build-windows.md`](https://github.com/bitcoin/bitcoin/blob/master/doc/build-windows.md)


    要开始操作，您需要安装 Xcode 和 Xcode 工具。如果您尚未安装，现在是个不错的时机。要检查您的计算机上是否已安装 Xcode，请点击 Spotlight
    搜索打开命令行终端，然后输入 `Terminal`。


    在命令行中，输入以下命令以检查是否已安装 Xcode：


    ```

    > xcode-select –v

    ```


    它应返回 `xcode-select` 及版本号，如图 2-16 所示。


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig16_HTML.jpg](img/475651_1_En_2_Fig16_HTML.jpg)


    **图 2-16** 终端 `xcode-select` 版本


    如果尚未安装 Xcode，您可以从 [`developer.apple.com/xcode/`](https://developer.apple.com/xcode/)
    下载。


    > **注意：** 根据您的网络连接状况，此安装可能需要数小时。


    现在您已下载 Xcode，请执行 Xcode 的命令行工具。


    ```

    > xcode-select –install

    ```


    安装命令行工具后，您可以使用以下命令安装 Homebrew 和 `wget` 工具：


    ```

    > /usr/bin/ruby -e "$(curl –fsSL https://raw.githubusercontent.com/Homebrew/install/master/install)"

    > brew install wget

    ```


    安装 Homebrew 和 `wget` 后，您就可以安装比特币核心所需的其他依赖项，如下所示：


    ```

    > brew install automake berkeley-db4 libtool boost miniupnpc openssl pkg-config
    protobuf python qt libevent qrencode librsvg

    ```


    **安装比特币核心**


    至此，您已安装了所需的工具和依赖项，接下来可以克隆比特币核心仓库、编译并运行它。


    ```

    > git clone https://github.com/bitcoin/bitcoin.git

    > cd bitcoin/

    ```


    现在，您可以构建比特币核心节点使用的 Berkeley DB 版本 4：


    ```

    > ./contrib/install_db4.sh .

    ```


    继续安装：


    ```

    > ./autogen.sh

    > ./configure

    > make

    > make check && sudo make install

    ```


    比特币核心代码包含两个工具：`bitcoind` 和 `bitcoin-cli`。


    - **`bitcoind`（比特币守护进程）：** 实现用于远程过程调用（RPC）的比特币协议。安装后，您可以进行 API 调用。所有 API 调用的列表位于此处：[`en.bitcoin.it/wiki/Original_Bitcoin_client/API_Calls_list`](https://en.bitcoin.it/wiki/Original_Bitcoin_client/API_Calls_list)。

    - **`bitcoin-cli`（比特币命令行界面）：** 使您能够与比特币核心守护进程进行交互。为确保安装顺利，您可以检查比特币守护进程和 `bitcoin-cli`
    的配置是否正常并按预期工作。


    要确保这些工具已正确安装，您可以对这些工具执行 `which` 命令以获取它们的位置。


    ```

    > which bitcoind

    > which bitcoin-cli

    ```


    输出将返回 `bitcoind` 和 `bitcoin-cli` 的位置：


    ```

    /usr/local/bin/bitcoind

    /usr/local/bin/bitcoin-cli

    ```


    **配置和编译比特币核心**


    接下来，您需要配置一个节点。每个比特币核心节点不参与挖矿，而是为比特币网络做出贡献，由客户端、矿工、钱包等组成。要配置节点，您可以通过在终端中输入以下命令来找到配置文件的路径：


    ```

    > bitcoind -printtoconsole

    ```


    几秒钟后，停止此服务（Control+C）。该命令将显示 `bitcoin.conf` 配置文件的路径。输出见图 2-17。


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig17_HTML.jpg](img/475651_1_En_2_Fig17_HTML.jpg)


    **图 2-17** `bitcoin.conf` 文件位置


    ```

    > Using config file /[path]/.bitcoin/bitcoin.conf

    ```


    在撰写本文时，一个完整索引的比特币核心节点需要 2 GB 内存和至少 180 GB 磁盘空间（[`blockchain.info/charts/blocks-size`](https://blockchain.info/charts/blocks-size)）。此外，由于比特币节点不断地发送和接收交易与区块，您还需要快速的互联网连接。


    对于运行矿工的工作项目，建议使用完整节点，因为您可以运行专用服务器并通过 `bitcoin-cli` 与 `bitcoind` 交互；但是，就本书而言，大多数情况下您不需要完整节点。我建议限制比特币节点在您计算机上的资源使用，以免它占用您的计算机资源和互联网带宽。


    为了限制您的节点下载整个共享账本，请使用 `vim` 或您喜欢的编辑器来编辑 `bitcoin.conf` 文件。


    ```

    > vim /[path]/.bitcoin/bitcoin.conf

    ```


    在 `vim` 打开 `bitcoin.conf` 后，粘贴以下配置：


    ```

    alertnotify=myemailscript.sh "Alert: %s"

    prune=3000

    maxconnections=10

    dbcache=150

    maxmempool=100

    maxsendbuffer=500

    maxreceivebuffer=2000

    txindex=0

    ```


    请确保不要删除其中已有的以下行：


    ```

    rpcuser=bitcoinrpcrpc

    password=[password]

    ```


    为了您的知识了解，配置文件包含以下参数：


    - **`prune`：** 利用 `prune`，您可以限制磁盘使用量。将其设置为 3000。

    - **`maxconnections`：** 通过设置有限的 `maxconnections` 值，您可以将最大节点连接数限制为十个连接。

    - **`dbcache`：** 在 `dbcache` 中，您将 UTXO 缓存的大小从 300 MiB 减少到 100 MiB。

    - **`maxsendbuffer` 和 `maxreceivebuffer`：** 您可以将每个连接的内存缓冲区限制在您设定的数值；例如，将 `maxreceivebuffer`
    设置为 2000 MB。

    - **`txindex`：** 将其设置为 1 以获取区块链上任何交易的交易数据；但是，这将占用更多磁盘空间。


    **运行比特币核心守护进程**


    现在您已配置好节点，可以启动比特币核心守护进程了。要运行 `bitcoind`，请在终端中执行以下命令：


    ```

    > bitcoind -printtoconsole

    ```


    首次运行守护进程时，它将下载区块链。这可能需要数小时（取决于您的互联网连接）。由于您设置了参数以打印到控制台（`-printtoconsole`），您将能够在下载整个区块链时看到进程。见图
    2-18。


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig18_HTML.jpg](img/475651_1_En_2_Fig18_HTML.jpg)


    **图 2-18** 比特币核心守护进程（`bitcoind`）


    在进程运行时，打开第二个终端窗口以查询 `bitcoind` 并通过 `bitcoin-cli` 与 API 交互。注意：您可以调用帮助功能并获得有关可用
    API 的帮助。例如，要获取所有可用 API 的列表，请使用以下命令：


    ```

    > bitcoin-cli --help # 输出命令行选项列表。

    > bitcoin-cli help # 在守护进程运行时输出 RPC 命令列表。

    > bitcoin-cli help getblockhash # 获取特定 API（例如 "getblockhash"）的帮助。

    ```

