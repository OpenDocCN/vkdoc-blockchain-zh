    # 总结


    在本章中，我介绍了如何利用 `Ganache` 来模拟一个全节点的以太坊客户端。你安装了 `Ganache`，在成功连接到 `Ganache CLI` 之后，你便能够创建一个网络并监听端口。你学会了如何使用适用于
    `Solidity` 的 `IntelliJ IDEA` 插件，通过自动补全和高亮功能来轻松开发智能合约。你还了解了 `Truffle Suite`，并学会了如何使用命令行向导创建自己的智能合约。你将
    `Truffle` 连接到了 `Ganache` 网络，然后创建了一个“Hello, World”智能合约以及一个“`MD5SmartContract`”智能合约。


    创建好合约后，你能够利用 `Truffle` 的部署流程来迁移智能合约。你使用 `Truffle` 编译并部署了智能合约代码到你的开发网络。然后，你通过 `Truffle
    CLI` 使用 `Truffle` 控制台与你的智能合约进行交互。接着，你使用 `Geth` 创建了一条私有以太坊区块链并对其进行了初始化。你使用 `Geth`
    控制台，并在你的 `Geth` 私有测试网上挖掘了模拟以太币。


    接下来，你将你的 Remix `web3.js` 以及 `Truffle` 合约部署到了你创建的 `Geth` 私有测试网上。此外，你还查看了一些在开发智能合约时会用到的实用
    `Geth` 命令。你将你的 `Mist` 以太坊钱包连接到了你创建的私有 `Geth` 网络，并能够与你的智能合约进行交互。你成功地在浏览器中使用了 `MetaMask`
    来替代桌面客户端。


    当你能够查看合约的运行情况后，你设置了一个公共测试网，同步了区块，并通过水龙头获取了代币。最后，你学习了如何将代码迁移到以太坊主网。


    在接下来的章节中，你将学习如何为智能合约构建前端代码，并发布一个完整的去中心化应用。


    # 6. EOS.IO 钱包与智能合约


    在第 2 章中，我在介绍比特币、山寨币以及不同共识机制时提到了 `EOS.IO`。具体来说，我介绍了 `EOS.IO` 是如何作为山寨币转化为代币的一个实例；你创建了一个
    EOS 区块生产者，并能够创建一个能够挖取 EOS 代币的全节点。以太坊是你区块链智能合约开发的起点，你学会了使用 `Solidity` 语言编写智能合约和去中心化应用。而
    `EOS.IO` 则为智能合约和去中心化应用的开发构建了一个比以太坊更强大的架构。


    在本章中，我将深入讲解 `EOS.IO` 区块链，并向你展示如何构建一个可用于去中心化应用的 `EOS.IO` 智能合约。你将搭建一个本地测试网环境，并学习如何配置
    `EOS.IO` 工具和库。你还将学习有关 `EOS.IO` 钱包的知识，包括如何创建、删除和备份钱包，以及执行诸如打开、锁定和解锁钱包等操作。我将介绍钱包的密钥对，以及如何启动和重新启动本地测试网区块生产者。你还将了解权限、单签名和多签名选项。


    为了更好地理解 `EOS.IO` 智能合约，你将创建一个“`HelloWorld`”智能合约和一个智能合约代币。你将创建账户，编写智能合约 C++ 代码，编译代码，生成
    `WebAssembly` 和 `ABI` 文件以及李嘉图合约。然后，你将学习如何部署你的智能合约并与之交互，以及如何发行代币并将代币转账给另一个用户。


    最后，你将连接到一个公共测试网区块生产者，以便在更真实的环境中进行测试，并了解如何连接和发布到主网区块生产者。


    ### 注意


    `EOS` 是驱动 `EOS.IO` 软件的原生加密货币（代币）。`EOS.IO` 是一个工业级、完全可定制的区块链架构协议，它通过提供对构成区块链各个组件的访问，从而支持去中心化应用。你可以将
    `EOS.IO` 视为一个区块链操作系统，因为它模拟了真实计算机，并允许访问 CPU、GPU、RAM 和硬盘等资源。`EOS.IO` 在处理每秒数百万笔交易时不收取交易费。`EOS`
    代币是一种实用型代币，拥有（质押）该代币可以在 `EOS.IO` 区块链上获得带宽和存储空间。你获得的资源与你所持有的总质押量成正比（拥有 1% 的 `EOS`
    代币，即可使用 `EOS.IO` 总带宽的 1%）。


    > “* `EOS.IO` 软件引入了一种新的区块链架构，旨在实现去中心化应用的垂直和水平扩展。这是通过创建一个类似操作系统的结构来实现的，应用程序可以在此基础上构建。该软件提供了账户、认证、数据库、异步通信以及跨多个
    CPU 核心或集群的应用程序调度功能。最终，这种技术形成了一种区块链架构，它最终能够扩展到每秒处理数百万笔交易，消除用户费用，并允许在受治理的区块链环境中快速、轻松地部署和维护去中心化应用。”

    > —`EOS.IO` block.one 白皮书


    正如第 2 章中提到的，`EOS.IO` 构建于委托权益证明（DPoS）共识机制之上。`EOS.IO` 能够处理低延迟和每天数千万的活跃用户（超越了以太坊）。这是通过
    DPoS 共识机制以及 `EOS.IO` 作为多线程（在多个计算机核心上运行）并充当操作系统来实现的。


    这种可扩展性可以使大型企业采用区块链技术。`EOS.IO` 还提供了许多额外功能，例如：


    * 免费的速率受限交易


    * 低延迟交易（例如 0.25 秒的广播时间或 0.5 秒的出块时间）


    * 被盗密钥的恢复


    * 应用程序的并行执行


    * 跨多个账户的原子交易


    我鼓励你阅读 `EOS.IO` 白皮书并访问 GitHub 页面以查看完整的功能列表。


    * [`https://github.com/EOSIO/eos`](https://github.com/EOSIO/eos)


    * [`https://github.com/EOSIO/Documentation/blob/master/TechnicalWhitePaper.md`](https://github.com/EOSIO/Documentation/blob/master/TechnicalWhitePaper.md)


    从财务角度来看，`EOS` 是由一家名为 `block.one` 的私营公司开发的，并通过 `ERC-20` 代币销售在首次代币发行（ICO）中筹集了高达
    40 亿美元的惊人资金。在撰写本文时，`EOS` 的价格在 2 到 8 美元左右，总市值约为 20 亿美元，这使得 `EOS` 成为按市值计算的第七大加密货币。


    `EOS` 提供了几个有助于开发 `EOS.IO` 合约的代码仓库；它们列在 [`https://github.com/EOSIO`](https://github.com/EOSIO)
    上，包括以下内容：`eos`、`eosio.cdt`、`eosjs`、`demux-js` 和 `eosio.contracts`。在本章中，你将安装 `EOS`
    和 `EOSIO.CDT` 库。`EOS` 库是一个开源智能合约平台，`EOSIO.CDT` 库是一套用于构建 `EOS.IO` 合约的工具集。


    在撰写本文时，`EOS.IO` 平台的学习曲线较为陡峭。代码不断变化，而 `EOS.IO` 的文档和示例并未及时更新，因此有时会感觉像是在追逐一个移动的目标。这导致代码有时无法编译，命令不起作用，文档和示例中包含已弃用的代码和命令。在开发合约的过程中，你很可能会遇到几次卡住的情况；不过，一旦你理解了
    `EOS.IO`，克服这些障碍就会变得容易。

