  trans: '

    ### 注意


    依赖注入是一种设计模式技术。顾名思义，它意味着通过注入代码的方式，将一个对象作为另一个对象的依赖项来使用。


    Angular 2 是对 AngularJS 的彻底重写，并带来了重大变化；不过，从 Angular 2 到版本 8 之间没有重大差异。


    在撰写本文时，Angular 的最新发布版本是 7.3.1，该版本增加了一些功能，例如：


    *   *依赖项*：升级了依赖项，并增加了对 TypeScript 3.1、RxJS 6.3 和 Node 10 的支持。

    *   *包预算*：你可以为应用程序的大小设置警告，以确保不超过限制（默认为 2 MB）。

    *   *Angular CLI*：通过运行 CLI 向导，你可以添加路由等组件，并决定 CSS 的格式。

    *   *Angular Material 的组件开发工具包（CDK）*：新增功能，如开箱即用的虚拟滚动、拖放功能，以及对原生选择字段的 `mat-form-field`
    支持。（我将在本章后面介绍 Material。）


    Angular 8 处于第二个发布候选版本 (rc.2) 阶段，预期功能主要是为了提升性能。它将包含一个名为 Angular Ivy 的改进版视图引擎，改进对支持
    ES2015+ 的现代浏览器的 JavaScript 上传，支持使用 Web Worker 来进行繁重的硬件处理，支持 TypeScript，并提供一个基准测试工具等。


    ### 提示


    我选择了 Angular，但 Angular 并不是唯一能加快开发速度的框架。你可以使用其他框架，例如 React (<https://reactjs.org>)，并获得类似的好处。这个决定实际上取决于个人喜好和你团队的技能组合。你完全可以主要将项目文件复制到
    React 项目，从而轻松地将此项目转换为 React 项目。


    ### 创建一个 Angular 去中心化应用


    在本节中，你将创建一个实际的去中心化应用，该应用将连接到以太坊网络，并从一个账户向另一个账户转移资金。这通常是任何去中心化应用的核心功能。例如，你可以构建一个销售产品、提供服务，或向用户支付测验费用的去中心化应用，所有这些类型都需要有一个转移代币/通证的机制。在本章的这部分，你将使用
    Angular 创建一个去中心化应用。


    在环境和部署方面，你将使用第 5 章中使用过的 Truffle Web 框架，因为它有助于快速创建智能合约。Truffle 不仅能帮助你编译智能合约；它能完成将智能合约注入到
    Web 应用程序所需的一切工作，并且可以运行测试套件。你还将再次使用 MetaMask，以便在浏览器中获得一个安全的区块链账户。最后，你将使用并运行 Ganache
    来创建一个本地区块链 RPC 服务器，用于测试和开发。


    #### 前置条件


    你所需的大多数工具都已安装。Angular 需要 Node 和 `npm` 管理器，这些你之前已经安装过。通过运行带有 `-v` 标志的库来确认安装了正确的版本，就像你在前面的章节中所做的那样。


    ```

    > node -v

    > npm -v

    ```


    如果你没有安装 `npm` 和 `node`，只需运行以下命令：


    ```

    > brew install node

    ```


    为你当前的用户赋予 `npm` 所有权，这样你就不需要使用 `sudo` 来安装库了。


    ```

    > sudo chown -R $USER:$GROUP ~/.npm

    > sudo chown -R $USER:$GROUP ~/.config

    ```


    建议你升级 `npm` 以确保使用的是最新版本；在撰写本文时，最新版本是 6.9.0。


    ```

    > [sudo] npm install -g npm

    +npm@6.9.0

    ```


    #### Angular CLI


    接下来，你需要安装 Angular 命令行界面（CLI）。对于 Angular CLI，建议（但不是必须）使用 `sudo` 和 `allow-root`
    进行安装，并确保 Angular CLI 拥有正确的权限。你将安装 Angular 最新的稳定发布版本 7.3.9。


    ```

    > sudo npm install -g @angular/cli@7.3.9 --unsafe-perm=true --allow-root

    + @angular/cli@7.3.9

    added 363 packages from 197 contributors in 13.691s

    ```


    你也可以安装最新版本的 Angular，但使用较新的 Angular 版本时，你的示例代码可能会失效。


    ```

    > sudo npm install -g @angular/cli --unsafe-perm=true --allow-root

    ```


    要验证安装是否成功，请运行版本标志，你应该会看到版本 7.3.9；图 9-2 显示了预期的输出。


    ![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig2_HTML.jpg](img/475651_1_En_9_Fig2_HTML.jpg)


    图 9-2


    Angular CLI 安装验证


    ```

    > ng version

    ```

