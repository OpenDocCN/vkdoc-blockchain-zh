- fmt: "# Note\n\nPeers form a network of nodes, so throughout this book, you may\
    \ see the word *peer* or *node*. These words are synonymous for the purpose of\
    \ this book.\n\nAs I said, digital assets can be anything—a music file, video\
    \ file, electronic document, and so on. In cryptocurrency, a digital asset is\
    \ represented as electronic cash; you can think of the public key as your bank\
    \ account and routing number and the private key as the actual cash in your account.\
    \ Yes, you can share your bank’s information with others, but the funds will stay\
    \ in your account. To claim your cash, you need to prove ownership. You go to\
    \ the bank and show a form of ID and prove it’s you by a way of signature; only\
    \ then can you get your money out of your account. A similar process happens with\
    \ cryptocurrency. There is a public address that represents your account, and\
    \ only the owner holds the private key to prove ownership.\n\n## Double Spending\
    \ Problem\n\nA digital signature (public keys and private keys) securely ensures\
    \ a party’s identity is kept private and electronic cash is stored.\n\nThis concept\
    \ of a private-public key combo enables you to encrypt and decrypt strings and\
    \ keep a string safe, just as you saw with the Enigma machine. However, it is\
    \ still not enough to solve the biggest problem of digital currency—double spending.\n\
    \nWhen you use fiat money (a paper money made legal by a government) such as U.S.\
    \ dollars or euros, the paper is inconvertible, which means that once you gave\
    \ the paper away, you cannot spend it again. In cryptocurrency, what happens if\
    \ you prove ownership and send your digital asset twice at the exact same time?\
    \ This could lead to *double spending*.\n\nHackers can try to reproduce digital\
    \ assets as well as potentially double spend them, which cryptocurrency had to\
    \ solve before it could be used as a digital currency.\n\n### Note\n\n*Double\
    \ spending* is the risk that digital currency can be spent twice because the digital\
    \ signature could be reproduced and one could prove ownership and send a digital\
    \ asset twice at the same time.\n\nBlocks that hold keys are not enough to provide\
    \ security and solve the double-spending potential issue to form a digital currency.\n\
    \nBitcoin solves this problem by creating a network of computers and proving that\
    \ no attempts of double spending have occurred. This is done by having all the\
    \ computers on the network aware of every transaction. All the transactions are\
    \ shared with all the computers in the network.\n\n## Double Spending Solution:\
    \ P2P Network\n\nIn cryptocurrency, using a peer-to-peer network provided the\
    \ solution to solve the double-spending problem.\n\n### Note\n\n*P2P networking*\
    \ is a distributed application architecture that splits the tasks that need to\
    \ be performed between different peers, with each peer having the same privilege.\
    \ Together the peers create a P2P network of nodes.\n\nAny computer that is connected\
    \ on the network is called a *peer*. The peer can be any computer that meets the\
    \ network requirements such as a laptop, mobile device, or server. The computers\
    \ are connected to each other on the Internet via a P2P network protocol and form\
    \ a network of nodes.\n\nThe P2P network protocol is not new. It has been used\
    \ extensively on the Web for years now, from downloading files via Kazaa or LimeWire\
    \ networks to having video chats via Skype.\n\nAs I mentioned, bitcoin was the\
    \ first viable cryptocurrency, and it solved the double spending issue as well\
    \ as allows electronic cash to be stored without going through financial institutions\
    \ by utilizing P2P to form the blockchain protocol.\n\n> *“A purely peer-to-peer\
    \ version of electronic cash would allow online payments to be sent directly from\
    \ one party to another without going through a financial institution.”*\n> \n\
    > —Satoshi Nakamoto, *Bitcoin: A Peer-to-Peer Electronic Cash System*\n\n## Cryptomining\
    \ by Cryptominers\n\nAs noted, each computer that holds a copy of the shared ledger\
    \ and is connected to the P2P network is a peer. A peer can help to add records\
    \ and verify transactions. The process is called *cryptocurrency mining* or *cryptomining*,\
    \ and the peer that helps record and verify the transactions is called a *cryptominer*\
    \ or a *miner* for short.\n\nEach miner helps to verify and add transactions to\
    \ the blockchain digital ledger. The miners are often rewarded with a fee for\
    \ the work, and to stay competitive with other miners, the miner usually needs\
    \ a computer with specialized hardware.\n\n## Cryptocurrency Wallet\n\nI covered\
    \ what the public keys and private keys are and how they are used to encrypt and\
    \ decrypt strings. The strings are digital currency or cryptocurrency, and the\
    \ keys represent digital money.\n\nA *cryptocurrency wallet* stores one or multiple\
    \ public key and private key combinations and is used to receive or spend cryptocurrency.\n\
    \nA good analogy is to think of a wallet like your bank account. Cryptocurrency\
    \ can be created by getting a reward by doing the miner work, or it can be purchased.\
    \ I will expand on wallets later in the book.\n\n## Cryptocurrencies Overload\n\
    \nBefore diving deeper into the blockchain P2P network, you should know that another\
    \ concept that can cause confusion is the difference between coins and tokens.\
    \ According to `Coinmarketcap.com`, at the time of writing, there are 1,833 listed\
    \ cryptocurrencies with a market cap of $200 billion.\n\nMany of these coins will\
    \ surely disappear in the years to come as they offer little value, and these\
    \ projects will be terminated because of a lack of interest or being a scam.\n\
    \nThis can be confusing and intimidating, and most people don’t understand the\
    \ concept of bitcoin, let alone the large number of coins and tokens out there.\
    \ To help understand these concepts, let’s break down cryptocurrencies into three\
    \ types: bitcoin, tokens, and alternative cryptocurrency coins (altcoins). See\
    \ Figure [1-3](#475651_1_En_1_Chapter.xhtml#Fig3).\n\n![../images/475651_1_En_1_Chapter/475651_1_En_1_Fig3_HTML.jpg](images/475651_1_En_1_Chapter/475651_1_En_1_Fig3_HTML.jpg)\n\
    \n*Figure 1-3 Cryptocurrency coins and tokens. Photo credit: blog.citowise.com.*\n\
    \n### Bitcoin Digital Cash\n\nBitcoin was the first successful implementation\
    \ of a decentralized distributed digital currency. There are 21 million coins\
    \ in total. The coins replace a traditional fiat currency.\n\n### Tokens\n\nTokens\
    \ are a decentralized product offering. It is another option similar to an initial\
    \ public offering (IPO) or crowdfunding. The tokens can be created anywhere in\
    \ the world and delivered via Ethereum, EOS, or another capable blockchain platform.\
    \ Tokens are usually created and distributed to the public via an initial coin\
    \ offering (ICO).\n\nTokens stand for a utility or an asset that usually sits\
    \ on top of a native blockchain. It can represent any digital asset including\
    \ loyalty points, cryptocurrencies, or any good or commodity with individual units\
    \ that are an interchangeable, fungible, or tradable asset. You can create a token\
    \ using an existing blockchain template such as the Ethereum platform, or you\
    \ can create your own tokens on an existing native blockchain and issue your own\
    \ tokens. You can utilize smart contracts to simplify the process of creating\
    \ tokens, as will be discussed in later chapters.\n\n#### Note\n\nSmart contracts\
    \ are programmable code that runs on its own without the need for third parties.\
    \ For instance, Solidity is a contact-oriented programming language and can be\
    \ deployed on multiple blockchains.\n\n### Alternative Cryptocurrency Coins (Altcoins)\n\
    \nAlternative cryptocurrency coins (*altcoins* for short) are coins that are derived\
    \ from bitcoin core source code by forking it (soft fork or hard fork). Examples\
    \ are litecoin (which was a fork of the bitcoin core client), dogecoin (dogecoin\
    \ 1.10 is a complete rebuild based on the bitcoin 0.11 build), bitcoinX, bitcoin\
    \ cash, and bitcoin gold. In fact, at the time of writing, there are 26 altcoins."
