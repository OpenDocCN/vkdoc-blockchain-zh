- fmt: "# Setting Up a Testnet Environment\n\nBefore jumping into coding, let’s start\
    \ by installing EOS.IO and EOSIO.CDT. You will build your EOS.IO version and set\
    \ up a local testnet block producer. Then you will learn about the EOS.IO tools\
    \ called `cleos`, `keosd`, and `nodeos` and how to configure them and create and\
    \ manage a wallet with `cleos`. These tools and libraries are necessary for development.\n\
    \n## Install EOS.IO\n\nThe easiest way to install EOS.IO on macOS is with Brew.\n\
    \n```\n> brew tap eosio/eosio\n> brew install eosio\n```\n\nThe current EOS.IO\
    \ is version 1.7.3. I recommend checking the repo and issues section on GitHub\
    \ (<https://github.com/eosio/eos>) or doing a Google search in case you encounter\
    \ errors when installing or building EOS.IO. Also see <https://github.com/EOSIO/eos/issues>.\n\
    \nOnce the installation is complete, you will see the message in Figure 6-1 in\
    \ Terminal.\n\n![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig1_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1 EOS.IO successfully built\n\nNext, add the EOS.IO binaries location\
    \ to your environment, so you can run `nodeos` from anywhere.\n\n```\n> export\
    \ PATH=$PATH:/usr/local/eosio/bin\n```\n\nThis will set the path variable on this\
    \ Terminal session, but you want to set the path environment variable permanently,\
    \ so add it to your `bash_profile` file by opening the file with vim or your favorite\
    \ text editor.\n\n```\n> vim ~/.bash_profile\n```\n\nNext, insert the following\
    \ lines:\n\n```\n# Setting PATH for EOSIO\nPATH=\"/usr/local/eosio/bin:${PATH}\"\
    \n```\n\nLastly, run `bash_profile` to commit the changes.\n\n```\n> . ~/.bash_profile\n\
    ```\n\nEOS.IO comes out of the box with built-in tools and programs; they are\
    \ here: `/usr/local/eosio/`. Figure 6-2 shows an architecture diagram of these\
    \ tools.\n\n![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig2_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2 Basic architecture of EOS. Photo credit: developers.eos.io.\n\n-\
    \ `nodeos`: This is the core EOS.IO daemon that enables you to run a blockchain\
    \ node component. `nodeos` can be configured with plugins. Additionally, `nodeos`\
    \ can be configured to run a block producer in a local development environment\
    \ or on dedicated endpoints. It interacts with a blockchain by creating blocks.\n\
    - `cleos`: This is the main command-line tool for EOS.IO. It interfaces with the\
    \ REST API exposed by `nodeos`. It can also access wallets as it interacts with\
    \ `keosd`. For a list of `cleos` commands, just run the following:\n\n    ```\n\
    \    > cleos\n    ```\n\n- `keosd`: This is the wallet daemon to load and manage\
    \ the wallet’s keys. It does this by loading wallet-related plugins, such as the\
    \ HTTP interface and the RPC API.\n- `eosio-launcher`: This tool will help you\
    \ deploy a multinode blockchain network.\n\n## Install EOSIO.CDT\n\nYou installed\
    \ EOS.IO. The other important library you need is EOSIO.CDT (CDT stands for “contract\
    \ development toolkit”). EOSIO.CDT is the suite of tools used to build EOS.IO\
    \ contracts. To get the library installed, you will be using Brew.\n\n```\n> brew\
    \ tap eosio/eosio.cdt\n> brew install eosio.cdt\n```\n\nThe latest EOSIO.CDT at\
    \ the time of writing is version 1.6.1. Run `brew update` if you have an older\
    \ version.\n\n```\n> brew upgrade eosio.cdt\n```\n\nTo ensure installation went\
    \ well, run the `eosio-cpp` command with the `help` argument.\n\n```\n> eosio-cpp\
    \ --help\n```\n\nAs you recall, you used Truffle and Remix to generate the Ethereum’s\
    \ application binary interface (ABI) files. For EOS.IO smart contracts, you use\
    \ `eosio-cpp`, which is a compiler that generates a WebAssembly (`.wasm`) file,\
    \ which is the ABI that is needed to be uploaded to the blockchain for the smart\
    \ contract. `eosio-cpp` also generates helper functions that serialize/deserialize\
    \ the types defined in the ABI code for the smart contract development.\n\nYou\
    \ can find more information about EOSIO.CDT on the GitHub page: <https://github.com/EOSIO/eosio.cdt>.\n\
    \nIn the future, if you need to remove EOSIO and EOSIO.CDT, run the following\
    \ commands:\n\n```\n> brew remove eosio\n> brew remove eosio.cdt\n```\n\n### Note\n\
    \n`eosio-cpp` is the replacement for `eosiocpp`, which has been deprecated. Originally\
    \ `eosiocpp` was part of the EOS.IO installation, but now it’s part of CDT.\n\n\
    ## Build EOS.IO\n\nA good way to visually understand EOS.IO and the tools associated\
    \ with EOS.IO is to look at Figure 6-2.\n\n## keosd and nodeos Configuration Files\n\
    \nThe default ports for `keosd` and `nodeos` utilize the same port: 8888.\n\n\
    To configure `nodeos`, see this config file:\n\n```\n> vim \"/Users/[user]/Library/Application\
    \ Support/eosio/nodeos/config/config.ini\"\n```\n\nInside the `config.ini` file,\
    \ a notable variable to change is the plugins list that you load. You won’t make\
    \ changes, but as you advance in your development, you may need to make changes.\n\
    \nLike with `nodeos`, you can configure `keosd` by editing this config file:\n\
    \n```\n> vim ~/eosio-wallet/config.ini\n```\n\nOnce you open the file, note that\
    \ there is a variable named `http-server-address` that can be used to change from\
    \ port 8888 in case you need that port for other software. Here let’s set it to\
    \ any port you like.\n\nThe variable is commented out. To set it to port 9000,\
    \ change it from this:\n\n```\n# http-server-address =\n```\n\nto the following:\n\
    \n```\nhttp-server-address = http://127.0.0.1:9000\n```\n\nYou could use the default\
    \ port; however, it’s good to know how to configure EOS.IO.\n\n## Create and Manage\
    \ a Wallet with cleos\n\nIn the previous section, I introduced some EOS.IO built-in\
    \ programs and tools.\n\nAs mentioned, `cleos` provides a REST API interface that\
    \ is exposed by `nodeos`. The `cleos` reference guide can be found here: <https://developers.eos.io/eosio-cleos/reference>.\n\
    \nTo find the `cleos --version` number, run the `--version client` command. At\
    \ the time of writing, you get to build `d4ffb4eb`.\n\n```\n> cleos version client\n\
    d4ffb4eb\n```\n\nAs mentioned, to get a list of commands, just type `cleos` or\
    \ `cleos --help`.\n\n```\n> cleos --help\n```\n\nIf you don’t remember a specific\
    \ subcommand, type the command and get the subcommands list in the output; for\
    \ instance, the `get` command outputs the subcommands list such as `info` for\
    \ your block producer’s info.\n\n```\n> cleos get\n> cleos get info\nFailed to\
    \ connect to nodeos at http://127.0.0.1:8888/; is nodeos running?\n```\n\nNotice\
    \ that as you don’t have a node running, you get no results and an error message;\
    \ however, later in this chapter, when you spin up `nodeos`, you will get information\
    \ about your block producer."
  raw: "## Setting Up a Testnet Environment\n\nBefore jumping into coding, let’s start\
    \ by installing EOS.IO and EOSIO.CDT. You will build your EOS.IO version and set\
    \ up a local testnet block producer. Then you will learn about the EOS.IO tools\
    \ called `cleos`, `keosd`, and `nodeos and` how to configure them and create and\
    \ manage a wallet with `cleos`. These tools and libraries are necessary for development.\n\
    \n### Install EOS.IO\n\nThe easiest way to install EOS.IO on macOS is with Brew.\n\
    \n```\n> brew tap eosio/eosio\n> brew install eosio\n```\n\nThe current EOS.IO\
    \ is version 1.7.3\\. I recommend checking the repo and issues section on GitHub\
    \ ( [`https://github.com/eosio/eos`](https://github.com/eosio/eos) ) or doing\
    \ a Google search in case you encounter errors when installing or building EOS.IO.\
    \ Also see [`https://github.com/EOSIO/eos/issues`](https://github.com/EOSIO/eos/issues)\
    \ .\n\nOnce the installation is complete, you will see the message in Figure [6-1](#475651_1_En_6_Chapter.xhtml#Fig1)\
    \ in Terminal.\n\n![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig1_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1\n\nEOS.IO successfully built\n\nNext, add the EOS.IO binaries location\
    \ to your environment, so you can run `nodeos from` anywhere.\n\n```\n> export\
    \ PATH=$PATH:/usr/local/eosio/bin\n```\n\nThis will set the path variable on this\
    \ Terminal session, but you want to set the path environment variable permanently,\
    \ so add it to your `bash_profile` file by opening the file with vim or your favorite\
    \ text editor.\n\n```\n> vim ~/.bash_profile\n```\n\nNext, insert the following\
    \ lines:\n\n```\n# Setting PATH for EOSIO\nPATH=\"/usr/local/eosio/bin:${PATH}\"\
    \n```\n\nLastly, run `bash_profile` to commit the changes.\n\n```\n> . ~/.bash_profile\n\
    ```\n\nEOS.IO comes out of the box with built-in tools and programs; they are\
    \ here: `/usr/local/eosio/`. Figure [6-2](#475651_1_En_6_Chapter.xhtml#Fig2) shows\
    \ an architecture diagram of these tools.\n\n![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig2_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2\n\nBasic architecture of EOS. Photo credit: developers.eos.io.\n\n\
    *   `nodeos`: This is the core EOS.IO daemon that enables you to run a blockchain\
    \ node component. `nodeos` can be configured with plugins. Additionally, `nodeos`\
    \ can be configured to run a block producer in a local development environment\
    \ or on dedicated endpoints. It interacts with a blockchain by creating blocks.\n\
    \n*   `cleos`: This is the main command-line tool for EOS.IO. It interfaces with\
    \ the REST API exposed by `nodeos`. It can also access wallets as it interacts\
    \ with `keosd`. For a list of `cleos` commands, just run the following:\n\n  \
    \  ```\n    > cleos\n    ```\n\n*   `keosd`: This is the wallet daemon to load\
    \ and manage the wallet’s keys. It does this by loading wallet-related plugins,\
    \ such as the HTTP interface and the RPC API.\n\n*   `eosio-launcher`: This tool\
    \ will help you deploy a multinode blockchain network.\n\n### Install EOSIO.CDT\n\
    \nYou installed EOS.IO. The other important library you need is EOSIO.CDT (CDT\
    \ stands for “contract development toolkit”). EOSIO.CDT is the suite of tools\
    \ used to build EOS.IO contracts. To get the library installed, you will be using\
    \ Brew.\n\n```\n> brew tap eosio/eosio.cdt\n> brew install eosio.cdt\n```\n\n\
    The latest EOSIO.CDT at the time of writing is version 1.6.1\\. Run `brew update`\
    \ if you have an older version.\n\n```\n> brew upgrade eosio.cdt\n```\n\nTo ensure\
    \ installation went well, run the `eosio-cpp` command with the `help` argument\
    \ .\n\n```\n> eosio-cpp --help\n```\n\nAs you recall, you used Truffle and Remix\
    \ to generate the Ethereum’s application binary interface (ABI) files. For EOS.IO\
    \ smart contracts, you use `eosio-cpp`, which is a compiler that generates a WebAssembly\
    \ (`.wasm`) file, which is the ABI that is needed to be uploaded to the blockchain\
    \ for the smart contract. `eosio-cpp` also generates helper functions that serialize/deserialize\
    \ the types defined in the ABI code for the smart contract development.\n\nYou\
    \ can find more information about EOSIO.CDT on the GitHub page: [`https://github.com/EOSIO/eosio.cdt`](https://github.com/EOSIO/eosio.cdt)\
    \ .\n\nIn the future, if you need to remove EOSIO and EOSIO.CDT, run the following\
    \ commands:\n\n```\n> brew remove eosio\n> brew remove eosio.cdt\n```\n\n### Note\n\
    \n`eosio-cpp` is the replacement for `eosiocpp`, which has been deprecated. Originally\
    \ `eosiocpp` was part of the EOS.IO installation, but now it’s part of CDT.\n\n\
    ### Build EOS.IO\n\nA good way to visually understand EOS.IO and the tools associated\
    \ with EOS.IO is to look at Figure [6-2](#475651_1_En_6_Chapter.xhtml#Fig2).\n\
    \n### keosd and nodeos Configuration Files\n\nThe default ports for `keosd and\
    \ nodeos` utilize the same port: 8888.\n\nTo configure `nodeos`, `see` this config\
    \ file:\n\n```\n> vim \"/Users/[user]/Library/Application Support/eosio/nodeos/config/config.ini\"\
    \n```\n\nInside the `config.ini` file, a notable variable to change is the plugins\
    \ list that you load. You won’t make changes, but as you advance in your development,\
    \ you may need to make changes.\n\nLike with `nodeos`, you can configure `keosd\
    \ by e`diting this config file:\n\n```\n> vim ~/eosio-wallet/config.ini\n```\n\
    \nOnce you open the file, note that there is a variable named `http-server-address`\
    \ that can be used to change from port 8888 in case you need that port for other\
    \ software. Here let’s set it to any port you like.\n\nThe variable is commented\
    \ out. To set it to port 9000, change it from this:\n\n```\n# http-server-address\
    \ =\n```\n\nto the following:\n\n```\nhttp-server-address = http://127.0.0.1:9000\n\
    ```\n\nYou could use the default port; however, it’s good to know how to configure\
    \ EOS.IO.\n\n### Create and Manage a Wallet with cleos\n\nIn the previous section,\
    \ I introduced some EOS.IO built-in programs and tools.\n\nAs mentioned, `cleos\
    \ prov`ides a REST API interface that is exposed by `nodeos`. `The cleos` reference\
    \ guide can be found here: [`https://developers.eos.io/eosio-cleos/reference`](https://developers.eos.io/eosio-cleos/reference)\
    \ .\n\nTo find the `cleos --version` number, run the `--version client` command.\
    \ At the time of writing, you get to build `d4ffb4eb`.\n\n```\n> cleos version\
    \ client\nd4ffb4eb\n```\n\nAs mentioned, to get a list of commands, just type\
    \ `cleos. or cleos --help;`.\n\n```\n> cleos --help\n```\n\nIf you don’t remember\
    \ a specific subcommand, type the command and get the subcommands list in the\
    \ output; for instance, the `get` command outputs the subcommands list such as\
    \ `info` for your block producer’s info.\n\n```\n> cleos get\n> cleos get info\n\
    Failed to connect to nodeos at http://127.0.0.1:8888/; is nodeos running?\n```\n\
    \nNotice that as you don’t have a node running, you get no results and an error\
    \ message; however, later in this chapter, when you spin up `nodeos`, you will\
    \ get information about your block producer."
  trans: "\n# 搭建测试网络环境\n\n在开始编写代码之前，让我们先安装 EOS.IO 和 EOSIO.CDT。你需要构建自己的 EOS.IO 版本，并设置一个本地测试网区块生产者。接着，你将学习名为`cleos`、`keosd`和`nodeos`的\
    \ EOS.IO 工具，以及如何配置它们，并使用`cleos`创建和管理钱包。这些工具和库是开发过程中必不可少的。\n\n## 安装 EOS.IO\n\n\
    在 macOS 上安装 EOS.IO 最简单的方法是使用 Brew。\n\n```\n> brew tap eosio/eosio\n> brew install\
    \ eosio\n```\n\n当前 EOS.IO 的版本是 1.7.3。我建议你查看 GitHub（<https://github.com/eosio/eos>）上的仓库和问题板块，或在谷歌上进行搜索，以防在安装或构建\
    \ EOS.IO 时遇到错误。也可参见<https://github.com/EOSIO/eos/issues>。\n\n安装完成后，你将在终端的图 6-1\
    \ 中看到如下信息。\n\n![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig1_HTML.jpg](img/475651_1_En_6_Fig1_HTML.jpg)\n\
    \n图 6-1 EOS.IO 构建成功\n\n接下来，将 EOS.IO 的二进制文件位置添加到你的环境变量中，这样你就可以从任何地方运行`nodeos`了。\n\
    \n```\n> export PATH=$PATH:/usr/local/eosio/bin\n```\n\n这将在当前终端会话中设置变量，但你可能希望永久设置该环境变量。因此，请使用\
    \ vim 或你喜欢的文本编辑器打开`bash_profile`文件，并将其添加进去。\n\n```\n> vim ~/.bash_profile\n```\n\
    \n接着，插入以下几行内容：\n\n```\n# 为 EOSIO 设置 PATH\nPATH=\"/usr/local/eosio/bin:${PATH}\"\
    \n```\n\n最后，运行`bash_profile`以提交更改。\n\n```\n> . ~/.bash_profile\n```\n\nEOS.IO\
    \ 开箱即用，内置了工具和程序；它们位于`/usr/local/eosio/`目录下。图 6-2 展示了这些工具的架构图。\n\n![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig2_HTML.jpg](img/475651_1_En_6_Fig2_HTML.jpg)\n\
    \n图 6-2 EOS 的基本架构。图片来源：developers.eos.io。\n\n- `nodeos`: 这是 EOS.IO 的核心守护进程，使你能够运行一个区块链节点组件。`nodeos`可以通过插件进行配置。此外，`nodeos`可以配置为在本地开发环境或专用端点上运行区块生产者。它通过创建区块与区块链进行交互。\n\
    - `cleos`: 这是 EOS.IO 的主要命令行工具。它与`nodeos`暴露的 REST API 接口交互。在与`keosd`交互时，它也可以访问钱包。要查看`cleos`命令列表，只需运行以下命令：\n\
    \n    ```\n    > cleos\n    ```\n\n- `keosd`: 这是用于加载和管理钱包密钥的钱包守护进程。它通过加载与钱包相关的插件来实现这一点，例如\
    \ HTTP 接口和 RPC API。\n- `eosio-launcher`: 此工具将帮助你部署一个多节点区块链网络。\n\n## 安装 EOSIO.CDT\n\
    \n你已经安装了 EOS.IO。另一个你需要的重要库是 EOSIO.CDT（CDT 代表“合约开发工具包”）。EOSIO.CDT 是用于构建 EOS.IO\
    \ 合约的工具套件。要安装此库，你将使用 Brew。\n\n```\n> brew tap eosio/eosio.cdt\n> brew install\
    \ eosio.cdt\n```\n\n在撰写本文时，最新的 EOSIO.CDT 版本是 1.6.1。如果你使用的是旧版本，请运行`brew update`。\n\
    \n```\n> brew upgrade eosio.cdt\n```\n\n为确保安装成功，请使用`help`参数运行`eosio-cpp`命令。\n\n\
    ```\n> eosio-cpp --help\n```\n\n回想一下，你曾使用 Truffle 和 Remix 来生成以太坊的应用程序二进制接口（ABI）文件。对于\
    \ EOS.IO 智能合约，你使用`eosio-cpp`，这是一个编译器，可生成 WebAssembly（`.wasm`）文件，该文件是智能合约需要上传到区块链的\
    \ ABI。`eosio-cpp`还会生成辅助函数，用于序列化/反序列化 ABI 代码中为智能合约开发定义的类型。\n\n你可以在 GitHub 页面（<https://github.com/EOSIO/eosio.cdt>）上找到关于\
    \ EOSIO.CDT 的更多信息。\n\n将来，如果你需要卸载 EOS.IO 和 EOSIO.CDT，请运行以下命令：\n\n```\n> brew remove\
    \ eosio\n> brew remove eosio.cdt\n```\n\n### 注意\n\n`eosio-cpp`是已弃用的`eosiocpp`的替代品。最初，`eosiocpp`是\
    \ EOS.IO 安装的一部分，但现在它属于 CDT。\n\n## 构建 EOS.IO\n\n直观理解 EOS.IO 及相关工具的一个好方法是查看图 6-2。\n\
    \n## keosd 和 nodeos 配置文件\n\n`keosd`和`nodeos`的默认端口都使用相同的端口：8888。\n\n要配置`nodeos`，请查看此配置文件：\n\
    \n```\n> vim \"/Users/[user]/Library/Application Support/eosio/nodeos/config/config.ini\"\
    \n```\n\n在`config.ini`文件中，一个值得注意的需要修改变量是你加载的插件列表。目前你不会进行修改，但随着开发的深入，你可能需要做出更改。\n\
    \n与`nodeos`类似，你可以通过编辑以下配置文件来配置`keosd`：\n\n```\n> vim ~/eosio-wallet/config.ini\n\
    ```\n\n打开文件后，请注意有一个名为`http-server-address`的变量，如果 8888 端口被其他软件占用，可以使用该变量更改端口。这里我们将其设置为你喜欢的任何端口。\n\
    \n该变量默认是注释掉的。要将其设置为端口 9000，请将其从：\n\n```\n# http-server-address =\n```\n\n修改为：\n\
    \n```\nhttp-server-address = http://127.0.0.1:9000\n```\n\n你可以使用默认端口；但是，了解如何配置\
    \ EOS.IO 是有好处的。\n\n## 使用 cleos 创建和管理钱包\n\n在上一节中，我介绍了一些 EOS.IO 内置的程序和工具。\n\n如前所述，`cleos`\
    \ 提供了由 `nodeos` 暴露的 REST API 接口。`cleos`参考指南可在此处找到：<https://developers.eos.io/eosio-cleos/reference>。\n\
    \n要查看`cleos --version`版本号，请运行`--version client`命令。在撰写本文时，你获取的版本为`d4ffb4eb`。\n\n\
    ```\n> cleos version client\nd4ffb4eb\n```\n\n如前所述，要获取命令列表，只需键入`cleos`或`cleos\
    \ --help`。\n\n```\n> cleos --help\n```\n\n如果你记不住某个特定的子命令，可以键入该命令并在输出中获取子命令列表；例如，`get`命令会输出子命令列表，如用于查询区块生产者信息的`info`。\n\
    \n```\n> cleos get\n> cleos get info\nFailed to connect to nodeos at http://127.0.0.1:8888/;\
    \ is nodeos running?\n```\n\n请注意，因为你尚未运行节点，所以没有结果，并显示了一条错误信息；然而，在本章后面，当你启动`nodeos`时，你将获得有关区块生产者的信息。\n"
- fmt: '# EOS.IO Wallets


    The EOS.IO wallets use keys and offer a locked (encrypted) state and an unlocked
    (decrypted) state to protect the keys. The `lock` and `unlock` commands need the
    high entropy password that is provided to you once you create a wallet. The wallet’s
    keys can be associated with an account to provide permission to the account’s
    tokens, but it’s not necessary for the creation of a wallet.


    The wallet’s software uses `cleos` as the intermediary layer between `keosd` key
    retrieval operations and the `nodeos` blockchain actions. For instance, you can
    use `cleos` to access an account as it requires signatures to be generated from
    the keys. To create the default wallet, just run the `create wallet` command.
    Use the `--to-console` flag to get the master key (password).


    ```

    > cleos wallet create --to-console

    Creating wallet: default

    Save password to use in the future to unlock this wallet.

    Without password imported keys will not be retrievable.

    "[ DEFAULT_MASTER_KEY]"

    ```


    Make sure you store the password. Now you can check that the wallet was created
    and run the `wallet list` command, and you will be able to see an array that lists
    the wallets and includes the default wallet you created.


    ```

    > cleos wallet list

    Wallets:

    [

    "default ∗"

    ]

    ```


    Notice that once you create your default wallet, there is an asterisk next to
    the wallet’s name. The asterisk means that it’s unlocked. You’ll learn more about
    the lock and unlock states in the next section.


    ## Delete and Back Up Wallets


    To remove the wallet you created, you need to remove the actual wallet’s file;
    it’s located here: `~/eosio-wallet`.


    ```

    > rm -rf ~/eosio-wallet

    ```


    Run the `wallet list` command, and you can see that the wallet array is empty.


    ```

    > cleos wallet list

    "/usr/local/eosio/bin/keosd" launched

    Wallets:

    []

    ```


    To back up the wallet, copy the wallet’s files and store them in a safe location.


    ## EOS.IO Wallet with Custom Name


    So far, you created the default wallet. Now let’s say you want to create another
    wallet and name it `mywallet`. All you have to do is utilize the `-n` or `--name`
    flag. Choose a name and be careful about the strict name restrictions (a–z and
    1–5 are allowed only, with a length of 12). I am choosing `mywallet`.


    ```

    > cleos wallet create -n mywallet --to-console

    Creating wallet: mywallet

    Save password to use in the future to unlock this wallet.

    Without password imported keys will not be retrievable.

    "[DEFAULT_MASTER_KEY]"

    ```


    ## EOS.IO: Open, Lock, and Unlock a Wallet


    When you created your wallet, you got a high entropy master key, which is your
    password. This password is used to encrypt (lock) and decrypt (unlock) your wallet
    file. To lock and unlock your wallet, use the following commands:


    ```

    > cleos wallet lock -n mywallet

    > cleos wallet unlock -n mywallet

    password: [DEFAULT_MASTER_KEY]

    password: Unlocked: mywallet

    ```


    The `lock` and `unlock` commands enable your wallet to set a state of encryption
    and decryption that is protected by your password. What you are protecting are
    the wallet’s keys.


    To unlock the default wallet, just run the following:


    ```

    > cleos wallet unlock

    ```


    Also, to perform operations on your wallets, you need to first open the wallet.
    When `keosd` gets restarted, the wallet will be closed. Run the `open` command
    to open the wallet as needed.


    ```

    > cleos wallet open

    Opened: default

    ```


    ## Generating EOS.IO Keys


    Just as in other blockchains, EOS.IO stores keys in a wallet. You generate these
    keys and assign them to an EOS.IO account. There are multiple ways to create keys.
    You will be using `cleos` here. First let’s re-create the default wallet, in case
    you deleted it previously.


    ```

    > cleos wallet create --to-console

    Creating wallet: default

    Save password to use in the future to unlock this wallet.

    Without password imported keys will not be retrievable.

    ```


    `"[DEFAULT_MASTER_KEY]"`


    Running `wallet list` should show you two wallets.


    ```

    > cleos wallet list

    Wallets:

    [

    "default",

    "mywallet ∗"

    ]

    ```


    Next, to create two public/private key pairs, run the `create key` command.


    ```

    > cleos create key --to-console

    Private key: [PRIVATE_KEY_1]

    Public key: [PUBLIC_KEY_1]

    > cleos create key --to-console

    Private key: [PRIVATE_KEY_2]

    Public key: [PUBLIC_KEY_2]

    ```


    As you noticed, you ran the `create key` command twice. This is not a typo; you
    need to have two keys: one for the active user and one for the owner. You’ll learn
    more about this concept once you create an account.


    The command you ran output key pairs of public and private keys. Notice that the
    public key starts with the `EOS` keyword. These arbitrary key pairs are meaningless
    by themselves because they have no authority (they do not belong to any wallet
    or account). To assign these key pairs to a wallet, you can import these keys
    into your wallet.


    ```

    > cleos wallet import --private-key [PRIVATE_KEY_1]

    imported private key for:

    [PRIVATE_KEY_1]

    imported private key for: [key]

    > cleos wallet import --private-key [PRIVATE_KEY_2]

    imported private key for: [PRIVATE_KEY_2]

    ```


    In the output of your command, you received a confirmation message from the command
    line that the key pairs were added. However, you can also confirm that the key
    pairs were added by calling the `wallet keys` command.


    ```

    > cleos wallet keys

    [PUBLIC_KEY_1, PUBLIC_KEY_2]

    ```


    Additionally, you can request to view the key pairs.


    ```

    > cleos wallet private_keys --password [DEFAULT_MASTER_KEY]

    [[PUBLIC_KEY_1, PRIVATE_KEY_2],[ PUBLIC_KEY_1, PUBLIC_KEY_2]]

    ```


    In the previous command, you passed the `--password` argument instead of waiting
    for the command line to ask that you enter your master password.


    Lastly, you need to import a special EOS.IO parent account. This special parent
    account is used to bootstrap the EOS.IO nodes. Without this private key, you won’t
    be able to create your account. EOS.IO accounts need a parent account to create
    another account; that’s how EOS.IO allocates resources and protects against spam
    and hackers.


    ```

    > cleos wallet import --private-key 5KQwrPbwdL6PhXujxW37FSSQZ1JiwsST4cqQzDeyXtP79zkvFD3

    imported private key for: EOS6MRyAjQq8ud7hVNYcfnVPJqcVpscN5So8BhtHuGYqET5GDW5CV

    ```


    ### Note


    At the time of writing, the parent wallet works; however, this can change, and
    you may need to find a parent wallet that can be used to bootstrap the EOS.IO
    wallet.


    Take a look at your output in case you would like to compare yours with mine;
    see Figure 6-3.


    ![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig3_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig3_HTML.jpg)


    **Figure 6-3** Setting up EOS.IO wallet keys with a special parent account'
