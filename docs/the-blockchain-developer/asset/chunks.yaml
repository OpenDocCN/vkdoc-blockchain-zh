    ## 关于作者与技术审校


    ### 关于作者


    ### 关于技术审校


    # 1. 区块链基础


    本章将成为你“起飞”前的基础知识学校。它将介绍一些基本概念，帮助你理解区块链技术。本章分为四个部分。


    *   加密经济学入门


    *   区块链详解


    *   加密货币概览


    *   区块链 P2P 网络


    要理解加密经济学，你首先需要理解诸如加密与解密、公私钥、密码学、数字资产、密码学和加密货币等概念。


    一旦你理解了这些基本概念，我将介绍区块链。我将涵盖构成单个区块链的各个部分，例如区块，以及区块是如何链接在一起的，还包括区块链存在的问题，比如双重支付。我还将解释加密挖矿、加密矿工和加密货币钱包。


    然后，我将介绍不同类型的加密货币：比特币、代币和替代加密货币币种（山寨币）。


    最后，我将介绍区块链技术中使用的 P2P 网络，以及构成该网络的不同层次：共识层、矿工层、传播层、语义层和应用层。


    ## 加密经济学入门


    加密世界充满了技术术语，即使是经验最丰富的技术忍者也可能感到困惑。比特币引入了加密经济学的概念，并为许多区块链平台的创建铺平了道路。在深入探讨区块链如何工作之前，让我们先了解什么是加密经济学以及区块链背后的基本概念。


    语言交流是基于选择词语来描述你想要传达的信息。然而，有时你只想与特定人群交流，同时排除其他人。战时就是一个很好的例子：指挥官与驻守前线的士兵沟通，同时确保敌人无法窃听。指挥官可以使用加密技术进行这种通信。


    从电子层面来说，如今所有购物网站都通过一种称为安全套接层（SSL）的加密协议提供商品，该协议可以保护你的个人信息免受黑客攻击。视频加密和解密很常见，以确保视频仅传递给授权会员。在个人电脑上，人们经常使用加密来备份和保护文件及密码。


    此外，作为开发者，你可能已经借助库发送过加密消息，并解密过传入的消息，因为所有编程语言都提供字符串加密和解密函数。


    那么，让我们来看一些定义：


    *   *加密*：加密是将你的消息转换为代码的过程，以便只有授权方才能访问它。


    *   *解密*：解密是逆转加密过程，从而将消息转换回原始消息。


    *   *密码学*：这是利用加密和解密技术来发送和接收消息。


    *   *加密货币*：这是以与之前的 SSL 或视频示例相同的方式使用密码学，但专门为了满足数字资产的需求。


    ### 注意


    *数字资产*可以是任何有价值的东西，例如你家保险柜的密码组合、秘密口令、列表、消息、电子现金、文档、照片等等。


    *   *加密经济学*：这是密码学与经济学的结合，以提供一个传递数字资产的平台。


    为了进一步澄清，让我们更详细地研究这些术语，并将它们应用于我将在本书中介绍的主题。


    ### 倒置偶语


    首先，让我们回到过去。你小时候说过倒置偶语吗？这种秘密的倒置偶语语言很简单。你将要说的单词的第一个字母去掉，然后将这个字母移到单词末尾，并加上“ay”的音。


    例如：


    *   “Pig” 变成 “ig-pay”。


    *   “Latin” 变成 “atin-lay”。


    我们刚才做的就是加密。然后要理解我们加密的单词，我们需要反向操作。


    *   “Ig-pay” 通过去掉末尾的 “ay”，并取最后一个字母将其放回首位，变回 “pig”。


    *   类似地，“atin-lay” 变回 “Latin”。


    我们刚才做的就是解密。孩子们能够使用这些技术，以简单的密码学形式加密和解密单词。


    #### 加密/解密


    加密使您能够以安全的方式在特定方之间传递消息，从而被排除在外的方无法理解这些消息。纵观历史，一直存在能够在各方之间发送秘密消息的需求。一方在某个地点发送加密消息，然后另一方能够在其他地点接收并解密该消息。


    事实上，加密在第一次世界大战（一战）和第二次世界大战（二战）期间被大量使用。纳粹使用一种名为恩尼格玛的机器来加密和解密消息（见图 1-1）。盟军找到了破解纳粹恩尼格玛机器密码并解密消息的方法。据信这使二战缩短了数年之久。


    ![../images/475651_1_En_1_Chapter/475651_1_En_1_Fig1_HTML.jpg](img/475651_1_En_1_Fig1_HTML.jpg)


    **图 1-1** 恩尼格玛机。图片来源：wikimedia.org。


    加密和解密通过 1970 年 IBM 开发的数据加密标准（DES）以及 1976 年密钥密码学的发明，从纯粹的军事用途转向了公共用途。事实上，在过去，密码学和加密是同义词。'
- fmt: '# 加密 + 解密 = 密码学


    如前所述，密码学是运用加密和解密技术的过程。`cryptography`一词源自希腊语`kryptos`，意为隐藏或秘密。


    在Pig Latin语言的例子中，我描述了你如何对单词进行加密和解密。这种将首字母移至词尾并添加`"ay"`，以及反向操作的技术，就是密码学。如果不知道这项技术，你就无法理解Pig
    Latin语言。


    大多数人可能足够聪明，能够识破简单的Pig Latin语言秘密；然而，一个复杂的加密实例就另当别论了。


    例如，回到二战时期的恩尼格玛密码机，纳粹通过无线电传递信息。盟军能够接收这些信息（信息即为“公钥”），但如果没有解码方法（“私钥”），这远远不够。一位名叫图灵的科学家和其他人花费了五个半月才破译了纳粹的秘密信息。


    ### 注意


    密码学中的*密钥*可用于加密消息。加密后的消息只能通过收件人已知的第二把密钥（私钥）来解密。


    图灵的贡献在于自动化了一台机器，该机器能够找出纳粹在其恩尼格玛密码机中设置的不同参数，从而解密信息。换句话说，它自动化了搜索私钥的过程。那台机器被称为`bombe`。


    # 数字资产 + 密码学 = 加密货币


    加密货币是一种数字资产，其设计使得电子现金能够使用强密码学（加密和解密）进行交换，以确保资金、交易以及新资金创建的安全性。


    密码学的私钥机制必须足够强大，以至于几乎不可能（换句话说，需要花费过多时间和精力）被破解。否则，如果密码学能在几个月内（如恩尼格玛密码机那样）被破解，所有用户都有可能丢失他们的电子现金。


    加密货币的一个例子是比特币。虽然比特币并非首个被发明的加密货币，但它通常被认为是第一个成功的加密货币。


    比特币的成功归因于以下特点：没有人能破解公钥-私钥体系，它不受政府控制地分布运行，它是公开可用的，并且以开源代码的形式发布。


    ### 注意


    比特币由中本聪于2008年发明，并发布了一篇名为“比特币：一种点对点的电子现金系统”的白皮书（[`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf)）。完整的开源软件实际于一年后的2009年发布（[`https://github.com/bitcoin/bitcoin`](https://github.com/bitcoin/bitcoin)）。


    # 密码学 + 经济学 = 加密经济学


    加密经济学是密码学与经济学的结合，旨在提供一个平台，激励人们维护该平台、其可扩展性及安全性；此外，它不受中央或地方政府控制。换句话说，它是*去中心化*的。该网络由多台计算机组成，而非单一一台中央计算机。


    ### 注意


    去中心化是中央控制的对立面；它意味着没有中央或地方政府的控制。


    比特币能够通过使用公私钥概念来实现加密经济学的目标；密码学和加密哈希函数被间接使用。事实上，密码学与加密货币之间的关系不仅是比特币，对于大多数现有加密货币而言都是间接的。


    例如，密码学在比特币中以其他方式被使用，例如：


    *   比特币借助一种算法函数（称为ECDSA椭圆曲线）使用私钥（比特币称之为*数字签名*）来证明所有权。

    *   哈希算法用于通过一个名为SHA256的哈希生成器维护数据库账本数据（或区块链）的结构。

    *   哈希算法用于生成数学谜题，计算机尝试解决谜题以获取奖励。一旦谜题被解决，该计算机被选中协助处理交易。

    *   哈希算法也用于生成账户地址。

    *   存在默克尔树的概念（将在下一章介绍），它利用小块数据的大数据哈希键。这对于需要在受限硬件设备（如移动设备）上运行的轻量级钱包非常有用。


    比特币不收集用户的身份信息；然而，交易是公开的，这意味着所有信息都被传输并在线上可用。再想想恩尼格玛密码机的例子；这意味着任何人都可以截获传输的信息。然而，没有私钥，任何人都无法解密这些信息。


    自2009年比特币发布以来，出现了许多其他平台，它们使用不同类型的隐私保护以安全的方式发送信息，并在流程的更多部分使用加密，从而减少公开的信息。例如，Monero和Zcash等平台甚至通过密码学对交易的细节进行匿名化处理。


    # 区块链解释


    如前所述，比特币是第一个成功的开源数字现金。区块链是核心底层技术，或者说，是比特币以及事实上所有加密货币平台的心脏。


    但什么是区块链？


    简而言之，*区块链*是一个共享的数字账本。可以想象一个数据库，它不是将所有的数据库条目存储在一台计算机上，而是将数据存储在多个计算机上。一个更专业的定义是：区块链是一个去中心化且分布式的全球账本。


    ## 区块 + 链 = 区块链


    每个区块包含记录和交易；这些区块在多个计算机之间共享，并且除非整个网络达成一致（共识），否则不应被篡改。该网络根据特定策略进行管理。这些计算机连接在一个网络上，被称为*对等节点*或*节点*。


    ### 注意


    什么是区块链？一个*区块链*是一个数字化的、去中心化的（没有金融机构参与）且分布式的账本。用通俗的话说，它是一个将记录和交易存储在多个计算机上的数据库，没有单一控制方，并遵循约定的策略。存储的数据是一个区块，这些区块被链接（链在一起）形成区块链。


    #### 链接的区块


    区块链由一系列数据（一个*区块*）组成，每个区块都链接到前一个区块。它们是如何链接的？一个区块包含数据，并且每个区块都引用其前面的区块，因此它们就像链环连接到前面的链环一样链接在一起。请看图[1-2](#475651_1_En_1_Chapter.xhtml#Fig2)；如图所示，每个区块都引用前一个区块。


    ![../images/475651_1_En_1_Chapter/475651_1_En_1_Fig2_HTML.jpg](images/475651_1_En_1_Chapter/475651_1_En_1_Fig2_HTML.jpg)


    图 1-2


    链在一起的区块


    因此，区块链包含区块，这些区块保存着交易记录。私钥由所有者持有，以证明所有权（这就是数字签名），因此没有私钥的人无法解密该字符串并声称所有权。这种公钥与私钥的组合代表了电子现金。'
  raw: '#### Encryption + Decryption = Cryptography


    As mentioned, cryptography is the process of using the techniques of encryption
    and decryption. The word *cryptography* came from the Greek word *kryptos*, which
    means hidden or secret.


    In the Pig Latin language example, I described how you can encrypt and decrypt
    words. That technique of removing the first letter and adding it to the end with
    “ay,” and then vice versa, is cryptography. Without knowledge of the technique,
    you wouldn’t be able to understand the Pig Latin language.


    Most people are probably smart enough to figure out the secret Pig Latin language
    as it’s simple in nature; however, a complex encryption example would be a different
    story.


    For instance, going back to the WWII Enigma machine, the Nazis were passing messages
    over the air. The Allies were capable of receiving these messages (the messages
    were the “public keys”), but without a way to decode them (the “private keys”),
    it was not enough. It took a scientist named Turing and others five-and-a-half
    months to decrypt the Nazi’s secret messages.


    ### Note


    A cryptographic *key* can be used to encrypt a message. The encrypted message
    can then be decrypted only by using the second key (a private key) that is known
    only to the recipient.


    Turing’s contribution was to automate a machine that was capable of figuring out
    different settings the Nazis made in their Enigma machine so they could decrypt
    messages In other words, it automated the process of searching for the private
    key. That machine was called *bombe*.


    #### Digital Assets + Cryptography = Cryptocurrency


    Cryptocurrency is a digital asset designed so that electronic cash is able to
    be exchanged using strong cryptography (encryption and decryption) to ensure the
    security of funds, transactions, and the creation of new funds.


    The cryptography’s private key mechanism must be strong enough that it would be
    almost impossible (in other words, take too much time and effort) to figure out.
    Otherwise, all users could potentially lose their electronic cash if the cryptography
    could be figured out within a few months such as with the Enigma machine.


    An example of cryptocurrency is bitcoin. Although bitcoin was not the first cryptocurrency
    invented, it’s generally considered the first successful cryptocurrency.


    Bitcoin’s success is attributed to the following characteristics: no one can break
    the public-private key, it’s distributed without a controlled government, it’s
    publicly available, and it’s published as open source code.


    ### Note


    Bitcoin was invented in 2008 by Satoshi Nakamotoi with the publication of a white
    paper called “Bitcoin: A Peer-to-Peer Electronic Cash System” ( [`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf)
    ). The actual complete open source software was released a year later in 2009
    ( [`https://github.com/bitcoin/bitcoin`](https://github.com/bitcoin/bitcoin) ).


    #### Cryptography + Economics = Cryptoeconomics


    Cryptoeconomics is the combination of cryptography and economics to provide a
    platform that gives an incentive to maintain the platform, its scalability, and
    its security; in addition, it is absent of central or local government control.
    In other words, it’s *decentralized*. The network is made up of a collection of
    multiple computers instead of one central computer.


    ### Note


    Decentralized is the opposite of central control; it means without central or
    local government control.


    Bitcoin is able to achieve cryptoeconomics’ goals by using the private-public
    key concepts; cryptography and cryptographic hashing functions are used indirectly.
    In fact, the relation between cryptography and cryptocurrency is indirect not
    just for bitcoin but for most cryptocurrency out there.


    For instance, cryptography is used in bitcoin in other ways such as the following:


    *   Bitcoin uses private keys (bitcoin calls these *digital signatures*) with
    the help of an algorithm function (called the ECDSA elliptic curve) to prove ownership.


    *   Hashing algorithms are used for holding the structure of the database ledger
    data (or blockchain) via a hash generator called SHA256.


    *   The hashing algorithms are used to generate math puzzles that a computer tries
    to solve for a prize. Once the puzzle is solved, the computer is selected to help
    handle the transactions.


    *   Hashing algorithms are also used to generate account addresses.


    *   There is the concept of Merkle trees (covered in the next chapter), which
    use the hashing keys of large data in small pieces. This is useful for lightweight
    wallets that are needed on constrained hardware devices such as mobile devices.


    Bitcoin does not gather identity information for its users; however, the transactions
    are public, meaning that all the information is transmitted and available online.
    Think of the Enigma example again; this means that anyone can intercept the messages
    transmitted. However, without the private key, no one can decrypt the messages.


    Since the release of bitcoin in 2009, there are many other platforms that use
    different types of privacy for sending information in a secure manner and that
    use encryption for more portions of the process so that less information is public.
    Platforms such as Monero and Zcash use anonymity via cryptography even for messaging
    a transaction’s details.


    ## Blockchain Explained


    As I mentioned, bitcoin was the first successful open source digital cash. Blockchain
    is the core technology, or the heart behind bitcoin and in fact behind all cryptocurrency
    platforms.


    But what is blockchain?


    In short, a *blockchain* is a shared digital ledger. Think of a database that
    instead of storing all the database entries on one computer it stores the data
    on multiple computers. A fancier definition would be that a blockchain is a decentralized
    and distributed global ledger.


    ### Blocks + Chain = Blockchain


    Each block contains records and transactions; these blocks are shared across multiple
    computers and should not be altered absent an agreement (consensus) of the entire
    network. The network is ruled according to a specific policy. The computers are
    connected on one network and called *peers* or *nodes* .


    ### Note


    What is blockchain? A *blockchain* is a digital decentralized (no financial institutions
    involved) and distributed ledger. In layperson’s terms, it is a database that
    stores records and transactions on multiple computers without one controlling
    party and according to an agreed policy. The data that is stored is a block, and
    the blocks are linked (chained) together to form a blockchain.


    #### Linked Blocks


    A blockchain consists of a collection of data (a *block*) linked to the previous
    block. How are they linked? A block contains data, and each block references the
    block preceding it, so they are linked just as a chain link would be connected
    to the chain link before it. Take a look at Figure [1-2](#475651_1_En_1_Chapter.xhtml#Fig2);
    as you can see, each block is referencing the previous block.


    ![../images/475651_1_En_1_Chapter/475651_1_En_1_Fig2_HTML.jpg](images/475651_1_En_1_Chapter/475651_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Blocks chained together


    So, a blockchain contains blocks, which hold records of transactions. The private
    keys are held by the owner to show proof of ownership (this is the digital signature),
    so no one without the private key can decrypt the string and claim ownership.
    This combination of public keys and private keys represents the electronic cash.'
