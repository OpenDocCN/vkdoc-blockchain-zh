    \ consensus mechanism are believed by many to be the future of all businesses.\
    \ Only time will tell.\n\nAdditionally, open source software is an advantage because\
    \ it allows users to view the source code and potentially contribute. Decentralizing\
    \ using a blockchain harnesses the advantages of blockchain as DLT and serves\
    \ as a replacement to the traditional one-server database.\n\nFinally, adding\
    \ records/transactions to ledgers is usually done utilizing tokens, and the consensus\
    \ mechanism of a token is also an agreement between all the users of the dapp.\n\
    \n### Dapp Classification\n\nIn addition to the previous criteria, dapps can be\
    \ categorized. The classification is based on the infrastructure the dapp is utilizing\
    \ and can be broken down to these three categories:\n\n*   *Dedicated blockchain\
    \ dapps*: These are dapps that use a dedicated blockchain directly; examples are\
    \ bitcoin, Ethereum, EOS, and NEO.\n\n*   *Dapps relying on another blockchain*:\
    \ For instance, the Omni Layer Protocol (formerly called Mastercoin) is a digital\
    \ currency and communications protocol that is built on top of the bitcoin blockchain.\n\
    \n*   *Dapps relying on another protocol that built on top of another blockchain*:\
    \ These dapps use a protocol that is built on top of another blockchain. An example\
    \ is the safe network using the Omni Layer Protocol.\n\nA good example to help\
    \ understand the classification concept is the USDT (Tether) token. This token\
    \ was issued twice based on two blockchains: bitcoin and Ethereum. In this case,\
    \ there are two types of USDT. The original, which is based on bitcoin, is done\
    \ by using the Omni Layer Protocol to generate the token, and the Ethereum-based\
    \ USDT is compatible with the Ethereum’s ERC20 standard. Take a look at Figure\
    \ [9-1](#475651_1_En_9_Chapter.xhtml#Fig1).\n\n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig1_HTML.jpg](images/475651_1_En_9_Chapter/475651_1_En_9_Fig1_HTML.jpg)\n\
    \nFigure 9-1\n\nRepresentation of clasisification for USDT"
