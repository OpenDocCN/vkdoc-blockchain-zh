  trans: "  \n### 资源分配详解  \n\n在讲解测试网时，我曾简要提及资源分配，因为你需要获取 EOS 代币才能在公共测试网上发布智能合约。  \n\
    \n对于主网，你需要实际的 EOS 代币来购买 RAM 并创建账户。EOS.IO 账户会消耗三种类型的资源：  \n\n- **磁盘**：带宽和日志存储（磁盘）\
    \  \n- **CPU**：质押计算和计算积压（CPU）  \n- **RAM**：质押状态存储  \n\n### 在主网上购买 RAM  \n\n为了释放\
    \ RAM，你需要从账户状态机制中删除数据，然后 RAM 可以在 RAM 市场以当前价格出售。RAM 市场价格可在此处查看：[`https://www.feexplorer.io/EOS_RAM_price`](https://www.feexplorer.io/EOS_RAM_price)。\
    \  \n\n### 在主网上创建 EOS.IO 账户  \n\nEOS.IO 账户是必要的，因为你需要它们与 EOS.IO 网络交互并创建账户。正如我之前所解释的，已有账户的人需要为创建新账户作担保。如果你没有认识的人拥有\
    \ EOS 账户来帮你创建，你可以通过第三方服务提供商创建账户。第三方服务提供商通常会收取费用。例如，你可以在手机上下载 EOS Lynx，支付 2 美元创建一个\
    \ EOS.IO 账户。  \n\n### 更改账户的公钥和私钥  \n\n获得主网账户后，工作并未结束。在向账户充值前，你需要确保更改私钥，因为创建账户的服务方可能存储你的私钥并盗取资金。你对这些步骤已经熟悉；这里唯一的新命令是\
    \ `remove_key`，它用于从钱包中移除旧密钥。你需要创建一个新密钥，解锁钱包，使用新密钥重置权限，移除旧公钥并导入新私钥。请按照以下步骤操作： \
    \ \n\n```  \n> cleos create key  \n> cleos wallet unlock  \n> cleos set account\
    \ permission [账户名] active [公钥] owner -p [账户名]@owner  \n> cleos set account permission\
    \ MYACCOUNT owner [公钥] -p [账户名]@owner  \n> cleos wallet remove_key [旧公钥]  \n>\
    \ cleos wallet import [私钥]  \n```  \n\n### CPU 和带宽分配  \n\n要获取带宽和 CPU，你需要分配 EOS\
    \ 代币，资源将根据质押合约期内持有的代币数量按比例自动提供给你。  \n\n例如，在质押窗口期内，假设你想消耗 1 个 CPU 单位。为此，你需要与其他账户竞争，使你的账户拥有所有\
    \ CPU 质押代币的 0.1%，或者由他人将这些代币委托给你的账户。  \n\n质押期结束后，已消耗的资源会被释放，你可以重复使用相同的质押代币，因此无需每次购买更多\
    \ EOS 代币。使用完毕后，EOS 代币可以解除委托。  \n\n## 下一步  \n\nEOS.IO 提供了一个包含链接的在线资源，请访问：[`https://developers.eos.io`](https://developers.eos.io)。该开发者资源提供了有价值的文档，以及我未提及的其他工具信息，例如：\
    \  \n\n- **状态处理器**：`demux-js`  \n- **JavaScript 库**：`eosjs`  \n\n我还建议探索 EOS GitHub\
    \ 上的智能合约示例，这可以帮助你了解所有功能以及 EOS.IO 能实现什么。  \n\n## 本章小结  \n\n在本章中，我详细介绍了 EOS.IO 区块链。你通过安装\
    \ EOS.IO 和 EOSIO.CDT 库搭建了本地测试网环境，并学习了如何配置 `keosd` 和 `nodeos`。你了解了 EOS.IO 钱包，包括如何创建、删除和备份钱包，以及如何创建自定义名称的钱包并执行打开、锁定和解锁钱包等操作。\
    \  \n\n接着，我介绍了钱包的密钥对，以及如何启动和重启本地节点（`nodeos`）来运行本地区块生产者。你学习了活动权限和所有者权限，以及单签名（single-sig）账户和多签名（multisig）账户。\
    \  \n\n为了理解 EOS.IO 智能合约，你通过先创建账户然后编写 C++ 代码，创建了“HelloWorld”智能合约和代币。随后你编译并生成了 WebAssembly\
    \ 和 ABI 文件以及黎加德合约。然后你学习了如何部署已创建的合约并与之交互。代币生成后，你能够在账户之间发行和转账代币。  \n\n接下来，你通过连接公共测试网区块生产者，在更真实的环境中测试了智能合约，最后学习了如何连接和发布主网，并了解了\
    \ EOS.IO 网络上的资源分配。  \n\n在下一章中，我将介绍 NEO 区块链钱包和 NEO 智能合约。  \n\n# 7. NEO 区块链与智能合约\
    \  \n\n在第 1 章中，我介绍了 NEO 权益证明（PoS）区块链共识机制。在第 2 章中，你在 AWS Ubuntu 上创建了 NEO 记账节点，并学习了如何申请共识授权证书以及如何被选举为记账人。\
    \  \n\n在本章中，我将进一步讲解 NEO 区块链，你将学习如何搭建本地环境、在 NEO 钱包中进行操作、创建智能合约（NeoContracts）并发布。本章将涵盖\
    \ NEO 区块链的高级架构，以及如何搭建本地环境、创建本地测试网链、用 C# 和 Python 创建“Hello, World”项目、发布这些智能合约，并学习比较以太坊、EOS\
    \ 和 NEO 的标准。  \n\n如你所见，理解智能合约、区块链和发布流程在不同项目之间是相似的，学习三个项目足以让你掌握如何与其余 40 个（截至撰写本文时）可编写智能合约的项目进行协作。\
    \  \n"
- fmt: '### NEO’s High-Level Blockchain Architecture


    NEO was founded in 2014 with the name of AntShares by Da Hongfei and Erik Zhang
    and then was open sourced on GitHub in June 2015 with the name of NEO. The NEO
    consensus mechanism is called Byzantine Fault Tolerant (`dBFT`), which is a modified
    PoS. This type of mechanism makes NEO a scalable blockchain. Bookkeeping nodes
    are randomly selected to validate transactions and can support up to 10,000 transactions
    per second.


    > *“NEO is a non-profit community-driven blockchain project. It utilizes blockchain
    technology and digital identity to digitize assets and automate the management
    of digital assets using smart contracts. Using a distributed network, it aims
    to create a ‘Smart Economy’. ”*

    >

    > —Neo.org


    NEO transactions are charged with NEO gas tokens. The NEO genesis block includes
    100 million NEO. Half were sold to early investors, and half were locked in NEO
    smart contract tokens. Each year 15 million NEO tokens are unlocked to be used
    for the NEO development team to fund development goals. NEO charges fees for transactions
    as well as a smart contract’s related transactions. The NEO fee structure related
    to smart contracts is listed in the NEO white paper: [`http://docs.neo.org/en-us/sc/systemfees.html`](http://docs.neo.org/en-us/sc/systemfees.html).


    In terms of programming languages, NEO smart contracts support the `NeoVM` (NEO’s
    Universal Lightweight Virtual Machine) compiler, Microsoft .NET, Java, Kotlin,
    Go, and Python.


    Here are some notable NEO development features:


    - NEO can create smart contract tokens built with the Communications Standard
    (`NEP5`). These tokens are able to communicate with other NEO tokens.

    - Smart contracts can communicate with other blockchains (this feature is called
    `NeoX`).

    - NEO can pass information via a file sharing protocol (called `NeoFS`).

    - It uses a lattice-based cryptographic mechanism called quantum-safe (`NeoQS`).


    NEO’s “smart economy” infrastructure (I will explain this concept in the next
    section) enables smart contracts to support front-end applications and integrate
    with other smart contracts and other blockchains through an open API.


    NEO’s open API allows you to integrate data from external sources. Figure [7-1](#475651_1_En_7_Chapter.xhtml#Fig1)
    shows a high-level architecture diagram of the `NeoVM`. The `NeoVM` core is the
    deployment box (the dashed box). As you can see, the external data with the execution
    engine (green box) enables smart contracts to interact and perform operations.
    Then data can be stored on the NEO distributed ledger.


    > *“We hope the platform can be used for different front end scenarios, such as
    the Digital asset wallet, Forum, Voting, Profile management and Mobile applications.
    The platform also features an open API that can be used for integration with other
    systems.”*

    >

    > —Da Hongfei, Zhao Chen founder of NEO


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig1_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig1_HTML.jpg)


    Figure 7-1 — NEO’s virtual machine architecture diagram. Image credit: `docs.neo.org`.


    ### What Is NEO’s Smart Economy?


    NEO coined the term *smart economy*, which explains NEO’s vision. This vision
    consists of changing your existing market from a traditional economy to the smart
    economy with the power of a decentralized blockchain. To achieve this goal, NEO
    integrates digital assets, digital identities, and smart contracts into its platform.


    ### Note


    NEO’s smart economy vision is aimed to change the way existing markets work, from
    a traditional economy to a “smart economy,” with the power of a decentralized
    blockchain. This is achieved by integrating digital assets, digital identities,
    and smart contracts.


    NEO’s smart economy concept consists of integrating the following three components:


    - *NEO digital assets*: These assets contain electronic data and can be programmed.
    Placing the digital assets on a blockchain provides the benefit of PoS blockchains,
    such as decentralization, trust, traceability, and transparency. The NEO blockchain
    enables users to register, trade, and transfer different types of assets. Physical
    assets get digitization through digital identity; then these digital assets can
    be protected by law through validation. For an ICO, it costs 5,000 gas to register
    a digital asset. Then there is a renewal fee of 5,000 gas per year.


    - *NEO digital identity*: This is the digitization of the identity of individuals,
    organizations, or any other entities. A NEO digital identity is based on the public
    key infrastructure (`PKI`) X.509 standard implementation that also supports web
    of trust point-to-point certificates.


    - *NEO smart contract*: Smart contracts on NEO are called `NeoContracts`, and
    they support the C#, VB.NET, F#, Java, Kotlin, and Python languages. Supporting
    these languages gives the benefits of having sophisticated development, debugging,
    and compilation in the Visual Studio, Eclipse, and WebStorm IDEs. `NeoVM` is built
    for scalability.


    ## Setting Up Your Local Environment


    As mentioned, NEO supports enterprise-level programming languages such as C#,
    VB.NET, F#, Java, Kotlin, and Python. This selection of programming languages
    gives NEO an advantage in building `NeoContracts` because you can utilize the
    Visual Studio 2017 IDE, which offers enterprise tools for development. In this
    chapter, I will be using the following .NET tools:


    - *Visual Studio 2017 IDE*: To follow along, install the Visual Studio (VS) Community
    Edition for Mac.

    - *.NET Core*: To follow along, install .NET Core to be able to publish DLL library
    files.


    In addition to .NET, you need the following tools:


    - *Xcode 10.1*: You need Xcode 10.2 for the tools and libraries you will be installing.

    - *Docker*: Docker is a popular tool for creating containers and integrating software.
    You will be using Docker for your private net to run a whole NEO blockchain to
    simulate four consensus nodes in a single, lightweight Docker container.

    - *neo-compiler*: The NEO compiler is needed to turn your code to an `.avm` file
    that can be deployed on the NEO blockchain.

    - *neo-cli*: You will install and use the NEO command-line tools for wallets,
    operations, and RPC calls to the NEO API.


    Now that you know what is needed, let’s get started.


    ### Xcode 10.2


    At the time of writing, you need Xcode with at least version 10.1 for the tools
    and libraries needed for NEO. The latest Xcode at the time of writing is Xcode
    10.2.1.


    You can check whether you already have Xcode installed via the command line.


    ```

    > xcodebuild --version

    Xcode 10.1

    Build version 10B61

    ```


    This command will output the version if Xcode is installed. If you need to upgrade
    or install, visit the Apple developer portal: [`https://developer.apple.com/download/`](https://developer.apple.com/download/).'
