  trans: '

    # 运行区块链节点


    正如我们之前提到的，区块链点对点网络由存储网络中所有区块完整副本的节点组成，这些副本构成了共享账本。每条区块链通过特定的共识机制验证区块，并能拒绝不符合网络共识规则的区块。要连接到区块并执行命令，你需要有一个连接到区块链的节点。在本章中，你将搭建一个全节点，并学习如何因帮助网络而获得奖励；因此，你将全面理解不同网络上的节点如何运作。你将创建以下区块链的节点：比特币、NEO
    和 EOS。由于区块链技术运行在不同的共识机制上，它们对能够管理区块链的节点也有不同的名称。


    - 对于比特币，能够创建区块的节点称为*矿工*。

    - 对于 NEO，拥有管理权限的节点称为*记账节点*。

    - 对于 EOS，运行底层网络层并能够处理所有交易的节点称为*区块生产者*。


    我选择这些区块链的原因，是让你能够研究在不同网络上、采用不同共识机制的节点是如何运作的。一旦你掌握了不同区块链的工作方式，你就会开始注意到一种模式，并对区块链技术形成全面的认识。


    ## 创建比特币矿工


    在本节中，你将把自己的电脑变成比特币加密货币矿工，并开始挖矿。在此之前，你需要明白，你的电脑的算力不足以产生足够多的哈希算力来使比特币挖矿盈利。尽管如此，它仍然能让你全面了解整个流程，并且你或许能找到其他使用
    CPU/GPU 挖矿可以盈利的币种，例如 ETN、BCN、XMR 和 ETH。在所有基于 PoW 的网络中，流程都是相似的。


    如今，矿工能否盈利取决于哈希率、功耗、电价、比特币谜题难度、维护成本以及其他因素。


    ### 注意


    *哈希率*是你的计算机每秒为解决数学谜题而进行的计算次数。


    在比特币早期，你的台式电脑可以使用中央处理器（CPU）或图形处理器（GPU）来处理比特币，而这在当时足以让比特币挖矿盈利。你的电脑本可以支撑比特币网络；然而，竞争已经加剧，现在你需要现场可编程门阵列（FPGA）或专用集成电路（ASIC）矿机才能盈利。


    什么是 ASIC 和 FPGA 矿机？FPGA 是一种在制造后仍可配置的集成电路。这类矿机的性能优于 CPU 和 GPU 挖矿；它们每秒可以处理 750 兆哈希。


    ASIC 是专用计算机，其集成电路只负责执行挖矿这一单一任务，而不是作为常规计算机运行。这台计算机上除了挖矿功能外，没有其他任何东西；所有其他部分都被剥离了。


    这使得该计算机在处理交易时更快、更高效，并且能够进行更多的哈希运算。在撰写本文时，有些 ASIC 矿机的哈希率可超过 56 TH/秒，而且功耗比老一代 ASIC
    更低。


    这种挖矿设备并非比特币独有；在撰写本文时，还有其他加密货币的 ASIC 矿机，例如莱特币、Zcash、以太坊等。


    要开始挖矿，你首先需要挖矿软件。有很多挖矿软件可供选择。例如，macOS 用户可以使用这款免费、开源且易于使用的软件：[`http://downloads.fabulouspanda.co.uk/macminer/`](http://downloads.fabulouspanda.co.uk/macminer/)。


    下载软件后，安装它。接下来，你需要加入一个矿池。这里我将展示如何连接到 Antpool（最大的比特币矿池）；不过，任何矿池都可以。在此处注册 Antpool：[`https://www.antpool.com`](https://www.antpool.com)。


    Antpool 将矿工称为*工作者*。你可以通过点击“仪表板”选项卡，然后点击“工作者”链接，最后点击“创建工作者”来创建一个工作者，如图 2-1 所示。


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig1_HTML.jpg](img/475651_1_En_2_Fig1_HTML.jpg)


    **图 2-1** 用于创建挖矿工作者的 Antpool 仪表板页面


    现在你已经准备好了工作者，你将把你的矿机设置为使用 CPU 的 CPU 矿机，而对于你的 GPU，你可以将矿机设置为使用你的显卡。


    打开你下载的 MacMiner 软件，点击“文件”，然后从文件下拉菜单中选择“偏好设置”选项。在偏好设置部分，将矿机设置为 CPU 和/或 GPU 矿机，如图
    2-2 所示。


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig2_HTML.png](img/475651_1_En_2_Fig2_HTML.png)


    **图 2-2** MacMiner 偏好设置


    在偏好设置的下一步中，你设置矿池 URL 和你的用户名。Antpool 设置时不需要密码，所以无需填写，矿池 URL 在 Antpool 网站上列出：


    ```

    startum+tcp://startum.antpool.com:3333

    ```


    见图 2-3。


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig3_HTML.png](img/475651_1_En_2_Fig3_HTML.png)


    **图 2-3** 用于设置矿池的 MacMiner 偏好设置窗口


    就这样。点击“开始”按钮开始挖矿，点击“停止”按钮停止挖矿，如图 2-4 所示。


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig4_HTML.jpg](img/475651_1_En_2_Fig4_HTML.jpg)


    **图 2-4** MacMiner 启动矿机


    六年前，你本可以用你的 GPU 挖到超过 100 个 BTC。如你所见，我在 2018 年的 MacBook 上的挖矿算力仅为 13.74 Mh（兆哈希）。


    网上有很多资源可以帮助你计算挖矿盈利情况；试试 [`http://www.bitcoinx.com/profit/`](http://www.bitcoinx.com/profit/)。正如预期的那样，根据他们的计算，在当前条件下挖矿不会盈利。


    ## 创建 NEO 记账节点


    之前我介绍了 NEO，它是一个流行的 PoS 区块链的例子。


    在本节中，你将搭建一个节点（NEO 称之为*记账节点*）并准备好机器，以便它能够被选中帮助管理网络并获得交易奖励。


    ### 注意


    NEO 不将其管理节点称为矿工。矿工可以类比为节点为维护基于 PoW 的区块链所做的辛勤工作。由于 NEO 使用 PoS 共识算法，并采用技术民主方式选择管理节点，因此在使用
    PoW 共识算法时，没有哈希算力，也没有繁重的工作。为了更好地理解 NEO 节点的工作原理，建议阅读 NEO 白皮书，网址为 [`https://github.com/neo-project/docs/blob/master/en-us/whitepaper.md`](https://github.com/neo-project/docs/blob/master/en-us/whitepaper.md)。


    该节点验证区块链区块，并以一种名为*GAS* 的加密货币支付报酬。要被选中，你需要在性能足够的机器上设置一个全节点。所需的最低配置要求列在 NEO 项目的
    wiki 上，网址为 [`https://github.com/neo-project/neo/wiki/Bookkeeping-Node-Deployment`](https://github.com/neo-project/neo/wiki/Bookkeeping-Node-Deployment)。


    接下来，你需要获取共识授权证书，并获得质押的 GAS，才能被提名为记账节点。

    '
- fmt: '### Note


    You may need to be a Chinese citizen and set up a Chinese business to receive
    an identification certificate; see the `NEO` docs at [`http://docs.neo.org/en-us/index.html`](http://docs.neo.org/en-us/index.html).
    You also need 1,000 staking gas to be nominated as a bookkeeping node.


    To receive a fee from supporting the `NEO` network, you will need to create a
    full node by following these steps:


    1. Set up a full `NEO` node.

    2. Request a consensus authority certificate.

    3. Stake 1,000 gas.

    4. Be elected by `NEO` holders.


    To set up a full `NEO` node, you also need to meet the system minimum requirement
    listed here: [`https://github.com/neo-project/neo/wiki/Bookkeeping-Node-Deployment`](https://github.com/neo-project/neo/wiki/Bookkeeping-Node-Deployment).


    ### Setting Up a NEO Node on AWS Ubuntu


    As my computer does not meet the minimum requirement list, I will be utilizing
    AWS to set up a full node. However, if you have a machine that meets these requirements,
    feel free to skip using Amazon AWS or select another service provider to set your
    node.


    For AWS, go to the following URL: [`https://aws.amazon.com/free/`](https://aws.amazon.com/free/).
    Select “Create free account” and sign up.


    Once you complete the sign-up process, select the free Basic Plan. Then sign into
    the console at [`https://us-east-2.console.aws.amazon.com/console/home`](https://us-east-2.console.aws.amazon.com/console/home)
    and select “Launch a virtual machine.”


    In the first step, you can select the machine type. Select Ubuntu. “On the Step
    1, wizard page: Choose an Amazon Machine Image (AMI)” ➤ Next, select: Ubuntu Server
    16.04 LTS (HVM), SSD Volume Type ➤ Click the “select” button. See Figure [2-5](#475651_1_En_2_Chapter.xhtml#Fig5).


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig5_HTML.jpg](images/475651_1_En_2_Chapter/475651_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    AWS, selecting Ubuntu Server 16.04 LTS


    On the next screen, select General purpose - t2.micro - free tier eligible check-box.
    See Figure [2-6](#475651_1_En_2_Chapter.xhtml#Fig6).


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig6_HTML.jpg](images/475651_1_En_2_Chapter/475651_1_En_2_Fig6_HTML.jpg)


    Figure 2-6


    AWS, selecting t2.micro machine


    On the next screen, you will be prompted to create key pairs: Select “create a
    new key pair” ➤ next, select “key pair name” ➤ call the key `neo` ➤ then download
    the key: “download key pair” ➤ Lastly, select “Launch Instances.” See Figure [2-7](#475651_1_En_2_Chapter.xhtml#Fig7).
    Make sure you download the key, as you won’t be able to connect via SSH to the
    box without the key.


    ### Note


    Secure Shell (SSH) uses port 22 to connect your computer to another computer on
    the Internet.


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig7_HTML.jpg](images/475651_1_En_2_Chapter/475651_1_En_2_Fig7_HTML.jpg)


    Figure 2-7


    AWS key pairs


    Next, you will get a message, with a link: your instances are now launching. The
    following instance launches have been initiated: [instance id].


    Click the link and you will be able to view the instance, as shown in Figure [2-8](#475651_1_En_2_Chapter.xhtml#Fig8).


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig8_HTML.jpg](images/475651_1_En_2_Chapter/475651_1_En_2_Fig8_HTML.jpg)


    Figure 2-8


    AWS, launching an instance


    In the instance, you will find a link to the security settings. Scroll to the
    right of the screen, or go to the top-left navigation bar, and select Network
    & Security ➤ Security Groups. You will be able to change the security settings.


    For HTTP and SSH, you want to open the port to the world (0.0.0.0/0), but SSH
    limits you to your own computer, called My IP. See Figure [2-9](#475651_1_En_2_Chapter.xhtml#Fig9).


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig9_HTML.jpg](images/475651_1_En_2_Chapter/475651_1_En_2_Fig9_HTML.jpg)


    Figure 2-9


    AWS inbound security rules


    Next, you can create an SSH shortcut to access the server via one command, as
    shown here:


    ```

    > mkdir ~/.ssh

    > vim ~/.ssh/config

    ```


    Paste the following into the config file:


    ```

    Host NEO

    HostName [ip address]

    User ubuntu

    IdentityFile /[location of key]/neo.pem

    ```


    Configure these settings with the IP address of the machine and with the location
    of your key. Next set the permissions for the key.


    ```

    > chmod 400 /[location of key]/neo.pem

    ```


    Now, you can access your machine with one command, as shown in Figure [2-10](#475651_1_En_2_Chapter.xhtml#Fig10).


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig10_HTML.jpg](images/475651_1_En_2_Chapter/475651_1_En_2_Fig10_HTML.jpg)


    Figure 2-10


    Connecting to an AWS machine via SSH


    ```

    > ssh NEO

    ```


    If you run into any problems connecting to the machine, use the AWS Troubleshooting
    page, which you can find at [`https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/TroubleshootingInstancesConnecting.html#TroubleshootingInstancesConnectingMindTerm`](https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/TroubleshootingInstancesConnecting.html%2523TroubleshootingInstancesConnectingMindTerm).


    ### Installing Bookkeeping-Node-Deployment on Ubuntu 16.04


    Now that you have a machine to fit the minimum needs of a full node, you can install
    the software needed. Start by installing dependencies, as shown here:


    ```

    > sudo sh -c ''echo "deb [arch=amd64] https://apt-mo.trafficmanager.net/repos/dotnet-release/
    trusty main" > /etc/apt/sources.list.d/dotnetdev.list''

    > sudo apt-key adv --keyserver apt-mo.trafficmanager.net --recv-keys 417A0893

    > sudo apt-get update

    > sudo apt-get install dotnet-dev-1.0.4

    ```


    It appears that the current installation instructions in the NEO docs produce
    errors during installation, as shown here:


    ```

    Depends:

    dotnet-sharedframework-microsoft.netcore.app-1.0.4, dotnet-sharedframework-microsoft.netcore.app-1.1.1

    ```


    The workaround is to install a different dotnet core environment sources list
    and update; then you will be able to install the `dotnet-dev-1.0.4` core environment.


    ```

    > sudo sh -c ''echo "deb [arch=amd64] https://apt-mo.trafficmanager.net/repos/dotnet-release/
    xenial main" > /etc/apt/sources.list.d/dotnetdev.list''

    > sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys 417A0893

    > sudo apt-get update

    ```


    Remember to change the sources list back to the following:


    ```

    > sudo sh -c ''echo "deb [arch=amd64] https://apt-mo.trafficmanager.net/repos/dotnet-release/
    trusty main" > /etc/apt/sources.list.d/dotnetdev.list''

    ```


    Now that the dotnet core environment is installed, check whether the dotnet core
    environment is successfully installed with the following command:


    ```

    > mkdir hwapp

    > cd hwapp

    > dotnet new xunit --framework netcoreapp1.1

    > dotnet restore hwapp.csproj

    > dotnet run

    > cd ..

    > rm -rf hwapp/

    ```'
