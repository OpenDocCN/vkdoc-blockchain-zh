    Figure 3-6


    Code registering miners and generating new blocks


    In this exercise, you were able to register your peers as a miners, generate new
    blocks, and share blocks with other peers; you used a simple PoS for the consensus
    mechanism and were able to test the functionality by creating three peers. The
    consensus mechanism is simple and does not take into account every use case that
    can happen or security. In the next step, you will save your blocks in a LevelDB
    database.


    ## Storing Blocks in LevelDB


    If you run your blockchain for a few hours, you will notice that the number of
    blocks created grows, which can become a problem as currently these blocks are
    stored in your computer’s memory cache. As you add more and more blocks, the memory
    usage will grow, and eventually your code will crash. Further, without storing
    your blocks in a database, you will not be able to start and stop your P2P network,
    as the blocks are not saved.


    To accommodate these use cases and others, you will be using a LevelDB database.


    ### Note


    A LevelDB database stores name-value pairs in what is called a *level-up* and
    *level-down* fashion. It is an ideal option for blockchain networks. In fact,
    bitcoin uses LevelDB to store not only block information but also transaction
    information. See [`https://github.com/bitcoin-core/leveldb`](https://github.com/bitcoin-core/leveldb)
    .'
