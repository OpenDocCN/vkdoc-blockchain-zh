    \ 8-26 中的输出：\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig26_HTML.jpg](img/475651_1_En_8_Fig26_HTML.jpg)\n\
    \n图 8-26  \n启动业务网络\n\n```\n> composer network start --networkName hello-network\
    \ --networkVersion 0.0.2-deploy.3 -A admin -S adminpw -c PeerAdmin@hlfv1 --file\
    \ networkadmin.card\n```\n\n要确认操作成功，你可以运行 `docker ps` 命令。你应该能看到已创建的 `dev-peer0.org1.example.com-hello-network-0.0.2-deploy.3-0`\
    \ 镜像，如图 8-27 所示。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig27_HTML.jpg](img/475651_1_En_8_Fig27_HTML.jpg)\n\
    \n图 8-27  \nDocker 容器 hello-network\n\n```\n> docker ps\n```\n\n### 导入业务卡\n\n\
    接下来，导入一张新的网络管理员卡，这样你就可以在你启动的业务网络中使用 `admin@hello-network`。\n\n```\n> composer\
    \ card import --file networkadmin.card\n```\n\n此命令将导入网络管理员卡，其中将包含 `admin@hello-network`。\n\
    \n```\n> composer network ping --card admin@hello-network\n```\n\n你可以将你的输出与我的输出进行对比，如图\
    \ 8-28 所示。\n\n![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig28_HTML.jpg](img/475651_1_En_8_Fig28_HTML.jpg)\n\
    \n图 8-28  \n导入业务网络卡\n\n## 后续方向\n\n从这里开始，你可以为你的用户选择多种身份验证策略。例如，你可以根据组织正在使用的方案，选择\
    \ Google OAUTH2.0、SAML、`Passport-JWT` 或 LDAP。\n\n然后，你将能够在多用户模式下运行 REST 服务器，并测试与你创建的客户端应用程序（例如你之前创建的那个）的交互。\n\
    \n以下是一些可以帮助你设置应用程序以认证多个用户的文章：\n\n*   `Passport-JWT`：[`https://hyperledger.github.io/composer/latest/tutorials/google_oauth2_rest`](https://hyperledger.github.io/composer/latest/tutorials/google_oauth2_rest)\n\
    *   Google OAUTH2.0：`hyperledger/fabric-ca docker hyperledger/fabric-orderer hyperledger/fabric-peer\
    \ hyperledger/fabric-ccenv hyperledger/fabric-couchdb`\n\nHyperledger 是一个大型项目，由五个主要平台和五个主要工具组成。本章仅关注\
    \ Hyperledger Fabric。不过，我们鼓励你继续尝试其他 Hyperledger 平台和工具，例如 Hyperledger Sawtooth，包括设置环境、创建账户、编写更复杂的链码，以及部署链码并将其连接到去中心化应用。\n\
    \n要获取更多入门信息，请访问官方网站：[`https://sawtooth.hyperledger.org/docs/seth/releases/latest/getting_started.html`](https://sawtooth.hyperledger.org/docs/seth/releases/latest/getting_started.html)。\n\
    \n事实上，你可以在以下网址找到关于所有平台和工具的更多信息：[`https://www.hyperledger.org/`](https://www.hyperledger.org/)。\n\
    \n最后，请将 Hyperledger 开发者中心加入书签：[`https://developer.ibm.com/technologies/blockchain/`](https://developer.ibm.com/technologies/blockchain/)。\n\
    \n## 错误排查\n\nHyperledger 的设计初衷是简洁明了，允许你将多台不同机器上的模块拼接在一起，但这并不意味着没有问题。Hyperledger\
    \ 是为更高级的用户设置的，可能需要系统管理员权限来设置服务器。你可能已经遇到了一些错误，因此我将它们汇总在本节中。\n\n### Composer 运行时安装错误或找不到卡\n\
    \n如果你遇到如下错误：\n\n*   “composer runtime install error card not found peerAdmin”\n\
    *   “错误：找不到卡：`PeerAdmin@hlfv1`”\n\n这是因为管理员身份证创建不成功，或者未遵循正确的流程；你只需删除该身份证并重新创建即可。你需要删除\
    \ `composer` 文件夹，创建一个新文件夹，然后重新运行命令。\n\n```\n> rm -rf ~/.composer\n> mkdir ~/.composer\n\
    > ./createPeerAdminCard.sh\n```\n\n### Docker 未授权认证错误\n\n在下载 Hyperledger Fabric\
    \ 时，你可能会遇到以下错误：\n\n*   “unauthorized: authentication required”\n\n这是向 Docker Hub\
    \ 进行身份验证或代理时出现问题，与 Hyperledger Fabric 无关。\n\n要尝试修复此问题，请将你的计算机时间设置为与 UTC 时区一致：[`https://www.timeanddate.com/worldclock/timezone/utc`](https://www.timeanddate.com/worldclock/timezone/utc)。\n\
    \n在 [`https://hub.docker.com`](https://hub.docker.com) 创建一个 Docker 账户，然后登录。\n\n\
    ```\n> docker login\n```\n\n或者，在登出后重试。\n\n```\n> docker logout\n```\n\n### Docker\
    \ 容器冲突错误\n\n当你为某个项目使用 Docker 容器时，可能需要重新创建容器或停止某个容器；否则，你可能会遇到冲突错误。\n\n你需要做的就是停止并移除该容器。\n\
    \n```\n> docker stop [容器 id]\n> docker rm [容器 id]\n```\n\n### 提示\n\n如果你已经创建了一个\
    \ Mongo-Docker 容器或任何其他会导致冲突的 Docker 容器，那么在尝试创建一个新的容器时，你将收到以下冲突错误：“容器名称已被容器 [容器\
    \ id] 使用。”你需要做的就是停止该容器并将其移除。\n\n```\n> docker stop [容器 id]\n> docker rm [容器 id]\n\
    ```\n\n### 版本不匹配与清理\n\n如果你使用的 Hyperledger Composer 和 Hyperledger Fabric 版本不匹配，你可能会收到以下错误：\n\
    \n*   “正在启动业务网络定义。这可能需要一分钟... 错误：尝试启动业务网络时出错。错误：无法连接到任何对等事件中心。需要至少连接一个事件中心以接收提交事件。命令失败。”\n\
    \n在 Hyperledger Fabric 1.2 配合 Hyperledger Composer 0.20.6 的情况下也会出现此错误，因为存在一个未修复的\
    \ bug。要修复此问题，你需要检查你的 Hyperledger Composer 版本，通过 `npm` 卸载，并重新安装 Hyperledger Fabric。\n\
    \n此外，如果你需要完全清理，你需要停止并拆除 Fabric。要删除 Docker 镜像，删除 `fabric-dev-servers` ，最后删除 Composer，请遵循以下流程：\n\
    \n```\n> cd ~/fabric-tools\n> ./stopFabric.sh\n> ./teardownFabric.sh\n```\n\n\
    接下来，停止 Docker 容器，移除它们，并通过运行以下命令移除所有 Docker 镜像：\n\n```\n> docker kill $(docker\
    \ ps -q)\n> docker rm $(docker ps -a -q) –f\n> docker rmi $(docker images -q)\
    \ -f\n```\n\n现在你可以完全删除 `fabric-dev-servers`。\n\n```\n> rm -rf ~/fabric-dev-servers\n\
    ```\n\n要移除 Composer 和管理员身份证，请运行以下命令：\n\n```\n> sudo rm -rf ~/.composer\n> npm\
    \ uninstall -g composer-cli\n```\n\n`npm uninstall` 命令将输出一条确认信息，表明该库已卸载。\n"
- fmt: '# Summary


    In this chapter, I introduced `Hyperledger` to help you get started and understand
    the power of it. I covered the `Hyperledger` ecosystem and terminology and gave
    you a good understanding of the pieces that make up the network as well as the
    major `Hyperledger` platforms and tools available. You installed `Hyperledger
    Fabric` and `Hyperledger Composer`, ensuring the prerequisite libraries are installed.
    You created “Hello, World” application with `Playground` as well as create a `.bna`
    file you deployed on a local network. I mentioned `Hyperledger Playground Online`
    as well as explained how to generate a network with `Yeoman generator`. I covered
    the different pieces that make up the `.bna` archive file including handling ID
    cards. I also covered potential errors and troubleshooting to ensure your installation
    went well. Lastly, I covered a few recommendations on where to go from here to
    continue with `Hyperledger`.


    In the next chapter, you will learn how to build a dapp with `Angular`. Dapps
    can interact with the smart contracts you have developed in the past three chapters
    and are an important ingredient in the blockchain ecosystem.


    # 9. Build Dapps with Angular: Part I


    In previous chapters, I covered different blockchains, and you learned how to
    create smart contracts that can interact with a blockchain. You created smart
    contracts in `Ethereum`, `NEO`, `EOS`, and `Hyperledger`. In Chapter 1, I broke
    down the process into five layers: consensus layer, miner or booking layer, propagation
    layer, semantic layer, and application layer. Smart contracts are part of the
    application layer in the development cycle; however, the application layer is
    incomplete without having a front-end interface that enables an end user to interact
    with the blockchain.


    ### Tip


    Many times you will hear decentralized applications (dapps) referred to as smart
    contracts. Smart contracts are self-executing contracts. Dapps use smart contracts
    but run on a P2P network and not on a single system.


    Developers and more savvy users can interact with the smart contracts you created
    via the command-line interface and tools mentioned in previous chapters, but developing
    a front-end application that is able to interact with a blockchain is essential
    for all other users. You do this by creating a decentralized application (dapp).
    In this chapter and the next, you will be creating a decentralized application
    with the help of `Angular` so that users can interact with a smart contract using
    a friendly and intuitive user interface (UI). I broke down the process into two
    parts.


    Part I, covered in this chapter, contains the following topics:


    - Developing the dapp, including its benefits and classification

    - Using `Angular`, including its architecture, benefits, prerequisites, and creating
    an `Angular` skeleton app

    - Creating and styling `Angular` custom components


    Part II, covered in Chapter 10, contains the following topics:


    - Creating the dapp’s smart contract with `Truffle`

    - Integrating the smart contract with the dapp

    - Linking and connecting your dapp to the `Ethereum` network


    Let’s get started.


    ## What Is a Dapp?


    A *decentralized application* (shortened as ÐApp, dapp, Dapp, dApp, or DApp and
    pronounced as “dee-app”) is a web application that is able to interact with a
    smart contract. Dapps run on the blockchain and utilize the distributed ledger.
    The `Ethereum` blockchain is currently the most popular platform to run dapps;
    however, other distributed ledger technologies (DLTs) you have seen also provide
    the ability to create dapps. I covered `NEO`, `EOS`, and `Hyperledger` in previous
    chapters; others include `ICON`, `Cardano`, and `Hashgraph (Hedera)`.


    > *“Everything that can be decentralized will be decentralized.”*

    >

    > —David Johnston, CEO of the DApp Fund [`https://github.com/DavidJohnstonCEO/DecentralizedApplications`](https://github.com/DavidJohnstonCEO/DecentralizedApplications)


    If you have ever developed a standard desktop, web, or mobile application, you
    will find that dapps are similar but also very different.


    A dapp is built using the same tools and languages you use to build any other
    app, but for an app to be categorized as a dapp, it needs to meet the following
    criteria:


    - *Open source*: Its code is published as open source and should not be governed
    by one entity (centralized). Keep in mind that the application may adapt its own
    protocol in response to proposed improvements and market feedback; however, the
    consensus of its users drives all changes.

    - *Decentralized*: Dapps utilize a blockchain or a P2P network.

    - *Incentive*: Dapps use digital assets for funding.

    - *Algorithm/protocol*: Dapps often generate tokens and include a consensus mechanism
    such as `PoW`, `PoS`, or even their own.


    These criteria ensure dapps don’t have downtime like other apps you download from
    marketplaces such as `iTunes` or `Google Play`; dapps also give control to a community
    instead of one entity. These criteria can be significant. For instance, `Apple`
    and `Google` often reject apps for not meeting their arbitrary or monetary-based
    policies. These policies do not always make sense and are not always in the best
    interest of the end user; they often are there to block usage of a competitor
    or for monetary gain.


    Dapps that are based on open source code implemented on decentralized blockchains
    and funded by tokens generated using a specific consensus mechanism are believed
    by many to be the future of all businesses. Only time will tell.


    Additionally, open source software is an advantage because it allows users to
    view the source code and potentially contribute. Decentralizing using a blockchain
    harnesses the advantages of blockchain as DLT and serves as a replacement to the
    traditional one-server database.


    Finally, adding records/transactions to ledgers is usually done utilizing tokens,
    and the consensus mechanism of a token is also an agreement between all the users
    of the dapp.


    ### Dapp Classification


    In addition to the previous criteria, dapps can be categorized. The classification
    is based on the infrastructure the dapp is utilizing and can be broken down to
    these three categories:


    - *Dedicated blockchain dapps*: These are dapps that use a dedicated blockchain
    directly; examples are `bitcoin`, `Ethereum`, `EOS`, and `NEO`.

    - *Dapps relying on another blockchain*: For instance, the `Omni Layer Protocol`
    (formerly called `Mastercoin`) is a digital currency and communications protocol
    that is built on top of the `bitcoin` blockchain.

    - *Dapps relying on another protocol that built on top of another blockchain*:
    These dapps use a protocol that is built on top of another blockchain. An example
    is the safe network using the `Omni Layer Protocol`.


    A good example to help understand the classification concept is the `USDT (Tether)`
    token. This token was issued twice based on two blockchains: `bitcoin` and `Ethereum`.
    In this case, there are two types of `USDT`. The original, which is based on `bitcoin`,
    is done by using the `Omni Layer Protocol` to generate the token, and the `Ethereum`-based
    `USDT` is compatible with the `Ethereum`’s `ERC20` standard. Take a look at Figure
    9-1.


    ![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig1_HTML.jpg](images/475651_1_En_9_Chapter/475651_1_En_9_Fig1_HTML.jpg)


    **Figure 9-1** Representation of classification for USDT'
