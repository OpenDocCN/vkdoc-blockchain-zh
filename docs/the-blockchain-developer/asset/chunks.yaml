    ### 生成单输出原始交易


    交易可能会变得复杂，因为通常需要多个输入或多个输出。例如，如果你想把未花费的币发送回钱包，同时将币发送到多个地址，情况就会变得复杂。使用`RawTransaction`，你可以完全控制币的流向，并能够实现复杂交易。


    我们将通过从一个钱包向另一个钱包发送一个UTXO来创建简单的`RawTransaction`。之前，你通过比特币核心钱包GUI将币发送回了测试网水龙头。现在让我们用`RawTransaction`命令做同样的事情。


    首先，确认发送币之前你的钱包余额。


    ```

    > bitcoin-cli getbalance

    0.18505841

    ```


    接下来，选择你将用于资助交易的UTXO。正如你回忆的那样，你可以通过`listunspent`命令获取UTXO列表，然后查看JSON响应并选择交易`txid`。选择一个有足够资金来支持新交易且已经确认的交易。


    ```

    > utxo_txid="50e91c9b73a90bd883f4a9a8a51be729770df20fae0445a9090b80a8621f4538"

    ```


    你可能还记得，`vout`是交易中输出的索引号。在此示例中，我将指向一个`vout`并生成一个新交易。新交易可以包含多个其他`vout`，如图[4-11](#475651_1_En_4_Chapter.xhtml#Fig11)所示。


    ![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig11_HTML.jpg](images/475651_1_En_4_Chapter/475651_1_En_4_Fig11_HTML.jpg)


    图4-11 vout新交易插图


    在这个示例中，你将设置`vout`的第一个索引。


    ```

    > utxo_vout="0"

    ```


    你需要设置的最后一个也是最重要的变量是`recipient`地址。这里，你将使用之前发送币时使用的同一个钱包地址。


    ```

    > recipient="mv4rnyY3Su5gjcDNzbMLKBQkBicCtHUtFB"

    ```


    最后，你可以使用`echo`命令来验证并仔细检查变量设置是否正确。


    ```

    > echo $utxo_txid

    > echo $utxo_vout

    > echo $recipient

    ```


    现在你已经设置好了变量，可以通过`createrawtransaction`命令生成一个`RawTransaction`对象。你需要包含所有已设置的变量，并声明你想要花费的金额。你使用`0.xxx`，但你需要使用UTXO减去你想支付的费用，以发送UTXO中的所有币。


    ```

    > rawtxhex=$(bitcoin-cli createrawtransaction "''[ { "txid": "''$utxo_txid''",
    "vout": ''$utxo_vout'' } ]"'' "''{ "''$recipient''": 0.xxx }"'')

    ```


    接下来，你可以提取`rawtxhex`的值。


    ```

    > echo $rawtxhex

    020000000138451f62a8800b09a94504ae0ff20d7729e71ba5a8a9f483d80ba9739b1ce9500000000000ffffffff0140420f00000000001976a9149f9a7abd600c0caa03983a77c8c3df8e062cb2fa88ac00000000

    ```


    `rawtxhex`值以十六进制编码数据的形式包含你新交易的信息。以下`decoderawtransaction`命令将返回一些JSON输出，其中包含你交易的解码数据：


    ```

    > bitcoin-cli decoderawtransaction $rawtxhex

    {

    "txid": "91d4e108f8957251d2997e1f8dcdd0eec97192e8accf85a9e81f772f586118af",

