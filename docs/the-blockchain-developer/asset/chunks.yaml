    \ what it means to be security ready, what\nsecurity testing is, and how to be\
    \ compliance ready. You looked at the\nUnited States and Europe Union compliance\
    \ regulations regarding\nblockchain technology, and lastly, I covered security\
    \ readiness\nrecommendations you should take into account in the early stages\
    \ of your\ndevelopment cycle. In the next section of this chapter, you will be\n\
    looking at specific crypto wallet attacks that can cause significant\nlosses and\
    \ how to prevent them.\n\nCommon Blockchain Attacks\n\nIn this section, I will\
    \ be covering some of the most famous and common\nblockchain attacks. I have broken\
    \ these attacks into three categories.\n\n*   *Wallet cyberattacks*: Directed\
    \ at crypto\n    wallets.\n\n*   *Blockchain network attacks*: Aimed at the blockchain\
    \ P2P\n    network.\n\n*   *Platform attacks*: Aimed at platforms that support\n\
    \    blockchain, such as exchanges, web sites, and lending\n    platforms."
