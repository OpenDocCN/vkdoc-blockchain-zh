  trans: '#### 导入 Angular Material 模块


    接下来，你需要修改应用，使其包含 Angular Material 的动画、Material 图标、手势支持以及组件模块。


    在你的项目中，你只会使用组件模块，而不会用到 Angular Material 提供的所有功能；你需要做的是为你想要使用的每个组件导入 `NgModule`。打开
    `src/app/app.module.ts` 并添加 `import` 语句。


    ```

    import {

    MatButtonModule,

    MatCheckboxModule,

    MatInputModule,

    MatSelectModule,

    MatDatepickerModule,

    MatNativeDateModule

    } from ''@angular/material'';

    ```


    接下来，更新 `@NgModule` 中的 `imports` 数组，以包含你导入的 Material 模块。


    ```

    imports: [

    BrowserModule,

    AppRoutingModule,

    BrowserAnimationsModule,

    MatButtonModule,

    MatInputModule,

    MatDatepickerModule,

    MatNativeDateModule,

    MatCheckboxModule,

    MatSelectModule

    ]

    ```


    就是这样。现在你可以访问所包含的 Angular Material 组件了。


    #### 为你的 Angular Material 应用设置主题


    现在你已经可以访问 Angular Material 组件，可以使用主题来设置它们的样式。*主题*是一组颜色，这些颜色将用于你的 Angular Material
    组件。


    在 Angular Material 中，主题是通过创建多个调色板来生成的。


    -   *主色板*：这些颜色是所有屏幕和组件中最常用的。

    -   *强调色板*：这些颜色用于按钮和交互元素。

    -   *警告色板*：这些颜色用于错误提示。

    -   *前景色板*：这些颜色用于文本和图标。

    -   *背景色板*：这些颜色用于元素的背景。


    在 Angular Material 中，所有主题样式都是在构建时静态生成的，以避免拖慢应用启动速度。


    Angular Material 预置了几个预构建的主题 CSS 文件。你可能还记得，在安装 Material 时，你曾可以选择要使用的主题。


    这些主题文件还包含了核心组件的所有样式（所有组件通用的样式），因此你只需在应用中包含一个 Angular Material 的 CSS 文件。你可以直接从
    `@angular/material/prebuilt-themes` 将一个主题文件引入到你的应用程序中。


    以下是可用的预构建主题：


    -   `deeppurple-amber.css`

    -   `indigo-pink.css`

    -   `pink-bluegrey.css`

    -   `purple-green.css`


    你在这里使用的是 Angular CLI，因此可以简单地将你想要的样式包含在全局的 `src/styles.css` 文件中。


    最初它包含以下初始预代码：


    ```

    html, body { height: 100%; }

    body { margin: 0; font-family: ''Roboto'', sans-serif; }

    ```


    在文档顶部添加以下 `import` 语句：


    ```

    @import "~@angular/material/prebuilt-themes/indigo-pink.css";

    ```


    在打开 `src/style.css` 文件的同时，你还可以创建一个容器、一个段落和一个按钮的样式，以便在应用的不同页面中使用。


    ```

    p {

    padding-left: 20px;

    font-size: 12px;

    }

    .container {

    margin-right: auto;

    margin-left: auto;

    padding: 20px 15px 30px;

    width: 750px;

    }

    button {

    color: #ffffff;

    background-color: #611BBD;

    border-color: #130269;

    display: inline-block;

    margin-bottom: 0;

    font-weight: normal;

    text-align: center;

    vertical-align: middle;

    touch-action: manipulation;

    cursor: pointer;

    white-space: nowrap;

    padding: 6px 12px;

    font-size: 12px;

    line-height: 1.42857143;

    border-radius: 4px;

    -webkit-user-select: none;

    -moz-user-select: none;

    -ms-user-select: none;

    user-select: none;

    }

    ```


    你可以将你的文件与我的进行比较：[`https://github.com/Apress/the-blockchain-developer/chapter9/step3.zip`](https://github.com/Apress/the-blockchain-developer/chapter9/step3.zip)。


    ### 创建内容


    此时，你已经拥有了一个带有头部、主体和底部的基本应用框架。主体部分可以通过更改浏览器中的 URL 在起始页面和转账页面之间切换。你还导入并注入了 Material
    模块，并为应用设置了全局样式。下一步是创建实际内容，替换你放置在头部、底部和起始组件中的临时文本消息。


    #### 底部组件


    对于底部组件，你只需替换公司的版权信息。要执行此操作，你需要做的是打开 `src/app/components/footer/footer.component.html`
    并替换默认代码。


    ```

    footer works!


    ```


    通过创建一个带有你添加到全局 CSS 文件中的样式的 `div` 容器来替换这段代码。


    ```

    <div class="container">

    Copyright (c) 2019 Company Name. All Rights Reserved.

    </div>

    ```


    你还需要为底部组件创建一个特定的样式，这样每次使用 `<p>` 标签时，字体大小为 12px 且左内边距为 0。打开 `src/app/components/footer/footer.component.css`
    并插入以下内容：


    ```

    p {

    padding-left: 0;

    font-size: 11px;

    }

    ```


    请注意，你定义了两遍 `<p>` 标签，一次在全局 CSS 文件中，一次在组件级别。发生的情况是，组件中的 `<p>` 样式会覆盖全局的 `<p>` 样式，因此你可以在底部组件中使用
    `<p>` 标签，而在其他组件（如起始页面和转账页面）中使用不同的 `<p>` 标签，同时保持你的 HTML 代码不包含 CSS 代码。


    #### 头部组件


    对于头部组件，你将创建一个导航菜单，以便能够在起始页面和转账页面之间切换。对于头部组件特定的样式，打开 `src/app/components/header/header.component.css`
    并添加导航列表样式。


    ```

    .nav {

    margin-bottom: 0;

    padding-left: 0;

    list-style: none;

    }

    li {

    display: block;

    float: left;

    width: 100px;

    height: 25px;

    padding: 5px;

    }

    .nav>li>a {

    margin-bottom: 0;

    padding-left: 0;

    font-weight: 500;

    font-size: 12px;

    text-transform: uppercase;

    position: relative;

    }

    ```


    对于 `src/app/components/header/header.component.html`，你需要创建一个容器以及一个包含两个指向起始页面和转账页面链接的列表。为此，请替换初始代码：


    ```

    header works!


    ```


    为以下内容：


    ```

    <div class="container">

    <ul class="nav">

    <li><a routerLink="/start" routerLinkActive="active">home</a></li>

    <li><a routerLink="/transfer" routerLinkActive="active">transfer</a></li>

    </ul>

    </div>

    ```


    现在的分布式应用（dapp）包含了基本的样式和可用的导航功能，如图 9-9 所示。


    ![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig9_HTML.jpg](img/475651_1_En_9_Fig9_HTML.jpg)


    图 9-9：具有基本样式和可用导航功能的 Ethdapp


    你可以在此处下载此步骤的代码：[`https://github.com/Apress/the-blockchain-developer/chapter9/step4.zip`](https://github.com/Apress/the-blockchain-developer/chapter9/step4.zip)。'
- fmt: "### Transfer Component\n\nThe `transfer` component will hold a form that you\
    \ will submit to transfer Ethereum coins from one account address to another.\
    \ You will be using the forms module to expedite creating your form. To do so,\
    \ you need to include the Material `FormsModule` and `ReactiveFormsModule` form\
    \ modules in `app.module.ts` just as you did with other Material modules.\n\n\
    Open `src/app/app.module.ts` and add the following `import` statement:\n\n```typescript\n\
    import { FormsModule, ReactiveFormsModule } from '@angular/forms';\n```\n\nYou\
    \ also want to update the `import` statement:\n\n```typescript\nimports: [\n \
    \ FormsModule,\n  ReactiveFormsModule,\n  ..\n]\n```\n\nYou will be using the\
    \ `<mat-form-field>` tag, which represents a component that wraps several Angular\
    \ Material components together and applies common text field styles such as the\
    \ underline, floating label, and hint messages. This will expedite development\
    \ as you won’t need to implement all of these and test them on multiple devices/browsers.\n\
    \nThe form field is the wrapper component named `<mat-form-field>`. You can use\
    \ any of the form field controls (such as input, textarea, list, etc.).\n\nYou\
    \ can find information about mat-forms here: [`https://material.angular.io/components/form-field/overview`](https://material.angular.io/components/form-field/overview).\n\
    \nFor `src/app/components/transfer/transfer.component.ts`, you will update the\
    \ initial code. First you need to import the components you will be using; in\
    \ this case, you need to initialize the class and use form, form control, and\
    \ validators.\n\n```typescript\nimport {FormBuilder, FormControl, FormGroup, Validators}\
    \ from '@angular/forms';\n```\n\nThen you need to update the component definition\
    \ to implement the `OnInit` method:\n\n```typescript\nexport class TransferComponent\
    \ implements OnInit {\n```\n\nYou will be using a flag to indicate whether the\
    \ form was submitted and to create an instance of a form group, as well as an\
    \ object called `user` to hold the user’s information.\n\n```typescript\nformSubmitted:\
    \ Boolean = false;\nuserForm: FormGroup;\nuser: any;\n```\n\nTo validate your\
    \ form, you will define the messages in case the form is not filled in correctly.\
    \ Each form control needs to be defined with the required fields and messages.\n\
    \n```typescript\naccount_validation_messages = {\n  'transferAddress': [\n   \
    \ { type: 'required', message: 'Transfer Address is required' },\n    { type:\
    \ 'minLength', message: 'Transfer Address must be 42 characters long' },\n   \
    \ { type: 'maxLength', message: 'Transfer Address must be 42 characters long'\
    \ }\n  ],\n  'amount': [\n    { type: 'required', message: 'Amount is required'\
    \ },\n    { type: 'pattern', message: 'Amount must be a positive number' }\n \
    \ ],\n  'remarks': [\n    { type: 'required', message: 'Remarks are required'\
    \ }\n  ]\n};\n```\n\nWhen you create the constructor, you need to include the\
    \ `FormBuilder` component to be able to generate the form.\n\n```typescript\n\
    constructor(private fb: FormBuilder) { }\n```\n\nWhen your component gets `init`,\
    \ you will set the `formSubmitted` flag to `false` and set default values for\
    \ the user’s information. You then will call a method to go fetch the user’s account\
    \ and balance, which you will implement later. Lastly, you will call the `createForms`\
    \ method that will generate the form.\n\n```typescript\nngOnInit() {\n  this.formSubmitted\
    \ = false;\n  this.user = {address: '', transferAddress: '', balance: '', amount:\
    \ '', remarks: ''};\n  this.getAccountAndBalance();\n  this.createForms();\n}\n\
    ```\n\nThe `createForms` method will generate the form controls by passing the\
    \ validators and data.\n\n```typescript\ncreateForms() {\n  this.userForm = this.fb.group({\n\
    \    transferAddress: new FormControl(this.user.transferAddress, Validators.compose([\n\
    \      Validators.required,\n      Validators.minLength(42),\n      Validators.maxLength(42)\n\
    \    ])),\n    amount: new FormControl(this.user.amount, Validators.compose([\n\
    \      Validators.required,\n      Validators.pattern('^[+]?([.]\\\\d+|\\\\d+[.]?\\\
    \\d*)$')\n    ])),\n    remarks: new FormControl(this.user.remarks, Validators.compose([\n\
    \      Validators.required\n    ]))\n  });\n}\n```\n\nThe `getAccountAndBalance`\
    \ method will set the user account’s address and balance; for now you are using\
    \ dummy data, but you will implement the actual service later in this chapter.\n\
    \n```typescript\ngetAccountAndBalance = () => {\n  const that = this;\n  that.user.address\
    \ = '0xd8d0101f83e79fb4e8d21134f5325e64816bd6a0';\n  that.user.balance = 0;\n\
    \  // TODO: fetch data\n}\n```\n\nLastly, once you submit your form, you need\
    \ a method to handle the data and call the service. `submitForm` will be used\
    \ by checking whether the form is valid, and then later you will call the service\
    \ component you will create.\n\n```typescript\nsubmitForm() {\n  if (this.userForm.invalid)\
    \ {\n    alert('transfer.components :: submitForm :: Form invalid');\n    return;\n\
    \  } else {\n    console.log('transfer.components :: submitForm :: this.userForm.value');\n\
    \    console.log(this.userForm.value);\n    // TODO: service call\n  }\n}\n```\n\
    \nFor `transfer.component.html`, you will set the form tag to call the `submitForm`\
    \ method once the form is submitted.\n\n```html\n<form [formGroup]=\"userForm\"\
    \ (ngSubmit)=\"submitForm()\">\n```\n\nNext, you will create the wrapping `div`s\
    \ and use data binding to display the user’s account address and balance.\n\n\
    ```html\n<div class=\"transfer-container\">\n  <p>Address: {{user.address}} </p>\n\
    \  <p>Balance: {{user.balance}} Eth</p>\n</div>\n```\n\nNotice that you have used\
    \ the `transfer-container` style, which you have not yet defined; you will define\
    \ it in your CSS file, and it will be used to format your form.\n\nFor form controls,\
    \ you need input boxes for the account you are transferring the funds to, the\
    \ amount, and a message. You also need to set up your validations.\n\n```html\n\
    <mat-form-field>\n  <input matInput placeholder=\"Transfer Address\" formControlName=\"\
    transferAddress\" required>\n  <mat-error *ngFor=\"let validation of account_validation_messages.transferAddress\"\
    >\n    <mat-error *ngIf=\"userForm.get('transferAddress').hasError(validation.type)\"\
    >{{validation.message}}</mat-error>\n  </mat-error>\n</mat-form-field>\n\n<mat-form-field>\n\
    \  <input matInput placeholder=\"Amount\" formControlName=\"amount\" required>\n\
    \  <mat-error *ngFor=\"let validation of account_validation_messages.amount\"\
    >\n    <mat-error *ngIf=\"userForm.get('amount').hasError(validation.type)\">{{validation.message}}</mat-error>\n\
    \  </mat-error>\n</mat-form-field>\n\n<mat-form-field>\n  <textarea matInput placeholder=\"\
    Remarks\" formControlName=\"remarks\" required></textarea>\n  <mat-error *ngFor=\"\
    let validation of account_validation_messages.remarks\">\n    <mat-error *ngIf=\"\
    userForm.get('remarks').hasError(validation.type)\">{{validation.message}}</mat-error>\n\
    \  </mat-error>\n</mat-form-field>\n```\n\nLastly, remember to close the `div`s\
    \ and form, as well as include a submit button.\n\n```html\n<button mat-raised-button\
    \ color=\"primary\" type=\"submit\">Transfer Ether</button>\n```\n\n</form>\n\
    ```\n\nFor `transfer.component.css`, you will be using the `.transfer-container`\
    \ div to format your form horizontally.\n\n```css\n.transfer-container {\n  display:\
    \ flex;\n  flex-direction: column;\n}\n.transfer-container > * {\n  width: 100%;\n\
    }\n```\n\nThat’s it. Now you can check your dapp in the browser, and you should\
    \ be able to see the user’s default data, test the form, validate it, and submit\
    \ the form. See Figure [9-10](#475651_1_En_9_Chapter.xhtml#Fig10).\n\n![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig10_HTML.jpg](images/475651_1_En_9_Chapter/475651_1_En_9_Fig10_HTML.jpg)\n\
    \n**Figure 9-10** Ethdapp transfer page including user’s info, validators, and\
    \ submit button\n\nYou can download this step here: [`https://github.com/Apress/the-blockchain-developer/chapter9/step5.zip`](https://github.com/Apress/the-blockchain-developer/chapter9/step5.zip).\n\
    \n---\n\n### Angular Directives\n\nCreating directives in Angular gives you the\
    \ ability to create your own custom HTML tags with just a few lines of code, just\
    \ as you saw in the Material form. You were able to include custom tags that wrap\
    \ many components. At a high level, directives are markers on a DOM element. These\
    \ markers can point to any DOM component, from an attribute to an element name\
    \ or even a comment or CSS class. These markers then tell the AngularJS's HTML\
    \ compiler to attach a specified behavior or to transform the entire DOM element\
    \ and its children based on specific logic.\n\nAngular comes with many of these\
    \ directives built-in. However, during development, it’s a good chance you will\
    \ be creating your own directives. Your dapp is simple now, so you don’t need\
    \ to create any directive, and it’s beyond the scope of this chapter to explain\
    \ this. When you do need to generate a skeleton directive, use the Angular CLI\
    \ just as you generated other components.\n\n```bash\n> ng generate directive\
    \ {directive-name}\n```\n\nAlthough you are not creating a directive in your app,\
    \ I wanted to introduce you to the concept as it’s an integral part of creating\
    \ an Angular project."
