    \ to\ninteract with the blockchain. Smart contracts can be created before the\n\
    front-end portion, after, or in parallel (if you work with a team of\ndevelopers).\n\
    You already created an Ethereum smart contract in Chapter [5](#475651_1_En_5_Chapter.xhtml),\
    \ so the steps in this section\nshould be familiar to you. Feel free to revisit\
    \ Chapter [5](#475651_1_En_5_Chapter.xhtml) to refresh your memory, as I won’t\n\
    go into much detail regarding the tools and commands used in this\nchapter.\n\
    To get started, you will create a new folder in your `ethdapp` project to\nhold\
    \ the Truffle project. You can download the latest step, where you\nleft off from,\
    \ here: [`https://github.com/Apress/the-blockchain-developer/chapter9/step5.zip`](https://github.com/Apress/the-blockchain-developer/chapter9/step5.zip)\
    \ .\nIn real-life projects with multiple developers, the smart contract\ncould\
    \ be a separate project. For simplicity, you will be including it in\nyour project\
    \ so you can utilize the WebStorm Terminal window’s bottom\ntab to run commands.\n\
    \nStart by creating a folder called `truffle` inside your\nproject and\ninitialize\
    \ Truffle to create the project. You can see the expected\noutput in Figure [10-1](#475651_1_En_10_Chapter.xhtml#Fig1).\n\
    \n![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig1_HTML.jpg](images/475651_1_En_10_Chapter/475651_1_En_10_Fig1_HTML.jpg)\n\
    \nFigure 10-1\nOutput of creating a Truffle project\n\n```\n> mkdir ethdapp/truffle\n\
    > cd truffle\n> truffle init\n```\n\nTip\nIf you get errors such as “Error: Truffle\
    \ Box,” uninstall Truffle,\nand then re-install it and try again.\n\nTo re-install\
    \ `truffle` in case of\nerror messages, remove `truffle` globally and\ninstall\
    \ it again.\n\n```\n> npm uninstall -g truffle\n```\n\nIf you do not have Truffle\
    \ installed or need to re-install Truffle\nglobally, run the `install` command\
    \ .\n\n```\n> npm install -g truffle\n```\n\nAfter re-installing or performing\
    \ a fresh install, run the `truffle init` command\nagain and make sure you run\
    \ the test in a new Terminal window to ensure\nthe changes were applied.\n\n```\n\
    > truffle compile\n> truffle migrate\n> truffle test\n```\n\nYou can compare your\
    \ results with mine, shown in Figure [10-2](#475651_1_En_10_Chapter.xhtml#Fig2).\n\
    \n![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig2_HTML.jpg](images/475651_1_En_10_Chapter/475651_1_En_10_Fig2_HTML.jpg)\n\
    \nFigure 10-2\nTruffle compiling, migrating, and testing your project\n\nCreate\
    \ a Smart Contract\n\nYou’ll create a smart contract and call it `Transfer.sol`;\
    \ put it\nhere: `truffle/contracts/Transfer.sol`.\nThe contract will allow you\
    \ to transfer funds from one account to\nanother. First navigate to the location\
    \ of the contracts in Truffle and\nuse an editor to create a new file.\n\n```\n\
    >  cd ethapp/truffle/contracts\n> vim Transfer.sol\n```\n\nThe complete `Transfer.sol`\n\
    code  is listed\nhere:\n\n```\npragma solidity ^0.5.0;\ncontract Transfer {\n\
    address payable from;\naddress payable to;\nconstructor() public {\nfrom = msg.sender;\n\
    }\nevent Pay(address _to, address _from, uint amt);\nfunction pay( address payable\
    \ _to ) public payable returns (bool) {\nto = _to;\nto.transfer(msg.value);\n\
    emit Pay(to, from, msg.value);\nreturn true;\n}\n}\n```\n\nLet’s walk through\
    \ the code. First you need to define the `solidity` version  you will be using\
    \ and\nthe contract name.\n\n```\npragma solidity ^0.5.0;\ncontract Transfer {\n\
    ```\n\nNext, define the from and to addresses and the constructor.\n\n```\naddress\
    \ payable from;\naddress payable to;\nconstructor() public {\nfrom = msg.sender;\n\
    }\n```\n\nYou will be using a `Pay` event  that will be\ndispatched once the `pay`\
    \ function is used.\n\n```\nevent Pay(address _to, address _from, uint amt);\n\
    ```\n\nThe `pay`\nfunction uses the `Pay` event to interact\nwith the network\
    \ and do the actual transfer.\n\n```\nfunction pay( address payable _to ) public\
    \ payable returns (bool) {\nto = _to;\nto.transfer(msg.value);\nemit Pay(to, from,\
    \ msg.value);\nreturn true;\n}\n}\n```"
  trans: "好的，作为高级文档工程师和翻译员，我将严格遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n# 总结\n\n在本章中，你深入探讨了什么是去中心化应用，并了解了去中心化应用的分类和项目。你学习了如何通过将过程分解为五个步骤来启动自己的去中心化应用项目：撰写白皮书、启动首次代币发行、开发去中心化应用、发布它，以及营销你的去中心化应用。\n\
    \n接着，你探讨了为什么要使用 Angular。然后，你创建了一个 Angular 去中心化应用，首先确保安装了先决条件，并安装了 Angular CLI。之后，你创建了一个\
    \ Angular 项目并运行了该应用。\n\n接下来，你学习了如何将你的 Angular 项目导入 WebStorm 或创建一个新项目。你了解了构成 Angular\
    \ 的各个部分，例如组件、模块和指令。你还通过学习 Angular 样式架构和使用 Angular Material，了解了如何为去中心化应用设置样式。\n\
    \n你开始构建组件并创建内容；你将应用拆分为页脚、页眉和主体，并创建了一个名为 `transfer` 的自定义组件，其中包含一个表单，以便稍后能够转移代币。\n\
    \n在下一章中，你将创建一个转账智能合约和一个 Truffle 开发项目，并且连接到 Ganache 开发网络。你将学习如何通过 Truffle 与以太坊网络交互以及测试你的智能合约。你还会将你的去中心化应用与以太坊网络的\
    \ `web3` 库链接起来，并通过 MetaMask 进行连接。\n\n# 使用 Angular 构建去中心化应用：第二部分\n\n在上一章中，你开始开发你的去中心化应用。具体来说，你了解了去中心化应用的分类和项目，并且你可以将自己的去中心化应用项目分解为五个步骤。然后，你探讨了为什么要使用\
    \ Angular 及其优势。接着，你创建了一个 Angular 项目，首先确保安装了先决条件，然后安装了 Angular CLI。你了解了构成 Angular\
    \ 的各个部分，例如组件、模块和指令。你还通过学习 Angular 样式架构和使用 Angular Material，了解了如何为去中心化应用设置样式。你开始构建自己的自定义组件并创建内容；你将应用拆分为页脚、页眉和主体，并创建了一个你将在本章中使用的自定义\
    \ `transfer` 组件。\n\n在本章中，我将介绍以下内容：\n\n-   使用 Truffle 创建去中心化应用的智能合约\n-   将智能合约集成到你的去中心化应用的\
    \ Angular 项目中\n-   链接你的去中心化应用并将其连接到以太坊网络\n\n你将使用我迄今为止一直在介绍的工具：Angular CLI、Truffle、`ganache-cli`\
    \ 和 MetaMask。你将使用 Truffle 创建一个用于你的去中心化应用的智能合约，然后你将使用 `web3` 库连接到以太坊本地网络，并调用智能合约的函数和事件。MetaMask\
    \ 将用于管理和连接到你的账户。\n\n> **提示** 建议你在阅读本章之前先完成上一章和第 5 章，以便充分理解此处的示例，这些示例建立在第 9 章和第\
    \ 5 章的概念、工具和已安装库的基础之上。\n\n## 转账智能合约\n\n在上一章中，你的应用中已经有了用于转移代币的前端逻辑；然而，你还没有一个与区块链交互的智能合约。智能合约可以在前端部分之前、之后或并行创建（如果你与一个开发团队一起工作）。\n\
    \n你已经在第 5 章中创建了一个以太坊智能合约，因此本节中的步骤对你来说应该很熟悉。请随时重温第 5 章以刷新记忆，因为对于本章中使用的工具和命令，我不会深入涉及太多细节。\n\
    \n首先，你将在你的 `ethdapp` 项目中创建一个新文件夹来存放 Truffle 项目。你可以在此处下载你中断时的最新步骤：[`https://github.com/Apress/the-blockchain-developer/chapter9/step5.zip`](https://github.com/Apress/the-blockchain-developer/chapter9/step5.zip)。在由多个开发人员参与的实际项目中，智能合约可能是一个独立项目。为了简单起见，你将其包含在你的项目中，这样你就可以使用\
    \ WebStorm 终端窗口底部的选项卡来运行命令。\n\n首先，在你的项目中创建一个名为 `truffle` 的文件夹，并初始化 Truffle 来创建项目。你可以在图\
    \ 10-1 中看到预期的输出。\n\n![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig1_HTML.jpg](img/475651_1_En_10_Fig1_HTML.jpg)\n\
    \n**图 10-1** 创建 Truffle 项目的输出\n\n```\n> mkdir ethdapp/truffle\n> cd truffle\n\
    > truffle init\n```\n\n> **提示** 如果你遇到“Error: Truffle Box”之类的错误，请卸载 Truffle，然后重新安装并重试。\n\
    \n如果出现错误信息，要重新安装 `truffle`，请全局移除 `truffle` 并再次安装。\n\n```\n> npm uninstall -g truffle\n\
    ```\n\n如果你没有安装 Truffle 或需要重新全局安装 Truffle，请运行 `install` 命令。\n\n```\n> npm install\
    \ -g truffle\n```\n\n重新安装或全新安装后，再次运行 `truffle init` 命令，并确保在新的终端窗口中运行测试以确认更改已生效。\n\
    \n```\n> truffle compile\n> truffle migrate\n> truffle test\n```\n\n你可以将你的结果与我的结果进行比较，如图\
    \ 10-2 所示。\n\n![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig2_HTML.jpg](img/475651_1_En_10_Fig2_HTML.jpg)\n\
    \n**图 10-2** Truffle 编译、迁移和测试你的项目\n\n### 创建智能合约\n\n你将创建一个智能合约并将其命名为 `Transfer.sol`；将其放在此处：`truffle/contracts/Transfer.sol`。该合约将允许你将资金从一个账户转移到另一个账户。首先，导航到\
    \ Truffle 中合约的位置，并使用编辑器创建一个新文件。\n\n```\n> cd ethapp/truffle/contracts\n> vim Transfer.sol\n\
    ```\n\n完整的 `Transfer.sol` 代码如下所示：\n\n```\npragma solidity ⁰.5.0;\ncontract Transfer\
    \ {\n    address payable from;\n    address payable to;\n    constructor() public\
    \ {\n        from = msg.sender;\n    }\n    event Pay(address _to, address _from,\
    \ uint amt);\n    function pay( address payable _to ) public payable returns (bool)\
    \ {\n        to = _to;\n        to.transfer(msg.value);\n        emit Pay(to,\
    \ from, msg.value);\n        return true;\n    }\n}\n```\n\n让我们浏览一下这段代码。首先，你需要定义将要使用的\
    \ `solidity` 版本和合约名称。\n\n```\npragma solidity ⁰.5.0;\ncontract Transfer {\n```\n\
    \n接下来，定义发送方和接收方地址以及构造函数。\n\n```\naddress payable from;\naddress payable to;\n\
    constructor() public {\n    from = msg.sender;\n}\n```\n\n你将使用一个 `Pay` 事件，该事件将在使用\
    \ `pay` 函数时被触发。\n\n```\nevent Pay(address _to, address _from, uint amt);\n```\n\
    \n`pay` 函数使用 `Pay` 事件与网络交互并执行实际的转账操作。\n\n```\nfunction pay( address payable _to\
    \ ) public payable returns (bool) {\n    to = _to;\n    to.transfer(msg.value);\n\
    \    emit Pay(to, from, msg.value);\n    return true;\n}\n}\n```\n"
- fmt: "# That’s it. You kept it basic and simple with only one event and one function.\n\
    You can download this step from here: [`https://github.com/Apress/the-blockchain-developer/chapter10/step1.zip`](https://github.com/Apress/the-blockchain-developer/chapter10/step1.zip).\n\
    \n## Create the Truffle Development Network\n\nThe next step is to replace the\
    \ `truffle/truffle-config.js` file with the following configuration:\n\n```javascript\n\
    module.exports = {\nnetworks: {\ndevelopment: {\nhost: \"127.0.0.1\",\nport: 8545,\n\
    network_id: \"*\",\ngas: 5000000,\ngasPrice: 100000000000\n}\n}\n};\n```\n\nNotice\
    \ that you point to port 8545, which will help you when you run MetaMask later\
    \ in this chapter.\n\n## Deploy the Smart Contract\n\nThe other configuration\
    \ file you need is the deploy contract file. Create a deployment file and call\
    \ it `truffle/migrations/2_deploy_contracts.js`. In this config file all you do\
    \ is point to the `Transfer` smart contract SOL code you created.\n\n```javascript\n\
    var Transfer = artifacts.require(\"./Transfer.sol\");\nmodule.exports = function(deployer)\
    \ {\ndeployer.deploy(Transfer);\n};\n```\n\nNow you are ready to create your network\
    \ on port 8545 with Ganache, so navigate to the Truffle project, and run this\
    \ command:\n\n```bash\n> cd ethdapp/truffle\n> ganache-cli -p 8545\n```\n\n**Tip**\
    \  \nIf you get any errors such as “NODE_MODULE_VERSION mismatch,” uninstall and\
    \ re-install `ganache-cli`. Then open a new Terminal window and ensure it’s running\
    \ correctly.\n\nTo re-install `ganache-cli` if needed, run this:\n\n```bash\n\
    > npm uninstall -g ganache-cli\n> npm install -g ganache-cli\n```\n\nTo ensure\
    \ it’s running correctly, run this:\n\n```bash\n> ganache-cli help\n```\n\nNext,\
    \ in a new Terminal window, let’s compile and deploy your contract while `ganache`\
    \ is still running.\n\n```bash\n> truffle compile\n```\n\nThe compile output should\
    \ provide success, creating your contract in the `Contract` folder.\n\n```\nCompiling\
    \ ./contracts/Transfer.sol...\nWriting artifacts to ./build/contracts\n```\n\n\
    The file that was created is `Transfer.json`, which you will be using in your\
    \ dapp to interact with the network. Next, you will deploy your contract with\
    \ the `migrate` command.\n\n```bash\n> truffle migrate --network development\n\
    ```\n\nThe output should confirm the contract was migrated to the network, as\
    \ shown in Figure [10-3](#475651_1_En_10_Chapter.xhtml#Fig3).\n\n![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig3_HTML.jpg](images/475651_1_En_10_Chapter/475651_1_En_10_Fig3_HTML.jpg)\n\
    \n**Figure 10-3** Truffle migrate project\n\nThe output summary should also show\
    \ that the deployment went well and a charge.\n\n```\nSummary\n=======\n> Total\
    \ deployments:   2\n> Final cost:          0.0525573 ETH\n```\n\n## Truffle Console\n\
    \nNow that you have the contract compiled and deployed, to interact with the network,\
    \ start a console, as shown here:\n\n```bash\n> truffle console --network development\n\
    ```\n\nA good resource for the commands you can run against the Truffle CLI is\
    \ at the Ethereum JavaScript API wiki page here: [`https://github.com/ethereum/wiki/wiki/JavaScript-API`](https://github.com/ethereum/wiki/wiki/JavaScript-API).\n\
    \n### Accounts\n\nIf you run `getAccounts`, you’ll get a list of accounts associated\
    \ with your wallet.\n\n```javascript\ntruffle(development)> web3.eth.getAccounts()\n\
    [ '0x1eFf25A40C82EA65BC88E45d02368897EC922FEf',\n'0xC135058b33d5df78636Cf14b74F281f95c4a407c',\n\
    '0xe682300Ef633F7d4f0d8Cb07c1bAD5d9B4eaE974'\n....]\n```\n\nYou can then define\
    \ `address1` and `address2` as the first and second accounts.\n\n```javascript\n\
    truffle(development)> web3.eth.getAccounts().then( function(a){address1=a[0]})\n\
    undefined\ntruffle(development)> web3.eth.getAccounts().then( function(a){address2=a[1]})\n\
    undefined\n```\n\nNow that they are defined, you can call them and get the first\
    \ and second accounts in the output.\n\n```javascript\ntruffle(development)> address1\n\
    '0x1eFf25A40C82EA65BC88E45d02368897EC922FEf'\ntruffle(development)> address2\n\
    '0xC135058b33d5df78636Cf14b74F281f95c4a407c'\n```\n\nYou can also use `getBalance`\
    \ to get the balance you have in these addresses.\n\n```javascript\ntruffle(development)>\
    \ web3.eth.getBalance(address1)\n'99942134400000000000'\ntruffle(development)>\
    \ web3.eth.getBalance(address2)\n'100000000000000000000'\n```\n\n### Test the\
    \ Transfer of a Smart Contract\n\nNow that you have defined two addresses and\
    \ you know the balance in these accounts, you can define your contract and pass\
    \ some funds between the accounts. To do so, first define the contract and call\
    \ it `transferSmartContract`.\n\n```javascript\ntruffle(development)> Transfer.deployed().then(function(instance){transferSmartContract\
    \ = instance;})\nundefined\n```\n\nNext, run the `transferSmartContract` variable\
    \ you defined to ensure it worked and show the object value.\n\n```javascript\n\
    > transferSmartContract\n```\n\nNow you can transfer funds with your smart contract\
    \ between the two accounts. Account 2 holds a nice round number, so you will transfer\
    \ 5 eth.\n\n```javascript\n> transferSmartContract.pay(address2, {from: address1,\
    \ value: 5});\n```\n\nThe command output shows information about the transaction\
    \ and mining. Now you are able to see the balance updated.\n\n```javascript\n\
    > web3.eth.getBalance(address1);\n'99942134399999999995'\n> web3.eth.getBalance(address2);\n\
    '100000000000000000005'\n```\n\nAs you can see, the balance changed, and you were\
    \ able to transfer tokens between two addresses.\n\n## Link with the Ethereum\
    \ Network\n\nYou got your contract working in Terminal; the next step is for your\
    \ dapp to interact with the contract. This is done via `web3.js`, which is a collection\
    \ of libraries allowing you to interact with a local or remote Ethereum node using\
    \ an HTTP or IPC connection. First navigate back into your Angular project folder\
    \ and then install `web3.js` with the flag `--save` to save the library you are\
    \ installing.\n\n```bash\n> cd ethdapp/\n> npm install web3 –save\n+ web3@1.0.0-beta.55\n\
    ```\n\nIf installation went well, you will see in the output that the version\
    \ did install. At the time of writing, `web3` is at version 1.0.0-beta55.\n\n\
    You also need to install `truffle-contract`, which provides wrapper code that\
    \ makes interaction with your contract easier. At the time of writing, the latest\
    \ is version 4.0.7 but will probably change by the time you are reading this book.\n\
    \n```bash\n>  npm install truffle-contract –save\n+ truffle-contract@4.0.15\n\
    ```\n\n**Tip**  \n`web3` version 1.0.0 beta and `truffle-contract` version 4.0.15\
    \ are the latest versions and compatible with Angular 7.3.x. However, this can\
    \ change, so watch the version you are installing to ensure it’s compatible and\
    \ to avoid errors. Re-install with exact `@[version]`, for instance `@4.0.15`,\
    \ if you run into compatibility issues.\n\n## Transfer Service\n\nNow that you\
    \ have your libraries installed, you can continue. In this section, you will create\
    \ and write a service class. A service class is going to be your front-end middle\
    \ layer to interact with `web3`. To get started, you can utilize the `ng s` flag,\
    \ which stands for “service.”\n\n```bash\n> ng g s services/transfer --module=app.module\n\
    CREATE src/app/services/transfer.service.spec.ts\nCREATE src/app/services/ transfer.service.ts\n\
    ```\n\nYou will replace the service class’s initial code with logic to interact\
    \ with `web3`. First you will define the libraries you will be using, which are\
    \ the Angular core and the `truffle-contract` and `web3` libraries you installed.\n\
    \n```typescript\nimport { Injectable } from '@angular/core';\nconst Web3 = require('web3');\n\
    import * as TruffleContract from 'truffle-contract';\n```\n\nNext, you will define\
    \ three variables you will be using later: `require`, `window`, and `tokenAbi`.\
    \ Notice that `tokenAbi` points to the ABI file you compiled from the contract\
    \ SOL file.\n\n```typescript\ndeclare let require: any;\ndeclare let window: any;\n\
    const tokenAbi = require('../../../truffle/build/contracts/Transfer.json');\n\
    ```\n\nYou need access to root to interact with `web3`, so you need to inject\
    \ it into your project.\n\n```typescript\n@Injectable({\nprovidedIn: 'root'\n\
    })\n```\n\nNext, define the class definition, the `account` and `web3` variables,\
    \ and `init web3`."
