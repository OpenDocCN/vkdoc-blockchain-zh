    # 总结


    本章中，我介绍了 `Hyperledger`，帮助你入门并理解其强大之处。我讲解了 `Hyperledger` 生态系统和术语，让你深入了解构成网络的各个组件以及可用的主要
    `Hyperledger` 平台和工具。你安装了 `Hyperledger Fabric` 和 `Hyperledger Composer`，并确保安装了必要的依赖库。你使用
    `Playground` 创建了“Hello, World”应用程序，以及在本地网络上部署的 `.bna` 文件。我提到了 `Hyperledger Playground
    Online`，并解释了如何使用 `Yeoman generator` 生成网络。我介绍了构成 `.bna` 存档文件的各个部分，包括处理 ID 卡。我还介绍了潜在的错误和故障排除，以确保你的安装顺利进行。最后，我提供了一些关于从何处继续学习
    `Hyperledger` 的建议。


    在下一章中，你将学习如何使用 `Angular` 构建去中心化应用（dapp）。Dapp 可以与你在前三章中开发的智能合约交互，并且是区块链生态系统中的一个重要组成部分。


    # 9. 使用 Angular 构建 Dapp：第一部分


    在前几章中，我介绍了不同的区块链，你学习了如何创建可与区块链交互的智能合约。你在 `Ethereum`、`NEO`、`EOS` 和 `Hyperledger`
    中创建了智能合约。在第一章中，我将过程分解为五个层面：共识层、记账/出块层、传播层、语义层和应用层。在开发周期中，智能合约是应用层的一部分；然而，如果没有一个允许最终用户与区块链交互的前端界面，应用层就是不完整的。


    ### 提示


    很多时候你会听到去中心化应用（dapp）被直接称为智能合约。智能合约是自动执行的合约。Dapp 使用智能合约，但运行在点对点（P2P）网络上，而不是单机系统上。


    开发者和更懂行的用户可以通过前面章节提到的命令行界面和工具与你创建的智能合约交互，但对于所有其他用户来说，开发一个能够与区块链交互的前端应用程序是必不可少的。这可以通过创建一个去中心化应用（dapp）来实现。在本章和下一章中，你将借助
    `Angular` 创建一个去中心化应用，以便用户能够通过友好直观的用户界面（UI）与智能合约交互。我将这个过程分为两部分。


    本章涵盖的第一部分包含以下主题：


    - 开发 dapp，包括其优势和分类

    - 使用 `Angular`，包括其架构、优势、前置条件以及创建 `Angular` 骨架应用

    - 创建和样式化 `Angular` 自定义组件


    第 10 章涵盖的第二部分包含以下主题：


    - 使用 `Truffle` 创建 dapp 的智能合约

    - 将智能合约与 dapp 集成

    - 链接并将你的 dapp 连接到 `Ethereum` 网络


    让我们开始吧。


    ## 什么是 Dapp？


    *去中心化应用*（缩写为 ÐApp、dapp、Dapp、dApp 或 DApp，发音为“dee-app”）是一种能够与智能合约交互的 Web 应用程序。Dapp
    运行在区块链上，并利用分布式账本。`Ethereum` 区块链目前是运行 dapp 最流行的平台；然而，你看到过的其他分布式账本技术（DLT）也提供了创建
    dapp 的能力。我在前面章节中介绍了 `NEO`、`EOS` 和 `Hyperledger`；其他还包括 `ICON`、`Cardano` 和 `Hashgraph
    (Hedera)`。


    > *“一切可以去中心化的事物终将去中心化。”*

    >

    > ——David Johnston，DApp Fund 首席执行官 [`https://github.com/DavidJohnstonCEO/DecentralizedApplications`](https://github.com/DavidJohnstonCEO/DecentralizedApplications)


    如果你曾经开发过标准的桌面、Web 或移动应用程序，你会发现 dapp 既有相似之处，又非常不同。


    Dapp 是使用与你构建其他任何应用相同的工具和语言构建的，但要将一个应用归类为 dapp，它需要满足以下标准：


    - *开源*：其代码以开源形式发布，不应由单个实体掌控（中心化）。请记住，应用可以根据提出的改进建议和市场反馈调整其自身协议；然而，所有更改都由其用户的共识驱动。

    - *去中心化*：Dapp 利用区块链或 P2P 网络。

    - *激励机制*：Dapp 使用数字资产进行融资。

    - *算法/协议*：Dapp 通常生成代币并包含共识机制，例如 `PoW`、`PoS`，甚至其自有的机制。


    这些标准确保了 dapp 不会像你从 `iTunes` 或 `Google Play` 等市场下载的其他应用那样出现停机；dapp 也将控制权交给社区，而不是单个实体。这些标准可能意义重大。例如，`Apple`
    和 `Google` 经常因应用不满足其任意或基于金钱的政策而拒绝它们。这些策略并非总是合理，也并非总是符合最终用户的最佳利益；它们通常是为了阻止竞争对手的使用或为了获取金钱利益。


    许多人认为，基于开源代码、在去中心化区块链上实现、并由使用特定共识机制生成的代币提供资金的 dapp，是所有业务的未来。只有时间能给出答案。


    此外，开源软件是一个优势，因为它允许用户查看源代码并可能为其做出贡献。使用区块链进行去中心化，可以发挥区块链作为 DLT 的优势，并作为传统单服务器数据库的替代品。


    最后，向账本添加记录/交易通常是通过使用代币完成的，而代币的共识机制也是 dapp 所有用户之间的协议。


    ### Dapp 的分类


    除了上述标准，dapp 还可以进行分类。分类基于 dapp 所利用的基础设施，可以细分为以下三类：


    - *专用区块链 dapp*：这类 dapp 直接使用专用区块链；例如 `bitcoin`、`Ethereum`、`EOS` 和 `NEO`。

    - *依赖另一区块链的 dapp*：例如，`Omni Layer Protocol`（原名 `Mastercoin`）是一种建立在 `bitcoin` 区块链之上的数字货币和通信协议。

    - *依赖构建在另一区块链之上的另一协议的 dapp*：这类 dapp 使用建立在另一区块链之上的协议。一个例子是使用 `Omni Layer Protocol`
    的安全网络。


    一个有助于理解分类概念的好例子是 `USDT (Tether)` 代币。该代币基于两种区块链发行过两次：`bitcoin` 和 `Ethereum`。在这种情况下，存在两种类型的
    `USDT`。最初基于 `bitcoin` 的版本是通过使用 `Omni Layer Protocol` 生成代币实现的，而基于 `Ethereum` 的
    `USDT` 则兼容 `Ethereum` 的 `ERC20` 标准。请看图 9-1。


    ![../images/475651_1_En_9_Chapter/475651_1_En_9_Fig1_HTML.jpg](img/475651_1_En_9_Fig1_HTML.jpg)


    **图 9-1** USDT 的分类表示

