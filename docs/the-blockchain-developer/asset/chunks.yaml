    can result in a security risk or a showstopper.\n\n![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig7_HTML.jpg](images/475651_1_En_11_Chapter/475651_1_En_11_Fig7_HTML.jpg)\n\
    \nFigure 11-7\nSuggested development cycle to reduce security and compliance\n\
    risks\n\nTip\nThis development is a basic approach for a development cycle. Feel\n\
    free to employ your own approach or a different approach that fits your\nplatform\
    \ and needs better.\n\nDesign and Coding\nPrior to and during the design and coding\n\
    phase, you should incorporate all the security, privacy, and\ncompliance elements\
    \ discussed in the early part of this chapter. These\nshould be taken into account\
    \ for all the elements of your platform,\nincluding the pages, login system, privacy\
    \ page, integrations with\nthird-party plugins, the creation of services, setting\
    \ up servers, and\nso on.\nIt is a good idea for you to create your own checklist\
    \ of everything\nthat needs to be incorporated and taken into account that specifically\n\
    applies to your unique platform. It’s not possible to get one list that\nfits\
    \ everything. Every platform should have a unique checklist.\nAdditionally, as\
    \ you start a new development cycle, you may need to\nupdate the requirements.\
    \ For instance, let’s say you want your platform\nto be supported in a new locale;\
    \ this will require a new checklist.\n\nDiscovery, Audit, and Test\n\nThis step\
    \ can be broken into three steps. The steps are intertwined and\nrely on one another,\
    \ so you should consider these steps as one phase.\nThese steps are as follows:\n\
    \n*   *Discovery*: Find out the versions used in your platforms\n    such as versions\
    \ of libraries, firmware, software, third-party SDKs, and\n    so on.\n\n*   *Audit*:\
    \ Audit your code and platform to find common\n    problems, accessibility of\
    \ your services, and performance issues that\n    can degrade and make your platform\
    \ inaccessible.\n\n*   *Test*: This is when you run actual tests against your\n\
    \    platform. The purpose is to identify the systems and services that your\n\
    \    platform is using and potential security vulnerabilities."
  trans: "\n# DoS 与 DDoS 攻击\n\n*拒绝服务*（DoS）攻击是一种常见的攻击手段，旨在阻止用户访问服务。*分布式拒绝服务*（DDoS）攻击与\
    \ DoS 类似，但其并非利用单一机器进行攻击，攻击者会使用多台机器同时发起攻击。由于使用了多台机器，攻击成功的概率更高，且更难定位攻击者的确切位置。\n\n\
    交易所和网站是 DoS 与 DDoS 攻击的常见目标。例如，比特币黄金正式上线时，就曾遭遇 DDoS 攻击，导致网站宕机数小时。流行的区块链网络内置了简单的\
    \ DoS 防御机制，但许多网络仍无法抵御更复杂的攻击。\n\n最常见的攻击类型如下：\n\n-   *缓冲区溢出*：此类攻击向目标服务发送超出其处理能力的流量。攻击者可借此导致目标服务崩溃，甚至控制该服务。\n\
    -   *ICMP 洪水*：也称为\"死亡之 ping\"或\"Smurf 攻击\"，此类攻击通过迫使某个节点向所有节点分发虚假数据包，导致网络过载。\n\
    -   *SYN 洪水*：攻击者发送连接请求但从不完成验证，随后利用服务器上所有开放端口发起攻击，直至服务器崩溃。\n-   *NTP/DNS 放大攻击*：针对\
    \ NTP 服务器的攻击，攻击者发送大量 UDP 数据包并伪造源 IP 地址，使 NTP 服务器误以为这些数据包来自目标主机的合法流量。过载将导致 NTP\
    \ 服务器崩溃。\n\n## 事后分析\n\n作为开发者，你需要考虑 DoS/DDoS 攻击并实施相应的防御措施。请参考以下示例：\n\n-   *过滤恶意流量*：\n\
    \    -   *脚本*：一种防御方法是编写脚本检测 DoS/DDoS 攻击。请查看 GitHub 上的 DDoS 防护库：[`https://github.com/topics/ddos-protection`](https://github.com/topics/ddos-protection)。[`http://vddos.voduy.com/`](http://vddos.voduy.com/)\
    \ 是一个流行的选择。\n    -   *防火墙*：使用防火墙阻止恶意流量。见图 11-6。\n\n![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig6_HTML.jpg](img/475651_1_En_11_Fig6_HTML.jpg)\n\
    \n**图 11-6** DDoS 防护反向代理说明。图片来源：vddos.voduy.com。\n\n-   *专用硬件*：采购并部署专用硬件以缓解 DDoS\
    \ 攻击。该硬件部署在数据中心中服务器和路由器前端，能够检测并过滤恶意流量。此类硬件的示例包括来自[`www.fortinet.com`](http://www.fortinet.com)\
    \ 的`FortiDDoS`。\n-   *ISP*：互联网服务提供商（ISP）向客户提供 DDoS 缓解方案。例如，亚马逊提供的 Shield 服务使所有\
    \ AWS 客户都能受益于自动化防护，并提供更高级别的攻击防护；详情请参阅[`https://aws.amazon.com/shield`](https://aws.amazon.com/shield)。\n\
    -   *云端缓解*：部分云服务提供 DoS/DDoS 缓解方案。这些服务会清洗流量以消除恶意流量。一家流行的服务商是[`cloudflare.com`](http://cloudflare.com)，它提供免费标准版和付费企业版。\n\
    \n关于区块链网络的 DoS/DDoS 攻击，需要研究现有的区块链防御实现，例如比特币 Satoshi 客户端防护（已在`0.7.0`版本中实现）；详情请参阅[`https://en.bitcoin.it/wiki/Weaknesses`](https://en.bitcoin.it/wiki/Weaknesses)。\n\
    \n总而言之，我回顾了针对平台的常见攻击。你了解了凭证攻击、有缺陷的代码、依赖后门攻击以及 DoS/DDoS 攻击。此外，我回顾了帮助你降低风险并防御这些攻击的方法。在下一节中，我将为你提供一个建议的开发周期，你可以采用它来帮助降低风险，并使用方法论的方法来防止攻击。\n\
    \n## 开发周期\n\n正如你在本章所见，你的平台需要确保安全并防范潜在攻击。你不能依赖运气，需要确保利用所有可用措施来降低平台遭受攻击的风险，并确保实施与所在地区相关的所有最新法规。\n\
    \n该过程可分为以下几个阶段：\n\n-   *设计与编码*\n-   *发现、审计与测试*\n-   *就绪评估*\n-   *发布*\n\n如图 11-7\
    \ 所示，每个阶段都可能导致返回设计与编码阶段，因为发现的任何结果都可能构成安全风险或致命问题。\n\n![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig7_HTML.jpg](img/475651_1_En_11_Fig7_HTML.jpg)\n\
    \n**图 11-7** 建议的开发周期，以降低安全与合规风险\n\n> **提示**  \n> 此开发周期是一个基本方法。你可以自由采用适合自身平台和需求的其它方法。\n\
    \n### 设计与编码\n\n在设计与编码阶段之前及期间，你应该整合本章前文讨论的所有安全、隐私和合规要素。这些要素应纳入平台的所有组成部分，包括页面、登录系统、隐私页面、第三方插件集成、服务创建、服务器设置等等。\n\
    \n强烈建议你为自己独特的平台创建一份专属的核对清单，列出需要整合和考虑的所有要素。不可能存在一份放之四海而皆准的清单。每个平台都应有其独特的清单。此外，当你开始一个新的开发周期时，可能需要更新需求。例如，假设你想让平台支持新的地区，这就需要一份新的清单。\n\
    \n### 发现、审计与测试\n\n此步骤可细分为三个步骤。这三个步骤相互交织、彼此依赖，因此应将其视为一个阶段。具体步骤如下：\n\n-   *发现*：查明平台上使用的各种版本，例如库、固件、软件、第三方\
    \ SDK 等的版本。\n-   *审计*：审计你的代码和平台，以发现常见问题、服务的可访问性，以及可能导致平台性能下降或无法访问的性能问题。\n-   *测试*：这是你实际对平台运行测试的阶段。目的是识别平台正在使用的系统和服务的潜在安全漏洞。\n"
- fmt: "# Discovery\n\nThe discovery is all about discovering what versions are used\
    \ in your platform. For instance, you need to run a discovery phase to find out\
    \ the firmware you are using. Knowledge of the version provides valuable information\
    \ in case a version of something was marked with security vulnerability or has\
    \ been deprecated. The discovery phase can then be used to audit and test and\
    \ provide an indication of potential vulnerabilities in your platform.\n\nYou\
    \ may find out during the discovery check that you need to go back to the coding\
    \ and design phase because of versioning issues. For instance, once you change\
    \ the version of a library or firmware, your code may break, and you may need\
    \ to refactor your code.\n\n# Audit\n\nFor the auditing phase, you should conduct\
    \ a systematic review of specific potential issues.\n\nJust as an accountant audit\
    \ financial aspect of a company and even this book was audited by a team, your\
    \ platform needs auditing and testing to ensure your code follows best practices\
    \ to improve performance, accessibility, and compliance with security and regulatory\
    \ requirements.\n\nAn audit inspection can be done by your own platform team but\
    \ is often done by an independent entity. It’s important to recognize that audits\
    \ can't be expected to detect all the issues that need to be addressed. A blockchain-based\
    \ platform should take into account security and compliance audits as well.\n\n\
    ## Security Audit\n\nThe security audit can utilize a complete manual approach\
    \ or utilize automated tools to do vulnerability assessments, security assessments,\
    \ and penetration tests to determine what needs to be addressed. There are more\
    \ than 1,500 exploits, so it’s a good idea to rely at least to some degree on\
    \ automated audit tools as an integral part of your development cycle and ensure\
    \ your platform passes common problems. Even when hiring a third-party auditor,\
    \ it’s better to first check for common problems before starting a more vigorous\
    \ audit.\n\n## Compliance Audit\n\nIn blockchain, you need to check beyond just\
    \ the security aspects; you need to also conduct a compliance audit to ensure\
    \ privacy and regulations are implemented according to the law.\n\nJust like a\
    \ security audit, a compliance audit can be done by a third-party auditor or in-house.\
    \ As you saw previously in this chapter, many of the problems that concern lawmakers\
    \ in different locales relate to security vulnerabilities. As I pointed out, the\
    \ compliance regulations can change often and different between locales, so the\
    \ compliance assessment is often better done in a manual manner than an automatic\
    \ one.\n\n# Test\n\nThe discovery and audit rely on testing to make recommendations\
    \ on how to fix problems in your platform. In terms of testing, there are three\
    \ types.\n\n*   *Dynamic testing*: Test vulnerabilities that an attacker may target.\
    \ An attacker trying to exploit your platform would not have access to your code\
    \ and platform, so the tests are run without access to your source code.\n*  \
    \ *Static testing*: This is an inside-out approach, testing for vulnerabilities\
    \ in the source code of your platform. This testing offers a more in-depth real-time\
    \ snapshot of your platform and the libraries that make up your platform.\n* \
    \  *Penetration test*: This simulates an actual malicious attack. The penetration\
    \ test can rely on found vulnerabilities to gain further access to your platform.\
    \ This can help you understand what access an attacker can gain over confidential\
    \ information.\n\nTests can be conducted by automated tools, but it’s recommended\
    \ you also include a manual test by an actual tester, who can rely on his experience\
    \ and knowledge to find vulnerabilities not found by automated tools.\n\n# Automated\
    \ Tools\n\nThere are many testing tools that can assist you in doing the three\
    \ types of testing. For instance, for the static testing of libraries, I already\
    \ mentioned the `npm audit`, which helps detect any vulnerable in a dependency’s\
    \ version.\n\n```\n> npm audit\n```\n\nFor a web app, the Google Chrome developer\
    \ tools provide built-in audit tools, as shown in Figure [11-8](#475651_1_En_11_Chapter.xhtml#Fig8).\n\
    \n![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig8_HTML.jpg](images/475651_1_En_11_Chapter/475651_1_En_11_Fig8_HTML.jpg)\n\
    \nFigure 11-8 Google Chrome developer tool audit report\n\nA browser’s developer\
    \ tools provide a simple web proxy network tool; however, these tools don’t have\
    \ many of features you may need, such as exporting data, running simulations,\
    \ and filtering data. You may find it useful to utilize a third-party web proxy\
    \ tool during the audit phase. The web proxy tool is mainly a network protocol\
    \ analyzer, which can provide details of your network protocols, packet information,\
    \ decryption, and so on. The two popular tools are Charlesproxy and Wireshark.\n\
    \n*   [`https://www.charlesproxy.com/`](https://www.charlesproxy.com/)\n*   [`https://www.wireshark.org/`](https://www.wireshark.org/)\n\
    \nIn terms of automated penetration tools, there are many tools out there. Here\
    \ are examples of a few popular ones:\n\n1.  *Security automation tools*\n   \
    \ 1.  *The OWASP Zed Attack Proxy (ZAP)*: This includes popular free security\
    \ tools. See [`www.owasp.org/index.php/OWASP_Zed_Attack_Proxy_Project`](http://www.owasp.org/index.php/OWASP_Zed_Attack_Proxy_Project).\n\
    \    2.  *Burp Suite*: This automation tool includes free community and paid version.\
    \ See [`www.portswigger.net/burp`](http://www.portswigger.net/burp).\n2.  *Metasploit*:\
    \ This tool is based on `exploit`, which tries to overtake the security measures\
    \ of your platform. You can run it from a GUI or command line. See [`https://www.rapid7.com/products/metasploit/download/editions/`](https://www.rapid7.com/products/metasploit/download/editions/).\n\
    3.  *CORE Impact*: Core Impact Pro tests mobile device penetration, password identification,\
    \ cracking, and so on. It also has a GUI and a command-line interface but has\
    \ high price tag. See [`https://www.coresecurity.com/core-impact/`](https://www.coresecurity.com/core-impact/).\n\
    4.  *Netsparker*: This includes a web application scanner that can help identify\
    \ vulnerabilities such as accessing sensitive data and suggesting solutions. It\
    \ includes SQL injection and local file induction (LFI). The penetration test\
    \ fabricates an internal or external unauthorized attack. See [`https://www.netsparker.com/`](https://www.netsparker.com/).\n\
    5.  *Free Security tool from Google (ratproxy)*: See [`https://code.google.com/archive/p/ratproxy/`](https://code.google.com/archive/p/ratproxy/).\n\
    6.  *Kali Linux operating system (OS)*: This tool is for hackers, with many hacking\
    \ tools pre-installed already. The OS sits as a virtual machine on your Mac/PC.\n\
    7.  SQL injections:\n    1.  *Sqlmap*: This is an open source penetration automated\
    \ testing tool to detect and exploiting SQL injections. See [`https://sqlmap.org`](https://sqlmap.org).\n\
    \    2.  *SQLNinja*: This tool checks for SQL injection vulnerabilities aimed\
    \ at Microsoft SQL Server. See [`https://sqlninja.sourceforge.net`](https://sqlninja.sourceforge.net).\n\
    \    3.  *Firefox add-on called Hackbar*: This test helps you test site security\
    \ including SQL injections and XSS holes. See [`https://www.addons.mozilla.org/en-US/firefox/addon/hackbartool/`](https://www.addons.mozilla.org/en-US/firefox/addon/hackbartool/).\n\
    \n> **Note**: File inclusion allows an attacker to insert a file by exploiting\
    \ dynamic file inclusion (such as jQuery’s `$.getScript`), which is implemented\
    \ in the application to include another file. The file is then uploaded by user\
    \ input and where there isn’t proper validation to check the file. The solution\
    \ is to implement validation for dynamic file inclusion to ensure the origin and\
    \ content.\n\nThere are security testing automated tools to list; however, you\
    \ can check a few curated lists of security testing automated tools online that\
    \ fit the exact test you want to run."
