    ### Public Testnet Faucet


    In addition to the testnet coins, you can get additional testnet coins via a faucet,
    just as you did with bitcoin. Go to [`https://faucet.ropsten.be/`](https://faucet.ropsten.be/)
    , as shown in Figure [5-20](#475651_1_En_5_Chapter.xhtml#Fig20), and request coins
    to your wallet address set in Mist.


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig20_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig20_HTML.jpg)


    Figure 5-20


    Ropsten Ethereum faucet


    ## Ethereum Mainnet


    From the Ganache console, you were able to publish to a public testnet network
    (Ropsten). The next step is to publish to the Ethereum mainnet . To do so, you
    will restart Geth and connect this time to the mainnet.


    ```

    > geth --fast --cache=512

    ```


    Just as with the public testnet, you will have to wait for Geth to sync. Once
    syncing is complete, you can call the Truffle `migrate` command to deploy, and
