  trans: '

    # 说明


    节点构成一个网络，因此在本节中你可能会看到*对等节点*或*节点*这两个词。在本书的语境中，这两个词是同义词。


    如前所述，数字资产可以是任何东西——音乐文件、视频文件、电子文档等等。在加密货币中，数字资产以电子现金的形式呈现；你可以将公钥视为你的银行账户和路由号码，将私钥视为账户中的实际现金。没错，你可以与他人分享你的银行信息，但资金仍会留在你的账户中。要提取现金，你需要证明所有权。你前往银行出示身份证件，并通过签名方式证明身份；只有这样，你才能将钱从账户中取出。加密货币也经历了类似的过程。有一个代表你账户的公共地址，只有持有私钥的所有者才能证明所有权。


    ## 双重支付问题


    数字签名（公钥和私钥）能够安全地确保一方的身份信息保密，并保障电子现金的存储安全。


    这种公私钥组合的概念使你能够加密和解密字符串，并确保字符串的安全，就像你在恩尼格玛密码机中看到的那样。然而，这仍然不足以解决数字货币最大的问题——双重支付。


    当你使用法定货币（由政府法律规定的纸币）例如美元或欧元时，纸币是不可转换的，这意味着一旦你将纸币花出去，就不能再次使用。在加密货币中，如果你证明了所有权并在同一时间发送了两次数字资产，会发生什么？这可能导致*双重支付*。


    黑客可能试图复制数字资产，并有可能进行双重支付。在加密货币被用作数字货币之前，必须先解决这个问题。


    ### 说明


    *双重支付*是指数字货币可能被花费两次的风险，因为数字签名可能被复制，并且有人可以证明所有权，同时在同一个时间发送两次数字资产。


    仅包含密钥的区块不足以提供安全性，也无法解决潜在的双重支付问题，从而形成一种数字货币。


    比特币通过创建一个计算机网络并证明没有发生双重支付尝试来解决这个问题。这通过让网络中的所有计算机知晓每一笔交易来实现。所有交易都会与网络中的所有计算机共享。


    ## 双重支付解决方案：P2P 网络


    在加密货币中，使用点对点网络为解决双重支付问题提供了方案。


    ### 说明


    *P2P 网络*是一种分布式应用架构，它将需要执行的任务在多个对等节点之间分配，每个对等节点具有相同的权限。这些对等节点共同构成一个由节点组成的 P2P 网络。


    任何连接到网络的计算机都被称为*对等节点*。对等节点可以是任何满足网络要求的计算机，例如笔记本电脑、移动设备或服务器。这些计算机通过 P2P 网络协议在互联网上相互连接，形成一个节点网络。


    P2P 网络协议并非新鲜事物。多年来，它已在网络上被广泛使用，从通过 Kazaa 或 LimeWire 网络下载文件，到通过 Skype 进行视频通话。


    正如我提到的，比特币是第一个可行的加密货币，它解决了双重支付问题，并允许在不经过金融机构的情况下存储电子现金，同时利用 P2P 形成了区块链协议。


    > *“纯粹的点对点电子现金版本，将允许在线支付直接从一方发送到另一方，而无需经过金融机构。”*

    >

    > ——中本聪，《比特币：一种点对点的电子现金系统》


    ## 加密货币矿工与挖矿


    如前所述，每台持有共享账本副本并连接到 P2P 网络的计算机都是一个对等节点。对等节点可以帮助添加记录和验证交易。这个过程称为*加密货币挖矿*或简称*挖矿*，而帮助记录和验证交易的对等节点被称为*加密货币矿工*或简称为*矿工*。


    每个矿工都协助验证交易并将其添加到区块链数字账本中。矿工通常会因其工作而获得费用奖励。为了在其他矿工中保持竞争力，矿工通常需要一台配备专用硬件的计算机。


    ## 加密货币钱包


    我已经介绍了公钥和私钥是什么，以及它们如何用于加密和解密字符串。这些字符串就是数字货币或加密货币，而密钥则代表电子货币。


    一个*加密货币钱包*存储一个或多个公私钥组合，用于接收或花费加密货币。


    一个好的类比是将钱包想象成你的银行账户。加密货币可以通过执行挖矿工作获得奖励来创造，也可以通过购买获得。我将在本书后面部分详细介绍钱包。


    ## 纷繁复杂的加密货币


    在深入探讨区块链 P2P 网络之前，你应该知道另一个可能造成混淆的概念是币（Coin）和代币（Token）之间的区别。根据 `Coinmarketcap.com`
    的数据，截至撰写本文时，共有 1,833 种列出的加密货币，市值达 2000 亿美元。


    其中许多币种在未来的岁月中肯定会消失，因为它们提供的价值微乎其微，而且这些项目会因缺乏兴趣或是骗局而终止。


    这可能会令人困惑和不知所措，大多数人并不理解比特币的概念，更不用说大量存在的币种和代币了。为了帮助理解这些概念，让我们将加密货币分为三种类型：比特币、代币和替代性加密货币币种（山寨币）。参见图
    1-3。


    ![../images/475651_1_En_1_Chapter/475651_1_En_1_Fig3_HTML.jpg](img/475651_1_En_1_Fig3_HTML.jpg)


    *图 1-3 加密货币币种和代币。图片来源：blog.citowise.com。*


    ### 比特币数字现金


    比特币是去中心化分布式数字货币的第一个成功实现。总共有 2100 万个币。这些币取代了传统的法定货币。


    ### 代币


    代币是一种去中心化的产品发行方式。它是类似于首次公开募股（IPO）或众筹的另一种选择。代币可以在世界任何地方创建，并通过以太坊、EOS 或其他支持区块链的平台进行分发。代币通常通过首次代币发行（ICO）创建并分发给公众。


    代币代表一种效用或资产，通常位于原生区块链之上。它可以代表任何数字资产，包括积分、加密货币，或任何可互换、可替代或可交易的单个单位的商品或物品。你可以使用现有的区块链模板（例如以太坊平台）创建代币，或者你可以在现有的原生区块链上创建自己的代币并发行。你可以利用智能合约来简化创建代币的过程，这将在后面的章节中讨论。


    #### 说明


    智能合约是一种可编程代码，无需第三方即可独立运行。例如，Solidity 是一种面向合约的编程语言，可以部署在多个区块链上。


    ### 替代性加密货币币种（山寨币）


    替代性加密货币币种（简称*山寨币*）是通过分叉（软分叉或硬分叉）从比特币核心源代码衍生出来的币种。例如莱特币（它是比特币核心客户端的派生币）、狗狗币（狗狗币
    1.10 是基于比特币 0.11 版本完全重建的）、比特币 X、比特币现金以及比特币黄金。事实上，在撰写本文时，已有 26 种山寨币。

    '
- fmt: '### Note


    硬分叉是向后不兼容的，因为变更将网络代码分裂为两个——运行原始代码的P2P网络和运行新代码的新P2P网络。软分叉是向后兼容的，意味着之前有效的区块/交易变为无效，而旧节点会识别新区块为有效。当开发者对某个方向存在分歧时，这种分叉经常发生。例如，一些开发者希望实施其他开发者不同意的变更，或者需要实施一个重大修复。


    `Litecoin`是`bitcoin`核心客户端的一个分叉。`Litecoin`将区块生成时间从10分钟改为2.5分钟，使得交易能够比`bitcoin`更快、更高效地转移。`Litecoin`之后可以继续添加功能，因为它不再依赖于`bitcoin`的代码。例如，未来`litecoin`将支持原子交换，允许人们通过智能合约将`Litecoin`转换为`bitcoin`，而无需经过交易所。然而，`bitcoin`核心的变更需要手动实施才能将这些变更包含在`litecoin`中。


    话虽如此，许多人会争论`Litecoin`和许多这类山寨币并不能提供足够的生存价值，它们只是为了丰富创建分叉的开发者而制造的。只有时间能证明一切。


    `EOS`是另一个山寨币的好例子。这次，该山寨币变成了一种代币，因为在发布时`EOS`公司发行了以太坊代币，但随着`EOS`构建自己的区块链平台，它正在用自己的`EOS`代币取代以太坊代币。


    简而言之，山寨币和代币的主要区别在于它们的结构。山寨币是一种像`bitcoin`或`Litecoin`一样的独立货币，拥有自己的专用网络区块链并需要矿工。像以太坊代币这样的代币则运行在现有区块链之上，该区块链为去中心化应用（`dapp`）的创建提供了代币和基础设施（如`Ethereum`）。以太坊代币的一个例子是币安代币（`BNB`）。


    关于以太坊代币，`Ethereum`提供了创建不同代币标准或以太坊征求意见（`ERC`）的功能，例如`ERC-20`、`ERC-223`或`ERC-777`。在`BNB`代币的例子中，使用了`ERC-20`。这些标准有所不同，将在后续章节中详细讨论。


    ## 区块链P2P网络


    现在你已经对关键概念有了更好的理解，可以更深入地了解区块链如何使用P2P网络来解决双重支付问题并排除金融机构。


    在本节中，你将看到加密货币P2P网络是如何工作的。你将通过将P2P网络分解为五个层来具体探讨不同的区块链策略以及一般的P2P网络。


    *   共识层

    *   矿工层

    *   传播层

    *   语义层

    *   应用层


    这里的概述将为后续章节奠定基础，在那些章节中，你将利用`bitcoin core API`来配置和运行一个对等节点。这种基本理解可以帮助你理解任何区块链网络如何通过利用不同的策略（如`NEO`和`EOS`）来工作。


    ### 共识机制


    在传统的中心化系统（如银行）中，有一台主计算机负责保管交易账本。银行显然可以信任自己的计算机，因此它在负责主计算机的安全性和完整性方面没有问题。


    当你处理共享账本的不可信对等节点时，需要制定规则来确保安全性并提供账本的完整性，以防止双重支付和其他潜在的黑客攻击。这些规则和协议被称为*共识机制*。


    ### 注意


    共识机制是网络即使在发生故障时也能正常运行所需的协议。它需要能够在分布式P2P网络中就网络数据达成一致。


    区块链不仅仅是一台主计算机，它的目标是全球性地工作。它通过网络中所有计算机对数据达成共识来实现完整性。分布式共识意味着地理上分散的一组对等节点以去中心化的方式达成一致，而不是由一台主计算机（中心化）来决定。取代法规的是一套通常在开源环境中设定的规则，而不是由政府实体设定。


    P2P网络使得账本成为可能。为了以安全的方式实现这一目标，P2P网络存储数字账本的规则和安全机制。共识机制不仅提供了规则，还通过向矿工发放奖励来激励他们完成存储数据和创建交易的工作。


    P2P网络通过互联网连接在全球范围工作，并能够提供一个实现全球分布式共识机制的平台。在加密货币中，共识/协议是关于区块是否有效。如果一个区块有效，它将被添加到区块链中；如果一个区块无效，它将被拒绝添加到区块链中。


    这就是共识策略发挥作用的地方。网络中大多数对等节点在其验证过的最佳区块链上持有相同的区块，并遵循相同的规则（共识规则）；区块链就是这样确保安全性的。最难以重新创建的链被称为*最佳区块链*（本章稍后会详细介绍这个概念）。


    ### 工作量证明、权益证明和委托权益证明


    随着区块链越来越受欢迎，创建了许多共识机制策略。第一个是由`bitcoin`创建的，许多其他机制是为了解决现有机制中存在的问题而构建的。在接下来的章节中，我将讨论几个流行的机制。


    *   工作量证明（`PoW`）

    *   权益证明（`PoS`）

    *   委托权益证明（`DPoS`）


    除了这三种之外，还有许多其他共识机制本书未涉及，例如重要性证明、经过时间证明（`PoET`）、权威证明（`PoA`）、燃烧证明、容量证明、活动证明等。请自行探索这些机制；每种都有其优缺点，并适用于不同的需求。


    #### 工作量证明


    `PoW`是最早也是最流行的机制；它被`bitcoin`和`Ethereum`使用，这两种是撰写本文时最流行的加密货币。`PoW`通过建立一个矿工网络并向矿工提出一个数学问题来实现。当矿工解决一个问题时，他们会获得加密货币作为奖励。该奖励就是所做“工作”的证明，这也是其名称的由来。'
  raw: '### Note


    Hard forks are backward incompatible because the changes split the network code
    into two—the P2P network with the original code and the new P2P network running
    the new code. Soft forks are backward compatible, meaning that previously valid
    blocks/transactions become invalid, and old nodes recognize new blocks as valid.
    This forking happens often when there is a disagreement of developers regarding
    a direction. For instance, some developers would like to implement changes that
    other developers disagree with or a major fix is needed to be implemented.


    Litecoin was a fork of the bitcoin’s core client. Litecoin changed the time of
    blocks being sent from 10 minutes to 2.5 minutes, enabling transactions to be
    transferred quickly and more efficiently than bitcoin. Litecoin can then continue
    and add features as it’s not relying on bitcoin’s code anymore. For instance,
    in the future, litecoin will enable atomic swap, allowing people to convert Litecoin
    to bitcoin via smart contracts without involving an exchange. However, changes
    in the bitcoin core will require manual implementation to have these changes included
    in litecoin.


    With that said, many will argue that Litecoin and many of these altcoins don’t
    offer enough value to survive and are made with the purpose of enriching the developers
    who created the fork. Only time will tell.


    EOS is another good example of altcoins. This time, the altcoin is turning into
    a token, as upon its release the EOS company issued Ethereum tokens, but as EOS
    is building its own blockchain platform, it is replacing the Ethereum token with
    its own EOS tokens.


    In a nutshell, the main difference between altcoins and tokens is in their structure.
    An altcoin is its own currency like bitcoin or Litecoin, with its own dedicated
    network blockchain and need for miners. Tokens such as Ethereum tokens operate
    on top of an existing blockchain, which provides the token and the infrastructure
    (such as Ethereum) for the creation of a decentralized application (dapp). An
    example of an Ethereum token is the binance token (BNB).


    In regard to Ethereum tokens, Ethereum offers the creation of different token
    standards or Ethereum Request for Comments (ERCs) such as ERC-20, ERC-223, or
    ERC-777\. In the BNB token example, ERC-20 was used. These standards differ and
    will be discussed in more detail in later chapters.


    ## Blockchain P2P Network


    Now that you have a better understanding of the key concepts, you can dive deeper
    into understanding how a blockchain uses a P2P network to solve the double spending
    issue as well as exclude financial institutions.


    In this section, you will see how the cryptocurrency P2P network works. You will
    explore different blockchains policies specifically and the P2P network in general
    by breaking the P2P network into five layers.


    *   Consensus layer


    *   Miner layer


    *   Propagation layer


    *   Semantic layer


    *   Application layer


    The overview here will pave the way for the next chapters where you will be utilizing
    the bitcoin core API to configure and run a peer. This fundamental understanding
    can help you understand how any blockchain network works by utilizing different
    policies such as NEO and EOS.


    ### Consensus Mechanism


    In a traditional centralized system such as a bank, there is a master computer
    that is trusted with the ledger of transactions. The bank can obviously trust
    its own computer, and therefore it has no problem being the one responsible for
    the security and integrity of the master computer.


    When you are dealing with untrusted peers sharing a ledger, there is a need to
    place rules that will ensure security and provide integrity of the ledger to prevent
    double spending and other potential hacker attacks. These rules and agreements
    are called a *consensus mechanism* .


    ### Note


    A consensus mechanism is an agreement needed for the network to operate properly
    even in the event of a failure. It needs to be able to achieve agreement on the
    data of the network within the distributed P2P network.


    The blockchain is not just one master computer and aims to work globally. It achieves
    integrity with a consensus of the data by all the computers connected on the network.
    A distributed consensus means that a pool of peers, geographically apart, agree
    in a decentralized manner, instead of one master computer (centralized). Instead
    of regulations, there are rules that are usually set in an open source environment
    instead of being set by a government entity.


    The P2P network enables a ledger. To achieve this goal in a secure way, the P2P
    network stores the digital ledger rules and security. The consensus mechanism
    provides not only the rules but also the incentives to do the work of storing
    the data and creating transactions by giving the reward to miners.


    The P2P network works globally using an Internet connection and is able to provide
    a platform to achieve a globally distributed consensus mechanism. In cryptocurrencies,
    the consensus/agreement is on whether the blocks are valid or not. If a block
    is valid, the block will be added to the blockchain. If a block is invalid, it
    will be rejected from being added to the blockchain.


    That’s where a consensus policy comes into play. Most of the peers in the network
    hold the same blocks in their validated best blockchain and follow the same rules
    (consensus rules); that’s how blockchain ensures security. The most difficult
    to re-create chain is known as the *best blockchain* (more about this concept
    later in the chapter).


    ### Proof of Work, Proof of Stake, and Delegated Proof of Stake


    As the blockchain gained popularity, many consensus mechanisms policies were created.
    The first one was created by bitcoin, and many others were built to solve problems
    that exist in other mechanisms. In the following sections, I will discuss a few
    popular ones.


    *   Proof of work (PoW)


    *   Proof of stake (PoS)


    *   Delegated proof of stake (DPoS)


    In addition to these three, there are many other consensus mechanisms that are
    not covered in this book, such as proof of importance, proof of elapsed time (PoET)
    , proof of authority (PoA), proof of burn, proof of capacity, proof of activity,
    and so on. Feel free to explore these on your own; each has its pros and cons
    and fits different needs.


    #### Proof of Work


    PoW is the first and most popular mechanism; it’s used by bitcoin and Ethereum,
    which are the most popular cryptocurrencies at the time of writing. PoW is achieved
    by having a network of miners and presenting the miners with a mathematical problem.
    When miners solve a problem, they are rewarded with a cryptocurrency. The reward
    is the proof of the “work” done, and that’s where the name comes from.'
