    # Hyperledger Composer


    现在你已经安装并运行了 Hyperledger Fabric 网络，下一步是编写链码。你可以使用 Go 语言原生地在 Hyperledger Fabric
    中编写链码；不过，你也可以利用 Hyperledger Composer 通过 JavaScript 编码来帮助创建链码和区块链应用程序，而无需使用 Go
    语言。Hyperledger Composer 获取定义文件并生成业务网络存档（`.bna`）文件，然后你可以将这些文件部署到 Hyperledger 网络上运行。Composer
    易于使用，不仅面向开发者，也面向业务人员。


    Hyperledger Composer 由三个组件组成（见图 8-11）。


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig11_HTML.jpg](img/475651_1_En_8_Fig11_HTML.jpg)


    图 8-11 Hyperledger Composer 图形化说明。图片来源：developer.ibm.com。


    - **业务网络存档 (.bna)**：由打包在一起的四个文件组成。

    - **Hyperledger Composer Playground**：用于配置和部署网络，以及在不部署区块链的情况下测试代码。

    - **REST API 支持**：暴露出可供前端客户端（如去中心化应用）使用的功能。


    # 使用 Playground 实现“Hello, World”


    你将创建一个“Hello, World”应用程序，并使用 Playground 将其部署到网络上。首先，通过命令行打开 Playground 并执行以下命令：


    ```

    > composer-playground

    ```


    或者，你也可以使用 Docker。打开后，点击“Let''s Blockchain!”关闭欢迎界面。


    ## 部署业务网络


    接下来，选择“Deploy a new business network”（部署新业务网络）。在部署向导中，输入基本信息，例如在“Give your new
    Business Network a name”（为新业务网络命名）输入框中输入 `hello-network`。


    选择中间的 `empty-business-network` 网络定义，然后点击“Deploy”（部署），如图 8-12 所示。


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig12_HTML.jpg](img/475651_1_En_8_Fig12_HTML.jpg)


    图 8-12 Hyperledger Composer Playground 部署新业务网络向导


    系统会为你的网络创建一个管理员身份卡。要连接到网络，请点击“Connect now”（立即连接）链接，如图 8-13 所示。


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig13_HTML.jpg](img/475651_1_En_8_Fig13_HTML.jpg)


    图 8-13 连接到 `hello-network` 业务网络定义


    现在你已连接到该业务网络定义网络，你可以定义模型并对其进行操作。


    ## 业务网络存档 (.bna)


    业务网络模型包括资产以及这些资产相关的交易。Hyperledger Composer 需要将以下内容打包在一起：一个网络模型文件、一个 JavaScript
    文件（`.js`）、一个访问控制文件（`.acl`）和一个查询文件（`.qry`）。这些定义文件用于生成你的网络。


    - **网络模型 (.cto)**：该文件定义了资产、交易以及可以与这些资产交互的参与者。该文件使用名为 CTO（源自原始项目名 Concerto）的建模语言创建。

    - **JavaScript 文件 (.js)**：该文件定义了交易处理器函数，即链码。

    - **访问控制 (ACL) (.acl)**：该文件包含定义不同参与者权限的访问控制规则。

    - **查询 (.qry)**：该文件定义了可在网络中运行的查询。


    Hyperledger Composer 接收这四个文件，并创建一个打包为存档（`.bna`）文件的业务网络定义。这些 `.bna` 文件可以部署在 Hyperledger
    Fabric 网络上。


    然后，你可以编写一个客户端应用程序（例如去中心化应用），该应用程序可以使用 Hyperledger Composer API 来访问你通过 Hyperledger
    Fabric 网络编写的智能合约（`.bna` 功能）。


    ## 添加模型文件


    要创建模型文件，你可以添加组成 `.bna` 存档的文件。例如，要添加一个模型文件，请点击“Add a file”（添加文件），选择“Model File
    (.cto)”（模型文件），然后点击“Add”（添加），如图 8-14 所示。


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig14_HTML.jpg](img/475651_1_En_8_Fig14_HTML.jpg)


    图 8-14 向业务网络模型添加文件


    对于 `.cto` 文件，你将定义处理函数和交易。


    对于命名空间，你将使用一个名为 Skynet 的虚构公司，并使用类型为 `String` 的标识符 ID。你还将创建一个 `msg` 字符串和一个交易 `Hello`，并传递包含消息的
    `Myfunction` 资产。


    ```

    namespace org.skynet.mymodel

    asset Myfunction identified by id {

    o String id

    o String msg

    }

    transaction Hello {

    --> Myfunction check

    }

    ```


    ## 添加链码


    接下来，通过点击“Add a file”（添加文件）来添加一个 JS 文件。编写链码作为打印消息到控制台的交易逻辑，如下所示：


    ```

    /**

    @param {org.skynet.mymodel.Hello} hello

    @transaction

    */

    function hello(hello) {

    console.log("Hello " + hello.check.msg);

    }

    ```


    交易代表链码，即应用程序的业务逻辑。请注意，注释表明该代码是一个交易函数及其命名空间。点击“Deploy changes”（部署更改）以更新你的定义模型。


    ## 创建资产


    接下来，为了测试模型，你将创建一个新资产，进行扩展并存储它。为此，请点击右上角的 `+ Create New Asset`（创建新资产）。创建新资产向导将打开，如图
    8-15 所示。模型已经包含一个 ID；但在此示例中，你将把它改为 `001`（但该字符串可以是任意字符串）。对于消息，你将传递 `world`。


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig15_HTML.jpg](img/475651_1_En_8_Fig15_HTML.jpg)


    图 8-15 创建新资产向导


    ## 访问控制


    请注意，在“定义”(Define)选项卡的左下方，有一个访问控制选项，其中包含 `permissions.acl` 文件，如图 8-16 所示。


    如你所见，这些规则授予了非常开放的“允许所有”访问权限，这些权限是可以更改的。


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig16_HTML.png](img/475651_1_En_8_Fig16_HTML.png)


    图 8-16 你的 `hello-network` 上的 ACL 权限文件

