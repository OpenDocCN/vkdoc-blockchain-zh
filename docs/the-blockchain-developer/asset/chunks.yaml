- fmt: '### Potential Problems During Installation


    NEO feels like chasing a moving target at times. In fact, it’s likely that by
    the time you are utilizing the instructions in this book, the code won’t work
    as expected because of changes in NEO. Moreover, during installation, there are
    some potential problems that you can encounter. I suggest you check the latest
    information here:


    [`https://github.com/CityOfZion/neo-python#getting-started`](https://github.com/CityOfZion/neo-python%2523getting-started)


    #### Clean Database


    If you need to clean the `neo-python` database to bootstrap and sync again, run
    the following command:


    ```

    > rm -rf ~/.neopython/Chains/privnet*

    ```


    #### b’Corruption Message


    If you are getting a “b’Corruption: corrupted compressed block contents” message,
    you need to re-install LevelDB.


    ```

    > brew reinstall leveldb

    ```


    #### Restart Docker


    It’s good to know how to restart Docker in case you need to restart your computer,
    upgrade the Docker version, or upgrade the container files. To restart Docker,
    select Docker from the top menu and click Restart (see Figure [7-11](#475651_1_En_7_Chapter.xhtml#Fig11)).


    The state is deleted (the whole “old” blockchain will be gone), and you should
    also remove `Chains/privnet` from `neo-python` and any privnet wallets you created.


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig11_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig11_HTML.jpg)


    Figure 7-11


    Docker top menu icon restart button


    ```

    > rm ~/Desktop/neo-privatenet-docker/*.wallet

    > rm ~/Desktop/neo-privatenet-docker/*.wif

    > rm -rf ~/.neopython/Chains/privnet*

    > docker ps

    ```


    ### NEO “Hello, World”


    You have your local private testnet environment and NEO tools set up on your machine,
    so now you are ready for the development of your NeoContract project. You can
    develop in different languages, and the process is similar. I will show you the
    code in C# as well as Python. I have kept the code to a simple working “Hello,
    World” example, but once you are able to get to this point, you can experiment
    with the different features NEO has to offer. Follow these steps to create and
    publish your code:


    1.  *Building the NeoContract framework*: Generate a `Neo.SmartContract.Framework.dll`
    file.


    2.  *Create a NEO “Hello, World” Project*: Create your #C contract project.


    3.  *Code a NEO “Hello, World” smart contract in C#*: Code your minimalistic example
    in C#.


    4.  *Code a NEO “Hello, World” smart contract in Python*: Code your minimalistic
    example in Python.


    5.  *Publish*: Publish your contract to your private testnet chain.


    ### Building the NeoContract Framework: Neo.SmartContract.Framework.dll


    The first step is to create a file that holds the NeoContract framework code that
    you need to include in your NeoContract in order to access the NEO features.


    To build your NeoContract, you will be downloading and installing the NEO Development
    Pack. You will place these tools on your desktop for easy access. Note that you
    can always move the files to a better location later. Navigate to the desktop
    and clone the `neo-devpack-dotnet` project.


    ```

    > cd ~/Desktop

    > git clone https://github.com/neo-project/neo-devpack-dotnet

    ```


    Next, run the `neo-devpack-dotnet.sln` file by double-clicking it or run the Terminal
    `open` command.


    ```

    > open neo-devpack-dotnet.sln

    ```


    VS opens, and you should expect to get three error messages. Click OK to dismiss
    these messages, as these errors will not affect building your project.


    In the left window, you can see the Solution tab, as shown in Figure [7-12](#475651_1_En_7_Chapter.xhtml#Fig12).
    Expand `neo-devpack-dotnet (master)` if it’s not expanded.


    Next, right-click `Neo.Smartcontract.Framework` and choose Build `Neo.Smartcontract.Framework`.
    See Figure [7-12](#475651_1_En_7_Chapter.xhtml#Fig12).


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig12_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig12_HTML.jpg)


    Figure 7-12


    Building the `Neo.SmartContract.Framework` project


    Once the build is completed, you will get a “Build successful” message in the
    VS output’s top middle window. You can also find the `Neo.Smartcontract.Framework.dll`
    file here:


    ```

    > cat ~/Desktop/neo-devpack-dotnet/Neo.SmartContract.Framework/bin/Debug/netstandard1.6/Neo.SmartContract.Framework.dll

    ```


    The `.dll` file is a .NET Intermediate Language (IL) language file that you will
    include in your library to have access to the NeoContract framework code. `Neo.SmartContract.Framework`
    does not support the full set of C# features because of the differences between
    the NeoVM and the C# IL file.


    ### Create a NEO “Hello, World” Project


    Now that the `Neo.Smartcontract.Framework.dll` file is ready to be used, you can
    create your project and include the NEO framework as a dependency.


    To get started, open Visual Studio. Select **File** ➤ **New Solution...** ➤ **New
    Project** wizard opens up. In the left menu, select **Library** ➤ **.NET Standard
    Library**. Next, select **.NET Standard 2.0** for the .NET Core version and then
    click **Next**. See Figure [7-13](#475651_1_En_7_Chapter.xhtml#Fig13).


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig13_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig13_HTML.jpg)


    Figure 7-13


    New Project template wizard


    The configure wizard opens with a new project window. Call the project `hello_contract`,
    leave the default settings and click the **Create** button. See Figure [7-14](#475651_1_En_7_Chapter.xhtml#Fig14).


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig14_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig14_HTML.jpg)


    Figure 7-14


    VS create new project wizard


    Once the project is created, you need to attach the file `Neo.Smartcontract.Framework.dll`
    as a dependency. To do that, right-click the **Dependencies** folder in the Solution
    menu and then click **Edit References**. See Figure [7-15](#475651_1_En_7_Chapter.xhtml#Fig15).


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig15_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig15_HTML.jpg)


    Figure 7-15


    “Hello, World” project dependencies edit reference


    In the **Edit References** window, go to the **.NET assembly** tab. Choose **Browse**
    and add the `Neo.Smartcontract.Framework.dll` file located here:


    ```

    ~/Desktop/neo-devpack-dotnet/Neo.SmartContract.Framework/bin/Debug/netstandard1.6/Neo.SmartContract.Framework.dll

    ```


    Next, click **Open**, as shown in Figure [7-16](#475651_1_En_7_Chapter.xhtml#Fig16).
    Select the `Neo.SmartContract.Framework.dll` checkbox and click **Ok**.


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig16_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig16_HTML.jpg)


    Figure 7-16


    VC edit references .NET assembly'
  raw: '### Potential Problems During Installation


    NEO feels like chasing a moving target at times. In fact, it’s likely that by
    the time you are utilizing the instructions in this book, the code won’t work
    as expected because of changes in NEO. Moreover, during installation, there are
    some potential problems that you can encounter. I suggest you check the latest
    information here:


    [`https://github.com/CityOfZion/neo-python#getting-started`](https://github.com/CityOfZion/neo-python%2523getting-started)


    #### Clean Database


    If you need to clean the `neo-python` database to bootstrap and sync again, run
    the following command:


    ```

    > rm -rf ~/.neopython/Chains/privnet*

    ```


    #### b’Corruption Message


    If you are getting a “b’Corruption: corrupted compressed block contents” message,
    you need to re-install LevelDB.


    ```

    > brew reinstall leveldb

    ```


    #### Restart Docker


    It’s good to know how to restart Docker in case you need to restart your computer,
    upgrade the Docker version, or upgrade the container files. To restart Docker,
    select Docker from the top menu and click Restart (see Figure [7-11](#475651_1_En_7_Chapter.xhtml#Fig11)).


    The state is deleted (the whole “old” blockchain will be gone), and you should
    also remove `Chains/privnet` from `neo-python` and any privnet wallets you created.


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig11_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig11_HTML.jpg)


    Figure 7-11


    Docker top menu icon restart button


    ```

    > rm ~/Desktop/neo-privatenet-docker/*.wallet

    > rm ~/Desktop/neo-privatenet-docker/*.wif

    > rm -rf ~/.neopython/Chains/privnet*

    > docker ps

    ```


    ### NEO “Hello, World”


    You have your local private testnet environment and NEO tools set up on your machine,
    so now you are ready for the development of your NeoContract project. You can
    develop in different languages, and the process is similar. I will show you the
    code in C# as well as Python. I have kept the code to a simple working “Hello,
    World” example, but once you are able to get to this point, you can experiment
    with the different features NEO has to offer. Follow these steps to create and
    publish your code:


    1.  *Building the NeoContract framework*: Generate a `Neo.SmartContract.Framework.dll`
    file.


    2.  *Create a NEO “Hello, World” Project*: Create your #C contract project.


    3.  *Code a NEO “Hello, World” smart contract in C#*: Code your minimalistic example
    in C#.


    4.  *Code a NEO “Hello, World” smart contract in Python*: Code your minimalistic
    example in Python.


    5.  *Publish*: Publish your contract to your private testnet chain.


    ### Building the NeoContract Framework: Neo.SmartContract.Framework.dll


    The first step is to create a file that holds the NeoContract framework code that
    you need to include in your NeoContract in order to access the NEO features.


    To build your NeoContract, you will be downloading and installing the NEO Development
    Pack. You will place these tools on your desktop for easy access. Note that you
    can always move the files to a better location later. Navigate to the desktop
    and clone the `neo-devpack-dotnet` project.


    ```

    > cd ~/Desktop

    > git clone https://github.com/neo-project/neo-devpack-dotnet

    ```


    Next, run the `neo-devpack-dotnet.sln` file by double-clicking it or run the Terminal
    `open` command.


    ```

    > open neo-devpack-dotnet.sln

    ```


    VS opens, and you should expect to get three error messages. Click OK to dismiss
    these messages, as these errors will not affect building your project.


    In the left window, you can see the Solution tab, as shown in Figure [7-12](#475651_1_En_7_Chapter.xhtml#Fig12).
    Expand “neo-devpack-dotnet (master)” if it’s not expanded.


    Next, right-click Neo.Smartcontract.Framework and choose Build Neo.Smartcontract.Framework.
    See Figure [7-12](#475651_1_En_7_Chapter.xhtml#Fig12).


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig12_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig12_HTML.jpg)


    Figure 7-12


    Building the Neo.SmartContract.Framework project


    Once the build is completed, you will get a “Build successful” message in the
    VS output’s top middle window. You can also find the `Neo.Smartcontract.Framework.dll`
    file here:


    ```

    > cat ~/Desktop/neo-devpack-dotnet/Neo.SmartContract.Framework/bin/Debug/netstandard1.6/Neo.SmartContract.Framework.dll

    ```


    The `.dll` file is a .NET Intermediate Language (IL) language file that you will
    include in your library to have access to the NeoContract framework code. `Neo.SmartContract.Framework`
    does not support the full set of C# features because of the differences between
    the NeoVM and the C# IL file.


    ### Create a NEO “Hello, World” Project


    Now that the `Neo.Smartcontract.Framework.dll` file is ready to be used, you can
    create your project and include the NEO framework as a dependency.


    To get started, open Visual Studio. Select File ➤ New Solution... ➤ New Project
    wizard opens up. In the left menu, select Library ➤ .NET Standard Library. Next,
    select .NET Standard 2.0 for the .NET Core version and then click Next. See Figure
    [7-13](#475651_1_En_7_Chapter.xhtml#Fig13).


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig13_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig13_HTML.jpg)


    Figure 7-13


    New Project template wizard


    The configure wizard opens with a new project window. Call the project **hello_contract**,
    leave the default settings and click the Create button. See Figure [7-14](#475651_1_En_7_Chapter.xhtml#Fig14).


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig14_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig14_HTML.jpg)


    Figure 7-14


    VS create new project wizard


    Once the project is created, you need to attach the file `Neo.Smartcontract.Framework.dll`
    as a dependency. To do that, right-click the Dependencies folder in the Solution
    menu and then click Edit References. See Figure [7-15](#475651_1_En_7_Chapter.xhtml#Fig15).


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig15_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig15_HTML.jpg)


    Figure 7-15


    “Hello, World” project dependencies edit reference


    In the Edit References window, go to the .NET assembly tab. Choose Browse and
    add the `Neo.Smartcontract.Framework.dll` file located here:


    ```

    ~/Desktop/neo-devpack-dotnet/Neo.SmartContract.Framework/bin/Debug/netstandard1.6/Neo.SmartContract.Framework.dll

    ```


    Next, click Open, as shown in Figure [7-16](#475651_1_En_7_Chapter.xhtml#Fig16).
    Select the Neo.SmartContract.Framework.dll checkbox and click Ok.


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig16_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig16_HTML.jpg)


    Figure 7-16


    VC edit references .NET assembly'
