  trans: "\n## 摘要\n\n在本章中，我介绍了 NEO 区块链和 NEO 合约。你了解了 NEO 的高级区块链架构，并学习了 NEO 的智能经济。你配置了本地环境，升级了\
    \ Xcode，安装了 Visual Studio 2017 IDE 和 .NET Core。\n\n你安装了 Docker，因此现在可以创建容器；你下载了\
    \ neo-compiler 并生成了 `neon.dll`。最后，你构建了 `neo-cli`，以便管理钱包并执行其他 RPC 操作。\n\n接着，你通过安装\
    \ `neo-python` 和 `neo-privatenet-docker` 创建了一个本地 NEO 私有测试网。你引导了该测试网，启动了 NEO bash，然后能够启动你的网络并领取\
    \ NEO 和 GAS。\n\n此外，我还介绍了安装 NEO 工具过程中可能遇到的问题。\n\n然后，你创建了两个“Hello, World”项目，一个用\
    \ C# 编写，另一个用 Python 编写，并成功将这些项目编译成了 NEO 虚拟机的字节码（AVM）文件。你学习了如何将这些文件发布到 NEO 测试网区块链以及\
    \ NEO 主网上。\n\n最后，我对以太坊、EOS 和 NEO 进行了比较，以帮助你更好地理解这些平台之间的差异，以及在选择智能合约平台时应参考的标准。\n\
    \n# 8. Hyperledger\n\n在前面的章节中，我介绍了专注于加密货币的区块链技术。事实上，到目前为止介绍的每个项目都包含其自身的货币。Hyperledger\
    \ 则不同；它不附带任何货币，尽管你可以在需要时创建一种代币。相反，Hyperledger 的创建目标是成为一个开源平台，旨在利用区块链来满足商业需求。\n\
    \nHyperledger 始于 2015 年，是 Digital Asset 和 IBM 在一场黑客马拉松中贡献的开源区块链（现在该区块链被称为 Hyperledger\
    \ Fabric），随后扩展为由多个可插拔模块组成，整个项目称为 Hyperledger，旨在提高区块链的性能和可靠性，以便你可以组装模块来创建适合你业务需求的独特平台。\n\
    \n### 注意\n\nHyperledger 项目采用伞式战略模块化架构，由一组用于为企业创建定制区块链解决方案的可插拔组件组成。该架构旨在提供可扩展性、性能、机密性、弹性和灵活性。请注意，如果你查阅\
    \ Hyperledger 的文档，经常会看到“分布式账本技术”（DLT）这个术语；它与“区块链”是同义词。\n\n## Hyperledger 概述\n\n\
    模块化架构允许你调整诸如区块链的共识机制之类的内容，以及管理存储、设置身份服务、为你设置的身份设置权限，并创建智能合约（在 Hyperledger Fabric\
    \ 中，智能合约被称为*链码*）。在编程语言方面，Hyperledger 的链码使用 Go（Golang）编写；但是，你可以利用 Hyperledger Composer\
    \ 工具使用 JavaScript。然后，链码可用于实现和自动化业务逻辑。\n\nHyperledger 项目的管理团队由十名成员组成，在撰写本文时，执行董事是\
    \ Brian Behlendorf。此外，根据 `developer.ibm.com` 的数据，来自 27 个组织的 159 名工程师为 Hyperledger\
    \ Fabric v1.0 做出了贡献。\n\n> “*Hyperledger* 是一个开源开发项目，旨在惠及基于 Hyperledger 的解决方案提供商和用户生态系统。它专注于能够在各种工业领域应用的区块链相关用例。”\n\
    > \n> — Brian Behlendorf（Hyperledger 执行董事）\n\nHyperledger 由 Linux 基金会托管。在应用方面，它得到了\
    \ IBM、Intel、SAP 等大型企业公司的支持，并且被 Oracle、Accenture、The National Association of Realtors、Deutsche\
    \ Borse Group、Sony Global Education 等众多机构所采用。\n\nHyperledger 的共识机制允许节点网络在“无操作”（无共识）机制和一种称为实用拜占庭容错（PBFT）的协议之间进行选择。PBFT\
    \ 共识通过赋予节点完全控制权来使两个或多个节点达成一致。这阻止了网络上的其他节点强制生成区块，从而防止了潜在的双花攻击，就像你在 PoW 中看到的 51%\
    \ 的潜在挖矿攻击那样。Hyperledger 让你掌控共识机制，并且可以限制对交易的访问。这带来了更高的性能和可扩展性，因为需要就区块达成一致的节点更少。此外，PBFT\
    \ 为网络提供了隐私性，这比你在其他区块链中看到的完全透明性更适合商业应用。\n\n为了让你了解 Hyperledger 的灵活性，你可以使用动态共识并启用所谓的*热插拔*功能，即在网络运行时替换共识算法（使用\
    \ Hyperledger Sawtooth 实现）。\n\n专注于加密货币的区块链通常提供交易和网络数据的透明性，因为它们处理的是资金且大多涉及不受信任的成员。然而，这也限制了灵活性以及你可以对网络进行修改的程度和可控制的程度，因为你受制于一套规则。Hyperledger\
    \ 没有自身货币的支持，并提供了更精细的控制。\n\nHyperledger 项目以基本功能构建，采用原汁原味的设计，旨在让开发者能够尽可能定制一切，从区块链的共识机制到\
    \ Web 界面身份的权限，从而向成员提供有限的数据。\n\n这种模块化架构方法允许开发者创建特定、定制、个性化的区块链，以精确满足业务需求。Hyperledger\
    \ 包含以下主要的开源框架和工具。\n\n- Hyperledger 框架：\n    - *Hyperledger Fabric (IBM 贡献)*：这是一个带有\
    \ Node.js、Java 和 GoLang SDK 的许可区块链基础设施。Hyperledger Fabric 是 Hyperledger 的核心，支持使用\
    \ GoLang 和 JavaScript（利用 Hyperledger Composer 或原生方式）编写的链码。该区块链基于背书者/排序者架构。你将在本章后面部分了解更多信息。\n\
    \    - *Hyperledger Burrow*：这是一个按规范构建的以太坊虚拟机。\n    - *Hyperledger Indy*：将其视为独立体。这是一个用于在分布式账本上运行独立身份的工具和库。\n"
- fmt: "# Hyperledger\n\n## Hyperledger Frameworks\n\n- **Hyperledger Iroha**: This\
    \ is focused on mobile applications; the code is based on `Hyperledger Fabric`.\n\
    \n- **Hyperledger Grid**: This is a solution for a supply chain on a distributed\
    \ ledger. The framework encapsulates `Hyperledger` implementations of data types,\
    \ models, and smart contracts as well as showcases practical ways to create a\
    \ supply chain business solution.\n\n- **Hyperledger Sawtooth (contributed by\
    \ Intel)**: This framework includes dynamic consensus and enables hot swapping\
    \ of consensus algorithms on a running network. This is a more traditional blockchain\
    \ architecture.\n\n- **Hyperledger tools**:\n    - **Hyperledger Caliper**: This\
    \ is a blockchain benchmark tool.\n\n- **Hyperledger Cello**: This is an on-demand\
    \ blockchain module toolkit for creating, managing, and terminating blockchains.\n\
    \n- **Hyperledger Composer**: This tool has collaboration features used with `Hyperledger\
    \ Fabric` for building blockchains aimed at businesses for chaincode and blockchain\
    \ applications.\n\n- **Hyperledger Explorer**: This is a module to view, invoke,\
    \ deploy, and query blocks, transactions, and network data.\n\n- **Hyperledger\
    \ URSA**: This is a shared cryptographic library; it includes shared projects\
    \ such as the implementation of several different signature schemes (base crypto\
    \ libraries) and Z-mix, zero-knowledge proofs (`https://github.com/hyperledger-labs/z-mix`).\n\
    \n- **Hyperledger Quilt/Interledger.js**: This is an Interledger Protocol (ILP),\
    \ meaning an atomic swapping between ledgers. The payments protocol enables transferring\
    \ an asset (value) across distributed and nondistributed ledgers. There are two\
    \ implementations: the Java one is called `Quilt`, and the JavaScript one is called\
    \ `Interledger.js`.\n\nA `Hyperledger` project can be built to allows transactions\
    \ to be transparent as well as confidential when needed. For instance, think of\
    \ the following business need: an airline wants to sell seats to another business,\
    \ let’s say Expedia. The airline business need is to create its own blockchain\
    \ to keep track of its inventory, create transactions, set the price, and keep\
    \ data confidential. The airline can benefit from blockchain, but it has no need\
    \ for cryptocurrency nor does it want to share all the data publicly. The airline\
    \ can utilize `Hyperledger` and set a private permission network, without exposing\
    \ the data to the whole world, as you would on a public ledger.\n\nThe airline\
    \ can then set special permissions to identities by issuing encryption keys with\
    \ limited access and then give these encryption keys to specific parties only.\
    \ For instance, only one organization, let’s say Expedia, is able to view Expedia-related\
    \ transactions, seat pricing, and flight information, while other identities such\
    \ as the actual customer can view only the reservation’s information related to\
    \ their account and flight information.\n\nThe finance team can hold the encryption\
    \ key that can provide more data such as profits and loss, cost of fuel, and other\
    \ data needed for internal usage. This can be beneficial to businesses because\
    \ they can run their data on a ledger instead of a centralized database, which\
    \ is more prone to hacker attacks.\n\nAs you see, `Hyperledger` is a large project\
    \ that covers six frameworks as well as five tools. It is impractical to cover\
    \ all these in one chapter; in fact, it could easily take a whole book. In this\
    \ chapter, I will give you a good foundation that can help you understand `Hyperledger`\
    \ basics, and you can continue to experiment on your own with the other platforms\
    \ and tools. In this chapter, you will be focusing on `Hyperledger Fabric`, as\
    \ it’s the most popular `Hyperledger` platform.\n\n# Understanding Hyperledger\
    \ Fabric\n\nAs I pointed out, `Hyperledger Fabric` is an open source framework\
    \ implementation, and it’s intended for a private and permission-based business\
    \ network.\n\nIn this chapter, you will create private network permission identities,\
    \ and then you will create a chaincode to implement specific business logic.\n\
    \n`Hyperledger Fabric` is designed as the foundation for `Hyperledger`, and you\
    \ can then use the `Hyperledger`’s modular architecture to add specific modules\
    \ depending on your business needs. A `Hyperledger Fabric` network consists of\
    \ the following components:\n\n- **Assets**: Assets are key-value pairs that represent\
    \ a value. A value can be anything such as a document, stock, or cryptocurrency\
    \ token. Each asset holds a state and ownership.\n\n- **Shared ledger**: A shared\
    \ ledger holds its own copy of the ledger with the state of the asset. This ledger\
    \ is called the *world state*. The shared ledger also holds a copy of the blockchain,\
    \ which stores the ownership of the asset by recording the transaction’s history.\n\
    \n- **Smart contracts (chaincode)**: `Hyperledger Fabric` calls smart contracts\
    \ *chaincodes* that can be programmed in `Go` (`GoLang`) or `JavaScript` (`Node.js`).\
    \ Chaincode can interact with the shared ledger, assets, and transactions. There’s\
    \ nothing new here; you saw this in other blockchains. Chaincode contains the\
    \ business logic and can set an endorsement policy."
