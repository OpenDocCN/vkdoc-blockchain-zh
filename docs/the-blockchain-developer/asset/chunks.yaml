    ### 注意


    聪是比特币的百万分之一，以中本聪命名。它是比特币可发送的最小单位：`0.00000001 BTC`。在撰写本文时，更快的交易手续费约为 50 聪。


    现在你了解了手续费，可以将配置文件中的最低手续费修改为更高值，例如 50 聪。


    ```

    > vim ''/[location]/bitcoin/bitcoin.conf''

    mintxfee=0.00000050

    txconfirmtarget=3

    ```


    `mintxfee` 值将最低交易手续费设置为 50 聪，即 `0.00000050 ฿`。这将在你的交易中设置为每字节数据 `20 聪`。这意味着浮动手续费需要计算出合适的金额，以确保交易能在接下来的三个区块中得到确认。正如你所知，每个区块大约需要
    10 分钟进行哈希计算，因此目标是在 30 分钟内包含你的交易。


    修改配置文件后，请记得重启 `bitcoind`。


    ```

    > bitcoind –printtoconsole

    ```


    ### 测试网


    在本节中，你将进一步了解交易。为了更深入地理解交易，你需要发送和接收比特币。要在主网（实际生产链）上获取比特币，你需要通过挖矿或交易来获取。然而，在学习过程中你并不想处理真实的比特币，因为你需要支付手续费，而且如果操作失误还会有丢失比特币的风险。此外，比特币的价格也可能下跌。


    幸运的是，比特币提供了另一种用于测试的区块链，称为*测试网*。这种替代区块链使你可以在不使用真实比特币或滥用比特币主链的情况下进行实验。你可以使用 `-testnet`
    标志启动一个比特币核心实例。在测试网上，这是通过*水龙头*（一种模拟币）来完成的。你通过停止比特币核心守护进程并用 `testnet` 标志重新启动，从而连接到测试网区块链，而不是主区块链。


    ```

    > bitcoind –testnet

    ```


    请记住，与比特币的主网链一样，同步和索引过程可能需要数小时，具体取决于你的网络连接。运行这个命令，然后去喝杯咖啡休息一下，如果你想开始处理区块的话。


    BTC 测试网为你提供免费的水龙头比特币，你可以用于测试。测试网要求你在完成测试后归还这些币，因为这项服务是免费的，归还这些币将有利于下一个需要它们的开发者。


    你可以在此处阅读更多关于测试网的信息：[`https://en.bitcoin.it/wiki/Testnet`](https://en.bitcoin.it/wiki/Testnet)。在撰写本文时，testnet3
