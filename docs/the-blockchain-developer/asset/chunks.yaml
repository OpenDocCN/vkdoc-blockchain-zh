    scalability issue that other consensus mechanisms tried to improve on.


    To summarize, each miner is racing to solve the same problem; once the problem
    is solved, the process restarts. This problem is a mathematical puzzle known as
    the *proof-of-work problem*, and the reward is given to the first miner who solves
    the problem. Then the verified transactions are stored in the public ledger.


    This PoW is not without its own disadvantages; this type of algorithm can create
    all sorts of problems in today’s world. For instance, if one mining pool controls
    more than 51 percent of the total mining power, the entire blockchain security
    is at risk as you have one central collective not much different than having one
    computer. A DDOS attack against the network can put the entire trustworthiness
    of the network at risk.


    This actually happened and is not just a theory. At the time of writing, bitcoin
    gold, a forked version of bitcoin, has suffered a DDOS attack.


    A distributed denial-of-service (DDoS) attack happens when multiple systems are
    attacking a target’s system resource/bandwidth.


    On PoW, as the difficulty goes up, that means less profit. Less profit results
    in less incentive to mine coins. Ethereum cryptocurrency is facing a problem of
    reduced miners in the network, and in 2018 Ethereum had to plan a “difficulty
    bomb,” which reduced the difficulty (raising profit for miners), as well as switch
    from PoW to PoS to increase scalability.


    How is an attack is achieved? A pool that accounts for 51 percent of the network’s
    hashing power is able to create its own block and post it faster than the main
    blockchain updates. The block holds 51 percent of the network and is able to double
    spend coins by removing transactions after spending so that the coins are not
    taken from the originating wallet. This threat is real. At the time of writing,
    Bitmain, a mining company, controls more than 40 percent of the total bitcoin’s
    hash rate.


    Many view PoW as unsustainable and insufficient because of the amount of electricity
    a miner uses and the slow transaction speed compared to other algorithms. To put
    things in perspective, bitcoin’s current estimated annual electricity consumption
    is about 60 to 73 terawatt hour (TWh) per year. That’s a similar amount of electricity
    that it takes to power Switzerland in a year; imagine multiple coins becoming
    as popular as bitcoin utilizing PoW.


    Read more about PoW in the bitcoin white paper at [`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf)
    written by Satoshi Nakamoto.'
  trans: '

    ### 注意事项


    以太坊开发社区正致力于从`PoW`转向`PoS`或`ProgPoW`（降低 ASIC 哈希率优势的机制）。


    `PoW`根据计算机算力（`hash rate`）来决定由哪个节点执行工作量，并按比例分配任务，以确保公平。`PoW`并不单独信任网络中的任何节点，而是将整个网络视为一个整体来信任。这并不意味着矿工之间相互竞争。一个矿工网络（称为`矿池`）可以与另一个矿工网络竞争任务。矿池的算力越高，获得“工作量”的机会就越大。


    如前所述，加密货币是去中心化的，不需要单一受信任的计算机来管理账本。`PoW`就是确保数据完整性、阻止恶意攻击的机制。


    工作量证明（`PoW`）是矿工需要求解的数学难题。矿工需要找到一个复杂数学问题的解，才能成为领导者并创建下一个可添加到区块链的最佳区块。网络中的矿工越多，需要解决的数学难度就越复杂。以比特币为例，每十分钟仅能添加一个区块，只有一个获胜者，因此竞争非常激烈。解题会迫使计算机芯片高速运转，消耗电力并产生热量。你可以想象一下，电脑正在运行一个包含大量媒体的高负荷视频游戏，或者正在处理一个视频的后期制作。


    你也可以使用这个在线资源，它会连接到一个比特币节点，并进行各种计算来预测下一个难度：[`https://bitcoinwisdom.com/bitcoin/difficulty`](https://bitcoinwisdom.com/bitcoin/difficulty)。这些信息对于计算挖矿盈利能力很有用。撰写本文时，比特币的难度为
    5 万亿，预计下一个难度将增加+3.74%，总算力为 43 万亿`GH/s`。同时还显示，生成一个区块需要 9.9 分钟，并可产生约 25 个比特币。快速计算一下：如果每
    10 分钟生成一个区块，每年产生的数据量约为 4.2`MB`（每个区块 80 字节 × 6 个区块/小时 × 24 小时 × 365 天 = 每年 4.2`MB`数据）。


    每十分钟生成一个区块是一个限制因素，每个区块能容纳的交易数量也是有限的。这就造成了可扩展性问题，其他共识机制试图对此进行改进。


    总而言之，每个矿工都在竞相解决同一个问题；一旦问题被解决，过程就会重新开始。这个问题是一个被称为`工作量证明问题`的数学难题，奖励将给予最先解决问题的矿工。随后，经过验证的交易将存储在公共账本中。


    `PoW`并非没有缺点；这类算法在当今世界可能会引发各种问题。例如，如果某个矿池控制了总算力的 51%以上，整个区块链的安全性就会面临风险，因为形成了一个中心化的集体，这与单一计算机控制的情况并无太大区别。针对网络的`DDOS`攻击可能会危及整个网络的可信度。


    这种情况实际上已经发生过，而不仅仅是理论。在撰写本文时，比特币的分叉版本比特币黄金就遭受了`DDOS`攻击。分布式拒绝服务（`DDoS`）攻击是指多个系统攻击某个目标系统的资源或带宽。


    在`PoW`中，随着难度增加，意味着利润减少。利润减少会导致挖矿动力下降。以太坊加密货币正面临网络矿工减少的问题，2018 年以太坊不得不计划一次“难度炸弹”，降低难度（提高矿工利润），并从`PoW`转向`PoS`以提高可扩展性。


    攻击是如何实现的？一个控制了网络 51%算力的矿池，能够创建自己的区块，并以比主区块链更快的速度发布。该区块占据网络 51%的算力，并且可以通过在花费代币后删除交易来实现双重支付，从而使原始钱包中的代币不会被扣除。这个威胁是真实存在的。撰写本文时，矿池公司比特大陆控制了比特币总算力的
    40%以上。


    许多人认为`PoW`是不可持续且效率低下的，因为矿工消耗的电量巨大，且与其他算法相比交易速度较慢。客观来说，比特币目前估计的年耗电量约为每年 60 至 73
    太瓦时（`TWh`）。这相当于瑞士一年的用电量；想象一下，如果有多种加密货币像比特币一样流行并采用`PoW`会是什么情况。


    更多关于`PoW`的信息，请阅读中本聪撰写的比特币白皮书：[`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf)。

