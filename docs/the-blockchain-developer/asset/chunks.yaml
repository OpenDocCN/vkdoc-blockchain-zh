- fmt: '# Summary


    In this chapter, I covered how to utilize `Ganache` to simulate a full-node Ethereum
    client. You installed `Ganache`, and once you were able to connect to the `Ganache
    CLI`, you were able to create a network and listen to a port. You learned how
    to use the `IntelliJ IDEA` plugin for `Solidity` to easily develop smart contracts
    with autocomplete and highlights. You also learned about the `Truffle Suite` and
    how to create your own smart contracts using the command-line wizard. You connected
    `Truffle` to the `Ganache` network and then created a “Hello, World” smart contract
    as well as “`MD5SmartContract`” smart contract.


    Once you created your contracts, you were able to migrate your smart contract
    utilizing the `Truffle` deployment process. You compiled and deployed your smart
    contract code with `Truffle` to your development network. Then, you used the `Truffle`
    console to interact with your smart contract via the `Truffle CLI`. Next, you
    created a private Ethereum blockchain with `Geth` and initialized the blockchain.
    You utilized the `Geth` console and mined pretend Ethereum on your `Geth` private
    testnet.


    Next, you deployed your Remix `web3.js` to the `Geth` private testnet you created,
    as well as deployed your `Truffle` contracts. In addition, you looked at some
    useful `Geth` commands that will help you while developing smart contracts. You
    connected your `Mist` Ethereum wallet to the private `Geth` network you created
    and were able to interact with your smart contract. You were able to use `MetaMask`
    in your browser as a replacement for a desktop client.


    Once you were able to see your contract working, you set a public testnet and
    synced blocks as well as got coins via a faucet. Lastly, you learned how to migrate
    your code to the Ethereum mainnet.


    In next chapters, you will learn how to build front-end code for smart contracts
    and publish a complete dapp.


    # 6. EOS.IO Wallets and Smart Contracts


    In Chapter [2](#475651_1_En_2_Chapter.xhtml), I introduced `EOS.IO` when I covered
    bitcoin, altcoins, and different consensus mechanisms. Specifically, I covered
    how `EOS.IO` is an example of altcoins that turn into tokens; you created an EOS
    block producer and were able to create a full node capable of mining EOS tokens.
    Ethereum was the beginning of your blockchain smart contract development, and
    you learned to use the `Solidity` language to write smart contracts and dapps.
    `EOS.IO` has created a more robust architecture than Ethereum for smart contract
    and dapp development.


    In this chapter, I will expand on the `EOS.IO` blockchain and show how to build
    a `EOS.IO` smart contract that can be used in decentralized applications (dapps).
    You will set up a local testnet environment and learn how to configure the `EOS.IO`
    tools and libraries. You will learn about `EOS.IO` wallets and how to create,
    delete, and back up wallets as well as perform operations such as opening, locking,
    and unlocking a wallet. I will cover the wallet’s key pairs and how to spin up
    and re-spin up a local testnet block producer. You will learn about permissions
    and single-signature and multisignature options.


    To better understand `EOS.IO` smart contracts, you will create a “`HelloWorld`”
    smart contract and smart contract token. You will create accounts, write smart
    contract C++ code, compile code, and generate `WebAssembly` and `ABI` files as
    well as Ricardian contracts. You then will learn how to deploy your smart contracts
    and interact with them, as well as issue tokens and transfer tokens to another
    user.


    Lastly, you will connect to a public testnet block producer for testing in a more
    realistic environment as well as connecting and publishing on a mainnet block
    producer.


    ### Note


    `EOS` is the native cryptocurrency (token) that powers the `EOS.IO` software.
    `EOS.IO` is an industrial-scale, fully customized blockchain architecture protocol
    that enables decentralized applications by providing access to the parts that
    make up the blockchain. Think of `EOS.IO` as a blockchain OS as it emulates a
    real computer and enables access to resources such as the CPU, GPU, RAM, and hard
    disk. `EOS.IS` does not charge transaction fees while performing millions of transactions
    per second. An `EOS` token is a utility token, and owning the token (staking)
    provides bandwidth and storage on the `EOS.IO` blockchain. You receive resources
    in proportion to the total stake you own to the total stake (owning 1 percent
    of `EOS` tokens gives usage up to 1 percent of total `EOS.IO` bandwidth).


    > “* `EOS.IO` software introduces a new blockchain architecture designed to enable
    vertical and horizontal scaling of decentralized applications. This is achieved
    by creating an operating system-like construct upon which applications can be
    built. The software provides accounts, authentication, databases, asynchronous
    communication, and the scheduling of applications across many of CPU cores or
    clusters. The resulting technology is a blockchain architecture that may ultimately
    scale to millions of transactions per second, eliminates user fees, and allows
    for quick and easy deployment and maintenance of decentralized applications, in
    the context of a governed blockchain.”

    > —`EOS.IO` block.one white paper


    As mentioned in Chapter [2](#475651_1_En_2_Chapter.xhtml), `EOS.IO` is built on
    the delegated proof of stake (DPoS) consensus. `EOS.IO` is able to handle low
    latency and tens of millions of active users daily (bypassing Ethereum). This
    is achieved by the DPoS consensus as well as `EOS.IO` running as multithreaded
    (running on multiple computer cores) and acting as an OS.


    This type of scalability can enable adoption of blockchain technology by large
    businesses. `EOS.IO` offers many additional features such as the following:


    * Free rate-limited transactions


    * Low-latency transactions (such as 0.25 seconds broadcast time or 0.5 block time)


    * Recovery of stolen keys


    * Parallel execution of applications


    * Atomic transactions with multiple accounts


    I encourage you to read the `EOS.IO` white paper and visit the GitHub page for
    a full list of features.


    * [`https://github.com/EOSIO/eos`](https://github.com/EOSIO/eos)


    * [`https://github.com/EOSIO/Documentation/blob/master/TechnicalWhitePaper.md`](https://github.com/EOSIO/Documentation/blob/master/TechnicalWhitePaper.md)


    Financially speaking, `EOS` was developed by a private company called `block.one`
    and was able to raise an astonishing $4 billion in initial coin offering (ICO)
    via an `ERC-20` tokens sale. At the time of writing, `EOS`’s price is selling
    around $2 to $8, and it has a total market capitalization of around $2 billion,
    which makes `EOS` the seventh largest cryptocurrency by market cap.


    `EOS` offers a few repositories to help with the development of `EOS.IO` contracts;
    they are listed at [`https://github.com/EOSIO`](https://github.com/EOSIO) and
    include the following: `eos`, `eosio.cdt`, `eosjs`, `demux-js`, and `eosio.contracts`.
    You will be installing the `EOS` and `EOSIO.CDT` libraries in this chapter. The
    `EOS` library is an open source smart contract platform, and the `EOSIO.CDT` library
    is a suite of tools for building `EOS.IO` contracts.


    At the time of writing, the `EOS.IO` platform has a steep learning curve. The
    code keeps changing, and the documentation and examples of `EOS.IO` are not being
    updated in timely manner, so it may feel like chasing a moving target at times.
    This results in code sometimes not compiling, commands not working, and documentation
    and examples containing code and commands that have been deprecated. It’s easy
    to find yourself stumped a few times while developing a contract; however, once
    you understand `EOS.IO`, it’s easy to overcome these obstacles.'
  raw: "## Summary\n\nIn this chapter, I covered how to utilize Ganache to simulate\
    \ a full-node Ethereum client. You installed Ganache, and once you were able to\
    \ connect to the Ganache CLI, you were able to create a network and listen to\
    \ a port. You learned how to use the IntelliJ IDEA plugin for Solidity to easily\
    \ develop smart contracts with autocomplete and highlights. You also learned about\
    \ the Truffle Suite and how to create your own smart contracts using the command-line\
    \ wizard. You connected Truffle to the Ganache network and then created a “Hello,\
    \ World” smart contract as well as “MD5SmartContract” smart contract.\n\nOnce\
    \ you created your contracts, you were able to migrate your smart contract utilizing\
    \ the Truffle deployment process. You compiled and deployed your smart contract\
    \ code with Truffle to your development network. Then, you used the Truffle console\
    \ to interact with your smart contract via the Truffle CLI. Next, you created\
    \ a private Ethereum blockchain with Geth and initialized the blockchain. You\
    \ utilize the Geth console and mined pretend Ethereum on your Geth private testnet.\n\
    \nNext, you deployed your Remix `web3.js` to the Geth private testnet you created,\
    \ as well as deployed your Truffle contracts. In addition, you looked at some\
    \ useful Geth commands that will help you while developing smart contracts. You\
    \ connected your Mist Ethereum wallet to the private Geth network you created\
    \ and were able to interact with your smart contract. You were able to use MetaMask\
    \ in your browser as a replacement for a desktop client.\n\nOnce you were able\
    \ to see your contract working, you set a public testnet and synced blocks as\
    \ well as got coins via a faucet. Lastly, you learned how to migrate your code\
    \ to the Ethereum mainnet.\n\nIn next chapters, you will learn how to build front-end\
    \ code for smart contracts and publish a complete dapp.\n\n# 6. EOS.IO Wallets\
    \ and Smart Contracts\n\nIn Chapter [2](#475651_1_En_2_Chapter.xhtml), I introduced\
    \ EOS.IO when I covered bitcoin, altcoins, and different consensus mechanisms.\
    \ Specifically, I covered how EOS.IO is an example of altcoins that turn into\
    \ tokens; you created an EOS block producer and were able to create a full node\
    \ capable of mining EOS tokens. Ethereum was the beginning of your blockchain\
    \ smart contract development, and you learned to use the Solidity language to\
    \ write smart contracts and dapps. EOS.IO has created a more robust architecture\
    \ than Ethereum for smart contract and dapp development.\n\nIn this chapter, I\
    \ will expand on the EOS.IO blockchain and show how to build a EOS.IO smart contract\
    \ that can be used in decentralized applications (dapps). You will set up a local\
    \ testnet environment and learn how to configure the EOS.IO tools and libraries.\
    \ You will learn about EOS.IO wallets and how to create, delete, and back up wallets\
    \ as well as perform operations such as opening, locking, and unlocking a wallet.\
    \ I will cover the wallet’s key pairs and how to spin up and re-spin up a local\
    \ testnet block producer. You will learn about permissions and single-signature\
    \ and multisignature options.\n\nTo better understand EOS.IO smart contracts,\
    \ you will create a “HelloWorld” smart contract and smart contract token. You\
    \ will create accounts, write smart contract C++ code, compile code, and generate\
    \ WebAssembly and ABI files as well as Ricardian contracts. You then will learn\
    \ how to deploy your smart contracts and interact with them, as well as issue\
    \ tokens and transfer tokens to another user.\n\nLastly, you will connect to a\
    \ public testnet block producer for testing in a more realistic environment as\
    \ well as connecting and publishing on a mainnet block producer.\n\n### Note\n\
    \nEOS is the native cryptocurrency (token) that powers the EOS.IO software. EOS.IO\
    \ is an industrial-scale, fully customized blockchain architecture protocol that\
    \ enables decentralized applications by providing access to the parts that make\
    \ up the blockchain. Think of EOS.IO as a blockchain OS as it emulates a real\
    \ computer and enables access to resources such as the CPU, GPU, RAM, and hard\
    \ disk. EOS.IS does not charge transaction fees while performing millions of transactions\
    \ per second. An EOS token is a utility token, and owning the token (staking)\
    \ provides bandwidth and storage on the EOS.IO blockchain. You receive resources\
    \ in proportion to the total stake you own to the total stake (owning 1 percent\
    \ of EOS tokens gives usage up to 1 percent of total EOS.IO bandwidth).\n\n> *“*\
    \ *EOS.IO* *software introduces a new blockchain architecture designed to enable\
    \ vertical and horizontal scaling of decentralized applications. This is achieved\
    \ by creating an operating system-like construct upon which applications can be\
    \ built. The software provides accounts, authentication, databases, asynchronous\
    \ communication, and the scheduling of applications across many of CPU cores or\
    \ clusters. The resulting technology is a blockchain architecture that may ultimately\
    \ scale to millions of transactions per second, eliminates user fees, and allows\
    \ for quick and easy deployment and maintenance of decentralized applications,\
    \ in the context of a governed blockchain.”*\n> \n> —EOS.IO block.one white paper\n\
    \nAs mentioned in Chapter [2](#475651_1_En_2_Chapter.xhtml), EOS.IO is built on\
    \ the delegated proof of stake (DPoS) consensus. EOS.IO is able to handle low\
    \ latency and tens of millions of active users daily (bypassing Ethereum). This\
    \ is achieved by the DPoS consensus as well as EOS.IO running as multithreaded\
    \ (running on multiple computer cores) and acting as an OS.\n\nThis type of scalability\
    \ can enable adoption of blockchain technology by large businesses. EOS.IO offers\
    \ many additional features such as the following:\n\n*   Free rate-limited transactions\n\
    \n*   Low-latency transactions (such as 0.25 seconds broadcast time or 0.5 block\
    \ time)\n\n*   Recovery of stolen keys\n\n*   Parallel execution of applications\n\
    \n*   Atomic transactions with multiple accounts\n\nI encourage you to read the\
    \ EOS.IO white paper and visit the GitHub page for a full list of features.\n\n\
    *   [`https://github.com/EOSIO/eos`](https://github.com/EOSIO/eos)\n\n*   [`https://github.com/EOSIO/Documentation/blob/master/TechnicalWhitePaper.md`](https://github.com/EOSIO/Documentation/blob/master/TechnicalWhitePaper.md)\n\
    \nFinancially speaking, EOS was developed by a private company called block.one\
    \ and was able to raise an astonishing $4 billion in initial coin offering (ICO)\
    \ via an ERC-20 tokens sale. At the time of writing, EOS’s price is selling around\
    \ $2 to $8, and it has a total market capitalization of around $2 billion, which\
    \ makes EOS the seventh largest cryptocurrency by market cap.\n\nEOS offers a\
    \ few repositories to help with the development of EOS.IO contracts; they are\
    \ listed at [`https://github.com/EOSIO`](https://github.com/EOSIO) and include\
    \ the following: eos, eosio.cdt, eosjs, demux-js, and eosio.contracts. You will\
    \ be installing the EOS and EOSIO.CDT libraries in this chapter. The EOS library\
    \ is an open source smart contract platform, and the EOSIO.CDT library is a suite\
    \ of tools for building EOS.IO contracts.\n\nAt the time of writing, the EOS.IO\
    \ platform has a steep learning curve. The code keeps changing, and the documentation\
    \ and examples of EOS.IO are not being updated in timely manner, so it may feel\
    \ like chasing a moving target at times. This results in code sometimes not compiling,\
    \ commands not working, and documentation and examples containing code and commands\
    \ that have been deprecated. It’s easy to find yourself stumped a few times while\
    \ developing a contract; however, once you understand EOS.IO, it’s easy to overcome\
    \ these obstacles."
