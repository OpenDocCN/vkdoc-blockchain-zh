    ## 医疗保健


    医疗保健行业存在许多具体的痛点，区块链可以帮助解决这些问题。例如，与高端品牌一样，药品伪造也是制药行业的一大问题，因为在发展中国家销售的药品中，有 10%到
    30%是假药。这些假药给医疗保健公司造成了数十亿美元的损失。大部分假药是在印度或中国生产的。此外，许多假药含有错误的成分或剂量，将患者的健康置于危险之中。


    由制药公司控制的私有区块链可以登记药品，并确保假药因其未被登记在账本上而被发现。


    根据 Bisresearch 的数据，到 2025 年，区块链市场预计将增长并达到 50 亿美元以上：[`https://bisresearch.com/industry-report/global-blockchain-in-healthcare-market-2025.html`](https://bisresearch.com/industry-report/global-blockchain-in-healthcare-market-2025.html)。


    > *“全球医疗保健区块链市场预计在 2018 年至 2025 年间以 63.85%的年复合增长率增长，到 2025 年将达到 56.1 亿美元的价值。在整个预测期内，使用区块链进行医疗保健数据交换将贡献最大的市场份额，到
    2025 年将达到 18.9 亿美元，原因是区块链被用于解决医疗保健信息系统中最普遍的问题，即与互操作性和非标准化相关的问题，这些问题在该行业造成了数据孤岛。”*

    >

    > ——Bisresearch


    此外，医疗保健行业可以利用区块链来存储所有关于药品的重要信息，并更好地分析和处理信息。


    - **识别患者**：像 CHIME 和 HIMSS 这样的组织近二十年来一直在推动创建患者身份卡。创建一个唯一的患者标识符可以很容易地通过区块链解决，并确保不存在不匹配的患者电子健康记录（EHR），因为这会引发患者护理错误。


    - **追踪药品**：正如我所提到的，假药可能含有错误的成分并对患者造成伤害。假药的互联网销售额占整个市场的 750 亿美元。区块链可用于登记所有真药的序列号。


    - **追踪药品效果**：区块链可以创建一个公开的患者账本，用于报告特定药物的效果。该系统可以验证用户是否确实购买了该药物以及患者的病情。利用这些数据可以为制药公司或任何相关实体提供宝贵信息。


    以下是一些案例研究：


    - **Ambrosus** ([`ambrosus.com/#mission`](https://ambrosus.com/%2523mission))：这个区块链系统旨在追踪临床试验和药品的监管链。食品和制药企业可以使用该平台优化供应链可见性和质量保证。


    - **ConnectingCare** ([`www.simplyvitalhealth.com/`](https://www.simplyvitalhealth.com/))：在这里，患者和医疗服务提供者可以共享健康数据。它允许各种独特的应用，从计算成本到患者控制自己隐私的能力，甚至允许用户出售他们的数据用于研究。


    - **FarmaTrust** ([`www.farmatrust.com`](https://www.farmatrust.com))：该系统旨在通过使用区块链作为账本来阻止假药。


    - **Hashed Health** ([`hashedhealth.com`](https://hashedhealth.com))：旨在通过使数据更加透明和易于访问来解决资质问题。该平台有一个专业资质交换系统，成员可以验证各种医疗专业人员的资质并跟踪其记录。这可以加快招聘流程，并提供专业人员医疗保健职业生涯不可篡改的历史记录。


    - **MedicalChain** ([`medicalchain.com/en/`](https://medicalchain.com/en/))：该系统通过使用区块链实现患者与医生的互动。该项目通过
    MedTokens 获得资金。患者可以完全访问和控制自己的个人健康数据，并可以通过移动设备授予医生访问其健康记录的权限，同时数据在区块链上安全存储；或者患者佩戴腕带，当患者失去意识时，医疗专业人员可以扫描腕带以获取其病史。


    - **MedRec** ([`medrec.media.mit.edu/`](https://medrec.media.mit.edu/))：该系统通过以太坊智能合约在区块链上提供电子健康记录（EHR）。


    - **MTBC** ([`www.mtbc.com`](https://www.mtbc.com))：这是一个大型参与者，旨在通过使用区块链来改进电子健康记录（EHR）。患者将能够允许将记录从一个医生转移到另一个医生。区块链
    API 在 Hyperledger 平台上运行。


    - **Phros** ([`phros.io/#home`](https://phros.io/%2523home))：该系统由台北医学大学附设医院和数字国库公司（DTCO）发布，旨在共享健康数据的同时确保数据隐私。目标是将患者的所有医疗信息都放置在区块链上。


    - **美国国防部、美国国防后勤局**：这些机构正在试验一个基于区块链的系统，该系统允许通过区块链账本添加和跟踪数据，为多个机构的救援工作提供实时信息流，以帮助拯救生命和降低成本。参见[`https://www.dla.mil/AboutDLA/News/NewsArticleView/Article/1720207/troop-support-event-poses-question-how-and-where-can-blockchain-help/`](https://www.dla.mil/AboutDLA/News/NewsArticleView/Article/1720207/troop-support-event-poses-question-how-and-where-can-blockchain-help/)。


    ## 游戏


    游戏行业可以通过利用区块链账本存储信息，以及实现使用加密市场进行 NFT 交易以购买游戏相关物品的混合游戏，从而从区块链中受益。这种区块链的应用已经在进行中。索尼正利用区块链记录
    PlayStation 网络上谁拥有什么。《堡垒之夜》的开发商 Epic Games 已与一家区块链公司合作，微软正在使用区块链处理向开发者支付的 Xbox
    Live 版税，并且许多其他公司也在试验区块链的应用。此外，还有一个区块链游戏联盟（BGA），成员包括育碧、ConsenSys、Everdreamsoft
    和 Enjin 等公司。BGA 的目标是将区块链和游戏结合起来开发解决方案，并制定标准和最佳实践。


    以下是案例研究：


    - **Beyond the Void** ([`beyond-the-void.net/`](https://beyond-the-void.net/))：这是一款利用以太坊区块链，允许玩家通过
    NFT 交易购买、出售和交易“装饰性游戏内物品”的游戏。

    '
- fmt: '# 区块链在游戏和音乐行业的应用


    ## 游戏


    - **Crypto card games**：这些游戏类似于传统卡牌游戏，但卡牌并非实体，而是非同质化代币。卡牌使用 `ERC-721` 以太坊代币创建。交易卡可以交换或以街机对战风格游玩。这些卡牌可能价格不菲。例如，2018
    年，`CryptoKitties` 以 111,000 美元售出一只猫，`Gods Unchained` 以 60,000 美元售出一张卡牌。示例包括 `CryptoKitties`（[https://www.cryptokitties.co](https://www.cryptokitties.co)）、`Gods
    Unchained`（[https://godsunchained.com](https://godsunchained.com)）和 `Spells of
    Genesis`（[https://spellsofgenesis.com](https://spellsofgenesis.com)）。


    - **HashCraft by Ubisoft**：这是一个未发布的原型，将区块链作为核心玩法，利用区块链账本作为数据库，使玩家能够成为游戏的建造者。


    - **Plague Hunters**（[https://store.steampowered.com/app/746530/Plague_hunter/](https://store.steampowered.com/app/746530/Plague_hunter/)）：这是一款免费游玩的策略游戏，内置基于
    `Ethereum` 的市场，使用 `NFT` 交易来买卖武器和“猎人”。`Plague Hunters` 通过了索尼的审核流程，并计划在 PlayStation
    4 上发布。它是首款在主流主机上提供 `NFT` 代币交易的区块链游戏。


    除了这些案例研究，还有一个专门的网站用于追踪与游戏相关的区块链技术进步：[https://blockchaingamer.net/](https://blockchaingamer.net/)。该资源可提供有关当前趋势和新闻的宝贵信息。


    ## 音乐


    在当前的市场中，许多音乐行业的艺术家、制作人、粉丝和消费者都感到沮丧，而区块链对他们来说似乎是新鲜空气，因为它有潜力解决许多痛点。


    例如，许多艺术家和制作人花费大量时间和资源来打入市场、发布作品并进入顶级音乐流媒体平台。一旦艺术家进入像 Pandora、Spotify 这样的大型流媒体平台，他们可以接触到
    2.5 亿客户；然而，许多艺术家对支付结构以及获得报酬所需的时间感到不满。例如，Spotify 上的一首歌需要超过 152,000 次来自付费用户的播放，才能为艺术家带来区区
    100 美元的收入。大部分收入都流向了长长一串的中介中间商。艺术家不仅收入微薄，有时甚至需要数年才能拿到这些报酬。


    通过利用区块链，艺术家可以在以下方面受益：


    - **提高艺术家收入**：区块链可以提供透明且公平的报酬。内容提供商的收入份额可以以公平透明的方式分配。

    - **简化收入流程**：区块链可以提供一种更快捷的方式，使用加密货币立即向艺术家支付版税。

    - **自动分配收入**：智能合约可用于为参与内容创作的每个人（如词曲作者）设定支付结构。

    - **更好地与客户联系**：粉丝可以直接投资并与艺术家建立联系。

    - **存储数据**：区块链可用于在公共账本上存储信息，用于数字版权管理（DRM）、艺术家、资产、活动、场地等。

    - **提供流媒体服务**：区块链的点对点网络可用于流式传输音乐。当前的音乐流媒体服务要么费用高昂，要么包含过多广告。


    音乐平台的集成需要考虑音乐格式和行业标准，例如：


    - **Common Works Registration (CWR)**（[www.cmrra.ca/](http://www.cmrra.ca/)）：这是注册和修订音乐作品的标准格式。

    - **DDEX**（[http://ddex.net](http://ddex.net)）：通过接收来自领先媒体公司、音乐许可组织、数字服务提供商和技术中介的数据，建立一个数字供应链联盟并创建标准。


    与游戏领域的 BGA 联盟类似，音乐行业也成立了一个组织来跟进区块链发展。开放音乐倡议（[open-music.org](http://open-music.org)）探索使用区块链来帮助识别合法的音乐权利持有者和创作者，以便现代化和简化版税支付流程，使艺术家能够获得公平的版税。这可以通过利用区块链提高透明度和更好地分析数据来实现。著名会员包括
    Soundcloud、Red Bull Media、Netflix、Sony、YouTube 和 Spotify。


    类似于黑客松竞赛，`Smackathon`（[https://www.smackathon.co](https://www.smackathon.co)）每年举办一次，旨在寻找音乐行业基于区块链的有趣创意。例如，在
    2018 年，有人发明了一个区块链平台，用于根据听众收听歌曲的每秒时长向他们付费，并提供粉丝互动工具。


    观察一些更知名的项目，你会发现存在相似想法的重复。这强化了音乐行业确实存在需要解决的痛点。以下是一些案例研究：


    - **Audius**（[https://audius.co/](https://audius.co/)）：它使用区块链点对点网络作为流媒体服务。`Audius`
    还利用区块链通过智能合约进行支付，立即向艺术家发送报酬。

    - **BitSong**（[https://bitsong.io/en](https://bitsong.io/en)）：该公司声称是第一个使用区块链点对点网络进行音乐流媒体播放的。艺术家可以上传歌曲并附加广告。每播放一个广告，艺术家和听众可以获得广告商投入利润的
    90%。该平台包含一个名为 `$BTSG` 的代币，用于向独立艺术家捐款和购买音乐。

    - **Blokur**（[https://www.blokur.com](https://www.blokur.com)）：`Blokur` 平台结合了人工智能和区块链。区块链用作数据库，允许出版商编录其音乐，然后社区可以批准或拒绝。`AI`
    算法自动解决数据冲突，例如权利纠纷，以确保原创艺术家获得报酬。已有 50,000 名词曲作者和 7,000 名出版商在其上发布了作品。

    - **Choon**（[https://choon.co](https://choon.co)）：它利用区块链进行音乐流媒体播放和数字支付，以加快艺术家的报酬支付。艺术家可以为每首歌曲使用以太坊的智能合约来分配贡献者的收入。其他功能包括为新艺术家众筹，以及奖励创建播放列表的用户。

    - **eMusic**（[https://www.emusic.com](https://www.emusic.com)）：它使用区块链和以太坊智能合约进行音乐分发和版税支付，使用一种名为
    `eMusic` 的加密代币。

    - **Inmusik**（[https://inmusik.co](https://inmusik.co)）：它有一种名为 `$OUND` 的加密代币。声音被归类为“证券化音乐”，粉丝可以“投资”艺术家以分享收益。粉丝还可以通过发现新歌、投票选出最佳艺术家和支持社区来赚取代币。艺术家可以创建“军队”，获得投资者，并在每百万次流媒体播放中赚取超过
    20,000 美元。

    - **MediaChain**（[www.mediachain.io](http://www.mediachain.io)）：被 Spotify 收购，`MediaChain`
    利用区块链账本在不同的应用程序和组织之间共享信息，为每条信息分配唯一标识符。`MediaChain` 还与艺术家合作，通过智能合约确保他们获得公平报酬。'
