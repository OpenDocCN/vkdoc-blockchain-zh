    \ same thing when you developed a smart contract for Ethereum. Feel free to revisit\
    \ Figure [6-2](#475651_1_En_6_Chapter.xhtml#Fig2), where you can see the diagram\
    \ of `nodeos and` the EOS.IO blockchain relationship.\n\nTo start your own single-node\
    \ local blockchain block producer, in a separate terminal, run `nodeos`.\n\n```\n\
    > nodeos -e -p eosio --plugin eosio::chain_api_plugin --plugin eosio::history_api_plugin\
    \ --contracts-console\n```\n\nThis command starts the block producer and should\
    \ display the process on the console.\n\n```\ninfo  2019-04-28T19:03:34.776 thread-0\
    \  chain_plugin.cpp:333          plugin_initialize    ] initializing chain plugin\n\
    info  2019-04-28T19:03:34.811 thread-0  block_log.cpp:134          open      \
    \           ] Log is nonempty\ninfo  2019-04-28T19:03:34.820 thread-0  block_log.cpp:161\
    \          open                 ] Index is nonempty\ninfo  2019-04-28T19:03:34.878\
    \ thread-0  http_plugin.cpp:422          plugin_initialize    ] configured http\
    \ to listen on 127.0.0.1:8888\n...\n...\n...\n```\n\nAs you can see, the console\
    \ shows that your local network starts producing blocks. Notice the command you\
    \ used sets the plugins, and also you set the `--contracts-console` flag.\n\n\
    This flag is necessary to be able to see messages you print to the console while\
    \ in development mode.\n\n### Note\n\nYou can also set the `--contracts-console`\
    \ flag inside the `config.ini` file instead of passing this argument with `nodeos`\
    \ every time.\n\nAs you recall, you previously were running the `cleos get info`\
    \ command and getting no results, as you did not have a block producer running;\
    \ now if you run the same command in a new Terminal, you can observe information\
    \ about your blocks.\n\n```\n> cleos get info\n{\n\"server_version\": \"d4ffb4eb\"\
    ,\n\"chain_id\": \"cf057bbfb72640471fd910bcb67639c22df9f92470936cddc1ade0e2f2e7dc4f\"\
    ,\n\"head_block_num\": 73699,\n\"last_irreversible_block_num\": 73698,\n\"last_irreversible_block_id\"\
    : \"00011fe2a80bf11315396c85e70860122dddc24ac083911fba31f7ee2d64eb3e\",\n\"head_block_id\"\
    : \"00011fe36fab1fc2d4885067e1391c72782895d43f14cf7970ac282ddef17d67\",\n\"head_block_time\"\
    : \"2019-04-28T19:04:06.500\",\n\"head_block_producer\": \"eosio\",\n\"virtual_block_cpu_limit\"\
    : 200000000,\n\"virtual_block_net_limit\": 1048576000,\n\"block_cpu_limit\": 199900,\n\
    \"block_net_limit\": 1048576,\n\"server_version_string\": \"v1.5.1-dirty\"\n}\n\
    ```\n\n### Re-spin Up a Testnet Local node (nodeos)\n\nIf you want to clear the\
    \ block producer’s history, delete all the blocks, and re-spin up your local testnet,\
    \ you will use what is called a *hard replay* by using the following flags:\n\n\
    ```\n--delete-all-blocks --delete-state-history --hard-replay\n```\n\nThese arguments\
    \ will clear the accounts on the local testnet as well as the blocks. The complete\
    \ command will look as follows:\n\n```\n> nodeos -e -p eosio --plugin eosio::chain_api_plugin\
    \ --plugin eosio::history_api_plugin --delete-all-blocks --delete-state-history\
    \ --hard-replay --contracts-console\n```\n\n### EOS.IO Accounts\n\nEOS.IO accounts\
    \ hold a human-readable name that is stored on the EOS.IO blockchain.\n\nTo create\
    \ an account on the mainnet, someone with an EOS.IO account needs to create it\
    \ for you. The reasons behind this regulated process are spam and hacker prevention\
    \ and resource allocation. By default, the account holds two native names/permissions.\n\
    \n*   `Owner`: This is used to recover other permissions, which is useful in the\
    \ event that the permission has been compromised.\n\n*   `Active`: This is used\
    \ for high-level account changes such as transferring funds or voting for block\
    \ producers.\n\nWhen you created your testnet account, you imported a special\
    \ EOS.IO parent account key to bootstrap. Each permission name needs a “parent.”\
    \ The parent authority is to be able to make changes to any of the permission\
    \ settings for all of its children. EOS.IO provides a special account’s parent\
    \ key for the local testnet that you imported in order to create your account.\
    \ See Figure [6-4](#475651_1_En_6_Chapter.xhtml#Fig4).\n\n![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig4_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4\n\nAccount high-level architecture and permission structure. Photo\
    \ credit: hackernoon.com.\n\nFor a transaction to be valid and signed, each named\
    \ permission needs conditions to be met such as a client with an unlocked wallet,\
    \ and the wallet has to grant authority permission for the account. If you don’t\
    \ meet these conditions, the transaction will fail.\n\nNow that you understand\
    \ accounts, you are ready to create your own account. You already created a wallet\
    \ and imported the parent key. To create an account, you run the following command’s\
    \ syntax:\n\n```\n> cleos create account eosio [ACCOUNT_NAME] [OWNER_PUBLIC_KEY]\
    \ [ACTIVE_PUBLIC_KEY]\n```\n\nThe `OWNER_KEY` value is the public key of the account\
    \ owner authority, and the `ACTIVE_KEY` value is the public key of the account’s\
    \ active authority.\n\nIn this example, let’s call the account `myaccount` and\
    \ use the two keys you created. The command will look like so (see Figure [6-5](#475651_1_En_6_Chapter.xhtml#Fig5)\
    \ for the expected output):\n\n![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig5_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig5_HTML.jpg)\n\
    \nFigure 6-5\n\nCreating your first EOS.IO account called myaccount\n\n```\n>\
    \ cleos create account eosio myaccount [PUBLIC_KEY_1] [PUBLIC_KEY_2]\n```\n\n\
    You generated two keys, so it doesn’t matter which key you decide to use as your\
    \ active and which one as an owner; just remember which key you used for which.\n\
    \nTo see the list of the account, use this:\n\n```\n> cleos get accounts [PUBLIC_KEY_1]\n\
    {\n\"account_names\": [\n\"myaccount\"\n]\n}\n```\n\n### Note\n\nYou may get an\
    \ error message while trying to create the account if you missed any of the steps\
    \ provided in this chapter. The error is “Error 3090003: provided keys, permissions,\
    \ and delays do not satisfy declared authorizations.”\n\n### Wallets, Keys, and\
    \ Accounts: Complete Commands\n\nTo ensure you fully understand the process, here\
    \ is a summary of how to create an account:\n\n1.  Ensure `nodeos` is running\
    \ in a separate Terminal window.\n\n    ```\n    > nodeos -e -p eosio --plugin\
    \ eosio::chain_api_plugin --plugin eosio::history_api_plugin --delete-all-blocks\
    \ --delete-state-history --hard-replay --contracts-console\n    ```\n\n2.  Ensure\
    \ your wallet is unlocked. Run `> cleos wallet list` (check that there is an asterisk\
    \ next to the wallet’s name).\n\n3.  The EOS.IO special account’s parent key (`5KQwrPbwdL6PhXujxW37FSSQZ1JiwsST4cqQzDeyXtP79zkvFD3`)\
    \ was imported to bootstrap the EOS.IO.\n\n    `cleos wallet import --private-key\
    \ 5KQwrPbwdL6PhXujxW37FSSQZ1JiwsST4cqQzDeyXtP79zkvFD3`\n\n4.  Check the key’s\
    \ list using `> cleos wallet keys`. It should output an array with the keys you\
    \ imported.\n\nTo summarize what you have done so far or to redo the entire process\
    \ of creating an account, here are the complete steps:\n\n```\n> rm -rf ~/eosio-wallet\n\
    > cleos wallet create --to-console\n> cleos wallet open\n> cleos wallet unlock\
    \ --password [DEFAULT_MASTER_KEY]\n> cleos create key --to-console\n> cleos create\
    \ key --to-console\n> cleos wallet import --private-key [PRIVATE_KEY_1]\n> cleos\
    \ wallet import --private-key [PRIVATE_KEY_2]\n> cleos wallet import --private-key\
    \ 5KQwrPbwdL6PhXujxW37FSSQZ1JiwsST4cqQzDeyXtP79zkvFD3\n> cleos wallet keys\n>\
    \ cleos create account eosio myaccount [EOS∗ OWNER_KEY] [EOS∗ ACTIVE_KEY]\n```"
  trans: "\n### 使用 `nodeos` 启动节点\n\n交易被附加到区块中，你需要一个区块生产者才能将这些交易传递到网络中。\n\n如果你直接连接到公共测试网或主网，可以跳过创建\
    \ EOS 节点（`nodeos`）；但最好先在本地测试网络上运行你的智能合约，然后再将代码提交到公共测试网或主网。\n\n此时，你应该已经熟悉这个过程了，因为在为以太坊开发智能合约时你也做过同样的事情。可以回顾一下图\
    \ 6-2，其中展示了 `nodeos` 与 EOS.IO 区块链关系的示意图。\n\n要在单独的终端中启动你自己的单节点本地区块链区块生产者，请运行 `nodeos`。\n\
    \n```\n> nodeos -e -p eosio --plugin eosio::chain_api_plugin --plugin eosio::history_api_plugin\
    \ --contracts-console\n```\n\n该命令将启动区块生产者，并应在控制台上显示进程信息。\n\n```\ninfo  2019-04-28T19:03:34.776\
    \ thread-0  chain_plugin.cpp:333          plugin_initialize    ] initializing\
    \ chain plugin\ninfo  2019-04-28T19:03:34.811 thread-0  block_log.cpp:134    \
    \      open                 ] Log is nonempty\ninfo  2019-04-28T19:03:34.820 thread-0\
    \  block_log.cpp:161          open                 ] Index is nonempty\ninfo \
    \ 2019-04-28T19:03:34.878 thread-0  http_plugin.cpp:422          plugin_initialize\
    \    ] configured http to listen on 127.0.0.1:8888\n...\n...\n...\n```\n\n如你所见，控制台显示你的本地网络已开始生产区块。请注意，你使用的命令设置了插件，并且还设置了\
    \ `--contracts-console` 标志。\n\n在开发模式下，需要此标志才能看到你打印到控制台的消息。\n\n### 注意\n\n你也可以在\
    \ `config.ini` 文件中设置 `--contracts-console` 标志，而不必每次都在 `nodeos` 命令中传递此参数。\n\n回想一下，之前你运行\
    \ `cleos get info` 命令时，因为没有运行区块生产者，所以没有返回任何结果；现在，如果你在一个新的终端中运行相同的命令，就可以看到关于你区块的信息了。\n\
    \n```\n> cleos get info\n{\n\"server_version\": \"d4ffb4eb\",\n\"chain_id\": \"\
    cf057bbfb72640471fd910bcb67639c22df9f92470936cddc1ade0e2f2e7dc4f\",\n\"head_block_num\"\
    : 73699,\n\"last_irreversible_block_num\": 73698,\n\"last_irreversible_block_id\"\
    : \"00011fe2a80bf11315396c85e70860122dddc24ac083911fba31f7ee2d64eb3e\",\n\"head_block_id\"\
    : \"00011fe36fab1fc2d4885067e1391c72782895d43f14cf7970ac282ddef17d67\",\n\"head_block_time\"\
    : \"2019-04-28T19:04:06.500\",\n\"head_block_producer\": \"eosio\",\n\"virtual_block_cpu_limit\"\
    : 200000000,\n\"virtual_block_net_limit\": 1048576000,\n\"block_cpu_limit\": 199900,\n\
    \"block_net_limit\": 1048576,\n\"server_version_string\": \"v1.5.1-dirty\"\n}\n\
    ```\n\n### 重新启动本地测试网节点（`nodeos`）\n\n如果你想清除区块生产者的历史记录，删除所有区块，并重新启动本地测试网，可以使用所谓的*硬重放*，通过添加以下标志来实现：\n\
    \n```\n--delete-all-blocks --delete-state-history --hard-replay\n```\n\n这些参数将清除本地测试网上的账户以及区块。完整的命令如下所示：\n\
    \n```\n> nodeos -e -p eosio --plugin eosio::chain_api_plugin --plugin eosio::history_api_plugin\
    \ --delete-all-blocks --delete-state-history --hard-replay --contracts-console\n\
    ```\n\n### EOS.IO 账户\n\nEOS.IO 账户持有一个人类可读的名称，该名称存储在 EOS.IO 区块链上。\n\n要在主网上创建一个账户，需要已有的\
    \ EOS.IO 账户用户为你创建。这种规范化流程背后的原因是防止垃圾邮件、黑客攻击以及进行资源分配。默认情况下，账户拥有两个原生名称/权限。\n\n- \
    \  `Owner`（所有者）：用于恢复其他权限，在权限被泄露的情况下非常有用。\n-   `Active`（活跃）：用于高级账户更改，例如转账或为区块生产者投票。\n\
    \n创建测试网账户时，你导入了一个特殊的 EOS.IO 父账户密钥来进行引导。每个权限名称都需要一个“父级”。父级权限能够对其所有子级的任何权限设置进行更改。EOS.IO\
    \ 为本地测试网提供了一个特殊的账户父密钥，你已导入该密钥来创建账户。参见图 6-4。\n\n![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig4_HTML.jpg](img/475651_1_En_6_Fig4_HTML.jpg)\n\
    \n图 6-4\n\n账户高级架构与权限结构。图片来源：hackernoon.com。\n\n要使交易有效并被签名，每个命名权限都需要满足一些条件，例如客户端需要解锁钱包，并且钱包必须授予该账户的权限。如果不满足这些条件，交易将会失败。\n\
    \n既然你已经理解了账户，就可以创建自己的账户了。你已经创建了一个钱包并导入了父密钥。要创建一个账户，请运行以下命令语法：\n\n```\n> cleos\
    \ create account eosio [账户名] [所有者公钥] [活跃公钥]\n```\n\n`OWNER_KEY` 值是账户所有者权限的公钥，`ACTIVE_KEY`\
    \ 值是账户活跃权限的公钥。\n\n在这个示例中，我们将账户命名为 `myaccount`，并使用你创建的两个密钥。命令将如下所示（预期输出见图 6-5）：\n\
    \n![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig5_HTML.jpg](img/475651_1_En_6_Fig5_HTML.jpg)\n\
    \n图 6-5\n\n创建你的第一个名为 `myaccount` 的 EOS.IO 账户\n\n```\n> cleos create account eosio\
    \ myaccount [公钥 _1] [公钥 _2]\n```\n\n你生成了两个密钥，所以用哪个密钥作为活跃密钥、哪个作为所有者密钥都无关紧要；只需记住你分别使用了哪个密钥。\n\
    \n要查看账户列表，请使用以下命令：\n\n```\n> cleos get accounts [公钥 _1]\n{\n\"account_names\"\
    : [\n\"myaccount\"\n]\n}\n```\n\n### 注意\n\n如果你漏掉了本章中提供的任何步骤，尝试创建账户时可能会收到错误信息。该错误为“Error\
    \ 3090003: provided keys, permissions, and delays do not satisfy declared authorizations.”（提供的密钥、权限和延迟不满足声明的授权。）\n\
    \n### 钱包、密钥和账户：完整命令\n\n为了确保你完全理解整个过程，以下是创建账户步骤的总结：\n\n1.  确保 `nodeos` 在单独的终端窗口中运行。\n\
    \n    ```\n    > nodeos -e -p eosio --plugin eosio::chain_api_plugin --plugin\
    \ eosio::history_api_plugin --delete-all-blocks --delete-state-history --hard-replay\
    \ --contracts-console\n    ```\n\n2.  确保你的钱包已解锁。运行 `> cleos wallet list`（检查钱包名称旁边是否有一个星号）。\n\
    \n3.  已导入 EOS.IO 特殊账户的父密钥（`5KQwrPbwdL6PhXujxW37FSSQZ1JiwsST4cqQzDeyXtP79zkvFD3`）来引导\
    \ EOS.IO 网络。\n\n    `cleos wallet import --private-key 5KQwrPbwdL6PhXujxW37FSSQZ1JiwsST4cqQzDeyXtP79zkvFD3`\n\
    \n4.  使用 `> cleos wallet keys` 检查密钥列表。它应该输出一个包含你已导入密钥的数组。\n\n总结一下到目前为止你所做的工作，或者重新执行创建账户的整个过程，完整步骤如下：\n\
    \n```\n> rm -rf ~/eosio-wallet\n> cleos wallet create --to-console\n> cleos wallet\
    \ open\n> cleos wallet unlock --password [默认主密钥]\n> cleos create key --to-console\n\
    > cleos create key --to-console\n> cleos wallet import --private-key [私钥 _1]\n\
    > cleos wallet import --private-key [私钥 _2]\n> cleos wallet import --private-key\
    \ 5KQwrPbwdL6PhXujxW37FSSQZ1JiwsST4cqQzDeyXtP79zkvFD3\n> cleos wallet keys\n>\
    \ cleos create account eosio myaccount [EOS∗ 所有者密钥] [EOS∗ 活跃密钥]\n```\n"
- fmt: "# Custom, Single Signature (Single-Sig), and Multisignature (Multisig)\n\n\
    By default, you configured your account with a single signature (aka single-sig)\
    \ because it’s authorized for actions with the default (`active` and `owner`)\
    \ permissions. However, it’s possible to configure your accounts with a multisignature\
    \ (aka multisig) or with custom permissions. For instance, you can configure your\
    \ account with multiple keys to authorize specific `owner` actions and `active`\
    \ actions. You could use this feature, for instance, to create a permission called\
    \ `publish` and give this permission to an account to allow only published smart\
    \ contracts without the ability to withdraw tokens.\n\n# “HelloWorld” Smart Contract\n\
    \nYou will be writing a smart contract with the minimal code. You will call your\
    \ smart contract “HelloWorld.”\n\n## “HelloWorld” Smart Contract Accounts\n\n\
    To get started, you will create two accounts for your smart contract, one to publish\
    \ your smart contract and one for interacting with a user. See the output in Figure\
    \ [6-6](#475651_1_En_6_Chapter.xhtml#Fig6).\n\n![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig6_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig6_HTML.jpg)\n\
    \nFigure 6-6\n\nCreating your accounts for the “HelloWorld” smart contract\n\n\
    ```\n> cleos create account eosio helloworld [PUBLIC_KEY]\n> cleos create account\
    \ eosio john [PUBLIC_KEY]\n```\n\n## “HelloWorld” C++ Code\n\nEOS selected C++,\
    \ which resulted in mixed reviews from the blockchain development community. C++\
    \ is a low-level language, and it allows better management of resources such as\
    \ memory pointers and operator overloading. This can result in better performance;\
    \ however, it comes with a cost of increased code effort, especially if you are\
    \ not familiar with C++.\n\nThe EOS.IO infrastructure is written in C++, so it\
    \ should not be a surprise that C++ was selected by EOS.IO’s team. EOS.IO smart\
    \ contracts are written in C++ saved as the CPP file format; then you compile\
    \ the C++ code to WebAssembly that is then used for deployment.\n\n### Note\n\n\
    EOS.IO smart contract source files can be broken into three: CPP, HPP, and Ricardian.\
    \ The HPP file defines the smart contract class, actions, and tables. The CPP\
    \ file is the C++ code, which implements the action logic. The Ricardian file\
    \ is the digital document (more about this in the next section).\n\nStart by creating\
    \ the `helloworld` contract directory by navigating into the directory.\n\n```\n\
    > mkdir ~/Desktop/helloworld && cd $_\n```\n\nNotice that you used your desktop\
    \ but can use any directory you like. Next, paste the `helloworld.cpp` code with\
    \ vim or your favorite text editor.\n\n```\n> vim helloworld.cpp\n#include \n\
    using namespace eosio;\nclass helloworld : public contract {\npublic:\nusing contract::contract;\n\
    [[eosio::action]]\nvoid hello( name user ) {\nprint( \"World: User: \", user);\n\
    }\n};\nEOSIO_DISPATCH(helloworld, (hello))\n```\n\nThe code imports EOS.IO libraries.\
    \ The class `HelloWorld` is of type `contract`, and you create a method called\
    \ `hello`. The method is your action; you pass the user and print the word *world*\
    \ and the username. Once a user interacts with your contract and calls the `hello`\
    \ action, they will get `world` with the user’s name.\n\nNotice that in this example\
    \ you included the `eosio.hpp` file. To debug the EOS.IO smart contract, you need\
    \ to use old-fashioned caveman debugging.\n\n### Note\n\nCaveman debugging, aka\
    \ `printf()` debugging, is nothing more than adding `print` statements around\
    \ your code. The EOS.IO Print API supports the char array, 64-bit and 128-bit\
    \ unsigned integer, and others. The print is done by wrapping the C++ code `printi`,\
    \ `prints_l`, `printi128`, and others in `print.hpp`, which includes the `import\
    \ eosio.hpp` library statement.\n\n## Smart Contract IDE\n\nUsing Terminal is\
    \ perfectly acceptable, but as the code becomes more complex, using a professional\
    \ IDE can be helpful for code completion, highlights, and readability. You can\
    \ use the IDE of your liking. As you already used WebStorm, you can continue and\
    \ import the project to WebStorm. WebStorm already includes a C++ plugin, so there’s\
    \ no need to install any special plugin. Figure [6-7](#475651_1_En_6_Chapter.xhtml#Fig7)\
    \ shows HelloWorld project open in WebStorm.\n\nTo import your project, select\
    \ File ➤ Open and navigate to the project’s location: `~/Desktop/helloworld`.\n\
    \n![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig7_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig7_HTML.jpg)\n\
    \nFigure 6-7\n\nHelloWorld project imported into WebStorm version 2018.2.4\n\n\
    ## Compile a Contract and Generate an ABI\n\nAs mentioned, the `eosio-cpp` tool\
    \ takes C++ code and outputs WebAssembly and ABI. This is done by running the\
    \ following command:\n\n```\n> eosio-cpp -o helloworld.wasm helloworld.cpp --abigen\n\
    ```\n\nNotice that in the command you specify the output file’s name, which is\
    \ `helloworld.wasm`. After running this command, the compiler generates the following\
    \ files: `helloworld.wasm` and `helloworld.abi`.\n\nTo ensure the compiler worked\
    \ as expected, you should be able to see these two files; see Figure [6-7](#475651_1_En_6_Chapter.xhtml#Fig7).\n\
    \n### Ricardian Contracts\n\nOnce you generate your WASM and ABI files, notice\
    \ that you are getting more than 20 warnings. Among these warnings, you should\
    \ find the following warnings in the output:\n\n```\nWarning, empty ricardian\
    \ clause file\nWarning, empty ricardian clause file\nWarning, action  does not\
    \ have a ricardian contract\n```\n\n### Note\n\nRicardian contracts were invented\
    \ by Ian Grigg in 1996 to help bridge the gap between software application and\
    \ court of law. The Ricardian contracts file in EOS is a digital document in Markdown\
    \ Language format (`.md`, `.markdown`) and defines the terms and conditions of\
    \ the interaction between the parties. It is set as parameters but written as\
    \ readable text. EOS uses cryptographically to sign and verify the Ricardian contracts.\n\
    \nTo help generate the Ricardian contracts, you can copy a Python script and template\
    \ from a contributor that generates the files automatically: [`https://github.com/EOS-Mainnet/governance`](https://github.com/EOS-Mainnet/governance).\n\
    \nAs it’s just three files, instead of using `clone`, you can use `wget` to download\
    \ these files.\n\nCheck that you have `wget` installed on your machine.\n\n```\n\
    > wget --help\n```\n\nIn case it’s not installed, install `wget` on macOS via\
    \ Ruby and Brew.\n\n```\n> ruby -e \"$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/master/install)\"\
    \  /dev/null\n> brew install wget\n> brew upgrade wget\n```\n\nNext, inside your\
    \ `helloworld` project, create the directory and download the files you need.\n\
    \n```\n> cd ~/desktop/helloworld\n> mkdir rc && cd $_\n> wget https://raw.githubusercontent.com/EOS-Mainnet/governance/master/scripts/abi_to_rc/abi_to_rc.py\n\
    > wget https://raw.githubusercontent.com/EOS-Mainnet/governance/master/scripts/abi_to_rc/rc-action-template.md\n\
    > wget https://raw.githubusercontent.com/EOS-Mainnet/governance/master/scripts/abi_to_rc/rc-overview-template.md\n\
    ```\n\nNext, run the Python script.\n\n```\n> cd ../\n> python rc/abi_to_rc.py\
    \ helloworld.abi\n```\n\nThe script generates for you automatically `helloworld-rc.md`\
    \ and `helloworld-hello-rc.md` already formatted in the Markdown language. If\
    \ you view these files, you will notice that the Python script used the templates\
    \ you downloaded to generate your files, and you can fill in the terms and conditions\
    \ about your smart contract.\n\nYou can lay out the guidelines of what exactly\
    \ your users are purchasing/exchanging and allow better trust between parties;\
    \ it can include terms and conditions such as intent, warranty, remedies, force\
    \ majeure, dispute resolution, governing law, and many others. Pay close attention\
    \ to the terms you set as these can be enforced in a court of law. These terms\
    \ allow skipping middlemen such as attorneys to have the smart contract set the\
    \ terms and conditions that both parties agree to."
  raw: "### Custom, Single Signature (Single-Sig), and Multisignature (Multisig)\n\
    \nBy default, you configured your account with a single signature (aka single-sig)\
    \ because it’s authorized for actions with the default (active and owner) permissions.\
    \ However, it’s possible to configure your accounts with a multisignature (aka\
    \ multisig) or with custom permissions. For instance, you can configure your account\
    \ with multiple keys to authorize specific owner actions and active actions. You\
    \ could use this feature, for instance, to create a permission called “publish”\
    \ and give this permission to an account to allow only published smart contracts\
    \ without the ability to withdraw tokens.\n\n## “HelloWorld” Smart Contract\n\n\
    You will be writing a smart contract with the minimal code. You will call your\
    \ smart contract “HelloWorld.”\n\n### “HelloWorld” Smart Contract Accounts\n\n\
    To get started, you will create two accounts for your smart contract, one to publish\
    \ your smart contract and one for interacting with a user. See the output in Figure\
    \ [6-6](#475651_1_En_6_Chapter.xhtml#Fig6).\n\n![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig6_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig6_HTML.jpg)\n\
    \nFigure 6-6\n\nCreating your accounts for the “HelloWorld” smart contract\n\n\
    ```\n> cleos create account eosio helloworld [PUBLIC_KEY]\n> cleos create account\
    \ eosio john [PUBLIC_KEY]\n```\n\n### “HelloWorld” C++ Code\n\nEOS selected C++,\
    \ which resulted in mixed reviews from the blockchain development community. C++\
    \ is a low-level language, and it allows better management of resources such as\
    \ memory pointers and operator overloading. This can result in better performance;\
    \ however, it comes with a cost of increased code effort, especially if you are\
    \ not familiar with C++.\n\nThe EOS.IO infrastructure is written in C++, so it\
    \ should not be a surprise that C++ was selected by EOS.IO’s team. EOS.IO smart\
    \ contracts are written in C++ saved as the CPP file format; then you compile\
    \ the C++ code to WebAssembly that is then used for deployment.\n\n### Note\n\n\
    EOS.IO smart contract source files can be broken into three: CPP, HPP, and Ricardian.\
    \ The HPP file defines the smart contract class, actions, and tables. The CPP\
    \ file is the C++ code, which implements the action logic. The Ricardian file\
    \ is the digital document (more about this in the next section).\n\nStart by creating\
    \ the `helloworld` contract directory by navigating into the directory.\n\n```\n\
    > mkdir ~/Desktop/helloworld && cd $_\n```\n\nNotice that you used your desktop\
    \ but can use any directory you like. Next, paste the `helloworld.cpp` code with\
    \ vim or your favorite text editor.\n\n```\n> vim helloworld.cpp\n#include \n\
    using namespace eosio;\nclass helloworld : public contract {\npublic:\nusing contract::contract;\n\
    [[eosio::action]]\nvoid hello( name user ) {\nprint( \"World: User: \", user);\n\
    }\n};\nEOSIO_DISPATCH(helloworld, (hello))\n```\n\nThe code imports EOS.IO libraries.\
    \ The class `HelloWorld` is of type `contract`, and you create a method called\
    \ `hello`. The method is your action; you pass the user and print the word *world*\
    \ and the username. Once a user interacts with your contract and calls the `hello`\
    \ action, they will get `world` with the user’s name.\n\nNotice that in this example\
    \ you included the `eosio.hpp` file. To debug the EOS.IO smart contract, you need\
    \ to use old-fashioned caveman debugging.\n\n### Note\n\nCaveman debugging, aka\
    \ `printf()` debugging, is nothing more than adding `print` statements around\
    \ your code. The EOS.IO Print API supports the char array, 64-bit and 128-bit\
    \ unsigned integer, and others. The print is done by wrapping the C++ code `printi`,\
    \ `prints_l`, `printi128`, and others in `print.hpp`, which includes the `import\
    \ eosio.hpp` library statement.\n\n## Smart Contract IDE\n\nUsing Terminal is\
    \ perfectly acceptable, but as the code becomes more complex, using a professional\
    \ IDE can be helpful for code completion, highlights, and readability. You can\
    \ use the IDE of your liking. As you already used WebStorm, you can continue and\
    \ import the project to WebStorm. WebStorm already includes a C++ plugin, so there’s\
    \ no need to install any special plugin. Figure [6-7](#475651_1_En_6_Chapter.xhtml#Fig7)\
    \ shows HelloWorld project open in WebStorm.\n\nTo import your project, select\
    \ File ➤ Open and navigate to the project’s location: `~/Desktop/helloworld`.\n\
    \n![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig7_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig7_HTML.jpg)\n\
    \nFigure 6-7\n\nHelloWorld project imported into WebStorm version 2018.2.4\n\n\
    ## Compile a Contract and Generate an ABI\n\nAs mentioned, the `eosio-cpp` tool\
    \ takes C++ code and outputs WebAssembly and ABI. This is done by running the\
    \ following command:\n\n```\n> eosio-cpp -o helloworld.wasm helloworld.cpp --abigen\n\
    ```\n\nNotice that in the command you specify the output file’s name, which is\
    \ `helloworld.wasm`. After running this command, the compiler generates the following\
    \ files: `helloworld.wasm` and `helloworld.abi`.\n\nTo ensure the compiler worked\
    \ as expected, you should be able to see these two files; see Figure [6-7](#475651_1_En_6_Chapter.xhtml#Fig7).\n\
    \n### Ricardian Contracts\n\nOnce you generate your WASM and ABI files, notice\
    \ that you are getting more than 20 warnings. Among these warnings, you should\
    \ find the following warnings in the output:\n\n```\nWarning, empty ricardian\
    \ clause file\nWarning, empty ricardian clause file\nWarning, action  does not\
    \ have a ricardian contract\n```\n\n### Note\n\nRicardian contracts were invented\
    \ by Ian Grigg in 1996 to help bridge the gap between software application and\
    \ court of law. The Ricardian contracts file in EOS is a digital document in Markdown\
    \ Language format (`.md`, `.markdown`) and defines the terms and conditions of\
    \ the interaction between the parties. It is set as parameters but written as\
    \ readable text. EOS uses cryptographically to sign and verify the Ricardian contracts.\n\
    \nTo help generate the Ricardian contracts, you can copy a Python script and template\
    \ from a contributor that generates the files automatically: [`https://github.com/EOS-Mainnet/governance`](https://github.com/EOS-Mainnet/governance)\
    \ .\n\nAs it’s just three files, instead of using `clone`, you can use `wget`\
    \ to download these files.\n\nCheck that you have `wget` installed on your machine.\n\
    \n```\n> wget --help\n```\n\nIn case it’s not installed, install `wget` on macOS\
    \ via Ruby and Brew.\n\n```\n> ruby -e \"$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/master/install)\"\
    \  /dev/null\n> brew install wget\n> brew upgrade wget\n```\n\nNext, inside your\
    \ `helloworld` project, create the directory and download the files you need.\n\
    \n```\n> cd ~/desktop/helloworld\n> mkdir rc && cd $_\n> wget https://raw.githubusercontent.com/EOS-Mainnet/governance/master/scripts/abi_to_rc/abi_to_rc.py\n\
    > wget https://raw.githubusercontent.com/EOS-Mainnet/governance/master/scripts/abi_to_rc/rc-action-template.md\n\
    > wget https://raw.githubusercontent.com/EOS-Mainnet/governance/master/scripts/abi_to_rc/rc-overview-template.md\n\
    ```\n\nNext, run the Python script.\n\n```\n> cd ../\n> python rc/abi_to_rc.py\
    \ helloworld.abi\n```\n\nThe script generates for you automatically `helloworld-rc.md`\
    \ and `helloworld-hello-rc.md` already formatted in the Markdown language. If\
    \ you view these files, you will notice that the Python script used the templates\
    \ you downloaded to generate your files, and you can fill in the terms and conditions\
    \ about your smart contract.\n\nYou can lay out the guidelines of what exactly\
    \ your users are purchasing/exchanging and allow better trust between parties;\
    \ it can include terms and conditions such as intent, warranty, remedies, force\
    \ majeure, dispute resolution, governing law, and many others. Pay close attention\
    \ to the terms you set as these can be enforced in a court of law. These terms\
    \ allow skipping middlemen such as attorneys to have the smart contract set the\
    \ terms and conditions that both parties agree to."
  trans: "\n# 自定义、单签名与多重签名\n\n默认情况下，你的账户配置为单签名模式，因为该模式使用默认权限（`active` 和 `owner`）授权操作。但你可以将账户配置为使用多重签名或自定义权限。例如，你可以为账户配置多个密钥，用于授权特定的\
    \ `owner` 操作和 `active` 操作。例如，你可以利用此功能创建一个名为 `publish` 的权限，并将其授予某个账户，使其仅能发布智能合约，而无法提取代币。\n\
    \n# “HelloWorld”智能合约\n\n你将编写一段最小化代码的智能合约，并将其命名为“HelloWorld”。\n\n## “HelloWorld”智能合约账户\n\
    \n首先，你需要为智能合约创建两个账户：一个用于发布智能合约，另一个用于与用户交互。输出结果如图 6-6 所示。\n\n![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig6_HTML.jpg](img/475651_1_En_6_Fig6_HTML.jpg)\n\
    \n图 6-6\n\n为“HelloWorld”智能合约创建账户\n\n```\n> cleos create account eosio helloworld\
    \ [公钥]\n> cleos create account eosio john [公钥]\n```\n\n## “HelloWorld”的 C++ 代码\n\
    \nEOS 选择了 C++ 语言，这在区块链开发者社区中引发了褒贬不一的评价。C++ 是一种底层语言，能够更好地管理内存指针和运算符重载等资源，从而可能带来更优的性能。但代价是编写代码的工作量增加，特别是当你不熟悉\
    \ C++ 时。\n\nEOS.IO 的基础架构就是用 C++ 编写的，因此 EOS.IO 团队选择 C++ 也就不足为奇了。EOS.IO 的智能合约使用\
    \ C++ 编写，并以 CPP 文件格式保存；之后需要将 C++ 代码编译成 WebAssembly，再进行部署。\n\n### 注意\n\nEOS.IO\
    \ 智能合约的源文件可分为三种：CPP、HPP 和 Ricardian。HPP 文件定义了智能合约的类、动作和数据表。CPP 文件是实现动作逻辑的 C++\
    \ 代码。Ricardian 文件是一种数字文档（下一节将详细介绍）。\n\n首先，进入目录并创建 `helloworld` 合约目录。\n\n```\n\
    > mkdir ~/Desktop/helloworld && cd $_\n```\n\n注意，这里使用了桌面目录，但你也可以使用任何你喜欢的目录。接下来，使用\
    \ vim 或你喜欢的文本编辑器粘贴 `helloworld.cpp` 代码。\n\n```\n> vim helloworld.cpp\n#include\
    \ \nusing namespace eosio;\nclass helloworld : public contract {\npublic:\nusing\
    \ contract::contract;\n[[eosio::action]]\nvoid hello( name user ) {\nprint( \"\
    World: User: \", user);\n}\n};\nEOSIO_DISPATCH(helloworld, (hello))\n```\n\n这段代码导入了\
    \ EOS.IO 库。`HelloWorld` 类继承自 `contract` 类型，你创建了一个名为 `hello` 的方法。这个方法就是你的动作；你传入用户参数并打印出单词\
    \ *world* 和用户名。当用户与你的合约交互并调用 `hello` 动作时，他们将获得 `world` 以及用户名。\n\n注意，在这个示例中，你包含了\
    \ `eosio.hpp` 文件。要调试 EOS.IO 智能合约，你需要采用老式的“穴居人调试法”。\n\n### 注意\n\n“穴居人调试法”，也就是 `printf()`\
    \ 调试法，本质上就是在代码中插入 `print` 语句。EOS.IO 的打印 API 支持字符数组、64 位和 128 位无符号整数等。打印功能通过将 C++\
    \ 代码 `printi`、`prints_l`、`printi128` 等封装在 `print.hpp` 中实现，而 `print.hpp` 已通过 `import\
    \ eosio.hpp` 库语句包含。\n\n## 智能合约 IDE\n\n使用终端是完全可行的，但随着代码变得复杂，使用专业的 IDE 在代码补全、高亮和可读性方面会更有帮助。你可以使用自己偏好的\
    \ IDE。既然你已经使用过 WebStorm，可以继续将项目导入到 WebStorm 中。WebStorm 已经包含了 C++ 插件，因此无需安装任何特殊插件。图\
    \ 6-7 显示了在 WebStorm 中打开的 HelloWorld 项目。\n\n要导入项目，请选择“文件” ➤ “打开”，然后导航到项目位置：`~/Desktop/helloworld`。\n\
    \n![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig7_HTML.jpg](img/475651_1_En_6_Fig7_HTML.jpg)\n\
    \n图 6-7\n\n导入到 WebStorm 2018.2.4 版本的 HelloWorld 项目\n\n## 编译合约并生成 ABI\n\n如之前所述，`eosio-cpp`\
    \ 工具可以将 C++ 代码生成 WebAssembly 和 ABI。这通过运行以下命令完成：\n\n```\n> eosio-cpp -o helloworld.wasm\
    \ helloworld.cpp --abigen\n```\n\n注意，在命令中指定了输出文件名 `helloworld.wasm`。运行此命令后，编译器将生成以下文件：`helloworld.wasm`\
    \ 和 `helloworld.abi`。\n\n要验证编译器是否按预期工作，你应该能看到这两个文件；见图 6-7。\n\n### Ricardian 合约\n\
    \n生成 WASM 和 ABI 文件后，你会注意到收到了超过 20 条警告。在这些警告中，你应该能看到如下输出：\n\n```\n警告，空的 Ricardian\
    \ 条款文件\n警告，空的 Ricardian 条款文件\n警告，动作 没有相关的 Ricardian 合约\n```\n\n### 注意\n\nRicardian\
    \ 合约由 Ian Grigg 于 1996 年发明，旨在弥合软件应用与法院之间的鸿沟。EOS 中的 Ricardian 合约文件是一种 Markdown\
    \ 语言格式（`.md`，`.markdown`）的数字文档，定义了各方之间交互的条款和条件。它虽然以参数形式设置，但以可读文本编写。EOS 使用密码学方法对\
    \ Ricardian 合约进行签名和验证。\n\n为了帮助你生成 Ricardian 合约，你可以从一位贡献者那里复制一个 Python 脚本和模板，这些脚本和模板能自动生成文件：[`https://github.com/EOS-Mainnet/governance`](https://github.com/EOS-Mainnet/governance)。\n\
    \n由于只有三个文件，你可以使用 `wget` 而不是 `clone` 来下载这些文件。\n\n首先检查你的机器上是否已安装 `wget`。\n\n```\n\
    > wget --help\n```\n\n如果尚未安装，可以通过 Ruby 和 Brew 在 macOS 上安装 `wget`。\n\n```\n> ruby\
    \ -e \"$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/master/install)\"\
    \  /dev/null\n> brew install wget\n> brew upgrade wget\n```\n\n接下来，在 `helloworld`\
    \ 项目中创建目录并下载所需的文件。\n\n```\n> cd ~/desktop/helloworld\n> mkdir rc && cd $_\n> wget\
    \ https://raw.githubusercontent.com/EOS-Mainnet/governance/master/scripts/abi_to_rc/abi_to_rc.py\n\
    > wget https://raw.githubusercontent.com/EOS-Mainnet/governance/master/scripts/abi_to_rc/rc-action-template.md\n\
    > wget https://raw.githubusercontent.com/EOS-Mainnet/governance/master/scripts/abi_to_rc/rc-overview-template.md\n\
    ```\n\n然后，运行 Python 脚本。\n\n```\n> cd ../\n> python rc/abi_to_rc.py helloworld.abi\n\
    ```\n\n该脚本会自动为你生成 `helloworld-rc.md` 和 `helloworld-hello-rc.md` 文件，并已格式化为 Markdown\
    \ 语言。如果你查看这些文件，会发现 Python 脚本使用你下载的模板生成了文件，你可以填充有关智能合约的条款和条件。\n\n你可以制定用户具体购买/交换内容的指南，从而在各方之间建立更好的信任；这可以包括意图、保证、补救措施、不可抗力、争议解决、适用法律等条款和条件。请密切关注你设置的条款，因为它们可能在法庭上具有强制执行力。这些条款允许跳过律师等中间人，让智能合约直接设定双方同意的条款和条件。\n"
- fmt: '# Deploy a Contract


    To deploy your smart contract to your local testnet network, the `set contract`
    command is used to upload the contract. See Figure [6-8](#475651_1_En_6_Chapter.xhtml#Fig8)
    for the expected output.


    ![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig8_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Terminal output of deploying your smart contract


    ```

    > cleos set contract helloworld ~/Desktop/helloworld -p helloworld@active

    ```


    ## Interact with a Smart Contract Action


    Now that you have your smart contract deployed on your local blockchain, you can
    interact with the `hello` action you created. You will call the `hello` action
    and pass your username to the user’s active key. See the output in Figure [6-9](#475651_1_En_6_Chapter.xhtml#Fig9).


    ![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig9_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig9_HTML.jpg)


    Figure 6-9


    Terminal output of push action on a smart contract


    ```

    > cleos push action helloworld hello ''["john"]'' -p john@active

    ```


    You can download the entire smart contract project from here: [`https://github.com/Apress/the-blockchain-developer/chapter6/helloworld/`](https://github.com/Apress/the-blockchain-developer/chapter6/helloworld/).


    ## Smart Contact Tokens


    The EOS.IO GitHub project has a library of smart contracts as examples that can
    be used. One of these libraries is a smart contract called `eosio.token`. This
    contract enables developers to create other tokens as well as transfer a token.
    You will be using these libraries to create your own tokens. To get started, you
    will create a new smart contract project and call it `eosio.token`.


    ```

    > mkdir ~/Desktop/eosio.token && cd $_

    ```


    ### Create Accounts


    Token gets issued by an “issuer” account. You will start off by creating the “issuer”
    account and an account called `jane` that you can use to transfer some tokens.


    ```

    > cleos create account eosio eosio.token [public key]

    > cleos create account eosio jane [public key]

    ```


    ### Compile wasm with the Latest eosio.token Code


    To issue `eosio.token`, you will be using the `eosio.token.hpp` file that defines
    the contract’s class, actions, and tables, as well as `eosio.token.cpp` that holds
    the logic and coding. You can find these files and the entire SmartContract project
    here: [`https://github.com/Apress/the-blockchain-developer/chapter6/eosio.token/`](https://github.com/Apress/the-blockchain-developer/chapter6/eosio.token/).


    Next, ensure you change the `include` statement in the CPP code to point to the
    HPP file you downloaded from GitHub using vim or your favorite text editor.


    ```

    > vim eosio.token.cpp

    ```


    Change the `eosio.token.cpp` file on line 6 to point to the location of `eosio.token.hpp`
    file; in this case, it’s here:


    ```

    include "~/Desktop/eosio.token/eosio.token.hpp"

    ```


    ### Deploy eosio.token


    Equipped with `eosio.token.hpp` and `eosio.token.cpp`, you have all the files
    needed. You can compile the latest HPP and CPP files to generate the `.wasm` code
    with the `eosio-cpp` command, just as you did in the HelloWorld smart contract
    example.


    ```

    > eosio-cpp -o eosio.token.wasm eosio.token.cpp --abigen

    ```


    Next, deploy the `eosio.token` contract using the `set contract` command.


    ```

    > cleos wallet unlock --password [DEFAULT_MASTER_KEY]

    > cleos set contract eosio.token ~/Desktop/eosio.token --abi eosio.token.abi -p
    eosio.token@active

    ```


    ### Create the EOS.IO Token


    To create your new token, you utilize the `create` action. You will be passing
    the `symbol_name` type, which includes two parameters.


    - *Maximum supply float*: In this example, you’ll set this to 20 million as your
    max tokens: `20000000.0000`.

    - *Symbol*: For `symbol_name`, you need to pick a name. The name must be capital
    alpha characters only; in this example, select the name `TOKEN`.


    The “issuer” account has the authority to make a call issue action or any other
    actions such as recalling, freezing, and whitelisting owners.


    To create a new token action, run the following command. See Figure [6-10](#475651_1_En_6_Chapter.xhtml#Fig10)
    for the expected output.


    ![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig10_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig10_HTML.jpg)


    Figure 6-10


    Expected output for creating an eosio.token action


    ```

    > cleos wallet unlock --password [DEFAULT_MASTER_KEY]

    > cleos push action eosio.token create ''[ "eosio", "20000000.0000 TOKEN"]'' -p
    eosio.token@active

    ```


    You can confirm the tokens were issued by calling the `currency stats` command.


    ```

    > cleos get currency stats eosio.token TOKEN

    {

    "TOKEN": {

    "supply": "0.0000 TOKEN",

    "max_supply": "20000000.0000 TOKEN",

    "issuer": "eosio"

    }

    }

    ```


    ### Issue Tokens


    Let’s create another account that you can use to send some of the tokens you issued.
    We’ll call this account `jane`.


    ```

    > cleos create account eosio jane [public key]

    ```


    Next, call the “issue” action to issue tokens. In this example, you will issue
    `jane` 500 tokens.


    ```

    > cleos push action eosio.token issue ''[ "jane", "500.0000 TOKEN", "move tokens
    to Jane" ]'' -p eosio@active

    ```


    To see the `TOKEN` balance in the `jane` account, you can use the `get currency`
    command.


    ```

    > cleos get currency balance eosio.token jane TOKEN

    500.0000 TOKEN

    ```


    ### Transfer Tokens


    To transfer tokens, you run the `transfer` action. As an example, let’s transfer
    tokens from Jane’s account to John’s account.


    ```

    > cleos push action eosio.token transfer ''[ "jane", "john", "100.0000 TOKEN",
    "transfer tokens" ]'' -p jane@active

    ```


    You can confirm John’s account received the tokens by running the `currency balance`
    command on both accounts to ensure the math adds up.


    ```

    > cleos get currency balance eosio.token jane TOKEN

    400.0000 TOKEN

    > cleos get currency balance eosio.token john TOKEN

    100.0000 TOKEN

    ```


    Figure [6-11](#475651_1_En_6_Chapter.xhtml#Fig11) shows the expected output.


    ![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig11_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig11_HTML.jpg)


    Figure 6-11


    Expected output for creating, transferring, and balancing eosio.token actions


    ## Connecting to a Public Testnet Block Producer


    At the time of writing, EOS.IO provides two public testnets so you can test in
    a more realistic environment before committing your code to mainnet.


    - *Jungle2.0*: [`https://jungletestnet.io/`](https://jungletestnet.io/)

    - *Kylin*: [`https://www.cryptokylin.io/`](https://www.cryptokylin.io/)


    I chose Jungle2.0 for the public testnet in this example, but feel free to test
    both; it’s the same process just with different endpoints.


    To get started, visit the Jungle project’s GitHub page here: [`https://github.com/CryptoLions/EOS-Jungle-Testnet`](https://github.com/CryptoLions/EOS-Jungle-Testnet).


    The EOS Jungle testnet is almost identical to your local testnet. You just need
    to set up the Jungle API endpoint and generate EOS faucet tokens to pay for the
    account’s creation and RAM usage.


    The testnet API endpoint is [`https://jungle.eosio.cr:443`](https://jungle.eosio.cr:443);
    just add the endpoint so your previous commands will work.'
  raw: '## Deploy a Contract


    To deploy your smart contract to your local testnet network, the `set contract`
    command is used to upload the contract. See Figure [6-8](#475651_1_En_6_Chapter.xhtml#Fig8)
    for the expected output.


    ![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig8_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Terminal output of deploying your smart contract


    ```

    > cleos set contract helloworld ~/Desktop/helloworld -p helloworld@active

    ```


    ## Interact with a Smart Contract Action


    Now that you have your smart contract deployed on your local blockchain, you can
    interact with the `hello` action you created. You will call the `hello` action
    and pass your username to the user’s active key. See the output in Figure [6-9](#475651_1_En_6_Chapter.xhtml#Fig9).


    ![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig9_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig9_HTML.jpg)


    Figure 6-9


    Terminal output of push action on a smart contract


    ```

    > cleos push action helloworld hello ''["john"]'' -p john@active

    ```


    You can download the entire smart contract project from here: [`https://github.com/Apress/the-blockchain-developer/chapter6/helloworld/`](https://github.com/Apress/the-blockchain-developer/chapter6/helloworld/)
    .


    ## Smart Contact Tokens


    The EOS.IO GitHub project has a library of smart contracts as examples that can
    be used. One of these libraries is a smart contract called `eosio.token` . This
    contract enables developers to create other tokens as well as transfer a token.
    You will be using these libraries to create your own tokens. To get started, you
    will create a new smart contract project and call it `eosio.token`.


    ```

    > mkdir ~/Desktop/eosio.token && cd $_

    ```


    ### Create Accounts


    Token gets issued by an “issuer” account. You will start off by creating the “issuer”
    account and an account called `jane` that you can use to transfer some tokens.


    ```

    > cleos create account eosio eosio.token [public key]

    > cleos create account eosio jane [public key]

    ```


    ### Compile wasm with the Latest eosio.token Code


    To issue `eosio.token`, you will be using the `eosio.token.hpp` file that defines
    the contract’s class, actions, and tables, as well as `eosio.token.cpp` that holds
    the logic and coding. You can find these files and the entire SmartContract project
    here: [`https://github.com/Apress/the-blockchain-developer/chapter6/eosio.token/`](https://github.com/Apress/the-blockchain-developer/chapter6/eosio.token/)
    .


    Next, ensure you change the `include` statement in the CPP code to point to the
    HPP file you downloaded from GitHub using vim or your favorite text editor.


    ```

    > vim eosio.token.cpp

    ```


    Change the `eosio.token.cpp` file on line 6 to point to the location of `eosio.token.hpp`
    file ; in this case, it’s here:


    ```

    include "~/Desktop/eosio.token/eosio.token.hpp"

    ```


    ### Deploy eosio.token


    Equipped with `eosio.token.hpp` and `eosio.token.cpp`, `you` have all the files
    needed. You can compile the latest HPP and CPP files to generate the `.wasm` code
    with the `eosio-cpp` command, just as you did in the HelloWorld smart contract
    example.


    ```

    > eosio-cpp -o eosio.token.wasm eosio.token.cpp --abigen

    ```


    Next, deploy the `eosio.token` contract using the `set contract` command.


    ```

    > cleos wallet unlock --password [DEFAULT_MASTER_KEY]

    > cleos set contract eosio.token ~/Desktop/eosio.token --abi eosio.token.abi -p
    eosio.token@active

    ```


    ### Create the EOS.IO Token


    To create your new token, you utilize the `create` action. You will be passing
    the `symbol_name` type, which includes two parameters.


    *   *Maximum supply float*: In this example, you’ll set this to 20 million as
    your max tokens: `20000000.0000`.


    *   *Symbol*: For `symbol_name`, you need to pick a name. The name must be capital
    alpha characters only; in this example, select the name `TOKEN` .


    The “issuer” account has the authority to make a call issue action or any other
    actions such as recalling, freezing, and whitelisting owners.


    To create a new token action, run the following command. See Figure [6-10](#475651_1_En_6_Chapter.xhtml#Fig10)
    for the expected output.


    ![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig10_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig10_HTML.jpg)


    Figure 6-10


    Expected output for creating an eosio.token action


    ```

    > cleos wallet unlock --password [DEFAULT_MASTER_KEY]

    > cleos push action eosio.token create ''[ "eosio", "20000000.0000 TOKEN"]'' -p
    eosio.token@active

    ```


    You can confirm the tokens were issued by calling the `currency stats` command.


    ```

    > cleos get currency stats eosio.token TOKEN

    {

    "TOKEN": {

    "supply": "0.0000 TOKEN",

    "max_supply": "20000000.0000 TOKEN",

    "issuer": "eosio"

    }

    }

    ```


    ### Issue Tokens


    Let’s create another account that you can use to send some of the tokens you issued.
    We’ll call this account `jane`.


    ```

    > cleos create account eosio jane [public key]

    ```


    Next, call the “issue” action to issue tokens. In this example, you will issue
    `jane` 500 tokens.


    ```

    > cleos push action eosio.token issue ''[ "jane", "500.0000 TOKEN", "move tokens
    to Jane" ]'' -p eosio@active

    ```


    To see the `TOKEN` balance in the `jane` account, you can use the `get currency`
    command .


    ```

    > cleos get currency balance eosio.token jane TOKEN

    500.0000 TOKEN

    ```


    ### Transfer Tokens


    To transfer tokens, you run the `transfer` action. As an example, let’s transfer
    tokens from Jane’s account to John’s account.


    ```

    > cleos push action eosio.token transfer ''[ "jane", "john", "100.0000 TOKEN",
    "transfer tokens" ]'' -p jane@active

    ```


    You can confirm John’s account received the tokens by running the `currency balance`
    command on both accounts to ensure the math adds up.


    ```

    > cleos get currency balance eosio.token jane TOKEN

    400.0000 TOKEN

    > cleos get currency balance eosio.token john TOKEN

    100.0000 TOKEN

    ```


    Figure [6-11](#475651_1_En_6_Chapter.xhtml#Fig11) shows the expected output.


    ![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig11_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig11_HTML.jpg)


    Figure 6-11


    Expected output for creating, transferring, and balancing eosio.token actions


    ## Connecting to a Public Testnet Block Producer


    At the time of writing, EOS.IO provides two public testnets so you can test in
    a more realistic environment before committing your code to mainnet.


    *   *Jungle2.0*: [`https://jungletestnet.io/`](https://jungletestnet.io/)


    *   *Kylin*: [`https://www.cryptokylin.io/`](https://www.cryptokylin.io/)


    I chose Jungle2.0 for the public testnet in this example, but feel free to test
    both; it’s the same process just with different endpoints.


    To get started, visit the Jungle project’s GitHub page here: [`https://github.com/CryptoLions/EOS-Jungle-Testnet`](https://github.com/CryptoLions/EOS-Jungle-Testnet)
    .


    The EOS Jungle testnet is almost identical to your local testnet. You just need
    to set up the Jungle API endpoint and generate EOS faucet tokens to pay for the
    account’s creation and RAM usage.


    The testnet API endpoint is [`https://jungle.eosio.cr:443`](https://jungle.eosio.cr:443)
    ; just add the endpoint so your previous commands will work.'
  trans: '

    # 部署合约


    若要将智能合约部署到本地测试网，可使用 `set contract` 命令上传合约。预期输出结果如图 6-8 所示。


    ![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig8_HTML.jpg](img/475651_1_En_6_Fig8_HTML.jpg)


    图 6-8


    部署智能合约的终端输出


    ```

    > cleos set contract helloworld ~/Desktop/helloworld -p helloworld@active

    ```


    ## 与智能合约交互


    现在智能合约已部署到本地区块链，你可以与你创建的 `hello` 动作进行交互。你需要调用 `hello` 动作，并将用户名传递给用户的活跃密钥。输出结果如图
    6-9 所示。


    ![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig9_HTML.jpg](img/475651_1_En_6_Fig9_HTML.jpg)


    图 6-9


    智能合约推送动作的终端输出


    ```

    > cleos push action helloworld hello ''["john"]'' -p john@active

    ```


    你可以从此处下载完整的智能合约项目：[`https://github.com/Apress/the-blockchain-developer/chapter6/helloworld/`](https://github.com/Apress/the-blockchain-developer/chapter6/helloworld/).


    ## 智能合约代币


    EOS.IO GitHub 项目包含一个智能合约库，其中提供了可供参考的示例。其中一个库就是名为 `eosio.token` 的智能合约。该合约允许开发者创建其他代币，并实现代币转账。你将使用这些库来创建自己的代币。首先，创建一个新的智能合约项目，并将其命名为
    `eosio.token`。


    ```

    > mkdir ~/Desktop/eosio.token && cd $_

    ```


    ### 创建账户


    代币由“发行者”账户发行。首先，你需要创建“发行者”账户，以及一个名为 `jane` 的账户，用于后续代币转账。


    ```

    > cleos create account eosio eosio.token [公钥]

    > cleos create account eosio jane [公钥]

    ```


    ### 使用最新 eosio.token 代码编译 wasm


    为发行 `eosio.token`，你需要使用 `eosio.token.hpp` 文件（定义合约的类、动作和表）以及 `eosio.token.cpp`
    文件（包含逻辑和编码）。你可以在此处找到这些文件及整个智能合约项目：[`https://github.com/Apress/the-blockchain-developer/chapter6/eosio.token/`](https://github.com/Apress/the-blockchain-developer/chapter6/eosio.token/).


    接下来，请确保使用 vim 或其他文本编辑器修改 CPP 代码中的 `include` 语句，使其指向从 GitHub 下载的 HPP 文件。


    ```

    > vim eosio.token.cpp

    ```


    将 `eosio.token.cpp` 文件中的第 6 行修改为指向 `eosio.token.hpp` 文件的位置，本例中位置如下：


    ```

    include "~/Desktop/eosio.token/eosio.token.hpp"

    ```


    ### 部署 eosio.token


    准备好 `eosio.token.hpp` 和 `eosio.token.cpp` 后，你就拥有了所有必需的文件。可以使用 `eosio-cpp` 命令编译最新的
    HPP 和 CPP 文件，以生成 `.wasm` 代码，这与 HelloWorld 智能合约示例的操作相同。


    ```

    > eosio-cpp -o eosio.token.wasm eosio.token.cpp --abigen

    ```


    接下来，使用 `set contract` 命令部署 `eosio.token` 合约。


    ```

    > cleos wallet unlock --password [默认主密钥]

    > cleos set contract eosio.token ~/Desktop/eosio.token --abi eosio.token.abi -p
    eosio.token@active

    ```


    ### 创建 EOS.IO 代币


    要创建新代币，你需要使用 `create` 动作。此动作接收 `symbol_name` 类型参数，该参数包含两个部分：


    - *最大供应量浮点数*：本例中将最大代币数设为 2000 万，即 `20000000.0000`。

    - *符号*：为 `symbol_name` 选择一个名称。名称必须全部为大写英文字母；本例中选择名称 `TOKEN`。


    “发行者”账户有权调用发行动作或其他动作，例如召回、冻结和设置白名单所有者。


    要创建新的代币动作，请运行以下命令。预期输出结果如图 6-10 所示。


    ![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig10_HTML.jpg](img/475651_1_En_6_Fig10_HTML.jpg)


    图 6-10


    创建 eosio.token 动作的预期输出


    ```

    > cleos wallet unlock --password [默认主密钥]

    > cleos push action eosio.token create ''[ "eosio", "20000000.0000 TOKEN"]'' -p
    eosio.token@active

    ```


    你可以通过调用 `currency stats` 命令来确认代币已发行。


    ```

    > cleos get currency stats eosio.token TOKEN

    {

    "TOKEN": {

    "supply": "0.0000 TOKEN",

    "max_supply": "20000000.0000 TOKEN",

    "issuer": "eosio"

    }

    }

    ```


    ### 发行代币


    我们再创建一个账户，用于接收你发行的部分代币。这个账户将被命名为 `jane`。


    ```

    > cleos create account eosio jane [公钥]

    ```


    接下来，调用“issue”动作来发行代币。本例中，你将向 `jane` 发行 500 个代币。


    ```

    > cleos push action eosio.token issue ''[ "jane", "500.0000 TOKEN", "move tokens
    to Jane" ]'' -p eosio@active

    ```


    要查看 `jane` 账户中的 `TOKEN` 余额，你可以使用 `get currency` 命令。


    ```

    > cleos get currency balance eosio.token jane TOKEN

    500.0000 TOKEN

    ```


    ### 转账代币


    要进行代币转账，你需要运行 `transfer` 动作。举例来说，我们将代币从 Jane 的账户转给 John 的账户。


    ```

    > cleos push action eosio.token transfer ''[ "jane", "john", "100.0000 TOKEN",
    "transfer tokens" ]'' -p jane@active

    ```


    你可以通过对两个账户分别运行 `currency balance` 命令来确认 John 的账户已收到代币，并验证数学计算是否正确。


    ```

    > cleos get currency balance eosio.token jane TOKEN

    400.0000 TOKEN

    > cleos get currency balance eosio.token john TOKEN

    100.0000 TOKEN

    ```


    图 6-11 显示了预期输出。


    ![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig11_HTML.jpg](img/475651_1_En_6_Fig11_HTML.jpg)


    图 6-11


    创建、转账及查询 eosio.token 动作余额的预期输出


    ## 连接公共测试网区块生产者


    在撰写本文时，EOS.IO 提供了两个公共测试网，你可以在将代码提交到主网之前，在更真实的环境中进行测试。


    - *Jungle2.0*：[`https://jungletestnet.io/`](https://jungletestnet.io/)

    - *Kylin*：[`https://www.cryptokylin.io/`](https://www.cryptokylin.io/)


    本例中，我选择 Jungle2.0 作为公共测试网，但你也可以同时测试两者；流程相同，仅端点不同。


    首先，请访问 Jungle 项目的 GitHub 页面：[`https://github.com/CryptoLions/EOS-Jungle-Testnet`](https://github.com/CryptoLions/EOS-Jungle-Testnet)。


    EOS Jungle 测试网与你的本地测试网几乎完全相同。你只需设置 Jungle API 端点并生成 EOS 水龙头代币，用于支付账户创建和 RAM 使用费用。


    测试网 API 端点为 [`https://jungle.eosio.cr:443`](https://jungle.eosio.cr:443)；只需添加此端点，你之前的命令即可正常工作。

    '
- fmt: "### Note\n\n始终在测试网上测试代码，然后再将代码发布到主网。仅在2018年9月，就有价值24万美元的`EOS`代币从`EOSBet`的智能合约账户中被盗，原因是智能合约的编程漏洞被黑客利用，而非`EOS.IO`平台本身的缺陷。你将在第[10](#475651_1_En_10_Chapter.xhtml)章中了解更多关于安全性的内容。\n\
    \n要创建账户，你需要生成两个默认权限：`owner`和`active`。你可以通过访问[`https://nadejde.github.io/eos-token-sale/`](https://nadejde.github.io/eos-token-sale/)或重复运行之前使用过的相同命令行来实现。\n\
    \n```\n> cleos create key --to-console\nPrivate key: [key]\nPublic key: [key]\n\
    ```\n\n接下来，你需要创建一个账户。你可以访问`Jungle`页面，并使用生成的公钥来创建账户：[`https://monitor.jungletestnet.io/#account`](https://monitor.jungletestnet.io/%2523account)。\n\
    \n我随机选择了一个名称`liontestaa11`，但你可以随意使用任何你想要的名称。不过，请注意严格的命名限制（仅允许使用a–z和1–5，长度必须为12个字符）。如果不遵守此命名限制，你的账户将无法创建。见图[6-12](#475651_1_En_6_Chapter.xhtml#Fig12)。\n\
    \n![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig12_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig12_HTML.jpg)\n\
    \n**图 6-12**  \n`Jungle2.0`的`liontestaa11`账户已创建\n\n注意，你会看到与本地测试网相同的关于交易正在执行但尚未确认的警告。\n\
    \n要获取测试网的信息，你可以运行与本地测试网相同的`get info`命令。只需添加`Jungle`端点的URL参数即可。\n\n```\n> cleos\
    \ --url https://jungle.eosio.cr:443 get info\n```\n\n所有`cleos`命令都需要URL端点参数；你可以编辑你的bash配置文件，将`cleos`指向你想要的URL。编辑bash配置文件，将区块生产者的端点指向公共测试网，同时钱包仍指向本地机器。\n\
    \n```\n> vim ~/.bash_profile\n```\n\n添加以下行：\n\n```\nalias cleos-testnet='cleos\
    \ --url https://jungle.eosio.cr:443 --wallet-url http://localhost:8888'\n```\n\
    \n这里你没有设置自定义端口的`config.ini`文件，但将端口改为了`8888`。请记住，要运行bash配置文件以提交更改，请执行以下操作：\n\n\
    ```\n> . ~/.bash_profile\n```\n\n现在，你可以使用`cleos-testnet`运行所有命令。\n\n```\n> cleos-testnet\
    \ get info\n```\n\n### 在公共测试网区块生产者上购买资源分配\n\n现在，你将发布上一节中创建的“HelloWorld”智能合约。\n\
    \n如果你要在主网上发布合约，你需要购买`RAM`并支付费用来创建账户，这样才能发布智能合约。`EOS`代币用于购买资源。在公共测试网中，你不必为资源花费真钱。你可以获得用于`Jungle`区块生产者的虚假水龙头代币，以购买资源。\n\
    \n要获取这些代币，你只需要提供你的账户名称。在`Jungle`水龙头中输入你的账户名称以获取代币：[`http://monitor.jungletestnet.io/#faucet`](http://monitor.jungletestnet.io/%2523faucet)。见图[6-13](#475651_1_En_6_Chapter.xhtml#Fig13)。\n\
    \n我将在下一节中更详细地解释资源分配，届时你将准备发布到主网。\n\n![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig13_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig13_HTML.jpg)\n\
    \n**图 6-13**  \n`Jungle2.0`通过`Jungle`水龙头获取代币\n\n你可以使用`get account`命令检查账户余额；输出结果见图[6-14](#475651_1_En_6_Chapter.xhtml#Fig14)。\n\
    \n![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig14_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig14_HTML.jpg)\n\
    \n**图 6-14**  \n`Jungle`水龙头账户余额\n\n```\n> cleos --url https://jungle.eosio.cr:443\
    \ get account liontestaa11\n```\n\n现在你有了`EOS`代币，可以运行`cleos system buyram`命令来购买`RAM`，以便发布智能合约。\n\
    \n```\n> cleos --url https://jungle.eosio.cr:443 system buyram liontestaa11 liontestaa11\
    \ \"10 EOS\"\n```\n\n### 在公共测试网上发布你的HelloWorld合约\n\n现在你有了代币，可以在公共测试网上发布你的`HelloWorld`智能合约。运行`set\
    \ contract`命令。\n\n```\n> cleos --url https://jungle.eosio.cr:443 set contract\
    \ liontestaa11 ~/Desktop/helloworld\n```\n\n你可以使用`get code`命令确认代码已发布。你可以在图[6-15](#475651_1_En_6_Chapter.xhtml#Fig15)中看到预期的完整输出。\n\
    \n![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig15_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig15_HTML.jpg)\n\
    \n**图 6-15**  \n在公共测试网上发布合约时的预期输出\n\n```\n> cleos --url https://jungle.eosio.cr:443\
    \ get code liontestaa11\n```\n\n## 连接到主网\n\n`EOS.IO`主网与测试网几乎相同；你只需要使用不同的API端点，并实际用真实的`EOS`代币支付账户和`RAM`的费用。\n\
    \n获取`EOS`代币主要有三种方式：\n\n*   *挖矿*：创建区块生产者并挖取`EOS`。\n*   *购买EOS代币*：可以在加密货币交易所购买。\n\
    *   *赠送*：从他人那里获得`EOS`作为礼物。\n\n正如你在前面章节中所见，创建区块生产者并让`EOS.IO`网络选中并非易事，也无法保证成功；而且你只需要一些代币来购买`RAM`以开设账户和获取资源，所以不需要太多代币。因此，直接购买这些代币会更容易。\n\
    \n你需要首先在法币交易所（如`Coinbase`、`CEX.io`或`Coinmama`）购买比特币、以太坊或其他币种。然后使用`Binance`或`Changelly`等交易所将你的币种兑换为`EOS`代币。原因是，在撰写本文时，还没有已知的交易所可以直接将你的法币兑换为`EOS`。\n\
    \n接下来，你需要一个端点。21个被选中的区块生产者能够为你提供端点。你可以在以下网址找到所有可用的区块生产者以及有关区块挖矿的其他数据：\n\n*   [`http://eosnetworkmonitor.io/`](http://eosnetworkmonitor.io/)\n\
    *   [`https://eostracker.io/producers`](https://eostracker.io/producers)\n\n找到你想使用的区块生产者后，在URL末尾添加`/bp.json`以查找端点。示例如下：[`https://api.eosnewyork.io/bp.json`](https://api.eosnewyork.io/bp.json)。\n\
    \n`JSON`输出会提供区块生产者的信息，并确保其已准备好使用。要设置URL，只需将`--url`标志调整为你想要连接的区块生产者；其余命令与公共测试网完全相同。\n\
    \n```\n> cleos --url https://api.eosnewyork.io:443 get info\n```\n\n与之前一样，你可以像编辑公共测试网配置那样编辑bash配置文件。\n\
    \n```\nalias cleos-mainnet='cleos --url https://api.eosnewyork.io:443 --wallet-url\
    \ http://localhost:8888'\n```\n\n你的bash配置文件应该如下所示：\n\n```\nPATH=\"/usr/local/eosio/bin:${PATH}\"\
    \nalias cleos-testnet='cleos --url https://jungle.eosio.cr:443 --wallet-url http://localhost:8888'\n\
    alias cleos-mainnet='cleos --url https://api.eosnewyork.io:443 --wallet-url http://localhost:8888'\n\
    ```\n\n通过运行`get info`命令确认其工作正常。\n\n```\n> cleos-mainnet get info\n```\n\n这里我将避免重复公共测试网部分中的相同步骤，以及花费真实现金在“HelloWorld”示例智能合约上。但是，我将介绍资源分配，因为你需要深入理解它才能在主网上发布智能合约。"
  raw: '### Note


    Always test on testnet before publishing your code to mainnet. In September 2018
    alone, $240,000 worth of EOS tokens were stolen from EOSBet’s smart contract accounts,
    and it was because of a smart contracts programming bug that was exploited by
    hackers and not bugs in the EOS.IO platform itself. You’ll learn more about security
    in Chapter [10](#475651_1_En_10_Chapter.xhtml).


    To create an account, you will generate the two default permissions: owner and
    active. You can do this at [`https://nadejde.github.io/eos-token-sale/`](https://nadejde.github.io/eos-token-sale/)
    or by running the same command line you used before twice.


    ```

    > cleos create key --to-console

    Private key: [key]

    Public key: [key]

    ```


    Next, you need to create an account. You can create an account by visiting the
    Jungle page and using the public keys you generated: [`https://monitor.jungletestnet.io/#account`](https://monitor.jungletestnet.io/%2523account)
    .


    I picked a random name of `liontestaa11`, but feel free to use any name you want.
    Just be careful of the strict name restrictions (a–z and 1–5 are allowed only,
    with a length of 12). If you don’t comply with this strict name restriction, your
    account won’t get created. See Figure [6-12](#475651_1_En_6_Chapter.xhtml#Fig12).


    ![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig12_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig12_HTML.jpg)


    Figure 6-12


    Jungle2.0’s liontestaa11 account was created


    Notice that you get the same warning as you got on your local testnet regarding
    the transaction being executed, but it’s not confirmed.


    To get information about the testnet, you can run the same `get info` command
    you ran for your local testnet. Just add the Jungle endpoint URL argument.


    ```

    > cleos --url https://jungle.eosio.cr:443 get info

    ```


    All the `cleos` commands need the URL endpoint argument; you can edit your bash
    file to point `cleos to t`he URL you want. Edit the bash profile and point to
    the public testnet for the block producer, while still pointing to your local
    machine for the wallet.


    ```

    > vim ~/.bash_profile

    ```


    Add the following line:


    ```

    alias cleos-testnet=''cleos --url https://jungle.eosio.cr:443 --wallet-url http://localhost:8888''

    ```


    You did not set the `config.ini` file here with a custom port, but you are changing
    the port to 8888\. Remember, to run the bash profile to commit the changes, run
    this:


    ```

    > . ~/.bash_profile

    ```


    Now you can run the all the commands with `cleos-testnet`.


    ```

    > cleos-testnet get info

    ```


    ### Buy Resource Allocation on the Public Testnet Block Producer


    Now you will be publishing your “HelloWorld” smart contract you created in the
    previous section.


    If you were publishing your contract on mainnet, you would need to buy RAM and
    pay to create your account so you could publish your smart contract. EOS tokens
    are used to purchase resources. In the public testnet, you don’t need to spend
    actual money for your resources. You get fake faucet tokens that can be used for
    the Jungle block producer to purchase your resources.


    To get these tokens, all you need is your account name. Type your account name
    to get tokens from the Jungle faucet: [`http://monitor.jungletestnet.io/#faucet`](http://monitor.jungletestnet.io/%2523faucet)
    . See Figure [6-13](#475651_1_En_6_Chapter.xhtml#Fig13).


    I’ll explain resource allocation in more detail in the next section when you ready
    to publish to mainnet.


    ![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig13_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig13_HTML.jpg)


    Figure 6-13


    Jungle2.0 gets tokens through the Jungle faucet


    You can check the account balance with the `get account` command; see the output
    in Figure [6-14](#475651_1_En_6_Chapter.xhtml#Fig14).


    ![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig14_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig14_HTML.jpg)


    Figure 6-14


    Jungle faucet account balance


    ```

    > cleos --url https://jungle.eosio.cr:443 get account liontestaa11

    ```


    Now that you have EOS tokens, you can run the `cleos system buyram` command to
    purchase RAM so you can publish your smart contract.


    ```

    > cleos --url https://jungle.eosio.cr:443 system buyram liontestaa11 liontestaa11
    "10 EOS"

    ```


    ### Publish Your HelloWorld Contract on the Public Testnet


    Now that you have tokens, you can publish your HelloWorld smart contract on the
    public testnet. Run the `set contract` command.


    ```

    > cleos --url https://jungle.eosio.cr:443 set contract liontestaa11 ~/Desktop/helloworld

    ```


    You can confirm the code was published using the `get code` command . You can
    see the entire expected output in Figure [6-15](#475651_1_En_6_Chapter.xhtml#Fig15).


    ![../images/475651_1_En_6_Chapter/475651_1_En_6_Fig15_HTML.jpg](images/475651_1_En_6_Chapter/475651_1_En_6_Fig15_HTML.jpg)


    Figure 6-15


    Expected output when publishing contract on public testnet


    ```

    > cleos --url https://jungle.eosio.cr:443 get code liontestaa11

    ```


    ## Connecting to Mainnet


    The EOS.IO mainnet is almost the same as the testnet; you just need to use a different
    API endpoint and actually pay for the accounts and RAM with real EOS tokens.


    There are three main ways to get EOS tokens:


    *   *Mine*: This creates a block producer and mines EOS.


    *   *Purchase EOS tokens*: They can be purchased on crypto exchanges.


    *   *Gift*: This gets an EOS as a gift from someone.


    As you saw in previous chapters, creating a block producer and getting selected
    by the EOS.IO network is not an easy process or guaranteed, and as you just need
    coins to buy RAM for opening an account and getting resources, you don’t need
    too many coins. At this point, it’s easy to just purchase these tokens.


    You would need to first purchase bitcoin, Ethereum, or other coins on a fiat exchange
    such as Coinbase, CEX.io, or Coinmama. Then use exchanges such as Binance or Changelly
    to change your coins to EOS tokens. The reason is that there is no known exchange
    available at the time of writing that can directly change your fiat to EOS.


    Next, you need an endpoint. The 21 selected block producers are able to provide
    you with an endpoint. You can find all the available block producers and other
    data regarding the blocks being mined here:


    *   [`http://eosnetworkmonitor.io/`](http://eosnetworkmonitor.io/)


    *   [`https://eostracker.io/producers`](https://eostracker.io/producers)


    Once you find a block producer you would like to use, you append `/bp.json` to
    the end of the URL to find the endpoint. Here’s an example: [`https://api.eosnewyork.io/bp.json`](https://api.eosnewyork.io/bp.json)
    .


    The JASON output gives you the block producer’s information and ensures it’s ready
    for usage. To set the URL, just adjust the `--url` flag to the block producer
    you would like to connect to; the rest of the commands are all the same as the
    public testnet.


    ```

    > cleos --url https://api.eosnewyork.io:443 get info

    ```


    As before, you can edit the bash profile file as you did with the public testnet.


    ```

    alias cleos-mainnet=''cleos --url https://api.eosnewyork.io:443 --wallet-url http://localhost:8888''

    ```


    Your bash profile should look like this:


    ```

    PATH="/usr/local/eosio/bin:${PATH}"

    alias cleos-testnet=''cleos --url https://jungle.eosio.cr:443 --wallet-url http://localhost:8888''

    alias cleos-mainnet=''cleos --url https://api.eosnewyork.io:443 --wallet-url http://localhost:8888''

    ```


    Confirm it works by running the `get info` command.


    ```

    > cleos-mainnet get info

    ```


    I’ll spare you from repeating the same steps as in the public testnet section
    and spending actual tokens on the “HelloWorld” sample smart contract. However,
    I will cover resource allocation, as you need a good understanding of it to publish
    smart contracts on mainnet.'
