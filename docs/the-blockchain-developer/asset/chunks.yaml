  trans: "\n**钱包网络攻击**\n\n请谨记，尽管我将攻击过程分为三类，但这些攻击大多采用不同的技术和针对不同的目标，其最终目的都是为了获取加密货币私钥。\n\
    \n在本节中，我将回顾针对加密货币钱包的具体网络攻击。正如本章开头所强调的，一旦加密货币资金被转移，追踪起来就不那么容易，因为它们可以从一个钱包转移到另一个钱包，且除非网络中大多数节点同意更改区块，否则转移是不可逆的。\n\
    \n> *“每一把锁，都有人在尝试撬开或闯入。”*\n>\n> — 大卫·伯恩斯坦\n\n常见的钱包攻击形式多样，但结果都是导致用户丢失私钥。攻击者通常先发起“钓鱼攻击”，获取用户的机密信息，然后就能将资金从账户中转出。\n\
    \n**注意**  \n*钓鱼攻击*（可理解为“钓取信息”）是一种试图欺诈性地获取用户机密信息（如用户名、密码、账号等）的手段。攻击者通过电子邮件等电子通信方式，将自己伪装成可信赖的实体。\n\
    \n事实上，除了 Bitconnect 和 iFan 等加密货币骗局之外，与钱包相关的盗窃行为造成了加密货币资产领域的第二大损失，总额接近 50 亿美元（见图\
    \ 11-1）。\n\n![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig1_HTML.jpg](img/475651_1_En_11_Fig1_HTML.jpg)\n\
    \n**图 11-1** 最大的加密货币盗窃事件\n\n应对钱包攻击的最佳解决方案是：在不使用加密货币时，将其从交易所中完全取出，存入你自己的“冷钱包”集中存储中。这可以通过硬件钱包来实现，例如\
    \ `Nano`、`Trezor`、`KeepKey` 等。将加密货币转移到冷钱包能提供最高级别的保护，并可避免像 Mt. Gox 事件那样的交易所损失——当时管理员密码被破解，导致许多用户丢失了钱包密钥。\n\
    \n**注意**  \n*冷存储*是一种将加密货币私钥保存在 U 盘、纸钱包或其他数据存储介质上，并置于安全位置的方法。可以把它想象成你自家的银行。\n\n\
    在下一节中，你将了解常见的钱包攻击。我将提供事后分析，以帮助确保作为开发者和用户的你，不会重蹈他人的覆辙。\n\n## 在线钱包钓鱼-恶意软件攻击\n\n\
    在线钱包因连接互联网，比离线钱包更容易受到攻击。例如，近期针对 `Electrum` 钱包发起的一次钓鱼-恶意软件攻击，就造成了超过 100 万美元的损失。\n\
    \n**注意**  \n恶意软件由 *malicious*（恶意）和 *software*（软件）两个词组合而成。这种软件旨在破坏、损害或非法访问受害者的计算机。\n\
    \n该攻击由黑客设置恶意服务器实施；当用户钱包连接到其中一台服务器并试图发送一笔比特币交易时，攻击者的代码会显示一条看似官方的消息，告知用户需要更新他们的\
    \ `Electrum` 钱包，并附带一个虚假的 URL 链接，用于下载一个包含恶意软件的假冒版 `Electrum` 钱包。\n\n一旦用户使用攻击者的\
    \ URL 并下载了新的假冒版 `Electrum`，钱包会要求用户重新输入密码，这些密码随后便被发送给黑客。黑客获取了用户的登录信息后，便能够登录到真实的\
    \ `Electrum` 钱包，并将用户的私钥转移到他们自己的钱包中。\n\n### 事后分析\n\n作为用户，除了完全避免使用在线钱包并采用冷存储之外，你还可以通过以下方式降低风险：\n\
    \n*   *只下载官方软件*：不要从钱包官方网站以外的任何来源下载在线钱包或进行升级。将光标悬停在链接上检查 URL，但不要点击。尤其要注意微小的拼写错误；看看你是否能发现这里的细微拼写差异：`paypaI.com`、`Electrom.com`。\n\
    *   *保护你的信息*：谨慎对待通过电子邮件分享的信息。要求你确认账户凭据的邮件，必须是你认可的商家发送的，并且是由你主动发起的请求。\n*   *确保认证*：下载钱包软件并检查\
    \ GPG 签名。切勿将你的加密货币资产私钥交给任何“官方”代表。\n*   *识别虚假支持电话*：进行网络钓鱼以获取你信息的公司，通常会使用虚假的支持电话号码。许多人通过谷歌搜索查找公司电话号码，从而成为这种攻击的受害者。\n\
    \n作为开发者，你应该做到以下几点：\n\n*   *使用 GPG 签名验证*：实现 GPG 签名验证。\n\n> **提示**  \n> `GPG`/`GNU`\
    \ 是一套加密软件，用于通过检查下载文件对应的签名来确保真实性。为防止钱包攻击，请实施 `GPG` 或 GNU Privacy Guard。作为用户，也别忘了检查实际的\
    \ `GPG`/`GNU` 本身是否经过认证并来自开发者。\n\n*   *教育你的用户*：创建页面、视频教程和博客文章，教育你的用户，防止他们犯常见错误。\n\
    \n## 键盘记录器恶意软件\n\n大多数恶意软件旨在损害你的计算机。可用于窃取加密货币的常见恶意软件是键盘记录器或屏幕抓取器。这类软件会记录你输入的所有内容，并截取你的计算机屏幕截图，企图捕获密码和个人信息。这类攻击在家用电脑上发生的可能性较小，因为攻击者需要将一个实际的通用串行总线（USB）设备连接到你的计算机来记录按键；然而，在你使用公共电脑时，例如在酒店大堂或图书馆，就可能发生这种情况。\n\
    \n### 事后分析\n\n如前所述，在家中使用电脑时，你被键盘记录器攻击的可能性较小；但是，在登录公共电脑时，务必小心谨慎，检查该电脑上是否连接了 USB\
    \ 设备，并避免访问你的重要账户。在你的个人电脑上（以 Mac 为例），检查“活动监视器”以确保你识别所有在后台运行的服务。如有必要，通过网络搜索来查找你不认识的服务，如果发现任何可疑之处，请停止并移除该服务和应用程序。安装反病毒软件，如果仍有疑虑，请重装操作系统。\n\
    \n## 粉尘攻击\n\n粉尘攻击是指攻击者发送一笔微小（粉尘）交易。黑客利用这笔交易要么是向区块链网络发送垃圾邮件以占用区块空间，要么是标记目标地址，希望用户随后花费这些加密货币，从而帮助攻击者通过追踪交易历史来识别用户的个人信息。\n\
    \n### 事后分析\n\n作为用户，不要花费无法识别的交易。  \n作为开发者，实现“币控制”功能，以便将无法识别的交易标记为“不要花费”，使其不被包含在你的交易中。\
    \  \n阅读关于比特币的隐私文档，其中提供了保护隐私的宝贵信息，可适用于许多场景：[`https://en.bitcoin.it/wiki/Privacy`](https://en.bitcoin.it/wiki/Privacy)。\n\
    \n## 热钱包攻击\n\n在热钱包攻击中，攻击者通过钓鱼、密码破解或任何其他方法，从“热钱包”（即私钥在线存储的钱包）中获取钱包的私钥。一旦私钥从在线网络中被提取出来，攻击者就可以将这些密钥转移到他们自己的钱包中。\n"
- fmt: '# Note


    `Exchanges` store the user’s crypto private keys online in what is called *hot
    wallets*, or operational wallets. The reason these private keys are stored online
    is to allow real-time withdrawals from wallets.


    ## Postmortem


    As a user, the best way to avoid these losses is to keep your crypto under your
    own control in a cold wallet and not on centralized exchanges.


    As a developer, do the following:


    * **Keep a cold wallet**: Store a user’s keys in cold storage and avoid hot wallets
    as much as possible. For instance, Coinbase.com claims that it stores 98 percent
    of its users’ funds on paper backups distributed geographically to safe deposit
    boxes.

    * **Encrypt private keys**: If you need to store private keys on storage connected
    to an online network, at least encrypt the keys with a strong encryption key.

    * **Watch for unusual activity**: For instance, many exchanges approve large withdrawals
    manually.


    # Blockchain Network Attacks


    In this section, I will cover common attacks that target the blockchain network.


    ## Sybil Attacks


    The name Sybil is synonymous with someone who has a multiple personality disorder.


    ### Note


    A blockchain Sybil attack is an entity attempting to influence the P2P network
    by way of creating multiple identities and controlling multiple nodes.


    A Sybil attack creates multiple fake accounts in order to control a network. The
    entity that controls these multiple accounts can then influence the network as
    they have additional voting power in a democratic network. An easy way to understand
    this is the 2017 United States election where one entity, Russia, influenced an
    election process by creating multiple social media accounts and controlling the
    content of them.


    A blockchain example would be attackers attempting to out-vote honest nodes on
    the P2P network by creating multiple Sybil identities. By having a majority vote,
    the attackers can refuse to receive blocks or transmit fake blocks. If the Sybil
    attacks carry out a large enough attack, they are able to control the majority
    of the P2P network’s hash rate and change blocks, which is then a double spending
    attack.


    ### Postmortem


    As a developer, you can discourage Sybil attacks by making them impractical. If
    there is a cost associated with launching a Sybil attack such as costs to create
    an account, run servers, have electricity, etc., this can discourage or make attacks
    impractical. However, make sure you take into account legitimate users who need
    to create multiple accounts.


    In fact, popular blockchains have been taking Sybil attacks into consideration.
    For instance, the bitcoin `PoW` census algorithm needs a lot of processing power,
    so creating a block is proportional to the total processing power. This discourages
    attackers, because miners would rather do actual mining than risk losing on a
    failed Sybil attack. Similarly, the `PoS` census algorithm requires staking coins,
    so attackers will risk losing these coins.


    In addition, as you have seen in previous chapters, Ethereum, EOS, and NEO include
    a large cost associated with the deployment of `dapps`. Ethereum has a minimum
    fee of 32,000 gas and 200 gas per byte, EOS is around 120 coins, and NEO has a
    fixed cost of 100 to 1,000 gas. On top of that, many blockchains such as bitcoin,
    Ethereum, and NEO charge a transaction fee, which helps discourage attackers.
    Similarly, EOS does not charge transaction fees, but it is using a “chain of trust”
    to combat attackers.


    ### Note


    A *chain of trust* is a way to combat Sybil attacks by requiring trust before
    allowing new identities to join a network. A version of the chain of trust can
    include allowing a user to create a new account but not giving it full privileges
    for a certain time.


    EOS charges $1 to $4 per new account to developers; obviously, developers will
    be reluctant to create accounts and put in place mitigation to get an account
    approved.


    Another way to combat a Sybil attack is by changing the hierarchy from a democracy
    to a meritocracy (governed by selected people). Users who were created a long
    time ago and have a good reputation would have more weight than new accounts.
    Think of the Stackoverflow.com or Wikipedia.com reputation system; see [`https://stackoverflow.com/help/whats-reputation`](https://stackoverflow.com/help/whats-reputation).


    ## Double Spending or 51 Percent Attack


    Previously in this book, I talked about potential double spending attacks against
    cryptocurrencies, where a malicious node gains control of more than 50 percent
    of a blockchain network’s hash rate and is able to alter and manipulate blocks.
    Large blockchains like bitcoin and Ethereum are not easy to overtake by a 51 percent
    attack due to the miner competition, which demands a high level of resources.
    For instance, according to [`https://www.crypto51.app`](https://www.crypto51.app),
    the theoretical cost of attacking bitcoin would be $257,472 at the time of writing;
    see Figure [11-2](#475651_1_En_11_Chapter.xhtml#Fig2).


    ![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig2_HTML.jpg](images/475651_1_En_11_Chapter/475651_1_En_11_Fig2_HTML.jpg)


    **Figure 11-2** Theoretical cost of a 51 percent attack on various blockchains


    However, smaller blockchains have been the target of the 51 percent attack. This
    happened to the Verge blockchain, which lost almost $3 million in two attacks.
    Bitcoin gold suffered the biggest loss of $18 million, and Ethereum Classic lost
    $1.1 million. In fact, there was a total of $23 million in losses in less than
    a year during 2018 and 2019; see Figure [11-3](#475651_1_En_11_Chapter.xhtml#Fig3).


    ![../images/475651_1_En_11_Chapter/475651_1_En_11_Fig3_HTML.png](images/475651_1_En_11_Chapter/475651_1_En_11_Fig3_HTML.png)


    **Figure 11-3** Double spending losses from 2018 to January 2019


    ### Postmortem


    As an investor, you should check the cost to attack the blockchain you are interested
    in investing in and whether there is a safety net mechanism in place for the blockchain.


    Blockchain developers should create some sort of a safety net mechanism, for instance,
    creating a hash that holds a snapshot of all transactions and balances of each
    of your blocks and then storing that hash into a larger blockchain. For instance,
    you could utilize bitcoin’s `OP_RETURN`, just as you did in Chapter [4](#475651_1_En_4_Chapter.xhtml),
    and store the hash as a backup in case there is a 51 percent attack.


    In fact, [`http://komodoplatform.com`](http://komodoplatform.com) was able to
    solve the double spending problem by creating a delayed proof of work (`dPoW`)
    security mechanism.


    ## Miner Ransomware


    As I mentioned, bitcoin has been unaffected by these 51 percent attacks so far;
    however, hackers have found a new way to affect blockchains by attacking miners
    with ransomware.


    ### Note


    Ransomware is a type of malicious software aimed at blocking a computer until
    money is paid. The name is a mashup of the words *ransom* and *software*.


    Hackers lock up mining rigs using similar techniques that ransomware is using
    on personal computers. On personal computers, malware, such as the NotPetya ransomware,
    gets downloaded and installed and then is able to lock the user’s computer until
    a ransom is paid to a wallet address.


    Up until now, ransomware targeted only personal computers; however, new ransomware
    such as `hAnt` is taking aim at miners. How `hAnt` is installed is not known,
    but it is estimated that it is probably downloaded with a version of the mining
    rig firmware. Then the ransomware has access to the firmware of the miner and
    can control the miner.'
