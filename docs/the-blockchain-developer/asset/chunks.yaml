    ### Generating Raw Transactions with One Output


    Transactions can get complicated easily because there is often a need for more
    than one input or more than one output. For instance, if you want to send the
    unspent coins back to your wallet, as well as send coins to multiple addresses,
    it starts to get complicated. Using `RawTransaction`, you get full access to where
    the coins go and are able to achieve complex transactions.


    You will start by creating a simple `RawTransaction` by sending one UTXO from
    one wallet to another. Previously, you sent coins back to the testnet faucet via
    the bitcoin core wallet GUI. Let’s do the same thing but with the `RawTransaction`
    command.


    To get started, let’s confirm your wallet’s balance prior to sending coins.


    ```

    > bitcoin-cli getbalance

    0.18505841

    ```


    Next, let’s pick the UTXO you will be using to fund the transaction. As you recall,
    you can get a list of UTXOs, via the `listunspent` command, and then look at the
    JSON response and pick the transaction `txid`. Pick a transaction that has enough
    funds to feed your new transaction and a transaction that has been confirmed.


    ```

    > utxo_txid="50e91c9b73a90bd883f4a9a8a51be729770df20fae0445a9090b80a8621f4538"

    ```


    As you probably recall, `vout` is the index number for an output in a transaction.
    In this example, I will be pointing to a `vout` and generating a new transaction.
    The new transaction can include multiple other `vout`s, as illustrated in Figure
    [4-11](#475651_1_En_4_Chapter.xhtml#Fig11).


    ![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig11_HTML.jpg](images/475651_1_En_4_Chapter/475651_1_En_4_Fig11_HTML.jpg)


    Figure 4-11


    vout new transaction illustration


    In this example, you will set the first index for `vout`.


    ```

    > utxo_vout="0"

    ```


    The last but most important variable you need to set is the `recipient` address.
    Here, you will be using the same wallet address as you used previously to send
    your coins.


    ```

    > recipient="mv4rnyY3Su5gjcDNzbMLKBQkBicCtHUtFB"

    ```


    Lastly, you can use the `echo` command to verify and double-check that you set
    your variables correctly.


    ```

    > echo $utxo_txid

    > echo $utxo_vout

    > echo $recipient

    ```


    Now that you have your variables set, you can generate a `RawTransaction` object
    via the `createrawtransaction` command. You do that by including all the variables
    you set and declaring the amount you would like to spend. You are using `0.xxx`,
    but you need to use the UTXO less the fee you would like to pay to send the entire
    coins you have in the UTXO.


    ```

    > rawtxhex=$(bitcoin-cli createrawtransaction "''[ { "txid": "''$utxo_txid''",
    "vout": ''$utxo_vout'' } ]"'' "''{ "''$recipient''": 0.xxx }"'')

    ```


    Next, you can extract the `rawtxhex` value.


    ```

    > echo $rawtxhex

    020000000138451f62a8800b09a94504ae0ff20d7729e71ba5a8a9f483d80ba9739b1ce9500000000000ffffffff0140420f00000000001976a9149f9a7abd600c0caa03983a77c8c3df8e062cb2fa88ac00000000

    ```


    The `rawtxhex` value includes your new transaction information as a hex-encoded
    data. The following `decoderawtransaction` command will return some JSON output
    with decoded data for your transaction:


    ```

    > bitcoin-cli decoderawtransaction $rawtxhex

    {

    "txid": "91d4e108f8957251d2997e1f8dcdd0eec97192e8accf85a9e81f772f586118af",

    "hash": "91d4e108f8957251d2997e1f8dcdd0eec97192e8accf85a9e81f772f586118af",

    "version": 2,

    "size": 85,

    "vsize": 85,

    "weight": 340,

    "locktime": 0,

    "vin": [

    {

    "txid": "50e91c9b73a90bd883f4a9a8a51be729770df20fae0445a9090b80a8621f4538",

    "vout": 0,

    "scriptSig": {

    "asm": "",

    "hex": ""

    },

    "sequence": 4294967295

    }

    ],

    "vout": [

    {

    "value": 0.01000000,

    "n": 0,

    "scriptPubKey": {

    "asm": "OP_DUP OP_HASH160 9f9a7abd600c0caa03983a77c8c3df8e062cb2fa OP_EQUALVERIFY
    OP_CHECKSIG",

    "hex": "76a9149f9a7abd600c0caa03983a77c8c3df8e062cb2fa88ac",

    "reqSigs": 1,

    "type": "pubkeyhash",

    "addresses": [

    "mv4rnyY3Su5gjcDNzbMLKBQkBicCtHUtFB"

    ]

    }

    }

    ]

    }

    ```'
