- fmt: '## Creating Genesis Block and Sharing Blocks


    In the next exercise, you will be creating block objects that you can share between
    your nodes. But before you do that, let''s take a closer look at the `Block` object.
    The `Block` object is not the same for every blockchain. Different blockchains
    utilize different types of `Block` objects; you will be using a `Block` object
    similar to bitcoin; I covered in details during Chapter [2](#475651_1_En_2_Chapter.xhtml).
    To better understand the architecture, take a look at a Unified Modeling Language
    (UML) diagram of the `Block` and the `BlockHeader` objects you will be using in
    the next exercise, as shown in Figure [3-3](#475651_1_En_3_Chapter.xhtml#Fig3).


    ![../images/475651_1_En_3_Chapter/475651_1_En_3_Fig3_HTML.jpg](images/475651_1_En_3_Chapter/475651_1_En_3_Fig3_HTML.jpg)


    **Figure 3-3** — `Block` and `BlockHeader` UML diagram


    As a reminder, from Chapter [2](#475651_1_En_2_Chapter.xhtml), the `Block` object
    contains the following properties:


    - **`index`**: `GenesisBlock` is our first block, we assign the block index with
    the value of 0.

    - **`txns`**: This is the raw transaction in the block. I don''t want to focus
    on just cryptocurrencies in this chapter, so think of this as any type of data
    you want to store.


    Included in the `Block` object is the `BlockHeader` object, which contains the
    following properties:


    - **`Version`**: At the time of writing, there are four block versions. Version
    1 is the genesis block (2009), and version 2 is a soft fork of bitcoin core 0.7.0
    (2012). Version 3 blocks were a soft fork of bitcoin core 0.10.0 (2015). Version
    4 blocks are BIP65 in bitcoin core 0.11.2 (2015).

    - **`Previous block header hash`**: This is an SHA-256 (Secure Hash Algorithm)
    hash function of the previous block''s header. It ensures that the previous block
    cannot be changed as this block needs to be changed as well.

    - **`Merkle root hash`**: A Merkle tree is a binary tree that holds all the hashed
    pairs of the tree.

    - **`Time`**: This is the Unix epoch time when the miner started hashing the header.


    As you recall, bitcoin also includes a difficulty property for the miners that
    gets recalculated every 2,016 blocks. Here you won''t use the `nBits` and `nounce`
    params, as you are not doing PoW.


    - **`nounce`**: The nonce in a bitcoin block is a 32-bit (4-byte) field whose
    value is adjusted by miners so that the hash of the block will be less than or
    equal to the current target of the network.

    - **`nBits`**: This refers to the target. The target is a 256-bit number and inversely
    proportional to the difficulty. It is recalculated every 2,016 blocks.


    In terms of P2P communication, the flow of blocks between each peer on the P2P
    network consists of requesting the latest block from a peer on the network and
    then receiving a block request. Figure [3-4](#475651_1_En_3_Chapter.xhtml#Fig4)
    shows the flow diagram.


    ![../images/475651_1_En_3_Chapter/475651_1_En_3_Fig4_HTML.jpg](images/475651_1_En_3_Chapter/475651_1_En_3_Fig4_HTML.jpg)


    **Figure 3-4** — Flow diagram of P2P communications requesting latest block and
    receiving latest block


    Now that you understand the architecture and the flow of blocks in the P2P network,
    in the following exercise you will be sending and requesting blocks.


    ### Step 2: P2P Network Sending Blocks Exercise


    **Setting Up a Block Class and Chain Library**


    In this exercise, you will create your blockchain. The blockchain consists of
    two files: `block.js` and `chain.js`. The file `block.js` will hold the block
    class object, and `chain.js` will be the glue with methods to handle the interactions
    with the blocks. In terms of the `Block` object, you will be creating properties
    similar to the properties that bitcoin core holds. Take a look at Listing [3-2](#475651_1_En_3_Chapter.xhtml#PC17),
    `block.js` file include `Block` and `BlockHeader` objects.


    **Listing 3-2.** `block.js`


    ```

    exports.BlockHeader = class BlockHeader {

    constructor(version, previousBlockHeader, merkleRoot, time) {

    this.version = version;

    this.previousBlockHeader = previousBlockHeader;

    this.merkleRoot = merkleRoot;

    this.time = time;

    }

    };

    exports.Block = class Block {

    constructor(blockHeader, index, txns) {

    this.blockHeader = blockHeader;

    this.index = index;

    this.txns = txns;

    }

    }

    ```


    As you can see, `chain.js` contains the first block, which is called the *genesis*
    block, as well as a method to receive the entire blockchain object, add a block,
    and retrieve a block. Note that you will be adding a library called `moment` to
    save the time in a Unix time format in your `chain.js` library. To do so, install
    `moment` with `npm`.


    ```

    > npm install moment --save

    ```


    Now that you have the `block.js` file created, you can create the `chain.js` class;
    see Listing [3-3](#475651_1_En_3_Chapter.xhtml#PC19).


    **Listing 3-3.** `chain.js`


    ```

    let Block =  require("./block.js").Block,

    BlockHeader =  require("./block.js").BlockHeader,

    moment = require("moment");

    let getGenesisBlock = () => {

    let blockHeader = new BlockHeader(1, null, "0x1bc3300000000000000000000000000000000000000000000",
    moment().unix());

    return new Block(blockHeader, 0, null);

    };

    let getLatestBlock = () => blockchain[blockchain.length-1];

    let addBlock = (newBlock) => {

    let prevBlock = getLatestBlock();

    if (prevBlock.index  {

    if (blockchain.length-1 >= index)

    return blockchain[index];

    else

    return null;

    }

    const blockchain = [getGenesisBlock()];

    if (typeof exports != ''undefined'' ) {

    exports.addBlock = addBlock;

    exports.getBlock = getBlock;

    exports.blockchain = blockchain;

    exports.getLatestBlock = getLatestBlock;

    }

    ```


    You now have a block object that is included in `chain.js`. Your library can create
    your genesis block and add a block to your blockchain object. You also will be
    able to send and request blocks.


    Next, in your P2P network class, you can use the `chain.js` file you created.
    First you need to import the class `chain.js`.


    ```

    const chain =  require("./chain");

    ```


    Then you can define a message type to request and receive the latest block. When
    you send messages in your P2P network, you need to be able to figure out the purpose
    of messages. By using a `MessageType` property, you can define a switch mechanism
    so different messages types will be used for different functions.


    ```

    let MessageType = {

    REQUEST_LATEST_BLOCK: ''requestLatestBlock'',

    LATEST_BLOCK: ''latestBlock''

    };

    ```


    Once a connection data event message is received, you can create your switch code
    to handle the different types of requests, as shown in Listing [3-4](#475651_1_En_3_Chapter.xhtml#PC22).'
  raw: '## Creating Genesis Block and Sharing Blocks


    In the next exercise, you will be creating block objects that you can share between
    your nodes. But before you do that, let’s take a closer look at the `Block` object.
    The `Block` object is not the same for every blockchain. Different blockchains
    utilize different types of `Block` objects; you will be using a `Block` object
    similar to bitcoin; I covered in details during Chapter [2](#475651_1_En_2_Chapter.xhtml).
    To better understand the architecture, take a look at a Unified Modeling Language
    (UML) diagram of the `Block` and the `BlockHeader` objects you will be using in
    the next exercise, as shown in Figure [3-3](#475651_1_En_3_Chapter.xhtml#Fig3).


    ![../images/475651_1_En_3_Chapter/475651_1_En_3_Fig3_HTML.jpg](images/475651_1_En_3_Chapter/475651_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Block and BlockHeader UML diagram


    As a reminder, from Chapter [2](#475651_1_En_2_Chapter.xhtml), the `Block` object
    contains the following properties:


    *   ***index***: `GenesisBlock` is our first block, we assign the block index
    with the value of 0.


    *   ***txns***: This is the raw transaction in the block. I don’t want to focus
    on just cryptocurrencies in this chapter, so think of this as any type of data
    you want to store.


    Included in the `Block` object is the `BlockHeader` object, which contains the
    following properties:


    *   ***Version***: At the time of writing, there are four block versions. Version
    1 is the genesis block (2009), and version 2 is a soft fork of bitcoin core 0.7.0
    (2012). Version 3 blocks were a soft fork of bitcoin core 0.10.0 (2015). Version
    4 blocks are BIP65 in bitcoin core 0.11.2 (2015).


    *   ***Previous block header hash***: This is an SHA-256 (Secure Hash Algorithm)
    hash function of the previous block’s header. It ensures that the previous block
    cannot be changed as this block needs to be changed as well.


    *   ***Merkle root hash***: A Merkle tree is a binary tree that holds all the
    hashed pairs of the tree.


    *   ***Time***: This is the Unix epoch time when the miner started hashing the
    header.


    As you recall, bitcoin also includes a difficulty property for the miners that
    gets recalculated every 2,016 blocks. Here you won’t use the nBits and nounce
    params, as you are not doing PoW.


    *   ***nounce***: The nonce in a bitcoin block is a 32-bit (4-byte) field whose
    value is adjusted by miners so that the hash of the block will be less than or
    equal to the current target of the network.


    *   ***nBits***: This refers to the target. The target is a 256-bit number and
    inversely proportional to the difficulty. It is recalculated every 2,016 blocks.


    In terms of P2P communication, the flow of blocks between each peer on the P2P
    network consists of requesting the latest block from a peer on the network and
    then receiving a block request. Figure [3-4](#475651_1_En_3_Chapter.xhtml#Fig4)
    shows the flow diagram.


    ![../images/475651_1_En_3_Chapter/475651_1_En_3_Fig4_HTML.jpg](images/475651_1_En_3_Chapter/475651_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Flow diagram of P2P communications requesting latest block and receiving latest
    block


    Now that you understand the architecture and the flow of blocks in the P2P network,
    in the following exercise you will be sending and requesting blocks.


    ### Step 2: P2P Network Sending Blocks Exercise


    **Setting** **Up a** **Block Class and Chain Library**


    In this exercise, you will create your blockchain. The blockchain consists of
    two files: `block.js` and `chain.js`. The file `Block.js` will hold the block
    class object, and `chain.js` will be the glue with methods to handle the interactions
    with the blocks. In terms of the `Block` object, you will be creating properties
    similar to the properties that bitcoin core holds. Take a look at Listing [3-2](#475651_1_En_3_Chapter.xhtml#PC17),
    block.js file include Block and BlockHeader objects.


    *Listing 3-2. block.js*


    ```

    exports.BlockHeader = class BlockHeader {

    constructor(version, previousBlockHeader, merkleRoot, time) {

    this.version = version;

    this.previousBlockHeader = previousBlockHeader;

    this.merkleRoot = merkleRoot;

    this.time = time;

    }

    };

    exports.Block = class Block {

    constructor(blockHeader, index, txns) {

    this.blockHeader = blockHeader;

    this.index = index;

    this.txns = txns;

    }

    }

    ```


    As you can see, `chain.js` contains the first block, which is called the *genesis*
    block, as well as a method to receive the entire blockchain object, add a block,
    and retrieve a block. Note that you will be adding a library called `moment` to
    save the time in a Unix time format in your `chain.js` library. To do so, install
    `moment` with `npm`.


    ```

    > npm install moment --save

    ```


    Now that you have the `block.js` file created, you can create the `chain.js` class;
    see Listing [3-3](#475651_1_En_3_Chapter.xhtml#PC19).


    *Listing 3-3. chain.js*


    ```

    let Block =  require("./block.js").Block,

    BlockHeader =  require("./block.js").BlockHeader,

    moment = require("moment");

    let getGenesisBlock = () => {

    let blockHeader = new BlockHeader(1, null, "0x1bc3300000000000000000000000000000000000000000000",
    moment().unix());

    return new Block(blockHeader, 0, null);

    };

    let getLatestBlock = () => blockchain[blockchain.length-1];

    let addBlock = (newBlock) => {

    let prevBlock = getLatestBlock();

    if (prevBlock.index  {

    if (blockchain.length-1 >= index)

    return blockchain[index];

    else

    return null;

    }

    const blockchain = [getGenesisBlock()];

    if (typeof exports != ''undefined'' ) {

    exports.addBlock = addBlock;

    exports.getBlock = getBlock;

    exports.blockchain = blockchain;

    exports.getLatestBlock = getLatestBlock;

    }

    ```


    You now have a block object that is included in `chain.js`. Your library can create
    your genesis block and add a block to your blockchain object. You also will be
    able to send and request blocks.


    Next, in your P2P network class, you can use the `chain.js` file you created.
    First you need to import the class `chain.js`.


    ```

    const chain =  require("./chain");

    ```


    Then you can define a message type to request and receive the latest block. When
    you send messages in your P2P network, you need to be able to figure out the purpose
    of messages. By using a `MessageType` property , you can define a switch mechanism
    so different messages types will be used for different functions.


    ```

    let MessageType = {

    REQUEST_LATEST_BLOCK: ''requestLatestBlock'',

    LATEST_BLOCK: ''latestBlock''

    };

    ```


    Once a connection data event message is received, you can create your switch code
    to handle the different types of requests, as shown in Listing [3-4](#475651_1_En_3_Chapter.xhtml#PC22).'
  trans: '

    ## 创建创世区块与共享区块


    在接下来的练习中，你将创建可在节点间共享的区块对象。但在开始之前，让我们先仔细看看 `Block` 对象。并非所有区块链的 `Block` 对象都相同。不同的区块链使用不同类型的
    `Block` 对象；你将使用的 `Block` 对象类似于比特币，我在第 2 章中已详细说明。为了更好地理解其架构，请查看图 3-3 中你将在下一个练习中使用的
    `Block` 和 `BlockHeader` 对象的统一建模语言（UML）图示。


    ![../images/475651_1_En_3_Chapter/475651_1_En_3_Fig3_HTML.jpg](img/475651_1_En_3_Fig3_HTML.jpg)


    **图 3-3** — `Block` 和 `BlockHeader` UML 图示


    回顾第 2 章，`Block` 对象包含以下属性：


    - **`index`**：`GenesisBlock` 是我们的第一个区块，我们将区块索引赋值为 0。

    - **`txns`**：这是区块中的原始交易数据。本章我不想只聚焦于加密货币，因此请将其视为你想存储的任何类型的数据。


    `Block` 对象中包含 `BlockHeader` 对象，该对象包含以下属性：


    - **`Version`**：截至撰写本文时，共有四个区块版本。版本 1 是创世区块（2009 年），版本 2 是比特币核心 0.7.0（2012 年）的软分叉。版本
    3 区块是比特币核心 0.10.0（2015 年）的软分叉。版本 4 区块是比特币核心 0.11.2（2015 年）的 BIP65。

    - **`Previous block header hash`**：这是前一个区块头的 SHA-256（安全哈希算法）哈希函数值。它确保前一个区块无法被更改，因为本区块也需要随之更改。

    - **`Merkle root hash`**：默克尔树是一种二叉树，包含树中所有哈希值对。

    - **`Time`**：这是矿工开始对区块头进行哈希计算时的 Unix 纪元时间。


    如你所记，比特币还包含一个针对矿工的难度属性，该属性每 2,016 个区块重新计算一次。此处你不需要使用 `nBits` 和 `nounce` 参数，因为你没有进行工作量证明（PoW）。


    - **`nounce`**：比特币区块中的区块随机数是 32 位（4 字节）字段，矿工会调整其值，使得区块的哈希值小于或等于网络的当前目标值。

    - **`nBits`**：这指的是目标值。目标值是一个 256 位数字，与难度成反比。它每 2,016 个区块重新计算一次。


    在 P2P 通信方面，区块在对等网络中的每个节点之间的流转包括：从网络中的某个节点请求最新的区块，然后接收区块请求。图 3-4 展示了该流程图。


    ![../images/475651_1_En_3_Chapter/475651_1_En_3_Fig4_HTML.jpg](img/475651_1_En_3_Fig4_HTML.jpg)


    **图 3-4** — 请求最新区块与接收最新区块的 P2P 通信流程图


    现在你已经理解了架构和区块在 P2P 网络中的流转方式，在接下来的练习中，你将发送和请求区块。


    ### 步骤 2：P2P 网络发送区块练习


    **设置区块类和链库**


    在本练习中，你将创建自己的区块链。该区块链包含两个文件：`block.js` 和 `chain.js`。文件 `block.js` 将包含区块类对象，而 `chain.js`
    则作为粘合剂，包含处理与区块交互的方法。至于 `Block` 对象，你将创建与比特币核心所持有的属性类似的属性。请看清单 3-2，`block.js` 文件包含了
    `Block` 和 `BlockHeader` 对象。


    **清单 3-2.** `block.js`


    ```

    exports.BlockHeader = class BlockHeader {

    constructor(version, previousBlockHeader, merkleRoot, time) {

    this.version = version;

    this.previousBlockHeader = previousBlockHeader;

    this.merkleRoot = merkleRoot;

    this.time = time;

    }

    };

    exports.Block = class Block {

    constructor(blockHeader, index, txns) {

    this.blockHeader = blockHeader;

    this.index = index;

    this.txns = txns;

    }

    }

    ```


    如你所见，`chain.js` 包含了第一个区块（称为 *创世* 区块），以及接收整个区块链对象、添加区块和检索区块的方法。请注意，你将在 `chain.js`
    库中添加一个名为 `moment` 的库，用于以 Unix 时间格式保存时间。为此，请使用 `npm` 安装 `moment`。


    ```

    > npm install moment --save

    ```


    现在你已经创建了 `block.js` 文件，可以创建 `chain.js` 类；请参见清单 3-3。


    **清单 3-3.** `chain.js`


    ```

    let Block =  require("./block.js").Block,

    BlockHeader =  require("./block.js").BlockHeader,

    moment = require("moment");

    let getGenesisBlock = () => {

    let blockHeader = new BlockHeader(1, null, "0x1bc3300000000000000000000000000000000000000000000",
    moment().unix());

    return new Block(blockHeader, 0, null);

    };

    let getLatestBlock = () => blockchain[blockchain.length-1];

    let addBlock = (newBlock) => {

    let prevBlock = getLatestBlock();

    if (prevBlock.index  {

    if (blockchain.length-1 >= index)

    return blockchain[index];

    else

    return null;

    }

    const blockchain = [getGenesisBlock()];

    if (typeof exports != ''undefined'' ) {

    exports.addBlock = addBlock;

    exports.getBlock = getBlock;

    exports.blockchain = blockchain;

    exports.getLatestBlock = getLatestBlock;

    }

    ```


    你现在拥有了一个包含在 `chain.js` 中的区块对象。你的库可以创建创世区块，并将区块添加到区块链对象中。你还将能够发送和请求区块。


    接下来，在你的 P2P 网络类中，你可以使用刚创建的 `chain.js` 文件。首先，你需要导入 `chain.js` 类。


    ```

    const chain =  require("./chain");

    ```


    然后，你可以定义一个消息类型来请求和接收最新区块。当你在 P2P 网络中发送消息时，你需要能够识别消息的目的。通过使用 `MessageType` 属性，你可以定义一个切换机制，以便不同的消息类型用于不同的功能。


    ```

    let MessageType = {

    REQUEST_LATEST_BLOCK: ''requestLatestBlock'',

    LATEST_BLOCK: ''latestBlock''

    };

    ```


    一旦接收到连接数据事件消息，你可以创建切换代码来处理不同类型的请求，如清单 3-4 所示。

    '
- fmt: '```javascript

    switch (message.type) {

    case MessageType.REQUEST_BLOCK:

    console.log(''-----------REQUEST_BLOCK-------------'');

    let requestedIndex = (JSON.parse(JSON.stringify(message.data))).index;

    let requestedBlock = chain.getBlock(requestedIndex);

    if (requestedBlock)

    writeMessageToPeerToId(peerId.toString(''hex''), MessageType.RECEIVE_NEXT_BLOCK,
    requestedBlock);

    else

    console.log(''No block found @ index: '' + requestedIndex);

    console.log(''-----------REQUEST_BLOCK-------------'');

    break;

    case MessageType.RECEIVE_NEXT_BLOCK:

    console.log(''-----------RECEIVE_NEXT_BLOCK-------------'');

    chain.addBlock(JSON.parse(JSON.stringify(message.data)));

    console.log(JSON.stringify(chain.blockchain));

    let nextBlockIndex = chain.getLatestBlock().index+1;

    console.log(''-- request next block @ index: '' + nextBlockIndex);

    writeMessageToPeers(MessageType.REQUEST_BLOCK, {index: nextBlockIndex});

    console.log(''-----------RECEIVE_NEXT_BLOCK-------------'');

    break;

    }

    ```

    ```

    Listing 3-4

    Message Switch and Handlers

    ```


    Lastly, you will set a timeout request that will send a request to retrieve the
    latest block every 5,000 milliseconds (5 seconds).


    ```

    setTimeout(function(){

    writeMessageToPeers(MessageType.REQUEST_BLOCK, {index: chain.getLatestBlock().index+1});

    }, 5000);

    ```


    You can download the complete exercise from here: [`https://github.com/Apress/the-blockchain-developer/tree/master/chapter3/step2/`](https://github.com/Apress/the-blockchain-developer/tree/master/chapter3/step2/).


    In this exercise, you were able to generate your genesis block and create a mechanism
    to request and receive blocks by sending messages requests. The ability to request
    and receive blocks allows you to sync new peers that enter the P2P network. You
    also need a sync for any additional blocks you generate after the genesis block
    creation.


    ## Registering Miners and Creating New Blocks


    At this point, you have a basic P2P network, and you are able to connect peers
    in the network, create a genesis block, and send and receive blocks. The next
    step is being able to generate new blocks. As you saw in Chapter 2, proof of work
    is based on creating a mathematical problem and rewarding miners that find the
    solution for the problem first. However, in this example, you will take an approach
    of proof of stake (PoS) where you trust each miner to generate your blocks. Each
    peer will register as a miner and will take a turn to mine a block. You can see
    an overview of each miner generating a block in Figure 3-5.


    ![../images/475651_1_En_3_Chapter/475651_1_En_3_Fig5_HTML.jpg](images/475651_1_En_3_Chapter/475651_1_En_3_Fig5_HTML.jpg)


    **Figure 3-5** – Your blockchain handles mining using a simple PoS mechanism


    Lastly, before you start your next exercise, revisit Figure 3-4 to better understand
    your flow. The flow shows how your P2P network handles peer communications requesting
    the latest block and receiving the latest block. In the next exercise, you will
    register your peers as miners and create new blocks.


    ### Step 3: Register Miners and Creating New Blocks Exercise


    **Register Miners**


    In this exercise, you will register miners and create new blocks. You can download
    the complete exercise from here: [`https://github.com/Apress/the-blockchain-developer/tree/master/chapter3/step3`](https://github.com/Apress/the-blockchain-developer/tree/master/chapter3/step3).


    To automate the process of generating a block every x number of minutes, you can
    use a Node.js library called `cron`, which is similar to the Linux library that
    automates tasks.


    To install the `cron` open source library, run the following command:


    ```

    > npm install cron --save

    ```


    Next, in your `p2p.js` file, you will create two variables to keep track of the
    registered miners as well as who mined the last block so you can assign the next
    block to the next miner.


    ```

    let registeredMiners = [];

    let lastBlockMinedBy = null;

    ```


    You are also going to add two messages types:

    - `REQUEST_ALL_REGISTER_MINERS`

    - `REGISTER_MINER`


    ```

    let MessageType = {

    REQUEST_BLOCK: ''requestBlock'',

    RECEIVE_NEXT_BLOCK: ''receiveNextBlock'',

    RECEIVE_NEW_BLOCK: ''receiveNewBlock'',

    REQUEST_ALL_REGISTER_MINERS: ''requestAllRegisterMiners'',

    REGISTER_MINER: ''registerMiner''

    };

    ```


    Before you register your peers as miners, you will request to receive all the
    existing registered miners in the network, and then you will add your peer as
    a miner in a `registeredMiners` object. You do that by running a timer to update
    your miners every five seconds.


    ```

    setTimeout(function(){

    writeMessageToPeers(MessageType.REQUEST_ALL_REGISTER_MINERS, null);

    }, 5000);

    Now, that have an automated timeout command that can point to a handler to update
    the list of registered miners you can also automate a command to register your
    peer as a miner;

    setTimeout(function(){

    registeredMiners.push(myPeerId.toString(''hex''));

    console.log(''----------Register my miner --------------'');

    console.log(registeredMiners);

    writeMessageToPeers(MessageType.REGISTER_MINER, registeredMiners);

    console.log(''---------- Register my miner --------------'');

    }, 7000);

    ```


    In your `switch` command, you want to modify the code to be able to set handlers
    for incoming messages regarding the registrations of miners. You want to keep
    track of the registered miners as well as handle a message once a new block is
    mined. See Listing 3-5 for the miner''s handlers.


    ```

    case MessageType.REQUEST_ALL_REGISTER_MINERS:

    console.log(''-----------REQUEST_ALL_REGISTER_MINERS------------- '' + message.to);

    writeMessageToPeers(MessageType.REGISTER_MINER, registeredMiners);

    registeredMiners = JSON.parse(JSON.stringify(message.data));

    console.log(''-----------REQUEST_ALL_REGISTER_MINERS------------- '' + message.to);

    break;

    case MessageType.REGISTER_MINER:

    console.log(''-----------REGISTER_MINER------------- '' + message.to);

    let miners = JSON.stringify(message.data);

    registeredMiners = JSON.parse(miners);

    console.log(registeredMiners);

    console.log(''-----------REGISTER_MINER------------- '' + message.to);

    break;

    ```

    ```

    Listing 3-5

    Miner''s Handlers

    ```


    **Unregister Miners**


    You also need to unregister a miner once a connection with the miner is closed
    or lost.


    ```

    console.log(`Connection ${seq} closed, peerId: ${peerId}`);

    if (peers[peerId].seq === seq) {

    delete peers[peerId];

    console.log(''--- registeredMiners before: '' + JSON.stringify(registeredMiners));

    let index = registeredMiners.indexOf(peerId);

    if (index > -1)

    registeredMiners.splice(index, 1);

    console.log(''--- registeredMiners end: '' + JSON.stringify(registeredMiners));

    }

    });

    ```


    **Mine a New Block**


    As opposed to bitcoin, which generates a block every 10 minutes, your blockchain
    will be improved and will generate a block every 30 seconds. To achieve that,
    you already installed the open source `cron` library for Node.js. The `cron` library
    works the same as the Linux `cron`. You can utilize the `cron` library to set
    how often to call the same code again, which will be used to call your miners
    every 30 seconds.'
