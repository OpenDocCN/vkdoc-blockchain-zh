- fmt: '### Installing an EOS Full Node


    Now that you have the Ubuntu server configured with 8 GB of memory and a 25 GB
    hard drive, you can clone the project and build.


    ```

    > git clone https://github.com/EOSIO/eos --recursive

    > cd eos

    > ./eosio_build.sh #takes about 30 mins to an hour.

    ```


    Once the build is completed, you will see the screen shown in Figure [2-13](#475651_1_En_2_Chapter.xhtml#Fig13).


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig13_HTML.jpg](images/475651_1_En_2_Chapter/475651_1_En_2_Fig13_HTML.jpg)


    Figure 2-13

    EOS full-node build, complete output


    Ensure that the daemon is working correctly by running the `-h` flag to get a
    list of commands.


    ```

    > cd build/programs/nodeos

    > ./nodeos -h #list of commands

    ```


    Now you can run the EOS node daemon; Figure [2-14](#475651_1_En_2_Chapter.xhtml#Fig14)
    shows the output.


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig14_HTML.jpg](images/475651_1_En_2_Chapter/475651_1_En_2_Fig14_HTML.jpg)


    Figure 2-14

    EOS full node running


    ```

    > ./nodeos -e -p eosio --plugin eosio::chain_api_plugin --plugin eosio::history_api_plugin

    ```


    EOS provides a portal at [`https://developers.eos.io/`](https://developers.eos.io/)
    to get started with nodes, dapps, smart contract, tokens, and much more. In the
    next chapters, you will be interacting more with the EOS platform.


    ### Marketing and Listing


    Now that you have an EOS node running, you need to create a marketing campaign
    to be elected. You can set the submission profile to be similar to this URL: [`https://github.com/consenlabs/eos-bp-profile`](https://github.com/consenlabs/eos-bp-profile).


    Next, you are ready to receive votes. You can get voting through the imToken 2.0
    app (iPhone or Android). It offers block producers voting; follow this guide for
    instructions: [`https://medium.com/imtoken/guide-imtoken-2-0-block-producers-voting-141983f9a76e`](https://medium.com/imtoken/guide-imtoken-2-0-block-producers-voting-141983f9a76e).


    ### Terminating an EOS Node


    You want to ensure that you terminate the node so you won’t get charged, as this
    machine configuration is not part of the free tier server on Amazon. Just as you
    did before, select EC2 Dashboard ➤ Running instances ➤ Actions ➤ Instance State
    ➤ Terminate.


    You’ll also want to terminate the 25 GB volume you created. Select Volume from
    the left navigation menu and then select Actions ➤ Detach Volume. Then select
    Delete Volume. See Figure [2-15](#475651_1_En_2_Chapter.xhtml#Fig15).


    ![../images/475651_1_En_2_Chapter/475651_1_En_2_Fig15_HTML.jpg](images/475651_1_En_2_Chapter/475651_1_En_2_Fig15_HTML.jpg)


    Figure 2-15

    Detaching a volume and deleting a volume


