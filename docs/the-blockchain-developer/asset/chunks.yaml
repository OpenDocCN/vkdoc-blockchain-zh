    generate private-public key combos. Note that the `elliptic-curve` library uses
    `secp256k1` as the ECDSA curve algorithm.


    **Note** *Elliptical curve cryptography* (ECC) is the public key encryption technique
    used by bitcoin. It’s based on elliptic curve theory to generate the cryptographic
    keys. Secp256k1 is the graph elliptic curve ECDSA algorithm.


    To install the library, run the following command:


    ```

