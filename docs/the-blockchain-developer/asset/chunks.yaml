- fmt: '### Deploy the Smart Contract to Your Development Network


    Now that you have bytecode compiled from your smart contract, you can migrate
    the bytecode into your development environment so you can run the migration command
    to switch to the network you set in the `truffle.js` file.


    ```

    > truffle migrate --network development

    ```


    Running this command will return the response shown in Figure [5-8](#475651_1_En_5_Chapter.xhtml#Fig8).
    This shows you that three migration files have been deployed successfully on the
    network. You have a successful deployment for each contract.


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig8_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Truffle migrate command response


    Keep in mind that the `--reset` flag is useful when you change your code, as you
    need to recompile, and re-deploy.


    ```

    > truffle migrate --reset

    ```


    ### Truffle Console


    Now that your contract has been deployed to your development network you can communicate
    with your smart contract via the Truffle CLI. To do so, you can open a console
    and connect it to your development network.


    ```

    > truffle console --network development

    ```


    Once you run the `console` command, your Terminal shows you are in Truffle CLI
    development mode.


    ```

    truffle(development)>

    ```


    To get out of CLI mode, click Control+C twice or type `.exit` in the console.


    ### Interact with Your Smart Contract via the Truffle CLI


    You set two variables, `hello` and `sign`, for your smart contracts so that you
    can interact with them.


    ```

    truffle(development)> HelloWorldContract.deployed().then(_app => { hello = _app
    })

    ```


    `undefined`


    ```

    truffle(development)> MD5SmartContract.deployed().then(_app => { doc = _app })

    undefined

    ```


    To interact with your `HelloWorldContract` contract, you can call the main public
    function you created because you exposed the function `greet`.


    ```

    truffle(development)> hello.greet()

    ''Hello World''

    ```


    Similarly, you can interact with the `MD5SmartContract.sol` contract. You will
    pass the same MD5 hash you generated in Chapter [3](#475651_1_En_3_Chapter.xhtml)
    (`634ef85e038cea45bd20900fc97e09dc`) and call your main function called `sign`.
    That function will generate an SHA256 hash, as shown in Figure [5-9](#475651_1_En_5_Chapter.xhtml#Fig9).


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig9_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig9_HTML.jpg)


    Figure 5-9


    Creating a doc.sign transaction


    ```

    truffle(development)> doc.sign(''634ef85e038cea45bd20900fc97e09dc'')

    ```


    Now you can confirm that you have an SHA256 hash by calling the `signature` function;
    see the output in Figure [5-10](#475651_1_En_5_Chapter.xhtml#Fig10).


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig10_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig10_HTML.jpg)


    Figure 5-10


    Interacting with the `MD5SmartContract` smart contract to produce a signature


    ```

    truffle(development)> doc.signature()

    ''0x7869cd540ff8c3b2635ec87251f361e21ad3c72fbc2f79897b9816bec54b0a48''

    ```


    You can download the entire smart contract project from here: [`https://github.com/Apress/the-blockchain-developer/chapter5/step1/`](https://github.com/Apress/the-blockchain-developer/chapter5/step1/).


    ## Compile with Remix


    So far you used the Truffle tools, Ganache network, and WebStorm IDE to create,
    compile, deploy, and interact with your contract; however, there is another even
    easier way. Remix offers an online IDE that can do the same as WebStorm and Truffle.


    To see this work, go to the Remix site: [`https://remix.ethereum.org`](https://remix.ethereum.org).


    Paste in the “Hello, World” smart contract code from your example. Ensure that
    the right-side panel is set to the correct compiler; you will be using “Current
    version:0.4.22.” Then click “Start to compile (Ctrl-S).” See Figure [5-11](#475651_1_En_5_Chapter.xhtml#Fig11).


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig11_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig11_HTML.jpg)


    Figure 5-11


    “Hello, World” smart contract


    Create a new folder in your project and name it `remix`; then create a file and
    name it `HelloWorldContract.js`. Click the Details button in Remix Online IDE
    and copy and paste the `WEB3DEPLOY` content into the `HelloWorldRemix.js` file
    you created, as shown in Figure [5-12](#475651_1_En_5_Chapter.xhtml#Fig12).


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig12_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig12_HTML.jpg)


    Figure 5-12


    “Hello, World” smart contract `WEB3DEPLOY` code


    ### Note


    `web3.js` is Ethereum JavaScript API; its libraries allow you to interact with
    an Ethereum node via an HTTP or IPC connection. The `WEB3DEPLOY` code can be deployed
    on a local or remote node.


    ## Private Ethereum Blockchain with Geth


    You have interacted with your smart contract on your local machine. Next, it’s
    advisable to run a full node and test your smart contract on a testnet blockchain;
    this tests it in a more realistic environment. Geth offers a full Ethereum node
    implemented in Go that you can run locally. This private testnet will allow you
    to develop and test your current smart contract in isolation from the real Ethereum
    blockchain.


    To get started, first install Geth using Brew.


    ```

    > brew tap ethereum/ethereum

    > brew install ethereum

    ```


    To ensure installation went well, run the `--version` command for the current
    Geth version (I am using 1.8.27 at the time of writing).


    ```

    > geth version

    Version: 1.8.27-stable

    ```


    ### Initialized Geth Private Blockchain


    Now that you have Geth installed, you will create your first block, or block 0,
    which is called the *genesis* block. Create a file called `genesis_block.json`
    and place it in the project root. For now just paste the provided JSON, but note
    that you can generate a custom genesis block with the Python script found here:
    [`https://blog.ethereum.org/2015/07/27/final-steps/`](https://blog.ethereum.org/2015/07/27/final-steps/).


    For the scope of this book, you will use this script and set a low difficulty
    of 1000 and gas limit of 1000000 for easy mining and low gas fees; however, feel
    free to adjust as needed in your own experiments. See `genesis_block.json`.


    ```

    {

    "config": {

    "chainId": 1,

    "homesteadBlock": 0,

    "eip155Block": 0,

    "eip158Block": 0

    },

    "difficulty": "0x1000",

    "gasLimit": "0x1000000",

    "alloc": {

    "0x44dc998cbc1c7504bec0a96af4a9aef6606a768a":

    {"balance": "0x1337000000000000000000"}

    }

    }

    ```


    Next you will create your private testnet. In Terminal, run this command:


    ```

    > geth --identity "MyTestNet" --nodiscover --networkid 1999 --datadir testnet-blockchain
    init genesis_block.json

    ```


    You will need an account for your `testnet-blockchain`; use the `account` command.
    Select a simple password as you are running a local test network, but on mainnet
    you need to be mindful of security; here I’m choosing password 123.


    ```

    > geth account new --datadir testnet-blockchain

    Passphrase: 123

    Repeat passphrase: 123

    Address: { a8eceb3e2dd7af9c6fdb12edd8a7e84290932c2d}

    ```


    As you can see, you received a wallet address after picking a password. You can
    compare your output with mine, as shown in Figure [5-13](#475651_1_En_5_Chapter.xhtml#Fig13).


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig13_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig13_HTML.jpg)


    Figure 5-13


    Creating a private testnet and wallet with Geth'
