    ```


    ### Mine Ethereum for Your Private Testnet


    You can then confirm you have a balance in your account with the `getBalance`
    command.


    ```

    geth> eth.getBalance(eth.accounts[0])


    ```


    With the `eth.accounts` command, you will get the new account you created.


    ```

    geth> eth.accounts

    ["0xa2a6d8fe7e39645613e74fe19c79071ee52009ba"]

    ```


    You can either generate or mine ether coins on the private Ethereum chain you
    created. Regardless, you need to know how to mine coins, because you will need
    transactions to be included in mined blocks as you test your code. To start mining,
    just run the `miner.start` command .


    ```

    geth> miner.start()

    null

    ```


    Similarly, to stop mining, simply run the `miner.stop` command .


    ```

    > miner.stop()

    null

    ```


    If you let the mining run, you will mine some blocks, so when you check the block
    number, you will now see results as well as funds.


    ```

    geth> eth.blockNumber


    geth> eth.getBalance(eth.accounts[0])

    8.36e+21

    ```


    ### Deploy Remix to Geth


    Now that your node is synced and you know how to mine, you can deploy your contracts
    to the testnet. First, you need to unlock your main Geth account to be able to
    use it. Ensure your account holds a balance; otherwise, you won’t be able to deploy
    your contract on the network. On Geth, unlock your account with your password
    so Geth can use it.


    ```

    geth> personal.unlockAccount(eth.accounts[0], "123", 24∗3600)

    true

    ```


    I used the password 123, but you need to change it to your password if you used
    a different password. Next, load the `web3.js` script you generated on Remix.


    ```

    > loadScript("remix/HelloWorldContract.js")

    null [object Object]

    true

    ```


    It takes a few seconds to mine the next block and include this contract; once
    it’s mined, you will receive the following message:


    ```

    Contract mined! address: 0x9905f1663f1b808d52dca42ce26e0d2648f8be07 transactionHash:
    0x66b80787eb3eae16c9535a1bd86ff1a623c1914ac9ffc2addde74655aed09157

    ```


    If you are not seeing this message, make sure you are mining.


    ```

    geth> miner.start()

    ```


    Once the contact is mined, you will get the following message in Terminal, which
    includes the address and transaction hash:


    ```

    Contract mined! address: 0xe49da16551c5c5735de46e07e8ab9e713310a13b transactionHash:
    0x36d3ec593f63280ca6aae1b079bfb6f00eea719468e04960643c23f39cbef5b3

    ```


    ### Deploy Truffle to Geth


    Similarly, to deploy the `web3.js` contract’s script via Truffle, you run the
    `migrate --reset` command. The `--reset` flag tells Truffle to run all the migrations
    from the beginning. Ensure you use `.exit` to exit the Truffle console prior to
    running the `migrate` command. Truffle will compile your contract automatically.


    ```

    truffle(development)> .exit

    > truffle migrate --reset

    Using network ''development''.

    Network up to date.

    ```


    Now you can open a development console again.


    ```

    > truffle console --network development

    truffle(development)> HelloWorldContract.deployed().then(_app => { hello = _app
    })

    undefined

    truffle(development)> hello.greet() ''Hello World''

    ```


