- fmt: "# 3. Creating Your Own Blockchain\n\nIn this chapter, I will cover how to\
    \ build your very own blockchain P2P network. This is a seven-step process, so\
    \ in each section I’ll start with a brief introduction followed by an exercise.\
    \ You can download the code for each of the following exercises from GitHub and\
    \ follow along:\n\n- Creating a basic P2P network\n- Sending and receiving blocks\n\
    - Registering miners and creating new blocks\n- Setting up a name-value database,\
    \ LevelDB\n- Creating a private-public wallet\n- Using API services\n- Creating\
    \ a command-line interface\n\nThis chapter will drill down into the code, and\
    \ the examples in this chapter are simple in nature and intended for learning\
    \ purposes. They will give you a better understanding of blockchain and the elements\
    \ that are needed to achieve a fully working prototype of a blockchain.\n\n###\
    \ Note\n\nIt’s not feasible to create a full production-grade blockchain in this\
    \ short instructional chapter; however, I will give you the fundamentals for creating\
    \ a basic working one.\n\n## Creating a Basic P2P Network\n\nThe first step in\
    \ creating your blockchain is to create a P2P network. As you saw in previous\
    \ chapters, the P2P network was the key to making blockchain work. In cryptocurrency\
    \ the P2P network can helps prevent the double spending issue for PoW and is also\
    \ the core architecture behind PoS. In a blockchain, it allows you to sync any\
    \ data needed on a network.\n\n### Note\n\nPeer-to-peer (P2P) is a type of computer\
    \ network that uses a distributed architecture. Each peer or node shares the workload\
    \ and is equal to the other peers, meaning there should not be any privileged\
    \ peer.\n\n> “We have proposed a system for electronic transactions without relying\
    \ on trust. We started with the usual framework of coins made from digital signatures,\
    \ which provides strong control of ownership, but is incomplete without a way\
    \ to prevent double-spending. To solve this, we proposed a peer-to-peer network\
    \ using proof-of-work to record a public history of transactions that quickly\
    \ becomes computationally impractical for an attacker to change if honest nodes\
    \ control a majority of CPU proof-of-worker.”\n> \n> —*Bitcoin: A Peer-to-Peer\
    \ Electronic Cash System*\n\nIn this chapter, I will show you how to create your\
    \ blockchain with Node.js, but you can do this with any other programming language\
    \ because the principles are the same. You will be setting up your machine with\
    \ the WebStorm integrated development environment (IDE) that will be used throughout\
    \ this book. To download WebStorm, go to `https://www.jetbrains.com/webstorm/`.\
    \ WebStorm offers a 30-day trial; however, it’s not necessary, and you can choose\
    \ any IDE of your liking and achieve the same results. At the time of writing,\
    \ the WebStorm version is 2018.2.\n\n### Step 1: Basic P2P Network Exercise\n\n\
    **Setting Up Your Project**\n\nIn this exercise, you will set up your project\
    \ and create a basic P2P network to send and receive messages. After you are able\
    \ to send and receive messages, you will be able to create a block class and a\
    \ chained library and tie several blocks together to create a blockchain. You\
    \ will need Node.js installed on your machine; there are many ways to install\
    \ it. One easy way is through the prebuilt installer manager; find one that fits\
    \ your platform here: `https://nodejs.org/en/download/`.\n\nAfter you have downloaded\
    \ WebStorm, you can create a new project. Select File ➤ Create New Project ➤ Node.js\
    \ Express App ➤ CREATE. In Location, call the project **Blockchain**, and click\
    \ Create (see Figure 3-1).\n\n![../images/475651_1_En_3_Chapter/475651_1_En_3_Fig1_HTML.jpg](images/475651_1_En_3_Chapter/475651_1_En_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1\n\nWebStorm, creating a new project wizard\n\n**Creating a P2P Network**\n\
    \nCreate a folder and name it **Blockchain**. Then create a file and name it `p2p.js`\
    \ and write the following code. Alternatively, you could just clone the code from\
    \ GitHub.\n\n```\nhttps://github.com/Apress/the-blockchain-developer/blob/master/chapter2/step1/p2p.js\n\
    > git clone https://github.com/Apress/the-blockchain-developer\n```\n\n**Tip**\
    \ You can clone the entire code listings in this book from GitHub. Use the following\
    \ Terminal command: `> git clone` `https://github.com/Apress/the-blockchain-developer/chapter3/step1/`\n\
    \n```\nconst crypto = require('crypto'),\nSwarm = require('discovery-swarm'),\n\
    defaults = require('dat-swarm-defaults'),\ngetPort = require('get-port');\nconst\
    \ peers = {};\nlet connSeq = 0;\nlet channel = 'myBlockchain';\nconst myPeerId\
    \ = crypto.randomBytes(32);\nconsole.log('myPeerId: ' + myPeerId.toString('hex'));\n\
    const config = defaults({\nid: myPeerId,\n});\nconst swarm = Swarm(config);\n\
    (async () => {\nconst port = await getPort();\nswarm.listen(port);\nconsole.log('Listening\
    \ port: ' + port);\nswarm.join(channel);\nswarm.on('connection', (conn, info)\
    \ => {\nconst seq = connSeq;\nconst peerId = info.id.toString('hex');\nconsole.log(`Connected\
    \ #${seq} to peer: ${peerId}`);\nif (info.initiator) {\ntry {\nconn.setKeepAlive(true,\
    \ 600);\n} catch (exception) {\nconsole.log('exception', exception);\n}\n}\nconn.on('data',\
    \ data => {\nlet message = JSON.parse(data);\nconsole.log('----------- Received\
    \ Message start -------------');\nconsole.log(\n'from: ' + peerId.toString('hex'),\n\
    'to: ' + peerId.toString(message.to),\n'my: ' + myPeerId.toString('hex'),\n'type:\
    \ ' + JSON.stringify(message.type)\n);\nconsole.log('----------- Received Message\
    \ end -------------');\n});\nconn.on('close', () => {\nconsole.log(`Connection\
    \ ${seq} closed, peerId: ${peerId}`);\nif (peers[peerId].seq === seq) {\ndelete\
    \ peers[peerId]\n}\n});\nif (!peers[peerId]) {\npeers[peerId] = {}\n}\npeers[peerId].conn\
    \ = conn;\npeers[peerId].seq = seq;\nconnSeq++\n})\n})();\nsetTimeout(function(){\n\
    writeMessageToPeers('hello', null);\n}, 10000);\nwriteMessageToPeers = (type,\
    \ data) => {\nfor (let id in peers) {\nconsole.log('-------- writeMessageToPeers\
    \ start -------- ');\nconsole.log('type: ' + type + ', to: ' + id);\nconsole.log('--------\
    \ writeMessageToPeers end ----------- ');\nsendMessage(id, type, data);\n}\n};\n\
    writeMessageToPeerToId = (toId, type, data) => {\nfor (let id in peers) {\nif\
    \ (id === toId) {\nconsole.log('-------- writeMessageToPeerToId start --------\
    \ ');\nconsole.log('type: ' + type + ', to: ' + toId);\nconsole.log('--------\
    \ writeMessageToPeerToId end ----------- ');\nsendMessage(id, type, data);\n}\n\
    }\n};\nsendMessage = (id, type, data) => {\npeers[id].conn.write(JSON.stringify(\n\
    {\nto: id,\nfrom: myPeerId,\ntype: type,\ndata: data\n}\n));\n};\n```\n\nListing\
    \ 3-1  \nShows Node.js P2P Network initial code to send and receive messages"
  raw: "# 3. Creating Your Own Blockchain\n\nIn this chapter, I will cover how to\
    \ build your very own blockchain P2P network. This is a seven-step process, so\
    \ in each section I’ll start with a brief introduction followed by an exercise.\
    \ You can download the code for each of the following exercises from GitHub and\
    \ follow along:\n\n*   Creating a basic P2P network\n\n*   Sending and receiving\
    \ blocks\n\n*   Registering miners and creating new blocks\n\n*   Setting up a\
    \ name-value database, LevelDB\n\n*   Creating a private-public wallet\n\n*  \
    \ Using API services\n\n*   Creating a command-line interface\n\nThis chapter\
    \ will drill down into the code, and the examples in this chapter are simple in\
    \ nature and intended for learning purposes. They will give you a better understanding\
    \ of blockchain and the elements that are needed to achieve a fully working prototype\
    \ of a blockchain.\n\n### Note\n\nIt’s not feasible to create a full production-grade\
    \ blockchain in this short instructional chapter; however, I will give you the\
    \ fundamentals for creating a basic working one.\n\n## Creating a Basic P2P Network\n\
    \nThe first step in creating your blockchain is to create a P2P network. As you\
    \ saw in previous chapters, the P2P network was the key to making blockchain work.\
    \ In cryptocurrency the P2P network can help prevents the double spending issue\
    \ for PoW and is also the core architecture behind PoS. In a blockchain, it allows\
    \ you to sync any data needed on a network.\n\n### Note\n\nPeer-to-peer (P2P)\
    \ is a type of computer network that uses a distributed architecture. Each peer\
    \ or node shares the workload and is equal to the other peers, meaning there should\
    \ not be any privileged peer.\n\n> *“We have proposed a system for electronic\
    \ transactions without relying on trust. We started with the usual framework of\
    \ coins made from digital signatures, which provides strong control of ownership,\
    \ but is incomplete without a way to prevent double-spending. To solve this, we\
    \ proposed a peer-to-peer network using proof-of-work to record a public history\
    \ of transactions that quickly becomes computationally impractical for an attacker\
    \ to change if honest nodes control a majority of CPU proof-of-worker.”*\n> \n\
    > —*Bitcoin: A Peer-to-Peer Electronic Cash System*\n\nIn this chapter, I will\
    \ show you how to create your blockchain with Node.js, but you can do this with\
    \ any other programming language because the principles are the same. You will\
    \ be setting up your machine with the WebStorm integrated development environment\
    \ (IDE) that will be used throughout this book. To download WebStorm, go to [`https://www.jetbrains.com/webstorm/`](https://www.jetbrains.com/webstorm/)\
    \ . WebStorm offers a 30-day trial; however, it’s not necessary, and you can choose\
    \ any IDE of your liking and achieve the same results. At the time of writing,\
    \ the WebStorm version is 2018.2.\n\n### Step 1: Basic P2P Network Exercise\n\n\
    **Setting Up Your Project**\n\nIn this exercise, you will set up your project\
    \ and create a basic P2P network to send and receive messages. After you are able\
    \ to send and receive messages, you will be able to create a block class and a\
    \ chained library and tie several blocks together to create a blockchain. You\
    \ will need Node.js installed on your machine; there are many ways to install\
    \ it. One easy way is through the prebuilt installer manager; find one that fits\
    \ your platform here: [`https://nodejs.org/en/download/`](https://nodejs.org/en/download/)\
    \ .\n\nAfter you have downloaded WebStorm, you can create a new project. Select\
    \ File ➤ Create New Project ➤ Node.js Express App ➤ CREATE. In Location, call\
    \ the project **Blockchain**, and click Create (see Figure [3-1](#475651_1_En_3_Chapter.xhtml#Fig1)).\n\
    \n![../images/475651_1_En_3_Chapter/475651_1_En_3_Fig1_HTML.jpg](images/475651_1_En_3_Chapter/475651_1_En_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1\n\nWebStorm , creating a new project wizard\n\n**Creating a P2P Network**\n\
    \nCreate a folder and name it **Blockchain**. Then create a file and name it `p2p.js`\
    \ and write the following code. Alternatively, you could just clone the code from\
    \ GitHub.\n\n```\nhttps://github.com/Apress/the-blockchain-developer/blob/master/chapter2/step1/p2p.js\n\
    > git clone https://github.com/Apress/the-blockchain-developer\n```\n\n**Tip** You\
    \ can clone the entire code listings in this book from GitHub. Use the following\
    \ Terminal command: `> git clone` [https://​github.​com/​Apress/​the-blockchain-developer/​chapter3/​step1/​](https://github.com/Apress/the-blockchain-developer/chapter3/step1/)\n\
    \n```\nconst crypto = require('crypto'),\nSwarm = require('discovery-swarm'),\n\
    defaults = require('dat-swarm-defaults'),\ngetPort = require('get-port');\nconst\
    \ peers = {};\nlet connSeq = 0;\nlet channel = 'myBlockchain';\nconst myPeerId\
    \ = crypto.randomBytes(32);\nconsole.log('myPeerId: ' + myPeerId.toString('hex'));\n\
    const config = defaults({\nid: myPeerId,\n});\nconst swarm = Swarm(config);\n\
    (async () => {\nconst port = await getPort();\nswarm.listen(port);\nconsole.log('Listening\
    \ port: ' + port);\nswarm.join(channel);\nswarm.on('connection', (conn, info)\
    \ => {\nconst seq = connSeq;\nconst peerId = info.id.toString('hex');\nconsole.log(`Connected\
    \ #${seq} to peer: ${peerId}`);\nif (info.initiator) {\ntry {\nconn.setKeepAlive(true,\
    \ 600);\n} catch (exception) {\nconsole.log('exception', exception);\n}\n}\nconn.on('data',\
    \ data => {\nlet message = JSON.parse(data);\nconsole.log('----------- Received\
    \ Message start -------------');\nconsole.log(\n'from: ' + peerId.toString('hex'),\n\
    'to: ' + peerId.toString(message.to),\n'my: ' + myPeerId.toString('hex'),\n'type:\
    \ ' + JSON.stringify(message.type)\n);\nconsole.log('----------- Received Message\
    \ end -------------');\n});\nconn.on('close', () => {\nconsole.log(`Connection\
    \ ${seq} closed, peerId: ${peerId}`);\nif (peers[peerId].seq === seq) {\ndelete\
    \ peers[peerId]\n}\n});\nif (!peers[peerId]) {\npeers[peerId] = {}\n}\npeers[peerId].conn\
    \ = conn;\npeers[peerId].seq = seq;\nconnSeq++\n})\n})();\nsetTimeout(function(){\n\
    writeMessageToPeers('hello', null);\n}, 10000);\nwriteMessageToPeers = (type,\
    \ data) => {\nfor (let id in peers) {\nconsole.log('-------- writeMessageToPeers\
    \ start -------- ');\nconsole.log('type: ' + type + ', to: ' + id);\nconsole.log('--------\
    \ writeMessageToPeers end ----------- ');\nsendMessage(id, type, data);\n}\n};\n\
    writeMessageToPeerToId = (toId, type, data) => {\nfor (let id in peers) {\nif\
    \ (id === toId) {\nconsole.log('-------- writeMessageToPeerToId start --------\
    \ ');\nconsole.log('type: ' + type + ', to: ' + toId);\nconsole.log('--------\
    \ writeMessageToPeerToId end ----------- ');\nsendMessage(id, type, data);\n}\n\
    }\n};\nsendMessage = (id, type, data) => {\npeers[id].conn.write(JSON.stringify(\n\
    {\nto: id,\nfrom: myPeerId,\ntype: type,\ndata: data\n}\n));\n};\nListing 3-1\n\
    Shows Node.js P2P Network initial code to send and receive messages\n```"
  trans: "\n# 3. 创建你自己的区块链\n\n本章将介绍如何构建你自己的区块链 P2P 网络。这是一个包含七个步骤的过程，因此每一节我都会先做简要介绍，然后安排一个练习。你可以从\
    \ GitHub 下载以下每个练习的代码，并跟着操作：\n\n- 创建基础 P2P 网络\n- 发送与接收区块\n- 注册矿工并创建新区块\n- 搭建键值数据库\
    \ LevelDB\n- 创建私钥-公钥钱包\n- 使用 API 服务\n- 创建命令行界面\n\n本章将深入讲解代码，本章中的示例本质简单，旨在用于学习。它们将帮助你更好地理解区块链，以及构建一个完全可运行的区块链原型所需的要素。\n\
    \n### 注意\n\n在这篇简短的教学章节中，创建一个完整的生产级区块链并不可行；不过，我会为你提供创建基本可用区块链的基础知识。\n\n## 创建基础\
    \ P2P 网络\n\n创建区块链的第一步是创建一个 P2P 网络。正如你在前几章中所见，P2P 网络是使区块链运转的关键。在加密货币中，P2P 网络有助于防止工作量证明机制中的双重支付问题，同时也是权益证明机制背后的核心架构。在区块链中，它允许你在网络上同步任何所需的数据。\n\
    \n### 注意\n\n点对点（P2P）是一种使用分布式架构的计算机网络。每个对等节点或节点共享工作负载，且与其他对等节点地位平等，这意味着不应该存在任何特权节点。\n\
    \n> “我们提出了一种不依赖信任的电子交易系统。我们从由数字签名构成的常规货币框架入手，该框架提供了强有力的所有权控制，但若缺少防止双重支付的方法则是不完整的。为解决此问题，我们提出了一种使用工作量证明来记录公开交易历史的\
    \ P2P 网络，一旦诚实节点控制了大部分的 CPU 算力，对于攻击者来说，修改历史在计算上会变得不切实际。”\n> \n> —*Bitcoin: A Peer-to-Peer\
    \ Electronic Cash System*\n\n在本章中，我将向你展示如何使用 Node.js 创建你的区块链，但你也可以使用任何其他编程语言来完成，因为原理是相同的。你将使用\
    \ WebStorm 集成开发环境（IDE）搭建你的机器，本书将全程使用该环境。要下载 WebStorm，请访问 `https://www.jetbrains.com/webstorm/`。WebStorm\
    \ 提供 30 天试用期；不过，这不是必需的，你可以选择任何你喜欢的 IDE 并获得相同的结果。在撰写本书时，WebStorm 的版本是 2018.2。\n\
    \n### 第一步：基础 P2P 网络练习\n\n**设置你的项目**\n\n在这个练习中，你将设置你的项目并创建一个基础的 P2P 网络，用于发送和接收消息。在能够发送和接收消息之后，你将能够创建一个区块类和一个链式库，并将多个区块连接在一起以创建一个区块链。你需要在你的机器上安装\
    \ Node.js；安装方法有很多。一种简单的方法是通过预构建的安装程序管理器；在这里找到适合你平台的安装程序：`https://nodejs.org/en/download/`。\n\
    \n下载 WebStorm 后，你可以创建一个新项目。选择 文件 ➤ 创建新项目 ➤ Node.js Express App ➤ 创建。在位置处，将项目命名为\
    \ **Blockchain**，然后点击创建（见图 3-1）。\n\n![../images/475651_1_En_3_Chapter/475651_1_En_3_Fig1_HTML.jpg](img/475651_1_En_3_Fig1_HTML.jpg)\n\
    \n图 3-1\n\nWebStorm，新建项目向导\n\n**创建 P2P 网络**\n\n创建一个文件夹并将其命名为 **Blockchain**。然后创建一个文件并将其命名为\
    \ `p2p.js`，并编写以下代码。或者，你也可以直接从 GitHub 克隆代码。\n\n```\nhttps://github.com/Apress/the-blockchain-developer/blob/master/chapter2/step1/p2p.js\n\
    > git clone https://github.com/Apress/the-blockchain-developer\n```\n\n**提示**\
    \ 你可以从 GitHub 克隆本书中的所有代码清单。使用以下终端命令：`> git clone` `https://github.com/Apress/the-blockchain-developer/chapter3/step1/`\n\
    \n```\nconst crypto = require('crypto'),\nSwarm = require('discovery-swarm'),\n\
    defaults = require('dat-swarm-defaults'),\ngetPort = require('get-port');\nconst\
    \ peers = {};\nlet connSeq = 0;\nlet channel = 'myBlockchain';\nconst myPeerId\
    \ = crypto.randomBytes(32);\nconsole.log('myPeerId: ' + myPeerId.toString('hex'));\n\
    const config = defaults({\nid: myPeerId,\n});\nconst swarm = Swarm(config);\n\
    (async () => {\nconst port = await getPort();\nswarm.listen(port);\nconsole.log('Listening\
    \ port: ' + port);\nswarm.join(channel);\nswarm.on('connection', (conn, info)\
    \ => {\nconst seq = connSeq;\nconst peerId = info.id.toString('hex');\nconsole.log(`Connected\
    \ #${seq} to peer: ${peerId}`);\nif (info.initiator) {\ntry {\nconn.setKeepAlive(true,\
    \ 600);\n} catch (exception) {\nconsole.log('exception', exception);\n}\n}\nconn.on('data',\
    \ data => {\nlet message = JSON.parse(data);\nconsole.log('----------- Received\
    \ Message start -------------');\nconsole.log(\n'from: ' + peerId.toString('hex'),\n\
    'to: ' + peerId.toString(message.to),\n'my: ' + myPeerId.toString('hex'),\n'type:\
    \ ' + JSON.stringify(message.type)\n);\nconsole.log('----------- Received Message\
    \ end -------------');\n});\nconn.on('close', () => {\nconsole.log(`Connection\
    \ ${seq} closed, peerId: ${peerId}`);\nif (peers[peerId].seq === seq) {\ndelete\
    \ peers[peerId]\n}\n});\nif (!peers[peerId]) {\npeers[peerId] = {}\n}\npeers[peerId].conn\
    \ = conn;\npeers[peerId].seq = seq;\nconnSeq++\n})\n})();\nsetTimeout(function(){\n\
    writeMessageToPeers('hello', null);\n}, 10000);\nwriteMessageToPeers = (type,\
    \ data) => {\nfor (let id in peers) {\nconsole.log('-------- writeMessageToPeers\
    \ start -------- ');\nconsole.log('type: ' + type + ', to: ' + id);\nconsole.log('--------\
    \ writeMessageToPeers end ----------- ');\nsendMessage(id, type, data);\n}\n};\n\
    writeMessageToPeerToId = (toId, type, data) => {\nfor (let id in peers) {\nif\
    \ (id === toId) {\nconsole.log('-------- writeMessageToPeerToId start --------\
    \ ');\nconsole.log('type: ' + type + ', to: ' + toId);\nconsole.log('--------\
    \ writeMessageToPeerToId end ----------- ');\nsendMessage(id, type, data);\n}\n\
    }\n};\nsendMessage = (id, type, data) => {\npeers[id].conn.write(JSON.stringify(\n\
    {\nto: id,\nfrom: myPeerId,\ntype: type,\ndata: data\n}\n));\n};\n```\n\n清单 3-1\
    \  \n展示用于发送和接收消息的 Node.js P2P 网络初始代码\n"
- fmt: '要运行此示例，您需要运行此代码的两个实例。您可以在两台不同的机器上运行（如同真实场景），也可以在终端中从同一台机器运行两个实例。


    您的代码需要查找并连接对等节点，部署用于发现其他对等节点的服务器，并获取可用的 TCP 端口。这通过使用以下三个库来实现：


    -   `discovery-swarm`：用于创建一个网络集群，该集群使用 `discovery-channel` 查找并连接对等节点。

    -   `dat-swarm-defaults`：部署用于发现其他对等节点的服务器。

    -   `get-port`：获取可用的 TCP 端口。


    要安装这些库，请运行以下命令：


    ```

    npm install crypto discovery-swarm dat-swarm-defaults get-port --save

    ```


    现在已安装好库，请打开两个终端实例，并导航到库的所在位置。运行以下命令：


    ```

    node p2p.js

    ```


    要从 GitHub 上克隆的库运行代码，请导航到代码目录，遵循以下终端命令安装库，并运行一个附加了 `p2p.js` 代码的 Node.js 实例：


    ```

    cd [location]/chapter2/step2

    npm install

    node p2p.js

    ```


    图 [3-2](#475651_1_En_3_Chapter.xhtml#Fig2) 显示了运行 Node.js 代码的输出。


    ![../images/475651_1_En_3_Chapter/475651_1_En_3_Fig2_HTML.jpg](images/475651_1_En_3_Chapter/475651_1_En_3_Fig2_HTML.jpg)


    图 3-2

    在终端中运行两个对等节点的 P2P 网络


    如图 [3-2](#475651_1_En_3_Chapter.xhtml#Fig2) 所示，网络为您的主机生成了一个随机对等节点 ID，并使用您安装的发现库选取了一个随机端口。然后，代码能够发现网络上的其他对等节点，并与这些对等节点发送和接收消息。您现在已通过
    P2P 网络与其他用户连接。


    让我们浏览代码以更好地理解其工作原理。代码的第一行是为您在代码中使用的开源库导入的 `import` 语句。


    ```

    const crypto = require(''crypto''),

    Swarm = require(''discovery-swarm''),

    defaults = require(''dat-swarm-defaults''),

    getPort = require(''get-port'');

    ```


    请注意，您使用 `const` 而不是 `let` 来设置变量。您希望确保没有重新绑定，并且始终引用同一个对象，因此根据最佳实践，建议选择 `const`。


    接下来，设置变量以保存包含对等节点和连接序列的对象，并选择一个所有节点都将连接到的频道名称。还使用 `crypto` 库为您的对等节点设置一个随机生成的对等节点
    ID。


    ```

    const peers = {};

    let connSeq = 0;

    let channel = ''myBlockchain'';

    const myPeerId = crypto.randomBytes(32);

    console.log(''myPeerId: '' + myPeerId.toString(''hex''));

    ```


    接下来，生成一个包含您的对等节点 ID 的配置对象。然后使用该配置对象初始化 `swarm` 库。`swarm` 库可以在以下位置找到：[`https://github.com/mafintosh/discovery-swarm`](https://github.com/mafintosh/discovery-swarm)
    。它的作用是创建一个网络集群，该集群使用 `discovery-channel` 库在 UDP/TCP 网络上查找并连接对等节点。


    ```

    const config = defaults({

    id: myPeerId,

    });

    const swarm = Swarm(config);

    ```


    现在所有设置已准备就绪，您将创建一个 Node.js 异步函数来持续监视 `swarm.on` 事件消息。


    ```

    (async () => {

    ```


    您监听所选随机端口，一旦与对等节点建立连接，便使用 `setKeepAlive` 确保网络连接与其他对等节点保持。


    ```

    const port = await getPort();

    swarm.listen(port);

    console.log(''Listening port: '' + port);

    swarm.join(channel);

    swarm.on(''connection'', (conn, info) => {

    const seq = connSeq;

    const peerId = info.id.toString(''hex'');

    console.log(`Connected #${seq} to peer: ${peerId}`);

    if (info.initiator) {

    try {

    conn.setKeepAlive(true, 600);

    } catch (exception) {

    console.log(''exception'', exception);

    }

    }

    ```


    一旦在 P2P 网络上收到 `data` 消息，您就使用 `JSON.parse`（这是一个 Node.js 原生命令，因此无需包含任何 `import`
    语句）解析数据。此命令将您的消息解码回对象，而 `toString` 命令将字节转换为可读的字符串数据类型。


    ```

    conn.on(''data'', data => {

    let message = JSON.parse(data);

    console.log(''----------- Received Message start -------------'');

    console.log(

    ''from: '' + peerId.toString(''hex''),

    ''to: '' + peerId.toString(message.to),

    ''my: '' + myPeerId.toString(''hex''),

    ''type: '' + JSON.stringify(message.type)

    );

    console.log(''----------- Received Message end -------------'');

    });

    ```


    您还监听 `close` 事件，该事件将指示您与对等节点失去了连接，因此您可以采取操作，例如从 `peers` 列表对象中删除该对等节点。


    ```

    conn.on(''close'', () => {

    console.log(`Connection ${seq} closed, peerId: ${peerId}`);

    if (peers[peerId].seq === seq) {

    delete peers[peerId]

    }

    });

    if (!peers[peerId]) {

    peers[peerId] = {}

    }

    peers[peerId].conn = conn;

    peers[peerId].seq = seq;

    connSeq++

    })();

    ```


    在这里，您将使用 `setTimeout` Node.js 原生函数在十秒后向任何可用的对等节点发送消息。您将发送的第一条消息只是一个“hello”消息。您创建了名为
    `writeMessageToPeers` 和 `writeMessageToPeerToId` 的方法来处理您的对象，以便使用要传输的数据和发送目标进行格式化。


    ```

    setTimeout(function(){

    writeMessageToPeers(''hello'', null);

    }, 10000);

    ```


    `writeMessageToPeers` 方法将向所有已连接的对等节点发送消息。


    ```

    writeMessageToPeers = (type, data) => {

    for (let id in peers) {

    console.log(''-------- writeMessageToPeers start -------- '');

    console.log(''type: '' + type + '', to: '' + id);

    console.log(''-------- writeMessageToPeers end ----------- '');

    sendMessage(id, type, data);

    }

    };

    ```


    此外，您还将创建另一个方法 `writeMessageToPeerToId`，它将向特定的对等节点 ID 发送消息，以防您只想与一个特定的对等节点通信。


    ```

    writeMessageToPeerToId = (toId, type, data) => {

    for (let id in peers) {

    if (id === toId) {

    console.log(''-------- writeMessageToPeerToId start -------- '');

    console.log(''type: '' + type + '', to: '' + toId);

    console.log(''-------- writeMessageToPeerToId end ----------- '');

    sendMessage(id, type, data);

    }

    }

    };

    ```


    最后，`sendMessage` 是一个通用方法，您将使用它发送根据要传递的参数格式化的消息，其中包括以下内容：


    -   **to/from**：您发送和接收消息的对等节点 ID。

    -   **type**：消息类型。

    -   **data**：您希望在 P2P 网络上共享的任何数据。


    在您共享区块链区块时，这些参数将非常有用。请注意，您传递的消息需要是字符串，不能是对象，因此您正在使用 `JSON.stringify` 原生函数在 P2P
    网络上共享消息之前对消息进行编码。


    ```

    sendMessage = (id, type, data) => {

    peers[id].conn.write(JSON.stringify(

    {

    to: id,

    from: myPeerId,

    type: type,

    data: data

    }

    ));

    };

    ```


    在本练习中，您下载并安装了 WebStorm IDE，并创建了项目，其中包含一个基本的 P2P 网络。您成功保持了与 TCP 网络随机端口的连接，并能够发送和接收消息，包括对这些消息进行编码和解码。您已准备好进入下一个练习，在网络上的每个节点之间发送实际的区块。'
  raw: 'To get this example to work, you need to run two instances of this code. You
    can run it from two separate machines as would be done in real life, or you could
    run two instances from the same machine via Terminal.


    Your code needs to find and connect peers, deploy servers that are used to discover
    other peers, and get an available TCP port. That is done by utilizing these three
    libraries:


    *   **discovery-swarm**: Used to create a network swarm that uses `discovery-channel`
    to find and connect peers


    *   **dat-swarm-defaults**: Deploys servers that are used to discover other peers


    *   **get-port**: Gets available TCP ports


    To install these libraries, run this command:


    ```

    > npm install crypto discovery-swarm dat-swarm-defaults get-port --save

    ```


    Now that are libraries are installed, open two Terminal instances and navigate
    to the location of the library. Run the following command:


    ```

    > node p2p.js

    ```


    To run the code from the clone library on GitHub, navigate to the code, follow
    these Terminal commands to install the libraries, and run a node.js instance attaching
    our p2p.js code:


    ```

    > cd [location]/chapter2/step2

    > npm install

    > node p2p.js

    ```


    Figure [3-2](#475651_1_En_3_Chapter.xhtml#Fig2) shows the output of running the
    Node.js code.


    ![../images/475651_1_En_3_Chapter/475651_1_En_3_Fig2_HTML.jpg](images/475651_1_En_3_Chapter/475651_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    P2P running two peers in Terminal


    As you can see in Figure [3-2](#475651_1_En_3_Chapter.xhtml#Fig2), the network
    generated a random peer ID for your machine and picked a random port utilizing
    the discovery libraries you installed. Then the code was able to discover other
    peers on the network and send and receive messages to and from these peers. You
    are now connected on a P2P network with other users.


    Let’s walk through the code to better understand how it all works. The first lines
    of code are an `import` statement for the open source libraries that you are using
    in your code.


    ```

    const crypto = require(''crypto''),

    Swarm = require(''discovery-swarm''),

    defaults = require(''dat-swarm-defaults''),

    getPort = require(''get-port'');

    ```


    Notice that you use `const` to set your variable instead of `let`. You want to
    ensure there is no rebinding, and you always refer to the same object, so selecting
    `const` is advised according to best practices.


    Next, you set your variables to hold an object with the peers and connection sequence,
    and you choose a channel name that all your nodes will be connecting to. You also
    set a randomly generated peer ID for your peer utilizing the `crypto` library.


    ```

    const peers = {};

    let connSeq = 0;

    let channel = ''myBlockchain'';

    const myPeerId = crypto.randomBytes(32);

    console.log(''myPeerId: '' + myPeerId.toString(''hex''));

    ```


    Next, you generate a config object that holds your peer ID. Then you use the config
    object to initialize the `swarm` library. The `swarm` library can be found here:
    [`https://github.com/mafintosh/discovery-swarm`](https://github.com/mafintosh/discovery-swarm)
    . What it does is create a network swarm that uses the `discovery-channel` library
    to find and connect peers on a UCP/TCP network.


    ```

    const config = defaults({

    id: myPeerId,

    });

    const swarm = Swarm(config);

    ```


    Now that everything is set up and ready, you will be creating a Node.js async
    function to continuously monitor `swarm.on` event messages.


    ```

    (async () => {

    ```


    You listen on the random port selected, and once a connection is made to the peer,
    you use `setKeepAlive` to ensure the network connection stays with other peers.


    ```

    const port = await getPort();

    swarm.listen(port);

    console.log(''Listening port: '' + port);

    swarm.join(channel);

    swarm.on(''connection'', (conn, info) => {

    const seq = connSeq;

    const peerId = info.id.toString(''hex'');

    console.log(`Connected #${seq} to peer: ${peerId}`);

    if (info.initiator) {

    try {

    conn.setKeepAlive(true, 600);

    } catch (exception) {

    console.log(''exception'', exception);

    }

    }

    ```


    Once you receive a `data` message on the P2P network, you parse the data using
    `JSON.parse`, which is a Node.js native command, so you do not need to include
    any `import` statement. This command decodes your message back into an object,
    and the `toString` command converts bytes into a readable string data type.


    ```

    conn.on(''data'', data => {

    let message = JSON.parse(data);

    console.log(''----------- Received Message start -------------'');

    console.log(

    ''from: '' + peerId.toString(''hex''),

    ''to: '' + peerId.toString(message.to),

    ''my: '' + myPeerId.toString(''hex''),

    ''type: '' + JSON.stringify(message.type)

    );

    console.log(''----------- Received Message end -------------'');

    });

    ```


    You also listen to a `close` event , which will indicate that you lost a connection
    with peers, so you can take action, such as delete the peers from your `peers`
    list object.


    ```

    conn.on(''close'', () => {

    console.log(`Connection ${seq} closed, peerId: ${peerId}`);

    if (peers[peerId].seq === seq) {

    delete peers[peerId]

    }

    });

    if (!peers[peerId]) {

    peers[peerId] = {}

    }

    peers[peerId].conn = conn;

    peers[peerId].seq = seq;

    connSeq++

    })

    })();

    ```


    Here, you will be using a `setTimeout` Node.js native function to send a message
    after ten seconds to any available peers. The first message you will be sending
    is just an “hello” message. You create methods called `writeMessageToPeers` and
    `writeMessageToPeerToId` to handle your object, so it’s formatted with the data
    you want to transmit and who you want to send it to.


    ```

    setTimeout(function(){

    writeMessageToPeers(''hello'', null);

    }, 10000);

    ```


    The `writeMessageToPeers` method will be sending messages to all the connected
    peers.


    ```

    writeMessageToPeers = (type, data) => {

    for (let id in peers) {

    console.log(''-------- writeMessageToPeers start -------- '');

    console.log(''type: '' + type + '', to: '' + id);

    console.log(''-------- writeMessageToPeers end ----------- '');

    sendMessage(id, type, data);

    }

    };

    ```


    Additionally, you will be creating another method, `writeMessageToPeerToId`, that
    will be sending the message to a specific peer ID, in case you want to communicate
    with just one specific peer.


    ```

    writeMessageToPeerToId = (toId, type, data) => {

    for (let id in peers) {

    if (id === toId) {

    console.log(''-------- writeMessageToPeerToId start -------- '');

    console.log(''type: '' + type + '', to: '' + toId);

    console.log(''-------- writeMessageToPeerToId end ----------- '');

    sendMessage(id, type, data);

    }

    }

    };

    ```


    Lastly, `sendMessage` is a generic method that you will be using to send a message
    formatted with the params you would like to pass and includes the following:


    *   **to/from**: The peer ID you are sending the message from and to


    *   **type**: The message type


    *   **data**: Any data you would like to share on the P2P network


    These params will be useful once you share your blockchain block. Notice that
    the message you pass needs to be a string and cannot be an object, so you are
    using a `JSON.stringify` native function to encode your messages before sharing
    them over the P2P network.


    ```

    sendMessage = (id, type, data) => {

    peers[id].conn.write(JSON.stringify(

    {

    to: id,

    from: myPeerId,

    type: type,

    data: data

    }

    ));

    };

    ```


    In this exercise, you downloaded and installed the WebStorm IDE and created your
    project, which includes a basic P2P network. You were able to keep a connection
    to a TCP network random port and send and receive messages including encoding
    and decoding these messages. You are ready to move to the next exercise and send
    an actual block between each node on your network.'
  trans: '

    要运行此示例，您需要运行此代码的两个实例。您可以在两台不同的机器上运行（如同真实场景），也可以在终端中从同一台机器运行两个实例。


    您的代码需要查找并连接对等节点，部署用于发现其他对等节点的服务器，并获取可用的 TCP 端口。这通过使用以下三个库来实现：


    -   `discovery-swarm`：用于创建一个网络集群，该集群使用 `discovery-channel` 查找并连接对等节点。

    -   `dat-swarm-defaults`：部署用于发现其他对等节点的服务器。

    -   `get-port`：获取可用的 TCP 端口。


    要安装这些库，请运行以下命令：


    ```

    npm install crypto discovery-swarm dat-swarm-defaults get-port --save

    ```


    现在已安装好库，请打开两个终端实例，并导航到库的所在位置。运行以下命令：


    ```

    node p2p.js

    ```


    要从 GitHub 上克隆的库运行代码，请导航到代码目录，遵循以下终端命令安装库，并运行一个附加了 `p2p.js` 代码的 Node.js 实例：


    ```

    cd [location]/chapter2/step2

    npm install

    node p2p.js

    ```


    图 3-2 显示了运行 Node.js 代码的输出。


    ![../images/475651_1_En_3_Chapter/475651_1_En_3_Fig2_HTML.jpg](img/475651_1_En_3_Fig2_HTML.jpg)


    图 3-2

    在终端中运行两个对等节点的 P2P 网络


    如图 3-2 所示，网络为您的主机生成了一个随机对等节点 ID，并使用您安装的发现库选取了一个随机端口。然后，代码能够发现网络上的其他对等节点，并与这些对等节点发送和接收消息。您现在已通过
    P2P 网络与其他用户连接。


    让我们浏览代码以更好地理解其工作原理。代码的第一行是为您在代码中使用的开源库导入的 `import` 语句。


    ```

    const crypto = require(''crypto''),

    Swarm = require(''discovery-swarm''),

    defaults = require(''dat-swarm-defaults''),

    getPort = require(''get-port'');

    ```


    请注意，您使用 `const` 而不是 `let` 来设置变量。您希望确保没有重新绑定，并且始终引用同一个对象，因此根据最佳实践，建议选择 `const`。


    接下来，设置变量以保存包含对等节点和连接序列的对象，并选择一个所有节点都将连接到的频道名称。还使用 `crypto` 库为您的对等节点设置一个随机生成的对等节点
    ID。


    ```

    const peers = {};

    let connSeq = 0;

    let channel = ''myBlockchain'';

    const myPeerId = crypto.randomBytes(32);

    console.log(''myPeerId: '' + myPeerId.toString(''hex''));

    ```


    接下来，生成一个包含您的对等节点 ID 的配置对象。然后使用该配置对象初始化 `swarm` 库。`swarm` 库可以在以下位置找到：[`https://github.com/mafintosh/discovery-swarm`](https://github.com/mafintosh/discovery-swarm)
    。它的作用是创建一个网络集群，该集群使用 `discovery-channel` 库在 UDP/TCP 网络上查找并连接对等节点。


    ```

    const config = defaults({

    id: myPeerId,

    });

    const swarm = Swarm(config);

    ```


    现在所有设置已准备就绪，您将创建一个 Node.js 异步函数来持续监视 `swarm.on` 事件消息。


    ```

    (async () => {

    ```


    您监听所选随机端口，一旦与对等节点建立连接，便使用 `setKeepAlive` 确保网络连接与其他对等节点保持。


    ```

    const port = await getPort();

    swarm.listen(port);

    console.log(''Listening port: '' + port);

    swarm.join(channel);

    swarm.on(''connection'', (conn, info) => {

    const seq = connSeq;

    const peerId = info.id.toString(''hex'');

    console.log(`Connected #${seq} to peer: ${peerId}`);

    if (info.initiator) {

    try {

    conn.setKeepAlive(true, 600);

    } catch (exception) {

    console.log(''exception'', exception);

    }

    }

    ```


    一旦在 P2P 网络上收到 `data` 消息，您就使用 `JSON.parse`（这是一个 Node.js 原生命令，因此无需包含任何 `import`
    语句）解析数据。此命令将您的消息解码回对象，而 `toString` 命令将字节转换为可读的字符串数据类型。


    ```

    conn.on(''data'', data => {

    let message = JSON.parse(data);

    console.log(''----------- Received Message start -------------'');

    console.log(

    ''from: '' + peerId.toString(''hex''),

    ''to: '' + peerId.toString(message.to),

    ''my: '' + myPeerId.toString(''hex''),

    ''type: '' + JSON.stringify(message.type)

    );

    console.log(''----------- Received Message end -------------'');

    });

    ```


    您还监听 `close` 事件，该事件将指示您与对等节点失去了连接，因此您可以采取操作，例如从 `peers` 列表对象中删除该对等节点。


    ```

    conn.on(''close'', () => {

    console.log(`Connection ${seq} closed, peerId: ${peerId}`);

    if (peers[peerId].seq === seq) {

    delete peers[peerId]

    }

    });

    if (!peers[peerId]) {

    peers[peerId] = {}

    }

    peers[peerId].conn = conn;

    peers[peerId].seq = seq;

    connSeq++

    })();

    ```


    在这里，您将使用 `setTimeout` Node.js 原生函数在十秒后向任何可用的对等节点发送消息。您将发送的第一条消息只是一个“hello”消息。您创建了名为
    `writeMessageToPeers` 和 `writeMessageToPeerToId` 的方法来处理您的对象，以便使用要传输的数据和发送目标进行格式化。


    ```

    setTimeout(function(){

    writeMessageToPeers(''hello'', null);

    }, 10000);

    ```


    `writeMessageToPeers` 方法将向所有已连接的对等节点发送消息。


    ```

    writeMessageToPeers = (type, data) => {

    for (let id in peers) {

    console.log(''-------- writeMessageToPeers start -------- '');

    console.log(''type: '' + type + '', to: '' + id);

    console.log(''-------- writeMessageToPeers end ----------- '');

    sendMessage(id, type, data);

    }

    };

    ```


    此外，您还将创建另一个方法 `writeMessageToPeerToId`，它将向特定的对等节点 ID 发送消息，以防您只想与一个特定的对等节点通信。


    ```

    writeMessageToPeerToId = (toId, type, data) => {

    for (let id in peers) {

    if (id === toId) {

    console.log(''-------- writeMessageToPeerToId start -------- '');

    console.log(''type: '' + type + '', to: '' + toId);

    console.log(''-------- writeMessageToPeerToId end ----------- '');

    sendMessage(id, type, data);

    }

    }

    };

    ```


    最后，`sendMessage` 是一个通用方法，您将使用它发送根据要传递的参数格式化的消息，其中包括以下内容：


    -   **to/from**：您发送和接收消息的对等节点 ID。

    -   **type**：消息类型。

    -   **data**：您希望在 P2P 网络上共享的任何数据。


    在您共享区块链区块时，这些参数将非常有用。请注意，您传递的消息需要是字符串，不能是对象，因此您正在使用 `JSON.stringify` 原生函数在 P2P
    网络上共享消息之前对消息进行编码。


    ```

    sendMessage = (id, type, data) => {

    peers[id].conn.write(JSON.stringify(

    {

    to: id,

    from: myPeerId,

    type: type,

    data: data

    }

    ));

    };

    ```


    在本练习中，您下载并安装了 WebStorm IDE，并创建了项目，其中包含一个基本的 P2P 网络。您成功保持了与 TCP 网络随机端口的连接，并能够发送和接收消息，包括对这些消息进行编码和解码。您已准备好进入下一个练习，在网络上的每个节点之间发送实际的区块。

