    If you are using v0.18, you can see that `getaddressinfo` addresses have both
    parameters for legacy scriptSig and for SegWit.


    ### Elliptic Curve Digital Signature Algorithm


    Bitcoin core allows you to create a signature by utilizing the Elliptic Curve
    Digital Signature Algorithm (ECDSA) . This can be achieved by utilizing the `signmessage`
    command. Adding a signature allows you to prove that you own the private keys
    of the wallet and thus adds another security layer for the sender to ensure they
    are sending the funds to the correct address.


    ```

    > bitcoin-cli signmessage "13oWKiVQ7C5Ewwjv6KRpP3Xm5YstzqFixT" "John Doe"

    ```


    This command outputs a hash:


    ```

    HzicuTXMl1COVh7Xw9ky9A/cl7ZjMSWNH10Y/invAgHWa74gS8EOvio3FJkofpH0nunIA7pJoGwWLRa0UdD7dc8=

    ```


    The sender can verify the wallet prior to sending the funds.


    ```

    > bitcoin-cli verifymessage "13oWKiVQ7C5Ewwjv6KRpP3Xm5YstzqFixT" "HzicuTXMl1COVh7Xw9ky9A/cl7ZjMSWNH10Y/invAgHWa74gS8EOvio3FJkofpH0nunIA7pJoGwWLRa0UdD7dc8="
    "John Doe"

    ```


    The verify command will output a true or false response. In this case, it will
    respond with this:


    ```

    true

    ```


    This allows users to confirm they actually own a wallet. This is useful, for instance,
    on the code level, because the P2PKH address will be utilizing the private key
    to generate a signature. A P2PKH address is a hash of the public key corresponding
    to the private key that made the signature.


    ### Note


    ECDSA is the cryptographic algorithm utilized by bitcoin to ensure ownership of
    funds. It is used to generate the public/private keys and can also include the
    signature in the algorithm.


    The ECDSA signature can be checked against up to four possible ECDSA public keys.
    These public keys will be reconstructed from the signature hash; each key is hashed
    and compared against the P2PKH wallet address provided for a match. The result
    is either true or false. As you saw earlier, the example received a `true` once
    you ran the `verifymessage` command.


    ### Note


    QR code is an image representation of a string. QR readers are used for things
    such as reading URLs or encoding a wallet’s public key address.


    You can generate QR code via the Chart Google API: [`https://chart.googleapis.com`](https://chart.googleapis.com)
    . For instance to generate a QR code for address: `13oWKiVQ7C5Ewwjv6KRpP3Xm5YstzqFixT`
    in the amount of 0.00016 BTC you would generate the following URL:


    [`https://chart.googleapis.com/chart?chs=250x250&cht=qr&chl=bitcoin:13oWKiVQ7C5Ewwjv6KRpP3Xm5YstzqFixT?&amount=0.00016`](https://chart.googleapis.com/chart%253Fchs%253D250x250%2526cht%253Dqr%2526chl%253Dbitcoin:13oWKiVQ7C5Ewwjv6KRpP3Xm5YstzqFixT%253F%2526amount%253D0.00016)
    . See Figure [4-1](#475651_1_En_4_Chapter.xhtml#Fig1).


    ![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig1_HTML.jpg](images/475651_1_En_4_Chapter/475651_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Bitcoin QR code via Chart.googleapi.com


    ## Transactions


    In this section, I will cover transactions. You will learn how to send coins with
    bitcoin’s daemon on a testnet utilizing both the command line and the bitcoin
    core wallet GUI. You will learn how to use the bitcoin explorer to view your transactions.
    Then I will cover more advanced creation of transactions by showing how to create
    a raw transaction with one output as well as more complex transactions with utilizing
    Multisignature (multisig), which is requesting more than a single key to authorize
    a transaction. Additionally, I will cover how to change other options such as
    replacing a transaction for a change of fee as well as setting a locktime. You
    will learn the difference between P2PKH and P2SH-SEGWIT. Lastly, you will learn
    how to attach other data than just coins with bitcoin using `OP_RETURN` params.
    Let’s get started.


    ### Simple Command


    The first transaction in a block is called the *coinbase* transaction ; this transaction
    consists of the transaction fees paid by transactions included in the block. To
    send a transaction, you need to pay a transaction fee to the miners. If there
    is a low fee or no fee is paid, the transaction may get stuck for a long period
    of time or even forever in the P2P network until the fee is changed.


    To set the transaction fee, you can add a parameter to the `bitcoin.conf` file
    with a default fee. First, you need to find the file location. To do so, right
    after you run the daemon, you can track down the location of the file.


    ```

    > bitcoind –printtoconsole

    ```


    After a few seconds, stop this service by pressing Control+C. The command shows
    the `bitcoin.conf` file location. It returns the location of the configuration
    file. Then you can open the file and modify it by adding the default fee. In this
    case, it was nested inside the Application Support folder.


    ```

    /Users/[my user]/Library/Application Support/Bitcoin/bitcoin.conf

    ```


    When you open the file, you can see that the default transaction fee is set to
    0.00000020 (`mintxfee=0.00000020`).


    ### Note


    There are other fees and settings in bitcoind. You can modify transactions you
    send (`paytxfee`), maximum total fees (`maxtxfee`), fallback fees, and so on.
    Visit this bitcoin page for all the available options: [`https://en.bitcoin.it/wiki/Running_Bitcoin`](https://en.bitcoin.it/wiki/Running_Bitcoin)
    .


    Monitor and updating the bitcoin transaction fee can ensure the funds being sent
    get changed by market forces. There are web sites, apps, and forms that can try
    to predict the fee that needs to be paid. There are many sites that help calculate
    transaction fee prediction, such as this API, that you can call from your code:


    [`https://bitcoinfees.earn.com/api/v1/fees/recommended`](https://bitcoinfees.earn.com/api/v1/fees/recommended)


    The API returned at the time of writing a fee of 20 satoshis.


    ```

    {"fastestFee":20,"halfHourFee":20,"hourFee":18}

    ```


    Another example is [`https://bitcoinfees.net/`](https://bitcoinfees.net/) . This
    site shows a majority of transactions are at five to six satoshis at less than
    six hours, or 49 to 50 satoshis for less than 20 minutes at the time of writing.'
  trans: '

    ### 注意


    隔离见证（SegWit）是一种通过从比特币交易中移除签名数据来增加区块链区块大小限制的过程。这一过程释放了空间，允许你添加更多交易。SegWit 使用 BIP173
    中定义的 Bech32 地址。该地址长度为 90 个字符，由可读部分、分隔符和数据组成。


    解锁验证代码是 *见证*（witness）数据。可以说新代码“隔离了见证”（segregated the witness）。这就是其名称的由来。


    在我们使用的 v17.0 版本构建中，钱包和交易里有一个“见证公钥哈希”（Witness Public Key Hash）选项，用于替换 `scriptSig`
    参数并检查交易有效性。由于这是一次软分叉，旧的遗留代码仍然有效。


    你在 `getaddressinfo` 命令中已经看到过这一点，该命令既包含用于支持传统地址的 `scriptPubKey`，也包含 `iswitness`。你可以运行
    `getaddressinfo` 命令来查看这些参数。


    ```

    > bitcoin-cli getaddressinfo $address1

    ```


    在比特币核心 v0.16 之前，你必须使用 `addwitnessaddress` 命令将传统地址转换为 P2WPKH。自比特币核心 v0.16.0 起，一个地址既可以容纳
    P2SH 也可以容纳 P2WPKH。因此，钱包现在是 P2SH-P2WPKH 格式。如果你使用的是 v0.18 版本，你可以看到 `getaddressinfo`
    地址同时包含用于传统 `scriptSig` 和 SegWit 的参数。


    ### 椭圆曲线数字签名算法


    比特币核心允许你利用椭圆曲线数字签名算法（ECDSA）创建签名。这可以通过使用 `signmessage` 命令来实现。添加签名可以让你证明自己拥有钱包的私钥，从而为发送方增加另一层安全保障，确保他们将资金发送到正确的地址。


    ```

    > bitcoin-cli signmessage "13oWKiVQ7C5Ewwjv6KRpP3Xm5YstzqFixT" "John Doe"

    ```


    此命令输出一个哈希值：


    ```

    HzicuTXMl1COVh7Xw9ky9A/cl7ZjMSWNH10Y/invAgHWa74gS8EOvio3FJkofpH0nunIA7pJoGwWLRa0UdD7dc8=

    ```


    发送方可以在发送资金之前验证该钱包。


    ```

    > bitcoin-cli verifymessage "13oWKiVQ7C5Ewwjv6KRpP3Xm5YstzqFixT" "HzicuTXMl1COVh7Xw9ky9A/cl7ZjMSWNH10Y/invAgHWa74gS8EOvio3FJkofpH0nunIA7pJoGwWLRa0UdD7dc8="
    "John Doe"

    ```


    验证命令将输出 `true` 或 `false` 响应。在本例中，它将返回如下结果：


    ```

    true

    ```


    这允许用户确认他们确实拥有一个钱包。这在代码层面非常有用，例如，因为 P2PKH 地址将利用私钥生成签名。P2PKH 地址是与生成签名的私钥相对应的公钥的哈希值。


    ### 注意


    ECDSA 是比特币用于确保资金所有权的加密算法。它被用于生成公钥/私钥，并且也可以将签名包含在算法中。


    ECDSA 签名最多可以与四个可能的 ECDSA 公钥进行比对。这些公钥将从签名哈希中重建；每个密钥都会被哈希，然后与提供的 P2PKH 钱包地址进行比较以寻找匹配项。结果要么是
    `true`，要么是 `false`。正如你之前所见，当你运行 `verifymessage` 命令后，示例收到了 `true` 的结果。


    ### 注意


    二维码是字符串的一种图像表示形式。二维码阅读器可用于读取 URL 或编码钱包的公钥地址等操作。


    你可以通过 Chart Google API（`https://chart.googleapis.com`）生成二维码。例如，要为地址 `13oWKiVQ7C5Ewwjv6KRpP3Xm5YstzqFixT`
    生成一个金额为 0.00016 BTC 的二维码，你可以生成以下 URL：


    `https://chart.googleapis.com/chart?chs=250x250&cht=qr&chl=bitcoin:13oWKiVQ7C5Ewwjv6KRpP3Xm5YstzqFixT?&amount=0.00016`。请参见图
    4-1。


    ![../images/475651_1_En_4_Chapter/475651_1_En_4_Fig1_HTML.jpg](img/475651_1_En_4_Fig1_HTML.jpg)


    图 4-1


    通过 Chart.googleapi.com 生成的比特币二维码


    ## 交易


    在本节中，我将介绍交易。你将学习如何同时使用命令行和比特币核心钱包图形用户界面（GUI），在测试网上通过比特币守护进程发送代币。你将学习如何使用比特币浏览器查看你的交易。然后，我将通过展示如何创建一个具有单一输出的原始交易，以及利用多重签名（multisig，即需要多个密钥才能授权交易）创建更复杂的交易，来介绍更高级的交易创建方法。此外，我还会介绍如何更改其他选项，例如为了调整手续费而替换交易，以及设置锁定时间。你将学习
    P2PKH 和 P2SH-SEGWIT 之间的区别。最后，你将学习如何使用 `OP_RETURN` 参数，在比特币中除了代币之外附加其他数据。让我们开始吧。


    ### 简单命令


    区块中的第一笔交易被称为 *coinbase* 交易；这笔交易由该区块中包含的交易支付的交易手续费构成。要发送一笔交易，你需要向矿工支付交易手续费。如果手续费过低或未支付手续费，交易可能会长时间卡在
    P2P 网络中，甚至永远无法确认，直到你更改手续费为止。


    要设置交易手续费，你可以在 `bitcoin.conf` 文件中添加一个带默认手续费的参数。首先，你需要找到该文件的位置。为此，在运行守护进程之后，你可以查找文件的位置。


    ```

    > bitcoind –printtoconsole

    ```


    几秒钟后，按下 Control+C 停止此服务。该命令会显示 `bitcoin.conf` 文件的位置，并返回配置文件的路径。然后你可以打开该文件，通过添加默认手续费来修改它。在本例中，它位于“应用程序支持”文件夹内。


    ```

    /Users/[my user]/Library/Application Support/Bitcoin/bitcoin.conf

    ```


    当你打开文件时，可以看到默认交易手续费设置为 0.00000020（`mintxfee=0.00000020`）。


    ### 注意


    在 bitcoind 中还有其他手续费和设置。你可以修改你发送的交易的手续费（`paytxfee`）、最大总手续费（`maxtxfee`）、后备手续费等。请访问此比特币页面获取所有可用选项：`https://en.bitcoin.it/wiki/Running_Bitcoin`。


    监控和更新比特币交易手续费可以确保发送的资金根据市场力量进行调整。有一些网站、应用程序和表单可以尝试预测需要支付的手续费。有许多网站可以帮助计算交易手续费预测，例如以下
    API，你可以从你的代码中调用它：


    `https://bitcoinfees.earn.com/api/v1/fees/recommended`


    在撰写本文时，该 API 返回的手续费为 20 聪。


    ```

    {"fastestFee":20,"halfHourFee":20,"hourFee":18}

    ```


    另一个例子是 `https://bitcoinfees.net/`。在撰写本文时，该网站显示，大多数交易的手续费为 5 到 6 聪，预计在不到 6 小时内确认；或者
    49 到 50 聪，预计在不到 20 分钟内确认。

