    ## About the Author and About the Technical Reviewer


    ### About the Author


    ### About the Technical Reviewer


    # 1. Blockchain Basics


    This chapter will serve as your ground school before you “take off” toward development.
    It will introduce basic concepts that will help you to understand the blockchain
    technology. This chapter is split into four parts.


    *   Introduction to Cryptoeconomics


    *   Blockchain Explained


    *   Cryptocurrencies Overload


    *   Blockchain P2P Network


    To understand cryptoeconomics, you first need to understand concepts such as encryption
    and decryption, private-public keys, cryptography, digital assets, cryptography,
    and cryptocurrency.


    Once you understand these basic concepts, I will cover blockchain. I will cover
    the pieces that make up an individual blockchain, such as blocks, and how the
    blocks are linked together, as well as the problems with blockchain such as double
    spending. I will also explain cryptomining, cryptominers, and cryptocurrency wallets.


    Then, I will cover the different types of cryptocurrencies: bitcoin, tokens, and
    alternative cryptocurrency coins (altcoins).


    Last, I will cover the P2P network that is used with the blockchain technology
    and the different layers that make up the network: consensus layer, miner layer,
    propagation layer, semantic layer, and application layer.


    ## Introduction to Cryptoeconomics


    The world of crypto is full of technical jargon that can confuse even the savviest
    technology ninja. Bitcoin introduced the concept of cryptoeconomics and paved
    the way for the creation of many blockchain platforms. Before we dive deep into
    how a blockchain works, let’s understand what cryptoeconomics is and the underlying
    concepts behind a blockchain.


    Verbal communication is based on selecting words to describe a message you want
    to convey. However, sometimes you want to communicate with only certain people
    while excluding others. A good example is during wartime; a commander communicates
    with soldiers stationed on the front line while ensuring the enemy is unable to
    listen. The commander could use encryption for this communication.


    Electronically speaking, today all shopping sites offer their merchandise over
    an encryption protocol, called Secure Sockets Layer (SSL), that can protect your
    personal information from hackers. Video encryption and decryption are common
    to ensure the delivery of video to authorized members only, and on personal computers,
    people often use encryption to back up and protect files and passwords.


    Moreover, as a developer, you likely sent encrypted messages and also decrypt
    incoming messages with the help of libraries as all programming languages offer
    string encryption and decryption functions.


    So, let’s look at some definitions:


    *   *Encryption*: Encryption is a process of converting your message into code
    so that only authorized parties can access it.


    *   *Decryption*: Decryption is reversing the encryption process so that the message
    can be converted to the original message.


    *   *Cryptography*: This is using the techniques of encryption and decryption
    to send and receive messages.


    *   *Cryptocurrency*: This is using cryptography the same way as the earlier SSL
    or video example but specifically to fit the needs of a digital asset.


    ### Note


    A *digital asset* can be anything of value, such as the combination to your home
    safe, a secret password, a list, a message, electronic cash, a document, a photo,
    and so on.


    *   *Cryptoeconomics*: This is the combination of cryptography and economics to
    provide a platform to pass digital assets.


    For further clarification, let’s look at these terms in more detail and apply
    them to the topics I will be covering in this book.


    ### Ig-pay Atin-lay


    To begin, let’s go back in time. Have you ever spoken as a child in Pig Latin?
    The secret Pig Latin language is simple. You take off the first letter of the
    word you want to say and then move the letter to the end of the word, as well
    as add the sound “ay.”


    For example:


    *   “Pig” become “ig-pay.”


    *   “Latin” becomes “atin-lay.”


    What we just have done is encryption. Then to understand the words we have encrypted,
    we need to work backward.


    *   “Ig-pay” becomes “pig” by removing “ay” from the end and taking the last letter
    and putting it as the first letter.


    *   Similarly, “atin-lay” becomes “Latin.”


    What we have just done is decryption. Children are able to use these techniques
    to encrypt and decrypt words in a simple form of cryptography.


    #### Encryption/Decryption


    Encryption enables you to pass messages between specific parties in a secure manner
    so excluded parties will not understand them. Throughout history, there was a
    need to be able to send secret messages between parties. One party sends an encrypted
    message at one place, and then the other party is able to receive and decrypt
    the message elsewhere.


    In fact, encryption was used a lot during World War I (WWI) and World War II (WWII).
    The Nazis used a machine called Enigma to encrypt and decrypt messages (see Figure
    [1-1](#475651_1_En_1_Chapter.xhtml#Fig1)). The Allies figured out a way to break
    the Nazi Enigma machine’s secret code and decrypt the messages. This is believed
    to have shortened WWII by years.


    ![../images/475651_1_En_1_Chapter/475651_1_En_1_Fig1_HTML.jpg](images/475651_1_En_1_Chapter/475651_1_En_1_Fig1_HTML.jpg)


    **Figure 1-1** Enigma machine. Photo credit: wikimedia.org.


    Encryption and decryption went from pure Army usage to public usage by way of
    the development of the Data Encryption Standard (DES) by IBM in 1970 and the invention
    of key cryptography in 1976. In fact, in the past, cryptography and encryption
    were synonymous.'
