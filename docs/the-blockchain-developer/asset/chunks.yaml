- fmt: '### Geth Console


    Now that you have your account set and `testnet-blockchain` chain, you can open
    a Geth console to interact with the chain.


    ```

    > geth --identity "MyTestNet" --datadir testnet-blockchain --nodiscover --networkid
    1999 console 2>> geth.log

    ```


    Notice that I used the `2>> geth.log` param to output the logs into a custom file
    location. Once the Geth console starts, you can run the `eth.syncing` command
    to check the current block being synced. In this case, it will return `false`
    because there is nothing to sync; you are starting from block 0 on a local network.


    You will receive a pop-up alert asking you the following:


    > *“Do you want the application “geth” to accept incoming network connections?
    Clicking Deny may limit the application’s behaviour. This setting can be changed
    in the Firewall pane of Security & Privacy preferences.” Select “Allow”.*


    Next, in the Geth terminal, run the `syncing` command.


    ```

    geth> eth.syncing

    false

    ```


    If you run the `eth.blockNumber` command, it will return a zero as you have not
    mined any blocks yet.


    ```

    geth> eth.blockNumber


    ```


    ### Mine Ethereum for Your Private Testnet


    You can then confirm you have a balance in your account with the `getBalance`
    command.


    ```

    geth> eth.getBalance(eth.accounts[0])


    ```


    With the `eth.accounts` command, you will get the new account you created.


    ```

    geth> eth.accounts

    ["0xa2a6d8fe7e39645613e74fe19c79071ee52009ba"]

    ```


    You can either generate or mine ether coins on the private Ethereum chain you
    created. Regardless, you need to know how to mine coins, because you will need
    transactions to be included in mined blocks as you test your code. To start mining,
    just run the `miner.start` command.


    ```

    geth> miner.start()

    null

    ```


    Similarly, to stop mining, simply run the `miner.stop` command.


    ```

    > miner.stop()

    null

    ```


    If you let the mining run, you will mine some blocks, so when you check the block
    number, you will now see results as well as funds.


    ```

    geth> eth.blockNumber


    geth> eth.getBalance(eth.accounts[0])

    8.36e+21

    ```


    ### Deploy Remix to Geth


    Now that your node is synced and you know how to mine, you can deploy your contracts
    to the testnet. First, you need to unlock your main Geth account to be able to
    use it. Ensure your account holds a balance; otherwise, you won’t be able to deploy
    your contract on the network. On Geth, unlock your account with your password
    so Geth can use it.


    ```

    geth> personal.unlockAccount(eth.accounts[0], "123", 24∗3600)

    true

    ```


    I used the password `123`, but you need to change it to your password if you used
    a different password. Next, load the `web3.js` script you generated on Remix.


    ```

    > loadScript("remix/HelloWorldContract.js")

    null [object Object]

    true

    ```


    It takes a few seconds to mine the next block and include this contract; once
    it’s mined, you will receive the following message:


    ```

    Contract mined! address: 0x9905f1663f1b808d52dca42ce26e0d2648f8be07 transactionHash:
    0x66b80787eb3eae16c9535a1bd86ff1a623c1914ac9ffc2addde74655aed09157

    ```


    If you are not seeing this message, make sure you are mining.


    ```

    geth> miner.start()

    ```


    Once the contract is mined, you will get the following message in Terminal, which
    includes the address and transaction hash:


    ```

    Contract mined! address: 0xe49da16551c5c5735de46e07e8ab9e713310a13b transactionHash:
    0x36d3ec593f63280ca6aae1b079bfb6f00eea719468e04960643c23f39cbef5b3

    ```


    ### Deploy Truffle to Geth


    Similarly, to deploy the `web3.js` contract’s script via Truffle, you run the
    `migrate --reset` command. The `--reset` flag tells Truffle to run all the migrations
    from the beginning. Ensure you use `.exit` to exit the Truffle console prior to
    running the `migrate` command. Truffle will compile your contract automatically.


    ```

    truffle(development)> .exit

    > truffle migrate --reset

    Using network ''development''.

    Network up to date.

    ```


    Now you can open a development console again.


    ```

    > truffle console --network development

    truffle(development)> HelloWorldContract.deployed().then(_app => { hello = _app
    })

    undefined

    truffle(development)> hello.greet() ''Hello World''

    ```


    The contract is redeployed, and you can interact with your contract again. You
    can download this step from here: [`https://github.com/Apress/the-blockchain-developer/chapter5/step2/`](https://github.com/Apress/the-blockchain-developer/chapter5/step2/).


    ### Useful Commands in Geth


    You can stop the Geth process by pressing Command+C and then exit, or you can
    stop the process via `aux` to check whether there are any processes open. Or you
    can use the `killall` command to stop the process.


    ```

    > ps aux | grep geth

    > killall -HUP geth

    ```


    At any time, you can run the `help` flag to get a list of commands.


    ```

    > geth –help

    ```


    To get a list of the pending transactions, run the following:


    ```

    > geth --identity "MyTestNet" --datadir testnet-blockchain --nodiscover --networkid
    1999 console 2>> geth.log

    geth> eth.pendingTransactions

    ```


    To remove your locally synced blockchain data from the public testnet, use this:


    ```

    geth> geth removedb

    ```


    To remove your private blockchain testnet data, use this:


    ```

    geth> geth removedb --datadir test-net-blockchain

    ```


    To synchronize the blockchain more quickly, use the `--fast` flag to perform a
    fast Ethereum sync. Note that you will not retain the past transaction data with
    this command. The cache flag sets the cache limit.


    ```

    geth> geth --fast --cache=1024

    ```


    ## Connect the Mist Ethereum Wallet to Your Private Network


    It would be useful to have a wallet to connect to your private network. That’s
    where Mist is helpful. You can connect your private blockchain to Mist and perform
    transactions, conducting realistic transactions as if people were using your contracts.


    To get started, download Mist from here: [`https://github.com/ethereum/mist/releases`](https://github.com/ethereum/mist/releases).


    For Mac, the file to download is called `Mist-macosx-0-11-1.dmg` at the time of
    writing. Note that you can also achieve the same results with an Ethereum wallet,
    which you can download from the same URL.


    Next, you will be starting Mist and connecting it to your testnet blockchain.
    At the command line, point to Mist’s location and the `geth.ipc` database.


    ```

    > /Applications/Mist.app/Contents/MacOS/Mist --rpc /[project location]/MySmartContract/testnet-blockchain/geth.ipc

    ```


    Mist opens and shows your active account and balance, as shown in Figure [5-14](#475651_1_En_5_Chapter.xhtml#Fig14).


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig14_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig14_HTML.jpg)


    Figure 5-14


    Mist active account and balance


    ### Others to Interact with Your Smart Contract


    Once the contract is published, anyone can use the address and application binary
    interface (ABI) to connect and interact with the contract. You can start and interact
    with your contract as if an actual person is using your contract prior to publishing
    it to mainnet.


    Mist is a desktop app that can be used for testing. To watch a contract, in Mist,
    click the Contracts link at the top right and then click Watch Contract, as shown
    in Figure [5-15](#475651_1_En_5_Chapter.xhtml#Fig15).


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig15_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig15_HTML.jpg)


    Figure 5-15


    Mist’s Watch Contract button


    For others to run your contract, they need two things.


    *   Contract address

    *   Application binary interface'
