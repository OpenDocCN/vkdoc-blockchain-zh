    # 区块链在游戏和音乐行业的应用


    ## 游戏


    - **加密卡牌游戏**：这些游戏类似于传统卡牌游戏，但卡牌并非实体，而是非同质化代币。卡牌使用 `ERC-721` 以太坊代币创建。交易卡可以交换或以街机对战风格游玩。这些卡牌可能价格不菲。例如，2018
    年，`CryptoKitties` 以 111,000 美元售出一只猫，`Gods Unchained` 以 60,000 美元售出一张卡牌。示例包括 `CryptoKitties`（[`www.cryptokitties.co`](https://www.cryptokitties.co)）、`Gods
    Unchained`（[`godsunchained.com`](https://godsunchained.com)）和 `Spells of Genesis`（[`spellsofgenesis.com`](https://spellsofgenesis.com)）。


    - **育碧的 HashCraft**：这是一个未发布的原型，将区块链作为核心玩法，利用区块链账本作为数据库，使玩家能够成为游戏的建造者。


    - **瘟疫猎人**（[`store.steampowered.com/app/746530/Plague_hunter/`](https://store.steampowered.com/app/746530/Plague_hunter/)）：这是一款免费游玩的策略游戏，内置基于
    `Ethereum` 的市场，使用 `NFT` 交易来买卖武器和“猎人”。`Plague Hunters` 通过了索尼的审核流程，并计划在 PlayStation
    4 上发布。它是首款在主流主机上提供 `NFT` 代币交易的区块链游戏。


    除了这些案例研究，还有一个专门的网站用于追踪与游戏相关的区块链技术进步：[`blockchaingamer.net/`](https://blockchaingamer.net/)。该资源可提供有关当前趋势和新闻的宝贵信息。


    ## 音乐


    在当前的市场中，许多音乐行业的艺术家、制作人、粉丝和消费者都感到沮丧，而区块链对他们来说似乎是新鲜空气，因为它有潜力解决许多痛点。


    例如，许多艺术家和制作人花费大量时间和资源来打入市场、发布作品并进入顶级音乐流媒体平台。一旦艺术家进入像 Pandora、Spotify 这样的大型流媒体平台，他们可以接触到
    2.5 亿客户；然而，许多艺术家对支付结构以及获得报酬所需的时间感到不满。例如，Spotify 上的一首歌需要超过 152,000 次来自付费用户的播放，才能为艺术家带来区区
    100 美元的收入。大部分收入都流向了长长一串的中介中间商。艺术家不仅收入微薄，有时甚至需要数年才能拿到这些报酬。


    通过利用区块链，艺术家可以在以下方面受益：


    - **提高艺术家收入**：区块链可以提供透明且公平的报酬。内容提供商的收入份额可以以公平透明的方式分配。

    - **简化收入流程**：区块链可以提供一种更快捷的方式，使用加密货币立即向艺术家支付版税。

    - **自动分配收入**：智能合约可用于为参与内容创作的每个人（如词曲作者）设定支付结构。

    - **更好地与客户联系**：粉丝可以直接投资并与艺术家建立联系。

    - **存储数据**：区块链可用于在公共账本上存储信息，用于数字版权管理（DRM）、艺术家、资产、活动、场地等。

    - **提供流媒体服务**：区块链的点对点网络可用于流式传输音乐。当前的音乐流媒体服务要么费用高昂，要么包含过多广告。


    音乐平台的集成需要考虑音乐格式和行业标准，例如：


    - **通用作品注册（CWR）**（[www.cmrra.ca/](http://www.cmrra.ca/)）：这是注册和修订音乐作品的标准格式。

    - **DDEX**（[`ddex.net`](http://ddex.net)）：通过接收来自领先媒体公司、音乐许可组织、数字服务提供商和技术中介的数据，建立一个数字供应链联盟并创建标准。


    与游戏领域的 BGA 联盟类似，音乐行业也成立了一个组织来跟进区块链发展。开放音乐倡议（[open-music.org](http://open-music.org)）探索使用区块链来帮助识别合法的音乐权利持有者和创作者，以便现代化和简化版税支付流程，使艺术家能够获得公平的版税。这可以通过利用区块链提高透明度和更好地分析数据来实现。著名会员包括
    Soundcloud、Red Bull Media、Netflix、Sony、YouTube 和 Spotify。


    类似于黑客松竞赛，`Smackathon`（[`www.smackathon.co`](https://www.smackathon.co)）每年举办一次，旨在寻找音乐行业基于区块链的有趣创意。例如，在
    2018 年，有人发明了一个区块链平台，用于根据听众收听歌曲的每秒时长向他们付费，并提供粉丝互动工具。


    观察一些更知名的项目，你会发现存在相似想法的重复。这强化了音乐行业确实存在需要解决的痛点。以下是一些案例研究：


    - **Audius**（[`audius.co/`](https://audius.co/)）：它使用区块链点对点网络作为流媒体服务。`Audius` 还利用区块链通过智能合约进行支付，立即向艺术家发送报酬。

    - **BitSong**（[`bitsong.io/en`](https://bitsong.io/en)）：该公司声称是第一个使用区块链点对点网络进行音乐流媒体播放的。艺术家可以上传歌曲并附加广告。每播放一个广告，艺术家和听众可以获得广告商投入利润的
    90%。该平台包含一个名为 `$BTSG` 的代币，用于向独立艺术家捐款和购买音乐。

    - **Blokur**（[`www.blokur.com`](https://www.blokur.com)）：`Blokur` 平台结合了人工智能和区块链。区块链用作数据库，允许出版商编录其音乐，然后社区可以批准或拒绝。`AI`
    算法自动解决数据冲突，例如权利纠纷，以确保原创艺术家获得报酬。已有 50,000 名词曲作者和 7,000 名出版商在其上发布了作品。

    - **Choon**（[`choon.co`](https://choon.co)）：它利用区块链进行音乐流媒体播放和数字支付，以加快艺术家的报酬支付。艺术家可以为每首歌曲使用以太坊的智能合约来分配贡献者的收入。其他功能包括为新艺术家众筹，以及奖励创建播放列表的用户。

    - **eMusic**（[`www.emusic.com`](https://www.emusic.com)）：它使用区块链和以太坊智能合约进行音乐分发和版税支付，使用一种名为
    `eMusic` 的加密代币。

    - **Inmusik**（[`inmusik.co`](https://inmusik.co)）：它有一种名为 `$OUND` 的加密代币。声音被归类为“证券化音乐”，粉丝可以“投资”艺术家以分享收益。粉丝还可以通过发现新歌、投票选出最佳艺术家和支持社区来赚取代币。艺术家可以创建“军队”，获得投资者，并在每百万次流媒体播放中赚取超过
    20,000 美元。

    - **MediaChain**（[www.mediachain.io](http://www.mediachain.io)）：被 Spotify 收购，`MediaChain`
    利用区块链账本在不同的应用程序和组织之间共享信息，为每条信息分配唯一标识符。`MediaChain` 还与艺术家合作，通过智能合约确保他们获得公平报酬。

