    > **注意：** *稳定币*是一种旨在最小化价格波动的加密货币，因为它们与更“稳定”的资产（或一篮子稳定资产）挂钩，例如货币或黄金等交易所交易商品。


    此外，你已看到一些例子，说明币本身能提供超出其面值的价值。


    - *比特币现金（BCH）彩色币*：利用 BCH 协议创建代币化资产，允许你在 BCH 上添加代币。

    - *比特币*：利用比特币的`OP_RETURN`参数，允许你在交易中存储数据。


    这些例子突显了币的潜力，因为它们不仅可以传递数字货币价值，还能传递更多价值。


    ## 代币


    加密代币是可用于表示特定资产数字余额的记账单位。例如，比特币是一种加密代币，因为它结合使用了数字签名与所有权；然而，并非所有加密代币都是加密货币。


    代币可以通过独特数据创建，被称为*非同质化代币*（NFT），用于代表完全独特的事物。这些 NFT 不可互换，因为具有完全相同数据的代币只有一个。


    > **注意：** 与本质上可互换的加密货币数字资产币或许多实用代币不同，NFT 是一种代表独特事物的特殊加密代币。这些代币不可互换，因为它们无法被替代。


    NFT 和实用代币都使用代币化过程，允许你创建*证券*。证券将数字资产的所有权碎片化，通过创建数字代币实现。每个代币代表资产中的一定比例所有权。使用区块链使得监管链和所有权证明不可篡改，这为某些应用带来了优势，因为信息无法像在常规数据库中那样被更改。


    > **注意：** 在此上下文中，监管链是指记录数据传输或分析序列的“纸质追踪记录”。


    在实践中，这可以应用于数字资产和实物资产。例如，Kik 消息应用（https://www.kik.com）将其公司转变为数字资产，并开始出售代表公司部分所有权的代币。Kik
    成功筹集了 1 亿美元，可用于发展其平台。它所做的是一种反向首次代币发行：不是在创建公司之前筹集资金，而是在公司运营之后出售部分所有权，就像公司在股票市场“上市”一样。


    > **提示：** 请记住，本章未提及的许多其他行业也有潜力通过利用区块链技术获益。我挑选了几个例子来启发你；但是，你应该自行研究调查，以发现更多行业。


    此外，代币可以复兴旧概念。例如，一些付费电话和火车曾使用代币；这些代币除了在付费电话或火车站使用外，没有任何其他价值。美元也曾与政府金库中的黄金数量挂钩，因此在
    1971 年之前持有美元时，你拥有的实际上是美国政府金库中黄金的代币。类似地，如今稳定币代币代表法定货币，例如使用以太坊创建的`DAI`、`GUSD`、`TUSD`、`USDC`和`USDT`代币。这些代币基于公司将法定货币存入托管账户并向监管机构注册公司。


    代币可以代表任何数字或物理价值，例如：


    - 股票

    - 期权

    - 数字债务

    - 法定货币

    - 所有权

    - 服务权利


    代币还可以组合多种资产。例如，一个代币可以代表一篮子不同股票或一篮子不同法定货币。可能性是无限的，正如你在之前的章节中所见，有许多区块链（如以太坊、EOS、超级账本和
    NEO）可以提供创建代币的简便机制。


    ## 账本


    区块链账本可以用作不仅仅针对加密货币的去中心化数据存储。传统的云存储服务是中心化的，你需要将宝贵的信息或数字资产托付给单一实体。而使用区块链，数据存储本身可以变得去中心化。诸如
    PirateBay、Limelight 等 P2P 网络已被证明能够将来自全球不同计算机的数据片段拼接在一起，以存储视频、音乐、图像和软件等数字资产。尽管许多此类
    P2P 网络侵犯了版权材料，并在许多国家被视为非法，但区块链 P2P 网络可以由合法发布者共享文件，同时限制授权客户的访问。区块链的工作方式与这些 P2P
    网络类似，可用于存储任何数据。事实上，`Storj`（https://storj.io/）和`Sia`（https://sia.tech）就是基于区块链的云存储示例，旨在提高安全性、降低成本并减少依赖性。用户可以在不使用时租出其存储容量，从而创建一个前所未有的全新市场。将区块链用作去中心化数据存储，并结合币和代币等其他区块链元素，可以创造出有趣的新可能性。

