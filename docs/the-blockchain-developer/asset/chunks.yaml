- fmt: '# Note


    To better understand how to become compliant in the United States, read the following
    report by NIST: [`https://nvlpubs.nist.gov/nistpubs/ir/2018/NIST.IR.8202.pdf`](https://nvlpubs.nist.gov/nistpubs/ir/2018/NIST.IR.8202.pdf).


    # Europe Union Compliance


    The European Union is in the process of implementing specific requirements for
    blockchain and crypto markets; these requirements will take into account a protocol
    known as Know Your Client (`KYC`) and anti-money laundering (`AML`) laws. In regard
    to digital assets, the European Union’s regulation currently doesn’t oppose crypto-fiat
    and fiat-crypto exchanges. Most of the concerns are to make sure that crypto is
    not used to finance illicit activities, such as money laundering and terrorism.
    To take these concerns into account, crypto platforms need to do due diligence
    on customers and report any suspicious transactions according to `KYC`.


    To better understand how to become compliant in Europe, read these `EUBOF` and
    `CNIL` reports:


    - [`https://www.eublockchainforum.eu/sites/default/files/reports/eu_observatory_blockchain_in_government_services_v1_2018-12-07.pdf`](https://www.eublockchainforum.eu/sites/default/files/reports/eu_observatory_blockchain_in_government_services_v1_2018-12-07.pdf)

    - [`https://www.cnil.fr/sites/default/files/atoms/files/blockchain.pdf`](https://www.cnil.fr/sites/default/files/atoms/files/blockchain.pdf)


    ## Tip


    Regulations change often; keep an eye out for news and information released by
    the `SEC`, `EUBOF`, and other organizations where your platform is published.
    If you are on social media, follow those organizations’ accounts or add news updates
    to your reading list.


    # Readiness Recommendations


    By having awareness, you can achieve both compliance and security readiness to
    ensure your platform is ready for production and help prevent shutdown by attackers
    or governments.


    There isn’t an exact set of rules you can use globally to ensure readiness because
    compliance is different between geographical boundaries; however, there are certain
    key elements that are good practice and can help you be security and compliance
    ready. In the next sections, I will cover specific attacks; these general recommendations
    are basic recommendations to take into account while you’re still developing your
    app.


    - **Geographical location**: If you intend to have even one user registered on
    your platform, you need to be compliant ready at that user’s location and be aware
    of the rules and regulations there.


    - **Solve a problem**: Ensure you are actually solving a problem. Ask yourself,
    what is my unique selling proposition (`USP`)? Don’t just utilize the blockchain
    to get in on the hype. The 2017 ICOs party is over as many coins got de-listed
    and ICOs have been forced to refund investors.


    - **Permission-based blockchain**: If you are building a permission-based blockchain,
    you should define the roles of members such as admin, publishers, users, and so
    on.


    - **Privacy**: Regarding providing user information, the more the better. Inform
    your users as much as possible concerning privacy matters. When you gather data,
    the less is better; capture only what you need. The following are some specific
    recommendations in regard to privacy.


    > **Tip** Based on reports from `CNIL`, `NIST`, and `EUBOF`, implement your code
    following the General Data Protection Regulation (`GDPR`).


    - **Privacy policy**: Set a privacy policy and let the user know what information
    is stored and what information is shared with third parties. For example, inform
    users of logging data into an analytics tool in your privacy policy.


    - **Unsubscribe**: Publish a form or an e-mail address for consent, withdrawal,
    and complaints related to the privacy policy on your platform.


    - **Policy changes**: Inform the user of any privacy policy change.


    - **Gathering users’ data**: Take a minimalistic approach when gathering all users’
    information; store only what’s needed.


    - **Data collected**: Split data into the data you need in order to operate your
    platform and the other data collected.


    - **Anonymization**: Consider implementing your platform with full anonymization.


    - **Geographical location**: When storing data, ensure the data is collected according
    to the guidelines in that geographical location.


    - **Permission**: Request permission from the user when storing any data, such
    as in cookies, in a local database, or in the cloud.


    - **Clear everything**: Clear cookies, sessions, and other storage once the user
    has logged out. Allow the user to clear data from any third-party tools used on
    your platform.


    - **Clean**: Allow the user to delete data and clean history.


    - **Export**: Allow the user to export data.


    - **Inform**: Inform users of any data breach.


    Here are general security recommendations:


    - **Secure Sockets Layer (SSL)**: `HTTPS` should be used throughout web applications
    and especially when requesting and exporting data.


    - **Zero knowledge proof (ZKP)**: For blockchains, use zero knowledge proof (`ZKP`);
    see [`https://github.com/topics/zero-knowledge-proofs`](https://github.com/topics/zero-knowledge-proofs).


    > **Note** `ZKP` is a method where one party proves to the verifier that they
    know the value of, let’s say, `x`. A real-life analogy would be knocking on a
    door and providing a secret word to get access to a private, members-only club.


    - **Encryption**: Use homomorphic encryption or secure multiparty computation.


    - **Secure authentication system**: Use a secure authentication system such as
    `OAuth 2.0` standards. Example: [`https://developer.github.com/apps/building-oauth-apps/`](https://developer.github.com/apps/building-oauth-apps/).


    - **Service timeout and restrictions**: Set up a timeout mechanism on services
    for delayed responses to ensure not to cause services to choke (slow down). Implement
    throttling login attempts. Set up secured handshake everywhere.


    - **Common security vulnerabilities**: Protect against common security vulnerabilities
    such as distributed denial-of-service (`DDoS`) and cross-origin resource sharing
    (`CORS`).


    > **Note** `CORS` uses additional HTTP headers to give an application running
    on one domain access to resources on a server at a different domain.


    - **Sensitive information**: Save passwords and any other sensitive information
    as hashed data using an encrypted method.


    - **IP restriction**: Restrict IPs that can access your ports. For example, don’t
    have root and FTP access to any IP addresses, just to your IP address.


    - **Security measurement**: Include security measures into the development cycle
    (see the “Development Cycle” section later in this chapter).


    To summarize, I reviewed what it means to be security ready, what security testing
    is, and how to be compliance ready. You looked at the United States and Europe
    Union compliance regulations regarding blockchain technology, and lastly, I covered
    security readiness recommendations you should take into account in the early stages
    of your development cycle. In the next section of this chapter, you will be looking
    at specific crypto wallet attacks that can cause significant losses and how to
    prevent them.


    # Common Blockchain Attacks


    In this section, I will be covering some of the most famous and common blockchain
    attacks. I have broken these attacks into three categories.


    - **Wallet cyberattacks**: Directed at crypto wallets.

    - **Blockchain network attacks**: Aimed at the blockchain P2P network.

    - **Platform attacks**: Aimed at platforms that support blockchain, such as exchanges,
    web sites, and lending platforms.'
