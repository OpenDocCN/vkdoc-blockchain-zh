    An ABI describes the contract’s functions. This description is needed in order
    to know how to call the function. Think of it as a user manual.


    You can retrieve the contract address, as shown here:


    ```

    truffle(development)>var hello = HelloWorldContract.deployed().then(_app => {
    hello = _app })

    truffle(development)>hello.address

    ''0x0b4f69f88390bc8cec93e730128a5e5c5dffd56c''

    ```


    Similarly, you can retrieve the contract’s ABI with this command:


    ```

    truffle(development)>JSON.stringify(hello.abi)

    ''[{"inputs":[],"payable":false,"stateMutability":"nonpayable","type":"constructor","signature":"constructor"},{"constant":true,"inputs":[],"name":"greet","outputs":[{"name":"","type":"string"}],"payable":false,"stateMutability":"view","type":"function","signature":"0xcfae3217"}]''

    ```


    Then pass the contract address and ABI in Mist, as shown in Figure [5-16](#475651_1_En_5_Chapter.xhtml#Fig16).


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig16_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig16_HTML.jpg)


    Figure 5-16


    Passing info in Mist


    Notice that you omit the single quote from the ABI and address before pasting
    it into Mist.


    Now click OK, and you can see your contract in the watched contracts list. See
    Figure [5-17](#475651_1_En_5_Chapter.xhtml#Fig17).


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig17_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig17_HTML.jpg)


    Figure 5-17


    Mist’s watched contracts


    You have your contract in Mist, and you can interact with it, send funds, listen
    to events, and interact with functions, just as users will interact with your
    contract on mainnet.


    ## MetaMask


    Similar to Mist, another way to interact with your contracts, without even downloading
    a desktop app, is in your Chrome or Firefox browser with a plugin called MetaMask.
    Just as with Mist, you can utilize MetaMask to connect your contract to mainnet,
    a public testnet, and a local blockchain (such as the one you created with Ganache),
    or you can even connect to Truffle Develop. To get started, download the MetaMask
    plugin for Chrome or Firefox.


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig18_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig18_HTML.jpg)


    Figure 5-18


    MetaMask beta Chrome add-on


    - *Chrome Web Store*: [`https://chrome.google.com/webstore/detail/metamask/nkbihfbeogaeaoehlefnkodbefgpgknn`](https://chrome.google.com/webstore/detail/metamask/nkbihfbeogaeaoehlefnkodbefgpgknn)
    . Click the Add to Chrome button. See Figure [5-18](#475651_1_En_5_Chapter.xhtml#Fig18).

    - *Firefox Add-ons page*: [`https://addons.mozilla.org/en-US/firefox/addon/ether-metamask`](https://addons.mozilla.org/en-US/firefox/addon/ether-metamask)
    . Click the Add to Firefox button.


    Click the MetaMask icon and then the Continue button. Next, select a password,
    accept the terms, save your secret backup phrase, and create your account.


    Now that the account is created, you have an option in the top drop-down of which
    network to connect to, as shown in Figure [5-19](#475651_1_En_5_Chapter.xhtml#Fig19).


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig19_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig19_HTML.jpg)


    Figure 5-19


    MetaMask beta Chrome network drop-down


    As you might recall, you programmed the `truffle.js` values to set a network on
    localhost port 8584, which matches the default network; however, you can set a
    custom RPC or connect to testnet or mainnet.


    For more information regarding connecting Truffle with Metamask, visit the Truffle
    framework docs:


    [`https://truffleframework.com/docs/truffle/getting-started/truffle-with-metamask`](https://truffleframework.com/docs/truffle/getting-started/truffle-with-metamask)


    ## Public Testnet


    Now that you are able to run your smart contract on a development network, you
    can take an additional step prior to going to mainnet. You can run your contract
    on a public testnet network.


    ### Syncing Blocks


    There are three well-known testnets: Ropsten, Kovan, and Rinkeby. You can program
    Geth to connect to a testnet with the `--testnet` flag, which will connect to
    the public testnet network (Ropsten).


    ```

    > geth --testnet --syncmode "fast" --cache=512 console

    ```


    As before, the `rpc` flag is needed to accept the Geth RPC connections and for
    Truffle to be able to connect to Geth. You are also setting it to fast sync and
    limiting the cache size to 512. This command includes starting the Geth console.


    To check the status of the `syncing` command, use this:


    ```

    geth> eth.syncing

    {

    currentBlock: 1011878,

    highestBlock: 3569550,

    knownStates: 2058862,

    pulledStates: 2056745,

    startingBlock: 968873

    }

    ```


    Once complete, the `syncing` command will return `false`. Keep in mind that there
    are millions of state entries and 3,569,550 blocks at the time of writing, which
    could take hours depending on your connection speed. The `currentBlock` value
    is the current block being retrieved out of a total number of blocks (the highest
    block). This can give you an idea of how long the download will take.


    As you recall, you can check the current block number being synced by running
    the `eth.blockNumber` command in a Geth console, as well as check your balance
    in your account to see whether it has been updated yet.


    ```

    > eth.blockNumber

    > eth.getBalance(eth.accounts[0])

    ```


    ### Public Testnet Faucet


    In addition to the testnet coins, you can get additional testnet coins via a faucet,
    just as you did with bitcoin. Go to [`https://faucet.ropsten.be/`](https://faucet.ropsten.be/)
    , as shown in Figure [5-20](#475651_1_En_5_Chapter.xhtml#Fig20), and request coins
    to your wallet address set in Mist.


    ![../images/475651_1_En_5_Chapter/475651_1_En_5_Fig20_HTML.jpg](images/475651_1_En_5_Chapter/475651_1_En_5_Fig20_HTML.jpg)


    Figure 5-20


    Ropsten Ethereum faucet


    ## Ethereum Mainnet


    From the Ganache console, you were able to publish to a public testnet network
    (Ropsten). The next step is to publish to the Ethereum mainnet. To do so, you
    will restart Geth and connect this time to the mainnet.


    ```

    > geth --fast --cache=512

    ```


    Just as with the public testnet, you will have to wait for Geth to sync. Once
    syncing is complete, you can call the Truffle `migrate` command to deploy, and
    as before, you need your account to have ether coins.


    ```

    > truffle migrate --reset

    ```


    ## Recommended Tools for Smart Contracts


    In this chapter, I covered Ganache, Solidity, IntelliJ, Truffle, Geth, Remix,
    and MetaMask; however, there are other tools worth mentioning.


    - *Solium*: Solidity code cleaning solution

    - *conteract.io*: Interacting with smart contracts

    - *Populus*: Development framework for Ethereum smart contracts

    - *Parity*: Light-weight Ethereum node

    - *Drizzle*: Front-end dapp solution'
