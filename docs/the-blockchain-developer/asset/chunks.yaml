    \ a password and clicking\nRestore, as shown in Figure [10-7](#475651_1_En_10_Chapter.xhtml#Fig7).\n\
    \n![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig7_HTML.jpg](images/475651_1_En_10_Chapter/475651_1_En_10_Fig7_HTML.jpg)\n\
    \nFigure 10-7\nRestoring MetaMask account using\na mnemonic\n\nTest Your Dapp\
    \ Functionality\nNow you are finally ready to test your dapp. Once the browser\
    \ gets\nrefreshed, you will see the address and balance.\nNext, fill in the form\
    \ and initialize a transfer. Notice that\nMetaMask opens to confirm the transfer.\
    \ This is an extra measurement of\nsecurity to ensure only authorized transfers\
    \ get approved.\n\nSee Figure [10-8](#475651_1_En_10_Chapter.xhtml#Fig8).\n\n\
    ![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig8_HTML.jpg](images/475651_1_En_10_Chapter/475651_1_En_10_Fig8_HTML.jpg)\n\
    \nFigure 10-8\nMetaMask\nnotification to complete a transfer\n\nWhere to Go from\
    \ Here\n\nContinue working and improving the dapp you created. For instance, you\n\
    could do the following:\n\n*   Create a user service class and a shared service\
    \ class to hold\n    users’ information and shared information\n\n*   Create a\
    \ login/logout service\n\n*   Create an option to switch between accounts\n\n\
    *   Create a side menu to better navigate the app\n\n*   Update the smart contract\
    \ and add more methods and\n    events\n\nSummary\nIn this chapter, you created\
    \ a transfer smart contract and Truffle\ndevelopment project as well as connected\
    \ to the Ganache local\ndevelopment network. You learned how to work with the\
    \ Ethereum network\nvia Truffle and how to test your smart contract. You test\
    \ the transfer\nof funds using your smart contract via the command line.\nLastly,\
    \ you linked your dapp with the Ethereum network using an\nAngular TransferService\
    \ component that you created. Using the `web3` library, you\nmade some service\
    \ calls. Lastly, you connected to MetaMask to manage\nyour accounts.\nIn the next\
    \ chapter, you will learn about blockchain security and\ncompliance.\n\n11. Security\
    \ and Compliance\n\nAs you have seen, most blockchains are decentralized, and\
    \ the\nidentity of each party is normally protected; however, most\nblockchain-related\
    \ code involves storing some confidential data such as\na user’s personal information,\
    \ passwords, cryptocurrency, and\nwallets.\n\nBlockchain-related code has characteristics\
    \ that make it a magnet for\nhackers.\n\n*   The code is usually open source for\
    \ transparency and to promote\n    contributors.\n\n*   Much of the code out there\
    \ is not mature enough to be considered\n    release grade.\n\n*   In cryptocurrency-related\
    \ blockchains, losing data can mean more\n    than just a mere privacy breach.\
    \ Once funds are transferred, it’s not\n    easy to track them, and the transfer\
    \ is likely to be\n    irreversible.\n\nThese concerns have been magnified as\
    \ blockchain technology has\nbecome more popular and more people are invested\
    \ in blockchain. In fact,\nthere have been increasing reports regarding blockchain-related\
    \ losses,\nand new attacks are being published on news outlet almost daily. For\n\
    instance, during the writing of this book, $40 million was stolen from\nthe Binance\
    \ exchange. Additionally, in the past 12 months, an estimated\n$23 million was\
    \ stolen in double spending attacks. Similarly, a\nstaggering $1.5 billion was\
    \ stolen from crypto exchanges.\n\nPostmortem reports sometimes show a sophisticated\
    \ heist method that you\nwould need to be a genius to prevent. However, most attacks\
    \ can be\nprevented easily and are nothing more than a simple oversight or the\n\
    result of not using tools capable of revealing vulnerabilities.\n\n*“Intellectuals\
    \ solve problems; geniuses prevent them.”*\n\n—Albert Einstein\n\nAs professionals,\
    \ it is your responsibility to your customers who\nplace their trust in you, as\
    \ well as your reputation and fiduciary\nresponsibility, to mitigate these risks\
    \ and ensure data is protected.\nSecurity measures should be considered during\
    \ all stages of the\ndevelopment cycle; in fact, security should be the most important\
    \ aspect\nof your development. However, it is unrealistic to presume that I will\n\
    be able to cover all aspects of security in just one chapter, as there\nare thousands\
    \ of specific known attacks.\nIn addition to security, another aspect that needs\
    \ to be addressed is\nregulation. Regulators have been shaping technology in general\
    \ and the\nblockchain industry in particular, and there are multiple regulations\
    \ to\nabide by in each geographic location.\nBecause new attacks are invented\
    \ daily, regulatory laws are revised\noften. Understanding common attacks, security,\
    \ privacy, compliance, and\nregulations can be a challenging task.\n\nIn this\
    \ chapter, I will give you insights into the security mind-set and\nhelp you become\
    \ more aware of security, privacy, and compliance. This\nchapter is split into\
    \ three parts.\n\n*   *Security readiness*: I will cover areas you should be\n\
    \    taking into account before and while developing your platform.\n\n*   *Common\
    \ blockchain attacks*: I will cover some of the most\n    famous and common blockchain\
    \ attacks.\n\n*   *Development cycle*: I will provide you with a recommended\n\
    \    development cycle so you can take into account security and\n    compliance.\n\
    \nSpecifically, I will cover security testing, privacy, and compliance\nrequirements\
    \ to ensure your code takes into account as many scenarios as\npossible to help\
    \ secure your users’ data. I will cover common\nblockchain-related cyber attacks\
    \ that caused large losses, as well as\nblockchain network–specific attacks. I\
    \ will cover how these attacks\ncould have been prevented as a user and as a developer.\
    \ Lastly, I will\nintroduce a recommended development cycle that you can employ\
    \ to reduce\nthe risks of losses and your platform shutting down.\n\nSecurity\
    \ and Compliance Readiness\nIn this section, I will cover what the general areas\
    \ are that you\nneed to consider in regard to security testing and what it means\
    \ to\nachieve security readiness. Additionally, you will understand what it\n\
    means to achieve compliance readiness by looking at the regulations in\nEurope\
    \ and the United States as examples. Lastly, I will highlight\nrecommendations\
    \ you should be considering during the development cycle\nand prior to releasing\
    \ your code.\n\nSecurity Readiness\nIn a traditional coding environment, you need\
    \ to consider security\ntesting to find security defects in your code to ensure\
    \ it functions\ncorrectly, as intended, and that the data is protected.\n\nNote\n\
    \ *Security\ntesting*  is a process aimed at finding security defects in\ncode\
    \ to ensure that both the code and the data are functioning as\nintended.\n\n\
    Security testing includes the following measures:"
  trans: "\n```\nHD 钱包\n==================\n助记词：`journey badge medal slender behind\
    \ junk develop produce spy enemy transfer room`\n基础 HD 路径：`m/44'/60'/0'/0/{account_index}`\n\
    ```\n\n接着，退出 MetaMask 并手动粘贴该助记词。点击右键并选择“退出”，如图 10-5 所示。\n\n![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig5_HTML.jpg](img/475651_1_En_10_Fig5_HTML.jpg)\n\
    \n*图 10-5* 退出 MetaMask 账户\n\n退出后，欢迎页面会重新出现，其下方有一个链接，写着“使用账户种子短语导入”。点击该链接，如图 10-6\
    \ 所示。\n\n![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig6_HTML.jpg](img/475651_1_En_10_Fig6_HTML.jpg)\n\
    \n*图 10-6* MetaMask 欢迎页面\n\n现在，您可以选择密码并点击“恢复”来粘贴助记词，如图 10-7 所示。\n\n![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig7_HTML.jpg](img/475651_1_En_10_Fig7_HTML.jpg)\n\
    \n*图 10-7* 使用助记词恢复 MetaMask 账户\n\n## 测试你的 Dapp 功能\n\n现在，您终于可以测试您的 dapp 了。浏览器刷新后，您将看到地址和余额。接下来，填写表单并初始化一笔转账。注意，MetaMask\
    \ 会弹出窗口以确认转账。这是一项额外的安全措施，确保只有经过授权的转账才能获得批准。见图 10-8。\n\n![../images/475651_1_En_10_Chapter/475651_1_En_10_Fig8_HTML.jpg](img/475651_1_En_10_Fig8_HTML.jpg)\n\
    \n*图 10-8* 完成转账的 MetaMask 通知\n\n## 后续方向\n\n继续完善您创建的 dapp。例如，您可以进行以下操作：\n\n*  \
    \ 创建一个用户服务类和一个共享服务类，用于保存用户信息和共享信息\n*   创建登录/退出服务\n*   创建切换账户的选项\n*   创建侧边菜单，以优化应用导航\n\
    *   更新智能合约并添加更多方法和事件\n\n## 本章小结\n\n在本章中，您创建了一个转账智能合约和 Truffle 开发项目，并连接到了 Ganache\
    \ 本地开发网络。您学习了如何通过 Truffle 与以太坊网络交互，以及如何测试您的智能合约。您通过命令行测试了使用智能合约进行资金转账。最后，您使用自己创建的\
    \ Angular `TransferService` 组件，将您的 dapp 与以太坊网络连接起来。通过 `web3` 库，您进行了一些服务调用。最后，您连接了\
    \ MetaMask 来管理您的账户。\n\n在下一章中，您将学习区块链的安全性与合规性。\n\n# 11. 安全性与合规性\n\n如您所见，大多数区块链都是去中心化的，并且通常保护各参与方的身份信息。然而，大多数与区块链相关的代码都涉及存储一些机密数据，例如用户的个人信息、密码、加密货币和钱包。\n\
    \n区块链相关代码的特性使其成为黑客攻击的目标。\n\n*   代码通常为了透明性和吸引贡献者而开源。\n*   现有的许多代码尚不成熟，不足以被视为发布版本。\n\
    *   在加密货币相关的区块链中，数据丢失不仅仅意味着隐私泄露。一旦资金转移，追踪起来很困难，并且这种转移很可能是不可逆的。\n\n随着区块链技术越来越流行，越来越多的人投身于区块链，这些担忧被放大了。事实上，关于区块链相关损失的报道日益增多，新闻媒体几乎每天都会报道新的攻击事件。例如，在本书撰写期间，币安交易所被盗\
    \ 4000 万美元。此外，在过去 12 个月中，估计有 2300 万美元因双花攻击被盗。同样地，惊人的 15 亿美元从加密货币交易所被盗。\n\n事后分析报告有时会展示一种复杂的盗窃手法，您需要成为天才才能防范。然而，大多数攻击是很容易预防的，它们仅仅源于简单的疏忽，或是没有使用能够揭示漏洞的工具。\n\
    \n> “智者解决问题，天才预防问题。”\n> ——阿尔伯特·爱因斯坦\n\n作为专业人士，对信任您的客户负责，同时为了维护您的声誉和履行受托责任，您有责任降低这些风险并确保数据安全。在开发周期的所有阶段都应考虑安全措施；事实上，安全应该是您开发工作中最重要的方面。然而，指望我在一章之内涵盖安全性的所有方面是不现实的，因为已知的特定攻击有上千种之多。\n\
    \n除了安全性，另一个需要解决的问题是合规性。监管机构一直在塑造技术，特别是区块链行业，每个地理位置都有多种需要遵守的法规。由于每天都有新的攻击手段被发明，监管法律也经常修订。理解常见的攻击、安全性、隐私、合规性和法规是一项具有挑战性的任务。\n\
    \n在本章中，我将为您提供关于安全思维的见解，并帮助您提高对安全、隐私和合规性的认识。本章分为三个部分。\n\n*   **安全准备**：我将涵盖您在开发平台之前和期间应考虑的领域。\n\
    *   **常见的区块链攻击**：我将介绍一些最著名和最常见的区块链攻击。\n*   **开发周期**：我将为您提供一个推荐的开发周期，以便您将安全性和合规性考虑进去。\n\
    \n具体来说，我将涵盖安全测试、隐私和合规性要求，以确保您的代码尽可能多地考虑到各种场景，从而帮助保护用户数据。我将介绍导致巨大损失的常见区块链相关网络攻击，以及特定于区块链网络的攻击。我将说明这些攻击作为用户和开发者本应如何预防。最后，我将介绍一个推荐的开发周期，您可以使用它来降低损失风险和平台关闭的可能性。\n\
    \n## 安全性与合规性准备\n\n在本节中，我将介绍您在安全测试方面需要考虑的一般领域，以及实现安全准备意味着什么。此外，您将通过以欧洲和美国的法规为例，理解实现合规准备意味着什么。最后，我将重点介绍您在开发周期中以及在发布代码之前应考虑的建议。\n\
    \n### 安全准备\n\n在传统的编码环境中，您需要考虑安全测试，以发现代码中的安全缺陷，确保代码按预期正常运行，并且数据得到保护。\n\n> **注意**\
    \  \n> *安全测试* 是一个旨在发现代码中安全缺陷的过程，以确保代码和数据都按预期工作。\n\n安全测试包括以下措施：\n"
- fmt: '- **机密性**：确保用户信息得到保护。示例是在安全套接层（SSL）连接后设置会员专区，该连接使用加密技术保护通过互联网传输的数据。


    - **信息完整性**：保护信息不被篡改。示例是在数据于系统不同层之间传递时对其进行加密和解密。


    - **身份验证**：确认用户身份，并确保系统可信。示例是登录系统。


    - **可用性**：确保系统正常运行。示例是安装防火墙以防止攻击。


    - **授权**：确保请求者被允许接收服务或执行操作。示例是创建一个超级账本许可型区块链，将访问权限限制给特定实体。


    - ****不可否认性**：确保在发送和接收消息时存在确认系统，以防止各方否认收到消息。示例是发送电子邮件通知以确认数字资产转账。


    ## 合规准备


    除了这些传统的安全测试考量外，您还需要考虑区块链特定的安全性和本地合规性，以确保您的平台符合监管要求。


    > **注意**

    > **安全合规性**对实体而言是一个法律问题。它是提供隐私建议以及改进安全性的监管标准。


    合规性并不直接关注安全性；然而，许多本地合规要求会考虑安全性，并确保用户和数据都得到保护，因此它们间接地相互关联。许多大公司同时聘请安全和合规专家，以确保两者都得到满足。


    您可能会想，为什么我甚至需要考虑法规？区块链不是旨在去中心化吗？确实如此；然而，近年来，由于持续的欺诈和攻击造成了重大损失，监管机构已对区块链运营商采取行动，许多国家也已制定隐私政策和安全措施。因此，您需要检查合规性和安全法规，以确保不违反任何法律。


    事实上，许多机构和当局已发布研究论文，分析区块链与数据保护法规之间的关系，以及如何为实现“合规准备”做好准备。


    > **注意**

    > **合规准备**确保实施满足治理要求。区块链在世界许多地方并不豁免于任何适用的法律和法规。


    例如，在欧洲和美国，存在与数据保护影响评估（`DPIA`）和通用数据保护条例（`GDPR`）相关的合规立法和政策，这些法规具体描述了哪些信息不允许存储在区块链上。


    不过，这不仅仅是关于哪些数据可以存储、哪些不能存储；许多国家已实施隐私法律，限制可以跨地理边界传输的数据类型。


    与区块链社区中许多认为合规法律只是为了限制和控制区块链技术取代传统机构的人不同，许多规则是为了保护投资者免受损失，以及保护用户的隐私。此外，一些国家有法律法规要求您进行记录保存并存储用户数据，以帮助防止欺诈、洗钱和恐怖主义。


    例如，2013年，美国的《1970年银行保密法》（`BSA`）和金融犯罪执法网络（`FinCEN`）向交易所和首次代币发行（`ICO`）发布了指南，将其归类为**货币服务企业**（`MSB`），这些企业需要遵守注册、报告和记录保存的规定。这意味着在美国，交易所和`ICO`需要向`FinCEN`注册为`MSB`。


    忽视合规性可能导致传票、罚款、关闭甚至刑事指控。例如，在欧洲，`GDPR`设定了遵守特定合规性的最后期限。无法遵守的公司面临被处以巨额罚款的风险。这适用于移动设备、电视应用、网络门户、网站、`API`和云存储。事实上，2019年，法国国家信息与自由委员会（`CNIL`）对谷歌处以5000万欧元罚款。另一个例子是稳定币`tether`，在撰写本文时，纽约最高法院已下令其在`Bitfinex`交易所冻结其代币的转账。


    每个地理位置在处理区块链技术方面都有特定要求，因此在开发软件之前，了解法律、安全和隐私规则非常重要。


    事实上，每个地理边界的监管机构都可以制定自己的规则。以美国和欧洲为例，它们对区块链有不同的规则，如果您有来自这些国家/地区的访客，即使只有一位，您也应遵守这些法规。在本章中，您将以美国和欧洲为例进行探讨；但是，您需要检查每个特定地理位置以了解当地适用的具体规则。


    ## 美国合规性


    美国有安全法规和资金转账法律，要求您遵守特定州的法律，如果您转移加密货币，甚至可能需要申请州许可证。在美国处理区块链相关技术的机构是**证券交易委员会**（`SEC`）和**另类交易系统**（`ATS`）。


    在撰写本文时，`SEC`将首次代币发行（`ICO`）和**证券型代币发行**（`STO`）都视为证券。因此，它们受《1934年证券交易法》的约束，该法概述了如何在实体之间转让证券。例如，`SEC`要求交易所向国家证券交易所和/或`ATS`注册。


    > **提示**

    > `STO`和`ICO`在美国都被视为证券；然而，`STO`在投资者中比`ICO`更受欢迎，因为许多`ICO`在2018年和2019年被迫向投资者退款。


    交易所也受特定法规约束；例如，处理衍生品的交易所需要向**商品期货交易委员会**（`CFTC`）注册为**CFTC交易所**或**指定合约市场**（`DCM`），因为《1936年商品交易法》（`CEA`）有此要求。'
  raw: "*   *Confidentiality*: Ensuring a user’s information is\n    protected. An\
    \ example is implementing a members-only area behind a Secure Sockets Layer\n\
    \    (SSL) connection, which uses encryption for data sent via the\n    Internet.\n\
    \n*   *The integrity of information*: Protecting information\n    from being changed.\
    \ An example is encrypting and decrypting data as it\n    passes between different\
    \ layers of your system.\n\n*   *Authentication*: Confirming a user’s identity,\
    \ as well as\n    ensuring the system is trusted. An example is a login system.\n\
    \n*   *Availability*: Ensuring your system is up and running. An\n    example\
    \ is to install a firewall to prevent an attack.\n\n*   *Authorization*: Ensuring\
    \ the requester is allowed to\n    receive a service or perform an action. An\
    \ example is creating a\n    Hyperledger-permissioned blockchain that limits access\
    \ to a specific\n    entity.\n\n*   *Nonrepudiation*: Ensuring that there is a\
    \ confirmation\n    system in place when sending and receiving messages so parties\
    \ cannot\n    deny receiving a message. An example is an e-mail notification sent\
    \ to\n    confirm a transfer of digital assets.\n\nCompliance Readiness\nIn addition\
    \ to these traditional security testing considerations, you\nneed to also consider\
    \ blockchain-specific security and local compliance\nto ensure your platform is\
    \ in compliance with regulatory\nrequirements.\n\nNote\n *Security\ncompliance*\
    \  is a legal concern for entities. It is a\nregulatory standard for providing\
    \ recommendations for privacy as well as\nimproving security.\n\nBeing in compliance\
    \ doesn’t directly focus on security; however, many\nof the local compliance requirements\
    \ take into account security and\nensuring both the user and the data are protected,\
    \ so indirectly they\nare intertwined. Many large companies employ both security\
    \ and\ncompliance experts to ensure both are met.\nYou may be wondering, why do\
    \ I even need to take regulations into\naccount anyway? Wasn’t blockchain intended\
    \ to be decentralized?\nThat is true; however, in recent years, regulations have\
    \ been taken\nagainst blockchain’s operators because of constant frauds and attacks,\n\
    which resulted in significant losses, and privacy policies and security\nmeasures\
    \ have been put in place in many countries. As a result, you need\nto check compliance\
    \ and security regulations to ensure you are not\nbreaching any laws.\nIn fact,\
    \ many institutions and authorities have published research\npapers to analyze\
    \ the relationship between blockchain and data\nprotection regulations and how\
    \ to prepare to achieve “compliance\nreadiness.”\n\nNote\nCompliance\nreadiness\
    \ ensures that the implementation meets governance\nrequirements. Blockchain is\
    \ not excluded from any applicable laws and\nregulations in many locations around\
    \ the world.\n\nFor instance, in Europe and the United States, there are compliance\n\
    legislation and policies tied to the Data Protection Impact\nAssessment (DPIA)\
    \ and the General Data Protection\nRegulation (GDPR) that describe specifically\
    \ what information is\nnot allowed to be stored on a blockchain.\nIt’s not just\
    \ what data can and cannot be stored, though; many\ncountries have implemented\
    \ privacy laws that restrict the type of data\nthat can be transferred across\
    \ geographical boundaries.\nUnlike many in the blockchain community who believe\
    \ that compliance\nlaws are put in place only to restrict and control blockchain\n\
    technologies from replacing traditional institutions, many of the rules\nare to\
    \ protect investors from losses, as well as to protect a user’s\nprivacy. Additionally,\
    \ in some countries there are laws and regulations\nthat require that you do record-keeping\
    \ and store users’ data to help\nprevent fraud, money laundering, and terrorism.\n\
    For instance, in 2013 in the United States the Bank Secrecy Act of\n1970 (BSA)\
    \ and FinCEN issued guidance to exchanges and ICOs,\ncategorizing them as money\
    \ service businesses\n(MSBs) that require registration, reporting, and record-keeping\n\
    regulations. What this means is that in the United States, exchanges and\nICOs\
    \ are required to register to FinCEN as MSBs.\nIgnoring compliance can lead to\
    \ subpoenas, financial penalties,\nshutdown, and even criminal charges. For instance,\
    \ in Europe, the GDPR\nset a deadline to comply with specific compliance. Companies\
    \ that are\nunable to comply risk getting a hefty fine. This applies to mobile\n\
    devices, TV apps, web portals, web sites, APIs, and cloud storage. In\nfact, in\
    \ 2019, CNIL fined Google 50 million euros. Another example is\nthe stable coin\
    \ tether that at the time of writing was ordered to freeze\ntransfers of its coin\
    \ on the Bitfinex exchange by the New York Supreme\nCourt.\nEach geographical\
    \ location is subject to a specific requirement\nregarding dealing with blockchain\
    \ technology, so it’s important to be\naware of the law, security, and privacy\
    \ rules put in place prior to\ndeveloping your software.\nIn fact, each geographical\
    \ boundary regulators can set their own\nrules. If you take the United States\
    \ and Europe as an example, each has\ndifferent rules regarding blockchain, and\
    \ in case you have even one\nvisitor from these countries, you should be complying\
    \ with these\nregulations. In this chapter, you will take a look at the United\
    \ States\nand Europe as an example; however, you need to check each specific\n\
    geographical boundary for the specific rules that apply locally.\n\nUnited States\
    \ Compliance\nThe United\nStates has security regulations and money transfer laws\
    \ that\nrequire that you comply with specific state laws, and you may even need\n\
    to apply for a state license if you transfer crypto. The bodies that\ndeal with\
    \ blockchain-related technologies in the United States are the\nSecurities and\
    \ Exchange\nCommission (SEC) and Alternative Trading Systems\n(ATS).\nAt the time\
    \ of writing, the SEC views both initial coin offerings\n(ICOs) and security token\
    \ offerings\n(STOs) as securities. As such, they are under the regulations of\n\
    the Securities Exchange Act of 1934, which outlines how to transfer\nsecurities\
    \ between entities. For instance, the SEC requires exchanges to\nregister with\
    \ the national securities exchange and/or ATS.\n\nTip\nSTO and ICO are both considered\
    \ securities in the United States;\nhowever, STOs are more fashionable among investors\
    \ than ICOs, as many\nICOs were forced to refund investors in 2018 and 2019.\n\
    \nExchanges also bind to specific regulations; for instance, exchanges\nthat deal\
    \ with the derivative need to register with the Commodity Futures Trading\nCommission\
    \ (CFTC) as a CFTC Exchange or Designated Commodity\nMarket (DCM) because of the\
    \ Commodity Exchange Act of 1936 (CEA)."
  trans: '

    - **机密性**：确保用户信息得到保护。示例是在安全套接层（SSL）连接后设置会员专区，该连接使用加密技术保护通过互联网传输的数据。


    - **信息完整性**：保护信息不被篡改。示例是在数据于系统不同层之间传递时对其进行加密和解密。


    - **身份验证**：确认用户身份，并确保系统可信。示例是登录系统。


    - **可用性**：确保系统正常运行。示例是安装防火墙以防止攻击。


    - **授权**：确保请求者被允许接收服务或执行操作。示例是创建一个超级账本许可型区块链，将访问权限限制给特定实体。


    - **不可否认性**：确保在发送和接收消息时存在确认系统，以防止各方否认收到消息。示例是发送电子邮件通知以确认数字资产转账。


    ## 合规准备


    除了这些传统的安全测试考量外，您还需要考虑区块链特定的安全性和本地合规性，以确保您的平台符合监管要求。


    > **注意**

    > **安全合规性**对实体而言是一个法律问题。它是提供隐私建议以及改进安全性的监管标准。


    合规性并不直接关注安全性；然而，许多本地合规要求会考虑安全性，并确保用户和数据都得到保护，因此它们间接地相互关联。许多大公司同时聘请安全和合规专家，以确保两者都得到满足。


    您可能会想，为什么我甚至需要考虑法规？区块链不是旨在去中心化吗？确实如此；然而，近年来，由于持续的欺诈和攻击造成了重大损失，监管机构已对区块链运营商采取行动，许多国家也已制定隐私政策和安全措施。因此，您需要检查合规性和安全法规，以确保不违反任何法律。


    事实上，许多机构和当局已发布研究论文，分析区块链与数据保护法规之间的关系，以及如何为实现“合规准备”做好准备。


    > **注意**

    > **合规准备**确保实施满足治理要求。区块链在世界许多地方并不豁免于任何适用的法律和法规。


    例如，在欧洲和美国，存在与数据保护影响评估（`DPIA`）和通用数据保护条例（`GDPR`）相关的合规立法和政策，这些法规具体描述了哪些信息不允许存储在区块链上。


    不过，这不仅仅是关于哪些数据可以存储、哪些不能存储；许多国家已实施隐私法律，限制可以跨地理边界传输的数据类型。


    与区块链社区中许多认为合规法律只是为了限制和控制区块链技术取代传统机构的人不同，许多规则是为了保护投资者免受损失，以及保护用户的隐私。此外，一些国家有法律法规要求您进行记录保存并存储用户数据，以帮助防止欺诈、洗钱和恐怖主义。


    例如，2013 年，美国的《1970 年银行保密法》（`BSA`）和金融犯罪执法网络（`FinCEN`）向交易所和首次代币发行（`ICO`）发布了指南，将其归类为**货币服务企业**（`MSB`），这些企业需要遵守注册、报告和记录保存的规定。这意味着在美国，交易所和`ICO`需要向`FinCEN`注册为`MSB`。


    忽视合规性可能导致传票、罚款、关闭甚至刑事指控。例如，在欧洲，`GDPR`设定了遵守特定合规性的最后期限。无法遵守的公司面临被处以巨额罚款的风险。这适用于移动设备、电视应用、网络门户、网站、`API`和云存储。事实上，2019
    年，法国国家信息与自由委员会（`CNIL`）对谷歌处以 5000 万欧元罚款。另一个例子是稳定币`tether`，在撰写本文时，纽约最高法院已下令其在`Bitfinex`交易所冻结其代币的转账。


    每个地理位置在处理区块链技术方面都有特定要求，因此在开发软件之前，了解法律、安全和隐私规则非常重要。


    事实上，每个地理边界的监管机构都可以制定自己的规则。以美国和欧洲为例，它们对区块链有不同的规则，如果您有来自这些国家/地区的访客，即使只有一位，您也应遵守这些法规。在本章中，您将以美国和欧洲为例进行探讨；但是，您需要检查每个特定地理位置以了解当地适用的具体规则。


    ## 美国合规性


    美国有安全法规和资金转账法律，要求您遵守特定州的法律，如果您转移加密货币，甚至可能需要申请州许可证。在美国处理区块链相关技术的机构是**证券交易委员会**（`SEC`）和**另类交易系统**（`ATS`）。


    在撰写本文时，`SEC`将首次代币发行（`ICO`）和**证券型代币发行**（`STO`）都视为证券。因此，它们受《1934 年证券交易法》的约束，该法概述了如何在实体之间转让证券。例如，`SEC`要求交易所向国家证券交易所和/或`ATS`注册。


    > **提示**

    > `STO`和`ICO`在美国都被视为证券；然而，`STO`在投资者中比`ICO`更受欢迎，因为许多`ICO`在 2018 年和 2019 年被迫向投资者退款。


    交易所也受特定法规约束；例如，处理衍生品的交易所需要向**商品期货交易委员会**（`CFTC`）注册为**CFTC 交易所**或**指定合约市场**（`DCM`），因为《1936
    年商品交易法》（`CEA`）有此要求。

