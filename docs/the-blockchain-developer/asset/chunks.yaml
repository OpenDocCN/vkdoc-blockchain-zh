    Figure 5-19


    MetaMask beta Chrome network drop-down


    `A`s you might recall, you programmed the `truffle.js` values to set a network
    on localhost port 8584, which matches the default network; however, you can set
    a custom RPC or connect to testnet or mainnet.


    For more information regarding connecting Truffle with Metamask, visit the Truffle
    framework docs;


    [`https://truffleframework.com/docs/truffle/getting-started/truffle-with-metamask`](https://truffleframework.com/docs/truffle/getting-started/truffle-with-metamask)


    ## Public Testnet


    Now that you are able to run your smart contract on a development network, you
    can take an additional step prior to going to mainnet. You can run your contract
    on a public testnet network.


    ### Syncing Blocks


    There are three well-known testnets: Ropsten, Kovan, and Rinkeby. You can program
