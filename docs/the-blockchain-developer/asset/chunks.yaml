    图 3-6


    代码注册矿工并生成新区块


    在这个练习中，你成功地将节点注册为矿工，生成了新区块，并与其它节点共享了区块。你使用了一个简单的权益证明（PoS）作为共识机制，并通过创建三个节点来测试功能。该共识机制较为简单，并未考虑所有可能出现的用例或安全性问题。下一步，你将把区块保存到
    LevelDB 数据库中。


    ## 在 LevelDB 中存储区块


    如果你让区块链运行数小时，你会发现创建的区块数量不断增加，这可能会成为一个问题，因为目前这些区块存储在计算机的内存缓存中。随着区块数量的增加，内存使用量也会增长，最终会导致代码崩溃。此外，如果不将区块存入数据库，你将无法启动和停止你的
    P2P 网络，因为区块并没有被保存。


    为了应对这些及其它用例，你将使用 LevelDB 数据库。


    ### 注意


    LevelDB 数据库以一种称为“层级上升”和“层级下降”的方式存储键值对。对于区块链网络来说，这是一个理想的选择。事实上，比特币不仅使用 LevelDB
    来存储区块信息，还用它来存储交易信息。参见[`https://github.com/bitcoin-core/leveldb`](https://github.com/bitcoin-core/leveldb)。

    '
- fmt: '### Step 4: LevelDB to Store Blocks Exercise


    **LevelDB**


    In this exercise, you will implement a database to store your blocks. You can
    download the complete exercise from here: [`https://github.com/Apress/the-blockchain-developer/tree/master/chapter3/step4/blockchain`](https://github.com/Apress/the-blockchain-developer/tree/master/chapter3/step4/blockchain).
    Remember to run the `install` command to retrieve all the `npm` modules.


    ```

    > npm install

    ```


    To get started on your own from the previous step, you will be using a Node.js
    LevelDB wrapper so you can communicate with LevelDB through your code. Install
    the library via `npm`.


    ```

    > npm install level --save

    ```


    Next, make a directory where you will be saving the database.


    ```

    > mkdir db

    ```


    You can now implement the database. In your `chain.js` library, you will add some
    code to save your block in the LevelDB database, as shown in Listing 3-7.


    ```

    let level = require(''level''),

    fs = require(''fs'');

    let db;

    let createDb = (peerId) => {

    let dir = __dirname + ''/db/'' + peerId;

    if (!fs.existsSync(dir)){

    fs.mkdirSync(dir);

    db = level(dir);

    storeBlock(getGenesisBlock());

    }

    }

    ```


    As you can see, you use the `__dirname` Node.js native class to give you the directory
    path location because you need the full path to save your database.


    Because you are running multiple instances of your P2P network on the same machine,
    you cannot use the same path for each peer because the database needs to be separate.
    What you can do is set each database’s location in a separate path location using
    the folder name as the name of your peer ID; then each database can be stored
    in the `db` folder. Also notice that you save the first block, `getGenesisBlock()`.


    Next, you create a `storeBlock` method to store the new block.


    ```

    let storeBlock = (newBlock) => {

    db.put(newBlock.index, JSON.stringify(newBlock), function (err) {

    if (err) return console.log(''Ooops!'', err) // some kind of I/O error

    console.log(''--- Inserting block index: '' + newBlock.index);

    })

    }

    ```


    When you generate a new block using the `generateNextBlock` method, you can now
    store the block in the LevelDB database.


    ```

    storeBlock(newBlock);

    ```


    You are also going to add a method to be able to retrieve a block from the LevelDB
    database.


    ```

    let getDbBlock = (index, res) => {

    db.get(index, function (err, value) {

    if (err) return res.send(JSON.stringify(err));

    return(res.send(value));

    });

    }

    ```


    Make sure you expose the `createDb` and `getDbBlock` methods.


    ```

    if (typeof exports != ''undefined'' ) {

    exports.createDb = createDb;

    exports.getDbBlock = getDbBlock;

    }

    ```


    Lastly, in your P2P network code, all you need to do is create a database once
    you start the code.


    ```

    chain.createDb(myPeerId.toString(''hex''));

    ```


    To see the code in action, run an instance of the P2P network.


    ```

    > node p2p.js

    ```


    You can monitor the database’s data in the `db` folder using the `tail` command
    with the `-f` flag. Terminal will stay open and can show you new blocks as they
    are being generated (see the output in Figure 3-7).


    ![../images/475651_1_En_3_Chapter/475651_1_En_3_Fig7_HTML.jpg](images/475651_1_En_3_Chapter/475651_1_En_3_Fig7_HTML.jpg)


    Figure 3-7: `tail` command with the LevelDB database showing new blocks being
    generated


    ```

    > cd step4/db/[our peer Id]

    > tail –f 000003.log

    ```


    In this exercise, you created a LevelDB database. You are storing your blocks
    so you will be able to retrieve them instead of relying on your cache memory.
    I am keeping things simple; if this were a real working blockchain, you would
    implement the following steps:


    1.  Mitigate all the possible security risks.

    2.  Store and retrieve your blocks from the LevelDB database.

    3.  Create a method to restore LevelDB’s entries.

    4.  Clean old databases because new ones are created on every init.


    ## Creating a Blockchain Wallet


    In cryptocurrency, a wallet is necessary in order to reward miners for generating
    blocks as well as to be able to create transactions and send transactions. In
    this section, you will create a wallet. You need to create a combination of public
    and private keys not just to authenticate a user but so you can store and retrieve
    data that the user owns. You will create a wallet with public and private keys.


    In bitcoin, the wallet’s original software is the bitcoin core protocol you downloaded
    in Chapter 2; it needs the entire ledger of all transactions since 2009, which
    is more than 150 GB at the time of writing. For that reason, most wallets in use
    are “light” wallets or what’s called *simplified payment verification* (SPV) wallets
    that sync to bitcoin core. In blockchain, there are many different wallets available,
    from online all the way to a paper wallet where you write your private key on
    a piece of paper.


    Before proceeding, let’s take a quick look at how you can communicate with a bitcoin
    wallet. As you recall, in Chapter 2 you were able to get the balance of a certain
    bitcoin wallet. To better understand wallets, you can create a bitcoin wallet
    using the bitcoin core.


    First, you need to run the bitcoin daemon.


    ```

    > bitcoind –printtoconsole

    ```


    Next, you can request an address.


    ```

    > bitcoin-cli help getnewaddress

    ```


    Then, you are able to dump your private keys into a text file.


    ```

    > bitcoin-cli dumpwallet ~/mywallet.txt

    ```


    You can get the location of your private key and view the key.


    ```

    > vim /Users/[location]/mywallet.txt

    ```


    For reference, check the C++ bitcoin core wallet code here:


    ```

    > vim /[Bitcoin Core Location]/bitcoin/src/wallet/init.cpp

    ```'
