    \ UTXO。接收方可以使用这些 UTXO 向一个新的或多个接收方发送交易，并且这个过程可以无限继续。\n\n**注意：**  \nUTXO 是你钱包中一个单独的传入币交易。当你向一个或多个钱包地址接收多笔交易时，每笔交易都作为一个\
    \ UTXO 存在，因此你会拥有多个 UTXO。要创建新的传出交易，你需要根据你要发送的金额收集一个或多个 UTXO。\n\n现在，如果你的 UTXO 包含的金额大于你想要花费的金额怎么办？那么你需要将剩余的币发送回你的钱包。要获取未花费币的列表，你可以使用\
    \ `listunspent` 命令。\n\n通过 `Control+C` 关闭比特币核心图形界面钱包，并再次使用 `testnet` 标志启动守护进程。\n\
    \n```bash\n> bitcoind -testnet\n```\n\n当你运行 `getbalance` 命令时，你会得到钱包的余额，其中包含你从\
