    ### Importing/Exporting the Model


    To export the model, you can generate the business network archive (`.bna`) file.
    The `.bna` file can then be deployed in production. All you have to do is click
    the Export link, as shown in Figure [8-19](#475651_1_En_8_Chapter.xhtml#Fig19).


    ![../images/475651_1_En_8_Chapter/475651_1_En_8_Fig19_HTML.jpg](images/475651_1_En_8_Chapter/475651_1_En_8_Fig19_HTML.jpg)


