- fmt: '### Coding the NEO “Hello, World” Smart Contract in C#


    In this section, you will be using C# to develop your NEO “Hello, World” smart
    contract in .NET. The NeoVM is more compact; you can compile only limited C#/`dotnet`
    features into your AVM file. You can view the list of features available for development
    here: [`https://docs.neo.org/en-us/sc/quickstart/limitation.html`](https://docs.neo.org/en-us/sc/quickstart/limitation.html).


    The examples will use the “Hello, World” example provided in the NEO examples.


    ```

    using Neo.SmartContract.Framework;

    using Neo.SmartContract.Framework.Services.Neo;

    public class Class1: SmartContract

    {

    public static void Main()

    {

    Storage.Put(Storage.CurrentContext, "Hello", "World");

    }

    }

    ```


    After writing the code, select Build from the top menu and then Build All (or
    Command+B) to compile the `Class1.cs` code.


    The `.dll` library file was created in the `bin/Debug/netstandard2.0/` folder.
    You will use this `.dll` file with the neo-compiler and convert the `.dll` file
    to an AVM file. After compiling the DLL file, the `hello_contract.dll` file is
    created here:


    `~/Projects/hello_contract/hello_contract/obj/Debug/netstandard2.0/hello_contract.dll`


    ### Note


    The NeoContract framework generates the NeoVM bytecode. The code is saved in the
    AVM file format. The `*.avm` file can then be deployed on the NEO blockchain.


    ### Coding the NEO “Hello, World” Smart Contract in Python


    Like in C#, you can generate some minimalistic Python code to print “Hello, World.”
    You can use the Eclipse IDE ([`https://www.eclipse.org/ide/`](https://www.eclipse.org/ide/))
    or any editor of your choosing. These instructions will be using vim. Create a
    file named `sample1.py`.


    ```

    > vim ~/Desktop/smartContracts/sample1.py

    ```


    Type the following code to print “Hello World.”


    ```

    def Main():

    print("Hello World")

    return True

    ```


    To close and save the file, type `:wq` in vim.


    ### Compiling Your Smart Contracts to .avm


    Now that you have two files named `sample1.py` and `hello_contract.dll`, the next
    step is to compile these files into NEO virtual machine files (`.avm`) that you
    will deploy on the NEO blockchain.


    Let’s start by compiling the `hello_contract.dll` file. Change the directory to
    the DLL file.


    ```

    > cd ~/Desktop/neo-compiler/neon/bin/Debug/netcoreapp2.0/osx.10.11-x64/publish

    ```


    Copy `Neo.SmartContract.Framework.dll`.


    ```

    > cp ~/Projects/hello_contract/hello_contract/bin/Debug/netstandard2.0/Neo.SmartContract.Framework.dll
    ~/Projects/hello_contract/hello_contract/obj/Debug/netstandard2.0

    ```


    Now, you can use the `dotnet` core tool to publish your DLL into an AVM file,
    as shown in Figure [7-17](#475651_1_En_7_Chapter.xhtml#Fig17).


    ```

    > dotnet neon.dll ~/Projects/hello_contract/hello_contract/obj/Debug/netstandard2.0/hello_contract.dll

    ```


    You can see the output, as shown in Figure [7-17](#475651_1_En_7_Chapter.xhtml#Fig17).


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig17_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig17_HTML.jpg)


    Figure 7-17 Converting a DLL into AVM bytecode


    You can see the AVM bytecode file using the `ls` command.


    ```

    > ls ~/Projects/hello_contract/hello_contract/obj/Debug/netstandard2.0/∗.avm

    hello_contract.avm

    ```


    Similarly, you can compile the Python `sample1.py` file into AVM. In NEO bash,
    use the `sc build` command.


    ```

    > cd ~/Desktop/neo-python/neo/bin

    > python3.6 prompt.py –p

    neo> sc build ~/Desktop/smartContracts/sample1.py

    Saved output to ~/Desktop/smartContracts/sample1.avm

    ```


    ## Publish a Smart Contract on a Private Testnet


    The next step is to deploy your AVM files to the NEO private testnet chain. You
    don’t need to remember all the options. You can call the command with the `help`
    flag to see the options.


    ```

    neo> sc deploy help

    Deploy a smart contract (.avm) file to the blockchain

    Usage: sc deploy {path} {storage} {dynamic_invoke} {payable} {params} (returntype)

    path            - path to the desired Python (.py) file

    storage         - boolean input to determine if smart contract requires storage

    dynamic_invoke  - boolean input to determine if smart contract requires dynamic
    invoke

    payable         - boolean input to determine if smart contract is payable

    params          - input parameter types of the smart contract

    returntype      - (Optional) the return type of the smart contract output

    For more information about parameter types see

    https://neo-python.readthedocs.io/en/latest/data-types.html#contractparametertypes

    ```


    Next set `storage`, `dynamic_invoke`, and `payable` as `false`, and set `params`
    and `returntype` as 01, as shown in Figure [7-18](#475651_1_En_7_Chapter.xhtml#Fig18).


    ![../images/475651_1_En_7_Chapter/475651_1_En_7_Fig18_HTML.jpg](images/475651_1_En_7_Chapter/475651_1_En_7_Fig18_HTML.jpg)


    Figure 7-18 Publishing an AVM file on a private testnet chain


    ```

    neo> sc deploy ~/Desktop/smartContracts/sample1.avm False False False 01 01

    ```


    NEO asks for a contract name; let’s call the contract `helloWorld`. Leave the
    version, author, email, and description fields blank and enter your wallet password
    to pay for the contract.


    ## Publishing to Mainnet


    To publish on mainnet, you can use the same process as you did with the testnet;
    just bootstrap to the mainnet.


    ### Bootstrapping to Mainnet


    To bootstrap to the mainnet blockchain, just run `np-bootstrap` with the `-m`
    flag (it’s close to 10 GB). You can also use the notifications database on mainnet.


    ```

    > np-prompt –m -n

    ```


    ### Installing the neo-gui Client


    An easier approach is to set and publish a NeoContract through neo-gui. You need
    to set up a virtual machine for PC, but deploying AVM files is a breeze. Follow
    these instructions:


    [`https://docs.neo.org/en-us/sc/quickstart/deploy-invoke.html`](https://docs.neo.org/en-us/sc/quickstart/deploy-invoke.html)


    [`https://docs.neo.org/en-us/node/gui/install.html`](https://docs.neo.org/en-us/node/gui/install.html)'
