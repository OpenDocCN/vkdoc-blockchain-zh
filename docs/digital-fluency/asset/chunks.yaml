  trans: '

    ### 量子比特类型：超导量子比特


    在当前最先进的量子计算机中，技术上最重要的量子比特实现方案是超导量子比特，这就是为什么我们现在要更详细地研究它们。


    *超导性*本身是一种自然现象，由荷兰物理学家海克·卡末林·昂内斯于 1911 年在著名的荷兰莱顿大学发现。他在低温下研究固态汞时观察到，当温度达到接近绝对零点的约
    4.2 K 时，其电阻会突然消失 [35]。在此临界温度以下，由电子携带的电流可以自由地流过材料，没有任何电阻或其他耗散效应——因此电流会永远持续流动。我们之前讨论第一个晶体管时认识的约翰·巴丁、利昂·库珀和罗伯特·施里弗后来通过他们基于量子力学的所谓
    *BCS 理论*解释了这一效应，该理论从电子对的角度解释了超导性。为了理解这些所谓的*库珀对*的形成，我们首先简要研究超导体的一些基本性质。


    固体物质由规则排列在所谓*晶格*中的原子组成，如 图 2-7 左侧所示。在室温下，构成晶格的原子会运动，导致整个晶格强烈振动——它们运动得越快，材料的温度就越高。当自由电子穿过振动的晶格时，它会与晶格原子发生各种碰撞，类似于台球中白球频繁撞击彩球。直观地说，如果温度升高且原子振动更剧烈，电子与原子之间的碰撞就更可能发生。因此，金属的电阻率通常随温度升高而增加。在极低温度下，晶格原子振动非常缓慢，并且由于量子力学的量子化原理，这些振动的能量会以阶梯方式变化。最小的振动能量称为*声子*，其行为类似于量子力学粒子。³⁶
    穿过这种冷晶格的电子会遇到一些但非常少的碰撞。因此，冷金属的电阻率很低，但不为零。


    ![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig8_HTML.png](img/505424_1_En_2_Fig8_HTML.png)


    **图 2-8** 约瑟夫森结中库珀对的量子力学隧道效应。库珀对要么停留在左侧的“超导体 1”中，要么隧穿通过绝缘隧道势垒进入右侧的“超导体 2”（白色虚线箭头）。第一种情况可与量子比特
    `|0⟩` 关联，第二种情况与 `|1⟩` 关联。


    在超导材料中，这幅图景完全改变。超导晶体的特定几何结构允许电子吸收晶格声子，并相互反复交换它们，而不会减速或损失任何运动能量。两个电子之间的这种相互作用将电子对“粘合”在一起，形成库珀对，如
    图 2-7 右侧所示。这个库珀对可以不受阻碍地穿过晶格，从而携带零电阻的电流。超导转变发生在低于某个特定材料温度时，该温度促进了库珀对的形成。


    广泛用于实现超导量子比特的器件结构被称为*约瑟夫森结*，以纪念其美国发明者、后来的诺贝尔奖得主布赖恩·约瑟夫森。它由两个被薄绝缘隧道势垒隔开的超导体组成。基于量子力学隧道效应（我们在
    2.1 节中了解到的奇异现象），库珀对可以越过这个隧道势垒。约瑟夫森结通常允许实现三种不同的超导量子比特。第一种选择如图 2-8 所示，称为超导*电荷量子比特*，因为它最终依赖于隧道势垒左侧和右侧超导体中是否存在库珀对。这种特定器件被称为*库珀对盒*。


    第二种也是迄今为止使用最广泛的实现方案是超导*磁通量子比特*或“持久电流量子比特”。该方案基本上是通过库珀对携带的、分别在超导环中顺时针和逆时针流动的电流来编码量子比特。其底层器件结构称为*超导量子干涉器件*或简称“SQUID”，如图
    2-9 所示。当注入环中时，根据我们在 2.2 节中了解的波粒二象性，库珀对基本上表现为量子力学波。这些由库珀对携带的超导电流可以干涉形成叠加态，并同时（以一定概率）沿顺时针和逆时针方向流动。当我们测量流动方向时，相应的波函数坍缩，库珀对将沿两个方向之一流动。根据右手定则，³⁷
    顺时针电流感应出一个向下的磁场，通常与量子比特 `|0⟩ = |↻⟩ = |↓⟩` 关联，逆时针电流相应地与 `|1⟩ = |↺⟩ = |↑⟩` 关联。超导量子比特是量子信息处理最有希望的候选者，这主要归因于它们的大小和宏观特性：超导磁通量子比特通常涉及在尺寸达
    0.1 mm 的器件中约 10⁹ 个库珀对的集体运动。这种宏观集合体比与环境隔离的单个电子、原子或离子更容易控制。但更宏观的量子比特通常遭受更快的退相干时间，这就是为什么超导量子比特在所有量子比特中显示出最快的退相干时间。


    ![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig9_HTML.png](img/505424_1_En_2_Fig9_HTML.png)


    **图 2-9** SQUID 中的超导磁通量子比特。库珀对的顺时针持久电流与量子比特 `|0⟩` 关联，逆时针方向的持久电流与 `|1⟩` 关联。两个约瑟夫森结允许两个波函数干涉并同时沿两个方向循环。


    然而，早期实验中观察到的令人困扰的短退相干时间已通过先进的电路设计和更稳健的量子比特得到延长和改善。最新实验获得的退相干时间足以实现所有相关的量子逻辑门，这就是为什么在所有大规模量子计算实现方案中，它们提供了最乐观的前景，并吸引了众多量子计算公司的高度关注，我们将在下面看到。


    ## 量子计算现状


    量子计算不再局限于学术研究，最近已在工业界和大企业中首次亮相 [37]。目前有各种不同的系统可供商业使用，既可以直接本地购买，也可以通过互联网按需访问的云计算服务获取。它们采用不同的量子比特实现方案，其中超导电路和离子阱目前是其中最重要的。

    '
- fmt: "### 2.3.1 Commercially Available Systems\n\nA selection of the commercially\
    \ available systems is compiled in Table 2-2 and ranked from top to bottom by\
    \ the number of qubits. They fall into three fundamentally different types of\
    \ quantum computers that critically determine the range of applications and use\
    \ cases. Quantum computers generally fall into (1) quantum annealers, (2) quantum\
    \ simulators, and (3) universal quantum computers. The awareness of the differences\
    \ will allow you to better understand news and press releases in media and to\
    \ select the best quantum computer or cloud computing vendor that is most suited\
    \ for your own applications or use cases.\n\n**Table 2-2** Selected commercially\
    \ available and accessible quantum information-processing devices and systems\
    \ (as of August 2020). The systems of IBM and Google are available through their\
    \ cloud computing services only. No company has implemented a universal quantum\
    \ computer yet\n\n| Company | Name | Type | No. of Qubits | Source |\n| --- |\
    \ --- | --- | --- | --- |\n| D-Wave Systems | 5000Q | Annealer ^a | 5,000 | [38]\
    \ |\n| D-Wave Systems | 2000Q | Annealer ^a | 2,000 | [39] |\n| NIST | n.n. |\
    \ Simulator ^b | 300 | [40] |\n| IonQ | n.n. | Computer ^c | 79 | [41] |\n| Google\
    \ | Bristlecone | Computer ^a | 72 | [42] |\n| IBM | Hummingbird | Computer ^a\
    \ | 65 | [43] |\n| Google | Sycamore | Computer ^a | 54 | [3] |\n| IBM | Q53 |\
    \ Computer ^a | 53 | [44] |\n| Intel | Tangle Lake | Computer ^a | 49 | [45] |\n\
    | IBM | Qiskit | Simulator ^b | 30 | [46] |\n| IBM | Raleigh | Computer ^a | 28\
    \ | [47] |\n| Rigetti Computing | 19Q Acorn | Computer ^a | 19 | [48] |\n| Alibaba\
    \ | Aliyun | Computer ^a | 11 | [49] |\n| Honeywell | Model H1 | Computer ^c |\
    \ 10 | [50] |\n| Honeywell | Model H0 | Computer ^c | 6 | [36] |\n\n^a Superconducting\
    \ circuit  \n^b Classical computing hardware  \n^c Linear ion trap microchip\n\
    \n#### Commercially Available Systems: Quantum Annealer\n\n*Quantum annealers*\
    \ are the first type of quantum computers we will explore in more detail. They\
    \ were proposed theoretically in 1994 [51, 52] and implemented with superconducting\
    \ flux qubits first [53]. Quantum annealers have been commercially available from\
    \ the Canadian company D-Wave Systems since 2011. Their first system was called\
    \ `D-Wave One`, equipped with 128 qubits and sold to the American defense company\
    \ Lockheed Martin soon after its public release. D-Wave’s first customer later\
    \ upgraded its system and is reportedly using the `D-Wave 2000Q` with up to 2,048\
    \ qubits until now. The latest system, the `D-Wave 5000Q`, was released in 2019\
    \ and sold to Los Alamos National Laboratory in New Mexico, America, first.\n\n\
    ![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig10_HTML.png](images/505424_1_En_2_Chapter/505424_1_En_2_Fig10_HTML.png)\n\
    \n**Figure 2-10** Principal device design used in D-Wave’s quantum annealers –\
    \ the system was reduced to 4 qubits for simplicity. The superconducting persistent\
    \ currents associated with the four flux qubits flow in rectangular loops while\
    \ each loop corresponds to one flux qubit. The flux qubits can interact with each\
    \ other through 16 couplers that allow for the quantum mechanical tunneling of\
    \ superconducting currents. Special initialization ports or contacts facilitate\
    \ the injection of the respective currents into the device\n\nThe QPU of D-Wave’s\
    \ quantum annealers is built up of a two-dimensional array of superconducting\
    \ rings that carry superconducting flux qubits forming a so-called *spin-glass\
    \ lattice* [52] as shown in Figure 2-10. The rings are interconnected by superconducting\
    \ *couplers* that facilitate quantum mechanical tunneling and can be used to superimpose\
    \ and entangle adjacent flux qubits. The QPU is further equipped with a range\
    \ of different electrical contacts that allow for applying a bias voltage to tune\
    \ the tunneling probability and energy of Cooper pairs.(38) The `5000Q`, for example,\
    \ is reported to comprise around 40,000 couplers and more than 1,000,000 Josephson\
    \ junctions, which makes it one of the most complex superconducting integrated\
    \ circuits ever built.\n\nLike any other computer, quantum annealers are built\
    \ to solve mathematical problems, such as the *traveling salesman problem* that\
    \ is a legendary benchmark in optimization and one of the most cited examples\
    \ in this context. The objective is to find the shortest possible route for a\
    \ salesman, who starts in a hometown and needs to visit a list of other cities\
    \ distributed around the world. In this problem, the salesman must visit each\
    \ city on the list exactly once and finish the journey in the hometown. If the\
    \ list of cities is very short, this combinatorial problem is very easy to solve.\
    \ But as soon as the length of the list increases, the number of possible combinations\
    \ increases exponentially. With 5 cities, for example, there is a manageable number\
    \ of 12 possible routes. But in case of 12 cities, the traveling salesman gets\
    \ in a miserable situation as he needs to consider almost 20 million possible\
    \ routes(39) – poor salesman. But how does a quantum annealer of D-Wave Systems\
    \ generally approach a computational problem?"
  raw: '### 2.3.1 Commercially Available Systems


    A selection of the commercially available systems is compiled in Table [2-2](#505424_1_En_2_Chapter.xhtml#Tab2)
    and ranked from top to bottom by the number of qubits. They fall into three fundamentally
    different types of quantum computers that critically determine the range of applications
    and use cases. Quantum computers generally fall into (1) quantum annealers, (2)
    quantum simulators, and (3) universal quantum computers. The awareness of the
    differences will allow you to better understand news and press releases in media
    and to select the best quantum computer or cloud computing vendor that is most
    suited for your own applications or use cases.


    Table 2-2


    Selected commercially available and accessible quantum information-processing
    devices and systems (as of August 2020). The systems of IBM and Google are available
    through their cloud computing services only. No company has implemented a universal
    quantum computer yet


    | Company | Name | Type | No. of Qubits | Source |

    | --- | --- | --- | --- | --- |

    | D-Wave Systems | 5000Q | Annealer ^a | 5,000 | [[38](#505424_1_En_2_Chapter.xhtml#Par234)]
    |

    | D-Wave Systems | 2000Q | Annealer ^a | 2,000 | [[39](#505424_1_En_2_Chapter.xhtml#Par235)]
    |

    | NIST | n.n. | Simulator ^b | 300 | [[40](#505424_1_En_2_Chapter.xhtml#Par236)]
    |

    | IonQ | n.n. | Computer ^c | 79 | [[41](#505424_1_En_2_Chapter.xhtml#Par237)]
    |

    | Google | Bristlecone | Computer ^a | 72 | [[42](#505424_1_En_2_Chapter.xhtml#Par238)]
    |

    | IBM | Hummingbird | Computer ^a | 65 | [[43](#505424_1_En_2_Chapter.xhtml#Par239)]
    |

    | Google | Sycamore | Computer ^a | 54 | [[3](#505424_1_En_2_Chapter.xhtml#Par199)]
    |

    | IBM | Q53 | Computer ^a | 53 | [[44](#505424_1_En_2_Chapter.xhtml#Par240)] |

    | Intel | Tangle Lake | Computer ^a | 49 | [[45](#505424_1_En_2_Chapter.xhtml#Par241)]
    |

    | IBM | Qiskit | Simulator ^b | 30 | [[46](#505424_1_En_2_Chapter.xhtml#Par242)]
    |

    | IBM | Raleigh | Computer ^a | 28 | [[47](#505424_1_En_2_Chapter.xhtml#Par243)]
    |

    | Rigetti Computing | 19Q Acorn | Computer ^a | 19 | [[48](#505424_1_En_2_Chapter.xhtml#Par244)]
    |

    | Alibaba | Aliyun | Computer ^a | 11 | [[49](#505424_1_En_2_Chapter.xhtml#Par245)]
    |

    | Honeywell | Model H1 | Computer ^c | 10 | [[50](#505424_1_En_2_Chapter.xhtml#Par246)]
    |

    | Honeywell | Model H0 | Computer ^c | 6 | [[36](#505424_1_En_2_Chapter.xhtml#Par232)]
    |


    ^aSuperconducting circuit


    ^bClassical computing hardware


    ^cLinear ion trap microchip


    #### Commercially Available Systems: Quantum Annealer


    *Quantum annealers* are the first type of quantum computers we will explore in
    more detail. They were proposed theoretically in 1994 [[51](#505424_1_En_2_Chapter.xhtml#Par247),
    [52](#505424_1_En_2_Chapter.xhtml#Par248)] and implemented with superconducting
    flux qubits first [[53](#505424_1_En_2_Chapter.xhtml#Par249)]. Quantum annealers
    have been commercially available from the Canadian company D-Wave Systems since
    2011\. Their first system was called “D-Wave One,” equipped with 128 qubits and
    sold to the American defense company Lockheed Martin soon after its public release.
    D-Wave’s first customer later upgraded its system and is reportedly using the
    “D-Wave 2000Q” with up to 2,048 qubits until now. The latest system, the “D-Wave
    5000Q,” was released in 2019 and sold to Los Alamos National Laboratory in New
    Mexico, America, first.


    ![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig10_HTML.png](images/505424_1_En_2_Chapter/505424_1_En_2_Fig10_HTML.png)


    Figure 2-10


    Principal device design used in D-Wave’s quantum annealers – the system was reduced
    to 4 qubits for simplicity. The superconducting persistent currents associated
    with the four flux qubits flow in rectangular loops while each loop corresponds
    to one flux qubit. The flux qubits can interact with each other through 16 couplers
    that allow for the quantum mechanical tunneling of superconducting currents. Special
    initialization ports or contacts facilitate the injection of the respective currents
    into the device


    The QPU of D-Wave’s quantum annealers is built up of a two-dimensional array of
    superconducting rings that carry superconducting flux qubits forming a so-called
    *spin-glass lattice* [[52](#505424_1_En_2_Chapter.xhtml#Par248)] as shown in Figure
    [2-10](#505424_1_En_2_Chapter.xhtml#Fig10). The rings are interconnected by superconducting
    *couplers* that facilitate quantum mechanical tunneling and can be used to superimpose
    and entangle adjacent flux qubits. The QPU is further equipped with a range of
    different electrical contacts that allow for applying a bias voltage to tune the
    tunneling probability and energy of Cooper pairs.^([^(38)](#fn38)) The 5000Q,
    for example, is reported to comprise around 40,000 couplers and more than 1,000,000
    Josephson junctions, which makes it one of the most complex superconducting integrated
    circuits ever built.


    Like any other computer, quantum annealers are built to solve mathematical problems,
    such as the *traveling salesman problem* that is a legendary benchmark in optimization
    and one of the most cited examples in this context. The objective is to find the
    shortest possible route for a salesman, who starts in a hometown and needs to
    visit a list of other cities distributed around the world. In this problem, the
    salesman must visit each city on the list exactly once and finish the journey
    in the hometown. If the list of cities is very short, this combinatorial problem
    is very easy to solve. But as soon as the length of the list increases, the number
    of possible combinations increases exponentially. With 5 cities, for example,
    there is a manageable number of 12 possible routes. But in case of 12 cities,
    the traveling salesman gets in a miserable situation as he needs to consider almost
    20 million possible routes^([^(39)](#fn39)) – poor salesman. But how does a quantum
    annealer of D-Wave Systems generally approach a computational problem?'
  trans: "\n### 2.3.1 商用系统\n\n表 2-2 汇总了部分商用系统，并按量子比特数量自上而下排序。这些系统属于三种根本不同类型的量子计算机，它们决定性地影响了应用范围和使用场景。量子计算机通常分为\
    \ (1) 量子退火机、(2) 量子模拟器和 (3) 通用量子计算机。了解这些差异将有助于您更好地理解媒体上的新闻和新闻稿，并能选择最适合您自身应用或使用场景的最佳量子计算机或云计算供应商。\n\
    \n**表 2-2** 精选的商用且可访问的量子信息处理设备与系统（截至 2020 年 8 月）。IBM 和 Google 的系统仅通过其云计算服务提供。目前尚无公司实现通用量子计算机。\n\
    \n| 公司 | 名称 | 类型 | 量子比特数 | 来源 |\n| --- | --- | --- | --- | --- |\n| D-Wave Systems\
    \ | 5000Q | 退火机 ^a | 5,000 | [38] |\n| D-Wave Systems | 2000Q | 退火机 ^a | 2,000\
    \ | [39] |\n| NIST | 未命名 | 模拟器 ^b | 300 | [40] |\n| IonQ | 未命名 | 计算机 ^c | 79 |\
    \ [41] |\n| Google | Bristlecone | 计算机 ^a | 72 | [42] |\n| IBM | Hummingbird |\
    \ 计算机 ^a | 65 | [43] |\n| Google | Sycamore | 计算机 ^a | 54 | [3] |\n| IBM | Q53\
    \ | 计算机 ^a | 53 | [44] |\n| Intel | Tangle Lake | 计算机 ^a | 49 | [45] |\n| IBM\
    \ | Qiskit | 模拟器 ^b | 30 | [46] |\n| IBM | Raleigh | 计算机 ^a | 28 | [47] |\n| Rigetti\
    \ Computing | 19Q Acorn | 计算机 ^a | 19 | [48] |\n| Alibaba | Aliyun | 计算机 ^a |\
    \ 11 | [49] |\n| Honeywell | Model H1 | 计算机 ^c | 10 | [50] |\n| Honeywell | Model\
    \ H0 | 计算机 ^c | 6 | [36] |\n\n^a 超导电路  \n^b 经典计算硬件  \n^c 线性离子阱微芯片\n\n#### 商用系统：量子退火机\n\
    \n*量子退火机*是我们将详细探讨的第一类量子计算机。它们于 1994 年被从理论上提出[51, 52]，并首先通过超导磁通量子比特得以实现[53]。自 2011\
    \ 年起，加拿大公司 D-Wave Systems 开始提供商用量子退火机。其首个系统名为 `D-Wave One`，配备 128 个量子比特，并在公开发布后不久便出售给了美国国防公司\
    \ Lockheed Martin。据报道，D-Wave 的首位客户后来升级了其系统，并一直使用拥有高达 2,048 个量子比特的 `D-Wave 2000Q`\
    \ 直至今日。最新系统 `D-Wave 5000Q` 于 2019 年发布，并首次售予位于美国新墨西哥州的洛斯阿拉莫斯国家实验室。\n\n![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig10_HTML.png](img/505424_1_En_2_Fig10_HTML.png)\n\
    \n**图 2-10** D-Wave 量子退火机中使用的主要器件设计——为简化起见，系统被缩减为 4 个量子比特。与四个磁通量子比特相关的超导持续电流在矩形环路中流动，每个环路对应一个磁通量子比特。磁通量子比特可以通过\
    \ 16 个耦合器相互作用，这些耦合器允许超导电流发生量子力学隧穿。特殊的初始化端口或触点有助于将相应电流注入器件中。\n\nD-Wave 量子退火机的 QPU\
    \ 由二维超导环阵列构成，这些超导环承载着超导磁通量子比特，形成所谓的*自旋玻璃晶格*[52]，如图 2-10 所示。这些环通过超导*耦合器*相互连接，耦合器促进了量子力学隧穿，并可用于叠加和纠缠相邻的磁通量子比特。QPU\
    \ 还配备了一系列不同的电触点，用于施加偏置电压以调节库珀对的隧穿概率和能量。(38) 据报道，例如 `5000Q`，包含约 40,000 个耦合器和超过\
    \ 1,000,000 个约瑟夫森结，这使其成为有史以来最复杂的超导集成电路之一。\n\n与其他任何计算机一样，量子退火机旨在解决数学问题，例如*旅行商问题*，该问题是优化领域中的一个传奇基准，也是在此背景下被引用最多的例子之一。其目标是为一位置身在故乡、需要拜访分布于世界各地的一系列其他城市的销售员找到最短的可能路线。在这个问题中，销售员必须恰好拜访列表中的每个城市一次，并在故乡结束旅程。如果城市列表非常短，这个组合问题很容易解决。但一旦列表长度增加，可能的组合数量就会呈指数级增长。例如，对于\
    \ 5 个城市，有 12 条可行路线，这是个可控的数字。但对于 12 个城市，旅行商就会陷入困境，因为他需要考虑近 2000 万条可行路线(39) —— 可怜的销售员。那么，D-Wave\
    \ Systems 的量子退火机通常是怎样处理一个计算问题的呢？\n"
- fmt: 'Each computation starts with translating the mathematical problem at hand
    into a two-dimensional geometrical pattern of nodes and edges called *graph* that
    can be accommodated by D-Wave’s custom-built device architecture – the nodes of
    the graph correspond to qubits, the edges to couplers. In case of the traveling
    salesman, the problem is mathematically described in terms of an undirected weighted
    graph, such that the different cities are the graph’s nodes, the paths between
    the cities are the graph’s edges, and a path’s distance corresponds to the edge’s
    weight, that is, an arbitrary number that measures the spatial distance between
    adjacent cities. This graph representation of the problem basically serves as
    the blueprint for wiring up and controlling the qubits on the QPU.^([^(40)](#fn40))


    This process of mapping the mathematical problem to be solved to a two-dimensional
    graph representation of qubits is often not very intuitive, which is why D-Wave
    Systems automated this process by running a supportive software with a graphical
    user interface on a conventional computer. This software allows for an easy input
    of the respective problem – typically given in terms of a mathematical equation,
    such as a cost function that measures the overall travel distance in case of the
    traveling salesman problem – and automatically generates the most appropriate
    graph representation. Once this representation has been found, everything is set
    to start the actual computation or annealing process.


    The annealing procedure is usually carried out in four main steps:


    1. *Qubit initialization*: This step is based on a certain series of microwave
    pulses to initialize the qubit configuration according to the graph of the problem
    as a starting point. The pulses are chosen such that they ideally entangle all
    qubits of the two-dimensional array on the chip with each other. This is particularly
    important since this entanglement enables the qubit configuration to broadly explore
    all possible solutions to the problem at hand.


    2. *Problem initialization*: The second step involves turning on the description
    of the problem encoded in the set of certain qubit and coupling bias voltages.
    For this procedure to be successful, the voltages need to be increased slowly
    so that the qubits do only interact with each other and not with the hosting environment.
    This is particularly important since any interaction with the environment, such
    as the exchange of heat energy, induces decoherence and thus the irreversible
    loss of information.^([^(41)](#fn41)) During this so-called *adiabatic phase transition*,
    the different qubits learn about the computational problem and interact with each
    other by quantum mechanical tunneling through the couplers depending on the particular
    bias voltage set.


    3. *Relaxation*: The qubit and coupling bias voltages are then suddenly switched
    off during this third computational step. As time passes by, the entangled qubit
    network evolves and thereby relaxes into its energetically most favorable configuration,
    the so-called *ground state* of the system. The timely evolution is facilitated
    by quantum fluctuations and tunneling due to the uncertainty principle and typically
    involves spin-flip transitions between adjacent qubits.


    4. *Readout*: The last step is about measuring the ground state of the system.
    This measurement causes the overall wave function to collapse, and we obtain an
    array of superconducting currents flowing in clockwise or anticlockwise direction.
    The currents correspond to an array of zeros and ones according to the association
    rules `|0〉 = |↻〉` and `|1〉 = |↺〉`, respectively. Since its energy was minimized,
    this graph state represents the final and optimal solution to our computational
    problem at hand.


    All of this happens in a fraction of a second and is repeated various times since
    quantum annealers are noisy. The solution that is statistically obtained most
    frequently can then be regarded as the real ground state of the system and the
    best solution to the problem. This final array of zeros and ones is then processed
    by a special software running on the conventional computer and converted into
    an ordered list of cities that solves the particular traveling salesman problem
    at hand.


    Quantum annealers have been applied to a wide range of business problems and demonstrated
    to offer significant runtime benefits among classical supercomputers. It turns
    out that applications mainly fall into two major categories that are important
    to consider when thinking about applying a quantum annealer to a certain problem:


    1. The first one classifies *combinatorial optimization problems*, such as the
    traveling salesman problem described earlier or finding a stock portfolio with
    the highest return. Such problems are generally about finding the best among a
    huge amount of possible solutions or combinations.^([^(42)](#fn42))


    2. *Sampling problems* are the second problem category a quantum annealer is very
    good at. Those problems are about finding a better but not necessarily the best
    solution or combination among possible ones. This is particularly useful for quantum
    machine learning [[55](#505424_1_En_2_Chapter.xhtml#Par251)] since this technology
    usually requires large datasets to train machine learning models successfully
    as we will learn in Chapter [4](#505424_1_En_4_Chapter.xhtml), “Artificial Intelligence.”
    In this context, quantum annealers can be used to convert small into big data
    by generating new data that perfectly resembles reality and can be used to train
    machine learning models. Another example is about materials modeling and finding
    a better aerodynamic shape of an aircraft wing, an application of quantum annealers
    that has been reported by the European aerospace corporation Airbus recently [[56](#505424_1_En_2_Chapter.xhtml#Par252)].


    Quantum annealers were the world’s first commercially available quantum computers,
    and researchers have been paying close attention to this technology right from
    the beginning. While some of them were very excited about this special approach
    to quantum computing, others remained rather skeptical about the long-term potential
    of such machines, which is why they were long considered as the world’s most controversial
    quantum computers [[57](#505424_1_En_2_Chapter.xhtml#Par253)]. This controversy
    mainly arises due to the fact that quantum annealers – in contrast to universal
    quantum computers – do not require quantum logic gates to be implemented. The
    entire computation rather relies on the fundamental property of physical systems
    to evolve into their energetic optimum (the ground state) over time mediated by
    quantum fluctuations and tunneling.


    However, D-Wave Systems did a good job in marketing this technology together with
    its multinational corporate customers by applying it to a wide range of applications.
    They have established quantum annealers as “special-purpose quantum computers”
    successfully over the last couple of years that work best on optimization and
    sampling problems, where they offer great runtime benefits.'
