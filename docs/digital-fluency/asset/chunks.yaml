    \ trillion GDP growth by 2030 [[1](#505424_1_En_4_Chapter.xhtml#Par239)], most\
    \ of which will be in non-Internet sectors, such as manufacturing, energy, agriculture,\
    \ and logistics. But even if its economic and social significance is undisputed,\
