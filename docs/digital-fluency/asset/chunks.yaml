  trans: "  \n# 第 3 章  \n\n本章将围绕比特币背后这项令人着迷的使能技术展开，该技术如今已成为数字化转型的重要支撑技术，因为它为政府开辟了新的机遇，并在公共和私营部门分别创造了全新的商业模式。本章将介绍区块链技术及其核心原则与概念。我们将学习区块链技术及其分布式网络架构如何在不可信环境中实现涉及货币或其他可交易资产的加密安全交易与转移。在此背景下，我们将探索区块链这一基础且不可篡改的数据结构，以更深入地理解比特币交易的生命周期。此外，我们还将讨论该数据结构的巧妙扩展——通过智能合约实现业务流程自动化。随后，我们将探讨当前最热门的商业应用案例，并展望区块链技术的未来前景及其对工业、政府和社会的影响。本章将让你深刻理解区块链技术的工作原理、可适用的应用场景，以及哪些场景并不适合这项数字技术。在本章结尾（与其他章节一样），我将为你提供一个易于使用的区块链技术框架，帮助你判断该技术能否应用于你自己的用例或商业构想。\
    \  \n\n## 3.1 区块链场景设定  \n\n区块链技术的兴起源于一个持久的谜团。2008 年——在全球金融危机最严峻的时期——中本聪（Satoshi\
    \ Nakamoto）向一个密码学邮件列表⁵²发送了一封主题为“比特币 P2P 电子现金论文”的电子邮件，发布了一篇革命性论文。据称，他对全球银行体系深感失望，在邮件中说明他“正在开发一种完全点对点、无需可信第三方的全新电子现金系统”，并将相应的白皮书上传至[`www.bitcoin.org`](http://www.bitcoin.org)\
    \ [6]。这篇论文很快引起了广泛关注，随后的几个月和几年里，人们试图了解这位日文名作者的真实身份。然而，迄今为止这些尝试均未成功，比特币及其底层区块链技术的创造者身份至今仍是个谜。\
    \  \n\n在这篇开创性论文发表约两个月后，2009 年 1 月 3 日，中本聪创建了第一个比特币，比特币网络正式诞生⁵³。九天后，中本聪与美国软件开发者哈尔·芬尼（Hal\
    \ Finney）进行了第一笔比特币交易。2009 年 10 月 5 日，比特币（货币代码：BTC）与美元的汇率首次确立，仅为 1 BTC = 0.00076\
    \ 美元。在 2017 年底比特币热潮的顶峰时期，汇率飙升超过 260,000%，达到近 1 BTC = 20,000 美元——这确实是惊人的增长和投机热潮。但在深入探讨这一革命性技术之前，回顾货币与交易在历史上所扮演的关键角色将颇具启发性。\
    \  \n\n### 3.1.1 交易与货币在历史上的角色  \n\n社会中交易和商品交换的需求自然产生，主要源于地域和地理差异。例如，沿海地区鱼类资源丰富，而内陆地区则稀缺；相反，内陆拥有广阔的谷物种植田地，而沿海地区则相对匮乏。沿海与内陆之间的鱼与谷物交换只是商品交换的一个例子——人们总是渴望拥有自己所没有的东西。一般而言，任何剩余产品历来都是理想的交易物，这也是为什么在青铜时代早期就已经出现了*物物交换*。当时人们开始使用谷物、兽皮、干鱼、牛、盐和其他天然物品进行日常交易。这种特殊的“货币”如今被称为*原始货币*，因为它通常具有即时价值，可直接用于食用或其他用途，如表\
    \ 3-1 所示。希腊哲学家和博学家亚里士多德在公元前 350 年的名著《政治学》中就已经指出，物品始终具有两种用途：一是物品被设计和制造出来的原本用途，二是作为出售或交换的物品[7]。值得注意的是，这种原始货币的精炼版本甚至延续到了罗马帝国时期，帝国有时用盐——一种重要的食物防腐剂——作为军饷支付士兵。这种支付方式在拉丁语中被称为*salarius*，意为“属于盐的”，并后来演变为现代英语中的“salary”（薪水）。\
    \  \n\n除了具有即时价值的天然物品，人们偶尔也开始使用其他稀有物品进行交易，例如贝壳。这些小型海洋贝壳很快变得非常流行，因为它们非常坚硬、便于携带，而且最重要的是——不易腐烂。出于同样的原因，人们开始使用金属，包括金、银和铜，而非其他材料。金属有两个主要优势：(1)\
    \ 由于稀有性而具有内在价值；(2) 易于铸造成基本物品，如箭头和其他用于狩猎和自卫的工具。公元前 800 年，生活在今天土耳其地区的吕底亚人推出了原始的金属*硬币货币*，最初仅用于礼物、奖励和祭祀供品。但这一理念在地中海地区迅速传播，人们也开始将这些硬币用于交易，而希腊人则是第一个大规模使用硬币进行日常交易的国家。包括雅典和科林斯在内的古希腊城邦很快开始铸造自己的硬币，例如德拉克马。硬币的制作相对困难，但非常便于日常交易。然而，在中世纪鼎盛时期，由于重量和体积问题，硬币越来越限制了其在长途大规模商品交易中的使用。这就是为什么中世纪意大利中部著名的贸易城市——包括热那亚、威尼斯和佛罗伦萨——铸造了装饰精美的金币，例如弗罗林金币，其价值更高，更适合长途贸易。任何硬币的最终价值衡量标准始终是其贵金属含量，而这由发行主权方（如政府或前述贸易城市）定义。\
    \  \n\n**表 3-1** 历史上的货币类型"
- fmt: '| Type | Appearance | Advantages (+) and Disadvantages (−) |

    | --- | --- | --- |

    | Primitive money | Pre-Christian | + Itself immediately usable– Difficult to
    ascertain the value, not very handy, partly perishable |

    | Noble metals | Bronze Age | + Nonperishable, can be casted into basic tools,
    stable value due to rarity– Difficult to form and cast, not very handy |

    | Coin money | 8th century | + Very handy, nonperishable, stable value due to
    rarity of raw material– Bulky in large volumes, subject to robbery |

    | Paper money | 11th century | + Very handy, easily scalable by printing– No intrinsic
    value, subject to inflation, subject to robbery and fraud |

    | Book money | 14th century | + Very handy, easy and safe storage, simple monetary
    transactions– Only virtually existent, no intrinsic value, not backed by commodity,
    subject to fraud |

    | Fiat money | 20th century | + Simple monetary transactions, safe transaction
    due to cryptography, monetary policy being defined by the central bank and its
    “official legal currency”– Only virtually existent, no intrinsic value, and not
    backed by commodity |

    | Cryptocurrencies | 21st century | + Very simple monetary transactions, very
    safe transaction due to cryptography, cost efficiency facilitating micropayments,
    self-regulated policy by open network, transfer without intermediary– No control
    of inflation due to absence of regulating authority, only virtually existent,
    no intrinsic value, not backed by commodity |


    It is quite interesting that people only mined about 163,000 tons of gold over
    the millennia so far, which equals just a cube with a side length of about 20 m –
    one of the main reasons why gold is still considered to be a recession-proof currency
    as we saw in the financial crisis in 2008 and the worldwide COVID-19 pandemic
    in 2020/21 last.


    As more and more people started to use coins for trading, the supply of coin money
    was increasingly short. Due to this shortage, sellers started to grant buyers
    a delay in payment, which was usually documented by a bill of exchange. Starting
    in the 11th century in China and shortly after that in Europe, this bill was increasingly
    accepted as a form of payment itself, and the idea of *paper money* was born.
    Paper money was very handy and easy to proliferate in case of a shortage. But
    since it was in fact the first type of money that did not have any intrinsic value,
    paper money was subject to intense inflation. This is why it was widely displaced
    by *book money* in the 14th century, a type of immaterial money that only exists
    as numbers in a physical book or account. The money we most commonly use for our
    transactions today is referred to as *fiat money* , a government-issued currency
    that is not backed by commodities, such as gold and other materials with an intrinsic
    value. Instead, the value of fiat money is controlled by the *central bank* of
    the respective country, a governmental institution that issues the country’s official
    currency and controls its value and inflation by increasing or limiting its supply.


    ## 3.1.2 Basic Functions of Money in Society


    This short historic excursus revealed that the main purpose of money – on a more
    abstract level – is to enable *trustworthy transactions* of valuable assets between
    two parties independently of whether they trust each other or not. In other words,
    money generally performs the following four critical functions in society:


    1.  *Means of value transfer*: paying for the exchange of commodities and labor

    2.  *Unit of account*: measuring the value of commodities and labor

    3.  *Stores of value*: saving money for future expenses (so-called “reserves”)

    4.  *Source of funding*: investing money in economic and business development


    The Indian innovation strategist and blockchain advocate Kariappa Bheemaiah refers
    to money as “physical representation of trust within a society” in his popular
    book entitled *The Blockchain Alternative: Rethinking Macroeconomic Policy and
    Economic Theory* [[8](#505424_1_En_3_Chapter.xhtml#Par210)]. We will see in the
    following that exactly this proliferation of trust in untrustworthy environments
    enables value transfer – where “value” could be anything ranging from, for example,
    intellectual property or ownership rights to Bitcoins – and is thus at the heart
    of blockchain technology. So let us dive deeper into blockchain, its key concepts,
    and applications.


    ## 3.2 Blockchain Fundamentals


    Blockchain technology and digital currencies are two of the most important applications
    of something called *distributed ledger technology* . A distributed ledger is
    an online database or register whose information is spread across a large network
    of computers and other electronic devices. Ledgers, as a form of bookkeeping,
    have been used in ancient times already to record and document transactions involving
    money or other physical assets. It is a permanent summary that lists individual
    transactions by date and documents the particular value, such as the amount of
    money, that has been transferred from one party to another. While the central
    idea and purpose of ledgers remained the same, their physical implementation evolved
    over time from clay tablets in the Bronze Age^([^(54)](#fn54)) over paper-based
    registers in the Middle Age to electronic records in the Digital Age.


    Most of the ledgers we are familiar with, such as the land register, rely on a
    central authority. In this case, the land registry office operates a central computer
    or *server* , which makes the information kept in the register accessible to all
    other users or *clients* of the network including regional land registries and
    other associated governmental institutions. The land register is one example for
    a so-called *centralized ledger* , in which all participants are arranged in a
    *client-server network* with the server acting as a single controlling authority
    that operates and controls the entire network similar to a governmental sovereign
    issuing money. All users of the network are thus dependent on a single main server
    as shown in Figure [3-1](#505424_1_En_3_Chapter.xhtml#Fig1) (a). Centralized ledgers
    are the most common networks for delivering online services up to now, which is
    why they are used by various organizations including Amazon and eBay. If not secured
    by encryption algorithms and backup servers, centralized ledgers are generally
    very susceptible for cyberattacks as a hacker does only need to attack and change
    the ledger file kept by the central server in order to change an ownership record
    or alter an account’s balance, for instance.


    ![../images/505424_1_En_3_Chapter/505424_1_En_3_Fig1_HTML.jpg](images/505424_1_En_3_Chapter/505424_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    A network of different computers can generally be arranged in three different
    configurations: (a) A centralized network has a center node (black circle with
    computer icon) that is at the center of the network and connected (dotted lines)
    to all other nodes (gray circles). (b) A decentralized network has various center
    nodes, each of which is connected to some other nodes. (c) In a distributed network,
    each node has equal rights and is connected to all or a selection of other nodes.
    This configuration is used for the implementation of a blockchain'
