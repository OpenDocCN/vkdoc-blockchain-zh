- fmt: "## 1.5 Key Points\n\n-   Digitization is about encoding information by using\
    \ binary numbers, that is, series of zeros and ones. The binary code forms the\
    \ basis for classical information processing by computers, smartphones, and other\
    \ digital devices.\n-   Classical information processing relies on electrical\
    \ switching circuits that are formed by transistors and built into microchips.\n\
    -   Digitalization builds on digitization and aims to save money by using and\
    \ analyzing data for optimizing internal processes and making better products\
    \ and services.\n-   Digital transformation builds on digitalization and allows\
    \ for earning money by leveraging digital support technologies, such as quantum\
    \ computing, blockchain technology, and artificial intelligence. It also involves\
    \ the (1) optimizations of operations, (2) transformation of products and services,\
    \ (3) empowerment of employees, and the (4) engagement with customers.\n-   Digital\
    \ technology facilitates the (1) processing, (2) communication, and (3) storage\
    \ of digital information. Each of those three dimensions has been subject to exponential\
    \ technological improvements over the last couple of years, which is described\
    \ empirically by `Moore’s`, `Butter’s`, and `Kryder’s` law, respectively.\n- \
    \  The major driving forces for digital transformation are increasing complexity,\
    \ agility and flexibility, cybersecurity, efficiency, automation, sustainability,\
    \ connectivity, and compliance.\n-   The Internet of things refers to a network\
    \ of connected objects that exchange and analyze data to automate processes by\
    \ executing appropriate actions autonomously. This approach is particularly important\
    \ for optimizing production and automating manufacturing.\n-   Big data analysis\
    \ aims to derive valuable insights from a large amount of digital data. Big data\
    \ is characterized by its (1) volume or size, (2) the velocity or speed at which\
    \ it is created, and the (3) variety or scope of data, such as text, audio, and\
    \ video files. It is employed by numerous organizations today to enhance products\
    \ and services as well as associated processes and revenue streams.\n-   Disruption\
    \ has always been shaping industry and society – it causes incumbent companies\
    \ to fail and new startup ventures to appear. According to disruptive strategy\
    \ theory, startup companies usually fill the gap that naturally forms between\
    \ the pace of technological progress and the performance that customers can utilize\
    \ or absorb. Disruptive strategy theory differentiates between the following:\n\
    \    1.  Sustaining innovations usually target customers at the high-profitability\
    \ end of a market by making existing products and services better.\n    2.  Disruptive\
    \ innovations themselves fall into two categories:\n        1.  Low-end disruptive\
    \ innovations refer to “good enough” products and services that typically target\
    \ overserved customers at the low-profitability end of a market. They usually\
    \ gain market share from existing products and services and are thus a valuable\
    \ tool (and competitive strategy) for new market entrants to create new growth\
    \ businesses.\n        2.  New-market disruptive innovations refer to products\
    \ and services that offer lower performance for existing markets but higher performance\
    \ for customers, who did not use the product or service before. New-market disruptive\
    \ innovations typically broaden the adoption by increasing affordability and accessibility.\n\
    -   Companies that succeed in exploiting an existing business by sustaining innovations\
    \ while exploring new revenue streams by leveraging disruptive innovations at\
    \ the same time are least susceptible for digital disruption and failure. This\
    \ is why the digital transformation of organizations is more important today than\
    \ ever.\n\n## 1.6 Further Reading\n\nHere are some recommendations for further\
    \ reading if you like to dive deeper into selected topics of this chapter:\n\n\
    -   Iansiti, M. and Lakhani, K. R.: Competing in the Age of AI: Strategy and Leadership\
    \ when Algorithms and Networks run the World. Harvard Business Review Press (2020).\n\
    -   Rogers, D. L.: Digital Transformation Playbook: Rethink Your Business for\
    \ the Digital Age. Columbia Business School Publishing (2016).\n-   Siebel, T.:\
    \ Digital Transformation. Survive and Thrive in an Era of Mass Extinction. RosettaBooks\
    \ (2019).\n-   Galloway, S.: The Four: The Hidden DNA of Amazon, Apple, Facebook,\
    \ and Google. Portfolio (2018).\n-   Bezos, J.: Invent & Wander. Harvard Business\
    \ Review Press (2021).\n-   Hastings, R. and Meyer, E.: No Rules Rules. WH Allen\
    \ (2020).\n-   Christensen, C.: The Innovator’s Dilemma: When New Technologies\
    \ Cause Great Firms to Fail. Harvard Business Review Press (2016).\n-   O’Reilly\
    \ III, C. A. and Tushman, M. L.: Lead and Disrupt: How to Solve the Innovator’s\
    \ Dilemma. Stanford Business Books (2016).\n-   Geroski, P.: The Evolution of\
    \ New Markets. Oxford University Press (2003)."
