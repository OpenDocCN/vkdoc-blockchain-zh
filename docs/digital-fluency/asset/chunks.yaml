  trans: '

    `作为监督的管理`，尤其是对执行例行任务的员工的监督，终于结束了。在 AI 驱动的运营模式下，管理者是设计师，他们塑造、改进并（希望）控制着那些感知客户需求并通过交付价值做出响应的数字系统。管理者是*创新者*，因为他们构想这些数字系统将如何随时间演变。管理者是*整合者*，因为他们致力于连接不同的数字系统，并识别公司运营模式与其所服务客户之间的新联系。管理者也是*守护者*，因为他们努力维护其所控制的数字系统的质量、可靠性、安全性和责任感
    [29]。


    埃里克·施密特、乔纳森·罗森伯格和艾伦·伊格尔进一步指出：


    每位管理者的首要工作是帮助员工在工作中更有效率，并帮助他们成长和发展。[……]管理者通过支持、尊重和信任来创造这种环境。支持意味着为员工提供成功所需的工具、信息、培训和指导。这意味着要持续努力地发展员工的技能。优秀的管理者帮助员工卓越表现和成长。尊重意味着理解员工独特的职业目标，并对其生活选择保持敏感。这意味着以符合公司需要的方式，帮助员工实现这些职业目标。信任意味着放手让员工完成工作并做出决策。这意味着相信员工想把事情做好，并相信他们能做到
    [46]。


    ## 塑造组织与结构


    一个组织的结构反映了其产品和服务架构 [47]。这一基于经验的观察被称为*镜像假说*或*康威定律*，以美国计算机科学家梅尔文·康威的名字命名，他于 1967
    年提出这一观点：“设计系统（广义上）的组织，其产生的设计方案结构，必然是组织沟通结构的复制。” [48] 换言之，相互关联的任务，如复杂产品和服务的开发，最好由跨职能且高度整合的团队来执行，这些团队专注于开发端到端的客户特性，而不仅仅是整体产品或服务的单一功能或组件。这就是为什么数字化运营模式需要敏捷且高度互联的组织结构，而没有任何孤立的信息孤岛。因此，重塑组织结构以建立新的协作方式是数字化转型的另一个关键维度。


    ### 塑造组织与结构：组建敏捷项目团队


    敏捷创新团队规模很小。杰夫·贝索斯有一个著名的观点：一个不能被两份披萨喂饱（人数超过五到十人）的团队，不可避免地会因沟通和项目管理需求过高而导致效率低下，这被称为*双披萨规则*
    [49]。此外，敏捷项目团队依赖跨学科性，由拥有不同才能、紧密协作的成员组成，并涵盖完成指定项目所需的所有数字和物理技能。他们培养主人翁意识和自主性，并遵循探索式的创新方法，使其能够利用涌现式策略在不同的解决方案之间灵活切换——在数字试点项目的早期阶段，灵活快速地响应变化比坚持计划更重要。敏捷团队通常重视创造性工作环境和较少的层级官僚体制，并专注于创建可工作的原型而非繁多的文档。他们的方法以客户为中心，协作比固定的规范更重要。


    以敏捷团队的形式组织，试点项目是探索和试验新协作方式（包括敏捷方法论及其他方法）的理想选择。从组织角度来看，将此类团队整合到现有组织和层级结构中有三种主要方式：


    1.  *去中心化模式*：数字化举措被整合到所有业务部门中，并或多或少独立执行。每个业务部门都有自己的敏捷团队和试点项目。


    2.  *中心化模式*：数字化举措由组织内的一个独立实体统一协调，该实体可能由首席数字官领导。这个卓越中心汇集了来自不同业务部门的产品经理、数据科学家、业务分析师以及硬件和软件开发者，并围绕不同的试点项目协调整个组织。一个例子是德国汽车供应商采埃孚（ZF
    Friedrichshafen），它成功地建立了一个中心化的分析实验室 [50]。


    3.  *孵化器模式*：数字化举措与组织的核心业务并行运行，有时甚至与其他业务单元竞争。一个数字孵化器^（147）作为组织外部的初创型企业，利用数字技术创造创新产品和服务。其创业努力提供了宝贵的见解和经验，可作为组织其他部门未来创新和试点项目的蓝图。


    根据优先事项和特定的起点，许多组织通常选择运行混合模式，同时实施数字卓越中心和孵化器，以支持其数字化议程。

    '
- fmt: '### 5.6.2 Shape the Organization and Structure: Establish a Two-Speed IT


    Running the different initiatives and pilots of your digital agenda requires an
    agile IT department and infrastructure that meets the expectations and demands
    of your agile project teams. This is particularly important since established
    IT supports usually slow down the innovation cycles of agile projects. But how
    should an established organization structure its IT department to run a legacy
    business while supporting digital pilot projects at the same time?


    It turns out that the best organizational structure to do this is a *two-speed
    IT*, an organizational approach that was proposed by the renowned management consultancy
    McKinsey & Company in 2014 [[51](#505424_1_En_5_Chapter.xhtml#Par190)]. A two-speed
    IT is based on two coexisting IT teams with different focus areas: a (1) slow-speed
    back end and (2) fast-speed front end. The slow-speed back end or *industrial-speed
    team* delivers the IT products and services required to run the legacy business
    by focusing on mature operations and business processes, such as logistics operations,
    payment, and banking services. Their services are designed for stability and high-quality
    data management. The fast-speed front end or *digital-speed team*, on the other
    hand, exclusively supports digital pilot projects and provides the resources and
    support for experimenting with novel digital technologies that are not employed
    by the legacy business yet as shown in Table [5-2](#505424_1_En_5_Chapter.xhtml#Tab2)
    for better comparison. The industrial-speed team is basically working like traditional
    IT departments, while the digital-speed team works in an agile manner to enable
    fast iteration and testing based on customer feedback.


    The two-speed IT is a temporary organizational structure for digital transformation
    only. An organization should ultimately drive the convergence of both teams and
    establish a unified IT department that operates at the speed of the digital-speed
    team and is able to deliver hardware and software solutions flexibly on demand
    and in accord with the established digital operating model. This is only possible
    by fostering and repeatedly reinforcing an open innovation culture, which we will
    discuss in more detail in the next section.


    Table 5-2


    Comparison of the two coexisting IT teams in the two-speed IT operating model


    |  | Slow-Speed Back End | Fast-Speed Front End |

    | --- | --- | --- |

    | Focus | Legacy business – supports and enables mature core operations, such
    as logistics and production | Pilot projects – supports agile software development
    and drives experimenting with digital technologies |

    | Approach | Waterfall approach where software development flows sequentially
    from conception to testing with separate teams taking over in each phase | Experimental
    test-and-learn approach based on agile software development methodologies including
    scrum, rapid prototyping, and design thinking |

    | Team | Specialized experts with a narrow and clear task – this type of work
    is generally siloed | Highly interdisciplinary and mixed variety of people with
    different backgrounds in, for example, business, customer research, software and
    application development, etc. |


    ### 5.7 Establish an Open Innovation Culture


    Establishing an agile and open business culture is crucial for completing a digital
    transformation successfully. In this context, the term *business culture* refers
    to the collective capability of an organization to create value by innovation
    for its customers and employees, which is also why it is sometimes referred to
    as *innovation culture* in this particular context. Inspired by the MIT sociologist
    Edgar Schein – one of the world’s leading scholars in organizational culture –
    Clayton Christensen defines this integral part of any organization as follows:
    “Culture is a way of working together toward common goals that have been followed
    so frequently and so successfully that people don’t even think about trying to
    do things another way. If a culture has formed, people will autonomously do what
    they need to do to be successful” [[52](#505424_1_En_5_Chapter.xhtml#Par191)].
    In other words, culture is a unique combination of internal rules and workflows
    that allow employees to complete certain tasks that recur in their daily work
    frequently. The more often they solve the task successfully, the more instinctive
    the workflow becomes. A business culture is thus not created overnight but rather
    formed through repetition. In order to establish a new business culture successfully,
    it is consequently not enough to communicate what the culture is. Instead, the
    management of an organization – as a role model for its employees – needs to adhere
    to the culture and constantly reinforce it by making decisions and prioritizing
    projects that are in alignment with it. This is an important point to keep in
    mind when transforming a traditional and establishing a new innovation culture.


    #### 5.7.1 Establish an Open Innovation Culture: Adopt Agile at Scale


    While a traditional business culture is best suited for well-established business
    processes and the exploitation of existing revenue streams, digital innovation
    cultures are best in exploring new processes and creating new revenue streams
    based on digital technology. An open innovation culture fosters a much more agile,
    collaborative, and integrated approach to innovation with a strong customer- and
    product-centric view. Instead of relying on sequential, inflexible, and often
    slow product development processes, a digital culture cultivates the emergence
    of new ideas and empowers employees to deliver results faster by employing a less
    linear and more iterative approach to product development based on customer feedback.
    Using agile methodologies across the company – which is sometimes referred to
    as *agile at scale* [[57](#505424_1_En_5_Chapter.xhtml#Par196)] – is thus not
    a goal in itself but rather a means to an end.


    In addition, an open innovation culture motivates employees by giving them freedom
    and space to explore novel ideas in accord with Frederick Herzberg’s famous motivation
    theory^([^(148)](#fn148)) [[53](#505424_1_En_5_Chapter.xhtml#Par192)]. Eric Schmidt,
    Jonathan Rosenberg, and Alan Eagle once noted in this context:


    > You need to [...] go beyond “traditional notion of managing [employees] that
    focuses on controlling, supervising, evaluating and rewarding/punishing” to create
    a climate of communication, respect, feedback, and trust. [...] The path to success
    in a fast-moving, highly competitive, technology-driven business world is to form
    high-performing teams and give them the resources and freedom to do great things
    [[46](#505424_1_En_5_Chapter.xhtml#Par185)] .^([^(149)](#fn149))


    ![../images/505424_1_En_5_Chapter/505424_1_En_5_Fig6_HTML.jpg](images/505424_1_En_5_Chapter/505424_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Five steps of the iterative design thinking process (gray circles)'
