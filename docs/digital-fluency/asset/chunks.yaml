  trans: '

    ### 当前商业应用：供应链管理与物流


    除了交易平台和支付服务之外，区块链技术的另一个非常流行的商业应用是`供应链管理` [37]。在贸易日益全球化的推动下，供应链在过去几年中变得非常复杂，并涉及位于不同国家的众多利益相关者。除了出口商和进口商，国际供应链通常还涉及托运人和货主、银行和保险公司、货运代理、多式联运运营商、海运和空运承运人、港口和码头运营商以及海关当局等。为了推进其特定服务，每一方都需要并签发某些文件，这些文件需要发送给供应链中的特定方，以成功通过特定的运输节点，例如图
    3-6 所示。


    例如，一辆电动汽车包含大约 6,000 个不同的零件，由数百家国际供应商和分包商制造。每个供应商都需要提供某些文件，例如用于会计核算和质量控制的文件，以确保整个供应链和制造过程的透明度和可追溯性——鉴于全球关于二氧化碳和其他对环境有害排放物的可持续发展目标，这一点变得越来越重要。区块链技术可以帮助管理、简化和优化这种复杂的全球网络。这对于全球运营的企业尤其重要，例如汽车制造商及其供应商，他们需要找到经济高效且实用的解决方案来有效管理日益复杂的供应链，同时遵守监管可追溯性要求。


    区块链驱动的供应链管理系统最著名的例子之一是开放的数字航运平台“TradeLens”，该平台由 IBM 和全球最大的集装箱航运公司 A. P. 穆勒-马士基集团
    [38] 共同实施。这个协作平台连接了全球范围内参与集装箱运输的所有相关利益相关者。整个供应链上的定制权限模型规定了谁可以添加、查看和更新特定信息，例如装箱单、提单、发票以及运输过程每个阶段不同利益相关者所需的其他证书。TradeLens
    提供各种工具，用于资产规划和利用、海关清关经纪、日程安排和风险评估等，并收集用于贸易融资和保险的实时信息。由于其更高的透明度，TradeLens 区块链允许不同的利益相关者端到端地优化和简化他们的供应链，摆脱基于纸张的传统工作流程。此外，它还允许更高的可预测性，从而可以显著降低安全库存和资产。据报道，该平台目前每周处理约一千万个事件和超过
    100,000 份文档 [38]。这种方法潜力巨大，因为任何时候都有超过 1500 万个集装箱在国际水域中运输或等待清关。食品行业也采用了类似的方法，以提高货物在整个供应链中的可追溯性，以便在出现健康或安全问题时，不同的利益相关者能够迅速做出反应
    [39]。^(⁷⁷)


    ![../images/505424_1_En_3_Chapter/505424_1_En_3_Fig6_HTML.png](img/505424_1_En_3_Fig6_HTML.png)


    图 3-6


    典型的国际供应链，展示了最重要的利益相关者（顶行，方块）以及在流程中签发和交换的选定文件（底行，圆圈）。请注意，顶行中从左到右的水平箭头不表示货物的物理流动，而是表示运输过程的方向


    德国汽车制造商宝马最近宣布了其基于区块链技术的“PartChain”供应链管理系统，该系统源于一个成功的购买前大灯的数字试点项目 [41]。PartChain
    扩展了这种方法，并将其扩展到更多的国际供应商，以确保关键和安全相关的汽车零部件及原材料的无缝可追溯性——从矿山到冶炼厂的全过程。宝马的愿景是“创建一个开放平台，允许供应链中的数据在整个行业内安全、匿名地交换和共享”
    [42]。由于通用标准和控制模型对于此类平台的成功推广至关重要，宝马还于 2018 年共同创立了跨行业倡议 MOBI，即移动出行开放区块链倡议，该倡议汇集了全球
    120 家领先的汽车、移动出行和技术公司。^(⁷⁸)


    ### 当前商业应用：消费品防伪


    区块链技术的另一个非常有趣的应用是密码学溯源平台，代号为“Aura”，目前由法国奢侈品牌集团 LVMH 酩悦·轩尼诗-路易·威登与微软 Azure 以及美国区块链设计工作室
    ConsenSys [43] 联合开发。据称，Aura 将基于以太坊区块链提供强大的产品跟踪和追溯工具。这些工具允许消费者通过访问产品从原材料到最终销售点（包括二手市场）的端到端历史记录来验证其产品的真实性。Aura
    旨在涵盖价值链中的所有专业参与者，包括原材料矿商、制造商和分销商、金匠以及其他高度专业化的服务提供商。通过提供防欺诈的真实性证明，Aura 致力于有效且有针对性地打击近来在二手市场上日益增多的假冒伪劣产品的大规模生产。在该项目的第二阶段，该联盟旨在探索保护创意知识产权以及适用于奢侈品行业的其他应用。


    ### 当前商业应用：能源商品平台


    区块链技术在能源领域也有有趣的应用，这些应用大多与支付服务相关。例如，德国科技集团西门子和英荷石油天然气公司壳牌都投资了美国初创公司 LO[3] Energy。LO[3]
    与当地公用事业公司和零售商合作，提供了一个名为“Pando”的基于区块链的社区能源平台。这个本地能源市场汇集了风能、太阳能等本地分布式能源资源，从而使客户能够买卖能源，同时自动在社区层面优化电网的利用。^(⁷⁹)

    '
- fmt: '#### Current Business Applications: Governmental Services


    During my research for this book, I also came across another very interesting
    collaboration between the Chinese conglomerate Tencent, the China Academy of Information
    and Communications Technology, and the Shenzhen State Taxation Bureau that jointly
    explore applications of blockchain technology for taxation [[44](#505424_1_En_3_Chapter.xhtml#Par245)].
    This collaboration seeks to create and establish a blockchain-based invoice standard
    that allows for the implementation of automated taxation or *e-taxation* systems
    that simplify auditing activities, reduce tax avoidance, and avoid double taxation.^([^(80)](#fn80))
    The underlying standard is created as part of an umbrella project named "General
    Framework of DLT-Based Invoices," which is being supported by various other countries
    including the United Kingdom, Switzerland, and Sweden. This is just one very interesting
    example that illustrates how blockchain technology can be used to automate traditional
    and formerly paper-based governmental processes and services.


    #### Current Business Applications: Blockchain Consortia


    Since most blockchain applications in industry are collaborative approaches focused
    on the formation of synergetic networks, various organizations have begun to collaborate
