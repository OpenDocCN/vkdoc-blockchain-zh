  trans: '

    ### 3. *成本*：与自建内部数字能力相比，云计算服务还能通过减少硬件和软件的初始投资，让您受益于巨大的规模经济。在某些条件下，它还可能降低硬件和软件基础设施的总拥有成本。这就是为什么云计算对于没有足够财力和人力资源来维护自有数据中心的较小公司尤其有利。


    大多数云计算供应商提供精心设计的网页界面，以便轻松配置 IT 基础设施，并针对特定用途或业务案例快速定制工具。然而，开发更高级的软件工具和应用程序，需要对数据科学中一些最常见且主要是开源的编程语言有深入了解，例如`Python`^(¹³⁹)和`R`。为了方便，编程语言中的不同命令通常被分组到特定的包和库中。表
    5-1 展示了可用于在您所在组织内部实施本书介绍的三种数字技术的最重要包，供您参考。


    ## 5.3 数字化核心


    所选的技术栈提供了对组织*核心*进行数字化转型的基础技术。根据美国商业战略家兼顾问杰弗里·摩尔提出的“情境 vs. 核心”模型^(¹⁴⁰)，核心是创造竞争优势、市场差异化，并最终赢得和留住客户的部分。情境则包括财务、销售和营销等其他一切。在其著作《与达尔文打交道》[24]中，杰弗里·摩尔以美国高尔夫冠军泰格·伍兹为例阐释了这一概念。泰格·伍兹的核心业务是打高尔夫，而他的情境业务是营销。虽然营销能赚钱，但没有高尔夫（核心），就没有营销（情境）。


    数字化转型的一个方面，是利用适当的技术栈实现组织核心的数字化。对于现有组织而言，从技术角度来看，这可能是最具挑战性的转型步骤，因为它需要重新构建包括硬件和软件在内的整个
    IT 基础设施。现有组织通常使用大量随时间演变并满足不同业务部门（如财务、研发、生产和人力资源）特定需求的 IT 和遗留系统。由于这些业务部门之间通常只是松散连接，大型企业的整体
    IT 基础设施往往呈现出孤立且结构不佳的数据架构。


    **表 5-1** 用于数据科学、量子计算、区块链技术和人工智能的最重要 Python 包和库


    | 数字技术 | 库网站 | 包描述 |

    | --- | --- | --- |

    | 通用数据科学 | [`www.numpy.org/`](http://www.numpy.org/) | `NumPy` 是一个用于大数据分析和科学计算的标准包，允许定义复杂的数字数组
    |

    | | [`www.pandas.pydata.org/`](http://www.pandas.pydata.org/) | `Pandas`，即“Python
    数据分析库”，为大数据分析和操作提供了众多工具 |

    | | [`www.matplotlib.org/`](http://www.matplotlib.org/) | `Matplotlib` 是一个用于绘图和数据可视化的综合库，常与
    NumPy 和 Pandas 结合使用 |

    | 量子计算 | [`www.qutip.org/tutorials.html/`](http://www.qutip.org/tutorials.html/)
    | `QuTip` 是一个用于模拟开放量子系统动力学的开源量子工具箱 |

    | | [`www.qiskit.org/`](http://www.qiskit.org/) | `Qiskit` 是一个用于实现研究、教育和商业领域量子计算软件的开源库
    |

    | | [`www.tensorflow.org/quantum/`](http://www.tensorflow.org/quantum/) | `TensorFlow
    Quantum` 是谷歌研究团队于 2020 年发布的最新库之一，支持量子机器学习算法的快速原型开发 |

    | 区块链技术 | [`www.pypi.org/search/?q=blockchain/`](http://www.pypi.org/search/%253Fq%253Dblockchain/)
    | `PyPi blockchain` 提供了用于实现区块链或加密货币的各种工具 |

    | 人工智能 | [`www.tensorflow.org/`](http://www.tensorflow.org/) | `TensorFlow` 由谷歌大脑团队于
    2015 年为经验丰富的专家开发，支持机器学习算法（包括人工神经网络）的轻松实现 |

    | | [`www.pytorch.org/`](http://www.pytorch.org/) | `PyTorch` 是一个开源机器学习库，由 Facebook
    于 2016 年首次发布 |

    | | [`www.keras.io/`](http://www.keras.io/) | `Keras` 由微软于 2015 年作为面向初学者的开源库发布，可用于构建，特别是卷积神经网络等模型
    |

