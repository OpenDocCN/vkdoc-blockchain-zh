- fmt: '### 4.4.3 Healthcare


    Artificial intelligence has also found its way into the healthcare industry in
    the last few years, where early adopters and startups have begun to apply different
    machine learning algorithms to a bunch of medical problems. Most of them fall
    into the category of image recognition and feature detection in medical scans
    that aim to assist doctors with diagnosing certain diseases [[103](#505424_1_En_4_Chapter.xhtml#Par343)].


    One example is the American “Alzheimer Disease Neuroimaging Initiative” or ADNI
    at the UCSF Department of Radiology and Biomedical Imaging in San Francisco. Although
    no cure exists for Alzheimer’s disease up to now, various drugs became available
    recently that can help to stem the disease’s progression and to improve the patient’s
    medical condition. For this purpose, the drugs need to be prescribed as early
    as possible, which is why it is important to diagnose Alzheimer in its early stages.
    This is where the image recognition algorithm of ADNI comes into play. It assists
    doctors to diagnose this incurable disease based on the analysis of “medical big
    data” that has been recorded by positron emission tomography, the technology of
    choice for analyzing diseases like Alzheimer’s in the soft human tissue. The ADNI
    model can diagnose Alzheimer’s disease up to six years before a clinical diagnosis
    with an accuracy of more than 92%. Jae Ho Sohn, one of ADNI’s computer scientists,
    describes this use case as follows: This is an ideal application of deep learning
    because it is particularly strong at finding very subtle but diffuse processes.
    Human radiologists are really strong at identifying tiny focal finding like a
    brain tumor, but we struggle at detecting more slow, global changes. Given the
    strength of deep learning in this type of application, especially compared to
    humans, it seemed like a natural application [[109](#505424_1_En_4_Chapter.xhtml#Par349)].


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig17_HTML.png](images/505424_1_En_4_Chapter/505424_1_En_4_Fig17_HTML.png)


    Figure 4-17


    The five basic steps of natural language processing used by, for example, Amazon’s
    Alexa


    Similar companies, research initiatives, and collaborations can be found all across
    the globe – two further examples are the UK-based startups Kheiron Medical and
    Oxford Heartbeat – which again demonstrates the vast potential of artificial intelligence
    in healthcare and its beneficial impact on society. This industry has been projected
    to reach USD 150 billion by 2026. Please see, for example, [[110](#505424_1_En_4_Chapter.xhtml#Par350)]
    for further examples.


    ### 4.4.4 Natural Language Processing


    *Natural language processing* has attracted the attention of various researchers
    in artificial intelligence from the very first. Inspired by the pioneering work
    of Joseph Weizenbaum and the introduction of ELIZA in 1966 (see Section 4.1.2),
    Microsoft released its first chatbot in 2014. This chatbot was named “Xiaoice”
    (the Chinese wording for “small ice”) and integrated it into Tencent’s WeChat
    App, the largest social messaging service in China until now. Xiaoice soon attracted
    more than 40 million users within a few years and was reported to have more than
    660 million users in 2019 worldwide. Two years after the successful introduction
    of Xiaoice, Microsoft prepared itself for repeating this success story in America
    and introduced the chatbot “Tay” on the microblogging and social networking service
    Twitter. “The more you chat with Tay,” said Microsoft, “the smarter it gets, learning
    to engage people through casual and playful conversation.” What started as an
    experiment in conversational understanding soon ended in a disaster for Microsoft.
    It just took less than 24 hours to train Tay to spew less playful and in fact
    racist and sexist messages, which is why Tay was closed down soon after its public
    release. Such failures and other non-successful projects are, however, very important
    from a scientific point of view as they allow developers to learn from them and
    improve products and services from generation to generation iteratively.


    Natural language processing is generally organized in five steps as depicted in
    Figure [4-17](#505424_1_En_4_Chapter.xhtml#Fig17). The overall process starts
    with *segmentation* , which divides the written text into smaller strings depending
    on punctuations, paragraphs, and other text characteristics. After that, those
    strings are parsed and segmented further into grammatical parts, such as single
    nouns, verbs, numbers, and punctuations, in a process called *tokenization* .
    This process is particularly challenging for a machine learning algorithm since
    written texts usually suffer from grammar and spelling errors, for example. The
    third step is called *stemming* and refers to the process of reducing a word to
    its root by removing affixes and suffixes – the word “reading,” for example, is
    converted into “read” by this procedure. The last preprocessing step is called
    *lemmatization* and involves finding other words with the same semantic root.
    An example is the word “better,” which might be lemmatized to “good.” This is
    a prerequisite for the last and probably most challenging part of any natural
    language processing algorithm, namely, the understanding of language to derive
    certain conclusions and actions. This step conventionally employs unsupervised
    learning approaches and other deep learning models, such as recurrent neural networks
    or clustering algorithms, to analyze sequences of words and identify patterns
    and clusters in the written text.


    Paired with *voice recognition* technology , natural language processing meanwhile
    became a fairly common technology – just think about the voice dialing function
    of your smartphone, for instance. Quite interestingly, the first voice recognition
    system was actually developed in 1952 at the famous Bell Labs in America and called
    “Audrey” for “Automatic Digit Recognition.” Audrey was capable of recognizing
    the sound of spoken digits, from zero to nine, with more than 90% accuracy based
    on the detections of so-called *phonemes* , the fundamental units of speech sounds.
    This was a major and equally remarkable step for the development of voice recognition
    since the available computing power and memory size were very limited at that
    time.'
