    *To my family and friends.*


    Advance Praise for *Digital Fluency*


    “If you are trying to make your organization fit for the 21st century, *Digital
    Fluency* is your ultimate guide. Enriched with numerous practical examples, valuable
    summaries and actionable frameworks, it provides an accessible and comprehensive
    introduction to the most exciting digital technologies of our time. Whether you
    are a business leader, start-up entrepreneur, policy maker or student, *Digital
    Fluency* gives you everything you need to get ready for the exciting digital future
    that lies ahead of us.”


    > — Rasmus Rothe, Founder of Merantix AG


    “In a tech world that is increasingly dominated by buzzwords, *Digital Fluency*
    will provide you with the necessary theoretical and practical background to make
    sense of digital key technologies like artificial intelligence, blockchain, and
    quantum computing. It will give today’s business leaders a head start and is a
    top-priority read for anyone seeking to reshape our future by leveraging digital
    technologies.”


    > — Jean-Luc Scherer, CEO and Founder of Innoopolis


    “At the dawn of the 4th industrial revolution, Volker Lang provides us with a
    forward-looking masterpiece that makes us all feel comfortable about the digital
    future. In *Digital Fluency*, students and professionals on the technical and
    business side will find valuable advice that will guide them on their transformative
    journey to their rightful place in the growing digital world. If you want to understand
    how artificial intelligence, blockchain and quantum computing continue to augment
    the human experience, then this excellent guidebook is for you.”


    > — Greg Coquillo, LinkedIn 2020 Top Voice for AI and Data Science


    “By focusing on artificial intelligence, blockchain, quantum computing and their
    real-world applications, Volker Lang has written an immediately accessible book
    which will equip employees and leaders of businesses alike with the requisite
    confidence to effect digital transformations. I cannot recommend reading *Digital
    Fluency* enough.”


    > — Vincent Anandraj, Managing Partner at Mynah Partners Ltd.


    “Digitization and digital transformation are the central topics of the 21st century.
    In his book, Volker Lang creates a fundamental understanding of the most important
    digital technologies and comprehensively describes their impact on industries
    and society. In the end, it becomes clear that no one can escape the future, but
    we all have an opportunity and obligation to shape it. A book for everyone seeking
    orientation in the digital age.”


    > — Christoph Bornschein, CEO and Founder of TLGG


    “*Digital Fluency* is an excellent introduction to future technologies beyond
    just buzzwords. Filled with numerous practical applications of digital technologies
    to your own line of work, it is highly recommended for all aspiring disruptors
    from students to seasoned executives.”


    > — Michael Berns, Director for AI & FinTech at PricewaterhouseCoopers (PwC)


    “As an industry, we have managed to transition artificial intelligence (AI) from
    ‘research’ to a technology that is part of the lives of countless people around
    the world. And that is just the beginning! *Digital Fluency* provides excellent
    examples of how enterprises have embraced AI in a meaningful way.”


    > — Ewa Dürr, Head of Product Strategy & Operations, Google Cloud Artificial Intelligence


    “Blockchain will, like no other technology, shape the years from 2020 to 2030\.
    But it unfolds its true capabilities only in combination with other technologies.
    *Digital Fluency* provides an insightful introduction to exactly these key technologies
    constantly reshaping our world and presents a comprehensive overview of their
    potential applications. It promotes new digital thinking, skillfully inspires
    new applications and is therefore a compelling read for any leader.”


    > — Philipp Sandner, Professor at Frankfurt School of Finance & Management and
    Head of Frankfurt School Blockchain Center (FSBC)


    “Volker Lang describes the most relevant cutting-edge technologies for solving
    the critical issues of our time in a clear and well-structured way, so that readers
    can contextualize and apply them within their own business activities. *Digital
    Fluency* is a compelling guide to digital value creation for investors, entrepreneurs
    and professionals of private and public organizations.”


    > — Alessandra Sollberger, Founder of Top Tier Impact (TTI) and Technology Investor


    “Digital technologies have shaped the past fifty years and new emerging digital
    technologies promise to shape our future. For example, quantum computers are moving
    out of physics labs – they have reached a maturity in size and performance that
    puts them on the cusp of being able to beat conventional supercomputers in solving
    problems that matter. *Digital Fluency* presents a bang up-to-date perspective
    of the quantum computing industry today, from the quantum chips currently available
    on the cloud to the most exciting business applications being explored.”


    > — John Morton, Professor of Nanoelectronics & Nanophotonics at University College
    London (UCL)


    “With great clarity and pragmatism, Volker Lang explains the key concepts and
    buzzwords of digital economy in an entertaining way and uses numerous examples
    to inspire new applications, products and services in a variety of industries,
    including banking and finance. *Digital Fluency* is an excellent introduction
    to the most important digital topics of our time and an essential reading for
    anyone looking for guidance in the digital world we live in.”


    > — Laure Frank, Head of Digitalization at Raiffeisen Switzerland


    “*Digital Fluency* is a delightful guide full of important information for those
    interested in emerging technologies that enable the digital transformation of
    organizations. Volker Lang offers a very easily accessible overview of the most
    important digital technologies and gives companies valuable recommendations and
    tools for completing their digital transformation successfully.”


    > — Angeliki Dedopoulou, EU Public Affairs Senior Manager, Huawei Technologies


