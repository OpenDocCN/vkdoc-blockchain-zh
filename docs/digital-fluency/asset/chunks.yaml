  trans: '

    ### 5.7.2 建立开放创新文化：实施设计思维


    一种非常成功的、能够支持建立开放创新文化的方法论是*设计思维* [39]。`设计思维`是一种以客户为中心、创造性、迭代且实用的创新方法。它常用于重新构想和重新设计客户旅程，通常按以下五个步骤组织：


    1.  *共情*：`设计思维`过程的第一步，是从客户的角度对问题建立共情理解。典型的引导性问题包括：客户在寻找什么？客户需要完成的任务是什么？什么（最）困扰他们？

    2.  *定义*：分析观察结果并将其综合为对问题的精确定义，是第二步的主要目标。是否存在未满足的需求？需要解决的问题是什么？

    3.  *构思*：这是整个过程中的创造性步骤，广泛探索针对已定义问题的可能解决方案，而不考虑它们看起来是现实还是不现实。

    4.  *原型制作*：`设计思维`团队制作一个低成本的、简化的产品或服务版本，旨在增强客户（或用户）体验。这个*最小可行产品*^((150))（或服务）充当后续迭代改进过程的起点。

    5.  *测试*：这是第一次迭代周期的最后一步，旨在真实条件下测试原型，以检验它如何影响客户体验。根据收到的客户反馈，成功的功能将被推出并优化，而不成功的功能则进入从步骤
    4 开始的下一迭代周期。


    `设计思维`已被成功证明能够加速整个产品开发过程，同时通过在发布前用最小可行产品或服务进行试验来降低失败成本。它允许组织在产品和服务上进行实时实验，以一种非常低成本的方式尽早试验原型，并根据客户反馈进行迭代改进。此外，这种敏捷方法论鼓励人们承担风险、迭代学习，并快速及早失败。`设计思维`提倡快速原型制作
    [55] 和持续学习，而不是在向客户发布和展示产品之前追求完美。


    建立在`设计思维`和其他敏捷协作方式之上的开放创新文化，不仅能够实现快速的产品创新，还能通过给予员工更多自主权去实现他们自己的想法和解决方案，从而吸引和留住更优秀的人才。实际上，将这种个人自主权与组织的整体数字化议程对齐，是转变企业文化时面临的主要挑战之一。调和自主权与一致性的一种好方法是，通过反复激励对组织整体数字化议程的忠诚和承诺，来鼓励正确行为并抑制不良行为。采用人力资源流程，例如薪酬和晋升体系，以避免激励错位，通常也能促进对数字化议程的遵守。


    ## 5.8 利用生态系统


    根据我们之前的讨论，我们知道，将客户反馈迭代整合到产品或服务开发过程中，对于建立以客户为中心的开放创新文化至关重要——例如，在亚马逊，超过 90%的创新实际上是由客户反馈触发的。此外，系统地与客户互动对于开发满足特定客户需求和期望的个性化产品和服务也是必不可少的。杰夫·贝佐斯在
    2016 年致股东的信中提到了这一点：


    以客户为中心的方法有很多优势，但最大的一个是：客户总是美妙地、令人愉悦地不满足，即使当他们报告说很开心且业务很好时也是如此。即使他们自己还不知道，客户也想要更好的东西，而你取悦客户的愿望将驱使你为他们而发明
    [56]。


    但客户并不是在数字化转型过程中需要与之互动的重要生态系统利益相关者。


    你的生态系统还包括竞争对手、服务提供商、供应商以及其他现有和潜在的商业伙伴，他们可能是灵感和新创意的另一个重要来源。你生态系统内的合作与伙伴关系通常属于以下三类之一：


    1.  *横向*伙伴关系，存在于同一领域作为竞争对手运营的企业之间，通常用于解决产能限制或中和风险。竞争对手可能联合起来，以某种方式改善他们的市场地位，例如，追求规模经济、在多个市场销售产品，或在研发方面进行合作。一个例子是
    IONITY，这是一家由宝马、戴姆勒、福特和大众在慕尼黑成立的合资企业，旨在为欧洲的纯电动汽车建设大功率充电基础设施。

    2.  *纵向*伙伴关系，指同一供应链内公司之间的合作。例如，一家公司可能与其某个供应商合作，以加深关系、巩固长期承诺，或促成产品设计和分销方面的协作。一个极好的例子是亚马逊的市场平台，它利用与在线卖家的纵向伙伴关系，在
    2007 年其 Kindle 商店推出时，基本上从第一天起就提供了超过 88,000 本可供下载的电子书。随着数字技术的到来，如今组织与其最终用户之间也直接形成了纵向伙伴关系。例如，美国媒体公司
    Netflix 就利用这种伙伴关系来众包改进其推荐引擎的创新想法。

    3.  *跨行业*伙伴关系，是不同行业组织之间的长期互动。一个例子是零售银行和电信公司合作提供移动支付服务 [58]。另一个例子是亚马逊云服务（AWS）最近开始与美国在线学习平台优达学城（Udacity）合作，在线提供不同的证书课程和奖学金
    [59]。


    这样的伙伴关系可以帮助你充分利用生态系统的多样性，吸引更多关注，从客户那里获得有价值的反馈，获取外部创意，并吸引新的数字人才。出于同样的原因，你也可以考虑与创新型初创公司或学术界合作。成功的数字化组织还会采用一系列其他举措，以便在特定生态系统中更好地定位自己。这些举措包括组织软件和硬件开发竞赛或黑客马拉松，访问研究员项目、暑期学校和会议，以及在硅谷或其他高度创新的地理位置开设创新中心。'
- fmt: "Ultimately, I think that digital transformation provides various opportunities\
    \ for any organization operating in the private and public sector. The emergence\
    \ of digital technologies, such as quantum computing, blockchain technology, and\
    \ artificial intelligence, is framing a mandate for thought leaders to embrace\
    \ the full potential of digital technology to realign organizations and prepare\
    \ them for the digital future ahead of us. Digital transformation and its support\
    \ technologies present valuable and equally unique opportunities for all organizations\
    \ to differentiate and defend their products and services against the steadily\
    \ increasing number of competitors.\n\nI hope that the concepts and frameworks\
    \ presented in this book will inspire new ideas and digital thinking and help\
    \ you to complete your own digital transformation journey successfully. The best\
    \ of digital technology is – for sure – still to come.\n\n## Key Points\n\n- The\
    \ most successful business models integrate around the customers’ job to be done\
    \ and aim for doing this job better and better over time by leveraging sustaining\
    \ and/or disruptive innovations and associated technologies. Customer journeys\
    \ can help in this context to tailor a product or service to the specific customers’\
    \ needs.\n\n- The selection of an appropriate technology stack that supports the\
    \ digital business and operating model best typically involves choosing a cloud\
    \ computing vendor. The most popular vendors are Amazon Web Services, Microsoft\
    \ Azure, and Google Cloud. Their services generally fall into four main categories,\
    \ namely, (1) infrastructure-, (2) platform-, (3) software-, and (4) business-process-as-a-service\
    \ depending on the client’s level of involvement.\n\n- Digitizing the core of\
    \ a business or organization by leveraging a technology stack is about creating\
    \ an appropriate IT infrastructure that supports internal processes. In the case\
    \ of established organizations, this process typically involves the gathering,\
    \ cleaning, normalization, and integration of data scattered in silos into an\
    \ integrated data platform that allows for sharing and analyzing big data across\
    \ the organization easily.\n\n- Successful pilot projects are built around a concrete\
    \ (business) problem or purpose. They are scalable and aim for quick wins to create\
    \ enthusiasm for digital transformation in the organization.\n\n- Empowering employees\
    \ by education and training involves building up multidisciplinary skills ranging\
    \ from agile methodologies to digital marketing and programming skills. The different\
    \ initiatives aim for creating a digital mindset that allows for evaluating and\
    \ anticipating the impact of digital technology on organizations and society.\n\
    \n- Rethinking and shaping the organizational structure is particularly important\
    \ since companies cannot disrupt itself. The excubator model and a two-speed IT\
    \ have thus been proven to be particularly successful in running digital pilot\
    \ projects.\n\n- Establishing an open innovation culture with a strong customer-\
    \ and product-centric view is at the heart of any digital transformation. Design\
    \ thinking may help to develop new products and services centered around the customers’\
    \ job to be done purposefully.\n\n- Leveraging an organization’s ecosystem to\
    \ engage with customers will is crucial for optimizing products and services iteratively.\
    \ Collaborations and partnerships with other players in the ecosystem may help\
    \ to attract new talent and grow the digital business rapidly.\n\n- Digital transformation\
    \ regards eight key dimensions:\n    1.  Envisioning a digital business and operating\
    \ model\n    2.  Selecting an appropriate technology stack and platform\n    3.\
    \  Digitizing the business core\n    4.  Identifying scalable pilot projects\n\
    \    5.  Empowering employees\n    6.  Shaping the company structure and organization\n\
    \    7.  Establishing an open innovation culture\n    8.  Leveraging the ecosystem\
    \ and engaging with customers\n\n## Further Reading\n\nAt the end of this chapter,\
    \ I would like to provide you with some recommendations for further reading if\
    \ you like to dive deeper into digital business and operating models, agile methodologies,\
    \ open innovation cultures, and other related topics:\n\n- Nadella, S. *et al.*:\
    \ Hit Refresh: The Quest to Rediscover Microsoft’s Soul and Imagine a Better Future\
    \ for Everyone. Harper Business (2017).\n\n- Frankenberger, K. *et al.*: The Digital\
    \ Transformer’s Dilemma: How to Energize Your Core Business While Building Disruptive\
    \ Products and Services. Wiley (2020).\n\n- Weill, P. and Woerner, S. L.: What’s\
    \ Your Digital Business Model? Six Questions to Help You Build the Next-Generation\
    \ Enterprise. Harvard Business Review Press (2018) – a free webinar that covers\
    \ various aspects of this book is available online on [https://hbr.org/webinar/2018/03/building-your-digital-business-model/](https://hbr.org/webinar/2018/03/building-your-digital-business-model/).\n\
    \n- Orban, S. *et al.*: Ahead in the Cloud: Best Practices for Navigating the\
    \ Future of Enterprise IT. CreateSpace Independent Publishing Platform (2018).\n\
    \n- Reeves, M. *et al.*: Your Strategy Needs a Strategy: How to Choose and Execute\
    \ the Right Approach. Harvard Business Review Press (2015).([151]())\n\n- Ries,\
    \ E.: The Lean Startup: How Today’s Entrepreneurs Use Continuous Innovation to\
    \ Create Radically Successful Businesses. Currency (2017).\n\n- Brown, T.: Change\
    \ by Design: How Design Thinking Transforms Organizations and Inspires Innovation.\
    \ HarperCollins (2009)."
