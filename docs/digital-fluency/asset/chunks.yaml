    \ will help you to tune out all this noise and understand the basic operating\
    \ principles and most important applications of artificial intelligence. We will\
    \ have a look on the rich history of this exciting technology first and highlight\
    \ the most important historic milestones and research projects. This review will\
    \ show that artificial intelligence is an umbrella term for the two subcategories\
    \ machine learning and deep learning, each of which having certain use cases and\
    \ applications. We will discuss artificial neural networks as an integral part\
    \ of deep learning and other powerful concepts that are still subject to intense\
    \ academic research worldwide. In the second part of this chapter, we will examine\
    \ the opportunities and limitations of this technology and learn about the most\
    \ important use cases and applications ranging from arts and industry design to\
    \ drug discovery to autonomous driving. Like the two previous chapters, this one\
    \ does also provide you with an easy-to-use framework that allows you to evaluate\
    \ if artificial intelligence is likely to provide a value add for your own use\
    \ case or application, which you may have in mind when reading this book.\n\n\
    ## 4.1 Setting the Artificial Intelligence Scene\n\nBefore we dive deep into the\
    \ eventful history of this fascinating digital technology, it is instructive to\
    \ take one step back and ask ourselves how we would actually define natural or\
    \ human intelligence as oppose to artificial intelligence. The Oxford Learner’s\
    \ Dictionary is always a good advisor for linguistic questions like this and defines\
    \ intelligence as follows: intelligence is “the ability to learn, understand and\
    \ think in a logical way about things; the ability to do this well.” The corresponding\
    \ definition of artificial intelligence reads: “An area of study concerned with\
    \ making computers copy intelligent human behavior.” In other words, artificial\
    \ intelligence mimics human behavior and enables machines to reason and act like\
    \ humans. This is why science fiction envisions the arrival of artificial humans\
    \ and autonomous robots as a scary glimpse of the future. Historically, science\
    \ fiction has always been crucial in understanding the impacts and implications\
    \ of new technologies on business and society. This is why it is not surprising\
    \ that artificial intelligence and its preceding concepts have attracted great\
    \ attention in the science fiction literature, such as in the influential story\
    \ collection *I, Robot* published by the Russian-American biochemist and author\
    \ Isaac Asimov in 1950. You may also be aware of the legendary blockbuster film\
    \ version of this book that was distributed by 20th Century Fox in 2004. The great\
    \ prospect and vast potential are two of the main reasons why artificial intelligence\
    \ has been studied for decades and remains one of the most elusive subjects of\
    \ modern computer science and information technology.\n\nSince artificial intelligence\
    \ aims to mimic the intelligent behavior of humans, it is instructive to have\
    \ a brief look on how our brain processes information. Our brain consists of more\
    \ than 86 billion nerve cells, so-called *neurons*, that are interconnected with\
    \ each other to form a very large *neural network*. Neurons process information\
    \ encoded in electrical signals that are generated by our sensory organs, such\
    \ as our eyes that detect light or our ears that sensor sound waves. The light\
    \ we see and the sound we hear trigger certain chemical reactions that generate\
    \ electrical signals.^([^(82)](#fn82)) These signals are then transmitted from\
    \ our sensory organs to our brain through nerve tracts that built up our central\
    \ nervous system. Nerve tracts are bundles of so-called *axons* that consist of\
    \ certain nervous cells (so-called *Schwann cells*) that are specialized on transmitting\
    \ electrical signals across very long distances – the length of a human axon can\
    \ actually reach up to one meter in total. The *synapsis terminals* at the track's\
    \ ends route the electrical signals into the actual neuron shown in Figure [4-1](#505424_1_En_4_Chapter.xhtml#Fig1)\
    \ schematically. As soon as the strength of this signal reaches a certain threshold\
    \ voltage – the so-called *activation potential* – the neuron is said to be \"\
    activated\" and transmits the information through its dendrites and the thinner\
    \ *telodendria* to other neurons in the network. Those neurons are in turn either\
    \ activated or not according to their respective activation potential. Depending\
    \ on which neurons in the widely branched network were activated by a certain\
    \ visual stimulus of our sensory organs, we associate this activation pattern\
    \ with a concrete physical object, such as a house, car, or book. This highly\
    \ simplified model of the neural network in our brain has inspired numerous researchers\
    \ in computer science and related disciplines worldwide to develop artificial\
    \ neural networks as we will see in the following.\n\n![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig1_HTML.png](images/505424_1_En_4_Chapter/505424_1_En_4_Fig1_HTML.png)\n\
    \n**Figure 4-1**  \nSchematic drawing of a single neuron. Electric signals are\
    \ received on the left-hand side, converted into an output signal and transmitted\
    \ along the axon to the right-hand side, where telodendria connect to other neurons\
    \ (not shown)"
  raw: '# 4. Artificial Intelligence


    Artificial intelligence (AI) is the most versatile digital technology introduced
    in this book and among the most frequently used buzzwords in media today. It is
    often used in conjunction with the related terms machine learning, neural networks,
    big data, and deep learning, which we will discuss in this chapter, too. We will
    see that artificial intelligence offers a wide range of applications across all
    sectors of modern business and society.


    In contrast to quantum computing and blockchain technology, artificial intelligence
    does not require any expensive hardware and costly IT infrastructure since most
    of its benefits can be delivered through existing computing hardware and open
    source software on a reasonable timescale already. This is why artificial intelligence
    became the most popular digital technology enabling digital transformation. It
    has found its way in almost all industries over the last couple of years, which
    is why the two American economists Erik Brynjolfsson and Andrew McAfee rightfully
    noted that “the most important general-purpose technology of our era is artificial
    intelligence” [[2](#505424_1_En_4_Chapter.xhtml#Par240)]. According to McKinsey
    & Company, artificial intelligence will create USD 13 trillion GDP growth by 2030
    [[1](#505424_1_En_4_Chapter.xhtml#Par239)], most of which will be in non-Internet
    sectors, such as manufacturing, energy, agriculture, and logistics. But even if
    its economic and social significance is undisputed, its operation and capabilities
    remain widely misunderstood. While executives often view it as the most important
    disruptive technology of our time, employees frequently fear it as a job destroyer
    and deride it accordingly.


    This chapter will help you to tune out all this noise and understand the basic
    operating principles and most important applications of artificial intelligence.
    We will have a look on the rich history of this exciting technology first and
    highlight the most important historic milestones and research projects. This review
    will show that artificial intelligence is an umbrella term for the two subcategories
    machine learning and deep learning, each of which having certain use cases and
    applications. We will discuss artificial neural networks as an integral part of
    deep learning and other powerful concepts that are still subject to intense academic
    research worldwide. In the second part of this chapter, we will examine the opportunities
    and limitations of this technology and learn about the most important use cases
    and applications ranging from arts and industry design to drug discovery to autonomous
    driving. Like the two previous chapters, this one does also provide you with an
    easy-to-use framework that allows you to evaluate if artificial intelligence is
    likely to provide a value add for your own use case or application, which you
    may have in mind when reading this book.


    ## 4.1 Setting the Artificial Intelligence Scene


    Before we dive deep into the eventful history of this fascinating digital technology,
    it is instructive to take one step back and ask ourselves how we would actually
    define natural or human intelligence as oppose to artificial intelligence. The
    Oxford Learner’s Dictionary is always a good advisor for linguistic questions
    like this and defines intelligence as follows: intelligence is “the ability to
    learn, understand and think in a logical way about things; the ability to do this
    well.” The corresponding definition of artificial intelligence reads: “An area
    of study concerned with making computers copy intelligent human behavior.” In
    other words, artificial intelligence mimics human behavior and enables machines
    to reason and act like humans. This is why science fiction envisions the arrival
    of artificial humans and autonomous robots as a scary glimpse of the future. Historically,
    science fiction has always been crucial in understanding the impacts and implications
    of new technologies on business and society. This is why it is not surprising
    that artificial intelligence and its preceding concepts have attracted great attention
    in the science fiction literature, such as in the influential story collection
    *I, Robot* published by the Russian-American biochemist and author Isaac Asimov
    in 1950\. You may also be aware of the legendary blockbuster film version of this
    book that was distributed by 20th Century Fox in 2004\. The great prospect and
    vast potential are two of the main reasons why artificial intelligence has been
    studied for decades and remains one of the most elusive subjects of modern computer
    science and information technology. Since artificial intelligence aims to mimic
    the intelligent behavior of humans, it is instructive to have a brief look on
    how our brain processes information. Our brain consists of more than 86 billion
    nerve cells, so-called *neurons* , that are interconnected with each other to
    form a very large *neural network* . Neurons process information encoded in electrical
    signals that are generated by our sensory organs, such as our eyes that detect
    light or our ears that sensor sound waves. The light we see and the sound we hear
    trigger certain chemical reactions that generate electrical signals.^([^(82)](#fn82))
    These signals are then transmitted from our sensory organs to our brain through
    nerve tracts that built up our central nervous system. Nerve tracts are bundles
    of so-called *axons* that consist of certain nervous cells (so-called *Schwann
    cells* ) that are specialized on transmitting electrical signals across very long
    distances – the length of a human axon can actually reach up to one meter in total.
    The *synapsis terminals* at the track’s ends route the electrical signals into
    the actual neuron shown in Figure [4-1](#505424_1_En_4_Chapter.xhtml#Fig1) schematically.
    As soon as the strength of this signal reaches a certain threshold voltage – the
    so-called *activation potential*  – the neuron is said to be “activated” and transmits
    the information through its dendrites and the thinner *telodendria* to other neurons
    in the network. Those neurons are in turn either activated or not according to
    their respective activation potential. Depending on which neurons in the widely
    branched network were activated by a certain visual stimulus of our sensory organs,
    we associate this activation pattern with a concrete physical object, such as
    a house, car, or book. This highly simplified model of the neural network in our
    brain has inspired numerous researchers in computer science and related disciplines
    worldwide to develop artificial neural networks as we will see in the following.


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig1_HTML.png](images/505424_1_En_4_Chapter/505424_1_En_4_Fig1_HTML.png)


    Figure 4-1


    Schematic drawing of a single neuron. Electric signals are received on the left-hand
    side, converted into an output signal and transmitted along the axon to the right-hand
    side, where telodendria connect to other neurons (not shown)'
  trans: "\n# 4. 人工智能\n\n人工智能（`AI`）是本书介绍的最具多功能的数字技术，也是当今媒体中最常使用的流行语之一。它常与机器学习、神经网络、大数据和深度学习等相关术语一同使用，这些内容我们也将在这章中讨论。我们将看到，人工智能在现代商业和社会的各个领域都提供了广泛的应用。\n\
    \n与量子计算和区块链技术不同，人工智能不需要任何昂贵的硬件和昂贵的 IT 基础设施，因为它的大部分优势已经可以在合理的时间范围内，通过现有的计算硬件和开源软件实现。这就是人工智能成为推动数字化转型最流行的数字技术的原因。在过去的几年里，它几乎已经渗透到所有行业，因此两位美国经济学家埃里克·布林约尔松和安德鲁·麦卡菲正确地指出：“我们这个时代最重要的通用技术是人工智能”[2]。根据麦肯锡公司的预测，到\
    \ 2030 年，人工智能将创造 13 万亿美元的 GDP 增长[1]，其中大部分将来自非互联网行业，例如制造业、能源、农业和物流。但是，即使其经济和社会意义无可争议，其运作方式和能力仍然普遍被误解。虽然高管们常将其视为我们时代最重要的颠覆性技术，但员工们则经常担心它会破坏就业，并因此对它嗤之以鼻。\n\
    \n本章将帮助你屏蔽所有这些噪音，理解人工智能的基本运作原理和最重要的应用。我们将首先回顾这项激动人心的技术的丰富历史，并着重介绍最重要的历史里程碑和研究项目。这一回顾将表明，人工智能是机器学习和深度学习这两个子类别的总称，每个子类别都有特定的用例和应用。我们将讨论人工神经网络作为深度学习以及其他一些强大概念的组成部分，这些概念目前仍是全球学术研究的重点。在本章的第二个部分，我们将审视这项技术的机遇与局限，并了解其最重要的用例和应用，范围从艺术和工业设计，到药物发现，再到自动驾驶。与前两章类似，本章也会为你提供一个易于使用的框架，让你能够评估人工智能是否可能为你自己的用例或应用（你在阅读本书时可能心中已有想法）增加价值。\n\
    \n## 4.1 设定人工智能的背景\n\n在我们深入探讨这项迷人数字技术的波澜壮阔的历史之前，退后一步并问问自己，我们实际上会如何定义与人工智能相对的**自然**或**人类**智能，这是有益的。对于这类语言问题，《牛津学习词典》总是一个好顾问，它将智能定义如下：智能是“学习、理解并以逻辑方式思考事物的能力；以及做好这件事的能力。”人工智能的相应定义是：“一个研究如何让计算机模仿人类智能行为的研究领域。”换句话说，人工智能模仿人类行为，使机器能够像人类一样推理和行动。这就是为什么科幻小说将类人机器人和自主机器人的到来设想为未来一个可怕的景象。从历史上看，科幻小说对于理解新技术对商业和社会的影响及意义一直至关重要。因此，人工智能及其前身概念在科幻文学中引起了极大关注也就不足为奇了，例如在俄裔美国生物化学家、作家艾萨克·阿西莫夫于\
    \ 1950 年出版的有影响力的故事集《*我，机器人*》中。你可能也知道 2004 年由二十世纪福克斯发行的这部小说的传奇大片改编版。广阔的前景和巨大的潜力是人工智能被研究数十年并仍然是现代计算机科学和信息技术中最深奥的课题之一的两个主要原因。\n\
    \n由于人工智能旨在模仿人类的智能行为，简要了解一下我们的大脑如何处理信息是有益的。我们的大脑由超过 860 亿个神经细胞组成，即所谓的*神经元*，它们相互连接形成一个非常庞大的*神经网络*。神经元处理由我们的感觉器官（例如检测光线的眼睛或感知声波的耳朵）产生的电信号中编码的信息。我们看到的光和我们听到的声音会触发某些化学反应，从而产生电信号。^（^（82））^\
    \ 然后，这些信号通过构成我们中枢神经系统的神经束，从我们的感觉器官传递到我们的大脑。神经束是由所谓的*轴突*束组成的，这些轴突由某些专门的神经细胞（即所谓的*施万细胞*）构成，擅长在长距离传输电信号——人类轴突的总长度实际上可以达到一米。神经束末端的*突触终端*将电信号引导至图\
    \ 4-1 中示意性显示的实际神经元中。一旦这个信号的强度达到某个阈值电压——即所谓的*激活电位*——该神经元就被称为“被激活”，并通过其树突和更细的*终末树突*将信息传递给网络中的其他神经元。这些神经元随后会根据它们各自的激活电位被激活或不激活。根据我们感觉器官的某个视觉刺激激活了广泛分支网络中的哪些神经元，我们将这种激活模式与一个具体的物理对象（例如房屋、汽车或书籍）关联起来。我们大脑中这种高度简化的神经网络模型，启发了计算机科学及相关学科的众多研究人员开发人工神经网络，我们将在下文看到这一点。\n\
    \n![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig1_HTML.png](img/505424_1_En_4_Fig1_HTML.png)\n\
    \n**图 4-1**  \n单个神经元的示意图。电信号在左侧被接收，转换为输出信号并沿轴突传送到右侧，终末树突在此处连接到其他神经元（未显示）\n"
- fmt: '# The Symbiosis of Neurobiology and Information Theory


    The early history of artificial intelligence is inseparably linked to a scientific
    discipline called cybernetics that emerged in the 1940s. Etymologically, this
    term stems from the Greek word *cybernētēs* for steersman, governor, pilot, or
    rudder, which is why cybernetics may be translated as “steerman’s art”.^([^(83)](#fn83))
    In science, *cybernetics* refers to the systematic study of connections between
    neurobiology and information theory. It is also frequently referred to as the
    science of controlling and regulating machines based on *feedback loops* in analogy
    to living organisms that receive feedback through their sensory organs and social
    communication with each other. The forefather of this interesting area of research
    is the American mathematician and philosopher Norbert Wiener, who defined cybernetics
    as the “scientific study of control and communication in the animal and the machine”
    in 1948 [[3](#505424_1_En_4_Chapter.xhtml#Par241)]. Even though his book entitled
    *Cybernetics: Or Control and Communication in the Animal and the Machine* was
    a rather scholarly work full of complex mathematical equations, it immediately
    became a bestseller and hit the *New York Times* bestseller list upon its publication.
    One of the most important tasks of cybernetics is the automation of processes
    including the self-regulation in complex systems. Cybernetics gave rise to the
    abbreviated term “cyber” later on that is nowadays used as a prefix in various
    contexts relating to the virtual reality created by computers, such as cyberspace
    and cybersecurity.


    One of the first cybernetic models – which often went against the conventional
    wisdom of Freudian psychology at that time – was proposed by the American neurophysiologist
    Warren McCulloch and the logician Walter Pitts in 1943 [[4](#505424_1_En_4_Chapter.xhtml#Par242)]
    and became known as the *McCulloch-Pitts neuron* accordingly [[4](#505424_1_En_4_Chapter.xhtml#Par242)].
    The most basic version of this cybernetic model is depicted in Figure [4-2](#505424_1_En_4_Chapter.xhtml#Fig2).
    It processes two binary input values, denoted by `x[1]` and `x[2]`, adds them
    together, and provides one binary output value, which can either be 1 or 0 depending
    on whether the sum of inputs `x[1] + x[2]` is equal to or larger than a certain
    threshold value, an integer number denoted by `t`. In analogy to biological neurons,
    this threshold value corresponds to the activation potential and determines whether
    a neuron is activated or not. If you recapitulate the truth table for the AND
    function in Table [1-1](#505424_1_En_1_Chapter.xhtml#Tab1), it is easy to verify
    that the McCulloch-Pitts neuron with the threshold value `t = 2` represents a
    classical logic AND gate. The other classical logic gates can be implemented by
    varying the threshold value accordingly. The parallels between this cybernetic
    model and a biological neuron are striking: both neurons process multiple inputs
    and convert them into a single output depending on the particular threshold value.
    This analogy suggests that the basic operations of our brain can be modeled by
    classical logic gates, such as the AND, OR, and NOT gate, which has meanwhile
    been verified principally – isn’t that surprising?


    ## Neuron


    Neurons are the basic building blocks of the human brain. They are electrically
    excitable cells that process electrical input signals and convert them to an electrical
    output signal. Artificial neurons used in machine learning emulate this behavior
    and are used to build artificial neural networks.


    This is probably the most important and equally fascinating observation of Warren
    McCulloch and Walter Pitts and the reason why their seminal paper from 1943 with
    the title “A Logical Calculus of the Ideas Immanent in Nervous Activity” attracted
    so much attention worldwide [[4](#505424_1_En_4_Chapter.xhtml#Par242)]. In 1949,
    the Canadian psychologist Donald Hebb observed that the different inputs of a
    neuron cannot be treated as equally relevant since some of them are more important
    than others [[5](#505424_1_En_4_Chapter.xhtml#Par243)]. This is why he introduced
    the concept of *synaptic weights*, which became known as *Hebbian theory* later
    on.


    Another very important contribution to early cybernetics and information theory
    goes back to the British polymath Alan Turing, whom we know from our discussion
    of the Turing machine in Section 1.4.2. In 1950, Alan Turing noted that humans
    use information and reasoning to solve problems and make decisions. He therefore
    wondered if machines could possibly do the same thing. For this purpose, he proposed
    a construction manual for building intelligent machines together with a concept
    for testing their intelligence in his famous paper entitled “Computing Machinery
    and Intelligence” [[9](#505424_1_En_4_Chapter.xhtml#Par247)]. Later on, this test
    became known as *Turing test* in his honor, which is used up to now to test a
    machine’s ability to exhibit intelligent behavior and compare it to that of humans.
    The Turing test is essentially a game with three players, one that is the computer
    or system to be tested and two that are human. One of the human players, the evaluator
    in this test, asks open-ended questions and aims to identify the human player
    among the other two players. The computer or machine is said to be intelligent
    if the evaluator cannot make any judgment and identify the human player without
    seeing them conclusively.


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig2_HTML.png](images/505424_1_En_4_Chapter/505424_1_En_4_Fig2_HTML.png)


    **Figure 4-2** Basic circuit diagram of the McCulloch-Pitts neuron with two inputs
    `x[1]` and `x[2]`. The result is equal to 1 if the sum of the inputs is larger
    than or equal to the threshold value `t` and 0 otherwise'
  raw: '### 4.1.1 The Symbiosis of Neurobiology and Information Theory


    The early history of artificial intelligence is inseparably linked to a scientific
    discipline called cybernetics that emerged in the 1940s. Etymologically, this
    term stems from the Greek word *cybernētēs* for steersman, governor, pilot, or
    rudder, which is why cybernetics may be translated as “steerman’s art”.^([^(83)](#fn83))
    In science, *cybernetics* refers to the systematic study of connections between
    neurobiology and information theory. It is also frequently referred to as the
    science of controlling and regulating machines based on *feedback loops* in analogy
    to living organisms that receive feedback through their sensory organs and social
    communication with each other. The forefather of this interesting area of research
    is the American mathematician and philosopher Norbert Wiener, who defined cybernetics
    as the “scientific study of control and communication in the animal and the machine”
    in 1948 [[3](#505424_1_En_4_Chapter.xhtml#Par241)]. Even though his book entitled
    *Cybernetics: Or Control and Communication in the Animal and the Machine* was
    a rather scholarly work full of complex mathematical equations, it immediately
    became a bestseller and hit the *New York Times* bestseller list upon its publication.
    One of the most important tasks of cybernetics is the automation of processes
    including the self-regulation in complex systems. Cybernetics gave rise to the
    abbreviated term “cyber” later on that is nowadays used as a prefix in various
    contexts relating to the virtual reality created by computers, such as cyberspace
    and cybersecurity.


    One of the first cybernetic models – which often went against the conventional
    wisdom of Freudian psychology at that time – was proposed by the American neurophysiologist
    Warren McCulloch and the logician Walter Pitts in 1943 [[4](#505424_1_En_4_Chapter.xhtml#Par242)]
    and became known as the *McCulloch-Pitts neuron* accordingly [[4](#505424_1_En_4_Chapter.xhtml#Par242)].
    The most basic version of this cybernetic model is depicted in Figure [4-2](#505424_1_En_4_Chapter.xhtml#Fig2).
    It processes two binary input values, denoted by *x*[1] and *x*[2], adds them
    together, and provides one binary output value, which can either be 1 or 0 depending
    on whether the sum of inputs *x*[1] + *x*[2] is equal to or larger than a certain
    threshold value, an integer number denoted by *t*. In analogy to biological neurons,
    this threshold value corresponds to the activation potential and determines whether
    a neuron is activated or not. If you recapitulate the truth table for the AND
    function in Table [1-1](#505424_1_En_1_Chapter.xhtml#Tab1), it is easy to verify
    that the McCulloch-Pitts neuron with the threshold value *t* = 2 represents a
    classical logic AND gate. The other classical logic gates can be implemented by
    varying the threshold value accordingly. The parallels between this cybernetic
    model and a biological neuron are striking: both neurons process multiple inputs
    and convert them into a single output depending on the particular threshold value.
    This analogy suggests that the basic operations of our brain can be modeled by
    classical logic gates, such as the AND, OR, and NOT gate, which has meanwhile
    been verified principally – isn’t that surprising?


    Neuron


    Neurons are the basic building blocks of the human brain. They are electrically
    excitable cells that process electrical input signals and convert them to an electrical
    output signal. Artificial neurons used in machine learning emulate this behavior
    and are used to build artificial neural networks.


    This is probably the most important and equally fascinating observation of Warren
    McCulloch and Walter Pitts and the reason why their seminal paper from 1943 with
    the title “A Logical Calculus of the Ideas Immanent in Nervous Activity” attracted
    so much attention worldwide [[4](#505424_1_En_4_Chapter.xhtml#Par242)]. In 1949,
    the Canadian psychologist Donald Hebb observed that the different inputs of a
    neuron cannot be treated as equally relevant since some of them are more important
    than others [[5](#505424_1_En_4_Chapter.xhtml#Par243)]. This is why he introduced
    the concept of *synaptic weights* , which became known as *Hebbian theory* later
    on.


    Another very important contribution to early cybernetics and information theory
    goes back to the British polymath Alan Turing, whom we know from our discussion
    of the Turing machine in Section 1.4.2\. In 1950, Alan Turing noted that humans
    use information and reasoning to solve problems and make decisions. He therefore
    wondered if machines could possibly do the same thing. For this purpose, he proposed
    a construction manual for building intelligent machines together with a concept
    for testing their intelligence in his famous paper entitled “Computing Machinery
    and Intelligence” [[9](#505424_1_En_4_Chapter.xhtml#Par247)]. Later on, this test
    became known as *Turing test* in his honor, which is used up to now to test a
    machine’s ability to exhibit intelligent behavior and compare it to that of humans.
    The Turing test is essentially a game with three players, one that is the computer
    or system to be tested and two that are human. One of the human players, the evaluator
    in this test, asks open-ended questions and aims to identify the human player
    among the other two players. The computer or machine is said to be intelligent
    if the evaluator cannot make any judgment and identify the human player without
    seeing them conclusively.


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig2_HTML.png](images/505424_1_En_4_Chapter/505424_1_En_4_Fig2_HTML.png)


    Figure 4-2


    Basic circuit diagram of the McCulloch-Pitts neuron with two inputs x[1] and x[2].
    The result is equal to 1 if the sum of the inputs is larger than or equal to the
    threshold value t and 0 otherwise'
