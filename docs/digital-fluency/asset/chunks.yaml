  trans: '

    # 第四章：“人工智能”


    在本章中，你将初步了解人工智能——这一推动数字化转型的最为多才多艺的数字技术。在学习了其激动人心的发展史（包括 IBM 传奇性的研究项目 `IBM Deep
    Blue` 和 `Watson`）之后，我们将把焦点转向当今最先进应用中所采用的不同子类别和学习策略。在此背景下，你将了解到监督学习、无监督学习和强化学习。你还将了解到我们人类大脑与人工神经网络之间的相似性，后者通过软件模拟人类智能的各个方面，并且是新兴且日益流行的深度学习领域的核心。此外，本章还会涵盖人工神经网络最重要的子类别，包括推荐系统以及卷积神经网络、循环神经网络和生成对抗神经网络。最后且同样重要的是，我们将仔细审视一些重要且同样鼓舞人心的人工智能应用案例，例如亚马逊的`Just
    Walk Out`购物技术、特斯拉和 Waymo 的自动驾驶系统、苹果的`Siri`虚拟助手、谷歌的自然语言处理与翻译系统、`Benevolent AI`的药物研发方法、彭博的新闻分析平台、`摩根大通`的智能定价算法，以及`贝莱德`名为`“阿拉丁”`的精妙投资网络。


    # 第五章：“你的数字行动计划”


    是时候为你自己的数字化转型做准备了。这最后一章为我们关于数字化转型及赋能技术的广泛讨论画上句号，并为你提供一个基于八个核心维度、可操作且全面的框架，用于规划和执行你自己的数字化转型。本章穿插了大量非常成功且世界领先组织的例子，我们将特别讨论如何开发数字业务和运营模式、如何基于云计算选择合适的技术栈，以及如何数字化一个组织的核心。你还将学习如何识别有前景的数字试点项目、赋能管理层和员工，以及塑造组织结构。最后且同样重要的是，我们将强调建立开放创新文化、通过接触客户及其他重要受益者来利用你的生态系统的重要性。


    除了延伸阅读部分，你还会在每章末尾找到关键点的总结。此外，第二章、第三章和第四章将为你提供易于使用的框架，帮助你判断某项数字技术是否适用于你自己的创意和用例。本书末尾附有与数字化转型和数字技术相关的常用术语综合词汇表，这将为你自己的数字化转型之旅提供进一步的指导。


    从本书大量的参考文献中，你完全可以推断出，量子计算、区块链技术和人工智能是极具活力的领域，几乎每天都有新发现和新参与者出现。尽管本书中讨论的众多例子无疑会变得过时，但所提出的概念、基本准则和框架却不会。随着数字技术不断改进和演变，这些宝贵的见解将继续适用。


    由于涵盖的数字主题种类繁多，*《数字素养》* 提供了三条不同的快速学习路径。如果你特别想从商业角度学习数字化和数字化转型，你可能只需阅读第一章和第五章的选定章节。如果你侧重于技术并希望更好地理解量子计算、区块链技术或人工智能，你可能只需阅读第一章至第四章的选定章节。另一方面，如果你熟悉数字化转型及其赋能技术的运作原理，我建议你按照下表阅读第二、三、四章的应用章节。


    | I. 转型焦点 | II. 技术焦点 | III. 应用焦点 |

    | --- | --- | --- |

    | ▪ 第 1.1 至 1.3 节 | ▪ 第 1.4 节 | ▪ 第 2.3 至 2.5 节 |

    | ▪ 第 5.1 至 5.9 节 | ▪ 第 2.1 和 2.2 节 | ▪ 第 3.3 至 3.5 节 |

    |   | ▪ 第 3.1 和 3.2 节 | ▪ 第 4.4 至 4.6 节 |

    |   | ▪ 第 4.1 至 4.3 节 |   |


    最后，祝愿你踏上一段愉快且引人入胜的数字之旅，探索我们这个时代最引人入胜的三大数字技术及其在工业、政治和社会中激动人心的应用和用例。我希望《数字素养》能将你的思维，从被晦涩难懂的行话所主导的模糊图景，转变为能为创新项目和新奇想法提供灵感的数字源泉。


    获取灵感，享受阅读。


    关于作者 脚注 1

    '
- fmt: '# 1. Digitalization and Digital Transformation


    `Digitalization` is a technological trend that is reshaping all sectors of our
    industry and society today. It is considered a major and inexorable driving force
    of innovation and disruption that challenges private and public organizations
    equally. With all economic and societal sectors being affected, digital economy
    is very dynamic and increasingly competitive. It empowers new startup ventures
    – backed by many billion dollars of venture capital – to create novel value propositions
    by leveraging digital technologies. Their highly scalable, data-driven, and software-centric
    operating models increasingly collide with incumbent companies and poise an existential
    threat to their business. Just think about `Apple`’s `iOS` and `Google`’s `Android`
    smartphones, for example. Built on a consistent digital platform, both companies
    attracted ever-expanding ecosystems of third-party app developers that ultimately
    caused `Nokia` to tumble from a position of phone industry dominance into irrelevance.
    This story is threatening to repeat everywhere across the economy: The cloud computing
    services of `Amazon`, `Microsoft`, and `Google` are challenging traditional software
    and hardware providers, the online marketplaces of `Amazon` and `Alibaba` are
    replacing traditional retailers and challenge companies like on-demand `Walmart`,
    and the video delivery services of `Netflix` and `Hulu` are about to disrupt traditional
    pay TV providers. Another very popular example is the online booking platforms
    `Airbnb` and `Booking.com` that leverage digital technologies to simplify booking
    and offer personalized and individually tailored travel experiences while disrupting
    the business of traditional hotel chains including `Marriott`, `Hilton`, and `Hyatt`.
    In order to capture the benefits of digital technologies, established organizations
    – independently of whether they operate in the public or private sector – are
    forced to incorporate them into their own ecosystem to advance their product and
    service portfolios through an organizational change process that is commonly referred
    to as digital transformation. This process of technology adaptation is particularly
    challenging for companies that were – in contrast to `Amazon`, `Google`, `Microsoft`,
    and others – not “born digital” since those companies need to undergo far-reaching
    business transitions that may well overturn established job designs and internal
    business processes and require novel ways of thinking and collaboration.


    Many organizations in the public and private sector do, however, struggle to understand
    the implications of digital technologies for their business and service models.
    Most business leaders and employees mistakenly believe that digitizing documents
    and using `Skype` or `Microsoft teams` rather than the mobile phone will automatically
    result in the digital transformation of their organization. But digital transformation
    – as we will learn throughout this book – is much more than the integration of
    digital technologies into existing organizational structures. Digital transformation
    is about creating an agile, open-minded, constantly learning, and innovating business
    culture that unleashes the potential of digital technologies – such as quantum
    computing, blockchain technology, and artificial intelligence – to increase productivity
    and competitiveness and to create sustainable value for customers and employees.
    By digitizing their “core,” that is, their most critical IT infrastructures, systems,
    and processes, organizations can remove traditional bottlenecks and enable unprecedented
    scalability and growth – digital is just an enabler and not a trendy end by itself.


    According to a recent survey on digital transformation by `McKinsey & Company`,
    more than 80% of the companies analyzed say that they have undertaken such transformative
    efforts in the past five years already. But only a marginal fraction of 16% confirm
    that they succeeded in improving performance and making their business less susceptible
    to disruption and bankruptcy in the long term [[1](#505424_1_En_1_Chapter.xhtml#Par203)].
    On the other hand, other business analysts have assessed the impact of digital
    transformation on jobs and employment and found out that almost 40% of current
    US jobs are in occupations that are likely to shrink [[2](#505424_1_En_1_Chapter.xhtml#Par204)]
    – similar figures can actually be found for other countries, too. On a global
    scale, this fraction translates into more than 75 million to 375 million workers
    that will need to switch their occupation and qualification skillset by 2030 in
    order to avoid unemployment [[3](#505424_1_En_1_Chapter.xhtml#Par205)] – a truly
    alarming scale. Those numbers impressively demonstrate that digital technologies
    will reshape and disrupt organizations including thousands of jobs on the medium
    and long term. This is why it is essential for us as thought leaders, consultants,
    investors, or employees to get ready for digitalization and advance our skills,
    qualifications, and knowledge about digital technologies by studying their basic
    principles and learning about their applications. We do not need to become a quantum
    physicist, blockchain programmer, or data scientist all together. But having an
    overview on the digital technology stack and understanding its operating principles
    and capabilities will allow us to follow those trends in media, comprehend innovative
    products and services, evaluate applications and potential use cases, and finally
    drive the digital transformation in our own professional environment. Digitalization
    basically forms a mandate for all of us to actively shape the digital future ahead
    of us.


    In this chapter, we will learn about the fundamental concepts of digitalization
    and digital transformation and better understand the nature and origin of their
    disruptive force. The presented concepts are the prerequisite for understanding
    quantum computing, blockchain technology, and artificial intelligence as the three
    most important technologies that enable and foster the digital transformation
    of organizations. But before we dive deep into those concepts, it is instructive
    to relate digital transformation to other historical transformations that have
    shaped our industry and society in the past.'
