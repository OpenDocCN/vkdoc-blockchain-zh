    | --- | --- | --- |

    | Focus | Legacy business – supports and enables mature core operations, such
    as logistics and production | Pilot projects – supports agile software development
    and drives experimenting with digital technologies |

    | Approach | Waterfall approach where software development flows sequentially
    from conception to testing with separate teams taking over in each phase | Experimental
    test-and-learn approach based on agile software development methodologies including
    scrum, rapid prototyping, and design thinking |

    | Team | Specialized experts with a narrow and clear task – this type of work
    is generally siloed | Highly interdisciplinary and mixed variety of people with
    different backgrounds in, for example, business, customer research, software and
    application development, etc. |


    ## 5.7 Establish an Open Innovation Culture


    Establishing an agile and open business culture is crucial for completing a digital
    transformation successfully. In this context, the term *business culture* refers
    to the collective capability of an organization to create value by innovation
    for its customers and employees, which is also why it is sometimes referred to
    as *innovation culture* in this particular context. Inspired by the MIT sociologist
    Edgar Schein – one of the world’s leading scholars in organizational culture –
    Clayton Christensen defines this integral part of any organization as follows:
    “Culture is a way of working together toward common goals that have been followed
    so frequently and so successfully that people don’t even think about trying to
    do things another way. If a culture has formed, people will autonomously do what
    they need to do to be successful” [[52](#505424_1_En_5_Chapter.xhtml#Par191)].
    In other words, culture is a unique combination of internal rules and workflows
    that allow employees to complete certain tasks that recur in their daily work
    frequently. The more often they solve the task successfully, the more instinctive
    the workflow becomes. A business culture is thus not created overnight but rather
    formed through repetition. In order to establish a new business culture successfully,
    it is consequently not enough to communicate what the culture is. Instead, the
    management of an organization – as a role model for its employees – needs to adhere
    to the culture and constantly reinforce it by making decisions and prioritizing
    projects that are in alignment with it. This is an important point to keep in
    mind when transforming a traditional and establishing a new innovation culture.


    ### 5.7.1 Establish an Open Innovation Culture: Adopt Agile at Scale


    While a traditional business culture is best suited for well-established business
    processes and the exploitation of existing revenue streams, digital innovation
    cultures are best in exploring new processes and creating new revenue streams
    based on digital technology. An open innovation culture fosters a much more agile,
    collaborative, and integrated approach to innovation with a strong customer- and
    product-centric view. Instead of relying on sequential, inflexible, and often
    slow product development processes, a digital culture cultivates the emergence
    of new ideas and empowers employees to deliver results faster by employing a less
    linear and more iterative approach to product development based on customer feedback.
    Using agile methodologies across the company – which is sometimes referred to
    as *agile at scale* [[57](#505424_1_En_5_Chapter.xhtml#Par196)] – is thus not
    a goal in itself but rather a means to an end.


    In addition, an open innovation culture motivates employees by giving them freedom
    and space to explore novel ideas in accord with Frederick Herzberg’s famous motivation
    theory^([^(148)](#fn148)) [[53](#505424_1_En_5_Chapter.xhtml#Par192)]. Eric Schmidt,
    Jonathan Rosenberg, and Alan Eagle once noted in this context:


    You need to [...] go beyond “traditional notion of managing [employees] that focuses
    on controlling, supervising, evaluating and rewarding/punishing” to create a climate
    of communication, respect, feedback, and trust. [...] The path to success in a
    fast-moving, highly competitive, technology-driven business world is to form high-performing
    teams and give them the resources and freedom to do great things [[46](#505424_1_En_5_Chapter.xhtml#Par185)]
    .^([^(149)](#fn149))


    ![../images/505424_1_En_5_Chapter/505424_1_En_5_Fig6_HTML.jpg](images/505424_1_En_5_Chapter/505424_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Five steps of the iterative design thinking process (gray circles)'
