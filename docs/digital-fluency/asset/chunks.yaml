  trans: '

    #### 主要驱动力：连接性


    从客户的角度来看，客户端的连接性指的是由以往各自为政的参与者开发的、完全互联的产品与服务。只需想想分别嵌入汽车导航和娱乐系统中的 `Google Maps`
    和 `Apple CarPlay` 即可。从公司的角度来看，连接性也可能指将越来越多的数字设备添加并互连到制造基础设施中，以实现预测性维护或用于自动化生产流程的工业物联网。因此，连接性可能指组织内部和外部的技术趋势。


    #### 主要驱动力：合规性


    对于处于高度监管生态系统中的组织而言，透明地管理与安全和质量相关的信息是合规性以及防范不当行为风险的关键组成部分。对记录某些业务流程（例如生产车辆安全气囊）的要求贯穿整个组织，这是因为法律法规和内部最佳实践迫使组织提升运营卓越性、组织性、清晰度、透明度及问责制。数字技术可以帮助实现信息透明化、增强整个价值链的可追溯性，并完整且不可篡改地记录业务流程。


    生态系统日益增强的连接性和复杂性，与另一个在当今媒体中持续备受关注的概念有着内在联系。这里指的是大数据这一术语。`大数据`指的是对规模过大或复杂到传统信息处理技术无法应付的数据集进行系统性收集和分析。该术语最早出现在
    1997 年由 NASA 研究人员 Michael Cox 和 David Ellsworth 撰写的一篇论文中，他们写道：“[数]据集通常非常庞大，对主内存、本地磁盘甚至远程磁盘的容量都构成了挑战。我们称之为大数据问题”
    [33]。随着 2004 年 Facebook 和 2005 年 YouTube 的登场与迅猛崛起，智能手机和其他移动设备全天候消费和创造数据的时代开始了。自那时起，通过万维网的月数据流量持续增长，并于
    2010 年达到每月 200 亿 GB。根据 GSMA 报告 [34]，四年后，移动连接数达到 72.2 亿，首次超过了地球上的人口数量。2018 年，全球各地的人们每分钟在
    YouTube 上上传超过 400 小时的视频。同年，全球每分钟还发送约 1.56 亿封电子邮件，并发布超过 45.2 万条推文，这相当于每天数据量增加超过
    1 泽字节或 `10²¹` 字节的数据^(¹⁴)——这真是一个令人叹为观止的大数据实例。


    大数据的分析通常需要使用统计方法来提取具有相关商业影响和经济价值的信息。大数据通常由三个 V 来表征：体量（Volume）、速度（Velocity）和多样性（Variety）。`体量`仅指数据量，而`速度`指数据生成的速度。`多样性`则表征了不同数据格式（如文本、音频、视频及其他数据类型）的可用性。^(¹⁵)


    从战略角度来看，如果严格避免数据泄露和滥用，大数据可以成为持久的竞争优势。赢得并维护客户信任是数据核心型及数字技术驱动型公司的核心。这在 2012 年《纽约时报》一篇题为《公司如何了解你的秘密》的热门文章中有所阐述
    [35]。记者讲述了这样一个故事：一位父亲去他常去的杂货店投诉，抱怨他十几岁的女儿奇怪地收到了婴儿用品优惠券。店经理道了歉，几天后又打电话再次道歉，却得知这个女儿实际上已经怀孕了。你可以想象，这家店最终不可挽回地失去了这位女儿顾客。


    #### 大数据


    大数据指的是组织日常收集的、庞大且多样化的数据集，可以通过挖掘获得有价值的洞察和信息，从而提供增值。它通过以下三个方面来描述：(1) 体量或规模，(2) 创建和收集数据的速度或速率，以及
    (3) 所涵盖数据点的多样性或范围。

    '
- fmt: '### 1.3.2 Digital Transformation Strategy


    These driving forces have important consequences for enterprises that like to
    adopt digital technologies since they will have to look beyond their existing
    business and operating models to find innovative and efficient ways to integrate
    them. Digital transformation thus far represents an end-to-end business transformation
    that fundamentally changes how an organization operates and delivers value to
    its customers. During this process, organizations are required to establish an
    operational change management as a core competency to manage the digital transformation
    – an aspect, which we will explore in Chapter [5](#505424_1_En_5_Chapter.xhtml),
    “Your Digital Action Plan,” in more detail. Jessica Goepfert at International
    Data Corporation observed in this context: “This [digital] transformation takes
    a different shape depending on the industry. For instance, within banking and
    retail [...] investments are all about managing and reinvigorating the customer
    experience. Whereas in manufacturing, firms are reinventing themselves to essentially
    be high tech companies, using their products as a platform to enable and deliver
    digital services” [[36](#505424_1_En_1_Chapter.xhtml#Par239)].


    So how should organizations react in light of the digital driving forces and technological
    trends outlined earlier? Before we have a closer look at the digital transformation
    strategies of Amazon, Google, and other corporations, it is worth introducing
    a classic debate that frequently arises at this point in literature. This debate
    paves the way to solving Clayton Christensen’s innovator’s dilemma discussed earlier
    and is about the mutual balance between exploitation and exploration [[37](#505424_1_En_1_Chapter.xhtml#Par240),
    [38](#505424_1_En_1_Chapter.xhtml#Par241)]. *Exploitation* refers to focusing
    on existing revenue streams and optimizing the operational excellence in established
    domains, while *exploration* is about finding and experimenting with new growth
    opportunities [[39](#505424_1_En_1_Chapter.xhtml#Par242)]. The famous Canadian
    academic and author on business and management Henry Mintzberg described this
    decisive balance from a strategic point of view and pointed out that business
    opportunities and strategy generally emerge from two different sources: (1) anticipated
    and planned as well as (2) unanticipated opportunities that usually arise when
    trying to implement an original plan or strategy. The first option became known
    as *deliberate strategy* and is suited best for exploiting existing revenue streams
    by analyzing unmet customer needs and designing future products and services accordingly.
    The second option is called *emergent strategy* and about exploring new opportunities
    and solving unanticipated problems. Strategy is almost always a combination of
    deliberate and unanticipated opportunities as it coalesces from numerous day-to-day
    decisions to pursue certain opportunities and prioritize the development of certain
    products and services in practice. This is why the founder and former CEO of Intel
    Andrew Grove once said, “If you want to know what a company’s strategy is, don’t
    listen to what they say, watch what they do.”


    A very strong focus on either of the two strategic directions poses risks. If
    companies focus too much on the exploitation of their existing (and historically
    successful) business activities, they neglect the need to explore new territory
    that may provide new business opportunities for them in future and enhance their
    long-term viability. This risk is commonly referred to as *success trap* [[40](#505424_1_En_1_Chapter.xhtml#Par243)].
    One very popular example in this context is the Swedish telecommunications company
    Nokia that has long been a long-time market leader in mobile phone sales but failed
    to migrate to touch screen technology on time that paved the way to modern smartphones
    [[41](#505424_1_En_1_Chapter.xhtml#Par244)].


    If companies primarily focus on the exploration of new business activities, on
    the other hand, they are threatened by the so-called *perpetual search trap* ,
    which refers to a company’s failure to scale and monetize early innovations. A
    frequently cited example in this context is the technology company Xerox, a large
    producer of office equipment in America. Engineers in their Xerox PARC lab close
    to the innovations hubs of Silicon Valley and Stanford University came up with
    seminal inventions like the computer mouse and graphical user interfaces long
    before Apple’s Macintosh in 1984\. Xerox did, however, fail to balance the potential
    of both technologies with a matching drive to exploit them in their existing products
    at that time. Instead, they openly showcased them to other business leaders including
    Steve Jobs, the legendary founder of Apple, who once noted on a product tour through
    Xerox PARC lab in this context: “You are sitting on a goldmine. Why aren’t you
    doing something with this technology? You could change this world!”


    Organizations that have been particularly successful in leveraging digital technology
    feature the ability to balance the two strategic directions. They exploit existing
    revenue streams by aligning their products and services consequently to today’s
    customer needs and demands while adapting changes in the environment by exploring
    and experimenting with new business opportunities. This is why economists also
    speak about *ambidextrous organizations* in this context [[42](#505424_1_En_1_Chapter.xhtml#Par245)].
    Ambidexterity and the ability to balance exploitation and exploration carefully
    is at the heart of every digital transformation as we see in the following example.


    A company that has been developing a very successful strategy to balance exploitation
    and exploration to continuously adapt their products and services to a constantly
    changing business environment is Microsoft, one of the worldwide leading advocates
    and proprietors of digitalization and digital technologies. In his keynote speech
    on the Microsoft Worldwide Partner Conference in 2016, Satya Nadella, the CEO
    of Microsoft, described digital transformation in terms of the following four
    basic pillars as shown in the inner circle of Figure [1-3](#505424_1_En_1_Chapter.xhtml#Fig3)
    [[43](#505424_1_En_1_Chapter.xhtml#Par246)]:


    1.  The *optimization of operations* includes the digitalization of internal business
    processes and often starts with transforming a company’s IT infrastructure to
    a platform-based architecture – we will discuss this measure further in Chapter
    [5](#505424_1_En_5_Chapter.xhtml), “Your Digital Action Plan.” The basis for any
    optimization is transparency about the status quo, which is the main aim of various
    digital technologies.


    2.  *Transforming products and services* is about advancing an existing product
    or service portfolio by integrating new technologies that create new business
    opportunities and revenue streams.


    3.  The *empowerment of employees* is crucial for a successful digital transformation.
    Employees need to be enabled to do their best work from anywhere, at any time,
    and on any device so that they are more effective and their efficiency and productivity
    increase. Furthermore, they need to be empowered to work autonomously and choose
    their projects according to their individual strengths and weaknesses, interests,
    work history, and qualifications.


    4.  Another prerequisite for a successful digital transformation is the *engagement
    with customers* by asking them for feedback and analyzing their responses to better
    understand their needs and personalize products accordingly. The expectations
    of customers define the products and services of tomorrow, which is why they broadly
    define the strategic direction and targets of any digital business transformation.'
