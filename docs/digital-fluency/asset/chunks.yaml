- fmt: 'Artificial intelligence flourished consecutively as computers could store
    more and more information and became faster, cheaper, and more accessible in academia.
    Early demonstrations, such as the simulation program called “General Problem Solver”
    developed by Allen Newell and Herbert Simon, showed great promise toward the goal
    of human problem solving. Another quiet entertaining and interactive software
    program was `ELIZA`, a natural language conversation program to demonstrate the
    superficiality of communication between humans and machines. This program was
    created by the German-American computer scientist Joseph Weizenbaum in 1966 and
    based on a technique called *pattern matching* [[14](#505424_1_En_4_Chapter.xhtml#Par253)].
    In this approach, the program was checking the input sequences for the presence
    (or absence) of certain text constituents or patterns, created a corresponding
    answer, and gave the users the illusion of understanding on the part of the program.^([^(86)](#fn86))


    `ELIZA` and other successful research projects motivated Marvin Minsky, one of
    the organizers of the seminal Dartmouth Summer School, to tell the *Life Magazine*
    in 1970 that “[...] from three to eight years we will have a machine with the
    general intelligence of an average human being.” Sadly, he was proven to be wrong,
    and funding as well as interest in this field soon soured in the following years,
    partly because the computers at that time were still comparatively expensive and
    their computational power and memory too limited to do anything substantial. The
    working memory of the `DEC PDP-11/45`, for example – the computer of choice for
    research at that time – could only be expanded to `128 KB`, more than `20,000`
    times less of the memory of your smartphone today. In consequence, more and more
    academics went from being optimistic about artificial intelligence to skeptical.
    Perhaps one of the most vocal skeptics was the American philosopher Hubert Dreyfus,
    who published his influential book *Alchemy and Artificial Intelligence* in 1965
    [[15](#505424_1_En_4_Chapter.xhtml#Par254)] and *What Computers Still Can’t Do:
    A Critique of Artificial Reason* in 1972 to set forth his ideas that artificial
    intelligence would woefully fall short of its lofty expectations [[16](#505424_1_En_4_Chapter.xhtml#Par255)].
    Since the enthusiasm for artificial intelligence began to wane in the early 1970s,
    the years between the mid-1970s and mid-1990s became known as the “AI Winters.”


    But even during this frosty time, there continued to be some innovations. One
    of them is *expert systems* that emerged in the 1980s and 1990s, triggered by
    the explosive growth of low-performance personal computers during this period.
    Expert systems emulate the decision-making ability of a human expert based on
    a large database that was structured by simple `if-then-else` statements,^([^(87)](#fn87))
    a concept called *symbolic logic* that had been developed by Marvin Minsky before.
    Expert systems held the promise to learn from occupational domain experts, such
    as doctors, engineers, and lawyers. They captured this knowledge in their database
    to solve specific problems in finance or automobile manufacturing, for example,
    and make the knowledge available to a broader set of practitioners. Although being
    often narrow and difficult to apply across other business categories, expert systems
    soon turned into a billion-dollar industry. A good example is `MYCIN`, an early
    expert system for diagnosing medical infections that was developed in the mid-1970s
    at Stanford University [[17](#505424_1_En_4_Chapter.xhtml#Par256)]. Users were
    required to provide answers to various questions. Equipped with more than `600`
    rules, `MYCIN` then analyzed those answers by logic reasoning, identified the
    type of bacteria causing the medical problem, and recommended probate antibiotics,
    with the dosage adjusted for the patient’s body weight. `MYCIN` had an accuracy
    rate of `69%` and was remarkably claimed to be more effective than junior doctors
    [[18](#505424_1_En_4_Chapter.xhtml#Par257)]. Nevertheless, this program was never
    used in a clinical setting, but it is an excellent example for an early expert
    system and predecessor of modern machine learning.


    ### IBM’s Legendary Projects Deep Blue and Watson


    Ironically, in the absence of governmental funding, artificial intelligence got
    reignited after the AI winters again driven by two major forces. First was Moore’s
    law in action, that is, the rapid improvement of computational power (see Section
    1.4.3). Second , the growth of the Internet triggered an explosive growth in data
    from millions to billions of consumers that was suddenly available and urged for
    analysis. After more than ten years of research and development on expert systems
    and parallel computing, IBM presented its chess playing computer “Deep Blue.”
    Deep Blue was equipped with `256` parallel processors that could examine `200`
    million possible moves per second [[19](#505424_1_En_4_Chapter.xhtml#Par258)].
    In 1996, Deep Blue hit the title pages of various newspapers as it defeated the
    legendary Russian chess master Gary Kasparov. This highly publicized media event
    was reportedly the first time that a computer program outplayed a reigning world
    chess champion, which was an important step toward an artificially intelligent
    decision-making program. Deep Blue did, however, play chess on an entirely different
    way than you or any other intelligent human does. It was just programmed with
    the well-defined rules of chess and a clear goal, namely, taking out the opponent’s
    king. Based on this rules-based programming, the computer analyzed every possible
    move it could make and every response the opponent could make subsequently – an
    approach that was first described by the American mathematician Claude Shannon
    in 1950 [[20](#505424_1_En_4_Chapter.xhtml#Par259)]. By searching this tree of
    potential moves, the computer typically looked at `8` and up to `30` moves ahead
    to choose the best possible move in each round. Rules and logic were still the
    most important ingredients for creating intelligent machines at that time.


    But further to rules and logic, humans play chess by pursuing conceptual ideas,
    too, such as “controlling the center” or “attacking from the right” and learn
    from experience. Imagine your child is learning to walk in order to better understand
    this fundamental difference. For this purpose, you do actually not tell your child
    to stand up, balance appropriately, and take one step after the other carefully.
    Children rather watch their parents walking, imitate their behavior, and learn
    from their own experiences based on a try-and-error approach. The pain they experience
    if they fall in consequence of a lapse step causes the associated synaptic weights
    to get weaker. Others are strengthened through training over time and the child
    occasionally learns to walk safely. Teaching a child how to walk by writing down
    instructions is nearly impossible since most of the knowledge we have is tacit,
    that is, we cannot fully explain it. In other words, we all know more than we
    can tell, which became known as *Polanyi’s paradox* named in honor of the Hungarian-British
    philosopher and polymath Michael Polanyi [[21](#505424_1_En_4_Chapter.xhtml#Par260)].'
