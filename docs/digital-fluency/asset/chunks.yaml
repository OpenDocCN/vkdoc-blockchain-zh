- fmt: '# Types of Qubits: Trapped Ion Qubits


    A technique that has been used for various proof-of-principle experiments in the
    past is `ion traps`. Developed by the German physicists and later Nobel laureates
    Wolfgang Paul and Hans Georg Dehmelt in 1950 [[21](#505424_1_En_2_Chapter.xhtml#Par217)–[23](#505424_1_En_2_Chapter.xhtml#Par219)],
    ion traps confine a chain of isolated and electrically charged atoms – so-called
    `ions` – in a vacuum tube by a magnetic field. The magnetic field is typically
    generated by four cylindrical rods that carry an oscillatory electric current
    and induce an alternating magnetic field with changing polarity. Since this polarity
    typically changes with the same frequency than old radios, the resulting magnetic
    field is called `radio frequency` of simply `RF field`.


    The qubit `|0〉` is conventionally associated with the energetically lowest and
    thus most preferential state of the ion. This ground state ion can be excited
    by an incident beam of intense laser light to form an electrically positive ion
    that is associated with the qubit `|1〉`. This transition from the ground state
    to the excited state `|0〉 → |1〉` is just one example for a quantum logic gate
    that involves one qubit only. Multi-qubit operations, such as the superposition
    and entanglement of qubits, can be induced by coupling the ground and excited
    state of two or more adjacent ions to their motion around the ion trap’s symmetry
    axis [[15](#505424_1_En_2_Chapter.xhtml#Par211)]. These so-called `quantized normal
    modes` are collective mechanical oscillations of the ion ensemble similar to the
    swinging pearls of a necklace, in which the binding between two adjacent ions
    (pearls) is provided by their electric repulsion.^([^(34)](#fn34)) However, the
    qubits stored in such `Paul traps` turned out to have very small coherence times,
    which is why scientists nowadays use an elaborate combination of magnetic and
    electric fields, an arrangement that is called `Penning trap` after its Dutch
    inventor Frans Penning [[24](#505424_1_En_2_Chapter.xhtml#Par220)–[26](#505424_1_En_2_Chapter.xhtml#Par222)].


    With respect to their application in quantum computers, trapped ions have the
    main advantage of being three dimensionally confined in free space and well isolated
    from their environment as they rest in vacuum. Hence, ion qubits reveal by far
    the longest coherence times that have been measured so far, which is why they
    are still used in science and basic research to study superposition and entanglement
    in well-defined and isolated qubit systems.


    As of 2018, the largest number of particles to be controllably entangled amounts
    to 20 trapped ions [[27](#505424_1_En_2_Chapter.xhtml#Par223)]. With respect to
    the DiVincenzo criteria, the main disadvantage of this qubit implementation scheme
    is its poor scalability since a chain of ions becomes more and more difficult
    to control with increasing length. The majority of the ion traps used for quantum
    computing today rely on a microchip architecture that is compatible with state-of-the-art
    microelectronics and capable of confining and controlling ion qubits at cryogenic
    temperatures with very high accuracy [[28](#505424_1_En_2_Chapter.xhtml#Par224)].


    # Types of Qubits: Electron Spin Qubits


    The history of electron spin qubits is inseparably linked to the rise of modern
    semiconductor physics and technology [[29](#505424_1_En_2_Chapter.xhtml#Par225)].
    A semiconductor is a material that conducts electrical currents – carried by electrons
    – better than electrical insulators, such as glass, but worse than electrical
    conductors, such as copper and other metals. The technologically most important
    semiconductor is `silicon`, which is produced industrially by melting quartz sand
    and removing the oxide from the 2,273 K hot melt. The silver-colored silicon obtained
    from this process typically contains low concentrations of other chemical elements
    that are technically called `impurities`. One particular interesting impurity
    is the chemical element phosphorus since this chemical element or atom reveals
    both a resulting nuclear and electron spin.


    This impurity in silicon attracted the attention of the American physicist Bruce
    Kane in 1998 and inspired him to propose an innovative approach to silicon-based
    quantum computing [[30](#505424_1_En_2_Chapter.xhtml#Par226)]. His approach was
    highly influential as it seems to be consistent with state-of-the-art silicon
    microelectronics, the predominant technology to fabricate microchips at that time.
    The `Kane model` is based on an array of phosphorus atoms embedded in a pure silicon
    substrate as host material. It allows for encoding qubits in the phosphorus nuclear
    spins, while superposition and entanglement between two or more adjacent phosphorus
    atoms is mediated by natural interactions between the nuclear and electron spins
    of a phosphorus atom.


    **Table 2-1: Advantages and disadvantages of the most popular approaches to quantum
    computing.** The quality factor measures the error rate and noise level for single-
    or multi-qubit operations.


    | Type of Qubit | Coherence Time (Max) | Advantages | Disadvantages |

    | --- | --- | --- | --- |

    | Trapped ion | 10 s [[32](#505424_1_En_2_Chapter.xhtml#Par228)] | + Long coherence
    time+ Well-isolated ions+ High-quality factor+ High individual control | – Poor
    scalability |

    | Electron spins | 60 ms [[33](#505424_1_En_2_Chapter.xhtml#Par229)] | + Medium
    coherence time+ Medium scalability | – Medium-quality factor– Medium individual
    control |

    | Superconducting qubits | 4 μs [[34](#505424_1_En_2_Chapter.xhtml#Par230)] |
    + Good scalability+ Large-scale integration+ High individual control | – Short
    coherence time– Low-quality factor |


    Close to the appearance of Bruce Kane’s quantum computing scheme, the two American
    physicists David Loss and David DiVincenzo proposed to spatially confine single
    electrons in certain silicon substrates by an array of metallic electrodes [[31](#505424_1_En_2_Chapter.xhtml#Par227)]
    – a device architecture that is commonly referred to as electrostatically defined
    `quantum dot`.^([^(35)](#fn35)) Depending on whether we apply a positive or negative
    voltage, these gate electrodes either attract or repel the negatively charged
    electrons and facilitate their motion control. Placed in an external magnetic
    field, such quantum dots allow for confining and controlling single-electron spins
    to implement certain quantum logic gates. Their main advantages and disadvantages
    with respect to the DiVincenzo criteria are compiled in Table [2-1](#505424_1_En_2_Chapter.xhtml#Tab1).
    Although both approaches about employing electron spin qubits in silicon are not
    very likely to be used for large-scale quantum computing, they are very important
    device structures for basic quantum research.


    ![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig7_HTML.png](images/505424_1_En_2_Chapter/505424_1_En_2_Fig7_HTML.png)


    **Figure 2-7:** Formation of a Cooper pair in a superconducting material. Electron
    “1” locally distorts the regular atom lattice of the superconductor. Electron
    “2” is attracted by this distortion (dotted arrow) as this is the energetically
    more favorable place to be in the lattice. The first electron therefore drags
    the second one along with it as it moves through the lattice. The linkage between
    the two electrons is called Cooper pair.'
