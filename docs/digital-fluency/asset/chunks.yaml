  trans: '

    #### 商用系统：量子模拟器


    `量子模拟器`是最原始的量子计算机类型[58]，其历史可追溯到 1981 年，当时理查德·费曼在加州理工学院发表了著名的“计算讲座”[59]。他当时思考的问题是：能否在经典计算机上高效模拟量子力学系统（例如超导体中的库珀对集合）[14]。通过分析，他证明采用量子力学效应的计算机可以指数级速度模拟某些量子系统，远超经典计算机[60]，因此这种量子计算方法自此被称为`量子模拟器`。


    如今，该术语通常指具备足够能力模拟量子计算机某些特性的经典计算硬件栈。量子模拟器主要用于学术界，因其能够探索物理、化学、生物学和材料科学等领域的基础问题与量子现象。此外，量子模拟器还可用于优化
    QPU 并验证其结果，这对新型量子算法与软件的开发尤为重要。


    #### 商用系统：通用量子计算机


    `通用量子计算机`是功能最强大、应用最广泛的量子计算机，但遗憾的是，它也是目前最难构建的类型。由于大规模物理实现与运行面临重大技术挑战，这类机器目前尚未问世，甚至在近期内也难以实现。在此背景下，文献区分了`含噪中等规模`与技术更先进的`全纠错`（或容错）量子计算机。全纠错通用量子计算机可能需使用超过
    10 万个量子比特，以快速解决任意极大复杂度的计算问题。谷歌、IBM、霍尼韦尔、阿里巴巴和亚马逊的通用量子计算机均属于含噪中等规模量子计算机类别，其应用范围与全纠错系统相比相对有限。


    ```

    ![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig11_HTML.png](img/505424_1_En_2_Fig11_HTML.png)

    ```


    图 2-11


    IBM 五量子比特特内里费量子处理器的架构设计。其核心是五个容纳电荷量子比特的超导岛。这些量子比特可通过波导谐振器相互作用，从而促进叠加与纠缠量子比特态的形成。读出与控制触点则用于电荷量子比特的初始化和测量。


    最早的一个系统是图 2-11 中所示的 IBM 五量子比特特内里费 QPU。该系统由五个容纳超导电荷量子比特的岛组成。这些量子比特与在`波导谐振器`内传播的单光子发生强相互作用，从而促进相连岛上两个超导电荷量子比特之间的叠加与纠缠。^(⁴³)
    尽管这一早期器件设计实现了多项原理验证实验，但因其量子比特-光子相互作用难以实现高保真度和高质量控制，最终被证明噪声较大，不太适合大规模实现。


    因此，科学家们开发了第二种通用量子计算机的方法，即利用库珀对集合（而非单个库珀对）来编码超导电荷量子比特。这些`transmon 量子比特`不易发生退相干[61,
    62]，并且能够实现更大的多量子比特系统。它们通常被实现在一种称为`门模型超导电路`[63, 64]的器件架构上。


    ```

    ![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig12_HTML.png](img/505424_1_En_2_Fig12_HTML.png)

    ```


    图 2-12


    谷歌 Sycamore QPU 的架构设计——为简化起见，整体布局从 54 个量子比特缩减至 8 个。一个由十字形超导岛组成的二维阵列容纳着 transmon
    量子比特，这些量子比特可通过一组耦合器实现量子力学隧穿相互作用。特殊的初始化端口便于将库珀对注入岛中。基于叠加与纠缠的量子逻辑门通过微波脉冲实现，分别用于单量子比特门和多量子比特门的实现。

    '
- fmt: "# 排版后的内容\n\n By far the most popular device in this context so far is Google’s\
    \ 54-qubit “Sycamore” `QPU` that was developed by a research team lead by the\
    \ American and worldwide leading quantum physicist John Martinis and presented\
    \ to the public in late 2019\\. Its principal device architecture is shown in\
    \ Figure [2-12](#505424_1_En_2_Chapter.xhtml#Fig12) schematically and was reduced\
    \ to 8 qubits for simplicity.^([^(44)](#fn44)) Like any other `QPU`, the `Sycamore`\
    \ processor is mounted on the bottom stage of a dilution refrigerator and operated\
    \ at cryogenic temperatures. The device comprises a two-dimensional array of cross-shaped\
    \ superconducting islands hosting 54 transmon qubits in total. The different islands\
    \ are interconnected by 88 couplers in total (4 Josephson junctions per island)\
    \ that allow for quantum mechanical tunneling of transmons from one to another\
    \ island and thus enable superposition and entanglement. Different quantum logic\
    \ gates are implemented by microwave pulses that drive spin-flip processes of\
    \ individual or multiple qubits. All of this happens in about 25 ns for single-qubit\
    \ and 12 ns for multi-qubit gates.\n\nThe `Sycamore` `QPU` was subject to controversial\
    \ discussions in late 2019 when Google claimed that their chip reached quantum\
    \ supremacy for the first time in history [[3](#505424_1_En_2_Chapter.xhtml#Par199)]\
    \ and was thus capable of solving a computational problem much faster than a classical\
    \ multicore supercomputer. The term “quantum supremacy” was coined by the Caltech\
    \ physicist John Preskill in 2012, who defined quantum supremacy in terms of performing\
    \ “[...] tasks with controlled quantum systems going beyond what can be achieved\
    \ with ordinary digital computers” [[65](#505424_1_En_2_Chapter.xhtml#Par261)].\
    \ The achievement of quantum supremacy is reckoned to be a central milestone on\
    \ the way toward the realization of the worldwide first universal quantum computer\
    \ since then.^([^(45)](#fn45)) However, Google’s claim has to be interpreted mindfully\
    \ as they solved a highly specialized computational problem. Broadly speaking,\
    \ the research team around John Martinis at Google Research^([^(46)](#fn46)) in\
    \ Mountain View, California, generated a string of purely random numbers in just\
    \ about 200 s and argued that a classical computer would take more than 10,000\
    \ years for the same task. Scientists of IBM soon objected that a classical computer\
    \ would just need 2.5 days, which would reduce Google’s feat to demonstrating\
    \ a quantum “advantage.” Furthermore, IBM argued that the problem has been selected\
    \ intentionally and “customized” in order to demonstrate quantum supremacy only.\
    \ Generating random numbers is basically extremely hard for classical computers,\
    \ which is why random numbers generated by classical computers are correctly called\
    \ “pseudo-random,” but fairly easy for quantum computers due to the probabilistic\
    \ randomness inherent in quantum mechanics. Another argument IBM’s scientists\
    \ put forward was about quantum supremacy itself. They argued that this concept\
    \ is not very meaningful in general because not every quantum algorithm has an\
    \ equivalent classical algorithm that is capable of solving the same computational\
    \ task – a strict comparison is thus not possible.\n\nFor this reason, IBM promoted\
    \ another performance measure that has been developed by their research team in\
    \ 2018 and allows for a more representative comparison of quantum computers. This\
    \ metric for measuring and comparing the performance of quantum computers is called\
    \ `quantum volume` [[66](#505424_1_En_2_Chapter.xhtml#Par262)] and considers the\
    \ coherence time, error rates, and other parameters to assess a quantum computer’s\
    \ overall performance [[67](#505424_1_En_2_Chapter.xhtml#Par263)]. The `quantum\
    \ volume` performance measure has not been adopted broadly by the scientific community\
    \ yet. Most researchers do, however, agree that a quantum computer can only be\
    \ supreme over a classical computer if it utilizes superposition and entanglement\
    \ as a computational resource to parallelize different computation steps.^([^(47)](#fn47))\
    \ In consequence, any device that is not employing those quantum effects should\
    \ not be considered as a universal quantum computer. Google’s supremacy claim\
    \ is – by no doubt – a milestone from a technological point of view since no company\
    \ has built and successfully controlled a larger number of transmon qubits in\
    \ a single `QPU` yet. The `Sycamore` processor has been made accessible through\
    \ Google’s cloud computing service and thus holds great promise for a large range\
    \ of applications in industry.\n\nAnother very promising device design for a universal\
    \ quantum computer has been presented by a team of more than 100 scientists, engineers,\
    \ and software developers working with the American technology giant Honeywell\
    \ in mid-2020 [[36](#505424_1_En_2_Chapter.xhtml#Par232)]. Their `QPU` design\
    \ is called `trapped-ion quantum charge-coupled device` and allows for confining\
    \ a one-dimensional chain of ions that levitate above a microchip architecture\
    \ similar to a chain of ions in a Pauling trap. Honeywell’s device uses ytterbium-171\
    \ ions as qubits and barium-138 ions for sympathetic cooling.^([^(48)](#fn48))\
    \ The ion qubits (charge state and motional states) can be controlled with more\
