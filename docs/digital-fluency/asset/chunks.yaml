  trans: '

    自发现以来，量子力学叠加原理已在多种现实实验中得到验证和观测。为了更好地理解这一极为重要的物理原理，有必要了解一个最具代表性的实验，该实验通过量子力学概率波的叠加进行了解释。这个实验被称为***双缝实验***，由英国医生兼物理学家托马斯·杨于
    1802 年首次进行[7]。他的实验装置将光源（由太阳发出）射向一张带有两条极窄狭缝的硬纸板。光子穿过狭缝后落在探测屏幕上，屏幕的亮度用于衡量每个位置的光子数量。如果光子是由经典力学描述的宏观物体，比如弹珠——你小时候可能玩过的那种小玻璃球——它们会穿过纸板上的第一条或第二条狭缝。因此，探测器会在两个区域之一探测到弹珠，如图
    2-2 (a)中两个峰值所示。


    但由于光子是量子力学物体，托马斯·杨观察到的情况完全不同。他并未在仅两个区域探测到光子，而是在所有可能的区域都探测到了光子，其中计数最大值出现在恰好位于两条狭缝中间的区域。因此，亮度呈现出一种复杂的曲线图案，即所谓的***干涉图样***，如图
    2-2 (b)中黑色实线所示。托马斯·杨起初无法相信这一观测结果，认为实验装置可能存在问题。但由于这种图案没有变化，并且被发现取决于纸板上两条狭缝之间的距离，他最终相信了自己的观测，并将该结果解释为光波根据纸板上的特定位置，会相互交替地抵消和增强。物理学家分别用***相长干涉***和***相消干涉***这两个术语来指代波的关键性质。在量子力学中，这种干涉图样对应于分别穿过第一条和第二条狭缝的两个波函数的叠加。后来，使用电子[8]（携带电流的粒子）以及其他更大的量子力学物体进行的双缝实验，也得出了相同的主要结果。这一观测结果的意义相当显著：量子力学物体似乎同时既是粒子又是波——既是弹珠又是光子。这就是著名的***波粒二象性***，它是叠加原理的直接结果，也是量子计算机所采用的另一个非常基本的性质。


    ## 波粒二象性


    波粒二象性是指量子力学物体同时表现出粒子和波的行为的自然现象。根据具体的实验，量子力学物体既会表现出粒子的典型性质，例如能量和质量的量子化，也会表现出通常归因于波的性质，例如叠加和干涉。


    但量子力学还蕴含另一个惊喜，即***纠缠***，这可能是当今量子计算机所利用的最神秘但也同样至关重要的现象。要最好地描述纠缠现象，首先需要更仔细地研究基本粒子的一个特殊性质。例如，光子表现出一种奇特的性质：它们总是绕着自身旋转（转动）。这种性质被称为***圆偏振***，可以类比为足球——一旦被踢到空中，它总是绕着某条轴线自转。圆偏振光可以表现为左旋圆偏振或右旋圆偏振，在狄拉克符号中分别用`|↺〉`和`|↻〉`表示。事实证明，圆偏振光可以由一种称为***非线性晶体***的特殊固体材料非常容易地产生。如图
    2-3 示意性地所示，这些晶体将入射的激光束²⁹分成两束独立的光束*A*和*B*。如果我们反复从光束*A*和光束*B*中各取出一对光子，并测量它们的偏振态，我们会得到一个惊人的发现：这对光子会呈现出随机但始终相反的偏振态，即分别是`|↺〉`和`|↻〉`。由于历史原因，这样的光子对被称为爱因斯坦-波多尔斯基-罗森对，或简称为***EPR
    对***，因为这三位物理学家在使用它们进行以下思想实验以展示量子力学的惊人后果时，曾为此进行了激烈的讨论。


    设想我们在空旷空间中用一块非线性晶体生成一个 EPR 对，并使用一组反射镜将它们射向相反方向。由于光子以接近 30 万公里/秒的光速传播，只需几分钟，这两个光子就会被一个难以想象的巨大距离隔开。现在想象我们取其中一个光子，比如光子*A*，并测量其偏振态为左旋。这个结果对光子*B*意味着什么？好吧，由于
    EPR 对中的光子总是表现出相反的偏振态，我们无需测量就知道光子*B*的偏振态必定与光子*A*相反，因此是右旋！这令人震惊，因为似乎存在一种非常奇怪的相互作用，告诉光子*B*，光子*A*的偏振态已被测量为左旋。这尤其怪异，因为这种相互作用是瞬时发生的，尽管——你可能还记得高中知识——没有任何东西能超过光速。换句话说，光子*A*不可能瞬间与光子*B*交换任何关于其偏振态的信息。那么，为什么描述光子*B*偏振态的波函数会突然坍缩，即使我们并没有测量它？阿尔伯特·爱因斯坦同样对这个结果感到惊讶，并将这种现象称为“幽灵般的超距作用”，因为他无法相信
    EPR 对具有这种非常反直觉的性质。与光子的偏振类似，电子一旦被置于外部磁场中，也会绕着彼此旋转。由于历史原因，这种性质不叫偏振，而是被称为（电子）***自旋***。在从北极指向南极的磁场中，电子会相对于磁场方向向左或向右自旋，如图
    2-4 所示。如果它们向左自旋，其自旋状态称为***自旋向上***，用符号`|↑)`表示。相应地，向右自旋的电子称为***自旋向下***，用符号`|↓〉`表示。事实证明，两个电子*A*和*B*的自旋也可以纠缠。针对此类
    EPR 电子的实验也确实揭示了这种幽灵般的超距作用。

    '
- fmt: '![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig4_HTML.png](images/505424_1_En_2_Chapter/505424_1_En_2_Fig4_HTML.png)


    **Figure 2-4**


    The peculiar behavior of electrons in the earth magnetic field. Electrons – in
    analogy to footballs in the air – turn around themselves either to the left (spin-up)
    or to the right (spin-down). The physicists write `|↺⟩ = |↑⟩` and `|↻⟩ = |↓⟩`,
    respectively.


    ![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig3_HTML.png](images/505424_1_En_2_Chapter/505424_1_En_2_Fig3_HTML.png)


    **Figure 2-3**


    Generation of an entangled pair of polarized photons A and B by a nonlinear crystal
    excited by a laser beam. Without measuring the polarization of either of the photons,
    you cannot tell the polarization of each of them. You can only tell from quantum
    mechanics that the two photons have an opposite polarization.


    In other words, entanglement does somehow “connect” or “intertwine” the quantum
    mechanical spin states of two (or more) electrons so that they depend on each
    other forever. Physicists usually label the overall state of two entangled electrons
    *A* and *B* with opposite spins with the symbol `|ψ⟩` (after the Greek letter
    “psi”) and write in Dirac notation.


    ![$$ \mid \psi \Big\rangle =\underset{1^{st}\;\mathrm{term}}{\underbrace{\alpha
    \cdot \mid \uparrow \left\rangle {}_A\mid \downarrow \right\rangle {}_B}}+\underset{2^{nd}\;\mathrm{term}}{\underbrace{\beta
    \cdot \mid \downarrow \left\rangle {}_A\mid \uparrow \right\rangle {}_B.}} $$](images/505424_1_En_2_Chapter/505424_1_En_2_Chapter_TeX_Equ2.png)


    **(2.2)**


    to describe that either electron *A* is spin-up and *B* spin-down (first term)
    or electron *A* spin-down and *B* spin-up (second term).^([(30)](#fn30)) The respective
    probabilities are described by two state amplitudes *α* and *β* similar to the
    superposition in Equation [2.1](#505424_1_En_2_Chapter.xhtml#Equ1).


    Another and probably much more vivid way to illustrate this weird quantum effect
    is by comparing an ordinary ebook, such as the digital version of this one, to
    a fictitious “quantum book.” While the information in an ebook is encoded in bits,
    the content of a quantum book is encoded in entangled qubits. This has major consequences
    with respect to your reading experience through the following argument. The content
    of an ebook can easily be learned by reading one page at a time whenever you like.
    But having a look on individual pages of a quantum book will just reveal random
    noise with very little content of information since its stories are not recorded
    on different pages but rather in complex correlations among them – the different
    pages are simply entangled. Hence, in order to comprehend an entire quantum book,
    you will have to read collectively many pages at once while recognizing the complex
    correlations among them – a truly stressful reading experience as you can imagine.


    This vivid illustration of entanglement concludes our brief excursion into the
    weird world of quantum mechanics. In this section, we have discussed a couple
    of very striking and spooky phenomena of modern quantum mechanics, each of which
    is exploited in quantum computing today. Please be reassured if the one or other
    aspect of quantum mechanics confuses you since you are certainly not alone. Richard
    Feynman once described quantum mechanics as follows: Quantum mechanics is the
    description of the behavior of matter and light in all its details and, in particular,
    of the happenings on an atomic scale. Things on a very small scale behave like
    nothing that you have any direct experience about. They do not behave like waves,
    they do not behave like particles, they do not behave like clouds, or billiard
    balls, or weights on springs, or like anything that you have ever seen [[9](#505424_1_En_2_Chapter.xhtml#Par205)].
    Furthermore, he later noted in his famous messenger lecture on quantum mechanics
    at Cornell University in 1964 that “I think I can safely say that nobody understands
    quantum mechanics.”


    ## Entanglement


    Entanglement refers to a natural phenomenon in quantum physics that occurs when
    two or more quantum mechanical objects, such as photons and electrons, are generated
    together (or interact with each other) such that their individual quantum states
    cannot be described independently from each other anymore. In other words, a measurement
    on the first object determines the outcome of measuring the second one. This phenomenon
    has no classical analog and can even be observed if the entangled objects are
    separated from each other spatially by very large distances.


    With this knowledge about the uncertainty principle, superposition, entanglement,
    as well as polarizations and spins, in particular, we do now have everything at
    hand to understand how quantum computers operate and why they are capable of outperforming
    state-of-the-art supercomputers in terms of computational performance and speed.'
