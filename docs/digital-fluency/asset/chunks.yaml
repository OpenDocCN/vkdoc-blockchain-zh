  trans: '

    #### 当前商业应用：量子密码学


    面对量子计算机带来的网络安全威胁，另一个好消息是：量子信息处理本身提供了一种恰当而强大的技术，可用于采取有效对策来提升网络安全。这一激动人心的研究领域被称为*量子密码学*，它本身与量子计算并无直接关联，但同样利用量子比特（qubits）来编码信息，并借助叠加态和纠缠等量子资源进行处理。量子密码学在工业领域有着多种应用，因此值得简要提及与介绍。量子密码学专注于以量子比特编码的信息交换，而量子计算则侧重于用量子逻辑门处理这些信息。例如，政府机构和银行正越来越多地使用它来安全地远距离交换高度敏感的信息，比如机密的产品或客户数据。


    量子密码学的基本思想源于美国物理学家斯蒂芬·威斯纳的开创性工作。他在 1983 年展示了如何通过将信息编码在由光子偏振态形成的*光学量子比特*中，进行光学传输
    [102]。一年后，分别就职于 IBM 托马斯·J·沃森研究中心和蒙特利尔大学的两位物理学家兼计算机科学家——查尔斯·贝内特和吉勒·布拉萨德——完善了这一方案，并提出了一种具体的安全信息传输方法
    [103]，该方法后来被命名为`BB84`编码方案以纪念他们。在其最广为人知的版本中，该方案涉及两方，传统上称为“爱丽丝”和“鲍勃”，他们希望安全地共享一条消息，而第三方“伊芙”则试图窃听并获取消息中包含的信息。在不深入细节的情况下，`BB84`方案依赖于量子力学的一个固有特性：对量子比特的任何测量都会导致其整体波函数坍缩，从而改变其状态。一旦伊芙试图窃听交换中的量子比特，她最终将不可逆地改变编码信息——因此，由于量子力学奇特的性质，她的窃听企图注定会失败。这个例子表明，如果你知道如何利用量子效应，它们会非常有用。


    ### 2.3.3 未来挑战


    量子计算机已被应用于广泛的商业领域。目前所有最先进的量子计算机都是嘈杂中型量子计算机（noisy intermediate-scale quantum computers）或`NISQ`系统，通用的量子计算机尚未实现。因此，该领域的研究人员继续寻找创新的量子比特实现方案和设备，以提供更长的退相干时间和更好的可扩展性，从而偶尔能构建大规模、容错的通用量子计算机。


    微软一直在研究一种非常有前景的方法来构建此类系统，这种方法有时被称为*拓扑量子计算* [104, 105]。拓扑学是数学的一个分支，描述了几何物体在特定变形（如弯曲、拉伸、扭曲而不撕裂或粘合）下保持不变的性质。当应用于量子计算时，拓扑量子比特是类似粒子的物体——即所谓的*任意子*——它们产生于大量电子集群内部的相互作用。这种电子集群通常形成于二维平面内两种材料的界面上，并允许拓扑量子比特在这个所谓的*二维电子气*中跨越多个电子态延伸。这使得它们对环境变化和噪声引起的退相干具有极强的鲁棒性，这就是俄裔美国物理学家阿列克谢·基塔耶夫在
    1997 年首次建议将其用于量子计算的原因 [106]。他的工作基于对这种奇异物质态的理论研究，该研究可以追溯到三位英国出生的诺贝尔奖得主物理学家：迈克尔·科斯特利茨、大卫·索利斯和邓肯·霍尔丹
    [107]。*马约拉纳粒子*，一种由意大利物理学家埃托雷·马约拉纳于 1937 年首次假设的特定类型任意子，最近也被提议用于量子比特。它们已在一维碳纳米管和二维石墨烯片中被观测到，这两种非常有前景的材料很可能适用于拓扑量子计算的物理实现。

    '
- fmt: '与其致力于建造一台可能在几个世纪后才能实现的、通用的、完全纠错的量子计算机，许多研究人员转而专注于利用当今可用的、有噪声的小型量子计算机所能完成的任务。各种策略已被开发出来，并正处于深入研究中。一项特别有前景的策略于2014年提出，称为`variational
    quantum eigensolver`（变分量子本征求解器）[[108](#505424_1_En_2_Chapter.xhtml#Par304)]，该方法利用经典计算机来迭代优化对噪声量子计算机的猜测。量子力学猜测可能涉及旅行商的最短路线、空气动力学机翼的最佳形状，或基于蛋白质的药物中分子的三维排列。一旦经典计算机确定了其最佳猜测，结果将被反馈给量子计算机，后者通过采样来搜索附近更优的选项。此迭代过程持续进行，直到找到最优解。这是一种处理当前最先进量子计算机噪声特性的非常便捷的方式，尤其是考虑到科学家们如果仅依靠经典计算机进行模拟，将不得不做出颠覆性的近似。一种类似的方法，称为`variational
    quantum factoring`（变分量子因式分解），已被开发用于在`NISQ`硬件上分解大数[[109](#505424_1_En_2_Chapter.xhtml#Par305)]，但这条路径尚未在物理上实现。通过在同一台有噪声的量子处理器上多次运行相同的程序，同时仔细观测噪声的系统性影响，可以从这两种变分方法中获得的结果进一步优化。专家随后可以估算出在没有噪声的情况下会得到的结果，这一过程被称为`quantum
    error mitigation`（量子错误缓解）。这种方法对于量子化学模拟看起来尤其有前景，最近纽约州约克镇高地的`IBM Thomas J. Watson
    Research Center`的一个团队在一个4量子比特系统上进行了此类模拟[[110](#505424_1_En_2_Chapter.xhtml#Par306)]。


    量子计算难道不是一项令人兴奋的数字技术吗？尽管它仍处于`Gartner`技术成熟度曲线的前半段，尚未完全成熟，但先前的例子表明，众多公共和私营组织已成功将这项技术应用于广泛的领域。量子计算可用于加速复杂计算、模拟和建模新材料，以及优化不同的业务流程、产品和服务。量子计算还促进了从计算机科学、物理学、数学、化学到材料科学等一系列科学学科的融合，这可能对其他数字技术也有裨益。然而，现在判断量子计算是否会成为第`1.2`节所述意义上的通用技术还为时过早。但毫无疑问，对于某些特定用例，量子计算可以成为一种有价值的技术。它通过提供一种高效且极快的信息处理方式，推动了组织的数字化转型。


    请记住，购买和运营一台自己的量子计算机对你来说不太可能是一个可行的选择，因为这需要大量的资金以及各种技术人员和其他专家来操作这些机器。因此，通过云服务提供商按需访问量子计算服务将是你最可行的选择。然而，如果你希望基于这项数字技术长期建立新的收入来源，从战略角度考虑，购买自己的系统可能是有意义的。


    ## 2.4 关键要点


    *   经典计算机根据二进制代码，基于经典比特（0和1的序列）对信息进行编码和处理。

    *   量子计算机用量子比特（或称为`qubits`）来编码信息。与经典比特不同，量子比特可以通过叠加和纠缠这两种量子力学效应相互关联，从而允许同时探索一个计算问题的多种不同解决方案。由于这种量子并行性，与经典计算相比，量子计算在计算能力和速度上提供了指数级的提升，这也是它有时被称为下一代超级计算的原因。

    *   量子计算机有三种不同类型，即：(1) 量子退火机，(2) 量子模拟器，以及(3) 通用量子计算机，每种类型都适用于特定范围的用例和应用。

    *   大多数商用量子计算机采用超导量子比特，这些量子比特被限制在相互连接的超导区域（岛和环）中，并保持在低温温度下。例如，`D-Wave Systems`、`Google`和`IBM`就采用这种量子比特实现方案。

    *   由于其相对较大的宏观尺度，超导量子比特对其所在环境的热、机械和电学波动非常敏感。这些量子波动会引发不同的退相干机制，导致存储在量子比特中的量子信息衰减。这就是为什么当今所有量子计算机都属于含噪声中等规模量子计算机类别的原因。

    *   通过重复某些计算步骤并对获得的结果取平均值，可以减少退相干引起的错误。在这种量子纠错方案中，统计上最频繁的结果对应于相应计算问题的正确解。

    *   量子计算是一种非常通用的数字技术，它能够缩短涉及计算密集型优化问题或大量模拟与建模阶段的产品和服务的开发时间。

    *   除了在学术研究中的应用，量子计算机已广泛应用于众多行业，包括金融、制药、化学与材料、能源、汽车、航空航天以及国防。'
  raw: 'Instead of aiming for building a universal, fully error-corrected quantum
    computer that may be available in few centuries from now, various researchers
    focus on what can be done with the noisy, small-scale quantum computers that are
    available today. Various strategies have been developed and are currently subject
    to intense research. A particularly promising strategy was proposed in 2014 and
    is called *variational quantum eigensolver* [[108](#505424_1_En_2_Chapter.xhtml#Par304)],
    an approach that uses classical computers to iteratively optimize the guesses
    of a noisy quantum computer. Quantum mechanical guesses might be about the shortest
    route for a traveling salesman, the best shape for an aerodynamic aircraft wing,
    or the three-dimensional arrangement of molecules in protein-based drugs. Once
    the classical computer has identified its best guess, the result is fed back to
    the quantum computer that searches through nearby and better options by sampling.
    This iterative process continues until the optimum solution is found. This is
    a very convenient way of dealing with the noisy nature of state-of-the-art quantum
    computers, especially since scientists would need to make game-changing approximations
    to run their simulations on a classical computer alone. A similar approach called
    *variational quantum factoring* has been developed for factoring large numbers
    on NISQ hardware [[109](#505424_1_En_2_Chapter.xhtml#Par305)], a route that has
    not been physically implemented yet. The results obtained from both variational
    approaches can be optimized further by running the same routine on the noisy quantum
    processor multiple times while observing the systematic effect of noise carefully.
    Experts can then estimate what the result will be without any noise, a procedure
    that became known as *quantum error mitigation*. This approach looks particularly
    promising for quantum chemistry simulations that have been conducted on a 4-qubit
    system very recently by a team at IBM Thomas J. Watson Research Center in Yorktown
    Heights, New York [[110](#505424_1_En_2_Chapter.xhtml#Par306)].


    Is quantum computing not an exciting digital technology? Although it is still
    in the first half of Gartner’s hype cycle and not completely mature yet, the previous
    examples have shown that various public and private organizations have been applying
    this technology successfully to a wide range of applications. Quantum computing
    can be employed to speed up complex calculations, simulate and model materials,
    and optimize different business processes, products, and services. Quantum computing
    also promotes the convergence of a host of scientific disciplines from computer
    science, physics, mathematics, chemistry, and materials science, which may be
    beneficial for other digital technologies, too. It is, however, too early to judge
    whether quantum computing will become a general-purpose technology in the sense
    described in Section 1.2\. There is, however, no doubt that quantum computing
    can be a valuable technology for certain use cases. It promotes the digital transformation
    of organizations by providing a highly effective and very fast way of information
    processing.


    Please bear in mind that the purchase and operation of an own quantum computer
    is unlikely to be a valid option for you as it requires a fair amount of money
    and various technicians and other experts to operate this machinery. Accessing
    quantum computing services through cloud computing vendors on demand will thus
    be the most viable option for you. It may, however, make sense to purchase an
    own system under strategic considerations if you like to establish new revenue
    streams based on this digital technology on a long term.


    ## 2.4 Key Points


    *   Classical computers encode and process information based on classical bits
    (series of zeros and ones) according to the binary code.


    *   Quantum computers encode information in quantum bits or qubits. In contrast
    to classical bits, qubits can be correlated to each other by superposition and
    entanglement, two quantum mechanical effects that allow for exploring different
    solutions to a computational problem simultaneously. Due to this quantum parallelism,
    quantum computing offers exponential gains in computational power and speed compared
    to classical computing, which is why it is sometimes referred to as the next level
    of supercomputing.


    *   There are three different types of quantum computers, namely, (1) quantum
    annealers, (2) quantum simulators, and (3) universal quantum computers, each of
    which is suited for a certain range of use cases and applications.


    *   Most commercially available quantum computers employ superconducting qubits
    that are confined to interconnected superconducting areas (islands and rings)
    kept at cryogenic temperatures. This qubit implementation scheme is used by, for
    example, D-Wave Systems, Google, and IBM.


    *   Superconducting qubits are very susceptible to thermal, mechanical, and electrical
    fluctuations of their hosting environment due to their comparatively large macroscopic
    scale. Those quantum fluctuations give rise to different decoherence mechanisms
    that cause quantum information encoded in qubits to decay. This is why all quantum
    computers available today fall into the category of noisy intermediate-scale quantum
    computers.


    *   Decoherence-induced errors can be reduced by repeating certain computational
    steps and averaging the obtained results. The statistically most frequent result
    corresponds to the correct solution for the respective computational problem in
    this quantum error-correction scheme.


    *   Quantum computing is a very versatile digital technology that allows for reducing
    development times for products and services that involve computationally intense
    optimization problems or extensive simulation and modeling phases.


    *   Further to applications in academic research, quantum computers are applied
    in numerous industries already including finance, pharmaceutics, chemistry and
    materials, energy, automobile, aerospace, and defense.'
  trans: '

    与其致力于建造一台可能在几个世纪后才能实现的、通用的、完全纠错的量子计算机，许多研究人员转而专注于利用当今可用的、有噪声的小型量子计算机所能完成的任务。各种策略已被开发出来，并正处于深入研究中。一项特别有前景的策略于
    2014 年提出，称为`variational quantum eigensolver`（变分量子本征求解器）[108]，该方法利用经典计算机来迭代优化对噪声量子计算机的猜测。量子力学猜测可能涉及旅行商的最短路线、空气动力学机翼的最佳形状，或基于蛋白质的药物中分子的三维排列。一旦经典计算机确定了其最佳猜测，结果将被反馈给量子计算机，后者通过采样来搜索附近更优的选项。此迭代过程持续进行，直到找到最优解。这是一种处理当前最先进量子计算机噪声特性的非常便捷的方式，尤其是考虑到科学家们如果仅依靠经典计算机进行模拟，将不得不做出颠覆性的近似。一种类似的方法，称为`variational
    quantum factoring`（变分量子因式分解），已被开发用于在`NISQ`硬件上分解大数[109]，但这条路径尚未在物理上实现。通过在同一台有噪声的量子处理器上多次运行相同的程序，同时仔细观测噪声的系统性影响，可以从这两种变分方法中获得的结果进一步优化。专家随后可以估算出在没有噪声的情况下会得到的结果，这一过程被称为`quantum
    error mitigation`（量子错误缓解）。这种方法对于量子化学模拟看起来尤其有前景，最近纽约州约克镇高地的`IBM Thomas J. Watson
    Research Center`的一个团队在一个 4 量子比特系统上进行了此类模拟[110]。


    量子计算难道不是一项令人兴奋的数字技术吗？尽管它仍处于`Gartner`技术成熟度曲线的前半段，尚未完全成熟，但先前的例子表明，众多公共和私营组织已成功将这项技术应用于广泛的领域。量子计算可用于加速复杂计算、模拟和建模新材料，以及优化不同的业务流程、产品和服务。量子计算还促进了从计算机科学、物理学、数学、化学到材料科学等一系列科学学科的融合，这可能对其他数字技术也有裨益。然而，现在判断量子计算是否会成为第`1.2`节所述意义上的通用技术还为时过早。但毫无疑问，对于某些特定用例，量子计算可以成为一种有价值的技术。它通过提供一种高效且极快的信息处理方式，推动了组织的数字化转型。


    请记住，购买和运营一台自己的量子计算机对你来说不太可能是一个可行的选择，因为这需要大量的资金以及各种技术人员和其他专家来操作这些机器。因此，通过云服务提供商按需访问量子计算服务将是你最可行的选择。然而，如果你希望基于这项数字技术长期建立新的收入来源，从战略角度考虑，购买自己的系统可能是有意义的。


    ## 2.4 关键要点


    *   经典计算机根据二进制代码，基于经典比特（0 和 1 的序列）对信息进行编码和处理。

    *   量子计算机用量子比特（或称为`qubits`）来编码信息。与经典比特不同，量子比特可以通过叠加和纠缠这两种量子力学效应相互关联，从而允许同时探索一个计算问题的多种不同解决方案。由于这种量子并行性，与经典计算相比，量子计算在计算能力和速度上提供了指数级的提升，这也是它有时被称为下一代超级计算的原因。

    *   量子计算机有三种不同类型，即：(1) 量子退火机，(2) 量子模拟器，以及(3) 通用量子计算机，每种类型都适用于特定范围的用例和应用。

    *   大多数商用量子计算机采用超导量子比特，这些量子比特被限制在相互连接的超导区域（岛和环）中，并保持在低温温度下。例如，`D-Wave Systems`、`Google`和`IBM`就采用这种量子比特实现方案。

    *   由于其相对较大的宏观尺度，超导量子比特对其所在环境的热、机械和电学波动非常敏感。这些量子波动会引发不同的退相干机制，导致存储在量子比特中的量子信息衰减。这就是为什么当今所有量子计算机都属于含噪声中等规模量子计算机类别的原因。

    *   通过重复某些计算步骤并对获得的结果取平均值，可以减少退相干引起的错误。在这种量子纠错方案中，统计上最频繁的结果对应于相应计算问题的正确解。

    *   量子计算是一种非常通用的数字技术，它能够缩短涉及计算密集型优化问题或大量模拟与建模阶段的产品和服务的开发时间。

    *   除了在学术研究中的应用，量子计算机已广泛应用于众多行业，包括金融、制药、化学与材料、能源、汽车、航空航天以及国防。

