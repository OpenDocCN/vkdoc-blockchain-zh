    speak about *ambidextrous organizations* in this context [[42](#505424_1_En_1_Chapter.xhtml#Par245)].
    Ambidexterity and the ability to balance exploitation and exploration carefully
    is at the heart of every digital transformation as we see in the following example.


    A company that has been developing a very successful strategy to balance exploitation
    and exploration to continuously adapt their products and services to a constantly
    changing business environment is Microsoft, one of the worldwide leading advocates
    and proprietors of digitalization and digital technologies. In his keynote speech
    on the Microsoft Worldwide Partner Conference in 2016, Satya Nadella, the CEO
    of Microsoft, described digital transformation in terms of the following four
    basic pillars as shown in the inner circle of Figure [1-3](#505424_1_En_1_Chapter.xhtml#Fig3)
    [[43](#505424_1_En_1_Chapter.xhtml#Par246)]:


    1.  The *optimization of operations* includes the digitalization of internal business
    processes and often starts with transforming a company’s IT infrastructure to
    a platform-based architecture – we will discuss this measure further in Chapter
    [5](#505424_1_En_5_Chapter.xhtml), “Your Digital Action Plan.” The basis for any
    optimization is transparency about the status quo, which is the main aim of various
    digital technologies.


    2.  *Transforming products and services* is about advancing an existing product
    or service portfolio by integrating new technologies that create new business
    opportunities and revenue streams.


    3.  The *empowerment of employees* is crucial for a successful digital transformation.
    Employees need to be enabled to do their best work from anywhere, at any time,
    and on any device so that they are more effective and their efficiency and productivity
    increase. Furthermore, they need to be empowered to work autonomously and choose
    their projects according to their individual strengths and weaknesses, interests,
    work history, and qualifications.


    4.  Another prerequisite for a successful digital transformation is the *engagement
    with customers* by asking them for feedback and analyzing their responses to better
    understand their needs and personalize products accordingly. The expectations
    of customers define the products and services of tomorrow, which is why they broadly
    define the strategic direction and targets of any digital business transformation.'
