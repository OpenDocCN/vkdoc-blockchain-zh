- fmt: '# 2. Quantum Computing


    Quantum computing is the first digital support technology we explore in this book
    in more detail. It is sometimes portrayed as brilliant scientists exploring the
    most obscure natural phenomena in exotic laboratories and aiming to build very
    powerful science fiction supercomputers that are practically capable of doing
    anything. But this public perception has been changing lately since various tech
    companies around the world have invested in this technology to apply it to real-life
    business problems and explore potential use cases. Among them are Google, Microsoft,
    IBM, and Honeywell, for instance, just to mention a few pioneers in this ongoing
    field of industrial research. They frequently report on their latest achievements,
    highlight current business applications, and emphasize the great prospects of
    this digital technology. Even *The New York Times* picked up this trend lately
    and described quantum computing as one of the most “jazziest and most mysterious
    concepts of modern science” [[1](#505424_1_En_2_Chapter.xhtml#Par197)].


    This article in *The New York Times* was triggered by an announcement of Google
    in late 2019 that captured broad attention in the scientific community and media
    worldwide [[2](#505424_1_En_2_Chapter.xhtml#Par198)]. Google’s quantum computing
    team, led by the American physicist John Martinis until 2020, was working on an
    experiment with their `Sycamore` called quantum processor at that time. They attempted
    to solve a computational problem about generating a very long list of random numbers
    and checking their values a million times over and over. The result as such is
    not particularly useful outside of the quantum world but attracted great attention
    nevertheless as the team succeeded in solving this problem in just about 200 s,
    while a state-of-the-art supercomputer – according to Google’s information – would
    take more than 10,000 years for the same calculation. The result was published
    in the world’s leading multidisciplinary science journal called *Nature* with
    the title “Quantum supremacy using a programmable superconducting processor” [[3](#505424_1_En_2_Chapter.xhtml#Par199)].
    Google’s legendary *quantum supremacy* claim^([^(22)](#fn22)) – the technical
    term for a quantum computer outperforming a classical computer in terms of computational
    power and speed – was soon questioned and challenged by various researchers worldwide.
    The loudest opponent was IBM [[4](#505424_1_En_2_Chapter.xhtml#Par200)], who argued
    that state-of-the-art supercomputers could solve this problem in about 2.5 days
    rather than 10,000 years [[5](#505424_1_En_2_Chapter.xhtml#Par201)]. Furthermore,
    they brought forward that the problem was lacking any real-life applications and
    was designed specifically for demonstrating quantum supremacy among other arguments.
    But independently of the critique received, this experiment revealed that quantum
    computing is becoming a mature technology and is now set to tackle some of humankind’s
    most difficult and computational complex problems. This chapter is about this
    revolution in computing, its physical building blocks, and basic operating principles.


    For this purpose, we will discuss fundamental concepts of modern quantum mechanics
    first, the physical theory behind quantum computing, and quantum information processing.
    In this context, we will see that due to the probabilistic nature of quantum mechanics,
    causes are not linked to effects anymore. We will learn about further fascinating
    phenomena, such as the uncertainty principle, superposition, and entanglement,
    and learn how quantum computers exploit those weird quantum effects to conduct
    gazillions of calculations simultaneously and solve very complex computational
    problems. We will also have a look on commercially available quantum computers
    including Google’s `Sycamore` processor, IBM’s `Q54`, and D-Wave’s `2000Q` and
    `5000Q` system. In this context, I will introduce you to the three fundamental
    types of quantum computers, namely, quantum annealers, simulators, and universal
    quantum computers. This differentiation is particularly important since each type
    is suited for certain applications and use cases only. Furthermore, this chapter
    broadly explores current applications and prospective use cases and provides an
    easy-to-use quantum computing framework in the last section that can be used to
    access this revolutionary and potentially disruptive technology with respect to
    your own ideas and use cases.'
