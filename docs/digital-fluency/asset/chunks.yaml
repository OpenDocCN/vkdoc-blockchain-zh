  trans: '

    ### 当前商业应用：加密货币与募资


    我们首先讨论的、实际上也是区块链技术基础的应用是加密货币。它建立在数十年的密码学研究和多种支持技术（如数字签名和哈希函数）之上。最早提出创建数字货币的方案之一可追溯到
    1982 年，当时美国密码学家大卫·乔姆提出了一种方案，利用“盲签名”（一种经过伪装、加盲的消息）来构建一种无法追踪的货币[23]。其基本思路相当务实：提出由一家公共银行通过签署一个呈现给用户的随机盲序列号来发行数字货币。随后，用户可以凭借这种由本地银行支持的数字货币与第三方进行交易。此流程仍遵循中心化交易模式，因为债务方银行作为监管中介为整个交易过程提供信任背书。后来，大卫·乔姆完善了他的概念，开发了一种名为`ecash`的数字货币，它利用一些私人身份数据来构建交易消息，但仍未能解决双重支付问题。


    #### 币


    `币`是加密货币的基本单位，即基于区块链技术设计的、能够随时间存储货币价值的数字货币。`币`仅可用于买卖物品，并且通常具备与货币相同的特征：可互换、可分割、可接受、便携、耐用且供应有限。


    作为解决这一普遍问题的方案，英国密码学家兼黑客亚当·巴克于 1997 年提出了工作量证明概念，并建议将`hashcash`作为抵御非法、未经请求的垃圾邮件系统。^(⁷⁰)
    他提出的基本思路是：要求每封电子邮件的发送者完成一道计算难题，该难题需要额外的计算工作和资源，从而阻止人们发送大量垃圾邮件。一年后，美国计算机工程师戴维采用了这一概念来生成一种名为`B-money`的数字货币。然而，这个系统在共识算法方面缺乏重要环节，最终也未能成功避免双重支付问题。比特币架构的一个直接前身是`比特黄金`，这是一种由美国计算机科学家尼克·萨博于
    1998 年提出但从未实现的去中心化数字货币。他曾这样描述自己的方法：“我试图在网络空间中尽可能逼真地模仿黄金的安全性和信任特征，其中最主要的一点是它不依赖于一个可信的中心化权威”[24]。这也是他被猜测为
    2008 年以匿名“中本聪”名义发表的开创性比特币论文作者的原因之一（尽管还有其他候选人）。但尼克·萨博对此坚决否认[25]。


    受比特币显著热潮的启发，随后开发了多种加密货币，如今这些货币被称为`山寨币`。到 2017 年底，所有加密货币都经历了剧烈的金融投机，在平台`www.coinmarketcap.com`上列出的币种超过
    4500 种。这股热潮引发了一场惊人的金融泡沫，随后不久泡沫便破裂了。在此期间，加密货币的汇率表现出极高的波动性，比特币汇率在一个月内从超过 20,000
    美元跌至 7,500 美元。这些价格波动至今仍以不那么显著的方式持续存在，这就是许多专家不相信加密货币会在自由市场上被广泛采用的原因。


    最受欢迎的代币分别是：以太坊（货币代码：`ETH`）、瑞波币（`XRP`）和莱特币（`LTC`）。其中一些代币是基于全新的软件代码实现的，并支持额外的功能，因此这组山寨币有时也被称为`元币`[26]。例如，以太坊区块链作为最流行的元币，额外支持智能合约的实施，以及存储和转移具有任何（货币）价值的更通用的数字资产[27]。


    一种具有某种价值的数字资产通常被称为`代币`。在文献中，“币”和“代币”常常混用，但在实现区块链应用时，两者存在根本的概念性差异需要重点考虑。币是由区块链技术驱动的加密货币的基本单位，仅具有货币价值；而代币则是特定区块链项目中的可交易份额证书，可以同时具有货币价值和非货币价值。例如，音乐会的门票可以被视为一种“现实生活中的代币”，它可以在特定时间用于特定的音乐厅。但是，你不能用它来支付餐厅账单，因为它只在特定生态系统（本例中为音乐厅）内才有价值。另一方面，代币是更通用的数字证券，代表某种权益，其本质不一定是货币性的。代币通常在一次`首次代币发行`或区块链项目的`ICO`中发行，这指的是通过向公众发售经过密码学保护的区块链代币，来为特定区块链项目或企业的发展筹集资金[28]。


    #### 代币


    `代币`是存储在有形或无形对象（如公司股份、债券、艺术品或房地产投资、可互换的贸易商品及其他贵重物品）中的价值的独特数字表现形式——一个“软件片段”。作为特定区块链项目内的可交易资产，`代币`在无任何中心化中介的情况下，搭建了现实世界资产与其在数字世界中进行交易、存储和所有权转移之间的桥梁。`代币`也是“币”的统称，因此为数字化具有货币或非货币价值的资产提供了一种更通用的方法。


    `ICO`通常由以下四个原因驱动：(1) 通过公众关注度吸引早期员工，(2) 为投资者提供盈利性投资机会，(3) 为潜在的并购建立货币基础，(4) 筹集现金以推动区块链项目发展。ICO
    市场尤其充满活力，2017 年通过 ICO 筹集了超过 7.5 亿美元资金，而同年“传统”风险投资仅达到 2.32 亿美元[29]。一旦 ICO 的融资目标达成且公司成功成立，ICO
    中发行的代币便会发挥作用并开始增值。这也是 ICO 被称为`证券型代币发行`的原因，这是一种现代且日益流行的风险投资募资方式。^(⁷¹) 如今，此类代币必须获得其发行所在国的交易所监管机构的批准，例如“美国证券交易委员会”（`SEC`）或“欧洲证券和市场管理局”（`ESMA`）。随着时间的推移，代币已涌现出三种重要的应用类型：

    '
- fmt: '# 代币类型与资产代币化


    *Security tokens*（安全代币）是最常见的代币类型，代表金融投资，例如公司股份或私营公司股票，这些投资受政府市场监管机构和现有证券法的监管。与传统资产的主要区别在于，从传统证书到加密安全证书的概念性转变、特定的结算流程，以及从传统结算机构和清算所向分布式区块链基础设施的转移。总之，安全代币是受监管的金融产品，为投资者提供保护。此外，它们可以在`P2P`基础上交易，构成股票、债券和其他有价物的部分所有权凭证，提供广泛的市场准入，并作为包括小投资者在内的所有人的资产类别。


    *Utility tokens*（实用代币）是与特定区块链用例相关的数字凭证，赋予其所有者访问相应区块链网络的权利。大多数情况下，公司将实用代币与特定服务关联，例如在网络内启用功能或额外的`DApp`。根据美国证券交易委员会（`SEC`）的规定，实用代币不得具有任何财务激励，即发行方不得向投资者提供任何形式的货币回报。


    *Payment tokens*（支付代币）是像`Bitcoin`和`Litecoin`这样的加密货币，可在区块链项目的生态系统内用作支付方式。支付代币通常拥有自己的区块链，用于记录完整的交易历史。这些代币的唯一目的是支付，因此其应用范围非常广泛。


    对于传统资产，例如房地产投资[[30]](#505424_1_En_3_Chapter.xhtml#Par232)或私营公司股票，买卖双方通常必须通过个人人脉和专门经纪人找到彼此，这一过程阻碍了全球贸易和价值转移。*资产代币化*，即传统资产的数字化，允许基于区块链技术实现简单的全球转移和所有权验证，该技术运行在广泛的国际网络上，例如公司的全球供应链。鉴于此类代币化资产透明度和国际性的提高，该领域的倡导者认为，与包括流动性极差的私营公司股票在内的传统资产相比，代币化提供了更高的流动性。此外，代币化资产可以完全在区块链上进行管理，而投资资金、相关货币转账和赎回可以基于智能合约方便地自动执行。代币与智能合约相结合，使得银行和其他（金融）组织内部的（行政）流程能够实现自动化，这就是为什么这一研究领域在过去几年中吸引了极大关注。


    ## 当前业务应用：交易、支付和共享服务


    交易是我们天性的一部分，自从我们的祖先开始在地球上繁衍，并交换在某些地方常见而在其他地方稀有的物品时起便是如此，正如我们从本章引言部分所了解的那样。早期，人们只有在认识并信任彼此时才会进行交易。鉴于全球化的发展，公司和个人几乎不可避免地会与那些我们既未谋面也未曾交易过的陌生伙伴进行交易——试想一下`Amazon
    Marketplace`、`Alibaba`以及其他在线零售商上的全球卖家网络，我们在那里接触到成千上万的未知专业大型卖家和私人小型卖家。与陌生方交易存在诸多法律、金融和文化风险，这引出了一个可能我们所有人都思考过一段时间的问题：我们能信任一个我们既未谋面也未曾交易过的（海外）交易伙伴吗？


    在其持续的商业关系早期，`IBM`和瑞士投资银行`UBS`基于区块链技术探索了在非可信环境下的交易问题，并于2016年创建了一个区块链联盟^([(72)](#fn72))和在线贸易金融平台。他们的联合平台被命名为“`Batavia`”，为全球贸易提供了一个可信生态系统，作为承担与非可信交易对手方交易风险的一个可行解决方案。不久之后，蒙特利尔银行、`CaixaBank`、德国商业银行和`Erste
    Group`也加入了该联盟，并帮助建立了一个可访问的国内和跨境交易开放网络，面向全球的公司客户和贸易伙伴[[31]](#505424_1_En_3_Chapter.xhtml#Par233)。后来，`Batavia`与增长更快的平台“`we.trade`”^([(73)](#fn73))合并——该平台原名“`Digital
    Trade Chain`”或`DTC`——由包括德意志银行、汇丰银行、荷兰合作银行、桑坦德银行和法国兴业银行在内的九家欧洲银行于2018年创立[[32]](#505424_1_En_3_Chapter.xhtml#Par234)。如今，`we.trade`被宣传为一个银行支持的贸易金融区块链平台，帮助客户：


    *   寻找（新的）可信贸易伙伴

    *   以简便的方式申请银行融资

    *   在不可篡改的分类账上追踪整个交易过程

    *   通过智能合约实现支付和交易的自动化与安全化


    此外，该平台确保所有相关方都能实时访问其贸易交易信息，从而没有任何个人或中心化方能够单独控制数据。数据实际上是分布在整个网络上的，未经所有其他用户的批准，任何数据都无法被更改——正如我们之前所学，这是区块链技术的关键特征之一。


    `we.trade`及类似平台对中小企业尤为有益，因为它们面临明显的市场缺口，许多企业缺乏获得贸易融资的渠道。世界银行估计，高达50%的中小型组织无法通过任何正规信贷渠道获得融资，这导致全球信贷缺口高达2.6万亿美元。近年来，通过将传统金融服务与创新数字技术相结合来缩小这一缺口并为这些企业创造新机会，因此在银行业引起了极大关注。此类银行业务现在被统称为*金融科技公司*，这是对实施基于数字技术的金融创新的总称。'
  raw: '*   *Security tokens* are the most common type of token and represent financial
    investments, such as company shares or private company stocks, that are regulated
    by governmental market authorities and already existing securities laws. The main
    difference to traditional assets relies on the conceptual change from traditional
    to cryptographically secured certificates, on the particular settlement process,
    and the shift from traditional settlement agencies and clearing houses to a distributed
    blockchain infrastructure. In summary, security tokens are regulated financial
    products that provide investor protection. Furthermore, they are tradable on a
    P2P basis, constitute fractional ownership claims on shares, bonds and other valuables,
    provide a broad market access, and range as an asset class for everyone including
    small investors.


    *   *Utility tokens* are digital vouchers that are associated with a certain blockchain
    use case and entitle their owner to access the respective blockchain network.
    Most of the time, companies link utility tokens to specific services, such as
    enabling functions or additional DApps within the network. Due to the American
    SEC regulations, utility tokens may not have any financial incentive, that is,
    the issuer must not offer any type of monetary return to the investors.


    *   *Payment tokens* are cryptocurrencies like Bitcoin and Litecoin that can be
    used as a method of payment inside a blockchain project’s ecosystem. Payment tokens
    do generally have their own blockchain that keeps the entire transaction history.
    The only purpose of those tokens is payment, which is why their range of applications
    is very versatile.


    For traditional assets, such as real estate investments [[30](#505424_1_En_3_Chapter.xhtml#Par232)]
    or private company stocks, sellers and buyers must usually find each other through
    personal networking and specialized brokers, a process that impedes global trade
    and value transfer. The *tokenization of assets* , that is, the digitalization
    of traditional assets, allows for simple global transfer and ownership verification
    based on blockchain technology that operates on a wide international network,
    such as a company’s global supply chain. Given the increase in transparency and
    internationality of such tokenized assets, evangelists of that space argue that
    tokenization offers an improved liquidity compared to traditional assets including
    private company stocks that are notoriously illiquid. Furthermore, tokenized assets
    can be administered entirely on the blockchain, while the funding of the investment,
    associated monetary transfers, and redemptions can be implemented automatically
    based on smart contracts conveniently. Tokens combined with smart contracts allow
    for the automatization of internal (administrative) processes in banks and other
    (financial) organizations, which is why this field of research has attracted great
    attention over the past few years.


    #### Current Business Applications: Trading, Payment, and Sharing Services


    Trading is part of our nature since our ancestors began to populate the earth
    and exchange objects that were commonly available at some places and rare at others
    as we know from the introductory part of this chapter. Early on, people only traded
    with each other if they knew and trusted each other. In view of the globalization,
    it is almost inevitable for companies and individuals to avoid trading with unknown
    partners that we neither met nor trade with before – just think about the global
    seller network on Amazon Marketplace, Alibaba, and other online retailers where
    we are exposed to thousands of unknown professional large-scale and private smaller-scale
    sellers. Trading with unknown parties has numerous legal, financial, and cultural
    risks that give rise to the question that probably all of us have been asking
    ourselves for some time: can we trust a certain trading partner (overseas) that
    we neither met nor traded with before?


    Early on in their ongoing business relation, IBM and the Swiss investment bank
    UBS have explored this problem about trading in untrusted environments based on
    blockchain technology and created a blockchain consortium^([^(72)](#fn72)) and
    online platform for trade finance back in 2016\. Their joint platform was named
    “Batavia” and provided an ecosystem of trust for global trade as a viable solution
    for bearing the risk of trading with untrusted counterparties. Shortly afterward,
    the Bank of Montreal, CaixaBank, Commerzbank, and Erste Group joined this consortium,
    too, and helped to establish an open network for domestic and cross-border trading
    that can be accessed by corporate clients and trading partners from around the
    world [[31](#505424_1_En_3_Chapter.xhtml#Par233)]. Later on, Batavia merged with
    the faster-growing platform “we.trade”^([^(73)](#fn73)) – formerly called “Digital
    Trade Chain” or DTC – that has been founded in 2018 by nine European banks including
    Deutsche Bank, HSBC, Rabobank, Santander, and Société Générale [[32](#505424_1_En_3_Chapter.xhtml#Par234)].
    Today, we.trade is advertised as a bank-backed blockchain platform for trade finance
    that helps clients to


    *   Find (new) trusted trade partners


    *   Request bank financing on an easy way


    *   Track the entire trade journey in an immutable ledger


    *   Automate and secure payments and transactions by smart contracts


    Furthermore, this platform ensures that all relevant parties have real-time access
    to the information regarding their trade deals, such that no individual or centralized
    party has control over the data alone. It is rather distributed across the entire
    network, and no changes to the data can be made without the approval of all other
    users, which is – as we learned earlier – one of the key characteristics of blockchain
    technology.


    we.trade and similar platforms are particularly beneficial for small- and medium-sized
    enterprises that face a clear market gap since many of them lack access to trade
    finance. The World Bank has estimated that up to 50% of the small- and medium-sized
    organizations do not have any access to formal credit channels, which leads to
    a global credit gap as high as USD 2.6 trillion. Closing this gap and creating
    new opportunities for them by combining conventional financial services with innovative
    digital technologies has therefore attracted great attention in the banking sector
    lately. Such banking ventures are nowadays referred to as *fintech companies*
    as an umbrella term for the implementation of digital technology–based financial
    innovations.'
