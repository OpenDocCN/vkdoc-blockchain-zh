  trans: '

    ### 无监督学习：关联


    *关联*（或称关联规则学习）是另一类采用无监督学习策略的算法，例如被用于亚马逊“购买此商品的顾客也购买了”板块中为你推荐类似书籍。这些算法通过选取基于不同重要性和显著性度量的规则，在（非常）大型的数据集中寻找变量之间的模式和关系
    [37, 38]。该模型的 `support` 参数用于量化一个项集（例如一组商品列表）在数据集中出现的频率，而 `confidence` 则指示一条关联规则在数据中被发现的概率。例如，*先验*关联规则算法首先设定最小支持度和置信度阈值，然后迭代地识别并排列所有具有更高支持度和置信度的子集。如今，该算法被用于分析购物车和自动化营销策略——这种方法被称为行为微目标定位，因为它寻找任何一组商品之间共同出现的频率和概率，并建立未来不同种类商品之间可能发生的关联。


    一个具体的例子是超市中的商品摆放。设想一位顾客拿着一打啤酒走向收银台。我们是否应该在路上摆放口香糖？也就是说，啤酒和口香糖的销售是否在某种程度上存在关联？获取有价值的客户洞察以推动超市和仓库的销售，是关联规则学习一个相当典型的应用场景。一般来说，只要你有某种序列数据，并且希望在其中发现显性和隐性的模式及关系，都可以应用此方法。例如，英国线上超市
    Ocado 从其数据中发现尿布和啤酒之间存在强相关性。他们了解到，新晋父母不常外出，因此当这些顾客购买尿布时推荐啤酒和葡萄酒，结果证明不仅利润丰厚，也提升了客户满意度。


    ### 无监督学习：降维


    *降维*（或泛化）旨在大型数据集中寻找比碎片化特征更适合数据处理的抽象模式。例如，所有具有三角形耳朵、长鼻子和大尾巴的狗可以概括为牧羊犬类别，这对于解释和处理该品种的特性来说，比单独描述其生理特征更为有用。这类算法已被用于潜在语义分析，通过将特定词语聚类到主题，从而将具体词汇抽象为其含义。除了这种所谓的*主题建模*，降维最流行的应用可能当属*推荐系统*和*协同过滤*，用于基于多个方面、视角、数据源等分析客户的行为模式。


    ### 4.3.3 深度学习


    除了监督学习和无监督学习，深度学习构成了第三大类学习策略，通常被用于训练人工神经网络。*深度学习*是机器学习的一个子类别，其灵感来源于（人类）大脑的结构和功能。它是人工智能领域最年轻的研究领域，近期在媒体上引起了广泛关注，部分原因在于它提供了一系列高度跨学科的应用。


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig8_HTML.png](img/505424_1_En_4_Fig8_HTML.png)


    **图 4-8** 具有两个十进制输入 `x[1]` 和 `x[2]` 的单个神经元的基本电路模型。其输出是输入的加权和 `w[1] x[1] + w[2]
    x[2]` 的数学函数，用 `a[w]` 表示，并被称为激活函数


    #### 人工神经网络


    人工神经网络是一种由相互连接的神经元组成的结构，这些神经元通常排列成多个层。每个神经元都与前后层中的神经元相连，并具有特定的激活函数。每个连接强度的权重，结合每个神经元的激活函数，共同控制信息如何通过网络从输入层传递到输出层。人工神经网络模仿大脑的智能行为，可应用于广泛的应用场景。

    '
- fmt: '#### Deep Learning: Artificial Neural Networks


    Deep learning employs *artificial neural networks* formed by interconnected artificial
    neurons. The world artificial in this context refers to the fact that we do not
    use real, biological neurons but emulate their behavior by state-of-the-art computing
    hardware running an appropriate software code called machine learning model. The
    neurons used in artificial neural networks today are generalizations to Frank
    Rosenblatt’s perceptron model. From our discussion in Section 4.1.2, you may remember
    that the output value of the perceptron depends on the weighted sum of inputs,
    which we described mathematically by writing `w[1] · x[1] + w[2] · x[2]` with
    the inputs `x[1]` and `x[2]` and weights `w[1]` and `w[2]`. The particular generalization
    to Frank Rosenblatt’s model is called *activation function*, which does nothing
    else than converting the weighted sum of inputs into a decimal number according
    to a selectable formula – it is thus a more elaborate way of controlling the activation
    potential. The activation function adds another degree of freedom (or free parameter)
    to the model and allows for better tuning the artificial neuron to a particular
    use case by selecting the most suitable activation function for it. The overall
    concept for an artificial neuron is depicted in Figure [4-8](#505424_1_En_4_Chapter.xhtml#Fig8).


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig9_HTML.png](images/505424_1_En_4_Chapter/505424_1_En_4_Fig9_HTML.png)


    Figure 4-9


    Three of the most fundamental types of artificial neural networks. (a) shows a
    two-layer neural network with one input and one output layer built by four and
    three neurons (circles), respectively. (b) shows a three-layer design with one
    hidden layer and (c) a fairly exotic type of neural network called “Boltzmann
    neural network” with no specific input or output


    The real power of such neurons unfolds when we wire them up to form artificial
    neural networks similar to the biological neural network in our brain. Neurons
    can be connected to form any kind of *network architecture* depending on the particular
    use case at hand. In this context, the term “architecture” refers to the particular
    way (or wiring diagram) in which the different neurons are connected with each
    other – this connection is of course artificial in the sense that is simulated
    by software. The selection of the most appropriate architecture does in fact require
    a lot of experience and technical expertise. A few basic examples are shown in
    Figure [4-9](#505424_1_En_4_Chapter.xhtml#Fig9) for your reference. This figure
    reveals that the different neurons in artificial neural networks are typically
    arranged in different layers, in which the neurons are only connected to the neighboring
    neurons in adjacent layers. A layer that is neither an input nor output layer
    is called *hidden layer*. Historically, the term “hidden” gave rise to the term
    *deep learning* as hidden layers operate “deep” in the neural network in secrecy
    without generating any visible output. Hidden layers are typically used if the
    input data is very versatile, large, and complex, such as the data used for image,
    object, and voice recognition.


    In order to explain the basic principles of artificial neural networks in more
    detail, we will discuss a very popular example now. This use case is depicted
    in Figure [4-10](#505424_1_En_4_Chapter.xhtml#Fig10) and about reading handwritten
    numbers and converting them into digital numbers for further processing. Such
    networks are used in some postal distribution centers, for instance, to read postal
    addresses and automatically sort deliveries according to their post code, a scheme
    that can easily be extended to read handwritten addresses and other texts, too.


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig10_HTML.png](images/505424_1_En_4_Chapter/505424_1_En_4_Fig10_HTML.png)


    Figure 4-10


    Handwritten digit classification by an artificial neural network. The network
    takes images of handwritten numbers and converts them into digital numbers. The
    network consists of 144 neurons (circles) in the input layer according to the
    number of pixels in the input image. It further surmounts 2 hidden layers with
    12 neurons each and an output layer containing 10 neurons in total that correspond
    to the digital numbers 0, 1, …, 9. Activated neurons and the most dominant connections
    with the highest weights are highlighted in black


    The neural network in Figure [4-10](#505424_1_En_4_Chapter.xhtml#Fig10) is built
    by four layers in total, one input, one output, and two hidden layers. Its input
    is 12 × 12 pixel images, such as the one we discussed in Section 1.4.1 when introducing
    the binary encoding scheme for grayscale images. These images are input into the
    neural network line by line, that is, each pixel serves as the input for one neuron
    in the input layer, which thus contains 12 × 12 = 144 neurons in total. Depending
    on whether the value of one pixel is high enough to activate the respective neuron,
    the input is either fed forward to the next layer or not considered for further
    processing. The next layer in the example at hand is the first hidden layer. Its
    neurons do forward the information to the second hidden layer but according to
    another activation function that allows for focusing on certain patterns in the
    input data. The second hidden layer comprises less neurons than its preceding
    layer and also employs a special activation function for its constituting neurons.
    The output layer finally averages its inputs from the second hidden layer based
    on an activation function called *sigmoid function*. The output of this sigmoid
    function corresponds to a digital number between 0 and 1 that can be interpreted
    in terms of a probability.^([^(96)](#fn96)) The output value 1 corresponds to
    a probability of 100%, the output 0 to 0%, accordingly. In this particular case,
    the neuron with the highest probability is the third one, which is why the network
    correctly classifies the handwritten input image with the digital number 3 with
    an uncertainty given by the respective probability.


    ### Deep Learning


    Deep learning refers to machine learning algorithms or programs that employ artificial
    neural networks with one or more hidden layers. It is particularly useful for
    solving complex tasks, such as image and object recognition or natural language
    processing.


    Similar to the linear regression model, this classification of handwritten numbers
    does only work correctly if the neural network has been trained with a large training
    dataset containing thousands of handwritten numbers before. Without any training,
    the weights of the different connections between the neurons do just have random
    values. In consequence, the neurons are activated arbitrarily and fire almost
    independently of the input image. So how does this training work, and how do artificial
    neural networks actually learn?


    Artificial neural networks can generally be trained by using labeled or unlabeled
    data, that is, by employing supervised or unsupervised learning. The artificial
    neural network of the example at hand is trained by using labeled datasets. Such
    datasets contain thousands of images of handwritten numbers, each of which is
    associated (or labeled) with the rightful digital number. The cost function of
    a neural network can thus be defined by comparing the calculated output with the
    labeled input value.^([^(97)](#fn97))


    As with all other machine learning algorithms, the artificial neural network is
    trained by minimizing its cost function iteratively. The training typically involves
    five main steps:


    1.  The first step initializes the different weights by random decimal numbers
    that typically lie between 0 and 1 for simplicity.

    2.  After that, the first image of the training dataset is fed into the input
    layer, each pixel to one neuron.'
