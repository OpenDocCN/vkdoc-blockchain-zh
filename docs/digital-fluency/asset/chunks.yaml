    3. 数据随后从输入层向输出层逐层传播，每个神经元的输出等于其激活函数对相应加权输入和的计算结果。这一过程被称为*前向传播*，因为它从输入层指向输出层。


    4. 在第四步中，算法将计算结果与输入图像的标签进行比较，并计算输出层每个神经元产生的误差。


    5. 第五步被称为*反向传播*，其理论基础源于美国数学家 Paul Werbos 和美国心理学家 David Rumelhart 的先驱性工作 [39, 40]。反向传播标志着人工智能研究的一个重要里程碑，因为在此之前的神经网络无法被准确高效地训练。^(⁹⁸)
    在此过程中，计算出的误差从输出层反向传播至输入层，同时根据各权重对误差的贡献程度进行更新。通过这种方式，部分连接的权重增加而变强，其他连接的权重相应减少而变弱。单次迭代中权重更新的最大幅度被称为*学习率*，它决定了人工神经网络的学习速度。


    步骤 1–5 会重复执行，直到训练数据集中的每张图像都已通过网络处理，并达到预期的识别精度。训练数据集中所有图像完整地完成一次前向和后向传播，被称为一个*周期*。人工神经网络的训练通常涉及数百个周期，这就是为什么整个训练过程可能非常耗时且计算密集。


    形象地说，人工神经网络隐藏层中的不同神经元在训练过程中会捕捉特定的图像特征和形状，从而将图像分解为其最主要的子成分。因此，第一个隐藏层的神经元会逐步识别简单的形状，例如直线、边缘、角、矩形、圆形和其他嵌套特征。第二个隐藏层的神经元可能识别出输入图像中占主导地位的、更复杂的特征或这些简单形状的组合。训练完成后，便建立了一个通用的简单形状集合，该集合能够很好地适用于识别所有可能的手写数字，其方法是将手写数字分解为基本形状，并根据特定的分解方式将其关联到一个数字。


    #### 深度学习：卷积神经网络


    与任何其他人工神经网络一样，卷积神经网络建立在历史上发展出的多种科学概念和思想之上。其核心思想可追溯到德国神经科学家、诺贝尔奖得主 David Hubel
    和 Torsten Wiesel，他们在 1959 年研究了猫视觉皮层中的神经元 [42]。基于实验结果，他们很快认识到，猫视觉皮层（即大脑中处理来自眼睛视觉信号的部分）中的神经元仅对视野中的小区域产生反应，他们将这些区域称为*感受野*。此外，他们还发现相邻神经元的感受野相互重叠，形成一个光栅，共同构成了猫的整个视野。这种重叠在数学上被称为*卷积*，类似于应用于图像以突出特定结构、纹理、特征及其他方面的局部滤波器。为清晰起见，图
    4-11 展示了两种非常常见的卷积滤波器在一张示例灰度图像上的效果。


    受 David Hubel 和 Torsten Wiesel 开创性工作的启发，日本计算机科学家 Kunihiko Fukushima 于 1980 年开发了一种多层人工神经网络，他将其命名为“Neocognitron”
    [36, 43]。这种特殊的人工神经网络采用完全不同的网络架构，能够识别类似前述示例的手写字符。其方法的真正创新在于将人工神经网络与基于卷积滤波器的特征提取单元相结合，因此他的网络架构后来被称为*卷积神经网络*。图
    4-12 示意性地展示了此类网络的一个非常简单的示例。这个特定的卷积神经网络可用于图像识别，并根据车辆类型（如紧凑型轿车、敞篷车、SUV 和豪华轿车）对车辆进行分类。它由两个子组件组成：(1)
    特征提取单元和 (2) 分类单元。特征提取单元用于图像预处理，由三个具有特定激活函数的神经元层组成。第一层称为*卷积层*，它通过在输入图像上逐行、逐列移动任意滤波器（类似于图
    4-11 所示的滤波器）来扫描图像，以检测特定的（对比度）特征和结构。此过程会创建一个所谓的*特征图*，突出显示汽车统计上最相关的特征，例如车轮、车门、车灯以及其他方面，具体取决于所选的滤波器。之后，Kunihiko
    Fukushima 引入了一个所谓的*池化层*，该层对这些特征进行累加，并根据其统计相关性进行评级。由于其特殊的激活函数，池化层进一步确保了即使检测到的特征在输入图像中发生偏移或倾斜，也能被正确识别。^(⁹⁹)
    此外，它还减小了图像尺寸，因此池化层有时也被称为“下采样层”。池化后的特征图作为后续* flattening 层*（特征提取单元的第三层，也是最后一层）的输入。该层进一步缩小特征尺寸，并将特征图转换为一列神经元。这一列神经元本身又作为卷积神经网络第二个子组件（一个全连接的人工神经网络，即分类单元）的输入。这个人工神经网络最终能够将检测到的特征分类为特定的车辆类型，类似于前一个示例中用于分类手写数字的人工神经网络。


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig12_HTML.jpg](img/505424_1_En_4_Fig12_HTML.jpg)


    **图 4-12** 用于根据车辆类型对车辆图像进行分类的卷积神经网络架构设计。特征提取单元由卷积层、池化层和 flattening 层组成，识别图像中的特定特征和结构。根据哪些特征最终被证明最为主要，一个人工神经网络将这些特征分类为特定的车辆类型。


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig11_HTML.jpg](img/505424_1_En_4_Fig11_HTML.jpg)


    **图 4-11** 两个特征检测器对原始图像的效果。“边缘检测器”强调图像中的所有边缘，而“图像浮雕”则赋予图像三维外观，从而突出图像中的任何纹理，例如车辆下方的地面。

    '
- fmt: '# 深度学习：卷积神经网络


    卷积神经网络通常使用包含数万张图像的带标签数据集进行训练。训练卷积神经网络的一个里程碑是Yann LeCun的反向传播算法，他于1989年在著名的新泽西贝尔实验室开发了该算法[[44](#505424_1_En_4_Chapter.xhtml#Par283)]。他精心设计的算法不仅能训练神经网络，还能同时自动调整特征提取单元中使用的滤波器或*卷积核*。一旦训练完成，特征图将显示在整個训练数据集中统计上最相关的特征。他的方法后来成为现代*计算机视觉*的基础[[60](#505424_1_En_4_Chapter.xhtml#Par300)]，正如我们将在本章的应用部分所见，它为商业和工业应用提供了特别广泛的范围。此后，卷积神经网络被用于例如照片和视频中的对象搜索、人脸识别、图像风格迁移以及提高照片图像质量等任务。


    人脸识别发挥着特别重要的作用，并且是许多初创企业的焦点。例如，在该领域最近引起媒体和投资者高度关注的一家公司是美国初创公司`Affectiva`。`Affectiva`于2009年从麻省理工学院媒体实验室分离出来，它结合了人脸识别和语音模式分析来确定人们的情绪和认知状态。潜在的应用范围包括：通过感知驾驶员的情绪状态（如愤怒、疲劳或注意力不集中）来提高道路安全，增强商店中的客户体验，以及提高营销活动的影响力。这些应用如今被统称为*情感计算*[[45](#505424_1_En_4_Chapter.xhtml#Par285)]或*情感AI*[[46](#505424_1_En_4_Chapter.xhtml#Par286)]。


    ## 深度学习：循环神经网络


    人工神经网络和卷积神经网络非常擅长检测大型（图像）数据集中的模式。然而，事实证明，这两种网络都非常不擅长记忆先前的输入，因为它们没有任何短期或长期记忆。换句话说，它们全部的學習历史仅被不可挽回地编码在不同神经连接的权重中，并且它们无法确定之前是否已经见过某个输入图像。


    然而，对于需要数据历史记录的应用（例如语音识别和语音合成）来说，这种记忆非常有益。这就是为什么科学家们开发了另一种称为*循环神经网络*的网络架构，它能够记忆先前处理过的数据。第一个循环神经网络，即所谓的*Hopfield网络*，是由美国物理学家John
    Hopfield于1982年开发的[[47](#505424_1_En_4_Chapter.xhtml#Par287)]。他称之为“联想记忆”的模型可以被训练来存储不同的图像或模式，并且随后能够在其他输入图像中识别出其中任何一个。然而，早期循环神经网络实现的性能非常有限，因为它们不容易被训练。^([(100)](#fn100))
    自那时起，人们开发了各种类型的循环神经网络，每种都有其特定的优点和缺点[[48](#505424_1_En_4_Chapter.xhtml#Par288)–[53](#505424_1_En_4_Chapter.xhtml#Par293)]。


    最强大的联想记忆是所谓的*长短期记忆网络*。这种特殊类型的循环神经网络由德国计算机科学家Sepp Hochreiter和Jürgen Schmidhuber于1997年开发[[54](#505424_1_En_4_Chapter.xhtml#Par294)]，旨在识别数据（时间）序列中的模式。长短期记忆很快革新了自然语言处理和翻译，因为语言是词语的序列，通常只有将词语相互关联起来才能正确翻译。如今，长短期记忆也被用于语音识别和声学建模[[55](#505424_1_En_4_Chapter.xhtml#Par295),
    [56](#505424_1_En_4_Chapter.xhtml#Par296)]，这是实现虚拟助手和聊天机器人的重要前提。


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig13_HTML.png](images/505424_1_En_4_Chapter/505424_1_En_4_Fig13_HTML.png)


    图4-13


    生成对抗神经网络的架构原理和操作示意图。生成器网络生成假图像，这些图像作为判别器网络的输入。判别器估计该输入是真实的还是伪造的。当判别器确定输出为真实时，迭代训练结束。'
  raw: 'Convolutional neural networks are usually trained with labeled datasets that
    contain tens of thousands of images. A milestone in training convolutional neural
    networks was Yann LeCun’s back-propagation algorithm, which he developed at the
    famous Bell Laboratories in New Jersey back in 1989 [[44](#505424_1_En_4_Chapter.xhtml#Par283)].
    His elaborate algorithm does not only allow for training neural networks but also
    for automatically adjusting the filters or *convolution kernels* used in the feature
    extraction unit at the same time. Once the training is completed, the feature
    map will thus show the statistically most relevant features found in the entire
    training dataset. His approach later became the foundation of modern *computer
    vision* [[60](#505424_1_En_4_Chapter.xhtml#Par300)] , which offers a particularly
    large range of business and industry applications as we will see in the applications
    section of this chapter. Since then, convolutional neural networks have been used
    for, for example, searching objects on photos and videos, face recognition, style
    transfer in images, and improving the quality of photographic images.


    Face recognition plays a particular important role and is the focus of many startup
    ventures. A company that attracted severe media and investor attention in this
    context lately is the American startup company Affectiva, for instance. Spun off
    the MIT Media Lab in 2009, Affectiva employs a combination of face recognition
    and voice pattern analysis to determine the emotional and cognitive state of people.
    Potential applications range from improving road safety by sensing the emotional
    state of drivers (e.g., anger, fatigue, or lack of attention) to enhancing the
    customer experience in stores, to improving the impact of marketing campaigns.
    Those applications are nowadays referenced by the umbrella term *affective computing*
    [[45](#505424_1_En_4_Chapter.xhtml#Par285)] or *emotional AI* [[46](#505424_1_En_4_Chapter.xhtml#Par286)]
    .


    #### Deep Learning: Recurrent Neural Networks


    Artificial and convolutional neural networks are very good in detecting patterns
    in large (image) datasets. It turns out, however, that both networks are very
    bad in remembering previous inputs since they do not have any short- or long-term
    memory. In other words, their entire learning history is irretrievably encoded
    in the weights of the different neural connections only, and they cannot determine
    whether they have seen an input image before already.


    However, such a memory is very beneficial for applications that require a historical
    record of data, such as speech recognition and voice synthesis. This is why scientists
    developed another network architecture called *recurrent neural network* that
    is capable of memorizing previously processed data. The first recurrent neural
    network, the so-called *Hopfield network* , was developed by the American physicist
    John Hopfield back in 1982 [[47](#505424_1_En_4_Chapter.xhtml#Par287)]. His “associative
    memory” called model could be trained to store different images or patterns and
    was able to recognize any of them in other input images, subsequently. The performance
    of early implementations of recurrent neural networks was, however, quite limited
    since they could not be trained easily.^([^(100)](#fn100)) Various types of recurrent
    neural networks have been developed since then, each of which reveals certain
    advantages and disadvantages [[48](#505424_1_En_4_Chapter.xhtml#Par288)–[53](#505424_1_En_4_Chapter.xhtml#Par293)].


    The most powerful associative memory is the so-called *long-short-term memory*.
    This special type of recurrent neural network was developed by the German computer
    scientists Sepp Hochreiter and Jürgen Schmidhuber in 1997 [[54](#505424_1_En_4_Chapter.xhtml#Par294)]
    and designed to recognize patterns in (timely) sequences of data. Long-short-term
    memories soon revolutionized natural language processing and translation since
    language is a sequence of words, which can often only be translated properly once
    the words are put in context with each other. Long-short-term memories are also
    used for speech recognition and acoustic modeling nowadays [[55](#505424_1_En_4_Chapter.xhtml#Par295),
    [56](#505424_1_En_4_Chapter.xhtml#Par296)] as important prerequisites for the
    implementation of virtual assistants and chatbots.


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig13_HTML.png](images/505424_1_En_4_Chapter/505424_1_En_4_Fig13_HTML.png)


    Figure 4-13


    Schematic architecture and principles of operation of a generative adversarial
    neural network. The generator network generates fake images that serve as the
    input for the discriminator network. The latter estimates whether this input is
    real or fake. The iterative training ends as soon as the discriminator determines
    the output to be real'
