    \ any value in implementing an immutable record or register? Yes □ No □\n\n7.\
    \  Do your business or internal processes require or benefit from a high level\
    \ of data integrity? Yes □ No □\n\n8.  Is the data required for the implementation\
    \ of your idea very valuable and unique? Do outsiders have (economic) incentives\
    \ to corrupt or distort it? Yes □ No □\n\n9.  Do you have access to all human\
    \ resources (e.g., project managers and code writers) required for applying blockchain\
    \ technology in your organization? Yes □ No □\n\n    Further questions to be considered\
    \ when planning your implementation:\n    *   Which regulatory framework do you\
    \ have to comply to when implementing your blockchain?\n\n    *   Does your use\
    \ case allow for using a public blockchain, or does it require a private implementation?\n\
    \n    *   Can the blockchain be integrated into your existing IT infrastructure,\
    \ or do you need additional computational resources?\n\n    *   Who would need\
    \ to run and maintain the different nodes?\n\n    *   Who is expected to use the\
    \ application, and what expectations do they have?\n\n## 3.6 Further Reading\n\
    \nAt the end of this chapter, I would like to provide you with some recommendations\
    \ for further reading if you like to dive deeper into blockchain technology and\
    \ its applications:\n\n*   Drescher, D.: Blockchain Basics. A Non-Technical Introduction\
    \ in 25 Steps. Apress (2017).\n\n*   Shrier, D. L.: Basic Blockchain: What It\
