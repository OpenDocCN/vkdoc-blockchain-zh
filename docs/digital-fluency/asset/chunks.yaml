    # 1. 数字化与数字化转型


    `数字化`是当今重塑各行各业与社会各领域的技术趋势，被视为推动创新与颠覆性变革的主要且不可阻挡的力量，对公共和私营组织构成了同等挑战。随着所有经济和社会领域都受到影响，数字经济充满活力且竞争日益激烈。它赋能那些由数十亿美元风险资本支持的新兴初创企业，通过利用数字技术创造新颖的价值主张。这些企业高度可扩展、以数据驱动和软件为核心的运营模式，正在不断冲击现有企业，对其业务构成存亡威胁。不妨想想`苹果`的`iOS`和`谷歌`的`Android`智能手机。这两家公司通过构建统一的数字平台，吸引了不断扩展的第三方应用开发者生态系统，最终导致`诺基亚`从手机行业的霸主地位跌落，变得无足轻重。这种故事正威胁着在经济领域各处重演：`亚马逊`、`微软`和`谷歌`的云计算服务正在挑战传统的软件和硬件提供商；`亚马逊`和`阿里巴巴`的在线市场正在取代传统零售商，并挑战诸如按需服务的`沃尔玛`等公司；`Netflix`和`Hulu`的视频点播服务即将颠覆传统的付费电视提供商。另一个非常流行的例子是在线预订平台`Airbnb`和`Booking.com`，它们利用数字技术简化预订流程，提供个性化和量身定制的旅行体验，同时颠覆了包括`万豪`、`希尔顿`和`凯悦`在内的传统连锁酒店业务。为了获取数字技术带来的好处，那些已成立的组织——无论其在公共还是私营领域运营——都必须将数字技术融入自身生态系统，通过通常被称为“数字化转型”的组织变革过程，来推进其产品和服务组合。对于相比`亚马逊`、`谷歌`、`微软`等公司并非“生于数字”的企业而言，这一技术适应过程尤其具有挑战性，因为这些企业需要进行深远的业务转型，这很可能颠覆既有的工作设计和内部业务流程，并要求全新的思维方式和协作模式。


    然而，许多公共和私营部门的组织都难以理解数字技术对其业务和服务模式的影响。大多数企业领导和员工错误地认为，将文档数字化，并使用`Skype`或`Microsoft
    teams`取代移动电话，便能自动实现其组织的数字化转型。但数字化转型——正如我们将在本书中了解到的——远不止是将数字技术整合到现有组织结构中。它关乎创建一种敏捷、开放、持续学习和创新的企业文化，以释放诸如量子计算、区块链技术和人工智能等数字技术的潜力，从而提高生产力和竞争力，并为客户和员工创造可持续的价值。通过数字化其“核心”，即最关键的信息技术基础设施、系统和流程，组织可以消除传统瓶颈，实现前所未有的可扩展性和增长——数字本身只是一个赋能者，而非一个时髦的终点。


    根据`麦肯锡公司`最近一项关于数字化转型的调查，超过 80%的被分析公司表示，它们在过去五年中已经开展了此类变革努力。但仅有 16%的极小部分公司确认，它们成功地改善了绩效，并使自身业务在长期内不易受到颠覆和破产的影响[1]。另一方面，其他商业分析师评估了数字化转型对工作岗位和就业的影响，发现目前美国近
    40%的工作岗位属于可能萎缩的职业[2]——其他国家实际上也存在类似数据。在全球范围内，这一比例意味着到 2030 年，将有超过 7500 万至 3.75
    亿劳动者需要转换职业并更新技能，以避免失业[3]——这确实是一个令人震惊的规模。这些数字有力地表明，数字技术将在中长期内重塑并颠覆组织，包括成千上万个工作岗位。因此，作为思想领袖、顾问、投资者或员工，我们有必要通过研究数字技术的基本原理并学习其应用，为数字化做好准备，提升我们的技能、资质和对数字技术的了解。我们无需人人都成为量子物理学家、区块链程序员或数据科学家。但了解数字技术栈的概况，理解其运作原理和能力，将使我们能够跟进媒体中的这些趋势，理解创新产品和服务，评估应用场景和潜在用例，并最终在我们自己的职业环境中推动数字化转型。数字化基本上为我们所有人设定了一项任务：积极塑造我们面前的数字未来。


    在本章中，我们将学习数字化的基本概念和数字化转型，并更好地理解其颠覆性力量的性质和起源。所介绍的概念是理解量子计算、区块链技术和人工智能这三项最重要技术的前提，这些技术赋能并促进了组织的数字化转型。但在深入探讨这些概念之前，先回顾一下历史上那些曾塑造了我们行业和社会的其他变革，将颇有教益。

    '
- fmt: '## Historical Business Transformations


    Science and technology have always been shaping business and society. Historians
    who study this interdependence developed the idea that humankind went through
    four big *waves of technology adoption*, each of which was accompanied by severe
    changes in society and improvements of productivity in industry [[4](#505424_1_En_1_Chapter.xhtml#Par206)].
    The first big wave is associated with the steam engine, which was invented by
    the English military engineer Capt. Thomas Savery in 1698 and converts the steam
    of boiling water to mechanical energy. Originally developed to draw water from
    flooded mines in the mining industry [[5](#505424_1_En_1_Chapter.xhtml#Par207)],
    the steam engine soon seeded technological innovations in other industrial sectors,
    too. Steam engines were used to power mechanized weaving looms in the British
    textile industry, for instance, where they boosted the productivity by eight times
    compared to simple spinning wheels. But the application of the steam engines was
    not only limited to the mining and textile industry. It also revolutionized the
    transportation industry with the arrival of steamships and steam-powered locomotives
    some 100 years later. Both innovations brought about further massive changes since
    humans and goods could move great distances in fewer hours from that time on.
    This period between 1760 and 1840^([²](#fn2)) is referred to as *industrial revolution*
    or industry 1.0\. The adoption of steam and water power in the manufacturing and
    transportation industry had profound impacts on established companies and also
    fostered the exploitation of new businesses as human creativity was no longer
    limited to pure muscle power. But the industrial revolution did also have major
    impacts on society through creating new jobs and occupations, such as mechanical
    maintenance and quality engineers in the manufacturing space, and replacing manual
    labor by automated process. In consequence, this first wave of technology adoption
    increased the standard of living and made Europe as a whole less dependent on
    agriculture and more centered around the mass production of (consumer) goods –
    with all advantages and disadvantages.


    In the 19th century, the pioneering work of the three physicists André-Marie Ampère,
    Michael Faraday, and James Clerk Maxwell became the foundational basis for the
    next wave of technology adoption, which refers to the discovery of electricity
    and is called *technological revolution* or industry 2.0\. Electricity turned
    out to be a very convenient way to transmit vast amounts of energy, that is, the
    physical ability to perform work, across very large distances at minimum loss
    to power light bulbs, heavy industrial machines, and other electric devices. It
    also inspired the automobile pioneer Henry Ford to combine electricity with the
    idea of mass production and introduce moving chassis assembly lines to the automobile
    industry beginning with his Highland Park Ford Plant in 1913.^([³](#fn3)) Traditionally,
    vehicles had been assembled in fixed work stations, with different workers coming
    to the vehicles to deliver and assemble the components required. On the assembly
    line, the vehicles would move through a series of sequential work stations on
    an automated conveyer belt with stationary workers that perform highly specialized,
    repetitive, and standardized assembly tasks. With the help of the American engineer
    Frederick Taylor and his principles for an efficient work process control known
    as *Taylorism*, Henry Ford managed to cut the assembly time of his legendary Model
    T – affectionately called the “Tin Lizzie” – by a factor of 10, an improvement
    that reduced manufacturing costs dramatically. With respect to standardization,
    Henry Ford once noted that “any customer can have a car painted any color that
    he wants so long as it is black.” Electrically powered assembly lines soon boosted
    productivity in virtually all industries while reducing the manufacturing costs
    and physical strains of workers dramatically. It is needless to say that both
    electricity and the introduction of assembly lines between 1840 and 1970 had major
    impacts on society as they created numerous new jobs and occupations in the manufacturing
    space while rendering others obsolete.


    Particularly relevant for the digital technologies introduced in this book is
    the third wave of technology adoption, the so-called *information revolution*
    or industry 3.0\. Beginning in the 1970s, companies began to automate industrial
    manufacturing by memory-programmable controls, the forefathers of personal computers.
    By employing such computer controls, they were able to partially automate their
    production processes without any human assistance. The technological basis for
    this technology dates back to 1947 and the discovery of the transistor by the
    three American physicists and later Nobel laureates John Bardeen, William Shockley,
    and Walter Brattain at the famous Bell Laboratories in New Jersey, America. This
    tiny little electric switch, which we will study in further detail in the following,
    soon became the basic building block of personal computers and virtually every
    electronic device that employs microchips to control manufacturing processes by
    processing digital information. IBM’s first commercially available product based
    on transistor technology was the IBM 608 system, a cupboard-sized accounting calculator
    with more than 3,000 transistors in total. For comparison, the computers and electronic
    devices we use today are much more powerful and versatile in their application
    and can have several billion transistors in one microchip.'
