  raw: 'Digitalization and digital transformation, big data and artificial intelligence,
    as well as quantum computing and blockchain technology are among the hottest and
    most cited buzzwords in media today. Everybody has heard about them, but only
    few people comprehend them. Metaphorically speaking, they seem to occupy a high-speed
    train that departs soon. Nobody knows wherefrom and whereto, but everybody likes
    to join immediately so as not to lose a chance. Hence, digital technologies have
    been subject to intense speculation and controversial discussions in politics,
    industry, and society that are driven by exaggerated hopes and fears. Optimists
    highlight the great future prospects of digital technologies and envision the
    arrival of new very practical applications that create even more jobs than digitalization
    destroys. Pessimistic people, on the other hand, spread fears about them and are
    afraid of mass unemployment caused by intelligent and often violent robots that
    transcend human intelligence and thereby render millions of jobs obsolete.


    Independently of which party has the better arguments, both sides do generally
    agree that digital technologies continue to have tremendous social and economic
    impacts. Just think about the Internet and smartphone that radically changed the
    way we communicate, inform, interact, and transact with each other. The smartphone
    , for example, evolved from being simply a better phone to a digital platform
    for mobile applications that provide access to the Internet and soon became indispensable
    in our everyday life. With the arrival of digital technologies and the smartphone,
    in particular, the amount of readily available information and data exploded.
    Thus far, we have seen the most prominent effects in industries like retail, advertising,
    media, and music, but others are poised to follow. Google , for example, processes
    more than 40,000 searches every second. Users of YouTube watch more than 68,000
    videos and send over 5,800 tweets on Twitter every second. Inspired by this breathtaking
    scale, Google’s chief economist Hal Varian once noted in 2013 nicely: “A billion
    hours ago, modern *Homo sapiens* emerged. A billion minutes ago, Christianity
    began. A billion seconds ago, the IBM personal computer was released. A billion
    Google searches ago... was this morning.”^([¹](#fn1)) With an average usage of
    28 minutes per day and more than 8.9 million daily uploads of novel photos and
    videos, the social networking service Instagram is another example, which impressively
    demonstrates how the Internet, smartphones, and other digital devices have revolutionized
    the way we consume information. News is no longer read in printed newspapers and
    magazines but rather through online media platforms and social networks like Facebook
    , which completely disrupted the business of established media and news publishing
    companies. Amazon, Alibaba, Microsoft, Netflix, and Spotify are just a few examples
    of companies that explored and picked up this digital trend early on and leveraged
    digital technologies successfully to disrupt existing and create new, highly profitable
    digital revenue streams.


    We are also seeing the beginning of digital transformation in the financial services
    industry today, where established investment banks and hundreds of fintech startups –
    backed by billions of US dollars in venture capital – employ a whole range of
    digital technologies to advance their products and services. They optimize financial
    value chains and pricing models by quantum computers, offer easy-to-use retail
    banking and payment services powered by blockchain technology , and increase cybersecurity
    by artificial intelligence as you will see in selected examples throughout this
    book.


    Accelerated by the severe corona crisis caused by the deadly COVID-19 virus spread
    in 2020/21 worldwide, digital transformation has also begun to disrupt the economically
    very important automobile industry. We may see the arrival of, for example, autonomous
    vehicles powered by artificial intelligence, fully connected vehicle infotainment
    services with in-car payment systems based on blockchain technology, and navigational
    systems that identify the fastest route through overcrowded cities by leveraging
    quantum computing embedded in a mobility cloud infrastructure in the not too distant
    future. The digital transformation of the automotive industry is expected to improve
    customer journeys by new functionalities and drive gigantic gains in productivity,
    efficiency, and cost savings, which is why it is a matter of time until it sweeps
    across every sector of modern industry and society.


    No discussion about digital transformation would be complete without mentioning
    its wide-ranging impact on governmental organizations, too, such as central banks,
    tax offices, national courts, notary services, and health departments. Digital
    transformation does not only help private organizations to streamline internal
    processes but also public institutions to reduce bureaucracy and optimize public
    product and service portfolios. There is no doubt that organizations – private
    as well as public – that embrace digital technologies today will determine their
    competitive stance for the decades to come.


    *Digital Fluency* is meant to be an introductory handbook for employees and decision
    makers in private and public organizations, who want to understand digital technologies
    and apply them in their own ecosystem. It therefore makes a broad attempt at synthesizing
    key concepts and bringing together the most important technologies that foster
    digital transformation in organizations today. You will see throughout this book
    that quantum computing, blockchain technology, and artificial intelligence are
    the most important digital technologies as they can be applied to a large variety
    of use cases across all sectors of modern industry and society.


    But what are digital technologies about, and how do they operate? How can we apply
    them in our job and everyday life? How can we use them to optimize existing and
    create new, valuable opportunities? What are the most prominent use cases of quantum
    computing, blockchain technology, and artificial intelligence, and when do they
    make sense? What are the advantages and disadvantages compared to existing technologies,
    and what are the limitations and challenges involved in leveraging them? *Digital
    Fluency* answers all top-of-mind questions you may have about digitalization and
    digital technologies. The answers will allow you to develop a profound understanding
    of them as an important prerequisite for accessing their impact on your own professional
    ecosystem and preparing yourself for the exciting digital future ahead of us.
    After reading this book, you will be able to better understand digital technologies,
    critically scrutinize daily news about them, and – most importantly – access their
    relevance and impact on your own life and professional career.'
