    technologies into existing organizational structures. Digital transformation is
    about creating an agile, open-minded, constantly learning, and innovating business
    culture that unleashes the potential of digital technologies – such as quantum
    computing, blockchain technology, and artificial intelligence – to increase productivity
    and competitiveness and to create sustainable value for customers and employees.
    By digitizing their “core,” that is, their most critical IT infrastructures, systems,
    and processes, organizations can remove traditional bottlenecks and enable unprecedented
    scalability and growth – digital is just an enabler and not a trendy end by itself.


    According to a recent survey on digital transformation by McKinsey & Company,
    more than 80% of the companies analyzed say that they have undertaken such transformative
    efforts in the past five years already. But only a marginal fraction of 16% confirm
    that they succeeded in improving performance and making their business less susceptible
    to disruption and bankruptcy in the long term [[1](#505424_1_En_1_Chapter.xhtml#Par203)].
    On the other hand, other business analysts have assessed the impact of digital
    transformation on jobs and employment and found out that almost 40% of current
    US jobs are in occupations that are likely to shrink [[2](#505424_1_En_1_Chapter.xhtml#Par204)] –
    similar figures can actually be found for other countries, too. On a global scale,
    this fraction translates into more than 75 million to 375 million workers that
    will need to switch their occupation and qualification skillset by 2030 in order
    to avoid unemployment [[3](#505424_1_En_1_Chapter.xhtml#Par205)] – a truly alarming
    scale. Those numbers impressively demonstrate that digital technologies will reshape
    and disrupt organizations including thousands of jobs on the medium and long term.
    This is why it is essential for us as thought leaders, consultants, investors,
    or employees to get ready for digitalization and advance our skills, qualifications,
    and knowledge about digital technologies by studying their basic principles and
    learning about their applications. We do not need to become a quantum physicist,
    blockchain programmer, or data scientist alltogether. But having an overview on
    the digital technology stack and understanding its operating principles and capabilities
    will allow us to follow those trends in media, comprehend innovative products
    and services, evaluate applications and potential use cases, and finally drive
    the digital transformation in our own professional environment. Digitalization
    basically forms a mandate for all of us to actively shape the digital future ahead
    of us.


    In this chapter, we will learn about the fundamental concepts of digitalization
    and digital transformation and better understand the nature and origin of their
    disruptive force. The presented concepts are the prerequisite for understanding
    quantum computing, blockchain technology, and artificial intelligence as the three
    most important technologies that enable and foster the digital transformation
    of organizations. But before we dive deep into those concepts, it is instructive
    to relate digital transformation to other historical transformations that have
    shaped our industry and society in the past.'
