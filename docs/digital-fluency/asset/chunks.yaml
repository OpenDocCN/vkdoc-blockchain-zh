- fmt: 'If you are a business leader, `Digital Fluency` provides you with a deep understanding
    of digital technologies and their impact on management and decision making. If
    you are a student, this book gives you different technology frameworks for thinking
    about the evolution of jobs and professional careers in digital industries. If
    you are a financial analyst or venture capitalist, `Digital Fluency` offers inspiring
    insights for developing and implementing highly profitable investment strategies.
    If you are a politician or policy maker, on the other hand, you will better understand
    how digital technologies will impact society and governmental organizations and
    how they can be used to simplify administrative processes, in particular. As a
    general reader, who does not fall into either of those categories, you will be
    surprised about how digital technologies impact modern industry and society and
    how they will shape our future as individuals in an increasingly globalized, fully
    connected, and highly digitized world.


    As you read this book, you will realize that the history of digital transformation
    and digital technologies is a joyful and entertaining journey through a large
    range of academic disciplines including economics, behavioral science, information
    technology, natural sciences, and physics. This is why I will introduce you to
    some of the most fundamental and fascinating concepts of modern science in the
    following chapters without requiring any math skills that go beyond your junior
    high school classes.


    `Digital Fluency` is organized into five chapters to cover scientific key concepts
    and highlight important applications exemplarily. Here is a brief description
    of each chapter:


    - **Chapter** [**1**](#505424_1_En_1_Chapter.xhtml)**, “Digitalization and Digital
    Transformation”**: This chapter provides you with the basics of digitalization
    and digital transformation. You will learn that both concepts arise due to the
    confluence of different digital technologies, such as quantum computing, blockchain
    technology, and artificial intelligence, that are profoundly disruptive in their
    nature. Furthermore, we will investigate the digital ecosystem of organizations
    and therein identify the most important driving forces of digital transformation,
    such as sustainability, cybersecurity, as well as the increasing complexity and
    connectivity of products and services. We will also take a look at digital transformation
    strategy including the innovation models of Amazon, Google, Microsoft, and IBM
    to highlight that digital transformation is much more than a simple update of
    an organization’s IT infrastructure. Popular examples from Nokia and Kodak Eastman
    Company will illustrate the fatal consequences of digital disruption, a competitive
    force that often causes incumbent organizations to fail if they do not leverage
    digital technologies on time. This chapter concludes with a brief introduction
    to classical information processing that forms the basis for the operation of
    modern computers, smartphones, and other digital devices we use in our everyday
    life.


    - **Chapter** [**2**](#505424_1_En_2_Chapter.xhtml)**, “Quantum Computing”**:
    You will learn key concepts of quantum computing in this chapter, one of the most
    exciting and technologically most challenging digital technologies. Quantum computers
    are sometimes described as the “next level of supercomputing” since they can conduct
    gazillions of calculations simultaneously to offer exponential gains in computational
    speed and performance compared to traditional computers. This dramatic increase
    is related to different quantum effects, such as superposition and entanglement,
    that are used to encode and process quantum information. We will also cover the
    foremost important physical implementation schemes and fundamental types of quantum
    computers that are often incorrectly used in media alike. Besides this, there
    will be an introduction to the most relevant quantum computers that are commercially
    available today, such as D-Wave’s quantum annealer named 5000Q and Google’s legendary
    Sycamore quantum processor. The latter attracted great attention in media lately
    when Google demonstrated quantum supremacy in 2019 for the very first time, an
    important technological milestone in the development of quantum computers. Last
    but not least, there will be a discussion of the most significant applications,
    such as drug development, financial portfolio optimization, and quantum machine
    learning.


    - **Chapter** [**3**](#505424_1_En_3_Chapter.xhtml)**, “Blockchain Technology”**:
    In this chapter, we will take a look at blockchain technology, which was initially
    created for Bitcoin, the first worldwide and most popular digital money or cryptocurrency
    until now. You will learn that blockchain technology – the “ultimate trust machine”
    as it is sometimes called – deploys trust in untrusted environments. It thereby
    enables the trustworthy exchange of value between two or more transacting parties
    even if they neither know nor trust each other. You may be surprised to learn
    that value in this context may refer to any kind of valuable digital information,
    such as digital money, intellectual property rights, and other digitized assets.
    A vivid explanation of the most important key concepts, including peer-to-peer
    computer networks, digital signatures, and Merkle trees, will also allow you to
    better understand the overall Bitcoin transaction life cycle for transferring
    monetary value. Furthermore, we will cover smart contracts as an important extension
    of blockchain technology, which allows for automating administrative processes
    in organizations. While most experts agree that Bitcoin was a hype, we will see
    at the end of this chapter that applications of blockchain technology continue
    to grow. For this purpose, we will discuss the most important applications, such
    as international trade platforms, supply chain management systems, as well as
    etaxation and evoting.'
