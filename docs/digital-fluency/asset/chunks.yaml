  raw: "#### Financial Services and Insurance: News Analytics and Intelligent Pricing\n\
    \nNews analytics and intelligent pricing are two further examples. JPMorgan Chase\
    \ and other financial institutions are tackling with artificial intelligence.\
    \ *News analytics* is typically based on natural language processing algorithms\
    \ that scan online media for news being relevant for a particular client, industry,\
    \ or investment decision. These scans are categorized to create information transparency\
    \ as a prerequisite for data-driven decision making. The American global investment\
    \ management corporation BlackRock, the world’s largest asset manager with more\
    \ than USD 6.8 trillion under its control, is also reported to employ news analytics\
    \ for their Aladdin^([^(129)](#fn129)) called risk management system that is operated\
    \ by BlackRock Solutions [[128](#505424_1_En_4_Chapter.xhtml#Par368)]. *Intelligent\
    \ pricing* of financial products and services is about calculating the best price\
    \ in real time depending on multiple customer and market variables, such as time\
    \ of day, location, real-time demand, and the customer’s purchasing history. Such\
    \ algorithms pave the way from rules-driven to data-driven pricing models and\
    \ allow institutions to increase their profitability and competitiveness by personalizing\
    \ and contextualizing prizes. Such algorithms typically employ polynomial regression\
    \ models, ensemble methods, and artificial neural networks to identify certain\
    \ patterns of behavioral customer data. Data-driven intelligent pricing and personalization\
    \ of offers are, of course, relevant for a whole range of other businesses, too,\
    \ including supermarkets and online warehouses.\n\nI hope you did enjoy our journey\
    \ through the exciting world of artificial intelligence and its multifaceted applications.\
    \ As a general-purpose technology, artificial intelligence is used to drive revenue\
    \ and margin growth or establish entirely new business models – it is the third\
    \ and probably most versatile digital technology that enables the digital transformation\
    \ of organizations in the private and public sector.\n\n## 4.5 Key Points\n\n\
    *   Artificial intelligence refers to pieces of software that can be executed\
    \ by computers and has the ability to learn and reason like humans. This software\
    \ translates real-life (business) problems into mathematical models that are technically\
    \ called algorithms.\n\n*   Artificial intelligence falls into two major subcategories:\
    \ (1) Machine learning refers to a group of algorithms with the ability to learn\
    \ without being explicitly programmed. (2) Deep learning employs artificial neural\
    \ networks to process digital information. In order to work properly, artificial\
    \ neural networks have to be trained by large training datasets (big data).\n\n\
    *   Machine learning builds on two key concepts: a (1) cost function or optimization\
    \ objective that describes the real-life problem mathematically and an (2) optimization\
    \ algorithm, like gradient descent, that allows for the minimization of the cost\
    \ function and solves the respective problem at hand. The most popular algorithms\
    \ are regression, classification, clustering, and association.\n\n*   Deep learning\
    \ employs artificial neural networks, that is, layered structures of interconnected\
    \ neurons that are emulated by software and arranged in an input and output layer\
    \ as well as one or multiple deep layers for feature detection. Depending on the\
    \ particular topology of the neural network, one differentiates (1) convolutional,\
    \ (2) recurrent, and (3) generative adversarial neural networks, (4) recommender\
    \ systems, and (5) auto encoders.\n\n*   Artificial intelligence employs different\
    \ learning strategies for training algorithms, namely, (1) supervised learning\
    \ with labeled data, (2) unsupervised learning with non-labeled data, (3) deep\
    \ learning, (4) ensemble methods, and (5) reinforcement learning.\n\n*   The most\
    \ popular applications of artificial intelligence are big data analysis, optimization\
    \ and prediction, personalization by sentiment analysis and recommendation, feature\
    \ detection and pattern recognition, natural language processing, computer vision\
    \ including image recognition and object detection, as well as anomaly and fraud\
    \ detection.\n\n## 4.6 Artificial Intelligence Framework\n\nAre you thinking about\
    \ using artificial intelligence in your organization or applying it to your own\
    \ use case? If the answer to most of the key questions in the following implementation\
    \ checklist is “Yes,” artificial intelligence may well assist you in implementing\
    \ your own business idea or use case.\n\n1.  What is your use case about? Does\
    \ it fit into one of the following generic categories? Yes □ No □\n    *   Big\
    \ data analysis\n\n    *   Modeling and simulation\n\n    *   Data and file compression\n\
    \n    *   Optimization and prediction\n\n    *   Personalization of products and\
    \ services\n\n    *   Feature detection and pattern recognition\n\n    *   Sentiment\
    \ analysis and recommender systems\n\n    *   Natural language processing and\
    \ voice recognition\n\n    *   Computer vision incl. image recognition and object\
    \ detection\n\n    *   Clustering and classification incl. anomaly and fraud detection\n\
    \n2.  Has a similar use case been solved by employing artificial intelligence\
    \ before – is it mentioned in Table [4-2](#505424_1_En_4_Chapter.xhtml#Tab2)?\
    \ Yes □ No □\n\n3.  Does (big) data analytics play a crucial role in your daily\
    \ decision-making process already?Yes □ No □\n\n4.  Is the big data required for\
    \ your application in terms of the three Vs (i.e., volume, velocity, and variety)\
    \ already available from internal or external databases?Yes □ No □\n\n5.  Is the\
    \ amount of available data to train your model exponentially larger than the search\
    \ space, that is, the number of possible solutions to your problem?Yes □ No □\n\
    \n6.  What kind of patterns, structures, or features are you expecting to see\
    \ when analyzing your big data? Do you have the expertise to judge whether the\
    \ result obtained from the algorithm is reasonable or just a statistical side\
    \ effect? Yes □ No □\n\n7.  Is there an automated process for updating your data\
    \ regularly? Yes □ No □\n\n8.  Do you have access to all human and computational\
    \ resources (hardware and software) required to implement your application or\
    \ use case? Yes □ No □\n\n    Further questions to be considered when planning\
    \ your implementation:\n    *   Who is expected to use the implemented algorithms,\
    \ and what are their expectations?\n\n    *   Who will have to maintain your artificial\
    \ intelligence services including the hardware infrastructure and shared software\
    \ tools?\n\n    *   Does your application require labeled or unlabeled data for\
    \ training your artificial intelligence algorithms?\n\n    *   Which regulatory\
    \ framework do you have to comply to when dealing with big data?\n\n## 4.7 Further\
    \ Reading\n\nAt the end of this chapter, I would like to provide you with some\
    \ recommendations for further reading if you like to dive deeper into artificial\
    \ intelligence, machine learning, and their applications:\n\n*   Taulli, T.: Artificial\
    \ Intelligence Basics. A Non-Technical Introduction. Apress (2019).\n\n*   Thamm,\
    \ A. *et al.*: The Ultimate Data and AI Guide: 150 FAQs About Artificial Intelligence,\
    \ Machine Learning and Data. Data AI Press (2020).\n\n*   Hastie, T. *et al.*:\
    \ The Elements of Statistical Learning: Data Mining, Inference, and Prediction.\
    \ Springer (2009).\n\n*   Nilsson, N. J.: The Quest for Artificial Intelligence:\
    \ A History of Ideas and Achievements. Cambridge University Press (2010).\n\n\
    *   Chollet, F.: Deep Learning with Python. Manning (2017).\n\n*   Hawkins, J.\
    \ and Blakeslee, S.: On Intelligence: How a New Understanding of the Brain Will\
    \ Lead to the Creation of Truly Intelligent Machines. St. Martin’s Griffin (2005)."
  trans: "\n#### 金融服务与保险：新闻分析与智能定价\n\n`新闻分析`和`智能定价`是另外两个例子。`摩根大通`及其他金融机构正着手运用人工智能。`新闻分析`通常基于自然语言处理算法，这些算法会扫描在线媒体，寻找与特定客户、行业或投资决策相关的新闻。这些扫描结果经过分类，以创造信息透明度，为数据驱动的决策奠定基础。据报道，全球投资管理公司`贝莱德`（全球最大的资产管理公司，管理资产超过`6.8\
    \ 万亿美元`）也为其名为`Aladdin`^(¹²⁹)的风险管理系统采用了`新闻分析`技术，该系统由`贝莱德解决方案`运营[128]。金融产品及服务的`智能定价`，是指根据多种客户和市场变量（如时段、地点、实时需求及客户的购买历史）实时计算最优价格。此类算法为从规则驱动到数据驱动的定价模型铺平了道路，使机构能够通过个性化和情境化的定价来提升盈利能力和竞争力。这类算法通常采用多项式回归模型、集成方法和人工神经网络，以识别客户行为数据中的特定模式。当然，数据驱动的`智能定价`和个性化报价也与众多其他业务领域相关，包括超市和在线仓储。\n\
    \n希望你喜欢我们穿越激动人心的人工智能世界及其多方面应用的旅程。作为一种通用技术，人工智能被用于推动收入和利润增长，或建立全新的商业模式——它是第三种，也可能是用途最广泛的数字技术，能够实现私营和公共部门组织的数字化转型。\n\
    \n## 4.5 关键要点\n\n*   人工智能指的是可由计算机执行的软件，具备像人类一样学习和推理的能力。这种软件将现实（商业）问题转化为数学模型，技术上称为算法。\n\
    \n*   人工智能分为两个主要子类别：(1) 机器学习：指一组无需显式编程就能学习的能力的算法。(2) 深度学习：采用人工神经网络处理数字信息。为了正常工作，人工神经网络必须通过大型训练数据集（大数据）进行训练。\n\
    \n*   机器学习建立在两个关键概念之上：(1) 成本函数或优化目标，它用数学方式描述现实问题；(2) 优化算法（如梯度下降），它能够最小化成本函数并解决当前问题。最流行的算法有回归、分类、聚类和关联。\n\
    \n*   深度学习采用人工神经网络，即由软件模拟的、相互连接的神经元层状结构，排列成输入层、输出层以及一个或多个用于特征检测的深层。根据神经网络的具体拓扑结构，可以区分为(1)\
    \ 卷积神经网络、(2) 循环神经网络、(3) 生成对抗神经网络、(4) 推荐系统和(5) 自编码器。\n\n*   人工智能采用多种学习策略来训练算法，即：(1)\
    \ 使用标记数据的监督学习，(2) 使用非标记数据的无监督学习，(3) 深度学习，(4) 集成方法，以及(5) 强化学习。\n\n*   人工智能最流行的应用包括大数据分析、优化与预测、通过情感分析和推荐实现个性化、特征检测与模式识别、自然语言处理、包括图像识别和目标检测的计算机视觉，以及异常和欺诈检测。\n\
    \n## 4.6 人工智能框架\n\n你是否正在考虑在你的组织中使用人工智能，或将其应用到自己的用例中？如果下面对以下实施清单中大部分关键问题的回答是“是”，那么人工智能很可能有助于你实现自己的商业构想或用例。\n\
    \n1.  你的用例是关于什么的？它是否属于以下通用类别之一？是 □ 否 □\n    *   大数据分析\n    *   建模与仿真\n    *  \
    \ 数据与文件压缩\n    *   优化与预测\n    *   产品与服务个性化\n    *   特征检测与模式识别\n    *   情感分析与推荐系统\n\
    \    *   自然语言处理与语音识别\n    *   计算机视觉（包括图像识别与目标检测）\n    *   聚类与分类（包括异常和欺诈检测）\n\n\
    2.  之前是否有类似的使用案例通过人工智能解决过——表 4-2 中是否提及？是 □ 否 □\n\n3.  （大）数据分析是否已经在你的日常决策过程中发挥关键作用？是\
    \ □ 否 □\n\n4.  对于你的应用而言，所需的大数据（从三个 V，即数据量、速度和多样性的角度来看）是否已经从内部或外部数据库可用？是 □ 否 □\n\
    \n5.  用于训练你模型的可获取数据量是否呈指数级大于搜索空间（即针对你问题的可能解决方案的数量）？是 □ 否 □\n\n6.  在分析你的大数据时，你期望看到什么样的模式、结构或特征？你是否具备判断算法得出的结果是否合理或仅仅是统计副作用的专业知识？是\
    \ □ 否 □\n\n7.  是否有定期更新数据的自动化流程？是 □ 否 □\n\n8.  你是否能够获取实施你的应用或用例所需的所有人力和计算资源（硬件和软件）？是\
    \ □ 否 □\n\n    规划实施时需考虑的进一步问题：\n    *   预计谁会使用实施的算法，他们的期望是什么？\n    *   谁将负责维护你的人工智能服务，包括硬件基础设施和共享软件工具？\n\
    \    *   你的应用是需要标记数据还是非标记数据来训练你的人工智能算法？\n    *   在处理大数据时，你需要遵守哪些监管框架？\n\n## 4.7\
    \ 延伸阅读\n\n在本章末尾，如果你希望更深入地了解人工智能、机器学习及其应用，我想为你提供一些延伸阅读建议：\n\n*   Taulli, T.: 《人工智能基础：非技术性入门》。Apress\
    \ 出版社，2019 年。\n*   Thamm, A. 等：《终极数据与 AI 指南：关于人工智能、机器学习与数据的 150 个常见问题解答》。Data\
    \ AI 出版社，2020 年。\n*   Hastie, T. 等：《统计学习基础：数据挖掘、推断与预测》。Springer 出版社，2009 年。\n\
    *   Nilsson, N. J.：《探寻人工智能：思想与成就的历史》。剑桥大学出版社，2010 年。\n*   Chollet, F.：《Python\
    \ 深度学习》。Manning 出版社，2017 年。\n*   Hawkins, J. 和 Blakeslee, S.：《智能时代：新认知如何催生真正的智能机器》。圣马丁格里芬出版社，2005\
    \ 年。\n"
- fmt: '# 5. Your Digital Action Plan


    The previous chapters provided you with a profound understanding of the three
    most important digital technologies that foster the digital transformation of
    private and public organizations: quantum computing, blockchain technology, and
    artificial intelligence. The different applications and use cases described exemplarily
    at the end of each chapter revealed that each technology not only allows for optimizing
    existing products and services but also for exploring new growth opportunities
    in mature and entirely new markets or environments.


    Chapter [2](#505424_1_En_2_Chapter.xhtml), “Quantum Computing,” introduced quantum
    computing as a transformative force for organizations that employ (super)computing
    for highly complex optimization, modeling, and simulation problems. We also learned
    about the far-reaching potential of blockchain technology and its unique capability
    to deploy trust in untrusted environments and enable cryptographically secured
    value transfers between two or more trading partners. Last but not least, we studied
    artificial intelligence as the underlying technology for big data analytics, machine
    learning, and other applications that allow for monetizing large datasets and
    implementing data-driven – and thus more transparent and objective – decision-making
    processes.


    To this end, one very important question remains to be answered: how can we leverage
    those digital technologies to get started with the digital transformation of our
    own ecosystem or organization? This is the focus of the present chapter. We will
    discuss an easy-to-use digital action plan that guides you through your own digital
    transformation and introduce eight key dimensions that should be considered in
    your digital agenda as shown in Figure [5-1](#505424_1_En_5_Chapter.xhtml#Fig1).
    We will start by having a close look on developing an appropriate business and
    operating model that are driven by digital technologies and supported by an appropriate
    technology stack and computing platform. After that, we will talk about digitizing
    the core of an organization by providing a coherent and shared data platform.
    We will also learn about the key criteria to identify suitable pilot projects
    and the transformational but often undervalued impact of empowering management
    and employees. Furthermore, shaping the organizational structure based on agile
    models of collaboration will also turn out to be crucial for completing a digital
    transformation successfully. Last but not least, we will see that a successful
    digital transformation relies on an open innovation culture that fosters the integration
    of feedback and new ideas by leveraging your ecosystem as another key dimension.


    ![../images/505424_1_En_5_Chapter/505424_1_En_5_Fig1_HTML.png](images/505424_1_En_5_Chapter/505424_1_En_5_Fig1_HTML.png)


    *Figure 5-1* — The eight key dimensions of digital transformation


    But before we discuss this digital action plan along the eight key dimensions
    of digital transformation in detail, it is instructive to have a look on the digital
    transformation of Microsoft to highlight certain similarities: In 2011, Microsoft
    was a tired company. It faced a range of severe competitive threats spawned by
    the Internet and had run into serious antitrust scrutiny, both threatening its
    existing business model. Their traditional software business was about shipping
    software CDs around the world to install `Microsoft DOS`, `Windows`, and `Office`
    on every computer. Besides exploiting this classic software business, Microsoft
    had been experimenting with a small cloud computing service called `Microsoft
    Azure` at that time for delivering software and services on demand. This explorative
    project was, however, widely considered a nonprofitable failure, which is why
    Microsoft was focusing on exploiting its legacy business instead. But Satya Nadella
    – the head of Microsoft’s Server and Tools group at that time – disagreed with
    this strategic assessment and was filled with conviction that cloud computing
    will be the future of Microsoft. Three years later, Satya Nadella succeeded Steve
    Ballmer as CEO and reinforced his strong vision in his first email to his employees
    by writing: “Our industry does not respect tradition – it only respects innovation.
    [...] Our job is to ensure that Microsoft thrives in a mobile and cloud-first
    world” [[1](#505424_1_En_5_Chapter.xhtml#Par140)]. In order to bring his clear
    and compelling vision to life, he rearchitected Microsoft’s software delivery
    process in the following years by transforming the underlying traditional business
    model from putting software on computing hardware on premise to delivering software-as-a-service
    via cloud computing on demand. For this purpose, Satya Nadella scaled up the digital
    pilot project `Azure` by adding more and more cloud-based applications to it,
    such as `Microsoft Office 365` and `Microsoft Dynamics`, an enterprise resource
    planning and customer relationship management software. His strategy gained further
    traction with the acquisition of `GitHub` in 2018, a very popular online repository
    for open source software projects and tools. Guided by his clear vision and strong
    conviction about the future of cloud computing, he successfully transformed Microsoft
    into a cloud software company. In consequence, Microsoft’s stock prize tripled
    in value during the first three years of his CEO tenure. But this was not the
    last digital transformation on his agenda. Inspired by the famous “AI-first” announcement^([^(130)](#fn130))
    of his friend Sundar Pichai [[2](#505424_1_En_5_Chapter.xhtml#Par141)], the CEO
    of Google, Satya Nadella adjusted his vision in 2018 and laid out plans for Microsoft’s
    next digital transformation into an “intelligent cloud and intelligent edge” computing
    provider [[4](#505424_1_En_5_Chapter.xhtml#Par143)], who also leverages the three
    digital support technologies introduced in this book. He later noted in an interview
    that “AI is the run-time which is going to shape all of what we do” [[5](#505424_1_En_5_Chapter.xhtml#Par144)]
    – a digital business strategy that Microsoft is pursuing with its `Azure` cloud
    computing platform very successfully until today.


    What can we learn from Microsoft’s digital transformation journey? The foremost
    important lesson to learn is that success with a novel product or service does
    not come without any entrepreneurial and thus financial risk. Amazon, for example,
    has admittedly had some spectacular failures over the years worth billions of
    dollars [[6](#505424_1_En_5_Chapter.xhtml#Par145)], such as `Amazon Auctions`,
    `zShops`, and its `Fire Phone` that became the basis for its highly successful
    products `Amazon Marketplace` and `Amazon Alexa`/`Echo` later on, respectively.
    Jeffrey Bezos, the founder of Amazon, famously noted in this context in his 2016
    Letter to Shareholders:'
