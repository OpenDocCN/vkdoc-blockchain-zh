    *   Bashir, I.: Mastering Blockchain – Second Edition: Distributed ledger technology,\
    \ decentralization, and smart contracts explained. Packt (2018).\n\n*   CoinDesk.\
    \ [`www.coindesk.com/tag/blockchain-reports/`](https://www.coindesk.com/tag/blockchain-reports/).\n\
