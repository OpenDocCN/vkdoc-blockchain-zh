  trans: '

    # 2. 量子计算


    量子计算是本书中我们将要详细探讨的第一种数字支持技术。它有时被描绘成才华横溢的科学家在奇特的实验室里探索最隐晦的自然现象，旨在建造功能强大到几乎无所不能的科幻小说式超级计算机。但近来，这种公众认知正在发生改变，因为世界各地的多家科技公司已投资这项技术，将其应用于现实商业问题并探索潜在用例。例如，谷歌、微软、IBM
    和霍尼韦尔等公司，仅举几例这一持续进行的工业研究领域的先驱。他们频繁报告自己的最新成就，突出当前的商业应用，并强调这项数字技术的巨大前景。甚至《*纽约时报*》最近也捕捉到了这一趋势，将量子计算描述为“现代科学中最时髦、最神秘的概念之一”
    [1]。


    *《纽约时报》*的这篇文章是由谷歌在 2019 年末发布的一项声明引发的，该声明当时在全球科学界和媒体中引起了广泛关注 [2]。由美国物理学家约翰·马蒂尼斯领导（直至
    2020 年）的谷歌量子计算团队，当时正在使用其名为 `Sycamore` 的量子处理器进行一项实验。他们试图解决一个计算问题：生成一长串随机数，并反复检查其数值超过一百万次。这个结果本身在量子世界之外并无特别用处，但却引起了极大关注，因为该团队仅在约
    200 秒内就成功解决了这个问题，而据谷歌的信息称，一台最先进的超级计算机完成同样的计算则需要超过 10,000 年。该成果发表在世界上领先的多学科科学期刊《自然》上，标题为“使用可编程超导处理器实现量子霸权”
    [3]。谷歌传奇性的*量子霸权*宣称^(²²)（这是一个技术术语，指量子计算机在计算能力和速度上超越经典计算机）很快受到世界各地众多研究人员的质疑和挑战。最强烈的反对者是
    IBM [4]，他们主张最先进的超级计算机可以在大约 2.5 天内解决这个问题，而不是 10,000 年 [5]。此外，他们还提出，这个问题缺乏任何实际应用价值，并且是为展示量子霸权而专门设计的，等等其他论点。但撇开所收到的批评不谈，这个实验表明，量子计算正在逐渐成熟，现已准备好去解决人类面临的一些最困难、计算最复杂的问题。本章将探讨这场计算革命、其物理构建模块以及基本运行原理。


    为此，我们将首先讨论现代量子力学的基本概念，即量子计算背后的物理理论以及量子信息处理。在此背景下，我们将看到，由于量子力学的概率特性，原因与结果之间的关联已不复存在。我们将学习更多迷人的现象，例如不确定性原理、叠加态和纠缠态，并了解量子计算机如何利用这些奇异的量子效应来同时进行海量计算，并解决极其复杂的计算问题。我们还将关注市售的量子计算机，包括谷歌的
    `Sycamore` 处理器、IBM 的 `Q54` 以及 D-Wave 的 `2000Q` 和 `5000Q` 系统。在此背景下，我将向你介绍三种基本类型的量子计算机，即量子退火器、模拟器和通用量子计算机。这种区分尤其重要，因为每种类型仅适用于特定应用和用例。此外，本章将广泛探讨当前应用和潜在用例，并在最后一节提供一个易于使用的量子计算框架，你可以借助该框架，根据自己的想法和用例来接触这项具有革命性且可能具有颠覆性的技术。

    '
- fmt: '## 2.1 Setting the Quantum Computing Scene


    In the late 19th century, most scientists believed that there is nothing new to
    be discovered in physics and that all that remains is just more precise measurement.
    With the discoveries of the famous German physicist and later Nobel laureate Max
    Planck, this appraisal turned out to be a striking misjudgment. In his laboratory
    at Humboldt University in Berlin, he was working on the so-called *black-body
    radiation*, the thermal radiation that is emitted by black objects. He strangely
    found out that such objects – when heated up in an oven – do not emit their thermal
    energy continuously but rather in small packages, that is, integer multiples of
    a small natural quantity that became known as *Planck constant*. This quantity
    describes the smallest amount or *quantum*^([^(23)](#fn23)) by which nature changes
    on its most fundamental scale.^([^(24)](#fn24)) Max Planck did not believe in
    this observation initially since it was in contrast to the postulate of the famous
    baroque polymath Gottfried Leibniz, who stated that “nature never makes leaps”
    – a quote that became famous through its Latin translation “*natura non facit
    saltus*.”


    As time passed on, more and more experiments confirmed that physical properties,
    such as energy and mass, do indeed change in small steps. Albert Einstein did
    also use this concept later on to explain the *photoelectric effect*^([^(25)](#fn25))
    for which he was awarded the Nobel Prize in 1921. The seminal discovery of Max
    Planck marks the turning point between the former theories of physics – the so-called
    *classical physics* – and modern *quantum physics*. Classical physics is based
    on *classical mechanics* that describes macroscopic objects and thus nature on
    the scale we are most familiar with. This theory was greatly influenced by the
    English polymath Isaac Newton and his legendary apple, which inspired him to develop
    his theory about gravitation. The American financier and philanthropist Bernard
    Baruch once described this discovery nicely by stating, “Millions saw the apple
    fall, [but] Newton was the only one who asked why.” On its smallest and most fundamental
    scale, nature is quantized and its effects cannot be explained by classical physics
    anymore – Isaac Newton would be very concerned about Max Plank’s observation,
    for sure. They are rather described by quantum physics and the underlying theory
    of *quantum mechanics*, which is full of surprises and mysteries as we will see
    in the following. The famous American physicist and Nobel laureate Richard Feynman
    once noted: “I can safely say that nobody really understands quantum mechanics.”


    Quantum mechanics – another foundational pillar of modern physics besides general
    relativity theory – lays the basis of almost all electronic devices including
    smartphones and TVs. It also provides the theoretical concepts for quantum computers,
    which is why it is instructive to have a closer look on this exciting theory of
    modern physics. In its current version, quantum mechanics was predominantly developed
    by the German physicists Erwin Schrödinger and Werner Heisenberg, who both received
    the Nobel Prize for their pioneering work and important contributions to this
    ongoing field of intense research.


    ### Quantization


    Quantization refers to a principle of modern physics by which physical properties,
    such as energy and mass, do not change (increase or decrease) continuously but
    rather discretely in small steps. The smallest step size is called *quantum* and
    gives rise to the quantization principle’s name. One example is Planck’s constant
    that describes the stepwise change of energy.


    Quantum mechanics – as its naming suggests – describes the dynamic behavior of
    quanta, that is, the relation between action and reaction of the most fundamental
    building blocks of nature. These building blocks are very small, thus invisible
    for the human eye and called *elementary particles*. In contrast to atoms and
    molecules, elementary particles cannot be divided into any subcomponents anymore.
    In other words, they are impartible and therefore the smallest building blocks
    of the universe. Astrophysicists calculated that the observable universe contains
    more than 10^(86) elementary particles in total, a truly breathtaking order of
    magnitude. They are either unbound and travel around or bound together to form
    molecules building up astronomical nebulae, galaxies, stars, and planets including
    our beautiful earth. For comparison, an average human comprises more than 10^(27)
    elementary particles in total. According to the so-called *standard model*, physicists
    differentiate 17 elementary particles in total. Depending on their physical properties,
    such as electric charge and the peculiar way they interact with each other, they
    can be arranged into two fundamental groups called *bosons* and *fermions*. The
    most popular boson is the *photon*, the basic constituent of light, while *electrons*
    are the most popular fermions. They carry an electrically negative charge and
    thus facilitate the transmission of electrical currents that flow through smartphones
    and all other electronic devices you can think of. Both particles, photons and
    electrons alike, are often used to implement quantum computers, which is why we
    will examine their quantum mechanical nature and physical properties in the following
    section.


    ## 2.2 The Strange World of Quantum Mechanics


    Nature on its smallest scale behaves very strange and counterintuitive. From classical
    physics and our daily experience, we know that physical processes are determined
    completely by previously existing causes. In other words, knowing the state of
    a physical system now determines its state tomorrow or any later time. A vehicle
    that drives 100 mph constantly, for instance, will have traveled 100 miles in
    the next hour unless it accelerates or slows down for some reason. Everything
    can be calculated and predicted with very high accuracy since action is always
    followed by reaction, which is commonly referred to as *causal determinism* in
    classical mechanics developed by Isaac Newton.'
