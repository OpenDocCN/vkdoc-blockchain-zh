  raw: 'By far the most popular device in this context so far is Google’s 54-qubit
    “Sycamore” QPU that was developed by a research team lead by the American and
    worldwide leading quantum physicist John Martinis and presented to the public
    in late 2019\. Its principal device architecture is shown in Figure [2-12](#505424_1_En_2_Chapter.xhtml#Fig12)
    schematically and was reduced to 8 qubits for simplicity.^([^(44)](#fn44)) Like
    any other QPU, the Sycamore processor is mounted on the bottom stage of a dilution
    refrigerator and operated at cryogenic temperatures. The device comprises a two-dimensional
    array of cross-shaped superconducting islands hosting 54 transmon qubits in total.
    The different islands are interconnected by 88 couplers in total (4 Josephson
    junctions per island) that allow for quantum mechanical tunneling of transmons
    from one to another island and thus enable superposition and entanglement. Different
    quantum logic gates are implemented by microwave pulses that drive spin-flip processes
    of individual or multiple qubits. All of this happens in about 25 ns for single-qubit
    and 12 ns for multi-qubit gates.


    The Sycamore QPU was subject to controversial discussions in late 2019 when Google
    claimed that their chip reached quantum supremacy for the first time in history
    [[3](#505424_1_En_2_Chapter.xhtml#Par199)] and was thus capable of solving a computational
    problem much faster than a classical multicore supercomputer. The term “quantum
    supremacy” was coined by the Caltech physicist John Preskill in 2012, who defined
    quantum supremacy in terms of performing “[...] tasks with controlled quantum
    systems going beyond what can be achieved with ordinary digital computers” [[65](#505424_1_En_2_Chapter.xhtml#Par261)].
    The achievement of quantum supremacy is reckoned to be a central milestone on
    the way toward the realization of the worldwide first universal quantum computer
    since then.^([^(45)](#fn45)) However, Google’s claim has to be interpreted mindfully
    as they solved a highly specialized computational problem. Broadly speaking, the
    research team around John Martinis at Google Research^([^(46)](#fn46)) in Mountain
    View, California, generated a string of purely random numbers in just about 200
    s and argued that a classical computer would take more than 10,000 years for the
    same task. Scientists of IBM soon objected that a classical computer would just
    need 2.5 days, which would reduce Google’s feat to demonstrating a quantum “advantage.”
    Furthermore, IBM argued that the problem has been selected intentionally and “customized”
    in order to demonstrate quantum supremacy only. Generating random numbers is basically
    extremely hard for classical computers, which is why random numbers generated
    by classical computers are correctly called “pseudo-random,” but fairly easy for
    quantum computers due to the probabilistic randomness inherent in quantum mechanics.
    Another argument IBM’s scientists put forward was about quantum supremacy itself.
    They argued that this concept is not very meaningful in general because not every
    quantum algorithm has an equivalent classical algorithm that is capable of solving
    the same computational task – a strict comparison is thus not possible.


    For this reason, IBM promoted another performance measure that has been developed
    by their research team in 2018 and allows for a more representative comparison
    of quantum computers. This metric for measuring and comparing the performance
    of quantum computers is called *quantum volume* [[66](#505424_1_En_2_Chapter.xhtml#Par262)]
    and considers the coherence time, error rates, and other parameters to assess
    a quantum computer’s overall performance [[67](#505424_1_En_2_Chapter.xhtml#Par263)].
    The quantum volume performance measure has not been adopted broadly by the scientific
    community yet. Most researchers do, however, agree that a quantum computer can
    only be supreme over a classical computer if it utilizes superposition and entanglement
    as a computational resource to parallelize different computation steps.^([^(47)](#fn47))
    In consequence, any device that is not employing those quantum effects should
    not be considered as a universal quantum computer. Google’s supremacy claim is –
    by no doubt – a milestone from a technological point of view since no company
    has built and successfully controlled a larger number of transmon qubits in a
    single QPU yet. The Sycamore processor has been made accessible through Google’s
    cloud computing service and thus holds great promise for a large range of applications
    in industry.


    Another very promising device design for a universal quantum computer has been
    presented by a team of more than 100 scientists, engineers, and software developers
    working with the American technology giant Honeywell in mid-2020 [[36](#505424_1_En_2_Chapter.xhtml#Par232)].
    Their QPU design is called *trapped-ion quantum charge-coupled device* and allows
    for confining a one-dimensional chain of ions that levitate above a microchip
    architecture similar to a chain of ions in a Pauling trap. Honeywell’s device
    uses ytterbium-171 ions as qubits and barium-138 ions for sympathetic cooling.^([^(48)](#fn48))
    The ion qubits (charge state and motional states) can be controlled with more
    than 198 thin electrodes that are mounted onto the microchip, which is about 1
    cm in size and depicted in, for example, [[71](#505424_1_En_2_Chapter.xhtml#Par267)].
    Honeywell’s quantum computer is available commercially through Microsoft’s Azure
    Quantum cloud computing service since late 2020.


    ### 2.3.2 Current Business Applications


    For many years, the biggest customers for quantum computers were large governmental
    institutions, such as military and secret services, that are still among the most
    significant public financing bodies for research in this field up to now. Their
    great interest initially goes back to the pioneering work of the American mathematician
    Peter Shor [[72](#505424_1_En_2_Chapter.xhtml#Par268)], who devised a famous quantum
    computing algorithm in 1994 that could possibly be used for breaking cybersecurity
    codes. With the development of further algorithms in the following years, such
    as the *Grover algorithm* for searching large unstructured databases [[73](#505424_1_En_2_Chapter.xhtml#Par269)],
    the *HHL* algorithm for solving linear equation systems [[74](#505424_1_En_2_Chapter.xhtml#Par270)],
    and others [[75](#505424_1_En_2_Chapter.xhtml#Par271)], the focus of research
    has shifted to more and more applications in the private sector.


    IBM was one of the first companies that picked up this trend and started to apply
    quantum computing to real-life business problems [[76](#505424_1_En_2_Chapter.xhtml#Par272)]
    with D-Wave Systems, Google, and Microsoft soon following afterward. Together
    with numerous smaller startup companies like IonQ, Zapata Computing, Rigetti Computing,
    and Quantum Motion, they have been marketing this technology intensely over the
    last couple of years, and most quantum computers have been made available commercially
    through cloud computing services on demand.'
  trans: '

    # 排版后的内容


    迄今为止，在此领域最受欢迎的设备是谷歌的 54 量子比特“悬铃木”`QPU`，它由美国及全球顶尖量子物理学家约翰·马蒂尼斯领导的研究团队开发，并于 2019
    年底向公众展示。其主要的设备架构示意性地展示在图 2-12 中，为简化起见已缩减为 8 个量子比特。^(⁴⁴) 与其他任何`QPU`一样，“悬铃木”处理器安装在稀释制冷机的底部，并在低温环境下运行。该设备包含一个由十字形超导岛组成的二维阵列，总共可容纳
    54 个传输子量子比特。不同的岛之间通过总共 88 个耦合器（每个岛有 4 个约瑟夫森结）相互连接，使得传输子能够在岛之间进行量子力学隧穿，从而实现叠加和纠缠。不同的量子逻辑门通过微波脉冲实现，这些脉冲驱动单个或多个量子比特的自旋翻转过程。对于单量子比特门，这一过程大约需要
    25 纳秒，对于多量子比特门则需要 12 纳秒。


    2019 年底，“悬铃木”`QPU`引发了争议性讨论，当时谷歌声称其芯片有史以来首次实现了量子霸权 [3]，因此能够以远超经典多核超级计算机的速度解决某个计算问题。“量子霸权”一词由加州理工学院的物理学家约翰·普雷斯基尔于
    2012 年提出，他将量子霸权定义为执行“[……]使用受控量子系统完成的任务，超越了传统数字计算机所能达到的水平” [65]。自那时起，实现量子霸权被认为是迈向世界首台通用量子计算机之路上的一个核心里程碑。^(⁴⁵)
    然而，谷歌的声称需要审慎地理解，因为他们解决的是一项高度专门化的计算问题。概括而言，位于加州山景城谷歌研究院的约翰·马蒂尼斯研究团队在短短 200 秒内生成了一串纯随机数，并声称经典计算机完成同样任务需要超过
    1 万年。IBM 的科学家很快反驳说，经典计算机仅需 2.5 天即可完成，这便将谷歌的成就降低到了展示量子“优势”的层面。此外，IBM 认为该问题是故意挑选出来并经过“定制”的，仅仅是为了演示量子霸权。生成随机数对经典计算机来说本质上极其困难，这也是为什么经典计算机生成的随机数被准确地称为“伪随机数”，但对量子计算机来说却相当容易，因为量子力学固有的概率随机性。IBM
    科学家提出的另一个论点涉及量子霸权本身。他们认为这个概念总体而言意义不大，因为并非每个量子算法都有等效的、能够解决相同计算任务的经典算法——因此无法进行严格比较。


    基于此，IBM 提出了一种由其研究团队于 2018 年开发的新的性能衡量标准，该标准允许对量子计算机进行更具代表性的比较。这种衡量和比较量子计算机性能的指标被称为`量子体积`
    [66]，它考虑了相干时间、错误率和其他参数来评估量子计算机的整体性能 [67]。`量子体积`这一性能指标尚未被科学界广泛采用。然而，大多数研究人员认同，只有当量子计算机利用叠加和纠缠作为计算资源来并行化不同计算步骤时，它才能超越经典计算机。^(⁴⁷)
    因此，任何未运用这些量子效应的设备都不应被视为通用量子计算机。从技术角度来看，谷歌的霸权声明无疑是一个里程碑，因为此前没有一家公司能够在一个`QPU`中成功构建并控制如此大量的传输子量子比特。“悬铃木”处理器已通过谷歌的云计算服务开放使用，因此在工业领域具有广阔的应用前景。


    2020 年年中，与美国科技巨头霍尼韦尔合作的，由超过 100 名科学家、工程师和软件开发人员组成的团队展示了另一种非常有前景的通用量子计算机设备设计 [36]。他们的`QPU`设计被称为`离子阱量子电荷耦合器件`，能够约束一个一维离子链，这些离子悬浮在微芯片架构上方，类似于保利阱中的离子链。霍尼韦尔的设备使用镱-171
    离子作为量子比特，并使用钡-138 离子进行协同冷却。^(⁴⁸) 离子量子比特（电荷态和运动态）可以通过安装在微芯片上的超过 198 个薄电极进行控制，该微芯片大小约
    1 厘米，其图像可参见例如文献 [71]。自 2020 年底起，霍尼韦尔的量子计算机已通过微软的`Azure Quantum`云计算服务投入商用。


    ## 2.3.2 当前的商业应用


    多年来，量子计算机最大的客户一直是大型政府机构，例如军方和情报部门，这些机构至今仍是该领域最重要的公共科研资助方之一。他们最初对此产生浓厚兴趣，要追溯到美国数学家彼得·肖尔的开创性工作
    [72]，他在 1994 年设计了一种著名的量子计算算法，该算法可能被用于破解网络安全密码。随着后续几年更多算法的发展，例如用于搜索大型非结构化数据库的`Grover
    算法` [73]、用于求解线性方程组的`HHL`算法 [74]以及其他算法 [75]，研究的重心已转向私营部门中越来越多的应用领域。


    IBM 是率先顺应这一趋势的公司之一，它开始将量子计算应用于现实商业问题 [76]，随后 D-Wave Systems、Google 和 Microsoft
    也很快跟进。与众多较小的初创公司（如 `IonQ`、`Zapata Computing`、`Rigetti Computing` 和 `Quantum Motion`）一起，他们在过去几年中大力推广这项技术，并且大多数量子计算机已通过按需提供的云计算服务投入商用。

    '
- fmt: '# Current Business Applications: Simulation, Modeling, and Optimization


    Simulation, modeling, optimization, and sampling are probably the most cited applications
    of quantum computers today since they leverage the inherent quantum parallelism
    to achieve runtime benefits among classical supercomputers. Current business applications
    range across various industrial sectors. The most important ones are listed in
    the following:


    ## Automotive


    The German Volkswagen Group, the worldwide largest automobile manufacturer, began
    to explore quantum computing for their business in 2017 by establishing a multiyear
    partnership with D-Wave Systems. Volkswagen has been applying this technology
    to different business problems since then in their `Data:Lab` in Munich and `CODE
    Lab` in San Francisco. One pilot project aims to simulate the traffic flow in
    overcrowded cities [[77](#505424_1_En_2_Chapter.xhtml#Par273)–[80](#505424_1_En_2_Chapter.xhtml#Par276)]
    as a prerequisite for urban traffic planning and navigation with minimum travel
    time by avoiding congestion. Such quantum computing services may operate in an
    automotive cloud one day to share this navigational information about the shortest
    routes with fully connected (autonomous) vehicles on the road.


    Another German automobile manufacturer that is currently exploring quantum computing
    is BMW, who also established a partnership with D-Wave Systems aiming to optimize
    robots in their production lines [[81](#505424_1_En_2_Chapter.xhtml#Par277)].
    While Volkswagen and BMW partnered with D-Wave Systems, Daimler set up a collaboration
    with Google [[82](#505424_1_En_2_Chapter.xhtml#Par278)] and IBM [[83](#505424_1_En_2_Chapter.xhtml#Par279)]
    to explore applications in materials science and chemistry including the simulation
    of next-generation batteries for battery-electric vehicles. Further automotive
    applications are described in [[84](#505424_1_En_2_Chapter.xhtml#Par280)], for
    example.


    ## Aerospace and defense


    Lockheed Martin bought the very first quantum annealer of D-Wave Systems in late
    2010 and continuously upgraded its system since then. Their main application area
    appears to be software development including software debugging and the optimization
    of software verification and validation processes [[85](#505424_1_En_2_Chapter.xhtml#Par281)].
    Another D-Wave Systems’ customer is the American National Aeronautics and Space
    Administration NASA, who is currently operating a 2000Q system in the NASA Advanced
    Supercomputing facility located at Ames Research Center in the heart of Silicon
    Valley in Mountain View, California. Their quantum computer has been used to solve
    difficult optimization problems in aeronautics, earth and space sciences, and
    space exploration missions [[86](#505424_1_En_2_Chapter.xhtml#Par282)]. The American
    aerospace conglomerate Airbus has partnered with IBM recently and applies quantum
    computing to airflow modeling of aircraft wings [[87](#505424_1_En_2_Chapter.xhtml#Par283)]
    – another archetypical optimization problem that had been tackled by classical
    supercomputers before.


    ## Chemicals, pharma, and healthcare


    Quantum computing did also find its way into the chemical and pharmaceutical industry.
    The American multinational corporation The Dow Chemical Company, for instance,
    has reached a multiyear agreement with the Canadian quantum computing software
    startup 1QBit in 2017. According to their press release, Dow and 1QBit aim “to
    develop quantum computing tools for the chemicals and materials science technology
    spaces” [[88](#505424_1_En_2_Chapter.xhtml#Par284)] within their partnership –
    further terms of this agreement were not disclosed so far. Since 1QBit develops
    general-purpose algorithms for quantum computing hardware only, it has established
    different hardware partnerships with Microsoft, IBM, Fujitsu, and D-Wave Systems.


    1QBit has also reached an agreement with the American biotechnology company Biogen
    in 2016 [[89](#505424_1_En_2_Chapter.xhtml#Par285)]. Together with the Irish-domiciled
    professional services company Accenture, they exploit the simulation capabilities
    of quantum computers to better tackle diseases like Alzheimer’s and multiple sclerosis.


    In a partnership with D-Wave Systems and Rigetti Computing, the San Francisco–based
    drug-design startup company Menten AI leverages synthetic biology and quantum
    computing to create new protein-based drugs [[90](#505424_1_En_2_Chapter.xhtml#Par286)].
    To do so, Menten AI employs a two-step drug development process based on a hybrid
    classical quantum computing approach. The first step involves running different
    machine learning algorithms on classical computers and attempts to create the
    chemical structure (biologically called primary structure) of a novel protein
    and prospective drug that can bind and manipulate diseased cells in the human
    body – we will study this particular machine learning approach to drug development
    when discussing applications of artificial intelligence in Section 4.4.6 in more
    detail. In a second step, researchers of Menten AI leverage the computational
    power of quantum computing to calculate the three-dimensional shape the novel
    protein will naturally fold into through a chemical process called energy minimization.
    The resulting three-dimensional protein structure is biologically called quaternary
    structure, critically determines the medical properties of the protein, and serves
    as an important prerequisite for further iterative optimizations. The hybrid classical
    quantum computing approach of Menten AI is a nice example for an emerging interdisciplinary
    research area that became known as *quantum machine learning* lately. This exciting
    convolution of quantum computing and artificial intelligence allows for increasing
    computational speed, efficiency, and accuracy by outsourcing computationally intense
    subroutines of a given problem or algorithm that were initially conducted on a
    classical computer to a much faster quantum computer or annealer.


    F. Hoffmann-La Roche, the largest pharmaceuticals and diagnostics company in the
    world, has announced an academic partnership “with three doctoral students from
    the University of Oxford, who apply quantum computer simulations, for example,
    to calculate the energy of molecules” lately [[91](#505424_1_En_2_Chapter.xhtml#Par287)].
    Backed by USD four million in seed funding, the Toronto-based biotech startup
    ProteinQure recently partnered with quantum computing leaders (e.g., IBM, Microsoft,
    and Rigetti Computing) as well as pharma research outfits (including AstraZeneca
    and SRI International) to explore quantum computing for molecular simulations
    of proteins. Their research may well pave the way for high-yield computational
    drug design based on proteins that have been engineered to target specific medical
    purposes.'
