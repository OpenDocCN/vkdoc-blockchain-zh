- fmt: '### Current Business Applications: Supply Chain Management and Logistics


    Further to trading platforms and payment services, another very popular business
    application of blockchain technology is `supply chain management` [[37](#505424_1_En_3_Chapter.xhtml#Par239)].
    Driven by the increasing globalization of trade, supply chains have become very
    complex over the last couple of years and span across numerous stakeholders based
    in various countries. Besides the exporter and importer, international supply
    chains typically involve shippers and cargo owners, banks and insurance companies,
    freight forwarders, intermodal operators, ocean and airplane carriers, ports and
    terminal operators, and customs authorities just to mention a few. In order to
    proceed with their particular service, each of those parties requires and issues
    certain documents that need to be sent to selected parties within the supply chain
    to successfully pass specific shipping milestones as shown in Figure [3-6](#505424_1_En_3_Chapter.xhtml#Fig6)
    exemplarily.


    An electric vehicle, for instance, contains about 6,000 different parts that are
    built by hundreds of international suppliers and subcontractors. Each of them
    is required to provide certain documents for, for example, accounting and quality
    control to ensure transparency and traceability along the entire supply chain
    and manufacturing process – this becomes more and more important in light of the
    worldwide sustainability goals regarding CO[2] and other environmentally harmful
    emissions. Blockchain technology can help to manage, streamline, and optimize
    such complex global networks. This is particularly relevant for globally operating
    enterprises, like automobile manufacturers and their suppliers, who need to find
    cost-efficient and practical solutions for managing their increasingly complex
    supply chains efficiently while complying with regulatory traceability.


    One of the most prominent examples for a blockchain-powered supply chain management
    system is the open digital shipping platform “TradeLens” that has been implemented
    jointly by IBM and A. P. Moller-Maersk Group [[38](#505424_1_En_3_Chapter.xhtml#Par240)],
    the worldwide largest container shipping company. This collaborative platform
    connects all relevant stakeholders that are involved in shipping containers around
    the world. A customized permissioning model along the entire supply chain regulates
    who can add, view, and update selected information, such as packing lists, bills
    of lading, invoices, and other certificates that are required by the different
    stakeholders at each stage of the shipment process. TradeLens provides various
    tools for, inter alia, the planning and utilization of assets, customs clearance
    brokerage, scheduling, and risk assessment and collects real-time information
    for trade finance and insurance. Due to its increased transparency, the TradeLens
    blockchain allows the different stakeholders to optimize and streamline their
    supply chain end to end away from paper-based legacy workflows. Furthermore, it
    allows for greater predictability so that safety stock inventory and assets can
    be reduced significantly. The platform is reported to currently handle about ten
    million events and more than 100,000 documents every week [[38](#505424_1_En_3_Chapter.xhtml#Par240)].
    The potential of this approach is tremendous since more than 15 million containers
    are traveling through international waters or waiting to clear customs at any
    moment in time. Similar approaches have been implemented in the food industry
    to increase the traceability of goods along the entire supply chain so that the
    different stakeholders can react promptly as soon as health or safety issues arise
    [[39](#505424_1_En_3_Chapter.xhtml#Par241)].^([^(77)](#fn77))


    ![../images/505424_1_En_3_Chapter/505424_1_En_3_Fig6_HTML.png](images/505424_1_En_3_Chapter/505424_1_En_3_Fig6_HTML.png)


    Figure 3-6


    Typical international supply chain with the most important stakeholders (top row,
    squares) and selected documents (bottom row, circles) that are issued and exchanged
    along the process. Please note that the horizontal arrows from the left to the
    right in the top row do not indicate the physical flow of goods but rather the
    direction of the shipping process


    The German automobile manufacturer BMW has recently announced its “PartChain”
    supply chain management system that builds on blockchain technology and emerged
    from a successful digital pilot project for purchasing front lights [[41](#505424_1_En_3_Chapter.xhtml#Par242)].
    PartChain scales this approach and expands it to a larger number of international
    suppliers to ensure seamless traceability of critically and safety-relevant automotive
    components and raw materials – all the way from mine to smelter. BMW’s vision
    is “to create an open platform that will allow data within supply chains to be
    exchanged and shared safely and anonymized across the industry” [[42](#505424_1_En_3_Chapter.xhtml#Par243)].
    Since common standards and control models are vital for a successful rollout of
    such a platform, BMW also co-founded the cross-industry initiative MOBI in 2018,
    the Mobility Open Blockchain Initiative that comprises 120 leading automotive,
    mobility, and technology companies worldwide.^([^(78)](#fn78))


    ### Current Business Applications: Anti-fraud of Consumer Goods


    Another very interesting application of blockchain technology is the cryptographic
    provenance platform with the code name “Aura” that is currently developed by the
    French luxury brand conglomerate LVMH Moët Hennessy Louis Vuitton together with
    Microsoft Azure and the American blockchain design studio ConsenSys [[43](#505424_1_En_3_Chapter.xhtml#Par244)].
    Aura has been announced to provide powerful tools for product tracking and tracing
    based on the Ethereum blockchain. Those tools allow consumers to proof the authenticity
    of their product by accessing its history end to end from raw materials to the
    final point of sale including the second-hand market. Aura aims to span across
    all specialized actors in the value chain including raw material miners, manufacturers
    and distributers, goldsmiths, and other highly specialized service providers.
    By providing a fraud-resistant proof of authenticity, Aura is determined to enable
    an efficient and specific fight against the mass production of counterfeit products
    that have been increasingly offered on the second-hand market lately. In the second
    stage of this project, the consortium aims to explore the protection of creative
    intellectual property rights and other applications relevant for the luxury industry,
    too.


    ### Current Business Applications: Energy Commodities Platform


    Blockchain technology does also have interesting applications in the energy sector
    that are related to payment services in most cases. The German technology conglomerate
    Siemens and the British-Dutch oil and gas company Royal Dutch Shell, for instance,
    are both invested in the American startup LO[3] Energy. LO[3] works together with
    local utilities and retailers and provides a blockchain-based community energy
    platform called “Pando.” This local energy marketplace pools locally distributed
    energy resources, such as wind and solar power, and thereby enables its customers
    to buy and sell energy while optimizing the utilization of electric grids at a
    community level automatically at the same time.^([^(79)](#fn79))'
