- fmt: '*Materials*: Since quantum computers are well suited to simulate complex chemical
    interactions in different materials, many companies are using quantum computers
    to streamline their product development process. We already talked about the collaboration
    between Daimler, IBM, and Google to model the cell chemistry of high-voltage batteries.
    A similar collaboration is reported for the Japanese industry giant Mitsubishi
    Chemical and IBM, who jointly apply quantum computing to model the molecular dynamics
    in lithium-air batteries [[92](#505424_1_En_2_Chapter.xhtml#Par288)] that may
    occasionally substitute highly flammable lithium-cobalt batteries in battery electric
    vehicles in a couple of years’ time. The German tier-1 automotive supplier Bosch
    [[93](#505424_1_En_2_Chapter.xhtml#Par289)] and the American industry conglomerate
    Honeywell [[94](#505424_1_En_2_Chapter.xhtml#Par290)] are two further examples
    in this industry that apply quantum computing to create completely new products
    based on quantum materials modeling.


    *Finance, banking, and insurance*: Investment banks and insurance companies did
    also start to explore quantum computing and access its relevance for their business
    early on. Among the first adopters is the American and worldwide largest bank
    JPMorgan Chase, who started a partnership with IBM recently with Barclays and
    CaixaBank soon following thereafter [[95](#505424_1_En_2_Chapter.xhtml#Par291),
    [96](#505424_1_En_2_Chapter.xhtml#Par292)]. They are reported to test out different
    algorithms for, for example, portfolio optimization, valuation and pricing of
    financial instruments (including assets, bonds, stocks, options, and derivatives)
    [[97](#505424_1_En_2_Chapter.xhtml#Par293)], financial risk analysis, market simulations,
    transaction settlement, and fraud detection. Goldman Sachs also decided to invest
    and explore this digital technology and recently started a partnership with the
    American QC Ware Corporation based in Palo Alto, California [[98](#505424_1_En_2_Chapter.xhtml#Par294)].
    Further examples and prospective applications of quantum computing in finance
    can be found in, for example, [[99](#505424_1_En_2_Chapter.xhtml#Par295)].


    *Electronics*: The semiconductor and electronics industry has been investing in
    quantum computing, too. Some companies, like Intel or Alibaba, decided to build
    their own QPUs, while others are collaborating with startups and established players
    in the quantum computing space. The South Korean conglomerate Samsung, for instance,
    aims to optimize different materials used for displays, semiconductor microchips,
    and batteries by utilizing different quantum simulations tools. For this purpose,
    they started a collaboration with the American quantum computing hardware and
    software company IonQ based in College Park, Maryland in 2019 [[100](#505424_1_En_2_Chapter.xhtml#Par296)].


    *Energy*: Due to its vast potential for a wide range of optimization problems,
    the American multinational oil and gas corporation ExxonMobil has decided to become
    the first energy company to join the IBM Q Network [[101](#505424_1_En_2_Chapter.xhtml#Par297)].
    The IBM Q Network is a worldwide community of Fortune 500 companies, startups,
    academic institutions, and national research laboratories that work to advance
    quantum computing and explore its practical applications for science and business.
    According to their 2019 press release, ExxonMobil likes to “address computationally
    challenging problems across a variety of applications, including the potential
    to optimize a country’s power grid, and perform more predictive environmental
    modeling and highly accurate quantum chemistry calculations to enable discovery
    of new materials for more efficient carbon capture” [[101](#505424_1_En_2_Chapter.xhtml#Par297)].


    ### Current Business Applications: Cybersecurity


    Further to simulation, modeling, optimization, and sampling, cybersecurity is
    another major field of application for quantum computers. It is inseparably linked
    to the Shor algorithm, the very first algorithm for a quantum computer ever. In
    1994, Peter Shor described how universal quantum computers could be used to break
    a large natural number down into its prime factors on a vanishingly short timescale^([^(49)](#fn49))
    [[72](#505424_1_En_2_Chapter.xhtml#Par268)]. One example for this *prime factorization*
    is the decomposition of the decimal number 29,469 into a product of the prime
    numbers 3, 11, 19, and 47 according to 29,469 = 3 ⋅ 11 ⋅ 19 ⋅ 47\. While the product
    of prime numbers on the right-hand side of this equation can be calculated easily,
    it is very difficult to do the calculation the other way around and find a set
    of unknown prime numbers that factorize 29,469 evenly. This “asymmetry” in calculated
    difficulty is at the heart of most encryption schemes and cybersecurity codes
    used to safeguard our global communication infrastructure today.


    By far, the most widely used cybersecurity code is the so-called *random stochastic
    absorption algorithm* or `RSA` in short. In its current version, this algorithm
    uses a randomly selected 2,048-bit binary number to encrypt digital information.
    In case of an email that was encrypted by using the `RSA-2048` scheme, a malicious
    third party would need to try out `2^(2,048)` possible combinations of zeros and
    ones to find the correct 2,048-bit number that decrypts the message correctly
    – an unbelievably large number with 617 digits. A classical supercomputer with
    a clock rate of 1 THz – the clock rate of most personal computers is actually
    more than 1,000 orders of magnitude smaller – can complete 1 trillion operations
    per second and would need around 300 trillion years to tackle this problem. This
    is why you can feel pretty safe if your email service provider uses the `RSA-2048`
    scheme to protect your messages.


    In light of this security, Peter Shor demonstrated that a universal quantum computer
    – a still hypothetical device at the time of his publication – could crack the
    `RSA-2048` code in a breathtaking time of about ten seconds.^([^(50)](#fn50))
    This exponential reduction of computing time demonstrates the tremendous gain
    in computational power when using universal quantum rather than classical computers.
    In the hand of a malicious third party, a quantum computer could possibly be used
    to run the Shor algorithm, cause a major breach, and endanger digital communications
    security by undermining the Internet, national defense systems, and other systems
    that are vital for society and governments. You can now imagine how the cybersecurity
    officers at America’s National Security Agency, for instance, felt when hearing
    about this potential threat caused by universal quantum computers. However, widespread
    consensus eventually formed over time that advanced quantum algorithms including
    the one proposed by Peter Shor will remain beyond the realm of current noisy intermediate-scale
    quantum computers for the next couple of years, which is why initial cybersecurity
    fears were released slowly.'
