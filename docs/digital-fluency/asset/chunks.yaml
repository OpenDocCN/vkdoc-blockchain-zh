    ### 1.3.2 数字化转型战略


    这些驱动力对于希望采用数字技术的企业来说意义重大，因为它们必须超越现有的业务和运营模式，寻找创新且高效的方式将其整合。迄今为止，数字化转型代表了一种端到端的业务转型，从根本上改变了组织的运作方式以及为客户创造价值的方式。在此过程中，组织需要将运营变革管理建立为核心能力，以管理数字化转型——我们将在第
    5 章“您的数字行动计划”中更详细地探讨这一方面。国际数据公司（IDC）的 Jessica Goepfert 在此背景下指出：“这种[数字]转型因行业不同而呈现出不同的形态。例如，在银行和零售业……投资主要围绕管理和重振客户体验。而在制造业，企业正在重塑自我，本质上成为高科技公司，利用其产品作为平台来支持和提供数字服务”[36]。


    那么，面对前文概述的数字驱动力和技术趋势，组织应如何应对？在我们仔细审视亚马逊、谷歌及其他公司的数字化转型战略之前，有必要介绍一个文献中经常在此处出现的经典辩论。这场辩论为解决先前讨论过的克莱顿·克里斯坦森的“创新者困境”铺平了道路，其核心在于“利用”与“探索”之间的平衡[37,
    38]。*利用*是指专注于现有的收入来源，并在既定领域优化运营卓越性；而*探索*则是发现并试验新的增长机会[39]。著名的加拿大商业管理学者兼作家亨利·明茨伯格从战略角度描述了这种决定性的平衡，并指出商业机会和战略通常源于两个不同的方面：(1)
    可预期和计划内的机遇，以及 (2) 通常在尝试实施原始计划或战略时出现的意外机遇。第一种选择被称为*预定战略*，最适合通过分析未满足的客户需求并据此设计未来的产品和服务，来利用现有的收入来源。第二种选择称为*应急战略*，涉及探索新机遇并解决未预料到的问题。战略几乎总是预定计划与意外机遇的结合，因为它源于无数日常决策，以在实践中共追求特定机遇并优先发展某些产品和服务。这也是英特尔创始人兼前首席执行官安迪·格鲁夫曾说过的话：“如果你想知道一家公司的战略是什么，不要听他们说什么，要看他们做什么。”


    过于侧重两种战略方向中的任何一种都会带来风险。如果公司过于关注利用其现有（且历史上成功）的业务活动，它们就会忽视探索新领域的需求——这些新领域可能在未来为其提供新的商业机会，并增强其长期生存能力。这种风险通常被称为*成功陷阱*[40]。一个非常著名的例子是瑞典电信公司诺基亚，它长期是手机销售市场的领导者，但未能及时转向为现代智能手机铺平道路的触摸屏技术[41]。


    另一方面，如果公司主要专注于探索新的业务活动，它们就会面临所谓的*永久搜索陷阱*的威胁，这指的是公司未能将早期创新规模化并实现盈利。在这方面，一个经常被引用的例子是技术公司施乐（Xerox），它是美国大型办公设备生产商。早在
    1984 年苹果推出 Macintosh 之前，施乐位于硅谷和斯坦福大学创新中心附近的 PARC 实验室的工程师就提出了诸如计算机鼠标和图形用户界面等开创性发明。然而，施乐当时未能平衡这两种技术的潜力，未能以相匹配的驱动力将其利用到现有产品中。相反，他们公开向其他商业领袖展示，包括苹果的传奇创始人史蒂夫·乔布斯。乔布斯在参观施乐
    PARC 实验室时曾指出：“你们坐在一座金矿上。为什么不用这项技术做点什么？你们可以改变这个世界！”


    那些在利用数字技术方面特别成功的组织，其特点在于能够平衡这两种战略方向。它们通过使产品和服务持续适应当前的客户需求和期望来利用现有收入来源，同时通过探索和试验新的商业机会来适应环境变化。这就是经济学家在此背景下谈论*双元性组织*的原因[42]。双元性以及谨慎平衡利用与探索的能力，是所有数字化转型的核心，如下面的例子所示。


    微软公司是成功制定战略以平衡利用与探索，从而持续调整其产品和服务以适应不断变化的商业环境的典范。微软是全球数字化和数字技术的领先倡导者和拥有者之一。在 2016
    年微软全球合作伙伴大会的主题演讲中，微软首席执行官萨提亚·纳德拉将数字化转型描述为以下四个基本支柱，如图 1-3 内圈所示[43]：


    1.  *运营优化*包括内部业务流程的数字化，通常始于将公司的 IT 基础设施转变为基于平台的架构——我们将在第 5 章“您的数字行动计划”中进一步讨论这一措施。任何优化的基础都是对现状的透明度，这也是各种数字技术的主要目标。


    2.  *产品与服务转型*是指通过整合新技术来推进现有的产品或服务组合，从而创造新的商业机会和收入来源。


    3.  *员工赋能*对于成功的数字化转型至关重要。需要让员工能够随时随地、在任何设备上发挥最佳工作状态，从而提高他们的效能、效率和生产力。此外，还需要授权员工自主工作，并根据他们个人的优势劣势、兴趣、工作经历和资质来选择项目。


    4.  成功数字化转型的另一个先决条件是*客户互动*，即通过征求客户反馈并分析他们的反应，来更好地理解其需求并据此个性化产品。客户的期望决定了未来的产品和服务，这就是为什么它们从广义上定义了任何数字业务转型的战略方向和目标。

