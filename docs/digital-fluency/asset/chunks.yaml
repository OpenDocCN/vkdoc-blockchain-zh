- fmt: '### Decoherence: The Technical Solution


    `Spin-flip` and `energy relaxation` processes both induce random noise and derail
    calculations on a quantum computer. Since both mechanisms cannot be suppressed
    completely, we have to live with this “faulty nature” (or errors) in quantum computers
    somehow. For this purpose, scientists have developed different measures to cope
    with decoherence-induced noise.


    The first and most important one causes most quantum computers to look like small
    inverted Christmas trees that are about 1 meter high and 30 cm wide as shown in
    Figure [2-5](#505424_1_En_2_Chapter.xhtml#Fig5) schematically. This architecture
    is called *dilution refrigerator*, provides a liquid bath of helium, and allows
    for operating the quantum computer at cryogenic temperatures close to the absolute
    zero point of temperature at 0.01 K (or -273.14 °C or -459.65 °F) with minimum
    decoherence. Dilution refrigerators operate in a closed steel cap that hosts the
    liquid helium bath and covers their inner structure comprising different gold-colored
    platforms[^(33](#fn33)) hanging one from another. The actual *quantum processing
    unit* (QPU) – the heart of a quantum computer in analogy to a classical CPU –
    is mounted on the lowest temperature stage at the bottom of the refrigerator[[18](#505424_1_En_2_Chapter.xhtml#Par214)].
    The platforms are adorned with hundreds of silver chips, wires, and gleaming tubes
    as shown in [[19](#505424_1_En_2_Chapter.xhtml#Par215)], for example.


    ![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig5_HTML.png](images/505424_1_En_2_Chapter/505424_1_En_2_Fig5_HTML.png)


    **Figure 2-5**

    Experimental system design for the implementation of a quantum computer within
    the dilution refrigerator environment. The system reveals five (or more) temperature
    stages that operate at room temperature (300 K) down to cryogenic temperatures
    being as low as 0.01 K close to the absolute zero point. Each stage is equipped
    with a temperature sensor to monitor the liquid helium cooling system. Metallic
    mounting tubes stabilize the different stages mechanically, and different coaxial
    cables and optical fibers facilitate the transmission of electric and light-optical
    signals down to the QPU.


    Further to operating in an extremely cold environment, scientists developed different
    computational strategies for correcting errors proactively, which is commonly
    referred to as *fault-tolerant quantum computing*. Those schemes are generally
    based on grouping many fragile qubits – called *physical qubits* – together to
    so-called *logical qubits* that are less prone to noise due to probabilistic effects
    and statistical averaging. This grouping is designed such that the logical qubits
    remain immune to outside noise long enough to complete the respective computational
    step. The theoretical minimum for error correction to be implemented is five physical
    qubits for every error-correcting logical qubit. You can imagine that this strategy
    imposes a huge debt of computational overhead, which makes the physical implementation
    of quantum computers even more challenging from a technical point of view.


    Since the dilution refrigerator and quantum error correction unit both require
    additional computational resources to control their operation automatically, quantum
    computers are typically implemented as *hybrid systems* nowadays as depicted in
    Figure [2-6](#505424_1_En_2_Chapter.xhtml#Fig6). The hybrid setup provides a graphical
    user interface and controls the different subcomponents, such as the liquid helium
    management system, vacuum pumps, as well as sensors and actuators, automatically
    to operate the entire system under safe conditions. This is particularly important
    since liquid helium can cause major burn wounds.


    ![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig6_HTML.jpg](images/505424_1_En_2_Chapter/505424_1_En_2_Fig6_HTML.jpg)


    **Figure 2-6**

    Basic concept for the system implementation of a quantum computer today. The QPU
    itself (dotted frame) is controlled by a classical (desktop) computer that provides
    an easy-to-use user interface and runs the software to control all other components
    of the system.


    The different technological challenges involved in building stable and noise-resistant
    quantum computers have spurred intense research in finding the perfect qubit.
    Back in 2000, the American physicist David DiVincenzo provided a useful guidance
    for finding this perfect qubit and worked out five main criteria for an ideal
    physical implementation[[20](#505424_1_En_2_Chapter.xhtml#Par216)], which is worth
    knowing in order to evaluate the relevance of different technological implementation
    schemes for quantum information processing. The perfect system:


    1.  Is based on well-characterized and robust qubits that are *scalable* and thus
    permit the implementation of many qubit systems.

    2.  Can be *initialized* easily to a simple fiducial initial quantum state that
    acts as the starting point of a computation.

    3.  Reveals a *coherence time* that is significantly longer than the time it takes
    to complete a calculation (operation time).

    4.  Allows us to conduct a *universal set* of quantum gates that allows us to
    implement all conceivable qubit operations.

    5.  Allows us to *individually control* and *read out* (or measure) the different
    qubits in the QPU.


    Until now, those *DiVincenzo criteria* carve out the playground for thousands
    of scientists worldwide aiming to implement the most powerful quantum computer
    on earth. We will discuss the three most important implementation schemes briefly
    in the following, which helps you to better understand the quantum computers that
    are commercially available from Google, IBM, D-Wave Systems, and others today.'
