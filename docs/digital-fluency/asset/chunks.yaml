    ## 4.4 主要应用场景与商业实践


    前文对人工智能的介绍表明，大多数深度学习算法需要大规模数据集才能进行高效训练。此外，它们的训练还需要借助（高性能）计算机系统，这些系统能够在合理的时间尺度上以数字方式模拟神经网络。正因如此，历史上人工智能的应用与大数据、高效训练算法以及能够并行处理不同计算的强大计算机的发展密不可分。现代意义上的术语
    `big data` 最早由奥莱利传媒的市场研究总监罗杰·马古拉斯于 2005 年提出。他用这个术语来描述那些在当时几乎无法通过商业智能工具进行管理、操作和处理的超大型数据集。^(¹⁰⁹)
    随着互联网的兴起以及智能手机和其他数字设备的问世，大数据变得触手可及，人工智能的研究与开发也随之蓬勃发展。其提出的应用场景数量不断增加，复杂度逐步提升，应用领域也自此持续拓宽。但在详细探讨人工智能最重要且同样激动人心的应用场景之前，我们先简要了解一下最新的计算硬件是很有益的，这些硬件支撑了广泛的应用，并允许训练高度复杂的机器学习模型。


    ### 4.4.1 AI 芯片


    绝大多数深度学习算法的训练在数学上涉及反复计算激活函数和权重。简而言之，这些计算包括对表征不同神经元及其连接关系的成千上万个数字进行乘法和加法运算。这些数字通常排列在特殊的数组中，数学上称为
    `matrices`（矩阵）。早期，这类矩阵计算通常在 CPU 上执行，CPU 已存在多年——世界上第一个 CPU 是英特尔于 1971 年发布的 Intel
    4004 [104]——其设计目的是非常快速但并非同时地执行单个操作。在当今最先进的个人电脑中，CPU 仍然是许多对时间不敏感且不依赖高度复杂和计算密集型算法的人工智能应用的首选硬件。


    CPU 的基本架构由传奇的德国计算机先驱约翰·冯·诺依曼于 1945 年构思，包括计算核心和存储器等物理子组件。这两个组件通常在 CPU 微芯片上位置相近但在空间上彼此分离，并通过带宽有限的通信系统或
    `bus`（总线）连接。这种限制仅允许在特定时间内，一定量的数据在计算核心和存储器之间流动。有限的带宽造成了数据传输速度上的瓶颈，即所谓的 `冯·诺依曼瓶颈`，这使得在传统
    CPU 上使用大数据训练神经网络变得效率极低。^(¹¹⁰) 为了加速深度学习算法的训练计算，多家公司开始转而使用 `graphical processing
    units`（图形处理器，即 GPU）来并行化不同的计算。与 CPU 不同，GPU 最初是为电脑游戏行业设计的，目的是高效处理快速变化的高分辨率图像。^(¹¹¹)
    例如，美国计算机科学家吴恩达及其在斯坦福大学的同事在 2009 年通过利用 GPU 训练一个拥有超过 1 亿参数（权重和激活函数）的多层神经网络，令人印象深刻地展示了这种方法的优势。他们的实验表明，在他们的特定案例中，在
    GPU 上训练的速度比当时最先进的 CPU 快 70 倍以上 [105]。从那时起，GPU 成为训练复杂人工神经网络的首选方法。


    然而，CPU 和 GPU 都不是为机器学习而设计和优化的。因此，近年来，多家科技公司开始研发专门用于高度并行计算的定制芯片组，并针对在超大规模数据集上训练人工神经网络进行了优化。这些微芯片通常包含数千个所谓的
    `multiply-accumulate cores`（乘积累加核心，MAC 单元），这些单元由相互连接的晶体管电路构成，反复执行 `A + (B · C)`
    类型的矩阵计算。其中，`A`、`B` 和 `C` 代表表征人工神经网络不同参数的三个矩阵，每个矩阵通常包含多达 8,500 个十进制数。集成了此类 MAC
    单元的微芯片在文献中被称为 `neural processing units`（神经网络处理器，NPU）、神经网络加速器或 AI 芯片。


