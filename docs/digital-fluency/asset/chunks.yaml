    the most popular applications of dimensionality reduction are probably *recommender
    systems* and *collaborative filtering* for the analysis of customers’ behavioral
    patterns based on multiple aspects, viewpoints, data sources, and others.


    ### 4.3.3 Deep Learning


    Besides supervised and unsupervised learning, deep learning forms the third large
    group of learning strategies and is used conventionally to train artificial neural
    networks. *Deep learning* is a subcategory of machine learning that is inspired
    by the structure and function of the (human) brain. It is the youngest area of
    research in artificial intelligence and has generated a lot of excitement in media
    lately, partly because it offers a whole range of highly interdisciplinary applications.


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig8_HTML.png](images/505424_1_En_4_Chapter/505424_1_En_4_Fig8_HTML.png)


    Figure 4-8


    Basic circuit model of a single neuron with two decimal inputs x[1] and x[2].
    The output is a mathematical function of the weighted sum of inputs w[1] x[1]
    + w[2] x[2], denoted by a[w], and called activation function


    Artificial Neural Network


    An artificial neural network is a structure of interconnected neurons that are
    typically arranged in multiple layers. Each neuron is connected to the neurons
    in the preceding and succeeding layers and characterized by a certain activation
    function. Together with the strength (weight) of each connection, the activation
    function of each neuron controls how the information is transmitted through the
    network from the input to the output layer. Artificial neural networks mimic the
