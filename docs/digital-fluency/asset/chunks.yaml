  trans: '

    #### 深度学习：人工神经网络


    深度学习采用由相互连接的人工神经元构成的*人工神经网络*。这里的“人工”一词指的是：我们使用的并非真实的生物神经元，而是通过运行适当软件代码（即机器学习模型）的先进计算硬件来模拟其行为。现今人工神经网络中使用的神经元，是对弗兰克·罗森布拉特的感知器模型的泛化。根据我们在第
    4.1.2 节的讨论，你可能记得感知器的输出值取决于输入的加权和，我们在数学上用 `w[1] · x[1] + w[2] · x[2]` 以及输入 `x[1]`、`x[2]`
    和权重 `w[1]`、`w[2]` 来描述这一点。对弗兰克·罗森布拉特模型的这种特殊泛化被称为*激活函数*，它所做的无非是根据一个可选择的公式，将输入的加权和转换为一个小数——因此，这是一种更精细的控制激活电位的方式。激活函数为模型增加了一个自由度（或自由参数），并通过为其选择最合适的激活函数，使得能够更好地针对特定用例调优人工神经元。人工神经元的整体概念如图
    4-8 所示。


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig9_HTML.png](img/505424_1_En_4_Fig9_HTML.png)


    图 4-9


    三种最基本的人工神经网络类型。(a) 显示了一个两层神经网络，包含一个由四个神经元（圆圈）构建的输入层和一个由三个神经元构建的输出层。(b) 显示了一个包含一个隐藏层的三层设计，(c)
    显示了一种相当特殊类型的神经网络，称为“玻尔兹曼神经网络”，它没有特定的输入或输出。


    当我们将这些神经元连接起来，形成类似于我们大脑中生物神经网络的人工神经网络时，这些神经元的真正力量才得以展现。神经元可以连接起来形成任何类型的*网络架构*，这取决于手头的特定用例。在此语境下，“架构”一词指的是不同神经元相互连接的特定方式（或布线图）——这种连接当然是人工的，因为它是由软件模拟的。选择最合适的架构实际上需要大量的经验和专业技术。图
    4-9 展示了一些基本示例供你参考。该图表明，人工神经网络中的不同神经元通常排列在不同的层中，其中神经元仅与相邻层中的邻近神经元连接。既不是输入层也不是输出层的层称为*隐藏层*。从历史上看，“隐藏”一词引出了*深度学习*这个术语，因为隐藏层在神经网络中“深”处秘密地运作，不产生任何可见的输出。当输入数据非常多样化、庞大且复杂时，例如用于图像、物体和语音识别的数据，通常会使用隐藏层。


    为了更详细地解释人工神经网络的基本原理，我们现在将讨论一个非常流行的例子。这个用例如图 4-10 所示，是关于读取手写数字并将其转换为数字形式以供进一步处理。例如，一些邮政分拣中心会使用这类网络来读取邮政地址，并根据邮政编码自动分拣邮件，这种方案也很容易扩展到读取手写地址和其他文本。


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig10_HTML.png](img/505424_1_En_4_Fig10_HTML.png)


    图 4-10


    通过人工神经网络进行手写数字分类。该网络获取手写数字的图像，并将其转换为数字形式。根据输入图像的像素数，该网络的输入层包含 144 个神经元（圆圈）。此外，它包含两个隐藏层，每层有
    12 个神经元，以及一个输出层，该输出层总共包含 10 个神经元，分别对应数字 0、1、…、9。被激活的神经元以及权重最高的最主要连接以黑色突出显示。


    图 4-10 中的神经网络总共由四层构建而成：一个输入层、一个输出层和两个隐藏层。其输入是 12 × 12 像素的图像，例如我们在第 1.4.1 节介绍灰度图像二进制编码方案时讨论过的那种。这些图像逐行输入到神经网络中，即每个像素作为输入层中一个神经元的输入，因此输入层总共包含
    12 × 12 = 144 个神经元。根据某个像素的值是否足以激活相应的神经元，该输入要么被前馈到下一层，要么被认为无需进一步处理而忽略。在当前的例子中，下一层是第一个隐藏层。其神经元将信息转发到第二个隐藏层，但会根据另一个激活函数来进行，该函数允许聚焦于输入数据中的某些模式。第二个隐藏层包含的神经元比其前一层少，并且也为其构成神经元采用了一种特殊的激活函数。最后，输出层基于一种称为*sigmoid
    函数*的激活函数，对其来自第二个隐藏层的输入进行平均。该 sigmoid 函数的输出对应一个介于 0 和 1 之间的数字，可以用概率来解释⁹⁶。输出值 1
    对应 100%的概率，相应地，输出 0 对应 0%的概率。在此特定案例中，概率最高的神经元是第三个，因此网络正确地将以手写数字 3 输入的图像归类为数字 3，其不确定性由相应的概率给出。


    ### 深度学习


    深度学习是指采用包含一个或多个隐藏层的人工神经网络的机器学习算法或程序。它对于解决复杂任务特别有用，例如图像和物体识别或自然语言处理。


    与线性回归模型类似，这种手写数字分类只有在神经网络之前已经用包含数千个手写数字的大型训练数据集进行过训练的情况下，才能正确工作。未经任何训练，神经元之间不同连接的权重只是随机值。因此，神经元会被任意激活，并且其激发几乎与输入图像无关。那么，这个训练是如何进行的呢？人工神经网络实际上是如何学习的？


    人工神经网络通常可以通过使用标记数据或未标记数据进行训练，即采用监督学习或无监督学习。当前例子中的人工神经网络是使用标记数据集进行训练的。这些数据集包含数千张手写数字图像，每张图像都与正确的数字关联（或被标记）。因此，可以通过将计算出的输出与标记的输入值进行比较来定义神经网络的成本函数⁹⁷。


    与所有其他机器学习算法一样，人工神经网络是通过迭代最小化其成本函数来进行训练的。训练通常包括五个主要步骤：


    1.  第一步，用随机小数初始化不同的权重，为简单起见，这些数字通常介于 0 和 1 之间。

    2.  之后，将训练数据集的第一张图像输入到输入层，每个像素对应一个神经元。'
- fmt: '3. 数据随后从输入层向输出层逐层传播，每个神经元的输出等于其激活函数对相应加权输入和的计算结果。这一过程被称为*前向传播*，因为它从输入层指向输出层。


    4. 在第四步中，算法将计算结果与输入图像的标签进行比较，并计算输出层每个神经元产生的误差。


    5. 第五步被称为*反向传播*，其理论基础源于美国数学家 Paul Werbos 和美国心理学家 David Rumelhart 的先驱性工作 [[39](#505424_1_En_4_Chapter.xhtml#Par278),
    [40](#505424_1_En_4_Chapter.xhtml#Par279)]。反向传播标志着人工智能研究的一个重要里程碑，因为在此之前的神经网络无法被准确高效地训练。^([^(98)](#fn98))
    在此过程中，计算出的误差从输出层反向传播至输入层，同时根据各权重对误差的贡献程度进行更新。通过这种方式，部分连接的权重增加而变强，其他连接的权重相应减少而变弱。单次迭代中权重更新的最大幅度被称为*学习率*，它决定了人工神经网络的学习速度。


    步骤 1–5 会重复执行，直到训练数据集中的每张图像都已通过网络处理，并达到预期的识别精度。训练数据集中所有图像完整地完成一次前向和后向传播，被称为一个*周期*。人工神经网络的训练通常涉及数百个周期，这就是为什么整个训练过程可能非常耗时且计算密集。


    形象地说，人工神经网络隐藏层中的不同神经元在训练过程中会捕捉特定的图像特征和形状，从而将图像分解为其最主要的子成分。因此，第一个隐藏层的神经元会逐步识别简单的形状，例如直线、边缘、角、矩形、圆形和其他嵌套特征。第二个隐藏层的神经元可能识别出输入图像中占主导地位的、更复杂的特征或这些简单形状的组合。训练完成后，便建立了一个通用的简单形状集合，该集合能够很好地适用于识别所有可能的手写数字，其方法是将手写数字分解为基本形状，并根据特定的分解方式将其关联到一个数字。


    #### 深度学习：卷积神经网络


    与任何其他人工神经网络一样，卷积神经网络建立在历史上发展出的多种科学概念和思想之上。其核心思想可追溯到德国神经科学家、诺贝尔奖得主 David Hubel
    和 Torsten Wiesel，他们在 1959 年研究了猫视觉皮层中的神经元 [[42](#505424_1_En_4_Chapter.xhtml#Par281)]。基于实验结果，他们很快认识到，猫视觉皮层（即大脑中处理来自眼睛视觉信号的部分）中的神经元仅对视野中的小区域产生反应，他们将这些区域称为*感受野*。此外，他们还发现相邻神经元的感受野相互重叠，形成一个光栅，共同构成了猫的整个视野。这种重叠在数学上被称为*卷积*，类似于应用于图像以突出特定结构、纹理、特征及其他方面的局部滤波器。为清晰起见，图
    [4-11](#505424_1_En_4_Chapter.xhtml#Fig11) 展示了两种非常常见的卷积滤波器在一张示例灰度图像上的效果。


    受 David Hubel 和 Torsten Wiesel 开创性工作的启发，日本计算机科学家 Kunihiko Fukushima 于 1980 年开发了一种多层人工神经网络，他将其命名为“Neocognitron”
    [[36](#505424_1_En_4_Chapter.xhtml#Par275), [43](#505424_1_En_4_Chapter.xhtml#Par282)]。这种特殊的人工神经网络采用完全不同的网络架构，能够识别类似前述示例的手写字符。其方法的真正创新在于将人工神经网络与基于卷积滤波器的特征提取单元相结合，因此他的网络架构后来被称为*卷积神经网络*。图
    [4-12](#505424_1_En_4_Chapter.xhtml#Fig12) 示意性地展示了此类网络的一个非常简单的示例。这个特定的卷积神经网络可用于图像识别，并根据车辆类型（如紧凑型轿车、敞篷车、SUV
    和豪华轿车）对车辆进行分类。它由两个子组件组成：(1) 特征提取单元和 (2) 分类单元。特征提取单元用于图像预处理，由三个具有特定激活函数的神经元层组成。第一层称为*卷积层*，它通过在输入图像上逐行、逐列移动任意滤波器（类似于图
    [4-11](#505424_1_En_4_Chapter.xhtml#Fig11) 所示的滤波器）来扫描图像，以检测特定的（对比度）特征和结构。此过程会创建一个所谓的*特征图*，突出显示汽车统计上最相关的特征，例如车轮、车门、车灯以及其他方面，具体取决于所选的滤波器。之后，Kunihiko
    Fukushima 引入了一个所谓的*池化层*，该层对这些特征进行累加，并根据其统计相关性进行评级。由于其特殊的激活函数，池化层进一步确保了即使检测到的特征在输入图像中发生偏移或倾斜，也能被正确识别。^([^(99)](#fn99))
    此外，它还减小了图像尺寸，因此池化层有时也被称为“下采样层”。池化后的特征图作为后续* flattening层*（特征提取单元的第三层，也是最后一层）的输入。该层进一步缩小特征尺寸，并将特征图转换为一列神经元。这一列神经元本身又作为卷积神经网络第二个子组件（一个全连接的人工神经网络，即分类单元）的输入。这个人工神经网络最终能够将检测到的特征分类为特定的车辆类型，类似于前一个示例中用于分类手写数字的人工神经网络。


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig12_HTML.jpg](images/505424_1_En_4_Chapter/505424_1_En_4_Fig12_HTML.jpg)


    **图 4-12** 用于根据车辆类型对车辆图像进行分类的卷积神经网络架构设计。特征提取单元由卷积层、池化层和 flattening层组成，识别图像中的特定特征和结构。根据哪些特征最终被证明最为主要，一个人工神经网络将这些特征分类为特定的车辆类型。


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig11_HTML.jpg](images/505424_1_En_4_Chapter/505424_1_En_4_Fig11_HTML.jpg)


    **图 4-11** 两个特征检测器对原始图像的效果。“边缘检测器”强调图像中的所有边缘，而“图像浮雕”则赋予图像三维外观，从而突出图像中的任何纹理，例如车辆下方的地面。'
  raw: '3.  The data propagates through the network subsequently from the input to
    the output layer such that the output of each neuron equals its activation function
    evaluated for the respective weighted sum of inputs. This process is called *forward
    propagation* since it is directed from the input toward the output layer.


    4.  In the fourth step, the algorithm compares the calculated result to the label
    of the input image and calculates the generated error for each neuron in the output
    layer.


    5.  The fifth step is referred to as *back propagation* and relies on the pioneering
    work of the American mathematician Paul Werbos and the American psychologist David
    Rumelhart [[39](#505424_1_En_4_Chapter.xhtml#Par278), [40](#505424_1_En_4_Chapter.xhtml#Par279)].
    Back propagation marks an important milestone in AI research since artificial
    neural networks could not be trained accurately and efficiently before.^([^(98)](#fn98))
    During this process, the calculated error propagates backward through the network
    from the output to the input layer while updating the different weights according
    to how much they contributed to the error. In this way, some connections become
    stronger by increasing their weight, and others become weaker by decreasing their
    weight accordingly. The maximum amount by which we update the weights in one iteration
    step is called *learning rate*, which determines the speed at which the artificial
    neural network learns.


    The steps 1–5 are repeated until each image of the training dataset has passed
    through the network and been identified to the intended accuracy. One complete
    forward and backward propagation of all images in the training dataset is called
    *epoch* . The training of artificial neural networks typically involves hundreds
    of epochs, which is why the overall training process can be very time consuming
    and computationally intense.


    Vividly speaking, the different neurons in the hidden layers of the artificial
    neural network pick up certain image features and shapes during the training and
    thereby decompose the image into its most dominant subcomponents. Hence, neurons
    in the first hidden layer will progressively identify simple shapes, such as straight
    lines, edges, corners, rectangles, round shapes, and other nested features. The
    neurons in the second hidden layer may recognize even more complex features or
    combinations of those simple shapes that are predominant in the input image. Once
    the training is completed, a universal set of simple shapes has been established
    that lends itself well for recognizing all possible handwritten numbers by decomposing
    them into their basic shapes and associating them with a digital number depending
    on the particular decomposition correctly.


    #### Deep Learning: Convolutional Neural Networks


    Like any other artificial neural network, convolutional neural networks build
    on a range of different scientific concepts and ideas that have been developed
    over time. Their central idea goes back to the German neuroscientists and Nobel
    laureates David Hubel and Torsten Wiesel, who studied the neurons in the visual
    cortex of cats in 1959 [[42](#505424_1_En_4_Chapter.xhtml#Par281)]. Based on their
    experimental results, they soon recognized that the neurons in the cat’s visual
    cortex – the part of the brain that processes visual signals from the eyes – only
    responds to small regions of the entire field of vision, which they called *receptive
    fields* . Furthermore, the receptive fields of neighboring neurons were found
    to overlap with each other to form a raster that builds up the cat’s entire field
    of vision. Such overlaps are mathematically called *convolutions* and compare
    to local filters that are applied to an image to highlight certain structures,
    textures, features, and other aspects of the image. Figure [4-11](#505424_1_En_4_Chapter.xhtml#Fig11)
    shows the effect of two very common convolutional filters on an exemplary grayscale
    image for clarity.


    Inspired by the pioneering work of David Hubel and Torsten Wiesel, the Japanese
    computer scientist Kunihiko Fukushima developed a multilayered artificial neural
    network in 1980, which he called “Neocognitron” [[36](#505424_1_En_4_Chapter.xhtml#Par275),
    [43](#505424_1_En_4_Chapter.xhtml#Par282)] . This particular artificial neural
    network was capable of recognizing handwritten characters similar to the example
    discussed earlier by using an entirely different network architecture. The real
    innovation in his approach relies on the combination of an artificial neural network
    with a feature extraction unit based on convolutional filters, which is why his
    network architecture became known as *convolutional neural network* later on.
    A very simple example for such a network is shown in Figure [4-12](#505424_1_En_4_Chapter.xhtml#Fig12)
    schematically. This particular convolutional neural network can be used for image
    recognition and classification of vehicles according to their vehicle type, such
    as compact car, cabriolet, SUV, and limousine. It is composed of two subcomponents,
    a (1) feature extraction unit and (2) classification unit. The feature extraction
    unit is used for image preprocessing and comprised of three layers of neurons
    with specific activation functions. The first layer is called *convolutional layer*
    and scans the input image to detect certain (contrast) features and structures
    by moving an arbitrary filter across the image line by line, column by column
    similar to the ones shown in Figure [4-11](#505424_1_En_4_Chapter.xhtml#Fig11).
    This process creates a so-called *feature map* that highlights the statistically
    most relevant features of cars, such as wheels, doors, lights, and other aspects
    depending on the selected filter. After that, Kunihiko Fukushima introduced a
    so-called *pooling layer* that adds up those features and rates them according
    to their statistical relevance. Due to its particular activation function, the
    pooling layer further ensures that the detected features are recognized correctly
    even if they are shifted or tilted in the input image.^([^(99)](#fn99)) Furthermore,
    it reduces the image size, which is why the pooling layer is sometimes also called
    “downsampling layer.” Its pooled feature map serves as the input for the subsequent
    *flattening layer* , the third and last layer of the feature extraction unit.
    This layer reduces the feature size further and transforms the feature map into
    one column of neurons. This column does itself serve as the input for the second
    subcomponent of the convolutional neural network, a fully connected artificial
    neural network featuring the classification unit. This artificial neural network
    finally allows for the classification of the detected features into certain vehicle
    types similar to the artificial neural network that was used to classify handwritten
    numbers in the previous example.


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig12_HTML.jpg](images/505424_1_En_4_Chapter/505424_1_En_4_Fig12_HTML.jpg)


    Figure 4-12


    Architectural design of a convolutional neural network used to classify images
    of vehicles according to the vehicle type. The feature extraction unit is composed
    of a convolutional, pooling, and flattening layer and recognizes certain features
    and structures in the images. Depending on which features turn out to be most
    dominant, an artificial neural network classifies the features into certain vehicle
    types


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig11_HTML.jpg](images/505424_1_En_4_Chapter/505424_1_En_4_Fig11_HTML.jpg)


    Figure 4-11


    The effect of two feature detectors on an original image. The “edge detector”
    emphasizes all edges in the image, while the “image emboss” gives the image a
    three-dimensional appearance and thereby highlights any textures in the image,
    such as the ground below the vehicle'
