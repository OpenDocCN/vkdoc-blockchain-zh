    # 深度学习：生成对抗神经网络


    另一类非常有趣且相对较新的机器学习模型是*生成对抗神经网络*，法裔美国计算机科学家、Facebook 人工智能研究总监扬·勒昆曾称之为“过去十年中最有趣的想法”
    [57]。该模型由美国计算机科学家伊恩·古德费洛及其蒙特利尔大学的同事于 2014 年发现 [58]，由两个相互竞争的人工神经网络组成。这种竞争关系催生了“对抗”一词，其概念源自*博弈论*，这是一门用于模拟理性决策的数学学科。^(¹⁰¹)
    其基本架构示意如图 4-13 所示。一个生成对抗神经网络包含两个子组件：*生成器网络*和*判别器网络*，每个子组件都展现出不同的架构。生成器网络的初始输入是随机噪声，而判别器网络的输入数据集同时包含真实样本图像（训练数据）和生成器的输出图像。在这种配置下，生成器旨在创建虚假图像，而判别器则评估其输入是真实图像还是虚假图像。随着两个竞争网络在训练过程中不断优化，生成器最终被迫在每次迭代中创建出越来越逼真的新图像。经过若干轮次（epoch）后，判别器会将其生成的输入图像估计为真实图像，训练过程随即结束。此时，生成对抗神经网络已达成其主要目标：从包含真实图像的数据集中生成一张全新的、看似真实的（虚假）图像。


    此时，你完全有理由问自己：这种网络除了让数据科学家用来生成有趣的图像之外，是否还有其他实际用途？首先，需要指出的是，从概念角度来看，*对抗学习*特别引人注目，因为它提供了一种无需任何成本函数的统计学习新方法。生成对抗神经网络反而能够自行学习其成本函数，从而避免了需要精心设计和构造成本函数的麻烦，而后者通常非常费力且耗时
    [61]。扬·勒昆曾在 2016 年的 NIPS 大会（世界上最大的人工智能研究会议之一）上，将这种为特定用例寻找合适成本函数的挑战描述如下：“如果智能是一个蛋糕，那么无监督学习就是蛋糕本身，监督学习是蛋糕上的糖霜，而强化学习则是蛋糕上的樱桃。我们知道如何制作糖霜和樱桃，但不知道如何制作蛋糕。”
    三年后，在旧金山举办的 ISSCC 上发表演讲时，他更新了自己著名的*蛋糕类比*，将“无监督学习”替换为“自监督学习”。他用这个术语指代一种学习策略，即数据本身提供监督并充当训练者，类似于其在生成对抗神经网络中的作用。在他看来，“下一次人工智能革命将不是监督式的，也不是纯粹的强化式。未来是属于自监督学习的，它需要海量数据和非常庞大的网络。”


    除了这种概念上的相关性，生成对抗神经网络在多种应用中也展现出优于其他神经网络架构的性能。在此背景下，最受欢迎的应用包括高级照片编辑（涵盖风格迁移^(¹⁰²)
    [62]和图像融合）、图像修复 [63]、人脸老化及基于（肖像）图像的年龄估计 [64]、照片级真实感图像生成 [65]，以及用于姿态不变人脸识别的人脸正面视图生成
    [66]。最后一个应用在分析公共安全摄像头数据时可能发挥关键作用，例如，用于独立于姿态和风格地视觉追踪和识别罪犯，以减少犯罪并执行起诉。生成对抗神经网络最近也登上了国际艺术品拍卖舞台，当时英国拍卖行佳士得售出了首张由这种网络创作的图像。这幅图像名为《埃德蒙·贝拉米肖像》，描绘了一位身材魁梧、可能为法国绅士的人物，身着深色礼服大衣，搭配素白领子。这幅图像于
    2018 年 10 月 25 日在佳士得的“版画及限量作品”拍卖会上以——信不信由你——432,500 美元的价格成交，是其最高估价的近 45 倍 [67]。


    生成对抗神经网络的另一个日益流行的应用是*生成式设计*，指的是一种迭代设计过程：程序根据用户指定的某些约束条件，生成一系列可供用户后续微调的设计对象。例如，剑桥咨询公司的一个团队创建了一个名为“Vincent
    AI”的程序，可以根据预先选定的风格将粗糙的人体草图转化为艺术作品。^(¹⁰³) 欧特克的“Dreamcatcher AI”项目^(¹⁰⁴) 也一直在探索类似的方法，并开发了一个商业可用的平台，能够基于用户上传的
    CAD 文件（工业设计应用的主要数据格式）自动生成不同的设计方案。


    这些例子表明，人工智能也正在成为艺术领域的一股颠覆性力量。许多公司捕捉到了这一趋势，并开始探索艺术、设计、创造力与人工智能之间令人兴奋的联系。例如，谷歌在
    2016 年启动了其“艺术与机器智能项目”，该项目汇集了来自世界各地的艺术家和工程师，共同探讨人工智能如何改变创意实践 [68]。


    然而，不幸的是，生成对抗网络也被恶意用于一些不那么光彩的事情。一个例子是所谓的*深度伪造*，即利用这项技术创建误导性的虚假图像、视频或新闻。例如，基于生成对抗网络的风格迁移技术，可以让你让任何知名政客或国家领导人说出你想要他们说的任何话——这对于基于虚假新闻的政治宣传来说是一种真正危险的工具。

    '
- fmt: '### Deep Learning: Recommender Systems


    Companies like Amazon, Netflix, Pandora, and LinkedIn also apply another class
    of machine learning algorithms called *recommender systems* to help users of their
    platforms discover new items (e.g., books, videos, music, and articles) that may
    be interesting and worth buying. Recommender systems thereby create a delightful
    user experience while driving sales and revenue of the respective platform or
    marketplace vendor. Figure [4-6](#505424_1_En_4_Chapter.xhtml#Fig6) differentiates
    three different types of recommender systems: (1) content-based, (2) model-based,
    and (3) memory-based recommender systems. At Pandora, an American music streaming
    and Internet radio service, for example, a team of musicians manually labels each
    music station with hundreds of attributes and keywords, such as genre and artist.
    Then, whenever a user selects a certain music station, Pandora will automatically
    add songs with the same attributes and ultimately generate a personalized playlist
    for each of its millions of users. This is an example of a *content-based* recommender
    system that matches user profiles to different items with the same attributes
    and keywords. Such algorithms are computationally fast and scalable as they can
    be extended to new items and customers easily.


    In *model-based* recommender systems, the algorithm extracts some information
    or behavioral pattern from a large dataset and uses that as a model to make future
    recommendations. This approach is particularly useful for patterns that do only
    change slowly over time and do not need to be updated frequently because building
    a model is often a time- and resource-consuming process. One example is social-knowledge-based
    systems [[69](#505424_1_En_4_Chapter.xhtml#Par309)].


    An example of a *memory-based* recommender system is Amazon’s former ecommerce
    agent in the “Customers who bought items in your shopping cart also bought” section
    of its website [[70](#505424_1_En_4_Chapter.xhtml#Par310)]. This agent may have
    an interesting impact on Amazon’s business model due to the following argument.
    As the agent becomes better and better over time, its prediction accuracy may
    occasionally cross a certain threshold beyond which it is more profitable for
    Amazon to ship you the goods it predicts you will want rather than wait for you
    to order them. This *predictive* or *anticipatory shipping* has two advantages
    from Amazon’s point of view: (1) its convenience makes it less likely that you
    purchase the items from a competitor, and (2) it nudges you to buy items that
    you considered but may not have purchased in the end – both cases will ultimately
    increase Amazon’s share of wallet. Since shoppers would not want to bother about
    returning the items they do not want, Amazon would probably invest in infrastructure
    for handling product returns conveniently, such as delivery-style trucks or autonomous
    drones that pick up and collect the items regularly once a week or so. As a skeptic
    reader, you may be surprised to learn that Amazon obtained a US patent for anticipatory
    shipping back in 2013 already with the patent number US 8,615,473 B2 [[71](#505424_1_En_4_Chapter.xhtml#Par311)].


    However, the most important algorithm to implement recommender systems is technically
    called *collaborative filtering*, which employs certain measures to identify similarities
    between user-item and item-item pairs in a dataset [[72](#505424_1_En_4_Chapter.xhtml#Par312)].
    These similarity measures are then used to predict ratings for new pairs not present
    in the dataset. Data scientists differentiate between *user-based* and *item-based*
    collaborative filtering in this context for obvious reasons.


    ### Deep Learning: Auto Encoders


    Auto encoders are a very special class of neural networks that allow for encoding
    data efficiently by employing unsupervised learning. An auto encoder aims to learn
    the best encoding and decoding scheme by using an iterative optimization process.
    They have been around since the late 1980s [[73](#505424_1_En_4_Chapter.xhtml#Par313)–[75](#505424_1_En_4_Chapter.xhtml#Par315)]
    and traditionally used for *dimensionality reduction*, that is, the reduction
    of the size of datasets by removing dispensable and nonrelevant data. Their operation
    compares to the ZIP-file format, which allows us to compress and archive all kinds
    of data. In contrast to the ZIP algorithm, the data compression scheme of auto
    encoders is not predefined and fixed but rather learned and optimized through
    training iteratively based on the statistically most relevant features and patterns
    prevalent in the dataset to be compressed.'
