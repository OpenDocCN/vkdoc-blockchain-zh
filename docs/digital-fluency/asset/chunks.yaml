  trans: '

    ## 2.1 奠定量子计算基础


    在 19 世纪末，大多数科学家认为物理学已无新发现，剩下的只是更精确的测量。然而，随着著名德国物理学家、后来的诺贝尔奖得主马克斯·普朗克的发现，这一评价被证明是一个严重的误判。在柏林洪堡大学的实验室里，他正在研究所谓的*黑体辐射*，即黑色物体发出的热辐射。他惊奇地发现，这类物体在烤箱中加热时，并非连续地释放热能，而是以一个个小包的形式释放——即某个微小自然量的整数倍，这一量后来被称为*普朗克常数*。这个量描述了自然在其最基本尺度上变化的最小量或*量子*^(²³)。^(²⁴)
    起初，马克斯·普朗克并不相信这一观测结果，因为它与著名博学家戈特弗里德·莱布尼茨的论断相悖——莱布尼茨曾宣称“自然界从不跳跃”，其拉丁文翻译“*natura
    non facit saltus*”成为了一句名言。


    随着时间的推移，越来越多的实验证实，能量和质量等物理性质确实是以微小步长变化的。阿尔伯特·爱因斯坦后来也运用这一概念解释了*光电效应*^(²⁵)，并因此于
    1921 年获得了诺贝尔奖。马克斯·普朗克的开创性发现标志着旧物理学理论——所谓的*经典物理学*——与现代*量子物理学*之间的转折点。经典物理学基于描述宏观物体的*经典力学*，即我们所熟悉的自然尺度。这一理论深受英国博学家艾萨克·牛顿及其传说中苹果的影响——那个苹果启发他提出了万有引力理论。美国金融家兼慈善家伯纳德·巴鲁克曾精妙地描述这一发现：“千百万人看到了苹果落下，但只有牛顿问为什么。”
    在最小、最基本的尺度上，自然是量子化的，其效应已无法用经典物理学来解释——艾萨克·牛顿肯定会为马克斯·普朗克的发现深感不安。这些效应需要用量子物理学及其基础理论*量子力学*来描述，正如我们接下来将看到的，这充满了意外与神秘。著名美国物理学家、诺贝尔奖得主理查德·费曼曾指出：“我可以肯定地说，没有人真正理解量子力学。”


    量子力学——现代物理学除广义相对论外的另一基石——为包括智能手机和电视在内的几乎所有电子设备奠定了基础。它也为量子计算机提供了理论概念，因此，仔细审视这一激动人心的现代物理学理论是富有启发性的。在其当前版本中，量子力学主要由德国物理学家埃尔温·薛定谔和沃纳·海森堡发展而来，两人均因其开创性工作以及对这一持续深入研究的领域的重要贡献而荣获诺贝尔奖。


    ### 量子化


    量子化是现代物理学的一项原理，指能量和质量等物理性质并非连续地（增加或减少）变化，而是以微小步长离散地变化。最小的步长称为*量子*，量子化原理因此得名。一个例子是描述能量阶梯式变化的普朗克常数。


    量子力学——正如其名——描述量子的动态行为，即自然最基本构建模块之间的作用与反作用关系。这些构建模块非常微小，人眼不可见，被称为*基本粒子*。与原子和分子不同，基本粒子不能再被分割成任何子成分。换言之，它们是不可分割的，因此是宇宙中最小的构建模块。天体物理学家计算出，可观测宇宙中总共包含超过
    10⁸⁶ 个基本粒子，这真是一个令人叹为观止的数量级。它们或自由游荡，或相互结合形成分子，进而构成星云、星系、恒星以及行星，包括我们美丽的地球。作为对比，一个普通人总共包含超过
    10²⁷ 个基本粒子。根据所谓的*标准模型*，物理学家共区分出 17 种基本粒子。根据它们的物理性质，如电荷及其相互作用的奇特方式，这些粒子可分为两大基本类别：*玻色子*和*费米子*。最著名的玻色子是*光子*，它是光的基本组成单元；而*电子*是最著名的费米子。电子携带负电荷，因此促成了电流的传输，电流流经智能手机以及你能想到的所有其他电子设备。光子和电子这两种粒子都常用于实现量子计算机，这就是我们将在下一节研究它们量子力学性质与物理特性的原因。


    ## 2.2 量子力学的奇异世界


    自然在最小尺度上的行为非常奇特且反直觉。从经典物理学和我们的日常经验中，我们知道物理过程完全由先前存在的成因决定。换句话说，知道一个物理系统现在的状态，就能决定其明天或任何后续时刻的状态。例如，一辆以恒定速度
    100 英里/小时行驶的车辆，除非因某种原因加速或减速，否则下一小时将行驶 100 英里。一切都可以被计算并以非常高的精度预测，因为作用之后必然有反作用，这在艾萨克·牛顿发展的经典力学中通常被称为*因果决定论*。

    '
- fmt: '### 2.2.1 Spooky Quantum Reality


    For quantum mechanical objects, such as electrons and photons, this situation
    changes completely, and everything becomes less deterministic and rather vague.
    This is related to the probabilistic nature of quantum mechanics, which means
    that the current state of a quantum mechanical object only determines the probability
    (“likelihood” or “chance”) for the object to develop in a certain state (or “condition”)
    over time. The causal determinism and accuracy of classical physics is replaced
    by the *probabilistic approach* in quantum mechanics. This is the major and truly
    striking difference between the classical world that surrounds us and quantum
    mechanics that describes nature on its smallest scale including photons and electrons.


    The consequences of this major difference can be illustrated best by comparing
    a classical roller coaster to a fictive quantum mechanical version of it. Consider
    you are riding a roller coaster in your most favorite amusement park. After paying
    your entry fee, you sit down in your preferred wagon and hopefully start to relax.
    At a certain point in time, the wagon leaves the starting point and is pulled
    uphill by an electric motor. Let us denote the height of the peak point of this
    first hill by the letter `A` as depicted in Figure [2-1](#505424_1_En_2_Chapter.xhtml#Fig1).
    After reaching point `A`, your wagon will accelerate downward toward the lowest
    point `B` of the roller coaster and start climbing the second hill toward point
    `D`. Halfway through, your wagon reaches point `C`. From classical mechanics (and
    its energy conservation law), it is very easy to derive that you will never reach
    any point higher than that since you do not have enough energy to do so – we consider
    that your wagon is not pulled uphill by any motor at this point for simplicity.
    Hence, there is no way for you to reach and even cross point `D`. This second
    hill is therefore said to be an insurmountable *energy barrier* in classical mechanics.
    Your ride between point `A` and `C` is entirely deterministic, and the time by
    which you reach point `B`, for example, can be calculated based on your mass and
    starting time with very high accuracy.


    `![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig1_HTML.png](images/505424_1_En_2_Chapter/505424_1_En_2_Fig1_HTML.png)`


    **Figure 2-1** Explanation of the tunnel effect (dashed arrow from point `C` to
    `E`, gray wagon) for a quantum mechanical roller coaster


    Imagine you are riding a fictive quantum mechanical roller coaster now. In this
    case, we cannot use classical mechanics anymore to determine the timely evolution
    of your ride. For such a quantum mechanical roller coaster, your riding experience
    changes completely, and your journey becomes rather rough. The good news is that
    it is fairly easy to measure whether your wagon has left the starting point or
    not. But the bad news is that there is not much more to tell about your quantum
    ride. Once you have left the starting point, it is actually impossible to determine
    your exact position on the roller coaster since your ride is not deterministic
    anymore. As a consequence, we literally do not know where exactly your wagon remains
    at a given moment in time without measuring its position. This phenomenon is called
    *Heisenberg uncertainty principle* and is at the heart of quantum mechanics. The
    position of your quantum mechanical wagon cannot be described in terms of a single
    point on the roller coaster anymore but rather by a (time-dependent) distribution
    of points with different probabilities of presence. This distribution is called
    *wave function* and assigns each position of your wagon on the roller coaster
    to a certain probability of presence. In other words, you will be at the lowest
    point `B` with a probability of say 40% and will have reached point `C` with 60%.
    There is no way of calculating the exact position of your wagon on the quantum
    mechanical roller coaster based on your starting time or any previously measured
    position – you are basically everywhere (with a certain probability) at the same
    time, a quantum mechanical behavior called *non-locality*. This is truly strange,
    is it not?


    **Heisenberg Uncertainty Principle**


    The uncertainty principle is a direct consequence of the probabilistic nature
    of quantum mechanics and states that the momentum and position (or energy and
    time) of a quantum mechanical object cannot be measured accurately at the same
    time.


    This situation becomes even more weird when I or any other person – a so-called
    *observer* – watches you from the outside by measuring your position with a photo-camera
    or light-optical barrier repeatedly. The simple presence of an external observer
    changes your ride experience completely. Taking a photo at point `B`, for instance,
    will either confirm that your wagon remains at that point or not. In other words,
    the probability for finding your wagon at point `B` is either 100% (“wagon is
    at `B`”) or 0% (“wagon is not at `B`”) since a measurement will always reveal
    a discrete (or “concrete”) result. But this is really strange when taking a closer
    look since the aforementioned probability distribution or wave function must disappear
    suddenly and change to either 100% or 0% in the moment of measurement. This is
    the famous *collapse of the wave function* that only occurs if someone watches
    you and measures your position. As soon as the observer stops watching you, the
    probability distribution instantly reappears and you are everywhere and nowhere
    at the same time again. This is quite inconceivable indeed and entirely unexpected
    from the classical physics point of view.


    A quantum mechanical roller coaster does reveal another mysterious behavior: when
    you calculate the wave function for your wagon, you will find that there is a
    realistic chance (technically called finite probability) for finding your wagon
    beyond point `D` that turned out to be insurmountable from a classical physics
    point of view. In other words, there is a certain probability for you to cross
    point `D` although you do not have enough energy to do so according to classical
    mechanics. In quantum mechanics, you can simply tunnel directly from point `C`
    to `E` across the hill, end up at point `E`, and continue your rough ride there
    as indicated by the dashed arrow in Figure [2-1](#505424_1_En_2_Chapter.xhtml#Fig1).
    This quantum mechanical phenomenon of crossing classically insurmountable energy
    barriers is called quantum tunneling or *tunnel effect* and is sometimes described
    in terms of quantum mechanical objects “going through closed doors.” Since its
    discovery by the French physicist Henri Becquerel in 1896, the tunnel effect has
    been observed in numerous experiments, such as the decay of radioactive atoms.


    **Tunnel Effect**


    Tunneling refers to a counterintuitive but natural phenomenon by which quantum
    mechanical objects, such as photons and electrons, cross an energy barrier although
    they do not have enough energy to do so according to classical physics.'
  raw: '### 2.2.1 Spooky Quantum Reality


    For quantum mechanical objects, such as electrons and photons, this situation
    changes completely, and everything becomes less deterministic and rather vague.
    This is related to the probabilistic nature of quantum mechanics, which means
    that the current state of a quantum mechanical object only determines the probability
    (“likelihood” or “chance”) for the object to develop in a certain state (or “condition”)
    over time. The causal determinism and accuracy of classical physics is replaced
    by the *probabilistic approach* in quantum mechanics. This is the major and truly
    striking difference between the classical world that surrounds us and quantum
    mechanics that describes nature on its smallest scale including photons and electrons.


    The consequences of this major difference can be illustrated best by comparing
    a classical roller coaster to a fictive quantum mechanical version of it. Consider
    you are riding a roller coaster in your most favorite amusement park. After paying
    your entry fee, you sit down in your preferred wagon and hopefully start to relax.
    At a certain point in time, the wagon leaves the starting point and is pulled
    uphill by an electric motor. Let us denote the height of the peak point of this
    first hill by the letter *A* as depicted in Figure [2-1](#505424_1_En_2_Chapter.xhtml#Fig1).
    After reaching point *A*, your wagon will accelerate downward toward the lowest
    point *B* of the roller coaster and start climbing the second hill toward point
    *D*. Halfway through, your wagon reaches point *C*. From classical mechanics (and
    its energy conservation law), it is very easy to derive that you will never reach
    any point higher than that since you do not have enough energy to do so – we consider
    that your wagon is not pulled uphill by any motor at this point for simplicity.
    Hence, there is no way for you to reach and even cross point *D*. This second
    hill is therefore said to be an insurmountable *energy barrier* in classical mechanics.
    Your ride between point *A* and *C* is entirely deterministic, and the time by
    which you reach point *B*, for example, can be calculated based on your mass and
    starting time with very high accuracy.


    ![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig1_HTML.png](images/505424_1_En_2_Chapter/505424_1_En_2_Fig1_HTML.png)


    Figure 2-1


    Explanation of the tunnel effect (dashed arrow from point C to E, gray wagon)
    for a quantum mechanical roller coaster


    Imagine you are riding a fictive quantum mechanical roller coaster now. In this
    case, we cannot use classical mechanics anymore to determine the timely evolution
    of your ride. For such a quantum mechanical roller coaster, your riding experience
    changes completely, and your journey becomes rather rough. The good news is that
    it is fairly easy to measure whether your wagon has left the starting point or
    not. But the bad news is that there is not much more to tell about your quantum
    ride. Once you have left the starting point, it is actually impossible to determine
    your exact position on the roller coaster since your ride is not deterministic
    anymore. As a consequence, we literally do not know where exactly your wagon remains
    at a given moment in time without measuring its position. This phenomenon is called
    *Heisenberg uncertainty principle* and is at the heart of quantum mechanics. The
    position of your quantum mechanical wagon cannot be described in terms of a single
    point on the roller coaster anymore but rather by a (time-dependent) distribution
    of points with different probabilities of presence. This distribution is called
    *wave function* and assigns each position of your wagon on the roller coaster
    to a certain probability of presence. In other words, you will be at the lowest
    point *B* with a probability of say 40% and will have reached point *C* with 60%.
    There is no way of calculating the exact position of your wagon on the quantum
    mechanical roller coaster based on your starting time or any previously measured
    position – you are basically everywhere (with a certain probability) at the same
    time, a quantum mechanical behavior called *non-locality*. This is truly strange,
    is it not?


    Heisenberg Uncertainty Principle


    The uncertainty principle is a direct consequence of the probabilistic nature
    of quantum mechanics and states that the momentum and position (or energy and
    time) of a quantum mechanical object cannot be measured accurately at the same
    time.


    This situation becomes even more weird when I or any other person – a so-called
    *observer* – watches you from the outside by measuring your position with a photo-camera
    or light-optical barrier repeatedly. The simple presence of an external observer
    changes your ride experience completely. Taking a photo at point *B*, for instance,
    will either confirm that your wagon remains at that point or not. In other words,
    the probability for finding your wagon at point *B* is either 100% (“wagon is
    at *B*”) or 0% (“wagon is not at *B*”) since a measurement will always reveal
    a discrete (or “concrete”) result. But this is really strange when taking a closer
    look since the aforementioned probability distribution or wave function must disappear
    suddenly and change to either 100% or 0% in the moment of measurement. This is
    the famous *collapse of the wave function* that only occurs if someone watches
    you and measures your position. As soon as the observer stops watching you, the
    probability distribution instantly reappears and you are everywhere and nowhere
    at the same time again. This is quite inconceivable indeed and entirely unexpected
    from the classical physics point of view.


    A quantum mechanical roller coaster does reveal another mysterious behavior: when
    you calculate the wave function for your wagon, you will find that there is a
    realistic chance (technically called finite probability) for finding your wagon
    beyond point *D* that turned out to be insurmountable from a classical physics
    point of view. In other words, there is a certain probability for you to cross
    point *D* although you do not have enough energy to do so according to classical
    mechanics. In quantum mechanics, you can simply tunnel directly from point *C*
    to *E* across the hill, end up at point *E*, and continue your rough ride there
    as indicated by the dashed arrow in Figure [2-1](#505424_1_En_2_Chapter.xhtml#Fig1).
    This quantum mechanical phenomenon of crossing classically insurmountable energy
    barriers is called quantum tunneling or *tunnel effect* and is sometimes described
    in terms of quantum mechanical objects “going through closed doors.” Since its
    discovery by the French physicist Henri Becquerel in 1896, the tunnel effect has
    been observed in numerous experiments, such as the decay of radioactive atoms.


    Tunnel Effect


    Tunneling refers to a counterintuitive but natural phenomenon by which quantum
    mechanical objects, such as photons and electrons, cross an energy barrier although
    they do not have enough energy to do so according to classical physics.'
  trans: '

    ### 2.2.1 诡异的量子现实


    对于量子力学对象，例如电子和光子，这种情况彻底改变了，一切都变得不那么确定，反而相当模糊。这与量子力学的概率本质有关，这意味着一个量子力学对象的当前状态，只决定了该对象随时间演化为特定状态（或称“状况”）的概率（“可能性”或“机会”）。经典物理学的因果决定论和精确性，在量子力学中被*概率方法*所取代。这是包围我们的经典世界与描述包括光子和电子在内的最微小尺度自然界的量子力学之间，一个重大且真正惊人的区别。


    通过比较经典的过山车和虚构的量子力学版本，可以最好地阐明这一重大区别的后果。想象你正在最喜爱的游乐园里乘坐过山车。付了入场费后，你坐在心仪的车厢里，希望开始放松。在某个时刻，车厢离开起点，被电动机拉上斜坡。让我们用字母
    `A` 来表示第一个山坡顶点的高度，如图 2-1 所示。到达 `A` 点后，你的车厢将加速向下冲向过山车的最低点 `B`，然后开始攀登第二个山坡，朝向 `D`
    点。在半途中，你的车厢到达 `C` 点。根据经典力学（及其能量守恒定律），很容易推导出你永远无法到达任何比 `C` 更高的点，因为你没有足够的能量这样做——为简化起见，我们假定此时你的车厢没有任何电机拉动上坡。因此，你无法到达甚至越过
    `D` 点。这个第二道山坡在经典力学中因此被称为不可逾越的*能量势垒*。你在 `A` 点和 `C` 点之间的行驶完全是确定性的，例如，你到达 `B` 点的时间可以根据你的质量和起始时间以非常高的精度计算出来。


    `![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig1_HTML.png](img/505424_1_En_2_Fig1_HTML.png)`


    **图 2-1** 量子力学过山车的隧道效应解释（从 `C` 点到 `E` 点的虚线箭头，灰色车厢）


    现在想象你乘坐的是一辆虚构的量子力学过山车。在这种情况下，我们不能再使用经典力学来确定你骑行的即时演化。对于这样一个量子力学的过山车，你的乘坐体验彻底改变，旅程变得相当颠簸。好消息是，测量你的车厢是否离开了起点相当容易。但坏消息是，关于你的量子之旅，几乎没什么可说的了。一旦你离开了起点，实际上就不可能确定你在过山车上的确切位置，因为你的行驶不再是确定性的。因此，在不测量其位置的情况下，我们简直不知道你的车厢在某个特定时刻究竟在哪里。这种现象被称为*海森堡测不准原理*，是量子力学的核心。你的量子力学车厢的位置不能再以过山车上的单一位置来描述，而只能用一个（随时间变化的）位置分布来描述，每个位置对应不同的出现概率。这种分布被称为*波函数*，它为你的车厢在过山车上的每个位置分配一个特定的出现概率。换句话说，你在最低点
    `B` 的概率可能是 40%，而在 `C` 点的概率是 60%。无法根据你的起始时间或任何先前测量的位置来计算出你的车厢在量子力学过山车上的确切位置——你基本上同时存在于（以一定概率）任何地方，这是一种被称为*非定域性*的量子力学行为。这真的很奇怪，不是吗？


    **海森堡测不准原理**


    测不准原理是量子力学概率本质的直接后果，它指出一个量子力学对象的动量和位置（或能量和时间）无法同时被精确测量。


    当我或任何其他人——即所谓的*观测者*——通过用相机或光电屏障反复测量你的位置，从外部观察你时，情况就变得更加离奇了。外部观测者的单纯存在就会彻底改变你的乘车体验。例如，在
    `B` 点拍一张照片，要么确认你的车厢在那个点，要么确认不在。换句话说，找到你的车厢在 `B` 点的概率要么是 100%（“车厢在 `B` 点”），要么是
    0%（“车厢不在 `B` 点”），因为一次测量总会揭示一个离散（或“具体”）的结果。但仔细观察，这确实很奇怪，因为上述的概率分布或波函数必须在测量的瞬间突然消失，并变成要么
    100%要么 0%。这就是著名的*波函数坍缩*，它只会在有人观察你并测量你的位置时发生。一旦观测者停止观察你，概率分布立刻重新出现，你又同时无处不在又无处可寻。这确实相当不可思议，并且从经典物理学的角度来看完全出乎意料。


    量子力学过山车还揭示了另一种神秘行为：当你为你的车厢计算波函数时，你会发现存在一个真实的机会（技术上称为有限概率）能在 `D` 点之外找到你的车厢——而 `D`
    点从经典物理学角度看被证实是不可逾越的。换句话说，尽管根据经典力学你没有足够的能量，你仍有一定的概率越过 `D` 点。在量子力学中，你可以简单地直接隧道穿越，从
    `C` 点穿过山坡到达 `E` 点，最终到达 `E` 点，并在那里继续你颠簸的旅程，如图 2-1 中虚线箭头所示。这种穿越经典不可逾越能量势垒的量子力学现象被称为量子隧穿或*隧道效应*，有时也被描述为量子力学对象“穿过紧闭的大门”。自
    1896 年法国物理学家亨利·贝克勒尔发现以来，隧道效应已在无数实验中观察到，例如放射性原子的衰变。


    **隧道效应**


    隧穿指的是一种反直觉但自然的物理现象，量子力学对象（如光子和电子）虽然根据经典物理学没有足够的能量，但仍然能够穿越能量势垒。'
- fmt: '# 量子力学与薛定谔的猫


    我可以安抚你，如果你仍然犹豫是否接受这种量子怪诞性，因为你绝不是唯一一个这样想的人。甚至连阿尔伯特·爱因斯坦也无法相信量子力学的概率本质、外部观测者的决定性作用以及波函数的突然坍缩。这种对量子力学的解释自诞生以来一直挑战着人类的想象力，并在20世纪引发了维尔纳·海森堡、马克斯·玻恩和丹麦物理学家尼尔斯·玻尔之间的激烈讨论，他们首先提出了波函数的概率解释。他们的努力是首次对能量和物质在最微观尺度上的奇异而令人困惑的世界进行一般性理解的尝试，如今被称为*哥本哈根诠释*，以纪念这位奠基人的家乡。如今，哥本哈根诠释是量子力学中最常用的解释，因为其他竞争性解释，包括*隐变量理论*^([^(26)](#fn26))和*多世界诠释*^([^(27)](#fn27))，对我们的想象力提出了更大的挑战。为了论证和可视化哥本哈根诠释的奇异后果，围绕这种概率解释构建了各种思想实验，如今被称为*爱因斯坦-波多尔斯基-罗森悖论*（EPR悖论），并以三位争论的物理学家的名字命名[[6](#505424_1_En_2_Chapter.xhtml#Par202)]。EPR悖论中最著名且有些残酷的版本是*薛定谔的猫*。在他的著名思想实验中，德国物理学家埃尔温·薛定谔试图通过将一只坐在封闭盒子里的快乐猫的经典世界与猫旁边的放射性原子的量子力学行为联系起来，将量子力学的概率概念归结为荒谬。如果——按照他的想象——放射性原子衰变，它会发射一个光子，进而触发一个锤子打碎一小瓶致命气体，偶尔会杀死猫。换句话说，原子的放射性衰变导致薛定谔的猫死亡。如果你关上盒子，并通过以下论证问自己猫是死是活，悖论就出现了。我们知道，放射性原子的衰变是一个完全量子力学的、因此是概率性的过程。由于原子的状态和猫的生命通过释放毒气的锤子高度相互依赖，猫的健康状况也必须由一个概率性的波函数来描述。例如，考虑量子力学告诉我们，放射性原子在30秒后衰变的概率为50%。那段时间后猫的健康状况如何？它是活的、死的，还是可能介于两者之间？


    量子力学的答案非常简单且同样令人震惊：猫确实同时既死又活，各占50%的概率。然而，如果你——作为一个外部观察者——打开盒子往里看，描述其健康状况的猫的波函数会突然坍缩，我们将要么发现猫活着，要么发现猫死了，但显然不会同时处于两种状态。换句话说，打开盒子并目视检查（或测量）猫的健康状况会导致波函数瞬间坍缩。这有多奇怪？


    感谢后来的诺贝尔奖得主、英国物理学家保罗·狄拉克，有一种非常方便的数学方法可以描述猫的这种悲惨处境，值得解释清楚，以便我们稍后进一步讨论量子计算机。物理学家通常用所谓的*态矢量*来表示猫的健康状况，用符号`|
    cat 〉`表示，并将猫的两种经典可能状态称为*本征态*，分别用符号`| alive 〉`和`| dead 〉`表示。在保罗·狄拉克的符号中，薛定谔的猫的健康状况可以很容易地写成：


    ```

    | cat ⟩ = α ⋅ | alive ⟩ + β ⋅ | dead ⟩ .

    ```


    (2.1)


    这个方程表明猫的状态等于两个本征态`α ⋅ | alive ⟩`和`β ⋅ | dead ⟩`之和。`α`和`β`是0%到100%（或0.00到1.00）之间的任意数字，分别描述了猫活着和死去的概率。^([^(28)](#fn28))
    换句话说，如果`α`大于`β`，猫更可能活着，反之亦然。


    ## 测量


    测量过程在量子力学中起着至关重要的作用。测量或“观测”一个量子力学对象，会导致其波函数（即所有可能状态的概率分布）坍缩为一个单一状态。因此，测量量子力学对象的状态总是会揭示一个唯一且离散的结果，这是我们从经典物理学和周围世界中熟知的行为。


    在考虑猫的健康状况（或态矢量）随时间演化时，事情变得有趣起来，这种演化由著名的*薛定谔方程*描述。在不深入细节的情况下，这个方程告诉我们，方程[2.1](#505424_1_En_2_Chapter.xhtml#Equ1)中的两个*态振幅`α`和`β`*会随时间变化：`α`减小，而`β`相应增大，因为放射性原子衰变的概率随时间增加。换句话说，我们在打开盒子之前等待的时间越长，薛定谔的猫就越可能死去——这是另一个非常奇怪且违反直觉的量子现象。


    方程[2.1](#505424_1_En_2_Chapter.xhtml#Equ1)中的求和有时被称为两个本征态`| alive ⟩`和`| dead ⟩`的*叠加*或“干涉”。态的叠加是量子力学最基本的性质之一，也是量子计算机中使用的一个非常重要的资源。你可能实际上对经典物体的叠加非常熟悉。想想声波和现代降噪耳机。这种设备基本上会镜像周围的声波，将它们反转，并在传入声波和反转声波之间建立一个叠加态，使得最终的声音消失，外部噪音被抵消。


    ![图2-2 经典玻璃弹珠(a)和量子力学光子(b)的著名双缝实验的示意图。探测器屏幕上的轮廓显示玻璃弹珠有两个峰（顶部实黑线），而光子的情况是复杂的干涉轮廓（底部实黑线）](../images/505424_1_En_2_Chapter/505424_1_En_2_Fig2_HTML.png)


    **图2-2** 经典玻璃弹珠（a）和量子力学光子（b）的著名双缝实验的示意图。探测器屏幕上的轮廓显示玻璃弹珠有两个峰（顶部实黑线），而光子的情况是复杂的干涉轮廓（底部实黑线）


    ## 叠加原理


    叠加指的是量子力学原理，通过该原理，一个系统的两个或多个状态——很像你家浴缸里的水波——可以相加（“叠加”）形成系统的另一个量子状态。'
  raw: 'I can appease you if you are still hesitating to accept this quantum weirdness
    since you are certainly not alone. Even Albert Einstein could not believe in the
    probabilistic nature of quantum mechanics, the decisive role of an external observer,
    and the sudden collapse of the wave function. This interpretation of quantum mechanics
    is challenging human imagination ever since and was subject to intense discussions
    among Werner Heisenberg, Max Born, and the Danish physicist Niels Bohr in the
    20th century, who came up with the probabilistic interpretation of the wave function
    first. Their efforts were the first general attempt to understand the bizarre
    and confusing world of energy and matter on its smallest scale and are nowadays
    referred to as *Copenhagen interpretation* in honor of the founding father’s hometown.
    Today, the Copenhagen interpretation is the most frequently used interpretation
    of quantum mechanics since other rivaling interpretations including the theory
    of *hidden variables*^([^(26)](#fn26)) and the *many-worlds*^([^(27)](#fn27))
    interpretation are challenging our imagination even further. In order to demonstrate
    and visualize the bizarre consequences of the Copenhagen interpretation, various
    thought experiments have been constructed around this probabilistic interpretation,
    which are nowadays referred to as *Einstein-Podolsky-Rosen paradox* or EPR paradox
    and named after the three disputing physicists [[6](#505424_1_En_2_Chapter.xhtml#Par202)].
    The most popular and somehow brutal version of this EPR paradox is *Schrödinger’s
    cat*. In his famous thought experiment, the German physicist Erwin Schrödinger
    attempted to reduce the probabilistic notions of quantum mechanics to absurdity
    by relating the classical world of a happy cat sitting in a closed box to the
    quantum mechanical behavior of a radioactive atom next to the cat. If – by his
    imagination – the radioactive atom decays, it emits a photon, which in turn triggers
    a hammer to shatter a small flask of deadly gas that occasionally kills the cat.
    In other words, the radioactive decay of the atom causes Schrödinger’s cat to
    die. The paradox arises if you close the box and ask yourself whether the cat
    is alive or not by the following argument. The decay of the radioactive atom is
    an entirely quantum mechanical and thus probabilistic process as we know. Since
    the state of the atom and the life of the cat are highly interdependent through
    the hammer releasing a poisonous gas, the cat’s health condition must be described
    by a probabilistic wave function, too. Consider that quantum mechanics tells us
    that the radioactive atom has decayed after 30 s, for example, with a probability
    of 50%. What is the health condition of the cat after that time? Is it alive or
    dead or possibly something in between?


    The quantum mechanical answer is very simple and equally striking: The cat is
    indeed dead and alive at the same time with equal probabilities of 50% each. However,
    if you – as an external observer – open the box and have a look inside, the cat’s
    wave function describing its health condition suddenly collapses, and we will
    either find the cat alive or dead but obviously not both at the same time. In
    other words, opening the box and inspecting (or measuring) the health condition
    of the cat visually cause the wave function to collapse instantly. How strange
    is this?


    Thanks to the British physicist and later Nobel laureate Paul Dirac, there is
    a very convenient mathematical way of describing this miserable situation of the
    cat, which is worth explaining for clarity and our further discussion of quantum
    computers later on. Physicists generally denote the cat’s health condition by
    a so-called *state vector* denoted by the symbol | cat 〉 and call the two classically
    possible states of the cat *eigenstates*, denoted with the symbol | alive 〉 and
    | dead 〉, respectively. In Paul Dirac’s notation, the health condition of Schrödinger’s
    cat can easily be written as


    ![$$ \mid \mathrm{cat}\;\left\rangle =\alpha \cdot \mid \mathrm{alive}\;\right\rangle
    +\beta \cdot \mid \mathrm{dead}\;\Big\rangle . $$](images/505424_1_En_2_Chapter/505424_1_En_2_Chapter_TeX_Equ1.png)


    (2.1)


    This equation says that the state of the cat is equal to the sum of the two eigenstates
    *α* ⋅  ∣ alive 〉 and *β* ⋅  ∣ dead〉. *α* and *β* are two arbitrary numbers between
    0% and 100% (or 0.00 and 1.00) and describe the probability for the cat being
    alive and dead, respectively.^([^(28)](#fn28)) In other words, if *α* is larger
    than *β*, the cat is more likely to be alive and vice versa.


    Measurement


    The measurement process plays a crucial role in quantum mechanics. Measuring or
    “observing” a quantum mechanical object, namely, causes its wave function, that
    is, the probability distribution of all possible states, to collapse to a single
    state. Hence, measuring the state of a quantum mechanical object will always reveal
    a unique and discrete outcome, a behavior we well know from classical physics
    and the world around us.


    Things get interesting when considering the timely evolution of the cat’s health
    condition (or state vector), which is described by the famous *Schrödinger equation*.
    Without going into any details, this equation tells us that the two *state amplitudes
    α* and *β* in Equation [2.1](#505424_1_En_2_Chapter.xhtml#Equ1) will change over
    time: *α* decreases, while *β* increases accordingly since the probability for
    the radioactive atom to decay increases over time. In other words, Schrödinger’s
    cat is more likely to be dead the longer we wait prior to opening the box – another
    very weird and counterintuitive quantum phenomenon.


    The sum in Equation [2.1](#505424_1_En_2_Chapter.xhtml#Equ1) is sometimes called
    *superposition* or “interference” of the two eigenstates | alive 〉 and | dead
    〉. Superposition of states is one of the most fundamental properties of quantum
    mechanics and a very important resource used in quantum computers. You may actually
    be very familiar with the superposition of classical objects. Just think about
    sound waves and modern noise-cancelation headsets. Such devices basically mirror
    the surrounding sound waves, invert them, and build a superposition between the
    incoming and inverted sound signals such that the resulting sound vanishes and
    the outer noise is canceled.


    ![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig2_HTML.png](images/505424_1_En_2_Chapter/505424_1_En_2_Fig2_HTML.png)


    Figure 2-2


    Schematic setup of the famous double-slit experiment for classical glass mumbles
    (a) and quantum mechanical photons (b). The profile on the detector screen reveals
    two peaks for glass mumbles (solid black line on the top) and a complicated interference
    profile in case of photons (solid black line on the bottom)


    Superposition Principle


    Superposition refers to the quantum mechanical principle, by which two or more
    states of a system – much like water waves in your bathtub – can be added together
    (“superposed”) to form another quantum state of the system.'
