  trans: '

    ## 5.2 选择合适的技术栈


    一旦确定了数字业务和运营模式的基石，选择最合适的技术栈来完美支撑它们就显得尤为重要，因为每种数字技术都有其特定的优势和劣势，这决定了其适用于特定的商业构想。图
    5-3 初步比较了这三种技术在数字化转型八个关键领域上的表现。该图仅提供粗略指导，并突显了本书介绍的三种数字技术之间的一些差异——其所涵盖的领域和呈现方式当然并非详尽无遗。


    ![../images/505424_1_En_5_Chapter/505424_1_En_5_Fig3_HTML.png](img/505424_1_En_5_Fig3_HTML.png)


    图 5-3


    数字属性蛛网图，以低到高的等级评估不同支撑技术对数字化转型选定领域的相对影响


    但无论你打算使用哪种数字技术栈，你都可以考虑 (1) 在内部建立自己的数字能力，或 (2) 与外部合作伙伴和云计算供应商合作。如果你的目标是在中长期内将内部的数字专长作为竞争优势，那么第一种选择最佳。否则，最佳选择是订阅外部的云计算服务，这在大多数情况下耗时更少，投入也更少。


    ### 云计算


    `云计算`指的是一种主动管理的可配置计算资源池，包括可通过互联网按需访问的硬件和软件应用程序。


    `云计算`在第一章“数字化与数字化转型”中已有简要介绍，通常指可通过互联网按需访问的计算硬件和软件基础设施。它基于一种名为`虚拟化`的技术，该技术于 1970
    年首次随 IBM 的 `CP-40` 操作系统发布[18]。`虚拟化`允许从可与他人共享的物理硬件系统中模拟出（私有或公共）环境或“分区”，其中包括专用的计算处理能力、网络和存储。美国国家标准与技术研究院将云计算定义为“一种模型，用于实现无处不在、便捷、按需的网络访问，访问一个共享的可配置计算资源池（例如网络、服务器、存储、应用程序和服务），这些资源可以以最少的管理成本或服务提供商交互快速配置和释放”[19]。租用由第三方提供、管理并让用户访问的计算资源这一想法在当时确实具有革命性，因此云计算很快成为价值数十亿美元的业务也就不足为奇了。云计算服务通常分为四大主要服务类别，在订阅特定供应商时，考虑这些类别非常重要。它们在客户的技术参与度和自主性方面有所不同，如图
    5-4 所示，并解释如下：


    ![../images/505424_1_En_5_Chapter/505424_1_En_5_Fig4_HTML.jpg](img/505424_1_En_5_Fig4_HTML.jpg)


    图 5-4


    云计算服务的四种基本服务类别模型，即：基础设施即服务、平台即服务、软件即服务和业务流程即服务


    1. `基础设施即服务` 或 `IaaS` 是客户自主性最高的最低服务层级。`IaaS` 包含所有基础设施构建块，例如数据服务器、存储、网络和虚拟机。^(¹³⁷)
    所有资源均由云供应商按需提供，并按使用量付费的定价模式交付。


    2. `平台即服务` 或 `PaaS` 提供即用型硬件基础设施和软件开发工具，使用户能够构建、测试和部署自己的云应用程序——此服务类别中的所有计算资源也由相应的云供应商进行管理和维护。


    3. `软件即服务` 或 `SaaS` 是第三个服务层级，指托管云基础设施，按需为用户提供完全开发好的软件应用程序以及所需的硬件。用户只需通过网络浏览器登录，上传待处理的数据，便可在供应商的软件和硬件栈上使用不同的应用程序来进一步处理和分析数据。此服务类别对于无法自行构建软件、硬件和人员等资源的用户尤其有吸引力。


    4. `业务流程即服务` 或 `BPaaS` 允许完全外包独立的业务流程，例如薪资管理（包括工资单录入和法律申报）和支付流程。此服务类别专为不喜欢建立内部数字能力并希望完全外包特定业务流程的公司而设计。


    除了这些服务类别之外，云计算服务在其所有权模型方面也有所不同，通常分为所谓的公有云和私有云。`公有云`基础设施向公众开放，任何人都可以使用，而`私有云`则仅为单一组织的利益所拥有和运营。在实践中，组织通常实施结合了两种所有权模型优势的`混合云`。最流行且市场领先的公有云供应商包括
    `AWS`、`Microsoft Azure`、`IBM Cloud`、^(¹³⁸) 和 `Google Cloud`。它们的服务组合不断扩展，包括计算能力、数据库存储和应用程序等资源，还包括量子计算、区块链技术和人工智能。它们的服务在性能、价格和应用多样性方面各不相同，这就是为什么大多数组织会使用多个云供应商，以从各自的最佳产品和服务中受益，同时避免`供应商锁定`，即依赖单一的云计算提供商。与外部云计算供应商合作相比在内部构建自己的计算资源，通常有三个主要优势：


    1. `性能`：云计算服务的卓越性能源于超级计算机在大型数据中心中的协同集中效应。由于其频繁的硬件和软件更新，云服务在网络攻击或组织 IT 系统其他故障后能提供非常可靠的灾难恢复机制。


    2. `敏捷性`：云计算服务非常灵活，因为它们可以根据计算需求的增减进行扩展或缩减，这一特性被称为`超大规模`。一些供应商在此背景下常将其服务称为`弹性云`，以强调其服务能动态确定所需资源量，并自动相应地配置云基础设施。

    '
- fmt: '### 3. *Cost*: In contrast to building up your own digital in-house capabilities,
    cloud computing services do also allow you to benefit from massive economies of
    scale by reducing required upfront investments for hardware and software. They
    may also reduce the total cost of ownership of your hardware and software infrastructure
    under certain conditions. This is why cloud computing is particularly beneficial
    for smaller companies that do not have enough financial and human resources to
    maintain their own data centers.


    Most cloud computing vendors offer elaborately made web interfaces that allow
    for an easy configuration of the IT infrastructure and fast customization of tools
    for a particular use or business case. The development of more advanced software
    tools and applications does, however, require profound knowledge about some of
    the most common and mainly open source programming languages in data science,
    such as `Python`^([^(139)](#fn139)) and `R`. The different commands available
    in programming languages are often grouped together in certain packages and libraries
    for convenience. The most important packages that can be used to implement the
    three digital technologies introduced in this book in your own organization are
    shown in Table [5-1](#505424_1_En_5_Chapter.xhtml#Tab1) for your reference.


    ## 5.3 Digitize the Core


    The selected technology stack provides the underpinning technologies to digitally
    transform the *core* of an organization. According to the “context vs. core” model^([^(140)](#fn140))
    proposed by the American business strategist and consultant Geoffrey Moore, the
    core is what creates a competitive advantage, differentiation in the market, and
    ultimately wins and retains customers. Context consists of everything else including
    finance, sales, and marketing. In his book entitled *Dealing with Darwin* [[24](#505424_1_En_5_Chapter.xhtml#Par163)],
    Geoffrey Moore illustrates this concept exemplarily by referring to the American
    golf champion Tiger Woods. Tiger Woods’ core business is golfing, and his context
    business is marketing. While marketing generates money, there is no marketing
    (the context) without golfing (the core).


    One aspect of digital transformation is about digitizing the core of an organization
    by leveraging an appropriate digital technology stack. This is probably the most
    difficult transformational step for incumbent organizations from a technical point
    of view as it requires rearchitecting the entire IT infrastructure including hardware
    and software. Incumbent organizations typically use numerous IT and legacy systems
    that have evolved over time and meet the specific requirements of different business
    units, such as finance, research and development, production, and human resources.
    Since those business units are typically only loosely connected to each other,
    the overall IT infrastructure of large enterprises often resembles a siloed and
    poorly structured data architecture.


    **Table 5-1** The most important Python packages and libraries for data science,
    quantum computing, blockchain technology, and artificial intelligence


    | Digital Technology | Library Website | Package Description |

    | --- | --- | --- |

    | General Data Science | [`www.numpy.org/`](http://www.numpy.org/) | `NumPy` is
    a standard package for big data analysis and scientific computing that allows
    to define sophisticated arrays of numbers |

    | | [`www.pandas.pydata.org/`](http://www.pandas.pydata.org/) | `Pandas`, the
    “Python Data Analysis Library,” provides numerous tools for big data analysis
    and manipulation |

    | | [`www.matplotlib.org/`](http://www.matplotlib.org/) | `Matplotlib` is a comprehensive
    library for plotting and visualizing data. It is often used in conjunction with
    NumPy and Pandas |

    | Quantum Computing | [`www.qutip.org/tutorials.html/`](http://www.qutip.org/tutorials.html/)
    | `QuTip` is an open source quantum toolbox for simulating the dynamics of open
    quantum systems |

    | | [`www.qiskit.org/`](http://www.qiskit.org/) | `Qiskit` is an open source library
    for the implementation of quantum computing software for research, education,
    and business |

    | | [`www.tensorflow.org/quantum/`](http://www.tensorflow.org/quantum/) | `TensorFlow
    Quantum` is one of the latest libraries that has been released by Google’s research
    team in 2020 and allows for rapid prototyping of quantum machine learning algorithms
    |

    | Blockchain Technology | [`www.pypi.org/search/?q=blockchain/`](http://www.pypi.org/search/%253Fq%253Dblockchain/)
    | `PyPi blockchain` provides various tools for the implementation of a blockchain
    or coin |

    | Artificial Intelligence | [`www.tensorflow.org/`](http://www.tensorflow.org/)
    | `TensorFlow` was developed by the Google Brain team in 2015 for experienced
    experts and allows for the easy implementation of machine learning algorithms
    including artificial neural networks |

    | | [`www.pytorch.org/`](http://www.pytorch.org/) | `PyTorch` is an open source
    machine learning library used that was released by Facebook in 2016 for the first
    time |

    | | [`www.keras.io/`](http://www.keras.io/) | `Keras` was released by Microsoft
    in 2015 as an open source library for beginners that allows for building, inter
    alia, convolutional neural networks |'
