    ### 5.6.2 塑造组织与结构：建立双速 IT


    推进数字议程中的各项举措和试点项目，需要一个敏捷的 IT 部门及基础设施，以满足敏捷项目团队的期望和需求。这一点尤为重要，因为传统的 IT 支持通常会拖慢敏捷项目的创新周期。但一个传统组织应如何构建其
    IT 部门，使其既能运营养老业务，又能同时支持数字试点项目呢？


    事实证明，实现这一目标的最佳组织结构是*双速 IT*，这一组织方法由著名管理咨询公司麦肯锡于 2014 年提出 [51]。双速 IT 基于两个并存但侧重点不同的
    IT 团队：（1）慢速后端和（2）快速前端。慢速后端或*工业速度团队*专注于成熟运营和业务流程（如物流运营、支付和银行服务），提供运营养老业务所需的 IT
    产品和服务。其服务设计以稳定性和高质量数据管理为目标。而快速前端或*数字速度团队*则专门支持数字试点项目，并为尝试尚未在养老业务中应用的新型数字技术提供资源和支持，如表
    5-2 所示，以便进行更好比较。工业速度团队的工作方式基本与传统 IT 部门相同，而数字速度团队则以敏捷方式运作，实现基于客户反馈的快速迭代和测试。


    双速 IT 仅作为数字化转型的临时组织结构。组织最终应推动两个团队的融合，建立一个统一的 IT 部门，使其以数字速度团队的速度运转，并能根据需求灵活交付硬件和软件解决方案，同时与已建立的数字运营模式保持一致。这只有通过培养并反复强化开放的创新文化才能实现，我们将在下一节中更详细地讨论这一点。


    表 5-2


    双速 IT 运营模式中两个并存 IT 团队的比较


    |  | 慢速后端 | 快速前端 |

    | --- | --- | --- |

    | 重点 | 养老业务 – 支持并赋能成熟的核心理念运营，如物流和生产 | 试点项目 – 支持敏捷软件开发，推动数字技术实验 |

    | 方法 | 瀑布式方法，软件开发按顺序从概念到测试，每个阶段由不同团队负责 | 基于敏捷软件开发方法（包括 Scrum、快速原型设计和设计思维）的实验性“测试与学习”方法
    |

    | 团队 | 专业专家，任务狭窄且清晰 – 此类工作通常为孤岛式 | 高度跨学科，成员背景多样化，例如商业、客户研究、软件与应用开发等 |


    ### 5.7 建立开放创新文化


    建立敏捷开放的业务文化对于成功完成数字化转型至关重要。在此背景下，*业务文化*一词指的是组织通过创新为客户和员工创造价值的集体能力，这也是为何在此特定语境中它有时被称为*创新文化*。受麻省理工学院社会学家埃德加·沙因（组织文化领域世界顶尖学者之一）的启发，克莱顿·克里斯滕森将这一组织的核心组成部分定义如下：“文化是一种朝着共同目标协同工作的方式，这种方式被如此频繁且成功地遵循，以至于人们甚至不会考虑尝试其他方法。如果文化已经形成，人们会自主地做他们需要做的事情来获得成功”
    [52]。换言之，文化是内部规则和工作流程的独特组合，使员工能够完成日常工作中频繁出现的特定任务。他们成功解决任务的次数越多，工作流程就越本能化。因此，业务文化并非一蹴而就，而是通过反复重复形成的。要成功建立一种新的业务文化，仅仅传达文化是什么是不够的。相反，组织的管理层——作为员工的榜样——需要遵循这种文化，并通过做出与之一致的决策和优先安排项目来不断强化它。在转型传统文化并建立新创新文化时，这是一个需要牢记的重要点。


    #### 5.7.1 建立开放创新文化：大规模采用敏捷


    传统业务文化最适合成熟的业务流程和开发现有收入来源，而数字创新文化则最擅长基于数字技术探索新流程并创造新收入来源。开放创新文化培养了一种更加敏捷、协作和一体化的创新方法，具有强烈的以客户和产品为中心的观点。数字文化不依赖顺序化、僵化且通常缓慢的产品开发流程，而是培养新想法的涌现，并通过基于客户反馈采用更少线性、更迭代的产品开发方法，赋能员工更快地交付成果。在整个公司范围内使用敏捷方法论——有时被称为*大规模敏捷*
    [57]——因此本身并非目的，而是达成目标的手段。


    此外，开放创新文化通过给予员工自由和空间来探索新颖想法（这与弗雷德里克·赫茨伯格的著名激励理论一致^(¹⁴⁸) [53]）来激励他们。埃里克·施密特、乔纳森·罗森伯格和艾伦·伊格尔曾在此背景下指出：


    > 你需要……超越“传统的（员工）管理观念，即侧重于控制、监督、评估和奖惩”，以营造一种沟通、尊重、反馈和信任的氛围。……在快速变化、竞争激烈、技术驱动的商业世界中，成功的道路在于组建高绩效团队，并给予他们资源和自由去成就伟业
    [46]。^(¹⁴⁹)


    ![../images/505424_1_En_5_Chapter/505424_1_En_5_Fig6_HTML.jpg](img/505424_1_En_5_Fig6_HTML.jpg)


    图 5-6


    迭代设计思维过程的五个步骤（灰色圆圈）

