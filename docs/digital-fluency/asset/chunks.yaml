    \ transformation regards eight key dimensions:\n    1.  Envisioning a digital\
    \ business and operating model\n\n    2.  Selecting an appropriate technology\
    \ stack and platform\n\n    3.  Digitizing the business core\n\n    4.  Identifying\
    \ scalable pilot projects\n\n    5.  Empowering employees\n\n    6.  Shaping the\
    \ company structure and organization\n\n    7.  Establishing an open innovation\
    \ culture\n\n    8.  Leveraging the ecosystem and engaging with customers\n\n\
    ## 5.10 Further Reading\n\nAt the end of this chapter, I would like to provide\
    \ you with some recommendations for further reading if you like to dive deeper\
    \ into digital business and operating models, agile methodologies, open innovation\
    \ cultures, and other related topics:\n\n*   Nadella, S. *et al.*: Hit Refresh:\
    \ The Quest to Rediscover Microsoft’s Soul and Imagine a Better Future for Everyone.\
    \ Harper Business (2017).\n\n*   Frankenberger, K. *et al.*: The Digital Transformer’s\
    \ Dilemma: How to Energize Your Core Business While Building Disruptive Products\
    \ and Services. Wiley (2020).\n\n*   Weill, P. and Woerner, S. L.: What’s Your\
    \ Digital Business Model? Six Questions to Help You Build the Next-Generation\
    \ Enterprise. Harvard Business Review Press (2018) – a free webinar that covers\
    \ various aspects of this book is available online on [`https://hbr.org/webinar/2018/03/building-your-digital-business-model/`](https://hbr.org/webinar/2018/03/building-your-digital-business-model/).\n\
    \n*   Orban, S. *et al.*: Ahead in the Cloud: Best Practices for Navigating the\
    \ Future of Enterprise IT. CreateSpace Independent Publishing Platform (2018).\n\
    \n*   Reeves, M. *et al.*: Your Strategy Needs a Strategy: How to Choose and Execute\
    \ the Right Approach. Harvard Business Review Press (2015).^([^(151)](#fn151))\n\
    \n*   Ries, E.: The Lean Startup: How Today’s Entrepreneurs Use Continuous Innovation\
    \ to Create Radically Successful Businesses. Currency (2017).\n\n*   Brown, T.:\
    \ Change by Design: How Design Thinking Transforms Organizations and Inspires\
    \ Innovation. HarperCollins (2009)."
  trans: "\n最终，我认为数字化转型为任何在私营和公共部门运营的组织都提供了多种机遇。量子计算、区块链技术和人工智能等数字技术的出现，正在为思想领袖们提出要求，促使他们拥抱数字技术的全部潜力，以重新调整组织，为我们面前的数字未来做好准备。数字化转型及其支撑技术为所有组织提供了宝贵且同样独特的机遇，使其能够使自己的产品和服务脱颖而出，并抵御日益增多的竞争对手。\n\
    \n我希望本书中提出的概念和框架能激发新的想法和数字思维，并帮助您成功完成自己的数字化转型之旅。最好的数字技术——可以肯定地说——尚未到来。\n\n## 关键要点\n\
    \n-  最成功的商业模式围绕客户需要完成的任务进行整合，并旨在通过利用持续性/颠覆性创新及相关技术，随着时间的推移，将这项任务做得越来越好。在此背景下，客户旅程有助于根据客户的特定需求定制产品或服务。\n\
    \n- 选择支持数字业务和运营模式的最佳技术栈，通常涉及选择云计算供应商。最受欢迎的供应商是亚马逊云服务、微软 Azure 和谷歌云。它们的服务通常分为四大类，即：(1)\
    \ 基础设施即服务、(2) 平台即服务、(3) 软件即服务和 (4) 业务流程即服务，具体取决于客户的参与程度。\n\n- 通过利用技术栈数字化企业或组织的核心，是关于创建支持内部流程的适当\
    \ IT 基础设施。对于成熟的组织而言，此过程通常涉及将分散在孤岛中的数据收集、清理、规范化并集成到一个集成的数据平台中，以便于在整个组织中轻松共享和分析大数据。\n\
    \n- 成功的试点项目是围绕一个具体的（业务）问题或目标构建的。它们具有可扩展性，并旨在通过快速取胜来在组织内部激发对数字化转型的热情。\n\n- 通过教育和培训赋能员工，涉及培养从敏捷方法到数字营销和编程技能等跨学科能力。这些不同的举措旨在创建一种数字思维模式，使人们能够评估和预测数字技术对组织和社会的影响。\n\
    \n- 重新思考和塑造组织结构尤为重要，因为公司无法自我颠覆。因此，孵化器模式和双速 IT 已被证明在运行数字试点项目方面特别成功。\n\n- 建立以强大的客户和产品为中心观点的开放式创新文化，是任何数字化转型的核心。设计思维可能有助于有目的地开发围绕客户需要完成的任务的新产品和服务。\n\
    \n- 利用组织的生态系统与客户互动，对于迭代优化产品和服务至关重要。与生态系统中其他参与者的合作与伙伴关系有助于吸引新人才并快速拓展数字业务。\n\n-\
    \ 数字化转型涉及八个关键维度：\n    1.  构想数字业务和运营模式\n    2.  选择适当的技术栈和平台\n    3.  数字化业务核心\n\
    \    4.  确定可扩展的试点项目\n    5.  赋能员工\n    6.  塑造公司结构和组织\n    7.  建立开放式创新文化\n    8.\
    \  利用生态系统并与客户互动\n\n## 延伸阅读\n\n在本章末尾，如果您想更深入地了解数字业务和运营模式、敏捷方法、开放式创新文化以及其他相关主题，我想为您提供一些进一步阅读的建议：\n\
    \n- 纳德拉，S. 等：《刷新：重新发现微软的灵魂，为所有人设想一个更美好的未来》。哈珀商业出版社（2017 年）。\n\n- 弗兰肯伯格，K. 等：《数字转型者的困境：如何为核心业务注入活力，同时打造颠覆性产品和服务》。威利出版社（2020\
    \ 年）。\n\n- 韦尔，P. 和沃纳，S. L.：《你的数字商业模式是什么？六个问题助你打造下一代企业》。哈佛商业评论出版社（2018 年）——本书涵盖多个方面的免费网络研讨会可在以下网址在线观看：[`hbr.org/webinar/2018/03/building-your-digital-business-model/`](https://hbr.org/webinar/2018/03/building-your-digital-business-model/)。\n\
    \n- 奥尔班，S. 等：《云端领先：驾驭企业 IT 未来最佳实践》。CreateSpace 独立出版平台（2018 年）。\n\n- 里夫斯，M. 等：《你的战略需要一个战略：如何选择并执行正确的方法》。哈佛商业评论出版社（2015\
    \ 年）。（[151]()）\n\n- 里斯，E.：《精益创业：当今企业家如何运用持续创新创造 radically 成功的企业》。货币出版社（2017 年）。\n\
    \n- 布朗，T.：《设计改变一切：设计思维如何变革组织并激发创新》。哈珀柯林斯出版社（2009 年）。\n"
