  trans: '

    ### 1.3.1 主要驱动力


    数字化颠覆是一股非常强大的力量，自出现以来一直在改变着企业格局。当今的组织不仅被推动着将数字技术整合到其核心流程中，如今也频繁地发现自己要与本行业之外的创新型新参与者竞争，例如汽车制造商和出行服务提供商
    [28]。随着汽车互联程度日益提高，传统汽车制造商的商业模式正受到数字商业模式的威胁，这些商业模式为按需娱乐和信息娱乐服务提供市场。这两种功能正越来越多地嵌入到汽车生态系统中，例如，针对在途自动驾驶汽车的驾驶员和乘客——可以说，汽车变成了一个“车轮上的智能手机”
    [29]。出行服务提供商 `Uber`、`Lyft`、`DiDi` 和 `Waymo`，以及由 `Google Automotive Services` 提供的（开源）汽车操作系统，只是为高度互联和面向服务的驾驶体验指明方向的几家公司。正因如此，预计软件平台提供商未来将在汽车行业中占据越来越核心的位置，并有望连接和“协调”传统上各自为战的参与者。汽车行业的这一转型预计还将影响到相关的商业领域，包括保险公司、车辆维修保养提供商、（充电）基础设施提供商、执法机构，以及依赖汽车税收等其他政府机构。哈佛商学院的三位经济学家罗伯特·博克、马尔科·扬西蒂和卡里姆·拉哈尼最近的一项研究表明，那些拥抱数字技术以创新商业模式的“数字领导者”，其运营利润率和利润比“数字落后者”高出超过一个数量级
    [30]。换句话说，及早进行正确的技术投资，将为日后带来更高的盈利能力和收入增长 [31]。那么，这场转型的主要驱动力是什么？为了充分发挥数字技术的潜力，我们需要了解它们的哪些方面？最重要的几个驱动力如图
    1-3 所示，并将在下文依次进行解释。


    ![../images/505424_1_En_1_Chapter/505424_1_En_1_Fig3_HTML.png](img/505424_1_En_1_Fig3_HTML.png)


    **图 1-3** 外部驱动力（浅灰色）与数字化转型的四大支柱（深灰色）


    #### 主要驱动力：复杂性


    复杂性可能是最强大的驱动力之一，并且有多种催化剂。它尤其受到以下因素的驱动：(1) 个性化，即营销的终极目标，旨在为客户提供量身定制的产品体验；(2) 全球化及其日益复杂的供应链，包含众多的供应商和合作伙伴；(3)
    数字化以及决策中需要考虑的数据量不断增加。关于个性化以及日益多样化的产品和服务，`Netflix` 的传播总监乔里斯·埃弗斯在 2013 年向《纽约时报》巧妙地总结道：“有
    3300 万个不同版本的 `Netflix`” [32]，这意味着每位用户的客户体验都变得越来越个性化，并针对个人需求量身定制。


    #### 主要驱动力：敏捷性与灵活性


    在一个日益全球化的世界里，要在高度动态和快速变化的商业环境中取得成功，需要具备内部业务流程的敏捷性、灵活性和速度。例如，敏捷的产品开发流程对于缩短开发周期、满足客户的期望至关重要，客户期望频繁的更新以及将他们的反馈快速整合到现有产品和服务中。


    #### 主要驱动力：网络安全


    网络安全关乎保护对组织竞争优势至关重要的数据（如知识产权和客户数据）免遭盗窃或损害。在数字时代，这一点越来越重要，因为数据不再局限于封闭的数据库和遗留系统，而是可以无阻碍地在网络中流动。仅靠高标准的网络安全本身不太可能赚大钱，但糟糕的网络安全可能会给组织带来大量的时间、金钱和麻烦。这方面最著名的例子之一是“`WannaCry`”程序，该程序于
    2017 年春季侵入了全球 150 个国家的众多组织。该程序通过电子邮件传播，锁定计算机，并要求用户支付一定金额才能解锁设备——此次网络攻击造成的经济损失估计约为
    40 亿美元。网络攻击对个人、企业和政府而言是快速增长的风险，会造成财务和声誉损害。因此，IT 安全市场以每年 10% 的速度增长也就不足为奇了。但遗憾的是，这种增长并未跟上威胁数量的增长，后者大约每年翻一番——这是指数级技术增长与线性业务反应之间不匹配的又一个例子。


    #### 主要驱动力：效率


    效率是一种自始至终都在塑造组织的趋势。它通常描述避免浪费资源的能力，包括材料、能源、精力、金钱和时间。*效率原则*是一项经济信条，指出当企业以尽可能低的成本生产其产品和服务时，其效率最高。由于数字技术也可以通过简化内部流程来节省资金，效率几乎是组织数字化转型的一种自然驱动力。


    #### 主要驱动力：自动化


    自动化指的是通过自动化生产流程来提高生产力。这包括通过智能的、具有环境感知能力的机器人实现工业制造的自动化，也包括物流和库存管理系统等更偏行政性流程的自动化。行政流程自动化的一个例子是，在满足特定合同条件（例如，公司仓库收到货物）时自动执行付款。


    #### 主要驱动力：可持续性


    可持续性指的是对有限（自然）资源的最佳利用。这一驱动力涵盖从避免浪费到最大限度地减少对环境有害的排放，并依赖于优化材料和能源消耗流程。一个例子是电动出行，它有助于在纯电动汽车的生产和运营过程中减少对环境有害的排放。

    '
- fmt: '#### Major Driving Forces: Connectivity


    From a customer’s point of view, connectivity on the customer side refers to fully
    connected products and services that are developed by previously disparate players.
    Just think about `Google Maps` and `Apple CarPlay` that are embedded in automobile
    navigational and entertainment systems, respectively. From a company point of
    view, connectivity may also refer to adding and interconnecting more and more
    digital devices to a manufacturing infrastructure to implement predictive maintenance
    or an industrial Internet of things for automating production processes. Hence,
    connectivity may refer to technological trends internal and external to an organization.


    #### Major Driving Forces: Compliance


    For organizations in highly regulated ecosystems, a transparent management of
    safety- and quality-relevant information is a critical component of compliance
    and risks associated with misconduct. Requirements for documenting certain business
    processes, such as the production of safety-relevant airbags for vehicles, permeate
    organizations because of legal regulations and internal best practices that force
    organizations to improve operational excellence, organization, clarity, transparency,
    and accountability. Digital technologies can help to, for example, create information
    transparency, enhance traceability along the entire value chain, and document
    business processes completely and immutably.


    The increasing connectivity and complexity of ecosystems is inherently linked
    to another term that continues to attract great attention in media today. What
    is meant is the term big data. `Big data` refers to the systematic collection
    and analysis of datasets that are too large or complex to be dealt with by traditional
    information-processing technologies. The term first appeared in a 1997 paper written
    by the two NASA researchers Michael Cox and David Ellsworth, who wrote: “[D]ata
    sets are generally quite large, taxing the capacities of main memory, local disk,
    and even remote disk. We call this the problem of big data” [[33](#505424_1_En_1_Chapter.xhtml#Par236)].
    Accelerated by the debuts and steep rise of Facebook in 2004 and YouTube in 2005,
    the era of 24/7 consumption and creation of data by smartphones and other mobile
    devices had begun. The monthly data traffic through the World Wide Web increases
    ever since and reached 20 billion gigabytes per month in 2010. Four years later,
    the number of mobile connections reached 7.22 billion and thus exceeded the number
    of humans on earth for the first time according to the GSMA report [[34](#505424_1_En_1_Chapter.xhtml#Par237)].
    In 2018, people from around the globe uploaded more than 400 hours of videos on
    YouTube every minute. Furthermore, they sent about 156 million emails and posted
    more than 452,000 tweets per minute worldwide in the same year, which corresponds
    to a daily increase of data by more than 1 zettabyte or `10^(21)` bytes of data^([^(14)](#fn14))
    – a truly breathtaking example for big data.


    The analysis of big data generally requires the use of statistical methods to
    extract information with a relevant business impact and economic value. Big data
    is generally characterized by three Vs, namely, volume, velocity, and variety.
    `Volume` simply refers to the amount of data, while `velocity` refers to the speed
    at which the data is generated. The `variety` characterizes the availability of
    different data formats, such as text, audio, video, and other types of data.^([^(15)](#fn15))


    From a strategic point of view, big data can be a long-lasting competitive advantage
    if data breaches and misuse are avoided rigorously. Earning and maintaining the
    trust of customers are at the heart of data-centric and digital technology-driven
    companies. What this means has been described in a popular *New York Times* article
    published in 2012 with the title “How Companies Learn Your Secrets” [[35](#505424_1_En_1_Chapter.xhtml#Par238)].
    The journalist narrates the story of a father who went to his local grocery store
    complaining that his teenage daughter was strangely receiving coupons for baby
    products. The store manager apologized and then called a few days later to apologize
    again, only to learn that the daughter is actually pregnant. You can imagine that
    the store ended up losing the daughter as a customer irretrievably.


    #### Big Data


    Big data refers to a large and diverse set of data that is collected by organizations
    on a daily basis and can be mined for valuable insights and information providing
    a value add. It is described in terms of its (1) volume or size, the (2) velocity
    or speed at which it is created and collected, and the (3) variety or scope of
    the data points being covered.'
