- fmt: '# Cryptographic Hash Functions and Blockchain Structure


    Cryptographic hash functions are crucial for both constructing the individual
    blocks of a blockchain and linking them together to a large blockchain file. This
    process is based on applying them to transaction messages iteratively and arranging
    the resulting output values in a special data structure called *Merkle tree* in
    honor to the American computer scientist Ralph Merkle, who developed them for
    applications in digital signatures in 1988 [[10](#505424_1_En_3_Chapter.xhtml#Par212)].
    Merkle trees are hierarchic structures that are usually represented as upside-down
    trees with the transaction messages being at the bottom level as shown in Figure
    [3-2](#505424_1_En_3_Chapter.xhtml#Fig2) schematically. In this particular example,
    block two contains four transactions on its lowest level – a typical Bitcoin block
    usually contains about 500 transactions in total. The second level of this exemplary
    Merkle tree is built up by applying the cryptographic hash function to the plaintext
    of each transaction in a process called *hashing* for obvious reasons. The results
    are denoted by `Hash4`, `Hash5`, `Hash6`, and `Hash7`.


    ![../images/505424_1_En_3_Chapter/505424_1_En_3_Fig2_HTML.png](images/505424_1_En_3_Chapter/505424_1_En_3_Fig2_HTML.png)


    Figure 3-2


    Overall data structure of an exemplary section of a blockchain. The information
    contained in the header is highlighted in dark gray – block 1 is the genesis block
    of the blockchain, the first block without any reference to a previous one. The
    Merkle root of "Block 2" corresponds to the hash value of the Merkle tree that
    contains the information about all transactions of this block. Gray arrows represent
    the successive application of the hash function (microprocessor icon) on the four
    different levels denoted as "#1" to "#4" (dashed lines)


    The third level is created by applying this algorithmic function again. But this
    time, it is not applied to the plaintext of each transaction message but rather
    to a pair of hashed transaction messages that are combined to one string, that
    is, `Hash4` and `Hash5` as well as `Hash6` and `Hash7`, respectively. The resulting
    output is labeled as `Hash45` and `Hash67` in the same notation. This process
    ultimately terminates when a single Hash for an entire Merkle tree is produced,
    that is, by hashing `Hash45` and `Hash67` together in the example at hand. This
    very last and final hash at the top of the Merkle tree is called *Merkle root*
    and indirectly contains the information about all transactions.


    ## Merkle Tree


    A Merkle tree is a tree-like data structure that allows the combination and cryptographic
    linkage of different hash values and transaction messages.


    The Merkle root is one of the most important constituents of the so-called *header*
    of each block, an informative label or type of metadata^([^(59)](#fn59)) that
    provides a unique transaction summary of each block. The header of a block generally
    contains the following components:


    *   *Merkle root* that indirectly contains the entire transaction history of the
    block.

    *   *Reference* number of the previous block.

    *   *Time-stamp* that documents the creation time of the block and is checked
    by the other clients in the network for safety.

    *   *Nonce* (for "number only used once"), a 32-bit binary number that "normalizes"
    the hash value of the block to ensure that it is below a certain target value.
    This number plays a crucial role during the transaction process itself as discussed
    in the next section.


    ## Blockchain


    Blockchain technology is an innovative tool for securely storing and sharing various
    kinds of digital information through a cryptographically secured ledger or database.
    Data can only be added to the ledger and neither changed nor deleted. The information
    is organized in a chain of data blocks and distributed across a large network
    of nodes (computers). Each node acts as a gate keeper for trust by keeping an
    identical copy of the blockchain file, which is why blockchain technology is also
    referred to as distributed ledger technology.


    With those four components at hand, we can now finalize our blockchain by – guess
    what – applying cryptographic hash function again. For this purpose, we combine
    all components of the header to one string and hash it subsequently. Hence, a
    block of a blockchain is nothing else than a string of numbers and letters in
    the end, which corresponds to the hash value of the different components in its
    header file. Since the header of each block also contains a reference to its preceding
    block, this final application of the hash function links all blocks together immutably
    and completes the formation of a blockchain. Block 1 in Figure [3-2](#505424_1_En_3_Chapter.xhtml#Fig2)
    does not reference any preceding block since it is the very first block of our
    exemplary blockchain, the so-called *genesis block*. To this end, one question
    remains: how can such a blockchain with its elaborate data structure be used to
    exchange value between two parties within a blockchain network? This is the focus
    of the following section.


    ### 3.2.3 Digital Value Transfer


    But before we discuss the blockchain transaction life cycle, it is instructive
    to briefly recapitulate how monetary transactions are organized today for comparison.
    Imagine you like to transfer EUR 100 from your bank account in Germany to the
    bank account of your friend in the United States by a conventional international
    SWIFT^([^(60)](#fn60)) transaction. This transaction process will typically be
    organized in six main steps:


    1.  You will first log in to your online bank account, click "Transfer," and be
    asked to enter the transaction details, such as the name of your friend as the
    recipient, their international bank account number or "IBAN," and the amount of
    money to be transferred. Furthermore, you will need to authorize and verify this
    transaction by entering a certain (mobile) transaction number or TAN.


    2.  Once the verification has been passed successfully, your main bank (the "debitor
    bank") will send the money to a German correspondent bank that has established
    a bilateral business agreement with an international clearing bank.


    3.  Your correspondent bank will then transfer the money to the international
    clearing bank that converts EUR 100 to about USD 110 according to the official
    currency exchange rate on that day.


    4.  The international clearing bank will transfer the money to an American correspondent
    bank.


    5.  The American correspondent bank will transfer the money to the main bank of
    your friend as the recipient (the "creditor bank"), and the transaction is finally
    completed.


    ![../images/505424_1_En_3_Chapter/505424_1_En_3_Fig3_HTML.jpg](images/505424_1_En_3_Chapter/505424_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    The blockchain transaction life cycle is organized in seven steps (numbered circles,
    black): (1) the formation of the encrypted file that incorporates the transaction
    message, (2) broadcasting the file to the network''s nodes (microprocessor icons),
    (3) authorization of the transaction by the network, (4) pooling of multiple authorized
    transactions and their formation in a block, (5) broadcasting the block to the
    nodes, (6) validation of the block by the network through a consensus algorithm,
    and (7) adding the block to the blockchain immutably


    You may have noticed that this process involves five different banks and is rather
    complicated. Furthermore, international transactions typically reveal comparatively
    high transaction fees and take various days upon their completion. The blockchain-based
    value transfer is much easier and faster. Although we will discuss this value
    transaction process in a monetary context now, it is important to bear in mind
    that the same scheme applies to any other kind of value transfer including intellectual
    property rights and other valuable digital assets.'
