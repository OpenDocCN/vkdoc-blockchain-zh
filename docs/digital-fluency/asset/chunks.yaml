- fmt: '`management as supervision`, especially of employees performing routine tasks,
    is finally over. In an AI-powered operating model, managers are designers, shaping,
    improving and (hopefully) controlling the digital systems that sense customer
    needs and respond by delivering value. Managers are *innovators*, as they envision
    how these digital systems will need to evolve over time. Managers are *integrators*,
    as they work to connect disparate digital systems and identify new connections
    between the firm’s operating model and the customers it serves. And managers are
    *guardians*, as they work to preserve the quality, reliability, security, and
    responsibility of the digital systems they control [[29](#505424_1_En_5_Chapter.xhtml#Par168)].


    Eric Schmidt, Jonathan Rosenberg, and Alan Eagle point out further that


    The primary job of each manager is to help people be more effective in their job
    and to grow and develop. [...] Managers create this environment through support,
    respect, and trust. Support means giving people the tools, information, training,
    and coaching they need to succeed. It means continuous effort to develop people’s
    skills. Great managers help people excel and grow. Respect means understanding
    people’s unique career goals and being sensitive to their life choices. It means
    helping people achieve these career goals in a way that’s consistent with the
    needs of the company. Trust means freeing people to do their jobs and to make
    decisions. It means knowing people want to do well and believing that they will
    [[46](#505424_1_En_5_Chapter.xhtml#Par185)].


    ## Shape the Organization and Structure


    The structure of an organization mirrors the architecture of its products and
    services [[47](#505424_1_En_5_Chapter.xhtml#Par186)]. This empirical observation
    became known as *mirroring hypothesis* or *Conway’s law* named after the American
    computer scientist Melvin Conway, who introduced the idea in 1967 by stating:
    “Any organization that designs a system (defined broadly) will produce a design
    whose structure is a copy of the organization’s communication structure” [[48](#505424_1_En_5_Chapter.xhtml#Par187)].
    In other words, interrelated tasks, such as the development of complex products
    and services, are best performed by cross-functional and highly integrated teams
    that focus on developing end-to-end customer features rather than a single function
    or component of the overall product or service only. This is why digital operating
    models require agile and highly interconnected organizational structures without
    any isolated silos. Reshaping the organizational structure to establish new ways
    of collaboration is thus another crucial dimension of digital transformation.


    ### Shape the Organization and Structure: Format Agile Project Teams


    Agile innovation teams are small. Jeffrey Bezos famously believes that a team
    that cannot be fed by two pizzas and thus consists of more than five to ten members
    inevitably runs into inefficiencies as it requires too much communication and
    project management, which became known as *two-pizza rule* [[49](#505424_1_En_5_Chapter.xhtml#Par188)].
    Furthermore, agile project teams rely on interdisciplinarity and are composed
    of members with varying talents that work in close proximity and encompass all
    digital and physical skills required to complete the assigned project. They foster
    ownership and autonomy and follow an explorative approach to innovation that allows
    them to pivot between different solutions using an emergent strategy – flexible
    and quick response to change is more important than adherence to plans in the
    early stage of a digital pilot project. Agile teams usually value creative work
    environments and less hierarchical bureaucracies and are focused on creating working
    prototypes rather than excessive documentation. Their approach is centered around
    the customer, and collaboration is more important than fixed specifications.


    Organized in agile teams, pilot projects are ideal for exploring and experimenting
    with new ways of collaboration including agile methodologies and other approaches.
    From an organizational point of view, there are three main ways for integrating
    such teams into an existing organization and hierarchical structure:


    1.  *Decentralized model*: Digital initiatives are integrated in all business
    units and executed more or less independently. Each business unit has its own
    agile teams and pilot projects.


    2.  *Centralized model*: Digital initiatives are orchestrated by a separate entity
    within the organization that may be headed by a chief digital officer. This center
    of excellence brings together product managers, data scientists, business analysts,
    as well as hardware and software developers from different business units and
    aligns the entire organization around the different pilot projects. One example
    is the German automotive supplier ZF Friedrichshafen, who set up a centralized
    analytics lab successfully [[50](#505424_1_En_5_Chapter.xhtml#Par189)].


    3.  *Excubator model*: Digital initiatives run in parallel with an organization’s
    core business and sometimes even in competition with other business units. A digital
    excubator^([^(147)](#fn147)) as a startup-like venture outside the organization
    leverages digital technologies to create innovative products and services. Its
    entrepreneurial endeavors provide valuable insights and experience that may serve
    as a blueprint for future innovations and pilot projects in other divisions of
    the organization.


    Depending on the priorities and particular starting point, many organizations
    often choose to run hybrid models and implement both a digital center of excellence
    and an excubator to support their digital agenda.'
