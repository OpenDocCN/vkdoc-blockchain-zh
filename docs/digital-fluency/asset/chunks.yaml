- fmt: "  \n`Digitalization` and `digital transformation`, `big data` and `artificial\
    \ intelligence`, as well as `quantum computing` and `blockchain technology` are\
    \ among the hottest and most cited buzzwords in media today. Everybody has heard\
    \ about them, but only few people comprehend them. Metaphorically speaking, they\
    \ seem to occupy a high-speed train that departs soon. Nobody knows wherefrom\
    \ and whereto, but everybody likes to join immediately so as not to lose a chance.\
    \ Hence, digital technologies have been subject to intense speculation and controversial\
    \ discussions in politics, industry, and society that are driven by exaggerated\
    \ hopes and fears. Optimists highlight the great future prospects of digital technologies\
    \ and envision the arrival of new very practical applications that create even\
    \ more jobs than `digitalization` destroys. Pessimistic people, on the other hand,\
    \ spread fears about them and are afraid of mass unemployment caused by intelligent\
    \ and often violent robots that transcend human intelligence and thereby render\
    \ millions of jobs obsolete.  \n\nIndependently of which party has the better\
    \ arguments, both sides do generally agree that digital technologies continue\
    \ to have tremendous social and economic impacts. Just think about the Internet\
    \ and smartphone that radically changed the way we communicate, inform, interact,\
    \ and transact with each other. The smartphone, for example, evolved from being\
    \ simply a better phone to a digital platform for mobile applications that provide\
    \ access to the Internet and soon became indispensable in our everyday life. With\
    \ the arrival of digital technologies and the smartphone, in particular, the amount\
    \ of readily available information and data exploded. Thus far, we have seen the\
    \ most prominent effects in industries like retail, advertising, media, and music,\
    \ but others are poised to follow. Google, for example, processes more than 40,000\
    \ searches every second. Users of YouTube watch more than 68,000 videos and send\
    \ over 5,800 tweets on Twitter every second. Inspired by this breathtaking scale,\
    \ Google’s chief economist Hal Varian once noted in 2013 nicely: “A billion hours\
    \ ago, modern *Homo sapiens* emerged. A billion minutes ago, Christianity began.\
    \ A billion seconds ago, the IBM personal computer was released. A billion Google\
    \ searches ago... was this morning.”^([¹](#fn1)) With an average usage of 28 minutes\
    \ per day and more than 8.9 million daily uploads of novel photos and videos,\
    \ the social networking service Instagram is another example, which impressively\
    \ demonstrates how the Internet, smartphones, and other digital devices have revolutionized\
    \ the way we consume information. News is no longer read in printed newspapers\
    \ and magazines but rather through online media platforms and social networks\
    \ like Facebook, which completely disrupted the business of established media\
    \ and news publishing companies. Amazon, Alibaba, Microsoft, Netflix, and Spotify\
    \ are just a few examples of companies that explored and picked up this digital\
    \ trend early on and leveraged digital technologies successfully to disrupt existing\
    \ and create new, highly profitable digital revenue streams.  \n\nWe are also\
    \ seeing the beginning of digital transformation in the financial services industry\
    \ today, where established investment banks and hundreds of fintech startups –\
    \ backed by billions of US dollars in venture capital – employ a whole range of\
    \ digital technologies to advance their products and services. They optimize financial\
    \ value chains and pricing models by quantum computers, offer easy-to-use retail\
    \ banking and payment services powered by blockchain technology, and increase\
    \ cybersecurity by artificial intelligence as you will see in selected examples\
    \ throughout this book.  \n\nAccelerated by the severe corona crisis caused by\
    \ the deadly COVID-19 virus spread in 2020/21 worldwide, digital transformation\
    \ has also begun to disrupt the economically very important automobile industry.\
    \ We may see the arrival of, for example, autonomous vehicles powered by artificial\
    \ intelligence, fully connected vehicle infotainment services with in-car payment\
    \ systems based on blockchain technology, and navigational systems that identify\
    \ the fastest route through overcrowded cities by leveraging quantum computing\
    \ embedded in a mobility cloud infrastructure in the not too distant future. The\
    \ digital transformation of the automotive industry is expected to improve customer\
    \ journeys by new functionalities and drive gigantic gains in productivity, efficiency,\
    \ and cost savings, which is why it is a matter of time until it sweeps across\
    \ every sector of modern industry and society.  \n\nNo discussion about digital\
    \ transformation would be complete without mentioning its wide-ranging impact\
    \ on governmental organizations, too, such as central banks, tax offices, national\
    \ courts, notary services, and health departments. Digital transformation does\
    \ not only help private organizations to streamline internal processes but also\
    \ public institutions to reduce bureaucracy and optimize public product and service\
