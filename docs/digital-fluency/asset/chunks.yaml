  trans: '好的，作为一名高级文档工程师和翻译员，我将遵循您的注意事项，将给定的英文文本准确翻译为中文。



    ![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig4_HTML.png](img/505424_1_En_2_Fig4_HTML.png)


    **图 2-4**


    电子在地磁场中的奇特行为。电子——类似于空中的足球——要么向左自旋（自旋向上），要么向右自旋（自旋向下）。物理学家分别将其记为 `|↺⟩ = |↑⟩` 和
    `|↻⟩ = |↓⟩`。


    ![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig3_HTML.png](img/505424_1_En_2_Fig3_HTML.png)


    **图 2-3**


    通过激光束激发的非线性晶体产生一对纠缠的偏振光子 A 和 B。在不测量任一光子偏振的情况下，你无法判断每个光子的偏振状态。你只能从量子力学中得知，这两个光子具有相反的偏振。


    换句话说，纠缠确实会以某种方式“连接”或“交织”两个（或更多）电子的量子力学自旋态，从而使它们永远相互依赖。物理学家通常用符号 `|ψ⟩`（来自希腊字母“psi”）来标记两个自旋相反、纠缠在一起的电子
    *A* 和 *B* 的整体状态，并用狄拉克符号表示。


    ![$$ \mid \psi \Big\rangle =\underset{1^{st}\;\mathrm{term}}{\underbrace{\alpha
    \cdot \mid \uparrow \left\rangle {}_A\mid \downarrow \right\rangle {}_B}}+\underset{2^{nd}\;\mathrm{term}}{\underbrace{\beta
    \cdot \mid \downarrow \left\rangle {}_A\mid \uparrow \right\rangle {}_B.}} $$](img/505424_1_En_2_Chapter_TeX_Equ2.png)


    **(2.2)**


    用来描述要么电子 *A* 自旋向上、电子 *B* 自旋向下（第一项），要么电子 *A* 自旋向下、电子 *B* 自旋向上（第二项）。^((30)) 各自的概率由两个态振幅
    *α* 和 *β* 描述，类似于方程 2.1 中的叠加态。


    另一种或许更生动的阐释这种诡异量子效应的方法，是将一本普通的电子书（例如本书的电子版）与一本虚构的“量子书”进行比较。电子书中的信息以比特编码，而量子书中的内容则以纠缠的量子比特编码。这对你的阅读体验有如下重大影响。电子书的内容可以随时一页一页地轻松阅读。但是，查看量子书的各个页面只会揭示出随机噪声，其中包含的信息内容非常少，因为它的故事并非记录在不同页面上，而是记录在它们之间复杂的关联中——不同的页面只是简单地纠缠在一起。因此，要理解整本量子书，你必须同时集体阅读许多页面，同时识别出它们之间的复杂关联——你可以想象，这是一次真正有压力的阅读体验。


    这个关于纠缠的生动例证，结束了我们对量子力学奇异世界的简短探索。在本节中，我们讨论了现代量子力学中几个非常引人注目和令人不安的现象，每一个都将在当今的量子计算中得到利用。如果量子力学的某个方面让你感到困惑，请放心，因为你不是唯一一个。理查德·费曼曾这样描述量子力学：量子力学是对物质和光行为所有细节的描述，特别是对原子尺度上所发生事件的描述。在非常小的尺度上，事物的行为与你所能直接体验到的任何事物都不同。它们的行为不像波，不像粒子，不像云，不像台球，不像弹簧上的重物，也不像你见过的任何东西
    [9]。此外，他后来在 1964 年于康奈尔大学著名的量子力学讲座中指出：“我想我可以有把握地说，没有人真正理解量子力学。”


    ## 纠缠


    纠缠是指量子物理学中的一种自然现象，当两个或更多量子力学对象（例如光子和电子）一起产生（或相互交互）时，它们的个体量子态就无法再独立于彼此来描述。换句话说，对第一个对象的测量决定了测量第二个对象的结果。这种现象没有经典类比，即使纠缠对象在空间上相隔非常远的距离，也可以被观察到。


    有了这些关于不确定性原理、叠加、纠缠以及偏振和自旋（特别是）的知识，我们现在就具备了理解量子计算机如何运作以及为什么它们能够在计算性能和速度方面超越最先进的超级计算机所需的一切。'
- fmt: '### 2.2.2 How Quantum Computers Operate


    The basic idea for a quantum computer was inspired by two American physicists.
    One of them was Paul Benioff, who presented a theoretical model for a quantum
    mechanical Turing machine in 1980 [[10](#505424_1_En_2_Chapter.xhtml#Par206)].
    Two years later, Richard Feynman envisioned a similar concept when he asked himself
    how to simulate complex quantum mechanical systems, such as molecules and proteins,
    most efficiently.^([^(31)](#fn31)) He concluded that tiny computers that obey
    quantum mechanical laws themselves are best suited to do such calculations, and
    the term “quantum computer” was born [[14](#505424_1_En_2_Chapter.xhtml#Par210)].


    From Section 1.4.2, we know that classical computers encode information in binary
    bits that can be processed by classical logic gates. In analogy to their classical
    relatives, a quantum computer encodes information in quantum bits – so-called
    *qubits* – and processes them by *quantum logic gates* accordingly. So far this
    concept is anything but spectacular. The fundamental difference between classical
    and quantum computers arises due to the particular way bits and qubits are implemented
    and interact with each other. A classical computer requires an ensemble of about
    10,000 electrons to encode a binary bit. The quantum mechanical properties of
    the different electrons in such large ensembles average each other, and the overall
    system resembles a classical bit. A quantum computer, on the other hand, employs
    single quantum mechanical object, such as isolated electrons or photons, to encode
    one qubit, which therefore preserves its quantum mechanical properties.


    In practice, a quantum computer employs a quantum mechanical *two-level system*,
    such as the spin of an electron or the polarization of a photon, that is described
    by the two state vectors `|↓⟩`, `|↑⟩` and `|↺⟩`, `|↻⟩`, respectively, as we know
    from our previous introduction. In the case of electron spin qubits, the state
    vector `|↑⟩` is conventionally associated with the binary number “0” and `|↑⟩`
    with the binary number “1” in analogy to classical bits – the opposite association
    rules would also work in fact as long as we do not change this association rule
    during quantum information processing.


    This transition from classical bits to qubits that preserves the quantum mechanical
    properties has two main advantages. Quantum information processing, namely, provides
    a gain in (1) memory capacity and (2) computational speed. The first advantage
    can be demonstrated best by comparing a classical register (or memory) to a *quantum
    register* that are used to save information encoded in bits and qubits, respectively.
    A classical 2-bit register is capable of storing one of the following binary numbers


    ![$$ 00,01,10\;\underset{--}{\mathrm{or}}\;11, $$](images/505424_1_En_2_Chapter/505424_1_En_2_Chapter_TeX_Equ3.png)


    (2.3)


    which correspond to the decimal numbers 0, 1, 2, and 3 as we know from Section
    1.4.1. A 2-qubit register, on the other hand, preserves its quantum mechanical
    properties and can thus employ the superposition principle to store the state
    vector:


    ![$$ \mid 00\left\rangle +\mid 01\right\rangle +\mid 10\left\rangle +\mid 11\right\rangle
    . $$](images/505424_1_En_2_Chapter/505424_1_En_2_Chapter_TeX_Equ4.png)


    (2.4)


    In other words, the classical 2-bit register can only save one binary number,
    while a 2-qubit register can store 2² = 2 ⋅ 2 = 4 binary numbers at once by employing
    the superposition principle. This particular case can easily be abstracted to
    *N*-bit and *N*-qubit registers, where *N* denotes any natural number equal to
    or larger than 1. Since each qubit can encode both binary numbers “0” and “1”
    at the same time, an *N*-qubit register is capable of saving


    ![$$ {2}^N=\underset{N-\mathrm{times}}{\underbrace{2\cdot 2\cdot 2\cdot \dots
    }} $$](images/505424_1_En_2_Chapter/505424_1_En_2_Chapter_TeX_Equ5.png)


    (2.5)


    binary numbers (with *N* digits each) in total. A classical *N*-bit register,
    on the other hand, is only capable of storing one binary number with *N* digits
    since each bit can either be “0” or “1” but not both at the same time like a qubit.
    Hence, the gain in memory capacity for an *N*-qubit compared to an *N*-bit register
    amounts to


    ![$$ \frac{2^N}{1}={2}^N $$](images/505424_1_En_2_Chapter/505424_1_En_2_Chapter_TeX_Equ6.png)


    (2.6)


    and thus reveals an exponential increase. The classical register (or active memory)
    of your smartphone, for instance, is typically about 2 GB in size, which corresponds
    to 16 billion classical bits in total.^([^(32)](#fn32)) An active working memory
    based on qubits would – in theory – only need 32 qubits to store the same amount
    of information since `2^32` is already larger than 4 GB. In other words, 32 qubits
    can store more information than 16 billion classical bits. This truly exponential
    increase in memory capacity illustrates the first main advantage of quantum over
    classical information processing.


    The second advantage relates to the gain in computational speed and is a consequence
    of the particular way a quantum computer processes quantum information. Consider
    we would like to carry out two calculations in two steps:


    ![$$ {\displaystyle \begin{array}{l}\mathrm{Step}1:\kern1.75em 00+01=01\kern1.75em
    \left(\mathrm{or}\;0+1=1\mathrm{in}\kern0.17em \mathrm{decimal}\kern0.17em \mathrm{numbers}\right)\\
    {}\mathrm{Step}2:\kern1.75em 01+01=10\kern1.75em \left(\mathrm{or}\;1+1=2\;\mathrm{in}\kern0.17em
    \mathrm{decimal}\kern0.17em \mathrm{numbers}\right)\end{array}} $$](images/505424_1_En_2_Chapter/505424_1_En_2_Chapter_TeX_Equ7.png)


    (2.7)


    A classical computer would need to conduct those calculations consecutively in
    two steps. A quantum computer, on the other hand, employs the superposition principle
    to simply add the binary number encoded in `|01⟩` to the binary superposition
    *α* ⋅ `|00⟩` + *β* ⋅ `|01⟩` and carry out both calculations at the same time.
    This highly parallel computation can be expressed by the equation


    ![$$ {\displaystyle \begin{array}{l}\mid 01\left\rangle \oplus \left(\alpha \cdot
    |00\Big\rangle +\beta \cdot |01\Big\rangle \right)=\alpha \cdot \mid 01+00\right\rangle
    +\beta \cdot \mid 01+01\Big\rangle \\ {}\kern6.359996em =\underset{\mathrm{Result}\kern0.17em
    \mathrm{of}\kern0.17em \mathrm{step}\;1}{\underbrace{\alpha \cdot \mid 01\Big\rangle\;}}+\underset{\mathrm{Result}\kern0.17em
    \mathrm{of}\kern0.17em \mathrm{step}\;2}{\underbrace{\beta \cdot \mid 10\Big\rangle\;}}\kern0.24em
    \end{array}} $$](images/505424_1_En_2_Chapter/505424_1_En_2_Chapter_TeX_Equ8.png)


    (2.8)


    where the symbol “⊕” denotes the addition of two binary numbers encoded in state
    vectors. The output of a quantum computer will thus be a superposition of the
    results obtained from step 1 and step 2. In other words, a quantum computer conducts
    both calculations at once and is therefore exponentially faster than a classical
    computer. However, the only way to read out and obtain this result from a quantum
    computer will ultimately involve any kind of measurement, which is referred to
    as *measurement-based quantum computing*. But from our previous discussion, we
    know that any measurement of a quantum state will cause its wave function to relax.
    In other words, as soon as we attempt to read out the superposition by measuring
    the electron spin qubits that encode our binary numbers, the result is random,
    and we either obtain the result of step 1 or step 2 depending on the two parameters
    *α* and *β*. The tricky bit is that we generally do not know if the obtained result
    belongs to step 1 or step 2 of our calculation. So what can we do to solve this
    association problem?'
  raw: '### 2.2.2 How Quantum Computers Operate


    The basic idea for a quantum computer was inspired by two American physicists.
    One of them was Paul Benioff, who presented a theoretical model for a quantum
    mechanical Turing machine in 1980 [[10](#505424_1_En_2_Chapter.xhtml#Par206)].
    Two years later, Richard Feynman envisioned a similar concept when he asked himself
    how to simulate complex quantum mechanical systems, such as molecules and proteins,
    most efficiently.^([^(31)](#fn31)) He concluded that tiny computers that obey
    quantum mechanical laws themselves are best suited to do such calculations, and
    the term “quantum computer” was born [[14](#505424_1_En_2_Chapter.xhtml#Par210)].


    From Section 1.4.2, we know that classical computers encode information in binary
    bits that can be processed by classical logic gates. In analogy to their classical
    relatives, a quantum computer encodes information in quantum bits – so-called
    *qubits*  – and processes them by *quantum logic gates* accordingly. So far this
    concept is anything but spectacular. The fundamental difference between classical
    and quantum computers arises due to the particular way bits and qubits are implemented
    and interact with each other. A classical computer requires an ensemble of about
    10,000 electrons to encode a binary bit. The quantum mechanical properties of
    the different electrons in such large ensembles average each other, and the overall
    system resembles a classical bit. A quantum computer, on the other hand, employs
    single quantum mechanical object, such as isolated electrons or photons, to encode
    one qubit, which therefore preserves its quantum mechanical properties.


    In practice, a quantum computer employs a quantum mechanical *two-level system*,
    such as the spin of an electron or the polarization of a photon, that is described
    by the two state vectors |↓〉, |↑〉 and |↺〉, |↻〉, respectively, as we know from
    our previous introduction. In the case of electron spin qubits, the state vector
    |↑〉 is conventionally associated with the binary number “0” and |↑〉 with the binary
    number “1” in analogy to classical bits – the opposite association rules would
    also work in fact as long as we do not change this association rule during quantum
    information processing.


    This transition from classical bits to qubits that preserves the quantum mechanical
    properties has two main advantages. Quantum information processing, namely, provides
    a gain in (1) memory capacity and (2) computational speed. The first advantage
    can be demonstrated best by comparing a classical register (or memory) to a *quantum
    register* that are used to save information encoded in bits and qubits, respectively.
    A classical 2-bit register is capable of storing one of the following binary numbers


    ![$$ 00,01,10\;\underset{--}{\mathrm{or}}\;11, $$](images/505424_1_En_2_Chapter/505424_1_En_2_Chapter_TeX_Equ3.png)


    (2.3)


    which correspond to the decimal numbers 0, 1, 2, and 3 as we know from Section
    1.4.1\. A 2-qubit register, on the other hand, preserves its quantum mechanical
    properties and can thus employ the superposition principle to store the state
    vector:


    ![$$ \mid 00\left\rangle +\mid 01\right\rangle +\mid 10\left\rangle +\mid 11\right\rangle
    . $$](images/505424_1_En_2_Chapter/505424_1_En_2_Chapter_TeX_Equ4.png)


    (2.4)


    In other words, the classical 2-bit register can only save one binary number,
    while a 2-qubit register can store 2² = 2 ⋅ 2 = 4 binary numbers at once by employing
    the superposition principle. This particular case can easily be abstracted to
    *N*-bit and *N*-qubit registers, where *N* denotes any natural number equal to
    or larger than 1\. Since each qubit can encode both binary numbers “0” and “1”
    at the same time, an *N*-qubit register is capable of saving


    ![$$ {2}^N=\underset{N-\mathrm{times}}{\underbrace{2\cdot 2\cdot 2\cdot \dots
    }} $$](images/505424_1_En_2_Chapter/505424_1_En_2_Chapter_TeX_Equ5.png)


    (2.5)


    binary numbers (with *N* digits each) in total. A classical *N*-bit register,
    on the other hand, is only capable of storing one binary number with *N* digits
    since each bit can either be “0” or “1” but not both at the same time like a qubit.
    Hence, the gain in memory capacity for an *N*-qubit compared to an *N*-bit register
    amounts to


    ![$$ \frac{2^N}{1}={2}^N $$](images/505424_1_En_2_Chapter/505424_1_En_2_Chapter_TeX_Equ6.png)


    (2.6)


    and thus reveals an exponential increase. The classical register (or active memory)
    of your smartphone, for instance, is typically about 2 GB in size, which corresponds
    to 16 billion classical bits in total.^([^(32)](#fn32)) An active working memory
    based on qubits would – in theory – only need 32 qubits to store the same amount
    of information since 2^(32) is already larger than 4 GB. In other words, 32 qubits
    can store more information than 16 billion classical bits. This truly exponential
    increase in memory capacity illustrates the first main advantage of quantum over
    classical information processing.


    The second advantage relates to the gain in computational speed and is a consequence
    of the particular way a quantum computer processes quantum information. Consider
    we would like to carry out two calculations in two steps:


    ![$$ {\displaystyle \begin{array}{l}\mathrm{Step}1:\kern1.75em 00+01=01\kern1.75em
    \left(\mathrm{or}\;0+1=1\mathrm{in}\kern0.17em \mathrm{decimal}\kern0.17em \mathrm{numbers}\right)\\
    {}\mathrm{Step}2:\kern1.75em 01+01=10\kern1.75em \left(\mathrm{or}\;1+1=2\;\mathrm{in}\kern0.17em
    \mathrm{decimal}\kern0.17em \mathrm{numbers}\right)\end{array}} $$](images/505424_1_En_2_Chapter/505424_1_En_2_Chapter_TeX_Equ7.png)


    (2.7)


    A classical computer would need to conduct those calculations consecutively in
    two steps. A quantum computer, on the other hand, employs the superposition principle
    to simply add the binary number encoded in |01〉 to the binary superposition *α* ⋅  ∣ 00〉 + *β* ⋅  ∣ 01〉
    and carry out both calculations at the same time. This highly parallel computation
    can be expressed by the equation


    ![$$ {\displaystyle \begin{array}{l}\mid 01\left\rangle \oplus \left(\alpha \cdot
    |00\Big\rangle +\beta \cdot |01\Big\rangle \right)=\alpha \cdot \mid 01+00\right\rangle
    +\beta \cdot \mid 01+01\Big\rangle \\ {}\kern6.359996em =\underset{\mathrm{Result}\kern0.17em
    \mathrm{of}\kern0.17em \mathrm{step}\;1}{\underbrace{\alpha \cdot \mid 01\Big\rangle\;}}+\underset{\mathrm{Result}\kern0.17em
    \mathrm{of}\kern0.17em \mathrm{step}\;2}{\underbrace{\beta \cdot \mid 10\Big\rangle\;}}\kern0.24em
    \end{array}} $$](images/505424_1_En_2_Chapter/505424_1_En_2_Chapter_TeX_Equ8.png)


    (2.8)


    where the symbol “⊕” denotes the addition of two binary numbers encoded in state
    vectors. The output of a quantum computer will thus be a superposition of the
    results obtained from step 1 and step 2\. In other words, a quantum computer conducts
    both calculations at once and is therefore exponentially faster than a classical
    computer. However, the only way to read out and obtain this result from a quantum
    computer will ultimately involve any kind of measurement, which is referred to
    as *measurement-based quantum computing* . But from our previous discussion, we
    know that any measurement of a quantum state will cause its wave function to relax.
    In other words, as soon as we attempt to read out the superposition by measuring
    the electron spin qubits that encode our binary numbers, the result is random,
    and we either obtain the result of step 1 or step 2 depending on the two parameters
    *α* and *β*. The tricky bit is that we generally do not know if the obtained result
    belongs to step 1 or step 2 of our calculation. So what can we do to solve this
    association problem?'
  trans: '

    ### 2.2.2 量子计算机如何运作


    量子计算机的基本构想源于两位美国物理学家。其中一位是保罗·贝尼奥夫，他在 1980 年提出了量子力学图灵机的理论模型[10]。两年后，理查德·费曼在思考如何最高效地模拟分子和蛋白质等复杂量子力学系统时，也构想出了类似的概念^(³¹)。他得出结论：本身遵循量子力学法则的微型计算机最适合进行此类计算，“量子计算机”这一术语由此诞生[14]。


    从第 1.4.2 节中我们了解到，经典计算机将信息编码为可由经典逻辑门处理的二进制比特。与经典计算机类似，量子计算机将信息编码为量子比特——即所谓的*量子比特*——并相应地通过*量子逻辑门*对其进行处理。到目前为止，这个概念并没有什么惊人之处。经典计算机与量子计算机的根本区别在于比特和量子比特的实现方式及其相互作用的特定方式。经典计算机需要大约
    10,000 个电子的集合体来编码一个二进制比特。在这种大规模集合体中，不同电子的量子力学特性会彼此平均化，从而使整个系统类似于一个经典比特。而量子计算机则利用单个量子力学对象（例如孤立的电子或光子）来编码一个量子比特，因此保留了其量子力学特性。


    在实践中，量子计算机采用一个量子力学的*二能级系统*，例如电子的自旋或光子的偏振，正如我们之前所介绍的，该系统分别由两个状态向量`|↓⟩`、`|↑⟩`以及`|↺⟩`、`|↻⟩`来描述。对于电子自旋量子比特，通常将状态向量`|↑⟩`与二进制数字“0”相关联，而将`|↑⟩`与二进制数字“1”相关联，以类比经典比特——实际上，只要我们在量子信息处理过程中不改变这一关联规则，采用相反的关联规则也同样可行。


    这种从经典比特到保留量子力学特性的量子比特的转变，具有两大主要优势。即，量子信息处理能够带来（1）存储容量和（2）计算速度的提升。第一个优势可以通过比较用于保存编码在比特和量子比特中信息的经典寄存器（或内存）与*量子寄存器*得到最佳体现。一个经典的
    2 比特寄存器能够存储以下二进制数中的一个


    ![$$ 00,01,10\;\underset{--}{\mathrm{or}}\;11, $$](img/505424_1_En_2_Chapter_TeX_Equ3.png)


    (2.3)


    正如我们从第 1.4.1 节所知，它们分别对应十进制数 0、1、2 和 3。而一个 2 量子比特寄存器则保留了其量子力学特性，因此可以利用叠加原理来存储如下状态向量：


    ![$$ \mid 00\left\rangle +\mid 01\right\rangle +\mid 10\left\rangle +\mid 11\right\rangle
    . $$](img/505424_1_En_2_Chapter_TeX_Equ4.png)


    (2.4)


    换言之，经典的 2 比特寄存器一次只能保存一个二进制数，而一个 2 量子比特寄存器通过利用叠加原理，可以同时存储 2² = 2 ⋅ 2 = 4 个二进制数。这一特例可以很容易地推广到
    *N* 比特和 *N* 量子比特寄存器，其中 *N* 表示任何大于或等于 1 的自然数。由于每个量子比特可以同时编码二进制数字“0”和“1”，因此一个 *N*
    量子比特寄存器总共能够保存


    ![$$ {2}^N=\underset{N-\mathrm{times}}{\underbrace{2\cdot 2\cdot 2\cdot \dots
    }} $$](img/505424_1_En_2_Chapter_TeX_Equ5.png)


    (2.5)


    个二进制数（每个数有 *N* 位）。相比之下，一个经典的 *N* 比特寄存器只能存储一个具有 *N* 位的二进制数，因为每个比特只能是“0”或“1”，而不能像量子比特那样同时表示两者。因此，与
    *N* 比特寄存器相比， *N* 量子比特寄存器在存储容量上的增益为


    ![$$ \frac{2^N}{1}={2}^N $$](img/505424_1_En_2_Chapter_TeX_Equ6.png)


    (2.6)


    从而表现为指数级增长。例如，你智能手机中的经典寄存器（或活动内存）通常约为 2 GB 大小，这相当于总共 160 亿个经典比特。^(³²) 基于量子比特的活动工作内存理论上仅需
    32 个量子比特即可存储等量的信息，因为`2³²`已经大于 4 GB。换句话说，32 个量子比特可以存储比 160 亿个经典比特更多的信息。这种真正的指数级存储容量增长，体现了量子信息处理相对于经典信息处理的第一个主要优势。


    第二个优势涉及计算速度的提升，这是量子计算机处理量子信息的特定方式的结果。假设我们希望分两步执行两个计算：


    ![$$ {\displaystyle \begin{array}{l}\mathrm{Step}1:\kern1.75em 00+01=01\kern1.75em
    \left(\mathrm{or}\;0+1=1\mathrm{in}\kern0.17em \mathrm{decimal}\kern0.17em \mathrm{numbers}\right)\\
    {}\mathrm{Step}2:\kern1.75em 01+01=10\kern1.75em \left(\mathrm{or}\;1+1=2\;\mathrm{in}\kern0.17em
    \mathrm{decimal}\kern0.17em \mathrm{numbers}\right)\end{array}} $$](img/505424_1_En_2_Chapter_TeX_Equ7.png)


    (2.7)


    经典计算机需要分两步连续执行这些计算。而量子计算机则利用叠加原理，将编码在`|01⟩`中的二进制数简单地加到二进制叠加态 *α* ⋅ `|00⟩` + *β*
    ⋅ `|01⟩`上，从而同时进行两种计算。这种高度并行的计算可以用以下方程表示：


    ![$$ {\displaystyle \begin{array}{l}\mid 01\left\rangle \oplus \left(\alpha \cdot
    |00\Big\rangle +\beta \cdot |01\Big\rangle \right)=\alpha \cdot \mid 01+00\right\rangle
    +\beta \cdot \mid 01+01\Big\rangle \\ {}\kern6.359996em =\underset{\mathrm{Result}\kern0.17em
    \mathrm{of}\kern0.17em \mathrm{step}\;1}{\underbrace{\alpha \cdot \mid 01\Big\rangle\;}}+\underset{\mathrm{Result}\kern0.17em
    \mathrm{of}\kern0.17em \mathrm{step}\;2}{\underbrace{\beta \cdot \mid 10\Big\rangle\;}}\kern0.24em
    \end{array}} $$](img/505424_1_En_2_Chapter_TeX_Equ8.png)


    (2.8)


    其中符号“⊕”表示编码在状态向量中的两个二进制数的加法。因此，量子计算机的输出将是步骤 1 和步骤 2 所得结果的叠加态。换句话说，量子计算机能够一次执行两个计算，因此其速度比经典计算机呈指数级提升。然而，从量子计算机中读取并获取该结果的唯一途径最终涉及某种类型的测量，这被称为*基于测量的量子计算*。但从我们之前的讨论可知，对量子态的任何测量都会导致其波函数坍缩。换句话说，一旦我们试图通过测量编码二进制数的电子自旋量子比特来读取叠加态，结果将是随机的，我们只能根据参数
    *α* 和 *β* 获得步骤 1 或步骤 2 的结果。棘手之处在于，我们通常不知道获得的结果属于我们计算的步骤 1 还是步骤 2。那么，我们该如何解决这个归属问题呢？

    '
- fmt: '# 量子计算中的关键概念


    不涉及任何数学细节，这个问题通常通过使用纠缠作为额外的量子资源来克服，它允许我们将计算的二进制输入和输出值（或状态向量）关联起来。如果你愿意，纠缠为与步骤1和步骤2相关的部分结果添加了一个标签，使我们能够识别计算结果属于步骤1还是步骤2。然后，通过对方程`[2.8](#505424_1_En_2_Chapter.xhtml#Equ8)`中的叠加态进行多次测量，可以得到步骤1和步骤2的最终结果。同样的原理也适用于更复杂、步骤更多的计算。


    在量子计算机中，这类计算实际上是通过量子逻辑门来实现的，这与经典计算机中的逻辑门类似。从第`1.4.2`节我们知道，逻辑门——无论是经典的还是量子的——是一种物理结构，它接收一组输入并将它们组合成一个输出。经典逻辑门与量子逻辑门之间最重要的区别在数学上被称为**可逆性**。量子逻辑门是可逆的，因为它们保留了量子关联，例如叠加和纠缠。因此，它们的输入总是可以根据输出重建，而这在经典逻辑门中通常是不可能的，因为不同的输入值可能具有相同的输出值，如表`1-1`所示。换句话说，量子逻辑门不会丢失通过它们的任何信息——它们在整个计算过程中安全地保存信息及其关联。这是量子逻辑门的一个非常重要的特性，因为它允许我们对叠加和纠缠的量子比特进行逻辑运算——正如我们从之前的例子中所知，这是发挥量子信息处理全部潜力的重要先决条件。


    不涉及任何细节，最重要的量子逻辑门是：（1）`Hadamard`门，（2）受控非门（`controlled-NOT`），以及（3）`Toffoli`门[[15](#505424_1_En_2_Chapter.xhtml#Par211)]。`Hadamard`门尤为重要，因为它可以将两个量子比特置于叠加态。为此，它使用特定类型的光——电磁辐射，例如激光或微波脉冲——来操纵所涉及量子比特的量子态。通过组合不同的量子逻辑门，我们可以构建各种量子算法来解决不同的计算问题。


    总之，量子计算机利用叠加和纠缠同时执行多个计算步骤，这就是为什么量子计算有时被描述为**大规模并行计算**和超级计算的下一个前沿。它在内存容量和速度方面提供了指数级的提升。例如，一个`300`量子比特的寄存器可以存储`2^(300)`个二进制数，其组合数量比整个宇宙中的粒子还要多！这种内存容量和计算能力的巨大增长，使得量子计算——即使尚未完全成熟——有望在不久的将来彻底改变超级计算领域。


    ## 2.2.3 对完美量子比特的挑剔探寻


    科学中常常如此，理论比实践容易得多。量子计算也是如此，科学家在物理实现合适的量子比特时面临着重大的技术挑战。大多数挑战都与一个称为**退相干**的过程有关，这是一个令人困扰的“退化”过程，通过该过程，编码在量子比特中的信息会被破坏并退化为随机噪声——这样的量子计算机因此被称为“有噪声的”。


    顺便提一下，噪声在经典计算中也是有害的，但很容易处理，因为我们可以为每个比特保留两个或多个备份副本，这样任何变化都会作为异常值显现出来。然而，这种基于备份副本的策略不能用于量子计算机，因为任何复制量子态的尝试最终都涉及进行测量以查看我们想要复制的对象。但是，正如我们从第`2.2.1`节所知道的，测量会导致波函数坍缩，从而破坏叠加和纠缠，并导致量子信息不可逆地丢失。这个我们不能复制（或克隆）量子态的基本原理被称为**非克隆定理**[[16](#505424_1_En_2_Chapter.xhtml#Par212),
    [17](#505424_1_En_2_Chapter.xhtml#Par213)]，这并没有使量子计算机的操作变得更容易。


    退相干通常是由量子比特与其宿主环境之间的相互作用引起的。各种随时间变化的因素通常会促进退相干，例如机械振动、温度波动以及周围实验室中电子设备发出的振荡电磁杂散场。物理学家通常区分由退相干引起的自旋翻转过程和能量弛豫过程，由于它们对量子计算机的物理实现具有重大意义，下文将对两者进行简要说明。


    ### 退相干：自旋翻转过程


    我们考虑的第一个退相干机制是所谓的**自旋翻转**过程。在电子自旋的情况下，这个过程简单地改变量子比特的自旋状态，并诱导从`|↑〉`到`|↓〉`或反之的跃迁。所有这些都随机发生，并破坏量子计算机内的所有物理关联，因此其结果只会是随机噪声。发生此类自旋翻转过程的时间尺度称为**相干时间**，它衡量量子比特在被自旋翻转过程破坏之前的“寿命”。相干时间通常为几微秒（百万分之一秒），基本设定了在量子计算机上完成一个计算步骤的最大可用时间。


    ### 退相干：能量弛豫过程


    退相干的第二个非常重要的来源与著名的海森堡不确定性原理有关，我们从第`2.2.1`节了解到该原理，它禁止同时精确确定量子力学粒子的动量和空间位置。但由于量子力学粒子的动量和空间位置总是存在一定的不确定性，它们的运动也无法非常精确地定义。换句话说，微观尺度上的自然总是在运动，量子力学粒子总是在抖动。这种量子力学对象的随机运动可以与一种运动能量相关联，这种能量可以与量子比特的宿主环境进行交换。量子比特与其宿主环境之间的这种随机能量交换被称为**量子涨落**，它引发了量子计算机中第二个最重要的退相干机制。'
  raw: 'Without going into any mathematical details, this problem is generally overcome
    by using entanglement as an additional quantum resource that allows us to correlate
    the binary input and output values (or state vectors) of our calculation. Entanglement
    adds a label to the partial results associated with step 1 and step 2 if you wish,
    which allows us to identify whether the result of our calculation belongs to step
    1 or step 2\. The final results of step 1 and step 2 can then be obtained by carrying
    out multiple measurements on the superposition state in Equation [2.8](#505424_1_En_2_Chapter.xhtml#Equ8).
    The same principle holds for more complex calculations with more than two steps.


    In a quantum computer, such calculations are practically implemented by quantum
    logic gates in analogy to its classical relatives. From Section 1.4.2, we know
    that a logic gate – whether classical or quantum – is a physical structure that
    takes a set of inputs and combines them to a single output. The most important
    difference between classical and quantum logic gates is mathematically called
    *reversibility* . Quantum logic gates are reversible as they preserve quantum
    correlations, such as superposition and entanglement. Hence, their input can always
    be reconstructed based on the output, which is generally not possible with classical
    logic gates since different input values may have the same output value as shown
    in Table 1-1\. In other words, quantum logic gates do not lose any information
    passed through them – they keep the information and its correlations safely sealed
    throughout the entire computation. This is a very important property of quantum
    logic gates since it allows us to conduct logic operations on superpositioned
    and entangled qubits, which is – as we know from our previous example – an important
    prerequisite for leveraging the full power of quantum information processing.


    Without going into any details, the most important quantum logic gates are the
    (1) Hadamard gate, (2) controlled-NOT gate, and (3) Toffoli gate [[15](#505424_1_En_2_Chapter.xhtml#Par211)].
    The *Hadamard gate* is particularly important as it allows for putting two qubits
    into a superposition. For this purpose, it employs a certain type of light – electromagnetic
    radiation, such as laser light or microwave pulses – to manipulate the quantum
    states of the qubits involved. By combining different quantum logic gates, we
    can build up all kinds of quantum algorithms to tackle different computational
    problems.


    In conclusion, a quantum computer employs superposition and entanglement to conduct
    multiple computational steps at the same time, which is why quantum computing
    is sometimes described in terms of *massively parallel computing* and the next
    frontier of supercomputing. It provides exponential gains in memory capacity and
    speed. A 300-qubit register, for example, could store 2^(300) binary numbers and
    thus more combinations than there are particles in the entire universe! This tremendous
    increase in memory capacity and computational power is why quantum computing –
    even if it is not fully mature yet – is expected to revolutionize the supercomputing
    space in the not-too-far future.


    ### 2.2.3 The Fussy Search for the Perfect Qubit


    As so often with science, theory is much easier than practice. This is likewise
    the case for quantum computing where scientists face major technological challenges
    during the physical implementation of suitable qubits. Most challenges are related
    to a process called *decoherence* , a disturbing process of “degradation” by which
    the information encoded in qubits is corrupted and degraded to random noise –
    such quantum computers are therefore said to be “noisy.”


    Noise, by the way, is hazardous in classical computing, too, but easy to deal
    with since we can just keep two or more backup copies of each bit so that any
    changes stand out as the odd ones. This strategy based on backup copies cannot
    be employed in quantum computers though since any attempt to copy a quantum state
    ultimately involves making a measurement to see what we want to duplicate. But
    a measurement – as we know from Section 2.2.1 – causes the wave function to collapse,
    thereby destroys superposition and entanglement, and causes the quantum information
    to be irreversibly lost. This fundamental principle that we cannot copy (or clone)
    quantum states is called *non-cloning theorem* [[16](#505424_1_En_2_Chapter.xhtml#Par212),
    [17](#505424_1_En_2_Chapter.xhtml#Par213)], which does not make the operation
    of quantum computers easier.


    Decoherence is generally induced by interactions between qubits and their hosting
    environment. It is generally promoted by all kinds of timely variations, such
    as mechanical vibrations, temperature fluctuations, and oscillating electromagnetic
    stray fields emitted by electronic devices in the surrounding laboratory. Physicists
    do generally differentiate between decoherence-induced spin-flip and energy relaxation
    processes, which are both explained briefly in the following due to their great
    relevance for the physical implementation of quantum computers.


    #### Decoherence: Spin-Flip Process


    The first decoherence mechanism we consider is the so-called *spin-flip* process
    . In case of electron spins, this process simply alters the spin state of a qubit
    and induces a transition from |↑〉 to |↓〉 or vice versa. All of this occurs randomly
    and destroys all physical correlations within the quantum computer, which is why
    its result will be nothing more than random noise. The timescale on which such
    spin-flip processes occur is referred to as *coherence time* and measures the
    “lifetime” of a qubit prior to its distortion by spin-flip processes. The coherence
    time typically amounts to a few microseconds (one millionth of a second) and basically
    sets the maximum time being available for completing one computational step on
    a quantum computer.


    #### Decoherence: Energy Relaxation Process


    The second very important source of decoherence is related to the famous Heisenberg
    uncertainty principle, which we know from Section 2.2.1 and forbids that the momentum
    and spatial position of a quantum mechanical particle can be determined accurately
    at the same time. But since the momentum and spatial position of quantum mechanical
    particles are both always subject to some uncertainty, their motion cannot be
    defined very accurately, too. In other words, nature on its miniature scale is
    always in motion, and quantum mechanical particles do always jitter. This random
    motion of quantum mechanical objects can be associated with a motional energy
    that can be exchanged with the qubit’s hosting environment. The random exchanges
    of energy between qubits and their hosting environment are called *quantum fluctuations*
    that give rise to the second most important decoherence mechanism in quantum computers.'
