  trans: '

    ### 1.3.3 数字关键技术


    前述示例已表明，**数字化**、**数字化转型**以及**数字变革**建立在不同的支持技术之上。数字化从三大类用于数据创建、聚合和收集的设备与系统中获取数据。第一类是数字输入设备，例如计算机键盘或图像扫描仪，它们能够促进信息从模拟向数字的直接转换。信息物理系统包含传感器，是第二大信息来源。它们用于实时监控工业生产线上物理对象和过程，包括测量能耗的智能电表、辅助工人的可穿戴设备，或检测机器中工件是否存在的光传感器。第三类则是组织内外的数据库和网络，例如私有内部网和公共互联网。数字输入设备、信息物理系统以及数据库和网络是最重要的信息来源，也是典型数据聚合基础设施的基础，如图
    1-4 中的扩展金字塔所示。


    ![../images/505424_1_En_1_Chapter/505424_1_En_1_Fig4_HTML.png](img/505424_1_En_1_Fig4_HTML.png)


    **图 1-4** 数字化、数字化转型和数字变革（深灰色）之间的关系，以及它们在聚合、分析和变现数据（浅灰色）方面的赋能因素。所有数字技术的基础是数据聚合系统，它负责将模拟数据转换为数字数据。


    从这些来源获得的数据通常存储在一个数据聚合平台或数据湖上，以便进行数据处理。^(¹⁸) 这正是本书介绍的三大焦点技术发挥作用的地方。量子计算、区块链技术和人工智能，使我们能够处理、分析并最终将数据变现。它们是公共和私营部门实现数字化转型和数字变革最重要的赋能技术，也是让数据创造利润的先决条件。包括量子计算、区块链技术和人工智能在内的数字技术可以通过三种方式创造价值：它们（1）通过自动化等方式降低成本；（2）通过推动销售和效率等方式增加收入；（3）创造新的业务线。组织可以通过建立自身内部资源和能力，或通过订阅云计算服务来使用这些支持技术，我们将在第
    5 章“你的数字化转型行动计划”中详细讨论。云计算——在这里需要说明的是——是一种 IT 基础设施，它通过互联网按需提供不同的计算服务。云计算不仅为常规的数据存储和处理提供资源，也提供更先进的数字技术，如量子计算、区块链技术和人工智能。最流行的云计算供应商是
    AWS、Microsoft Azure、Google Cloud 和 IBM Cloud。


    量子计算有时被描述为计算领域的前沿，因为它能够解决非常复杂且计算密集型的商业问题。另一方面，区块链技术是通过加密且可信的数据库来管理信息的概念性突破，这些数据库使得加入分布式区块链网络的任何人都可以使用数据。在这三者中，人工智能可能是最受欢迎的支持技术。它能够从大数据中推断模式，以简化、优化和自动化业务流程，包括制造和行政流程。围绕这些技术的大量炒作，源于媒体上众多关于理论可能性与现实可实现性对比的文章和报道。美国科学家和未来学家罗伊·阿马拉曾就此指出：“我们（人们）倾向于高估一项（新）技术在短期内的影响，而低估其长期影响。”这一观察后来被称为阿马拉定律。


    全球研究与咨询公司 Gartner 根据新兴技术获得的公众关注度，分析了技术采用的不同阶段。其结果是 Gartner 的“技术成熟度曲线”[47]，该曲线定性地描述了技术采用所经历的五个阶段，如图
    1-5 所示：


    1.  **技术触发期**：技术成熟度曲线的起点。由一项技术的公开引入开始，该技术在公众和媒体中引发了日益增长的兴趣。


    2.  **期望膨胀高峰期**：与新兴技术相关的期望和希望超越了其能力的现实情况。以互联网的引入为例，这种炒作体现在 2001 年突然破裂的“互联网泡沫”中。


    3.  **泡沫破裂幻灭期**：泡沫破裂的结果，最初对技术潜在价值的兴奋被幻灭所取代。


    4.  **稳步爬升复苏期**：随着早期采用者克服初步障碍，找到新兴技术有价值的应用，从而吸引越来越多的追随者，兴趣重新增长。


    5.  **生产成熟期**：技术成熟度曲线的最终阶段。随着越来越多的组织意识到一项技术的实际益处，并决定将其用于自身业务，采用率急剧上升。这种采用率的急剧上升在图形上类似于曲棍球棒曲线。


    ![../images/505424_1_En_1_Chapter/505424_1_En_1_Fig5_HTML.png](img/505424_1_En_1_Fig5_HTML.png)


    **图 1-5** Gartner 技术成熟度曲线的五个阶段，以及量子计算、人工智能和区块链技术的当前状态。转载自[48]


    Gartner 会定期更新其品牌化的技术成熟度曲线，最新版本（2018 年）可在[48]上获取。该曲线显示，量子计算目前即将进入第二阶段，区块链技术处于第三阶段。人工智能目前正处于第二阶段的顶峰，这解释了它目前在媒体上的高人气和高度关注。Gartner
    技术成熟度曲线因其缺乏实证支持以及与实践中技术采用情况不完全匹配而受到一些人的批评。然而，它确实为理解媒体如何认知技术以及如何解读相关文章和新闻提供了有用的参考。

    '
- fmt: '`S-curve`（S 曲线）是描述技术采用在行业层面，其销售额和收入随时间发展的一个常见工业模式，而 Gartner 的炒作周期则从媒体关注度和公众期望的角度来描述技术采用。该模式揭示了三个主要阶段，如图
    [1-6](#505424_1_En_1_Chapter.xhtml#Fig6) 所示。第一阶段由早期采用者主导，他们探索和试验新技术，以找出其潜在用例以及最适合客户需求的实用“主导设计”（或“行业标准”）——在这一所谓的“涌现阶段”，相关的销售额和收入都很低。随着主导设计的出现，越来越多的公司追随技术趋势，使得销售额和收入在“增长阶段”急剧增加。随着越来越多的公司采用新技术，市场竞争加剧，迫使一些公司退出。这种洗牌是“成熟阶段”的开始，在此阶段，增长率下降，销售额和收入趋于饱和。这个阶段以另一种技术的出现而结束，这种技术颠覆了市场，标志着一个旧技术
    S 曲线的结束和一个新技术 S 曲线的开始。同样的模式也将在量子计算、区块链技术和人工智能中观察到。例如，后者预计到 2025 年将成为一个价值 1260
    亿美元的业务 [[49]](#505424_1_En_1_Chapter.xhtml#Par252)。


    ![../images/505424_1_En_1_Chapter/505424_1_En_1_Fig6_HTML.png](images/505424_1_En_1_Chapter/505424_1_En_1_Fig6_HTML.png)


    图 1-6


    新技术随时间推移的典型销售额或收入演变（黑线）呈现 S 曲线形态，并经历三个不同阶段。虚线描绘了在每个阶段与该技术相关的公司数量。


    ### 1.3.4 Google、Amazon 等公司的创新模式


    为了更好地全面理解数字化转型，有必要简要了解 Google、IBM 和 Amazon 为实现自身持续数字化转型而实施的创新模式。让我们从强调 Google
    创新模式的几个方面开始。Google 的业务始终由数据、网络和软件驱动。从将世界上最好的搜索算法商业化开始，Google 很快转向开发和增强其广告技术。此外，它还将
    Android 变成了世界上最受欢迎的软件平台，并最近成功推出了其新颖的云计算业务。如果没有其独特的创新模式，这一切都不可能实现。据报道，该模式依赖于以下九条创新原则
    [[50]](#505424_1_En_1_Chapter.xhtml#Par253)]:


    1.  创新无处不在，来自公司内外、自上而下、自下而上，以及你最意想不到的地方。

    2.  专注于用户或客户，稍后再考虑赚钱问题。

    3.  在改进事物时，力求做到十倍好，迫使自己跳出固有思维模式——仅 10% 的改进只会带来渐进式变化。

    4.  押注于那些独特并能引领重大创新的技术洞察。

    5.  尽早并频繁地发布和迭代你的产品，不要等到它们完美无缺。让用户根据他们的反馈帮助你迭代改进产品和服务。

    6.  给予员工 20% 的工作时间，让他们追求自己热衷的项目，Google 的首席社交布道师 Gopi Kallayil 曾说过，“他们富有创意的思考会令你惊喜。”

    7.  默认采用对所有用户开放的程序，以最终激发整个用户群的集体能量。

    8.  善于失败并从中学习，因为失败是业务不可或缺的一部分，也是长期创新的成功之道。

    9.  拥有一个能引起人们共鸣且至关重要的使命或愿景。


    从这一套非常通用的原则中，我们可以推断出 Google 的创新文化非常开放、技术驱动，并且完全以客户为中心——这也是我们从 Microsoft 对数字化转型的定义中知道的三个方面。然而，Google
    的一个关键成功因素在于其将科学人才引入其创新生态系统，并整合新想法和技术的独特方式。为此，Google 每年都会邀请数十名顶尖研究人员在公司度过一个休假年。最近公布的一个例子是美籍华裔计算机科学家和企业家
    Andrew Ng，他于 2011 年在他的休假期间来到 Google。在他第一次访问期间，他启动了“Google 大脑项目”，并在此基础上为 Google
    Cloud 的人工智能服务奠定了基础。据报道，Google 在这个业务部门开发了超过一千种不同的工具，其应用包括在线搜索、广告、地图、电子邮件、翻译和驾驶等
    [[51]](#505424_1_En_1_Chapter.xhtml#Par254)。人工智能（我们将在第 4 章“人工智能”中更详细地讨论）是当今 Google
    非常成功且盈利的云计算服务的核心，其年收入超过 80 亿美元，约占 Google Alphabet 2019 年总收入的 19%。事实上，Google 很早就被迫研究人工智能和大数据分析，以跟上为其搜索引擎索引和标记网站的步伐，该引擎正以惊人的指数级速度增长，如今每秒处理超过
    40 万次搜索或每天处理 35 亿次查询。'
  raw: 'While Gartner’s hype cycle describes technology adoption in terms of media
    attention and public expectations, the *S-curve* describes it on an industry level
    in terms of the development of sales and revenue over time. This common industrial
    pattern reveals three main phases as shown in Figure [1-6](#505424_1_En_1_Chapter.xhtml#Fig6).
    The first phase is dominated by early adopters that explore and experiment with
    a new technology to figure out its potential use cases and a practical *dominant
    design* (or “industry standard”) that best fits the customer’s needs – sales and
    revenue associated with it are low in this so-called *emergent phase* . With the
    emergence of a dominant design, more and more companies pick up the technological
    trend so that sales and revenue increase sharply during this *growth phase* .
    As more and more companies employ a novel technology, the market becomes more
    competitive and forces the one or other company to leave. This shakeout is the
    beginning of the *mature phase* , where growth rates decline and sales and revenue
    saturate. This phase ends with the appearance of another technology that disrupts
    the market and marks the end of the old and beginning of a new technological S-curve.
    The same pattern will be observed in case of quantum computing, blockchain technology,
    and artificial intelligence. The latter, for instance, is expected to be a USD
    126 billion business by 2025 [[49](#505424_1_En_1_Chapter.xhtml#Par252)].


    ![../images/505424_1_En_1_Chapter/505424_1_En_1_Fig6_HTML.png](images/505424_1_En_1_Chapter/505424_1_En_1_Fig6_HTML.png)


    Figure 1-6


    The typical evolution of sales or revenue associated with a new technology over
    time resembles an S-curve (black line) and goes through three different phases.
    The dashed line depicts the number of firms that are associated with the technology
    in each phase


    ### 1.3.4 Innovation Models of Google, Amazon & Co.


    For a better and comprehensive understanding of digital transformation, it is
    instructive to have a brief look at the innovation models that Google, IBM, and
    Amazon have implemented to digitally transform themselves continuously. Let us
    begin with highlighting a few aspects of Google’s innovation model. Google’s business
    has always been driven by data, networks, and software. Starting off with commercializing
    the world’s best search algorithm, Google soon moved on to develop and enhance
    its advertising technology. Furthermore, it turned Android into the world’s most
    popular software platform and recently launched its novel cloud computing business
    successfully. All of this would not have been possible without its unique innovation
    model that is reported to rely on the following nine principles of innovation
    [[50](#505424_1_En_1_Chapter.xhtml#Par253)]:


    1.  Innovation comes from everywhere, inside and outside a company, bottom up,
    top down, and in the places you least expect.


    2.  Focus on the user or customer, and worry about the money later.


    3.  Aim to be ten times better when improving things, and force yourself to think
    outside the box – an improvement by 10% only causes incremental change.


    4.  Bet on technical insights that are unique and can lead to major innovations.


    5.  Ship and iterate your products often and early, and do not wait until their
    perfection. Let users help you to iteratively improve your products and services
    based on their feedback.


    6.  Give employees 20% time of their work time to pursue their own projects they
    are passionate about, and “they will delight you with their creative thinking,”
    Google’s chief social evangelist Gopi Kallayil once said.


    7.  Default to processes that are open to all users to ultimately foster the collective
    energy of the entire user base.


    8.  Fail well and learn from your failures since they are an integral part of
    business and the way to innovate and be successful on a long term.


    9.  Have a mission or vision that matters and resonates with people.


    From this set of very general principles, we can infer that Google’s innovation
    culture is very open, technology driven, and entirely focused on the customer –
    three aspects we know from Microsoft’s definition of digital transformation, too.
    One of Google’s key success factors is, however, the unique way it injects scientific
    talent and integrates new ideas and technologies into their innovation ecosystem.
    For this purpose, Google invites dozens of top researchers to spend a sabbatical
    at the company every year. One of the latest published examples is the Chinese-American
    computer scientist and entrepreneur Andrew Ng, who came to Google on his sabbatical
    in 2011\. During his first visit, he started the “Google brain project” and therein
    developed the foundational basis for Google Cloud’s artificial intelligence services.
    Google has been reported to develop more than a thousand different tools in this
    business unit with applications including, inter alia, online search, ads, maps,
    email, translation, and driving [[51](#505424_1_En_1_Chapter.xhtml#Par254)]. Artificial
    intelligence, which we will discuss in more detail in Chapter [4](#505424_1_En_4_Chapter.xhtml),
    “Artificial Intelligence,” is at the heart of Google’s very successful and profitable
    cloud computing service today with an annual revenue of more than USD eight billion
    or about 19% of Google Alphabet’s total revenue in 2019\. Google was in fact forced
    to investigate artificial intelligence and big data analytics early on in order
    to keep up with indexing and labeling websites for its search engine, which has
    been growing at a staggering exponential rate with more than 400,000 searches
    per second or 3.5 billion queries on a daily basis today.'
  trans: '

    `S-curve`（S 曲线）是描述技术采用在行业层面，其销售额和收入随时间发展的一个常见工业模式，而 Gartner 的炒作周期则从媒体关注度和公众期望的角度来描述技术采用。该模式揭示了三个主要阶段，如图
    1-6 所示。第一阶段由早期采用者主导，他们探索和试验新技术，以找出其潜在用例以及最适合客户需求的实用“主导设计”（或“行业标准”）——在这一所谓的“涌现阶段”，相关的销售额和收入都很低。随着主导设计的出现，越来越多的公司追随技术趋势，使得销售额和收入在“增长阶段”急剧增加。随着越来越多的公司采用新技术，市场竞争加剧，迫使一些公司退出。这种洗牌是“成熟阶段”的开始，在此阶段，增长率下降，销售额和收入趋于饱和。这个阶段以另一种技术的出现而结束，这种技术颠覆了市场，标志着一个旧技术
    S 曲线的结束和一个新技术 S 曲线的开始。同样的模式也将在量子计算、区块链技术和人工智能中观察到。例如，后者预计到 2025 年将成为一个价值 1260
    亿美元的业务 [[49]](#505424_1_En_1_Chapter.xhtml#Par252)。


    ![../images/505424_1_En_1_Chapter/505424_1_En_1_Fig6_HTML.png](img/505424_1_En_1_Fig6_HTML.png)


    图 1-6


    新技术随时间推移的典型销售额或收入演变（黑线）呈现 S 曲线形态，并经历三个不同阶段。虚线描绘了在每个阶段与该技术相关的公司数量。


    ### 1.3.4 Google、Amazon 等公司的创新模式


    为了更好地全面理解数字化转型，有必要简要了解 Google、IBM 和 Amazon 为实现自身持续数字化转型而实施的创新模式。让我们从强调 Google
    创新模式的几个方面开始。Google 的业务始终由数据、网络和软件驱动。从将世界上最好的搜索算法商业化开始，Google 很快转向开发和增强其广告技术。此外，它还将
    Android 变成了世界上最受欢迎的软件平台，并最近成功推出了其新颖的云计算业务。如果没有其独特的创新模式，这一切都不可能实现。据报道，该模式依赖于以下九条创新原则
    [[50]](#505424_1_En_1_Chapter.xhtml#Par253)]:


    1.  创新无处不在，来自公司内外、自上而下、自下而上，以及你最意想不到的地方。

    2.  专注于用户或客户，稍后再考虑赚钱问题。

    3.  在改进事物时，力求做到十倍好，迫使自己跳出固有思维模式——仅 10% 的改进只会带来渐进式变化。

    4.  押注于那些独特并能引领重大创新的技术洞察。

    5.  尽早并频繁地发布和迭代你的产品，不要等到它们完美无缺。让用户根据他们的反馈帮助你迭代改进产品和服务。

    6.  给予员工 20% 的工作时间，让他们追求自己热衷的项目，Google 的首席社交布道师 Gopi Kallayil 曾说过，“他们富有创意的思考会令你惊喜。”

    7.  默认采用对所有用户开放的程序，以最终激发整个用户群的集体能量。

    8.  善于失败并从中学习，因为失败是业务不可或缺的一部分，也是长期创新的成功之道。

    9.  拥有一个能引起人们共鸣且至关重要的使命或愿景。


    从这一套非常通用的原则中，我们可以推断出 Google 的创新文化非常开放、技术驱动，并且完全以客户为中心——这也是我们从 Microsoft 对数字化转型的定义中知道的三个方面。然而，Google
    的一个关键成功因素在于其将科学人才引入其创新生态系统，并整合新想法和技术的独特方式。为此，Google 每年都会邀请数十名顶尖研究人员在公司度过一个休假年。最近公布的一个例子是美籍华裔计算机科学家和企业家
    Andrew Ng，他于 2011 年在他的休假期间来到 Google。在他第一次访问期间，他启动了“Google 大脑项目”，并在此基础上为 Google
    Cloud 的人工智能服务奠定了基础。据报道，Google 在这个业务部门开发了超过一千种不同的工具，其应用包括在线搜索、广告、地图、电子邮件、翻译和驾驶等
    [[51]](#505424_1_En_1_Chapter.xhtml#Par254)。人工智能（我们将在第 4 章“人工智能”中更详细地讨论）是当今 Google
    非常成功且盈利的云计算服务的核心，其年收入超过 80 亿美元，约占 Google Alphabet 2019 年总收入的 19%。事实上，Google 很早就被迫研究人工智能和大数据分析，以跟上为其搜索引擎索引和标记网站的步伐，该引擎正以惊人的指数级速度增长，如今每秒处理超过
    40 万次搜索或每天处理 35 亿次查询。

