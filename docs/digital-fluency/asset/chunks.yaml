    ## 历史上的业务转型


    科技始终在塑造着商业与社会。研究这种相互依存关系的历史学家提出，人类经历了四次重大的*技术采用浪潮*，每一次浪潮都伴随着社会的剧烈变革和产业生产力的提升 [4]。第一次大浪潮与蒸汽机有关，它由英国军事工程师托马斯·萨弗里上尉于
    1698 年发明，能将沸腾水产生的蒸汽转化为机械能。蒸汽机最初是为了从煤矿业中被淹没的矿井中抽水而发明的 [5]，但很快也催生了其他工业领域的技术创新。例如，蒸汽机被用于驱动英国纺织业的机械化织布机，与简单的手纺车相比，生产力提升了八倍。然而，蒸汽机的应用不仅局限于采矿业和纺织业。大约一百年后，随着蒸汽轮船和蒸汽机车的出现，它还彻底改变了运输业。这两项创新带来了进一步的巨大变化，因为从那时起，人类和货物可以在更短的时间内实现远距离移动。1760
    年至 1840 年^(²)这段时期被称为*工业革命*或工业 1.0。在制造业和运输业中采用蒸汽和水力，对现有公司产生了深远的影响，也促进了新业务的拓展，因为人类的创造力不再受限于纯粹的肌肉力量。但工业革命也通过创造新的工作岗位和职业（例如制造业领域的机械维护工程师和质量工程师），以及用自动化流程取代体力劳动，对社会产生了重大影响。其结果是，这第一次技术采用浪潮提高了生活水平，使整个欧洲减少了对农业的依赖，并以（消费）商品的大规模生产为核心——这其中利弊并存。


    进入 19 世纪，三位物理学家安德烈-玛丽·安培、迈克尔·法拉第和詹姆斯·克拉克·麦克斯韦的开创性工作为下一次技术采用浪潮奠定了基础，这一浪潮涉及电力的发现，被称为*技术革命*或工业
    2.0。电被证明是一种非常便捷的方式，能以最小损耗远距离传输大量能量（即执行工作的物理能力），从而为灯泡、重型工业机器和其他电子设备供电。它还启发了汽车先驱亨利·福特，他将电力与大规模生产的概念相结合，并于
    1913 年从他的高地公园福特工厂开始，将移动式底盘装配线引入汽车工业。^(³)传统上，汽车是在固定工位进行装配，由不同的工人来到车辆旁交付和组装所需的部件。而在装配线上，车辆会在自动传送带上依次经过一系列工位，工人们则固定在各自位置，执行高度专业化、重复且标准化的装配任务。在美国工程师弗雷德里克·泰勒及其被称为*泰勒制*的高效工作流程控制原则的帮助下，亨利·福特成功地将他那传奇的
    T 型车（被亲切地称为“锡丽兹”）的装配时间缩短了十分之九，这一改进极大地降低了制造成本。关于标准化，亨利·福特曾指出：“任何顾客都可以将汽车漆成他想要的任何颜色，只要它是黑色的。”电力驱动的装配线很快几乎在所有行业中提高了生产力，同时大幅降低了制造成本和工人的体力负担。毋庸置疑，在
    1840 年至 1970 年间，电力和装配线的引入对社会产生了重大影响，它们在制造业领域创造了大量新的工作和职业，同时也淘汰了其他一些岗位。


    与本书介绍的数字化技术尤为相关的是第三次技术采用浪潮，即所谓的*信息革命*或工业 3.0。从 20 世纪 70 年代开始，公司开始通过存储程序控制器（个人计算机的前身）来实现工业制造的自动化。通过采用这种计算机控制，它们能够在没有任何人工协助的情况下部分实现生产流程的自动化。这项技术的理论基础可以追溯到
    1947 年，当时三位美国物理学家及后来的诺贝尔奖得主约翰·巴丁、威廉·肖克利和沃尔特·布拉顿在美国新泽西州著名的贝尔实验室发现了晶体管。这种微小的电子开关，我们将在后文进一步详细研究，它很快成为了个人计算机以及几乎所有利用微芯片处理数字信息来控制制造过程的电子设备的基本构建模块。IBM
    首款基于晶体管技术的商业化产品是 IBM 608 系统，这是一个橱柜大小的会计计算器，总计包含 3000 多个晶体管。相比之下，我们今天使用的计算机和电子设备在应用上更强大、更多样化，并且一个微芯片中可能包含数十亿个晶体管。

    '
- fmt: '# We are currently preparing for the fourth wave of technology adoption, the
    so-called `*cyber revolution*` or industry 4.0.^([⁴](#fn4)) This period after
    2017 generally refers to the application of information and communication technologies
    to industry. Industry 4.0 advances computer-controlled production systems by combining
    them with modern communication technologies to form a network of connected sensors
    and computing devices that allow for implementing something called `*digital twin*`.
    This virtual computer representation of a production line allows for the real-time
    optimization and statistical process control of production, allowing products
    to navigate through production lines autonomously while aiming to find the best
    production resources automatically. Such a network is also referred to as `*Internet
    of Things*` (`IoT`) and characterized by an interconnected system of electronic
    sensors and devices that is capable of automated sensing, data processing, analytics,
    and execution. The industrial Internet of things entirely changes the way people
    and machines interact with each other. Just think about intelligent collaborative
    robots that employ advanced sensing technologies to collaborate with workers safely
    to support them in performing complicated assembly tasks or handling heavy products.
    Further to this automation, the industrial Internet of things does also allow
    for implementing cost-effective predictive maintenance processes, self-optimizing
    production lines, automated inventory management, and other industrial processes
    that lend themselves well for an automated process control.^([⁵](#fn5)) The Internet
    of things is also expected to foster the implementation of `*smart factories*`
    [[8](#505424_1_En_1_Chapter.xhtml#Par210)], in which the production system nearly
    operates autonomously and decision-making processes get automized by data analytics
    and other digital support technologies. An industrial IoT can either be implemented
    by leveraging computational resources on premise or by using external resources
    on demand, such as `Siemens MindSphere`, `AWS IoT`, and `Google IoT`.


    ## Internet Of Things


    The Internet of things is a network of connected objects that build an aware,
    autonomous, and actionable system. The data obtained from the different objects
    is aggregated on a storage platform to make it available for data analysis services
    and functions that combine different sources of raw data, analyze their jointly
    meaning, and translate it into concrete actions.


    In this context, the renowned American economist and Harvard Business School professor
    Michael Porter – whose book about competitive strategy became a classic in the
    field^([⁶](#fn6)) – already speculated back in 2014 that “it is the expanded capabilities
    of smart, connected products and the data they generate that are ushering in a
    new era of competition” [[9](#505424_1_En_1_Chapter.xhtml#Par211)]. Data is the
    new oil as `*The Economist*` described it [[10](#505424_1_En_1_Chapter.xhtml#Par212)],
    and the existential threat to established organizations that do not adapt those
    digital technologies is in fact very real [[11](#505424_1_En_1_Chapter.xhtml#Par213)].


    ## 1.2 Innovation and Disruption Theory


    The attentive reader may have noticed in our previous discussion that the technologies
    that gave rise to the four waves of technology adoption, such as the steam engine,
    electricity, and the transistor, have three aspects in common. All of them


    1.  Are `*pervasive*` in their nature and not limited to a specific industrial
    sector. They rather branch out progressively to seed other technological innovations
    and trigger various spillover effects.


    2.  Offer significant `*improvements*` on the status quo in terms of technology,
    productivity, cost, and speed among others.


    3.  Are `*complementary*` to other (existing) technologies, such as steam engines
    that are for weaving looms or transistors for assembly lines.


    This is why economists who study the linkage between scientific progress and technical
    change also call such technologies `*general-purpose technologies*` due to their
    generic nature and versatile applications across multiple sectors [[12](#505424_1_En_1_Chapter.xhtml#Par214)].
    General-purpose technologies are typically nonrival and long lasting and play
    the role of `*enabling technologies*` by opening up new opportunities and catalyzing
    new waves of complementary innovations rather than offering complete and final
    solutions [[13](#505424_1_En_1_Chapter.xhtml#Par215)] – a transistor on its own
    would in fact be fairly useless. The Internet is an excellent example for a general-purpose
    technology as it introduced new ways of producing, distributing, accessing, and
    reusing digital information that enabled innovations like online marketplaces
    and social networking platforms.


    The adaptation of general-purpose technologies in established and `*incumbent
    organizations*` requires major organizational changes inside them as they typically
    focus on doing one specific thing in a very efficient way over time. For this
    purpose, they develop routines, built bureaucracies, career path, incentive systems,
    and embedded normative systems. Furthermore, they implement processes and establish
    legacy systems that reinforce each other and foster inertia, which make it increasingly
    difficult to adapt new technologies that often foster an organization to do things
    differently. This is why general-purpose technologies are a particular threat
    for established and very successful organizations, in particular. By referring
    to this widespread behavioral pattern, the two American economists Rebecca Henderson
    and Kim Clark also called such innovations `*architectural innovations*` to emphasize
    that their adaptation requires organizations to change the architecture between
    different internally used technological components and systems [[14](#505424_1_En_1_Chapter.xhtml#Par216)].
    This can be very challenging for organizations but is often rewarding in the end.
    The concept of architectural inertia – the resistance to technology adaptation
    – also informed the `*disruption theory*` of Clayton Christensen and Joseph Bower
    at Harvard University in 1995 [[15](#505424_1_En_1_Chapter.xhtml#Par217)]. The
    two American economists were studying the hard-disk drive industry at that time
    and asking themselves why certain companies managed to gain and retain competitive
    advantage by adapting new technologies while others failed to do so and went bankrupt.
    In their concept, they differentiate two major categories:


    1.  `*Sustaining technologies*` improve or enhance the attributes of an existing
    technology or product that customers already value. They (i) make good products
    better, (ii) usually target the most profitable customers at the market’s high
    end, and (iii) improve the profit margin. In other words, sustaining technologies
    enable better products that can be sold for higher profits to the best customers
    of a company. One example is flat-screen TVs that merely replaced TVs based on
    vacuum tube technology.'
  raw: 'We are currently preparing for the fourth wave of technology adoption, the
    so-called *cyber revolution* or industry 4.0.^([⁴](#fn4)) This period after 2017
    generally refers to the application of information and communication technologies
    to industry. Industry 4.0 advances computer-controlled production systems by combining
    them with modern communication technologies to form a network of connected sensors
    and computing devices that allow for implementing something called *digital twin*
    . This virtual computer representation of a production line allows for the real-time
    optimization and statistical process control of production, allowing products
    to navigate through production lines autonomously while aiming to find the best
    production resources automatically. Such a network is also referred to as *Internet
    of Things* (IoT) and characterized by an interconnected system of electronic sensors
    and devices that is capable of automated sensing, data processing, analytics,
    and execution. The industrial Internet of things entirely changes the way people
    and machines interact with each other. Just think about intelligent collaborative
    robots that employ advanced sensing technologies to collaborate with workers safely
    to support them in performing complicated assembly tasks or handling heavy products.
    Further to this automation, the industrial Internet of things does also allow
    for implementing cost-effective predictive maintenance processes, self-optimizing
    production lines, automated inventory management, and other industrial processes
    that lend themselves well for an automated process control.^([⁵](#fn5)) The Internet
    of things is also expected to foster the implementation of *smart factories* [[8](#505424_1_En_1_Chapter.xhtml#Par210)],
    in which the production system nearly operates autonomously and decision-making
    processes get automized by data analytics and other digital support technologies.
    An industrial IoT can either be implemented by leveraging computational resources
    on premise or by using external resources on demand, such as Siemens MindSphere,
    AWS IoT, and Google IoT.


