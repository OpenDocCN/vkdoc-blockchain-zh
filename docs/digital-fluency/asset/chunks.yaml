    | 类型 | 出现年代 | 优点 (+) 和缺点 (−) |

    | --- | --- | --- |

    | 原始货币 | 公元前 | + 本身可直接使用 – 价值难以确定，不便携带，部分易腐烂 |

    | 贵金属 | 青铜时代 | + 不易腐烂，可铸造成基础工具，因稀有性而价值稳定 – 难以成型和铸造，不便携带 |

    | 铸币 | 8 世纪 | + 非常便携，不易腐烂，因原材料稀有而价值稳定 – 大量交易时体积庞大，易遭抢劫 |

    | 纸币 | 11 世纪 | + 非常便携，通过印刷易于规模扩展 – 无内在价值，易受通货膨胀影响，易遭抢劫和伪造 |

    | 记账货币 | 14 世纪 | + 非常便携，存储方便安全，交易简单 – 仅虚拟存在，无内在价值，无商品支撑，易受欺诈 |

    | 法定货币 | 20 世纪 | + 交易简单，通过密码学确保安全交易，货币政策由中央银行及其“官方法定货币”定义 – 仅虚拟存在，无内在价值，无商品支撑
    |

    | 加密货币 | 21 世纪 | + 交易非常简单，通过密码学确保高度安全交易，成本效益高，便于微支付，通过开放网络实现自我监管政策，无需中介即可转账 –
    因缺乏监管机构而无法控制通货膨胀，仅虚拟存在，无内在价值，无商品支撑 |


    相当有趣的是，数千年来人类迄今仅开采了约 16.3 万吨黄金，这只相当于一个边长约 20 米的立方体——这也是黄金仍被视为抗衰退货币的主要原因之一，正如我们在
    2008 年金融危机和 2020/21 年全球新冠疫情中所见。


    随着越来越多的人开始使用硬币进行交易，铸币的供应日益短缺。由于这种短缺，卖方开始允许买方延期付款，这通常通过汇票来记录。从 11 世纪的中国开始，不久后欧洲也跟进，这种汇票本身逐渐被接受为一种支付形式，于是*纸币*的概念应运而生。纸币非常便携，且在货币短缺时易于增发。但由于它实际上是无内在价值的第一种货币形式，因此极易受到严重通货膨胀的影响。正因如此，它在
    14 世纪被*记账货币*广泛取代，这是一种非物质化的货币形式，仅以数字形式存在于实体账簿或账户中。我们今天日常交易中最常用的货币被称为*法定货币*，这是一种由政府发行的、不以黄金或其他具有内在价值的商品为支撑的货币。相反，法定货币的价值由相应国家的*中央银行*控制，该政府机构负责发行国家官方货币，并通过增加或限制供应量来控制其价值及通货膨胀。


    ## 3.1.2 货币在社会中的基本功能


    这段简短的历史回顾揭示出，在更抽象的层面上，货币的主要目的是使双方之间能够进行有价资产的*可信交易*，无论他们是否彼此信任。换言之，货币在社会中通常执行以下四项关键功能：


    1.  *价值转移手段*：为商品和劳动的交换进行支付

    2.  *计价单位*：衡量商品和劳动的价值

    3.  *价值储藏手段*：为未来支出储蓄货币（即所谓的“储备金”）

    4.  *资金来源*：将货币投资于经济和商业发展


    印度创新策略师兼区块链倡导者卡里亚帕·比马亚在其畅销书《区块链替代方案：重新思考宏观经济政策与经济理论》[8]中，将货币称为“社会内部信任的物理体现”。我们将在下文中看到，恰恰是在不可信环境中这种信任的扩散，使得价值转移成为可能——这里的“价值”可以是从知识产权或所有权到比特币的任何事物——而这正是区块链技术的核心。因此，让我们深入探究区块链及其关键概念和应用。


    ## 3.2 区块链基础


    区块链技术和数字货币是被称为*分布式账本技术*的两种最重要的应用。分布式账本是一种在线数据库或登记册，其信息分布在由大量计算机和其他电子设备组成的大型网络中。作为一种簿记形式，账本在古代就已用于记录和记载涉及货币或其他实物资产的交易。它是一个永久性的摘要，按日期列出每笔交易，并记录已从一方转移到另一方的特定价值，如货币金额。虽然账本的核心思想与用途保持不变，但其物理实现形式随着时间演变，从青铜时代的泥板^(⁵⁴)，到中世纪的纸质登记册，再到数字时代的电子记录。


    我们熟悉的大多数账本，如土地登记册，都依赖于一个中心化权威机构。在这种情况下，土地登记处运营着一台中心化计算机或*服务器*，这使得登记册中的信息可供网络中所有其他用户或*客户端*访问，包括各地区土地登记处及其他相关政府机构。土地登记册就是所谓*中心化账本*的一个例子，在这种账本中，所有参与者都排列在一个*客户端-服务器网络*中，服务器扮演着单一控制权威的角色，它运营并控制着整个网络，类似于发行货币的主权政府。因此，该网络的所有用户都依赖于一个单一的主服务器，如图
    3-1 (a)所示。迄今为止，中心化账本是最常见的提供在线服务的网络，因此被包括亚马逊和 eBay 在内的各种组织所使用。如果未通过加密算法和备份服务器加以保护，中心化账本通常极易受到网络攻击，因为黑客只需要攻击并篡改中心服务器保存的账本文件，就能更改所有权记录或修改账户余额等。


    ![../images/505424_1_En_3_Chapter/505424_1_En_3_Fig1_HTML.jpg](img/505424_1_En_3_Fig1_HTML.jpg)


    图 3-1


    不同计算机组成的网络通常可以配置为三种形式：(a) 中心化网络有一个中心节点（带电脑图标的黑圈），该节点位于网络中心并通过虚线连接到所有其他节点（灰圈）。(b)
    去中心化网络有多个中心节点，每个节点都与其他一些节点相连。(c) 在分布式网络中，每个节点拥有平等权利，并与全部或部分其他节点相连。这种配置用于实现区块链。

