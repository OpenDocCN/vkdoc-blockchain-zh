- fmt: "### 3.4 Key Points\n\n*   Blockchain is a distributed ledger technology and\
    \ modern form of bookkeeping that allows for storing digital information. The\
    \ underlying data structure is immutable, append-only, traceable, trustable, tamperproof,\
    \ scalable, self-regulating, ordered, and secure.\n*   Blockchain technology allows\
    \ any two or more parties to forge agreements, make transactions, transfer value\
    \ without relying on intermediaries, verify identities, establish trust, and perform\
    \ other administrative tasks that are foundational to commerce today. Those tasks\
    \ include trading, contracting, clearing, settling, record keeping as well as\
    \ borrowing, storing, and lending valuable digital assets, for instance.\n*  \
    \ Blockchain technology builds on different enabling technologies, such as distributed\
    \ peer-to-peer networks, cryptographic hash functions, Merkle trees, digital signatures,\
    \ and public-key cryptography.\n*   By providing a single record of truth, the\
    \ unique data structure of a blockchain deploys trust in untrusted environments\
    \ and allows people, who neither know nor trust each other, to exchange with one\
    \ another in the absence of any third-party intermediate or middleman. This is\
    \ why blockchain technology is sometimes referred to as “ultimate trust machine.”\n\
    *   This exchange generally involves the transfer of digital information with\
    \ a monetary or nonmonetary value. The information in a blockchain transaction\
    \ is typically stored in coins (digital money) or tokens (digital assets).\n*\
    \   Blockchain technology has a range of applications in the public and private\
    \ sector. The most popular application is cryptocurrencies, such as Bitcoin and\
    \ Ethereum. The Bitcoin transaction process is organized in seven steps: (1) formation\
    \ of transaction message, (2) broadcasting the transaction file, (3) authorization\
    \ of transaction by comparing digital signatures, (4) pooling of transactions\
    \ and formation of the block, (5) broadcasting the new block, (6) validation of\
    \ the new block by proof of work, and (7) adding the block to the blockchain file.\n\
    *   Further to cryptocurrencies and fundraising, blockchain applications include\
    \ trading and payment services, supply chain management systems, anti-fraud detection,\
    \ trading platforms, identity and reputation management, insurance and risk management,\
    \ and governmental services including notary, audit, and taxation services.\n\n\
    ### 3.5 Blockchain Technology Framework\n\nAre you thinking about using blockchain\
    \ technology in your organization or applying it to your own use case? If the\
    \ answer to most of the key questions in the following implementation checklist\
    \ is “Yes,” blockchain technology may well assist you in implementing your own\
    \ business idea or use case.\n\n1.  What is your use case about? Does your use\
    \ case fit into one of the following generic categories? Yes □ No □\n    *   Auditing\n\
    \    *   Asset tracking\n    *   Value transaction\n    *   Cryptocurrencies\n\
    \    *   Identity management\n    *   Business process automatization\n    * \
    \  Documentation of ownership/authorship\n2.  Is there an ongoing business or\
    \ transaction process that can well be automated? Yes □ No □\n3.  Are there multiple\
    \ trustable or not trustable stakeholders in your process or value chain? Yes\
    \ □ No □\n4.  Is there a centralized intermediate or orbit of trust, who usually\
    \ reconciles disparate data? Yes □ No □\n5.  Is there a monetary or nonmonetary\
    \ value transfer? Yes □ No □\n6.  Is there any value in implementing an immutable\
    \ record or register? Yes □ No □\n7.  Do your business or internal processes require\
    \ or benefit from a high level of data integrity? Yes □ No □\n8.  Is the data\
    \ required for the implementation of your idea very valuable and unique? Do outsiders\
    \ have (economic) incentives to corrupt or distort it? Yes □ No □\n9.  Do you\
    \ have access to all human resources (e.g., project managers and code writers)\
    \ required for applying blockchain technology in your organization? Yes □ No □\n\
    \nFurther questions to be considered when planning your implementation:\n*   Which\
    \ regulatory framework do you have to comply to when implementing your blockchain?\n\
    *   Does your use case allow for using a public blockchain, or does it require\
    \ a private implementation?\n*   Can the blockchain be integrated into your existing\
    \ IT infrastructure, or do you need additional computational resources?\n*   Who\
    \ would need to run and maintain the different nodes?\n*   Who is expected to\
    \ use the application, and what expectations do they have?\n\n### 3.6 Further\
    \ Reading\n\nAt the end of this chapter, I would like to provide you with some\
    \ recommendations for further reading if you like to dive deeper into blockchain\
    \ technology and its applications:\n\n*   Drescher, D.: Blockchain Basics. A Non-Technical\
    \ Introduction in 25 Steps. Apress (2017).\n*   Shrier, D. L.: Basic Blockchain:\
    \ What It Is and How It Will Transform the Way We Work and Live. Robinson (2020).\n\
    *   Bashir, I.: Mastering Blockchain – Second Edition: Distributed ledger technology,\
    \ decentralization, and smart contracts explained. Packt (2018).\n*   CoinDesk.\
    \ [`www.coindesk.com/tag/blockchain-reports/`](https://www.coindesk.com/tag/blockchain-reports/).\n\
    *   Cointelegraph. [`www.cointelegraph.com/`](https://www.cointelegraph.com/)."
