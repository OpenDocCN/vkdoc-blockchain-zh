- fmt: '# The Turing Test and Its Philosophical Implications


    The Turing test soon gave rise to controversial disputes among scientists, as
    some of them argued that the test can be manipulated. One of its most famous critics
    is the American philosopher John Searle, who set up a thought experiment to highlight
    the flaws of the Turing test in 1980 [[10](#505424_1_En_4_Chapter.xhtml#Par248)].
    His experiment became known as `Chinese room` and describes two human players,
    one teacher and one learner of the Chinese language. Bob, the learner in this
    experiment, sits inside a closed room and is provided with several manuals that
    contain easy-to-use rules to translate Chinese characters into English. Outside
    the room is the teacher called Alice, who understands Chinese and submits different
    Chinese characters to Bob digitally and asks him to translate them. After some
    time and training, the experiment is finished, and Alice will get an accurate
    translation from Bob. Imagine now that Bob creates an intelligent computer program
    that allows for the translation of Chinese characters. John Searle argued that
    this computer program cannot be shown to be intelligent and understand Chinese
    since it has been programmed by Bob, who does not know the language at all. Hence,
    he concluded that no computer can have anything the man does not have, which seems
    to be a valid argument why we may not be able to implement what John Searle calls
    `strong AI` that surpasses human intelligence. With strong AI (also known as artificial
    general intelligence), he refers to an “appropriately programmed computer with
    the right inputs and outputs [that] would thereby have a mind in exactly the same
    sense human beings have minds” [[10](#505424_1_En_4_Chapter.xhtml#Par248)]. `Weak
    AI`, on the other hand, refers to a computer or program that is designed for a
    particular task only and unable to solve tasks it has not been trained for. Historically,
    John Searle’s work was a response to the pioneering work of the mathematician
    John McCarthy and his seminal article entitled “Ascribing Mental Qualities to
    Machines” one year before and argued the opposite case [[11](#505424_1_En_4_Chapter.xhtml#Par249)].
    This dispute about the philosophical implications of artificial intelligence is
    unresolved up to now and recently gave rise to a new area of research called `ethical
    AI`, which is beyond the scope of this book, unfortunately.


    ## Turing Test


    The Turing test is the most widely used scientific method to access a computer’s
    ability to think and behave intelligently.


    ## 4.1.2 The Conference That Started It All


    John McCarthy, who is frequently considered as the “founding father of AI” together
    with Alan Turing, started his career a couple of years earlier than John Searle.
    After two short-term appointments at Princeton and Stanford University, he became
    an assistant professor of mathematics at the famous Dartmouth College, one of
    the nine oldest universities in America. While at Dartmouth, he got invited by
    Nathaniel Rochester – the designer of IBM’s first scientific mainframe computer
    called “IBM 701” [[12](#505424_1_En_4_Chapter.xhtml#Par250)] – to spend the summer
    of 1955 in the Rochester Information Research Department at IBM in Poughkeepsie,
    New York. After that, both scientists persuaded the father of information theory
    Claude Shannon and Marvin Minsky, then a Harvard junior fellow in mathematics
    and neurology, to join them in organizing a workshop at Dartmouth College. Their
    funding proposal [[13](#505424_1_En_4_Chapter.xhtml#Par251)] was submitted to
    The Rockefeller Foundation and finally accepted, so that the seminal “Dartmouth
    Summer Research Project on Artificial Intelligence” took place during six weeks
    in the summer of 1956. Among the 11 participants were the three computer scientists
    Allen Newell, Cliff Shaw, and Herbert Simon, who demoed the legendary “Logic Theorist”
    earlier in the same year, the first real proof of concept for an intelligent computer
    program.^([^(84)](#fn84)) During this conference, John McCarthy coined the term
    “artificial intelligence” for the first time and later gave two main reasons for
    choosing it. Firstly, he intended to distinguish the results of the Dartmouth
    Summer Project from his previous work on a mathematical subject called `automata
    theory`.^([^(85)](#fn85)) Secondly, he wanted to avoid any association with cybernetics
    and its focus on analog feedback, which seemed misguided for him. Unfortunately,
    the conference fell short of his expectations, and its agenda turned out to be
    more visionary than practical somehow. Nevertheless and more importantly, this
    seminal conference catalyzed the next 20 years of research on artificial intelligence.


    From 1956 to 1974, artificial intelligence was among the hottest spots in the
    tech world, triggered by the rapid and contemporaneous development of the computer.
    Two years after the legendary Dartmouth Summer Project, the American computer
    scientist and psychologist Frank Rosenblatt got inspired by the pioneering work
    of Alan Turing and Donald Hebb and refined the McCulloch-Pitts model in the following
    way: he introduced two synaptic `weights`, two decimal numbers denoted by `w[1]`
    and `w[2]`, that allowed him to increase or decrease the two different input values
    depending on their relevance in accord with Hebbian theory. Mathematically speaking,
    Frank Rosenblatt substituted the sum of the two inputs `x[1] + x[2]` in the McCulloch-Pitts
    model by the weighted sum `w[1] · x[1] + w[2] · x[2]`. Compared to the McCulloch-Pitts
    model, his model has two more free parameters that can be set and tuned individually,
    which is why his concept turned out to be more flexible and better suited for
    emulating human intelligence. In his seminal publication “The Perceptron: A Probabilistic
    Model for Information Storage and Organization in the Brain,” he refers to this
    concept as `perceptron` [[6](#505424_1_En_4_Chapter.xhtml#Par244)], which forms
    the conceptual basis for building artificial neural networks up to now and is
    one of the most important contributions to this highly dynamic area of ongoing
    research. *The New Yorker* called the perceptron a “remarkable machine” [[7](#505424_1_En_4_Chapter.xhtml#Par245)],
    and *The New York Times* extolled, “The Navy revealed the embryo of an electronic
    computer today that it expects will be able to walk, talk, see, write, reproduce
    itself and be conscious of its existence” [[8](#505424_1_En_4_Chapter.xhtml#Par246)].'
