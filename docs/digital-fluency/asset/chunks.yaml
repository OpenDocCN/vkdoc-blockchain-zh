- fmt: '

    Another American investment bank that has been exploring blockchain-based banking
    and trading services is JPMorgan Chase, who has launched a smart contract platform
    together with Microsoft Azure. This open source platform is called `Quorum` and
    aims to make it easier, faster, and cheaper for financial institutes to build
    their own blockchain applications.^([^(74)](#fn74)) `Quorum` is based on the Ethereum
    protocol, extended by the `Aztec-protocol`^([^(75)](#fn75)), and facilitates confidential
    transactions for any generic digital asset class [[33](#505424_1_En_3_Chapter.xhtml#Par235)].
    In contrast to the `Zether Protocol` – the functional precursor of Aztec – the
    personal data, such as account numbers and account balances of the transacting
    parties, are also hidden and encrypted, which is why such transactions are called
    `zero-knowledge transactions`. The unique selling points of the `Quorum` blockchain
    are the very high data protection and privacy requirements that are embedded into
    the protocol and enable an efficient encryption of the entire blockchain including
    transactions and smart contracts. This is particularly important for investment
    banks and other financial institutions that focus on private value transfer and
    asset governance with their entire business model being based on trust and the
    protection of the client''s personal data. `Quorum` also employs a very special
    consensus mechanism called `QuorumChain`, which allows for granting certain users
    certain voting rights. Furthermore, `Quorum` also provides its own cryptocurrency
    named `JPM Coin` that is linked to the US dollar and thus reveals a much higher
    price level stability and lower volatility than other non-backed cryptocurrencies
    [[34](#505424_1_En_3_Chapter.xhtml#Par236)]. Such bank-backed coins are considered
    to be the holy grail of cryptocurrencies and called `stablecoins` for obvious
    reasons [[35](#505424_1_En_3_Chapter.xhtml#Par237)].


    The opportunities that blockchain technology offers for financial and payment
    services are also explored by companies, who have not been operating in the fintech
    business previously, such as the German car parts maker ZF Friedrichshafen. Together
    with IBM and UBS, they founded the German startup company `Car eWallet GmbH`^([^(76)](#fn76))
    to provide a financial transaction network for the end-to-end integration of mobility
    services including car sharing. This venture further aims to fully connect autonomous
    vehicles to an automotive cloud, so that they become business entities that can
    consume and pay for mobility services like parking or electric charging on demand
    automatically by employing smart contracts. Such blockchain-powered machine-to-machine
    transactions are a great example for the digital transformation of traditional
    business models based on the implementation of an Internet of things.


    Further to trading and payment services, blockchain technology is also poised
    to impact our modern `sharing economy` [[36](#505424_1_En_3_Chapter.xhtml#Par238)],
    which refers to the systematic lending of objects by private individuals and interest
    groups. Two very interesting examples in this context that are worth mentioning
    are the two decentralized and community-owned transportation platforms `LaZooz`
    and `Arcade City`. Both startups leverage blockchain technology to implement a
    peer-to-peer rideshare network, which governs direct interactions between drivers
    and users. This approach is sometimes referred to as `platform cooperativism`
    since users qualify for both contributors and shareholders of the platform to
    which they contribute. Another very interesting example is the free online marketplace
    `OpenBazaar`. Similar to Amazon and eBay, `OpenBazaar` allows users to register
    products and advertise them to other users connected to the network. But since
    `OpenBazaar` leverages blockchain technology to allow buyers and sellers to interact
    directly without any centralized middleman, `OpenBazaar` comes with zero transaction
    and platform fees. Only if there is a (legal) issue between the two, the network
    requires the intervention of a third mediating party to decide whether to release
    the payment or not.

    '
