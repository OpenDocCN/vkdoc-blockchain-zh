- fmt: 'This is why various pharmaceutical companies have been building up large databases
    of chemical compounds that are frequently updated and populated by the findings
    and research results published in professional journals worldwide. In order to
    process compounds by state-of-the-art machine learning algorithms, they are typically
    featured or converted into text based on an encoding scheme called `SMILES` for
    “simplified molecular input line-entry system.” A compound’s `SMILES` string is
    built up of letters that represent the chemical elements and symbols to encode
    the chemical properties and bindings (“links”) between the different elements.
    The `SMILES` representation of water with the chemical symbol `H[2]O`, for instance,
    may be written as `[H]O[H]` since water is formed by one oxygen and two hydrogen
    atoms denoted by `O` and `H`, respectively. Such strings are then used to train
    artificial neural networks in order to learn about the most successful drugs and
    predict new drug designs based on the chemical rules and identified patterns about
    which elements (symbols) are likely to follow one another — an innovative approach
    to “medical language processing” if you wish. Artificial neural networks have
    been applied to drug discovery back in 1986 already [[120](#505424_1_En_4_Chapter.xhtml#Par360)]
    in response to the development of the famous back-propagation algorithm that allows
    for the efficient training of such networks as we learned in previous sections.
    Various researchers have refined this approach since then by using much larger
    compound databases and deep learning models to train their artificial neural networks
    on larger databases more efficiently [[121](#505424_1_En_4_Chapter.xhtml#Par361)–[124](#505424_1_En_4_Chapter.xhtml#Par364)].


    A company that has been applying this innovative approach to drug discovery successfully
    is the British startup company Benevolent AI. Founded in 2013, the company employs
    different machine learning algorithms to build up a database, visualize related
    publications in knowledge graphs, and predict novel compounds. Some of them are
    used to automatically mine current scientific literature and save the most relevant
    ones in a compound database; others are used to design novel compounds based on
    the patterns derived from this data. For this purpose, researchers at Benevolent
    AI have built a recurrent neural network, for example, that has been trained on
    the `SMILES` data of millions of existing compounds reported in scientific literature
    and thereafter listed in their database. This pretrained network is used to predict
    new `SMILES` strings character by character iteratively based on the statistically
    most relevant patterns derived from the training data. The generated string corresponds
    to a certain compound in real space that may not have been discovered otherwise.
    It can be synthesized chemically and evaluated in laboratories subsequently with
    respect to different medical properties, such as its effectiveness, selectivity,
    toxicity, and potential side effects in the human body. The result of this characterization
    serves as the input for fine-tuning the artificial neural network by employing
    reinforcement learning techniques, a feedback process that is sometimes referred
    to as `multiparameter optimization scoring`. In this way, artificial intelligence
    supplements the researchers at Benevolent AI and allows them to focus on the best
    compounds early on in the drug development process, which drastically reduces
    the development time and cuts associated costs significantly. Benevolent AI also
    employed this approach to design a potential treatment against the acute lung
    disease caused by COVID-19 [[125](#505424_1_En_4_Chapter.xhtml#Par365)], the deadly
    coronavirus that reportedly appeared in the Chinese province Wuhan first and caused
    more than 43.0 million infections and over 1.16 million deaths in 2020 worldwide.^([^(128)](#fn128))
    This and other examples highlight the vast potential of artificial intelligence
    for drug discovery and demonstrate that deep learning can be used to speed up
    development, optimization, and other business processes in the healthcare industry
    significantly.


    ### 4.4.7 Financial Services and Insurance


    The financial services and insurance industry was in fact one of the earliest
    adopters of artificial intelligence, partly because of the rise of different fintech
    companies, such as Klarna, Revolut, N26, and other online banks and payment service
    providers that ran up to disrupt established banking institutes. JPMorgan Chase,
    for instance, America’s largest investment bank with more than USD two trillion
    in total assets, is pushing artificial intelligence beyond its investment banking
    and started a dedicated equity data science unit within its asset management business
    unit lately.


    #### Financial Services and Insurance: Cybersecurity


    One of their projects is about cybersecurity as JPMorgan Chase sustained a major
    data breach in 2014. During this cyberattack, hackers reportedly compromised customer
    data associated with more than 83 million bank accounts, which has been considered
    one of the most serious and largest intrusions into an organization’s IT system
    in history [[126](#505424_1_En_4_Chapter.xhtml#Par366)]. Although the login information
    associated with those accounts was not compromised fortunately, the hackers obtained
    the customer’s names, phone numbers, as well as email and postal addresses, which
    raised major public concerns of potential phishing attacks thereafter. JPMorgan
    Chase has invested a lot in upgrading its IT systems since then and is meanwhile
    exploring a range of applications of artificial intelligence to cybersecurity.
    One of its projects is about the implementation of an early warning security system
    to detect malware, trojans, and other advanced persistent threats before bad actors
    start using phishing emails to target selected employees [[127](#505424_1_En_4_Chapter.xhtml#Par367)].
    For this purpose, they implemented a large online repository to collect and store
    all raw data associated with JPMorgan Chase’s online traffic. The data is stored
    in a data lake first that serves as the input for a recurrent neural network architecture,
    which learns about average data sizes, host names, request frequencies, and other
    key characteristics of online traffic. As more and more data passes through this
    network, it learns what fraudulent and non-fraudulent (“normal”) traffic looks
    like. Whenever malicious actors gear up to start a cyberattack, the online traffic
    changes and the recurrent neural network occasionally detects abnormal activities
    and notifies the bank’s security staff to start certain countermeasures instantaneously.
    The early warning system is also reported to employ natural language processing
    algorithms that looks for patterns, such as mismatched Internet addresses, poor
    spelling, and grammar to detect emails from malicious actors. This is an increasingly
    popular application of recurrent neural network that falls into the category of
    `anomaly detection` for recognizing fraudulent banking activities and mitigating
    the risk associated with them — an approach that is highly relevant for all industries
    that are exposed to risks in the cyberspace, too.'
