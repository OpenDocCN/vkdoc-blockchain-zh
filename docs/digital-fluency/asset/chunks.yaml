  trans: '

    # 1.3 数字生态系统


    由于数字化和数字化转型对商业和社会具有重大意义，学术界对它们进行了深入研究。管理咨询公司以及谷歌、微软、亚马逊等数字时代企业，也经常在其博客上发表富有洞察力的相关文章和报告^(¹¹)。随着时间的推移，数字化和数字化转型出现了不同的定义，每个定义都强调了不同的方面。例如，两位传播学者斯科特·布伦南和丹尼尔·克雷斯通过数字通信和媒体对当代社会生活的影响来定义数字化
    [18]。《牛津英语词典》则提供了一个更为实用的定义，该词典将“数字化”一词的首次使用追溯到 20 世纪 50 年代中期计算机的出现，并将其定义为“一个组织、行业、国家等采用或增加使用数字或计算机技术”。此外，这部英语语言的主要词典区分了数字化（digitalization）和数字转换（digitization），后者被定义为“数字转换的行为或过程；将模拟数据（尤其是在后来的使用中，图像、视频和文本）转换为数字形式。”实际上，最直观的定义之一可以在高德纳的
    IT 术语表中找到，该术语表为这些术语提供了以下定义^(¹²) [19]：


    *   “*数字转换*是从模拟形式到数字形式的改变过程……换句话说，数字转换将一个模拟过程改变为数字形式，而过程本身没有任何本质上的改变。”

    *   “*数字化*是利用数字技术改变商业模式，并提供新的收入和价值创造机会；它是向数字业务转型的过程。”

    *   “*数字化转型*可以指从 IT 现代化（例如，云计算）到数字化优化，再到发明新的数字商业模式等一切事务。该术语在公共部门组织中广泛使用，指的是诸如将服务上线或传统系统现代化等适度的举措。”


    换句话说，数字化和数字化转型是由数字通用技术推动的企业变革过程。这些定义表明，这三个术语本质上是相互关联并依次出现的。这就是为什么学者们有时会使用图 1-1
    所示的金字塔结构来举例说明它们之间的关系。这个简单的图形说明，数字转换、数字化和数字化转型是层层递进的，其中数字转换是它们的基础。数字转换只是将来自传感器和其他输入的信息转换为数字格式，以便进行进一步的数据处理。中间层的数字化则利用这些数字信息来得出结论或发现隐藏的、有洞察力的模式，从而通过优化和自动化业务流程来节省资金。该金字塔的最高层是数字化转型。它使企业能够节省资金，同时还能通过创造新市场和提供新的商业机会来赚取额外收入。数字化转型是由数字技术推动的。这就是为什么它有时被称为*技术驱动的数字化转型*，以强调它依赖于将不同的数字技术整合并跨学科地融合到组织的所有核心领域——这是一个重要方面，我们将在下文中更详细地讨论。


    ![../images/505424_1_En_1_Chapter/505424_1_En_1_Fig1_HTML.png](img/505424_1_En_1_Fig1_HTML.png)


    **图 1-1** 数字转换、数字化和数字化转型之间的关系


    ## 数字化转型


    数字化转型是一个战略性规划且影响深远的变革过程，旨在建立一个以软件和数据为中心的组织。它由数字转换和数字化所推动，并得益于利用量子计算、区块链技术和人工智能等数字支持技术。


    *数字技术*通常有助于数字信息的（1）处理、（2）通信和（3）存储。过去几十年的经验观察发现，这三个核心方面的时序演进可以用三个指数定律来描述：


    1.  *摩尔定律*描述了处理能力的指数级演进，指出计算机芯片中的处理单元数量每 18 个月翻一番 [22]。

    2.  *巴特定律*与网络的通信速度有关，该速度每 9 个月翻一番 [23]。

    3.  *克莱德定律*指出存储容量每 13 个月翻一番 [24]。


    考虑到像汽车这样的成熟产品需要超过 24 个月的开发时间，这些时间尺度确实是指数级且令人惊叹的。虽然数字技术的三个核心维度呈现指数级的时序演进，但我们的大脑通常不习惯这种指数级发展。这也是大多数领导者低估数字技术对组织影响的原因，因为他们过去几年看到的往往是线性发展。为清晰起见，图
    1-2 描绘了由此产生的指数级技术发展与线性业务演进之间的差距。这种差距通常与未开发的商业机会有关，并且经常由利用数字技术的创新初创企业来填补。这种绩效差距随着时间的推移而扩大，直观地显示了技术驱动型数字化转型的必要性。


    ![../images/505424_1_En_1_Chapter/505424_1_En_1_Fig2_HTML.png](img/505424_1_En_1_Fig2_HTML.png)


    **图 1-2** 线性业务发展（虚线）与指数级技术演进（实线）。由此产生的差距（阴影区域）通常由创新型初创企业填补


    然而，如前所述，数字化转型远不止是将数字技术整合到现有的 IT 基础设施中以实现流程无纸化。例如，首席信息官社区“企业家项目”指出：“数字化转型是将数字技术整合到业务的各个领域，从根本上改变你的运营方式和为客户提供价值的方式。这也是一种文化变革，要求组织不断挑战现状、进行试验，并坦然面对失败”
    [25]。在面对深刻的经济、环境和社会变革的日益全球化和互联互通的世界中，数字化转型有助于组织持续提升生产力和竞争力。柯达公司的例子（以及其他例子）清楚地表明，抵制某些技术的组织面临被颠覆的风险。


    专家们提出了各种可能预示某个行业容易受到颠覆的因素。最重要的颠覆迹象包括：


    *   客户满意度下降。

    *   客户群正在老化。

    *   客户感到不便 [26]。

    *   客户忠诚度低 [27]。

    *   产品和服务的高成本促使人们使用技术来节省成本，而不是为客户的生活增加价值 [26]。

    *   风险资本家兴趣增加，他们作为局外人，看到了该行业隐藏的机会。

