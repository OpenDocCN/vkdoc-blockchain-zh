    ### 深度学习：推荐系统


    像亚马逊、奈飞、Pandora 和领英这样的公司也应用了另一类机器学习算法——*推荐系统*——来帮助其平台的用户发现可能感兴趣且值得购买的新项目（例如书籍、视频、音乐和文章）。因此，推荐系统在提升各自平台或市场供应商的销售额和收入的同时，也创造了愉悦的用户体验。图
    4-6 区分了三种不同类型的推荐系统：(1) 基于内容的推荐系统，(2) 基于模型的推荐系统，以及 (3) 基于记忆的推荐系统。例如，在美国音乐流媒体和网络广播服务公司
    Pandora，一个由音乐人组成的团队会手动为每个音乐电台标注数百个属性和关键词，例如流派和艺术家。然后，每当用户选择某个特定的音乐电台时，Pandora
    会自动添加具有相同属性的歌曲，并最终为其数百万用户中的每一位生成个性化的播放列表。这是一个*基于内容*的推荐系统的例子，它将用户档案与具有相同属性和关键词的不同项目进行匹配。这类算法计算速度快且可扩展性强，因为它们可以轻松地扩展到新的项目和客户。


    在*基于模型*的推荐系统中，算法从大型数据集中提取一些信息或行为模式，并将其作为模型来做出未来的推荐。这种方法对于随时间变化缓慢且不需要频繁更新的模式特别有用，因为构建模型通常是一个既耗时又消耗资源的过程。其中一个例子是基于社交知识的系统
    [69]。


    *基于记忆*的推荐系统的一个例子是亚马逊网站上“购买了您购物车中商品的顾客也购买了”板块的早期电商代理 [70]。由于以下论点，这个代理可能对亚马逊的商业模式产生有趣的影响。随着代理随着时间的推移变得越来越好，其预测准确性有时可能会超过某个阈值，超过这个阈值，亚马逊直接将预测你会想要的商品运给你，而不是等你下单，会更为有利可图。从亚马逊的角度来看，这种*预测性*或*预期性发货*有两个优势：(1)
    其便利性降低了你就从竞争对手那里购买这些商品的可能性，(2) 它促使你购买那些你考虑过但最终可能不会购买的商品——这两种情况最终都会增加亚马逊在你消费份额中的占比。由于购物者可能不希望为退回不想要的商品而费心，亚马逊可能会投资于方便处理退货的基础设施，例如类似运输卡车的工具或定期（比如每周一次）上门收集商品的自主无人机。作为一名持怀疑态度的读者，你可能会惊讶地发现，亚马逊早在
    2013 年就获得了美国预期性发货的专利，专利号为 US 8,615,473 B2 [71]。


    然而，实现推荐系统最重要的算法在技术上被称为*协同过滤*，它采用特定措施来识别数据集中用户-项目对和项目-项目对之间的相似性 [72]。然后，这些相似性度量被用来预测数据集中不存在的新对的评分。显然，在这种情况下，数据科学家会区分*基于用户*和*基于项目*的协同过滤。


    ### 深度学习：自编码器


    自编码器是一种非常特殊的神经网络，它通过采用无监督学习，能够高效地对数据进行编码。自编码器的目标是利用迭代优化过程，学习最佳的编码和解码方案。自 20 世纪
    80 年代末期以来，它们就已存在 [73–75]，并且传统上被用于*降维*，即通过移除不必要和不相关的数据来减小数据集的大小。其工作原理类似于 ZIP 文件格式，该格式允许我们压缩和归档各种数据。与
    ZIP 算法不同，自编码器的数据压缩方案不是预定义和固定的，而是通过基于待压缩数据集中普遍存在的统计上最相关的特征和模式进行迭代训练来学习和优化的。

    '
- fmt: '### 4.3.4 Ensemble Methods


    *Ensemble methods* combine multiple machine learning algorithms into one predictive
    model to leverage the advantages of each of them – “the whole is greater than
    the sum of its parts” to say it with the famous words of Aristotle. For this purpose,
    the ensemble method “averages” the outcomes of the different algorithms and finally
    outputs the prediction with the highest ensemble value, which can be interpreted
    in terms of an ensemble average. Depending on the particular way this average
    is calculated, data scientists differentiate three different approaches:


    1.  Bagging to decrease the variance of a prediction

    2.  Boosting to decrease the bias (“prejudice” or “stereotype”) of a prediction

    3.  Stacking to improve predictions


    *Bagging* stands for “bootstrap aggregation” and refers to an ensemble method
    that calculates the ensemble value by averaging all results. The most famous example
    is the *random forest* algorithm, which simply averages the results of different
    branches of a decision tree that is formed by the different algorithms in the
    ensemble. When you take a photo with your smartphone or digital camera, for instance,
    its face recognition function will draw boxes around faces of people to portrait
    them optimally. This function is most likely the result of a random forest algorithm,
    in which one algorithm of the ensemble picks up eyes, another one ears, mouths,
    and so on. Each algorithm will output a certain probability for having detected
    those facial properties. The ensemble algorithm averages those probabilities and
    outputs an overall ensemble value or probability for having detected a face in
    the input image. If this probability is larger than a certain threshold value,
    say 60%, the camera app will draw a box around the features accordingly. Random
    forest algorithms are particularly beneficial for real-time image processing as
    they usually outperform artificial neural networks in speed. *Stacking* employs
    a certain decision-making model, such as polynomial regression, to calculate the
    ensemble average of the different algorithms in the ensemble. This approach is
    usually less effective in practice since the decision model cannot be adapted
    to the particular use case easily. *Boosting* algorithms, the third group of ensemble
    methods, apply the different algorithms in the ensemble sequentially, that is,
    one after the other. The main advantage of this method relies on the fact that
    subsequent algorithms can fix the errors of the previous one. They do, however,
    not parallelize the processing very well but are generally still faster than artificial
    neural networks. Google and Facebook, for instance, are reported to use boosting
    algorithms in their search engines for sorting the search results by relevancy.


    Another application of ensemble methods you are probably very familiar with is
    the query auto-completion function in messaging apps including WhatsApp, WeChat,
    or iMessage, which predicts possible next words as you begin to type in your message.
    If you begin to type “he”, for instance, the app may suggest “hello” or “here”,
    that is, words that are most frequently used in this context. Google also used
    this class of algorithms for Google Translate, which has been launched in 2006
    and continuously advanced since then to support more than 100 languages and over
    100 billion words [[76](#505424_1_En_4_Chapter.xhtml#Par316)]. Google did, however,
    switch to deep learning algorithms for its multilingual translation system in
    2016, since long-short-term memories turned out to be more powerful and accurate
    in the end as they are capable of evaluating words contextually, too. This is
    why Google meanwhile calls its translation system “Neural Machine Translation
    System” [[77](#505424_1_En_4_Chapter.xhtml#Par317)].


    ### 4.3.5 Reinforcement Learning


    Finally, we get to something that looks like real artificial intelligence. This
    is because this approach is not related to data but rather to the exploration
    of an unknown (virtual) environment, such as a self-driving car in an unknown
    city. It turns out that the knowledge of all road rules and maps in the world
    will not teach the autopilot of an autonomous vehicle how to drive safely and
    compliantly [[78](#505424_1_En_4_Chapter.xhtml#Par318)] – a phenomenon that can
    be observed in other applications, too.


    This is why scientists developed an entirely new approach to learning called *reinforcement
    learning*. This approach is comparable to training a dog by rewarding him with
    biscuits. Early experiments go back to the Russian psychologist Ivan Pavlov, who
    carried out a series of experiments with dogs in the late 1890s. For this purpose,
    he always rang a bell when feeding dogs in a cage. After repeating this procedure
    a few times, he observed that ringing the bell always triggered a saliva response,
    and the dogs occasionally learned to associate the ringing bell with nearby food
    and prepare accordingly, which became known as *classical conditioning* in psychology
    later on. Conditioning not only became the foundational basis of behaviorism in
    psychology but also the basic idea for reinforcement learning, today. In the example
    at hand, the dog is more formally called *agent* and his cage *environment*. Performing
    an *action* in this environment, such as “hearing the bell” or “catching the food,”
    is said to alter the dog’s *state*. Technically speaking, the state of an agent
    describes the situation or location of the agent within its environment. Both
    parameters, the action and state of an agent, determine its *reward* after taking
    an action. Ivan Pavlov is the coach in this example, who decides whether the agent
    is rewarded or not, and is technically called *interpreter*. The agent in reinforcement
    learning pursues a certain *policy*, that is, a series of actions that aims to
    maximize the reward. This policy is optimized during the training iteratively
    as depicted in Figure [4-14](#505424_1_En_4_Chapter.xhtml#Fig14). Depending on
    whether the optimization of the policy is based on a certain model of the environment
    or not, scientists differentiate between *model-based* and *model-free* reinforcement
    learning. Since model-free reinforcement learning is much more flexible and capable
    of adapting to timely changing environments, this is by far the most popular approach
    to this fascinating area of research, which offers numerous applications.


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig14_HTML.jpg](images/505424_1_En_4_Chapter/505424_1_En_4_Fig14_HTML.jpg)


    **Figure 4-14** The circular process of reinforcement learning of an agent (robot)
    that tries to escape from a labyrinth. (1) The process begins with the agent making
    one arbitrary step or action. (2) An interpreter observes the agent’s action and
    evaluates whether this brings it closer to the labyrinth’s exit. (3) If so, the
    interpreter rewards the robot and does place a penalty on the agent’s cost function
    otherwise. (4) Each action finally changes the state of the robot in the environment
    and the process starts again. The robot will improve its behavior by performing
    this circular process many times while aiming to maximize its reward (or minimize
    its cost function) in each step'
