    ### 4.4.3 医疗保健


    人工智能在过去几年中也已进入医疗保健行业，早期采用者和初创公司开始将各种机器学习算法应用于一系列医疗问题。其中大多数属于医学影像中的图像识别和特征检测范畴，旨在协助医生诊断某些疾病[[103]](#505424_1_En_4_Chapter.xhtml#Par343)。


    一个例子是美国的“阿尔茨海默病神经影像学倡议”（ADNI），该项目位于旧金山加州大学旧金山分校放射学与生物医学影像系。尽管目前尚无治愈阿尔茨海默病的方法，但最近已有多种药物问世，有助于延缓疾病进展并改善患者的医疗状况。为此，需要尽早开具这些药物，因此在阿尔茨海默病的早期阶段进行诊断至关重要。这正是
    ADNI 图像识别算法的用武之地。它通过分析正电子发射断层扫描（一种分析人体软组织疾病如阿尔茨海默病的首选技术）记录的“医疗大数据”，协助医生诊断这种无法治愈的疾病。ADNI
    模型能够在临床诊断前最多六年诊断出阿尔茨海默病，准确率超过 92%。ADNI 的计算机科学家之一 Jae Ho Sohn 这样描述这一用例：这是深度学习的理想应用，因为它特别擅长发现非常细微但弥漫性的过程。人类放射科医生在识别像脑肿瘤这样微小局灶性病变方面非常强大，但我们在检测更缓慢、整体性的变化方面存在困难。考虑到深度学习在这类应用中的优势，尤其是与人类相比，这似乎是一种自然的应用[[109]](#505424_1_En_4_Chapter.xhtml#Par349)。


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig17_HTML.png](img/505424_1_En_4_Fig17_HTML.png)


    图 4-17


    例如亚马逊 Alexa 所使用的自然语言处理的五个基本步骤


    类似的公司、研究计划和合作在全球范围内比比皆是——另外两个例子是英国的初创公司 Kheiron Medical 和 Oxford Heartbeat——这再次证明了人工智能在医疗保健领域的巨大潜力及其对社会的有益影响。据预测，该行业到
    2026 年将达到 1500 亿美元的规模。关于更多示例，请参见例如[[110]](#505424_1_En_4_Chapter.xhtml#Par350)。


    ### 4.4.4 自然语言处理


    *自然语言处理*从一开始就吸引了人工智能领域众多研究者的关注。受到 Joseph Weizenbaum 的开创性工作以及 1966 年推出的 ELIZA（见第
    4.1.2 节）的启发，微软在 2014 年发布了其第一款聊天机器人。这款聊天机器人名为“小冰”，并集成到了腾讯的微信应用中——微信至今仍是中国最大的社交信息服务商。小冰在短短几年内迅速吸引了超过
    4000 万用户，据报道，到 2019 年其在全球拥有超过 6.6 亿用户。在小冰成功推出两年后，微软准备在美国复制这一成功故事，并在微博客和社交网络服务
    Twitter 上推出了聊天机器人“Tay”。微软表示：“你跟 Tay 聊得越多，它就越聪明，学会通过随意和有趣的对话与人互动。”然而，这场原本旨在探索对话理解的实验很快就变成了微软的一场灾难。仅仅用了不到
    24 小时，Tay 就被调教得开始散布不那么有趣、甚至是种族主义和性别歧视的信息，这导致了它在公开发布后不久就被关闭。然而，从科学角度来看，此类失败以及其他不成功的项目非常重要，因为它们使开发者能够从中学习，并迭代地一代代改进产品和服务。


    自然语言处理通常分为五个步骤，如图[4-17]所示。整个过程始于*分词*，它根据标点符号、段落和其他文本特征将书面文本分割成更小的字符串。之后，这些字符串被解析并进一步分割成语法成分，例如单个名词、动词、数字和标点符号，这个过程称为*标记化*。这对于机器学习算法来说尤其具有挑战性，因为书面文本通常存在语法和拼写错误等问题。第三步称为*词干提取*，指的是通过移除词缀和词尾来将单词还原为其词根——例如，“reading”一词通过此过程转换为“read”。最后一个预处理步骤称为*词形还原*，涉及寻找具有相同语义词根的其他单词。一个例子是单词“better”，它可能被词形还原为“good”。这是任何自然语言处理算法的最后一步，也可能是最具挑战性的步骤的先决条件，即理解语言以得出某些结论并采取行动。此步骤通常采用无监督学习方法和其他深度学习模型，例如循环神经网络或聚类算法，来分析单词序列并在书面文本中识别模式和簇。


    与*语音识别*技术相结合，自然语言处理如今已成为一项相当普遍的技术——只需想想智能手机的语音拨号功能即可。有趣的是，第一个语音识别系统实际上是在 1952
    年由美国著名的贝尔实验室开发的，名为“Audrey”（自动数字识别系统）。Audrey 能够识别从零到九的口头数字发音，基于对所谓*音素*（语音的基本单位）的检测，准确率超过
    90%。这对于语音识别的发展是重大且同样令人瞩目的一步，因为当时的计算能力和内存容量都非常有限。'
- fmt: 'Today, the combination of voice recognition and natural language processing
    technology is used to implement *virtual assistants* that get better and smarter
    every time you use them. Apple’s Siri, Microsoft’s Cortana, Google Home, and Amazon’s
    Alexa – named as an homage to the famous Greek Library of Alexandria [[111](#505424_1_En_4_Chapter.xhtml#Par351)]
    – are just a few of the most popular examples. Such assistants have also found
    their way into automobiles recently, where they assist the driver to operate the
    vehicle or carry out certain infotainment and navigational functions. Another
    example is the Israeli startup Chorus founded by Roy Raanani in 2015 that leverages
    natural language processing to analyze recorded conversations of sales people.
    This platform records, organizes, and transcribes calls in order to learn about
    best practices – certain phrases and text patterns – that drive and improve sales.
    Virtual assistants and chatbots^([^(125)](#fn125)) can also be used for *voice
    commerce*, which refers to a technology that allows for using voice commands to
    search and purchase products online. These systems can communicate at zero marginal
    cost with a virtually infinite number of customers at the same time. Since this
    technology removes the human bottleneck of traditional call and customer service
    centers, this industry is forecasted to hit USD 80 billion by 2023 [[112](#505424_1_En_4_Chapter.xhtml#Par352)].


    Virtual assistants can also streamline an organization’s internal processes by
    automatically transcribing meetings and distributing voice-searchable versions
    to people who could not attend. Such agents will also have severe impacts on the
    marketing industry. The marketing professor emeritus Niraj Dawar at Ivey Business
    School, for instance, argues that “AI assistants will transform how companies
    connect with their customers. They’ll become the primary channel through which
    people get information, goods, and services, and marketing will turn into a battle
    for their attention” [[113](#505424_1_En_4_Chapter.xhtml#Par353)].


    ### 4.4.5 Energy Efficiency


    Due to its numerous data center facilities, Google is among the largest consumers
    of electric energy worldwide. The computers and servers installed in its data
    centers need to be cooled continuously to keep them at moderate temperatures independently
    from the climatic conditions outside the facilities – this is actually why Google
    and other IT companies have developed highly efficient servers and computing hardware
    over the last couple of years. However, the power consumption of modern data centers
    is still immense, and even small improvements in energy efficiency can lead to
    sizable cost reductions. This is why Google acquired the London-based startup
    DeepMind Technologies for more than USD 500 million in 2014. DeepMind was working
    on a machine learning algorithm at that time, which allows for the energy optimization
    of data center facilities [[114](#505424_1_En_4_Chapter.xhtml#Par354)]. Their
    ensemble of deep neural networks was trained on the historical data of thousands
    of sensors that measure the, inter alia, IT load, speed of cooling pumps, chillers,
    cooling towers, and wet bulbs [[115](#505424_1_En_4_Chapter.xhtml#Par355)] and
    used to predict the future *power usage effectiveness* under certain operating
    conditions.^([^(126)](#fn126)) The purpose of those predictions was to simulate
    the impact of different actions that allow DeepMind to choose the best option
    and energy mix accordingly – a great example for data-driven decision making based
    on information transparency. By employing deep neural networks and creating a
    more efficient and adaptive framework to understand data center dynamics, Google
    managed to reduce the amount of cooling energy dramatically by up to 40% in 2016
    [[116](#505424_1_En_4_Chapter.xhtml#Par356)] while increasing the value of wind
    energy by about 20% at the same time [[117](#505424_1_En_4_Chapter.xhtml#Par357)]
    – a major breakthrough toward superefficient data center facilities with a better
    carbon footprint. This example highlights the great potential of artificial neural
    networks for optimizing energy efficiency. This example will hopefully act as
    a blueprint for other industries, too, such as the automobile or manufacturing
    industry that also consume large amounts of electric, heat, and other sources
    of energy.


    ### 4.4.6 Drug Discovery


    A particular exciting application of artificial intelligence with a huge impact
    on wealth and health of society is *drug discovery* for a whole range of (incurable)
    human diseases including Alzheimer and other neurodegenerative diseases. Those
    diseases generally originate from a mutated gene in our DNA^([^(127)](#fn127))
    that controls vital processes in our body, such as gene regulation, protein synthesis,
    and intracellular signaling. Since dysfunctional genes give rise to various diseases,
    they typically serve as the *target* for the development of chemicals that provide
    a therapeutic benefit for patients by repairing the respective dysfunctionality.
    Such chemicals are pharmacologically called *compounds* or *leads*. A lead that
    has been granted market approval by a regulating governmental authority, such
    as the American Food and Drug Administration, is called *drug* and commercially
    available in pharmacies and drugstores.


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig18_HTML.jpg](images/505424_1_En_4_Chapter/505424_1_En_4_Fig18_HTML.jpg)


    Figure 4-18


    General drug discovery process with the typical amount of time and money spent
    in the different stages. Artificial intelligence (AI) is able to reduce time and
    effort by assisting in the lead selection and optimization phase


    Traditionally, drug discovery is organized in two consecutive stages, a (1) preclinical
    development and a (2) clinical phase. Both phases often involve much trial and
    error and are thus very time consuming, expensive, and equally inefficient. The
    preclinical phase is about the target discovery and validation as well as the
    lead selection and optimization. The clinical phase involves several clinical
    trials with selected patients and ends with the submission of a drug to a regulatory
    agency. This overall process is depicted in Figure [4-18](#505424_1_En_4_Chapter.xhtml#Fig18)
    and typically takes more than 10 years with research expenses reaching USD 1.8
    billion and more until the drug’s final market approval.


    Since most drugs fail in the clinical phase, artificial intelligence particularly
    targets this critical phase of the drug discovery process. It accelerates research
    by assisting in selecting the right patients, planning the overall clinical trial,
    and identifying the most effective lead compound as early in the process as possible
    [[118](#505424_1_En_4_Chapter.xhtml#Par358), [119](#505424_1_En_4_Chapter.xhtml#Par359)].
    Artificial intelligence assists in searching, selecting, and optimizing a compound
    that is worth investigating and experimenting with in the laboratory. Furthermore,
    it is used to analyze billions of potential chemicals with different medical properties
    for patients. Hence, drug discovery can be viewed as a multi-objective optimization
    problem that lends itself well for the automatization of certain steps by artificial
    intelligence.'
