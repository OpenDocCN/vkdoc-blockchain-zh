    \ 1 cm in size and depicted in, for example, [[71](#505424_1_En_2_Chapter.xhtml#Par267)].\
    \ Honeywell’s quantum computer is available commercially through Microsoft’s `Azure\
    \ Quantum` cloud computing service since late 2020.\n\n## 2.3.2 Current Business\
    \ Applications\n\nFor many years, the biggest customers for quantum computers\
