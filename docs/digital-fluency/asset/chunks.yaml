  trans: '

    #### 当前商业应用：政府服务


    在本研究过程中，我还了解到中国综合性企业腾讯、中国信息通信研究院与深圳市税务局之间另一项有趣的合作，它们共同探索区块链技术在税务领域的应用 [44]。这项合作旨在创建并确立一种基于区块链的发票标准，从而支持实现自动化税务或*电子税务*系统，以简化审计流程、减少逃税行为并避免双重征税。^(⁸⁰)
    该基础标准是作为名为“基于分布式账本技术发票通用框架”的总体项目的一部分而制定的，该项目得到了包括英国、瑞士和瑞典在内的多个国家的支持。这只是一个非常有趣的例子，展示了区块链技术如何用于自动化传统且以往基于纸张的政府流程和服务。


    #### 当前商业应用：区块链联盟


    由于行业中的大多数区块链应用都是侧重于形成协同网络的协作方式，因此各类组织开始在不同的区块链*联盟*中开展合作。迄今为止，全球已建立了超过 40 个不同的联盟，它们或侧重于业务，或侧重于技术。第一类联盟针对特定的业务问题，例如供应链管理或支付服务；而第二类联盟则致力于开发可重复使用且标准化的软件模块，供联盟成员用于构建自己的区块链应用。一些联盟同时涵盖这两类活动，例如美国公司`r3`，它运营着一个名为“Corda”的区块链平台。全球区块链联盟的精选（非全面）列表如表
    3-5 所示，供您参考。^(⁸¹)


    **表 3-5**


    旨在促进区块链技术在商业中更广泛应用的精选国际联盟。牵头公司以斜体表示，区块链平台名称相应置于括号中。本概览部分基于文献 [45–47]。


    | 名称 | 精选成员（区块链平台） | 联盟范围 |

    | --- | --- | --- |

    | `Corda` | `r3` (`Corda`)、安联保险、西班牙对外银行、法国巴黎银行、荷兰国际集团、英特尔、马士基、微软、纳斯达克、西门子、州立农业保险、瑞银集团
    | 寻求在商业中（例如支付服务）更广泛应用区块链技术的开源平台 |

    | `eTradeConnect` | `香港金融管理局` (`Hyperledger`)、中国农业银行、法国巴黎银行、星展银行、汇丰银行、中国工商银行、渣打银行
    | 旨在提高国际贸易融资效率的贸易融资平台 |

    | `FoodTrust` | `IBM` (`Hyperledger`)、金州食品、雀巢、沃尔玛 | 通过追踪食品原料和货件的来源以查明食品安全事件，从而提高食品安全性
    |

    | `GSBN` | `CargoSmart` (`Hyperledger`)、达飞轮船、中远海运集运、中远海运港口、赫伯罗特、和记港口、东方海外、青岛港、新加坡国际港务集团和上海国际港务集团
    | 为供应链上的所有利益相关方提供安全可信的数据交换平台 |

    | `komgo` | `ConsenSys` (`Quorum`)、荷兰银行、法国巴黎银行、花旗银行、荷兰国际集团、荷兰合作银行、法国兴业银行、壳牌 |
    大宗商品交易后处理平台 |

    | `Marco Polo` | `r3`、`Tradeix` (`Corda`)、法国巴黎银行、德国商业银行、戴姆勒、黑森州立银行、荷兰国际集团、巴登-符腾堡州立银行、国民西敏寺银行、渣打银行
    | 贸易融资区块链网络 |

    | `MOBI` | `IBM`、`MOBI` (`Hyperledger`)、埃森哲、宝马、博世、电装、福特、通用汽车、本田、现代、雷诺、采埃孚 | 实现通行费、停车费及其他车辆支付的自动支付
    |

    | `TradeLens` | `IBM`、`马士基` (`Hyperledger`)、APM 码头、现代货箱码头、哈利法克斯港、新加坡国际港务集团、Seaboard
    | 用于简化和管理国际供应链的开放数字航运平台 |

    | `Quorum` | `摩根大通` (`Quorum`)、ConsenSys、瑞信、荷兰国际集团、微软 Azure | 用于简化交易和数字支付的开源智能合约平台
    |

    | `Voltron` | `r3`、`Crypto BLK`、`贝恩公司` (`Corda`)、盘谷银行、西班牙对外银行、法国巴黎银行、中国信托商业银行、汇丰银行、国民西敏寺银行、加拿大丰业银行、瑞典北欧斯安银行
    | 信用证数字化 |

    | `we.trade` | `IBM` (`Hyperledger`)、德意志银行、凯克萨银行、德国商业银行、奥地利第一储蓄银行、汇丰银行、比利时联合银行、法国外贸银行、北欧银行、荷兰合作银行、桑坦德银行、法国兴业银行、瑞银集团、意大利联合信贷银行
    | 由银行支持的贸易融资区块链平台 |


    ### 3.3.3 更多应用场景


    区块链技术还被提出用于一些尚未实施的场景。其中大部分涉及现代社会的核心领域，例如政府服务、法律和医疗保健。以下简要介绍最重要的潜在应用场景。

    '
- fmt: '### Potential Use Cases: Governmental Services


    Modern governments offer a large variety of public and civilian services that
    involve different official authorities including registration offices in city
    halls, social welfare, as well as assistance and tax offices. Depending on your
    particular home country and city, the bureaucracy and internal processes associated
    with those services may be quite extensive and equally costly in their overall
    operation. According to a report that has been published by the European Commission
    lately, `blockchain` technology lends itself well to applications in such governmental
    ecosystems since it “[...] can reduce bureaucracy, increase the efficiency of
    administrative processes and increase the level of trust in public record keeping”
    [[48](#505424_1_En_3_Chapter.xhtml#Par249)]. This is why `blockchain` technology
    and its ability to facilitate direct and trustworthy interactions between different
    public institutions, citizens, and economic agents has attracted the attention
    of various governments worldwide. A list of `blockchain` experiments that are
    currently pursued in the public and governmental sector, respectively, is available
    in [[49](#505424_1_En_3_Chapter.xhtml#Par250)].


    A particularly interesting application of `blockchain` technology for governmental
    services is votings. Most countries do still conduct governmental votings through
    paper-based ballots although they should be done online through leveraging state-of-the-art
    digital technologies in our increasingly connected society. But such electronic
    votings or `e-votings` have been resisted so far due to concerns of security and
    data protection. `Blockchain` technology can be used to address this problem of
    voter fraud by providing tamperproof, immutable, and transparent record of votes.
    Another advantage of `blockchain`-based evotings is that they can be conducted
    at home comfortably, which is expected to increase the voter turnout while reducing
    political apathy significantly.


    Another very popular application is digital identities that may occasionally substitute
    governmentally issued ID cards and authorize access to various governmental online
    services and websites. A `digital identity` in this context can be thought of
    as an online record of personal information that represents individuals and organizations.
    At the moment, this data is in the hands of countless online platforms and mobile
    applications including `Google Gmail`, `Amazon`, `Facebook`, and others. This
    can be quite problematic because the centralized entities who operate these apps
    are increasingly susceptible to identity thefts, data breaches, or simply the
    misuse of data. `Blockchain`-based digital identities may potentially avoid those
    problems by giving the control and ownership of the data back to the user and
    rightful owner, an approach that is sometimes referred to as `self-sovereign identity`.
    In this case, individuals possess an encrypted digital hub that allows for storing
    personal, identifiable information securely. Furthermore, it allows individuals
    to control who accesses the data by granting access rights when needed only. This
    is particularly interesting from a socioeconomic point of view as it places the
    individuals back in control of their personal data and its utilization, who “lost”
    their digital sovereignty to digital platforms and multinational companies. `Self-sovereign
    identities` may also allow marketers to build better relationships with their
    customers directly by offering them tailored deals and rewards for sharing their
    personal information with the respective marketer – marketers would thus pay consumers
    directly for their attention [[50](#505424_1_En_3_Chapter.xhtml#Par251)]. Furthermore,
    and even more importantly, such identities may promote the ambitious goal number
    16 of the United Nations Development Programme, which aims to “provide legal identity
    to all, including birth registration,” by 2030 [[51](#505424_1_En_3_Chapter.xhtml#Par252)].


    ### Further Use Cases: Law


    Another prospective use case is a `blockchain`-based `land title registry`. Such
    a ledger would allow citizens to submit a secure online request to the respective
    service hall, financing body, or notary service to ask for the registration or
    verification of a land title extract. Once this request has been authorized and
    the value transfer approved by the network, the respective authority can update
    the ownership rights on the land title registry accordingly. This registry is
    most likely to be implemented as a private permissioned `blockchain` network that
    guarantees the integrity of all land title and real estate transfers by its inherent
    encryption and hash algorithm. In contrast to the traditional paper-based land
    title administration, this `blockchain`-based solution allows citizens and institutions
    to simply check online if a land title is legitimate or not. This concept can
    be applied to any fraud-deterrent notarization process, of course, that involves,
    for example, storing and verifying digitized documents, such as contracts, marriage
    settlements, and testaments.


    `Blockchain` technology does also have a considerable value add for managing `intellectual
    property` (IP) rights and the business of patent attorneys and courts as it facilitates
    the implementation of a platform for accurately recording the ownership of those
    assets. Legal disputes about the origin and ownership of an idea or patent may
    easily be resolved by referring the parties to the tamperproof `blockchain` that
    time-stamps the uploaded data and indicates exactly when a disputed idea was recorded
    by whom. Such an implementation scheme may provide the IP holder with an increased
    firepower to protect his IP assets from infringers including patent trolls while
    streamlining the underlying administrative processes of the different authorities
    and stakeholders involved.


    ### Further Use Cases: Healthcare


    Health records that document our medical history including any diseases and surgeries
    are probably the most valuable and equally sensitive personal information about
    us. Whenever we consult a medical practitioner, we have to share this information
    or parts of it at least to enable him to provide us with an effective treatment
    or healthcare solution. Nowadays, our medical data usually comprises various paper-based
    documents, such as medical assessments, reports, and test certificates that are
    subject to unauthorized duplication and counterfeit. `Blockchain` technology can
    help to alleviate those problems by serving as an encrypted and tamperproof ledger
    that can store these records, diagnoses, and medications of the patient immutably.
    This network may be equipped with an elaborate permissioning system that allows
    patients to individually control which practitioner may access which medical data.
    It may even be used for tackling counterfeit drugs in the medical supply chain
    by verifying the authenticity of drugs based on the information that has been
    recorded at each stage of the entire value and supply chain.


    The current and prospective use cases discussed earlier convincingly show that
    `blockchain` technology is a very versatile digital technology that can be used
    across all sectors of modern economy and society to optimize existing and create
    new business opportunities. It is thus an excellent tool for driving digitalization
    and digital transformation in public and private organizations.'
