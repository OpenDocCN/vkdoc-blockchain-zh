  trans: '

    #### 监督学习：分类


    属于*分类*范畴的机器学习算法，能够将（大型）数据集分割成具有某些相似性或属性的共同标签或数据组。分类与回归类似，但我们预测的不是一个数值，而是一个最能描述输入数据的类别。到目前为止，最常用的算法称为*K-近邻算法*，它获取一组带标签的数据点，并将它们分组到`*K*`个类别中，其中`*K*`是一个整数。


    该算法的一个日益流行的应用场景是金融科技公司计算信用评分和评级。其分类模型会考虑多种因素，如收入、还款历史和居住地，来对潜在借款人进行分类。其他应用还包括垃圾邮件过滤、语言检测、情感分析和欺诈检测
    [32]。例如，每当我们标记一封垃圾邮件，我们的邮件服务商就会更新其机器学习模型，以便在未来识别最新、最狡猾的骗局。Facebook 在新上传的照片中建议朋友姓名的功能，也是基于我们之前标记输入所训练的该算法。另一个例子是美国金融支付卡公司
    Visa 开发的高级授权分析工具，它帮助金融机构每年防止约 250 亿美元的欺诈行为 [33]。


    ### 4.3.2 无监督学习


    与监督学习相反，*无监督学习*处理的是*未标记的数据*。此类算法在学习过程中独立运行。它们通常从猜测输入数据中的相似性和模式开始，然后通过迭代调整各自模型的不同参数，力求获得越来越好的结果。优化目标或成本函数可以通过多种定量方法实现，例如欧几里得度量或距离，它允许我们根据数据点在坐标系中的空间距离来评估其相似性。最著名的例子之一是谷歌的
    PageRank 算法，它成为了谷歌搜索引擎的原型。该算法是谷歌两位传奇创始人拉里·佩奇和谢尔盖·布林及其在斯坦福大学的同事们的智慧结晶，他们于 1998
    年发表了题为《PageRank 引用排名：为网络带来秩序》的开创性论文 [34]。在为其专利（专利号 US 6,285,999）提交申请一年后 [35]，他们推出了谷歌搜索引擎的第一个版本。自那时起，无监督学习已被应用于一系列其他商业应用中。全球顶尖的人工智能科学家之一杨立昆预测：“[...]
    从长远来看，无监督学习将变得重要得多。人类和动物的学习在很大程度上是无监督的：我们通过观察世界来发现其结构，而不是通过被告知每个物体的名字。”[36]


    #### 无监督学习


    在无监督学习的情况下，机器学习算法或程序在没有预定义类别的情况下扫描输入数据以寻找模式和结构，并迭代地识别出统计上最佳的分类方式。如果你不知道如何标记数据，并且希望算法为你找到相似性和模式来进行分类，这种方法非常适用。


    #### 无监督学习：聚类


    聚类是经典无监督学习中最流行的子类别。简单来说，可以将其类比为你洗完衣服后，不记得自己所有衣服的颜色，于是按颜色来分类衬衫。这类算法通常允许我们分割没有预定义类别或分类的大型数据集。算法会自行寻找相似的对象，将它们合并到一个聚类中，并以此自动找到分割数据集的最佳方式。迄今为止，该子类别中最常用的算法是*K-均值聚类*，它选取`*K*`个中心点或*质心*，将它们分布到数据集中，并将不同质心附近的所有数据点合并到一个聚类中。质心的位置会被迭代调整，直到所有数据点与其关联质心之间的平均距离最小化，从而建立起统计上最稳健的分组。此外，该算法允许绘制一个“曲棍球棒图”或“肘部图”，通过绘制数据与质心之间的平均距离与`*K*`值的关系，我们可以确定统计上理想的聚类数量。该图通常呈曲棍球棒形状，其拐点处即为理想的聚类数量。K-均值聚类最流行的应用可能是营销活动中的*市场*和*客户细分*，如图
    4-7 示例所示。


    另一个应用是*情感分析*，它挖掘社交媒体数据以识别社会总体趋势。例如，这对于一家时尚公司来说至关重要，可以帮助他们了解如何在下一条服装线中调整已识别的风格。另一个例子是在城市地图上标记热门地点。例如，当你在谷歌地图上寻找餐馆时，你可能已经注意到，谷歌的聚类引擎会在非常低的缩放级别下，将搜索结果聚集到带有数字的块状区域中。这是一个非常重要的功能，否则，当你的浏览器试图同时在地图上绘制成千上万家餐馆时，可能会卡死。你还可以想到政府背景下的国家安全机构和执法组织，他们可以使用聚类来寻找异常模式并识别潜在的安全威胁，这种应用被称为*异常检测*。在这些情况下，聚类算法尤其有用，因为我们通常不知道要寻找的具体异常模式。


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig7_HTML.jpg](img/505424_1_En_4_Fig7_HTML.jpg)


    **图 4-7** 通过绘制客户年收入与年龄的关系进行客户细分。在此示例中，算法找到了三个质心，分别标记为“C1”、“C2”和“C3”（菱形），这三个质心刻画了三个客户群体（黑色、中灰色和浅灰色虚线）

    '
- fmt: '### Unsupervised Learning: Association


    *Association* or association rule learning is another group of algorithms that
    employs unsupervised learning strategies and is used for recommending you similar
    books in the “Customers who bought this item also bought” section of Amazon, for
    instance. Those algorithms are looking for patterns and relations between variables
    in (very) large datasets [[37](#505424_1_En_4_Chapter.xhtml#Par276), [38](#505424_1_En_4_Chapter.xhtml#Par277)]
    by selecting rules based on different measures of significance and interest. The
    `support` parameter of this model quantifies how frequent an item set, such as
    a list of products, appears in the dataset while the `confidence` indicates how
    often an association rule can be found in the data. The *a priori* association
    rule algorithm, for example, starts by setting a minimum support and confidence
    bound and iteratively identifies and ranks all subsets with higher support and
    confidence values. It is nowadays used to, for example, analyze shopping carts
    and automate marketing strategies – an approach called behavioral microtargeting
    – since this algorithm looks for the frequency and probability of co-occurrence
    among any set of items and creates associations that are likely to occur between
    various types of products in future.


    One concrete example is about product placing in supermarkets. Consider a customer
    takes a six-pack of beers and goes to the checkout. Should we place chewing gums
    on the way, that is, are beer and chewing gum sales correlated somehow? Gaining
    valuable customer insights to drive sales in supermarkets and warehouses is a
    fairly typical use case for association rule learning. It can generally be applied
    whenever you have a sequence of something and you want to find obvious and hidden
    patterns and relations in it. The British online supermarket Ocado, for instance,
    learned from its data that there is a strong correlation between diapers and beer.
    They found out that new parents do not go out much, which is why recommending
    beer and wine when they purchase diapers turned out to be very profitable and
    increase customer satisfaction.


    ### Unsupervised Learning: Dimensionality Reduction


    *Dimensionality reduction* or generalization is about finding abstract patterns
    in large datasets that are more convenient to use for data processing than fragmented
    features. All dogs with triangle ears, long noses, and big tails, for instance,
    can be generalized to the group of shepherds, which is more useful for explaining
    and dealing with the peculiarities of this race than describing its physiological
    characteristics separately. Such algorithms have been used for latent semantic
    analysis that allows for the abstraction of specific words to their meanings by
    clustering specific words to topics. Besides this so-called *topic modeling*,
    the most popular applications of dimensionality reduction are probably *recommender
    systems* and *collaborative filtering* for the analysis of customers’ behavioral
    patterns based on multiple aspects, viewpoints, data sources, and others.


    ### 4.3.3 Deep Learning


    Besides supervised and unsupervised learning, deep learning forms the third large
    group of learning strategies and is used conventionally to train artificial neural
    networks. *Deep learning* is a subcategory of machine learning that is inspired
    by the structure and function of the (human) brain. It is the youngest area of
    research in artificial intelligence and has generated a lot of excitement in media
    lately, partly because it offers a whole range of highly interdisciplinary applications.


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig8_HTML.png](images/505424_1_En_4_Chapter/505424_1_En_4_Fig8_HTML.png)


    **Figure 4-8** Basic circuit model of a single neuron with two decimal inputs
    `x[1]` and `x[2]`. The output is a mathematical function of the weighted sum of
    inputs `w[1] x[1] + w[2] x[2]`, denoted by `a[w]`, and called activation function


    #### Artificial Neural Network


    An artificial neural network is a structure of interconnected neurons that are
    typically arranged in multiple layers. Each neuron is connected to the neurons
    in the preceding and succeeding layers and characterized by a certain activation
    function. Together with the strength (weight) of each connection, the activation
    function of each neuron controls how the information is transmitted through the
    network from the input to the output layer. Artificial neural networks mimic the
    intelligent behavior of the brain and can be applied to a wide range of applications.'
  raw: '#### Unsupervised Learning: Association


    *Association* or association rule learning is another group of algorithms that
    employs unsupervised learning strategies and is used for recommending you similar
    books in the “Customers who bought this item also bought” section of Amazon, for
    instance. Those algorithms are looking for patterns and relations between variables
    in (very) large datasets [[37](#505424_1_En_4_Chapter.xhtml#Par276), [38](#505424_1_En_4_Chapter.xhtml#Par277)]
    by selecting rules based on different measures of significance and interest. The
    *support* parameter of this model quantifies how frequent an item set, such as
    a list of products, appears in the dataset while the *confidence* indicates how
    often an association rule can be found in the data. The *a priori* association
    rule algorithm, for example, starts by setting a minimum support and confidence
    bound and iteratively identifies and ranks all subsets with higher support and
    confidence values. It is nowadays used to, for example, analyze shopping carts
    and automate marketing strategies – an approach called behavioral microtargeting –
    since this algorithm looks for the frequency and probability of co-occurrence
    among any set of items and creates associations that are likely to occur between
    various types of products in future.


    One concrete example is about product placing in supermarkets. Consider a customer
    takes a six-pack of beers and goes to the checkout. Should we place chewing gums
    on the way, that is, are beer and chewing gum sales correlated somehow? Gaining
    valuable customer insights to drive sales in supermarkets and warehouses is a
    fairly typical use case for association rule learning. It can generally be applied
    whenever you have a sequence of something and you want to find obvious and hidden
    patterns and relations in it. The British online supermarket Ocado, for instance,
    learned from its data that there is a strong correlation between diapers and beer.
    They found out that new parents do not go out much, which is why recommending
    beer and wine when they purchase diapers turned out to be very profitable and
    increase customer satisfaction.


