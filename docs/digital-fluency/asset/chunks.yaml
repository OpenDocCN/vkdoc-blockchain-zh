    and Arcade City. Both startups leverage blockchain technology to implement a peer-to-peer
    rideshare network, which governs direct interactions between drivers and users.
    This approach is sometimes referred to as *platform cooperativism* since users
    qualify for both contributors and shareholders of the platform to which they contribute.
    Another very interesting example is the free online marketplace OpenBazaar. Similar
    to Amazon and eBay, OpenBazaar allows users to register products and advertise
    them to other users connected to the network. But since OpenBazaar leverages blockchain
    technology to allow buyers and sellers to interact directly without any centralized
    middleman, OpenBazaar comes with zero transaction and platform fees. Only if there
    is a (legal) issue between the two, the network requires the intervention of a
    third mediating party to decide whether to release the payment or not.'
  trans: '


    另一家探索基于区块链的银行和交易服务的美国投资银行是摩根大通，该公司与微软 Azure 合作推出了一个智能合约平台。这个开源平台名为 `Quorum`，旨在让金融机构更轻松、更快捷、更廉价地构建自己的区块链应用程序。^(⁷⁴)
    `Quorum` 基于以太坊协议，并通过 `Aztec-protocol`^(⁷⁵) 进行了扩展，可为任何通用数字资产类别实现机密交易 [33]。与 `Zether
    Protocol`（Aztec 的功能前身）不同，交易方的账号和账户余额等个人数据也被隐藏和加密，因此此类交易被称为 `零知识交易`。`Quorum` 区块链的独特卖点在于其协议中嵌入了极高的数据保护和隐私要求，能够对整个区块链（包括交易和智能合约）进行高效加密。这一点对于投资银行及其他金融机构尤为重要，因为它们的整个商业模式都建立在信任和保护客户个人数据的基础上，专注于私人价值转移和资产治理。`Quorum`
    还采用了一种名为 `QuorumChain` 的非常特殊的共识机制，允许授予某些用户特定的投票权。此外，`Quorum` 还提供了一种名为 `JPM Coin`
    的专属加密货币，该币与美元挂钩，因此相比其他无担保加密货币，其价格水平稳定性和波动率都要低得多 [34]。此类由银行背书的硬币被视为加密货币的圣杯，并因其显而易见的原因被称为
    `稳定币` [35]。


    一些此前并未涉足金融科技领域的公司，例如德国汽车零部件制造商采埃孚（ZF Friedrichshafen），也在探索区块链技术为金融和支付服务带来的机遇。该公司与
    IBM 和瑞银集团（UBS）共同创立了德国初创企业 `Car eWallet GmbH`^(⁷⁶)，旨在为包括汽车共享在内的出行服务端到端集成提供金融交易网络。该合资企业还致力于将自动驾驶汽车全面连接到汽车云，使其成为能够通过智能合约自动按需消费和支付停车、充电等出行服务的商业实体。这种由区块链驱动的机器对机器交易，是基于物联网实现传统商业模式数字化转型的绝佳范例。


    除了交易和支付服务外，区块链技术也有望影响我们现代的 `共享经济` [36]，它指的是私人个体和利益团体之间对物品的系统性借用。在此背景下，有两个非常有趣的例子值得一提，即两个去中心化、由社区拥有的交通平台
    `LaZooz` 和 `Arcade City`。这两家初创公司都利用区块链技术构建点对点的拼车网络，用以管理司机和用户之间的直接交互。这种方法有时被称为
    `平台合作主义`，因为用户既是平台的贡献者，也是其贡献平台的股东。另一个非常有趣的例子是免费在线市场 `OpenBazaar`。与亚马逊和 eBay 类似，`OpenBazaar`
    允许用户注册商品，并向连接到网络的其他用户进行推广。但由于 `OpenBazaar` 利用区块链技术让买家和卖家直接互动，无需任何中心化中间商，因此它实现了零交易费和零平台费。只有当双方之间出现（法律）问题时，网络才需要第三方调解方介入，以决定是否放行付款。


