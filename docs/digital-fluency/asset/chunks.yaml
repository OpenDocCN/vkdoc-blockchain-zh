    如果您是商业领袖，**数字素养**能让您深入了解数字技术及其对管理和决策的影响。如果您是学生，本书将为您提供不同的技术框架，用于思考数字行业的工作和职业生涯演变。如果您是金融分析师或风险投资人，**数字素养**能为您提供富有启发性的见解，助您制定并实施高利润的投资策略。另一方面，如果您是政治家或政策制定者，您将更清楚地理解数字技术如何影响社会及政府组织，尤其是如何用于简化行政流程。如果您是普通读者，不属于上述任何一类，您将对数字技术如何影响现代工业与社会，以及它们将如何在一个日益全球化、高度互联的数字化世界中塑造我们每个人的未来感到惊讶。


    阅读本书时，您会意识到，数字转型与数字技术的历史是一场跨越经济学、行为科学、信息技术、自然科学和物理学等多个学科领域的愉快且引人入胜的旅程。这就是为什么在接下来的章节中，我将向您介绍现代科学中最基本、最迷人的一些概念，而无需您具备超出初中水平的数学技能。


    **数字素养** 共分为五个章节，旨在涵盖关键科学概念并突出重要的应用示例。以下是各章节的简要介绍：


    -   **第 1 章“数字化与数字转型”**：本章为您提供数字化和数字转型的基础知识。您将了解到这两个概念源于量子计算、区块链技术和人工智能等不同数字技术的融合，这些技术本质上是颠覆性的。此外，我们将探讨组织的数字生态系统，并识别其中最重要的数字转型驱动力，例如可持续性、网络安全，以及产品和服务日益增长的复杂性和连接性。我们还将审视数字转型战略，包括亚马逊、谷歌、微软和
    IBM 的创新模式，以强调数字转型远不止是简单更新组织的 IT 基础设施。来自诺基亚和伊士曼柯达公司的广为人知的案例将说明数字颠覆的致命后果——这是一种竞争力量，常常导致现有企业如果不能及时利用数字技术就会失败。本章最后将简要介绍经典信息处理，这是现代计算机、智能手机以及我们日常生活中使用的其他数字设备运行的基础。


    -   **第 2 章“量子计算”**：在本章中，您将学习量子计算的关键概念，这是最令人兴奋且技术上最具挑战性的数字技术之一。量子计算机有时被称为“下一阶段的超级计算”，因为它们可以同时进行海量计算，与传统计算机相比，在计算速度和性能上提供指数级的提升。这种巨大的提升与不同的量子效应有关，例如叠加和纠缠，这些效应被用于编码和处理量子信息。我们还将涵盖最重要的物理实现方案和基本类型的量子计算机（这些在媒体中常被错误使用）。除此之外，还将介绍当今市面上一些最相关的量子计算机，例如
    D-Wave 名为 5000Q 的量子退火器和谷歌传奇的 Sycamore 量子处理器。后者最近引起了媒体的极大关注，因为谷歌在 2019 年首次展示了量子霸权，这是量子计算机发展中的一个重要技术里程碑。最后但同样重要的是，我们将讨论最重要的应用，例如药物开发、金融投资组合优化和量子机器学习。


    -   **第 3 章“区块链技术”**：在本章中，我们将审视区块链技术，该技术最初是为比特币而创建的。比特币是迄今为止全球首个且最流行的数字货币或加密货币。您将了解到区块链技术——有时被称为“终极信任机器”——如何在不可信环境中部署信任。它因此使得两个或更多交易方之间能够进行可信的价值交换，即使他们既不了解也不信任对方。您可能会惊讶地了解到，此处的价值可以指任何有价值数字信息，例如数字货币、知识产权和其他数字化资产。对最重要的关键概念（包括点对点计算机网络、数字签名和梅克尔树）的生动解释，也将使您能够更好地理解用于转移货币价值的整个比特币交易生命周期。此外，我们将涵盖智能合约，作为区块链技术的一个重要扩展，它使得组织中的行政流程自动化成为可能。虽然大多数专家认为比特币曾是一时热潮，但我们在本章末尾将看到，区块链技术的应用仍在持续增长。为此，我们将讨论最重要的应用，例如国际贸易平台、供应链管理系统，以及电子税务和电子投票。

    '
- fmt: '# Chapter 4, “Artificial Intelligence”


    In this chapter you will develop a basic understanding of artificial intelligence,
    the most versatile digital technology that fosters digital transformation. After
    studying its exciting history including IBM’s legendary research projects named
    `IBM Deep Blue` and `Watson`, we will turn our focus to the different subcategories
    and learning strategies that are employed in state-of-the-art applications today.
    In this context, you will learn about supervised, unsupervised, and reinforcement
    learning. You will also learn about the similarities between our human brain and
    artificial neural networks that emulate aspects of human intelligence by software
    and are at the heart of the emerging and increasingly popular field of deep learning.
    There is also coverage of the most important subcategories of artificial neural
    networks including recommender systems as well as convolutional, recurrent, and
    generative adversarial neural networks. Last but not least, we will have a close
    look at important and equally inspiring applications of artificial intelligence,
    such as Amazon’s `Just Walk Out` shopping technology, Tesla’s and Waymo’s autonomous
    driving systems, Apple’s `Siri` virtual assistant, Google’s natural language processing
    and translation system, `Benevolent AI`’s approach to drug development, Bloomberg’s
    news analytics platform, `JPMorgan Chase`’s intelligent pricing algorithm, as
    well as `BlackRock`’s sophisticated investment network named `“Aladdin”`.


    # Chapter 5, “Your Digital Action Plan”


    Time to get ready for your own digital transformation. This final chapter ties
    off our broad discussion of digital transformation and enabling technologies and
    provides you with an actionable and comprehensive framework for planning and executing
    your own digital transformation based on eight core dimensions. Peppered with
    numerous examples of very successful and world-leading organizations, we will
    particularly talk about developing digital business and operating models, selecting
    an appropriate technology stack based on cloud computing, and digitizing the core
    of an organization. You will also learn how to identify promising digital pilot
    projects, empower management and employees, and shape the organizational structure.
    Last but not least, we will highlight the importance of establishing an open innovation
    culture and leveraging your ecosystem by engaging with customers and other important
    beneficiaries.


    In addition to a further reading section, you will find a summary of key points
    at the end of each chapter. Furthermore, Chapters 2, 3, and 4 will provide you
    with easy-to-use frameworks that will allow you to determine whether a digital
    technology can be applied to your own ideas and use cases or not. A comprehensive
    glossary of common terms related to digital transformation and digital technologies
    at the back of this book will provide further guidance on your own digital transformation
    journey.


    From the large number of references in this book, you may deduce rightfully that
    quantum computing, blockchain technology, and artificial intelligence are very
    dynamic areas with new discoveries and players appearing on an almost daily basis.
    Although the numerous examples discussed in this book will surely become dated,
    the presented concepts, underlying principles, and frameworks will not. Those
    valuable insights will continue to apply as digital technologies improve and evolve
    over time.


    Due to the great variety of digital topics covered, *Digital Fluency* allows for
    three different fast track learning journeys. If you are particularly interested
    in learning about digitalization and digital transformation from a business point
    of view, you may prefer to read selected sections of Chapters 1 and 5 only. If
    you have a very strong technological focus and want to better understand either
    quantum computing, blockchain technology, or artificial intelligence, you may
    like to read selected sections of Chapters 1 to 4 only. If you are familiar with
    digital transformation and the operational principles of its enabling technologies,
    on the other hand, I recommend reading the application sections of Chapters 2,
    3, and 4 according to the following table.


    | I. Transformation Focus | II. Technology Focus | III. Application Focus |

    | --- | --- | --- |

    | ▪ Sections 1.1 to 1.3 | ▪ Section 1.4 | ▪ Sections 2.3 to 2.5 |

    | ▪ Sections 5.1 to 5.9 | ▪ Sections 2.1 and 2.2 | ▪ Sections 3.3 to 3.5 |

    |   | ▪ Sections 3.1 and 3.2 | ▪ Sections 4.4 to 4.6 |

    |   | ▪ Sections 4.1 to 4.3 |   |


    Finally, I wish you an enjoyable and entertaining digital journey through three
    of the most fascinating digital technologies of our time and their exciting applications
    and use cases in industry, politics, and society. I hope *Digital Fluency* will
    transform your thinking from an opaque landscape dominated by incomprehensible
    buzzwords to a place of digital inspiration for innovative projects and novel
    ideas.


    Get inspired and enjoy reading.


    About the Author Footnotes 1'
