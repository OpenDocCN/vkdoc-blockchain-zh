    但这并非特斯拉创新性自动驾驶方法唯一有趣的方面。第二个方面是关于 FSD 计算机中 NPU 的训练。为此，特斯拉建立了一整套 IT 基础设施和生态系统，从道路上的车辆收集原始视频流和数据，以迭代方式提高其自动驾驶仪的性能。这些数据在一个大型全栈式共享骨干网络（类似于云）中进行分析，该网络包含不同的残差网络，特斯拉称之为“HydraNets”。每个`HydraNet`都是一个共享骨干网络，它对自动驾驶任务进行子采样，并专注于优化特定的子任务，例如标注交通标志、车道线、道路标记，或预测道路布局以优化车辆的遥测数据。特斯拉敏捷且迭代的软件开发流程依赖于快速原型设计和测试。该流程通常分为三个主要步骤：


    1.  第一步是开发某个功能的第一个近似版本，并使用`HydraNet`数据引擎对其进行训练，以便为 FSD 中不同的卷积网络找到一组合理的初始权重。

    2.  然后，这个近似版本通过无线软件更新部署到车队，但不会直接激活。它是在*影子模式*下运行的，这使得可以在真实条件下进行进一步测试。此模式还会收集软件仍然表现异常、运行不正确的交通状况的照片和视频流。^(¹²²)

    3.  第三步涉及标记收集到的数据，并将其作为额外的示例纳入特斯拉`HydraNet`数据引擎的训练数据集中。这些额外的训练数据随后作为输入，用于通过相应的`HydraNet`进一步优化近似软件模型。


    这个三步流程有时被特斯拉称为*主动学习*，并会重复进行，直到软件能够在影子模式下记录的所有真实条件下可靠、安全地运行。一旦训练完成，软件的最终版本将通过无线更新部署到车队，同时影子模式被停用。多年来，特斯拉不断优化这一软件开发流程，并通过其自动驾驶仪从超过
    50 个国家累积了超过 10 亿英里的数据。这些大数据未来可能会成为相对于其他汽车制造商的关键竞争优势^(¹²³)。


    与特斯拉不同，`Waymo`和大多数传统汽车制造商采用基于激光雷达的自动驾驶方法。`Waymo`，前身为谷歌的自动驾驶汽车项目，目前是位于加利福尼亚州山景城的`Alphabet`（谷歌母公司）的美国子公司，旨在根据其自身信息打造“世界上最有经验的驾驶员™”。其产品组合包含两项服务：一项名为“`Waymo
    One`”的商业自动驾驶出租车服务，以及一项名为“`Waymo Via`”的商业货物配送服务。`Waymo`的竞争优势在于其独特且高度精细的测绘技术，这些技术能帮助车辆即使在传统地理定位系统难以工作的区域（如隧道或摩天大楼之间）也能导航。`Waymo`的技术套件由四个定制构建的关键组件组成：（1）用于生成高精度环境地图的激光雷达扫描仪，（2）视觉摄像头，（3）雷达传感器，以及（4）一个基于
    AI 的计算平台[97]。其最新的第五代“`Waymo Driver`” [98]于 2020 年首次安装在旧金山湾区部署的一系列全电动`Jaguar I-Pace`车辆上。该系统配备了四个周视激光雷达，以提供无与伦比的覆盖范围和宽视场角，用于短距离探测。此外，它还在车顶的“`Waymo
    Dome`”盒子中安装了一个 360 度激光雷达，可提供车辆以及周围行人和物体的 300 米鸟瞰视图。该系统辅以 29 个视觉摄像头，用于 360 度和周边远距离探测，其中
    16 个位于穹顶的激光雷达下方。另有 13 个摄像头集成在车身周围，其中一些能够以高分辨率看到超过 500 米远的距离。周视和周边视觉系统与六个高分辨率成像雷达协同工作，这些雷达能够在雨、雾、雪等恶劣天气条件下跟踪静止和移动的物体。由于海量的感官数据，`Waymo`开发了一种完全不同的环境数据处理方法，称为“`VectorNet`”
    [99]。这个相当新的机器学习模型首先将从其高精度地图（如车道、停止线和交叉路口）获得的语义信息转换为向量，即具有长度和方向的几何对象。然后将这些向量输入一种特殊的人工神经网络，称为*层次图神经网络*
    [100]，该网络能更好地捕捉各种向量之间的关系，因为其神经元通常不再按层组织，而是分布在一个网络——即所谓的*图*——中。例如，当汽车进入交叉路口或行人接近人行横道时，就会发生这种物体轨迹与道路特征之间的关系。`Waymo
    Driver`中使用的特定图被特意选择用来最佳描述不同感官输入之间非常复杂且高度相互依赖的关系。作为`Alphabet`的一部分，`Waymo`使用谷歌强大的云计算基础设施来访问不同的`TPU`以训练其图神经网络，这支撑了公司达到`SAE`（美国汽车工程师学会）5
    级自动驾驶的雄心壮志以及最终的自动驾驶技术领导地位的主张。从 2020 年 10 月开始，`Waymo`宣布将在短期内向其打车服务的所有客户开放完全无人驾驶服务，前排座位上无需安全驾驶员[101]。


    由于自动驾驶技术整体市场已变得越来越模块化，像`Nvidia`这样的成熟微芯片制造商最近也开始投资这项技术。根据具体的自动驾驶级别，`Nvidia`在其`DRIVE
    AGX`系列中提供一整套基于摄像头和激光雷达的自动驾驶计算机^(¹²⁴)。其最新的芯片组`Nvidia DRIVE AGX Orin`已于 2019 年发布，被设计为一个可从`SAE`（美国汽车工程师学会）2
    级扩展到 5 级的自动驾驶平台[102]，这对于那些决定不自行开发该技术的传统汽车制造商来说尤其具有吸引力。根据其自身信息，`Nvidia`目前正在与大众、丰田、奥迪、梅赛德斯-奔驰、宝马和沃尔沃等公司合作。

