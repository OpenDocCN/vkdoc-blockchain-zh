- fmt: '## 5.4 Identify Pilot Projects


    The digital transformation of an organization cannot be finished over night from
    one day to the other, of course – it is a transformation journey rather than a
    sprint. Furthermore, incumbent organizations often need to continue running a
    legacy business while transforming organizational units and processes digitally.
    This is why it is crucial to start your digital transformation journey with pilot
    projects (^([143](#fn143))^) to create enthusiasm across the organization and
    drive its digital transformation. Innovative digital organizations, like Microsoft
    or Google, do always launch multiple pilot projects to increase the odds of getting
    a win.


    For pilot projects to be successful, they need to fulfill certain key criteria.
    The following list may help you with identifying and selecting the most promising
    pilot projects for your own organization and use case (^([144](#fn144))^):


    - *Quick wins*: In order to create enthusiasm across your organization and convince
    stakeholders to invest in building up digital capabilities, a pilot project ideally
    drives for early results and quick wins. A pilot project should typically take
    between 6 and 12 months prior to delivering its final result.


    - *Scalability*: A pilot project should be scalable so that it can be expanded
    to other business units upon its completion – poor scalability is the main obstacle
    most pilot projects suffer from.


    - *Industry-specific focus*: Pilot projects should focus on areas, where you are
    going to go at scale, earn money, and intend to create value on a long term.


    - *Concrete business purpose*: Successful pilot projects always focus on concrete,
    well-defined business problems or challenges to experiment on and learn from.
    This may be a balky internal process or a previously intractable problem that
    can now be addressed by digital technology. In other words, digitalization and
    digital transformation need to fulfill a concrete business purpose and are no
    fashionable end in itself.


    In practice, pilot projects often face one major challenge that is in fact the
    main reasons why digital transformations fail [[34](#505424_1_En_5_Chapter.xhtml#Par173)].
    This challenge is related to scalability – the second selection criterion – and
    called *proof-of-concept trap*. It refers to projects with an infinite pilot phase,
    which prevents the successful rollout of prototypes across the entire organization
    in time. Projects of that type turn into an endless “science experiment” that
    deploys overly complex solutions to showcase technical prowess even if a simple
    solution is available and may quickly return value. This is partly related to
    the fact that digital pilot projects often innovate in a very artisanal way without
    any established processes and delivery plans. The proof-of-concept trap can be
    avoided by focusing consequently on a concrete business purpose and making a reasonable
    compromise between innovation and industrialization. Successful pilot projects
    explore promising prototypes for innovation and concepts for their industrialization
    together at the same time rather than sequentially. This approach allows for a
    rapid rollout of successful features as soon as the first simple prototype version
    of a product or service has been established – just think about Tesla’s autopilot
    and its active learning strategy discussed in the previous chapter, for instance.


    Vittorio Colao, the CEO of Vodafone Group, compares pilot projects with boats
    on the sea and framed the associated leadership challenge nicely with the words:


    > There are big new winds blowing – in data analytics, automation and artificial
    intelligence – and they will not blow exactly in the same way across all of the
    organization. In my fleet some boats will gain speed, while others have smaller
    sails and won’t capture the same momentum. The question is whether you allow each
    boat to go at its own cruising speed – as we did in the beginning – or if you
    want to align the fleet and wrap it into a big program, as we are now trying to
    do. Aligning the boats is helpful for the organization, but you also risk forcing
    them into a linear speed that ends up being blown away by disruptors [[35](#505424_1_En_5_Chapter.xhtml#Par174)].


    ## 5.5 Empower Management and Employees


    Another very crucial aspect of digital transformation regards the continuous empowerment
    of employees by education and training. This measure cannot be overstated since
    – simply put – people make change happen [[36](#505424_1_En_5_Chapter.xhtml#Par175)].
    Digital transformation requires technical skills that legacy organizations often
    lack. Digital pilot projects rely on multidisciplinary and agile innovation teams,
    (^([145](#fn145))^) in which different talents complement each other – diversity
    is the key to success here [[37](#505424_1_En_5_Chapter.xhtml#Par176)]. The skills
    required for a digital product development team (or “squad” (^([146](#fn146))^))
    to be successful range from data science – the skills to turn data into valuable
    insight and action – to project management, product design, software development,
    agile methodologies (including design thinking [[39](#505424_1_En_5_Chapter.xhtml#Par178)],
    blue ocean strategy [[40](#505424_1_En_5_Chapter.xhtml#Par179)], and scrum [[41](#505424_1_En_5_Chapter.xhtml#Par180)]),
    marketing, and storytelling [[42](#505424_1_En_5_Chapter.xhtml#Par181)]. An insightful
    framework for building successful project teams in the digital age is given in,
    for example, [[43](#505424_1_En_5_Chapter.xhtml#Par182)].


    For a digital transformation to be successful on a long term, each team member
    must develop a basic understanding of digital technologies and adapt a digital
    mindset independently of a technical or nontechnical background. This is what
    the two American Google executives Eric Schmidt and Jonathan Rosenberg call *smart
    creatives* [[44](#505424_1_En_5_Chapter.xhtml#Par183)] to refer to a new breed
    of employees, who combine technical depth with business savvy and creativity.
    Digital education is not only vital for developing digital products and services
    and interpreting the results obtained from (big) data analytics but also for anticipating
    technological trends and accessing their potential impact on an organization on
    the short and long turn. This is why digital transformation often involves launching:


    1. Major internal upskilling programs to activate and retain digital talent

    2. External recruiting programs to attract new talent in areas where digital skills
    and knowledge are rare

    3. External collaborations with online talent platforms such as `Upwork`, `Topcoder`,
    and `Kaggle`, to hire the digital expertise required for the pilot project temporarily


    The third option is particularly important since organizations cannot learn everything
    at once. They rather have to focus and develop their digital core competencies
    in-house and hire everything else from external sources. This is why it is crucial
    for organizations to determine and prioritize the data skills they foremost need
    in advance [[45](#505424_1_En_5_Chapter.xhtml#Par184)].


    Due to the increasing importance of artificial intelligence for its business,
    the American software company Adobe, for example, recently launched a six-month
    machine learning training and certification program for its more than 5,000 engineers
    worldwide. However, the particular skills you need on your digital pilot projects
    will critically depend on how deeply you plan to get into digital technologies
    and associated tasks, such as software development and programming. The good news
    is that many cloud computing vendors and open source platforms offer software
    tools and online trainings for free – digital technology and knowledge are slowly
    getting democratized.


    Empowering employees is also about developing digital leaders and transforming
    the role of management. According to Marco Iansiti and Karim Lakhani,'
