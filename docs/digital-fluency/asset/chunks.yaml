    \ see that its disruptive potential might redefine their business and eliminate\
    \ competitive advantages that were accumulated over decades – disruptive technology\
    \ is an opportunity long before it is a threat. Instead, Kodak’s management opined\
    \ that consumers will focus on printing again once the temporary trend of digital\
    \ photography is phased out. This is why they started to protect their business\
    \ by employing their huge marketing machine. In contrast to its major Japanese\
    \ competitor Fujifilm, who integrated digital technology very well into its business,\
    \ the disrupting force of digital photography contributed to Kodak’s (architectural)\
    \ inertia and did not catalyze any change or digital transformation. By the time\
    \ they realized their thorough misjudgment and launched their first own digital\
    \ camera, it was too late, and Kodak’s downturn was inevitable. The 120-year-old\
    \ company had to file for bankruptcy protection in 2012, sold off their patents,\
    \ and reemerged as a much smaller company in 2013\\. In 2018, it reported around\
    \ USD 1.33 billion of sales, one-tenth of the legendary value it reached 37 years\
    \ before. This and numerous other examples prove that business disruption is a\
    \ matter of when rather than if it will happen. This is why thought leaders should\
    \ anticipate change by proactively looking and striving for self-disruption rather\
    \ than coping with disruption when it happens.\n\nThe Kodak Eastman Company is\
    \ just one example for what Clayton Christensen termed *innovator’s dilemma* [[17](#505424_1_En_1_Chapter.xhtml#Par219)].\
    \ This term refers to the challenge of market-leading organizations to exploit\
    \ existing core businesses while exploring new disruptive innovations that secure\
    \ market leadership in future and avoid economic failure due to new disruptive\
    \ players in the market. In case of Kodak, this dilemma manifested itself in deciding\
    \ whether to invest in digital photography or not. Guided by marginal thinking,\
    \ Kodak’s management compared the marginal cost of their existing photographic\
    \ film business with the marginal cost associated with digital photography and\
    \ came to the misleading conclusion that it is much more profitable of pursuing\
    \ their established film business. In other words, *marginal thinking* biased\
    \ them to focus on what has been successful in the past, instead of guiding them\
    \ to create the digital capabilities they will need in the future. Kodak ultimately\
    \ failed to identify digital photography as a disruptive technology or the “next\
    \ big thing” in this market and ended up paying the total cost^([⁹](#fn9)) for\
    \ not investing rather than the much lower marginal cost^([^(10)](#fn10)) for\
    \ investing in digital photography. Economic failure is often the consequence\
    \ of this marginal thinking. Compared to a mature core business, investments in\
    \ future innovations including the three digital technologies introduced in this\
    \ book almost always come with low marginal profits and high marginal cost. But\
    \ since they often turn out to be crucial for an organization’s success in future,\
    \ it is important to evaluate investments in future innovations in terms of the\
    \ total costs and strategic consequences associated with not investing in them –\
    \ the marginal side of things is secondary. The American automobile pioneer and\
    \ businessman Henry Ford described this insight nicely with the famous words “If\
    \ you need a machine and don’t buy it, you will ultimately find that you have\
    \ paid for it and don’t have it.” With these insights, examples, and terminology\
    \ at hand, we are now ready to discuss the three digital technologies introduced\
    \ in this book in terms of general-purpose technologies that unfold a disruptive\
    \ force and drive digital transformation."
