- fmt: "# 2.5 Quantum Computing Framework\n\nAre you thinking about using quantum\
    \ computing in your organization or applying it to your own use case? If the answer\
    \ to most of the key questions in the following implementation checklist is “Yes,”\
    \ quantum computing may well assist you in implementing your own business idea\
    \ or use case.\n\n1.  What is your use case about – does it fit into one of the\
    \ following generic categories? Yes □ No □\n    *   Sampling problem\n    *  \
    \ Optimization problem\n    *   Large database search\n    *   Simulation and\
    \ modeling\n    *   Solving systems of linear equations\n    *   Integer factorization\
    \ for cryptography, for example\n    *   Generation of random numbers (“certified\
    \ randomness”)\n2.  Has a similar use case been described (in literature or media)\
    \ before? Yes □ No □\n3.  Is there an ongoing process in your organization that\
    \ relies on or requires supercomputing? Yes □ No □\n4.  Are you spending resources\
    \ (human, financial, etc.) on trial-and-error alternatives – for example, wet-lab\
    \ experiments or physical prototyping – that could be accelerated by supporting\
    \ or substituting them with supercomputing? Yes □ No □\n5.  Do you have access\
    \ to all human resources, such as technical engineers, physicists, and programmers,\
    \ required for maintaining the quantum computing hardware and developing quantum\
    \ software (algorithm)? Yes □ No □\n6.  Is the number of possible solutions to\
    \ your problem – the so-called search space – exponentially larger than the amount\
    \ of input data? If not, the particular problem is not feasible for a quantum\
    \ computer. Yes □ No □\n7.  Is there no fast and convenient way to solve your\
    \ use case by classical computers on a reasonable timescale? Yes □ No □\n8.  Is\
    \ the solution to your problem very urgent, and do you not have enough time to\
    \ solve your use case on a classical computer? Yes □ No □\n9.  Does anyone in\
    \ your ecosystem, such as collaboration partners and competitors, apply quantum\
    \ computing already? Yes □ No □\n10. Is quantum computing able to provide a long-lasting\
    \ competitive advantage for you? Yes □ No □\n    Further questions to be considered\
    \ when planning your implementation:\n    *   Who is expected to use the quantum\
    \ computer internal or external to your organization and what expectations do\
    \ they have?\n    *   How are you going to integrate your quantum computer into\
    \ your existing IT infrastructure (on premise or on demand)?\n    *   Who would\
    \ need to maintain its technical infrastructure?\n\n## 2.6 Further Reading\n\n\
    At the end of this chapter, I would like to provide you with some recommendations\
    \ for further reading if you like to dive deeper into the exciting field of quantum\
    \ computing and its applications:\n\n*   Hidary, J. D.: Quantum Computing: An\
    \ Applied Approach. Springer International Publishing (2019).\n*   Nielsen, M.\
    \ A. and Chuang, I. L.: Quantum Computation and Quantum Information. Cambridge\
    \ University Press (2010).\n*   Feynman, R. P.: Feynman Lectures on Computation.\
    \ Westview Press (2000).\n*   Rieffel, G. and Polak, W. H.: Quantum Computing:\
    \ A Gentle Introduction. The MIT Press (2011).\n*   Audretsch, J. (Editor): Entangled\
    \ World: The Fascination of Quantum Information and Computation. Wiley-VCH (2006).\n\
    *   Sutor, R. S.: Dancing with qubits: How quantum computing works and how it\
    \ can change the world. Packt Publishing (2019).\n*   Johnston, E. R.: Programming\
    \ Quantum Computers: Essential Algorithms and Code Samples. O’Reilly Media (2019).\n\
    \nI can also highly recommend to explore the “Quantum Computing Report” on [`www.quantumcomputingreport.com/`](https://www.quantumcomputingreport.com/)\
    \ for further information about the entire quantum computing ecosystem including\
    \ educational articles, players, and the most recent applications and use cases.\
    \ Another very interesting website is provided by the “Quantum Open Source Foundation”\
    \ on [`www.qosf.org/`](https://www.qosf.org/).\n\n# 3. Blockchain Technology\n\
    \nContracts and transactions are at the heart of our modern society. Their paper-based\
    \ and digital records define the most important structures of our administrative\
    \ economic, legal, political, and social systems by setting associated regulatory\
    \ boundaries. They govern interactions among nations, public and private organizations,\
    \ communities, and individuals worldwide [[1](#505424_1_En_3_Chapter.xhtml#Par203)].\
    \ This is why they are frequently subject to digital abuse and fraud, which is\
    \ why cybersecurity is more important than ever in the digital age. Blockchain\
    \ technology promises to play a crucial role in this context since it might be\
    \ as disruptive for data integrity and recording as the Internet has been for\
    \ data access and exchange.\n\nWith respect to its public adoption, blockchain\
    \ technology shares several similarities with the TCP/IP or “transmission control\
    \ protocol/Internet protocol,” which is one of the most important enabling technologies\
    \ of the Internet. Before TCP/IP, circuit switching was the basis of our telecommunications\
    \ architecture, in which connections between two parties had to be established\
    \ by putting plugs in appropriate sockets on telephone switchboards manually.\
    \ Telecom service providers thus invested billions in communication equipment\
    \ and dedicated (private) lines between large-scale enterprises and private households\
    \ over the years.\n\nWith the introduction of the TCP/IP protocol, the communication\
    \ behavior began to change completely. Introduced in 1972, the TCP/IP protocol\
    \ enabled bilateral messaging via email and the exchange of digital information\
    \ in standardized data formats. Just like TCP/IP-enabled bilateral messaging,\
    \ blockchain technology enables bilateral transactions and value transfer. Both\
    \ protocols are open, distributed, and shared networks without any central regulatory\
    \ authority being responsible for its maintenance and improvements. Furthermore,\
    \ both technologies first caught on with an enthusiastic but small community of\
    \ researchers and software developers prior to their broader adoption. While TCP/IP\
    \ unlocked new economic value by lowering the cost of (bilateral) connections\
    \ and communication, blockchain technology could dramatically reduce the cost\
    \ of transactions as we will see throughout this chapter. The French business\
    \ consultancy Capgemini, for instance, estimates that consumers could save up\
    \ to USD 16 billion in banking and insurance fees by using blockchain-based applications\
    \ [[2](#505424_1_En_3_Chapter.xhtml#Par204)].\n\nThe origin of blockchain technology\
    \ is inseparably linked to *Bitcoin*, the very first cryptographically secured\
    \ digital currency or *cryptocurrency* ever and most popular application of blockchain\
    \ technology until now [[3](#505424_1_En_3_Chapter.xhtml#Par205)]. But soon after\
    \ the initial hype around Bitcoin^([^(51)](#fn51)) in 2017 – the legendary American\
    \ investor Warren Buffett once called Bitcoin a “gambling device” [[5](#505424_1_En_3_Chapter.xhtml#Par207)]\
    \ – people realized that blockchain is much more than an enabler for digital currencies.\
    \ They realized that it can be applied to a whole range of applications across\
    \ various industries including the financial services, automotive, and healthcare\
    \ industry."
