- fmt: '### Types of Qubits: Superconducting Qubits


    The technologically most important qubit implementation scheme used in most state-of-the-art
    quantum computers is superconducting qubits, which is why we will study them in
    greater detail now.


    *Superconductivity* as such is a natural phenomenon that was discovered by the
    Dutch physicist Heike Kamerlingh Onnes at the famous Leiden University in the
    Netherlands in 1911. When studying solid mercury at cryogenic temperatures, he
    observed that its electrical resistance suddenly disappears when reaching a certain
    temperature of about 4.2 K close to the absolute zero point [[35](#505424_1_En_2_Chapter.xhtml#Par231)].
    Below this critical temperature, the electrical currents carried by electrons
    turned out to flow through the material freely without any electrical resistance
    or other dissipative effects – an electrical current does therefore keep on flowing
    forever. John Bardeen, the guy we know from our previous discussion about the
    first transistor, Leon Cooper, and Robert Schrieffer later explained this effect
    by their so-called *BCS theory* that is based on quantum mechanics and explains
    superconductivity in terms of pairs of electrons. In order to understand the formation
    of those so-called *Cooper pairs*, we will briefly study a few basic properties
    of superconductors first.


    Solid matter is made up of atoms that are arranged regularly in a so-called *crystal
    lattice* as shown on the left side of Figure [2-7](#505424_1_En_2_Chapter.xhtml#Fig7).
    At room temperature, the atoms that build up the crystal lattice move around and
    cause the entire lattice to vibrate strongly – the faster they move, the higher
    the temperature of the material. As a free electron moves through a vibrating
    lattice, it will be subject to various collisions with lattice atoms similar to
    pool billiard, where the white ball frequently collides with colored balls. Intuitively,
    collisions between electrons and atoms are more likely to occur if the temperature
    increases and the atoms vibrate stronger. Hence, the electrical resistivity of
    metals generally increases with increasing temperature. At very low temperatures,
    the lattice atoms vibrate very slowly, and the energy of those vibrations turns
    out to change stepwise due to the quantization principle of quantum mechanics.
    The smallest amount of vibrational energy is called *phonon* and behaves like
    a quantum mechanical particle. [^(36)](#fn36) Electrons that move through such
    a cold lattice are subject to some but very few collisions. The electrical resistivity
    of cold metals is therefore low but not zero.


    ![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig8_HTML.png](images/505424_1_En_2_Chapter/505424_1_En_2_Fig8_HTML.png)


    **Figure 2-8** Quantum mechanical tunneling of a Cooper pair in a Josephson function.
    The Cooper pair will either remain in “superconductor 1” on the left or tunnel
    into “superconductor 2” on the right side of the insulating tunnel barrier (white-dotted
    arrow). The first case can be associated with the qubit `|0⟩`, the second one
    with `|1⟩`.


    This picture completely changes in superconducting materials. The specific geometry
    of a superconducting crystal lattice allows electrons to absorb lattice phonons
    and exchange them repeatedly with one another without being slowed down and losing
    any motional energy. This mutual interaction between two electrons “glues” pairs
    of electrons together and a Cooper pair forms as shown on the right-hand side
    of Figure [2-7](#505424_1_En_2_Chapter.xhtml#Fig7). This Cooper pair can move
    through the crystal lattice unhindered and thereby carries an electric current
    with zero resistivity. The superconducting transition occurs below a certain material-specific
    temperature that promotes the formation of Cooper pairs.


    The device architecture that is widely used for the implementation of superconducting
    qubits is called *Josephson junction* in honor of its American inventor and later
    Nobel laureate Brian Josephson. It consists of two superconductors that are separated
    by a thin insulating tunnel barrier. This tunnel barrier can be surmounted by
    Cooper pairs based on the quantum mechanical tunnel effect, the strange phenomenon
    we know from Section 2.1. A Josephson junction does generally allow for the implementation
    of three different superconducting qubits. The first option is depicted in Figure
    [2-8](#505424_1_En_2_Chapter.xhtml#Fig8) and called superconducting *charge qubit*
    as it ultimately relies on the presence or absence of a Cooper pair in the superconductor
    on the left- and right-hand sides of the tunnel barrier. This particular device
    is called *Cooper pair box*.


    The second and by far most widely used implementation scheme is the superconducting
    *flux qubit* or “persistent-current qubit.” This scheme basically encodes qubits
    by electric currents that are carried by Cooper pairs and flow in a superconducting
    ring in clockwise and anticlockwise direction, respectively. The underlying device
    architecture is called *superconducting quantum interference device* or simply
    “SQUID” and is shown in Figure [2-9](#505424_1_En_2_Chapter.xhtml#Fig9). When
    injected into the ring, Cooper pairs basically behave like quantum mechanical
    waves according to the wave-particle dualism we know from Section 2.2. These superconducting
    currents carried by Cooper pairs can interfere to form a superposition and flow
    in clockwise and anticlockwise direction (with certain probabilities) at the same
    time. When we measure the direction of flow, the respective wave function collapses,
    and the Cooper pairs will flow in either of the two directions. According to the
    right-hand rule, [^(37)](#fn37) a clockwise current induces a magnetic field pointing
    downward that is typically associated with the qubit `|0⟩ = |↻⟩ = |↓⟩`, an anticlockwise
    current with `|1⟩ = |↺⟩ = |↑⟩`, accordingly. Superconducting qubits are the most
    promising candidates for quantum information processing, which is mainly related
    to their size and macroscopic nature: superconducting flux qubits typically involve
    the collective motion of about 10⁹ Cooper pairs in devices as large as 0.1 mm.
    This macroscopic ensemble is much easier to control than individual electrons,
    atoms, or ions that have been isolated from their environment. But more macroscopic
    qubits typically suffer faster decoherence times, which is why superconducting
    qubits reveal the fastest decoherence times of all qubits.


    ![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig9_HTML.png](images/505424_1_En_2_Chapter/505424_1_En_2_Fig9_HTML.png)


    **Figure 2-9** Superconducting flux qubit in a SQUID. The clockwise persistent
    current of Cooper pairs is associated with the qubit `|0⟩`, the persistent current
    flowing in anticlockwise direction with `|1⟩`. The two Josephson junctions allow
    the two wave functions to interfere and circulate in both directions simultaneously.


    However, the distressingly short decoherence times observed in early experiments
    have been prolonged further and improved by advanced circuit designs and more
    robust qubits. The decoherence times obtained from the latest experiments are
    long enough to implement all relevant quantum logic gates, which is why they provide
    the most optimistic future among all implementation schemes for large-scale quantum
    computation and have attracted great attention of various quantum computing companies
    as we will see in the following.


    ## Quantum Computing Today


    Quantum computing is no longer limited to academic research but has made its debut
    in industry and large enterprises lately [[37](#505424_1_En_2_Chapter.xhtml#Par233)].
    Different systems are commercially available for either direct purchase on premise
    or through cloud computing services accessible via the Internet on demand. They
    employ different qubit implementation schemes among which superconducting circuits
    and ion traps are currently the most important ones.'
