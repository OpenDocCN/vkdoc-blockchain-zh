    数字学习（`Digital learning`）决定了组织持续改进和创新其流程、产品和服务的迭代能力。


    '
- fmt: '## 5.2 Select the Right Technology Stack


    Once you have defined the cornerstones of your digital business and operating
    model, the selection of the most suitable technology stack that perfectly supports
    them is particularly important since each digital technology has certain strengths
    and weaknesses that determine its applicability to a certain business idea. A
    tentative comparison of the three technologies with respect to eight key domains
    of digital transformation is shown in Figure [5-3](#505424_1_En_5_Chapter.xhtml#Fig3).
    This figure only provides a coarse guidance and highlights some differences between
    the three digital technologies introduced in this book – it is certainly not comprehensive
    in its domains and presentation.


    ![../images/505424_1_En_5_Chapter/505424_1_En_5_Fig3_HTML.png](images/505424_1_En_5_Chapter/505424_1_En_5_Fig3_HTML.png)


    Figure 5-3


    Digital property spider that rates the relative impact of different support technologies
    on selected domains of digital transformation on a scale between low and high


    But independently of which digital technology stack you are going to use, you
    may either consider (1) building up your own digital capabilities in-house or
    (2) collaborating with external partners and cloud computing vendors. The first
    option is best if you aim to leverage your digital in-house expertise as a competitive
    advantage on a medium or long term. Otherwise, the best option is to subscribe
    to an external cloud computing service, which is less time consuming and invest
    intense in most cases.


    ### Cloud Computing


    `Cloud computing` refers to an actively managed pool of configurable computing
    resources including hardware and software applications that can be accessed via
    Internet on demand.


    `Cloud computing` was briefly introduced in Chapter [1](#505424_1_En_1_Chapter.xhtml),
    “Digitalization and Digital Transformation,” already and generally refers to a
    computational hardware and software infrastructure that can be accessed via Internet
    on demand. It builds on a technique called `virtualization` that was released
    with IBM’s `CP-40` operating system in 1970 for the first time [[18](#505424_1_En_5_Chapter.xhtml#Par157)].
    `Virtualization` allows for simulating a (private or public) environment or “partition”
    including dedicated computational processing power, network, and storage from
    a physical hardware system that can be shared with other users. The US National
    Institute of Standards and Technology defines cloud computing as a “model for
    enabling ubiquitous, convenient, on-demand network access to a shared pool of
    configurable computing resources (e.g. networks, servers, storage, applications,
    and services) that can be rapidly provisioned and released with minimal management
    effort or service provider interaction” [[19](#505424_1_En_5_Chapter.xhtml#Par158)].
    The idea to rent computational resources that are provisioned, managed, and made
    accessible to users by a third party was in fact very revolutionary, which is
    why it is not surprising that cloud computing soon became a multibillion-dollar
    business. Cloud computing services generally fall into four main service categories
    that are important to consider when subscribing to a particular vendor. They differ
    in the technical involvement and autonomy of the customer as depicted in Figure
    [5-4](#505424_1_En_5_Chapter.xhtml#Fig4) schematically and explained in the following:


    ![../images/505424_1_En_5_Chapter/505424_1_En_5_Fig4_HTML.jpg](images/505424_1_En_5_Chapter/505424_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    The four basic service class models of cloud computing services, namely, infrastructure-,
    platform-, software-, and business-process-as-a-service


    1. `Infrastructure-as-a-service` or `IaaS` is the lowest service level with the
    highest customer autonomy. `IaaS` comprises all infrastructure building blocks,
    such as data servers, storage, networks, and virtual machines.^([^(137)](#fn137))
    All resources are provisioned and offered by the cloud vendor on demand within
    a pay-as-you-use pricing model.


    2. `Platform-as-a-service` or `PaaS` offers both ready-to-use hardware infrastructure
    and software development tools that enable users to build, test, and deploy their
    own cloud applications – all computational resources are administered and maintained
    by the respective cloud vendor in this service category too.


    3. `Software-as-a-service` or `SaaS` is the third service level and refers to
    a hosted cloud infrastructure that offers users completely developed software
    applications together with the required hardware on demand. Users can simply log
    in via a web browser, upload the data to be processed, and use different applications
    on the vendor''s software and hardware stack to process and analyze the data further.
    This service category is particularly interesting for users, who cannot build
    up their own resources, such as software, hardware, and personnel.


    4. `Business-process-as-a-service` or `BPaaS` allows to fully outsource stand-alone
    business processes, such as the payroll management (including the payslip entering
    and legal filings) and payment process. This service category is designed for
    companies that do not like to build up their own digital in-house capabilities
    and outsource particular business processes completely.


    Further to those service categories, cloud computing services do also differ with
    respect to their ownership model and generally fall into so-called public and
    private clouds. A `public cloud` infrastructure is open to the public and available
    for anyone, while a `private cloud` is owned and operated for the benefit of a
    single organization only. In practice, organizations often implement a `hybrid
    cloud` that combines the advantages of both ownership models. The most popular
    and market-leading public cloud vendors are `AWS`, `Microsoft Azure`, `IBM Cloud`,^([^(138)](#fn138))
    and `Google Cloud`. Their service portfolio is expanded continuously and includes
    resources for compute power, database storage, and applications but also quantum
    computing, blockchain technology, and artificial intelligence. Their services
    differ in performance, price, and variety of applications, which is why most organizations
    use multiple cloud vendors to benefit from the best products and services of each
    while avoiding `vendor lock-in`, that is, the reliance on a single cloud computing
    provider. Partnering with an external cloud computing vendor generally offers
    three main benefits compared to building up your own computational resources in-house:


    1. `Performance`: The superior performance of cloud computing services arises
    due to the synergetic centralization of supercomputers in large data centers.
    Due to their frequent hardware and software updates, cloud services offer very
    reliable disaster recovery mechanisms after cyberattacks and other failures of
    an organization''s IT system.


    2. `Agility`: Cloud computing services are very flexible since they can be scaled
    up and down as computational demand increases or decreases, a characteristic that
    became known as `hyperscale`. Some vendors do often refer to their service as
    `elastic clouds` in this context to highlight that their service dynamically determines
    the amount of resources required and automatically provisions the cloud infrastructure
    accordingly.'
