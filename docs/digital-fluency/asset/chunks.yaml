- fmt: '# The Blockchain Transaction Life Cycle


    The blockchain transaction life cycle is generally organized in seven steps and
    shown in Figure [3-3](#505424_1_En_3_Chapter.xhtml#Fig3) schematically. Let us
    assume you would like to send your American friend Bob BTC 10 – in fact a quite
    significant amount of money as the exchange rate amounted to about BTC 1 = USD
    10,500 in September 2020. From Table [3-2](#505424_1_En_3_Chapter.xhtml#Tab2),
    we know that the plaintext of the respective transaction message may read “From:
    Name of Sender (his `private key`), To: Name of Recipient (his `private key`),
    Amount: BTC 10.” The Bitcoin transaction process starts with the formation of
    an encrypted file, the so-called *digital signature*, that contains the hash of
    your transaction message. After broadcasting this file to the network, your transaction
    is authorized by one of the network’s nodes in step three – further details about
    this particular step are described in more detail in the next section and disregarded
    at this point for clarify. Since each block contains more than one transaction
    for efficiency, your transaction message is most likely to be buffered in a waiting
    pool, the so-called *mempool*, that collects authorized transactions prior to
    their assembly into a Merkle tree. As soon as the pooling is completed,^([^(61)](#fn61))
    the overall Merkle tree will be created by applying the cryptographic hash function
    iteratively as described earlier. Furthermore, all other components are added
    to the block’s header, and the block with your transaction message is finally
    created. This block is then broadcasted to the network in the fifth step of the
    blockchain transaction life cycle. The sixth step is one of the most important
    steps in the overall transaction process. It is about reaching consensus over
    the validity of the block within the network. This validation is based on solving
    a computational puzzle, the so-called *proof of work* in case of the Bitcoin blockchain,
    which we will examine in more detail in the following. Once this puzzle has been
    solved by one of the nodes, the solution is broadcasted to the network, and the
    block is classified as verified and ultimately added to the blockchain immutably.
    The network updates itself and the latest, agreed-upon version of the ledger is
    saved on each node separately in the final step.


    This overview gives you a first coarse impression about the entire blockchain
    transaction life cycle. To this end, it is important to note that all of this
    happens automatically within a couple of minutes and without any third-party intermediate
    – you may remember that a traditional banking transaction via SWIFT involves more
    than five banks and may take various days in total. This is in fact the most important
    difference between a classical SWIFT and blockchain-based (monetary) value transfer.
    The blockchain transaction process reduces the transaction speed and cost significantly
    due to the absence of any third-party intermediary.


    Our brief discussion of the blockchain transaction life cycle revealed that two
    steps are particularly important for the blockchain to work safely: (1) the authorization
    of transactions and (2) validation of blocks by proof of work, that is, steps
    three and six in Figure [3-3](#505424_1_En_3_Chapter.xhtml#Fig3), respectively.
    Both steps are discussed in more detail in the following two subsections.


    ## The Authorization of Transactions by Digital Signatures


    The digital signature plays a crucial role in the overall transaction life cycle
    as it allows us to (1) identify users and their accounts unambiguously to ensure
    that a submitted transaction is made in their name and (2) authorize transactions
    in order to ensure that the user, who submitted a new transaction, is indeed the
    legal owner of the respective information or asset to be transferred. The first
    function compares to your signature below a legal contract, such as a sales agreement
    for a house, and step two to its judicial verification by a notary in the example
    at hand. Both functions are particularly important to guarantee the integrity
    of the entire blockchain and to protect it from unauthorized access and misuse
    since its open P2P architecture allows anyone to log in, access, and add new transactional
    data in general.


    The particular concept to create a digital signature goes back to the American
    cryptography pioneer Ralph Merkle – the scientist we know from the Merkle trees
    – and his pioneering work about cryptography and encrypted digital signatures
    [[11](#505424_1_En_3_Chapter.xhtml#Par213)]. But before we discuss digital signatures
    and their usage in detail, it is revealing to discuss a few fundamental terms
    and concepts of cryptography first. Cryptography generally involves three main
    steps, namely, the


    1. Encryption of a (transaction) message

    2. Transfer of the encrypted (transaction) message

    3. Decryption of the transferred (transaction) message by the legitimate receiver


    Encrypted data is also called *ciphertext* and refers to an unintelligible string
    of letters and numbers that is meaningless for humans or computers that do not
    have the correct “recipe” to decrypt it. This “recipe” is called *cryptographic
    key*, which is essentially a string of letters and numbers that determines how
    the plaintext of a message is converted into its ciphertext. In other words, the
    cryptographic key determines the output of the cryptographic algorithm that is
    used to encrypt a plaintext message prior to exchanging it with another party.


    Encryption and decryption can either rely on symmetric or asymmetric keys, each
    of which has certain advantages and disadvantages. *Symmetric encryption* schemes
    are based on a cryptographic key that can be used for both the encryption of the
    plaintext by its sender and the decryption of the respective ciphertext by its
    receiver as shown in Figure [3-4](#505424_1_En_3_Chapter.xhtml#Fig4) (a). This
    encryption scheme is very easy to implement but also very easy to break since
    anyone, who gets hold of the key – by stealing it or intercepting the communication
    channel – can decrypt the message readily.


    ![../images/505424_1_En_3_Chapter/505424_1_En_3_Fig4_HTML.jpg](images/505424_1_En_3_Chapter/505424_1_En_3_Fig4_HTML.jpg)


    **Figure 3-4** Comparison between the symmetric (a) and asymmetric encryption
    scheme (b). In case of a symmetric encryption algorithm, the public key is used
    for both encryption of the plaintext and decryption of the ciphertext. The asymmetric
    encryption scheme employs two separate keys, the private key for encryption and
    public key for decryption'
