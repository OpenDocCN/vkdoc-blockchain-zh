- fmt: '### 3.2.5 Deploying Trust by Consensus and Mining


    Further to the authorization of transactions, the validation of blocks is another
    quintessential process to deploy trust in the blockchain network. In case of the
    Bitcoin blockchain, the validation of blocks is based on solving a computational
    puzzle that is called proof of work. This proof of work falls into the much broader
    category of *consensus algorithms* that generally enable the collective control
    over distributed networks.


    #### Mining


    `Mining` refers to the process of finding a valid block by solving a computational
    puzzle called “proof of work.” It eliminates fraudulent transactions that involve
    spending the money twice, for instance.


    The requirement for such an algorithm in the absence of any central, intermediary
    authority that moderates the exchange over an agreement between different parties
    has been illustrated by the problem of the *Byzantine generals* in 1982 for the
    first time [[13](#505424_1_En_3_Chapter.xhtml#Par215)]. This famous thought experiment
    is about a group of army generals, who are leading spatially separated parts of
    the Byzantine army and are planning to attack a fortified city. They know that
    the only way to succeed is attacking the city coordinately at the same time. So
    how can they come to an agreement about the timing of their joint attack if one
    or more generals are traitors or communicate misleading or ambivalent messages?
    In analogy to distributed networks, the generals can be associated with the nodes
    and the messenger to the linkage between the different nodes. The problem of the
    Byzantine generals was solved theoretically by Miguel Castro and Barbara Liskov,
    who presented their “Practical Byzantine Fault Tolerance” algorithm in 1999 [[14](#505424_1_En_3_Chapter.xhtml#Par216)].
    Its first practical implementation was made ten years later with the invention
    of the Bitcoin blockchain and its proof-of-work principle by the anonymous Satoshi
    Nakamoto. This implementation of a viable consensus algorithm is in fact one of
    the key innovations of blockchain technology.


    The proof of work is an iterative try-and-error process, in which the `nonce`
    value in the block’s header as a free variable is changed sequentially until the
    hash value of the block ends up below an envisaged target value that is defined
    by the underlying network protocol.^([^(63)](#fn63)) A block is verified and immutably
    added to the blockchain as soon as one node finds a block that meets this criterion.
    This process of finding a valid `nonce` value is called *mining* in analogy to
    the computer game Pitmen and its “mining for gold or gemstones.” Solving the computational
    puzzle by mining allows the network to achieve collective control over all transactions
    as it provides a route to jointly judge whether a transaction is permissible or
    fraudulent – an approach that the legendary Byzantine generals would have needed,
    too.


    Fraudulent in this context refers to a malicious user of the blockchain network
    – similar to a Byzantine traitor – who tries to transfer the same value (Bitcoin)
    twice by using it in two separate transactions. Such an attempt is commonly referred
    to as a *double-spending* attack. Although mining reduces the motivation for fraudulent
    transactions, double spending is theoretically still possible if an attacker captures
    more than 51% of the mining power to force and reverse transactions. The good
    news is that Bitcoin and blockchain technology provide a very effective solution
    to such a *51% attack* that is based on the combination of the following two countermeasures:


    *   *Increasing the difficulty*: The *difficulty* is a parameter that measures
    the likelihood (or probability) for finding a `nonce` value that solves the computational
    puzzle. Since Bitcoin is an open network that anyone can join, it attracts more
    and more users that may join their computational power to more cost-effective
    and highly specialized *mining pools*. Such pools may occasionally capture more
    than 51% of the mining power, which enables them to conduct 51% attacks theoretically.
    In order to avoid this problem, the network is rebalanced frequently by increasing
    the difficulty of the computational puzzle as more and more users join the network.
    The Bitcoin protocol, in particular, increases the difficulty every 2,016 blocks,
    which currently corresponds to about two weeks.


    *   *Introducing mining incentives*: The introduction of a *mining reward* is
    a second countermeasure to avoid maleficent attempts. They incentivize honest
    behavior by rewarding the operator of the node that solves the computational proof-of-work
    puzzle first with newly generated or minted Bitcoins. In view of the automatically
    increasing difficulty, this mining reward makes it more lucrative to use a mining
    power of more than 51% to mine honestly and earn Bitcoins than it is to attempt
    to cheat the system. Historically, incentivizing mining rewards also attracted
    early adopters, which helped Bitcoin honestly at the beginning to reach a critical
    mass and leverage the *network effect.*^([^(64)](#fn64))


    For the sake of completeness, it is important to note that the proof of work is
    not the only consensus mechanism that is generally available for the implementation
    of a customized blockchain. Another one is referred to as *proof of stake* and
    based on the idea that one node or user of the network has so much stake in the
    system that it renders any attack of a malicious party hopeless. The *proof of
    elapsed time* is another consensus algorithm that is currently explored by the
    chipmaker Intel, for example, who aims at reaching consensus by using secure instructions
    placed within the CPU itself – the respective product is called `Intel SGX` for
    “Software Guard Extension” [[15](#505424_1_En_3_Chapter.xhtml#Par217)].'
  raw: '### 3.2.5 Deploying Trust by Consensus and Mining


    Further to the authorization of transactions, the validation of blocks is another
    quintessential process to deploy trust in the blockchain network. In case of the
    Bitcoin blockchain, the validation of blocks is based on solving a computational
    puzzle that is called proof of work. This proof of work falls into the much broader
    category of *consensus algorithms* that generally enable the collective control
    over distributed networks.


    Mining


    Mining refers to the process of finding a valid block by solving a computational
    puzzle called “proof of work.” It eliminates fraudulent transactions that involve
    spending the money twice, for instance.


    The requirement for such an algorithm in the absence of any central, intermediary
    authority that moderates the exchange over an agreement between different parties
    has been illustrated by the problem of the *Byzantine generals* in 1982 for the
    first time [[13](#505424_1_En_3_Chapter.xhtml#Par215)]. This famous thought experiment
    is about a group of army generals, who are leading spatially separated parts of
    the Byzantine army and are planning to attack a fortified city. They know that
    the only way to succeed is attacking the city coordinately at the same time. So
    how can they come to an agreement about the timing of their joint attack if one
    or more generals are traitors or communicate misleading or ambivalent messages?
    In analogy to distributed networks, the generals can be associated with the nodes
    and the messenger to the linkage between the different nodes. The problem of the
    Byzantine generals was solved theoretically by Miguel Castro and Barbara Liskov,
    who presented their “Practical Byzantine Fault Tolerance” algorithm in 1999 [[14](#505424_1_En_3_Chapter.xhtml#Par216)].
    Its first practical implementation was made ten years later with the invention
    of the Bitcoin blockchain and its proof-of-work principle by the anonymous Satoshi
    Nakamoto. This implementation of a viable consensus algorithm is in fact one of
    the key innovations of blockchain technology.


    The proof of work is an iterative try-and-error process, in which the nonce value
    in the block’s header as a free variable is changed sequentially until the hash
    value of the block ends up below an envisaged target value that is defined by
    the underlying network protocol.^([^(63)](#fn63)) A block is verified and immutably
    added to the blockchain as soon as one node finds a block that meets this criterion.
    This process of finding a valid nonce value is called *mining* in analogy to the
    computer game Pitmen and its “mining for gold or gemstones.” Solving the computational
    puzzle by mining allows the network to achieve collective control over all transactions
    as it provides a route to jointly judge whether a transaction is permissible or
    fraudulent – an approach that the legendary Byzantine generals would have needed,
    too.


    Fraudulent in this context refers to a malicious user of the blockchain network –
    similar to a Byzantine traitor – who tries to transfer the same value (Bitcoin)
    twice by using it in two separate transactions. Such an attempt is commonly referred
    to as *double-spending* attack . Although mining reduces the motivation for fraudulent
    transactions, double spending is theoretically still possible if an attacker captures
    more than 51% of the mining power to force and reverse transactions. The good
    news is that Bitcoin and blockchain technology provide a very effective solution
    to such a *51% attack* that is based on the combination of the following two countermeasures:


    *   *Increasing the difficulty*: The *difficulty* is a parameter that measures
    the likelihood (or probability) for finding a nonce value that solves the computational
    puzzle. Since Bitcoin is an open network that anyone can join, it attracts more
    and more users that may join their computational power to more cost-effective
    and highly specialized *mining pools*. Such pools may occasionally capture more
    than 51% of the mining power, which enables them to conduct 51% attacks theoretically.
    In order to avoid this problem, the network is rebalanced frequently by increasing
    the difficulty of the computational puzzle as more and more users join the network.
    The Bitcoin protocol, in particular, increases the difficulty every 2,016 blocks,
    which currently corresponds to about two weeks.


    *   *Introducing mining incentives*: The introduction of a *mining reward* is
    a second countermeasure to avoid maleficent attempts. They incentivize honest
    behavior by rewarding the operator of the node that solves the computational proof-of-work
    puzzle first with newly generated or minted Bitcoins. In view of the automatically
    increasing difficulty, this mining reward makes it more lucrative to use a mining
    power of more than 51% to mine honestly and earn Bitcoins than it is to attempt
    to cheat the system. Historically, incentivizing mining rewards also attracted
    early adopters, which helped Bitcoin honestly at the beginning to reach a critical
    mass and leverage the *network effect.*^([^(64)](#fn64))


    For the sake of completeness, it is important to note that the proof of work is
    not the only consensus mechanism that is generally available for the implementation
    of a customized blockchain. Another one is referred to as *proof of stake* and
    based on the idea that one node or user of the network has so much stake in the
    system that it renders any attack of a malicious party hopeless. The *proof of
    elapsed time* is another consensus algorithm that is currently explored by the
    chipmaker Intel, for example, who aims at reaching consensus by using secure instructions
    placed within the CPU itself – the respective product is called Intel SGX for
    “Software Guard Extension” [[15](#505424_1_En_3_Chapter.xhtml#Par217)].'
  trans: '

    ### 3.2.5 通过共识与挖矿建立信任


    在授权交易之后，区块验证是在区块链网络中建立信任的另一个典型过程。以比特币区块链为例，区块验证基于求解一个称为工作量证明的计算难题。这种工作量证明属于更广泛的*共识算法*范畴，这类算法通常能实现对分布式网络的集体控制。


    #### 挖矿


    `挖矿`是指通过求解一个名为“工作量证明”的计算难题来寻找有效区块的过程。例如，它能够消除涉及双重花费的欺诈交易。


    在没有中央中介机构来调解各方协议交换的情况下，对此类算法的需求，最早由 1982 年的*拜占庭将军*问题所阐述 [13]。这个著名的思想实验是这样一群军队将领，他们分别率领着拜占庭军队中地理上分隔的几部分，正计划进攻一座设防城市。他们知道，成功的唯一方法是同时协调进攻这座城市。那么，如果其中一位或多位将军是叛徒，或者传递误导性、模棱两可的信息，他们又如何能就联合进攻的时间达成一致呢？类比到分布式网络，将军可以看作是节点，而信使则是不同节点之间的连接。拜占庭将军问题在理论上由米格尔·卡斯特罗和芭芭拉·利斯科夫解决，他们在
    1999 年提出了“实用拜占庭容错”算法 [14]。它的首次实际应用是在十年后，随着匿名者中本聪发明了比特币区块链及其工作量证明原理才得以实现。这种可行共识算法的实现，实际上是区块链技术的关键创新之一。


    工作量证明是一个迭代的试错过程，其中区块头中的`nonce`值作为自由变量被顺序更改，直到区块的哈希值低于由底层网络协议设定的预期目标值。^(⁶³) 一旦某个节点找到了满足此条件的区块，该区块就被验证并不可篡改地添加到区块链中。寻找有效`nonce`值的这个过程被称为*挖矿*，这借鉴了电脑游戏《矿工》及其“淘金或开采宝石”的隐喻。通过挖矿解决计算难题，使得网络能够对所有交易实现集体控制，因为它提供了一条途径来共同判断一笔交易是允许的还是欺诈的——这也是传奇的拜占庭将军们所需的方法。


    此处的“欺诈”是指区块链网络的恶意用户（类似于拜占庭叛徒），试图通过在两笔独立的交易中使用同一笔价值（比特币）来实现双重花费。这种企图通常被称为*双重支付*攻击。尽管挖矿减少了欺诈交易的动机，但如果攻击者掌握了超过
    51%的挖矿算力来强制并逆转交易，理论上双重支付仍有可能发生。好消息是，比特币和区块链技术为这种*51%攻击*提供了一个非常有效的解决方案，该方案基于以下两种对策的结合：


    *   *增加难度*：*难度*是一个参数，它衡量找到解决计算难题的`nonce`值的可能性（或概率）。由于比特币是一个任何人都可以加入的开放网络，它吸引了越来越多的用户，这些用户可能将他们的算力合并到更具成本效益且高度专业化的*矿池*中。此类矿池偶尔会捕获超过
    51%的挖矿算力，理论上这使他们能够发起 51%攻击。为了避免这个问题，随着越来越多的用户加入网络，网络会通过提高计算难题的难度来频繁地重新平衡。特别是，比特币协议每
    2016 个区块（目前相当于大约两周时间）增加一次难度。


    *   *引入挖矿激励*：引入*挖矿奖励*是第二种防止恶意企图的措施。它通过奖励第一个解决工作量证明计算难题的节点操作者以新生成或铸造的比特币，来激励诚实行为。鉴于难度会自动增加，这种挖矿奖励使得使用超过
    51%的算力诚实挖矿并赚取比特币，比试图欺骗系统更有利可图。从历史上看，激励性的挖矿奖励也吸引了早期采用者，这有助于比特币在初期诚实地达到临界规模，并利用*网络效应*。^(⁶⁴)


    为了完整性起见，有必要指出工作量证明并不是实现定制区块链时普遍可用的唯一共识机制。另一种被称为*权益证明*，其核心理念是网络中的某个节点或用户在该系统中拥有足够的权益，这使得任何恶意方的攻击都变得无望。*消逝时间证明*是另一种共识算法，目前芯片制造商英特尔等公司正在探索，其目标是通过使用
    CPU 内部的安全指令来达成共识——该相关产品名为`Intel SGX`（“软件保护扩展”） [15]。

    '
- fmt: '### 3.2.6 Smart Business Contracts


    There is one particularly interesting functionality of blockchain technology that
    we did not discuss so far but holds great promise for beneficial applications.
    This functionality relates to contracts that are at the heart of most business
    relationships, such as the sales contract for a house or the leasing contract
    for a car. Early rules of trade and barter already existed in ancient times as
    we learned in the introductory part of this chapter. Modern laws of contract began
    to arise during the industrial revolution in 1750 when the increasing number of
    factory workers required a more formal approach to regulate cash wage, working
    conditions, and safety standards. Up to now, legal contracts are an integral part
    of all business relations and transactions. A contract is a legally binding and
    enforceable agreement between two or more parties that recognize the rights and
    duties of each party to the agreement. They typically involve any kind of (monetary)
    value transfer that is authorized as soon as the object of agreement is fulfilled.


    Blockchain technology allows for automating this value transfer by implementing
    “automated contracts.” These contracts are called *smart contracts* [[16](#505424_1_En_3_Chapter.xhtml#Par218)]
    and are executed automatically as soon as the blockchain network has reached consensus
    upon the fulfillment of the contractual conditions unanimously. Smart contracts
    are a subcategory of *decentralized applications* or `DApps`, that is, pieces
    of software that operate on top of a blockchain network. Depending on the programmed
    level of automation, smart contracts can either be partially or fully self-executing
    and have been implemented in the Ethereum blockchain protocol for the first time.^([^(65)](#fn65))


    Smart Contract


    A smart contract is a program that is implemented on top of the underlying network
    protocol and embodies a certain business logic within a blockchain network. It
    can be used to automate certain business processes, such as contracting, clearing,
    settling, and record keeping.


    One example for the application of smart contracts is a fully automated car-rental
    company that employs this functionality to automatically unlock a vehicle as soon
    as the payment has been received. Once the rental period expires, the user can
    automatically be asked to pay for further use or park the car at the next opportunity
    to hand it back. If the car renter fails to fulfill this contractual obligation
    for some reason, the car-rental company can immobilize the car and thereby enforce
    the contract automatically without any third-party intermediation or governmental
    authority. As you can imagine, such automatically executable contracts allow for
    optimizing operations in organizations and increasing the profitability of businesses
    by automating and trimming administrative processes toward efficiency.


    In practice, the implementation of smart contracts is yet still associated with
    technical challenges and regulatory risks. The most common problem relates to
    users forgetting their private key, which immediately results in financial losses
    since a blockchain does not support any option for resetting or recreating a private
    key as we know from earlier. One approach to address this problem is *multiparty
    signing*, where multiple signatures are required to access the blockchain or authorize
    a transaction. But in case of the Ethereum blockchain, this approach was hacked
    already by exploiting code errors and other hard-to-spot vulnerabilities of its
    protocol. In 2017, for example, malicious users hacked the smart contract for
    a multi-signature wallet and illegally transferred USD 280 million worth of cryptocurrencies
    to their account [[17](#505424_1_En_3_Chapter.xhtml#Par219)]. This and other incidents
    show that smart contracts are not fully mature functionalities yet. They can,
    however, already provide some advantages for certain business applications if
    implemented in a private blockchain network wisely.


    Table 3-3


    Fundamental types of blockchains segmented by the permission model and the distribution
    of read and write access rights across the different users. Table inspired by
    [[19](#505424_1_En_3_Chapter.xhtml#Par221)]


    |   |   | Read | Write | Example |

    | --- | --- | --- | --- | --- |

    | Open | Public permissionless | Anyone | Anyone | Bitcoin and Ethereum |

    |   | Public permissioned | Anyone | Authorized participants only | Sovrin Foundation^([^(66)](#fn66))
    |

    | Closed | Consortium | Authorized participants | Authorized participants | Multiple
    banks that operate a shared ledger |

    |   | Private permissioned | Fully private or authorized nodes only | Network
    operator only | Internal enterprise ledger shared between parent company and suppliers
    or subcontractors |


    ## 3.3 Blockchain Technology Today


    Although blockchain technology was originally designed for Bitcoin, the list of
    potential applications is huge and increasing ever since. Potential applications
    range across all organizations, industries, and businesses and can be found everywhere,
    where two or more parties transact with each other to exchange some kind of value
    or asset. But before we discuss the most popular applications of blockchain technology,
    it is important to make ourselves aware of a few fundamentally different blockchain
    implementation schemes that differ with respect to access and permission rights.


    Blockchains can generally be set up as either open or closed networks as shown
    in Table [3-3](#505424_1_En_3_Chapter.xhtml#Tab3). *Open blockchains* are also
    called “public blockchains” since anyone – including potentially malicious users
    – can join the network. Trust in such networks is usually created by employing
    an incentive mechanism, such as the mining reward in the Bitcoin blockchain, which
    rewards productivity for the network and incentivizes honest behavior across the
    different participants. Nevertheless, public blockchains have to be considered
    as less trusted environments since anyone has read and write access to the data
    stored in the blockchain file.


    *Closed blockchains*, on the other hand, regulate read and write access rights
    and limit them to trusted participants only and are therefore called “private
    blockchains” too. They are more suited for private organizations and enterprises,
    who do not like to share their information with everyone as they operate in more
    secure and trusted environments [[18](#505424_1_En_3_Chapter.xhtml#Par220)]. Since
    all participants in such environments are well known and vetted, closed blockchains
    do not require any incentive mechanism in contrast to Bitcoin and other open blockchains
    [[19](#505424_1_En_3_Chapter.xhtml#Par221)]. In closed blockchains, all participants
    do normally share the same overarching goal and are held accountable for their
    contributions to the network by legal terms and conditions. In other words, they
    are incentivized to behave honestly to avoid legal prosecution by law that is
    executed by legal and governmental authorities outside the blockchain network.
    The key characteristics of any blockchain are compiled in Table [3-4](#505424_1_En_3_Chapter.xhtml#Tab4)
    for summary.'
