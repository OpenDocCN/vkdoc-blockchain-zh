  trans: '

    随着计算机能够存储越来越多的信息，速度更快、成本更低、在学术界更易获取，人工智能接连蓬勃发展。早期的演示，例如由艾伦·纽厄尔和赫伯特·西蒙开发的名为“通用问题求解器”的模拟程序，在解决人类问题的目标上显示出巨大潜力。另一个颇具娱乐性和交互性的软件程序是`ELIZA`，这是一个自然语言对话程序，旨在展示人机交流的表面性。该程序由德裔美国计算机科学家约瑟夫·维森鲍姆于
    1966 年创建，基于一种称为*模式匹配*的技术[14]。在这种方法中，程序会检查输入序列中是否存在（或缺少）某些文本成分或模式，生成相应的回答，并让用户产生程序能理解他们的错觉。^(⁸⁶)


    `ELIZA`和其他成功的研究项目激励了开创性的达特茅斯夏季研讨会的组织者之一马文·明斯基，他在 1970 年告诉《生活》杂志：“[...] 在三到八年内，我们将拥有一台具备普通人一般智能的机器。”遗憾的是，事实证明他错了，并且在接下来的几年里，对该领域的资助和兴趣迅速降温，部分原因是当时的计算机仍然相对昂贵，其计算能力和内存过于有限，无法处理实质性任务。例如，当时科研的首选计算机`DEC
    PDP-11/45`的工作内存只能扩展到`128 KB`，比当今智能手机的内存少了`20,000`倍以上。结果，越来越多的学者从对人工智能的乐观态度转向了怀疑。或许最直言不讳的怀疑者是美国哲学家休伯特·德雷福斯，他于
    1965 年出版了颇具影响力的著作《炼金术与人工智能》[15]，并于 1972 年出版了《计算机仍不能做什么：对人工智能理性的批判》[16]，阐述了他的观点，即人工智能将远远无法实现其崇高的期望。由于对人工智能的热情在
    20 世纪 70 年代初开始消退，从 70 年代中期到 90 年代中期这段时间被称为“AI 寒冬”。


    但即使在这个寒冷时期，仍然有一些创新出现。其中之一是 20 世纪 80 年代和 90 年代出现的*专家系统*，其兴起源于这一时期低性能个人电脑的爆炸式增长。专家系统模拟人类专家的决策能力，其基础是一个由简单的`if-then-else`语句构建的大型数据库，^(⁸⁷)这一概念被称为*符号逻辑*，由马文·明斯基此前提出。专家系统有望从职业领域专家（如医生、工程师和律师）那里学习知识。它们将这些知识捕获到数据库中，以解决例如金融或汽车制造中的特定问题，并使更广泛的从业者能够获得这些知识。尽管专家系统通常应用范围狭窄且难以跨业务类别应用，但它们很快变成了一个价值数十亿美元的产业。一个很好的例子是`MYCIN`，这是一个
    20 世纪 70 年代中期在斯坦福大学开发的早期用于诊断医疗感染的专家系统[17]。用户需要回答各种问题。配备了超过`600`条规则的`MYCIN`随后通过逻辑推理分析这些答案，识别出导致医学问题的细菌类型，并推荐合适的抗生素，剂量根据患者体重进行调整。`MYCIN`的准确率达到`69%`，并且据称比初级医生更有效[18]。尽管如此，这个程序从未在临床环境中使用过，但它是一个早期专家系统和现代机器学习先驱的绝佳范例。


    ### IBM 的传奇项目：深蓝与沃森


    具有讽刺意味的是，在缺乏政府资助的情况下，人工智能在 AI 寒冬之后再次被两大力量点燃。首先是摩尔定律的实际作用，即计算能力的迅速提升（参见第 1.4.3
    节）。其次，互联网的发展引发了从数百万到数十亿消费者数据的爆炸式增长，这些数据突然变得可用，并亟需分析。在经历了十多年专家系统和并行计算的研究与开发之后，IBM
    推出了其国际象棋计算机“深蓝”。深蓝配备了`256`个并行处理器，每秒可以检查`2`亿种可能的走法[19]。1996 年，深蓝击败了传奇的俄罗斯国际象棋大师加里·卡斯帕罗夫，登上了各大报纸的头版。据报道，这场备受媒体关注的事件是计算机程序首次击败在位世界象棋冠军，这是向人工智能决策程序迈进的重要一步。然而，深蓝下棋的方式与你或任何其他智能人类截然不同。它只是被编程了定义明确的国际象棋规则和一个明确的目标，即吃掉对手的王。基于这种基于规则的编程，计算机分析了它可能采取的每一种走法以及对手随后可能做出的每一种回应——这种方法最早由美国数学家克劳德·香农在
    1950 年描述[20]。通过搜索这个潜在走法的树状图，计算机通常会向前看`8`步到多达`30`步，以在每一轮中选择最佳走法。在当时，规则和逻辑仍然是创造智能机器的最重要元素。


    但是，除了规则和逻辑，人类下棋也会追求概念性的想法，例如“控制中心”或“从右侧进攻”，并从经验中学习。想象一下你的孩子正在学习走路，以便更好地理解这一根本性差异。为此，你实际上并不会告诉孩子站起来，适当保持平衡，然后小心地一步一步走。孩子们更倾向于观察父母走路，模仿他们的行为，并基于试错法从自己的经验中学习。如果因失足摔倒而经历的痛苦，会导致相关的突触权重减弱。其他的则通过长期的训练得到加强，孩子最终学会安全地走路。通过写下指令来教孩子走路几乎是不可能的，因为我们拥有的大部分知识都是隐性的，也就是说，我们无法完全解释它。换句话说，我们知道的总比我们能说出来的多，这被称为*波兰尼悖论*，以纪念匈牙利裔英国哲学家、博学家迈克尔·波兰尼[21]。

    '
- fmt: '人类与计算机在学习策略上的这一根本差异，对人工智能研究产生了真正的革命性影响，并催化了范式的转变：从基于规则和逻辑的学习，转向通过训练样例和经验进行数据驱动的学习[[22](#505424_1_En_4_Chapter.xhtml#Par261)]。这实际上是当今所谓`machine
    learning`（机器学习）的核心和基础。`Machine learning`这个词由美国先驱计算机科学家`Arthur Samuel`创造，他于1959年开发了一款电脑跳棋游戏^[^(88)](#fn88)，这被认为是第一个机器学习系统。在其影响深远的论文中，他将自己的方法描述为：“……一个研究领域，它赋予计算机无需明确编程就能学习的能力”[[23](#505424_1_En_4_Chapter.xhtml#Par262)]。实现这一点并非依靠规则和逻辑推理，而是利用统计学和概率论的高级概念来训练系统。这也是为何机器学习更合适的称呼是`statistical
    learning`（统计学习），因为它完全基于对海量训练数据（或大数据）的统计分析[[24](#505424_1_En_4_Chapter.xhtml#Par263)]。图[4-3](#505424_1_En_4_Chapter.xhtml#Fig3)示意性地描绘了最重要的几类人工智能以及最具历史意义的里程碑事件。


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig3_HTML.png](images/505424_1_En_4_Chapter/505424_1_En_4_Fig3_HTML.png)


    **图 4-3** 人工智能、机器学习与深度学习之间的区别，以及这些学科最重要的历史里程碑（显示在时间轴下方）


    从基于规则和逻辑的学习到数据驱动学习的革命性范式转变，也为IBM的下一代人工智能“`Watson`”铺平了道路[[25](#505424_1_En_4_Chapter.xhtml#Par264)]。`Watson`以IBM传奇创始人`Thomas
    Watson`的名字命名，由`David Ferrucci`在`DeepQA`项目中开发，最初设计为一个问答系统。为此，`Watson`配备了720个CPU和160亿字节的工作内存。这个大规模并行超级计算机的数据库塞满了大量数据集，包括整个维基文库、书籍、电影以及其他人类知识来源。基于这个庞大而全面的知识库，`Watson`能够将问题解析成不同的关键词和片段，以查找统计上相关的短语作为答案。该系统同时执行数百个自然语言处理和分析程序，以找到给定问题的一小部分潜在正确答案。然后，`Watson`将这些潜在答案与其数据库进行核对，以确定它们是否有意义，并最终通过文本转语音程序合成的电子语音，口头输出最合理的答案。


    2008年，IBM代表与传奇美国智力竞赛节目 *Jeopardy!* 的执行制片人`Harry Friedman`进行了沟通，提议让`Watson`与两位
    *Jeopardy!* 冠军`Brad Rutter`和`Ken Jennings`进行一场比赛。第一场未经公开的宣传比赛于2010年举行，暴露了`Watson`复杂程序的诸多弱点。`Watson`最大的劣势之一是它无法听到对手的答案，因此无法从中学习。为此，IBM研究团队实现了一个附加功能，使`Watson`能够以电子方式接收对手的正确答案。在解决了这个问题以及其他几个关键问题后，`Watson`逐渐接近了两位
    *Jeopardy!* 冠军的竞技水平。`Harry Friedman`曾用“我想我们已经从印象深刻变成了目瞪口呆”来描述这种性能的急剧提升，并最终同意在2011年2月16日安排一场公开的电视比赛。那一天，不可思议的事情发生了：`Watson`击败了蝉联冠军的
    *Jeopardy!* 选手`Brad Rutter`和`Ken Jennings`，赢得了100万美元的一等奖，而这项比赛长期以来一直被视为智力的象征。IBM——或者更确切地说是`Watson`——实际上将它的奖金等额捐赠给了慈善组织`World
    Vision`和`World Community Grid`。^[^(89)](#fn89)


    在那场历史性的比赛之后，`Watson`再也没有参加过比赛，但基于一整套机器学习算法的卓越能力，成为了IBM机器学习服务的基础，这些服务很快作为按需服务在IBM云上提供。随后的几年里，人工智能的研究和发展蓬勃发展，越来越多的公司在广泛的商业应用中启动了自己的项目和计划。


    ## 4.2 人工智能背后的核心思想


    我们简短的历史回顾表明，人工智能是一个非常跨学科的科学领域，建立在数学、计算机科学、神经科学、控制论等多种学科的思想和概念之上。即使该领域的一些非常现代的方法非常复杂，需要掌握诸如矩阵和微积分等高等数学知识，但大多数算法及其应用背后的基本思想，可以通过下面介绍的两个主要概念来描述。'
  raw: 'The realization of this fundamental difference in learning strategies between
    humans and computers had a truly revolutionary impact on artificial intelligence
    research and catalyzed a shift of paradigm from rules- and logic-based learning
    toward data-driven learning by training examples and experience [[22](#505424_1_En_4_Chapter.xhtml#Par261)].
    This is in fact the central and foundational basis of what is nowadays called
    *machine learning* . Machine learning was coined first by the American pioneer
    and computer scientist Arthur Samuel, who developed a computer checkers game^([^(88)](#fn88))
    in 1959 that is considered to be the first example of a machine learning system.
    In his influential paper, he describes his approach as the “[...] field of study
    that gives computers the ability to learn without being explicitly programmed”
    [[23](#505424_1_En_4_Chapter.xhtml#Par262)]. This was possible by leveraging advanced
    concepts of statistics and probability theory instead of rules and logical reasoning
    to train the system. This is also why machine learning is better referred to as
    *statistical learning* since it is entirely based on the statistical analysis
    of large amounts of training data or big data [[24](#505424_1_En_4_Chapter.xhtml#Par263)].
    The most important categories of artificial intelligence as well as the most significant
    historic milestones are depicted in Figure [4-3](#505424_1_En_4_Chapter.xhtml#Fig3)
    schematically.


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig3_HTML.png](images/505424_1_En_4_Chapter/505424_1_En_4_Fig3_HTML.png)


    Figure 4-3


    Differences between artificial intelligence, machine learning, and deep learning
    along with the most important historic milestones of those disciplines indicated
    below the time beam


    The revolutionary shift of paradigm from rules- and logic-based to data-driven
    learning also paved the way for IBM’s next generation of artificial intelligence
    called “Watson” [[25](#505424_1_En_4_Chapter.xhtml#Par264)]. Named after IBM’s
    legendary founder Thomas Watson, Watson was developed by David Ferrucci within
    the DeepQA project and initially designed as a question-answering or QA system.
    For this purpose, Watson had been equipped with 720 CPUs and 16 billion bytes
    of working memory. The database of this massively parallel supercomputer was fully
    packed with numerous datasets including the entire Wikipedia library, books, movies,
    and other sources of human knowledge. Based on this gigantic and comprehensive
    knowledge base, Watson was able to parse questions into different keywords and
    fragments in order to find statistically related phrases as the answer. The system
    executed hundreds of programs for natural language processing and analysis simultaneously
    to find a small set of potentially correct answers to a given question. Watson
    then checked those potential answers against its database to ascertain whether
    they make sense or not and finally output the most reasonable answer verbally
    with an electronic voice synthesized by a text-to-speech program.


    In 2008, IBM representatives communicated with Harry Friedman, the executive producer
    of the legendary American quiz show *Jeopardy!*, and proposed a match between
    Watson and the two *Jeopardy!* champions Brad Rutter and Ken Jennings. The first
    match was organized without any publicity in 2010 and revealed various weaknesses
    of Watson’s elaborated routines. One of the most central disadvantages of Watson
    was that it could not hear the answers of his competitors and was thus not able
    to learn from them. This is why IBM’s research team implemented an additional
    function through which Watson received the correct answers of his competitors
    electronically. After resolving this and a few other crucial problems, Watson
    slowly approached the performance level of the two *Jeopardy!* champions. Harry
    Friedman once described this steep increase in performance with the words “I think
    we’ve gone from impressed to blown away” and finally agreed to schedule a public
    match on TV on February 16, 2011\. On that day, the unbelievable happened: Watson
    defeated the reigning *Jeopardy!* champions Brad Rutter and Ken Jennings and won
    the first place prize of USD one million in a game that has long been considered
    as a very symbol of intelligence. IBM – or rather Watson – actually gifted his
    winnings to the charity organizations World Vision and World Community Grid at
    equal parts.^([^(89)](#fn89))


    After that historic match, Watson never competed again, but its remarkable capabilities
    based on a whole set of machine learning algorithms became the foundational basis
    for IBM’s machine learning services that were soon offered on IBM cloud as services
    on demand. The following years, research and development in artificial intelligence
    flourished, and more and more companies started their own projects and initiatives
    across a wide range of business applications.


    ## 4.2 Central Ideas Behind Artificial Intelligence


    Our brief historical excursion revealed that artificial intelligence is a very
    interdisciplinary area of science and builds on various ideas and concepts of
    mathematics, computer science, neuroscience, cybernetics, and others. Even if
    some very modern approaches to this field are highly complex and require the knowledge
    of advanced mathematics, such as matrix and differential calculus, the basic ideas
    behind most algorithms and their applications can be described in terms of two
    main concepts that are introduced in the following.'
