  trans: '

    **材料**：由于量子计算机非常适合模拟不同材料中复杂的化学相互作用，许多公司正利用量子计算机来优化其产品开发流程。我们此前已讨论过戴姆勒、IBM 与谷歌合作模拟高压电池的电池化学特性。另一项类似的合作则见于日本工业巨头三菱化学与
    IBM，它们共同应用量子计算来模拟锂空气电池中的分子动力学[92]——这类电池可能在未来几年内部分替代纯电动汽车中高度易燃的锂钴电池。德国一级汽车零部件供应商博世[93]与美国工业集团霍尼韦尔[94]是该行业的另外两个案例，它们也正在应用量子计算，基于量子材料建模来创造全新产品。


    **金融、银行与保险**：投资银行与保险公司也很早就开始探索量子计算，并评估其与自身业务的相关性。最早采用者之一是美国乃至全球最大的银行摩根大通，它最近与
    IBM 建立了合作关系，随后巴克莱银行和西班牙对外银行也相继加入[95, 96]。据报道，它们正在测试多种算法，用于投资组合优化、金融工具（包括资产、债券、股票、期权和衍生品）的估值与定价[97]、金融风险分析、市场模拟、交易结算以及欺诈检测。高盛也决定投资并探索这一数字技术，近期与位于加州帕洛阿尔托的美国
    QC Ware 公司建立了合作关系[98]。量子计算在金融领域的更多示例和潜在应用可参见文献，例如[99]。


    **电子**：半导体与电子行业也在投资量子计算。一些公司，如英特尔或阿里巴巴，决定自行研发量子处理单元，而另一些公司则与量子计算领域的初创公司和老牌企业合作。例如，韩国三星集团旨在利用不同的量子模拟工具，优化用于显示器、半导体芯片和电池的各种材料。为此，他们于
    2019 年开始与位于马里兰州大学园区的美国量子计算硬件与软件公司 IonQ 合作[100]。


    **能源**：由于量子计算在广泛优化问题上的巨大潜力，美国跨国石油天然气公司埃克森美孚决定成为首家加入 IBM Q 网络[101]的能源公司。IBM Q 网络是一个由财富
    500 强公司、初创企业、学术机构和国家研究实验室组成的全球性社区，致力于推动量子计算发展并探索其在科学和商业领域的实际应用。根据其 2019 年的新闻稿，埃克森美孚希望“解决跨多种应用的计算难题，包括优化国家电网的潜力、进行更具预测性的环境建模，以及通过高度精确的量子化学计算来发现新材料以实现更高效的碳捕集”[101]。


    ### 当前商业应用：网络安全


    除模拟、建模、优化和采样外，网络安全是量子计算机的另一个主要应用领域。它与肖尔算法——有史以来第一个为量子计算机设计的算法——密不可分。1994 年，彼得·肖尔描述了如何使用通用量子计算机，在极短的时间尺度内将一个大的自然数分解为其质因数^(⁴⁹)
    [72]。这种*质因数分解*的一个例子是将十进制数 29,469 分解为质数 3、11、19 和 47 的乘积，即 29,469 = 3 ⋅ 11 ⋅ 19
    ⋅ 47。虽然计算等式右边的质数乘积很容易，但反过来通过一组未知质数来均分 29,469 却极其困难。这种计算难度上的“不对称性”正是当今用于保障全球通信基础设施安全的绝大多数加密方案和网络安全代码的核心。


    迄今为止，使用最广泛的网络安全代码是所谓的*随机随机吸收算法*，简称`RSA`。在当前版本中，该算法使用一个随机选择的 2,048 位二进制数来加密数字信息。对于一封使用`RSA-2048`方案加密的电子邮件，恶意第三方需要尝试`2^(2,048)`种零和一的可能组合，才能找到正确解码该消息的
    2,048 位数字——这是一个拥有 617 位数字的难以置信的巨大数字。一台时钟频率为 1 太赫兹的经典超级计算机（实际上大多数个人电脑的时钟频率要低 1,000
    多个数量级）每秒可完成 1 万亿次操作，解决这个问题大约需要 300 万亿年。正因如此，如果你的电子邮件服务提供商使用`RSA-2048`方案来保护你的信息，你大可以感到相当安全。


    面对这种安全性，彼得·肖尔证明了一台通用量子计算机——在他发表论文时仍是一种假设性设备——能够在令人惊叹的约十秒时间内破解`RSA-2048`代码。^(⁵⁰)这种计算时间的指数级缩减，展示了使用通用量子计算机相比经典计算机所获得的巨大计算能力提升。在恶意第三方手中，量子计算机可能被用来运行肖尔算法，造成重大安全漏洞，并通过破坏互联网、国家防御系统以及其他对社会和政府至关重要的系统，危及数字通信安全。现在你可以想象，例如美国国家安全局的网络安全官员在听到通用量子计算机可能带来的这种威胁时，会作何感受。然而，随着时间的推移，人们逐渐形成了广泛共识：在未来几年内，包括彼得·肖尔提出的算法在内的高级量子算法仍将超出当前嘈杂中型量子计算机的能力范围，正因如此，最初的网络安全担忧才得以逐渐缓解。

    '
- fmt: '#### Current Business Applications: Quantum Cryptography


    Another good news in light of cybersecurity threats posed by quantum computers
    is that quantum information processing itself brings an appropriate and powerful
    technology for taking effective countermeasures to increase cybersecurity. This
    exciting field of research is called *quantum cryptography* and not directly linked
    to quantum computing as such. It does, however, also employ qubits to encode information
    and quantum resources like superposition and entanglement to process it. Quantum
    cryptography has various applications in industry, which is why it is worth mentioning
    and introducing it briefly. Quantum cryptography focuses on the exchange of information
    encoded in qubits, while quantum computing is centered around processing this
    information with quantum logic gates. It is increasingly used by governmental
    organizations and banks, for instance, to securely exchange highly sensitive information
    over large distances, such as confidential product or customer data.


    The basic idea of quantum cryptography goes back to the seminal work of the American
    physicist Stephen Wiesner, who showed in 1983 how messages can be transmitted
    optically by encoding them in optical qubits formed by the polarization states
    of photons [[102](#505424_1_En_2_Chapter.xhtml#Par298)]. Charles Bennett and Gilles
    Brassard, two physicists and computer scientists at IBM Thomas J. Watson Research
    Center and the Université de Montréal, respectively, refined this scheme one year
    later and proposed a concrete method for securely transmitting information [[103](#505424_1_En_2_Chapter.xhtml#Par299)],
    which became known as `BB84` encoding scheme in their honor. In its most popular
    version, this scheme involves two parties historically named “Alice” and “Bob,”
    who like to securely share a message, while a third party named “Eve” tries to
    eavesdrop and get hold of the information contained in the message. Without going
    into any details, the `BB84` scheme relies on the inherent quantum mechanical
    property that any measurement of a qubit alters its state by causing its overall
    wave function to collapse. As soon as Eve tries to eavesdrop the exchanged qubits,
    she will ultimately and irreversibly alter the encoded information – her wiretapping
    attempts are therefore guaranteed to fail by the peculiar nature of quantum mechanics.
    This example shows that quantum effects can be very useful if you know how to
    exploit them.


    ### 2.3.3 Next Challenges


    Quantum computers have been applied to a wide range of business applications already.
    All current state-of-the-art quantum computers are noisy intermediate-scale quantum
    computers or `NISQ` systems, and a universal quantum computer as such has not
    been realized so far. This is why researchers in this field continue looking for
    innovative qubit implementation schemes and devices that offer longer decoherence
    times and better scalability for building large-scale and fault-tolerant universal
    quantum computers occasionally.


    Microsoft has been working on a very promising approach for building such a system
    that is sometimes referred to as *topological quantum computing* [[104](#505424_1_En_2_Chapter.xhtml#Par300),
    [105](#505424_1_En_2_Chapter.xhtml#Par301)]. Topology is a branch of mathematics
    describing the properties of geometric objects that are preserved under certain
    deformations, such as bending, stretching, and twisting without tearing and gluing.
    When applied to quantum computing, topological qubits are particle-like objects
    – so-called *anyons* – that emerge from interactions inside a large ensemble of
    electrons. Such ensembles typically form at the interface between two materials
    in a two-dimensional plane and allow topological qubits to extend across many
    electron states within this so-called *two-dimensional electron gas*. This makes
    them extremely robust to changes in their environment and noise-induced decoherence,
    which is why the Russian-American physicist Alexei Kitaev suggested to use them
    for quantum computing in 1997 for the first time [[106](#505424_1_En_2_Chapter.xhtml#Par302)].
    His work is based on the theoretical work on this exotic state of matter going
    back to the three British-born physicists and Nobel laureates Michael Kosterlitz,
    David Thouless, and Duncan Haldane [[107](#505424_1_En_2_Chapter.xhtml#Par303)].
    *Majorana particles*, a certain type of anyons hypothesized by the Italian physicist
    Ettore Majorana in 1937 for the first time, have also been proposed for qubits
    lately. They have been observed in one-dimensional carbon nanotubes and two-dimensional
    sheets of graphene, two very promising materials that may well be suited for the
    physical implementation of topological quantum computing.'
