  trans: "\n# 2.5 量子计算框架\n\n您是否正在考虑在组织中使用量子计算，或将其应用于您的具体用例？如果您对以下实施清单中的大部分关键问题的回答是“是”，那么量子计算很可能有助于您实现自己的商业构想或用例。\n\
    \n1.  您的用例涉及什么——它是否属于以下通用类别之一？是 □ 否 □\n    *   采样问题\n    *   优化问题\n    *   大型数据库搜索\n\
    \    *   模拟与建模\n    *   求解线性方程组\n    *   整数因式分解（例如用于密码学）\n    *   随机数生成（“可验证随机性”）\n\
    2.  之前是否有过类似的用例被描述过（在文献或媒体中）？是 □ 否 □\n3.  您的组织中是否存在依赖或需要超级计算的持续流程？是 □ 否 □\n4.\
    \  您是否将资源（人力、财力等）花费在试错替代方案上——例如湿实验室实验或物理原型制作——而这些方案本可以通过超级计算的支持或替代来加速？是 □ 否 □\n\
    5.  您是否拥有维护量子计算硬件和开发量子软件（算法）所需的所有人力资源，例如技术工程师、物理学家和程序员？是 □ 否 □\n6.  您问题的可能解的数量——即所谓的搜索空间——是否呈指数级大于输入数据量？如果不是，则该特定问题不适合用量子计算机解决。是\
    \ □ 否 □\n7.  经典计算机是否无法在合理的时间尺度内快速且便捷地解决您的用例？是 □ 否 □\n8.  您问题的解决方案是否非常紧迫，并且您没有足够的时间在经典计算机上解决您的用例？是\
    \ □ 否 □\n9.  您的生态系统中有任何人（例如合作伙伴或竞争对手）已经在应用量子计算吗？是 □ 否 □\n10. 量子计算能否为您提供持久的竞争优势？是\
    \ □ 否 □\n    规划实施时需要进一步考虑的问题：\n    *   预期谁会（在组织内部或外部）使用量子计算机，他们有什么期望？\n    * \
    \  您将如何将量子计算机集成到现有的 IT 基础设施中（本地部署或按需使用）？\n    *   谁需要维护其技术基础设施？\n\n## 2.6 延伸阅读\n\
    \n在本章结尾，如果您希望更深入地了解量子计算及其应用这个激动人心的领域，我想为您提供一些延伸阅读的建议：\n\n*   Hidary, J. D.：《量子计算：一种应用方法》，斯普林格国际出版公司，2019\
    \ 年。\n*   Nielsen, M. A. 和 Chuang, I. L.：《量子计算与量子信息》，剑桥大学出版社，2010 年。\n*   Feynman,\
    \ R. P.：《费曼计算学讲义》，西景出版社，2000 年。\n*   Rieffel, G. 和 Polak, W. H.：《量子计算：温和入门》，麻省理工学院出版社，2011\
    \ 年。\n*   Audretsch, J.（主编）：《纠缠的世界：量子信息与计算的魅力》，Wiley-VCH 出版社，2006 年。\n*   Sutor,\
    \ R. S.：《与量子比特共舞：量子计算如何运作以及它如何改变世界》，Packt 出版社，2019 年。\n*   Johnston, E. R.：《量子计算机编程：基本算法与代码示例》，奥莱利媒体，2019\
    \ 年。\n\n我还强烈建议您浏览[`www.quantumcomputingreport.com/`](https://www.quantumcomputingreport.com/)上的“量子计算报告”，以获取有关整个量子计算生态系统的更多信息，包括教育类文章、参与方以及最新的应用和用例。另一个非常有趣的网站是由“量子开源基金会”提供的，网址是[`www.qosf.org/`](https://www.qosf.org/)。\n\
    \n# 3. 区块链技术\n\n合同和交易是我们现代社会的核心。其纸质和数字记录通过设定相关的监管边界，定义了行政、经济、法律、政治和社会体系中最重要的结构。它们规范着全球范围内国家、公共和私人组织、社区以及个人之间的互动\
    \ [1]。正因如此，它们经常成为数字滥用和欺诈的目标，这也使得网络安全在数字时代比以往任何时候都更为重要。在此背景下，区块链技术有望发挥关键作用，因为它对数据完整性和记录的影响力，可能如同互联网对数据访问和交换的影响力一样具有颠覆性。\n\
    \n就其公众接受度而言，区块链技术与 TCP/IP（传输控制协议/互联网协议）有一些相似之处，后者是互联网最重要的使能技术之一。在 TCP/IP 出现之前，电路交换是电信架构的基础，当时双方之间的连接必须通过手动将插头插入电话交换台上的相应插座来建立。因此，多年来，电信服务提供商在通信设备和大型企业及私人住宅之间的专用（私有）线路上投资了数十亿美元。\n\
    \n随着 TCP/IP 协议的引入，通信行为开始发生彻底改变。TCP/IP 协议于 1972 年推出，实现了通过电子邮件的双向消息传递，以及以标准化数据格式交换数字信息。正如\
    \ TCP/IP 实现了双向消息传递一样，区块链技术实现了双向交易和价值转移。两种协议都是开放、分布式和共享的网络，没有中央监管机构负责其维护和改进。此外，两项技术最初都是在被更广泛采用之前，先在由研究人员和软件开发人员组成的一个热情但规模不大的社区中流行起来的。虽然\
    \ TCP/IP 通过降低（双向）连接和通信的成本释放了新的经济价值，但正如我们将在本章中看到的，区块链技术可以极大地降低交易成本。例如，法国商业咨询公司凯捷估计，消费者通过使用基于区块链的应用，可以在银行和保险费用上节省高达\
    \ 160 亿美元 [2]。\n\n区块链技术的起源与*比特币*密不可分，比特币是有史以来第一个通过密码学保护的数字货币（或称*加密货币*），也是迄今为止区块链技术最流行的应用\
    \ [3]。但在 2017 年围绕比特币的风靡一时（注：传奇美国投资者沃伦·巴菲特曾将比特币称为“赌博工具”[5]）之后不久，人们意识到区块链远不止是数字货币的使能技术。他们意识到它可以应用于包括金融服务、汽车和医疗保健行业在内的各行各业的一系列应用。\n"
- fmt: '# Chapter 3


    This chapter is about this fascinating enabler behind Bitcoin that has meanwhile
    become a valuable support technology for digital transformation as it opens up
    new governmental opportunities and creates new business models in the public and
    private sector, respectively. This chapter introduces blockchain technology and
    its key principles and concepts. We will learn how blockchain technology and its
    distributed network architecture enable cryptographically secured transactions
    and transfers involving money or other tradable assets in untrusted environments.
    In this context, we will explore the fundamental and immutable data structure
    of a blockchain to better understand the Bitcoin transaction life cycle. We will
    also discuss very clever extensions of this data structure that enable the automatization
    of business processes by smart contracts. After that, we will explore the most
    popular current business applications and learn about future prospects of blockchain
    technology and its impact on industry, governments, and society. This chapter
    will give you a profound idea of how blockchain technology works, to what kind
    of use cases it can be applied, and which applications are less suited for this
    digital technology. At the end of this chapter – as with all other chapters –
    I will provide you with an easy-to-use blockchain technology framework to determine
    whether blockchain technology can be applied to your own use case or business
    idea.


    ## 3.1 Setting the Blockchain Scene


    The rise of blockchain technology begins with an enduring mystery. In 2008 – at
    the height of the global financial crisis – Satoshi Nakamoto published a revolutionary
    paper by distributing an email to a mailing list about cryptography^([^(52)](#fn52))
    with the subject “Bitcoin P2P e-cash paper.” Allegedly disillusioned by the global
    banking system, he explained in his email that he had been “[...] working on a
    new electronic cash system that’s fully peer-to-peer, with no trusted third party”
    and uploaded the respective white paper on [`www.bitcoin.org`](http://www.bitcoin.org)
    [[6](#505424_1_En_3_Chapter.xhtml#Par208)]. This publication soon attracted great
    attention, and people tried to find out more about its Japanese-sounding author
    in the following months and years. Their attempts have, however, remained unsuccessful
    so far and the identity of Bitcoin’s creator including the underlying blockchain
    technology remains unknown up to now.


    About two months after this seminal publication, on January 3, 2009, Satoshi Nakamoto
    created the first Bitcoin, and the Bitcoin network officially came into existence.^([^(53)](#fn53))
    The first Bitcoin transaction between Satoshi Nakamoto and the American software
    developer Hal Finney was conducted nine days later. The exchange rate between
    one Bitcoin (currency code: BTC) and one American dollar was established on October
    5, 2009, for the first time and amounted to BTC 1 = USD 0.00076 only. At the peak
    of the Bitcoin hype in late 2017, the exchange rate had increased by more than
    260,000% and amounted to nearly BTC 1 = USD 20,000 – a truly remarkable increase
    and speculative hype. But before we dive deeper into this revolutionary technology,
    it is instructive to recapitulate the crucial role money and transactions have
    played in society historically.


    ### 3.1.1 The Role of Transactions and Money in History


    The need to transact and exchange goods in societies emerged naturally mainly
    due to local and geographical differences. Fish, for instance, is highly abundant
    in coastal areas while being rare in the midland. The midland, on the other hand,
    offers far-reaching fields for cultivating cereals, which are in turn rare in
    coastal areas. Exchanging fish vs. cereals between the coast and midland is just
    one example for exchanging goods – people always want what they do not have. In
    general, any surplus product has always been ideal for transactions, which is
    why *barter transactions* emerged early on in the Bronze Age already. People began
    to use cereals, animal fur, dried fish, cattle, salt, and other naturals for their
    daily transactions at that time. This particular type of “currency” is nowadays
    referred to as *primitive money* since it usually had an immediate value and could
    be used directly for eating and other purposes as shown in Table [3-1](#505424_1_En_3_Chapter.xhtml#Tab1).
    In his famous book *Politics*, the Greek philosopher and polymath Aristotle already
    considered in 350 B.C. that objects always fulfill two purposes: the original
    one for which the object was designed and built for and the other one by acting
    as an item to sell or barter [[7](#505424_1_En_3_Chapter.xhtml#Par209)]. Quite
    remarkably, refined versions of this primitive money even endured until the Roman
    Empire, which sometimes paid its soldiers by portions of salt as an important
    preservative for food. This payment was referred to by the Latin word *salarius*,
    which means “belonging to the salt,” and later gave rise to the modern English
    term “salary.”


    Instead of naturals with an immediate value, people occasionally started to use
    other rare objects for trading, such as cowries. Those small maritime shells soon
    became very popular as they turned out to be very hard and handy and – most importantly
    – nonperishable. For the same reason, people began to use metals including gold,
    silver, and bronze compared to all other materials. Metals came with two main
    advantages: (1) they had an intrinsic value itself due to being rare, and (2)
    they could be casted easily into basic commodities, such as arrowheads and other
    tools used for hunting and self-defense. In 800 B.C., the Lydians living in the
    area of today’s Turkey introduced a primitive version of metallic *coin money*
    that was originally used for gifts, rewards, and sacrificial offerings only. But
    this idea spread in the Mediterranean region very quickly, and people started
    to use those coins for trading, too, with the Greeks being the first nation who
    used coins for daily trading on a large scale. The ancient Greek city states including
    Athens and Corinth soon started to make their own coins, such as the drachma.
    Coins were comparatively difficult to make but very convenient for daily transactions.
    Their weight did, however, increasingly limit their usage for trading large volumes
    of commodities on long distances in the High Middle Ages due to their weight and
    volume. This is why the famous medieval trading cities in central Italy, including
    Genoa, Venice, and Florence, produced richly decorated gold coins, such as gold
    florins, with a much higher value and better suitability for long-distance trading.
    The ultimate measure of value of any coin was always its content of noble metal
    in the end, which was defined by the issuing sovereign, such as governments or
    the aforementioned trading cities.


    **Table 3-1** Types of money in history'
