- fmt: '数字化核心的一个绝佳范例和榜样是微软及其业务部门“核心服务工程与运营”（简称 CSEO）。^([^(141)](#fn141)) CSEO 处于微软的核心位置，在全球拥有超过
    5500 名员工，其工作贯穿价值链的广泛环节，从发布产品、运营零售店到人力资源管理。其核心使命是构建产品和工具，通过将组织内的每个人连接到中央数据目录、通用软件组件库和共享算法仓库，赋能员工在各自业务单元内独立驱动生产力。通过数字化其核心，微软能够快速实现数字化，赋能并部署跨所有业务单元的数字化产品和服务，从而为整个公司提升效率并创造创新的业务成果。在其
    2020 年的畅销书《*在人工智能时代竞争*》中，哈佛商学院的两位美国经济学家 Marco Iansiti 和 Karim Lakhani 将这种依赖于高度集成的模块化软件和数据平台的数字运营模式称为“*AI
    工厂*”。此外，他们解释道：


    > [...] 当生产被工业化时，分析和决策在很大程度上仍然是传统的、特殊的流程。 [...] AI 工厂是可扩展的决策引擎，为二十一世纪公司的数字化运营模式提供动力。管理决策越来越多地嵌入到软件中，这使得许多传统上由员工执行的流程实现了数字化
    [[29](#505424_1_En_5_Chapter.xhtml#Par168)]。


    换句话说，AI 工厂将决策制定视为一个由大数据分析驱动的工业流程 [[30](#505424_1_En_5_Chapter.xhtml#Par169)]。数据驱动的决策系统性地将信息转化为有价值的业务预测、洞察和选择，以指导甚至自动化某些业务流程。这正是数字化公司核心和实施数字运营模式的核心所在。Marco
    Iansiti 和 Karim Lakhani 进一步解释道：


    > 每个工厂都包含四个基本组件。第一个是数据管道，这是一个半自动化的流程，以系统、可持续和可扩展的方式收集、清理、集成和保护数据。第二个是算法，它生成关于业务未来状态或行动的预测。第三个是实验平台，在该平台上测试关于新算法的假设，以确保其建议产生预期效果。第四个是基础设施，即将此流程嵌入软件并将其连接到内部和外部用户的系统
    [[31](#505424_1_En_5_Chapter.xhtml#Par170)]。


    ![../images/505424_1_En_5_Chapter/505424_1_En_5_Fig5_HTML.png](images/505424_1_En_5_Chapter/505424_1_En_5_Fig5_HTML.png)


    **图 5-5** 公司运营模式从孤岛式到高度集成数据架构的数字化转型，其中以前孤立的业务单元共享一个公司范围的数据库。图示灵感来源于 [[29](#505424_1_En_5_Chapter.xhtml#Par168)]


    ### 5.3.1 数字化核心：创建中央数据库


    组织数字化核心的第一步是将分散的数据资产和分布式信息源——通常嵌入在复杂的`Excel`电子表格中 [[25](#505424_1_En_5_Chapter.xhtml#Par164)]——整合到一个组织级的高度集成数据库中，作为单一事实来源。如此一来，先前分布和孤立的数据就变成了结构化的大数据，允许进行全面的数据分析和处理，如图
    [5-5](#505424_1_En_5_Chapter.xhtml#Fig5) 所示意。将分布式数据集成到单个数据库中尤为重要，因为数据的真正价值在于整合来自不同业务单元、因不同原因、在不同背景下收集的不同信息源。想想来自物流部门的库存数据和来自销售部门的客户订单数据。这两种信息源的整合创造了关于它们之间相关性的透明度，并允许相应地根据需求优化库存——当然，还有一系列其他不那么明显的例子，展示了极具价值的数据合并，正如前一章所述。


    除谷歌和 Facebook 之外，最成功的美国媒体公司是将分布式数据的融合及其通过最先进的实时数据分析进行解释，从而转化为成功数字商业模式的典范是位于纽约市的彭博社。由美国商人
    Michael Bloomberg 于 1981 年创立，彭博社从互联网收集公开数据，例如官方新闻稿和报纸文章，并将其与从内部新闻研究中获得的专有数据相结合。这种数据融合通过最先进的数字技术进行分析，包括由人工智能驱动的大数据分析，以衍生出进一步具有经济价值的商业洞察。然后，这些稀缺信息通过彭博终端
    [[26](#505424_1_En_5_Chapter.xhtml#Par165)] 提供，这是其为金融和信息行业的机构客户销售突发商业新闻的核心创收产品——这些新闻经常影响股票价格和其他（影响深远的）投资决策。^([^(142)](#fn142))


    将分布在不同数据格式中的信息源整合到一个统一的数据平台的过程通常依赖于四个步骤：


    1.  *收集*：从包括开源和第三方数据在内的不同内部和外部信息源收集数据。

    2.  *清理*：移除任何无用或没有价值的、不需要和不必要的数据。

    3.  *标准化*：将数据转换为一系列标准化和预定义的数据格式，适用于结构化数据（例如，财务信息、地址、电话号码、产品信息）和非结构化数据（例如，图像、视频、音频文件、社交媒体推文和帖子）。

    4.  *集成*：将数据上传到云或数据湖，并使其在整个组织的平台上可访问。


    这种预处理可能非常耗时，需要在您的数字化议程的整体时间表中予以考虑 [[28](#505424_1_En_5_Chapter.xhtml#Par167)]。尽管如此，这个过程至关重要且不可避免，因为您数据输入的质量从根本上决定了输出的质量，正如之前关于人工智能及其应用的例子所示。


    ### 5.3.2 数字化核心：开发软件工具库


    如果没有人能够访问和使用，中央数据库就没有价值。这就是为什么数字化组织核心的第二步涉及在数据库之上构建一个工具库，以部署标准化软件模块，用于分析存储在共享数据库中的数据，如图
    [5-5](#505424_1_En_5_Chapter.xhtml#Fig5) 所示。理想情况下，可以通过一个编程接口来访问这个软件库，该接口称为“应用程序编程接口”或`API`，它允许不同的功能团队轻松地将标准软件适配到他们的特定用例或业务问题。`API`的设计应促进工具和算法的模块化和重用，例如通过部署不同的机器学习算法、用于在量子计算机上运行复杂仿真的软件代码，或用于操作区块链网络的编程工具。'
  raw: 'A very good example and role model for a digitized core is Microsoft and its
    business unit “Core Services Engineering and Operations” or CSEO.^([^(141)](#fn141))
    CSEO is at the heart of Microsoft and has more than 5,500 employees globally who
    work across a broad spectrum of the value chain ranging from releasing products
    and running retail stores to human resources. Its core mission is to build products
    and tools that empower employees to drive productivity in their particular roles
    independently of their business unit by connecting everybody within the organization
    to a central data catalog, common software components library, and shared algorithm
    repository. By digitizing its core, Microsoft can rapidly digitize, enable, and
    deploy digital products and services across all business units to drive efficiencies
    and innovative business outcomes for the entire company. In their 2020 bestselling
    book *Competing in the Age of AI*, the two American economists Marco Iansiti and
    Karim Lakhani at Harvard Business School call such a digital operating model that
    relies on a highly integrated modular software and data platform *AI factory*.
    Furthermore, they explain:


    [...] while production was industrialized, analysis and decision-making remained
    largely traditional, idiosyncratic processes. [...] The AI factory is the scalable
    decision engine that powers the digital operating model of the twenty-first-century
    firm. Managerial decisions are increasingly embedded in software, which digitizes
    many processes that have traditionally been carried out by employees [[29](#505424_1_En_5_Chapter.xhtml#Par168)].


    In other words, an AI factory captures decision making as an industrial process
    driven by big data analytics [[30](#505424_1_En_5_Chapter.xhtml#Par169)]. Data-driven
    decision making systematically converts information into valuable business predictions,
    insights, and choices to guide and even automate certain business processes. This
    is at the heart of digitizing the core of a company and implementing a digital
    operating model. Marco Iansiti and Karim Lakhani explain further:


    Four components are essential to every factory. The first is the data pipeline,
    the semiautomated process that gathers, cleans, integrates, and safeguards data
    in a systematic, sustainable, and scalable way. The second is algorithms, which
    generate predictions about future states or actions of the business. The third
    is an experimentation platform, on which hypotheses regarding new algorithms are
    tested to ensure that their suggestions are having the intended effect. The fourth
    is infrastructure, the systems that embed this process in software and connect
    it to internal and external users [[31](#505424_1_En_5_Chapter.xhtml#Par170)].


    ![../images/505424_1_En_5_Chapter/505424_1_En_5_Fig5_HTML.png](images/505424_1_En_5_Chapter/505424_1_En_5_Fig5_HTML.png)


    Figure 5-5


    Digital transformation of a company’s operating model from a siloed to a highly
    integrated data architecture, in which previously siloed business units share
    a company-wide database. Graphics inspired by [[29](#505424_1_En_5_Chapter.xhtml#Par168)]


    ### 5.3.1 Digitize the Core: Create a Central Database


    The first step of digitizing the core of an organization is to bring scattered
    data assets and distributed sources of information – often embedded in complex
    Excel spreadsheets [[25](#505424_1_En_5_Chapter.xhtml#Par164)] – together into
    an organization-wide and highly integrated database as a single version of truth.
    In this way, previously distributed and siloed data becomes structured big data
    that allows for comprehensive data analysis and processing as depicted in Figure
    [5-5](#505424_1_En_5_Chapter.xhtml#Fig5) schematically. Integrating distributed
    data into a single database is particularly important since the real value of
    data arises due to the consolidation of different sources of information that
    has been collected for different reasons in different contexts by different business
    units. Just think about inventory stock data from the logistics and data about
    customer orders from the sales department. The consolidation of both sources of
    information creates transparency about their correlation and allows for optimizing
    inventory stock depending on demand accordingly – there are, of course, a range
    of other and less obvious examples for highly valuable data mergers as outlined
    in the previous chapter.


    The most successful American media company – other than Google and Facebook –
    that has turned the convolution of distributed data and its interpretation by
    state-of-the-art real-time data analytics into a successful digital business model
    is Bloomberg, headquartered in New York City. Founded by the American businessman
    Michael Bloomberg in 1981, Bloomberg collects publicly available data from the
    Internet, such as official press releases and newspaper articles, and combines
    it with proprietary data gained from internal journalistic research. This convolution
    of data is analyzed by state-of-the-art digital technologies including big data
    analytics powered by artificial intelligence to derive further economically valuable
    business insights. This scarce information is then made available on Bloomberg
    Terminal [[26](#505424_1_En_5_Chapter.xhtml#Par165)], its core revenue-generating
    product for selling breaking business news to its institutional clients in the
    financial and information industry – quite often, those news impact stock prices
    and other (far-reaching) investment decisions.^([^(142)](#fn142))


    The process of bringing together distributed sources of information encoded in
    different data formats to one cohesive data platform generally relies on four
    steps:


    1.  *Gathering*: Collecting data from different internal and external sources
    of information including open source and third-party data


    2.  *Cleaning*: Removing unwanted and unnecessary data without any use or value


    3.  *Normalizing*: Converting the data into a set of standardized and predefined
    data formats for structured data (e.g., financial information, addresses, phone
    numbers, product information) and unstructured data (e.g., images, videos, audio
    files, social media tweets and posts)


    4.  *Integrating*: Uploading the data to a cloud or data lake and making it accessible
    across the organization on the platform


    This preprocessing can be very time consuming and needs to be considered in the
    overall time schedule of your digital agenda [[28](#505424_1_En_5_Chapter.xhtml#Par167)].
    Nevertheless, this process is quintessential and inevitable since the quality
    of your data input critically determines the quality of the output as shown in
    the previous examples about artificial intelligence and its applications.


    ### 5.3.2 Digitize the Core: Develop a Software Tools Library


    The central database is useless if nobody can access and use it. This is why digitizing
    the core of an organization secondly involves building a tools library on top
    of the database to deploy standardized software modules for analyzing the data
    kept in the shared database as shown in Figure [5-5](#505424_1_En_5_Chapter.xhtml#Fig5).
    This software library is ideally accessed through a programming interface called
    “application programming interface” or API to be precise that allows different
    functional teams to easily adapt the standard software to their particular use
    case or business problem. The API should be designed to promote modularity and
    reuse of tools and algorithms by deploying different machine learning algorithms,
    software codes for running complex simulations on a quantum computer, or programming
    tools for operating a blockchain network, for example.'
  trans: '

    数字化核心的一个绝佳范例和榜样是微软及其业务部门“核心服务工程与运营”（简称 CSEO）。^(¹⁴¹) CSEO 处于微软的核心位置，在全球拥有超过 5500
    名员工，其工作贯穿价值链的广泛环节，从发布产品、运营零售店到人力资源管理。其核心使命是构建产品和工具，通过将组织内的每个人连接到中央数据目录、通用软件组件库和共享算法仓库，赋能员工在各自业务单元内独立驱动生产力。通过数字化其核心，微软能够快速实现数字化，赋能并部署跨所有业务单元的数字化产品和服务，从而为整个公司提升效率并创造创新的业务成果。在其
    2020 年的畅销书《*在人工智能时代竞争*》中，哈佛商学院的两位美国经济学家 Marco Iansiti 和 Karim Lakhani 将这种依赖于高度集成的模块化软件和数据平台的数字运营模式称为“*AI
    工厂*”。此外，他们解释道：


    > [...] 当生产被工业化时，分析和决策在很大程度上仍然是传统的、特殊的流程。 [...] AI 工厂是可扩展的决策引擎，为二十一世纪公司的数字化运营模式提供动力。管理决策越来越多地嵌入到软件中，这使得许多传统上由员工执行的流程实现了数字化
    [29]。


    换句话说，AI 工厂将决策制定视为一个由大数据分析驱动的工业流程 [30]。数据驱动的决策系统性地将信息转化为有价值的业务预测、洞察和选择，以指导甚至自动化某些业务流程。这正是数字化公司核心和实施数字运营模式的核心所在。Marco
    Iansiti 和 Karim Lakhani 进一步解释道：


    > 每个工厂都包含四个基本组件。第一个是数据管道，这是一个半自动化的流程，以系统、可持续和可扩展的方式收集、清理、集成和保护数据。第二个是算法，它生成关于业务未来状态或行动的预测。第三个是实验平台，在该平台上测试关于新算法的假设，以确保其建议产生预期效果。第四个是基础设施，即将此流程嵌入软件并将其连接到内部和外部用户的系统
    [31]。


    ![../images/505424_1_En_5_Chapter/505424_1_En_5_Fig5_HTML.png](img/505424_1_En_5_Fig5_HTML.png)


    **图 5-5** 公司运营模式从孤岛式到高度集成数据架构的数字化转型，其中以前孤立的业务单元共享一个公司范围的数据库。图示灵感来源于 [29]


    ### 5.3.1 数字化核心：创建中央数据库


    组织数字化核心的第一步是将分散的数据资产和分布式信息源——通常嵌入在复杂的`Excel`电子表格中 [25]——整合到一个组织级的高度集成数据库中，作为单一事实来源。如此一来，先前分布和孤立的数据就变成了结构化的大数据，允许进行全面的数据分析和处理，如图
    5-5 所示意。将分布式数据集成到单个数据库中尤为重要，因为数据的真正价值在于整合来自不同业务单元、因不同原因、在不同背景下收集的不同信息源。想想来自物流部门的库存数据和来自销售部门的客户订单数据。这两种信息源的整合创造了关于它们之间相关性的透明度，并允许相应地根据需求优化库存——当然，还有一系列其他不那么明显的例子，展示了极具价值的数据合并，正如前一章所述。


    除谷歌和 Facebook 之外，最成功的美国媒体公司是将分布式数据的融合及其通过最先进的实时数据分析进行解释，从而转化为成功数字商业模式的典范是位于纽约市的彭博社。由美国商人
    Michael Bloomberg 于 1981 年创立，彭博社从互联网收集公开数据，例如官方新闻稿和报纸文章，并将其与从内部新闻研究中获得的专有数据相结合。这种数据融合通过最先进的数字技术进行分析，包括由人工智能驱动的大数据分析，以衍生出进一步具有经济价值的商业洞察。然后，这些稀缺信息通过彭博终端
    [26] 提供，这是其为金融和信息行业的机构客户销售突发商业新闻的核心创收产品——这些新闻经常影响股票价格和其他（影响深远的）投资决策。^(¹⁴²)


    将分布在不同数据格式中的信息源整合到一个统一的数据平台的过程通常依赖于四个步骤：


    1.  *收集*：从包括开源和第三方数据在内的不同内部和外部信息源收集数据。

    2.  *清理*：移除任何无用或没有价值的、不需要和不必要的数据。

    3.  *标准化*：将数据转换为一系列标准化和预定义的数据格式，适用于结构化数据（例如，财务信息、地址、电话号码、产品信息）和非结构化数据（例如，图像、视频、音频文件、社交媒体推文和帖子）。

    4.  *集成*：将数据上传到云或数据湖，并使其在整个组织的平台上可访问。


    这种预处理可能非常耗时，需要在您的数字化议程的整体时间表中予以考虑 [28]。尽管如此，这个过程至关重要且不可避免，因为您数据输入的质量从根本上决定了输出的质量，正如之前关于人工智能及其应用的例子所示。


    ### 5.3.2 数字化核心：开发软件工具库


    如果没有人能够访问和使用，中央数据库就没有价值。这就是为什么数字化组织核心的第二步涉及在数据库之上构建一个工具库，以部署标准化软件模块，用于分析存储在共享数据库中的数据，如图
    5-5 所示。理想情况下，可以通过一个编程接口来访问这个软件库，该接口称为“应用程序编程接口”或`API`，它允许不同的功能团队轻松地将标准软件适配到他们的特定用例或业务问题。`API`的设计应促进工具和算法的模块化和重用，例如通过部署不同的机器学习算法、用于在量子计算机上运行复杂仿真的软件代码，或用于操作区块链网络的编程工具。

