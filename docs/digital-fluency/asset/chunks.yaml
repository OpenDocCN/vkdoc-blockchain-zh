  trans: '

    ### 4.3.4 集成方法


    *集成方法*将多种机器学习算法整合为一个预测模型，以充分利用各算法的优势——用亚里士多德的名言来说就是“整体大于部分之和”。为此，集成方法会对不同算法的输出结果进行“平均”，最终输出集成值最高的预测结果，该结果可理解为一种集成平均值。根据这种平均值的具体计算方式，数据科学家将其区分为三种不同方法：


    1.  **Bagging**（装袋法）：用于降低预测的方差

    2.  **Boosting**（提升法）：用于降低预测的偏差（“偏见”或“刻板印象”）

    3.  **Stacking**（堆叠法）：用于改善预测效果


    *Bagging* 代表“自助聚合”，指通过对所有结果求平均来计算集成值的集成方法。最著名的例子是*随机森林*算法，它直接对集成中不同算法所形成的决策树各分支结果取平均值。例如，当你用智能手机或数码相机拍照时，其面部识别功能会在人物面部周围绘制方框以优化人像效果。这一功能极有可能就是随机森林算法的结果：集成中的一个算法负责识别眼睛，另一个算法负责识别耳朵、嘴巴等。每个算法都会输出检测到这些面部特征的一定概率。集成算法对这些概率求平均，并输出一个整体的集成值或检测到输入图像中人脸的概率。若该概率超过某个阈值（如
    60%），相机应用便会相应地在特征周围绘制方框。随机森林算法特别适合实时图像处理，因为它们通常在速度上优于人工神经网络。*Stacking*（堆叠法）则采用某种决策模型（如多项式回归）来计算集成中各算法的平均值。这种方法在实践中通常效果较差，因为决策模型难以针对特定应用场景进行灵活调整。*Boosting*（提升法）作为第三种集成方法，对集成中的各算法按顺序依次应用。该方法的主要优势在于，后续算法可以修正前一个算法的错误。然而，它们并不能很好地并行处理，但通常仍然比人工神经网络更快。例如，据报道，谷歌和
    Facebook 在其搜索引擎中使用提升算法，按相关性对搜索结果进行排序。


    另一个你可能非常熟悉的集成方法应用是包括 WhatsApp、微信或 iMessage 在内的即时通讯应用中的查询自动补全功能。该功能会在你开始输入信息时预测可能的后续词语。例如，如果你开始输入“he”，应用可能会建议“hello”或“here”——即在该语境中最常使用的词语。谷歌在
    2006 年推出的谷歌翻译中也使用了这类算法，并持续改进至今，现已支持 100 多种语言和超过 1000 亿个单词[76]。然而，谷歌于 2016 年将其多语言翻译系统切换为深度学习算法，因为长短期记忆网络在最终证明更强大、更准确，它们同样能够评估词语的上下文含义。这也是谷歌将其翻译系统更名为“神经机器翻译系统”的原因[77]。


    ### 4.3.5 强化学习


    最后，我们接触到一种看起来像真正人工智能的方法。这是因为这种方法与数据无关，而是关乎对未知（虚拟）环境的探索，例如一辆在陌生城市中行驶的自动驾驶汽车。事实证明，掌握世界上所有的道路规则和地图知识，并不能教会自动驾驶汽车的自动驾驶系统如何安全合规地行驶[78]——这一现象在其他应用中也同样存在。


    正是因此，科学家们开发了一种全新的学习方法，称为*强化学习*。这种方法类似于通过奖励饼干来训练狗。早期的实验可以追溯到俄罗斯心理学家伊万·巴甫洛夫，他在 19
    世纪 90 年代末用狗进行了一系列实验。为此，他每次在笼子里喂狗时都会摇铃。重复几次这个过程后，他观察到摇铃总会引发唾液反应，狗偶尔学会将铃声与附近的食物联系起来并做出相应准备，这在心理学上后来被称为*经典条件反射*。条件反射不仅成为心理学行为主义的基础，也成为今天强化学习的基本思想。在上述例子中，狗被更正式地称为*智能体*，其笼子称为*环境*。在此环境中执行*动作*，例如“听到铃声”或“获取食物”，被认为会改变狗的*状态*。从技术上讲，智能体的状态描述了其在环境中的位置或处境。智能体的动作和状态这两个参数，决定了其采取动作后获得的*奖励*。在此例中，伊万·巴甫洛夫是教练，他决定智能体是否获得奖励，技术上称为*解释器*。强化学习中的智能体遵循某种*策略*，即一系列旨在最大化奖励的动作。该策略在训练过程中迭代优化，如图
    4-14 所示。根据策略的优化是否基于环境的某种模型，科学家区分了*基于模型*和*无模型*的强化学习。由于无模型强化学习更加灵活，能够适应随时间变化的环境，因此这无疑是这一迷人研究领域中最流行的方法，拥有众多应用。


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig14_HTML.jpg](img/505424_1_En_4_Fig14_HTML.jpg)


    **图 4-14** 试图逃离迷宫的智能体（机器人）的强化学习循环过程。(1) 过程从智能体做出一个任意步骤或动作开始。(2) 解释器观察智能体的动作，并评估该动作是否使其更接近迷宫出口。(3)
    如果是，解释器奖励机器人；否则，在智能体的成本函数上施加惩罚。(4) 每个动作最终都会改变机器人在环境中的状态，然后过程重新开始。机器人通过多次执行此循环过程来改进其行为，同时力求每一步都最大化其奖励（或最小化其成本函数）。

    '
- fmt: '# 强化学习的数学概念


    强化学习的数学概念可以追溯到理查德·贝尔曼（Richard Bellman）于1954年关于*动态规划*的开创性工作[[79](#505424_1_En_4_Chapter.xhtml#Par319)]，其中他提出了著名的*最优性原理*，证明了动态优化问题的每个解都由更简单的部分解组成。理查德·贝尔曼用以下话语描述了他的原理：“一个最优策略具有这样的性质：无论初始状态和初始决策是什么，剩余的决策必须针对由第一个决策所产生的状态构成一个最优策略”[[79](#505424_1_En_4_Chapter.xhtml#Par319)]。为了进行更定量的数学描述，他引入了一个递归数学函数，该函数将智能体在环境中的最优行动与预期奖励和结果状态联系起来。这个方程被称为*贝尔曼方程*，至今仍是强化学习的理论基础。


    ## 强化学习


    强化学习是关于智能体在环境中采取行动。智能体或“行动者”会根据其行动是否使其更接近最大化奖励的最终目标，而获得奖励或惩罚。这种方法适用于你无法定义智能体在环境中的理想状态，并且了解环境的唯一方式是与之交互的情况。


    贝尔曼方程后来通过将确定性环境替换为更符合现实的、随机且随时间变化的环境而得到了改进（或抽象化）。例如，一个更现实的环境可能涉及第二只竞争的狗，它也在试图抓住有奖励的食物。随机环境会影响智能体的最优行动选择策略，在数学上被称为*有限马尔可夫过程*。^([^(105)](#fn105))
    英国计算机科学家克里斯托弗·沃特金斯（Christopher Watkins）于1989年首次描述了通过有限马尔可夫过程对贝尔曼方程进行的抽象[[80](#505424_1_En_4_Chapter.xhtml#Par320),
    [81](#505424_1_En_4_Chapter.xhtml#Par321)]，这后来被称为*Q学习*——其中的`Q`代表“质量”（quality），因为智能体学习在每种情况下执行最“高质量”的行动。Q学习可以被视为强化学习的一个重要扩展，因为它允许将这些模型应用于现实生活场景[[82](#505424_1_En_4_Chapter.xhtml#Par322)]。


    强化学习最著名的演示之一就是计算机程序“AlphaGo”。这个程序由后来被谷歌收购的DeepMind Technologies开发，旨在用于下围棋。围棋由神话中的中国皇帝尧在2500多年前发明，用于教导他的儿子纪律、专注和精神平衡，这是一种非常流行的两人中国策略棋盘游戏，如今全球玩家超过4600万。在每局游戏开始时，两名玩家会获得一套白色或黑色的棋子（称为“石子”）。执黑棋的玩家先手，两名玩家轮流将他们的棋子放置在网格线的交叉点上^([^(106)](#fn106))，目标是创建一个相连的棋子组，包围比对手更大的一片封闭领地。当一个玩家包围了一颗或多颗敌方棋子时，他们会吃掉这些棋子并将其永久移出棋盘。游戏继续进行，直到双方都不愿再走一步或无法再吃掉对手的棋子。由于玩家通过包围空领地来得分，因此最终拥有最大领地的玩家获胜。尽管规则相对简单，但围棋非常复杂，因为其棋盘更大，可能的下一步走法比国际象棋多得多。合法棋盘位置数量的下限估计为`2
    × 10^(170)`[[83](#505424_1_En_4_Chapter.xhtml#Par323)]，这远远超过了宇宙中基本粒子的数量。这就是为什么DeepMind不能使用*暴力破解*^([^(107)](#fn107))，而IBM在20年前曾用这种方法实现了他们的国际象棋计算机“深蓝”。相反，由英国计算机科学家、DeepMind创始人戴密斯·哈萨比斯（Demis
    Hassabis）领导的AlphaGo研究团队，使用了一种经过强化学习训练的复杂模式识别算法，因为可能的走法几乎是无穷无尽的，实际无法编程和预测。AlphaGo依赖于由不同深度神经网络构建的三个主要组件[[84](#505424_1_En_4_Chapter.xhtml#Par324)]：(1)
    用于选择走法的策略网络，(2) 用于搜索可能下一步走法的树搜索算法，以及 (3) 用于评估不同棋盘局面的价值网络。策略网络根据当前棋盘局面和获胜的最高概率，被训练来选择最佳的下一步走法。为此，它首先基于人类专家玩家的数据进行监督学习训练，然后在第二步中通过基于自我对弈强化学习的方式与自己博弈来进行提升。在扫描当前棋盘局面后，策略网络启动树搜索算法，该算法会查找游戏的不同变体，并试图预测几步之后可能发生的事情——为此，它通常会向前看大约50到100步。然后，价值网络会对这些不同的变体进行评估，计算每个变体的获胜概率，以便策略网络能够相应地选择获胜概率最高的走法。2016年，AlphaGo在五局比赛中以4:1击败韩国围棋大师李世石（Lee
    Se-dol）后，占据了各大报纸的头条[[85](#505424_1_En_4_Chapter.xhtml#Par325)]，这被认为是人工智能发展的一个关键里程碑。^([^(108)](#fn108))
    在那之前，围棋被认为过于复杂，任何智能程序都无法掌握。著名台湾计算机科学家、谷歌中国创始总裁兼技术投资人李开复（Kai-Fu Lee）在其最新著作《AI Superpowers》中指出，中国政府将谷歌AlphaGo计算机的惊人表现视为自己的“斯普特尼克时刻”，并随后决定将世界级的人工智能领导地位作为国家优先事项[[86](#505424_1_En_4_Chapter.xhtml#Par326)]。在此背景下，他进一步评论道：“美国和加拿大拥有世界上最优秀的人工智能研究人员，但中国拥有数百名优秀人才以及更多的数据……人工智能是一个需要算法和数据共同演进的领域；大量的数据会带来巨大的不同。”'
  raw: 'The mathematical concept of reinforcement learning goes back to the seminal
    work about *dynamic programming* by Richard Bellman in 1954 [[79](#505424_1_En_4_Chapter.xhtml#Par319)],
    in which he proposed the famous *principle of optimality* by demonstrating that
    every solution to a dynamic optimization problem is composed of simpler partial
    solutions. Richard Bellman described his principle with the words “an optimal
    policy has the property that whatever the initial state and initial decision are,
    the remaining decisions must constitute an optimal policy with regard to the state
    resulting from the first decision” [[79](#505424_1_En_4_Chapter.xhtml#Par319)].
    For a more quantitative mathematical description, he introduced a recursive mathematical
    function that relates the optimum action of an agent in an environment to the
    expected reward and resulting state. This equation is referred to as *Bellman
    equation* and forms the theoretical basis for reinforcement learning up to now.


    Reinforcement Learning


    Reinforcement learning is about an agent taking actions on an environment. The
    agent or “actor” will either receive a reward or penalty for its action depending
    on whether the action brings it closer to its ultimate goal to maximize the reward
    or not. This approach is suitable if you cannot define the ideal state of the
    agent in the environment and if the only way to learn about the environment is
    to interact with it.


    The Bellman equation has been advanced (or abstracted) later on by substituting
    the deterministic environment by a stochastically and timely changing environment
    that better describes reality. A more realistic environment may involve a second
    competing dog, for example, that also tries to catch the rewarded food. A stochastic
    environment influences the optimal action-selection policy of the agent and is
    mathematically called *finite Markov process* .^([^(105)](#fn105)) The abstraction
    of the Bellman equation by finite Markov processes has been described by the British
    computer scientist Christopher Watkins in 1989 for the first time [[80](#505424_1_En_4_Chapter.xhtml#Par320),
    [81](#505424_1_En_4_Chapter.xhtml#Par321)] and became known as *Q-learning*  –
    the “Q” stands for “quality” since the agent learns to perform the most “qualitative”
    action in each situation. Q-learning can be considered as a major extension of
    reinforcement learning as it allows for applying such models to real-life situations
    [[82](#505424_1_En_4_Chapter.xhtml#Par322)].


    One of the most popular demonstrations of reinforcement learning was the computer
    program “AlphaGo.” This program was developed by DeepMind Technologies, which
    was later acquired by Google, and created to play Go. Invented more than 2,500
    years ago by the mythical Chinese Emperor Yao to teach his son discipline, concentration,
    and mental balance, Go is a very popular Chinese strategy board game for two players
    with more than 46 million players worldwide today. At the beginning of each game,
    the two players are given a set of white or black playing pieces or “stones.”
    Starting with the black player, the two players begin to place their stones onto
    the intersections of lines in a grid alternately^([^(106)](#fn106)) and aim to
    create a linked group of stones that surrounds a larger closed territory than
    the opponent. When a player surrounds one or more enemy stones, they capture them
    and remove them from the board irreversibly. The game proceeds until neither player
    wishes to make another move or is able to capture one of the opponent’s stones.
    Since the players earn points by surrounding empty territory, the player with
    the largest territory ultimately wins the game. Despite its comparatively simple
    rules, Go is very complex since it has a larger board and much more possible next
    moves than chess. The lower bound for the number of legal board positions has
    been estimated to be 2 × 10^(170) [[83](#505424_1_En_4_Chapter.xhtml#Par323)],
    which is vastly greater than the number of elementary particles in the universe.
    This is why DeepMind could not employ *brute-forcing* ,^([^(107)](#fn107)) which
    IBM used 20 years before to implement their chess playing computer Deep Blue.
    Instead, the AlphaGo research team lead by the British computer scientist and
    founder of DeepMind Demis Hassabis used a sophisticated algorithm for pattern
    recognition trained by reinforcement learning since the number of possible moves
    is sheer endless and practically impossible to program and predict. AlphaGo relies
    on three main components built up of different deep neural networks [[84](#505424_1_En_4_Chapter.xhtml#Par324)]:
    a (1) policy network for selecting moves, a (2) tree search algorithm to look
    for possible next moves, and a (3) value network to evaluate different board positions.
    The policy network is trained to select the best next move based on current board
    positions and the highest probability for winning. For this purpose, it was trained
    by supervised learning based on human expert players data first and advanced in
    a second step by playing with itself based on self-play reinforcement learning.
    After scanning the current board position, the policy network initializes the
    tree search algorithm that looks for different variations of the game and tries
    to figure out what may happen a couple of moves later – for this purpose, it typically
    looks about 50 to 100 moves ahead. The different variations are then evaluated
    by the value network, which calculates the probabilities for winning of each variation
    so that the policy network can select the move with the highest probability for
    winning accordingly. In 2016, AlphaGo dominated the headlines of various newspapers
    after beating the Korean Go master Lee Se-dol in a five-game match by 4:1 [[85](#505424_1_En_4_Chapter.xhtml#Par325)],
    which is considered as a key milestone in the development of an artificial intelligence.^([^(108)](#fn108))
    Until then, Go was thought to be too complicated for any intelligent program to
    master it. In his latest book entitled *AI Superpowers*, Kai-Fu Lee, an eminent
    Taiwanese computer scientist, founding president of Google China, and technology
    investor, noted that the Chinese government declared the stunning performance
    of Google’s AlphaGo computer as their own Sputnik moment and thereafter decided
    to make the world-class leadership in artificial intelligence a national priority
    [[86](#505424_1_En_4_Chapter.xhtml#Par326)]. In this context, he further remarks
    that “The U.S. and Canada have the best AI researchers in the world, but China
    has hundreds of people who are good, and way more data... AI is an area where
    you need to evolve the algorithm and the data together; a large amount of data
    makes a large amount of difference.”'
