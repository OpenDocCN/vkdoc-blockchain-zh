    `NPU`的计算性能很难直接比较，因为这关键取决于用来比较性能的人工神经网络的具体架构。为此，由百度、谷歌、哈佛大学、斯坦福大学和加州大学伯克利分校联合创立的在线平台`MLPerf`^(¹¹²)开发了一套标准化的基准测试。该测试被称为“`ResNet-50`”分类基准，涉及对来自`ImageNet`数据库^(¹¹³)的一百万张图像（分为
    1000 个物体类别）使用一个标准化的、预训练的 50 层卷积神经网络进行分类——其记录的性能指标是每秒分类的图像数量，即`IPS`。根据微芯片设计分类的最流行的
    AI 芯片制造商汇总在表 4-1 中，下文将举例说明。


    *   *阿里巴巴*于 2019 年推出了其首款 AI 芯片“`含光 800`”。该芯片专为云计算应用设计，在`ResNet-50`上每秒可分类多达 69,306
    张图像（`IPS`）。它包含 170 亿个晶体管，尺寸仅为 12 纳米，因此这项技术也被称为 12 纳米制程工艺。在这种情况下，晶体管的大小约为人头发横截面的万分之一。


    *   *亚马逊*于 2018 年通过亚马逊云服务（AWS）发布了其“`Inferentia`”AI 芯片。该芯片是亚马逊于 2015 年收购美国半导体公司
    Annapurna Labs 的成果，同样专为云计算应用而设计。它在`ResNet-50`性能基准测试中每秒能够处理约 15,000 张图像（`IPS`）。


    *   *Facebook*和*英特尔*正在联合开发一款 AI 芯片，计划很快发布。英特尔之前一直在研究神经网络加速器，但在 2020 年初以 20 亿美元收购以色列芯片制造商
    Habana Labs 后不久，便停止了其代号为“`NNP-T1000`”的“`Nervana Spring Crest`”处理器的开发。Habana Labs
    最近推出了其“`Gaudi HL-2000`”芯片，该芯片在`ResNet-50`上每秒可分类多达 1,650 张图像（`IPS`）。该微芯片基于 16 纳米制程工艺。


    *   *谷歌*：其最新版本的“`TPU v3`”芯片（*张量处理单元*的缩写）专为谷歌的云计算服务设计，据报道在`ResNet-50`上每秒可分类多达 32,716
    张图像（`IPS`）。该特定技术迄今尚未公开，这足以让你感受到这个高度动态市场中激烈的竞争态势。


    *   *Nvidia*目前是`GPU`芯片的市场领导者。其性能最强的特斯拉系列最新版本是“`Nvidia Tesla V100 GPU`”，旨在加速不同的深度学习算法，据报道在`ResNet-50`上每秒可分类
    55,597 张图像（`IPS`）。它总共包含 211 亿个晶体管，基于 12 纳米制程工艺。Nvidia 还提供一系列用于自动驾驶的片上系统或`SoC`系统，这将在第
    4.4.2 节中介绍。


    *   *Cerebras Systems*是一家美国初创公司，其方法大胆：他们打算制造有史以来最大的 AI 芯片。他们的“`晶圆级引擎`”（`WSE Gen2`）`NPU`大约是有史以来最大的`GPU`“`Nvidia
    A100`”芯片的 56 倍大，据称容纳了基于 7 纳米制程工艺的 2.6 万亿个晶体管。^(¹¹⁴)其`ResNet-50`性能尚未公布，但据推测将在训练神经网络时提供巨大的速度提升。


    *   *索尼*于 2020 年发布了其首款用于智能视觉的 AI 芯片[106]。“`IMX500/501`”智能视觉传感器能够在单芯片上捕获和分析 1230
    万像素的图像以及 4K 视频^(¹¹⁵)。该微芯片可以嵌入数码相机中，用于捕获图像、分析图像，并输出其含义而非原始数据，从而显著减少输出数据量。这种方法不需要任何集中式的、可能基于云的图像分析。这类设备对*边缘计算*尤其有吸引力，在边缘计算中，数据处理由位于网络“边缘”的、生成数据的设备完成。边缘计算有助于减少网络流量、隐私泄露风险、电力消耗以及将原始数据从一个设备传输到另一个设备的相关成本。


    *   *特斯拉*：2019 年推出的“`FSD 计算机`”（“全自动驾驶”的缩写）是特斯拉自动驾驶系统的核心。它每秒可处理多达 1200 张全高清图像，包含基于
    14 纳米制程工艺的 9216 个`MAC`单元和 60 亿个晶体管。


    除了前述精选的科技公司之外，最近各种小型初创公司在创新且强大的 AI 芯片开发方面也加快了步伐，例如两家中国公司寒武纪和地平线机器人，以及美国初创公司 SambaNova
    Systems。其他值得注意的初创公司包括 Blaize、Graphcore、Groq、Kneron、Lightmatter、Mythic、Untether
    AI 和 Wave Computing。我们在讨论人工神经网络时认识的 Yann LeCun 曾指出：“硬件能力……激励并限制了 AI 研究人员所能想象并愿意去追求的想法类型。我们可用的工具塑造我们思想的程度，远超我们所愿意承认的。”[107]


    由于有如此多的资金和资源投入到人工智能领域，过去几年间涌现了大量创新和应用。人工智能已经能很好地胜任许多“人类”的工作，因此两位商业顾问 James Wilson
    和 Paul Daugherty 中肯地指出：通过这种*协作智能*，人类和人工智能能够积极地增强彼此互补的优势——前者（人类）的领导力、团队合作、创造力和社会技能，与后者（AI）的速度、可扩展性和定量分析能力。对人来说自然而然的事情（例如讲个笑话），对机器来说可能很棘手；而对机器来说轻而易举的事情（例如分析千兆字节的数据），对人类来说几乎是不可能的[108]。


    在接下来的章节中，我们将看到人工智能已被应用于涵盖汽车、医疗、能源和金融等所有行业的广泛业务应用中。为了内容的完整性，表 4-2 整理了一个更全面的精选业务应用概览。我们将在下文详细探讨其中最流行的一些应用。

    '
- fmt: '### 4.4.2 Computer Vision


    Computer vision has been attracting great attention in industry and media lately
    as it offers a wide range of applications, such as the "Just Walk Out" shopping
    technology of Amazon Go, vision-guided robotics, and Tesla''s "full self-driving
    computer" for autonomous driving, which we will study in more detail in this section.


    **Table 4-2** Most widely used machine learning algorithms and their applications


    | Learning Category | Algorithm | Exemplary Applications |

    | --- | --- | --- |

    | Supervised learning | Regression | Price point optimization, cycle time analysis,
    quality insurance |

    | | Classification | Predictive maintenance, customer segmentation, spam filtering,
    fraud detection |

    | Unsupervised learning | Association | Shopping card analysis and recommendation
    of further products (e.g., articles, books, videos) a costumer should buy next
    based on the preferences of similar consumers |

    | | Clustering | Smart manufacturing, in-line quality control and assurance, customer
    segmentation, sentiment analysis, fraud detection |

    | | Dimensionality reduction | Data compression, image, voice and audio processing,
    topic modeling |

    | Deep learning | Artificial NNs | Shop floor management, computer vision, object
    detection, face and voice recognition |

    | | Convolutional NNs | Object detection for autonomous driving, diagnose health
    diseases from medical scans, computer vision, quality control by detecting defective
    products with in-line cameras |

    | | Recurrent NNs | Natural language processing and translation for virtual assistants
    and chatbots, tracking visual changes of images over time, label images by creating
    captions and keywords, fraud detection based on credit-card usage |

    | | Generative NNs | Photograph editing, photo-realistic image creation, face
    frontal view generation, and pose invariant face recognition |

    | | Recommender systems | Recommend similar items (articles, books, videos, and
    other products) to customers based on user profiles, the item''s attributes, or
    previous sales |

    | | Auto encoders | Efficient file and data compression by removing irrelevant
    data |

    | | Ensemble methods | | Rank results of search engines by relevancy, face recognition,
    language translation |

    | | Reinforcement learning | | Autonomous driving, optimization of trading strategy,
    balancing electricity grids with varying demand, robotics programming, real-time
    auction price optimization |


    #### Computer Vision: Shopping Technology


    Launched in 2018, Amazon Go is a chain of convenience stores in the United States
    with 26 open and announced stores in Seattle, Chicago, San Francisco, and New
    York City. The stores are partially automated and customers can purchase their
    products without being checked out by a cashier or using a self-checkout station.
    The customers are rather required to log in on a smartphone app that grants customers
    access to the stores and provides a mobile payment system for the automatic checkout.
    This Just Walk Out technology – as Amazon calls it – is based on computer vision
    powered by deep learning and `sensor fusion`^([^(116)](#fn116)) that automatically
    tracks the items you pick up and adds them to your virtual shopping cart. The
    system comprises numerous video cameras, sensory fixtures in shelfs, and automatic
    exit gates as shown in Figure [4-15](#505424_1_En_4_Chapter.xhtml#Fig15) schematically.
    The signals of those components are aggregated by a streaming service first, a
    cloud platform that makes all data available for further processing. The Just
    Walk Out technology unit analyzes this data, identifies customers, analyzes their
    activities, and recognizes products in order to link a certain customer ID to
    a set of selected items. For this purpose, deep learning is used for customer
    association, item identification, pose estimation, and action determination to
    precisely answer the seminal question about "who took and is going to purchase
    what." This information is continuously added to a virtual shopping cart and retrieved
    upon the checkout to bill the respective customer. According to Gerard Medioni,
    Amazon''s chief scientist for this technology, the major challenge was indeed
    the person identification step as customers can either be very close to each other
    or blocked from view by something in the store, which they call "tangled state"
    and "occlusion," respectively. Amazon also started to license this technology
    to other retailers in 2020 [[87](#505424_1_En_4_Chapter.xhtml#Par327)]. A very
    detailed introduction of this very elaborate digital technology based on artificial
    intelligence is available on [[88](#505424_1_En_4_Chapter.xhtml#Par328)], for
    example.


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig15_HTML.jpg](images/505424_1_En_4_Chapter/505424_1_En_4_Fig15_HTML.jpg)


    **Figure 4-15** High-level architecture of Amazon''s "Just Walk Out" technology
    used in Amazon Go Grocery stores and other retail stores increasingly


    #### Computer Vision: Vision-Guided Robotics


    Combined with physical robots, computer vision can also be used to automate and
    speed up industrial manufacturing processes and warehouse logistics. The American
    startup company Vicarious, for instance, whose investors include Jeffrey Bezos,
    Elon Musk, and Mark Zuckerberg, is working to develop programming-free and vision-guided
    robotics for kitting, palletizing, machine tending, packaging, bin picking, and
    sorting based on artificial intelligence and real-time data analytics.^([^(117)](#fn117))
    Another example is the San Francisco–based startup company Kindred AI, which recently
    introduced its robotics intelligence platform named "AutoGrasp." It combines computer
    vision with advanced grasping and manipulation technology to control piece-picking
    robots employed in, for example, online retail distribution and fulfillment centers.^([^(118)](#fn118))
    Their product has been demonstrated to be particularly useful during the disastrous
    COVID-19 pandemic in 2020 to process the increasing amount of online orders during
    this time while having fewer staff to fulfill them due to social distancing rules
    [[89](#505424_1_En_4_Chapter.xhtml#Par329)].'
