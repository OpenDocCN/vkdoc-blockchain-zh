- fmt: '## 4.4 Top Use Cases and Business Applications


    The previous introduction to artificial intelligence has shown that most deep
    learning algorithms require large datasets for an efficient training. Furthermore,
    their training requires access to (high-performance) computer systems that can
    emulate neural networks on a reasonable timescale digitally. This is why the adoption
    of artificial intelligence is historically inseparably linked to the arrival of
    big data, efficient training algorithms, and the development of powerful computers
    that allow for the parallelization of different calculations. The term `big data`
    in its modern meaning was first coined by Roger Magoulas, the director of market
    research at O’Reilly Media, in 2005. With this term, he described very large datasets
    that were almost impossible to manage, manipulate, and process using the business
    intelligence tools that were available at the time.^([^(109)](#fn109)) As big
    data became available after the launch of the Internet and the arrival of smartphones
    and other digital devices, research and development in artificial intelligence
    flourished. The number and complexity of proposed use cases increased steadily,
    and its range of applications has been broadening ever since. But before we examine
    the most important and equally exciting use cases of artificial intelligence in
    more detail, it is instructive to have a brief look on state-of-the-art computing
    hardware that enables the wide range of applications and allows for training highly
    complex machine learning models.


    ### 4.4.1 AI Chips


    The training of the vast majority of deep learning algorithms mathematically involves
    the repeated calculation of activation functions and weights. Without going into
    details, those calculations involve the multiplication and addition of thousands
    of numbers that characterize the different neurons and connections between them.
    Those numbers are usually arranged in special arrays, which are called `matrices`
    mathematically. Early on, such matrix calculations were usually conducted on CPUs
    that have been around for many years – the world’s first CPU was the Intel 4004
    released in 1971 [[104](#505424_1_En_4_Chapter.xhtml#Par344)] – and designed to
    carry out single operations very quickly but not necessarily simultaneously. Built
    into state-of-the-art personal computers, CPUs are still the hardware of choice
    for many applications of artificial intelligence that are not time sensitive and
    do not rely on highly complex and computationally intense algorithms.


    The basic architecture of CPUs was conceived by the legendary German computer
    pioneer John von Neumann in 1945 and involves a computational core and memory
    among other physical subcomponents. Both components are typically located close
    but spatially separated from each other on the CPU microchip and connected via
    a communication system or `bus` with a limited bandwidth. This limitation only
    allows for a certain amount of data to flow between the computational core and
    memory in a certain amount of time. The limited bandwidth creates a choke point
    in data transfer speed known as the `von Neumann bottleneck`, which makes it prohibitively
    inefficient to train neural networks with big data on conventional CPUs.^([^(110)](#fn110))
    In order to speed up their calculations for training deep learning algorithms,
    various companies started to parallelize different calculations by using `graphical
    processing units` or GPUs instead. In contrast to CPUs, GPUs were originally designed
    for the computer gaming industry to process fast-changing and high-resolution
    images very efficiently.^([^(111)](#fn111)) The American computer scientist Andrew
    Ng and his colleagues at Stanford University, for example, impressively demonstrated
    the advantages of this approach by training a multilayered neural network with
    more than 100 million parameters (weights and activation functions) on GPUs in
    2009. Their experiment revealed that the training on GPUs was more than 70 times
    faster than on state-of-the-art CPUs in their particular case [[105](#505424_1_En_4_Chapter.xhtml#Par345)].
    From then on, GPUs became the method of choice for training complex artificial
    neural networks.


    However, neither CPUs nor GPUs have been designed and optimized for machine learning.
    This is why various tech companies recently started to develop specialized chipsets
    designed for highly parallel computing and optimized for training artificial neural
    networks on very large datasets. Those microchips typically comprise thousands
    of so-called `multiply-accumulate cores` or MAC units built up of interconnected
    transistor circuits that repeatedly carry out matrix calculations of the type
    `A + (B · C)`. Here, `A`, `B`, and `C` denote three matrices that represent the
    different parameters of an artificial neural network and typically comprise up
    to 8,500 decimal numbers each. Microchips that incorporate such MAC units became
    known as `neural processing units` or NPUs, neural network accelerators, or AI
    chips in literature.


    Table 4-1


    Architectural microchip designs of AI-chip suppliers in alphabetical order'
