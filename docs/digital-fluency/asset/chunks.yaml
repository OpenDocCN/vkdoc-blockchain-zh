  raw: '#### Current Business Applications: Governmental Services


    During my research for this book, I also came across another very interesting
    collaboration between the Chinese conglomerate Tencent, the China Academy of Information
    and Communications Technology, and the Shenzhen State Taxation Bureau that jointly
    explore applications of blockchain technology for taxation [[44](#505424_1_En_3_Chapter.xhtml#Par245)].
    This collaboration seeks to create and establish a blockchain-based invoice standard
    that allows for the implementation of automated taxation or *e-taxation* systems
    that simplify auditing activities, reduce tax avoidance, and avoid double taxation.^([^(80)](#fn80))
    The underlying standard is created as part of an umbrella project named “General
    Framework of DLT-Based Invoices,” which is being supported by various other countries
    including the United Kingdom, Switzerland, and Sweden. This is just one very interesting
    example that illustrates how blockchain technology can be used to automate traditional
    and formerly paper-based governmental processes and services.


