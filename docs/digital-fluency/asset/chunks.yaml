  trans: '

    这就是为什么众多制药公司一直在建立庞大的化合物数据库，这些数据库会根据全球专业期刊发表的研究发现和成果频繁更新。为了使用最先进的机器学习算法处理化合物，它们通常基于一种名为`SMILES`（简化分子线性输入规范）的编码方案被特征化或转换为文本。一个化合物的`SMILES`字符串由代表化学元素的字母和编码不同元素之间化学性质及键合（“连接”）的符号组成。例如，水的`SMILES`表示（化学符号为`H[2]O`）可以写作`[H]O[H]`，因为水由一个氧原子和两个氢原子构成，分别用`O`和`H`表示。随后，这些字符串被用于训练人工神经网络，以便学习最成功的药物，并根据化学规则和识别出的关于哪些元素（符号）可能相互跟随的模式来预测新药设计——如果你愿意，这可以说是“医学语言处理”的一种创新方法。早在
    1986 年，人工神经网络就已经被应用于药物发现[120]，以响应著名的反向传播算法的发展，正如我们在前几节中学到的，该算法使得有效训练此类网络成为可能。自那以后，众多研究人员通过使用更大的化合物数据库和深度学习模型，更高效地在更大数据库上训练人工神经网络，从而改进了这一方法[121–124]。


    成功将这种创新方法应用于药物发现的一家公司是英国初创公司 Benevolent AI。这家成立于 2013 年的公司，采用不同的机器学习算法来构建数据库、在知识图谱中可视化相关出版物，并预测新化合物。其中一些算法用于自动挖掘当前的科学文献，并将最相关的文献保存到化合物数据库中；另一些则用于根据从这些数据中得出的模式来设计新化合物。为此，Benevolent
    AI 的研究人员构建了一个循环神经网络，例如，该网络基于科学文献中报告的数百万现有化合物的`SMILES`数据进行了训练，这些化合物随后被列在其数据库中。这个预训练网络被用来根据从训练数据中得出的统计上最相关的模式，逐字符地迭代预测新的`SMILES`字符串。生成的字符串对应真实空间中的某种化合物，而该化合物可能通过其他方式无法被发现。它可以被化学合成，随后在实验室中针对不同的医学特性进行评估，例如其在人体内的有效性、选择性、毒性以及潜在的副作用。这种表征结果通过采用强化学习技术作为微调人工神经网络的输入，这一反馈过程有时被称为`多参数优化评分`。通过这种方式，人工智能为
    Benevolent AI 的研究人员提供了补充，使他们能够在药物开发过程的早期就专注于最佳化合物，从而大幅缩短开发时间并显著削减相关成本。Benevolent
    AI 还采用这种方法设计了一种针对 COVID-19[125]引起的急性肺部疾病的潜在疗法。据报道，COVID-19 这种致命的冠状病毒首先出现在中国湖北省，并在
    2020 年导致全球超过 4300 万人感染和超过 116 万人死亡。^(¹²⁸) 这个例子和其他例子凸显了人工智能在药物发现方面的巨大潜力，并证明深度学习可以显著加快医疗行业的开发、优化及其他业务流程。


    ### 4.4.7 金融服务与保险


    金融服务与保险行业实际上是人工智能最早的应用领域之一，部分原因是 Klarna、Revolut、N26 等不同金融科技公司以及其他旨在颠覆传统银行机构的在线银行和支付服务提供商的兴起。例如，美国最大的投资银行、总资产超过两万亿美元的摩根大通，正在将其人工智能应用推至投资银行业务之外，并最近在其资产管理业务部门内设立了一个专门的股权数据科学部门。


    #### 金融服务与保险：网络安全


    他们的一项项目涉及网络安全，因为摩根大通在 2014 年遭遇了一次重大数据泄露事件。在那次网络攻击中，据报道黑客入侵了与超过 8300 万个银行账户相关的客户数据，这被认为是历史上针对组织
    IT 系统最严重、规模最大的入侵之一[126]。幸运的是，尽管与这些账户相关的登录信息并未泄露，但黑客获取了客户的姓名、电话号码以及电子邮件和邮政地址，这随后引发了公众对潜在钓鱼攻击的严重担忧。自那以后，摩根大通投入巨资升级其
    IT 系统，同时正在探索人工智能在网络安全方面的一系列应用。其中一项项目是关于实施一个早期预警安全系统，以便在恶意行为者开始使用钓鱼邮件针对特定员工之前，检测恶意软件、特洛伊木马和其他高级持续性威胁[127]。为此，他们实施了一个大型在线存储库，用于收集和存储与摩根大通在线流量相关的所有原始数据。这些数据首先存储在一个数据湖中，作为循环神经网络架构的输入，该网络学习在线流量的平均数据大小、主机名、请求频率和其他关键特征。随着越来越多的数据通过该网络，它能够了解欺诈性和非欺诈性（“正常”）流量的样貌。每当恶意行为者准备发起网络攻击时，在线流量就会发生变化，循环神经网络会偶尔检测到异常活动，并立即通知银行的安全人员启动相应的反制措施。据报道，该早期预警系统还采用了自然语言处理算法，用于寻找模式，例如不匹配的互联网地址、拼写和语法错误，以检测来自恶意行为者的电子邮件。这是循环神经网络日益流行的一种应用，属于`异常检测`范畴，用于识别欺诈性银行活动并降低相关风险——这种方法对于所有在网络空间面临风险的行业也高度相关。

    '
- fmt: "#### Financial Services and Insurance: News Analytics and Intelligent Pricing\n\
    \n`News analytics` and `intelligent pricing` are two further examples. `JPMorgan\
    \ Chase` and other financial institutions are tackling with artificial intelligence.\
    \ `News analytics` is typically based on natural language processing algorithms\
    \ that scan online media for news being relevant for a particular client, industry,\
    \ or investment decision. These scans are categorized to create information transparency\
    \ as a prerequisite for data-driven decision making. The American global investment\
    \ management corporation `BlackRock`, the world’s largest asset manager with more\
    \ than `USD 6.8 trillion` under its control, is also reported to employ `news\
    \ analytics` for their `Aladdin`^([^(129)](#fn129)) called risk management system\
    \ that is operated by `BlackRock Solutions` [[128](#505424_1_En_4_Chapter.xhtml#Par368)].\
    \ `Intelligent pricing` of financial products and services is about calculating\
    \ the best price in real time depending on multiple customer and market variables,\
    \ such as time of day, location, real-time demand, and the customer’s purchasing\
    \ history. Such algorithms pave the way from rules-driven to data-driven pricing\
    \ models and allow institutions to increase their profitability and competitiveness\
    \ by personalizing and contextualizing prizes. Such algorithms typically employ\
    \ polynomial regression models, ensemble methods, and artificial neural networks\
    \ to identify certain patterns of behavioral customer data. Data-driven `intelligent\
    \ pricing` and personalization of offers are, of course, relevant for a whole\
    \ range of other businesses, too, including supermarkets and online warehouses.\n\
    \nI hope you did enjoy our journey through the exciting world of artificial intelligence\
    \ and its multifaceted applications. As a general-purpose technology, artificial\
    \ intelligence is used to drive revenue and margin growth or establish entirely\
    \ new business models – it is the third and probably most versatile digital technology\
    \ that enables the digital transformation of organizations in the private and\
    \ public sector.\n\n## 4.5 Key Points\n\n*   Artificial intelligence refers to\
    \ pieces of software that can be executed by computers and has the ability to\
    \ learn and reason like humans. This software translates real-life (business)\
    \ problems into mathematical models that are technically called algorithms.\n\n\
    *   Artificial intelligence falls into two major subcategories: (1) Machine learning\
    \ refers to a group of algorithms with the ability to learn without being explicitly\
    \ programmed. (2) Deep learning employs artificial neural networks to process\
    \ digital information. In order to work properly, artificial neural networks have\
    \ to be trained by large training datasets (big data).\n\n*   Machine learning\
    \ builds on two key concepts: a (1) cost function or optimization objective that\
    \ describes the real-life problem mathematically and an (2) optimization algorithm,\
    \ like gradient descent, that allows for the minimization of the cost function\
    \ and solves the respective problem at hand. The most popular algorithms are regression,\
    \ classification, clustering, and association.\n\n*   Deep learning employs artificial\
    \ neural networks, that is, layered structures of interconnected neurons that\
    \ are emulated by software and arranged in an input and output layer as well as\
    \ one or multiple deep layers for feature detection. Depending on the particular\
    \ topology of the neural network, one differentiates (1) convolutional, (2) recurrent,\
    \ and (3) generative adversarial neural networks, (4) recommender systems, and\
    \ (5) auto encoders.\n\n*   Artificial intelligence employs different learning\
    \ strategies for training algorithms, namely, (1) supervised learning with labeled\
    \ data, (2) unsupervised learning with non-labeled data, (3) deep learning, (4)\
    \ ensemble methods, and (5) reinforcement learning.\n\n*   The most popular applications\
    \ of artificial intelligence are big data analysis, optimization and prediction,\
    \ personalization by sentiment analysis and recommendation, feature detection\
    \ and pattern recognition, natural language processing, computer vision including\
    \ image recognition and object detection, as well as anomaly and fraud detection.\n\
    \n## 4.6 Artificial Intelligence Framework\n\nAre you thinking about using artificial\
    \ intelligence in your organization or applying it to your own use case? If the\
    \ answer to most of the key questions in the following implementation checklist\
    \ is “Yes,” artificial intelligence may well assist you in implementing your own\
    \ business idea or use case.\n\n1.  What is your use case about? Does it fit into\
    \ one of the following generic categories? Yes □ No □\n    *   Big data analysis\n\
    \    *   Modeling and simulation\n    *   Data and file compression\n    *   Optimization\
    \ and prediction\n    *   Personalization of products and services\n    *   Feature\
    \ detection and pattern recognition\n    *   Sentiment analysis and recommender\
    \ systems\n    *   Natural language processing and voice recognition\n    *  \
    \ Computer vision incl. image recognition and object detection\n    *   Clustering\
    \ and classification incl. anomaly and fraud detection\n\n2.  Has a similar use\
    \ case been solved by employing artificial intelligence before – is it mentioned\
    \ in Table [4-2](#505424_1_En_4_Chapter.xhtml#Tab2)? Yes □ No □\n\n3.  Does (big)\
    \ data analytics play a crucial role in your daily decision-making process already?\
    \ Yes □ No □\n\n4.  Is the big data required for your application in terms of\
    \ the three Vs (i.e., volume, velocity, and variety) already available from internal\
    \ or external databases? Yes □ No □\n\n5.  Is the amount of available data to\
    \ train your model exponentially larger than the search space, that is, the number\
    \ of possible solutions to your problem? Yes □ No □\n\n6.  What kind of patterns,\
    \ structures, or features are you expecting to see when analyzing your big data?\
    \ Do you have the expertise to judge whether the result obtained from the algorithm\
    \ is reasonable or just a statistical side effect? Yes □ No □\n\n7.  Is there\
