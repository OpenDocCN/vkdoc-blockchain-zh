- fmt: '## 2. *Disruptive technologies*


    *Disruptive technologies* have entirely different or new attributes that deviate
    from what customers have valued before and are sometimes called the "children"
    of general-purpose technologies in literature. They themselves fall into two subcategories,
    namely, low-end and new-market disruptions:


    1. *Low-end* disruptions typically target overserved customers with affordable
    and accessible products that are just "good enough" but do not reveal superior
    performance beyond the market average.^([⁷](#fn7)) Just think about discount department
    stores that figured out a cheaper way of doing the same thing like traditional
    department stores.


    2. *New-market* disruptions compete against nonconsumption and target customers,
    who did not have access to a product or service before. Compared to personal computers,
    smartphones can be understood in terms of new-market disruptions since they offer
    similar features than personal computers, such as Internet and email, while being
    affordable for (mass-market) customers who did not have access to personal computers
    due to the much higher costs of ownership. Steve Jobs, the legendary founder of
    Apple, described the first iPhone on its product release in 2007 with the famous
    words "Today, Apple is going to reinvent the phone [...]. It’s the internet in
    your pocket for the first time ever." An important key characteristic of new-market
    disruptions is that they are widely adopted first before society adapts to them.


    Later on, Clayton Christensen replaced the terms sustaining and disruptive technologies
    by sustaining and disruptive innovations when he realized that the disruption
    did not originate from the technology itself but rather from its impact on business
    strategies and models. In this context, it is important to note that almost never
    is an innovation intrinsically sustaining or disruptive. This attribute is rather
    given to it when deployed to a market and comparing it to other technologies that
    have been adopted by the market already. Flash drives, for instance – the technology
    behind USB-sticks – are disruptive for hard-disk drives but sustaining for DRAM
    technology^([⁸](#fn8)) that has been used for building the working memory of personal
    computers.


    Disruption is a force that has shaped markets and their competitive landscape
    ever since. As low-end and new-market disruptive innovations become mature and
    robust, they pose an immediate risk to incumbent organizations, who do not leverage
    emerging technologies to make their products and services better. The important
    point to note in this context is that disruption usually is an opportunity long
    before it is a threat for incumbent players in a market. One of the most famous
    examples highlighting this aspect is the legendary Eastman Kodak Company founded
    by the American businessman George Eastman in 1880. George Eastman formerly invented
    and patented a dry-plate formula for developing photographic film rolls, an industrial
    process that suited well for mass production. He then introduced an inexpensive
    (handheld) film camera in 1888 that was designed to use this technology. With
    the slogan "you press the button, we do the rest," he developed a very successful
    business model in the following years by focusing on cheap cameras and an efficient
    photographic film-developing process. Kodak soon became the market leader in this
    industry and commanded about 90% of film and 85% of camera sales in the United
    States [[16](#505424_1_En_1_Chapter.xhtml#Par218)]. But – as you might have guessed
    already – this photo empire fell with the disruption of digital cameras that entered
    the low-end market in the 1990s. Quite ironically, it was Steven Sasson, a Kodak
    engineer, who invented digital photography and built the worldwide first digital
    camera in 1975. But Kodak''s management was very skeptic about this early prototype
    due to its low performance and did not see that its disruptive potential might
    redefine their business and eliminate competitive advantages that were accumulated
    over decades – disruptive technology is an opportunity long before it is a threat.
    Instead, Kodak''s management opined that consumers will focus on printing again
    once the temporary trend of digital photography is phased out. This is why they
    started to protect their business by employing their huge marketing machine. In
    contrast to its major Japanese competitor Fujifilm, who integrated digital technology
    very well into its business, the disrupting force of digital photography contributed
    to Kodak''s (architectural) inertia and did not catalyze any change or digital
    transformation. By the time they realized their thorough misjudgment and launched
    their first own digital camera, it was too late, and Kodak''s downturn was inevitable.
    The 120-year-old company had to file for bankruptcy protection in 2012, sold off
    their patents, and reemerged as a much smaller company in 2013. In 2018, it reported
    around USD 1.33 billion of sales, one-tenth of the legendary value it reached
    37 years before. This and numerous other examples prove that business disruption
    is a matter of when rather than if it will happen. This is why thought leaders
    should anticipate change by proactively looking and striving for self-disruption
    rather than coping with disruption when it happens.


    The Kodak Eastman Company is just one example for what Clayton Christensen termed
    *innovator''s dilemma* [[17](#505424_1_En_1_Chapter.xhtml#Par219)]. This term
    refers to the challenge of market-leading organizations to exploit existing core
    businesses while exploring new disruptive innovations that secure market leadership
    in future and avoid economic failure due to new disruptive players in the market.
    In case of Kodak, this dilemma manifested itself in deciding whether to invest
    in digital photography or not. Guided by marginal thinking, Kodak''s management
    compared the marginal cost of their existing photographic film business with the
    marginal cost associated with digital photography and came to the misleading conclusion
    that it is much more profitable of pursuing their established film business. In
    other words, *marginal thinking* biased them to focus on what has been successful
    in the past, instead of guiding them to create the digital capabilities they will
    need in the future. Kodak ultimately failed to identify digital photography as
    a disruptive technology or the "next big thing" in this market and ended up paying
    the total cost^([⁹](#fn9)) for not investing rather than the much lower marginal
    cost^([^(10)](#fn10)) for investing in digital photography. Economic failure is
    often the consequence of this marginal thinking. Compared to a mature core business,
    investments in future innovations including the three digital technologies introduced
    in this book almost always come with low marginal profits and high marginal cost.
    But since they often turn out to be crucial for an organization''s success in
    future, it is important to evaluate investments in future innovations in terms
    of the total costs and strategic consequences associated with not investing in
    them – the marginal side of things is secondary. The American automobile pioneer
    and businessman Henry Ford described this insight nicely with the famous words
    "If you need a machine and don''t buy it, you will ultimately find that you have
    paid for it and don''t have it." With these insights, examples, and terminology
    at hand, we are now ready to discuss the three digital technologies introduced
    in this book in terms of general-purpose technologies that unfold a disruptive
    force and drive digital transformation.'
