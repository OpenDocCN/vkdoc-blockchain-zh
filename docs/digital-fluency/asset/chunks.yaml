    pioneer John von Neumann in 1945 and involves a computational core and memory
    among other physical subcomponents. Both components are typically located close
    but spatially separated from each other on the CPU microchip and connected via
    a communication system or *bus* with a limited bandwidth. This limitation only
    allows for a certain amount of data to flow between the computational core and
    memory in a certain amount of time. The limited bandwidth creates a choke point
    in data transfer speed known as the *von Neumann bottleneck* , which makes it
    prohibitively inefficient to train neural networks with big data on conventional
    CPUs.^([^(110)](#fn110)) In order to speed up their calculations for training
    deep learning algorithms, various companies started to parallelize different calculations
    by using *graphical processing units* or GPUs instead. In contrast to CPUs, GPUs
    were originally designed for the computer gaming industry to process fast-changing
    and high-resolution images very efficiently.^([^(111)](#fn111)) The American computer
    scientist Andrew Ng and his colleagues at Stanford University, for example, impressively
    demonstrated the advantages of this approach by training a multilayered neural
    network with more than 100 million parameters (weights and activation functions)
    on GPUs in 2009\. Their experiment revealed that the training on GPUs was more
    than 70 times faster than on state-of-the-art CPUs in their particular case [[105](#505424_1_En_4_Chapter.xhtml#Par345)].
    From then on, GPUs became the method of choice for training complex artificial
    neural networks.


    However, neither CPUs nor GPUs have been designed and optimized for machine learning.
    This is why various tech companies recently started to develop specialized chipsets
    designed for highly parallel computing and optimized for training artificial neural
    networks on very large datasets. Those microchips typically comprise thousands
    of so-called *multiply-accumulate cores* or MAC units built up of interconnected
    transistor circuits that repeatedly carry out matrix calculations of the type
    *A* + (*B* · *C*). Here, *A*, *B*, and *C* denote three matrices that represent
    the different parameters of an artificial neural network and typically comprise
    up to 8,500 decimal numbers each. Microchips that incorporate such MAC units became
    known as *neural processing units* or NPUs , neural network accelerators, or AI
    chips in literature.


