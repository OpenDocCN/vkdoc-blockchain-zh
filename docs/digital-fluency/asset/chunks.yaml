- fmt: 'The quantum mechanical superposition principle has also been validated and
    observed in various real-life experiments since its discovery. In order to better
    understand this very important physical principle, it is worth having a look on
    one of the most famous experiments that has been explained in terms of the superposition
    of quantum mechanical probability waves. This experiment became known as *double-slit
    experiment* and has been conducted by the British medic and physicist Thomas Young
    in 1802 for the first time [[7](#505424_1_En_2_Chapter.xhtml#Par203)]. His experimental
    setup directed a source of photons (emitted by the sun) onto a card paper with
    two very small slits. The photons entered the slits and fell on a detector screen
    with its brightness measuring the number of photons at each position. If photons
    would be macroscopic objects described by classical mechanics, such as mumbles
    – the small glass balls you may have played with as a child – they would either
    go through the first or the second slit in the card paper. The detector would
    therefore detect mumbles in either of two registers as indicated by the two peaks
    in Figure [2-2](#505424_1_En_2_Chapter.xhtml#Fig2) (a).


    But since photons are quantum mechanical objects, Thomas Young observed something
    entirely different. Instead of being detected in either of two registers only,
    he detected photons in all possible registers with the maximum count being observed
    for the register that remains exactly in between the two slits. Hence, the brightness
    equals a complicated curvy pattern, a so-called *interference pattern*, which
    is indicated by the solid black line in Figure [2-2](#505424_1_En_2_Chapter.xhtml#Fig2)
    (b). Thomas Young could not believe in this observation and initially thought
    that something is wrong with his experimental setup. But since this pattern did
    not change and turned out to be dependent on the distance between the two slits
    in the card paper, he finally believed in his observation and interpreted the
    result in terms of light waves that alternately extinguish and amplify one another
    depending on the particular position on the card paper. Physicists refer to this
    crucial property of waves by the two terms *constructive* and *destructive interference*,
    respectively. In quantum mechanics, this interference pattern corresponds to the
    superposition of two wave functions going through the first and the second slit,
    respectively. Later on, double-slit experiments with electrons [[8](#505424_1_En_2_Chapter.xhtml#Par204)]
    – the particles that carry electrical currents – and other even larger quantum
    mechanical objects did reveal the same principal result. The consequence of this
    observation is quite remarkable: quantum mechanical objects seem to be particles
    and waves – mumbles and photons – at the same time. This is the famous *wave-particle
    dualism*, which is a direct consequence of the superposition principle and another
    very fundamental property employed by quantum computers.


    ## Wave-Particle Dualism


    Wave-particle dualism refers to the natural phenomenon that quantum mechanical
    objects behave like particles and waves at the same time. Depending on the particular
    experiment, quantum mechanical objects reveal typical properties of particles,
    such as quantization of energy and mass, and properties that are typically attributed
    to waves, such as superposition and interference.


    But quantum mechanics holds another surprise that is called *entanglement* and
    probably the most mysterious but equally essential phenomenon employed in quantum
    computers today. Entanglement can be described best by having a closer look on
    a special property of elementary particles first. Photons, for instance, reveal
    the peculiar property of always spinning (turning) around themselves. This property
    is called *circular polarization* and can be understood in analogy to a football,
    which always spins around itself along a certain axis once shot in the air. Circular
    polarized photons do either reveal a left-hand or right-hand circular polarization,
    which can be denoted by the symbols `|↺〉` and `|↻〉` in Dirac notation, respectively.
    It turns out that circularly polarized light can be generated very easily by a
    special group of solid materials called *nonlinear crystals*. These crystals split
    an incident laser^([^(29)](#fn29)) beam up into two separate beams *A* and *B*
    as shown in Figure [2-3](#505424_1_En_2_Chapter.xhtml#Fig3) schematically. If
    we take out pairs of photons repeatedly – one from beam *A* and a second one from
    beam *B* – and measure their polarizations, we will make an astonishing observation:
    the pair of photons will reveal a random but always opposite polarization, that
    is, `|↺〉` and `|↻〉`, respectively. For historical reasons, such pairs of photons
    are called Einstein-Podolsky-Rosen pairs or *EPR pairs* in short since they were
    subject to passionate discussions among the three physicists when using them for
    the following thought experiment to demonstrate the striking consequences of quantum
    mechanics.


    Consider we generate an EPR pair with a nonlinear crystal in an empty space and
    use a set of mirrors to direct them in opposite directions. Since photons travel
    with the velocity of light at almost 300,000 km/s, it will only take a few minutes
    until the two photons will be separated by an unimaginably large distance. Now
    imagine that we take one of the photons, say photon *A*, and measure its polarization
    to be left hand. What does that result mean for photon *B*? Well, since the photons
    of an EPR pair do always reveal opposite polarizations, we know that the polarization
    of photon *B* must be the opposite to photon *A* and thus right hand – without
    measuring it! This is striking since there seems to be a very strange interaction
    telling photon *B* that the polarization of photon *A* was measured to be left
    hand. This is particularly weird since this interaction happens instantaneously
    although – as you may remember from high school – nothing can travel faster than
    the velocity of light. In other words, there is no way that photon *A* exchanges
    any information about its polarization with photon *B* instantaneously. So why
    does the wave function that describes the polarization of photon *B* suddenly
    collapse even if we do not measure it? Albert Einstein was in fact equally surprised
    about this result and referred to this phenomenon as “spooky action at a distance”
    since he could not believe in this very counterintuitive property of EPR pairs.
    In analogy to the polarization of photons, electrons do also turn around each
    other once they are placed in an external magnetic field. For historical reasons,
    this property is not called polarization but rather (electron) *spin* instead.
    In a magnetic field pointing from the north to the south pole, electrons do either
    spin to the left or to the right with respect to the direction of the magnetic
    field as shown in Figure [2-4](#505424_1_En_2_Chapter.xhtml#Fig4). If they spin
    to the left, their spin state is called *spin-up* and denoted by the symbol `|↑)`.
    Accordingly, electrons spinning to the right are called *spin-down* and denoted
    by the symbol `|↓〉`. It turns out that the spin of two electrons *A* and *B* can
    also be entangled. Experiments with such EPR electrons do also reveal this spooky
    action at a distance.'
