  trans: '

    微软的四大支柱清晰表明，数字化转型并非企业 IT 基础设施的一系列代际升级，也不是基于企业数据迁移至数字平台的业务流程简单数字化。数字化转型的真正内涵在于：（1）通过开放且善于沟通的文化塑造创新思维，（2）汇聚充满热情且多元背景的人才，（3）提供高效且同样实用的
    IT 工具，从而以最优方式支持人员与业务流程。这正是企业在日益全球化和互联互通的世界中实现持久增长与保持竞争力的秘诀。


    世界经济论坛在 2016 年发布的一份颇具影响力的白皮书中，对数字化转型有如下论述：


    > 机器人技术与人工智能系统不仅将用于替代人类任务，更将增强人类技能。这同样会给企业带来挑战，企业需要对员工进行再培训，使其能够有效地与新技术协同工作。[……]
    要充分实现技术增强的潜力——不仅要提高生产力，还要减轻自动化带来的失业问题——再培训将至关重要[44]。


    或许没有哪家企业比亚马逊更能体现一家公司如何利用数字技术实现业务转型，正因如此，我们也将更深入地审视这个堪称双元型企业的成功典范。1994 年，美国计算机科学家杰弗里·贝佐斯凭借其高超的*故事讲述*技巧，向多位风险投资人阐述了他关于在线市场的商业构想。他的故事引人入胜且同样简洁明了：他设想通过持续投资于客户利益——如最低价格、丰富的产品选择以及快速配送——来打造地球上最大的商店。在那之前，风险投资人的宠儿始终是利润。杰弗里·贝佐斯成功打破了这一传统，用令人信服的愿景和巨大的增长前景取代了利润。他筹集了
    21 亿美元的投资资金，并于 1994 年创立了亚马逊，最初以在线图书市场起步——图书在他看来是开拓电子商务利基市场的完美品类，因为它们是定制化产品，具有较低的财务价值和风险。为了超越竞争对手并强化“品类齐全”这一核心价值，他很快开放了名为`sales
    platform`的亚马逊市场平台，引入第三方卖家^(¹⁶)，并开始销售电子产品、软件、视频游戏以及其他一系列（消费）商品。


    随着客户、供应商及第三方卖家数量的稳步增长——亚马逊市场平台如今已占亚马逊销售额的 40%以上——这家公司开始变得像任何一家传统企业，并陷入了日益复杂的成本问题以及制约其进一步增长和创造价值的其他严重瓶颈。亚马逊演变成了一种“筒仓式”架构，拥有众多基于不同零售领域、客户和产品细分市场的组织子部门。每个部门都实施自己的软件解决方案，以满足其特定职能的需求，并在各自孤立的企业环境中进行自我优化。其结果是，IT
    基础设施高度碎片化，充斥着大量不兼容的软件应用，运行在互不兼容的 IT 系统上，并访问着众多分散、充满不一致和非标准化数据的数据库。


    此时，杰弗里·贝佐斯意识到，管理这种日益复杂的基础设施的唯一途径，就是对其公司进行数字化转型，使其成为一个充分利用数字技术优势、以软件和数据为驱动的现代组织。为此，他试图打破多年来形成的组织和技术壁垒。他摒弃了通过将复杂性分解为更小、专注于单一和高度专业化任务的职能单元来进行管理的方式，而是构想出一个具有集成特性团队、符合著名*镜像假设*的敏捷组织。这一观察可追溯至美国计算机科学家梅尔文·康威，他在
    1967 年就敏锐地指出，公司设计的系统必然受限于其组织结构中普遍存在的沟通模式 [45]。换句话说，高度集成且复杂的软件应用无法由高度解耦的职能单元开发出来，这解释了为何杰弗里·贝佐斯要为其公司引入一种由敏捷协作模式支撑的新组织结构。这一组织变革对于基于共享软件平台（该平台包含中央数据管道以及可通过清晰用户界面快速部署的标准化软件模块）实现公司核心基础设施的数字化亦至关重要。^(¹⁷)
    这些软件和数据分析工具被用于分析客户、了解其偏好，并创建个性化优惠和产品推荐，从而促进销售并维持持久增长。


    这个中央数据和软件平台由亚马逊云服务（Amazon Web Services）提供和维护，该部门发展迅速，现已对公众开放，并在 2018 年贡献了亚马逊 2300
    亿美元总年收入的 11%以上。成立十二年后，亚马逊最大的业务板块仍是其在线零售市场，贡献了总年收入的 52%以上——这是数字化转型书写的又一个持久成功故事，并由数字技术赋能得以实现。

    '
- fmt: '### 1.3.3 Digital Key Technologies


    The previous examples have shown that digitization, digitalization, and digital
    transformation build on different support technologies. Digitization sources data
    from three major groups of devices and systems that are used for data creation,
    aggregation, and collection. The first group surmounts digital input devices,
    such as computer keyboards or image scanners, that facilitate the direct conversion
    of analog to digital information. Cyberphysical systems include sensors and are
    the second source of information. They are used to monitor physical objects and
    processes in industrial production lines in real time and include smart meters
    for measuring energy consumption, wearables that assist workers, or light sensors
    that detect the presence or absence of a workpiece in a machine. The third group
    are databases and networks internal and external to an organization, such as the
    private intranet and public Internet. Digital input devices, cyberphysical systems,
    as well as databases and networks are the most important sources of information
    and basis of a typical data aggregation infrastructure as shown in the extended
    pyramid in Figure [1-4](#505424_1_En_1_Chapter.xhtml#Fig4).


    ![../images/505424_1_En_1_Chapter/505424_1_En_1_Fig4_HTML.png](images/505424_1_En_1_Chapter/505424_1_En_1_Fig4_HTML.png)


    **Figure 1-4** Relationship between digitization, digitalization, and digital
    transformation (dark gray) and their enablers for aggregating, analyzing, and
    monetizing data (light gray). The fundament of all digital technologies are data
    aggregation systems that convert analog to digital data.


    The data obtained from those sources is typically stored on a data aggregation
    platform or data lake, which makes it available for data processing.^([^(18)](#fn18))
    This is the point where the three focus technologies introduced in this book come
    into play. Quantum computing, blockchain technology, and artificial intelligence,
    namely, allow us to process, analyze, and ultimately monetize data. They are the
    most important enabling technologies for digitalization and digital transformation
    in the public and private sector and a prerequisite for putting data to work at
    profit. Digital technologies including quantum computing, blockchain technology,
    and artificial intelligence may create value in three ways: they (1) reduce costs
    by, for example, automation; (2) increase revenue by, for example, driving sales
    and efficiency; and (3) create new lines of business. Organizations can either
    employ those support technologies by building up their own in-house resources
    and capabilities or by subscribing to a cloud computing service, which we will
    discuss in Chapter [5](#505424_1_En_5_Chapter.xhtml), “Your Digital Action Plan,”
    in more detail. Cloud computing is – so much should be said at this point – an
    IT infrastructure that makes different computing services accessible through the
    Internet on demand. Cloud computing provides resources for conventional data storage
    and processing but also more advanced digital technologies, such as quantum computing,
    blockchain technology, and artificial intelligence. The most popular cloud computing
    vendors are AWS, Microsoft Azure, Google Cloud, and IBM Cloud.


    Quantum computing is sometimes described as the next frontier in computing as
    it allows for solving very complex and computationally intense business problems.
    Blockchain technology, on the other hand, is a conceptual breakthrough in managing
    information by encrypted and trusted databases that make the data available for
    everybody joining the distributed blockchain network. Artificial intelligence
    is probably the most popular support technology among the three. It allows for
    inferring patterns from big data to streamline, optimize, and automate business
    processes including manufacturing and administrative processes. Much of the hype
    around those technologies comes from numerous articles and reports in media about
    what is possible in theory vs. what can be achieved in reality. The American scientist
    and futurist Roy Amara once noted in this context: “We [people] tend to overestimate
    the effect of a [new] technology in the short run and underestimate the effect
    in the long run,” an observation that became known as Amara’s law later on.


    The global research and advisory firm Gartner has analyzed the different phases
    of technology adoption based on the public attention an emerging technology receives.
    The result is Gartner’s hype cycle [[47](#505424_1_En_1_Chapter.xhtml#Par250)],
    which qualitatively describes technology adoption in terms of five phases as depicted
    in Figure [1-5](#505424_1_En_1_Chapter.xhtml#Fig5):


    1.  **Technology trigger**: The beginning of the hype cycle. It is started by
    the public introduction of a technology that generates increasing interest in
    publicity and media.


    2.  **Peak of inflated expectations**: Expectations and hopes associated with
    an emerging technology rise above the current reality of its capabilities. In
    case of the introduction of the Internet, this hype manifested in the “dot-com”
    bubble that bursted suddenly in 2001.


    3.  **Trough of disillusionment**: Result of the bursted bubble that replaces
    the original excitement about the potential value of a technology by disillusionment.


    4.  **Slope of enlightenment**: Increase of interest as early adopters overcome
    the initial hurdles and find valuable applications of an emerging technology that
    in turn attracts more and more followers.


    5.  **Plateau of productivity**: Final phase of the hype cycle, which forms as
    more and more organizations realize the real-world benefits of a technology and
    decide to adopt them for their own business. This sharp rise of adoption is resembling
    a hockey stick when shown graphically.


    ![../images/505424_1_En_1_Chapter/505424_1_En_1_Fig5_HTML.png](images/505424_1_En_1_Chapter/505424_1_En_1_Fig5_HTML.png)


    **Figure 1-5** Five phases of the Gartner hype cycle with the current status of
    quantum computing, artificial intelligence, and blockchain technology. Reprinted
    from [[48](#505424_1_En_1_Chapter.xhtml#Par251)]


    Gartner frequently updates its branded hype cycle with the latest version from
    2018 being available on [[48](#505424_1_En_1_Chapter.xhtml#Par251)]. This hype
    cycle reveals that quantum computing is currently about to enter the second and
    blockchain technology the third phase. Artificial intelligence is currently at
    the peak of the second phase, which explains its popularity and great attention
    in media today. The Gartner hype cycle has been criticized by some people for
    the lack of evidence that it holds and for not matching well with the technological
    uptake in practice. It does, however, provide a useful orientation about how technologies
    are perceived by media and related articles and news should be interpreted.'
