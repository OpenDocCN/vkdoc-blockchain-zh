    your digital agenda as shown in Figure [5-1](#505424_1_En_5_Chapter.xhtml#Fig1).
    We will start by having a close look on developing an appropriate business and
    operating model that are driven by digital technologies and supported by an appropriate
    technology stack and computing platform. After that, we will talk about digitizing
    the core of an organization by providing a coherent and shared data platform.
    We will also learn about the key criteria to identify suitable pilot projects
    and the transformational but often undervalued impact of empowering management
    and employees. Furthermore, shaping the organizational structure based on agile
    models of collaboration will also turn out to be crucial for completing a digital
    transformation successfully. Last but not least, we will see that a successful
    digital transformation relies on an open innovation culture that fosters the integration
    of feedback and new ideas by leveraging your ecosystem as another key dimension.


    ![../images/505424_1_En_5_Chapter/505424_1_En_5_Fig1_HTML.png](images/505424_1_En_5_Chapter/505424_1_En_5_Fig1_HTML.png)


    Figure 5-1


    The eight key dimensions of digital transformation


    But before we discuss this digital action plan along the eight key dimensions
    of digital transformation in detail, it is instructive to have a look on the digital
    transformation of Microsoft to highlight certain similarities: In 2011, Microsoft
    was a tired company. It faced a range of severe competitive threats spawned by
    the Internet and had run into serious antitrust scrutiny, both threatening its
    existing business model. Their traditional software business was about shipping
    software CDs around the world to install Microsoft DOS, Windows, and Office on
    every computer. Besides exploiting this classic software business, Microsoft had
    been experimenting with a small cloud computing service called Microsoft Azure
    at that time for delivering software and services on demand. This explorative
    project was, however, widely considered a nonprofitable failure, which is why
    Microsoft was focusing on exploiting its legacy business instead. But Satya Nadella –
    the head of Microsoft’s Server and Tools group at that time – disagreed with this
    strategic assessment and was filled with conviction that cloud computing will
    be the future of Microsoft. Three years later, Satya Nadella succeeded Steve Ballmer
    as CEO and reinforced his strong vision in his first email to his employees by
    writing: “Our industry does not respect tradition – it only respects innovation.
    [...] Our job is to ensure that Microsoft thrives in a mobile and cloud-first
    world” [[1](#505424_1_En_5_Chapter.xhtml#Par140)]. In order to bring his clear
    and compelling vision to life, he rearchitected Microsoft’s software delivery
    process in the following years by transforming the underlying traditional business
    model from putting software on computing hardware on premise to delivering software-as-a-service
    via cloud computing on demand. For this purpose, Satya Nadella scaled up the digital
    pilot project Azure by adding more and more cloud-based applications to it, such
    as Microsoft Office 365 and Microsoft Dynamics, an enterprise resource planning
    and customer relationship management software. His strategy gained further traction
    with the acquisition of GitHub in 2018, a very popular online repository for open
    source software projects and tools. Guided by his clear vision and strong conviction
    about the future of cloud computing, he successfully transformed Microsoft into
    a cloud software company. In consequence, Microsoft’s stock prize tripled in value
    during the first three years of his CEO tenure. But this was not the last digital
    transformation on his agenda. Inspired by the famous “AI-first” announcement^([^(130)](#fn130))
    of his friend Sundar Pichai [[2](#505424_1_En_5_Chapter.xhtml#Par141)], the CEO
    of Google, Satya Nadella adjusted his vision in 2018 and laid out plans for Microsoft’s
    next digital transformation into an “intelligent cloud and intelligent edge” computing
    provider [[4](#505424_1_En_5_Chapter.xhtml#Par143)], who also leverages the three
    digital support technologies introduced in this book. He later noted in an interview
    that “AI is the run-time which is going to shape all of what we do” [[5](#505424_1_En_5_Chapter.xhtml#Par144)] –
    a digital business strategy that Microsoft is pursuing with its Azure cloud computing
    platform very successfully until today.


    What can we learn from Microsoft’s digital transformation journey? The foremost
    important lesson to learn is that success with a novel product or service does
    not come without any entrepreneurial and thus financial risk. Amazon, for example,
    has admittedly had some spectacular failures over the years worth billions of
    dollars [[6](#505424_1_En_5_Chapter.xhtml#Par145)], such as Amazon Auctions, zShops,
    and its Fire Phone that became the basis for its highly successful products Amazon
    Marketplace and Amazon Alexa/Echo later on, respectively. Jeffrey Bezos, the founder
    of Amazon, famously noted in this context in his 2016 Letter to Shareholders:'
