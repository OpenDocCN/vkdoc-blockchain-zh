- fmt: '# Deep Learning: Generative Adversarial Neural Networks


    Another very interesting and comparatively new class of machine learning models
    are *generative adversarial neural networks*, which the French-American computer
    scientist and Facebook’s artificial intelligence research director Yann LeCun
    once called “the most interesting idea in the last 10 years” [[57](#505424_1_En_4_Chapter.xhtml#Par297)].
    They were discovered by the American computer scientist Ian Goodfellow and his
    colleagues at the University of Montreal in 2014 [[58](#505424_1_En_4_Chapter.xhtml#Par298)]
    and comprise two artificial neural networks that compete against each other. This
    competition gave rise to the term “adversarial” and has been derived from *game
    theory*, a mathematical discipline to model rational decision making.^([^(101)](#fn101))
    Their basic architecture is depicted in Figure [4-13](#505424_1_En_4_Chapter.xhtml#Fig13)
    schematically. A generative adversarial neural network comprises two subcomponents,
    a *generator network* and a *discriminator network*, each of which revealing different
    architectures. The initial input of the generator network is random noise, while
    the input dataset of the discriminator network contains both real sample images
    (training data) and the output image of the generator. The generator aims to create
    fake images in this configuration, while the discriminator estimates whether its
    input is a real or fake image. As both competing networks get better and better
    by training over time, the generator is eventually forced to create a new image
    that looks more and more realistic from one iteration to another. After a few
    epochs, the discriminator will estimate its generated input image to be real and
    the training process ends. The generative adversarial neural network has then
    achieved its main goal, the generation of an entirely new and real-looking (fake)
    image out of a dataset containing real images.


    At this point, you may rightfully ask yourself whether such a network is of any
    use or just a game of data scientists to create funny images. First of all, it
    is important to note that *adversarial learning* is particularly interesting from
    a conceptual point of view since it provides a new approach to statistical learning
    that does not require any cost function. Generative adversarial neural networks
    rather learn its own cost function and thereby bypass the need to mindfully design
    and construct one, which can be very laborious and time consuming [[61](#505424_1_En_4_Chapter.xhtml#Par301)].
    Yann LeCun once described this challenge of finding an appropriate cost function
    for a particular use case on the NIPS conference in 2016 – one of the biggest
    research conferences on artificial intelligence in the world – as follows: “If
    intelligence was a cake, unsupervised learning would be the cake, supervised learning
    would be the icing on the cake, and reinforcement learning would be the cherry
    on the cake. We know how to make the icing and the cherry, but we don’t know how
    to make the cake.” Three years later, in a lecture given on the San Francisco–based
    ISSCC, he updated his famous *cake analogy* by replacing “unsupervised learning”
    with “self-supervised learning.” With this term, he refers to a learning strategy,
    in which data itself provides supervision and acts as the trainer comparable to
    its role in generative adversarial neural networks. In his eyes, “the next AI
    revolution will not be supervised or purely reinforced. The future is self-supervised
    learning with massive amounts of data and very large networks.”


    In addition to this rather conceptual relevance, generative adversarial neural
    networks do also offer superior performance for a variety of applications compared
    to other neural network architectures. The most popular applications in this context
    are advanced photograph editing including style transfer^([^(102)](#fn102)) [[62](#505424_1_En_4_Chapter.xhtml#Par302)]
    and blending, image in-painting [[63](#505424_1_En_4_Chapter.xhtml#Par303)], face
    aging and age estimation from (portrait) images [[64](#505424_1_En_4_Chapter.xhtml#Par304)],
    photo-realistic image creation [[65](#505424_1_En_4_Chapter.xhtml#Par305)], and
    face frontal view generation for pose invariant face recognition [[66](#505424_1_En_4_Chapter.xhtml#Par306)].
    The last application may play a crucial role in analyzing the data of public security
    cameras, for example, to visually track and identify criminals independently of
    their pose and style to reduce crime and execute prosecution. Generative adversarial
    neural networks did also enter the international artwork auction stage recently
    when the British auction house Christie’s sold its first image created by such
    a network. This image has the title “Portrait of Edmond Belamy” and depicts a
    portly, possibly French gentleman with a dark frockcoat and plain white collar.
    The image was sold on Christie’s Prints & Multiples auction on October 25, 2018
    for – believe it or not – USD 432,500, at nearly 45 times its highest estimate
    [[67](#505424_1_En_4_Chapter.xhtml#Par307)].


    Another increasingly popular application of generative adversarial neural networks
    is *generative design*, which refers to an iterative design process whereby a
    program – according to certain constraints specified by the user – creates a selection
    of design objects that can be fine-tuned by the user subsequently. A team at Cambridge
    Consultants, for instance, created a program called “Vincent AI” that can be used
    to transform rough human sketches into art according to a preselected stylus.^([^(103)](#fn103))
    Autodesk’s Dreamcatcher AI project^([^(104)](#fn104)) has been exploring a similar
    approach and developed a commercially accessible platform that automatically generates
    different design options based on an uploaded CAD file, the predominant data format
    for industrial design applications.


    Those examples show that artificial intelligence is becoming a disruptive force
    in the arts, too. Various companies picked up this trend and started to explore
    the exciting linkage between arts, design, creativity, and artificial intelligence
    lately. Google, for example, launched its “Arts and Machine Intelligence Program”
    in 2016, which brings together artists and engineers from around the world to
    explore how creative practices are being transformed by artificial intelligence
    [[68](#505424_1_En_4_Chapter.xhtml#Par308)].


    But generative adversarial networks have also been used maliciously for things
    that are less than admirable, unfortunately. One example is so-called *deep fakes*,
    which involve leveraging this technology to create misleading fake images, videos,
    or news. Style transfer based on generative adversarial networks, for instance,
    makes it possible to have prominent politicians and country leaders say anything
    you tell them – a really dangerous resource for political propaganda campaigns
    based on fake news.'
  raw: '#### Deep Learning: Generative Adversarial Neural Networks


    Another very interesting and comparatively new class of machine learning models
    are *generative adversarial neural networks* , which the French-American computer
    scientist and Facebook’s artificial intelligence research director Yann LeCun
    once called “the most interesting idea in the last 10 years” [[57](#505424_1_En_4_Chapter.xhtml#Par297)].
    They were discovered by the American computer scientist Ian Goodfellow and his
    colleagues at the University of Montreal in 2014 [[58](#505424_1_En_4_Chapter.xhtml#Par298)]
    and comprise two artificial neural networks that compete against each other. This
    competition gave rise to the term “adversarial” and has been derived from *game
    theory* , a mathematical discipline to model rational decision making.^([^(101)](#fn101))
    Their basic architecture is depicted in Figure [4-13](#505424_1_En_4_Chapter.xhtml#Fig13)
    schematically . A generative adversarial neural network comprises two subcomponents,
    a *generator network* and a *discriminator network* , each of which revealing
    different architectures. The initial input of the generator network is random
    noise, while the input dataset of the discriminator network contains both real
    sample images (training data) and the output image of the generator. The generator
    aims to create fake images in this configuration, while the discriminator estimates
    whether its input is a real or fake image. As both competing networks get better
    and better by training over time, the generator is eventually forced to create
    a new image that looks more and more realistic from one iteration to another.
    After a few epochs, the discriminator will estimate its generated input image
    to be real and the training process ends. The generative adversarial neural network
    has then achieved its main goal, the generation of an entirely new and real-looking
    (fake) image out of a dataset containing real images.


    At this point, you may rightfully ask yourself whether such a network is of any
    use or just a game of data scientists to create funny images. First of all, it
    is important to note that *adversarial learning* is particularly interesting from
    a conceptual point of view since it provides a new approach to statistical learning
    that does not require any cost function. Generative adversarial neural networks
    rather learn its own cost function and thereby bypass the need to mindfully design
    and construct one, which can be very laborious and time consuming [[61](#505424_1_En_4_Chapter.xhtml#Par301)].
    Yann LeCun once described this challenge of finding an appropriate cost function
    for a particular use case on the NIPS conference in 2016 – one of the biggest
    research conferences on artificial intelligence in the world – as follows: “If
    intelligence was a cake, unsupervised learning would be the cake, supervised learning
    would be the icing on the cake, and reinforcement learning would be the cherry
    on the cake. We know how to make the icing and the cherry, but we don’t know how
    to make the cake.” Three years later, in a lecture given on the San Francisco–based
    ISSCC, he updated his famous *cake analogy* by replacing “unsupervised learning”
    with “self-supervised learning.” With this term, he refers to a learning strategy,
    in which data itself provides supervision and acts as the trainer comparable to
    its role in generative adversarial neural networks. In his eyes, “the next AI
    revolution will not be supervised or purely reinforced. The future is self-supervised
    learning with massive amounts of data and very large networks.”


    In addition to this rather conceptual relevance, generative adversarial neural
    networks do also offer superior performance for a variety of applications compared
    to other neural network architectures. The most popular applications in this context
    are advanced photograph editing including style transfer^([^(102)](#fn102)) [[62](#505424_1_En_4_Chapter.xhtml#Par302)]
    and blending, image in-painting [[63](#505424_1_En_4_Chapter.xhtml#Par303)], face
    aging and age estimation from (portrait) images [[64](#505424_1_En_4_Chapter.xhtml#Par304)],
    photo-realistic image creation [[65](#505424_1_En_4_Chapter.xhtml#Par305)], and
    face frontal view generation for pose invariant face recognition [[66](#505424_1_En_4_Chapter.xhtml#Par306)].
    The last application may play a crucial role in analyzing the data of public security
    cameras, for example, to visually track and identify criminals independently of
    their pose and style to reduce crime and execute prosecution. Generative adversarial
    neural networks did also enter the international artwork auction stage recently
    when the British auction house Christie’s sold its first image created by such
    a network. This image has the title “Portrait of Edmond Belamy” and depicts a
    portly, possibly French gentleman with a dark frockcoat and plain white collar.
    The image was sold on Christie’s Prints & Multiples auction on October 25, 2018
    for – believe it or not – USD 432,500, at nearly 45 times its highest estimate
    [[67](#505424_1_En_4_Chapter.xhtml#Par307)].


    Another increasingly popular application of generative adversarial neural networks
    is *generative design* , which refers to an iterative design process whereby a
    program – according to certain constraints specified by the user – creates a selection
    of design objects that can be fine-tuned by the user subsequently. A team at Cambridge
    Consultants, for instance, created a program called “Vincent AI” that can be used
    to transform rough human sketches into art according to a preselected stylus.^([^(103)](#fn103))
    Autodesk’s Dreamcatcher AI project^([^(104)](#fn104)) has been exploring a similar
    approach and developed a commercially accessible platform that automatically generates
    different design options based on an uploaded CAD file, the predominant data format
    for industrial design applications.


    Those examples show that artificial intelligence is becoming a disruptive force
    in the arts, too. Various companies picked up this trend and started to explore
    the exciting linkage between arts, design, creativity, and artificial intelligence
    lately. Google, for example, launched its “Arts and Machine Intelligence Program”
    in 2016, which brings together artists and engineers from around the world to
    explore how creative practices are being transformed by artificial intelligence
    [[68](#505424_1_En_4_Chapter.xhtml#Par308)].


    But generative adversarial networks have also been used maliciously for things
    that are less than admirable, unfortunately. One example is so-called *deep fakes*
    , which involve leveraging this technology to create misleading fake images, videos,
    or news. Style transfer based on generative adversarial networks, for instance,
    makes it possible to have prominent politicians and country leaders say anything
    you tell them – a really dangerous resource for political propaganda campaigns
    based on fake news.'
