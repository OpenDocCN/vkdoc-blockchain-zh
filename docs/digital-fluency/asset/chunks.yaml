  trans: '

    ### 4.4.2 计算机视觉


    计算机视觉近期在工业界和媒体界引起了广泛关注，因为它提供了多种应用，例如亚马逊无人商店的“即拿即走”购物技术、视觉引导机器人，以及特斯拉用于自动驾驶的“全自动驾驶计算机”，我们将在本节中更详细地研究这些内容。


    **表 4-2** 最广泛使用的机器学习算法及其应用


    | 学习类别 | 算法 | 典型应用 |

    | --- | --- | --- |

    | 监督学习 | 回归 | 价格点优化、周期时间分析、质量保证 |

    | | 分类 | 预测性维护、客户细分、垃圾邮件过滤、欺诈检测 |

    | 无监督学习 | 关联规则 | 购物车分析以及根据相似消费者的偏好推荐客户下一步应购买的其他商品（例如，文章、书籍、视频） |

    | | 聚类 | 智能制造、在线质量控制与保证、客户细分、情感分析、欺诈检测 |

    | | 降维 | 数据压缩、图像、语音和音频处理、主题建模 |

    | 深度学习 | 人工神经网络 | 车间管理、计算机视觉、目标检测、人脸和语音识别 |

    | | 卷积神经网络 | 自动驾驶目标检测、根据医学扫描诊断健康疾病、计算机视觉、通过在线摄像头检测缺陷产品进行质量控制 |

    | | 循环神经网络 | 虚拟助手和聊天机器人的自然语言处理与翻译、跟踪图像随时间推移的视觉变化、通过创建标题和关键词为图像添加标签、基于信用卡使用的欺诈检测
    |

    | | 生成式神经网络 | 照片编辑、生成逼真图像、正面人脸生成以及姿态不变的人脸识别 |

    | | 推荐系统 | 基于用户画像、商品属性或历史销售记录，向客户推荐相似商品（文章、书籍、视频及其他产品） |

    | | 自动编码器 | 通过移除不相关数据实现高效的文件和数据压缩 |

    | | 集成方法 | | 根据相关性对搜索引擎结果进行排序、人脸识别、语言翻译 |

    | | 强化学习 | | 自动驾驶、交易策略优化、平衡需求变化的电网、机器人编程、实时拍卖价格优化 |


    #### 计算机视觉：购物技术


    亚马逊无人商店于 2018 年推出，是在美国运营的一家连锁便利店，在西雅图、芝加哥、旧金山和纽约市已开设或宣布开设了 26 家门店。这些商店实现了部分自动化，顾客无需经过收银员或使用自助结账台即可购买商品。顾客只需在智能手机应用上登录，该应用即可授权顾客进入商店，并提供用于自动结账的移动支付系统。这种亚马逊称之为“即拿即走”的技术，基于由深度学习和`sensor
    fusion`^(¹¹⁶) 驱动的计算机视觉，能够自动跟踪您拿取的商品并将其添加到您的虚拟购物车中。该系统包括众多摄像头、货架上的感应装置以及自动出口闸门，如图
    4-15 示意所示。这些组件的信号首先由一个流媒体服务聚合，这是一个云平台，它使所有数据可用于进一步处理。“即拿即走”技术单元分析这些数据，识别顾客，分析他们的活动，并识别商品，从而将特定的顾客
    ID 与所选商品集合关联起来。为此，深度学习被用于顾客关联、物品识别、姿态估计和行为判定，以精确回答关于“谁拿了并打算买什么”这一关键问题。这些信息会被持续添加到虚拟购物车中，并在结账时被检索以向相应顾客收费。据亚马逊此项技术的首席科学家
    Gerard Medioni 称，主要的挑战确实在于人员识别步骤，因为顾客可能彼此靠得很近，或者被店内的某些物品挡住视线，他们分别称之为“纠缠状态”和“遮挡”。亚马逊还于
    2020 年开始向其他零售商授权这项技术 [87]。关于这种基于人工智能的复杂数字技术的非常详细的介绍，可参见例如 [88]。


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig15_HTML.jpg](img/505424_1_En_4_Fig15_HTML.jpg)


    **图 4-15** 亚马逊无人商店及其他越来越多的零售店中使用的亚马逊“即拿即走”技术的高层架构图


    #### 计算机视觉：视觉引导机器人


    结合物理机器人，计算机视觉还可用于自动化和加速工业制造流程及仓库物流。例如，美国初创公司 Vicarious（其投资者包括杰弗里·贝索斯、埃隆·马斯克和马克·扎克伯格）正致力于开发基于人工智能和实时数据分析的、无需编程的视觉引导机器人，用于配套作业、码垛、机器看护、包装、料箱拾取和分拣。^(¹¹⁷)
    另一个例子是总部位于旧金山的初创公司 Kindred AI，该公司最近推出了名为“AutoGrasp”的机器人智能平台。它将计算机视觉与先进的抓取和操控技术相结合，以控制用于例如在线零售配送和履约中心的拣选机器人。^(¹¹⁸)
    他们的产品已被证明在 2020 年灾难性的 COVID-19 疫情期间特别有用，能够处理在此期间日益增多的在线订单，同时由于社交距离规定，履行订单的员工却更少
    [89]。

    '
- fmt: '# Computer Vision: Autonomous Driving


    Autonomous driving is the third application of computer vision, which is worth
    mentioning and explaining in detail. Although self-driving vehicles often seem
    to be a very new technology, researchers and engineers have been building them
    for over three decades now. Research on computer-controlled vehicles began at
    Carnegie Mellon University with the production of the worldwide first computer-controlled
    vehicle called “Navlab 1” in 1986. `Navlab 1` was reengineered from a Chevrolet
    panel van and equipped with five racks of computer hardware including a global
    positioning system (`GPS`). This vehicle did unfortunately suffer from various
    software limitations and was not fully operational until the late 1980s. Roughly
    about the same time, Dean Pomerleau started to develop `ALVINN`, an “Autonomous
    Land Vehicle in a Neural Network” at the same robotics institute. `ALVINN` was
    equipped with one video camera mounted on the driver’s cab and designed for the
    task of road following. It was controlled by an artificial three-layer neural
    network trained by Ian Goodfellow’s back-propagation algorithm and capable of
    driving up to 70 mph [[90](#505424_1_En_4_Chapter.xhtml#Par330)]. It was the result
    of eight years of military-funded research at Carnegie Mellon University.


    Another historic and equally legendary autonomous vehicle appeared in 1985 on
    the other side of the ocean in Germany and was developed by the German pioneer
    of dynamic computer vision Ernst Dickmanns [[91](#505424_1_En_4_Chapter.xhtml#Par331)].
    His five-ton reengineered Mercedes van with the rather cumbersome name `VaMoRs`
    – a German abbreviation for “Versuchsfahrzeug für Autonome Mobilität und Rechnersehen”
    – was able to automatically control its steering wheel, throttle, and breaks based
    on the real-time evaluation of image sequences recorded by a video camera. `VaMoRs`
    was successfully demonstrated to drive on motorways at high speed as well as on
    two-lane roads at 19 mph with obstacle avoidance at day and night. Its operation
    was also based on a perceptron that controlled this semiautonomous vehicle.


    The real inflection point for autonomous driving did, however, come with the Iraq
    War in 2004, when the American Defense Advanced Research Projects Agency or DARP
    proposed such vehicles to increase the safety of soldiers. Various (semi)automated
    vehicles have been built since then, and Google Alphabet+Waymo, Amazon+Zoox, Argo
    AI, Lyft, and Tesla are just a few companies besides established automobile manufacturers
    that moved into this worldwide business. In order to meet the very high safety
    standards, autonomous driving requires the redundant signal analysis of a range
    of different sensors and control units including cameras, ultrasonic and radar
    sensors, wheel ticks and steering angle sensors, as well as navigational systems.^([^(119)](#fn119))
    Even at low levels of autonomy, self-driving vehicles are required to process
    more than 10 GB/s, which is a very substantial amount of data – your smartphone
    with 32 GB of storage memory, for comparison, would be full in less than four
    seconds assuming its memory would even be able to store data at this high speed.
    Fully autonomous self-driving vehicles with the highest level of autonomy are
    even expected to operate with bandwidths of up to 100 GB/s. To understand the
    nuances between the different degrees of automatization, SAE International – previously
    known as the Society of Automotive Engineers – has established the following five
    SAE levels of autonomy:


    * **Level 0** – no automatization: A human controls the entire vehicle without
    any automation technology.

    * **Level 1** – driver assistance: A computer controls limited functions, such
    as adaptive cruise control or the speed limiter, but only one function at a time.

    * **Level 2** – partial automation: The vehicle has combined automated functions,
    such as acceleration and steering, that can be engaged at the same time.

    * **Level 3** – conditional automation: The car automates all safety functions.
    The driver is not required to monitor the environment but must be ready to intervene
    if something goes wrong.

    * **Level 4** – high automation: The car can generally drive itself, but there
    are rare cases and situations in which the driver must participate.

    * **Level 5** – full automation: The holy grail of autonomous driving, in which
    the car is completely autonomous and does not require the driver to do anything
    unless they like to control the vehicle on their own.


    Due to the enormous amount of data that has to be interpreted to solve the autonomous
    driving task, it is generally accepted that artificial intelligence is the most
    promising way to implement full automation. From a technological point of view,
    there are currently two main approaches to SAE level 5 autonomy based on artificial
    intelligence, which differ in terms of the sensors used to determine the distance
    and speed of objects. The (1) camera-based approach relies on light-optical cameras
    and radar only, while the (2) LiDAR-based approach uses a combination of laser
    scanners, cameras, and radar to navigate the autonomous vehicle. In this context,
    LiDAR stands for “Light Detection and Ranging” and refers to a method for measuring
    spatial distances between objects by illuminating them with laser light and measuring
    the resulting reflection with a sensor. The most popular proponents of both technologies
    are Tesla and Waymo for the first and second approach, respectively.


    Tesla’s approach to autonomous driving is quite unique and entirely different
    to the one of Waymo and other automobile manufacturers as they neither use LiDAR
    for range detection nor high-definition navigational maps. Tesla rather pursues
    an entirely vision-based approach that involves real-time processing and analysis
    of raw video streams collected from eight cameras based on artificial neural networks.
    In order to process this very large amount of data, Tesla has developed its own
    “full self-driving” or `FSD` computer to process the data of 8 cameras, 12 ultrasonic
    sensors, 1 radar sensor, and GPS, as well as card data from the navigational system.
    The maximum input rate of Tesla’s `FSD` computer amounts to 2.5 billion pixels
    per second, which corresponds to roughly 1,200 full-HD images per second where
    one “full high-definition” image contains 1,920 × 1,080 pixels by definition.
    Since `AlexNet`, a convolutional neural network with 8 layers and more than 60
    million weights, won the ImageNet competition in 2012 [[92](#505424_1_En_4_Chapter.xhtml#Par332)]
    and outperformed the human benchmark [[93](#505424_1_En_4_Chapter.xhtml#Par333)],
    those networks have become the method of choice for image classification and object
    recognition.^([^(120)](#fn120)) For this reason, Tesla’s `FSD` computer is equipped
    with two redundant NPUs that emulate convolutional neural networks.^([^(121)](#fn121))
    The overall process is shown in Figure [4-16](#505424_1_En_4_Chapter.xhtml#Fig16)
    schematically. Each NPU comprises more than six billion transistors that can execute
    more than 72 trillion additions and multiplications per second. Further technical
    information about Tesla’s `FSD` computer is available in [[95](#505424_1_En_4_Chapter.xhtml#Par335),
    [96](#505424_1_En_4_Chapter.xhtml#Par336)], for example.


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig16_HTML.jpg](images/505424_1_En_4_Chapter/505424_1_En_4_Fig16_HTML.jpg)


    **Figure 4-16** – Schematic diagram of the Tesla autopilot. The `FSD` computer
    takes different camera images as its input; runs different object recognition
    algorithms, such as road prediction (dashed lines); and labels the detected object
    in the output image.'
  raw: '#### Computer Vision: Autonomous Driving


    Autonomous driving is the third application of computer vision, which is worth
    mentioning and explaining in detail. Although self-driving vehicles often seem
    to be a very new technology, researchers and engineers have been building them
    for over three decades now. Research on computer-controlled vehicles began at
    Carnegie Mellon University with the production of the worldwide first computer-controlled
    vehicle called “Navlab 1” in 1986. Navlab 1 was reengineered from a Chevrolet
    panel van and equipped with five racks of computer hardware including a global
    positioning system (GPS) . This vehicle did unfortunately suffer from various
    software limitations and was not fully operational until the late 1980s. Roughly
    about the same time, Dean Pomerleau started to develop ALVINN, an “Autonomous
    Land Vehicle in a Neural Network” at the same robotics institute. ALVINN was equipped
    with one video camera mounted on the driver’s cab and designed for the task of
    road following. It was controlled by an artificial three-layer neural network
    trained by Ian Goodfellow’s back-propagation algorithm and capable of driving
    up to 70 mph [[90](#505424_1_En_4_Chapter.xhtml#Par330)]. It was the result of
    eight years of military-funded research at Carnegie Mellon University.


    Another historic and equally legendary autonomous vehicle appeared in 1985 on
    the other side of the ocean in Germany and was developed by the German pioneer
    of dynamic computer vision Ernst Dickmanns [[91](#505424_1_En_4_Chapter.xhtml#Par331)].
    His five-ton reengineered Mercedes van with the rather cumbersome name VaMoRs –
    a German abbreviation for “Versuchsfahrzeug für Autonome Mobilität und Rechnersehen” –
    was able to automatically control its steering wheel, throttle, and breaks based
    on the real-time evaluation of image sequences recorded by a video camera. VaMoRs
    was successfully demonstrated to drive on motorways at high speed as well as on
    two-lane roads at 19 mph with obstacle avoidance at day and night. Its operation
    was also based on a perceptron that controlled this semiautonomous vehicle.


    The real inflection point for autonomous driving did, however, come with the Iraq
    War in 2004, when the American Defense Advanced Research Projects Agency or DARP
    proposed such vehicles to increase the safety of soldiers. Various (semi)automated
    vehicles have been built since then, and Google Alphabet+Waymo, Amazon+Zoox, Argo
    AI, Lyft, and Tesla are just a few companies besides established automobile manufacturers
    that moved into this worldwide business. In order to meet the very high safety
    standards, autonomous driving requires the redundant signal analysis of a range
    of different sensors and control units including cameras, ultrasonic and radar
    sensors, wheel ticks and steering angle sensors, as well as navigational systems.^([^(119)](#fn119))
    Even at low levels of autonomy, self-driving vehicles are required to process
    more than 10 GB/s, which is a very substantial amount of data – your smartphone
    with 32 GB of storage memory, for comparison, would be full in less than four
    seconds assuming its memory would even be able to store data at this high speed.
    Fully autonomous self-driving vehicles with the highest level of autonomy are
    even expected to operate with bandwidths of up to 100 GB/s. To understand the
    nuances between the different degrees of automatization, SAE International – previously
    known as the Society of Automotive Engineers – has established the following five
    SAE *levels of autonomy* :


    *   *Level 0* – no automatization: A human controls the entire vehicle without
    any automation technology.


    *   *Level 1* – driver assistance: A computer controls limited functions, such
    as adaptive cruise control or the speed limiter, but only one function at a time.


    *   *Level 2* – partial automation: The vehicle has combined automated functions,
    such as acceleration and steering, that can be engaged at the same time.


    *   *Level 3* – conditional automation: The car automates all safety functions.
    The driver is not required to monitor the environment but must be ready to intervene
    if something goes wrong.


    *   *Level 4* – high automation: The car can generally drive itself, but there
    are rare cases and situations in which the driver must participate.


    *   *Level 5* – full automation: The holy grail of autonomous driving, in which
    the car is completely autonomous and does not require the driver to do anything
    unless they like to control the vehicle on their own.


    Due to the enormous amount of data that has to be interpreted to solve the autonomous
    driving task, it is generally accepted that artificial intelligence is the most
    promising way to implement full automation. From a technological point of view,
    there are currently two main approaches to SAE level 5 autonomy based on artificial
    intelligence, which differ in terms of the sensors used to determine the distance
    and speed of objects. The (1) camera-based approach relies on light-optical cameras
    and radar only, while the (2) LiDAR-based approach uses a combination of laser
    scanners, cameras, and radar to navigate the autonomous vehicle. In this context,
    LiDAR stands for “Light Detection and Ranging” and refers to a method for measuring
    spatial distances between objects by illuminating them with laser light and measuring
    the resulting reflection with a sensor. The most popular proponents of both technologies
    are Tesla and Waymo for the first and second approach, respectively.


    Tesla’s approach to autonomous driving is quite unique and entirely different
    to the one of Waymo and other automobile manufacturers as they neither use LiDAR
    for range detection nor high-definition navigational maps. Tesla rather pursues
    an entirely vision-based approach that involves real-time processing and analysis
    of raw video streams collected from eight cameras based on artificial neural networks.
    In order to process this very large amount of data, Tesla has developed its own
    “full self-driving” or FSD computer to process the data of 8 cameras, 12 ultrasonic
    sensors, 1 radar sensor, and GPS, as well as card data from the navigational system.
    The maximum input rate of Tesla’s FSD computer amounts to 2.5 billion pixels per
    second, which corresponds to roughly 1,200 full-HD images per second where one
    “full high-definition” image contains 1,920 × 1,080 pixels by definition. Since
    AlexNet, a convolutional neural network with 8 layers and more than 60 million
    weights, won the ImageNet competition in 2012 [[92](#505424_1_En_4_Chapter.xhtml#Par332)]
    and outperformed the human benchmark [[93](#505424_1_En_4_Chapter.xhtml#Par333)],
    those networks have become the method of choice for image classification and object
    recognition.^([^(120)](#fn120)) For this reason, Tesla’s FSD computer is equipped
    with two redundant NPUs that emulate convolutional neural networks.^([^(121)](#fn121))
    The overall process is shown in Figure [4-16](#505424_1_En_4_Chapter.xhtml#Fig16)
    schematically . Each NPU comprises more than six billion transistors that can
    execute more than 72 trillion additions and multiplications per second. Further
    technical information about Tesla’s FSD computer is available in [[95](#505424_1_En_4_Chapter.xhtml#Par335),
    [96](#505424_1_En_4_Chapter.xhtml#Par336)], for example.


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig16_HTML.jpg](images/505424_1_En_4_Chapter/505424_1_En_4_Fig16_HTML.jpg)


    Figure 4-16


    Schematic diagram of the Tesla autopilot. The FSD computer takes different camera
    images as its input; runs different object recognition algorithms, such as road
    prediction (dashed lines); and labels the detected object in the output image'
  trans: '

    # 计算机视觉：自动驾驶


    自动驾驶是计算机视觉的第三项应用，值得提及并详细阐述。尽管自动驾驶汽车常被视为非常新颖的技术，但研究人员和工程师已经为此努力了三十多年。对计算机控制车辆的研究始于卡内基梅隆大学，1986
    年他们制造了全球首辆计算机控制车辆，名为"Navlab 1"。`Navlab 1`由雪佛兰厢式货车改装而成，配备了五台计算机硬件机架，包括一个全球定位系统（`GPS`）。遗憾的是，这辆车受到各种软件限制，直到
    20 世纪 80 年代末才完全投入运行。大约在同一时间，迪恩·波默洛在同一机器人研究所开始开发`ALVINN`，即"基于神经网络的自主陆地车辆"。`ALVINN`在驾驶室顶部安装了一台摄像机，专为道路跟随任务设计。它由一个由伊恩·古德费洛的反向传播算法训练的人工三层神经网络控制，能够以高达
    70 英里/小时的速度行驶[90]。这是卡内基梅隆大学经过八年军方资助研究的结果。


    另一辆具有历史意义且同样传奇的自动驾驶汽车于 1985 年出现在大洋彼岸的德国，由德国动态计算机视觉先驱恩斯特·迪克曼斯开发[91]。他重达五吨的改装梅赛德斯厢式货车名为`VaMoRs`（德语"用于自主移动和计算机视觉的实验车辆"的缩写），能够基于摄像机记录的图像序列的实时评估，自动控制方向盘、油门和刹车。`VaMoRs`成功展示了其在高速公路上高速行驶、在双车道公路上以
    19 英里/小时的速度行驶并实现昼夜避障的能力。其运行同样基于一个控制这辆半自主车辆的学习机。


    然而，自动驾驶的真正转折点出现在 2004 年的伊拉克战争期间，当时美国国防高级研究计划局（DARPA）提出使用此类车辆来提高士兵的安全性。自那时起，各种（半）自动化车辆被制造出来，除了知名汽车制造商外，Google
    Alphabet+Waymo、Amazon+Zoox、Argo AI、Lyft 和特斯拉等公司也纷纷进入这一全球业务。为了满足极高的安全标准，自动驾驶需要对一系列不同的传感器和控制单元进行冗余信号分析，包括摄像头、超声波和雷达传感器、车轮脉冲和转向角传感器以及导航系统。^(¹¹⁹)
    即使在低级别的自动驾驶中，自动驾驶车辆也需要处理超过 10 GB/s 的数据量——这是一个非常庞大的数据量；相比之下，你的 32 GB 存储内存的智能手机如果以这种高速存储数据，不到四秒就会存满。最高级别的全自动驾驶汽车甚至预计需要高达
    100 GB/s 的带宽来运行。为了理解不同自动化程度之间的细微差别，SAE International（原美国汽车工程师学会）制定了以下五个 SAE 自动驾驶级别：


    *   **0 级** – 无自动化：人类在没有自动化技术的情况下完全控制车辆。

    *   **1 级** – 驾驶员辅助：计算机控制有限功能，例如自适应巡航控制或限速器，但一次仅控制一项功能。

    *   **2 级** – 部分自动化：车辆具有组合的自动化功能，例如加速和转向，可以同时启用。

    *   **3 级** – 条件自动化：汽车自动化所有安全功能。驾驶员无需监控环境，但必须准备好在出现问题时进行干预。

    *   **4 级** – 高度自动化：汽车通常可以自动驾驶，但在极少数情况和场景下，驾驶员需要参与。

    *   **5 级** – 完全自动化：自动驾驶的圣杯，汽车完全自主，除非驾驶员愿意自己驾驶，否则无需做任何事。


    由于解决自动驾驶任务需要解读海量数据，人们普遍认为人工智能是实现完全自动化最有前景的方式。从技术角度来看，当前主要有两种基于人工智能实现 SAE 5 级自动驾驶的方法，它们在用于确定物体距离和速度的传感器方面有所不同。(1)
    基于摄像头的方法仅依赖光学摄像头和雷达，而(2) 基于激光雷达的方法则结合使用激光扫描仪、摄像头和雷达来导航自动驾驶车辆。在这里，LiDAR 代表"光检测与测距"，指的是一种通过用激光照射物体并用传感器测量其反射来测量物体之间空间距离的方法。这两种技术最著名的支持者分别是特斯拉（第一种方法）和
    Waymo（第二种方法）。


    特斯拉的自动驾驶方法非常独特，与 Waymo 及其他汽车制造商完全不同，因为他们既不使用激光雷达进行距离探测，也不使用高清导航地图。特斯拉采用了一种完全基于视觉的方法，涉及基于人工神经网络对来自八个摄像头的原始视频流进行实时处理和分析。为了处理如此大量的数据，特斯拉开发了自己的"全自动驾驶"或`FSD`计算机，用于处理来自
    8 个摄像头、12 个超声波传感器、1 个雷达传感器以及 GPS 和导航系统的地图数据。特斯拉`FSD`计算机的最大输入速率达到每秒 25 亿像素，这大约相当于每秒
    1200 张全高清图像（一张"全高清"图像定义为包含 1,920×1,080 像素）。自 2012 年`AlexNet`（一个拥有 8 层和超过 6000
    万个权重的卷积神经网络）赢得 ImageNet 竞赛[92]并超越人类基准[93]以来，这些网络已成为图像分类和物体识别的首选方法。^(¹²⁰) 因此，特斯拉的`FSD`计算机配备了两个模拟卷积神经网络的冗余
    NPU。^(¹²¹) 整个流程如图 4-16 所示。每个 NPU 包含超过 60 亿个晶体管，每秒可执行超过 72 万亿次加法和乘法运算。关于特斯拉`FSD`计算机的更多技术信息，可参阅例如[95,
    96]。


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig16_HTML.jpg](img/505424_1_En_4_Fig16_HTML.jpg)


    **图 4-16** – 特斯拉自动驾驶系统示意图。`FSD`计算机输入不同摄像头的图像；运行不同的物体识别算法，例如道路预测（虚线）；并在输出图像中标记检测到的物体。

    '
- fmt: '但这并非特斯拉创新性自动驾驶方法唯一有趣的方面。第二个方面是关于FSD计算机中NPU的训练。为此，特斯拉建立了一整套IT基础设施和生态系统，从道路上的车辆收集原始视频流和数据，以迭代方式提高其自动驾驶仪的性能。这些数据在一个大型全栈式共享骨干网络（类似于云）中进行分析，该网络包含不同的残差网络，特斯拉称之为“HydraNets”。每个`HydraNet`都是一个共享骨干网络，它对自动驾驶任务进行子采样，并专注于优化特定的子任务，例如标注交通标志、车道线、道路标记，或预测道路布局以优化车辆的遥测数据。特斯拉敏捷且迭代的软件开发流程依赖于快速原型设计和测试。该流程通常分为三个主要步骤：


    1.  第一步是开发某个功能的第一个近似版本，并使用`HydraNet`数据引擎对其进行训练，以便为FSD中不同的卷积网络找到一组合理的初始权重。

    2.  然后，这个近似版本通过无线软件更新部署到车队，但不会直接激活。它是在*影子模式*下运行的，这使得可以在真实条件下进行进一步测试。此模式还会收集软件仍然表现异常、运行不正确的交通状况的照片和视频流。^([^(122)](#fn122))

    3.  第三步涉及标记收集到的数据，并将其作为额外的示例纳入特斯拉`HydraNet`数据引擎的训练数据集中。这些额外的训练数据随后作为输入，用于通过相应的`HydraNet`进一步优化近似软件模型。


    这个三步流程有时被特斯拉称为*主动学习*，并会重复进行，直到软件能够在影子模式下记录的所有真实条件下可靠、安全地运行。一旦训练完成，软件的最终版本将通过无线更新部署到车队，同时影子模式被停用。多年来，特斯拉不断优化这一软件开发流程，并通过其自动驾驶仪从超过50个国家累积了超过10亿英里的数据。这些大数据未来可能会成为相对于其他汽车制造商的关键竞争优势^([^(123)](#fn123))。


    与特斯拉不同，`Waymo`和大多数传统汽车制造商采用基于激光雷达的自动驾驶方法。`Waymo`，前身为谷歌的自动驾驶汽车项目，目前是位于加利福尼亚州山景城的`Alphabet`（谷歌母公司）的美国子公司，旨在根据其自身信息打造“世界上最有经验的驾驶员™”。其产品组合包含两项服务：一项名为“`Waymo
    One`”的商业自动驾驶出租车服务，以及一项名为“`Waymo Via`”的商业货物配送服务。`Waymo`的竞争优势在于其独特且高度精细的测绘技术，这些技术能帮助车辆即使在传统地理定位系统难以工作的区域（如隧道或摩天大楼之间）也能导航。`Waymo`的技术套件由四个定制构建的关键组件组成：（1）用于生成高精度环境地图的激光雷达扫描仪，（2）视觉摄像头，（3）雷达传感器，以及（4）一个基于AI的计算平台[[97](#505424_1_En_4_Chapter.xhtml#Par337)]。其最新的第五代“`Waymo
    Driver`” [[98](#505424_1_En_4_Chapter.xhtml#Par338)]于2020年首次安装在旧金山湾区部署的一系列全电动`Jaguar
    I-Pace`车辆上。该系统配备了四个周视激光雷达，以提供无与伦比的覆盖范围和宽视场角，用于短距离探测。此外，它还在车顶的“`Waymo Dome`”盒子中安装了一个360度激光雷达，可提供车辆以及周围行人和物体的300米鸟瞰视图。该系统辅以29个视觉摄像头，用于360度和周边远距离探测，其中16个位于穹顶的激光雷达下方。另有13个摄像头集成在车身周围，其中一些能够以高分辨率看到超过500米远的距离。周视和周边视觉系统与六个高分辨率成像雷达协同工作，这些雷达能够在雨、雾、雪等恶劣天气条件下跟踪静止和移动的物体。由于海量的感官数据，`Waymo`开发了一种完全不同的环境数据处理方法，称为“`VectorNet`”
    [[99](#505424_1_En_4_Chapter.xhtml#Par339)]。这个相当新的机器学习模型首先将从其高精度地图（如车道、停止线和交叉路口）获得的语义信息转换为向量，即具有长度和方向的几何对象。然后将这些向量输入一种特殊的人工神经网络，称为*层次图神经网络*
    [[100](#505424_1_En_4_Chapter.xhtml#Par340)]，该网络能更好地捕捉各种向量之间的关系，因为其神经元通常不再按层组织，而是分布在一个网络——即所谓的*图*——中。例如，当汽车进入交叉路口或行人接近人行横道时，就会发生这种物体轨迹与道路特征之间的关系。`Waymo
    Driver`中使用的特定图被特意选择用来最佳描述不同感官输入之间非常复杂且高度相互依赖的关系。作为`Alphabet`的一部分，`Waymo`使用谷歌强大的云计算基础设施来访问不同的`TPU`以训练其图神经网络，这支撑了公司达到`SAE`（美国汽车工程师学会）5级自动驾驶的雄心壮志以及最终的自动驾驶技术领导地位的主张。从2020年10月开始，`Waymo`宣布将在短期内向其打车服务的所有客户开放完全无人驾驶服务，前排座位上无需安全驾驶员[[101](#505424_1_En_4_Chapter.xhtml#Par341)]。


    由于自动驾驶技术整体市场已变得越来越模块化，像`Nvidia`这样的成熟微芯片制造商最近也开始投资这项技术。根据具体的自动驾驶级别，`Nvidia`在其`DRIVE
    AGX`系列中提供一整套基于摄像头和激光雷达的自动驾驶计算机^([^(124)](#fn124))。其最新的芯片组`Nvidia DRIVE AGX Orin`已于2019年发布，被设计为一个可从`SAE`（美国汽车工程师学会）2级扩展到5级的自动驾驶平台[[102](#505424_1_En_4_Chapter.xhtml#Par342)]，这对于那些决定不自行开发该技术的传统汽车制造商来说尤其具有吸引力。根据其自身信息，`Nvidia`目前正在与大众、丰田、奥迪、梅赛德斯-奔驰、宝马和沃尔沃等公司合作。'
  raw: 'But this is not the only interesting aspect of Tesla’s innovative approach
    to autonomous driving. The second is about the training of the NPUs in the FSD
    computer. For this purpose, Tesla built an entire IT infrastructure and ecosystem
    that collect raw video streams and data from its vehicles on the streets to improve
    the performance of their autopilot iteratively. The data is analyzed in a large
    full-stack and shared backbone – similar to a cloud – that contains different
    residual networks, which Tesla calls “HydraNets.” Each HydraNet is a shared backbone
    that subsamples the autonomous driving task and focuses on the optimization of
    specific subtasks, such as annotating traffic signs, lane lines, road markings,
    or predicting road layouts to optimize the vehicle’s telemetry. Tesla’s agile
    and iterative software development process relies on rapid prototyping and testing.
    It is generally organized in three main steps:


    1.  The first step is about developing a first approximate version of a functionality
    and training it with the HydraNet data engine to find a reasonable set of weights
    for the different convolutional networks in the FSD to start with.


    2.  This approximate version is then deployed to the fleet via a software update
    over the air but not activated directly. It is rather operated in *shadow mode*
    that allows for further testing under real-life conditions. This mode further
    sources photos and video streams of traffic situations where the software is still
    misbehaving and not operating correctly.^([^(122)](#fn122))


    3.  The third step involves labeling the collected data and incorporating it as
    additional examples into the training datasets of Tesla’s HydraNet data engine.
    This additional training data then serves as the input for further optimization
    of the approximate software model by the respective HydraNet.


    This three-step process is sometimes referred to as *active learning* by Tesla
    and repeated until the software operates under all real-life conditions recorded
    in shadow mode reliably and safely. Once its training has been completed, the
    final version of the software is deployed to the fleet via an update over the
    air with the shadow mode being deactivated. Tesla has optimized this software
    development process over the years and accumulated data from more than one billion
    miles in more than 50 countries with its autopilot. This big data may occasionally
    turn out to be a crucial competitive advantage over other automobile manufacturers
    in future.^([^(123)](#fn123))


    In contrast to Tesla, Waymo and the majority of traditional automobile manufacturers
    pursue the LiDAR-based approach to autonomy. Waymo, the former self-driving car
    project of Google, is meanwhile an American subsidiary of Alphabet in Mountain
    View, California, and aims to build the World’s Most Experienced Driver^™ according
    to own information. Its portfolio surmounts two services, a commercial self-driving
    taxi service called “Waymo One” and a commercial goods delivery service called
    “Waymo Via.” Waymo’s competitive advantage relies on a unique set of elaborate
    and highly detailed mapping technologies that help vehicles to navigate even where
    traditional geo-positioning systems struggle, like in tunnels or between skyscrapers.
    Waymo’s technology suite is made up of four custom-built key components: (1) LiDAR
    scanners to generate highly detailed maps of the environment, (2) visual cameras,
    (3) radar sensors, and an (4) AI-powered compute platform [[97](#505424_1_En_4_Chapter.xhtml#Par337)].
    Its latest fifth-generation “Waymo Driver” [[98](#505424_1_En_4_Chapter.xhtml#Par338)]
    was installed on a series of all-electric Jaguar I-Pace vehicles deployed in the
    San Francisco Bay Area in 2020 first. The system reveals four perimeter LiDARs
    to offer unparalleled coverage with a wide field of view for short-range detection.
    Furthermore, it employs one 360-degree LiDAR located on the roof box called Waymo
    Dome to provide a 300 m bird’s-eye view of the vehicle as well as pedestrians
    and objects around it. The system is supplemented by 29 visual cameras for 360-degree
    and peripheral long-range detection, 16 of which are located under the LiDAR on
    the dome. Thirteen cameras are integrated along the vehicle body with some of
    them being capable of seeing more than 500 m in high resolution. The perimeter
    and peripheral vision systems work in conjunction with six high-resolution imaging
    radars that allow for tracking steady and moving objects under challenging weather
    condition, such as rain, fog, and snow. Due to the enormous amount of sensory
    data, Waymo developed an entirely different approach to environmental data processing
    called “VectorNet” [[99](#505424_1_En_4_Chapter.xhtml#Par339)] . This fairly new
    machine learning model first converts the semantic information obtained from its
    high-definition maps – such as lanes, stop lines, and intersections – to vectors,
    that is, geometric objects with a length and direction. Those vectors are then
    fed into a special type of artificial neural network called *hierarchical graph
    neural network* [[100](#505424_1_En_4_Chapter.xhtml#Par340)] that better captures
    the relationships between the various vectors since its neurons are generally
    not organized in layers anymore but a distributed network – a so-called *graph*
     – instead. Such relationships between object trajectories and road features occur
    when a car enters an intersection or a pedestrian approaches a crosswalk, for
    example. The particular graph used in the Waymo Driver has been purposely chosen
    to best describe the very complex and highly interdependent relationships between
    the different sensory inputs. As part of Alphabet, Waymo uses Google’s high-powered
    cloud computing infrastructure to access different TPUs for training its graph
    neural networks, which underpins the company’s ambitious goals of SAE level 5
    and ultimate leadership claim in autonomous driving technology. Beginning in October
    2020, Waymo announced to open up its fully driverless offering without a human
    safety driver in the front seat to all customers of its ride-hailing service in
    the near term [[101](#505424_1_En_4_Chapter.xhtml#Par341)].


    Since the overall market for autonomous driving technologies has become increasingly
    modular, established microchip manufacturers like Nvidia also started to invest
    in this technology lately. Depending on the particular level of autonomy, Nvidia
    offers a whole range of camera- and LiDAR-based autonomous driving computers within
    its DRIVE AGX series.^([^(124)](#fn124)) Its latest chipset, the Nvidia DRIVE
    AGX Orin, has been announced in 2019 and designed as an autonomous driving platform
    that can be scaled from SAE level 2 to level 5 [[102](#505424_1_En_4_Chapter.xhtml#Par342)],
    which is particularly interesting for traditional automobile manufacturers, who
    did not decide to develop this technology in-house. According to own information,
    Nvidia currently collaborates with, inter alia, Volkswagen, Toyota, Audi, Mercedes-Benz,
    BMW, and Volvo.'
