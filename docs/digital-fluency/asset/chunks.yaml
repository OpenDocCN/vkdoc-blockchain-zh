    and access rights and permissions can be controlled for each node individually.
    In other words, distributed ledger technology allows people, who neither know
    nor trust each other, to exchange with one another without any centralized intermediate
    since they can trust the network itself. This drastically reduces the “cost of
    trust” from an economist’s point of view and may help to mitigate our societies’
    dependence on banks, governmental institutions, notaries, and other regulatory
    compliance officers on a longer term. Distributed ledger and blockchain technology,
    in particular, do therefore present an entirely new paradigm for how information
    is collected and shared. By cutting out the middleman, blockchain technology is
    poised to revolutionize the way individuals, enterprises, and governments transact
    with each other.


    Distributed Networks


    In contrast to a centralized network, a distributed network spreads its information
    across a wide network of computers. There is no need for a central server or mediating
    authority as each computer of the network is a central server and client at the
    same time.


    ### 3.2.2 The Immutable Data Structure


    But how is the information kept in a blockchain file structured, and how does
    it provide trust in untrusted environments? Blockchain technology bundles data
    and information about transactions up in standardized *blocks* of a fixed size
    and data format according to the technical specifications in its underlying network
    protocol.


    Table 3-2


    Hash values of an exemplary transaction message based on the SHA-1 hash function.
    The comparison between the two reveals that even minor changes in the input (bold
    text) cause major changes in the output. Empty spaces and line breaks in the output
    are inserted for clarity. The output was generated by using the public hash function
    generator on [`www.blockchain-basics.com/HashFunctions.html`](http://www.blockchain-basics.com/HashFunctions.html)


    | Line | Message (Input) | Hash of Message (Output) |

    | --- | --- | --- |

    | 1. | From: Alice (1PrsFtga), To: Bop (3kLMnbTY), Amount: USD **10** | ED83 1EC2
    B307 C014 ADBA 2E10 670F CD7F 24D0 9E77 |

    | 2. | From: Alice (1PrsFtga), To: Bop (3kLMnbTY), Amount: USD **100** | BE3D
    4C54 8705 ACC1 9D2B 0E44 D594 6C31 58A5 8CF1 |


    These blocks are itself “chained” or linked together with the preceding blocks
    by employing *cryptographic hash functions* .


    But before we have a closer look on this particular linkage, it is instructive
    to understand some fundamental properties of cryptographic hash functions in general.
    Like any other mathematical function, they have an input and output value. The
    input consists of the actual transaction text, such as “From: Alice (1PrsFtga),
    To: Bop (3kLMnbTY), Amount: USD 10,” that documents that Alice has transferred
    USD 10 from her account number 1PrsFtga to Bop’s account with the number 3kLMnbTY.
    In case of cryptographic hash functions, the individual account number of each
    transaction entity is called *public key* and composed of numbers and letters
    for reasons that will become obvious later on. One of the most popular hash functions
    is the secure-hash-algorithm-1 or *SHA-1* that has been developed in 1993 jointly
    by the US National Institute of Standards and Technology and the US National Security
    Agency to implement digital signatures.^([^(56)](#fn56)) Like any other hash function,
    SHA-1 converts any information in plaintext of arbitrary length to a string of
    letters and numbers with a fixed length – in the case of SHA-1, the output value
    always reveals 40 symbols in total.


    Further to converting an input of arbitrary length to an output of fixed length,
    cryptographic hash functions have another striking property: even little changes
    of the input value cause major changes in the output as shown in Table [3-2](#505424_1_En_3_Chapter.xhtml#Tab2)
    exemplarily. Cryptographic hash functions do generally have the following very
    important properties. They are


    *   *Pseudorandom*, that is, the output changes unpredictably if the input changes^([^(57)](#fn57))


    *   *Deterministic*, that is, the input determines the output


    *   *Nonreversible* so that the input cannot be constructed based on the output


    *   *Unique* (or “collision resistant”), that is, each input has a unique hash
    value and identical inputs will have identical outputs^([^(58)](#fn58))


    Since the output does always have a fixed length and is unique, cryptographic
    hash functions provide an ideal and very efficient technique for determining whether
    two digital objects are equal or not.


    Cryptographic Hash Function


    A cryptographic hash function is an algorithmic function that converts any information,
    such as a text message with an arbitrary length, into a string of numbers and
    letters. One of its core properties is that the length of its output strings is
    fixed and always the same, independently of the length of the input information.
    Furthermore, the output of a cryptographic hash function is (1) pseudorandom,
    (2) deterministic, (3) nonreversible, and (4) unique, that is, different inputs
    will always have different outputs.'
