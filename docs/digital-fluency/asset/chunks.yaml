  trans: '

    ## 5.4 确定试点项目


    一个组织的数字化改造当然不可能在一夜之间完成——这是一个转型之旅，而非一场短跑。此外，成熟企业往往需要在数字化改造组织架构和流程的同时，继续运营传统业务。因此，关键是要从试点项目（^(143)^）开始启动数字化之旅，以此在整个组织内激发热情，并推动其数字化转型。像微软或谷歌这样的创新型数字组织，总是会同时启动多个试点项目，以增加成功的几率。


    要使试点项目成功，它们需要满足某些关键标准。以下清单或许能帮助你为自身组织和应用场景（^(144)^）确定并筛选出最有前景的试点项目：


    -   **速赢**：为了在整个组织内激发热情，并说服利益相关者投资建设数字能力，理想的试点项目应能追求早期成果和快速胜利。一个试点项目从启动到交付最终成果，通常需要
    6 到 12 个月的时间。


    -   **可扩展性**：试点项目应具备可扩展性，以便在完成后能扩展到其他业务部门——可扩展性差是大多数试点项目面临的主要障碍。


    -   **行业特定重点**：试点项目应聚焦于那些你打算大规模推进、创造收益，并期望长期创造价值的领域。


    -   **具体的业务目的**：成功的试点项目始终聚焦于具体、明确的业务问题或挑战，以此进行试验和学习。这可能是一个棘手的内部流程，或是一个以前难以解决、现在可由数字技术处理的问题。换句话说，数字化和数字化转型需要满足具体的业务目的，其本身并非一种时尚的终点。


    在实践中，试点项目常常面临一个重大挑战，而这实际上是数字化转型失败的主要原因之一 [34]。这个挑战与第二个筛选标准——可扩展性相关，并被称为“概念验证陷阱”。它指的是那些拥有无限试点阶段的项目，这阻碍了原型及时在整个组织内成功推广。此类项目变成了无休止的“科学实验”，即使有简单可用的解决方案并能快速带来价值，它们也会部署过于复杂的方案来炫耀技术能力。这部分源于数字试点项目常常以非常“手工艺”的方式进行创新，缺乏既定的流程和交付计划。通过持续关注具体的业务目的，并在创新与工业化之间做出合理折衷，可以避免概念验证陷阱。成功的试点项目会同时探索有前景的创新原型及其工业化概念，而非按先后顺序进行。这种方法允许在产品或服务的第一个简单原型版本确立后，就能迅速推广成功特性——例如，想想前一章讨论过的特斯拉的自动驾驶及其主动学习策略。


    沃达丰集团首席执行官维托里奥·科劳将试点项目比作海上的船只，并用下面这些话精彩地阐述了相关的领导力挑战：


    > 在数据分析、自动化和人工智能领域，正刮起强大的新风——它们不会以完全相同的方式吹遍整个组织。在我的船队中，有些船会加速，而另一些船帆较小，无法捕捉到同样的动力。问题在于，你是允许每艘船按照自己的巡航速度前进（就像我们开始时那样），还是想整编船队并将其纳入一个大型计划（就像我们现在试图做的那样）。整编船队对组织有益，但你也冒着迫使他们以线性速度前进，最终被颠覆者超越的风险
    [35]。


    ## 5.5 赋能管理层与员工


    数字化转型另一个非常关键的方面是通过教育和培训持续赋能员工。再怎么强调这一措施也不为过，因为——简单来说——是人推动了变革 [36]。数字化转型需要传统组织通常缺乏的技术技能。数字试点项目依赖于多学科和敏捷的创新团队（^(145)^），在其中，不同的人才相互补充——多样性是成功的关键
    [37]。一个成功的数字产品开发团队（或“小队”（^(146)^））所需的技能范围，从数据科学（将数据转化为有价值的洞见和行动的能力）到项目管理、产品设计、软件开发、敏捷方法论（包括设计思维
    [39]、蓝海战略 [40] 和 Scrum [41]）、市场营销和讲故事的能力 [42]。例如，文献 [43] 为在数字时代建立成功的项目团队提供了一个富有洞见的框架。


    为了使数字化转型长期成功，每个团队成员，无论其技术背景如何，都必须对数字技术有基本的了解，并适应数字化思维方式。这正是两位美国谷歌高管埃里克·施密特和乔纳森·罗森伯格所称的“智慧创意者”
    [44]，指的是将技术深度与商业智慧和创造力相结合的新型员工。数字教育不仅对于开发数字产品和服务、解读（大）数据分析结果至关重要，而且对于预测技术趋势以及评估其对组织短期和长期的潜在影响也至关重要。这就是数字化转型通常涉及开展以下工作的原因：


    1.  大型内部技能提升计划，以激活和留住数字人才

    2.  外部招聘计划，以在数字技能和知识稀缺的领域吸引新人才

    3.  与`Upwork`、`Topcoder`和`Kaggle`等在线人才平台进行外部合作，以临时雇佣试点项目所需的数字专业知识


    第三个选项尤为重要，因为组织无法一次性学会所有东西。他们反而必须专注于内部开发核心数字能力，并从外部渠道雇佣其他所有能力。这就是为什么组织提前确定并优先考虑他们最需要的数据技能至关重要
    [45]。


    例如，鉴于人工智能对其业务日益增长的重要性，美国软件公司 Adobe 最近为其全球超过 5000 名工程师启动了一个为期六个月的机器学习培训和认证项目。然而，你在数字试点项目中所需的特定技能，将很大程度上取决于你打算在多大程度上深入数字技术及相关任务（如软件开发和编程）。好消息是，许多云计算供应商和开源平台免费提供软件工具和在线培训——数字技术和知识正在慢慢普及化。


    赋能员工也涉及培养数字化领导者以及转变管理层的角色。根据马可·伊安西蒂和卡里姆·拉卡尼的观点，

