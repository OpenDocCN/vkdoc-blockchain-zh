- fmt: '### 1.3.1 Major Driving Forces


    Digital disruption is a very strong force that has been changing the corporate
    landscape ever since. Today’s organizations are not just being driven to integrate
    digital technologies into their core processes. They do also frequently find themselves
    competing with innovative new players outside of their own industry now, such
    as automobile manufacturers and mobility service providers [[28](#505424_1_En_1_Chapter.xhtml#Par230)].
    As vehicles are becoming increasingly connected, the business model of established
    automobile manufacturers is threatened by digital business models that deliver
    marketplaces for on-demand entertainment and infotainment services. Both features
    are increasingly embedded in the vehicle’s ecosystem and target drivers and passengers
    of autonomous vehicles in transit, for example – the vehicle turns into a “smartphone
    on wheels” so to say [[29](#505424_1_En_1_Chapter.xhtml#Par232)]. The mobility
    service providers `Uber`, `Lyft`, `DiDi`, and `Waymo` as well as the (open source)
    automotive operating system provided by `Google Automotive Services` are just
    a few companies that point the way toward a highly connected and service-oriented
    driving experience. This is why software platform providers, in particular, are
    expected to occupy increasingly central positions in the automotive industry in
    future and are likely to connect and “orchestrate” traditional disparate players.
    This transformation of the automobile industry is also expected to impact connected
    business sectors including insurance companies, vehicle repair and maintenance
    providers, (charging) infrastructure providers, law enforcement authorities, as
    well as other governmental authorities that rely on automotive taxes, for example.
    A recent Harvard Business School study by the three economists Robert Bock, Marco
    Iansiti, and Karim Lakhani suggests that “digital leaders,” who embrace digital
    technologies to innovate their business model, outperform the operating margin
    and profit of “digital laggards” by more than one order of magnitude [[30](#505424_1_En_1_Chapter.xhtml#Par233)].
    In other words, making the right technology investment early on translates into
    higher profitability and revenue growth later on [[31](#505424_1_En_1_Chapter.xhtml#Par234)].
    So what are the major driving forces of this transformation, and what do we need
    to know about them to leverage the full potential of digital technologies? The
    most important ones are depicted in Figure [1-3](#505424_1_En_1_Chapter.xhtml#Fig3)
    and explained in the following consecutively.


    ![../images/505424_1_En_1_Chapter/505424_1_En_1_Fig3_HTML.png](images/505424_1_En_1_Chapter/505424_1_En_1_Fig3_HTML.png)


    **Figure 1-3** External driving forces (light gray) and four main pillars of digital
    transformation (dark gray)


    #### Major Driving Forces: Complexity


    Complexity is probably among the strongest driving forces and has various catalysts.
    It is driven by, inter alia, (1) personalization, the holy grail of marketing
    aiming to provide customers with an individually tailored product experience,
    (2) globalization and its increasingly complex supply chains comprising numerous
    suppliers and partners, and (3) digitalization and the increasing amount of data
    that has to be considered in decision making. With respect to personalization
    and the increasing variety of products and services, Joris Evers, the chief of
    communications at `Netflix`, framed it nicely and told *The New York Times* in
    2013: “There are 33 million different versions of `Netflix`” [[32](#505424_1_En_1_Chapter.xhtml#Par235)],
    meaning that the customer experience of each user is increasingly personalized
    and tailored to individual needs.


    #### Major Driving Forces: Agility and Flexibility


    Agility, flexibility, and speed of internal business processes are required to
    succeed in highly dynamic and fast-changing business environments in an increasingly
    globalized world. Agile product development processes, for instance, are crucial
    for shortening development times and meeting the expectations of customers, who
    await frequent updates and the rapid integration of their feedback into existing
    products and services.


    #### Major Driving Forces: Cybersecurity


    Cybersecurity regards the protection of data relevant for an organization’s competitive
    advantage, such as intellectual property rights and customer data, from theft
    or damage. It is increasingly relevant in the digital age, where data is not limited
    to closed databases and legacy systems anymore but can rather flow through networks
    unimpededly. It is unlikely to make much money from high cybersecurity standards
    alone, but poor cybersecurity can cost organizations a lot of time, money, and
    trouble. One of the most prominent examples in this context is the “`WannaCry`”
    program that infiltrated numerous organizations in 150 countries worldwide in
    spring 2017. This program was distributed via email, locked computers, and required
    users to pay a certain amount of money to unlock their devices – the economic
    losses from this cyberattack were estimated to be around USD four billion worldwide.
    Cyberattacks are fast-growing risks for individuals, businesses, and governments
    causing both financial and reputation harm. This is why it is not surprising that
    the IT security market is growing by 10% per annum. But this increase is unfortunately
    not keeping up with the number of threats, which is roughly doubling each year
    – another example for a mismatch between exponential technology growth and linear
    business reaction.


    #### Major Driving Forces: Efficiency


    Efficiency is a trend that has been shaping organizations ever since. It generally
    describes the ability to avoid wasting resources including materials, energy,
    efforts, money, and time. The *efficiency principle* is an economic tenet stating
    that a business is most efficient if it produces its products and services at
    the least possible cost. Since digital technology does also allow for saving money
    by streamlining internal processes, efficiency is an almost natural driving force
    for the digital transformation of organizations.


    #### Major Driving Forces: Automation


    Automation refers to the increase of productivity by automating production processes.
    This includes the automation of industrial manufacturing by smart, context-aware
    robots but also the automation of rather administrative processes including logistics
    and inventory management systems. An example for the automation of administrative
    processes is automated payments that are executed upon the fulfillment of certain
    contractual conditions, such as the receipt of goods in a company’s warehouse.


    #### Major Driving Forces: Sustainability


    Sustainability refers to the optimal utilization of limited (natural) resources.
    This driving force spans from avoiding waste to minimizing environmentally harmful
    emissions and relies on optimizing material and energy-consuming processes. One
    example is emobility, which allows for reducing environmentally harmful emissions
    during the production and operation of battery electric vehicles.'
