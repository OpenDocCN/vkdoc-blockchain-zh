- fmt: '# 1.3 The Digital Ecosystem


    Due to their great relevance for business and society, digitalization and digital
    transformation are intensively studied in literature. Management consultancies
    as well as digital-age companies like Google, Microsoft, and Amazon frequently
    publish insightful articles and reports about them on their blogs.^([^(11)](#fn11))
    Different definitions for digitalization and digital transformation evolved over
    time, each of which highlights different aspects. The two communication scientists
    Scott Brennen and Daniel Kreiss, for example, define digitalization through the
    impact of digital communication and media on contemporary social life [[18](#505424_1_En_1_Chapter.xhtml#Par220)].
    A more practical definition is provided by the Oxford English Dictionary, which
    traces the first uses of the term “digitalization” back to the arrival of computers
    in the mid-1950s and defines it as “the adoption or increase in use of digital
    or computer technology by an organization, industry, country, etc.” Furthermore,
    this principle dictionary of the English language differentiates between digitalization
    and digitization with the latter being defined as “the action or process of digitizing;
    the conversion of analog data (esp. in later use images, video, and text) into
    digital form.” One of the most intuitive definitions can actually be found in
    Gartner’s IT glossary, which provides the following definitions for those terms^([^(12)](#fn12))
    [[19](#505424_1_En_1_Chapter.xhtml#Par221)]:


    *   “*Digitization* is the process of changing from analog to digital form [...].
    Said another way, digitization takes an analog process and changes it to a digital
    form without any different-in-kind changes to the process itself.”

    *   “*Digitalization* is the use of digital technologies to change a business
    model and provide new revenue and value-producing opportunities; it is the process
    of moving to a digital business.”

    *   “*Digital transformation* can refer to anything from IT modernization (for
    example, cloud computing), to digital optimization, to the invention of new digital
    business models. The term is widely used in public-sector organizations to refer
    to modest initiatives such as putting services online or legacy modernization.”


    In other words, digitalization and digital transformation are entrepreneurial
    change processes that are enabled by digital general-purpose technologies. The
    definitions suggest that the three terms are inherently linked to each other and
    appear consecutively. This is why scholars sometimes visualize the relationship
    between them by using a pyramid structure depicted in Figure [1-1](#505424_1_En_1_Chapter.xhtml#Fig1)
    exemplarily. This simple graphics illustrates that digitization, digitalization,
    and digital transformation are built on each other with digitization being the
    foundational basis of them. Digitization simply converts information from sensors
    and other inputs to a digital format that allows for further data processing.
    Digitalization on the intermediate level uses this digital information to draw
    conclusions or find insightful hidden patterns that allow for saving money by
    optimizing and automating business processes. The highest level of this pyramid
    is digital transformation. It allows companies to save money but also earn additional
    money by creating new markets and providing new business opportunities. Digital
    transformation is enabled by digital technologies. This is why it is sometimes
    referred to as *technology-driven digital transformation* to emphasize that it
    relies on the integration and interdisciplinary convolution of different digital
    technologies into all core areas of an organization – an important aspect, which
    we will discuss in more detail in the following.


    ![../images/505424_1_En_1_Chapter/505424_1_En_1_Fig1_HTML.png](images/505424_1_En_1_Chapter/505424_1_En_1_Fig1_HTML.png)


    **Figure 1-1** Relationship between digitization, digitalization, and digital
    transformation


    ## Digital Transformation


    Digital transformation is a journey of strategically planned and far-reaching
    change process to implement a software- and data-centric organization. It is enabled
    by digitization and digitalization and fostered by leveraging digital support
    technologies, such as quantum computing, blockchain technology, and artificial
    intelligence.


    *Digital technology* generally facilitates the (1) processing, (2) communication,
    and (3) storage of digital information. The timely evolution of each of those
    core aspects has been described in terms of three exponential laws that have been
    observed empirically in the last few decades:


    1.  *Moore’s law* describes the exponential evolution of processing power and
    states that the number of processing units in computer chips doubles every 18
    months [[22](#505424_1_En_1_Chapter.xhtml#Par224)].

    2.  *Butter’s law* relates to the communication speed of networks, which doubles
    every 9 months [[23](#505424_1_En_1_Chapter.xhtml#Par225)].

    3.  *Kryder’s law* states that the storage capacity doubles every 13 months [[24](#505424_1_En_1_Chapter.xhtml#Par226)].


    Those are truly exponential and breathtaking timescales given that established
    products, such as automobiles, take more than 24 months of development time. While
    the three core dimensions of digital technologies reveal an exponential timely
    evolution, our brain is generally not used to such exponential developments. This
    is also why most leaders underestimate the impact of digital technologies on organizations,
    as they often revealed linear developments over the last couple of years. The
    resulting gap between the exponential technology and linear business evolution
    is depicted in Figure [1-2](#505424_1_En_1_Chapter.xhtml#Fig2) for clarity. It
    can generally be associated with unexploited business opportunities and is frequently
    filled by innovative startup companies that exploit digital technologies. This
    performance gap increases over time and visually captures the need for technology-enabled
    digital transformation.


    ![../images/505424_1_En_1_Chapter/505424_1_En_1_Fig2_HTML.png](images/505424_1_En_1_Chapter/505424_1_En_1_Fig2_HTML.png)


    **Figure 1-2** Linear business development (dashed line) vs. exponential technology
    evolution (solid line). The resulting gap (hatched area) is often filled by innovative
    startups


    But digital transformation is much more than the integration of digital technologies
    into an existing IT infrastructure for making processes paperless as mentioned
    earlier. The CIO community “The Enterprisers Project,” for instance, notes that
    “Digital transformation is the integration of digital technology into all areas
    of a business, fundamentally changing how you operate and deliver value to customers.
    It’s also a cultural change that requires organizations to continually challenge
    the status quo, experiment, and get comfortable with failure” [[25](#505424_1_En_1_Chapter.xhtml#Par227)].
    Digital transformation helps organizations to continue the progress of productivity
    and competitiveness in an increasingly globalized and connected world that is
    characterized by severe economic, environmental, and societal changes. The example
    of Kodak does – among others – clearly reveal that organizations who resist certain
    technologies are at risk of disruption.


    Experts have suggested various factors that could signal an industry’s vulnerability
    to disruption. The most important signs for disruption are


    *   Customer satisfaction is decreasing.

    *   Customer base is aging.

    *   Customers are inconvenienced [[26](#505424_1_En_1_Chapter.xhtml#Par228)].

    *   Customer loyalty is low [[27](#505424_1_En_1_Chapter.xhtml#Par229)].

    *   High costs of products and services trigger the use of technology to save
    costs rather than add value to the customer’s life [[26](#505424_1_En_1_Chapter.xhtml#Par228)].

    *   Increased interest from venture capitalists, who – as outsiders – see hidden
    opportunities in the sector.'
