    the cost function is sometimes also referred to as optimization objective.


    In order to access whether this line is a good fit or not, the linear regression
    model will evaluate the distances between the line and the different points in
    the cloud – these distances are indicated by vertical arrows in the same figure.
    It turns out that adding up the lengths of those arrows and squaring them is a
    more convenient way to determine the quality of this fit since squaring the distances
    accounts for positive and negative values equally. In machine learning, this sum
    of squared deviations is simply called *cost function* for historical reasons.
    Generally speaking, the cost function is the *optimization objective* of a machine
    learning model, and each algorithm has its own cost function. But how can we exploit
    this key concept further to find the best fit?


    ### 4.2.2 Minimization of the Cost Function


    Intuitively you may guess that the best strategy for finding the perfect linear
    fit to our rental offers is by minimizing the distances between the points in
    the point cloud and the fitted line. In other words, we just need to minimize
    the cost function. The fastest and most convenient way to do this is by employing
    a minimization (or optimization) algorithm called *gradient descent* , which is
    the second most important concept in artificial intelligence and machine learning.
    In case of your rental offers, gradient descent is carried out by iteratively
    drawing different lines through the point cloud, calculating the cost function
    after each step, and aiming to minimize it based on the most successful measures.
    Mathematically speaking, we systematically increase (or decrease) the slope and
    offset value of the line and calculate the cost function after each iteration.
    If decreasing the slope, for instance, turns out to reduce the cost function in
    one iteration, the algorithm will decrease it further in the next iteration and
    so on. In machine learning, this iterative procedure is called *training* of the
    linear regression model on the point cloud. The point cloud is therefore also
    called *training dataset* in this particular case.


    Gradient Descent


    Gradient descent is the most commonly used mathematical concept for minimizing
    the cost function of a machine learning algorithm.


    The overall procedure is shown in Figure [4-5](#505424_1_En_4_Chapter.xhtml#Fig5)
    schematically. Figure [4-5](#505424_1_En_4_Chapter.xhtml#Fig5) (a) shows a line
    that lies well above all points, which is why the gradient descent algorithm will
    first decrease both parameters, the slope and offset value, in order to move the
    line downward and decrease the overall cost function. This process continues until
    the line occasionally ends up somewhere within the points, which causes the cost
    function to increase. This “turning point” at which the cost function stops to
    decrease and starts to increase again in consecutive iterations can be considered
    as the optimum and perfect combination of slope and offset value. This final result
    is shown in Figure [4-5](#505424_1_En_4_Chapter.xhtml#Fig5) (b). Gradient descent
    does nothing else than finding this turning point, which corresponds to the perfect
    linear fit of the data in our point cloud. By extending the line beyond the point
    cloud to 80 m², we can finally predict the most probable price for an 80 m² apartment,
    which amounts to about USD 4,000 per month.


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig5_HTML.png](images/505424_1_En_4_Chapter/505424_1_En_4_Fig5_HTML.png)


    Figure 4-5


    Comparison of two lines that describe the rental offers in the point cloud (gray
    points). (a) shows a line that poorly fits the rental offers as it lies well above
    all points, which is why the deviations are very large (gray vertical arrows).
    In case of a very good fit, the deviations are much smaller (b). Extending the
    line beyond the point cloud (dotted arrow in (b)) allows us to predict the price
    for an 80 m² apartment (black dot)


    To this end, you may wisely note that the price of an apartment does not only
    depend on its size alone but also on the number of rooms, distance to the city
    center, and other key characteristics. The good news is that the linear regression
    model can easily be extended to account for more than one type of input data besides
    the apartment size. For this purpose, we simply add further terms to the cost
    function that quantify the additional characteristics, such as the number of rooms.
    The resulting model is called *multidimensional linear regression* for obvious
    reasons and is well suited for predicting customary real estate prices.


    This is how machine learning can assist us in finding the perfect apartment for
    you – there are, of course, other use cases of this algorithm in business, too.
    However, this simple example illustrates the two most fundamental concepts of
    artificial intelligence, namely, the (1) cost function and its (2) minimization
    by gradient descent or other optimization algorithms.^([^(91)](#fn91))'
  trans: '

    # 4.2.1 代价函数


    第一个概念是**代价函数**。为进一步说明，设想你将搬往另一个城市，比如位于传奇硅谷中心的旧金山——这里是数字技术的摇篮，也是美国众多互联网巨头的总部所在地。你做的第一件事可能是寻找一套体面且租金合理的公寓。为此，你可能会在网上、当地报纸及其他信息渠道浏览各种租房信息。假设你找到了四套公寓，月租金不同，面积分别为
    20、40、50 和 60 平方米。再假设这些公寓都不符合你的期望，因为它们都显得太小了。此外，想象你的预算中还剩下几百美元，你好奇一套 80 平方米的公寓可能要花多少钱，以及考虑到你的财务限制，这是否可行。此时，你可能回想起在学校学到的一个好方法：将数据可视化在图表中。于是你拿出一张纸，绘制价格与面积的对比图。你的图表可能类似于图
    4-4 所示。此外，你可能还记得本科数学课上讲过的知识：这样的点分布——技术上称为*点云*——最好通过一条穿过所有点中心的直线来描述，这条线称为*质心*。但我们如何找到那条完美拟合这些点、并可用于预测⁹⁰80
    平方米公寓最可能价格的直线呢？


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig4_HTML.png](img/505424_1_En_4_Fig4_HTML.png)


    **图 4-4** 不同租房信息的价格与面积散点图


    这是第一个机器学习算法的简单示例，数据科学家称之为*线性回归模型*。该模型输出一条直线，并为其提供一个简单的数学公式，完美描述了市场上公寓的常规租金与其面积的关系。有了这个公式，我们可以在最后一步将直线延伸至四个数据点之外，从而确定一套
    80 平方米公寓最可能的月租金。为了找到完美拟合该点云的直线，算法会先随机绘制一条具有特定斜率和偏移值的直线，如图 4-5(a)所示。


    **代价函数** 机器学习算法或程序的代价函数用于评估输入数据与预测输出之间的误差。所有机器学习算法的最终目标都是最小化这个误差，因此代价函数有时也被称为*优化目标*。


    为了判断这条直线是否拟合良好，线性回归模型会评估直线与点云中各点之间的距离——这些距离在图 4-5(a)中用垂直箭头表示。事实证明，将这些箭头的长度相加并求平方，是确定拟合质量更便捷的方法，因为平方处理能同等对待正负距离值。在机器学习中，这种偏差的平方和由于历史原因被简称为*代价函数*。一般来说，代价函数是机器学习模型的*优化目标*，每个算法都有自己的代价函数。但我们如何进一步利用这一关键概念来找到最佳拟合呢？


    ## 4.2.2 代价函数的最小化


    凭直觉你可能会猜到，为租房信息找到完美线性拟合的最佳策略是：最小化点云中各点与拟合直线之间的距离。换句话说，我们只需最小化代价函数。实现这一目标最快、最便捷的方法是使用一种称为*梯度下降*的最小化（或优化）算法，这是人工智能和机器学习中第二重要的概念。以你的租房信息为例，梯度下降通过反复绘制穿过点云的不同直线来实现：每一步计算代价函数，并基于最有效的措施力求将其最小化。从数学上讲，我们有系统地增大（或减小）直线的斜率和偏移值，并在每次迭代后计算代价函数。例如，如果某次迭代中减小斜率能降低代价函数，算法就会在下一次迭代中继续减小斜率，以此类推。在机器学习中，这种迭代过程被称为在线形*训练*线性回归模型。因此，点云在这种特定情况下也被称为*训练数据集*。


    **梯度下降** 梯度下降是最常用于最小化机器学习算法代价函数的数学概念。


    整个过程的原理图如图 4-5 所示。图 4-5(a)显示了一条位于所有点之上的直线，因此梯度下降算法会先同时减小斜率和偏移值这两个参数，使直线下移，从而降低整体代价函数。这个过程会持续进行，直到直线偶然落入点云内部，这会导致代价函数上升。这个代价函数在连续迭代中停止下降并开始上升的“转折点”，可以被视为斜率和偏移值的最佳、最完美的组合。最终结果如图
    4-5(b)所示。梯度下降所做的无非就是找到这个转折点，它对应于点云数据的最佳线性拟合。通过将直线从点云延伸至 80 平方米处，我们最终可以预测出 80 平方米公寓的最可能价格，约为每月
    4000 美元。


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig5_HTML.png](img/505424_1_En_4_Fig5_HTML.png)


    **图 4-5** 描述点云（灰点）中租房信息的两条直线对比。(a) 显示了一条拟合效果较差的直线，因为它位于所有点之上，导致偏差非常大（灰色垂直箭头）。而拟合效果良好时，偏差则小得多
    (b)。将直线延伸至点云之外（(b)中的虚线箭头），使我们能够预测 80 平方米公寓的价格（黑点）


    至此，你可能会明智地指出，公寓的价格不仅取决于面积，还取决于房间数量、到市中心的距离以及其他关键特征。好消息是，线性回归模型可以轻松扩展，以处理除面积之外的多类输入数据。为此，我们只需在代价函数中添加其他项，用以量化额外的特征，例如房间数量。由此产生的模型，出于显而易见的原因，被称为*多维线性回归*，非常适合预测常规房地产价格。


    这就是机器学习如何帮助我们为你找到完美公寓的——当然，该算法在商业领域也有其他用例。然而，这个简单的例子阐明了人工智能的两个最基本概念，即：(1) 代价函数，以及
    (2) 通过梯度下降或其他优化算法对其实现的最小化。⁹¹

    '
- fmt: "# 4.3 The Five Categories of Learning\n\nFurther to this regression model,\
    \ data scientists have been developing a whole range of further machine learning\
    \ algorithms, each of which has its own set of use cases.^([^(92)](#fn92)) Even\
    \ though the resulting range of applications is very large and equally versatile,\
    \ the algorithms can be divided into five major categories depending on their\
    \ particular training strategy. The categories are called supervised, unsupervised,\
    \ deep, and reinforcement learning as well as ensemble methods. A general but\
    \ not comprehensive overview of the most popular algorithms is shown in Figure\
    \ [4-6](#505424_1_En_4_Chapter.xhtml#Fig6), which we discuss in further detail\
    \ in the following.\n\n## 4.3.1 Supervised Learning\n\nThe careful reader will\
    \ have noticed in our previous example that the linear regression model was optimized\
    \ by iteratively comparing its output – the fitted line – to its input, the training\
    \ dataset. This is an example for *supervised learning*, which is always based\
    \ on *labeled data*. Labeled data refers to a dataset that is comparable to the\
    \ previous example, in which every input value (apartment size) is related to\
    \ one output value (apartment prize). In this case, the cost function can be defined\
    \ easily since we can directly compare a calculated output with the input training\
    \ dataset and minimize any deviations iteratively. Supervised learning does generally\
    \ require vast amounts of (expert-)labeled data to train the model and produce\
    \ more accurate results. In this context, it is important to bear in mind that\
    \ large representative and high-quality datasets usually reduce the risk of *overfitting*\
    \ and allow the model to generalize to new data well. Overfitting refers to a\
    \ mathematical effect that manifests in a model learning the noise (or statistical\
    \ fluctuations) in the learning data instead of the real statistically most relevant\
    \ patterns.\n\n![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig6_HTML.png](images/505424_1_En_4_Chapter/505424_1_En_4_Fig6_HTML.png)\n\
    \n**Figure 4-6** Overview of the most important categories and algorithms of machine\
    \ learning. The five major categories are highlighted in dark gray, the corresponding\
    \ subcategories in light gray. The technical names of the most popular machine\
    \ learning algorithms in each subcategory are indicated in italic letters. Classical\
    \ machine learning (light gray, oval) is a historic term and conventionally used\
    \ to refer to classical unsupervised and supervised learning algorithms\n\nHowever,\
    \ much of the available data is usually not labeled, and it can be fairly time\
    \ consuming to provide labels manually. This is why very creative ways have been\
    \ developed to deal with this challenge. ImageNet, for instance, is a hierarchical\
    \ database that provides large sets of labeled images and has been created with\
    \ crowdfunding.^([^(93)](#fn93)) Data can also be labeled automatically. Think\
    \ about Facebook’s Applied Machine Learning group [[26](#505424_1_En_4_Chapter.xhtml#Par265)],\
    \ for instance, who leveraged their enormous database with more than 3.5 billion\
    \ photos based on a very sophisticated prediction model that uses the hashtags\
    \ of Instagram photos to label their data automatically [[27](#505424_1_En_4_Chapter.xhtml#Par266)].\
    \ While some hashtags give a very good nonvisual description of the photos, others\
    \ only describe them very vaguely, which is why Facebook calls its approach *weakly\
    \ supervised data* [[28](#505424_1_En_4_Chapter.xhtml#Par267)] . Since data nowadays\
    \ creates a competitive advantage [[29](#505424_1_En_4_Chapter.xhtml#Par268)],\
    \ data labeling soon became an own industry and global market with numerous established\
    \ players worldwide, such as Dataloop, Labelbox, Scale AI, Supervisely, and Heartex\
    \ Labs.^([^(94)](#fn94)) Some of those managed data labeling services focus on\
    \ certain image domains only, such as medical scans to support customers in the\
    \ healthcare industry, aerial navigational data for trucking businesses, or satellite\
    \ and aerial photography to support the insurance industry. Arturo.ai, a spin-off\
    \ from the American Family Insurance in Chicago, and the San Diego–based startup\
    \ Lytx are just two further examples for this increasing data annotation industry,\
    \ which is expected to reach a global market size of USD 1.6 billion by 2025 [[30](#505424_1_En_4_Chapter.xhtml#Par269)].\n\
    \n**Supervised Learning**  \nIn supervised learning, the machine learning algorithm\
    \ or program is trained by labeled data, that is, pairs of inputs and outputs,\
    \ that tell the algorithm the correct answers during its training and allow for\
    \ tuning its free parameters. Once the algorithm has been trained iteratively,\
    \ it can predict the output for unknown inputs with a certain accuracy. This approach\
    \ is well suited if you have labeled data available or know how to manually classify\
    \ and label it.\n\n### Supervised Learning: Regression\n\n*Regression* is by far\
    \ the simplest approach to supervised learning. It is based on the pioneering\
    \ work of the French mathematician Adrien-Marie Legendre, who developed the “least\
    \ squares method for regression” to determine orbits around the sun based on astronomical\
    \ observations back in 1805 [[31](#505424_1_En_4_Chapter.xhtml#Par270)]. A regression\
    \ algorithm approximates a training dataset by a straight (linear regression)\
    \ or curved line (polynomial regression). The output of this algorithm is parameters\
    \ that either describe the best-fitting line or curve, which can be extended beyond\
    \ the training data and used to forecast untrained outputs like in the apartment\
    \ rental example earlier. Linear regression is widely used for prediction and\
    \ forecasting, such as for sales forecasting and risk assessment analysis by finance\
    \ and insurance companies. Further examples include the prediction of traffic\
    \ depending on the time of the day or the demand volume as a function of a company’s\
    \ growth. Particularly interesting is multi-linear or multi-polynomial regression\
    \ that allows for the prediction of outputs based on independent and multiple\
    \ input datasets, such as the prediction of a vehicle’s market value based on\
    \ its mileage, brand, number of accidents , amount of repairs, number of owners,\
    \ and other key characteristics that determine its value. A multi-polynomial regression\
    \ model may also allow us to predict what marketers call “customer churn”^([^(95)](#fn95))\
    \ as a function of different variables, such as the frequency and intensity of\
    \ usage, satisfaction, demographics, and relationships to other users. Such predictions,\
    \ for example, can be used by a company to automatically enable special offers\
    \ to retain vulnerable customers."
  raw: '## 4.3 The Five Categories of Learning


    Further to this regression model, data scientists have been developing a whole
    range of further machine learning algorithms, each of which has its own set of
    use cases.^([^(92)](#fn92)) Even though the resulting range of applications is
    very large and equally versatile, the algorithms can be divided into five major
    categories depending on their particular training strategy. The categories are
    called supervised, unsupervised, deep, and reinforcement learning as well as ensemble
    methods. A general but not comprehensive overview of the most popular algorithms
    is shown in Figure [4-6](#505424_1_En_4_Chapter.xhtml#Fig6), which we discuss
    in further detail in the following.


    ### 4.3.1 Supervised Learning


    The careful reader will have noticed in our previous example that the linear regression
    model was optimized by iteratively comparing its output – the fitted line – to
    its input, the training dataset. This is an example for *supervised learning*,
    which is always based on *labeled data*. Labeled data refers to a dataset that
    is comparable to the previous example, in which every input value (apartment size)
    is related to one output value (apartment prize). In this case, the cost function
    can be defined easily since we can directly compare a calculated output with the
    input training dataset and minimize any deviations iteratively. Supervised learning
    does generally require vast amounts of (expert-)labeled data to train the model
    and produce more accurate results. In this context, it is important to bear in
    mind that large representative and high-quality datasets usually reduce the risk
    of *overfitting* and allow the model to generalize to new data well. Overfitting
    refers to a mathematical effect that manifests in a model learning the noise (or
    statistical fluctuations) in the learning data instead of the real statistically
    most relevant patterns.


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig6_HTML.png](images/505424_1_En_4_Chapter/505424_1_En_4_Fig6_HTML.png)


    Figure 4-6


    Overview of the most important categories and algorithms of machine learning.
    The five major categories are highlighted in dark gray, the corresponding subcategories
    in light gray. The technical names of the most popular machine learning algorithms
    in each subcategory are indicated in italic letters. Classical machine learning
    (light gray, oval) is a historic term and conventionally used to refer to classical
    unsupervised and supervised learning algorithms


    However, much of the available data is usually not labeled, and it can be fairly
    time consuming to provide labels manually. This is why very creative ways have
    been developed to deal with this challenge. ImageNet, for instance, is a hierarchical
    database that provides large sets of labeled images and has been created with
    crowdfunding.^([^(93)](#fn93)) Data can also be labeled automatically. Think about
    Facebook’s Applied Machine Learning group [[26](#505424_1_En_4_Chapter.xhtml#Par265)],
    for instance, who leveraged their enormous database with more than 3.5 billion
    photos based on a very sophisticated prediction model that uses the hashtags of
    Instagram photos to label their data automatically [[27](#505424_1_En_4_Chapter.xhtml#Par266)].
    While some hashtags give a very good nonvisual description of the photos, others
    only describe them very vaguely, which is why Facebook calls its approach *weakly
    supervised data* [[28](#505424_1_En_4_Chapter.xhtml#Par267)] . Since data nowadays
    creates a competitive advantage [[29](#505424_1_En_4_Chapter.xhtml#Par268)], data
    labeling soon became an own industry and global market with numerous established
    players worldwide, such as Dataloop, Labelbox, Scale AI, Supervisely, and Heartex
    Labs.^([^(94)](#fn94)) Some of those managed data labeling services focus on certain
    image domains only, such as medical scans to support customers in the healthcare
    industry, aerial navigational data for trucking businesses, or satellite and aerial
    photography to support the insurance industry. Arturo.ai, a spin-off from the
    American Family Insurance in Chicago, and the San Diego–based startup Lytx are
    just two further examples for this increasing data annotation industry, which
    is expected to reach a global market size of USD 1.6 billion by 2025 [[30](#505424_1_En_4_Chapter.xhtml#Par269)].


    Supervised Learning


    In supervised learning, the machine learning algorithm or program is trained by
    labeled data, that is, pairs of inputs and outputs, that tell the algorithm the
    correct answers during its training and allow for tuning its free parameters.
    Once the algorithm has been trained iteratively, it can predict the output for
    unknown inputs with a certain accuracy. This approach is well suited if you have
    labeled data available or know how to manually classify and label it.


    #### Supervised Learning: Regression


    *Regression* is by far the simplest approach to supervised learning. It is based
    on the pioneering work of the French mathematician Adrien-Marie Legendre, who
    developed the “least squares method for regression” to determine orbits around
    the sun based on astronomical observations back in 1805 [[31](#505424_1_En_4_Chapter.xhtml#Par270)].
    A regression algorithm approximates a training dataset by a straight (linear regression)
    or curved line (polynomial regression). The output of this algorithm is parameters
    that either describe the best-fitting line or curve, which can be extended beyond
    the training data and used to forecast untrained outputs like in the apartment
    rental example earlier. Linear regression is widely used for prediction and forecasting,
    such as for sales forecasting and risk assessment analysis by finance and insurance
    companies. Further examples include the prediction of traffic depending on the
    time of the day or the demand volume as a function of a company’s growth. Particularly
    interesting is multi-linear or multi-polynomial regression that allows for the
    prediction of outputs based on independent and multiple input datasets, such as
    the prediction of a vehicle’s market value based on its mileage, brand, number
    of accidents , amount of repairs, number of owners, and other key characteristics
    that determine its value. A multi-polynomial regression model may also allow us
    to predict what marketers call “customer churn”^([^(95)](#fn95)) as a function
    of different variables, such as the frequency and intensity of usage, satisfaction,
    demographics, and relationships to other users. Such predictions, for example,
    can be used by a company to automatically enable special offers to retain vulnerable
    customers.'
  trans: "\n# 4.3 学习的五大类别\n\n在上述回归模型的基础上，数据科学家们又开发了一系列更广泛的机器学习算法，每种算法都有其特定的应用场景。^(⁹²)\
    \ 尽管由此产生的应用范围非常广泛且同样多样，但这些算法根据其特定的训练策略可以分为五大主要类别。这些类别分别称为监督学习、无监督学习、深度学习、强化学习以及集成方法。图\
    \ 4-6 展示了最流行算法的一个通用但不全面的概述，我们将在下文中对其进行更详细的讨论。\n\n## 4.3.1 监督学习\n\n细心的读者会在我们之前的例子中注意到，线性回归模型是通过迭代比较其输出（拟合线）与其输入（训练数据集）来进行优化的。这就是*监督学习*的一个例子，它始终基于*标注数据*。标注数据指的是一个与前述例子类似的数据集，其中每个输入值（公寓面积）都与一个输出值（公寓价格）相关联。在这种情况下，代价函数很容易定义，因为我们可以直接将计算出的输出与输入训练数据集进行比较，并迭代地最小化任何偏差。监督学习通常需要大量（专家）标注的数据来训练模型，以产生更准确的结果。在此背景下，需要牢记的是，大规模、具代表性且高质量的数据集通常能降低*过拟合*的风险，并使模型能够很好地泛化到新数据上。过拟合指的是一种数学效应，表现为模型学习的是学习数据中的噪声（或统计波动），而非真正统计上最相关的模式。\n\
    \n![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig6_HTML.png](img/505424_1_En_4_Fig6_HTML.png)\n\
    \n**图 4-6** 机器学习最重要的类别与算法概览。五大主要类别以深灰色突出显示，相应的子类别以浅灰色显示。每个子类别中最流行的机器学习算法的技术名称以斜体字母表示。经典机器学习（浅灰色椭圆形）是一个历史术语，传统上用于指代经典的无监督学习和监督学习算法\n\
    \n然而，大部分可用数据通常是没有标注的，并且手动提供标注可能相当耗时。这就是为什么人们开发了非常有创意的方法来应对这一挑战。例如，ImageNet 是一个层级数据库，提供了大量带标注的图像，它是通过众包方式创建的。^(⁹³)\
    \ 数据也可以自动标注。想想 Facebook 的应用机器学习小组 [26]，例如，他们利用其拥有超过 35 亿张照片的庞大数据库，基于一个非常复杂的预测模型，该模型使用\
    \ Instagram 照片的标签来自动标注其数据 [27]。虽然有些标签能很好地非视觉描述照片，但其他标签描述得则非常模糊，这就是为什么 Facebook\
    \ 将其方法称为*弱监督数据* [28]。由于当今数据能创造竞争优势 [29]，数据标注很快成为了一个独立的行业和全球市场，拥有众多全球知名的成熟企业，如\
    \ Dataloop、Labelbox、Scale AI、Supervisely 和 Heartex Labs。^(⁹⁴) 其中一些管理型数据标注服务专注于特定的图像领域，例如用于支持医疗保健行业客户的医学扫描、用于货运业务的高空导航数据，或用于支持保险行业的卫星和航拍图像。芝加哥美国家庭保险公司衍生出的\
    \ Arturo.ai 以及总部位于圣地亚哥的初创公司 Lytx，只是这个不断增长的数据标注行业的两个例子，预计到 2025 年，该行业的全球市场规模将达到\
    \ 16 亿美元 [30]。\n\n**监督学习**  \n在监督学习中，机器学习算法或程序通过标注数据进行训练，即输入和输出对，在训练期间告诉算法正确的答案，并允许调整其自由参数。一旦算法经过迭代训练，它就可以以一定的准确率预测未知输入的输出。如果你有可用的标注数据，或者知道如何手动分类和标注数据，那么这种方法非常适合。\n\
    \n### 监督学习：回归\n\n*回归*是目前为止最简单的监督学习方法。它基于法国数学家阿德里安-马里·勒让德的开创性工作，他于 1805 年提出了“回归的最小二乘法”，用于根据天文观测确定绕太阳运行的轨道\
    \ [31]。回归算法通过一条直线（线性回归）或曲线（多项式回归）来逼近训练数据集。该算法的输出是描述最佳拟合直线或曲线的参数，这些参数可以扩展到训练数据之外，并用于预测未经训练的输出，就像前面的公寓租赁例子一样。线性回归广泛应用于预测和预报，例如金融和保险公司用于销售预测和风险评估分析。进一步的例子包括根据一天中的时间预测交通流量，或者根据公司的增长预测需求数量。特别值得关注的是多元线性回归或多元多项式回归，它允许基于独立的多输入数据集来预测输出，例如根据车辆的里程数、品牌、事故次数、维修次数、车主数量以及其他决定其价值的关键特征来预测其市场价值。多元多项式回归模型也可能允许我们预测营销人员所谓的“客户流失”^(⁹⁵)，该预测基于不同的变量，例如使用的频率和强度、满意度、人口统计特征以及与其他用户的关系。公司可以利用此类预测，例如自动提供特殊优惠以留住易流失的客户。\n"
- fmt: '#### Supervised Learning: Classification


    Machine learning algorithms that fall into the category of *classification* allow
    for splitting (large) datasets into common labels or groups of data that share
    certain similarities or properties. Classification is comparable to regression,
    where we do not forecast a number but rather a category that describes the input
    data best. By far the most common algorithm is called *K-nearest neighbors* and
    takes a bunch of labeled data points and groups them into `*K*` categories with
    `*K*` being an integer number.


    An increasingly popular use case for this algorithm is the calculation of credit
    scores and ratings by companies in the fintech industry. Their classification
    models take into account a variety of factors, such as income, payment history,
    and place of residence to categorize potential borrowers. Other applications are
    about spam filtering, language detection, sentiment analysis, and fraud detection
    [[32](#505424_1_En_4_Chapter.xhtml#Par271)]. Every time we label an email as spam,
    for instance, our email provider will update its machine learning models to identify
    the latest clever scam in future. Facebook’s ability to suggest names of friends
    in newly uploaded photos is also based on this algorithm trained by our previous
    labeling inputs. Another example is the advanced authorization analysis tool developed
    by the American financial and payment cards company Visa, which helps financial
    institutions to prevent an estimated USD 25 billion in annual fraud [[33](#505424_1_En_4_Chapter.xhtml#Par272)].


    ### 4.3.2 Unsupervised Learning


    In contrast to supervised learning, *unsupervised learning* works with *unlabeled
    data* . Algorithms of this category are left on its own during the learning process.
    They usually start with guessing similarities and patterns in the input data and
    then aim to achieve better and better results by adjusting different parameters
    of the respective model iteratively. The optimization objective or cost function
    can be accomplished by a variety of quantitative methods, such as the Euclidean
    metric or distance, that allows us to evaluate the similarity of data points based
    on their spatial distance in a coordinate system. One of the most famous examples
    is Google’s PageRank algorithm that became the prototype for Google’s search engine.
    This algorithm is the brainchild of the two legendary Google founders Larry Page
    and Sergey Brin and colleagues at Stanford University, who published their seminal
    paper with the title “The PageRank Citation Ranking: Bringing Order to the Web”
    in 1998 [[34](#505424_1_En_4_Chapter.xhtml#Par273)]. One year after filing their
    patent with the number US 6,285,999 [[35](#505424_1_En_4_Chapter.xhtml#Par274)],
    they launched the first version of Google’s search engine. Unsupervised learning
    has been applied to a whole range of other business applications since then, and
    Yann LeCun – one of the worldwide leading scientists of artificial intelligence
    – expects that “[...] unsupervised learning to become far more important in the
    longer term. Human and animal learning is largely unsupervised: we discover the
    structure of the world by observing it, not by being told the name of every object”
    [[36](#505424_1_En_4_Chapter.xhtml#Par275)].


    #### Unsupervised Learning


    In the case of unsupervised learning, the machine learning algorithm or program
    scans the input data for patterns and structures without any predefined categories
    and iteratively identifies the statistically best categorization. This approach
    is suitable if you do not know how to label your data and you want the algorithm
    to find similarities and patterns to classify it for you.


    #### Unsupervised Learning: Clustering


    Clustering is the most popular subcategory of classical unsupervised learning.
    In easy terms, it can be compared to dividing your shirts by color after washing
    them when you do not remember all the colors you have. Such algorithms do generally
    allow us to divide large datasets with no predefined categories or classes. The
    algorithm rather finds similar objects, merges them together in a cluster, and
    thereby finds the best way to divide the dataset automatically. By far the most
    common algorithm in this subcategory is *K-means clustering* , which takes `*K*`
    center points or *centroids*, distributes them across a dataset, and merges all
    data points in the vicinity of the different centroids together in a cluster.
    The position of the centroids is iteratively adjusted until the average distance
    between all data points and their associated centroids is minimized and the statistically
    most robust grouping established. Furthermore, this algorithm allows for plotting
    a “hockey stick diagram” or “elbow plot” with which we can determine the statistically
    ideal number of clusters by plotting the average distance between the data and
    centroids and the value of `*K*`. This plot is typically shaped like a hockey
    stick with the ideal number of clusters being given by its inflection point. Probably
    the most popular application of K-means clustering is *market* and *customer segmentation*
    for marketing campaigns as shown in Figure [4-7](#505424_1_En_4_Chapter.xhtml#Fig7)
    exemplarily.


    Another application is *sentiment analysis* , which mines social media data to
    identify general trends in society. This can be crucial for a fashion company,
    for instance, to understand how they can adapt the identified styles in the upcoming
    line of clothes. Another example is about marking popular sites on city maps.
    Whenever you are looking for a restaurant on Google Maps, for instance, you may
    have noticed that Google’s clustering engine groups its findings together to blobs
    with a number at very low resolutions. This is a very important feature since
    your Internet browser would otherwise freeze when trying to draw thousands of
    restaurants on one section map simultaneously. You may also think about national
    security agencies and law enforcement organizations in a governmental context,
    who could use clustering to look for abnormal patterns and discern potential security
    threats, an application that became known as *anomaly detection* . In these cases,
    clustering algorithms are particularly useful since we do generally not know the
    particular abnormality pattern to look for.


    ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig7_HTML.jpg](images/505424_1_En_4_Chapter/505424_1_En_4_Fig7_HTML.jpg)


    **Figure 4-7** Customer segmentation by plotting the annual income of customers
    vs. their age. In this exemplary case, the algorithm found three centroids denoted
    by “C1,” “C2,” and “C3” (rhombs), which characterize three customer groups (dashed
    lines in black, medium and light gray)'
