- fmt: '


    Clayton Christensen，这位我们在本书引言章节中认识的著名哈佛经济学家，开发了一种非常流行的方法。该方法与客户旅程互补，用于捕捉客户需求并推导出相应的商业模式。在问自己为什么客户购买某种产品而不是另一种时，他意识到客户实际上并不是购买产品，而是“雇佣”产品来解决特定问题。换句话说，客户雇佣产品来完成一项任务，这就是为什么他的概念如今被称为客户的“待办任务”（`job
    to be done`）[[14](#505424_1_En_5_Chapter.xhtml#Par153)]。待办任务有两个维度：(1) 功能维度，衡量待办任务是否已完成；(2)
    情感或社会维度，描述拥有和使用特定产品或服务的感觉。例如，考虑购买一辆电动汽车。在此情况下，功能待办任务是实现零排放的移动，从一点到达另一点。其情感和社会层面可能在于向所有人展示自己处于技术前沿，或电动汽车其他不可衡量的方面，如社会地位和（财务）福祉。根据Clayton
    Christensen著名的颠覆性战略理论[[15](#505424_1_En_5_Chapter.xhtml#Par154)]，一个成功的商业模式完美地围绕客户的待办任务展开，这就是为什么这常被描绘为创新中的“北极星”。换句话说，任何能让客户更好地完成其任务的事物，都是组织应关注的创新，因为它们为现有产品或服务提供了巨大的增长机会。将客户置于“你的宇宙中心”是推进现有商业模式或构想新商业模式及其基础战略的重要前提。^([^(134)](#fn134))


    在此背景下，重要的是要记住，只有少数幸运的公司能够以一个最终带来成功的数字商业模式起步。大多数公司最初会采用应急策略（`emergent strategy`）探索不同的机会，直到找到真正有效的方法。这就是为什么你应该准备好尝试不同的数字技术和机会，随时准备
    pivot（转向），并持续调整你的方法，直到你找到一个真正有效的方法——此时，应急策略就变成了新的深思熟虑的策略。


    用Clayton Christensen的话来总结，“大多数产品之所以失败，是因为公司从错误的角度开发它们。公司过于专注于他们想卖给客户的东西，而不是客户真正需要的东西。所缺失的是同理心：对客户试图解决什么问题的一种深刻理解”
    [[52](#505424_1_En_5_Chapter.xhtml#Par191)]。我希望从这些思考中获得的见解能够激励并帮助你，为你自己的数字化转型之旅构想一个数字商业模式。


    ### 5.1.2 构想数字战略：推导数字运营模式


    一旦定义了数字商业模式，重要的是要问自己：你将如何向客户交付价值？哪种运营模式最能支持这个价值创造过程？这正是数字技术发挥作用的地方。理解数字运营模式特征的最佳方式是将它们与那些不基于数字技术、不以数据为中心的传统模式进行比较。传统与数字运营模式的根本区别源于其利用数据的特定方式。传统运营模式将数据视为支撑其运营的“必要之恶”，而没有从中获取经济价值。随着产品、服务、客户数量以及与之相关的数据量增加，传统运营模式最终会因无法管理复杂性而受到限制。对于那些不以数据为中心的商业模式，在某一点上，要在整个组织中实现数据一致性^([^(135)](#fn135))会变得不切实际且成本过高。如果不同的部门随时间演变成了功能上分离的业务单元，拥有自己的数据库和遗留系统，这一点尤其具有挑战性。数据分散到去中心化的数据库中，意味着传统运营模式中的决策常常基于信息不透明，从而基于对决策选项不完整且不充分的评估。


    另一方面，数字运营模式克服了这些障碍，并利用数字技术分析（海量）数据，识别出可能的决策选项，从而实现更一致、更客观的决策，如图[5-2](#505424_1_En_5_Chapter.xhtml#Fig2)示意性所示[[9](#505424_1_En_5_Chapter.xhtml#Par148)]。换句话说，数字技术允许从数据中提取有价值的见解，以补充人类的判断，从而促成更好的决策——在数字运营模式中，某些决策甚至可以通过使用智能合约（`smart
    contracts`）等方式被自动评估和执行。


    ![../images/505424_1_En_5_Chapter/505424_1_En_5_Fig2_HTML.png](images/505424_1_En_5_Chapter/505424_1_En_5_Fig2_HTML.png)


    **图 5-2**


    一个数据驱动的决策过程结合了基于数字技术的高级数据分析与人类智能。人类的判断（黑色）在整个过程中继续扮演核心角色。综合自[[9](#505424_1_En_5_Chapter.xhtml#Par148)]


    此外，数字运营模式拥抱了与数字技术相关的指数级规模、范围和学习优势。在此上下文中，规模（`Scale`）指的是以最低成本为尽可能多的客户交付尽可能多的价值。范围（`Scope`）描述了一个公司提供的活动范围，即产品和服务的多样性。^([^(136)](#fn136))
    数字学习（`Digital learning`）决定了组织持续改进和创新其流程、产品和服务的迭代能力。


