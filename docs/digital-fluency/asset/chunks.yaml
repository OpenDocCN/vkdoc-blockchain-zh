  raw: 'Clayton Christensen, the renowned Harvard economist we know from the introductory
    chapter of this book, developed a very popular approach complementary to customer
    journeys for capturing the customers’ needs and deriving a corresponding business
    model. When asking himself why a customer purchases a certain product and not
    another one, he realized that customers do not really buy products but rather
    hire them to solve a specific problem. In other words, customers hire products
    to get a job done, which is why his concept is nowadays referred to as the customers’
    *job to be done* [[14](#505424_1_En_5_Chapter.xhtml#Par153)]. The job to be done
    has two dimensions: (1) a functional dimension, which measures if the job to be
    done has been completed, and (2) an emotional or social dimension that describes
    how it feels to own and use a certain product or service. Consider buying an electric
    vehicle, for instance. The functional job to be done is being mobile and getting
    from one point to another with zero emissions in this case. The emotional and
    social side of it may be about showing everybody that one is at the cutting edge
    of technology or another nonmeasurable aspects of the electric vehicle, such as
    social status and (financial) well-being. According to Clayton Christensen’s famous
    disruptive strategy theory [[15](#505424_1_En_5_Chapter.xhtml#Par154)], a successful
    business model centers around the customers’ job to be done perfectly, which is
    why this is often depicted as the “north star” in innovation. In other words,
    anything that allows customers to get their job done better is innovations that
    organizations should focus on as they provide great growth opportunities for existing
    products or services. Putting the customer to the “center of your universe” is
    thus an important prerequisite for advancing an existing or envisioning a new
    business model and its underlying strategy.^([^(134)](#fn134))


    It is important to bear in mind in this context that only a few lucky companies
    start off with a digital business model that ultimately leads to success. The
    majority of them initially explores different opportunities with an emergent strategy
    until they find something that really works. This is why you should be prepared
    to experiment with different digital technologies and opportunities, ready to
    pivot, and continue to adjust your approach until you find a veritable one – the
    emergent strategy becomes the new deliberate strategy at this point.


    To summarize it with the words of Clayton Christensen, “most products fail because
    companies develop them from the wrong perspective. Companies focus too much on
    what they want to sell to their customers, rather than what those customers really
    need. What’s missing is empathy: a deep understanding of what problems customers
    are trying to solve” [[52](#505424_1_En_5_Chapter.xhtml#Par191)]. I hope that
    the insights gained from these considerations will inspire and help you to envision
    a digital business model for your own digital transformation journey.


    ### 5.1.2 Envision a Digital Strategy: Derive a Digital Operating Model


    Once a digital business model has been defined, it is important to ask yourself
    about how you are going to deliver value to your customers and which operating
    model best supports this value creation process. This is the point where digital
    technologies come into play. The best way to understand the characteristics of
    digital operating models is to compare them to traditional ones that are not based
    on digital technologies and centered around data. The fundamental difference between
    a traditional and digital operating model arises due to the particular way it
    leverages data. Traditional operating models use data as a necessary evil to support
    their operations without deriving economic value from them. As the number of products,
    services, customers, and the amount of data associated with them increase, traditional
    operating models are ultimately limited by their inability to manage complexity.
    For traditional business models that are not centered around data, it simply becomes
    impractical and too costly at some point to achieve data coherence^([^(135)](#fn135))
    across the organization. This is particularly challenging if the different divisions
    evolved into functionally separated business units over time with their own databases
    and legacy systems. The distribution of data to decentralized databases implies
    that decision making in traditional operating models is often based on information
    intransparency and thus on incomplete and inadequate assessments of decision options.


    A digital operating model, on the other hand, overcomes those obstacles and leverages
    digital technologies to analyze (vast amounts of) data and identify possible decision
    options that allow for more consistent and objective decision making as shown
    in Figure [5-2](#505424_1_En_5_Chapter.xhtml#Fig2) schematically [[9](#505424_1_En_5_Chapter.xhtml#Par148)].
    In other words, digital technology allows for extracting valuable insights from
    data that complement human judgment and thereby enable better decisions – some
    decisions may even be evaluated and executed automatically in a digital operating
    model by employing smart contracts, for example.


    ![../images/505424_1_En_5_Chapter/505424_1_En_5_Fig2_HTML.png](images/505424_1_En_5_Chapter/505424_1_En_5_Fig2_HTML.png)


    Figure 5-2


    A data-driven decision-making process combines advanced data analytics based on
    digital technology and human intelligence. Human judgment (black) continues to
    play a central role in the overall process. Generalized from [[9](#505424_1_En_5_Chapter.xhtml#Par148)]


    Furthermore, a digital operating model embraces the advantages of exponential
    scale, scope, and learning associated with digital technologies. Scale in this
    context refers to delivering as much value to as many customers as possible at
    minimum cost. Scope describes the range of activities, that is, the variety of
    products and services, a company offers.^([^(136)](#fn136)) Digital learning determines
    an organization’s ability to continuously improve and innovate its processes,
    products, and services iteratively.'
