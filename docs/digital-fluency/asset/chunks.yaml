  trans: '

    # 量子比特类型：离子阱量子比特


    `离子阱`是一种过去曾用于各种原理验证实验的技术。该技术由德国物理学家、后来的诺贝尔奖得主沃尔夫冈·保罗（Wolfgang Paul）和汉斯·格奥尔格·德梅尔特（Hans
    Georg Dehmelt）于 20 世纪 50 年代提出 [21–23]。离子阱通过磁场将一串孤立且带电的原子（即所谓的`离子`) 约束在真空管内。磁场通常由四根圆柱形棒产生，这些棒携带振荡电流，并感应出极性不断变化的交变磁场。由于这种极性的变化频率通常与老式收音机相同，因此产生的磁场被称为`射频`，或简称为`RF
    场`。


    量子比特`|0〉`通常与能量最低、因而也是离子最优先的状态相关联。这种基态离子可以被一束强激光激发，形成带正电的离子，该离子与量子比特`|1〉`相关联。从基态到激发态的跃迁`|0〉
    → |1〉`只是一个仅涉及单个量子比特的量子逻辑门示例。多量子比特操作，例如量子比特的叠加和纠缠，可以通过将两个或多个相邻离子的基态和激发态与它们围绕离子阱对称轴的运动相耦合来实现
    [15]。这些所谓的`量子化简正模式`是离子群集体的机械振荡，类似于一串摇晃的珍珠项链，其中相邻两个离子（珍珠）之间的结合力由它们之间的电斥力提供。^(³⁴)
    然而，存储在这种`保罗阱`中的量子比特被发现其相干时间非常短，这就是为什么如今科学家们使用精心设计的磁场和电场组合——一种以其荷兰发明者弗兰斯·彭宁（Frans
    Penning）命名的装置，称为`彭宁阱` [24–26]。


    就其应用而言，囚禁离子量子计算机的主要优势在于，离子能在自由空间中被三维约束，并且由于处于真空中而与环境良好隔离。因此，离子量子比特显示出迄今为止测量到的最长的相干时间，这就是为什么它们仍被用于科学和基础研究，以在定义明确且孤立的量子比特系统中研究叠加和纠缠。


    截至 2018 年，可控纠缠的最大粒子数为 20 个囚禁离子 [27]。根据 DiVincenzo 标准，这种量子比特实现方案的主要缺点是可扩展性差，因为随着离子链长度的增加，控制难度也越来越大。当今用于量子计算的大多数离子阱都依赖于与最先进的微电子技术兼容的微芯片架构，并且能够在低温下以非常高的精度约束和控制离子量子比特
    [28]。


    # 量子比特类型：电子自旋量子比特


    电子自旋量子比特的历史与现代半导体物理和技术的兴起密不可分 [29]。半导体是一种导电性能优于绝缘体（如玻璃）但次于导体（如铜和其他金属）的材料。技术上最重要的半导体是`硅`，它通常通过熔化石英砂并从
    2273 K 高温熔体中去除氧化物来工业化生产。由此获得的银白色硅通常含有低浓度的其他化学元素，这些元素在技术上被称为`杂质`。一种特别令人感兴趣的杂质是化学元素磷，因为这种化学元素或原子同时表现出核自旋和电子自旋。


    硅中的这种杂质在 1998 年引起了美国物理学家布鲁斯·凯恩（Bruce Kane）的注意，并启发他提出了一种创新的硅基量子计算方法 [30]。他的方法极具影响力，因为它似乎与当时制造微芯片的主流技术——最先进的硅微电子学相兼容。`凯恩模型`基于嵌入纯硅衬底（作为基底材料）中的磷原子阵列。它允许在磷原子的核自旋中编码量子比特，而相邻两个或多个磷原子之间的叠加和纠缠则通过磷原子内部核自旋和电子自旋之间的自然相互作用来介导。


    **表 2-1：最流行的量子计算方法优缺点对比。** 品质因数衡量单量子比特或多量子比特操作中的错误率和噪声水平。


    | 量子比特类型 | 相干时间 (最大值) | 优点 | 缺点 |

    | --- | --- | --- | --- |

    | 囚禁离子 | 10 秒 [32] | + 长相干时间+ 良好隔离的离子+ 高品质因数+ 高个体可控性 | – 可扩展性差 |

    | 电子自旋 | 60 毫秒 [33] | + 中等相干时间+ 中等可扩展性 | – 中等品质因数– 中等个体可控性 |

    | 超导量子比特 | 4 微秒 [34] | + 良好的可扩展性+ 大规模集成+ 高个体可控性 | – 短相干时间– 低品质因数 |


    在布鲁斯·凯恩提出量子计算方案前后，美国物理学家大卫·洛斯（David Loss）和大卫·迪文森佐（David DiVincenzo）提出，通过金属电极阵列将单个电子空间约束在某些硅衬底中
    [31]——这种器件架构通常被称为静电定义的`量子点`。^(³⁵) 根据我们施加正电压还是负电压，这些栅电极会吸引或排斥带负电的电子，并有助于控制它们的运动。置于外磁场中时，这种量子点能够约束和控制单个电子自旋，从而实现某些量子逻辑门。它们相对于
    DiVincenzo 标准的主要优缺点汇总在表 2-1 中。尽管这两种在硅中利用电子自旋量子比特的方法不太可能用于大规模量子计算，但它们对于基础量子研究来说是极其重要的器件结构。


    ![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig7_HTML.png](img/505424_1_En_2_Fig7_HTML.png)


    **图 2-7：** 超导材料中库珀对的形成。电子“1”局部扭曲了超导体的规则原子晶格。电子“2”被这种扭曲所吸引（虚线箭头），因为这是晶格中能量上更有利的位置。因此，当第一个电子在晶格中移动时，会拖动第二个电子随之移动。这两个电子之间的连接被称为库珀对。

