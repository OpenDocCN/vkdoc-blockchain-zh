    # 区块链交易生命周期


    区块链交易生命周期通常分为七个步骤，如图 3-3 所示。假设您想向美国朋友 Bob 发送 10 个 BTC——实际上这是一笔相当可观的金额，因为在 2020
    年 9 月，汇率约为 1 BTC = 10,500 美元。从表 3-2 可知，相应交易消息的明文可能为：“发件人：发件人姓名（其`private key`），收件人：收件人姓名（其`private
    key`），金额：10 BTC。”比特币交易流程始于生成一个加密文件，即所谓的*数字签名*，其中包含您交易消息的哈希值。将此文件广播到网络后，在第三步中，您的交易将由网络中的一个节点授权——关于此步骤的更多细节将在下一节中详细描述，此处为清晰起见暂不讨论。由于每个区块为了提高效率包含多笔交易，您的交易消息很可能会被缓冲到一个等待池中，即所谓的*mempool*（交易内存池），该池在授权交易被组装成
    Merkle 树之前收集它们。一旦池化完成，^(⁶¹) 将如前所述通过迭代应用加密哈希函数来创建整个 Merkle 树。此外，所有其他组件都被添加到区块头中，包含您交易消息的区块最终被创建。然后，该区块在区块链交易生命周期的第五步被广播到网络。第六步是整个交易过程中最重要的步骤之一。它涉及在网络内就该区块的有效性达成共识。这种验证基于解决一个计算难题，在比特币区块链中称为*工作量证明*，我们将在下文中详细探讨。一旦其中一个节点解决了这个难题，解决方案就会被广播到网络，该区块被标记为已验证，并最终被不可篡改地添加到区块链中。网络进行自我更新，在最后一步中，最新且达成一致的账本版本被单独保存在每个节点上。


    以上概述为您提供了关于整个区块链交易生命周期的初步印象。至此，需要注意的是，这一切都在几分钟内自动完成，并且没有任何第三方介入——您可以回想一下，通过 SWIFT
    进行的传统银行交易涉及五家以上的银行，并且总共可能需要数天时间。这实际上是经典 SWIFT 与基于区块链的（货币）价值转移之间最重要的区别。由于没有任何第三方中介，区块链交易流程显著降低了交易速度（译者注：此处根据上下文逻辑推断应为“时间”）和成本。


    我们对区块链交易生命周期的简要讨论揭示了两个对于区块链安全运行尤其重要的步骤：(1) 交易的授权 和 (2) 通过工作量证明对区块进行验证，即分别对应图 3-3
    中的第三步和第六步。这两个步骤将在以下两个小节中详细讨论。


    ## 通过数字签名授权交易


    数字签名在整个交易生命周期中扮演着至关重要的角色，因为它允许我们：(1) 明确识别用户及其账户，以确保提交的交易是以他们的名义进行的；(2) 授权交易，以确保提交新交易的用户确实是待转移的相关信息或资产的合法所有者。第一个功能类似于您在法律合同（如房屋销售协议）上的签名，第二个功能则类似于在本例中由公证人对该签名进行的司法验证。这两个功能对于保证整个区块链的完整性以及保护其免受未经授权的访问和滥用尤为重要，因为其开放的
    P2P 架构允许任何人登录、访问并添加新的交易数据。


    创建数字签名的特定概念可以追溯到美国密码学先驱拉尔夫·梅克尔——我们通过 Merkle 树了解到的这位科学家——以及他在密码学和加密数字签名方面的开创性工作
    [11]。但在详细讨论数字签名及其用法之前，先讨论一些密码学的基本术语和概念是很有启发性的。密码学通常涉及三个主要步骤，即：


    1. 加密（交易）消息

    2. 传输加密后的（交易）消息

    3. 合法的接收者解密传输的（交易）消息


    加密后的数据也称为*密文*，指的是一串无意义的字母和数字，对于没有正确“配方”来解密它的人类或计算机来说毫无意义。这个“配方”被称为*密钥*，本质上是一串字母和数字，它决定了消息的明文如何转换为其密文。换句话说，密钥决定了用于加密明文消息的密码算法的输出，该算法在与另一方交换消息之前使用。


    加密和解密可以依赖于对称密钥或非对称密钥，每种密钥都有其特定的优缺点。*对称加密*方案基于一个密钥，该密钥既可以由发送者用于加密明文，也可以由相应的接收者用于解密密文，如图
    3-4(a)所示。这种加密方案非常易于实现，但也非常容易被破解，因为任何获取到该密钥的人——通过窃取或拦截通信信道——都可以轻易解密消息。


    ![../images/505424_1_En_3_Chapter/505424_1_En_3_Fig4_HTML.jpg](img/505424_1_En_3_Fig4_HTML.jpg)


    **图 3-4** 对称加密方案(a)与非对称加密方案(b)的比较。对于对称加密算法，公钥既用于加密明文，也用于解密密文。非对称加密方案使用两个独立的密钥，私钥用于加密，公钥用于解密。

    '
- fmt: '这就是为什么随着时间推移，人们开发出更精密的加密方案，其中*非对称加密*（也称为*公钥密码学*）是最流行且广泛使用的一种。它也是实现防篡改区块链的关键要素，并被选用于多种网络安全应用，例如第
    2.3.2 节中介绍的 `RSA` 算法^([^(62)](#fn62)) 。与对称加密方案相反，非对称加密使用两种不同的密码密钥：仅限其所有者使用的*私钥*，以及分布在网络上的相应*公钥*。无需深入细节——对非对称加密的详细理解实际上需要相当高级的数学概念，例如非线性椭圆曲线——可以说这两个密钥是*互补*的，这意味着它们只能组合使用，并且只能按一个方向使用，如图
    [3-4](#505424_1_En_3_Chapter.xhtml#Fig4) (b) 所示。例如，用公钥加密的明文，只能使用其互补的私钥解密。互补密钥对通常可以以两种方式使用：


    1.  *私钥到公钥*交易——如图 [3-4](#505424_1_En_3_Chapter.xhtml#Fig4) (b) 所示——发送方使用其*私钥来加密*他的消息。然后消息被发送给接收方，接收方可以使用互补的公钥解密。这种方法不能保护消息不被读取，但允许接收方验证发送方的身份，因为加密的消息只能使用合法发送方的公钥解密。


    2.  *公钥到私钥*交易——未在图 [3-4](#505424_1_En_3_Chapter.xhtml#Fig4) 中显示——发送方使用*接收方的公钥来加密*他的消息。接收方随后可以使用其私钥相应地解密。与第一种应用选项相比，这种方法保护消息不被读取，因为由特定公钥加密的数据只能由预期接收方拥有的互补私钥解密。


    区块链网络中用于授权交易的数字签名基于非对称私钥到公钥的加密方案。它的创建分为三个步骤，如图 [3-5](#505424_1_En_3_Chapter.xhtml#Fig5)
    (a) 所示：(1) 对实际交易消息进行哈希处理，(2) 使用发送方的私钥加密哈希后的交易消息，(3) 最后通过将加密后的交易哈希添加到交易消息的明文中来创建数字签名。然后，此数字签名被分发到网络中。一个节点将随机拾取它，并通过执行图
    [3-5](#505424_1_En_3_Chapter.xhtml#Fig5) (b) 中描绘的以下三个步骤来授权交易：(4) 使用发送方的公钥解密交易哈希，(5)
    对文件中包含的交易消息进行哈希处理，以及 (6) 将两个结果进行相互比较。如果两个结果相同，则该节点可以断定：


    *   消息确实由发送方签名，因为数字签名能够使用发送方的公钥成功解密。

    *   数字签名中包含的交易消息是正确的，因为解密后的交易哈希与由授权节点独立生成的交易哈希相匹配。


    如果此比较未显示相同的结果，则该交易不会被网络授权，并且相关交易会被识别为欺诈交易，不会被转发到内存池。您可能已经注意到，只有私钥最终被保密，才能避免欺诈交易。一旦私钥被恶意第三方窃取，就无法避免欺诈和非法交易，这就是为什么私钥的存储在区块链生态系统中起着非常关键的作用。


    用户的私钥通常由一个所谓的*钱包*来存储。钱包是一种软件或硬件，它通过提供一个易于使用的区块链网络网关，允许用户访问区块链网络并授权交易。钱包可以在始终在线并连接网络的计算机上实现，也可以在永久离线并与区块链网络断开连接的计算机上实现。在线钱包也称为*热钱包*，因为由于保持连接，它们总是暴露给黑客和其他恶意用户。出于同样的原因，离线钱包被称为*冷钱包*，主要用于将用户的私钥安全地存储在某些离线设备上。最简单但也同样不安全的冷钱包是*纸钱包*，即您将私钥写在一张纸上。根据您的记忆力，最安全的钱包之一是*脑钱包*，即记住您的私钥而无需写下来。


    ![../images/505424_1_En_3_Chapter/505424_1_En_3_Fig5_HTML.png](images/505424_1_En_3_Chapter/505424_1_En_3_Fig5_HTML.png)


    **图 3-5**


    数字签名在交易授权中的使用。(a) 展示了如何创建数字签名，而 (b) 则描绘了如何使用它来授权交易。这种授权基于将直接对交易进行哈希处理得到的哈希值，与对网络中共享的文件进行解密得到的结果进行比较。


    在选择最合适的钱包来存储您的私钥时，务必牢记私钥是访问区块链的唯一途径。换句话说，丢失您的私钥意味着您将被永久锁定在区块链之外，并且所有关于您的存储信息都将不可挽回地丢失，因为无法重置或重新创建私钥。例如，用于访问比特币区块链的大多数私钥都存储在热钱包中，这些热钱包由托管钱包服务、加密货币交易所和比特币交易商（例如多资产经纪商
    `eToro`）提供。'
  raw: 'This is why more elaborate encryption schemes have been developed over time
    with *asymmetric encryption* (also called *public-key cryptography* ) being the
    most popular and widely used one. It is also the key ingredient for the implementation
    of tamperproof blockchains and the scheme of choice for various cybersecurity
    applications, such as the RSA algorithm^([^(62)](#fn62)) introduced in Section
    2.3.2. In contrast to symmetric encryption schemes, asymmetric encryption employs
    two different cryptographic keys, the *private key* that is intended for its owner
    only and a corresponding *public key* that is distributed across the network.
    Without going into any details – a detailed understanding of asymmetric encryption
    does in fact require quite advanced mathematical concepts, such as nonlinear elliptic
    curves – both keys are said to be *complementary* to each other, which means that
    they can only be used in combination and in one direction as shown in Figure [3-4](#505424_1_En_3_Chapter.xhtml#Fig4)
    (b). A plaintext encrypted by a public key, for example, can thus only be decrypted
    with its complementary private key. Pairs of complementary keys can generally
    be used in two ways:


    1.  *Private-to-public* transactions  – as shown in Figure [3-4](#505424_1_En_3_Chapter.xhtml#Fig4)
    (b) – in which the sender uses his *private key to encrypt* his message. The message
    is then sent over to the receiver, who can decrypt it by using the complementary
    public key. This method does not protect the message from being read but allows
    the receiver to verify the identity of the sender since the encrypted message
    can only be decrypted by using the public key of the rightful sender.


    2.  *Public-to-private* transactions  – not shown in Figure [3-4](#505424_1_En_3_Chapter.xhtml#Fig4) –
    in which the sender uses the *receiver’s public key to encrypt* his message. The
    receiver can then decrypt it by using his private key accordingly. In contrast
    to the first application option, this method protects the message from being red
    since the data that has been encrypted by a particular public key can only be
    decrypted by using the complementary private key that is owned by the intended
    receiver.


    The digital signatures used in a blockchain network to authorize a transaction
    are based on the asymmetric private-to-public encryption scheme. It is created
    in three steps shown in Figure [3-5](#505424_1_En_3_Chapter.xhtml#Fig5) (a): (1)
    hashing the actual transaction message, (2) encrypting the hashed transaction
    message by using the private key of the sender, and (3) creating the digital signature
    finally by adding the encrypted transaction hash to the plaintext of the transaction
    message. This digital signature is then distributed across the network. One node
    will randomly pick it up and authorize the transaction by conducting the following
    three steps depicted in Figure [3-5](#505424_1_En_3_Chapter.xhtml#Fig5) (b): (4)
    decrypt the transaction hash by using the sender’s public key, (5) hash the transaction
    message contained in the file, and (6) compare both results with each other. If
    both results are identical, the node can conclude that


    *   The message was indeed signed by the sender because the digital signature
    could be decrypted successfully by using the sender’s public key.


    *   The transaction message contained in the digital signature is correct because
    the decrypted transaction hash matches with the transaction hash that was generated
    by the authorizing node independently.


    If this comparison does not reveal identical results, the transaction is not authorized
    by the network and the respective transaction is identified as fraudulent and
    not forwarded into the mempool. You may have noticed that fraudulent transactions
    can only be avoided if the private key is ultimately kept secret. Once it is stolen
    by a malicious third party, fraudulent and illegal transactions cannot be avoided,
    which is why the storage of the private key plays a very crucial role in the blockchain
    ecosystem.


    The storage of a user’s private key is generally facilitated by a so-called *wallet*
    . A wallet is a piece of software or hardware that allows users to access the
    blockchain network and authorize transactions by providing an easy-to-use gateway
    to the blockchain network. Wallets can be implemented on a computer that is either
    always online and connected or permanently offline and disconnected from the blockchain
    network. Online wallets are also called *hot wallets* since they are – by virtue
    of being connected – always exposed to hackers and other malicious users. For
    the same reason, offline wallets are referred to as *cold wallets* and mainly
    designed to safely store the user’s private key on some offline device. The most
    simple and equally insecure cold wallet is the *paper wallet* , for which you
    write down your private key on a piece of paper. Depending on your memory skills,
    one of the safest wallets is the *brain wallet* that refers to memorizing your
    private key without writing it down.


    ![../images/505424_1_En_3_Chapter/505424_1_En_3_Fig5_HTML.png](images/505424_1_En_3_Chapter/505424_1_En_3_Fig5_HTML.png)


    Figure 3-5


    The use of the digital signature for the authorization of a transaction. (a) shows
    how the digital signature is created, while (b) depicts how it is used to authorize
    the transaction. This authorization is based on comparing the hash values obtained
    from hashing the transaction directly with the decryption of the file that has
    been shared across the network


    When choosing the most appropriate wallet to store your private key, it is important
    to keep in mind that the private key is the only way to access the blockchain.
    In other words, losing your private key means that you are permanently locked
    out of the blockchain and all information stored about you is irretrievably lost
    since there is no way to reset or recreate private keys. Most of the private keys
    used to access the Bitcoin blockchain, for example, are stored in hot wallets
    that are offered by hosted wallet services, cryptocurrencies exchanges, and Bitcoin
    traders, such as the multi-asset broker eToro.'
