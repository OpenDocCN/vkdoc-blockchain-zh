    # 5. 你的数字化行动计划


    前几章让你深入了解了推动私人和公共组织数字化转型的三项最重要的数字技术：量子计算、区块链技术和人工智能。每章末尾以示例方式描述的不同应用和用例表明，每项技术不仅能够优化现有产品和服务，还能在成熟市场或全新市场及环境中探索新的增长机遇。


    第 2 章“量子计算”将量子计算介绍为一种变革力量，适用于那些利用（超）计算来解决高度复杂的优化、建模和仿真问题的组织。我们还了解了区块链技术的深远潜力及其独特能力：在不可信环境中建立信任，并实现两个或多个交易伙伴之间经过加密保护的价值转移。最后同样重要的是，我们研究了作为大数据分析、机器学习及其他应用基础技术的人工智能，这些应用使得大型数据集能够变现，并实现数据驱动——因而更加透明和客观——的决策流程。


    为此，还有一个非常重要的问题有待回答：我们如何利用这些数字技术，开始对我们自身生态系统或组织的数字化转型？这正是本章的重点。我们将讨论一个易于使用的数字化行动计划，该计划将指导你完成自身的数字化转型，并介绍你的数字化议程中应考虑的八个关键维度，如图
    5-1 所示。我们将首先深入探讨如何开发合适的业务和运营模式，这些模式由数字技术驱动，并由适当的技术栈和计算平台支持。之后，我们将讨论如何通过提供连贯且共享的数据平台来数字化组织的核心。我们还将了解识别合适试点项目的关键标准，以及赋能管理层和员工所带来的变革性（但往往被低估的）影响。此外，基于敏捷协作模式来塑造组织结构，对于成功完成数字化转型也至关重要。最后同样重要的是，我们将看到，成功的数字化转型依赖于一种开放创新的文化，这种文化通过将你的生态系统作为另一个关键维度，促进反馈和新想法的整合。


    ![../images/505424_1_En_5_Chapter/505424_1_En_5_Fig1_HTML.png](img/505424_1_En_5_Fig1_HTML.png)


    *图 5-1* — 数字化转型的八个关键维度


    但在我们根据数字化转型的八个关键维度详细讨论这一数字化行动计划之前，先来看看微软的数字化转型案例有助于我们理解一些相似之处：2011 年，微软是一家疲态尽显的公司。它面临着一系列由互联网引发的严峻竞争威胁，并遭遇了严重的反垄断审查，这两者都对其现有业务模式构成了威胁。其传统的软件业务是将软件光盘运往全球各地，将
    `Microsoft DOS`、`Windows` 和 `Office` 安装到每台计算机上。除了利用这一经典软件业务外，微软当时还在试验一项名为 `Microsoft
    Azure` 的小型云计算服务，用于按需交付软件和服务。然而，这个探索性项目被普遍认为是一个不盈利的失败品，这也是微软当时专注于挖掘其传统业务的原因。但时任微软服务器与工具事业部负责人的萨提亚·纳德拉（Satya
    Nadella）并不同意这一战略评估，他坚信云计算将是微软的未来。三年后，萨提亚·纳德拉接替史蒂夫·鲍尔默（Steve Ballmer）出任首席执行官，并在给员工的第一封邮件中强化了他的宏伟愿景，他写道：“我们的行业不尊重传统——它只尊重创新。[……]
    我们的工作是确保微软在一个移动优先、云优先的世界中蓬勃发展” [1]。为了实现他清晰而令人信服的愿景，他在随后的几年里重新设计了微软的软件交付流程，将底层传统业务模式从“将软件安装在本地计算硬件上”转变为“通过云计算按需提供软件即服务”。为此，萨提亚·纳德拉扩大了数字试点项目
    `Azure` 的规模，为其添加了越来越多的基于云的应用程序，例如 `Microsoft Office 365` 和 `Microsoft Dynamics`（一种企业资源规划和客户关系管理软件）。2018
    年收购 `GitHub`（一个非常受欢迎的开源软件项目和工具在线存储库）进一步推动了他的战略。凭借他对云计算未来的清晰愿景和坚定信念，他成功地将微软转型为一家云软件公司。因此，在他担任首席执行官的的头三年里，微软的股价上涨了两倍。但这并非他议程上的最后一次数字化转型。受其好友、谷歌首席执行官桑达尔·皮查伊（Sundar
    Pichai）著名的“AI 优先”宣言^(¹³⁰) 的启发 [2]，萨提亚·纳德拉在 2018 年调整了自己的愿景，并规划了微软下一次转型为“智能云和智能边缘”计算提供商的计划
    [4]，同时利用本书介绍的三项数字支持技术。他后来在接受采访时指出，“人工智能是运行时，它将塑造我们所做的一切” [5]——这是微软凭借其 `Azure`
    云计算平台至今仍在非常成功地推行的一项数字商业战略。


    我们可以从微软的数字化转型历程中学到什么？最重要的教训是，成功的新产品或服务并非没有创业风险，因而也并非没有财务风险。例如，亚马逊过去几年确实有过一些价值数十亿美元的惊人失败案例
    [6]，例如 `Amazon Auctions`、`zShops` 和后来分别成为其极为成功的产品 `Amazon Marketplace` 和 `Amazon
    Alexa`/`Echo` 基础的 `Fire Phone`。亚马逊创始人杰弗里·贝佐斯（Jeffrey Bezos）曾在 2016 年致股东的信中就此发表过著名评论：

    '
- fmt: '失败与发明是一对不可分割的孪生兄弟。要发明，就必须进行实验，如果你事先知道它会成功，那就不算实验。大多数大型组织都接受发明的理念，但不愿意忍受实现发明所必需的一系列失败实验。超额回报往往来自于逆常规思维而行，而常规思维通常是正确的。如果一项投资有10%的机会获得100倍的回报，你应该每次都押注于此。但你十次中仍有九次会错[[7](#505424_1_En_5_Chapter.xhtml#Par146)]。


    新的商业构想始终是对未来的假设，因此也是对客户未来可能需求的直觉判断。因此，大多数高管常常犹豫是否采用新技术并转型其业务，因为这些技术可能会威胁到现有的流程、业务和收入来源。


    要学习的第二个教训是，数字化转型是一个旅程。这个旅程始于制定一个清晰且令人信服的愿景，一个战略目标，它能在员工中建立高度承诺，引导组织完成转型，并让所有利益相关者认为他们正参与一场激动人心的冒险——借用传奇的法国皇帝拿破仑·波拿巴的话来说，“领导者的角色是定义现实，然后给予希望”。领导者的愿景捕捉商业和社会中的关键趋势，并清晰地阐明这些趋势如何转化为一个能够为客户和其他利益相关者创造价值的整体运营模式。


    从微软要学习的第三个教训是，数字化转型总是从在试点项目中探索新技术开始，这些项目偶尔可以扩大规模并推广，最终实现整个组织的转型。数字化转型并非止步于组织的层级结构，还涉及战略、文化、员工以及组织其他核心能力的重大变革。仔细审视之下，这并不令人惊讶，因为数字化转型是由数字技术推动的，而这些技术最终依赖于某种算法、程序或软件所促进的数据处理。但根据其复杂性，开发并直接向客户部署一个没有bug的软件几乎是不可能的。这就是为什么软件开发——以及类似的数字技术——提倡一种迭代式的产品创新和开发方法，这种方法由开放的创新文化和员工之间敏捷的协作方式所支撑。这就是为什么数字化转型会影响组织的所有维度，并且远不止是使用数字技术将以前基于纸质的流程数字化。


    在比较微软的数字化转型之旅与其他公司的转型之旅时，你很快就会注意到，不幸的是，不存在一个放之四海而皆准的数字化转型方法。然而，下面的框架从八个关键维度描述了数字化转型，并可能很好地为你自己的数字化转型之旅提供指导。它聚焦于成熟公司（在数字化转型过程中需要继续运营现有传统业务）的数字化转型。


    ## 5.1 构想数字化战略


    每个组织——无论是私营还是公共——的主要目的是创造、交付和获取价值。这种价值源于两个概念。第一个是*商业模式*，它定义了一个组织如何在经济、社会、文化或其他背景下创造和获取价值^([(131)](#fn131))。第二个是组织的*运营模式*，它定义了组织向客户交付价值的特定方式——如果你愿意，可以称之为“完成任务的计划”。换句话说，商业模式定义了理论，而运营模式则捕捉了组织价值创造过程的实践。数字化转型就是通过利用数字技术的力量，重新思考和重新架构商业模式和运营模式。它通常旨在
    (1) 通过简化内部流程来提高运营卓越性，或 (2) 增强客户体验[[8](#505424_1_En_5_Chapter.xhtml#Par147)]，从而将传统的商业模式和运营模式转变为数字化的。


    ### 5.1.1 构想数字化战略：开发数字化商业模式


    从历史上看，构想一个能够创造可持续竞争优势^((132))的成功商业模式的过程，主要由两种方法主导：(1) 市场定位和 (2) 基于资源的组织观。第一种方法涉及寻找一个具有高进入壁垒的（行业）领域，并使产品和服务与竞争对手区分开来。第二种方法利用组织稀有且有价值的资产和能力，例如专利或高度专业化的机器，这些是竞争对手难以模仿的。鉴于来自数字化商业模式的竞争日益激烈，这两种方法如今似乎都不适用，因为数字化组织通过平台和网络而非实物商品和基础设施来创造价值。


    因此，构想数字化商业模式的最佳途径是从以客户为中心的视角出发，旨在通过更好的客户体验来取悦客户。一种有助于更好地了解客户（包括其消费行为和动机）且富有洞察力的方法是*客户旅程*，即对客户在使用特定产品或服务时所经历体验的深入、逐步分析[[11](#505424_1_En_5_Chapter.xhtml#Par150),
    [12](#505424_1_En_5_Chapter.xhtml#Par151)]。在整个客户旅程中，客户处于“宇宙的中心”，因为它始于客户而非产品或服务。在过去几年中，它已被众多组织成功用于识别未满足的需求和其他客户不满意的来源。这两种洞察都极具价值，因为它们揭示了现有产品和服务的优缺点，从而开辟了新的商业机会。构想数字化商业模式的下一步是将从客户旅程中得出的不同见解整合起来，并问自己如何改善客户体验，以及需要哪些（新的）产品和服务来实现这一目标。例如，众所周知，亚马逊经常进行客户旅程分析，以在零售领域提供最佳的客户体验^((133))。'
  raw: '[...] failure and invention are inseparable twins. To invent you have to experiment,
    and if you know in advance that it’s going to work, it’s not an experiment. Most
    large organizations embrace the idea of invention, but are not willing to suffer
    the string of failed experiments necessary to get there. Outsized returns often
    come from betting against conventional wisdom, and conventional wisdom is usually
    right. Given a ten percent chance of a 100 times payoff, you should take that
    bet every time. But you’re still going to be wrong nine times out of ten [[7](#505424_1_En_5_Chapter.xhtml#Par146)].


    New business ideas are always hypotheses about the future and thus a hunch of
    what customers may need tomorrow. Most executives therefore often hesitate to
    adopt new technologies and transform their business as they potentially threaten
    existing processes, businesses, and revenue streams.


    The second lesson to learn is that digital transformation is a journey. This journey
    starts with developing a clear and compelling vision, a strategic objective that
    creates high commitment among the employees, guides an organization along its
    transformation, and makes all shareholders think that they are part of an exciting
    adventure – “the leader’s role is to define reality, then give hope” to say it
    with the words of the legendary French emperor Napoléon Bonaparte. The leader’s
    vision picks up key trends in business and society and provides a clear view on
    how they translate in an overall operating model capable of creating value for
    customers and other stakeholders.


    The third lesson to learn from Microsoft is that a digital transformation always
    starts with exploring new technologies in pilot projects that can occasionally
    scaled up and rolled out to transform the entire organization ultimately. Digital
    transformation does not stop at an organization’s hierarchical structure, but
    also involves major changes with respect to strategy, culture, employees, and
    other core capabilities of an organization. This is not surprising on closer inspection
    since digital transformation is enabled by digital technologies that ultimately
    rely on data processing facilitated by some sort of algorithm, program, or software.
    But depending on its complexity, it is almost impossible to develop and directly
    deploy a software to customers without any bugs. This is why software development –
    and digital technologies alike – promote an iterative approach to product innovation
    and development that is enabled by an open innovation culture and agile ways of
    collaboration among employees. This is why digital transformation impacts all
    dimensions of an organization and is much more than using digital technologies
    to digitize formerly paper-based processes.


    When comparing Microsoft’s digital transformation journey with the ones of other
    companies, you will quickly notice that there is no one-size-fits-all approach
    to digital transformation, unfortunately. However, the following framework describes
    digital transformation in terms of eight key dimensions and may well act as a
    good guidance for your own digital transformation journey. It focuses on the digital
    transformation of incumbent companies, who need to continue running an established
    legacy business during their digital transformation journey.


    ## 5.1 Envision a Digital Strategy


    The main purpose of every organization – private or public – is to create, deliver,
    and capture value. This value originates from two concepts. The first one is the
    *business model* , which defines how an organization creates and captures value
    in economic, social, cultural, or other contexts.^([^(131)](#fn131)) The second
    is the organization’s *operating model*, which defines the particular way an organization
    delivers value to its customers – the “plan to get it done” if you wish. In other
    words, the business model defines the theory while the operating model captures
    the practice of an organization’s value creation process. Digital transformation
    is about rethinking and rearchitecting both the business and operating model by
    leveraging the power of digital technologies. It usually targets either (1) an
    increase of the operational excellence by streamlining internal processes or (2)
    an enhancement of the customer experience [[8](#505424_1_En_5_Chapter.xhtml#Par147)]
    to transform a traditional to a digital business and operating model.


    ### 5.1.1 Envision a Digital Strategy: Develop a Digital Business Model


    Historically, the process of envisioning a successful business model capable of
    creating a sustainable competitive advantage^([^(132)](#fn132)) was dominated
    by two approaches: (1) market positioning and the (2) resource-based view of an
    organization. The first approach involves finding an (industry) sector with high
    entry barriers and differentiating products and services from competitors. The
    second approach leverages an organization’s rare and valuable assets and capabilities,
    such as patents or highly specialized machinery, that are difficult for competitors
    to imitate. Given the increasing competition from digital business models, both
    approaches seem to be inappropriate today since digital organizations create value
    through platforms and networks rather than physical goods and infrastructure.


    Hence, the best way to envision a digital business model is by starting with a
    customer-centric view and aiming to delight customers with a better customer experience.
    An insightful methodology to better understand your customers including their
    consuming behavior and motivation is a *customer journey*, an in-depth step-by-step
    analysis of the experience a customer goes through when using a certain product
    or service [[11](#505424_1_En_5_Chapter.xhtml#Par150), [12](#505424_1_En_5_Chapter.xhtml#Par151)].
    Throughout a customer journey, the customer is at the “center of the universe”
    as it starts with the customer rather than a product or service. It has been used
    successfully by numerous organizations over the past couple of years to identify
    unmet needs and other sources of customer dissatisfaction. Both insights are very
    valuable as they reveal the strengths and weaknesses of existing products and
    services and thereby open up new business opportunities. The next step toward
    envisioning a digital business model is about putting the different insights derived
    from the customer journey together and asking yourself how the customer experience
    can be improved and which (novel) products and services are required to do so.
    Amazon, for instance, is admittedly conducting customer journeys frequently to
    deliver the very best customer experience in retail.^([^(133)](#fn133))'
