- fmt: '在许多方面，IBM 与谷歌形成镜像关系。尽管谷歌相当年轻，而 IBM 则建立在悠久的历史之上，其产品组合每十年都会发生变化。国际商业机器公司（IBM）由美国商人托马斯·沃森和查尔斯·弗林特于
    1911 年创立，最初销售制表设备，随后进入计算机硬件业务，专注于设计大型 IT 系统。这些系统包括所谓的**大型计算机**，专为企业和大公司设计。另一方面，谷歌则从向消费者销售最终产品起步，其核心产品是`Google
    Search`，并以此为基础构建了多样化且不断增长的产品组合。直到最近，两家公司都进入了云计算业务，提供按需 IT 服务，并支持包括量子计算、区块链技术和人工智能在内的多种数字支持技术。IBM
    持久不衰且持续创新的秘诀在于其核心研究部门，该部门广泛探索那些在商业上可行且具有明确应用之前很久的技术。IBM 前首席执行官塞缪尔·帕米萨诺 (Samuel
    Palmisano) 曾指出：“创新发生在发明与洞察的交汇点。它关乎发明的应用——融合新发展和新方法来解决问题。”由于每个人，尤其是在科技行业，最终都会被颠覆[[52](#505424_1_En_1_Chapter.xhtml#Par255)]，IBM
    建立了一个非常成功的创新模式，该模式基于两大支柱：(1) 内部创新平台，员工可在其中发布想法；(2) 开放的协作平台，将外部业务合作伙伴和直接客户的创意与反馈整合到
    IBM 的生态系统中，以促进新产品和新服务的开发[[53](#505424_1_En_1_Chapter.xhtml#Par256), [54](#505424_1_En_1_Chapter.xhtml#Par257)]。因此，IBM
    非常确信，创新和创意的首要来源是员工、业务合作伙伴和直接客户——创新实际上无处不在。


    与谷歌和 IBM 不同，亚马逊建立了一种以客户为中心的创新流程，该流程基于故事叙述而非花哨的`PowerPoint`幻灯片[[55](#505424_1_En_1_Chapter.xhtml#Par258)]。每一项创新都始于客户，以及一份六页的备忘录，该备忘录内部称为`PR
    FAQ`文档，在实现新产品或服务之前需要获得内部批准。这份更具叙述性和启发性的文档包含三个部分：(1) 新闻稿，(2) 常见问题解答部分，以及 (3) 可视化内容，旨在回答关于拟议创新（产品或服务）的以下五个核心问题：


    *   客户是谁？

    *   客户的痛点或机遇是什么？

    *   最重要的客户利益是否明确？

    *   你如何知道客户需要或想要什么？

    *   客户体验是什么样的？


    新闻稿是开启对话、实现清晰度和客户聚焦的工具，通常篇幅为 1 到 2 页，并以简单、清晰、以客户为中心的方式描述拟开发的产品或服务。接下来的 4 到 5 页
    FAQ 部分回答了内部和外部利益相关者（包括客户）可能对产品或服务产生的所有首要问题，这对于在团队中建立信任和可操作性至关重要。此部分还包括财务评估，以及对推出或不推出拟议产品或服务相关的财务和战略风险的评估。所有无法用语言描述的创新方面，都通过`PR
    FAQ`文档第三部分中的粗略绘图来可视化。这个可视化部分可以描绘整体客户旅程，或者关于产品或服务处理和使用方面的关键细节。通过这种方式，可视化部分传达了整体概念，使读者更容易理解拟议的创新。`PR
    FAQ`文档会在组织内多次流转，反复修改，直到准备好由亚马逊管理团队最终批准。`PR FAQ`文档的叙述性和可视化特性促进了思维的清晰，并迫使开发团队站在客户的角度思考问题。通过这种方式，在产品发布之前很久就预见到了假设的客户反应和问题，这使得亚马逊能够简化其产品开发流程，明确其使命，并使产品或服务在后续成功满足客户需求的市场中定位。这种非常强烈的客户关注贯穿了整个产品开发过程，可以被视为“从客户出发，逆向工作”的创新，而大多数组织则是先创造新产品或服务，然后再寻找潜在客户。杰夫·贝佐斯
    (Jeffrey Bezos) 曾用以下话语描述这个过程：“大多数公司先编写软件，让它全部运行起来，然后把它扔给营销部门，说‘这是我们做的，去写新闻稿吧。’这个过程实际上是颠倒的。”为此，亚马逊开始系统地分析其网络中自然流动的信息——阿里巴巴战略负责人兼学术顾问曾鸣将这一过程称为“数据化”[[56](#505424_1_En_1_Chapter.xhtml#Par259)]。因此，亚马逊的服务随着客户数量和销售商品数量等规模的扩大而改进[[^(19)](#fn19)]，而传统企业则面临复杂性成本，这些成本有时可能导致成功组织的衰落，如前所述。


    对数字技术最著名倡导者和拥有者的创新模式的简要介绍表明，每个组织都必须找到适合自己的创新方式——不幸的是，没有放之四海而皆准的方法。然而，这三个创新模式有一些共同点：它们都以客户为中心，并培养一种开放、沟通式的创新文化，利用数字技术和敏捷协作模式来整合客户反馈，并迭代地改进产品和服务。


    为了更好地理解量子计算、区块链技术和人工智能如何利用数据获取可货币化的更深入洞察，在下一节中简要了解经典数据处理将大有裨益。


    ## 1.4 经典数据处理


    我们在前面的讨论中已经了解到，数字化转型建立在采用移动和非移动计算设备处理信息的数字技术之上。此外，我们意识到任何数字技术的核心都是`digitization`，它促进了数字、文本、录音带和视频向数字格式的转换。创建这种格式的秘诀称为数字代码，我们将在下面更详细地探讨它。'
  raw: 'In many ways, the mirror image of Google is IBM. While Google is fairly young,
    IBM builds on a very long history with its product portfolio changing from decade
    to decade. Founded by the American businessmen Thomas Watson and Charles Flint
    back in 1911, the International Business Machines Corporation started with selling
    tabulating equipment and moved into the computer hardware business to focus on
    designing large-scale IT systems. Those systems included so-called *mainframe
    computers* that were designed for enterprises and large corporates. Google, on
    the other hand, started to sell finished products to consumers with Google Search
    being the core product of its versatile and steadily increasing product portfolio.
    Just until recently, both companies moved into the cloud computing business, where
    they offer on-demand IT services and access to different digital support technologies
    including quantum computing, blockchain technology, and artificial intelligence.
    The secret of IBM’s durability and enduring innovation is its central research
    division that broadly explores technologies long before they become commercially
    viable and have a clear application. The former CEO of IBM Samuel Palmisano once
    noted that “innovation occurs at the intersection of invention and insight. It’s
    about the application of invention – the fusion of new developments and new approaches
    to solve problems.” Since everybody, especially in the technology business, gets
    disrupted eventually [[52](#505424_1_En_1_Chapter.xhtml#Par255)], IBM has implemented
    a very successful innovation model built on two pillars: an (1) internal innovation
    platform, where employees can post their ideas, and an (2) open collaborative
    platform that integrates the ideas and feedback of external business partners
    and direct customers into IBM’s ecosystem to foster the development of new products
    and services [[53](#505424_1_En_1_Chapter.xhtml#Par256), [54](#505424_1_En_1_Chapter.xhtml#Par257)].
    IBM will thus most certainly agree that the top sources of innovations and new
    ideas are employees, business partners, and direct customers – innovation comes
    from literally everywhere.


    In contrast to Google and IBM, Amazon has established a very customer-centric
    innovation process that is based on storytelling rather than catchy PowerPoint
    slides [[55](#505424_1_En_1_Chapter.xhtml#Par258)]. Each innovation starts with
    the customer and the creation of a six-page memo that is internally referred to
    as “PR FAQ” document and required for the internal approval prior to the realization
    of a new product or service. This rather narrative and thought-provoking document
    contains three parts: a (1) press release, (2) frequently asked questions section,
    and (3) visuals and aims to answer the following five core questions about the
    proposed innovation (product or service):


    *   Who is the customer?


    *   What is the customer problem or opportunity?


    *   Is the most important customer benefit clear?


    *   How do you know what customers need or want?


    *   What does the customer experience look like?


    The press release is a conversation starter to achieve clarity and customer focus
    and typically surmounts one to two pages and encodes a simple, clear, and customer-centric
    description of the product or service that is proposed to be developed. The following
    four to five FAQ pages answer all top-of-mind questions internal and external
    stakeholders (including customers) may have about the product or service, which
    is crucial for creating trust and actionability among the team. This section also
    includes a financial evaluation as well as an assessment of financial and strategic
    risks associated with launching and not launching the proposed product or service.
    All aspects of the innovation that cannot be described with words are visualized
    by rough drawings in the third part of the PR FAQ document. This visuals section
    may depict the overall customer journey, for instance, or critical aspects regarding
    the handling and usage of the product or service. In this way, the visuals section
    conveys the overall concept and makes it easier for the reader to understand the
    proposed innovation. The PR FAQ document circulates through the organization various
    times to get revised iteratively until it is ready for the final approval by Amazon’s
    management team. The narrative and visual character of the PR FAQ document fosters
    clarity of thoughts and forces the development team to take the customer’s point
    of view. Hypothetical customer reactions and questions are anticipated long before
    the product launch on this way, which allows Amazon to streamline its product
    development, sharpen its mission, and position the product or service in the market
    tuned to the customer’s needs successfully later on. This very strong customer
    focus permeates the entire product development process and can be viewed as “innovation
    by starting with the customer and working back,” while most organizations create
    a new product or service first and look for potential customers afterward. Jeffrey
    Bezos once described this process with the words “Most companies write the software,
    they get it all working, and then they throw it over the wall to the marketing
    department, saying ‘here is what we built, go write the press release.’ That process
    is the one that’s actually backwards.” For this purpose, Amazon started to systematically
    analyze the information that naturally flows through their network – a process,
    which Ming Zeng, Alibaba’s strategy chief and academic counsel, calls *datafication*
    [[56](#505424_1_En_1_Chapter.xhtml#Par259)]. As a result, Amazon’s services improve
    with volume, such as the number of customers and items sold,^([^(19)](#fn19))
    whereas traditional businesses run into complexity costs that may occasionally
    become the downfall of successful organizations as outlined earlier.


    This very brief introduction to the innovation models of the most popular advocates
    and proprietors of digital technology reveals that each organization has to find
    the right way to innovate for themselves – there is no one-size-fits-all approach,
    unfortunately. There are, however, a few things all three innovation models have
    in common: they are all centered around the customer and foster an open and communicative
    innovation culture that leverages digital technology and agile collaboration models
    to integrate customer feedback and improve products and services iteratively.


    In order to better understand how quantum computing, blockchain technology, and
    artificial intelligence leverage data to gain further insights that can be monetized,
    it is instructive to have a brief look on classical data processing in the next
    section.


    ## 1.4 Classical Data Processing


    We have learned in our previous discussion that digital transformation builds
    on digital technologies that employ mobile and immobile computational devices
    to process information. Furthermore, we became aware that the core of any digital
    technology is digitization, which facilitates the conversion of numbers, texts,
    audio tapes, and videos into a digital format. The recipe to create this format
    is called digital code, which we will explore in more detail as follows.'
  trans: '

    在许多方面，IBM 与谷歌形成镜像关系。尽管谷歌相当年轻，而 IBM 则建立在悠久的历史之上，其产品组合每十年都会发生变化。国际商业机器公司（IBM）由美国商人托马斯·沃森和查尔斯·弗林特于
    1911 年创立，最初销售制表设备，随后进入计算机硬件业务，专注于设计大型 IT 系统。这些系统包括所谓的**大型计算机**，专为企业和大公司设计。另一方面，谷歌则从向消费者销售最终产品起步，其核心产品是`Google
    Search`，并以此为基础构建了多样化且不断增长的产品组合。直到最近，两家公司都进入了云计算业务，提供按需 IT 服务，并支持包括量子计算、区块链技术和人工智能在内的多种数字支持技术。IBM
    持久不衰且持续创新的秘诀在于其核心研究部门，该部门广泛探索那些在商业上可行且具有明确应用之前很久的技术。IBM 前首席执行官塞缪尔·帕米萨诺 (Samuel
    Palmisano) 曾指出：“创新发生在发明与洞察的交汇点。它关乎发明的应用——融合新发展和新方法来解决问题。”由于每个人，尤其是在科技行业，最终都会被颠覆[52]，IBM
    建立了一个非常成功的创新模式，该模式基于两大支柱：(1) 内部创新平台，员工可在其中发布想法；(2) 开放的协作平台，将外部业务合作伙伴和直接客户的创意与反馈整合到
    IBM 的生态系统中，以促进新产品和新服务的开发[53, 54]。因此，IBM 非常确信，创新和创意的首要来源是员工、业务合作伙伴和直接客户——创新实际上无处不在。


    与谷歌和 IBM 不同，亚马逊建立了一种以客户为中心的创新流程，该流程基于故事叙述而非花哨的`PowerPoint`幻灯片[55]。每一项创新都始于客户，以及一份六页的备忘录，该备忘录内部称为`PR
    FAQ`文档，在实现新产品或服务之前需要获得内部批准。这份更具叙述性和启发性的文档包含三个部分：(1) 新闻稿，(2) 常见问题解答部分，以及 (3) 可视化内容，旨在回答关于拟议创新（产品或服务）的以下五个核心问题：


    *   客户是谁？

    *   客户的痛点或机遇是什么？

    *   最重要的客户利益是否明确？

    *   你如何知道客户需要或想要什么？

    *   客户体验是什么样的？


    新闻稿是开启对话、实现清晰度和客户聚焦的工具，通常篇幅为 1 到 2 页，并以简单、清晰、以客户为中心的方式描述拟开发的产品或服务。接下来的 4 到 5 页
    FAQ 部分回答了内部和外部利益相关者（包括客户）可能对产品或服务产生的所有首要问题，这对于在团队中建立信任和可操作性至关重要。此部分还包括财务评估，以及对推出或不推出拟议产品或服务相关的财务和战略风险的评估。所有无法用语言描述的创新方面，都通过`PR
    FAQ`文档第三部分中的粗略绘图来可视化。这个可视化部分可以描绘整体客户旅程，或者关于产品或服务处理和使用方面的关键细节。通过这种方式，可视化部分传达了整体概念，使读者更容易理解拟议的创新。`PR
    FAQ`文档会在组织内多次流转，反复修改，直到准备好由亚马逊管理团队最终批准。`PR FAQ`文档的叙述性和可视化特性促进了思维的清晰，并迫使开发团队站在客户的角度思考问题。通过这种方式，在产品发布之前很久就预见到了假设的客户反应和问题，这使得亚马逊能够简化其产品开发流程，明确其使命，并使产品或服务在后续成功满足客户需求的市场中定位。这种非常强烈的客户关注贯穿了整个产品开发过程，可以被视为“从客户出发，逆向工作”的创新，而大多数组织则是先创造新产品或服务，然后再寻找潜在客户。杰夫·贝佐斯
    (Jeffrey Bezos) 曾用以下话语描述这个过程：“大多数公司先编写软件，让它全部运行起来，然后把它扔给营销部门，说‘这是我们做的，去写新闻稿吧。’这个过程实际上是颠倒的。”为此，亚马逊开始系统地分析其网络中自然流动的信息——阿里巴巴战略负责人兼学术顾问曾鸣将这一过程称为“数据化”[56]。因此，亚马逊的服务随着客户数量和销售商品数量等规模的扩大而改进[¹⁹]，而传统企业则面临复杂性成本，这些成本有时可能导致成功组织的衰落，如前所述。


    对数字技术最著名倡导者和拥有者的创新模式的简要介绍表明，每个组织都必须找到适合自己的创新方式——不幸的是，没有放之四海而皆准的方法。然而，这三个创新模式有一些共同点：它们都以客户为中心，并培养一种开放、沟通式的创新文化，利用数字技术和敏捷协作模式来整合客户反馈，并迭代地改进产品和服务。


    为了更好地理解量子计算、区块链技术和人工智能如何利用数据获取可货币化的更深入洞察，在下一节中简要了解经典数据处理将大有裨益。


    ## 1.4 经典数据处理


    我们在前面的讨论中已经了解到，数字化转型建立在采用移动和非移动计算设备处理信息的数字技术之上。此外，我们意识到任何数字技术的核心都是`digitization`，它促进了数字、文本、录音带和视频向数字格式的转换。创建这种格式的秘诀称为数字代码，我们将在下面更详细地探讨它。

    '
- fmt: "### 1.4.1 数字代码\n\n数字代码的基础参考点可以追溯到1679年，当时德国数学家戈特弗里德·威廉·莱布尼茨（Gottfried Wilhelm\
    \ Leibniz）发展了现代*二进制数系统* [[57](#505424_1_En_1_Chapter.xhtml#Par260)]。该系统使我们能够将任何十进制数编码（或表达）为一串“0”和“1”。例如，十进制数1对应二进制数`0001`，十进制数2对应二进制数`0010`，3对应`0011`，以此类推。因此，二进制系统中的方程\n\
    \n```\n0000 + 0001 + 0010 = 0011\n```\n\n(1.1)\n\n对应你在小学最熟悉的十进制系统中的\n\n```\n0\
    \ + 1 + 2 = 3\n```\n\n(1.2)\n\n当你比较这两个方程时，你会发现在二进制数系统中，第一个方程只揭示了两种数字符号（“0”和“1”），而十进制版本则需要使用四种不同的数字符号（“0”、“1”、“2”和“3”）。这个简单的比较表明，二进制数系统中的计算比十进制系统更简单，也更容易执行。这种复杂性的降低从计算角度来看是一个主要优势，也是数字技术使用二进制而非十进制数字来编码信息的主要原因。\n\
    \n但在我们讨论现代计算机和数字设备如何处理这些数字之前，引入一些进一步的术语是方便的。第一个术语是*比特（bit）*。一比特是二进制数的一位。这种信息量化的概念最初是由“信息论之父”、贝尔实验室的美国数学家克劳德·香农（Claude\
    \ Shannon）在1948年提出的 [[58](#505424_1_En_1_Chapter.xhtml#Par261)]。例如，二进制数`0001`总共由4比特组成，这就是为什么这个二进制数系统也被称为4比特编码方案。由于每比特只能取值“0”或“1”，一个4比特编码方案总共可以编码`2^4\
    \ = 2 * 2 * 2 * 2 = 16`个不同的符号。16个符号显然不足以编码所有可能的十进制数字和拉丁字母表中的字母。这就是为什么在1968年开发了另一种更通用的编码方案，即“美国信息交换标准代码”或*ASCII*。这种ASCII码使用8比特（也称为1*字节*）的二进制编码方案，总共能够编码`2^8\
    \ = 256`个符号，这足以表示十进制数字0, 1, ..., 9以及拉丁字母A, B, ..., Z。ASCII码是当今数字设备中最常用的编码方案。在其现代版本中，ASCII码将以下数字、字母和符号转换为8比特二进制数：\n\
    \n```\n!\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~\n\
    ```\n\n(1.3)\n\n类似的编码方案也已针对其他信息源（如图像、音频和视频数据）开发和优化。例如，一张图像通常由不同的*像素*网格编码，即具有特定位置和颜色的小图像元素，这两者都可以转换为二进制数。图[1-7](#505424_1_En_1_Chapter.xhtml#Fig7)展示了一个手写数字“3”的灰度图像，以示意性地说明这种编码方案。该图像有12行和12列，因此总共有`12\
    \ * 12 = 144`个像素。在不深入细节的情况下，我们可以将像素的颜色和位置都与一个4比特二进制数关联，并将它们连接成一个序列。因此，根据以下编码方案，位于第二行第三列的黑色像素可能与二进制数`100000100011`相关联^[（20）](#fn20)：\n\
    \n```\n黑色彩色  第二行   第三列\n  1000     0010     0011\n```\n\n(1.4)\n\n![../images/505424_1_En_1_Chapter/505424_1_En_1_Fig7_HTML.png](images/505424_1_En_1_Chapter/505424_1_En_1_Fig7_HTML.png)\n\
    \n*图 1-7* 手写数字“3”的数字图像。每个方框对应一个像素；整个图像总共由`12 * 12 = 144`个像素构成。\n\n彩色图像的编码方案遵循相同的原理。为此，每个像素的颜色首先被分解为基色红、黄、蓝的组成部分。然后，这些组成部分以类似于灰度图像编码方案的方式转换为二进制数字。由此产生的编码方案是一种常用的图像编码，通常被称为*RGB颜色代码*，原因显而易见。那么，计算机究竟是如何处理这些代表数字信息的二进制数的呢？计算机和其他数字设备到底是如何工作的？"
  raw: '### 1.4.1 The Digital Code


    The foundational reference point of the digital code dates back to 1679 when the
    German mathematician Gottfried Wilhelm Leibniz developed the modern *binary number
    system* [[57](#505424_1_En_1_Chapter.xhtml#Par260)]. This system allows us to
    encode (or express) any decimal number in a series of “0” and “1.” The decimal
    number 1, for example, corresponds to the binary number 0001, the decimal 2 to
    the binary 0010, 3 to 0011, and so on. Accordingly, the equation


    ![$$ 0000+0001+0010=0011 $$](images/505424_1_En_1_Chapter/505424_1_En_1_Chapter_TeX_Equ1.png)


    (1.1)


    in the binary system corresponds to


    ![$$ 0+1+2=3 $$](images/505424_1_En_1_Chapter/505424_1_En_1_Chapter_TeX_Equ2.png)


    (1.2)


    in the decimal system, which you are most familiar with from primary school. When
    you compare those two equations, you will find that the first equation in the
    binary number system only reveals two different number symbols (“0” and “1”),
    while the decimal version requires the use of four different number symbols (“0,”
    “1,” “2,” and “3”). This simple comparison demonstrates that calculations in the
    binary number system are less complex and much easier to perform than in the decimal
    system. This reduction of complexity is a major advantage from a computational
    point of view and the main reason why digital technologies encode information
    in binary and not decimal numbers.


    But before we discuss how modern computers and digital devices process such numbers,
    it is convenient to introduce some further terminology. The first term is the
    *bit*. One bit is one digit of a binary number. This quantification of information
    was first conceived by the “father of information theory,” the American mathematician
    Claude Shannon at Bell Labs in 1948 [[58](#505424_1_En_1_Chapter.xhtml#Par261)].
    The binary number 0001, for example, consists out of 2 bits in total, which is
    why this binary number system is also referred to as a 4-bit encoding scheme.
    Since each bit can either have the value “0” or “1,” a 4-bit encoding scheme can
    encode 2⁴ = 2 ⋅ 2 ⋅ 2 ⋅ 2 = 16 different symbols in total. Sixteen symbols are
    obviously not enough to encode all possible decimal numbers and letters of our
    Latin alphabet. This is why another, more general encoding scheme has been developed
    in 1968, which became known as the “American Standard Code for Information Interchange”
    or *ASCII*. This ASCII code employs an 8-bit (also called 1-*byte*) binary encoding
    scheme that is capable of encoding 2⁸ = 256 symbols in total, which is enough
    for the decimal numbers 0, 1, ..., 9 as well as the Latin letters *A*, *B*, ...,
    *Z*. The ASCII code is the most common encoding scheme used in digital devices
    today. In its modern version, the ASCII code converts the following numbers, letters,
    and symbols into 8-bit binary numbers:


    ![$$ {\displaystyle \begin{array}{l}\kern3.599998em !{}^{"}\#\$\%{\&amp;}^{''}\left(\right)\ast
    +,\hbox{-} ./0123456789:;&lt;=&gt;?\\ {}@\mathrm{ABCDEFGHIJKLMNOPQRSTUVWXYZ}\left[\backslash
    \right]\hat{\mkern6mu} \_\\ {}{\kern3.599998em }^{`}\mathrm{abcdefghijklmnopqrstuvwxyz}\left\{\mid
    \right\}\sim \end{array}} $$](images/505424_1_En_1_Chapter/505424_1_En_1_Chapter_TeX_Equ3.png)


    (1.3)


    Similar encoding schemes have been developed and optimized for other sources of
    information, such as images, audio, and video data. An image, for example, is
    typically encoded by a grid of different *pixels*, that is, small picture elements
    with a specific position and color that can both be converted to binary numbers.
    Figure [1-7](#505424_1_En_1_Chapter.xhtml#Fig7) shows a grayscale image of a handwritten
    number three to illustrate this encoding scheme schematically. The image has 12
    rows and 12 columns and thus 12×12 = 144 pixels in total. Without going into great
    detail, we can associate both the color and position of a pixel with a 4-bit binary
    number and join them together in a sequence. A black pixel in the second row and
    third column may therefore be associated with the binary number 100000100011 based
    on the following encoding scheme^([^(20)](#fn20)):


    ![$$ \underset{\mathrm{Black}\kern0.17em \mathrm{color}}{\underbrace{1000}}\kern0.48em
    \underset{2^{nd}\;\mathrm{row}}{\underbrace{0010}}\kern0.6em \underset{2^{nd}\;\mathrm{row}}{\underbrace{0011}}.
    $$](images/505424_1_En_1_Chapter/505424_1_En_1_Chapter_TeX_Equ4.png)


    (1.4)


    ![../images/505424_1_En_1_Chapter/505424_1_En_1_Fig7_HTML.png](images/505424_1_En_1_Chapter/505424_1_En_1_Fig7_HTML.png)


    Figure 1-7


    Digital image of a handwritten number three. Each box corresponds to one pixel;
    the overall image is built up of 12 × 12 = 144 pixels in total


    The encoding scheme for colored images works according to the same principle.
    For this purpose, the color of each pixel is decomposed into portions of the basic
    colors red, yellow, and blue first. Those portions are then converted into binary
    digits in analogy to the encoding scheme for grayscale images. The resulting coding
    scheme is a frequently used image code that is commonly referred to as *RGB color
    code* for obvious reasons. But how do computers actually process such binary numbers
    that represent digital information? How do computers and other digital devices
    work at all?'
