    # 图灵测试及其哲学意涵


    图灵测试很快在科学界引发了争议性讨论，部分科学家认为该测试可能被操纵。其中最著名的批评者是美国哲学家约翰·塞尔，他于 1980 年设计了一个思想实验来揭示图灵测试的缺陷[10]。该实验被称为`中文房间`，描述了两位人类参与者：一位中文教师和一位中文学习者。实验中的学习者鲍勃坐在封闭房间里，手边有几本包含简单规则的指南，用于将中文字符翻译成英文。房间外是名叫爱丽丝的教师，她通晓中文，以数字方式向鲍勃提交不同中文字符并要求其翻译。经过一段时间的训练后，实验结束，爱丽丝将收到鲍勃提供的准确译文。现在假设鲍勃创建了一个能够翻译中文字的智能计算机程序。约翰·塞尔认为，这个计算机程序不能被证明具有智能并理解中文，因为编写该程序的鲍勃本人完全不懂这门语言。因此他断言，任何计算机都无法拥有人类所不具备的东西——这似乎是一个合理论证，说明我们可能无法实现约翰·塞尔所称的超越人类智能的`强人工智能`。所谓强人工智能（也称通用人工智能），他指的是“一台具有适当输入输出的编程计算机，其拥有心智的方式与人类完全相同”[10]。而`弱人工智能`则指仅为特定任务设计、无法解决未经训练任务的计算机或程序。从历史角度看，约翰·塞尔的研究是对数学家约翰·麦卡锡一年前开创性论文《将心理属性赋予机器》的回应，该论文提出了相反观点[11]。这场关于人工智能哲学意涵的争论至今未决，并催生了名为`伦理
    AI`的新研究领域——遗憾的是这已超出本书范围。


    ## 图灵测试


    图灵测试是评估计算机智能思维与行为能力的应用最广的科学方法。


    ## 4.1.2 开启一切的会议


    常与艾伦·图灵并称为“人工智能之父”的约翰·麦卡锡，其职业生涯比约翰·塞尔早开始数年。在普林斯顿与斯坦福大学短期任职后，他成为著名的达特茅斯学院（美国九所最古老大学之一）数学助理教授。在达特茅斯期间，他受
    IBM 首台科学大型主机“IBM 701”的设计者纳撒尼尔·罗切斯特邀请[12]，于 1955 年夏季在纽约波基普西的 IBM 罗切斯特信息研究部工作。此后，两位科学家说服信息论之父克劳德·香农与当时哈佛大学数学与神经学初级研究员马文·明斯基，共同在达特茅斯学院组织研讨会。他们的资助提案[13]提交至洛克菲勒基金会并最终获批，于是具有里程碑意义的“达特茅斯夏季人工智能研究项目”于
    1956 年夏季进行了六周。11 位参与者中包含三位计算机科学家艾伦·纽厄尔、克里夫·肖和赫伯特·西蒙，他们在同年早些时候演示了传奇性的“逻辑理论家”——这是智能计算机程序的首个真正概念验证。^(
    ⁸⁴ ) 在这次会议上，约翰·麦卡锡首次提出“人工智能”一词，并后来给出选择该词的兩个主要原因：其一，他希望将达特茅斯夏季项目成果与他此前关于`自动机理论`的数学研究区分开来；^(
    ⁸⁵ ) 其二，他想避免与控制论及其对模拟反馈的关注产生任何关联，他认为这种关注存在偏差。遗憾的是，会议未达其预期，议程在某种程度上更偏向愿景而非实践。但更重要的是，这次开创性会议催化了此后
    20 年的人工智能研究。


    1956 年至 1974 年间，受计算机快速同步发展的推动，人工智能成为科技界最热门领域之一。在传奇的达特茅斯夏季项目两年后，美国计算机科学家兼心理学家弗兰克·罗森布拉特受艾伦·图灵和唐纳德·赫布开创性工作的启发，对麦卡洛克-皮茨模型进行了如下改进：他引入了两个突触`权重`——用`w[1]`和`w[2]`表示的两个十进制数——使其能根据赫布理论，依据两个不同输入值的重要性对其进行增减。数学上，弗兰克·罗森布拉特将麦卡洛克-皮茨模型中的输入之和`x[1]
    + x[2]`替换为加权和`w[1] · x[1] + w[2] · x[2]`。与麦卡洛克-皮茨模型相比，他的模型多了两个可单独设置与调优的自由参数，因此其概念更灵活、更适合模拟人类智能。在其开创性论文《感知机：大脑中信息存储与组织的概率模型》中，他将此概念称为`感知机`[6]，该概念至今仍是构建人工神经网络的概念基础，也是对这个高度活跃研究领域最重要的贡献之一。《纽约客》称感知机为“非凡的机器”[7]，《纽约时报》则盛赞：“海军今日展示了电子计算机的雏形，预计它将能行走、交谈、观看、书写、自我繁殖并感知自身存在”[8]。

