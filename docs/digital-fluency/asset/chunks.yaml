    ### 3.2.1 去中心化与信任的到来


    分布式账本揭示了一种完全不同的网络架构。它们是一种特殊的数字账本，其中的记录并非由一台中心化的、可能被黑客攻击的计算机或服务器保存，而是分布在一个庞大的*分布式网络*上。^(⁵⁵)
    这个网络包含位于不同地点的多台计算机或*节点*，由不同的机构和组织运营，如图 3-1 (c) 所示。这类网络通常包含所谓的*全节点*。它们专门运行网络的底层操作软件，即所谓的*网络协议*，以确保网络中共享的所有信息都符合某些标准，例如安全性、数据格式和区块大小。为了提高可访问性，不同的节点通常通过互联网连接（而非通过固定的网络电缆），因此文献中也常称其为*对等网络*或
    P2P 网络。


    由于每个节点都复制账本文件并保存一份相同的副本，分布式网络中不再需要中心服务器（或权威机构），这实际上是分布式账本技术最重要且同等具有开创性的特征。因此，账本中任何合法的信息变更都会通过网络传播，并反映在所有去中心化的副本中。因此，分布式账本通过其固有的去中心化特性来维护交易的安全性、可追溯性和准确性，因为每个节点都充当着信任的守门人。当与最先进的加密算法相结合时，分布式网络上的信息交换可以安全地实施，并且可以针对每个节点单独控制访问权限和许可权。换句话说，分布式账本技术使得那些互不相识、互不信任的人们，无需任何中心化中介即可相互交易，因为他们可以信任网络本身。从经济学家的角度来看，这极大地降低了“信任成本”，并可能有助于在长期内减轻社会对银行、政府机构、公证人以及其他监管合规官员的依赖。尤其是分布式账本和区块链技术，为信息的收集和共享方式提供了一种全新的范式。通过去掉中间人，区块链技术有望彻底改变个人、企业和政府之间相互交易的方式。


    **分布式网络**


    与中心化网络相比，分布式网络将信息分布在一个广泛的计算机网络中。不需要中央服务器或中介权威，因为网络中的每台计算机同时是中央服务器和客户端。


    ### 3.2.2 不可变的数据结构


    但区块链文件中的信息是如何组织的？它又是如何在不可信的环境中提供信任的呢？区块链技术根据其底层网络协议中的技术规范，将交易数据和信息打包成标准化、固定大小和数据格式的*区块*。


    **表 3-2**


    基于 SHA-1 哈希函数的一条示例交易消息的哈希值。两者之间的比较表明，即使输入中的微小变化（粗体文本）也会导致输出的重大变化。为清晰起见，输出中添加了空格和换行符。输出是使用[`www.blockchain-basics.com/HashFunctions.html`](http://www.blockchain-basics.com/HashFunctions.html)上的公共哈希函数生成器生成的。


    | 行 | 消息（输入） | 消息的哈希值（输出） |

    | --- | --- | --- |

    | 1. | 发件人：Alice (1PrsFtga)，收件人：Bob (3kLMnbTY)，金额：美元 **10** | ED83 1EC2 B307 C014
    ADBA 2E10 670F CD7F 24D0 9E77 |

    | 2. | 发件人：Alice (1PrsFtga)，收件人：Bob (3kLMnbTY)，金额：美元 **100** | BE3D 4C54 8705
    ACC1 9D2B 0E44 D594 6C31 58A5 8CF1 |


    这些区块本身通过采用*密码学哈希函数*进行“链接”或与前面的区块连接在一起。


    但在我们仔细研究这种特定链接之前，先了解一下密码学哈希函数的一些基本属性是很有帮助的。像任何其他数学函数一样，它们有输入值和输出值。输入由实际的交易文本组成，例如“发件人：Alice
    (1PrsFtga)，收件人：Bob (3kLMnbTY)，金额：美元 10”，该文本记录了 Alice 从其账户号 `1PrsFtga` 向 Bob 的账户号
    `3kLMnbTY` 转移了 10 美元。对于密码学哈希函数，每个交易实体的个人账户号称为*公钥*，由数字和字母组成，其原因将在后面变得明显。最流行的哈希函数之一是安全哈希算法
    1 或 *SHA-1*，它是由美国国家标准与技术研究院和美国国家安全局于 1993 年联合开发的，用于实现数字签名。^(⁵⁶) 像任何其他哈希函数一样，`SHA-1`
    将任意长度的明文信息转换为固定长度的字母和数字字符串——在 `SHA-1` 的情况下，输出值始终显示总共 40 个符号。


    除了将任意长度的输入转换为固定长度的输出之外，密码学哈希函数还有另一个显著特性：即使是输入值的微小变化也会导致输出的重大变化，如表 3-2 示例所示。密码学哈希函数通常具有以下非常重要的属性。它们是


    *   *伪随机*，即输入的改变会导致输出不可预测地变化^(⁵⁷)

    *   *确定性*，即输入决定输出

    *   *不可逆*，因此无法基于输出构造输入

    *   *唯一*（或“抗碰撞”），即每个输入具有唯一的哈希值，且相同的输入将产生相同的输出^(⁵⁸)


    由于输出始终具有固定长度且是唯一的，密码学哈希函数提供了一种理想且非常高效的技术，用于判断两个数字对象是否相等。


    **密码学哈希函数**


    密码学哈希函数是一种算法函数，它将任何信息（例如任意长度的文本消息）转换为由数字和字母组成的字符串。其核心特性之一是，输出字符串的长度是固定且始终相同的，与输入信息的长度无关。此外，密码学哈希函数的输出是
    (1) 伪随机的、(2) 确定性的、(3) 不可逆的，以及 (4) 唯一的，也就是说，不同的输入将始终产生不同的输出。

