- fmt: '### 5.7.2 Establish an Open Innovation Culture: Implement Design Thinking


    A very successful methodology that supports the establishment of an open innovation
    culture is *design thinking* [[39](#505424_1_En_5_Chapter.xhtml#Par178)]. `Design
    thinking` is a customer-centric, creative, iterative, and practical approach to
    innovation. It is often used to reimagine and redesign customer journeys and is
    typically organized in the following five steps:


    1.  *Empathize*: This first step of the `design thinking` process is about developing
    an empathic understanding of the problem from a customer point of view. Typical
    guiding questions are: What is the customer looking for? What is the customer’s
    job to be done? What bothers them (most)?

    2.  *Define*: Analyzing the observations and synthesizing them into a precise
    definition of the problem is the main aim of the second step. Are there any unmet
    needs? What is the problem that should be tackled?

    3.  *Ideate*: This is the creative step in the overall process and broadly explores
    possible solutions to the defined problem independently of whether they appear
    realistic or unrealistic.

    4.  *Prototype*: The `design thinking` team produces an inexpensive skill down
    version of the product or service that aims to enhance the customer (or user)
    experience. This *minimum viable product*^([(150)](#fn150)) (or service) acts
    as the starting point for the subsequent iterative improvement process.

    5.  *Test*: This very last step of the first iteration cycle is about testing
    the prototype in real-life conditions to examine how it impacts the customer experience.
    Based on the received customer feedback, successful features are rolled out and
    optimized, while unsuccessful features are subject to the next iteration cycle
    beginning with step 4.


    `Design thinking` has successfully been demonstrated to speed up the overall product
    development process while lowering the cost of failure by experimenting with minimum
    viable products or services long before their launch. It allows organizations
    to experiment with prototypes early on in a very inexpensive way by running real-time
    experiments with their products and services and improving them iteratively based
    on customer feedback. Furthermore, this agile methodology encourages people to
    take risks, learn iteratively, and fail fast and early. `Design thinking` promotes
    rapid prototyping [[55](#505424_1_En_5_Chapter.xhtml#Par194)] and continuous learning
    rather than perfecting a product or service before launching and presenting it
    to customers.


    An open innovation culture built on `design thinking` and other agile ways of
    collaboration does not only enable rapid product innovations but also attracts
    and retains better talent by giving employees more autonomy to implement their
    own ideas and solutions. Aligning this individual autonomy with the overall digital
    agenda of an organization is in fact one of the main challenges when transforming
    the business culture. A good way to reconcile autonomy and alignment is incentivizing
    right behaviors and discouraging the undesirable ones by stimulating loyalty and
    commitment to the organization’s overall digital agenda repeatedly. The adoption
    of human resource processes, such as compensation and promotion systems, that
    avoid misaligned incentives does usually foster the adherence to a digital agenda
    too.


    ## 5.8 Leverage the Ecosystem


    From our previous discussion, we know that the iterative integration of customer
    feedback into the product or service development process is vital for establishing
    an open innovation culture focused on the customer – at Amazon, for instance,
    more than 90% of its innovations are actually triggered by customer feedback.
    Moreover, engaging with customers systematically is also inevitable for developing
    personalized products and services that are tailored to meet specific customer
    needs and expectations. In his 2016 Letter to Shareholders, Jeffrey Bezos noted
    in this context:


    There are many advantages to a customer-centric approach, but here’s the big one:
    customers are always beautifully, wonderfully dissatisfied, even when they report
    being happy and business is great. Even when they don’t yet know it, customers
    want something better, and your desire to delight customers will drive you to
    invent on their behalf [[56](#505424_1_En_5_Chapter.xhtml#Par195)].


    But customers are not the only stakeholders of your ecosystem that are important
    to engage with during a digital transformation.


    Your ecosystem also comprises competitors, service providers, suppliers, and other
    existing and potential business partners that can be another great source of inspiration
    and new ideas. Collaborations and partnerships within your ecosystem typically
    fall in one of the following three categories:


    1.  *Horizontal* partnerships between businesses that operate as competitors in
    the same area are usually used to solve capacity constraints or neutralize risks.
    Competitors may team up to improve their market position somehow by, for example,
    pursuing economies of scale, selling their products in more than one market, or
    cooperating on research and development. One example is Ionity, a Munich-based
    joint venture formed by BMW, Daimler, Ford, and Volkswagen, for building a high-power
    charging infrastructure for battery-electric vehicles in Europe.

    2.  *Vertical* partnerships refer to collaborations among companies in the same
    supply chain. A firm might team up with one of its suppliers, for instance, to
    deepen the relationship, cement long-term commitments, or enable collaboration
    of the design and distribution of products. An excellent example is Amazon’s marketplace
    that leveraged vertical partnerships with online sellers to offer more than 88,000
    ebooks ready for download from basically day one with the launch of its Kindle
    store in 2007. With the arrival of digital technologies, vertical partnerships
    are nowadays also formed between organizations and its end users directly. The
    American media company Netflix, for instance, utilizes such partnerships to crowdsource
    innovative ideas for improving its recommendation engine.

    3.  *Cross-industry* partnerships are long-term interactions between organizations
    in different industries. One example is retail banks and telecom companies that
    team up to offer mobile payment services [[58](#505424_1_En_5_Chapter.xhtml#Par197)].
    Another example is Amazon Web Services that recently started to collaborate with
    the American online learning platform Udacity to offer different certificate courses
    and scholarships online [[59](#505424_1_En_5_Chapter.xhtml#Par198)].


    Such partnerships can help you to leverage the full diversity of your ecosystem,
    create more attention, get valuable feedback from customers, source external ideas,
    and attract new digital talent. You may also think about collaborating with innovative
    startup companies or academia for the same reason. Successful digital organizations
    do also employ a whole range of other initiatives to better position themselves
    in their particular ecosystem. Such initiatives range from organizing software
    and hardware development contests or hackathons to visiting researcher programs,
    summer schools, and conferences and to opening an innovation hub in Silicon Valley
    or other highly innovative geographic places.'
