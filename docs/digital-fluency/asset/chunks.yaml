- fmt: 'The four pillars of Microsoft clearly show that digital transformation is
    not a series of generational updates of a company’s IT infrastructure or simply
    the digitalization of business processes based on the migration of a company’s
    data onto a digital platform. Digital transformation is rather about (1) creating
    an innovative mindset by an open and communicative culture, (2) bringing together
    motivated and diverse people, and (3) providing efficient and equally useful IT
    tools that optimally support people and business processes. It is the recipe for
    enduring growth and competitiveness in an increasingly globalized and connected
    world.


    In an influential white paper published in 2016, the World Economic Forum writes
    about digital transformation:


    > Robotics and artificial intelligence systems will not only be used to replace
    human tasks, but to augment their skills. This, too, will provide challenges for
    businesses, which will need to re-skill employees so that they can work effectively
    with new technology. [...] To realize the full potential of technological augmentation,
    not just to increase productivity but to mitigate job losses from automation,
    re-skilling will be critical [[44](#505424_1_En_1_Chapter.xhtml#Par247)].


    Perhaps more than any other organization, Amazon embodies the way an organization
    can leverage digital technologies to transform its business, which is why we will
    have a closer look on this example for a very successful ambidextrous company,
    too. In 1994, the American computer scientist Jeffrey Bezos presented his business
    idea about an online marketplace to various venture capitalists by leveraging
    his great *storytelling* skills. His story was compelling and equally simple.
    He envisioned to build the earth’s largest store by consequently investing in
    customer benefits, such as lowest price, great product selection, and fast delivery.
    Until then, the darling of venture capitalists were always profits. Jeffrey Bezos
    succeeded with exploding this tradition and replacing profits by a compelling
    vision and great growth perspective. He raised USD 2.1 billion in investors’ money
    and started Amazon as an online marketplace for books in 1994 – books seemed to
    be the perfect item for him to start with carving out his ecommerce niche as they
    are custom products that are associated with a low financial value and risk. In
    order to outrun his competitors and reinforce the store’s core value of selection,
    he soon opened his Amazon Marketplace called `sales platform` to third-party merchants^([^(16)](#fn16))
    and started to sell electronics, software, video games, and a whole range of other
    (consumer) goods.


    As the number of customers, suppliers, and third-party merchants increased steadily
    – Amazon Marketplace now accounts for more than 40% of Amazon’s sales – the company
    started to look like any other traditional company and ran into increasing complexity
    costs and other serious constraints to further growth and value. Amazon had evolved
    into a siloed architecture with numerous organizational subdivisions focusing
    on different retail areas, customer, and product segments. Each division implemented
    their own software solutions to meeting the demands of the specific function to
    which it is assigned and optimized itself within its own isolated business environment.
    As a result, its IT infrastructure was highly fragmented with numerous mismatched
    software applications that run on incompatible IT systems and access a variety
    of scattered databases full of inconsistent and nonstandardized data.


    At this point, Jeffrey Bezos realized that the only way to manage this increasingly
    complex infrastructure would involve the digital transformation of his company
    toward a modern software- and data-driven organization that fully exploits the
    advantages of digital technologies. For this purpose, he sought to break the organizational
    and technological silos that had evolved over time. Instead of managing complexity
    by breaking it into smaller functional units, each focusing on individual and
    highly specialized tasks, he envisioned an agile organization with integrated
    feature teams in accord with the famous *mirror hypothesis*. This observation
    goes back to the American computer scientists Melvin Conway, who well noted in
    1967 that companies are constrained to design systems that mirror the communication
    patterns prevalent in their organizational structure [[45](#505424_1_En_1_Chapter.xhtml#Par248)].
    In other words, highly integrated and complex software applications cannot be
    developed by highly disintegrated functional units, which explains why Jeffrey
    Bezos introduced a new organizational structure supported by agile collaboration
    models to his company. This organizational change was also crucial for digitizing
    the core infrastructure of this company based on the implementation of a shared
    software platform encompassing a central data pipeline as well as standardized
    software modules that can be deployed rapidly through clear user interfaces.^([^(17)](#fn17))
    Those software and data analysis tools are used to analyze the customer, learn
    about their preferences, and create personalized offers and product recommendations
    that drive sales and maintain enduring growth.


    This central data and software platform is provided and maintained by Amazon Web
    Services, a fast-growing division that has been opened to the public in the meanwhile
    and accounted for more than 11% of Amazon’s USD 230 billion total annual revenue
    in 2018. Twelve years after its foundation, Amazon’s largest segment is still
    its online retail marketplace with more than 52% of the total annual revenue –
    another enduring success story written by digital transformation and enabled by
    digital technologies.'
