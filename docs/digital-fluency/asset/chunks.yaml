    The computational performance of `NPU`s cannot be compared very easily as it critically
    depends on the particular architecture of the artificial neural network used to
    compare their performance. This is why the online platform `MLPerf`^([^(112)](#fn112))
    – founded jointly by Baidu, Google, Harvard University, Stanford University, and
    the University of California, Berkley – has developed a standardized benchmark
    test. This test is called “`ResNet-50`” classification benchmark and involves
    the classification of one million images (in 1,000 object categories) from the
    `ImageNet` database^([^(113)](#fn113)) with a standardized and pretrained convolutional
    neural network with 50 layers – the recorded performance measure is the number
    of classified “images per second” or `IPS`. The most popular AI-chip manufacturers
    are compiled in Table [4-1](#505424_1_En_4_Chapter.xhtml#Tab1) according to their
    microchip design and described in the following exemplarily.


    *   *Alibaba* introduced its first AI chip called “`HanGuang 800`” in 2019. It
    is designed for cloud computing applications and classified up to 69,306 `IPS`
    in `ResNet-50`. It comprises 17 billion transistors that are just 12 nm in size,
    which is why this technology is also referred to as 12 nm process technology.
    The transistor is about 10,000 times smaller than the cross-section of a human
    hair in this case.


    *   *Amazon* announced its “`Inferentia`” AI chip through Amazon Web Services
    in 2018. This chip is an outcome of Amazon’s acquisition of the American semiconductor
    company Annapurna Labs in 2015 and designed for cloud computing applications,
    too. It is capable of processing about 15,000 `IPS` in the `ResNet-50` performance
    benchmark test.


    *   *Facebook* and *Intel* are developing an AI chip jointly, which they plan
    to release soon. Intel has been working on neural network accelerators before
    but stopped the development of its “`Nervana Spring Crest`” processor with the
    rather technical name “`NNP-T1000`” in early 2020 soon after its acquisition of
    the Israeli chip manufacturer Habana Labs for USD two billion. Habana Labs recently
    launched its “`Gaudi HL-2000`” chip that can classify up to 1,650 `IPS` in `ResNet-50`.
    The microchip is based on 16 nm process technology.


    *   *Google*: The latest version of its “`TPU v3`” chip (abbreviation for *tensor
    processing unit*) has been designed for Google’s cloud computing service and reported
    to classify up to 32,716 `IPS` in `ResNet-50`. The particular technology has not
    been published so far, which gives you a good impression about the competitive
    dynamics in this highly dynamic market.


    *   *Nvidia* is currently the market leader for `GPU` chips. The latest version
    of its most performant Tesla series is the “`Nvidia Tesla V100 GPU`” and has been
    designed to accelerate different deep learning algorithms and reported to classify
    55,597 `IPS` in `ResNet-50`. It comprises 21.1 billion transistors in total and
    is based on 12 nm process technology. Nvidia also offers a range of system-on-a-chip
    or `SoC` systems for autonomous driving, which is introduced in Section 4.4.2.


    *   *Cerebras Systems* is an American startup with an audacious approach: They
    are simply going to build the largest AI chip ever. Their “`Wafer Scale Engine`”
    (`WSE Gen2`) `NPU` is about 56 times larger than the “`Nvidia A100`” chip, the
    biggest `GPU` ever made, and supposed to house 2.6 trillion transistors based
    on 7 nm process technology.^([^(114)](#fn114)) Its `ResNet-50` has not been released
    yet but speculated to offer tremendous speed gains for training neural networks.


    *   *Sony* has released its first AI chip for intelligent vision in 2020 [[106](#505424_1_En_4_Chapter.xhtml#Par346)].
    The “`IMX500/501`” intelligent vision sensor enables the image capture and analysis
    of 12.3 megapixel images and 4K videos^([^(115)](#fn115)) on one chip. This microchip
    can be embedded into digital cameras to capture images, analyze them, and output
    their meaning rather than the raw data, which reduces the amount of output data
    significantly. This approach does not require any centralized and potentially
    cloud-based image analysis. Such devices are particularly interesting for *edge
    computing* , in which data processing is conducted by the devices located at the
    “edge” of a network that generate the data. Edge computing allows for reducing
    network traffic, the risk of privacy leaks, electricity, and costs associated
    with transferring raw data from one device to another.


    *   *Tesla*: Introduced in 2019, the “`FSD computer`” (abbreviation for “full
    self-driving”) is at the heart of Tesla’s autopilot for autonomous driving. It
    can process up to 1,200 full-HD images per second and comprises 9,216 `MAC` units
    with six billion transistors based on 14 nm process technology.


    Further to the selected tech companies listed earlier, various smaller startups
    have been gaining speed on the development of innovative and powerful AI chips
    lately, such as the two Chinese-based companies Cambricon and Horizon Robotics
    or the American startup SambaNova Systems. Other noteworthy startups include Blaize,
    Graphcore, Groq, Kneron, Lightmatter, Mythic, Untether AI, and Wave Computing.
    Yann LeCun, we know from our discussion of artificial neural networks, once noted:
    “Hardware capabilities... Motivate and limit the types of ideas that AI researchers
    will imagine and will allow themselves to pursue. The tools at our disposal fashion
    our thoughts more than we care to admit” [[107](#505424_1_En_4_Chapter.xhtml#Par347)].


    With so many funding and resources being devoted to artificial intelligence, there
    has been a surge of innovations and applications over the last couple of years.
    Artificial intelligence has become good at many “human” jobs, which is why the
    two business consultants James Wilson and Paul Daugherty rightfully noted: Through
    such *collaborative intelligence* , humans and AI actively enhance each other’s
    complementary strengths: the leadership, teamwork, creativity, and social skills
    of the former, and the speed, scalability, and quantitative capabilities of the
    latter. What comes naturally to people (making a joke, for example) can be tricky
    for machines, and what’s straightforward for machines (analyzing gigabytes of
    data) remains virtually impossible for humans [[108](#505424_1_En_4_Chapter.xhtml#Par348)].


    We will see in the following sections that artificial intelligence has been applied
    to a large range of applications across all industries including automotive, healthcare,
    energy, and finance. A more comprehensive overview of selected business applications
    is compiled in Table [4-2](#505424_1_En_4_Chapter.xhtml#Tab2) for the sake of
    completeness. We will have a closer look on the most popular ones in the following.'
