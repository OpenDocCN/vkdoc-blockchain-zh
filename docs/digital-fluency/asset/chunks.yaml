- fmt: "### 3.3.1 Implementation Challenges for Enterprises  \n\nSince blockchain\
    \ technology is not a standardized technology yet, there is no generic implementation\
    \ scheme that helps you to choose the best option for your particular use case.\
    \ The different components of the blockchain, such as its protocol and user interface,\
    \ have to be customized and adapted to the specific needs and requirements by\
    \ experts that are familiar with blockchain programming. This is why it is important\
    \ to be aware of the following key design parameters for blockchains in enterprise\
    \ applications [[19](#505424_1_En_3_Chapter.xhtml#Par221)]:  \n\n1. The *speed*\
    \ or performance of the blockchain network is probably the most important design\
    \ parameter that has to be chosen carefully as it determines the maximum number\
    \ of transactions per second (or `\"tps\"`) and thus the overall transaction throughput.^([^(67)](#fn67))\
    \ The speed can be tuned by the bandwidth of the network but also by adjusting\
    \ the consensus algorithm that is required for the validation of a block.  \n\n\
    2. *Scalability* is another very important design parameter, which determines\
    \ the network’s ability to scale when new users join or nodes are added to the\
    \ network. Both increase the so-called *latency* of the network, that is, the\
    \ waiting time during which no new transactions can be processed. New users and\
    \ nodes do also increase the required computing power and memory usage as the\
    \ transaction history increases, which has to be considered in the blockchain\
    \ design phase.  \n\n**Table 3-4** Top 10 key characteristics and concepts of\
    \ blockchain technology  \n\n| No. | Characteristic | Underlying Concept |\n|\
    \ --- | --- | --- |\n| 1. | Immutable | Consensus algorithm makes changes prohibitively\
    \ costly and deters someone from changing it; blockchains are thus resilient to\
    \ malicious change |\n| 2. | Append-only | Data can only be added to the blockchain\
    \ and neither altered nor deleted |\n| 3. | Traceable | Enhanced auditability\
    \ by cross-referencing the preceding block ensures a gapless documentation of\
    \ all changes and transactions |\n| 4. | Trustable | Use of peer-to-peer networks\
    \ distributes trust across all nodes |\n| 5. | Tamperproof | Implementation of\
    \ a cryptographic linkage to preceding block |\n| 6. | Scalable | Easy integration\
    \ of additional nodes; usually increases latency and decreases throughput |\n\
    | 7. | Self-regulating | Absence of a central authority or intermediary – policy\
    \ is implemented by network protocol that operates on an open network |\n| 8.\
    \ | Ordered | Data stored in the blockchain is time-stamped and organized in blocks\
    \ |\n| 9. | Secure | Permission system allows for regulatory compliance as individuals\
    \ are issued cryptographic keys to access the blockchain |\n| 10. | Incentivized\
    \ (cryptocurrency only) | Mining reward for energy expenses associated with finding\
    \ a valid block |\n\n3. The *governance process*^([^(68)](#fn68)) codifies the\
    \ decision-making process including access rights and permissions as well as the\
    \ particular consensus algorithm used. In private blockchains, this process may\
    \ involve any code of conduct, which incentivizes users to behave honestly. The\
    \ precise definition of this process is particularly important for public blockchains\
    \ as it potentially opens the possibility of cyberattacks, where network participants\
    \ with sufficient mining power can force the network to reverse a transaction\
    \ history. Safeguards may be beneficial to intervene in case of any violations\
    \ or infringements.  \n\n4. The *compliance framework* binds participants to regulatory\
    \ requirements and enables the network to cover several jurisdictions. Compliance\
    \ is comparatively easy to guarantee in a private blockchain due to internal binding\
    \ regulations.  \n\n5. *Privacy* and *confidentiality* rules ensure that transactions\
    \ have a certain level of privacy and transparency. In public blockchains, for\
    \ instance, these rules ensure that all transactions are visible to every participant,\
    \ a requirement that may be different in a private blockchain depending on the\
    \ hierarchical level of a particular participant within the enterprise.  \n\n\
    6. The last but not least important design parameter is the *settlement finality*,\
    \ which refers to the legal concept for replacing and updating the current and\
    \ previously confirmed chain of blocks. This parameter is particularly relevant\
    \ for enterprise applications where legal transactions must not be reversed once\
    \ they have been confirmed.  \n\nChoosing the optimum set of design parameters\
    \ for the implementation of a particular use case is not always obvious especially\
    \ since some design parameters are in conflict with each other and cannot be optimized\
    \ at the same time. The design process generally involves the evaluation of two\
    \ particularly important tradeoffs. The first one is about *transparency vs. privacy*\
    \ and related to the choice between a public and private blockchain network [[20](#505424_1_En_3_Chapter.xhtml#Par222)].\
    \ The blockchain clarifies the ownership of digital assets based on the transaction\
    \ history and should therefore be available for everyone. At the same time, transparency\
    \ is the core concept for verifying transactions, while a certain level of privacy\
    \ can help to minimize the risk of malicious attacks, such as double spending\
    \ and reversal of transactions. Furthermore, some users may also require some\
    \ transaction data or details that have been made inaccessible for the public\
    \ for compliance reasons – just think about the European General Data Protection\
    \ Regulation. Transparency and privacy are therefore conflicting goals, and the\
    \ transparency required to clarify ownerships, on the one hand, has to be balanced\
    \ with higher privacy requirements of some users, on the other hand. The second\
    \ tradeoff is about balancing *security vs. speed and scalability* and related\
    \ to the choice between a permissioned and permissionless blockchain network [[21](#505424_1_En_3_Chapter.xhtml#Par223)].\
    \ Higher security standards for protecting the blockchain against manipulation\
    \ may involve a more complex computational puzzle, for instance, which not only\
    \ makes the malicious manipulation of blocks prohibitively costly but also slows\
    \ down the speed at which new transactions can be added.  \n\nThe vast amount\
    \ of free design parameters that can be tuned to different use cases is particularly\
    \ beneficial for enterprise applications as they often require the integration\
    \ of a blockchain into existing business processes, legacy systems, legal regulations,\
    \ frameworks, and existing IT infrastructures. When deciding about the design\
    \ parameters, a look on the blockchain applications that have been implemented\
    \ by other enterprises already are often a very good guidance for your own use\
    \ case.  \n\n### 3.3.2 Current Business Applications  \n\nApplications of blockchain\
    \ technology are numerous and range across all sectors of society. According to\
    \ a 2017 Deloitte study, more than 8,600 new blockchain projects are started on\
    \ the software development platform GitHub every year [[22](#505424_1_En_3_Chapter.xhtml#Par224)].\
    \ The majority of those projects is based on the open source software platform\
    \ *hyperledger fabric* that is powered by the American LINUX foundation and tries\
    \ to foster the creation, development, and incubation of blockchain protocols.^([^(69)](#fn69))\
    \ This platform brings together various programmers from around the world and\
    \ provides plug-and-play software modules including consensus algorithms and membership\
    \ services for the implementation of your own blockchain."
