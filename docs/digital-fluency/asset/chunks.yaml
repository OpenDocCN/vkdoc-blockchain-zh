  trans: '

    每项计算的第一步，是将当前的数学问题转化为由节点和边构成的二维几何图案，这种图案被称为*图*，它需要能够适配 D-Wave 定制设计的设备架构——图中的节点对应量子比特，边则对应耦合器。以旅行商问题为例，该问题在数学上通过一个无向加权图来描述：不同的城市是图的节点，城市之间的路径是图的边，而路径的距离则对应边的权重，也就是一个衡量相邻城市间空间距离的任意数值。问题的这种图形表示，本质上充当了在
    QPU 上连接和控制量子比特的蓝图。^(⁴⁰)


    从待求解的数学问题映射到量子比特的二维图形表示这一过程，通常并不直观，正因如此，D-Wave Systems 通过在传统计算机上运行一个带有图形用户界面的支持软件来自动化这一过程。该软件允许用户轻松输入相应的问题——通常以数学方程的形式给出，例如用于衡量旅行商问题中总旅行距离的成本函数——并自动生成最合适的图形表示。一旦找到这种表示方法，一切准备就绪，就可以开始实际的计算或退火过程。


    退火过程通常包含四个主要步骤：


    1.  *量子比特初始化*：此步骤基于一系列特定的微波脉冲，根据问题的图形结构初始化量子比特的配置，以此作为起点。选择这些脉冲的理想目的是让芯片上二维阵列中的所有量子比特彼此纠缠。这一点至关重要，因为这种纠缠使得量子比特配置能够广泛探索当前问题的所有可能解决方案。


    2.  *问题初始化*：第二步涉及开启编码在一组特定量子比特和耦合偏置电压中的问题描述。为了成功执行此过程，需要缓慢增加电压，以便量子比特只与彼此相互作用，而不与外部环境相互作用。这一点特别重要，因为任何与环境（如热能交换）的相互作用都会导致退相干，从而造成信息的不可逆丢失。^(⁴¹)
    在这个所谓的*绝热相变*过程中，不同的量子比特会了解计算问题，并通过量子力学隧穿效应经由耦合器（取决于设定的特定偏置电压）相互影响。


    3.  *弛豫过程*：在第三个计算步骤中，量子比特和耦合偏置电压会突然关闭。随着时间的推移，纠缠的量子比特网络会演化，并最终弛豫到能量上最有利的配置，即系统的所谓*基态*。这种随时间演化由量子涨落和不确定性原理导致的隧穿效应推动，通常涉及相邻量子比特间的自旋翻转跃迁。


    4.  *读出过程*：最后一步是测量系统的基态。此测量会导致整体波函数坍缩，我们得到一个按顺时针或逆时针方向流动的超导电流阵列。根据关联规则 `|0〉 =
    |↻〉` 和 `|1〉 = |↺〉`，这些电流分别对应一个由 0 和 1 组成的阵列。由于能量已最小化，这个图状态代表了当前计算问题的最终且最优的解决方案。


    所有这些过程都在不到一秒钟的时间内完成，并且会重复多次，因为量子退火器存在噪声。统计上出现频率最高的解，可被视为系统的真实基态和问题的最佳解。这个最终的 0
    和 1 阵列随后由运行在传统计算机上的特殊软件处理，并被转换为一个有序的城市列表，从而解决特定的旅行商问题。


    量子退火器已被应用于广泛的商业问题，并已证明在经典超级计算机中能提供显著的运行时间优势。事实证明，其应用主要分为两大类，在考虑将量子退火器应用于特定问题时，理解这两类非常重要：


    1.  第一类是*组合优化问题*，例如前面描述的旅行商问题或寻找具有最高回报率的股票投资组合。这类问题通常涉及从数量庞大的可能解决方案或组合中找到最佳的那个。^(⁴²)


    2.  *采样问题*是量子退火器非常擅长的第二类问题。这类问题涉及在可能的解决方案或组合中，找到一个更好但不一定是最佳的解。这对于量子机器学习 [55] 尤其有用，因为这门技术通常需要大型数据集才能成功训练机器学习模型，我们将在第
    4 章“人工智能”中了解到这一点。在此背景下，量子退火器可用于通过生成完美模拟现实的新数据，将小数据转化为大数据，这些新数据可用于训练机器学习模型。另一个例子是关于材料建模和寻找更好的机翼空气动力学形状，这是欧洲航空航天公司空客近期报道的量子退火器应用案例
    [56]。


    量子退火器是世界上首批商用量子计算机，研究人员从一开始就密切关注这项技术。虽然其中一些人对这种特殊的量子计算方法感到非常兴奋，但另一些人则对这类机器的长期潜力持怀疑态度，因此它们长期被认为是世界上最具争议的量子计算机
    [57]。这种争议主要源于一个事实：量子退火器（与通用量子计算机不同）不需要实现量子逻辑门。整个计算过程依赖的是物理系统随时间推移通过量子涨落和隧穿效应演化到其能量最优状态（基态）的基本属性。


    然而，D-Wave Systems 在推广这项技术方面做得很好，他们与其跨国企业客户合作，将其应用于广泛的领域。在过去的几年里，他们成功地将量子退火器确立为“专用量子计算机”，这类计算机在优化和采样问题上表现最佳，能提供巨大的运行时间优势。

    '
- fmt: '#### Commercially Available Systems: Quantum Simulator


    `Quantum simulators` are the most original type of quantum computers [[58](#505424_1_En_2_Chapter.xhtml#Par254)]
    and go back to 1981, when Richard Feynman gave his famous “Lectures on Computation”
    at the California Institute of Technology [[59](#505424_1_En_2_Chapter.xhtml#Par255)].
    The question he had in mind that time was about whether the simulation of quantum
    mechanical systems, such as an ensemble of Cooper pairs in a superconductor, can
    be carried out on classical computers efficiently [[14](#505424_1_En_2_Chapter.xhtml#Par210)].
    With his analysis, he showed that a computer employing quantum mechanical effects
    could simulate certain quantum systems exponentially faster than a classical computer
    [[60](#505424_1_En_2_Chapter.xhtml#Par256)], which is why this approach to quantum
    computing has been called `quantum simulator` since then.


    Nowadays, this term is usually used to refer to a classical computing hardware
    stack that has enough capacity to emulate certain aspects of quantum computers.
    Quantum simulators are mainly used in academia today as they allow for exploring
    fundamental problems and quantum phenomena in, for example, physics, chemistry,
    biology, and materials science. Furthermore, quantum simulators are also used
    to optimize QPUs and validate their results, which is particularly important for
    the development of novel quantum algorithms and software.


    #### Commercially Available Systems: Universal Quantum Computer


    `Universal quantum computers` are the most powerful and most generally applicable
    quantum computers but by far the hardest ones to build, unfortunately. Such machines
    are currently not available and may not even be realized in near future due to
    the major technological challenges upon their large-scale physical implementation
    and operation. In this context, literature differentiates between `noisy intermediate-scale`
    and the technologically more advanced `fully error-corrected` (or fault-tolerant)
    quantum computers. A fully error-corrected universal quantum computer is likely
    to use more than 100,000 qubits that can be directed to find a quick solution
    for any massively complex computational problem or calculation. The universal
    quantum computers of Google, IBM, Honeywell, Alibaba, and Amazon jointly fall
    into the category of noisy intermediate-scale quantum computers with a limited
    range of applications compared to fully error-corrected systems.


    ```

    ![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig11_HTML.png](images/505424_1_En_2_Chapter/505424_1_En_2_Fig11_HTML.png)

    ```


    Figure 2-11


    Architectural design of IBM’s 5-qubit Tenerife quantum processor. At its heart
    are five superconducting islands that host charge qubits. Those qubits can interact
    with each other through waveguide resonators that facilitate the formation of
    superimposed and entangled qubit states. Readout and control contacts facilitate
    the initialization of and measurement of the charge qubits


    One of the first systems is IBM’s 5-qubit Tenerife QPU depicted in Figure [2-11](#505424_1_En_2_Chapter.xhtml#Fig11).
    This system is formed by five islands that host superconducting charge qubits.
    Those qubits strongly interact with single photons that travel inside a `waveguide
    resonator` and facilitate superposition and entanglement between two superconducting
    charge qubits on connected islands.^([^(43)](#fn43)) Although this early device
    design enabled various proof-of-principle experiments, it turned out to be very
    noise and less suited for a large-scale implementation since the qubit-photon
    interaction is difficult to control with high fidelity and quality.


    This is why scientists developed a second approach to universal quantum computers
    that uses an ensemble of Cooper pairs to encode a superconducting charge qubit
    rather than a single Cooper pair. These `transmon qubits` are less prone to decoherence
    [[61](#505424_1_En_2_Chapter.xhtml#Par257), [62](#505424_1_En_2_Chapter.xhtml#Par258)]
    and allow for the implementation of larger multi-qubit systems. They are usually
    implemented on a device architecture called `gate-model superconducting circuits`
    [[63](#505424_1_En_2_Chapter.xhtml#Par259), [64](#505424_1_En_2_Chapter.xhtml#Par260)].


    ```

    ![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig12_HTML.png](images/505424_1_En_2_Chapter/505424_1_En_2_Fig12_HTML.png)

    ```


    Figure 2-12


    Architectural design of Google’s Sycamore QPU — the overall layout was reduced
    from 54 to 8 qubits for simplicity. A two-dimensional array of cross-shaped superconducting
    islands accommodate transmon qubits that can interact with each other by quantum
    mechanical tunneling through a set of couplers. A special initialization port
    facilitates the injection of Cooper pairs onto the islands. Quantum logic gates
    based on superposition and entanglement are implemented by microwave pulses for
    the implementation of single- and multi-qubit gates, respectively'
