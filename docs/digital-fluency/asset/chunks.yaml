  trans: '

    ### 3.3.1 企业面临的实施挑战


    由于区块链技术尚未成为标准化技术，因此不存在通用的实施方案能帮助您针对特定用例选择最佳选项。区块链的不同组件（如协议和用户界面）必须由熟悉区块链编程的专家根据具体需求和规格进行定制和调整。因此，了解企业应用中区块链的以下关键设计参数至关重要
    [19]：


    1. 区块链网络的*速度*或性能可能是最重要的设计参数，必须谨慎选择，因为它决定了每秒最大交易数量（即 `“tps”` ），从而决定了总体交易吞吐量。^(⁶⁷)
    速度可以通过网络带宽来调整，也可以通过调整区块验证所需的共识算法来调整。


    2. *可扩展性*是另一个非常重要的设计参数，它决定了网络在新用户加入或新增节点时的扩展能力。这两者都会增加所谓的网络*延迟*，即无法处理新交易的等待时间。随着交易历史的增长，新用户和节点也会增加所需的计算能力和内存使用量，这在区块链设计阶段必须予以考虑。


    **表 3-4** 区块链技术十大关键特性与概念


    | 编号 | 特性 | 底层概念 |

    | --- | --- | --- |

    | 1. | 不可篡改性 | 共识算法使更改成本过高，并阻止他人更改；因此区块链能抵御恶意更改 |

    | 2. | 仅可追加 | 数据只能添加到区块链中，既不能修改也不能删除 |

    | 3. | 可追溯性 | 通过交叉引用前一个区块增强可审计性，确保所有变更和交易的无缝记录 |

    | 4. | 可信赖性 | 使用点对点网络将信任分散到所有节点 |

    | 5. | 防篡改性 | 实现与前一区块的加密链接 |

    | 6. | 可扩展性 | 易于集成新节点；通常会增加延迟并降低吞吐量 |

    | 7. | 自我调节性 | 没有中央机构或中介——策略由运行在开放网络上的网络协议实现 |

    | 8. | 有序性 | 存储在区块链中的数据带有时间戳并按区块组织 |

    | 9. | 安全性 | 权限系统允许合规监管，因为个人会获得访问区块链的加密密钥 |

    | 10. | 激励性（仅限加密货币） | 对寻找有效区块所消耗的能源给予挖矿奖励 |


    3. *治理流程*^(⁶⁸) 将决策过程（包括访问权限和许可）以及所使用的特定共识算法制度化。在私有区块链中，此流程可能包含任何激励用户诚实行为的行为准则。该流程的精确定义对公有区块链尤其重要，因为它可能为网络攻击打开可能性，即拥有足够挖矿算力的网络参与者可以强制网络撤销交易历史。在发生任何违规或侵权时，设置安全防护措施可能是有益的。


    4. *合规框架*使参与者受监管要求的约束，并使网络能够覆盖多个司法管辖区。由于内部有约束性法规，在私有区块链中保证合规相对容易。


    5. *隐私*和*机密性*规则确保交易具有一定程度的私密性和透明度。例如，在公有区块链中，这些规则确保所有交易对所有参与者可见，而在私有区块链中，此要求可能因特定参与者在企业内的层级不同而有所差异。


    6. 最后但同样重要的设计参数是*最终结算性*，它指的是替换和更新当前及之前已确认区块链的法律概念。此参数对于企业应用尤其重要，因为一旦确认，法律交易就不应被撤销。


    为特定用例的实施选择最优的一组设计参数并不总是显而易见的，尤其是一些设计参数相互冲突，无法同时优化。设计过程通常涉及评估两个特别重要的权衡取舍。第一个是关于*透明度与隐私*，涉及在公有和私有区块链网络之间进行选择
    [20]。区块链基于交易历史明确数字资产的所有权，因此应对所有人可用。同时，透明度是验证交易的核心概念，而一定程度的隐私有助于最小化恶意攻击的风险，例如双重支付和交易撤销。此外，部分用户可能出于合规原因（例如欧洲通用数据保护条例）要求某些交易数据或细节对外部不可访问。因此，透明度和隐私是相互冲突的目标，一方面需要透明度来明确所有权，另一方面则需平衡部分用户更高的隐私需求。第二个权衡是关于平衡*安全性与速度及可扩展性*，涉及在许可链和非许可链网络之间进行选择
    [21]。为了保护区块链免受操纵而采用更高的安全标准，可能涉及更复杂的计算难题，例如，这不仅使恶意篡改区块的成本高得令人望而却步，也会减慢新交易添加的速度。


    大量可根据不同用例进行调节的自由设计参数，对企业应用尤其有利，因为它们通常需要将区块链集成到现有业务流程、遗留系统、法律法规、框架和现有 IT 基础设施中。在决定设计参数时，参考其他企业已实施的区块链应用，通常能为您的自身用例提供很好的指导。


    ### 3.3.2 当前业务应用


    区块链技术的应用非常广泛，涵盖社会的各个领域。根据德勤 2017 年的一项研究，每年在软件开发平台 GitHub 上启动的区块链新项目超过 8600 个 [22]。这些项目中的大多数基于开源软件平台
    *hyperledger fabric*，该平台由美国 LINUX 基金会支持，旨在促进区块链协议的创建、开发和孵化。^(⁶⁹) 该平台汇集了来自世界各地的众多程序员，并提供即插即用的软件模块，包括用于实施您自己区块链的共识算法和成员服务。

    '
- fmt: '### Current Business Applications: Cryptocurrencies and Fundraising


    The first application we discuss and in fact the foundational basis of blockchain
    technology is cryptocurrencies, which build on decades of cryptographic research
    and various support technologies, such as the digital signatures and hash functions.
    One of the first proposals to create digital money dates back to 1982, when the
    American cryptologist David Chaum proposed a scheme that used “blind signatures”
    – a disguised, blinded message – to build an untraceable currency [[23](#505424_1_En_3_Chapter.xhtml#Par225)].
    The basic idea is fairly pragmatic and proposes a public bank to issue digital
    money by signing a blind and random serial number that is presented to the user.
    The user can then use this digital currency – backed by his local bank – to transact
    with a third party. This process still followed a centralized transaction scheme
    since the debitor’s bank backed the currency as regulatory intermediary to provide
    the overall transaction process with trust. Later on, David Chaum refined his
    concept and developed a digital currency named `ecash` that used some private
    identification data to craft the transaction message but still failed on preventing
    the double-spending problem.


    #### Coin


    `Coins` are the basic unit of cryptocurrencies, that is, digital money that has
    been designed based on blockchain technology to store monetary value over time.
    `Coins` can only be used to sell and buy things and do generally have the same
    characteristics as money: they are fungible, divisible, acceptable, portable,
    durable, and of limited supply.


    As a solution to this prevalent problem, the British cryptographer and hacker
    Adam Back developed the proof-of-work concept in 1997 and proposed `hashcash`
    as a system to thwart unwanted, unsolicited, and spam emails.^([^(70)](#fn70))
    The basic idea behind his proposal is that each sender of an email is asked to
    complete a computational puzzle that requires extra computational effort and resources
    that discourage someone from sending numerous spam emails. One year later, the
    American computer engineer Wei Dai employed this concept to generate a digital
    money called `B-money`. This system did, however, lack important aspects of the
    consensus algorithm and did not succeed in avoiding the double-spending problem
    ultimately either. A direct precursor for the Bitcoin architecture is `bit gold`,
    a decentralized digital currency that was proposed by the American computer scientist
    Nick Szabo in 1998 but was never implemented. “I was trying to mimic as closely
    as possible in cyberspace the security and trust characteristics of gold, and
    chief among those is that it doesn’t depend on a trusted central authority,” he
    described his approach once [[24](#505424_1_En_3_Chapter.xhtml#Par226)]. This
    is why he – among others – has been speculated to be the author of the seminal
    Bitcoin paper that appeared under the anonymous Satoshi Nakamoto in 2008. But
    Nick Szabo denied vehemently [[25](#505424_1_En_3_Chapter.xhtml#Par227)].


    Inspired by the remarkable hype of Bitcoin, various cryptocurrencies have been
    developed subsequently that are nowadays referred to as `altcoins`. All cryptocurrencies
    have been subject to intense financial speculations by the end of 2017 with more
    than 4,500 of them listed on the platform `www.coinmarketcap.com`. This hype triggered
    a spectacular financial bubble that bursted shortly afterward. Exchange rates
    for cryptocurrencies revealed very high volatilities during this period, and the
    exchange rate of Bitcoin dropped from more than USD 20,000 to USD 7,500 within
    one month. Those prize fluctuations persist in a less pronounced manner until
    now, which is why many experts do not believe in a broad adoption of cryptocurrencies
    on the free market.


    The most popular altcoins are Ethereum (currency code: `ETH`), Ripple (`XRP`),
    and Litecoin (`LTC`). Some of them have been implemented on a completely new software
    code and support additional functionalities, which is why this group of altcoins
    is sometimes referred to as `metacoins`, too [[26](#505424_1_En_3_Chapter.xhtml#Par228)].
    The Ethereum blockchain as the most popular metacoin, for instance, does additionally
    support the implementation of smart contracts as well as the storage and transfer
    of more general digital assets that have any kind of (monetary) value [[27](#505424_1_En_3_Chapter.xhtml#Par229)].


    A digital asset with some kind of value is generally called `token`. In literature,
    coins and tokens are often used alike, but there are fundamental conceptual differences
    that are important to consider when implementing a blockchain application. While
    coins are the basic units of cryptocurrencies powered by blockchain technology
    and have a monetary value only, tokens are tradable share certificates in a specific
    blockchain project that can have both a monetary and nonmonetary value. A ticket
    for a concert, for instance, can be considered as a “real-life token” that can
    be used at a certain time for a certain concert hall. However, they cannot be
    used to pay your restaurant bill since they only have a certain value inside their
    specific ecosystem, the concert hall in this particular example. Tokens, on the
    other hand, are more general digital securities that represent some kind of benefit,
    which does not have to be monetary in its nature. Tokens are usually issued during
    an `initial coin offering` or `ICO` of a blockchain project, which refers to the
    crowdsale of cryptographically secured blockchain tokens to fund the development
    of a particular blockchain project or enterprise [[28](#505424_1_En_3_Chapter.xhtml#Par230)].


    #### Token


    A `token` is a unique digital representation – a “piece of software” – of the
    value stored in a tangible or intangible object, such as company shares, bonds,
    artwork or real estate investments, fungible tradable goods, and other valuables.
    As a tradable asset within a specific blockchain project, a `token` creates the
    bridge between real-world assets and their trading, storage, and ownership transfer
    in the digital world without any central intermediary. `Token` is also the umbrella
    term for coins and thus provides a more general approach for digitizing assets
    with a monetary or nonmonetary value.


    `ICOs` are generally motivated by the following four reasons: they are used to
    (1) attract early employees due to public attention, (2) provide a profitable
    investment for investors, (3) establish a currency for potential mergers and acquisitions,
    and (4) raise cash to grow the blockchain project. The ICO market is particularly
    dynamic, and more than USD 750 million have been raised in ICOs in 2017, while
    “traditional” venture capital founding reached USD 232 million only in the same
    year [[29](#505424_1_En_3_Chapter.xhtml#Par231)]. The tokens issued in an ICO
    become functional and begin to gain value once the ICO’s funding goal is reached
    and the company successfully founded. This is why ICOs are also referred to as
    `security token offerings` that are a modern and increasingly popular way to fundraise
    venture capital.^([^(71)](#fn71)) Such tokens have to get approved by the exchange
    supervisory authority of the respective country in which they are issued nowadays,
    such as the “American Securities and Exchange Commission” (`SEC`) or “European
    Securities and Markets Authority” (`ESMA`). Three important types of applications
    have emerged for tokens over time:'
