    that have been engineered to target specific medical purposes.'
  trans: '

    # 当前商业应用：模拟、建模与优化


    模拟、建模、优化与采样，很可能是当今量子计算机被引用最多的应用领域，因为它们利用固有的量子并行性，在经典超级计算机中实现了运行时间的优势。当前的商业应用范围涵盖多个工业领域。其中最重要的列举如下：


    ## 汽车行业


    全球最大的汽车制造商德国大众汽车集团，于 2017 年开始探索量子计算在业务中的应用，与 D-Wave Systems 建立了多年合作伙伴关系。此后，大众在其慕尼黑的`Data:Lab`和旧金山的`CODE
    Lab`中，一直将此技术应用于不同的业务问题。一个试点项目旨在模拟交通拥挤城市的车流[77–80]，这是城市交通规划和避免拥堵、实现最短行程时间导航的先决条件。此类量子计算服务未来或许会在汽车云中运行，以便与道路上的全互联（自动驾驶）车辆共享关于最短路径的导航信息。


    另一家正在探索量子计算的德国汽车制造商是宝马，该公司也与 D-Wave Systems 建立了合作伙伴关系，旨在优化其生产线中的机器人[81]。在大众和宝马与
    D-Wave Systems 合作的同时，戴姆勒与谷歌[82]和 IBM[83]建立了合作关系，以探索材料科学和化学领域的应用，包括为纯电动汽车模拟下一代电池。更多汽车应用在文献[84]中有所描述。


    ## 航空航天与国防


    洛克希德·马丁公司在 2010 年底购买了 D-Wave Systems 的第一台量子退火机，并自那时起不断升级其系统。他们的主要应用领域似乎是软件开发，包括软件调试以及软件验证和确认过程的优化[85]。D-Wave
    Systems 的另一客户是美国国家航空航天局（NASA），后者目前正在位于加利福尼亚州山景城硅谷心脏地带的艾姆斯研究中心的 NASA 高级超级计算设施中运行一套
    2000Q 系统。他们的量子计算机已用于解决航空、地球与空间科学以及太空探索任务中的复杂优化问题[86]。美国航空航天巨头空中客车公司最近与 IBM 合作，将量子计算应用于飞机机翼的气流建模[87]——这是另一个此前由经典超级计算机处理的典型优化问题。


    ## 化工、制药与医疗保健


    量子计算也已进入化工和制药行业。例如，美国跨国公司陶氏化学公司于 2017 年与加拿大量子计算软件初创公司 1QBit 达成了多年协议。根据他们的新闻稿，陶氏和
    1QBit 旨在通过合作“开发用于化工和材料科学技术领域的量子计算工具”[88]——该协议的其他条款迄今尚未披露。由于 1QBit 仅开发用于量子计算硬件的通用算法，它已与微软、IBM、富士通和
    D-Wave Systems 建立了不同的硬件合作伙伴关系。


    1QBit 于 2016 年还与美国生物技术公司百健达成了协议[89]。他们与总部位于爱尔兰的专业服务公司埃森哲合作，利用量子计算机的模拟能力，更好地攻克阿尔茨海默病和多发性硬化症等疾病。


    通过与 D-Wave Systems 和 Rigetti Computing 合作，总部位于旧金山的药物设计初创公司 Menten AI 利用合成生物学和量子计算来创造基于蛋白质的新药物[90]。为此，Menten
    AI 采用基于混合经典量子计算方法的两步药物开发流程。第一步涉及在经典计算机上运行不同的机器学习算法，并试图创建一种新型蛋白质和潜在药物的化学结构（生物学上称为一级结构），这种药物能够结合并操控人体内的病变细胞——我们将在第
    4.4.6 节更详细地讨论人工智能应用时，研究这种特定的药物开发机器学习方法。在第二步中，Menten AI 的研究人员利用量子计算的计算能力，计算新型蛋白质通过称为能量最小化的化学过程自然折叠成的三维形状。由此产生的三维蛋白质结构在生物学上称为四级结构，它关键地决定了该蛋白质的医学特性，并作为进一步迭代优化的重要先决条件。Menten
    AI 的混合经典量子计算方法，是新兴跨学科研究领域的一个绝佳范例，该领域最近被称为*量子机器学习*。这种量子计算与人工智能激动人心的融合，通过将最初在经典计算机上执行的、给定问题或算法中的计算密集型子程序外包给更快的量子计算机或退火机，从而提高了计算速度、效率和准确性。


    全球最大的制药和诊断公司 F. 霍夫曼-罗氏公司最近宣布了一项学术合作，“与牛津大学的三名博士生合作，他们将应用量子计算机模拟，例如计算分子的能量”[91]。在
    400 万美元种子资金的支持下，总部位于多伦多的生物技术初创公司 ProteinQure 最近与量子计算领导者（例如 IBM、微软和 Rigetti Computing）以及制药研究机构（包括阿斯利康和
    SRI International）合作，探索将量子计算用于蛋白质的分子模拟。他们的研究很可能为基于靶向特定医学用途而设计的蛋白质的高产计算药物设计铺平道路。

