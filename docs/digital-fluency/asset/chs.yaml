  \ | `NumPy` 是一个用于大数据分析和科学计算的标准包，允许定义复杂的数字数组 |\n| | [`www.pandas.pydata.org/`](http://www.pandas.pydata.org/)\
  \ | `Pandas`，即“Python 数据分析库”，为大数据分析和操作提供了众多工具 |\n| | [`www.matplotlib.org/`](http://www.matplotlib.org/)\
  \ | `Matplotlib` 是一个用于绘图和数据可视化的综合库，常与 NumPy 和 Pandas 结合使用 |\n| 量子计算 | [`www.qutip.org/tutorials.html/`](http://www.qutip.org/tutorials.html/)\
  \ | `QuTip` 是一个用于模拟开放量子系统动力学的开源量子工具箱 |\n| | [`www.qiskit.org/`](http://www.qiskit.org/)\
  \ | `Qiskit` 是一个用于实现研究、教育和商业领域量子计算软件的开源库 |\n| | [`www.tensorflow.org/quantum/`](http://www.tensorflow.org/quantum/)\
  \ | `TensorFlow Quantum` 是谷歌研究团队于 2020 年发布的最新库之一，支持量子机器学习算法的快速原型开发 |\n| 区块链技术 |\
  \ [`www.pypi.org/search/?q=blockchain/`](http://www.pypi.org/search/%253Fq%253Dblockchain/)\
  \ | `PyPi blockchain` 提供了用于实现区块链或加密货币的各种工具 |\n| 人工智能 | [`www.tensorflow.org/`](http://www.tensorflow.org/)\
  \ | `TensorFlow` 由谷歌大脑团队于 2015 年为经验丰富的专家开发，支持机器学习算法（包括人工神经网络）的轻松实现 |\n| | [`www.pytorch.org/`](http://www.pytorch.org/)\
  \ | `PyTorch` 是一个开源机器学习库，由 Facebook 于 2016 年首次发布 |\n| | [`www.keras.io/`](http://www.keras.io/)\
  \ | `Keras` 由微软于 2015 年作为面向初学者的开源库发布，可用于构建，特别是卷积神经网络等模型 |\n\n\n\n数字化核心的一个绝佳范例和榜样是微软及其业务部门“核心服务工程与运营”（简称\
  \ CSEO）。^(¹⁴¹) CSEO 处于微软的核心位置，在全球拥有超过 5500 名员工，其工作贯穿价值链的广泛环节，从发布产品、运营零售店到人力资源管理。其核心使命是构建产品和工具，通过将组织内的每个人连接到中央数据目录、通用软件组件库和共享算法仓库，赋能员工在各自业务单元内独立驱动生产力。通过数字化其核心，微软能够快速实现数字化，赋能并部署跨所有业务单元的数字化产品和服务，从而为整个公司提升效率并创造创新的业务成果。在其\
  \ 2020 年的畅销书《*在人工智能时代竞争*》中，哈佛商学院的两位美国经济学家 Marco Iansiti 和 Karim Lakhani 将这种依赖于高度集成的模块化软件和数据平台的数字运营模式称为“*AI\
  \ 工厂*”。此外，他们解释道：\n\n> [...] 当生产被工业化时，分析和决策在很大程度上仍然是传统的、特殊的流程。 [...] AI 工厂是可扩展的决策引擎，为二十一世纪公司的数字化运营模式提供动力。管理决策越来越多地嵌入到软件中，这使得许多传统上由员工执行的流程实现了数字化\
  \ [29]。\n\n换句话说，AI 工厂将决策制定视为一个由大数据分析驱动的工业流程 [30]。数据驱动的决策系统性地将信息转化为有价值的业务预测、洞察和选择，以指导甚至自动化某些业务流程。这正是数字化公司核心和实施数字运营模式的核心所在。Marco\
  \ Iansiti 和 Karim Lakhani 进一步解释道：\n\n> 每个工厂都包含四个基本组件。第一个是数据管道，这是一个半自动化的流程，以系统、可持续和可扩展的方式收集、清理、集成和保护数据。第二个是算法，它生成关于业务未来状态或行动的预测。第三个是实验平台，在该平台上测试关于新算法的假设，以确保其建议产生预期效果。第四个是基础设施，即将此流程嵌入软件并将其连接到内部和外部用户的系统\
  \ [31]。\n\n![../images/505424_1_En_5_Chapter/505424_1_En_5_Fig5_HTML.png](img/505424_1_En_5_Fig5_HTML.png)\n\
  \n**图 5-5** 公司运营模式从孤岛式到高度集成数据架构的数字化转型，其中以前孤立的业务单元共享一个公司范围的数据库。图示灵感来源于 [29]\n\n###\
  \ 5.3.1 数字化核心：创建中央数据库\n\n组织数字化核心的第一步是将分散的数据资产和分布式信息源——通常嵌入在复杂的`Excel`电子表格中 [25]——整合到一个组织级的高度集成数据库中，作为单一事实来源。如此一来，先前分布和孤立的数据就变成了结构化的大数据，允许进行全面的数据分析和处理，如图\
  \ 5-5 所示意。将分布式数据集成到单个数据库中尤为重要，因为数据的真正价值在于整合来自不同业务单元、因不同原因、在不同背景下收集的不同信息源。想想来自物流部门的库存数据和来自销售部门的客户订单数据。这两种信息源的整合创造了关于它们之间相关性的透明度，并允许相应地根据需求优化库存——当然，还有一系列其他不那么明显的例子，展示了极具价值的数据合并，正如前一章所述。\n\
  \n除谷歌和 Facebook 之外，最成功的美国媒体公司是将分布式数据的融合及其通过最先进的实时数据分析进行解释，从而转化为成功数字商业模式的典范是位于纽约市的彭博社。由美国商人\
  \ Michael Bloomberg 于 1981 年创立，彭博社从互联网收集公开数据，例如官方新闻稿和报纸文章，并将其与从内部新闻研究中获得的专有数据相结合。这种数据融合通过最先进的数字技术进行分析，包括由人工智能驱动的大数据分析，以衍生出进一步具有经济价值的商业洞察。然后，这些稀缺信息通过彭博终端\
  \ [26] 提供，这是其为金融和信息行业的机构客户销售突发商业新闻的核心创收产品——这些新闻经常影响股票价格和其他（影响深远的）投资决策。^(¹⁴²)\n\n\
  将分布在不同数据格式中的信息源整合到一个统一的数据平台的过程通常依赖于四个步骤：\n\n1.  *收集*：从包括开源和第三方数据在内的不同内部和外部信息源收集数据。\n\
  2.  *清理*：移除任何无用或没有价值的、不需要和不必要的数据。\n3.  *标准化*：将数据转换为一系列标准化和预定义的数据格式，适用于结构化数据（例如，财务信息、地址、电话号码、产品信息）和非结构化数据（例如，图像、视频、音频文件、社交媒体推文和帖子）。\n\
  4.  *集成*：将数据上传到云或数据湖，并使其在整个组织的平台上可访问。\n\n这种预处理可能非常耗时，需要在您的数字化议程的整体时间表中予以考虑 [28]。尽管如此，这个过程至关重要且不可避免，因为您数据输入的质量从根本上决定了输出的质量，正如之前关于人工智能及其应用的例子所示。\n\
  \n### 5.3.2 数字化核心：开发软件工具库\n\n如果没有人能够访问和使用，中央数据库就没有价值。这就是为什么数字化组织核心的第二步涉及在数据库之上构建一个工具库，以部署标准化软件模块，用于分析存储在共享数据库中的数据，如图\
  \ 5-5 所示。理想情况下，可以通过一个编程接口来访问这个软件库，该接口称为“应用程序编程接口”或`API`，它允许不同的功能团队轻松地将标准软件适配到他们的特定用例或业务问题。`API`的设计应促进工具和算法的模块化和重用，例如通过部署不同的机器学习算法、用于在量子计算机上运行复杂仿真的软件代码，或用于操作区块链网络的编程工具。\n\
  \n\n\n## 5.4 确定试点项目\n\n一个组织的数字化改造当然不可能在一夜之间完成——这是一个转型之旅，而非一场短跑。此外，成熟企业往往需要在数字化改造组织架构和流程的同时，继续运营传统业务。因此，关键是要从试点项目（^(143)^）开始启动数字化之旅，以此在整个组织内激发热情，并推动其数字化转型。像微软或谷歌这样的创新型数字组织，总是会同时启动多个试点项目，以增加成功的几率。\n\
  \n要使试点项目成功，它们需要满足某些关键标准。以下清单或许能帮助你为自身组织和应用场景（^(144)^）确定并筛选出最有前景的试点项目：\n\n-   **速赢**：为了在整个组织内激发热情，并说服利益相关者投资建设数字能力，理想的试点项目应能追求早期成果和快速胜利。一个试点项目从启动到交付最终成果，通常需要\
  \ 6 到 12 个月的时间。\n\n-   **可扩展性**：试点项目应具备可扩展性，以便在完成后能扩展到其他业务部门——可扩展性差是大多数试点项目面临的主要障碍。\n\
  \n-   **行业特定重点**：试点项目应聚焦于那些你打算大规模推进、创造收益，并期望长期创造价值的领域。\n\n-   **具体的业务目的**：成功的试点项目始终聚焦于具体、明确的业务问题或挑战，以此进行试验和学习。这可能是一个棘手的内部流程，或是一个以前难以解决、现在可由数字技术处理的问题。换句话说，数字化和数字化转型需要满足具体的业务目的，其本身并非一种时尚的终点。\n\
  \n在实践中，试点项目常常面临一个重大挑战，而这实际上是数字化转型失败的主要原因之一 [34]。这个挑战与第二个筛选标准——可扩展性相关，并被称为“概念验证陷阱”。它指的是那些拥有无限试点阶段的项目，这阻碍了原型及时在整个组织内成功推广。此类项目变成了无休止的“科学实验”，即使有简单可用的解决方案并能快速带来价值，它们也会部署过于复杂的方案来炫耀技术能力。这部分源于数字试点项目常常以非常“手工艺”的方式进行创新，缺乏既定的流程和交付计划。通过持续关注具体的业务目的，并在创新与工业化之间做出合理折衷，可以避免概念验证陷阱。成功的试点项目会同时探索有前景的创新原型及其工业化概念，而非按先后顺序进行。这种方法允许在产品或服务的第一个简单原型版本确立后，就能迅速推广成功特性——例如，想想前一章讨论过的特斯拉的自动驾驶及其主动学习策略。\n\
  \n沃达丰集团首席执行官维托里奥·科劳将试点项目比作海上的船只，并用下面这些话精彩地阐述了相关的领导力挑战：\n\n> 在数据分析、自动化和人工智能领域，正刮起强大的新风——它们不会以完全相同的方式吹遍整个组织。在我的船队中，有些船会加速，而另一些船帆较小，无法捕捉到同样的动力。问题在于，你是允许每艘船按照自己的巡航速度前进（就像我们开始时那样），还是想整编船队并将其纳入一个大型计划（就像我们现在试图做的那样）。整编船队对组织有益，但你也冒着迫使他们以线性速度前进，最终被颠覆者超越的风险\
  \ [35]。\n\n## 5.5 赋能管理层与员工\n\n数字化转型另一个非常关键的方面是通过教育和培训持续赋能员工。再怎么强调这一措施也不为过，因为——简单来说——是人推动了变革\
  \ [36]。数字化转型需要传统组织通常缺乏的技术技能。数字试点项目依赖于多学科和敏捷的创新团队（^(145)^），在其中，不同的人才相互补充——多样性是成功的关键\
  \ [37]。一个成功的数字产品开发团队（或“小队”（^(146)^））所需的技能范围，从数据科学（将数据转化为有价值的洞见和行动的能力）到项目管理、产品设计、软件开发、敏捷方法论（包括设计思维\
  \ [39]、蓝海战略 [40] 和 Scrum [41]）、市场营销和讲故事的能力 [42]。例如，文献 [43] 为在数字时代建立成功的项目团队提供了一个富有洞见的框架。\n\
  \n为了使数字化转型长期成功，每个团队成员，无论其技术背景如何，都必须对数字技术有基本的了解，并适应数字化思维方式。这正是两位美国谷歌高管埃里克·施密特和乔纳森·罗森伯格所称的“智慧创意者”\
  \ [44]，指的是将技术深度与商业智慧和创造力相结合的新型员工。数字教育不仅对于开发数字产品和服务、解读（大）数据分析结果至关重要，而且对于预测技术趋势以及评估其对组织短期和长期的潜在影响也至关重要。这就是数字化转型通常涉及开展以下工作的原因：\n\
  \n1.  大型内部技能提升计划，以激活和留住数字人才\n2.  外部招聘计划，以在数字技能和知识稀缺的领域吸引新人才\n3.  与`Upwork`、`Topcoder`和`Kaggle`等在线人才平台进行外部合作，以临时雇佣试点项目所需的数字专业知识\n\
  \n第三个选项尤为重要，因为组织无法一次性学会所有东西。他们反而必须专注于内部开发核心数字能力，并从外部渠道雇佣其他所有能力。这就是为什么组织提前确定并优先考虑他们最需要的数据技能至关重要\
  \ [45]。\n\n例如，鉴于人工智能对其业务日益增长的重要性，美国软件公司 Adobe 最近为其全球超过 5000 名工程师启动了一个为期六个月的机器学习培训和认证项目。然而，你在数字试点项目中所需的特定技能，将很大程度上取决于你打算在多大程度上深入数字技术及相关任务（如软件开发和编程）。好消息是，许多云计算供应商和开源平台免费提供软件工具和在线培训——数字技术和知识正在慢慢普及化。\n\
  \n赋能员工也涉及培养数字化领导者以及转变管理层的角色。根据马可·伊安西蒂和卡里姆·拉卡尼的观点，\n\n\n\n`作为监督的管理`，尤其是对执行例行任务的员工的监督，终于结束了。在\
  \ AI 驱动的运营模式下，管理者是设计师，他们塑造、改进并（希望）控制着那些感知客户需求并通过交付价值做出响应的数字系统。管理者是*创新者*，因为他们构想这些数字系统将如何随时间演变。管理者是*整合者*，因为他们致力于连接不同的数字系统，并识别公司运营模式与其所服务客户之间的新联系。管理者也是*守护者*，因为他们努力维护其所控制的数字系统的质量、可靠性、安全性和责任感\
  \ [29]。\n\n埃里克·施密特、乔纳森·罗森伯格和艾伦·伊格尔进一步指出：\n\n每位管理者的首要工作是帮助员工在工作中更有效率，并帮助他们成长和发展。[……]管理者通过支持、尊重和信任来创造这种环境。支持意味着为员工提供成功所需的工具、信息、培训和指导。这意味着要持续努力地发展员工的技能。优秀的管理者帮助员工卓越表现和成长。尊重意味着理解员工独特的职业目标，并对其生活选择保持敏感。这意味着以符合公司需要的方式，帮助员工实现这些职业目标。信任意味着放手让员工完成工作并做出决策。这意味着相信员工想把事情做好，并相信他们能做到\
  \ [46]。\n\n## 塑造组织与结构\n\n一个组织的结构反映了其产品和服务架构 [47]。这一基于经验的观察被称为*镜像假说*或*康威定律*，以美国计算机科学家梅尔文·康威的名字命名，他于\
  \ 1967 年提出这一观点：“设计系统（广义上）的组织，其产生的设计方案结构，必然是组织沟通结构的复制。” [48] 换言之，相互关联的任务，如复杂产品和服务的开发，最好由跨职能且高度整合的团队来执行，这些团队专注于开发端到端的客户特性，而不仅仅是整体产品或服务的单一功能或组件。这就是为什么数字化运营模式需要敏捷且高度互联的组织结构，而没有任何孤立的信息孤岛。因此，重塑组织结构以建立新的协作方式是数字化转型的另一个关键维度。\n\
  \n### 塑造组织与结构：组建敏捷项目团队\n\n敏捷创新团队规模很小。杰夫·贝索斯有一个著名的观点：一个不能被两份披萨喂饱（人数超过五到十人）的团队，不可避免地会因沟通和项目管理需求过高而导致效率低下，这被称为*双披萨规则*\
  \ [49]。此外，敏捷项目团队依赖跨学科性，由拥有不同才能、紧密协作的成员组成，并涵盖完成指定项目所需的所有数字和物理技能。他们培养主人翁意识和自主性，并遵循探索式的创新方法，使其能够利用涌现式策略在不同的解决方案之间灵活切换——在数字试点项目的早期阶段，灵活快速地响应变化比坚持计划更重要。敏捷团队通常重视创造性工作环境和较少的层级官僚体制，并专注于创建可工作的原型而非繁多的文档。他们的方法以客户为中心，协作比固定的规范更重要。\n\
  \n以敏捷团队的形式组织，试点项目是探索和试验新协作方式（包括敏捷方法论及其他方法）的理想选择。从组织角度来看，将此类团队整合到现有组织和层级结构中有三种主要方式：\n\
  \n1.  *去中心化模式*：数字化举措被整合到所有业务部门中，并或多或少独立执行。每个业务部门都有自己的敏捷团队和试点项目。\n\n2.  *中心化模式*：数字化举措由组织内的一个独立实体统一协调，该实体可能由首席数字官领导。这个卓越中心汇集了来自不同业务部门的产品经理、数据科学家、业务分析师以及硬件和软件开发者，并围绕不同的试点项目协调整个组织。一个例子是德国汽车供应商采埃孚（ZF\
  \ Friedrichshafen），它成功地建立了一个中心化的分析实验室 [50]。\n\n3.  *孵化器模式*：数字化举措与组织的核心业务并行运行，有时甚至与其他业务单元竞争。一个数字孵化器^（147）作为组织外部的初创型企业，利用数字技术创造创新产品和服务。其创业努力提供了宝贵的见解和经验，可作为组织其他部门未来创新和试点项目的蓝图。\n\
  \n根据优先事项和特定的起点，许多组织通常选择运行混合模式，同时实施数字卓越中心和孵化器，以支持其数字化议程。\n\n\n\n### 5.6.2 塑造组织与结构：建立双速\
  \ IT\n\n推进数字议程中的各项举措和试点项目，需要一个敏捷的 IT 部门及基础设施，以满足敏捷项目团队的期望和需求。这一点尤为重要，因为传统的 IT 支持通常会拖慢敏捷项目的创新周期。但一个传统组织应如何构建其\
  \ IT 部门，使其既能运营养老业务，又能同时支持数字试点项目呢？\n\n事实证明，实现这一目标的最佳组织结构是*双速 IT*，这一组织方法由著名管理咨询公司麦肯锡于\
  \ 2014 年提出 [51]。双速 IT 基于两个并存但侧重点不同的 IT 团队：（1）慢速后端和（2）快速前端。慢速后端或*工业速度团队*专注于成熟运营和业务流程（如物流运营、支付和银行服务），提供运营养老业务所需的\
  \ IT 产品和服务。其服务设计以稳定性和高质量数据管理为目标。而快速前端或*数字速度团队*则专门支持数字试点项目，并为尝试尚未在养老业务中应用的新型数字技术提供资源和支持，如表\
  \ 5-2 所示，以便进行更好比较。工业速度团队的工作方式基本与传统 IT 部门相同，而数字速度团队则以敏捷方式运作，实现基于客户反馈的快速迭代和测试。\n\n\
  双速 IT 仅作为数字化转型的临时组织结构。组织最终应推动两个团队的融合，建立一个统一的 IT 部门，使其以数字速度团队的速度运转，并能根据需求灵活交付硬件和软件解决方案，同时与已建立的数字运营模式保持一致。这只有通过培养并反复强化开放的创新文化才能实现，我们将在下一节中更详细地讨论这一点。\n\
  \n表 5-2\n\n双速 IT 运营模式中两个并存 IT 团队的比较\n\n|  | 慢速后端 | 快速前端 |\n| --- | --- | --- |\n\
  | 重点 | 养老业务 – 支持并赋能成熟的核心理念运营，如物流和生产 | 试点项目 – 支持敏捷软件开发，推动数字技术实验 |\n| 方法 | 瀑布式方法，软件开发按顺序从概念到测试，每个阶段由不同团队负责\
  \ | 基于敏捷软件开发方法（包括 Scrum、快速原型设计和设计思维）的实验性“测试与学习”方法 |\n| 团队 | 专业专家，任务狭窄且清晰 – 此类工作通常为孤岛式\
  \ | 高度跨学科，成员背景多样化，例如商业、客户研究、软件与应用开发等 |\n\n## 5.7 建立开放创新文化\n\n建立敏捷开放的业务文化对于成功完成数字化转型至关重要。在此背景下，*业务文化*一词指的是组织通过创新为客户和员工创造价值的集体能力，这也是为何在此特定语境中它有时被称为*创新文化*。受麻省理工学院社会学家埃德加·沙因（组织文化领域世界顶尖学者之一）的启发，克莱顿·克里斯滕森将这一组织的核心组成部分定义如下：“文化是一种朝着共同目标协同工作的方式，这种方式被如此频繁且成功地遵循，以至于人们甚至不会考虑尝试其他方法。如果文化已经形成，人们会自主地做他们需要做的事情来获得成功”\
  \ [52]。换言之，文化是内部规则和工作流程的独特组合，使员工能够完成日常工作中频繁出现的特定任务。他们成功解决任务的次数越多，工作流程就越本能化。因此，业务文化并非一蹴而就，而是通过反复重复形成的。要成功建立一种新的业务文化，仅仅传达文化是什么是不够的。相反，组织的管理层——作为员工的榜样——需要遵循这种文化，并通过做出与之一致的决策和优先安排项目来不断强化它。在转型传统文化并建立新创新文化时，这是一个需要牢记的重要点。\n\
  \n### 5.7.1 建立开放创新文化：大规模采用敏捷\n\n传统业务文化最适合成熟的业务流程和开发现有收入来源，而数字创新文化则最擅长基于数字技术探索新流程并创造新收入来源。开放创新文化培养了一种更加敏捷、协作和一体化的创新方法，具有强烈的以客户和产品为中心的观点。数字文化不依赖顺序化、僵化且通常缓慢的产品开发流程，而是培养新想法的涌现，并通过基于客户反馈采用更少线性、更迭代的产品开发方法，赋能员工更快地交付成果。在整个公司范围内使用敏捷方法论——有时被称为*大规模敏捷*\
  \ [57]——因此本身并非目的，而是达成目标的手段。\n\n此外，开放创新文化通过给予员工自由和空间来探索新颖想法（这与弗雷德里克·赫茨伯格的著名激励理论一致^(¹⁴⁸)\
  \ [53]）来激励他们。埃里克·施密特、乔纳森·罗森伯格和艾伦·伊格尔曾在此背景下指出：\n\n> 你需要……超越“传统的（员工）管理观念，即侧重于控制、监督、评估和奖惩”，以营造一种沟通、尊重、反馈和信任的氛围。……在快速变化、竞争激烈、技术驱动的商业世界中，成功的道路在于组建高绩效团队，并给予他们资源和自由去成就伟业\
  \ [46]。^(¹⁴⁹)\n\n![../images/505424_1_En_5_Chapter/505424_1_En_5_Fig6_HTML.jpg](img/505424_1_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6\n\n迭代设计思维过程的五个步骤（灰色圆圈）\n\n\n\n### 5.7.2 建立开放创新文化：实施设计思维\n\n一种非常成功的、能够支持建立开放创新文化的方法论是*设计思维*\
  \ [39]。`设计思维`是一种以客户为中心、创造性、迭代且实用的创新方法。它常用于重新构想和重新设计客户旅程，通常按以下五个步骤组织：\n\n1.  *共情*：`设计思维`过程的第一步，是从客户的角度对问题建立共情理解。典型的引导性问题包括：客户在寻找什么？客户需要完成的任务是什么？什么（最）困扰他们？\n\
  2.  *定义*：分析观察结果并将其综合为对问题的精确定义，是第二步的主要目标。是否存在未满足的需求？需要解决的问题是什么？\n3.  *构思*：这是整个过程中的创造性步骤，广泛探索针对已定义问题的可能解决方案，而不考虑它们看起来是现实还是不现实。\n\
  4.  *原型制作*：`设计思维`团队制作一个低成本的、简化的产品或服务版本，旨在增强客户（或用户）体验。这个*最小可行产品*^((150))（或服务）充当后续迭代改进过程的起点。\n\
  5.  *测试*：这是第一次迭代周期的最后一步，旨在真实条件下测试原型，以检验它如何影响客户体验。根据收到的客户反馈，成功的功能将被推出并优化，而不成功的功能则进入从步骤\
  \ 4 开始的下一迭代周期。\n\n`设计思维`已被成功证明能够加速整个产品开发过程，同时通过在发布前用最小可行产品或服务进行试验来降低失败成本。它允许组织在产品和服务上进行实时实验，以一种非常低成本的方式尽早试验原型，并根据客户反馈进行迭代改进。此外，这种敏捷方法论鼓励人们承担风险、迭代学习，并快速及早失败。`设计思维`提倡快速原型制作\
  \ [55] 和持续学习，而不是在向客户发布和展示产品之前追求完美。\n\n建立在`设计思维`和其他敏捷协作方式之上的开放创新文化，不仅能够实现快速的产品创新，还能通过给予员工更多自主权去实现他们自己的想法和解决方案，从而吸引和留住更优秀的人才。实际上，将这种个人自主权与组织的整体数字化议程对齐，是转变企业文化时面临的主要挑战之一。调和自主权与一致性的一种好方法是，通过反复激励对组织整体数字化议程的忠诚和承诺，来鼓励正确行为并抑制不良行为。采用人力资源流程，例如薪酬和晋升体系，以避免激励错位，通常也能促进对数字化议程的遵守。\n\
  \n## 5.8 利用生态系统\n\n根据我们之前的讨论，我们知道，将客户反馈迭代整合到产品或服务开发过程中，对于建立以客户为中心的开放创新文化至关重要——例如，在亚马逊，超过\
  \ 90%的创新实际上是由客户反馈触发的。此外，系统地与客户互动对于开发满足特定客户需求和期望的个性化产品和服务也是必不可少的。杰夫·贝佐斯在 2016 年致股东的信中提到了这一点：\n\
  \n以客户为中心的方法有很多优势，但最大的一个是：客户总是美妙地、令人愉悦地不满足，即使当他们报告说很开心且业务很好时也是如此。即使他们自己还不知道，客户也想要更好的东西，而你取悦客户的愿望将驱使你为他们而发明\
  \ [56]。\n\n但客户并不是在数字化转型过程中需要与之互动的重要生态系统利益相关者。\n\n你的生态系统还包括竞争对手、服务提供商、供应商以及其他现有和潜在的商业伙伴，他们可能是灵感和新创意的另一个重要来源。你生态系统内的合作与伙伴关系通常属于以下三类之一：\n\
  \n1.  *横向*伙伴关系，存在于同一领域作为竞争对手运营的企业之间，通常用于解决产能限制或中和风险。竞争对手可能联合起来，以某种方式改善他们的市场地位，例如，追求规模经济、在多个市场销售产品，或在研发方面进行合作。一个例子是\
  \ IONITY，这是一家由宝马、戴姆勒、福特和大众在慕尼黑成立的合资企业，旨在为欧洲的纯电动汽车建设大功率充电基础设施。\n2.  *纵向*伙伴关系，指同一供应链内公司之间的合作。例如，一家公司可能与其某个供应商合作，以加深关系、巩固长期承诺，或促成产品设计和分销方面的协作。一个极好的例子是亚马逊的市场平台，它利用与在线卖家的纵向伙伴关系，在\
  \ 2007 年其 Kindle 商店推出时，基本上从第一天起就提供了超过 88,000 本可供下载的电子书。随着数字技术的到来，如今组织与其最终用户之间也直接形成了纵向伙伴关系。例如，美国媒体公司\
  \ Netflix 就利用这种伙伴关系来众包改进其推荐引擎的创新想法。\n3.  *跨行业*伙伴关系，是不同行业组织之间的长期互动。一个例子是零售银行和电信公司合作提供移动支付服务\
  \ [58]。另一个例子是亚马逊云服务（AWS）最近开始与美国在线学习平台优达学城（Udacity）合作，在线提供不同的证书课程和奖学金 [59]。\n\n这样的伙伴关系可以帮助你充分利用生态系统的多样性，吸引更多关注，从客户那里获得有价值的反馈，获取外部创意，并吸引新的数字人才。出于同样的原因，你也可以考虑与创新型初创公司或学术界合作。成功的数字化组织还会采用一系列其他举措，以便在特定生态系统中更好地定位自己。这些举措包括组织软件和硬件开发竞赛或黑客马拉松，访问研究员项目、暑期学校和会议，以及在硅谷或其他高度创新的地理位置开设创新中心。\n\
  \n\n最终，我认为数字化转型为任何在私营和公共部门运营的组织都提供了多种机遇。量子计算、区块链技术和人工智能等数字技术的出现，正在为思想领袖们提出要求，促使他们拥抱数字技术的全部潜力，以重新调整组织，为我们面前的数字未来做好准备。数字化转型及其支撑技术为所有组织提供了宝贵且同样独特的机遇，使其能够使自己的产品和服务脱颖而出，并抵御日益增多的竞争对手。\n\
  \n我希望本书中提出的概念和框架能激发新的想法和数字思维，并帮助您成功完成自己的数字化转型之旅。最好的数字技术——可以肯定地说——尚未到来。\n\n## 关键要点\n\
  \n-  最成功的商业模式围绕客户需要完成的任务进行整合，并旨在通过利用持续性/颠覆性创新及相关技术，随着时间的推移，将这项任务做得越来越好。在此背景下，客户旅程有助于根据客户的特定需求定制产品或服务。\n\
  \n- 选择支持数字业务和运营模式的最佳技术栈，通常涉及选择云计算供应商。最受欢迎的供应商是亚马逊云服务、微软 Azure 和谷歌云。它们的服务通常分为四大类，即：(1)\
  \ 基础设施即服务、(2) 平台即服务、(3) 软件即服务和 (4) 业务流程即服务，具体取决于客户的参与程度。\n\n- 通过利用技术栈数字化企业或组织的核心，是关于创建支持内部流程的适当\
  \ IT 基础设施。对于成熟的组织而言，此过程通常涉及将分散在孤岛中的数据收集、清理、规范化并集成到一个集成的数据平台中，以便于在整个组织中轻松共享和分析大数据。\n\
  \n- 成功的试点项目是围绕一个具体的（业务）问题或目标构建的。它们具有可扩展性，并旨在通过快速取胜来在组织内部激发对数字化转型的热情。\n\n- 通过教育和培训赋能员工，涉及培养从敏捷方法到数字营销和编程技能等跨学科能力。这些不同的举措旨在创建一种数字思维模式，使人们能够评估和预测数字技术对组织和社会的影响。\n\
  \n- 重新思考和塑造组织结构尤为重要，因为公司无法自我颠覆。因此，孵化器模式和双速 IT 已被证明在运行数字试点项目方面特别成功。\n\n- 建立以强大的客户和产品为中心观点的开放式创新文化，是任何数字化转型的核心。设计思维可能有助于有目的地开发围绕客户需要完成的任务的新产品和服务。\n\
  \n- 利用组织的生态系统与客户互动，对于迭代优化产品和服务至关重要。与生态系统中其他参与者的合作与伙伴关系有助于吸引新人才并快速拓展数字业务。\n\n- 数字化转型涉及八个关键维度：\n\
  \    1.  构想数字业务和运营模式\n    2.  选择适当的技术栈和平台\n    3.  数字化业务核心\n    4.  确定可扩展的试点项目\n\
  \    5.  赋能员工\n    6.  塑造公司结构和组织\n    7.  建立开放式创新文化\n    8.  利用生态系统并与客户互动\n\n##\
