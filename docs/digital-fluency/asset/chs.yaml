- '# 量子比特类型：离子阱量子比特


  `离子阱`是一种过去曾用于各种原理验证实验的技术。该技术由德国物理学家、后来的诺贝尔奖得主沃尔夫冈·保罗（Wolfgang Paul）和汉斯·格奥尔格·德梅尔特（Hans
  Georg Dehmelt）于 20 世纪 50 年代提出 [21–23]。离子阱通过磁场将一串孤立且带电的原子（即所谓的`离子`) 约束在真空管内。磁场通常由四根圆柱形棒产生，这些棒携带振荡电流，并感应出极性不断变化的交变磁场。由于这种极性的变化频率通常与老式收音机相同，因此产生的磁场被称为`射频`，或简称为`RF
  场`。


  量子比特`|0〉`通常与能量最低、因而也是离子最优先的状态相关联。这种基态离子可以被一束强激光激发，形成带正电的离子，该离子与量子比特`|1〉`相关联。从基态到激发态的跃迁`|0〉
  → |1〉`只是一个仅涉及单个量子比特的量子逻辑门示例。多量子比特操作，例如量子比特的叠加和纠缠，可以通过将两个或多个相邻离子的基态和激发态与它们围绕离子阱对称轴的运动相耦合来实现
  [15]。这些所谓的`量子化简正模式`是离子群集体的机械振荡，类似于一串摇晃的珍珠项链，其中相邻两个离子（珍珠）之间的结合力由它们之间的电斥力提供。^(³⁴)
  然而，存储在这种`保罗阱`中的量子比特被发现其相干时间非常短，这就是为什么如今科学家们使用精心设计的磁场和电场组合——一种以其荷兰发明者弗兰斯·彭宁（Frans
  Penning）命名的装置，称为`彭宁阱` [24–26]。


  就其应用而言，囚禁离子量子计算机的主要优势在于，离子能在自由空间中被三维约束，并且由于处于真空中而与环境良好隔离。因此，离子量子比特显示出迄今为止测量到的最长的相干时间，这就是为什么它们仍被用于科学和基础研究，以在定义明确且孤立的量子比特系统中研究叠加和纠缠。


  截至 2018 年，可控纠缠的最大粒子数为 20 个囚禁离子 [27]。根据 DiVincenzo 标准，这种量子比特实现方案的主要缺点是可扩展性差，因为随着离子链长度的增加，控制难度也越来越大。当今用于量子计算的大多数离子阱都依赖于与最先进的微电子技术兼容的微芯片架构，并且能够在低温下以非常高的精度约束和控制离子量子比特
  [28]。


  '
- "# 量子比特类型：电子自旋量子比特\n\n电子自旋量子比特的历史与现代半导体物理和技术的兴起密不可分 [29]。半导体是一种导电性能优于绝缘体（如玻璃）但次于导体（如铜和其他金属）的材料。技术上最重要的半导体是`硅`，它通常通过熔化石英砂并从\
  \ 2273 K 高温熔体中去除氧化物来工业化生产。由此获得的银白色硅通常含有低浓度的其他化学元素，这些元素在技术上被称为`杂质`。一种特别令人感兴趣的杂质是化学元素磷，因为这种化学元素或原子同时表现出核自旋和电子自旋。\n\
  \n硅中的这种杂质在 1998 年引起了美国物理学家布鲁斯·凯恩（Bruce Kane）的注意，并启发他提出了一种创新的硅基量子计算方法 [30]。他的方法极具影响力，因为它似乎与当时制造微芯片的主流技术——最先进的硅微电子学相兼容。`凯恩模型`基于嵌入纯硅衬底（作为基底材料）中的磷原子阵列。它允许在磷原子的核自旋中编码量子比特，而相邻两个或多个磷原子之间的叠加和纠缠则通过磷原子内部核自旋和电子自旋之间的自然相互作用来介导。\n\
  \n**表 2-1：最流行的量子计算方法优缺点对比。** 品质因数衡量单量子比特或多量子比特操作中的错误率和噪声水平。\n\n| 量子比特类型 | 相干时间 (最大值)\
  \ | 优点 | 缺点 |\n| --- | --- | --- | --- |\n| 囚禁离子 | 10 秒 [32] | + 长相干时间+ 良好隔离的离子+\
  \ 高品质因数+ 高个体可控性 | – 可扩展性差 |\n| 电子自旋 | 60 毫秒 [33] | + 中等相干时间+ 中等可扩展性 | – 中等品质因数–\
  \ 中等个体可控性 |\n| 超导量子比特 | 4 微秒 [34] | + 良好的可扩展性+ 大规模集成+ 高个体可控性 | – 短相干时间– 低品质因数 |\n\
  \n在布鲁斯·凯恩提出量子计算方案前后，美国物理学家大卫·洛斯（David Loss）和大卫·迪文森佐（David DiVincenzo）提出，通过金属电极阵列将单个电子空间约束在某些硅衬底中\
  \ [31]——这种器件架构通常被称为静电定义的`量子点`。^(³⁵) 根据我们施加正电压还是负电压，这些栅电极会吸引或排斥带负电的电子，并有助于控制它们的运动。置于外磁场中时，这种量子点能够约束和控制单个电子自旋，从而实现某些量子逻辑门。它们相对于\
  \ DiVincenzo 标准的主要优缺点汇总在表 2-1 中。尽管这两种在硅中利用电子自旋量子比特的方法不太可能用于大规模量子计算，但它们对于基础量子研究来说是极其重要的器件结构。\n\
  \n![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig7_HTML.png](img/505424_1_En_2_Fig7_HTML.png)\n\
  \n**图 2-7：** 超导材料中库珀对的形成。电子“1”局部扭曲了超导体的规则原子晶格。电子“2”被这种扭曲所吸引（虚线箭头），因为这是晶格中能量上更有利的位置。因此，当第一个电子在晶格中移动时，会拖动第二个电子随之移动。这两个电子之间的连接被称为库珀对。\n\
  \n\n\n### 量子比特类型：超导量子比特\n\n在当前最先进的量子计算机中，技术上最重要的量子比特实现方案是超导量子比特，这就是为什么我们现在要更详细地研究它们。\n\
  \n*超导性*本身是一种自然现象，由荷兰物理学家海克·卡末林·昂内斯于 1911 年在著名的荷兰莱顿大学发现。他在低温下研究固态汞时观察到，当温度达到接近绝对零点的约\
  \ 4.2 K 时，其电阻会突然消失 [35]。在此临界温度以下，由电子携带的电流可以自由地流过材料，没有任何电阻或其他耗散效应——因此电流会永远持续流动。我们之前讨论第一个晶体管时认识的约翰·巴丁、利昂·库珀和罗伯特·施里弗后来通过他们基于量子力学的所谓\
  \ *BCS 理论*解释了这一效应，该理论从电子对的角度解释了超导性。为了理解这些所谓的*库珀对*的形成，我们首先简要研究超导体的一些基本性质。\n\n固体物质由规则排列在所谓*晶格*中的原子组成，如\
  \ 图 2-7 左侧所示。在室温下，构成晶格的原子会运动，导致整个晶格强烈振动——它们运动得越快，材料的温度就越高。当自由电子穿过振动的晶格时，它会与晶格原子发生各种碰撞，类似于台球中白球频繁撞击彩球。直观地说，如果温度升高且原子振动更剧烈，电子与原子之间的碰撞就更可能发生。因此，金属的电阻率通常随温度升高而增加。在极低温度下，晶格原子振动非常缓慢，并且由于量子力学的量子化原理，这些振动的能量会以阶梯方式变化。最小的振动能量称为*声子*，其行为类似于量子力学粒子。³⁶\
  \ 穿过这种冷晶格的电子会遇到一些但非常少的碰撞。因此，冷金属的电阻率很低，但不为零。\n\n![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig8_HTML.png](img/505424_1_En_2_Fig8_HTML.png)\n\
  \n**图 2-8** 约瑟夫森结中库珀对的量子力学隧道效应。库珀对要么停留在左侧的“超导体 1”中，要么隧穿通过绝缘隧道势垒进入右侧的“超导体 2”（白色虚线箭头）。第一种情况可与量子比特\
  \ `|0⟩` 关联，第二种情况与 `|1⟩` 关联。\n\n在超导材料中，这幅图景完全改变。超导晶体的特定几何结构允许电子吸收晶格声子，并相互反复交换它们，而不会减速或损失任何运动能量。两个电子之间的这种相互作用将电子对“粘合”在一起，形成库珀对，如\
  \ 图 2-7 右侧所示。这个库珀对可以不受阻碍地穿过晶格，从而携带零电阻的电流。超导转变发生在低于某个特定材料温度时，该温度促进了库珀对的形成。\n\n广泛用于实现超导量子比特的器件结构被称为*约瑟夫森结*，以纪念其美国发明者、后来的诺贝尔奖得主布赖恩·约瑟夫森。它由两个被薄绝缘隧道势垒隔开的超导体组成。基于量子力学隧道效应（我们在\
  \ 2.1 节中了解到的奇异现象），库珀对可以越过这个隧道势垒。约瑟夫森结通常允许实现三种不同的超导量子比特。第一种选择如图 2-8 所示，称为超导*电荷量子比特*，因为它最终依赖于隧道势垒左侧和右侧超导体中是否存在库珀对。这种特定器件被称为*库珀对盒*。\n\
  \n第二种也是迄今为止使用最广泛的实现方案是超导*磁通量子比特*或“持久电流量子比特”。该方案基本上是通过库珀对携带的、分别在超导环中顺时针和逆时针流动的电流来编码量子比特。其底层器件结构称为*超导量子干涉器件*或简称“SQUID”，如图\
  \ 2-9 所示。当注入环中时，根据我们在 2.2 节中了解的波粒二象性，库珀对基本上表现为量子力学波。这些由库珀对携带的超导电流可以干涉形成叠加态，并同时（以一定概率）沿顺时针和逆时针方向流动。当我们测量流动方向时，相应的波函数坍缩，库珀对将沿两个方向之一流动。根据右手定则，³⁷\
  \ 顺时针电流感应出一个向下的磁场，通常与量子比特 `|0⟩ = |↻⟩ = |↓⟩` 关联，逆时针电流相应地与 `|1⟩ = |↺⟩ = |↑⟩` 关联。超导量子比特是量子信息处理最有希望的候选者，这主要归因于它们的大小和宏观特性：超导磁通量子比特通常涉及在尺寸达\
  \ 0.1 mm 的器件中约 10⁹ 个库珀对的集体运动。这种宏观集合体比与环境隔离的单个电子、原子或离子更容易控制。但更宏观的量子比特通常遭受更快的退相干时间，这就是为什么超导量子比特在所有量子比特中显示出最快的退相干时间。\n\
  \n![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig9_HTML.png](img/505424_1_En_2_Fig9_HTML.png)\n\
  \n**图 2-9** SQUID 中的超导磁通量子比特。库珀对的顺时针持久电流与量子比特 `|0⟩` 关联，逆时针方向的持久电流与 `|1⟩` 关联。两个约瑟夫森结允许两个波函数干涉并同时沿两个方向循环。\n\
  \n然而，早期实验中观察到的令人困扰的短退相干时间已通过先进的电路设计和更稳健的量子比特得到延长和改善。最新实验获得的退相干时间足以实现所有相关的量子逻辑门，这就是为什么在所有大规模量子计算实现方案中，它们提供了最乐观的前景，并吸引了众多量子计算公司的高度关注，我们将在下面看到。\n\
  \n## 量子计算现状\n\n量子计算不再局限于学术研究，最近已在工业界和大企业中首次亮相 [37]。目前有各种不同的系统可供商业使用，既可以直接本地购买，也可以通过互联网按需访问的云计算服务获取。它们采用不同的量子比特实现方案，其中超导电路和离子阱目前是其中最重要的。\n\
  \n\n\n### 2.3.1 商用系统\n\n表 2-2 汇总了部分商用系统，并按量子比特数量自上而下排序。这些系统属于三种根本不同类型的量子计算机，它们决定性地影响了应用范围和使用场景。量子计算机通常分为\
  \ (1) 量子退火机、(2) 量子模拟器和 (3) 通用量子计算机。了解这些差异将有助于您更好地理解媒体上的新闻和新闻稿，并能选择最适合您自身应用或使用场景的最佳量子计算机或云计算供应商。\n\
