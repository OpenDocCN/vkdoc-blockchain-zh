  \ 6 | [36] |\n\n^a 超导电路  \n^b 经典计算硬件  \n^c 线性离子阱微芯片\n\n#### 商用系统：量子退火机\n\n*量子退火机*是我们将详细探讨的第一类量子计算机。它们于\
  \ 1994 年被从理论上提出[51, 52]，并首先通过超导磁通量子比特得以实现[53]。自 2011 年起，加拿大公司 D-Wave Systems 开始提供商用量子退火机。其首个系统名为\
  \ `D-Wave One`，配备 128 个量子比特，并在公开发布后不久便出售给了美国国防公司 Lockheed Martin。据报道，D-Wave 的首位客户后来升级了其系统，并一直使用拥有高达\
  \ 2,048 个量子比特的 `D-Wave 2000Q` 直至今日。最新系统 `D-Wave 5000Q` 于 2019 年发布，并首次售予位于美国新墨西哥州的洛斯阿拉莫斯国家实验室。\n\
  \n![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig10_HTML.png](img/505424_1_En_2_Fig10_HTML.png)\n\
  \n**图 2-10** D-Wave 量子退火机中使用的主要器件设计——为简化起见，系统被缩减为 4 个量子比特。与四个磁通量子比特相关的超导持续电流在矩形环路中流动，每个环路对应一个磁通量子比特。磁通量子比特可以通过\
  \ 16 个耦合器相互作用，这些耦合器允许超导电流发生量子力学隧穿。特殊的初始化端口或触点有助于将相应电流注入器件中。\n\nD-Wave 量子退火机的 QPU\
  \ 由二维超导环阵列构成，这些超导环承载着超导磁通量子比特，形成所谓的*自旋玻璃晶格*[52]，如图 2-10 所示。这些环通过超导*耦合器*相互连接，耦合器促进了量子力学隧穿，并可用于叠加和纠缠相邻的磁通量子比特。QPU\
  \ 还配备了一系列不同的电触点，用于施加偏置电压以调节库珀对的隧穿概率和能量。(38) 据报道，例如 `5000Q`，包含约 40,000 个耦合器和超过 1,000,000\
  \ 个约瑟夫森结，这使其成为有史以来最复杂的超导集成电路之一。\n\n与其他任何计算机一样，量子退火机旨在解决数学问题，例如*旅行商问题*，该问题是优化领域中的一个传奇基准，也是在此背景下被引用最多的例子之一。其目标是为一位置身在故乡、需要拜访分布于世界各地的一系列其他城市的销售员找到最短的可能路线。在这个问题中，销售员必须恰好拜访列表中的每个城市一次，并在故乡结束旅程。如果城市列表非常短，这个组合问题很容易解决。但一旦列表长度增加，可能的组合数量就会呈指数级增长。例如，对于\
  \ 5 个城市，有 12 条可行路线，这是个可控的数字。但对于 12 个城市，旅行商就会陷入困境，因为他需要考虑近 2000 万条可行路线(39) —— 可怜的销售员。那么，D-Wave\
  \ Systems 的量子退火机通常是怎样处理一个计算问题的呢？\n\n\n\n每项计算的第一步，是将当前的数学问题转化为由节点和边构成的二维几何图案，这种图案被称为*图*，它需要能够适配\
  \ D-Wave 定制设计的设备架构——图中的节点对应量子比特，边则对应耦合器。以旅行商问题为例，该问题在数学上通过一个无向加权图来描述：不同的城市是图的节点，城市之间的路径是图的边，而路径的距离则对应边的权重，也就是一个衡量相邻城市间空间距离的任意数值。问题的这种图形表示，本质上充当了在\
  \ QPU 上连接和控制量子比特的蓝图。^(⁴⁰)\n\n从待求解的数学问题映射到量子比特的二维图形表示这一过程，通常并不直观，正因如此，D-Wave Systems\
  \ 通过在传统计算机上运行一个带有图形用户界面的支持软件来自动化这一过程。该软件允许用户轻松输入相应的问题——通常以数学方程的形式给出，例如用于衡量旅行商问题中总旅行距离的成本函数——并自动生成最合适的图形表示。一旦找到这种表示方法，一切准备就绪，就可以开始实际的计算或退火过程。\n\
  \n退火过程通常包含四个主要步骤：\n\n1.  *量子比特初始化*：此步骤基于一系列特定的微波脉冲，根据问题的图形结构初始化量子比特的配置，以此作为起点。选择这些脉冲的理想目的是让芯片上二维阵列中的所有量子比特彼此纠缠。这一点至关重要，因为这种纠缠使得量子比特配置能够广泛探索当前问题的所有可能解决方案。\n\
  \n2.  *问题初始化*：第二步涉及开启编码在一组特定量子比特和耦合偏置电压中的问题描述。为了成功执行此过程，需要缓慢增加电压，以便量子比特只与彼此相互作用，而不与外部环境相互作用。这一点特别重要，因为任何与环境（如热能交换）的相互作用都会导致退相干，从而造成信息的不可逆丢失。^(⁴¹)\
  \ 在这个所谓的*绝热相变*过程中，不同的量子比特会了解计算问题，并通过量子力学隧穿效应经由耦合器（取决于设定的特定偏置电压）相互影响。\n\n3.  *弛豫过程*：在第三个计算步骤中，量子比特和耦合偏置电压会突然关闭。随着时间的推移，纠缠的量子比特网络会演化，并最终弛豫到能量上最有利的配置，即系统的所谓*基态*。这种随时间演化由量子涨落和不确定性原理导致的隧穿效应推动，通常涉及相邻量子比特间的自旋翻转跃迁。\n\
  \n4.  *读出过程*：最后一步是测量系统的基态。此测量会导致整体波函数坍缩，我们得到一个按顺时针或逆时针方向流动的超导电流阵列。根据关联规则 `|0〉 =\
  \ |↻〉` 和 `|1〉 = |↺〉`，这些电流分别对应一个由 0 和 1 组成的阵列。由于能量已最小化，这个图状态代表了当前计算问题的最终且最优的解决方案。\n\
  \n所有这些过程都在不到一秒钟的时间内完成，并且会重复多次，因为量子退火器存在噪声。统计上出现频率最高的解，可被视为系统的真实基态和问题的最佳解。这个最终的 0\
  \ 和 1 阵列随后由运行在传统计算机上的特殊软件处理，并被转换为一个有序的城市列表，从而解决特定的旅行商问题。\n\n量子退火器已被应用于广泛的商业问题，并已证明在经典超级计算机中能提供显著的运行时间优势。事实证明，其应用主要分为两大类，在考虑将量子退火器应用于特定问题时，理解这两类非常重要：\n\
  \n1.  第一类是*组合优化问题*，例如前面描述的旅行商问题或寻找具有最高回报率的股票投资组合。这类问题通常涉及从数量庞大的可能解决方案或组合中找到最佳的那个。^(⁴²)\n\
  \n2.  *采样问题*是量子退火器非常擅长的第二类问题。这类问题涉及在可能的解决方案或组合中，找到一个更好但不一定是最佳的解。这对于量子机器学习 [55] 尤其有用，因为这门技术通常需要大型数据集才能成功训练机器学习模型，我们将在第\
  \ 4 章“人工智能”中了解到这一点。在此背景下，量子退火器可用于通过生成完美模拟现实的新数据，将小数据转化为大数据，这些新数据可用于训练机器学习模型。另一个例子是关于材料建模和寻找更好的机翼空气动力学形状，这是欧洲航空航天公司空客近期报道的量子退火器应用案例\
  \ [56]。\n\n量子退火器是世界上首批商用量子计算机，研究人员从一开始就密切关注这项技术。虽然其中一些人对这种特殊的量子计算方法感到非常兴奋，但另一些人则对这类机器的长期潜力持怀疑态度，因此它们长期被认为是世界上最具争议的量子计算机\
  \ [57]。这种争议主要源于一个事实：量子退火器（与通用量子计算机不同）不需要实现量子逻辑门。整个计算过程依赖的是物理系统随时间推移通过量子涨落和隧穿效应演化到其能量最优状态（基态）的基本属性。\n\
  \n然而，D-Wave Systems 在推广这项技术方面做得很好，他们与其跨国企业客户合作，将其应用于广泛的领域。在过去的几年里，他们成功地将量子退火器确立为“专用量子计算机”，这类计算机在优化和采样问题上表现最佳，能提供巨大的运行时间优势。\n\
  \n\n\n#### 商用系统：量子模拟器\n\n`量子模拟器`是最原始的量子计算机类型[58]，其历史可追溯到 1981 年，当时理查德·费曼在加州理工学院发表了著名的“计算讲座”[59]。他当时思考的问题是：能否在经典计算机上高效模拟量子力学系统（例如超导体中的库珀对集合）[14]。通过分析，他证明采用量子力学效应的计算机可以指数级速度模拟某些量子系统，远超经典计算机[60]，因此这种量子计算方法自此被称为`量子模拟器`。\n\
  \n如今，该术语通常指具备足够能力模拟量子计算机某些特性的经典计算硬件栈。量子模拟器主要用于学术界，因其能够探索物理、化学、生物学和材料科学等领域的基础问题与量子现象。此外，量子模拟器还可用于优化\
  \ QPU 并验证其结果，这对新型量子算法与软件的开发尤为重要。\n\n#### 商用系统：通用量子计算机\n\n`通用量子计算机`是功能最强大、应用最广泛的量子计算机，但遗憾的是，它也是目前最难构建的类型。由于大规模物理实现与运行面临重大技术挑战，这类机器目前尚未问世，甚至在近期内也难以实现。在此背景下，文献区分了`含噪中等规模`与技术更先进的`全纠错`（或容错）量子计算机。全纠错通用量子计算机可能需使用超过\
  \ 10 万个量子比特，以快速解决任意极大复杂度的计算问题。谷歌、IBM、霍尼韦尔、阿里巴巴和亚马逊的通用量子计算机均属于含噪中等规模量子计算机类别，其应用范围与全纠错系统相比相对有限。\n\
  \n```\n![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig11_HTML.png](img/505424_1_En_2_Fig11_HTML.png)\n\
  ```\n\n图 2-11\n\nIBM 五量子比特特内里费量子处理器的架构设计。其核心是五个容纳电荷量子比特的超导岛。这些量子比特可通过波导谐振器相互作用，从而促进叠加与纠缠量子比特态的形成。读出与控制触点则用于电荷量子比特的初始化和测量。\n\
  \n最早的一个系统是图 2-11 中所示的 IBM 五量子比特特内里费 QPU。该系统由五个容纳超导电荷量子比特的岛组成。这些量子比特与在`波导谐振器`内传播的单光子发生强相互作用，从而促进相连岛上两个超导电荷量子比特之间的叠加与纠缠。^(⁴³)\
  \ 尽管这一早期器件设计实现了多项原理验证实验，但因其量子比特-光子相互作用难以实现高保真度和高质量控制，最终被证明噪声较大，不太适合大规模实现。\n\n因此，科学家们开发了第二种通用量子计算机的方法，即利用库珀对集合（而非单个库珀对）来编码超导电荷量子比特。这些`transmon\
  \ 量子比特`不易发生退相干[61, 62]，并且能够实现更大的多量子比特系统。它们通常被实现在一种称为`门模型超导电路`[63, 64]的器件架构上。\n\n\
  ```\n![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig12_HTML.png](img/505424_1_En_2_Fig12_HTML.png)\n\
  ```\n\n图 2-12\n\n谷歌 Sycamore QPU 的架构设计——为简化起见，整体布局从 54 个量子比特缩减至 8 个。一个由十字形超导岛组成的二维阵列容纳着\
  \ transmon 量子比特，这些量子比特可通过一组耦合器实现量子力学隧穿相互作用。特殊的初始化端口便于将库珀对注入岛中。基于叠加与纠缠的量子逻辑门通过微波脉冲实现，分别用于单量子比特门和多量子比特门的实现。\n\
  \n\n\n## 排版后的内容\n\n迄今为止，在此领域最受欢迎的设备是谷歌的 54 量子比特“悬铃木”`QPU`，它由美国及全球顶尖量子物理学家约翰·马蒂尼斯领导的研究团队开发，并于\
  \ 2019 年底向公众展示。其主要的设备架构示意性地展示在图 2-12 中，为简化起见已缩减为 8 个量子比特。^(⁴⁴) 与其他任何`QPU`一样，“悬铃木”处理器安装在稀释制冷机的底部，并在低温环境下运行。该设备包含一个由十字形超导岛组成的二维阵列，总共可容纳\
  \ 54 个传输子量子比特。不同的岛之间通过总共 88 个耦合器（每个岛有 4 个约瑟夫森结）相互连接，使得传输子能够在岛之间进行量子力学隧穿，从而实现叠加和纠缠。不同的量子逻辑门通过微波脉冲实现，这些脉冲驱动单个或多个量子比特的自旋翻转过程。对于单量子比特门，这一过程大约需要\
  \ 25 纳秒，对于多量子比特门则需要 12 纳秒。\n\n2019 年底，“悬铃木”`QPU`引发了争议性讨论，当时谷歌声称其芯片有史以来首次实现了量子霸权\
  \ [3]，因此能够以远超经典多核超级计算机的速度解决某个计算问题。“量子霸权”一词由加州理工学院的物理学家约翰·普雷斯基尔于 2012 年提出，他将量子霸权定义为执行“[……]使用受控量子系统完成的任务，超越了传统数字计算机所能达到的水平”\
  \ [65]。自那时起，实现量子霸权被认为是迈向世界首台通用量子计算机之路上的一个核心里程碑。^(⁴⁵) 然而，谷歌的声称需要审慎地理解，因为他们解决的是一项高度专门化的计算问题。概括而言，位于加州山景城谷歌研究院的约翰·马蒂尼斯研究团队在短短\
  \ 200 秒内生成了一串纯随机数，并声称经典计算机完成同样任务需要超过 1 万年。IBM 的科学家很快反驳说，经典计算机仅需 2.5 天即可完成，这便将谷歌的成就降低到了展示量子“优势”的层面。此外，IBM\
  \ 认为该问题是故意挑选出来并经过“定制”的，仅仅是为了演示量子霸权。生成随机数对经典计算机来说本质上极其困难，这也是为什么经典计算机生成的随机数被准确地称为“伪随机数”，但对量子计算机来说却相当容易，因为量子力学固有的概率随机性。IBM\
  \ 科学家提出的另一个论点涉及量子霸权本身。他们认为这个概念总体而言意义不大，因为并非每个量子算法都有等效的、能够解决相同计算任务的经典算法——因此无法进行严格比较。\n\
  \n基于此，IBM 提出了一种由其研究团队于 2018 年开发的新的性能衡量标准，该标准允许对量子计算机进行更具代表性的比较。这种衡量和比较量子计算机性能的指标被称为`量子体积`\
  \ [66]，它考虑了相干时间、错误率和其他参数来评估量子计算机的整体性能 [67]。`量子体积`这一性能指标尚未被科学界广泛采用。然而，大多数研究人员认同，只有当量子计算机利用叠加和纠缠作为计算资源来并行化不同计算步骤时，它才能超越经典计算机。^(⁴⁷)\
  \ 因此，任何未运用这些量子效应的设备都不应被视为通用量子计算机。从技术角度来看，谷歌的霸权声明无疑是一个里程碑，因为此前没有一家公司能够在一个`QPU`中成功构建并控制如此大量的传输子量子比特。“悬铃木”处理器已通过谷歌的云计算服务开放使用，因此在工业领域具有广阔的应用前景。\n\
  \n2020 年年中，与美国科技巨头霍尼韦尔合作的，由超过 100 名科学家、工程师和软件开发人员组成的团队展示了另一种非常有前景的通用量子计算机设备设计 [36]。他们的`QPU`设计被称为`离子阱量子电荷耦合器件`，能够约束一个一维离子链，这些离子悬浮在微芯片架构上方，类似于保利阱中的离子链。霍尼韦尔的设备使用镱-171\
  \ 离子作为量子比特，并使用钡-138 离子进行协同冷却。^(⁴⁸) 离子量子比特（电荷态和运动态）可以通过安装在微芯片上的超过 198 个薄电极进行控制，该微芯片大小约\
  \ 1 厘米，其图像可参见例如文献 [71]。自 2020 年底起，霍尼韦尔的量子计算机已通过微软的`Azure Quantum`云计算服务投入商用。\n\n\
  ## 2.3.2 当前的商业应用\n\n多年来，量子计算机最大的客户一直是大型政府机构，例如军方和情报部门，这些机构至今仍是该领域最重要的公共科研资助方之一。他们最初对此产生浓厚兴趣，要追溯到美国数学家彼得·肖尔的开创性工作\
  \ [72]，他在 1994 年设计了一种著名的量子计算算法，该算法可能被用于破解网络安全密码。随着后续几年更多算法的发展，例如用于搜索大型非结构化数据库的`Grover\
  \ 算法` [73]、用于求解线性方程组的`HHL`算法 [74]以及其他算法 [75]，研究的重心已转向私营部门中越来越多的应用领域。\n\nIBM 是率先顺应这一趋势的公司之一，它开始将量子计算应用于现实商业问题\
  \ [76]，随后 D-Wave Systems、Google 和 Microsoft 也很快跟进。与众多较小的初创公司（如 `IonQ`、`Zapata Computing`、`Rigetti\
  \ Computing` 和 `Quantum Motion`）一起，他们在过去几年中大力推广这项技术，并且大多数量子计算机已通过按需提供的云计算服务投入商用。\n\
  \n\n\n"
- '# 当前商业应用：模拟、建模与优化


  模拟、建模、优化与采样，很可能是当今量子计算机被引用最多的应用领域，因为它们利用固有的量子并行性，在经典超级计算机中实现了运行时间的优势。当前的商业应用范围涵盖多个工业领域。其中最重要的列举如下：


  ## 汽车行业


  全球最大的汽车制造商德国大众汽车集团，于 2017 年开始探索量子计算在业务中的应用，与 D-Wave Systems 建立了多年合作伙伴关系。此后，大众在其慕尼黑的`Data:Lab`和旧金山的`CODE
  Lab`中，一直将此技术应用于不同的业务问题。一个试点项目旨在模拟交通拥挤城市的车流[77–80]，这是城市交通规划和避免拥堵、实现最短行程时间导航的先决条件。此类量子计算服务未来或许会在汽车云中运行，以便与道路上的全互联（自动驾驶）车辆共享关于最短路径的导航信息。


  另一家正在探索量子计算的德国汽车制造商是宝马，该公司也与 D-Wave Systems 建立了合作伙伴关系，旨在优化其生产线中的机器人[81]。在大众和宝马与
  D-Wave Systems 合作的同时，戴姆勒与谷歌[82]和 IBM[83]建立了合作关系，以探索材料科学和化学领域的应用，包括为纯电动汽车模拟下一代电池。更多汽车应用在文献[84]中有所描述。


  ## 航空航天与国防


  洛克希德·马丁公司在 2010 年底购买了 D-Wave Systems 的第一台量子退火机，并自那时起不断升级其系统。他们的主要应用领域似乎是软件开发，包括软件调试以及软件验证和确认过程的优化[85]。D-Wave
  Systems 的另一客户是美国国家航空航天局（NASA），后者目前正在位于加利福尼亚州山景城硅谷心脏地带的艾姆斯研究中心的 NASA 高级超级计算设施中运行一套
  2000Q 系统。他们的量子计算机已用于解决航空、地球与空间科学以及太空探索任务中的复杂优化问题[86]。美国航空航天巨头空中客车公司最近与 IBM 合作，将量子计算应用于飞机机翼的气流建模[87]——这是另一个此前由经典超级计算机处理的典型优化问题。


  ## 化工、制药与医疗保健


  量子计算也已进入化工和制药行业。例如，美国跨国公司陶氏化学公司于 2017 年与加拿大量子计算软件初创公司 1QBit 达成了多年协议。根据他们的新闻稿，陶氏和
  1QBit 旨在通过合作“开发用于化工和材料科学技术领域的量子计算工具”[88]——该协议的其他条款迄今尚未披露。由于 1QBit 仅开发用于量子计算硬件的通用算法，它已与微软、IBM、富士通和
  D-Wave Systems 建立了不同的硬件合作伙伴关系。


  1QBit 于 2016 年还与美国生物技术公司百健达成了协议[89]。他们与总部位于爱尔兰的专业服务公司埃森哲合作，利用量子计算机的模拟能力，更好地攻克阿尔茨海默病和多发性硬化症等疾病。


  通过与 D-Wave Systems 和 Rigetti Computing 合作，总部位于旧金山的药物设计初创公司 Menten AI 利用合成生物学和量子计算来创造基于蛋白质的新药物[90]。为此，Menten
  AI 采用基于混合经典量子计算方法的两步药物开发流程。第一步涉及在经典计算机上运行不同的机器学习算法，并试图创建一种新型蛋白质和潜在药物的化学结构（生物学上称为一级结构），这种药物能够结合并操控人体内的病变细胞——我们将在第
  4.4.6 节更详细地讨论人工智能应用时，研究这种特定的药物开发机器学习方法。在第二步中，Menten AI 的研究人员利用量子计算的计算能力，计算新型蛋白质通过称为能量最小化的化学过程自然折叠成的三维形状。由此产生的三维蛋白质结构在生物学上称为四级结构，它关键地决定了该蛋白质的医学特性，并作为进一步迭代优化的重要先决条件。Menten
  AI 的混合经典量子计算方法，是新兴跨学科研究领域的一个绝佳范例，该领域最近被称为*量子机器学习*。这种量子计算与人工智能激动人心的融合，通过将最初在经典计算机上执行的、给定问题或算法中的计算密集型子程序外包给更快的量子计算机或退火机，从而提高了计算速度、效率和准确性。


  全球最大的制药和诊断公司 F. 霍夫曼-罗氏公司最近宣布了一项学术合作，“与牛津大学的三名博士生合作，他们将应用量子计算机模拟，例如计算分子的能量”[91]。在
  400 万美元种子资金的支持下，总部位于多伦多的生物技术初创公司 ProteinQure 最近与量子计算领导者（例如 IBM、微软和 Rigetti Computing）以及制药研究机构（包括阿斯利康和
  SRI International）合作，探索将量子计算用于蛋白质的分子模拟。他们的研究很可能为基于靶向特定医学用途而设计的蛋白质的高产计算药物设计铺平道路。




  **材料**：由于量子计算机非常适合模拟不同材料中复杂的化学相互作用，许多公司正利用量子计算机来优化其产品开发流程。我们此前已讨论过戴姆勒、IBM 与谷歌合作模拟高压电池的电池化学特性。另一项类似的合作则见于日本工业巨头三菱化学与
  IBM，它们共同应用量子计算来模拟锂空气电池中的分子动力学[92]——这类电池可能在未来几年内部分替代纯电动汽车中高度易燃的锂钴电池。德国一级汽车零部件供应商博世[93]与美国工业集团霍尼韦尔[94]是该行业的另外两个案例，它们也正在应用量子计算，基于量子材料建模来创造全新产品。


  **金融、银行与保险**：投资银行与保险公司也很早就开始探索量子计算，并评估其与自身业务的相关性。最早采用者之一是美国乃至全球最大的银行摩根大通，它最近与 IBM
  建立了合作关系，随后巴克莱银行和西班牙对外银行也相继加入[95, 96]。据报道，它们正在测试多种算法，用于投资组合优化、金融工具（包括资产、债券、股票、期权和衍生品）的估值与定价[97]、金融风险分析、市场模拟、交易结算以及欺诈检测。高盛也决定投资并探索这一数字技术，近期与位于加州帕洛阿尔托的美国
  QC Ware 公司建立了合作关系[98]。量子计算在金融领域的更多示例和潜在应用可参见文献，例如[99]。


  **电子**：半导体与电子行业也在投资量子计算。一些公司，如英特尔或阿里巴巴，决定自行研发量子处理单元，而另一些公司则与量子计算领域的初创公司和老牌企业合作。例如，韩国三星集团旨在利用不同的量子模拟工具，优化用于显示器、半导体芯片和电池的各种材料。为此，他们于
  2019 年开始与位于马里兰州大学园区的美国量子计算硬件与软件公司 IonQ 合作[100]。


  **能源**：由于量子计算在广泛优化问题上的巨大潜力，美国跨国石油天然气公司埃克森美孚决定成为首家加入 IBM Q 网络[101]的能源公司。IBM Q 网络是一个由财富
  500 强公司、初创企业、学术机构和国家研究实验室组成的全球性社区，致力于推动量子计算发展并探索其在科学和商业领域的实际应用。根据其 2019 年的新闻稿，埃克森美孚希望“解决跨多种应用的计算难题，包括优化国家电网的潜力、进行更具预测性的环境建模，以及通过高度精确的量子化学计算来发现新材料以实现更高效的碳捕集”[101]。


  ### 当前商业应用：网络安全


  除模拟、建模、优化和采样外，网络安全是量子计算机的另一个主要应用领域。它与肖尔算法——有史以来第一个为量子计算机设计的算法——密不可分。1994 年，彼得·肖尔描述了如何使用通用量子计算机，在极短的时间尺度内将一个大的自然数分解为其质因数^(⁴⁹)
  [72]。这种*质因数分解*的一个例子是将十进制数 29,469 分解为质数 3、11、19 和 47 的乘积，即 29,469 = 3 ⋅ 11 ⋅ 19 ⋅
  47。虽然计算等式右边的质数乘积很容易，但反过来通过一组未知质数来均分 29,469 却极其困难。这种计算难度上的“不对称性”正是当今用于保障全球通信基础设施安全的绝大多数加密方案和网络安全代码的核心。


  迄今为止，使用最广泛的网络安全代码是所谓的*随机随机吸收算法*，简称`RSA`。在当前版本中，该算法使用一个随机选择的 2,048 位二进制数来加密数字信息。对于一封使用`RSA-2048`方案加密的电子邮件，恶意第三方需要尝试`2^(2,048)`种零和一的可能组合，才能找到正确解码该消息的
  2,048 位数字——这是一个拥有 617 位数字的难以置信的巨大数字。一台时钟频率为 1 太赫兹的经典超级计算机（实际上大多数个人电脑的时钟频率要低 1,000
  多个数量级）每秒可完成 1 万亿次操作，解决这个问题大约需要 300 万亿年。正因如此，如果你的电子邮件服务提供商使用`RSA-2048`方案来保护你的信息，你大可以感到相当安全。


  面对这种安全性，彼得·肖尔证明了一台通用量子计算机——在他发表论文时仍是一种假设性设备——能够在令人惊叹的约十秒时间内破解`RSA-2048`代码。^(⁵⁰)这种计算时间的指数级缩减，展示了使用通用量子计算机相比经典计算机所获得的巨大计算能力提升。在恶意第三方手中，量子计算机可能被用来运行肖尔算法，造成重大安全漏洞，并通过破坏互联网、国家防御系统以及其他对社会和政府至关重要的系统，危及数字通信安全。现在你可以想象，例如美国国家安全局的网络安全官员在听到通用量子计算机可能带来的这种威胁时，会作何感受。然而，随着时间的推移，人们逐渐形成了广泛共识：在未来几年内，包括彼得·肖尔提出的算法在内的高级量子算法仍将超出当前嘈杂中型量子计算机的能力范围，正因如此，最初的网络安全担忧才得以逐渐缓解。




  #### 当前商业应用：量子密码学


  面对量子计算机带来的网络安全威胁，另一个好消息是：量子信息处理本身提供了一种恰当而强大的技术，可用于采取有效对策来提升网络安全。这一激动人心的研究领域被称为*量子密码学*，它本身与量子计算并无直接关联，但同样利用量子比特（qubits）来编码信息，并借助叠加态和纠缠等量子资源进行处理。量子密码学在工业领域有着多种应用，因此值得简要提及与介绍。量子密码学专注于以量子比特编码的信息交换，而量子计算则侧重于用量子逻辑门处理这些信息。例如，政府机构和银行正越来越多地使用它来安全地远距离交换高度敏感的信息，比如机密的产品或客户数据。


  量子密码学的基本思想源于美国物理学家斯蒂芬·威斯纳的开创性工作。他在 1983 年展示了如何通过将信息编码在由光子偏振态形成的*光学量子比特*中，进行光学传输
  [102]。一年后，分别就职于 IBM 托马斯·J·沃森研究中心和蒙特利尔大学的两位物理学家兼计算机科学家——查尔斯·贝内特和吉勒·布拉萨德——完善了这一方案，并提出了一种具体的安全信息传输方法
  [103]，该方法后来被命名为`BB84`编码方案以纪念他们。在其最广为人知的版本中，该方案涉及两方，传统上称为“爱丽丝”和“鲍勃”，他们希望安全地共享一条消息，而第三方“伊芙”则试图窃听并获取消息中包含的信息。在不深入细节的情况下，`BB84`方案依赖于量子力学的一个固有特性：对量子比特的任何测量都会导致其整体波函数坍缩，从而改变其状态。一旦伊芙试图窃听交换中的量子比特，她最终将不可逆地改变编码信息——因此，由于量子力学奇特的性质，她的窃听企图注定会失败。这个例子表明，如果你知道如何利用量子效应，它们会非常有用。


  ### 2.3.3 未来挑战


  量子计算机已被应用于广泛的商业领域。目前所有最先进的量子计算机都是嘈杂中型量子计算机（noisy intermediate-scale quantum computers）或`NISQ`系统，通用的量子计算机尚未实现。因此，该领域的研究人员继续寻找创新的量子比特实现方案和设备，以提供更长的退相干时间和更好的可扩展性，从而偶尔能构建大规模、容错的通用量子计算机。


  微软一直在研究一种非常有前景的方法来构建此类系统，这种方法有时被称为*拓扑量子计算* [104, 105]。拓扑学是数学的一个分支，描述了几何物体在特定变形（如弯曲、拉伸、扭曲而不撕裂或粘合）下保持不变的性质。当应用于量子计算时，拓扑量子比特是类似粒子的物体——即所谓的*任意子*——它们产生于大量电子集群内部的相互作用。这种电子集群通常形成于二维平面内两种材料的界面上，并允许拓扑量子比特在这个所谓的*二维电子气*中跨越多个电子态延伸。这使得它们对环境变化和噪声引起的退相干具有极强的鲁棒性，这就是俄裔美国物理学家阿列克谢·基塔耶夫在
  1997 年首次建议将其用于量子计算的原因 [106]。他的工作基于对这种奇异物质态的理论研究，该研究可以追溯到三位英国出生的诺贝尔奖得主物理学家：迈克尔·科斯特利茨、大卫·索利斯和邓肯·霍尔丹
  [107]。*马约拉纳粒子*，一种由意大利物理学家埃托雷·马约拉纳于 1937 年首次假设的特定类型任意子，最近也被提议用于量子比特。它们已在一维碳纳米管和二维石墨烯片中被观测到，这两种非常有前景的材料很可能适用于拓扑量子计算的物理实现。




  与其致力于建造一台可能在几个世纪后才能实现的、通用的、完全纠错的量子计算机，许多研究人员转而专注于利用当今可用的、有噪声的小型量子计算机所能完成的任务。各种策略已被开发出来，并正处于深入研究中。一项特别有前景的策略于
  2014 年提出，称为`variational quantum eigensolver`（变分量子本征求解器）[108]，该方法利用经典计算机来迭代优化对噪声量子计算机的猜测。量子力学猜测可能涉及旅行商的最短路线、空气动力学机翼的最佳形状，或基于蛋白质的药物中分子的三维排列。一旦经典计算机确定了其最佳猜测，结果将被反馈给量子计算机，后者通过采样来搜索附近更优的选项。此迭代过程持续进行，直到找到最优解。这是一种处理当前最先进量子计算机噪声特性的非常便捷的方式，尤其是考虑到科学家们如果仅依靠经典计算机进行模拟，将不得不做出颠覆性的近似。一种类似的方法，称为`variational
  quantum factoring`（变分量子因式分解），已被开发用于在`NISQ`硬件上分解大数[109]，但这条路径尚未在物理上实现。通过在同一台有噪声的量子处理器上多次运行相同的程序，同时仔细观测噪声的系统性影响，可以从这两种变分方法中获得的结果进一步优化。专家随后可以估算出在没有噪声的情况下会得到的结果，这一过程被称为`quantum
  error mitigation`（量子错误缓解）。这种方法对于量子化学模拟看起来尤其有前景，最近纽约州约克镇高地的`IBM Thomas J. Watson
  Research Center`的一个团队在一个 4 量子比特系统上进行了此类模拟[110]。


  量子计算难道不是一项令人兴奋的数字技术吗？尽管它仍处于`Gartner`技术成熟度曲线的前半段，尚未完全成熟，但先前的例子表明，众多公共和私营组织已成功将这项技术应用于广泛的领域。量子计算可用于加速复杂计算、模拟和建模新材料，以及优化不同的业务流程、产品和服务。量子计算还促进了从计算机科学、物理学、数学、化学到材料科学等一系列科学学科的融合，这可能对其他数字技术也有裨益。然而，现在判断量子计算是否会成为第`1.2`节所述意义上的通用技术还为时过早。但毫无疑问，对于某些特定用例，量子计算可以成为一种有价值的技术。它通过提供一种高效且极快的信息处理方式，推动了组织的数字化转型。


  请记住，购买和运营一台自己的量子计算机对你来说不太可能是一个可行的选择，因为这需要大量的资金以及各种技术人员和其他专家来操作这些机器。因此，通过云服务提供商按需访问量子计算服务将是你最可行的选择。然而，如果你希望基于这项数字技术长期建立新的收入来源，从战略角度考虑，购买自己的系统可能是有意义的。


  ## 2.4 关键要点


  *   经典计算机根据二进制代码，基于经典比特（0 和 1 的序列）对信息进行编码和处理。

  *   量子计算机用量子比特（或称为`qubits`）来编码信息。与经典比特不同，量子比特可以通过叠加和纠缠这两种量子力学效应相互关联，从而允许同时探索一个计算问题的多种不同解决方案。由于这种量子并行性，与经典计算相比，量子计算在计算能力和速度上提供了指数级的提升，这也是它有时被称为下一代超级计算的原因。

  *   量子计算机有三种不同类型，即：(1) 量子退火机，(2) 量子模拟器，以及(3) 通用量子计算机，每种类型都适用于特定范围的用例和应用。

  *   大多数商用量子计算机采用超导量子比特，这些量子比特被限制在相互连接的超导区域（岛和环）中，并保持在低温温度下。例如，`D-Wave Systems`、`Google`和`IBM`就采用这种量子比特实现方案。

  *   由于其相对较大的宏观尺度，超导量子比特对其所在环境的热、机械和电学波动非常敏感。这些量子波动会引发不同的退相干机制，导致存储在量子比特中的量子信息衰减。这就是为什么当今所有量子计算机都属于含噪声中等规模量子计算机类别的原因。

  *   通过重复某些计算步骤并对获得的结果取平均值，可以减少退相干引起的错误。在这种量子纠错方案中，统计上最频繁的结果对应于相应计算问题的正确解。

  *   量子计算是一种非常通用的数字技术，它能够缩短涉及计算密集型优化问题或大量模拟与建模阶段的产品和服务的开发时间。

  *   除了在学术研究中的应用，量子计算机已广泛应用于众多行业，包括金融、制药、化学与材料、能源、汽车、航空航天以及国防。




