- '# 第四章：“人工智能”


  在本章中，你将初步了解人工智能——这一推动数字化转型的最为多才多艺的数字技术。在学习了其激动人心的发展史（包括 IBM 传奇性的研究项目 `IBM Deep Blue`
  和 `Watson`）之后，我们将把焦点转向当今最先进应用中所采用的不同子类别和学习策略。在此背景下，你将了解到监督学习、无监督学习和强化学习。你还将了解到我们人类大脑与人工神经网络之间的相似性，后者通过软件模拟人类智能的各个方面，并且是新兴且日益流行的深度学习领域的核心。此外，本章还会涵盖人工神经网络最重要的子类别，包括推荐系统以及卷积神经网络、循环神经网络和生成对抗神经网络。最后且同样重要的是，我们将仔细审视一些重要且同样鼓舞人心的人工智能应用案例，例如亚马逊的`Just
  Walk Out`购物技术、特斯拉和 Waymo 的自动驾驶系统、苹果的`Siri`虚拟助手、谷歌的自然语言处理与翻译系统、`Benevolent AI`的药物研发方法、彭博的新闻分析平台、`摩根大通`的智能定价算法，以及`贝莱德`名为`“阿拉丁”`的精妙投资网络。


