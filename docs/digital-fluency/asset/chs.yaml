  \ Azure | 用于简化交易和数字支付的开源智能合约平台 |\n| `Voltron` | `r3`、`Crypto BLK`、`贝恩公司` (`Corda`)、盘谷银行、西班牙对外银行、法国巴黎银行、中国信托商业银行、汇丰银行、国民西敏寺银行、加拿大丰业银行、瑞典北欧斯安银行\
  \ | 信用证数字化 |\n| `we.trade` | `IBM` (`Hyperledger`)、德意志银行、凯克萨银行、德国商业银行、奥地利第一储蓄银行、汇丰银行、比利时联合银行、法国外贸银行、北欧银行、荷兰合作银行、桑坦德银行、法国兴业银行、瑞银集团、意大利联合信贷银行\
  \ | 由银行支持的贸易融资区块链平台 |\n\n### 3.3.3 更多应用场景\n\n区块链技术还被提出用于一些尚未实施的场景。其中大部分涉及现代社会的核心领域，例如政府服务、法律和医疗保健。以下简要介绍最重要的潜在应用场景。\n\
  \n\n\n### 潜在应用场景：政府服务\n\n现代政府提供种类繁多的公共与民用服务，涉及多个官方机构，包括市政厅登记处、社会福利机构，以及援助和税务部门。根据您的具体国家和城市，与这些服务相关的官僚流程和内部运作可能相当繁琐，且整体运营成本高昂。根据欧盟委员会最近发布的一份报告，`区块链`技术非常适合应用于此类政府生态系统，因为它“[...]可以减少官僚主义，提高行政流程效率，并增强公众对公共记录保存的信任度”[48]。正因如此，`区块链`技术及其促进不同公共机构、公民和经济主体之间直接、可信交互的能力，已经吸引了全球多个政府的关注。目前分别在公共和政府部门推进的`区块链`实验清单可在[49]中找到。\n\
  \n`区块链`技术在政府服务中一个特别有趣的应用是投票。大多数国家仍然通过纸质选票进行政府投票，尽管在我们这个日益互联的社会中，这些本应利用最先进的数字技术在线完成。但由于对安全和数据保护的担忧，这种电子投票或`e-votings`至今仍受到抵制。`区块链`技术可以通过提供防篡改、不可篡改且透明的投票记录来解决选民欺诈问题。基于`区块链`的电子投票的另一个优势是，人们可以舒适地在家中进行投票，这有望提高投票率，同时显著减少政治冷漠。\n\
  \n另一个非常流行的应用是数字身份，它有时可以替代政府签发的身份证，并授权访问各种政府在线服务和网站。此处的`数字身份`可以被视为一个代表个人和组织的个人信息在线记录。目前，这些数据掌握在无数在线平台和移动应用程序手中，包括`Google\
  \ Gmail`、`Amazon`、`Facebook`等。这可能相当成问题，因为运营这些应用的集中式实体越来越容易受到身份盗窃、数据泄露或仅仅是数据滥用的影响。基于`区块链`的数字身份可以通过将数据的控制权和所有权交还给用户和合法所有者来避免这些问题，这种方法有时被称为`自我主权身份`。在这种情况下，个人拥有一个加密的数字中心，可以安全地存储个人可识别信息。此外，它允许个人通过仅在需要时授予访问权限来控制谁可以访问数据。从社会经济学的角度来看，这尤其有趣，因为它将“失去”了数字主权给数字平台和跨国公司的个人，重新置于对其个人数据及其利用的控制之下。`自我主权身份`还可能允许营销人员通过向消费者提供定制优惠和奖励，以换取他们与相应营销人员共享个人信息，从而直接与客户建立更好的关系——营销人员将直接为消费者的关注付费[50]。此外，更重要的是，这种身份可能促进联合国开发计划署雄心勃勃的第\
  \ 16 号目标，该目标旨在到 2030 年“为所有人提供法律身份，包括出生登记”[51]。\n\n### 更多应用场景：法律\n\n另一个前瞻性应用案例是基于`区块链`的`土地所有权登记册`。这样的账本将允许公民向相应的服务大厅、融资机构或公证处提交安全的在线请求，以申请登记或验证土地所有权摘要。一旦该请求获得授权且网络批准了价值转移，相应的机构就可以相应地更新土地所有权登记册上的所有权。此登记册很可能以私有许可型`区块链`网络的形式实施，通过其固有的加密和哈希算法保证所有土地所有权和不动产转移的完整性。与传统的纸质土地所有权管理相比，这种基于`区块链`的解决方案允许公民和机构只需在线检查土地所有权是否合法。当然，这个概念可以应用于任何防欺诈的公证流程，例如涉及存储和验证数字化文件（如合同、婚姻协议和遗嘱）的流程。\n\
  \n`区块链`技术对于管理`知识产权`（IP）权利以及专利律师和法院的业务也具有显著的价值增值，因为它有助于实现一个平台，用于准确记录这些资产的所有权。关于创意或专利的起源和所有权的法律纠纷，可以通过将当事方引向防篡改的`区块链`来轻松解决，该区块链会为上传的数据添加时间戳，并准确指示有争议的创意是在何时由何人记录的。这种实施方案可以为知识产权持有人提供更强的能力，以保护其知识产权资产免受包括专利流氓在内的侵权者的侵害，同时简化所涉及的不同机构和利益相关者的底层行政流程。\n\
  \n### 更多应用场景：医疗保健\n\n记录我们病史（包括任何疾病和手术）的健康记录，可能是关于我们最有价值且同样敏感的个人信息。每当我们咨询医生时，我们必须分享这些信息或至少其中一部分，以便他能够为我们提供有效的治疗或医疗保健解决方案。如今，我们的医疗数据通常包括各种纸质文件，如医疗评估、报告和检测证明，这些文件容易被未经授权的复制和伪造。`区块链`技术可以通过作为一个加密且防篡改的账本，不可篡改地存储患者的这些记录、诊断和药物，来帮助缓解这些问题。该网络可以配备一个精细的权限系统，允许患者单独控制哪位医生可以访问哪些医疗数据。它甚至可用于解决医疗供应链中的假药问题，通过基于在整个价值链和供应链的每个阶段记录的信息来验证药品的真伪。\n\
  \n前面讨论的当前和前瞻性应用案例令人信服地表明，`区块链`技术是一种用途非常广泛的数字技术，可以应用于现代经济和社会的所有部门，以优化现有业务机会并创造新的商机。因此，它是推动公共和私营组织数字化和数字化转型的绝佳工具。\n\
  \n\n\n### 3.4 关键要点\n\n*   区块链是一种分布式账本技术，也是一种现代化的记账方式，可用于存储数字信息。其底层数据结构具有不可篡改、仅可追加、可追溯、可信赖、防篡改、可扩展、自我调节、有序且安全的特点。\n\
  *   区块链技术允许任意两方或多方在不依赖中介的情况下达成协议、进行交易、转移价值、验证身份、建立信任，并执行其他对当今商业活动至关重要的管理任务。例如，这些任务包括交易、签约、清算、结算、记录保存，以及借入、存储和出借有价值的数字资产。\n\
  *   区块链技术建立在多种支持性技术之上，例如分布式点对点网络、加密哈希函数、默克尔树、数字签名和公钥密码学。\n*   通过提供单一的事实记录，区块链独特的数据结构在不可信的环境中部署了信任机制，允许互不相识、互不信任的人们在没有任何第三方中间人或中介的情况下进行交易。这就是为什么区块链技术有时被称为“终极信任机器”。\n\
  *   这种交易通常涉及具有货币或非货币价值的数字信息的转移。区块链交易中的信息通常存储在币（数字货币）或代币（数字资产）中。\n*   区块链技术在公共和私营部门都有广泛的应用。最流行的应用是加密货币，例如比特币和以太坊。比特币的交易过程按七个步骤组织：（1）形成交易消息，（2）广播交易文件，（3）通过比较数字签名授权交易，（4）汇集交易并形成区块，（5）广播新区块，（6）通过工作量证明验证新区块，（7）将该区块添加到区块链文件中。\n\
  *   除了加密货币和众筹之外，区块链的应用还包括交易和支付服务、供应链管理系统、反欺诈检测、交易平台、身份和声誉管理、保险和风险管理，以及包括公证、审计和税务服务在内的政府服务。\n\
  \n### 3.5 区块链技术框架\n\n您是否正在考虑在您的组织中使用区块链技术，或将其应用于您的特定用例？如果以下实施清单中大多数关键问题的答案是“是”，那么区块链技术很可能有助于您实现自己的商业构想或用例。\n\
  \n1.  您的用例是关于什么的？您的用例是否属于以下通用类别之一？ 是 □ 否 □\n    *   审计\n    *   资产跟踪\n    *   价值交易\n\
  \    *   加密货币\n    *   身份管理\n    *   业务流程自动化\n    *   所有权/作者身份证明\n2.  是否存在可以很好自动化的现有业务或交易流程？\
  \ 是 □ 否 □\n3.  在您的流程或价值链中，是否存在多个可信或不可信的利益相关方？ 是 □ 否 □\n4.  是否存在一个通常负责协调不同数据（即对账）的中心化中间人或信任中心？\
  \ 是 □ 否 □\n5.  是否存在货币或非货币的价值转移？ 是 □ 否 □\n6.  实施不可变的记录或登记册是否有价值？ 是 □ 否 □\n7.  您的业务或内部流程是否需要高水平的数据完整性，或者是否能从中受益？\
  \ 是 □ 否 □\n8.  实施您的构想所需的数据是否非常宝贵且独特？外部人员是否有（经济）动机去破坏或歪曲这些数据？ 是 □ 否 □\n9.  您是否具备在组织中应用区块链技术所需的所有人力资源（例如，项目经理和代码编写人员）？\
  \ 是 □ 否 □\n\n规划实施时需考虑的更多问题：\n*   在实施您的区块链时，您需要遵守哪些监管框架？\n*   您的用例是允许使用公有区块链，还是需要私有部署？\n\
  *   该区块链能否集成到您现有的 IT 基础设施中，还是需要额外的计算资源？\n*   谁需要运行和维护不同的节点？\n*   预期谁会使用该应用程序，他们有什么期望？\n\
  \n### 3.6 延伸阅读\n\n在本章末尾，如果您想更深入地了解区块链技术及其应用，我想为您提供一些延伸阅读的建议：\n\n*   Drescher, D.：《区块链基础：25\
  \ 步非技术性入门》。Apress 出版社（2017 年）。\n*   Shrier, D. L.：《区块链基础：它是什么以及将如何改变我们的工作和生活方式》。Robinson\
  \ 出版社（2020 年）。\n*   Bashir, I.：《精通区块链（第二版）：分布式账本技术、去中心化和智能合约详解》。Packt 出版社（2018 年）。\n\
  *   CoinDesk. [`www.coindesk.com/tag/blockchain-reports/`](https://www.coindesk.com/tag/blockchain-reports/)\n\
  *   Cointelegraph. [`www.cointelegraph.com/`](https://www.cointelegraph.com/)\n\n\
  \n\n"
- "# 4. 人工智能\n\n人工智能（`AI`）是本书介绍的最具多功能的数字技术，也是当今媒体中最常使用的流行语之一。它常与机器学习、神经网络、大数据和深度学习等相关术语一同使用，这些内容我们也将在这章中讨论。我们将看到，人工智能在现代商业和社会的各个领域都提供了广泛的应用。\n\
  \n与量子计算和区块链技术不同，人工智能不需要任何昂贵的硬件和昂贵的 IT 基础设施，因为它的大部分优势已经可以在合理的时间范围内，通过现有的计算硬件和开源软件实现。这就是人工智能成为推动数字化转型最流行的数字技术的原因。在过去的几年里，它几乎已经渗透到所有行业，因此两位美国经济学家埃里克·布林约尔松和安德鲁·麦卡菲正确地指出：“我们这个时代最重要的通用技术是人工智能”[2]。根据麦肯锡公司的预测，到\
  \ 2030 年，人工智能将创造 13 万亿美元的 GDP 增长[1]，其中大部分将来自非互联网行业，例如制造业、能源、农业和物流。但是，即使其经济和社会意义无可争议，其运作方式和能力仍然普遍被误解。虽然高管们常将其视为我们时代最重要的颠覆性技术，但员工们则经常担心它会破坏就业，并因此对它嗤之以鼻。\n\
  \n本章将帮助你屏蔽所有这些噪音，理解人工智能的基本运作原理和最重要的应用。我们将首先回顾这项激动人心的技术的丰富历史，并着重介绍最重要的历史里程碑和研究项目。这一回顾将表明，人工智能是机器学习和深度学习这两个子类别的总称，每个子类别都有特定的用例和应用。我们将讨论人工神经网络作为深度学习以及其他一些强大概念的组成部分，这些概念目前仍是全球学术研究的重点。在本章的第二个部分，我们将审视这项技术的机遇与局限，并了解其最重要的用例和应用，范围从艺术和工业设计，到药物发现，再到自动驾驶。与前两章类似，本章也会为你提供一个易于使用的框架，让你能够评估人工智能是否可能为你自己的用例或应用（你在阅读本书时可能心中已有想法）增加价值。\n\
  \n## 4.1 设定人工智能的背景\n\n在我们深入探讨这项迷人数字技术的波澜壮阔的历史之前，退后一步并问问自己，我们实际上会如何定义与人工智能相对的**自然**或**人类**智能，这是有益的。对于这类语言问题，《牛津学习词典》总是一个好顾问，它将智能定义如下：智能是“学习、理解并以逻辑方式思考事物的能力；以及做好这件事的能力。”人工智能的相应定义是：“一个研究如何让计算机模仿人类智能行为的研究领域。”换句话说，人工智能模仿人类行为，使机器能够像人类一样推理和行动。这就是为什么科幻小说将类人机器人和自主机器人的到来设想为未来一个可怕的景象。从历史上看，科幻小说对于理解新技术对商业和社会的影响及意义一直至关重要。因此，人工智能及其前身概念在科幻文学中引起了极大关注也就不足为奇了，例如在俄裔美国生物化学家、作家艾萨克·阿西莫夫于\
  \ 1950 年出版的有影响力的故事集《*我，机器人*》中。你可能也知道 2004 年由二十世纪福克斯发行的这部小说的传奇大片改编版。广阔的前景和巨大的潜力是人工智能被研究数十年并仍然是现代计算机科学和信息技术中最深奥的课题之一的两个主要原因。\n\
  \n由于人工智能旨在模仿人类的智能行为，简要了解一下我们的大脑如何处理信息是有益的。我们的大脑由超过 860 亿个神经细胞组成，即所谓的*神经元*，它们相互连接形成一个非常庞大的*神经网络*。神经元处理由我们的感觉器官（例如检测光线的眼睛或感知声波的耳朵）产生的电信号中编码的信息。我们看到的光和我们听到的声音会触发某些化学反应，从而产生电信号。^（^（82））^\
  \ 然后，这些信号通过构成我们中枢神经系统的神经束，从我们的感觉器官传递到我们的大脑。神经束是由所谓的*轴突*束组成的，这些轴突由某些专门的神经细胞（即所谓的*施万细胞*）构成，擅长在长距离传输电信号——人类轴突的总长度实际上可以达到一米。神经束末端的*突触终端*将电信号引导至图\
  \ 4-1 中示意性显示的实际神经元中。一旦这个信号的强度达到某个阈值电压——即所谓的*激活电位*——该神经元就被称为“被激活”，并通过其树突和更细的*终末树突*将信息传递给网络中的其他神经元。这些神经元随后会根据它们各自的激活电位被激活或不激活。根据我们感觉器官的某个视觉刺激激活了广泛分支网络中的哪些神经元，我们将这种激活模式与一个具体的物理对象（例如房屋、汽车或书籍）关联起来。我们大脑中这种高度简化的神经网络模型，启发了计算机科学及相关学科的众多研究人员开发人工神经网络，我们将在下文看到这一点。\n\
  \n![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig1_HTML.png](img/505424_1_En_4_Fig1_HTML.png)\n\
  \n**图 4-1**  \n单个神经元的示意图。电信号在左侧被接收，转换为输出信号并沿轴突传送到右侧，终末树突在此处连接到其他神经元（未显示）\n\n\n\n"
- '# 神经生物学与信息论的共生


  人工智能的早期历史与一门诞生于 20 世纪 40 年代、名为控制论的科学学科密不可分。从词源学上讲，这个术语源于希腊语单词 *cybernētēs*，意为舵手、管理者、飞行员或船舵，因此控制论可以被译为“舵手之术”。^(⁸³)
  在科学领域，*控制论*指的是对神经生物学与信息论之间联系的系统性研究。它也常被称为一门基于*反馈循环*来控制和调节机器的科学，类比于生物体通过其感觉器官以及彼此间的社会交流来接收反馈。这一有趣研究领域的先驱是美国数学家兼哲学家诺伯特·维纳，他在
  1948 年将控制论定义为“对动物和机器中控制与通信的科学研究” [3]。尽管他名为《控制论：或动物与机器中的控制与通信》的著作是一部充满复杂数学方程的学术性作品，但它一经出版便立即成为畅销书，并登上了《纽约时报》畅销书排行榜。控制论最重要的任务之一是实现过程的自动化，包括复杂系统中的自我调节。控制论后来衍生出了“赛博”这一缩写词，如今它被用作与计算机创造的虚拟现实相关的各种语境中的前缀，例如赛博空间和赛博安全。


  最早的控制论模型之一由美国神经生理学家沃伦·麦卡洛克和逻辑学家沃尔特·皮茨于 1943 年提出 [4]，该模型常常与当时弗洛伊德心理学的传统观念相悖，并因此被称为*麦卡洛克-皮茨神经元*
  [4]。该控制论模型最基本的版本如图 4-2 所示。它处理两个二进制输入值，记为`x[1]`和`x[2]`，将其相加，并提供一个二进制输出值，该值可以是 1 或
  0，取决于输入之和`x[1] + x[2]`是否等于或大于某个阈值，该阈值是一个整数，记为`t`。类比于生物神经元，这个阈值对应于激活电位，并决定一个神经元是否被激活。如果你回顾表
  1-1 中 AND 函数的真值表，就不难验证阈值`t = 2`的麦卡洛克-皮茨神经元代表了一个经典的逻辑与门。其他经典逻辑门可以通过相应调整阈值来实现。这个控制论模型与生物神经元之间的相似性惊人：两种神经元都处理多个输入，并根据特定的阈值将其转换为单一输出。这种类比表明，我们大脑的基本运算可以用经典的逻辑门（如与门、或门和非门）来建模，这一点在原则上已经被证实——这难道不令人惊讶吗？


  ## 神经元


  神经元是人脑的基本构建单元。它们是电可兴奋细胞，处理电输入信号并将其转换为电输出信号。机器学习中使用的人工神经元模拟了这种行为，并被用于构建人工神经网络。


  这可能是沃伦·麦卡洛克和沃尔特·皮茨最重要且同样引人入胜的发现，也是他们 1943 年那篇题为《神经活动中内在思想的逻辑演算》的开创性论文能引发全球如此广泛关注的原因
  [4]。1949 年，加拿大心理学家唐纳德·赫布观察到，一个神经元的不同输入不能被同等对待，因为其中一些输入比其他输入更为重要 [5]。因此，他引入了*突触权重*的概念，这一概念后来被称为*赫布理论*。


  早期控制论与信息论的另一个非常重要的贡献来自英国博学家艾伦·图灵，我们在第 1.4.2 节讨论图灵机时就已认识他。1950 年，艾伦·图灵指出，人类利用信息和推理来解决问题并做出决策。因此，他想知道机器是否也能做同样的事情。为此，他在其著名论文《计算机器与智能》
  [9]中提出了构建智能机器的制造手册以及测试其智能的概念。后来，为了纪念他，这个测试被称为*图灵测试*，它至今仍被用于测试机器展现智能行为的能力，并将其与人类进行比较。图灵测试本质上是一个三人游戏：一个是被测试的计算机或系统，另外两个是人类。其中一位人类玩家（即测试中的评估者）会提出开放式问题，并旨在从另外两个玩家中识别出人类玩家。如果评估者无法在不见面的情况下做出判断并识别出人类玩家，那么这台计算机或机器就被认为是智能的。


  ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig2_HTML.png](img/505424_1_En_4_Fig2_HTML.png)


  **图 4-2** 具有两个输入 `x[1]` 和 `x[2]` 的麦卡洛克-皮茨神经元的基本电路图。如果输入之和大于或等于阈值`t`，则结果等于 1，否则为
  0。




