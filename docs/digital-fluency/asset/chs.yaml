- '# 区块链交易生命周期


  区块链交易生命周期通常分为七个步骤，如图 3-3 所示。假设您想向美国朋友 Bob 发送 10 个 BTC——实际上这是一笔相当可观的金额，因为在 2020 年
  9 月，汇率约为 1 BTC = 10,500 美元。从表 3-2 可知，相应交易消息的明文可能为：“发件人：发件人姓名（其`private key`），收件人：收件人姓名（其`private
  key`），金额：10 BTC。”比特币交易流程始于生成一个加密文件，即所谓的*数字签名*，其中包含您交易消息的哈希值。将此文件广播到网络后，在第三步中，您的交易将由网络中的一个节点授权——关于此步骤的更多细节将在下一节中详细描述，此处为清晰起见暂不讨论。由于每个区块为了提高效率包含多笔交易，您的交易消息很可能会被缓冲到一个等待池中，即所谓的*mempool*（交易内存池），该池在授权交易被组装成
  Merkle 树之前收集它们。一旦池化完成，^(⁶¹) 将如前所述通过迭代应用加密哈希函数来创建整个 Merkle 树。此外，所有其他组件都被添加到区块头中，包含您交易消息的区块最终被创建。然后，该区块在区块链交易生命周期的第五步被广播到网络。第六步是整个交易过程中最重要的步骤之一。它涉及在网络内就该区块的有效性达成共识。这种验证基于解决一个计算难题，在比特币区块链中称为*工作量证明*，我们将在下文中详细探讨。一旦其中一个节点解决了这个难题，解决方案就会被广播到网络，该区块被标记为已验证，并最终被不可篡改地添加到区块链中。网络进行自我更新，在最后一步中，最新且达成一致的账本版本被单独保存在每个节点上。


  以上概述为您提供了关于整个区块链交易生命周期的初步印象。至此，需要注意的是，这一切都在几分钟内自动完成，并且没有任何第三方介入——您可以回想一下，通过 SWIFT
  进行的传统银行交易涉及五家以上的银行，并且总共可能需要数天时间。这实际上是经典 SWIFT 与基于区块链的（货币）价值转移之间最重要的区别。由于没有任何第三方中介，区块链交易流程显著降低了交易速度（译者注：此处根据上下文逻辑推断应为“时间”）和成本。


  我们对区块链交易生命周期的简要讨论揭示了两个对于区块链安全运行尤其重要的步骤：(1) 交易的授权 和 (2) 通过工作量证明对区块进行验证，即分别对应图 3-3
  中的第三步和第六步。这两个步骤将在以下两个小节中详细讨论。


  ## 通过数字签名授权交易


  数字签名在整个交易生命周期中扮演着至关重要的角色，因为它允许我们：(1) 明确识别用户及其账户，以确保提交的交易是以他们的名义进行的；(2) 授权交易，以确保提交新交易的用户确实是待转移的相关信息或资产的合法所有者。第一个功能类似于您在法律合同（如房屋销售协议）上的签名，第二个功能则类似于在本例中由公证人对该签名进行的司法验证。这两个功能对于保证整个区块链的完整性以及保护其免受未经授权的访问和滥用尤为重要，因为其开放的
  P2P 架构允许任何人登录、访问并添加新的交易数据。


  创建数字签名的特定概念可以追溯到美国密码学先驱拉尔夫·梅克尔——我们通过 Merkle 树了解到的这位科学家——以及他在密码学和加密数字签名方面的开创性工作 [11]。但在详细讨论数字签名及其用法之前，先讨论一些密码学的基本术语和概念是很有启发性的。密码学通常涉及三个主要步骤，即：


  1. 加密（交易）消息

  2. 传输加密后的（交易）消息

  3. 合法的接收者解密传输的（交易）消息


  加密后的数据也称为*密文*，指的是一串无意义的字母和数字，对于没有正确“配方”来解密它的人类或计算机来说毫无意义。这个“配方”被称为*密钥*，本质上是一串字母和数字，它决定了消息的明文如何转换为其密文。换句话说，密钥决定了用于加密明文消息的密码算法的输出，该算法在与另一方交换消息之前使用。


  加密和解密可以依赖于对称密钥或非对称密钥，每种密钥都有其特定的优缺点。*对称加密*方案基于一个密钥，该密钥既可以由发送者用于加密明文，也可以由相应的接收者用于解密密文，如图
  3-4(a)所示。这种加密方案非常易于实现，但也非常容易被破解，因为任何获取到该密钥的人——通过窃取或拦截通信信道——都可以轻易解密消息。


  ![../images/505424_1_En_3_Chapter/505424_1_En_3_Fig4_HTML.jpg](img/505424_1_En_3_Fig4_HTML.jpg)


  **图 3-4** 对称加密方案(a)与非对称加密方案(b)的比较。对于对称加密算法，公钥既用于加密明文，也用于解密密文。非对称加密方案使用两个独立的密钥，私钥用于加密，公钥用于解密。




  这就是为什么随着时间推移，人们开发出更精密的加密方案，其中*非对称加密*（也称为*公钥密码学*）是最流行且广泛使用的一种。它也是实现防篡改区块链的关键要素，并被选用于多种网络安全应用，例如第
  2.3.2 节中介绍的 `RSA` 算法^(⁶²) 。与对称加密方案相反，非对称加密使用两种不同的密码密钥：仅限其所有者使用的*私钥*，以及分布在网络上的相应*公钥*。无需深入细节——对非对称加密的详细理解实际上需要相当高级的数学概念，例如非线性椭圆曲线——可以说这两个密钥是*互补*的，这意味着它们只能组合使用，并且只能按一个方向使用，如图
  3-4 (b) 所示。例如，用公钥加密的明文，只能使用其互补的私钥解密。互补密钥对通常可以以两种方式使用：


  1.  *私钥到公钥*交易——如图 3-4 (b) 所示——发送方使用其*私钥来加密*他的消息。然后消息被发送给接收方，接收方可以使用互补的公钥解密。这种方法不能保护消息不被读取，但允许接收方验证发送方的身份，因为加密的消息只能使用合法发送方的公钥解密。


  2.  *公钥到私钥*交易——未在图 3-4 中显示——发送方使用*接收方的公钥来加密*他的消息。接收方随后可以使用其私钥相应地解密。与第一种应用选项相比，这种方法保护消息不被读取，因为由特定公钥加密的数据只能由预期接收方拥有的互补私钥解密。


  区块链网络中用于授权交易的数字签名基于非对称私钥到公钥的加密方案。它的创建分为三个步骤，如图 3-5 (a) 所示：(1) 对实际交易消息进行哈希处理，(2)
  使用发送方的私钥加密哈希后的交易消息，(3) 最后通过将加密后的交易哈希添加到交易消息的明文中来创建数字签名。然后，此数字签名被分发到网络中。一个节点将随机拾取它，并通过执行图
  3-5 (b) 中描绘的以下三个步骤来授权交易：(4) 使用发送方的公钥解密交易哈希，(5) 对文件中包含的交易消息进行哈希处理，以及 (6) 将两个结果进行相互比较。如果两个结果相同，则该节点可以断定：


  *   消息确实由发送方签名，因为数字签名能够使用发送方的公钥成功解密。

  *   数字签名中包含的交易消息是正确的，因为解密后的交易哈希与由授权节点独立生成的交易哈希相匹配。


  如果此比较未显示相同的结果，则该交易不会被网络授权，并且相关交易会被识别为欺诈交易，不会被转发到内存池。您可能已经注意到，只有私钥最终被保密，才能避免欺诈交易。一旦私钥被恶意第三方窃取，就无法避免欺诈和非法交易，这就是为什么私钥的存储在区块链生态系统中起着非常关键的作用。


  用户的私钥通常由一个所谓的*钱包*来存储。钱包是一种软件或硬件，它通过提供一个易于使用的区块链网络网关，允许用户访问区块链网络并授权交易。钱包可以在始终在线并连接网络的计算机上实现，也可以在永久离线并与区块链网络断开连接的计算机上实现。在线钱包也称为*热钱包*，因为由于保持连接，它们总是暴露给黑客和其他恶意用户。出于同样的原因，离线钱包被称为*冷钱包*，主要用于将用户的私钥安全地存储在某些离线设备上。最简单但也同样不安全的冷钱包是*纸钱包*，即您将私钥写在一张纸上。根据您的记忆力，最安全的钱包之一是*脑钱包*，即记住您的私钥而无需写下来。


  ![../images/505424_1_En_3_Chapter/505424_1_En_3_Fig5_HTML.png](img/505424_1_En_3_Fig5_HTML.png)


  **图 3-5**


  数字签名在交易授权中的使用。(a) 展示了如何创建数字签名，而 (b) 则描绘了如何使用它来授权交易。这种授权基于将直接对交易进行哈希处理得到的哈希值，与对网络中共享的文件进行解密得到的结果进行比较。


  在选择最合适的钱包来存储您的私钥时，务必牢记私钥是访问区块链的唯一途径。换句话说，丢失您的私钥意味着您将被永久锁定在区块链之外，并且所有关于您的存储信息都将不可挽回地丢失，因为无法重置或重新创建私钥。例如，用于访问比特币区块链的大多数私钥都存储在热钱包中，这些热钱包由托管钱包服务、加密货币交易所和比特币交易商（例如多资产经纪商
  `eToro`）提供。




  ### 3.2.5 通过共识与挖矿建立信任


  在授权交易之后，区块验证是在区块链网络中建立信任的另一个典型过程。以比特币区块链为例，区块验证基于求解一个称为工作量证明的计算难题。这种工作量证明属于更广泛的*共识算法*范畴，这类算法通常能实现对分布式网络的集体控制。


  #### 挖矿


  `挖矿`是指通过求解一个名为“工作量证明”的计算难题来寻找有效区块的过程。例如，它能够消除涉及双重花费的欺诈交易。


  在没有中央中介机构来调解各方协议交换的情况下，对此类算法的需求，最早由 1982 年的*拜占庭将军*问题所阐述 [13]。这个著名的思想实验是这样一群军队将领，他们分别率领着拜占庭军队中地理上分隔的几部分，正计划进攻一座设防城市。他们知道，成功的唯一方法是同时协调进攻这座城市。那么，如果其中一位或多位将军是叛徒，或者传递误导性、模棱两可的信息，他们又如何能就联合进攻的时间达成一致呢？类比到分布式网络，将军可以看作是节点，而信使则是不同节点之间的连接。拜占庭将军问题在理论上由米格尔·卡斯特罗和芭芭拉·利斯科夫解决，他们在
  1999 年提出了“实用拜占庭容错”算法 [14]。它的首次实际应用是在十年后，随着匿名者中本聪发明了比特币区块链及其工作量证明原理才得以实现。这种可行共识算法的实现，实际上是区块链技术的关键创新之一。


  工作量证明是一个迭代的试错过程，其中区块头中的`nonce`值作为自由变量被顺序更改，直到区块的哈希值低于由底层网络协议设定的预期目标值。^(⁶³) 一旦某个节点找到了满足此条件的区块，该区块就被验证并不可篡改地添加到区块链中。寻找有效`nonce`值的这个过程被称为*挖矿*，这借鉴了电脑游戏《矿工》及其“淘金或开采宝石”的隐喻。通过挖矿解决计算难题，使得网络能够对所有交易实现集体控制，因为它提供了一条途径来共同判断一笔交易是允许的还是欺诈的——这也是传奇的拜占庭将军们所需的方法。


  此处的“欺诈”是指区块链网络的恶意用户（类似于拜占庭叛徒），试图通过在两笔独立的交易中使用同一笔价值（比特币）来实现双重花费。这种企图通常被称为*双重支付*攻击。尽管挖矿减少了欺诈交易的动机，但如果攻击者掌握了超过
  51%的挖矿算力来强制并逆转交易，理论上双重支付仍有可能发生。好消息是，比特币和区块链技术为这种*51%攻击*提供了一个非常有效的解决方案，该方案基于以下两种对策的结合：


  *   *增加难度*：*难度*是一个参数，它衡量找到解决计算难题的`nonce`值的可能性（或概率）。由于比特币是一个任何人都可以加入的开放网络，它吸引了越来越多的用户，这些用户可能将他们的算力合并到更具成本效益且高度专业化的*矿池*中。此类矿池偶尔会捕获超过
  51%的挖矿算力，理论上这使他们能够发起 51%攻击。为了避免这个问题，随着越来越多的用户加入网络，网络会通过提高计算难题的难度来频繁地重新平衡。特别是，比特币协议每
  2016 个区块（目前相当于大约两周时间）增加一次难度。


  *   *引入挖矿激励*：引入*挖矿奖励*是第二种防止恶意企图的措施。它通过奖励第一个解决工作量证明计算难题的节点操作者以新生成或铸造的比特币，来激励诚实行为。鉴于难度会自动增加，这种挖矿奖励使得使用超过
  51%的算力诚实挖矿并赚取比特币，比试图欺骗系统更有利可图。从历史上看，激励性的挖矿奖励也吸引了早期采用者，这有助于比特币在初期诚实地达到临界规模，并利用*网络效应*。^(⁶⁴)


  为了完整性起见，有必要指出工作量证明并不是实现定制区块链时普遍可用的唯一共识机制。另一种被称为*权益证明*，其核心理念是网络中的某个节点或用户在该系统中拥有足够的权益，这使得任何恶意方的攻击都变得无望。*消逝时间证明*是另一种共识算法，目前芯片制造商英特尔等公司正在探索，其目标是通过使用
  CPU 内部的安全指令来达成共识——该相关产品名为`Intel SGX`（“软件保护扩展”） [15]。




  ### 3.2.6 智能商业合约


  区块链技术有一项特别有趣的功能，我们迄今尚未讨论，但它为有益的应用带来了巨大希望。这项功能涉及构成大多数商业关系核心的合约，例如房屋的销售合同或汽车的租赁合同。正如我们在本章引言部分所学到的，古老的贸易和易货规则早在古代就已存在。现代合同法始于
  1750 年的工业革命时期，当时工厂工人数量不断增加，需要用更正式的方法来规范现金工资、工作条件和安全标准。直到今天，法律合约仍然是所有商业关系和交易的组成部分。合约是两个或多个当事方之间具有法律约束力和可执行力的协议，它承认协议中每一方的权利和义务。它们通常涉及任何形式的（货币）价值转移，一旦协议标的物得以履行，该转移即被授权。


  区块链技术通过实现“自动化合约”来自动化这种价值转移。这些合约被称为*智能合约*[16]，一旦区块链网络就合约条件已得到一致履行达成共识，它们便会自动执行。智能合约是*去中心化应用*或`DApps`的一个子类别，即在区块链网络上运行的软件片段。根据自动化程度的编程设定，智能合约可以是部分或完全自执行的，并且首次在以太坊区块链协议中实现。^(⁶⁵)


  智能合约


  智能合约是在底层网络协议之上实现的程序，它在区块链网络中体现特定的业务逻辑。它可用于自动化某些业务流程，如签约、清算、结算和记录保存。


  智能合约应用的一个例子是一家全自动汽车租赁公司，该公司利用此功能在收到付款后自动解锁车辆。一旦租期届满，系统可自动要求用户为继续使用付费，或在下一个机会将车停好交还。如果租车人因某种原因未能履行此合同义务，汽车租赁公司可以锁定车辆，从而无需任何第三方中介或政府机构介入即可自动执行合同。可以想象，这种可自动执行的合约通过精简和自动化行政流程以提高效率，能够优化组织运营并提高企业盈利能力。


  在实践中，智能合约的实施仍伴随着技术挑战和监管风险。最常见的问题与用户忘记其私钥有关，这会直接导致财务损失，因为正如我们之前所知，区块链不支持任何重置或重新创建私钥的选项。解决此问题的一种方法是*多方签名*，即需要多个签名才能访问区块链或授权交易。但在以太坊区块链的情况下，这种方法已因利用其协议中的代码错误和其他难以发现的漏洞而被黑客攻击。例如，2017
  年，恶意用户攻击了多重签名钱包的智能合约，并非法将价值 2.8 亿美元的加密货币转移到他们的账户中[17]。此事件和其他事件表明，智能合约还不是完全成熟的功能。然而，如果在私有区块链网络中明智地实施，它们已经可以为某些商业应用提供一些优势。


