  **图 4-14** 试图逃离迷宫的智能体（机器人）的强化学习循环过程。(1) 过程从智能体做出一个任意步骤或动作开始。(2) 解释器观察智能体的动作，并评估该动作是否使其更接近迷宫出口。(3)
  如果是，解释器奖励机器人；否则，在智能体的成本函数上施加惩罚。(4) 每个动作最终都会改变机器人在环境中的状态，然后过程重新开始。机器人通过多次执行此循环过程来改进其行为，同时力求每一步都最大化其奖励（或最小化其成本函数）。




  '
- '# 强化学习的数学概念


  强化学习的数学概念可以追溯到理查德·贝尔曼（Richard Bellman）于 1954 年关于*动态规划*的开创性工作[79]，其中他提出了著名的*最优性原理*，证明了动态优化问题的每个解都由更简单的部分解组成。理查德·贝尔曼用以下话语描述了他的原理：“一个最优策略具有这样的性质：无论初始状态和初始决策是什么，剩余的决策必须针对由第一个决策所产生的状态构成一个最优策略”[79]。为了进行更定量的数学描述，他引入了一个递归数学函数，该函数将智能体在环境中的最优行动与预期奖励和结果状态联系起来。这个方程被称为*贝尔曼方程*，至今仍是强化学习的理论基础。


  ## 强化学习


  强化学习是关于智能体在环境中采取行动。智能体或“行动者”会根据其行动是否使其更接近最大化奖励的最终目标，而获得奖励或惩罚。这种方法适用于你无法定义智能体在环境中的理想状态，并且了解环境的唯一方式是与之交互的情况。


  贝尔曼方程后来通过将确定性环境替换为更符合现实的、随机且随时间变化的环境而得到了改进（或抽象化）。例如，一个更现实的环境可能涉及第二只竞争的狗，它也在试图抓住有奖励的食物。随机环境会影响智能体的最优行动选择策略，在数学上被称为*有限马尔可夫过程*。^(¹⁰⁵)
  英国计算机科学家克里斯托弗·沃特金斯（Christopher Watkins）于 1989 年首次描述了通过有限马尔可夫过程对贝尔曼方程进行的抽象[80, 81]，这后来被称为*Q
  学习*——其中的`Q`代表“质量”（quality），因为智能体学习在每种情况下执行最“高质量”的行动。Q 学习可以被视为强化学习的一个重要扩展，因为它允许将这些模型应用于现实生活场景[82]。


  强化学习最著名的演示之一就是计算机程序“AlphaGo”。这个程序由后来被谷歌收购的 DeepMind Technologies 开发，旨在用于下围棋。围棋由神话中的中国皇帝尧在
  2500 多年前发明，用于教导他的儿子纪律、专注和精神平衡，这是一种非常流行的两人中国策略棋盘游戏，如今全球玩家超过 4600 万。在每局游戏开始时，两名玩家会获得一套白色或黑色的棋子（称为“石子”）。执黑棋的玩家先手，两名玩家轮流将他们的棋子放置在网格线的交叉点上^(¹⁰⁶)，目标是创建一个相连的棋子组，包围比对手更大的一片封闭领地。当一个玩家包围了一颗或多颗敌方棋子时，他们会吃掉这些棋子并将其永久移出棋盘。游戏继续进行，直到双方都不愿再走一步或无法再吃掉对手的棋子。由于玩家通过包围空领地来得分，因此最终拥有最大领地的玩家获胜。尽管规则相对简单，但围棋非常复杂，因为其棋盘更大，可能的下一步走法比国际象棋多得多。合法棋盘位置数量的下限估计为`2
  × 10¹⁷⁰`[83]，这远远超过了宇宙中基本粒子的数量。这就是为什么 DeepMind 不能使用*暴力破解*^(¹⁰⁷)，而 IBM 在 20 年前曾用这种方法实现了他们的国际象棋计算机“深蓝”。相反，由英国计算机科学家、DeepMind
  创始人戴密斯·哈萨比斯（Demis Hassabis）领导的 AlphaGo 研究团队，使用了一种经过强化学习训练的复杂模式识别算法，因为可能的走法几乎是无穷无尽的，实际无法编程和预测。AlphaGo
  依赖于由不同深度神经网络构建的三个主要组件[84]：(1) 用于选择走法的策略网络，(2) 用于搜索可能下一步走法的树搜索算法，以及 (3) 用于评估不同棋盘局面的价值网络。策略网络根据当前棋盘局面和获胜的最高概率，被训练来选择最佳的下一步走法。为此，它首先基于人类专家玩家的数据进行监督学习训练，然后在第二步中通过基于自我对弈强化学习的方式与自己博弈来进行提升。在扫描当前棋盘局面后，策略网络启动树搜索算法，该算法会查找游戏的不同变体，并试图预测几步之后可能发生的事情——为此，它通常会向前看大约
  50 到 100 步。然后，价值网络会对这些不同的变体进行评估，计算每个变体的获胜概率，以便策略网络能够相应地选择获胜概率最高的走法。2016 年，AlphaGo
  在五局比赛中以 4:1 击败韩国围棋大师李世石（Lee Se-dol）后，占据了各大报纸的头条[85]，这被认为是人工智能发展的一个关键里程碑。^(¹⁰⁸) 在那之前，围棋被认为过于复杂，任何智能程序都无法掌握。著名台湾计算机科学家、谷歌中国创始总裁兼技术投资人李开复（Kai-Fu
  Lee）在其最新著作《AI Superpowers》中指出，中国政府将谷歌 AlphaGo 计算机的惊人表现视为自己的“斯普特尼克时刻”，并随后决定将世界级的人工智能领导地位作为国家优先事项[86]。在此背景下，他进一步评论道：“美国和加拿大拥有世界上最优秀的人工智能研究人员，但中国拥有数百名优秀人才以及更多的数据……人工智能是一个需要算法和数据共同演进的领域；大量的数据会带来巨大的不同。”




  ## 4.4 主要应用场景与商业实践


  前文对人工智能的介绍表明，大多数深度学习算法需要大规模数据集才能进行高效训练。此外，它们的训练还需要借助（高性能）计算机系统，这些系统能够在合理的时间尺度上以数字方式模拟神经网络。正因如此，历史上人工智能的应用与大数据、高效训练算法以及能够并行处理不同计算的强大计算机的发展密不可分。现代意义上的术语
  `big data` 最早由奥莱利传媒的市场研究总监罗杰·马古拉斯于 2005 年提出。他用这个术语来描述那些在当时几乎无法通过商业智能工具进行管理、操作和处理的超大型数据集。^(¹⁰⁹)
  随着互联网的兴起以及智能手机和其他数字设备的问世，大数据变得触手可及，人工智能的研究与开发也随之蓬勃发展。其提出的应用场景数量不断增加，复杂度逐步提升，应用领域也自此持续拓宽。但在详细探讨人工智能最重要且同样激动人心的应用场景之前，我们先简要了解一下最新的计算硬件是很有益的，这些硬件支撑了广泛的应用，并允许训练高度复杂的机器学习模型。


  ### 4.4.1 AI 芯片


  绝大多数深度学习算法的训练在数学上涉及反复计算激活函数和权重。简而言之，这些计算包括对表征不同神经元及其连接关系的成千上万个数字进行乘法和加法运算。这些数字通常排列在特殊的数组中，数学上称为
  `matrices`（矩阵）。早期，这类矩阵计算通常在 CPU 上执行，CPU 已存在多年——世界上第一个 CPU 是英特尔于 1971 年发布的 Intel
  4004 [104]——其设计目的是非常快速但并非同时地执行单个操作。在当今最先进的个人电脑中，CPU 仍然是许多对时间不敏感且不依赖高度复杂和计算密集型算法的人工智能应用的首选硬件。


  CPU 的基本架构由传奇的德国计算机先驱约翰·冯·诺依曼于 1945 年构思，包括计算核心和存储器等物理子组件。这两个组件通常在 CPU 微芯片上位置相近但在空间上彼此分离，并通过带宽有限的通信系统或
  `bus`（总线）连接。这种限制仅允许在特定时间内，一定量的数据在计算核心和存储器之间流动。有限的带宽造成了数据传输速度上的瓶颈，即所谓的 `冯·诺依曼瓶颈`，这使得在传统
  CPU 上使用大数据训练神经网络变得效率极低。^(¹¹⁰) 为了加速深度学习算法的训练计算，多家公司开始转而使用 `graphical processing units`（图形处理器，即
  GPU）来并行化不同的计算。与 CPU 不同，GPU 最初是为电脑游戏行业设计的，目的是高效处理快速变化的高分辨率图像。^(¹¹¹) 例如，美国计算机科学家吴恩达及其在斯坦福大学的同事在
  2009 年通过利用 GPU 训练一个拥有超过 1 亿参数（权重和激活函数）的多层神经网络，令人印象深刻地展示了这种方法的优势。他们的实验表明，在他们的特定案例中，在
  GPU 上训练的速度比当时最先进的 CPU 快 70 倍以上 [105]。从那时起，GPU 成为训练复杂人工神经网络的首选方法。


  然而，CPU 和 GPU 都不是为机器学习而设计和优化的。因此，近年来，多家科技公司开始研发专门用于高度并行计算的定制芯片组，并针对在超大规模数据集上训练人工神经网络进行了优化。这些微芯片通常包含数千个所谓的
  `multiply-accumulate cores`（乘积累加核心，MAC 单元），这些单元由相互连接的晶体管电路构成，反复执行 `A + (B · C)`
  类型的矩阵计算。其中，`A`、`B` 和 `C` 代表表征人工神经网络不同参数的三个矩阵，每个矩阵通常包含多达 8,500 个十进制数。集成了此类 MAC 单元的微芯片在文献中被称为
  `neural processing units`（神经网络处理器，NPU）、神经网络加速器或 AI 芯片。


