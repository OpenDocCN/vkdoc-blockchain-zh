  *   *特斯拉*：2019 年推出的“`FSD 计算机`”（“全自动驾驶”的缩写）是特斯拉自动驾驶系统的核心。它每秒可处理多达 1200 张全高清图像，包含基于
  14 纳米制程工艺的 9216 个`MAC`单元和 60 亿个晶体管。


  除了前述精选的科技公司之外，最近各种小型初创公司在创新且强大的 AI 芯片开发方面也加快了步伐，例如两家中国公司寒武纪和地平线机器人，以及美国初创公司 SambaNova
  Systems。其他值得注意的初创公司包括 Blaize、Graphcore、Groq、Kneron、Lightmatter、Mythic、Untether AI
  和 Wave Computing。我们在讨论人工神经网络时认识的 Yann LeCun 曾指出：“硬件能力……激励并限制了 AI 研究人员所能想象并愿意去追求的想法类型。我们可用的工具塑造我们思想的程度，远超我们所愿意承认的。”[107]


  由于有如此多的资金和资源投入到人工智能领域，过去几年间涌现了大量创新和应用。人工智能已经能很好地胜任许多“人类”的工作，因此两位商业顾问 James Wilson
  和 Paul Daugherty 中肯地指出：通过这种*协作智能*，人类和人工智能能够积极地增强彼此互补的优势——前者（人类）的领导力、团队合作、创造力和社会技能，与后者（AI）的速度、可扩展性和定量分析能力。对人来说自然而然的事情（例如讲个笑话），对机器来说可能很棘手；而对机器来说轻而易举的事情（例如分析千兆字节的数据），对人类来说几乎是不可能的[108]。


  在接下来的章节中，我们将看到人工智能已被应用于涵盖汽车、医疗、能源和金融等所有行业的广泛业务应用中。为了内容的完整性，表 4-2 整理了一个更全面的精选业务应用概览。我们将在下文详细探讨其中最流行的一些应用。




  ### 4.4.2 计算机视觉


  计算机视觉近期在工业界和媒体界引起了广泛关注，因为它提供了多种应用，例如亚马逊无人商店的“即拿即走”购物技术、视觉引导机器人，以及特斯拉用于自动驾驶的“全自动驾驶计算机”，我们将在本节中更详细地研究这些内容。


