- '# 图灵测试及其哲学意涵


  图灵测试很快在科学界引发了争议性讨论，部分科学家认为该测试可能被操纵。其中最著名的批评者是美国哲学家约翰·塞尔，他于 1980 年设计了一个思想实验来揭示图灵测试的缺陷[10]。该实验被称为`中文房间`，描述了两位人类参与者：一位中文教师和一位中文学习者。实验中的学习者鲍勃坐在封闭房间里，手边有几本包含简单规则的指南，用于将中文字符翻译成英文。房间外是名叫爱丽丝的教师，她通晓中文，以数字方式向鲍勃提交不同中文字符并要求其翻译。经过一段时间的训练后，实验结束，爱丽丝将收到鲍勃提供的准确译文。现在假设鲍勃创建了一个能够翻译中文字的智能计算机程序。约翰·塞尔认为，这个计算机程序不能被证明具有智能并理解中文，因为编写该程序的鲍勃本人完全不懂这门语言。因此他断言，任何计算机都无法拥有人类所不具备的东西——这似乎是一个合理论证，说明我们可能无法实现约翰·塞尔所称的超越人类智能的`强人工智能`。所谓强人工智能（也称通用人工智能），他指的是“一台具有适当输入输出的编程计算机，其拥有心智的方式与人类完全相同”[10]。而`弱人工智能`则指仅为特定任务设计、无法解决未经训练任务的计算机或程序。从历史角度看，约翰·塞尔的研究是对数学家约翰·麦卡锡一年前开创性论文《将心理属性赋予机器》的回应，该论文提出了相反观点[11]。这场关于人工智能哲学意涵的争论至今未决，并催生了名为`伦理
  AI`的新研究领域——遗憾的是这已超出本书范围。


  ## 图灵测试


  图灵测试是评估计算机智能思维与行为能力的应用最广的科学方法。


  ## 4.1.2 开启一切的会议


  常与艾伦·图灵并称为“人工智能之父”的约翰·麦卡锡，其职业生涯比约翰·塞尔早开始数年。在普林斯顿与斯坦福大学短期任职后，他成为著名的达特茅斯学院（美国九所最古老大学之一）数学助理教授。在达特茅斯期间，他受
  IBM 首台科学大型主机“IBM 701”的设计者纳撒尼尔·罗切斯特邀请[12]，于 1955 年夏季在纽约波基普西的 IBM 罗切斯特信息研究部工作。此后，两位科学家说服信息论之父克劳德·香农与当时哈佛大学数学与神经学初级研究员马文·明斯基，共同在达特茅斯学院组织研讨会。他们的资助提案[13]提交至洛克菲勒基金会并最终获批，于是具有里程碑意义的“达特茅斯夏季人工智能研究项目”于
  1956 年夏季进行了六周。11 位参与者中包含三位计算机科学家艾伦·纽厄尔、克里夫·肖和赫伯特·西蒙，他们在同年早些时候演示了传奇性的“逻辑理论家”——这是智能计算机程序的首个真正概念验证。^(
  ⁸⁴ ) 在这次会议上，约翰·麦卡锡首次提出“人工智能”一词，并后来给出选择该词的兩个主要原因：其一，他希望将达特茅斯夏季项目成果与他此前关于`自动机理论`的数学研究区分开来；^(
  ⁸⁵ ) 其二，他想避免与控制论及其对模拟反馈的关注产生任何关联，他认为这种关注存在偏差。遗憾的是，会议未达其预期，议程在某种程度上更偏向愿景而非实践。但更重要的是，这次开创性会议催化了此后
  20 年的人工智能研究。


  1956 年至 1974 年间，受计算机快速同步发展的推动，人工智能成为科技界最热门领域之一。在传奇的达特茅斯夏季项目两年后，美国计算机科学家兼心理学家弗兰克·罗森布拉特受艾伦·图灵和唐纳德·赫布开创性工作的启发，对麦卡洛克-皮茨模型进行了如下改进：他引入了两个突触`权重`——用`w[1]`和`w[2]`表示的两个十进制数——使其能根据赫布理论，依据两个不同输入值的重要性对其进行增减。数学上，弗兰克·罗森布拉特将麦卡洛克-皮茨模型中的输入之和`x[1]
  + x[2]`替换为加权和`w[1] · x[1] + w[2] · x[2]`。与麦卡洛克-皮茨模型相比，他的模型多了两个可单独设置与调优的自由参数，因此其概念更灵活、更适合模拟人类智能。在其开创性论文《感知机：大脑中信息存储与组织的概率模型》中，他将此概念称为`感知机`[6]，该概念至今仍是构建人工神经网络的概念基础，也是对这个高度活跃研究领域最重要的贡献之一。《纽约客》称感知机为“非凡的机器”[7]，《纽约时报》则盛赞：“海军今日展示了电子计算机的雏形，预计它将能行走、交谈、观看、书写、自我繁殖并感知自身存在”[8]。




  随着计算机能够存储越来越多的信息，速度更快、成本更低、在学术界更易获取，人工智能接连蓬勃发展。早期的演示，例如由艾伦·纽厄尔和赫伯特·西蒙开发的名为“通用问题求解器”的模拟程序，在解决人类问题的目标上显示出巨大潜力。另一个颇具娱乐性和交互性的软件程序是`ELIZA`，这是一个自然语言对话程序，旨在展示人机交流的表面性。该程序由德裔美国计算机科学家约瑟夫·维森鲍姆于
  1966 年创建，基于一种称为*模式匹配*的技术[14]。在这种方法中，程序会检查输入序列中是否存在（或缺少）某些文本成分或模式，生成相应的回答，并让用户产生程序能理解他们的错觉。^(⁸⁶)


  `ELIZA`和其他成功的研究项目激励了开创性的达特茅斯夏季研讨会的组织者之一马文·明斯基，他在 1970 年告诉《生活》杂志：“[...] 在三到八年内，我们将拥有一台具备普通人一般智能的机器。”遗憾的是，事实证明他错了，并且在接下来的几年里，对该领域的资助和兴趣迅速降温，部分原因是当时的计算机仍然相对昂贵，其计算能力和内存过于有限，无法处理实质性任务。例如，当时科研的首选计算机`DEC
  PDP-11/45`的工作内存只能扩展到`128 KB`，比当今智能手机的内存少了`20,000`倍以上。结果，越来越多的学者从对人工智能的乐观态度转向了怀疑。或许最直言不讳的怀疑者是美国哲学家休伯特·德雷福斯，他于
  1965 年出版了颇具影响力的著作《炼金术与人工智能》[15]，并于 1972 年出版了《计算机仍不能做什么：对人工智能理性的批判》[16]，阐述了他的观点，即人工智能将远远无法实现其崇高的期望。由于对人工智能的热情在
  20 世纪 70 年代初开始消退，从 70 年代中期到 90 年代中期这段时间被称为“AI 寒冬”。


  但即使在这个寒冷时期，仍然有一些创新出现。其中之一是 20 世纪 80 年代和 90 年代出现的*专家系统*，其兴起源于这一时期低性能个人电脑的爆炸式增长。专家系统模拟人类专家的决策能力，其基础是一个由简单的`if-then-else`语句构建的大型数据库，^(⁸⁷)这一概念被称为*符号逻辑*，由马文·明斯基此前提出。专家系统有望从职业领域专家（如医生、工程师和律师）那里学习知识。它们将这些知识捕获到数据库中，以解决例如金融或汽车制造中的特定问题，并使更广泛的从业者能够获得这些知识。尽管专家系统通常应用范围狭窄且难以跨业务类别应用，但它们很快变成了一个价值数十亿美元的产业。一个很好的例子是`MYCIN`，这是一个
  20 世纪 70 年代中期在斯坦福大学开发的早期用于诊断医疗感染的专家系统[17]。用户需要回答各种问题。配备了超过`600`条规则的`MYCIN`随后通过逻辑推理分析这些答案，识别出导致医学问题的细菌类型，并推荐合适的抗生素，剂量根据患者体重进行调整。`MYCIN`的准确率达到`69%`，并且据称比初级医生更有效[18]。尽管如此，这个程序从未在临床环境中使用过，但它是一个早期专家系统和现代机器学习先驱的绝佳范例。


  ### IBM 的传奇项目：深蓝与沃森


  具有讽刺意味的是，在缺乏政府资助的情况下，人工智能在 AI 寒冬之后再次被两大力量点燃。首先是摩尔定律的实际作用，即计算能力的迅速提升（参见第 1.4.3 节）。其次，互联网的发展引发了从数百万到数十亿消费者数据的爆炸式增长，这些数据突然变得可用，并亟需分析。在经历了十多年专家系统和并行计算的研究与开发之后，IBM
  推出了其国际象棋计算机“深蓝”。深蓝配备了`256`个并行处理器，每秒可以检查`2`亿种可能的走法[19]。1996 年，深蓝击败了传奇的俄罗斯国际象棋大师加里·卡斯帕罗夫，登上了各大报纸的头版。据报道，这场备受媒体关注的事件是计算机程序首次击败在位世界象棋冠军，这是向人工智能决策程序迈进的重要一步。然而，深蓝下棋的方式与你或任何其他智能人类截然不同。它只是被编程了定义明确的国际象棋规则和一个明确的目标，即吃掉对手的王。基于这种基于规则的编程，计算机分析了它可能采取的每一种走法以及对手随后可能做出的每一种回应——这种方法最早由美国数学家克劳德·香农在
  1950 年描述[20]。通过搜索这个潜在走法的树状图，计算机通常会向前看`8`步到多达`30`步，以在每一轮中选择最佳走法。在当时，规则和逻辑仍然是创造智能机器的最重要元素。


  但是，除了规则和逻辑，人类下棋也会追求概念性的想法，例如“控制中心”或“从右侧进攻”，并从经验中学习。想象一下你的孩子正在学习走路，以便更好地理解这一根本性差异。为此，你实际上并不会告诉孩子站起来，适当保持平衡，然后小心地一步一步走。孩子们更倾向于观察父母走路，模仿他们的行为，并基于试错法从自己的经验中学习。如果因失足摔倒而经历的痛苦，会导致相关的突触权重减弱。其他的则通过长期的训练得到加强，孩子最终学会安全地走路。通过写下指令来教孩子走路几乎是不可能的，因为我们拥有的大部分知识都是隐性的，也就是说，我们无法完全解释它。换句话说，我们知道的总比我们能说出来的多，这被称为*波兰尼悖论*，以纪念匈牙利裔英国哲学家、博学家迈克尔·波兰尼[21]。




  人类与计算机在学习策略上的这一根本差异，对人工智能研究产生了真正的革命性影响，并催化了范式的转变：从基于规则和逻辑的学习，转向通过训练样例和经验进行数据驱动的学习[22]。这实际上是当今所谓`machine
  learning`（机器学习）的核心和基础。`Machine learning`这个词由美国先驱计算机科学家`Arthur Samuel`创造，他于 1959
  年开发了一款电脑跳棋游戏^⁸⁸，这被认为是第一个机器学习系统。在其影响深远的论文中，他将自己的方法描述为：“……一个研究领域，它赋予计算机无需明确编程就能学习的能力”[23]。实现这一点并非依靠规则和逻辑推理，而是利用统计学和概率论的高级概念来训练系统。这也是为何机器学习更合适的称呼是`statistical
  learning`（统计学习），因为它完全基于对海量训练数据（或大数据）的统计分析[24]。图 4-3 示意性地描绘了最重要的几类人工智能以及最具历史意义的里程碑事件。


  ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig3_HTML.png](img/505424_1_En_4_Fig3_HTML.png)


  **图 4-3** 人工智能、机器学习与深度学习之间的区别，以及这些学科最重要的历史里程碑（显示在时间轴下方）


  从基于规则和逻辑的学习到数据驱动学习的革命性范式转变，也为 IBM 的下一代人工智能“`Watson`”铺平了道路[25]。`Watson`以 IBM 传奇创始人`Thomas
  Watson`的名字命名，由`David Ferrucci`在`DeepQA`项目中开发，最初设计为一个问答系统。为此，`Watson`配备了 720 个 CPU
  和 160 亿字节的工作内存。这个大规模并行超级计算机的数据库塞满了大量数据集，包括整个维基文库、书籍、电影以及其他人类知识来源。基于这个庞大而全面的知识库，`Watson`能够将问题解析成不同的关键词和片段，以查找统计上相关的短语作为答案。该系统同时执行数百个自然语言处理和分析程序，以找到给定问题的一小部分潜在正确答案。然后，`Watson`将这些潜在答案与其数据库进行核对，以确定它们是否有意义，并最终通过文本转语音程序合成的电子语音，口头输出最合理的答案。


  2008 年，IBM 代表与传奇美国智力竞赛节目 *Jeopardy!* 的执行制片人`Harry Friedman`进行了沟通，提议让`Watson`与两位
  *Jeopardy!* 冠军`Brad Rutter`和`Ken Jennings`进行一场比赛。第一场未经公开的宣传比赛于 2010 年举行，暴露了`Watson`复杂程序的诸多弱点。`Watson`最大的劣势之一是它无法听到对手的答案，因此无法从中学习。为此，IBM
  研究团队实现了一个附加功能，使`Watson`能够以电子方式接收对手的正确答案。在解决了这个问题以及其他几个关键问题后，`Watson`逐渐接近了两位 *Jeopardy!*
  冠军的竞技水平。`Harry Friedman`曾用“我想我们已经从印象深刻变成了目瞪口呆”来描述这种性能的急剧提升，并最终同意在 2011 年 2 月 16
  日安排一场公开的电视比赛。那一天，不可思议的事情发生了：`Watson`击败了蝉联冠军的 *Jeopardy!* 选手`Brad Rutter`和`Ken Jennings`，赢得了
  100 万美元的一等奖，而这项比赛长期以来一直被视为智力的象征。IBM——或者更确切地说是`Watson`——实际上将它的奖金等额捐赠给了慈善组织`World
  Vision`和`World Community Grid`。^⁸⁹


  在那场历史性的比赛之后，`Watson`再也没有参加过比赛，但基于一整套机器学习算法的卓越能力，成为了 IBM 机器学习服务的基础，这些服务很快作为按需服务在
  IBM 云上提供。随后的几年里，人工智能的研究和发展蓬勃发展，越来越多的公司在广泛的商业应用中启动了自己的项目和计划。


  ## 4.2 人工智能背后的核心思想


  我们简短的历史回顾表明，人工智能是一个非常跨学科的科学领域，建立在数学、计算机科学、神经科学、控制论等多种学科的思想和概念之上。即使该领域的一些非常现代的方法非常复杂，需要掌握诸如矩阵和微积分等高等数学知识，但大多数算法及其应用背后的基本思想，可以通过下面介绍的两个主要概念来描述。




  '
- '# 4.2.1 代价函数


  第一个概念是**代价函数**。为进一步说明，设想你将搬往另一个城市，比如位于传奇硅谷中心的旧金山——这里是数字技术的摇篮，也是美国众多互联网巨头的总部所在地。你做的第一件事可能是寻找一套体面且租金合理的公寓。为此，你可能会在网上、当地报纸及其他信息渠道浏览各种租房信息。假设你找到了四套公寓，月租金不同，面积分别为
  20、40、50 和 60 平方米。再假设这些公寓都不符合你的期望，因为它们都显得太小了。此外，想象你的预算中还剩下几百美元，你好奇一套 80 平方米的公寓可能要花多少钱，以及考虑到你的财务限制，这是否可行。此时，你可能回想起在学校学到的一个好方法：将数据可视化在图表中。于是你拿出一张纸，绘制价格与面积的对比图。你的图表可能类似于图
  4-4 所示。此外，你可能还记得本科数学课上讲过的知识：这样的点分布——技术上称为*点云*——最好通过一条穿过所有点中心的直线来描述，这条线称为*质心*。但我们如何找到那条完美拟合这些点、并可用于预测⁹⁰80
  平方米公寓最可能价格的直线呢？


  ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig4_HTML.png](img/505424_1_En_4_Fig4_HTML.png)


  **图 4-4** 不同租房信息的价格与面积散点图


  这是第一个机器学习算法的简单示例，数据科学家称之为*线性回归模型*。该模型输出一条直线，并为其提供一个简单的数学公式，完美描述了市场上公寓的常规租金与其面积的关系。有了这个公式，我们可以在最后一步将直线延伸至四个数据点之外，从而确定一套
  80 平方米公寓最可能的月租金。为了找到完美拟合该点云的直线，算法会先随机绘制一条具有特定斜率和偏移值的直线，如图 4-5(a)所示。


  **代价函数** 机器学习算法或程序的代价函数用于评估输入数据与预测输出之间的误差。所有机器学习算法的最终目标都是最小化这个误差，因此代价函数有时也被称为*优化目标*。


  为了判断这条直线是否拟合良好，线性回归模型会评估直线与点云中各点之间的距离——这些距离在图 4-5(a)中用垂直箭头表示。事实证明，将这些箭头的长度相加并求平方，是确定拟合质量更便捷的方法，因为平方处理能同等对待正负距离值。在机器学习中，这种偏差的平方和由于历史原因被简称为*代价函数*。一般来说，代价函数是机器学习模型的*优化目标*，每个算法都有自己的代价函数。但我们如何进一步利用这一关键概念来找到最佳拟合呢？


  ## 4.2.2 代价函数的最小化


  凭直觉你可能会猜到，为租房信息找到完美线性拟合的最佳策略是：最小化点云中各点与拟合直线之间的距离。换句话说，我们只需最小化代价函数。实现这一目标最快、最便捷的方法是使用一种称为*梯度下降*的最小化（或优化）算法，这是人工智能和机器学习中第二重要的概念。以你的租房信息为例，梯度下降通过反复绘制穿过点云的不同直线来实现：每一步计算代价函数，并基于最有效的措施力求将其最小化。从数学上讲，我们有系统地增大（或减小）直线的斜率和偏移值，并在每次迭代后计算代价函数。例如，如果某次迭代中减小斜率能降低代价函数，算法就会在下一次迭代中继续减小斜率，以此类推。在机器学习中，这种迭代过程被称为在线形*训练*线性回归模型。因此，点云在这种特定情况下也被称为*训练数据集*。


  **梯度下降** 梯度下降是最常用于最小化机器学习算法代价函数的数学概念。


  整个过程的原理图如图 4-5 所示。图 4-5(a)显示了一条位于所有点之上的直线，因此梯度下降算法会先同时减小斜率和偏移值这两个参数，使直线下移，从而降低整体代价函数。这个过程会持续进行，直到直线偶然落入点云内部，这会导致代价函数上升。这个代价函数在连续迭代中停止下降并开始上升的“转折点”，可以被视为斜率和偏移值的最佳、最完美的组合。最终结果如图
  4-5(b)所示。梯度下降所做的无非就是找到这个转折点，它对应于点云数据的最佳线性拟合。通过将直线从点云延伸至 80 平方米处，我们最终可以预测出 80 平方米公寓的最可能价格，约为每月
  4000 美元。


  ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig5_HTML.png](img/505424_1_En_4_Fig5_HTML.png)


  **图 4-5** 描述点云（灰点）中租房信息的两条直线对比。(a) 显示了一条拟合效果较差的直线，因为它位于所有点之上，导致偏差非常大（灰色垂直箭头）。而拟合效果良好时，偏差则小得多
  (b)。将直线延伸至点云之外（(b)中的虚线箭头），使我们能够预测 80 平方米公寓的价格（黑点）


  至此，你可能会明智地指出，公寓的价格不仅取决于面积，还取决于房间数量、到市中心的距离以及其他关键特征。好消息是，线性回归模型可以轻松扩展，以处理除面积之外的多类输入数据。为此，我们只需在代价函数中添加其他项，用以量化额外的特征，例如房间数量。由此产生的模型，出于显而易见的原因，被称为*多维线性回归*，非常适合预测常规房地产价格。


  这就是机器学习如何帮助我们为你找到完美公寓的——当然，该算法在商业领域也有其他用例。然而，这个简单的例子阐明了人工智能的两个最基本概念，即：(1) 代价函数，以及
  (2) 通过梯度下降或其他优化算法对其实现的最小化。⁹¹




  '
- "# 4.3 学习的五大类别\n\n在上述回归模型的基础上，数据科学家们又开发了一系列更广泛的机器学习算法，每种算法都有其特定的应用场景。^(⁹²) 尽管由此产生的应用范围非常广泛且同样多样，但这些算法根据其特定的训练策略可以分为五大主要类别。这些类别分别称为监督学习、无监督学习、深度学习、强化学习以及集成方法。图\
  \ 4-6 展示了最流行算法的一个通用但不全面的概述，我们将在下文中对其进行更详细的讨论。\n\n## 4.3.1 监督学习\n\n细心的读者会在我们之前的例子中注意到，线性回归模型是通过迭代比较其输出（拟合线）与其输入（训练数据集）来进行优化的。这就是*监督学习*的一个例子，它始终基于*标注数据*。标注数据指的是一个与前述例子类似的数据集，其中每个输入值（公寓面积）都与一个输出值（公寓价格）相关联。在这种情况下，代价函数很容易定义，因为我们可以直接将计算出的输出与输入训练数据集进行比较，并迭代地最小化任何偏差。监督学习通常需要大量（专家）标注的数据来训练模型，以产生更准确的结果。在此背景下，需要牢记的是，大规模、具代表性且高质量的数据集通常能降低*过拟合*的风险，并使模型能够很好地泛化到新数据上。过拟合指的是一种数学效应，表现为模型学习的是学习数据中的噪声（或统计波动），而非真正统计上最相关的模式。\n\
  \n![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig6_HTML.png](img/505424_1_En_4_Fig6_HTML.png)\n\
  \n**图 4-6** 机器学习最重要的类别与算法概览。五大主要类别以深灰色突出显示，相应的子类别以浅灰色显示。每个子类别中最流行的机器学习算法的技术名称以斜体字母表示。经典机器学习（浅灰色椭圆形）是一个历史术语，传统上用于指代经典的无监督学习和监督学习算法\n\
  \n然而，大部分可用数据通常是没有标注的，并且手动提供标注可能相当耗时。这就是为什么人们开发了非常有创意的方法来应对这一挑战。例如，ImageNet 是一个层级数据库，提供了大量带标注的图像，它是通过众包方式创建的。^(⁹³)\
  \ 数据也可以自动标注。想想 Facebook 的应用机器学习小组 [26]，例如，他们利用其拥有超过 35 亿张照片的庞大数据库，基于一个非常复杂的预测模型，该模型使用\
  \ Instagram 照片的标签来自动标注其数据 [27]。虽然有些标签能很好地非视觉描述照片，但其他标签描述得则非常模糊，这就是为什么 Facebook 将其方法称为*弱监督数据*\
  \ [28]。由于当今数据能创造竞争优势 [29]，数据标注很快成为了一个独立的行业和全球市场，拥有众多全球知名的成熟企业，如 Dataloop、Labelbox、Scale\
  \ AI、Supervisely 和 Heartex Labs。^(⁹⁴) 其中一些管理型数据标注服务专注于特定的图像领域，例如用于支持医疗保健行业客户的医学扫描、用于货运业务的高空导航数据，或用于支持保险行业的卫星和航拍图像。芝加哥美国家庭保险公司衍生出的\
  \ Arturo.ai 以及总部位于圣地亚哥的初创公司 Lytx，只是这个不断增长的数据标注行业的两个例子，预计到 2025 年，该行业的全球市场规模将达到 16\
  \ 亿美元 [30]。\n\n**监督学习**  \n在监督学习中，机器学习算法或程序通过标注数据进行训练，即输入和输出对，在训练期间告诉算法正确的答案，并允许调整其自由参数。一旦算法经过迭代训练，它就可以以一定的准确率预测未知输入的输出。如果你有可用的标注数据，或者知道如何手动分类和标注数据，那么这种方法非常适合。\n\
  \n### 监督学习：回归\n\n*回归*是目前为止最简单的监督学习方法。它基于法国数学家阿德里安-马里·勒让德的开创性工作，他于 1805 年提出了“回归的最小二乘法”，用于根据天文观测确定绕太阳运行的轨道\
  \ [31]。回归算法通过一条直线（线性回归）或曲线（多项式回归）来逼近训练数据集。该算法的输出是描述最佳拟合直线或曲线的参数，这些参数可以扩展到训练数据之外，并用于预测未经训练的输出，就像前面的公寓租赁例子一样。线性回归广泛应用于预测和预报，例如金融和保险公司用于销售预测和风险评估分析。进一步的例子包括根据一天中的时间预测交通流量，或者根据公司的增长预测需求数量。特别值得关注的是多元线性回归或多元多项式回归，它允许基于独立的多输入数据集来预测输出，例如根据车辆的里程数、品牌、事故次数、维修次数、车主数量以及其他决定其价值的关键特征来预测其市场价值。多元多项式回归模型也可能允许我们预测营销人员所谓的“客户流失”^(⁹⁵)，该预测基于不同的变量，例如使用的频率和强度、满意度、人口统计特征以及与其他用户的关系。公司可以利用此类预测，例如自动提供特殊优惠以留住易流失的客户。\n\
  \n\n\n#### 监督学习：分类\n\n属于*分类*范畴的机器学习算法，能够将（大型）数据集分割成具有某些相似性或属性的共同标签或数据组。分类与回归类似，但我们预测的不是一个数值，而是一个最能描述输入数据的类别。到目前为止，最常用的算法称为*K-近邻算法*，它获取一组带标签的数据点，并将它们分组到`*K*`个类别中，其中`*K*`是一个整数。\n\
  \n该算法的一个日益流行的应用场景是金融科技公司计算信用评分和评级。其分类模型会考虑多种因素，如收入、还款历史和居住地，来对潜在借款人进行分类。其他应用还包括垃圾邮件过滤、语言检测、情感分析和欺诈检测\
  \ [32]。例如，每当我们标记一封垃圾邮件，我们的邮件服务商就会更新其机器学习模型，以便在未来识别最新、最狡猾的骗局。Facebook 在新上传的照片中建议朋友姓名的功能，也是基于我们之前标记输入所训练的该算法。另一个例子是美国金融支付卡公司\
  \ Visa 开发的高级授权分析工具，它帮助金融机构每年防止约 250 亿美元的欺诈行为 [33]。\n\n### 4.3.2 无监督学习\n\n与监督学习相反，*无监督学习*处理的是*未标记的数据*。此类算法在学习过程中独立运行。它们通常从猜测输入数据中的相似性和模式开始，然后通过迭代调整各自模型的不同参数，力求获得越来越好的结果。优化目标或成本函数可以通过多种定量方法实现，例如欧几里得度量或距离，它允许我们根据数据点在坐标系中的空间距离来评估其相似性。最著名的例子之一是谷歌的\
  \ PageRank 算法，它成为了谷歌搜索引擎的原型。该算法是谷歌两位传奇创始人拉里·佩奇和谢尔盖·布林及其在斯坦福大学的同事们的智慧结晶，他们于 1998\
  \ 年发表了题为《PageRank 引用排名：为网络带来秩序》的开创性论文 [34]。在为其专利（专利号 US 6,285,999）提交申请一年后 [35]，他们推出了谷歌搜索引擎的第一个版本。自那时起，无监督学习已被应用于一系列其他商业应用中。全球顶尖的人工智能科学家之一杨立昆预测：“[...]\
  \ 从长远来看，无监督学习将变得重要得多。人类和动物的学习在很大程度上是无监督的：我们通过观察世界来发现其结构，而不是通过被告知每个物体的名字。”[36]\n\n\
  #### 无监督学习\n\n在无监督学习的情况下，机器学习算法或程序在没有预定义类别的情况下扫描输入数据以寻找模式和结构，并迭代地识别出统计上最佳的分类方式。如果你不知道如何标记数据，并且希望算法为你找到相似性和模式来进行分类，这种方法非常适用。\n\
  \n#### 无监督学习：聚类\n\n聚类是经典无监督学习中最流行的子类别。简单来说，可以将其类比为你洗完衣服后，不记得自己所有衣服的颜色，于是按颜色来分类衬衫。这类算法通常允许我们分割没有预定义类别或分类的大型数据集。算法会自行寻找相似的对象，将它们合并到一个聚类中，并以此自动找到分割数据集的最佳方式。迄今为止，该子类别中最常用的算法是*K-均值聚类*，它选取`*K*`个中心点或*质心*，将它们分布到数据集中，并将不同质心附近的所有数据点合并到一个聚类中。质心的位置会被迭代调整，直到所有数据点与其关联质心之间的平均距离最小化，从而建立起统计上最稳健的分组。此外，该算法允许绘制一个“曲棍球棒图”或“肘部图”，通过绘制数据与质心之间的平均距离与`*K*`值的关系，我们可以确定统计上理想的聚类数量。该图通常呈曲棍球棒形状，其拐点处即为理想的聚类数量。K-均值聚类最流行的应用可能是营销活动中的*市场*和*客户细分*，如图\
  \ 4-7 示例所示。\n\n另一个应用是*情感分析*，它挖掘社交媒体数据以识别社会总体趋势。例如，这对于一家时尚公司来说至关重要，可以帮助他们了解如何在下一条服装线中调整已识别的风格。另一个例子是在城市地图上标记热门地点。例如，当你在谷歌地图上寻找餐馆时，你可能已经注意到，谷歌的聚类引擎会在非常低的缩放级别下，将搜索结果聚集到带有数字的块状区域中。这是一个非常重要的功能，否则，当你的浏览器试图同时在地图上绘制成千上万家餐馆时，可能会卡死。你还可以想到政府背景下的国家安全机构和执法组织，他们可以使用聚类来寻找异常模式并识别潜在的安全威胁，这种应用被称为*异常检测*。在这些情况下，聚类算法尤其有用，因为我们通常不知道要寻找的具体异常模式。\n\
  \n![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig7_HTML.jpg](img/505424_1_En_4_Fig7_HTML.jpg)\n\
  \n**图 4-7** 通过绘制客户年收入与年龄的关系进行客户细分。在此示例中，算法找到了三个质心，分别标记为“C1”、“C2”和“C3”（菱形），这三个质心刻画了三个客户群体（黑色、中灰色和浅灰色虚线）\n\
  \n\n\n### 无监督学习：关联\n\n*关联*（或称关联规则学习）是另一类采用无监督学习策略的算法，例如被用于亚马逊“购买此商品的顾客也购买了”板块中为你推荐类似书籍。这些算法通过选取基于不同重要性和显著性度量的规则，在（非常）大型的数据集中寻找变量之间的模式和关系\
  \ [37, 38]。该模型的 `support` 参数用于量化一个项集（例如一组商品列表）在数据集中出现的频率，而 `confidence` 则指示一条关联规则在数据中被发现的概率。例如，*先验*关联规则算法首先设定最小支持度和置信度阈值，然后迭代地识别并排列所有具有更高支持度和置信度的子集。如今，该算法被用于分析购物车和自动化营销策略——这种方法被称为行为微目标定位，因为它寻找任何一组商品之间共同出现的频率和概率，并建立未来不同种类商品之间可能发生的关联。\n\
  \n一个具体的例子是超市中的商品摆放。设想一位顾客拿着一打啤酒走向收银台。我们是否应该在路上摆放口香糖？也就是说，啤酒和口香糖的销售是否在某种程度上存在关联？获取有价值的客户洞察以推动超市和仓库的销售，是关联规则学习一个相当典型的应用场景。一般来说，只要你有某种序列数据，并且希望在其中发现显性和隐性的模式及关系，都可以应用此方法。例如，英国线上超市\
  \ Ocado 从其数据中发现尿布和啤酒之间存在强相关性。他们了解到，新晋父母不常外出，因此当这些顾客购买尿布时推荐啤酒和葡萄酒，结果证明不仅利润丰厚，也提升了客户满意度。\n\
  \n### 无监督学习：降维\n\n*降维*（或泛化）旨在大型数据集中寻找比碎片化特征更适合数据处理的抽象模式。例如，所有具有三角形耳朵、长鼻子和大尾巴的狗可以概括为牧羊犬类别，这对于解释和处理该品种的特性来说，比单独描述其生理特征更为有用。这类算法已被用于潜在语义分析，通过将特定词语聚类到主题，从而将具体词汇抽象为其含义。除了这种所谓的*主题建模*，降维最流行的应用可能当属*推荐系统*和*协同过滤*，用于基于多个方面、视角、数据源等分析客户的行为模式。\n\
  \n### 4.3.3 深度学习\n\n除了监督学习和无监督学习，深度学习构成了第三大类学习策略，通常被用于训练人工神经网络。*深度学习*是机器学习的一个子类别，其灵感来源于（人类）大脑的结构和功能。它是人工智能领域最年轻的研究领域，近期在媒体上引起了广泛关注，部分原因在于它提供了一系列高度跨学科的应用。\n\
  \n![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig8_HTML.png](img/505424_1_En_4_Fig8_HTML.png)\n\
  \n**图 4-8** 具有两个十进制输入 `x[1]` 和 `x[2]` 的单个神经元的基本电路模型。其输出是输入的加权和 `w[1] x[1] + w[2]\
  \ x[2]` 的数学函数，用 `a[w]` 表示，并被称为激活函数\n\n#### 人工神经网络\n\n人工神经网络是一种由相互连接的神经元组成的结构，这些神经元通常排列成多个层。每个神经元都与前后层中的神经元相连，并具有特定的激活函数。每个连接强度的权重，结合每个神经元的激活函数，共同控制信息如何通过网络从输入层传递到输出层。人工神经网络模仿大脑的智能行为，可应用于广泛的应用场景。\n\
  \n\n\n#### 深度学习：人工神经网络\n\n深度学习采用由相互连接的人工神经元构成的*人工神经网络*。这里的“人工”一词指的是：我们使用的并非真实的生物神经元，而是通过运行适当软件代码（即机器学习模型）的先进计算硬件来模拟其行为。现今人工神经网络中使用的神经元，是对弗兰克·罗森布拉特的感知器模型的泛化。根据我们在第\
  \ 4.1.2 节的讨论，你可能记得感知器的输出值取决于输入的加权和，我们在数学上用 `w[1] · x[1] + w[2] · x[2]` 以及输入 `x[1]`、`x[2]`\
  \ 和权重 `w[1]`、`w[2]` 来描述这一点。对弗兰克·罗森布拉特模型的这种特殊泛化被称为*激活函数*，它所做的无非是根据一个可选择的公式，将输入的加权和转换为一个小数——因此，这是一种更精细的控制激活电位的方式。激活函数为模型增加了一个自由度（或自由参数），并通过为其选择最合适的激活函数，使得能够更好地针对特定用例调优人工神经元。人工神经元的整体概念如图\
  \ 4-8 所示。\n\n![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig9_HTML.png](img/505424_1_En_4_Fig9_HTML.png)\n\
  \n图 4-9\n\n三种最基本的人工神经网络类型。(a) 显示了一个两层神经网络，包含一个由四个神经元（圆圈）构建的输入层和一个由三个神经元构建的输出层。(b)\
  \ 显示了一个包含一个隐藏层的三层设计，(c) 显示了一种相当特殊类型的神经网络，称为“玻尔兹曼神经网络”，它没有特定的输入或输出。\n\n当我们将这些神经元连接起来，形成类似于我们大脑中生物神经网络的人工神经网络时，这些神经元的真正力量才得以展现。神经元可以连接起来形成任何类型的*网络架构*，这取决于手头的特定用例。在此语境下，“架构”一词指的是不同神经元相互连接的特定方式（或布线图）——这种连接当然是人工的，因为它是由软件模拟的。选择最合适的架构实际上需要大量的经验和专业技术。图\
  \ 4-9 展示了一些基本示例供你参考。该图表明，人工神经网络中的不同神经元通常排列在不同的层中，其中神经元仅与相邻层中的邻近神经元连接。既不是输入层也不是输出层的层称为*隐藏层*。从历史上看，“隐藏”一词引出了*深度学习*这个术语，因为隐藏层在神经网络中“深”处秘密地运作，不产生任何可见的输出。当输入数据非常多样化、庞大且复杂时，例如用于图像、物体和语音识别的数据，通常会使用隐藏层。\n\
  \n为了更详细地解释人工神经网络的基本原理，我们现在将讨论一个非常流行的例子。这个用例如图 4-10 所示，是关于读取手写数字并将其转换为数字形式以供进一步处理。例如，一些邮政分拣中心会使用这类网络来读取邮政地址，并根据邮政编码自动分拣邮件，这种方案也很容易扩展到读取手写地址和其他文本。\n\
  \n![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig10_HTML.png](img/505424_1_En_4_Fig10_HTML.png)\n\
  \n图 4-10\n\n通过人工神经网络进行手写数字分类。该网络获取手写数字的图像，并将其转换为数字形式。根据输入图像的像素数，该网络的输入层包含 144 个神经元（圆圈）。此外，它包含两个隐藏层，每层有\
  \ 12 个神经元，以及一个输出层，该输出层总共包含 10 个神经元，分别对应数字 0、1、…、9。被激活的神经元以及权重最高的最主要连接以黑色突出显示。\n\n\
  图 4-10 中的神经网络总共由四层构建而成：一个输入层、一个输出层和两个隐藏层。其输入是 12 × 12 像素的图像，例如我们在第 1.4.1 节介绍灰度图像二进制编码方案时讨论过的那种。这些图像逐行输入到神经网络中，即每个像素作为输入层中一个神经元的输入，因此输入层总共包含\
  \ 12 × 12 = 144 个神经元。根据某个像素的值是否足以激活相应的神经元，该输入要么被前馈到下一层，要么被认为无需进一步处理而忽略。在当前的例子中，下一层是第一个隐藏层。其神经元将信息转发到第二个隐藏层，但会根据另一个激活函数来进行，该函数允许聚焦于输入数据中的某些模式。第二个隐藏层包含的神经元比其前一层少，并且也为其构成神经元采用了一种特殊的激活函数。最后，输出层基于一种称为*sigmoid\
  \ 函数*的激活函数，对其来自第二个隐藏层的输入进行平均。该 sigmoid 函数的输出对应一个介于 0 和 1 之间的数字，可以用概率来解释⁹⁶。输出值 1\
  \ 对应 100%的概率，相应地，输出 0 对应 0%的概率。在此特定案例中，概率最高的神经元是第三个，因此网络正确地将以手写数字 3 输入的图像归类为数字 3，其不确定性由相应的概率给出。\n\
  \n### 深度学习\n\n深度学习是指采用包含一个或多个隐藏层的人工神经网络的机器学习算法或程序。它对于解决复杂任务特别有用，例如图像和物体识别或自然语言处理。\n\
  \n与线性回归模型类似，这种手写数字分类只有在神经网络之前已经用包含数千个手写数字的大型训练数据集进行过训练的情况下，才能正确工作。未经任何训练，神经元之间不同连接的权重只是随机值。因此，神经元会被任意激活，并且其激发几乎与输入图像无关。那么，这个训练是如何进行的呢？人工神经网络实际上是如何学习的？\n\
  \n人工神经网络通常可以通过使用标记数据或未标记数据进行训练，即采用监督学习或无监督学习。当前例子中的人工神经网络是使用标记数据集进行训练的。这些数据集包含数千张手写数字图像，每张图像都与正确的数字关联（或被标记）。因此，可以通过将计算出的输出与标记的输入值进行比较来定义神经网络的成本函数⁹⁷。\n\
  \n与所有其他机器学习算法一样，人工神经网络是通过迭代最小化其成本函数来进行训练的。训练通常包括五个主要步骤：\n\n1.  第一步，用随机小数初始化不同的权重，为简单起见，这些数字通常介于\
  \ 0 和 1 之间。\n2.  之后，将训练数据集的第一张图像输入到输入层，每个像素对应一个神经元。\n\n\n3. 数据随后从输入层向输出层逐层传播，每个神经元的输出等于其激活函数对相应加权输入和的计算结果。这一过程被称为*前向传播*，因为它从输入层指向输出层。\n\
  \n4. 在第四步中，算法将计算结果与输入图像的标签进行比较，并计算输出层每个神经元产生的误差。\n\n5. 第五步被称为*反向传播*，其理论基础源于美国数学家\
  \ Paul Werbos 和美国心理学家 David Rumelhart 的先驱性工作 [39, 40]。反向传播标志着人工智能研究的一个重要里程碑，因为在此之前的神经网络无法被准确高效地训练。^(⁹⁸)\
  \ 在此过程中，计算出的误差从输出层反向传播至输入层，同时根据各权重对误差的贡献程度进行更新。通过这种方式，部分连接的权重增加而变强，其他连接的权重相应减少而变弱。单次迭代中权重更新的最大幅度被称为*学习率*，它决定了人工神经网络的学习速度。\n\
  \n步骤 1–5 会重复执行，直到训练数据集中的每张图像都已通过网络处理，并达到预期的识别精度。训练数据集中所有图像完整地完成一次前向和后向传播，被称为一个*周期*。人工神经网络的训练通常涉及数百个周期，这就是为什么整个训练过程可能非常耗时且计算密集。\n\
  \n形象地说，人工神经网络隐藏层中的不同神经元在训练过程中会捕捉特定的图像特征和形状，从而将图像分解为其最主要的子成分。因此，第一个隐藏层的神经元会逐步识别简单的形状，例如直线、边缘、角、矩形、圆形和其他嵌套特征。第二个隐藏层的神经元可能识别出输入图像中占主导地位的、更复杂的特征或这些简单形状的组合。训练完成后，便建立了一个通用的简单形状集合，该集合能够很好地适用于识别所有可能的手写数字，其方法是将手写数字分解为基本形状，并根据特定的分解方式将其关联到一个数字。\n\
  \n"
- '# 深度学习：卷积神经网络


  与任何其他人工神经网络一样，卷积神经网络建立在历史上发展出的多种科学概念和思想之上。其核心思想可追溯到德国神经科学家、诺贝尔奖得主 David Hubel 和
  Torsten Wiesel，他们在 1959 年研究了猫视觉皮层中的神经元 [42]。基于实验结果，他们很快认识到，猫视觉皮层（即大脑中处理来自眼睛视觉信号的部分）中的神经元仅对视野中的小区域产生反应，他们将这些区域称为*感受野*。此外，他们还发现相邻神经元的感受野相互重叠，形成一个光栅，共同构成了猫的整个视野。这种重叠在数学上被称为*卷积*，类似于应用于图像以突出特定结构、纹理、特征及其他方面的局部滤波器。为清晰起见，图
  4-11 展示了两种非常常见的卷积滤波器在一张示例灰度图像上的效果。


  受 David Hubel 和 Torsten Wiesel 开创性工作的启发，日本计算机科学家 Kunihiko Fukushima 于 1980 年开发了一种多层人工神经网络，他将其命名为“Neocognitron”
  [36, 43]。这种特殊的人工神经网络采用完全不同的网络架构，能够识别类似前述示例的手写字符。其方法的真正创新在于将人工神经网络与基于卷积滤波器的特征提取单元相结合，因此他的网络架构后来被称为*卷积神经网络*。图
  4-12 示意性地展示了此类网络的一个非常简单的示例。这个特定的卷积神经网络可用于图像识别，并根据车辆类型（如紧凑型轿车、敞篷车、SUV 和豪华轿车）对车辆进行分类。它由两个子组件组成：(1)
  特征提取单元和 (2) 分类单元。特征提取单元用于图像预处理，由三个具有特定激活函数的神经元层组成。第一层称为*卷积层*，它通过在输入图像上逐行、逐列移动任意滤波器（类似于图
  4-11 所示的滤波器）来扫描图像，以检测特定的（对比度）特征和结构。此过程会创建一个所谓的*特征图*，突出显示汽车统计上最相关的特征，例如车轮、车门、车灯以及其他方面，具体取决于所选的滤波器。之后，Kunihiko
  Fukushima 引入了一个所谓的*池化层*，该层对这些特征进行累加，并根据其统计相关性进行评级。由于其特殊的激活函数，池化层进一步确保了即使检测到的特征在输入图像中发生偏移或倾斜，也能被正确识别。^(⁹⁹)
  此外，它还减小了图像尺寸，因此池化层有时也被称为“下采样层”。池化后的特征图作为后续* flattening 层*（特征提取单元的第三层，也是最后一层）的输入。该层进一步缩小特征尺寸，并将特征图转换为一列神经元。这一列神经元本身又作为卷积神经网络第二个子组件（一个全连接的人工神经网络，即分类单元）的输入。这个人工神经网络最终能够将检测到的特征分类为特定的车辆类型，类似于前一个示例中用于分类手写数字的人工神经网络。


  ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig12_HTML.jpg](img/505424_1_En_4_Fig12_HTML.jpg)


  **图 4-12** 用于根据车辆类型对车辆图像进行分类的卷积神经网络架构设计。特征提取单元由卷积层、池化层和 flattening 层组成，识别图像中的特定特征和结构。根据哪些特征最终被证明最为主要，一个人工神经网络将这些特征分类为特定的车辆类型。


  ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig11_HTML.jpg](img/505424_1_En_4_Fig11_HTML.jpg)


  **图 4-11** 两个特征检测器对原始图像的效果。“边缘检测器”强调图像中的所有边缘，而“图像浮雕”则赋予图像三维外观，从而突出图像中的任何纹理，例如车辆下方的地面。




  '
- '# 深度学习：卷积神经网络


  卷积神经网络通常使用包含数万张图像的带标签数据集进行训练。训练卷积神经网络的一个里程碑是 Yann LeCun 的反向传播算法，他于 1989 年在著名的新泽西贝尔实验室开发了该算法[44]。他精心设计的算法不仅能训练神经网络，还能同时自动调整特征提取单元中使用的滤波器或*卷积核*。一旦训练完成，特征图将显示在整个训练数据集中统计上最相关的特征。他的方法后来成为现代*计算机视觉*的基础[60]，正如我们将在本章的应用部分所见，它为商业和工业应用提供了特别广泛的范围。此后，卷积神经网络被用于例如照片和视频中的对象搜索、人脸识别、图像风格迁移以及提高照片图像质量等任务。


  人脸识别发挥着特别重要的作用，并且是许多初创企业的焦点。例如，在该领域最近引起媒体和投资者高度关注的一家公司是美国初创公司`Affectiva`。`Affectiva`于
  2009 年从麻省理工学院媒体实验室分离出来，它结合了人脸识别和语音模式分析来确定人们的情绪和认知状态。潜在的应用范围包括：通过感知驾驶员的情绪状态（如愤怒、疲劳或注意力不集中）来提高道路安全，增强商店中的客户体验，以及提高营销活动的影响力。这些应用如今被统称为*情感计算*[45]或*情感
  AI*[46]。


  ## 深度学习：循环神经网络


  人工神经网络和卷积神经网络非常擅长检测大型（图像）数据集中的模式。然而，事实证明，这两种网络都非常不擅长记忆先前的输入，因为它们没有任何短期或长期记忆。换句话说，它们全部的学习历史仅被不可挽回地编码在不同神经连接的权重中，并且它们无法确定之前是否已经见过某个输入图像。


  然而，对于需要数据历史记录的应用（例如语音识别和语音合成）来说，这种记忆非常有益。这就是为什么科学家们开发了另一种称为*循环神经网络*的网络架构，它能够记忆先前处理过的数据。第一个循环神经网络，即所谓的*Hopfield
  网络*，是由美国物理学家 John Hopfield 于 1982 年开发的[47]。他称之为“联想记忆”的模型可以被训练来存储不同的图像或模式，并且随后能够在其他输入图像中识别出其中任何一个。然而，早期循环神经网络实现的性能非常有限，因为它们不容易被训练。^((100))
  自那时起，人们开发了各种类型的循环神经网络，每种都有其特定的优点和缺点[48–53]。


  最强大的联想记忆是所谓的*长短期记忆网络*。这种特殊类型的循环神经网络由德国计算机科学家 Sepp Hochreiter 和 Jürgen Schmidhuber
  于 1997 年开发[54]，旨在识别数据（时间）序列中的模式。长短期记忆很快革新了自然语言处理和翻译，因为语言是词语的序列，通常只有将词语相互关联起来才能正确翻译。如今，长短期记忆也被用于语音识别和声学建模[55,
  56]，这是实现虚拟助手和聊天机器人的重要前提。


  ![../images/505424_1_En_4_Chapter/505424_1_En_4_Fig13_HTML.png](img/505424_1_En_4_Fig13_HTML.png)


  图 4-13


  生成对抗神经网络的架构原理和操作示意图。生成器网络生成假图像，这些图像作为判别器网络的输入。判别器估计该输入是真实的还是伪造的。当判别器确定输出为真实时，迭代训练结束。




