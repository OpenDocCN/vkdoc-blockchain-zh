  **图 2-4**


  电子在地磁场中的奇特行为。电子——类似于空中的足球——要么向左自旋（自旋向上），要么向右自旋（自旋向下）。物理学家分别将其记为 `|↺⟩ = |↑⟩` 和 `|↻⟩
  = |↓⟩`。


