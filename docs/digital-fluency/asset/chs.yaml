  | 开放 | 公共无需许可 | 任何人 | 任何人 | 比特币和以太坊 |

  |   | 公共需许可 | 任何人 | 仅限授权参与者 | Sovrin 基金会^(⁶⁶) |

  | 封闭 | 联盟链 | 授权参与者 | 授权参与者 | 运营共享账本的多个银行 |

  |   | 私有需许可 | 仅限完全私有或授权节点 | 仅限网络运营者 | 母公司与供应商或分包商共享的内部企业账本 |


  ## 3.3 当今的区块链技术


  尽管区块链技术最初是为比特币设计的，但潜在的应用清单非常庞大且与日俱增。潜在的应用遍及所有组织、行业和业务，并且可以在任何两个或多个当事方互相交易以交换某种价值或资产的地方找到。但在讨论区块链技术最流行的应用之前，我们必须认识到几种根本不同的区块链实现方案，它们在访问和权限方面存在差异。


  区块链通常可以设置为开放或封闭网络，如表 3-3 所示。*开放区块链*也称为“公共区块链”，因为任何人（包括潜在的恶意用户）都可以加入该网络。对此类网络的信任通常通过采用激励机制来建立，例如比特币区块链中的挖矿奖励，它奖励对网络有生产力的行为，并激励不同参与者之间的诚实行为。尽管如此，公共区块链必须被视为信任度较低的环境，因为任何人都拥有对存储在区块链文件中的数据的读写权限。


  另一方面，*封闭区块链*规范了读写访问权限，并将其限制在可信的参与者范围内，因此也被称为“私有区块链”。它们更适合私有组织和企业，这些组织和企业在更安全、可信的环境中运营，不喜欢与所有人分享其信息[18]。由于此类环境中的所有参与者都经过充分了解和审查，与比特币和其他开放区块链相比，封闭区块链不需要任何激励机制[19]。在封闭区块链中，所有参与者通常共享相同的首要目标，并依据法律条款和条件对其对网络的贡献负责。换句话说，他们被激励去诚实行为，以避免由区块链网络外部的法律和政府机构执行的法律起诉。区块链的关键特征汇总在表
  3-4 中作为总结。




  ### 3.3.1 企业面临的实施挑战


  由于区块链技术尚未成为标准化技术，因此不存在通用的实施方案能帮助您针对特定用例选择最佳选项。区块链的不同组件（如协议和用户界面）必须由熟悉区块链编程的专家根据具体需求和规格进行定制和调整。因此，了解企业应用中区块链的以下关键设计参数至关重要
  [19]：


  1. 区块链网络的*速度*或性能可能是最重要的设计参数，必须谨慎选择，因为它决定了每秒最大交易数量（即 `“tps”` ），从而决定了总体交易吞吐量。^(⁶⁷)
  速度可以通过网络带宽来调整，也可以通过调整区块验证所需的共识算法来调整。


  2. *可扩展性*是另一个非常重要的设计参数，它决定了网络在新用户加入或新增节点时的扩展能力。这两者都会增加所谓的网络*延迟*，即无法处理新交易的等待时间。随着交易历史的增长，新用户和节点也会增加所需的计算能力和内存使用量，这在区块链设计阶段必须予以考虑。


  **表 3-4** 区块链技术十大关键特性与概念


  | 编号 | 特性 | 底层概念 |

  | --- | --- | --- |

  | 1. | 不可篡改性 | 共识算法使更改成本过高，并阻止他人更改；因此区块链能抵御恶意更改 |

  | 2. | 仅可追加 | 数据只能添加到区块链中，既不能修改也不能删除 |

  | 3. | 可追溯性 | 通过交叉引用前一个区块增强可审计性，确保所有变更和交易的无缝记录 |

  | 4. | 可信赖性 | 使用点对点网络将信任分散到所有节点 |

  | 5. | 防篡改性 | 实现与前一区块的加密链接 |

  | 6. | 可扩展性 | 易于集成新节点；通常会增加延迟并降低吞吐量 |

  | 7. | 自我调节性 | 没有中央机构或中介——策略由运行在开放网络上的网络协议实现 |

  | 8. | 有序性 | 存储在区块链中的数据带有时间戳并按区块组织 |

  | 9. | 安全性 | 权限系统允许合规监管，因为个人会获得访问区块链的加密密钥 |

  | 10. | 激励性（仅限加密货币） | 对寻找有效区块所消耗的能源给予挖矿奖励 |


  3. *治理流程*^(⁶⁸) 将决策过程（包括访问权限和许可）以及所使用的特定共识算法制度化。在私有区块链中，此流程可能包含任何激励用户诚实行为的行为准则。该流程的精确定义对公有区块链尤其重要，因为它可能为网络攻击打开可能性，即拥有足够挖矿算力的网络参与者可以强制网络撤销交易历史。在发生任何违规或侵权时，设置安全防护措施可能是有益的。


  4. *合规框架*使参与者受监管要求的约束，并使网络能够覆盖多个司法管辖区。由于内部有约束性法规，在私有区块链中保证合规相对容易。


  5. *隐私*和*机密性*规则确保交易具有一定程度的私密性和透明度。例如，在公有区块链中，这些规则确保所有交易对所有参与者可见，而在私有区块链中，此要求可能因特定参与者在企业内的层级不同而有所差异。


  6. 最后但同样重要的设计参数是*最终结算性*，它指的是替换和更新当前及之前已确认区块链的法律概念。此参数对于企业应用尤其重要，因为一旦确认，法律交易就不应被撤销。


  为特定用例的实施选择最优的一组设计参数并不总是显而易见的，尤其是一些设计参数相互冲突，无法同时优化。设计过程通常涉及评估两个特别重要的权衡取舍。第一个是关于*透明度与隐私*，涉及在公有和私有区块链网络之间进行选择
  [20]。区块链基于交易历史明确数字资产的所有权，因此应对所有人可用。同时，透明度是验证交易的核心概念，而一定程度的隐私有助于最小化恶意攻击的风险，例如双重支付和交易撤销。此外，部分用户可能出于合规原因（例如欧洲通用数据保护条例）要求某些交易数据或细节对外部不可访问。因此，透明度和隐私是相互冲突的目标，一方面需要透明度来明确所有权，另一方面则需平衡部分用户更高的隐私需求。第二个权衡是关于平衡*安全性与速度及可扩展性*，涉及在许可链和非许可链网络之间进行选择
  [21]。为了保护区块链免受操纵而采用更高的安全标准，可能涉及更复杂的计算难题，例如，这不仅使恶意篡改区块的成本高得令人望而却步，也会减慢新交易添加的速度。


  大量可根据不同用例进行调节的自由设计参数，对企业应用尤其有利，因为它们通常需要将区块链集成到现有业务流程、遗留系统、法律法规、框架和现有 IT 基础设施中。在决定设计参数时，参考其他企业已实施的区块链应用，通常能为您的自身用例提供很好的指导。


  ### 3.3.2 当前业务应用


  区块链技术的应用非常广泛，涵盖社会的各个领域。根据德勤 2017 年的一项研究，每年在软件开发平台 GitHub 上启动的区块链新项目超过 8600 个 [22]。这些项目中的大多数基于开源软件平台
  *hyperledger fabric*，该平台由美国 LINUX 基金会支持，旨在促进区块链协议的创建、开发和孵化。^(⁶⁹) 该平台汇集了来自世界各地的众多程序员，并提供即插即用的软件模块，包括用于实施您自己区块链的共识算法和成员服务。




  ### 当前商业应用：加密货币与募资


  我们首先讨论的、实际上也是区块链技术基础的应用是加密货币。它建立在数十年的密码学研究和多种支持技术（如数字签名和哈希函数）之上。最早提出创建数字货币的方案之一可追溯到
  1982 年，当时美国密码学家大卫·乔姆提出了一种方案，利用“盲签名”（一种经过伪装、加盲的消息）来构建一种无法追踪的货币[23]。其基本思路相当务实：提出由一家公共银行通过签署一个呈现给用户的随机盲序列号来发行数字货币。随后，用户可以凭借这种由本地银行支持的数字货币与第三方进行交易。此流程仍遵循中心化交易模式，因为债务方银行作为监管中介为整个交易过程提供信任背书。后来，大卫·乔姆完善了他的概念，开发了一种名为`ecash`的数字货币，它利用一些私人身份数据来构建交易消息，但仍未能解决双重支付问题。


  #### 币


  `币`是加密货币的基本单位，即基于区块链技术设计的、能够随时间存储货币价值的数字货币。`币`仅可用于买卖物品，并且通常具备与货币相同的特征：可互换、可分割、可接受、便携、耐用且供应有限。


  作为解决这一普遍问题的方案，英国密码学家兼黑客亚当·巴克于 1997 年提出了工作量证明概念，并建议将`hashcash`作为抵御非法、未经请求的垃圾邮件系统。^(⁷⁰)
  他提出的基本思路是：要求每封电子邮件的发送者完成一道计算难题，该难题需要额外的计算工作和资源，从而阻止人们发送大量垃圾邮件。一年后，美国计算机工程师戴维采用了这一概念来生成一种名为`B-money`的数字货币。然而，这个系统在共识算法方面缺乏重要环节，最终也未能成功避免双重支付问题。比特币架构的一个直接前身是`比特黄金`，这是一种由美国计算机科学家尼克·萨博于
  1998 年提出但从未实现的去中心化数字货币。他曾这样描述自己的方法：“我试图在网络空间中尽可能逼真地模仿黄金的安全性和信任特征，其中最主要的一点是它不依赖于一个可信的中心化权威”[24]。这也是他被猜测为
  2008 年以匿名“中本聪”名义发表的开创性比特币论文作者的原因之一（尽管还有其他候选人）。但尼克·萨博对此坚决否认[25]。


  受比特币显著热潮的启发，随后开发了多种加密货币，如今这些货币被称为`山寨币`。到 2017 年底，所有加密货币都经历了剧烈的金融投机，在平台`www.coinmarketcap.com`上列出的币种超过
  4500 种。这股热潮引发了一场惊人的金融泡沫，随后不久泡沫便破裂了。在此期间，加密货币的汇率表现出极高的波动性，比特币汇率在一个月内从超过 20,000 美元跌至
  7,500 美元。这些价格波动至今仍以不那么显著的方式持续存在，这就是许多专家不相信加密货币会在自由市场上被广泛采用的原因。


  最受欢迎的代币分别是：以太坊（货币代码：`ETH`）、瑞波币（`XRP`）和莱特币（`LTC`）。其中一些代币是基于全新的软件代码实现的，并支持额外的功能，因此这组山寨币有时也被称为`元币`[26]。例如，以太坊区块链作为最流行的元币，额外支持智能合约的实施，以及存储和转移具有任何（货币）价值的更通用的数字资产[27]。


  一种具有某种价值的数字资产通常被称为`代币`。在文献中，“币”和“代币”常常混用，但在实现区块链应用时，两者存在根本的概念性差异需要重点考虑。币是由区块链技术驱动的加密货币的基本单位，仅具有货币价值；而代币则是特定区块链项目中的可交易份额证书，可以同时具有货币价值和非货币价值。例如，音乐会的门票可以被视为一种“现实生活中的代币”，它可以在特定时间用于特定的音乐厅。但是，你不能用它来支付餐厅账单，因为它只在特定生态系统（本例中为音乐厅）内才有价值。另一方面，代币是更通用的数字证券，代表某种权益，其本质不一定是货币性的。代币通常在一次`首次代币发行`或区块链项目的`ICO`中发行，这指的是通过向公众发售经过密码学保护的区块链代币，来为特定区块链项目或企业的发展筹集资金[28]。


  #### 代币


  `代币`是存储在有形或无形对象（如公司股份、债券、艺术品或房地产投资、可互换的贸易商品及其他贵重物品）中的价值的独特数字表现形式——一个“软件片段”。作为特定区块链项目内的可交易资产，`代币`在无任何中心化中介的情况下，搭建了现实世界资产与其在数字世界中进行交易、存储和所有权转移之间的桥梁。`代币`也是“币”的统称，因此为数字化具有货币或非货币价值的资产提供了一种更通用的方法。


  `ICO`通常由以下四个原因驱动：(1) 通过公众关注度吸引早期员工，(2) 为投资者提供盈利性投资机会，(3) 为潜在的并购建立货币基础，(4) 筹集现金以推动区块链项目发展。ICO
  市场尤其充满活力，2017 年通过 ICO 筹集了超过 7.5 亿美元资金，而同年“传统”风险投资仅达到 2.32 亿美元[29]。一旦 ICO 的融资目标达成且公司成功成立，ICO
  中发行的代币便会发挥作用并开始增值。这也是 ICO 被称为`证券型代币发行`的原因，这是一种现代且日益流行的风险投资募资方式。^(⁷¹) 如今，此类代币必须获得其发行所在国的交易所监管机构的批准，例如“美国证券交易委员会”（`SEC`）或“欧洲证券和市场管理局”（`ESMA`）。随着时间的推移，代币已涌现出三种重要的应用类型：




  '
- "# 代币类型与资产代币化\n\n*安全代币*是最常见的代币类型，代表金融投资，例如公司股份或私营公司股票，这些投资受政府市场监管机构和现有证券法的监管。与传统资产的主要区别在于，从传统证书到加密安全证书的概念性转变、特定的结算流程，以及从传统结算机构和清算所向分布式区块链基础设施的转移。总之，安全代币是受监管的金融产品，为投资者提供保护。此外，它们可以在`P2P`基础上交易，构成股票、债券和其他有价物的部分所有权凭证，提供广泛的市场准入，并作为包括小投资者在内的所有人的资产类别。\n\
  \n*实用代币*是与特定区块链用例相关的数字凭证，赋予其所有者访问相应区块链网络的权利。大多数情况下，公司将实用代币与特定服务关联，例如在网络内启用功能或额外的`DApp`。根据美国证券交易委员会（`SEC`）的规定，实用代币不得具有任何财务激励，即发行方不得向投资者提供任何形式的货币回报。\n\
  \n*支付代币*是像`Bitcoin`和`Litecoin`这样的加密货币，可在区块链项目的生态系统内用作支付方式。支付代币通常拥有自己的区块链，用于记录完整的交易历史。这些代币的唯一目的是支付，因此其应用范围非常广泛。\n\
  \n对于传统资产，例如房地产投资[[30]](#505424_1_En_3_Chapter.xhtml#Par232)或私营公司股票，买卖双方通常必须通过个人人脉和专门经纪人找到彼此，这一过程阻碍了全球贸易和价值转移。*资产代币化*，即传统资产的数字化，允许基于区块链技术实现简单的全球转移和所有权验证，该技术运行在广泛的国际网络上，例如公司的全球供应链。鉴于此类代币化资产透明度和国际性的提高，该领域的倡导者认为，与包括流动性极差的私营公司股票在内的传统资产相比，代币化提供了更高的流动性。此外，代币化资产可以完全在区块链上进行管理，而投资资金、相关货币转账和赎回可以基于智能合约方便地自动执行。代币与智能合约相结合，使得银行和其他（金融）组织内部的（行政）流程能够实现自动化，这就是为什么这一研究领域在过去几年中吸引了极大关注。\n\
  \n## 当前业务应用：交易、支付和共享服务\n\n交易是我们天性的一部分，自从我们的祖先开始在地球上繁衍，并交换在某些地方常见而在其他地方稀有的物品时起便是如此，正如我们从本章引言部分所了解的那样。早期，人们只有在认识并信任彼此时才会进行交易。鉴于全球化的发展，公司和个人几乎不可避免地会与那些我们既未谋面也未曾交易过的陌生伙伴进行交易——试想一下`Amazon\
  \ Marketplace`、`Alibaba`以及其他在线零售商上的全球卖家网络，我们在那里接触到成千上万的未知专业大型卖家和私人小型卖家。与陌生方交易存在诸多法律、金融和文化风险，这引出了一个可能我们所有人都思考过一段时间的问题：我们能信任一个我们既未谋面也未曾交易过的（海外）交易伙伴吗？\n\
  \n在其持续的商业关系早期，`IBM`和瑞士投资银行`UBS`基于区块链技术探索了在非可信环境下的交易问题，并于 2016 年创建了一个区块链联盟^((72))和在线贸易金融平台。他们的联合平台被命名为“`Batavia`”，为全球贸易提供了一个可信生态系统，作为承担与非可信交易对手方交易风险的一个可行解决方案。不久之后，蒙特利尔银行、`CaixaBank`、德国商业银行和`Erste\
  \ Group`也加入了该联盟，并帮助建立了一个可访问的国内和跨境交易开放网络，面向全球的公司客户和贸易伙伴[[31]](#505424_1_En_3_Chapter.xhtml#Par233)。后来，`Batavia`与增长更快的平台“`we.trade`”^((73))合并——该平台原名“`Digital\
  \ Trade Chain`”或`DTC`——由包括德意志银行、汇丰银行、荷兰合作银行、桑坦德银行和法国兴业银行在内的九家欧洲银行于 2018 年创立[[32]](#505424_1_En_3_Chapter.xhtml#Par234)。如今，`we.trade`被宣传为一个银行支持的贸易金融区块链平台，帮助客户：\n\
  \n*   寻找（新的）可信贸易伙伴\n*   以简便的方式申请银行融资\n*   在不可篡改的分类账上追踪整个交易过程\n*   通过智能合约实现支付和交易的自动化与安全化\n\
  \n此外，该平台确保所有相关方都能实时访问其贸易交易信息，从而没有任何个人或中心化方能够单独控制数据。数据实际上是分布在整个网络上的，未经所有其他用户的批准，任何数据都无法被更改——正如我们之前所学，这是区块链技术的关键特征之一。\n\
  \n`we.trade`及类似平台对中小企业尤为有益，因为它们面临明显的市场缺口，许多企业缺乏获得贸易融资的渠道。世界银行估计，高达 50%的中小型组织无法通过任何正规信贷渠道获得融资，这导致全球信贷缺口高达\
  \ 2.6 万亿美元。近年来，通过将传统金融服务与创新数字技术相结合来缩小这一缺口并为这些企业创造新机会，因此在银行业引起了极大关注。此类银行业务现在被统称为*金融科技公司*，这是对实施基于数字技术的金融创新的总称。\n\
  \n\n\n\n另一家探索基于区块链的银行和交易服务的美国投资银行是摩根大通，该公司与微软 Azure 合作推出了一个智能合约平台。这个开源平台名为 `Quorum`，旨在让金融机构更轻松、更快捷、更廉价地构建自己的区块链应用程序。^(⁷⁴)\
  \ `Quorum` 基于以太坊协议，并通过 `Aztec-protocol`^(⁷⁵) 进行了扩展，可为任何通用数字资产类别实现机密交易 [33]。与 `Zether\
  \ Protocol`（Aztec 的功能前身）不同，交易方的账号和账户余额等个人数据也被隐藏和加密，因此此类交易被称为 `零知识交易`。`Quorum` 区块链的独特卖点在于其协议中嵌入了极高的数据保护和隐私要求，能够对整个区块链（包括交易和智能合约）进行高效加密。这一点对于投资银行及其他金融机构尤为重要，因为它们的整个商业模式都建立在信任和保护客户个人数据的基础上，专注于私人价值转移和资产治理。`Quorum`\
  \ 还采用了一种名为 `QuorumChain` 的非常特殊的共识机制，允许授予某些用户特定的投票权。此外，`Quorum` 还提供了一种名为 `JPM Coin`\
  \ 的专属加密货币，该币与美元挂钩，因此相比其他无担保加密货币，其价格水平稳定性和波动率都要低得多 [34]。此类由银行背书的硬币被视为加密货币的圣杯，并因其显而易见的原因被称为\
  \ `稳定币` [35]。\n\n一些此前并未涉足金融科技领域的公司，例如德国汽车零部件制造商采埃孚（ZF Friedrichshafen），也在探索区块链技术为金融和支付服务带来的机遇。该公司与\
  \ IBM 和瑞银集团（UBS）共同创立了德国初创企业 `Car eWallet GmbH`^(⁷⁶)，旨在为包括汽车共享在内的出行服务端到端集成提供金融交易网络。该合资企业还致力于将自动驾驶汽车全面连接到汽车云，使其成为能够通过智能合约自动按需消费和支付停车、充电等出行服务的商业实体。这种由区块链驱动的机器对机器交易，是基于物联网实现传统商业模式数字化转型的绝佳范例。\n\
  \n除了交易和支付服务外，区块链技术也有望影响我们现代的 `共享经济` [36]，它指的是私人个体和利益团体之间对物品的系统性借用。在此背景下，有两个非常有趣的例子值得一提，即两个去中心化、由社区拥有的交通平台\
  \ `LaZooz` 和 `Arcade City`。这两家初创公司都利用区块链技术构建点对点的拼车网络，用以管理司机和用户之间的直接交互。这种方法有时被称为\
  \ `平台合作主义`，因为用户既是平台的贡献者，也是其贡献平台的股东。另一个非常有趣的例子是免费在线市场 `OpenBazaar`。与亚马逊和 eBay 类似，`OpenBazaar`\
  \ 允许用户注册商品，并向连接到网络的其他用户进行推广。但由于 `OpenBazaar` 利用区块链技术让买家和卖家直接互动，无需任何中心化中间商，因此它实现了零交易费和零平台费。只有当双方之间出现（法律）问题时，网络才需要第三方调解方介入，以决定是否放行付款。\n\
  \n\n\n\n### 当前商业应用：供应链管理与物流\n\n除了交易平台和支付服务之外，区块链技术的另一个非常流行的商业应用是`供应链管理` [37]。在贸易日益全球化的推动下，供应链在过去几年中变得非常复杂，并涉及位于不同国家的众多利益相关者。除了出口商和进口商，国际供应链通常还涉及托运人和货主、银行和保险公司、货运代理、多式联运运营商、海运和空运承运人、港口和码头运营商以及海关当局等。为了推进其特定服务，每一方都需要并签发某些文件，这些文件需要发送给供应链中的特定方，以成功通过特定的运输节点，例如图\
  \ 3-6 所示。\n\n例如，一辆电动汽车包含大约 6,000 个不同的零件，由数百家国际供应商和分包商制造。每个供应商都需要提供某些文件，例如用于会计核算和质量控制的文件，以确保整个供应链和制造过程的透明度和可追溯性——鉴于全球关于二氧化碳和其他对环境有害排放物的可持续发展目标，这一点变得越来越重要。区块链技术可以帮助管理、简化和优化这种复杂的全球网络。这对于全球运营的企业尤其重要，例如汽车制造商及其供应商，他们需要找到经济高效且实用的解决方案来有效管理日益复杂的供应链，同时遵守监管可追溯性要求。\n\
  \n区块链驱动的供应链管理系统最著名的例子之一是开放的数字航运平台“TradeLens”，该平台由 IBM 和全球最大的集装箱航运公司 A. P. 穆勒-马士基集团\
  \ [38] 共同实施。这个协作平台连接了全球范围内参与集装箱运输的所有相关利益相关者。整个供应链上的定制权限模型规定了谁可以添加、查看和更新特定信息，例如装箱单、提单、发票以及运输过程每个阶段不同利益相关者所需的其他证书。TradeLens\
  \ 提供各种工具，用于资产规划和利用、海关清关经纪、日程安排和风险评估等，并收集用于贸易融资和保险的实时信息。由于其更高的透明度，TradeLens 区块链允许不同的利益相关者端到端地优化和简化他们的供应链，摆脱基于纸张的传统工作流程。此外，它还允许更高的可预测性，从而可以显著降低安全库存和资产。据报道，该平台目前每周处理约一千万个事件和超过\
  \ 100,000 份文档 [38]。这种方法潜力巨大，因为任何时候都有超过 1500 万个集装箱在国际水域中运输或等待清关。食品行业也采用了类似的方法，以提高货物在整个供应链中的可追溯性，以便在出现健康或安全问题时，不同的利益相关者能够迅速做出反应\
  \ [39]。^(⁷⁷)\n\n![../images/505424_1_En_3_Chapter/505424_1_En_3_Fig6_HTML.png](img/505424_1_En_3_Fig6_HTML.png)\n\
  \n图 3-6\n\n典型的国际供应链，展示了最重要的利益相关者（顶行，方块）以及在流程中签发和交换的选定文件（底行，圆圈）。请注意，顶行中从左到右的水平箭头不表示货物的物理流动，而是表示运输过程的方向\n\
  \n德国汽车制造商宝马最近宣布了其基于区块链技术的“PartChain”供应链管理系统，该系统源于一个成功的购买前大灯的数字试点项目 [41]。PartChain\
  \ 扩展了这种方法，并将其扩展到更多的国际供应商，以确保关键和安全相关的汽车零部件及原材料的无缝可追溯性——从矿山到冶炼厂的全过程。宝马的愿景是“创建一个开放平台，允许供应链中的数据在整个行业内安全、匿名地交换和共享”\
  \ [42]。由于通用标准和控制模型对于此类平台的成功推广至关重要，宝马还于 2018 年共同创立了跨行业倡议 MOBI，即移动出行开放区块链倡议，该倡议汇集了全球\
  \ 120 家领先的汽车、移动出行和技术公司。^(⁷⁸)\n\n### 当前商业应用：消费品防伪\n\n区块链技术的另一个非常有趣的应用是密码学溯源平台，代号为“Aura”，目前由法国奢侈品牌集团\
  \ LVMH 酩悦·轩尼诗-路易·威登与微软 Azure 以及美国区块链设计工作室 ConsenSys [43] 联合开发。据称，Aura 将基于以太坊区块链提供强大的产品跟踪和追溯工具。这些工具允许消费者通过访问产品从原材料到最终销售点（包括二手市场）的端到端历史记录来验证其产品的真实性。Aura\
  \ 旨在涵盖价值链中的所有专业参与者，包括原材料矿商、制造商和分销商、金匠以及其他高度专业化的服务提供商。通过提供防欺诈的真实性证明，Aura 致力于有效且有针对性地打击近来在二手市场上日益增多的假冒伪劣产品的大规模生产。在该项目的第二阶段，该联盟旨在探索保护创意知识产权以及适用于奢侈品行业的其他应用。\n\
  \n### 当前商业应用：能源商品平台\n\n区块链技术在能源领域也有有趣的应用，这些应用大多与支付服务相关。例如，德国科技集团西门子和英荷石油天然气公司壳牌都投资了美国初创公司\
  \ LO[3] Energy。LO[3] 与当地公用事业公司和零售商合作，提供了一个名为“Pando”的基于区块链的社区能源平台。这个本地能源市场汇集了风能、太阳能等本地分布式能源资源，从而使客户能够买卖能源，同时自动在社区层面优化电网的利用。^(⁷⁹)\n\
  \n\n\n#### 当前商业应用：政府服务\n\n在本研究过程中，我还了解到中国综合性企业腾讯、中国信息通信研究院与深圳市税务局之间另一项有趣的合作，它们共同探索区块链技术在税务领域的应用\
  \ [44]。这项合作旨在创建并确立一种基于区块链的发票标准，从而支持实现自动化税务或*电子税务*系统，以简化审计流程、减少逃税行为并避免双重征税。^(⁸⁰)\
  \ 该基础标准是作为名为“基于分布式账本技术发票通用框架”的总体项目的一部分而制定的，该项目得到了包括英国、瑞士和瑞典在内的多个国家的支持。这只是一个非常有趣的例子，展示了区块链技术如何用于自动化传统且以往基于纸张的政府流程和服务。\n\
  \n#### 当前商业应用：区块链联盟\n\n由于行业中的大多数区块链应用都是侧重于形成协同网络的协作方式，因此各类组织开始在不同的区块链*联盟*中开展合作。迄今为止，全球已建立了超过\
  \ 40 个不同的联盟，它们或侧重于业务，或侧重于技术。第一类联盟针对特定的业务问题，例如供应链管理或支付服务；而第二类联盟则致力于开发可重复使用且标准化的软件模块，供联盟成员用于构建自己的区块链应用。一些联盟同时涵盖这两类活动，例如美国公司`r3`，它运营着一个名为“Corda”的区块链平台。全球区块链联盟的精选（非全面）列表如表\
  \ 3-5 所示，供您参考。^(⁸¹)\n\n**表 3-5**\n\n旨在促进区块链技术在商业中更广泛应用的精选国际联盟。牵头公司以斜体表示，区块链平台名称相应置于括号中。本概览部分基于文献\
  \ [45–47]。\n\n| 名称 | 精选成员（区块链平台） | 联盟范围 |\n| --- | --- | --- |\n| `Corda` | `r3`\
