- '# 2. 量子计算


  量子计算是本书中我们将要详细探讨的第一种数字支持技术。它有时被描绘成才华横溢的科学家在奇特的实验室里探索最隐晦的自然现象，旨在建造功能强大到几乎无所不能的科幻小说式超级计算机。但近来，这种公众认知正在发生改变，因为世界各地的多家科技公司已投资这项技术，将其应用于现实商业问题并探索潜在用例。例如，谷歌、微软、IBM
  和霍尼韦尔等公司，仅举几例这一持续进行的工业研究领域的先驱。他们频繁报告自己的最新成就，突出当前的商业应用，并强调这项数字技术的巨大前景。甚至《*纽约时报*》最近也捕捉到了这一趋势，将量子计算描述为“现代科学中最时髦、最神秘的概念之一”
  [1]。


  *《纽约时报》*的这篇文章是由谷歌在 2019 年末发布的一项声明引发的，该声明当时在全球科学界和媒体中引起了广泛关注 [2]。由美国物理学家约翰·马蒂尼斯领导（直至
  2020 年）的谷歌量子计算团队，当时正在使用其名为 `Sycamore` 的量子处理器进行一项实验。他们试图解决一个计算问题：生成一长串随机数，并反复检查其数值超过一百万次。这个结果本身在量子世界之外并无特别用处，但却引起了极大关注，因为该团队仅在约
  200 秒内就成功解决了这个问题，而据谷歌的信息称，一台最先进的超级计算机完成同样的计算则需要超过 10,000 年。该成果发表在世界上领先的多学科科学期刊《自然》上，标题为“使用可编程超导处理器实现量子霸权”
  [3]。谷歌传奇性的*量子霸权*宣称^(²²)（这是一个技术术语，指量子计算机在计算能力和速度上超越经典计算机）很快受到世界各地众多研究人员的质疑和挑战。最强烈的反对者是
  IBM [4]，他们主张最先进的超级计算机可以在大约 2.5 天内解决这个问题，而不是 10,000 年 [5]。此外，他们还提出，这个问题缺乏任何实际应用价值，并且是为展示量子霸权而专门设计的，等等其他论点。但撇开所收到的批评不谈，这个实验表明，量子计算正在逐渐成熟，现已准备好去解决人类面临的一些最困难、计算最复杂的问题。本章将探讨这场计算革命、其物理构建模块以及基本运行原理。


  为此，我们将首先讨论现代量子力学的基本概念，即量子计算背后的物理理论以及量子信息处理。在此背景下，我们将看到，由于量子力学的概率特性，原因与结果之间的关联已不复存在。我们将学习更多迷人的现象，例如不确定性原理、叠加态和纠缠态，并了解量子计算机如何利用这些奇异的量子效应来同时进行海量计算，并解决极其复杂的计算问题。我们还将关注市售的量子计算机，包括谷歌的
  `Sycamore` 处理器、IBM 的 `Q54` 以及 D-Wave 的 `2000Q` 和 `5000Q` 系统。在此背景下，我将向你介绍三种基本类型的量子计算机，即量子退火器、模拟器和通用量子计算机。这种区分尤其重要，因为每种类型仅适用于特定应用和用例。此外，本章将广泛探讨当前应用和潜在用例，并在最后一节提供一个易于使用的量子计算框架，你可以借助该框架，根据自己的想法和用例来接触这项具有革命性且可能具有颠覆性的技术。




  ## 2.1 奠定量子计算基础


  在 19 世纪末，大多数科学家认为物理学已无新发现，剩下的只是更精确的测量。然而，随着著名德国物理学家、后来的诺贝尔奖得主马克斯·普朗克的发现，这一评价被证明是一个严重的误判。在柏林洪堡大学的实验室里，他正在研究所谓的*黑体辐射*，即黑色物体发出的热辐射。他惊奇地发现，这类物体在烤箱中加热时，并非连续地释放热能，而是以一个个小包的形式释放——即某个微小自然量的整数倍，这一量后来被称为*普朗克常数*。这个量描述了自然在其最基本尺度上变化的最小量或*量子*^(²³)。^(²⁴)
  起初，马克斯·普朗克并不相信这一观测结果，因为它与著名博学家戈特弗里德·莱布尼茨的论断相悖——莱布尼茨曾宣称“自然界从不跳跃”，其拉丁文翻译“*natura non
  facit saltus*”成为了一句名言。


  随着时间的推移，越来越多的实验证实，能量和质量等物理性质确实是以微小步长变化的。阿尔伯特·爱因斯坦后来也运用这一概念解释了*光电效应*^(²⁵)，并因此于 1921
  年获得了诺贝尔奖。马克斯·普朗克的开创性发现标志着旧物理学理论——所谓的*经典物理学*——与现代*量子物理学*之间的转折点。经典物理学基于描述宏观物体的*经典力学*，即我们所熟悉的自然尺度。这一理论深受英国博学家艾萨克·牛顿及其传说中苹果的影响——那个苹果启发他提出了万有引力理论。美国金融家兼慈善家伯纳德·巴鲁克曾精妙地描述这一发现：“千百万人看到了苹果落下，但只有牛顿问为什么。”
  在最小、最基本的尺度上，自然是量子化的，其效应已无法用经典物理学来解释——艾萨克·牛顿肯定会为马克斯·普朗克的发现深感不安。这些效应需要用量子物理学及其基础理论*量子力学*来描述，正如我们接下来将看到的，这充满了意外与神秘。著名美国物理学家、诺贝尔奖得主理查德·费曼曾指出：“我可以肯定地说，没有人真正理解量子力学。”


  量子力学——现代物理学除广义相对论外的另一基石——为包括智能手机和电视在内的几乎所有电子设备奠定了基础。它也为量子计算机提供了理论概念，因此，仔细审视这一激动人心的现代物理学理论是富有启发性的。在其当前版本中，量子力学主要由德国物理学家埃尔温·薛定谔和沃纳·海森堡发展而来，两人均因其开创性工作以及对这一持续深入研究的领域的重要贡献而荣获诺贝尔奖。


  ### 量子化


  量子化是现代物理学的一项原理，指能量和质量等物理性质并非连续地（增加或减少）变化，而是以微小步长离散地变化。最小的步长称为*量子*，量子化原理因此得名。一个例子是描述能量阶梯式变化的普朗克常数。


  量子力学——正如其名——描述量子的动态行为，即自然最基本构建模块之间的作用与反作用关系。这些构建模块非常微小，人眼不可见，被称为*基本粒子*。与原子和分子不同，基本粒子不能再被分割成任何子成分。换言之，它们是不可分割的，因此是宇宙中最小的构建模块。天体物理学家计算出，可观测宇宙中总共包含超过
  10⁸⁶ 个基本粒子，这真是一个令人叹为观止的数量级。它们或自由游荡，或相互结合形成分子，进而构成星云、星系、恒星以及行星，包括我们美丽的地球。作为对比，一个普通人总共包含超过
  10²⁷ 个基本粒子。根据所谓的*标准模型*，物理学家共区分出 17 种基本粒子。根据它们的物理性质，如电荷及其相互作用的奇特方式，这些粒子可分为两大基本类别：*玻色子*和*费米子*。最著名的玻色子是*光子*，它是光的基本组成单元；而*电子*是最著名的费米子。电子携带负电荷，因此促成了电流的传输，电流流经智能手机以及你能想到的所有其他电子设备。光子和电子这两种粒子都常用于实现量子计算机，这就是我们将在下一节研究它们量子力学性质与物理特性的原因。


  ## 2.2 量子力学的奇异世界


  自然在最小尺度上的行为非常奇特且反直觉。从经典物理学和我们的日常经验中，我们知道物理过程完全由先前存在的成因决定。换句话说，知道一个物理系统现在的状态，就能决定其明天或任何后续时刻的状态。例如，一辆以恒定速度
  100 英里/小时行驶的车辆，除非因某种原因加速或减速，否则下一小时将行驶 100 英里。一切都可以被计算并以非常高的精度预测，因为作用之后必然有反作用，这在艾萨克·牛顿发展的经典力学中通常被称为*因果决定论*。




  ### 2.2.1 诡异的量子现实


  对于量子力学对象，例如电子和光子，这种情况彻底改变了，一切都变得不那么确定，反而相当模糊。这与量子力学的概率本质有关，这意味着一个量子力学对象的当前状态，只决定了该对象随时间演化为特定状态（或称“状况”）的概率（“可能性”或“机会”）。经典物理学的因果决定论和精确性，在量子力学中被*概率方法*所取代。这是包围我们的经典世界与描述包括光子和电子在内的最微小尺度自然界的量子力学之间，一个重大且真正惊人的区别。


  通过比较经典的过山车和虚构的量子力学版本，可以最好地阐明这一重大区别的后果。想象你正在最喜爱的游乐园里乘坐过山车。付了入场费后，你坐在心仪的车厢里，希望开始放松。在某个时刻，车厢离开起点，被电动机拉上斜坡。让我们用字母
  `A` 来表示第一个山坡顶点的高度，如图 2-1 所示。到达 `A` 点后，你的车厢将加速向下冲向过山车的最低点 `B`，然后开始攀登第二个山坡，朝向 `D`
  点。在半途中，你的车厢到达 `C` 点。根据经典力学（及其能量守恒定律），很容易推导出你永远无法到达任何比 `C` 更高的点，因为你没有足够的能量这样做——为简化起见，我们假定此时你的车厢没有任何电机拉动上坡。因此，你无法到达甚至越过
  `D` 点。这个第二道山坡在经典力学中因此被称为不可逾越的*能量势垒*。你在 `A` 点和 `C` 点之间的行驶完全是确定性的，例如，你到达 `B` 点的时间可以根据你的质量和起始时间以非常高的精度计算出来。


  `![../images/505424_1_En_2_Chapter/505424_1_En_2_Fig1_HTML.png](img/505424_1_En_2_Fig1_HTML.png)`


  **图 2-1** 量子力学过山车的隧道效应解释（从 `C` 点到 `E` 点的虚线箭头，灰色车厢）


  现在想象你乘坐的是一辆虚构的量子力学过山车。在这种情况下，我们不能再使用经典力学来确定你骑行的即时演化。对于这样一个量子力学的过山车，你的乘坐体验彻底改变，旅程变得相当颠簸。好消息是，测量你的车厢是否离开了起点相当容易。但坏消息是，关于你的量子之旅，几乎没什么可说的了。一旦你离开了起点，实际上就不可能确定你在过山车上的确切位置，因为你的行驶不再是确定性的。因此，在不测量其位置的情况下，我们简直不知道你的车厢在某个特定时刻究竟在哪里。这种现象被称为*海森堡测不准原理*，是量子力学的核心。你的量子力学车厢的位置不能再以过山车上的单一位置来描述，而只能用一个（随时间变化的）位置分布来描述，每个位置对应不同的出现概率。这种分布被称为*波函数*，它为你的车厢在过山车上的每个位置分配一个特定的出现概率。换句话说，你在最低点
  `B` 的概率可能是 40%，而在 `C` 点的概率是 60%。无法根据你的起始时间或任何先前测量的位置来计算出你的车厢在量子力学过山车上的确切位置——你基本上同时存在于（以一定概率）任何地方，这是一种被称为*非定域性*的量子力学行为。这真的很奇怪，不是吗？


  **海森堡测不准原理**


  测不准原理是量子力学概率本质的直接后果，它指出一个量子力学对象的动量和位置（或能量和时间）无法同时被精确测量。


  当我或任何其他人——即所谓的*观测者*——通过用相机或光电屏障反复测量你的位置，从外部观察你时，情况就变得更加离奇了。外部观测者的单纯存在就会彻底改变你的乘车体验。例如，在
  `B` 点拍一张照片，要么确认你的车厢在那个点，要么确认不在。换句话说，找到你的车厢在 `B` 点的概率要么是 100%（“车厢在 `B` 点”），要么是 0%（“车厢不在
  `B` 点”），因为一次测量总会揭示一个离散（或“具体”）的结果。但仔细观察，这确实很奇怪，因为上述的概率分布或波函数必须在测量的瞬间突然消失，并变成要么 100%要么
  0%。这就是著名的*波函数坍缩*，它只会在有人观察你并测量你的位置时发生。一旦观测者停止观察你，概率分布立刻重新出现，你又同时无处不在又无处可寻。这确实相当不可思议，并且从经典物理学的角度来看完全出乎意料。


  量子力学过山车还揭示了另一种神秘行为：当你为你的车厢计算波函数时，你会发现存在一个真实的机会（技术上称为有限概率）能在 `D` 点之外找到你的车厢——而 `D`
  点从经典物理学角度看被证实是不可逾越的。换句话说，尽管根据经典力学你没有足够的能量，你仍有一定的概率越过 `D` 点。在量子力学中，你可以简单地直接隧道穿越，从
  `C` 点穿过山坡到达 `E` 点，最终到达 `E` 点，并在那里继续你颠簸的旅程，如图 2-1 中虚线箭头所示。这种穿越经典不可逾越能量势垒的量子力学现象被称为量子隧穿或*隧道效应*，有时也被描述为量子力学对象“穿过紧闭的大门”。自
  1896 年法国物理学家亨利·贝克勒尔发现以来，隧道效应已在无数实验中观察到，例如放射性原子的衰变。


  **隧道效应**


  隧穿指的是一种反直觉但自然的物理现象，量子力学对象（如光子和电子）虽然根据经典物理学没有足够的能量，但仍然能够穿越能量势垒。



