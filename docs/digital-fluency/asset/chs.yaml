- '# 1. 数字化与数字化转型


  `数字化`是当今重塑各行各业与社会各领域的技术趋势，被视为推动创新与颠覆性变革的主要且不可阻挡的力量，对公共和私营组织构成了同等挑战。随着所有经济和社会领域都受到影响，数字经济充满活力且竞争日益激烈。它赋能那些由数十亿美元风险资本支持的新兴初创企业，通过利用数字技术创造新颖的价值主张。这些企业高度可扩展、以数据驱动和软件为核心的运营模式，正在不断冲击现有企业，对其业务构成存亡威胁。不妨想想`苹果`的`iOS`和`谷歌`的`Android`智能手机。这两家公司通过构建统一的数字平台，吸引了不断扩展的第三方应用开发者生态系统，最终导致`诺基亚`从手机行业的霸主地位跌落，变得无足轻重。这种故事正威胁着在经济领域各处重演：`亚马逊`、`微软`和`谷歌`的云计算服务正在挑战传统的软件和硬件提供商；`亚马逊`和`阿里巴巴`的在线市场正在取代传统零售商，并挑战诸如按需服务的`沃尔玛`等公司；`Netflix`和`Hulu`的视频点播服务即将颠覆传统的付费电视提供商。另一个非常流行的例子是在线预订平台`Airbnb`和`Booking.com`，它们利用数字技术简化预订流程，提供个性化和量身定制的旅行体验，同时颠覆了包括`万豪`、`希尔顿`和`凯悦`在内的传统连锁酒店业务。为了获取数字技术带来的好处，那些已成立的组织——无论其在公共还是私营领域运营——都必须将数字技术融入自身生态系统，通过通常被称为“数字化转型”的组织变革过程，来推进其产品和服务组合。对于相比`亚马逊`、`谷歌`、`微软`等公司并非“生于数字”的企业而言，这一技术适应过程尤其具有挑战性，因为这些企业需要进行深远的业务转型，这很可能颠覆既有的工作设计和内部业务流程，并要求全新的思维方式和协作模式。


  然而，许多公共和私营部门的组织都难以理解数字技术对其业务和服务模式的影响。大多数企业领导和员工错误地认为，将文档数字化，并使用`Skype`或`Microsoft
  teams`取代移动电话，便能自动实现其组织的数字化转型。但数字化转型——正如我们将在本书中了解到的——远不止是将数字技术整合到现有组织结构中。它关乎创建一种敏捷、开放、持续学习和创新的企业文化，以释放诸如量子计算、区块链技术和人工智能等数字技术的潜力，从而提高生产力和竞争力，并为客户和员工创造可持续的价值。通过数字化其“核心”，即最关键的信息技术基础设施、系统和流程，组织可以消除传统瓶颈，实现前所未有的可扩展性和增长——数字本身只是一个赋能者，而非一个时髦的终点。


  根据`麦肯锡公司`最近一项关于数字化转型的调查，超过 80%的被分析公司表示，它们在过去五年中已经开展了此类变革努力。但仅有 16%的极小部分公司确认，它们成功地改善了绩效，并使自身业务在长期内不易受到颠覆和破产的影响[1]。另一方面，其他商业分析师评估了数字化转型对工作岗位和就业的影响，发现目前美国近
  40%的工作岗位属于可能萎缩的职业[2]——其他国家实际上也存在类似数据。在全球范围内，这一比例意味着到 2030 年，将有超过 7500 万至 3.75 亿劳动者需要转换职业并更新技能，以避免失业[3]——这确实是一个令人震惊的规模。这些数字有力地表明，数字技术将在中长期内重塑并颠覆组织，包括成千上万个工作岗位。因此，作为思想领袖、顾问、投资者或员工，我们有必要通过研究数字技术的基本原理并学习其应用，为数字化做好准备，提升我们的技能、资质和对数字技术的了解。我们无需人人都成为量子物理学家、区块链程序员或数据科学家。但了解数字技术栈的概况，理解其运作原理和能力，将使我们能够跟进媒体中的这些趋势，理解创新产品和服务，评估应用场景和潜在用例，并最终在我们自己的职业环境中推动数字化转型。数字化基本上为我们所有人设定了一项任务：积极塑造我们面前的数字未来。


  在本章中，我们将学习数字化的基本概念和数字化转型，并更好地理解其颠覆性力量的性质和起源。所介绍的概念是理解量子计算、区块链技术和人工智能这三项最重要技术的前提，这些技术赋能并促进了组织的数字化转型。但在深入探讨这些概念之前，先回顾一下历史上那些曾塑造了我们行业和社会的其他变革，将颇有教益。




  ## 历史上的业务转型


  科技始终在塑造着商业与社会。研究这种相互依存关系的历史学家提出，人类经历了四次重大的*技术采用浪潮*，每一次浪潮都伴随着社会的剧烈变革和产业生产力的提升 [4]。第一次大浪潮与蒸汽机有关，它由英国军事工程师托马斯·萨弗里上尉于
  1698 年发明，能将沸腾水产生的蒸汽转化为机械能。蒸汽机最初是为了从煤矿业中被淹没的矿井中抽水而发明的 [5]，但很快也催生了其他工业领域的技术创新。例如，蒸汽机被用于驱动英国纺织业的机械化织布机，与简单的手纺车相比，生产力提升了八倍。然而，蒸汽机的应用不仅局限于采矿业和纺织业。大约一百年后，随着蒸汽轮船和蒸汽机车的出现，它还彻底改变了运输业。这两项创新带来了进一步的巨大变化，因为从那时起，人类和货物可以在更短的时间内实现远距离移动。1760
  年至 1840 年^(²)这段时期被称为*工业革命*或工业 1.0。在制造业和运输业中采用蒸汽和水力，对现有公司产生了深远的影响，也促进了新业务的拓展，因为人类的创造力不再受限于纯粹的肌肉力量。但工业革命也通过创造新的工作岗位和职业（例如制造业领域的机械维护工程师和质量工程师），以及用自动化流程取代体力劳动，对社会产生了重大影响。其结果是，这第一次技术采用浪潮提高了生活水平，使整个欧洲减少了对农业的依赖，并以（消费）商品的大规模生产为核心——这其中利弊并存。


  进入 19 世纪，三位物理学家安德烈-玛丽·安培、迈克尔·法拉第和詹姆斯·克拉克·麦克斯韦的开创性工作为下一次技术采用浪潮奠定了基础，这一浪潮涉及电力的发现，被称为*技术革命*或工业
  2.0。电被证明是一种非常便捷的方式，能以最小损耗远距离传输大量能量（即执行工作的物理能力），从而为灯泡、重型工业机器和其他电子设备供电。它还启发了汽车先驱亨利·福特，他将电力与大规模生产的概念相结合，并于
  1913 年从他的高地公园福特工厂开始，将移动式底盘装配线引入汽车工业。^(³)传统上，汽车是在固定工位进行装配，由不同的工人来到车辆旁交付和组装所需的部件。而在装配线上，车辆会在自动传送带上依次经过一系列工位，工人们则固定在各自位置，执行高度专业化、重复且标准化的装配任务。在美国工程师弗雷德里克·泰勒及其被称为*泰勒制*的高效工作流程控制原则的帮助下，亨利·福特成功地将他那传奇的
  T 型车（被亲切地称为“锡丽兹”）的装配时间缩短了十分之九，这一改进极大地降低了制造成本。关于标准化，亨利·福特曾指出：“任何顾客都可以将汽车漆成他想要的任何颜色，只要它是黑色的。”电力驱动的装配线很快几乎在所有行业中提高了生产力，同时大幅降低了制造成本和工人的体力负担。毋庸置疑，在
  1840 年至 1970 年间，电力和装配线的引入对社会产生了重大影响，它们在制造业领域创造了大量新的工作和职业，同时也淘汰了其他一些岗位。


  与本书介绍的数字化技术尤为相关的是第三次技术采用浪潮，即所谓的*信息革命*或工业 3.0。从 20 世纪 70 年代开始，公司开始通过存储程序控制器（个人计算机的前身）来实现工业制造的自动化。通过采用这种计算机控制，它们能够在没有任何人工协助的情况下部分实现生产流程的自动化。这项技术的理论基础可以追溯到
  1947 年，当时三位美国物理学家及后来的诺贝尔奖得主约翰·巴丁、威廉·肖克利和沃尔特·布拉顿在美国新泽西州著名的贝尔实验室发现了晶体管。这种微小的电子开关，我们将在后文进一步详细研究，它很快成为了个人计算机以及几乎所有利用微芯片处理数字信息来控制制造过程的电子设备的基本构建模块。IBM
  首款基于晶体管技术的商业化产品是 IBM 608 系统，这是一个橱柜大小的会计计算器，总计包含 3000 多个晶体管。相比之下，我们今天使用的计算机和电子设备在应用上更强大、更多样化，并且一个微芯片中可能包含数十亿个晶体管。




  '
- '# 我们目前正处于第四次技术浪潮的筹备阶段，即所谓的`*网络革命*`或工业 4.0。^(⁴) 这一时期大致从 2017 年开始，通常指信息与通信技术在工业中的应用。工业
  4.0 通过将计算机化生产系统与现代通信技术相结合，构建由互联传感器和计算设备组成的网络，从而实现所谓的`*数字孪生*`，以此推动计算机化生产系统的发展。这种生产线的虚拟计算机表示形式可实现生产的实时优化和统计过程控制，使产品能够自主导航通过生产线，同时旨在自动寻找最佳生产资源。这样的网络亦被称为`*物联网*`（`IoT`），其特点是由电子传感器和设备构成的互联系统，具备自动化感知、数据处理、分析与执行能力。工业物联网彻底改变了人与机器的交互方式。试想一下，采用先进传感技术的智能协作机器人，能够安全地与工人协作，帮助他们完成复杂的装配任务或搬运重型产品。除了这种自动化，工业物联网还能实现经济高效的预测性维护流程、自我优化的生产线、自动化库存管理以及其他适合自动化过程控制的工业流程。^(⁵)
  物联网还有望推动`*智能工厂*`[8]的落地，在这种工厂中，生产系统几乎自主运行，决策过程通过数据分析和其他数字支持技术实现自动化。工业物联网既可以通过利用本地计算资源来实现，也可以按需使用外部资源，例如
  `Siemens MindSphere`、`AWS IoT` 和 `Google IoT`。


  ## 物联网


  物联网是一个互联对象的网络，它构建了一个具备感知、自主和可操作能力的系统。从不同对象获取的数据被聚合在一个存储平台上，以便提供给数据分析服务和功能使用，这些功能能整合不同来源的原始数据，分析其共同含义，并将其转化为具体行动。


  在此背景下，著名美国经济学家、哈佛商学院教授迈克尔·波特——其关于竞争战略的著作已成为该领域的经典^(⁶)——早在 2014 年就曾推测：“正是智能互联产品及其生成数据的扩展能力，正在开创一个竞争的新时代”
  [9]。《经济学人》将数据描述为“新石油” [10]，对于那些未能适应这些数字技术的传统组织来说，生存威胁确实非常真实 [11]。


  ## 1.2 创新与颠覆理论


  细心的读者可能已经注意到，在我们之前的讨论中，催生四次技术浪潮的技术，例如蒸汽机、电力和晶体管，有三个共同点。它们：


  1.  在本质上都是`*普遍存在的*`，并且不局限于特定工业部门。相反，它们会逐步扩展，催生其他技术创新并引发各种溢出效应。


  2.  在技术、生产力、成本和速度等方面，相对于现状提供了显著的`*改进*`。


  3.  与其他（现有）技术具有`*互补性*`，例如用于织布机的蒸汽机或用于装配线的晶体管。


  这就是为什么研究科学进步与技术变革之间联系的经济学家将这些技术称为`*通用技术*`，因为它们具有通用性质，并且能在多个领域实现多样化应用 [12]。通用技术通常是非竞争性和持久的，扮演着`*赋能技术*`的角色，通过开辟新机遇和催化新一轮互补性创新浪潮来发挥作用，而不是提供完整和最终的解决方案
  [13]——事实上，晶体管本身用途相当有限。互联网就是一个通用技术的绝佳例子，它引入了生产、分发、访问和重用数字信息的新方式，从而催生了在线市场、社交网络平台等创新。


  在成熟的`*现有组织*`中，采用通用技术需要其内部进行重大的组织变革，因为这些组织通常会专注于以非常高效的方式长期完成某一特定任务。为此，它们建立了常规流程、官僚机构、职业发展路径、激励制度和嵌入式的规范体系。此外，它们还实施了流程并建立了遗留系统，这些系统相互强化并助长惯性，使得采纳通常促使组织以不同方式运作的新技术变得越来越困难。这就是为什么通用技术对既有且非常成功的组织，尤其是对它们而言，是一种特殊威胁。通过引用这种普遍的行为模式，两位美国经济学家丽贝卡·亨德森和金·克拉克也将此类创新称为`*架构创新*`，以强调采用这些创新需要组织改变其内部使用的不同技术组件和系统之间的架构
  [14]。这对组织来说可能极具挑战性，但最终往往回报丰厚。架构惯性（对技术适应的抵抗）的概念也为哈佛大学克莱顿·克里斯滕森和约瑟夫·鲍尔在 1995 年提出的`*颠覆理论*`提供了依据
  [15]。这两位美国经济学家当时正在研究硬盘驱动器行业，并自问为什么某些公司能够通过采用新技术获得并保持竞争优势，而另一些公司却未能做到并最终破产。在他们的概念中，他们区分了两大类：


  1.  `*持续性技术*`改进了客户已经看重的现有技术或产品的属性。它们 (i) 让好产品变得更好，(ii) 通常瞄准市场高端、利润最高的客户，并且 (iii)
  提高利润率。换句话说，持续性技术能够生产出更好的产品，这些产品可以以更高的利润销售给公司的最佳客户。一个例子是仅仅取代了基于真空管技术的电视机的平板电视。




  ## 2. *颠覆性技术*


  *颠覆性技术*具有与客户以往看重的特性截然不同或全新的属性，在文献中有时被称为通用技术的“子类”。它们本身又可分为两个子类别：即低端颠覆和新市场颠覆：


  1. *低端*颠覆通常针对被过度服务的客户，提供价格实惠、易于获取且“足够好”的产品，但并未展现出超越市场平均水平的卓越性能。^(⁷) 想想那些以更廉价方式完成与传统百货公司相同业务的折扣卖场即可理解。


  2. *新市场*颠覆则与非消费现象竞争，目标客户是此前无法获得某种产品或服务的群体。相较于个人电脑，智能手机可被理解为新市场颠覆的实例，因为它们提供了与个人电脑类似的功能（如互联网和电子邮件），同时对于因拥有成本过高而无法使用个人电脑的（大众市场）客户而言更为经济实惠。苹果公司的传奇创始人史蒂夫·乔布斯在
  2007 年产品发布会上用著名的“今天，苹果将重新发明手机……这是史上第一次将互联网装入口袋”来描述第一代 iPhone。新市场颠覆的一个重要关键特征是：它们首先被广泛采用，之后社会才逐渐适应。


  后来，克莱顿·克里斯坦森意识到颠覆的根源并非技术本身，而是其对商业战略和模式的影响，便将“持续性技术”和“颠覆性技术”这两个术语替换为“持续性创新”和“颠覆性创新”。在此背景下，需要重点指出的是，几乎没有任何一项创新本质上就是持续性的或颠覆性的。这种属性是在将其投入市场、并与市场上已被采用的其他技术进行比较时才被赋予的。例如，闪存驱动（即
  U 盘背后的技术）对硬盘驱动器而言是颠覆性的，但对于用于构建个人电脑工作内存的动态随机存取存储器技术^(⁸)而言则是持续性的。


  颠覆是一种力量，自始至终塑造着市场及其竞争格局。当低端和新市场颠覆性创新变得成熟且稳健时，它们会对那些未能利用新兴技术改进产品和服务的现有企业构成直接威胁。在此背景下需要指出的是，对于市场中的现有参与者而言，颠覆通常在构成威胁之前很久就是一种机遇。最能体现这一点的著名案例之一便是由美国商人乔治·伊士曼于
  1880 年创立的传奇伊士曼柯达公司。乔治·伊士曼此前发明并获得了用于显影摄影胶卷的干版配方专利，这是一种适合大规模生产的工业流程。随后，他在 1888 年推出了一款廉价（手持式）胶片相机，其设计正是为了使用这项技术。凭借“你按下快门，剩下的交给我们”这句口号，他在接下来的几年里通过专注于廉价相机和高效胶卷显影流程，构建了一个非常成功的商业模式。柯达很快成为该行业的市场领导者，在美国占据了约
  90%的胶卷市场和 85%的相机销售额[16]。但是——你可能已经猜到了——这个摄影帝国随着 20 世纪 90 年代进入低端市场的数码相机的颠覆而陨落。颇具讽刺意味的是，发明数码摄影并制造出世界上第一台数码相机（1975
  年）的正是柯达工程师史蒂文·萨松。但柯达管理层对这一早期原型机的低性能非常怀疑，未能看到其颠覆性潜力可能重塑他们的业务、并消除积累了几十年的竞争优势——颠覆性技术在成为威胁之前很久就是一次机遇。相反，柯达管理层认为，一旦数码摄影这一暂时趋势消退，消费者将重新关注冲印。因此，他们开始动用庞大的营销机器来保护自己的业务。与将数字技术很好地整合到业务中的主要日本竞争对手富士胶片不同，数字摄影的颠覆力加剧了柯达的（架构性）惰性，并未催化任何变革或数字化转型。等到他们意识到自己完全误判并推出第一款自有数码相机时，为时已晚，柯达的衰落已不可避免。这家拥有
  120 年历史的公司于 2012 年申请破产保护，出售了专利，并于 2013 年以一家规模小得多的公司重新出现。2018 年，其报告的销售额约为 13.3 亿美元，仅为其
  37 年前传奇价值的十分之一。这个例子以及无数其他例子证明，商业颠覆不是会不会发生的问题，而是何时发生的问题。这就是为什么思想领袖应通过主动寻找并努力实现自我颠覆来预见变革，而不是在变革发生时才被动应对。


  伊士曼柯达公司只是克莱顿·克里斯坦森所称的*创新者困境* [17] 的一个例子。这个术语指的是市场领先组织所面临的挑战：既要利用现有核心业务，又要探索能够确保未来市场领导地位、避免因市场出现新的颠覆性参与者而导致经济失败的新的颠覆性创新。就柯达而言，这种困境体现在是否投资数码摄影的决策上。受边际思维引导，柯达管理层比较了现有胶卷业务的边际成本与数码摄影的边际成本，得出了继续发展其成熟胶卷业务利润更高的误导性结论。换句话说，*边际思维*使他们偏向于关注过去成功的事物，而非引导他们去创造未来所需的数字能力。柯达最终未能将数码摄影识别为颠覆性技术或该市场的“下一个大事件”，并最终为不投资付出了总成本^(⁹)，而不是为投资数码摄影支付低得多的边际成本^(¹⁰)。经济失败往往是这种边际思维的后果。与成熟的核心业务相比，对未来创新（包括本书介绍的三大数字技术）的投资几乎总是伴随着低边际利润和高边际成本。但由于这些投资往往对组织未来的成功至关重要，因此重要的是从*不投资*所带来的总成本和战略后果的角度来评估对未来创新的投资——边际方面的考量是次要的。美国汽车先驱兼商人亨利·福特用一句名言很好地描述了这一见解：“如果你需要一台机器却不去买它，最终你会发现你为它付了钱，却没有得到它。”掌握了这些见解、例子和术语后，我们现在可以开始讨论本书介绍的三大数字技术，它们作为通用技术，正展现出颠覆性力量并驱动着数字化转型。




