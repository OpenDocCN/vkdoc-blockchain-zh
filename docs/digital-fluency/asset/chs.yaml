  #### 计算机视觉：购物技术


  亚马逊无人商店于 2018 年推出，是在美国运营的一家连锁便利店，在西雅图、芝加哥、旧金山和纽约市已开设或宣布开设了 26 家门店。这些商店实现了部分自动化，顾客无需经过收银员或使用自助结账台即可购买商品。顾客只需在智能手机应用上登录，该应用即可授权顾客进入商店，并提供用于自动结账的移动支付系统。这种亚马逊称之为“即拿即走”的技术，基于由深度学习和`sensor
  fusion`^(¹¹⁶) 驱动的计算机视觉，能够自动跟踪您拿取的商品并将其添加到您的虚拟购物车中。该系统包括众多摄像头、货架上的感应装置以及自动出口闸门，如图
  4-15 示意所示。这些组件的信号首先由一个流媒体服务聚合，这是一个云平台，它使所有数据可用于进一步处理。“即拿即走”技术单元分析这些数据，识别顾客，分析他们的活动，并识别商品，从而将特定的顾客
  ID 与所选商品集合关联起来。为此，深度学习被用于顾客关联、物品识别、姿态估计和行为判定，以精确回答关于“谁拿了并打算买什么”这一关键问题。这些信息会被持续添加到虚拟购物车中，并在结账时被检索以向相应顾客收费。据亚马逊此项技术的首席科学家
  Gerard Medioni 称，主要的挑战确实在于人员识别步骤，因为顾客可能彼此靠得很近，或者被店内的某些物品挡住视线，他们分别称之为“纠缠状态”和“遮挡”。亚马逊还于
  2020 年开始向其他零售商授权这项技术 [87]。关于这种基于人工智能的复杂数字技术的非常详细的介绍，可参见例如 [88]。


