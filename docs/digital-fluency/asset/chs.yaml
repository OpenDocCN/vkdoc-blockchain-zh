- "# 2.5 量子计算框架\n\n您是否正在考虑在组织中使用量子计算，或将其应用于您的具体用例？如果您对以下实施清单中的大部分关键问题的回答是“是”，那么量子计算很可能有助于您实现自己的商业构想或用例。\n\
  \n1.  您的用例涉及什么——它是否属于以下通用类别之一？是 □ 否 □\n    *   采样问题\n    *   优化问题\n    *   大型数据库搜索\n\
  \    *   模拟与建模\n    *   求解线性方程组\n    *   整数因式分解（例如用于密码学）\n    *   随机数生成（“可验证随机性”）\n\
  2.  之前是否有过类似的用例被描述过（在文献或媒体中）？是 □ 否 □\n3.  您的组织中是否存在依赖或需要超级计算的持续流程？是 □ 否 □\n4.  您是否将资源（人力、财力等）花费在试错替代方案上——例如湿实验室实验或物理原型制作——而这些方案本可以通过超级计算的支持或替代来加速？是\
  \ □ 否 □\n5.  您是否拥有维护量子计算硬件和开发量子软件（算法）所需的所有人力资源，例如技术工程师、物理学家和程序员？是 □ 否 □\n6.  您问题的可能解的数量——即所谓的搜索空间——是否呈指数级大于输入数据量？如果不是，则该特定问题不适合用量子计算机解决。是\
  \ □ 否 □\n7.  经典计算机是否无法在合理的时间尺度内快速且便捷地解决您的用例？是 □ 否 □\n8.  您问题的解决方案是否非常紧迫，并且您没有足够的时间在经典计算机上解决您的用例？是\
  \ □ 否 □\n9.  您的生态系统中有任何人（例如合作伙伴或竞争对手）已经在应用量子计算吗？是 □ 否 □\n10. 量子计算能否为您提供持久的竞争优势？是\
  \ □ 否 □\n    规划实施时需要进一步考虑的问题：\n    *   预期谁会（在组织内部或外部）使用量子计算机，他们有什么期望？\n    *   您将如何将量子计算机集成到现有的\
  \ IT 基础设施中（本地部署或按需使用）？\n    *   谁需要维护其技术基础设施？\n\n## 2.6 延伸阅读\n\n在本章结尾，如果您希望更深入地了解量子计算及其应用这个激动人心的领域，我想为您提供一些延伸阅读的建议：\n\
  \n*   Hidary, J. D.：《量子计算：一种应用方法》，斯普林格国际出版公司，2019 年。\n*   Nielsen, M. A. 和 Chuang,\
  \ I. L.：《量子计算与量子信息》，剑桥大学出版社，2010 年。\n*   Feynman, R. P.：《费曼计算学讲义》，西景出版社，2000 年。\n\
