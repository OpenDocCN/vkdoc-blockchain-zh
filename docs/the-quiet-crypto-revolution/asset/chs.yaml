- "# 序言\n\n作为本书的作者，我希望花一点时间分享我个人的心路历程，正是这段旅程促成了这部作品的诞生。\n\n多年来，我阅读了许多鼓舞人心的书籍，一直梦想着如果能将自己的知识与他人分享，帮助他们改善生活，那该有多好。我指的是诸如斯蒂芬·柯维的《高效能人士的七个习惯》、吉姆·柯林斯的《从优秀到卓越》（及其续作《基业长青》）、丹尼尔·卡尼曼的《思考，快与慢》、西蒙·斯涅克的《从“为什么”开始》等著作。\n\
  \n这些书籍对我理解生活和商业的方方面面产生了深远的影响。它们激励我以不同的方式思考，并勇于质疑现状。正是这些书籍的作者们启发了我，让我开始动笔书写自己的著作，试图去激励他人。我谦逊地承认，自己远未达到这些作者的水平，但通过撰写本书，我的目标仅仅是用我所获得的知识和见解去启发他人，并激发他们的兴趣。\n\
  \n我之前的著作《100%成功的 IT 项目》源于我二十多年管理 IT 项目的经验。我觉得通过分享多年来获得的一些关键见解，可以帮助他人驾驭复杂的 IT 项目管理世界。撰写第一本书是一段充满挑战又富有启发性的经历，因为我必须学会从简洁直接的报告写作风格，过渡到书籍写作所需的更具描述性和叙述性的风格。这段经历教会我，尽管写书并非易事，但过程充满乐趣，而且我绝对想再写一本。\n\
  \n现在，回到这本书。早在 2010 年，我与一群对技术和创新有浓厚兴趣的软件开发同事共同参与一个项目。一天午休时，话题转向了一种相对不知名的数字货币——比特币。我的同事们兴奋地讨论着去中心化数字货币的概念，以及他们计划构建一个交易机器人来抓住这个新兴市场的机会。\n\
  \n当时，比特币仍处于萌芽阶段，我对这种在传统金融体系之外运作的货币概念产生了兴趣。随着讨论的深入，我越发着迷于这项新技术的潜力。我开始研究比特币，深入阅读白皮书、论坛和文章，尽可能多地学习其底层技术——区块链的知识。\n\
  \n在探索比特币世界的过程中，我开始理解区块链技术超越加密货币的广泛意义。显而易见，这种去中心化、透明且安全的技术能够对各行各业产生重大影响，有可能彻底改变从供应链管理到医疗保健和投票系统的一切。\n\
  \n我的好奇心被点燃了。我决定参加一个专注于区块链技术的本地聚会。在那里，我遇到了其他志同道合的人，我们共同热衷于区块链改变生活和工作方式的潜力。我们交流想法，讨论这项突破性技术可能带来的无数可能性。\n\
  \n正是在其中一次聚会上，我第一次听说了智能合约的概念——能够自动化各种流程、提高效率并减少对中介机构需求的自动执行合约。我被这样一个世界所吸引：企业和个人可以通过区块链技术直接、安全且透明地进行互动。\n\
  \n随着我对区块链技术的知识和理解不断加深，我开始看到它超越比特币等加密货币的更广泛应用和潜力。尽管最初关于比特币和交易机器人的对话激发了我的兴趣，但正是区块链技术所具有的变革潜力真正点燃了我的热情，并指引我踏上了学习、分享并倡导其在各行各业应用的道路。\n\
  \n通过这本书，我希望能分享的不仅是我对加密货币的热情，还有区块链技术更广泛的意义和潜力。我的目标是激励他人看到这项技术重塑我们的世界、改善我们的生活以及为创新和增长创造新机遇的不可思议的方式。\n\
  \n在过去的几年里，我深入探索了加密货币世界，并发掘了 YouTube 和 Twitter 等信息源的隐藏潜力。通过关注各种各样的 YouTube 频道和 Twitter\
  \ 账户，我获得了大量的知识和见解。有时我每天会花数小时看 YouTube 频道。总的来说，我为这本书投入了至少 3500 到 5000 小时的研究时间。如果你想知道我是如何对加密货币如此热衷的，我将推荐几个我喜欢的\
  \ YouTube 频道，供你自行查看：Benjamin Cowen（Into the Cryptoverse，加密分析）、Blockchain Backer（技术价格分析）、CryptosRUs（加密新闻与见解）、Heresy\
  \ Financial（金融教育）以及 Coin Bureau（加密新闻）。\n\n除了 Twitter 和 YouTube，我还沉迷于像 CoinDesk（[`www.coindesk.com/`](http://www.coindesk.com/)，加密新闻与数据枢纽）、Cointelegraph（[`https://cointelegraph.com`](https://cointelegraph.com)，最新加密趋势与见解）和\
  \ CoinMarketCap（[`https://coinmarketcap.com`](https://coinmarketcap.com)，加密市场数据与排名）这样的加密货币新闻网站。如果你想保持最新动态或扩展你的加密知识，我可以推荐这些网站。\n\
  \n\n  \n2014 年，我对加密货币的潜力产生了浓厚的兴趣，于是决定创办一家基于比特币的初创公司。我创建了一个使用`iDEAL`购买比特币的平台，`iDEAL`是当时荷兰广泛使用的一种在线支付方式。起初，这只是一个爱好，但很快便获得了关注，并发展成了一项成熟的商业项目，需要投入比我维持主业时所能承担的更多时间和资源。当我开始遇到一些利用我的平台进行欺诈的严重问题时，我终止了这个项目。但在这个过程中，我学到了很多关于比特币、区块链、加密货币以及运营在线业务的知识。\n\
  \n正是基于新获得的这些知识和理解，我受到激励，希望通过本书将我的知识传授给他人。我的希望是，你能从书中的信息中汲取有价值的内容，并开始认识到加密货币将以多种方式改变世界。\n\
  \n在不久的将来，加密货币有潜力改变我们的日常生活方式。在本书中，我将用通俗易懂的语言详细解释，加密货币如何实现更大的财务自由与自主权，并可能颠覆传统的金融体系。这可以通过去中心化金融（`DeFi`）和\
  \ 非同质化代币（`NFTs`）来实现，它们允许点对点的借贷、交易，无需银行参与，从而彻底改变我们对所有权的认知。此外，智能合约技术可以自动化各种金融流程，提高效率与效果。同时，加密货币还能提升电子商务和在线市场交易的速度与安全性。通过使用无需共享个人信息的加密技术，加密货币可以增强财务隐私与安全性，这有助于防止身份盗窃和金融欺诈。如果这些概念现在让你感到困惑，请不要担心；本书都会逐一解释。\n\
  \n总的来说，加密货币有潜力改变我们使用金钱的方式、世界的金融结构、我们对所有权的定义，这将影响我们生活的方方面面。我认为未来几年值得密切关注。在本书中，我将详细探讨这一切。确保你不要在全球快速变革的浪潮中落后。加密货币将以我们目前甚至无法想象的方式改变我们所生活的世界，我希望这本书能帮助你开启（或提升至下一个阶段）你自己的加密货币探索之旅。\n\
  \n**重要提示：** 本书内容绝非财务建议，仅为教育内容。在做出任何财务决策之前，请务必自行研究。\n\n## 致谢\n\n回顾本书的写作历程，我对在此过程中支持我的人们充满了深深的感激之情。\n\
  \n首先，我要向我的妻子表达我最深切的感谢，她对我能力的坚定信念一直是我源源不断的力量。您精准的审阅意见、支持、耐心和爱，是这项事业的基石。无论深夜还是清晨，您始终理解我、鼓励我，与我同在。\n\
  \n感谢我的孩子们，在我专注写作时给予的理解，并成为我最大的动力。你们对我的工作提出的天真问题，常常激发新的视角，并提醒我让复杂的概念易于理解的重要性。这部作品也是你们每天教给我的人生课题的见证。\n\
  \n感谢我的大家庭，你们持续的鼓励和对我的信任，意义远超言语所能表达。我感激你们在我为了赶写作截止日期而不得不独处时给予的理解。\n\n我感谢我的出版商 Apress，感谢你们相信这个项目，并为我提供平台，分享我对这一快速发展的技术的见解。编辑团队的专业精神和支持，对本书最终成稿起到了宝贵的作用。\n\
  \n这本书是承诺、坚韧以及家人坚定支持的产物。它也是那些专业合作的见证，这些合作使我能够与更广泛的读者分享我的知识和观点。\n\n感谢你们所有人，成为这段旅程的一部分，给予我灵感，并让这本书得以问世。\n\
  \n## 关于作者\n\n\n\n"
- '# 加密货币革命简介


  2010 年，一位名叫拉斯洛·汉耶茨的人创造了历史，成为第一个使用比特币购买实物的人：两个披萨。当时，比特币的价值不到一美分，汉耶茨以用 1 万个比特币支付他的披萨订单而闻名。


  如今，那 1 万个比特币价值数千万美元。但汉耶茨这笔交易的意义远不止他支付的惊人价格。它代表了一种思考货币和交易的新方式，挑战了传统银行体系，并为加密货币和区块链技术的崛起铺平了道路。


  自从那次决定命运的披萨订单以来，加密货币越来越受欢迎和认可，特斯拉和 PayPal 等大公司开始投资并接受比特币作为一种支付方式。与此同时，区块链技术已扩展到加密货币之外，为从供应链管理到投票系统的方方面面提供解决方案。


  随着我们进入一个日益受这些技术影响的世界，很明显，它们的影响将远远超出金融领域。从我们开展业务的方式到我们与政府以及彼此互动的方式，区块链和加密货币正以我们尚无法完全想象的方式改变我们的日常生活。


  世界处于不断变化之中，近年来，变化的速度急剧加快。技术、通信和交通领域的创新改变了我们的生活、工作和互动方式。互联网和社交媒体的兴起使世界比以往任何时候都更加互联，信息现在触手可及，其方式我们过去无法想象。


  在这场快速变革中，区块链技术作为一种强大新工具崭露头角，有潜力彻底改变我们进行交易、共享信息和彼此互动的方式。从本质上讲，区块链是一种去中心化的分类账本，以安全透明的方式记录交易。与传统的中心化系统不同，区块链运行在对等网络上，消除了对银行或其他金融机构等中介机构的需求。这项技术已经在颠覆从金融到医疗保健的各个行业，其影响才刚刚开始显现。例如，基于区块链的加密货币正在挑战传统的货币和金融体系概念。区块链也被用于改造供应链管理，实现更高的透明度和效率。在医疗保健行业，区块链正被探索作为一种安全存储和共享患者数据的方式，有可能彻底改变医疗服务的提供方式。


  在继续之前，我想解释一下中心化与去中心化的概念。由于这些是区块链技术的重要方面，在本书的语境中明确它们的含义至关重要。


  当我谈到中心化时，我指的是控制权、决策权和权威集中在单个中央实体或地点的系统或结构。这个中央实体可以是个人、组织或服务器。在中心化系统中，信息、资源和权力从中心流向各个节点或用户。中心化系统的例子包括银行、公司和传统数据库。虽然中心化系统可以很高效，并提供清晰的权力线，但它们也更容易出现单点故障、腐败和被少数人控制。


  另一方面，去中心化是将控制权、决策权和权威分散到多个实体或地点的过程。在去中心化系统中，没有单个中央实体能完全控制系统。相反，系统通过其各个节点或用户的协作、互动和共识来运行。去中心化系统可能更有弹性，因为它们不依赖可能容易发生故障或受到攻击的单一控制点。此外，去中心化系统促进了权力和资源更公平的分配，因为没有单个实体可以垄断控制。


  为了进一步说明中心化和去中心化的区别，让我们通过一个社交网络来比较：


  *   *中心化系统*：在中心化社交网络中，如 Facebook 或 Twitter，所有用户数据、帖子及互动都存储并管理在由该公司拥有和控制的中心化服务器上。用户必须创建账户，并信任该公司来存储其个人信息、处理其数据并管理其与他人的互动。在这种情况下，社交网络平台及其背后的公司代表了中心权威。


  *   *去中心化系统*：在去中心化社交网络中，没有单个公司或实体控制该平台。相反，该平台构建在一个分布式网络上，用户之间直接互动，没有中央服务器。用户数据、帖子及互动由用户自己存储管理，或分布在网络中的多个节点上。在这种情况下，社交网络的控制和管理由其用户共享，没有单一的中央权威。


  这个例子突出了中心化和去中心化系统之间的关键区别。在中心化社交网络中，控制和管理集中在一家中心公司及其服务器上；而在去中心化系统中，控制和管理则分布在网络中的多个节点或用户之间。


  理解中心化和去中心化的概念很重要，因为它们构成了区块链技术许多原理和优势的基础。当我深入探讨区块链时，我将探索去中心化如何在创建更透明、更安全、更高效的系统中发挥关键作用，这些系统可以改变行业以及我们彼此互动的方式。


  区块链技术和加密货币之所以如此受欢迎，是因为它们解决了现代社会面临的一些最紧迫的挑战。它们受欢迎的主要原因之一是区块链技术的去中心化特性，这消除了对银行、金融机构或其他第三方中介的需求。这种去中心化的方法增加了交易中的信任、安全性和透明度，使交易更高效、成本更低。


  此外，像比特币和以太坊这样的加密货币为主权政府控制和操纵的传统法定货币提供了替代选择。这使得加密货币对那些希望对自己的资金拥有更多控制权，并且不想依赖政府或金融机构的人具有吸引力。但除此之外，这项技术及其所能做到的事情远不止于此。区块链有潜力颠覆整个行业，从医疗保健到房地产，通过实现安全透明的数据共享和提高效率。当你阅读这本书时，一切都会变得清晰。




  除了区块链技术和加密货币的潜在优势外，认识到围绕这一新兴领域的一些挑战和争议也至关重要。虽然一些人将区块链视为一股向善的力量，但另一些人则对其可扩展性、能源消耗和监管等问题表示担忧。可扩展性仍是许多区块链应用的关键问题，一些网络难以处理大量的交易和用户。能源消耗是另一个令人担忧的领域，因为在区块链上验证交易的过程可能非常耗能。然而，业内许多人正在积极研究解决这些挑战的方案，例如开发更高效的共识算法和使用可再生能源。


  此外，还有监管问题。区块链和加密货币的去中心化与无国界特性对传统的监管框架构成了挑战，这些框架通常是为在国界内运作而设计的。因此，需要采取创新的监管方法，在平衡创新带来的好处的同时，保护消费者并防止非法活动。


  欢迎阅读《*安静的加密革命*》，这是一本全面指南，旨在帮助您理解加密货币和区块链的过去、现在和未来，以及它们将如何影响您的生活。在本书中，我将深入探讨加密货币和区块链技术的历史，从它最初的概念萌芽，到如今作为一个快速发展的行业的现状。我将探讨加密货币市场的现状，包括最流行的货币以及支持它们的各种平台和技术。


