    **3.4.6 Loops**


    Loops are a simple construct that allows a repetition to happen in the code. Say,
    for example, we want to display a count number of blog hits for our blog web page.
    We can use a loop to iterate over the hits of the blog web page and display the
    result.


    Solidity, like other programming languages, has support for different syntaxes
    for the loops.


    Here is an example of a for loop in Solidity:


    pragma solidity ^0.8.13;


    contract News {


    uint newsCount;


    constructor() public{


    newsCount = 0;


    }


    function count() public


    returns (uint val) {


    //for loop example


    for(uint i=0; i<5; i++){


    Chapter 3 Solidity


    newsCount++;


    }


    return newsCount;


    }


    }


    While loop in solidity


    pragma solidity ^0.8.13;


    contract News {


    uint newsCount;


    constructor() public{


    newsCount = 0;


    }


    function count() public


    returns (uint val) {


    uint i;


    while (i<=5){


    newsCount++;


    i++;


    }


    return newsCount;


    }


    }


    Do while loop in solidity


    pragma solidity ^0.8.13;


    contract News {


    uint newsCount;


    constructor() public{


    newsCount = 0;


    }


    Chapter 3 Solidity


    function count() public


    returns (uint val) {


    uint I;


    do {


    newsCount++;


    i++;


    }


    while (i<=5);


    return newsCount;


    }


    }


    **3.4.7 Decision Flows**


    All programming languages, including Solidity, have a means to apply conditional
    logic in the code. Based on certain conditions, we might choose to take some path
    in code versus another path based on some other condition’s being true. This is
    what decision flows allow us to accomplish.


    Solidity has support for if and if else statements to accomplish decision flows
    and conditional logic within smart contracts.


    Here is an example of an if statement:


    pragma solidity ^0.8.13;


    contract News {


    uint newsCount;


    constructor() public{


    newsCount = 0;


    }


    function isFake() public returns (string memory)


    {


    Chapter 3 Solidity


    //here we check the if condition


    **if (newsCount>3)** return "too many news articles"; return "not much news";


    }


    function count() public


    returns (uint val) {


    uint i;


    do {


    newsCount++;


    i++;


    }


    while (i<=5);


    return newsCount;


    }


    }


    Similarly, we have the if else flow for decision making. For example: pragma solidity
    ^0.8.13;


    contract News {


    uint newsCount;


    constructor() public{


    newsCount = 0;


    }


    function isFake() public returns (string memory)


    {


    //if else condition check here


    **if (newsCount>3)**


    {


    return "too many news articles";


    Chapter 3 Solidity


    }


    **else**


    {


    return "not much news";


    }


    }


    function count() public


    returns (uint val) {


    uint i;


    do {


    newsCount++;


    i++;


    }


    while (i<=5);


    return newsCount;


    }


    }


    **3.4.8 Functions in Solidity**


    Solidity advocates reusability and readability in code by allowing the creation
    of functions within smart contracts. Functions allow us to provide readable code
    and also allow us to have a certain functionality defined as a chunk of code.
    This means that you don’t have to write the same code over and over again. It
    helps programmers write code that is easy to change.


    Functions let a programmer break up a big program into smaller pieces that are
    easier to work with.


    Solidity has all the features that are needed to write modular code with functions,
    just like any other advanced programming language.


