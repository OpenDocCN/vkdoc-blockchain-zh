- fmt: "# Chapter 2: Blockchain\n\nAt a high level, the transaction flow in a Bitcoin\
    \ blockchain works like the one shown in Figure [2-1.](#index_split_000.html#p33)\n\
    \n![](index-33_1.jpg)\n\n**Figure 2-1.** How a transaction works on Bitcoin blockchain\n\
    \n## 2.8 Cryptographic Keys\n\nSince public blockchain networks are permissionless\
    \ and trustless, we need a mechanism to authenticate the users in absence of a\
    \ centralized authority. This task is achieved by providing each participant on\
    \ the network with a private and public key pair. The private key remains with\
    \ the user and should be kept highly protected. The private key is used to sign\
    \ the transactions of the user, whereas the public key (which is visible to everyone)\
    \ can be used to validate the signer. In this way, without a central authority\
    \ and using the private and public key infrastructure, security is achieved on\
    \ the decentralized blockchain network.\n\n![](index-34_1.png)\n\n## 2.9 Blockchain\
    \ Compared to a Singly Linked List\n\nThere is a certain degree of similarity\
    \ between the data structure of a blockchain and that of a singly linked list,\
    \ as shown in Figure [2-2.](#index_split_000.html#p34)\n\n**Figure 2-2.** Linked\
    \ list–like structure depicted for the blockchain\n\nWe can see the first block\
    \ is called the genesis block, and then from there each new block created holds\
    \ a reference to the previous block. As an example, block 1 will hold a reference\
    \ to block 0 and block 2 to block 1 and so on. Apart from this pointer, the hash\
    \ of the previous block is stored. This appears like a singly linked list data\
    \ structure. To add to the list we need to use either proof of work or proof of\
    \ stake, but deletion is extremely difficult on the blockchain, unlike a linked\
    \ list, where it’s easy to remove nodes.\n\nIn essence, a blockchain is immutable.\
    \ No record can be deleted. If we try to think about it, any alteration to any\
    \ block means all the blocks ahead of that block have to be updated with the hash\
    \ of previous blocks.\n\nIn the case of networks like Bitcoin, this would mean\
    \ needing immense computing power to use proof of work to alter the blocks. That’s\
    \ one of the reasons it’s almost impossible to attack the Bitcoin blockchain network.\n\
    \nNext, we are going to introduce the Ethereum blockchain, which is the programmable\
    \ blockchain we will use for all our future work in this book.\n\n## 2.10 Ethereum\n\
    \nEthereum is a blockchain network that includes a Turing-complete programming\
    \ language that can be used to build a variety of decentralized applications (also\
    \ called DApps). The Ethereum network is powered by its own cryptocurrency, ether.\
    \ The Ethereum network is currently well known for enabling the use of smart contracts.\
    \ Smart contracts can be compared to cryptographic bank lockers that contain specific\
    \ values.\n\nCertain conditions must be met before these cryptographic lockers\
    \ can be unlocked. `Solidity`, a programming language, is primarily used to create\
    \ smart contracts. `Solidity` is a relatively simple-to-learn object-oriented\
    \ programming language. We will see more of `Solidity` in [Chapter 3](https://doi.org/10.1007/978-1-4842-8975-4_3).\n\
    \nEthereum works on two types of accounts:\n\n1. **Externally owned accounts (EOA)**\n\
    \   Private keys are used to control externally owned accounts. Each EOA is protected\
    \ by a public–private key pair. Users can communicate by creating and signing\
    \ transactions.\n\n2. **Contract accounts**\n   Contract codes are used to manage\
    \ contract accounts. These codes are saved alongside the account. Each contract\
    \ account has an associated ether balance. These accounts’ contract codes are\
    \ activated whenever they receive a transaction from an EOA or a message from\
    \ another contract. When the contract code is enabled, it is possible to read/write\
    \ messages to local storage, send messages, and create contracts.\n\n## 2.11 Summary\n\
    \nIn this chapter, we covered the basics of blockchain architecture and the different\
    \ consensus algorithms like proof of work and proof of stake that are commonly\
    \ used in blockchain networks like Bitcoin and Ethereum.\n\nIn the next chapter,\
    \ we will cover `Solidity`, which is the language used on the Ethereum blockchain,\
    \ and how `Solidity` is used for creating smart contracts.\n\n# Chapter 3: Solidity\n\
    \nHave you ever heard of or encountered a smart contract? If someone has been\
    \ living under a rock, they maybe have not heard about it. Having said that, smart\
    \ contracts define a way by which we can execute code on the blockchain.\n\nOne\
    \ of the languages used to define these smart contracts is `Solidity`.\n\n`Solidity`\
    \ allows us to program the Ethereum blockchain, thereby opening up doors for the\
    \ immense possibilities of decentralized application development. It’s important\
    \ that blockchain beginners learn `Solidity`. It is essential to have a thorough\
    \ understanding of how `Solidity` may be utilized for the development of smart\
    \ contracts, as well as to take an in-depth look at the various components.\n\n\
    Learners should also reflect on examples in order to gain a better understanding\
    \ of the components that make up the architecture and operation of `Solidity`.\
    \ In the same vein, an in-depth contemplation of the various applications of `Solidity`\
    \ could be of use in gaining a better understanding of its significance. In addition,\
    \ a lot of students wonder, “Is it easy to study `Solidity`?” It is essential\
    \ to be aware that it is simpler to learn about `Solidity` if you have a good\
    \ tutorial to follow along with.\n\nThis chapter provides a comprehensive summary\
    \ of `Solidity` as well as other related elements, such types, functions, events,\
    \ and inheritance.\n\n© Shashank Mohan Jain 2023\nS. M. Jain, *A Brief Introduction\
    \ to Web3*, [https://doi.org/10.1007/978-1-4842-8975-4_3](https://doi.org/10.1007/978-1-4842-8975-4_3#DOI)\n\
    \n## 3.1 What Is Solidity?\n\n`Solidity` is a high-level programming language\
    \ whose primary purpose is to facilitate the creation and execution of smart contracts.\
    \ `C++`, `JavaScript`, and `Python` are the key programming languages that have\
    \ had an impact on `Solidity`. `Solidity` was proposed by Gavin Wood and was written\
    \ by the Ethereum team under Christian Reitwiessner. Additionally, `Solidity`\
    \ was designed with a focus on the Ethereum virtual machine.\n\nOn the Ethereum\
    \ blockchain, the creation of decentralized applications, often known as DApps,\
    \ can be accomplished with the help of `Solidity`. The year 2015 marked a turning\
    \ point for `Solidity`. In this condensed version, the primary highlighted qualities\
    \ of `Solidity` are essential components that demonstrate the efficacy of `Solidity`\
    \ in various contexts. When you study `Solidity`, you will notice that it has\
    \ the following significant qualities:\n\n1. Smart contracts are implemented using\
    \ `Solidity`, a statically typed language. Smart contracts can be created and\
    \ deployed using an object-oriented or contract-oriented framework.\n2. It is\
    \ possible to create contracts that deal with voting, consensus, multisignature\
    \ wallets, and other applications using the `Solidity` programming language.\n\
    \nBefore we start to understand the nuances of `Solidity`, we need to be aware\
