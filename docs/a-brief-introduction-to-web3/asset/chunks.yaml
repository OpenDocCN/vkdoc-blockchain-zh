    The terms “centralization” and “decentralization” both refer to levels of control.
    Control is exercised by just one organization or person in a centralized system
    (a person or an enterprise, for example). There is not a single entity that controls
    the operation of a decentralized system. Instead, the control is divided among
    a number of different autonomous entities.


    Differences in location are meant to be understood as distribution.


    In a system that is not distributed, also known as being co-located, all of the
    components of the system are situated in the same physical location.


    A distributed system is one in which different components can be found in different
    physical locations.


    **1.3.2 Different Topologies for Networks**


    Networks can be configured in different topological settings. A few of them are
