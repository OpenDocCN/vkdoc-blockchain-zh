    \n## 2.1 区块链的类型\n\n区块链可以分为三大类。\n\n© Shashank Mohan Jain 2023  \nS. M. Jain, *《Web3\
    \ 简明介绍》*, [`doi.org/10.1007/978-1-4842-8975-4_2`](https://doi.org/10.1007/978-1-4842-8975-4_2#DOI)\n\
    \n### 2.1.1 公有区块链\n\n像比特币这样对公众开放的区块链，是大型的分布式网络，每个网络都由其自身的原生代币管理。它们拥有由社区维护的开源代码，并欢迎任何人参与，无论其参与程度如何。\n\
    \n### 2.1.2 私有区块链\n\n私有区块链通常比公有区块链规模小，并且不使用代币。它们的成员资格受到严格监控和监管。由可信成员组成并涉及机密信息交换的联盟倾向于使用这类区块链。例如，一家公司在其自有数据中心内使用区块链。IBM\
    \ 有一个名为 Hyperledger 的实现，已被多家公司采用。\n\n### 2.1.3 许可型区块链\n\n许可型区块链是指用户需要获得许可才能访问的区块链。这与公有链和私有链截然不同。企业设置可能会寻求一种许可型区块链，在其企业边界内更多地将其当作一个去中心化数据库来使用。许可型区块链的例子包括\
    \ Ripple 和 IBM Food Trust。\n\n区块链之所以声名鹊起，原因如下：\n\n1. **其去中心化特性** – 区块链设置在其架构中倡导去中心化。这意味着，在像比特币或以太坊这样强大的区块链网络中，没有中心化权威机构。任何人都可以通过启动自己的节点并成为区块链网络的一部分来参与这些网络。这确实是一项赋权功能。\n\
    \n2. **不可篡改的存储数据结构** – 存储在区块链上的所有数据都会永久记录在全球的节点/计算机集群中。可以将其视为一个永久的记录账本。要从这个账本中删除一条记录，需要网络中的大多数节点同意，如果网络像比特币或以太坊那样庞大，这实际上是不可能的。\n\
    \n尽管规则因区块链而异，但通常对区块链的任何改变或状态变更都是由一个实体完成的，然后该实体将更改发布到网络上，供其他节点验证。只有当大多数节点同意该状态时，该交易才被视为有效。\n\
    \n谁有权更改状态的机制可能因区块链而异，这取决于链的底层算法。\n\n例如，对于基于比特币的区块链，存在工作量证明算法，它让节点参与解决一个数学难题，首先解决该难题的节点获得在账本上写入的权利。然后，写入者将更改广播到网络，供验证者验证更改。\n\
    \n## 2.2 什么是区块链？\n\n区块链是一种不依赖中心化权威机构来管理系统或账本状态的点对点网络。组成网络的计算机可以在物理上分布。“全节点”是这类计算机的另一个常见名称。\n\
    \n一旦数据被录入区块链数据库，要删除或更改这些数据就极其困难，甚至是不可能的。这意味着，一旦数据被记录并复制到全球众多节点上，与记录在中心化账本上的数据相比，数据消费者可以对数据有更高程度的信任。这意味着像产权、结婚证、发票等记录可以永久记录在链上，无需担心被篡改。\n\
    \n在商业和银行业中依赖中心化系统的流程，如资金结算和电汇，现在可以在没有中心化权威机构的情况下完成。拥有安全的数字记录对全球经济的影响极为重大。\n\n\
    ## 2.3 区块链的构建模块\n\n区块链生态系统有三个主要组成部分。\n\n### 2.3.1 区块\n\n区块是特定时间段内录入账本的交易列表。每个区块链都有其独特的维度、时间间隔以及触发区块创建的事件。\n"
- fmt: '# Chapter 2: BloCkChain


    There are some blockchains whose primary focus is not on maintaining and securing
    a record of the transactions involving their respective cryptocurrencies. However,
    every blockchain will record any transactions involving its associated cryptocurrency
    or token. Consider the transaction to be nothing more than the simple recording
    of data. The interpretation of what that data means is accomplished by first giving
    it a value, as is done in the course of a financial transaction.


    ## **2.3.2 Chain**


    A chain can be thought of as a linked list of blocks. The block that comes after
    the first block (also known as genesis block) will maintain a reference to the
    previous block and so on and so forth. This reference is maintained by generating
    a hash of the contents of the previous block. This has some great implications
    for the immutability of the chain. Anyone who has to alter a previous block will
    then need to modify all blocks ahead of that particular block. Generally this
    is a practical impossibility as it might require either huge computing resources
    in the case of algorithms like proof of work, or a huge stake to be put in the
    network for proof of stake–based algorithms like Ethereum.


    ## **2.3.3 Network**


    “Full nodes” are the building blocks of the network. Imagine them as a computer
    that is actively implementing an algorithm to ensure the safety of the network.
    All nodes in the network have the same copy of records (called the ledger). The
    ledger comprises all transactions that have ever been recorded on the blockchain.


    The network nodes are decentralized and can be run by anyone in any part of the
    world. Since running these nodes will incur costs, people need some incentive
    to do so. They are motivated to run a node because they want to earn cryptocurrency,
    which serves as their incentive. The underlying algorithm of the blockchain provides
    them with compensation for their service. Typically, a token or cryptocurrency,
    such as Bitcoin or ether, is awarded as the reward.


    ## **2.4 Where Is Blockchain Used?**


    Applications based on the blockchain are designed around the principle that the
    network should act as the arbitrator. This kind of system creates an unforgiving
    and oblivious atmosphere for its users. The computer code effectively becomes
    the law, and the rules are carried out in the manner in which they were written
    and are interpreted by the network. The social behaviors and prejudices that are
    characteristic of humans are absent in computers.


    The network is incapable of interpreting the user’s intent (at least not yet).
    As a potential use case for this concept, insurance contracts that are arbitrated
    on a blockchain have received a lot of attention and research. The ability to
    keep immutable records is yet another fascinating application of blockchain technology.


    You can use them to make a comprehensible timeline of who did what and when. Countless
    hours are spent by numerous industries and regulatory bodies trying to get a handle
    on the magnitude of this issue. An immutable ledger will allow us to keep a consistent
    timeline of transactions that have happened right from the inception of the chain.


    Although people frequently use the terms “Bitcoin” and “blockchain” interchangeably,
    these two concepts are not the same. A blockchain is used by Bitcoin. The underlying
    protocol that allows for the safe transfer of Bitcoin is known as the blockchain.
    Bitcoin is the name of the digital currency that serves as the driving force behind
    the Bitcoin network.


    So Bitcoin is one of the applications built on top of the blockchain infrastructure.


    ## **2.5 Evolution**


    Blockchain technology was initially developed in conjunction with the cryptocurrency
    Bitcoin. The whole idea of Bitcoin was to develop a system for decentralized money
    and banking. The initial purpose of the Bitcoin network’s construction was to
    ensure the cryptocurrency’s safety. It has somewhere in the neighborhood of 5,000
    full nodes and is spread out across the world. Its primary purpose is to buy and
    sell Bitcoin and other cryptocurrencies, but the community quickly realized that
    it could be used for a great deal more than that. Because of its size and the
    fact that its security has been proven over time, it is also being used to secure
    other blockchains and blockchain applications that are smaller in scale.


    The blockchain technology has undergone a second iteration with the creation of
    the Ethereum network. It modifies the conventional structure of a blockchain by
    incorporating a programming language that is embedded within the structure itself.
    Similar to Bitcoin, it has more than 5,000 full nodes and is distributed across
    the world. Ether trading, the development of smart contracts, and the formation
    of decentralized autonomous organizations (DAOs) are the primary uses of Ethereum.
    Additionally, it is utilized in the process of securing blockchain applications
    as well as more compact blockchains.


    The Ethereum ecosystem is what turned the blockchain ecosystem into a programmable
    blockchain.


    ## **2.6 Consensus**


    Consensus is one of the most difficult problems to solve in a distributed systems
    setup.


    Blockchains are useful tools because they are capable of self-correcting and do
    not require the intervention of a third party in order to do so.


    Through the use of their consensus algorithm, they are able to successfully enforce
    the rules.


    In the world of blockchain technology, “reaching consensus” refers to the procedure
    of reaching an agreement among a group of nodes that typically do not trust one
    another. These are the nodes on the network that have full functionality. Transactions
    that are entered into the network in order for them to be recorded on the ledger
    are being checked for validity by the full nodes. Each blockchain has its own
    set of algorithms that it uses to get its network to reach a consensus on the
    new entries that are being added. Because different kinds of entries are being
    generated by each blockchain, there is a diverse range of models available for
    achieving consensus.


    Some of the mechanisms used by different blockchains for consensus are as follows:


    - **Proof of Work** – Used by Bitcoin blockchain

    - **Proof of Stake** – Used by Ethereum

    - **Proof of History** – Used by Solana


    ### **2.6.1 Proof of Work**


    The first decentralized cryptocurrency to use a consensus mechanism was Bitcoin,
    and that mechanism was proof of work. Mining and proof of work are concepts that
    are closely related to one another. The term “proof of work” comes from the fact
    that the network needs an extremely high level of processing power to function
    properly. Proof-of-work blockchains are those in which virtual miners from all
    over the world compete with one another to see who can solve a mathematical puzzle
    first. These blockchains are then secured and verified. The victor receives a
    predetermined amount of cryptocurrency from the network as well as the opportunity
    to update the blockchain with the most recent transactions that have been verified.'
