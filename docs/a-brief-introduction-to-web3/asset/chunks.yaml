    We are not showing the complete contract here but only the function definition:


    function count() public


    returns (uint val) {


    uint I;


    do {


    newsCount++;


    i++;


    }


    while (i<=5);


    return newsCount;


    }


    Here, the function name is count, and it doesn’t take any parameters. It returns
    an integer value, and its scope is public.


    We can also define functions that take input values as parameters.


    Here is an example of a function with parameters:


    function oddEven(uint x) public returns (string memory)


    {


    if (x%2==0) return “even” ;


    else


    {


    return "odd";


    }


    }


    Here, we see the function oddEven takes a parameter that is an integer and returns
    a string as to whether the number is odd or even.


    A Solidity function can have a return statement, but it doesn’t have to. If you
    want a function to return a value, you need to do this. The last statement in
    a function should be this one.


    Chapter 3 Solidity


    **3.4.8.1 Function Modifiers**


    A function modifier is an important construct in Solidity. It allows us to make
    code more reusable by externalizing some of the common aspects of code in a modifier.
    As an example, if we wanted to print a message before and after a function invocation,
    one way would be to put this code in each and every function body. Another way
    would be to create a modifier that acts as a placeholder for a function and allows
    us to weave some aspects around the code.


    Modifiers are most often used to check a condition automatically before a function
    is run. As an example, if we wanted to authenticate a user before letting the
    invocation of the function happen, we would put the authentication logic inside
    of a modifier. Before the function got invoked, this authentication code would
    be executed. If authentication were to succeed, the function would be executed
    or else an exception would be thrown.


    Here is an example of a modifier:


    modifier SampleModifier {


    // logic for the modifier


    }


    A modifier can also take input parameters; for example: modifier SampleModifier
    (string x) {


    // logic for the modifier


    }


    Let’s examine the workings of the modifier. Here, we create a modifier by name
    of checkOwner:


    modifier checkOwner {


    Chapter 3 Solidity


    require(msg.sender == owner);


    _;


    }


    The reader can see there is _; in the code of the modifier. This is known as a
    merge wildcard. One can treat this as a placeholder for a function to be executed.
    To explain it clearly, this is the place where the function to which this modifier
    is attached will be executed. This gives us an ability to place some generic code
    before and after the function’s execution. A reader familiar with aspect-oriented
    programming can draw a parallel here. In order to work, a modifier must have the
    symbol _; in its body.


    Here, we show how the _; can be placed in a modifier: modifier executeBefore {


    require(/*execute code before the function*/);


    _; // here the _ signifies the actual function to be


    executed.


    }


    This example is where post-processing is done via the modifier. Here, the function’s
    execution happens before the modifier is invoked: modifier executeAfter {


    _; // execute the actual function


    require(/* execute code after the function*/)


    }


    Here is an example of the usage. The function isValidUser needs to return true
    only if a user is valid. We have two choices here. Either we place the user validity
    check in every function that needs this, or we externalize it via the modifier
    and also have clear separation of concerns.


    We think using the modifier is a cleaner and better approach. Here, we show how
    this can be achieved via the modifier:


    Chapter 3 Solidity


    function isValidUser(address _user) public view returns(bool) {


    // logic that checks that _user is valid


    return true;


    }


    modifier CheckUser {


    require(isValidUser(msg.sender));


    _;


    }


    There is also a way to apply multiple modifiers to a function: contract Sample
    {


    modifier A() {


    require(


    //some checks


    );


    _;


    }


    modifier B() {


    require(


    //some more checks


    );


    _;


    }


    **function test() public B() A()** {


    //function code


    }


    }'
