- fmt: '当你想到构建去中心化应用时，脑海中一定会浮现出像以太坊这样的区块链平台。区块链技术对于状态管理、通过智能合约自动化操作以及经济价值交易极其有益。


    但你的应用内容究竟存储在哪里呢？


    图片？视频？构成应用前端的所有 HTML、CSS 和 JavaScript 文件具体存储在哪里？你的用户访问的内容以及你使用的应用是从中心化的 AWS 服务器加载的吗？


    这些内容必须存储在区块链上，而这是一个既耗时又耗钱的过程。你的区块链应用需要去中心化的存储！


    ## 7.1 IPFS


    星际文件系统（IPFS）是一种点对点的超媒体协议，旨在让万维网更加开放、快速和安全。


    IPFS 是一个用于存储和分发内容的协议。每个用户都作为一个节点运行，就像在区块链技术领域（服务器）一样。


    节点之间能够相互通信并共享文件。


    © Shashank Mohan Jain 2023


    S. M. Jain, *A Brief Introduction to Web3*[, https://doi.org/10.1007/978-1-4842-8975-4_7](https://doi.org/10.1007/978-1-4842-8975-4_7#DOI)


    ### 第七章 IPFS 和 NFT


    首先，IPFS 被认为是去中心化的，因为内容是从成千上万个对等节点组成的网络中加载的，而不是从单一的中央服务器加载。每一比特的数据都使用密码学进行哈希处理，从而生成一种安全且独一无二的内容标识符，称为
    CID。


    既然点对点文件共享已经存在了一段时间，那么你可能会问，IPFS 在这方面有什么独特之处？IPFS 目前是去中心化互联网最著名且最广泛使用的替代方案，因为它拥有多项在加密货币行业中脱颖而出的有利特性。


    IPFS 是不可变的，这意味着一旦数据被添加到网络中，就无法以任何方式更改。用户能够验证他们查看的数据没有被篡改。可以发布更新，但这些更新总会以新文件的形式出现；现有文件永远不会被覆盖。


    IPFS 通过在数据添加到网络时先进行分块、再存储、最后哈希处理，来防止数据重复。这使得重复数据能够映射到相同的节点，因此只创建一个条目。假设新文件与网络中已有的文件有些相似，那么随着网络规模变大，向网络中添加它所需的存储空间会更少。


    IPFS 是去中心化的，这意味着即使某些节点被移除或添加，网络也能继续运行。即使大量节点下线，整个系统也能正常运行。除非摧毁构成网络的每一个节点，否则无法删除信息或审查文件。


    这个系统的去中心化是最重要的方面。


    接下来会出现一些对比中心化网络与分布式网络外观的图示。


    关键点在于，Facebook 实际上拥有第一个网络，148


    ### 第七章 IPFS 和 NFT


    因此他们是该网络上唯一可信的信息来源。在第二个网络中，没有哪个节点比其它节点更重要。


    #### 7.1.1 IPFS：30,000 英尺俯瞰


    在我们开始之前，让我们先从一个高层视角看看 IPFS 在幕后做了什么，以便我们对即将涉及的内容有所了解。作为 IPFS 网络中的一个节点，你负责建立与网络中其它数十个节点的连接，并充当这些节点的路由点。你将这些节点称为你的对等节点。'
  raw: 'When you think of creating a decentralized application, you definitely have
    a blockchain platform like Ethereum in mind. The use of blockchain technology
    is extremely beneficial for the management of states, the automation of operations
    through the use of smart contracts, and the trading of economic value.


    But where exactly does the content of your application get stored?


    Images? Videos? Where exactly are all of the HTML, CSS, and JavaScript files that
    make up the application’s front end? Is the content that your users access as
    well as the application that you use loaded from a centralized AWS server?


    The content would have to be stored on the blockchain, which is a time- and money-consuming
    process. Your blockchain application needs storage that is decentralized!


    **7.1 IPFS**


    The Inter Planetary File System (IPFS) is a peer-to-peer hypermedia protocol that
    aims to make the World Wide Web more open, quicker, and safer.


    IPFS is a protocol for the storage and distribution of content. Every user acts
    as a node, just like in the realm of blockchain technology (server).


    The nodes are able to communicate with one another and share files with one another.


    © Shashank Mohan Jain 2023


    S. M. Jain, *A Brief Introduction to Web3*[, https://doi.org/10.1007/978-1-4842-8975-4_7](https://doi.org/10.1007/978-1-4842-8975-4_7#DOI)


    Chapter 7 IpFS and nFtS


    To begin, the IPFS is considered decentralized due to the fact that the content
    is loaded from a network of thousands of peers rather than a single centralized
    server. Every single bit of data is hashed using cryptography, which produces
    a secure and one-of-a-kind type of content identification known as CID.


    Since peer-to-peer file sharing has been available for some time, one might wonder
    what makes IPFS so unique in this field. IPFS is now the most well-known and widely
    used alternative for a decentralized internet because it possesses a number of
    advantageous characteristics that set it apart in the cryptocurrency industry.


    IPFS is immutable, which means that once data has been added to the network, it
    cannot be altered in any way. Customers are able to check that the data they viewed
    has not been changed in any way. It is possible to publish updates, but these
    will always appear in the form of new files; the existing ones will never be overwritten.


    IPFS prevents data from being duplicated by first chunking it, then storing it,
    and finally hashing it when it is added to the network. This allows for duplicate
    data to map to the same nodes, and as a result only one entry is made. Assuming
    the new file is somewhat comparable to those already present in the network, adding
    it to the network will require a smaller amount of storage space as the network
    grows larger.


    IPFS is decentralized, which means that the network can continue to function even
    if some nodes are removed or added. Even if a significant number of nodes were
    taken offline, the system as a whole would continue to function normally. It would
    not be possible to delete information or censor files without first destroying
    each and every node that made up the network.


    The decentralization of this system is the most important aspect.


    There are some representations coming up that compare and contrast the appearance
    of centralized networks with that of dispersed networks.


    The crucial point here is that Facebook effectively owns the first network, 148


    Chapter 7 IpFS and nFtS


    and as such they are the only trustworthy source of information on the network.
    On the second network, there is no one node that is more significant than any
    of the others.


    **7.1.1 IPFS: 30,000-Foot View**


    Before we get started, let’s take a high-level look at what IPFS accomplishes
    behind the scenes so we know what we’re getting into. As a node in the IPFS network,
    you are responsible for establishing connections to dozens of other nodes located
    around the network and serving as a routing point for those nodes. You refer to
    these people as your peers.'
