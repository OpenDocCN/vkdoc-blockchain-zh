    # Index\n[181](index-9_1.jpg)\n\n## About the Author\n\n**Shashank Mohan Jain**\
    \ has been working in the IT industry for around 22 years, mainly in the areas\
    \ of cloud computing, machine learning, and distributed systems. He has keen interest\
    \ in virtualization techniques, security, and complex systems. Shashank has multiple\
    \ software patents to his name in the area of cloud computing, Internet of Things,\
    \ and machine learning. He is a speaker at multiple reputed cloud conferences.\
    \ Shashank holds Sun, Microsoft, and Linux kernel certifications.\n\n## About\
    \ the Technical Reviewer\n\n**Prasanth Sahoo** is a thought leader, an adjunct\
    \ professor, a technical speaker, and a full-time practitioner in blockchain,\
    \ DevOps, cloud, and Agile, all while working for PDI Software. He was awarded\
    \ the Blockchain and Cloud Expert of the Year Award 2019 from TCS Global Community\
    \ for his knowledge share within academic services to the community. He is passionate\
    \ about driving digital technology initiatives by handling various community initiatives\
    \ through coaching, mentoring, and grooming techniques. Prasanth has a patent\
    \ under his name, and to date he has interacted with over 50,000 professionals,\
    \ mostly within the technical domain. He is a working group member in the Blockchain\
    \ Council, CryptoCurrency Certification Consortium, Scrum Alliance, Scrum Organization,\
    \ and International Institute of Business Analysis.\n\n## Introduction\n\nWe live\
    \ in exciting times. We are witnessing a revolution in the space of technology\
    \ every other day. Web3 happens to be one such revolution.\n\nWith the advent\
    \ of web3 and blockchain technologies, the way we write applications is changing.\
    \ The whole idea of this book is to provide the reader with a basic introduction\
    \ to web3. The book will enable the reader to understand the nuances of web3 and\
    \ to create simple applications, like creating one’s own tokens or NFTs.\n\n#\
    \ Chapter 1: Decentralization and Web3\n\nIn this chapter, we are going to examine\
    \ the evolution of Web 3.0 starting from Web 1.0 and 2.0.\n\n## 1.1 Web 1.0\n\n\
    In Web 1.0, websites delivered static content (rather than dynamic content) written\
    \ in hypertext markup language (HTML). The data and content were sent by means\
    \ of a static file system as opposed to a database, and the web pages had only\
    \ a minimal amount of interactive information.\n\nThe following is a list of the\
    \ principal technologies that were included in Web 1.0:\n\n- HTML (HyperText Markup\
    \ Language)\n- URL encoded in the HyperText Transfer Protocol, or HTTP (Uniform\
    \ Resource Locator)\n\n## 1.2 Web 2.0\n\nSince in Web 1.0 most content was static,\
    \ it gave rise to Web 2.0.\n\n© Shashank Mohan Jain 2023  \nS. M. Jain, *A Brief\
    \ Introduction to Web3*, [https://doi.org/10.1007/978-1-4842-8975-4_1](https://doi.org/10.1007/978-1-4842-8975-4_1#DOI)\n\
    \nThe vast majority of us have only experienced the World Wide Web in its most\
    \ recent iteration, sometimes referred to as Web 2.0, the interactive read–write\
    \ web, and the social web. Participating in the creative process of Web 2.0 does\
    \ not require you to have any prior experience as a developer.\n\nA great number\
    \ of apps are designed in such a way that anyone can make their own version of\
    \ the program.\n\nYou are capable of coming up with ideas and communicating those\
    \ ideas to people around the globe. You are able to post a video to Web 2.0, where\
    \ it will be available for millions of users to watch, interact with, and comment\
    \ on. Web 2.0 applications consist of social media sites, such as YouTube, Facebook,\
    \ Flickr, Instagram, and Twitter, among others. Think about how popular these\
    \ sites were back when they first launched, and then compare that to how popular\
    \ they are now.\n\nWeb 2.0 allowed applications to scale, but also gave rise to\
    \ centralized platforms that took control of all user data. This gave them a chance\
    \ and opportunity to do data mining, which can be put to both positive and negative\
    \ uses.\n\nSince users were increasingly losing control to these centralized platforms,\
    \ it led to the emergence of Web 3.0.\n\n## 1.3 Web 3.0\n\nWeb 2.0 design inherently\
    \ depended on centralized systems. Those systems might have been distributed but\
    \ were not decentralized. This meant that control of those systems remained with\
    \ individuals or a group of individuals.\n\nThis led to huge issues as privacy\
    \ and data usage concerns started to emerge.\n\nThis led to the evolution of Web\
    \ 3.0, which keeps decentralization as its first requirement. This means applications\
    \ for Web3 will be deployed in a decentralized way and data storage for its apps\
    \ will also be decentralized.\n\nTherefore, it’s important to have an idea of\
    \ what decentralization is before understanding the Web3 landscape.\n\n### 1.3.1\
    \ Introduction to Decentralization\n\n“Unthinking respect for the authority is\
    \ the greatest enemy of truth.” This famous quote by Albert Einstein goes a long\
    \ way in making us think about whether there should be systems that are controlled\
    \ by an authority, thereby asking us to have complete faith and trust in the authority,\
    \ or there should be systems that are decentralized, with consensus as the root\
    \ of decision making. Central systems, as their name suggests, can be controlled\
    \ by the whims of a central authority, whereas a decentralized system will favor\
    \ more inclusive decision making, thereby reducing the chance of corruption within\
    \ that system."
