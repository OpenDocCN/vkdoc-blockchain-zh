- fmt: '# Chapter 7: IPFS and NFTs


    Every node in the network is either a client or a piece of content at some point.
    You, as a customer, are responsible for keeping a list of peers organized to form
    the list you can have. Having a few acquaintances on the opposite side of the
    network (those whose IDs are substantially different from your own) and a large
    number of friends in the immediate area (whose IDs are very similar).


    When requesting content, either because you desire it or because a peer asked
    for it, you have the option of limiting your search to those peers that you are
    familiar with that are located closest to the content ID. The request will be
    completed in an average of `Log(N)` amount of time. In addition, while the content
    is being returned, each node creates a cache of the data so that it can be accessed
    more quickly during subsequent searches. These caches are extremely aggressive
    and cut down network costs as a result of the fact that data can never change.


    After that, you may either utilize a node that is running locally or route through
    an existing node by giving it the content ID. Either way, you will be able to
    retrieve the material that was stored.


    ## Chapter 7: IPFS and NFTs


    ### 7.1.2 Installation


    For Windows, download the IPFS daemon from [https://dist.ipfs.io/#go-ipfs](https://dist.ipfs.io/#go-ipfs).


    Another option is to install the IPFS desktop application from [https://docs.ipfs.tech/install/ipfs-desktop/](https://docs.ipfs.tech/install/ipfs-desktop/).


    In this chapter, we will work with the IPFS daemon:


    ```

    C:\Users\I074560>cd \shashank\apress\web3

    C:\shashank\apress\web3>mkdir ipfs

    C:\shashank\apress\web3>cd kubo

    C:\shashank\apress\web3\kubo>ipfs.exe init

    ```


    This gives the following output:


    ```

    generating ED25519 keypair...done

    peer identity:

    12D3KooWRzcEvQWq8wvr4AckSVVjRtUAvXLxc37J8uVLaGa2Bt4G

    initializing IPFS node at c:\shashank\apress\web3\ipfs

    ```


    To get started, enter the following:


    ```

    ipfs cat /ipfs/QmQPeNsJPyVWPFDVHb77w8G42Fvo15z4bG2X8D2GhfbSXc/readme

    ```


    Then, run the following command:


    ```

    ipfs cat /ipfs/QmQPeNsJPyVWPFDVHb77w8G42Fvo15z4bG2X8D2GhfbSXc/readme

    ```


    This will check the IPFS installation, as shown in Figure 7-1.


    ![Figure 7-1. IPFS console](index-159_1.png)


    Now let’s add content to IPFS. Open another terminal and run the following command:


    ```

    echo "This is my first content to IPFS" | ipfs add

    ```


    This returns the following output:


    ```

    added QmdWENEwy4RRdvfuR6Jk86AMe7TV89yUFZec2YKHZqAKqF

    ```


    The hash returned is the content identifier (CID) for the content.


    ## 7.2 ERC-721


    We saw in Chapters [5](https://doi.org/10.1007/978-1-4842-8975-4_5) and [6](https://doi.org/10.1007/978-1-4842-8975-4_6)
    how to use the ERC-20 standard for creating a token. But a token is a fungible
    entity. This means that each token is equivalent to another token. Many requirements
    for applications need different values for different assets, like the value of
    one piece of digital art cannot be equated to that of another piece of digital
    art. We need a mechanism to represent the value of such assets on the blockchain.
    This requirement gave birth to the ERC-721 specification, which deals with non-fungible
    tokens (NFTs, in short).


    ERC-721 provides an interface that defines the functions for building non-fungible
    tokens. The following is a list of all of the functions and events that have been
    defined by the ERC-721 standard.


    The ERC-721 standard defines a few functions that are compliant with the ERC-20
    standard. Existing wallets will find it much simpler to display basic token information
    as a result of this change.


    ### Functions Similar to ERC-20:


    - **`name`**: This field is where the name of the token is defined.

    - **`symbol`**: This field captures the symbol for the token.

    - **`totalSupply`**: This function represents the total supply of the NFT. The
    supply can be dynamic as well.

    - **`balanceOf`**: This function returns the total number of NFTs that are owned
    by an address.'
