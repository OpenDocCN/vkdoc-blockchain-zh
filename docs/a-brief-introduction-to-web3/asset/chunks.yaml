    Chapter 1 DeCentralization anD Web3


    **1.3.2.1 Centralized and Non-distributed**


    In the event that you are putting together a stand-alone application that will
    run on your Windows computer, this configuration is not distributed and also functions
    as a centralized system. Your application is under the control of one party (the
    application vendor), and an additional party, such as Microsoft, is in charge
    of your operating system (centralized).


    The application and the operating system are both stored locally on your personal
    computer, making them both non-distributable components.


    **1.3.2.2 Centralized but Distributed**


    Imagine that you are working on a cloud application that is hosted on Amazon Web
    Services and runs on virtual machines hosted by Amazon Web Services. This configuration
    is both centralized and distributed at the same time. Your application and operating
    system are both under the control of AWS (centralized). Cloud storage serves as
    the host for both the application and the operating system, which may be partitioned
    across multiple locations.


    **1.3.3 Decentralized Systems**


    By its very nature, a decentralized system will be distributed. Peer-to-peer software
    can be thought of as an example of a decentralized system, which is defined as
    “a system that requires multiple parties to make their own independent decisions.”


    It is impossible to have a single, centralized authority in a decentralized system
    that is responsible for making decisions on behalf of all the different parties.
    Instead, each party, also known as a peer, is responsible for making locally autonomous
    decisions in the direction of achieving its own individual goals, which may or
    may not be in conflict with the goals pursued by other peers. Peers engage in
    one-on-one communication with 5


    Chapter 1 DeCentralization anD Web3


    one another, during which they may exchange information or perform a service for
    other peers. When it comes to decentralized systems, an open system is one in
    which the participation of peers is not restricted in any way. At any point, a
    peer may join or leave the system at their discretion.


    Before information is added to a blockchain (which is an example of a decentralized
    system), the nodes participating in the network must use something called a consensus
    mechanism to reach a decision on whether or not it is accurate. Once the block
    has been updated with the data, it is sent to all of the nodes in the network.
    This makes it extremely difficult to alter information that has already been added
    to the ledger.


    Mutation of state on a decentralized network requires a majority of nodes to reflect
    the updated state, which is a very difficult thing to achieve, and therefore the
    decentralized network of nodes is immutable. This is in contrast to changing the
    data in a single database that is centralized. If rule of immutability is broken,
    the validating nodes will disregard such information.


    The process of dispersing functions and power away from a central location or
    authority is known as decentralization. It is difficult, if not impossible, to
    identify a specific center in a decentralized architecture. The World Wide Web
    was created as a decentralized platform. Decentralized architectures and systems
    are demonstrated by blockchain technologies such as Bitcoin and Ethereum.


    As the technological landscape changes, decentralized structures emerge. Decentralization
    has the power to change a lot of things, from governance and industry to justice
    systems.


