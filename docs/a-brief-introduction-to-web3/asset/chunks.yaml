    ## 7.2 ERC-721


    我们在第 [5](https://doi.org/10.1007/978-1-4842-8975-4_5) 章和第 [6](https://doi.org/10.1007/978-1-4842-8975-4_6)
    章中看到了如何使用 ERC-20 标准创建代币。但代币是一种同质化实体，这意味着每个代币与其他代币都是等价的。许多应用程序的需求需要为不同的资产赋予不同的价值，例如一件数字艺术品的价值不能等同于另一件数字艺术品的价值。我们需要一种机制来在区块链上表示此类资产的价值。这一需求催生了
    ERC-721 规范，该规范专门处理非同质化代币（简称 **NFT**）。


    ERC-721 提供了一个接口，定义了构建非同质化代币所需的函数。以下是 ERC-721 标准定义的所有函数和事件的列表。


    ERC-721 标准定义了一些与 ERC-20 标准兼容的函数。这一变化使得现有钱包能够更简单地显示基本的代币信息。


    ### 与 ERC-20 类似的函数：


    - **`name`**：该字段用于定义代币的名称。

    - **`symbol`**：该字段用于记录代币的符号。

    - **`totalSupply`**：该函数表示 NFT 的总供应量。供应量也可以是动态的。

    - **`balanceOf`**：该函数返回某个地址所拥有的 NFT 总数。

