    \ getProduct() public override view returns(uint) {\n        uint x = 10;\n  \
    \      uint y = 11;\n        uint product = x*y;\n        return product;\n  \
    \  }\n}\n```\n\nIn this code, we define an abstract contract `Sample` with one\
