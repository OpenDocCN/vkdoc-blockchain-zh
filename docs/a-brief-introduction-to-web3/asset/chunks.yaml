    ## 4.6 Summary


    In this chapter, we looked at different kinds of wallets and how they work.


    We detailed how MetaMask wallet works. We also looked at how gateways work and
    their purpose in the `web3` world.


    In the next chapter, we will look into how we can use the Remix IDE (a browser-based
    environment) to compile and deploy smart contracts.


    # CHAPTER 5


    # Introduction to Remix IDE


    To develop smart contracts and then manage the lifecycle of those contracts —
    like compilation, testing, deployment, and updates — we need an integrated development
    environment (IDE). There are many options available. Remix IDE is a web-based
    IDE (which means it does not require any software installation). Remix comes with
    a full suite of development and deployment tools integrated for developing and
    managing the lifecycle of smart contracts.


    In this chapter, we will introduce you to the Remix IDE and see how it can help
    with creating and managing the lifecycle of smart contracts.


    ## 5.1 Remix IDE


    Remix IDE provides a browser-based environment for creating, compiling, testing,
    and deploying Ethereum-based smart contracts on the blockchain network. Actually,
    working with Remix IDE is a piece of cake! In this chapter, we will go through
    how to make use of it.'
