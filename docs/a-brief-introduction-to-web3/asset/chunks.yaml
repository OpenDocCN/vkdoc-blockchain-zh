    \    }\n}\n```\n\n正如我们在代码中所见，我们以只读方式使用了状态变量 `x`，并未对其进行修改。\n\n## 3.4.8.3 纯函数\n\n\
    在 Solidity 中，`pure` 函数不会读取或更改状态变量。相反，它们仅使用传递给函数的参数或其拥有的任何局部变量来计算值。如果 `pure` 函数中存在读取状态变量、访问地址或余额、访问像\
    \ `block` 或 `msg` 这样的全局变量、调用非 `pure` 函数等语句，编译器将会发出警告。\n\n例如：\n\n```solidity\n\
    pragma solidity ⁰.8.13;\n\ncontract Sample {\n    // 状态变量\n    uint x = 10;\n\n\
    \    // 定义一个纯函数\n    // 它返回两个作为参数传入的数值的乘积\n    function calculateProduct(uint\
    \ y, uint z) public pure returns(uint) {\n        uint product = y * z;\n    \
    \    return product;\n    }\n}\n```\n\n我们可以看到，我们只使用了参数来计算乘积；函数内部甚至没有读取状态变量。\n\n\
    ## 3.4.8.4 回退函数\n\nSolidity 中的回退函数是一个没有名称、参数或返回值的 `external` 函数。例如，回退函数负责在以太坊区块链的智能合约中发送、接收和持有以太币。在以下任一情况下，它会被执行：\n\
