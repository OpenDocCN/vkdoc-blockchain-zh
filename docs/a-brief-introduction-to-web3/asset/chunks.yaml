    **3.5 Summary**


    In this chapter, we took a look at Solidity, which is the language used on the
    Ethereum blockchain. We went into the details of the different constructs and
    syntax of the Solidity language, like types, operators, loops, and so on.


    In the next chapter, we will look into the concept of wallets and how they work
    and operate.


    **CHAPTER 4**


    **Wallets and Gateways**


    Users have the ability to manage their accounts on blockchain networks like Bitcoin
    or Ethereum through the usage of wallets. With an account on Ethereum, one can
    participate on the Ethereum blockchain network, such as by performing transactions
    on it.


    An address on the Ethereum blockchain is a public string of letters and integers
    that begins with 0x. Because an Ethereum address is represented by a string of
    numbers and letters, it is possible to check the balance of any Ethereum address
    on the blockchain. However, it is not possible to determine who controls any given
    address. Users are able to exert control over an unlimited number of addresses
    via wallets, which can be either software or hardware.


    Users of Ethereum wallets can move their cash around within the wallet by using
    a private key. This key serves as the control mechanism for Ethereum wallets.
    Because of this, these private keys are supposed to be known only by the person
    who created the wallet, as anyone who knows them can access the funds in the wallet.


    There is a wide variety of Ethereum wallets available, some of which may be stored
    on your computer or mobile device, and others of which can be stored offline by
    means of a piece of paper, titanium, or other hardware.


    You can choose the sort of Ethereum wallet that best suits your needs.


