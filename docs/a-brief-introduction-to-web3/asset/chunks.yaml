  trans: '

    # 第 5 章 Remix IDE 简介


    ***图 5-7.** 查看编译器版本和语言*


    智能合约编译完成后，我们需要进行部署。点击图 5-8 中红色高亮显示的按钮。


    ***图 5-8.** 红色圆圈标注的部署按钮*


    点击`部署`按钮后，界面将如图 5-9 所示。


    ***图 5-9.** 选择部署环境*


    如图 5-10 所示，我们可以从多个部署环境中选择。


    ***图 5-10.** 智能合约的不同部署环境*


    在我们的操作中，需要选择`注入的 Web3`环境，该环境将连接至`MetaMask`钱包，用于签名交易和支付燃料费。


    选择`注入的 Web3`环境后，我们将看到`Ropsten`网络，这是我们为`MetaMask`钱包选择的网络。如图 5-11 所示。


    ***图 5-11.** 选择 Ropsten 测试网络进行部署*


    在图 5-11 中，我们还可以看到另外两个显示区域。“账户”指我们通过`MetaMask`创建的账户，“燃料限制”是通过`Remix`执行交易时允许的最大燃料量。


    现在，我们点击`部署`按钮。这将打开`MetaMask`钱包（我们将`MetaMask`部署为 Brave 浏览器扩展），如图 5-12 所示。


    ***图 5-12.** MetaMask 钱包弹出，确认支付部署燃料费*


    我们可以看到本次交易需支付的燃料费用（以以太币计）。


    确认交易后，即可将其发布到`Ropsten`测试网。


    我们可以在`Etherscan`上查看交易状态，如图 5-13 所示。


    ***图 5-13.** Etherscan 上部署交易的视图*


    如图所示，交易最初处于`待处理`状态。同时，`来自`字段中的密钥是我的账户公钥。我们也可以打开`MetaMask`上的账户详情来验证该密钥，如图 5-14
    所示。


    ***图 5-14.** MetaMask 钱包显示公钥，可在 Etherscan 上验证*


    几秒钟后，交易在`Ropsten`测试网上得到确认。详情如图 5-15 所示。


    ***图 5-15.** Etherscan 上部署交易的视图（已完成状态）*


    我们现在还能看到一个`收件人`字段。此字段对应的是合约地址。


    请记住，在第[3 章](https://doi.org/10.1007/978-1-4842-8975-4_3)中我们讨论过两种类型的地址。这就是合约地址。


    我们也可以在`Remix IDE`中验证这一点，如图 5-16 所示。


    ***图 5-16.** Remix IDE 上的合约函数*


    除了合约地址，`Remix IDE`还提供了调用这些合约的方法。


    接下来，让我们调用刚部署的智能合约中的`setMessage`函数。


    在文本框中设置消息后，界面将如图 5-17 所示。


    ***图 5-17.** 输入消息以调用智能合约函数*


    点击`setMessage`按钮后，`MetaMask`钱包将再次打开，允许我们签名交易并支付燃料费。


    我们可以由图 5-18 查看费用金额等信息。


    ***图 5-18.** MetaMask 钱包显示燃料费详情*

    '
- fmt: "***Figure 5-18.** Gas consumed for invoking the `setMessage` function on the\
    \ smart contract*\n\nWe will confirm the transaction in MetaMask now. And we can\
    \ see the transaction details on Etherscan, as shown in Figure 5-19.\n\n![](index-117_1.png)\n\
    \n**Chapter 5 Introduction to Remix IDE**\n\n***Figure 5-19.** Etherscan view\
    \ of the smart contract function invocation transaction*\n\nThere are a few things\
    \ one should remember about the numbers just shown.\n\nThe quantity of gas that\
    \ is used for a transaction is measured in gas units consumed per transaction.\
    \ This quantity, in turn, is a measure of how complicated the transaction was.\
    \ This is dependent on the number of operations and amount of storage space being\
    \ used by the smart contract.\n\nThe price that you are willing to pay for one\
    \ gas unit is referred to as the price per gas unit. Your transaction will be\
    \ processed at a different speed as a result of this. This process is referred\
    \ to as a Priority Gas Auction (PGA), and it means that all transactions are participating\
    \ in an auction to determine which miners will have the opportunity to include\
    \ their transactions in the blocks that are about to be mined.\n\nThe amount of\
    \ ETH that goes toward covering the transaction fee is determined by using the\
    \ following formula:\n\n`Transaction Fee = Gas Units Used * Price per Gas Unit`\n\
    \n**Chapter 5 Introduction to Remix IDE**\n\nCalling `getMessage` by clicking\
    \ the `getMessage` button gives us the following output in the Remix IDE console:\n\
    \n```\n{\n  \"0\": \"string: hello Web3\"\n}\n```\n\nThis is what we had set as\
    \ the message on the chain.\n\n## 5.2 Creating Own Token\n\nNow, with knowledge\
    \ of Solidity, MetaMask, and Remix, we move on to a more concrete example of an\
    \ application on the Ethereum blockchain.\n\nHow many times you might have wondered\
    \ and wished to have your own cryptocurrency. With the development of the ERC-20\
    \ standard, creating your own coin is not that hard a job. We will go into the\
    \ details in this section.\n\nThe number 20 serves as the proposal’s identifier,\
    \ and ERC is an abbreviation for Ethereum’s Request for Comments. The ETH network\
    \ was targeted for improvement when ERC-20 was developed.\n\nERC-20 is the standard\
    \ for creating tokens for DApps on the Ethereum blockchain. All Ethereum-based\
    \ tokens are required to adhere to the ERC-20 standard, which provides a set of\
    \ rules for creating these tokens.\n\nTokens, as defined by ERC-20, are assets\
    \ based on blockchains that may be sent and received and have value attached to\
    \ them. To a significant extent, ERC-20 tokens are analogous to cryptocurrencies\
    \ such as Bitcoin and Litecoin, with the difference that ERC-20 tokens operate\
    \ only on the Ethereum blockchain network.\n\nPrior to the development of the\
    \ ERC-20 standard, anyone who wanted to produce their own token was forced to\
    \ start from scratch, which resulted in a wide variety of distinct tokens. This\
    \ was the case because there were no specific guidelines or structures for developing\
    \ new tokens. Adding new types of tokens necessitated that the developers of wallets\
    \ and exchange platforms read through the source code of each individual token\
    \ and gain an understanding of it before they could begin to work with those tokens\
    \ on their respective platforms. This was a particularly arduous process. It goes\
    \ without saying that it was quite challenging to incorporate new tokens into\
    \ any program. Wallets can incorporate ERC-20–based tokens into their platform\
    \ and allow usage of these tokens via the apps. The ERC-20 token standard has\
    \ made it virtually simple and seamless to interface between different tokens.\n\
    \nThe standard specifies nine different functions that must be implemented by\
    \ a smart contract, along with three that can be implemented if desired, including\
    \ the following:\n\n- `totalSupply` – This function specifies the total supply\
    \ for this token. Once the maximum capacity is reached, no more tokens can be\
    \ generated."
  raw: '***Figure 5-18.** Gas consumed for invoking the setMessage function on* *the
    smart contract*


    We will confirm the transaction in MetaMask now. And we can see the transaction
    details on Etherscan, as shown in Figur[e 5-19](#index_split_001.html#p117).


    ![](index-117_1.png)


    Chapter 5 IntroduCtIon to remIx Ide


    ***Figure 5-19.** Etherscan view of the smart contract function* *invocation transaction*


    There are a few things one should remember about the numbers just shown.


    The quantity of gas that is used for a transaction is measured in gas units consumed
    per transaction. This quantity, in turn, is a measure of how complicated the transaction
    was. This is dependent on the number of operations and amount of storage space
    being used by the smart contract.


    The price that you are willing to pay for one gas unit is referred to as the price
    per gas unit. Your transaction will be processed at a different speed as a result
    of this. This process is referred to as a Priority Gas Auction (PGA), and it means
    that all transactions are participating in an auction to determine which miners
    will have the opportunity to include their transactions in the blocks that are
    about to be mined.


    The amount of ETH that goes toward covering the transaction fee is determined
    by using the following formula:


    Transaction Fee = Gas Units Used * Price per Gas Unit 108


    Chapter 5 IntroduCtIon to remIx Ide Calling getMessage by clicking the getMessage
    button gives us the following output in the Remix IDE console:


    {


    "0": "string: hello Web3"


    }


    This is what we had set as the message on the chain.


    **5.2 Creating Own Token**


    Now, with knowledge of Solidity, MetaMask, and Remix, we move on to a more concrete
    example of an application on the Ethereum blockchain.


    How many times you might have wondered and wished to have your own cryptocurrency.
    With the development of the ERC-20 standard, creating your own coin is not that
    hard a job. We will go into the details in this section.


    The number 20 serves as the proposal’s identifier, and ERC is an abbreviation
    for Ethereum’s Request for Comments. The ETH network was targeted for improvement
    when ERC-20 was developed.


    ERC-20 is the standard for creating tokens for DApps on the Ethereum blockchain.
    All Ethereum-based tokens are required to adhere to the ERC-20 standard, which
    provides a set of rules for creating these tokens.


    Tokens, as defined by ERC-20, are assets based on blockchains that may be sent
    and received and have value attached to them. To a significant extent, ERC-20
    tokens are analogous to cryptocurrencies such as Bitcoin and Litecoin, with the
    difference that ERC-20 tokens operate only on the Ethereum blockchain network.


    Prior to the development of the ERC-20 standard, anyone who wanted to produce
    their own token was forced to start from scratch, which resulted in a wide variety
    of distinct tokens. This was the case because there were no specific guidelines
    or structures for developing new tokens. Adding new 109


    Chapter 5 IntroduCtIon to remIx Ide types of tokens necessitated that the developers
    of wallets and exchange platforms read through the source code of each individual
    token and gain an understanding of it before they could begin to work with those
    tokens on their respective platforms. This was a particularly arduous process.
    It goes without saying that it was quite challenging to incorporate new tokens
    into any program. Wallets can incorporate ERC-20–based tokens into their platform
    and allow usage of these tokens via the apps. The ERC-20 token standard has made
    it virtually simple and seamless to interface between different tokens.


    The standard specifies nine different functions that must be implemented by a
    smart contract, along with three that can be implemented if desired, including
    the following:


    • totalSupply – This function specifies the total supply for this token. Once
    the maximum capacity is reached, no more tokens can be generated.'
  trans: "\n***图 5-18.** 调用智能合约 `setMessage` 函数消耗的 Gas*\n\n现在我们将在 MetaMask 中确认这笔交易。我们可以在\
    \ Etherscan 上查看交易详情，如图 5-19 所示。\n\n![](img/index-117_1.png)\n\n**第 5 章 Remix IDE\
    \ 简介**\n\n***图 5-19.** Etherscan 上智能合约函数调用交易的视图*\n\n关于刚刚展示的数字，有几点需要记住。\n\n交易所使用的\
    \ Gas 数量以每笔交易消耗的 Gas 单位来计量。而这一数量反映了交易的复杂程度。它取决于智能合约所使用的操作数量以及存储空间大小。\n\n你愿意为每个\
    \ Gas 单位支付的价格被称为每单位 Gas 价格。你的交易将因此以不同的速度被处理。这一过程被称为优先 Gas 拍卖（PGA），这意味着所有交易都在参与一场拍卖，以决定哪些矿工将有机会将他们的交易纳入即将被挖掘的区块中。\n\
    \n用于支付交易费用的 ETH 金额通过以下公式计算：\n\n`交易费用 = 消耗的 Gas 单位 × 每单位 Gas 价格`\n\n**第 5 章 Remix\
    \ IDE 简介**\n\n通过点击 `getMessage` 按钮调用 `getMessage` 函数，在 Remix IDE 控制台中会得到以下输出：\n\
    \n```\n{\n  \"0\": \"string: hello Web3\"\n}\n```\n\n这正是我们在链上设置的消息。\n\n## 5.2\
    \ 创建自己的代币\n\n现在，凭借对 Solidity、MetaMask 和 Remix 的了解，我们将转向以太坊区块链上一个更具体的应用示例。\n\n\
    你可能曾无数次幻想并渴望拥有自己的加密货币。随着 ERC-20 标准的发展，创建自己的代币并非难事。我们将在本节中详细探讨。\n\nERC 是“以太坊征求意见稿”的缩写，其中的数字\
    \ 20 是提案的标识符。ERC-20 的开发旨在改进 ETH 网络。\n\nERC-20 是在以太坊区块链上为去中心化应用创建代币的标准。所有基于以太坊的代币都必须遵循\
    \ ERC-20 标准，该标准为创建这些代币提供了一套规则。\n\n根据 ERC-20 的定义，代币是基于区块链的资产，可以发送和接收，并具有价值。在很大程度上，ERC-20\
    \ 代币类似于比特币和莱特币等加密货币，区别在于 ERC-20 代币仅在以太坊区块链网络上运行。\n\n在 ERC-20 标准制定之前，任何想要创建自己代币的人都必须从零开始，这导致了大量不同类型代币的出现。之所以如此，是因为当时没有开发新代币的具体指南或结构。添加新型代币要求钱包和交易平台的开发者阅读并理解每种代币的源代码，然后才能在其各自平台上使用这些代币。这是一个尤为艰巨的过程。不言而喻，在任何程序中集成新代币都相当具有挑战性。钱包可以集成基于\
    \ ERC-20 的代币到其平台，并允许通过这些应用使用此类代币。ERC-20 代币标准几乎使得不同代币之间的交互变得简单且无缝。\n\n该标准规定了智能合约必须实现的九个功能，以及三个可选实现的功能，其中包括：\n\
    \n- `totalSupply` – 该函数指定了该代币的总供应量。一旦达到最大容量，便无法再生成更多的代币。\n"
