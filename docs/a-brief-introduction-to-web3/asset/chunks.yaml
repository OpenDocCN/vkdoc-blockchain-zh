  raw: 'At a high level, the transaction flow in a Bitcoin blockchain works like the
    one shown in Figure [2-1.](#index_split_000.html#p33)


    ![](index-33_1.jpg)


    Chapter 2 BloCkChain


    ***Figure 2-1.** How a transaction works on Bitcoin blockchain* **2.8 Cryptographic
    Keys**


    Since public blockchain networks are permissionless and trustless, we need a mechanism
    to authenticate the users in absence of a centralized authority. This task is
    achieved by providing each participant on the network with a private and public
    key pair. The private key remains with 23


    ![](index-34_1.png)


    Chapter 2 BloCkChain


    the user and should be kept highly protected. The private key is used to sign
    the transactions of the user, whereas the public key (which is visible to everyone)
    can be used to validate the signer. In this way, without a central authority and
    using the private and public key infrastructure, security is achieved on the decentralized
    blockchain network.


    **2.9 Blockchain Compared to a Singly**


    **Linked List**


    There is a certain degree of similarity between the data structure of a blockchain
    and that of a singly linked list, as shown in Figur[e 2-2.](#index_split_000.html#p34)


    ***Figure 2-2.** Linked list–like structure depicted for the blockchain* We can
    see the first block is called the genesis block, and then from there each new
    block created holds a reference to the previous block. As an example, block 1
    will hold a reference to block 0 and block 2 to block 1 and so on. Apart from
    this pointer, the hash of the previous block is stored. This appears like a singly
    linked list data structure. To add to the list we need to use either proof of
    work or proof of stake, but deletion is extremely difficult on the blockchain,
    unlike a linked list, where it’s easy to remove nodes.


    In essence, a blockchain is immutable. No record can be deleted. If we try to
    think about it, any alteration to any block means all the blocks ahead of that
    block have to be updated with the hash of previous blocks.


    Chapter 2 BloCkChain


    In the case of networks like Bitcoin, this would mean needing immense computing
    power to use proof of work to alter the blocks. That’s one of the reasons it’s
    almost impossible to attack the Bitcoin blockchain network.


    Next, we are going to introduce the Ethereum blockchain, which is the programmable
    blockchain we will use for all our future work in this book.


    **2.10 Ethereum**


    Ethereum is a blockchain network that includes a Turing-complete programming language
    that can be used to build a variety of decentralized applications (also called
    DApps). The Ethereum network is powered by its own cryptocurrency, ether. The
    Ethereum network is currently well known for enabling the use of smart contracts.
    Smart contracts can be compared to cryptographic bank lockers that contain specific
    values.


    Certain conditions must be met before these cryptographic lockers can be unlocked.
    Solidity, a programming language, is primarily used to create smart contracts.
    Solidity is a relatively simple-to-learn object-oriented programming language.
    We will see more of Solidity in Chapt[er 3](https://doi.org/10.1007/978-1-4842-8975-4_3).


    Ethereum works on two types of accounts:


    1\. **Externally owned accounts (EOA)**


    Private keys are used to control externally owned


    accounts. Each EOA is protected by a public–private


    key pair. Users can communicate by creating and


    signing transactions.


    Chapter 2 BloCkChain


    2\. **Contract accounts**


    Contract codes are used to manage contract accounts. These codes are saved alongside
    the account. Each contract account has an associated ether balance. These accounts’
    contract codes are activated whenever they receive a transaction from an EOA or
    a message from another contract. When the contract code is enabled, it is possible
    to read/write messages to local storage, send messages, and create contracts.


    **2.11 Summary**


    In this chapter, we covered the basics of blockchain architecture and the different
    consensus algorithms like proof of work and proof of stake that are commonly used
    in blockchain networks like Bitcoin and Ethereum.


    In the next chapter, we will cover Solidity, which is the language used on the
    Ethereum blockchain, and how Solidity is used for creating smart contracts.


    **CHAPTER 3**


    **Solidity**


    Have you ever heard of or encountered a smart contract? If someone has been living
    under a rock, they maybe have not heard about it. Having said that, smart contracts
    define a way by which we can execute code on the blockchain.


    One of the languages used to define these smart contracts is Solidity.


    Solidity allows us to program the Ethereum blockchain, thereby opening up doors
    for the immense possibilities of decentralized application development. It’s important
    that blockchain beginners learn Solidity. It is essential to have a thorough understanding
    of how Solidity may be utilized for the development of smart contracts, as well
    as to take an in-depth look at the various components.


    Learners should also reflect on examples in order to gain a better understanding
    of the components that make up the architecture and operation of Solidity. In
    the same vein, an in-depth contemplation of the various applications of Solidity
    could be of use in gaining a better understanding of its significance. In addition,
    a lot of students wonder, “Is it easy to study Solidity?” It is essential to be
    aware that it is simpler to learn about Solidity if you have a good tutorial to
    follow along with.


    This chapter provides a comprehensive summary of Solidity as well as other related
    elements, such types, functions, events, and inheritance.


    © Shashank Mohan Jain 2023


    S. M. Jain, *A Brief Introduction to Web3*[, https://doi.org/10.1007/978-1-4842-8975-4_3](https://doi.org/10.1007/978-1-4842-8975-4_3#DOI)


    Chapter 3 Solidity


    **3.1 What Is Solidity?**


    Solidity is a high-level programming language whose primary purpose is to facilitate
    the creation and execution of smart contracts. C++, JavaScript, and Python are
    the key programming languages that have had an impact on Solidity. Solidity was
    proposed by Gavin Wood and was written by the Ethereum team under Christian Reitwiessner.
    Additionally, Solidity was designed with a focus on the Ethereum virtual machine.


    On the Ethereum blockchain, the creation of decentralized applications, often
    known as DApps, can be accomplished with the help of Solidity. The year 2015 marked
    a turning point for Solidity. In this condensed version, the primary highlighted
    qualities of Solidity are essential components that demonstrate the efficacy of
    Solidity in various contexts. When you study Solidity, you will notice that it
    has the following significant qualities:


    1\. Smart contracts are implemented using Solidity, a statically typed language.
    Smart contracts can be


    created and deployed using an object- oriented or


    contract-oriented framework.


    2\. It is possible to create contracts that deal with voting, consensus, multisignature
    wallets, and


    other applications using the Solidity programming


    language.


    Before we start to understand the nuances of Solidity, we need to be aware of
    a few things.


    Chapter 3 Solidity


    **3.2 Ethereum**


    Using Ethereum as a starting point for learning Solidity is a no-brainer. The
    Ethereum virtual machine is the primary aim of Solidity, which means that readers
    should pay attention to Ethereum in the context of Solidity. This open-source
    and decentralized platform helps execute smart contracts and is built on top of
    blockchain technology. Ethereum is an open software platform that makes use of
    blockchain technology to assist developers in the creation and deployment of decentralized
    applications.


    Ether is the crypto asset that powers the Ethereum network.


    Application developers use ether to pay for transaction services and fees on the
    Ethereum network, making it more than just a transferable cryptocurrency.'
  trans: "\n# 第 2 章：区块链\n\n在较高层面上，比特币区块链中的交易流程如图 2-1 所示。\n\n![](img/index-33_1.jpg)\n\
    \n**图 2-1.** 交易在比特币区块链上的运作方式\n\n## 2.8 加密密钥\n\n由于公共区块链网络是无需许可且去信任化的，我们需要一种机制来在缺乏中心化权威机构的情况下对用户进行身份验证。这一任务通过为网络上的每个参与者提供一对私钥和公钥来实现。私钥由用户持有，并应受到高度保护。私钥用于签署用户的交易，而公钥（对所有人可见）则可用于验证签名者。通过这种方式，无需中心化权威机构，利用私钥和公钥基础设施，即可在去中心化的区块链网络上实现安全性。\n\
    \n![](img/index-34_1.png)\n\n## 2.9 区块链与单向链表的比较\n\n区块链的数据结构与单向链表的数据结构具有一定程度的相似性，如图\
    \ 2-2 所示。\n\n**图 2-2.** 区块链描绘出的类似链表的结构\n\n我们可以看到，第一个区块被称为创世区块，此后创建的每一个新区块都持有对前一个区块的引用。例如，区块\
    \ 1 将持有对区块 0 的引用，区块 2 持有对区块 1 的引用，依此类推。除了这个指针之外，还会存储前一个区块的哈希值。这看起来就像一个单向链表数据结构。要向该列表添加元素，我们需要使用工作量证明或权益证明，但在区块链上删除操作极其困难，这与链表不同，在链表中删除节点很容易。\n\
    \n本质上，区块链是不可变的。没有任何记录可以被删除。如果我们尝试思考一下，对任何一个区块的任何修改都意味着该区块之后的所有区块都必须用前一个区块的哈希值进行更新。\n\
    \n对于像比特币这样的网络来说，这意味着需要巨大的计算能力才能使用工作量证明来修改区块。这也是攻击比特币区块链网络几乎不可能的原因之一。\n\n接下来，我们将介绍以太坊区块链，它是我们将在本书后续所有工作中使用的可编程区块链。\n\
    \n## 2.10 以太坊\n\n以太坊是一个区块链网络，它包含一种图灵完备的编程语言，可用于构建各种去中心化应用（也称为 DApp）。以太坊网络由其自身的加密货币以太币驱动。以太坊网络目前因支持使用智能合约而广为人知。智能合约可以比作包含特定价值的加密银行保险柜。\n\
    \n必须满足某些条件才能解锁这些加密保险柜。`Solidity` 这种编程语言主要用于创建智能合约。`Solidity` 是一种相对易于学习的面向对象编程语言。我们将在[第\
    \ 3 章](https://doi.org/10.1007/978-1-4842-8975-4_3)中看到更多关于 `Solidity` 的内容。\n\n\
    以太坊基于两种账户类型运作：\n\n1. **外部拥有账户 (EOA)**\n   私钥用于控制外部拥有账户。每个 EOA 都由一对公私钥保护。用户可以通过创建和签署交易来进行通信。\n\
    \n2. **合约账户**\n   合约代码用于管理合约账户。这些代码与账户一起保存。每个合约账户都有一个关联的以太币余额。每当这些账户从 EOA 收到交易或从另一个合约收到消息时，其合约代码就会被激活。当合约代码被激活时，可以读取/写入本地存储的消息、发送消息以及创建合约。\n\
    \n## 2.11 总结\n\n在本章中，我们涵盖了区块链架构的基础知识，以及像工作量证明和权益证明这类在比特币和以太坊等区块链网络中常用的不同共识算法。\n\
    \n在下一章中，我们将介绍 `Solidity`，它是以太坊区块链上使用的语言，以及如何使用 `Solidity` 创建智能合约。\n\n# 第 3 章：Solidity\n\
    \n你听说过或遇到过智能合约吗？如果有人与世隔绝，可能还没听说过它。话虽如此，智能合约定义了一种我们可以在区块链上执行代码的方式。\n\n用于定义这些智能合约的语言之一是\
    \ `Solidity`。\n\n`Solidity` 允许我们对以太坊区块链进行编程，从而为去中心化应用开发的巨大可能性打开了大门。区块链初学者学习 `Solidity`\
    \ 很重要。透彻理解如何利用 `Solidity` 进行智能合约开发，以及深入审视其各个组成部分，是至关重要的。\n\n学习者还应该反思示例，以便更好地理解构成\
    \ `Solidity` 架构和运作的组件。同样，深入思考 `Solidity` 的各种应用可能有助于更好地理解其重要性。此外，许多学生都想知道：“学习 `Solidity`\
    \ 容易吗？” 重要的是要知道，如果你有一个好的教程可以跟随学习，那么学习 `Solidity` 会更简单。\n\n本章提供了对 `Solidity` 以及其他相关元素（如类型、函数、事件和继承）的全面总结。\n\
    \n© Shashank Mohan Jain 2023\nS. M. Jain，《Web3 简介》，[`doi.org/10.1007/978-1-4842-8975-4_3`](https://doi.org/10.1007/978-1-4842-8975-4_3#DOI)\n\
    \n## 3.1 什么是 Solidity？\n\n`Solidity` 是一种高级编程语言，其主要目的是促进智能合约的创建和执行。`C++`、`JavaScript`\
    \ 和 `Python` 是对 `Solidity` 产生影响的主要编程语言。`Solidity` 由 Gavin Wood 提出，并由 Christian\
    \ Reitwiessner 领导下的以太坊团队编写。此外，`Solidity` 的设计重点在于以太坊虚拟机。\n\n在以太坊区块链上，可以借助 `Solidity`\
    \ 来创建去中心化应用，通常称为 DApp。2015 年对 `Solidity` 来说是一个转折点。在这个简化的版本中，`Solidity` 主要强调的特性是其关键组成部分，展示了\
    \ `Solidity` 在不同背景下的有效性。当你学习 `Solidity` 时，你会注意到它具有以下重要特性：\n\n1. 智能合约是使用 `Solidity`\
    \ 实现的，它是一种静态类型语言。可以使用面向对象或面向合约的框架来创建和部署智能合约。\n2. 可以使用 `Solidity` 编程语言创建用于投票、共识、多重签名钱包和其他应用的合约。\n\
    \n在我们开始理解 `Solidity` 的细微差别之前，我们需要了解几件事。\n\n## 3.2 以太坊\n\n使用以太坊作为学习 `Solidity`\
    \ 的起点是显而易见的。以太坊虚拟机是 `Solidity` 的主要目标，这意味着读者应该关注以太坊在 `Solidity` 环境中的情况。这个开源且去中心化的平台有助于执行智能合约，并且建立在区块链技术之上。以太坊是一个开源软件平台，它利用区块链技术来帮助开发者创建和部署去中心化应用。\n\
    \n以太币是驱动以太坊网络的加密资产。应用开发者使用以太币来支付以太坊网络上的交易服务和费用，使其不仅仅是一种可转让的加密货币。\n"
- fmt: "### Ethereum Gas\n\nEthereum uses a second token type to pay miners for the\
    \ inclusion of transactions in specific blocks of the Ethereum blockchain. For\
    \ all transactions involving smart contracts, `gas` is an essential component,\
    \ and Ethereum's `gas` token serves as a vital link in the chain. Ethereum `gas`\
    \ is a key factor in attracting miners that want to plant a smart contract on\
    \ the blockchain.\n\n### 3.2.1 Ethereum Virtual Machine\n\nThe Ethereum virtual\
    \ machine (`EVM`) is a crucial component of the Ethereum blockchain. Smart contracts\
    \ in Ethereum can be executed in this virtual machine. Without `EVM`, it is impossible\
    \ for a global network of public nodes to provide the necessary security and capability\
    \ for running untrusted code.\n\nNow, since we can run untrusted code, the environment\
    \ should provide us with the right security measures, like protection against\
    \ a denial of service attack. Ethereum, by using the concept of `gas`, protects\
    \ against such attacks.\n\n### Chapter 3 Solidity\n\n### 3.3 Smart Contracts\n\
    \nAll of the business logic that users write in their applications should be defined\
    \ within smart contracts. As a result, it's critical to get a firm grasp of the\
    \ fundamentals of smart contracts as soon as possible.\n\nBefore writing a smart\
    \ contract, one should grasp the basics of the Solidity programming language.\
    \ That is what we will do here.\n\n### 3.4 Making Sense of Solidity Syntax\n\n\
    ### 3.4.1 Pragma\n\nThe `pragma` directive is the first line of code in a Solidity\
    \ smart contract; for example, the `pragma` directive in Solidity `0.4.16` source\
    \ code samples like this one. That's not all: The contract is compatible with\
    \ Solidity versions higher than the specified one. Additionally, the smart contract's\
    \ `pragma` directive confines Solidity to version `0.9.0`, as well.\n\nExample\
    \ of `pragma` syntax:\n\n```solidity\npragma solidity ^0.8.13;\n```\n\n### 3.4.2\
    \ Variables\n\nAny computer language would be incomplete without variables. As\
    \ a result, you'll need a Solidity course to learn about variables and how they\
    \ may be used to store information. Remember that variables are nothing more than\
    \ placeholders in memory for values to be stored. As a result, by declaring a\
    \ variable, you're reserving memory space in advance.\n\nSolidity supports different\
    \ data types, such as `integer`, `string`, `Boolean`, etc. Depending on the variable's\
    \ data type, the operating system determines how much reserved memory should be\
    \ allocated and which entities should be stored there.\n\n### Chapter 3 Solidity\n\
    \nLearning Solidity necessitates an understanding of variables. Variables in Solidity\
    \ can be divided into three categories: state dependent, locally dependent, and\
    \ globally dependent. State variables are those that are permanently held in contract\
    \ storage. During the process of executing a function, the values of the local\
    \ variables are present.\n\nGlobal variables, on the other hand, are unique variables\
    \ found in the global namespace that aid in the retrieval of blockchain-related\
    \ data. As a statically typed language, Solidity necessitates specifying the type\
    \ of a state or local variable when it's defined. In the absence of any concept\
    \ of `null` or `undefined`, all declared variables have a default value assigned\
    \ to them based on their type. Some further thoughts on variables in Solidity\
    \ are warranted here, as follows:\n\n1.  **State Variables** – Variables that\
    \ are stored in contract storage.\n    As an example:\n    ```solidity\n    pragma\
    \ solidity ^0.8.13;\n\n    contract NewsBlog {\n        uint newsCount; // newsCount\
    \ is a State variable\n\n        constructor() public {\n            newsCount\
    \ = 1; // Initializing the state variable\n        }\n    }\n    ```\n\n2.  **Local\
    \ Variables** – Variables whose values are preserved throughout the execution\
    \ of the function.\n    As an example:\n    ```solidity\n    pragma solidity ^0.8.13;\n\
    \n    contract NewsBlog {\n        uint newsCount; // newsCount is a State variable\n\
    \n        constructor() public {\n            newsCount = 1; // Initializing the\
    \ state variable\n        }\n\n        function addToNews() public view returns(uint)\
    \ {\n            uint news=1; //news is an example of a local variable used within\
    \ a function scope\n            uint res=newsCount+news;\n            return res;\n\
    \        }\n    }\n    ```\n\n3.  **Global Variables** – The global namespace\
    \ contains..."
