    # 第 7 章：IPFS 与 NFT


    网络中的每个节点在特定时刻要么是客户端，要么是某条内容。作为用户，您需要负责维护一份对等节点列表，以便整理出可用的清单。在网络的另一端拥有少量熟人（其 ID
    与您自身 ID 相差较大），并在邻近区域拥有大量朋友（其 ID 与您非常相似）。


    当请求内容时（无论是您自己需要，还是因对等节点请求），您可以选择将搜索范围限制在那些您熟悉的、且距离内容 ID 最近的节点上。该请求平均在 `Log(N)`
    时间内即可完成。此外，在内容返回过程中，每个节点都会创建一份数据缓存，以便后续搜索时能更快地访问。这些缓存机制非常激进，并且由于数据永不改变，从而降低了网络成本。


    之后，您可以通过运行本地节点，或者将内容 ID 传递给现有节点进行路由，从而检索到存储的内容。


