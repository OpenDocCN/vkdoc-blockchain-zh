    **3.4.5.4 Assignment Operators**


    Assignment operators in Solidity comprise the following: 1\. Simple Assignment
    (a=b+c)


    2\. Add and Assign (a+=b is equivalent to a=a+b)


    3\. Subtract and Assign ( a-=b implies a=a-b)


