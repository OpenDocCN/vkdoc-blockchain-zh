    **CHAPTER 8**


    **Hardhat**


    In previous chapters, we have seen how to manage the lifecycle of Ethereum-based
    smart contracts using Remix IDE and Truffle. Now we will look at another framework
    known as Hardhat that can be used to manage the lifecycle of smart contracts.
    The lifecycle includes tasks like creating, compiling, testing, and deploying
    the contracts.


    You can create smart contracts while having the assistance of Hardhat throughout
    the entire process. It is also of great assistance when testing already implemented
