- fmt: "# Chapter 7: IPFS and NFTs\n\nTo get the owner of the contract, we click `Owner`.\
    \ We get the result shown in Figure 7-12.\n\n***Figure 7-12.** Owner function\
    \ shown in Remix IDE*\n\nYou can check on the owner of an NFT by passing the token\
    \ ID, as shown in Figure 7-13.\n\n***Figure 7-13.** OwnerOf function in Remix\
    \ IDE*\n\nNext, we check the `tokenURI` function, as shown in Figure 7-14.\n\n\
    ***Figure 7-14.** Token URI (IPFS URI in this case) as shown in Remix IDE*\n\n\
    ![](index-173_1.png)\n\nHere again we pass the token ID as input. We can see it\
    \ returns the URL of the metadata of the NFT stored in IPFS:\n\n`https://ipfs.io/ipfs/QmZwaouD8bVMoNgznszxsSAS7W9EgkdfC5rF7TSzz1Q25N`\n\
    \nFigure 7-15 shows the content of the file.\n\n***Figure 7-15.** Content of the\
    \ file used for NFT*\n\nWe leave it to the reader now to try the same exercise\
    \ using `Truffle`.\n\n## 7.4 Summary\n\nIn this chapter, we looked at IPFS, which\
    \ is the InterPlanetary File System. We looked at how we can upload and retrieve\
    \ content via IPFS.\n\nNext, we explored the ERC-721 spec, which is about the\
    \ creation of NFTs. We created a simple NFT using Remix and IPFS.\n\nIn the next\
    \ chapter, we will get a brief overview of another framework for the smart contract\
    \ lifecycle, which is known as `Hardhat`.\n\n# Chapter 8: Hardhat\n\nIn previous\
    \ chapters, we have seen how to manage the lifecycle of Ethereum-based smart contracts\
    \ using Remix IDE and `Truffle`. Now we will look at another framework known as\
    \ `Hardhat` that can be used to manage the lifecycle of smart contracts. The lifecycle\
    \ includes tasks like creating, compiling, testing, and deploying the contracts.\n\
    \nYou can create smart contracts while having the assistance of `Hardhat` throughout\
    \ the entire process. It is also of great assistance when testing already implemented\
    \ contracts and developing \"future assumptions.\"\n\n## 8.1 Installation of Hardhat\
    \ Framework\n\nInstall `node.js` (version 16.16.0) from the following link: `https://nodejs.org/en/download/`\n\
    \nThe following will include `npm` 8.11.0 with it:\n\nUse `npm` to install `hardhat`:\n\
    \n```\nnpm install -d hardhat\n```\n\n## 8.2 Workflow for Hardhat\n\nAt this stage,\
    \ contracts are given their coding form and tested. Because you need to test each\
    \ and every line of code, writing smart contracts and testing code typically go\
    \ hand in hand. Because it offers some very nice plugins for testing and optimizing\
    \ the code, `Hardhat` performs exceptionally well in this regard.\n\nDuring the\
    \ deployment step, you will first compile the code, which will involve converting\
    \ the Solidity code into bytecode. Next, you will optimize the code before deploying\
    \ it. There are a lot of great plugins available for `Hardhat`.\n\nLet's begin\
    \ a brand-new `Hardhat` project now that `Hardhat` has been successfully installed.\
    \ We'll use `npx` to do so. `npx` helps process `node.js` executables.\n\nCreate\
    \ a project directory named `coin`:\n\n```\nmkdir coin\ncd coin\n```\n\nUse the\
    \ command:\n\n```\nnpx hardhat\n```\n\n***Figure 8-1.** Hardhat installation*\n\
    \nInstall the following dependencies:\n\n```\nnpm install --save-dev @nomiclabs/hardhat-ethers\
    \ ethers @nomiclabs/hardhat-waffle ethereum-waffle chai\n```\n\nChange to the\
    \ `coin` directory:\n\n```\ncd coin\n```\n\nWe will start by creating a contract.\n\
    \nCreate a directory named `Contracts` inside the `coin` directory and copy the\
    \ file in Listing 8-1 into the `contracts` directory.\n\n***Listing 8-1.** Code\
    \ for coin contract*\n\n```\n// SPDX-License-Identifier: LGPL-3.0-only\npragma\
    \ solidity 0.8.15;\n\ninterface ERC20Interface {\n    function totalSupply() external\
    \ view returns (uint);\n    function balanceOf(address tokenOwner) external view\
    \ returns (uint balance);\n    function allowance(address tokenOwner, address\
    \ spender) external view returns (uint remaining);\n    function transfer(address\
    \ to, uint tokens) external returns (bool success);\n```"
