    **Blockchain**


    Blockchain technology presents an innovative take on the traditional distributed
    database. The utilization of existing technology in unconventional settings is
    the source of the innovation. When we think of a traditional database like Postgres,
    there is a master node that accepts the write requests and is responsible for
    synchronizing the state changes to other Postgres nodes. In a decentralized setup
    like blockchain, there is no master node, but still it serves the same purpose
    of updating the ledger and making sure that other nodes in the network reflect
    the updated state correctly.


    There are a great number of distinct varieties of blockchains and applications
    for blockchain technology. The blockchain is an all-encompassing technology that
    is currently being integrated across a variety of different platforms and pieces
    of hardware around the world.


