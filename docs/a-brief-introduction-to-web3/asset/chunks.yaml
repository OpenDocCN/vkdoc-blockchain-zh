    ## 4.4 Web3.js


    The Ethereum APIs can be consumed over an HTTP-based protocol.


    So, one can create HTTP clients, which allows us to interface with the Ethereum
    networks (either mainnet or testnet). To ease the process of development, the
    Ethereum Foundation created a library in JavaScript that allows us to access the
    Ethereum blockchain programmatically. They called this library `web3.js`, and,
    as the name suggests, it’s for web3-based applications, and the library itself
    is written in the JavaScript programming language.


    This library comprises different modules, which are described in the next subsections.


    ### 4.4.1 web3-eth


    A user of `web3.js` is able to connect with the Ethereum blockchain thanks to
    the `web3-eth` module, which offers functions that make this possible.


    To be more specific, these functions are able to communicate with smart contracts,
    accounts that are controlled by other parties, nodes, blocks that have been mined,
    and transactions.


    Using the `web3-eth` library functions, one can sign the transactions, can check
    balances in your Ethereum wallet, as well as send the signed transaction over
    the internet to the Ethereum blockchain.


    ### 4.4.2 web3-shh


    You will be able to interact with the Whisper protocol if you make use of the
    `web3-shh` module. Whisper is a messaging protocol that was developed to facilitate
    the easy broadcasting of messages and the low-level, asynchronous transmission
    of data. The following are two instances that illustrate the point:


    1. The network receives a Whisper message when `web3.shh.post` is called.

    2. Apart from just sending messages, one can subscribe to messages using the `web3.shh.subscribe`
    method. This allows the user to receive messages from the network.


