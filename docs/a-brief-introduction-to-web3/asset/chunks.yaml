  trans: "\n5. 小于（`<`）—— 用于检查运算符左侧的操作数是否小于右侧的操作数  \n6. 小于或等于（`<=`）—— 用于检查运算符左侧的操作数是否小于或等于右侧的操作数\
    \  \n\n### 3.4.5.3 逻辑运算符\n\nSolidity 中的逻辑运算符包括以下内容：  \n1. 逻辑与（`&&`）—— 如果运算符左侧的操作数为真，则返回\
    \ `true`。  \n2. 逻辑或（`||`）—— 如果其中一个操作数为真，则返回 `true`。  \n3. 逻辑非（`!`）—— 它反转操作数的逻辑状态，并返回操作数状态的反值。\n\
    \n### 3.4.5.4 赋值运算符\n\nSolidity 中的赋值运算符包括以下内容：  \n1. 简单赋值（`a = b + c`）  \n2. 加后赋值（`a\
    \ += b` 等价于 `a = a + b`）  \n3. 减后赋值（`a -= b` 表示 `a = a - b`）  \n4. 乘后赋值（`a *=\
    \ b` 表示 `a = a * b`）  \n5. 除后赋值（`a /= b` 表示 `a = a / b`）  \n6. 取模后赋值（`a %= b`\
    \ 表示 `a = a % b`）\n\n### 3.4.6 循环\n\n循环是一种简单的结构，允许在代码中重复执行某段操作。例如，假设我们要显示博客网页的点击次数。我们可以使用循环遍历博客网页的点击次数并显示结果。\n\
    \n与其它编程语言一样，Solidity 支持不同的循环语法。\n\n以下是 Solidity 中 `for` 循环的示例：\n\n```solidity\n\
    pragma solidity ⁰.8.13;\n\ncontract News {\n    uint newsCount;\n\n    constructor()\
    \ public {\n        newsCount = 0;\n    }\n\n    function count() public returns\
    \ (uint val) {\n        // for 循环示例\n        for (uint i = 0; i < 5; i++) {\n\
    \            newsCount++;\n        }\n        return newsCount;\n    }\n}\n```\n\
    \nSolidity 中的 `while` 循环：\n\n```solidity\npragma solidity ⁰.8.13;\n\ncontract\
    \ News {\n    uint newsCount;\n\n    constructor() public {\n        newsCount\
    \ = 0;\n    }\n\n    function count() public returns (uint val) {\n        uint\
    \ i;\n        while (i <= 5) {\n            newsCount++;\n            i++;\n \
    \       }\n        return newsCount;\n    }\n}\n```\n\nSolidity 中的 `do while`\
    \ 循环：\n\n```solidity\npragma solidity ⁰.8.13;\n\ncontract News {\n    uint newsCount;\n\
    \n    constructor() public {\n        newsCount = 0;\n    }\n\n    function count()\
    \ public returns (uint val) {\n        uint i;\n        do {\n            newsCount++;\n\
    \            i++;\n        }\n        while (i <= 5);\n        return newsCount;\n\
    \    }\n}\n```\n\n### 3.4.7 决策流\n\n所有编程语言（包括 Solidity）都提供在代码中应用条件逻辑的方法。基于某些条件，我们可能会选择执行某条代码路径，而当其它条件为真时则选择另一条路径。这就是决策流所实现的功能。\n\
    \nSolidity 支持 `if` 和 `if else` 语句，以在智能合约中实现决策流和条件逻辑。\n\n以下是 `if` 语句的示例：\n\n```solidity\n\
    pragma solidity ⁰.8.13;\n\ncontract News {\n    uint newsCount;\n\n    constructor()\
    \ public {\n        newsCount = 0;\n    }\n\n    function isFake() public returns\
    \ (string memory) {\n        // 这里检查 if 条件\n        if (newsCount > 3)\n     \
    \       return \"too many news articles\";\n        return \"not much news\";\n\
    \    }\n\n    function count() public returns (uint val) {\n        uint i;\n\
    \        do {\n            newsCount++;\n            i++;\n        }\n       \
    \ while (i <= 5);\n        return newsCount;\n    }\n}\n```\n\n类似地，我们还有用于决策的 `if\
    \ else` 流程。例如：\n\n```solidity\npragma solidity ⁰.8.13;\n\ncontract News {\n  \
    \  uint newsCount;\n\n    constructor() public {\n        newsCount = 0;\n   \
    \ }\n\n    function isFake() public returns (string memory) {\n        // 在这里检查\
    \ if else 条件\n        if (newsCount > 3) {\n            return \"too many news\
    \ articles\";\n        } else {\n            return \"not much news\";\n     \
    \   }\n    }\n\n    function count() public returns (uint val) {\n        uint\
    \ i;\n        do {\n            newsCount++;\n            i++;\n        }\n  \
    \      while (i <= 5);\n        return newsCount;\n    }\n}\n```\n\n### 3.4.8\
    \ Solidity 中的函数\n\nSolidity 通过在智能合约中创建函数来提倡代码的可重用性和可读性。函数允许我们编写可读的代码，同时也可以将特定功能定义为一个代码块。这意味着你不必重复编写相同的代码。它有助于程序员编写易于修改的代码。\n\
    \n函数让程序员能够将大型程序分解为更小、更易于处理的片段。\n\n与任何其它高级编程语言一样，Solidity 拥有编写模块化函数代码所需的所有特性。\n\
    \n## 第 3 章 Solidity\n"
- fmt: "让我们来看一个智能合约中计数函数的例子。\n\n我们并未展示完整的合约，仅给出函数定义：\n\n```solidity\nfunction count()\
    \ public\nreturns (uint val) {\n  uint i;\n  do {\n    newsCount++;\n    i++;\n\
    \  }\n  while (i <= 5);\n  return newsCount;\n}\n```\n\n这里，函数名是`count`，且不接收任何参数。它返回一个整型值，作用域为`public`。\n\
    \n我们也可以定义接收输入值作为参数的函数。\n\n以下是带参数的函数示例：\n\n```solidity\nfunction oddEven(uint x)\
    \ public returns (string memory)\n{\n  if (x % 2 == 0) return \"even\";\n  else\n\
    \  {\n    return \"odd\";\n  }\n}\n```\n\n这里我们看到函数`oddEven`接收一个整型参数，并返回一个字符串，表示该数字是奇数还是偶数。\n\
    \n在Solidity中，函数可以有`return`语句，但并非必须。如果你希望函数返回值，则需要使用`return`。函数中的最后一条语句应该是`return`。\n\
    \n# 第3章 Solidity\n\n## 3.4.8.1 函数修饰符\n\n函数修饰符是Solidity中的一个重要概念。它允许我们将代码中一些通用方面外部化到修饰符中，从而提高代码的可重用性。例如，如果希望在函数调用前后打印一条消息，一种方式是将此代码放入每个函数体中；另一种方式是创建一个修饰符，它充当函数的占位符，并允许我们在代码周围织入一些逻辑。\n\
    \n修饰符最常用于在函数运行前自动检查某个条件。例如，如果希望在调用函数之前验证用户身份，我们会将身份验证逻辑放入修饰符中。在函数被调用之前，这段身份验证代码会先执行。如果身份验证成功，则执行函数；否则会抛出异常。\n\
    \n以下是修饰符的示例：\n\n```solidity\nmodifier SampleModifier {\n  // 修饰符的逻辑\n}\n```\n\n\
    修饰符也可以接收输入参数，例如：\n\n```solidity\nmodifier SampleModifier(string x) {\n  // 修饰符的逻辑\n\
    }\n```\n\n让我们分析修饰符的工作原理。这里，我们创建了一个名为`checkOwner`的修饰符：\n\n```solidity\nmodifier\
    \ checkOwner {\n  require(msg.sender == owner);\n  _;\n}\n```\n\n读者可以看到修饰符代码中有`_;`。这被称为合并通配符。可以将其视为要执行的函数的占位符。为了清晰解释，这是附加了此修饰符的函数将要执行的位置。这使我们能够在函数执行前后放置一些通用代码。熟悉面向切面编程的读者可以在这里找到相似之处。为了正常工作，修饰符必须在主体中包含`_;`符号。\n\
    \n这里展示了`_;`如何放置在修饰符中：\n\n```solidity\nmodifier executeBefore {\n  require(/* 在函数之前执行的代码\
    \ */);\n  _; // 这里的 _ 表示实际要执行的函数\n}\n```\n\n这个例子展示了通过修饰符进行后处理。函数执行发生在修饰符调用之前：\n\
    \n```solidity\nmodifier executeAfter {\n  _; // 执行实际函数\n  require(/* 在函数之后执行的代码\
    \ */);\n}\n```\n\n以下是使用示例。函数`isValidUser`仅在用户有效时返回`true`。这里有两种选择：要么将用户有效性检查放入每个需要此检查的函数中，要么通过修饰符将检查外部化，同时实现清晰的关注点分离。\n\
    \n我们认为使用修饰符是更清晰、更好的方法。以下展示了如何通过修饰符实现这一点：\n\n```solidity\nfunction isValidUser(address\
    \ _user) public view returns(bool) {\n  // 检查 _user 是否有效的逻辑\n  return true;\n\
    }\n\nmodifier CheckUser {\n  require(isValidUser(msg.sender));\n  _;\n}\n```\n\
    \n还有一种方法可以将多个修饰符应用于一个函数：\n\n```solidity\ncontract Sample {\n  modifier A() {\n\
    \    require(\n      // 一些检查\n    );\n    _;\n  }\n  modifier B() {\n    require(\n\
    \      // 更多检查\n    );\n    _;\n  }\n  function test() public B() A() {\n    //\
    \ 函数代码\n  }\n}\n```"
