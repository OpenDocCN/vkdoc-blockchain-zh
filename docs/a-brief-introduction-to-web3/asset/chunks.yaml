    Chapter 5 IntroduCtIon to remIx Ide **5.3 Summary**


    In this chapter, we introduced the reader to the concept of a Web3 app.


    We learned about Remix IDE as well as about a simple manifestation of a Web3 app
    in the form of an ERC-20 token on the Ropsten testnet using the MetaMask wallet.


    In the next chapter, we will introduce the reader to Truffle, which is another
    development environment for DApp development.


    **CHAPTER 6**


    **Truffle**


    So far, we have seen how to use the Remix integrated development environment (IDE)
    to create smart contracts, compile them, and then deploy them to the blockchain
    network. In our example, we deployed our contracts to the Ropsten test network.
    Apart from Remix, there are standalone frameworks that allow us to create, compile,
    test, and deploy contracts. Truffle is one such framework available to us.


    **6.1 Truffle Installation**


    Before we use Truffle, we need to install the following software. We will install
    everything on a Windows machine, but steps will be similar for a Linux system.


    **6.1.1 Installing Node**


    Install `node.js` (version 16.16.0) from the following link: https://nodejs.org/en/download/


    This will include `npm` 8.11.0 with it.


    © Shashank Mohan Jain 2023


    S. M. Jain, *A Brief Introduction to Web3*[, https://doi.org/10.1007/978-1-4842-8975-4_6](https://doi.org/10.1007/978-1-4842-8975-4_6#DOI)


    ![](index-137_1.png)


    Chapter 6 truffle


    **6.1.2 Install Truffle**


    Node Package Manager (NPM) is the best way to install Truffle. Install Truffle
    after installing NPM on your computer by opening the Terminal and typing the following:


    ```

    npm install --global windows-build-tools@4.0.0

    ```


    ```

    npm install -g truffle

    ```


    Once we run these commands, we will see output similar to Figure [6-1](#index_split_001.html#p137).


    ***Figure 6-1.** Truffle installation*


    Install the `dotenv` package to allow you to use a `.env` file to store private
    environment variables on your local machine.


    ```

    npm install dotenv

    ```


    Install dependencies for HD Wallet next:


    ```

    npm i @truffle/hdwallet-provider@next

    ```


    Chapter 6 truffle


    **6.2 Smart Contract Deployment via Truffle**


    Make a new folder for your project by issuing the following command: `mkdir mycoin`


    Go into the new directory by issuing the following command: `cd mycoin`


    Initialize a Truffle project by issuing the following command: `truffle init`


    This will create the following directories:


    • `contracts/` – This directory is for saving all the smart contracts.'
