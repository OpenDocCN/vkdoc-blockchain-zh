- fmt: "# Chapter 3 Solidity\n\n## 3.4.14.4 Transfer Function\n\nThe `address.transfer`\
    \ function:\n\n- sends the quantity of ether, measured in wei, to the account\
    \ that has been provided;\n- reverts to the previous state and raises an exception\
    \ whenever there is an error; and\n- forwards a 2,300 gas stipend.\n\nBefore sending\
    \ ether, the `.transfer()` method first checks the available funds at an address\
    \ by applying the property `balance`. This takes place behind the scenes.\n\n\
    ## 3.4.14.5 Contract-related Functions\n\nSolidity provides a high-level syntax\
    \ for the purpose of calling functions that are defined in other contracts (for\
    \ example: `Contractx.callFunction(...)`). However, in order to use this high-level\
    \ syntax, the interface of the target contract must first be understood before\
    \ the compilation process begins.\n\n`Call`, `delegatecode`, and `staticcall`\
    \ are the three special opcodes that can be used by the EVM to communicate with\
    \ other smart contracts. The EVM offers a total of four special opcodes that can\
    \ be used for this purpose.\n\n## 3.4.14.6 Gas in Ethereum\n\nIn Ethereum, we\
    \ must pay for every computation, which is measured in the gas unit. The following\
    \ definition of gas is included in the Ethereum documentation:\n\n> “Gas refers\
    \ to the unit that measures the amount of computational effort required to execute\
    \ specific operations on the Ethereum network. Since each Ethereum transaction\
    \ requires computational resources to execute, each transaction requires a fee.\
    \ Gas refers to the fee required to conduct a transaction on Ethereum successfully.”\n\
    \n## 3.4.14.7 Ethereum Transaction Costs\n\nDue to the high cost of computer resources\
    \ and people’s acute awareness of the expense of computing operations in the past\
    \ (the 1960s or 1970s), people shared computers. After that, the introduction\
    \ of personal computers greatly increased the accessibility of computer resources,\
    \ and except in cases of severe resource limitations, people no longer give much\
    \ thought to cost.\n\nSince the Ethereum Virtual Machine serves as a common computer\
    \ for the Ethereum network, we must consider how effectively we can use its resources,\
    \ just as in the past. However, due to the distributed nature of its execution\
    \ environment, Ethereum uses transaction fees rather than time-sharing methods.\n\
    \nSay, for example, we create this contract:\n\n```\npragma solidity 0.8.13;\n\
    \ncontract Sample {\n    uint z;\n\n    function set(uint x) public {\n      \
    \  z = x;\n    }\n\n    function get() public view returns (uint) {\n        return\
    \ z;\n    }\n}\n```\n\nIf we want to examine the gas fee for invoking the `get`\
    \ function, we can see it in Figure 3-1. This view is achieved using the remix\
    \ IDE. We will cover that in length in coming chapters, so don’t panic.\n\n![Figure\
    \ 3-1](index-72_1.png)\n\n**Figure 3-1.** The estimate of gas for a function\n\
    \nFor a `set` function, the gas cost is 22498.\n\n## 3.5 Summary\n\nIn this chapter,\
    \ we took a look at Solidity, which is the language used on the Ethereum blockchain.\
    \ We went into the details of the different constructs and syntax of the Solidity\
    \ language, like types, operators, loops, and so on.\n\nIn the next chapter, we\
    \ will look into the concept of wallets and how they work and operate.\n\n---\n\
    \n# Chapter 4: Wallets and Gateways\n\nUsers have the ability to manage their\
    \ accounts on blockchain networks like Bitcoin or Ethereum through the usage of\
    \ wallets. With an account on Ethereum, one can participate on the Ethereum blockchain\
    \ network, such as by performing transactions on it.\n\nAn address on the Ethereum\
    \ blockchain is a public string of letters and integers that begins with `0x`.\
    \ Because an Ethereum address is represented by a string of numbers and letters,\
    \ it is possible to check the balance of any Ethereum address on the blockchain.\
    \ However, it is not possible to determine who controls any given address. Users\
    \ are able to exert control over an unlimited number of addresses via wallets,\
    \ which can be either software or hardware.\n\nUsers of Ethereum wallets can move\
    \ their cash around within the wallet by using a private key. This key serves\
    \ as the control mechanism for Ethereum wallets. Because of this, these private\
    \ keys are supposed to be known only by the person who created the wallet, as\
    \ anyone who knows them can access the funds in the wallet.\n\nThere is a wide\
    \ variety of Ethereum wallets available, some of which may be stored on your computer\
    \ or mobile device, and others of which can be stored offline by means of a piece\
    \ of paper, titanium, or other hardware. You can choose the sort of Ethereum wallet\
    \ that best suits your needs.\n\n© Shashank Mohan Jain 2023\n\nS. M. Jain, *A\
    \ Brief Introduction to Web3*[, https://doi.org/10.1007/978-1-4842-8975-4_4](https://doi.org/10.1007/978-1-4842-8975-4_4#DOI)\n\
    \nOne needs to use a secured key (known as the private key) to create a wallet.\
    \ A wallet can be thought of as a store that holds the private and public keys\
    \ for a user. In cryptography, a private key can be used to sign a transaction\
    \ and a public key can be used to verify the signer. The idea is that the user\
    \ keeps the private key secured with herself and shares the public key on the\
    \ network. This allows the user to sign the transactions she wants to execute,\
    \ and the verifiers using her public key can verify if she is the signer of those\
    \ transactions. Wallets simplify this process of key management by providing a\
    \ single place and an abstraction for clients to interact with the chain. People\
    \ who want to avoid managing wallets can make use of third-party exchanges like\
    \ Binance that do the wallet management on the user’s behalf. Since these exchanges\
    \ are mostly centralized, any compromise of their servers can lead to compromise\
    \ of user wallets. So, if your keys are on the exchange via an exchange-managed\
    \ wallet, it is at your own risk. As the common saying goes, “Your keys, your\
    \ money.” From a security standpoint, it’s always a better choice to have the\
    \ keys off the exchange.\n\n## 4.1 Types of Wallets\n\nSome people store their\
    \ Ethereum holdings in wallets designed for users, while others use cryptocurrency\
    \ exchanges or other services, such as online marketplaces or loan services, offered\
    \ by wallets designed for users. Wallets like these are referred to as custodial\
    \ wallets, and they are distinguished from other wallets by the fact that they\
    \ store users’ private keys on their behalf. The user does not have direct control\
    \ over the funds stored in the wallet; rather, the service manages the wallet\
    \ on behalf of the user. There is a cost associated with this arrangement.\n\n\
    The danger that another party will not fulfill their obligations is known as counterparty\
    \ risk. This risk is increased when funds are stored with a third party through\
    \ the use of custodial wallets. The service that stores the private keys runs\
    \ the risk of being hacked or acting maliciously, for example.\n\nIt’s possible\
    \ that various users would benefit from using one particular wallet over another.\
    \ There are a plethora of wallets available now for the user to choose from. Most\
    \ of them use Ethereum or ERC 20 standard-based tokens to access the applications\
    \ on the blockchain. This access is realized by executing code in the form of\
    \ a smart contract on the blockchain network. ERC 20 is a set of standards defined\
    \ for creating tokens on the chain. This allows people to create their own tokens,\
    \ which then can be used for their own applications if so desired.\n\nThere are\
    \ different kinds of wallets available, as follows:\n\n1. **Mobile Wallet** –\
    \ These are mobile applications like the `bitcoin.com` app, which provides an\
    \ interface for using the keys for transactions on the blockchain.\n2. **Desktop\
    \ Wallet** – This is installed as a desktop application and can be used on a laptop\
    \ or home PC. An example of such a wallet is `electrum`.\n3. **Web Extensions**\
    \ – These are browser-based extensions that allow the wallet to be accessed from\
    \ the browser."
