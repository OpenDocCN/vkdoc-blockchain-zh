  trans: '

    # 第二章：区块链


    有些区块链主要关注的并非维护和保障涉及各自加密货币的交易记录安全。然而，每条区块链都会记录任何涉及其相关加密货币或代币的交易。可以将交易视为对数据的简单记录。对数据含义的解读，是通过首先赋予其价值来完成的，正如在金融交易过程中所做的那样。


    ## **2.3.2 链**


    链可以被看作是区块的链表。位于第一个区块（也称为创世区块）之后的区块会维护一个对前一个区块的引用，以此类推。这种引用是通过生成前一个区块内容的哈希值来维护的。这对链的不可篡改性有重大意义。任何想要篡改前一个区块的人，都需要修改该特定区块之后的所有区块。通常这在实践中是不可能的，因为对于像工作量证明这样的算法，它可能需要巨大的计算资源；而对于像以太坊这样基于权益证明的算法，则需要在网络中投入巨大的权益。


    ## **2.3.3 网络**


    “全节点”是网络的构建模块。可以将它们想象成一台正在积极执行算法以确保网络安全的计算机。网络中的所有节点都拥有相同的记录副本（称为账本）。账本包含了所有曾在区块链上记录过的交易。


    网络节点是去中心化的，可以由世界上任何地方的任何人运行。由于运行这些节点会产生成本，人们需要一些激励才会去运行。他们运行节点的动机是为了赚取加密货币，这作为他们的激励。区块链的底层算法会为他们的服务提供补偿。通常，会以比特币或以太币等代币或加密货币作为奖励。


    ## **2.4 区块链应用于何处？**


    基于区块链的应用是围绕网络应作为仲裁者这一原则设计的。这种系统为其用户创造了一种冷酷无情的氛围。计算机代码实际上成为了法律，规则按照其编写方式执行，并由网络进行解释。计算机中不存在人类特有的社会行为和偏见。


    网络无法解释用户的意图（至少目前还不能）。作为这一概念的一个潜在用例，在区块链上进行仲裁的保险合同已经受到了广泛关注和研究。保持记录不可篡改的能力是区块链技术的另一个迷人应用。


    你可以利用它来创建一个清晰的时间线，记录谁在什么时候做了什么。无数行业和监管机构花费大量时间试图解决这个问题的规模。一个不可篡改的账本将使我们能够从区块链创建之初就保持交易的一致时间线。


    尽管人们经常互换使用“比特币”和“区块链”这两个术语，但这两个概念并不相同。比特币使用了区块链。允许比特币安全转移的底层协议被称为区块链。比特币是驱动比特币网络的数字货币的名称。


    因此，比特币是构建在区块链基础设施之上的应用之一。


    ## **2.5 演化**


    区块链技术最初是与加密货币比特币一同开发的。比特币的整个理念是开发一个去中心化的货币和银行系统。比特币网络构建的初始目的是确保其加密货币的安全。它拥有大约
    5000 个全节点，分布在世界各地。其主要目的是买卖比特币和其他加密货币，但社区很快意识到它可以用于更多方面。由于其规模以及其安全性已随时间得到验证，它也被用于保护其他规模较小的区块链和区块链应用。


    随着以太坊网络的创建，区块链技术经历了第二次迭代。它通过在其结构中嵌入一种编程语言，改变了区块链的传统结构。与比特币类似，它也拥有超过 5000 个全节点，并分布在世界各地。以太坊的主要用途包括以太币交易、智能合约开发以及去中心化自治组织（DAO）的形成。此外，它也被用于保护区块链应用以及更小型的区块链。


    以太坊生态系统将区块链生态系统转变为了一个可编程的区块链。


    ## **2.6 共识**


    共识是分布式系统设置中最难解决的问题之一。


    区块链是有用的工具，因为它们能够自我纠正，并且无需第三方干预即可实现。


    通过使用其共识算法，它们能够成功地执行规则。


    在区块链技术领域，“达成共识”指的是在一组通常互不信任的节点之间达成一致的过程。这些是网络上功能完备的节点。全节点正在检查提交到网络以便记录在账本上的交易的有效性。每条区块链都有自己的一套算法，用于让其网络对正在添加的新条目达成共识。由于每条区块链都在生成不同类型的条目，因此存在多种多样的模型来实现共识。


    不同区块链用于达成共识的一些机制如下：


    - **工作量证明** – 由比特币区块链使用

    - **权益证明** – 由以太坊使用

    - **历史证明** – 由 Solana 使用


    ### **2.6.1 工作量证明**


    第一种采用共识机制的去中心化加密货币是比特币，该机制就是工作量证明。挖矿和工作量证明是密切相关的概念。“工作量证明”这个术语源于网络需要极高水平的处理能力才能正常运行。工作量证明区块链是指来自世界各地的虚拟矿工相互竞争，看谁能先解出数学谜题。这些区块链随后得到保护和验证。胜利者会从网络中获得预定数量的加密货币，并有机会用最新已验证的交易来更新区块链。

    '
- fmt: '# Proof of Work


    `Proof of work` offers a number of significant benefits, particularly for the
    case of Bitcoin, which is a relatively straightforward but extremely valuable
    cryptocurrency. It is a tried-and-trusted method that can reliably keep a decentralized
    blockchain in a secure state. As the price of a cryptocurrency continues to rise,
    more miners will be encouraged to participate in the network, which will result
    in an increase in both the network’s power and its level of security. The Bitcoin
    network also in its algorithm has a difficulty adjustment mechanism, which is
    like a feedback loop to alter the difficulty of mining based on demand. If there
    are huge number of miners and they are able to mine quickly because they have
    good resources at hand, the algorithm increases the difficulty level of the mining
    to keep the mining time of one block to 10 minutes.


    The mathematical puzzle used by a `proof-of-work` algorithm is not truly a puzzle
    in the sense of a physical puzzle. It uses the one-way function of cryptographic
    hashes as the underlying mechanism.


    ## Cryptographic Hashes


    Cryptographic hashes are designed to be deterministic one-way functions.


    What this means is that any content, be it text of few lines or document or images
    or videos can be reduced to a specific size. For instance, in a `SHA 256`–based
    hash function, the size of the output is 256 bits, no matter how big or small
    the input is. The other property of hash functions is that the same content will
    generate the same hash no matter how many times you run the same hash function
    over it. This is where the determinism comes from.


    As I said, it’s a one-way function, so going from input to output is easy. Going
    back from output to input is impossible, or one could say computationally infeasible.
    Bitcoin uses this property for its `proof-of-work` algorithm.


    ## The Mining Process


    So basically the Bitcoin network provides a hash value as the input and asks the
    miners to generate a hash by taking the following two inputs:


    - The block header

    - A random number called `nonce`


    The miner needs to add these two together and generate a hash that is less than
    the value provided by the Bitcoin network for a specific block. As we discussed,
    since hashing is a one-way function, the miner now starts to add different values
    of `nonce` to the header and has to effectively generate the hashes to make it
    less than the target hash provided by the system.


    There is no other way to do this except by crunching these hashes.


    ## Proof of Stake


    Ethereum blockchain started with `proof of work` as the algorithm but now is moving
    to a `proof-of-stake` algorithm. In `proof of stake`, to mine the ether (that’s
    the currency on the Ethereum blockchain) the network participant has to stake
    the currency. Say, for example, I want to be a validator on the network. I then
    have to put some money at stake to validate the transactions. This puts my skin
    in the game, and I am disincentivized to cheat. So, instead of putting in energy,
    as in the case of Bitcoin, Ethereum advocates putting money itself at stake for
    being a participant on the network.


    From the pool of stakers, the one who puts the maximum stake will be chosen as
    the validator of transactions and will be rewarded for the task.


    Other validators will be able to do a proof of validity of the block of transactions
    once the winner has validated the most recent block of transactions. The blockchain
    is updated whenever the network reaches a certain predetermined number of confirmations
    or attestations.


    ## Key Differences Between PoW and PoS


    One of the most significant distinctions between the two consensus mechanisms
    is the amount of energy required. `Proof-of-stake` blockchains enable networks
    to function with significantly lower resource consumption than blockchains based
    on `proof of work`. The debate still rages as to which is a better mechanism as
    far as representation of money is concerned.


    Both of these consensus mechanisms have economic repercussions that punish malicious
    actors for disrupting the network and discourage others from doing so. The sunk
    cost of computing power, energy, and time is the punishment for miners who submit
    invalid information or blocks in `proof-of-work` systems. This is the case for
    Bitcoin and other cryptocurrencies.


    The main idea is to create a heavy penalty for cheating the system.


    In the case of `proof of work`, it’s the energy spent that is at stake, whereas
    in `proof of stake` it is the money that is put at stake. If, say, a network participant
    is found to have accepted a corrupt block, a portion of the funds that they have
    staked will be “slashed” as a form of punishment.


    The network will determine the maximum amount by which a validator’s reward can
    be reduced.


    ## Blockchain Architecture


    A client–server network is used in the conventional design of the World Wide Web’s
    architecture. Due to the fact that it is a centralized database that is controlled
    by a number of administrators who each have permission to make changes, the server
    in this scenario stores all of the necessary information in a single location
    so that it can be easily updated.


    When it comes to the distributed network architecture of blockchain technology,
    every participant in the network is responsible for the maintenance, approval,
    and updating of new entries. Not only are there a number of different people who
    have control over the system, but everyone who is part of the blockchain network
    does. Every member is responsible for ensuring that all of the records and procedures
    are in order, which ultimately leads to the validity and safety of the data. Therefore,
    it is possible for parties that do not necessarily trust one another to come to
    an agreement with one another.


    In a nutshell, the blockchain can be described as a decentralized distributed
    ledger of various transactions that is organized into a `P2P` network. This ledger
    can be made public or kept private. This network is made up of a large number
    of computers, but it is constructed in such a way that the data cannot be changed
    unless there is agreement from all of the computers in the network (each separate
    computer).


    A list of blocks containing transactions arranged in a specific sequence is what
    the blockchain technology uses to represent its underlying structure. These lists
    may be kept in the form of a straightforward database or as a simple text file
    (using the `txt` format). One can think of the blockchain as a persisted linked
    list of transaction blocks.


    ## Nodes, Blocks, Miners, and Chains


    We have already covered the concepts of nodes, blocks, and chains in the context
    of blockchains. There is one more important entity that needs a mention. This
    entity is the miner. As an example of the Bitcoin blockchain, the miner is the
    entity that is responsible for mutating the state of the blockchain. This mutation
    is achieved by adding a new block to the chain. To get permission to mutate the
    state, the miner has to solve a mathematical puzzle. The puzzle is trying to find
    the number for a system-provided hash. So the miner has to run through all different
    combinations of numbers to see if the hash for one of them matches. This computation
    is run by many miners across the globe and whoever wins the race gets the permission
    to write the new block. Once the miner writes the block they publish this on the
    network for the verifiers to verify the block. The verification process is simple
    as the miner will provide the hash as well as the number for which this hash was
    generated. So verification is to just calculate the hash for the number and compare
    it with the hash the system has asked for. Once a majority of miners has verified
    the block, this block gets replicated across the network and gets added to all
    computers on the network gradually.'
  raw: 'Proof of work offers a number of significant benefits, particularly for the
    case of Bitcoin, which is a relatively straightforward but extremely valuable
    cryptocurrency. It is a tried-and-trusted method that can reliably keep a decentralized
    blockchain in a secure state. As the price of a cryptocurrency continues to rise,
    more miners will be encouraged to participate in the network, which will result
    in an increase in both the network’s power and its level of security. The Bitcoin
    network also in its algorithm has a difficulty adjustment mechanism, which is
    like a feedback loop to alter the difficulty of mining based on demand. If there
    are huge number of miners and they are able to mine quickly because they have
    good resources at hand, the algorithm increases the difficulty level of the mining
    to keep the mining time of one block to 10 minutes.


    The mathematical puzzle used by a proof-of-work algorithm is not truly a puzzle
    in the sense of a physical puzzle. It uses the one-way function of cryptographic
    hashes as the underlying mechanism.


    Cryptographic hashes are designed to be deterministic one-way functions.


    What this means is that any content, be it text of few lines or document or images
    or videos can be reduced to a specific size. For instance, in a SHA 256–based
    hash function, the size of the output is 256 bits, no matter how big or small
    the input is. The other property of hash functions is that the same content will
    generate the same hash no matter how many times you run the same hash function
    over it. This is where the determinism comes from.


    As I said, it’s a one-way function, so going from input to output is easy. Going
    back from output to input is impossible, or one could say computationally infeasible.
    Bitcoin uses this property for its proof-of-work algorithm.


    So basically the Bitcoin network provides a hash value as the input and asks the
    miners to generate a hash by taking the following two inputs:


