    Before sending ether, the .transfer() method first checks the available funds
    at an address by applying the property balance. This takes place behind the scenes.


    **3.4.14.5 Contract-related Functions**


    Solidity provides a high-level syntax for the purpose of calling functions that
    are defined in other contracts (for example: Contractx.


    callFunction(...)). However, in order to use this high-level syntax, the interface
    of the target contract must first be understood before the compilation process
    begins.


    Call, delegatecode, and staticcall are the three special opcodes that can be used
    by the EVM to communicate with other smart contracts.


    The EVM offers a total of four special opcodes that can be used for this purpose.


    **3.4.14.6 Gas in Ethereum**


    In Ethereum, we must pay for every computation, which is measured in the gas unit.


    The following definition of gas is included in the Ethereum documentation:


    *“Gas refers to the unit that measures the amount of computational effort* *required
    to execute specific operations on the Ethereum network.*


    Chapter 3 Solidity


    *Since each Ethereum transaction requires computational resources* *to execute,
    each transaction requires a fee. Gas refers to the fee required to* *conduct a
    transaction on Ethereum successfully.”*


