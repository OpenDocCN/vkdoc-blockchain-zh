  trans: "\n### 以太坊燃料机制\n\n以太坊使用第二种代币类型来向矿工支付费用，以换取他们将交易包含在以太坊区块链的特定区块中。对于所有涉及智能合约的交易，`gas`（燃料）都是一个必不可少的组成部分，而以太坊的`gas`代币则构成了链条中至关重要的一环。以太坊`gas`是吸引那些想要在区块链上部署智能合约的矿工的关键因素。\n\
    \n### 3.2.1 以太坊虚拟机\n\n以太坊虚拟机（`EVM`）是以太坊区块链的关键组成部分。以太坊中的智能合约可以在此虚拟机中执行。没有`EVM`，全球公共节点网络就不可能为运行不可信代码提供必要的安全性和能力。\n\
    \n现在，既然我们可以运行不可信代码，运行环境就需要为我们提供适当的安全措施，例如防范拒绝服务攻击。以太坊通过引入`gas`概念来抵御此类攻击。\n\n###\
    \ 第 3 章 Solidity\n\n### 3.3 智能合约\n\n用户在应用程序中编写的所有业务逻辑都应当在智能合约中定义。因此，尽快牢固掌握智能合约的基础知识至关重要。\n\
    \n在编写智能合约之前，应当掌握 Solidity 编程语言的基础知识。这正是我们接下来要做的。\n\n### 3.4 理解 Solidity 语法\n\n\
    ### 3.4.1 编译指示\n\n`pragma`指令是 Solidity 智能合约中的第一行代码；例如，Solidity `0.4.16` 版本的源代码示例中的`pragma`指令就是如此。不仅如此：该合约还可与高于指定版本的\
    \ Solidity 版本兼容。此外，智能合约的`pragma`指令也将其限定在 `0.9.0` 版本范围内。\n\n`pragma`语法示例：\n\n```solidity\n\
    pragma solidity ⁰.8.13;\n```\n\n### 3.4.2 变量\n\n任何计算机语言都离不开变量。因此，你需要通过 Solidity\
    \ 课程来学习变量以及如何使用它们来存储信息。请记住，变量仅仅是内存中用于存储值的占位符。因此，通过声明一个变量，你是在预先预留内存空间。\n\nSolidity\
    \ 支持多种数据类型，例如`整数`、`字符串`、`布尔值`等。根据变量的数据类型，操作系统决定分配多少预留内存以及在其中存储何种实体。\n\n### 第 3\
    \ 章 Solidity\n\n学习 Solidity 需要理解变量。Solidity 中的变量可分为三类：状态变量、局部变量和全局变量。状态变量是永久保存在合约存储中的变量。局部变量的值则在函数执行过程中存在。\n\
    \n另一方面，全局变量是位于全局命名空间中的独特变量，有助于检索与区块链相关的数据。作为一种静态类型语言，Solidity 要求在定义状态变量或局部变量时指定其类型。由于没有`null`或`undefined`的概念，所有声明的变量都会根据其类型被赋予一个默认值。这里有必要进一步探讨\
    \ Solidity 中的变量，具体如下：\n\n1.  **状态变量** – 存储在合约存储中的变量。\n    例如：\n    ```solidity\n\
    \    pragma solidity ⁰.8.13;\n\n    contract NewsBlog {\n        uint newsCount;\
    \ // newsCount 是一个状态变量\n\n        constructor() public {\n            newsCount\
    \ = 1; // 初始化状态变量\n        }\n    }\n    ```\n\n2.  **局部变量** – 在函数执行过程中其值得以保留的变量。\n\
    \    例如：\n    ```solidity\n    pragma solidity ⁰.8.13;\n\n    contract NewsBlog\
    \ {\n        uint newsCount; // newsCount 是一个状态变量\n\n        constructor() public\
    \ {\n            newsCount = 1; // 初始化状态变量\n        }\n\n        function addToNews()\
    \ public view returns(uint) {\n            uint news=1; //news 是在函数作用域内使用的局部变量示例\n\
    \            uint res=newsCount+news;\n            return res;\n        }\n  \
    \  }\n    ```\n\n3.  **全局变量** – 全局命名空间中包含...\n"
- fmt: '# Special Variables for Obtaining Blockchain-Related Data


    Here is a list of all of Solidity’s global variables and what they do:


    1. This is what `blockhash(uint blockNumber)` gives back: Block hash representation;
    only works for the 256 most recent blocks; current blocks are ignored.

    2. Coinbase’s payment address is `block.coinbase`. Displays the current block’s
    address.

    3. Difficulty of a block is indicated by `block.difficulty` (uint).

    4. The uint value of the function `block.gaslimit`. The current block’s gas limit
    is displayed.

    5. The uint value of `block.number`. The current block number is displayed here.

    6. The current time as a universal identifier (uint): The current block’s timestamp
    is displayed in terms of the number of seconds since the unix time.

    7. `msg.sig` – You can get the first four bytes of a function’s identification
    or call data by using this method.

    8. `msg.data` (bytes of call data)

    9. If you want to know the current block timestamp, you can use the `now` function.


    ## 3.4.2.1 Variable Naming


    The following guidelines should be kept in mind while naming your variables in
    Solidity:


    1. The Solidity reserved keywords should not be used as a variable name. The next
    part includes some discussion of these crucial terms. Variable names such as `break`
    or `boolean`, for example, are invalid.

    2. Variable names in Solidity should not begin with a numeric (0–9). They can’t
    begin with anything other than a letter or the underscore. A variable name such
    as `543coin` is invalid, while `_543coin` is acceptable.

    3. Capitalization is important when naming Solidity variables. `Blog` and `blog`
    will be treated as two different variables.


    ## 3.4.2.2 Scope of Variables


    Local variables are local to the function, which means any effect on their state
    remains within the confines of that method, whereas state variables can have three
    different kinds of effects:


    - **Public** – State variables that are public can be accessed both internally
    and through messages. A getter function is automatically made for a state variable
    that is available to the public.

    - **Internal** – These state variables can only be accessed within the same contract
    or from within a child contract of this contract.

    - **Private** – These are very confined in scope—only to the same contract—and
    cannot be accessed even from a child contract.


    ## 3.4.3 Value Types


    You can learn about the various data types in the Solidity blockchain programming
    language by taking a thorough look at any tutorial on the subject. Solidity supports
    a wide range of predefined and custom data types. The following are some of the
    most common data types found in Solidity:


    - Integers, both signed and unsigned

    - Boolean

    - Fixed-point numbers, both signed and unsigned, of various sizes

    - Fixed *X* x *Y* fixed-point number, where *X* defines the number of bits accounted
    for by type and *Y* accounts for the number of decimal places.

    - Unfixed *X* x *Y*, where *Y* represents an unsigned fixed-point number.


    ## 3.4.4 Address


    An Ethereum address is represented by a 20-byte value called an “address” in the
    Solidity tutorial. To get the balance, you can use the method `.balance` with
    an address. The `.transfer` function could be used to transfer the balance to
    another address.


    ## 3.4.5 Operators in Solidity


    As with other programming languages, Solidity has support for operators. We will
    illustrate a few such operators here.


    ### 3.4.5.1 Arithmetic Operator


    Arithmetic operations comprise the following:


    1. Addition

    2. Subtraction

    3. Multiplication

    4. Division

    5. Increment (`++`)

    6. Decrement (`--`)

    7. Modulus (`%`)


    ### 3.4.5.2 Comparison Operator


    Comparison operators comprise the following:


    1. Equal (`==`) – To check if two operands are equal or not

    2. Not Equal (`!=`) – To check if two operands are not equal

    3. Greater than (`>`) – To check if operand on left of operator is greater than
    one on right

    4. Greater than or equal to (`>=`) – To check if operand on left of operator is
    greater than or equal to one on right'
