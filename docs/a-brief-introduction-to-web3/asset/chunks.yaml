    **4.4.4 web3-net**


    You will be able to interact with the network attributes of an Ethereum node if
    you make use of the web3-net module. You will be able to get information about
    the node by using the web3-net module. This module allows us to extract metadata
    about the Ethereum node itself. As an example, the network ID can be obtained
    by calling [web3.net.getID](http://web3.net), and usin[g web3.net](http://web3.net).peerCount
    will return the number of peer nodes connected to a specific node.


    **4.4.5 web3-utils**


    The web3-utils module allows us to make use of some of the utility functions defined
    inside this library module. Included in web3-utils is a collection of utility
    functions that can search databases, convert numbers, and check to see whether
    a value satisfies a given criterion. The following are three instances that illustrate
    the point:


    1\. web3.utils.toWei is a converter that goes from wei to ether.


    2\. web3.utils.hex converts a hexadecimal value to a


    string with the ToNumberString function.


    Chapter 4 Wallets and GateWays


    3\. The web3.utils.isAddress function determines


    whether or not the given string represents a valid


    Ethereum address.


