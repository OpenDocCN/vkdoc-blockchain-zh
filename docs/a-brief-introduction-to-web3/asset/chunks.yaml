    \ 使用 Solidity 编写智能合约。\n2. 编译合约。\n3. 部署合约。\n\n要创建合约，请导航至 [`remix.ethereum.org/`](https://remix.ethereum.org/)\
    \ 上的 Remix IDE，如图 5-2 所示。\n\n![](img/index-101_1.jpg)\n\n**图 5-2.** *Remix IDE\
    \ 的主页*\n\n在默认工作区下，我们看到一个名为 `contracts` 的文件夹。右键单击它，然后单击**新建文件**。\n\n我创建了一个名为 `Test.sol`\
    \ 的文件，如图 5-3 所示。\n\n![](img/index-102_1.jpg)\n\n**图 5-3.** *创建一个名为 `Test.sol`\
    \ 的新文件（`.sol` 是 Solidity 的文件扩展名）*\n\n将代码清单 5-1 中的代码复制到右侧窗口中。\n\n***代码清单 5-1.***\
    \ *简单智能合约的代码*\n\n```solidity\npragma solidity 0.8.5;\n\ncontract Test{\n\n   \
    \ // 用于保存消息的状态变量\n    string private message;\n\n    // 将消息初始化为 \"Hello!!\"。\n\
    \    constructor() public {\n        message = \"Welcome\";\n    }\n\n    /**\
    \ @dev 用于设置新消息的函数。\n     * @param newMessage 新的消息。\n     */\n    function setMessage(string\
    \ memory newMessage) public {\n        message = newMessage;\n    }\n\n    /**\
    \ @dev 用于返回消息的函数。\n     * @return 消息字符串。\n     */\n    function getMessage() public\
    \ view returns (string memory) {\n        return message;\n    }\n\n}\n```\n\n\
    正如我们所看到的，这会使用 Solidity 语言创建一个名为 `Test` 的合约。该合约有两个函数：\n1. `setMessage()`\n2. `getMessage()`\n\
    \n## 编译合约\n\n现在是时候编译合约了，如图 5-4 所示。\n\n![](img/index-104_1.jpg)\n\n**图 5-4.** *通过单击**编译**按钮（红色圆圈所示）来编译\
    \ `Test.sol` 文件*\n\n单击突出显示的红色按钮。我们将看到如图 5-5 所示的屏幕。\n\n![](img/index-105_1.jpg)\n\
    \n**图 5-5.** *智能合约的编译画面*\n\n单击**编译 Test.sol** 按钮，将出现如图 5-6 所示的画面。\n\n![](img/index-106_1.jpg)\n\
    \n**图 5-6.** *已编译的 `Test.sol`*\n\n单击**编译详情**按钮，以探索合约和环境的各个方面，如图 5-7 所示。\n"
- fmt: '# Chapter 5 Introduction to Remix IDE


    ***Figure 5-7.** See compiler version and language*


    Once we have compiled the smart contract, we will deploy it. Click on the button
    highlighted in red, as shown in Figure [5-8](#index_split_001.html#p108).


    ***Figure 5-8.** Deployment button marked via red circle*


    Once the `Deploy` button has been clicked, we will see the screen shown in Figure
    [5-9](#index_split_001.html#p109).


    ***Figure 5-9.** Environment to be chosen for deployment*


    We can choose from multiple deployment environments, as shown in Figure [5-10](#index_split_001.html#p110).


    ***Figure 5-10.** Different environments for deployment of smart contract*


    In our case, we need to choose the `Injected Web3` environment, which will connect
    us to the `MetaMask` wallet for transaction signing and gas purposes.


    The moment we choose the `Injected Web3` environment, we will see the `Ropsten`
    network, since this is the network we have chosen for our `MetaMask` wallet. This
    is shown in Figure [5-11](#index_split_001.html#p111).


    ***Figure 5-11.** We choose the Ropsten test network for deployment*


    We see two other display sections in Figure [5-11](#index_split_001.html#p111).
    "Account" refers to the account we created using `MetaMask`, and "Gas Limit" is
    the maximum gas allowed for transactions performed via `Remix`.


    Now, let''s go ahead and click the `Deploy` button. This will open the `MetaMask`
    wallet (we have deployed `MetaMask` as a Brave browser extension), as shown in
    Figure [5-12](#index_split_001.html#p112).


    ***Figure 5-12.** MetaMask wallet opens up to confirm payment of gas for deployment*


    We can see the amount of the gas fee to be paid for this transaction in terms
    of ether.


    We will confirm this transaction to get it published on the `Ropsten` testnet.


    We can check on `Etherscan` to see the state of the transaction, as shown in Figure
    [5-13](#index_split_001.html#p113).


    ***Figure 5-13.** Etherscan view of the deployment transaction*


    As we can see, initially it''s in a `Pending` state. Also, one can see the key
    in the `From` field is the public key of my account. We can also validate the
    key by opening the account details on `MetaMask`, as shown in Figure [5-14](#index_split_001.html#p113).


    ***Figure 5-14.** MetaMask wallet showing the public key, which we can confirm
    on Etherscan*


    After few seconds, the transaction gets confirmed on the `Ropsten` testnet. The
    details are shown in Figure [5-15](#index_split_001.html#p114).


    ***Figure 5-15.** Etherscan view of the deployment transaction (completed state)*


    We also see now a `To` field. This `To` field is the address of the contract.


    Remember that in Chapter [3](https://doi.org/10.1007/978-1-4842-8975-4_3) we discussed
    two types of addresses. This is the contract address.


    We can also check this in `Remix IDE`, as shown in Figure [5-16](#index_split_001.html#p115).


    ***Figure 5-16.** Contract functions on Remix IDE*


    Apart from the contract address, `Remix IDE` also provides a way to invoke these
    contracts.


    Let''s go ahead and invoke the `setMessage` function on the smart contract we
    just deployed.


    On setting the message in the text box we will see the view shown in Figure [5-17](#index_split_001.html#p115).


    ***Figure 5-17.** Feeding the message for invoking a smart contract function*


    And after we click the `setMessage` button, the `MetaMask` wallet will open again.
    This will allow us to sign the transaction and pay the gas fee.


    We can see the amount and so forth in Figure [5-18](#index_split_001.html#p116).'
