  raw: '• balanceOf – This function, when invoked, returns the balance for a specific
    wallet. We will show how this can be invoked from Remix IDE.


    • transfer – This function moves tokens to a specific address. The tokens are
    deducted from the sender


    address in this case.


    • transferFrom – This function transfers tokens from one user address to another.
    Here, the available tokens in supply remain the same, but it’s a transfer between
    two accounts.


    • approve – This function determines, taking into


    account the overall quantity of tokens, whether or not it is permissible for a
    smart contract to allot a specific number of tokens to a user.


