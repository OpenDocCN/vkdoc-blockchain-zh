- fmt: "# Chapter 3 Solidity\n\n## 3.4.8.2 View Functions\n\nIn Solidity, a `view`\
    \ function is a function that only reads the contract’s state variables and doesn’t\
    \ change them.\n\nIf any of the following statements are in a `view` function,\
    \ the compiler will think that they are changing state variables and give a warning:\n\
    \n- Modify/overwrite state variables.\n- Create new contracts.\n- Invoke a function\
