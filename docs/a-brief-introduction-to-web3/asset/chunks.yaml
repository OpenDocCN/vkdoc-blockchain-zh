    \n### 6.3 总结\n\n在本章中，我们研究了智能合约开发中最著名的框架之一——Truffle。我们使用Truffle框架创建了一个基于ERC-20的代币，并将其部署到Ropsten测试网络。我们还学会了如何通过调用不同的代币函数来与该代币交互。\n\
