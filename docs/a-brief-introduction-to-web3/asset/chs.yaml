  \ 测试账户中的余额*\n\n我们在 Remix IDE 中看到余额为 100。\n\n第 5 章 Remix IDE 简介 **5.3 本章小结**\n\n\
  在本章中，我们向读者介绍了 Web3 应用的概念。\n\n我们学习了 Remix IDE，以及一个简单的 Web3 应用示例——通过 MetaMask 钱包在\
  \ Ropsten 测试网上部署的 ERC-20 代币。\n\n在下一章中，我们将向读者介绍 Truffle，这是另一个用于 DApp 开发的集成开发环境。\n\
  \n**第 6 章**\n\n**Truffle**\n\n到目前为止，我们已经了解了如何使用 Remix 集成开发环境（IDE）来创建智能合约、编译合约，并将合约部署到区块链网络中。在我们的示例中，我们将合约部署到了\
  \ Ropsten 测试网络。除了 Remix 之外，还有一些独立的框架允许我们创建、编译、测试和部署合约。Truffle 就是其中一种可用的框架。\n\n**6.1\
  \ 安装 Truffle**\n\n在使用 Truffle 之前，我们需要安装以下软件。我们将在一台 Windows 机器上进行安装，但在 Linux 系统上的步骤类似。\n\
  \n**6.1.1 安装 Node**\n\n从以下链接安装 `node.js`（版本 16.16.0）：https://nodejs.org/en/download/\n\
  \n这将一并安装 `npm` 8.11.0。\n\n© Shashank Mohan Jain 2023\n\nS. M. Jain，*A Brief Introduction\
  \ to Web3*[，https://doi.org/10.1007/978-1-4842-8975-4_6](https://doi.org/10.1007/978-1-4842-8975-4_6#DOI)\n\
  \n![](img/index-137_1.png)\n\n第 6 章 Truffle\n\n**6.1.2 安装 Truffle**\n\nNode 包管理器（NPM）是安装\
  \ Truffle 的最佳方式。在你的电脑上安装 NPM 后，打开终端并输入以下命令来安装 Truffle：\n\n```\nnpm install --global\
  \ windows-build-tools@4.0.0\n```\n\n```\nnpm install -g truffle\n```\n\n运行这些命令后，我们将看到类似图\
  \ 6-1 的输出。\n\n***图 6-1.** Truffle 安装*\n\n安装 `dotenv` 包，以便在你的本地机器上使用 `.env` 文件存储私有的环境变量。\n\
  \n```\nnpm install dotenv\n```\n\n接下来安装 HD Wallet 的依赖项：\n\n```\nnpm i @truffle/hdwallet-provider@next\n\
  ```\n\n第 6 章 Truffle\n\n**6.2 通过 Truffle 部署智能合约**\n\n通过执行以下命令为你的项目创建一个新文件夹：`mkdir\
  \ mycoin`\n\n通过执行以下命令进入新目录：`cd mycoin`\n\n通过执行以下命令初始化一个 Truffle 项目：`truffle init`\n\
  \n这将创建以下目录：\n\n• `contracts/` – 此目录用于保存所有智能合约。\n\n\n\n*   `migrations/` – 该目录包含用于部署智能合约的脚本。\n\
  *   `test/` – 该目录存放智能合约的测试代码。\n\n最后，我们需要一个名为 `truffle-config.js` 的文件，它包含配置数据，并且应该放在项目根目录中。\n\
  \n使用以下命令切换到 `contracts` 目录：`cd contracts`\n\n创建一个名为 `Coin.sol` 的文件，将清单 6-1 中的合约代码复制到文件中，然后将\
