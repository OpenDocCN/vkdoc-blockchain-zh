- "# 工作量证明\n\n`工作量证明`具有诸多显著优势，尤其适用于比特币这种相对简单但极具价值的加密货币。它是一种经过验证的可靠方法，能够确保去中心化区块链保持安全状态。随着加密货币价格持续上涨，更多矿工将被激励加入网络，从而提升网络算力与安全等级。比特币网络在其算法中内置了难度调整机制，该机制如同反馈回路，可根据需求动态调整挖矿难度。若矿工数量庞大，且因硬件资源充足而挖矿速度过快，算法会提高挖矿难度，确保每个区块的生成时间维持在\
  \ 10 分钟左右。\n\n`工作量证明`算法所用的数学难题并非传统意义上的实体拼图。它利用了加密哈希的单向函数作为底层机制。\n\n## 加密哈希函数\n\n\
  加密哈希函数被设计为确定性的单向函数。\n\n这意味着任何内容——无论是几行文字、文档、图片还是视频——都能被压缩至特定长度。例如，在基于`SHA 256`的哈希函数中，无论输入内容体积大小，输出始终为\
  \ 256 位。哈希函数的另一个特性是：对同一内容反复运行同一哈希函数，生成的哈希值必然相同。这便是确定性的来源。\n\n如先前所述，它是单向函数：从输入到输出易于实现，但从输出反向推导输入则不可能（或可称为计算不可行）。比特币正利用这一特性构建其`工作量证明`算法。\n\
  \n## 挖矿过程\n\n简而言之，比特币网络会提供一个哈希值作为目标，要求矿工通过以下两个输入生成哈希：\n\n- 区块头\n- 一个名为`随机数`的随机数值\n\
  \n矿工需将两者结合，生成一个小于网络为特定区块提供的目标哈希值。如前所述，由于哈希是单向函数，矿工必须不断尝试不同的`随机数`与区块头的组合，反复计算哈希，直至结果满足系统设定的目标条件。\n\
  \n除了暴力计算这些哈希值，别无他法。\n\n## 权益证明\n\n以太坊区块链最初采用`工作量证明`算法，但现已转向`权益证明`算法。在`权益证明`机制中，网络参与者需质押货币才能挖取以太币（以太坊区块链的加密货币）。例如，若我想成为网络的验证者，就必须质押一定资金以验证交易。此举将个人利益与网络绑定，从而抑制作弊动机。因此，与比特币消耗能源不同，以太坊倡导参与者通过质押资金来维护网络。\n\
  \n系统将从所有质押者中，选择质押金额最高者作为交易验证者，并为其任务发放奖励。\n\n一旦胜选者验证完最新交易区块，其他验证者即可对该区块进行有效性验证。当网络达到预设的确认数或证明数量时，区块链便会更新。\n\
  \n## 工作量证明与权益证明的主要区别\n\n两种共识机制最显著的区别在于能耗需求。`权益证明`区块链的运行能耗远低于基于`工作量证明`的区块链。关于哪种机制更能代表货币价值，至今争论不休。\n\
  \n这两种共识机制均设有经济惩罚措施，旨在惩戒破坏网络的恶意行为者，并警示他人。在`工作量证明`系统中，提交无效信息或区块的矿工将损失计算能力、能源和时间等沉没成本——比特币及其他加密货币正是如此运作。\n\
  \n其核心理念是对作弊行为设置高额惩罚。\n\n在`工作量证明`中，风险在于消耗的能源；而在`权益证明`中，风险在于质押的资金。例如，若发现网络参与者接受了欺诈性区块，其质押资金的一部分将被“罚没”作为惩罚。\n\
  \n网络将设定验证者奖励可被削减的最高限额。\n\n## 区块链架构\n\n万维网的传统架构采用客户端-服务器网络。由于这是一个由多名具有修改权限的管理员控制的中心化数据库，服务器将所有必要信息存储于单一位置以便于更新。\n\
  \n而在区块链技术的分布式网络架构中，每位网络参与者都负责维护、批准和更新新条目。系统不仅由多人控制，更由区块链网络全体成员共同掌控。每位成员需确保所有记录和流程合规，最终保障数据的有效性和安全性。因此，互不信任的各方也能达成共识。\n\
  \n简而言之，区块链可被描述为一个组织在`P2P`网络上的去中心化分布式交易账本，该账本既可公开也可私有。该网络由大量计算机组成，其设计确保未经网络中所有计算机（即每台独立计算机）达成共识，数据无法被篡改。\n\
  \n区块链技术通过包含按特定顺序排列的交易区块列表来呈现其底层结构。这些列表可以简单数据库或纯文本文件（使用`txt`格式）的形式存储。可将区块链视为由交易区块组成的持久化链表。\n\
  \n## 节点、区块、矿工与链\n\n我们已讨论过区块链语境中的节点、区块与链的概念。还有一个需要提及的重要实体——矿工。以比特币区块链为例，矿工是负责改变区块链状态的实体。这种状态变更通过向链上添加新区块实现。要获得状态变更权限，矿工必须解出数学难题。该难题要求为系统提供的哈希值找到对应数字。因此，矿工需遍历所有数字组合，验证每个数字的哈希值是否匹配。全球众多矿工同时进行此计算，最先胜出的矿工将获得写入新区块的权限。矿工写入区块后，会将其发布至网络供验证者校验。验证过程很简单：矿工需同时提供哈希值及其对应的数字，验证者只需计算该数字的哈希值，并与系统要求的目标哈希值比对即可。一旦多数矿工验证通过，该区块便会在全网复制，并逐步添加至网络中所有计算机。\n\
  \n\n\n## 第 2 章：区块链\n\n在较高层面上，比特币区块链中的交易流程如图 2-1 所示。\n\n![](img/index-33_1.jpg)\n\
  \n**图 2-1.** 交易在比特币区块链上的运作方式\n\n### 2.8 加密密钥\n\n由于公共区块链网络是无需许可且去信任化的，我们需要一种机制来在缺乏中心化权威机构的情况下对用户进行身份验证。这一任务通过为网络上的每个参与者提供一对私钥和公钥来实现。私钥由用户持有，并应受到高度保护。私钥用于签署用户的交易，而公钥（对所有人可见）则可用于验证签名者。通过这种方式，无需中心化权威机构，利用私钥和公钥基础设施，即可在去中心化的区块链网络上实现安全性。\n\
  \n![](img/index-34_1.png)\n\n### 2.9 区块链与单向链表的比较\n\n区块链的数据结构与单向链表的数据结构具有一定程度的相似性，如图\
  \ 2-2 所示。\n\n**图 2-2.** 区块链描绘出的类似链表的结构\n\n我们可以看到，第一个区块被称为创世区块，此后创建的每一个新区块都持有对前一个区块的引用。例如，区块\
  \ 1 将持有对区块 0 的引用，区块 2 持有对区块 1 的引用，依此类推。除了这个指针之外，还会存储前一个区块的哈希值。这看起来就像一个单向链表数据结构。要向该列表添加元素，我们需要使用工作量证明或权益证明，但在区块链上删除操作极其困难，这与链表不同，在链表中删除节点很容易。\n\
  \n本质上，区块链是不可变的。没有任何记录可以被删除。如果我们尝试思考一下，对任何一个区块的任何修改都意味着该区块之后的所有区块都必须用前一个区块的哈希值进行更新。\n\
  \n对于像比特币这样的网络来说，这意味着需要巨大的计算能力才能使用工作量证明来修改区块。这也是攻击比特币区块链网络几乎不可能的原因之一。\n\n接下来，我们将介绍以太坊区块链，它是我们将在本书后续所有工作中使用的可编程区块链。\n\
  \n### 2.10 以太坊\n\n以太坊是一个区块链网络，它包含一种图灵完备的编程语言，可用于构建各种去中心化应用（也称为 DApp）。以太坊网络由其自身的加密货币以太币驱动。以太坊网络目前因支持使用智能合约而广为人知。智能合约可以比作包含特定价值的加密银行保险柜。\n\
  \n必须满足某些条件才能解锁这些加密保险柜。`Solidity` 这种编程语言主要用于创建智能合约。`Solidity` 是一种相对易于学习的面向对象编程语言。我们将在[第\
  \ 3 章](https://doi.org/10.1007/978-1-4842-8975-4_3)中看到更多关于 `Solidity` 的内容。\n\n以太坊基于两种账户类型运作：\n\
  \n1. **外部拥有账户 (EOA)**\n   私钥用于控制外部拥有账户。每个 EOA 都由一对公私钥保护。用户可以通过创建和签署交易来进行通信。\n\n\
  2. **合约账户**\n   合约代码用于管理合约账户。这些代码与账户一起保存。每个合约账户都有一个关联的以太币余额。每当这些账户从 EOA 收到交易或从另一个合约收到消息时，其合约代码就会被激活。当合约代码被激活时，可以读取/写入本地存储的消息、发送消息以及创建合约。\n\
  \n### 2.11 总结\n\n在本章中，我们涵盖了区块链架构的基础知识，以及像工作量证明和权益证明这类在比特币和以太坊等区块链网络中常用的不同共识算法。\n\
  \n在下一章中，我们将介绍 `Solidity`，它是以太坊区块链上使用的语言，以及如何使用 `Solidity` 创建智能合约。\n\n## 第 3 章：Solidity\n\
  \n你听说过或遇到过智能合约吗？如果有人与世隔绝，可能还没听说过它。话虽如此，智能合约定义了一种我们可以在区块链上执行代码的方式。\n\n用于定义这些智能合约的语言之一是\
  \ `Solidity`。\n\n`Solidity` 允许我们对以太坊区块链进行编程，从而为去中心化应用开发的巨大可能性打开了大门。区块链初学者学习 `Solidity`\
  \ 很重要。透彻理解如何利用 `Solidity` 进行智能合约开发，以及深入审视其各个组成部分，是至关重要的。\n\n学习者还应该反思示例，以便更好地理解构成\
  \ `Solidity` 架构和运作的组件。同样，深入思考 `Solidity` 的各种应用可能有助于更好地理解其重要性。此外，许多学生都想知道：“学习 `Solidity`\
  \ 容易吗？” 重要的是要知道，如果你有一个好的教程可以跟随学习，那么学习 `Solidity` 会更简单。\n\n本章提供了对 `Solidity` 以及其他相关元素（如类型、函数、事件和继承）的全面总结。\n\
  \n© Shashank Mohan Jain 2023\nS. M. Jain，《Web3 简介》，[`doi.org/10.1007/978-1-4842-8975-4_3`](https://doi.org/10.1007/978-1-4842-8975-4_3#DOI)\n\
  \n### 3.1 什么是 Solidity？\n\n`Solidity` 是一种高级编程语言，其主要目的是促进智能合约的创建和执行。`C++`、`JavaScript`\
  \ 和 `Python` 是对 `Solidity` 产生影响的主要编程语言。`Solidity` 由 Gavin Wood 提出，并由 Christian Reitwiessner\
  \ 领导下的以太坊团队编写。此外，`Solidity` 的设计重点在于以太坊虚拟机。\n\n在以太坊区块链上，可以借助 `Solidity` 来创建去中心化应用，通常称为\
  \ DApp。2015 年对 `Solidity` 来说是一个转折点。在这个简化的版本中，`Solidity` 主要强调的特性是其关键组成部分，展示了 `Solidity`\
  \ 在不同背景下的有效性。当你学习 `Solidity` 时，你会注意到它具有以下重要特性：\n\n1. 智能合约是使用 `Solidity` 实现的，它是一种静态类型语言。可以使用面向对象或面向合约的框架来创建和部署智能合约。\n\
  2. 可以使用 `Solidity` 编程语言创建用于投票、共识、多重签名钱包和其他应用的合约。\n\n在我们开始理解 `Solidity` 的细微差别之前，我们需要了解几件事。\n\
  \n### 3.2 以太坊\n\n使用以太坊作为学习 `Solidity` 的起点是显而易见的。以太坊虚拟机是 `Solidity` 的主要目标，这意味着读者应该关注以太坊在\
  \ `Solidity` 环境中的情况。这个开源且去中心化的平台有助于执行智能合约，并且建立在区块链技术之上。以太坊是一个开源软件平台，它利用区块链技术来帮助开发者创建和部署去中心化应用。\n\
  \n以太币是驱动以太坊网络的加密资产。应用开发者使用以太币来支付以太坊网络上的交易服务和费用，使其不仅仅是一种可转让的加密货币。\n\n\n\n#### 以太坊燃料机制\n\
  \n以太坊使用第二种代币类型来向矿工支付费用，以换取他们将交易包含在以太坊区块链的特定区块中。对于所有涉及智能合约的交易，`gas`（燃料）都是一个必不可少的组成部分，而以太坊的`gas`代币则构成了链条中至关重要的一环。以太坊`gas`是吸引那些想要在区块链上部署智能合约的矿工的关键因素。\n\
  \n#### 3.2.1 以太坊虚拟机\n\n以太坊虚拟机（`EVM`）是以太坊区块链的关键组成部分。以太坊中的智能合约可以在此虚拟机中执行。没有`EVM`，全球公共节点网络就不可能为运行不可信代码提供必要的安全性和能力。\n\
  \n现在，既然我们可以运行不可信代码，运行环境就需要为我们提供适当的安全措施，例如防范拒绝服务攻击。以太坊通过引入`gas`概念来抵御此类攻击。\n\n###\
  \ 第 3 章 Solidity\n\n### 3.3 智能合约\n\n用户在应用程序中编写的所有业务逻辑都应当在智能合约中定义。因此，尽快牢固掌握智能合约的基础知识至关重要。\n\
  \n在编写智能合约之前，应当掌握 Solidity 编程语言的基础知识。这正是我们接下来要做的。\n\n### 3.4 理解 Solidity 语法\n\n####\
  \ 3.4.1 编译指示\n\n`pragma`指令是 Solidity 智能合约中的第一行代码；例如，Solidity `0.4.16` 版本的源代码示例中的`pragma`指令就是如此。不仅如此：该合约还可与高于指定版本的\
  \ Solidity 版本兼容。此外，智能合约的`pragma`指令也将其限定在 `0.9.0` 版本范围内。\n\n`pragma`语法示例：\n\n```solidity\n\
  pragma solidity ⁰.8.13;\n```\n\n#### 3.4.2 变量\n\n任何计算机语言都离不开变量。因此，你需要通过 Solidity\
  \ 课程来学习变量以及如何使用它们来存储信息。请记住，变量仅仅是内存中用于存储值的占位符。因此，通过声明一个变量，你是在预先预留内存空间。\n\nSolidity\
  \ 支持多种数据类型，例如`整数`、`字符串`、`布尔值`等。根据变量的数据类型，操作系统决定分配多少预留内存以及在其中存储何种实体。\n\n### 第 3 章\
  \ Solidity\n\n学习 Solidity 需要理解变量。Solidity 中的变量可分为三类：状态变量、局部变量和全局变量。状态变量是永久保存在合约存储中的变量。局部变量的值则在函数执行过程中存在。\n\
  \n另一方面，全局变量是位于全局命名空间中的独特变量，有助于检索与区块链相关的数据。作为一种静态类型语言，Solidity 要求在定义状态变量或局部变量时指定其类型。由于没有`null`或`undefined`的概念，所有声明的变量都会根据其类型被赋予一个默认值。这里有必要进一步探讨\
  \ Solidity 中的变量，具体如下：\n\n1.  **状态变量** – 存储在合约存储中的变量。\n    例如：\n    ```solidity\n\
  \    pragma solidity ⁰.8.13;\n\n    contract NewsBlog {\n        uint newsCount;\
  \ // newsCount 是一个状态变量\n\n        constructor() public {\n            newsCount\
  \ = 1; // 初始化状态变量\n        }\n    }\n    ```\n\n2.  **局部变量** – 在函数执行过程中其值得以保留的变量。\n\
  \    例如：\n    ```solidity\n    pragma solidity ⁰.8.13;\n\n    contract NewsBlog\
  \ {\n        uint newsCount; // newsCount 是一个状态变量\n\n        constructor() public\
  \ {\n            newsCount = 1; // 初始化状态变量\n        }\n\n        function addToNews()\
  \ public view returns(uint) {\n            uint news=1; //news 是在函数作用域内使用的局部变量示例\n\
  \            uint res=newsCount+news;\n            return res;\n        }\n    }\n\
  \    ```\n\n3.  **全局变量** – 全局命名空间中包含...\n\n\n\n"
- "# 用于获取区块链相关数据的特殊变量\n\n以下是 Solidity 中所有全局变量及其作用的列表：\n\n1. `blockhash(uint blockNumber)`\
  \ 的返回值是：区块哈希表示；仅对最近 256 个区块有效；当前区块被忽略。\n2. Coinbase 的支付地址是 `block.coinbase`。显示当前区块的地址。\n\
  3. 区块的难度由 `block.difficulty`（uint 类型）表示。\n4. 函数 `block.gaslimit` 的 uint 值。显示当前区块的\
  \ gas 限制。\n5. `block.number` 的 uint 值。此处显示当前区块编号。\n6. 作为通用标识符的当前时间（uint 类型）：当前区块的时间戳以自\
  \ Unix 时间以来的秒数显示。\n7. `msg.sig` – 你可以通过此方法获取函数标识或调用数据的前四个字节。\n8. `msg.data`（调用数据的字节数组）\n\
  9. 如果你想知道当前区块的时间戳，可以使用 `now` 函数。\n\n##### 3.4.2.1 变量命名\n\n在 Solidity 中命名变量时，应牢记以下准则：\n\
  \n1. Solidity 的保留关键字不应作为变量名使用。下一部分会讨论这些关键术语。例如，像 `break` 或 `boolean` 这样的变量名是无效的。\n\
  2. Solidity 中的变量名不应以数字（0–9）开头。它们只能以字母或下划线开头。例如，变量名 `543coin` 无效，而 `_543coin` 是可接受的。\n\
  3. 在命名 Solidity 变量时，大小写很重要。`Blog` 和 `blog` 将被视为两个不同的变量。\n\n##### 3.4.2.2 变量的作用域\n\
  \n局部变量是函数内部的局部变量，意味着对其状态的任何影响都仅限于该方法的范围内；而状态变量可以产生三种不同的影响：\n\n- **公有（Public）** –\
  \ 公有的状态变量既可以在内部访问，也可以通过消息访问。对于公有可访问的状态变量，会自动生成一个 getter 函数。\n- **内部（Internal）**\
  \ – 这些状态变量只能在同一合约内部或从该合约的子合约内部访问。\n- **私有（Private）** – 这些变量的作用域非常受限——仅限于同一合约——即使从子合约也无法访问。\n\
  \n#### 3.4.3 值类型\n\n你可以通过仔细阅读任何相关教程来了解 Solidity 区块链编程语言中的各种数据类型。Solidity 支持多种预定义和自定义数据类型。以下是\
  \ Solidity 中一些最常见的数据类型：\n\n- 整数，包括有符号和无符号\n- 布尔值\n- 定点数，包括有符号和无符号，具有多种尺寸\n- 定点数\
  \ `X x Y`，其中 *X* 定义类型所占的位数，*Y* 表示小数位数\n- 无符号定点数 `X x Y`，其中 *Y* 表示无符号定点数。\n\n####\
  \ 3.4.4 地址\n\n以太坊地址在 Solidity 教程中由一个 20 字节的值表示，称为“地址”。要获取余额，可以使用 `.balance` 方法配合地址使用。可以使用\
  \ `.transfer` 函数将余额转移到另一个地址。\n\n## 3.4.5 Solidity 中的运算符\n\n与其他编程语言一样，Solidity 支持运算符。我们将在此处说明几个这样的运算符。\n\
  \n##### 3.4.5.1 算术运算符\n\n算术运算包括以下内容：\n\n1. 加法\n2. 减法\n3. 乘法\n4. 除法\n5. 递增（`++`）\n\
  6. 递减（`--`）\n7. 取模（`%`）\n\n##### 3.4.5.2 比较运算符\n\n比较运算符包括以下内容：\n\n1. 等于（`==`） –\
  \ 检查两个操作数是否相等\n2. 不等于（`!=`） – 检查两个操作数是否不相等\n3. 大于（`>`） – 检查运算符左侧的操作数是否大于右侧的操作数\n\
  4. 大于或等于（`>=`） – 检查运算符左侧的操作数是否大于或等于右侧的操作数\n\n\n\n5. 小于（`<`）—— 用于检查运算符左侧的操作数是否小于右侧的操作数\
  \  \n6. 小于或等于（`<=`）—— 用于检查运算符左侧的操作数是否小于或等于右侧的操作数  \n\n##### 3.4.5.3 逻辑运算符\n\nSolidity\
  \ 中的逻辑运算符包括以下内容：  \n1. 逻辑与（`&&`）—— 如果运算符左侧的操作数为真，则返回 `true`。  \n2. 逻辑或（`||`）—— 如果其中一个操作数为真，则返回\
  \ `true`。  \n3. 逻辑非（`!`）—— 它反转操作数的逻辑状态，并返回操作数状态的反值。\n\n##### 3.4.5.4 赋值运算符\n\nSolidity\
  \ 中的赋值运算符包括以下内容：  \n1. 简单赋值（`a = b + c`）  \n2. 加后赋值（`a += b` 等价于 `a = a + b`）  \n\
  3. 减后赋值（`a -= b` 表示 `a = a - b`）  \n4. 乘后赋值（`a *= b` 表示 `a = a * b`）  \n5. 除后赋值（`a\
  \ /= b` 表示 `a = a / b`）  \n6. 取模后赋值（`a %= b` 表示 `a = a % b`）\n\n#### 3.4.6 循环\n\n\
  循环是一种简单的结构，允许在代码中重复执行某段操作。例如，假设我们要显示博客网页的点击次数。我们可以使用循环遍历博客网页的点击次数并显示结果。\n\n与其它编程语言一样，Solidity\
  \ 支持不同的循环语法。\n\n以下是 Solidity 中 `for` 循环的示例：\n\n```solidity\npragma solidity ⁰.8.13;\n\
  \ncontract News {\n    uint newsCount;\n\n    constructor() public {\n        newsCount\
  \ = 0;\n    }\n\n    function count() public returns (uint val) {\n        // for\
  \ 循环示例\n        for (uint i = 0; i < 5; i++) {\n            newsCount++;\n     \
  \   }\n        return newsCount;\n    }\n}\n```\n\nSolidity 中的 `while` 循环：\n\n```solidity\n\
  pragma solidity ⁰.8.13;\n\ncontract News {\n    uint newsCount;\n\n    constructor()\
  \ public {\n        newsCount = 0;\n    }\n\n    function count() public returns\
  \ (uint val) {\n        uint i;\n        while (i <= 5) {\n            newsCount++;\n\
  \            i++;\n        }\n        return newsCount;\n    }\n}\n```\n\nSolidity\
  \ 中的 `do while` 循环：\n\n```solidity\npragma solidity ⁰.8.13;\n\ncontract News {\n\
  \    uint newsCount;\n\n    constructor() public {\n        newsCount = 0;\n   \
  \ }\n\n    function count() public returns (uint val) {\n        uint i;\n     \
  \   do {\n            newsCount++;\n            i++;\n        }\n        while (i\
  \ <= 5);\n        return newsCount;\n    }\n}\n```\n\n#### 3.4.7 决策流\n\n所有编程语言（包括\
  \ Solidity）都提供在代码中应用条件逻辑的方法。基于某些条件，我们可能会选择执行某条代码路径，而当其它条件为真时则选择另一条路径。这就是决策流所实现的功能。\n\
  \nSolidity 支持 `if` 和 `if else` 语句，以在智能合约中实现决策流和条件逻辑。\n\n以下是 `if` 语句的示例：\n\n```solidity\n\
  pragma solidity ⁰.8.13;\n\ncontract News {\n    uint newsCount;\n\n    constructor()\
  \ public {\n        newsCount = 0;\n    }\n\n    function isFake() public returns\
  \ (string memory) {\n        // 这里检查 if 条件\n        if (newsCount > 3)\n       \
  \     return \"too many news articles\";\n        return \"not much news\";\n  \
  \  }\n\n    function count() public returns (uint val) {\n        uint i;\n    \
  \    do {\n            newsCount++;\n            i++;\n        }\n        while\
  \ (i <= 5);\n        return newsCount;\n    }\n}\n```\n\n类似地，我们还有用于决策的 `if else`\
  \ 流程。例如：\n\n```solidity\npragma solidity ⁰.8.13;\n\ncontract News {\n    uint newsCount;\n\
  \n    constructor() public {\n        newsCount = 0;\n    }\n\n    function isFake()\
  \ public returns (string memory) {\n        // 在这里检查 if else 条件\n        if (newsCount\
  \ > 3) {\n            return \"too many news articles\";\n        } else {\n   \
  \         return \"not much news\";\n        }\n    }\n\n    function count() public\
  \ returns (uint val) {\n        uint i;\n        do {\n            newsCount++;\n\
  \            i++;\n        }\n        while (i <= 5);\n        return newsCount;\n\
  \    }\n}\n```\n\n#### 3.4.8 Solidity 中的函数\n\nSolidity 通过在智能合约中创建函数来提倡代码的可重用性和可读性。函数允许我们编写可读的代码，同时也可以将特定功能定义为一个代码块。这意味着你不必重复编写相同的代码。它有助于程序员编写易于修改的代码。\n\
  \n函数让程序员能够将大型程序分解为更小、更易于处理的片段。\n\n与任何其它高级编程语言一样，Solidity 拥有编写模块化函数代码所需的所有特性。\n\n\
  ## 第 3 章 Solidity\n\n\n\n让我们来看一个智能合约中计数函数的例子。\n\n我们并未展示完整的合约，仅给出函数定义：\n\n```solidity\n\
  function count() public\nreturns (uint val) {\n  uint i;\n  do {\n    newsCount++;\n\
  \    i++;\n  }\n  while (i <= 5);\n  return newsCount;\n}\n```\n\n这里，函数名是`count`，且不接收任何参数。它返回一个整型值，作用域为`public`。\n\
  \n我们也可以定义接收输入值作为参数的函数。\n\n以下是带参数的函数示例：\n\n```solidity\nfunction oddEven(uint x)\
  \ public returns (string memory)\n{\n  if (x % 2 == 0) return \"even\";\n  else\n\
  \  {\n    return \"odd\";\n  }\n}\n```\n\n这里我们看到函数`oddEven`接收一个整型参数，并返回一个字符串，表示该数字是奇数还是偶数。\n\
  \n在 Solidity 中，函数可以有`return`语句，但并非必须。如果你希望函数返回值，则需要使用`return`。函数中的最后一条语句应该是`return`。\n\
  \n"
- "# 第 3 章 Solidity\n\n##### 3.4.8.1 函数修饰符\n\n函数修饰符是 Solidity 中的一个重要概念。它允许我们将代码中一些通用方面外部化到修饰符中，从而提高代码的可重用性。例如，如果希望在函数调用前后打印一条消息，一种方式是将此代码放入每个函数体中；另一种方式是创建一个修饰符，它充当函数的占位符，并允许我们在代码周围织入一些逻辑。\n\
  \n修饰符最常用于在函数运行前自动检查某个条件。例如，如果希望在调用函数之前验证用户身份，我们会将身份验证逻辑放入修饰符中。在函数被调用之前，这段身份验证代码会先执行。如果身份验证成功，则执行函数；否则会抛出异常。\n\
  \n以下是修饰符的示例：\n\n```solidity\nmodifier SampleModifier {\n  // 修饰符的逻辑\n}\n```\n\n\
  修饰符也可以接收输入参数，例如：\n\n```solidity\nmodifier SampleModifier(string x) {\n  // 修饰符的逻辑\n\
  }\n```\n\n让我们分析修饰符的工作原理。这里，我们创建了一个名为`checkOwner`的修饰符：\n\n```solidity\nmodifier checkOwner\
  \ {\n  require(msg.sender == owner);\n  _;\n}\n```\n\n读者可以看到修饰符代码中有`_;`。这被称为合并通配符。可以将其视为要执行的函数的占位符。为了清晰解释，这是附加了此修饰符的函数将要执行的位置。这使我们能够在函数执行前后放置一些通用代码。熟悉面向切面编程的读者可以在这里找到相似之处。为了正常工作，修饰符必须在主体中包含`_;`符号。\n\
  \n这里展示了`_;`如何放置在修饰符中：\n\n```solidity\nmodifier executeBefore {\n  require(/* 在函数之前执行的代码\
  \ */);\n  _; // 这里的 _ 表示实际要执行的函数\n}\n```\n\n这个例子展示了通过修饰符进行后处理。函数执行发生在修饰符调用之前：\n\n\
  ```solidity\nmodifier executeAfter {\n  _; // 执行实际函数\n  require(/* 在函数之后执行的代码 */);\n\
  }\n```\n\n以下是使用示例。函数`isValidUser`仅在用户有效时返回`true`。这里有两种选择：要么将用户有效性检查放入每个需要此检查的函数中，要么通过修饰符将检查外部化，同时实现清晰的关注点分离。\n\
  \n我们认为使用修饰符是更清晰、更好的方法。以下展示了如何通过修饰符实现这一点：\n\n```solidity\nfunction isValidUser(address\
  \ _user) public view returns(bool) {\n  // 检查 _user 是否有效的逻辑\n  return true;\n}\n\
  \nmodifier CheckUser {\n  require(isValidUser(msg.sender));\n  _;\n}\n```\n\n还有一种方法可以将多个修饰符应用于一个函数：\n\
  \n```solidity\ncontract Sample {\n  modifier A() {\n    require(\n      // 一些检查\n\
  \    );\n    _;\n  }\n  modifier B() {\n    require(\n      // 更多检查\n    );\n  \
  \  _;\n  }\n  function test() public B() A() {\n    // 函数代码\n  }\n}\n```\n\n\n\n"
- "# 第 3 章 Solidity\n\n##### 3.4.8.2 视图函数\n\n在 Solidity 中，`view` 函数是一种只读取合约状态变量而不对其进行修改的函数。\n\
  \n如果 `view` 函数中存在以下任意语句，编译器会认为它们正在修改状态变量并给出警告：\n\n-   修改/覆盖状态变量。\n-   创建新合约。\n-\
  \   调用非 `pure` 或 `view` 的函数。\n-   触发事件。\n-   在内联汇编中使用特定操作码。\n-   使用 `self-destruct`。\n\
  -   使用低级函数调用。\n-   在函数调用中发送以太币。\n\n下面是一个示例：\n\n```solidity\npragma solidity ⁰.8.13;\n\
  \ncontract Sample {\n    // 状态变量\n    uint x = 10;\n\n    // 定义一个视图函数\n    // 它返回两个作为参数传入的数值与状态变量\
  \ x 的乘积\n    function calculateProduct(uint y, uint z) public view returns(uint)\
  \ {\n        uint product = x * y * z;\n        return product;\n    }\n}\n```\n\
  \n正如我们在代码中所见，我们以只读方式使用了状态变量 `x`，并未对其进行修改。\n\n##### 3.4.8.3 纯函数\n\n在 Solidity 中，`pure`\
  \ 函数不会读取或更改状态变量。相反，它们仅使用传递给函数的参数或其拥有的任何局部变量来计算值。如果 `pure` 函数中存在读取状态变量、访问地址或余额、访问像\
  \ `block` 或 `msg` 这样的全局变量、调用非 `pure` 函数等语句，编译器将会发出警告。\n\n例如：\n\n```solidity\npragma\
  \ solidity ⁰.8.13;\n\ncontract Sample {\n    // 状态变量\n    uint x = 10;\n\n    //\
  \ 定义一个纯函数\n    // 它返回两个作为参数传入的数值的乘积\n    function calculateProduct(uint y, uint\
  \ z) public pure returns(uint) {\n        uint product = y * z;\n        return\
  \ product;\n    }\n}\n```\n\n我们可以看到，我们只使用了参数来计算乘积；函数内部甚至没有读取状态变量。\n\n##### 3.4.8.4\
  \ 回退函数\n\nSolidity 中的回退函数是一个没有名称、参数或返回值的 `external` 函数。例如，回退函数负责在以太坊区块链的智能合约中发送、接收和持有以太币。在以下任一情况下，它会被执行：\n\
  \n-   当函数标识符与智能合约的任一函数都不匹配时\n-   当函数调用未附带任何数据时\n\n回退函数具有以下属性：\n\n-   它们是匿名函数。\n\
  -   它们不能接受参数。\n-   它们不能返回任何值。\n-   一个智能合约中只能有一个回退函数。\n-   必须将其标记为 `external`。\n\
  -   应将其标记为 `payable`。如果没有标记，合约在收到不带任何数据的以太币时会抛出异常。\n-   如果由其他函数调用，其 gas 限制为 2300。\n\
  \n目前不必担心 gas 方面的内容。待我们了解以太坊后，再详细讨论。\n\n例如：\n\n```solidity\npragma solidity ⁰.8.13;\n\
  \ncontract Sample {\n    uint public z ;\n\n    fallback () external { z = 100;\
  \ }\n}\n\ncontract Invoker {\n    function callSample(Sample sample) public returns\
  \ (bool) {\n        // 这里我们调用了一个不存在的函数\n        (bool success,) = address(sample).call(abi.encodeWithSignature(\"\
  hello()\"));\n        require(success);\n        // sample.z 现在是 100\n    }\n}\n\
  ```\n\n这里，我们可以看到调用者合约试图在 `Sample` 合约上调用一个名为 `hello` 的函数。由于 `Sample` 合约中不存在名为 `hello`\
  \ 的函数，因此调用了回退函数，将状态变量 `z` 的值设置为 100。\n\n##### 3.4.8.5 Solidity 中的函数重载\n\n函数重载允许我们在同一个合约中拥有多个同名函数。这只有在函数的类型或参数定义不同的情况下才可能实现。\n\
  \n以下是一个函数重载的示例：\n\n\n\n\npragma solidity ⁰.8.13;\n\n```\ncontract Sample {\n\n \
  \   function calculateProduct(uint x, uint y) public pure returns(uint){\n     \
  \   return x*y;\n    }\n\n    function calculateProduct(uint x, uint y, uint z)\n\
  \    public pure returns(uint){\n        return x*y*z;\n    }\n\n    function doProductUsing2Arguments()\
  \ public pure\n    returns(uint){\n        return calculateProduct(4,5);\n    }\n\
  \n    function doProductUsing3Arguments() public pure\n    returns(uint){\n    \
  \    return calculateProduct(4,5,6);\n    }\n}\n```\n\n在上述所有例子中，我们都看到了合约的使用。在此，我们定义什么是\
  \ Solidity 合约。\n\n可以将 Solidity 中的合约视为类似于 C++ 中的类。Solidity 中的合约包含以下内容：\n\n1. 构造函数\n\
  2. 状态变量\n3. 函数\n\n## 第 3 章 Solidity\n\n函数和状态变量有不同的可见性要求。这些要求通过可见性限定符来实现，如下所示：\n\n\
  1. **External** – 外部函数由其他合约调用。它们不能在合约内部被调用。如果要从当前合约内部调用外部函数，则需要使用函数名称进行调用。\n\n2.\
  \ **Public** – 这些函数既可以从同一合约内部调用，也可以从其他合约调用。Solidity 会为每个公共状态变量自动生成一个 getter 函数。\n\
  \n3. **Internal** – 与公共函数相反，内部函数的可见性限定在定义该函数的同一合约内，或定义该内部函数的父合约的子合约内。\n\n4. **Private**\
  \ – 私有函数和变量只能在同一合约内使用。即使是子合约也不能使用它们。\n\nSolidity 合约可以通过使用继承的概念来扩展功能。下面是一个简单的继承示例：\n\
  \n```\npragma solidity ⁰.8.13;\n\ncontract Sample {\n\n    constructor() public\
  \ {\n    }\n\n    //我们定义一个公共函数来演示继承\n    function getProduct(uint p, uint q) internal\
  \ pure returns (uint) { return p * q; }\n}\n\n//派生合约\ncontract ChildSample is Sample\
  \ {\n    uint private res;\n    Sample private samp;\n\n    constructor() public\
  \ {\n        samp = new Sample();\n    }\n\n    function getProductOfTwo() public\
  \ {\n        //调用父合约的 getProduct 函数\n        res = getProduct(6, 7);\n    }\n}\n\
  ```\n\n#### 3.4.9 抽象合约\n\n如果一个合约至少有一个未实现功能的函数，那么该合约就是抽象的。这种合约被用作一个起点。大多数情况下，抽象合约既包含已实现的函数，也包含抽象函数。派生合约在需要时会使用现有函数，并实现抽象函数。如果派生合约没有实现抽象函数，它将被标记为抽象。\n\
  \n示例如下：\n\n```\npragma solidity ⁰.8.13;\n\nabstract contract Sample {\n    function\
  \ getProduct() virtual public view returns(uint); \n}\n\ncontract SimpleSample is\
  \ Sample {\n    function getProduct() public override view returns(uint) {\n   \
  \     uint x = 10;\n        uint y = 11;\n        uint product = x*y;\n        return\
  \ product;\n    }\n}\n```\n\n在这段代码中，我们定义了一个抽象合约 `Sample`，其中包含一个函数 `getProduct`。请注意，按照预期，`getProduct`\
  \ 函数在抽象合约 `Sample` 中并未实现。\n\n#### 3.4.10 接口\n\n接口类似于抽象合约，并且使用 `interface` 关键字来创建它们。以下是接口最重要的部分。可以将接口视为一种合约，其实现方式由实现者决定。例如，`ERC20`\
  \ 接口定义了一组方法，然后可以在以太坊区块链上创建代币时实现这些方法。一个合约可以继承自一个或多个接口。因此，可以使用多个接口组合出一个实现。以下也是事实：\n\
  \n- 接口不能有已实现的函数。\n- `External` 是唯一可以作为接口一部分的函数类型。\n- 接口中不能有`constructor`（构造函数）。\n\
  - 接口中不能有任何状态变量。\n- 使用接口名称加点的表示法，可以访问作为接口一部分的枚举和结构体。\n\n例如：\n\n\n```solidity\npragma\
  \ solidity ⁰.8.13;\n\ninterface Sample {\n\n    function getProduct() external view\
  \ returns(uint);\n\n}\n\ncontract SimpleSample is Sample {\n\n    function getProduct()\
  \ public view returns(uint) {\n\n        uint x = 10;\n\n        uint y = 11;\n\n\
  \        uint product = x*y;\n\n        return product;\n\n    }\n\n}\n```\n\n除了抽象合约和接口，Solidity\
  \ 还支持**库**的概念。\n\n#### 3.4.11 库\n\n库与合约类似，但它们主要用于重复使用。库包含可被其他合约调用的函数。使用 Solidity\
  \ 库时需要遵循一些规则。以下是关于 Solidity 库的几项要点：\n\n- 如果库函数不改变状态，则可直接调用。\n- Solidity 库旨在无状态，因此库不能包含任何状态变量。\n\
  - 就继承而言，库不能继承变量，且库本身也不可被继承。\n\nSolidity 还提供了**事件**的概念。\n\n#### 3.4.12 事件\n\n事件是一种可被继承的合约组件。当事件被触发时，提供给它的参数会被记录到交易日志中。这些日志保存在区块链上，在合约被添加到区块链之前，可以通过合约地址访问它们。合约内部无法访问已生成的事件，即使是产生并触发该事件的合约本身也不行。\n\
  \n关键字 `event` 是 Solidity 用于定义事件的语法。当事件被调用时，其参数会在事件完成后被添加到区块链上。要开始使用事件，您首先需要按如下方式声明它们：\n\
  \n```solidity\nevent moneyTransferred(address _from, address _to, uint _amount);\n\
  ```\n\n然后，您需要确保事件从函数内部发送出去：\n\n```solidity\nemit moneyTransferred(msg.sender, _to,\
  \ _amount);\n```\n\n#### 3.4.13 Solidity 中的错误处理\n\nSolidity 有多种可用于处理错误的程序。大多数情况下，当错误发生时，状态会重置为问题出现前的状态。此外还会执行额外检查以防止对代码的非法访问。\n\
  \nSolidity 中有几种处理错误的方式，例如 `require`、`revert` 和 `assert`。我们将留给用户自行探索这三种错误处理机制。\n\n\
  #### 3.4.14 Solidity 与地址\n\n在本节中，我们将讨论如何在 Solidity 编程语言中使用和引用以太坊地址。由于整个以太坊生态系统都基于与以太币相关的交易，因此了解不同地址在\
  \ Solidity 环境中的工作方式至关重要。\n\n以太坊生态系统中有两种账户类型：\n1. **外部账户 (EOA)** – 私钥允许对账户中的任何以太币进行私有控制，以及在使用智能合约时账户所需的任何认证。私钥是生成数字签名所需的关键数据，而数字签名是签署文件以便花费账户中资金所必需的。\n\
  2. **合约账户** – 与 EOA 不同，智能合约没有关联的公钥或私钥。智能合约由其底层代码而非私钥支持。正如俗话所说，它们“拥有自身”。\n\n每个合约的地址是从创建该合约的交易中获得的，它是发起交易的账户和\
  \ nonce（我们稍后会介绍）的函数。合约的以太坊地址可以在交易中以多种方式使用，包括作为接收方，用于向合约付款，或用于调用合约支持的某个函数。\n\n#####\
  \ 3.4.14.1 以太坊地址\n\n哈希函数是地址创建过程中的重要组成部分。为了生成这些地址，以太坊在生成过程中使用了 **Keccak-256** 哈希函数。\n\
  \n\n"
- '# Ethereum 地址与 Solidity 中的地址使用


  ## Ethereum 地址概述


  以太坊和 Solidity 中的标准地址长度为二十字节（160 位或 40 个十六进制字符）。它等价于对公钥执行 `Keccak-256` 哈希后得到的最后 20
  个字节。由于地址总是以十六进制格式（基数为 16 的表示法）表示，因此其开头总是添加前缀 `0x`（已显式定义）。


  创建以太坊地址的步骤如下：


  1.  首先，我们使用 `ecparam` 命令（由 OpenSSL 提供）来生成椭圆曲线私钥。以太坊的标准实现采用 `secp256k1` 曲线。此命令将以
  PEM 格式（利用出色的 ASN.1 密钥结构）输出私钥，并将其发送到标准输出。

  2.  使用 `openssl` 命令从私钥中获取公钥。

  3.  对公钥应用 `Keccak-256` 哈希算法。最终应得到一个总长度为 64 个字符（即 32 字节）的字符串。

  4.  取最低有效字节，即所生成哈希的最后 40 个字符（即 20 字节）。（或者，换句话说，去掉前 24 个字符和前 12 个字节）。地址由这 40 个字符和
  20 个字节组成。


  当添加 `0x` 前缀后，地址的实际长度增加到 42 个字符。此外，务必记住字母的大小写无关紧要。所有钱包都应能接受以大写或小写字母书写的以太坊地址，且其解释方式不应有任何差异。


  合约地址的构建方式有所不同。它们是基于以下两项内容以确定性的方式生成的：

  1.  创建者（发送者）的地址

  2.  创建者已经发起的交易数量（`nonce`）


  合约地址的形成过程如下：

  1.  考虑 `sender` 和 `nonce` 的值。

  2.  使用 RLP 对它们进行编码。

  3.  使用 `Keccak-256` 对它们进行哈希。


  ## Solidity 中地址的使用


  要创建地址数据类型的变量，必须在变量名前加上关键字 `address`。


  ```

  address sender = msg.sender;

  ```


  这里，我们在 `sender` 变量中保存发送者的地址。`msg.sender` 是 Solidity 的内置函数，它表示调用智能合约上函数的用户的地址。


  Solidity 中还有另一种类型，称为 `address payable`。


  在 Solidity 0.5.0 版本中，首次引入了 `address` 和 `address payable` 之间的区别。其目的是为了区分能够接收资金的地址和不能接收资金的地址（用于其他目的）。换句话说，普通的
  `address` 无法接收以太币，而 `address payable` 则允许这样做。简单来说，只能将以太币发送给定义为 `address payable`
  的变量。


  我们将与地址相关联的 Solidity 方法分为两个不同的组（即交易类型）：

  1.  有三种与以太币相关的方法：`.balance()`、`.transfer()` 和 `.send()`。

  2.  以下是与合约交互相关的技术：`.call()`、`.delegatecall()` 和 `.staticcall()`。


  ## `balance` 方法


  此方法以 `wei` 为单位返回账户余额（1 ether = 10¹⁸ wei = 1,000,000,000,000,000,000 wei）。该技术可用于任何声明为
  `address` 的变量。`address.balance()` 使得访问外部拥有账户（EOA/用户）以及合约账户持有的以太币数量成为可能。返回的数字是以 `wei`
  为单位的以太币数量。因为它是读取存储在区块链上的数据，类似 `address.balance` 这样的语句被认为是一种“从状态中读取”的操作。因此，任何返回 `address.balance`
  的 Solidity 函数都可以声明为 `view`。




  '
- "# 第 3 章 Solidity\n\n##### 3.4.14.4 转账函数\n\n`address.transfer` 函数：\n\n- 向指定账户发送以\
  \ wei 计量的以太币数量；\n- 如果出现错误，会回滚到之前的状态并引发异常；\n- 附带 2300 gas 的 gas 补贴。\n\n在发送以太币之前，`.transfer()`\
  \ 方法会通过 `balance` 属性检查地址的可用余额。此操作在幕后完成。\n\n##### 3.4.14.5 合约相关函数\n\nSolidity 提供了一种高级语法，用于调用在其他合约中定义的函数（例如：`Contractx.callFunction(...)`）。然而，要使用这种高级语法，必须在编译过程开始之前先了解目标合约的接口。\n\
  \n`Call`、`delegatecode` 和 `staticcall` 是三种特殊的操作码，EVM 可用其与其他智能合约进行通信。EVM 总共提供四种用于此目的的特殊操作码。\n\
  \n##### 3.4.14.6 以太坊中的 Gas\n\n在以太坊中，我们必须为每一次计算付费，计算量以 gas 为单位计量。以下对 gas 的定义包含在以太坊文档中：\n\
  \n> “Gas 是指在以太坊网络上执行特定操作所需计算工作量的计量单位。由于每笔以太坊交易都需要计算资源来执行，因此每笔交易都需要支付费用。Gas 指成功在以太坊上进行交易所需要的费用。”\n\
  \n##### 3.4.14.7 以太坊交易成本\n\n由于过去（20 世纪 60 年代或 70 年代）计算机资源成本高昂，并且人们深刻意识到计算操作的成本，因此人们共享计算机。在那之后，个人计算机的推出极大地提高了计算机资源的可访问性，除非在资源严重受限的情况下，人们不再过多考虑成本问题。\n\
  \n由于以太坊虚拟机充当着以太坊网络的公共计算机，我们必须像过去一样考虑如何有效利用其资源。然而，由于其执行环境的分布式特性，以太坊使用的是交易费用而非分时方法。\n\
  \n比方说，我们创建这个合约：\n\n```\npragma solidity 0.8.13;\n\ncontract Sample {\n    uint z;\n\
  \n    function set(uint x) public {\n        z = x;\n    }\n\n    function get()\
  \ public view returns (uint) {\n        return z;\n    }\n}\n```\n\n如果我们想查看调用 `get`\
  \ 函数的 gas 费用，可以在图 3-1 中看到。该视图是通过 Remix IDE 实现的。我们将在后续章节中详细介绍，所以不必担心。\n\n![图 3-1](img/index-72_1.png)\n\
  \n**图 3-1.** 函数的 gas 估算\n\n对于 `set` 函数，gas 成本为 22498。\n\n### 3.5 本章小结\n\n在本章中，我们了解了\
  \ Solidity，即以太坊区块链所使用的语言。我们深入探讨了 Solidity 语言的不同构造和语法细节，例如类型、运算符、循环等。\n\n在下一章中，我们将探讨钱包的概念及其工作原理和操作方式。\n\
  \n---\n\n## 第 4 章：钱包与网关\n\n用户可以通过使用钱包来管理他们在比特币或以太坊等区块链网络上的账户。有了以太坊账户，用户就可以参与以太坊区块链网络，例如在其上进行交易。\n\
  \n以太坊区块链上的地址是一个以 `0x` 开头的公开字母和数字字符串。由于以太坊地址由数字和字母的字符串表示，因此可以检查区块链上任何以太坊地址的余额。然而，无法确定谁控制了任何给定的地址。用户可以通过钱包（可以是软件或硬件）来控制无限数量的地址。\n\
  \n以太坊钱包的用户可以使用私钥在钱包内转移资金。该密钥充当以太坊钱包的控制机制。因此，这些私钥应该只有创建钱包的人知道，因为任何知道这些密钥的人都可以访问钱包中的资金。\n\
  \n以太坊钱包种类繁多，有些可以存储在计算机或移动设备上，有些可以通过一张纸、钛板或其他硬件离线存储。您可以选择最适合自己需求的以太坊钱包类型。\n\n© Shashank\
  \ Mohan Jain 2023\n\nS. M. Jain，《Web3 简要介绍》[, https://doi.org/10.1007/978-1-4842-8975-4_4](https://doi.org/10.1007/978-1-4842-8975-4_4#DOI)\n\
  \n需要使用安全密钥（即私钥）来创建钱包。钱包可以被视为存储用户私钥和公钥的仓库。在密码学中，私钥可用于签署交易，公钥可用于验证签名者。其理念是用户自己保管私钥，并在网络上分享公钥。这样，用户就可以签署想要执行的交易，而使用其公钥的验证者可以验证她是否是这些交易的签署者。钱包通过为客户提供与链交互的统一场所和抽象层，简化了密钥管理过程。想要避免管理钱包的人可以利用第三方交易所（如币安），这些交易所代用户管理钱包。由于这些交易所大多是中心化的，其服务器一旦受损，就可能导致用户钱包受损。因此，如果您的密钥通过交易所管理的钱包存放在交易所，风险需自行承担。正如俗话所说：“你的密钥，你的钱。”从安全角度来看，将密钥保存在交易所之外始终是更明智的选择。\n\
  \n### 4.1 钱包类型\n\n有些人将以太坊资产存放在面向用户设计的钱包中，而另一些人则使用加密货币交易所或其他服务，例如由面向用户钱包提供的在线市场或借贷服务。这类钱包被称为托管钱包，其特点在于它们代用户存储私钥。用户并不直接控制钱包中的资金；相反，服务代表用户管理钱包。这种安排需要成本。\n\
  \n他方不履行其义务的风险被称为交易对手风险。当通过使用托管钱包将资金存放于第三方时，这种风险会增加。例如，存储私钥的服务存在被黑客攻击或恶意行为的风险。\n\n\
  不同的用户可能会受益于使用特定类型的钱包。目前有大量钱包可供用户选择。大多数钱包使用以太坊或基于 ERC 20 标准的代币来访问区块链上的应用。这种访问是通过在区块链网络上执行智能合约形式的代码来实现的。ERC\
  \ 20 是为在链上创建代币而定义的一组标准。这允许人们创建自己的代币，如果需要，这些代币可以用于他们自己的应用程序。\n\n目前有以下几种不同类型的钱包：\n\
  \n1.  **移动钱包** – 例如 `bitcoin.com` 应用，它提供了一个在区块链上进行交易时使用密钥的界面。\n2.  **桌面钱包** – 作为桌面应用程序安装，可以在笔记本电脑或家用电脑上使用。此类钱包的一个例子是\
  \ `electrum`。\n3.  **网络扩展** – 这些是基于浏览器的扩展，允许通过浏览器访问钱包。\n\n\n\n"
- '# 钱包与网关


  在浏览器内。MetaMask 就是此类钱包的一个例子。


  ## 硬件钱包


  这些是可用于安全管理钱包的物理硬件设备。这是保护密钥安全的最可靠方式。


  ## 第 4 章：钱包与网关


  在本章中，我们将讨论 MetaMask 钱包，它可作为 Chrome 和 Brave 等浏览器的扩展程序使用。


  选定钱包后，我们需要资金才能与以太坊网络进行交互。这些资金以以太币的形式存在，这是以太坊区块链上使用的加密货币。以太币可以通过 Binance 或 Coinbase
  等交易所购买。


  以太坊区块链上的所有交易都由节点验证，这些节点被称为验证节点。他们会收取验证交易的手续费，这笔费用（称为 gas）必须由发起特定交易的用户支付。用户可以通过多种方式，根据执行特定智能合约所需的预估资源来检查预估的
  gas 费用。


  由于生产环境下的以太坊网络（也称为主网）会为每笔交易收取 gas 费用，因此在主网上进行开发是不可行的。为了促进基于以太坊区块链的去中心化应用开发，有许多可用的开发网络，称为测试网，它们允许开发者使用与以太坊区块链完全相同的接口来开发应用，而无需承担真实的
  gas 成本。


  ### 4.2 那么，什么是测试网？


  当有人开始开发去中心化应用时，他们可以将其部署到测试网络上，从接口角度看，测试网络与主网络相同。这个测试网络就是所谓的测试网。这为开发者、社区以及您提供了一个在涉及真实资产之前进行测试的机会。测试网上的以太币和代币很容易获取，并且在现实世界中毫无价值。


  目前有四个主要的测试网在运行，每个测试网的工作方式都与生产区块链（存放您真实以太币和代币的地方）类似。在大多数情况下，项目只会在一个测试网上开发，尽管个别开发者可能会有自己偏好或最喜欢的测试网。


  1. **Ropsten** – 一个基于工作量证明的测试网区块链，与以太坊最为相似

  2. **Rinkeby** – 一个由 Geth 团队发起的、基于权威证明的区块链

  3. **Kovan** – 同样是一个基于权威证明的区块链

  4. **Goerli** – 一个基于权威证明的测试网


  要将我们的钱包连接到这些测试网中的任何一个，我们需要具备以下两样东西：


  1. 在本地机器上安装一个钱包。这里我们将使用 MetaMask 作为钱包。

  2. 一个像 Infura 这样的网关，使我们的钱包能够连接到这些测试网。


