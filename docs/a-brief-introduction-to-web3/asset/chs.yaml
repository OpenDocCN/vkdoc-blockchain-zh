  \ public override view returns (uint balance) {\n\nreturn tokenBalances[tokenOwner];\n\
  \n}\n\n// function for transferring tokens to a specific address.\n\nfunction transfer(address\
  \ to, uint tokens) public override returns (bool success) {\n\n//checks if there\
