  ***图 4-5.** MetaMask 钱包可用的网络*


  在我们从测试网向钱包添加资金之前，我们需要了解 MetaMask 如何实现与这些测试网的连接。


  一种选择是自行运行一个测试网节点，然后将钱包连接到该节点。另一种选择是通过托管测试网进行连接。


  有一些测试网的托管服务提供商。这里，我们讨论其中一个，称为 Infura。


  Infura 是一个基础设施即服务（IaaS）和 Web3 后端提供商，为区块链开发者提供各种服务和工具。


  这包括 Infura 平台的应用程序编程接口（API）套件。Infura Web3 服务的核心是其旗舰产品 Infura 以太坊 API。然而，与星际文件系统（IPFS）和
  Filecoin 的通信目前也正在开发中。话虽如此，某些 Infura 的替代品目前提供了比 Infura 本身更广泛的跨链连接能力。尽管以太坊是目前发布去中心化应用最流行的可编程区块链，但许多区块链开发者目前仍在寻找
  Infura 的替代品。这发生在币安智能链（BSC）和 Polygon 网络（原 Matic 网络）日益广为人知的情况下。


  Infura 网关的高级架构如图 4-6 所示。


  ***图 4-6.** Infura 架构*


  在图 4-6 的左侧，我们看到钱包通过 HTTPS 或 WebSockets 连接到 Infura 基础设施。Infura 则提供与区块链网络（如以太坊主网或测试网）的连接。Infura
  充当钱包通往区块链世界的网关。


  使用 Infura 以太坊 API 的用户能够将更多时间和资源投入到进行市场研究和产品开发等活动中。此外，用户还可获得一个简单易用的仪表板，从而更深入地了解应用的运行状况。利用该仪表板可以轻松进行应用分析和配置。此外，开发者还可以追踪使用时间。


  ![Infura 仪表板](img/index-84_1.png)




