  \n### 6.3 总结\n\n在本章中，我们研究了智能合约开发中最著名的框架之一——Truffle。我们使用 Truffle 框架创建了一个基于 ERC-20\
  \ 的代币，并将其部署到 Ropsten 测试网络。我们还学会了如何通过调用不同的代币函数来与该代币交互。\n\n在下一章中，我们将稍作转移，学习一种名为星际文件系统（IPFS）的替代性去中心化存储技术。我们将把数字资产存储在\
  \ IPFS 中，然后了解如何使用 ERC-751 标准通过 Remix Web IDE 创建 NFT。\n\n## 第 7 章\n**IPFS 和 NFT**\n\
  \n\n```markdown\n当你想到构建去中心化应用时，脑海中一定会浮现出像以太坊这样的区块链平台。区块链技术对于状态管理、通过智能合约自动化操作以及经济价值交易极其有益。\n\
  \n但你的应用内容究竟存储在哪里呢？\n\n图片？视频？构成应用前端的所有 HTML、CSS 和 JavaScript 文件具体存储在哪里？你的用户访问的内容以及你使用的应用是从中心化的\
  \ AWS 服务器加载的吗？\n\n这些内容必须存储在区块链上，而这是一个既耗时又耗钱的过程。你的区块链应用需要去中心化的存储！\n\n### 7.1 IPFS\n\
  \n星际文件系统（IPFS）是一种点对点的超媒体协议，旨在让万维网更加开放、快速和安全。\n\nIPFS 是一个用于存储和分发内容的协议。每个用户都作为一个节点运行，就像在区块链技术领域（服务器）一样。\n\
  \n节点之间能够相互通信并共享文件。\n\n© Shashank Mohan Jain 2023\n\nS. M. Jain, *A Brief Introduction\
  \ to Web3*[, https://doi.org/10.1007/978-1-4842-8975-4_7](https://doi.org/10.1007/978-1-4842-8975-4_7#DOI)\n\
  \n### 第七章 IPFS 和 NFT\n\n首先，IPFS 被认为是去中心化的，因为内容是从成千上万个对等节点组成的网络中加载的，而不是从单一的中央服务器加载。每一比特的数据都使用密码学进行哈希处理，从而生成一种安全且独一无二的内容标识符，称为\
  \ CID。\n\n既然点对点文件共享已经存在了一段时间，那么你可能会问，IPFS 在这方面有什么独特之处？IPFS 目前是去中心化互联网最著名且最广泛使用的替代方案，因为它拥有多项在加密货币行业中脱颖而出的有利特性。\n\
  \nIPFS 是不可变的，这意味着一旦数据被添加到网络中，就无法以任何方式更改。用户能够验证他们查看的数据没有被篡改。可以发布更新，但这些更新总会以新文件的形式出现；现有文件永远不会被覆盖。\n\
  \nIPFS 通过在数据添加到网络时先进行分块、再存储、最后哈希处理，来防止数据重复。这使得重复数据能够映射到相同的节点，因此只创建一个条目。假设新文件与网络中已有的文件有些相似，那么随着网络规模变大，向网络中添加它所需的存储空间会更少。\n\
  \nIPFS 是去中心化的，这意味着即使某些节点被移除或添加，网络也能继续运行。即使大量节点下线，整个系统也能正常运行。除非摧毁构成网络的每一个节点，否则无法删除信息或审查文件。\n\
  \n这个系统的去中心化是最重要的方面。\n\n接下来会出现一些对比中心化网络与分布式网络外观的图示。\n\n关键点在于，Facebook 实际上拥有第一个网络，148\n\
  \n### 第七章 IPFS 和 NFT\n\n因此他们是该网络上唯一可信的信息来源。在第二个网络中，没有哪个节点比其它节点更重要。\n\n#### 7.1.1\
  \ IPFS：30,000 英尺俯瞰\n\n在我们开始之前，让我们先从一个高层视角看看 IPFS 在幕后做了什么，以便我们对即将涉及的内容有所了解。作为 IPFS\
  \ 网络中的一个节点，你负责建立与网络中其它数十个节点的连接，并充当这些节点的路由点。你将这些节点称为你的对等节点。\n```\n\n\n## 第 7 章：IPFS\
  \ 与 NFT\n\n网络中的每个节点在特定时刻要么是客户端，要么是某条内容。作为用户，您需要负责维护一份对等节点列表，以便整理出可用的清单。在网络的另一端拥有少量熟人（其\
  \ ID 与您自身 ID 相差较大），并在邻近区域拥有大量朋友（其 ID 与您非常相似）。\n\n当请求内容时（无论是您自己需要，还是因对等节点请求），您可以选择将搜索范围限制在那些您熟悉的、且距离内容\
  \ ID 最近的节点上。该请求平均在 `Log(N)` 时间内即可完成。此外，在内容返回过程中，每个节点都会创建一份数据缓存，以便后续搜索时能更快地访问。这些缓存机制非常激进，并且由于数据永不改变，从而降低了网络成本。\n\
  \n之后，您可以通过运行本地节点，或者将内容 ID 传递给现有节点进行路由，从而检索到存储的内容。\n\n## 第 7 章：IPFS 与 NFT\n\n####\
  \ 7.1.2 安装\n\n对于 Windows 系统，请从 [`dist.ipfs.io/#go-ipfs`](https://dist.ipfs.io/#go-ipfs)\
  \ 下载 IPFS 守护进程。\n\n另一种选择是从 [`docs.ipfs.tech/install/ipfs-desktop/`](https://docs.ipfs.tech/install/ipfs-desktop/)\
