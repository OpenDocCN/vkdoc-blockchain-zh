  \n我们可以看到 ISH 代币已被转移到创建者地址，如图 8-3 所示。\n\n#### **图 8-3.** Etherscan 上的部署交易视图\n\n第\
  \ 8 章 `hardhat`\n\n为了调用已部署合约的函数，请在 `Deployments` 目录下创建一个 `invoke.js` 文件。\n\n####\
  \ **清单 8-3.** 调用智能合约函数的代码\n\n```\nasync function main() {\n  const MyContract =\
  \ await ethers.getContractFactory(\"Coin\");\n  const contract = await MyContract.attach(\n\
  \    \"0xc136c20061344B0D6096adB6edd651aaCEFE0D7e\" // 已部署的合约地址\n  );\n  // 现在你可以调用合约的函数\n\
  \  console.log(await contract.balanceOf(\"0xb96aeD3A4e11bBB1C028Ac96420305c803880Cd3\"\
  ));\n}\n\nmain()\n  .then(() => process.exit(0))\n  .catch((error) => {\n    console.error(error);\n\
  \    process.exit(1);\n  });\n```\n\n在 Coin 目录下运行以下命令来调用该函数：\n\n`npx hardhat run\
  \ deployments/invoke.js --network ropsten`\n\n我们会得到以下输出：\n\n`BigNumber { value:\
  \ \"500000\" }`\n\n在 `Deployments` 目录下创建另一个名为 `transfer.js` 的文件，并将清单 8-4 中的代码复制到该文件中。\n\
  \n第 8 章 `hardhat`\n\n#### **清单 8-4.** 转账代币的代码\n\n```\nasync function main() {\n\
  \  const MyContract = await ethers.getContractFactory(\"Coin\");\n  const contract\
  \ = await MyContract.attach(\n    \"0xc136c20061344B0D6096adB6edd651aaCEFE0D7e\"\
  \ // 已部署的合约地址\n  );\n  // 现在你可以调用合约的函数\n  console.log(await contract.transfer(\"\
  0x1A703B299d764B4e28Dc2C7849CFeDF9979D2430\",200));\n}\n\nmain()\n  .then(() =>\
  \ process.exit(0))\n  .catch((error) => {\n    console.error(error);\n    process.exit(1);\n\
  \  });\n```\n\n使用以下命令执行代码：\n\n`npx hardhat run deployments/transfer.js --network\
  \ ropsten`\n\n我们将看到命令的输出，如图 8-4 所示。\n\n![](img/index-184_1.png)\n\n![](img/index-184_2.jpg)\n\
  \n第 8 章 `hardhat`\n\n#### **图 8-4.** 智能合约转账函数调用的 Hardhat 输出\n\n我们可以在 Etherscan 上看到该交易，如图\
  \ 8-5 所示。\n\n`https://ropsten.etherscan.io/tx/0xb86ebde83e168acd22a424f8d1255d317098a2bb57f92e6aa188f324bc2b28b6`\n\
  \n#### **图 8-5.** Etherscan 上的智能合约转账交易视图\n\n我们可以看到，由于使用的小数位数为两位，转账反映的是 2 个 ISH 代币。\n\
  \n现在，我们使用修改后的 `invoke.js` 代码（清单 8-5） 来检查接收方地址的余额。\n\n第 8 章 `hardhat`\n\n#### **清单\
  \ 8-5.** 检查账户余额的代码\n\n```\nasync function main() {\n  const MyContract = await ethers.getContractFactory(\"\
  Coin\");\n  const contract = await MyContract.attach(\n    \"0xc136c20061344B0D6096adB6edd651aaCEFE0D7e\"\
  \ // 已部署的合约地址\n  );\n  // 现在你可以调用合约的函数，我们通过传入接收方地址来调用 balanceOf 函数。\n  console.log(await\
  \ contract.balanceOf(\"0x1a703b299d764b4e28dc2c7849cfedf9979d2430\"));\n}\n\nmain()\n\
  \  .then(() => process.exit(0))\n  .catch((error) => {\n    console.error(error);\n\
  \    process.exit(1);\n  });\n```\n\n现在执行以下命令：\n\n`npx hardhat run deployments/invoke.js\
  \ --network ropsten`\n\n这将输出以下内容：\n\n`BigNumber { value: \"200\" }`\n\n这与我们转给接收方的数量（200\
  \ 个代币）相符。\n\n在 MetaMask 和 Etherscan 中，这显示为 2 个 ISH 代币，因为我们在创建代币时将配置的小数位数设置为两位。\n\
