  \ 的应用服务器来实现。\n\n### 4.6 本章小结\n\n在本章中，我们了解了不同类型的钱包及其工作原理。\n\n我们详细介绍了 MetaMask 钱包的工作方式。我们还了解了网关的工作原理及其在\
  \ `web3` 世界中的用途。\n\n在下一章中，我们将探讨如何使用 Remix IDE（一个基于浏览器的环境）来编译和部署智能合约。\n\n# 第 5 章\n\
  \n# Remix IDE 简介\n\n为了开发智能合约并管理这些合约的生命周期（如编译、测试、部署和更新），我们需要一个集成开发环境 (IDE)。有许多可用的选项。Remix\
  \ IDE 是一个基于 Web 的 IDE（这意味着它不需要安装任何软件）。Remix 配备了一套完整的开发和部署工具，用于开发和管理智能合约的生命周期。\n\n\
  在本章中，我们将向您介绍 Remix IDE，并了解它如何帮助创建和管理智能合约的生命周期。\n\n### 5.1 Remix IDE\n\nRemix IDE\
  \ 提供了一个基于浏览器的环境，用于在区块链网络上创建、编译、测试和部署基于以太坊的智能合约。实际上，使用 Remix IDE 是小菜一碟！在本章中，我们将介绍如何利用它。\n\
  \n\n\n# Remix IDE\n\nRemix IDE 的布局分为不同面板，每个面板都有不同的用途，如图 5-1 所示。\n\n© Shashank Mohan\
  \ Jain 2023\n\nS. M. Jain 著，《Web3 简介》[，https://doi.org/10.1007/978-1-4842-8975-4_5](https://doi.org/10.1007/978-1-4842-8975-4_5#DOI)\n\
  \n![](img/index-99_1.jpg)\n\n**图 5-1.** *展示 Remix IDE 的不同部分*\n\n1. **图标面板** – 显示编译、运行和部署智能合约等功能对应的不同图标。\n\
  2. **侧面板** – 显示文件资源管理器，我们可以在其中创建基于 Solidity 的智能合约。\n3. **主面板** – 专用于编辑文件。我们将在本章后续部分展示示例。\n\
  4. **终端** – 在此处查看各种命令的执行结果。你可以直接从终端运行自定义脚本。\n\n## Remix IDE 入门\n\n我们将逐一介绍构成 Remix\
  \ IDE 的每个组件。我们将创建一个简单的智能合约，然后对其进行编译，并使用 MetaMask 将其部署到 Ropsten 测试网络上。别担心：我们将逐步引导你完成编写智能合约的整个过程。\n\
  \n我们创建的智能合约有两个简单功能：\n1. 设置一条你选择的消息。这将把消息存储在 Ropsten 网络上。\n2. 检索该消息。\n\n要创建这些智能合约，我们需要了解\
  \ Solidity 和 MetaMask，以及 Remix IDE。我们已经在之前的章节中学习了 Solidity 和 MetaMask 的工作原理。现在，让我们开始吧。\n\
  \n通过 Remix IDE 创建任何智能合约至少包含三个基本步骤：\n1. 使用 Solidity 编写智能合约。\n2. 编译合约。\n3. 部署合约。\n\
  \n要创建合约，请导航至 [`remix.ethereum.org/`](https://remix.ethereum.org/) 上的 Remix IDE，如图\
  \ 5-2 所示。\n\n![](img/index-101_1.jpg)\n\n**图 5-2.** *Remix IDE 的主页*\n\n在默认工作区下，我们看到一个名为\
  \ `contracts` 的文件夹。右键单击它，然后单击**新建文件**。\n\n我创建了一个名为 `Test.sol` 的文件，如图 5-3 所示。\n\n\
  ![](img/index-102_1.jpg)\n\n**图 5-3.** *创建一个名为 `Test.sol` 的新文件（`.sol` 是 Solidity\
  \ 的文件扩展名）*\n\n将代码清单 5-1 中的代码复制到右侧窗口中。\n\n***代码清单 5-1.*** *简单智能合约的代码*\n\n```solidity\n\
  pragma solidity 0.8.5;\n\ncontract Test{\n\n    // 用于保存消息的状态变量\n    string private\
  \ message;\n\n    // 将消息初始化为 \"Hello!!\"。\n    constructor() public {\n        message\
  \ = \"Welcome\";\n    }\n\n    /** @dev 用于设置新消息的函数。\n     * @param newMessage 新的消息。\n\
  \     */\n    function setMessage(string memory newMessage) public {\n        message\
  \ = newMessage;\n    }\n\n    /** @dev 用于返回消息的函数。\n     * @return 消息字符串。\n     */\n\
  \    function getMessage() public view returns (string memory) {\n        return\
  \ message;\n    }\n\n}\n```\n\n正如我们所看到的，这会使用 Solidity 语言创建一个名为 `Test` 的合约。该合约有两个函数：\n\
  1. `setMessage()`\n2. `getMessage()`\n\n## 编译合约\n\n现在是时候编译合约了，如图 5-4 所示。\n\n![](img/index-104_1.jpg)\n\
  \n**图 5-4.** *通过单击**编译**按钮（红色圆圈所示）来编译 `Test.sol` 文件*\n\n单击突出显示的红色按钮。我们将看到如图 5-5\
  \ 所示的屏幕。\n\n![](img/index-105_1.jpg)\n\n**图 5-5.** *智能合约的编译画面*\n\n单击**编译 Test.sol**\
