  \ 5-19 所示。\n\n![](img/index-117_1.png)\n\n**第 5 章 Remix IDE 简介**\n\n***图 5-19.**\
  \ Etherscan 上智能合约函数调用交易的视图*\n\n关于刚刚展示的数字，有几点需要记住。\n\n交易所使用的 Gas 数量以每笔交易消耗的 Gas 单位来计量。而这一数量反映了交易的复杂程度。它取决于智能合约所使用的操作数量以及存储空间大小。\n\
  \n你愿意为每个 Gas 单位支付的价格被称为每单位 Gas 价格。你的交易将因此以不同的速度被处理。这一过程被称为优先 Gas 拍卖（PGA），这意味着所有交易都在参与一场拍卖，以决定哪些矿工将有机会将他们的交易纳入即将被挖掘的区块中。\n\
  \n用于支付交易费用的 ETH 金额通过以下公式计算：\n\n`交易费用 = 消耗的 Gas 单位 × 每单位 Gas 价格`\n\n**第 5 章 Remix\
  \ IDE 简介**\n\n通过点击 `getMessage` 按钮调用 `getMessage` 函数，在 Remix IDE 控制台中会得到以下输出：\n\n\
  ```\n{\n  \"0\": \"string: hello Web3\"\n}\n```\n\n这正是我们在链上设置的消息。\n\n### 5.2 创建自己的代币\n\
  \n现在，凭借对 Solidity、MetaMask 和 Remix 的了解，我们将转向以太坊区块链上一个更具体的应用示例。\n\n你可能曾无数次幻想并渴望拥有自己的加密货币。随着\
  \ ERC-20 标准的发展，创建自己的代币并非难事。我们将在本节中详细探讨。\n\nERC 是“以太坊征求意见稿”的缩写，其中的数字 20 是提案的标识符。ERC-20\
  \ 的开发旨在改进 ETH 网络。\n\nERC-20 是在以太坊区块链上为去中心化应用创建代币的标准。所有基于以太坊的代币都必须遵循 ERC-20 标准，该标准为创建这些代币提供了一套规则。\n\
  \n根据 ERC-20 的定义，代币是基于区块链的资产，可以发送和接收，并具有价值。在很大程度上，ERC-20 代币类似于比特币和莱特币等加密货币，区别在于 ERC-20\
  \ 代币仅在以太坊区块链网络上运行。\n\n在 ERC-20 标准制定之前，任何想要创建自己代币的人都必须从零开始，这导致了大量不同类型代币的出现。之所以如此，是因为当时没有开发新代币的具体指南或结构。添加新型代币要求钱包和交易平台的开发者阅读并理解每种代币的源代码，然后才能在其各自平台上使用这些代币。这是一个尤为艰巨的过程。不言而喻，在任何程序中集成新代币都相当具有挑战性。钱包可以集成基于\
  \ ERC-20 的代币到其平台，并允许通过这些应用使用此类代币。ERC-20 代币标准几乎使得不同代币之间的交互变得简单且无缝。\n\n该标准规定了智能合约必须实现的九个功能，以及三个可选实现的功能，其中包括：\n\
  \n- `totalSupply` – 该函数指定了该代币的总供应量。一旦达到最大容量，便无法再生成更多的代币。\n\n\n\n- `balanceOf` –\
  \ 此函数在调用时返回特定钱包的余额。我们将展示如何从 Remix IDE 调用它。\n- `transfer` – 此函数将代币转移到特定地址。在这种情况下，代币从发送者地址中扣除。\n\
  - `transferFrom` – 此函数将代币从一个用户地址转移到另一个用户地址。这里，供应中的可用代币数量保持不变，但这是两个账户之间的转移。\n- `approve`\
  \ – 此函数根据代币的总量，判断智能合约是否允许向用户分配特定数量的代币。\n\n## 第 5 章 Remix IDE 简介\n\n- `allowance`\
  \ – 此函数检查转让人地址是否有足够的代币可转移给受让人。\n\n简单来说，`ERC-20` 提供了允许在以太坊区块链上创建代币的规范或接口。\n\n打开 Remix\
  \ IDE，在 `Contract` 目录下创建一个文件，并将其命名为 `Jain.sol`。\n\n将代码从 `Listing 5-2` 复制到文件 `Jain.sol`\
  \ 中。\n\n***Listing 5-2.*** 基于 ERC-20 规范创建自定义代币的代码\n\n```solidity\n// this is the\
  \ ERC-20 interface which we will implement to create our own coin\n\npragma solidity\
  \ 0.8.5;\n\ninterface ERC20Interface {\n\n    function totalSupply() external view\
  \ returns (uint);\n\n    function balanceOf(address tokenOwner) external view returns\
  \ (uint balance);\n\n    function allowance(address tokenOwner, address spender)\
  \ external view returns (uint remaining);\n\n    function transfer(address to, uint\
  \ tokens) external returns (bool success);\n\n    function approve(address spender,\
  \ uint tokens) external returns (bool success);\n\n    function transferFrom(address\
  \ from, address to, uint tokens) external returns (bool success);\n\n    event Transfer(address\
  \ indexed from, address indexed to, uint tokens);\n\n    event Approval(address\
  \ indexed tokenOwner, address indexed spender, uint tokens);\n\n}\n```\n\n## 第 5\
  \ 章 Remix IDE 简介\n\n```solidity\n// implementation code for ERC20 interface\n//here\
  \ we create a smart contract named JainToken\n\ncontract JainToken is ERC20Interface\
  \ {\n\n    string public myTokenSymbol;\n    string public myTokenName;\n    uint8\
  \ public tokenDecimals;\n    uint public _totalSupplyOfToken;\n\n    mapping(address\
  \ => uint) tokenBalances;\n    mapping(address => mapping(address => uint)) allowed;\n\
  \n    //this is where we initialize our token with total supply, name etc\n    constructor()\
  \ public {\n        myTokenSymbol = \"JAIN\";\n        myTokenName = \"Shashank\
  \ Jain Coin\";\n        tokenDecimals = 2;\n        _totalSupplyOfToken = 200000;\n\
  \        tokenBalances[msg.sender] = _totalSupplyOfToken;\n        emit Transfer(address(0),\
  \ msg.sender, _totalSupplyOfToken);\n    }\n\n    // function to return the supply\
  \ at any point in time.\n    function totalSupply() public override view returns\
  \ (uint) {\n        return _totalSupplyOfToken - tokenBalances[address(0)];\n  \
  \  }\n\n    //function to check balance of tokens at a specific address\n    function\
  \ balanceOf(address tokenOwner) public override view returns (uint balance) {\n\
  \        return tokenBalances[tokenOwner];\n    }\n```\n\n## 第 5 章 Remix IDE 简介\n\
  \n```solidity\n    // function for transferring tokens to a specific address.\n\
  \    function transfer(address to, uint tokens) public override returns (bool success)\
  \ {\n        //checks if there is enough balance in the sender address\n       \
  \ require(tokens <= tokenBalances[msg.sender]);\n        //deduct tokens from the\
  \ sender\n        tokenBalances[msg.sender] = tokenBalances[msg.sender]-tokens;\n\
  \        // add tokens to the recipient address\n        tokenBalances[to] = tokenBalances[to]\
  \ + tokens;\n        // once transfer is done emit a message\n        emit Transfer(msg.sender,\
  \ to, tokens);\n        return true;\n    }\n\n    function approve(address spender,\
  \ uint tokens) public override returns (bool success) {\n        allowed[msg.sender][spender]\
  \ = tokens;\n        emit Approval(msg.sender, spender, tokens);\n        return\
  \ true;\n    }\n\n    // this is same as approve but here we can specify from address\
  \ which can be different from message sender\n    function transferFrom(address\
  \ from, address to, uint tokens) public override returns (bool success) {\n    \
  \    require(tokens <= tokenBalances[from]);\n        tokenBalances[from] = tokenBalances[from]-tokens;\n\
  \        require(tokens <= allowed[from][msg.sender]);\n```\n\n\n\n`allowed[from][msg.sender]\
  \ = allowed[from][msg.sender] - tokens;`\n\n## 第 5 章：Remix IDE 简介\n\n```solidity\n\
  uint c = 0;\nc = tokenBalances[to] + tokens;\nrequire(c >= tokenBalances[to]);\n\
  emit Transfer(from, to, tokens);\nreturn true;\n}\n\n// 检查代币拥有者是否被授权进行转账\nfunction\
  \ allowance(address tokenOwner, address spender) public override view returns (uint\
  \ remaining) {\n    return allowed[tokenOwner][spender];\n}\n\nfallback() external\
  \ payable {\n    revert();\n}\n```\n\n该代币的名称为 Shashank Jain Coin，其符号为 JAIN。我们将供应量固定为\
