- "# 排版后的内容\n\n各类请求类型的有效性，以及更多其他内容。这些洞察使开发者能够通过更深入地了解应用程序的用户来改进他们的程序。此外，Infura 以太坊\
  \ API 既兼容测试网也兼容主网，并且使用通过 HTTPS 和 WSS 传输的、与客户端兼容的 JSON-RPC。用户还可以获得作为附加功能提供的以太坊存档节点数据的访问权限。\n\
