  \n### 7.4 本章小结\n\n在本章中，我们了解了 IPFS，即星际文件系统。我们探讨了如何通过 IPFS 上传和检索内容。\n\n接着，我们探索了关于创建\
  \ NFT 的 ERC-721 规范。我们使用 Remix 和 IPFS 创建了一个简单的 NFT。\n\n在下一章中，我们将简要了解另一个用于智能合约生命周期的框架，即\
  \ `Hardhat`。\n\n## 第 8 章：Hardhat\n\n在前面的章节中，我们已经了解了如何使用 Remix IDE 和 `Truffle` 管理基于以太坊的智能合约生命周期。现在我们将学习另一个名为\
  \ `Hardhat` 的框架，它同样可用于管理智能合约的生命周期。该生命周期包括创建、编译、测试和部署合约等任务。\n\n你可以在 `Hardhat` 的全程辅助下创建智能合约。它在测试已实现的合约以及开发\"\
  未来假设\"时也能提供极大的帮助。\n\n### 8.1 Hardhat 框架的安装\n\n从以下链接安装 `node.js`（版本 16.16.0）：`https://nodejs.org/en/download/`\n\
  \n以下步骤会附带安装 `npm` 8.11.0：\n\n使用 `npm` 安装 `hardhat`：\n\n```\nnpm install -d hardhat\n\
  ```\n\n### 8.2 Hardhat 工作流程\n\n在此阶段，合约将进行编码并接受测试。由于你需要测试每一行代码，编写智能合约和测试代码通常是同步进行的。`Hardhat`\
  \ 在这方面表现尤为出色，因为它提供了许多用于测试和优化代码的出色插件。\n\n在部署步骤中，你首先需要编译代码，这涉及将 Solidity 代码转换为字节码。接着，你将在部署前对代码进行优化。`Hardhat`\
  \ 提供了大量优秀的插件。\n\n现在 `Hardhat` 已成功安装，让我们开始一个全新的 `Hardhat` 项目。我们将使用 `npx` 来完成。`npx`\
  \ 有助于处理 `node.js` 的可执行文件。\n\n创建一个名为 `coin` 的项目目录：\n\n```\nmkdir coin\ncd coin\n\
  ```\n\n使用命令：\n\n```\nnpx hardhat\n```\n\n***图 8-1.** Hardhat 安装*\n\n安装以下依赖项：\n\n\
  ```\nnpm install --save-dev @nomiclabs/hardhat-ethers ethers @nomiclabs/hardhat-waffle\
  \ ethereum-waffle chai\n```\n\n切换到 `coin` 目录：\n\n```\ncd coin\n```\n\n我们将从创建合约开始。\n\
  \n在 `coin` 目录内创建一个名为 `Contracts` 的目录，并将清单 8-1 中的文件复制到 `contracts` 目录中。\n\n***清单\
  \ 8-1.** 代币合约代码*\n\n```\n// SPDX-License-Identifier: LGPL-3.0-only\npragma solidity\
  \ 0.8.15;\n\ninterface ERC20Interface {\n    function totalSupply() external view\
  \ returns (uint);\n    function balanceOf(address tokenOwner) external view returns\
  \ (uint balance);\n    function allowance(address tokenOwner, address spender) external\
  \ view returns (uint remaining);\n    function transfer(address to, uint tokens)\
  \ external returns (bool success);\n```\n\n\n\n```solidity\nfunction approve(address\
  \ spender, uint tokens) external returns (bool success);\n\nfunction transferFrom(address\
  \ from, address to, uint tokens) external returns (bool success);\n\nevent Transfer(address\
  \ indexed from, address indexed to, uint tokens);\n\nevent Approval(address indexed\
  \ tokenOwner, address indexed spender, uint tokens);\n\n}\n\ncontract Coin is ERC20Interface\
  \ {\n\nstring public tokenSymbol;\n\nstring public tokenName;\n\nuint8 public tokenDecimals;\n\
  \nuint public _totalSupplyOfToken;\n\nmapping(address => uint) tokenBalances;\n\n\
  mapping(address => mapping(address => uint)) allowed;\n\n//这里我们用总供应量、名称等来初始化代币\n\
  \nconstructor() public {\n\ntokenSymbol = \"ISH\";\n\ntokenName = \"Isha Jain Coin\"\
  ;\n\ntokenDecimals = 2;\n\n_totalSupplyOfToken = 500000;\n\ntokenBalances[msg.sender]\
  \ = _totalSupplyOfToken;\n\nemit Transfer(address(0), msg.sender, _totalSupplyOfToken);\n\
  \n}\n\n// 用于随时返回供应量的函数。\n\nfunction totalSupply() public override view returns (uint)\
  \ {\n\nreturn _totalSupplyOfToken - tokenBalances[address(0)];\n\n}\n\n//用于检查特定地址代币余额的函数\
  \  \nfunction balanceOf(address tokenOwner) public override view returns (uint balance)\
  \ {\n\nreturn tokenBalances[tokenOwner];\n\n}\n\n// 用于将代币转移到特定地址的函数。\n\nfunction\
  \ transfer(address to, uint tokens) public override returns (bool success) {\n\n\
  //检查发送方地址是否有足够的余额  \nrequire(tokens <= tokenBalances[msg.sender]);\n\n//从发送方扣除代币\n\
  \ntokenBalances[msg.sender] = tokenBalances[msg.sender] - tokens;\n\n//向接收方地址添加代币\n\
  \ntokenBalances[to] = tokenBalances[to] + tokens;\n\n//转账完成后发出消息\n\nemit Transfer(msg.sender,\
  \ to, tokens);\n\nreturn true;\n\n}\n\nfunction approve(address spender, uint tokens)\
  \ public override returns (bool success) {\n\nallowed[msg.sender][spender] = tokens;\n\
  \nemit Approval(msg.sender, spender, tokens);\n\nreturn true;\n\n}\n\n// 这个函数与 approve\
  \ 类似，但此处我们可以指定一个与消息发送者不同的 from 地址\n\nfunction transferFrom(address from, address\
  \ to, uint tokens) public override returns (bool success) {\n\nrequire(tokens <=\
  \ tokenBalances[from]);\n\ntokenBalances[from] = tokenBalances[from] - tokens;\n\
  \nrequire(tokens <= allowed[from][msg.sender]);\n\nallowed[from][msg.sender] = allowed[from][msg.sender]\
  \ - tokens;\n\nuint c = 0;\n\nc = tokenBalances[to] + tokens;\n\nrequire(c >= tokenBalances[to]);\n\
  \nemit Transfer(from, to, tokens);\n\nreturn true;\n\n}\n\n// 检查 tokenOwner 是否被授权进行转账\
  \  \nfunction allowance(address tokenOwner, address spender) public override view\
  \ returns (uint remaining) {\n\nreturn allowed[tokenOwner][spender];\n\n}\n\nfallback()\
  \ external payable {\n\nrevert();\n\n}\n\n}\n```\n\n# 第 8 章 hardhat\n\n### 8.3 智能合约的部署\n\
  \n在 `Coin` 目录下创建一个名为 `hardhat.config.js` 的文件，内容如下：\n\n```javascript\n/** @type import('hardhat/config').HardhatUserConfig\
  \ */\n\nrequire(\"@nomiclabs/hardhat-ethers\")\nrequire(\"@nomiclabs/hardhat-waffle\"\
  )\n\nmodule.exports = {\n  solidity: \"0.8.9\",\n  networks: {\n    ropsten: {\n\
  \      url: \"https://ropsten.infura.io/v3/<<你的 infura 项目 ID>>\",\n      accounts:\
  \ {\n        mnemonic: \"<<你的助记词>>\",\n        path: \"m/44'/60'/0'/0\",\n     \
  \   initialIndex: 0,\n        count: 20,\n        passphrase: \"\",\n      },\n\
  \    },\n  },\n};\n```\n\n在 `Coin` 目录下创建一个名为 `Deployments` 的目录。\n\n创建一个名为 `deployToken.js`\
  \ 的文件，并从清单 8-2 中复制代码。\n\n***清单 8-2.*** 部署代码\n\n```javascript\nasync function main()\
  \ {\n  const Coin = await ethers.getContractFactory(\"Coin\");\n  const coin = await\
  \ Coin.deploy();\n  await coin.deployed();\n  console.log(\"Coin deployed to:\"\
  , coin.address);\n}\n\nmain()\n  .then(() => process.exit(0))\n  .catch((error)\
  \ => {\n    console.error(error);\n    process.exit(1);\n  });\n```\n\n使用以下命令将合约部署到\
  \ Ropsten 网络：\n\n```bash\nnpx hardhat run deployments/deployToken.js --network Ropsten\n\
  ```\n\n我们将看到如图 8-2 所示的输出。\n\n\n\n#### **图 8-2.** 使用 `hardhat` 部署基于 ERC-20 标准代币的输出结果\n\
  \n该合约可在 Etherscan 上通过以下 URL 查看：\n\n`https://ropsten.etherscan.io/address/0xc136c20061344B0D6096adB6edd651aaCEFE0D7e`\n\
