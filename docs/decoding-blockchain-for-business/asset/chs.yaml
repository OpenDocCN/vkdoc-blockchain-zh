- "# 1. 商业中的区块链\n\n## 关于过去的一点简述\n\n虽然本书着眼于未来，但理解过去对你来说依然至关重要。过去曾有一些“实验”，例如由戴伟（Wei\
  \ Dai）于 1998 年发布的一种加密货币——`B-money`。（比特币甚至以 `B-money` 命名，其重要性可见一斑。）甚至在 `B-money`\
  \ 出现之前，大卫·乔姆（David Chaum）就在 1983 年创建了 `ecash`。人们往往认为寻求真正“数字”货币是近年之事，但自从互联网问世以来，人们就一直在寻找安全实施数字货币的方法。区块链正是源于这种追求。植根于安全性的技术（例如\
  \ `hashcash`）以及点对点网络的概念（我们从诸如 `Napster` 和 `BitTorrent` 这样的文件共享应用中熟知此概念），也都是最终促成区块链技术的关键部分。\n\
  \n开启整个区块链革命之人的真实姓名至今不为人知。我们只知道他/她/他们自称“中本聪”。2008 年，中本聪发表了一篇白皮书，题为：“Bitcoin: A Peer-to-Peer\
  \ Electronic Cash System”（比特币：一种点对点的电子现金系统）。该论文提出了一种替代方案，用以解决计算机科学中著名的拜占庭将军问题以及经济学领域中更为人熟知的双重支付问题。拜占庭将军问题指的是：当多方发送消息，而其中一方或多方已变得不可靠时，我们如何知道某条信息是真实的？我们该信任谁？又如何知道谁在撒谎？双重支付问题则是围绕数字货币的一个经典案例。实体货币只能花一次，但如何防止数字货币被重复花费呢？\n\
  \n结合早期技术，中本聪引入了一个新概念：一种`工作量证明算法`，它允许分布式计算机系统接受交易，这与所有早期解决方案截然不同——后者或多或少都需要一个中央权威来接受交易或创造货币。共识是该论文的核心；即网络成员之间的共识。当你思考区块链的出现时，应该考虑的主要概念是“不信任”。比特币诞生于政治和金融动荡的时期，当时\
  \ 2008 年金融危机正在全球蔓延。这种不信任的对象是任何可能腐败或变得“大而不倒”的中央实体。区块链恰好可以解决这个问题，因为其整个系统建立在“不信任对方”的基础上。你无需信任他们，也无需某个公正的第三方来验证其他参与者。网络本身会确保每个参与者遵守规则，否则最终将被网络淘汰。最后一句话听起来可能有点苛刻，但这正是需要理解的核心概念。\n\
  \n\n\n一年后，比特币网络才正式问世。第一个区块被挖出（这就是所谓的**创世区块**，标志着网络的诞生）。这个区块创造了最初的 50 个比特币，但它们完全无法使用！其创建者在区块中隐藏了一条信息：“The\
  \ Times 03/Jan/2009 Chancellor on brink of second bailout for banks.” 这证实了该技术及整个加密货币网络的核心理念。当然，多年来，许多程序员对该实现进行了修订。中本聪仅在\
  \ 2011 年前参与了开发，之后便从公众视野中隐退。社区不仅需要维护网络，还要定期更新它。这意味着，共识不仅存在于网络算法内部，也存在于网络周围的社区中。正如你之后会发现的，技术内部的共识被证明比社区内部的共识更可靠。多年来，比特币网络不断壮大（毫无疑问，它已发展成为一个巨大的市场）。但这种增长不可能一帆风顺，其他竞争者纷纷进入市场。\n\
  \n在随后的几年里，**山寨币**或替代加密货币开始出现，例如莱特币、域名币等。所有这些币种都与比特币拥有相同的代码库，但试图加入自己关于加密货币应有形态的见解。有些试图增强隐私性；有些则试图增加每个新区块产生的加密货币数量、增加交易数量等等。但底层模型基本保持不变。尽管世界各国政府都清楚加密货币的发展，但直到\
  \ 2013 年，才有一个政府采取行动。美国当局冻结了与加密货币交易所`Mt. Gox`相关的所有账户，因为它未注册为资金传输机构。这开启了许多关于区块链技术和加密货币法律语境误解的开端。相关研究随之展开，但要真正提供一个法律框架仍需数年时间。时至今日，许多政府仍在努力创建一个可供个人和企业使用的实际框架。\n\
  \n比特币和其他山寨币开始面临的问题之一是与毒品贩运和恐怖主义的关联。早在 2013 年，比特币就在一次毒品调查中被查获，并且直到今天，仍有怀疑认为某些山寨币（尤其是那些注重隐私的）被用于资助犯罪活动。如今，加密货币交易所需要遵守与任何其他金融机构相同的法律，包括`KYC`（了解你的客户）法规和`AML`（反洗钱）法规。\n\
  \n除了与犯罪活动的关联外，比特币及类似网络还存在另一个主要问题。它们通过网络间的交互消耗了大量的计算能力。然而，事实证明，在比特币网络上开发应用程序（极其）困难。时至今日，开发人员仍在努力寻找利用计算能力构建强大且可信的去中心化应用程序的新方法。其中一位正在开发比特币应用程序的开发人员是一位名叫维塔利克·布特林的\
  \ 19 岁程序员，他即将改变世界。他看到了区块链技术的潜力，并意识到其潜力可能远超加密货币和金融服务本身。\n\n2013 年底，维塔利克·布特林发表了他的白皮书（《下一代智能合约与去中心化应用平台》），描述了一种新的工作方式和一种新的开源协议。他想要解决的主要问题是比特币没有用于帮助创建去中心化应用的脚本语言。由于在比特币社区内难以达成普遍共识，他提出了一个全新的平台：**以太坊**。该平台于\
  \ 2014 年 1 月在迈阿密举行的北美比特币大会上正式宣布。很快，创始人决定将该平台及其开发置于一个非营利组织（以太坊基金会）之下。开发工作将通过一种名为**以太币**的新加密货币的众售来资助。在以太坊黄皮书中，加文·伍德详细阐述了将智能合约放入区块链的理念，该黄皮书描述了以太坊虚拟机。\n\
  \n2014 年 7 月，以太坊基金会举行了一次以太币众售，售出了超过 6000 万个代币。基金会还创建了约 1200 万个代币用于资助未来的开发和营销工作。该网络的第一个版本在一年后发布，名为**前沿**。后续的每一次开发都伴随着新的名称和版本，这证明了网络不断演进的历程。\n\
  \n随着时间的推移，越来越多的参与者带着各自对区块链技术或分布式账本平台的实现进入了这个领域，这些实现专注于特定的目标群体（例如，开发者甚至商业专业人士）或行业（例如，金融服务等）。其热度在随后的几年里不断攀升，并在\
  \ 2018 年左右达到顶峰，此后则经历了一次大幅崩盘。与此同时，大约在 2015 年，`Hyperledger`项目诞生，可以说，它整合了当今企业区块链领域一些最著名的开发框架。目前已有超过\
  \ 6000 种山寨币被创造出来，它们（大致）仍在运行。\n\n\n\n### 加密货币崩盘\n\n本节探讨加密货币崩盘（也称为比特币崩盘或大型加密货币崩盘）。2018\
  \ 年 1 月发生了一场大规模抛售，导致比特币价值暴跌约 65%。许多其他加密货币崩盘得更为惨烈，有些甚至完全从市场上消失。当然，要出现崩盘，首先必须有一定程度的繁荣。在\
  \ 2017 年之前的几年里，比特币和其他加密货币的价值一直在稳步增长。2017 年，加密货币及其价值经历了前所未有的繁荣。所有主要机构和投资者似乎都参与了加密货币市场，结果便是比特币在\
  \ 2017 年价值增长了 2700%！\n\n这导致许多小额投资者对加密货币产生了兴趣，其中一些人希望进入加密货币市场并承担巨大风险。这吸引了许多诈骗者，他们想利用轻信的投资者或那些想快速致富的人，就像早期加密货币市场中其他人所做的那样。由于缺乏明确的法律框架，大量首次代币发行（ICOs）被启动，聚集了大大小小的投资者，最终导致了资金滥用和盗窃。\n\
  \n对于那些不熟悉 ICO 术语的人来说，这是一种使用加密货币的融资方式。如果融资目标达成并且项目最终成功（这是一个很大的“如果”），这些加密货币可以成为功能性货币单位。举个例子，在\
  \ 2017 年和 2018 年，所有 ICO 中只有大约一半能够存活超过四个月，而仅在 2018 年上半年，通过 ICO 筹集的资金就超过了 70 亿美元！其他骗局涉及“拉高出货”\
  \ scenario，即几个人相互之间进行交易，以制造市场兴趣和价值的假象。其他投资者也会投资这种山寨币，之后最初的参与者会开始抛售他们持有的资产，让投资者手中的币变得一文不值。\n\
  \n最后一个需要考虑的重要方面是，大多数推出的山寨币都基于初创公司。众所周知，初创公司也往往会失败，它们推出的加密货币也随之消亡。所有这些都创造了一个极其动荡的市场，投资者认为自己比其他人更聪明，或者能再多坚持一会儿。尽管警告不断预测会出现重大泡沫，但这并没有阻止大多数投资者。\n\
  \n为了让您了解时间线，2017 年 12 月 17 日，比特币价格达到了 19,783.06 美元。几天后的 12 月 22 日，价格跌破 11,000 美元，这只是众多跌至历史低点的加密货币之一。坏消息并未停止，关于韩国可能禁止加密货币交易的传言导致了更多抛售。2018\
  \ 年 1 月 28 日，当时日本最大的加密货币场外交易市场（OTC 市场，买卖双方直接互动）CoinCheck 遭受重大黑客攻击，导致价值 5.3 亿美元的\
  \ NEM（一个基于 Java 的区块链开发平台）损失。其他加密货币交易所也遭受黑客攻击和出现异常交易，导致市场更加不信任，投资者寻求从高度动荡的加密货币市场中逃离。到\
  \ 2018 年 9 月，加密货币市场的市值已跌至其原始价值的不到 80%。这使得其正式比互联网泡沫破裂更严重，后者导致互联网相关公司的市值从 2000 年 3\
  \ 月的峰值下跌至 2002 年 10 月的低点，跌幅约为 78%。\n\n现在您知道了这个故事，或者至少是其中的一部分。像这样的故事有许多不同的视角需要考虑。我希望您记住的最重要的一点是，这些问题都与区块链技术本身无关。某些项目可能因为实施不当而与特定初创公司一起失败。与任何技术和应用程序一样，错误都可能发生。再次强调，这并不意味着底层技术存在问题。相反，这可能是由于人们不理解技术或不知道应该如何实施一个区块链项目。\n\
  \n崩盘的原因在很大程度上是金融层面的，就像任何泡沫一样，但对区块链技术的审视却从未停止。这意味着人们对分布式账本变得非常怀疑，他们不去探究该技术的可能性，反而宣称自己已经失去了“信念”，并质疑为什么还应该“继续相信”。正如我所说，质疑是否应该实施区块链平台是有理由的，但质疑底层概念不应成为理由之一。\n\
  \n### 现在\n\n加密货币崩盘导致了极大的不信任。自那次重大崩盘以来，过去几年里又发生了其他崩盘。加密货币领域也出现了其他丑闻。（稳定币 Tether 就是一个典型例子。在四年多的时间里，一直存在关于其与美元平价的丑闻。审计问题、独立性问题、价格操纵指控等等层出不穷。我们将在最后一章更详细地讨论这个问题。）尽管如此，那些真正想用区块链做点什么的人并没有袖手旁观，他们已经在开发令人兴奋的新应用方面采取了措施。所有这些都催生了一个完整的行业，新的开发者和架构师在新的\
  \ IT 格局中占据了更突出的位置。Facebook 正试图通过创建 Libra 来推出自己的代币，其他大型支付提供商也在试图进入这个市场。随着 Ripple\
  \ 等项目正在改变整个行业，无论好坏，区块链和加密货币都将长期存在。\n\n区块链世界已经变得比我们预测的都要大得多，并且在持续增长。有像比特币和以太坊这样的“经典”开源实现。目前也有像\
  \ Hyperledger Fabric 和 Hyperledger Sawtooth 这样的“封闭式”实现，它们允许您在选定的合作伙伴群体之间创建联盟。然而，如果您遇到\
  \ DAG（有向无环图）、MerkleDAG、BlockDAG 等术语，请不要感到惊讶。这些都是实现去中心化网络的令人兴奋的新方法，它们都希望达到与区块链技术相同的最终目标。我们将在稍后提供高层次描述，让您了解这些方法的工作原理，以及您在哪个行业可能采用或实现某个特定平台。现在，我们专注于该技术的可能性。我们也会更深入地探讨一下加密货币市场，但这当然不是本书的目的。\n\
  \n近期，我们面临一场全球危机，一场大流行病使许多国家陷入困境，迫使我们生活在隔离之中。与此同时，还伴随着世界历史上无与伦比的经济危机。许多项目被终止或至少被搁置，很多人甚至（暂时）失业。在这样的时期，人们被推向极限，不仅要保持安全，还要维持生活水平。也正是在这样的时期，人们变得最有创造力，有些人甚至敢于承担通常不会承担的风险。如果在未来几个月出现新的应用和初创公司（不仅在区块链技术领域），并且它们以对现有问题的新颖见解震惊世界，我一点也不会感到惊讶。\n\
  \n\n\n## 区块链初创企业与未来图景\n\n在深入探讨区块链技术的工作原理之前，我们先简要介绍一下区块链初创企业以及区块链技术的应用现状。这也能让你清楚地了解其市场价值是如何随时间增长的，并一窥人们正在推进的落地项目数量。人们常说的一句话是：“除了加密货币，我没见过区块链任何可用的实际案例。”那么，让我们来证明这种说法是错误的。即便是最持怀疑态度的人，也无法对利用区块链技术的初创企业浪潮视而不见。虽然早期的初创企业主要源于金融领域，但如今它们已扩展到你能想象到的每一个行业。据国际数据公司估算，区块链市场在\
  \ 2019 年的总价值已达 25.5 亿美元，并预计到 2025 年将达到 555.4 亿美元。当前的经济危机可能会对 2020 年乃至未来几年的增长产生重大影响，但任何看到这些数字的人都应清楚，我们面对的是一个重要且不断增长、前景广阔的市场。SAP、可口可乐、阿里巴巴等许多大型企业也已实施过区块链项目。\n\
  \n另一个需要关注的重要方面是，初创企业的分布以及区块链技术在全球范围内的应用。显而易见，领先的创新主要来自美国和东方国家。这并不令人意外。美国一直是创新与变革的源泉，这里的人们敢于冒险。许多新初创企业（也包括区块链领域之外的）在美国诞生并蓬勃发展。然而，我们不应低估中国、日本、韩国、新加坡、台湾等国家和地区的影响，这些地方的科技创新和整个\
  \ IT 行业都经历了前所未有的增长。这些国家和地区的研究、创新和冒险精神不断提升，从而与世界各地的其他科技公司展开了激烈竞争。\n\n在考察全球初创企业数量时，我们可以参考道琼斯旗下\
  \ Venture Source 的数据，以了解全球主要参与者[A]、欧盟成员国[B]以及世界其他地区[C]的相关信息，如图 1-1 所示。\n\n![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig1_HTML.jpg](img/497553_1_En_1_Fig1_HTML.jpg)\n\
  \n图 1-1\n全球区块链初创企业分布^(¹)\n\n从这些数据来看，美国的区块链初创企业数量最多，其次是中国。欧盟仅占全球初创企业总数的约 15%。考虑到其中约\
  \ 50%位于英国，而英国脱欧在即，这一比例将进一步下降。欧盟正努力进一步刺激创新和创业。数量偏低的原因与区块链技术相关的法律不确定性、分散的法律体系以及政治层面难以决策有关。此外，在商业风险承担方面，这里的环境更为严苛。在美国，商业失败被视为“一次有益的尝试”，是迈向下一次可能成功的尝试，而在许多欧盟成员国，商业失败仅仅被视为失败。\n\
  \n从图 1-1 中得出的一个重要结论是，这些初创企业大多在发达国家蓬勃发展，而它们在众多领域为发展中国家带来的潜在优势也不容小觑。然而，这些公司的影响力会随时间发生巨大变化，发展中国家在未来有可能跃居榜首。2018\
  \ 年进入市场的新初创企业数量大幅下降（仅中国出现增长）。这是否标志着一种真正的趋势，还是仅是暂时性的下降，仍有待观察。见图 1-2。\n\n![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig2_HTML.jpg](img/497553_1_En_1_Fig2_HTML.jpg)\n\
  \n图 1-2\n初创企业总数。来源：道琼斯旗下 Venture Source\n\n这些初创企业大多通过资本基金和 ICO（首次代币发行）融资，这对于了解该行业和领域的人来说并不意外。难题往往在于如何在初始融资活动后盈利赚钱。事实证明，这对许多此类项目来说相当困难。纯区块链市场盈利能力有限的原因可能有几点。一是区块链应用难以成为主流并吸引巨大市场。大多数去中心化应用的参与者和用户已经熟悉了去中心化的世界。这很奇怪，因为从用户角度来看，区块链应用与其他应用并没有本质区别。其中一些应用仍有可能实现市场渗透，但迄今为止，这种渗透非常有限。\n\
  \n第二个从一开始就困扰区块链项目的问题是扩展性。这些项目在达到一定规模前运行良好，但尤其是在较“经典”的实现中，一旦用户数量开始增加，交易费用就会大幅上涨，或者网络开始变得拥堵。同样，新的实现能够（部分）解决这些问题，并且扩展性大大提高。尽管如此，早期的这些担忧至今仍伴随着区块链初创企业。\n\
  \n第三个需要考虑的问题是，项目往往停留在某种试点阶段。即使这些初创企业提供或创建了某些平台，并能够为大型客户开展试点，但这些客户通常不会迈出下一步。原因可能是他们误解了平台的用途、工作方式，或者仅仅因为变革不是当务之急。与此相关的一个主要问题是，要使这样一个项目成功，需要多个愿意进行变革的合作伙伴的投入。如果你只是唯一一个尝试新工作方式的人，区块链项目永远不会成功。因此，你需要依赖多个独立方，这使得成功实施变得更加困难。\n\
  \n我们需要将这一点与大型企业中的区块链项目实施区分开来。在这些大型企业中，我们已经看到，由于此类平台的实施方式，它们可以带来显著的成本削减。同时，共同在网络上合作的合作伙伴之间的信任度也可能提高，这得益于透明度以及消除了可能随时间变得腐败或需要维护成本的第三方。\n\
  \n\n\n## 区块链投资趋势与技术基础\n\n根据 IDC 的数据，全球在区块链用例和概念验证上的支出将在 2021 年达到约 18 亿美元，这对应于 2016\
  \ 年至 2021 年间 66.6%的年复合增长率。尽管如此，大部分支出仍由银行业主导，其将占总支出的 47%。这并不令人惊讶，因为区块链技术的本质始于金融行业（或作为对其的反抗）。紧随其后的是分销和服务业（占总投资的\
  \ 22%），区块链技术已被证明是有效管理供应链流程的绝佳替代方案。其他有重大投资的行业包括制造业和资源业（19%）、基础设施业（6%）以及公共部门。\n\n\
  区块链已被证明是一个有趣且成功的工具，可以帮助企业改造低效流程。技术本身是一个重要驱动力，但由于新应用程序的实施，人们和企业往往能够跳出固有思维模式，真正改变他们的工作方式。因此可以想象，区块链的实施可能对任何组织产生重大影响。这不仅是因为平台本身，还因为人们敢于摆脱经典模式、思考新工作方式的态度。当然，这得益于技术所促进的透明度和信任度的提升。\n\
  \n这就是为什么可以预见未来投资将持续增长，因为越来越多的公司将意识到通过优化现有流程所能创造的价值。将这种增长的价值创造与开放透明的流程相结合，客户和立法者都信任你的工作方式，这将进一步降低成本。\n\
  \n听起来很不错，对吧？然而，正如我之前所说，也有充分的理由不实施区块链解决方案。其一，区块链只有在组织开始合作时才有效。只要你的竞争对手、供应商或客户不愿意合作，你的项目就注定失败。区块链只有在各方愿意在同一网络和应用程序中协作时才能发挥作用。信任可以真正内置于你所提供的解决方案中。但同样，你需要每个参与方的支持，否则最终的实施必然会失败。\n\
  \n另一个区块链平台可能不是最佳解决方案的情况是处理定制化交易时。定制化是区块链应用程序并不总能良好应对的问题。你可以创建自己的网络、平台、工作方式和去中心化应用程序。你也可以通过使用智能合约创建自己的订单类型，但这些订单必须存在某种可以通过自动化标准化的通用实践。如果使用的订单类型变化过多，创建不同类型的智能合约就会变得过于麻烦和昂贵。\n\
  \n最后一个考虑因素与处理速度和可扩展性有关。即使现在有一些平台和技术能够承担负载，但只有做出正确的选择，你才能通过区块链平台处理所有事务。否则，可能会面临网络内部的拥塞。根据具体用例，在做出最终决策之前，你应该综合考虑所有这些因素。\n\
  \n### 区块链技术快速入门\n\n首先，我需要简要解释什么是公钥密码学。*公钥密码学*（或非对称密码学）通常用于生成两种类型的密钥：私钥和公钥。公钥可以公开分享，而私钥必须保密（这显而易见）。为了生成这些密钥，需要使用单向函数。这在安全通信中解决了由来已久的问题。我们都熟悉对称密钥密码学：只需生成一个私钥，并将其用作账户、锁或其他任何东西的密码或口令。很简单，对吧？想象一下，我们希望相互发送加密消息，只有我们才能读取这些消息。只需共享同一个密码，问题就解决了！但其实并非如此，因为首先，我们需要找到一种安全的方式来相互共享这些密钥。这本身就可能是一个大问题。第二个问题是数量问题。你可能想向我发送安全消息，但可以想象，你也会想对你的所有朋友、家人和同事做同样的事情。那将需要发送和存储大量私钥！这在现实世界中简直是混乱不堪。公钥密码学找到了解决方案。你可以将公钥公开给所有人，将其存放在公共数据库中，并通过不安全的网络传输。它本意就是让所有人都知道并共享。如果你现在用我的公钥加密一条消息，那么只有我才能用我的私钥解密它。参见图\
  \ 1-3。\n\n![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig3_HTML.jpg](img/497553_1_En_1_Fig3_HTML.jpg)\n\
  \n图 1-3 公钥密码学\n\n你们中的一些人可能已经将其与区块链和加密货币联系起来了：你的钱包地址和你用来访问它的私钥。当然，公钥密码学还有更多用途。想想用于验证消息发送者的数字签名。这些密钥的生成方式大多基于散列算法，这些算法根据熵产生特定结果。当你丢失私钥时再也无法访问钱包，这并非偶然。这些算法旨在不可破解。当然，当算法被攻破时，你的密钥也可能被破解。根据你使用的区块链平台，会使用不同类型的散列算法来生成这些密钥。这也是为什么某些币可以一起存储而其他币不能的原因。通常还会添加一些额外程序：这就是以太坊和比特币地址看起来如此不同的原因。\n\
  \n你还会用到*椭圆密钥密码学*。这可能会让你有点不适（特别是如果你对密码学完全陌生的话）。首先，我们需要讨论有限域，它可以定义为一个有限数字集合，以及满足特定规则集的两个运算（加法和乘法）。下一步是椭圆曲线。其形式为：`y²\
  \ = x³ + ax + b`。参见图 1-4。\n\n![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig4_HTML.jpg](img/497553_1_En_1_Fig4_HTML.jpg)\n\
  \n图 1-4 连续椭圆曲线\n\n这些椭圆曲线被用于密码学和区块链实现。对于比特币而言，其曲线为`y² = x³ + 7`或`secp256k1`（见图 1-5）。据称，选择这个特定实现是因为美国国家安全局植入后门的概率最低。这也是许多其他区块链平台使用相同椭圆曲线的缘由。\n\
  \n![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig5_HTML.jpg](img/497553_1_En_1_Fig5_HTML.jpg)\n\
  \n图 1-5 secp256k1\n\n\n\n但接下来要探讨的是“为什么”：我们为什么需要椭圆曲线？椭圆曲线用于一个非常特定的目的：点加法。点加法实际上正如其名。我们将位于曲线上的两个点相加。奇怪的是，这种加法运算的结果（即第三个点）也会落在曲线上！^(³)\
  \ 这是一个非常有趣的特性，幸运的是它已被付诸应用。见图 1-6。\n\n![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig6_HTML.jpg](img/497553_1_En_1_Fig6_HTML.jpg)\n\
  \n**图 1-6**  \n点加法\n\n现在，我们的探索之旅已近终点：我们将把有限域与椭圆曲线结合起来。所有这些最终汇聚成业务的核心：椭圆曲线密码学，为此我们需要有限循环群。那么，什么是群？群是仅包含一种运算的有限域，在这里，这种运算就是点加法。\n\
  \n掌握了所有这些信息后，你就可以开始创建自己的密码学曲线，并将其用于椭圆曲线公钥密码学。它有很多用途，但在区块链世界中，它被用于签名和验证交易。很明显，确保这些底层曲线不被攻击者攻破至关重要，否则整个系统的安全性将面临风险。再次重申，如前所述，许多区块链平台之所以选择`secp256k1`，是因为它被\
  \ NSA 植入后门的可能性最小。\n\n当我们谈论区块链时，我们谈论的是账本。在传统工作方式中，需要一个第三方来验证支付、公证交易、使用托管服务，并允许投票和注册。随着区块链的出现，我们摆脱了这些集权于自身的第三方机构。集权本身未必是坏事，但它往往导致效率低下、成本高昂、隐私和控制的丧失、腐败等问题。而在分布式网络中，这种情况不再可能发生，因为由参与者来决定交易的结果和有效性。这里存在一个单一的真相，必须由多数节点支持，而非由网络中的单个权力实体决定。\n\
  \n人们常常忘记这项技术本身是什么，而直接开始关注其实现。然而，要理解其可能性，你首先需要真正理解并意识到这项技术代表了什么。其中一个重要部分是点对点网络的存在。如今，人们在互联网方面习惯了集中式的工作方式。当我们访问一个网页时，我们知道它运行在某个服务器上，并且我们访问的是同一个位置。然而，情况并非一直如此。互联网的初始形态就是一个点对点网络，计算机之间直接相互通信。这种技术至今仍被用于通过\
  \ BitTorrent 和其他网络共享文件。另一个例子是 TOR 网络，这是一个免费的开源网络，用于匿名通信（它也因被用于地下活动而名声不佳）。\n\n像互联网这样的中心化网络的问题在于，存在中心化的提供商，它们可以提供或拒绝访问、控制可看到的内容等。这个第三方可能被黑客攻击、发生故障甚至腐败。这正是区块链技术最初摆脱中心化实体的原因。我们移除所有中心化服务器，允许参与节点直接相互通信。更为重要的是第三方带来的成本。这些成本常常使流程过于昂贵，使许多人和（小）企业难以承担这些服务。问题在于，对于流程的正常运行而言，这些成本是不必要的，因为它们仅被用作合规性检查。有了区块链，你可以自动化这些检查，并显著降低这些成本。\n\
  \n理解这项技术的最后一部分是*哈希*的概念。当你对某个数据集（可以是一个单词、一句话、一些数字，甚至一整本书）进行哈希运算时，你会得到该数据集的唯一标识符。无论输入大小如何，输出大小始终相同。除此之外，如果你只改变一个数字、字母或符号，生成的哈希值也会看起来完全不同。当我说“完全”时，我的意思是*彻底不同*。这样，你就能确保数据未被修改。如图\
  \ 1-7 所示，单词“apple”和“apples”的哈希值之间的差异是显而易见的。\n\n![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig7_HTML.jpg](img/497553_1_En_1_Fig7_HTML.jpg)\n\
  \n**图 1-7**  \n哈希值的差异\n\n目前存在许多不同的哈希算法，但它们需要具备一些关键特性才能成功。其一，它们必须具有抗碰撞性，即你无法找到两个能产生相同输出的输入。其二，它们应具有抗原像性，即你无法根据输出的哈希值推测出输入。这些算法在网络安全中常用于密码方案，以提高应用程序的安全性。应用程序不再直接存储密码，而是存储密码的哈希值，这样密码就不会轻易被从应用程序中窃取（尽管常用密码仍可能被攻击者破解）。过去，有好几种此类算法被“攻破”，意味着人们可以逆向将哈希值还原为原始输入。\n\
  \n这在区块链技术中是如何应用的？有多种方式，稍后你会看到。你可能能想到这可以在任何领域应用的几种方式。你可以对一份文档进行哈希运算，并将其安全地存储在某处；如果你想证明该文档未被修改，只需重新计算文档的哈希值，并与存储的哈希值进行比较即可（这实际上是除了加密货币之外，区块链的首批用例之一）。\n\
  \n在区块链中，这种技术被用于使生成的交易能够被快速比较。当你开始对交易进行哈希运算时，你也可以对哈希值进行哈希，并从一组哈希值中最终生成一个单一的哈希值。这被称为*默克尔树*，可用于压缩大量数据。默克尔树可用于证明一个区块中包含哪些数据（见图\
  \ 1-8）。\n\n![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig8_HTML.jpg](img/497553_1_En_1_Fig8_HTML.jpg)\n\
  \n**图 1-8**  \n简单的默克尔树\n\n所有这些区块都由一组组交易组成，这些交易链条连接成一个巨大的账本。实际上，区块链仅仅代表了网络中已发生交易的历史概览。这些技术共同帮助我们创建了一个只能追加交易的账本，该账本分布在整个网络的所有节点上。这些交易包含在一个由区块组成的链表中。\n\
  \n\n\n"
- '# 构建基石


  “区块链”这一术语指代的就是该技术的核心。其底层数据结构是由包含交易的区块构成的有序反向链表。这些交易代表了区块链网络中所有参与者之间的支付行为。这里的“支付”一词应被宽泛地理解。它既可能包括我们通常通过加密货币进行的支付，也可能指代依据不同区块链平台，在两方之间进行的任何操作确认。区块之间通过使用上一个添加到链中的区块的哈希值来彼此链接，如图
  1-9 所示。细想一下，包含交易数据的区块链，只不过是一个数据以不同方式组织起来的账本。


  ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig9_HTML.jpg](img/497553_1_En_1_Fig9_HTML.jpg)


  图 1-9 - 区块之间的链接


  因为我们知道每个哈希值都是一个独一无二的指纹，所以总能确切地知道该区块是否属于这条链。这里需要注意的一点是，一个父区块（最新添加的区块）可以有多个子区块，而一个子区块则始终只有一个父区块。如果存在多个子区块，那么我们就遇到了系统分叉的情况。通常，这些分叉会被解决，只会使用其中一个子区块来延续主链（并且该子区块本身也会成为父区块）。然而，在某些情况下，部分分叉会持续存在，我们就会处理多条始于同一父区块的独立链。我们总是需要一个起点，即第一个区块，它被恰如其分地称为*创世区块*。因为从视觉上可以理解为区块是一个接一个堆叠的，所以我们把最新的区块称为“尖端”或“顶部”，而到创世区块的距离则称为“高度”。^(⁴)
  这个高度越大，改变早期某个区块的难度就越大。从某个特定区块开始，链越长，重新计算所有区块中包含的信息所需的计算能力就越大。


  区块中还存储了哪些内容？我们需要区分两个主要部分：区块本身和区块头。上一个区块的哈希值就是存储在区块头中的项目之一。通过这种方式，区块之间的链得以创建。但这并非唯一的内容——根据区块链平台的不同，你还可以在其中找到默克尔根、时间戳、随机数，以及其他一些参数（例如，难度目标、版本等）。图
  1-10 展示了比特币区块链的一个例子。


  ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig10_HTML.jpg](img/497553_1_En_1_Fig10_HTML.jpg)


  图 1-10 - 比特币区块头信息


  眼下，并非所有这些信息都会清晰明了，但不用担心，随着我们阅读本书的深入，我们会一一解释。默克尔根提供了存储在区块本身中的交易的数字指纹。这是一种基于交易 ID
  或“TXID”的“哈希值的哈希值”。这个哈希值对于该区块内的交易来说是独一无二的。见图 1-11。


  ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig11_HTML.jpg](img/497553_1_En_1_Fig11_HTML.jpg)


  图 1-11 - 比特币默克尔根中包含的内容


  再次强调，这只是对区块头中内容的简化展示。当然，区块包含的内容远不止区块头。区块的主体部分由交易构成。见图 1-12。


  ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig12_HTML.jpg](img/497553_1_En_1_Fig12_HTML.jpg)


  图 1-12 - 整个链


  正如你所见，我们处理的是海量数据，不仅存在于区块中，也存在于区块头中。正是最终根据整个区块计算出的哈希值，能够正确且唯一地识别该区块在整个区块链中的位置。^(⁵)
  对于比特币，使用`SHA-256`算法结合`RIPEMD-160`来计算这些哈希值，但这些算法可能因你使用的平台不同而有很大差异。既然我们已经了解了交易是如何被打包进区块，以及所有内容是如何链接在一起的，但主要问题依然存在：我们如何进行交易？其理念是，你可以用你的私钥对交易进行签名，这样不仅能清楚表明你是花费方，还能证明你拥有花费权，并且你没有重复花费该货币。交易通过网络广播并被挖掘到区块中。只有当这些交易基于所有参与者都同意的共识规则执行时，它们才会被处理。


  简而言之，交易的生命周期如下：


  1.  交易由创建者创建并签名。该交易应立即包含验证和执行交易所必需的所有信息。


  2.  这些被提议的交易会与网络中的其他节点共享，由这些节点进行验证。


  3.  如果被接受，交易会在整个网络中传播；否则，它们会被丢弃。挖矿节点可以将这些交易包含在可被挖掘的区块中，并最终将其添加到之前已被接受的交易链中。




  ## 区块链还是分布式账本？


  我在此想立即指出一个重要说明，即区块链与分布式账本技术（简称 DLT）之间的区别。通常，人们说每个区块链都是一个分布式账本，但并非每个分布式账本都是区块链。分布式账本是一种数据库，它试图在地理位置不同的地点之间共享数据，而没有中央角色对整个网络进行控制。可以看出，它们在概念和目标上有一些相似之处。两者之间的一个主要区别在于新数据是如何附加到平台上的。在区块链技术中，人们使用一种共识算法来添加新信息，而分布式账本并不总是具备这样的算法。


  正如你将在本书中看到的，DLT 的应用形式多样，区块链平台的应用亦是如此。使用“区块链”或“分布式账本”这两个名称有着许多含义。不仅技术本身不同，这两个名称带给人们的感知也不同。前者闻名遐迩，在全球备受追捧，而后者则相对隐匿于幕后，在
  IT 专家中更为人所知。那么，为什么用一个名称而不用另一个呢？一些公司希望搭乘炒作热潮，使用“区块链”；而另一些公司则希望远离炒作，表明他们真正关注的是技术本身，因此使用“分布式账本”。


  你应该考虑的另一点是目前存在的区块链“类型”。有公有、无需许可的区块链（如比特币和以太坊），它们在访问或参与方面没有任何限制。我们也可以称它们为“真正的”区块链。我们也有私有、需要许可的区块链，只有特定的一群人才能访问和参与（如
  Rubix 和 Hyperledger 平台）。还有一些平台存在于这两种极端情况之间。第一种是公有但需要许可的区块链，它允许所有人进行交易和查看交易日志，但只有少数人能够参与共识机制（如瑞波币和以太坊的私有版本）。最后，还有私有但无需许可的区块链，其共识算法对所有人开放，但交易仅限于特定数量的参与者。目前还没有一个网络完全实现这一点的真实例子（目前最接近的可能是
  Exonum 网络）。


  还有 DAG，即有向无环图，它们也带着自己的解决方案和网络进入了区块链领域。为了使本书的进程不过于复杂，我将把区块链和分布式账本这两个术语视为同义词（我知道有些人可能不同意这种方法），并且在详细讨论
  DAG 时会特别指出来。


  ## 区块链地址


  理解区块链世界的下一步是区块链地址。区块链地址 ^(⁶) 是区块链和加密货币中的主要概念之一。它基于公钥密码学（也称为非对称密码学），其中使用一个私钥和一个公钥。正如你可能从名称中推断出的那样，公钥是公众可以知道的密钥。它们主要用于识别你的身份，而私钥则应始终保持私有。它们用于签署交易或解锁你账户上的加密货币。有多种算法可以生成这样的公钥和私钥。随着时间的推移，出于安全考虑，这些区块链地址已经从这些公钥演变为这些公钥的哈希值。这可以通过多种不同的方式完成，以至于对于每种加密货币都有不同的区块链地址，并且通常不可能将不同的加密货币发送到同一个区块链地址（算法上的差异阻止了这一点）。如果支付通过网络发送到区块链地址，这些“地址”只能通过使用相应的私钥来解锁。根据这些地址的派生方式，有可能在同一個地址上存储山寨币（不同的加密货币）。


  ## 区块链钱包


  与地址密切相关的是区块链钱包的概念。这些钱包并非用于存储加密货币，而是用于与网络进行交互。它们用于生成发送和接收加密货币所需的信息，为此，它们会生成多个私钥-公钥对。这可以通过使用随机种子随机生成，也可以基于密码短语、密码、种子词等，在所谓的“确定性”钱包中生成。地址（如前所述）用于接收交易。私钥用于签署交易。^(⁷)
  钱包软件（如果我们处理的是数字钱包）会计算钱包中每个地址关联的余额，求和，并将此显示为你的余额。因此，再次强调，你的加密货币并非直接存储在钱包本身中。这只是一种处理公钥-私钥体系结构的更方便的方式。


  根据使用钱包的方式，它们可以被定义为“冷钱包”或“热钱包”。热钱包最容易理解，因为它是一个连接到互联网的钱包。有几种提供商允许你创建钱包。热钱包也称为软件钱包，有几种不同的类型。有可以在浏览器中创建的网络钱包；另一种类型是桌面钱包。这些可以下载到你的机器上，因此被认为比网络钱包更安全。尽管如此，你仍需确保钱包安全，并在可能的情况下进行备份。


  另一方面，冷钱包与互联网没有连接，用于离线存储加密货币。这是一种更安全的存储方式（假设你不会丢失你的冷钱包），因为热钱包容易受到网络攻击。硬件钱包是冷钱包的第一种形式。这些是用于更长时间存储代币的物理设备。也有一些实现可以类似地用于执行交易。这里的问题可能是钱包的固件实现，它并不总是像它应该的那样安全。一个永久保持离线的智能手机可以被视为具有类似安全性的硬件钱包。最后，还有纸钱包。正如你可能想象的那样，这仅仅是一张印有包含公钥和私钥的二维码的纸。纸钱包非常危险，因为一张纸显然会面临特定的风险。除此之外，这类钱包只能使用一次，用于将全部金额发送到另一个地址。




  ## 节点


  当我们谈论区块链及其所代表的网络时，也必然会提及节点。`节点`是网络的命脉，因为它们始终负责一组特定的任务。这些任务可能包括创建、接收和传输消息。如果没有节点，即使软件仍是最新版本，网络也将不复存在。这些节点分布在全球各地，遍布于一个广泛的网络之中。^(⁸)


  那么什么是节点呢？节点是任何连接到网络并拥有 IP 地址的电子设备。网络的主要目的之一是维护区块链的副本并处理交易（具体取决于节点类型）。这些节点的所有者自愿使用他们的硬件、算力和能源来维护网络。


  我们还应区分不同类型的节点：全节点、超级节点、矿工节点和简易支付验证（SPV）客户端。尽管它们在网络中地位平等，但每种类型都以不同的方式支持网络。首先，全节点会下载区块链的完整副本，并根据所使用的共识协议检查任何新交易。它们负责使用共识算法（稍后解释）验证交易和区块。它们还能够将新的交易或区块中继到区块链。当这个全节点公开可见时，我们称之为`超级节点`。全节点的所有者可以选择将其运行为隐藏节点（通过使用防火墙或
  TOR 网络对他人不可见）或可见节点。超级节点的优势在于，它可以连接到任何想要建立连接的其他节点并进行通信，充当一个分发点，既用于分发节点中存储的数据，也用于促进与网络上其他节点的通信。


  另一方面，轻节点（或 SPV 节点）引用了全节点上的区块链副本。其名称源于 SPV 方法，即“简易支付验证”方法，用户无需下载和维护整个区块链数据库即可验证一笔交易是否已被包含在某个区块中。这些节点依赖超级节点提供的信息，并仅作为通信端点（这在钱包软件中很常见）。


  最后，我们应强调客户端节点和矿工节点之间的区别。虽然任何人都可以运行全节点（具备必要的硬件要求），但这与挖矿节点不同。当一个全节点仅仅验证交易时，我们称之为客户端节点。如果所有者愿意投资昂贵的硬件（取决于共识协议），他也可以在运行节点时挖掘新区块。挖矿的概念将在下文中解释。


  ## 挖矿


  `挖矿`是区块链技术中的关键概念之一。它是新交易被新区块^(⁹)接受并添加到现有链中的方式，也是新加密货币的创造方式。它通常被用作防止欺诈的对策，并确保网络中的所有参与者保持诚实。挖矿本身成本相当高，因为它需要用于挖矿过程的硬件、驱动挖矿的能源以及时间。


  挖矿分几个步骤进行。首先，挖矿节点需要收集等待在交易池中待处理的未确认交易。这些交易被打包成一个区块（区块是交易及其一些额外元数据的集合）。每个矿工可以选择相同或不同的一组交易（这可能是由于节点参数或地理位置决定的）。下一步，取决于共识算法，是根据网络规则对交易进行签名。这可能是一个数学难题、参与者的投票数或其他系统。如果找到了有效解，矿工就可以将他的区块和解广播给其他参与者，其他参与者可以验证该解。如果解正确，并且区块内的所有交易都能根据区块链历史记录执行，则该区块被确认并添加到这些节点的区块链中。这被称为`胜出`区块。


  如上所述，为此，矿工应该获得奖励。奖励通过两种方式实现：矿工获得区块中包含的交易的手续费，以及新区块被添加时创建的新币。矿工可以基于网络所使用的算法（工作量证明、权益证明或其他）来获得此奖励。


  挖矿过程不仅是创造新加密货币的关键，也是在无需信任的环境中帮助建立去中心化共识的机制。网络上的所有节点都会接收到区块，并因此能够验证其有效性。这意味着共识会随着时间的推移而逐渐形成，因为这不是在特定时刻进行选举，而是通过网络中所有节点的异步交互来实现的。你必须认识到，在像比特币这样的网络中，为竞争和挖掘下一个区块所需的算力已经呈指数级增长。这是因为市场参与者的增加以及硬件解决方案的演进。随着时间的推移，矿池应运而生。通过合作，矿池找到下一个胜出区块的机会更大，这样奖励就可以在参与者之间分享。挖矿设施的基础设施随时间发生了巨大变化，根据不同的区块链平台，我们将深入探讨这些发展的时机和原因。对于其中一些平台，需要相当先进的基础设施，而其他平台则仍然对所有人开放。


  当然，在处理区块链平台的企业级实施时，你不会使用传统的矿工节点。相反，你将使用一种更简单的共识算法，在这种算法中，每个参与者都可以轻松检查和验证网络中发生的事情。竞争的需求降低了，因为这些参与者实际上已经相互认识，因此欺诈交易很容易被追溯。这样一来，当参与者试图在联盟中欺骗其商业伙伴时，他们可以因此被从网络中移除。


  ## 共识协议


  我们在谈论区块链技术时经常提到协议。当然，这并非区块链所独有，而是可以在任何电信技术的实施中发现。当我们谈论协议时，我们指的是决定如何连接到系统并与之交互的一整套规则。这些规则可能非常详尽，因为它们可以决定你必须使用哪种硬件、允许使用哪种软件，以及通过网络传输的消息的语义是什么。与其他电信服务一样。当谈到像比特币或以太坊这样的开源区块链实现时，对硬件没有限制，所需的软件也完全免费。尽管对于私有区块链实现来说情况仍然如此，但我们可以预见未来可能不再如此的发展趋势。



  ### 工作量证明


  工作量证明是区块链网络中首个使用的共识协议。首个采用此类共识协议的网络是比特币网络。其理念是，矿工需要利用他们的节点来求解一个数学问题。该问题的求解需要耗费大量的工作和算力，但验证其结果却相对简单。这种共识方式被设计得难度较高，并且需要大量的计算能力。如果求解变得过于简单，可能会引入某些安全问题——挖矿速度可能过快，导致区块和链的浮动，从而无法形成主链。以比特币为例，其目标是每十分钟生成一个新的区块。随着时间的推移，算力不断增强，参与者数量增加，网络中投入的算力也随之成倍增长。这意味着工作量证明算法的难度也需要相应提高。一些网络曾尝试通过创建能抵抗挖矿软件的算法来另辟蹊径。这样一来，每个人都可以继续使用经典计算机进行挖矿（使网络尽可能保持民主）。网络会设定一个目标哈希值，节点必须尝试基于区块和随机数（nonce）计算出低于该目标值的哈希。目标值越低，参与者找到正确且可接受的哈希的难度就越大。工作量证明协议可以通过使用前述的随机数以及将消息组合成区块的方式，帮助解决拜占庭容错问题。为了防止预计算，该随机数对每个节点都是唯一的，且只能使用一次。


  关于此类协议的一个重要批评点在于，应用该协议的网络所消耗的能源量巨大。在气候变化、资源稀缺和经济危机的时代，这一点是需要考虑的重要因素。


  目前，有许多不同的工作量证明共识协议被各个网络所采用。


  ### 权益证明


  权益证明是在工作量证明协议之后发展起来的，并越来越多地被用于区块链网络。首个实施此类协议的网络是 2012 年的 Peercoin（点点币）。在权益证明网络中，下一个区块的矿工是伪随机选出的，节点持有的加密货币数量会影响其被选中的几率。被选中的概率与你在该网络中的权益（stake）直接相关。


  与工作量证明共识协议相比，它显然更具成本效益，因为矿工无需消耗能源去求解数学问题。其次，它已被证明更加安全。一个常见的例子是 51%攻击，一旦某个参与者拥有了网络中
  51%的算力，区块链网络就会变得脆弱。从那一刻起，他就可以无视其他参与者的意愿，验证自己所有的交易，因为其他人已无法阻止他。这看似矛盾，但持有最大权益的利益相关者有动机维护网络，因为如果发生攻击，这将损害网络声誉，而他们受到的伤害也最大。这个协议也有一个缺点，被称为*无利害关系*（nothing
  at stake）问题。当网络发生共识失败，且网络中的参与者没有什么可失去时，就没有任何东西能阻止这些参与者支持不同的侧链。


  ### 委托权益证明


  委托权益证明协议在网络中维持着一个无可争议的真理共识。该协议结合实时投票和声誉来达成共识。这使得每种加密货币的持有者都能影响网络。


  该网络使用代表（delegates），他们通过选举担任该角色，并需将一定数量的加密货币存入一个基础账户中。存入的金额越大，该代表对网络施加的影响力就越大。如果出现恶意行为，这个基础账户中的资金将被没收。我们也可以称其为基于存款的权益证明。虽然代表负责交易验证，但参与者也需定期请求检查已挖出的区块是否包含所有正确的交易。这确保了网络能够自我治理和监管。你大概能感觉到，这比其他共识协议更加民主。


  ### 权威证明


  权威证明（PoA）是一种替代方案，常用于私有区块链^(¹⁰)网络（更常与分布式账本网络相关），它将“节点身份”作为网络中的权益来替代工作量证明。只有被选中的节点才被允许挖掘新区块。这些“验证者”节点被允许将交易添加到区块中，这些区块随后会被添加到区块链上。通过权威证明和验证者机制，还引入了一个新概念——*声誉*。验证者的声誉对于网络的存在至关重要。如果某个验证者的声誉或其权威受损，其他参与者可能会离开网络，或质疑新创建的区块及其交易。


  与其他协议实现相比，该协议有利有弊。PoA 的主要风险在于，如果只有一个验证者节点，就会将风险集中到单点故障上。在讨论分布式网络时，这是一个需要考虑的主要风险。


  然而，PoA 不需要使用工作量证明的网络所必需的巨大算力。PoA 相比权益证明也有一个优势。在 PoA 中，节点的整个身份都被置于考量之中。如果参与者行为恶意，他们将失去在网络中的全部权益。而在权益证明中，参与者只会失去其预先投入的当前权益。这意味着，在网络中整体参与度较低的人，其损失会小于在网络中投入巨资的人。


  ### 区块链平台中使用的其他协议


  在区块链平台中，还可以使用其他几种类型的协议来达成共识。其中一种与权益证明密切相关的协议是*重要性证明*。与权益证明的区别在于，在 PoI 环境中，用户的交易也会被纳入考量。通过这种方式，该协议试图衡量节点在整个网络中的信任度和重要性。^(¹¹)
  另一个有趣的协议是与工作量证明和权益证明相关的活动证明。它比工作量证明更节能，因为它仅在第一个阶段使用工作量证明，而在第二个阶段则使用权益证明。还有容量证明，其主要驱动力是硬盘的可用空间（而非工作量证明协议中使用的
  CPU）。^(¹²)


  你可能会遇到的其他协议还包括：复制证明、燃烧证明、空间证明、时空证明、存款证明、数据持有证明等等。你可以清楚地看到，许多不同的区块链平台正在尝试各种解决方案，以期在分布式和去中心化环境中以安全高效的方式达成共识。这些协议各有优劣，具体取决于你试图达成的目标以及所在组织的运作方式。



  ## 区块链分叉


  区块链分叉是区块链领域中的一个重要主题。它指的是同一网络内存在竞争或共存的侧链。仅仅因为网络的去中心化结构，分叉的出现似乎是自然而然的。区块在网络中传播，并在不同时间到达不同节点。这也可能是所谓孤块产生的原因。通常情况下，节点会尝试扩展累计难度最大的那条链。^(¹³)


  当有两个或更多的候选区块相互竞争以形成最长链时，我们就称之为分叉。如果某个矿工发现了一个“正确”的区块，它会立即发送给其邻近节点。多个节点可能同时发现不同的解，并通过网络进行广播。距离该区块原始矿工最近的节点将基于此区块开始构建它们的链，并继续处理下一个区块。如果以这种方式产生了分叉，问题通常会在一个区块内得到解决。原因是，即使网络中的计算能力在几个竞争群体之间平均分配，也会有一组矿工首先找到下一个解。这个新解将在网络节点间共享、被接受并通过网络传播。竞争节点将会收到这个新解，接受它，并停止对竞争解的求解工作，从而解决分叉。^(¹⁴)
  见图 1-13。


  ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig13_HTML.jpg](img/497553_1_En_1_Fig13_HTML.jpg)


  图 1-13


  区块链分叉


  还存在一种*硬分叉*。当网络上进行软件更新，或者协议与挖矿程序升级时，就会发生硬分叉。一旦升级完成，使用旧软件挖出的交易将不再被升级后的节点接受。这样，一条新的、持久的分支就形成了。在不同的链上会发生一组并行的交易。而*软分叉*是一种软件变更，它只是使之前的区块和交易变得无效，但同时仍保持向后的兼容性。硬分叉和软分叉的另一个区别是，对于软分叉，只需要大多数矿工进行升级。而硬分叉则要求所有节点都升级到新版本。


  ## 侧链


  通过对分叉的解释，你可以开始设想侧链的存在。侧链是相互连接的区块链（*父链*和*子链*）。由于这种连接，资产能够以固定的确定性汇率在网络上互换，同时侧链可以完全独立于父链运行，并使用自己的共识协议。见图
  1-14。


  ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig14_HTML.jpg](img/497553_1_En_1_Fig14_HTML.jpg)


  图 1-14


  侧链


  实际上，这种转移不过是一种假象。代币在父链中被锁定，等量的代币在子链中被解锁。如果你想转移，子链中的代币会被锁定，而父链中的加密货币则再次被解锁。要实现这一点，有几个前提条件。


  你需要理解的最重要的基本原则是所谓*结算最终性*的要点。结算最终性这个概念在金融服务行业很常见。它指的是你能确信交易已成定局且不再会被撤销的那个时刻。在采用工作量证明算法的区块链环境中，这个时刻可能难以确定，因为在任何给定的时间点，都有可能（尽管随着时间的推移可能性变小）产生一条不包含某些交易的更长的链。如果我们考虑使用工作量证明的公链，标准做法是等待六个确认（在我们交易所在区块之上新挖出的区块）后，一笔交易才被视为最终确认。其实际含义意味着我们必须信任两条链上参与者的诚实性，并且它们都能抵制审查。所有这一切都要求参与者是诚实的，包括那些持有锁定代币的参与者。否则，你可能会陷入锁定代币被花费的境地，从而导致双花问题再次成为可能。


  子链也可能缺乏结算最终性。在这种情况下，可以使用所谓的*托管人*，他们必须对何时锁定或解锁一定数量的代币进行投票。这种投票系统可以适应任何形式，最适合所连接的区块链。这使得它成为一个相当灵活的系统。实现这个系统有几种方式。第一种是使用一个中心化交易所，通过仅在属于链
  2 的等量代币被锁定时，才解锁链 1 的代币，来强制执行两条链之间的双向锚定。见图 1-15。


  ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig15_HTML.jpg](img/497553_1_En_1_Fig15_HTML.jpg)


  图 1-15


  中心化交易所


  你可以清楚地看到，使用这种系统违背了区块链的本质。你重新引入了单点故障，并且再次使用了中心化。你可以尝试通过使用多方参与的多重签名方式来建立一种去中心化的形式。这在私有环境中可能非常有效。见图
  1-16。


  ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig16_HTML.jpg](img/497553_1_En_1_Fig16_HTML.jpg)


  图 1-16


  多重签名方式




  第二种方法涉及摆脱任何中心化，通过实现理解每条链的共识机制来连接两条链。这样，代币可以在链能够验证存在锁定交易的那一时刻被解锁。当你在一个其中一条链没有最终结算性的系统里工作时，这会带来一些安全隐患。这一点或许可以应用于私有区块链/分布式账本环境，但鉴于这种设置在一个本质上无需信任的环境中会带来的风险，它不适用于公有领域。


  你可以使用多种方式来创建这种特定设置，但最终都必须归结为一种简化的交易确认方法，因此需要使用梅克尔根（Merkle root），它在区块链领域中以各种方式被频繁使用。见图
  1-17。


  ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig17_HTML.jpg](img/497553_1_En_1_Fig17_HTML.jpg)


  图 1-17


  通过共识链接


  另一种与前述例子相关的方法称为“纠缠区块链”。在这里，两条独立链之间的关系被提升到了新的层面。当一条链上的币被锁定时，另一条链上等量的币会立即被释放，反之亦然。见图
  1-18。


  ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig18_HTML.jpg](img/497553_1_En_1_Fig18_HTML.jpg)


  图 1-18


  纠缠链


  我们要看的最后一个例子是“驱动链”。在这里，参与者可以投票决定何时释放锁定的币以及何时将其发送到另一条链。这些投票可以被锁定在交易信息的特定部分中。这些投票者通常与其中一条链相关联，同时也决定了另一条链上发生的行为。你在图
  1-19 中可以清楚地看到，对参与者的信任是这里的主要考量。


  ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig19_HTML.jpg](img/497553_1_En_1_Fig19_HTML.jpg)


  图 1-19


  驱动链


  当然，这些只是可以独立使用的明确示例。实际上，将这些方法进行多种组合是极有可能的。根据你具体的用例，拆分或组合这些方法可能是你最好的解决方案。很大程度上取决于私有/公有以及许可/非许可的方法，再加上对参与者信任度的预期。


  ## 区块链技术栈


  与其他技术实现不同，当你希望在组织内部署区块链技术时，你必须考虑该技术的整个“技术栈”（见图 1-20）。其核心是去中心化和共识。因此，你必须审视你的基础设施，并问自己一个问题：“你们目前准备好接受一种新的工作方式了吗？”
  在某种意义上，你必须放弃中心化和控制的经典观念，为一种不再有单点故障的互联系统腾出空间。


  ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig20_HTML.jpg](img/497553_1_En_1_Fig20_HTML.jpg)


  图 1-20


  区块链技术栈


  它既带来优势也带来挑战，但在你考虑应用区块链时，每一个“层级”都必须被考虑进去。正如你很快就会发现的，它远不止是加密货币本身。当你开始这段旅程时，请将这幅图铭记于心。


  ## DAG（有向无环图）


  如同区块链一样，DAG 是另一种形式的分布式账本技术。主要区别在于，在 DAG 的世界里，不再有区块。这可能看起来令人困惑，因为你刚刚读到区块链世界中的一切基本上都是“链式区块”，但当然，正如生活中的一切，事情并非那么简单。对于
  DAG 而言，交易是直接相互链接的。它们并非排列成整齐的行列，而是形成一片交易云，链接到几个新交易，以此类推。其名称本身——有向无环图——实际上已经告诉你需要了解的一切。它是*有向的*，这意味着所有的链接都指向同一个方向，如图
  1-21 所示。正因为此，网络中不可能出现循环。因此它是*无环的*。


  ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig21_HTML.jpg](img/497553_1_En_1_Fig21_HTML.jpg)


  图 1-21


  DAG 运作原理


  DAG 本质上试图提供与区块链相同的功能，但性能更优。^(¹⁵) 它提供了更好的可扩展性和更低的交易费用（因为网络中不存在矿工）。与你从区块链技术中学到的相反，在这里，随着等待验证的交易数量增加，网络会开始运行得更快（从而最小化网络拥塞的可能性）。目前
  DAG 的主要关切点是在网络中找到达成安全去中心化共识的最佳方式。一旦这个问题得到解决，DAG 可能会因其带来的优势而对当前的区块链格局构成威胁。


  DAG 通常也被称为“区块链 3.0”，因为它被视为去中心化应用领域自然而然的下一步，以及未来的工作方式。一如既往，这只是对 DAG 非常宽泛的解释。实际上，每种实现都差异巨大，并且各有其优缺点。在后续章节中，我们将更详细地探讨目前已存在的实现以及近期可能实现的功能。现在也有了
  MerkleDAG，它将梅克尔树的密码学能力与 DAG 结构相结合。




  ## BlockDAG


  此外，还有 BlockDAG 范式，如图 1-22 所示。当你从宏观层面理解了区块链和 DAG 的运作方式后，这个概念就会相当清晰。我们依然使用区块，但不再只有单一的父区块。取而代之的是，每个区块都会引用矿工在本地所能观察到的图的所有端点。你可能会立刻发现这里的问题。由于存在许多区块以及许多相互引用的区块分支，因此极有可能出现属于同一条链的冲突交易。因此，BlockDAG
  需要特定的共识协议来在整个网络上实现一定程度的安全性。


  ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig22_HTML.jpg](img/497553_1_En_1_Fig22_HTML.jpg)


  **图 1-22** BlockDAG 结构


  借助一个运行良好的 BlockDAG 网络，你可以将交易速度提升至秒级，将费用降至最低，并支持网络去中心化（因为可以挖掘更多的区块）。孤块的数量会减少，自私挖掘的动机也会大大降低。^(¹⁶)
  基于 BlockDAG 的网络试图在中本聪、维塔利克·布特林以及 DAG 所设计的网络之间找到一种合适的关系。实现这种技术的一个网络示例是 Soteria。


