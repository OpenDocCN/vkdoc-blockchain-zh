  '
- '# 2. 区块链与其他新兴技术


  区块链并非一项独立的技术。事实上，它常与不同的技术结合使用。存在许多其他新兴技术并不意味着你必须在区块链、人工智能、物联网或任何其他类型的应用之间做出选择；它们可以相互增强，并为你的组织创造更好的用例。本章描述了如何整合多种技术以创建更好的整体解决方案。当然，这只是一个有限的列表，因为你可以选择任意一组可能的应用来获得更好的结果。你应该考虑到情况并非总是如此，简单地将各种应用拼凑在一起也可能轻易导致灾难。在创建新的流程或应用时，或者当你希望运用多种新兴技术时，你应该认识到其中涉及一定的风险。


  新技术伴随着未知的风险，而每一次实施都有其学习曲线。如果你打算将这些不确定性中的几个结合起来，就会引入更多的未知因素。在此类项目中，拥有全局视野并密切跟进项目的进展至关重要。在此，我们将提供一些有趣的潜在协同效应和用例，它们可能有助于改变你的组织。我们还将提供一些例子，说明这些新兴技术实际上可能解决当前的世界性问题。


  ## 区块链与物联网


  尽管区块链技术本身非常有趣，但它也与其它趋势存在协同效应，可以增强区块链市场。当物联网凭借新的芯片、传感器和执行器席卷全球时，仍然存在一些可以通过区块链技术解决的主要担忧。其中之一便是物联网实现的安全性。^(¹⁷)
  物联网项目的大规模部署常常因易受 DDoS 攻击而受阻。可扩展性也常被证明是一个问题，因为大型网络需要一种能够对不同网络中的节点进行认证、授权和连接的系统，这在中心化网络设计中会迅速形成瓶颈。这种经典的客户端/服务器架构会导致一个高成本的
  IT 架构。这是因为与中心化云、大型服务器集群或一般性网络设备相关的维护成本很高。尽管其中一些中心化解决方案（如云）被宣传为自建数据中心的低成本替代方案，但这些成本可能会显著上升。为什么？云需要自身的人才、迁移工作和云运维。如果管理不当，这可能会变成一个比最初环境更昂贵的基础设施。


  想象一下，随着时间的推移，你的传感器和设备网络在不断扩展。这只会增加成本，并增加基础设施无法处理通过网络发送的海量通信的可能性。这本身就会导致更多成本，因为信息可能会丢失、变慢或降质。^(¹⁸)
  中心化系统带来的另一个问题是不同设备之间存在不同的云平台，如果你想要控制网络中所有设备之间传输和共享的数据，这会导致更多的开销。你当然可以尝试将所有设备集中到一个中心化供应商，但这里立刻就会出现供应商锁定的风险，这正是如今公司在与云供应商打交道时所面临的问题。


  过去，区块链网络处理过类似的问题，尤其是在关注可扩展性和安全性时。区块链平台可以提供防篡改的设计，对用户透明，同时仍然能够处理数百万甚至数十亿的联网设备及相关传入交易。近期已有平台开发特别关注物联网行业（例如沃尔顿链或
  IBM 生态系统）。根据你要关心的用例和未来发展，DAG 平台也有相关进展，它们能够在网络不受压力或堵塞的情况下处理高频交易环境。IOTA（及其缠结技术）就是使用此类
  DAG 技术的平台之一。


  当前区块链平台的另一个主要优势是，它们比任何中心化解决方案都更具成本效益，因为它们能够消除与传统物联网网关相关的许多处理开销。网络的稳定性（以及已挖掘到区块中的交易被逆转的可能性极低）创造了一个环境，让你可以信赖已处理的数据并对其进行分析，而无需怀疑在数据存储过程中是否存在欺诈行为。结合智能合约，这可以催生自动化市场，使机器对机器的交易实时成为现实。你可以清楚地看到，去中心化架构为点对点消息设计、分布式文件共享和自主设备协调提供了解决方案，且成本都低于通常所需支付的水平。




  ## 区块链平台的风险与劣势


  然而，在审视基于区块链平台的去中心化架构时，也需要考虑其风险。目前，区块链技术仍处于新兴阶段，因此没有任何组织拥有开发完整端到端 IT 架构所需的全部内部知识。因此，必须依赖市场上的供应商。这些供应商需要仔细甄别。你可能会面临供应商锁定的风险，尽管区块链平台的整个理念背离了传统的竞争模式。但这并不意味着现实就是如此。


  一个主要风险是区块链平台中使用的公私钥机制：一方面，私钥被盗会使盗取者能够在区块链系统上签署交易。在大多数情况下，目前还没有多重身份验证机制，这导致了一个尚未得到解决的主要安全漏洞。除此之外，私钥丢失后无法轻易“恢复”，并可能导致资金、数据以及账户控制权的丧失。想象一下，你建立了整个基础设施，却在瞬间失去了对其（部分）的控制。你可不希望心怀不满的员工能够访问此类数据，因为后果可能是灾难性的。此外，还有法律与合规框架方面的问题，其中仍然存在许多不确定性及潜在的法律陷阱。^(¹⁹)


  其他可能的劣势包括无法对数据进行修改。当需要执行修改时，这可以被视为一种优势，但这几乎必然会导致网络硬分叉。你必须要考虑的最后一个陷阱是存储需求。无论你从哪个角度看，节点的存储需求都会随时间增长。由于你面对的是一个去中心化网络，这意味着多个节点需要复制整个网络的存储内容。尽管你可以创建允许从节点中删除某些数据的网络，但存储量仍会随时间增长，这是一个无论你是否愿意都必须考虑的成本。^(²⁰)


  尽管列出了上述所有劣势，区块链技术确实能够支持大型企业物联网（IoT）设计的规模化发展。通过从一开始就有效地实施去中心化平台，可以帮助公司以经济高效的方式扩展其解决方案，同时兼顾其网络的安全性。如果你考虑到这些潜在的劣势，并采用基于风险的方法，仔细斟酌设计的每一步，你最终可能成为物联网领域的领跑者，并触达更多潜在客户。你也可以专注于进一步的创新和设计。这需要勇敢和有意愿的人去承担这些风险，但从长远来看，回报可能是巨大的。


  ## 区块链与人工智能


  另一个席卷全球的术语是*人工智能*（AI）。如何解读 AI 取决于你自己，但它与区块链技术的联系是不可否认的。虽然你可能不会立即看到两者之间的联系——因为它们具有完全不同的开发方和应用领域——但它们确实存在重叠之处。^(²¹)
  那么，联系在哪里呢？两种技术及其底层技术都聚焦于数据的使用。区块链技术侧重于在去中心化、不可篡改的账本中安全地加密数据，而人工智能和机器学习行业则侧重于开发能够基于相同数据进行分析和决策的引擎。如果以正确的方式实施，这两种技术之间可以实现明显的协同效应。


  区块链技术可用于创建数据市场，而这反过来可能极大地推动 AI 产业的发展。它们可以提供可持续的数据供应，这对这个新兴且不断增长的行业至关重要。已经有一些案例将
  AI 算法集成到区块链平台中（一个有趣的例子是 Aeternity），或者将计算结果提供给研究人员和行业用于未来的开发。你也可以反过来思考，理解区块链平台能够清晰地追溯机器学习算法在何时做出了哪些决策。如果你拥有明确的变量集以及基于这些变量的决策，这本身就能引发对所开发应用程序的进一步分析和优化。


  其他应用则专注于，例如，用于工作量证明算法的算力。这种海量的算力也可以用于训练新的算法和模型。可以看到，一些专注于区块链矿场的公司现在也开始转向 AI 行业，并将其算力用于提供服务。同样，我们可以反过来思考，审视工作量证明算法本身。虽然目前大多数算法采用“暴力破解”方法，需要大量的处理能力来破解数学算法，但通过使用机器学习，这些工作量证明算法可以以更智能的方式解决，从而减少这些区块链网络所需的处理能力。


  你还可以将区块链技术用作能够与用户交互的 AI 代理的底层去中心化层。有了去中心化层，机器学习算法就能拥有源源不断的世界数据来源，而无需中心化实体控制输入的数据以及代理的演化方式。这有助于改进算法，以及
  AI 代理对周围世界的响应方式，并提高其准确性。同理，区块链技术允许对存储在其上的数据进行加密。如果你处理的是敏感数据（如健康、个人或财务数据），你可以将应用程序开发成只有机器算法才能训练或响应这些数据，而无需任何人类参与者访问它们。这创建了一个安全层，人们可以在其中存储和上传数据，从
  AI 代理处获得响应，而无需担心其个人数据可能存在的安全风险。如前所述，它还有助于创建去中心化市场，个人可以通过分享其个人数据而获得实际奖励和报酬。较小的公司可以进入该市场，而无需与大型科技巨头在数据方面竞争，同时也能防止大公司在用户不知情的情况下滥用个人数据。




  你也可以将先前关于物联网的故事与人工智能和区块链技术结合起来。利用物联网设备涌入的大量数据，你能看到进行分析的价值。通过将机器学习算法整合到去中心化平台中，你不仅能单纯使用分布式账本，还能通过整合分析高效地构建物联网网络，从而提升价值。一家名为
  `Finalze` 的公司已经看到了这一机遇，它将可穿戴设备与行业工作流程中的安全规范相结合。^(²²) 其他公司则专注于供应链优化、商业网络、健康数据、企业能源管理、交易预测、自动促进支付的参与证明平台、资本募集、网络安全等领域。


  我想分享的最后一个例子是微软所做的努力。该公司希望将区块链和人工智能技术结合起来，让人们能够轻松且经济高效地运行先进的机器学习算法，同时还能共同贡献数据并改进模型。区块链技术允许创建一个去中心化的市场，参与者可以获得透明度，并确信他们正在与正确的代码进行交互。通过智能合约，参与者可以因其提供的数据或对模型所做的更改而获得报酬。


  当你思考前面的例子时，就能理解其可能性几乎是无限的，而可能的结果也是相似的。你还应该考虑到人工智能与区块链整合中可能存在的陷阱。其一，神经网络需要海量数据，为此通常使用数据湖。这些数据湖（以及数据仓库）用于确保数据质量，并确保新项目和算法始终有足够的数据可用。一个区块链平台可以在一定程度上确保数据质量得到尊重和维护。然而，正如我们之前多次提到的，可扩展性可能是一个问题，并且通过某些平台快速提供大型数据集可能并不那么容易。这意味着会形成一个额外的瓶颈，从而在数据市场领域制造了一个新问题。这并不意味着这种情况必然发生，只是意味着在创建支持数据科学的集成方案时，需要考虑有向无环图和分布式账本的局限性。


  ## 区块链与云


  与许多其他技术一样，大型云服务提供商也发现了围绕区块链技术的热潮，并不得不迎头赶上。亚马逊、谷歌、微软和其他公司都已进入市场，为那些希望在现有（云）架构内开发区块链解决方案的企业提供方案。为此，它们建立了自己的平台，并与多家初创公司建立了合作伙伴关系。一个例子是
  AWS 与 `Kaleido`（后者又与 `ConsenSys` 相关联）之间的合作。此外，`Corda` 有运行在 `AWS` 云平台之上的应用程序，`BlockApps`
  也出现在其合作伙伴名单中。^(²³) 其目标是将区块链技术更贴近企业的现有现实，并使整个流程更加顺畅。^(²⁴) 同样，谷歌云也已开始与初创公司 `Digital
  Asset` 和 `BlockApps` 合作，以加大力度为其合作伙伴和客户打造有吸引力的云平台。`Chainlink` 的应用程序以及 `OneLedger`
  也已被该平台收录。^(²⁵) ^(²⁶) 微软 Azure 则允许轻松实现与 `Corda`、`Ethereum` 和 `Hyperledger Fabric`
  技术的集成。^(²⁷) 最后，IBM 也带着自己的平台和清晰的 `Hyperledger Fabric` 实现方案加入了竞争。^(²⁸)


  我在这里还可以提到许多其他公司，但目的并非逐一讨论这些平台。关键是要让你理解在云实例上，甚至是“作为服务”来运行区块链应用的优缺点。这种设置的优点显而易见。与其他云应用一样，它允许你快速部署应用，而无需直接处理基础设施成本和搭建工作，你可以通过点击鼠标来部署新机器，而无需在数据中心自行安装服务器。


  例如，如果你将此与 `Hyperledger` 平台结合，就能在几分钟内创建一个由你控制的联盟链应用。除此之外，如果你将区块链与云计算相结合，就能更高效地追踪所有权，因为你可以开发应用来取代当前过时的流程，例如通过存管信托公司进行清算。^(²⁹)
  与区块链一样，云计算也有助于推动当前的去中心化趋势。起初这看起来可能有些奇怪，因为云计算只是使用基础设施（或平台）的一种不同方式，但如你所知，你可以选择全球各地的不同数据中心来备份数据，并在远程位置运行应用程序。这有助于创建维护数据库副本并独立运行的节点。


  在这里你还能找到边缘计算的概念，近年来（尤其是在物联网出现后）它越来越受到关注。借助区块链技术，可以实现对网络的可靠访问和控制，从而为扩展提供更多可能性。^(³⁰)
  通过节点的分布，可以想象地理风险（战争、自然灾害等）得以降低；由于数据中心遍布全球，即使是私有区块链平台也能得到针对此类事件的保护。




  ### 云服务与区块链技术的优势与挑战


  多数云服务提供商会承诺一定的正常运行时间和灾难恢复能力，从而使企业能够在自身范围内保障并维持一定的效率。另一个优势与云计算成本的持续下降有关，这使得使用微交易更具吸引力。当前的发展表明，云实现可以摆脱运行完整虚拟服务器的需求。相反，只需要复制操作系统即可让应用程序运行，从而降低成本。最后，还有分布式超级计算的概念。许多计算机可以连接到运行在类云环境之上的区块链平台，这反过来有助于在所有节点上划分、管理和分配工作。这再次联系到了去中心化存储和边缘计算的使用，正如我们在物联网（IoT）背景下所看到的那样。


  你可以看到，为区块链应用选择云服务提供商有许多优势，但你不应对这种实现可能存在的弊端视而不见。这些弊端与云计算的一般缺点紧密相关。其一便是持续需要互联网连接才能使用你的服务。^(³¹)
  尽管大多数主流云服务商都制定了服务等级协议（SLA），承诺 95%甚至更高的正常运行时间，但这仍然是一个需要考虑的因素。你可能会争辩说，区块链平台同样需要互联网连接。嗯，这并不完全正确。你可以搭建一个私有区块链网络，在其中不需要实时互联网连接，或者你可以使用卫星技术甚至短信（SMS）来传输交易。虽然公共平台通常依赖互联网，但对于私有实现，你完全不受限制。


  第二个弊端是在云环境中使用存储、备份和计算能力的问题。这点因提供商而异，但你不应对可能的缺点视而不见。现在在云平台上运行分布式账本可能看起来非常实惠，但随着网络和存储的增长，你还能负担得起这些成本吗？使用这样的应用是否仍然有利可图？此外，在这些问题浮现的地方，供应商锁定的风险也悄然逼近。


  第三个弊端是，你再次信任了第三方（这本身就与区块链技术的理念相悖）。你必须能够信任该方拥有安全的环境、可靠的数据中心以及可靠的管理框架。如果不是这样，一旦出现问题你该怎么办？你完全失去了控制。


  第四个重要的弊端与我的第三点相关。针对云服务商的黑客攻击事件有所增加。一个常见的错误是，各方盲目地信任他们的云服务商是安全的，并能长期保持这种安全。事件已表明情况并非总是如此，可能会发生导致数据泄露甚至更严重后果的事件。再次强调，你是在信任第三方为你的应用提供安全保障。


  世界正持续向基于云的解决方案和基础设施迈进。因此，我们不应感到惊讶，许多区块链平台都与云有一定联系，并利用这些基础设施来帮助扩展网络。未来无疑将出现更多这样的协同效应，并且，在考虑到可能的弊端后，我们最终可能会创造出精彩的用例。


  ## 区块链与网络安全


  尽管区块链网络和技术存在众多攻击向量，但这并不意味着它在未来毫无前景。该技术甚至可能在网络安全领域得到应用。目前，它可能是迄今为止最有助于防止数据窃取和欺诈的技术之一。由于分布式账本的特性，攻击者必须攻击并摧毁整个网络才能更改数据，从而破坏数据本身的完整性。`Guardtime`^(³²)
  公司已经将这项技术用于数据保护。每一份数据都通过网络进行分发，因此，当有人试图篡改数据时，会有一个完整的系统分析来决定该数据是应该被更新还是保持不变。类似地，数据的可用性也得到了保障。攻击者可以瘫痪网络中的一个节点，但数据仍由网络中的其他节点提供。攻击者必须瘫痪网络上的所有节点才能阻止数据的可用性。当我们处理的是大型网络时，这几乎是不可能的。


  区块链技术的另一个可能性是创建更安全的域名系统（DNS）服务。目前，这些服务是中心化的，当攻击者能够访问该服务时，她就能破坏网站与`IP`地址之间的连接。利用区块链技术，可以将部分服务去中心化，从而使攻击者更难破坏连接。^(³³)
  第三种可能性在于身份确认。利用区块链技术，一方无需透露身份即可获得信任。通过分布式账本的验证或使用零知识证明，可以确保另一方值得信任，而无需透露关于该方的任何进一步信息。这促进了相关双方的隐私和安全。


  这些仅仅是区块链可能如何影响网络安全世界的一些例子，但你可以轻易地看到，在未来几年内将有更多的用例出现。这项新技术对网络安全专业人士来说既是挑战也是机遇。


  与安全领域紧密相关的是合规性和身份的使用。两者都可以通过区块链技术得到增强。由于网络促进了透明度，所有用户操作都可以被验证和检查，以便轻松识别违规者。同样，身份可以由网络锁定和提供，因此关于你是谁以及你随时间采取了哪些行动都不会有疑问。




  ### 区块链与机器人流程自动化


  机器人流程自动化（RPA）是目前企业界的一项热门技术。它能够实现标准化任务的自动化，并被标记为继区块链、人工智能和物联网之后的颠覆性技术之一。^(³⁴) 正如你在其他示例中所见，有多种方式可以整合这些技术，从而实现更大的创新。RPA
  与区块链的相似之处之一在于，它们最初都在金融行业找到了用武之地。RPA 被视为一项仍处于高速增长阶段的技术。^(³⁵) 早期，它只专注于简单任务，但如今随着更多人工智能和机器学习算法的加入，它可以为众多行业提供更智能的自动化方式。


  区块链可以作为 RPA 技术的整合器，因为它能够支撑 RPA 的底层流程。这可以通过协助数据交换以及以去中心化的方式部署代理来实现。它还能帮助监控机器人，并提供一层信任机制和交易日志，使你始终能够以安全可靠的方式验证机器人执行的操作。如果再上升一个层面，你还可以允许网络参与者批准由机器人提交的交易。这一切都取决于具体的用例，以及你希望如何处理和自动化某些流程。区块链可以通过提供去中心化的机器人部署方式，进一步实现自动化框架的自动化。当条件满足时，智能合约可以开始运行，并触发机器人执行特定任务。我们拥有带时间戳的日志，在审计时，这些日志能提供我们所需要的一切信息。


  可能的陷阱包括可扩展性——这确实取决于你的用例和你选择的平台、与企业现有（遗留）系统的互操作性，以及你想要实现的流程的标准化。这是否意味着使用区块链和 RPA
  是不可能的或没有优势？当然不是，它仅仅意味着在实施之前，必须仔细考量每个案例，并清晰地规划出实施步骤，否则你可能会陷入一个无休止且代价高昂的项目，最终无法交付其承诺的价值。其他可能的限制包括监管的不确定性（尤其是在涉及个人或敏感数据时）以及治理方面的限制，因为企业不习惯使用去中心化的应用程序。


  如果一切评估得当，并且项目与整体战略经过深思熟虑，那么这可以帮助企业扩大其努力成果，并增加他们从 RPA 项目中获得的价值。他们可以让机器人跨越多个部门，与众多不同的用户进行交互，同时仍然保持控制。


  一个有趣的 RPA 与区块链技术结合的用例是酒店客户忠诚度计划。^(³⁶) 通过以自动化方式处理用户请求、销售和操作，底层的分布式账本可用于记录和奖励忠诚度积分与交易。它还可以用于合规性管理、资源管理以及整合了
  RPA 机器人的供应链解决方案。


  ## 区块链与量子计算


  当开发者讨论区块链技术时，很快就会引发关于量子计算在不久的将来可能产生影响的讨论。如果你是第一次听说这个，欢迎加入讨论！为什么我们在思考区块链和量子计算时会有讨论呢？简而言之，量子计算或许能够破解目前大多数区块链实现中使用的加密算法，从而有效破坏它们本应带来的安全性。目前使用的大多数计算算法和数据结构仅针对经典计算机设计，并未考虑量子计算的到来。^(³⁷)
  这些算法中的大多数在量子计算世界中都有对应的版本，但其处理能力可能远超当前水平。


  经典计算机使用 0 和 1，而量子计算机引入了第三种状态，称为*叠加态*，在这种状态下，0 和 1 可以同时表示。因此，通常你需要选择 0 或 1 并顺序分析情况，而利用叠加态，你可以同时表示多种情况并加速分析。正因如此，量子计算机将能够解决那些看似不可能的问题，并破解相应的算法。其中一些算法在经典计算机上需要数十亿年才能解决，而量子计算机可以大幅缩短所需时间。虽然量子计算机内部需要保持足够低温，但与经典计算机相比，其电力消耗也会显著降低。


  尽管对量子计算机的研究已经持续了几十年，但一些首批真正意义上的实现是在过去几年才开始成为现实的。因此，它今天绝对值得关注，以便我们能够为不久的将来做好准备。通过加速这些原本“缓慢”的算法，量子计算可能导致特定信息系统的破坏或崩溃。就区块链技术而言，当前平台面临着两个特定的威胁。




  ### 量子计算与区块链安全


  首先，是对所用哈希算法的潜在攻击。使用哈希值的基本假设是，逆向运算在计算上代价高昂且难以执行。如果量子计算能够轻易破解这些哈希值，那么区块链技术引入的整个安全性便无从谈起。上游区块链的真实性以及条目的真实性都将受到损害。这意味着攻击者可以在不实际改变哈希值（哈希碰撞）的情况下修改区块链中的数据。第二个可能的问题与新区块的挖掘有关，尤其是在使用工作量证明算法时。拥有量子计算机的矿工可以更快地计算出随机数，从而在网络中超越其他矿工，这不仅使他们能比其他矿工赚取更多的加密货币，还能完全掌控新区块的生成。对区块链平台中常用的公私钥模式的攻击容易受到量子计算机的攻击。如此一来，攻击者可能伪造签名、消息等，再次破坏区块链网络的安全性。不难理解，量子计算机的影响将远远超出区块链网络本身。过去，这主要被视为一种可能在未来产生影响的学术讨论，但最近谷歌声称其已实现了量子霸权。^(³⁸)
  尽管这并不意味着我们很快就能在市场上看到成熟的量子计算机，但它确实意味着其他各方也将达到这一状态，并在未来几年内进一步发展。这本身就足以引起任何参与者的警惕，促使我们思考在不久的将来如何保护区块链平台（以及整个加密算法）的安全。


  在你了解了量子计算可能对区块链技术产生的影响后，目前也有人在研究后量子密码学。美国国家标准与技术研究院（NIST）目前正在进行一项流程，以研究未来的一些方案，但目前还没有制定出标准。迄今为止，一些有前景的领域如下^(³⁹)：


  -   *基于哈希的密码学*。经典例子是 Merkle 的哈希树公钥签名系统（1979 年），它建立在 Lamport 和 Diffie 的一次消息签名思想之上。

  -   David Jao 和 Luca De Feo 设计了超奇异同源 Diffie-Hellman (SIDH) 方案。^(⁴⁰)

  -   *基于编码的密码学*。经典例子是 McEliece 的隐藏 Goppa 码公钥加密系统（1978 年）。

  -   *基于格的密码学*。或许吸引了最多关注的例子，但并非历史上第一个，是 Hoffstein–Pipher–Silverman 的 NTRU 公钥加密系统（1998
  年）。

  -   *多变量二次方程密码学*。其中一个有趣的例子是 Patarin 的隐藏域方程（minus 变体）公钥签名系统（1996 年），它推广了 Matsumoto
  和 Imai 的一项提案。


  当然，这些例子强调以新方式使用传统算法，而新算法也可能建立在量子技术特性的基础之上。其中一种可能性是量子密钥分发 (QKD)，这是一种可以在各方之间生成随机比特流的协议。它可以作为一次性密码本或
  Vernam 密码用于进一步的加密目的。（*一次性密码本*是一种目前无法被破解的加密技术。随着量子技术特性的引入，我们或许能引入更高的安全性。）迄今为止，这是该领域最成熟的技术，因此对于在不久的将来在区块链网络中实现这一技术来说，是一个非常有趣的切入点。在此算法之上，还可以使用量子系统，使得区块链中的信息防篡改。最后，还有量子比特承诺协议可以取代当前的数字签名方案。


  如你所见，量子计算的出现并不必然意味着区块链技术的终结。这意味着区块链技术必须适应量子的崛起，但该领域正在进行大量的研究。^(⁴¹) 量子的影响将远比区块链领域本身更为广泛，而观察区块链平台底层技术在未来将如何转变，也将是一件十分有趣的事情。




  ## 区块链与智慧城市


  智慧城市的概念并不新鲜。对于不熟悉这一概念的人来说，*智慧城市*利用现代智能技术来处理与城市平稳运行相关的诸多问题。随着人们不断向城市迁移，我们面临着日益严重的交通拥堵、健康问题、气候变化、商品短缺、人口增长、老龄化加剧、教育机会不均以及贫困加剧等挑战。解决这些问题的关键在于运用物联网，因为它能帮助我们以现代方式应对这些挑战。


  一个完美的例子是巴塞罗那。该市通过铺设全市光纤网络，节省了高达 7500 万欧元的城市资金，并在智能技术领域创造了超过 4.7 万个就业岗位。路灯采用 LED
  灯，不仅节能高效，还能减少热量产生。同时，这些路灯还配备了传感器，用于收集关于污染、噪音、湿度、温度以及人流量的信息。巴塞罗那的第二个例子是使用智能垃圾桶，这类垃圾桶利用真空系统将垃圾储存于地下，以减少垃圾异味。此外，全市范围内还安装了传感器，以便在高旅游区更好地管理噪音，并确保城市花园获得适量的灌溉用水。最后，该市还设立了多个“实验室”，让市民能够参与开发新的数字创新，使城市变得更加智能！世界其他城市也纷纷效仿。我们绝不能低估当前面临的挑战，必须尽快且高效地应对这些挑战。^(⁴²)


  `区块链`和加密货币在此也能发挥重要作用。世界各地都在进行概念验证，有些较为成功，有些则不尽如人意。纵观一些主要的落地案例，我们看到印度已在多个主要城市实施区块链技术以协助交易管理；迪拜计划到
  2021 年成为首个由区块链驱动的智慧城市；而爱沙尼亚自 2012 年起便利用该技术追踪其公民信息。（在您感到警觉之前，需说明爱沙尼亚追踪公民数据是为了保护他们。例如，防止个人和健康数据被滥用，或在战争时期防止国防数据被篡改。）在中国银川市，居民可以通过面部识别和区块链技术支付购物款项，从而无需使用实体货币。放眼美国，纽约和弗吉尼亚等地已建立相关环境，用于电力交易和通过手机进行投票。


  区块链有助于将城市管理去中心化到所有相关合作伙伴手中，将所有利益相关方连接起来，并整合他们的资源。^(⁴³) 另一个主要优势是引入了更广泛的参与，这本身就在城市管理方面提升了民主程度？它有助于将市民与城市紧密联系起来，并重新赢得对政治和行政机构的信任（这在许多地方正逐渐减少）。同时，它还提高了决策的透明度，并展示了这些决策是如何被处理的。该技术的其他优势再次体现在对物联网设备的安全管理，以及市民对自己个人数据和身份的控制权上。与此相一致，区块链技术还能有效地管理隐私。^(⁴⁴)


  当然，这类技术也可能被用于邪恶目的。它们有助于控制主要城市化区域，因此可能引入我们都惧怕的“老大哥”监控模式。落入坏人之手，任何技术都可能被滥用。但想象一下，一个由区块链驱动的智慧城市，政府控制着你的身份、行踪和数据，这实际上会变成生活在其中任何人的监狱。


  有几个平台专门致力于智慧城市的发展。联合国推动的“携手共建可持续智慧城市”（U4SSC）项目，旨在推动信息和通信技术用于建设智慧且可持续的城市。FIWARE 是一个欧盟项目，提供了一个免费软件平台，它虽不完全专注于智慧城市，但肯定能提供可能简化智慧城市开发的服务。第三个例子是
  DownTown，它在全球智慧城市中已拥有 13,000 到 20,000 个域名。


  ### 区块链与环境


  任何关注新闻的人都不能否认，气候变化是当下一个热门话题。暂不深入讨论气候变化本身，区块链技术可以通过多种方式帮助保护环境。^(⁴⁵)


  区块链技术可以促进碳排放交易，不仅实现交易顺畅，还能为所有参与者提供透明度和安全性。这可以进一步开放市场，并使人们深入了解此类市场的运作过程。在清洁能源交易方面也已经有了概念验证项目。在这样的平台上，消费者可以买卖可再生能源。由于区块链在金融应用领域有着清晰的背景，这也可以为气候变化组织和倡议提供透明且可追溯的融资。通过使用智能合约和自动化的资金处理，可以优化高风险投资，排除人为因素。^(⁴⁶)


  同样，使用区块链可以追踪供应链。这有助于进一步保护环境。可以阻止血钻的流通，并通过智能合约和 ID 对动物及肉类供应进行彻底检查。这有助于促进符合道德和生态规范的供应链，从而使采用不同路径的企业能够为其行为负责。


  第三个例子是通过使用标签和追踪数据来保护濒危物种，通过仅允许特定人员访问来确保数据安全。这些数据也可用于生物学研究。另一种方式是共享全球范围内的动物贩运数据，以便清晰地了解非法供应链。这意味着可以识别出主要参与者并加以制止。


  再次强调，我们不应忽视区块链技术给环境带来的弊端。多份报告警告称，仅比特币网络消耗的能源就足以为一个小国供电。^(⁴⁷) 不难看出（即使某些人声称大部分网络使用的是可再生能源）^(⁴⁸)，这在气候变化方面是毁灭性的。应对这种巨大的算力和能源消耗的一种方法是转向不同的挖矿方式。这在其他几个网络上已经实现（或正在进行中），从而降低了所需的算力，进而减少了这些网络的能源消耗。




  ### 区块链与贫困


  区块链技术还有可能成为解决世界另一大问题的武器：贫困。全球三分之二的人口每天生活费不足 10 美元，每十人中就有一人每天生活费不足 1.90 美元。^(⁴⁹)
  许多非营利组织试图提供帮助，并从个人和政府获得资助。区块链可以帮助追踪这些资金的流向。捐赠者常常想知道他们的钱去了哪里，有了分布式平台，这不再是个问题。非营利组织可以提供清晰且不可篡改的日志，让捐赠者能够看到他们的资金去向。类似地，我们也可以追踪非营利组织所开展工作的成果。捐赠者可以直接了解资金使用情况，甚至可能更有动力分享自己的一部分财富。


  一如既往，区块链技术也可以作为加密货币使用，实现点对点的直接交易。这一方面有助于捐款，但更重要的是能够促进普惠金融。许多贫困人口无法获得金融服务，这实际上将他们排除在生活的重要领域之外。随着去中心化金融服务的普及，另一个问题自然浮现：身份问题。由于这一切都可以通过去中心化技术实现，穷人最终能够无限制地参与生活中的所有活动。随着人们获得进入正规商业、偿还债务、购买产权、验证所有权、转移所有权、进行支付等权利，穷人将不再被默认自动排斥在社会之外。同样，非营利组织也可以利用解决方案来帮助证明世界各地人们的身份并验证其认证。


  区块链是否是最终能够消除贫困并解决世界上所有重大问题的神奇技术？不，当然不是。但我们不能否认它确实具备潜力。分布式账本可能会成为世界所需的额外推动力，从而为所有人创造一个公平的竞争环境。


  '
- '# 区块链技术的局限性


  尽管本书大部分内容聚焦于区块链技术带来的进步，但我们仍需牢记，所有技术都有其局限性。理解何时应真正倡导实施基于区块链的解决方案，以及何时需要采用其他解决方案，这一点至关重要。


  首先，存在区块链技术本身核心的局限性。可扩展性问题带来的限制常常是此类分布式网络的一部分。虽然概念验证可能效果很好，但问题始终在于，在大型组织中推出的同一用例是否仍能正常运行。当然，公有区块链网络在可扩展性及其相关成本方面确实面临困扰。如果一个用例变得过于流行，整个网络可能会开始显著变慢，给平台上运行的所有其他去中心化应用带来问题。活跃度是另一个常导致问题的方面，如同区块大小、出块时间、交易在网络中的传播、交易和/或参与者的隐私，以及特定的安全漏洞一样。这些特定的漏洞催生了解决方案，例如用于保护加密货币免遭盗窃的离线硬件存储。其他方案则通过创建基于区块链网络的替代层来关注可扩展性，这些解决方案必须实现此类网络之间的互操作性、替代协议实现等。这要求开发人员和
  IT 架构师具备技术专业知识，了解众多不同的解决方案和平台——包括它们的优缺点。


  当人们选择开发去中心化应用时，这也会导致若干困难。如果你想更新一个 DApp，你必须通过网络传播该更新，节点仍需选择是否接受该更新。这样一来，安全漏洞可能会保留在那些拒绝更新的节点的应用程序中。同样，如果你想更新网络，可能会导致硬分叉，进而带来网络分裂的风险。


  除了技术知识是决定使用区块链解决方案的关键因素这一显而易见的事实之外，你还必须考虑正在实施的商业模式。通常，这并不符合区块链技术带来的优势。分布式账本带来了一整套去中心化的理念，并逐渐远离那些促进商业中心化的经典解决方案。协作共赢，将客户置于价值链和体验的中心，是引领这一变革的关键概念。如果你不愿意在当前业务中实施这些变革，那么在你的现有
  IT 架构和运营中实施去中心化应用或区块链是否能带来任何实际价值，常常是值得怀疑的。


  我们也介绍了许多积极的应用案例，说明区块链技术如何以积极的方式改变世界。然而，我们不应忽视它可能被以负面方式使用的事实（正如所有其他技术实施一样）。已有报告指出，加密货币被用于资助犯罪活动、实施欺诈和洗钱。在我们提出帮助世界的解决方案的同时，想要对公民施加控制的政府也可能会以类似方式使用它。我们有责任保持警惕，并支持向积极解决方案的迈进。


