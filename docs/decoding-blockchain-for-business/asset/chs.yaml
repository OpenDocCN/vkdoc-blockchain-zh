- '# 引言


  你好。是的，就是你。如果你正在读这段话，我猜你听说过*区块链*，并且想对这个主题有更多了解。也许你过去曾拥有一些加密货币，听过关于比特币或其他网络的传闻，正在犹豫是否应该投资。你可能曾对投资加密货币的人嗤之以鼻，而那些人现在仍然在“HODL”（如他们喜欢说的那样），希望价值能回到曾经的高点。现在你想知道所有这些讨论到底是怎么回事。也许你听说过某个可能涉及区块链技术的项目。或者，你甚至听到过“你相信区块链吗？”这样的问题，仿佛它是一种新兴的宗教。


  那么，如果你希望更深入地理解区块链技术是什么，以及它可能如何影响你的生活，别再犹豫了。当我们谈论区块链时，商业专业人士往往并不清楚这项新技术已经实现了什么，或者在不久的将来会发生什么。为了揭开这层面纱，本书将向商业专业人士介绍区块链，特别侧重于不仅解释区块链是什么，还探讨它如何改变不同行业。


  我们将审视不同的主要行业，看看这项技术如何不再是一件晦涩难懂、难以使用的东西，而是提供了一种新的工作方式，并重新设计当前那些常常设计糟糕的流程。区块链有能力彻底改变平台，使得竞争对手能够在无需信任的环境中进行合作。这样，整个行业可以进一步优化，同时改善客户状况。我不会试图说服你，或让你“相信”任何事情。我的目标是提供一个清晰的信息：区块链是什么，它如何被应用，以及可能的法律和商业机遇是什么。你如何利用这些信息完全取决于你。为什么？因为只有你，凭借你获得的知识，才能判断区块链（或者就此而言的分布式账本）是否适合你。你需要自己决定是否能运用这些知识做出一些改变，从而改变你周围的世界。如果你不做改变，也没关系。而如果你做了，希望这本书能帮助你做出正确的决策。当然，由于我是本书的作者，你完全有理由认为我对区块链技术持积极态度。如果书中的某些段落在你看来过于乐观，我在此表示歉意。再次强调，我的目的不是说服你任何事，只是与你分享信息。


  你们中的一些人可能非常怀疑。2019 年的加密货币崩盘在许多人的脑海中仍记忆犹新，并在一定程度上削弱了人们对区块链最初的乐观潜力。一些人认为这项技术已经失败，我们应该寻求更传统的解决方案。事实一如既往地介于两者之间。你很快就会了解到，崩盘的发生有其特定原因。崩盘的发生甚至可能是一件好事。它让我们能够基于更现实的条款构建未来，而不是梦想着明天就建立一个全新的世界。正如你们大多数人所知，世界不会在一夜之间改变，我们也不应强求如此。相反，我们应该利用手中的工具和知识，尽最大努力让明天变得更好，哪怕只是做出一点小小的改变。当我们一起翻阅这些页面时，你将理解分布式账本如何能够改变现在以及未来。


  在本书中，我会介绍一些值得关注的区块链应用案例，这些案例既展示了其潜力，也揭示了技术上的难点。一个必须始终追问的问题是：我们是否必须使用分布式账本/区块链技术？或者更好的问题是：使用区块链的附加价值是什么？你或许可以使用它，但只应在它对项目和组织有益时才这样做，而不是仅仅因为它是区块链？遗憾的是，这个问题有时会被那些急切想赶上热潮、却未理解选择背后深层后果的人或公司所忽视。


  你很快就会了解到，区块链技术需要一种新的思维方式。只有当所有合作伙伴都持有这种共同观点时，区块链项目才能成功。与区块链相关的最令人厌烦的问题之一是：“我们如何从中获得最大收益？”
  此刻你可能难以理解，但分布式账本让竞争对手能够为了所有人的利益而合作。


  我们还会探讨区块链技术如何影响其他热门话题，例如`AI`、`IoT`和`RPA`。新兴技术并非社会中各自独立演变的趋势，而是可以轻松地结合成新的解决方案。这些解决方案可能带来更大的变革和更广泛的影响（如果处理不当，也可能带来更大的灾难）。


  我们还将研究区块链技术对大公司财务部门以及围绕区块链的法规所产生的影响。最后，我们将以对加密货币的一些见解作为结尾。那么，现在就开始这段旅程吧！



