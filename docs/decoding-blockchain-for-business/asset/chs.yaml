- '# 区块链与行业应用案例


  本章介绍了众多不同行业中的一些有趣应用案例。对你们中的一些人来说，原因可能显而易见。当你开始讨论区块链技术时，许多人喜欢说，除了加密货币，他们还没看到任何行业中有实际运行的案例。那么，在此我们离开理论路径，展示当前实际使用中的案例。尽管区块链技术仍有待完善，但这并未阻止行业领袖们实施该技术并改变他们的工作方式。




  ## 区块链与金融


  区块链技术天生扎根于金融领域，能够为金融世界提供多样化的解决方案，无论是改进现有市场还是助力创造全新市场，都取决于具体用例以及那些愿意探索机遇者的创造力。无论你如何看待，分布式数据存储都能帮助促进数据实时提供给所有希望参与市场的主体。这样一来，关于谁能公平获取市场数据的争论便不复存在。可以创建基于区块链平台进行资产交易的市场，就像通过众筹解决方案帮助小型项目和公司找到融资一样。资产可以以一种对所有参与者透明、易于验证且成本高效的方式进行转移。当使用智能合约时，清算和结算流程可以完全自动化并被记录下来。


  对于监管机构而言，借助每笔交易清晰且不可篡改的日志，交易监控将不再成为难题。资金转移可以在没有第三方抽成干扰的情况下进行。银行间支付可以顺畅进行，不再浪费时间，数据也能再次与可互操作系统共享。对于那些无法获得金融服务、被现有机构冷落的人群，可以实现金融包容。通过让这些个体参与这些流程，我们能为他们提供更好的生活与生活方式。外汇交易，如同其他任何支付系统形式一样，都可以通过分布式账本进行，从而改进现有的传统系统，并再次消除从中抽成的第三方。


  整个贷款市场都可以通过区块链平台来促成。目前无法获得贷款、只能任由高利贷者从其困境中牟利的人们，可以通过小额贷款或根据其需求量身定制的新型合约找到可持续的解决方案。信用证也是全球商业伙伴之间合作与贸易的经典银行产品。同样，区块链技术可以帮助优化和自动化现有流程并降低成本。目前已有关于创建衍生品、追加保证金、信用违约互换、掉期和股票的讨论、初创公司及应用。可能性是无限的，取决于你如何看待现有流程，或者你能为新产品想象出什么。


  ### 财务部门


  审视财务部门并在其职能范围内发现机遇或许会很有趣。如同往常，每个项目都会影响其他部门以及整个公司。然而，你可以很容易地看到，当你在财务部门内部启动项目时，你可以将其用作创新中心，进而改变整个组织。根据这项技术的本质，这甚至可能涵盖供应链、供应商和客户。


  #### 企业资源计划系统


  那么，为什么要考虑将企业资源计划系统与区块链技术集成呢？这可能会带来多项优势。由于企业资源计划系统用于管理会计、采购、项目管理和供应链，数据的准确性至关重要。它用于集中所有业务数据，从而实现对业务运营和决策的更深入控制。然而，数据的准确性无法保证，创建记账条目时可能发生人为错误，主数据也可能出错，所有这些都会导致报告、支付等方面出现错误。^(⁵⁰)


  区块链提供了不可篡改的账本并提升了透明度，当你考虑数据和 ERP 系统时，这可能是一个有趣的选择。它还能改善可审计性，因为所有交易都被锁定在区块链中，从而确保日后无法进行任何更改。这自然也会提高存储在
  ERP 上数据的安全性，但除此之外，私钥机制确保了只有特定人员才能访问系统。智能合约可以增加额外功能，并自动化公司间转账、订单处理、采购请求和支付。这反过来又能加快目前通常手动或部分自动化完成的流程。所有这些都可以通过流程优化和减少流程中的中介环节来降低成本。


  SAP 是支持 ERP 与区块链这种集成的支持者之一。^(⁵¹) 在区块链技术及其 ERP 系统方面，SAP 似乎有若干想法。其中之一涉及制造商，因为多种类型的信息可以在同一个账本中记录和共享。通过向主要利益相关者授予访问权限，可以追溯有关机器和产品制造的规格信息。借助
  `SAP Leonardo`、`SAP cloud platform` 和 `SAP HANA`，使用 `Hyperledger Fabric` 或 `multichain`
  的可能性使得区块链能够集成到当前的 ERP 环境中。^(⁵²) SAP 的另一项举措聚焦于制药供应链，其中 `SAP information collaboration
  hub for life sciences` 被用于打击假药。SAP 正在探索类似可能性的其他应用案例还包括轮胎、科技和航运领域。


  另一家探索了这种可能性的公司是 IBM，其 Oracle 企业应用团队致力于开发将区块链与 Oracle ERP 云集成的解决方案。^(⁵³ (#fn53))
  他们看到了制造业（产品的每个组件详细信息可在利益相关者之间共享）、金融（来自多个金融系统的交易数据可以收集在一个环境中，从而简化审计追踪并确保符合公司政策）、法律（法律文件的共享存储库）以及食品服务（食品供应链的实时跟踪）方面的机遇。


  #### 客户关系管理系统


  客户关系管理系统用于改善企业的客户关系。尽管与财务部门没有直接关联，但它们能帮助企业提高客户保留率并跟进商机。除此之外，它还允许自动化某些任务、更紧密地控制流程，以及清晰呈现统计和报告的价值，从而为企业内部提供改进的机会。


  Salesforce 理解了区块链技术的可能性，并将其集成到其 `Customer 360` 平台中。^([⁵⁴) 他们提供区块链技术来捕获平台上发生的活动，并将这些数据传递给特定的工作流，从而实现自动化和标准化。当数据能够以这种方式提供时，就可以进行数据分析，将数据用于聊天机器人，当然也能创建审计追踪。底层的分布式账本技术还可以将数据提供给其他应用程序和应用，甚至提供给企业业务网络中的其他合作伙伴。




  ##### 其他系统


  随着区块链技术成为越来越多 CRM 和 ERP 系统的一个功能，它可以与其他财务和资产管理系统集成，而企业无需担心当某个应用程序发布新版本时需要进行重大变更。^(⁵⁵)
  一旦集成，它将对企业当前的工作方式产生重大影响。流程和工作流可以进一步自动化，数据可以在应用程序之间以及与业务网络中的所有合作伙伴之间实现标准化和共享。这反过来又会带来更好的业务关系，因为必要的数据可以共享，并且变更将通过审计追踪清晰呈现。


  从这个意义上说，这些数据存储也可以用于新项目，例如更好地预测销售和供应链，提高整体流程的合规性，改进应付账款和应收账款流程，以及降低成本。


  ##### 开票


  另一个重要方面是处理发票。许多解决方案都试图处理应付账款和应收账款。几家区块链初创公司已经针对这一领域存在的现有问题创建了解决方案。专注于发票贴现的分布式账本发票系统已进入市场，以提高效率。^(⁵⁶)


  一个解决方案是 `Populous World`，它专注于发票融资。^(⁵⁷) 通过发票融资，锁定在未结销售发票中的现金得以释放，因为买方可以以折扣价购买这些发票。在其平台上同时提供发票保理和发票贴现服务，他们声称能够比其他合作伙伴快得多地开放融资渠道，同时企业可以保留高达
  95% 的发票价值。他们喜欢展示的关键点之一是购买发票无任何费用、回报率高，并且市场更加全球化。通过使用区块链，他们在全球范围内开放市场，同时引入了透明度和安全性。此外，在金融体系中，第三方和金融机构已从该流程中被移除。


  第二个例子是 `Prontapay`，其目标是利用智能合约，在交易费用更低的情况下帮助企业更高效地收款，同时使用一个稳定、快速且安全的开票系统。^(⁵⁸ (#fn58))由于发票是通过区块链平台发送的，智能合约确保“法律编码”在买卖双方之间形成了具有约束力的协议。


  结合前面的例子，您很容易看出，用于创建法律合同代码的数据可以直接输入到 ERP 系统中，这样整个发票周期就可以实现自动化，同时保留清晰的审计追踪。


  ##### 数据仪表盘


  最后一个例子是 `Anaplan` 平台（但对于其他仪表盘或规划软件也可以轻易地如此描述）。区块链技术可以像当前 `Anaplan` 从会计系统获取数据一样，以类似的方式提供数据。如果处于共享环境中，数据采用标准格式并包含清晰的变更日志，分布式账本可以提供更多数据。这使得预测能够更加精简，并符合
  IFRS 和其他偿付能力框架所建立的新监管改革要求。^([⁵⁹)


  `Qlik` 已经开始研究如何有效地将与区块链技术相关的数据进行可视化。无论是数据片段之间的联系、时间序列数据还是大规模数据，`Qlik` 都能提供解决方案，以便您对区块链网络获得更深入的洞察。


  检查数据质量和数据转换的过程在很大程度上可以实现自动化。通过创建具有清晰合规网络的受信数据存储，数据科学家、报告专业人士和监管专家的工作可以变得更轻松，并且使得进一步的研究成为可能。这可以进一步优化整个组织。


  #### 保证与审计


  业务流程的一个经典部分是审计与保证流程。它们是确保报告基于现实的关键。如果做出了某些假设，审计师必须确保这些假设成立。他们必须询问与资金缺失或数据不一致等相关的问题。由于分布式账本是数据的不可变表示，这可能会对审计的执行方式产生明显影响。已发生的交易可以在这些账本上毫无疑义地轻松得到验证。^(⁶⁰)
  如同我们目前所见的所有其他行业范围一样，您应该理解这里存在着重大的自动化机遇。信息的存在性、准确性和完整性都可以锁定在账本中，并通过智能合约进行检查。


  当然，正如我们已经多次声明的，人们不应盲目信任区块链技术。与任何新技术一样，欺诈和黑客攻击的可能性是存在的。并非所有漏洞都已明朗，并且与任何数字技术一样，防御方和攻击方之间正在进行一场“军备竞赛”。


  从这个意义上说，至关重要的是要采取必要的安全措施（自动化的或其他方式）、进行定期审计并执行渗透测试，以确保账本保持安全。其他风险来自于您所使用的区块链技术类型。由于市面上存在许多不同的类型，它们各有优缺点。有时交易是不可逆的，交易对手是隐藏的，交易金额可能消失，私钥可能永远无法恢复，等等。这意味着，一如既往地，您不应将分布式账本视为神奇的解决方案。任何技术都固有风险，您必须了解其能力，才能找到合适的应用场景。一个例子是
  `Armanino` 推出的基于区块链的工具。^(⁶¹) 要获得最终报告，传统技术仍然是必要的，但中间审计可以实现自动化。


  #### 会计


  与审计相一致，区块链技术可能会对会计产生重大影响。由于该技术本身常被描述为分布式账本，其关联性是显而易见的。该技术植根于交易、所有权和财务信息账本。采用类似区块链的分布式账本技术作为基础的会计平台可能会改变该行业的未来。为了实现这一点，显然需要标准和法规。如果我们能够实现这一点，对账和冲突管理的需求可以降至最低限度。^(⁶²)
  区块链还将提高财务信息的透明度，并可能对交易的及时性产生重大影响。类似地，欺诈行为也可以减少。当你面对不可篡改的交易以及需要验证和确认这些交易的多方参与者时，“做假账”要困难得多。此外，经典的“人为错误”也很容易被检测出来并从账本中过滤掉，因为其他参与者能够识别并拒绝它。


  一个推广税务、会计和审计领域潜在机遇的组织是会计区块链联盟。它拥有众多合作伙伴共同合作以实现这一目标。^(⁶³)




  #### 保险业


  保险业是一个在工作方式上不以快速创新而闻名的行业^(⁶⁴)。然而，对区块链技术的初步兴趣源自金融领域，因此保险公司自然也受到推动去研究这项技术以及可能的创新机会。这个行业需要应对许多挑战，例如它们必须遵守的严格且往往复杂的合规与法律框架。成熟市场的增长有限，许多国家的利率现状，需要处理和调查的欺诈性索赔，必须验证的第三方支付交易，需要处理的数据，以及这些公司承担的大量行政负担。我们还可以加上开发新产品以应对现代世界挑战的压力，以及根据实施的方案制定的新模式补偿等等。最后，我们还必须考虑所处理数据的安全性，因为这是任何处理个人数据的主要行业都关心的问题。从更广泛的层面来看，数据对于根据当前合同进行的准备金计算也是必要的。这在保险领域至关重要，因为当投资组合中考虑到某些风险时，必须重新平衡风险敞口。当你审视所有这些要点时，就能明白为什么这个行业面临如此多的挑战。


  区块链或许不是神奇的答案，但它可能是将保险公司带入现代时代的工具之一。一个显而易见的应用场景是欺诈预防^(⁶⁵)。这影响到企业和最终消费者，仅仅因为保险公司需要处理欺诈问题，而这会影响其利润底线。借助区块链平台，市场上的保险公司之间可以有更多的协调。目前，每家保险公司都在分析它们所拥有的数据，因此可能筛选出可疑的索赔或活动。如果保险公司能够合作并共享对过滤欺诈案件至关重要的数据（因为保险欺诈常常在不同公司之间转移），那么成本可以在所有参与者之间分摊，同时成功率也会提高。


  当然，这与数据紧密相关，这也是区块链可能真正帮助保险业的第二个方面。它既有助于提高数据质量，也有助于改进数据管理。目前，许多保险公司在试图为客户提供更好服务的同时，正艰难地处理海量数据。区块链技术也可能有助于改善现有的数据管理系统。


  在底层的支付系统和索赔处理中还可以找到其他机会，因为许多工作可以通过自动化智能合约来完成。这结合机器学习模型，有助于筛选出可疑案件，而那些被视为“正常”的案件则能够顺利处理，不会给保险公司自身带来额外成本。这将带来更好的客户体验，因为他们可以立即验证其索赔。同时，这也能减少保险公司承担的间接费用和行政成本。


  同理，最后一个重要的可能性在于面向潜在客户的产品开发和提供^(⁶⁶)。区块链平台有效的数据管理可以增强当前正在使用的精算模型，这反过来又有助于开发更适合客户的新合同条款。


  正如你可能想象的那样，许多初创公司已抓住机会来填补保险业与区块链技术之间的空白。一个有趣的例子是 `Estua-re`，这是由 Legal and General
  Reinsurance Plc. 推出的一个平台^(⁶⁷)。这个再保险平台用于养老金风险转移执行，能够处理定价、索赔、财务报告和抵押品管理^(⁶⁸)。


  第二个例子是 `Everledger`。`Everledger` 提供多种解决方案，其中之一专注于保险业。他们希望提高透明度，并实现自动化、信任度和更高精确度。该解决方案还有助于识别欺诈。


  保险领域的其他初创公司包括 `Etherisc`^(⁶⁹)，它专注于流程改进解决方案，并降低了处理费用和索赔处理时间。`Guardtime`^(⁷⁰) 是一家业务范围远不止于保险的开发者，但它与马士基合作开发了一个海上保险平台。`FidentiaX`^(⁷¹)
  是一个可交易保险单的市场。当然，市场上还有许多其他公司以及正在开发中的项目，但这足以让你了解目前的发展状况以及未来我们可能在哪里看到新的解决方案。没有哪个行业能不受影响，展望未来几年，我们将会看到保险业发生的重大变革。




  #### 房地产


  房地产（当然也包括商业地产）是未来几年可能因区块链技术影响而发生变化的另一个市场。许多目前需要中介或多方参与的房地产交易，未来或许可以通过区块链平台上的智能合约实现自动化。例如任何涉及物业买卖、租赁合同、融资及管理交易的环节。^(⁷²)


  现有房地产行业常见的主要问题在哪里？首先，它并非对所有人开放。^(⁷³)不难理解，最主要的障碍是购置房产所需的资金。这历来是道高门槛，但并非唯一障碍。大多数国家对房地产及其购买方式都有严格规定：身份认证、信用评分、融资、公证服务、现金要求、资质审核、收入证明、寻找担保人等。


  即使在商业地产领域，我们也需要应对一些特殊要求。必须进行尽职调查，确保所有法律、运营和投资影响都清晰明确。经纪人充当投资方之间的中介，向合适的人提供恰当信息。你需要依赖的第三方机构似乎无穷无尽，而且这些程序往往被法律固定下来，无法绕开。与第一个问题紧密相关的第二个问题是整个流程缺乏透明度。首次进入房地产市场的人常常会沮丧地发现，要把所有事情都做对是多么困难。而且你还必须信任所有中间人，让他们提供正确信息。


  通过使用分布式账本，你可以改进房产搜索流程，加快租赁前的尽职调查，简化现金流管理，并实现更便捷透明的产权管理。在考虑商业地产这样重要的事务时，信息应该且必须对所有人免费开放。考虑到许多家庭在购置房产时所做的投资，这一过程不应该设置不必要的障碍。同样，在购置房产时，你必须确保所有事项都符合法规。你需要知道出售房产的业主是否真的是业主，建筑是否符合现行法规，房产上是否有其他权利主张等等。这一切都可以通过一个基于区块链的平台来确定，该平台可以向所有参与者开放信息。缺乏透明度还会滋生腐败、逃税、洗钱甚至更严重的问题。查阅全球金融诚信组织的报告会发现，仅在
  2002 年至 2011 年间，中美两国之间就有一万亿美元的资金流动涉及纽约房地产。^(⁷⁴)在打击腐败和金融犯罪方面，分布式账本可以提供更开放的信息来源，从而阻止个人将非法资金投入房地产。所有这些也会拖慢交易流程的速度，通常需要数月时间，而如果是跨国房地产交易，甚至可能需要数年。


  我们之前提到过购置房产的高昂成本。不仅要考虑房产本身的价格，还有与购房相关的其他费用。税费、公证费、办理费、过户费、汇兑费、中介费、投资成本等等，这些费用让许多进入市场的投资者不堪重负。通过去除中间环节，这些成本也可以降至最低水平。


  当然，这些想法并非新鲜事物，在世界各地已广泛传播，并催生了许多利用区块链技术改变房地产市场的初创公司。其中一家叫`PropertyClub`^(⁷⁵)，旨在提升房地产市场透明度，方便人们在纽约寻找房产。


  另一家是`Managego`，专注于房地产市场中的业主需求。它将租金支付、维修请求、租赁申请等流程数字化。^(⁷⁶)还有一家名为`Meridio`的初创公司，对房地产市场有着独特的思路。^([⁷⁷
  (#fn77))它希望通过股权分割使房产更具可交易性。这样一来，房产所有权可以由众多投资者共同持有，这些份额可以在其平台上进行交易。同时，这降低了交易成本，并降低了进入市场的投资门槛。还有许多其他初创公司采用不同的方法进入房地产市场，但关键要点在于，区块链技术有助于改善市场参与者当前面临的挑战。无论你是否相信这项技术，这些初创公司都会存在下去，并将改变当前的市场流程。




  #### 法律行业


  法律行业在变革与创新方面出了名的迟缓。其许多实践在程序上几乎一成不变。然而，区块链技术的压力与日俱增，初创公司正试图重塑格局，以期所有参与者都能迎来真正的改变。为什么在新技术应用于法律领域时总是存在压力？因为总有一个问题：应用某项技术会带来怎样的法律后果。这意味着，分布式账本的应用本身就可能对某个流程的法律结果产生影响。没有哪个行业在应用新技术时会面临如此根本性的问题。这本身就会引发看似无休止的法律讨论。本质上，许多国家需要对法律本身进行修改，区块链技术才能真正得以应用。当我说法律变革是必要的，这意味着需要有清晰、不容多重解释的监管规定。即便存在开放性解释，也应是旨在支持新程序和新技术的应用。


  另一个我们需要考虑的重要方面是，当你作为外部参与者进入法律行业时的情形。我们所有人都会在人生的某些关键时刻与法律职业打交道。根据我们面临的情况，律师、公证人、法律书记员和法官会协助我们处理诸多事务，例如结婚、离婚、购房以及处理亲人的离世。对于不熟悉法律职业的参与者来说，这些程序往往晦涩难懂，更不用说理解他们所作任何决定的法律规定了。除此之外，法律服务费用通常相当高昂。这导致人们在需要时，更不愿向法律专业人士求助，甚至犹豫不决。


  律师事务所也在过去几年中经历了变革。根据所专攻的法律领域不同，“经典”的家族办公室已不复当年模样。大型律师事务所正纷纷进入市场，争夺企业客户的合同。^(⁷⁸)


  那么，我们究竟能在法律领域的哪些方面看到区块链技术的具体优势呢（因为有人可能会认为，任何形式的数字化都可能对整个行业产生重大影响）？一如既往，智能合约功能的存在有助于实现请求、法律合同及其结果的自动化。这可能会催生能以更低成本提供的新产品。通过为任何外行人添加清晰易懂的描述，完全可以创造出一个全新的市场。^(⁷⁹)
  向任何有需要的人开放市场，提供清晰的解释和更低的成本，这可能意味着法律职业的民主化。透明性也会随之提高，因为法律合同的结果可以在一个固定集合中明确定义。人们将不再能对合同的存在或可能的结果产生异议。同样，区块链平台可以通过明确定义某项知识产权的所有者以及权利如何转让给另一方，来帮助解决当前的知识产权纠纷。这些信息可以公开，从而避免争议，所有相关方无需第三方即可透明地行事。


  法律行业与区块链世界相互关联的最后一个显而易见之处在于技术本身。ICO、加密货币和开放投资机制的存在，打开了一个全新的世界。尽管涌现了许多新机遇，但总有人会利用这种局面牟利。这导致了明显的盗窃或向投资者发布误导信息的情况。由于该技术及其所有可能性通常尚缺乏明确的法律框架，熟悉这一概念的律师可以帮助塑造未来的世界。^(⁸⁰)
  与智能合约相关的显著例子包括美国的亚利桑那州和田纳西州，它们已承认智能合约的数字签名具有法律约束力。^(⁸¹,⁸²)


  抓住这一机遇的初创公司之一是 `Legal Nodes`。^(⁸³) 令人惊讶的是，它声称符合 GDPR 规定，因为它采取了多项法律、组织和技术措施来实现这一目标（尽管他们没有具体说明这意味着什么）。其平台可用于法律支持、并购交易、公司架构以及法律援助。另一个倡导区块链技术的重要机构是
  `Empowered Law`^(⁸⁴)，它致力于将公共记录保存在区块链平台上，使其易于访问。其他明显的机会在于公证服务，这对几乎所有社会的运转都至关重要。随着新技术的出现，这一几乎古老的职业可能会在工作方式、用户友好度和成本方面发生彻底改变。最后，还有优化公司备案的可能性。例如，IBM
  已成为特拉华州新公司备案系统的未来区块链供应商。^(⁸⁵) 这可以降低成本、提高透明度并实现流程自动化。




  #### 供应链


  你可能不会立刻意识到，但供应链为区块链技术提供了一个清晰的应用场景。它并非一个特定的行业，而是由在供应链中相互协作的人员、企业和不同行业组成的集合。通常情况下，它涉及一个由供应商、运输公司、销售商和客户组成的完整网络，这些参与者之间会进行一次性或更长期的互动，且不受地域限制。由于这是当今任何行业的基本要素，因此有诸多理由对现有的流程和程序提出质疑。供应链流程往往成本高昂，因流程和程序的低效导致大量延误，对需求变化缺乏灵活性，并且基于更传统的运作方式。诚然，如果我们审视那些正在颠覆整个行业的新技术，往往会发现当前供应链流程中缺乏这些技术。随着客户要求更好的体验、更多的按需产品和服务、灵活性以及快速解决问题，重大的变革即将到来。


  正如我多次强调的，区块链技术并非能简单解决所有这些问题的神奇方案。但它可能是推动当前未能发生的必要变革的技术之一。和往常一样，一个主要的关注点可能在于降低当前供应链流程中因低效而产生的成本。通过消除第三方并直接合作，可以借助透明的信息共享来降低成本，并确保无需在多个银行账户之间进行多次支付。智能合约可能是一种有价值的解决方案，可以在货物交付时被触发。与此相关的问题是供应链流程中参与方之间的数据收集与共享^(⁸⁶)。数据无法在特定供应链的不同合作伙伴之间高效共享和集成，导致宝贵信息的丢失，而这些信息对于改进流程以及确保产品不丢失至关重要。延续这一趋势的是使用`EDI`（电子数据交换）系统，该系统以批量的方式向其他方发送信息。这些信息按特定间隔共享，这导致了定价变化或货件丢失等问题的出现。


  针对所有这些问题，区块链技术的应用可能会极大地改善当前的供应链流程。可口可乐公司就深谙此道。他们与 SAP 合作，在美国为其供应链创建了一个区块链解决方案^(⁸⁷)。北美可口可乐装瓶商协会（`CONA`）目前正与
  70 家制造商合作，利用他们的区块链解决方案处理每天交付给美国商店的 16 万瓶产品。通过改进流程，订单处理时间可以从原来的长达数月缩短至仅需几天。另一家重要公司是沃尔玛。他们专门为其食品供应链与
  IBM 展开了合作^(⁸⁸)。目前，他们追踪的是中国猪肉和墨西哥芒果，但人们不难预见其未来的潜力。


  目前已有多个平台被开发出来，旨在帮助供应链行业确保能够轻松集成区块链。`Insolar`^(⁸⁹) 提供了私有链和公有链的使用。这为可能的集成提供了最多的选项，因为它为迁移到其他解决方案留下了开放空间。其他专注于供应链的初创公司包括：`Skuchain`，旨在提高全球供应链流程的安全性和可见性；`SyncFab`，专注于采购订单管理；`Shipchain`，专注于货运智能合约；以及
  `Origintrail`，它为互联的供应链提供了一种数据交换协议。


  #### 资源


  与你对供应链流程的预期一致，在药品供应链和能源交易领域，也存在优化采矿业和一般行业市场的可能性。一个例子是必和必拓（BHP Billiton），它选择使用区块链技术来记录岩石和流体样本的移动情况，以便更好地保护为交付这些矿产而产生和报告的数据^(⁹⁰)。


  第二个例子与钻石市场有关，这些宝石往往来源于冲突地区。“血钻”这个术语并非人人熟悉，它指的是这些宝石被用来助长世界各地的冲突。它们助长了童工、儿童兵以及各种战争罪行，对此我不作详细讨论。通过使用分布式账本，我们可以帮助验证这些钻石和宝石的来源，确保在购买这些宝石时，我们不是在助长这种反人类的暴力。戴比尔斯（De
  Beers）公司负责约 30%的钻石开采、贸易和市场，他们已选择实施一个区块链解决方案，以帮助追踪宝石从源头到购买它们的客户的全过程^(⁹¹)。通过这种方式，该平台可以成为打击这些罪行的又一项措施。


  在此背景下，最后一个例子是初创公司 `Everledger`^(⁹²)。`Everledger` 已经开发了多个专注于钻石、宝石、矿物、葡萄酒、奢侈品和艺术品的行业应用。他们希望提高这些市场的透明度，以便实现清晰的合规流程和各方之间的信任。通过创建独特的身份，人们将不再对这些资源的来源存疑。




  ### 风险管理与网络安全


  区块链技术的引入将如何影响风险管理与网络安全领域，这无疑是一个值得探讨的问题。无论你信不信这项技术及其潜在应用，事实是，企业正在尝试使用分布式账本、应用程序和平台的新工作方式。这本身就意味着风险与安全将受到影响。随着新技术的出现，新的漏洞也随之产生，需要进行审查与测试。这要求专业人士不仅要理解技术及其应用，还要能编辑代码，以发现它可能被恶意利用的方式。根据具体应用，这些风险可能与操作风险、信用风险或流动性风险相关联（在某些情况下甚至涉及市场风险）。再次强调，理解应用及其潜在风险至关重要。


  然而，这项技术也可能带来优势。在数据方面，合规/安全环境中的几个关键特征是数据的可用性、保密性和完整性。分布式账本有助于满足这三项要求，因为通过存储哈希值可以轻松验证完整性。任何简单的更改都会导致完全不同的哈希值，从而让所有人都知道数据的完整性已受损。如果应用得当，区块链平台还能提升数据安全性，确保只有拥有必要权限的参与者才能访问数据。最后，可用性也能得到提升，因为不再存在单点故障。每个节点都拥有数据副本，因此当一个节点宕机时，参与者可以联系其他可用节点来访问数据。


  在数据合规领域，法规通常要求能够证明数据未被篡改或修改。借助存储在分布式账本上的不可变记录，这一点可以轻松实现。^(⁹³) 篡改数据可以被阻止，即使在某些情况下数据可以被更改，不可变的日志也能指明罪魁祸首。


  随着数据控制和透明度的提升，可以说客户的监督能力也能得到改善。以金融服务行业为例，`KYC`（了解你的客户）程序是一个众所周知的流程，需要对客户进行身份识别。这种身份识别需要经过几个步骤。整个流程成本高昂，对金融机构和客户来说都是沉重的负担。数字化能提供帮助，因为智能合约可以自动化信息收集流程的各个步骤，并且在出现冲突时，能自动通知内部部门或客户需要进行额外的数据验证。虽然该流程仍然是一种必要的麻烦（旨在保护金融服务行业和客户双方），但在数据完整性、案件处理以及测试方面，它可以得到改进。反洗钱流程是另一个可以通过区块链技术进行优化的可行候选领域。该领域已有几家初创公司正在研究这些流程，例如
  `KYC Chain`^(⁹⁴) 和 `Tradle`^(⁹⁵)。客户数据可以提供给监管机构，包括任何信息的实时更新。当然，这些流程只是更广泛的、至关重要的客户入驻程序的一部分，而该程序在未来可能会对客户变得更加友好。


  另一个可能的候选领域是“流程证明”，即核实数字是否确实如其所示。通过提供逐步的信息和数据验证，可以有效地防止欺诈，从而保护客户和投资者免受欺诈计划的侵害。几家初创公司正在开发相关应用，例如
  `Coinfirm`^(⁹⁶) 和 `QRC Group`^(⁹⁷)。


  第三个例子是所有权证明和监管链，这在许多行业和流程中都非常重要。通过以透明的方式提供不可变的记录，这些信息可用于优化许多当前容易发生欺诈，或者至少对外部观察者来说不透明的流程。一家正在研究这一课题的公司叫做
  `HyperProof`^(⁹⁸)。


  当然，这些举措大多关注风险/合规管理的定性方面，但理解定量专业人士也会感受到区块链技术的影响，应该并不困难。有了更好的数据，就可以创建出更能反映现实情况的更好模型。再加上你可以通过智能合约将数据与自动化处理联系起来，有时甚至可以与整个数学模型相连，你会发现流程可以得到优化，并且更不容易出现人为错误。


  在考虑区块链技术对网络安全的优势时，我们也可以考虑几点。其一，通过在分布式账本平台上创建身份，有可能防止访问欺诈。目前，公钥基础设施（`PKI`）模型中的中央机构（`CA`）可以做到这一点^(⁹⁹)。人们倾向于使用密码，但密码通常容易被猜到或被黑客破解。这给许多公司带来了持续的安全问题。从某种意义上说，使用集中式数据库，这为想要窃取信息的黑客创造了一个目标。可以说，在存储此类信息方面，去中心化的
  `PKI` 更加安全。网络安全领域的另一个可能性是使用区块链平台用于 DNS 服务器，从而使网络更能抵御 DDoS 攻击（此类攻击旨在击垮 DNS 服务的集中部分）。消除这个集中部分，就有可能消除攻击者的优势。




  #### 能源市场


  毫无疑问，能源市场是区块链技术一个非常有趣的应用场景。通过运用这些新技术，我们可以构建一个更具可持续性的市场，从而更高效地利用资源，并确保每个人都能进入这个市场。被视为基本公用事业的能源至今仍面临高成本问题，而分布式账本平台可以降低成本，对生产者、分销商和客户都有益。^(¹⁰⁰)
  根据一些报告，到 2025 年，区块链在能源市场的规模可能增长至 30 亿美元。^(¹⁰¹)


  我们可能会看到分布式账本平台在点对点（P2P）能源交易和去中心化市场中涌现，这些平台能够确保作为一种稀缺资源的能源，以最具成本效益的方式得到最高效的利用。随着该行业已经习惯于创新——太阳能、电动汽车、智能电表等未来还会不断涌现——区块链技术或将成为这场变革中不可或缺的一部分。在可持续性和资源来源可追溯的层面上，追溯这些来源有助于调整当前的市场形态。


  然而，“传统”能源行业同样会从中受益。石油和天然气贸易涉及众多参与者，与任何供应链一样，可以通过区块链平台实现成本降低、交易优化和透明度提升。同时，这也是一个受到严格监管的市场，对多个生产这些产品的国家实施制裁。为了确保石油或天然气并非来自受制裁地区，分布式账本技术可以提供资源来源的不可篡改证明。关于能源数据及其使用方式的报告也可以得到改进。智利政府就是一个例子，他们正在使用区块链技术来存储和报告能源数据。


  由于能源市场是一个全球性市场，欧盟等地区的跨境合作有望得到改善。它有助于跨国界共享信息，允许以低成本效益的方式进行大宗商品交易，创建实时数据存储库等等。通过将可再生能源（如传统能源资源）推向全球市场，这有助于从整体上推动世界变得更好。


  #### 银行业


  我们已经多次提到过——区块链技术诞生于 2008 年银行业危机之时。它最初是一种抗议，也是一种完全绕开整个金融行业的可能解决方案。因此，这些银行本身对这项技术及其可能的应用表现出非常浓厚的兴趣，这十分自然。这也意味着，到目前为止，该行业见证了最多的应用案例，因此也能在成功与失败两方面分享最多的经验。


  尽管行业对新出现的和未来的应用依然充满热情，但它们已从过去的错误中吸取了教训，不会在未充分考虑潜在风险或其他实施方案的情况下，轻易投身任何新的冒险。过去困扰银行的关键问题之一是：要在不堵塞整个网络的情况下，为更大规模的商业应用扩展解决方案十分困难，而这会导致客户不满，并最终导致客户逃离该平台。此外，围绕区块链技术的持续监管不确定性也一直是个问题，这使得对相关项目的进一步投资充满风险。


  一如既往，最棘手的方面是如何将多个参与方聚集在一起，共同开发一个平台。要让竞争对手合作，各方必须深刻理解促成此事对大家都有利的原因。这并不容易。以比利时的银行业和开放银行法规为例，规模较小的竞争对手们合作构建了一个合规且类似的开放
  API 平台，这使得第三方更容易与之对接。而另一方面，规模较大的参与者则各自选择了自己的道路，这最终使得第三方与所有大银行集成时成本更高。这与斯堪的纳维亚地区形成了鲜明对比，在那里，即使是跨境合作，银行业的大多数参与者也能够实现类似的平台。过去的这些经验教训告诉我们，与小参与者合作更容易（也许他们能从增强的客户服务和降低的成本中获得更多好处），同时，文化因素也很重要：某些国家的银行更愿意为了共同利益而相互合作。


  全球领先的银行一直在共同努力，研究这项技术如何优化他们现有的工作方式。其中一个令人兴奋的领域是汇款业务。向国外汇款一直是个麻烦事。不仅费用高昂，而且往往手续繁琐。区块链技术可以降低这种成本。


  其他可能通过使用区块链技术得到改进的流程包括反洗钱（Anti-Money Laundering）和“了解你的客户”（Know Your Customer）流程，在这些流程中，欺诈行为可以减少。身份可以验证，流程可以轻松审计，文档的有效性可以通过分布式账本得到保证。这些流程对客户来说通常很麻烦，但如果能够创建一个共享平台，客户就可以决定哪些金融机构可以访问这些信息。这意味着客户只需经历一次完整的流程，之后他所有的金融机构都可以访问同样的信息。信息更新也可以采用同样简化的流程，从而减少对客户的影响。


  金融普惠性也一直是推动在区块链平台上创建金融服务的重要原因。由于平台上的自动化降低了成本，可以吸引更广泛的客户群。同时，客户所需的一切操作都可以轻松通过智能手机完成。这或许仍是一个障碍，但比个人电脑的门槛要低得多。与智能手机绑定的数字身份可以被使用，而在其他情况下，识别客户身份几乎是不可能的。


  世界各地都在启动和测试新的项目，以改善货币和信贷市场。区块链曾承诺要在一夜之间改变金融业，这已被证明是一个谎言。尽管如此，仍有大量未被挖掘的潜力，可以用来彻底革新整个行业。虽然我们可能正处于金融业的“区块链疲劳”期——类似于过去的“人工智能寒冬”，那时人工智能不再流行——但我仍然相信，这项技术将会回归，并进一步改善银行业。



  #### 金融工具


  我们之前提到，区块链世界也涌现出了新型金融产品。需要立即说明的是，地方金融监管机构有权决定某个国家内何种工具属于合法金融工具。一些国家的定义相当宽泛，而另一些国家则试图让加密空间尽可能远离客户，以保护他们免受潜在损失。


  例如，自 2020 年 3 月 2 日起，德国的法律定义如下：“一种价值的数字表示形式，未由任何中央银行或公共机构发行或担保，且不一定与法律规定的货币挂钩，不具有法定货币或金钱的法律地位，但被自然人或法人接受为交换媒介，并能够以电子方式传输、存储和交易。”^(¹⁰²)
  这为可能的金融工具提供了非常广泛的基础，但也对监管计划和合规性提出了严格要求，以确保为合适的客户推荐合适的投资，从而避免风险厌恶型客户最终陷入高风险投资。


  正是这种通常不确定的监管环境，已被证明是进一步创新的障碍。这是一把双刃剑，因为新工具可以帮助那些无法获得常规金融服务的人维持生计并增加收益。另一方面，为那些通常不被充分理解的工具敞开大门，可能导致更高的风险（正如
  2008 年的银行业危机和 2018 年的加密市场崩盘向我们展示的那样）。


  若世界各地的监管机构能够协同合作，达成类似条款，便能减少监管的不确定性，为新型金融工具创造一个稳定的基础。在本书的后续章节中，您将读到关于加密货币监管的完整一节，其中真正展示了在对待加密货币时存在的解读差异。


  有趣的是，现在也有了专注于加密货币的投资基金。贷款工具、看跌和看涨期权以及自动化合约都已问世。


  ## 金融世界之外


  尽管对于许多人来说，区块链技术将永远与金融和金融行业联系在一起，但这并不意味着在区块链技术之外没有应用机会或可能性。人们可以关注许多不同的行业或部门，但以下部分仅列举了几个例子，以便您了解人们是如何以新颖且创新的方式使用分布式账本的。


  ### 媒体行业


  区块链技术可能证明其价值的一个重要领域是媒体和新闻界。^(¹⁰³) 在过去几年中，我们看到了几个例子，其中假新闻以有害的方式影响了人们的行为。这些往往是旨在诋毁某些政党或个人的定向尝试。它们还被用来左右政治决策，并攻击大公司的声誉。近期一个关于假新闻及其对世界负面影响的例子是新冠病毒。网络上散布着多种阴谋论。一种说法称，政府应对新冠病毒的传播负责，目的是将追踪标签通过疫苗注入人体，并利用
  5G 进行跟踪。另一种说法则称 5G 会抑制免疫系统，还有一种说法称新冠病毒自身传播某种无线电波，用以相互通信。这导致英国、荷兰等国家的人们纵火焚烧 5G 基站。这个例子展示了假新闻的危害性，打击这些伎俩应成为每个人的优先事项。


  在新闻文章方面，区块链平台可以提供可追溯性、透明度和安全性。它不仅能帮助验证特定文章的来源，还能让参与者将文章标记为假新闻，从而迫使那些滥用（去中心化）网络的人出局，并证明所传播信息的价值。*纽约时报*公司正在测试区块链技术，以打击假新闻和错误信息。^(¹⁰⁴)
  他们目前的概念验证会存储照片和视频的元数据，例如数据、图像地点、拍摄者、编辑方式以及最终发布方式。另一家使用分布式账本打击假新闻的公司是 Orange。你可能不会立刻想到一家电信运营商会关注假新闻，但作为通信过程中的主要运营商，他们看到并理解自己在传播假新闻中扮演着重要角色。^(¹⁰⁵)
  Orange 与名为 Block Expert 的初创公司合作，创建了名为 `safe.press` 的应用。^(¹⁰⁶)


  `safe.press` 应用允许你检查文章的来源，从而可以验证你正在阅读的文章是否可靠。虽然仍有可能有人试图欺骗来源，但这是迈向确保信息安全的一个非常有趣的步骤。它并非同类中的唯一一个，因此观察这些应用如何随时间演变将会很有趣。同样，你不应该对这一技术可能的缺点视而不见。如果一个国家控制其公民的互联网使用并控制所有新闻来源，那么它实际上就控制了其公民通过大多数来源接收到的所有信息。


  当然，区块链技术在媒体领域的可能性更为广泛。^(¹⁰⁷) 我们目前正在经历多个平台的兴起（与衰落），这些平台允许任何拥有电脑和互联网连接的人参与媒体行业。但这并不能消除市场中仍存在掌控市场的大型参与者的事实。这导致了对内容实际创作者的不公平补偿。通过基于区块链的平台，所有创作者都可以因其内容和财产的使用而获得直接补偿。这还可用于追踪授权观众、内容使用情况、所有权转移，以及能够端到端管理整个流程的智能合约。这有效地消除了与通常未能按应有标准补偿创作者的中介合作的需求。


  许多初创公司看到了这些机会，并带着特定解决方案进入了媒体行业。我们在本书前面提到过一些初创公司，如 `Ujo Team`、`Opus Foundation` 和
  `Stem`，它们特别侧重于流媒体行业。它们为独立音乐发行提供渠道，让艺术家在报酬方面拥有自由，普遍实现版税支付的自动化，并允许以开放和分布式的方式与粉丝接触，使任何人都无法被屏蔽内容。


  媒体行业的另一个重要议题是知识产权，以及在现代如何保护这些权利。盗版并非新鲜事，大多数人都知道如何获取几乎任何东西的免费副本。区块链技术不仅能帮助管理有权访问特定内容的授权用户，还能帮助管理所有内容并添加时间戳。这将有效防止流程中任何环节的篡改尝试。像
  `Mediachain` 和 `Monegraph` 这样的初创公司专注于这个主题，并希望赋能创作者。


  我们还应该考虑需要购票的公共活动。每年都有许多这方面的欺诈企图。同样，在销售盗版周边商品方面也有大量此类尝试。正如我们之前提到的，区块链技术可以提供额外的真实性保障。^(¹⁰⁸)




  ### 医疗卫生领域


  在使用区块链技术的应用领域中，医疗卫生领域可能并非你首先想到的。^(¹⁰⁹) 当想到个人敏感数据被锁在某个数据库中，并且任何人都可以访问时，这理应引起你的警惕。尽管如此，区块链技术仍可能对当今医疗行业的运作方式产生重大影响。该行业在医院的常规运作以及通常涉及医患关系的行政负担方面，并不以快速创新而闻名。^(¹¹⁰)
  时至今日，患者在接受诊断后不满意时，在不同医院重复挂号的情况仍然存在。检查在多家医院被重复进行，而这些医院往往对患者在其他机构已做过的检查毫不知情。目前虽有努力消除这些障碍，但这仍然是一个问题。其中的主要风险在于患者的安康。


  那么，我们关注的两大主要领域在哪里呢？患者身份识别和信息封锁。至今仍没有通用的患者身份标识，因此身份误认的情况仍可能发生。与此相关的是信息封锁，这可能导致患者护理出现问题。机构之间通常不共享信息，数据请求过程困难重重，程序繁琐，等待时间长，诸如此类。有时患者自己也会试图隐瞒信息，从而伤害自身。尽管这些信息本应向医疗专业人员提供，并且理应在患者请求下予以共享，但实际情况往往并非如此。另一个相关问题是，医院和其他机构通常资金有限，数据安全并非优先事项。这使得非常敏感的数据面临泄露风险，进而可能使人们因这些被共享的信息而受害。一个私有的分布式账本解决方案或许能解决这些当前普遍存在的问题。^(¹¹¹)


  当我们使用这样一个平台时，可以创建唯一的身份标识，从而杜绝身份误认或患者数据不匹配的情况。我们实际上可以减少医疗差错的数量。同理，医疗欺诈和滥用行为也能被遏制，因为一切都被记录在一个不可篡改的数据库中，确保每项操作都公开透明、有据可查。你可以让患者完全控制自己的数据，并与他们希望的个人和机构共享。另一方面，如果医疗从业者想要核实患者的其他数据是否存在，他们也可以做到。他们会立即获得数据访问权限吗？根据设置不同，答案是否定的。但如果他们向患者请求该信息，而患者拒绝共享，那么为了患者的利益，医疗从业者必须采取适当的预防措施。一个例子是阿片类药物危机，患者谎称受伤、自残，或试图在多家机构针对同一伤情获取药物。^(¹¹²)
  只有通过适当的信息共享，才能保护患者并制止滥用行为。患者还可以通过与区块链平台关联的奖励机制获得奖励，激励他们遵循健康的生活方式、遵守护理计划或采取措施保持健康。


  医疗卫生领域的另一个重要方面是制药行业，这是一个庞大的产业。每天都有大量药品被销售，其中一部分最终落入不法之徒手中。还有伪造的、并非来自真正供应商的产品在销售环节的某个中间环节出现，使患者面临危险。仅假药一项就给制药行业造成了
  2000 亿美元的损失，由此可知这是一个重大问题。目标是在成本方面降低这些假药的影响，并减少许多人因这些假药而面临的重大风险。


  一个区块链平台可以在药品运输过程中验证特定药品的存在。类似地，许多药品会因各种原因被批发商退回。^(¹¹³) 这些药品通常不会被销毁，而是被重新销售。在第二次销售发生之前，需要验证药品的真伪，以确保它们是同一种药物。欧盟制定了《防伪药指令》，要求药品必须序列化/加贴条形码并上传至中央数据库。在美国和其他国家，情况并非如此，因此区块链应用可能再次对市场产生积极影响。同样，这也可以防止假药被销售，因为假药无法在系统中获得验证。


  区块链还可以用于验证患者对临床试验数据的同意，以及测试结果的有效性。这不仅是为了验证研究结果，也是为了确保受试者的福祉始终得到尊重。一家专注于这一领域的初创公司名为
  `Clinico`。^(¹¹⁴)


  与之前介绍的用例一致，分布式账本平台可以帮助创建一个通用数据库，从而为我们提供一个关于新药和药品的临床试验、追踪药品和药物的生产及其全球分销的清晰数据库。这意味着，如果能说服所有供应商和经销商在一个主要系统中协同合作，我们将能够淘汰大量假药，原因很简单：区块链中的数据是不可篡改的，而中间环节的处理者无法随意修改数据以满足自身需求。由于每项操作都有清晰的日志记录，任何人都无法否认参与了欺诈或假冒产品的生产。


  医疗保健领域特有的保险欺诈是另一个令人担忧的问题。一家名为 `ALLIVE` 的初创公司正在探讨这个问题。^(¹¹⁵) 在此，数据可以根据客户提出的请求与保险公司共享，并且可以与医疗专业人员的验证关联起来。这样一来，欺诈参与者必须至少有几个同伙才能成功，而他们的合作行为将被永久记录在区块链中。^(¹¹⁶)


  其他可能的优势包括因减少许多医院的行政负担而降低成本。区块链还可以增强医疗交易的安全性及其控制（人们可能会对机密数据有时被处理的方式感到惊讶，但这并不仅仅发生在医疗领域），改善医患互动，追踪医疗交易等等。


  同样，我们应该始终牢记我们在如何处理敏感的个人数据，而不是盲目地跳向新的解决方案。这些考量决定了众多患者的未来，并且在注重数据保护的前提下，我们应该带着清晰的愿景向前迈进。




  ### 公共部门


  在公共部门中，已经识别出多种实施区块链和分布式账本技术的可能性，并且部分已得到应用。我想强调的公共部门第一个方面与养老金有关。


  在欧洲乃至全球，养老金都是选举临近时的核心议题之一。原因之一是养老金占据了政府支出的很大一部分。这就是为什么在比利时以及许多其他国家，存在着所谓的*三支柱*体系。第一支柱是政府在你退休时提供的保障，第二支柱是你的雇主为你储蓄的部分，第三支柱则是你个人自愿预留的资金。


  大多数国家当前养老金计划面临的主要问题在于，需要由在职劳动人口来支付退休人口的养老金。在人口持续增长的时期，这并非问题，但随着出生率下降，该体系正面临严峻挑战。


  区块链来拯救！如果事情真有这么简单就好了。不过，确实有人提出了一些解决方案，至少能部分应对我们当前面临的挑战。这里我们将提及其中几个方案。


  人们目前对养老金计划有何期望？一个易于理解的体系，能让参与者明白如何保障自己的财务未来，并以安全的方式投资。如果可能的话，它应该简便、低成本、无欺诈且容易理解。


  正是为了这个目的，多个参与者已进入市场：帮助人们以一种他们能够信任和理解的方式为自己的未来投资。当然，这绝不可能解决我之前描述体系中的前两大支柱问题，但至少能让人们对自己能为未来预留多少资金有更多把握。


  一个很好的例子是`NestEgg`^(¹¹⁷)，这是荷兰一个基于区块链的解决方案，允许参与者众筹某些可持续基础设施。如果众筹成功，基础设施就会建成，参与者便成为该基础设施的部分所有者。每个产品都有其自身的投资政策（`NestEgg`与荷兰最大的养老基金`AGP`挂钩），你可以选择减少能源账单，或将收益存入银行账户。通过这种方式，你可以慢慢（最低
  25 欧元即可开始投资）增加个人储蓄，同时维持生活成本。与此同时，你也在为未来的基础设施建设提供资金。


  我想在此强调的第二个项目是`Akropolis`。它也专注于第三支柱，面向有兴趣创建个人投资基金的参与者。以去中心化的方式，每个参与者可以选择投资于哪些养老金产品。所有交易以及最终的基金业绩都是透明的。对基金的审计可以毫无障碍地进行。


  当然，当我们审视公共部门时，还可以考虑许多其他可以应用区块链的领域。其中一个领域是合作的概念。无论你身处欧盟还是世界其他地方，与私营部门的合作或公共实体之间的合作都很常见。通过使用区块链平台，可以提升这些合作项目的透明度，从而开启更多机遇和参与可能性。它还能提供政府资金如何支出、决策如何制定以及这些合作产生了何种成果的洞察。目前，这些平台和政府间合作对于任何试图从外部观察的人来说（甚至常常对直接参与其中的人来说）都往往是
  opaque 的，而通过分布式账本，这些治理体系可以变得更加透明。当受合作决策影响的人们能够参与并对他们想要实施的项目进行投票时，这也能使流程民主化，直接将权力赋予受决策影响的公民。^(¹¹⁸)


  这些平台还可以用于减少该领域的欺诈行为，并以清晰、透明且安全的方式管理资金。通过将资金与区块链技术挂钩，还可以通过实施智能合约来提高合规性——如果请求合规，合约会自动触发；如果不符合要求，则会启动监管行动。^(¹¹⁹)
  其他可能性包括政府与公民数据的安全存储、可信政府以及民用在线系统。这些应用可以降低许多现有应用的成本。对于如今任何需要与行政机构打交道的人来说，这很可能是一件麻烦事。为什么？大多数时候，你只有在遇到问题时才会与政府打交道，因此任何流程从一开始就显得缓慢而痛苦。如果你考虑到很多流程确实已经过时，你就会开始理解许多人在想到要与政府打交道时所产生的挫败感。既然这种挫败感很可能持续存在，那么这些应用可以将这些感受降至最低。




  ### 身份与投票应用


  在讨论区块链技术时，身份是其相当重要的组成部分。可追溯性和透明性只有在能够确保平台内的身份时才有效。幸运的是，通过分布式账本应用可以轻松实现这一点。与许多事物一样，如果你生活在民主国家，投票是生活中不可或缺的一部分。任何人都能理解，投票过程存在若干风险。欺诈和欺骗是其中两种风险。但还有更普遍的问题，许多人可能也能理解，那就是投票过程本身带来的简单挫败感。清晨早起，或从工作中匆忙赶往投票站，只为排队等候，以便投下自己的一票。由于技术故障，或者所有其他公民都与你想法一致、在最后一刻蜂拥而至，你可能最终要排队数小时。^(¹²⁰)
  当然，还有其他情况，例如人们被“不明”势力阻止投票，某些地方的选票凭空消失，或者选票似乎随时间而改变。最重要的是，事实已变得很清楚：公民的投票率正在随时间下降（有时甚至急剧下降）。


  早在 2012 年，就已经有研究探讨将区块链技术用于投票过程的可能性，以便使其对公民来说既更安全又更可靠。^(¹²¹) 如果你理解区块链技术的基本原理，应该不难看出该技术如何能改进整个流程。它可以锁定选票，证明每位公民只投了一次票，并允许人们在家中投票。投票结果的处理速度可以比今天快得多。这也意味着，公众咨询可能成为日常生活的一部分，因为通过数字手段进行投票可能会容易得多。


  多家初创公司已抓住机会优化这一流程，并正在提供（或开发）可能有朝一日取代我们今天所熟悉流程的解决方案。其中一家初创公司名为 FollowMyVote。^(¹²²)
  该公司相信，使用数字和技术解决方案（其中区块链技术是主要部分）可以改变政府选举。它用于政党投票、学院投票、业主协会投票和代理投票。该公司使用 BitShares
  平台，并相信这是提供具有可预测工作方式的可靠应用的最佳途径。


  第二家专注于该领域的初创公司名为 BitCongress。^(¹²³) 他们早在 2016 年就发布了一份白皮书，提出了他们的解决方案。^(¹²⁴) 它采用基于代币的系统，参与者可以根据他们拥有的`VOTE`代币数量进行投票。


  并非所有人都对当前进展以及区块链技术在投票领域的使用感到满意。有一些警告指出，转向数字解决方案可能会给投票过程带来额外风险，甚至可能对民主构成威胁。^(¹²⁵)
  迄今为止，所报道的研究对基于互联网的投票并不持积极态度。^(¹²⁶) 目前，在若干流程中已有在线投票在进行。其中一个例子是美国的大选过程，2016 年已有超过
  10 万张选票是在线投出的。那么，为什么研究结果目前是负面的呢？这是否专门与区块链有关？当然不是。任何关注近年新闻的人都知晓并应理解数据和基于互联网的应用的风险。影响潜在选民是一回事，用假新闻轰炸公民是另一回事，但实际的选举过程呢？考虑到我们迄今看到的结果，想象一下如果攻击者真的能够侵入其中会发生什么。恶意软件和网络安全风险的潜在可能性是多方面的。


  区块链技术无法简单地消除这些风险。因此，与其仅仅说我们应该使用分布式账本作为新的数字化投票方式的基础，不如说分布式账本应该只是帮助我们开发更简单、更准确的投票系统的几个支柱之一。应用的整体安全性、数据的隐私和完整性，以及为选民提供可靠信息，都是关键问题。在前进之前，我们不应忽视这些关键考量，因为如果我们未能提供这些保障，可能带来的风险将比任何其他领域都更具破坏性。


  ### 游戏产业


  2018 年，视频游戏领域的花费约为 1380 亿美元，这使得游戏行业成为一个绝不可忽视的领域。^(¹²⁷) 更重要的是，这是一个非常愿意投身于创新和新技术的行业。虚拟现实、人工智能以及体验游戏的最新标准，意味着区块链可以在其中发挥作用。


  当考虑这个行业时，可以发现许多可能性。许多游戏提供游戏内购买，这让一些玩家感到沮丧。分布式账本可以提供去中心化交易所。如果你不熟悉游戏，可能很难理解，但黑客攻击、欺诈和盗窃在这个虚拟世界中是真实存在的问题。考虑到获取这些资产所花费的金钱、时间和精力，它们通常被视为与任何其他有形资产一样有价值。区块链技术还可以提供所有权证明，保护游戏玩家免受欺诈参与者的侵害。借助分布式账本，黑客将无法再窃取财产。此外，玩家取得的进展和对话也可以被存储。当某些事件发生时，参与者之间发生的事情就有证据可查，这意味着管理员可以提供清晰的解决方案。这仅是对区块链技术如何影响游戏行业的一个保守看法。^(¹²⁸)


  随着创建更开放世界、大规模多人游戏体验和无限制规则的趋势，传统的设置已无法完全把握这类游戏。为什么？参与者来自世界各地，共同朝着特定目标和目的努力。因此，集中控制不再是好事。人们不希望看到对任何玩家的歧视。分布式账本追求公平、开放和包容，能够提供这些控制机制。已经进行了若干实验，以探索我们如何从中心化解决方案发展到去中心化设置，让玩家对他们所互动的环境获得更多控制权。


  一个值得注意的例子是 Taurion，这是一款现代复杂游戏。^(¹²⁹) 玩家完全掌控他们周围的世界。同时，游戏中存在特定的挖矿系统；可以获取经验，人们可以进行交易、战斗等。这是一个显著的例子，展示了游戏体验如何演变，玩家获得越来越多的控制权，而不是被游戏环境的规则所束缚。这可以使体验更加逼真和引人入胜。




  ### 教育


  该领域面临一系列重大挑战，例如行业的开放性问题。每个人都能接受教育，这是一个合理的准则。但现实情况却截然不同。遗憾的是，时至今日，仍有许多人没有平等的机会，无法像他们本应拥有的那样参与到教育体系中。除此之外，优质教育的成本多年来持续上涨，导致巨额债务，甚至让许多人根本无法开始他们理想中的学业轨道。教师们也会告诉你，愿意积极参与课堂的人数正在下降，而且在许多国家，教育专业人士普遍短缺。


  然而，未来并非一片黯淡。教育技术领域出现了一波有趣的崛起。虚拟现实和人工智能等新技术正被轻松整合到课堂中，区块链技术也有一席之地。这些解决方案不会解决困扰教育行业的所有问题，但它们正在改变知识共享的方式，并可能为当前的困境带来希望。`edtech`
  行业^(¹³⁰)预估在 2020 年将达到 940 亿美元，这表明我们应该认真对待这个行业。


  区块链技术发挥重要作用的首个领域是颁发文凭或证书。越来越多的数字课程已经面世，且（通常）价格低廉或合理。实际的文凭本身可以通过区块链平台进行发行和链接。这能带来若干好处。首先，再也无法质疑学生是否获得了他的文凭。其次，学生可以轻松地与潜在雇主分享其证明，并完全掌控自己的个人数据。人们将无法伪造或谎报文凭。^(¹³¹)教育机构和/或政府之间的信息共享将变得容易得多，学分、赞助和成绩都可以轻松得到验证。同时，与许多大学或学校当前的能力相比，它提供了一种更安全的存储信息方式。许多其他行业也因资源有限、无法在网络安全或凭证存储上投入大量资金而深受其困。通过使用分布式账本，他们可以更好地保护这些信息。


  我们之前已经多次提及，但教育成本高昂且似乎仍在不断增长。为了改善通往有价值学位的路径，已经发起了几项举措。其中之一是 MOOC（大规模开放在线课程）的发展。2018
  年，MOOC 的注册用户超过 1.01 亿，这表明越来越多的人正转向这个方向进行深造。^(¹³²)在这里，区块链不仅可以用于存储凭证，还可以利用微支付、自动化考试与课程交付的智能合约等技术。在向学生和图书馆服务共享信息的方式上也蕴藏着潜力。区块链技术能够以更实惠、更符合社会规范的方式帮助分发信息。^(¹³³)


  一家专注于教育和分布式账本技术的初创公司是 `Disciplina`。^(¹³⁴`它专注于考试准备和学习。


  ### 人力资源


  在任何公司中，人力资源或 HR 职能都承担着广泛而重要的工作。企业与供应商、人员、活动及流程之间的沟通，均由该部门进行协调。目前，报纸上经常谈论的是，HR 和招聘专业人士在许多不同领域正在参与一场“人才争夺战”。我们不应低估该行业许多人感受到的压力，并且，一如既往，我们可以假设区块链技术能够在某种程度上缓解这种压力。^(¹³⁵)


  试想一下，利用智能合约，内部人才管理和外部人才寻源的管理可以在一定程度上实现自动化。预算审批、授权和审查一样，都可以与严格的规则挂钩。新员工可以接受自动化测试和培训。公司政策可以轻松共享，数字签名可以在区块链平台上得到验证。背景调查和雇佣核查只需轻轻一点即可完成。


  同样，雇佣合同也可以通过这种方式进行管理、存储并与员工共享。未来的变更可以随时进行管理和追踪。薪资和福利可以在区块链平台上完全自动化处理，无需任何人工干预，从而简化支付流程、提供可验证的付款记录，并留下完美的审计痕迹。


  外部人才可以通过同一个平台进行联系、签约和支付。在居家办公和远程办公日益成为社会常态的世界里，他们可以更轻松地被管理。与许多其他例子一样，区块链有助于防止欺诈，提升个人数据的安全性，并通过网络节点的验证来提供存证服务。^(¹³⁶)


  ### 汽车工业


  随着联网汽车、车队和自动驾驶汽车的兴起，汽车工业对互联互通的需求日益增长。这些联网车辆需要能够接收这些信号的基础设施。该行业目前正在研究区块链技术能否作为一个清晰的基础设施层。当前的问题在于，每个制造商都在创造自己相互竞争的技术，缺乏统一标准，导致这些实施方案不协调、不兼容且造成浪费。^(¹³⁷)随着越来越多的物联网解决方案应用于这些轿车和卡车中，我们在车队管理、支付服务、车载信息娱乐系统及其他服务方面可以实现巨大的优化。


  区块链可以帮助大型企业管理车辆。再次强调，透明度可以得到提升，整个车辆管理和来源验证的流程将因此得以简化。你还可以考虑保险和支付流程、车辆来源验证，甚至`KYS`（了解你的供应商）流程——这些流程对于证明车辆并非被盗、且由卖方负责至关重要。同样地，我们必须能够核实车辆进行过的维修。我们能信任执行这些维修的任何人吗？维修前的车况如何？报告的里程数是否准确？^(¹³⁸)所有这些问题都可以通过使用分布式账本来回答。




  ### 智能手机行业


  你可能不会立刻想到，但手机可以通过区块链技术被改变。全球的智能手机制造商都听到了去中心化网络的召唤，其中最大的参与者之一就是三星。^(¹³⁹) Galaxy S10
  就是一个例子，它包含了一个用于存储加密货币私钥的安全存储系统。其他参与者包括 HTC 的 Exodus 1、Sirin Labs 的 Finney 以及 Electroneum。


  正如我们之前在讨论区块链技术方面时所提到的，这些平台支持去中心化应用。这些应用构成了 Web 3.0 的基础。其理念是，我们再次远离大公司的中心化服务器，允许智能手机之间实现点对点技术。那么，是什么阻止了这些应用成为主流呢？


  有几个问题浮现出来，例如可扩展性和监管不确定性。另一个问题是，要使用去中心化应用，你需要懂技术。如果一家公司能够绕过这些技术障碍，他们不仅能让去中心化应用成为主流，还能为全球客户打开一个全新的世界。


  '
- '# 区块链与监管：法律世界


  随着区块链以数据与金融工具相关的新可能性进入世界，决策者花费了大量时间来审视这项技术，并引入了既相关又必要的监管措施，以保护人们免受该技术潜在风险的侵害。本章简要介绍了当前围绕分布式账本技术正在辩论的主要概念。


  当我们审视区块链技术与监管时，我们会发现自己身处浑水之中。全球范围内关于这一主题的法规经常变化。根据技术的不同方面（如`ICO`、加密货币、分布式账本等），同一国家或地区内可能存在不同的观点。因此，我的目的并非撰写一份关于当前监管的详尽概述。请仅将本章视为现有监管的指南，而绝非固定不变的真理！




  ## 欧洲的税收与加密货币监管


  首先，从`比特币`网络入手或许会更容易。为什么呢？因为它是迄今为止最知名的加密货币，因此相比其他现存的山寨币，它更受监管机构的关注。


  以欧盟为例，比特币具有合法地位，其兑换交易至今仍免征增值税/商品及服务税，而涉及商品和服务的交易则需缴纳所得税。^(¹⁴⁰) 在比特币本身的监管方面，过去曾有一些令人困惑的信号。欧洲央行在
  2015 年表示，金融领域监管不适用于比特币，因为它不涉及传统金融参与者；而另一些人则认为，现有规则可以扩展到比特币及其参与者。^(¹⁴¹,¹⁴²) 然而，欧洲内部正推动加强对加密货币的监管并引入更严格的规则，其依据是《反洗钱指令》（AMLD5），该指令要求各成员国在
  2020 年 1 月前将其转化为国内法律。^(¹⁴³) 此外，2016 年一项部长级决议执行了欧洲法院的一项判决。该判决认定，涉及加密资产与法定货币兑换的任何交易均不可享受税收抵扣。这意味着所有加密交易均需缴纳增值税。^(¹⁴⁴)


  着眼于具体成员国，我们看到德国强制要求资产交易所、加密支付及托管服务提供商向德国联邦金融监管局（Bafin）申请牌照。除此之外，加密货币被视为金融工具。这为有意参与市场者提供了极大清晰度，但也引发了担忧，认为这会将区块链公司推向海外或导致服务（如
  Bitpay）停摆。^(¹⁴⁵) 与德国关系密切的列支敦士登小国历来对数字化变革持有利态度，同样拥抱了加密货币世界。2019 年 10 月 3 日，《代币及可信技术服务提供商法案》（TVTG）获批。^(¹⁴⁶)
  凭借这一新监管框架，列支敦士登实际上成为全球首个对代币经济进行监管的国家。该法案采用了“代币容器模型”概念，规定“代币作为各类权利的容器，无论这些权利是股票、房地产还是许可权。”这项新规也阐明了防止洗钱和恐怖主义融资所需采取的措施。借助新框架，其目标是成为能够承载加密经济并吸引投资者和公司到列支敦士登的国家之一。在奥地利，财政部提议为金融科技行业设立监管沙盒，以便企业在金融市场监管局（FMA）监督下在限定时间内测试其商业模式，这则消息引人关注。^(¹⁴⁷)
  这与英国金融行为监管局（FCA）开发的沙盒有关。与欧盟其他成员国一样，AMLD5 将被纳入国内法律，但除此之外，对交易所、矿工、代币发行方及赞助方尚无具体监管规定。


  同样，我们看到捷克共和国对加密行业的监管也趋于严格。企业需向国家贸易许可办公室申请牌照，否则将面临巨额罚款。^(¹⁴⁸) 邻国斯洛伐克对加密货币持双重看法：既视作交换媒介，也视为投资资产。^(¹⁴⁹)
  个人的利润需缴纳所得税（相关活动成本可从总额中扣除），最终税率要么是 19%，要么是 25%（取决于利润是否高于 35,022.31 欧元）。对于企业而言，加密货币被视为除现金外的短期金融资产。


  爱沙尼亚历来对加密行业非常开放。^(¹⁵⁰) 过去曾有发行国家数字货币的计划（后被放弃），而现有的电子公民计划也显示了爱沙尼亚对加密行业及其带来的创新的开放态度。加密货币被归类为“以数字形式呈现的价值”，与许多其他国家一样，这些加密货币被视为需纳税的数字资产，但免征增值税。随着
  2017 年的反洗钱/反恐融资法案以及欧盟新指令的出台，监管措施得到加强，以收紧控制并完善现有的牌照制度。拉脱维亚也已开始承认加密货币以便对其征税。该国与立陶宛（及爱沙尼亚）早在
  2017 年就签署了一份谅解备忘录。该备忘录的焦点比加密货币更广泛（关注的是金融市场），但加密货币被纳入其中表明它们已被严肃视为金融市场的一部分。


  英国（尽管目前仍在处理脱欧谈判）仍受欧盟已颁布法规的约束。尽管目前尚无专门的加密货币法律，但交易所需向金融行为监管局注册，且加密货币不被视为法定货币。^(¹⁵¹)
  此处的加密行业投资需根据具体情况缴纳资本利得税和所得税。随着英国国内与加密行业的磋商正在进行，针对该行业的新法规即将出台。这为参与者及企业制定详细指引铺平了道路。^(¹⁵²)


  在法国，我们发现加密货币世界在很大程度上也未受监管，目前仅有两项关于区块链技术的法令。^(¹⁵³) 第一项允许将区块链技术用于零息债券（minibon）。^(¹⁵⁴)
  第二项则允许将该技术进一步用于金融工具。^(¹⁵⁵) 法国金融市场管理局（AMF）和审慎监管局（ACPR）也对加密货币的内在风险发出了警告，因为比特币及其他加密货币不属于法国的金融工具监管范畴。^(¹⁵⁶)
  与此类似，比利时发布了一份清单，列出了在考虑加密市场时不应信赖的来源。^(¹⁵⁷) 在法国税收方面，出售加密货币所得收益需缴纳资本利得税（偶尔为之与专业操作规则不同），这些收益也被纳入财富税和赠与税的计算范围。与其他国家一样，未来仍需进一步明确相关细则。




  在比利时，金融与市场管理局（FSMA）禁止向散户投资者推销收益取决于虚拟货币的产品。^(¹⁵⁸)过去曾多次发出警告，提醒比利时公民注意投资加密货币可能存在的危险。目前，没有机构对虚拟货币进行审慎监管，银行账户的存款保障机制也不适用于虚拟货币。^(¹⁵⁹)比利时尚无计划建立本国监管框架，因为政府和立法机构呼吁在欧洲层面加强监管并明确规则，以便在国内实施。另一方面，荷兰已采取措施监管加密货币服务提供商，以打击洗钱活动。^(¹⁶⁰)服务提供商需在荷兰国家银行正式注册，并接受一系列措施监管。2019
  年，卢森堡通过一项法案，为基于区块链网络发行的证券提供法律框架。其目的是保护投资者，并减少交易所需的中间环节。^(¹⁶¹)


  瑞士对加密货币持开明态度，交易所是合法的。瑞士联邦税务管理局（SFTA）将加密货币视为资产。^(¹⁶²)这些交易所需要申请许可证，首次代币发行（ICO）也是合法的，但必须根据具体情况遵守不同的规则。


  在意大利，第 90/2017 号法令将适用于传统货币兑换的监管规定延伸至加密货币兑换。加密货币交易的利润和亏损需缴纳公司税。至今，与加密货币税收相关的问题仍存在许多不确定性。过去，比特币及其他交易的收入被归类为外汇交易利润，需缴纳
  26%的税。圣马力诺小国于 2019 年年中批准了一项区块链和加密货币法规，旨在规范该领域并保护投资者。该法规区分了实用代币、投资代币和加密货币，但在某些情况下为企业提供税收减免。^(¹⁶³)


  在西班牙，有非常明确的法规来保护消费者和（散户）投资者免受可能的欺诈。加密货币不能作为法定货币（只有以欧元计价的纸币和硬币具有法定货币地位）。^(¹⁶⁴)2018
  年 2 月 8 日，西班牙证券与市场委员会（CNMV）和西班牙银行发出警告，提醒投资者不要投资加密货币或 ICO。根据具体情况，证券代币发行（STO）可能受《西班牙股票市场法》（LMV）相关法规的约束。迄今为止，该国唯一的实质监管与税收相关。出售加密货币所获得的资本利得税率为
  19%至 23%，除非买卖发生在 12 个月内（税率为 24.75%至 52%）。如果资本利得与企业相关，税率为 25%。目前尚无关于增值税的明确法规。


  马耳他于 2018 年 11 月 1 日推出了整套监管框架。^(¹⁶⁵)其目标是保护投资者并加强现有的加密货币产业。公司需要进行认证，有意进行 ICO 的公司必须符合相关规定。与许多其他国家相反，在葡萄牙买卖加密货币是免税的（第
  5717/2015 号裁定）。^(¹⁶⁶)然而，这不适用于用加密货币兑换商品和服务的情况，并且从事加密货币交易的专业人士/企业仍需缴纳某些税款。葡萄牙将加密货币视为一种货币形式，因此免征增值税和资本利得税。这意味着如果加密产业在欧洲真正起飞，该国未来可能成为某种意义上的税收天堂。


  瑞典多次要求就加密货币制定明确的监管指引。在致力于监管加密货币领域的同时，瑞典也在研究发行国家加密货币（e-krona）的可能性。^(¹⁶⁷)注意不要将其与`Kryptonex`混淆，后者是一个引诱对该项目感兴趣的人的骗局。^(¹⁶⁸)瑞典政府还拍卖了从债务人处没收的加密货币，以偿还其债务。^(¹⁶⁹)因此，尽管该国有时似乎对加密货币采取强硬立场，但其当局旨在保护公民免受这些投资可能带来的风险。


  在丹麦，丹麦税务当局最近获准从加密货币交易所收集用户数据，以检查他们是否已缴纳税款。^(¹⁷⁰)此外还成立了`Dansk Krypto Konsortium`，这是一个由丹麦区块链公司组成的团体，致力于推动该国建立监管框架。^(¹⁷¹)挪威也实施了新的反洗钱法规，适用于该国的加密货币交易所和存储服务提供商。^(¹⁷²)挪威金融监管局（`Finanstilsynet`）还表示，为客户存储私钥的公司被视为参与加密货币的转移、存储或购买。这意味着服务提供商必须注册并遵守新规。


  芬兰最近将欧盟反洗钱指令（`AMLD5`）转化为国内法规。芬兰金融监管局（`FIN-FSA`）表示，服务提供商若希望在该国开展业务，必须满足法定要求。^(¹⁷³)由于
  2008 年金融危机的影响，冰岛对比特币及加密货币总体持更负面的看法。^(¹⁷⁴)尽管该国存在一些大型矿场，但 2013 年发布的一份声明指出，禁止从事涉及比特币的外汇交易。这在某种程度上意味着比特币不被视为一种货币。2014
  年，有人试图通过推出`Auroracoin`来突破“比特币限制”，但由于监管的不确定性，该币的受欢迎程度低于预期。


  在波兰，我们也能看到法规的发展。自 2019 年 1 月起，加密货币交易的收入要么被归类为现金资本的收入，要么被归类为投资收入。出售虚拟货币的所得税率为 19%。^(¹⁷⁵)矿工未来也需要为其加密货币利润缴纳所得税。此前，波兰国家银行和金融监管委员会曾发出过类似西班牙的警告，提醒人们不要投资虚拟货币。同样，加密货币不被视为法定货币。




  匈牙利正在研究对加密工具的监管，并成立了一个联合工作组，成员包括中央银行、税务局、财政部（以及其他机构），负责审查与加密货币相关的法律、经济和执法问题^(¹⁷⁶)。目前，其个人所得税框架非常不利，需缴纳
  15%的个人所得税和 22%的健康保险金。此外，通常还有额外的行政要求，并且出现了许多新的投资计划，导致投资者缺乏保护，甚至可能面临更高税负。


  接下来是罗马尼亚，该国对加密货币收入征税。根据价值不同（低于 200 罗纳尔不征税，每年超过 600 罗纳尔需缴纳 10%的所得税），还设有其他税率^(¹⁷⁷)。同时，该国有一项关于电子货币监管的草案（由财政部发布的紧急法令）^(¹⁷⁸)。该法规将授权罗马尼亚国家银行对发行实体进行监管，并对其施加特定要求。与许多其他欧洲国家一样，罗马尼亚多次发出警告，提示投资加密货币存在明显风险。


  保加利亚对加密货币持更积极的态度，它是第一个比特币持有量超过黄金储备的国家^(¹⁷⁹)。其目前持有的比特币据信超过 213,000 枚。然而，该国至今尚未制定明确的监管框架。在加密货币的商业用途方面，也暂无任何许可证要求^(¹⁸⁰)。目前，加密货币交易的利润需缴纳
  10%的税。


  希腊共有 31 家加密货币交易所公司。该国之所以拥有如此多的加密货币交易所，并且加密货币总体受欢迎，与 2009 年金融危机及其对经济的影响有关^(¹⁸¹)。


  就塞尔维亚共和国而言，目前尚无法律保护机制。这意味着希望从事加密货币行业的人需自行承担所有活动风险^(¹⁸²)。该国存在《塞尔维亚国家银行法》，涉及支付机构的许可，包括向电子货币机构发放电子货币发行许可证，但这不包括加密货币交易许可证！同样，黑山和波斯尼亚和黑塞哥维那似乎也没有相关法律框架。阿尔巴尼亚对区块链技术持更创新的看法，他们利用区块链框架开放了关于金融市场立法法案的公众咨询。通过这种方式，他们力图在立法过程中变得更民主、开放和透明。另一方面，马其顿国家银行则发出警告，根据当地法规，外国银行账户或证券不被允许（存在某些例外）^(¹⁸³)。在克罗地亚，国家银行和金融稳定委员会均因加密货币投资的潜在损失和税收问题发出了警告。同样，斯洛文尼亚银行也就此问题发出了警告。


  白俄罗斯颁布了关于数字经济发展的总统令，该法令规范了加密货币和代币的发行与使用^(¹⁸⁴)。该法令中的许多规定适用于在高科技园区（该国的一个特殊经济区）内运营的法人实体。在该国，个人可以独立进行任何涉及加密货币的活动（包括挖矿），前提是独自进行，并且不用于购买商品和服务。该国还设有明确的许可要求、外汇管制和报告要求，使其成为加密货币行业监管框架最全面、最清晰的国家之一。


  与许多其他国家相比，俄罗斯对加密货币的使用和可能性给予了更多关注。2019 年，俄罗斯发布了一项新的数字权利法案，定义了智能合约和加密货币代币^(¹⁸⁵)。具体而言，该法案侧重于这些概念的法律影响以及法律权利如何转移。此外，还通过了一项新法规，将加密资产分为三个独立的法律类别：虚拟资产、技术代币和数字金融资产^(¹⁸⁶)。比特币可被视为虚拟资产（价值储存手段），以太币被视为技术代币（因为在以太坊区块链上发布功能需要它），而首次代币发行则属于最后一类。


  近年来，乌克兰经历了巨大的政治和经济动荡。正因如此，该国并未真正关注加密货币。目前，国内唯一接受的货币是本币（格里夫纳）以及由中央机构发行的外币^(¹⁸⁷)。但这并不意味着没有相关工作开展，因为最近已发布了两个相关草案。在加密货币缺乏官方监管期间，其需缴纳标准所得税（个人为
  18%，企业则取决于其业务范围）。如果这两个草案获得通过，该国将拥有有利的监管框架，因为加密交易的个人税率将降至 5%。2024 年后，企业需缴纳 18%的税。第二个草案侧重于消费者保护、监管和明确的法律框架。还有一项草案希望到
  2030 年之前完全免除加密交易的税收。摩尔多瓦国家银行于 2018 年就加密资产发出警告，原因在于该工具的性质以及缺乏明确的监管。另一方面，德涅斯特河沿岸地区通过了一项法律，使挖矿活动合法化。


  最后是土耳其。加密货币在那里非常受欢迎。根据不同的信息来源，至少 20%的人口持有代币。在其《2019-2023 年第十一个发展计划》中，土耳其还提议建立一种基于区块链的中央银行货币^(¹⁸⁸)。虽然真正的监管仍然很少，但甚至已经有关于“土耳其币”的草案出现。




  ## 亚洲的税收与加密货币监管


  根据不同主题，你可以发现加密货币在亚洲的普及速度比全球其他任何地方都要快。需要注意的是，每个国家对这一话题都有自己的看法和处理方式。


  在加密货币领域做出大量努力的国家之一是新加坡，新加坡金融管理局希望避免对加密货币进行直接监管。其目标是建立一个围绕加密货币的监管框架，而非直接监管加密货币本身。然而，比特币可能面临双重征税问题，即在购买时和使用其购买商品或服务时均需纳税。^(¹⁸⁹)
  作为亚洲乃至全球主要的区块链中心之一，尽可能保持监管的开放性似乎是该国的目标之一。


  中国监管机构也对区块链技术的兴起做出了回应。中国并未像其他国家预期的那样全面拥抱这项技术，而是利用其某些部分为自己谋利。^(¹⁹⁰) 像阿里巴巴和腾讯这样的大公司一直在研究如何应用这项技术来改进工作方式。那么，这里与世界其他地方有何不同？根据新规，提供“区块链信息服务”的“实体”需要向政府注册并收集用户信息，这实际上削弱了最初构成区块链基础的一些基本概念。对中国政府而言，这可以成为在数字信息、身份和交易方面进一步加强对公民控制的工具。


  印度政府已着手为区块链技术建立监管框架。该技术的潜力和基础设施需求要求建立这样的框架。^(¹⁹¹) 印度实施的一个应用案例是在沙姆沙巴德地区试点的区块链房产登记系统，以及在特伦甘纳邦开发的
  KYC 解决方案。加密货币的使用则是另一回事，因为使用此类代币可能导致罚款和监禁（基于拟议的制裁措施）。因此，尽管印度有一半的邦已启动区块链技术项目，但加密货币这一概念本身却被央行禁止。^(¹⁹²)
  然而，这个话题仍然争议很大，印度及其央行的立场可能会随时间推移而改变（部分原因是公众压力）。


  另一个领先的区块链采用者是日本。日本已表现出非常愿意采用这项技术的态度。^(¹⁹³) 日本采用率较高的一个重要原因是政府的立场。在许多政府视为潜在颠覆因素的地方，日本却看到了能够增强现有流程和基础设施的技术。其监管的设立方式进一步推动了区块链行业的发展，同时保护其公民免受可能的意外事件影响。日本对加密货币有明确规定：什么是加密货币、销售代币、如何征税，以及反洗钱法规是什么。这为那些希望在其分布式账本应用方面取得进展的公司创造了确定性。


  一个对加密货币持非常负面立场的国家是越南。在那里，使用加密货币作为支付手段被严格禁止。与此同时，加密货币资产的其他监管框架仍然缺失。


  柬埔寨采取了类似立场，但没有明确的监管方案。柬埔寨证券交易委员会、柬埔寨国家银行和国家警察总署联合发布声明称，如果制定监管规定，他们将参与其中。未经许可，购买、出售、交易、传播或结算均被视为非法。然而，迄今为止，尚无许可制度，这意味着在该国开发加密货币仍然是非法的。^(¹⁹⁴)


  老挝发布了关于加密货币的两份通知和一份警告。第 314/BOL 号通知鼓励国民更多地了解加密货币。同一份通知明确指出，当前没有监管框架，国民不得将加密货币用作货币或用于偿还债务。第
  382/BOL 号通知也禁止金融机构参与加密货币相关活动。


  印度尼西亚早在 2018 年就禁止了加密资产，但到年底，贸易部发布了第 99 号条例，正式将加密货币归类为商品。^(¹⁹⁵) 商品期货交易监管局（BAPPEBTI）是监管该国加密资产交易的主要机构。第
  5 号和 9 号条例帮助实现了加密资产买卖的合法化。其他相关机构包括专注于反洗钱的印尼金融交易报告与分析中心（PPATK）和印尼银行。


  作为互联网接入速度的世界领先者，且拥有超过 92%的互联网用户，区块链在韩国显然潜力巨大。^(¹⁹⁶) 然而，由于近年来首次代币发行的诸多滥用行为，政府自 2017
  年起对其发布了禁令。同样，加密货币有时被视为对国家经济的威胁。釜山设立了一个“无监管”区，在该区域放宽了一些限制，以便在某些情况下进行实验。


  缅甸仅发布了一份官方声明，由缅甸中央银行发布，声称缅甸央行是唯一发行和管理本国货币的机构。因此，加密货币在该国不被承认为支付手段。同样，金融机构也被禁止买卖或兑换加密货币。


  在制定明确的加密货币监管框架方面，泰国目前是东南亚的领导者。2018 年《数字资产企业紧急法令》有助于规范所有与加密货币相关的活动。数字资产被视为商品，需缴纳
  7%的增值税，出售数字资产的资本收益需缴纳所得税。对首次代币发行门户（电子系统提供商）和数字资产业务设定了明确要求。


  当我们看向中东时，会发现一些差异，一些国家采取的行动比其他更多。沙特阿拉伯、巴林和黎巴嫩对区块链技术表现出浓厚兴趣，并正在引领该地区的发展。与其他地区和国家的关键区别在于，区块链解决方案的应用主要是自上而下推动的。^(¹⁹⁷)
  例如，沙特阿拉伯和阿联酋发行了名为“Aber”的数字货币，旨在促进两国之间的金融结算；以及迪拜的 emCash 货币。由于这些发展，监管也成为热门话题。阿联酋已采取措施警告投资者加密货币的相关风险，同时提供一个将数字代币视为证券的监管框架。第二个例子是阿布扎比，金融监管机构批准了
  Arabian Bourse，使其能够运营一个成熟的加密资产交易所和数字托管机构。该地区的其他国家，如沙特阿拉伯、埃及和科威特，也正在迅速跟进，其监管机构已开始设计考虑加密货币的框架，并改变了之前的立场（此前加密货币被认为不符合伊斯兰教法）。




  ## 非洲的税收与加密货币监管


  根据不同数据来源，非洲有多达 35%的人口无法获得金融服务。区块链技术或许能在这方面提供帮助，让这些人获得金融服务。^(¹⁹⁸)


  由于移动通信使用率在十年内从 3%跃升至 80%以上，本地移动支付和电子支付平台已得到广泛认可。然而，总体而言，非洲大陆似乎并未真正积极制定相关监管法规。南非是个例外，该国已制定新法规来管理加密货币的使用。^(¹⁹⁹)
  与当地货币类似，这些法规也限制了可汇往境外的金额。在最近几个月，还提出了 30 多项关于进一步监管加密货币的建议。^(²⁰⁰) 所有活动都将受到严密监控以保护民众，同时加密资产不能被视为电子货币。


  在肯尼亚，区块链监管也受到认真考虑，因为一些人将其视为未来技术。^(²⁰¹) 这项技术被视为防止腐败、使该国在创新和经济增长方面成为未来新领先者之一的可能解决方案。从这个意义上说，肯尼亚正成为整个非洲大陆区块链应用的领导者。


  尼日利亚也在努力实现数字化转型，并在区块链平台上推出了公路客运的乘客舱单系统。由于该国基础设施并非一流，公路运输是主要交通方式，此类旅行的保险现在可以通过区块链解决方案购买。由于某些地区绑架事件猖獗，且当局难以找到近亲（纸质舱单远未完善），该解决方案应有助于保护公民。


  加纳已开始缓慢研究加密货币监管法规，尽管央行计划在 2020 年发行数字货币（但似乎不太可能是基于区块链的货币）。^(²⁰²) 迄今为止，该国仅于 2019 年
  3 月向投资者发布了一份公开警告。该警告称，投资者应进行尽职调查，同时列出了 24 种在全球范围内获得关注的加密货币。


  与加纳类似，刚果民主共和国在加密货币方面仍未制定正式法规。其他仍无相关法规的国家包括安哥拉、贝宁、博茨瓦纳、布基纳法索、布隆迪、喀麦隆、佛得角、中非共和国、乍得、科摩罗、科特迪瓦、吉布提等众多国家。


  阿尔及利亚对加密货币采取了极为严厉的措施，自 2018 年起禁止购买、销售、使用和持有加密货币。


  斯威士兰央行发表声明称，加密货币不具有法定货币地位，且不受监管。因此，它希望就使用加密货币向民众发出警告。^(²⁰³)


  莱索托央行也向公众发出警告，提醒注意加密货币的使用，并正式声明其不对此类货币进行任何监管。加密货币不被视为法定货币或外币，因此参与交易者需自行承担风险。乌干达和津巴布韦等其他几个国家的央行也发布了类似警告。


  ## 大洋洲的税收与加密货币监管


  在澳大利亚，与许多其他国家一样，加密货币的使用处于法律灰色地带。^(²⁰⁴) 你可以持有它们而没有任何问题，但无法使用它们进行支付。根据其法规，实际使用加密货币进行支付属于非法操作。不过，该国已转向更为开放的监管，并取消了之前对比特币的双重征税。^(²⁰⁵)
  正在考虑针对交易所以及交易者身份识别（`KYC`/`AML`）制定新法规。随着政府对这项技术日益熟悉，可以预见将有更明确的法规出台，以便利希望进入市场的企业。


  在新西兰，用比特币支付员工工资已成为合法行为。^(²⁰⁶) 无论此举是好是坏，这都清晰地表明了政府的意图及其对加密货币的愿景。基于对这项技术及其作为支付形式的信心，新西兰政府对加密货币和整个区块链采取了进步立场。^(²⁰⁷)


  马绍尔群岛在加密货币监管方面处于灰色地带，同时它正在创建自己的加密货币，名为`SOV`。该货币将与美元挂钩，并用于偿还债务、公共费用、税款和会费。




  ## 美洲的税收与加密货币监管


  最后来看看美洲。正如我们所见且可以预见，谈到监管，一切都取决于具体国家。例如在加拿大，区块链和加密货币的监管仍存在不确定性。^(²⁰⁸) 当前监管被视为模棱两可，因此什么能做、什么不能做并不明确。这种不确定性正在损害其经济，因为该国众多公司实际上正在考虑对该技术进行投资。


  美国也在监管问题上挣扎。截至 2019 年底，美国国会已有 21 项涉及区块链技术的法案。^(²⁰⁹) 其中一项法案聚焦加密货币可能带来的负面影响，如逃税、恐怖主义和人口贩卖，以及如何追踪此类代币。第二项法案侧重于企业如何在现有商业模式中使用加密货币，而第三项法案则深入探讨政府未来可能如何运用该技术。美国已经拥有健全而严格的金融服务框架，这一事实也可能对区块链在该国被如何看待产生重大影响。^(²¹⁰)


  因此，尽管美国是西方世界的领先创新者，但其在采用区块链方面出现延迟，因为该国在促进商业发展、保护公民的同时，努力在监管之间寻求平衡。必须指出的是，就加密货币而言，美国是最重要的国家，其对加密货币的监管方式可能会影响其盟友。在美国，加密货币被视为财产而非货币，因此适用特定税种。另一个重要方面是，各州之间可能存在重大差异，例如纽约的`BitLicense`。


  在拉丁美洲，玻利维亚颁布了严厉的监管措施，加密货币和交易所被全面禁止。^(²¹¹)


  安圭拉引入了一些监管规定，大多聚焦于首次代币发行（ICO）的发布，而部分代币则被视为受现有法规管辖的证券。同时，安圭拉是东加勒比中央银行（ECCB）试点项目的一部分，在该项目中，一种加密货币与国家货币并行测试。安提瓜和巴布达也是
  ECCB 试点项目的参与国，同时政府支持了安提瓜和巴布达发展币的开发，尽管该币种并非由国家发行。


  在巴哈马，政府正在研究利用区块链技术简化交易。同样，他们也在研究使用国家巴哈马元的数字版本。然而，政府也在制定法规，以防止加密货币被用于洗钱或恐怖融资。巴巴多斯也在研究创建自己的加密货币，通过一家名为"Bitt
  inc"的公司将其与巴巴多斯元挂钩。


  另一方面，厄瓜多尔选择禁止除政府发行的`SDE 代币`之外的所有加密货币。墨西哥、阿根廷、巴西、委内瑞拉和智利等国已接受加密货币作为一种支付方式。墨西哥确实更新了其反洗钱法规，将加密货币和提供加密货币相关服务的公司纳入其中。


  哥斯达黎加认为加密货币是合法的，尽管它不被视为法定货币或外币。中央银行发布了一些警告，同时也表示不打算监管或监督加密货币用于支付。


  就委内瑞拉而言，加密货币为摆脱`玻利瓦尔`的暴跌和经济危机提供了一条出路。^(²¹²) 该国还创建了自己的加密货币，名为`石油币`，由委内瑞拉石油的价值作为支撑。


  智利的"Cripto InterCambio"交易所希望进一步向拉丁美洲世界开放区块链技术，并承诺投资于希望探索该主题的初创公司。^(²¹³)


  ## GDPR 与区块链


  当讨论区块链的可能性时，最终会遇到欧洲关于 GDPR（通用数据保护条例）的讨论。GDPR 在欧盟范围内实施不久，如果个人或企业被发现不合规，可能导致巨额罚款。当考虑到该监管框架的几个要素时，区块链会带来一些问题。请注意，我并未讨论所有监管规范，而只是想概述与
  GDPR 可能存在的争议点。这意味着区块链技术与 GDPR 之间可能存在更多冲突领域，同时我也没有罗列 GDPR 中定义的所有措施和条款。这需要一本完全不同的书来阐述，并且无疑是未来研究的方向。


  第一个可能构成问题的是 GDPR 框架的基本假设。该框架假设存在至少一个可以联系的自然人或法人（数据控制者），以执行涉及正在处理的个人数据的个人权利。对于区块链，我们面对的是去中心化技术，它往往寻求的是去中心化的共识。没有明确的个人或群体，就很难（如果不是不可能的话）确定谁负责或谁应承担责任。^(²¹⁴)
  该法规中还有"联合控制者"的概念，这使得问题更加复杂，因为你可以将所有为达成共识而工作的矿工视为对正在处理的个人数据负有责任和义务。这只能根据具体情况进行判断，必须审查区块链用例的治理设计，以确定决定数据处理目的和方式的参与者。


  这也意味着，对处理区块链应用数据的软件、硬件和数据中心施加影响的各方，可以被视为对整个数据处理过程具有影响力。同样，区块链应用的目的可能受到多种因素和参与者的影响，因此确定（联合）控制者可能是一项艰巨的任务。即使你使用私有区块链，并且为参与网络的联盟创建了一个法律实体，参与联盟的所有独立实体也可能被视为联合控制者。




  ### GDPR 与区块链技术的冲突分析


  #### 参与者角色界定


  对于公有区块链，我们必须审视多个参与者。首先是软件开发者，但他们通常不决定更新是否被接受，因此很少被认定为控制者。同样，矿工被认定为控制者的可能性似乎也不大，因为他们对处理目的或方式没有影响力。有观点认为，网络中的节点可以被视为控制者，只要这些节点发起交易（通过网络分发数据）或在其自身数据库副本中保存交易数据。^(²¹⁵)
  其他人则认为，矿工和节点的组合可以被视为公有区块链网络的联合控制者。^(²¹⁶) 最后是用户——网络中的参与者，他们可以被视为其提交交易的控制者。欧洲议会近期的一份报告支持这一观点，指出用户“既可以是数据控制者（针对他们上传到账本的个人数据），也可以是数据处理者（因为他们在自己的计算机上存储了账本的完整副本）”。^(²¹⁷)
  此外，近期的案例表明，界定责任实体的资格因素缺乏确定性。你还应该考虑到，即使在特定情况下能够确定控制者或联合控制者，该控制者也可能无法遵守`GDPR`法规，因为他们根本无法控制数据和整个应用程序。网络中的某些参与者也有可能被认定为处理者而非控制者。虽然处理者的责任少于控制者，但这并不意味着他们没有责任。他们必须遵循控制者的指示，允许控制者监督以确保所有正确措施得到执行，维护其为控制者执行的所有处理活动记录，提供技术和组织安全措施的一般性描述，并在某些情况下任命数据保护官。此外，他们还必须应要求向数据保护机构提供记录，并且在发生数据泄露时，处理者必须在意识到泄露后立即通知控制者。^(²¹⁸)
  根据具体情况，软件开发者可能基于其在项目中承担的角色而被视为数据处理者。^(²¹⁹) 这种处理者与控制者之间的划分导致了其他问题和不确定性，因为`GDPR`法规要求处理者和控制者之间存在法律行为。但这并非决定性因素，如果后续在特定情境下认定这种关系确实存在，那么这种法律关系可以事后建立。


  #### 数据修改与删除的矛盾


  其次，`GDPR`假设在必要时可以根据法律要求修改或删除数据。这一点似乎与区块链技术背道而驰，因为区块链的完整性机制建立在数据无法在链内单方面修改，更不用说删除的基础之上。有人可能会争辩说，存储在公共账本上的哈希数据或公钥不再被视为个人数据，但在`GDPR`范围内，情况显然并非如此。你可以立即将这一点与数据是否能够被充分匿名化以符合`GDPR`要求的问题联系起来。`GDPR`的要求之一是准确性，它规定个人数据应当准确，并在必要时保持更新。^(²²⁰)
  这也与修改权相关，考虑到区块链应用的性质，这可能导致问题。^(²²¹) 我们需要在私有/许可型区块链应用（可以更容易地遵守这些规则）和公有/非许可型区块链之间做出区分。然而，大多数讨论都涉及`GDPR`中规定的删除权。^(²²²)
  这种删除权并非绝对权利，而是一种限定且有限的权利，必须与`GDPR`第 17 条第 2 款中的考量相平衡。尽管大多数人认为自己清楚“删除”的含义，但该法规对此并没有明确定义，留下了解释空间。近期的法庭案例表明，这不一定意味着数据被销毁，而是数据控制者必须在其控制范围内采取必要行动，在其能力范围内尽可能接近销毁数据的结果。然而，欧盟各成员国在解释上似乎仍存在一些差异，因此只有未来的判例法才能提供明确的定义。


  #### 实际影响与解决方案


  正如你在这里以及后续页面中清楚看到的，许多方面仍有待解释，将由监管机构就本法规及其他法规的实际实施提供指导。否则，这些法规可能会成为欧盟境内创新和未来发展的障碍。看待这个特定问题的一种方法是考虑特定区块链应用的治理框架。第
  29 条工作组考虑了云技术，并指出只有当冗余硬件上的所有副本也被删除时，个人数据才能被视为“已删除”。从区块链网络的角度来看，这意味着必须从每个节点中删除个人数据。这也意味着，如果数据主体希望向数据控制者行使其删除权，该控制者必须启动从其他控制者/处理者处的删除程序。有作者借鉴了`Google
  Spain ECJ`案^(²²³) 的类比，设想数据主体可能会联系区块浏览器，要求从这些浏览器中删除其个人数据，而不是从实际的底层基础设施中删除。^(²²⁴)
  在个人数据、分布式账本技术和`GDPR`的范围内，我们还必须审视定义向第三国传输个人数据的规定。审视该法规，数据可以在以下情况下传输至第三国：有充分性认定结果、提供了适当的保障措施、或者基于克减条款。^(²²⁵)
  当数据转移发生时，必须通知数据主体。你可以看到，区块链技术既可以提供解决方案（数据主体可以跟踪其个人数据的去向），也会带来问题（在公有/非许可型区块链中，如何阻止你的个人数据在第三国被处理）。


  #### 沟通义务


  与这些要点相关的是数据控制者相对于数据主体的沟通义务。^(²²⁶) 在私有分布式账本设置中，这不会造成任何问题，因为可以清晰追踪谁访问了某人的个人数据；而在公有/非许可型区块链设置中，这是不可能的，从而导致不符合`GDPR`法规。


  #### 设计考量与未来展望


  当你审视`GDPR`与区块链技术之间这两个明显的冲突点时，在设计区块链解决方案时应始终牢记这一点。IT 架构师需要意识到这些概念，并且必须设计他们的解决方案及其周围的治理系统，以尽可能防止冲突。但我们还必须考虑到围绕区块链技术以及其他数字创新的`GDPR`法律不确定性。只有未来才能告诉我们，该法规如何能够与这些新发展的技术达成妥协。




  ### GDPR 对区块链技术的适用性


  还存在其他一些可能引起争议的要点。其中之一涉及《通用数据保护条例》（GDPR）第 3 条，该条款涉及 GDPR 的适用情形。这与控制者或处理者在欧盟境内的设立有关，无论数据处理行为本身是否发生在欧盟境内。^(²²⁷)
  根据欧洲法院以往的判例，“设立”的概念基于诸如“安排的稳定性程度以及活动的有效行使，且必须结合相关经济活动和服务提供的具体性质来加以解释”等因素。^(²²⁸)
  基于此，我们可以看出功能性方法优于形式化分析。


  更为重要的是，如果被处理的个人数据涉及位于欧盟境内的数据主体，即使数据控制者/处理者未在欧盟设立（当满足两个条件之一时），GDPR 法规同样适用。^(²²⁹)
  第一个条件适用于为提供商品或服务而处理个人数据的情况，无论是否要求数据主体付款。第二种可能适用于在欧盟境内发生的行为监控背景下的数据处理。第三种（不太常见的）可能性涉及在国际公法范围内处理个人数据。遵循这些定义，你可以清晰地看到，无论你是否在使用区块链技术，在许多情况下
  GDPR 都将适用。


  负责处理数据的实体的主要“数据保护机构”或“DPA”（每个成员国都有一个）可能会提出一个棘手的问题。对于私有/许可型区块链技术，主管的数据保护机构很可能是数据控制者主要设立地的机构。对于公有/无许可型区块链平台，这可能会成为一个更大的问题。很可能将会再次采用功能性方法，即无法确定“主要设立地”，因此分析将侧重于数据处理的相关活动及其开展地点。^(²³⁰)


  此外，那些认为自己并非“真正”处理数据而可以规避 GDPR 的人恐怕要失望了。个人数据的处理被定义为“对个人数据或个人数据集执行的任何操作或一系列操作”。^(²³¹)
  这意味着对个人数据的任何处理行为都符合处理的定义（包括数据存储）。然而，这一普遍考量有一个重要的豁免情形，称为“家庭活动豁免”。该豁免规定，GDPR 法规不适用于自然人在纯粹的个人或家庭活动过程中进行的个人数据处理，前提是该处理与专业或商业活动无关。法国国家信息与自由委员会（CNIL）在其
  2018 年发布的区块链指南中宣布，某些情况可能属于这一例外。给出的一个例子是个人用自己的账户买卖比特币。欧洲法院是否会采取同样的方法还有待观察，因为他们认为家庭活动例外需要严格解释。根据同一欧洲法院的意见，在数据处理活动发生于个人私生活或家庭生活过程中，同时又可被不特定数量的公众访问的情况下，家庭活动豁免不能适用。你好，区块链！基于此，你可以理解，通过区块链进行个人数据处理是否能够适用家庭活动豁免是存在疑问的。


  #### GDPR 下个人数据的定义


  我们不会详细探讨 GDPR 法规中个人数据的所有定义细节，但为了便于理解，该法规对可能被归类为个人数据的内容采取了非常宽泛的定义，包括但不限于：公钥、互联网协议地址、Cookie
  标识符、射频识别标签等。GDPR 序言第 26 条指出，根据 GDPR 第 4 条第 5 款，假名化数据也被认定为个人数据。然而，该序言引入了一项测试，以判断该数据是否仍可被视为个人数据。如果控制者或其他人能够使用所有合理可用的手段识别出数据主体，则该数据仍被视为个人数据；否则，它就不再是个人数据。^(²³²)
  该序言采取了一种基于风险的方法，而最初的“第 29 条工作组”则采取了一种更倾向于零风险的方法，它将匿名化定义为“不可逆地防止识别”。长期来看会遵循哪一种思路，只能随着时间的推移才能见分晓，这也是当前不确定性的一个原因。序言第
  26 条也考虑了技术发展，但远未明确应考虑的时间尺度。你可以思考一下量子计算可能对整个区块链技术以及现有加密标准产生的影响。


  #### 交易数据与个人数据


  交易数据是区块链技术特有的另一个概念，它可能被认定为个人数据。当我们参考 CNIL 的定义时，这是指交易中包含的所有数据（可以是文凭、地契、姓名、地址等任何内容）。如你所见，这确实需要根据具体情况进行个案分析，以确定我们处理的是个人数据还是不属于此术语范围的数据。只要被交易的数据能够用于直接或间接识别一个自然人，我们就认为处理的是个人数据。


  当我们仅考虑金融数据时，必须考虑英国过去曾使用过的“动机性入侵者测试”。该测试要求组织考虑，一个具备合理能力、能够访问互联网等资源，并会采用调查技术（例如向可能对数据主体身份有额外了解的人进行询问）的人，是否能够从匿名化数据中重新识别出个人身份。动机性入侵者不被假定具备任何专业知识。^(²³³)
  这意味着你不能简单地说金融交易数据不是个人数据，因为过去已有证据表明，人们可以根据其交易数据被识别出来（比特币网络中过去曾有过此类例子）。^(²³⁴)




  在列举了所有这些示例后，我们还需要考虑与基于区块链的应用相连接的链下数据库。这或许能为围绕存储在真实链上交易中的个人数据的讨论提供一个解决方案。当您将个人数据保存在链下数据库中时，处理这些数据会变得容易得多。交易本身所包含的数据，可能仅包含用于访问此独立数据库中个人数据的信息。^(²³⁵)
  另一种可能有助于解决围绕个人数据和区块链应用讨论的技术，是使用零知识证明，该技术在不共享实际数据的情况下提供证明。这可以解决合作伙伴之间关于数据最小化和数据可验证性的问题。^(²³⁶)
  降低身份识别可能性的第三种策略是使用隐身地址。这些地址是为单次交易而生成的，并依赖于经过哈希处理的临时密钥。通过使用这项技术，您可以考量“动机性入侵者”测试，即几乎不可能识别参与者，因为你无法简单地将交易关联起来以识别自然人。第四种可用于实现“匿名化”的技术称为同态加密。这种技术允许对密文进行计算，即加密数据可以进行计算，并且生成的结果与对未加密数据执行计算的结果相同。^(²³⁷)
  就其本身而言，这不会导致符合《通用数据保护条例》（GDPR），但如果结合这里描述的其他一些技术，它可能会使应用跨越被视为匿名化的门槛。其他可能的解决方案可能来自状态通道，在这种通道中，信息仅在发生争议时才会与外部方共享；^(²³⁸)
  环签名，通过将交易绑定到多个私钥来隐藏交易；或者在数据中添加噪声，方法是将多笔交易合并在一起（您在本书中已经看到了这项技术的几个示例）。显而易见，只有结合其中几种技术，您才有可能实现
  GDPR 合规，但同样，这一点至今仍存在不确定性。


  一些人提出的一个想法是使用带有临时陷门的变色龙哈希函数，这将允许创建可编辑的区块链，其中的数据之后可以被调整或修改。^(²³⁹) 尽管这可能会实现 GDPR 合规，但既然如此，为什么还要使用区块链应用呢？可以设想其他技术在区块链环境中保护个人数据，但就目前而言，这些技术都运行在法律不确定的环境中。一些评论也指出，当我们考虑其他现行法规和政策（如反洗钱、反恐融资等）时，上述描述的技术也可能导致不良后果。


  当我们审视区块链应用中个人数据的处理时，同意是另一个可能的问题。GDPR 法规并未规定任何具体形式或要求，但明确指出，预先勾选的方框或沉默不能被视作同意的一种形式。^(²⁴⁰)
  同意还必须覆盖将要进行的所有处理活动，因此必须就一方打算进行的每一种处理形式分别给予同意。您还应该知道，在电子环境中，请求同意必须清晰、简洁，且不得对相关服务的使用造成不必要的干扰。只有当数据主体拥有真正自由的选择，并且能够拒绝或撤回同意而不受损害时，此同意才可被视为“自由给予”。该法规还规定，只有当数据主体知晓控制者的身份时，同意才可被视为知情同意。^(²⁴¹)
  您可以清楚地看到，当考虑到区块链技术时，这些要求中的一些不会构成问题，而另一些则可能导致更严重和更深远的问题（想想控制者的身份、同意的撤回及其后果）。在某些情况下，同意可能无法轻易撤回，例如在合同或法律背景下合法处理个人数据时。个人数据处理可能是履行合同所必需的，或者是法律要求在一定期限内保留个人数据。也可能存在一些例外情况，以保护其他数据主体的权利或公共利益。最后，还存在数据控制者基于“合法”利益处理数据的可能性，但这在未来的解释方式上非常不确定。该法规中考虑的其他原则包括：公平性（处理应当合法且公平）、透明度（这并不意味着数据控制者应该告知他们正在使用区块链技术，而是要告知数据主体处理的风险以及被处理的个人数据）以及目的限制，这意味着个人数据只能出于收集时的目的进行处理，不得另作他用。这最后一项要求意味着数据处理必须得到充分具体的说明，以便能够实施必要的数据保护保障措施；必须是明确的，即必须表述得足够清晰不含糊；并且必须是合法的，即处理应符合适用法律更广泛的法律原则。^(²⁴²)
  个人数据的进一步处理可能是合规的，即使其最初并未告知数据主体，但这需要逐案分析。


  最后，还必须考虑智能合约的使用。您可能认为它们本身不会造成问题，但您错了。数据主体有权不受完全基于自动化处理（包括用户画像）的决策的约束，此类决策对其产生法律影响或类似的重大影响。^(²⁴³
  (#fn243)) 智能合约产生的结果可被视为一种决策，这使其受到 GDPR 法规的约束。但是，如果该决策对于数据主体和数据控制者之间的合同是必要的、得到欧盟或成员国法律的授权、或者基于数据主体的明确同意，则此禁令不适用。^([²⁴⁴)
  由于 GDPR 法规未对“明确”同意作出清晰定义，且其他要求也并非总是明确，因此这一点仍有待进一步的监管指导。


  到目前为止，我们只将区块链技术和 GDPR 视为对立的两个方面，但这并非总是如此。有观点提出了“数据市场”的概念，其中个人和非个人数据可以作为商品进行交易。^(²⁴⁵)
  欧盟委员会已表示，区块链技术可用于赋能和驱动此类数字市场。这项技术确实有助于数据管理、双边合同创建以及有助于监控整个流程的治理系统。未来或许会证明，数据共享技术长远来看能真正助力经济增长并取得成功（想想
  Oce-an 协议）。区块链技术也可能有助于实施 GDPR 法规中“通过设计保护数据”的原则。^(²⁴⁶) 区块链可以帮助数据主体监控其个人数据的情况，并帮助他们决定谁有权访问其个人数据。它还有助于监控是否符合“目的限制原则”，并帮助检测数据泄露甚至欺诈行为。




