    GDPR framework. There is at least one natural or legal person one can address
    (the data controller) to enforce personal rights considering the personal data
    that is being processed. With blockchains we are dealing with a decentralized
    technology that seeks, more often than not, decentralized consensus. Without a
    clear person or group of persons in place, it is difficult, if not impossible,
    to determine who is responsible or accountable.^([^(214)](#fn214)) There is the
    concept of “joint-controllership” in the regulation, which makes it even more
    difficult, as you could consider all miners working toward consensus responsible
    and accountable for the personal data being processed. This can only be determined
    on a case-by-case basis where the governance design of the blockchain use case
    must be examined to identify the actors that determine the purpose and means of
    data processing.


    This also means that parties that exercise influence over the software, hardware,
    and datacenters that process data for the blockchain application can be considered
    to have influence over the data processing as a whole. Similarly, the purpose
    of the blockchain application can be influenced by many factors and actors, so
    that the determination of (joint) controllership can be a difficult task. Even
    when you use a private blockchain, and a legal entity is created for the consortium
    participating in the network, all separate entities taking part in the consortium
    could possibly be considered joint controllers.'
  trans: '

    # 美洲的税收与加密货币监管


    最后来看看美洲。正如我们所见且可以预见，谈到监管，一切都取决于具体国家。例如在加拿大，区块链和加密货币的监管仍存在不确定性。^(²⁰⁸) 当前监管被视为模棱两可，因此什么能做、什么不能做并不明确。这种不确定性正在损害其经济，因为该国众多公司实际上正在考虑对该技术进行投资。


    美国也在监管问题上挣扎。截至 2019 年底，美国国会已有 21 项涉及区块链技术的法案。^(²⁰⁹) 其中一项法案聚焦加密货币可能带来的负面影响，如逃税、恐怖主义和人口贩卖，以及如何追踪此类代币。第二项法案侧重于企业如何在现有商业模式中使用加密货币，而第三项法案则深入探讨政府未来可能如何运用该技术。美国已经拥有健全而严格的金融服务框架，这一事实也可能对区块链在该国被如何看待产生重大影响。^(²¹⁰)


    因此，尽管美国是西方世界的领先创新者，但其在采用区块链方面出现延迟，因为该国在促进商业发展、保护公民的同时，努力在监管之间寻求平衡。必须指出的是，就加密货币而言，美国是最重要的国家，其对加密货币的监管方式可能会影响其盟友。在美国，加密货币被视为财产而非货币，因此适用特定税种。另一个重要方面是，各州之间可能存在重大差异，例如纽约的`BitLicense`。


    在拉丁美洲，玻利维亚颁布了严厉的监管措施，加密货币和交易所被全面禁止。^(²¹¹)


    安圭拉引入了一些监管规定，大多聚焦于首次代币发行（ICO）的发布，而部分代币则被视为受现有法规管辖的证券。同时，安圭拉是东加勒比中央银行（ECCB）试点项目的一部分，在该项目中，一种加密货币与国家货币并行测试。安提瓜和巴布达也是
    ECCB 试点项目的参与国，同时政府支持了安提瓜和巴布达发展币的开发，尽管该币种并非由国家发行。


    在巴哈马，政府正在研究利用区块链技术简化交易。同样，他们也在研究使用国家巴哈马元的数字版本。然而，政府也在制定法规，以防止加密货币被用于洗钱或恐怖融资。巴巴多斯也在研究创建自己的加密货币，通过一家名为"Bitt
    inc"的公司将其与巴巴多斯元挂钩。


    另一方面，厄瓜多尔选择禁止除政府发行的`SDE 代币`之外的所有加密货币。墨西哥、阿根廷、巴西、委内瑞拉和智利等国已接受加密货币作为一种支付方式。墨西哥确实更新了其反洗钱法规，将加密货币和提供加密货币相关服务的公司纳入其中。


    哥斯达黎加认为加密货币是合法的，尽管它不被视为法定货币或外币。中央银行发布了一些警告，同时也表示不打算监管或监督加密货币用于支付。


    就委内瑞拉而言，加密货币为摆脱`玻利瓦尔`的暴跌和经济危机提供了一条出路。^(²¹²) 该国还创建了自己的加密货币，名为`石油币`，由委内瑞拉石油的价值作为支撑。


    智利的"Cripto InterCambio"交易所希望进一步向拉丁美洲世界开放区块链技术，并承诺投资于希望探索该主题的初创公司。^(²¹³)


    # GDPR 与区块链


    当讨论区块链的可能性时，最终会遇到欧洲关于 GDPR（通用数据保护条例）的讨论。GDPR 在欧盟范围内实施不久，如果个人或企业被发现不合规，可能导致巨额罚款。当考虑到该监管框架的几个要素时，区块链会带来一些问题。请注意，我并未讨论所有监管规范，而只是想概述与
    GDPR 可能存在的争议点。这意味着区块链技术与 GDPR 之间可能存在更多冲突领域，同时我也没有罗列 GDPR 中定义的所有措施和条款。这需要一本完全不同的书来阐述，并且无疑是未来研究的方向。


    第一个可能构成问题的是 GDPR 框架的基本假设。该框架假设存在至少一个可以联系的自然人或法人（数据控制者），以执行涉及正在处理的个人数据的个人权利。对于区块链，我们面对的是去中心化技术，它往往寻求的是去中心化的共识。没有明确的个人或群体，就很难（如果不是不可能的话）确定谁负责或谁应承担责任。^(²¹⁴)
    该法规中还有"联合控制者"的概念，这使得问题更加复杂，因为你可以将所有为达成共识而工作的矿工视为对正在处理的个人数据负有责任和义务。这只能根据具体情况进行判断，必须审查区块链用例的治理设计，以确定决定数据处理目的和方式的参与者。


    这也意味着，对处理区块链应用数据的软件、硬件和数据中心施加影响的各方，可以被视为对整个数据处理过程具有影响力。同样，区块链应用的目的可能受到多种因素和参与者的影响，因此确定（联合）控制者可能是一项艰巨的任务。即使你使用私有区块链，并且为参与网络的联盟创建了一个法律实体，参与联盟的所有独立实体也可能被视为联合控制者。

    '
- fmt: '# GDPR与区块链技术的冲突分析


    ## 参与者角色界定


    对于公有区块链，我们必须审视多个参与者。首先是软件开发者，但他们通常不决定更新是否被接受，因此很少被认定为控制者。同样，矿工被认定为控制者的可能性似乎也不大，因为他们对处理目的或方式没有影响力。有观点认为，网络中的节点可以被视为控制者，只要这些节点发起交易（通过网络分发数据）或在其自身数据库副本中保存交易数据。^([^(215)](#fn215))
    其他人则认为，矿工和节点的组合可以被视为公有区块链网络的联合控制者。^([^(216)](#fn216)) 最后是用户——网络中的参与者，他们可以被视为其提交交易的控制者。欧洲议会近期的一份报告支持这一观点，指出用户“既可以是数据控制者（针对他们上传到账本的个人数据），也可以是数据处理者（因为他们在自己的计算机上存储了账本的完整副本）”。^([^(217)](#fn217))
    此外，近期的案例表明，界定责任实体的资格因素缺乏确定性。你还应该考虑到，即使在特定情况下能够确定控制者或联合控制者，该控制者也可能无法遵守`GDPR`法规，因为他们根本无法控制数据和整个应用程序。网络中的某些参与者也有可能被认定为处理者而非控制者。虽然处理者的责任少于控制者，但这并不意味着他们没有责任。他们必须遵循控制者的指示，允许控制者监督以确保所有正确措施得到执行，维护其为控制者执行的所有处理活动记录，提供技术和组织安全措施的一般性描述，并在某些情况下任命数据保护官。此外，他们还必须应要求向数据保护机构提供记录，并且在发生数据泄露时，处理者必须在意识到泄露后立即通知控制者。^([^(218)](#fn218))
    根据具体情况，软件开发者可能基于其在项目中承担的角色而被视为数据处理者。^([^(219)](#fn219)) 这种处理者与控制者之间的划分导致了其他问题和不确定性，因为`GDPR`法规要求处理者和控制者之间存在法律行为。但这并非决定性因素，如果后续在特定情境下认定这种关系确实存在，那么这种法律关系可以事后建立。


    ## 数据修改与删除的矛盾


    其次，`GDPR`假设在必要时可以根据法律要求修改或删除数据。这一点似乎与区块链技术背道而驰，因为区块链的完整性机制建立在数据无法在链内单方面修改，更不用说删除的基础之上。有人可能会争辩说，存储在公共账本上的哈希数据或公钥不再被视为个人数据，但在`GDPR`范围内，情况显然并非如此。你可以立即将这一点与数据是否能够被充分匿名化以符合`GDPR`要求的问题联系起来。`GDPR`的要求之一是准确性，它规定个人数据应当准确，并在必要时保持更新。^([^(220)](#fn220))
    这也与修改权相关，考虑到区块链应用的性质，这可能导致问题。^([^(221)](#fn221)) 我们需要在私有/许可型区块链应用（可以更容易地遵守这些规则）和公有/非许可型区块链之间做出区分。然而，大多数讨论都涉及`GDPR`中规定的删除权。^([^(222)](#fn222))
    这种删除权并非绝对权利，而是一种限定且有限的权利，必须与`GDPR`第17条第2款中的考量相平衡。尽管大多数人认为自己清楚“删除”的含义，但该法规对此并没有明确定义，留下了解释空间。近期的法庭案例表明，这不一定意味着数据被销毁，而是数据控制者必须在其控制范围内采取必要行动，在其能力范围内尽可能接近销毁数据的结果。然而，欧盟各成员国在解释上似乎仍存在一些差异，因此只有未来的判例法才能提供明确的定义。


    ## 实际影响与解决方案


    正如你在这里以及后续页面中清楚看到的，许多方面仍有待解释，将由监管机构就本法规及其他法规的实际实施提供指导。否则，这些法规可能会成为欧盟境内创新和未来发展的障碍。看待这个特定问题的一种方法是考虑特定区块链应用的治理框架。第29条工作组考虑了云技术，并指出只有当冗余硬件上的所有副本也被删除时，个人数据才能被视为“已删除”。从区块链网络的角度来看，这意味着必须从每个节点中删除个人数据。这也意味着，如果数据主体希望向数据控制者行使其删除权，该控制者必须启动从其他控制者/处理者处的删除程序。有作者借鉴了`Google
    Spain ECJ`案^([^(223)](#fn223)) 的类比，设想数据主体可能会联系区块浏览器，要求从这些浏览器中删除其个人数据，而不是从实际的底层基础设施中删除。^([^(224)](#fn224))
    在个人数据、分布式账本技术和`GDPR`的范围内，我们还必须审视定义向第三国传输个人数据的规定。审视该法规，数据可以在以下情况下传输至第三国：有充分性认定结果、提供了适当的保障措施、或者基于克减条款。^([^(225)](#fn225))
    当数据转移发生时，必须通知数据主体。你可以看到，区块链技术既可以提供解决方案（数据主体可以跟踪其个人数据的去向），也会带来问题（在公有/非许可型区块链中，如何阻止你的个人数据在第三国被处理）。


    ## 沟通义务


    与这些要点相关的是数据控制者相对于数据主体的沟通义务。^([^(226)](#fn226)) 在私有分布式账本设置中，这不会造成任何问题，因为可以清晰追踪谁访问了某人的个人数据；而在公有/非许可型区块链设置中，这是不可能的，从而导致不符合`GDPR`法规。


    ## 设计考量与未来展望


    当你审视`GDPR`与区块链技术之间这两个明显的冲突点时，在设计区块链解决方案时应始终牢记这一点。IT架构师需要意识到这些概念，并且必须设计他们的解决方案及其周围的治理系统，以尽可能防止冲突。但我们还必须考虑到围绕区块链技术以及其他数字创新的`GDPR`法律不确定性。只有未来才能告诉我们，该法规如何能够与这些新发展的技术达成妥协。'
  raw: 'For public blockchains we have to look at several participants. There are
    the software developers, but they generally do not determine whether an update
    is accepted, so they are rarely identified as controllers. Similarly, it seems
    unlikely that miners will be identified as controllers, as they have no influence
    over the purpose or means of processing. It has been suggested that the nodes
    in the network could be considered controllers so far that these nodes initiate
    transactions (distributing data through the network) or save transaction data
    in its own copy of the database.^([^(215)](#fn215)) Others have suggested that
    a combination of miners and nodes could be considered the joint controllers of
    a public blockchain network.^([^(216)](#fn216)) Finally, there are the users,
    the participants in the network, which could be considered controllers of the
    transactions they submit. A recent European Parliament report embraces the same
    view in suggesting that users “may be both data controllers, for the personal
    data that they upload to the ledger, and data processors, by virtue of storing
    a full copy of the ledger on their own computer”.^([^(217)](#fn217)) On top of
    that, recent cases have shown that the qualifying factors to define the entities
    responsible are fraught with a lack of certainty. You should also consider that
    even when you can determine the controller of joint controllers in a specific
    case, this controller might be unable to comply with the GDPR regulation, as they
    simply have no control over the data and the application as a whole. There is
    also the possibility for certain participants in the network to be identified
    as a processor instead of being a controller. Although processors have fewer responsibilities
    than controllers, that doesn’t mean that there are none. They must follow the
    instructions of the controller, allow supervision from the controller to make
    sure all the right actions are taken, maintain a record of all processing activities
    they carry out for the controller, provide a general description of the technical
    and organizational security measures, and in some cases appoint a data protection
    officer. They also have to provide records to the data protection authority on
    request and, in the case of a data breach, the processor must alert the controller
    without undue delay after becoming aware of the breach.^([^(218)](#fn218)) Depending
    on the situation, software developers could be considered data processors based
    on the role they assume in the project.^([^(219)](#fn219)) This division between
    processors and controllers leads to other issues and uncertainties as the GDPR
    regulation requires a legal act between processors and controllers. It is not
    the determining factor, so if there is a later decision that this relationship
    does exist in a specific context, this legal relationship can be created a posteriori.


    Secondly, there is the assumption in GDPR that data can be modified or erased
    where necessary to comply with legal requirements. This seems antithetical to
    blockchain technology when you consider that blockchains’ integrity mechanism
    is built on the fact that data can not be unilaterally modified within the chain,
    let alone erased. One could argue that hashed data or public keys stored on the
    public ledger are no longer considered personal data but within the scope of GDPR
    this is certainly not the case. You can immediately link this to the question
    of whether data can be anonymized enough to qualify for GDPR compliance. One of
    the requirements in the GDPR is that of accuracy, which mandates that person data
    should be accurate and, where necessary, kept up to date.^([^(220)](#fn220)) This
    also relates to the right of modification, which can lead to issues when you consider
    the nature of blockchain applications.^([^(221)](#fn221)) There is a division
    we should make between private/permissioned blockchain applications that can more
    easily comply with these rules and public/permissionless blockchains. Most discussions,
    however, relate to the right of erasure stipulated in the GDPR.^([^(222)](#fn222))
    This right of erasure is not an absolute right, but rather a qualified and a limited
    right and must be balanced against the considerations in Article 17(2) GDPR. Even
    though most people think they have a clear knowledge of what “erasure” means,
    there is no clear definition of this in the regulation, leaving it open to interpretation.
    Recent court cases have shown that it doesn’t necessarily mean that the data is
    destroyed, but rather that data controllers have to take the necessary actions
    within their control to secure the result as close as possible to the destruction
    of their data within their own possibilities. However, there seems to be still
    some differences in interpretation within the different member states of the EU,
    so that only future case law can hopefully provide a clear definition.


    As you can clearly see here, and also further in these pages, a lot is still open
    to interpretation and it will be up to the regulatory bodies to give guidance
    about practical implementations of this and other regulations. Otherwise, these
    might prove to be a hindrance to innovation and future growth within the borders
    of the EU. One way of looking at this specific issue is by considering the governance
    framework in place of a particular blockchain application. Article 29 working
    party considered cloud technology and stated that personal data can only be considered
    “erased” if all copies existing on redundant hardware are also erased. When we
    look at the blockchain network, this means that personal data has to be erased
    from each of the nodes. This also means that if a subject wants to enforce his
    right of erasure at a data controller, this controller must initiate erasure from
    other controllers/processors. There have been writers who take the analogy from
    the Google Spain ECJ case^([^(223)](#fn223)) and imagine that data subjects might
    contact block explorers from removing their personal data from these explorers
    instead of from the actual underlying infrastructure.^([^(224)](#fn224)) Within
    the scope of personal data, distributed ledger technology and GDPR, we also have
    to look into the stipulations that define the transfer of personal data to third
    countries. When we look into the regulation, data can be transferred to third
    countries if this is the result of an adequacy decision, appropriate safeguards
    are offered, or it’s on the basis of a derogation.^([^(225)](#fn225)) When the
    data transfer takes place, the data subject must be informed of this. You can
    see that blockchain technology can both offer solutions (data subjects can follow
    where their personal data has traveled) and problems (how do you stop your personal
    data from being processed in third countries when you consider public/permissionless
    blockchains).


    Linked to these points, we have the communication duties of the data controller
    in regards to the data subjects.^([^(226)](#fn226)) In private distributed ledger
    setups, this shouldn’t prove any issue, as you can clearly track who had access
    to someone’s personal data, while in public/permissionless blockchain setups this
    is impossible, leading to non-compliance with the GDPR regulation.


    When you look at these two clear points of tension between GDPR and blockchain
    technology, one should always keep this in mind when designing blockchain solutions.
    IT architects need to be aware of these concepts and have to design their solutions
    and the governance systems surrounding them in such a way to prevent contention
    as much as possible. But we also have to consider the legal uncertainties surrounding
    GDPR considering blockchain technology but also other digital innovations. Only
    the future will be able to show us how the regulation can be brought to terms
    with these new developments.'
  trans: '

    # GDPR 与区块链技术的冲突分析


    ## 参与者角色界定


    对于公有区块链，我们必须审视多个参与者。首先是软件开发者，但他们通常不决定更新是否被接受，因此很少被认定为控制者。同样，矿工被认定为控制者的可能性似乎也不大，因为他们对处理目的或方式没有影响力。有观点认为，网络中的节点可以被视为控制者，只要这些节点发起交易（通过网络分发数据）或在其自身数据库副本中保存交易数据。^(²¹⁵)
    其他人则认为，矿工和节点的组合可以被视为公有区块链网络的联合控制者。^(²¹⁶) 最后是用户——网络中的参与者，他们可以被视为其提交交易的控制者。欧洲议会近期的一份报告支持这一观点，指出用户“既可以是数据控制者（针对他们上传到账本的个人数据），也可以是数据处理者（因为他们在自己的计算机上存储了账本的完整副本）”。^(²¹⁷)
    此外，近期的案例表明，界定责任实体的资格因素缺乏确定性。你还应该考虑到，即使在特定情况下能够确定控制者或联合控制者，该控制者也可能无法遵守`GDPR`法规，因为他们根本无法控制数据和整个应用程序。网络中的某些参与者也有可能被认定为处理者而非控制者。虽然处理者的责任少于控制者，但这并不意味着他们没有责任。他们必须遵循控制者的指示，允许控制者监督以确保所有正确措施得到执行，维护其为控制者执行的所有处理活动记录，提供技术和组织安全措施的一般性描述，并在某些情况下任命数据保护官。此外，他们还必须应要求向数据保护机构提供记录，并且在发生数据泄露时，处理者必须在意识到泄露后立即通知控制者。^(²¹⁸)
    根据具体情况，软件开发者可能基于其在项目中承担的角色而被视为数据处理者。^(²¹⁹) 这种处理者与控制者之间的划分导致了其他问题和不确定性，因为`GDPR`法规要求处理者和控制者之间存在法律行为。但这并非决定性因素，如果后续在特定情境下认定这种关系确实存在，那么这种法律关系可以事后建立。


    ## 数据修改与删除的矛盾


    其次，`GDPR`假设在必要时可以根据法律要求修改或删除数据。这一点似乎与区块链技术背道而驰，因为区块链的完整性机制建立在数据无法在链内单方面修改，更不用说删除的基础之上。有人可能会争辩说，存储在公共账本上的哈希数据或公钥不再被视为个人数据，但在`GDPR`范围内，情况显然并非如此。你可以立即将这一点与数据是否能够被充分匿名化以符合`GDPR`要求的问题联系起来。`GDPR`的要求之一是准确性，它规定个人数据应当准确，并在必要时保持更新。^(²²⁰)
    这也与修改权相关，考虑到区块链应用的性质，这可能导致问题。^(²²¹) 我们需要在私有/许可型区块链应用（可以更容易地遵守这些规则）和公有/非许可型区块链之间做出区分。然而，大多数讨论都涉及`GDPR`中规定的删除权。^(²²²)
    这种删除权并非绝对权利，而是一种限定且有限的权利，必须与`GDPR`第 17 条第 2 款中的考量相平衡。尽管大多数人认为自己清楚“删除”的含义，但该法规对此并没有明确定义，留下了解释空间。近期的法庭案例表明，这不一定意味着数据被销毁，而是数据控制者必须在其控制范围内采取必要行动，在其能力范围内尽可能接近销毁数据的结果。然而，欧盟各成员国在解释上似乎仍存在一些差异，因此只有未来的判例法才能提供明确的定义。


    ## 实际影响与解决方案


    正如你在这里以及后续页面中清楚看到的，许多方面仍有待解释，将由监管机构就本法规及其他法规的实际实施提供指导。否则，这些法规可能会成为欧盟境内创新和未来发展的障碍。看待这个特定问题的一种方法是考虑特定区块链应用的治理框架。第
    29 条工作组考虑了云技术，并指出只有当冗余硬件上的所有副本也被删除时，个人数据才能被视为“已删除”。从区块链网络的角度来看，这意味着必须从每个节点中删除个人数据。这也意味着，如果数据主体希望向数据控制者行使其删除权，该控制者必须启动从其他控制者/处理者处的删除程序。有作者借鉴了`Google
    Spain ECJ`案^(²²³) 的类比，设想数据主体可能会联系区块浏览器，要求从这些浏览器中删除其个人数据，而不是从实际的底层基础设施中删除。^(²²⁴)
    在个人数据、分布式账本技术和`GDPR`的范围内，我们还必须审视定义向第三国传输个人数据的规定。审视该法规，数据可以在以下情况下传输至第三国：有充分性认定结果、提供了适当的保障措施、或者基于克减条款。^(²²⁵)
    当数据转移发生时，必须通知数据主体。你可以看到，区块链技术既可以提供解决方案（数据主体可以跟踪其个人数据的去向），也会带来问题（在公有/非许可型区块链中，如何阻止你的个人数据在第三国被处理）。


    ## 沟通义务


    与这些要点相关的是数据控制者相对于数据主体的沟通义务。^(²²⁶) 在私有分布式账本设置中，这不会造成任何问题，因为可以清晰追踪谁访问了某人的个人数据；而在公有/非许可型区块链设置中，这是不可能的，从而导致不符合`GDPR`法规。


    ## 设计考量与未来展望


    当你审视`GDPR`与区块链技术之间这两个明显的冲突点时，在设计区块链解决方案时应始终牢记这一点。IT 架构师需要意识到这些概念，并且必须设计他们的解决方案及其周围的治理系统，以尽可能防止冲突。但我们还必须考虑到围绕区块链技术以及其他数字创新的`GDPR`法律不确定性。只有未来才能告诉我们，该法规如何能够与这些新发展的技术达成妥协。

    '
- fmt: '# GDPR Applicability to Blockchain Technology


    There are also some other points of possible contention. One of these relates
    to Article 3 GDPR, which relates to when GDPR can be applied. This relates to
    the establishment of a controller or a processor in the European Union, regardless
    of whether the processing itself takes place in the EU or not.^([^(227)](#fn227))
    Based on previous cases before the European Court of Justice, establishment is
    based on concepts such as "the degree of stability of the arrangements and the
    effective exercise of activities which must be interpreted in the light of the
    specific nature of the economic activities and the provision of services concerned".^([^(228)](#fn228))
    Based on this, we can see that a functional approach trumps formal analysis.


    More importantly, the GDPR regulation applies if the personal data being processed
    relates to data subjects that are based in the EU, even when the data controller/processor
    are not established in the EU (when one of two conditions are met).^([^(229)](#fn229))
    A first condition applies to when personal data is being processed when goods
    and services are offered, irrespective of whether a payment of the data subject
    is required. A second possibility applies to data processing in the context of
    monitoring of behavior when this behavior takes place within the EU. A third (not
    very common) possibility relates to the processing of personal data in the scope
    of public international law. When you follow these definitions, you can clearly
    see that there are many instances when the GDPR will apply, whether or not you
    are working with blockchain technology.


    The main "Data Protection Authority" or "DPA" (each member state has one) that
    is responsible for the entity processing the data can offer a difficult question.
    For private/permissioned blockchain technology, the competent DPA will most likely
    be the one of the main establishment of the data controller. For public/permissionless
    blockchain platforms, this can be more of an issue. Probably there will be again
    a functional approach where "the main establishment" cannot be established, so
    that the analysis will focus on the relevant activities for the processing and
    where they were carried out.^([^(230)](#fn230))


    Also, those that think that they can escape the GDPR because they are not "really"
    processing data are out of luck. Processing of personal data is defined as "any
    operation or set of operations which is performed on personal data or sets of
    personal data".^([^(231)](#fn231)) This means that any handling of personal data
    qualifies as processing (including the storage of data). There is, however, an
    important exemption from this general consideration called the "household exemption".
    This exemption states that the GDPR regulation does not apply to the processing
    of personal data by a natural person that occurs in the course of purely personal
    or household activity where it has no connection to a professional or commercial
    activity. The French Commission Nationale de l’Informatique et des Libertés (CNIL)
    announced in 2018, in its guideline on blockchains, that some cases may fall under
    this exception. One of the examples given was the buying and selling of Bitcoin
    from one person''s own account. Whether the ECJ will take the same approach is
    to be seen, as they deem that the household exception needs to be interpreted
    strictly. According to that same ECJ, the household exemption cannot be applied
    in those cases where the processing activity is carried out in the course of private
    or family life of individuals while at the same time it is made accessible to
    an indefinite number of people. Hello, blockchain! Based on this, you can understand
    that it is questionable if the household exemption can ever be applied to personal
    data processing through blockchain.


    ## Definition of Personal Data under GDPR


    We will not go into all the details on how personal data is defined within the
    GDPR regulation, but for one to understand it, the regulation takes a very broad
    approach to what might be classified as personal data, including and not limited
    to: public keys, internet protocol addresses, cookie identifiers, radio frequency
    identification tags and more. Recital 26 GDPR recalls that pseudonymous data is
    qualified as personal data in line with Article 4(5) GDPR. However, this recital
    introduces a test to see whether the data can still be considered personal data
    or not. If the controller or another person are able to identify the data subject
    using all the means reasonably to be used, it is still considered personal data;
    otherwise, it is no longer personal data.^([^(232)](#fn232)) This recital takes
    a risk-based approach, while the original Article 29 working party had a more
    zero-risk approach as it defined anonymization as "irreversibly prevent identification".
    Which line will be followed in the long term can only be seen over time and is
    currently a reason for uncertainty. Recital 26 also takes technical developments
    into consideration, but it is far from clear which timescales should be taken
    into consideration. You could think about the possible impact of quantum computing
    on blockchain technology and the existing encryption standards as a whole.


    ## Transactional Data and Personal Data


    Transactional data is another concept specific to blockchain technology which
    may be identified as personal data. When we refer back to the CNIL, this is all
    data contained within a transaction (can be anything from diploma, property deed,
    name, address, etc.). As you can see, this really needs to be analyzed on a case-by-case
    basis to determine when we are dealing with personal data or data that cannot
    be covered by this term. As long as the data being transacted can be used to directly
    or indirectly identify a natural person, we are dealing with personal data.


    When we only consider financial data, we have to take into account the "motivated-intruder
    test" which has been used in the past in the UK. This test requires organizations
    to consider whether individuals could be re-identified from the anonymized data
    by someone who is reasonably competent, has access to resources such as the internet,
    and would employ investigative techniques, such as making enquiries of people
    who may have additional knowledge of the identity of the data subject. The motivated
    intruder is not assumed to have any specialist knowledge.^([^(233)](#fn233)) This
    means that you cannot simply state that financial transaction data is not personal
    data, as in the past it has been proven that people could be identified based
    on their transactional data (there have been examples in the past in the Bitcoin
    network).^([^(234)](#fn234))'
