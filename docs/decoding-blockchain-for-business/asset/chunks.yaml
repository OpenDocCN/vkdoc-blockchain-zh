  trans: '

    ### 代币管理注册表


    代币管理注册表是基于同质化代币和数字稀缺性的去中心化应用的基础组件。^(³⁰⁰) 此类注册表的两个例子是 `adChain` 注册表（用于保存发布商域名的加密安全记录）和
    `Messari`。^(³⁰¹,³⁰²)


    `adChain` 和其他注册表是由代币持有者生成的列表，这些列表可以是任何内容，从哈希记录到存储在 `IPFS` 中的实际详细记录。TCR 用作一种身份机制，使广告商能够在不与列出的参与者建立预先关系的情况下了解他们，并排除那些想要利用的欺诈参与者。^(³⁰³)
    参与者如何成为白名单的一部分？他们可以提交押金以加入白名单，之后会进入一个挑战期。在此期间，现有参与者可以挑战新成员，并针对新成员的押金提交等额资金。在这种情况下，会开始一个投票期，白名单中的所有其他成员都可以就此事投票。如果挑战者成功，他们将在自己的押金之外获得特殊奖励，并且所有投票支持他们的其他投票者也将获得新成员押金的一部分（在这种情况下，新成员将不会成为会员）。如果新成员获胜，他们将拿回自己的押金，并最终成为会员。当然，如果出现欺诈行为的证据，会员在任何时候都可能受到挑战。对
    TCR 押金要求的变更，如果参与者不遵守，可能导致他们被移除。


    你可以看到，这个系统有助于在去中心化的世界中创建某种质量标签。这是否意味着 TCR 是一个完美的系统？当然不是，因为这些实现也受到了一些批评。^(³⁰⁴)
    Aleksandr Bulkin 引用了区块链预言机的例子，他认为其运作方式与 TCR 相反。原因是预言机要求人们押注于（容易）公开观察到的信息，诚实的玩家获得奖励，不诚实的玩家损失押金。让大多数参与者投票支持错误答案是极其困难的，几乎不可能。预言机的关键组成部分是存在可以低成本公开观察到的客观信息。一旦这些信息不再公开可用，或者验证这些信息的成本很高，参与者就可能被操纵，不再支持正确答案。当我们将这种逻辑外推到旨在收集和验证难以确定信息的
    TCR 时，我们知道其经济激励机制存在潜在问题。因此，取决于 TCR 的运作环境，它要么会非常成功，要么无法带来去中心化网络参与者所期望的确定性。


    ### 一些结语


    我希望你觉得这本书是区块链技术和发展领域的一个有趣资源。我试图提供一份初步指南，这意味着我无法详细解释所有概念、框架和网络。这些话题中的每一个都值得（并且通常已有）一本完整的著作。我的目标是介绍这些概念，以便你能根据自己的兴趣进一步探索它们。互联网上充满了让你可以学习更多知识的免费资源，此外也有许多课程和书籍能让你对这些话题有更深入的了解。像
    `Hackernoon.com`、`medium.com` 和 `blockgeeks.com` 这样的网站提供了大量信息，可以帮助你更好地理解区块链和加密货币的世界。


    我想提出的第二点是，这几乎是一件“历史文物”。这意味着在我完成这本书的那一刻，某些点就已经过时了。一个例子是以太坊网络的未来发展计划，它随时可能改变，并且已经发生了改变。这意味着历史信息就是历史信息。同样地，我为本书中的勘误道歉。我怀着极大的热情写作，但我确信我遗漏了一些错误。


    最后，我想补充一点，我很荣幸你选择阅读我的书。感谢你成为我的读者。如果你想与我联系，请随时在 LinkedIn 上联系我，或访问我的网站 [`www.stijnvanhijfte.com`](http://www.stijnvanhijfte.com)。

