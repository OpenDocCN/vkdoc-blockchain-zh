  trans: '

    ### 公共部门


    在公共部门中，已经识别出多种实施区块链和分布式账本技术的可能性，并且部分已得到应用。我想强调的公共部门第一个方面与养老金有关。


    在欧洲乃至全球，养老金都是选举临近时的核心议题之一。原因之一是养老金占据了政府支出的很大一部分。这就是为什么在比利时以及许多其他国家，存在着所谓的*三支柱*体系。第一支柱是政府在你退休时提供的保障，第二支柱是你的雇主为你储蓄的部分，第三支柱则是你个人自愿预留的资金。


    大多数国家当前养老金计划面临的主要问题在于，需要由在职劳动人口来支付退休人口的养老金。在人口持续增长的时期，这并非问题，但随着出生率下降，该体系正面临严峻挑战。


    区块链来拯救！如果事情真有这么简单就好了。不过，确实有人提出了一些解决方案，至少能部分应对我们当前面临的挑战。这里我们将提及其中几个方案。


    人们目前对养老金计划有何期望？一个易于理解的体系，能让参与者明白如何保障自己的财务未来，并以安全的方式投资。如果可能的话，它应该简便、低成本、无欺诈且容易理解。


    正是为了这个目的，多个参与者已进入市场：帮助人们以一种他们能够信任和理解的方式为自己的未来投资。当然，这绝不可能解决我之前描述体系中的前两大支柱问题，但至少能让人们对自己能为未来预留多少资金有更多把握。


    一个很好的例子是`NestEgg`^(¹¹⁷)，这是荷兰一个基于区块链的解决方案，允许参与者众筹某些可持续基础设施。如果众筹成功，基础设施就会建成，参与者便成为该基础设施的部分所有者。每个产品都有其自身的投资政策（`NestEgg`与荷兰最大的养老基金`AGP`挂钩），你可以选择减少能源账单，或将收益存入银行账户。通过这种方式，你可以慢慢（最低
    25 欧元即可开始投资）增加个人储蓄，同时维持生活成本。与此同时，你也在为未来的基础设施建设提供资金。


    我想在此强调的第二个项目是`Akropolis`。它也专注于第三支柱，面向有兴趣创建个人投资基金的参与者。以去中心化的方式，每个参与者可以选择投资于哪些养老金产品。所有交易以及最终的基金业绩都是透明的。对基金的审计可以毫无障碍地进行。


    当然，当我们审视公共部门时，还可以考虑许多其他可以应用区块链的领域。其中一个领域是合作的概念。无论你身处欧盟还是世界其他地方，与私营部门的合作或公共实体之间的合作都很常见。通过使用区块链平台，可以提升这些合作项目的透明度，从而开启更多机遇和参与可能性。它还能提供政府资金如何支出、决策如何制定以及这些合作产生了何种成果的洞察。目前，这些平台和政府间合作对于任何试图从外部观察的人来说（甚至常常对直接参与其中的人来说）都往往是
    opaque 的，而通过分布式账本，这些治理体系可以变得更加透明。当受合作决策影响的人们能够参与并对他们想要实施的项目进行投票时，这也能使流程民主化，直接将权力赋予受决策影响的公民。^(¹¹⁸)


    这些平台还可以用于减少该领域的欺诈行为，并以清晰、透明且安全的方式管理资金。通过将资金与区块链技术挂钩，还可以通过实施智能合约来提高合规性——如果请求合规，合约会自动触发；如果不符合要求，则会启动监管行动。^(¹¹⁹)
    其他可能性包括政府与公民数据的安全存储、可信政府以及民用在线系统。这些应用可以降低许多现有应用的成本。对于如今任何需要与行政机构打交道的人来说，这很可能是一件麻烦事。为什么？大多数时候，你只有在遇到问题时才会与政府打交道，因此任何流程从一开始就显得缓慢而痛苦。如果你考虑到很多流程确实已经过时，你就会开始理解许多人在想到要与政府打交道时所产生的挫败感。既然这种挫败感很可能持续存在，那么这些应用可以将这些感受降至最低。

    '
- fmt: '### Identity and Voting Applications


    When discussing the blockchain technology, identity is quite an important part
    of it. Traceability and transparency are only effective if identity within the
    platform can be ensured. Luckily, this can easily be done with distributed ledger
    applications. As with many things, voting is an integral part of life if you are
    living in a democracy. There are several risks linked to the voting process, as
    any person can understand. Fraud and deception are two of those risks. But something
    more general and what a lot of people might also understand is the simple frustrations
    that go into the process itself. Getting up early in the morning, or racing from
    your job to simply stand in line to wait, so that you can cast your vote. You
    can end up standing in line for hours due to technical difficulties, or all other
    citizens have the same idea as you and showing up at the last moment.^([^(120)](#fn120))
    Of course there are also other cases where people are prevented from voting by
    "unknown" agents, places where votes disappear, or places where votes seem to
    change over time. On top of that, it has become clear that the percentage of citizens
    who still vote is falling (sometimes dramatically) over time.


    As early as in 2012, there has been research into the possibility of using the
    blockchain technology for the voting process, so that it could be both more secure
    and more reliable for citizens.^([^(121)](#fn121)) If you understand the fundamentals
    of the blockchain technology, it shouldn''t be too hard to see how the technology
    could improve the entire process. It could lock in votes, prove that every citizen
    casted their vote only once, and allow voting from people''s homes. The results
    of the voting process could be processed much quicker than today. This would also
    mean that public consultations could become a process of daily life, as it could
    be much easier to get a vote through digital means.


    Several startups have jumped at the opportunity to optimize this process and are
    now offering solutions (or developing solutions) that might one day replace the
    processes we are so familiar with today. One of these startups is called FollowMyVote.^([^(122)](#fn122))
    The company believes in using digital and technological solutions (of which the
    blockchain technology is a major part) to change government elections. It''s used
    for political party voting, collegiate voting, HOA voting, and proxy voting. It
    uses the BitShares platform and believes that this is the best way forward to
    provide reliable applications that have a predictable way of working.


    A second startup with a focus on the subject is called BitCongress.^([^(123)](#fn123))
    They released a whitepaper as early as 2016 in which they proposed their solution.^([^(124)](#fn124))
    It uses a token-based system where participants can vote based on the number of
    `VOTE` tokens they have.


    Not everyone is happy with the current progress and the use of the blockchain
    technology in a voting landscape. There have been several warnings that turning
    to digital solutions might introduce extra risks in the voting process and possibly
    even pose a threat to democracy.^([^(125)](#fn125)) So far the studies that have
    been reported weren''t positive about Internet-based voting.^([^(126)](#fn126))
    There are currently online votes being cast in several processes. One of these
    examples is the general election process in the U.S., where in 2016 there were
    already over 100,000 ballots being cast online. Why then is the outcome of the
    studies currently negative? Is this linked specifically to blockchain? Of course
    not. Anyone that follows the news in recent years knows and should understand
    the risk of data and Internet-based applications. Influencing possible voters
    is one thing, bombarding citizens with fake news is another, but the actual election
    process? With the results we have seen so far, imagine what would happen if attackers
    were actually able to get in there. The potential of malware and cybersecurity
    risks is manifold.


    The blockchain technology cannot simply eliminate these risks. So rather than
    simply saying that we should use distributed ledgers as a base for a new and digital
    way of voting, distributed ledgers should be only one of several pillars that
    help us develop an easier and more accurate voting system. General security of
    the applications, privacy and integrity of the data, and reliable information
    for the voters are all crucial issues. We shouldn''t lose sight of these key considerations
    before moving forward, because the possible risks if we fail to provide these
    might be more devastating than in any other area.


    ### The Game Industry


    In 2018 about 138 billion USD was spent on video games, making the games industry
    one that you should certainly not ignore.^([^(127)](#fn127)) Even more important
    is that it is an industry more than willing to dive into innovation and new technologies.
    Virtual reality, artificial intelligence, and the newest standards in experiencing
    gaming mean that blockchain can play a role in the story.


    Many possibilities can be discovered when one considers this industry. Many games
    offer in-game purchases, to the frustration of some. Distributed ledgers could
    offer decentralized exchanges. If you are not familiar with gaming, it might be
    difficult to understand, but hacking, fraud, and theft are real problems in this
    virtual world. Considering the amount of money, time, and effort that is spent
    to gain these assets, they are often seen as valuable as any other tangible asset.
    The blockchain technology could also offer a proof of ownership, protecting gamers
    from fraudulent participants. With a distributed ledger, hackers will no longer
    be able to steal property. Also the progress made by players and conversations
    can be stored. When certain events take place, there is proof of what happened
    between the participants, which means admins can provide clear resolutions. This
    is only a conservative view on how the blockchain technology is affecting the
    gaming industry.^([^(128)](#fn128))


    With the tendency to create more and more open worlds, massive multiplayer experiences,
    and unbound rules, the classic setup cannot fully grasp these types of games any
    longer. Why? Participants come from all over the world to work toward a specific
    goal and purpose. Centralized control is therefore no longer a positive thing.
    One wouldn''t want to see discrimination toward any of the players. Striving toward
    fairness, openness, and inclusivity, distributed ledgers could offer these controls.
    Several experiments have been performed to see how we could evolve from centralized
    solutions to decentralized setups, where the players gain more control over the
    environment they are interacting with.


    A notable example is Taurion, which is a sophisticated game of the modern age.^([^(129)](#fn129))
    The players are in full control of the world around them. At the same time there
    is a specific mining system in place; experience can be gained, people can trade,
    fight, and so on. It is a notable example of how gaming experiences can evolve,
    where players gain more and more control instead of being bound to the rules of
    the game environment. This could make the experience even more lifelike and engaging.'
  raw: '### Identity and Voting Applications


    When discussing the blockchain technology , identity is quite an important part
    of it. Traceability and transparency are only effective if identity within the
    platform can be ensured. Luckily, this can easily be done with distributed ledger
    applications. As with many things, voting is an integral part of life if you are
    living in a democracy. There are several risks linked to the voting process, as
    any person can understand. Fraud and deception are two of those risks. But something
    more general and what a lot of people might also understand is the simple frustrations
    that go into the process itself. Getting up early in the morning, or racing from
    your job to simply stand in line to wait, so that you can cast your vote. You
    can end up standing in line for hours due to technical difficulties, or all other
    citizens have the same idea as you and showing up at the last moment.^([^(120)](#fn120))
    Of course there are also other cases where people are prevented from voting by
    “unknown” agents, places where votes disappear, or places where votes seem to
    change over time. On top of that, it has become clear that the percentage of citizens
    who still vote is falling (sometimes dramatically) over time.


    As early as in 2012, there has been research into the possibility of using the
    blockchain technology for the voting process, so that it could be both more secure
    and more reliable for citizens.^([^(121)](#fn121)) If you understand the fundamentals
    of the blockchain technology, it shouldn’t be too hard to see how the technology
    could improve the entire process. It could lock in votes, prove that every citizen
    casted their vote only once, and allow voting from people’s homes. The results
    of the voting process could be processed much quicker than today. This would also
    mean that public consultations could become a process of daily life, as it could
    be much easier to get a vote through digital means.


    Several startups have jumped at the opportunity to optimize this process and are
    now offering solutions (or developing solutions) that might one day replace the
    processes we are so familiar with today. One of these startups is called FollowMyVote.^([^(122)](#fn122))
    The company believes in using digital and technological solutions (of which the
    blockchain technology is a major part) to change government elections. It’s used
    for political party voting, collegiate voting, HOA voting, and proxy voting. It
    uses the BitShares platform and believes that this is the best way forward to
    provide reliable applications that have a predictable way of working.


    A second startup with a focus on the subject is called BitCongress.^([^(123)](#fn123))
    They released a whitepaper as early as 2016 in which they proposed their solution.^([^(124)](#fn124))
    It uses a token-based system where participants can vote based on the number of
    VOTE tokens they have.


    Not everyone is happy with the current progress and the use of the blockchain
    technology in a voting landscape. There have been several warnings that turning
    to digital solutions might introduce extra risks in the voting process and possibly
    even pose a threat to democracy.^([^(125)](#fn125)) So far the studies that have
    been reported weren’t positive about Internet-based voting.^([^(126)](#fn126))
    There are currently online votes being cast in several processes. One of these
    examples is the general election process in the U.S., where in 2016 there were
    already over 100,000 ballots being cast online. Why then is the outcome of the
    studies currently negative? Is this linked specifically to blockchain? Of course
    not. Anyone that follows the news in recent years knows and should understand
    the risk of data and Internet-based applications. Influencing possible voters
    is one thing, bombarding citizens with fake news is another, but the actual election
    process? With the results we have seen so far, imagine what would happen if attackers
    were actually able to get in there. The potential of malware and cybersecurity
    risks is manifold.


    The blockchain technology cannot simply eliminate these risks. So rather than
    simply saying that we should use distributed ledgers as a base for a new and digital
    way of voting, distributed ledgers should be only one of several pillars that
    help us develop an easier and more accurate voting system. General security of
    the applications, privacy and integrity of the data, and reliable information
    for the voters are all crucial issues. We shouldn’t lose sight of these key considerations
    before moving forward, because the possible risks if we fail to provide these
    might be more devastating than in any other area.


    ### The Game Industry


    In 2018 about 138 billion USD was spent on video games , making the games industry
    one that you should certainly not ignore.^([^(127)](#fn127)) Even more important
    is that it is an industry more than willing to dive into innovation and new technologies.
    Virtual reality, artificial intelligence, and the newest standards in experiencing
    gaming mean that blockchain can play a role in the story.


    Many possibilities can be discovered when one considers this industry. Many games
    offer in-game purchases, to the frustration of some. Distributed ledgers could
    offer decentralized exchanges. If you are not familiar with gaming, it might be
    difficult to understand, but hacking, fraud, and theft are real problems in this
    virtual world. Considering the amount of money, time, and effort that is spent
    to gain these assets, they are often seen as valuable as any other tangible asset.
    The blockchain technology could also offer a proof of ownership, protecting gamers
    from fraudulent participants. With a distributed ledger, hackers will no longer
    be able to steal property. Also the progress made by players and conversations
    can be stored. When certain events take place, there is proof of what happened
    between the participants, which means admins can provide clear resolutions. This
    is only a conservative view on how the blockchain technology is affecting the
    gaming industry.^([^(128)](#fn128))


    With the tendency to create more and more open worlds, massive multiplayer experiences,
    and unbound rules, the classic setup cannot fully grasp these types of games any
    longer. Why? Participants come from all over the world to work toward a specific
    goal and purpose. Centralized control is therefore no longer a positive thing.
    One wouldn’t want to see discrimination toward any of the players. Striving toward
    fairness, openness, and inclusivity, distributed ledgers could offer these controls.
    Several experiments have been performed to see how we could evolve from centralized
    solutions to decentralized setups, where the players gain more control over the
    environment they are interacting with.


    A notable example is Taurion, which is a sophisticated game of the modern age.^([^(129)](#fn129))
    The players are in full control of the world around them. At the same time there
    is a specific mining system in place; experience can be gained, people can trade,
    fight, and so on. It is a notable example of how gaming experiences can evolve,
    where players gain more and more control instead of being bound to the rules of
    the game environment. This could make the experience even more lifelike and engaging.'
  trans: '

    ### 身份与投票应用


    在讨论区块链技术时，身份是其相当重要的组成部分。可追溯性和透明性只有在能够确保平台内的身份时才有效。幸运的是，通过分布式账本应用可以轻松实现这一点。与许多事物一样，如果你生活在民主国家，投票是生活中不可或缺的一部分。任何人都能理解，投票过程存在若干风险。欺诈和欺骗是其中两种风险。但还有更普遍的问题，许多人可能也能理解，那就是投票过程本身带来的简单挫败感。清晨早起，或从工作中匆忙赶往投票站，只为排队等候，以便投下自己的一票。由于技术故障，或者所有其他公民都与你想法一致、在最后一刻蜂拥而至，你可能最终要排队数小时。^(¹²⁰)
    当然，还有其他情况，例如人们被“不明”势力阻止投票，某些地方的选票凭空消失，或者选票似乎随时间而改变。最重要的是，事实已变得很清楚：公民的投票率正在随时间下降（有时甚至急剧下降）。


    早在 2012 年，就已经有研究探讨将区块链技术用于投票过程的可能性，以便使其对公民来说既更安全又更可靠。^(¹²¹) 如果你理解区块链技术的基本原理，应该不难看出该技术如何能改进整个流程。它可以锁定选票，证明每位公民只投了一次票，并允许人们在家中投票。投票结果的处理速度可以比今天快得多。这也意味着，公众咨询可能成为日常生活的一部分，因为通过数字手段进行投票可能会容易得多。


    多家初创公司已抓住机会优化这一流程，并正在提供（或开发）可能有朝一日取代我们今天所熟悉流程的解决方案。其中一家初创公司名为 FollowMyVote。^(¹²²)
    该公司相信，使用数字和技术解决方案（其中区块链技术是主要部分）可以改变政府选举。它用于政党投票、学院投票、业主协会投票和代理投票。该公司使用 BitShares
    平台，并相信这是提供具有可预测工作方式的可靠应用的最佳途径。


    第二家专注于该领域的初创公司名为 BitCongress。^(¹²³) 他们早在 2016 年就发布了一份白皮书，提出了他们的解决方案。^(¹²⁴) 它采用基于代币的系统，参与者可以根据他们拥有的`VOTE`代币数量进行投票。


    并非所有人都对当前进展以及区块链技术在投票领域的使用感到满意。有一些警告指出，转向数字解决方案可能会给投票过程带来额外风险，甚至可能对民主构成威胁。^(¹²⁵)
    迄今为止，所报道的研究对基于互联网的投票并不持积极态度。^(¹²⁶) 目前，在若干流程中已有在线投票在进行。其中一个例子是美国的大选过程，2016 年已有超过
    10 万张选票是在线投出的。那么，为什么研究结果目前是负面的呢？这是否专门与区块链有关？当然不是。任何关注近年新闻的人都知晓并应理解数据和基于互联网的应用的风险。影响潜在选民是一回事，用假新闻轰炸公民是另一回事，但实际的选举过程呢？考虑到我们迄今看到的结果，想象一下如果攻击者真的能够侵入其中会发生什么。恶意软件和网络安全风险的潜在可能性是多方面的。


    区块链技术无法简单地消除这些风险。因此，与其仅仅说我们应该使用分布式账本作为新的数字化投票方式的基础，不如说分布式账本应该只是帮助我们开发更简单、更准确的投票系统的几个支柱之一。应用的整体安全性、数据的隐私和完整性，以及为选民提供可靠信息，都是关键问题。在前进之前，我们不应忽视这些关键考量，因为如果我们未能提供这些保障，可能带来的风险将比任何其他领域都更具破坏性。


    ### 游戏产业


    2018 年，视频游戏领域的花费约为 1380 亿美元，这使得游戏行业成为一个绝不可忽视的领域。^(¹²⁷) 更重要的是，这是一个非常愿意投身于创新和新技术的行业。虚拟现实、人工智能以及体验游戏的最新标准，意味着区块链可以在其中发挥作用。


    当考虑这个行业时，可以发现许多可能性。许多游戏提供游戏内购买，这让一些玩家感到沮丧。分布式账本可以提供去中心化交易所。如果你不熟悉游戏，可能很难理解，但黑客攻击、欺诈和盗窃在这个虚拟世界中是真实存在的问题。考虑到获取这些资产所花费的金钱、时间和精力，它们通常被视为与任何其他有形资产一样有价值。区块链技术还可以提供所有权证明，保护游戏玩家免受欺诈参与者的侵害。借助分布式账本，黑客将无法再窃取财产。此外，玩家取得的进展和对话也可以被存储。当某些事件发生时，参与者之间发生的事情就有证据可查，这意味着管理员可以提供清晰的解决方案。这仅是对区块链技术如何影响游戏行业的一个保守看法。^(¹²⁸)


    随着创建更开放世界、大规模多人游戏体验和无限制规则的趋势，传统的设置已无法完全把握这类游戏。为什么？参与者来自世界各地，共同朝着特定目标和目的努力。因此，集中控制不再是好事。人们不希望看到对任何玩家的歧视。分布式账本追求公平、开放和包容，能够提供这些控制机制。已经进行了若干实验，以探索我们如何从中心化解决方案发展到去中心化设置，让玩家对他们所互动的环境获得更多控制权。


    一个值得注意的例子是 Taurion，这是一款现代复杂游戏。^(¹²⁹) 玩家完全掌控他们周围的世界。同时，游戏中存在特定的挖矿系统；可以获取经验，人们可以进行交易、战斗等。这是一个显著的例子，展示了游戏体验如何演变，玩家获得越来越多的控制权，而不是被游戏环境的规则所束缚。这可以使体验更加逼真和引人入胜。

    '
- fmt: '### Education


    The sector has an important set of challenges such as the openness of the sector.
    It is a sound principle that everyone should have access to education. The reality
    is completely different. Sadly, a lot of people to this day do not have equal
    opportunities and cannot partake in the education system as they should. On top
    of that, the cost of proper education has been increasing over the years, leading
    to massive amounts of debt and people not being able to even start the educational
    track they would like to. Teachers will also tell you that there is a decline
    in people that are willing to positively participate in classes and in many countries
    there is simply a shortage of educational professionals.


    However, the future isn’t all bleak. There has been an interesting rise in education
    technology. New technologies, such as virtual reality and artificial intelligence,
    are easily integrated in the classroom, and there is also a place for the blockchain
    technology. These solutions aren’t going to solve all the issues that are plaguing
    the educational industry, but they are changing the way knowledge is shared and
    might actually bring hope to a currently hard situation. The `edtech` industry^([^(130)](#fn130))
    will reach about 94 billion USD in 2020, which shows that we should take this
    industry seriously.


    A first way that the blockchain technology plays a major role is by issuing diplomas
    or certifications. More and more digital courses have become available and (often)
    at low or reasonable prices. The actual diplomas themselves could be issued and
    linked to a blockchain platform. This could have several benefits. First of all,
    one could never argue that a student didn’t achieve his diploma. Next, the student
    could easily share his proof with possible employers and would retain full control
    over his personal data. One would not be able to falsify or lie about a diploma.^([^(131)](#fn131))
    Sharing information between educational institutions and/or the government would
    become a lot easier and credits, sponsorships, and results could easily be verified.
    At the same time, it would offer a safer way of storing this information than
    is currently available to many universities or schools. Many other industries
    are plagued by the fact that they have limited resources and cannot afford to
    spend a lot on cybersecurity or on storing credentials. By using distributed ledgers,
    they can secure this information much better.


    We already touched on the subject several times, but the cost of education is
    high and seems to be ever increasing. Several initiatives have been created to
    improve the road toward a valuable degree. One is the development of the MOOC
    (Massive Open Online Course). There were over 101 million registered users of
    MOOCs in 2018, which shows that more and more people are turning in this direction
    for further education.^([^(132)](#fn132)) Here, blockchain could not only help
    store credentials but could use micropayments, smart contracts automating exams,
    tests, and course delivery, and so on. Potential lies in the way information is
    shared with students and library services as well. The blockchain technology could
    help distribute information in a more affordable and socially acceptable manner.^([^(133)](#fn133))


    One startup looking into education and distributed ledger technology is `Disciplina`.^([^(134)](#fn134))
    It focuses on test preparation and learning.


    ### Human Resources


    The human resources or HR function has a broad and important job in any company.
    Communication between businesses, vendors, people, activities, and processes are
    all aligned by this department. Currently the newspapers are talking about the
    “war for talent” in many different sectors being fought by HR and recruitment
    professionals. One shouldn’t underestimate the pressure a lot of people in the
    industry are feeling and, as always, we can assume that the blockchain technology
    could in some part ease the pain.^([^(135)](#fn135))


    With the use of smart contracts, imagine that the management of in-house talent
    and external sourcing could be in part automated. Budget approvals could be linked
    to strict rules, just as authorizations and reviews are. New hires could be subject
    to automated testing and training. Corporate policies could be easily shared and
    digital signing can be verified on a blockchain platform. Background and employment
    checks could be verified by a simple click.


    Employment contracts could in the same way be managed, stored, and shared with
    employees. Future changes could be managed and tracked over time. Payments and
    benefits could be fully automated over a blockchain platform without any human
    intervention, easing the payment process, proving verifiable payments, and leaving
    a perfect audit trail.


    External talent could be contacted, signed, and paid over the same platform. In
    a world where working at home and teleworking have more and more become the norm
    in our society, they could more easily be managed. As with many other examples,
    blockchain could help with fraud prevention, improve the security of personal
    data, and give proof of existence through verification by the network’s nodes.^([^(136)](#fn136))


    ### Automotive Industry


    The automotive industry has an increased need for connectivity with the rise of
    connected vehicles, fleets, and autonomous vehicles. With these connected vehicles
    is the need for an infrastructure that can pick up these signals. The industry
    is currently researching whether the blockchain technology could serve as a clear
    infrastructure layer. The current problems lie in the fact that each manufacturer
    is creating its own competing technologies without a real standard, so these implementations
    are uncoordinated, incompatible, and wasteful.^([^(137)](#fn137)) With the implementation
    of more and more IoT solutions in these cars and trucks, great optimizations can
    be achieved when we look at fleet management, payment services, infotainment,
    and other services.


    Blockchain could help with the management of vehicles for large enterprises. Again,
    transparency could be gained and the entire process of managing vehicles and verifying
    the origin would be simplified in this manner. You could also think about insurance
    and payment processes, verification of the origin of vehicles, and even `KYS`
    (know your supplier) processes, which are necessary to prove that vehicles aren’t
    stolen and are the responsibility of the seller. In the same vein, we have to
    be able to verify the repairs that have happened to a vehicle. Can we trust anyone
    performing these repairs? In what state was the car before these repairs? Is the
    correct mileage reported or not?^([^(138)](#fn138)) All of these questions could
    be answered by using distributed ledgers.'
