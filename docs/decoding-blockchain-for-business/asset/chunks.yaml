    tracked via 5G. Another stated that 5G suppresses the immune system and yet another
    stated that the Coronavirus spread certain radio waves themselves, which it uses
    to communicate to one another. This led to people in the UK, the Netherlands,
    and other countries to set fire to the 5G masts. This example shows how dangerous
    fake news can be and that combating these techniques should be a priority of everyone.


    Blockchain platforms can offer traceability, transparency, and security when it
    comes to news articles. It could not only help to verify the source of certain
    articles, but also allow participants to flag articles as fake news, hence forcing
    out those that would abuse the (decentralized) network and prove the value of
    the information that is being spread. *The New York Times* Company is testing
    the blockchain technology to combat fake news and misinformation.^([^(104)](#fn104))
    The proof of concept they currently have stores metadata of photos and videos
    such as data, place of the image, person who took the shot, how it was edited,
    and how it was eventually published. Another company using distributed ledgers
    to fight fake news is Orange. You might not immediately imagine a telecoms operator
    focusing on fake news, but as a major operator in the communication process, they
    have seen and understood that they play a major role in spreading fake news.^([^(105)](#fn105))
    Orange worked together with the startup called Block Expert to create the application
    called safe.press.^([^(106)](#fn106))


    The safe.press application allows you to check the source of an article, so that
    you can verify if the article you are reading is reliable. One could still try
    to defraud the source, but this is very interesting step in the move to secure
    information. It is not the only one of its kind, so it will be interesting to
    see how these applications evolve over time. Again, you shouldn’t be blind to
    the possible downsides of this technology. If a country controls the Internet
    use of its citizens and controls all the sources of news, it would in fact control
    all information its citizens are receiving through the majority of its sources.


    The possibilities of the blockchain technology within media are of course broader.^([^(107)](#fn107))
    We are currently experiencing the rise (and fall) of multiple platforms that allow
    anyone with a computer and an Internet connection to participate in the media
    sector. This doesn’t take away that there are still major players that actually
    control the market. This leads to uneven compensation for the actual creators
    of content. With blockchain-based platforms, all creators can receive direct compensation
    for the use of their content and property. This can also be used to track the
    authorized viewers, usage of content, transfer of ownership, and smart contracts
    that can manage the entire process, end to end. This effectively eliminates the
    need to work with third parties that are often not compensating the creators as
    they should be.


    There are many startups that have seen these opportunities and entered the media
    industry with specific solutions. We mentioned earlier in this books startups
    such as Ujo Team, Opus Foundation, and Stem, which focus on the streaming industry
    in particular. They offer channels for independent music distribution, freedom
    for the artists when it comes to compensation, automating royalty payments in
    general, and allowing for the contact with their fans in open and distributed
    ways so that none of them can be blocked from content.


    Another important topic in the media industry is that of intellectual property
    rights and certainly how these can be protected in the modern age. Piracy is nothing
    new and most people are aware of how they can get a free copy of almost anything.
    The blockchain technology could not only help manage the authorized users who
    have access to certain content, but could also help manage and timestamp everything.
    This would effectively prevent any attempts of tampering during any step of the
    process. Startups such as Mediachain and Monegraph focus on the subject and want
    to empower the creators.


    We should also consider public events that require the purchase of a ticket. Each
    year there are many attempts to commit fraud in this regard. In this vein, there
    are also a great many attempts in the sale of pirated merchandising. As we previously
    mentioned, the blockchain technology can provide an extra layer of authenticity.^([^(108)](#fn108))'
  trans: '

    ### 金融工具


    我们之前提到，区块链世界也涌现出了新型金融产品。需要立即说明的是，地方金融监管机构有权决定某个国家内何种工具属于合法金融工具。一些国家的定义相当宽泛，而另一些国家则试图让加密空间尽可能远离客户，以保护他们免受潜在损失。


    例如，自 2020 年 3 月 2 日起，德国的法律定义如下：“一种价值的数字表示形式，未由任何中央银行或公共机构发行或担保，且不一定与法律规定的货币挂钩，不具有法定货币或金钱的法律地位，但被自然人或法人接受为交换媒介，并能够以电子方式传输、存储和交易。”^(¹⁰²)
    这为可能的金融工具提供了非常广泛的基础，但也对监管计划和合规性提出了严格要求，以确保为合适的客户推荐合适的投资，从而避免风险厌恶型客户最终陷入高风险投资。


    正是这种通常不确定的监管环境，已被证明是进一步创新的障碍。这是一把双刃剑，因为新工具可以帮助那些无法获得常规金融服务的人维持生计并增加收益。另一方面，为那些通常不被充分理解的工具敞开大门，可能导致更高的风险（正如
    2008 年的银行业危机和 2018 年的加密市场崩盘向我们展示的那样）。


    若世界各地的监管机构能够协同合作，达成类似条款，便能减少监管的不确定性，为新型金融工具创造一个稳定的基础。在本书的后续章节中，您将读到关于加密货币监管的完整一节，其中真正展示了在对待加密货币时存在的解读差异。


    有趣的是，现在也有了专注于加密货币的投资基金。贷款工具、看跌和看涨期权以及自动化合约都已问世。


    ## 金融世界之外


    尽管对于许多人来说，区块链技术将永远与金融和金融行业联系在一起，但这并不意味着在区块链技术之外没有应用机会或可能性。人们可以关注许多不同的行业或部门，但以下部分仅列举了几个例子，以便您了解人们是如何以新颖且创新的方式使用分布式账本的。


    ### 媒体行业


    区块链技术可能证明其价值的一个重要领域是媒体和新闻界。^(¹⁰³) 在过去几年中，我们看到了几个例子，其中假新闻以有害的方式影响了人们的行为。这些往往是旨在诋毁某些政党或个人的定向尝试。它们还被用来左右政治决策，并攻击大公司的声誉。近期一个关于假新闻及其对世界负面影响的例子是新冠病毒。网络上散布着多种阴谋论。一种说法称，政府应对新冠病毒的传播负责，目的是将追踪标签通过疫苗注入人体，并利用
    5G 进行跟踪。另一种说法则称 5G 会抑制免疫系统，还有一种说法称新冠病毒自身传播某种无线电波，用以相互通信。这导致英国、荷兰等国家的人们纵火焚烧 5G
    基站。这个例子展示了假新闻的危害性，打击这些伎俩应成为每个人的优先事项。


    在新闻文章方面，区块链平台可以提供可追溯性、透明度和安全性。它不仅能帮助验证特定文章的来源，还能让参与者将文章标记为假新闻，从而迫使那些滥用（去中心化）网络的人出局，并证明所传播信息的价值。*纽约时报*公司正在测试区块链技术，以打击假新闻和错误信息。^(¹⁰⁴)
    他们目前的概念验证会存储照片和视频的元数据，例如数据、图像地点、拍摄者、编辑方式以及最终发布方式。另一家使用分布式账本打击假新闻的公司是 Orange。你可能不会立刻想到一家电信运营商会关注假新闻，但作为通信过程中的主要运营商，他们看到并理解自己在传播假新闻中扮演着重要角色。^(¹⁰⁵)
    Orange 与名为 Block Expert 的初创公司合作，创建了名为 `safe.press` 的应用。^(¹⁰⁶)


    `safe.press` 应用允许你检查文章的来源，从而可以验证你正在阅读的文章是否可靠。虽然仍有可能有人试图欺骗来源，但这是迈向确保信息安全的一个非常有趣的步骤。它并非同类中的唯一一个，因此观察这些应用如何随时间演变将会很有趣。同样，你不应该对这一技术可能的缺点视而不见。如果一个国家控制其公民的互联网使用并控制所有新闻来源，那么它实际上就控制了其公民通过大多数来源接收到的所有信息。


    当然，区块链技术在媒体领域的可能性更为广泛。^(¹⁰⁷) 我们目前正在经历多个平台的兴起（与衰落），这些平台允许任何拥有电脑和互联网连接的人参与媒体行业。但这并不能消除市场中仍存在掌控市场的大型参与者的事实。这导致了对内容实际创作者的不公平补偿。通过基于区块链的平台，所有创作者都可以因其内容和财产的使用而获得直接补偿。这还可用于追踪授权观众、内容使用情况、所有权转移，以及能够端到端管理整个流程的智能合约。这有效地消除了与通常未能按应有标准补偿创作者的中介合作的需求。


    许多初创公司看到了这些机会，并带着特定解决方案进入了媒体行业。我们在本书前面提到过一些初创公司，如 `Ujo Team`、`Opus Foundation`
    和 `Stem`，它们特别侧重于流媒体行业。它们为独立音乐发行提供渠道，让艺术家在报酬方面拥有自由，普遍实现版税支付的自动化，并允许以开放和分布式的方式与粉丝接触，使任何人都无法被屏蔽内容。


    媒体行业的另一个重要议题是知识产权，以及在现代如何保护这些权利。盗版并非新鲜事，大多数人都知道如何获取几乎任何东西的免费副本。区块链技术不仅能帮助管理有权访问特定内容的授权用户，还能帮助管理所有内容并添加时间戳。这将有效防止流程中任何环节的篡改尝试。像
    `Mediachain` 和 `Monegraph` 这样的初创公司专注于这个主题，并希望赋能创作者。


    我们还应该考虑需要购票的公共活动。每年都有许多这方面的欺诈企图。同样，在销售盗版周边商品方面也有大量此类尝试。正如我们之前提到的，区块链技术可以提供额外的真实性保障。^(¹⁰⁸)

