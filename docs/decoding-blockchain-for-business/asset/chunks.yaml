  trans: '

    ### 稳定币


    `稳定币`是区块链世界和加密货币中另一个需要我们重视的重要方面。这类币种专门设计用于降低加密货币的波动性，通常与一种稳定的资产或一篮子资产挂钩。^(²⁶²)
    这些货币可以由大宗商品、法定货币或其他加密货币作为支撑。


    第一个例子是`Digix Gold Token`，它由黄金支撑。这种代币将金本位引入加密货币世界，明确地与一种贵金属挂钩并以其为支撑，这比由法定货币或其他加密货币支撑的稳定币提供了更高的安全性。^(²⁶³)


    法定货币支撑的稳定币的价值基于与之挂钩的法定货币，由第三方（受监管的金融实体）持有该支撑法币的价值。这些代币可以在发行方处交易并兑换成支撑货币。不应低估这种挂钩的成本，因为需要考虑维持支撑储备、法律合规性、维持许可证、审计等方面的成本。`TrustToken`是一家专注于发行稳定币的公司，例如`TrueUSD`、`TrueGBP`、`TrueAUD`等。^(²⁶⁴)
    它利用多家第三方金融机构来维持与这些货币的挂钩，并声称过去已通过多项安全审计。^(²⁶⁵)


    第二种、也是更具争议的法定货币支撑的稳定币是`Tether`。其白皮书由 J.R. Willett 于 2012 年 1 月发布，描述了一种基于比特币网络的新型加密货币。通过使用`Mastercoin`和`Mastercoin
    基金会`（现为`Omni 基金会`），他（与 Brock Pierce 共同）创建了`Tether`加密货币。它曾声称由美元支撑，但在 2019 年 3 月
    14 日改变了这一说法。^(²⁶⁶) 从那天起，其支撑资产还包括对关联公司的贷款，因此立即危及了其作为稳定币的地位。


    更糟糕的是，纽约总检察长指控`Bitfinex`挪用了高达 8.5 亿美元的`Tether`储备金，以掩盖其自身的资金缺口，此事发生在 2018 年年中，且从未公开披露。^(²⁶⁷)
    `Tether Limited`现在甚至声称，`Tether`持有者没有合同权利或法律权利要求将`Tethers`兑换成美元。2019 年 4 月 30 日，`Tether
    Limited`的律师声称，每个`Tether`有 0.74 美元的现金及现金等价物支撑。^(²⁶⁸)


    该公司还被指控未能提供支撑`Tether`的充足储备所承诺的审计结果、操纵比特币价格、与`Bitfinex`交易所关系不明确（天堂文件泄露表明两者存在关联，因为
    Philip Potter 和 Giancarlo Devasini 于 2014 年在英属维尔京群岛负责设立了`Tether Holdings Limited`；此外，还有事实表明，`Bitfinex`和`Tether`的发言人称两者的首席执行官均为
    Jan Ludovicus van der Velde^(²⁶⁹)），以及缺乏长期银行合作关系（曾有交易通过一家台湾银行，再回溯到富国银行进行）。^(²⁷⁰)
    2017 年，其他`Tether`币被发行——比特币 Omni 层上的`Euro Tether`，以及以太坊网络上作为 ERC-20 代币的 USD 和`Euro
    Tether`。


    `Tether`的案例清楚地表明，不能盲目信任稳定币。然而，你应该了解`Tether`的流行程度，就每日交易量而言，它是交易量最大的加密货币。它在亚洲非常受欢迎，甚至有人担心其每日产生的交易数量会堵塞以太坊网络。


    另一个希望填补空白并创建主要稳定币的参与者是 Facebook，其项目名为“Libra”。`Libra`（以前称为`GlobalCoin`或`Facebook
    coin`）的发布预计最早在 2020 年，所以目前还不存在，但围绕该项目已经出现了一些争议。该项目始于 2017 年，由 Morgan Beller 负责
    Facebook 的区块链计划（后来 David Marcus 和 Kevin Well 加入该项目）。^(²⁷¹) 到 2019 年 2 月，已有约 50
    名工程师在一个完全独立的部门从事该项目。


    该项目遭到了大量批评，这也与 Facebook 在用户隐私方面的可疑声誉有关。过去的一些丑闻表明，该公司对隐私监管相当轻视（想想 Cambridge Analytica
    事件），因此，与这家互联网巨头挂钩的加密货币似乎是控制我们个人数据的下一步。其他担忧则与该公司庞大的规模和用户数量有关，这使其可与许多法定货币相抗衡，但却缺乏中心化货币所具备的制衡机制。`Libra`也不会是一种去中心化货币，而是采用中心化系统，其核心是位于瑞士日内瓦的“Libra
    协会”。`Libra`的储备篮将由 50%美元、18%欧元、14%日元、11%英镑和 7%新加坡元组成。


    由于来自公众和许多监管机构的批评，该货币的推出已被叫停。9 月 4 日，马克·扎克伯格宣布，在所有（美国）监管问题得到解决之前，将推迟推出。^(²⁷²) 最初，这些计划得到了多家大型和重要的支付机构的支持。`PayPal`于
    2019 年 10 月 4 日退出该项目，而`eBay`、`MasterCard`、`Stripe`、`Visa`和`Mercado Pago`于 10 月
    11 日退出，`Bookings Holdings`则于 14 日退出。一些公司仍支持该协会，例如`Uber`、`Spotify`、`Lyft`、`PayU`、`Coinbase`等众多机构。


    美国的反应相当严厉，特朗普总统声称 Facebook 必须遵守银行监管规定，并质疑他们是否还希望继续该项目。^(²⁷³) 欧洲，尤其是法国的反应更为激烈，法国财政部长布鲁诺·勒梅尔声称`Libra`可能对国家的货币主权构成威胁，因此不应被允许开发。他还表示，`Libra`可能涉及滥用市场支配地位，并可能引入系统性金融风险。德国欧洲议会议员
    Markus Feber 也警告称，Facebook 凭借其对`Libra`的控制权，可能成为影子银行。


    日本政府也已开始调查`Libra`可能如何影响其货币政策与金融监管。最后，瑞士也发出了警示信号，联邦数据保护与信息专员表示从未收到过 Facebook 的任何联系（而
    David Markus 此前曾在美国参议院声称他们将监督该项目）。'
- fmt: '最后，还有加密货币支持的稳定币。虽然它们与法定货币支持的加密货币非常相似，主要区别在于加密支持的稳定币以去中心化的方式使用智能合约来支撑其价值。^([^(274)](#fn274))
    这些稳定币通常还允许用户通过智能合约获取贷款，并锁定一定数量的抵押品。如果抵押品的价值下跌到接近用户提款价值时，这些智能合约可能会清算用户的贷款。你可以立即感觉到，这些币需要更多的编码工作来实现，从而引入了出现漏洞和可能被利用的风险。过去有`DAI
    Maker`稳定币（目前已经转变为与美元挂钩的法定货币支持稳定币），但`Synthetix`公司除了提供法定货币支持的稳定币外，仍然提供加密货币支持的稳定币。


    最后一个我们应该研究的例子是铸币税风格的稳定币，它们没有任何资产支持。这里，有算法来调节货币供应量，以确保货币维持一定的价格。一个想要实现这一目标的项目叫做“Basis”，但最终因美国证券法规的适用性而被关闭。^([^(275)](#fn275))


    ### 数字孪生与区块链


    近年来，另一个受到额外关注的领域是创建数字孪生以保护品牌免受假冒。^([^(276)](#fn276)) 当然，数字孪生并不仅限于区块链技术，正如我们通过数字身份所知。然而，区块链平台提供了一种新的方式，可以安全地存储数字孪生，且没有中心化的控制点或单点故障。


    区块链提供了添加数据并跟踪资产流程的可能性，而无法轻易修改或破坏已存储的数据。将这一理念与数字证书或区块链关联身份相结合，你就能设计一个流程，在全球范围内跟踪资产、服务和产品。非同质化代币（NFT）的概念在这里扮演着重要角色，因为它们代表了数字世界中的资产。


    那么，数字孪生能在哪里证明其价值呢？一个非常有趣的例子是药品和假冒产品。通过在区块链上创建数字孪生，可以轻松追踪产品从生产者到消费者的全过程，任何与系统数据不匹配的产品都可以被标记为至少可疑。这可以为当前打击药物滥用和药品假冒的斗争增加一层保障。第二个例子是房地产市场的公证服务，人们可以基于区块链上的数字孪生来买卖房屋。


    基于以上例子，你应该很容易想到一些其他例子，说明数字孪生可能在哪些方面证明其有用性或趣味性，并能增强当前的工作方式。与任何去中心化技术一样，其成功很大程度上取决于流程中不同参与方的合作。


    `Luxtag`是一家专注于产品和资产安全的公司。^([^(277)](#fn277)) 他们提供了一个基础`API`，用于将产品作为数字孪生进行跟踪，同时还提供防篡改凭证。


    ### 区块链与数字身份


    当今世界一个常见的问题是个人身份问题。尽管在联合国《儿童权利公约》中它已被确定为一项基本人权，但我们经常在许多国家发现问题。这些问题与那些经历过战争、贫困或缺乏治理的地方有关。没有基本的个人信息，你在几乎所有方面都会受到限制，因为你无法拥有财产、投票、接受政府服务、拥有银行账户、找到工作、寻求保护或追求其他任何事情。^([^(278)](#fn278))


    按照目前的运作方式，集中式机构需要为你提供身份，即使提供了，它们仍可能不当处理你的数据。最后一个考虑因素是身份盗窃的可能性，这在现代世界中始终存在。如果你看一下难民的案例，通常很难核实他们的身份、背景故事和资质，尤其是当他们来自一个处于战争状态、信息被破坏且无法核查的国家时。根据世界银行集团2018年的#ID4D全球数据集，全球有近10亿人难以证明自己的身份！^([^(279)](#fn279))
    除此之外，大约有17亿人没有银行账户。^([^(280)](#fn280)) 区块链解决方案不仅可能为那些被现代世界中心化方案排除在外的人提供支付手段，还可能帮助他们最终证明自己的身份。


    它能如何应对数字身份当前的挑战呢？好吧，当我们想到身份盗窃时，关键就在于我们如何让两个不同的人极难使用同一个身份。试图对同一个数字单位使用两次也被称为“双重支付”问题。类似于防止双重支付，区块链技术可以防止系统中的恶意分子双重使用单一身份。通过使用哈希值，可以确保数字文件未被篡改，否则你会立即发现数据中的某些内容发生了变化，从而证明他们处理的已不再是原始文档。最后，还有在系统中尝试执行某些进程时可能存在的恶意意图。通过使用去中心化共识，这些进程可以在系统中被阻止，从而保护参与者免受攻击者的侵害。


    最重要的是，如果我们能在全球范围内就一个去中心化系统达成共识，身份将不再是问题。我们将拥有每个人不可逆转的证明，而无需质疑数据是否正确或数据是否属于另一个人。当然，这不会在明天实现，但已有多个项目正在使用区块链技术进行数字身份建设，例如`Sovrin`基金会（也是`Hyperledger
    Indy`背后的组织）、`Civic`和`uPort`。'
  raw: 'Finally, there are also cryptocurrency-backed stablecoins. While these are
    very similar to fiat-backed cryptocurrencies, the main difference lies in the
    fact that crypto-backed stablecoins use smart contracts in a decentralized fashion
    to back their coins.^([^(274)](#fn274)) These also often allow users to take out
    loans against a smart contract, locking in a certain amount of collateral. These
    smart contracts may liquidate the user’s loan if the collateral decreases too
    close to the value of their withdrawal. You can immediately sense that these coins
    require more implementation effort via coding, introducing the risk of bugs and
    possible exploits. You used to have the DAI Maker stablecoin (which has currently
    been transformed into a fiat-backed stablecoin, pegged to USD), but the Synthetix
    company still offers, next to fiat-backed stablecoins, cryptocurrency-backed stablecoins.


    One final example we should look into are the seigniorage-style stablecoins, which
    are not backed by any asset. Here, there are algorithms in place that regulate
    the money supply so that they can ensure that the currency maintains a certain
    price. One project that wanted to achieve this is called “Basis,” but it was eventually
    shut down because of the U.S. securities regulations that would have applied to
    the project.^([^(275)](#fn275))


    ### Digital Twins and Blockchain


    Something that has also gotten some extra attention in recent years is the creation
    of digital twins to protect brands against counterfeiting.^([^(276)](#fn276))
    Digital twins are of course not only limited to blockchain technology, as we all
    know with our digital identities. However, blockchain platforms offer a new way
    of storing a digital twin in a secure manner and without a centralized point of
    control or single point of failure.


    Blockchain offers the possibility to add data and follow the process of an asset,
    without the possibility to simply modify or corrupt the data that has been stored.
    Combine this idea with that of digital certificates or blockchain-linked identities
    and you are able to design a process to follow up on assets, services, and products
    all over the world. The concept of non-fungible tokens takes a prominent role
    here, as these represent the asset in the digital world.


    Now, where can these digital twins prove their worth? A very interesting example
    is that of pharmaceuticals and counterfeited products. By creating digital twins
    on the blockchain, one can easily follow a product from producer to consumer,
    and any product not matching the data in the system can be tagged as at least
    suspicious. This could add an extra layer to the current battle against drug abuse
    and medicine counterfeiting. A second example is that of notary services for the
    real estate market, where one could buy or sell a house based on the digital twin
    that is available on the blockchain.


    Based on the previous examples, it should be fairly simple for you to think about
    some other examples where digital twins could prove to be useful or interesting
    and could enhance the current way of working. As with any decentralized technology,
    a lot will depend on the cooperation of different parties within the process,
    to make these digital trends a success.


    Luxtag is an example of a company focusing on product and asset security.^([^(277)](#fn277))
    They offer a base API to follow your product as a digital twin, but also tamper-proof
    credentials.


    ### Blockchain and Digital Identity


    A common issue in our world today is that of personal identity. Even though it
    has been identified as a basic human right in the UN’s convention on the rights
    of the child, we often find problems in many countries. These relate to places
    that have been faced with war, poverty, or lack of governance. Without some basic
    personal information, you are limited in almost every way, as you cannot own property,
    vote, receive government services, have a bank account, find employment, ask for
    protection, or pursue anything else for that matter.^([^(278)](#fn278))


    As it currently works, centralized institutions need to give you an identity,
    and if they do so, they can still mishandle your data. A final consideration is
    the possibility of identity theft, which is always looming in the modern world.
    If you look at the case of refugees, it is often difficult to verify their identity,
    their back story, and their credentials, certainly when they come from a nation
    at war with the destruction of information and the impossibility of verification.
    According to the World Bank Group’s 2018 #ID4D Global Dataset, almost 1 billion
    people around the globe struggle proving who they are!^([^(279)](#fn279)) On top
    of that, about 1.7 billion people don’t have a bank account.^([^(280)](#fn280))
    Blockchain solutions might not only provide a means of payment to people who have
    been left out of the centralized solutions of the modern world, but they might
    also help them to finally prove their identities.


    How could it facilitate the current challenges of digital identity? Well, when
    we think about identity theft, it comes down to how we make it very difficult
    to use the same identity twice for two different people. Trying to use the same
    digital unit twice is also known as the “double spending” issue. Similarly to
    preventing double spending, the blockchain technology could prevent the double
    use of a single identity by rogue elements in the system. By using hashes, one
    could also make sure that digital files haven’t been tampered with, otherwise
    one will immediately see that something has been changed in the data, thereby
    proving that they are no longer dealing with the original document. Finally, there
    is the malicious intent one could have in the system when trying to perform certain
    processes. By using decentralized consensus, these processes can be stopped in
    the system, protecting participants from these attackers.


    Most importantly, if we could agree on one decentralized system spanning the world,
    identity would no longer pose a problem. We would have irreversible proof of each
    person, without having to question whether the data is correct or whether the
    data belongs to a different person. Of course, this is something that will not
    be happening tomorrow, but several implementations are working on digital identity
    with blockchain technology, such as the Sovrin foundation (also behind Hyperledger
    Indy), Civic, and uPort.'
  trans: '

    最后，还有加密货币支持的稳定币。虽然它们与法定货币支持的加密货币非常相似，主要区别在于加密支持的稳定币以去中心化的方式使用智能合约来支撑其价值。^(²⁷⁴)
    这些稳定币通常还允许用户通过智能合约获取贷款，并锁定一定数量的抵押品。如果抵押品的价值下跌到接近用户提款价值时，这些智能合约可能会清算用户的贷款。你可以立即感觉到，这些币需要更多的编码工作来实现，从而引入了出现漏洞和可能被利用的风险。过去有`DAI
    Maker`稳定币（目前已经转变为与美元挂钩的法定货币支持稳定币），但`Synthetix`公司除了提供法定货币支持的稳定币外，仍然提供加密货币支持的稳定币。


    最后一个我们应该研究的例子是铸币税风格的稳定币，它们没有任何资产支持。这里，有算法来调节货币供应量，以确保货币维持一定的价格。一个想要实现这一目标的项目叫做“Basis”，但最终因美国证券法规的适用性而被关闭。^(²⁷⁵)


    ### 数字孪生与区块链


    近年来，另一个受到额外关注的领域是创建数字孪生以保护品牌免受假冒。^(²⁷⁶) 当然，数字孪生并不仅限于区块链技术，正如我们通过数字身份所知。然而，区块链平台提供了一种新的方式，可以安全地存储数字孪生，且没有中心化的控制点或单点故障。


    区块链提供了添加数据并跟踪资产流程的可能性，而无法轻易修改或破坏已存储的数据。将这一理念与数字证书或区块链关联身份相结合，你就能设计一个流程，在全球范围内跟踪资产、服务和产品。非同质化代币（NFT）的概念在这里扮演着重要角色，因为它们代表了数字世界中的资产。


    那么，数字孪生能在哪里证明其价值呢？一个非常有趣的例子是药品和假冒产品。通过在区块链上创建数字孪生，可以轻松追踪产品从生产者到消费者的全过程，任何与系统数据不匹配的产品都可以被标记为至少可疑。这可以为当前打击药物滥用和药品假冒的斗争增加一层保障。第二个例子是房地产市场的公证服务，人们可以基于区块链上的数字孪生来买卖房屋。


    基于以上例子，你应该很容易想到一些其他例子，说明数字孪生可能在哪些方面证明其有用性或趣味性，并能增强当前的工作方式。与任何去中心化技术一样，其成功很大程度上取决于流程中不同参与方的合作。


    `Luxtag`是一家专注于产品和资产安全的公司。^(²⁷⁷) 他们提供了一个基础`API`，用于将产品作为数字孪生进行跟踪，同时还提供防篡改凭证。


    ### 区块链与数字身份


    当今世界一个常见的问题是个人身份问题。尽管在联合国《儿童权利公约》中它已被确定为一项基本人权，但我们经常在许多国家发现问题。这些问题与那些经历过战争、贫困或缺乏治理的地方有关。没有基本的个人信息，你在几乎所有方面都会受到限制，因为你无法拥有财产、投票、接受政府服务、拥有银行账户、找到工作、寻求保护或追求其他任何事情。^(²⁷⁸)


    按照目前的运作方式，集中式机构需要为你提供身份，即使提供了，它们仍可能不当处理你的数据。最后一个考虑因素是身份盗窃的可能性，这在现代世界中始终存在。如果你看一下难民的案例，通常很难核实他们的身份、背景故事和资质，尤其是当他们来自一个处于战争状态、信息被破坏且无法核查的国家时。根据世界银行集团
    2018 年的#ID4D 全球数据集，全球有近 10 亿人难以证明自己的身份！^(²⁷⁹) 除此之外，大约有 17 亿人没有银行账户。^(²⁸⁰) 区块链解决方案不仅可能为那些被现代世界中心化方案排除在外的人提供支付手段，还可能帮助他们最终证明自己的身份。


    它能如何应对数字身份当前的挑战呢？好吧，当我们想到身份盗窃时，关键就在于我们如何让两个不同的人极难使用同一个身份。试图对同一个数字单位使用两次也被称为“双重支付”问题。类似于防止双重支付，区块链技术可以防止系统中的恶意分子双重使用单一身份。通过使用哈希值，可以确保数字文件未被篡改，否则你会立即发现数据中的某些内容发生了变化，从而证明他们处理的已不再是原始文档。最后，还有在系统中尝试执行某些进程时可能存在的恶意意图。通过使用去中心化共识，这些进程可以在系统中被阻止，从而保护参与者免受攻击者的侵害。


    最重要的是，如果我们能在全球范围内就一个去中心化系统达成共识，身份将不再是问题。我们将拥有每个人不可逆转的证明，而无需质疑数据是否正确或数据是否属于另一个人。当然，这不会在明天实现，但已有多个项目正在使用区块链技术进行数字身份建设，例如`Sovrin`基金会（也是`Hyperledger
    Indy`背后的组织）、`Civic`和`uPort`。

