    # 4. Blockchain and Regulation: The Legal World


    As blockchain entered the world with new possibilities concerning data and financial
    instruments, it has taken decision makers a lot of time to consider the technology
    and introduce regulation that is both relevant and necessary to protect people
    from this technology. This chapter includes a short introduction to the major
    concepts that are currently being debated when it comes to the distributed ledger
    technology.


    When we look at the blockchain technology and regulation, we find ourselves in
    murky water. Regulation on the subject often changes all over the world. Depending
    on the aspect of the technology (ICOs, cryptocurrencies, distributed ledgers,
    etc.), there might be different perspectives within the same country or region.
    So my aim is not to write an exhaustive overview of current regulation. Read this
    chapter only as an guideline to the existing regulation and certainly not as fixed
    truth!'
  trans: '

    ### 智能手机行业


    你可能不会立刻想到，但手机可以通过区块链技术被改变。全球的智能手机制造商都听到了去中心化网络的召唤，其中最大的参与者之一就是三星。^(¹³⁹) Galaxy
    S10 就是一个例子，它包含了一个用于存储加密货币私钥的安全存储系统。其他参与者包括 HTC 的 Exodus 1、Sirin Labs 的 Finney
    以及 Electroneum。


    正如我们之前在讨论区块链技术方面时所提到的，这些平台支持去中心化应用。这些应用构成了 Web 3.0 的基础。其理念是，我们再次远离大公司的中心化服务器，允许智能手机之间实现点对点技术。那么，是什么阻止了这些应用成为主流呢？


    有几个问题浮现出来，例如可扩展性和监管不确定性。另一个问题是，要使用去中心化应用，你需要懂技术。如果一家公司能够绕过这些技术障碍，他们不仅能让去中心化应用成为主流，还能为全球客户打开一个全新的世界。


    # 区块链与监管：法律世界


    随着区块链以数据与金融工具相关的新可能性进入世界，决策者花费了大量时间来审视这项技术，并引入了既相关又必要的监管措施，以保护人们免受该技术潜在风险的侵害。本章简要介绍了当前围绕分布式账本技术正在辩论的主要概念。


    当我们审视区块链技术与监管时，我们会发现自己身处浑水之中。全球范围内关于这一主题的法规经常变化。根据技术的不同方面（如`ICO`、加密货币、分布式账本等），同一国家或地区内可能存在不同的观点。因此，我的目的并非撰写一份关于当前监管的详尽概述。请仅将本章视为现有监管的指南，而绝非固定不变的真理！

    '
- fmt: '# Tax and Crypto Regulation in Europe


    First of all, it might be easier to look into the `Bitcoin` network to start with.
    Why? It is simply the best known cryptocurrency by far, and has therefore caught
    the attention of regulators more than any of the other altcoins that currently
    exist.


    If we take the case of the European Union, Bitcoin has legal status and conversion
    transactions are to this day not susceptible to VAT/GST, while transactions for
    goods and services are susceptible to income tax.^([^(140)](#fn140)) When it comes
    to the regulation of Bitcoin itself, there have been some confusing messages in
    the past. The European Central Bank stated in 2015 that financial sector regulation
    was not applicable to Bitcoin, as it did not involve traditional financial actors,
    while others stated that existing rules could be extended to Bitcoin and Bitcoin
    participants.^([^(141)](#fn141),[^(142)](#fn142)) However, there is a move within
    Europe to increase the regulation on cryptocurrencies, introducing stricter rules,
    and this is based on the Anti-Money Laundering Directive (AMLD5) that has to be
    transposed into national law by each of the member states in January 2020.^([^(143)](#fn143))
    There was also a ministerial resolution in 2016 that implemented a European Court
    of Justice decision. This decision stated that any transaction that involves the
    exchange of crypto-assets against fiat would not be tax deductible. This means
    that all crypto-transactions are liable to VAT.^([^(144)](#fn144))


    Looking at specific member states, we see that Germany forces asset exchanges
    and providers of crypto-payment and custodian services to apply for a license
    from the Federal Financial Supervisory Authority (Bafin). On top of that, cryptocurrencies
    are considered financial instruments. This provided a lot of clarity to people
    who want to participate in the market, but also raised the concern that this would
    send blockchain companies abroad or stop services (such as Bitpay).^([^(145)](#fn145))
    Closely tied to Germany is the small nation of Liechtenstein, which has always
    had a favorable stance toward digital changes and similarly embraced the cryptocurrency
    world. On October 3, 2019, the Token and Trustworthy Technology Service Providers
    Act (TVTG) was approved.^([^(146)](#fn146)) With this new regulatory framework,
    Liechtenstein effectively became the first country in the world to regulate the
    token economy. The law uses the concept of the “Token Container Model,” which
    states that “the token serves as a container for rights of all kinds, regardless
    whether it is stock, real estate, or license rights.” This new regulation also
    sheds light on measures that need to be taken to prevent money laundering and
    terrorist financing. With this new framework, it aims to be one of the countries
    that can take on the crypto-economy and lure investors and companies to Liechtenstein.
    In Austria, there has been interesting news with the Ministry of Finance proposing
    a regulatory sandbox for the Fintech industry so that they can test their business
    models for a limited time under the supervision of the FMA.^([^(147)](#fn147))
    It relates to the sandbox that has been developed by the Financial Conduct Authority
    in the UK. As with the other member states in the EU, the AMLD5 will be imposed
    in national law, but other than that, there has been no specific regulation of
    exchanges, miners, issuers, and sponsors.


    Similarly, we see a trend toward stricter regulation in the Czech Republic regarding
    the crypto-industry. There is a requirement to apply for a license from the national
    trade licensing office, and failing to do so leads to massive fines.^([^(148)](#fn148))
    Neighbor Slovakia has a dualistic view on cryptocurrencies: a means of exchange
    and an investment asset.^([^(149)](#fn149)) Profits are taxable for individuals
    under income tax (with costs relating to the activity deducted from the total
    amount), where the eventual tax rate is either 19% or 25% (depending on if it
    is lower or higher than 35,022.31 Euro). For businesses, cryptocurrencies are
    seen as short-term financial assets other than cash.


    Estonia has traditionally been very open to the crypto-industry.^([^(150)](#fn150))
    In the past there have been plans for a national cryptocoin (which were dropped),
    and the existing e-citizen program, which show the openness of Estonia for the
    crypto-industry and the innovation it brings. Cryptocurrencies have been classified
    as “value represented in digital form” and as in many other countries, these cryptocurrencies
    are seen as digital assets subject to tax purposes but not subject to VAT. With
    the AML/CFT act of 2017 and the new directive from the EU, regulations have a
    more robust boost to tighten control and the existing licensing scheme. Latvia
    has also started to recognize cryptocurrencies so that they are able to tax them.
    Together with Lithuania (and Estonia), they created a memorandum of understanding
    as early as 2017. The focus of this memorandum was broader than cryptocurrencies
    alone (the focus was the financial markets), but the fact that these were included
    shows that cryptocurrencies were seriously considered a part of the financial
    market.


    The UK (despite at this date still dealing with Brexit discussions) still falls
    under the regulations that have been released by the EU. Even though there are
    no specific cryptocurrency laws as of yet, exchanges need to register with the
    Financial Conduct Authority and cryptocurrencies are not considered legal tender.^([^(151)](#fn151))
    Investments in the crypto-industry here are subject to the capital gains tax and
    income tax, depending on the situation. With consultations with the crypto-industry
    within the UK now following, new regulations specific for the industry are on
    the horizon. This is clearing the way for detailed guidelines for participants
    and businesses.^([^(152)](#fn152))


    In France we also find the cryptocurrency world largely unregulated, with two
    ordinances on blockchain technology so far.^([^(153)](#fn153)) The first allowed
    the use of blockchain technology for a zero-coupon bond (minibon).^([^(154)](#fn154))
    The second allowed further use of the technology for financial instruments.^([^(155)](#fn155))
    There were also some warnings on the inherent risks of cryptocurrencies by the
    French Financial Market Authority (AMF) and the Prudential Supervisory Authority
    (ACPR), as Bitcoin and other cryptocurrencies don’t fall under the financial instruments
    regulations of France.^([^(156)](#fn156)) Similarly in Belgium, the country issued
    a list of sources that should not be trusted when you consider the crypto-market.^([^(157)](#fn157))
    When we consider the tax regulation in France, capital gains tax are in effect
    for gains from the sale of cryptocurrencies (there are different rules if this
    is occasional or professional) and these gains are included to calculate the wealth
    tax and gift tax. As with the other countries, more clarification is necessary
    in the future.'
  raw: '## Tax and Crypto Regulation in Europe


    First of all, it might be easier to look into the Bitcoin network to start with.
    Why? It is simply the best known cryptocurrency by far, and has therefore caught
    the attention of regulators more than any of the other altcoins that currently
    exist.


    If we take the case of the European Union, Bitcoin has legal status and conversion
    transactions are to this day not susceptible to VAT/GST, while transactions for
    goods and services are susceptible to income tax.^([^(140)](#fn140)) When it comes
    to the regulation of Bitcoin itself, there have been some confusing messages in
    the past. The European Central Bank stated in 2015 that financial sector regulation
    was not applicable to Bitcoin, as it did not involve traditional financial actors,
    while others stated that existing rules could be extended to Bitcoin and Bitcoin
    participants.^([^(141)](#fn141),[^(142)](#fn142)) However, there is a move within
    Europe to increase the regulation on cryptocurrencies, introducing stricter rules,
    and this is based on the Anti-Money Laundering Directive (AMLD5) that has to be
    transposed into national law by each of the member states in January 2020.^([^(143)](#fn143))
    There was also a ministerial resolution in 2016 that implemented a European Court
    of Justice decision. This decision stated that any transaction that involves the
    exchange of crypto-assets against fiat would not be tax deductible. This means
    that all crypto-transactions are liable to VAT.^([^(144)](#fn144))


    Looking at specific member states, we see that Germany forces asset exchanges
    and providers of crypto-payment and custodian services to apply for a license
    from the Federal Financial Supervisory Authority (Bafin). On top of that, cryptocurrencies
    are considered financial instruments. This provided a lot of clarity to people
    who want to participate in the market, but also raised the concern that this would
    send blockchain companies abroad or stop services (such as Bitpay).^([^(145)](#fn145))
    Closely tied to Germany is the small nation of Liechtenstein, which has always
    had a favorable stance toward digital changes and similarly embraced the cryptocurrency
    world. On October 3, 2019, the Token and Trustworthy Technology Service Providers
    Act (TVTG) was approved.^([^(146)](#fn146)) With this new regulatory framework,
    Liechtenstein effectively became the first country in the world to regulate the
    token economy. The law uses the concept of the “Token Container Model,” which
    states that “the token serves as a container for rights of all kinds, regardless
    whether it is stock, real estate, or license rights.” This new regulation also
    sheds light on measures that need to be taken to prevent money laundering and
    terrorist financing. With this new framework, it aims to be one of the countries
    that can take on the crypto-economy and lure investors and companies to Liechtenstein.
    In Austria, there has been interesting news with the Ministry of Finance proposing
    a regulatory sandbox for the Fintech industry so that they can test their business
    models for a limited time under the supervision of the FMA.^([^(147)](#fn147))
    It relates to the sandbox that has been developed by the Financial Conduct Authority
    in the UK. As with the other member states in the EU, the AMLD5 will be imposed
    in national law, but other than that, there has been no specific regulation of
    exchanges, miners, issuers, and sponsors.


    Similarly, we see a trend toward stricter regulation in the Czech Republic regarding
    the crypto-industry. There is a requirement to apply for a license from the national
    trade licensing office, and failing to do so leads to massive fines.^([^(148)](#fn148))
    Neighbor Slovakia has a dualistic view on cryptocurrencies: a means of exchange
    and an investment asset.^([^(149)](#fn149)) Profits are taxable for individuals
    under income tax (with costs relating to the activity deducted from the total
    amount), where the eventual tax rate is either 19% or 25% (depending on if it
    is lower or higher than 35,022.31 Euro). For businesses, cryptocurrencies are
    seen as short-term financial assets other than cash.


    Estonia has traditionally been very open to the crypto-industry.^([^(150)](#fn150))
    In the past there have been plans for a national cryptocoin (which were dropped),
    and the existing e-citizen program, which show the openness of Estonia for the
    crypto-industry and the innovation it brings. Cryptocurrencies have been classified
    as “value represented in digital form” and as in many other countries, these cryptocurrencies
    are seen as digital assets subject to tax purposes but not subject to VAT. With
    the AML/CFT act of 2017 and the new directive from the EU, regulations have a
    more robust boost to tighten control and the existing licensing scheme. Latvia
    has also started to recognize cryptocurrencies so that they are able to tax them.
    Together with Lithuania (and Estonia), they created a memorandum of understanding
    as early as 2017\. The focus of this memorandum was broader than cryptocurrencies
    alone (the focus was the financial markets), but the fact that these were included
    shows that cryptocurrencies were seriously considered a part of the financial
    market.


    The UK (despite at this date still dealing with Brexit discussions) still falls
    under the regulations that have been released by the EU. Even though there are
    no specific cryptocurrency laws as of yet, exchanges need to register with the
    Financial Conduct Authority and cryptocurrencies are not considered legal tender.^([^(151)](#fn151))
    Investments in the crypto-industry here are subject to the capital gains tax and
    income tax, depending on the situation. With consultations with the crypto-industry
    within the UK now following, new regulations specific for the industry are on
    the horizon. This is clearing the way for detailed guidelines for participants
    and businesses.^([^(152)](#fn152))


    In France we also find the cryptocurrency world largely unregulated, with two
    ordinances on blockchain technology so far.^([^(153)](#fn153)) The first allowed
    the use of blockchain technology for a zero-coupon bond (minibon).^([^(154)](#fn154))
    The second allowed further use of the technology for financial instruments.^([^(155)](#fn155))
    There were also some warnings on the inherent risks of cryptocurrencies by the
    French Financial Market Authority (AMF) and the Prudential Supervisory Authority
    (ACPR), as Bitcoin and other cryptocurrencies don’t fall under the financial instruments
    regulations of France.^([^(156)](#fn156)) Similarly in Belgium, the country issued
    a list of sources that should not be trusted when you consider the crypto-market.^([^(157)](#fn157))
    When we consider the tax regulation in France, capital gains tax are in effect
    for gains from the sale of cryptocurrencies (there are different rules if this
    is occasional or professional) and these gains are included to calculate the wealth
    tax and gift tax. As with the other countries, more clarification is necessary
    in the future.'
  trans: '

    # 欧洲的税收与加密货币监管


    首先，从`比特币`网络入手或许会更容易。为什么呢？因为它是迄今为止最知名的加密货币，因此相比其他现存的山寨币，它更受监管机构的关注。


    以欧盟为例，比特币具有合法地位，其兑换交易至今仍免征增值税/商品及服务税，而涉及商品和服务的交易则需缴纳所得税。^(¹⁴⁰) 在比特币本身的监管方面，过去曾有一些令人困惑的信号。欧洲央行在
    2015 年表示，金融领域监管不适用于比特币，因为它不涉及传统金融参与者；而另一些人则认为，现有规则可以扩展到比特币及其参与者。^(¹⁴¹,¹⁴²) 然而，欧洲内部正推动加强对加密货币的监管并引入更严格的规则，其依据是《反洗钱指令》（AMLD5），该指令要求各成员国在
    2020 年 1 月前将其转化为国内法律。^(¹⁴³) 此外，2016 年一项部长级决议执行了欧洲法院的一项判决。该判决认定，涉及加密资产与法定货币兑换的任何交易均不可享受税收抵扣。这意味着所有加密交易均需缴纳增值税。^(¹⁴⁴)


    着眼于具体成员国，我们看到德国强制要求资产交易所、加密支付及托管服务提供商向德国联邦金融监管局（Bafin）申请牌照。除此之外，加密货币被视为金融工具。这为有意参与市场者提供了极大清晰度，但也引发了担忧，认为这会将区块链公司推向海外或导致服务（如
    Bitpay）停摆。^(¹⁴⁵) 与德国关系密切的列支敦士登小国历来对数字化变革持有利态度，同样拥抱了加密货币世界。2019 年 10 月 3 日，《代币及可信技术服务提供商法案》（TVTG）获批。^(¹⁴⁶)
    凭借这一新监管框架，列支敦士登实际上成为全球首个对代币经济进行监管的国家。该法案采用了“代币容器模型”概念，规定“代币作为各类权利的容器，无论这些权利是股票、房地产还是许可权。”这项新规也阐明了防止洗钱和恐怖主义融资所需采取的措施。借助新框架，其目标是成为能够承载加密经济并吸引投资者和公司到列支敦士登的国家之一。在奥地利，财政部提议为金融科技行业设立监管沙盒，以便企业在金融市场监管局（FMA）监督下在限定时间内测试其商业模式，这则消息引人关注。^(¹⁴⁷)
    这与英国金融行为监管局（FCA）开发的沙盒有关。与欧盟其他成员国一样，AMLD5 将被纳入国内法律，但除此之外，对交易所、矿工、代币发行方及赞助方尚无具体监管规定。


    同样，我们看到捷克共和国对加密行业的监管也趋于严格。企业需向国家贸易许可办公室申请牌照，否则将面临巨额罚款。^(¹⁴⁸) 邻国斯洛伐克对加密货币持双重看法：既视作交换媒介，也视为投资资产。^(¹⁴⁹)
    个人的利润需缴纳所得税（相关活动成本可从总额中扣除），最终税率要么是 19%，要么是 25%（取决于利润是否高于 35,022.31 欧元）。对于企业而言，加密货币被视为除现金外的短期金融资产。


    爱沙尼亚历来对加密行业非常开放。^(¹⁵⁰) 过去曾有发行国家数字货币的计划（后被放弃），而现有的电子公民计划也显示了爱沙尼亚对加密行业及其带来的创新的开放态度。加密货币被归类为“以数字形式呈现的价值”，与许多其他国家一样，这些加密货币被视为需纳税的数字资产，但免征增值税。随着
    2017 年的反洗钱/反恐融资法案以及欧盟新指令的出台，监管措施得到加强，以收紧控制并完善现有的牌照制度。拉脱维亚也已开始承认加密货币以便对其征税。该国与立陶宛（及爱沙尼亚）早在
    2017 年就签署了一份谅解备忘录。该备忘录的焦点比加密货币更广泛（关注的是金融市场），但加密货币被纳入其中表明它们已被严肃视为金融市场的一部分。


    英国（尽管目前仍在处理脱欧谈判）仍受欧盟已颁布法规的约束。尽管目前尚无专门的加密货币法律，但交易所需向金融行为监管局注册，且加密货币不被视为法定货币。^(¹⁵¹)
    此处的加密行业投资需根据具体情况缴纳资本利得税和所得税。随着英国国内与加密行业的磋商正在进行，针对该行业的新法规即将出台。这为参与者及企业制定详细指引铺平了道路。^(¹⁵²)


    在法国，我们发现加密货币世界在很大程度上也未受监管，目前仅有两项关于区块链技术的法令。^(¹⁵³) 第一项允许将区块链技术用于零息债券（minibon）。^(¹⁵⁴)
    第二项则允许将该技术进一步用于金融工具。^(¹⁵⁵) 法国金融市场管理局（AMF）和审慎监管局（ACPR）也对加密货币的内在风险发出了警告，因为比特币及其他加密货币不属于法国的金融工具监管范畴。^(¹⁵⁶)
    与此类似，比利时发布了一份清单，列出了在考虑加密市场时不应信赖的来源。^(¹⁵⁷) 在法国税收方面，出售加密货币所得收益需缴纳资本利得税（偶尔为之与专业操作规则不同），这些收益也被纳入财富税和赠与税的计算范围。与其他国家一样，未来仍需进一步明确相关细则。

    '
- fmt: '在比利时，金融与市场管理局（FSMA）禁止向散户投资者推销收益取决于虚拟货币的产品。^([^(158)](#fn158))过去曾多次发出警告，提醒比利时公民注意投资加密货币可能存在的危险。目前，没有机构对虚拟货币进行审慎监管，银行账户的存款保障机制也不适用于虚拟货币。^([^(159)](#fn159))比利时尚无计划建立本国监管框架，因为政府和立法机构呼吁在欧洲层面加强监管并明确规则，以便在国内实施。另一方面，荷兰已采取措施监管加密货币服务提供商，以打击洗钱活动。^([^(160)](#fn160))服务提供商需在荷兰国家银行正式注册，并接受一系列措施监管。2019年，卢森堡通过一项法案，为基于区块链网络发行的证券提供法律框架。其目的是保护投资者，并减少交易所需的中间环节。^([^(161)](#fn161))


    瑞士对加密货币持开明态度，交易所是合法的。瑞士联邦税务管理局（SFTA）将加密货币视为资产。^([^(162)](#fn162))这些交易所需要申请许可证，首次代币发行（ICO）也是合法的，但必须根据具体情况遵守不同的规则。


    在意大利，第90/2017号法令将适用于传统货币兑换的监管规定延伸至加密货币兑换。加密货币交易的利润和亏损需缴纳公司税。至今，与加密货币税收相关的问题仍存在许多不确定性。过去，比特币及其他交易的收入被归类为外汇交易利润，需缴纳26%的税。圣马力诺小国于2019年年中批准了一项区块链和加密货币法规，旨在规范该领域并保护投资者。该法规区分了实用代币、投资代币和加密货币，但在某些情况下为企业提供税收减免。^([^(163)](#fn163))


    在西班牙，有非常明确的法规来保护消费者和（散户）投资者免受可能的欺诈。加密货币不能作为法定货币（只有以欧元计价的纸币和硬币具有法定货币地位）。^([^(164)](#fn164))2018年2月8日，西班牙证券与市场委员会（CNMV）和西班牙银行发出警告，提醒投资者不要投资加密货币或ICO。根据具体情况，证券代币发行（STO）可能受《西班牙股票市场法》（LMV）相关法规的约束。迄今为止，该国唯一的实质监管与税收相关。出售加密货币所获得的资本利得税率为19%至23%，除非买卖发生在12个月内（税率为24.75%至52%）。如果资本利得与企业相关，税率为25%。目前尚无关于增值税的明确法规。


    马耳他于2018年11月1日推出了整套监管框架。^([^(165)](#fn165))其目标是保护投资者并加强现有的加密货币产业。公司需要进行认证，有意进行ICO的公司必须符合相关规定。与许多其他国家相反，在葡萄牙买卖加密货币是免税的（第5717/2015号裁定）。^([^(166)](#fn166))然而，这不适用于用加密货币兑换商品和服务的情况，并且从事加密货币交易的专业人士/企业仍需缴纳某些税款。葡萄牙将加密货币视为一种货币形式，因此免征增值税和资本利得税。这意味着如果加密产业在欧洲真正起飞，该国未来可能成为某种意义上的税收天堂。


    瑞典多次要求就加密货币制定明确的监管指引。在致力于监管加密货币领域的同时，瑞典也在研究发行国家加密货币（e-krona）的可能性。^([^(167)](#fn167))注意不要将其与`Kryptonex`混淆，后者是一个引诱对该项目感兴趣的人的骗局。^([^(168)](#fn168))瑞典政府还拍卖了从债务人处没收的加密货币，以偿还其债务。^([^(169)](#fn169))因此，尽管该国有时似乎对加密货币采取强硬立场，但其当局旨在保护公民免受这些投资可能带来的风险。


    在丹麦，丹麦税务当局最近获准从加密货币交易所收集用户数据，以检查他们是否已缴纳税款。^([^(170)](#fn170))此外还成立了`Dansk Krypto
    Konsortium`，这是一个由丹麦区块链公司组成的团体，致力于推动该国建立监管框架。^([^(171)](#fn171))挪威也实施了新的反洗钱法规，适用于该国的加密货币交易所和存储服务提供商。^([^(172)](#fn172))挪威金融监管局（`Finanstilsynet`）还表示，为客户存储私钥的公司被视为参与加密货币的转移、存储或购买。这意味着服务提供商必须注册并遵守新规。


    芬兰最近将欧盟反洗钱指令（`AMLD5`）转化为国内法规。芬兰金融监管局（`FIN-FSA`）表示，服务提供商若希望在该国开展业务，必须满足法定要求。^([^(173)](#fn173))由于2008年金融危机的影响，冰岛对比特币及加密货币总体持更负面的看法。^([^(174)](#fn174))尽管该国存在一些大型矿场，但2013年发布的一份声明指出，禁止从事涉及比特币的外汇交易。这在某种程度上意味着比特币不被视为一种货币。2014年，有人试图通过推出`Auroracoin`来突破“比特币限制”，但由于监管的不确定性，该币的受欢迎程度低于预期。


    在波兰，我们也能看到法规的发展。自2019年1月起，加密货币交易的收入要么被归类为现金资本的收入，要么被归类为投资收入。出售虚拟货币的所得税率为19%。^([^(175)](#fn175))矿工未来也需要为其加密货币利润缴纳所得税。此前，波兰国家银行和金融监管委员会曾发出过类似西班牙的警告，提醒人们不要投资虚拟货币。同样，加密货币不被视为法定货币。'
  raw: 'In Belgium, the FSMA imposed a ban on the marketing of products in which the
    return depends on virtual money to retail investors.^([^(158)](#fn158)) There
    have been several warnings in the past to warn the Belgian citizens about the
    possible dangers of investing in cryptocurrencies. Currently there is no body
    exercising prudential supervision and the deposit guarantee mechanism for bank
    accounts does not apply to virtual currency.^([^(159)](#fn159)) There are no plans
    to run a Belgian regulatory framework, as the government and legislative bodies
    have called for more supervision and regulatory clarity at a European level so
    that this can be implemented in the country. The Netherlands, on the other hand,
    have unveiled measures to regulate providers of cryptocurrency services in an
    attempt to stop money laundering.^([^(160)](#fn160)) Providers need to officially
    register at the National Bank and have to submit themselves to a series of measures.
    In 2019, Luxembourg passed a bill to provide a legal framework concerning securities
    issued over the blockchain network. They would like to protect investors as well
    as reduce the number of intermediaries needed to perform transactions.^([^(161)](#fn161))


    Switzerland has a progressive stance toward cryptocurrencies and exchanges are
    legal. Cryptocurrencies are considered assets in the country by the Swiss Federal
    Tax Administration (SFTA).^([^(162)](#fn162)) These exchanges need to apply for
    a license and even ICOs are legal but have to comply to different rules depending
    on the situation.


    In Italy, decree no. 90/2017 made regulations imposed on traditional money exchanges
    applicable to cryptocurrency exchanges. Profit and losses from cryptocurrency
    transactions are susceptible to corporate taxes. To this day, there are many uncertainties
    relating to taxation of cryptocurrencies. In the past, revenue from Bitcoin and
    other transactions were classified as profit from foreign exchange transactions,
    leading to a tax of 26%. The small state of San Marino approved a blockchain and
    cryptocurrency regulation in mid-2019, which should govern the topic and protect
    investors. They make a distinction between utility tokens, investment tokens,
    and cryptocurrencies, but also give tax exemptions in certain cases to businesses.^([^(163)](#fn163))


    In Spain there are very clear regulations in place to protect consumers and (retail)
    investors against possible cases of fraud. Cryptocurrencies cannot be treated
    as legal tender (only banknotes and coins denominated in Euros have legal tender
    status).^([^(164)](#fn164)) There was a warning on February 8, 2018 by the Spanish
    Securities and Exchange Commission (CNMV) and the bank of Spain warning investors
    not to invest in cryptocurrencies or ICOs. Depending on the situation, STOs (Security
    Token Offerings) might fall under the applicable regulations regarding the Spanish
    Stock Market Act (LMV). The only real regulation in the country so far relates
    to the taxation. Capital gains made from the sale of cryptocurrencies are taxed
    between 19% and 23%, unless the purchase and sale took place within 12 months
    (24.75% to 52%). If the capital gains relate to a company, the tax is 25%. So
    far there has been no clear regulation on VAT.


    Malta introduced an entire regulatory framework on November 1, 2018.^([^(165)](#fn165))
    The goal is to protect investors as well as strengthen the existing cryptocurrency
    industry. There is a need for certification and companies wishing to perform an
    ICO to be in line with the regulations. Opposite of many other countries, the
    buying and selling of cryptocurrencies in Portugal is tax-free (ruling 5717/2015).^([^(166)](#fn166))
    However, this does not apply to the exchange of cryptocurrencies for goods and
    services, and professional/businesses dealing in cryptocurrencies are still subject
    to some taxes. Portugal treats cryptocurrencies as a form of currency, which makes
    them exempt from VAT and capital gains taxes. This means that the country could
    become a bit of a tax heaven in the future if the crypto-industry really takes
    off in Europe.


    Sweden has asked multiple times for clear regulatory guidelines when it comes
    to cryptocurrencies. While it is working on regulating the cryptocurrency space,
    it has also been researching the possibilities for a national cryptocurrency (e-krona).^([^(167)](#fn167))
    This not to be confused with Kryptonex, which is a scam luring in people that
    were interested in the project.^([^(168)](#fn168)) The Swedish government has
    also auctioned off cryptocurrencies that had been taken from debtors to pay their
    debts.^([^(169)](#fn169)) So despite the fact that the country sometimes seems
    to take a staunch stance against cryptocurrencies, the authorities look to protect
    their citizens from the possible risks brought by these investments.


    In Denmark, the Danish Tax Authority recently received the green light to collect
    user data from cryptocurrency exchanges to see if they have been paying their
    taxes.^([^(170)](#fn170)) There is also the Dansk Krypto Konsortium, which is
    a group of Danish blockchain companies that are working toward a regulatory framework
    in the country.^([^(171)](#fn171)) Norway has also enforced new money laundering
    regulations that apply to cryptocurrency exchanges and storage providers in the
    country.^([^(172)](#fn172)) Finanstilsynet (the Financial Supervisory Authority
    of Norway) also stated that firms storing private keys for customers are considered
    to be involved in the transfer, storage, or purchase of cryptocurrency. This means
    that providers have to register and comply with the newly imposed rules.


    Finland recently translated the EU anti-money laundering directive (AMLD5) into
    national regulation. The FIN-FSA stated that providers need to meet statutory
    requirements if they want to carry on their activities in the country.^([^(173)](#fn173))
    Iceland had a more negative view of Bitcoin and cryptocurrencies in general as
    a consequence of the financial crisis of 2008.^([^(174)](#fn174)) Even though
    some major mining rigs can be found in the country, a release in 2013 stated that
    it was prohibited to engage in foreign exchange trading with Bitcoin. It meant
    in part that Bitcoin wasn’t seen as a currency. Another attempt was made in 2014
    with the launch of Auroracoin to step outside of the “Bitcoin restrictions” but
    because of the uncertainty regarding the regulations, the popularity of the coin
    remained below expectations.


    In Poland, we can also see development in regulations. As of January 2019, revenues
    from cryptocurrency trading is either allocated as revenues from cash capital
    or revenues from investment income. The income from the sale of a virtual currency
    is taxed at 19%.^([^(175)](#fn175)) Miners will also have to pay income tax in
    the future on the profits they make with cryptocurrencies. Earlier, there had
    been warnings against the investment in virtual currency (similar to Spain) issued
    by the National Bank of Poland and the Financial Supervision Commission. Also
    similarly, cryptocurrencies are not recognized as legal tender.'
  trans: '

    在比利时，金融与市场管理局（FSMA）禁止向散户投资者推销收益取决于虚拟货币的产品。^(¹⁵⁸)过去曾多次发出警告，提醒比利时公民注意投资加密货币可能存在的危险。目前，没有机构对虚拟货币进行审慎监管，银行账户的存款保障机制也不适用于虚拟货币。^(¹⁵⁹)比利时尚无计划建立本国监管框架，因为政府和立法机构呼吁在欧洲层面加强监管并明确规则，以便在国内实施。另一方面，荷兰已采取措施监管加密货币服务提供商，以打击洗钱活动。^(¹⁶⁰)服务提供商需在荷兰国家银行正式注册，并接受一系列措施监管。2019
    年，卢森堡通过一项法案，为基于区块链网络发行的证券提供法律框架。其目的是保护投资者，并减少交易所需的中间环节。^(¹⁶¹)


    瑞士对加密货币持开明态度，交易所是合法的。瑞士联邦税务管理局（SFTA）将加密货币视为资产。^(¹⁶²)这些交易所需要申请许可证，首次代币发行（ICO）也是合法的，但必须根据具体情况遵守不同的规则。


    在意大利，第 90/2017 号法令将适用于传统货币兑换的监管规定延伸至加密货币兑换。加密货币交易的利润和亏损需缴纳公司税。至今，与加密货币税收相关的问题仍存在许多不确定性。过去，比特币及其他交易的收入被归类为外汇交易利润，需缴纳
    26%的税。圣马力诺小国于 2019 年年中批准了一项区块链和加密货币法规，旨在规范该领域并保护投资者。该法规区分了实用代币、投资代币和加密货币，但在某些情况下为企业提供税收减免。^(¹⁶³)


    在西班牙，有非常明确的法规来保护消费者和（散户）投资者免受可能的欺诈。加密货币不能作为法定货币（只有以欧元计价的纸币和硬币具有法定货币地位）。^(¹⁶⁴)2018
    年 2 月 8 日，西班牙证券与市场委员会（CNMV）和西班牙银行发出警告，提醒投资者不要投资加密货币或 ICO。根据具体情况，证券代币发行（STO）可能受《西班牙股票市场法》（LMV）相关法规的约束。迄今为止，该国唯一的实质监管与税收相关。出售加密货币所获得的资本利得税率为
    19%至 23%，除非买卖发生在 12 个月内（税率为 24.75%至 52%）。如果资本利得与企业相关，税率为 25%。目前尚无关于增值税的明确法规。


    马耳他于 2018 年 11 月 1 日推出了整套监管框架。^(¹⁶⁵)其目标是保护投资者并加强现有的加密货币产业。公司需要进行认证，有意进行 ICO 的公司必须符合相关规定。与许多其他国家相反，在葡萄牙买卖加密货币是免税的（第
    5717/2015 号裁定）。^(¹⁶⁶)然而，这不适用于用加密货币兑换商品和服务的情况，并且从事加密货币交易的专业人士/企业仍需缴纳某些税款。葡萄牙将加密货币视为一种货币形式，因此免征增值税和资本利得税。这意味着如果加密产业在欧洲真正起飞，该国未来可能成为某种意义上的税收天堂。


    瑞典多次要求就加密货币制定明确的监管指引。在致力于监管加密货币领域的同时，瑞典也在研究发行国家加密货币（e-krona）的可能性。^(¹⁶⁷)注意不要将其与`Kryptonex`混淆，后者是一个引诱对该项目感兴趣的人的骗局。^(¹⁶⁸)瑞典政府还拍卖了从债务人处没收的加密货币，以偿还其债务。^(¹⁶⁹)因此，尽管该国有时似乎对加密货币采取强硬立场，但其当局旨在保护公民免受这些投资可能带来的风险。


    在丹麦，丹麦税务当局最近获准从加密货币交易所收集用户数据，以检查他们是否已缴纳税款。^(¹⁷⁰)此外还成立了`Dansk Krypto Konsortium`，这是一个由丹麦区块链公司组成的团体，致力于推动该国建立监管框架。^(¹⁷¹)挪威也实施了新的反洗钱法规，适用于该国的加密货币交易所和存储服务提供商。^(¹⁷²)挪威金融监管局（`Finanstilsynet`）还表示，为客户存储私钥的公司被视为参与加密货币的转移、存储或购买。这意味着服务提供商必须注册并遵守新规。


    芬兰最近将欧盟反洗钱指令（`AMLD5`）转化为国内法规。芬兰金融监管局（`FIN-FSA`）表示，服务提供商若希望在该国开展业务，必须满足法定要求。^(¹⁷³)由于
    2008 年金融危机的影响，冰岛对比特币及加密货币总体持更负面的看法。^(¹⁷⁴)尽管该国存在一些大型矿场，但 2013 年发布的一份声明指出，禁止从事涉及比特币的外汇交易。这在某种程度上意味着比特币不被视为一种货币。2014
    年，有人试图通过推出`Auroracoin`来突破“比特币限制”，但由于监管的不确定性，该币的受欢迎程度低于预期。


    在波兰，我们也能看到法规的发展。自 2019 年 1 月起，加密货币交易的收入要么被归类为现金资本的收入，要么被归类为投资收入。出售虚拟货币的所得税率为 19%。^(¹⁷⁵)矿工未来也需要为其加密货币利润缴纳所得税。此前，波兰国家银行和金融监管委员会曾发出过类似西班牙的警告，提醒人们不要投资虚拟货币。同样，加密货币不被视为法定货币。

    '
- fmt: '匈牙利正在研究对加密工具的监管，并成立了一个联合工作组，成员包括中央银行、税务局、财政部（以及其他机构），负责审查与加密货币相关的法律、经济和执法问题^([^(176)](#fn176))。目前，其个人所得税框架非常不利，需缴纳15%的个人所得税和22%的健康保险金。此外，通常还有额外的行政要求，并且出现了许多新的投资计划，导致投资者缺乏保护，甚至可能面临更高税负。


    接下来是罗马尼亚，该国对加密货币收入征税。根据价值不同（低于200罗纳尔不征税，每年超过600罗纳尔需缴纳10%的所得税），还设有其他税率^([^(177)](#fn177))。同时，该国有一项关于电子货币监管的草案（由财政部发布的紧急法令）^([^(178)](#fn178))。该法规将授权罗马尼亚国家银行对发行实体进行监管，并对其施加特定要求。与许多其他欧洲国家一样，罗马尼亚多次发出警告，提示投资加密货币存在明显风险。


    保加利亚对加密货币持更积极的态度，它是第一个比特币持有量超过黄金储备的国家^([^(179)](#fn179))。其目前持有的比特币据信超过213,000枚。然而，该国至今尚未制定明确的监管框架。在加密货币的商业用途方面，也暂无任何许可证要求^([^(180)](#fn180))。目前，加密货币交易的利润需缴纳10%的税。


    希腊共有31家加密货币交易所公司。该国之所以拥有如此多的加密货币交易所，并且加密货币总体受欢迎，与2009年金融危机及其对经济的影响有关^([^(181)](#fn181))。


    就塞尔维亚共和国而言，目前尚无法律保护机制。这意味着希望从事加密货币行业的人需自行承担所有活动风险^([^(182)](#fn182))。该国存在《塞尔维亚国家银行法》，涉及支付机构的许可，包括向电子货币机构发放电子货币发行许可证，但这不包括加密货币交易许可证！同样，黑山和波斯尼亚和黑塞哥维那似乎也没有相关法律框架。阿尔巴尼亚对区块链技术持更创新的看法，他们利用区块链框架开放了关于金融市场立法法案的公众咨询。通过这种方式，他们力图在立法过程中变得更民主、开放和透明。另一方面，马其顿国家银行则发出警告，根据当地法规，外国银行账户或证券不被允许（存在某些例外）^([^(183)](#fn183))。在克罗地亚，国家银行和金融稳定委员会均因加密货币投资的潜在损失和税收问题发出了警告。同样，斯洛文尼亚银行也就此问题发出了警告。


    白俄罗斯颁布了关于数字经济发展的总统令，该法令规范了加密货币和代币的发行与使用^([^(184)](#fn184))。该法令中的许多规定适用于在高科技园区（该国的一个特殊经济区）内运营的法人实体。在该国，个人可以独立进行任何涉及加密货币的活动（包括挖矿），前提是独自进行，并且不用于购买商品和服务。该国还设有明确的许可要求、外汇管制和报告要求，使其成为加密货币行业监管框架最全面、最清晰的国家之一。


    与许多其他国家相比，俄罗斯对加密货币的使用和可能性给予了更多关注。2019年，俄罗斯发布了一项新的数字权利法案，定义了智能合约和加密货币代币^([^(185)](#fn185))。具体而言，该法案侧重于这些概念的法律影响以及法律权利如何转移。此外，还通过了一项新法规，将加密资产分为三个独立的法律类别：虚拟资产、技术代币和数字金融资产^([^(186)](#fn186))。比特币可被视为虚拟资产（价值储存手段），以太币被视为技术代币（因为在以太坊区块链上发布功能需要它），而首次代币发行则属于最后一类。


    近年来，乌克兰经历了巨大的政治和经济动荡。正因如此，该国并未真正关注加密货币。目前，国内唯一接受的货币是本币（格里夫纳）以及由中央机构发行的外币^([^(187)](#fn187))。但这并不意味着没有相关工作开展，因为最近已发布了两个相关草案。在加密货币缺乏官方监管期间，其需缴纳标准所得税（个人为18%，企业则取决于其业务范围）。如果这两个草案获得通过，该国将拥有有利的监管框架，因为加密交易的个人税率将降至5%。2024年后，企业需缴纳18%的税。第二个草案侧重于消费者保护、监管和明确的法律框架。还有一项草案希望到2030年之前完全免除加密交易的税收。摩尔多瓦国家银行于2018年就加密资产发出警告，原因在于该工具的性质以及缺乏明确的监管。另一方面，德涅斯特河沿岸地区通过了一项法律，使挖矿活动合法化。


    最后是土耳其。加密货币在那里非常受欢迎。根据不同的信息来源，至少20%的人口持有代币。在其《2019-2023年第十一个发展计划》中，土耳其还提议建立一种基于区块链的中央银行货币^([^(188)](#fn188))。虽然真正的监管仍然很少，但甚至已经有关于“土耳其币”的草案出现。'
  raw: 'Hungary is looking into regulating crypto-instruments and has set up a joint
    workgroup that consists of the central bank, the tax authority, and the finance
    ministry (and other authorities) looking into the legal, economic, and law enforcement
    issues relating to cryptocurrencies.^([^(176)](#fn176)) Currently, it has a very
    unfavorable personal income tax framework that imposes 15% personal income tax
    and 22% health contribution. There are often extra administrative requirements
    and there have been many new investment schemes that leave the investor unprotected
    or leading up to even more taxes.


    Next on the list is Romania, which taxed the income from cryptocurrencies. Depending
    on the value (lower than 200 RON isn’t taxed, higher than 600 RON a year leads
    to 10% income tax), other taxation percentages are in place.^([^(177)](#fn177))
    There is also a draft in place that focuses on the regulation of electronic money
    (emergency ordinance published by the Ministry of Finance).^([^(178)](#fn178))
    This regulation would task the Romanian National Bank with the oversight of the
    issuing entities and would impose certain requirements on them. As with many other
    European countries, there have been several warnings to not invest in cryptocurrencies,
    as they carry within them clear risks.


    Bulgaria has a more positive outlook on cryptocurrencies, as it was the first
    nation state to have more Bitcoin holdings than gold reserves.^([^(179)](#fn179))
    Their current holdings are believed to surpass 213,000 Bitcoins. However, so far
    there has been no clear development of a framework within the country. There are
    also no license requirements as of yet when it comes to the business use of cryptocurrencies.^([^(180)](#fn180))
    Today, the profits from cryptocurrency trading are subject to 10% tax.


    Greece has seen a total of 31 companies working as cryptocurrency exchanges. The
    reason that there have been so many cryptocurrency exchanges in the country, and
    why there is an overall popularity of cryptocurrencies, relates back to the financial
    crisis of 2009 and the impact on the economy.^([^(181)](#fn181))


    So far there are no mechanisms for legal protection in place when we look at the
    Republic of Serbia. This means that people who wish to engage in the cryptocurrency
    industry bear all the risk for these activities.^([^(182)](#fn182)) There is the
    law on the National Bank of Serbia, which involves the licensing of payment institutions,
    including licenses for issuing electronic money to e-money institutions. This
    does not include licenses for cryptocurrencies trading! Similarly, Montenegro
    and Bosnia-Herzegovina do not seem to have any legal framework on the topic. Albania
    has a more innovative view of blockchain technology, as they opened up public
    consultations for a legislative act on the financial market by using a blockchain
    framework. This way they try to become more democratic, open, and transparent
    when it comes to the legislative process in their country. The National Bank of
    Macedonia, on the other hand, issued a warning against cryptocurrencies as according
    to local regulation, foreign bank accounts or securities aren’t allowed (there
    are certain exceptions).^([^(183)](#fn183)) In Croatia, both the National bank
    and the Financial Stability Council issued warnings because of the possible losses
    and taxation of cryptocurrency investments. In the same vein, the Bank of Slovenia
    also issued a warning on the topic.


    Belarus has the Presidential Decree on the development of the digital economy,
    which regulates the issuance and use of cryptocurrencies and tokens.^([^(184)](#fn184))
    Many of the regulations in the decree extend to legal entities operating on the
    territory of the high technologies park (which is a special economic zone in the
    country). Any actions with cryptocurrencies (including mining) are allowed in
    the country as a natural person, as long as you do it alone, and as long as you
    don’t use it to buy goods and services. There are also clear licensing requirements,
    foreign exchange controls, and reporting requirements, making it one of the countries
    with the most comprehensive and clear frameworks in place for the cryptocurrency
    industry.


    In Russia, there has been more attention toward the use and possibilities of cryptocurrencies
    compared to many other countries. In 2019 a new digital rights act was released
    that defines smart contracts and cryptocurrency tokens.^([^(185)](#fn185)) Specifically,
    this bill focuses on the legal impact of these concepts and how legal rights can
    be transferred. On top of that, there has been a new regulation adoption that
    classifies crypto-assets under three separate legal categories: virtual assets,
    technical tokens, and digital finance assets.^([^(186)](#fn186)) Bitcoin can be
    seen as a virtual asset (store of value), Ether as a technical token (as you need
    it to release functions on the Ethereum blockchain), and ICOs fall under the last
    category.


    A land with a lot of political and economic turmoil in recent years is Ukraine.
    Because of this there has been no real focus on cryptocurrencies. So far the only
    accepted currencies in the country are the national currency (hryvnia) and foreign
    currencies released by a central authority.^([^(187)](#fn187)) This does not mean
    that there is no work being done on the subject, as there have recently been two
    drafts released on the subject. As long as there is no official regulation on
    cryptocurrencies, they are subject to standard income tax (18% for individuals,
    for businesses it depends on their line of business). If the two drafts are accepted,
    there will be a favorable regulatory framework in the country, as crypto-transactions
    would drop to a tax rate of 5% for individuals. After 2024, businesses would have
    to pay 18%. The second draft focuses on consumer protection, supervision, and
    a clear legal framework. There is also a draft that wants to exempt crypto-transactions
    from tax altogether until 2030\. The national bank of Moldova issued a warning
    in 2018 on crypto-assets because of the nature of the vehicle and the absence
    of clear regulations. Transnistria, on the other hand, passed a law legalizing
    mining activities.


    Finally, there is Turkey. Cryptocurrencies have an enormous popularity there.
    Depending on the source, at least 20% of the population owns tokens. In its 11th
    Development Plan, 2019-2023, Turkey also proposed the formation of a blockchain-based
    central bank money.^([^(188)](#fn188)) While real regulation is still at a minimum,
    there have even been drafts of something called a “Turkcoin”.'
  trans: '

    匈牙利正在研究对加密工具的监管，并成立了一个联合工作组，成员包括中央银行、税务局、财政部（以及其他机构），负责审查与加密货币相关的法律、经济和执法问题^(¹⁷⁶)。目前，其个人所得税框架非常不利，需缴纳
    15%的个人所得税和 22%的健康保险金。此外，通常还有额外的行政要求，并且出现了许多新的投资计划，导致投资者缺乏保护，甚至可能面临更高税负。


    接下来是罗马尼亚，该国对加密货币收入征税。根据价值不同（低于 200 罗纳尔不征税，每年超过 600 罗纳尔需缴纳 10%的所得税），还设有其他税率^(¹⁷⁷)。同时，该国有一项关于电子货币监管的草案（由财政部发布的紧急法令）^(¹⁷⁸)。该法规将授权罗马尼亚国家银行对发行实体进行监管，并对其施加特定要求。与许多其他欧洲国家一样，罗马尼亚多次发出警告，提示投资加密货币存在明显风险。


    保加利亚对加密货币持更积极的态度，它是第一个比特币持有量超过黄金储备的国家^(¹⁷⁹)。其目前持有的比特币据信超过 213,000 枚。然而，该国至今尚未制定明确的监管框架。在加密货币的商业用途方面，也暂无任何许可证要求^(¹⁸⁰)。目前，加密货币交易的利润需缴纳
    10%的税。


    希腊共有 31 家加密货币交易所公司。该国之所以拥有如此多的加密货币交易所，并且加密货币总体受欢迎，与 2009 年金融危机及其对经济的影响有关^(¹⁸¹)。


    就塞尔维亚共和国而言，目前尚无法律保护机制。这意味着希望从事加密货币行业的人需自行承担所有活动风险^(¹⁸²)。该国存在《塞尔维亚国家银行法》，涉及支付机构的许可，包括向电子货币机构发放电子货币发行许可证，但这不包括加密货币交易许可证！同样，黑山和波斯尼亚和黑塞哥维那似乎也没有相关法律框架。阿尔巴尼亚对区块链技术持更创新的看法，他们利用区块链框架开放了关于金融市场立法法案的公众咨询。通过这种方式，他们力图在立法过程中变得更民主、开放和透明。另一方面，马其顿国家银行则发出警告，根据当地法规，外国银行账户或证券不被允许（存在某些例外）^(¹⁸³)。在克罗地亚，国家银行和金融稳定委员会均因加密货币投资的潜在损失和税收问题发出了警告。同样，斯洛文尼亚银行也就此问题发出了警告。


    白俄罗斯颁布了关于数字经济发展的总统令，该法令规范了加密货币和代币的发行与使用^(¹⁸⁴)。该法令中的许多规定适用于在高科技园区（该国的一个特殊经济区）内运营的法人实体。在该国，个人可以独立进行任何涉及加密货币的活动（包括挖矿），前提是独自进行，并且不用于购买商品和服务。该国还设有明确的许可要求、外汇管制和报告要求，使其成为加密货币行业监管框架最全面、最清晰的国家之一。


    与许多其他国家相比，俄罗斯对加密货币的使用和可能性给予了更多关注。2019 年，俄罗斯发布了一项新的数字权利法案，定义了智能合约和加密货币代币^(¹⁸⁵)。具体而言，该法案侧重于这些概念的法律影响以及法律权利如何转移。此外，还通过了一项新法规，将加密资产分为三个独立的法律类别：虚拟资产、技术代币和数字金融资产^(¹⁸⁶)。比特币可被视为虚拟资产（价值储存手段），以太币被视为技术代币（因为在以太坊区块链上发布功能需要它），而首次代币发行则属于最后一类。


    近年来，乌克兰经历了巨大的政治和经济动荡。正因如此，该国并未真正关注加密货币。目前，国内唯一接受的货币是本币（格里夫纳）以及由中央机构发行的外币^(¹⁸⁷)。但这并不意味着没有相关工作开展，因为最近已发布了两个相关草案。在加密货币缺乏官方监管期间，其需缴纳标准所得税（个人为
    18%，企业则取决于其业务范围）。如果这两个草案获得通过，该国将拥有有利的监管框架，因为加密交易的个人税率将降至 5%。2024 年后，企业需缴纳 18%的税。第二个草案侧重于消费者保护、监管和明确的法律框架。还有一项草案希望到
    2030 年之前完全免除加密交易的税收。摩尔多瓦国家银行于 2018 年就加密资产发出警告，原因在于该工具的性质以及缺乏明确的监管。另一方面，德涅斯特河沿岸地区通过了一项法律，使挖矿活动合法化。


    最后是土耳其。加密货币在那里非常受欢迎。根据不同的信息来源，至少 20%的人口持有代币。在其《2019-2023 年第十一个发展计划》中，土耳其还提议建立一种基于区块链的中央银行货币^(¹⁸⁸)。虽然真正的监管仍然很少，但甚至已经有关于“土耳其币”的草案出现。

