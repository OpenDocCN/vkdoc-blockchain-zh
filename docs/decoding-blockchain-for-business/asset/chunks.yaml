- fmt: '# Tax and Crypto Regulation in Asia


    Depending on the topic, you can see that adoption of cryptocurrencies is happening
    faster in Asia than anywhere else in the world. You have to keep in mind that
    each country has its own view and approach to the topic.


    One country that has made considerable efforts on the topic is Singapore, where
    the Monetary Authority of Singapore wishes to refrain from regulating cryptocurrencies.
    The goal is to create a regulatory framework surrounding cryptocurrencies rather
    than regulating the cryptocurrencies themselves. However, there is a possibility
    for double taxation in the case of Bitcoin, where there is a tax on purchase and
    when using it to purchase a good or service.^([^(189)](#fn189)) As one of the
    major blockchain hubs of Asia and the world, keeping the regulations as open as
    possible seems to be one of the goals of the country.


    Chinese regulators have also responded to the rise of blockchain technology. China
    isn’t really embracing the technology as you would expect in other countries but
    rather is using certain parts to their benefit.^([^(190)](#fn190)) Major companies
    such as Alibaba and Tencent have been working on implementations of the technology
    to improve their way of working. So what is different here compared to the rest
    of the world? According to new regulation, “entities” providing “blockchain information
    services” need to register with the government and collect information about the
    users, thereby actively undermining some of the fundamental concepts that formed
    the start of blockchain in the first place. For the Chinese government, it can
    prove to be a tool to gain further control over its citizens when it comes to
    digital information, identity, and transactions.


    The Indian government has started with the creation of a regulatory framework
    for blockchain technology. The potential of the technology and the need for infrastructure
    demand the setup of such a framework.^([^(191)](#fn191)) One use case that was
    implemented in India is the pilot of a blockchain system for property registration
    at the Shamshabad District and the KYC solution developed at Telangana state.
    The use of cryptocurrency is another story as the use of such tokens can lead
    to fines and jail time (based on proposed sanctions). So while half the states
    in India have started projects with blockchain technology, the very concept of
    cryptocurrencies is banned by the central bank.^([^(192)](#fn192)) However, the
    topic is still very contentious and the stance of India and their central bank
    might change over time (also due to pressure of the public).


    Another leading blockchain adopter is Japan. It has shown to be more than willing
    to adopt the technology.^([^(193)](#fn193)) An important reason for the level
    of adoption in Japan is the stance of the government. Where many governments saw
    a possible disruptor, Japan saw a technology that can enhance existing processes
    and infrastructure. The regulation has been set up in such a way that the blockchain
    industry is further boosted while its citizens are protected from possible mishaps.
    There are clear regulations on cryptocurrencies: what cryptocurrencies are, sales
    tokens, how are they taxed, and what the AML regulations are. This created certainty
    for companies wanting to move forward in their adoption of distributed ledgers.


    An example where a country has taken a very negative stance toward cryptocurrencies
    is Vietnam, where the use of cryptocurrencies as a means of payment is strictly
    banned and forbidden. At the same time any other regulatory framework for crypto-assets
    is still lacking.


    Cambodia has taken a similar stance without a clear regulatory scheme, while a
    statement was released by the Exchange Commission of Cambodia, the National Bank
    of Cambodia, and the General-Commissariat of the National Police that stated that
    if regulation would be created, they would be involved. Without a license, buying,
    selling, trading, or propagation and settlement are all deemed illegal. However,
    to this day, there is no licensing scheme in place, which means developing cryptocurrencies
    in the country is still illegal.^([^(194)](#fn194))


    Laos has released two notifications and a warning regarding cryptocurrencies.
    Notification No. 314/BOL encourages the population of the country to be more knowledgeable
    of cryptocurrencies. The same notification clearly stated that there is no regulatory
    framework in place and that the population cannot use cryptocurrencies as money
    or use it to pay debts. Notification No. 382/BOL also prohibited financial institutions
    from engaging in cryptocurrency-related activities.


    Indonesia prohibited crypto-assets as early as 2018, but by the end of the year,
    the Ministry of Trade released Regulation No. 99, officially classifying cryptocurrencies
    as commodities.^([^(195)](#fn195)) The Commodity Futures Trading Regulatory Agency
    or BAPPEBTI is the main regulator involved in the supervision of crypto-assets
    trading in the country. Regulations No. 5 and 9 helped legalize the sale and purchase
    of crypto-assets. Other involved institutions are the Indonesian Financial Transaction
    Reports and Analysis Center (PPATK), which focuses on anti-money laundering, and
    the Bank of Indonesia.


    Being the world leader in Internet access speed, with a population that has over
    92% of the Internet users, blockchain clearly shows potential in South Korea.^([^(196)](#fn196))
    However, due to the many abuses of ICOs in recent years, the government has issued
    a ban on them since 2017\. In the same vein that cryptocurrencies are sometimes
    seen as a threat to the national economy. A “regulation-free” zone was created
    in Busan, where some of the restrictions are dropped so that experimentation becomes
    possible in certain cases.


    Myanmar has only published one official statement on cryptocurrencies, authored
    by the Central Bank of Myanmar. It stated that the CBM is the only institution
    issuing and managing a domestic currency. Cryptocurrencies are therefore not recognized
    as a means of payment in the country. In the same vein, financial institutions
    are prohibited from buying, selling, or exchanging cryptocurrencies.


    Thailand is currently the leader in Southeast Asia when it comes to the creation
    of a clear regulatory framework regarding cryptocurrencies. The 2018 Emergency
    Decree on Digital Asset Businesses helps regulate all cryptocurrency-related activities.
    Digital assets are considered goods and are subject to 7% VAT and capital gains
    from the sale of digital assets are subject to income tax. Clear requirements
    have been set for ICO portals (electronic system provider) and digital asset businesses.


    When we look at the Middle East, we see some differences, as some countries are
    taking more action than others. Saudi Arabia, Bahrain, and Lebanon have showed
    key interest in blockchain technology and are leading the charge in the region.
    The main difference compared to the other regions and countries is that adoption
    of blockchain solutions is mainly driven from the top down.^([^(197)](#fn197))
    Examples are the launch of a digital currency by Saudi Arabia and the UAE, called
    “Aber,” and would help facilitate financial settlements between the two nations,
    and the emCash currency of Dubai. Because of these developments, regulation is
    a hot topic as well. The UAE has taken steps to warn investors about the risks
    involved with cryptocurrencies and at the same time provide a regulatory framework
    that recognizes digital tokens as securities. A second example is Abu Dhabi, where
    the financial regulator granted approval for Arabian Bourse so that a full-fledged
    crypto-asset exchange and digital custodian can operate. Other countries in the
    region are quickly following, such as Saudi Arabia, Egypt, and Kuwait, where regulators
    have started to design frameworks considering cryptocurrencies and moving away
    from their previous stance (earlier cryptocurrencies were considered not Sharia-compliant).'
