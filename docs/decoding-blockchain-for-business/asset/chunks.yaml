  trans: '

    ### 医疗卫生领域


    在使用区块链技术的应用领域中，医疗卫生领域可能并非你首先想到的。^(¹⁰⁹) 当想到个人敏感数据被锁在某个数据库中，并且任何人都可以访问时，这理应引起你的警惕。尽管如此，区块链技术仍可能对当今医疗行业的运作方式产生重大影响。该行业在医院的常规运作以及通常涉及医患关系的行政负担方面，并不以快速创新而闻名。^(¹¹⁰)
    时至今日，患者在接受诊断后不满意时，在不同医院重复挂号的情况仍然存在。检查在多家医院被重复进行，而这些医院往往对患者在其他机构已做过的检查毫不知情。目前虽有努力消除这些障碍，但这仍然是一个问题。其中的主要风险在于患者的安康。


    那么，我们关注的两大主要领域在哪里呢？患者身份识别和信息封锁。至今仍没有通用的患者身份标识，因此身份误认的情况仍可能发生。与此相关的是信息封锁，这可能导致患者护理出现问题。机构之间通常不共享信息，数据请求过程困难重重，程序繁琐，等待时间长，诸如此类。有时患者自己也会试图隐瞒信息，从而伤害自身。尽管这些信息本应向医疗专业人员提供，并且理应在患者请求下予以共享，但实际情况往往并非如此。另一个相关问题是，医院和其他机构通常资金有限，数据安全并非优先事项。这使得非常敏感的数据面临泄露风险，进而可能使人们因这些被共享的信息而受害。一个私有的分布式账本解决方案或许能解决这些当前普遍存在的问题。^(¹¹¹)


    当我们使用这样一个平台时，可以创建唯一的身份标识，从而杜绝身份误认或患者数据不匹配的情况。我们实际上可以减少医疗差错的数量。同理，医疗欺诈和滥用行为也能被遏制，因为一切都被记录在一个不可篡改的数据库中，确保每项操作都公开透明、有据可查。你可以让患者完全控制自己的数据，并与他们希望的个人和机构共享。另一方面，如果医疗从业者想要核实患者的其他数据是否存在，他们也可以做到。他们会立即获得数据访问权限吗？根据设置不同，答案是否定的。但如果他们向患者请求该信息，而患者拒绝共享，那么为了患者的利益，医疗从业者必须采取适当的预防措施。一个例子是阿片类药物危机，患者谎称受伤、自残，或试图在多家机构针对同一伤情获取药物。^(¹¹²)
    只有通过适当的信息共享，才能保护患者并制止滥用行为。患者还可以通过与区块链平台关联的奖励机制获得奖励，激励他们遵循健康的生活方式、遵守护理计划或采取措施保持健康。


    医疗卫生领域的另一个重要方面是制药行业，这是一个庞大的产业。每天都有大量药品被销售，其中一部分最终落入不法之徒手中。还有伪造的、并非来自真正供应商的产品在销售环节的某个中间环节出现，使患者面临危险。仅假药一项就给制药行业造成了
    2000 亿美元的损失，由此可知这是一个重大问题。目标是在成本方面降低这些假药的影响，并减少许多人因这些假药而面临的重大风险。


    一个区块链平台可以在药品运输过程中验证特定药品的存在。类似地，许多药品会因各种原因被批发商退回。^(¹¹³) 这些药品通常不会被销毁，而是被重新销售。在第二次销售发生之前，需要验证药品的真伪，以确保它们是同一种药物。欧盟制定了《防伪药指令》，要求药品必须序列化/加贴条形码并上传至中央数据库。在美国和其他国家，情况并非如此，因此区块链应用可能再次对市场产生积极影响。同样，这也可以防止假药被销售，因为假药无法在系统中获得验证。


    区块链还可以用于验证患者对临床试验数据的同意，以及测试结果的有效性。这不仅是为了验证研究结果，也是为了确保受试者的福祉始终得到尊重。一家专注于这一领域的初创公司名为
    `Clinico`。^(¹¹⁴)


    与之前介绍的用例一致，分布式账本平台可以帮助创建一个通用数据库，从而为我们提供一个关于新药和药品的临床试验、追踪药品和药物的生产及其全球分销的清晰数据库。这意味着，如果能说服所有供应商和经销商在一个主要系统中协同合作，我们将能够淘汰大量假药，原因很简单：区块链中的数据是不可篡改的，而中间环节的处理者无法随意修改数据以满足自身需求。由于每项操作都有清晰的日志记录，任何人都无法否认参与了欺诈或假冒产品的生产。


    医疗保健领域特有的保险欺诈是另一个令人担忧的问题。一家名为 `ALLIVE` 的初创公司正在探讨这个问题。^(¹¹⁵) 在此，数据可以根据客户提出的请求与保险公司共享，并且可以与医疗专业人员的验证关联起来。这样一来，欺诈参与者必须至少有几个同伙才能成功，而他们的合作行为将被永久记录在区块链中。^(¹¹⁶)


    其他可能的优势包括因减少许多医院的行政负担而降低成本。区块链还可以增强医疗交易的安全性及其控制（人们可能会对机密数据有时被处理的方式感到惊讶，但这并不仅仅发生在医疗领域），改善医患互动，追踪医疗交易等等。


    同样，我们应该始终牢记我们在如何处理敏感的个人数据，而不是盲目地跳向新的解决方案。这些考量决定了众多患者的未来，并且在注重数据保护的前提下，我们应该带着清晰的愿景向前迈进。

    '
- fmt: '### The Public Sector


    Within the public sector, several possibilities for the implementation of blockchain
    and distributed ledger technology have been identified and already been used.
    A first aspect of the public sector that I want to highlight has to do with pensions.


    Pensions are one of the major topics when elections are at the door in Europe,
    but also elsewhere across the globe. One of the reasons is that pensions make
    up a significant part of the costs that governments are dealing with. That is
    why we have in Belgium, but also in many other countries, the so-called *pillars*.
    The first pillar is what the government provides for you when you retire, the
    second pillar is what can be saved from your employer, and the third pillar is
    what you yourself voluntarily set aside.


    The major problem that most countries have with their current pension schemes
    is that the current working population needs to pay for the retired population.
    This wasn’t a problem in times with increasing population numbers, but with falling
    birth rates, this system is facing some tough challenges.


    Blockchain to the rescue! If things were only that easy. But some solutions have
    been put forward to help at least in part with the challenges that we are currently
    facing. We are going to mention a couple of those solutions here.


    What are people currently looking for in a pension scheme? An easy-to-comprehend
    system that allows participants to understand how they can secure their financial
    future and invest in a safe way. If possible, it should be easy, low-cost, fraud-free,
    and easy to understand.


    Several players have entered the market just for this purpose: to help people
    invest in their future in a way they can trust and understand. This, of course,
    offers in no way a solution for the first two pillars of the system I described,
    but at least it allows people to have some assurance of what they can set aside
    for themselves.


    A beautiful example is `NestEgg`^([^(117)](#fn117)), which is a blockchain-based
    solution in the Netherlands that allows participants to crowd-fund certain sustainable
    infrastructure. If the crowdfunding is successful, the infrastructure is built
    and you are a partial owner of said infrastructure. Each product has its own investment
    policy (`NestEgg` is linked to `AGP`, the largest pension fund in the Netherlands),
    where you can choose to reduce your energy bill or receive the return on your
    bank account. This way, you can slowly (you can already invest starting from 25
    Euro) grow your personal savings and maintain your cost of living. At the same
    time, you are helping fund the infrastructure of the future.


    A second project I want to highlight here is `Akropolis`. It also focuses on the
    third pillar and is directed at participants interested in creating their own,
    personal investment funds. In a decentralized way each participant can choose
    in which pension products they would like to invest. All transactions are transparent,
    together with the eventual fund performance. An audit of the fund can happen hassle-free.


    Of course, there are many more areas in which we could consider blockchain applications
    when we look at the public sector. One of those areas is the concept of partnering.
    Whether you are in the EU or anywhere else in the world, partnerships with the
    private sector or between other public entities are commonplace. With the use
    of blockchain platforms you can create more transparency in these initiatives,
    which can open up opportunities and participation. It can also provide insight
    into how government funds are spent, how decisions are made, and what the output
    is of these collaborations. Where these platforms and intergovernmental partnerships
    now are often opaque to anyone trying to look in from the outside (and often even
    for the people directly involved), with distributed ledgers, these governance
    systems can become more transparent. It could also democratize the process when
    people subject to the partnerships decisions can participate and vote on the projects
    they want to implement, directly giving power to the citizens who are subject
    to the decisions being made.^([^(118)](#fn118))


    These platforms could also be used to reduce fraud in the sector and help manage
    the funds in a clear, transparent, and secure manner. By linking the funds to
    the blockchain technology, you can also increase compliance by implementing smart
    contracts that are automatically triggered if the request is compliant and sets
    in motion regulatory action if it isn’t.^([^(119)](#fn119)) Other possibilities
    include the secure storage of government and citizen data, trusted governments,
    and civil online systems. These applications could reduce the costs of many of
    the current applications. As it is for any person who has to deal with administrations
    these days, it is likely to be a hassle. Why? Most of the time, you interact with
    the government only when you have an issue, so that any process already seems
    slow and painful to start with. If you consider that a lot of these processes
    are indeed outdated, you start to understand the frustration that a lot of people
    feel, even when they only think about having to interact with the government.
    As the frustration is likely to stay, these applications could reduce these feelings
    to the bare minimum.'
