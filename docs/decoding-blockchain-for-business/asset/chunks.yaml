    *For my beautiful wife-to-be, Tatiana*


    Introduction


    Hi. Yes, you. If you are reading this I assume you have heard about *blockchain*
    and would like to know more about the subject. Perhaps you had some cryptocurrencies
    in the past, heard the whispers about Bitcoin or other networks and are wondering
    if you should invest or not. You might have smirked at those who were investing
    in crypto and now are still “HODLing,” as they like to call it, hoping that the
    value will go up to where it once was. Now you want to know what all the talk
    is actually about. Perhaps you heard about a possible project that could encapsulate
    blockchain technology. Or you might even have heard the question “do you believe
    in blockchain?” as if it were some kind of new religion.


    Well, if you are looking to get some deeper understanding of what blockchain technology
    is and how it might impact your life, don’t look any further. When we talk about
    blockchain, more often than not business professionals do not have a clear view
    on what has already been done with this new technology or what is going to happen
    in the near future. To lift the veil, this book will introduce blockchain to business
    professionals, specifically focusing on not just what blockchain is but how it’s
    changing different industries.


    We’ll look at different major sectors to see how this technology is no longer
    something obscure and difficult to understand and use, but instead offers a new
    way of working and redesigning current, often terribly designed, processes. Blockchain
    holds the power to change platforms entirely so that competitors can work together
    in a trustless environment. This way, entire industries can be further optimized
    while at the same time improving the situation for their customers. I will not
    try to convince you or make you “believe” in anything. My goal is to provide a
    clear message about what blockchain is, how it is being applied, and what the
    possible legal and business opportunities are. What you do with this information
    is completely up to you. Why? It is only you, with the knowledge that you have
    acquired, who can determine if blockchain (or distributed ledgers for that matter)
    is for you. It will be up to you to determine if you can do something with this
    knowledge and change the world around you. If you don’t, there is no judgment.
    And if you do, this book will hopefully help you make the right decisions. Of
    course, because I am the author of this book, you can rightly assume that I think
    positively of the blockchain technology. If some of the passages in the book sound
    a bit too optimistic in your opinion, I apologize. Again, it is not my goal to
    convince you of anything, merely to share information with you.


    Some of you might be very skeptical. The cryptocurrency crash of 2019 is still
    fresh in many people’s minds and somewhat tempered the optimistic potential people
    felt for blockchain originally. Some people think the technology has failed and
    that we should look to more traditional solutions. The truth is as always somewhere
    in the middle. As you will soon learn, the crash happened because of specific
    reasons. It might even be a good thing that the crash happened. It allows us to
    build a future based on more realistic terms, rather than dreaming of a completely
    new world tomorrow. As most of you know, the world doesn’t change over night,
    and we shouldn’t push for that either. Rather, we should use the tools and knowledge
    that is handed to us, and do the best we can to make a better world tomorrow,
    even by changing it a little bit. While we progress through these pages, you will
    understand how distributed ledgers could change the present as well as the future.


    In this book, I cover some notable implementations of blockchain that show its
    potential but also the difficulties of the technology. A question that always
    must be asked is this: do we have to use distributed ledger/blockchain technology?
    Or even better: what is the added value of using blockchain? You might be able
    to use it, but you should do so only when it is beneficial to the project and
    organization, not just because it is blockchain? Sadly, this question is sometimes
    overlooked by people and companies that really want to join the hype but do not
    understand the underlying consequences of those choices.


    As you will soon learn, blockchain technology requires a new way of thinking.
    Only when all the partners share this same view can a blockchain project succeed.
    One of the most annoying questions relating to blockchain is “how can we get the
    most benefit out of this?” This might be hard to understand at this moment, but
    distributed ledgers allow for competitors to cooperate to the benefit of all.


    We’ll also look into how blockchain technology affects other booming topics such
    as AI, IoT, and RPA. Emerging technologies aren’t separate evolutions within our
    society but can easily combined into new solutions. These solutions can lead to
    even greater change and broader impact (or even greater disaster when done poorly).


    We will also look at the influence of blockchain technology on the finance departments
    within major companies and on regulations surrounding blockchain. Finally, we’ll
    end with some insights into cryptocurrencies. And now, let’s begin the journey!'
