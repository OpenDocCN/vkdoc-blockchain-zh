- fmt: '### The Health Sector


    The health sector might not be the first sector you think of when considering
    implementations using the blockchain technology.^([^(109)](#fn109)) The idea of
    sensitive personal data locked away in some database, which can be accessed by
    anyone, should make you think. Still, the blockchain technology could have a major
    impact on how the healthcare industry is functioning today. The industry is not
    known for fast innovation when it comes to the general functioning of hospitals
    and the administrative burden that is often part of the patient relationship.^([^(110)](#fn110))
    To this day, it still happens that patients register at different hospitals when
    they aren’t happy with the diagnosis they receive. The studies are repeated at
    multiple hospitals but these are often unaware of some research that has happened
    at other institutions. There are efforts in place to remove these barriers, but
    it still remains an issue. The major risk here is the patient’s well-being.


    So where do we find two major areas of concern? The identification of patients
    and the blocking of information. There is no universal patient identifier to this
    day, so that mistaken identity can still happen. Linked to this is the blocking
    of information, as it can lead to problems in the care for the patient. Information
    is often not shared between institutions, there are difficulties when data is
    requested, a long procedures, long waiting times, and so on. Sometimes the patients
    themselves try to hide information, leading to their own harm. Even though this
    information should be available to medical professionals and certainly should
    be shared upon request of the patient, this is often not the case. Another linked
    issue is that hospitals and other institutions often have limited funds and data
    security isn’t a priority. This leaves very sensitive data open for possible breaches,
    where in turn people could become victim of this shared information. A private
    distributed ledger solution might be the solution to these now common problems.^([^(111)](#fn111))


    When we use such a platform, we can create unique identities so that there can
    no longer be a case of mistaken identity or mismatched patient data. We could
    actually reduce the number of medical mistakes. In the same vein, medical fraud
    and abuse could be halted as everything is recorded in a tamper-free database,
    making sure that each action taken is there for everyone to see. You could give
    patients complete control over their data to share with those people and institutions
    they wish. On the other hand, if a medical practitioner wants to verify that other
    data exists on the patient, they can do so. Will they immediately get access to
    the data? Depending on the setup, no. But if they ask the patient for that information
    and the patient refuses to share the information, the medical practitioner has
    to take the proper precautions for the sake of the patient. An example is the
    Opioid epidemic, where patients fake injury, injure themselves, or try to collect
    drugs at several institutions for the same injury.^([^(112)](#fn112)) Only with
    proper information sharing can patients be protected and can abuse be halted.
    Patients could also receive rewards via a reward mechanism linked to the blockchain
    platform, incentivizing them to follow a healthy lifestyle, follow a care plan,
    or take action to remain healthy.


    Another major aspect of the health sector is the pharma industry, which is a major
    industry. A lot of medicine is sold each day and some of this supply ends up in
    the wrong hands. There is also the fabrication of other products that aren’t really
    from the supplier but end up somewhere in the middle of the sales process and
    put patients in harm’s way. Counterfeit drugs alone cost the pharma industry $200
    billion, so you can understand that this is a major issue. The goal is to reduce
    the impact of these counterfeit drugs in terms of cost and also reduce the major
    risks many people are subject to because of these drugs.


    A blockchain platform could validate the existence of certain drugs when they
    are being transported. In the same sense a lot of pharmaceuticals are returned
    by wholesalers for a variety of reasons.^([^(113)](#fn113)) Often these drugs
    aren’t destroyed but instead are resold. Before this second sale can happen, the
    authenticity of the pharmaceuticals needs to be verified to make sure that they
    are the the same drugs. The EU has the Falsified Medicine Directive, which requires
    drugs to be serialized/barcoded and uploaded in a centralized database. In the
    U.S. and other countries, this isn’t the case, so again a blockchain application
    might have a positive impact on the market. In the same way, one could prevent
    counterfeit drugs being sold, as these would not verified in the system.


    Blockchain could also be used to verify the consent that a patient gives for clinical
    trials data, as well as the validity of the test outcomes. This not only to verify
    the outcome of the study but also to make sure that the well-being of the test
    subject is respected at all times. A startup that focuses on this very topic is
    called `Clinico`.^([^(114)](#fn114))


    In line with the use case presented before, a distributed ledger platform could
    help create a universal database, which could give us a clear database with clinical
    trials on new drugs and medications, follow the production of drugs and medicine,
    and their distribution all over the world. This means that if all suppliers and
    vendors could be persuaded to work together in one major system, we would be able
    to phase out a lot of counterfeit drugs due to the simple fact that the data in
    the blockchain is tamper free, and processors in the middle cannot simply adapt
    the data to their liking. With every action being clearly logged, no person could
    deny involvement in fraud or the production of counterfeit products.


    Insurance fraud specifically in the healthcare sector is another concern. An interesting
    startup that takes a look into this is called `ALLIVE`.^([^(115)](#fn115)) Here
    data can be shared with insurers based on the requests made by the client and
    this can be linked to a validation by a medical professional. This way, the fraudulent
    participant must have at least a few accomplices to succeed, and their cooperation
    is logged away in the blockchain for eternity.^([^(116)](#fn116))


    Other possible advantages include cost reduction due to the administrative burden
    of many hospitals. Blockchain could also enhance security and controls over healthcare
    transactions (one would be amazed how confidential data is sometimes processed,
    but this not only in the healthcare sector), improve general doctor-patient interactions,
    track medical transactions, and so on.


    Again, we should always keep in mind what we are doing with sensitive personal
    data and not just blindly jump over to new solutions. These considerations determine
    the future of many patients and, with data protection in mind, we should move
    forward with a clear vision.'
