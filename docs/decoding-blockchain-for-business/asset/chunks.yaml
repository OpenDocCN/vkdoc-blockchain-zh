  trans: '

    ### 节点


    当我们谈论区块链及其所代表的网络时，也必然会提及节点。`节点`是网络的命脉，因为它们始终负责一组特定的任务。这些任务可能包括创建、接收和传输消息。如果没有节点，即使软件仍是最新版本，网络也将不复存在。这些节点分布在全球各地，遍布于一个广泛的网络之中。^(⁸)


    那么什么是节点呢？节点是任何连接到网络并拥有 IP 地址的电子设备。网络的主要目的之一是维护区块链的副本并处理交易（具体取决于节点类型）。这些节点的所有者自愿使用他们的硬件、算力和能源来维护网络。


    我们还应区分不同类型的节点：全节点、超级节点、矿工节点和简易支付验证（SPV）客户端。尽管它们在网络中地位平等，但每种类型都以不同的方式支持网络。首先，全节点会下载区块链的完整副本，并根据所使用的共识协议检查任何新交易。它们负责使用共识算法（稍后解释）验证交易和区块。它们还能够将新的交易或区块中继到区块链。当这个全节点公开可见时，我们称之为`超级节点`。全节点的所有者可以选择将其运行为隐藏节点（通过使用防火墙或
    TOR 网络对他人不可见）或可见节点。超级节点的优势在于，它可以连接到任何想要建立连接的其他节点并进行通信，充当一个分发点，既用于分发节点中存储的数据，也用于促进与网络上其他节点的通信。


    另一方面，轻节点（或 SPV 节点）引用了全节点上的区块链副本。其名称源于 SPV 方法，即“简易支付验证”方法，用户无需下载和维护整个区块链数据库即可验证一笔交易是否已被包含在某个区块中。这些节点依赖超级节点提供的信息，并仅作为通信端点（这在钱包软件中很常见）。


    最后，我们应强调客户端节点和矿工节点之间的区别。虽然任何人都可以运行全节点（具备必要的硬件要求），但这与挖矿节点不同。当一个全节点仅仅验证交易时，我们称之为客户端节点。如果所有者愿意投资昂贵的硬件（取决于共识协议），他也可以在运行节点时挖掘新区块。挖矿的概念将在下文中解释。


    ### 挖矿


    `挖矿`是区块链技术中的关键概念之一。它是新交易被新区块^(⁹)接受并添加到现有链中的方式，也是新加密货币的创造方式。它通常被用作防止欺诈的对策，并确保网络中的所有参与者保持诚实。挖矿本身成本相当高，因为它需要用于挖矿过程的硬件、驱动挖矿的能源以及时间。


    挖矿分几个步骤进行。首先，挖矿节点需要收集等待在交易池中待处理的未确认交易。这些交易被打包成一个区块（区块是交易及其一些额外元数据的集合）。每个矿工可以选择相同或不同的一组交易（这可能是由于节点参数或地理位置决定的）。下一步，取决于共识算法，是根据网络规则对交易进行签名。这可能是一个数学难题、参与者的投票数或其他系统。如果找到了有效解，矿工就可以将他的区块和解广播给其他参与者，其他参与者可以验证该解。如果解正确，并且区块内的所有交易都能根据区块链历史记录执行，则该区块被确认并添加到这些节点的区块链中。这被称为`胜出`区块。


    如上所述，为此，矿工应该获得奖励。奖励通过两种方式实现：矿工获得区块中包含的交易的手续费，以及新区块被添加时创建的新币。矿工可以基于网络所使用的算法（工作量证明、权益证明或其他）来获得此奖励。


    挖矿过程不仅是创造新加密货币的关键，也是在无需信任的环境中帮助建立去中心化共识的机制。网络上的所有节点都会接收到区块，并因此能够验证其有效性。这意味着共识会随着时间的推移而逐渐形成，因为这不是在特定时刻进行选举，而是通过网络中所有节点的异步交互来实现的。你必须认识到，在像比特币这样的网络中，为竞争和挖掘下一个区块所需的算力已经呈指数级增长。这是因为市场参与者的增加以及硬件解决方案的演进。随着时间的推移，矿池应运而生。通过合作，矿池找到下一个胜出区块的机会更大，这样奖励就可以在参与者之间分享。挖矿设施的基础设施随时间发生了巨大变化，根据不同的区块链平台，我们将深入探讨这些发展的时机和原因。对于其中一些平台，需要相当先进的基础设施，而其他平台则仍然对所有人开放。


    当然，在处理区块链平台的企业级实施时，你不会使用传统的矿工节点。相反，你将使用一种更简单的共识算法，在这种算法中，每个参与者都可以轻松检查和验证网络中发生的事情。竞争的需求降低了，因为这些参与者实际上已经相互认识，因此欺诈交易很容易被追溯。这样一来，当参与者试图在联盟中欺骗其商业伙伴时，他们可以因此被从网络中移除。


    ### 共识协议


    我们在谈论区块链技术时经常提到协议。当然，这并非区块链所独有，而是可以在任何电信技术的实施中发现。当我们谈论协议时，我们指的是决定如何连接到系统并与之交互的一整套规则。这些规则可能非常详尽，因为它们可以决定你必须使用哪种硬件、允许使用哪种软件，以及通过网络传输的消息的语义是什么。与其他电信服务一样。当谈到像比特币或以太坊这样的开源区块链实现时，对硬件没有限制，所需的软件也完全免费。尽管对于私有区块链实现来说情况仍然如此，但我们可以预见未来可能不再如此的发展趋势。

    '
- fmt: '# Proof of Work


    Proof of work was the first consensus protocol to be used within a blockchain
    network. The first network to implement this type of consensus protocol was the
    Bitcoin network. The idea is that miners have to use their nodes to solve a mathematical
    problem. It will require a lot of work and computer power to solve, but verifying
    the result should be easy. This way of consensus is designed to be difficult and
    to require a lot of fire power. If it becomes too easy to solve, certain security
    issues could be introduced—mining could become too fast, leading to floating blocks
    and chains without a main chain. An example is Bitcoin, where the goal is to have
    a new block every ten minutes. As computing power increases over time, the number
    of participants increases and the computer power added to the network multiplies.
    That means the difficulty of the proof of work algorithm needs to become more
    difficult as well. Some networks have tried to move in a different direction by
    creating algorithms that are resistant against mining software. Therefore, everyone
    can keep on mining with classic computers (leaving the network as democratic as
    possible). A target hash will be set by the network and the nodes have to try
    to compute a hash based on the block and the nonce that will be below this target
    number. The lower the target, the more difficult it will be for the participants
    to find a correct and acceptable hash. The proof of work protocol can help address
    the issue of Byzantine fault tolerance by using the aforementioned nonce and by
    combining messages into blocks. To prevent precomputation, the nonce is unique
    for each node and can only be used once.


    An important point of criticism about this type of protocol is the amount of energy
    that is consumed by networks that apply this type of protocol. In times of climate
    change, scarce resources, and economic crisis, this is an important point to consider.


    There are a lot of different proof of work consensus protocols that are currently
    in use by several networks.


    # Proof of Stake


    Proof of stake was developed after the proof of work protocol and is more and
    more being used in blockchain networks. The first network to implement this kind
    of protocol was Peercoin in 2012. In the proof of stake network, the miner of
    the next block is selected pseudo-randomly, as the amount of cryptocurrency held
    by the node influences the chances of being chosen. The probability of being chosen
    is directly linked to the stake you have in the network.


    It is clearly more cost effective than the proof of work consensus protocol, as
    miners don’t have to use energy to solve a mathematical problem. Secondly, it
    has proven to be more secure. A common example is the 51% attack, where blockchain
    networks become vulnerable as soon as a participant has 51% of the computing power
    in a network. From this second, he can validate all his own transactions, against
    the wishes of the other participants as they can no longer stop him. This might
    seem contradictory, but the stakeholders with the highest stakes are motivated
    to maintain the network, because if an attack would occur, this would damage the
    reputation of the network and hurt these participants the most. There is also
    a downside to this protocol, called the *nothing at stake* problem. When there
    is a consensus failure in the network, and the participants in the network have
    nothing to lose, there is nothing to stop these participants from supporting different
    sidechains.


    # Delegated Proof of Stake


    The delegated proof of stake protocol maintains an irrefutable agreement on the
    truth across the network. The protocol uses real-time voting combined with reputation
    to achieve consensus. This allows every holder of the cryptocurrency to influence
    the network.


    This network uses delegates, which are elected to their roles and have to put
    a certain amount of cryptocurrency within a base account. The larger this amount
    is, the more influence the delegate can exert over the network. In case of malicious
    behavior, the money in this base account is lost. We can also call this deposit-based
    proof of stake. While the delegates are responsible for transaction validation,
    it is up to the participants to regularly request if the blocks mined contain
    all the correct transactions. This ensures that the network is self-governed and
    policed. You can probably sense that this is more democratic than the other consensus
    protocols.


    # Proof of Authority


    Proof of authority (PoA) is an alternative that is often used by private blockchain^([^(10)](#fn10))
    networks (more related to distributed ledger networks), whereby proof of work
    is replaced by the “identity” of the nodes as a stake in the network. Only the
    selected nodes are allowed to mine new blocks. These “validator” nodes are allowed
    to add transactions to the blocks that are consequently added to the blockchain.
    With proof of authority and validators, there is also the new concept of *reputation*.
    The reputation of the validators is crucial for the existence of the network.
    If the reputation of one of the validators or the validator’s authority is damaged,
    the other participants might leave the network or challenge the newly created
    blocks and its transactions.


    This protocol has advantages and disadvantages, when you compare it to the other
    protocol implementations. The main risk with PoA is that if there is only one
    validator node, you centralize the risk to a single point of failure. This is
    a main risk to take into consideration when we talk about distributed networks.


    However, PoA does not require the massive computing power that is necessary for
    networks that use proof of work. PoA also has an advantage over proof of stake.
    With PoA, the entire identity of a node is put forward. If participants act maliciously,
    they stand to lose their entire stake in the network. With proof of stake, the
    participant only stands to lose his current stake that he put forward. This means
    that someone who has a lower overall participation in the network stands to lose
    less than someone who has invested heavily in the network.


    # Other Protocols Used in Blockchain Platforms


    Several other types of protocols can be used in blockchain platforms so that one
    can come to a consensus. One of these protocols, strongly related to proof of
    stake is *proof of importance*. The difference with proof of stake is that in
    the PoI environment, the transactions of the user are also taken into account.
    This way the protocol tries to measure the level of trust and importance of the
    node in the entire network.^([^(11)](#fn11)) Another interesting protocol is the
    Proof of Activity, related to proof of work and proof of stake. It’s more energy
    efficient than proof of work, as only in the first phase this is used, as in the
    second the protocol uses a proof of stake. There is also proof of capacity, where
    the main driver is the hard disk space that is still available (instead of CPU,
    as we find with the proof of work protocol).^([^(12)](#fn12))


    Other protocols that you might encounter are proof of replication, proof of burn,
    proof of space, proof of space-time, proof of deposit, proof of data possession,
    and so on. You can clearly see that a lot of different blockchain platforms are
    experimenting with different solutions to provide consensus in a distributed and
    decentralized environment and in a secure and efficient way. Each of these protocols
    has advantages and disadvantages, depending on the goal you are trying to achieve
    and the way you are working with your organization.'
