    them led to nothing. To give you an idea, in about 4.5 months in 2018, 6.3 billion
    USD were raised with ICOs! Table [5-1](#497553_1_En_5_Chapter.xhtml#Tab1) shows
    some of the biggest ICO scams (to date).^([^(257)](#fn257))


    Table 5-1


    Biggest ICO Scams to Date


    | Scam Name | Amount of Money Scammed (USD) |

    | --- | --- |

    | Pincoin and iFan | 660,000,000 |

    | CentraTech | 32,000,000 |

    | Onecoin | 30,000,000 |

    | Plexcoin | 15,000,000 |

    | Bitcard | 5,000,000 |

    | Opair and Ebitz | 2,900,000 |

    | Benebit | 2,700,000 |

    | Bitconnect | 700,000 |

    | Confido | 375,000 |

    | REcoin and DRC | 300,000 |

    | Ponzicoin | 250,000 |

    | Karbon | 200,000 |


    Does this mean that every ICO is a scam? Of course not, but just as with regular
    investments, it is up to you to perform due diligence, concerning the projects
    and the companies behind an ICO, but also concerning the regulation and the possible
    pitfalls. This relates to personal liability as well (remember the DAO case!).
    Research the development team behind an ICO project as well. It is not an uncommon
    tactic to invent fake founders and biographies to give a project more legitimacy.
    Even if the development team is real, is their experience real?^([^(258)](#fn258))
    Next, read the whitepaper thoroughly. Is the documentation reasonable? Can they
    achieve what they want to achieve? Do you see this project going somewhere? And
    even if there is a convincing whitepaper (as was the case with Plexcoin), do not
    immediately trust them. Another red flag is if you cannot clearly follow the ICO
    process. For a legitimate company, it shouldn’t be too hard to show how the process
    works and show the progress during the sale. If they hide this or make it extremely
    difficult to understand, you should know something is wrong. But finally, and
    I cannot state this clear enough, always exercise caution when considering investing
    in an ICO. Getting rich quick is always a nice idea, but the likelihood of it
    happening is really small. If something sounds too good to be true, it probably
    is.


    While the first ICO ever was probably the sale of Ripple in early 2013, it was
    the Ethereum ICO in 2014 that was able to draw the public’s attention, because
    it raised 18.4 million USD. What did the investors receive in return? More often
    than not, the answer is “tokens,” which can refer to value, stake, voting rights,
    or anything else for that matter. When you ask the SEC (Securities and Exchange
    Commission), there are only two types: security tokens and utility tokens.


    Security tokens are identified using the Howey test, which consists of three questions:


    *   Is it an investment of money?


    *   Is the investment in a common enterprise?


    *   Is there an expectation of profit from the work of the promoters of the third
    party?


    If not all these questions can be answered positively, you are dealing with a
    utility token. These tokens give holders the right to use the network or take
    advantage of the network by voting.


    So why do projects start an ICO in the first place? Most importantly because they
    wouldn’t be able to start an IPO (initial public offering). The ICO allows them
    to have a shot at their project, without having to go through all the regulatory
    requirements linked to an IPO. But probably the most important advantage is the
    strong link that is created between a project and the community. As most of these
    projects also need that same community to exist and flourish, ICOs deliver the
    perfect platform to create a mutual, beneficial relationship. Table [5-2](#497553_1_En_5_Chapter.xhtml#Tab2)
    shows the ICOs with the highest returns to date.


    Table 5-2


    ICOs with the Highest Returns to Date


    | Name | ROI |

    | --- | --- |

    | NXT | 1,265,555% |

    | Iota | 424,084% |

    | NEO | 378,453% |

    | Ethereum | 279,843% |

    | Spectrecoin | 149,806% |

    | Stratis | 102,338% |

    | Ark | 37,805% |

    | Lisk | 26,367% |

    | DixigDAO | 12,044% |

    | QTUM | 9,225% |


    However, you should also consider the disadvantages, and there are quite a few.
    As mentioned, there are scammers out there who are waiting to take advantage of
    people not looking into the details. On top of that, even if the development team
    behind a project is genuine, 90% of startups still fail! Another disadvantage
    is the appearance of “crypto-whales,” which are investors that immediately buy
    huge bulks of the ICO, cutting in line by paying high amounts of transaction fees,
    thereby destroying the idea of decentralization. An example is the BAT ICO, where
    35 million USD was raised in 24 seconds by a few investors.


    A fourth disadvantage is the popularity of certain ICOs that effectively clog
    up the network, thereby preventing investors from participating or even completely
    cutting out the ICO! Finally, I should also mention the security of ICOs and security
    platforms as a whole. In the past, several infamous hacks have taken place, leading
    to the theft of millions. Due to the nature of cryptocurrencies, there will always
    be security measures that you have to take into consideration and certainly with
    something that is new or untested, you can imagine that there are flaws that have
    been overlooked by even the best developers.


    Even though ICOs still take place, you should also know that regulatory bodies
    are taking a deeper interest in them. The SEC forces new ICOs to declare if they
    are a security and China and India have banned ICOs all together. Within the EU,
    the ICOs have to meet the AML/KYC regulations that are in place. It is seen as
    a high-risk investment that should be strongly regulated to protect the investors.
    However, the EU believes that it should support innovation and has therefore not
    banned the practice.^([^(259)](#fn259)) The future will show how regulation changes
    over time and how ICOs might evolve.'
  trans: '

    # 首次代币发行（ICO）


    首次代币发行（ICO）是指向潜在投资者公开销售新型加密货币的行为。^(²⁵⁶) 过去几年，由于缺乏监管，这种模式成为吸引投资者的诱人途径。然而，这也导致了许多骗子趁虚而入，尤其是在加密货币泡沫的高峰时期。投资者不再仔细审查投资标的，只想从加密货币市场的巨额利润中分一杯羹。一些
    ICO 纯粹基于概念，没有其他任何实质内容，却能毫无根据地筹集数百万美元。其中部分项目取得了成功，但大多数仅有概念支撑的 ICO 最终都无果而终。举例来说，在
    2018 年大约 4.5 个月的时间里，通过 ICO 筹集了 63 亿美元！表 5-1 列出了一些迄今为止规模最大的 ICO 骗局。^(²⁵⁷)


    **表 5-1** 迄今为止规模最大的 ICO 骗局


    | 骗局名称 | 诈骗金额（美元） |

    | --- | --- |

    | Pincoin 和 iFan | 660,000,000 |

    | CentraTech | 32,000,000 |

    | Onecoin | 30,000,000 |

    | Plexcoin | 15,000,000 |

    | Bitcard | 5,000,000 |

    | Opair 和 Ebitz | 2,900,000 |

    | Benebit | 2,700,000 |

    | Bitconnect | 700,000 |

    | Confido | 375,000 |

    | REcoin 和 DRC | 300,000 |

    | Ponzicoin | 250,000 |

    | Karbon | 200,000 |


    这是否意味着每个 ICO 都是骗局？当然不是，但正如常规投资一样，你需要对 ICO 背后的项目和公司进行尽职调查，同时也要关注监管问题和潜在陷阱。这还涉及到个人责任（还记得
    DAO 事件吧！）。也要调查 ICO 项目背后的开发团队。编造虚假创始人和履历来增加项目可信度是常见手段。即使开发团队真实存在，他们的经验是否属实？^(²⁵⁸)
    接下来，仔细阅读白皮书。文档内容合理吗？他们能否实现预期目标？你认为这个项目有前景吗？即使有令人信服的白皮书（如 Plexcoin 的案例），也不要立即信任。另一个危险信号是你无法清晰了解
    ICO 流程。对于合法的公司而言，展示流程运作方式和销售期间的进展并不困难。如果他们隐瞒这一点或使其极难理解，你就应该知道有问题了。最后，也是我要强调的一点：考虑投资
    ICO 时，务必保持谨慎。快速致富的想法固然美好，但实现的可能性微乎其微。如果某事听起来好得不像真的，那它很可能就是假的。


    虽然历史上的首个 ICO 可能是 2013 年初的瑞波币（Ripple）销售，但真正引起公众关注的是 2014 年的以太坊（Ethereum）ICO，因为它筹集了
    1840 万美元。投资者得到了什么回报？通常情况下，答案是“代币”，这可以代表价值、股权、投票权或相关任何事物。根据美国证券交易委员会（SEC）的定义，代币仅分为两种类型：证券型代币和实用型代币。


    证券型代币通过豪威测试（Howey test）进行识别，该测试包含三个问题：


    - 是否涉及资金投资？

    - 是否投资于共同企业？

    - 是否期望从第三方发起人的努力中获得利润？


    如果并非所有问题都能得到肯定回答，那么你面对的就是实用型代币。这类代币赋予持有者使用网络或通过投票利用网络的权利。


    那么，项目方为什么要发起 ICO 呢？最主要的原因是他们无法启动 IPO（首次公开募股）。ICO 让他们有机会发起项目，而无需满足 IPO 相关的所有监管要求。但可能最重要的优势在于，它在项目与社区之间建立了紧密联系。由于大多数项目也需要这个社区来生存和发展，ICO
    提供了创建互利关系的完美平台。表 5-2 列出了迄今为止回报率最高的 ICO。


    **表 5-2** 迄今为止回报率最高的 ICO


    | 名称 | 投资回报率（ROI） |

    | --- | --- |

    | NXT | 1,265,555% |

    | Iota | 424,084% |

    | NEO | 378,453% |

    | 以太坊 | 279,843% |

    | Spectrecoin | 149,806% |

    | Stratis | 102,338% |

    | Ark | 37,805% |

    | Lisk | 26,367% |

    | DixigDAO | 12,044% |

    | QTUM | 9,225% |


    然而，你也应该考虑到其缺点，而且为数不少。如前所述，骗子们正等着利用那些不关注细节的人。除此之外，即使项目背后的开发团队是真诚的，仍有 90%的初创公司会失败！另一个缺点是“加密货币巨鲸”的出现，他们是立即购买大量
    ICO 代币的投资者，通过支付高额交易手续费插队，从而破坏了去中心化的理念。例如 BAT 的 ICO，少数投资者在 24 秒内就筹集了 3500 万美元。


    第四个缺点是某些热门 ICO 会有效堵塞网络，从而阻止投资者参与，甚至完全中断 ICO 流程！最后，我还应该提及 ICO 及整个安全平台的安全性。过去曾发生过几起臭名昭著的黑客事件，导致数百万美元被盗。由于加密货币的本质，总有一些安全措施你必须考虑，而对于新颖或未经测试的东西，可以想象即使是顶尖开发者也会忽视其中的缺陷。


    尽管 ICO 仍在进行，但你也应该知道监管机构对此越来越关注。美国 SEC 强制要求新的 ICO 申报其是否属于证券，而中国和印度则全面禁止了 ICO。在欧盟内部，ICO
    必须满足现行的反洗钱/了解你的客户（AML/KYC）法规。它被视为高风险投资，应受到严格监管以保护投资者。不过，欧盟认为应支持创新，因此并未禁止这种做法。^(²⁵⁹)
    未来将揭示监管如何随时间变化，以及 ICO 可能如何演变。

    '
- fmt: '# Fractional Reserve Banking and Bitcoin


    There have been some discussions on the concept of fractional reserve banking
    and the use of `Bitcoin` (or any other cryptocurrency for that matter). Basically,
    you have two major views looking at the concept: the Keynesian and the Austrian
    view.^([^(260)](#fn260)) From the first perspective, there is no real difference
    from any other currency. Banks can still present customers any token as “available
    for withdrawal,” while at the same time making them available for loans for different
    customers.


    Of course, the bank is responsible for keeping a sufficient supply in deposit
    to make sure it can handle the withdrawals and payments from the customers. These
    banks would need to rely on their own reserves, as a central bank would not be
    able to help them in case of a default. If we take `Bitcoin` as an example, we
    can understand that, even though there is a maximum supply of 21 million `Bitcoin`,
    with the use of fractional banking, the `Bitcoin` money supply can be multiplied
    by the money multiplier. Some supporters of the idea of fractional reserve banking
    with `Bitcoin` (or any cryptocurrency for that matter) state that this limited
    supply could make it better for fractional reserve banking than any other currency,
    as those are traditionally more likely to become inflationary, where a currency
    with a limited supply is more likely to be deflationary.


    The Austrian viewpoint takes a different approach. For fractional banking to have
    an effect on the money supply, the debt instruments used by the bank must be accepted
    if they were themselves proper money. In the past, there were some other forms
    of `Bitcoin`, such as `Casascius` physical `Bitcoin` (stopped in 2013) and `Bitbills`
    (stopped in 2012). In the past, there have been some other debt instrument issuances,
    but these often led to issues as they were restricted to a narrow field of uses.
    The transactions happening outside of the `Bitcoin` network are not compatible
    with it. In the past there have also been issues with eliminating the excess instruments
    (`Mt. Gox` hack in June 2011), bankruptcy (`mybitcoin`), or investor bailout.
    Based on the previous information, we have to consider over-issuance, the general
    acceptance of debt instruments, and the market price of the debt instruments at
    a different rate than the reserve ratio of the issuer.


    So, is it possible to create a fractional reserve banking system with a cryptocurrency?
    Several views have been issued in the past, stating that this can only be an illusion
    if you look at the background of cryptocurrencies, the regulatory issues, combined
    with issues related to scalability and transparency. Others do believe in the
    system, such as the reports that `MasterCard` has been trying to patent cryptocurrency
    fractional reserve banking.^([^(261)](#fn261)) One of the key ingredients for
    such a system to emerge and to become successful is that a cryptocurrency (or
    more than one) should emerge as a widely accepted means of payment. The same cryptocurrency
    would have to be used for high-value transactions between large institutions,
    which are two tough requirements for a cryptocurrency today.


    Other impacts of fractional reserve banking on cryptocurrencies is the influence
    on price. By using fractional reserve banking, you are likely to reduce the value
    of the cryptocurrency for investors that are holding on to a certain deposit.
    This means that it might be against their interests to support these practices.
    There are several ways to offset these developments. One is that the maximum amount
    of cryptocurrency deposits through fractional reserve banking must be a finite
    multiple of the amount of outstanding cryptocurrency. Another is that investors
    might decide to hold more of the fractional reserve banking cryptocurrency deposits
    than they would of the underlying cryptocurrency.


    As you can see, there are several ways to discuss the theoretical possibility
    of fractional reserve banking with a cryptocurrency, but these remain theoretical
    for the time being. The underlying factors that need to be fulfilled before one
    might even consider fractional reserve banking are quite onerous. Even as a best
    case, it would be risky. Combine this with regulatory issues, the problem of clear
    oversight by any type of government, and the absence of clear insurance for investors,
    and it becomes pretty clear that this doesn’t seem realistic in the near future.
    Central banks and governments are better suited to deal with the risks introduced
    by “classic” currencies and banks, while cryptocurrencies bring a whole set of
    risks of their own.'
