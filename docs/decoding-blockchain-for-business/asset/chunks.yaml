  trans: '

    ### 加密货币崩盘


    本节探讨加密货币崩盘（也称为比特币崩盘或大型加密货币崩盘）。2018 年 1 月发生了一场大规模抛售，导致比特币价值暴跌约 65%。许多其他加密货币崩盘得更为惨烈，有些甚至完全从市场上消失。当然，要出现崩盘，首先必须有一定程度的繁荣。在
    2017 年之前的几年里，比特币和其他加密货币的价值一直在稳步增长。2017 年，加密货币及其价值经历了前所未有的繁荣。所有主要机构和投资者似乎都参与了加密货币市场，结果便是比特币在
    2017 年价值增长了 2700%！


    这导致许多小额投资者对加密货币产生了兴趣，其中一些人希望进入加密货币市场并承担巨大风险。这吸引了许多诈骗者，他们想利用轻信的投资者或那些想快速致富的人，就像早期加密货币市场中其他人所做的那样。由于缺乏明确的法律框架，大量首次代币发行（ICOs）被启动，聚集了大大小小的投资者，最终导致了资金滥用和盗窃。


    对于那些不熟悉 ICO 术语的人来说，这是一种使用加密货币的融资方式。如果融资目标达成并且项目最终成功（这是一个很大的“如果”），这些加密货币可以成为功能性货币单位。举个例子，在
    2017 年和 2018 年，所有 ICO 中只有大约一半能够存活超过四个月，而仅在 2018 年上半年，通过 ICO 筹集的资金就超过了 70 亿美元！其他骗局涉及“拉高出货”
    scenario，即几个人相互之间进行交易，以制造市场兴趣和价值的假象。其他投资者也会投资这种山寨币，之后最初的参与者会开始抛售他们持有的资产，让投资者手中的币变得一文不值。


    最后一个需要考虑的重要方面是，大多数推出的山寨币都基于初创公司。众所周知，初创公司也往往会失败，它们推出的加密货币也随之消亡。所有这些都创造了一个极其动荡的市场，投资者认为自己比其他人更聪明，或者能再多坚持一会儿。尽管警告不断预测会出现重大泡沫，但这并没有阻止大多数投资者。


    为了让您了解时间线，2017 年 12 月 17 日，比特币价格达到了 19,783.06 美元。几天后的 12 月 22 日，价格跌破 11,000 美元，这只是众多跌至历史低点的加密货币之一。坏消息并未停止，关于韩国可能禁止加密货币交易的传言导致了更多抛售。2018
    年 1 月 28 日，当时日本最大的加密货币场外交易市场（OTC 市场，买卖双方直接互动）CoinCheck 遭受重大黑客攻击，导致价值 5.3 亿美元的
    NEM（一个基于 Java 的区块链开发平台）损失。其他加密货币交易所也遭受黑客攻击和出现异常交易，导致市场更加不信任，投资者寻求从高度动荡的加密货币市场中逃离。到
    2018 年 9 月，加密货币市场的市值已跌至其原始价值的不到 80%。这使得其正式比互联网泡沫破裂更严重，后者导致互联网相关公司的市值从 2000 年 3
    月的峰值下跌至 2002 年 10 月的低点，跌幅约为 78%。


    现在您知道了这个故事，或者至少是其中的一部分。像这样的故事有许多不同的视角需要考虑。我希望您记住的最重要的一点是，这些问题都与区块链技术本身无关。某些项目可能因为实施不当而与特定初创公司一起失败。与任何技术和应用程序一样，错误都可能发生。再次强调，这并不意味着底层技术存在问题。相反，这可能是由于人们不理解技术或不知道应该如何实施一个区块链项目。


    崩盘的原因在很大程度上是金融层面的，就像任何泡沫一样，但对区块链技术的审视却从未停止。这意味着人们对分布式账本变得非常怀疑，他们不去探究该技术的可能性，反而宣称自己已经失去了“信念”，并质疑为什么还应该“继续相信”。正如我所说，质疑是否应该实施区块链平台是有理由的，但质疑底层概念不应成为理由之一。


    ### 现在


    加密货币崩盘导致了极大的不信任。自那次重大崩盘以来，过去几年里又发生了其他崩盘。加密货币领域也出现了其他丑闻。（稳定币 Tether 就是一个典型例子。在四年多的时间里，一直存在关于其与美元平价的丑闻。审计问题、独立性问题、价格操纵指控等等层出不穷。我们将在最后一章更详细地讨论这个问题。）尽管如此，那些真正想用区块链做点什么的人并没有袖手旁观，他们已经在开发令人兴奋的新应用方面采取了措施。所有这些都催生了一个完整的行业，新的开发者和架构师在新的
    IT 格局中占据了更突出的位置。Facebook 正试图通过创建 Libra 来推出自己的代币，其他大型支付提供商也在试图进入这个市场。随着 Ripple
    等项目正在改变整个行业，无论好坏，区块链和加密货币都将长期存在。


    区块链世界已经变得比我们预测的都要大得多，并且在持续增长。有像比特币和以太坊这样的“经典”开源实现。目前也有像 Hyperledger Fabric 和 Hyperledger
    Sawtooth 这样的“封闭式”实现，它们允许您在选定的合作伙伴群体之间创建联盟。然而，如果您遇到 DAG（有向无环图）、MerkleDAG、BlockDAG
    等术语，请不要感到惊讶。这些都是实现去中心化网络的令人兴奋的新方法，它们都希望达到与区块链技术相同的最终目标。我们将在稍后提供高层次描述，让您了解这些方法的工作原理，以及您在哪个行业可能采用或实现某个特定平台。现在，我们专注于该技术的可能性。我们也会更深入地探讨一下加密货币市场，但这当然不是本书的目的。


    近期，我们面临一场全球危机，一场大流行病使许多国家陷入困境，迫使我们生活在隔离之中。与此同时，还伴随着世界历史上无与伦比的经济危机。许多项目被终止或至少被搁置，很多人甚至（暂时）失业。在这样的时期，人们被推向极限，不仅要保持安全，还要维持生活水平。也正是在这样的时期，人们变得最有创造力，有些人甚至敢于承担通常不会承担的风险。如果在未来几个月出现新的应用和初创公司（不仅在区块链技术领域），并且它们以对现有问题的新颖见解震惊世界，我一点也不会感到惊讶。

    '
- fmt: '# Blockchain Startups and the Future


    Before we go into more detail about how the blockchain technology works, let’s
    begin with a short introduction to blockchain startups and the use of the blockchain
    technology. This will also give you a good indication of how the market value
    has increased over time. This might give you an indication of the number of implementations
    that people are working on. One of the other things people just love to say is:
    “I have never seen a working use case of blockchain outside of cryptocurrencies.”
    Well, let’s prove them wrong. Even the most skeptical of people cannot remain
    blind to the rise in startups that use blockchain technology. While the early
    startups originated mainly in the financial sector, they have now spread out to
    cover every possible industry one could imagine. As estimated by the International
    Data Corporation, the blockchain market has reached a total value of 2.55 billion
    USD in 2019 and was forecast to reach 55.54 billion USD in 2025. The current economic
    crisis might have a strong impact on the growth in 2020 and perhaps even in the
    coming years, but it should still be clear to anyone looking at these numbers
    that we are dealing with an important growing market that shows promise for the
    future. Major companies have also implemented blockchain projects in the past,
    such as SAP, Coca Cola, Alibaba, and many others.


    Another important aspect that you need to take into account is the spread of startups
    and use of blockchain technology all over the world. It is clear that the leading
    innovations are coming from the U.S. and the East. This should come to no one
    as a surprise. The U.S. has always been a source of innovation and change, where
    people dare to take risks. Lots of new startups (also outside the world of blockchain)
    have seen the light of day in the U.S. and prospered. However, one shouldn’t underestimate
    the influence of China, Japan, South Korea, Singapore, Taiwan, and other countries
    where technological innovation and the IT sector as a whole has seen unprecedented
    growth. These countries have seen an increasing level of research, innovation,
    and risk-taking, which has led to fierce competition with other technology companies
    across the world.


    When we look at the number of startups across the world, we can look at data from
    Venture Sources-Dow Jones, to provide some information on key world players [A],
    EU member states [B], and the rest of the world [C] in Figure [1-1](#497553_1_En_1_Chapter.xhtml#Fig1).


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig1_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Blockchain startups across the world^([¹](#fn1))


    If we look at this data, the largest number of blockchain startups are in the
    U.S., followed by China. The EU only houses about 15% of the global startups.
    This will reduce even further if you see that about 50% of these startups can
    be found in the UK and Brexit is looming. The EU tries to stimulate further innovation
    and business creation. The reason for the low number is related to the legal uncertainty
    when it comes to blockchain technology, the scattered legal landscape, and the
    difficult decision making at a political level. On top of that, there is a harsher
    environment when it comes to business risk taking. A business failure in the U.S.
    is seen as a “good try” and the possible leap to the next, hopefully successful,
    try, while in many EU member states, business failure is just regarded as a failure.


    An important takeaway from the graphs in Figure [1-1](#497553_1_En_1_Chapter.xhtml#Fig1)
    is that most of these startups are flourishing in developed countries, while the
    possible advantages for developing countries in numerous fields cannot be underestimated.
    However, the impact of such companies can change dramatically over time, and developing
    countries could top the list in the near future. The number of new startups that
    enter the market declined strongly in 2018 (only China saw an increase). It remains
    to be seen if this signifies a real trend or only a temporary decline. See Figure
    [1-2](#497553_1_En_1_Chapter.xhtml#Fig2).


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig2_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Total number of startups. Source: Venture Sources - Dow Jones


    The way that most of these startups are funded is using capital funds and ICOs,
    which shouldn’t surprise anyone who knows the industry and the field. The difficulty
    often lies in making money and a profit after these initial fundraising activities.
    This has proven to be quite difficult for a lot of these initiatives. Several
    reasons can be thought of as why there has been limited profitability in pure
    blockchain markets. One is that it has been difficult for blockchain applications
    to become mainstream and attract a huge market. Most participants and users of
    decentralized applications are already familiar with the decentralized world.
    This is strange as a blockchain application isn’t immediately different from any
    other application from a user’s perspective. Market penetration can still happen
    for some of these, but to this day, this has been very limited.


    A second issue that has been plaguing blockchain projects from the very start
    is scalability. These projects work well to a certain level but, certainly with
    the more “classic” implementations, the second the number of users started to
    increase, there was a major increase in the transaction fees or the network started
    to become congested. Again, new implementations are able to (in part) address
    these issues and have become much more scalable. Still, these earlier concerns
    are still following blockchain startups to this day.


    A third concern that you should take into account is that projects, more often
    than not, remain in a kind of pilot phase. Even when these startups provide or
    create certain platforms and are able to pilot major customers, the customers
    often don’t take the next step. This is because they misunderstand the use of
    the platform, the way of working, or simply because the change isn’t an immediate
    priority. A major concern linked to this is that for such a project to succeed,
    you need several invested partners who are willing to make the change. A blockchain
    project will never succeed if you are the only one trying out the new way of working.
    So you are depending on multiple independent parties, which makes a successful
    implementation that much more difficult.


    We need to separate this from the implementations of blockchain projects in major
    companies, where we have already seen that these can lead to significant cost
    reduction because of the way such platforms are implemented. There can also be
    an increase in trust between the partners working together across the network,
    promoted by the transparency and lacking the third party that might become corrupt
    over time or have a certain cost to maintain.'
