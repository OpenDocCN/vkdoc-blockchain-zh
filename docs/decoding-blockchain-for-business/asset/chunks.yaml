    2013 年，才有一个政府采取行动。美国当局冻结了与加密货币交易所`Mt. Gox`相关的所有账户，因为它未注册为资金传输机构。这开启了许多关于区块链技术和加密货币法律语境误解的开端。相关研究随之展开，但要真正提供一个法律框架仍需数年时间。时至今日，许多政府仍在努力创建一个可供个人和企业使用的实际框架。


    比特币和其他山寨币开始面临的问题之一是与毒品贩运和恐怖主义的关联。早在 2013 年，比特币就在一次毒品调查中被查获，并且直到今天，仍有怀疑认为某些山寨币（尤其是那些注重隐私的）被用于资助犯罪活动。如今，加密货币交易所需要遵守与任何其他金融机构相同的法律，包括`KYC`（了解你的客户）法规和`AML`（反洗钱）法规。


    除了与犯罪活动的关联外，比特币及类似网络还存在另一个主要问题。它们通过网络间的交互消耗了大量的计算能力。然而，事实证明，在比特币网络上开发应用程序（极其）困难。时至今日，开发人员仍在努力寻找利用计算能力构建强大且可信的去中心化应用程序的新方法。其中一位正在开发比特币应用程序的开发人员是一位名叫维塔利克·布特林的
    19 岁程序员，他即将改变世界。他看到了区块链技术的潜力，并意识到其潜力可能远超加密货币和金融服务本身。


    2013 年底，维塔利克·布特林发表了他的白皮书（《下一代智能合约与去中心化应用平台》），描述了一种新的工作方式和一种新的开源协议。他想要解决的主要问题是比特币没有用于帮助创建去中心化应用的脚本语言。由于在比特币社区内难以达成普遍共识，他提出了一个全新的平台：**以太坊**。该平台于
    2014 年 1 月在迈阿密举行的北美比特币大会上正式宣布。很快，创始人决定将该平台及其开发置于一个非营利组织（以太坊基金会）之下。开发工作将通过一种名为**以太币**的新加密货币的众售来资助。在以太坊黄皮书中，加文·伍德详细阐述了将智能合约放入区块链的理念，该黄皮书描述了以太坊虚拟机。


    2014 年 7 月，以太坊基金会举行了一次以太币众售，售出了超过 6000 万个代币。基金会还创建了约 1200 万个代币用于资助未来的开发和营销工作。该网络的第一个版本在一年后发布，名为**前沿**。后续的每一次开发都伴随着新的名称和版本，这证明了网络不断演进的历程。


    随着时间的推移，越来越多的参与者带着各自对区块链技术或分布式账本平台的实现进入了这个领域，这些实现专注于特定的目标群体（例如，开发者甚至商业专业人士）或行业（例如，金融服务等）。其热度在随后的几年里不断攀升，并在
    2018 年左右达到顶峰，此后则经历了一次大幅崩盘。与此同时，大约在 2015 年，`Hyperledger`项目诞生，可以说，它整合了当今企业区块链领域一些最著名的开发框架。目前已有超过
    6000 种山寨币被创造出来，它们（大致）仍在运行。

