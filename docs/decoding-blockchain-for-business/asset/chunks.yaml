- fmt: '# Blockchain and Smart Cities


    The idea of the smart city isn’t a new one. For those of you who aren’t familiar
    with the concept, *smart cities* use modern and smart technology to deal with
    many issues related to the smooth functioning of a city. As people are moving
    more to cities, we are faced with increasing traffic, health issues, climate change,
    scarcity of commodities, population growth, the rising number of elderly, access
    to education, rising poverty, and so on. The key to this story is the use of the
    Internet of Things, as these can help us deal with these issues in a modern way.


    A perfect example is Barcelona, which saved up to 75 million Euro of city funds
    and created over 47,000 jobs in smart technology by running fiber optics throughout
    the city. Street lights use LEDs, which are not only energy efficient but also
    reduce produced heat. At the same time, they have been fit with sensors to gather
    information about pollution, noise, humidity, temperature, and the presence of
    people. A second example in Barcelona is the use of smart bins, which use a vacuum
    and store the waste underground to reduce the smell of trash. There have also
    been sensor implementations all over the city so that noise can be managed better
    in areas with lots of tourists and the city gardens receive just enough water.
    Finally, the city has several “labs” where its citizens can help develop new digital
    innovations to make the city even smarter! Other cities all over the world are
    quickly following. We cannot underestimate the issues we are currently facing
    and have to deal with them as soon and efficiently as possible.^([^(42)](#fn42))


    `Blockchain` and cryptocurrencies can also play an important role here. All over
    the world there are POCs taking place, some more successful than others. If we
    look at some of the major implementations, we have seen that India has several
    implementations for its major cities to help with transaction management, Dubai
    is planning to be the first blockchain-powered smart city by 2021, and Estonia
    has been tracking its citizens with the technology since 2012. (Before you start
    feeling alarmed, Estonia tracks the data of its citizens to protect them. Examples
    are preventing the possible abuse of personal and health data or preventing the
    manipulation of defense data in times of war.) In the Chinese city of Yinchuan,
    inhabitants can pay for their purchases by using facial recognition and the blockchain
    technology, taking away the need to pay with physical money. If we look at the
    U.S., we have places like New York and Virginia that have set up environments
    to trade electricity and vote via mobile phone.


    It can help with decentralizing city management over all concerned partners, linking
    all of the concerned stakeholders together and pooling their resources.^([^(43)](#fn43))
    Another major advantage is the introduction of broader participation, which in
    itself increases democracy when it comes to city management? It can help link
    the citizens to their cities and gain trust once again in political and administrative
    institutions (where this is currently dwindling in many places). It also increases
    the transparency of the decisions and shows how these decisions are handled. Other
    advantages of the technology are once again the secure management of IoT devices
    and the control that citizens can have over their own personal data and identities.
    In line with this, the blockchain technology can help manage privacy in an efficient
    manner.^([^(44)](#fn44))


    Of course, such technologies could also be used for nefarious purposes too. They
    help control major urbanized areas, and therefore they could introduce the “big
    brother” idea that we all fear. In the wrong hands, any technology can be misused,
    but imagine a blockchain-powered smart city where the government controls your
    identity, movements, and data. It would effectively become a prison for anyone
    living within its bounds.


    Several platforms specifically focus on the development of smart cities. There
    is the United for Smart Sustainable Cities (U4SSC) from the UN, which wants to
    drive information and communication technologies for smart and sustainable cities.
    FIWARE is an EU project that offers a free software platform, and it does not
    solely focus on smart cities but certainly can offer services that might ease
    the development of smart cities. DownTown is a third example and it already has
    13,000 to 20,000 domains in smart cities around the world.


    ## Blockchain and the Environment


    Anyone following the news cannot deny that climate change is a hot topic right
    now. Not moving into the discussion of climate change itself, the blockchain technology
    can help protect the environment in several ways.^([^(45)](#fn45))


    The blockchain technology could facilitate carbon emission trading, not only allowing
    for smooth transactions but also providing transparency and security to all participants.
    This could open up the market even further and give insight into the processes
    taking place in such markets. There have also been proof-of-concepts in clean
    energy trading. On such platforms, consumers could buy and sell renewable energy.
    As blockchain has a clear background in finance applications, this could also
    facilitate transparent and traceable financing for climate change organizations
    and initiatives. Risky investments can be optimized with the use of smart contracts
    and automatic handling of money, taking out the human factor.^([^(46)](#fn46))


    Similarly, the use of blockchain allows for the tracking of supplies. This can
    help further the protection of the environment. Blood diamonds can be stopped
    and the supply of animals and meat can be thoroughly checked via smart contracts
    and IDs. This could help promote an ethical and ecological supply chain, whereby
    businesses using a different route could be held accountable for their actions.


    A third example is the protection of endangered species by using tags and tracking
    data, so that the data security can be ensured by only allowing specific people
    access. This data can also be used for biological studies. Another way of looking
    at it is to share data about animal trafficking all over the world so that a clear
    view can be created about the illegal supply chain. This means the big players
    can be identified and consequently stopped.


    Once again, we shouldn’t be blind to the disadvantages that the blockchain technology
    has brought in terms of the environment. Several reports have warned that the
    energy consumed by the Bitcoin network alone could power a small country.^([^(47)](#fn47))
    It is not difficult to see (even when there are certain people claiming that most
    of the network is running on renewable energy)^([^(48)](#fn48)) that this is devastating
    in terms of climate change. One way of dealing with this massive computer power
    and energy consumption is by moving to different ways of mining. This has already
    been done (or is on its way) on several other networks, reducing the computing
    power needed and hence reducing the energy consumption by these networks.'
  raw: '## Blockchain and Smart Cities


    The idea of the smart city isn’t a new one. For those of you who aren’t familiar
    with the concept, *smart cities* use modern and smart technology to deal with
    many issues related to the smooth functioning of a city. As people are moving
    more to cities, we are faced with increasing traffic, health issues, climate change,
    scarcity of commodities, population growth, the rising number of elderly, access
    to education, rising poverty, and so on. The key to this story is the use of the
    Internet of Things, as these can help us deal with these issues in a modern way.


    A perfect example is Barcelona, which saved up to 75 million Euro of city funds
    and created over 47,000 jobs in smart technology by running fiber optics throughout
    the city. Street lights use LEDs, which are not only energy efficient but also
    reduce produced heat. At the same time, they have been fit with sensors to gather
    information about pollution, noise, humidity, temperature, and the presence of
    people. A second example in Barcelona is the use of smart bins, which use a vacuum
    and store the waste underground to reduce the smell of trash. There have also
    been sensor implementations all over the city so that noise can be managed better
    in areas with lots of tourists and the city gardens receive just enough water.
    Finally, the city has several “labs” where its citizens can help develop new digital
    innovations to make the city even smarter! Other cities all over the world are
    quickly following. We cannot underestimate the issues we are currently facing
    and have to deal with them as soon and efficiently as possible.^([^(42)](#fn42))


    Blockchain and cryptocurrencies can also play an important role here. All over
    the world there are POCs taking place, some more successful than others. If we
    look at some of the major implementations, we have seen that India has several
    implementations for its major cities to help with transaction management, Dubai
    is planning to be the first blockchain-powered smart city by 2021, and Estonia
    has been tracking its citizens with the technology since 2012\. (Before you start
    feeling alarmed, Estonia tracks the data of its citizens to protect them. Examples
    are preventing the possible abuse of personal and health data or preventing the
    manipulation of defense data in times of war.) In the Chinese city of Yinchuan,
    inhabitants can pay for their purchases by using facial recognition and the blockchain
    technology, taking away the need to pay with physical money. If we look at the
    U.S., we have places like New York and Virginia that have set up environments
    to trade electricity and vote via mobile phone.


    It can help with decentralizing city management over all concerned partners, linking
    all of the concerned stakeholders together and pooling their resources.^([^(43)](#fn43))
    Another major advantage is the introduction of broader participation, which in
    itself increases democracy when it comes to city management? It can help link
    the citizens to their cities and gain trust once again in political and administrative
    institutions (where this is currently dwindling in many places). It also increases
    the transparency of the decisions and shows how these decisions are handled. Other
    advantages of the technology are once again the secure management of IoT devices
    and the control that citizens can have over their own personal data and identities.
    In line with this, the blockchain technology can help manage privacy in an efficient
    manner.^([^(44)](#fn44))


    Of course, such technologies could also be used for nefarious purposes too. They
    help control major urbanized areas, and therefore they could introduce the “big
    brother” idea that we all fear. In the wrong hands, any technology can be misused,
    but imagine a blockchain-powered smart city where the government controls your
    identity, movements, and data. It would effectively become a prison for anyone
    living within its bounds.


    Several platforms specifically focus on the development of smart cities. There
    is the United for Smart Sustainable Cities (U4SSC) from the UN, which wants to
    drive information and communication technologies for smart and sustainable cities.
    FIWARE is an EU project that offers a free software platform, and it does not
    solely focus on smart cities but certainly can offer services that might ease
    the development of smart cities. DownTown is a third example and it already has
    13,000 to 20,000 domains in smart cities around the world.


    ## Blockchain and the Environment


    Anyone following the news cannot deny that climate change is a hot topic right
    now. Not moving into the discussion of climate change itself, the blockchain technology
    can help protect the environment in several ways.^([^(45)](#fn45))


    The blockchain technology could facilitate carbon emission trading, not only allowing
    for smooth transactions but also providing transparency and security to all participants.
    This could open up the market even further and give insight into the processes
    taking place in such markets. There have also been proof-of-concepts in clean
    energy trading. On such platforms, consumers could buy and sell renewable energy.
    As blockchain has a clear background in finance applications, this could also
    facilitate transparent and traceable financing for climate change organizations
    and initiatives. Risky investments can be optimized with the use of smart contracts
    and automatic handling of money, taking out the human factor.^([^(46)](#fn46))


    Similarly, the use of blockchain allows for the tracking of supplies. This can
    help further the protection of the environment. Blood diamonds can be stopped
    and the supply of animals and meat can be thoroughly checked via smart contracts
    and IDs. This could help promote an ethical and ecological supply chain, whereby
    businesses using a different route could be held accountable for their actions.


    A third example is the protection of endangered species by using tags and tracking
    data, so that the data security can be ensured by only allowing specific people
    access. This data can also be used for biological studies. Another way of looking
    at it is to share data about animal trafficking all over the world so that a clear
    view can be created about the illegal supply chain. This means the big players
    can be identified and consequently stopped.


    Once again, we shouldn’t be blind to the disadvantages that the blockchain technology
    has brought in terms of the environment. Several reports have warned that the
    energy consumed by the Bitcoin network alone could power a small country.^([^(47)](#fn47))
    It is not difficult to see (even when there are certain people claiming that most
    of the network is running on renewable energy)^([^(48)](#fn48)) that this is devastating
    in terms of climate change. One way of dealing with this massive computer power
    and energy consumption is by moving to different ways of mining. This has already
    been done (or is on its way) on several other networks, reducing the computing
    power needed and hence reducing the energy consumption by these networks.'
  trans: '

    # 区块链与智慧城市


    智慧城市的概念并不新鲜。对于不熟悉这一概念的人来说，*智慧城市*利用现代智能技术来处理与城市平稳运行相关的诸多问题。随着人们不断向城市迁移，我们面临着日益严重的交通拥堵、健康问题、气候变化、商品短缺、人口增长、老龄化加剧、教育机会不均以及贫困加剧等挑战。解决这些问题的关键在于运用物联网，因为它能帮助我们以现代方式应对这些挑战。


    一个完美的例子是巴塞罗那。该市通过铺设全市光纤网络，节省了高达 7500 万欧元的城市资金，并在智能技术领域创造了超过 4.7 万个就业岗位。路灯采用 LED
    灯，不仅节能高效，还能减少热量产生。同时，这些路灯还配备了传感器，用于收集关于污染、噪音、湿度、温度以及人流量的信息。巴塞罗那的第二个例子是使用智能垃圾桶，这类垃圾桶利用真空系统将垃圾储存于地下，以减少垃圾异味。此外，全市范围内还安装了传感器，以便在高旅游区更好地管理噪音，并确保城市花园获得适量的灌溉用水。最后，该市还设立了多个“实验室”，让市民能够参与开发新的数字创新，使城市变得更加智能！世界其他城市也纷纷效仿。我们绝不能低估当前面临的挑战，必须尽快且高效地应对这些挑战。^(⁴²)


    `区块链`和加密货币在此也能发挥重要作用。世界各地都在进行概念验证，有些较为成功，有些则不尽如人意。纵观一些主要的落地案例，我们看到印度已在多个主要城市实施区块链技术以协助交易管理；迪拜计划到
    2021 年成为首个由区块链驱动的智慧城市；而爱沙尼亚自 2012 年起便利用该技术追踪其公民信息。（在您感到警觉之前，需说明爱沙尼亚追踪公民数据是为了保护他们。例如，防止个人和健康数据被滥用，或在战争时期防止国防数据被篡改。）在中国银川市，居民可以通过面部识别和区块链技术支付购物款项，从而无需使用实体货币。放眼美国，纽约和弗吉尼亚等地已建立相关环境，用于电力交易和通过手机进行投票。


    区块链有助于将城市管理去中心化到所有相关合作伙伴手中，将所有利益相关方连接起来，并整合他们的资源。^(⁴³) 另一个主要优势是引入了更广泛的参与，这本身就在城市管理方面提升了民主程度？它有助于将市民与城市紧密联系起来，并重新赢得对政治和行政机构的信任（这在许多地方正逐渐减少）。同时，它还提高了决策的透明度，并展示了这些决策是如何被处理的。该技术的其他优势再次体现在对物联网设备的安全管理，以及市民对自己个人数据和身份的控制权上。与此相一致，区块链技术还能有效地管理隐私。^(⁴⁴)


    当然，这类技术也可能被用于邪恶目的。它们有助于控制主要城市化区域，因此可能引入我们都惧怕的“老大哥”监控模式。落入坏人之手，任何技术都可能被滥用。但想象一下，一个由区块链驱动的智慧城市，政府控制着你的身份、行踪和数据，这实际上会变成生活在其中任何人的监狱。


    有几个平台专门致力于智慧城市的发展。联合国推动的“携手共建可持续智慧城市”（U4SSC）项目，旨在推动信息和通信技术用于建设智慧且可持续的城市。FIWARE
    是一个欧盟项目，提供了一个免费软件平台，它虽不完全专注于智慧城市，但肯定能提供可能简化智慧城市开发的服务。第三个例子是 DownTown，它在全球智慧城市中已拥有
    13,000 到 20,000 个域名。


    ## 区块链与环境


    任何关注新闻的人都不能否认，气候变化是当下一个热门话题。暂不深入讨论气候变化本身，区块链技术可以通过多种方式帮助保护环境。^(⁴⁵)


    区块链技术可以促进碳排放交易，不仅实现交易顺畅，还能为所有参与者提供透明度和安全性。这可以进一步开放市场，并使人们深入了解此类市场的运作过程。在清洁能源交易方面也已经有了概念验证项目。在这样的平台上，消费者可以买卖可再生能源。由于区块链在金融应用领域有着清晰的背景，这也可以为气候变化组织和倡议提供透明且可追溯的融资。通过使用智能合约和自动化的资金处理，可以优化高风险投资，排除人为因素。^(⁴⁶)


    同样，使用区块链可以追踪供应链。这有助于进一步保护环境。可以阻止血钻的流通，并通过智能合约和 ID 对动物及肉类供应进行彻底检查。这有助于促进符合道德和生态规范的供应链，从而使采用不同路径的企业能够为其行为负责。


    第三个例子是通过使用标签和追踪数据来保护濒危物种，通过仅允许特定人员访问来确保数据安全。这些数据也可用于生物学研究。另一种方式是共享全球范围内的动物贩运数据，以便清晰地了解非法供应链。这意味着可以识别出主要参与者并加以制止。


    再次强调，我们不应忽视区块链技术给环境带来的弊端。多份报告警告称，仅比特币网络消耗的能源就足以为一个小国供电。^(⁴⁷) 不难看出（即使某些人声称大部分网络使用的是可再生能源）^(⁴⁸)，这在气候变化方面是毁灭性的。应对这种巨大的算力和能源消耗的一种方法是转向不同的挖矿方式。这在其他几个网络上已经实现（或正在进行中），从而降低了所需的算力，进而减少了这些网络的能源消耗。

