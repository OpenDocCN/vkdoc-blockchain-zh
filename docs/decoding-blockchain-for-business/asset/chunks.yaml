- fmt: '### Insurance


    An industry that isn’t famous for fast innovation in its way of working is the
    insurance industry.^([^(64)](#fn64)) However, the initial interest in blockchain
    technology came from the financial sector, so the insurers were naturally pushed
    to look into the technology and possible innovation opportunities as well. This
    industry has to deal with many challenges, such as the stringent and often complex
    compliance and legal frameworks in which they operate. There is the limited growth
    that is achievable in the mature markets, the interest rates as they are in many
    countries, fraudulent claims that need to be processed and investigated, third-party
    payment transactions that must be verified, data that needs to be processed, and
    the administrative burden resting on many of these companies. We can also add
    the pressure to come up with new products to deal with the challenges of the modern
    world, new compensation modes depending on the scheme that is being put in place,
    and so on. Finally, we also have to look into the security of the data being processed,
    as this is a concern for any major industry dealing with personal data. In a broader
    aspect, data is also necessary for the reserve calculations based on their current
    contracts. This is of key importance in the insurance space, when exposures must
    be rebalanced considering certain risks in their portfolios. When you look at
    all these points, you can see why the industry is facing many challenges.


    Blockchain might not be a magical answer, but it could be one of the tools that
    brings insurance companies into the modern age. A first obvious case is that of
    fraud prevention.^([^(65)](#fn65)) This affects the business and the final consumer,
    simply because insurance companies need to deal with fraud and that affects the
    bottom line. With blockchain platforms, there could be more coordination between
    the insurers on the market. At this time, each insurer is performing analysis
    on the data they have, so they might filter out suspicious claims or activity.
    If insurers could work together and share data that is essential to filter out
    fraud cases (as insurance fraud can often be turned from company to company),
    the cost might be shared between all the participants while the success rate increases.


    This is, of course, strongly linked to data and this is the second place where
    it might really help the insurance industry. It could help both with the quality
    of the data as with data management. Currently, a lot of insurers are struggling
    to deal with the vast amounts of data they have to process while they want to
    provide better services to their clients. Blockchain technology might also help
    to improve the current data management systems for the better.


    Other opportunities can be found in the underlying payment systems and claims
    processing, as a lot can be done via automated smart contracts. This, in combination
    with machine learning models, could help filter out the suspicious cases, while
    those that are considered “normal” could be processed smoothly without any extra
    cost for the insurance company itself. This would lead to a better customer experience
    as they can immediately validate their claims. At the same it could reduce the
    overhead and administrative costs that insurers deal with.


    In the same vein, there is a final important possibility, which focuses on product
    development and offerings to prospective clients.^([^(66)](#fn66)) Effective data
    management of a blockchain platform could enhance actuarial models as they are
    in use today, which in turn can help develop new contract terms, better suited
    for the client.


    As you might imagine, a lot of startups have jumped at the opportunity to fill
    the gap when it comes to the insurance industry and blockchain technology. An
    interesting example is `Estua-re`, which is a platform launched by Legal and General
    Reinsurance Plc.^([^(67)](#fn67)) The reinsurance platform is used for pension
    risk transfer execution and can handle pricing, claims, financial reporting, and
    collateral.^([^(68)](#fn68))


    A second example is `Everledger`. `Everledger` offers several solutions, but one
    of them is focused on the insurance industry. They want to increase transparency
    and allow for automation, trust, and increased accuracy. The solution also helps
    with fraud identification.


    Other startups in the insurance space include `Etherisc`^([^(69)](#fn69)), which
    focuses on process improvement solutions and cuts down on processing fees and
    claim-processing times. `Guardtime`^([^(70)](#fn70)) is a developer that goes
    much broader than insurance alone, but has developed a maritime insurance platform
    with Maersk. `FidentiaX`^([^(71)](#fn71)) a marketplace for tradable insurance
    policies. Of course, there are many more out there and others in development,
    but this gives you a good idea of how development is going and where we might
    see new solutions in the future. No industry remains untouched and we will see
    major changes in the years to come when we look at the insurance industry.'
