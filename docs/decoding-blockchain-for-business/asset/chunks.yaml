    RPA (Robotic Process Automation) is a popular technology in current enterprises.
    It allows for the automation of standardized tasks and has been marked as one
    of the disruptive technologies next to blockchain, AI, and IoT.^([^(34)](#fn34))
    As you have seen in the other examples, there are several ways to integrate these
    technologies, to come to even greater innovation. One of the similarities between
    RPA and blockchain is that they both found their first purpose within the financial
    industry. RPA is seen as a technology that is still in a high growth stage.^([^(35)](#fn35))
    In the early days, it only focused on simple tasks, but now that more AI and machine
    algorithms have been added, a smarter way of automation can be provided to many
    industries.


    Blockchain can work as an integrator for an RPA technology, as it can facilitate
    the processes underlying RPA. This could be done by helping with data exchanges
    and with deploying agents in a decentralized manner. It could help monitor bots
    and provide a layer of trust and transaction logs so that you can always verify
    what the bots have been doing in a secured and reliable manner. If we go one level
    up, you could also allow network participants to approve the transactions being
    submitted by the bots. Everything depends on the use case and how you wish to
    handle and automate certain processes. Blockchain could further automate the automation
    frameworks by providing a decentralized way of deploying bots. Smart contracts
    can start running when the conditions are met and set off the bots to perform
    certain tasks. We have timestamped logs, which can provide us all the information
    we need in case of an audit.


    The possible pitfalls include scalability, which really depends on your use case
    and the platform you are choosing, interoperability with the existing (legacy)
    systems of an enterprise, and the standardization of the processes you want to
    implement. Does this mean it is impossible or not advantageous to use blockchain
    and RPA? Of course not, it merely means that one has to consider each case and
    map out the implementation in clear steps before doing so, or you’ll risk ending
    up in an endless and expensive project that will not deliver the value it is promising.
    Other possible constraints are regulatory uncertainty (certainly when we are thinking
    about personal or sensitive data) and governance restrictions, as companies aren’t
    used to working with decentralized applications.


    If everything is properly evaluated, and the project and overall strategy are
    well thought through, this could help companies expand their efforts and increase
    the value they are gaining from RPA projects. They can allow bots to span multiple
    departments and interact with many different users while still maintaining control.


    An interesting use case for the combination of RPA and the blockchain technology
    is that of hospitality programs.^([^(36)](#fn36)) By handling user requests, sales,
    and actions in an automated way, the underlying ledger could be used to log and
    reward loyalty points and transactions. It could also be used in compliance management,
    resource management, and supply chain solutions that incorporate RPA bots.


    ## Blockchain and Quantum Computing


    When developers talk about the blockchain technology, discussions on the possible
    impact of quantum computing in the near future will quickly arise. If this is
    the first time you’ve hear about this, welcome to the party! Why are there discussions
    when we think about blockchain and quantum computing? Well, in short, quantum
    computing might be able to break the encryption algorithms that are currently
    used in most blockchain implementations, therefore effectively breaking the security
    they are supposed to bring. Most of the computational algorithms and data structures
    that are in use today are meant only for classical computers and don’t take the
    advent of quantum computing into consideration.^([^(37)](#fn37)) Most of these
    algorithms have equivalents in the quantum computing world, but could have much
    greater processing powers than is currently the case.


    Where classic computers use ones and zeros, quantum computers introduce a third
    state, called the *superposition* *,* where a one and a zero can be represented
    at the same time. So where you would normally choose either a one or a zero and
    analyze the case sequentially, with superposition you can represent several cases
    at the same time and speed up the analysis. Because of this, quantum computers
    will be able to solve problems and break algorithms which don’t seem possible.
    Some of these algorithms would require billions of years to solve classically,
    while quantum computers could significantly reduce the time needed to do so. While
    the inside of a quantum computer needs to remain sufficiently cool, the electricity
    use would also be reduced significantly when compared to classic computers.


    While research on quantum computers spans already a couple of decades, some of
    the first real implementations have started to become a reality over the last
    couple of years. This is why it certainly deserves attention today, so that we
    might prepare ourselves for the near future. By speeding up this otherwise “slow”
    algorithms, quantum computing can cause the destruction or break down of specific
    information systems. In the case of the blockchain technology, there are two specific
    threats to the current platforms.'
