  trans: '

    ### 加密货币期货交易


    感兴趣的各位请注意：期货交易也已进入加密货币世界。2017 年 12 月，芝加哥商品交易所推出了首个比特币期货合约。^(²⁹¹) 这些期货以现金结算，这意味着在合约结束时，需将当前市场价值与约定价格进行比较，随后进行价值转移。这类合约常用于平滑投资者（或矿工）因持有一定数量代币（此处指比特币）而面临的风险。然而，投机者也可利用它们来押注加密货币的价格波动。


    在一个已有市场操纵指控的市场中，持有此类合约时，您应考虑到所面临的额外风险。其他批评也指出，现金交割期货并未强制投资者实际持有山寨币，这引发了可能导致市场供应稀释的担忧。此外还存在实物交割期货，例如
    Bakkt 提供的产品。^(²⁹²) 结算时，参与者之间会进行比特币的“实物”交换。Kraken 提供以太坊、莱特币、比特币现金、瑞波币和比特币的期货。^(²⁹³)


    由于本书不专注于期权交易，我不会深入探讨做空、做多和追加保证金的具体细节。我所能做的，只是向想要进入这类市场的人发出警告。这是一个能够提供流动性并为现有头寸提供对冲工具的市场，但如果你对未来价格进行投机，它也可能引入巨大风险。^(²⁹⁴)
    与任何市场一样，规则始终相同：了解你进入的市场，并理解你正在买卖的工具的风险。即便如此，也请务必做好尽职调查。


    ### 加密货币股息


    在本书中，我已经展示了加密货币过去和现在如何以类似于“经典”投资工具的方式被使用。它们被用于首次代币发行（ICO）为初创企业筹集资金，创建数字孪生体和加密资产，人们还通过挖矿和交易山寨币赚了钱。^(²⁹⁵)
    然而，部分山寨币为投资者实施了一种新的盈利策略：股息。有两种方式可以通过加密货币开始赚取股息：


    *   质押：在特殊钱包中持有权益证明币

    *   持有：在钱包中购买并持有山寨币


    一个支付股息的山寨币的实例是 Komodo（`KMD`），你可以在购买后将其存入质押钱包进行质押。它承诺年化收益率为 5%。`NEO`是一种类似于以太坊的智能合约代币，你可以质押你的`NEO`来获得以`GAS`形式支付的收益。^(²⁹⁶)
    VeChain 使用与 `NEO` 相同的机制，但支付的是 `VTHOR` 而非 `GAS`。


    另一个例子是 `BTMX`，它是 BitMax 交易所的代币。你可以锁定该币以赚取 `USDT`（奖励每日计算并分发）。Kucoin（`KCS`）是与 KuCoin
    交易所关联的山寨币，它将交易费的 50%分配给代币持有者。Coss 交易所的 Coss 代币也有类似的机制。


    其他有趣的代币包括 Pundi X、`PIVX` 和 BiBox。未来肯定会出现更多具有不同支付方式的山寨币。如果你对这种投资感兴趣，务必确保进行尽职调查，以便了解分红机制和所涉及的风险。


    ### 关联托管合约


    关联托管合约是区块链智能合约能够有效帮助优化现有公司和法规的领域。^(²⁹⁷) 这些智能合约可以帮助消除许多现有服务中的中间商，有效地使这些流程对消费者更友好、更便宜，并且在某些情况下更安全。当我们谈论托管服务时，智能合约可以引入“安全远程购买”。^(²⁹⁸)
    对于那些不知道托管服务是什么的人，简单来说，就是当你处理买卖双方之间不信任的关系时，它涉及一个可信的第三方。一个例子是众多处理二手商品的在线平台之一。如果你在这样的平台上出售产品，你通常不认识买家，那么当你发货时，如何确保能收到钱？反之亦然，当买家付款给卖家时，又如何知道能收到产品？托管服务会锁定买家的付款，只有在买家确认收到产品后，才会向卖家释放付款。当然，这需要收取费用。


    考虑用智能合约替代托管服务。代码可能因用例而异，但它通常会强制卖方和买方都存入一笔保证金，这样双方都有动机遵守协议条款。当其中一方不遵守协议规则时，智能合约的代码将惩罚该参与者，他们将失去其保证金。这不仅降低了参与者的成本（因为你通常不需要为智能合约付费，即使需要，费用也远低于你目前为托管服务支付的费用），而且还确保了参与者遵守规则。


    ### 双重投注策略


    双重投注策略是一种已在比特币参考矿工中预先编程的挖矿策略。^(²⁹⁹) 这意味着，如果一个矿工发现了一个区块，同时另一个矿工发现了一个竞争区块，该矿工不会简单地切换到另一个区块。相反，他们会继续在自己的链上进行挖矿。这是因为两个矿工都不知道这两个区块中哪一个会成为大多数矿工继续挖矿的区块。


    你可以理解这不是最优的工作方式，因为当同时开采多个区块且其他矿工在冲突链上构建时，算力和能源会被浪费。为了解决这个问题，已经提出了几种算法，例如 `DECOR`
    和 `GHOST+DECOR`。

    '
- fmt: '### Token Curated Registry


    Token Curated Registries are a building block of decentralized applications based
    on fungible tokens and digital scarcity.^([^(300)](#fn300)) Two examples of such
    registries are the `adChain` registry, which keeps a cryptographically secure
    record of publisher domain names, and `Messari`.^([^(301)](#fn301),[^(302)](#fn302))


    `adChain` and other registries are listings generated by token holders and these
    can be anything from hash records to actual detailed records stored in `IPFS`.
    The TCR is used to serve as an identity mechanism, which allows advertisers to
    know something about listed participants without having previous relations with
    them and exclude fraudulent participants that would like to take advantage.^([^(303)](#fn303))
    How do participants become part of the whitelist? They can submit a deposit to
    become part of the whitelist, after which a challenge period starts. During this
    challenge period, existing participants can challenge the newcomer and post an
    equivalent amount against the deposit of the newcomer. In this case, a voting
    period starts where all the other members of the whitelist can vote on the issue.
    If the challenger succeeds, they receive special dispensations on top of their
    own deposit and all the other voters that voted in their favor receive a piece
    of the newcomers deposit as well (who will not become a member in this case).
    If the newcomer wins, they receive their deposit back and can eventually become
    a member. Of course, members can be challenged any point in time if evidence of
    fraudulent behavior arises. Changes in the deposit requirements of a TCR can lead
    to the removal of participants if they don’t comply.


    You can see that this system helps create some kind of quality label in a decentralized
    world. Does this mean that TCRs are a flawless system? Of course not, as these
    implementations have run into some criticism as well.^([^(304)](#fn304)) Aleksandr
    Bulkin cites the example of blockchain oracles, which do work in his opinion opposite
    to TCRs. The reason is that oracles require people to bet on (easily) publicly
    observable information in which honest players are rewarded and dishonest players
    lose their stakes. Getting the majority of the participants to vote for the wrong
    answer is incredibly hard, nearly impossible. The key components of the oracle
    is that there is objective information that can publicly be observed at a low
    cost. From the moment that this information is no longer publicly available or
    that there is a considerable cost to verify this information, the participants
    can be manipulated to no longer support the correct answers. When we extrapolate
    this logic to TCRs, which are in place to collect and verify information that
    is difficult to ascertain, we know that there are possible issues with the economic
    incentives. So, depending on the environment the TCR operates in, it will either
    be very successful or will fail to bring the certainty that participants in the
    decentralized network are looking for.


    ### Some Final Remarks


    I hope you found this book to be an interesting resource in the world of blockchain
    technology and development. I tried to provide a first guide, which means that
    I wasn’t able to explain all concepts, frameworks, and networks in detail. Each
    of these topics deserves (and often has) complete books of its own. My goal was
    to introduce these concepts so that, based on your interest, you can explore them
    further. The Internet is filled with free resources that allow you to learn more,
    but there are also numerous courses and books that give you more insight into
    these topics. Websites such as `Hackernoon.com`, `medium.com`, and `blockgeeks.com`
    offer tons of information that can help you even better understand the world of
    blockchain and cryptocurrencies.


    A second remark that I want to make concerns the fact that this is almost a “historic”
    artifact. This means that the second I finished this book, there were already
    certain points that were outdated. An example is the Ethereum network future development
    plan that is open to change and has already changed. This means that historic
    information is exactly that. In the same vein, I apologize for the errata in this
    book. I wrote this with a lot of enthusiasm, but I am sure that there are certain
    mistakes that I missed and were left behind.


    Finally, I would like to add that I am honored you chose to read my book. Thank
    you for being my reader. If you would like to be in contact, don’t hesitate to
    connect on LinkedIn or visit my website at [`www.stijnvanhijfte.com`](http://www.stijnvanhijfte.com).'
