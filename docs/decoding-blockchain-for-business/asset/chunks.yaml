    Hot wallets are also called *software wallets* and they come in several different
    kinds. There are the web wallets that can be created in a browser; another type
    is the desktop wallet. These can be downloaded on your machine and are therefore
    considered safer than web wallets. Still, you will have to keep your wallet safe
    and make backups if possible.


    A *cold wallet* *,* on the other hand, has no connection to the Internet and is
    used to store cryptocurrencies offline. This is a much safer way of storing (assuming
