  trans: '

    ### 区块链还是分布式账本？


    我在此想立即指出一个重要说明，即区块链与分布式账本技术（简称 DLT）之间的区别。通常，人们说每个区块链都是一个分布式账本，但并非每个分布式账本都是区块链。分布式账本是一种数据库，它试图在地理位置不同的地点之间共享数据，而没有中央角色对整个网络进行控制。可以看出，它们在概念和目标上有一些相似之处。两者之间的一个主要区别在于新数据是如何附加到平台上的。在区块链技术中，人们使用一种共识算法来添加新信息，而分布式账本并不总是具备这样的算法。


    正如你将在本书中看到的，DLT 的应用形式多样，区块链平台的应用亦是如此。使用“区块链”或“分布式账本”这两个名称有着许多含义。不仅技术本身不同，这两个名称带给人们的感知也不同。前者闻名遐迩，在全球备受追捧，而后者则相对隐匿于幕后，在
    IT 专家中更为人所知。那么，为什么用一个名称而不用另一个呢？一些公司希望搭乘炒作热潮，使用“区块链”；而另一些公司则希望远离炒作，表明他们真正关注的是技术本身，因此使用“分布式账本”。


    你应该考虑的另一点是目前存在的区块链“类型”。有公有、无需许可的区块链（如比特币和以太坊），它们在访问或参与方面没有任何限制。我们也可以称它们为“真正的”区块链。我们也有私有、需要许可的区块链，只有特定的一群人才能访问和参与（如
    Rubix 和 Hyperledger 平台）。还有一些平台存在于这两种极端情况之间。第一种是公有但需要许可的区块链，它允许所有人进行交易和查看交易日志，但只有少数人能够参与共识机制（如瑞波币和以太坊的私有版本）。最后，还有私有但无需许可的区块链，其共识算法对所有人开放，但交易仅限于特定数量的参与者。目前还没有一个网络完全实现这一点的真实例子（目前最接近的可能是
    Exonum 网络）。


    还有 DAG，即有向无环图，它们也带着自己的解决方案和网络进入了区块链领域。为了使本书的进程不过于复杂，我将把区块链和分布式账本这两个术语视为同义词（我知道有些人可能不同意这种方法），并且在详细讨论
    DAG 时会特别指出来。


    ### 区块链地址


    理解区块链世界的下一步是区块链地址。区块链地址 ^(⁶) 是区块链和加密货币中的主要概念之一。它基于公钥密码学（也称为非对称密码学），其中使用一个私钥和一个公钥。正如你可能从名称中推断出的那样，公钥是公众可以知道的密钥。它们主要用于识别你的身份，而私钥则应始终保持私有。它们用于签署交易或解锁你账户上的加密货币。有多种算法可以生成这样的公钥和私钥。随着时间的推移，出于安全考虑，这些区块链地址已经从这些公钥演变为这些公钥的哈希值。这可以通过多种不同的方式完成，以至于对于每种加密货币都有不同的区块链地址，并且通常不可能将不同的加密货币发送到同一个区块链地址（算法上的差异阻止了这一点）。如果支付通过网络发送到区块链地址，这些“地址”只能通过使用相应的私钥来解锁。根据这些地址的派生方式，有可能在同一個地址上存储山寨币（不同的加密货币）。


    ### 区块链钱包


    与地址密切相关的是区块链钱包的概念。这些钱包并非用于存储加密货币，而是用于与网络进行交互。它们用于生成发送和接收加密货币所需的信息，为此，它们会生成多个私钥-公钥对。这可以通过使用随机种子随机生成，也可以基于密码短语、密码、种子词等，在所谓的“确定性”钱包中生成。地址（如前所述）用于接收交易。私钥用于签署交易。^(⁷)
    钱包软件（如果我们处理的是数字钱包）会计算钱包中每个地址关联的余额，求和，并将此显示为你的余额。因此，再次强调，你的加密货币并非直接存储在钱包本身中。这只是一种处理公钥-私钥体系结构的更方便的方式。


    根据使用钱包的方式，它们可以被定义为“冷钱包”或“热钱包”。热钱包最容易理解，因为它是一个连接到互联网的钱包。有几种提供商允许你创建钱包。热钱包也称为软件钱包，有几种不同的类型。有可以在浏览器中创建的网络钱包；另一种类型是桌面钱包。这些可以下载到你的机器上，因此被认为比网络钱包更安全。尽管如此，你仍需确保钱包安全，并在可能的情况下进行备份。


    另一方面，冷钱包与互联网没有连接，用于离线存储加密货币。这是一种更安全的存储方式（假设你不会丢失你的冷钱包），因为热钱包容易受到网络攻击。硬件钱包是冷钱包的第一种形式。这些是用于更长时间存储代币的物理设备。也有一些实现可以类似地用于执行交易。这里的问题可能是钱包的固件实现，它并不总是像它应该的那样安全。一个永久保持离线的智能手机可以被视为具有类似安全性的硬件钱包。最后，还有纸钱包。正如你可能想象的那样，这仅仅是一张印有包含公钥和私钥的二维码的纸。纸钱包非常危险，因为一张纸显然会面临特定的风险。除此之外，这类钱包只能使用一次，用于将全部金额发送到另一个地址。

    '
- fmt: '### Node


    When we talk about blockchain and the network it represents, we also speak about
    nodes. `Node`s are the lifeblood of the network, as they are always responsible
    for a given set of tasks. These tasks can include creating, receiving, and transmitting
    a message. Without the nodes, the network would no longer exist, even if the software
    is still up to date. These nodes are distributed all over the world, across a
    widespread network. ^([⁸](#fn8))


    So what is a node? A node is any electronic device that is connected to the network
    and has an IP address. One of the main purposes of the network is to maintain
    a copy of the blockchain and process transactions (depending on the type of node).
    The owners of these nodes willingly use their hardware, computer power, and energy
    to maintain the network.


    We should also make a distinction between different types of nodes: full nodes,
    supernodes, miner nodes, and SPV clients. Even though they are equal throughout
    the network, each type supports the network in a different manner. First of all,
    there is the full node that downloads a complete copy of the blockchain and checks
    for any new transactions based on the consensus protocol in use. They are responsible
    for the verification of transactions and blocks, using the consensus algorithm
    (explained later). They are also able to relay new transactions or blocks to the
    blockchain. When this full node is publicly visible, we talk about a `supernode`.
    The owner of a full node can choose to run it either as a hidden node (not visible
    to others by using firewalls or the TOR network) or as a visible node. The advantage
    of a supernode is that it connects to any other node that wants to make a connection
    and communicates with it, acting as a redistribution point, both for data stored
    in the node and to facilitate communication with other nodes on the network.


    A light node (or SPV node), on the other hand, is referencing the copy of the
    blockchain on a full node. It is named after the SPV method or “Simplified Payment
    Verification” method, whereby users can verify if a transaction was included in
    a block without having to download and maintain the entire blockchain database.
    These nodes rely on the information provided by supernodes and simply act as communication
    endpoints (we find this commonly in wallet software).


    Finally, we should highlight the difference between a client node and a miner
    node. While anyone can run a full node (having the necessary hardware requirements),
    this is not the same as a mining node. When a full node is just validating transactions,
    we call this a client node. If the owner is willing to invest in expensive hardware
    (depending on the consensus protocol), he will also be able to mine new blocks
    while running his node. The concept of mining is explained next.


    ### Mining


    `Mining` is one of the key concepts within the blockchain technology. It is the
    way new transactions are being accepted within new blocks ^([⁹](#fn9)), which
    are added to the existing chain, as well as how new cryptocurrency is being created.
    It is always used as a countermeasure against fraud and ensures that all participants
    within the network remain true. The mining itself is quite costly, as it requires
    hardware to be used for the mining process, energy to power the mining itself,
    and time.


    Mining takes place in a couple of steps. First of all, the mining nodes need to
    collect the unconfirmed transactions that are waiting in a pool to be processed.
    These are forged into a block (which is the collection of the transactions with
    some extra metadata). Each miner can select the same or a different set of transactions
    (this can be due to parameters of the node or geographic location). The next step,
    depending on the consensus algorithm, is to sign the transaction according to
    the rules of the network. This can be a mathematical puzzle, a number of votes
    of the participants, or another system. If a valid solution is found, the miner
    can broadcast his block and solution to the other participants, which can validate
    the solution. If correct, this is confirmed and added to the blockchain of these
    nodes, as long as all the transactions inside the block can be executed according
    to the blockchain history. This is called the `winning` block.


    As you saw above, for this, the miner should be rewarded. This is done in two
    ways: the miner receives the transaction fees of the transactions that are included
    in the block and the new coins that are being created when a new block is added.
    The miner can receive this reward based on the algorithm used within the network—proof
    of work, proof of stake, or otherwise.


    The mining process is not only the key to the creation of new cryptocurrency,
    it is also the mechanism that helps create decentralized consensus in a trustless
    environment. All nodes over the network receive the blocks and can consequently
    check its validity. This means that consensus will emerge over time, as there
    is not an election at a specific time but by an asynchronous interaction of all
    the nodes in the network. You must realize that in networks such as Bitcoin, the
    computer power necessary to compete and mine for the next block has increased
    exponentially over time. This is because of the increase of entrants in the market
    space and also because of evolutions in hardware solutions. Over time, mining
    pools saw the light of day. By working together, the pool has a higher chance
    of finding the next winning block so that the rewards can be shared among the
    participants. The infrastructure of mining installations has evolved greatly over
    time and, depending on the blockchain platform, we will go deeper into the when
    and why of these developments. For some of these platforms, one needs quite advanced
    infrastructure, while others are still open to everyone.


    Of course, when we are dealing with an enterprise implementation of a blockchain
    platform, you are not going to work with classic miner nodes. Instead you will
    work with a simpler consensus algorithm in which each participant can easily check
    and validate what is happening throughout the network. The need for competition
    is reduced, as these participants actually know each other already so that fraudulent
    transactions can easily be linked back. This way participants can be removed from
    the network when they try to cheat their business partners in a consortium.


    ### The Consensus Protocol


    We quite often talk about protocols when we talk about blockchain technology.
    This is of course not something that is limited only to blockchain, but can be
    found in any implementation of telecommunication technology. When we are talking
    about a protocol, we are talking about an entire set of rules that decide how
    you connect to a system and interact with it. These rules can be extensive as
    they can determine which hardware you have to use, which software is allowed,
    and what the semantics are of messages that are transmitted over a network. Same
    as with other telecommunication services. When we talk about open source blockchain
    implementations, like Bitcoin or Ethereum, there are no restrictions on hardware
    and the software needed is completely free. Even though this is still the case
    for private blockchain implementations, one could see future developments where
    this would no longer be the case.'
