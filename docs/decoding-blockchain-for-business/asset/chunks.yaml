    \ offers a new way of working and redesigning current, often terribly designed,\
    \ processes. Blockchain holds the power to change platforms entirely so that competitors\
    \ can work together in a trustless environment. This way, entire industries can\
    \ be further optimized while at the same time improving the situation for their\
    \ customers. I will not try to convince you or make you “believe” in anything.\
