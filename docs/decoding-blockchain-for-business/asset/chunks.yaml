  trans: '

    # 构建基石


    “区块链”这一术语指代的就是该技术的核心。其底层数据结构是由包含交易的区块构成的有序反向链表。这些交易代表了区块链网络中所有参与者之间的支付行为。这里的“支付”一词应被宽泛地理解。它既可能包括我们通常通过加密货币进行的支付，也可能指代依据不同区块链平台，在两方之间进行的任何操作确认。区块之间通过使用上一个添加到链中的区块的哈希值来彼此链接，如图
    1-9 所示。细想一下，包含交易数据的区块链，只不过是一个数据以不同方式组织起来的账本。


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig9_HTML.jpg](img/497553_1_En_1_Fig9_HTML.jpg)


    图 1-9 - 区块之间的链接


    因为我们知道每个哈希值都是一个独一无二的指纹，所以总能确切地知道该区块是否属于这条链。这里需要注意的一点是，一个父区块（最新添加的区块）可以有多个子区块，而一个子区块则始终只有一个父区块。如果存在多个子区块，那么我们就遇到了系统分叉的情况。通常，这些分叉会被解决，只会使用其中一个子区块来延续主链（并且该子区块本身也会成为父区块）。然而，在某些情况下，部分分叉会持续存在，我们就会处理多条始于同一父区块的独立链。我们总是需要一个起点，即第一个区块，它被恰如其分地称为*创世区块*。因为从视觉上可以理解为区块是一个接一个堆叠的，所以我们把最新的区块称为“尖端”或“顶部”，而到创世区块的距离则称为“高度”。^(⁴)
    这个高度越大，改变早期某个区块的难度就越大。从某个特定区块开始，链越长，重新计算所有区块中包含的信息所需的计算能力就越大。


    区块中还存储了哪些内容？我们需要区分两个主要部分：区块本身和区块头。上一个区块的哈希值就是存储在区块头中的项目之一。通过这种方式，区块之间的链得以创建。但这并非唯一的内容——根据区块链平台的不同，你还可以在其中找到默克尔根、时间戳、随机数，以及其他一些参数（例如，难度目标、版本等）。图
    1-10 展示了比特币区块链的一个例子。


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig10_HTML.jpg](img/497553_1_En_1_Fig10_HTML.jpg)


    图 1-10 - 比特币区块头信息


    眼下，并非所有这些信息都会清晰明了，但不用担心，随着我们阅读本书的深入，我们会一一解释。默克尔根提供了存储在区块本身中的交易的数字指纹。这是一种基于交易 ID
    或“TXID”的“哈希值的哈希值”。这个哈希值对于该区块内的交易来说是独一无二的。见图 1-11。


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig11_HTML.jpg](img/497553_1_En_1_Fig11_HTML.jpg)


    图 1-11 - 比特币默克尔根中包含的内容


    再次强调，这只是对区块头中内容的简化展示。当然，区块包含的内容远不止区块头。区块的主体部分由交易构成。见图 1-12。


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig12_HTML.jpg](img/497553_1_En_1_Fig12_HTML.jpg)


    图 1-12 - 整个链


    正如你所见，我们处理的是海量数据，不仅存在于区块中，也存在于区块头中。正是最终根据整个区块计算出的哈希值，能够正确且唯一地识别该区块在整个区块链中的位置。^(⁵)
    对于比特币，使用`SHA-256`算法结合`RIPEMD-160`来计算这些哈希值，但这些算法可能因你使用的平台不同而有很大差异。既然我们已经了解了交易是如何被打包进区块，以及所有内容是如何链接在一起的，但主要问题依然存在：我们如何进行交易？其理念是，你可以用你的私钥对交易进行签名，这样不仅能清楚表明你是花费方，还能证明你拥有花费权，并且你没有重复花费该货币。交易通过网络广播并被挖掘到区块中。只有当这些交易基于所有参与者都同意的共识规则执行时，它们才会被处理。


    简而言之，交易的生命周期如下：


    1.  交易由创建者创建并签名。该交易应立即包含验证和执行交易所必需的所有信息。


    2.  这些被提议的交易会与网络中的其他节点共享，由这些节点进行验证。


    3.  如果被接受，交易会在整个网络中传播；否则，它们会被丢弃。挖矿节点可以将这些交易包含在可被挖掘的区块中，并最终将其添加到之前已被接受的交易链中。

    '
- fmt: '### Blockchain or Distributed Ledger?


    An important note that I immediately want to make here is the distinction between
    blockchain and distributed ledger technology (or DLT). Often, it is said that
    each blockchain is a distributed ledger, but not every distributed ledger is a
    blockchain. Distributed ledgers are databases that try to share data among geographical
    different locations without a central actor having control over the entire network.
    You can see that there are some similarities in concept and what they try to achieve.
    A major difference between the two is how new data is appended to the platform.
    While in blockchain technology, one uses a consensus algorithm to add new information,
    distributed ledgers don’t always have such an algorithm in place.


    The application of DLTs differs in many forms, as you will see in this book, just
    as the application of blockchain platforms. The use of the name “blockchain” or
    “distributed ledger” has many implications. Not only is the technology different
    but also the perception of the two names. While the first is well-known and hyped
    all over the world, the second remains more hidden in the shadows and seems to
    be more known among IT specialists. So why use one name over the other? Some companies
    want to ride the hype and use “blockchain,” while others want to step away from
    the hype and show that they are really focusing on the technology itself and use
    “distributed ledger.”


    Another point you should consider are the “types” of blockchain that currently
    exist. There are the public, permissionless blockchains (such as Bitcoin and Ethereum),
    which have no restrictions when it comes to either access or participation. We
    can also call them the “true” blockchains. We also have private, permissioned
    blockchains, whereby only a certain group of people can gain access and participate
    (such as Rubix and Hyperledger platforms). You also have some platforms that exist
    in between these two extremes. The first are the public but permissioned blockchains
    that allow everyone to transact and see the transaction log while only a few can
    participate in the consensus mechanism (such as Ripple and private versions of
    Ethereum). Finally, there are also the private but permissionless blockchains,
    where the consensus algorithm is open to everyone while transactions are limited
    to a specific number of participants. There is no real example available of a
    network that fully achieves this (the one that comes closest currently might be
    the Exonum network).


    There are also the DAGs, or directed acyclic graphs, which have also entered the
    blockchain space with their own solutions and networks. To not further complicate
    the progress in this book, I will treat the term blockchain and distributed ledger
    as synonyms (I know some of you might not agree with this approach), and I will
    specifically refer to DAGs when we are discussing them in more detail.


    ### Blockchain Address


    The next step in understanding the world of blockchain is the blockchain address.
    A blockchain address^([⁶](#fn6)) is one of the main concepts within blockchain
    and cryptocurrencies. It is based on public key cryptography (also known as asymmetric
    cryptography) where one uses a private key and a public key. As you might infer
    from the name, public keys are keys that can be known by the public. They are
    mainly used to identify you, while private keys should always be kept private.
    They are used to sign transactions or to unlock your cryptocurrencies on your
    account. There is a wide arrange of algorithms that can create such public and
    private keys. Over time, because of security concerns, these blockchain addresses
    have evolved from those public keys to hashes from these public keys. This can
    be done in a lot of different ways so that for each cryptocurrency there are different
    blockchain addresses and it is often not possible to send different cryptocurrencies
    to the same blockchain address (differences in the algorithms prevent this). If
    payments are being shared over the network to blockchain addresses, these “addresses”
    can only be unlocked by using appropriate private keys. Based on the manner that
    these addresses are derived, it can be possible to store altcoins (different cryptocurrencies)
    on the same address.


    ### Blockchain Wallet


    Closely related to addresses is the concept of blockchain wallets. These wallets
    aren’t used to store cryptocurrencies, but are used to interact with the network.
    They are used to generate the information necessary to send and receive cryptocurrency
    and, to do this, they generate a number of private-public key sets. This can happen
    at random by using a random seed or this can be based on a passphrase, password,
    seed words, etc., in something that is called a “deterministic” wallet. The address
    (as explained before) is used to receive transactions. The private key is used
    to sign transactions.^([⁷](#fn7)) The wallet software (if we are dealing with
    a digital wallet), counts the balances associated with each of the addresses in
    the wallets, creates the sum, and shows this as your balance. So once again, your
    cryptocurrencies aren’t directly stored in the wallet itself. This is rather a
    more convenient way of dealing with the public-private key infrastructure.


    Depending on how you use a wallet, they can be defined as either “cold” or “hot.”
    A hot wallet is the easiest to understand, as it is a wallet that is connected
    to the Internet. There are several providers that allow you to make a wallet.
    Hot wallets are also called software wallets and they come in several different
    kinds. There are the web wallets that can be created in a browser; another type
    is the desktop wallet. These can be downloaded on your machine and are therefore
    considered safer than web wallets. Still, you will have to keep your wallet safe
    and make backups if possible.


    A cold wallet, on the other hand, has no connection to the Internet and is used
    to store cryptocurrencies offline. This is a much safer way of storing (assuming
    you don’t lose your cold wallet), as hot wallets can be prone to cyberattacks.
    A hardware wallet is a first form of cold wallet. These are physical devices that
    are used to store tokens for a longer time. There are also implementations that
    can be used similar to perform transactions. The problem here can be the firmware
    implementation of the wallet, which is not always as secure as it should be. A
    smartphone permanently kept offline can be seen as a hardware wallet with similar
    security. Finally, there are also paper wallets. As you might have imagined, this
    is simply a piece of paper with QR codes that contain the public and private keys.
    Paper wallets are very dangerous, as a piece of paper is clearly open to specific
    dangers. On top of that, these types of wallets can only be used once, to send
    the entire amount to another address.'
