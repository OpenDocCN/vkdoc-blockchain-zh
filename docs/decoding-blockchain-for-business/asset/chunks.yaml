    their supply chain.^([^(87)](#fn87)) Coke One North America (CONA) works currently
    with 70 manufacturers on their blockchain solution for the 160,000 bottles that
    are delivered daily to shops in the U.S. By improving the process, orders can
    be reduced from processes that take up to months to only a couple of days. Another
    major company is Walmart. They have teamed up with IBM specifically for their
    food supply chains.^([^(88)](#fn88)) Currently, they track Chinese pork and Mexican
    mangoes, but one could easily see the potential for the future.


    Several platforms have been developed to aid the supply chain industry to make
    sure that blockchain integration can be performed with ease. Insolar^([^(89)](#fn89))
    offers the use of private and public blockchains. This provides the most options
    for possible integration, as it leaves migration to other solutions open. Other
    startups that focus on supply chain are Skuchain, which aims to improve the security
    and visibility in the global supply chain process; SyncFab, which focuses on purchase
    order management; Shipchain, which focuses on freight transport smart contracts;
    and Origintrail, which offers a data exchange protocol for interconnected supply
    chains.


    ### Resources


    In line with what you might expect from supply chain processes, pharmaceutical
    supply chains and the energy trade, there are also possibilities to optimize the
    mining and general industry markets. An example is BHP Billiton, which has chosen
    to use blockchain technology to record the movements of rock and fluid samples
    to better secure the data that is being generated and reported for the delivery
    of these minerals.^([^(90)](#fn90))


    A second example relates to the diamond market, where precious stones often tend
    to find origin in conflict areas. The term “blood diamond” isn’t familiar to everyone,
    and it refers to the fact that these stones are used to fuel conflicts everywhere
    in the world. They promote child labor, child soldiers, and various war crimes
    that I am not going to discuss in detail. By using distributed ledgers, we could
    help verify the origin of these diamonds and precious stones, ensuring that with
    the purchase of these stones, we do not promote such violence against humanity.
    The De Beers are responsible for about 30% of the mines, trades, and markets of
    diamonds, and they have chosen to implement a blockchain solution to help trace
    stones from their very origins to the customers who buy them.^([^(91)](#fn91))
    By doing this, the platform can become another measure in the fight against these
    crimes.


    One final example in this context is the startup Everledger.^([^(92)](#fn92))
    Everledger has developed several industry applications that focus on diamonds,
    gemstones, minerals, wines, luxury products, and art. They wish to improve the
    transparency in these markets, to allow for clear compliance processes and trust
    between all parties. By creating unique identities, one can no longer doubt where
    these resources come from.'
  trans: '

    ### 供应链


    你可能不会立刻意识到，但供应链为区块链技术提供了一个清晰的应用场景。它并非一个特定的行业，而是由在供应链中相互协作的人员、企业和不同行业组成的集合。通常情况下，它涉及一个由供应商、运输公司、销售商和客户组成的完整网络，这些参与者之间会进行一次性或更长期的互动，且不受地域限制。由于这是当今任何行业的基本要素，因此有诸多理由对现有的流程和程序提出质疑。供应链流程往往成本高昂，因流程和程序的低效导致大量延误，对需求变化缺乏灵活性，并且基于更传统的运作方式。诚然，如果我们审视那些正在颠覆整个行业的新技术，往往会发现当前供应链流程中缺乏这些技术。随着客户要求更好的体验、更多的按需产品和服务、灵活性以及快速解决问题，重大的变革即将到来。


    正如我多次强调的，区块链技术并非能简单解决所有这些问题的神奇方案。但它可能是推动当前未能发生的必要变革的技术之一。和往常一样，一个主要的关注点可能在于降低当前供应链流程中因低效而产生的成本。通过消除第三方并直接合作，可以借助透明的信息共享来降低成本，并确保无需在多个银行账户之间进行多次支付。智能合约可能是一种有价值的解决方案，可以在货物交付时被触发。与此相关的问题是供应链流程中参与方之间的数据收集与共享^(⁸⁶)。数据无法在特定供应链的不同合作伙伴之间高效共享和集成，导致宝贵信息的丢失，而这些信息对于改进流程以及确保产品不丢失至关重要。延续这一趋势的是使用`EDI`（电子数据交换）系统，该系统以批量的方式向其他方发送信息。这些信息按特定间隔共享，这导致了定价变化或货件丢失等问题的出现。


    针对所有这些问题，区块链技术的应用可能会极大地改善当前的供应链流程。可口可乐公司就深谙此道。他们与 SAP 合作，在美国为其供应链创建了一个区块链解决方案^(⁸⁷)。北美可口可乐装瓶商协会（`CONA`）目前正与
    70 家制造商合作，利用他们的区块链解决方案处理每天交付给美国商店的 16 万瓶产品。通过改进流程，订单处理时间可以从原来的长达数月缩短至仅需几天。另一家重要公司是沃尔玛。他们专门为其食品供应链与
    IBM 展开了合作^(⁸⁸)。目前，他们追踪的是中国猪肉和墨西哥芒果，但人们不难预见其未来的潜力。


    目前已有多个平台被开发出来，旨在帮助供应链行业确保能够轻松集成区块链。`Insolar`^(⁸⁹) 提供了私有链和公有链的使用。这为可能的集成提供了最多的选项，因为它为迁移到其他解决方案留下了开放空间。其他专注于供应链的初创公司包括：`Skuchain`，旨在提高全球供应链流程的安全性和可见性；`SyncFab`，专注于采购订单管理；`Shipchain`，专注于货运智能合约；以及
    `Origintrail`，它为互联的供应链提供了一种数据交换协议。


    ### 资源


    与你对供应链流程的预期一致，在药品供应链和能源交易领域，也存在优化采矿业和一般行业市场的可能性。一个例子是必和必拓（BHP Billiton），它选择使用区块链技术来记录岩石和流体样本的移动情况，以便更好地保护为交付这些矿产而产生和报告的数据^(⁹⁰)。


    第二个例子与钻石市场有关，这些宝石往往来源于冲突地区。“血钻”这个术语并非人人熟悉，它指的是这些宝石被用来助长世界各地的冲突。它们助长了童工、儿童兵以及各种战争罪行，对此我不作详细讨论。通过使用分布式账本，我们可以帮助验证这些钻石和宝石的来源，确保在购买这些宝石时，我们不是在助长这种反人类的暴力。戴比尔斯（De
    Beers）公司负责约 30%的钻石开采、贸易和市场，他们已选择实施一个区块链解决方案，以帮助追踪宝石从源头到购买它们的客户的全过程^(⁹¹)。通过这种方式，该平台可以成为打击这些罪行的又一项措施。


    在此背景下，最后一个例子是初创公司 `Everledger`^(⁹²)。`Everledger` 已经开发了多个专注于钻石、宝石、矿物、葡萄酒、奢侈品和艺术品的行业应用。他们希望提高这些市场的透明度，以便实现清晰的合规流程和各方之间的信任。通过创建独特的身份，人们将不再对这些资源的来源存疑。

    '
- fmt: '# Risk Management and Cybersecurity


    It is certainly worth asking how the risk management and cybersecurity sector
    could be influenced by the introduction of the blockchain technology. Whether
    or not you believe in the technology and the possible applications, the fact is
    that companies are trying new ways of working with distributed ledgers, applications,
    and platforms. This already means that there will be an impact on risk and security.
    With the advent of new technologies, new vulnerabilities are introduced and they
    need to be examined and tested. This calls upon professionals who not only understand
    the technology and its applications, but also can edit the code to discover how
    it might be used with malicious intent. Depending on the application, these risks
    can be linked to operational, credit, or liquidity risk (and in some cases even
    market risk). Again, understanding the application and the possible risks is critical.


    However, there are possible advantages to the technology as well. When we look
    at data, some of the key characteristics in a compliance/security setting is the
    availability, confidentiality, and integrity of the data. Distributed ledgers
    could meet help all three of these requirements, as the integrity can be easily
    verified by storing hashes. A simple change will lead to a completely different
    hash so that everyone knows that the integrity of the data has been compromised.
    When applied correctly, blockchain platforms could also improve data security
    and assure that only those participants with the necessary rights can access the
    data. Finally, availability can be improved, as there will no longer be a single
    point of failure. Each node has a copy of the data, so that when a node goes down,
    participants can contact the other available nodes to access the data.


    In the field of data compliance, regulations often stipulate that one has to be
    able to prove that data hasn’t been altered or changed. With immutable records
    stored on a distributed ledger, this can easily be achieved.^([^(93)](#fn93))
    Tampering with data can be prevented and even in cases when data changes are possible,
    immutable logs show who the culprits are.


    With an increase in data control and transparency, one could say that client’s
    oversights could be improved as well. An example is the financial services industry,
    where the `KYC` (Know Your Customer) program is a well-known process in which
    the client needs to be identified. This identification has to pass through several
    steps. The cost of the entire process is high, and such is the burden on both
    the financial institutions and the customer. Digitalization could help because
    smart contracts can automate the steps of the information gathering process, and
    when there is a conflict, it can automatically alert internal departments or the
    customer that extra data validation is needed. While the process is still a necessary
    pain (to protect both the financial services industry and the customers), it could
    be improved in terms of data integrity, case handling, and testing. Anti-money
    laundering processes are another viable candidate for optimization via the use
    of blockchain technology. There are already several startups in the field looking
    at these processes, such as `KYC Chain`^([^(94)](#fn94)) and `Tradle`.^([^(95)](#fn95))
    Customer data could be made available to regulators, including updates on any
    information in real-time. These processes are of course only part of the broader
    client onboarding program that is of major importance, which again could become
    a lot friendlier for future customers.


    Another possible candidate is the “proof of process,” where the numbers are checked
    to see if they really are what they appear to be. By providing step-by-step information
    and verification of the data, fraud can be prevented in an effective way, thus
    protecting customers and investors from schemes. Several startups are working
    on applications, such as `Coinfirm`^([^(96)](#fn96)) and `QRC Group`.^([^(97)](#fn97))


    A third example is the proof of ownership and the chain of custody, which is very
    important in many industries and processes. By providing immutable records in
    a transparent way, this information could be used to facilitate many processes
    that currently are prone to fraud or at least are opaque for any outsider looking
    in. A company that is looking into this topic is called `HyperProof`.^([^(98)](#fn98))


    Of course, most of these initiatives look at the qualitative aspect of risk/compliance
    management, but it shouldn’t be too difficult to understand that quantitative
    professionals will also feel the influence of the blockchain technology. With
    better data, better models can be created that reflect the reality in a much more
    significant way. Include the fact that you can actually link data to automated
    processing via smart contracts and in some cases even to entire mathematical models,
    you can see that the process can be optimized and become less prone to human errors.


    When we consider the advantages of the blockchain technology to cybersecurity,
    we can also consider several points. One is the possibility to prevent access
    fraud by creating identities on a distributed ledger platform. Currently, the
    Central Authorities (`CAs`) in the Public Key Infrastructure (`PKI`) model can
    do this.^([^(99)](#fn99)) People tend to use passwords, which are generally easy
    to guess or hack. This leads to persistent security issues for many companies.
    In a sense, using a centralized database, this creates a target for hackers if
    they wish to steal information. One could argue that a decentralized `PKI` is
    more secure when it comes to storing such information. Another possibility in
    the field of cybersecurity is the use of blockchain platforms for DNS servers,
    thereby making the network more resilient against DDoS attacks, which are aimed
    at bringing down the centralized part of a DNS service. Take away this centralized
    part, and you can hope to take away the power of the attacker.'
