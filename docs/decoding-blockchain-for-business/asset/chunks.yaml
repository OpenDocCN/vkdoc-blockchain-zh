    ### Blockchain Wallet


    Closely related to addresses is the concept of *blockchain wallets* *.* These
    wallets aren’t used to store cryptocurrencies, but are used to interact with the
    network. They are used to generate the information necessary to send and receive
    cryptocurrency and, to do this, they generate a number of private-public key sets.
    This can happen at random by using a random seed or this can be based on a passphrase,
