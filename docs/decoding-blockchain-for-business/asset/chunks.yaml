    to the loss of funds, data, and the control over the account itself. Imagine building
    an entire infrastructure to simply lose control over (a part) of it in a second.
    You wouldn’t want a disgruntled employee to have access to such data, as the consequences
    could be disastrous. There is also the legal and compliance framework, where there
    is still a lot of uncertainty with the possible legal pitfalls.^([^(19)](#fn19))


    Other possible disadvantages are the inability to perform changes to the data.
    This can be seen as an advantage, when you need to perform modifications, but
    this almost certainly leads to a hard fork in the network. A final pitfall that
    you have to consider are the storage requirements. It doesn’t matter how you look
    at it, the storage requirements for the nodes will grow over time. As you are
    dealing with a decentralized network, this means that several nodes need to replicate
    the storage of the network. Although you can create networks in which certain
    data is removed from the nodes, this will grow over time and it is a cost to consider,
    whether you like it or not.^([^(20)](#fn20))


    Despite all the disadvantages listed here, the blockchain technology really can
    support Internet of Things (IoT) designs to grow in scale for major corporations.
    By effectively implementing a decentralized platform from the very beginning,
    this could help companies scale their solutions in a cost-effective way while
    at the same time considering the security of their network. If you take into account
    the possible disadvantages and use a risk-based approach, where you carefully
    consider each step of the design, you could end up being a front-runner in the
    IoT landscape and reach even more possible customers. You can also focus on further
    innovation and design. It is up to the bold and the willing to take these risks,
    but the payoff could be tremendous in the long run.


    ## Blockchain and Artificial Intelligence


    Another term that has taken the world by storm is *artificial intelligence* (AI)
    . How you want to interpret AI is up to you, but the link to the blockchain technology
    is undeniable. While you might not immediately see the connection between the
    two, as they have completely different developing parties and applications, there
    certainly are overlaps.^([^(21)](#fn21)) So where is the link? Both techniques
    and underlying technologies focus on the use of data. Where the blockchain technology
    focuses on the safe encryption of data in a decentralized, immutable ledger, the
    AI and machine learning industry focuses on the development of engines that enable
    analytics and decision making based on that same data. When implemented in the
    correct way, clear synergies can be reached between the two technologies.


    The blockchain technology can be used to create data markets, which in turn could
    be great enablers of the AI industry. They can deliver a sustainable supply of
    data, which is so vital to this new and growing industry. There have already been
    some cases in which AI algorithms were integrated within the blockchain platform
    (an interesting example is Aeternity), or where the outcomes of computation were
    made available to researchers and the industry to be used in future development.
    You can also turn this logic around and understand that blockchain platforms can
    create a clear trace of which decisions were taken by machine learning algorithms
    and at what moment. If you have a clear set of variables and the decision based
    on these variables, this can in itself lead to further analysis and optimization
    of the developed applications.


    Other implementations focus for instance on the computing power that is being
    used for the proof-of-work algorithms. This massive amount of computing power
    could also be used to train new algorithms and models. It can be seen that several
    of the companies that focused on blockchain mining farms are now also turning
    toward the AI industry and offering their computing power for their services.
    Again, we can turn the logic around and look at the proof-of-work algorithms themselves.
    While most of them currently have a “brute force” approach, where large amounts
    of processing power is needed to crack mathematical algorithms, with the use of
    machine learning, these proof-of-work algorithms could be tackled in a more intelligent
    way, reducing the processing power needed by these blockchain networks.


    You could also use the blockchain technology as the underlying decentralization
    layer for AI agents that can interact with users. With the decentralized layer,
    the machine learning algorithms could have a nonstop source of world data without
    a central entity controlling what data is coming in and how the agents evolve.
    This could help improve algorithms and how the AI agents respond to the world
    around them and improve their accuracy. In that same vein, the blockchain technology
    allows for the encryption of data that is stored on top of it. If you work with
    sensitive data (think health, personal, or financial data), you could develop
    applications in such a way that only the machine algorithms could train or respond
    to the data, without any human participant needing to access it. This allows for
    a secure layer in which one can store and upload data, to get a response from
    the AI agent without having to worry about possible security risks underlying
    their personal data. As mentioned, it could also help create decentralized marketplaces,
    where individuals are actually rewarded and receive compensation for sharing their
    personal data. Smaller companies could enter the marketplace without having to
    compete with bigger tech giants over the data and at the same time prevent big
    corporations from abusing the data of individuals without them knowing what is
    happening.'
  trans: '

    ## 区块链平台的风险与劣势


    然而，在审视基于区块链平台的去中心化架构时，也需要考虑其风险。目前，区块链技术仍处于新兴阶段，因此没有任何组织拥有开发完整端到端 IT 架构所需的全部内部知识。因此，必须依赖市场上的供应商。这些供应商需要仔细甄别。你可能会面临供应商锁定的风险，尽管区块链平台的整个理念背离了传统的竞争模式。但这并不意味着现实就是如此。


    一个主要风险是区块链平台中使用的公私钥机制：一方面，私钥被盗会使盗取者能够在区块链系统上签署交易。在大多数情况下，目前还没有多重身份验证机制，这导致了一个尚未得到解决的主要安全漏洞。除此之外，私钥丢失后无法轻易“恢复”，并可能导致资金、数据以及账户控制权的丧失。想象一下，你建立了整个基础设施，却在瞬间失去了对其（部分）的控制。你可不希望心怀不满的员工能够访问此类数据，因为后果可能是灾难性的。此外，还有法律与合规框架方面的问题，其中仍然存在许多不确定性及潜在的法律陷阱。^(¹⁹)


    其他可能的劣势包括无法对数据进行修改。当需要执行修改时，这可以被视为一种优势，但这几乎必然会导致网络硬分叉。你必须要考虑的最后一个陷阱是存储需求。无论你从哪个角度看，节点的存储需求都会随时间增长。由于你面对的是一个去中心化网络，这意味着多个节点需要复制整个网络的存储内容。尽管你可以创建允许从节点中删除某些数据的网络，但存储量仍会随时间增长，这是一个无论你是否愿意都必须考虑的成本。^(²⁰)


    尽管列出了上述所有劣势，区块链技术确实能够支持大型企业物联网（IoT）设计的规模化发展。通过从一开始就有效地实施去中心化平台，可以帮助公司以经济高效的方式扩展其解决方案，同时兼顾其网络的安全性。如果你考虑到这些潜在的劣势，并采用基于风险的方法，仔细斟酌设计的每一步，你最终可能成为物联网领域的领跑者，并触达更多潜在客户。你也可以专注于进一步的创新和设计。这需要勇敢和有意愿的人去承担这些风险，但从长远来看，回报可能是巨大的。


    ## 区块链与人工智能


    另一个席卷全球的术语是*人工智能*（AI）。如何解读 AI 取决于你自己，但它与区块链技术的联系是不可否认的。虽然你可能不会立即看到两者之间的联系——因为它们具有完全不同的开发方和应用领域——但它们确实存在重叠之处。^(²¹)
    那么，联系在哪里呢？两种技术及其底层技术都聚焦于数据的使用。区块链技术侧重于在去中心化、不可篡改的账本中安全地加密数据，而人工智能和机器学习行业则侧重于开发能够基于相同数据进行分析和决策的引擎。如果以正确的方式实施，这两种技术之间可以实现明显的协同效应。


    区块链技术可用于创建数据市场，而这反过来可能极大地推动 AI 产业的发展。它们可以提供可持续的数据供应，这对这个新兴且不断增长的行业至关重要。已经有一些案例将
    AI 算法集成到区块链平台中（一个有趣的例子是 Aeternity），或者将计算结果提供给研究人员和行业用于未来的开发。你也可以反过来思考，理解区块链平台能够清晰地追溯机器学习算法在何时做出了哪些决策。如果你拥有明确的变量集以及基于这些变量的决策，这本身就能引发对所开发应用程序的进一步分析和优化。


    其他应用则专注于，例如，用于工作量证明算法的算力。这种海量的算力也可以用于训练新的算法和模型。可以看到，一些专注于区块链矿场的公司现在也开始转向 AI 行业，并将其算力用于提供服务。同样，我们可以反过来思考，审视工作量证明算法本身。虽然目前大多数算法采用“暴力破解”方法，需要大量的处理能力来破解数学算法，但通过使用机器学习，这些工作量证明算法可以以更智能的方式解决，从而减少这些区块链网络所需的处理能力。


    你还可以将区块链技术用作能够与用户交互的 AI 代理的底层去中心化层。有了去中心化层，机器学习算法就能拥有源源不断的世界数据来源，而无需中心化实体控制输入的数据以及代理的演化方式。这有助于改进算法，以及
    AI 代理对周围世界的响应方式，并提高其准确性。同理，区块链技术允许对存储在其上的数据进行加密。如果你处理的是敏感数据（如健康、个人或财务数据），你可以将应用程序开发成只有机器算法才能训练或响应这些数据，而无需任何人类参与者访问它们。这创建了一个安全层，人们可以在其中存储和上传数据，从
    AI 代理处获得响应，而无需担心其个人数据可能存在的安全风险。如前所述，它还有助于创建去中心化市场，个人可以通过分享其个人数据而获得实际奖励和报酬。较小的公司可以进入该市场，而无需与大型科技巨头在数据方面竞争，同时也能防止大公司在用户不知情的情况下滥用个人数据。

    '
- fmt: 'You could also combine the previous story about IoT with AI and the blockchain
    technology. With all the data coming in from the Internet of Things devices, you
    can see the value of performing analysis. By incorporating machine learning algorithms
    in the decentralized platform, you can increase the value from simply using distributed
    legers to efficiently setting up networks with IoT, by incorporating analysis.
    One company that already has seen this opportunity is `Finalze`, which combines
    wearables with safety regulations in the industry workflow.^([^(22)](#fn22)) Other
    companies are focusing on supply chain optimization, business networks, health
    data, company energy management, trading forecasting, proof-of-engagement platforms
    that automatically facilitate payments, capital raising, cybersecurity, and so
    on.


    A final example I would like to share are the efforts being made by Microsoft.
    The company wants to combine blockchain and AI technology so that people can easily
    and cost-effectively run advanced machine learning algorithms and at the same
    time collectively contribute data and improve the models. The blockchain technology
    allows the creation of a decentralized market, where participants are offered
    transparency and certainty that they are interacting with the correct code. With
    smart contracts, participants can receive a payout for the data they provide or
    the changes they make to the models.


    When you consider the previous examples, you can understand that the possibilities
    are almost endless and the possible outcomes are the same. You should also take
    into account the possible pitfalls of integrations between AI and blockchain.
    One is that neural networks need huge amounts of data, for which data lakes are
    often used. These data lakes (and warehouses) are used to ensure the quality of
    the data and to make sure that there is always enough data available for new projects
    and algorithms. A blockchain platform could in part make sure that data quality
    is respected and maintained. However, as we have said several times before, scalability
    might prove to be an issue and quickly providing huge datasets might not be that
    easy with several platforms. This would mean an extra bottleneck and as such actually
    create a new problem in the world of data markets. This doesn’t mean that this
    has to happen, it only means that one needs to take the limitations of DAGs and
    distributed ledgers into account when creating an integration that enables data
    science.


    ## Blockchain and Cloud


    As with many other technologies, the big cloud providers also discovered the hype
    surrounding the blockchain technology and couldn’t stay behind. Amazon, Google,
    Microsoft, and others have all entered the market and provide solutions for enterprises
    that want to develop a blockchain solution within their existing (cloud) architecture.
    To achieve this, they have set up their own platforms and started partnerships
    with several startups. An example is the partnership between AWS and `Kaleido`
    (which in turn is linked to `ConsenSys`). In addition, `Corda` has applications
    running on top of the `AWS` cloud platform, and `BlockApps` can be found in the
    line of partners.^([^(23)](#fn23)) Its aim is to bring the blockchain technology
    closer to the companies their existing reality and make the entire process a lot
    smoother.^([^(24)](#fn24)) Also, Google Cloud has started partnerships with the
    startups `Digital Asset` and `BlockApps` to increase their efforts on getting
    an attractive cloud platform for their partners and clients. `Chainlink` applications
    can also already be found on the platform^([^(25)](#fn25)), just as `OneLedger`.^([^(26)](#fn26))
    Microsoft Azure allows easy implementations with `Corda`, `Ethereum`, and `Hyperledger
    Fabric` technology.^([^(27)](#fn27)) Finally, IBM has entered the fray with their
    own platform and clear `Hyperledger Fabric` implementations.^([^(28)](#fn28))


    I could mention many others here, but the idea isn’t to discuss each of these
    platforms. The main concern is that you should understand the advantages and disadvantages
    of running a blockchain application on a cloud instance or even “as a service.”
    The advantages of such a setup are clear. As with other cloud applications, it
    allows you to quickly deploy an application without having to deal with direct
    infrastructure costs and setup, where you can deploy new machines with the click
    of a mouse rather than having to install your own machines in your datacenter.


    If you combine this with a `Hyperledger` platform, for example, you can create
    a consortium blockchain application within minutes that you control. On top of
    that, you can even more efficiently track ownership if you combine blockchain
    with cloud computing, as you can develop applications that can replace the current
    archaic processes, such as clearance through a Depository Trust Company.^([^(29)](#fn29))
    As with blockchain, cloud computing can help the current trends that further decentralization.
    This might seem strange at first, as cloud computing is just a different way of
    using infrastructure (or platforms), but as you know, you can choose different
    datacenters all over the world to create backups of your data and run applications
    on remote locations. This can facilitate the creation of nodes that maintain copies
    of the database and operate independently from each other.


    Here you can also find the idea of edge computing, which has been gaining traction
    in recent years (certainly with the advent of the Internet of Things). With the
    blockchain technology, there can be reliable access and control of the network,
    providing even more possibilities for scaling.^([^(30)](#fn30)) With the distribution
    of the nodes, you can imagine that the geographic risk is reduced (war, natural
    disasters …); as there are datacenters all over the world, so that even a private
    blockchain platform is secured for these types of incidents.'
