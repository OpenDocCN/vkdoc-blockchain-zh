  trans: '

    # 风险管理与网络安全


    区块链技术的引入将如何影响风险管理与网络安全领域，这无疑是一个值得探讨的问题。无论你信不信这项技术及其潜在应用，事实是，企业正在尝试使用分布式账本、应用程序和平台的新工作方式。这本身就意味着风险与安全将受到影响。随着新技术的出现，新的漏洞也随之产生，需要进行审查与测试。这要求专业人士不仅要理解技术及其应用，还要能编辑代码，以发现它可能被恶意利用的方式。根据具体应用，这些风险可能与操作风险、信用风险或流动性风险相关联（在某些情况下甚至涉及市场风险）。再次强调，理解应用及其潜在风险至关重要。


    然而，这项技术也可能带来优势。在数据方面，合规/安全环境中的几个关键特征是数据的可用性、保密性和完整性。分布式账本有助于满足这三项要求，因为通过存储哈希值可以轻松验证完整性。任何简单的更改都会导致完全不同的哈希值，从而让所有人都知道数据的完整性已受损。如果应用得当，区块链平台还能提升数据安全性，确保只有拥有必要权限的参与者才能访问数据。最后，可用性也能得到提升，因为不再存在单点故障。每个节点都拥有数据副本，因此当一个节点宕机时，参与者可以联系其他可用节点来访问数据。


    在数据合规领域，法规通常要求能够证明数据未被篡改或修改。借助存储在分布式账本上的不可变记录，这一点可以轻松实现。^(⁹³) 篡改数据可以被阻止，即使在某些情况下数据可以被更改，不可变的日志也能指明罪魁祸首。


    随着数据控制和透明度的提升，可以说客户的监督能力也能得到改善。以金融服务行业为例，`KYC`（了解你的客户）程序是一个众所周知的流程，需要对客户进行身份识别。这种身份识别需要经过几个步骤。整个流程成本高昂，对金融机构和客户来说都是沉重的负担。数字化能提供帮助，因为智能合约可以自动化信息收集流程的各个步骤，并且在出现冲突时，能自动通知内部部门或客户需要进行额外的数据验证。虽然该流程仍然是一种必要的麻烦（旨在保护金融服务行业和客户双方），但在数据完整性、案件处理以及测试方面，它可以得到改进。反洗钱流程是另一个可以通过区块链技术进行优化的可行候选领域。该领域已有几家初创公司正在研究这些流程，例如
    `KYC Chain`^(⁹⁴) 和 `Tradle`^(⁹⁵)。客户数据可以提供给监管机构，包括任何信息的实时更新。当然，这些流程只是更广泛的、至关重要的客户入驻程序的一部分，而该程序在未来可能会对客户变得更加友好。


    另一个可能的候选领域是“流程证明”，即核实数字是否确实如其所示。通过提供逐步的信息和数据验证，可以有效地防止欺诈，从而保护客户和投资者免受欺诈计划的侵害。几家初创公司正在开发相关应用，例如
    `Coinfirm`^(⁹⁶) 和 `QRC Group`^(⁹⁷)。


    第三个例子是所有权证明和监管链，这在许多行业和流程中都非常重要。通过以透明的方式提供不可变的记录，这些信息可用于优化许多当前容易发生欺诈，或者至少对外部观察者来说不透明的流程。一家正在研究这一课题的公司叫做
    `HyperProof`^(⁹⁸)。


    当然，这些举措大多关注风险/合规管理的定性方面，但理解定量专业人士也会感受到区块链技术的影响，应该并不困难。有了更好的数据，就可以创建出更能反映现实情况的更好模型。再加上你可以通过智能合约将数据与自动化处理联系起来，有时甚至可以与整个数学模型相连，你会发现流程可以得到优化，并且更不容易出现人为错误。


    在考虑区块链技术对网络安全的优势时，我们也可以考虑几点。其一，通过在分布式账本平台上创建身份，有可能防止访问欺诈。目前，公钥基础设施（`PKI`）模型中的中央机构（`CA`）可以做到这一点^(⁹⁹)。人们倾向于使用密码，但密码通常容易被猜到或被黑客破解。这给许多公司带来了持续的安全问题。从某种意义上说，使用集中式数据库，这为想要窃取信息的黑客创造了一个目标。可以说，在存储此类信息方面，去中心化的
    `PKI` 更加安全。网络安全领域的另一个可能性是使用区块链平台用于 DNS 服务器，从而使网络更能抵御 DDoS 攻击（此类攻击旨在击垮 DNS 服务的集中部分）。消除这个集中部分，就有可能消除攻击者的优势。

    '
- fmt: '### Energy Markets


    Without a doubt, a very interesting use case for the blockchain technology are
    the energy markets. By using these new techniques, one can obtain a more sustainable
    market that more efficiently uses resources and ensures that everyone has access
    to this market. High costs for what is seen as a basic utility is still an issue
    today and a distributed ledger platform could lower costs and be beneficial for
    the producers, distributers, and customers.^([^(100)](#fn100)) According to some
    reports, the blockchain in energy markets could grow to 3 billion USD by 2025.^([^(101)](#fn101))


    We could see the use of distributed ledger platforms popping up for P2P energy
    trading and decentralized marketplaces, which make sure that energy as a scarce
    resource is used most efficiently in a price-effective way. As the sector is already
    accustomed to innovation, with solar energy, electric vehicles, smart meters,
    and more coming in the future, the blockchain technology could become an integral
    part of this change. In the sense of sustainability and resources coming from
    acceptable sources, tracking these sources could help adapt the market as it exists
    today.


    However, "classic" energy sectors stand to gain as well. The petroleum and gas
    trades have many actors, and as with any supply chain, cost reduction, trade optimization,
    and transparency can be achieved via blockchain platforms. It is also a heavily
    regulated market with sanctions on several countries that produce these products.
    To ensure that petroleum or gas is not coming from a sanctioned area, distributed
    ledger technology could provide immutable proof of where the resources came from.
    Reporting about energy data and how it’s being used could also be improved. An
    example is the Chilean government, which is using a blockchain technology to store
    and report energy data.


    With the energy market being a global market, cross-border engagement could be
    improved in regions such as the EU. It could help to share information across
    state borders, allow for commodity trading in a cost-effective way, creating real-time
    data repositories and more. By moving renewable energy to the global market, such
    as the classic energy resources, it could help change the world as a whole for
    the better.


    ### The Banking Industry


    We have already stated it several times—the birth of blockchain technology took
    place at the time of the banking crisis in 2008. It was meant as a protest and
    as a possible solution to work completely around the financial industry as a whole.
    It is only natural that those same banks have shown a very deep interest in the
    technology and its possible applications. This also means that this industry has
    seen the most use cases so far and as such can share the most experience in both
    success and failure.


    There is still a lot of enthusiasm in the industry for new and future applications,
    but they have learned from their past mistakes and will not simply jump to any
    new ventures without considering the possible risks or other implementations.
    Key issues that troubled banks in the past have been the difficulty of scaling
    solutions for larger commercial adoption without clogging up the entire network,
    which would lead to customer frustration and eventually customers fleeing the
    platform. There have also been issues with the ongoing regulatory uncertainty
    that surrounds the blockchain technology, which makes further investments in related
    projects risky.


    The most difficult aspect, as always, has been to bring several parties together
    to work on a platform. For competitors to work together, a very good understanding
    of the reasons why this could be beneficial for all is important. This is not
    always easy. If we take as an example the banking industry in Belgium and the
    open banking regulation, the smaller competitors worked together to deliver a
    compliant and similar open API platform, which makes it easier for third parties
    to work together. The bigger players, on the other hand, each chose their own
    path, which eventually made it more expensive for third parties to integrate with
    all of them. This was in sharp contrast to the Scandinavian region, where, even
    across borders, the majority of the banking scene was able to implement a similar
    platform. These lessons of the past teach us that it is easier to work with the
    smaller players (perhaps they have more to win from enhanced customer services
    and reduced costs) as well as a cultural aspect where certain countries have banks
    that work together with one another more readily for the benefit of all.


    Leading banks all over the world have been working together to figure out how
    this technology could optimize their current way of working. One exciting field
    is money transfers for remittances. Sending money abroad has always been a pain.
    They are not only expensive but often prove to be cumbersome. Blockchain technology
    could ease this cost.


    Other processes that might be improved by using blockchain technology is that
    of anti-money laundering and the "know your customer" processes, where fraud can
    be reduced. Identity can be verified, the process can easily be audited, and the
    validity of documents can be ensured via distributed ledgers. These processes
    are often a pain for customers, but when a shared platform could be created, the
    customer could decide which financial institutions get access to the information.
    This would mean that the customer would have to go through the entire process
    only once, after which all his financial institutions would have access to the
    same info. Updating the information could require the same streamlined process,
    reducing the impact on the customer.


    Financial inclusion has also been an important argument for the creation of financial
    services over blockchain platforms. Low prices because of automation on top of
    the platform allow for a broader client base. At the same time, everything necessary
    for the client can easily be performed via a smartphone. This might still prove
    to be a barrier, but it is a less harsh one than a personal computer. Digital
    IDs linked to your smartphone can be used, where otherwise identifying a customer
    might prove to be next to impossible.


    All over the world, new projects are being launched and tested to improve the
    money and credit markets. The promise that blockchain made the financial industry
    over night has proven to be a lie. Still, there is a lot of potential that remains
    untapped and that can be used to revolutionize the industry as a whole. While
    we might have landed at a moment of "blockchain fatigue" in the financial industry,
    similar to the AI winters of the past where AI was no longer popular, I remain
    confident that this technology will come back and further improve the banking
    industry.'
