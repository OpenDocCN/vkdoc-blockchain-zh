  trans: '

    ### 交易所与攻击


    当我们谈论加密货币交易所时，我们指的是允许参与者根据数字资产的市场价值，将一种数字资产兑换为另一种数字资产的在线平台。^(²⁸⁴) 你不应将此类交易所与钱包或钱包经纪商混淆，后者仅允许你买卖有限种类的加密货币，而这些加密货币又可进一步兑换为其他代币。大多数交易所允许你用一种代币交易另一种代币，而有些交易所还允许你兑换有限数量的法定货币（例如
    `Kraken`）。


    当你想要开始使用这些交易所，或开始交易加密货币时，你应首先创建自己的在线账户。一个可供操作的示例是 `Coinbase`。当然，你也可以使用任何其他在线服务，但务必始终考虑这些在线服务的安全性，因此请在开户前做好研究。你要确保自己投入的资金不会突然消失。网上也有一些清单可供参考，例如在比利时，`FSMA`
    就发布了一份与欺诈相关的网站的非详尽清单。


    然而，一旦你设置好账户，很可能只能购买特定的加密货币（即 `Bitcoin` 和 `Ether`）。如果你想购买其他币种，则必须在交易所开设账户。在那里，你可以将所购的
    `Ether` 或 `Bitcoin` 交易为其他代币。对于大多数其他代币，如果你想套现（或至少目前如此），通常无法直接将其兑换回法定货币。这意味着你必须先将它们换回
    `Ether` 或 `Bitcoin`，然后再兑换成法定货币。除此之外，在涉及交易利润和加密货币方面，你还需要考虑当地法规。


    这一切似乎相当容易理解。那么，为什么这些交易所却经常成为网络攻击的受害者呢？^(²⁸⁵) 首先，这些交易所必须持有大量加密货币以确保其流动性（这直接证明，犯罪分子会被成功可能带来的金钱所诱惑）。同时，这里也发生着大量交易。对网络安全的投资往往有限，因为这些公司需要资金来发展和创新，而且套现被盗的加密货币通常比套现法定货币容易得多。这使得交易所对潜在犯罪分子更具吸引力。


    许多人似乎认为，要成功攻击这样的交易所，必须使用非常特定的攻击向量。实际上，我们面对的是一个网络服务，它容易受到许多与其他网络服务相同的攻击，这意味着存在一系列可以执行的服务器端和客户端攻击。当我们查看
    `hackernoon` 提供的报告时，可以看到有四个与交易所相关的攻击类别（报告针对日交易额至少为 10 万美元的交易所进行研究）：用户安全、域名和注册商安全、Web
    安全以及 DoS 防护。^(²⁸⁶)


    我不会详细说明每个类别所有可能的攻击向量，但重要的是要理解，没有一家交易所获得 A+ 评分，这意味着没有一家是理想的。只有 21 家获得了 A 评分，而大多数获得了
    B 评分，意味着它们存在一些问题。表 5-3 列出了在 `Hackernoon` 报告中获得 A 评分的 21 家交易所。


    **表 5-3** 获得 A 评分的交易所。来源：Hackernoon.com


    | Kraken | Cobinhood | Poloniex | BitMEX | Bitfinex | Bitlish | BitMart |

    | --- | --- | --- | --- | --- | --- | --- |

    | BtcTurk | Coinbase Pro | GOPAX | Livecoin | UEX | HitBTC | BTC-Alpha |

    | LiteBit | Exrates | Luno | Kucoin | Paribu | Bitso | Coinbe |


    为应对这些风险，已经开发出多种钱包解决方案。最后一个例子是由 `NGRAVE` 开发的 `ZERO`。交易所平台存储的私钥可能在攻击中被盗，而这款钱包则与任何类型的网络连接隔绝，拥有自己的密钥生成方法，并考虑到了二维码的使用。它是迄今为止唯一能获得
    `EAL7 通用标准认证` 的钱包。^(²⁸⁷)


    ### 加密货币市值


    当你研究加密货币或开始研究特定币种时，你几乎会立即遇到讨论代币市值的图表。^(²⁸⁸) 它们是什么意思？请参考图 5-1 所示的示例，以更好地理解这个概念。


    ![../images/497553_1_En_5_Chapter/497553_1_En_5_Fig1_HTML.jpg](img/497553_1_En_5_Fig1_HTML.jpg)


    **图 5-1** 加密货币图表。数据来源：coinmarketcap.com


    为了更好地理解某种加密货币的价格，你应该查看这些图表。这些图表可以让你了解一种货币的市场价值、交易量以及随时间的变化趋势，你还可以追踪某些事件的影响。分析师通常使用这些图表来做出明智的投资决策，因为这些图表显示了
    `当前流通币总量 * 当前价格`。


    这些图表通常用作投资者所涉风险程度的指标。然而，你应始终考虑到我们面对的是加密货币市场，与其他“经典”投资形式相比，该市场本身就给投资者带来了更高的风险。未来这种情况可能会改变，我很清楚有些人不同意这种观点，但当你计划投资加密市场时，应始终将此纳入考量。


    回到我们的话题，与股票市场类似，你可以根据市值变化将币种分为小盘币、中盘币和大盘币。显而易见，大盘币是更稳定的币种，但小盘币可能带来巨大回报（通常伴随着巨大风险）。虽然
    `Bitcoin` 目前拥有最大的市值，但你也可以研究较小的山寨币，并思考它们未来的增长潜力。当然，你也应该知道，这些图表并不能保证加密货币的未来价值。在做出最终决定之前，你应该研究你想要投资的币种，分析其供应量和背后的假设/技术。市值也无法提供有关加密货币流通速度的信息。趋势需要随时间进行分析。重要的是要考虑大量关于加密市场价格操纵的指控。^(²⁸⁹)
    研究显示，`Bitcoin` 价格以及许多山寨币市场中“大型”参与者的数量存在系统性趋势，这意味着你需要更加仔细地审视这些投资。


    常见的现象包括：洗售交易（用自己的资金买入卖出以制造市场活跃的假象）、拉高出货（人为买入山寨币，然后将持仓卖给受害者）、暗池交易（在标准交易所之外进行的大宗交易）、吹捧（为了个人利益而围绕一种币制造虚假热度）以及巨鲸交易（大型投资者将价格推向对自己有利的方向）。^(²⁹⁰)
    在考察整个加密市场的总市值时，最后需要考虑的一点是“死币”的存在，它们应从总数中扣除（尽管确切数量未知）。进行更深入市场分析的替代方法可以在基本面分析的领域中找到。

    '
- fmt: '### Crypto Futures Trading


    For those of you who are interested: futures trading has also entered the world
    of cryptocurrencies. In December 2017, the Chicago Mercantile Exchange launched
    the first Bitcoin futures contract.^([^(291)](#fn291)) These futures were cash
    settled, meaning that at the end of the contract, one has to compare the current
    market value to the agreed upon price, after which there is a transfer of the
    value. These types of contracts are often used to smooth out the risk that an
    investor (or miner) has by holding a certain amount of a tokens (in this case
    Bitcoin). However, these can also be used by speculators who want to bet on the
    price movement of cryptocurrencies.


    In a market where accusations of market manipulation already exist, you should
    take into account the extra risk you face by holding such contracts. Other criticism
    also refers to the fact that cash-delivered futures don’t force investors to actually
    hold the altcoin in hand, which leads to the fear that this could lead to the
    dilution of the market supply. There are also physically delivered futures, such
    as those provided by Bakkt.^([^(292)](#fn292)) Upon settlement, there is a “physical”
    exchange of Bitcoin between the participants. Kraken has futures on Ethereum,
    Litecoin, Bitcoin Cash, Ripple, and Bitcoin.^([^(293)](#fn293))


    As this book does not focus on options trading, I will not go into the details
    of going short, long, and margin calls. All I can do is issue a warning for those
    who want to enter this type of market. It is a market that can provide liquidity
    and offer hedging instruments to existing positions, but it can also introduce
    a whole lot of risk if you speculate on future prices.^([^(294)](#fn294)) As with
    any market, it is always the same rule: know the market you are entering and understand
    the risks of the instruments that you are buying or selling. And even in that
    case, always do your due diligence.


    ### Crypto Dividends


    Throughout this book, I have shown that cryptocurrencies have been used and are
    being used in a similar way as “classic” investment instruments. They have been
    used in ICOs to raise money for startups, create digital twins and crypto-assets,
    and people have made money over mining and trading altcoins.^([^(295)](#fn295))
    However, some of these altcoins have implemented a new strategy for investors
    to make money: dividends. There are two ways you can start making dividends with
    cryptocurrencies:


    * Staking: Holding a proof of stake coin in a special wallet

    * Holding: Buying and holding an altcoin in a wallet


    A first example of an altcoin paying dividends is Komodo (`KMD`), which can be
    staked in a staking wallet after you buy it. It promises a return of 5% on an
    annual basis. `NEO` is a smart contract token, similar to Ethereum, where you
    can stake your `NEO` in order to receive a payout in `GAS`.^([^(296)](#fn296))
    VeChain uses the same mechanism as `NEO`, but instead of paying out `GAS`, it
    pays out `VTHOR`.


    Another example is `BTMX`, which is the token of the BitMax exchange. You can
    lock up the coin to earn `USDT` (the reward is calculated and distributed daily).
    Kucoin (`KCS`) is an altcoin linked to the KuCoin exchange and distributes 50%
    of transaction fees to the token holders. The Coss token of the Coss Exchange
    has a similar mechanism in place.


    Other interesting tokens are Pundi X, `PIVX`, and BiBox. The future will certainly
    show more altcoins with different payouts. If you are interested in such an investment,
    always make sure that you perform due diligence so that you understand both the
    dividend scheme as the risks involved.


    ### Bonded Escrow Contract


    Bonded escrow contracts are an area where blockchain smart contracts could effectively
    help optimize existing companies and the regulation in place.^([^(297)](#fn297))
    These smart contracts could help eliminate the middleman for a lot of existing
    services, effectively making these processes more consumer friendly, cheaper,
    and in some cases safer. When we talk about escrow services, smart contracts could
    introduce the “safe remote purchase.”^([^(298)](#fn298)) For those who do not
    know what escrow services are, they simply relate to a trusted third-party when
    you are dealing with an untrusted relationship between buyers and sellers. An
    example is one of the many online platforms that handle second hand merchandising.
    If you sell a product on such a platform, you generally don’t know the buyer,
    so how can you make sure that you get your money when you send the product? And
    vice versa, how does the buyer know that they will receive the product when they
    pay the seller? The escrow service locks in the payment of the buyer and only
    releases the payment to the seller when the buyer confirms that they received
    the product. This happens for a fee of course.


    Instead of an escrow service, consider a smart contract. The code can vary depending
    on the use case, but it will generally force both the seller and the buyer to
    put up a stake so that they both have incentive to follow the stipulations of
    the agreement. When one of them doesn’t follow the rules of the agreement, the
    code of the smart contract will penalize that participant and they will lose their
    stake. This not only reduces the cost for the participants (as you generally don’t
    have to pay for a smart contract, and if you have to it will be significantly
    less than what you currently pay for an escrow service), but it also ensures that
    the participants follow the rules.


    ### Double-Betting Strategy


    The double-betting strategy is a mining strategy that has been pre-programmed
    in the Satoshi reference miner.^([^(299)](#fn299)) This means that if a miner
    discovers a block and at the same time another miner discovers a competing block,
    the miner will not simply switch to the other block. Instead they will keep on
    mining on their own chain. This because neither of the miners knows which of the
    two blocks will be the one that the majority of the miners continuing mining.


    You can understand that this is not the most optimal way of working, as hashing
    power and energy are lost when mining several blocks at the same time and when
    other miners are building on top of conflicting chains. To solve this issue, several
    algorithms have been proposed, such as `DECOR` and `GHOST+DECOR`.'
  raw: '### Crypto Futures Trading


    For those of you who are interested: futures trading has also entered the world
    of cryptocurrencies. In December 2017, the Chicago Mercantile Exchange launched
    the first Bitcoin futures contract.^([^(291)](#fn291)) These futures were cash
    settled, meaning that at the end of the contract, one has to compare the current
    market value to the agreed upon price, after which there is a transfer of the
    value. These types of contracts are often used to smooth out the risk that an
    investor (or miner) has by holding a certain amount of a tokens (in this case
    Bitcoin). However, these can also be used by speculators who want to bet on the
    price movement of cryptocurrencies.


    In a market where accusations of market manipulation already exist, you should
    take into account the extra risk you face by holding such contracts. Other criticism
    also refers to the fact that cash-delivered futures don’t force investors to actually
    hold the altcoin in hand, which leads to the fear that this could lead to the
    dilution of the market supply. There are also physically delivered futures, such
    as those provided by Bakkt.^([^(292)](#fn292)) Upon settlement, there is a “physical”
    exchange of Bitcoin between the participants. Kraken has futures on Ethereum,
    Litecoin, Bitcoin Cash, Ripple, and Bitcoin.^([^(293)](#fn293))


    As this book does not focus on options trading, I will not go into the details
    of going short, long, and margin calls. All I can do is issue a warning for those
    who want to enter this type of market. It is a market that can provide liquidity
    and offer hedging instruments to existing positions, but it can also introduce
    a whole lot of risk if you speculate on future prices.^([^(294)](#fn294)) As with
