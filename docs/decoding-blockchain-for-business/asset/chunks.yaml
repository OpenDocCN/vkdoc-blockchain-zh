  trans: '

    # 亚洲的税收与加密货币监管


    根据不同主题，你可以发现加密货币在亚洲的普及速度比全球其他任何地方都要快。需要注意的是，每个国家对这一话题都有自己的看法和处理方式。


    在加密货币领域做出大量努力的国家之一是新加坡，新加坡金融管理局希望避免对加密货币进行直接监管。其目标是建立一个围绕加密货币的监管框架，而非直接监管加密货币本身。然而，比特币可能面临双重征税问题，即在购买时和使用其购买商品或服务时均需纳税。^(¹⁸⁹)
    作为亚洲乃至全球主要的区块链中心之一，尽可能保持监管的开放性似乎是该国的目标之一。


    中国监管机构也对区块链技术的兴起做出了回应。中国并未像其他国家预期的那样全面拥抱这项技术，而是利用其某些部分为自己谋利。^(¹⁹⁰) 像阿里巴巴和腾讯这样的大公司一直在研究如何应用这项技术来改进工作方式。那么，这里与世界其他地方有何不同？根据新规，提供“区块链信息服务”的“实体”需要向政府注册并收集用户信息，这实际上削弱了最初构成区块链基础的一些基本概念。对中国政府而言，这可以成为在数字信息、身份和交易方面进一步加强对公民控制的工具。


    印度政府已着手为区块链技术建立监管框架。该技术的潜力和基础设施需求要求建立这样的框架。^(¹⁹¹) 印度实施的一个应用案例是在沙姆沙巴德地区试点的区块链房产登记系统，以及在特伦甘纳邦开发的
    KYC 解决方案。加密货币的使用则是另一回事，因为使用此类代币可能导致罚款和监禁（基于拟议的制裁措施）。因此，尽管印度有一半的邦已启动区块链技术项目，但加密货币这一概念本身却被央行禁止。^(¹⁹²)
    然而，这个话题仍然争议很大，印度及其央行的立场可能会随时间推移而改变（部分原因是公众压力）。


    另一个领先的区块链采用者是日本。日本已表现出非常愿意采用这项技术的态度。^(¹⁹³) 日本采用率较高的一个重要原因是政府的立场。在许多政府视为潜在颠覆因素的地方，日本却看到了能够增强现有流程和基础设施的技术。其监管的设立方式进一步推动了区块链行业的发展，同时保护其公民免受可能的意外事件影响。日本对加密货币有明确规定：什么是加密货币、销售代币、如何征税，以及反洗钱法规是什么。这为那些希望在其分布式账本应用方面取得进展的公司创造了确定性。


    一个对加密货币持非常负面立场的国家是越南。在那里，使用加密货币作为支付手段被严格禁止。与此同时，加密货币资产的其他监管框架仍然缺失。


    柬埔寨采取了类似立场，但没有明确的监管方案。柬埔寨证券交易委员会、柬埔寨国家银行和国家警察总署联合发布声明称，如果制定监管规定，他们将参与其中。未经许可，购买、出售、交易、传播或结算均被视为非法。然而，迄今为止，尚无许可制度，这意味着在该国开发加密货币仍然是非法的。^(¹⁹⁴)


    老挝发布了关于加密货币的两份通知和一份警告。第 314/BOL 号通知鼓励国民更多地了解加密货币。同一份通知明确指出，当前没有监管框架，国民不得将加密货币用作货币或用于偿还债务。第
    382/BOL 号通知也禁止金融机构参与加密货币相关活动。


    印度尼西亚早在 2018 年就禁止了加密资产，但到年底，贸易部发布了第 99 号条例，正式将加密货币归类为商品。^(¹⁹⁵) 商品期货交易监管局（BAPPEBTI）是监管该国加密资产交易的主要机构。第
    5 号和 9 号条例帮助实现了加密资产买卖的合法化。其他相关机构包括专注于反洗钱的印尼金融交易报告与分析中心（PPATK）和印尼银行。


    作为互联网接入速度的世界领先者，且拥有超过 92%的互联网用户，区块链在韩国显然潜力巨大。^(¹⁹⁶) 然而，由于近年来首次代币发行的诸多滥用行为，政府自
    2017 年起对其发布了禁令。同样，加密货币有时被视为对国家经济的威胁。釜山设立了一个“无监管”区，在该区域放宽了一些限制，以便在某些情况下进行实验。


    缅甸仅发布了一份官方声明，由缅甸中央银行发布，声称缅甸央行是唯一发行和管理本国货币的机构。因此，加密货币在该国不被承认为支付手段。同样，金融机构也被禁止买卖或兑换加密货币。


    在制定明确的加密货币监管框架方面，泰国目前是东南亚的领导者。2018 年《数字资产企业紧急法令》有助于规范所有与加密货币相关的活动。数字资产被视为商品，需缴纳
    7%的增值税，出售数字资产的资本收益需缴纳所得税。对首次代币发行门户（电子系统提供商）和数字资产业务设定了明确要求。


    当我们看向中东时，会发现一些差异，一些国家采取的行动比其他更多。沙特阿拉伯、巴林和黎巴嫩对区块链技术表现出浓厚兴趣，并正在引领该地区的发展。与其他地区和国家的关键区别在于，区块链解决方案的应用主要是自上而下推动的。^(¹⁹⁷)
    例如，沙特阿拉伯和阿联酋发行了名为“Aber”的数字货币，旨在促进两国之间的金融结算；以及迪拜的 emCash 货币。由于这些发展，监管也成为热门话题。阿联酋已采取措施警告投资者加密货币的相关风险，同时提供一个将数字代币视为证券的监管框架。第二个例子是阿布扎比，金融监管机构批准了
    Arabian Bourse，使其能够运营一个成熟的加密资产交易所和数字托管机构。该地区的其他国家，如沙特阿拉伯、埃及和科威特，也正在迅速跟进，其监管机构已开始设计考虑加密货币的框架，并改变了之前的立场（此前加密货币被认为不符合伊斯兰教法）。

