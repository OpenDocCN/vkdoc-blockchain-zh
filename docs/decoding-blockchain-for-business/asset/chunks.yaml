- fmt: '## Risks and Disadvantages of Blockchain Platforms


    However, there are also risks to consider when you look into decentralized architectures
    based on blockchain platforms. Currently, the blockchain technology is still new,
    so no organization has all the knowledge in-house needed to develop a complete
    IT architecture end to end. It therefore has to rely on vendors in the market.
    These vendors should be looked at with scrutiny. You could face the risk of vendor
    lock-in, even though the entire idea of blockchain platforms steps away from classic
    competition models. It doesn’t mean that this is the reality.


    A major risk is the private-public key used in blockchain platforms, where on
    the one hand, the theft of a private key can enable the thief to sign transactions
    on the blockchain system. There is, in most cases, no multi-factor authentication
    yet, leading to a major security vulnerability that hasn’t been dealt with. On
    top of that, the loss of a private key cannot be simply “recovered” and can lead
    to the loss of funds, data, and the control over the account itself. Imagine building
    an entire infrastructure to simply lose control over (a part) of it in a second.
    You wouldn’t want a disgruntled employee to have access to such data, as the consequences
    could be disastrous. There is also the legal and compliance framework, where there
    is still a lot of uncertainty with the possible legal pitfalls.^([^(19)](#fn19))


    Other possible disadvantages are the inability to perform changes to the data.
    This can be seen as an advantage, when you need to perform modifications, but
    this almost certainly leads to a hard fork in the network. A final pitfall that
    you have to consider are the storage requirements. It doesn’t matter how you look
    at it, the storage requirements for the nodes will grow over time. As you are
    dealing with a decentralized network, this means that several nodes need to replicate
    the storage of the network. Although you can create networks in which certain
    data is removed from the nodes, this will grow over time and it is a cost to consider,
    whether you like it or not.^([^(20)](#fn20))


    Despite all the disadvantages listed here, the blockchain technology really can
    support Internet of Things (IoT) designs to grow in scale for major corporations.
    By effectively implementing a decentralized platform from the very beginning,
    this could help companies scale their solutions in a cost-effective way while
    at the same time considering the security of their network. If you take into account
    the possible disadvantages and use a risk-based approach, where you carefully
    consider each step of the design, you could end up being a front-runner in the
    IoT landscape and reach even more possible customers. You can also focus on further
    innovation and design. It is up to the bold and the willing to take these risks,
    but the payoff could be tremendous in the long run.


    ## Blockchain and Artificial Intelligence


    Another term that has taken the world by storm is *artificial intelligence* (AI).
    How you want to interpret AI is up to you, but the link to the blockchain technology
    is undeniable. While you might not immediately see the connection between the
    two, as they have completely different developing parties and applications, there
    certainly are overlaps.^([^(21)](#fn21)) So where is the link? Both techniques
    and underlying technologies focus on the use of data. Where the blockchain technology
    focuses on the safe encryption of data in a decentralized, immutable ledger, the
    AI and machine learning industry focuses on the development of engines that enable
    analytics and decision making based on that same data. When implemented in the
    correct way, clear synergies can be reached between the two technologies.


    The blockchain technology can be used to create data markets, which in turn could
    be great enablers of the AI industry. They can deliver a sustainable supply of
    data, which is so vital to this new and growing industry. There have already been
    some cases in which AI algorithms were integrated within the blockchain platform
    (an interesting example is Aeternity), or where the outcomes of computation were
    made available to researchers and the industry to be used in future development.
    You can also turn this logic around and understand that blockchain platforms can
    create a clear trace of which decisions were taken by machine learning algorithms
    and at what moment. If you have a clear set of variables and the decision based
    on these variables, this can in itself lead to further analysis and optimization
    of the developed applications.


    Other implementations focus for instance on the computing power that is being
    used for the proof-of-work algorithms. This massive amount of computing power
    could also be used to train new algorithms and models. It can be seen that several
    of the companies that focused on blockchain mining farms are now also turning
    toward the AI industry and offering their computing power for their services.
    Again, we can turn the logic around and look at the proof-of-work algorithms themselves.
    While most of them currently have a “brute force” approach, where large amounts
    of processing power is needed to crack mathematical algorithms, with the use of
    machine learning, these proof-of-work algorithms could be tackled in a more intelligent
    way, reducing the processing power needed by these blockchain networks.


    You could also use the blockchain technology as the underlying decentralization
    layer for AI agents that can interact with users. With the decentralized layer,
    the machine learning algorithms could have a nonstop source of world data without
    a central entity controlling what data is coming in and how the agents evolve.
    This could help improve algorithms and how the AI agents respond to the world
    around them and improve their accuracy. In that same vein, the blockchain technology
    allows for the encryption of data that is stored on top of it. If you work with
    sensitive data (think health, personal, or financial data), you could develop
    applications in such a way that only the machine algorithms could train or respond
    to the data, without any human participant needing to access it. This allows for
    a secure layer in which one can store and upload data, to get a response from
    the AI agent without having to worry about possible security risks underlying
    their personal data. As mentioned, it could also help create decentralized marketplaces,
    where individuals are actually rewarded and receive compensation for sharing their
    personal data. Smaller companies could enter the marketplace without having to
    compete with bigger tech giants over the data and at the same time prevent big
    corporations from abusing the data of individuals without them knowing what is
    happening.'
