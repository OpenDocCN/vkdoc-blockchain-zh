  trans: '

    ### 教育


    该领域面临一系列重大挑战，例如行业的开放性问题。每个人都能接受教育，这是一个合理的准则。但现实情况却截然不同。遗憾的是，时至今日，仍有许多人没有平等的机会，无法像他们本应拥有的那样参与到教育体系中。除此之外，优质教育的成本多年来持续上涨，导致巨额债务，甚至让许多人根本无法开始他们理想中的学业轨道。教师们也会告诉你，愿意积极参与课堂的人数正在下降，而且在许多国家，教育专业人士普遍短缺。


    然而，未来并非一片黯淡。教育技术领域出现了一波有趣的崛起。虚拟现实和人工智能等新技术正被轻松整合到课堂中，区块链技术也有一席之地。这些解决方案不会解决困扰教育行业的所有问题，但它们正在改变知识共享的方式，并可能为当前的困境带来希望。`edtech`
    行业^(¹³⁰)预估在 2020 年将达到 940 亿美元，这表明我们应该认真对待这个行业。


    区块链技术发挥重要作用的首个领域是颁发文凭或证书。越来越多的数字课程已经面世，且（通常）价格低廉或合理。实际的文凭本身可以通过区块链平台进行发行和链接。这能带来若干好处。首先，再也无法质疑学生是否获得了他的文凭。其次，学生可以轻松地与潜在雇主分享其证明，并完全掌控自己的个人数据。人们将无法伪造或谎报文凭。^(¹³¹)教育机构和/或政府之间的信息共享将变得容易得多，学分、赞助和成绩都可以轻松得到验证。同时，与许多大学或学校当前的能力相比，它提供了一种更安全的存储信息方式。许多其他行业也因资源有限、无法在网络安全或凭证存储上投入大量资金而深受其困。通过使用分布式账本，他们可以更好地保护这些信息。


    我们之前已经多次提及，但教育成本高昂且似乎仍在不断增长。为了改善通往有价值学位的路径，已经发起了几项举措。其中之一是 MOOC（大规模开放在线课程）的发展。2018
    年，MOOC 的注册用户超过 1.01 亿，这表明越来越多的人正转向这个方向进行深造。^(¹³²)在这里，区块链不仅可以用于存储凭证，还可以利用微支付、自动化考试与课程交付的智能合约等技术。在向学生和图书馆服务共享信息的方式上也蕴藏着潜力。区块链技术能够以更实惠、更符合社会规范的方式帮助分发信息。^(¹³³)


    一家专注于教育和分布式账本技术的初创公司是 `Disciplina`。^(¹³⁴`它专注于考试准备和学习。


    ### 人力资源


    在任何公司中，人力资源或 HR 职能都承担着广泛而重要的工作。企业与供应商、人员、活动及流程之间的沟通，均由该部门进行协调。目前，报纸上经常谈论的是，HR
    和招聘专业人士在许多不同领域正在参与一场“人才争夺战”。我们不应低估该行业许多人感受到的压力，并且，一如既往，我们可以假设区块链技术能够在某种程度上缓解这种压力。^(¹³⁵)


    试想一下，利用智能合约，内部人才管理和外部人才寻源的管理可以在一定程度上实现自动化。预算审批、授权和审查一样，都可以与严格的规则挂钩。新员工可以接受自动化测试和培训。公司政策可以轻松共享，数字签名可以在区块链平台上得到验证。背景调查和雇佣核查只需轻轻一点即可完成。


    同样，雇佣合同也可以通过这种方式进行管理、存储并与员工共享。未来的变更可以随时进行管理和追踪。薪资和福利可以在区块链平台上完全自动化处理，无需任何人工干预，从而简化支付流程、提供可验证的付款记录，并留下完美的审计痕迹。


    外部人才可以通过同一个平台进行联系、签约和支付。在居家办公和远程办公日益成为社会常态的世界里，他们可以更轻松地被管理。与许多其他例子一样，区块链有助于防止欺诈，提升个人数据的安全性，并通过网络节点的验证来提供存证服务。^(¹³⁶)


    ### 汽车工业


    随着联网汽车、车队和自动驾驶汽车的兴起，汽车工业对互联互通的需求日益增长。这些联网车辆需要能够接收这些信号的基础设施。该行业目前正在研究区块链技术能否作为一个清晰的基础设施层。当前的问题在于，每个制造商都在创造自己相互竞争的技术，缺乏统一标准，导致这些实施方案不协调、不兼容且造成浪费。^(¹³⁷)随着越来越多的物联网解决方案应用于这些轿车和卡车中，我们在车队管理、支付服务、车载信息娱乐系统及其他服务方面可以实现巨大的优化。


    区块链可以帮助大型企业管理车辆。再次强调，透明度可以得到提升，整个车辆管理和来源验证的流程将因此得以简化。你还可以考虑保险和支付流程、车辆来源验证，甚至`KYS`（了解你的供应商）流程——这些流程对于证明车辆并非被盗、且由卖方负责至关重要。同样地，我们必须能够核实车辆进行过的维修。我们能信任执行这些维修的任何人吗？维修前的车况如何？报告的里程数是否准确？^(¹³⁸)所有这些问题都可以通过使用分布式账本来回答。

    '
- fmt: '### The Smartphone Industry


    You might not immediately think about it, but mobile phones can be changed by
    using the blockchain technology. Smartphone producers from all over the world
    have heard the calling of the decentralized web, with one of the biggest players
    being Samsung.^([^(139)](#fn139)) The Galaxy S10 is one example that includes
    a secure storage system for cryptocurrency private keys. Other players are HTC
    with the Exodus 1, Sirin labs with Finney, and Electroneum.


    As we discussed earlier when we were talking about the technological aspects of
    the blockchain technology, these platforms allow for decentralized applications.
    These applications form the basis of web 3.0. The idea is that we once again move
    away from centralized servers from large corporations and allow peer-to-peer technologies
    between the smartphones themselves. So what has stopped these applications from
    becoming mainstream?


    Several issues come to mind, such as scalability and regulatory uncertainty. Another
    issue is that, to use decentralized applications, you need to be tech savvy. If
    a company could get around these technical impediments, they could not only allow
    decentralized applications to become mainstream, but also open up a new world
    to customers all over the world.


    # Blockchain and Regulation: The Legal World


    As blockchain entered the world with new possibilities concerning data and financial
    instruments, it has taken decision makers a lot of time to consider the technology
    and introduce regulation that is both relevant and necessary to protect people
    from this technology. This chapter includes a short introduction to the major
    concepts that are currently being debated when it comes to the distributed ledger
    technology.


    When we look at the blockchain technology and regulation, we find ourselves in
    murky water. Regulation on the subject often changes all over the world. Depending
    on the aspect of the technology (`ICOs`, cryptocurrencies, distributed ledgers,
    etc.), there might be different perspectives within the same country or region.
    So my aim is not to write an exhaustive overview of current regulation. Read this
    chapter only as a guideline to the existing regulation and certainly not as fixed
    truth!'
