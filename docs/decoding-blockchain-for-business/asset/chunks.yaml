  trans: '

    ### 加密货币市场


    加密货币市场是一个波动性极高的市场，近年来以剧烈涨跌为特征。与其他金融市场不同，加密货币市场的特点是其去中心化属性。这意味着它们依赖于点对点市场，交易通过节点传播并最终存储在区块中。这也意味着没有中央机构或政府为这种货币提供背书。


    与其他市场类似，供需法则影响着加密货币的价格。代币总数量及其发行或销毁的速度是主导供应端的主要因素。有些加密货币如 `Bitcoin`，总供应量有限（仅能挖出
    2100 万枚 `Bitcoin`，此后由于网络算法中设定的限制，挖矿将变得不可能）。这与 `Ethereum` 完全不同，后者对可挖出的 `Ether`
    总量没有上限。`Ripple` 则是第三个例子，其加密货币会分多轮发行。


    市值（供需关系）是决定加密货币价值的第二个因素。投资者对某种加密货币的兴趣越浓，需求就会越高，进而推动该加密货币的价值上升。其他影响因素包括加密货币在（线上）商店和电子商务支付系统中作为可用支付手段的整合程度。某种特定加密货币的普遍接受度越高，其本身价值增长的可能性就越大。


    监管变化——例如接受加密货币作为合法的支付或投资手段、为 `ICO` 建立框架、以及进一步推动区块链基础设施投资——会极大地影响加密货币的价值（正如我们在
    2018 年崩盘时所看到的）。其他因素包括媒体报道、投资者接受度以及有趣的区块链应用案例的增长。最后，对诱骗投资者投资于不存在的加密货币、创建虚假 `ICO`
    并窃取投资者资金的行为进行追查，也会进一步提升合法加密货币的价值。


    加密世界的第二个方面是加密资产的存在。加密货币是加密资产的一个方面，但还有其他可交易的数字资产。除了加密货币，还有平台代币（或称加密商品）、实用型代币和交易型代币。`Ether`（来自
    `Ethereum` 网络）被视为一种平台代币，因为该平台可用于创建去中心化应用。实用型代币存在于其他平台（如 `Ethereum`）之上。这些代币是围绕特定使用场景开发的。最后是交易型代币，例如
    `Ripple`、`IOTA` 和 `Stellar`。这些代币用于实现跨境支付。


    除了加密货币，衍生品交易也应运而生。这些金融工具与加密货币的价值及其随时间的变化息息相关。市场上还有期权等其他高风险但承诺高回报的工具。如果这些工具被大量使用和交易，它们可能会在本已动荡的市场中引入更多不确定性。


    你应该明白，人们会不断寻找创造新金融工具的方法。理解这些工具及其所在的市场，对任何投资者都至关重要。


    ### 核心加密货币概念


    在本节中，我们将介绍如果你决定进入加密货币市场，几乎肯定会听到或读到的核心概念。理解这些核心概念不仅有助于你更好地理解这些市场，也有助于理解这些市场可能存在的问题。


    #### 原子交易


    原子交换是指在没有交易所等第三方参与的情况下，在点对点之间发生的加密货币交易。首次原子交换发生在 2017 年 9 月 20 日，在 `Decred` 和
    `Litecoin` 之间进行。^(²⁵⁵) 这些交易可以通过多种方式进行——要么直接在各自拥有不同原生代币的独立区块链之间进行，要么通过链下通道进行。这些不同加密货币之间的交易使得整个加密货币系统更加灵活。


    随着原子交换的出现，我们迎来了一个可能实现免手续费交换的世界。这些（链上）交换之所以能够发生，是因为参与者基于一个共享秘密进行协作。类似于 `Lightning
    network`（一种建立在 `Bitcoin` 网络之上用于提升可扩展性和交易速度的网络），这里我们同样使用哈希时间锁定合约（`HTLCs`）。简而言之，当两个参与者想要交换两种不同类型的加密货币时，他们需要开通一个支付通道。第一个参与者创建一个支付地址。该地址由第一个参与者存入一笔资金，随后会生成一个数值。这个数值就是钥匙，而该数值的哈希值则是锁。第一个参与者将哈希值发送给第二个参与者。第二个参与者生成一个地址，但使用了他们收到的哈希值来完成此操作。然后，他们将他们的代币发送到第二个地址。


    还在跟上吗？好吧，只有第一个参与者能够通过使用他们的数值来解锁第二个地址。这可以通过签署针对第二个参与者地址的交易来实现。同样地，第二个参与者签署针对第一个参与者地址的交易。有一个问题：第二个参与者没有数值来解锁他们的新代币。当第一个参与者签署他们的交易时，这个数值就会被揭示出来。这样，第二个参与者就能解锁该账户。


    这里的假设是，两种货币都支持哈希时间锁定合约。此外，它们需要有相同的哈希算法。如果不满足这些条件，这两种货币之间就无法进行原子交换。当然，可以尝试通过多个步骤来实现交换（`BTC`
    和 `ETH` 之间无法直接交换，但可以通过 `DOGE` 来实现）。链下交易则通过诸如 `Lightning network` 之类的第二层协议进行。


    在实践中，`Komodo` 平台和 `blockchain.io` 都专注于多方之间的原子交换。

    '
- fmt: '# The ICO


    The ICO (initial coin offering) is the crowd sale of new cryptocurrencies to possible
    investors.^([^(256)](#fn256)) In the past years, there was almost regulation making
    it an attractive way to lure investors. However, this has also allowed a number
    of conmen to enter the scene, certainly during the high days of the crypto-bubble.
    Investors were no longer thoroughly checking about what they were investing, and
    just wanted to profit as well from the major profits that were being made in the
    crypto-market. Some of the ICOs were purely based on ideas, without anything else,
    and were able to reap in millions without anything concrete to match. Some of
    these projects became a success, but most ICOs that had nothing than an idea behind
    them led to nothing. To give you an idea, in about 4.5 months in 2018, 6.3 billion
    USD were raised with ICOs! Table [5-1](#497553_1_En_5_Chapter.xhtml#Tab1) shows
    some of the biggest ICO scams (to date).^([^(257)](#fn257))


    **Table 5-1** Biggest ICO Scams to Date


    | Scam Name | Amount of Money Scammed (USD) |

    | --- | --- |

    | Pincoin and iFan | 660,000,000 |

    | CentraTech | 32,000,000 |

    | Onecoin | 30,000,000 |

    | Plexcoin | 15,000,000 |

    | Bitcard | 5,000,000 |

    | Opair and Ebitz | 2,900,000 |

    | Benebit | 2,700,000 |

    | Bitconnect | 700,000 |

    | Confido | 375,000 |

    | REcoin and DRC | 300,000 |

    | Ponzicoin | 250,000 |

    | Karbon | 200,000 |


    Does this mean that every ICO is a scam? Of course not, but just as with regular
    investments, it is up to you to perform due diligence, concerning the projects
    and the companies behind an ICO, but also concerning the regulation and the possible
    pitfalls. This relates to personal liability as well (remember the DAO case!).
    Research the development team behind an ICO project as well. It is not an uncommon
    tactic to invent fake founders and biographies to give a project more legitimacy.
    Even if the development team is real, is their experience real?^([^(258)](#fn258))
    Next, read the whitepaper thoroughly. Is the documentation reasonable? Can they
    achieve what they want to achieve? Do you see this project going somewhere? And
    even if there is a convincing whitepaper (as was the case with Plexcoin), do not
    immediately trust them. Another red flag is if you cannot clearly follow the ICO
    process. For a legitimate company, it shouldn’t be too hard to show how the process
    works and show the progress during the sale. If they hide this or make it extremely
    difficult to understand, you should know something is wrong. But finally, and
    I cannot state this clear enough, always exercise caution when considering investing
    in an ICO. Getting rich quick is always a nice idea, but the likelihood of it
    happening is really small. If something sounds too good to be true, it probably
    is.


    While the first ICO ever was probably the sale of Ripple in early 2013, it was
    the Ethereum ICO in 2014 that was able to draw the public’s attention, because
    it raised 18.4 million USD. What did the investors receive in return? More often
    than not, the answer is “tokens,” which can refer to value, stake, voting rights,
    or anything else for that matter. When you ask the SEC (Securities and Exchange
    Commission), there are only two types: security tokens and utility tokens.


    Security tokens are identified using the Howey test, which consists of three questions:


    - Is it an investment of money?

    - Is the investment in a common enterprise?

    - Is there an expectation of profit from the work of the promoters of the third
    party?


    If not all these questions can be answered positively, you are dealing with a
    utility token. These tokens give holders the right to use the network or take
    advantage of the network by voting.


    So why do projects start an ICO in the first place? Most importantly because they
    wouldn’t be able to start an IPO (initial public offering). The ICO allows them
    to have a shot at their project, without having to go through all the regulatory
    requirements linked to an IPO. But probably the most important advantage is the
    strong link that is created between a project and the community. As most of these
    projects also need that same community to exist and flourish, ICOs deliver the
    perfect platform to create a mutual, beneficial relationship. Table [5-2](#497553_1_En_5_Chapter.xhtml#Tab2)
    shows the ICOs with the highest returns to date.


    **Table 5-2** ICOs with the Highest Returns to Date


    | Name | ROI |

    | --- | --- |

    | NXT | 1,265,555% |

    | Iota | 424,084% |

    | NEO | 378,453% |

    | Ethereum | 279,843% |

    | Spectrecoin | 149,806% |

    | Stratis | 102,338% |

    | Ark | 37,805% |

    | Lisk | 26,367% |

    | DixigDAO | 12,044% |

    | QTUM | 9,225% |


    However, you should also consider the disadvantages, and there are quite a few.
    As mentioned, there are scammers out there who are waiting to take advantage of
    people not looking into the details. On top of that, even if the development team
    behind a project is genuine, 90% of startups still fail! Another disadvantage
    is the appearance of “crypto-whales,” which are investors that immediately buy
    huge bulks of the ICO, cutting in line by paying high amounts of transaction fees,
    thereby destroying the idea of decentralization. An example is the BAT ICO, where
    35 million USD was raised in 24 seconds by a few investors.


    A fourth disadvantage is the popularity of certain ICOs that effectively clog
    up the network, thereby preventing investors from participating or even completely
    cutting out the ICO! Finally, I should also mention the security of ICOs and security
    platforms as a whole. In the past, several infamous hacks have taken place, leading
    to the theft of millions. Due to the nature of cryptocurrencies, there will always
    be security measures that you have to take into consideration and certainly with
    something that is new or untested, you can imagine that there are flaws that have
    been overlooked by even the best developers.


    Even though ICOs still take place, you should also know that regulatory bodies
    are taking a deeper interest in them. The SEC forces new ICOs to declare if they
    are a security and China and India have banned ICOs all together. Within the EU,
    the ICOs have to meet the AML/KYC regulations that are in place. It is seen as
    a high-risk investment that should be strongly regulated to protect the investors.
    However, the EU believes that it should support innovation and has therefore not
    banned the practice.^([^(259)](#fn259)) The future will show how regulation changes
    over time and how ICOs might evolve.'
