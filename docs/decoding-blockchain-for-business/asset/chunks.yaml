- fmt: '### The Cryptocurrency Crash


    This section discusses the cryptocurrency crash (also known as the Bitcoin crash
    or the great crypto crash). A huge sell-off took place in January 2018, leading
    to a crash in the value of Bitcoin by about 65 percent. A lot of other cryptocurrencies
    crashed even harder and in some cases completely disappeared from the map. Of
    course, to have a crash, there first has to be some kind of boom. In the years
    leading up to 2017, there had been a steady increase in the value of Bitcoin and
    other cryptocurrencies. In 2017, there was an unprecedented boom in cryptocurrencies
    and their values. All major institutions and investors seemed to be involved in
    the cryptocurrency markets, leading to results such as that of Bitcoin, which
    had grown 2,700% in value in 2017!


    This lead to many small investors being interested in cryptocurrencies, some who
    also wished to enter the cryptocurrency market and take great risks. This attracted
    a lot of con artists who wished to take advantage of gullible investors or those
    who wished to get rich quick, as some others had done in the beginning of the
    cryptocurrency markets. As there was no clear legal framework, a lot of initial
    coin offerings (ICOs) were launched, rounding up bigger and smaller investors,
    which eventually led to abuse and theft of funds.


    For those of you who aren’t familiar with the term ICO, it is a type of funding
    where cryptocurrencies are used. These cryptocurrencies can become functional
    units of currency in case the funding goal is met and eventually the project is
    successful (which is a big if). To give you an idea, only about half of all ICOs
    tended to survive longer than four months in the years 2017 and 2018, and still
    over seven billion USD were raised via ICOs in the first half of 2018 alone! Other
    schemes involved “pump-and-dump” scenarios, where a couple of people would create
    transactions between one another, to give the impression of market interest and
    value. Other investors would invest in the altcoin as well, after which the original
    participants would start dumping their holdings, leaving the investors with worthless
    coins.


    A final important aspect that one should take into account is that most of the
    altcoins being launched are grounded in startups. And as anyone knows, startups
    also tend to fail and with it the cryptocurrency they launched. All of this created
    a very volatile market in which investors thought they were outsmarting others
    or could hold out just a bit longer. Even though warnings kept predicting a major
    bubble, this didn’t stop most of these investors.


    To give you an idea of the timeline, on December 17, 2017, Bitcoin reached a price
    of $19,783.06. A couple of days later, on the 22th of December, the price fell
    below $11,000, which was only one of the many cryptocurrencies dropping to all-time
    lows. The bad news didn’t stop, as rumors regarding possible bans of trading in
    cryptocurrencies in South Korea led to even more sell-offs. On January 28, 2018,
    there was a major hack of CoinChck, which was at the time Japan’s largest cryptocurrency
    OTC market (over-the-counter market, where seller and buyer interacts directly),
    which led to a loss of 530 million USD of NEM (a blockchain development platform
    written in Java). Other cryptocurrency exchanges were dealing with hacks and irregular
    trades, leading to even more distrust in the market and investors seeking refuge
    from the highly volatile cryptocurrency markets. By September 2018, the cryptocurrency
    market had crashed to less than 80% its original value. This made it officially
    worse than the dot-com burst that had led to a drop in market value of Internet-related
    companies from their peak in March 2000, to their low in October 2002, which was
    about a 78% drop.


    Now you know the story, or at least part of it. A story like this one has many
    different perspectives that one needs to take into account. The most important
    aspect that I would like you to remember is that none of these issues has anything
    to do with the blockchain technology itself. Some projects might have failed with
    certain startups because they were implemented incorrectly. As with any technology
    and any application, mistakes can be made. Again, this doesn’t mean that there
    is an issue with the underlying technology. Rather, it could be due to people
    not understanding the technology or how they should implement a blockchain project.


    The reasons for the crash were to a large extent financial, as with any bubble,
    but the scrutiny regarding the blockchain technology has remained. This means
    that people have become very skeptical about distributed ledgers and, rather than
    looking into the possibilities of the technology, they declare that they have
    lost “faith” and wonder why one should “still believe.” As I stated, there are
    reasons to question whether you should implement a blockchain platform, but believing
    in the underlying concepts shouldn’t be one of those.


    ### Now


    The cryptocurrency crash has led to major distrust. Since that major crash, other
    crashes have happened over the last couple of years. Other scandals also have
    occurred in the field of cryptocurrencies. (The stablecoin Tether is a prime example.
    Over a four-year period there have been scandals regarding its parity with the
    USD. There have been problems with audits, independence, allegations of price
    manipulation, and more. We go in more detail about this issue in the final chapter.)
    Still, those who really want to do something with blockchain haven’t been waiting
    around and have made taken steps in developing new and exciting implementations.
    All of this has led to an entire industry of its own, with new developers and
    architects taking a more prominent position in the new IT landscape. Facebook
    is trying to launch its own coin with the creation of Libra and other major payment
    providers are trying to get in the market as well. As Ripple and others are transforming
    entire industries, blockchain and cryptocurrencies are here to stay, for better
    or for worse.


    The blockchain world has become much larger than we ever predicted, and it keeps
    on increasing. You have the “classic” open implementations such as Bitcoin and
    Ethereum. There are currently also “closed” implementations such as Hyperledger
    Fabric and Hyperledger Sawtooth, which allow you to create consortiums between
    selected groups of partners that work together. However, don’t be surprised if
    you are confronted with terms such as DAGs (directed acyclic graphs), MerkleDAGs,
    BlockDAGs, and others. These are all new and exciting ways to implement decentralized
    networks, and they all want to achieve the same end goals as the blockchain technology.
    We will provide high-level descriptions later to give you an idea of how these
    work and in which industry you might adopt or implement a certain platform. For
    now, we focus on the possibilities of the technology. We will look a bit deeper
    into the cryptocurrency market as well, but this is certainly not the goal of
    this book.


    Recently we have faced a world crisis, with a pandemic bringing down many a country
    and forcing us to live in quarantine. This was combined with an economic crisis
    unparalleled in the history of the world. Many projects were stopped, or at least
    put on hold, and a lot of people even ended up (temporarily) unemployed. In times
    like these, people are pushed to the edge, not only to stay safe but also to maintain
    their standard of living. It is in those same times that people become most creative
    and some even dare to take risks they normally wouldn’t take. I wouldn’t be surprised
    if we see new applications and startups appearing in the coming months (not only
    in the field of blockchain technology) that will astound the world with their
    new take on existing problems.'
