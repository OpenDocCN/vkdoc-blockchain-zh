  trans: '

    在列举了所有这些示例后，我们还需要考虑与基于区块链的应用相连接的链下数据库。这或许能为围绕存储在真实链上交易中的个人数据的讨论提供一个解决方案。当您将个人数据保存在链下数据库中时，处理这些数据会变得容易得多。交易本身所包含的数据，可能仅包含用于访问此独立数据库中个人数据的信息。^(²³⁵)
    另一种可能有助于解决围绕个人数据和区块链应用讨论的技术，是使用零知识证明，该技术在不共享实际数据的情况下提供证明。这可以解决合作伙伴之间关于数据最小化和数据可验证性的问题。^(²³⁶)
    降低身份识别可能性的第三种策略是使用隐身地址。这些地址是为单次交易而生成的，并依赖于经过哈希处理的临时密钥。通过使用这项技术，您可以考量“动机性入侵者”测试，即几乎不可能识别参与者，因为你无法简单地将交易关联起来以识别自然人。第四种可用于实现“匿名化”的技术称为同态加密。这种技术允许对密文进行计算，即加密数据可以进行计算，并且生成的结果与对未加密数据执行计算的结果相同。^(²³⁷)
    就其本身而言，这不会导致符合《通用数据保护条例》（GDPR），但如果结合这里描述的其他一些技术，它可能会使应用跨越被视为匿名化的门槛。其他可能的解决方案可能来自状态通道，在这种通道中，信息仅在发生争议时才会与外部方共享；^(²³⁸)
    环签名，通过将交易绑定到多个私钥来隐藏交易；或者在数据中添加噪声，方法是将多笔交易合并在一起（您在本书中已经看到了这项技术的几个示例）。显而易见，只有结合其中几种技术，您才有可能实现
    GDPR 合规，但同样，这一点至今仍存在不确定性。


    一些人提出的一个想法是使用带有临时陷门的变色龙哈希函数，这将允许创建可编辑的区块链，其中的数据之后可以被调整或修改。^(²³⁹) 尽管这可能会实现 GDPR
    合规，但既然如此，为什么还要使用区块链应用呢？可以设想其他技术在区块链环境中保护个人数据，但就目前而言，这些技术都运行在法律不确定的环境中。一些评论也指出，当我们考虑其他现行法规和政策（如反洗钱、反恐融资等）时，上述描述的技术也可能导致不良后果。


    当我们审视区块链应用中个人数据的处理时，同意是另一个可能的问题。GDPR 法规并未规定任何具体形式或要求，但明确指出，预先勾选的方框或沉默不能被视作同意的一种形式。^(²⁴⁰)
    同意还必须覆盖将要进行的所有处理活动，因此必须就一方打算进行的每一种处理形式分别给予同意。您还应该知道，在电子环境中，请求同意必须清晰、简洁，且不得对相关服务的使用造成不必要的干扰。只有当数据主体拥有真正自由的选择，并且能够拒绝或撤回同意而不受损害时，此同意才可被视为“自由给予”。该法规还规定，只有当数据主体知晓控制者的身份时，同意才可被视为知情同意。^(²⁴¹)
    您可以清楚地看到，当考虑到区块链技术时，这些要求中的一些不会构成问题，而另一些则可能导致更严重和更深远的问题（想想控制者的身份、同意的撤回及其后果）。在某些情况下，同意可能无法轻易撤回，例如在合同或法律背景下合法处理个人数据时。个人数据处理可能是履行合同所必需的，或者是法律要求在一定期限内保留个人数据。也可能存在一些例外情况，以保护其他数据主体的权利或公共利益。最后，还存在数据控制者基于“合法”利益处理数据的可能性，但这在未来的解释方式上非常不确定。该法规中考虑的其他原则包括：公平性（处理应当合法且公平）、透明度（这并不意味着数据控制者应该告知他们正在使用区块链技术，而是要告知数据主体处理的风险以及被处理的个人数据）以及目的限制，这意味着个人数据只能出于收集时的目的进行处理，不得另作他用。这最后一项要求意味着数据处理必须得到充分具体的说明，以便能够实施必要的数据保护保障措施；必须是明确的，即必须表述得足够清晰不含糊；并且必须是合法的，即处理应符合适用法律更广泛的法律原则。^(²⁴²)
    个人数据的进一步处理可能是合规的，即使其最初并未告知数据主体，但这需要逐案分析。


    最后，还必须考虑智能合约的使用。您可能认为它们本身不会造成问题，但您错了。数据主体有权不受完全基于自动化处理（包括用户画像）的决策的约束，此类决策对其产生法律影响或类似的重大影响。^(²⁴³
    (#fn243)) 智能合约产生的结果可被视为一种决策，这使其受到 GDPR 法规的约束。但是，如果该决策对于数据主体和数据控制者之间的合同是必要的、得到欧盟或成员国法律的授权、或者基于数据主体的明确同意，则此禁令不适用。^([²⁴⁴)
    由于 GDPR 法规未对“明确”同意作出清晰定义，且其他要求也并非总是明确，因此这一点仍有待进一步的监管指导。


    到目前为止，我们只将区块链技术和 GDPR 视为对立的两个方面，但这并非总是如此。有观点提出了“数据市场”的概念，其中个人和非个人数据可以作为商品进行交易。^(²⁴⁵)
    欧盟委员会已表示，区块链技术可用于赋能和驱动此类数字市场。这项技术确实有助于数据管理、双边合同创建以及有助于监控整个流程的治理系统。未来或许会证明，数据共享技术长远来看能真正助力经济增长并取得成功（想想
    Oce-an 协议）。区块链技术也可能有助于实施 GDPR 法规中“通过设计保护数据”的原则。^(²⁴⁶) 区块链可以帮助数据主体监控其个人数据的情况，并帮助他们决定谁有权访问其个人数据。它还有助于监控是否符合“目的限制原则”，并帮助检测数据泄露甚至欺诈行为。

    '
