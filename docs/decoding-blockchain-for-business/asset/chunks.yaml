  trans: '

    # 部分准备金银行制度与比特币


    关于部分准备金银行制度以及使用`比特币`（或任何其他加密货币）的讨论早已有之。基本上，看待这一概念主要有两种观点：凯恩斯学派观点和奥地利学派观点。^(²⁶⁰)
    从第一种观点来看，这与任何其他货币没有实质区别。银行仍然可以向客户展示任何代币为“可提取”，同时又能将这些代币作为贷款发放给其他客户。


    当然，银行有责任保持充足的存款储备，以确保能够处理客户的提款和支付。这些银行需要依赖自己的准备金，因为一旦发生违约，中央银行将无法救助它们。以`比特币`为例，我们可以理解，尽管`比特币`的最大供应量为
    2100 万枚，但通过部分准备金银行制度，`比特币`的货币供应量可以通过货币乘数成倍放大。一些支持`比特币`（或任何其他加密货币）部分准备金银行制度的人认为，这种有限的供应量可能使其比任何其他货币更适合部分准备金银行制度，因为其他货币传统上更容易引发通货膨胀，而供应量有限的货币则更可能具有通缩性质。


    奥地利学派观点则采取了不同的角度。要使部分准备金银行制度对货币供应量产生影响，银行所使用的债务工具必须被接受为货币本身。过去曾出现过一些其他形式的`比特币`，例如`Casascius`实体`比特币`（于
    2013 年停止）和`Bitbills`（于 2012 年停止）。历史上也曾有过其他债务工具发行，但由于其使用范围狭窄，往往导致问题频发。在`比特币`网络之外发生的交易与网络本身并不兼容。过去还曾出现过消除过剩工具的问题（2011
    年 6 月的`Mt. Gox`黑客攻击）、破产（`mybitcoin`）或投资者纾困等情况。基于以上信息，我们必须考虑过度发行、债务工具被普遍接受的程度，以及债务工具的市场价格与发行方准备金率之间的差异。


    那么，是否有可能用加密货币建立部分准备金银行制度呢？过去已出现过多种观点，认为如果从加密货币的背景、监管问题，以及可扩展性和透明度相关的问题来看，这只能是一种幻觉。另一些人则相信这种制度，例如有报道称`MasterCard`一直在尝试为加密货币部分准备金银行制度申请专利。^(²⁶¹)
    这种制度要出现并取得成功，关键要素之一是某种加密货币（或多种）应成为被广泛接受的支付手段。同一种加密货币还必须用于大型机构之间的大额交易，这对当今的加密货币来说是两项严苛的要求。


    部分准备金银行制度对加密货币的其他影响还体现在价格方面。通过采用部分准备金银行制度，你可能会降低持有特定存款的投资者所持有的加密货币的价值。这意味着支持这些做法可能不符合他们的利益。有几种方法可以抵消这些影响。其一是，通过部分准备金银行制度存放的加密货币存款的最大金额，必须是流通中加密货币总量的有限倍数。其二是，投资者可能决定持有更多部分准备金银行制度下的加密货币存款，而非其基础加密货币。


    如您所见，讨论加密货币部分准备金银行制度理论可能性的方式有多种，但目前这些都仍停留在理论层面。在一个人甚至考虑部分准备金银行制度之前，需要满足的基本条件相当苛刻。即使是在最理想的情况下，这也是有风险的。再加上监管问题、任何类型政府都难以进行明确监管的问题，以及投资者缺乏明确保险保障的现状，便清楚地表明这在短期内似乎并不现实。中央银行和政府更适合应对“传统”货币和银行所带来的风险，而加密货币本身则带来了一系列自身的风险。

    '
- fmt: '### Stablecoins


    `Stablecoins` are another important aspect of the blockchain world and cryptocurrencies
    that we should take into account. These are specifically designed to reduce the
    volatility of cryptocurrencies and are commonly pegged to a stable asset or basket
    of assets.^([^(262)](#fn262)) These currencies can be backed by commodities, fiat,
    or other cryptocurrencies.


    A first example is the `Digix Gold Token`, which is backed by gold. Introducing
    a gold standard to the cryptocurrency world, these tokens are clearly linked and
    backed by a precious metal, which provides more security than stablecoins backed
    by either fiat or other cryptocurrencies.^([^(263)](#fn263))


    Fiat-backed stablecoins base their value on a pegged fiat currency, where a third-party
    (regulated financial entity) holds the value of the backing fiat. These tokens
    can be traded and redeemed for the backing currency at the issuer. One should
    not underestimate the cost of such a peg, as you should take into consideration
    the cost of maintaining the backing reserve, legal compliance, maintaining licenses,
    audits, and more. `TrustToken` is a company that specializes in stablecoins, such
    as `TrueUSD`, `TrueGBP`, `TrueAUD`, and more.^([^(264)](#fn264)) It uses multiple
    third-party financial institutions to maintain its peg to these currencies and
    claims to have passed several security audits in the past.^([^(265)](#fn265))


    A second and much more controversial fiat-backed stablecoin is called `Tether`.
    The whitepaper was published in January 2012 by J.R. Willett, and it describes
    a new cryptocurrency on top of the Bitcoin network. By using `Mastercoin` and
    the `Mastercoin foundation` (now the `Omni foundation`), he created (together
    with Brock Pierce) the `Tether` cryptocurrency. It used to claim that it was backed
    by USD, but changed its statement on March 14, 2019.^([^(266)](#fn266)) Since
    that date, it also includes loans to affiliate companies, therefore immediately
    jeopardizing its status as a stablecoin.


    Even worse, the New York attorney general alleges that `Bitfinex` used `Tether`
    reserves up to 850 million USD to cover up their own missing funds, which occurred
    in mid-2018 and hadn’t been disclosed publicly.^([^(267)](#fn267)) `Tether Limited`
    now even claims that `Tether` owners have no contractual rights or legal claims
    that the `Tethers` will be exchanged for USD. On April 30, 2019, `Tether Limited`’s
    lawyer claimed that each `Tether` was backed by $0.74 in cash and cash equivalents.^([^(268)](#fn268))


    The company has also been accused of not providing the promised audit results
    of their adequate results backing `Tether`, manipulation of the Bitcoin price,
    the unclear relationship with the `Bitfinex` exchange (the Paradise papers leak
    suggests a link, as Philip Potter and Giancarlo Devasini were responsible for
    setting up `Tether Holdings Limited` in the British Virgin Islands in 2014; next
    to these leads, there is also the fact that the spokesperson for `Bitfinex` and
    `Tether` has stated that the CEO of both is Jan Ludovicus van der Velde^([^(269)](#fn269))),
    and the lack of a long-term banking relationship (there were transactions through
    a Taiwanese bank, back through Wells Fargo).^([^(270)](#fn270)) In 2017, other
    `Tether` coins were issued—`Euro Tether` on Bitcoin’s omni layer, and USD and
    `Euro Tether` as ERC-20 tokens on the Ethereum network.


    The case of `Tether` has clearly shown that stablecoins cannot be trusted blindly.
    However, you should understand the popularity of `Tether`, as it is the most traded
    cryptocurrency when we talk about daily trading volumes. It is very popular in
    Asia and is even feared to clog up the Ethereum network because of the number
    of transactions that are taking place every day.


    Another player that wants to fill the gap and create a major stablecoin is Facebook,
    with its “Libra” project. The launch of `Libra` (formerly known as `GlobalCoin`
    or `Facebook coin`) is projected in 2020 at the earliest, so it doesn’t exist
    yet, but there has been already some controversy surrounding the project. The
    project started in 2017 with Morgan Beller working on Facebook’s blockchain initiative
    (later on David Marcus and Kevin Well joined the project).^([^(271)](#fn271))
    By February 2019, there were already about 50 engineers working on the project
    in a completely separate division.


    The project was met with a lot of criticism, also relating to the questionable
    reputation Facebook has when it comes to privacy of its users. There were some
    scandals in the past showing that the company takes privacy regulation quite lightly
    (Cambridge Analytica comes to mind), so a cryptocurrency linked to this Internet
    giant seems to be the next step in controlling our personal data. Other concerns
    are linked to the sheer size of the company and the number of users, making it
    rival many fiat currencies, but without the checks and balances that are in place
    for centralized currencies. `Libra` also wouldn’t be a decentralized currency
    but would use a centralized system, with the “Libra association” in Geneva, Switzerland
    at its core. The bucket behind `Libra` would consist 50% USD, 18% Euro, 14% Japanese
    yen, 11% Pound sterling, and 7% Singapore dollar.


    The launch of the currency has been stopped due to the criticism received from
    the public and many regulatory institutions. On September 4, Mark Zuckerberg announced
    that the launch would be postponed until all (United States) regulatory concerns
    have been dealt with.^([^(272)](#fn272)) Originally, the plans were supported
    by a number of big and important payment parties. `PayPal` left the project on
    October 4, 2019, while `eBay`, `MasterCard`, `Stripe`, `Visa`, and `Mercado Pago`
    left on October 11, with `Bookings Holdings` following on the 14th. A number of
    companies still support the association, such as `Uber`, `Spotify`, `Lyft`, `PayU`,
    `Coinbase`, and many others.


    The response in the United States was quite harsh, with President Trump claiming
    that Facebook would have to adhere to Banking regulation and questioning if they
    would want to proceed with the project.^([^(273)](#fn273)) The response in Europe,
    and most notably in France, was even more harsh, with the French finance minister
    Bruno Le Maire claiming that `Libra` could be a threat to monetary sovereignty
    of nations and should therefore not be allowed to be developed. He also went on
    to state that it might incorporate abuse of marketing dominance and could introduce
    systemic financial risks. German MEP Markus Feber also warned that Facebook could
    become a shadow bank with the power it would have over `Libra`.


    The government of Japan has also started an investigation in how `Libra` might
    affect the monetary policy and financial regulation. Finally, there were the alarming
    sounds from Switzerland, where the Federal Data Protection and Information Commissioner
    stated that it had never heard from Facebook at all (this while David Markus claimed
    before the U.S. Senate that they would oversee the project).'
