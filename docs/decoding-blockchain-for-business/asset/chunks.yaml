- fmt: '### Where Do Cryptocurrencies Get Their Value?


    An important question asked by people new to the cryptocurrency space is where
    cryptocurrencies derive their value. This very much depends on the type and kind
    of token you are dealing with. As we mentioned, there are the stablecoins, which
    try to peg to a certain asset, fiat currency, or cryptocurrency (or a bucket of
    those). These derive their value from the peg they are trying to maintain, but
    we have seen that this is not always successful, which immediately leads to the
    devaluation of the token.


    A lot of people will say that it simply comes down to supply and demand. And to
    a certain extent, this is certainly true. As we have seen in the past (and still
    today), fluctuations in price can be clearly linked to the demand for certain
    tokens, just as the vanishing demand for a specific cryptocurrency might destroy
    its price. However, there are some other aspects that we should take into consideration
    when we look at possible drivers of the value of a specific token.


    When we move away from stablecoins to more general cryptocurrencies, there are
    a couple of factors that we have to consider. First of all, these tokens can be
    seen both as a medium of exchange and as a store of value.^([^(281)](#fn281))
    When we extrapolate from the Bitcoin case, the store of value valuation of a certain
    cryptocurrency is linked to its power as a medium of exchange. If a token does
    not achieve success as a medium of exchange, it will not be able to act as a store
    of value. A second consideration is the legitimacy of cryptocurrencies that might
    increase/decrease over time, leading to more or less adoption of these tokens,
    which in turn has an impact on their volatility. Thirdly, we have to look into
    the appearance of speculative valuation bubbles. These reduce the attractiveness
    of these currencies for participants interested in stable environments. Other
    possible considerations are whether some of these coins might be used for fractional
    reserve banking (or not), and if there is a limited or limitless supply of these
    tokens. You could also take into consideration the energy spent to mine a token
    and the value created in other processes (i.e., contributions to science or specific
    industries). Finally, some tokens represent a certain service or product, such
    as Internet access, media distribution, voting rights, and more.


    Only when you take all these drivers into account, together with a healthy (and
    hopefully growing) interest from a supporting community, can you try to understand
    how the value of certain cryptocurrencies is derived, and how their value might
    change in the future.


    ### Crypto Dust


    `Crypto dust` is something specific to the cryptocurrency world, but something
    you should certainly be aware of. As you might have guessed, `dust` refers to
    tiny pieces of value of a certain token. These tiny outputs are generated after
    a number of transactions and eventually require more fees to be transacted than
    their actual value. This is because these tiny transactions take up just as much
    space on the blockchain as large transactions, leading to the discrepancy between
    the fee that needs to be paid and the actual value of the transaction.^([^(282)](#fn282))


    As you can imagine, for many cryptocurrencies, the transaction fee is linked to
    the popularity and congestion of the network. This means that a certain value
    today might not pose a problem, while tomorrow it might become `crypto dust`.
    The only way to fix the issue with dust is by collecting enough of these dust
    values and consolidating them into one transaction by lumping them together. This
    technique depends on the wallet you are using and the cryptocurrency that you
    want to consolidate. The only possible issue with this is the price you pay: your
    privacy. As you are sending a lot of dust from different change addresses to your
    main wallet account, it can become apparent to other participants that these are
    linked to you as well. Certainly if you have been through a `KYC` (`Know Your
    Customer`) process that verifies your identity (necessary for financial institutions
    to fight financial crime), the link can easily be made.


    Linked to this issue are so-called “dusting attacks,” which are used to determine
    participants’ identities.^([^(283)](#fn283)) This attack consists of dust transactions
    that are sent to the victims’ wallets. They keep these transactions in a log and
    after a while the attackers can link several wallets together and determine the
    identity of the person behind a certain wallet. Certain wallets, such as the `Samourai`
    wallet, now flag dust transactions as suspicious by default to protect their users.'
  raw: '### Where Do Cryptocurrencies Get Their Value?


    An important question asked by people new to the cryptocurrency space is where
    cryptocurrencies derive their value. This very much depends on the type and kind
    of token you are dealing with. As we mentioned, there are the stablecoins, which
    try to peg to a certain asset, fiat currency, or cryptocurrency (or a bucket of
    those). These derive their value from the peg they are trying to maintain, but
    we have seen that this is not always successful, which immediately leads to the
    devaluation of the token.


    A lot of people will say that it simply comes down to supply and demand. And to
    a certain extent, this is certainly true. As we have seen in the past (and still
    today), fluctuations in price can be clearly linked to the demand for certain
    tokens, just as the vanishing demand for a specific cryptocurrency might destroy
    its price. However, there are some other aspects that we should take into consideration
    when we look at possible drivers of the value of a specific token.


    When we move away from stablecoins to more general cryptocurrencies, there are
    a couple of factors that we have to consider. First of all, these tokens can be
    seen both as a medium of exchange and as a store of value.^([^(281)](#fn281))
    When we extrapolate from the Bitcoin case, the store of value valuation of a certain
    cryptocurrency is linked to its power as a medium of exchange. If a token does
    not achieve success as a medium of exchange, it will not be able to act as a store
    of value. A second consideration is the legitimacy of cryptocurrencies that might
    increase/decrease over time, leading to more or less adoption of these tokens,
    which in turn has an impact on their volatility. Thirdly, we have to look into
    the appearance of speculative valuation bubbles. These reduce the attractiveness
    of these currencies for participants interested in stable environments. Other
    possible considerations are whether some of these coins might be used for fractional
    reserve banking (or not), and if there is a limited or limitless supply of these
    tokens. You could also take into consideration the energy spent to mine a token
    and the value created in other processes (i.e., contributions to science or specific
    industries). Finally, some tokens represent a certain service or product, such
    as Internet access, media distribution, voting rights, and more.


    Only when you take all these drivers into account, together with a healthy (and
    hopefully growing) interest from a supporting community, can you try to understand
    how the value of certain cryptocurrencies is derived, and how their value might
    change in the future.


    ### Crypto Dust


    Crypto dust is something specific to the cryptocurrency world, but something you
    should certainly be aware of. As you might have guessed, *dust* refers to tiny
    pieces of value of a certain token. These tiny outputs are generated after a number
    of transactions and eventually require more fees to be transacted than their actual
    value. This is because these tiny transactions take up just as much space on the
    blockchain as large transactions, leading to the discrepancy between the fee that
    needs to be paid and the actual value of the transaction.^([^(282)](#fn282))


    As you can imagine, for many cryptocurrencies, the transaction fee is linked to
    the popularity and congestion of the network. This means that a certain value
    today might not pose a problem, while tomorrow it might become crypto dust. The
    only way to fix the issue with dust is by collecting enough of these dust values
    and consolidating them into one transaction by lumping them together. This technique
    depends on the wallet you are using and the cryptocurrency that you want to consolidate.
    The only possible issue with this is the price you pay: your privacy. As you are
    sending a lot of dust from different change addresses to your main wallet account,
    it can become apparent to other participants that these are linked to you as well.
    Certainly if you have been through a KYC (Know Your Customer) process that verifies
    your identity (necessary for financial institutions to fight financial crime),
    the link can easily be made.


    Linked to this issue are so-called “dusting attacks,” which are used to determine
    participants’ identities.^([^(283)](#fn283)) This attack consists of dust transactions
    that are sent to the victims’ wallets. They keep these transactions in a log and
    after a while the attackers can link several wallets together and determine the
    identity of the person behind a certain wallet. Certain wallets, such as the Samourai
    wallet, now flag dust transactions as suspicious by default to protect their users.'
  trans: '

    ### 加密货币的价值从何而来？


    加密货币领域的新手常会问一个重要问题：加密货币的价值源自何处。这很大程度上取决于你所涉及代币的类型和种类。正如我们提到的，有稳定币，它们试图与某种资产、法定货币或加密货币（或一篮子此类资产）挂钩。这些代币的价值源于它们试图维持的锚定关系，但我们已看到这并非总能成功，这会立即导致代币贬值。


    很多人会说，这完全取决于供求关系。在某种程度上，这无疑是正确的。正如我们过去（以及现在）所见，价格波动可以清晰地与特定代币的需求挂钩，正如对某种加密货币的需求消失可能会摧毁其价格。然而，在考察特定代币价值的潜在驱动因素时，我们还应考虑其他一些方面。


    当我们从稳定币转向更通用的加密货币时，有几个因素需要考虑。首先，这些代币既可以被视为交换媒介，也可以被视为价值储存手段。^(²⁸¹) 当我们从比特币的案例推广开来时，某种加密货币的价值储存估值与其作为交换媒介的能力相关。如果一种代币作为交换媒介不成功，它就无法充当价值储存手段。第二个考虑因素是，加密货币的合法性可能随时间推移而增加或减少，导致这些代币的采用率随之变化，进而影响其波动性。第三，我们必须审视投机性估值泡沫的出现。这些泡沫降低了这类货币对寻求稳定环境的参与者的吸引力。其他可能的考虑因素包括：这些代币是否可用于部分准备金银行制度（或不能），以及这些代币的供应量是有限还是无限。你还可以考虑挖矿所消耗的能源，以及其他过程中创造的价值（例如，对科学或特定行业的贡献）。最后，有些代币代表特定的服务或产品，例如互联网接入、媒体分发、投票权等。


    只有当你将所有这些驱动因素，连同支持社区健康（且希望是不断增长的）兴趣都考虑在内时，你才能尝试理解某些加密货币的价值是如何产生的，以及它们的价值未来会如何变化。


    ### 加密货币粉尘


    “加密货币粉尘”是加密货币世界特有的事物，但你务必知晓。你可能已经猜到，“粉尘”指的是某种代币的微量价值。这些微小的输出是在多次交易后产生的，最终其交易所需费用超过了其实际价值。这是因为这些微小交易在区块链上占用的空间与大额交易一样多，导致了需要支付的费用与交易实际价值不匹配。^(²⁸²)


    你可以想象，对于许多加密货币来说，交易费用与网络的流行程度和拥堵程度相关。这意味着今天某个数值可能不成问题，而明天却可能变成“加密货币粉尘”。解决粉尘问题的唯一方法是收集足够多的这些粉尘值，并将它们合并成一笔交易。这项技术取决于你使用的钱包以及你想要合并的加密货币。这样做唯一可能的问题是你要付出的代价：你的隐私。当你从不同的找零地址向你的主钱包账户发送大量粉尘时，其他参与者可能会明显发现这些地址也与您有关联。特别是如果你已经通过了验证身份（金融机构打击金融犯罪所必需的）的“KYC”（“了解你的客户”）流程，这种关联很容易被建立起来。


    与此问题相关的是所谓的“粉尘攻击”，它被用来确定参与者的身份。^(²⁸³) 这种攻击由发送到受害者钱包的粉尘交易组成。攻击者会记录这些交易，过一段时间后，他们就能将多个钱包关联起来，并确定某个钱包背后之人的身份。某些钱包，例如`Samourai`钱包，现在默认将粉尘交易标记为可疑以保护其用户。

