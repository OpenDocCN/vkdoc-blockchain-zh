- fmt: '### The Legal Industry


    The legal industry is a notoriously slow one when it comes to change and innovation.
    A lot of their practices are almost set in stone when it comes to procedures.
    However, the pressure of blockchain technology is mounting and startups are trying
    to revolutionize the landscape so that there might be real change for all participants.
    Why is there always pressure when it comes to the application of new technologies
    in the legal sector? Because there is always the question of what the legal consequences
    are of applying a certain technology. This means that the very application of
    distributed ledgers might have an impact on the legal outcome of a process. In
    no other industry is there such a fundamental question when it comes to the application
    of new technologies. In itself, this leads to legal discussions that can seem
    endless. In essence, there are changes needed in the very laws themselves for
    many countries so that blockchain technology can actually be applied. When I say
    that legal changes are necessary, this means that there is a need for clear regulation,
    one that is not open to many interpretations. If there is an open interpretation,
    it should be in the sense that the application of new procedures and technologies
    are supported.


    Another important aspect that we need to consider is the legal industry itself
    when you enter as an outside participant. All of us come into contact with the
    legal profession some time in our lives at key moments. Lawyers, notaries, legal
    clerks and judges, depending on the situation we are facing, help us with many
    processes such as marriage, divorce, buying a house, and dealing with the passing
    of a loved one. The procedures are often unclear to participants who aren’t familiar
    with the legal profession, let alone understanding the stipulations of any decisions
    they make. On top of that, the costs of legal representation are often quite high.
    This leads to even more frustration and hesitation to call upon a legal professional
    in time of need.


    Law firms have also witnessed change over the last couple of years. Depending
    on the branch of law one specializes in, the “classic” family office isn’t what
    it used to be. Major legal firms are moving in and vying for contracts with corporate
    clients.^([^(78)](#fn78))


    So where do we actually see the benefits of blockchain technology specifically
    in the legal world (as one could argue that any form of digitalization could have
    a major impact on the industry as a whole)? As always, the existence of smart
    contract functionalities could help to automate requests, legal contracts, and
    their outcomes. This could give rise to new products that can be offered at a
    lower cost. By adding descriptions that are clear for any outsider, a complete
    new market could be created.^([^(79)](#fn79)) Opening up the market for any person
    in need, with clear explanations and at a lower cost, could mean a democratization
    of the legal profession. Transparency would increase as well, as the outcome of
    legal contracts could be clearly defined in a fixed set. One would no longer be
    able to disagree about the existence of a contract or the possible outcomes. In
    this vein, blockchain platforms could help current disputes concerning intellectual
    property rights by clearly defining who the owner of certain IP is and how the
    rights can be transferred to another party. This information can be made public
    so that there can be no dispute and all parties can act in transparency without
    the need for a third party.


    A final obvious point where the legal industry and the blockchain world touch
    on each other is the technology itself. The existence of ICOs, cryptocurrencies,
    and open investment mechanisms has opened up an entire new world. Although there
    have been a lot of new opportunities, as always, there are also people taking
    advantage of the situation. This has led to cases of clear theft or misinformation
    to investors. As there is often not yet a clear legal framework for the technology
    and all its possibilities, lawyers who familiarize themselves with the concept
    could help shape the world of tomorrow.^([^(80)](#fn80)) Notable examples relating
    to smart contracts are the states Arizona and Tennessee in the U.S. which have
    accepted the digital signature of smart contracts as legally binding.^([^(81)](#fn81),[^(82)](#fn82))


    One of the startups that has jumped to this opportunity is `Legal Nodes`.^([^(83)](#fn83))
    Surprisingly, it claims to be GDPR compliant, as it includes several legal, organizational,
    and technical measures to achieve this goal (although they don’t specify what
    this means). Their platform can be used for legal support, M&A deals, corporate
    structuring, and legal assistance. Another important advocate of blockchain technology
    is called `Empowered Law`^([^(84)](#fn84)) and it strives for public records on
    blockchain platforms to make them easily accessible. Other clear opportunities
    lie in notary services, which are essential for almost any society to function.
    With the advent of new technologies the almost ancient profession could see a
    complete change in the way of working, user friendliness, and cost. Finally, there
    is also the possibility of optimizing corporate filings. An example is IBM, which
    has become Delaware’s future blockchain provider when it comes to their new corporate
    filing system.^([^(85)](#fn85)) It could lower the cost, increase transparency,
    and automate processing.'
