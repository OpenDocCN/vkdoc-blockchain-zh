- fmt: '### Exchanges and Attacks


    When we talk about cryptocurrency exchanges, we talk about online platforms that
    allow participants to exchange a digital asset for another based on the market
    value of these assets.^([^(284)](#fn284)) You should not confuse these exchanges
    with wallets or wallet brokerages, which allow you to buy or sell a small range
    of cryptocurrencies, which in turn can be exchanged for other tokens. Most exchanges
    will allow you to trade one token for another, while some others will still allow
    you to trade for a limited number of fiat currencies (an example is `Kraken`).


    When you want to start using these exchanges as well, or start trading cryptocurrencies,
    you should start by setting up your own online account. One example where you
    can do this is `Coinbase`. Of course you can use any other online service but
    you should always consider the safety of these online services, so do your research
    before you open an account. You want to make sure that your invested funds don’t
    just suddenly disappear. There are also lists available online, such as in Belgium
    where the `FSMA` has published a non-exhaustive list of websites linked to fraud.


    Nevertheless, once you have set up your account, you will most probably only be
    able to buy specific cryptocurrencies (i.e. `Bitcoin` and `Ether`). If you want
    to buy something else, you will have to open an account on an exchange. There,
    you can trade the `Ether` or `Bitcoin` you bought for other tokens. With most
    of these other tokens, it is not possible to simply convert them back to fiat
    if you want to cash out (or at least not for now). This means you have to convert
    them back to `Ether` or `Bitcoin` first, which then can be exchanged for fiat
    currency. On top of that, you will have to take into account local regulations
    when it comes to profit from trading and cryptocurrencies in general.


    All of this seems fairly easy to understand. So why are these exchanges so often
    victims of cyberattacks?^([^(285)](#fn285)) Well, first of all, these exchanges
    have to hold large amounts of cryptocurrencies to ensure their liquidity (immediately
    proving that criminals are lured by the money they might make if they are successful).
    There are also a lot of transactions happening. The investments in cybersecurity
    are often limited, as these companies need their cash to grow and innovate, and
    cashing out stolen cryptocurrencies is often a whole lot easier than doing so
    with fiat currency. This makes it even more attractive to prospective criminals.


    A lot of people seem to have the idea that to attack such an exchange, very specific
    attack vectors need to be used to be successful. In reality we are dealing with
    a web service that is susceptible to a lot of the same attacks as any other web
    service, meaning that there is a range of server-side and client-side attacks
    that can be executed. When we look at the report provided by `hackernoon`, we
    can see that there are four sections of attacks that are relevant for exchanges
    (when they look at those exchanges that have a daily trade value of at least $100,000):
    user security, domain and registrar security, web security, and DoS protection.^([^(286)](#fn286))


    I will not go into detail about all the possible attack vectors for each of these
    sections, but it’s important to understand that none of them got an A+ score,
    meaning that none of them are ideal. Only 21 got an A score while most got a B
    score, meaning that they have some issues. Table [5-3](#497553_1_En_5_Chapter.xhtml#Tab3)
    shows the 21 exchanges that received an A score from the `Hackernoon` report.


    **Table 5-3** Exchanges with an A Score. Source: Hackernoon.com


    | Kraken | Cobinhood | Poloniex | BitMEX | Bitfinex | Bitlish | BitMart |

    | --- | --- | --- | --- | --- | --- | --- |

    | BtcTurk | Coinbase Pro | GOPAX | Livecoin | UEX | HitBTC | BTC-Alpha |

    | LiteBit | Exrates | Luno | Kucoin | Paribu | Bitso | Coinbe |


    To deal with these risks, several wallet solutions have been developed. A final
    example is the `ZERO`, developed by `NGRAVE`. While private keys stored by exchange
    platforms can be stolen during an attack, this wallet is locked away from any
    type of networking, has its own approach to key generation, and takes into account
    the use of QR codes. It is so far the only wallet that was able to obtain the
    `EAL7 Common Criteria Certification`.^([^(287)](#fn287))


    ### Cryptocurrency Market Capitalization


    When you look into cryptocurrencies or start researching specific currencies,
    you will almost immediately come across charts discussing the market capitalization
    of a token.^([^(288)](#fn288)) What do they mean? Consider the example shown in
    Figure [5-1](#497553_1_En_5_Chapter.xhtml#Fig1) to get a better understanding
    of this concept.


    ![../images/497553_1_En_5_Chapter/497553_1_En_5_Fig1_HTML.jpg](images/497553_1_En_5_Chapter/497553_1_En_5_Fig1_HTML.jpg)


    **Figure 5-1** Cryptocurrency graph. Data Source: coinmarketcap.com


    To get a better understanding of the price of a certain cryptocurrency, you should
    look at these charts. These charts can give you an idea of the market value, the
    volume, and the evolution over time of a currency, and you can also follow the
    impact of certain events. Analysts commonly use these charts to make informed
    investment decisions, as these charts show them the `total current coins * current
    price`.


    These charts generally serve as an indicator of the amount of risk involved for
    investors. However, one should always take into account the fact that we are dealing
    with cryptocurrency markets, which inherently pose an increased risk for investors
    compared to other “classic” forms of investment. This might change in the future,
    and I am well aware that there will be people who do not agree with this view,
    but you should always take this into consideration when you plan to invest in
    the crypto-market.


    Back to our story, you can, similarly to the stock market, divide coins in small
    cap, mid cap, and large cap based on the changes in the market capitalization.
    It should be clear that large cap are the more stable coins but the small caps
    can yield enormous rewards (often linked to enormous risk). While `Bitcoin` currently
    has the largest market capitalization, you can also look into smaller altcoins
    and consider what their future growth potential might be. Of course, you should
    also know that these charts don’t guarantee what the future value of a cryptocurrency
    will be. You should look into the coins you want to invest in, analyze the supply
    and the underlying assumptions/technology before you make a final decision. The
    market cap also doesn’t provide information considering the velocity of the cryptocurrency.
    Trends have to be analyzed over time. It’s important to take into account the
    numerous allegations of crypto-market price manipulation.^([^(289)](#fn289)) Research
    shows systemic trends in `Bitcoin` price and the number of “large” participants
    in many altcoin markets, which means you need to scrutinize these investments
    even more closely.


    Common appearances are wash trading (buying and selling with one’s own funds to
    create the perception of market activity), pumps and dumps (artificial buying
    of an altcoin, after which you sell your stake to victims), dark pool trading
    (large trades outside of standard exchanges), shilling (generating false hype
    around a coin for personal gain), and whale trades (large investors pushing the
    price in their favor).^([^(290)](#fn290)) A final consideration when you look
    into overall market capitalization of the crypto-market is the existence of dead
    coins, which should be subtracted from the overall number (even though an exact
    number is unknown). Alternative approaches to performing deeper market analyses
    can be found in the corner of fundamental analysis.'
