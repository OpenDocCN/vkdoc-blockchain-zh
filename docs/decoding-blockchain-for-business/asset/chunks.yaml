  trans: '

    # 加密市场简史


    加密货币及资产的历史与区块链技术本身的历史紧密相连，至少最初是这样。遗憾的是，在 2018-2019 年巨大的炒作热潮之后，市场崩盘，这项技术的声誉也受到了损害。^((247))
    正如我们在第 1 章中所见，一切始于 2008 年 10 月，一位名叫中本聪的匿名人士发布了一份描述比特币的白皮书。这个最初的构想既引发了兴趣也招致了怀疑，而第一个区块链区块——比特币的创世区块——于
    2009 年 1 月诞生。同样是在这个月，发生了第一笔交易，发生在中本聪和一位名叫哈尔·芬尼的开发者之间。这便是加密货币世界的开端。2009 年 10 月，新自由标准对比特币进行了首次估值，当时`$1
    = 1,309 BTC`。第一个比特币市场 `dwdollar` 于 2010 年 2 月成立。这是首次，其他参与者可以买卖这种加密货币。


    2010 年 5 月，比特币世界迎来了一个至今仍被许多加密货币爱好者和参与者铭记的重要里程碑。拉斯洛·汉耶茨花费了大约 10,000 BTC 从棒约翰买了一份披萨。这是首次使用加密货币购买实物商品的真实世界交易。这种认知的高度在几个月后（2010
    年 8 月）就被击碎了，当时首次发生了一次黑客攻击，恶意利用了比特币网络的一个漏洞，导致产生了 1820 亿枚比特币。这种加密货币的价值几乎跌至零。同年 9
    月，当更多漏洞被发现时，比特币的形象遭受了更大的损害；而在 10 月，一份报告表明比特币可能被用于洗钱和资助恐怖活动。^((248)) 尽管如此，在 2010
    年 11 月，市场价值仍达到了 100 万美元（估值为`$0.50/BTC`）。


    2011 年，比特币出现了第一次价格飙升，到 6 月份估值达到`$31/BTC`（从 1 月份的平价开始）。快进到 2013 年 6 月，市场规模达到了 10
    亿美元。也大约在这个时候，美国金融犯罪执法网络发布了第一份监管规定。几个月后，又发生了一起重大盗窃事件，^((249)) 接着是另一起安全漏洞，将比特币的价值击垮至`$0.01`。同年
    8 月，美国联邦法官马赞特^((250)) 首次声明比特币可以用作交换商品和服务的货币。与此同时，彭博社开始在其门户网站中整合比特币数据，提高了这种加密货币的接受度。^((251))


    第一次重大分歧发生在 2013 年 11 月至 12 月。当美国参议院开始举行首次关于比特币的听证会时，美联储主席本·伯南克却对网络给予了祝福和支持。另一方面，在中国，则首次禁止金融机构处理比特币交易。^((252))
    2014 年，Overstock.com 成为第一家接受比特币支付的大型零售商，而 Elliptic 推出了首个受保险的比特币存储服务。同年晚些时候，丝绸之路被关闭，其比特币（29,000
    枚）被美国政府出售。^((253)) 在新泽西州，首个受监管的比特币投资基金（GABI）获得了认证。^((254)) 到年底，TeraExchange 开始在受监管的交易所上开展首笔基于比特币的交易。这意味着这种货币进一步融入了标准工作方式，并得到了主要金融机构的接受。


    2015 年，纽约证券交易所成为 Coinbase 的投资方之一，英国财政部开始就数字货币征集信息，巴克莱银行也开始接受比特币。第二年，日本内阁承认虚拟货币具有与常规货币相似的功能，南非的
    Bidorbuy 和 Steam 平台开始接受比特币作为支付方式。8 月，Bitfinex 发生了一次新的重大黑客攻击事件。2016 年晚些时候，瑞士铁路运营商
    SBB 在其售票机上接受比特币支付。


    2017 年，接受比特币及其他加密货币的商店数量进一步激增，俄罗斯和挪威分别接纳、合法化并进一步整合比特币支付账户。在 2018 年和 2019 年，越来越多的商店开始接受加密货币，但与常规货币相比，它们仍处于边缘地位。这些年份的市场也经历了进一步的崩盘和上涨。随着新冠病毒的出现，常规市场和加密货币市场都经历了严重下滑。从长远来看，它将如何影响这些市场，只有时间才能给出答案。

    '
- fmt: '### Cryptocurrency Markets


    The cryptocurrency market is a volatile market that has been characterized in
    the last years with steep rises and falls. Contrary to other financial markets,
    cryptocurrency markets are characterized by their decentralized nature. This means
    that they depend on peer-to-peer markets, where transactions are propagated through
    nodes and eventually stored in blocks. This also means that there is no central
    authority or government that is backing the currency.


    Similar to other markets, the laws of supply and demand influence the price of
    cryptocurrencies. The total number of coins and the rate at which they are released
    or destroyed are the dominant factors dominating supply. You have cryptocurrencies
    such as `Bitcoin`, which have a limited total supply (only 21 million `Bitcoin`
    be mined, after this point it becomes impossible because of the limitations implemented
    in the algorithm of the network). This is completely different from `Ethereum`,
    which doesn’t cap the total number of `Ether` that can be mined. `Ripple` is a
    third example where more of the cryptocurrency is released in several rounds.


    Market capitalization (supply and demand) is a second factor that determines the
    value of the cryptocurrency. The more investors are interested in a certain cryptocurrency,
    the more demand will increase and hence the value of the cryptocurrency will rise.
    Other factors include the integration of cryptocurrencies as a usable means of
    payment in (online) stores and e-commerce payment systems. The greater the general
    acceptance of a specific cryptocurrency, the more likely the value of the currency
    itself will increase.


    Changes in regulation—such as acceptance of cryptocurrencies as a legitimate means
    of payment or investment, creating a framework for `ICOs`, and further enabling
    investments in blockchain infrastructure—greatly influence the value of cryptocurrencies
    (as we saw with the crash in 2018). Others factors are press coverage, investor
    acceptance, and the growth of interesting blockchain use cases. Finally, prosecution
    of those who lure investors into nonexistent cryptocurrencies, creating fake `ICOs`
    and stealing investor funds, further increases the value of legitimate cryptocurrencies.


    A second aspect of the crypto-world is the existence of crypto-assets. Cryptocurrencies
    are one aspect of crypto-assets, but you also have other digital assets that can
    be traded. Next to cryptocurrencies, you have platform tokens, or crypto-commodities,
    utility tokens, and transactional tokens. `Ether` (from the `Ethereum` network)
    is considered a platform token, as the platform can be used to create decentralized
    applications. Utility tokens exist on top of other platforms such as `Ethereum`.
    These tokens have been developed with a specific use case in mind. Finally, there
    are transactional tokens. Examples are `Ripple`, `IOTA`, and `Stellar`. These
    tokens are used to enable cross-border payments.


    Next to cryptocurrencies, derivatives trading has also been created. These financial
    instruments play into the value of cryptocurrencies and how they change over time.
    There are options and other instruments out there that are even more high risk
    but promise high return. If these instruments are used and traded in high amounts,
    they can introduce even more uncertainty in already volatile markets.


    You should understand that people will keep on finding new ways to create financial
    instruments. Understanding these instruments and the markets they function in
    is crucial for any investor.


    ### Some Core Cryptocurrency Concepts


    In this section, we cover core concepts that you will almost certainly hear or
    read about if you decide to enter the cryptocurrency market. Understanding these
    core concepts will help you not only better understand these markets but also
    understand the possible issues with these markets.


    #### Atomic Transactions


    Atomic swaps are cryptocurrency transactions that happen peer-to-peer without
    needing a third party such as an exchange. The first atomic swap took place on
    September 20, 2017 between `Decred` and `Litecoin`.^([^(255)](#fn255)) These transactions
    can take place in several ways—either directly between the separate blockchains
    even though they have different native coins, or by using off-chain channels.
    These transactions between different cryptocurrencies make the entire cryptocurrency
    system even more flexible.


    With the advent of atomic swaps, we enter the possibility of a world with fee-less
    exchanges. These (on-chain) swaps can take place because the participants work
    based on a shared secret. Similar to the `Lightning network` (which is a network
    on top of the `Bitcoin` network to improve scalability and transaction speed),
    here we similarly use hashed time-locked contracts (`HTLCs`). In short, when we
    have two participants that want to exchange two different types of cryptocurrencies,
    they open a payment channel. The first participant creates a payment address.
    There is a deposit on this address by the first participant and, after this, a
    value is created. This value is the key, while the hash of the value is the lock.
    The first participant sends the hash to the second participant. The second participant
    generates an address but uses the hash they received to do this. They then send
    their coins to the second address.


    Still following? Well, only the first participant can unlock the second address
    by using their value. This can be done by signing the transaction for the second
    participant’s address. Similarly, the second participant signs a transaction for
    the first participant’s address. One problem: the second participant doesn’t have
    the value to unlock their new coins. This value is revealed when the first participant
    signs their transaction. This way, the second participant can unlock the account.


    The assumptions here are that both currencies support hashed time-locked contracts.
    Furthermore, they need to have the same hashing algorithm. When this is not the
    case, atomic swaps between the currencies simply cannot happen. Of course, one
    could try to achieve swaps by using several steps (direct swap between `BTC` and
    `ETH` isn’t possible but using `DOGE` is). Off-chain transactions take place via
    a layer 2 protocol such as the `Lightning network`.


    In practice, the `Komodo` platform and `blockchain.io` are both focusing on atomic
    swaps between several parties.'
