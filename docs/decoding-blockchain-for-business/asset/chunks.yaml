    That means the difficulty of the proof of work algorithm needs to become more
    difficult as well. Some networks have tried to move in a different direction by
    creating algorithms that are resistant against mining software. Therefore, everyone
    can keep on mining with classic computers (leaving the network as democratic as
    possible). A target hash will be set by the network and the nodes have to try
    to compute a hash based on the block and the nonce that will be below this target
    number. The lower the target, the more difficult it will be for the participants
    to find a correct and acceptable hash. The proof of work protocol can help address
    the issue of Byzantine fault tolerance by using the aforementioned nonce and by
    combining messages into blocks. To prevent precomputation, the nonce is unique
    for each node and can only be used once.


    An important point of criticism about this type of protocol is the amount of energy
    that is consumed by networks that apply this type of protocol. In times of climate
    change, scarce resources, and economic crisis, this is an important point to consider.


    There are a lot of different proof of work consensus protocols that are currently
    in use by several networks.


    #### Proof of Stake


    Proof of stake was developed after the proof of work protocol and is more and
    more being used in blockchain networks. The first network to implement this kind
    of protocol was Peercoin in 2012\. In the proof of stake network, the miner of
    the next block is selected pseudo-randomly, as the amount of cryptocurrency held
    by the node influences the chances of being chosen. The probability of being chosen
    is directly linked to the stake you have in the network.


    It is clearly more cost effective than the proof of work consensus protocol, as
    miners don’t have to use energy to solve a mathematical problem. Secondly, it
    has proven to be more secure. A common example is the 51% attack, where blockchain
    networks become vulnerable as soon as a participant has 51% of the computing power
    in a network. From this second, he can validate all his own transactions, against
    the wishes of the other participants as they can no longer stop him. This might
    seem contradictory, but the stakeholders with the highest stakes are motivated
    to maintain the network, because if an attack would occur, this would damage the
    reputation of the network and hurt these participants the most. There is also
    a downside to this protocol, called the *nothing at stake* problem. When there
    is a consensus failure in the network, and the participants in the network have
    nothing to lose, there is nothing to stop these participants from supporting different
    sidechains.


    #### Delegated Proof of Stake


    The delegated proof of stake protocol maintains an irrefutable agreement on the
    truth across the network. The protocol uses real-time voting combined with reputation
    to achieve consensus. This allows every holder of the cryptocurrency to influence
    the network.


    This network uses delegates, which are elected to their roles and have to put
    a certain amount of cryptocurrency within a base account. The larger this amount
    is, the more influence the delegate can exert over the network. In case of malicious
    behavior, the money in this base account is lost. We can also call this deposit-based
    proof of stake. While the delegates are responsible for transaction validation,
    it is up to the participants to regularly request if the blocks mined contain
    all the correct transactions. This ensures that the network is self-governed and
    policed. You can probably sense that this is more democratic than the other consensus
    protocols.


    #### Proof of Authority


    Proof of authority (PoA) is an alternative that is often used by private blockchain^([^(10)](#fn10))
    networks (more related to distributed ledger networks), whereby proof of work
    is replaced by the “identity” of the nodes as a stake in the network. Only the
    selected nodes are allowed to mine new blocks. These “validator” nodes are allowed
    to add transactions to the blocks that are consequently added to the blockchain.
    With proof of authority and validators, there is also the new concept of *reputation*.
    The reputation of the validators is crucial for the existence of the network.
    If the reputation of one of the validators or the validator’s authority is damaged,
    the other participants might leave the network or challenge the newly created
    blocks and its transactions.


    This protocol has advantages and disadvantages, when you compare it to the other
    protocol implementations. The main risk with PoA is that if there is only one
    validator node, you centralize the risk to a single point of failure. This is
    a main risk to take into consideration when we talk about distributed networks.


    However, PoA does not require the massive computing power that is necessary for
    networks that use proof of work. PoA also has an advantage over proof of stake.
    With PoA, the entire identity of a node is put forward. If participants act maliciously,
    they stand to lose their entire stake in the network. With proof of stake, the
    participant only stands to lose his current stake that he put forward. This means
    that someone who has a lower overall participation in the network stands to lose
    less than someone who has invested heavily in the network.


    #### Other Protocols Used in Blockchain Platforms


    Several other types of protocols can be used in blockchain platforms so that one
    can come to a consensus. One of these protocols, strongly related to proof of
    stake is *proof of importance* . The difference with proof of stake is that in
    the PoI environment, the transactions of the user are also taken into account.
    This way the protocol tries to measure the level of trust and importance of the
    node in the entire network.^([^(11)](#fn11)) Another interesting protocol is the
    Proof of Activity, related to proof of work and proof of stake. It’s more energy
    efficient than proof of work, as only in the first phase this is used, as in the
    second the protocol uses a proof of stake. There is also proof of capacity, where
    the main driver is the hard disk space that is still available (instead of CPU,
    as we find with the proof of work protocol).^([^(12)](#fn12))


    Other protocols that you might encounter are proof of replication, proof of burn,
    proof of space, proof of space-time, proof of deposit, proof of data possession,
    and so on. You can clearly see that a lot of different blockchain platforms are
    experimenting with different solutions to provide consensus in a distributed and
    decentralized environment and in a secure and efficient way. Each of these protocols
    has advantages and disadvantages, depending on the goal you are trying to achieve
    and the way you are working with your organization.'
  trans: '# 工作量证明


    工作量证明是区块链网络中首个使用的共识协议。首个采用此类共识协议的网络是比特币网络。其理念是，矿工需要利用他们的节点来求解一个数学问题。该问题的求解需要耗费大量的工作和算力，但验证其结果却相对简单。这种共识方式被设计得难度较高，并且需要大量的计算能力。如果求解变得过于简单，可能会引入某些安全问题——挖矿速度可能过快，导致区块和链的浮动，从而无法形成主链。以比特币为例，其目标是每十分钟生成一个新的区块。随着时间的推移，算力不断增强，参与者数量增加，网络中投入的算力也随之成倍增长。这意味着工作量证明算法的难度也需要相应提高。一些网络曾尝试通过创建能抵抗挖矿软件的算法来另辟蹊径。这样一来，每个人都可以继续使用经典计算机进行挖矿（使网络尽可能保持民主）。网络会设定一个目标哈希值，节点必须尝试基于区块和随机数（nonce）计算出低于该目标值的哈希。目标值越低，参与者找到正确且可接受的哈希的难度就越大。工作量证明协议可以通过使用前述的随机数以及将消息组合成区块的方式，帮助解决拜占庭容错问题。为了防止预计算，该随机数对每个节点都是唯一的，且只能使用一次。


    关于此类协议的一个重要批评点在于，应用该协议的网络所消耗的能源量巨大。在气候变化、资源稀缺和经济危机的时代，这一点是需要考虑的重要因素。


    目前，有许多不同的工作量证明共识协议被各个网络所采用。


    # 权益证明


    权益证明是在工作量证明协议之后发展起来的，并越来越多地被用于区块链网络。首个实施此类协议的网络是 2012 年的 Peercoin（点点币）。在权益证明网络中，下一个区块的矿工是伪随机选出的，节点持有的加密货币数量会影响其被选中的几率。被选中的概率与你在该网络中的权益（stake）直接相关。


    与工作量证明共识协议相比，它显然更具成本效益，因为矿工无需消耗能源去求解数学问题。其次，它已被证明更加安全。一个常见的例子是 51%攻击，一旦某个参与者拥有了网络中
    51%的算力，区块链网络就会变得脆弱。从那一刻起，他就可以无视其他参与者的意愿，验证自己所有的交易，因为其他人已无法阻止他。这看似矛盾，但持有最大权益的利益相关者有动机维护网络，因为如果发生攻击，这将损害网络声誉，而他们受到的伤害也最大。这个协议也有一个缺点，被称为*无利害关系*（nothing
    at stake）问题。当网络发生共识失败，且网络中的参与者没有什么可失去时，就没有任何东西能阻止这些参与者支持不同的侧链。


    # 委托权益证明


    委托权益证明协议在网络中维持着一个无可争议的真理共识。该协议结合实时投票和声誉来达成共识。这使得每种加密货币的持有者都能影响网络。


    该网络使用代表（delegates），他们通过选举担任该角色，并需将一定数量的加密货币存入一个基础账户中。存入的金额越大，该代表对网络施加的影响力就越大。如果出现恶意行为，这个基础账户中的资金将被没收。我们也可以称其为基于存款的权益证明。虽然代表负责交易验证，但参与者也需定期请求检查已挖出的区块是否包含所有正确的交易。这确保了网络能够自我治理和监管。你大概能感觉到，这比其他共识协议更加民主。


    # 权威证明


    权威证明（PoA）是一种替代方案，常用于私有区块链^(¹⁰)网络（更常与分布式账本网络相关），它将“节点身份”作为网络中的权益来替代工作量证明。只有被选中的节点才被允许挖掘新区块。这些“验证者”节点被允许将交易添加到区块中，这些区块随后会被添加到区块链上。通过权威证明和验证者机制，还引入了一个新概念——*声誉*。验证者的声誉对于网络的存在至关重要。如果某个验证者的声誉或其权威受损，其他参与者可能会离开网络，或质疑新创建的区块及其交易。


    与其他协议实现相比，该协议有利有弊。PoA 的主要风险在于，如果只有一个验证者节点，就会将风险集中到单点故障上。在讨论分布式网络时，这是一个需要考虑的主要风险。


    然而，PoA 不需要使用工作量证明的网络所必需的巨大算力。PoA 相比权益证明也有一个优势。在 PoA 中，节点的整个身份都被置于考量之中。如果参与者行为恶意，他们将失去在网络中的全部权益。而在权益证明中，参与者只会失去其预先投入的当前权益。这意味着，在网络中整体参与度较低的人，其损失会小于在网络中投入巨资的人。


    # 区块链平台中使用的其他协议


    在区块链平台中，还可以使用其他几种类型的协议来达成共识。其中一种与权益证明密切相关的协议是*重要性证明*。与权益证明的区别在于，在 PoI 环境中，用户的交易也会被纳入考量。通过这种方式，该协议试图衡量节点在整个网络中的信任度和重要性。^(¹¹)
    另一个有趣的协议是与工作量证明和权益证明相关的活动证明。它比工作量证明更节能，因为它仅在第一个阶段使用工作量证明，而在第二个阶段则使用权益证明。还有容量证明，其主要驱动力是硬盘的可用空间（而非工作量证明协议中使用的
    CPU）。^(¹²)


    你可能会遇到的其他协议还包括：复制证明、燃烧证明、空间证明、时空证明、存款证明、数据持有证明等等。你可以清楚地看到，许多不同的区块链平台正在尝试各种解决方案，以期在分布式和去中心化环境中以安全高效的方式达成共识。这些协议各有优劣，具体取决于你试图达成的目标以及所在组织的运作方式。'
- fmt: '### Blockchain Forks


    Blockchain forks are an important subject in the world of blockchain. They refer
    to competing or coexisting sidechains within the same network. Simply because
    of the decentralized structure of the network, the occurrence of forks seems to
    be natural. Blocks are propagated through the network and arrive at different
    nodes at different times. This can also be the cause of so-called orphan blocks.
    Normally, the nodes will try to extend the chain with the largest cumulative difficulty.^([^(13)](#fn13))


    We can talk about a fork when there are two or more candidate blocks that are
    competing with one another to form the longest chain. If a miner discovers a "correct"
    block, it is immediately sent to its neighbors. Several nodes can in time discover
    a different solution and broadcast this through the network. The nodes closest
    to the original miners of the block will start building their chain based on this
    block and continue working on next blocks. If a fork comes into existence this
    way, the issue is normally resolved within one block. The reason is that one group
    of miners will find a next solution first, even if the computer''s power within
    the network is evenly distributed among several competing groups. The next solution
    will be shared among the network nodes, accepted, and spread through the network.
    The competing nodes will receive this next solution, accept it, and stop working
    on the competing solution, thereby resolving the fork.^([^(14)](#fn14)) See Figure
    [1-13](#497553_1_En_1_Chapter.xhtml#Fig13).


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig13_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig13_HTML.jpg)


    Figure 1-13


    Blockchain fork


    There is also the occurrence of *hard forks*. This is when there is a software
    update over the network and protocols or mining procedures are upgraded. Once
    the upgrade has happened, transactions that are being mined by using the older
    software will no longer be accepted by the upgraded nodes. This way, a new and
    persistent branch comes into being. There is a parallel set of transactions that
    take place on the different chains. A *soft fork* is a change in the software
    in which only previous blocks and transactions are made invalid while still being
    backward-compatible going forward. Another difference between a hard and a soft
    fork is that, with a soft fork, only a majority of the miners need to upgrade.
    A hard fork, on the other hand, requires all nodes to upgrade to the new version.


    ### Sidechains


    With the explanation of forks, you can start to imagine the existence of sidechains.
    These are blockchains attached to one another (the *parent* and the *child*).
    Because of this connection, assets are interchangeable over the network at a fixed
    deterministic exchange rate, while the sidechain can operate completely independently
    of the parent and use its own consensus protocol. See Figure [1-14](#497553_1_En_1_Chapter.xhtml#Fig14).


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig14_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig14_HTML.jpg)


    Figure 1-14


    Sidechains


    This transfer is in fact nothing more than an illusion. Tokens are locked in the
    parent chain and the equivalent amount of tokens is unlocked in the child chain.
    If you want to transfer, the tokens in the child are locked while the cryptocurrencies
    in the parent are once again unlocked. For this to be possible, there are several
    assumptions.


    The most important underlying principle that you need to understand is the point
    of something called *settlement finality*. The concept of settlement finality
    is a common one in the financial services industry. It is the moment that you
    can be sure that a transaction is final and will no longer be reverted. In a blockchain
    environment, where you are working with a proof-of-work algorithm, this moment
    can be difficult to determine, as at any given point it might be possible (although
    less likely over time) that a longer chain is created that doesn''t include some
    of the transactions. If we consider public blockchains, using proof of work, a
    standard is waiting for six confirmations (new mined blocks on top of the block
    that includes our transaction) before a transaction is seen as final. Its practical
    implications mean that we have to trust in the honesty of the participants in
    both chains and that they are both censorship-resistant. All of this requires
    that the participants are honest, including those participants holding the locked
    tokens. Otherwise, you enter a situation where locked tokens can be spent and
    double spending is once again possible.


    The child chain can also lack a settlement finality. In this case, one could use
    so-called *custodians*, which have to vote when to lock or unlock a certain amount
    of tokens. This voting system can be adapted to any form, which suits the blockchains
    that are being linked the best. This makes this quite a flexible system to work
    with. There are several ways that this system can be implemented. The first is
    by using a central exchange that enforces the two-way peg between the two chains,
    by only unlocking coins of chain 1 when an equivalent amount of tokens belonging
    to chain 2 are locked. See Figure [1-15](#497553_1_En_1_Chapter.xhtml#Fig15).


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig15_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig15_HTML.jpg)


    Figure 1-15


    Central exchange


    You can clearly see that using this system goes against the very nature of blockchain.
    You are reintroducing a single point of failure and you are once again using centralization.
    You could try to set up a form of decentralization by using multiple parties that
    use a multi-signature approach. This is something that could perfectly work in
    a private setting. See Figure [1-16](#497553_1_En_1_Chapter.xhtml#Fig16).


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig16_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig16_HTML.jpg)


    Figure 1-16


    Multi-signature approach'
