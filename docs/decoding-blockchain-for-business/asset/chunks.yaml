  trans: '

    ### 法律行业


    法律行业在变革与创新方面出了名的迟缓。其许多实践在程序上几乎一成不变。然而，区块链技术的压力与日俱增，初创公司正试图重塑格局，以期所有参与者都能迎来真正的改变。为什么在新技术应用于法律领域时总是存在压力？因为总有一个问题：应用某项技术会带来怎样的法律后果。这意味着，分布式账本的应用本身就可能对某个流程的法律结果产生影响。没有哪个行业在应用新技术时会面临如此根本性的问题。这本身就会引发看似无休止的法律讨论。本质上，许多国家需要对法律本身进行修改，区块链技术才能真正得以应用。当我说法律变革是必要的，这意味着需要有清晰、不容多重解释的监管规定。即便存在开放性解释，也应是旨在支持新程序和新技术的应用。


    另一个我们需要考虑的重要方面是，当你作为外部参与者进入法律行业时的情形。我们所有人都会在人生的某些关键时刻与法律职业打交道。根据我们面临的情况，律师、公证人、法律书记员和法官会协助我们处理诸多事务，例如结婚、离婚、购房以及处理亲人的离世。对于不熟悉法律职业的参与者来说，这些程序往往晦涩难懂，更不用说理解他们所作任何决定的法律规定了。除此之外，法律服务费用通常相当高昂。这导致人们在需要时，更不愿向法律专业人士求助，甚至犹豫不决。


    律师事务所也在过去几年中经历了变革。根据所专攻的法律领域不同，“经典”的家族办公室已不复当年模样。大型律师事务所正纷纷进入市场，争夺企业客户的合同。^(⁷⁸)


    那么，我们究竟能在法律领域的哪些方面看到区块链技术的具体优势呢（因为有人可能会认为，任何形式的数字化都可能对整个行业产生重大影响）？一如既往，智能合约功能的存在有助于实现请求、法律合同及其结果的自动化。这可能会催生能以更低成本提供的新产品。通过为任何外行人添加清晰易懂的描述，完全可以创造出一个全新的市场。^(⁷⁹)
    向任何有需要的人开放市场，提供清晰的解释和更低的成本，这可能意味着法律职业的民主化。透明性也会随之提高，因为法律合同的结果可以在一个固定集合中明确定义。人们将不再能对合同的存在或可能的结果产生异议。同样，区块链平台可以通过明确定义某项知识产权的所有者以及权利如何转让给另一方，来帮助解决当前的知识产权纠纷。这些信息可以公开，从而避免争议，所有相关方无需第三方即可透明地行事。


    法律行业与区块链世界相互关联的最后一个显而易见之处在于技术本身。ICO、加密货币和开放投资机制的存在，打开了一个全新的世界。尽管涌现了许多新机遇，但总有人会利用这种局面牟利。这导致了明显的盗窃或向投资者发布误导信息的情况。由于该技术及其所有可能性通常尚缺乏明确的法律框架，熟悉这一概念的律师可以帮助塑造未来的世界。^(⁸⁰)
    与智能合约相关的显著例子包括美国的亚利桑那州和田纳西州，它们已承认智能合约的数字签名具有法律约束力。^(⁸¹,⁸²)


    抓住这一机遇的初创公司之一是 `Legal Nodes`。^(⁸³) 令人惊讶的是，它声称符合 GDPR 规定，因为它采取了多项法律、组织和技术措施来实现这一目标（尽管他们没有具体说明这意味着什么）。其平台可用于法律支持、并购交易、公司架构以及法律援助。另一个倡导区块链技术的重要机构是
    `Empowered Law`^(⁸⁴)，它致力于将公共记录保存在区块链平台上，使其易于访问。其他明显的机会在于公证服务，这对几乎所有社会的运转都至关重要。随着新技术的出现，这一几乎古老的职业可能会在工作方式、用户友好度和成本方面发生彻底改变。最后，还有优化公司备案的可能性。例如，IBM
    已成为特拉华州新公司备案系统的未来区块链供应商。^(⁸⁵) 这可以降低成本、提高透明度并实现流程自动化。

    '
- fmt: '### Supply Chain


    You might not immediately see it, but supply chain offers a clear use case for
    blockchain technology. It’s not really a specific industry, but is a collection
    of people, businesses, and different industries that interact when it comes to
    supply chain. More often than not, it entails an entire network of suppliers,
    transportation companies, vendors, and customers that interact once or in a more
    permanent way, and this is irrespective of region. As this is a fundamental element
    in any industry today, there are many reasons to be critical of the existing processes
    and procedures. It is often an expensive process, with a lot of delays due to
    inefficient processes and procedures, being inflexible to change in demand, and
    based on the more legacy ways of working. Certainly, if we look at new techniques
    that are revolutionizing entire industries, we often see that these are lacking
    in current supply chain processes. As customers demand a better experience, more
    on-demand products and services, flexibility, and quick resolutions to problems,
    there are major changes to come.


    As I have stated multiple times, the blockchain technology isn’t a magical solution
    that simply fixes all of these problems. But it might be one of the technologies
    that helps push necessary changes that aren’t happening today. As always a major
    focus may lie on the cost reduction in current supply chain processes due to inefficiencies.
    By eliminating third parties and directly working together, costs can be reduced
    by transparent sharing of information and making sure that several payments between
    bank accounts don’t need to happen. Smart contracts might be a valuable solution,
    which can be triggered when a delivery has taken place. Linked to this issue is
    the collection and sharing of data among the parties involved in the supply chain
    process.^([^(86)](#fn86)) Data cannot be shared efficiently and integrated among
    the different partners in a certain supply chain, leading to the loss of valuable
    information needed to improve the process but also to make sure that no products
    are lost. Continuing with this trend is the use of `EDI` (Electronic Data Interchange)
    systems, which send information in batches to other parties. This information
    is shared at certain intervals, which leads to issues relating to the change in
    pricing or when shipments go missing.


    For all of these issues, the use of blockchain technology might greatly improve
    the current supply chain processes. One company that has understood that is Coca-Cola.
    In collaboration with SAP, they created a blockchain solution in the U.S. for
    their supply chain.^([^(87)](#fn87)) Coke One North America (`CONA`) works currently
    with 70 manufacturers on their blockchain solution for the 160,000 bottles that
    are delivered daily to shops in the U.S. By improving the process, orders can
    be reduced from processes that take up to months to only a couple of days. Another
    major company is Walmart. They have teamed up with IBM specifically for their
    food supply chains.^([^(88)](#fn88)) Currently, they track Chinese pork and Mexican
    mangoes, but one could easily see the potential for the future.


    Several platforms have been developed to aid the supply chain industry to make
    sure that blockchain integration can be performed with ease. `Insolar`^([^(89)](#fn89))
    offers the use of private and public blockchains. This provides the most options
    for possible integration, as it leaves migration to other solutions open. Other
    startups that focus on supply chain are `Skuchain`, which aims to improve the
    security and visibility in the global supply chain process; `SyncFab`, which focuses
    on purchase order management; `Shipchain`, which focuses on freight transport
    smart contracts; and `Origintrail`, which offers a data exchange protocol for
    interconnected supply chains.


    ### Resources


    In line with what you might expect from supply chain processes, pharmaceutical
    supply chains and the energy trade, there are also possibilities to optimize the
    mining and general industry markets. An example is BHP Billiton, which has chosen
    to use blockchain technology to record the movements of rock and fluid samples
    to better secure the data that is being generated and reported for the delivery
    of these minerals.^([^(90)](#fn90))


    A second example relates to the diamond market, where precious stones often tend
    to find origin in conflict areas. The term “blood diamond” isn’t familiar to everyone,
    and it refers to the fact that these stones are used to fuel conflicts everywhere
    in the world. They promote child labor, child soldiers, and various war crimes
    that I am not going to discuss in detail. By using distributed ledgers, we could
    help verify the origin of these diamonds and precious stones, ensuring that with
    the purchase of these stones, we do not promote such violence against humanity.
    The De Beers are responsible for about 30% of the mines, trades, and markets of
    diamonds, and they have chosen to implement a blockchain solution to help trace
    stones from their very origins to the customers who buy them.^([^(91)](#fn91))
    By doing this, the platform can become another measure in the fight against these
    crimes.


    One final example in this context is the startup `Everledger`.^([^(92)](#fn92))
    `Everledger` has developed several industry applications that focus on diamonds,
    gemstones, minerals, wines, luxury products, and art. They wish to improve the
    transparency in these markets, to allow for clear compliance processes and trust
    between all parties. By creating unique identities, one can no longer doubt where
    these resources come from.'
