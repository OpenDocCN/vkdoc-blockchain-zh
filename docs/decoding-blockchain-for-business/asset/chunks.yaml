    broader than insurance alone, but has developed a maritime insurance platform
    with Maersk. FidentiaX^([^(71)](#fn71)) a marketplace for tradable insurance policies.
    Of course, there are many more out there and others in development, but this gives
    you a good idea of how development is going and where we might see new solutions
    in the future. No industry remains untouched and we will see major changes in
    the years to come when we look at the insurance industry.'
