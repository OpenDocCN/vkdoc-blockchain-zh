- fmt: '### Real Estate


    Real estate (and certainly commercial real estate) is another market that might
    change due to the influence of blockchain technology in the coming years. Many
    transactions that now require the interference of one or more third parties could
    possibly be automated by using smart contracts on top of a blockchain platform.
    Think of any transaction that leads to the purchase or sale of a property, leasing
    contracts, and financing and management transactions.^([^(72)](#fn72))


    Where do we commonly find the biggest issues with the existing real estate industry?
    First of all, it is not open to everyone.^([^(73)](#fn73)) It shouldn’t be too
    hard to understand that the most important barrier are the funds necessary to
    acquire real estate. This has always been a very high barrier but it is not the
    only one. Most countries have very stringent rules when it comes to real estate
    and how one can acquire it: identification, credit score, financing, notary services,
    cash requirements, accreditation, proof of income, access to sponsors, and so
    on.


    Even in the world of commercial real estate, there are certain requirements we
    need to deal with. Due diligence processes need to take place to make sure that
    all legal, operational, and investment implications are clear. Brokers act between
    investment parties to provide the right information to the right people. The number
    of third parties you have to rely on seems endless and often this is fixed in
    law, so there is no way around it. A second issue, closely tied to the first one,
    is the lack of transparency in the entire process. People who enter the real estate
    market for the first time often discover, to their dismay, how difficult it is
    to do everything right. And you have to consider all the middlemen you need to
    trust to give you the correct information.


    With the use of a distributed ledger, you can improve the property search process,
    expedite pre-lease due diligence, ease cash flow management, and allow for easier
    and more transparent property title management. Information can and should be
    free for everyone when considering something as crucial as commercial real estate.
    The process shouldn’t be unnecessarily difficult considering the investment many
    families are making when it comes to acquiring real estate. In the same vein,
    you should be certain that everything is in line with regulation when acquiring
    property. You want to know if the owner selling the property is really the owner,
    that the building meets current regulations, that there are no other claims on
    the property, and so on. This can all be determined using a blockchain-enabled
    platform that could open up the information to all participants. The lack of transparency
    also leads to many possibilities for corruption, tax evasion, money laundering,
    and worse. When looking into reports from Global Financial Integrity, one can
    see that between China and the U.S. alone, there was a flow of 1 trillion USD
    between 2002 and 2011 that involved New York real estate.^([^(74)](#fn74)) In
    the fight against corruption and financial crime, distributed ledger could lead
    to more open information sources, discouraging individuals from spending their
    illicit money on real estate. All of this also creates a strain on the speed of
    the process, which can easily take months and, in case of international real estate,
    years.


    We mentioned before the high costs associated with acquiring real estate. There
    is not only the cost of real estate itself to consider, but also the other fees
    that are linked to acquiring property. Taxes, notary fees, processing fees, transfer
    fees, exchange fees, broker fees, investment costs, and so on wear down many investors
    entering the market. By weeding out the middlemen, these costs could also be reduced
    to the absolute minimum.


    Of course, these ideas aren’t new and are well-spread throughout the world, which
    has led to a number of startups using blockchain technology to change the real
    estate market. One of these startups is called `PropertyClub`^([^(75)](#fn75))
    and it wants to increase the transparency in the real estate market and make it
    easier for people looking for property in NYC.


    Another is `Managego`, which focuses on property owners in the real estate market.
    It digitizes rent payments, maintenance requests, rental applications, and more.^([^(76)](#fn76))
    Another startup that has an interesting approach to the real estate market is
    called `Meridio`.^([^(77)](#fn77)) It wants to make real estate more tradable
    by making it divisible with equity. This way, ownership of real estate can be
    shared by many investors and these shares can be traded on top of their platform.
    At the same time, this reduces transaction costs and lowers the investment minimums
    necessary to enter the market. Many other startups exist that have an alternative
    approach to the real estate market, but the key takeaway is that blockchain technology
    can help improve the current challenges that are faced by market’s participants.
    Whether you believe in the technology or not, these startups are here to stay
    and will change the current market processes.'
