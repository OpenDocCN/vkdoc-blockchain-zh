  trans: '

    # 区块链初创企业与未来图景


    在深入探讨区块链技术的工作原理之前，我们先简要介绍一下区块链初创企业以及区块链技术的应用现状。这也能让你清楚地了解其市场价值是如何随时间增长的，并一窥人们正在推进的落地项目数量。人们常说的一句话是：“除了加密货币，我没见过区块链任何可用的实际案例。”那么，让我们来证明这种说法是错误的。即便是最持怀疑态度的人，也无法对利用区块链技术的初创企业浪潮视而不见。虽然早期的初创企业主要源于金融领域，但如今它们已扩展到你能想象到的每一个行业。据国际数据公司估算，区块链市场在
    2019 年的总价值已达 25.5 亿美元，并预计到 2025 年将达到 555.4 亿美元。当前的经济危机可能会对 2020 年乃至未来几年的增长产生重大影响，但任何看到这些数字的人都应清楚，我们面对的是一个重要且不断增长、前景广阔的市场。SAP、可口可乐、阿里巴巴等许多大型企业也已实施过区块链项目。


    另一个需要关注的重要方面是，初创企业的分布以及区块链技术在全球范围内的应用。显而易见，领先的创新主要来自美国和东方国家。这并不令人意外。美国一直是创新与变革的源泉，这里的人们敢于冒险。许多新初创企业（也包括区块链领域之外的）在美国诞生并蓬勃发展。然而，我们不应低估中国、日本、韩国、新加坡、台湾等国家和地区的影响，这些地方的科技创新和整个
    IT 行业都经历了前所未有的增长。这些国家和地区的研究、创新和冒险精神不断提升，从而与世界各地的其他科技公司展开了激烈竞争。


    在考察全球初创企业数量时，我们可以参考道琼斯旗下 Venture Source 的数据，以了解全球主要参与者[A]、欧盟成员国[B]以及世界其他地区[C]的相关信息，如图
    1-1 所示。


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig1_HTML.jpg](img/497553_1_En_1_Fig1_HTML.jpg)


    图 1-1

    全球区块链初创企业分布^(¹)


    从这些数据来看，美国的区块链初创企业数量最多，其次是中国。欧盟仅占全球初创企业总数的约 15%。考虑到其中约 50%位于英国，而英国脱欧在即，这一比例将进一步下降。欧盟正努力进一步刺激创新和创业。数量偏低的原因与区块链技术相关的法律不确定性、分散的法律体系以及政治层面难以决策有关。此外，在商业风险承担方面，这里的环境更为严苛。在美国，商业失败被视为“一次有益的尝试”，是迈向下一次可能成功的尝试，而在许多欧盟成员国，商业失败仅仅被视为失败。


    从图 1-1 中得出的一个重要结论是，这些初创企业大多在发达国家蓬勃发展，而它们在众多领域为发展中国家带来的潜在优势也不容小觑。然而，这些公司的影响力会随时间发生巨大变化，发展中国家在未来有可能跃居榜首。2018
    年进入市场的新初创企业数量大幅下降（仅中国出现增长）。这是否标志着一种真正的趋势，还是仅是暂时性的下降，仍有待观察。见图 1-2。


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig2_HTML.jpg](img/497553_1_En_1_Fig2_HTML.jpg)


    图 1-2

    初创企业总数。来源：道琼斯旗下 Venture Source


    这些初创企业大多通过资本基金和 ICO（首次代币发行）融资，这对于了解该行业和领域的人来说并不意外。难题往往在于如何在初始融资活动后盈利赚钱。事实证明，这对许多此类项目来说相当困难。纯区块链市场盈利能力有限的原因可能有几点。一是区块链应用难以成为主流并吸引巨大市场。大多数去中心化应用的参与者和用户已经熟悉了去中心化的世界。这很奇怪，因为从用户角度来看，区块链应用与其他应用并没有本质区别。其中一些应用仍有可能实现市场渗透，但迄今为止，这种渗透非常有限。


    第二个从一开始就困扰区块链项目的问题是扩展性。这些项目在达到一定规模前运行良好，但尤其是在较“经典”的实现中，一旦用户数量开始增加，交易费用就会大幅上涨，或者网络开始变得拥堵。同样，新的实现能够（部分）解决这些问题，并且扩展性大大提高。尽管如此，早期的这些担忧至今仍伴随着区块链初创企业。


    第三个需要考虑的问题是，项目往往停留在某种试点阶段。即使这些初创企业提供或创建了某些平台，并能够为大型客户开展试点，但这些客户通常不会迈出下一步。原因可能是他们误解了平台的用途、工作方式，或者仅仅因为变革不是当务之急。与此相关的一个主要问题是，要使这样一个项目成功，需要多个愿意进行变革的合作伙伴的投入。如果你只是唯一一个尝试新工作方式的人，区块链项目永远不会成功。因此，你需要依赖多个独立方，这使得成功实施变得更加困难。


    我们需要将这一点与大型企业中的区块链项目实施区分开来。在这些大型企业中，我们已经看到，由于此类平台的实施方式，它们可以带来显著的成本削减。同时，共同在网络上合作的合作伙伴之间的信任度也可能提高，这得益于透明度以及消除了可能随时间变得腐败或需要维护成本的第三方。

    '
- fmt: '# 区块链投资趋势与技术基础


    根据IDC的数据，全球在区块链用例和概念验证上的支出将在2021年达到约18亿美元，这对应于2016年至2021年间66.6%的年复合增长率。尽管如此，大部分支出仍由银行业主导，其将占总支出的47%。这并不令人惊讶，因为区块链技术的本质始于金融行业（或作为对其的反抗）。紧随其后的是分销和服务业（占总投资的22%），区块链技术已被证明是有效管理供应链流程的绝佳替代方案。其他有重大投资的行业包括制造业和资源业（19%）、基础设施业（6%）以及公共部门。


    区块链已被证明是一个有趣且成功的工具，可以帮助企业改造低效流程。技术本身是一个重要驱动力，但由于新应用程序的实施，人们和企业往往能够跳出固有思维模式，真正改变他们的工作方式。因此可以想象，区块链的实施可能对任何组织产生重大影响。这不仅是因为平台本身，还因为人们敢于摆脱经典模式、思考新工作方式的态度。当然，这得益于技术所促进的透明度和信任度的提升。


    这就是为什么可以预见未来投资将持续增长，因为越来越多的公司将意识到通过优化现有流程所能创造的价值。将这种增长的价值创造与开放透明的流程相结合，客户和立法者都信任你的工作方式，这将进一步降低成本。


    听起来很不错，对吧？然而，正如我之前所说，也有充分的理由不实施区块链解决方案。其一，区块链只有在组织开始合作时才有效。只要你的竞争对手、供应商或客户不愿意合作，你的项目就注定失败。区块链只有在各方愿意在同一网络和应用程序中协作时才能发挥作用。信任可以真正内置于你所提供的解决方案中。但同样，你需要每个参与方的支持，否则最终的实施必然会失败。


    另一个区块链平台可能不是最佳解决方案的情况是处理定制化交易时。定制化是区块链应用程序并不总能良好应对的问题。你可以创建自己的网络、平台、工作方式和去中心化应用程序。你也可以通过使用智能合约创建自己的订单类型，但这些订单必须存在某种可以通过自动化标准化的通用实践。如果使用的订单类型变化过多，创建不同类型的智能合约就会变得过于麻烦和昂贵。


    最后一个考虑因素与处理速度和可扩展性有关。即使现在有一些平台和技术能够承担负载，但只有做出正确的选择，你才能通过区块链平台处理所有事务。否则，可能会面临网络内部的拥塞。根据具体用例，在做出最终决策之前，你应该综合考虑所有这些因素。


    ## 区块链技术快速入门


    首先，我需要简要解释什么是公钥密码学。*公钥密码学*（或非对称密码学）通常用于生成两种类型的密钥：私钥和公钥。公钥可以公开分享，而私钥必须保密（这显而易见）。为了生成这些密钥，需要使用单向函数。这在安全通信中解决了由来已久的问题。我们都熟悉对称密钥密码学：只需生成一个私钥，并将其用作账户、锁或其他任何东西的密码或口令。很简单，对吧？想象一下，我们希望相互发送加密消息，只有我们才能读取这些消息。只需共享同一个密码，问题就解决了！但其实并非如此，因为首先，我们需要找到一种安全的方式来相互共享这些密钥。这本身就可能是一个大问题。第二个问题是数量问题。你可能想向我发送安全消息，但可以想象，你也会想对你的所有朋友、家人和同事做同样的事情。那将需要发送和存储大量私钥！这在现实世界中简直是混乱不堪。公钥密码学找到了解决方案。你可以将公钥公开给所有人，将其存放在公共数据库中，并通过不安全的网络传输。它本意就是让所有人都知道并共享。如果你现在用我的公钥加密一条消息，那么只有我才能用我的私钥解密它。参见图[1-3](#497553_1_En_1_Chapter.xhtml#Fig3)。


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig3_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig3_HTML.jpg)


    图1-3 公钥密码学


    你们中的一些人可能已经将其与区块链和加密货币联系起来了：你的钱包地址和你用来访问它的私钥。当然，公钥密码学还有更多用途。想想用于验证消息发送者的数字签名。这些密钥的生成方式大多基于散列算法，这些算法根据熵产生特定结果。当你丢失私钥时再也无法访问钱包，这并非偶然。这些算法旨在不可破解。当然，当算法被攻破时，你的密钥也可能被破解。根据你使用的区块链平台，会使用不同类型的散列算法来生成这些密钥。这也是为什么某些币可以一起存储而其他币不能的原因。通常还会添加一些额外程序：这就是以太坊和比特币地址看起来如此不同的原因。


    你还会用到*椭圆密钥密码学*。这可能会让你有点不适（特别是如果你对密码学完全陌生的话）。首先，我们需要讨论有限域，它可以定义为一个有限数字集合，以及满足特定规则集的两个运算（加法和乘法）。下一步是椭圆曲线。其形式为：`y²
    = x³ + ax + b`。参见图[1-4](#497553_1_En_1_Chapter.xhtml#Fig4)。


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig4_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig4_HTML.jpg)


    图1-4 连续椭圆曲线


    这些椭圆曲线被用于密码学和区块链实现。对于比特币而言，其曲线为`y² = x³ + 7`或`secp256k1`（见图[1-5](#497553_1_En_1_Chapter.xhtml#Fig5)）。据称，选择这个特定实现是因为美国国家安全局植入后门的概率最低。这也是许多其他区块链平台使用相同椭圆曲线的缘由。


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig5_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig5_HTML.jpg)


    图1-5 secp256k1'
  raw: 'According to IDC, the worldwide spending on blockchain use cases and proof
    of concepts will reach about $1.8 billion in 2021, which in turn corresponds to
    a compound annual growth rate of 66.6% between 2016 and 2021.^([²](#fn2)) Still,
    the majority of spending is led by the banking industry, which will account for
    47% of total spending. This shouldn’t be a surprise, as the very nature of blockchain
    technology started in the financial industry (or as a protest against it). They
    are quickly followed by the distribution and services sector (for 22% of the total
    amount of investments), where blockchain technology has proven to be great alternative
    solution to adequately managing supply chain processes. Other sectors that have
    major investments are manufacturing and resources (19%), infrastructure (6%),
    and the public sector.


    Blockchain has proven to be an interesting and successful tool to help companies
    transform inefficient processes. The technology itself is an important driver
    here, but because a new application is being implemented, people and businesses
    tend to be able to think outside of the box and really change the way they are
    working. So one can imagine that a blockchain implementation might have a significant
    effect on any organization. Not only because of the platform itself, but because
    of the way people dare to think away from classic patterns to new ways of working.
    This is of course facilitated by the transparency and increased trust the technology
    facilitates.


    This is why you might imagine that future investments will keep on increasing,
    as more and more companies will realize the value that can be created by optimizing
    the current processes they are using. Combine this increased value creation with
    an open and transparent process in which both customers and legislators trust
    the way you are working, which leads to even further reduced costs.


    Sounds really good, doesn’t it? Well, as I said before, there are also good reasons
    not to implement a blockchain solution. One is that blockchain only works when
    organizations start to work together. As long as you, your competitors, suppliers,
    or customers aren’t willing to work together, your project is doomed to fail.
    Blockchain only works when parties are willing to cooperate within the same network
    and application. Trust can be literally built in within the solutions you are
    providing. But again, you need the support of every party joining or the eventual
    implementation is doomed to fail.


    Another time that a blockchain platform might not be the best solution for your
    business is when you are dealing with customized transactions. Customization is
    something that blockchain applications don’t always respond well to. You can of
    course create your own network, platform, way of working, and decentralized applications.
    You can also create your own type of order through the use of smart contracts
    but there must be some kind of common practice for all these orders that can be
    standardized by using automation. If there is too much variation and change in
    the type of orders being used, the creation of different types of smart contracts
    can becomes too much of a hassle and too expensive.


    A final consideration is one related to processing speed and scalability. Even
    though there are platforms and technologies out there that can now carry the burden,
    only if you make the right choice, you will be able to process them all through
    a blockchain platform. Otherwise, you might face congestion within the network
    itself. Depending on the use case, you should take all of this into consideration
    before making a final decision.


    ## A Quick Technical Introduction to Blockchain


    First, I will have to explain in short what public key cryptography is. *Public
    key cryptography* (or asymmetric cryptography) is generally used to produce two
    types of keys: a private key and a public key. The public key can be shared with
    the public while the private key has to remain private (shocking, I know). To
    generate these keys, a one-way function is used. This came into practice to solve
    an age-old problem when it comes to secure communication. We all know symmetric
    key cryptography: you just produce a private key and use it as a password or passphrase
    for an account, lock, or anything else. Easy, right? Imagine that we want to send
    messages to one another, which we would like to encrypt so that we are the only
    people who can read them. We just share the same password, problem solved! Well,
    not really, because, first of all, we need to find a secure manner to share those
    keys with each other. This can already pose quite a problem. The second problem
    is the one of numbers. You might want to send secure messages to me, but I can
    imagine you would like to do the same with all your friends, family, and colleagues.
    That are a lot of private keys to send and store! This would mean complete mayhem
    in the real world. Public key cryptography found the solution here. You can just
    share your public key with everyone, leave it in a public database, and transmit
    it over insecure networks. It is meant to be shared and known by everyone. If
    you now use my public key to encrypt a message, I am the only person that can
    decrypt it with my private key. See Figure [1-3](#497553_1_En_1_Chapter.xhtml#Fig3).


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig3_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Public key cryptography


    Some of you might have already made the link to blockchain and cryptocurrencies:
    your wallet address and the private key you use to access it. Of course, there
    are many more uses for public key cryptography. Think about digital signatures
    that are used to verify the sender of a message. The way these keys are generated
    is more often than not based on hashing algorithms that produce a certain outcome
    based on entropy. There is a reason why you can no longer access your wallet when
    you lose your private key. These are meant to be unbreakable. Of course when the
    algorithm can be broken, your keys can be broken as well. Depending on the blockchain
    platform you are using, different types of hashing are used to generate these
    keys. This is also why some coins can be stored together and others cannot. Often
    there is also some added procedures: this is why the addresses for Ethereum and
    Bitcoin look so different, for example.


    Something else you’ll use is *elliptic key cryptography* *.* This could bring
    you a bit out of your comfort zone (certainly if cryptography is completely new
    for you). To start with, we have to talk about finite fields, which can be defined
    as a finite set of numbers and two operations (addition and multiplication) that
    satisfy a specific set of rules. The next step is elliptical curves. These are
    of the form: y² = x³ + ax + b. See Figure [1-4](#497553_1_En_1_Chapter.xhtml#Fig4).


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig4_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Continuous elliptic curve


    These elliptical curves are used in cryptography and in blockchain implementations.
    For Bitcoin, it is y² = x³ + 7 or secp256k1 (see Figure [1-5](#497553_1_En_1_Chapter.xhtml#Fig5)).
    It is often said that this specific implementation was picked because it has the
    lowest probability of backdoors being implanted by the NSA. This is why many other
    blockchain platforms use the same elliptical curve.


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig5_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    secp256k1'
