  trans: '

    ### 能源市场


    毫无疑问，能源市场是区块链技术一个非常有趣的应用场景。通过运用这些新技术，我们可以构建一个更具可持续性的市场，从而更高效地利用资源，并确保每个人都能进入这个市场。被视为基本公用事业的能源至今仍面临高成本问题，而分布式账本平台可以降低成本，对生产者、分销商和客户都有益。^(¹⁰⁰)
    根据一些报告，到 2025 年，区块链在能源市场的规模可能增长至 30 亿美元。^(¹⁰¹)


    我们可能会看到分布式账本平台在点对点（P2P）能源交易和去中心化市场中涌现，这些平台能够确保作为一种稀缺资源的能源，以最具成本效益的方式得到最高效的利用。随着该行业已经习惯于创新——太阳能、电动汽车、智能电表等未来还会不断涌现——区块链技术或将成为这场变革中不可或缺的一部分。在可持续性和资源来源可追溯的层面上，追溯这些来源有助于调整当前的市场形态。


    然而，“传统”能源行业同样会从中受益。石油和天然气贸易涉及众多参与者，与任何供应链一样，可以通过区块链平台实现成本降低、交易优化和透明度提升。同时，这也是一个受到严格监管的市场，对多个生产这些产品的国家实施制裁。为了确保石油或天然气并非来自受制裁地区，分布式账本技术可以提供资源来源的不可篡改证明。关于能源数据及其使用方式的报告也可以得到改进。智利政府就是一个例子，他们正在使用区块链技术来存储和报告能源数据。


    由于能源市场是一个全球性市场，欧盟等地区的跨境合作有望得到改善。它有助于跨国界共享信息，允许以低成本效益的方式进行大宗商品交易，创建实时数据存储库等等。通过将可再生能源（如传统能源资源）推向全球市场，这有助于从整体上推动世界变得更好。


    ### 银行业


    我们已经多次提到过——区块链技术诞生于 2008 年银行业危机之时。它最初是一种抗议，也是一种完全绕开整个金融行业的可能解决方案。因此，这些银行本身对这项技术及其可能的应用表现出非常浓厚的兴趣，这十分自然。这也意味着，到目前为止，该行业见证了最多的应用案例，因此也能在成功与失败两方面分享最多的经验。


    尽管行业对新出现的和未来的应用依然充满热情，但它们已从过去的错误中吸取了教训，不会在未充分考虑潜在风险或其他实施方案的情况下，轻易投身任何新的冒险。过去困扰银行的关键问题之一是：要在不堵塞整个网络的情况下，为更大规模的商业应用扩展解决方案十分困难，而这会导致客户不满，并最终导致客户逃离该平台。此外，围绕区块链技术的持续监管不确定性也一直是个问题，这使得对相关项目的进一步投资充满风险。


    一如既往，最棘手的方面是如何将多个参与方聚集在一起，共同开发一个平台。要让竞争对手合作，各方必须深刻理解促成此事对大家都有利的原因。这并不容易。以比利时的银行业和开放银行法规为例，规模较小的竞争对手们合作构建了一个合规且类似的开放
    API 平台，这使得第三方更容易与之对接。而另一方面，规模较大的参与者则各自选择了自己的道路，这最终使得第三方与所有大银行集成时成本更高。这与斯堪的纳维亚地区形成了鲜明对比，在那里，即使是跨境合作，银行业的大多数参与者也能够实现类似的平台。过去的这些经验教训告诉我们，与小参与者合作更容易（也许他们能从增强的客户服务和降低的成本中获得更多好处），同时，文化因素也很重要：某些国家的银行更愿意为了共同利益而相互合作。


    全球领先的银行一直在共同努力，研究这项技术如何优化他们现有的工作方式。其中一个令人兴奋的领域是汇款业务。向国外汇款一直是个麻烦事。不仅费用高昂，而且往往手续繁琐。区块链技术可以降低这种成本。


    其他可能通过使用区块链技术得到改进的流程包括反洗钱（Anti-Money Laundering）和“了解你的客户”（Know Your Customer）流程，在这些流程中，欺诈行为可以减少。身份可以验证，流程可以轻松审计，文档的有效性可以通过分布式账本得到保证。这些流程对客户来说通常很麻烦，但如果能够创建一个共享平台，客户就可以决定哪些金融机构可以访问这些信息。这意味着客户只需经历一次完整的流程，之后他所有的金融机构都可以访问同样的信息。信息更新也可以采用同样简化的流程，从而减少对客户的影响。


    金融普惠性也一直是推动在区块链平台上创建金融服务的重要原因。由于平台上的自动化降低了成本，可以吸引更广泛的客户群。同时，客户所需的一切操作都可以轻松通过智能手机完成。这或许仍是一个障碍，但比个人电脑的门槛要低得多。与智能手机绑定的数字身份可以被使用，而在其他情况下，识别客户身份几乎是不可能的。


    世界各地都在启动和测试新的项目，以改善货币和信贷市场。区块链曾承诺要在一夜之间改变金融业，这已被证明是一个谎言。尽管如此，仍有大量未被挖掘的潜力，可以用来彻底革新整个行业。虽然我们可能正处于金融业的“区块链疲劳”期——类似于过去的“人工智能寒冬”，那时人工智能不再流行——但我仍然相信，这项技术将会回归，并进一步改善银行业。'
- fmt: '### Financial Instruments


    We mentioned a bit earlier that the blockchain world has also seen a rise in new
    financial products. We do need to state immediately that the local financial authority
    has the power to determine what a legal financial instrument is in a certain country.
    For some countries, these definitions are quite broad, while others have tried
    to keep cryptospace as far as possible from customers to protect them from possible
    losses.


    In Germany, for example, the legal definition has been adopted as follows since
    March 2, 2020: “Digital representation of a value that has not been issued or
    guaranteed by any central bank or public body and is not necessarily linked to
    a currency specified by law and that does not have the legal status of a currency
    or money, but is accepted as a medium of exchange by natural or legal persons
    and can be transmitted, stored, and traded electronically.”^([^(102)](#fn102))
    This provides a very broad base to possible instruments but also imposes stark
    requirements when considering the supervisory programs and compliance needed to
    ensure that the right investments are recommended for the right customer, so that
    risk-averse customers don’t end up with risky investments.


    It is this same, often uncertain, regulatory environment that has proven to be
    a barrier for further innovation. This is a double-edged sword, as new instruments
    could help those without access to regular financial services to finance their
    lives and increase profits. On the other hand, widening the door to instruments
    that are often not well understood can lead to higher risks (as both the banking
    crisis of 2008 and the cryptocrash of 2018 have shown us).


    When working together, regulatory instances from all over the world could come
    to similar terms, thereby reducing the regulatory uncertainty and creating a stable
    ground for new financial instruments. Later in this book you will read an entire
    section on cryptocurrency regulation, which really shows the difference in interpretation
    when it comes to cryptocurrencies.


    It’s interesting to know that there are now also investment funds focusing on
    cryptocurrencies. Lending instruments, put and call options, and automated contracts
    have all been introduced.


    ## Outside of the Finance World


    Even though the blockchain technology will be forever linked to finance and the
    financial industry for many people, this doesn’t mean that there aren’t opportunities
    or possibilities outside of the blockchain technology. One could take a look at
    many different industries or departments, but the following sections list just
    a few so that you have an idea of how people are using distributed ledgers in
    new and innovative ways.


    ### The Media


    An important sector in which the blockchain technology might prove its worth is
    the world of media and news.^([^(103)](#fn103)) We have seen several examples
    in the last couple of years where fake news affected the behavior of people in
    harmful ways. These are often directed attempts to discredit certain political
    parties or individuals. They have also been used to direct political decisions
    and attack the reputation of major companies. A more recent example of fake news
    and its negative influence on the world is that of the Coronavirus. Online, several
    conspiracy theories spread. One stated that the government was responsible for
    the spread of the Coronavirus, so that tags could be vaccinated into people and
    tracked via 5G. Another stated that 5G suppresses the immune system and yet another
    stated that the Coronavirus spread certain radio waves themselves, which it uses
    to communicate to one another. This led to people in the UK, the Netherlands,
    and other countries to set fire to the 5G masts. This example shows how dangerous
    fake news can be and that combating these techniques should be a priority of everyone.


    Blockchain platforms can offer traceability, transparency, and security when it
    comes to news articles. It could not only help to verify the source of certain
    articles, but also allow participants to flag articles as fake news, hence forcing
    out those that would abuse the (decentralized) network and prove the value of
    the information that is being spread. *The New York Times* Company is testing
    the blockchain technology to combat fake news and misinformation.^([^(104)](#fn104))
    The proof of concept they currently have stores metadata of photos and videos
    such as data, place of the image, person who took the shot, how it was edited,
    and how it was eventually published. Another company using distributed ledgers
    to fight fake news is Orange. You might not immediately imagine a telecoms operator
    focusing on fake news, but as a major operator in the communication process, they
    have seen and understood that they play a major role in spreading fake news.^([^(105)](#fn105))
    Orange worked together with the startup called Block Expert to create the application
    called `safe.press`.^([^(106)](#fn106))


    The `safe.press` application allows you to check the source of an article, so
    that you can verify if the article you are reading is reliable. One could still
    try to defraud the source, but this is very interesting step in the move to secure
    information. It is not the only one of its kind, so it will be interesting to
    see how these applications evolve over time. Again, you shouldn’t be blind to
    the possible downsides of this technology. If a country controls the Internet
    use of its citizens and controls all the sources of news, it would in fact control
    all information its citizens are receiving through the majority of its sources.


    The possibilities of the blockchain technology within media are of course broader.^([^(107)](#fn107))
    We are currently experiencing the rise (and fall) of multiple platforms that allow
    anyone with a computer and an Internet connection to participate in the media
    sector. This doesn’t take away that there are still major players that actually
    control the market. This leads to uneven compensation for the actual creators
    of content. With blockchain-based platforms, all creators can receive direct compensation
    for the use of their content and property. This can also be used to track the
    authorized viewers, usage of content, transfer of ownership, and smart contracts
    that can manage the entire process, end to end. This effectively eliminates the
    need to work with third parties that are often not compensating the creators as
    they should be.


    There are many startups that have seen these opportunities and entered the media
    industry with specific solutions. We mentioned earlier in this books startups
    such as `Ujo Team`, `Opus Foundation`, and `Stem`, which focus on the streaming
    industry in particular. They offer channels for independent music distribution,
    freedom for the artists when it comes to compensation, automating royalty payments
    in general, and allowing for the contact with their fans in open and distributed
    ways so that none of them can be blocked from content.


    Another important topic in the media industry is that of intellectual property
    rights and certainly how these can be protected in the modern age. Piracy is nothing
    new and most people are aware of how they can get a free copy of almost anything.
    The blockchain technology could not only help manage the authorized users who
    have access to certain content, but could also help manage and timestamp everything.
    This would effectively prevent any attempts of tampering during any step of the
    process. Startups such as `Mediachain` and `Monegraph` focus on the subject and
    want to empower the creators.


    We should also consider public events that require the purchase of a ticket. Each
    year there are many attempts to commit fraud in this regard. In this vein, there
    are also a great many attempts in the sale of pirated merchandising. As we previously
    mentioned, the blockchain technology can provide an extra layer of authenticity.^([^(108)](#fn108))'
