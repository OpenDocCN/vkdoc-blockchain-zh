    ### 房地产


    房地产（当然也包括商业地产）是未来几年可能因区块链技术影响而发生变化的另一个市场。许多目前需要中介或多方参与的房地产交易，未来或许可以通过区块链平台上的智能合约实现自动化。例如任何涉及物业买卖、租赁合同、融资及管理交易的环节。^(⁷²)


    现有房地产行业常见的主要问题在哪里？首先，它并非对所有人开放。^(⁷³)不难理解，最主要的障碍是购置房产所需的资金。这历来是道高门槛，但并非唯一障碍。大多数国家对房地产及其购买方式都有严格规定：身份认证、信用评分、融资、公证服务、现金要求、资质审核、收入证明、寻找担保人等。


    即使在商业地产领域，我们也需要应对一些特殊要求。必须进行尽职调查，确保所有法律、运营和投资影响都清晰明确。经纪人充当投资方之间的中介，向合适的人提供恰当信息。你需要依赖的第三方机构似乎无穷无尽，而且这些程序往往被法律固定下来，无法绕开。与第一个问题紧密相关的第二个问题是整个流程缺乏透明度。首次进入房地产市场的人常常会沮丧地发现，要把所有事情都做对是多么困难。而且你还必须信任所有中间人，让他们提供正确信息。


    通过使用分布式账本，你可以改进房产搜索流程，加快租赁前的尽职调查，简化现金流管理，并实现更便捷透明的产权管理。在考虑商业地产这样重要的事务时，信息应该且必须对所有人免费开放。考虑到许多家庭在购置房产时所做的投资，这一过程不应该设置不必要的障碍。同样，在购置房产时，你必须确保所有事项都符合法规。你需要知道出售房产的业主是否真的是业主，建筑是否符合现行法规，房产上是否有其他权利主张等等。这一切都可以通过一个基于区块链的平台来确定，该平台可以向所有参与者开放信息。缺乏透明度还会滋生腐败、逃税、洗钱甚至更严重的问题。查阅全球金融诚信组织的报告会发现，仅在
    2002 年至 2011 年间，中美两国之间就有一万亿美元的资金流动涉及纽约房地产。^(⁷⁴)在打击腐败和金融犯罪方面，分布式账本可以提供更开放的信息来源，从而阻止个人将非法资金投入房地产。所有这些也会拖慢交易流程的速度，通常需要数月时间，而如果是跨国房地产交易，甚至可能需要数年。


    我们之前提到过购置房产的高昂成本。不仅要考虑房产本身的价格，还有与购房相关的其他费用。税费、公证费、办理费、过户费、汇兑费、中介费、投资成本等等，这些费用让许多进入市场的投资者不堪重负。通过去除中间环节，这些成本也可以降至最低水平。


    当然，这些想法并非新鲜事物，在世界各地已广泛传播，并催生了许多利用区块链技术改变房地产市场的初创公司。其中一家叫`PropertyClub`^(⁷⁵)，旨在提升房地产市场透明度，方便人们在纽约寻找房产。


    另一家是`Managego`，专注于房地产市场中的业主需求。它将租金支付、维修请求、租赁申请等流程数字化。^(⁷⁶)还有一家名为`Meridio`的初创公司，对房地产市场有着独特的思路。^([⁷⁷
    (#fn77))它希望通过股权分割使房产更具可交易性。这样一来，房产所有权可以由众多投资者共同持有，这些份额可以在其平台上进行交易。同时，这降低了交易成本，并降低了进入市场的投资门槛。还有许多其他初创公司采用不同的方法进入房地产市场，但关键要点在于，区块链技术有助于改善市场参与者当前面临的挑战。无论你是否相信这项技术，这些初创公司都会存在下去，并将改变当前的市场流程。

