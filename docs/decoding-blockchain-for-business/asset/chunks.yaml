    # Blockchain and Industry Use Cases


    This chapter introduces some interesting use cases in a myriad of different industries.
    For some of you, the reason might be obvious. When you start a discussion about
    the blockchain technology, many people like to say that they still haven’t seen
    a working implementation in an industry, except for cryptocurrencies. Well, here
    we leave the theoretical path and show cases that are actually in use today. While
    there is still work to be done on the blockchain technology, this hasn’t stopped
    industry leaders from implementing the technology and changing the way they work.'
