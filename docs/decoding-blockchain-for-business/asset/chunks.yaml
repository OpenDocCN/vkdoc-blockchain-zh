- fmt: '# Tax and Crypto Regulation in the Americas


    Finally, there are the Americas. As we have seen and one might suspect, everything
    depends on the country when we talk about regulations. In Canada, for example,
    there is still regulatory uncertainty when it comes to blockchain and cryptocurrencies.^([^(208)](#fn208))
    Currently the regulation is seen as ambiguous, so it isn’t clear what is possible
    and what isn’t. This uncertainty is hurting their economy, as numerous companies
    within the country are actually considering investments in the technology.


    The United States is also struggling with regulation. As of the end of 2019, there
    are 21 bills in congress concerning blockchain technology.^([^(209)](#fn209))
    One of these bills focuses on the possible negative impact of cryptocurrencies,
    such as tax evasion, terrorism, and human trafficking and how one could possibly
    track such tokens. A second bill focuses on how companies can use cryptocurrencies
    in their current business models, while a third goes in-depth on how the government
    might use the technology in the future. The fact that the United States already
    had a robust and strict framework relating to financial services might also have
    a major impact on how blockchain is perceived in the country.^([^(210)](#fn210))


    So while being a lead innovator of the Western world, there have been delays in
    adoption, as the country struggles to find a balance between its regulations while
    promoting business as well as protecting its citizens. It has to be said that
    the United States is the most important country when it comes to cryptocurrencies
    and its approach to regulating cryptocurrencies will probably influence its allies.
    Cryptocurrencies are considered a property and not a currency in the country,
    so specific taxes are applicable. Another important aspect is that there might
    be important differences within states, such as the `BitLicense` in New York.


    In Latin America, Bolivia has issued harsh regulations, as cryptocurrencies and
    exchanges are simply banned all together.^([^(211)](#fn211))


    Anguilla introduced some regulations, most focusing on the release of ICOs while
    some consider securities regulated by existing regulation. At the same time, it
    is part of the ECCB (Eastern Caribbean Central Bank) pilot where a cryptocurrency
    is tested alongside the national currency. Antigua and Barbuda are also part of
    the ECCB’s pilot and at the same time the government has supported the development
    of the Antigua and Barbuda Development coin, even though it isn’t state sponsored.


    In the Bahamas, the government is looking into blockchain technology to simplify
    transactions. Similarly, they are looking into the use of a digital version of
    the national Bahamian dollar. However, the government is also preparing regulation
    that should help prevent the use of cryptocurrencies for money laundering or terrorist
    financing. Barbados is also looking into creating its own cryptocurrency, which
    would be tied to the Barbadian dollar through a company called “Bitt inc”.


    Ecuador, on the other hand, has chosen to ban all cryptocurrencies except for
    the national government-issued `SDE-token`. Countries such as Mexico, Argentina,
    Brazil, Venezuela, and Chile have accepted cryptocurrencies as a form of payment.
    Mexico did update its anti-money laundering regulation to include cryptocurrencies
    and companies offering cryptocurrency-related services.


    Costa Rica has considered cryptocurrencies legal even though it is not considered
    legal tender or foreign currency. Some warnings have been released by the central
    bank, while it has also stated that it is not looking into regulating or supervising
    cryptocurrencies for payments.


    In the case of Venezuela, cryptocurrencies offer an escape from the freefall of
    the `Bolívar` and the economic crisis.^([^(212)](#fn212)) It has also created
    its own cryptocurrency, called the `Petro`, which is backed by the value of Venezuelan
    oil.


    The “Cripto InterCambio” exchange of Chile wants to further open the Latin American
    world to blockchain technology and vows to invest in startups that wish to explore
    the topic.^([^(213)](#fn213))


    # GDPR and Blockchain


    When you discuss the possibilities of blockchain, you will eventually run into
    discussions regarding GDPR (General Data Protection Regulation) in Europe. The
    GDPR has been quite recently imposed within the EU and can lead to huge fines
    if people or businesses are found to be non-compliant. Blockchain poses a bit
    of an issue when you consider several elements of the regulatory framework. Please
    consider the fact that I don’t discuss all regulatory specifications, but only
    want to provide an overview of possible contention with the GDPR regulation. This
    means that there are more possible areas of conflict between blockchain technology
    and GDPR, but also that I didn’t list all measures and stipulations defined within
    the GDPR regulation. This would require a completely different book and is certainly
    reason for future research.


    The first factor that might form an issue is the underlying assumption of the
    GDPR framework. There is at least one natural or legal person one can address
    (the data controller) to enforce personal rights considering the personal data
    that is being processed. With blockchains we are dealing with a decentralized
    technology that seeks, more often than not, decentralized consensus. Without a
    clear person or group of persons in place, it is difficult, if not impossible,
    to determine who is responsible or accountable.^([^(214)](#fn214)) There is the
    concept of “joint-controllership” in the regulation, which makes it even more
    difficult, as you could consider all miners working toward consensus responsible
    and accountable for the personal data being processed. This can only be determined
    on a case-by-case basis where the governance design of the blockchain use case
    must be examined to identify the actors that determine the purpose and means of
    data processing.


    This also means that parties that exercise influence over the software, hardware,
    and datacenters that process data for the blockchain application can be considered
    to have influence over the data processing as a whole. Similarly, the purpose
    of the blockchain application can be influenced by many factors and actors, so
    that the determination of (joint) controllership can be a difficult task. Even
    when you use a private blockchain, and a legal entity is created for the consortium
    participating in the network, all separate entities taking part in the consortium
    could possibly be considered joint controllers.'
