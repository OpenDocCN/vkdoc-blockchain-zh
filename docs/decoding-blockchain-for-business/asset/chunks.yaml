- fmt: 'A second approach involves stepping away from any centralization and linking
    the two chains by implementing an understanding of each chain’s consensus system.
    This way, the tokens can be unlocked from the second the chain is able to verify
    that there has been a locking transaction. This brings several insecurities with
    it when you are working with a system where one of the chains doesn’t have settlement
    finality. This is something that again could be applied in a private blockchain/distributed
    ledger setting, but not in the public world, considering the risks that this setup
    would bring in what is essentially a trustless environment.


    You could use several ways to create this specific setup, but it would have to
    come down to a simplified way of acknowledging transactions and therefore use
    the Merkle root that is so often used in one way or another in the blockchain
    world. See Figure [1-17](#497553_1_En_1_Chapter.xhtml#Fig17).


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig17_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig17_HTML.jpg)


    Figure 1-17


    Linked by consensus


    Another approach that is related to the previous example is called “entangled
    blockchains.” Here, the relationship between the two separate chains is brought
    to the next level. When coins are locked in one chain, this immediately means
    that the equivalent amount in the other chain is released and vice versa. See
    Figure [1-18](#497553_1_En_1_Chapter.xhtml#Fig18).


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig18_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig18_HTML.jpg)


    Figure 1-18


    Entangled chains


    The final example we are going to look at is that of “drivechains.” Here, the
    participants are allowed to vote on when to release the locked coins and when
    to send these to another chain. These votes can be locked within a certain section
    of the transaction information. These voters are more often than not linked to
    one of the chains, determining the actions that take place for the other chain
    as well. You can clearly see in Figure [1-19](#497553_1_En_1_Chapter.xhtml#Fig19)
    that trust in the participants is the main concern here.


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig19_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig19_HTML.jpg)


    Figure 1-19


    Drivechain


    Of course, these are all just clear-cut examples that can be used independently.
    In reality, a number of combinations between these approaches is a real possibility.
    Depending on the use case you are working on, splitting or combining these approaches
    might be your best solution. A lot depends on the private—public and permissioned—permissionless
    approach, combined with the expected trust in the participants.


    ### The Blockchain Technology Stack


    Unlike other technology implementations, you have to consider the entire “stack”
    of the technology when you want to work with it within your organization (see
    Figure [1-20](#497553_1_En_1_Chapter.xhtml#Fig20)). At the core are decentralization
    and consensus. Therefore, you have to look at your infrastructure and ask yourself
    the question: “are you currently prepared to step in to a new way of working?”
    You have to, in a sense, let the classic view of centralization and control go
    to make room for an interconnected system that no longer has a single point of
    failure.


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig20_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig20_HTML.jpg)


    Figure 1-20


    The blockchain technology stack


    It comes with advantages and challenges, but each of these “layers” has to be
    taken into consideration when you are thinking about applying blockchain. It is
    much more than cryptocurrencies alone, as you will soon discover. Keep this image
    somewhere in the back of your mind as you start your journey.


    ### DAG (Directed Acyclic Graph)


    DAGs are another form of distributed ledger technology, just as blockchain is.
    The main difference lies in the fact that, in the world of DAG, there are no more
    blocks. This might seem confusing, as you just read that everything in the world
    of blockchains is basically “chained blocks,” but of course, as with everything
    in life, things just aren’t that simple. With DAGs, the transactions are directly
    linked to each other. Not in a neat little row, more in a cloud of transactions
    that link to a couple of new transactions and so on. The name itself—Directed
    Acyclic Graph—actually tells you everything that you need to know. It is *directed*,
    which means that all links point in the same direction, as you can see in Figure
    [1-21](#497553_1_En_1_Chapter.xhtml#Fig21). Because of this, no loops are possible
    within the network. It is therefore *acyclic*.


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig21_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig21_HTML.jpg)


    Figure 1-21


    DAG at work


    DAG basically tries to offer the same functionalities of blockchain but with better
    performance.^([^(15)](#fn15)) It offers better scalability and lower transaction
    fees (because there are no miners in the network). Contrary to what you have learned
    from the blockchain technology, here the network will start to work faster as
    the number of transactions that wait to be validated starts to increase (minimizing
    the possibility of network congestion). The main concern of DAG at this time is
    determining the best manner to reach a secure decentralized consensus within the
    network. When an answer is found to this issue, DAGs might pose a threat to the
    current blockchain landscape because of the advantages they bring.


    DAGs are also often called “blockchain 3.0,” as they are seen as the next natural
    step in the world of decentralized applications and the future way of working.
    As always, this was just a very broad explanation of what DAGs are. In reality,
    each implementation differs greatly and comes with its own advantages and disadvantages.
    Later on in the section, we will look in more detail at what is currently already
    there and what will be possible in the near future. There are also MerkleDAGs
    now, which combine the cryptographic power of Merkle trees with DAG structures.'
