- fmt: "But now for the why: why do we need elliptical curves? Elliptical curves are\
    \ used for something very specific: point addition. Point addition is actually\
    \ just as it sounds. We add two points that lie on the curve. The weird thing\
    \ is that the outcome of this addition, a third point, will also be on the curve!^([³](#fn3))\
    \ This is a very interesting property that is thankfully being put to use. See\
    \ Figure [1-6](#497553_1_En_1_Chapter.xhtml#Fig6).\n\n![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig6_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig6_HTML.jpg)\n\
    \n**Figure 1-6**  \nPoint addition\n\nNow we have come to the end of our journey:\
    \ we will combine finite fields with elliptical curves. All of this is finally\
    \ combined to come to the actual core of the business: elliptical curve cryptography,\
    \ for which we need finite cyclic groups. So what are groups? Groups are finite\
    \ fields with only one operation, which in this case is point addition.\n\nIf\
    \ you have all of this information, you can start creating your cryptographic\
    \ curve, which can be used in elliptical curve public key cryptography. It has\
    \ many uses, but in the world of blockchain it is used for signing and verifying\
    \ transactions. You can clearly see that it is crucial that these underlying curves\
    \ cannot be broken by attackers, otherwise the security of the entire system would\
    \ be at stake. Again, as mentioned before, `secp256k1` was chosen by many blockchain\
    \ platforms because it had the least chance of a backdoor being built in by the\
    \ NSA.\n\nWhen we talk about blockchain, we talk about ledgers. In the classic\
    \ way of working, there is a third-party necessary to verify payments, notarize\
    \ transactions, use escrow, and allow voting and registration. With the advent\
    \ of blockchain, we move away from these third parties which centralize power.\
    \ In itself, centralization isn’t necessarily bad, but it often leads to inefficiency,\
    \ high cost, loss of privacy and control, corruption, and more. With a distributed\
    \ network, this is no longer possible, as the participants decide the outcome\
    \ and validity of transactions. There is a single truth that must be supported\
    \ by the majority, and not by a single power in the network.\n\nPeople often forget\
    \ what this technology actually is and instantly start looking at the implementations.\
    \ However, to understand the possibilities, you first need to truly know and realize\
    \ what this technology represents. One important part is the existence of a peer-to-peer\
    \ network. People nowadays are used to a centralized way of working when it comes\
    \ to the Internet. When we visit a web page, we know that it is running on a server\
    \ somewhere and that we are visiting the same location. However, this wasn’t always\
    \ the case. The very beginning of the Internet was that of a peer-to-peer network\
    \ where computers were directly communicating with one another. This technique\
    \ is still used nowadays to share files over BitTorrent and other networks. A\
    \ second example is the TOR-network, which is a free, open source network that\
    \ is used for anonymous communication (it does have a negative reputation, as\
    \ it is also used for underground activities).\n\nThe problem with centralized\
    \ networks such as the Internet is that there are centralized providers that can\
    \ provide or deny access, control what is seen, and more. This third party can\
    \ be hacked, fail, or even become corrupt. This is why blockchain technology moved\
    \ away from centralized entities in the first place. We remove any centralized\
    \ servers and allow the participant nodes to directly communicate with each other.\
    \ Even more importantly are the costs that are brought by third parties. These\
    \ often make processes overly expensive and make these services cost-prohibitive\
    \ to a lot of people and (small) businesses. The problem is that these costs are\
    \ unnecessary for the process to function, as it is only used as a check of compliance.\
    \ With blockchain, you can automate these checks and reduce these costs significantly.\n\
    \nThe final part to understand the technology is the concept of *hashing*. When\
    \ you hash a certain dataset (this can be a word, a sentence, some numbers, or\
    \ even an entire book), you receive a unique identifier of that dataset. Whatever\
    \ the size of the input, the output size will always be the same. On top of that,\
    \ if you only change one number, letter, or symbol, the resulting hash will look\
    \ completely different. And when I say completely, I mean *completely*. This way,\
    \ you have an assurance that the data has not been modified. As you can see in\
    \ Figure [1-7](#497553_1_En_1_Chapter.xhtml#Fig7), the difference between the\
    \ hashes of the word “apple” and the word “apples” is clear.\n\n![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig7_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig7_HTML.jpg)\n\
    \n**Figure 1-7**  \nDifference between hashes\n\nThere are many different possible\
    \ hashing algorithms out there, but they need some key features to be successful.\
    \ One is that they have to be collision resistant, meaning that you cannot find\
    \ two inputs that will lead to the same output. Another is that they should be\
    \ pre-image resistant, meaning that you cannot guess the input based on the output\
    \ hash. These algorithms are commonly used in cybersecurity for password schemes\
    \ to improve the security of applications. Instead of storing passwords directly,\
    \ the hashes of passwords are stored so that passwords cannot simply be stolen\
    \ out of the application (even though commonly used passwords can still be extracted\
    \ by attackers). In the past, several of these algorithms have been “broken,”\
    \ meaning that one could revert hashes to their original inputs.\n\nHow is this\
    \ applied in blockchain technology? In several ways, as you will see later on.\
    \ You might imagine several ways that this could be applied in any field. You\
    \ could take a hash of a document and store it somewhere safe, and if you ever\
    \ wanted to prove that the document didn’t change, you could simply re-create\
    \ the hash of the document and compare it to the stored hash (this is actually\
    \ one of the first use cases of blockchain other than cryptocurrency).\n\nIn blockchain,\
    \ this technique is used so that resulting transactions be compared rather quickly.\
    \ When you start hashing transactions, you can also hash hashes and create from\
    \ a group of hashes, eventually a single hash. This is called the *Merkle tree*\
    \ and this can be used to compress a lot of data. The Merkle tree can be used\
    \ to prove what data is held within a block (see Figure [1-8](#497553_1_En_1_Chapter.xhtml#Fig8)).\n\
    \n![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig8_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig8_HTML.jpg)\n\
    \n**Figure 1-8**  \nSimple Merkle tree\n\nAll of these blocks consist of sets\
    \ of transactions that are chained together in one huge ledger. The blockchain,\
    \ in fact, represents nothing more than a historical overview of the transactions\
    \ that have taken place in the network. These techniques together help us create\
    \ an append-only ledger of transactions, which is distributed over all the nodes\
    \ in the network. These transactions are contained in a linked list of blocks."
  raw: 'But now for the why: why do we need elliptical curves? Elliptical curves are
    used for something very specific: point addition. Point addition is actually just
    as it sounds. We add two points that lie on the curve. The weird thing is that
    the outcome of this addition, a third point, will also be on the curve!^([³](#fn3))
    This is a very interesting property that is thankfully being put to use. See Figure
    [1-6](#497553_1_En_1_Chapter.xhtml#Fig6).


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig6_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Point addition


    Now we have come to the end of our journey: we will combine finite fields with
    elliptical curves. All of this is finally combined to come to the actual core
    of the business: elliptical curve cryptography, for which we need finite cyclic
    groups. So what are groups? Groups are finite fields with only one operation,
    which in this case is point addition.


    If you have all of this information, you can start creating your cryptographic
    curve, which can be used in elliptical curve public key cryptography. It has many
    uses, but in the world of blockchain it is used for signing and verifying transactions.
    You can clearly see that it is crucial that these underlying curves cannot be
    broken by attackers, otherwise the security of the entire system would be at stake.
    Again, as mentioned before, secp256k1 was chosen by many blockchain platforms
    because it had the least chance of a backdoor being built in by the NSA.


    When we talk about blockchain, we talk about ledgers. In the classic way of working,
    there is a third-party necessary to verify payments, notarize transactions, use
    escrow, and allow voting and registration. With the advent of blockchain, we move
    away from these third parties which centralize power. In itself, centralization
    isn’t necessarily bad, but it often leads to inefficiency, high cost, loss of
    privacy and control, corruption, and more. With a distributed network, this is
    no longer possible, as the participants decide the outcome and validity of transactions.
    There is a single truth that must be supported by the majority, and not by a single
    power in the network.


    People often forget what this technology actually is and instantly start looking
    at the implementations. However, to understand the possibilities, you first need
    to truly know and realize what this technology represents. One important part
    is the existence of a peer-to-peer network. People nowadays are used to a centralized
    way of working when it comes to the Internet. When we visit a web page, we know
    that it is running on a server somewhere and that we are visiting the same location.
    However, this wasn’t always the case. The very beginning of the Internet was that
    of a peer-to-peer network where computers were directly communicating with one
    another. This technique is still used nowadays to share files over BitTorrent
    and other networks. A second example is the TOR-network, which is a free, open
    source network that is used for anonymous communication (it does have a negative
    reputation, as it is also used for underground activities).


    The problem with centralized networks such as the Internet is that there are centralized
    providers that can provide or deny access, control what is seen, and more. This
    third party can be hacked, fail, or even become corrupt. This is why blockchain
    technology moved away from centralized entities in the first place. We remove
    any centralized servers and allow the participant nodes to directly communicate
    with each other. Even more importantly are the costs that are brought by third
    parties. These often make processes overly expensive and make these services cost-prohibitive
    to a lot of people and (small) businesses. The problem is that these costs are
    unnecessary for the process to function, as it is only used as a check of compliance.
    With blockchain, you can automate these checks and reduce these costs significantly.


    The final part to understand the technology is the concept of *hashing* . When
    you hash a certain dataset (this can be a word, a sentence, some numbers, or even
    an entire book), you receive a unique identifier of that dataset. Whatever the
    size of the input, the output size will always be the same. On top of that, if
    you only change one number, letter, or symbol, the resulting hash will look completely
    different. And when I say completely, I mean *completely*. This way, you have
    an assurance that the data has not been modified. As you can see in Figure [1-7](#497553_1_En_1_Chapter.xhtml#Fig7),
    the difference between the hashes of the word “apple” and the word “apples” is
    clear.


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig7_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Difference between hashes


    There are many different possible hashing algorithms out there, but they need
    some key features to be successful. One is that they have to be collision resistant,
    meaning that you cannot find two inputs that will lead to the same output. Another
    is that they should be pre-image resistant, meaning that you cannot guess the
    input based on the output hash. These algorithms are commonly used in cybersecurity
    for password schemes to improve the security of applications. Instead of storing
    passwords directly, the hashes of passwords are stored so that passwords cannot
    simply be stolen out of the application (even though commonly used passwords can
    still be extracted by attackers). In the past, several of these algorithms have
    been “broken,” meaning that one could revert hashes to their original inputs.


    How is this applied in blockchain technology? In several ways, as you will see
    later on. You might imagine several ways that this could be applied in any field.
    You could take a hash of a document and store it somewhere safe, and if you ever
    wanted to prove that the document didn’t change, you could simply re-create the
    hash of the document and compare it to the stored hash (this is actually one of
    the first use cases of blockchain other than cryptocurrency).


    In blockchain, this technique is used so that resulting transactions be compared
    rather quickly. When you start hashing transactions, you can also hash hashes
    and create from a group of hashes, eventually a single hash. This is called the
    *Merkle tree* and this can be used to compress a lot of data. The Merkle tree
    can be used to prove what data is held within a block (see Figure [1-8](#497553_1_En_1_Chapter.xhtml#Fig8)).


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig8_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig8_HTML.jpg)


    Figure 1-8


    Simple Merkle tree


    All of these blocks consist of sets of transactions that are chained together
    in one huge ledger. The blockchain, in fact, represents nothing more than a historical
    overview of the transactions that have taken place in the network. These techniques
    together help us create an append-only ledger of transactions, which is distributed
    over all the nodes in the network. These transactions are contained in a linked
    list of blocks.'
  trans: "\n但接下来要探讨的是“为什么”：我们为什么需要椭圆曲线？椭圆曲线用于一个非常特定的目的：点加法。点加法实际上正如其名。我们将位于曲线上的两个点相加。奇怪的是，这种加法运算的结果（即第三个点）也会落在曲线上！^(³)\
    \ 这是一个非常有趣的特性，幸运的是它已被付诸应用。见图 1-6。\n\n![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig6_HTML.jpg](img/497553_1_En_1_Fig6_HTML.jpg)\n\
    \n**图 1-6**  \n点加法\n\n现在，我们的探索之旅已近终点：我们将把有限域与椭圆曲线结合起来。所有这些最终汇聚成业务的核心：椭圆曲线密码学，为此我们需要有限循环群。那么，什么是群？群是仅包含一种运算的有限域，在这里，这种运算就是点加法。\n\
    \n掌握了所有这些信息后，你就可以开始创建自己的密码学曲线，并将其用于椭圆曲线公钥密码学。它有很多用途，但在区块链世界中，它被用于签名和验证交易。很明显，确保这些底层曲线不被攻击者攻破至关重要，否则整个系统的安全性将面临风险。再次重申，如前所述，许多区块链平台之所以选择`secp256k1`，是因为它被\
    \ NSA 植入后门的可能性最小。\n\n当我们谈论区块链时，我们谈论的是账本。在传统工作方式中，需要一个第三方来验证支付、公证交易、使用托管服务，并允许投票和注册。随着区块链的出现，我们摆脱了这些集权于自身的第三方机构。集权本身未必是坏事，但它往往导致效率低下、成本高昂、隐私和控制的丧失、腐败等问题。而在分布式网络中，这种情况不再可能发生，因为由参与者来决定交易的结果和有效性。这里存在一个单一的真相，必须由多数节点支持，而非由网络中的单个权力实体决定。\n\
    \n人们常常忘记这项技术本身是什么，而直接开始关注其实现。然而，要理解其可能性，你首先需要真正理解并意识到这项技术代表了什么。其中一个重要部分是点对点网络的存在。如今，人们在互联网方面习惯了集中式的工作方式。当我们访问一个网页时，我们知道它运行在某个服务器上，并且我们访问的是同一个位置。然而，情况并非一直如此。互联网的初始形态就是一个点对点网络，计算机之间直接相互通信。这种技术至今仍被用于通过\
    \ BitTorrent 和其他网络共享文件。另一个例子是 TOR 网络，这是一个免费的开源网络，用于匿名通信（它也因被用于地下活动而名声不佳）。\n\n\
    像互联网这样的中心化网络的问题在于，存在中心化的提供商，它们可以提供或拒绝访问、控制可看到的内容等。这个第三方可能被黑客攻击、发生故障甚至腐败。这正是区块链技术最初摆脱中心化实体的原因。我们移除所有中心化服务器，允许参与节点直接相互通信。更为重要的是第三方带来的成本。这些成本常常使流程过于昂贵，使许多人和（小）企业难以承担这些服务。问题在于，对于流程的正常运行而言，这些成本是不必要的，因为它们仅被用作合规性检查。有了区块链，你可以自动化这些检查，并显著降低这些成本。\n\
    \n理解这项技术的最后一部分是*哈希*的概念。当你对某个数据集（可以是一个单词、一句话、一些数字，甚至一整本书）进行哈希运算时，你会得到该数据集的唯一标识符。无论输入大小如何，输出大小始终相同。除此之外，如果你只改变一个数字、字母或符号，生成的哈希值也会看起来完全不同。当我说“完全”时，我的意思是*彻底不同*。这样，你就能确保数据未被修改。如图\
    \ 1-7 所示，单词“apple”和“apples”的哈希值之间的差异是显而易见的。\n\n![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig7_HTML.jpg](img/497553_1_En_1_Fig7_HTML.jpg)\n\
    \n**图 1-7**  \n哈希值的差异\n\n目前存在许多不同的哈希算法，但它们需要具备一些关键特性才能成功。其一，它们必须具有抗碰撞性，即你无法找到两个能产生相同输出的输入。其二，它们应具有抗原像性，即你无法根据输出的哈希值推测出输入。这些算法在网络安全中常用于密码方案，以提高应用程序的安全性。应用程序不再直接存储密码，而是存储密码的哈希值，这样密码就不会轻易被从应用程序中窃取（尽管常用密码仍可能被攻击者破解）。过去，有好几种此类算法被“攻破”，意味着人们可以逆向将哈希值还原为原始输入。\n\
    \n这在区块链技术中是如何应用的？有多种方式，稍后你会看到。你可能能想到这可以在任何领域应用的几种方式。你可以对一份文档进行哈希运算，并将其安全地存储在某处；如果你想证明该文档未被修改，只需重新计算文档的哈希值，并与存储的哈希值进行比较即可（这实际上是除了加密货币之外，区块链的首批用例之一）。\n\
    \n在区块链中，这种技术被用于使生成的交易能够被快速比较。当你开始对交易进行哈希运算时，你也可以对哈希值进行哈希，并从一组哈希值中最终生成一个单一的哈希值。这被称为*默克尔树*，可用于压缩大量数据。默克尔树可用于证明一个区块中包含哪些数据（见图\
    \ 1-8）。\n\n![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig8_HTML.jpg](img/497553_1_En_1_Fig8_HTML.jpg)\n\
    \n**图 1-8**  \n简单的默克尔树\n\n所有这些区块都由一组组交易组成，这些交易链条连接成一个巨大的账本。实际上，区块链仅仅代表了网络中已发生交易的历史概览。这些技术共同帮助我们创建了一个只能追加交易的账本，该账本分布在整个网络的所有节点上。这些交易包含在一个由区块组成的链表中。\n"
- fmt: '# Building Blocks


    The term “blockchain” refers to the very core of the technology. The underlying
    data structure is an ordered back-linked list of blocks that consist of transactions.
    These transactions represent payments between all the participants taking part
    in the blockchain network. The term “payments” here should be seen as quite broad.
    It could consist of payments as we know them via cryptocurrencies, but it could
    also refer to any action confirmation between two parties depending on the blockchain
    platform. The way the blocks are linked to each other is by using the hash of
    the previous block that was last added to the chain, as seen in Figure [1-9](#497553_1_En_1_Chapter.xhtml#Fig9).
    If you think about it, the blockchain with the transaction data is nothing more
    than a ledger where the data has been structured in a different way.


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig9_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig9_HTML.jpg)


    Figure 1-9 - Linking blocks together


    Because we know that each hash is a unique fingerprint, we can always know for
    sure that the block is part of the chain. It’s important to note here that a parent
    block (the most recently added block) can have more than one child block, while
    a child will always have one parent. If there is more than one child, we are dealing
    with a fork in the system. Normally these forks will be resolved and only one
    of the children is used to continue the chain (and become a parent themselves).
    In some cases, however, some of these forks stay on and we will deal with separate
    chains that all once started from the same parent. We always need to have a starting
    point, a first block, which is conveniently called the *genesis block*. Because
    we could visually understand that blocks are being stacked on each other, we refer
    to the most recent block as the “tip” or “top” and the distance to the genesis
    block as the “height.”^([⁴](#fn4)) The greater this height becomes, the more difficult
    it will be to change one of these earlier blocks. The longer the chain becomes
    from a certain block, the more computer power it will require to recalculate the
    information contained in all the blocks.


    What else is stored in the blocks? We have two main parts between which we have
    to distinguish: the block itself and the block header. The hash of the previous
    block is one of the items that is stored in the block header. This way, the chain
    between the blocks is created. That is not the only thing though—depending on
    the blockchain platform, you can also find the Merkle root, timestamp, and nonce,
    as well as a couple of other parameters (i.e. difficulty target, version, …).
    Figure [1-10](#497553_1_En_1_Chapter.xhtml#Fig10) shows an example of the Bitcoin
    blockchain.


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig10_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig10_HTML.jpg)


    Figure 1-10 - Block header information Bitcoin


    Not all this information will be clear for now, but no worries, we will explain
    as we go on in the book. The Merkle root gives us the digital fingerprint of the
    transactions that are stored in the block itself. This is a “hash of hashes” based
    on the transaction IDs or “TXIDs.” This hash is unique for the transactions in
    the block itself. See Figure [1-11](#497553_1_En_1_Chapter.xhtml#Fig11).


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig11_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig11_HTML.jpg)


    Figure 1-11 - What can be found in the Merkle root for Bitcoin


    Again, this is a simplified view of what can be found in the block headers. Of
    course, the block consists of more than the block header. The bulk of a block
    is made up of the transactions. See Figure [1-12](#497553_1_En_1_Chapter.xhtml#Fig12).


    ![../images/497553_1_En_1_Chapter/497553_1_En_1_Fig12_HTML.jpg](images/497553_1_En_1_Chapter/497553_1_En_1_Fig12_HTML.jpg)


    Figure 1-12 - The entire chain


    As you can see, we are dealing with huge amounts of data, not only in the blocks,
    but also in the block header. It is the hash that is ultimately calculated from
    the entire block that can correctly and uniquely identify that block within the
    entire blockchain.^([⁵](#fn5)) For Bitcoin, the `SHA-256` algorithm combined with
    `RIPEMD-160` is used to calculate these hashes, but these algorithms can differ
    quite a lot depending on the platform you are using. Now that we have an idea
    of how transactions are put into blocks and how everything is linked together,
    the main question remains: how do we perform transactions? The idea is that you
    can sign your transactions with your private key in such a way that it is not
    only clear that you are the person who is spending it, but also that you have
    the right to spend it and that you didn''t spend the currency twice. Transactions
    are broadcast through the network and mined into blocks. These will only be processed
    if these transactions are performed based on the consensus rules that all participants
    agree on.


    In short, the lifecycle of a transaction is as follows:


    1. A transaction is created and signed by the creator. This transaction should
    immediately contain all information necessary to verify and execute the transaction.


    2. These proposed transactions are shared with other nodes in the network, which
    verify them.


    3. If accepted, the transactions are propagated throughout the network; otherwise
    they are discarded. Mining nodes can include these transactions in blocks that
    can be mined and eventually added to the chain of earlier accepted transactions.'
