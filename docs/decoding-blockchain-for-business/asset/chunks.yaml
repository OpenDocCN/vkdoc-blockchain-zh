- fmt: '# Blockchain and Finance


    With its very nature set in finance, blockchain technology can offer various solutions
    in the world of finance to improve existing markets or help create entirely new
    ones, depending on the use case and the creativity of those willing to investigate
    the opportunities. However you look at it, distributed data storages can help
    facilitate how data is provided in real-time to all parties that wish to participate
    in the market. This way there can no longer be a discussion about who has access
    to market data in a fair manner. Marketplaces could be created where assets are
    traded over the blockchain platform, just as crowdfunding solutions that allow
    for smaller projects and companies to find funding. Assets can be transferred
    in a way that is transparent to all participants, easily verifiable, and cost-effective.
    Clearing and settlement processes can be fully automated and logged when using
    smart contracts.


    For the regulators, trade surveillance should no longer prove to be an issue,
    with clear and immutable logs of each transaction. Money transfers can happen
    without the interference of third parties that claim their share of the transaction.
    Interbank payments could happen smoothly without time being lost and data could
    once again be shared with interoperable systems. Financial inclusions could be
    achieved for those that have no access to financial services and are left in the
    cold by the current institutions. By allowing these individuals to partake in
    these processes, we could provide them with better lives and ways of living. Foreign
    exchange, just as any other form of payment system, could happen over distributed
    ledgers, improving the current legacy systems that are in place and again eliminating
    the third parties that take their share.


    Entire loan markets could be facilitated over blockchain platforms. People who
    currently have no access to loans and are left to the sharks that profit from
    their misery could find a sustainable solution by using microloans or new types
    of contracts that are built to their needs. The letter of credit is also a classic
    bank product for business partners all over the world to work and trade with each
    other. Again, blockchain technology could help to optimize and automate existing
    processes and reduce costs. There have also been talks, startups, and applications
    that focus on the creation of derivatives, margin calls, CDS, swaps, and stocks.
    The possibilities are endless, depending on how you look at current processes
    or what you can imagine for new products.


    ## The Finance Department


    It might be interesting to take a look at the finance department and spot the
    opportunities within the confines of this department. As always, every project
    impacts other departments and the company as a whole. However, you can easily
    see that when you start projects within that same finance department, you can
    use them as a center of innovation, which in turn can change the entire organization.
    By the very nature of the technology, this could even include the supply chain,
    the suppliers, and the customers.


    ### ERP


    So, why would you consider integrating your ERP system with blockchain technology?
    This might result in several advantages. As the Enterprise Resource Planning system
    is used to manage accounting, procurement, project management, and supply chain,
    data accuracy is of key importance. It is used to centralize all business data,
    which allows deeper control over the business operations and the decision making.
    However, data accuracy cannot be assured, human errors can be made when creating
    bookings, and the master data might be wrong, all which lead to mistakes in reporting,
    payments, and so on.^([^(50)](#fn50))


    The blockchain, which offers an immutable ledger and promotes transparency, can
    be an interesting option when you think about data and ERP systems. It could improve
    auditability as well, as all transactions are locked in a blockchain so that no
    changes can be made at a later point in time. This naturally also increases the
    security of the data being stored on the ERP, but on top of that, the mechanism
    of private keys ensures that only certain people can access the system. Smart
    contracts could add extra functionalities and automate intercompany transfers,
    order handling, procurement requests, and payments. This in turn could speed up
    the processes that are currently often done manually or by partial automation.
    All of this could lead to reduced costs due to both process optimization and the
    reduction of intermediaries in the process.


    One supporter of such integration between ERP and blockchain is SAP.^([^(51)](#fn51))
    SAP seems to have several ideas when it comes to the blockchain technology and
    their ERP system. One of those is manufacturers, as various types of information
    can be logged and shared within the same ledger. By giving access to major stakeholders,
    specifications about machinery and product manufacturing can be retraced. With
    `SAP Leonardo`, `SAP cloud platform`, and `SAP HANA`, the possibility to use `Hyperledger
    Fabric` or `multichain` allows for blockchain integration within current ERP environments.^([^(52)](#fn52))
    Another initiative of SAP focuses on the pharmaceutical supply chain, where the
    `SAP information collaboration hub for life sciences` is used in the battle against
    counterfeit drugs. Other examples where SAP is exploring such possibilities are
    tires, tech, and shipping.


    Another company that has explored the possibilities is IBM, with its Oracle Enterprise
    applications team, which works on solutions that integrate blockchain with the
    Oracle ERP cloud.^([^(53)](#fn53)) They see opportunities for manufacturers (details
    for each component of a product shared among the stakeholders), finance (transactional
    data from multiple financial systems can be collected in one environment, which
    eases the audit trail and compliance to company policies), law (shared repositories
    of legal documents), and food services (real-time follow-up on the food supply
    chain).


    ### CRM


    CRM (Customer Relationship Management) systems are used to improve the customer
    relationship of enterprises. Even though not directly related to the finance department,
    they allow companies to increase customer retention and follow up on opportunities.
    On top of that, it also allows for automation of certain tasks, closer control
    over processes, and the clear value of statistics and reporting, which allows
    for improvement opportunities within the enterprise.


    Salesforce understood the possibilities of the blockchain technology and integrated
    it in their `Customer 360` platform.^([^(54)](#fn54)) They offer the blockchain
    technology to capture activities that have taken place on the platform and deliver
    this data to specific workflows, which allow for automation and standardization.
    When data can be provided in such a fashion, it allows for data analysis, uses
    data for chatbots, and of course creates an audit trail. The underlying distributed
    ledger technology can also provide the data to other applications and apps or
    even to other partners in the business network of the enterprise.'
