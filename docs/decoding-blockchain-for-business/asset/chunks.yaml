    # 5. 区块链与加密货币


    至此，你已经对区块链技术有了不少见闻和了解。然而，在本书的结尾，我想再介绍一些你应该知晓并理解的核心概念。这将有助于你深入观察加密货币市场，理解其运作方式。随着加密货币的诞生，多种新型金融工具被设计出来，同时已有的金融资产也纷纷进入了加密货币的世界。

    '
- fmt: '# A Short History of Crypto-Markets


    The history of cryptocurrencies and assets is strongly linked to the history of
    the blockchain technology itself, or at least it was in the beginning. Sadly,
    the reputation of the technology was tarnished when the markets crashed after
    the huge hype created in 2018-2019.^([^(247)](#fn247)) As we saw in Chapter [1](#497553_1_En_1_Chapter.xhtml),
    everything starts in October 2008, when an unknown individual called Satoshi Nakamoto
    released their whitepaper describing Bitcoin. The initial idea sparked both interest
    and skepticism and the first blockchain block ever, the Bitcoin genesis block,
    was released in January 2009. It was also in this month that the first transaction
    took place, between Satoshi Nakamoto and a developer named Hal Finney. This was
    the beginning of the cryptocurrency world. In October 2009, there was a first
    valuation of Bitcoin with the New Liberty Standard, where `$1 = 1,309 BTC`. The
    first Bitcoin market, `dwdollar`, was established in February 2010. For the first
    time ever, other participants could buy and sell the cryptocurrency.


    In May 2010, a notable milestones takes place in the Bitcoin world, still known
    to many enthusiasts and participants of the cryptocurrency world. Laslo Hanyecz
    spends about 10,000 BTC to buy a pizza from Papa John’s. It was the first real-world
    transaction where the cryptocurrency was used to buy something material. This
    height in perception would be crushed a couple of months later (August 2010) when
    first there was a hack that maliciously acted on a vulnerability in the Bitcoin
    network, leading to the generation of 182 billion Bitcoins. The value of the cryptocurrency
    is reduced to almost nothing. The perception of Bitcoin would undergo even more
    damage when there were more vulnerabilities discovered in September of that year,
    while in October there was a report suggesting that Bitcoin could be used for
    money laundering and financing terrorist activities.^([^(248)](#fn248)) Still,
    in November of 2010, the market would reach a value of $1 million USD (at a valuation
    of `$0.50/BTC`).


    In 2011, the first price surge of Bitcoin takes place, which leads to a valuation
    in June of `$31/BTC` (starting from parity in January). Fast forward to June 2013,
    when the market reaches a capitalization of $1 billion. It is also around this
    time that the first regulation is released by the U.S. Financial Crimes Enforcement
    Network. A couple of months later, another major theft took place,^([^(249)](#fn249))
    followed by another security breach, crushing the value of Bitcoin to `$0.01`.
    In August of the same year, U.S. federal judge Mazzant^([^(250)](#fn250)) first
    states that Bitcoin can be used as a currency to be exchanged for goods and services.
    At the same time, Bloomberg starts with the integration of Bitcoin data in its
    portal, increasing the acceptance of the cryptocurrency.^([^(251)](#fn251))


    The first major divide occurs in November-December, 2013. While the U.S. Senate
    starts their first hearings on Bitcoin, the Federal Reserve chairman, Ben Bernanke,
    gives his blessing and support for the network. In China, on the other hand, the
    first ban is imposed on financial institutions from handling Bitcoin transactions.^([^(252)](#fn252))
    In 2014, overstock.com becomes the first large retailer to accept Bitcoin payments,
    while Elliptic launched the first insured Bitcoin storage service. Later that
    year, the Silk Road is closed and its Bitcoins (29,000) are being sold by the
    U.S. government.^([^(253)](#fn253)) In New Jersey the first regulated Bitcoin
    investment fund (GABI) received its certification.^([^(254)](#fn254)) By the end
    of the year, TeraExchange starts with the first Bitcoin-derived transactions on
    a regulated exchange. This meant further integration of the currency in the standard
    ways of working and acceptance by the main financial institutions.


    In 2015, the New York Stock Exchange becomes one of the investors behind Coinbase,
    the UK Treasury starts a call for information on digital currency, and Barclays
    starts to accept Bitcoin as well. The next year, the cabinet of Japan recognizes
    virtual currencies as having a similar function as regular currencies and Bidorbuy
    in South Africa starts to accept Bitcoin as payments together with Steam. In August,
    a new major hack takes place with Bitfinex. Later in 2016, the Swiss railway operator
    SBB would accept Bitcoin in their ticket machines.


    The year 2017 saw an even further surge in stores accepting Bitcoin and other
    cryptocurrencies, whereby Russia and Norway accept, legalize, and further integrate
    Bitcoin payment accounts. In both 2018 and 2019, more and more stores started
    accepting cryptocurrencies, but they are still in the corner when compared to
    regular currencies. These years have also seen further crashes and rises in the
    market. With the appearance of the Coronavirus, both the regular market and the
    cryptocurrency market have seen serious decline. Only time will tell how it will
    affect these markets in the long run.'
