    A special thanks to Shiva, who was the first to offer me positive feedback and
    lead me through the process. Thanks also to Rita and Matthew, who helped me review
    and adapt the book to what it is today. Even in difficult times, they were more
    than willing to help me every step of the way.


    I would also like to thank some people who are special to me. I would like to
    thank my parents. They have always supported me throughout my life, no matter
    what. My father taught me the value of perseverance and that I should never give
    up. Hard work eventually pays off. My mother gifted me with the passion for reading
    and learning, helping me every step of the way. She has always believed in me.
    Mom, dad, I love you.


    I also want to thank my brother. He always keeps me on my toes and challenges
    me in everything. I can say that, without a doubt, he is always in my corner and
    forces me to look at things with a different perspective. If there is one person
    who always tells me the truth, even when I don’t want to hear it, it is him. Bram,
    I couldn’t have wished for a better brother and I can simply say that I love you
    (even if you don’t want to hear it).


    Of course, there is also my girlfriend (and wife-to-be), Tatiana. I dedicated
    this book to you for a reason. I have never been happier since I met you. I know
    I drive you crazy all the time, certainly when I am writing or babbling on about
    technical things. Thank you for putting up with me and challenging me every day
    (and I really mean every day) to do new things. And in case you might have missed
    it: I love you!


    Finally, I would like to thank my friends and colleagues who have put up with
    me and my insanities over the years. I am the luckiest guy on the planet to have
    a group of people like you in my life. Some of you I have known for many years,
    and I thank you for being in my life. For those of you I have only recently met:
    you can stop dreaming, I never change. And one last special thanks to Karine Verstricht
    for the photo she made for the book!


    About the Author


    # 1. Blockchain in Business


    ## A Short Word on the Past


    While we are looking toward the future in this book, it is still crucial for you
    to understand the past. There have been some “experiments” in the past, such as
    *B-money,* which was a type of cryptocurrency released in 1998 by Wei Dai. (Bitcoin
    was even named after B-money, so its importance cannot be underestimated.) Even
    before the emergence of B-money, David Chaum created *ecash* in 1983. People often
    have the idea that the search for a real “digital” currency is something new,
    but ever since the advent of the Internet, people have been searching for ways
    to implement digital currencies securely. It is in this pursuit that blockchain
    finds its roots. Technologies rooted in security (such as hashcash) and the idea
    of peer-to-peer networks (which we know from file sharing applications such as
    Napster and BitTorrent) all also crucial parts that eventually led to the blockchain
    technology.


    The real name of the person who started the entire blockchain revolution remains
    to this day unknown. All we know is that she/he/they called themselves “Satoshi
    Nakamoto.” It was in 2008 that Satoshi Nakamoto published a whitepaper titled:
    “Bitcoin: A Peer-to-Peer Electronic Cash System.” In this paper, an alternative
    solution was proposed to solve the well-known Byzantine General’s problem in computer
    science and the double spending problem more known in economic fields. The Byzantine
    General’s problem refers to the issue of how one can know if a certain message
    is real when several parties are sending messages and one or more has become corrupted.
    Who do we trust and how do we know who the liar is? The double spending problem
    is a classic case surrounding digital currency. Physical money can only be spent
    once, but how do you prevent digital money from being spent twice?


    In combination with earlier technologies, Satoshi Nakamoto introduced a new concept:
    a *proof-of-work algorithm* that would allow a distributed computer system to
    accept transactions in contrast to all earlier solutions, which needed, in one
    way or another, a central authority to accept transactions or create currency.
    Consensus is at the core of the paper; consensus between the members of the network.
    The main idea that you should consider when you think about the advent of blockchain
    is that of distrust. Bitcoin was created in a time of political and financial
    unrest, as the financial crisis of 2008 was unfolding all over the world. This
    distrust was of any central entity that could be corrupted or become “too big
    to fail.” Blockchain could fix this very problem, as its entire system is built
    on not trusting the other party. You don’t have to trust them and you don’t need
    some impartial third party to validate the other participants. The network itself
    ensures that each participant falls in line, or is eventually destroyed by the
    network. That last statement might sound a little bit harsh, but it is a core
    concept to understand.'
  trans: '

    # 致谢


    在本书的撰写过程中，有几位人士我希望能在此致以谢意。这绝非我一人独力完成的事业，因此有许多人值得在此被提及（若有遗漏，敬请见谅！）


    首先，我要感谢 Apress 出版社的各位同仁。这是我出版的第一本书，他们从一开始就报以热忱，并全程积极为我提供帮助。特别感谢 Shiva，他是第一个给予我积极反馈，并引导我完成整个出版流程的人。同样感谢
    Rita 和 Matthew，他们协助我审阅并调整书稿，使之成为今天的面貌。即便在困难时期，他们也始终不遗余力地帮助我走好每一步。


    此外，我还想感谢几位对我而言意义非凡的人。我要感谢我的父母。无论遇到何种情况，他们始终是我人生中最坚实的后盾。父亲教会我坚持的价值，让我明白永不言弃的道理，辛勤工作终会有回报。母亲则赋予我对阅读和学习的热情，并在每一步都给予我支持。她始终相信我。爸爸妈妈，我爱你们。


    我还要感谢我的兄弟。他总是让我保持警醒，并在每件事上向我提出挑战。我可以毫不怀疑地说，他始终站在我这一边，并促使我从不同的角度看问题。如果说有一个人总是对我说实话，即使在我最不想听的时候，那一定是他。Bram，我无法奢求一个更好的兄弟了，只想简单地对你说：我爱你（即使你不想听）。


    当然，还有我的女友（也是我未来的妻子），Tatiana。我将这本书献给你是有原因的。自从遇见你，我从未像现在这般快乐。我知道我总让你抓狂，尤其是在我喋喋不休地谈论技术话题或埋头写作的时候。感谢你包容我，并且每天都（我真的是说每一天）激励我去尝试新事物。唯恐你错过：我爱你！


    最后，我要感谢我的朋友们和同事们，感谢你们多年来对我的包容和容忍我的疯狂。能拥有你们这样一群人在我的生命中，我觉得自己是地球上最幸运的人。有些人我已相识多年，感谢你们出现在我的生命中。对于那些我最近才结识的朋友：你们可以停止幻想了，我本性难移。最后，特别感谢
    Karine Verstricht 为本书拍摄的照片！


    # 关于作者


    # 1. 商业中的区块链


    ## 关于过去的一点简述


    虽然本书着眼于未来，但理解过去对你来说依然至关重要。过去曾有一些“实验”，例如由戴伟（Wei Dai）于 1998 年发布的一种加密货币——`B-money`。（比特币甚至以
    `B-money` 命名，其重要性可见一斑。）甚至在 `B-money` 出现之前，大卫·乔姆（David Chaum）就在 1983 年创建了 `ecash`。人们往往认为寻求真正“数字”货币是近年之事，但自从互联网问世以来，人们就一直在寻找安全实施数字货币的方法。区块链正是源于这种追求。植根于安全性的技术（例如
    `hashcash`）以及点对点网络的概念（我们从诸如 `Napster` 和 `BitTorrent` 这样的文件共享应用中熟知此概念），也都是最终促成区块链技术的关键部分。


    开启整个区块链革命之人的真实姓名至今不为人知。我们只知道他/她/他们自称“中本聪”。2008 年，中本聪发表了一篇白皮书，题为：“Bitcoin: A Peer-to-Peer
    Electronic Cash System”（比特币：一种点对点的电子现金系统）。该论文提出了一种替代方案，用以解决计算机科学中著名的拜占庭将军问题以及经济学领域中更为人熟知的双重支付问题。拜占庭将军问题指的是：当多方发送消息，而其中一方或多方已变得不可靠时，我们如何知道某条信息是真实的？我们该信任谁？又如何知道谁在撒谎？双重支付问题则是围绕数字货币的一个经典案例。实体货币只能花一次，但如何防止数字货币被重复花费呢？


    结合早期技术，中本聪引入了一个新概念：一种`工作量证明算法`，它允许分布式计算机系统接受交易，这与所有早期解决方案截然不同——后者或多或少都需要一个中央权威来接受交易或创造货币。共识是该论文的核心；即网络成员之间的共识。当你思考区块链的出现时，应该考虑的主要概念是“不信任”。比特币诞生于政治和金融动荡的时期，当时
    2008 年金融危机正在全球蔓延。这种不信任的对象是任何可能腐败或变得“大而不倒”的中央实体。区块链恰好可以解决这个问题，因为其整个系统建立在“不信任对方”的基础上。你无需信任他们，也无需某个公正的第三方来验证其他参与者。网络本身会确保每个参与者遵守规则，否则最终将被网络淘汰。最后一句话听起来可能有点苛刻，但这正是需要理解的核心概念。

    '
- fmt: '一年后，比特币网络才正式问世。第一个区块被挖出（这就是所谓的**创世区块**，标志着网络的诞生。这个区块创造了最初的50个比特币，但它们完全无法使用！）。其创建者在区块中隐藏了一条信息：“The
    Times 03/Jan/2009 Chancellor on brink of second bailout for banks.” 这证实了该技术及整个加密货币网络的核心理念。当然，多年来，许多程序员对该实现进行了修订。中本聪仅在2011年前参与了开发，之后便从公众视野中隐退。社区不仅需要维护网络，还要定期更新它。这意味着，共识不仅存在于网络算法内部，也存在于网络周围的社区中。正如你之后会发现的，技术内部的共识被证明比社区内部的共识更可靠。多年来，比特币网络不断壮大（毫无疑问，它已发展成为一个巨大的市场）。但这种增长不可能一帆风顺，其他竞争者纷纷进入市场。


    在随后的几年里，**山寨币**或替代加密货币开始出现，例如莱特币、域名币等。所有这些币种都与比特币拥有相同的代码库，但试图加入自己关于加密货币应有形态的见解。有些试图增强隐私性；有些则试图增加每个新区块产生的加密货币数量、增加交易数量等等。但底层模型基本保持不变。尽管世界各国政府都清楚加密货币的发展，但直到2013年，才有一个政府采取行动。美国当局冻结了与加密货币交易所`Mt.
    Gox`相关的所有账户，因为它未注册为资金传输机构。这开启了许多关于区块链技术和加密货币法律语境误解的开端。相关研究随之展开，但要真正提供一个法律框架仍需数年时间。时至今日，许多政府仍在努力创建一个可供个人和企业使用的实际框架。


    比特币和其他山寨币开始面临的问题之一是与毒品贩运和恐怖主义的关联。早在2013年，比特币就在一次毒品调查中被查获，并且直到今天，仍有怀疑认为某些山寨币（尤其是那些注重隐私的）被用于资助犯罪活动。如今，加密货币交易所需要遵守与任何其他金融机构相同的法律，包括`KYC`（了解你的客户）法规和`AML`（反洗钱）法规。


    除了与犯罪活动的关联外，比特币及类似网络还存在另一个主要问题。它们通过网络间的交互消耗了大量的计算能力。然而，事实证明，在比特币网络上开发应用程序（极其）困难。时至今日，开发人员仍在努力寻找利用计算能力构建强大且可信的去中心化应用程序的新方法。其中一位正在开发比特币应用程序的开发人员是一位名叫维塔利克·布特林的19岁程序员，他即将改变世界。他看到了区块链技术的潜力，并意识到其潜力可能远超加密货币和金融服务本身。


    2013年底，维塔利克·布特林发表了他的白皮书（《下一代智能合约与去中心化应用平台》），描述了一种新的工作方式和一种新的开源协议。他想要解决的主要问题是比特币没有用于帮助创建去中心化应用的脚本语言。由于在比特币社区内难以达成普遍共识，他提出了一个全新的平台：**以太坊**。该平台于2014年1月在迈阿密举行的北美比特币大会上正式宣布。很快，创始人决定将该平台及其开发置于一个非营利组织（以太坊基金会）之下。开发工作将通过一种名为**以太币**的新加密货币的众售来资助。在以太坊黄皮书中，加文·伍德详细阐述了将智能合约放入区块链的理念，该黄皮书描述了以太坊虚拟机。


    2014年7月，以太坊基金会举行了一次以太币众售，售出了超过6000万个代币。基金会还创建了约1200万个代币用于资助未来的开发和营销工作。该网络的第一个版本在一年后发布，名为**前沿**。后续的每一次开发都伴随着新的名称和版本，这证明了网络不断演进的历程。


    随着时间的推移，越来越多的参与者带着各自对区块链技术或分布式账本平台的实现进入了这个领域，这些实现专注于特定的目标群体（例如，开发者甚至商业专业人士）或行业（例如，金融服务等）。其热度在随后的几年里不断攀升，并在2018年左右达到顶峰，此后则经历了一次大幅崩盘。与此同时，大约在2015年，`Hyperledger`项目诞生，可以说，它整合了当今企业区块链领域一些最著名的开发框架。目前已有超过6000种山寨币被创造出来，它们（大致）仍在运行。'
  raw: 'It was a year later that the Bitcoin network saw the light of day. The first
    block was mined. (This was the so-called *genesis block* *,* which meant the start
    of the network. The first 50 Bitcoin were created with this block but were completely
    unspendable!). A secret message was hidden in the block by its creator: “The Times
    03/Jan/2009 Chancellor on brink of second bailout for banks.” This confirmed the
    underlying ideas of the technology and the entire cryptocurrency network. Of course,
    the implementation has been revised by many programmers over the years. Satoshi
    Nakamoto was only involved with the development until 2011, after which they withdrew
    from the public scene. It was up to the community to not only uphold the network,
    but also update it regularly. This meant that consensus was not only something
    that was used within the algorithm of the network but also by the people surrounding
    it. As you will find out later, the consensus within the technology proved to
    be more reliable than the one in the community. Over the years, the Bitcoin network
    grew (as you without a doubt know to become a huge market). This could not continue
    unfettered and other competitors joined the market.


    In the years that followed, “altcoins,” or alternative cryptocurrencies, started
    to emerge, such as Litecoin, Namecoin, and others. All of these had the same codebase
    as Bitcoin but tried to add their own twist on how a cryptocurrency should look.
    Some tried to increase privacy; others tried to increase the amount of cryptocurrencies
    that were created with each new block, increase the number of transactions, and
    so on. But the underlying model basically stayed the same. Even though governments
    all over the world were well aware of the evolution of cryptocurrencies, it wasn’t
    until 2013 that a government took action. The U.S. authorities seized all accounts
    associated with Mt. Gox, which was a cryptocurrency exchange, because it wasn’t
    registered as a money transmitter. It was the beginning of a lot of misunderstandings
    concerning the legal context of the blockchain technology and cryptocurrencies.
    Research would follow, but it would take years before real action was taken to
    provide a legal framework. To this day, many governments still struggle to create
    a real framework that can be used by individuals and businesses.


    One of the issues that Bitcoin and other altcoins started to struggle with was
    the connection to drug trafficking and terrorism. As early as 2013, Bitcoins were
    seized during a drug investigation and, to this day, there are suspicions that
    some altcoins (certainly those focused on privacy) are used to fund criminal activities.
    Nowadays, crypto-exchanges need to adhere to the same laws as any other financial
    institution, including KYC (know your customer) legislation and AML (anti-money
    laundering) legislation.


    Apart from the association with criminal activity, there was another main issue
    with Bitcoin and similar networks. They used a lot of computing power through
    interactions across the network. However, developing applications on top of the
    Bitcoin network proved to be (extremely) difficult. To this day, developers are
    trying to work out new ways to use computing power to make powerful and trustworthy
    decentralized applications. One of the developers who was working on a Bitcoin
    application was a 19-year old programmer named Vitalik Buterin, and he was about
    to change the world. He saw the potential of the blockchain technology and realized
    that its potential could go much broader than cryptocurrencies and financial services
    alone.


    It was late 2013 when Vitalik Buterin published his whitepaper (“A Next Generation
    Smart Contract and Decentralized Application Platform”) describing a new way of
    working and a new open source protocol. The main issue he wanted to solve was
    that Bitcoin did not have a scripting language to help create decentralized applications.
    Because it proved too difficult to come to a general consensus within the Bitcoin
    community, he proposed an entirely new platform: *Ethereum* . It would be officially
    announced at the North American Bitcoin Conference in Miami, in January 2014\.
    Quite quickly, the founders decided to put the platform and its development in
    a nonprofit (the Ethereum Foundation). The development would be funded by a crowd
    sale of the new cryptocurrency called *ether*. The idea of putting smart contracts
    in the blockchain was specified by Gavin Wood in the Ethereum yellow paper that
    describes the Ethereum virtual machine.


    In July 2014, the Ethereum Foundation held an ether crowd sale that sold over
    60 million tokens. About 12 million tokens were created so that the Foundation
    could fund future development and marketing efforts. A first version of the network
    was released a year later and was called *frontier*. Any future developments came
    with new names and releases, proving the evolution that the network made.


    Over time, more and more players entered the field with their own implementations
    of the blockchain technology or distributed ledger platforms focusing on specific
    target groups (i.e., developers or even business professionals) or industries
    (i.e., financial services and others). Its popularity increased over the coming
    years and reached its highest moment around 2018, after which a massive crash
    followed. In the meantime, around 2015, the Hyperledger project was created, which
    has arguably incorporated some of the most famous development frameworks for enterprise
    blockchain today. Over 6,000 altcoins were created and are (more or less) functioning
    today.'
