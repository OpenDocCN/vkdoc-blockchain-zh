- fmt: '#### Other Systems


    As the blockchain technology becomes a feature in more and more CRM and ERP systems,
    it can be integrated with other financial and asset management systems without
    the enterprise having to worry about major changes when one of the applications
    releases a new update.^([^(55)](#fn55)) Once it’s integrated, it will have a major
    impact on how companies are currently working. Processes and workflows can be
    further automated, data can be standardized and shared among applications as well
    as with all partners in the business network. This in turn will lead to better
    business relationships, as necessary data can be shared and changes will be clearly
    exposed with audit trails.


    These data stores can in that sense also be used for new projects, such as better
    forecasting of sales and the supply chain, increasing the compliance of the overall
    process, improving the accounts payable and accounts receivable processes, and
    reducing costs.


    #### Invoicing


    Another major aspect is dealing with invoices. Many solutions attempt to deal
    with accounts payable and accounts receivable. Several blockchain startups have
    created solutions for existing problems in this area. Distributed Ledger Invoice
    systems that focus on invoice discounting have entered the marketplace to create
    more efficiency.^([^(56)](#fn56))


    One solution is `Populous World`, which focuses on invoice financing.^([^(57)](#fn57))
    With invoice financing, cash that is locked up in outstanding sales invoices is
    unlocked because buyers can buy the invoices at a discounted rate. Both invoice
    factoring and invoice discounting are offered on top of their platform, where
    they claim to be able to open up finances much faster than other partners, while
    companies retain up to 95% of their invoice value. One of the key items they like
    to show is that there are no fees for invoice buying, there are high returns,
    and the market becomes more globalized. With the use of blockchain, they open
    the market on a global scale while at the same time introducing transparency and
    security. Also, third parties and financial institutions are removed from the
    process in the finance system.


    A second example is `Prontapay`, which aims at using smart contracts to help businesses
    more efficiently get paid with lower transaction fees while using a stable, fast,
    and secure invoicing system.^([^(58)](#fn58)) Because invoices are sent over a
    blockchain platform, the smart contracts make sure that the “legal coding” creates
    a binding agreement between the buyer and seller.


    When you take the previous example, you can easily see that the data used to create
    the legal contract code can be used to feed it directly to ERP-systems so that
    the entire invoice cycle can be automated while keeping a clear audit trail.


    #### Data Dashboarding


    One final example is the `Anaplan` platform (but one could easily say the same
    for other dashboard or planning software). Blockchain technology can provide data
    in a similar way as `Anaplan` takes data from accounting systems today. Distributed
    ledgers can provide more data if it is in a shared environment, in a standard
    format, and includes a clear change log. This allows forecasting to become even
    more streamlined and compliant with the new regulatory reforms established by
    IFRS and other solvency frameworks.^([^(59)](#fn59))


    `Qlik` has started to look into how data linked to the blockchain technology can
    be visualized in an effective manner. Whether it’s the connections between pieces
    of data, time series data, or data at scale, `Qlik` can offer a solution so that
    you can create deeper insights into your blockchain networks.


    The process of checking data quality and data transformations can be largely automated.
    By creating a trusted data store with a clear compliance network surrounding it,
    the lives of data scientists, reporting professionals, and regulatory experts
    can be easier, and further investigations become possible. This can allow for
    further optimization of the organization as a whole.


    ### Assurance and Auditing


    A classic part of the business process is the audit and assurance process. They
    are key in making sure that reports have a foundation in reality. If there are
    certain assumptions made, the auditors have to make sure that they hold up. They
    have to ask questions relating to missing funds or inconsistencies, and so on.
    With the distributed ledger as an immutable representation of data, this could
    have a clear impact on how audits are being performed. Transactions that have
    taken place can easily be verified on such ledgers without a shadow of a doubt.^([^(60)](#fn60))
    As in all the other industry scopes we have seen so far, you should understand
    that there is a major opportunity for automation. The existence, accuracy, and
    completeness of information can all be locked in the ledger and be checked with
    smart contracts.


    Of course, as we have already stated several times, one shouldn’t trust blockchain
    technology blindly. As with any new technology, there are possibilities for fraud
    and hacking. Not all vulnerabilities are clear yet and, as with any digital technology,
    there is an arms race between those that wish to defend and those that wish to
    attack.


    In this sense, it is of major concern that necessary safety measures have been
    taken (automated and otherwise), that regular audits take place, and that pentests
    are performed so that the ledger remains secure. Other risks come out of the type
    of blockchain technology you are using. As there are many different kinds out
    there, they each have advantages and disadvantages. Sometimes transactions are
    irreversible, counterparties are hidden, transaction amounts can disappear, private
    keys can never be recovered, and so on. This means that, as always, you shouldn’t
    look at distributed ledgers as a magical solution. Risks are inherent in any technology
    and you have to understand what the capabilities are to find the right use case.
    An example is the blockchain-based tool launched by `Armanino`.^([^(61)](#fn61))
    Traditional techniques are still necessary to gain the final report, but intermediary
    audits can be automated.


    ### Accountancy


    In line with auditing, blockchain technology could have a major impact on accountancy.
    As the technology itself is often described as a distributed ledger, the connection
    is clear. The technology finds its roots in transactions, ownership, and a ledger
    of financial information. Accounting platforms with an underlying blockchain-like
    distributed ledger technology could change the future of the industry. For this
    to function, there is a clear need for standards and regulations. If we could
    achieve this, the need for reconciliation and conflict management could be reduced
    to the bare minimum.^([^(62)](#fn62)) Blockchain would also increase the transparency
    of financial information and could have a major impact on the timeliness of transactions.
    Fraud could, in a similar sense, be reduced. “Cooking the books” is much harder
    when you are dealing with immutable transactions and multiple participants who
    need to verify and confirm these transactions. Also, classic “human error” could
    easily be detected and filtered out of the ledgers, as the other participants
    could recognize and reject it.


    One organization promoting the possible opportunities in tax, accountancy, and
    auditing is the Accounting Blockchain Coalition. It has many partners working
    together to achieve this goal.^([^(63)](#fn63))'
