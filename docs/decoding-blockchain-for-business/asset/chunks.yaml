  trans: '

    你也可以将先前关于物联网的故事与人工智能和区块链技术结合起来。利用物联网设备涌入的大量数据，你能看到进行分析的价值。通过将机器学习算法整合到去中心化平台中，你不仅能单纯使用分布式账本，还能通过整合分析高效地构建物联网网络，从而提升价值。一家名为
    `Finalze` 的公司已经看到了这一机遇，它将可穿戴设备与行业工作流程中的安全规范相结合。^(²²) 其他公司则专注于供应链优化、商业网络、健康数据、企业能源管理、交易预测、自动促进支付的参与证明平台、资本募集、网络安全等领域。


    我想分享的最后一个例子是微软所做的努力。该公司希望将区块链和人工智能技术结合起来，让人们能够轻松且经济高效地运行先进的机器学习算法，同时还能共同贡献数据并改进模型。区块链技术允许创建一个去中心化的市场，参与者可以获得透明度，并确信他们正在与正确的代码进行交互。通过智能合约，参与者可以因其提供的数据或对模型所做的更改而获得报酬。


    当你思考前面的例子时，就能理解其可能性几乎是无限的，而可能的结果也是相似的。你还应该考虑到人工智能与区块链整合中可能存在的陷阱。其一，神经网络需要海量数据，为此通常使用数据湖。这些数据湖（以及数据仓库）用于确保数据质量，并确保新项目和算法始终有足够的数据可用。一个区块链平台可以在一定程度上确保数据质量得到尊重和维护。然而，正如我们之前多次提到的，可扩展性可能是一个问题，并且通过某些平台快速提供大型数据集可能并不那么容易。这意味着会形成一个额外的瓶颈，从而在数据市场领域制造了一个新问题。这并不意味着这种情况必然发生，只是意味着在创建支持数据科学的集成方案时，需要考虑有向无环图和分布式账本的局限性。


    ## 区块链与云


    与许多其他技术一样，大型云服务提供商也发现了围绕区块链技术的热潮，并不得不迎头赶上。亚马逊、谷歌、微软和其他公司都已进入市场，为那些希望在现有（云）架构内开发区块链解决方案的企业提供方案。为此，它们建立了自己的平台，并与多家初创公司建立了合作伙伴关系。一个例子是
    AWS 与 `Kaleido`（后者又与 `ConsenSys` 相关联）之间的合作。此外，`Corda` 有运行在 `AWS` 云平台之上的应用程序，`BlockApps`
    也出现在其合作伙伴名单中。^(²³) 其目标是将区块链技术更贴近企业的现有现实，并使整个流程更加顺畅。^(²⁴) 同样，谷歌云也已开始与初创公司 `Digital
    Asset` 和 `BlockApps` 合作，以加大力度为其合作伙伴和客户打造有吸引力的云平台。`Chainlink` 的应用程序以及 `OneLedger`
    也已被该平台收录。^(²⁵) ^(²⁶) 微软 Azure 则允许轻松实现与 `Corda`、`Ethereum` 和 `Hyperledger Fabric`
    技术的集成。^(²⁷) 最后，IBM 也带着自己的平台和清晰的 `Hyperledger Fabric` 实现方案加入了竞争。^(²⁸)


    我在这里还可以提到许多其他公司，但目的并非逐一讨论这些平台。关键是要让你理解在云实例上，甚至是“作为服务”来运行区块链应用的优缺点。这种设置的优点显而易见。与其他云应用一样，它允许你快速部署应用，而无需直接处理基础设施成本和搭建工作，你可以通过点击鼠标来部署新机器，而无需在数据中心自行安装服务器。


    例如，如果你将此与 `Hyperledger` 平台结合，就能在几分钟内创建一个由你控制的联盟链应用。除此之外，如果你将区块链与云计算相结合，就能更高效地追踪所有权，因为你可以开发应用来取代当前过时的流程，例如通过存管信托公司进行清算。^(²⁹)
    与区块链一样，云计算也有助于推动当前的去中心化趋势。起初这看起来可能有些奇怪，因为云计算只是使用基础设施（或平台）的一种不同方式，但如你所知，你可以选择全球各地的不同数据中心来备份数据，并在远程位置运行应用程序。这有助于创建维护数据库副本并独立运行的节点。


    在这里你还能找到边缘计算的概念，近年来（尤其是在物联网出现后）它越来越受到关注。借助区块链技术，可以实现对网络的可靠访问和控制，从而为扩展提供更多可能性。^(³⁰)
    通过节点的分布，可以想象地理风险（战争、自然灾害等）得以降低；由于数据中心遍布全球，即使是私有区块链平台也能得到针对此类事件的保护。

    '
- fmt: '# 云服务与区块链技术的优势与挑战


    多数云服务提供商会承诺一定的正常运行时间和灾难恢复能力，从而使企业能够在自身范围内保障并维持一定的效率。另一个优势与云计算成本的持续下降有关，这使得使用微交易更具吸引力。当前的发展表明，云实现可以摆脱运行完整虚拟服务器的需求。相反，只需要复制操作系统即可让应用程序运行，从而降低成本。最后，还有分布式超级计算的概念。许多计算机可以连接到运行在类云环境之上的区块链平台，这反过来有助于在所有节点上划分、管理和分配工作。这再次联系到了去中心化存储和边缘计算的使用，正如我们在物联网（IoT）背景下所看到的那样。


    你可以看到，为区块链应用选择云服务提供商有许多优势，但你不应对这种实现可能存在的弊端视而不见。这些弊端与云计算的一般缺点紧密相关。其一便是持续需要互联网连接才能使用你的服务。^([^(31)](#fn31))
    尽管大多数主流云服务商都制定了服务等级协议（SLA），承诺95%甚至更高的正常运行时间，但这仍然是一个需要考虑的因素。你可能会争辩说，区块链平台同样需要互联网连接。嗯，这并不完全正确。你可以搭建一个私有区块链网络，在其中不需要实时互联网连接，或者你可以使用卫星技术甚至短信（SMS）来传输交易。虽然公共平台通常依赖互联网，但对于私有实现，你完全不受限制。


    第二个弊端是在云环境中使用存储、备份和计算能力的问题。这点因提供商而异，但你不应对可能的缺点视而不见。现在在云平台上运行分布式账本可能看起来非常实惠，但随着网络和存储的增长，你还能负担得起这些成本吗？使用这样的应用是否仍然有利可图？此外，在这些问题浮现的地方，供应商锁定的风险也悄然逼近。


    第三个弊端是，你再次信任了第三方（这本身就与区块链技术的理念相悖）。你必须能够信任该方拥有安全的环境、可靠的数据中心以及可靠的管理框架。如果不是这样，一旦出现问题你该怎么办？你完全失去了控制。


    第四个重要的弊端与我的第三点相关。针对云服务商的黑客攻击事件有所增加。一个常见的错误是，各方盲目地信任他们的云服务商是安全的，并能长期保持这种安全。事件已表明情况并非总是如此，可能会发生导致数据泄露甚至更严重后果的事件。再次强调，你是在信任第三方为你的应用提供安全保障。


    世界正持续向基于云的解决方案和基础设施迈进。因此，我们不应感到惊讶，许多区块链平台都与云有一定联系，并利用这些基础设施来帮助扩展网络。未来无疑将出现更多这样的协同效应，并且，在考虑到可能的弊端后，我们最终可能会创造出精彩的用例。


    ## 区块链与网络安全


    尽管区块链网络和技术存在众多攻击向量，但这并不意味着它在未来毫无前景。该技术甚至可能在网络安全领域得到应用。目前，它可能是迄今为止最有助于防止数据窃取和欺诈的技术之一。由于分布式账本的特性，攻击者必须攻击并摧毁整个网络才能更改数据，从而破坏数据本身的完整性。`Guardtime`^([^(32)](#fn32))
    公司已经将这项技术用于数据保护。每一份数据都通过网络进行分发，因此，当有人试图篡改数据时，会有一个完整的系统分析来决定该数据是应该被更新还是保持不变。类似地，数据的可用性也得到了保障。攻击者可以瘫痪网络中的一个节点，但数据仍由网络中的其他节点提供。攻击者必须瘫痪网络上的所有节点才能阻止数据的可用性。当我们处理的是大型网络时，这几乎是不可能的。


    区块链技术的另一个可能性是创建更安全的域名系统（DNS）服务。目前，这些服务是中心化的，当攻击者能够访问该服务时，她就能破坏网站与`IP`地址之间的连接。利用区块链技术，可以将部分服务去中心化，从而使攻击者更难破坏连接。^([^(33)](#fn33))
    第三种可能性在于身份确认。利用区块链技术，一方无需透露身份即可获得信任。通过分布式账本的验证或使用零知识证明，可以确保另一方值得信任，而无需透露关于该方的任何进一步信息。这促进了相关双方的隐私和安全。


    这些仅仅是区块链可能如何影响网络安全世界的一些例子，但你可以轻易地看到，在未来几年内将有更多的用例出现。这项新技术对网络安全专业人士来说既是挑战也是机遇。


    与安全领域紧密相关的是合规性和身份的使用。两者都可以通过区块链技术得到增强。由于网络促进了透明度，所有用户操作都可以被验证和检查，以便轻松识别违规者。同样，身份可以由网络锁定和提供，因此关于你是谁以及你随时间采取了哪些行动都不会有疑问。'
  raw: 'Most cloud providers promise a certain uptime and disaster recovery so that
    within the sphere of the enterprise, they can secure and maintain a certain efficiency.
    A next advantage relates to the dwindling costs of cloud computing, which makes
    it more interesting to use microtransactions. Current developments have shown
    that cloud implementations can move away from the need to run a full virtual server.
    Instead, only the operating system has to be replicated to allow the application
    running, therefore reducing the cost. Finally, there is the idea of distributed
    supercomputing. Many computers can be linked to a blockchain platform running
    on top of a cloud-like environment, which in turn can help to partition, manage,
    and distribute the work over all the nodes. Again, this links to the use of decentralized
    storage and edge-computation, such as we have seen in the context of the Internet
    of Things.


    You can see that there are many advantages of looking at cloud providers for blockchain
    applications, but you shouldn’t be blind to the possible disadvantages of such
    an implementation. These disadvantages are closely linked to the disadvantages
    of cloud computing in general. One is the constant need for an Internet connection
    to be able to use your services.^([^(31)](#fn31)) Even though most major cloud
    providers have SLAs in place, which promise uptimes of 95% and more, this is something
    to take into consideration. An argument you could make here is that you also require
    an Internet connection for blockchain platforms. Well, that isn’t entirely true.
    You could set up a private blockchain network in which you don’t need a live Internet
    connection, or you could use satellite technology or even SMS to communicate transactions.
    While public platforms generally depend on the Internet, certainly for private
    implementations you aren’t restricted in any way.


    A second disadvantage is the use of storage, backup, and computational power in
    a cloud environment. This differs for each provider, but you shouldn’t be blind
    to the possible downsides. It might seem very affordable now to run a distributed
    ledger on top of a cloud platform, but as the network and storage grows, are you
    still able to afford the costs? Is it still profitable to use such an application?
    In addition, where these questions rise, the risk of vendor lock-in looms in the
    shadows.


    A third disadvantage is the fact that you are once again trusting a third party
    (which in itself already runs against the idea of the blockchain technology).
    You have to be able to trust that this party has a secure environment, reliable
    datacenters, and a reliable governance framework. If this is not the case, what
    will you do if something goes wrong? You are simply no longer in control.


    A fourth important disadvantage is linked to the third point I made. There has
    been a rise in the number of hacking incidents with cloud providers. A common
    mistake is that parties blindly trust their cloud providers to be secure and maintain
    this security over time. Incidents have shown that this isn’t always the case
    and that there might be incidents leading to data breaches or worse. Once again,
    you are trusting a third party to provide security to your application.


    The world keeps on moving toward cloud-based solutions and infrastructure. As
    such we shouldn’t be surprised that many blockchain platforms have some link to
    the cloud and uses these infrastructures to help scale the network. The future
    will clearly see more of these synergies and, when taking into account the possible
    disadvantages, we might end up with beautiful use cases.


    ## Blockchain and Cybersecurity


    Even though there are numerous attack vectors on blockchain networks and technology,
    this doesn’t mean that it doesn’t show promise for the future. The technology
    might even have uses in the cybersecurity world. Currently, it might be one of
    the best technologies so far to help prevent data theft and fraud. By the very
    nature of distributed ledgers, one would have to attack and destroy the network
    to be able to change data and therefore attack the integrity of the data itself.
    A company that already uses this technology for data protection is Guardtime.^([^(32)](#fn32))
    Every piece of data is distributed through the network so, when a person tries
    to alter data, there is an entire system analysis that determines whether the
    data can be updated or should remain the same. In a similar sense, the availability
    of data is secured. One can bring down a node of the network, but the data is
    still provided by the other nodes of the network. An attacker would have to bring
    down every node on the network to be able to stop the availability of the data.
    When we are dealing with major networks, this is close to impossible.


    Another possibility for the blockchain technology is to create safer DNS services.
    Currently, these services are centralized and, when an attacker is able to get
    access to the service, she is able to break the connection between a website and
    the IP address. With the blockchain technology, one could decentralize part of
    the service, making it more difficult for attackers to break the connection.^([^(33)](#fn33))
    A third possibility lies in the confirmation of identities. With the blockchain
    technology, one doesn’t have to reveal the identity to be trusted. With a validation
    via a distributed ledger or by using zero-knowledge proofs, one could ensure that
    the other party can be trusted without revealing any further information about
    that party. This promotes security and privacy for both parties involved.


    These are only a few examples of how blockchain might influence the world of cybersecurity,
    but you can easily see that more use cases will become available over the coming
    years. This new technology will prove to be both a challenge and an opportunity
    to cybersecurity professionals.


    Closely linked to the world of security is that of compliance and the use of identity.
    Both can be enhanced using the blockchain technology. As transparency is promoted
    through the network, all user actions can be validated and checked so that culprits
    can easily be identified. Similarly, identity can be locked in and provided by
    the network, so that there can be no question about who you are and what actions
    you have taken through time.'
