- fmt: '# Tax and Crypto Regulation in Africa


    Depending on the source, up to 35% of Africa’s population doesn’t have access
    to financial services. Blockchain technology might help in this regard and give
    these people access.^([^(198)](#fn198))


    As mobile telecommunication usage also made a huge leap forward from 3% to over
    80% in a decade, the use of local mobile and e-payment platforms has become generally
    accepted. However, in general, the continent doesn’t seem to be really busy with
    creating regulations on the topic. One of the exceptions is South Africa, where
    new regulations have been created to govern the use of cryptocurrencies.^([^(199)](#fn199))
    Similar to the local currency, these regulations also limit the amount that can
    be sent outside of the country. In even more recent months, over 30 recommendations
    for further regulation of cryptocurrencies have been made.^([^(200)](#fn200))
    All activities will be closely monitored to protect the population while at the
    same time, crypto-assets cannot be considered electronic money.


    In Kenya, there are also serious considerations for blockchain regulation as it
    is seen by some as the technology of the future.^([^(201)](#fn201)) The technology
    is seen as a possible solution to prevent corruption and make the country one
    of the new leaders of the future when it comes to innovation and economic growth.
    In that sense, Kenya is becoming a leader in blockchain adoption across the continent.


    Nigeria is also trying to become more digital and there has been the launch of
    a passenger manifest system on top of a blockchain platform for traveling by road.
    As the infrastructure in the country isn’t top notch, traveling by road is the
    main way of transportation, and insurance for these kinds of travel can now be
    bought on a blockchain solution. As kidnappings are rampant in certain cases and
    authorities struggle to find the next of kin (with paper-based manifests that
    are far from complete), this solution should aid in protecting citizens.


    Ghana has slowly started looking into regulation for cryptocurrencies even though
    the central bank has plans to release a digital currency in 2020 (it seems unlikely
    that this will be a blockchain-based currency).^([^(202)](#fn202)) All it has
    done so far is issue a public warning to investors in March 2019. In this warning
    it states that investors should do their due diligence and at the same time they
    included 24 cryptocurrencies that have gained prominence worldwide.


    Similar to Ghana, the Democratic Republic of Congo still has no formal regulation
    in place when it comes to cryptocurrencies. Other countries that still have no
    regulation in place are Angola, Benin, Botswana, Burkina Faso, Burundi, Cameroon,
    Cape Verde, Central African Republic, Chad, Comoros, Côte d’Ivoire, Djibouti,
    and many others.


    Algeria has come down extremely hard on cryptocurrencies and has prohibited the
    purchase, sale, use, and possession of cryptocurrencies since 2018.


    The central bank of Eswatini has issued a statement that cryptocurrencies are
    not enjoying legal-tender status and aren’t regulated. Therefore it wanted to
    warn the population about the use of cryptocurrencies.^([^(203)](#fn203))


    Lesotho’s central bank warned the public as well for the use of cryptocurrencies
    and officially stated that they do not oversee any of these. It isn’t regarded
    as legal tender or foreign currency so people engaging in trading do so at their
    own risk. Central banks in several other countries have issued warnings as well,
    such as Uganda and Zimbabwe.


    # Tax and Crypto Regulation in Oceania


    In Australia, just as in many other countries, the use of cryptocurrencies is
    in a legal gray area.^([^(204)](#fn204)) You can hold them without any problem
    but spending them is not possible. According to their regulations, actually spending
    cryptocurrency is an illegal operation. However, the country has been moving to
    more open regulations and has removed the previous double taxation of Bitcoin.^([^(205)](#fn205))
    New regulations are being considered for exchanges as well as for the identification
    (`KYC`/`AML`) of those performing transactions. As the government becomes more
    and more familiar with the technology, one can suspect clearer regulations for
    enterprises that want to enter the market.


    In New Zealand it has become legal to pay employees in Bitcoin.^([^(206)](#fn206))
    Whether this is a good or a bad idea, it clearly shows the intentions of the government
    and its vision of cryptocurrencies. Believing in the technology and its use as
    a form of payment, they have taken a progressive stance toward cryptocurrencies
    and blockchain as a whole.^([^(207)](#fn207))


    The Marshall Islands is dealing with a gray area when it comes to cryptocurrency
    regulations, while it is creating its own cryptocurrency at the same time, called
    `SOV`. It will be tied to the US dollar and will be used for debts, public charges,
    taxes, and dues.'
