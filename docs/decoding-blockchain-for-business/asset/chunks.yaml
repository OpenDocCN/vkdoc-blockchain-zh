- fmt: '# Quantum Computing and Blockchain Security


    The first is the possible attack on the hashing algorithms used. The underlying
    assumption of using hashes is that reversing these are computationally expensive
    and difficult to perform. If quantum computing can easily break these hashes,
    the entire security that is introduced by the blockchain technology is moot. The
    authenticity of upstream blockchain and the authenticity of entries are both compromised.
    This would mean that attackers could modify data in the blockchain without actually
    changing the hash (hash collision). A second possible issue relates to the mining
    of new blocks, certainly when a proof-of-work algorithm is being used. A miner
    with a quantum computer can calculate the nonces faster, outperforming the other
    miners in the network, therefore not only earning more cryptocurrency than the
    other miners but also taking control over the new block generation as a whole.
    Attacks on the public-private key patterns that are commonly used within blockchain
    platforms are susceptible to attacks by quantum computers. This way attackers
    could possibly forge signatures, messages, and more, breaking down once again
    the security of the blockchain network. One can easily understand that the impact
    of quantum computers will stretch much further than only blockchain networks.
    In the past this was mainly seen as a theoretical discussion that might have an
    impact in the future, but recently Google has claimed that it reached quantum
    supremacy.^([^(38)](#fn38)) Although that doesn’t mean that we will have full-fledged
    quantum computers on the market any time soon, it does mean that other parties
    will reach this state as well and develop it further over the coming years. This
    in itself should be alarming enough for any participant in looking into how we
    might secure blockchain platforms (and encryption algorithms as a whole) in the
    near future.


    Now that you’ve learned a bit about how quantum computing might impact the blockchain
    technology, there is also research being done on post-quantum cryptography. There
    is currently a process in place at NIST (National Institute of Standards and Technology)
    to research some options for the future, but currently there is no standard in
    place. Some of the promising areas so far are the following^([^(39)](#fn39)):


    - *Hash-based cryptography*. The classic example is Merkle’s hash-tree public-key
    signature system (1979), building on a one-message-signature idea of Lamport and
    Diffie.

    - There was the design of the Supersingular Isogeny Diffie-Hellman (SIDH) by David
    Jao and Luca De Feo.^([^(40)](#fn40))

    - *Code-based cryptography*. The classic example is McEliece’s hidden Goppa-code
    public-key encryption system (1978).

    - *Lattice-based cryptography*. The example that has perhaps attracted the most
    interest, but not the first example historically, is the Hoffstein–Pipher–Silverman
    NTRU public-key-encryption system (1998).

    - *Multivariate-quadratic-equations cryptography*. One of many interesting examples
    is Patarin’s Hidden Field Equations (minus variant) public-key-signature system
    (1996), generalizing a proposal by Matsumoto and Imai.


    Of course, these examples emphasize the use of traditional algorithms in a new
    way, while new algorithms might also build on top of quantum technology features.
    One of these possibilities might be Quantum Key Distribution (QKD), which is a
    protocol that can generate a random bit stream between parties. This can be used
    as a one-time pad or Vernam-cypher for further encryption purposes. (A *one-time
    pad* is an encryption technique that currently cannot be cracked or broken. With
    the introduction of quantum technology features, we might introduce even higher
    security.) So far this is the most mature technology in the field and as such
    a very interesting one to look at for near future implementations in blockchain
    networks. On top of this algorithm, one could also use a quantum system so that
    the information in the blockchain is tamper-proof. Finally, there are also quantum
    bit commitment protocols that could replace the current digital signature schemes.


    As you can see, the advent of quantum computing will not necessarily mean the
    death of the blockchain technology. It means that the technology will have to
    adapt to the rise of quantum but ample research is being done in this field.^([^(41)](#fn41))
    The impact of quantum will be much broader than the blockchain space alone, and
    it will be more than interesting to see how the technologies underlying blockchain
    platforms transform in the future.'
