    # 5. Blockchain and Cryptocurrencies


    By now you have seen and read quite a bit about blockchain technology. However,
    I want to close of this book with some final concepts that you should know and
    understand. These will allow you to zoom into some important aspects when you
    look at the crypto-markets and see how they function. Several new financial instruments
    have been devised with the creation of cryptocurrencies and existing financial
    assets have found their way into the world of cryptocurrencies.'
