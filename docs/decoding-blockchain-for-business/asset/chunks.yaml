  trans: '

    # GDPR 对区块链技术的适用性


    还存在其他一些可能引起争议的要点。其中之一涉及《通用数据保护条例》（GDPR）第 3 条，该条款涉及 GDPR 的适用情形。这与控制者或处理者在欧盟境内的设立有关，无论数据处理行为本身是否发生在欧盟境内。^(²²⁷)
    根据欧洲法院以往的判例，“设立”的概念基于诸如“安排的稳定性程度以及活动的有效行使，且必须结合相关经济活动和服务提供的具体性质来加以解释”等因素。^(²²⁸)
    基于此，我们可以看出功能性方法优于形式化分析。


    更为重要的是，如果被处理的个人数据涉及位于欧盟境内的数据主体，即使数据控制者/处理者未在欧盟设立（当满足两个条件之一时），GDPR 法规同样适用。^(²²⁹)
    第一个条件适用于为提供商品或服务而处理个人数据的情况，无论是否要求数据主体付款。第二种可能适用于在欧盟境内发生的行为监控背景下的数据处理。第三种（不太常见的）可能性涉及在国际公法范围内处理个人数据。遵循这些定义，你可以清晰地看到，无论你是否在使用区块链技术，在许多情况下
    GDPR 都将适用。


    负责处理数据的实体的主要“数据保护机构”或“DPA”（每个成员国都有一个）可能会提出一个棘手的问题。对于私有/许可型区块链技术，主管的数据保护机构很可能是数据控制者主要设立地的机构。对于公有/无许可型区块链平台，这可能会成为一个更大的问题。很可能将会再次采用功能性方法，即无法确定“主要设立地”，因此分析将侧重于数据处理的相关活动及其开展地点。^(²³⁰)


    此外，那些认为自己并非“真正”处理数据而可以规避 GDPR 的人恐怕要失望了。个人数据的处理被定义为“对个人数据或个人数据集执行的任何操作或一系列操作”。^(²³¹)
    这意味着对个人数据的任何处理行为都符合处理的定义（包括数据存储）。然而，这一普遍考量有一个重要的豁免情形，称为“家庭活动豁免”。该豁免规定，GDPR 法规不适用于自然人在纯粹的个人或家庭活动过程中进行的个人数据处理，前提是该处理与专业或商业活动无关。法国国家信息与自由委员会（CNIL）在其
    2018 年发布的区块链指南中宣布，某些情况可能属于这一例外。给出的一个例子是个人用自己的账户买卖比特币。欧洲法院是否会采取同样的方法还有待观察，因为他们认为家庭活动例外需要严格解释。根据同一欧洲法院的意见，在数据处理活动发生于个人私生活或家庭生活过程中，同时又可被不特定数量的公众访问的情况下，家庭活动豁免不能适用。你好，区块链！基于此，你可以理解，通过区块链进行个人数据处理是否能够适用家庭活动豁免是存在疑问的。


    ## GDPR 下个人数据的定义


    我们不会详细探讨 GDPR 法规中个人数据的所有定义细节，但为了便于理解，该法规对可能被归类为个人数据的内容采取了非常宽泛的定义，包括但不限于：公钥、互联网协议地址、Cookie
    标识符、射频识别标签等。GDPR 序言第 26 条指出，根据 GDPR 第 4 条第 5 款，假名化数据也被认定为个人数据。然而，该序言引入了一项测试，以判断该数据是否仍可被视为个人数据。如果控制者或其他人能够使用所有合理可用的手段识别出数据主体，则该数据仍被视为个人数据；否则，它就不再是个人数据。^(²³²)
    该序言采取了一种基于风险的方法，而最初的“第 29 条工作组”则采取了一种更倾向于零风险的方法，它将匿名化定义为“不可逆地防止识别”。长期来看会遵循哪一种思路，只能随着时间的推移才能见分晓，这也是当前不确定性的一个原因。序言第
    26 条也考虑了技术发展，但远未明确应考虑的时间尺度。你可以思考一下量子计算可能对整个区块链技术以及现有加密标准产生的影响。


    ## 交易数据与个人数据


    交易数据是区块链技术特有的另一个概念，它可能被认定为个人数据。当我们参考 CNIL 的定义时，这是指交易中包含的所有数据（可以是文凭、地契、姓名、地址等任何内容）。如你所见，这确实需要根据具体情况进行个案分析，以确定我们处理的是个人数据还是不属于此术语范围的数据。只要被交易的数据能够用于直接或间接识别一个自然人，我们就认为处理的是个人数据。


    当我们仅考虑金融数据时，必须考虑英国过去曾使用过的“动机性入侵者测试”。该测试要求组织考虑，一个具备合理能力、能够访问互联网等资源，并会采用调查技术（例如向可能对数据主体身份有额外了解的人进行询问）的人，是否能够从匿名化数据中重新识别出个人身份。动机性入侵者不被假定具备任何专业知识。^(²³³)
    这意味着你不能简单地说金融交易数据不是个人数据，因为过去已有证据表明，人们可以根据其交易数据被识别出来（比特币网络中过去曾有过此类例子）。^(²³⁴)

    '
- fmt: 'With all these examples, we also have to consider the off-chain database that
    is linked to the blockchain based application. This could be a solution to the
    discussions surrounding the personal data that has been stored in the actual chain
    transactions. When you keep the personal data in an off-chain database, this data
    could be dealt with in a much easier fashion. The data within the transactions
    themselves could only contain information to access the personal data in this
    separate database.^([^(235)](#fn235)) Another possibility that might help in the
    discussions surrounding personal data and blockchain applications is the use of
    zero-knowledge proofs which deliver the proof without sharing the actual data
    to do so. This could solve issues relating to data minimization and data verifiability
    between several partners.^([^(236)](#fn236)) A third strategy to reduce the likelihood
    of identification is the use of stealth addresses which are addresses that are
    generated to be used only for a one-time transaction and relies on hashed one-time
    keys. By using this technology, you could consider the “motivated-intruder” test,
    where it is nearly impossible to identify the participants as you cannot simply
    link transactions together to identify natural persons. A fourth technology that
    can be used to achieve “anonymization” is called homomorphic encryption. This
    technique allows the computation of cyphertexts, where encrypted data can be subject
    to computation and the generated result is the same as when it would have been
    performed on the unencrypted data.^([^(237)](#fn237)) In itself it will not lead
    to GDPR compliance but in addition with some of the other techniques described
    here, it might pull the application over the threshold of what is considered anonymization.
    Other possible solutions might come from state channels where information is only
    shared with outside parties in case of a dispute,^([^(238)](#fn238)) ring signatures
    that hide transactions by tying a transaction to multiple private keys or the
    addition of noise in the data by adding multiple transactions together (you have
    seen several examples of this technique throughout this book). It is clear that
    only by combining several of these techniques you can hope to achieve GDPR compliance,
    but again, this is to this day open to uncertainty.


    An idea launched by some is the use of chameleon-hash functions with ephemeral
    trapdoors which would allow the creation of editable blockchains where data could
    later be adapted or modified.^([^(239)](#fn239)) Although this might lead to GDPR
    compliance, why would you still use a blockchain application in this case? Other
    techniques can be thought of to protect personal data in a blockchain environment
    but for now they all operate in a legally uncertain environment. It has also been
    mentioned in some comments that the techniques described above can also lead to
    undesirable outcomes when we look at other regulations and policies in place (such
    as money laundering, terrorism financing and others).


    Consent is yet another possible issue when we look at the processing of personal
    data in a blockchain application. The GDPR regulation does not stipulate any specific
    form or requirements but clearly states that pre-ticked boxes or silence cannot
    be seen as a form of consent.^([^(240)](#fn240)) Consent also has to cover all
    processing activities that are to be carried out, so that consent has to be given
    for each form of processing the party intends. You should also know that in an
    electronic context, the request for consent must be clear, concise and not unnecessarily
    disruptive to the use of the service for which it is provided and it can only
    be seen as “freely given” if the data subject has a genuine and free choice and
    is able to refuse or withdraw consent without detriment. The regulation also stipulates
    that the consent can only be seen as informed if the data subject knows the controller’s
    identity.^([^(241)](#fn241)) You can clearly see that some of these requirements
    form no problem when we consider blockchain technology, while others can lead
    to even more and deeper issues (think about the identity of the controller or
    the withdrawal of consent and the consequences of this action). There can be a
    case where consent cannot be simply withdrawn, such as the lawful processing of
    personal data in a contractual or legal context. Personal data processing might
    be necessary to fulfill a contract, or the legal requirement to keep personal
    data a specific period of time. There can also be exceptions to protect the rights
    of other data subjects or public interests as a whole. Finally, there is the possibility
    of the “legitimate” interest of the data controller to process the data but this
    is very uncertain towards the future how this might be interpreted. Other principles
    that are considered in the regulation are fairness (processing should be lawful
    and fair), transparency (not meaning that the data controller should tell they
    are using blockchain technology but rather inform the data subject of the risks
    of the processing and the personal data that is being processed) and purpose limitation
    which means that the personal data should only be processed for the purpose it
    has been collected and nothing more. That final requirements means that the data
    processing should be specified sufficiently so that necessary data protection
    safeguards can be implemented, explicit as it must be sufficiently unambiguously
    expressed and legitimate as the processing should be in line with the broader
    legal principles of applicable law.^([^(242)](#fn242)) Further processing of personal
    data can be compliant even though it has not been originally communicated to the
    data subject, but this has to be analyzed on a case by case basis.


    One final consideration must be taken for the use of smart contracts. You might
    think in themselves they don’t prove an issue but you are mistaken. The data subject
    has the right not to be the subject to a decisions based solely on automated processing,
    including profiling, which produces legal effects concerning him or her or similarly
    significantly affects him or her.^([^(243)](#fn243)) The outcome from a smart
    contract can be seen as a decision, which makes it subject to the GDPR regulation.
    This prohibition does however not apply if it is necessary for the contract between
    the data subject and the data controller, is authorized by the Union or a member
    state law, or is based on the data subject’s explicit consent.^([^(244)](#fn244))
    As “explicit” consent is not clearly defined in the GDPR regulation and the other
    requirements are not always clear, also this is still open to further regulatory
    guidance.


    So far we have only looked at blockchain technology and GDPR as 2 opposites, but
    this shouldn’t always be the case. There is the idea of “data marketplaces” where
    both personal and non-personal data can be traded as a commodity.^([^(245)](#fn245))
    The European Commission has stated that blockchain technology might be used to
    enable and power such a digital marketplace. This technology could indeed help
    in the management of data, the creation of contracts between bilateral parties
    and governance systems that might help to keep the entire process in check. The
    future might show that data sharing technologies can actually help the economy
    in the long run and prove successful (think about the Ocean protocol). Blockchain
    technology might also help to implement the “data protection by design” principles
    in the GDPR regulation.^([^(246)](#fn246)) Blockchain can help data subjects to
    monitor what is happening with their personal data and help them to decide who
    has access to their personal data. It could also help to monitor in line with
    the “purpose limitation principle” and help with the detection of data breaches
    or even fraud.'
