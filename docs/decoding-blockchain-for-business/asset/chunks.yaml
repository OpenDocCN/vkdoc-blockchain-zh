- fmt: '# Blockchain and Poverty


    The blockchain technology could also prove to be a weapon in another of the world’s
    major problems: poverty. Two-thirds of the world population lives on less than
    $10 a day and every tenth person lives on less than $1.90 per day.^([^(49)](#fn49))
    Many nonprofits try to help and receive financing from people and governments.
    Blockchain could help track where all this money is going. Donators often wonder
    what happens to their money and with a distributed platform this no longer should
    be a problem. Nonprofits could provide clear and immutable logs so that donors
    could see what happened to their money. In a similar sense, we could trace the
    results of the work performed by the nonprofit. Donors would have a direct view
    of what is happening and might become even more motivated to share part of their
    wealth.


    As always, there is also the use of the blockchain technology as a cryptocurrency
    where transactions could be directly performed between peers. This could, on the
    one hand, help with donations, but more importantly could support financial inclusion.
    Many poor don’t have access to financial services, which is actively locking them
    out from major parts of life. With access to decentralized financial services,
    another issue arises naturally: identity. As this can all be created with decentralized
    technology, the poor could finally partake in all activities in life without limitation.
    As people would gain the right to enter formal businesses, pay debts, buy rights
    of properties, verify ownership, transfer ownership, perform payments, and more,
    the poor wouldn’t be automatically locked out of society by default. In a similar
    manner, nonprofits could use solutions that could help prove identity and verify
    certifications from people all over the world.


    Is blockchain the wonder technology that will finally eradicate poverty and solve
    all the world’s major problems? No, of course not. But we cannot deny the fact
    that there is certainly potential. Distributed ledgers could prove to be the extra
    push the world needs to create an equal playing field for all people.


    # Limitations of the Blockchain Technology


    While a major part of this book is focused on the advances brought by the blockchain
    technology, we still have to keep in mind that all technologies have their limitations.
    It is important that you understand when to actually advocate for the implementation
    of a blockchain-based solution and when situations call for other solutions.


    First of all, there are limitations that are core to the blockchain technology
    itself. There are the limitations brought by scalability issues that are often
    part of such distributed networks. While proof of concepts might be working great,
    the question always remains if the same use case rolled out in a major organization
    can still function properly. Certainly public blockchain networks are plagued
    by issues when it comes to scaling and the costs that come with it. If a use case
    becomes too popular, the entire network can start to slow down significantly,
    bringing problems to all the other decentralized applications running on the platform.
    Liveness is another part that can often lead to issues, just as block size, block
    time, transaction propagation through the network, privacy of transactions and
    or participants, and security specific vulnerabilities are. These specific vulnerabilities
    lead to solutions, such as offline hardware stores that cryptocurrencies to prevent
    theft. Others focus on scalability by creating alternative layers on top of blockchain
    networks, solutions that have to bring interoperability between such networks,
    alternative protocol implementations, and more. This brings with it the need for
    technical expertise of developers and IT architects to know lots of separate solutions
    and platforms— including their advantages and disadvantages.


    When one chooses to develop decentralized applications, this can also lead to
    several difficulties. If you want to update a DApp, you have to propagate that
    update through the network and the nodes still have to choose if they accept the
    update or not. This way, security vulnerabilities could remain within the application
    in those nodes that refuse the update. Similarly, if you want to update the network,
    this could lead to a hard fork that brings with it possible divisions in the network.


    Beyond the obvious fact that technical knowledge is a key factor in deciding to
    use blockchain solutions, you must also consider the business model that is being
    implemented. Oftentimes, this is not in line with the advantages that are brought
    by the blockchain technology. Distributed ledgers bring with them an entire philosophy
    of decentralization and moving away from the classic solutions that promote business
    centralization. Working together and bringing the customer central in the value
    chain and experience are the key concepts that lead this change. If you are unwilling
    to implement these changes in your current business, it is often questionable
    if you will gain any real value from implementing a decentralized application
    or blockchain in your current IT architecture and operations.


    We have also introduced many positive use cases where the blockchain technology
    can change the world in a positive way. However, we shouldn’t remain blind to
    the fact how it could be used in a negative way (just as all other technology
    implementations). There have been reports where cryptocurrencies have been used
    to fund criminal activities, commit fraud, and launder money. Where we propose
    solutions to help the world, governments wanting to impose control over its citizens
    might use it in a similar fashion. It is up to us to remain vigilant and support
    the move toward positive solutions.


