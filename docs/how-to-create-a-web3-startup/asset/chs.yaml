  \ 25 美元的价格卖给我，我不会接受，因为我用它来做什么？我必须以这样或那样的方式卖回给你。它什么也做不了。资产要有价值，就必须为某人提供某些东西。”^(²⁵⁰)\n\
  \n在本章的其余部分，我们将介绍`Web3`金融和网络安全市场中的一些有趣的初创公司。\n\n### CertiK\n\n`Ronghui Gu`在中国长大。高中时，他获得了全国奥林匹克数学竞赛一等奖，这使他得以进入著名的清华大学^(²⁵¹)。然而，他对主修数学并不感兴趣。他反而想专注于计算机编程。\n\
  \n他最终在耶鲁大学获得了计算机科学博士学位，并成为哥伦比亚大学的教授。在那里，他遇到了耶鲁大学计算机科学教授`Zhong Shao`。他们建立了友谊，并在网络安全等领域展开合作。\n\
  \n2018 年，他们看到了区块链领域的机遇，并创立了`CertiK`。它基于一种名为“形式化验证”的尖端技术。这为硬件和软件系统提供了高度的安全性。它涉及使用复杂的数学和算法来证明需求和规范已得到满足。例如，流程中的每一步都被解释清楚。而且由于它纯粹基于数学，你不必信任第三方，例如安全顾问。\n\
  \n`CertiK`一直是形式化验证领域的主要创新者。该公司率先推出了采用该技术的操作系统内核和云商品虚拟机监控程序。\n\n该技术可以应用于区块链和`Web3`之外的领域。仅举几例，包括自动驾驶、物联网和云计算。换句话说，市场机会是巨大的。\n\
  \n然而，`CertiK`的主要焦点是`Web3`——这绝对是正确的选择。2022 年初，该公司以 20 亿美元的估值筹集了 8800 万美元。一些投资者包括`Tiger\
  \ Global`、`Goldman Sachs`和`Sequoia Capital`。总的来说，该公司已筹集了 2.3 亿美元。\n\n`CertiK`平台保护着超过\
  \ 3000 亿美元的加密资产，服务对象超过 2500 家企业^(²⁵²)。2021 年，其收入增长了 12 倍，利润增长了 3000 倍。\n\n### LiquiFi\n\
  \n股东名单或资本化表是证券及其所有者的列表。对于初创公司来说，它们通常包括普通股、优先股、可转换债券和员工股票期权。对于理解初创公司的估值以及管理融资来说，股东名单至关重要。\n\
  \n但对于`Web3`公司来说，情况可能要复杂得多。需要有一种方法来追踪代币及其价值。`DAO`也可能存在复杂的结构。\n\n该怎么办呢？`LiquiFi`构建了一个在线平台来管理`Web3`公司的股东名单。其功能包括管理合约和员工股票期权的归属、税务合规和报告，以及启用代币进行质押。该公司还为客户提供咨询服务。\n\
  \n该公司的创始人是首席执行官`Robin Ji`和首席技术官`Oliver Tang`。他们创立这个公司的想法源于与加密公司合作的第一手经验^(²⁵³)。创始人在\
  \ 2021 年冬季获得了`Y Combinator`的初始支持。\n\n该公司目前运行在`Ethereum`和`Polygon`上。但计划扩展到其他区块链。\n\
  \n2022 年初，`LiquiFi`在种子轮融资中筹集了 500 万美元^(²⁵⁴)。一些投资者包括`Alliance DAO`、`Robot Ventures`、`Y\
  \ Combinator`和`Orange DAO`。\n\n## 结论\n\n在本章中，我们概述了加密行业的税收和法规。在税收方面，它们仍然有些模糊。对于`NFT`来说尤其如此。\n\
  \n但美国国税局可能会在未来几年提供更多指导。该机构也在大力投资于针对加密行业潜在欺诈行为的执法行动。\n\n在本章中，我们还探讨了监管的可能性。对于`Web3`来说，环境仍然相当开放。但已经有迹象表明，联邦政府将考虑实施监管的方法。然而，加密公司和风险投资公司正在加强他们的游说努力。\n\
  \n我们也到了这本书的结尾。我们当然涵盖了很多内容。该行业仍处于早期阶段。但通过这本书，你将拥有一个更好的基础——在核心技术、趋势和问题方面。\n\n所以，祝你在`Web3`之旅中好运。这肯定会令人兴奋！\n\
