- '# 7. DeFi（去中心化金融）


  构建金融平台


  权道在斯坦福大学攻读计算机科学，曾在苹果和微软等公司工作。但当加密货币开始快速增长时，他投身到了这个市场。不幸的是，他的第一次创业失败了。但这并未让他气馁。2018
  年，他又创办了另一家公司，名为 Terraform Labs，总部设在新加坡。


  他的愿景是创建一种新型的金融服务公司。该公司基于一种称为 `DeFi`（去中心化金融）的 Web3 方法。为此，他创建了多个项目和应用程序，例如用于支付的项目。其核心是
  `LUNA` 代币。到 2021 年，其价值达到了 410 亿美元。^(¹⁷⁷)


  权道还创建了 `UST`，这是一种算法稳定币。它的目标是实现与美元 1:1 挂钩。然而，`UST` 仅由复杂的方程支持，而非其他金融资产。


  到了五月初，`LUNA` 崩溃了。一周之内，其价值几乎跌至零。^(¹⁷⁸)


  发生了什么？多种因素在起作用。股票市场以及许多其他加密货币价格暴跌。同时，人们也担忧经济衰退和美联储收紧政策。


  最终，对于 `LUNA` 而言，这是一个经典的“银行挤兑”案例。简而言之，投资者失去了对这种数字资产的信任。但由于没有政府支持，因此不可能有任何救助。


  是的，这暴露了 `DeFi` 的内在风险。结果是，其未来远非稳固无忧。


  但这是一个重要的警钟，可以促使建立更好的保护措施。如果处理得当，它甚至可能催生一个更加强健的行业。


  因此，在本章中，我们将探讨 `DeFi`。如果能够获得关键的大众用户基础，它就有可能成为面向创业者的一块巨大市场。




  ## 什么是 DeFi？


  与 Web3 的大部分部分一样，DeFi 也相当新。其起源可以追溯到 2018 年。^(¹⁷⁹) 它诞生于 Telegram 上的一次聊天，当时开发者和创始人正试图想出一个恰当的方式来描述基于区块链的金融系统。


  传统的金融市场——被称为 TradeFi（传统金融）——大多是中心化的。有各种机构，如银行、投资银行和经纪公司来处理交易。该行业也有广泛的监管规定。


  而 DeFi 的目标是打破这些壁垒，实现点对点交易。这有望带来更低的成本、更少的文书工作和更快的结算速度。


  从某种意义上说，DeFi 旨在颠覆 TradeFi 的主要部分，包括贷款、储蓄、保险、衍生品等。在很大程度上，DeFi 系统是基于以太坊智能合约的。相比之下，TradeFi
  通常拥有传统技术基础设施，系统常基于大型计算机和像 COBOL 这样的传统语言。


  DeFi 的其他一些优势包括：


  * **金融服务民主化**：根据世界银行的研究，全球约有 17 亿人没有银行账户。^(¹⁸⁰) 这无疑是一个巨大的问题，因为它可能意味着应对贫困面临巨大挑战。但借助
  DeFi，可以提供更广泛的金融服务。所需的一切只是一部基本智能手机和互联网接入。

  * **收益**：DeFi 可以提供更高的投资收益率。诚然，这意味着要承担更多风险。但对于某些人来说，这可能是值得的。DeFi 也可以成为传统投资组合多元化的一种方式。

  * **结算**：使用支票进行交易，处理需要三天时间。但 DeFi 几乎可以即时结算。

  * **代币化**：使用代币可以拥有更大资产的所有权，例如艺术品、企业或房地产。这有助于为项目筹集资金。也意味着更多人将有机会获得通常只有富人和投资基金才能获得的投资。

  * **可用性**：华尔街的交易时间是工作日上午 9:30 到下午 4:00。银行的营业时间可能类似。然而，使用 DeFi，交易可以全天候进行。


  注意


  根据 DeFi Pulse 的数据，DeFi 市场的总价值约为 560 亿美元。^(¹⁸¹)


  DeFi 此前主要专注于 B2C（企业到消费者）应用。但这种情况正在开始改变。B2B（企业到企业）类别正在获得发展势头。事实上，其机遇可能更大。B2B DeFi
  有潜力实现更高效的金融基础设施。事实上，像 Visa、MasterCard 和各种银行这样的大型运营商一直在对此进行投资。


  ### DeFi 的 dApp 流程


  与其他加密应用一样，DeFi 可能有些繁琐。诚然，进步仍在继续。由于 DeFi 仍处于早期采用阶段，其用户界面和用户体验仍有很大的改进空间。


  也许最大的问题是存在多个步骤，并且你通常需要访问多个产品。


  那么，让我们来看看质押的典型工作流程（这假设你已经知道如何使用加密钱包）。质押是一种在智能合约下长期锁定并持有资产的方式。这意味着你可以获得奖励、投票权和利息等好处。


  步骤如下：


  *   将你的加密钱包连接到网站或移动应用。在此阶段，你需要谨慎行事。这个网址或移动应用是否非法？你可能需要在谷歌上搜索一下。

  *   dApp 将要求你签署一笔交易。

  *   dApp 将授权你的访问。完成后，你就可以进行质押。

  *   你将发起一笔交易并进行确认。该交易将被包含在特定的区块链上。不过，可能还有其他待处理的交易。之后，你的资产就被质押了。


  ### DeFi 生态系统


  尽管 DeFi 相对较新，但创新已经呈现爆炸式增长。以下是一些可用的有趣应用：


  *   **去中心化交易所 (DEXs)**：这是一个用美元和其他法定货币兑换加密货币的市场。还有像 Uniswap 这样的服务，允许进行费用较低的交易。

  *   **借贷**：通过 DeFi，你可以将钱借给世界上的任何人。或者你可以存入你的加密货币来赚取利息或获得奖励。利率可能达到两位数。DeFi 借贷服务的领导者之一是
  AAVE，它基于以太坊区块链。

  *   **抵押贷款**：一些 DeFi 初创公司，如 Figure，允许其用户以其加密货币为抵押来购买房屋。这基于 provenance 区块链。一些初创公司，如
  LoanSnap，可以将你的抵押贷款转化为 NFT，从而实现更快的处理速度。

  *   **流动性挖矿**：这是一种基于 DEX 的服务，旨在从各种代币中寻找更高的回报。不过，这可能是一种风险极高的活动。

  *   **预测市场**：你可以在这里对某个未来事件下注，例如总统选举。


  ### 风险


  谈到 DeFi 的风险，它与任何类型的金融服务类似。都事关潜在的金钱损失。例如，可能是来自骗局或黑客攻击。


  但也存在技术风险。智能合约的错误编码也可能是一个大问题。有案例显示，这导致了数百万美元的损失。


  即使是经验丰富的投资者也遭受过重大损失。看看互联网企业家兼投资者马克·库班就知道了。他投资了一个 DeFi 代币，结果该代币在一天内暴跌至零！他在推特上写道：“我和其他人一样被打击了。疯狂的是我退出了，以为他们的
  TVL 增加得足够多。然后砰的一声。”^(¹⁸²)


  根据 CipherTrace 的研究，DeFi 欺诈造成的损失一直在上升。在 2022 年第一季度，损失达到了 1.56 亿美元。^(¹⁸³)


  然而，DeFi 仍然是一个小市场。它确实主要面向早期采用者和加密货币信徒。但如果 DeFi 继续快速增长，可能会对经济构成风险。这可能类似于金融危机期间发生的情况，当时抵押贷款市场大规模崩溃。其中很大一部分原因是高度复杂的金融衍生品。


  请注意，DeFi 应用通常要求用户提供抵押品。这是为了给金融系统提供更多支持。然而，抵押品通常是加密货币，其价格波动可能很大。换句话说，这最终可能导致重大损失。在某些情况下，DeFi
  应用可能会清算头寸。


  为了减轻这个问题，DeFi 系统可以使用稳定币作为代币。但这远非万无一失。


  注意


  无常损失是 DeFi 系统的一种临时损失。这通常是由于市场供需不平衡造成的。为此，DeFi 平台会将回报转移给代币持有者。这通常就足够了。但这种方法并不能保证。不幸的是，有些
  DeFi 系统最终会失败。




  ### 颠覆


  毫无疑问，创业者的共同目标之一就是颠覆。一旦成功，回报可能相当可观。


  对于 DeFi 来说，市场机遇实际上是最大的之一。例如，根据 PayPal 首席执行官丹·舒尔曼的说法，数字支付的预估市场规模为 100 万亿美元。^(¹⁸⁴)


  然而，这只是该行业的一个细分领域。还有像保险、投资和借贷等其他巨大市场。


  有鉴于此，有众多 DeFi 参与者瞄准这些市场机遇也就不足为奇了。这未必是创业者需要担忧的事情。它是对这个领域的验证。此外，市场上也应该有容纳各类公司成为强手的空间。


  如果说有什么值得注意的，创业者能说出的最糟糕的话之一就是“没有或几乎没有竞争”。对大多数投资者来说，这是一个危险信号。


  尽管 DeFi 的市场机遇巨大，但这并不意味着这种金融方式最终会胜出。


  事实是，传统金融机构并没有坐以待毙。他们理解创新的重要性。


  以下是摩根大通首席执行官杰米·戴蒙在 2021 年致股东信中写道的：“去中心化金融和区块链是真实的新技术，可以以公开或私有的方式部署，无论是否经过许可。摩根大通正处于这项创新的前沿。我们使用一个名为
  Link 的区块链网络，让银行能够共享复杂信息，我们还使用区块链通过摩根大通币（JPM Coin）转移代币化的美元存款。我们相信，在许多用途上，区块链可以替代或改进合同、数据所有权及其他增强功能；然而，对于某些目的来说，目前部署区块链的成本太高或速度太慢。”^(¹⁸⁵)


  但对于一家 DeFi 初创公司来说，一个有效的策略可能是与传统金融机构合作。这有助于利用现有的分销渠道和强大的品牌。而 DeFi 初创公司则可以专注于技术开发。


  '
- '# 总锁仓价值（TVL）


  DeFi 的一个关键指标是总锁仓价值（TVL）。这显示了一个协议或网络的总资产量。


  虽然这确实能很好地反映成功程度，但 TVL 远非完美。面对现实吧，这个价值可能会突然下跌甚至崩溃。一个项目的用户转移到另一个项目的情况并不少见。维护一个 Web3
  社区绝非易事。


  因此，查看其他指标也很重要。其中一些包括以下内容：


  *   社区的参与度。

  *   协议与其他应用程序、交易所和钱包的集成。

  *   代币持有者数量的增长。这可能意味着积极的口碑营销。

  *   开发者数量的增加。


  好了，至于本章的剩余部分，我们将看看 DeFi 领域一些有趣的初创公司。


  ### Tribal


  阿姆尔·沙迪和穆罕默德·埃尔卡斯塔维是埃及顶尖的创业者。但他们亲身经历了在中东地区经营业务的挑战——尤其是在获取融资方面。文书工作和监管通常既昂贵又耗时。对于规模较小的企业来说，融资标准往往过于苛刻。


  但沙迪和埃尔卡斯塔维看到了利用区块链创建新型平台的机会。^(¹⁸⁶) 这家名为 Tribal 的公司于 2019 年底推出。


  Tribal 的系统（包括一张企业信用卡）使用了一套复杂的人工智能审批流程。^(¹⁸⁷) 这极大地简化了流程。Tribal 还提供各种服务，如本地和国际电汇以及支出管理。其客户遍布
  22 个国家。


  2022 年初，该公司在 B 轮融资中筹集了 6000 万美元。^(¹⁸⁸) 投资者包括软银拉丁美洲基金、BECO Capital、QED Investors
  和 Rising Tide。总融资额已超过 1.4 亿美元。


  软银拉丁美洲基金的管理合伙人舒·尼亚塔表示：“Tribal 正在利用加密货币从根本上改变支付和借贷的游戏规则。很少有公司能够以如此创新且无缝的方式连接传统金融和
  DeFi。”^(¹⁸⁹)


  ### Valora


  21 世纪初，杰基·博纳从加州大学洛杉矶分校毕业，获得了国际关系和历史的文学士学位。然而，她很快成为了一名成功的营销专家。^(¹⁹⁰) 她在谷歌工作了七年多，随后又去了推特和声破天。在这些公司，她学到了如何实现增长黑客以及如何开发易于使用的应用程序。在此期间，她曾在遍布四大洲的九个国家生活过。


  到 2021 年，博纳成为了一名科技创始人。她推出了 Valora，专注于为无国界支付提供移动优先的加密钱包。她是首席执行官，并已筹集了约 2000 万美元。


  该应用程序适用于新手以及有经验的加密货币交易者。它在 100 多个国家可用，费用低廉，仅为 0.001 美元。是的，使用它几乎免费。这不仅有助于推动采用，也使其在交易金额通常较小的发展中国家变得实用。


  该应用程序的简洁性是另一个关键特性。您无需使用 42 个字符的钱包地址。相反，您只需一个电话号码即可汇款。


  Valora 拥有一个利润丰厚的奖励系统，奖励金额为余额的 25%。这有助于鼓励更多交易。


  Valora 使用 Celo 区块链，该区块链源于以太坊。然而，它们彼此独立。这意味着 Celo 钱包无法与以太坊网络连接。


  Celo 专注于稳定币，例如基于美元、里亚尔和欧元的稳定币。其次，完全支持 ERC-20 代币。这允许移植去中心化应用。例如，以下是 Valora 提供的一些应用：


  *   Celo Tracker：管理您的 NFT 和其他数字资产组合。

  *   Bidali：使用流行品牌的礼品卡。

  *   ChiSpend – 超级应用：您可以使用加密货币购买现实世界的产品和服务。

  *   Celo Tax：提供您的交易税务分析。


  Celo 也环保。请注意，它拥有碳负排放的基础设施。


  ### TrustToken


  拉斐尔·科斯曼曾在 Palantir、Kernel 和谷歌等公司担任机器学习工程师。但他认为加密货币是一个巨大的机遇，并于 2017 年创立了 TrustToken。^(¹⁹¹)
  他想创建一家下一代金融服务公司。科斯曼为他的初创公司筹集了约 3400 万美元。


  TrustToken 有两个主要部分。首先是 TrueFX，这是一套针对美元、英镑、加拿大元等的稳定币。其次是 TrueFi，这是一个建立在以太坊区块链上的 DeFi
  平台。其重点主要是提供无抵押贷款。


  请记住，这相当独特。原因是加密货币借贷通常都是超额抵押的。虽然这提供了更高的安全性，但它确实限制了市场的潜力。请注意，这个机遇是巨大的。全球范围内的传统无担保贷款约为
  11 万亿美元。^(¹⁹²)


  TrustToken 的贷款还具有为贷款人提供更高回报的优势。但需要有办法为信用评分提供标准。这类似于传统贷款中的 FICO 信用评分。


  其工作原理如下：TrustToken 为贷款人提供了一个易于存储资金的系统。然后借款人发送信贷请求。利率和限额基于借款人的信用评分。但社区必须对每笔贷款进行投票。本质上，这是一种基于声誉的贷款分配方式。不过，如果借款人不偿还贷款，将面临潜在的法律后果。


  截至 2022 年初，TrustToken 已处理超过 5.24 亿美元的贷款，并支付了超过 1750 万美元的利息。^(¹⁹³)




  ### Ox Labs


  `Ox Labs` 是首批 DeFi 协议之一，也是加密货币交易所 `Matcha` 的运营方。据首席执行官兼联合创始人 Amir Bandeali 表示：“大约六年前我们创办
  0x 时，就有一个论断，即一切有价值的东西最终都会被代币化。”^(¹⁹⁴)


  `Ox Labs` 的核心业务是集成服务。借助这些服务，公司能够创建自己的 Web3 平台，例如允许使用代币。举例来说，该技术为 `Coinbase` 的 NFT
  市场提供了动力。


  `Ox Labs` 支持七条大型区块链，包括 `Ethereum`、`Polygon`、`Fantom`、`Avalanche`、`Optimism`、`BNB
  Chain` 和 `Celo`。此外，还与顶级钱包和应用程序进行了集成，例如 `MetaMask`、`Coinbase Wallet`、`Polygon Wallet`、`Brave`、`Matcha`、`dYdX`、`Zapper`、`Zerion`
  和 `Shapeshift`。`Ox Labs` 已对超过 1570 亿美元的价值进行了代币化。^(¹⁹⁵)


  2022 年 4 月，该公司筹集了 7000 万美元。在其投资者之一 `Greylock` 的一篇博文中，有如下表述：“在 `Greylock`，我们特别乐于支持那些武装建设者（开发者和创业者）的公司。`0x
  Labs` 就是这样的公司之一。虽然有些人可能认为去中心化交易所不可行，用户会倾向于少数几家已经领先的交易所和钱包，但我们持相反观点。我们相信，我们正处于在新的轨道上重建金融基础设施的非常早期阶段，未来的最低交易量将囊括所有现有的传统金融资产，而预期的最终状态将包括跨社交网络、游戏、其他现实世界资产等的所有权经济。”^(¹⁹⁶)


  ## 结论


  DeFi 的规模仍然相对较小，但对创业者而言潜力巨大。该技术可以实现更简化、更快速、更便宜的金融交易。DeFi 还可以极大地扩展金融服务的可及性，尤其是在发展中国家。


  但当然也存在风险。由于监管较少，已经出现了安全漏洞和故障问题。然而，这意味着创业者可以构建具有更好安全性和稳定性的系统。


  机会不仅限于 B2C 应用。B2B 领域实际上可能是一个更大的市场。一些全球最大的金融服务公司一直在投资 DeFi。


  至于下一章，我们将探讨元宇宙。


