- fmt: '# Fractal


    Justin Kan is a pioneer of Internet video. While in his early 20s in 2007, he
    used a webcam – which was attached to his head – to broadcast his life, which
    he hosted on `Justin.tv`. This ignited the trend of “lifecasting.”^([^(165)](#fn165))


    Kan did this for about eight months. And yes, it resulted in lots of publicity,
    which helped boost the traffic to `Justin.tv`.


    Yet Kan saw there was a big business opportunity with this. He helped turn `Justin.tv`
    into a hub for video. He would then go on to help found `Twitch`. It helped to
    start another big trend – that is, the live streaming of video game play. This
    would ultimately lead to the birth of the eSports industry. Then in 2014, `Twitch`
    sold to Amazon for $970 million.^([^(166)](#fn166)) At the time, the platform
    had over 55 million users.


    Keep in mind that Kan is not done with trying to find the next-big business. And
    he believes it has to do with NFTs. To this end, he cofounded `Fractal` in 2021.
    It’s a marketplace for users to buy NFTs directly from game companies and is based
    on the `Solana` blockchain. Kan has raised $35 million for the venture.^([^(167)](#fn167))


    A key part of `Fractal` is `Launchpad`. This is a service that helps game companies
    sell their NFT collections.


    But not just anyone can sell on the `Fractal` marketplace. There is extensive
    vetting, which helps to promote more quality and security (the company accepts
    only about 5% of submissions). Kan believes that the future of NFTs will require
    curation.


    Some of the games on `Fractal` include `Yaku` (racing), `House` (real-time strategy),
    and `Tiny Colony` (a multi-mode game). All games on the marketplace have sold
    out their NFT collections.


    # Magic Eden


    In 2021, Sidney Zhang, Jack Lu, Zhuoxun Yin, and Zhuojie Zhou cofounded `Magic
    Eden`. They all had deep roots in the tech world, with stints at companies like
    `Uber Eats`, `Facebook AI`, `FTX`, and `Coinbase`. A big attraction for the venture
    was the `Solana` blockchain. When Lu was at `FTX`, he had firsthand experience
    with this technology.


    `Magic Eden` is a Web3-first marketplace for NFTs (Lu coined the name for the
    company because it is about the sense of limitless possibility). It was the first
    to allow bidding, a rarity index and a minting system that connects to a secondary
    marketplace. It has also quickly become the largest Solana-based platform. Here
    are some of the metrics:^([^(168)](#fn168))


    - 10+ million unique monthly visitors

    - 4,000+ collections

    - 100,000+ wallet connections

    - $1 billion in secondary trading volume


    The company has raised $27 million in venture capital.


    # OpenSea


    Software engineer Devin Finzer cofounded `Claimdog` in 2015. It was a service
    that could find if a business owed you money. A year later, he would sell the
    company to `Credit Karma`. While there, Finzer learned about blockchain technology
    and saw it as fertile ground for his next startup.


    His idea was `WifiCoin`. It allowed for the use of tokens to share wireless routers.
    Finzer got backing for this venture from `Y Combinator`. However, in a few months,
    he pivoted the business. Because of the popularity of `CryptoKitties`, he saw
    there was a bigger opportunity to create a marketplace for NFTs. So was born `OpenSea`.


    While the company would grow, it was not until 2021 that there was an inflection
    point. As a result, Finzer had little difficulties raising substantial amounts
    of money from elite venture capital firms. By early 2022, he raised $300 million
    at a whopping $13.3 billion valuation.^([^(169)](#fn169)) The lead investors included
    `Paradigm` and `Coatue Management`.


    With such strong backing, `OpenSea` has been able to recruit top-notch talent.
    The company was able to hire Brian Roberts, the former chief financial officer
    at `Lyft`, and Shiva Rajaraman, the previous vice president of commerce for `Meta`.


    At the time of the funding, `OpenSea` generated over $2.4 billion in transaction
    volume for the month. This was up over 600X on a year-over-year basis.^([^(170)](#fn170))


    According to a blog post from Finzer: “We’re focused on lowering the barriers
    to entry for NFTs by introducing features and simplified flows that abstract away
    the complexity of the blockchain. We’re also accelerating our multi-chain support
    and prioritizing improvements to help people discover, manage, and showcase their
    NFTs with better tools, analytics, and presentation.”^([^(171)](#fn171))


    # Rarible


    Alex Salnikov received a bachelor’s degree in computer science and a master’s
    degree in data science. This was a good background for his career in crypto. He
    went on to start various companies in the space. One he was able to sell.


    His latest venture is `Rarible`, where he serves as the head of product. He also
    operates as a nomad. That is, he does not have a permanent residence. Instead,
    he lives primarily in Airbnbs in various parts of the world.


    He cofounded `Rarible` in the summer of 2019. “We kept running into three types
    of people,” he said. “One thought that crypto was too complex. The other believed
    there was no need for the technology and that they just needed a credit and debit
    card. Then there were those who were the diehard believers.”^([^(172)](#fn172))


    For Alex, he saw an opportunity. He thought the timing was right to build a crypto
    marketplace for those who considered the technology too difficult.


    At the time, the wallets were getting easier. “But there was not a lot of fun
    you could have with crypto,” Alex said. “This is why we focused on NFTs.”


    His team was able to build a platform that made it easy for users to create and
    sell NFTs. “It just took a couple clicks for users,” said Alex.


    There was also the creation of an API. This made it possible for anyone to create
    their own Web3 marketplace.


    The target market was crypto art. To build a following, Alex and his team bootstrapped
    the user base, such as by reaching out to communities on Twitter.


    The strategy worked and `Rarible` started to grow. Yet the market would quickly
    shift. Users were becoming more interested in profile NFTs. “We had to change
