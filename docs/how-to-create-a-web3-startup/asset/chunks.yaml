    Next, you will need to fund it. Often this means creating a token (there is actually
    a built-in treasury for this). As a result, there is an incentive to keep up the
    DAO.


    But this is not completely automated. A DAO usually needs people to provide some
    level of management, say with the treasury. For this, service providers will usually
    get paid in tokens.


    You can issue more tokens to reward the stakeholders. The tokens can also be used
    as a way for the community to make purchases, such as for NFTs or virtual land
    on the Metaverse.


    Then there is the launch of the DAO. This is when it becomes part of the blockchain.
    At this point, the changes are only allowed with the voting of those who have
    the tokens. This is done by putting together proposals. There is also transparency.
    After all, the proposals and voting history are recorded on the blockchain.


    But what if the rules of the DAO are violated? In this case, it will be locked.


    Note


    Billionaire investor Mark Cuban tweeted this about DAOs: “The future of corporations
    could be very different as DAOs take on legacy businesses. It’s the ultimate combination
    of capitalism and progressivism. Entrepreneurs that enable DAOs can make $. If
    the community excels at governance, everyone shares in the upside. Trustless can
    pay.”^([^(107)](#fn107))


    There are various types of DAOs available. Here’s a look:


    *   Protocol DAOs: This is a project that is focused on leveraging Ethereum for
    DeFi applications. Some of examples include Aaave, Compound, and MakerDAO.


    *   Social DAOs: The word “social” can mean many things. But for a DAO, it is
    a broad way of describing a platform that has a strong community element. That
    is, it’s about a place where people share a common interest. Some of the DAOs
    in this category are Seed Club, Friends with Benefits, and FiatLuxDAO.


    *   Collector DAOs: These are generally for NFTs that represent albums, artwork,
    and videos. Some of the Collector DAOs include Flamingo DAO and PleasrDAO.


    *   Creator DAOs: These are targeted at super fans, such as for a music group.
    Usually, the DAO will issue an NFT. This can provide benefits like VIP passes,
    discounts on merchandise, and early access to events.'
  trans: '

    # 5. 去中心化自治组织（DAO）


    Web3 的治理模式


    2021 年 11 月，苏富比拍卖行拍卖了一本初版《美国宪法》（全球仅存 13 本）。和往常一样，许多富豪竞拍者参与了竞标。但有趣的是，一个 Web3 实体也加入了战局。


    它叫 `ConstitutionDAO`。顾名思义，它采用去中心化自治组织（`DAO`）作为其实体形式。这让它能够从众多人那里筹集资金，为竞拍美国宪法出价。


    `ConstitutionDAO` 从 17,437 人那里筹集了超过 4000 万美元。^(¹⁰⁴) 为此，它创建了自己的代币，名为 `$PEOPLE`。这是通过使用智能合约在以太坊平台上发行的。`Juicebox`
    负责处理交易。在营销方面，`ConstitutionDAO` 主要使用 Twitter 和 Discord。当然，大量的公关宣传也帮助激发了人们的兴趣。


    那些捐款的人并不会成为美国宪法的所有者。相反，他们将获得治理权。例如，他们可以就文件应在何处展示等事项进行投票。


    `ConstitutionDAO` 很独特，因为它是为了购买实物资产，这在加密世界中相当罕见。这实际上增加了 DAO 结构的复杂性。


    但最终，`ConstitutionDAO` 并未成功。对冲基金亿万富翁肯尼斯·格里芬竞标成功。他同意为这份文件支付 4320 万美元。^(¹⁰⁵) 但他认同
    `ConstitutionDAO` 的主要目标——即让公众免费获取美国宪法。所有 DAO 的贡献者都收到了退款，该实体也随之关闭。


    这一事件无疑展示了这种治理结构的重要性。它已成为 Web3 的主要治理形式。因此，是的，企业家需要深入理解 DAO——我们将在本章中进行探讨。


    ## DAO 的起源


    传统的公司结构拥有中央权威。以 C 型企业为例。为了管理组织，有 CEO 负责日常决策。还有其他的高管协助，比如 CFO（首席财务官）、CMO（首席营销官）、总法律顾问、首席人力资源官等等。


    然后是董事会。这是一个小团队——比如五到十人——他们为公司的战略方向提供帮助。他们还有权支付股息、批准高管薪酬以及就并购进行投票。


    正如你所见，传统的公司结构是高度中心化的。诚然，股东确实有权对有限的事项进行投票，但他们通常是被动的。


    而 `DAO` 则是一种去中心化的治理结构。社区的所有成员拥有更多的权力和参与度。实际上，没有 CEO 或其他高管。也没有董事会。


    请注意，DAO 结构仍处于萌芽阶段。第一个被称为 `The DAO`，于 2016 年 4 月推出。^(¹⁰⁶) 从一开始，它就获得了大量关注，并筹集了超过
    1.5 亿美元。其目标是为有趣的区块链和加密项目提供资金。


    但不幸的是，成功很快变成了噩梦。黑客入侵了系统并窃取了大量加密资产。`The DAO` 实际上曾被警告过，但被忽视了。最终，问题出在一个编码错误上。


    但问题还在继续。美国证券交易委员会做出了不利裁决。`The DAO` 最终不得不关闭。


    尽管如此，DAO 结构得以不断发展和完善。有许多大型实体都做得相当成功。


    但重要的是要记住，仍然存在许多复杂和未解决的问题。如果说有什么相似之处，它类似于 C 型企业和有限责任公司的早期阶段。那时必须通过判例法的演进才能完善这些结构。


    正因为如此，在建立 DAO 时，你确实需要律师的帮助。诚然，很难找到在该领域经验丰富的律师。但好消息是，传统结构与 DAO 之间存在重要的相似之处。


    ## DAO 是如何运作的？


    DAO 需要一个目标或宗旨。但它可以是任何事情。不过，建立 DAO 有一些通用指南。


    首先，你需要制定规则。尽可能具体化，并找出可能存在问题的地方。这时，律师就能派上用场了。


    有了规则，你就将它们嵌入到智能合约中。这些合约将自动执行 DAO 的许多操作。然后你需要对其进行审计和验证。


    接下来，你需要为其提供资金。这通常意味着创建一个代币（实际上有一个内置的金库用于此目的）。因此，就有了维护 DAO 的动力。


    但这并非完全自动化。DAO 通常需要人员提供一定级别的管理，例如管理金库。为此，服务提供者通常会以代币形式获得报酬。


    你可以发行更多代币来奖励利益相关者。代币也可以用作社区进行购买的方式，例如购买 NFT 或元宇宙中的虚拟土地。


    然后是 DAO 的启动。此时它成为区块链的一部分。从此刻起，只有持有代币的人通过投票才能进行更改。这是通过提出提案来实现的。同时还有透明度。毕竟，提案和投票历史都记录在区块链上。


    但如果 DAO 的规则被违反了怎么办？在这种情况下，它会被锁定。


    注意


    亿万富翁投资者马克·库班曾这样评价 DAO：“随着 DAO 接管传统业务，企业的未来可能会非常不同。这是资本主义与进步主义的终极结合。支持 DAO 的企业家可以赚钱。如果社区擅长治理，每个人都能分享收益。无需信任即可获得回报。”^(¹⁰⁷)


    有多种类型的 DAO 可供选择。以下是几种类型：


    *   **协议 DAO**：这是一个专注于利用以太坊构建 DeFi 应用的项目。一些例子包括 `Aaave`、`Compound` 和 `MakerDAO`。


    *   **社交 DAO**：“社交”这个词可以有很多含义。但对于 DAO 来说，它是一种广义的描述，指代具有强大社区元素的平台。也就是说，它是一个人们分享共同兴趣的地方。这类
    DAO 包括 `Seed Club`、`Friends with Benefits` 和 `FiatLuxDAO`。


    *   **收藏家 DAO**：这些通常针对代表专辑、艺术品和视频的 NFT。一些收藏家 DAO 包括 `Flamingo DAO` 和 `PleasrDAO`。


    *   **创作者 DAO**：这些针对的是超级粉丝，例如音乐团体的粉丝。通常，DAO 会发行 NFT。这可以提供诸如 VIP 通行证、商品折扣以及活动优先入场等福利。

    '
- fmt: '# The Benefits of DAOs


    We have already looked at some of the advantages of DAOs. For example, they can
    be quite effective in pooling the resources of a community. This can mean purchasing
    high-priced items.


    Next, a DAO provides for transparency. All the transactions are on the public
    blockchain. This helps to bolster the trust for the platform as well as guidance
    for the community.


    And yes, there are the potential financial rewards. In some cases, people have
    made millions from a DAO.


    But there is something else to consider. A DAO helps to mitigate the principal–agent
    problem. In this case, the principal is the main owner or stakeholder of an entity,
    and the agent is the person or persons that make the decisions.


    With a traditional structure like a corporation, there can be glaring conflicts.
    For example, a CEO may focus on short-term efforts to bolster their compensation.
    How many times have there been cases where they have departed with million-dollar
    packages – but have left the company in worst shape?


    In some cases, an agent may engage in high-risk activities. If this person does
    not have a large stake in the entity, then this approach could have an attractive
    risk-reward profile. However, this puts the principal in jeopardy.


    But with a DAO, there is better alignment. The participants serve both roles as
    principal and agents. There is also the strict enforcement of the rules that are
    embedded in the smart contracts.


    # DAOs Versus the Law


    A key advantage of a traditional corporation is limited liability. This means
    that the shareholders generally are not on the hook for a company’s liabilities.
    For example, suppose you own 1,000 shares of ABC Corp. – for which you paid $20,000
    – and the company loses a lawsuit for $10 million. However, the company only has
    $1 million in the bank and its assets are $500,000. In this case, the plaintiffs
    cannot sue you personally to collect on this judgment. You are only liable to
    the extent of your equity. So if the stock price goes to zero, the most you can
    lose is the initial $20,000 investment.


    Limited liability is critical because it makes it more attractive for people to
    invest in companies. In fact, this legal concept has been one of the biggest factors
    for the popularity of the corporate structure.


    Now, as for DAOs, there is generally no recognized limited liability. This could
    ultimately reduce the opportunities for expanding the uses of this structure.


    Yet lawyers have found creative ways to deal with this. For example, they will
    set up legal “wrappers” to provide protections. This essentially means embedding
    the DAO inside a corporate structure like a C-Corp or LLC. However, there should
    be caution. A change in regulation could make the strategy unworkable.


    There’s a temptation for entrepreneurs to just set up a DAO and not create a legal
    entity. But this can often be a bad approach. Keep in mind that there will actually
    be a default legal structure – that is, a general partnership. This is when two
    or more people join together for some type of business purpose. Each state has
    its own laws and regulations for general partnerships. There is also unlimited
    liability for the partners. Interestingly enough, you will often have this relationship
    with partners that are anonymous.


    It’s true that there is no need to register a general partnership with the state.
    However, the legal consequences can be significant and could hamper the progress
    of the DAO.


    There is another important distinction between a DAO and a traditional corporation.
    The law treats the traditional corporation as a “person.” This may sound strange.
    But it is another powerful concept. It means that a traditional corporation can
    sign contracts, hire people, own intellectual property, be sued, and so on. As
    for a DAO, it currently does not have this legal status. And this can be another
    limiting factor.


    But in the years ahead, there is likely to be changes to the law, which will provide
    more protections and guarantees with DAOs. Note that Tennessee and Wyoming have
    already passed legislation for this.^([^(108)](#fn108)) Both states allow for
    registration of DAOs and have specified various rights.


    In the case of Tennessee, it looks like the goal is to make the state the go-to
    place for crypto and Web3. There is already a thriving tech community in Nashville.
    But with new laws for DAOs, this should help increase the growth.


    According to State House Rep. Jason Powell (D-Nashville), the legislation will
    make “Tennessee the Delaware of DAOs. With this new business structure, Tennessee
    will be a beacon for blockchain investment, new jobs and investment. Just as Delaware
    became a hub for traditional LLCs or South Dakota for credit card companies.”^([^(109)](#fn109))


    Countries are also pursuing similar strategies. In early 2022, the Republic of
    the Marshall Islands (RMI) allowed DAOs to register as a legal entity.^([^(110)](#fn110))
    The first entity to use this was Shipyard Software’s Admiralty LLC.


    The Caymans and Switzerland have become popular nations to set up DAOs. Although,
    these countries do not have a specific law for registration.


    But DAOs are still in the formative stages. It will be far from clear how things
    will progress. “At present, I think a DAO is mostly an ethos about how an organization
    will be run—more decentralized, more democratic—and an approach to bake these
    concepts into operations and governance,” said Jennifer Hinkel, who is the Managing
    Director of The Data Economics Company. “How to exactly operationalize a DAO,
    including how to set one up in a legal framework and fund it, are thornier questions
    and the topic of debate among many startup attorneys.”'
