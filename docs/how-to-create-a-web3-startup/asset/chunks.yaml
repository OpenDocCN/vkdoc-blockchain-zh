    # 6. NFTs, Gaming, and Social Networks


    The Consumer Startup


    Mike Winkelmann is a graphic designer and artist.^([^(126)](#fn126)) He is better
    known as Beeple. He has been an innovator, using technologies like Virtual Reality
    (VR) and Augmented Reality (AR) for his artwork. Beeple has also been a go-to
    person for many celebrities. Just some examples include Nicki Minaj, Eminem, Justin
    Bieber, One Direction, and Katy Perry.


    In 2020, Beeple started to explore non-fungible tokens (NFTs). This a technology,
    which is based on blockchain, that allows people to own digital items.


    He started to create digital art with NFTs, and they were fetching thousands of
    dollars. But all this would pale in comparison to his digital collage of political
    cartoons and video game images, called “Everydays: The First 5,000 Days.”


    He put this up for auction at Christie’s and the bidding was intense (there were
    353 bids). The winner would pay a hefty $69.3 million for the NFT. It was the
    third most paid for any living artist, behind Jeff Koons and David Hockney.^([^(127)](#fn127))


    No doubt, the auction caused a stir – and it was a catalyst for enormous growth
    in the NFT market. It was also one of the first Web3 consumer applications that
    became mainstream.


    But of course, there are others as well. Web3 gaming and social networks have
    seen lots of traction as well.


    In this chapter, we’ll see how these markets are developing and the opportunities
    for entrepreneurs.


    ## How Do NFTs Work?


    Until the creation of NFTs, it was not possible to own digital items. After all,
    a person could just copy and paste it, right? Definitely. It’s why content industries,
    such as for music have struggled in the digital world.


    But NFTs would be a game changer. By using the blockchain, it was possible to
    provide a unique token for the digital item.


    The first NFT came out in 2017\. A studio, called Larva Labs, developed digital
    characters called CryptoPunks.^([^(128)](#fn128)) The company essentially made
    it possible to trade them, such as you would with a traditional collectible.


    NFTs are generally built on the Ethereum blockchain and use the ERC-721 protocol.
    This allows for storing various details. All this is transparent to the public.
    And an NFT can be virtually for anything.


    As should be no surprise, there can be some confusion with NFTs. Keep in mind
    that it does not convey any copyrights. They still belong to whoever owns the
    physical item. For example, there may be an NFT for the Mona Lisa. But this does
    not mean you own the original painting.


    Note


    Quentin Tarantino, the scriptwriter of the iconic film “Pulp Fiction,” attempted
    to create NFTs for seven exclusive scenes.^([^(129)](#fn129)) But the studio that
    produced the film, Miramax, filed a lawsuit to prevent this. It’s far from clear
    what the outcome will be. But the case could prove critical in setting forth the
    rights for NFTs.


    Next, an NFT is not a cryptocurrency. The main reason is that a cryptocurrency
    is fungible. For example, a Bitcoin is no different from another one. You can
    easily exchange them. A non-fungible token, however, is nontransferable. None
    are alike. Although, you can use a cryptocurrency to acquire an NFT.


    NFTs and cryptocurrencies rely on the same underlying blockchain technology. NFT
    marketplaces may also require people to purchase NFTs with a cryptocurrency. However,
    cryptocurrencies and NFTs are created and used for different purposes.


    Note that the NFT market has posted a staggering growth. In 2021, the spending
    came to $17.6 billion, up by about 21,000%.^([^(130)](#fn130))


    Here are some other interesting facts:


    *   NFT investors made roughly $5.4 billion in profits.


    *   There are 2.2 million wallets for NFT transactions.


    *   More than 470 wallets have over $1 million in NFTS.


    By far, the most popular category was for collectibles. But there was also strong
    growth with gaming and the Metaverse.


    However, by 2022, the NFT market would look much different. The growth rates plummeted
    as the crypto market came under tremendous pressure. Yet the levels of activity
    were still much higher than a few years earlier.


    Note


    While many NFTs are stored on the Ethereum network, there are certainly alternatives.
    Some of the more notable ones include Flow and Tezos.'
