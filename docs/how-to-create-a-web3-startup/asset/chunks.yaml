- fmt: '# Solidity


    In 2014, Gavin Wood started the development of the Solidity language. The goal
    was to make it easier to create dApps for the Ethereum blockchain. At the time,
    the development was done using C++. While it was extremely powerful, it was also
    complicated.


    By 2015, Wood finished the first version of Solidity. He also had the help of
    other top developers like Christian Reitwiessner, Alex Beregszaszi, Liana Husikyan,
    and Yoichi Hirai.


    Now Solidity shares important features from C++. Note that both languages are
    object-oriented. This means you can organize an application into different components,
    which allow for reusability, and the inheritance of code and logic for other parts
    of a program. Object-oriented approaches tend to allow for more efficiency and
    scale. It can also be easier when collaborating with other coders.


    Solidity remains quite popular with development on Ethereum. But you can use the
    language for many other blockchain platforms like Tron, Hedera Hashgraph, Avalanche,
    and Binance Smart Chain.


    In terms of the syntax, it is similar to JavaScript. This has made it easier for
    programmers to learn the language.


    The most common IDE (Integrated Development Environment) for Solidity is Remix.
    This is built to allow for the writing, running, debugging, and deploying of smart
    contracts on the blockchain. Keep in mind that the necessary libraries are included
    in the distribution. There is also a seamless integration of the Ethereum Virtual
    Machine (EVM).


    # Vyper


    Vyper is for developing smart contracts for the Ethereum Virtual Machine and is
    No. 2 in the category, behind Solidity. The creator of this language is Vitalik
    Buterin (the original name was Viper). Then other contributors took over the project.


    One of the hallmarks of Vyper is its security features. Compared to Solidity,
    they are more seamlessly part of the development process. It is also easier to
    implement the compiler.


    Then there is audibility. This means that a non-technical person can look at the
    Vyper code and have a general idea of the workflow.


    The syntax is similar to Python’s. Vyper has some object-oriented features like
    inheritance.


    However, because of these benefits, there are fewer features compared to Solidity.
    The language is also less free from.


    > **Note:** To help improve the security of Solidity, there is the annual Underhanded
    Solidity Contest. The goal is to write “seemingly innocent and straightforward-looking
    Solidity code which actually contains malicious behaviors or backdoors.”^([^(84)](#fn84))
    For 2022, the contest is to build a DeFi platform, and the first prize is a ticket
    to Devcon VII Bogota.


    # QuickNode


    QuickNode is a blockchain infrastructure platform. Some of its marque customers
    include PayPal, Adobe, OpenSea, and Fireblocks. The company has over $40 million
    in venture backing.


    With QuickNode, developers can quickly setup and integrate a blockchain system.
    A key to the success is the speed. You can access Ethereum, Bitcoin, Polygon,
    and other nodes within milliseconds or less. Another key to the success for the
    company has been the agility of its development team. In 2021, it added support
    for a new blockchain every month or so.


    Growth has been particularly strong. During the first quarter of 2021, QuickNode
    was serving more than two billion requests per day for a community of close to
    20,000 developers.^([^(85)](#fn85)) To scale this, the company has built a multi-cloud
    infrastructure with more than 15 regions across four continents.


    But the growth is likely to continue for some time. A study from Markets and Markets
    research predicts that blockchain infrastructure will increase at a compound annual
    rate of 67% – reaching $40 billion by 2025.^([^(86)](#fn86))


    QuickNode operates from an easy-to-use panel. With this, you get the following:


    - **Rich Analytics:** You can get metrics on the performance of dApps, such as
    what smart contract methods are being called the most and when.

    - **Monitoring:** You get details on the trends in the traffic that streams into
    your nodes on an hourly, daily, weekly, or monthly basis.

    - **Debugging:** There are helpful tools to detect and fix problems with your
    dApps.

    - **NFT Fetch Tool:** No longer will you have to scrape logs. QuickNode has an
    API that aggregates a wallet’s NFTs.

    - **Archive:** The system tracks all states for smart contracts and logs them
    for future use.

    - **Trace:** You can re-execute a transaction with different types of data.

    - **Integrations:** There are many, such as for Metamask, Augur, and MyCrypto.'
