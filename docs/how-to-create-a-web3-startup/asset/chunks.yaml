    \ Twitter 和 Discord 聊天室里花着大量时间鼓吹他们最爱的加密货币，并自豪地使用卡通风格的 NFT 头像（从无聊猿到加密朋克再到酷猫）作为个人资料图片——然后在把这些头像转手获利后，再换一个。他们中许多人都自豪地标榜自己属于特定的代币阵营，从“比特币极端主义者”到“以太坊人”到“LINK\
    \ 海军陆战队”再到“XRP 军团”。他们用“gm”、“WAGMI”、“NGMI”、“HODL”、“down bad”和“rekt”这类圈内黑话互相识别。\n\
    \n然而，将 Web3 斥为一时热潮（或者像加密怀疑论者喜欢坚持的那样，视为一种骗局、欺诈或庞氏骗局）将是极其短视的。它已经证明了自身的持久力：比特币交易已有超过\
    \ 13 年，以太坊也已七年，两条区块链都从未被黑客攻破过，这两种货币也从未归零。\n\n而在加密货币经历其迄今为止最大的主流牛市——2020 年和 2021\
    \ 年疫情期间，借助散户投资者的革命和 Reddit 推动的模因股票浪潮之后，比以往任何时候都有更多的大人物（无论个人还是公司）成为 Web3 的信仰者。华尔街对冲基金巨头改变了对加密货币作为投资工具的看法；特斯拉和\
    \ Square 等上市公司将比特币纳入资产负债表；PayPal 和 Robinhood 等金融科技巨头推出了加密货币购买功能；从百威到 Visa 到蒂芙尼到古驰等消费品牌纷纷拥抱\
    \ NFT。\n\n所有这些都指向一个非常明确的结论：Web3 将持续存在，尽管它仍处于早期阶段，但现在是时候开始构建了。\n\nCoinbase 成立于\
    \ 2012 年，由一位前 Airbnb 工程师和一位前高盛交易员创立；如今它已上市，在美国家喻户晓。加密货币交易所的名称和标志装饰着洛杉矶湖人队和迈阿密热火队的主场，以及每位\
    \ MLB 裁判的衬衫。DraftKings 这家顽强拼搏的波士顿初创公司 CEO——该公司历经多年与州监管机构的法律斗争，最终成长为百亿美元的体育博彩巨头——是加密货币的坚定信仰者，他今年对《解密》杂志表示：“在互联网早期，并没有太多主流的互联网消费方式……但一切最终都围绕着万维网，所有底层技术都以此为基础构建。然后突然之间，视频以及其他对普通人来说更主流、更易于消费的东西就出现了。”\n\
    \n经济学家兼《纽约时报》专栏作家保罗·克鲁格曼在 1998 年曾豪言写道：“互联网的增长将急剧放缓……到 2005 年左右，人们会清楚地发现，互联网对经济的影响不会比传真机更大。”他错得非常、非常离谱，这段话每隔几年就会被翻出来，被\
    \ Web 世界的居民们狠狠嘲讽。\n\n但为了确保如今那些否定区块链技术的怀疑论者同样被证明是错误的，构建 Web3 初创公司的企业家们需要打造出具有真实用例、解决实际需求、并能展示去中心化技术所向的工具。\n\
    \n许多人已经在这么做了，他们将区块链应用于去中心化数据存储和视频托管、点对点支付、闪电般的国际汇款、更快更私密的慈善捐赠，以及为团体项目提供更公平的投票。但就像任何新技术行业一样，其中也充斥着骗局和昙花一现的捞钱手段。为了避免重蹈过去的覆辙（还记得\
    \ 2018 年的 ICO 热潮吗？），并让接下来的数百万人进入 Web3，这一领域的企业家需要做到诚实、耐心、具有战略眼光，并且最重要的是，打造出真正有意义的产品。\n\
    \n> *——丹尼尔·罗伯茨，《解密》杂志主编*\n\n## 关于作者\n\n## 关于技术审校\n\n# 1. 为什么是 Web3？\n\n这是一场对互联网的反思\n\
    \n自幼年起，加文·伍德就对经济学与博弈论的融合产生了兴趣。^(¹) 他甚至与人合作出版了一款策略棋盘游戏。他同时也是一个狂热的计算机程序员，八岁就开始编程。\n\
    \n成年之后，加文曾在多家初创公司以及微软工作。他的主要研究方向是利用计算机视觉和机器学习技术处理音乐与音频系统。\n\n2013 年，他遇到了维塔利克·布特林，一位撰写了一篇关于以太坊论文的程序员。该论文基于当时新兴的区块链平台。加文对此产生了浓厚的兴趣，并为其编写了第一个可运行的客户端，他称之为`PoC-1`（即“概念验证”）。他在\
    \ 2014 年 1 月的北美比特币大会上展示了这一成果。\n\n以太坊迅速获得了采用。但加文也将这项技术视为一种新型互联网的基础。他将其称为“Web3”。^(²)\
    \ 根据他的说法：“这是正在被用来构建新世界（这个世界至少将驱动本世纪剩余时间内的人类文明）的技术。”^(³) 随后，他联合创立了技术初创公司 Polkadot\
    \ 以及支持 Web3 领域的非营利组织 Web3 基金会。\n\n那么，Web3 到底是什么？它为何引起如此大的关注？为什么它对创业者如此重要？在本章中，我们将一探究竟。\n"
- fmt: '# Definition of Web3


    Web3 is still in the nascent stages. This means that the definition of this term
    is evolving. In a way, it’s similar to what happened with the emergence of the
    Internet in the mid-1990s.


    But let’s take a look at a few definitions:


    * The Web3 Glossary: “Web3 (noun, adjective) [is] the next iteration of the web
    being ushered in as we speak, which leverages blockchain technology, open-source
    applications, and the decentralization of data and information. Web3 aims to remove
    control of the web from monopolistic tech companies and return ownership of data
    and content to its users. Also referred to as the ‘read-write-trust web.’”^([⁴](#fn4))

    * `Ethereum.org`: “Web3, in the context of Ethereum, refers to decentralized apps
    that run on the blockchain. These are apps that allow anyone to participate without
    monetizing their personal data.”^([⁵](#fn5))

    * `Digiday.com`: “Web 3.0, or stylized as Web3, is the label being applied to
    a decentralized version of the internet that would be jointly owned by the users
    and the builders. Essentially, this is the antithesis to how centralized platforms
    like Apple, Google and Facebook operate, by monetizing data extracted from users
    on a daily basis.”^([⁶](#fn6))


    There are some common themes. First, Web3 rests on the blockchain stack of technologies.
    This means it is decentralized since users create the network and even own it.
    With it, they can engage in direct peer-to-peer interactions.


    The fast-growing network is not controlled by a central entity, such as Facebook
    or Apple. In a sense, Web3 is a democratized version of the online world. Everyone
    owns their data and can monetize it themselves.


    Now it’s true that the Web2 Internet is based on a myriad of free protocols –
    and this is certainly a form of decentralization. But the reality is that – for
    most people – they need to use the large Internet providers to do anything meaningful,
    such as make connections, read or view content, and so on.


    Web3 is also permissionless. This means that anyone can use it without having
    to create login credentials or get authorization from a central provider. When
    you are on the system, you cannot be kicked off.


    Of course, all this only scratches the surface of Web3. But these concepts get
    to the high-level essence.


    **Note**: The term Web3 has different variations. When Gavin Wood coined the term,
    he referred to it as Web 3.0. But it has also been called Web 3. Yet the general
    usage now is for Web3.


    ## Web1


    To better understand Web3, it is important to get a brief backgrounder on Web1
    and Web2. No doubt, both of these periods were full of drama and rapid technological
    change. There was also a major impact on society.


    Now the origins of Web1 go back to the late 1960s. The Internet was known as ARPANET,
    or the Advanced Research Projects Agency Network, and had the backing of the U.S.
    Department of Defense. At the core of this technology was packet switching, which
    allowed computers to communicate with each other. The idea was to have a network
    that could survive a nuclear war.


    However, ARPANET would be primarily for academic purposes. For example, the first
    online connection happened between research labs at UCLA and Stanford. Even though
    the message just had “Login,” the system crashed anyway!^([⁷](#fn7))


    During the 1970s and 1980s, programmers developed a variety of protocols that
    were freely available. Some examples include Transmission Control Protocol and
    Internet Protocol, or `TCP/IP`, Domain name system (`DNS`), `SMTP`, or the Simple
    Message Transfer Protocol, and File Transfer Protocol (`FTP`). All these have
    remained critical for powering today’s online world.


    But in 1990, the Internet would change in a big way. Tim Berners-Lee created the
    World Wide Web, which allowed for hypertext links. For him, he thought this was
    a much better way for searching and reading academic papers.


    But it would not take long until the Internet would become mainstream, allowing
    for searching and ecommerce. In 1993, college student Marc Andreessen helped to
    create the Mosaic web browser. From the start, it got huge numbers of downloads.


    A year later, tech entrepreneur Jim Clark contacted Andreesen to build a company,
    called Netscape. The main product was the Navigator browser – and the growth was
    staggering. On August 9, 1995, Netscape came public at $28 a share and the price
    ended the day at $58.^([⁸](#fn8)) The market valuation was $2.2 billion, even
    though the revenues for the past six months were only $16.6 million. There was
    a net loss of $4.31 million.


    The IPO ignited the dot-com boom, which would last until 2000. Some interesting
    characteristics of this period include the following:


    * Few people created content. Simply put, it was difficult to develop websites.
    You had to know HTML and scripting code. The dialup Internet connections made
    it challenging to use video and images.

    * Creating startups was expensive and required the help of venture capitalists.
    You had to buy expensive servers and databases. It was also hard to find talent
    who could create the web technologies and there were not many useful development
    tools.

    * A popular business model was advertising. This allowed for content sites like
    `Yahoo!` to provide their services for free. The ads were usually based on the
    number of views or “eyeballs.”

    * The Internet was still for a small part of the global population. By 2001, only
    about 50 million had access to broadband Internet.^([⁹](#fn9))

    * Portals like `Yahoo!`, `Lycos`, `Infoseek`, `AltaVista`, and `Excite` became
    very important for the growth of Web1. They allowed many people to easily get
    useful information in one place.


    According to Chris Dixon, a general partner at `a16z`: “Web1…was about open protocols
    that were decentralized and community governed. Most of the value accrued to the
    edges of the network — users and builders.”^([^(10)](#fn10))


    The bottom line: It was very similar to the vision of Web3. Interestingly, a common
    notion is that Web3 is really a way to get back to the original principles of
    the Internet.


    Yet this is likely an exaggeration. The fact is that Web1 saw centralization.
    And this was not necessarily a bad thing. It actually helped get a large number
    of people to participate in the ecosystem.


    Part of this was due to the power of AOL, which was the Facebook of its era. AOL
    was like an alternative version of the Internet – and it held tremendous power.
    Because of its huge user base, the company was able to generate massive amounts
    of revenues from advertisements and sponsorships.


    Then there was AOL’s hugely popular chat system. It connected millions of users
    like a modern-day social network.


    The Web1 world also highlighted something important that we’ve seen in Web2: The
    network effect. This is where a system gets more useful and powerful as more people
    join it.


    A classic case of this was eBay. True, there were various other online auctions.
    But eBay quickly turned into the clear dominant platform because sellers were
    attracted to the large number of buyers and vice versa. In fact, today the company
    is still the leader in the space.'
  raw: '## Definition of Web3


    Web3 is still in the nascent stages. This means that the definition of this term
    is evolving. In a way, it’s similar to what happened with the emergence of the
    Internet in the mid-1990s.


    But let’s take a look at a few definitions:


    *   The Web3 Glossary: “Web3 (noun, adjective) [is] the next iteration of the
    web being ushered in as we speak, which leverages blockchain technology, open-source
    applications, and the decentralization of data and information. Web3 aims to remove
    control of the web from monopolistic tech companies and return ownership of data
    and content to its users. Also referred to as the ‘read-write-trust web.’”^([⁴](#fn4))


    *   Ethereum.org: “Web3, in the context of Ethereum, refers to decentralized apps
    that run on the blockchain. These are apps that allow anyone to participate without
    monetizing their personal data.”^([⁵](#fn5))


    *   Digiday.com: “Web 3.0, or stylized as Web3, is the label being applied to
    a decentralized version of the internet that would be jointly owned by the users
    and the builders. Essentially, this is the antithesis to how centralized platforms
    like Apple, Google and Facebook operate, by monetizing data extracted from users
    on a daily basis.”^([⁶](#fn6))


    There are some common themes. First, Web3 rests on the blockchain stack of technologies.
    This means it is decentralized since users create the network and even own it.
    With it, they can engage in direct peer-to-peer interactions.


    The fast-growing network is not controlled by a central entity, such as Facebook
    or Apple. In a sense, Web3 is a democratized version of the online world. Everyone
    owns their data and can monetize it themselves.


    Now it’s true that the Web2 Internet is based on a myriad of free protocols –
    and this is certainly a form of decentralization. But the reality is that – for
    most people – they need to use the large Internet providers to do anything meaningful,
    such as make connections, read or view content, and so on.


    Web3 is also permissionless. This means that anyone can use it without having
    to create login credentials or get authorization from a central provider. When
    you are on the system, you cannot be kicked off.


    Of course, all this only scratches the surface of Web3\. But these concepts get
    to the high-level essence.


    Note


    The term Web3 has different variations. When Gavin Wood coined the term, he referred
    to it as Web 3.0\. But it has also been called Web 3. Yet the general usage now
    is for Web3.


    ## Web1


    To better understand Web3, it is important to get a brief backgrounder on Web1
    and Web2\. No doubt, both of these periods were full of drama and rapid technological
    change. There was also a major impact on society.


    Now the origins of Web1 go back to the late 1960s. The Internet was known as ARPANET,
    or the Advanced Research Projects Agency Network, and had the backing of the U.S.
    Department of Defense. At the core of this technology was packet switching, which
    allowed computers to communicate with each other. The idea was to have a network
    that could survive a nuclear war.


    However, ARPANET would be primarily for academic purposes. For example, the first
    online connection happened between research labs at UCLA and Stanford. Even though
    the message just had “Login,” the system crashed anyway!^([⁷](#fn7))


    During the 1970s and 1980s, programmers developed a variety of protocols that
    were freely available. Some examples include Transmission Control Protocol and
    Internet Protocol, or TCP/IP, Domain name system (DNS), SMTP, or the Simple Message
    Transfer Protocol, and File Transfer Protocol (FTP). All these have remained critical
    for powering today’s online world.


    But in 1990, the Internet would change in a big way. Tim Berners-Lee created the
    World Wide Web, which allowed for hypertext links. For him, he thought this was
    a much better way for searching and reading academic papers.


    But it would not take long until the Internet would become mainstream, allowing
    for searching and ecommerce. In 1993, college student Marc Andreessen helped to
    create the Mosaic web browser. From the start, it got huge numbers of downloads.


    A year later, tech entrepreneur Jim Clark contacted Andreesen to build a company,
    called Netscape. The main product was the Navigator browser – and the growth was
    staggering. On August 9, 1995, Netscape came public at $28 a share and the price
    ended the day at $58.^([⁸](#fn8)) The market valuation was $2.2 billion, even
    though the revenues for the past six months were only $16.6 million. There was
    a net loss of $4.31 million.


    The IPO ignited the dot-com boom, which would last until 2000\. Some interesting
    characteristics of this period include the following:


    *   Few people created content. Simply put, it was difficult to develop websites.
    You had to know HTML and scripting code. The dialup Internet connections made
    it challenging to use video and images.


    *   Creating startups was expensive and required the help of venture capitalists.
    You had to buy expensive servers and databases. It was also hard to find talent
    who could create the web technologies and there were not many useful development
    tools.


    *   A popular business model was advertising. This allowed for content sites like
    Yahoo! to provide their services for free. The ads were usually based on the number
    of views or “eyeballs.”


    *   The Internet was still for a small part of the global population. By 2001,
    only about 50 million had access to broadband Internet.^([⁹](#fn9))


    *   Portals like Yahoo!, Lycos, Infoseek, AltaVista, and Excite became very important
    for the growth of Web1\. They allowed many people to easily get useful information
    in one place.


    According to Chris Dixon, a general partner at a16z: “Web1…was about open protocols
    that were decentralized and community governed. Most of the value accrued to the
    edges of the network — users and builders.”^([^(10)](#fn10))


    The bottom line: It was very similar to the vision of Web3. Interestingly, a common
    notion is that Web3 is really a way to get back to the original principles of
    the Internet.


    Yet this is likely an exaggeration. The fact is that Web1 saw centralization.
    And this was not necessarily a bad thing. It actually helped get a large number
    of people to participate in the ecosystem.


    Part of this was due to the power of AOL, which was the Facebook of its era. AOL
    was like an alternative version of the Internet – and it held tremendous power.
    Because of its huge user base, the company was able to generate massive amounts
    of revenues from advertisements and sponsorships.


    Then there was AOL’s hugely popular chat system. It connected millions of users
    like a modern-day social network.


    The Web1 world also highlighted something important that we’ve seen in Web2: The
    network effect. This is where a system gets more useful and powerful as more people
    join it.


    A classic case of this was eBay. True, there were various other online auctions.
    But eBay quickly turned into the clear dominant platform because sellers were
    attracted to the large number of buyers and vice versa. In fact, today the company
    is still the leader in the space.'
  trans: '

    # Web3 的定义


    Web3 仍处于萌芽阶段。这意味着该术语的定义仍在演变中。在某种程度上，这与 20 世纪 90 年代中期互联网出现时的情况类似。


    但让我们来看看几个定义：


    *   Web3 词汇表：“Web3（名词，形容词）[是] 随着我们的使用而即将到来的下一代网络，它利用了区块链技术、开源应用程序以及数据和信息的去中心化。Web3
    旨在从垄断性科技公司手中夺回对网络的控制权，并将数据和内容的所有权归还给用户。也被称为‘读-写-信任网络’。” ^(⁴)

    *   `Ethereum.org`：“在以太坊的语境中，Web3 指的是在区块链上运行的去中心化应用程序。这些应用允许任何人参与其中，而无需将他们的个人数据货币化。”
    ^(⁵)

    *   `Digiday.com`：“Web 3.0，或称为 Web3，是应用于互联网去中心化版本的标签，该版本将由用户和建设者共同拥有。从本质上讲，这与苹果、谷歌和脸书等中心化平台的运营方式——通过日常从用户身上提取数据并将其货币化——截然相反。”
    ^(⁶)


    其中有一些共同的主题。首先，Web3 建立在区块链技术栈之上。这意味着它是去中心化的，因为用户创建网络甚至拥有它。有了它，用户可以参与直接的**点对点**交互。


    这个快速发展的网络不受任何中心化实体（如脸书或苹果）的控制。从某种意义上说，Web3 是在线世界的一个民主化版本。每个人都拥有自己的数据，并可以自己将其货币化。


    诚然，Web2 互联网基于无数免费协议——这当然是一种去中心化形式。但现实是，对大多数人来说，他们需要使用大型互联网提供商才能做任何有意义的事情，例如建立联系、阅读或查看内容等等。


    Web3 也是**无需许可的**。这意味着任何人都可以使用它，而无需创建登录凭证或获取中心化提供商的授权。当你加入该系统后，你不会被踢出局。


    当然，所有这些只是触及了 Web3 的表面。但这些概念抓住了高层级的本质。


    **注意**：Web3 这个术语有不同变体。当 **Gavin Wood** 创造这个术语时，他称之为 Web 3.0。但它也曾被称为 Web 3。然而，现在的普遍用法是
    Web3。


    ## Web1


    为了更好地理解 Web3，简要了解一下 Web1 和 Web2 的背景很重要。毫无疑问，这两个时期都充满了戏剧性和快速的技术变革。同时也对社会产生了重大影响。


    Web1 的起源可以追溯到 20 世纪 60 年代末。互联网当时被称为 **ARPANET**（高级研究计划局网络），并得到了美国国防部的支持。这项技术的核心是**分组交换**，它允许计算机相互通信。其想法是建立一个能够在核战争中生存下来的网络。


    然而，ARPANET 主要用于学术目的。例如，第一次在线连接发生在加州大学洛杉矶分校和斯坦福大学的研究实验室之间。尽管消息只是“Login（登录）”，系统还是崩溃了！^(⁷)


    在 20 世纪 70 和 80 年代，程序员开发了各种免费可用的协议。一些例子包括**传输控制协议**和**网际协议**，即 `TCP/IP`、**域名系统**（`DNS`）、`SMTP`（简单邮件传输协议）和**文件传输协议**（`FTP`）。所有这些对于驱动当今的在线世界仍然至关重要。


    但在 1990 年，互联网发生了重大变革。**蒂姆·伯纳斯-李**创建了万维网，它支持超文本链接。在他看来，他认为这是搜索和阅读学术论文的更好方式。


    但没过多久，互联网就成为了主流，可用于搜索和电子商务。1993 年，大学生**马克·安德森**帮助创建了 Mosaic 网络浏览器。从一开始，它就有了大量的下载量。


    一年后，科技企业家**吉姆·克拉克**联系安德森创建了一家公司，名为**网景**。主要产品是 Navigator 浏览器——其增长令人震惊。1995 年 8
    月 9 日，网景以每股 28 美元上市，收盘价为 58 美元。^(⁸) 市场估值为 22 亿美元，尽管过去六个月的收入仅为 1660 万美元。净亏损为 431
    万美元。


    这次 IPO 点燃了持续到 2000 年的**互联网泡沫**。这一时期的一些有趣特征包括：


    *   **很少人创建内容**。简而言之，开发网站很困难。你必须了解 HTML 和脚本代码。拨号上网连接使得使用视频和图像变得具有挑战性。

    *   **创建初创公司成本高昂**，并且需要风险投资家的帮助。你必须购买昂贵的服务器和数据库。也很难找到能够创建网络技术的人才，并且没有多少有用的开发工具。

    *   **一种流行的商业模式是广告**。这使得像 `Yahoo!` 这样的内容网站能够免费提供服务。广告通常基于浏览量或“眼球数”。

    *   **互联网仍然只为全球一小部分人口服务**。到 2001 年，只有大约 5000 万人可以访问宽带互联网。^(⁹)

    *   像 `Yahoo!`、`Lycos`、`Infoseek`、`AltaVista` 和 `Excite` 这样的**门户网站**对 Web1 的发展变得非常重要。它们让许多人在一个地方轻松获取有用的信息。


    根据 `a16z` 的普通合伙人**克里斯·迪克森**的说法：“Web1……是关于去中心化且由社区治理的开放协议。大部分价值流向了网络的边缘——即用户和建设者。”^(¹⁰)


    **要点**：这与 Web3 的愿景非常相似。有趣的是，一个普遍的观点是，Web3 实际上是回归互联网原始原则的一种方式。


    然而，这很可能是一种夸大。事实是，Web1 也出现了中心化。这并不一定是坏事。它实际上帮助了大量人群参与到生态系统中。


    部分原因归功于**美国在线**的力量，它是其时代的“脸书”。美国在线就像是互联网的一个替代版本——它拥有巨大的权力。由于其庞大的用户群，公司能够从广告和赞助中获得巨额收入。


    然后是美国在线广受欢迎的聊天系统。它连接了数百万用户，就像一个现代社交网络。


    Web1 世界还突显了我们已在 Web2 中看到的重要事物：**网络效应**。即系统中的用户体验和价值会随着越来越多的人加入而增加。


    **eBay** 就是典型的案例。诚然，还有其他各种在线拍卖网站。但 eBay 迅速成为明显的主导平台，因为卖家被大量的买家所吸引，反之亦然。事实上，时至今日，该公司仍然是这个领域的领导者。

    '
- fmt: '## Web2


    The dot-com implosion was brutal. Many companies like `Pets.com`, `Webvan`, `eToys`,
    `Go.com`, and `DrKoop.com` simply ran out of money.


    Venture capital dried up. Many people left Silicon Valley and went into other
    industries, like Wall Street. Everything seemed hopeless.


    But the tech industry would rejuvenate itself and Web2 or Web 2.0 would emerge.


    IT engineer, Dracy DiNucci, coined the term back in 1999 in an article entitled
    “Fragmented Future.”^([^(11)](#fn11)) Her vision was that the Internet would become
    much more immersive and be prevalent across platforms outside of a computer, such
    as the TV, car dashboard, cell phone, and game machines.


    But it was not until 2004 that Web 2.0 became part of the Silicon Valley buzz.
    For the most part, the concept was evolving from DiNucci’s concept to where the
    Internet would be user centric. Anyone could create their own content and share
    it.


    The leading companies in this era included `Google`, `YouTube`, `Facebook`, `Snap`,
    and `Twitter`. And yes, they remain very much relevant today. They are also exploring
    how to evolve in the Web3 world.


    In 2006, Time Magazine chose Web 2.0 as the Person of the Year. The story noted
    that the Internet had “became a tool for bringing together the small contributions
    of millions of people and making them matter.”^([^(12)](#fn12)) At the time, the
    red-hot property was `MySpace.com`. This social network allowed for users to create
    content and connect with friends.


    The belief was that Web 2.0 was the beginning of a new egalitarian Internet. It
    was common to think of it as decentralized, since the users had the power.


    But this would eventually fade. The mega operators like `Google`, `Facebook`,
    and `Twitter` would control much of the online world – including the valuable
    data on billions of people.


    These companies would amass enormous power. Just look at `Google`. In the fourth
    quarter of 2021, the company posted revenues of $75 billion, up 32% on a year-over-year
    basis, and the profit was $20.6 billion.^([^(13)](#fn13)) The company had ten
    online properties with over 1 billion users.


    The company also was more than search and online apps. It owned `Waymo`, one of
    the world’s largest autonomous driving operators. It also controlled device companies
    like `Fitbit` and `Nest`.


    So, was there too much power concentrated among too few companies? Many in the
    tech world believed that the answer was yes. And this was leading to major problems.
    After all, could a startup take on `Google` search? Or go after the `Apple iPhone`?
    Or dethrone `Facebook`’s massive social network?


    It would not be easy. The fight would also take huge amounts of resources.


    As a result, the tech industry wanted to create a new paradigm – one that was
    truly decentralized and in control of the users. It was the Web3 paradigm.


    “Web3 appeals to so many different kinds of people that have been slighted in
    one way or another by corrupted centralized parties,” said Josh Neuroth, who is
    the head of product at `Ankr`. “Platforms like `Facebook` used and manipulated
    user data in ways we never thought possible. Governments failed citizens with
    economic policy, sanctions, hyperinflation. Now, people see ways to regain some
    privacy, autonomy, and freedom in Web3.”^([^(14)](#fn14))


    Note


    Despite the criticism of Web2, there are definitely some key benefits. Keep in
    mind that centralization was necessary. The reason is that it would not have been
    possible to have enough scale to allow billions of people to become part of the
    online world. The advertising model was also key, as it meant much less friction
    for users to participate.


    ## Catalysts for Web3


    One of the biggest drivers for Web3 is definitely the threat of the megatech companies.
    But there are other factors at work. Here’s a look:


    - **Composability**: This is similar to an `API` (`Application Programming Interface`),
    which allows for Lego-like components to build programs and systems. In the Web3
    context, composability uses the blockchain to evolve the applications – to build
    on each other. It’s a way of “not reinventing the wheel.”

    - **Need for a new platform**: Today’s Internet is similar to the one that existed
    in the early 1990s. But over time, there have emerged many new innovations. So
    shouldn’t the foundation of the Internet better reflect this? Definitely. For
    Web3, this is essentially using blockchain as the core for a new architecture.
    But the platform will not just be limited to this. Web3 will also leverage other
    technologies like `Virtual Reality` (`VR`), `Augmented Reality` (`AR`), artificial
    intelligence (`AI`), `IoT` (`Internet of Things`) and `5G`.

    - **FOMO (Fear of Missing Out)**: Yes, there are many entrepreneurs and investors
    who do not want to miss out on the next big thing.

    - **New business models**: The monetization approaches for Web2 include advertising,
    subscriptions, and usage. But Web3 offers interesting new options. With the growth
    of cryptocurrencies and tokens, these may ultimately be the new way for monetizing
    the online world. Users will also essentially become the “shareholders” of the
    platform that they participate on. This could perhaps be the biggest motivator
    to get people to adopt Web3.

    - **Utopian Vision**: Some influencers believe that Web3 will have a seismic impact
    on society. For example, Vitalik Buterin, who is the cofounder of `Ethereum`,
    believes that the technology will improve housing, voting, the distribution of
    goods, city planning, and even lifespans.

    - **Venture Funding**: The interest has quickly reached fever levels. In 2021,
    venture funding in Web3 and crypto deals hit $27 billion.^([^(15)](#fn15)) This
    was more than the amounts raised during the prior ten years.

    - **The Metaverse**: This is essentially a part of Web3. This is an immersive
    Internet, which involves `VR` and `AR`. Facebook CEO Mark Zuckerberg has bet his
    company on the Metaverse. He even changed the name of the company to `Meta`. In
    2021, Zuckerberg spent $10 billion on his vision of the Metaverse – with a big
    focus on `VR` technologies.^([^(16)](#fn16)) Microsoft was also looking to the
    Metaverse. To this end, the company agreed to pay $70 billion for `Activision`.
    “The metaverse is no small matter, with investors projecting that it could bring
    in $30 trillion in revenue over the next decade,” said Marie Tatibouet, who is
    the CMO Of `Gate.io`. “The metaverse is part of the next evolution of the internet
    (`Web 3.0`) and has many avatars such as gaming, online communities, businesses,
    etc. It combines entertainment, traveling, business, and more with virtual reality
    and augmented reality, allowing users to live in a digital space. The metaverse
    marries both the physical and digital worlds.”^([^(17)](#fn17)) However, with
    mega tech taking the lead in the development of the Metaverse, this is likely
    to lead to centralization. This could mean little choice and control of data for
    users.


    In 2022, YouTube CEO Susan Wojcicki published a blog that set forth the video
    giant’s priorities for 2022. And yes, Web3 was a major theme:


    - We’re also looking further ahead to the future and have been following everything
    happening in Web3 as a source of inspiration to continue innovating on YouTube.
    The past year in the world of crypto, nonfungible tokens (`NFTs`), and even decentralized
    autonomous organizations (`DAOs`) have highlighted a previously unimaginable opportunity
    to grow the connection between creators and their fans. We’re always focused on
    expanding the YouTube ecosystem to help creators capitalize on emerging technologies,
    including things like `NFTs`, while continuing to strengthen and enhance the experiences
    creators and fans have on YouTube.


    Ironically, when this letter was published, several of YouTube’s executives departed
    for Web3 startups.'
