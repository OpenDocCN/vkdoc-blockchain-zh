- fmt: '# Donations


    Donating cryptocurrency and NFTs has become much more popular. This is definitely
    a unique way of helping a cause. For example, when Russia invaded Ukraine, there
    was a surge in cryptocurrency donations.


    Of course, there are tax and estate planning advantages. When you make the donation,
    there is no taxable event. What’s more, if you hold onto the digital asset for
    over one year and you itemize your deductions, you can deduct up to 30% of your
    AGI (Adjusted Gross Income). For amounts over this, you can carry them forward
    for up to five years.


    If you hold onto the cryptocurrency for one year or less and you itemize deductions,
    you can deduct the lesser of the cost basis or fair market value of the digital
    asset. The amount for the donation is up to 50% and there is a five-year period
    for carryforwards.


    For each of these, you need to file a `Form 8283`. If the amount of the donation
    or gift is over $5,000, you will need to obtain a third-party appraisal.


    While all of this can be beneficial for your taxes, there is a problem. The fact
    is that many charities and nonprofits do not accept cryptocurrency donations.


    True, you can sell your cryptocurrency and then make the donation. But of course,
    you may be subject to paying a tax on the gains.


    # The IRS


    The IRS is the world’s largest collection agency. It has significant powers, such
    as to seize your property, subpoena your records, or even incarcerate you.


    In light of all this, you really need to be mindful of the tax issues of cryptocurrencies.
    It’s easy to make mistakes – and yes, these can be costly. Consider that the fines
    can be hefty.


    You should also keep track of your records. So if there is an IRS audit, you will
    be prepared to make your case. This will go a long way in minimizing or avoiding
    any adverse impacts.


    However, if you do get a notice from the IRS, then the best policy is to seek
    the help of a tax professional.


    # Cybersecurity and Regulations


    The risk of cybersecurity breaches is perhaps the biggest drivers for regulation.
    Granted, the security for Bitcoin and other core blockchains are extremely strong.
    The problem is the security issues with systems and applications built on top
    of platforms. For the most part, breaches and hacks have become more prevalent.


    A notable case is the Axie Infinity virtual world, which involves large amounts
    of transactions for NFTs. In 2022, the company notified its users that there was
    a hack for over $600 million.^(237) It was actually the second largest in crypto
    history.


    The hackers were able to take control of the Ronin system, which powers Axie Infinity.
    Yet the company took six days to find out about this.^(238) But of course, it
    was too late.


    Axie Infinity scrambled to raise $150 million in capital from investors like Binance,
    Animoca Brands, a16z, Dialectic, Paradigm, and Accel.^(239) The company said it
    planned to use its own money to reimburse users as well.


    They also initiated a major upgrade of the platform and increased the number of
    validators for the DAO. There will be more frequent audits.


    Despite all this, the event was a shocker for the Web3 community. The investors
    in the $150 million round were trying to shore up some trust. But ultimately,
    if the hacks continue, it seems likely that there will be increased regulation
    of the industry.


    **Note**


    According to research from Chainalysis, criminals stole about $14 billion of crypto
    in 2021, up from $7.8 billion in the year before.^(240)


    # What Crypto Regulation Might Look Like?


    In early 2022, President Biden announced his executive order about cryptocurrency.
    It was called “Ensuring Responsible Development of Digital Assets.”^(241)


    The document did not provide any new regulations or requirements. Instead, it
    was about directing federal agencies to study the cryptocurrency market and provide
    recommendations.


    It was a sensible approach. The market is very complicated and evolving. Besides,
    it looks like the Administration does not want to impose undue burdens. The United
    States has been a leader in global finance for decades. And cryptocurrencies are
    likely to be important to continuing this leadership.


    However, the Administration recognizes the needs for guardrails. The industry
    also seems to be generally in support of this. If there are not sufficient consumer
    protections, the growth of the crypto market could easily stall.


    If anything, the situation is similar to the 1920s. At this time, there was significant
    speculation in the stock market. But this led to excessive risks, such as with
    borrowing against stock.


    When the market crashed in 1929, this helped to ignite the Great Depression. The
    result was that the stock market saw muted activity for years. To help encourage
    more confidence, the Roosevelt Administration passed several pieces of legislation
    that introduced the federal securities laws. The Securities and Exchange Commission
    (SEC) was set up to enforce them. The main goal was to require that companies
    provide enough disclosures for investors to make prudent decisions. This was through
    documents like prospectuses.


    In the case with crypto, it seems unlikely that there will be a new agency created.
    The SEC may ultimately be the main one to enforce any new laws. Or it could be
    a coordination with other agencies.


    But it seems likely there will be some requirement for more detailed disclosures.
    This would also be backed up with third-party audits.


    There will also likely be industry-specific regulations, especially in areas like
    healthcare and financial services. There are certainly major issues with privacy.
    For example, with a healthcare company, it could be difficult to use the Ethereum
    blockchain. If it is shared with multiple companies, this could actually be a
    violation of the antitrust laws.


    Something else: Since crypto is a global industry, there is a need to understand
    the regulations in other countries. They may ultimately be more restrictive outside
    the United States. As a result, it can be difficult to roll out an application.


    **Note**


    In Biden’s executive order on crypto, there is a provision that explores the development
    of a digital currency for the United States. This could have important benefits,
    such as lower costs and quick settlements. But developing this would likely be
    challenging. Treasury Secretary Janet Yellen said it could take years to create
    one.^(242)


    When it comes to crypto regulation, a guide to what might happen is to look at
    the New York State Department of Financial Services. The organization regulates
    many of the world’s largest financial institutions.


    An important initiative is to encourage companies to use analytics software for
    compliance, such as with anti-money-laundering laws.^(243) In traditional finance,
    these tools have been incredibly helpful. The same should be the case with crypto.
    If anything, it may help to lower the costs of compliance because part of the
    process will be automated.


    Some VCs are even creating their own position papers for shaping regulation. An
    example is Andreessen Horowitz. The firm released a document entitled, “How to
    Build a Better Internet: 10 Principles for World Leaders Shaping the Future of
    Web3.”^(244)


    They include the following:


    * Establish a clear vision to foster a decentralized digital infrastructure.

    * Embrace multi-stakeholder approaches to governance and regulation.'
