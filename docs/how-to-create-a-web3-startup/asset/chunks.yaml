- fmt: '# Backend Developer


    The backend developer focuses on the server-side of an application. This often
    means using or writing `API`s. These will often integrate with the front-end of
    the application. Because of this, there is usually much coordination between front-end
    and backend developers.


    The backend developer will certainly need a solid background with programming.
    Often this will mean having a computer science degree. Although, a candidate may
    show that they have taken various online courses and have received certifications
    for them. In terms of the languages to understand, the common ones include `C`,
    `Java`, `Python`, `Golang`, `C++`, `Rust`, and `.Net`.


    Backend developers will usually need a good understanding of how to work on hosted
    cloud services, such as from Amazon, Microsoft, or Google. Then there will be
    a need to know about databases. This could be a traditional relational database,
    such as from Oracle, or a `NoSQL` version. In fact, a backend developer can be
    helpful in providing feedback on what types of databases make more sense for the
    startup’s use cases.


    A good backend developer will provide clear documentation. This is absolutely
    critical. Let’s face it, there will usually be a group of backend developers.
    So, they all need to be in sync. But there will be ongoing hirings and you want
    to make sure that these developers can get up to speed as fast as possible.


    Let’s take a look at some of the other duties and activities for backend developers:


    - Work with version control and `DevOps` to help streamline the process. This
    means knowing developer tools like `Jenkins`, `GitLab`, or `GitHub`.

    - Develop best practices for the backend application process. Often this is about
    focusing on goals like reliability, low latency, and high throughput. There should
    also be ongoing efforts to find improvements with these metrics.

    - Put together unit tests for the software. They can be a combination of manual
    and automated testing.

    - Develop custom tools to help build a more robust infrastructure.


    # Blockchain or Smart Contract Engineer


    Early in the startup, you will likely need engineers who understand blockchain
    and smart contracts. Often this means there must be experience with Ethereum and
    the Solidity language.


    The engineer will create the protocols for the smart contracts and help provide
    for a solid architecture. There will also need to be a focus on providing security
    as well as optimization of the performance. As noted in Chapter 3, platforms like
    Ethereum have problems with scale. An engineer can help deal with this, such as
    by evaluating and selecting third-party systems.


    Here are some of the other duties for this person:


    - There will need to be strong hands-on experience with writing, deploying, and
    testing smart contracts.

    - Come up with best practices for the protocols for the upgrades and versioning
    for the networks. This is essential since there is so much dynamic change in the
    Web3 world.

    - The engineer will help with the UI and explain what is required to make for
    a good smart contract.

    - Develop audit protocols. This is essentially about making sure the smart contracts
    are stable.

    - Collaborate with various departments, like R&D, data science, product management,
    recruiting, and the executive suite.

    - Keep track of analytics to detect problems and find opportunities for improvement.


    # Security Engineer


    In building the Web3 application or platform, you need to have a well-thought-out
    security infrastructure. Trust is vitally important. If there is a breach, then
    the startup could easily fizzle out.


    Consider a job ad from Web3 startup Dapper Labs. The title was a “Senior API Engineer
    – Security Hardening, Bots, Scalability” and here was some of the description:
    “We are open to awesome engineers across a variety of specialties but in particular
    would love to talk to engineers with consumer API hardening and protection experience.
    The Top Shot and Dapper APIs are constantly being bombarded by increasingly sophisticated
    bots and fraudsters. The ideal candidates for this role have worked on high-value
    targets before – e-commerce gateways, web poker, crypto – and know what to expect.”


    Here are some of the activities for a security engineer:


    - Perform static analysis (SAST). This is automated analysis of source code without
    executing the application.

    - Perform dynamic application security testing (DAST). This is about looking for
    security vulnerabilities by simulating attacks while an application is running.

    - Develop best practices for security.

    - Look for vulnerabilities with third-party dependencies.

    - Conduct research on the latest security developments.

    - Harden applications by using industry standards like CIS benchmarks.

    - Use automation tools and configuration management systems.


    In terms of the experience of a Web3 security engineer, the candidate should have
    a background with applied cryptography and blockchain. But there should also be
    a good understanding of security for web authentication and protecting data. Finally,
    there should be knowledge about distributed systems and microservices.'
