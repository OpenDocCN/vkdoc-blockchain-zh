    # 6. NFTs, Gaming, and Social Networks


    ## The Consumer Startup


    `Mike Winkelmann` is a graphic designer and artist.^([^(126)](#fn126)) He is better
    known as `Beeple`. He has been an innovator, using technologies like Virtual Reality
    (`VR`) and Augmented Reality (`AR`) for his artwork. `Beeple` has also been a
    go-to person for many celebrities. Just some examples include `Nicki Minaj`, `Eminem`,
    `Justin Bieber`, `One Direction`, and `Katy Perry`.


    In 2020, `Beeple` started to explore non-fungible tokens (`NFTs`). This a technology,
    which is based on blockchain, that allows people to own digital items.


    He started to create digital art with `NFTs`, and they were fetching thousands
    of dollars. But all this would pale in comparison to his digital collage of political
    cartoons and video game images, called “`Everydays: The First 5,000 Days`.”


    He put this up for auction at `Christie’s` and the bidding was intense (there
    were 353 bids). The winner would pay a hefty $69.3 million for the `NFT`. It was
    the third most paid for any living artist, behind `Jeff Koons` and `David Hockney`.^([^(127)](#fn127))


    No doubt, the auction caused a stir – and it was a catalyst for enormous growth
    in the `NFT` market. It was also one of the first `Web3` consumer applications
    that became mainstream.


    But of course, there are others as well. `Web3` gaming and social networks have
    seen lots of traction as well.


    In this chapter, we’ll see how these markets are developing and the opportunities
    for entrepreneurs.


    ## How Do NFTs Work?


    Until the creation of `NFTs`, it was not possible to own digital items. After
    all, a person could just copy and paste it, right? Definitely. It’s why content
    industries, such as for music have struggled in the digital world.


    But `NFTs` would be a game changer. By using the blockchain, it was possible to
    provide a unique token for the digital item.


    The first `NFT` came out in 2017. A studio, called `Larva Labs`, developed digital
    characters called `CryptoPunks`.^([^(128)](#fn128)) The company essentially made
    it possible to trade them, such as you would with a traditional collectible.


    `NFTs` are generally built on the `Ethereum` blockchain and use the `ERC-721`
    protocol. This allows for storing various details. All this is transparent to
    the public. And an `NFT` can be virtually for anything.


    As should be no surprise, there can be some confusion with `NFTs`. Keep in mind
    that it does not convey any copyrights. They still belong to whoever owns the
    physical item. For example, there may be an `NFT` for the `Mona Lisa`. But this
    does not mean you own the original painting.


    > **Note**

    > `Quentin Tarantino`, the scriptwriter of the iconic film “`Pulp Fiction`,” attempted
    to create `NFTs` for seven exclusive scenes.^([^(129)](#fn129)) But the studio
    that produced the film, `Miramax`, filed a lawsuit to prevent this. It’s far from
    clear what the outcome will be. But the case could prove critical in setting forth
    the rights for `NFTs`.


    Next, an `NFT` is not a cryptocurrency. The main reason is that a cryptocurrency
    is fungible. For example, a `Bitcoin` is no different from another one. You can
    easily exchange them. A non-fungible token, however, is nontransferable. None
    are alike. Although, you can use a cryptocurrency to acquire an `NFT`.


    `NFTs` and cryptocurrencies rely on the same underlying blockchain technology.
    `NFT` marketplaces may also require people to purchase `NFTs` with a cryptocurrency.
    However, cryptocurrencies and `NFTs` are created and used for different purposes.


    Note that the `NFT` market has posted a staggering growth. In 2021, the spending
    came to $17.6 billion, up by about 21,000%.^([^(130)](#fn130))


    Here are some other interesting facts:


    *   `NFT` investors made roughly $5.4 billion in profits.


    *   There are 2.2 million wallets for `NFT` transactions.


    *   More than 470 wallets have over $1 million in `NFTs`.


    By far, the most popular category was for collectibles. But there was also strong
    growth with gaming and the `Metaverse`.


    However, by 2022, the `NFT` market would look much different. The growth rates
    plummeted as the crypto market came under tremendous pressure. Yet the levels
    of activity were still much higher than a few years earlier.


    > **Note**

    > While many `NFTs` are stored on the `Ethereum` network, there are certainly
    alternatives. Some of the more notable ones include `Flow` and `Tezos`.'
  raw: '## Uniswap


    In the summer of 2017, Siemens laid off Hayden Adams, who was a mechanical engineer.^([^(123)](#fn123))
    But this turned out to be a very good thing. Adams delved into blockchain and
    Ethereum. He then received a $65,000 grant from the Ethereum Foundation.^([^(124)](#fn124))


    Adams created the Uniswap protocol and DAO. At first, he used the Solidity language.
    But he realized that Vyper would be a better option to create sophisticated smart
    contracts.


    Uniswap would become the basis for the largest decentralized and automated market
    system to trade on the Ethereum platform. The governance token is UNI, which was
    launched in late 2020\. In a sense, Uniswap became a new kind of financial market
    – in which the users decided on its fate.


    The voting structure for technical proposals is as follows:


    *   Temperature Check: There needs to be a minimum level of interest in the new
    feature. This requires at least 25,000 UNI votes.


    *   Consensus Check: This is where the proposer makes a formal specification for
    the new function. For this, there must be a minimum of 50,000 UNI yes votes.


    *   Final Phase: The proposer will provide audited codes. For this, there needs
    to be 40 million UNI yes votes.


    As of early 2022, Uniswap had over $924 billion in trading volume and more than
    94 million trades.^([^(125)](#fn125))


    ## Conclusion


    A DAO is the main way to provide decentralized governance for a Web3 organization.
    This allows for proposing and voting on various matters. To participate in this,
    a user will buy tokens.


    DAOs are a relatively new concept, and the legal implications are far from clear.
    But there are emerging core best practices. Some states and countries are also
    providing legal structures for DAOs.


    Despite this, it’s common for there to be a hybrid legal approach. This means
    having a traditional corporate wrapper for the DAO.


    But there are also downsides to DAOs. Let’s face it, it’s tough to anticipate
    potential issues by using smart contracts. The set up can be complex and expensive.
    Then there are the potential issues with the creators of the DAO, who may have
    conflicts of interest.


    Regardless, DAOs have become quite popular. And over time, there will certainly
    be progress in dealing with the issues.


    As for the next chapter, we’ll take a look at startups for NFTs and gaming.


