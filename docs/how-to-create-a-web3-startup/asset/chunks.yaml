    # 8. The Metaverse


    Startups in the Virtual World


    Facebook’s Mark Zuckerberg has a knack for making great strategic decisions. Just
    some include the acquisition of Instagram and the pivot to mobile.


    But his next move will certainly be the biggest. It’s about the metaverse. This
    is essentially a virtual world, which involves life-like immersive experiences.


    In October 2021, Zuckerberg announced his bold plans. He renamed the company to
    Meta. This was largely due to Zuckerberg’s interest in Greek literature and history,
    which he studied at Harvard. The word “meta” means “beyond” in Greek.


    Zuckerberg said the plan was to spend over $10 billion on the metaverse – and
    this could grow over the coming years.^([^(197)](#fn197)) Keep in mind that he
    has already made other important investments in the category, such as with the
    acquisition of Oculus, which is a top developer of VR (Virtual Reality) gear and
    software.


    But the realization of the metaverse will not be immediate. There is still much
    to be done. According to Zuckerberg: “Building the foundational platforms for
    the metaverse will be a long road. Later in this decade is when we would sort
    of expect this to be more of a real business story.”^([^(198)](#fn198))


    This will certainly mean lots of opportunities for entrepreneurs. Note that Facebook
    has been aggressive with acquisitions in the space.


    The metaverse will also be a key part of Web3\. It will rely on the capabilities
    of crypto to allow for transactions as well as a decentralized model.


    In this chapter, we’ll take a deeper look at the metaverse and get a sense of
    the different places where entrepreneurs can participate.


    Note


    Zuckerberg’s aggressive move to the metaverse has many skeptics. Some believe
    that this is mostly about PR, so as to avoid the negative aspects of social media.
    Others say that Zuckerberg is being defensive and is trying to find ways to attract
    a younger demographic. Regardless, he has huge amounts of resources to make a
    big impact on the market and to shape the industry. Already the metaverse has
    become one of the most talked about concepts in the tech world.'
