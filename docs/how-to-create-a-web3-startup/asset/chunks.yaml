- fmt: '# What Is the Metaverse?


    Neal Stephenson, a top science fiction writer, coined the word “metaverse” in
    1992. It was in the novel, `Snow Crash`.


    Since then, the metaverse has become a popular theme for science fiction writers.
    Just look at the widely successful `Ready Player One`, by Ernest Cline. Steven
    Spielberg adapted this into a hit movie in 2018.


    But as of now, the metaverse is becoming more than science fiction. There are
    already a variety of virtual environments that have gained traction.


    A key to the metaverse is the avatar. This is your representation in the environment.
    You can make yourself look cool, hot, weird, dorky. You can also have different
    avatars – depending on the context.


    Although, there are some drawbacks. Avatars currently only show a person from
    the waist up! Why is this so? The reason is that most people interact with the
    metaverse by wearing VR headsets. But there are no sensors for the legs.


    Despite this, the metaverse provides lots of potential:


    - Go on a virtual vacation to Paris, the moon, Mars, or even a planet in another
    galaxy.

    - Shop at a store. It could be Harrod’s in London.

    - Learn about physics. Perhaps the professor could be Albert Einstein or Max Plank.

    - Check out a baseball game. You can also be one of the batters.

    - Meet singles. You could use crypto to buy a gift for someone you are wooing.


    The money-making potential is also significant. Consider the analysis from Jefferies
    analyst Andrew Uerkwitz. He believes the metaverse could easily generate revenues
    over $80 billion.^([^(199)](#fn199)) The reason is that this is the amount already
    spent on virtual goods in video games.


    The metaverse represents a generational leap in technology. It could be similar
    to the impact of the graphical user interface in the 1980s with the Macintosh;
    the Web in the 1990s; or the smartphone in the 2010s.


    But the metaverse could be even more impactful. It will be a transition from the
    two-dimensional world of the computer screen to the 3D world. It will actually
    seem like you are in another world. For example, you will be able to feel it,
    such as through haptic systems.


    In the metaverse, the interactions with other people will be more normal, more
    human. Here’s how Zuckerberg describes it: “The defining quality of the metaverse
    will be a feeling of presence — like you are right there with another person or
    in another place. Feeling truly present with another person is the ultimate dream
    of social technology. That is why we are focused on building this.”^([^(200)](#fn200))


    This is in stark contrast with traditional online and social media platforms.
    It’s more like interacting in a flat world, where communication is based on texts,
    emails, likes, posts, and videos.


    Note


    Dating app `Tinder` is investing heavily in building its own metaverse. To this
    end, it has made several acquisitions, such as to add real-time video. The company
    has also introduced its own crypto token: `Tinder Coin`.^([^(201)](#fn201)) Members
    will be able to use these for features like `Boost` and `Super Like` as well as
    to encourage profile verifications and creating video intros.


    Interestingly enough, one of the biggest growth areas for the metaverse is virtual
    land speculation. Some of the purchases are in the millions.^([^(202)](#fn202))
    There are even investment firms that are focused on this opportunity, like `Tokens.com`.


    ## Large Tech Firms and the Metaverse


    Meta is not the only megatech company that is investing enormous amounts in the
    metaverse. All the major operators are focused on this, including Google, Microsoft,
    and Apple.


    Let’s take a look at Microsoft. The company certainly has many advantages with
    the metaverse. It has huge cash resources, a large base of talented employees,
    a strong global infrastructure, and a massive number of customers. Then there
    is its Xbox franchise. This will definitely be a solid foundation for creating
    a metaverse.


    But Microsoft has ambitious plans to build on this. In early 2022, the company
    announced the $70 billion acquisition of Activision Blizzard. It has nearly 400
    million MAUs (Monthly Active Users) and franchises like `Call of Duty`, `Diablo`,
    `Word of Warcraft`, and `Candy Crush`.^([^(203)](#fn203))


    For the announcement of the deal, Microsoft CEO Satya Nadella said, “In gaming,
    we see the metaverse as a collection of communities and individual identities
    anchored in strong content franchises accessible on every device.” He also said
    that the deal for Activision would be critical for creating Microsoft’s own metaverse.^([^(204)](#fn204))


    But Nadella believes that there will not just be a few large ones. He, instead,
    believes that the world will have many of them. This is why a big priority for
    Microsoft is to be the go-to tools provider for the metaverse.


    This technology will not be easy to create. It will need to use highly sophisticated
    hardware systems and graphics. There will also need to be a way to allow users
    to create their own environments.


    Although, online games are a good place to start – and this sector is likely to
    dominate the emerging industry of the metaverse. Let’s face it, many of the users
    spend hours playing games. They would also like to help with the world building
    and have the potential to benefit from the financial incentives.


    Note


    Among the megatech operators, Apple has been mostly silent about its plans for
    the metaverse. But it seems like a good bet the company is focused on this opportunity.
    Keep in mind that it has invested heavily in AR (Augmented Reality).


    Another benefit for the involvement of larger tech companies is the standardization.
    If not, there could be too much fragmentation in the metaverse. “A true metaverse
    will require seamless interoperability among users and platforms, based on still-to-be-determined
    standards,” said George Korizis, who is the Customer Transformation Leader at
    PwC US.^([^(205)](#fn205))


    However, this is not to imply that the large tech companies will dominate the
    category. The market is likely to be massive. So, there should be lots of opportunities
    for smaller companies and startups.


    Consider `Snap`. The company was an early adopter of AR. At first, the move was
    considered somewhat trivial. `Snap` allowed users to easily create avatars.


    But it has turned out to be very popular. `Snap` says that users are using the
    AR technology more than six billion times a day.^([^(206)](#fn206)) This technology
    will prove useful with the metaverse.


    Or look at `Unity`. Founded in 2004, the company is a leader in gaming development
    tools. The founders are David Helgason, Nicholas Francis, and Joachim Ante, who
    launched the company in the Netherlands. They initially created a game, but it
    failed. However, by doing this, the founders made some useful tools. So, they
    decided to focus on this opportunity.


    And it was a great move. In 2021, revenues shot up by 44% to $1.1 billion.^([^(207)](#fn207))
    Currently, the platform handles five billion downloads per month and has 3.9 billion
    users.^([^(208)](#fn208)) About 72% of the top mobile games use `Unity`.


    At the heart of the company’s technology is `RT3D` or real-time 3D technology.
    This allows for the creation of fully interactive 3D environments. The rendering
    is done in microseconds, which provides for a seamless experience.


    “The metaverse only exists because of technologies like `RT3D`,” said Peter Moore,
    who is the SVP and GM of Sports and Live Entertainment at `Unity`. “The ability
    to create, build, influence, or manipulate something that can transfer between
    physical and digital and back again can only be done by using this approach.”^([^(209)](#fn209))'
