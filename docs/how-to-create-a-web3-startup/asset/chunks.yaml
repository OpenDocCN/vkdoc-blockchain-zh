    # 3. The Web3 Tech Stack


    **The Platforms for a Startup**


    In the summer of 2017, Nikil Viswanathan and Joe Lau cofounded Alchemy. The business
    was actually in their San Francisco apartment.


    Both Viswanathan and Lau were graduates in computer science from Stanford University.
    They had worked at companies like Google, Microsoft, Facebook, and Pinterest.^([^(56)](#fn56))
    They also founded several companies.


    But there was one that would be a rocket ship – Alchemy. From the start, the startup
    was focused on creating a development platform for the blockchain.


    The growth accelerated at a fever clip in 2021. In April, the company raised $80
    million in a Series B round at a valuation of $505 million.^([^(57)](#fn57)) Then
    by October, Alchemy did another fund raise. This time it was for $250 million
    at a $3.5 billion valuation.


    But the company was not done. In February 2022, Alchemy raised $200 million at
    a $10.2 billion valuation.


    Then again, the company was profitable and generating over $1 billion in value
    per month from its blockchain platform. Some of its marque customers included
    OpenSea, Dapper Labs, and Adobe. Alchemy’s business model was to charge based
    on the usage of its compute resources.


    The company was also very lean and did not use much of its capital. For example,
    there were fewer than 30 employees. No doubt, the company was selective with its
    recruiting – and this proved critical in creating a standout platform.


    The case of Alchemy highlights the huge growth potential for Web3. But it also
    shows the importance of development tools. Because of the complexities of blockchain,
    there needs to be different approaches.


    In this chapter, we’ll take a look at what founders need to know about what’s
    available and how to evaluate the tools.'
