    be crypto native. This means that they must have a deep understanding of the technology,
    such as by reading the key whitepapers. If the interest about Web3 is mostly about
    being part of the next-big thing, then he thinks this will not work. “You need
    to believe in the core principles of Web3, like decentralization,” said Alex.
    “This must be a part of your DNA.”


    In 2021, `Rarible` announced its Series A round. The company raised $14.2 million
