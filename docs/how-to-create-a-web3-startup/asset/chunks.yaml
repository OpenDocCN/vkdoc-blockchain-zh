  trans: '

    # Web3 社交网络


    截至 2021 年底，Facebook 的用户基数已达 28.2 亿，同比增长 8%。^(¹⁴¹) 当时，全球人口接近 80 亿。


    Facebook 在变现方面确实做得非常出色。2021 年营收高达 1179 亿美元，利润达 393 亿美元。


    但对于那些为 Facebook 贡献内容的用户，平台支付了多少报酬呢？基本微乎其微。原因在于公司的大部分收入都来自广告。


    这本身并无不妥。许多人喜欢使用 Facebook。这并非为了赚钱。


    然而，对于 Web3 创业者来说，他们正试图颠覆 Facebook 的模式。区块链意味着用户将对自己的数据拥有更多控制权，并获得赚取代币的机会。


    Web3 社交网络很可能与传统平台截然不同。首先，其界面可能使用开源工具，例如用于聊天功能。或者它也可能基于像 `Discord` 这样的专有系统。


    其次，Web3 社交网络的规模很可能远小于 `Twitter`、`Snap` 或 `Facebook`。原因是它将专注于某个特定社区。部分原因在于它很可能涉及一个
    `DAO`。为此，会有一个特定的目标。否则，可能难以吸引合适的人选来让这个社交网络富有活力。


    现在，Web3 社交网络的一个关键优势是可移植性。如果你想离开，不会放弃你的社交图谱和内容。它们属于你，因为它们在区块链上，你通过哈希所有权来维护数据。然后你可以将其转移到另一个平台。


    相比之下，传统社交网络是一个封闭的花园。当你离开时，无法转移你的用户或内容。除非你删除账户或将其关闭，否则它仍然属于该社交网络。


    这长期以来一直是社交网络的巨大权力来源。正因如此，即使出现侵犯隐私或其他重大问题，往往对用户数量影响甚微。用户基本上被牢牢锁定。


    因此，社交网络拥有巨大的权力，例如可以改变政策。如果 `Twitter` 不再希望其平台上存在某些内容，它可以直接禁止。或者，如果它想收取费用，也可以这样做。


    大型在线市场也是如此。看看 `iOS` 就知道了。如果你想在平台上发布应用，需要经过审查流程。如果失败，对创业者来说可能是一个重大挫折。


    接着是费用问题。`Apple` 通常对应用产生的收入抽成 30%。总而言之，这会让创业者很难赚钱。即使是最大的科技公司也是如此。请注意，游戏开发商 `Epic`
    正在就其 `Appstore` 政策起诉 `Apple`。


    Web3 社交网络仍处于起步阶段。目前还没有哪个网络取得突破性发展。但这肯定会改变——而且可能很快。


    以下是该领域一些有趣的初创公司：


    *   `APPICS`：创始人 **Uma Hagenguth**，常驻瑞士。她 16 岁时创办了第一家公司，专注于营销和网页设计。^(¹⁴²) 至于加密货币，她在
    2013 年开始涉足。她对 `APPICS` 的构想是创建一个界面时尚、基于奖励的社交网络。用户可以通过创作获得特定点赞数和评论数的内容来赚取代币。^(¹⁴³)
    因此，激励基于参与度。`APPICS` 构建在 `Telos` 区块链上。该应用可在 `iOS` 和 `Google Play` 上下载。


    *   `Aave`：这是另一家位于瑞士的初创公司。创始人 **Stani Kulechov** 于 2017 年推出该公司。^(¹⁴⁴) 他是在赫尔辛基攻读法律学位期间创办的。该公司是
    `DeFi` 加密货币（基于 `Ethereum` 网络）的早期开发者之一。但 `Aave` 也在进军社交媒体领域。该项目名为 `Lens Protocol`，基于
    `Polygon` 区块链构建。^(¹⁴⁵) 它允许创建一个作为 `NFT` 的用户资料，其中包含所有社交媒体内容。用户可决定如何将其变现。有趣的是，`Aave`
    正在探索将个人资料转变为 `DAO` 的想法。


    *   `Yup`：这是一个 Web3 平台，允许用户策管来自 `OpenSea`、`Twitter`、`YouTube` 和 `Mirror` 等平台的内容。`Yup`
    根据用户的参与度向其支付报酬。2022 年初，该公司从 `Distributed Global` 筹集了 350 万美元。^(¹⁴⁶)

    '
- fmt: '# Web3 Gaming


    Web3 中的一个早期成功案例是游戏领域。该类别通常被称为 `GameFi` 或加密游戏。


    根据 `DappRadar` x `BGA Games` 的一份报告，2022 年第一季度的市场增长高达 2000%^([^(147)](#fn147))。约
    52% 的区块链活动归因于游戏，约有 122 万个钱包参与其中。


    风险投资正在加速。2022 年第一季度，投资额约为 25 亿美元^([^(148)](#fn148))，预计全年可能达到 100 亿美元。


    其中一笔引人注目的交易涉及总部位于澳大利亚墨尔本的初创公司 `Animoca Brands`。该公司以超过 50 亿美元的投前估值筹集了 3.59 亿美元^([^(149)](#fn149))，领投方是
    `Liberty City Ventures`。


    `Animoca Brands` 开发了多种中心化和去中心化游戏，这些游戏也适用于手机、游戏机、PC 和网页端。该公司是利用区块链实现游戏内奖励和货币化的先驱。


    Web3 游戏的发展势头并不令人意外。许多游戏玩家已经熟悉区块链和加密货币。此外，游戏行业一直是允许购买虚拟物品的早期采用者。


    在未来几年，游戏很可能是大量人群初步接触 Web3 的方式。随着用户引导变得越来越容易，这一进程将会加速。


    然而，传统游戏行业在微交易方面一直面临挑战。简而言之，利用传统的金融服务基础设施来使微交易变得经济实惠一直很困难。


    但区块链和加密货币应该会改变这一点。它将带来更高效的方法。游戏玩家也能从中受益，自己控制代币。这意味着他们可以在其他地方使用这些代币。这使得游戏玩家参与其中的吸引力更大。


    > **注意**

    >

    > 新兴的游戏市场如 `Tegro` 正在涌现。它们专注于为游戏玩家提供买卖虚拟物品的途径。


    相比之下，在传统游戏中，存在丢失虚拟资产的风险。原因是存在一个本质上拥有一切的中枢机构。当游戏关闭时，游戏玩家很可能会失去他们的资产。这种情况在诸如《我的世界：地球》和《哈利波特：巫师联盟》等游戏中就曾发生过。


    Web3 游戏的另一个有趣方面是社区参与。通过建立 `DAO`，用户可以决定游戏的规则和演变。这可以进一步增加参与度和趣味性。然而，对于游戏开发者来说，重要的是不要过于激进。如果决策过多，可能会拖累游戏。需要取得平衡。


    Web3 社区的一个有趣方面是排他性的概念。例如，你可以展示你是某款游戏的原始玩家之一。在社区中，这无疑可以赋予一定的地位。


    Web3 游戏也有机会创造持久的品牌。它们还可以在用户的帮助下不断发展。所有这些最终可能意味着 Web3 游戏将催生下一代娱乐公司，它们最终可以与漫威等传统工作室相媲美。


    对于 Web3 游戏初创公司来说，其初始产品甚至可能不是从游戏开始的。它可以是一个博客、一个 `NFT` 集合或一个内容网站。这会有一个有趣的故事线，引起用户的兴趣。在此基础上，初创公司可以围绕它打造一个游戏。在此过程中，社区将始终是世界构建过程的一部分。


    但是，在 Web3 游戏中，某些因素不会改变。毕竟，一款游戏需要出类拔萃。现实情况是，市场会迅速饱和，从喧嚣中脱颖而出的难度会更大。这意味着需要在游戏上投入更多资源——同时也需要大量的创造力，而这是不容易实现的。


    另一个问题是游戏行业容易受到潮流影响。一款火爆的游戏可能很快就会变得无人问津。能持续数年的游戏非常罕见。但有了加密机制，这一点就变得必要了。这正是建立真正价值的方式。


    即使是成功的游戏公司也可能停滞不前。`Zynga` 就是一个例子。2012 年，该公司进行了高调的首次公开募股 (`IPO`)，股价为 10 美元。但业务面临压力。随后
    `Zynga` 斥资数十亿美元进行收购，但这并未带来实质性的改变。2022 年初，`Zynga` 被 `Take-Two Interactive` 收购^([^(150)](#fn150))。投资者得到了什么？股价是
    9.86 美元。


    对于 Web3，理解经济学至关重要。创业者甚至可能想聘请一位经济学家！为什么？原因是 Web3 游戏将是一个真正的经济系统，存在代币的供需关系。然而，如果结构不当，游戏很容易分崩离析。在某些情况下，它可能更像是一个庞氏骗局或多层次营销策略。在这种情况下，早期用户的收益开始减少，因为没有新成员被引入生态系统。当这种情况发生时，用户可能想要离开，因为他们的代币价值已经大幅贬值。


    更重要的是，Web3 游戏的经济学可能意味着玩一款游戏需要花费数千美元。当然，这对许多用户来说可能是不可能的。为解决这个问题，出现了汇集资源以允许玩游戏的公会。另一种选择是提供试用期。


    Web3 一种流行的商业模式是“边玩边赚”。这种方法的创新者是总部位于越南的 `Sky Mavis`。该公司是《Axie Infinity》游戏的开发者。


    其工作原理如下：玩家繁殖被称为 `Axies` 的角色。然后他们可以参与战斗和冒险。但其中也存在一个经济体。例如，玩家可以获取土地、制作药水等等。为了处理这些交易，游戏允许交易代表虚拟物品所有权的
    `NFT` 和以太币。`Axie Infinity` 的原生代币是 `AXS`。


    市场上的交易额已达到 36 亿美元，为单个 `Axie` 支付的最高价格是 82 万美元^([^(151)](#fn151))。每日活跃玩家有 280 万。


    > **注意**

    >

    > 一些最受欢迎的“边玩边赚”游戏包括 `Splinterlands`、`Alien Worlds` 和 `Decentraland`。


    `Andreessen Horowitz` 是 `Sky Mavis` 的投资者。在一篇博客文章中，作者指出：“`Axie Infinity` 解锁的能力是，你可以玩你喜欢的游戏，享受乐趣，同时还能参与社区的财务收益。这是一个非常强大的想法：这意味着游戏不再是纯粹的娱乐，而是跨界进入了工作领域。`Axie
    Infinity` 正在改变世界各地的社区，并取代传统的就业形式，因为游戏玩家互相帮助成功，从而改变了人们的生活。”^([^(152)](#fn152))


    Web3 游戏的另一种商业模式是“边玩边拥有”。这与“边玩边赚”类似，因为两种方法都涉及使用加密货币和代币提供激励。


    那么，区别是什么？这更多是关于程度。对于“边玩边赚”，通常有更高的经济回报。有些人实际上可以靠游戏谋生。


    另一方面，“边玩边拥有”游戏更注重乐趣和参与感。赚钱只是一个不错的额外奖励。


    一款流行的“边玩边拥有”游戏是 `Crypto Raiders`。这是一个地牢探险游戏，玩家可以使用加密货币购买角色、怪物、任务等。该平台构建在 `Polygon`
    区块链之上。


    2022 年 3 月，`Crypto Raiders` 筹集了 600 万美元。领投方包括 `DeFiance Capital` 和 `Delphi Digital`。'
  raw: '## Web3 Gaming


    An early success story in Web3 is gaming. The category is often called GameFi
    or crypto gaming.


    According to a report from DappRadar x BGA Games, the growth in the market was
    a sizzling 2,000% for the first quarter of 2022.^([^(147)](#fn147)) About 52%
    of all blockchain activity was due to gaming. There were about 1.22 million wallets.


    Venture funding has accelerated. In the first quarter of 2022, the investments
    came to about $2.5 billion^([^(148)](#fn148)) and the estimate is that it could
    be $10 billion for the year.


    A notable deal was for Animoca Brands, which is a startup based in Melbourne,
    Australia. The company raised $359 million at a pre-money valuation of over $5
    billion.^([^(149)](#fn149)) The lead investor was Liberty City Ventures.


    Animoca Brands has developed various centralized and decentralized games. They
    are also for mobile, game consoles, PCs, and web. The company has been a pioneer
    of using blockchain for in-game rewards and monetization.


    The traction in Web3 gaming should not be surprising. Many gamers are already
    familiar with blockchain and crypto. Besides, the gaming industry has been an
    early adopter of allowing the purchase of virtual items.


    In the years ahead, gaming will likely be how a large number of people will initially
    participate in Web3\. This will accelerate as it gets easier to onboard users.


    Yet the traditional game industry has had challenges with microtransactions. Simply
    put, it has been difficult to make this affordable with the legacy financial services
    infrastructure.


    But blockchain and crypto should change this. It will allow for a more efficient
    approach. There will also be a benefit for gamers to control their tokens. This
    can mean that they can spend it elsewhere. This makes it more compelling for gamers
    to participate.


    Note


    There are emerging gaming marketplaces like Tegro. They are focused on providing
    a way for gamers to buy and sell their virtual items.


    By comparison, with a traditional game, there is the risk of losing virtual assets.
    The reason is that there is a central authority that essentially owns everything.
    When a game shuts down, the gamers will likely lose their holdings. It’s happened
    with titles like Minecraft Earth and Harry Potter Wizards Unite.


    Another interesting aspect of Web3 gaming is the community involvement. By setting
    up a DAO, it’s possible for the users to decide on the rules and evolution of
    the game. This can further add to the engagement and fun. However, for the game
    developer, it’s important to not get too carried away. If there is too much decision-making,
    this can bog down the game. There needs to be a balance.


    An interesting aspect of Web3 community is the notion of exclusivity. For example,
    you can show that you were one of the original players of a game. And in the community,
    this could certainly confer some status.


    There is also the opportunity for Web3 games to create lasting brands. They can
    evolve with the help of the users as well. All this may ultimately mean that Web3
    games will lead to next-generation entertainment companies, which could ultimately
    rival traditional studies like Marvel.


    For a Web3 gaming startup, the initial offering may not even begin as a game.
    It could be a blog, a collection of NFTs, or a content site. This would have an
    interesting story line that gains interest from users. From this, a startup can
    then put together a game around it. All along, the community will be a part of
    the world-building process.


    But there are certain factors that will not change when it comes to Web3 gaming.
    After all, a game needs to be standout. The reality is that the market will get
    quickly saturated and it will be more difficult to rise above the noise. This
    means there will be a need for more resources to be invested in the games – but
    also a good amount of creativity, which is something that is not easy to pull
    off.


    Another issue is that the gaming industry is subject to fads. A hot game can quickly
    go very cold. It’s very rare for there to be one that lasts for a few years. But
    with the crypto mechanics, this is something that is necessary. It is what builds
    real value.


    Even successful gaming companies can languish. An example of this is Zynga. In
    2012, the company had a high-profile IPO, with the stock price at $10\. But the
    business would come under pressure. Zynga then went on to spend billions on acquisitions,
    but this really did not move the needle. In early 2022, Zynga sold out to Take-Two
    Interactive.^([^(150)](#fn150)) What did investors get? Well, it was $9.86 per
    share.


    With Web3, it’s critical to understand economics. An entrepreneur may even want
    to bring on board an economist! Why so? The reason is that a Web3 game will be
    a true economic system, with supply and demand for tokens. However, if this is
    not structured properly, the game could easily fall apart. In some cases, it may
    look more like a Ponzi scheme or multi-level marketing ploy. This is where the
    benefits for the early users start to dwindle because new members are not being
    brought into the ecosystem. When this happens, the users may want to leave because
    the value of their tokens will have depreciated significantly.


    What’s more, the economics of a Web3 game can mean that it can cost thousands
    of dollars to play. Of course, this may not be possible for many users. To deal
    with this, there are guilds that pool resources to allow for the playing of the
    game. Another option is to have a trial period.


    A popular business model for Web3 is play-to-earn. The innovator of this approach
    is Sky Mavis, which is based in Vietnam. The company is the developer of the Axie
    Infinity game.


    Here’s how it works: The players breed the characters, which are referred to as
    Axies. They can then engage in fights and adventures. But there is also an economy.
    The players, for example, can acquire land, create potions, and so on. To handle
    these transactions, the games allow for the trading of NFTs – which represent
    ownership in the virtual items – and ether. The Axie Infinity native token is
    AXS.


    The transactions in the marketplace have reached $3.6 billion and the highest
    price paid for an Axie was for $820,000.^([^(151)](#fn151)) There are 2.8 million
    daily active players.


    Note


    Some of the most popular play-to-earn games include Splinterlands, Alien Worlds,
    and Decentralized.


    Andreessen Horowitz is an investor in Sky Mavis. In a blog post, the authors noted:
    “What Axie Infinity has unlocked is the ability to play the games you love, have
    fun, but also participate in the financial upside of the community. This is an
    incredibly powerful idea: it means that games are no longer pure entertainment,
    but cross over into the realm of work. Axie Infinity is transforming communities
    around the world and replacing traditional forms of employment, changing people’s
    lives as players of the game help each other succeed.”^([^(152)](#fn152))


    Another business model for Web3 games is play-to-own. This is similar to play-to-earn,
    as both approaches involve providing incentives with crypto and tokens.


    So, what’s the difference? It’s more about degree. With play-to-earn, this usually
    has higher financial rewards. It’s actually possible for some people to make a
    living with the game.


    A play-to-own game, on the other hand, is more about the fun and engagement. Making
    money is rather a nice bonus.


    A popular play-to-own game is Crypto Raiders. It’s about dungeon crawling, in
    which the players can use crypto to buy characters, mobs, missions, and so on.
    The platform is built on the Polygon blockchain.


    In March 2022, Crypto Raiders raised $6 million. The lead investors included DeFiance
    Capital and Delphi Digital.'
