    # 4. The Web3 Team


    ## The Roles Needed for Startup Success


    With the strong growth in Web3 from 2020 to 2022, there have been many high-profile
    tech executives that have moved from megatech companies to startups in the space.
    Here are some notable examples:


    - Brian Roberts: He had been the CFO of `Lyft` since 2014. But in late 2021, he
    took the CFO spot at `OpenSea`.^([^(88)](#fn88))

    - David Marcus led `Novi`, which was the crypto unit for `Meta`.^([^(89)](#fn89))
    He had an extensive background in the fintech space, having also been the president
    of `PayPal` as well as on the board of `Coinbase`. So then what will he do next?
    It looks like he has plans to create his own Web3 startup.

    - Surojit Chatterjee was a vice president of `Google`, where he relaunched `Google
    Shopping`. But he saw more opportunity in the startup world and joined `Coinbase`
    as the company’s chief product officer.^([^(90)](#fn90)) It certainly was the
    right move. Within 14 months, his stock options were worth more than $600 million.^([^(91)](#fn91))


    The megatech companies have been trying to deal with this. Part of strategy has
    been to increase the compensation packages. But given the high valuations in the
    Web3 industry, this may not be enough. The megatech companies may need to instead
    have to move aggressively with crypto and blockchain. And yes, this should help
    drive even more progress and validation.


    But despite all this, recruiting is not easy for startup founders. There are thousands
    of companies looking for talent. This means that recruiting is often one of the
    most time-consuming duties for a founder.


    So in this chapter, we’ll take a look at some of the key roles for the Web3 team
    of a new venture.


    Note


    Founders have been using creative ways to recruit. For example, it is common to
    put “We’re hiring” in the subject lines of Twitter bios and LinkedIn profiles.
    The same message is often at the top of a startup’s website.'
