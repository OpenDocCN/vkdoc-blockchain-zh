    ## Web2


    互联网泡沫的破裂是残酷的。许多公司，如 `Pets.com`、`Webvan`、`eToys`、`Go.com` 和 `DrKoop.com`，都因资金枯竭而倒闭。


    风险投资枯竭了。许多人离开了硅谷，转投其他行业，比如华尔街。一切似乎都希望渺茫。


    但科技行业终将复苏，Web2（或称 Web 2.0）将应运而生。


    IT 工程师达西·迪努奇早在 1999 年就于一篇文章《碎片化的未来》中提出了这个术语。^(¹¹) 她预见到互联网将变得更加沉浸式，并普及到电脑之外的多种平台，如电视、汽车仪表盘、手机和游戏机。


    然而，直到 2004 年，Web 2.0 才成为硅谷的热门词汇。在很大程度上，这个概念从迪努奇的理念演变而来，转向了以用户为中心的互联网。任何人都可以创作自己的内容并进行分享。


    这个时代的领军公司包括 `Google`、`YouTube`、`Facebook`、`Snap` 和 `Twitter`。是的，它们至今仍然举足轻重。同时，它们也在探索如何向
    Web3 世界演进。


    2006 年，《时代》杂志将 Web 2.0 评选为“年度人物”。该报道指出，互联网已“成为一种工具，将数百万人的微小贡献汇集起来，并使之产生价值。”^(¹²)
    当时，炙手可热的平台是 `MySpace.com`。这个社交网络允许用户创作内容并与朋友联系。


    人们曾相信，Web 2.0 是一个新型平等主义互联网的开端。人们普遍认为它是去中心化的，因为用户掌握着权力。


    但这最终会消退。像 `Google`、`Facebook` 和 `Twitter` 这样的超级运营商控制了网络世界的绝大部分——包括数十亿人的宝贵数据。


    这些公司积聚了巨大的权力。看看 `Google` 就知道了。在 2021 年第四季度，该公司公布的营收为 750 亿美元，同比增长 32%，利润为 206
    亿美元。^(¹³) 该公司拥有十个在线产品，用户数均超过 10 亿。


    这家公司也不仅仅是搜索和在线应用。它拥有 `Waymo`，这是全球最大的自动驾驶运营商之一。它还掌控着像 `Fitbit` 和 `Nest` 这样的设备公司。


    那么，权力是否过度集中在少数几家公司手中？科技界的许多人认为答案是肯定的。而这正导致重大问题。毕竟，一家初创公司能否挑战 `Google` 搜索？或者与 `Apple
    iPhone` 竞争？又或者推翻 `Facebook` 庞大的社交网络？


    这绝非易事。这场较量还需要投入巨额资源。


    因此，科技行业希望创造一种新的范式——一种真正去中心化、由用户掌控的范式。这就是 Web3 范式。


    “Web3 吸引了各种各样的人，他们都曾因腐败的中心化机构而以某种方式受到轻视，”`Ankr` 的产品负责人乔什·纽罗斯说道。“像 `Facebook` 这样的平台以我们从未想过的方式使用和操纵用户数据。政府通过经济政策、制裁、恶性通货膨胀辜负了公民。现在，人们看到了在
    Web3 中重新获得隐私、自主权和自由的方法。”^(¹⁴)


    注意


    尽管对 Web2 有诸多批评，但它确实有一些关键优势。请记住，中心化是必要的。原因是，如果没有足够的规模，就不可能让数十亿人成为网络世界的一部分。广告模式同样关键，因为它意味着用户参与的门槛大大降低。


    ## Web3 的催化剂


    Web3 的最大驱动力之一无疑是超级科技公司的威胁。但还有其他因素在起作用。具体如下：


    -   **可组合性**：这类似于 `API`（应用程序编程接口），允许像乐高积木一样的组件来构建程序和系统。在 Web3 的背景下，可组合性利用区块链来演进应用程序——在彼此的基础上进行构建。这是一种“不重复发明轮子”的方式。

    -   **对新平台的需求**：如今的互联网与 1990 年代早期存在的互联网相似。但随着时间的推移，出现了许多新的创新。那么，互联网的根基难道不应该更好地反映这一点吗？当然应该。对于
    Web3 来说，这本质上就是利用区块链作为新架构的核心。但这个平台不会仅限于此。Web3 还将利用其他技术，如`虚拟现实`（`VR`）、`增强现实`（`AR`）、人工智能（`AI`）、`物联网`（`IoT`）和
    `5G`。

    -   **FOMO（错失恐惧症）**：是的，许多企业家和投资者不想错过下一个重大机遇。

    -   **新的商业模式**：Web2 的变现方式包括广告、订阅和按使用付费。但 Web3 提供了有趣的新选择。随着加密货币和代币的增长，这些可能最终成为在线世界新'
- fmt: '## Web3 and Crypto


    When Russia invaded Ukraine in early 2022, the values of cryptocurrencies surged.
    Part of this was due to people looking for safe havens for their wealth. But people
    were also using cryptocurrencies to help the people in Ukraine. Within a few weeks,
    there were over $64 million in donations, according to blockchain analytics firm
    Elliptic.^([^(18)](#fn18))


    But there was a dark side to this as well. It looked like cryptocurrencies were
    helping Russia avoid some of the sanctions. They could also be a way for oligarchs
    to hide their assets. Because of this, Massachusetts Senator Elizabeth Warren
    introduced legislation to deal with these issues. She noted that – in 2021 – close
    to three-quarters of all ransomware was due to Russian-linked entities.^([^(19)](#fn19))


    Note that this controversy with cryptocurrencies and blockchain was nothing new.
    It began in the early days of these systems and technologies. For example, it
    was common for tax evaders, drug traffickers, human traffickers, and hackers to
    use cryptocurrencies and blockchain to bolster their illicit activities. Unfortunately,
    these remain problems today.


    As a result, Web3 may actually be an attempt to essentially rebrand cryptocurrencies
    and blockchain. It is a way to make it more of a normal technology. Besides, if
    Web3 takes off, this will also mean much more demand for crypto.


    **Note**: Larry Fink is the CEO of BlackRock, which is an asset management firm
    that has about $10 trillion in assets. He believes that the Russian-Ukraine war
    will accelerate the adoption of crypto. In his annual shareholder letter, he wrote:
    “The war will prompt countries to re-evaluate their currency dependencies. Even
    before the war, several governments were looking to play a more active role in
    digital currencies and define the regulatory frameworks under which they operate.”^([^(20)](#fn20))
    If so, this will likely be a major positive for Web3, which relies heavily on
    crypto.


    ## The Downsides of Web3


    Web3 is far from a no-brainer. Let’s face it, history has shown that there have
    been many emerging technologies that never hit critical mass. Here’s a look at
    some famous examples:


    *   **Segway**: Launched in 2001, this was a motorized scooter with two wheels
    on the side. The driver guided it by leaning. John Doer, the famed venture capitalist,
    said that the Segway had the potential to be bigger than the Internet.^([^(21)](#fn21))
    Well, unfortunately, it was a major flop. The Segway would become the object of
    jokes.

    *   **Speech Recognition**: In late 1997, Bill Gates said: “The PC five years
    from now – you won’t recognize it, because speech will have come into the interface,
    the screen will be a flat screen, the performance will be 20 times what it is
    today.”^([^(22)](#fn22)) He was far off the mark with speech recognition. The
    fact is that this technology was incredibly challenging to develop. It really
    wasn’t until the great strides in deep learning – from 2012 or so – that speech
    recognition became useful to users.


    OK then, so when it comes to Web3, what are the nagging issues? How might this
    technology not live up to the expectations? Could it even just be another fad?


    Here are some factors to consider:


    *   **Performance**: So far, it is not very impressive. Blockchain networks are
    generally slow and have high transaction costs. Consider that they are a big user
    of energy. In 2021, Bitcoin transactions consumed about 91 terawatt-hours of electricity.
    This was more than the usage for Finland.^([^(23)](#fn23)) The reason is that
    Bitcoin transactions involve solving complex mathematical problems, which take
    up enormous amounts of compute power.

    *   **User Experience**: For the most part, it is fairly difficult to use Web3
    systems. The interfaces are often not intuitive, and you may need a technical
    background. The jargon and concepts of Web3 can quickly get complicated, such
    as with the use of `dApps`. This will make it difficult to get mainstream adoption.

    *   **Bubble**: There has already been intense interest from VCs. The result can
    be a bubble that ultimately pops. For Web1, this happened from 1996 to 2000. And
    perhaps the same could happen with Web3. Although, bubbles are not necessarily
    bad either. They are common when there is a massively disruptive technology.

    *   **Dystopia**: The world of Web3 may turn out to be worse than Web2. After
    all, many of the transactions will have some type of payment mechanism – and it
    may not be clear how viable the tokens will ultimately be. There could also be
    lots of fragmentation, with people focusing on micro platforms. Something else:
    Web3 will track everything and make the transactions public. But many people may
    value privacy more.

    *   **Centralization**: When you look at the history of technology, there is a
    similar pattern. First, there are new innovations that emerge, and this attracts
    a growing number of people. They create their own startups to capitalize on the
    opportunity. Many will ultimately fail or be purchased. And yes, the result will
    be centralization. This was the case with megatrends like mainframes in the 1950s
    and 1960s, and the PC and software in the 1980s and 1990. So why will Web3 be
    any different? It very well may not. Besides, the current incumbents like Facebook,
    Apple, and Google have tremendous power – and will certainly wield it to protect
    their global platforms.


    Another lingering issue with Web3 is that it is male dominated. It’s actually
    kind of a proverbial bro culture.


    This will definitely need to change. For Web3 to be successful, there must be
    true diversity.


    Now there are some encouraging signs of change. Just look at Katie Haun. From
    2006 to 2017, she served as a federal prosecutor, and she focused on cyber and
    crypto crimes.^([^(24)](#fn24)) She created the first federal cryptocurrency task
    force, which investigated the Mt. Gox hack and the criminals on the Silk Road
    network.


    After this, she moved to the private sector and became a general partner at Andreessen
    Horowitz.^([^(25)](#fn25)) At the firm, she led investments in breakout crypto
    companies. She would also go on to serve on various boards, such as for Coinbase.


    In early 2022, she raised $1.5 billion for two funds for crypto and Web3.^([^(26)](#fn26))
    In aggregate, they were the largest ever with a female general partner.


    In a blog post announcing the new venture fund, she wrote:


    > The web3 projects that emerge over the next decade will be even more expansive,
    applying the breakthrough mechanisms of the last decade to every industry from
    transportation and commerce to fashion, sports, music, and more. We think consumer
    demand for digitally native experiences and goods will continue to increase. As
    more people embrace these products, there will be a shift in individuals’ expectations
    for greater control of their personal data and a new generation of creators will
    demand and enjoy better economics. We think open platforms will win through loyalty,
    transparency, and trust by delivering better incentives than the walled gardens
    that came before.^([^(27)](#fn27))'
