  trans: '

    # 开发者观点


    那么 Web3 开发者有哪些方法和观点呢？以下是一家名为 GeodeFinance 的质押技术开发公司对此的见解。


    首先，来看`0xCypher`^((87))给出的要点：


    *   **以太坊**：“目前，在我们的应用中，每个钱包所属的数十个数据集记录都应保存在以太坊上。这是因为将它们保存在中心化数据库中，完全迫使用户信任我们。因此，我们界面上出现的每个网页组件都来自去中心化数据库以太坊。这样一来，包括我在内的任何人都不能随意更改数字。所有更新都在智能合约允许的范围内进行，这就是为什么我建议每个
    DeFi 和 Web3 用户确保合约编写安全且无错误。”


    *   **工具**：“我们首先需要找到一个 RPC（远程过程调用）端点。如果节点在你的本地机器上运行，那么你计算机的某个端口就已连接到以太坊。你发送到诸如`127.0.0.1/8000`之类的
    URL 的每次调用，现在都可以从以太坊提取或发送你的余额和合约信息。连接供应商后，你还需要对所有合约交互进行编码。幸运的是，Web3 库在 Javascript
    和 Python 中都能非常高效地使用。”


    *   **权益证明**：“基于权益证明的以太坊第 2 版，即‘信标链’，基于存款机制。我使用 Web3 库的主要方式是将 API 调用发送到这些链，并通过预言机服务将我获取的数据加载到我们自己的智能合约中。通常，你可以通过简单地调用
    Python 和 Javascript 中的函数来完成此操作。但我们使用一个名为 Gnosis 的多重签名系统，通过安全的共识来确保数据安全，这意味着我们要对输入数据进行编码和签名，然后发送给
    web3。”


    以下是来自 Pacific 的观点：


    *   **Web3 体验**：“关于 Web3 所有这些卓越优势的主要问题和难点在于随之而来的责任。50 亿人可以访问互联网，但其中大多数人甚至不习惯使用它。此外，使用
    Web3 并不像使用传统的 Web2 那样舒适。Web3 建立在诸如以太坊、Avalanche、Solana 等智能合约区块链之上。要在这些区块链上自由操作，你需要对自己的钱包承担全部责任，需要与各种不同类型的去中心化应用交互，并且大多数情况下，在基础层面上，你需要知道自己在这些去中心化应用内部和之上到底在做什么。所有这些因素起初对大多数人来说可能令人沮丧，而且老实说，考虑到大多数人，这确实令人沮丧。要让
    Web3 成为新标准，需要一整套范式的转变，在我看来，这还需要一些时间。”


    *   **在以太坊上开发**：“以太坊已经存在近十年了。它是第一个通过智能合约实现可编程货币概念的区块链。此外，以太坊基础扎实，拥有能力出众的团队和社区。这个坚实的基础使得以太坊颇具吸引力。从开发者的角度来看，互联网上关于以太坊的资源比任何其他区块链都多。你可以通过几次搜索引擎查询就找到答案。而大多数其他区块链，即使是兼容
    EVM 的，情况也并非如此。技术围绕以太坊聚集，从而形成了更大的社区、更强的开发者支持，进而带来了更高的适应性。与此吸引力相关的是，围绕以太坊构建的去中心化应用数量超过了其他区块链的总和。虽然差距正在慢慢缩小，但以太坊在
    Web3 基础设施上的主导地位仍将持续一段时间。”


    *   **初创公司**：“Web3 的主要问题在于它仍可以被视为处于起步阶段，并且存在适应性问题。所以对我来说，一个有趣的初创公司应该着手解决这些关于 Web3
    和以太坊的问题。OpenSea 和 NFT 生态系统在激发非技术人员的兴趣并将其带入这个领域方面做得非常出色。通过这个展示，我们已经看到任何人都可以稍加努力就能与区块链交互。尽管
    OpenSea 的理念仍然与 Web2 公司类似，但为了让大多数人理解 Web3 的真正运作方式，需要一个从中中心化到去中心化的过渡形式。”


    *   **超金融化**：“用户在 Web3 中所做的一切都通过他们的钱包进行，这与当前 Web2 的模式不同——人们认为他们免费使用大多数平台。当然，事实并非如此，但人们是这么感知的。从行为经济学中我们知道，大多数人都是损失厌恶的。在人们眼中，-10
    美元的绝对值远大于 +10 美元的绝对值。因此，对于面向大众的 Web3 应用来说，一个有趣的初创公司应当构建一种架构，让人们不会觉得在区块链或 Web3
    平台上操作时是在亏钱。”


    *   **以太坊的替代品**：“对我来说，Avalanche 是一个很好的以太坊替代品，尤其是如果你是新用户或小型投资者，只有少量闲钱进行试验和学习。Avalanche
    通过其 C 链提供 EVM 兼容性，并且由于其共识协议的概率特性，能以更低的交易成本实现更高的吞吐量。此外，Avalanche 区块链可以通过其子网在可扩展性方面具备一些优势。在一个
    Web3 成为新标准的未来，像子网这样的跨越式技术仍然可以在消除可扩展性问题负担的同时确保去中心化。”

    '
- fmt: '# Conclusion


    In this chapter, we got an overview of the Web3 tech stack. It is still evolving,
    and this can make development challenging for entrepreneurs. Picking the wrong
    platforms and tools can blunt a startup’s progress. But this is always a risk
    for any nascent industry.


    But despite all this, there is an emerging structure to the tech stock. The foundation
    is Layer 1, which involves the core technologies for the blockchain. Next, there
    is Layer 2. This is about systems to help improve the performance and efficiency.
    During the past few years, there has been significant interest from VCs in Layer
    2.


    And finally, there is Layer 3. This is about the applications, such as for DeFi,
    NFTs, gaming, and so on.


    In this chapter, we also looked at the libraries and frameworks for Web3, such
    as `Web3.js`, `Truffle`, and `Ethers.js`. We also got an overview of the languages
    like `Solidity`, `Vyper`, and `Rust`.


    As for the next chapter, we will look at building the Web3 team for a startup.


