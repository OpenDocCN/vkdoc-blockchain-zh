- fmt: '## ConsenSys


    Joseph Lubin has a diverse background. After graduating with a degree in Electrical
    Engineering and Computer Science from Princeton University, he worked at a lab
    for the development of autonomous music and robots. After this, he worked for
    a cryptographic payments business and then went on to create his own hedge fund.
    He would eventually become a VP of Technology in Private Wealth Management at
    Goldman Sachs.


    But there were key themes in his career – and they revolved around cryptography,
    engineering, and finance.


    In 2014, he met up with Vitalik Buterin in Toronto. He was intrigued with his
    ideas and helped Buterin create Ethereum.


    For Lubin, he saw a big opportunity to build a company, ConsenSys, on this emerging
    blockchain. The timing was definitely spot on. The result is that ConsenSys has
    become a go-to company for Ethereum.


    The company has created the `MetaMask` wallet, which has grown to over 30 million
    Monthly Active Users (MUAs). It has a strong presence in the USA, Philippines,
    Brazil, Germany, and Nigeria.


    Next, ConsenSys has `Infura`. This is a leading development platform for Ethereum.
    There are about 430,000 developers on it and the on-chain ETH volume is over $1
    trillion.


    But ConsenSys has a myriad of other products, such as the following:


    - `Codefi`: This includes nine tools to help businesses digitize assets.

    - `Diligence`: This is a system for audits and security for smart contracts.

    - `Quorum`: This is for testing networks.


    ConsenSys has a long list of customers, which include some of the world''s largest
    enterprises and governments. For example, the company helped the Asian Development
    Bank (ADB) create a DeFI system. The focus is on connecting all the central banks
    and securities depositories among 13 countries in Asia and the Pacific region.
    The goal is to reduce the time to settle cross-border transactions from a few
    days to near real time.


    In March 2022, ConsenSys raised $450 million in a Series D Financing at a valuation
    of more than $7 billion. It came just after a few months from its other financing,
    which was for $200 million.


    ## Lido


    The move for Ethereum to staking will be important. However, there has been resistance
    from users to use this approach. Why so? Here are some reasons:


    - **Staking Has Lower Risks**: While this can be reassuring, it does mean that
    the returns tend to be lower. Users often would rather use their tokens for more
    lucrative purposes.

    - **Locked Up**: Staking means you cannot access your tokens. Again, this means
    tying up your assets, which weighs on returns.

    - **Expense**: Currently, staking is not cheap. You need to put up a minimum of
    32 ETH, which is over $90,000. Because of this, crypto exchanges have created
    systems to pool assets.


    Then what to do? A startup, called Lido, has been building systems to help out.
    The company is a top provider of liquid staking services. As a testament to its
    success, the company has raised over $73 million.


    Lido has more than 80% of the market, with more than $10 billion in staked assets.
    There are about 76,000 crypto wallets.


    With Lido, you can stake your assets without a minimum investment requirement.
    The company did this by creating a decentralized autonomous organization (DAO),
    which has allowed wider participation through more incentives. This has also helped
    to boost trust with the community. When Andreessen Horowitz invested in Lido,
    it purchased governance tokens for the DAO.


    You can also use them for collateral for DeFi applications, which can mean generating
    better returns. This is done by the creation of a sophisticated derivative financial
    instrument. Lido currently is available for Solano, Terra, Kusama, and Polygon.


    According to a blog from Andreessen Horowitz: "Lido democratizes staking. The
    Lido community''s unwavering commitment to decentralization really stood out to
    us. They recognize that for their approach to succeed, they will need to create
    a fully trustless staking pool while also embracing alternative solutions."


    ## Private Blockchain


    Blockchain''s public ledger is a critical part of providing trust and security
    with the network. But this feature has its drawbacks. Simply put, there are certain
    organizations – such as highly regulated ones like banks and healthcare operations
    – that need very strong levels of privacy.


    This is where the private or permissioned blockchain comes in. There is a central
    authority that has certain requirements for entry.


    Yes, the ledger is secure and to get access to it, a user needs to obtain permission
    from the central authority. The users can then operate the blockchain as they
    would if it were public. Think of this as partial decentralization.


    Besides privacy, there are other advantages for private blockchains:


    - **Performance**: Because of the smaller sizes of private blockchains, the speed
    is usually higher. This can be particularly important for enterprise applications
    that may need near real-time performance.

    - **Efficiency**: The rules for becoming members of a private blockchain means
    that users are more focused on the use cases of the network. This will mean less
    congestion and fewer transactions.


    The Linux Foundation has created a project to help develop private blockchains.
    It is called `Hyperledger Fabric` (note that there are other systems available
    like `Corda`, `Ripple`, and `Quorum`).


    The system is highly customizable. You can mix other technologies within the private
    blockchain. You can also use it on-premises, the cloud, and hybrid environments.
    Then there are capabilities to integrate with legacy IT systems. In other words,
    the `Hyperledger Fabric` has been built for enterprises. Note that half the companies
    on the Forbes Blockchain 50 use the technology. These companies have revenues
    or valuations over $1 billion.


    An industry that has shown strong adoption for the `Hyperledger Fabric` is healthcare.
    Here are some use cases:


    - **IBM Digital Health Pass**: This is a private blockchain to manage and verify
    COVID-19 and other vaccination status. The system provides minimal personal data
    to the user.

    - **Avaneer Network**: This is a partnership of Aetna, Anthem, Cigna, Cleveland
    Clinic, HCSC, IBM, The PNC Financial Services Group, Inc., and Sentara Healthcare.
    They built a private blockchain to allow for better collaboration with healthcare
    services while having a lower need for administrative help. This system helps
    to manage 80 million patient lives and 14 million annual visits.

    - **KrypC Pharmaceutical Delivery Supply Chain Solution**: This is a private blockchain
    that streamlines the communications between pharmaceutical companies and insurance
    carriers. The goal is to allow for the safe delivery of drugs and treatments.
    A key with the private blockchain is the use of a stringent audit trail.'
