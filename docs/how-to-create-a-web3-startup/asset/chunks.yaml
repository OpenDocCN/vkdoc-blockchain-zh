- fmt: '# Problems for NFTs


    Sina Estavi is the CEO of `Bridge Oracle`, which is a blockchain company based
    in Malaysia. In 2021, he agreed to pay $2.9 million for the NFT from Jack Dorsey
    (he donated the money to charity). It was for the first tweet on Twitter, which
    was “just setting up my twttr.”


    The purchase caused a stir – and helped to propel even more interest in the NFT
    market.


    But unfortunately, things did not turn out too well for Estavi. Within less than
    a year, he put up the NFT for bid – and there was tepid interest. The bids did
    not even exceed $14,000.^([^(136)](#fn136))


    Such an outcome is not unusual. The reality is that the NFT market is highly volatile
    – even more so than cryptocurrencies.


    If anything, the values are often subject to speculation. There is also the impact
    of fads.


    It’s true that you can still make lots of money from NFTs, but you probably need
    to take a shorter-term focus. Success may be more like day trading.


    Yet there are other nagging issues with the NFT market:


    * **Adoption**: As seen earlier in this chapter, the process for buying and creating
    NFTs is far from intuitive. But if the market is to become more mainstream, there
    must be significant improvement. There will essentially need to be one-click transactions
    like Amazon.

    * **Rug Pulls**: This is where a Web3 developer abandons a project and takes the
    money. There can be little recourse for those who have been defrauded.

    * **Whitelisting**: This is where a select group of people are invited to participate
    in a project. Then when it is launched to the public, they will derive significant
    gains. This is similar to the “pump and dump” of penny stocks. According to research
    from `Chainalysis`, whitelisted users made 75% gains, while the general users
    got only 20%.^([^(137)](#fn137)) Unfortunately, this is a common practice, and
    it can be difficult to do anything about it.

    * **Wash Trading**: A user is both the seller and buyer for a transaction. This
    is possible because you can easily create two wallets and not provide any identifying
    information. With wash trading, this can cause artificial volume in an NFT, which
    may attract interest.

    * **Copyright Violations**: It’s not difficult for someone to create an NFT from
    someone else’s intellectual property. This not only defrauds the real owner but
    also the user who makes the purchase.


    # New Go-to-Market Strategies


    In 2010, Kevin Systrom and Mike Krieger created an app called `Burbn`. It allowed
    users to check-in to locations and post messages and photos. But there was a problem:
    It got little traction. The application was clunky – which was common for the
    early days of iOS apps – and had little utility.


    But Systrom and Kreiger noticed something interesting. `Burbn` users really liked
    the photo sharing feature. So the founders just focused on this and created Instagram.^([^(138)](#fn138))
    It also had the ability to edit the photos. Although, perhaps the most important
    feature was that it only took three clicks to post a photo.


    Within a month, Instagram got over one million users.^([^(139)](#fn139)) There
    was also no advertising or marketing. The growth was purely word-of-mouth.


    Within two years, the founders sold Instagram to Facebook for $1 billion.


    This is certainly another iconic Silicon Valley story. But this was also a very
    rare success. For the most part, startups usually need significant marketing.
    This is where a large part of the venture capital goes.


    Then with Web3, might things be different? Will there be less need for venture
    capital?


    Perhaps so. The reason is that Web3’s focus on tokens can act as a financing mechanism.
    It can also be an effective way to attract users. Hey, who doesn’t want to get
    paid, right?


    But with Web3, the typical evolution of a startup is usually different. You can
    start without a product. Instead, you will set forth the idea for one and then
    you will get the feedback from the community that owns tokens. This helps to provide
    for the product-market fit.


    But to make this happen, there will need to be a compelling vision. What will
    encourage people to come on board and make a bet on your venture? What problems
    are you looking to solve?


    By answering these questions, you will have a better chance of creating a strong
    community. They will also have better direction on providing the feedback to improve
    on the vision.


    In terms of go-to-market strategies, there are a variety of interesting ones emerging.
    Here’s a look at some of them:


    * **Developer Grants**: This is a way to encourage coders to come on board the
    project. The grant could be in the form of tokens or traditional money. Regardless,
    there is usually a need for some type of incentive to get interest. For example,
    `Compound` set up a developer grant program from March 12 to September 12, 2022,
    and funded it with 5,000 of its own tokens, `COMP`.^([^(140)](#fn140)) According
    to the website: “With no carrot with which to motivate community members to propose
    changes, the protocol isn’t able to innovate as quickly as it should be innovating
    in a dynamic and competitive market.” The program is not just for development
    of new features. It also provides for code audits, and bounties for finding bugs.

    * **Memes**: These can help create viral growth in the user base. Although, creating
    memes is no easy feat. The founders may also not be the best ones to do this.
    Instead, this is really for those with a marketing background. It also helps to
    have a large following on traditional social media channels. And something else
    to keep in mind: The impact of memes tends to be temporary. In other words, the
    creation of them is likely something to be ongoing.

    * **Airdrops**: This is when a Web3 project gives away tokens. It’s also possible
    to airdrop NFTs. Often, this is to encourage people to sign up for a project.
    But it also can be used for testing the project’s technology. A famous example
    of an NFT airdrop is the `Bored Ape Yacht Club`. The project created a new collection,
    called the `Mutant Ape Yacht Club`. There was an airdrop that gave all existing
    users the ability to create 10,000 apes, which were referred to as “mutants.”
    There was also another 10,000 available for new users. This was a fun reward for
    existing users. But it was also an effective way to bring new ones.


    # Social Identity of Web3


    In the Web3 world, it’s common for users to have their own avatars. They can also
    serve as profile pictures for social media. They are often old-school, retrograde
    pixelated visuals, such as of punks or bored apes. For example, Jay-Z and Snoop
    Dogg have these on their Twitter and Instagram accounts.


    The concept behind Web3 profile photos is that they should not be polished. Rather,
    what’s important is the engagement with the community.


    Keep in mind that many of the profiles are NFTs. By doing this, they can become
    a next-generation version of a resume. Since the NFTs are on a blockchain, a user
    can get a public view of the activities of the users.'
