- fmt: '# General Counsel


    For entrepreneurs, it can be tempting to not focus much on legal and compliance.
    This is often just red tape that can hinder growth, right? To some extent, this
    is true. There are definitely examples where avoiding the legal niceties has paid
    off. Just look at cases like Uber and Airbnb. They were largely able to thrive
    because their services were in legal gray areas.


    But Web3 is different. Because it usually deals with tokens – which have monetary
    values – there are legal landmines. For example, a government agency could shut
    down a startup.


    This is why there needs to be a good legal foundation – and this should begin
    in the early phases of a startup. If anything, some of the highly successful startups
    in crypto took this approach.


    This is not to imply you need to hire a full-time lawyer. This is probably too
    much for a startup. Rather, a more common approach is to have a lawyer on retainer.


    This person can help with the following:


    - Provide the right legal structure for the startup, such as with an `LLC`, `C-Corp`,
    or cooperative. There will then likely be the creation of a `DAO` (Decentralized
    Autonomous Organization).

    - Help with regulatory matters. They are evolving. They are also different from
    country to country. But a lawyer will help navigate all this.

    - Assist with the creation of tokens. This can be a complex process, which involves
    setting up a foundation. This is usually offshore.

    - Help with onboarding users. This means that there will be the right legal consents
    to protect the startup.


    Ideally, you want a lawyer who has firsthand experience with the issues of Web3.
    But unfortunately, there are not many that have this background. What to do? Well,
    you can look at a lawyer’s skillsets that are similar to what is needed with Web3.
    Here are some examples:


    - Experience with structuring legal entities and funding them. This is perhaps
    the most important for a startup.

    - Background working in the financial services industry or fintech. This would
    include having dealt with regulations, such as with anti-money laundering statutes
    or the Bank Secrecy Act.

    - Experience with privacy laws like the General Data Protection Regulation (`GDPR`),
    California Consumer Privacy Act (`CCPA`), and Health Insurance Portability and
    Accountability Act (`HIPAA`).

    - Knowledge of federal and state securities laws.

    - Understanding of laws regulating product disclosures.


    You also want an attorney that is licensed by a state bar. You can also do a background
    check at `lawyers.com` and by contacting the local bar association.


    ## Finance or Accounting Manager


    A finance or accounting manager is crucial for a startup. Because of the new business
    models, there needs to be a system to manage the transactions.


    This person does not have to be a full-time employee. Instead, you could bring
    on a contractor or hire an accounting firm.


    Here are some of the typical activities for a finance or accounting manager:


    - Build and manage the month-end close process.

    - Record the monthly journal entries, transactions, and reconciliations.

    - Check for any reporting discrepancies.

    - Help with tax compliance.

    - Prepare financial reports, such as the balance sheet, income statement, and
    cash flow statement.

    - Assist with preparing budgets.

    - Oversee vendor setups and accounts payable.

    - Prepare forecasts for the company and the various departments.


    For these functions, you may want a couple people. The reason is to avoid conflicts
    of interest. After all, if there is only one person involved, there may be a temptation
    to embezzle funds.


    You should focus on those candidates that are Certified Public Accountants (`CPAs`).
    They have gone through extensive education on all the core aspects of accounting.
    They also will have audit experience.


    It’s true that a `CPA` may not have an extensive background with blockchain and
    Web3. But then again, they should be able to learn about the key topics. The `CPA`
    will also help with other non-Web3 aspects, such as invoicing, working with `ERP`
    (Enterprise Resource Planning) programs, general accounting, and so on.


    ## Front-end Developer


    A front-end developer focuses on the UI of a website or mobile app. In terms of
    skillsets, they usually are a blend of design and scripting. For example, a front-end
    developer will need to know `HTML`, `CSS`, and `JavaScript`.


    It’s critical that this person have a good sense of the user experience. This
    is especially important in Web3 since the concepts can be complicated or new.
    This means that the front-end developer will spend lots of time about where to
    place messages and buttons. There may also be the use of animations. What’s more,
    the UI must work on multiple form factors, whether a tablet, smartphone, or desktop
    screen.


    Here''s how a job ad from Alchemy describes the role of a front-end developer:
    “You will help delight blockchain developers with sleek interfaces and intuitive
    visualizations that make their lives easier. Your work will be the first thing
    users see and will define the blockchain development experience for developers
    and enterprises globally.”^([^(98)](#fn98))


    Here’s a look at other tasks for a front-end developer:


    - Help with the wireframes and visual design.

    - Provide feedback during code reviews.

    - Come up with best practices for the front-end design.

    - Debug the code.

    - Collaborate with software engineers, project managers, and designers.

    - Look at ways to provide security and scale for the design.

    - Help with A/B testing.


    Having a background in blockchain is definitely helpful. But a front-end developer
    does not need to be an expert in this technology or even know languages like `Solidity`.
    Rather, this person will have a background in various front-end libraries and
    frameworks like `React`, `GraphQL`, `Angular`, `Bootstrap`, and `VueJS`. It is
    also helpful to have some experience with database and cloud platforms like `AWS`.
    Finally, it is great if the developer has a background in putting in production
    apps that have large user bases.'
