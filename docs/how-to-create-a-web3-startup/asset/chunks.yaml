  raw: '## Fractal


    Justin Kan is a pioneer of Internet video. While in his early 20s in 2007, he
    used a webcam – which was attached to his head – to broadcast his life, which
    he hosted on Justin.tv. This ignited the trend of “lifecasting.”^([^(165)](#fn165))


    Kan did this for about eight months. And yes, it resulted in lots of publicity,
    which helped boost the traffic to Justin.tv.


    Yet Kan saw there was a big business opportunity with this. He helped turn Justin.tv
    into a hub for video. He would then go on to help found Twitch. It helped to start
    another big trend – that is, the live streaming of video game play. This would
    ultimately lead to the birth of the eSports industry. Then in 2014, Twitch sold
    to Amazon for $970 million.^([^(166)](#fn166)) At the time, the platform had over
    55 million users.


    Keep in mind that Kan is not done with trying to find the next-big business. And
    he believes it has to do with NFTs. To this end, he cofounded Fractal in 2021\.
    It’s a marketplace for users to buy NFTs directly from game companies and is based
    on the Solana blockchain. Kan has raised $35 million for the venture.^([^(167)](#fn167))


    A key part of Fractal is Launchpad. This is a service that helps game companies
    sell their NFT collections.


    But not just anyone can sell on the Fractal marketplace. There is extensive vetting,
    which helps to promote more quality and security (the company accepts only about
    5% of submissions). Kan believes that the future of NFTs will require curation.


    Some of the games on Fractal include Yaku (racing), House (real-time strategy),
    and Tiny Colony (a multi-mode game). All games on the marketplace have sold out
    their NFT collections.


    ## Magic Eden


    In 2021, Sidney Zhang, Jack Lu, Zhuoxun Yin, and Zhuojie Zhou cofounded Magic
    Eden. They all had deep roots in the tech world, with stints at companies like
    Uber Eats, Facebook AI, FTX, and Coinbase. A big attraction for the venture was
    the Solana blockchain. When Lu was at FTX, he had firsthand experience with this
    technology.


    Magic Eden is a Web3-first marketplace for NFTs (Lu coined the name for the company
    because it is about the sense of limitless possibility). It was the first to allow
    bidding, a rarity index and a minting system that connects to a secondary marketplace.
    It has also quickly become the largest Solana-based platform. Here are some of
    the metrics:^([^(168)](#fn168))


    *   10+ million unique monthly visitors


    *   4,000+ collections


    *   100,000+ wallet connections


    *   $1 billion in secondary trading volume


    The company has raised $27 million in venture capital.


    ## OpenSea


    Software engineer Devin Finzer cofounded Claimdog in 2015\. It was a service that
    could find if a business owed you money. A year later, he would sell the company
    to Credit Karma. While there, Finzer learned about blockchain technology and saw
    it as fertile ground for his next startup.


    His idea was WifiCoin. It allowed for the use of tokens to share wireless routers.
    Finzer got backing for this venture from Y Combinator. However, in a few months,
    he pivoted the business. Because of the popularity of CryptoKitties, he saw there
    was a bigger opportunity to create a marketplace for NFTs. So was born OpenSea.


    While the company would grow, it was not until 2021 that there was an inflection
    point. As a result, Finzer had little difficulties raising substantial amounts
    of money from elite venture capital firms. By early 2022, he raised $300 million
    at a whopping $13.3 billion valuation.^([^(169)](#fn169)) The lead investors included
    Paradigm and Coatue Management.


    With such strong backing, OpenSea has been able to recruit top-notch talent. The
    company was able to hire Brian Roberts, the former chief financial officer at
    Lyft, and Shiva Rajaraman, the previous vice president of commerce for Meta.


    At the time of the funding, OpenSea generated over $2.4 billion in transaction
    volume for the month. This was up over 600X on a year-over-year basis.^([^(170)](#fn170))


    According to a blog post from Finzer: “We’re focused on lowering the barriers
    to entry for NFTs by introducing features and simplified flows that abstract away
    the complexity of the blockchain. We’re also accelerating our multi-chain support
    and prioritizing improvements to help people discover, manage, and showcase their
    NFTs with better tools, analytics, and presentation.”^([^(171)](#fn171))


    ## Rarible


    Alex Salnikov received a bachelor''s degree in computer science and a master''s
    degree in data science. This was a good background for his career in crypto. He
    went on to start various companies in the space. One he was able to sell.


    His latest venture is Rarible, where he serves as the head of product. He also
    operates as a nomad. That is, he does not have a permanent residence. Instead,
    he lives primarily in Airbnbs in various parts of the world.


    He cofounded Rarible in the summer of 2019. “We kept running into three types
    of people,” he said. “One thought that crypto was too complex. The other believed
    there was no need for the technology and that they just needed a credit and debit
    card. Then there were those who were the diehard believers.”^([^(172)](#fn172))


    For Alex, he saw an opportunity. He thought the timing was right to build a crypto
    marketplace for those who considered the technology too difficult.


    At the time, the wallets were getting easier. “But there was not a lot of fun
    you could have with crypto,” Alex said. “This is why we focused on NFTs.”


    His team was able to build a platform that made it easy for users to create and
    sell NFTs. “It just took a couple clicks for users,” said Alex.


    There was also the creation of an API. This made it possible for anyone to create
    their own Web3 marketplace.


    The target market was crypto art. To build a following, Alex and his team bootstrapped
    the user base, such as by reaching out to communities on Twitter.


    The strategy worked and Rarible started to grow. Yet the market would quickly
    shift. Users were becoming more interested in profile NFTs. “We had to change
    the direction of the company,” said Alex. “But this is an advantage of a startup.”


    In building a successful Web3 firm, he believes that the founding team needs to
    be crypto native. This means that they must have a deep understanding of the technology,
    such as by reading the key whitepapers. If the interest about Web3 is mostly about
    being part of the next-big thing, then he thinks this will not work. “You need
    to believe in the core principles of Web3, like decentralization,” said Alex.
    “This must be a part of your DNA.”


    In 2021, Rarible announced its Series A round. The company raised $14.2 million
    from Venrock Capital, CoinFund, and 01 Advisors.^([^(173)](#fn173)) At the time,
    the company had reached $150 million in sales.'
  trans: '

    # Fractal


    贾斯汀·坎是互联网视频的先驱。2007 年，年仅 20 岁出头的他，将一个网络摄像头绑在头上，直播自己的生活，这个节目托管在 `Justin.tv` 上。这引发了“生活直播”的潮流。^(¹⁶⁵)


    坎坚持了大约八个月。没错，这为他带来了大量曝光，也帮助提升了 `Justin.tv` 的流量。


    然而，坎从中看到了巨大的商机。他帮助将 `Justin.tv` 转变为一个视频中心。随后，他又协助创立了 `Twitch`。这开启了一股新风潮——即电子游戏的实时直播。这最终催生了电子竞技产业。接着在
    2014 年，`Twitch` 以 9.7 亿美元的价格卖给了亚马逊。^(¹⁶⁶) 当时，该平台拥有超过 5500 万用户。


    需要注意的是，坎并未停止寻找下一个重大商机。他相信这与 NFT 有关。为此，他在 2021 年联合创立了 `Fractal`。这是一个基于 `Solana`
    区块链的市场，用户可以在其中直接从游戏公司购买 NFT。坎已经为这项事业筹集了 3500 万美元。^(¹⁶⁷)


    `Fractal` 的一个关键部分是 `Launchpad`。这是一项帮助游戏公司销售其 NFT 系列的服务。


    但并非任何人都能在 `Fractal` 市场上进行销售。这里有严格的审核流程，有助于提升品质和安全性（该公司仅接受大约 5%的提交申请）。坎认为 NFT 的未来需要策展。


    `Fractal` 上的一些游戏包括 `Yaku`（赛车）、`House`（实时策略）和 `Tiny Colony`（多模式游戏）。该市场上的所有游戏的 NFT
    系列都已售罄。


    # Magic Eden


    2021 年，Sidney Zhang、Jack Lu、Zhuoxun Yin 和 Zhuojie Zhou 联合创立了 `Magic Eden`。他们都在科技界拥有深厚根基，曾在
    `Uber Eats`、`Facebook AI`、`FTX` 和 `Coinbase` 等公司任职。`Solana` 区块链是这项事业的一大吸引力。当 Lu
    在 `FTX` 工作时，他亲身体验了这项技术。


    `Magic Eden` 是一个优先考虑 Web3 的 NFT 市场（Lu 为公司起这个名字，是因为它蕴含着无限可能的感觉）。它是第一个允许竞标、提供稀有度指数，并建立连接二级市场的铸造系统的平台。它也已迅速成为最大的基于
    Solana 的平台。以下是一些数据指标：^(¹⁶⁸)


    - 每月超过 1000 万独立访客

    - 超过 4000 个系列

    - 超过 10 万个钱包连接

    - 二级市场交易量达 10 亿美元


    该公司已筹集了 2700 万美元的风险投资。


    # OpenSea


    2015 年，软件工程师 Devin Finzer 联合创立了 `Claimdog`。这是一项可以查找是否有企业欠你钱的服务。一年后，他将公司卖给了 `Credit
    Karma`。在那里，Finzer 了解了区块链技术，并将其视为他下一个创业公司的沃土。


    他的想法是 `WifiCoin`。它允许使用代币来共享无线路由器。Finzer 为这项事业获得了 `Y Combinator` 的支持。然而，几个月后，他改变了业务方向。由于
    `CryptoKitties` 的流行，他看到创建一个 NFT 市场有着更大的机会。于是，`OpenSea` 诞生了。


    虽然公司在成长，但直到 2021 年才迎来转折点。结果，Finzer 毫不费力地从精英风投公司那里筹集到了巨额资金。到 2022 年初，他以惊人的 133
    亿美元估值筹集了 3 亿美元。^(¹⁶⁹) 主要投资者包括 `Paradigm` 和 `Coatue Management`。


    有了如此强大的支持，`OpenSea` 得以招募到顶尖人才。该公司成功聘请了前 `Lyft` 首席财务官 Brian Roberts 和前 `Meta` 商务副总裁
    Shiva Rajaraman。


    在融资时，`OpenSea` 当月的交易量超过 24 亿美元。这同比增长了超过 600 倍。^(¹⁷⁰)


    根据 Finzer 的一篇博文：“我们专注于通过引入功能和简化流程来抽象化区块链的复杂性，从而降低 NFT 的准入门槛。我们也在加速多链支持，并优先进行改进，帮助人们通过更好的工具、分析和展示方式，来发现、管理和展示他们的
    NFT。”^(¹⁷¹)


    # Rarible


    Alex Salnikov 拥有计算机科学学士学位和数据科学硕士学位。这为他在加密货币领域的职业生涯奠定了良好基础。他接着在相关领域创办了多家公司，其中一家成功售出。


    他最新的创业项目是 `Rarible`，他在其中担任产品主管。他也过着游牧式的生活。也就是说，他没有固定住所，主要生活在世界各地的爱彼迎（Airbnb）民宿中。


    他于 2019 年夏天联合创立了 `Rarible`。“我们不断遇到三类人，”他说，“一类认为加密货币太复杂。另一类认为这项技术没有必要，他们只需要信用卡和借记卡。还有一类是死忠粉。”^(¹⁷²)


    对于 Alex 来说，他看到了机遇。他认为，为那些认为该技术太难的人构建一个加密货币市场的时机已经成熟。


    那时，钱包的使用已经变得更简单。“但加密货币能带来的乐趣并不多，”Alex 说，“这就是我们专注于 NFT 的原因。”


    他的团队能够构建一个平台，让用户可以轻松创建和销售 NFT。“用户只需点击几下就行，”Alex 说。


    他们还创建了一个 API。这使得任何人都能创建自己的 Web3 市场。


    目标市场是加密艺术。为了建立用户群，Alex 和他的团队通过自主推广来积累用户基础，例如在推特上联系相关社群。


    这个策略奏效了，`Rarible` 开始成长。然而，市场很快发生了转变。用户对个人资料 NFT 更感兴趣了。“我们不得不改变公司的方向，”Alex 说，“但这也是初创公司的优势所在。”


    在建立成功的 Web3 公司方面，他认为创始团队必须是“加密原生”的。这意味着他们必须对技术有深刻理解，比如阅读关键的白皮书。如果对 Web3 的兴趣主要是为了跟上下一波热潮，他认为这是行不通的。“你需要相信
    Web3 的核心原则，比如去中心化，”Alex 说，“这必须是你的基因的一部分。”


    2021 年，`Rarible` 宣布了其 A 轮融资。该公司从 `Venrock Capital`、`CoinFund` 和 `01 Advisors`
    筹集了 1420 万美元。^(¹⁷³) 当时，公司的销售额已达到 1.5 亿美元。

    '
- fmt: '# Pastel Network


    Anthony Georgiades and Jeff Emmanuel cofounded Pastel Network in 2018. They believed
    that the NFT market was poised to take off. However, they saw inherent problems.
    The NFT platforms were reliant primarily on existing Layer1 blockchains that were
    not built for the particular needs of NFTs.


    With the Pastel Network, the founders created an application-specific Layer-1
    blockchain. It reduced the high transaction fees, improved the security and lowered
    the inefficiencies. There were also features added to provide for counterfeit
    protection, authenticity, and permanent storage.


    “From digital collectibles to media to documents to applications, users and developers
    are able to certify asset rareness and truly store data forever,” said Georgiades.
    “Lightweight protocols delivered by interoperable open APIs such as `Sense` and
    `Cascade` can be easily integrated across existing networks. A wide range of Web3
    applications can be built directly on the Pastel Network, enabling developers
    to enjoy the scalable registration features, storage processes, and security of
    the broader ecosystem.”^([^(174)](#fn174))


    In terms of the security infrastructure, it is a multilayer technology protocol
    for the consensus mechanism. All network nodes use `Proof-of-Work (PoW)` while
    Pastel’s decentralized network of `SuperNodes` currently use an innovative form
    of `Proof-of-Stake (PoS)`.


    The business model involves a modest transaction fee. There is a small amount
    that is burnt. This means it is taken out of the supply to serve as a way to avoid
    inflation of the tokens.


    There are no licensing fees for integration partners. This has been critical in
    spreading the technology.


    Regarding advice for Web3 entrepreneurs, Georgiades says: “First and foremost,
    entrepreneurs need to come into the space with a long-term outlook and objective.
    Technology, product development, and user adoption can take years to pan out.
    It is easy to get caught up in short-term excitement. However, it is important
    to stay prudent and patient when building new technologies and companies. With
    that in mind, entrepreneurs should really develop a good understanding of the
    basics - such as what is a blockchain or private key, how smart contracts work,
    and what does Web3 really entail? From there, you can start to gain a better knowledge
    of the various players in the ecosystem, where they all fit into the larger picture
    of Web3, and where innovation can be maximized.”


    He also believes that entrepreneurs need to make security a high priority. And
    this must start from day one. “Web3 isn’t an inherently dangerous or risky space,
    but it is still in its early days and malicious users are taking advantage of
    that to scam and hack projects and consumers,” said Georgiades. “One of the biggest
    ways to maximize security is prioritizing infrastructure and decentralization.
    A majority of failures come from overly centralized networks, managed by a small
    group of stakeholders, which are more susceptible to attacks. To avoid central
    points of failure, it’s important to adequately distribute participants involved
    in reaching consensus and performing network operations. Nodes should also be
    distributed across a diverse range of users and entities, again, to avoid a single
    entity holding too many nodes, and thus too much control.”


    # Rally


    Rob Petrozzo says that he cofounded Rally because of missed opportunities. For
    him, it was about being a fan of basketball superstar, Michael Jordan.


    While as a teenager, he knew which sneakers he wore in specific games, which cars
    he drove to the arena, and just about every stat. “Even at a young age, I could
    have told you something as obvious as ‘Michael Jordan''s rookie card is going
    to be worth 6 figures one day,’” he said.^([^(175)](#fn175))


    But for Petrozzo, he did not have the access to collectibles or the resources
    to make a purchase.


    So this is where Rally comes in. Launched in 2016, it is a fast-growing marketplace
    where you can buy and sell equity shares in ultra-rare assets, including NFTs.
    It’s similar to how you would use an app like `Robinhood` to buy stocks. “At Rally,
    we wanted to solve that for every person who can see around the corners and would
    sooner invest in these items that they truly care about and obsess about, but
    don’t know where to start,” said Petrozzo. “To be able to turn that nostalgia
    or turn those aspirations into equity, and to allow people to do it at whatever
    price they''re comfortable with is fulfilling that promise to the 10 year old
    me that said ‘I’m going to have that one day.’”


    Before starting the company, he had a successful career as a digital designer.
    He worked with clients across industries like music, publishing, and biotechnology.
    This experience was crucial in creating an engaging marketplace.


    True, `OpenSea` is the clear dominant player in secondary transactions for NFTs.
    But Petrozzo realized there were other attractive categories to target.


    “We’ve been able to give access to the most expensive and most recognized NFTs
    without having to onboard investors into an entirely new and often intimidating
    payment process,” he said. “That’s allowed us to take projects like Bored Ape
    Yacht Club and CryptoPunks, and run IPOs at around $10 per share, often putting
    more investors in single NFTs than there are total owners of all the NFTs in that
    particular project. Our first CryptoPunk NFT Initial Offering sold out incredibly
    quickly, and was purchased by nearly 4,000 unique investors. At that point, there
    were only around 3,800 total unique owners of all 10,000 CryptoPunks.”


    His advice to Web3 entrepreneurs is simple. Interestingly enough, it’s similar
    to the iconic Nike motto: Just start the business.


    “The Web3 space is the true embodiment of creating a minimum viable product and
    building within the community as it grows,” said Petrozzo. “Perfection is the
    enemy, and the stories around many of the biggest projects are still being written.
    If you can find a way to bring anything unique to the masses or build for an underserved
    audience, there’s never been more access to the frameworks available in Web3.
    Build, release, and iterate based on the feedback of the community you’re serving.”


    In late 2021, Rally announced a funding round of $15 million.^([^(176)](#fn176))
    The lead investor was `Wheelhouse`. In all, the company has raised over $65 million.'
