- fmt: '# Examples of NFTs


    The music streaming industry has become a massive global business. For example,
    Spotify has 180 million paid subscribers and 406 million monthly active users
    (MAUs).^([^(131)](#fn131)) The service is available in 183 markets.


    Despite this, the rewards for the musicians is far from attractive. Consider that
    Spotify has eight million musicians on its platform and only about 14,000 make
    $50,000 or more per year.^([^(132)](#fn132)) In other words, many of them cannot
    make a living from this channel.


    But this is where NFTs can make a difference. It is a way for musicians – or any
    creators – to better monetize their art. They can often keep more than 95% of
    the revenues.


    True, if creators do not use a platform like Spotify, they will not have the enormous
    scale. But in the Web3 world, you do not need large numbers. Rather, it’s more
    about catering to your avid fans. They will likely be willing to spend more money,
    such as through the use of NFTs. This can also be an effective way for the creators
    to build even stronger connections with their fans.


    Take the example of the band, Kings of Leon. In early 2021, they released their
    new album as an NFT. It was the first time that this had been done.


    The band provided three types of tokens.^([^(133)](#fn133)) They provided different
    perks, whether VIP seats, exclusive art, and so on.


    The band raised over $2 million from its NFT offering.^([^(134)](#fn134)) About
    $500,000 was a donation to Live Nation’s Crew Nation, which helped music crews
    during the COVID-19 pandemic.


    This is not to imply that it is easy to make money from NFTs. It’s not. The fact
    is that you will still need to rely on marketing, say with a following on Instagram,
    Facebook, or Twitter. These are still very effective channels for super fans.


    Just take a look at the interesting case with Brandon Sanderson, a top fantasy
    writer of series like “Mistborn.” In 2022, he set up a Kickstarter campaign. It
    had different tiers for his readers that included access to four upcoming novels,
    and monthly subscription boxes.


    Well, it was a huge success. In all, Sanderson raised $41.7 million.^([^(135)](#fn135))


    It definitely highlighted the power of crowdfunding. But it also showed the importance
    of traditional publishers like Tor. Let’s face it, this helped Sanderson build
    up a loyal following – which he developed since he started publishing his works
    in 2003.


    # Buying and Creating NFTs


    Buying an NFT can be cumbersome. And this is one of the drawbacks of the market.
    Although, the process will inevitably get better.


    The first step in buying an NFT is getting the right token for the transaction.
    Often this is ether. You can get this from a crypto exchange like Coinbase.


    Next, you need to transfer your cryptocurrency to a wallet and a common one is
    MetaMask. Then you will need to connect your wallet to an NFT marketplace. Here
    are some examples:


    - OpenSea

    - NBA Top Shot

    - CryptoPunks

    - Rarible

    - Foundation

    - Binance NFT

    - Nifty Gateway

    - Mintable


    You will search around the marketplace. When you find an NFT that you like, you
    will then make a purchase. There may also be an auction for it. Regardless, the
    NFT will be in your wallet, and you can sell it in the future, such as on a marketplace.


    OK then, so how do you create an NFT? Of course, you will need to specify an item
    that it will represent. Again, this can be just about anything. But the item should
    be something that you have a right to. If not, you could be violating the copyright
    laws and you may potentially be liable for damages.


    You will then select the type of blockchain. Usually, this is Ethereum. Next,
    you will need to set up your digital wallet and then buy cryptocurrency. You will
    then select the NFT marketplace and make the connection to your wallet. You will
    upload the digital file, such as a GIF, PNG, or MP3.


    You’ll decide on how to sell your NFT. The options include the following:


    - Fixed price

    - A timed auction

    - Unlimited auction. This means you can end it when you want


    If you have an auction, you will set a minimum price as well as the royalty levels
    (this is for subsequent sales on secondary markets). However, the fees can be
    significant, such as with the gas for Ethereum. It’s actually common to lose money
    on NFT sales because of this.


    # The Value of NFTs


    As is the case with cryptocurrencies, it’s difficult to value NFTs. It’s generally
    a subjective process.


    Yet there are some guidelines to consider. Here’s a look:


    - **Rarity**: Scarcity can create value. It certainly helps that NFTs are unique.
    But of course, this is little help if there is not much interest in the digital
    item. This is why it’s typical that a valuable NFT – especially when it comes
    to art and entertainment – is something that is exclusive or different. This was
    definitely the case with Beeple.


    - **Utility**: This is usually for digital items that are not art. Basically,
    utility means that you can do something with the NFT. An example would be one
    that allows you to get into a concert (although, such as NFT may have limited
    value because there will likely be a time limit). Another case is where you can
    use it as a way to make purchases in a game or the Metaverse.


    - **Tangibility**: This is when the NFT has a connection to the physical world.
    An example is real estate. A token can represent fractional ownership. This can
    help with recordkeeping and reducing the potential for fraud.


    - **Provenance**: This is a history of who has owned the NFT. This can provide
    insight on the value of the item. After all, the prior owners may have a good
    track record with NFTs.


    - **Liquidity**: Looking at the blockchain, has the NFT seen continued interest
    from buyers? What has been the demand for similar digital items?


    - **Social Proof**: This describes where a celebrity is backing the NFT. True,
    this is not guaranteed to create value. But it is still a very important factor
    to consider.


    - **Interoperability**: This means you can use the NFT for other platforms. For
    example, you could buy NFTs on one game, but use it for another one.'
