    # 9. Taxes and Regulations


    How to Navigate the Web3 World


    Brian Armstrong, who is the cofounder and CEO of Coinbase, has noted: “My belief
    is that the vast majority of people using digital currency today are not seeking
    to evade taxes. They are simply investors seeking returns and people interested
    in a nascent new technology.”^( [231](#fn231) )


    This seems like a reasonable assessment. Yet taxes are certainly a major consideration
    with the crypto world. A big issue is that there remains uncertainty – and this
    can make it difficult for businesses to operate.


    Consider a survey from CoinTracker. When it was taken – on March 27, 2022 – about
    96% of the respondents still had not filed their tax returns and 75% said they
    were not ready to do so.^( [232](#fn232) ) The survey also showed that many people
    could not assess the correct approach to taxes for typical crypto transactions.


    So, in this chapter, we’ll get an overview of this topic. Again, it is subject
    to change. Keep in mind that the IRS still has not ruled on various important
    issues. The same goes for many states.


    For this chapter, we’ll also take a look at regulations for Web3 and the focus
    will be on the United States.


    ## Crypto Taxes


    In 2021, the IRS ramped up its efforts with crypto transactions. This was certainly
    evident with the new 1040 form. There is the following question: “At any time
    during 2021, did you receive, sell, exchange, or otherwise dispose of any financial
    interest in any virtual currency?”^( [233](#fn233) )


    On its face, this seems straightforward. But the question has vague aspects. For
    example, what does it mean to “receive” virtual currency? Is this from a gift
    or the issuance from a company or an inheritance? It’s not clear.


    Something else: What is “any financial interest”? Do you need to own it? Or does
    it mean something else – like a sharing arrangement?


    Again, it’s far from clear.


    Then what to do? When it comes to taxes on crypto, there often is a need for judgment
    calls. This is why it is important to get the advice of a qualified CPA (Certified
    Public Account) or Enrolled Agent (EA). They will know how to interpret the tax
    laws but also provide guidance on what the IRS is looking for.'
