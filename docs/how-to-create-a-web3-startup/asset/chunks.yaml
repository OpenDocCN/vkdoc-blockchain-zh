  trans: '

    # 挑战


    当扎克伯格表示元宇宙需要很长时间才能实现时，他其实非常现实。这大概并非为了降低外界预期。


    首先，当前的元宇宙需要巨大的计算能力。以 `Decentraland` 为例，这家成立于 2017 年的公司是顶级元宇宙平台之一。在该平台上，你可以使用基于
    `MANA` 加密货币的 NFT 购买虚拟土地。


    但要运行这个游戏，你需要一台配备来自英伟达或超威半导体公司的高端 `GPU`（图形处理器）芯片的台式电脑。换句话说，这将比普通电脑贵出数千美元。


    对于元宇宙，你还需要一个 VR 头显。确实，这类设备的价格已经下降。例如，Meta 的 `Oculus` 售价在 300 到 500 美元之间。


    然而，VR 头显的问题在于体验。本章前面提到，元宇宙的视觉效果中通常没有腿部。但还有其他问题。


    其中最显著的问题之一是 VR 头显可能导致晕动症。在某些情况下，人们甚至会呕吐！


    另一个问题与空间有关。如果你沿着一条长长的路径行走会怎样？嗯，这可能行不通，因为你可能身处一个小房间内。


    还有人撞到墙壁或其他物体的情况。有时这会导致受伤——甚至骨折。^(²¹⁰) 甚至还有“大猩猩手臂综合征”，这是长时间举起手臂导致的疼痛。


    尽管如此，VR 头显仍在不断进步。它们变得更易用，也更强大。其增长势头也十分强劲。根据 `IDC` 的数据，到 2025 年，全球 VR 头显的出货量预计将达到
    2870 万台。^(²¹¹)


    除了设备本身的问题，现有的互联网基础设施也需要进行重大升级。诚然，`5G` 将在延迟方面提供巨大帮助，但可能还需要对数据中心进行大量投资。沉浸式体验所需的数据量是巨大的。


    另一个困扰元宇宙的问题是 `AI`。要使其发挥作用，需要获取合适类型的数据，以便算法能够随着时间推移进行学习。此外，还存在隐私和偏见方面的难题。


    如果数据管理不当，体验可能会非常奇怪。环境中的形状和运动可能与预期不同步。


    不过，也有一些创新技术可以提供帮助。`AI` 在使用合成数据方面正变得越来越好。顾名思义，这是基于特定外推或假设的人工数据。这可以产生更大量且相当干净的数据。


    “我们正进入一个以数据为中心的 `AI` 发展的新时代，通过利用实时 3D 的虚拟世界，我们可以用合成数据让世界变得更美好，”Unity 公司`AI` 高级副总裁
    Danny Lange 说道。“合成数据之所以重要，是因为它是为满足现有数据中不存在的特定需求或条件而生成的。这在许多情况下都很有用，例如当隐私要求限制数据可用性或规定其使用方式时。其好处还包括克服现实世界数据中不必要的偏见。”^(²¹²)


    此外，尚不清楚元宇宙的普及程度会有多高。例如，像 `Second Life` 这样的早期形态最终只成为了小众市场。但话说回来，它们当时也没有如今这么发达的技术。然而，似乎确实会有相当多的人宁愿不参与其中。嘿，他们可能只是更喜欢自己的物理宇宙！


    另一方面，也会有另一些人希望在元宇宙中度过所有时间。这实际上类似于家长面对沉迷电子游戏的孩子时所遇到的问题。


    底线：元宇宙存在很多未知数。但这并没有阻止企业家们。事实是，这一领域将继续受到关注。


    **注意**


    为了应对元宇宙的特殊问题，企业家们正在寻求开发创造性的解决方案。例如，一种选择是万向跑步机，它可以模拟在广阔区域内行走。事实上，一些房地产开发商正在建造拥有专属元宇宙房间的住宅。^(²¹³)


    # 元宇宙中的营销


    虽然 `Web3` 商业模式的焦点是加密货币支付，但在元宇宙中，商业机会可能有所不同。诚然，由于存在虚拟经济，加密货币仍将非常重要。但品牌塑造很可能成为变现的另一个关键部分。


    其营销效果可能优于典型的横幅广告或嵌入 Facebook 信息流的视频。元宇宙的广告将成为沉浸式、引人入胜的环境的一部分。


    一个有趣的例子是 `Roblox`。该公司的起源可以追溯到 1989 年。创始人 David Baszucki 和 Erik Cassel 开发了一个流行的
    2D 软件系统，用于为学生模拟物理实验室。基于这一经验，他们随后在 2004 年创建了 `Roblox` 平台。不过，这次是 3D 虚拟世界。它还提供了像
    `Roblox Studio` 这样的工具，允许用户创建自己的物品、游戏和应用程序，然后进行出售。


    目前，其`DAU`（日活跃用户）接近 5000 万。^(²¹⁴) 2021 年，该公司收入达 19 亿美元，同比增长 108%。


    那么，品牌的营销机会如何呢？一个有趣的例子是 `Chipotle Burritor Builder`。^(²¹⁵) 这是 `Roblox` 平台上的一个模拟游戏。基本上，这是一场竞赛，看谁能成功地卷起墨西哥卷饼，这可能需要技巧。获胜者将获得
    `Burrito Bucks`。你可以用这些积分在 `Chipotle` 应用程序和 `Chipotle.com` 上购买主菜。


    另一个例子是 `Molson Coors Beverage`。这家啤酒制造商与 `Decentralized` 合作创建了一个虚拟酒吧。^(²¹⁶) 用户可以倒啤酒并与他人交谈。甚至还可以选择播放点唱机。`Molson
    Coors Beverage` 选择 `Decentralize` 平台，因为它仅通过浏览器访问，并允许按年龄限制用户。


    用户平均在虚拟酒吧停留约 20 分钟。总而言之，这种营销努力可能比典型的广告更具吸引力。


    不出所料，`Meta` 已经在自己的元宇宙中尝试营销机会。这在与 `Oculus` VR 头显集成的 `Horizon` 平台上尤为明显。用户可以探索成千上万个不同的虚拟世界，甚至可以创建自己的世界。


    2022 年，`Wendy''s` 在 `Horizon` 上推出了自己的虚拟空间。该公司称之为 `Wendyverse`，一个虚拟餐厅。^(²¹⁷) 重点是为疯狂三月的大学篮球锦标赛服务。在
    `Wendyverse` 中，用户可以投篮和扣篮。

    '
- fmt: '# The Enterprise


    Much of the activity for the metaverse has been with gaming and other consumer
    applications. But this is likely to change – and perhaps soon. Enterprises are
    also seeing the huge potential of this market.


    “There is a major opportunity for the industrial metaverse,” said Lange. “The
    goal is not about social interaction. Rather, it’s about simulating experiences
    in the virtual world before moving into the physical world.”


    This could be bigger than the consumer opportunity. Just look at the global supply
    chain. Because of the impact of the Covid-19 pandemic, it has been under tremendous
    stress. The result has been scarcity of items and higher inflation.


    But the metaverse could be a major help. Because of the 3D visuals, it can be
    easier to understand the workflows. This will mean that you can spot the bottlenecks
    and find more optimal approaches.


    Here’s a look at what some companies are doing with enterprise applications in
    the metaverse:


    - In late 2021, `Accenture` ordered 60,000 `Quest 2` virtual reality headsets.
    The reason was for training and onboarding. The company was planning on hiring
    up to 125,000 new employees and VR could help streamline the process. But the
    use of the headsets could also be a way for the company’s consultants to better
    understand the technology and find ways to help their clients. When it comes to
    enterprise systems, a big factor in getting adoption is the buy-in from IT consultants.
    For `Accenture`, this order was just the first phase in the company’s aggressive
    VR roadmap.


    - `Nike` has filed several trademarks for “Nike,” “Just Do it,” “Air Jordan,”
    “Jumpman,” and the swoosh logo. The reason? The company appears to be making moves
    to sell digital items in the metaverse. `Nike` also has been hiring virtual material
    designers. According to one job ad: “You will have a deep understanding of shading
    models, material capture solutions, rendering technology, and can seamlessly navigate
    between real-time and path tracing platforms. You are passionate about designing
    new materials and developing the look of a scene to tell a story!”


    - `BMW` has partnered with `Nvidia` to use VR, robotics, and AI for smart factories.
    This is done by using `Nvidia`’s `Enterprise Omniverse` platform. There is also
    the use of the `EGX` edge computing system, the `Aerial` software development
    kits for high-end GPUs, and software-defined 5G wireless radio to access networks
    on the factory floor. With all this, design teams at `BMW` can collaborate in
    a 3D environment. The result is that a factory line can manufacture up to ten
    unique cars, with more than 100 options. The system also emulates digital humans,
    which are used to test new workflows in a simulation. This helps to speed up the
    development process and lower the costs.


    - The `Johnson & Johnson Institute` teamed up with `Osso VR` and `Oculus for Business`.
    The goal was to improve training for surgeons. Keep in mind that a big part of
    training has been for residents to observe experienced surgeons. While this is
    certainly effective, it is difficult to scale. The problem is that surgeons need
    to know about many more complex systems and devices. To better deal with this,
    `Johnson & Johnson` was able to create a virtual environment for getting realistic
    simulations of using implant orthopedic devices. For example, when doing intramedullary
    nailing of a tibia, the scores for students were 233% higher compared to passive
    learning tools.


    But metaverse technologies do not have to be this grand. After all, many companies
    do not have these sophisticated needs or the resources for these investments.
    Yet there are still many use cases for the metaverse for smaller organizations.


    One area is with workplace communications. It’s true that offerings like `Zoom`,
    `Google Meet`, and `FaceTime` have been effective. But there are still limitations.


    “With the metaverse, we will move toward more seamless interactions between people
    all over the physical world,” said Rebecca Binny, who is the Director of PR +
    Marketing for `RayCo Media`. “Coming together in the metaverse, people can present
    themselves however they feel confident doing so, which is empowering and emboldening.
    These new, hyper personal communication models can be more authentic, and thus
    more trust-building, than face-to-face conversations, which are often stifled
    by social anxieties and power differentials. Early studies show that computer-mediated
    communication leads to higher productivity, saves time and money, connects people
    around the globe with ease, and fosters cooperation.”


    As mentioned earlier in this chapter, AI will be a major factor. But it will not
    just be about creating more immersive experience. The metaverse can actually improve
    the results of AI. For example, it can allow for better predictions, such as with
    the need for maintenance for equipment.


    “The biggest opportunity for the metaverse is the massive flow of data from the
    real world into the metaverse and back into the real world,” said Lange. “It is
    this flywheel of data enriched with AI that will enable continuous improvement
    to the metaverse experience.”


    The metaverse will certainly have a major impact on ecommerce. In fact, it may
    ultimately challenge the seemingly invincible Amazon.


    “While it was very difficult for people to envision back during the 1990s that
    the internet would transform commerce, there were a few companies and entrepreneurs
    that decided to make investments early,” said George Korizis, who is the Customer
    Transformation Leader at `PwC US`. “Those were the ones that received the dividends
    when the world implemented e-commerce and social media. Something similar will
    happen with the metaverse and businesses will soon realize that this is not just
    another marketing channel. We are seeing the beginning of a deep and significant
    transformation that will touch every sector of the economy.”


    But of course, there will be challenges. Again, there needs to be much more investment
    in software, infrastructure, and gear. But privacy will be another important consideration.
    With the Metaverse, you might be better able to detect the behavior of employees
    or customers. So, what can you do with the information?


    Well, it seems like a good bet that there will be restrictions.


    “Establishing trust must be a foundational element throughout every business’
    metaverse journey,” said Korizis. “To cultivate trust among consumers, shareholders,
    regulators and other stakeholders, communicate early what to expect from your
    metaverse initiatives and how you will mitigate potential risks.”


    As for the rest of the chapter, we’ll look at some other interesting startups
    in the metaverse space.'
