  trans: '

    # 捐赠


    捐赠加密货币和 NFT 已变得更加流行。这无疑是一种支持公益事业的独特方式。例如，当俄罗斯入侵乌克兰时，加密货币捐赠出现了激增。


    当然，其中也存在税务和遗产规划方面的优势。当你进行捐赠时，不会触发应税事件。此外，如果你持有该数字资产超过一年并采用逐项扣除法，你可以扣除最高达你调整后总收入（AGI）30%的金额。超出此限额的部分，可以结转到未来最多五年内抵扣。


    如果你持有加密货币一年或更短时间，并采用逐项扣除法，你可以扣除该数字资产的计税基础或公允市场价值中较低的那个。此捐赠的扣除额上限为 50%，并且同样有五年的结转期。


    对于上述每种情况，你都需要提交`Form 8283`表格。如果捐赠或赠与的金额超过 5000 美元，你需要获得第三方的评估报告。


    虽然这一切可能对你的税务有利，但存在一个问题。事实上，许多慈善机构和非营利组织并不接受加密货币捐赠。


    诚然，你可以先卖掉你的加密货币，然后再进行捐赠。但当然，你可能需要为这部分收益缴纳资本利得税。


    # 美国国税局（IRS）


    美国国税局是世界上最大的催收机构。它拥有强大的权力，例如扣押你的财产、传唤你的记录，甚至监禁你。


    鉴于这一切，你真的需要警惕加密货币的税务问题。犯错很容易——而且是的，代价可能很高。要知道罚款可能相当重。


    你还应该妥善保存你的记录。这样，如果遇到 IRS 审计，你就能做好准备为自己辩护。这将大大有助于减轻或避免任何不利影响。


    然而，如果你确实收到了 IRS 的通知，那么最好的办法是寻求税务专业人士的帮助。


    # 网络安全与监管


    网络安全漏洞的风险或许是推动监管的最大因素。诚然，比特币和其他核心区块链的安全性极为强大。问题在于，构建在平台之上的系统和应用程序存在安全隐患。在很大程度上，入侵和黑客攻击已经变得更加普遍。


    一个显著的案例是涉及大量 NFT 交易的虚拟世界 Axie Infinity。2022 年，该公司通知其用户，发生了超过 6 亿美元的黑客攻击事件。²³⁷
    这实际上是加密货币历史上第二大的黑客攻击。


    黑客得以控制为 Axie Infinity 提供动力的 Ronin 系统。然而，该公司在六天后才发现此事。²³⁸ 但当然，为时已晚。


    Axie Infinity 紧急从币安、Animoca Brands、a16z、Dialectic、Paradigm 和 Accel 等投资者手中筹集了 1.5
    亿美元资金。²³⁹ 该公司表示，计划动用自己的资金来赔偿用户。


    他们还启动了对平台的重大升级，并增加了 DAO 的验证者数量。未来将进行更频繁的审计。


    尽管如此，这一事件对于 Web3 社区来说仍然是震惊性的。参与 1.5 亿美元融资轮的投资者正在试图重建一些信任。但最终，如果黑客攻击继续发生，该行业似乎很可能面临更严格的监管。


    **注意**


    根据 Chainalysis 的研究，2021 年犯罪分子窃取了约 140 亿美元的加密资产，高于前一年的 78 亿美元。²⁴⁰


    # 加密货币监管会是什么样子？


    2022 年初，拜登总统宣布了关于加密货币的行政命令。它被称为“确保数字资产的负责任发展”。²⁴¹


    该文件没有提供任何新的法规或要求。相反，它指示联邦机构研究加密货币市场并提供建议。


    这是一个明智的做法。这个市场非常复杂且不断变化。此外，看来政府不想施加不必要的负担。几十年来，美国一直是全球金融的领导者。而加密货币对延续这一领导地位可能很重要。


    然而，政府认识到需要设置护栏。该行业似乎总体上对此也表示支持。如果没有足够的消费者保护，加密市场的增长很容易停滞。


    要说的话，这与 20 世纪 20 年代的情况类似。当时，股市存在大量投机行为。但这导致了过度风险，例如以股票为抵押进行借贷。


    当 1929 年股市崩盘时，这助燃了大萧条。结果，股市多年交易低迷。为了帮助重拾信心，罗斯福政府通过了多项立法，引入了联邦证券法。成立了证券交易委员会（SEC）来执行这些法律。主要目标是要求公司提供足够的信息披露，以便投资者做出审慎的决策。这是通过招股说明书等文件实现的。


    在加密货币方面，似乎不太可能创建一个新的机构。SEC 最终可能会成为执行任何新法律的主要机构。或者可能是与其他机构的协调合作。


    但似乎很可能会有一些要求更详细信息披露的规定。这还将得到第三方审计的支持。


    可能还会有针对特定行业的法规，尤其是在医疗保健和金融服务等领域。隐私问题当然存在重大挑战。例如，对于一家医疗保健公司，使用以太坊区块链可能很困难。如果它与多家公司共享，这实际上可能违反反垄断法。


    还有一点：由于加密货币是一个全球性行业，需要了解其他国家的法规。它们最终可能比美国以外的地区更具限制性。因此，推出一个应用程序可能会很困难。


    **注意**


    在拜登关于加密货币的行政命令中，有一项条款探讨了为美国开发一种数字货币的可能性。这可能带来重要好处，例如更低的成本和快速结算。但开发它很可能具有挑战性。财政部长珍妮特·耶伦表示，创建数字货币可能需要数年时间。²⁴²


    在加密货币监管方面，了解可能发生情况的一个指南是看看纽约州金融服务部。该机构监管着世界上许多最大的金融机构。


    一项重要举措是鼓励公司使用分析软件进行合规，例如用于反洗钱法律。²⁴³ 在传统金融领域，这些工具已经非常有用。加密货币领域也应该如此。可以说，这甚至可能有助于降低合规成本，因为部分流程将实现自动化。


    一些风险投资公司甚至正在创建自己的立场文件来塑造监管。安德森·霍洛维茨基金就是一个例子。该公司发布了一份文件，题为“如何构建更好的互联网：为塑造 Web3
    未来的世界领袖提供的 10 项原则”。²⁴⁴


    其中包括：


    *   建立清晰的愿景，以培育去中心化的数字基础设施。

    *   对治理和监管采用多利益相关方的方法。

    '
- fmt: '# 排版后的内容


    - 创建针对不同`Web3`活动的、有针对性且基于风险的监管制度。

    - 通过可组合性、开源代码和开放社区的力量来促进创新。

    - 扩大创新经济中经济利益的获取途径。

    - 释放`DAO`的潜力。

    - 部署`Web3`以进一步实现可持续发展目标。

    - 拥抱监管良好的`稳定币`在金融包容性和创新中的作用。

    - 与其他国家合作，协调标准和监管框架。

    - 为数字资产的报告提供清晰、公平的税收规则，并利用技术解决方案实现税务合规。


    ## 律师与游说者


    对于传统金融服务公司来说，通常有一个庞大的法律部门。加密世界也正在发生同样的事情。这些公司意识到他们需要更好的保护。他们也在考虑预测潜在的法规。


    其结果是，对律师的招聘似乎与寻找顶尖开发人员不相上下。经验丰富的法律专家供应量很低。这无疑推高了薪酬待遇。有些可能达到七位数。相比之下，一名顶级联邦监管机构的年薪约为25万美元^([^(245)](#fn245))。


    然而，雇佣律师可能更便宜。相比之下，聘请一家律师事务所可能会更昂贵。


    但这一举措也受到投资者的推动。他们想要一个更好的法律基础——而拥有内部人才可以更容易地实现这一点。


    加密公司也在雇佣游说者和前监管者。例如，`Crypto.com`聘请了`Duncan DeVille`担任合规执行副总裁^([^(246)](#fn246))。在此之前，他是西联汇款的高管，也是美国财政部金融犯罪部门的官员。


    > **注意**

    >

    > `Kracken`的首席合规官——`Marco Santori`——在推特上表示，他希望在三个月内招聘30名律师。但他本希望是60名，却表示不知道如何“实现这一目标”^([^(247)](#fn247))。


    话又说回来，违规的后果可能非常严重。看看`BlockFi Lending`的情况就知道了。该公司与美国证券交易委员会（`SEC`）达成了1亿美元的和解^([^(248)](#fn248))。这是加密货币行业有史以来最大的和解金额。此后，该公司推出了一种符合`SEC`规则的新账户，例如提交注册声明。


    在另一个案例中，`Coinbase`试图推出一款借贷产品。尽管`SEC`表示将就此提起诉讼。`Coinbase`最终撤回了这一计划。


    `SEC`可能会变得更加强硬。2022年，该联邦机构宣布计划将其员工人数增加一倍，以监管加密货币市场。


    在参议院银行委员会的一次听证会上，`SEC`主席`Gary Gensler`表示：“目前，我们在加密金融、发行、交易或借贷方面缺乏足够的投资者保护。坦率地说，在目前这个时间点，这更像是一个‘野蛮西部’，或者证券法颁布之前存在的‘买家自负’的旧世界。”^([^(249)](#fn249))


    > **注意**

    >

    > 亿万富翁投资者`Warren Buffett`绝对不是加密货币的粉丝。在他2022年的伯克希尔·哈撒韦年度股东大会上，他对比特币说了以下这段话：“现在，如果你告诉我你拥有世界上所有的比特币，并以25美元的价格卖给我，我不会接受，因为我用它来做什么？我必须以这样或那样的方式卖回给你。它什么也做不了。资产要有价值，就必须为某人提供某些东西。”^([^(250)](#fn250))


    在本章的其余部分，我们将介绍`Web3`金融和网络安全市场中的一些有趣的初创公司。


    ## CertiK


    `Ronghui Gu`在中国长大。高中时，他获得了全国奥林匹克数学竞赛一等奖，这使他得以进入著名的清华大学^([^(251)](#fn251))。然而，他对主修数学并不感兴趣。他反而想专注于计算机编程。


    他最终在耶鲁大学获得了计算机科学博士学位，并成为哥伦比亚大学的教授。在那里，他遇到了耶鲁大学计算机科学教授`Zhong Shao`。他们建立了友谊，并在网络安全等领域展开合作。


    2018年，他们看到了区块链领域的机遇，并创立了`CertiK`。它基于一种名为“形式化验证”的尖端技术。这为硬件和软件系统提供了高度的安全性。它涉及使用复杂的数学和算法来证明需求和规范已得到满足。例如，流程中的每一步都被解释清楚。而且由于它纯粹基于数学，你不必信任第三方，例如安全顾问。


    `CertiK`一直是形式化验证领域的主要创新者。该公司率先推出了采用该技术的操作系统内核和云商品虚拟机监控程序。


    该技术可以应用于区块链和`Web3`之外的领域。仅举几例，包括自动驾驶、物联网和云计算。换句话说，市场机会是巨大的。


    然而，`CertiK`的主要焦点是`Web3`——这绝对是正确的选择。2022年初，该公司以20亿美元的估值筹集了8800万美元。一些投资者包括`Tiger
    Global`、`Goldman Sachs`和`Sequoia Capital`。总的来说，该公司已筹集了2.3亿美元。


    `CertiK`平台保护着超过3000亿美元的加密资产，服务对象超过2500家企业^([^(252)](#fn252))。2021年，其收入增长了12倍，利润增长了3000倍。


    ## LiquiFi


    股东名单或资本化表是证券及其所有者的列表。对于初创公司来说，它们通常包括普通股、优先股、可转换债券和员工股票期权。对于理解初创公司的估值以及管理融资来说，股东名单至关重要。


    但对于`Web3`公司来说，情况可能要复杂得多。需要有一种方法来追踪代币及其价值。`DAO`也可能存在复杂的结构。


    该怎么办呢？`LiquiFi`构建了一个在线平台来管理`Web3`公司的股东名单。其功能包括管理合约和员工股票期权的归属、税务合规和报告，以及启用代币进行质押。该公司还为客户提供咨询服务。


    该公司的创始人是首席执行官`Robin Ji`和首席技术官`Oliver Tang`。他们创立这个公司的想法源于与加密公司合作的第一手经验^([^(253)](#fn253))。创始人在2021年冬季获得了`Y
    Combinator`的初始支持。


    该公司目前运行在`Ethereum`和`Polygon`上。但计划扩展到其他区块链。


    2022年初，`LiquiFi`在种子轮融资中筹集了500万美元^([^(254)](#fn254))。一些投资者包括`Alliance DAO`、`Robot
    Ventures`、`Y Combinator`和`Orange DAO`。


    ## 结论


    在本章中，我们概述了加密行业的税收和法规。在税收方面，它们仍然有些模糊。对于`NFT`来说尤其如此。


    但美国国税局可能会在未来几年提供更多指导。该机构也在大力投资于针对加密行业潜在欺诈行为的执法行动。


    在本章中，我们还探讨了监管的可能性。对于`Web3`来说，环境仍然相当开放。但已经有迹象表明，联邦政府将考虑实施监管的方法。然而，加密公司和风险投资公司正在加强他们的游说努力。


    我们也到了这本书的结尾。我们当然涵盖了很多内容。该行业仍处于早期阶段。但通过这本书，你将拥有一个更好的基础——在核心技术、趋势和问题方面。


    所以，祝你在`Web3`之旅中好运。这肯定会令人兴奋！'
  raw: '*   Create targeted, risk-calibrated oversight regimes for different Web3
    activities.


    *   Foster innovation with composability, open-source code, and the power of open
    communities.


    *   Broaden access to the economic benefits of the innovation economy.


    *   Unlock the potential of DAOs


    *   Deploy web3 to further sustainability goals.


    *   Embrace the role of well-regulated stablecoins in financial inclusion and
    innovation.


    *   Collaborate with other nations to harmonize standards and regulatory frameworks.


    *   Provide clear, fair tax rules for the reporting of digital assets, and leverage
    technical solutions for tax compliance.


    ## Lawyers and Lobbyists


    For traditional financial services companies, there is usually a large legal department.
    The same is happening in the crypto world. These firms realize that they need
    much better protection. They are also looking at anticipating potential regulations.


    The result is that the recruiting for lawyers seems at par with that of finding
    top-notch developers. There is a low supply of experienced legal experts available.
    This is definitely driving up compensation packages. Some can be seven figures.
    By comparison, a top federal regulator’s salary comes to about $250,000.^([^(245)](#fn245))


    However, hiring lawyers could be cheaper. By comparison, retaining a law firm
    can be even more expensive.


    But this move is also being driven by investors. They want a better legal foundation
    – and this can be easier with in-house talent.


    Crypto firms are also hiring lobbyists and former regulators. For example, Crypto.com
    hired Duncan DeVille as the executive vice president for compliance.^([^(246)](#fn246))
    Before this, he was an executive at Western Union and an official at the U.S.
    Treasury Department’s financial crimes unit.


    Note


    The chief compliance officer at Kracken – Marco Santori – tweeted that he was
    looking to hire 30 lawyers within three months. But he would have preferred 60
    but said he didn’t know how to “get it done.”^([^(247)](#fn247))


    Then again, the consequences for compliance violations can be significant. Just
    look at the situation with BlockFi Lending. The company settled with the Securities
    and Exchange Commission (SEC) for $100 million.^([^(248)](#fn248)) This was the
    largest payout in the cryptocurrency industry. The company has since introduced
    a new account that meets SEC rules, such as with the filing of a registration
    statement.


    In another case, Coinbase attempted to introduce a lending product. Although,
    the SEC said it would file a lawsuit over it. Coinbase would eventually pullback.


    The SEC is likely to get more aggressive. In 2022, the federal agency announced
    that it planned to double its staff to regulate the cryptocurrency markets.


    At a Senate Banking Committee hearing, SEC chairman Gary Gensler said: “Currently,
    we just don’t have enough investor protection in crypto finance, issuance, trading,
    or lending. Frankly, at this time, it’s more like the Wild West or the old world
    of ‘buyer beware’ that existed before the securities laws were enacted.”^([^(249)](#fn249))


    Note


    Billionaire investor Warren Buffett is definitely no fan of crypto. At his 2022
    Berkshire Hathaway Annual Shareholder meeting, he said the following about Bitcoin:
    “Now if you told me you own all of the bitcoin in the world and you offered it
    to me for $25, I wouldn’t take it because what would I do with it? I’d have to
    sell it back to you one way or another. It isn’t going to do anything. Assets,
    to have value, have to deliver something to somebody.”^([^(250)](#fn250))


    For the rest of the chapter, we’ll look at some of the interesting startups in
    the Web3 finance and cybersecurity markets.


    ## CertiK


    Ronghui Gu grew up in China. While in high school, he won the national first prize
    in the Olympiad math competition, which allowed him to attend the distinguished
    Tsinghua University.^([^(251)](#fn251)) Yet he was not interested in majoring
    in math. He instead wanted to focus on computer programming.


    He would eventually get a Ph.D. in Computer Science at Yale and become a professor
    at Columbia University. While there, he met Yale Computer Science professor Zhong
    Shao. They struck up a friendship and would work together on areas like cybersecurity.


    In 2018, they saw an opportunity in the blockchain space and founded CertiK. It
    was based on cutting-edge technology called Formal Verification. This allows for
    a high degree of security for both hardware and software systems. It involves
    using complex math and algorithms to prove the satisfaction of requirements and
    specifications. For example, each step in a process is explained. And since it
    is based purely on math, you do not have to place trust on a third party, such
    as a security consultant.


    CertiK has been a major innovator in the Formal Verification space. The company
    has been the first to launch an OS kernel and cloud commodity hypervisor with
    this technology.


    The technology can be applied to areas outside of blockchain and Web3\. Just some
    include autonomous driving, IoT (Internet of Things), and cloud computing. In
    other words, the market opportunity is enormous.


    However, the main focus for CertiK is on Web3 – and it has definitely been the
    right choice. In early 2022, the company raised $88 million at a $2 billion valuation.
    Some of the investors included Tiger Global, Goldman Sachs, and Sequoia Capital.
    In all, the company has raised $230 million.


    The CertiK platform protects over $300 billion in crypto assets across 2,500 enterprises.^([^(252)](#fn252))
    In 2021, the revenues soared by 12X, and the profits increased by 3,000X.


    ## LiquiFi


    A cap table – or capitalization table – is a list of the securities and who owns
    them. For startups, they usually include common stock, preferred stock, convertible
    notes, and employee stock options. The cap table is crucial when it comes to understanding
    the valuation of a startup as well as for managing a fundraise.


    But with Web3 companies, it can be much more complex. There needs to be a way
    to track tokens and their values. There may also be complex structures with DAOs.


    What to do? Well, LiquiFi has built an online platform to manage the cap table
    for Web3 companies. Some of the features include vesting of contracts and employee
    stock options, tax compliance and reporting, and the enablement of tokens for
    staking. The company also provides consulting for clients.


    The founders of the company are Robin Ji, who is the CEO, and Oliver Tang, who
    is the CTO. They came up with the idea because of their first-hand experience
    working with crypto companies.^([^(253)](#fn253)) The founders got their initial
    backing from Y Combinator in the winter of 2021.


    The company is currently on Ethereum and Polygon. But there are plans to expand
    on to other blockchains.


    In early 2022, LiquiFi raised $5 million in a seed round.^([^(254)](#fn254)) Some
    of the investors were Alliance DAO, Robot Ventures, Y Combinator, and Orange DAO.


    ## Conclusion


    In this chapter, we got an overview of taxes and regulations for the crypto industry.
    In terms of taxes, they are still somewhat vague. This is especially the case
    with NFTs.


    But the IRS is likely to provide more guidance in the years ahead. The agency
    is also investing heavily in enforecement actions against potential fraud in the
    crypto industry.


    In this chapter, we also took a look at the potential for regulations. For Web3,
    the environment is still fairly wide open. But there are already indications that
    the federal government will look at ways to impose regulations. However, crypto
    companies and VCs are bolstering their lobbying efforts.


    We are also at the end of the book. We have certainly covered a lot. The industry
    is still in the early phases. But with this book, you will have a much better
    foundation – in terms of the core technologies, trends, and issues.


    So good luck on your Web3 journey. It will definitely be exciting!'
