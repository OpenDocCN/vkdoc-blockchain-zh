  trans: '

    # 企业应用


    元宇宙的大部分活动一直围绕游戏和其他消费类应用。但这种情况很可能会改变——也许很快。企业也看到了这个市场的巨大潜力。


    "工业元宇宙存在重大机遇，"Lange 说道。"目标不在于社交互动，而在于在进入物理世界之前，先在虚拟世界中模拟体验。"


    这可能会比消费领域的机遇更大。只需看看全球供应链。由于新冠疫情的影响，供应链承受着巨大压力，导致了商品短缺和通货膨胀加剧。


    但元宇宙可以提供重要帮助。由于采用了 3D 可视化，工作流程会更容易理解。这意味着你可以发现瓶颈并找到更优的方法。


    以下是一些公司在元宇宙中开展企业应用的情况：


    - 2021 年底，`Accenture` 订购了 60,000 个 `Quest 2` 虚拟现实头戴设备，用于培训和入职流程。该公司计划招聘多达 125,000
    名新员工，VR 有助于简化这一过程。此外，使用这些头戴设备也能让公司顾问更好地理解这项技术，并找到帮助客户的方法。在企-业系统方面，采用的一个关键因素是 IT
    顾问的支持。对于 `Accenture` 来说，此次订购只是其积极的 VR 路线图的第一阶段。


    - `Nike` 已为 "Nike"、"Just Do it"、"Air Jordan"、"Jumpman" 以及钩子标志提交了多项商标申请。原因何在？该公司似乎正在采取措施，在元宇宙中销售数字商品。`Nike`
    还在招聘虚拟材质设计师。根据一则招聘广告："您需要深刻理解着色模型、材质捕捉方案、渲染技术，并能在实时渲染和路径追踪平台之间无缝切换。您对设计新材料和开发场景视觉效果以讲述故事充满热情！"


    - `BMW` 已与 `Nvidia` 合作，在其智能工厂中使用 VR、机器人技术和人工智能。这是通过使用 `Nvidia` 的 `Enterprise Omniverse`
    平台实现的。此外，还使用了 `EGX` 边缘计算系统、用于高端 GPU 的 `Aerial` 软件开发工具包，以及软件定义的 5G 无线接入网络来连接工厂车间。凭借这一切，`BMW`
    的设计团队可以在 3D 环境中协作。结果是，一条工厂生产线可以制造多达十种不同的汽车，拥有超过 100 种选装配置。该系统还能模拟数字人，用于在仿真环境中测试新的工作流程，这有助于加快开发进程并降低成本。


    - `强生研究院` 与 `Osso VR` 和 `Oculus for Business` 合作，目标是改善外科医生的培训。请记住，培训的很大一部分是让住院医师观摩经验丰富的外科医生。虽然这确实有效，但难以规模化。问题在于外科医生需要了解更多复杂的系统和设备。为了更好地应对这一点，`强生`
    能够创建一个虚拟环境，用于对使用植入式骨科设备进行逼真的模拟。例如，在进行胫骨髓内钉固定术时，学生的分数比使用被动学习工具高出 233%。


    但元宇宙技术不必如此宏大。毕竟，许多公司没有这些复杂的需求或投资所需的资源。然而，对于较小的组织来说，元宇宙仍然有很多用例。


    其中一个领域是工作场所沟通。诚然，像 `Zoom`、`Google Meet` 和 `FaceTime` 这样的产品已经很有效，但仍然存在局限性。


    "借助元宇宙，我们将朝着全球各地的人们之间实现更无缝的互动迈进，"`RayCo Media` 的公关与营销总监 Rebecca Binny 说道。"在元宇宙中聚集在一起，人们可以以任何让自己感到自信的方式展现自己，这既赋权又鼓舞人心。这些新颖、高度个性化的沟通模式可能比面对面的对话更真实，因此更能建立信任，而面对面交流常常因社交焦虑和权力差异而受到抑制。早期研究表明，通过计算机介导的沟通能提高生产力，节省时间和金钱，轻松连接全球各地的人们，并促进合作。"


    正如本章前面提到的，AI 将是一个主要因素。但这不仅仅是为了创造更沉浸的体验。元宇宙实际上可以改进 AI 的结果。例如，它可以实现更好的预测，比如设备维护需求。


    "元宇宙最大的机遇是来自现实世界、进入元宇宙、然后再返回现实世界的大规模数据流，"Lange 说。"正是这个由 AI 增强的数据飞轮，才能实现对元宇宙体验的持续改进。"


    元宇宙无疑将对电子商务产生重大影响。事实上，它最终可能会挑战看似不可战胜的亚马逊。


    "虽然在 1990 年代，人们很难想象互联网会改变商业，但仍有一些公司和企业家决定早期进行投资，"`PwC US` 的客户转型领导者 George Korizis
    说。"当世界实现电子商务和社交媒体时，正是这些公司获得了回报。类似的情况也会发生在元宇宙上，企业很快就会意识到，这不仅仅是另一个营销渠道。我们正在见证一场深刻而重大的变革的开端，这场变革将触及经济的每一个部门。"


    但当然，挑战也会存在。同样，需要对软件、基础设施和设备进行更多投资。但隐私将是另一个重要的考量因素。借助元宇宙，你可能能够更好地检测员工或顾客的行为。那么，你能用这些信息做什么呢？


    嗯，看起来很可能会有相应的限制。


    "建立信任必须成为每个企业元宇宙之旅的基础要素，"Korizis 说。"为了在消费者、股东、监管机构和其他利益相关者中培养信任，请尽早沟通你们对元宇宙计划的预期，以及你们将如何减轻潜在风险。"


    至于本章的其余部分，我们将看看元宇宙领域其他一些有趣的初创公司。

    '
- fmt: '# Genies


    Akash Nigam’s parents made an offer to him: either stay in college or raise $3
    million.^([^(225)](#fn225)) Yes, he went on to raise the capital and launched
    a company called `Blend`, which was a messaging app.


    While it was an interesting idea, it actually did not get much traction. Yet Nigam
    did not give up. He pivoted to another startup: `Genies`.


    This one was the jackpot. Started in 2017, it was an early player in the creation
    of avatars. The timing was definitely spot-on. `Genies` was able to capitalize
    on the NFT revolution. But the metaverse is another big opportunity.


    Being based in LA has been very helpful. It has allowed `Genies` to create avatars
    for celebrities like Justin Bieber, Shawn Mendes, Rihanna, Migos, Cardi B, J-Lo,
    and Offset. This not only validated the concept but helped get lots of distribution.
    There was also an important partnership with Warner Music Group.


    Keep in mind that `Genies` avatars are not the typical ones seen in sticker packs,
    which are 2D animations. Instead, they are immersive and 3D. Users can also port
    their avatars to other platforms. This is possible because of the `Genies SDK`
    (Software Development Kit).


    As a testament to the traction of `Genies`, the company was able to snag Robert
    Iger for its board of directors. This was his first move after retiring as the
    CEO and Chairman of the Walt Disney Co. During his tenure, he struck deals for
    companies like Marvel Entertainment, Lucasfilm, and Pixar.


    According to Iger: “Imagine, you know, letting someone buy a Mickey Mouse avatar
    and customizing it in a way that not only would we never allow it before, but
    it was kind of hard to do in the physical world.”^([^(226)](#fn226))


    In early 2022, `Genies` announced a $150 million round of funding.^([^(227)](#fn227))
    The lead investor was Silver Lake. The valuation came to about $1 billion.


    # Now.gg


    While the metaverse is often associated with immersive worlds and wearing VR headsets,
    the fact is that much of the action is with mobile apps. True, the experience
    is not necessarily the same. But it is getting more visual and realistic.


    This is where `now.gg` is looking for opportunities. The CEO and founder is Rosen
    Sharma, who is a veteran of Silicon Valley. He has founded other companies like
    `Game.tv` and `BlueStacks`. He has also been an executive at large operators like
    `McAfee`.


    As for `now.gg`, it is a global platform-as-a-service for game developers. It
    helps them create their own communities for any device or OS. The experiences
    can also be shared on social media channels. Then there is the ability for in-game
    payments.


    `Now.gg` has built the `Creator Studio` and `Creator hub`. They allow mobile gamers
    to modify their games, such as with changing colors, visual effects and adding
    textures. For the most part, this will be key for the metaverse.


    “Today, over five billion people have access to mobile phones and half of those
    people are mobile gamers,” said Sharma.^([^(228)](#fn228)) “In addition to the
    behaviors of literally billions of people, my own daughters were an incredible
    source of inspiration. They are always playing and sharing games with ease, and
    I thought there had to be a way to enable anyone, anywhere, on any device to play
    and share mobile games with this kind of ease.”


    He is also developing systems for NFGs or non-fungible games. This is actually
    a way to transition games to Web3 and the metaverse.


    “NFGs enable the unbundling of game code, events, and art to create multiple versions
    of games,” said Sharma. “This ability to unbundle - on a mobile cloud - opens
    up tremendous opportunities for developers to create and build on top of existing
    businesses. For example, users can find and use NFTs in the game and create an
    entirely personalized game experience by collecting NFT or non-NFT based 2D and
    3D images, textures, videos and code.”


    # Teslasuit


    Sergei Nossoff has over 20 years as an executive and founder of tech companies.^([^(229)](#fn229))
    He also has a background as an investor.


    But he thinks that the next-big-thing will be the metaverse. And yes, this is
    the focus of his latest startup: `Teslasuit`. The company develops whole-body
    haptic feedback and climate control suits. Thus, they allow for a person to be
    completely in the metaverse.


    The technology is certainly complex. Here’s a look at the main components:


    *   Haptic Feedback: The technology is built throughout the whole suit. As a result,
    the user gets the sensation of touch within a virtual environment.


    *   Biometrics: This monitors a user’s health and performance data. They can measure
    stress levels and emotional states. Because of this, a VR system can adapt the
    content based on the experience of the user.


    *   Motion Capture: This records and tracks body positions and movements. This
    is done by using an integrated skeletal and 3D kinematic motion system.


    One of `Teslasuit`’s first customers is NASA.^([^(230)](#fn230)) The space agency
    has purchased Developer Kits to help improve the cognitive and physical performance
    of astronauts.


    Another customer is `DTEK`, which is an electricity producer. The company uses
    `Teslasuits` for inspections and repairs for its power plants. The result was
    a 30% decline in error rates.'
  raw: '## Genies


    Akash Nigam’s parents made an offer to him: either stay in college or raise $3
    million.^([^(225)](#fn225)) Yes, he went on to raise the capital and launched
    a company called Blend, which was a messaging app.


    While it was an interesting idea, it actually did not get much traction. Yet Nigam
    did not give up. He pivoted to another startup: Genies.


    This one was the jackpot. Started in 2017, it was an early player in the creation
    of avatars. The timing was definitely spot-on. Genies was able to capitalize on
    the NFT revolution. But the metaverse is another big opportunity.


    Being based in LA has been very helpful. It has allowed Genies to create avatars
    for celebrities like Justin Bieber, Shawn Mendes, Rihanna, Migos, Cardi B, J-Lo,
    and Offset. This not only validated the concept but helped get lots of distribution.
    There was also an important partnership with Warner Music Group.


    Keep in mind that Genies avatars are not the typical ones seen in sticker packs,
    which are 2D animations. Instead, they are immersive and 3D. Users can also port
    their avatars to other platforms. This is possible because of the Genies SDK (Software
    Development Kit).


    As a testament to the traction of Genies, the company was able to snag Robert
    Iger for its board of directors. This was his first move after retiring as the
    CEO and Chairman of the Walt Disney Co. During his tenure, he struck deals for
    companies like Marvel Entertainment, Lucasfilm, and Pixar.


