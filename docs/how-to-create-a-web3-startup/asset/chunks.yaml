  trans: '

    # 比特币


    加密货币的起源可追溯至 20 世纪 70 年代末。学者们开始探索基于复杂密码学创建数字货币单位的方法。


    例如，1979 年，博士生拉尔夫·默克尔撰写了关于使用公钥和数字签名验证交易的论文。这项成果后来被称为**默克尔树**。


    到了 90 年代初，斯图尔特·哈伯教授和 W·斯科特·斯托内塔发表了一篇关于如何防止数字交易被篡改的论文。他们借助默克尔树实现了这一目标。


    在这些学术研究基础上，企业家们开始验证相关理论。大卫·乔姆便是其中一员。他开发了一种使用公钥和私钥系统进行数字签名的技术。1990 年，他创立了公司`DigiCash`来验证其理念。该技术依赖传统银行的交易系统，但交易双方的信息是保密的。遗憾的是，乔姆仅说服了少数几家银行对该技术产生兴趣，`DigiCash`最终于
    2002 年申请破产。


    20 世纪 90 年代，还有一些有趣的初创公司创造了加密货币，例如`Flooz`、`Bit Gold`和`Hashcash`，但它们最终都失败了。


    到 2008 年，创建可持续性加密货币的条件已成熟。金融危机使许多人失去了对政府和金融服务公司的信任。也许数字替代方案会更好？


    中本聪撰写了一篇里程碑式的论文，题为《比特币：一种点对点的电子现金系统》。


    请注意，中本聪的身份并未公开。他或她可能是一个人，也可能是一群人。但这并不重要。重要的是，中本聪的论文点燃了一场革命。中本聪为区块链框架奠定了基础，并通过创建第一种可持续的加密货币进行了验证。


    2009 年 1 月 3 日，中本聪挖出了第一个比特币区块。这证明了该技术的有效性。首次交易产生了 50 个比特币——这个区块后来被称为创世区块或第 0 区块。


    随后，中本聪将比特币软件开源。这意味着任何人都可以免费从互联网上下载，任何程序员也都可以修改代码。


    接着，在 2009 年 1 月 12 日，中本聪执行了首笔比特币交易。他将包含 10 个比特币的第 170 个区块发送给了哈尔·芬尼。交易的地址是公钥，也就是一串很长的数字。哈尔要访问和拥有它，则需要自己的私钥，这可以理解为一个复杂的密码。


    请注意，这笔交易不涉及任何中间人。没有银行或政府机构来处理交易或收取费用。比特币是点对点发送的，一切由区块链处理。这意味着它是一个真正的去中心化系统。


    换句话说，比特币是全球性的。你只需接入互联网即可。网络始终开放。你可以在周日午夜向某人发送比特币，这都没问题。


    比特币交易不需要任何个人信息，如社保号、地址甚至姓名。只使用公钥和私钥。这意味着没有身份欺诈或黑客窃取隐私信息的风险。


    最后，这笔比特币交易被添加到公开的区块链账本中。这类似于银行账本——只不过网络上的每个人都能看到它。


    **注意**


    比特币代码中存在减半机制。这意味着每四年新币的产量会减少 50%。下一次减半将发生在 2024 年 5 月。


    那么比特币具有真正货币的特征吗？诚然，它不是法定货币。法定货币由政府发行，不以黄金或白银等实物商品为后盾。例如，在美国，美元是以政府的充分信任和信用为支持的。


    加密货币也没有实物形态。不存在纸质版本。


    但比特币当然具有货币的其他方面特征，包括以下几点：


    -   **可分性**：这意味着你可以将货币分割成更小的面额。例如，你可以将一张 10 美元钞票兑换成 10 张 1 美元或两张 5 美元钞票。有趣的是，比特币比美元更易分割。一个比特币可以被分割到小数点后八位，每个最小单位被称为一个聪。


    -   **供应有限**：如果政府印了太多美元，就会导致通货膨胀甚至恶性通货膨胀。最终，人们会因其一文不值而拒绝接受。然而，对于比特币来说，它具有编程设定的上限——即
    2100 万个单位。目前约有 1900 万个比特币存在。预计要到 2140 年才能达到 2100 万的上限。


    -   **统一性**：货币需要具有可互换性。例如，一张 10 美元钞票与其他任何一张 10 美元钞票价值相同。那么比特币呢？它也是统一的。主要原因是区块链验证系统可以对每一笔交易进行验证。


    -   **便携性**：你可以轻松转移货币。比特币确实如此。你可以将其发送给网络上的任何人。就像美元一样，交易无需使用任何个人信息。


    -   **耐久性**：这是指货币可能会变质或被销毁。例如，被烧毁且无法找回的美元。对于比特币，一切都在网络上。只要网络得到维护，它就具有耐久性。


    -   **可接受性**：这意味着你可以用某种货币进行许多交易。但对于比特币来说，情况远非如此。事实上，你只能在有限的场所使用这种加密货币，比如零售店或电商平台。


    尽管比特币具有货币的许多特征，但它更像是一种价值储存手段或投资工具。它变得更像股票或债券。事实上，美国国税局也是这么认为的。这可能导致许多复杂的税务问题。假设你花
    2 万美元买了一枚比特币，它涨到了 3 万美元。然后你用这枚比特币在美国购买了一辆车。在这种情况下，你需要为 1 万美元的收益纳税。而如果你使用美元，则不会出现这种情况。


    比特币作为货币的另一个问题是波动性。这使得企业极难进行合理的规划。假设一家汽车制造商接受比特币支付购车款。第一季度，它以每辆平均 4 万美元的价格卖出了 20
    万辆汽车。然而，在第二季度，比特币暴跌了 50%。换句话说，这家汽车公司的销售额将大幅下滑——很可能出现净亏损——即便它实际销售的汽车数量可能更多。


    当然，有些比特币亿万富翁在早期就有先见之明或运气好，买入了这种加密货币。2010 年，你可以用不到一美分就买到一枚比特币。而到了 2022 年，它的价格已超过
    6 万美元。


    **注意**


    2013 年，拉斯洛·汉耶茨出价 1 万枚比特币，请人给他送两份棒约翰披萨。有人接下了这个订单，这代表了第一笔现实世界的比特币交易。但事后看来，这对汉耶茨来说是个糟糕的决定。如果他当时保留这些比特币，如今价值将超过
    3 亿美元。^(³⁸)

    '
- fmt: '# Crypto Exchanges


    While the blockchain allowed for a highly secure system, it was far from convenient.
    In the early days, if you wanted to create a transaction with Bitcoin, you would
    need to download and use complex software.


    But entrepreneurs saw this as an opportunity to create new applications. A big
    part of this was the development of crypto exchanges. The first one came in 2010:
    `Bitcoin Market`. This allowed for the purchase of the cryptocurrency by using
    `PayPal` and an escrow system.


    No doubt, many other exchanges would soon hit the markets. Examples included `Mt.
    Gox` and `Tradehill`, which allowed for instant purchases.


    In 2011, the market would face a severe test – and the Bitcoin market nearly self-destructed.
    The reason was the hack of the `Mt. Gox` marketplace. It resulted in the collapse
    of the price of Bitcoin, which hit nearly $0. Suddenly, there was little trust
    in cryptocurrencies.


    Despite all this, `Mt. Gox` was able to recover in a few years. The exchange also
    became the global leader.


    Yet the problems would remain for the crypto industry. The US Department of Homeland
    Security engaged in several investigations and ordered some exchanges to change
    their practices.


    Oh, and the issues with `Mt. Gox` were far from over. In 2014, the exchange had
    problems with settling trades. Then there was a bombshell announcement: a hack
    of over 850,000 Bitcoin.^([^(39)](#fn39)) While `Mt. Gox` recovered 200,000 of
    these, it was certainly not enough. The exchange would file for bankruptcy.


    Over the years, there would be other hacks of crypto exchanges. Just some included
    `Bithumb`, `ShapeShift`, and `Bitfinex`.


    Yet the Bitcoin market continued to be resilient. Then again, the early adopters
    had a high tolerance for risk. They were also big believers in the cryptocurrencies.


    But to get mainstream acceptance, the “wild west” ways could not continue. As
    a result, the industry moved toward more compliance, such as with the adoption
    of anti-money laundering and counterterrorism financing requirements.


    For example, in April 2021, `Coinbase` became the first crypto exchange in the
    United States to go public. The initial public offering price was $250, and the
    shares ended the day at $328.28, bringing the market capitalization to $85.8 billion.^([^(40)](#fn40))
    Not bad for a company that was founded in 2012.


    The growth of the company was staggering. During the first quarter, the revenues
    hit $1.8 billion, up 9X over the past year. The company’s net income soared from
    $32 million to $730 million–$800 million. There were 6.1 million monthly transacting
    users (MTUs).


    ## Crypto Wallets


    When you buy a cryptocurrency, you need a place to store it. This is done with
    a digital wallet. There are two types available:


    *   **Hot Wallet**: This is where you store the cryptocurrency on the exchange.
    This is definitely easy. However, there can be risks if the exchange has troubles.
    After all, there is no equivalent of a Federal Deposit Insurance Corporation (FDIC)
    to back any lost cryptocurrency, as is the case with your deposits at a traditional
    bank.


    *   **Cold Wallet**: This is a physical device like a thumb drive. This is quite
    safe since there is little connection to the Internet. Then again, a cold wallet
    can make it more difficult for conducting transactions. Some of the common ones
    include `CoolWallet Pro`, `Safepal S1`, and `Trezor Model T`. The prices range
    from $50 to $150 or so.


    ## Altcoins


    In 2011, a variation of Bitcoin hit the markets. It was called `Namecoin`. It
    became part of a category of cryptocurrencies called altcoins. Basically, this
    meant something that was not Bitcoin.


    The open-source platform allowed for altcoins. For the most part, they were ways
    to add new capabilities and innovations. In the case of `Namecoin`, it allowed
    for merged mining. This meant that a miner could mine more than one blockchain
    at the same time.


    Over the years, there have been many new altcoins created. There are currently
    over 17,000.^([^(41)](#fn41))


    Yet Bitcoin remains the dominant cryptocurrency and ether as No. 2. They account
    for a majority of the world’s transactions.


    With so many altcoins, how can one analyze them? One way has been to divide them
    into different categories. Here are the main ones:


    *   **Stablecoins**: This is an altcoin whose value is connected to another asset.
    This may be a fiat currency, gold or anything else of value. The goal of a stablecoin
    is to provide stability. Essentially, it can perform the function of a traditional
    currency. A popular stablecoin is `Tether` and its value is tied to the US dollar.
    It was actually the first one created. However, in May 2022, various stablecoins
    plunged in value.^([^(42)](#fn42)) It was essentially a “run on the bank.” Some
    of the stablecoins dropped more than 90% in a few days.


    *   **Governance Token**: This is an altcoin that provides a mechanism for voting
    on a blockchain project. This type of token is what is often used for DeFi (Decentralized
    Finance) and gaming systems. Some of the issues you can vote on include charging
    and setting fees, making changes to the interface of a network, or transferring
    funds to members. Also, there is no mining of governance tokens. They are distributed
    based on those who invest in the project. It’s similar to being a shareholder
    in a company.


    *   **Memecoins**: These are altcoins that are more about fun and entertainment.
    Interestingly, some of them started as mere jokes. Regardless, memecoins can potentially
    have lots of value. But it can be tough to sustain this. Let’s face it, there
    is usually something else new to take its place. Memecoins are more about fads.


    *   **Utility Tokens**: These are altcoins often used for online services. They
    are also common for Web3 applications. The most popular of the utility tokens
    is `Ether`, which has a “gas fee.” This is for the cost of data processing. Another
    widely used utility token is `Filecoin`. With this, you can buy storage on the
    blockchain.


    *   **Security Tokens**: These allow you to acquire interests like real estate
    or artwork. The ownership can also be fractional.


    Whenever there is a change in the blockchain protocol – such as with the creation
    of new rules or altcoins – there is a fork. This means there is a split in the
    network. And the new blockchain will have its own ledger.


    There are two types of forks:


    *   **Soft Fork**: This is essentially an upgrade to the existing blockchain,
    and the network’s users must approve it. There also needs to be backwards compatibility
    with the existing forks.


    *   **Hard fork**: This is where there is a clear split and there is no longer
    backwards compatibility. This is when there will often be the creation of a new
    cryptocurrency.'
