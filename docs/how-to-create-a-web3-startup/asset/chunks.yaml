  trans: '

    # 什么是 DeFi？


    与 Web3 的大部分部分一样，DeFi 也相当新。其起源可以追溯到 2018 年。^(¹⁷⁹) 它诞生于 Telegram 上的一次聊天，当时开发者和创始人正试图想出一个恰当的方式来描述基于区块链的金融系统。


    传统的金融市场——被称为 TradeFi（传统金融）——大多是中心化的。有各种机构，如银行、投资银行和经纪公司来处理交易。该行业也有广泛的监管规定。


    而 DeFi 的目标是打破这些壁垒，实现点对点交易。这有望带来更低的成本、更少的文书工作和更快的结算速度。


    从某种意义上说，DeFi 旨在颠覆 TradeFi 的主要部分，包括贷款、储蓄、保险、衍生品等。在很大程度上，DeFi 系统是基于以太坊智能合约的。相比之下，TradeFi
    通常拥有传统技术基础设施，系统常基于大型计算机和像 COBOL 这样的传统语言。


    DeFi 的其他一些优势包括：


    * **金融服务民主化**：根据世界银行的研究，全球约有 17 亿人没有银行账户。^(¹⁸⁰) 这无疑是一个巨大的问题，因为它可能意味着应对贫困面临巨大挑战。但借助
    DeFi，可以提供更广泛的金融服务。所需的一切只是一部基本智能手机和互联网接入。

    * **收益**：DeFi 可以提供更高的投资收益率。诚然，这意味着要承担更多风险。但对于某些人来说，这可能是值得的。DeFi 也可以成为传统投资组合多元化的一种方式。

    * **结算**：使用支票进行交易，处理需要三天时间。但 DeFi 几乎可以即时结算。

    * **代币化**：使用代币可以拥有更大资产的所有权，例如艺术品、企业或房地产。这有助于为项目筹集资金。也意味着更多人将有机会获得通常只有富人和投资基金才能获得的投资。

    * **可用性**：华尔街的交易时间是工作日上午 9:30 到下午 4:00。银行的营业时间可能类似。然而，使用 DeFi，交易可以全天候进行。


    注意


    根据 DeFi Pulse 的数据，DeFi 市场的总价值约为 560 亿美元。^(¹⁸¹)


    DeFi 此前主要专注于 B2C（企业到消费者）应用。但这种情况正在开始改变。B2B（企业到企业）类别正在获得发展势头。事实上，其机遇可能更大。B2B DeFi
    有潜力实现更高效的金融基础设施。事实上，像 Visa、MasterCard 和各种银行这样的大型运营商一直在对此进行投资。


    ## DeFi 的 dApp 流程


    与其他加密应用一样，DeFi 可能有些繁琐。诚然，进步仍在继续。由于 DeFi 仍处于早期采用阶段，其用户界面和用户体验仍有很大的改进空间。


    也许最大的问题是存在多个步骤，并且你通常需要访问多个产品。


    那么，让我们来看看质押的典型工作流程（这假设你已经知道如何使用加密钱包）。质押是一种在智能合约下长期锁定并持有资产的方式。这意味着你可以获得奖励、投票权和利息等好处。


    步骤如下：


    *   将你的加密钱包连接到网站或移动应用。在此阶段，你需要谨慎行事。这个网址或移动应用是否非法？你可能需要在谷歌上搜索一下。

    *   dApp 将要求你签署一笔交易。

    *   dApp 将授权你的访问。完成后，你就可以进行质押。

    *   你将发起一笔交易并进行确认。该交易将被包含在特定的区块链上。不过，可能还有其他待处理的交易。之后，你的资产就被质押了。


    ## DeFi 生态系统


    尽管 DeFi 相对较新，但创新已经呈现爆炸式增长。以下是一些可用的有趣应用：


    *   **去中心化交易所 (DEXs)**：这是一个用美元和其他法定货币兑换加密货币的市场。还有像 Uniswap 这样的服务，允许进行费用较低的交易。

    *   **借贷**：通过 DeFi，你可以将钱借给世界上的任何人。或者你可以存入你的加密货币来赚取利息或获得奖励。利率可能达到两位数。DeFi 借贷服务的领导者之一是
    AAVE，它基于以太坊区块链。

    *   **抵押贷款**：一些 DeFi 初创公司，如 Figure，允许其用户以其加密货币为抵押来购买房屋。这基于 provenance 区块链。一些初创公司，如
    LoanSnap，可以将你的抵押贷款转化为 NFT，从而实现更快的处理速度。

    *   **流动性挖矿**：这是一种基于 DEX 的服务，旨在从各种代币中寻找更高的回报。不过，这可能是一种风险极高的活动。

    *   **预测市场**：你可以在这里对某个未来事件下注，例如总统选举。


    ## 风险


    谈到 DeFi 的风险，它与任何类型的金融服务类似。都事关潜在的金钱损失。例如，可能是来自骗局或黑客攻击。


    但也存在技术风险。智能合约的错误编码也可能是一个大问题。有案例显示，这导致了数百万美元的损失。


    即使是经验丰富的投资者也遭受过重大损失。看看互联网企业家兼投资者马克·库班就知道了。他投资了一个 DeFi 代币，结果该代币在一天内暴跌至零！他在推特上写道：“我和其他人一样被打击了。疯狂的是我退出了，以为他们的
    TVL 增加得足够多。然后砰的一声。”^(¹⁸²)


    根据 CipherTrace 的研究，DeFi 欺诈造成的损失一直在上升。在 2022 年第一季度，损失达到了 1.56 亿美元。^(¹⁸³)


    然而，DeFi 仍然是一个小市场。它确实主要面向早期采用者和加密货币信徒。但如果 DeFi 继续快速增长，可能会对经济构成风险。这可能类似于金融危机期间发生的情况，当时抵押贷款市场大规模崩溃。其中很大一部分原因是高度复杂的金融衍生品。


    请注意，DeFi 应用通常要求用户提供抵押品。这是为了给金融系统提供更多支持。然而，抵押品通常是加密货币，其价格波动可能很大。换句话说，这最终可能导致重大损失。在某些情况下，DeFi
    应用可能会清算头寸。


    为了减轻这个问题，DeFi 系统可以使用稳定币作为代币。但这远非万无一失。


    注意


    无常损失是 DeFi 系统的一种临时损失。这通常是由于市场供需不平衡造成的。为此，DeFi 平台会将回报转移给代币持有者。这通常就足够了。但这种方法并不能保证。不幸的是，有些
    DeFi 系统最终会失败。

    '
- fmt: '# Disruption


    No doubt, a common goal for entrepreneurs is disruption. When successful, the
    returns can be substantial.


    As for DeFi, the market opportunity is actually one of the biggest. For example,
    according to PayPal CEO Dan Schulman, the estimated size for digital payments
    is $100 trillion.^([^(184)](#fn184))


    Yet this is just one segment of the industry. There are other massive markets
    like insurance, investments, and lending.


    In light of this, there should be no surprise that there are many DeFi players
    that are gunning for the market opportunities. And this is not necessarily something
    for entrepreneurs to worry about. It’s a validation of the category. Besides,
    there should be room for a variety of firms to become strong players.


    If anything, one of the worst things an entrepreneur can say is that there is
    “no or little competition.” For most investors, this is a red flag.


    Even though the market opportunity is massive for DeFi, this does not mean that
    this approach to finance will ultimately win out.


    The fact is that traditional financial institutions are not sitting back. They
    understand the importance of innovation.


    Here’s what JPMorgan Chase CEO Jamie Dimon wrote in his 2021 shareholder letter:
    “Decentralized finance and blockchain are real, new technologies that can be deployed
    in both public and private fashion, permissioned or not. JPMorgan Chase is at
    the forefront of this innovation. We use a blockchain network called Link to enable
    banks to share complex information, and we also use a blockchain to move tokenized
    US dollar deposits with JPM Coin. We believe there are many uses where a blockchain
    can replace or improve contracts, data ownership and other enhancements; for some
    purposes, however, it is currently too expensive or too slow to be deployed.”^([^(185)](#fn185))


    But for a DeFi startup, an effective strategy may be to partner with traditional
    financial institutions. This allows for leveraging existing distribution channels
    and strong brands. As for the DeFi startup, it can focus on the technology development.


    # Total Value Locked (TVL)


    A key metric for DeFi is total value locked or TVL. This shows the total amount
    of assets for a protocol or network.


    While this does provide a good sense of the success, TVL is far from perfect.
    Let’s face it, the value may suddenly fall or even collapse. It’s not uncommon
    for users of a project to move to another one. Maintaining a Web3 community is
    no easy feat.


    So, it is important to look at other metrics. Some of them include the following:


    * Engagement of the community.

    * Integrations of the protocol with other applications, exchanges, and wallets.

    * A growing number of token holders. This may indicate positive word-of-mouth
    marketing.

    * Increases in the number of developers.


    OK then, as for the rest of the chapter, we’ll take a look at some of the interesting
    startups in the DeFi space.


    # Tribal


    Amr Shady and Mohamed Elkasstawi are top entrepreneurs in Egypt. But they experienced
    firsthand the challenges of running businesses in the Middle East – especially
    in terms of getting financing. The paperwork and regulations are usually expensive
    and time-consuming. The criteria for funding is often too onerous for smaller
    businesses.


    But Shady and Elkasstawi saw an opportunity to leverage blockchain to create a
    new type of platform.^([^(186)](#fn186)) The company, Tribal, was launched in
    late 2019.


    Tribal’s system, which includes a business credit card, uses a sophisticated AI
    approval process.^([^(187)](#fn187)) This has greatly streamlined the process.
    Tribal has also a variety of services like local and international wires and spend
    management. There are customers in 22 countries.


    In early 2022, the company raised $60 million in a Series B round.^([^(188)](#fn188))
    The investors included the SoftBank Latin America Fund, BECO Capital, QED Investors,
    and Rising Tide. The total funding has come to over $140 million.


    According to Shu Nyatta, Managing Partner of SoftBank Latin America Fund: “Tribal
    is using crypto to fundamentally change the rules of the game for payments and
    lending. Very few companies can bridge TradeFi and DeFi in such an innovative,
    yet seamless way.”^([^(189)](#fn189))


    # Valora


    In the early 2000s, Jackie Bona graduated from UCLA with a B.A. in international
    relations and history. Yet she would quickly become a successful marketing pro.^([^(190)](#fn190))
    She spent over seven years at Google and then went on to Twitter and Spotify.
    At these companies, she learned about how to hack growth and develop easy-to-use
    applications. During her stints, she lived in nine countries that spanned four
    continents.


    By 2021, Bona became a tech founder. She launched Valora, which focused on a mobile-first
    crypto wallet for borderless payments. She is the CEO and has raised about $20
    million.


    The app is for newbies as well as experienced crypto traders. It’s available in
    over 100 countries and the fees are low, at a mere $0.001. Yes, it is nearly free
    to use. This has not only helped gin up adoption but has also made it practical
    in developing nations where the transaction amounts are usually small.


    The simplicity of the app is another critical feature. You do not have to use
    42-character wallet addresses. Instead, you just need a phone number to send money.


    Valora has a lucrative rewards system, which is at 25% of the balance. This helps
    to encourage more transactions.


    Valero uses the Celo blockchain, which has its origins with Ethereum. However,
    they are both independent of each other. This means that Celo wallets cannot connect
    with the Ethereum network.


    Celo is focused on stablecoins, such as those based on the US dollar, the riyal,
    and the euro. Next, there is full support for ERC-20 tokens. This allows for the
    porting over of dApps. For example, here are some that Valora offers:


    * Celo Tracker: This manages your portfolio for NFTs and other digital assets.

    * Bidali: This uses gift cards for popular brands.

    * ChiSpend – Super App: You can use cryptocurrencies to buy real-world products
    and services.

    * Celo Tax: This provides tax analysis of your transactions.


    Celo is also environmentally friendly. Note that it has a carbon-negative infrastructure.


    # TrustToken


    Rafael Cosman has worked as a machine-learning engineer at companies like Palantir,
    Kernel, and Google. But he saw crypto as a massive opportunity and founded TrustToken
    in 2017.^([^(191)](#fn191)) He wanted to create a next-generation financial services
    company. Cosman has raised about $34 million for his startup.


    There are two main parts to TrustToken. There is TrueFX, which is a set of stablecoins
    for the US dollar, British pound sterling, the Canadian dollar, and so on. Next,
    there is TrueFi, which is a DeFi platform that is built on the Ethereum blockchain.
    The focus is primarily on providing uncollateralized loans.


    Keep in mind that this is fairly unique. The reason is that crypto lending is
    generally over-collateralized. While this allows for more safety, it does limit
    the potential for the market. Note that the opportunity is massive. Traditional
    unsecured lending is about $11 trillion on a global basis.^([^(192)](#fn192))


    TrustToken’s loans also have the advantage of providing lenders higher returns.
    But there needs to be ways to provide standards for credit scoring. This is similar
    to the FICO score for traditional lending.


    Here’s how it works: TrustToken provides a system for lenders to easily store
    their money. Then the borrows send credit requests. The interest and limits are
    based on the borrower’s credit score. But the community must vote on each loan.
    Essentially, this is a reputation-based way for allocating loans. Although, if
    the borrower does not repay the loan, there will be potential legal consequences.


    As of early 2022, TrustToken has processed over $524 million in loans and paid
    more than $17.5 million in interest.^([^(193)](#fn193))'
  raw: '## Disruption


    No doubt, a common goal for entrepreneurs is disruption. When successful, the
    returns can be substantial.


    As for DeFi, the market opportunity is actually one of the biggest. For example,
    according to PayPal CEO Dan Schulman, the estimated size for digital payments
    is $100 trillion.^([^(184)](#fn184))


    Yet this is just one segment of the industry. There are other massive markets
    like insurance, investments, and lending.


    In light of this, there should be no surprise that there are many DeFi players
    that are gunning for the market opportunities. And this is not necessarily something
    for entrepreneurs to worry about. It’s a validation of the category. Besides,
    there should be room for a variety of firms to become strong players.


    If anything, one of the worst things an entrepreneur can say is that there is
    “no or little competition.” For most investors, this is a red flag.


    Even though the market opportunity is massive for DeFi, this does not mean that
    this approach to finance will ultimately win out.


    The fact is that traditional financial institutions are not sitting back. They
    understand the importance of innovation.


    Here’s what JPMorgan Chase CEO Jamie Dimon wrote in his 2021 shareholder letter:
    “Decentralized finance and blockchain are real, new technologies that can be deployed
    in both public and private fashion, permissioned or not. JPMorgan Chase is at
    the forefront of this innovation. We use a blockchain network called Link to enable
    banks to share complex information, and we also use a blockchain to move tokenized
    US dollar deposits with JPM Coin. We believe there are many uses where a blockchain
    can replace or improve contracts, data ownership and other enhancements; for some
    purposes, however, it is currently too expensive or too slow to be deployed.”^([^(185)](#fn185))


    But for a DeFi startup, an effective strategy may be to partner with traditional
    financial institutions. This allows for leveraging existing distribution channels
    and strong brands. As for the DeFi startup, it can focus on the technology development.


    ## Total Value Locked (TVL)


    A key metric for DeFi is total value locked or TVL. This shows the total amount
    of assets for a protocol or network.


    While this does provide a good sense of the success, TVL is far from perfect.
    Let’s face it, the value may suddenly fall or even collapse. It’s not uncommon
    for users of a project to move to another one. Maintaining a Web3 community is
    no easy feat.


    So, it is important to look at other metrics. Some of them include the following:


    *   Engagement of the community.


    *   Integrations of the protocol with other applications, exchanges, and wallets.


    *   A growing number of token holders. This may indicate positive word-of-mouth
    marketing.


    *   Increases in the number of developers.


    OK then, as for the rest of the chapter, we’ll take a look at some of the interesting
    startups in the DeFi space.


    ## Tribal


    Amr Shady and Mohamed Elkasstawi are top entrepreneurs in Egypt. But they experienced
    firsthand the challenges of running businesses in the Middle East – especially
    in terms of getting financing. The paperwork and regulations are usually expensive
    and time-consuming. The criteria for funding is often too onerous for smaller
    businesses.


    But Shady and Elkasstawi saw an opportunity to leverage blockchain to create a
    new type of platform.^([^(186)](#fn186)) The company, Tribal, was launched in
    late 2019.


    Tribal’s system, which includes a business credit card, uses a sophisticated AI
    approval process.^([^(187)](#fn187)) This has greatly streamlined the process.
    Tribal has also a variety of services like local and international wires and spend
    management. There are customers in 22 countries.


    In early 2022, the company raised $60 million in a Series B round.^([^(188)](#fn188))
    The investors included the SoftBank Latin America Fund, BECO Capital, QED Investors,
    and Rising Tide. The total funding has come to over $140 million.


    According to Shu Nyatta, Managing Partner of SoftBank Latin America Fund: “Tribal
    is using crypto to fundamentally change the rules of the game for payments and
    lending. Very few companies can bridge TradeFi and DeFi in such an innovative,
    yet seamless way.”^([^(189)](#fn189))


