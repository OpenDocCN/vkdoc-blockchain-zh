- fmt: "# Compensation\n\nThe high compensation levels in the tech industry are certainly\
    \ a major barrier. But startups do have some advantages. In fact, with a Web3\
    \ company, there may be the opportunity to provide crypto tokens as part of the\
    \ salary. Such digital coins can ultimately be worth significant amounts of money.\
    \ However, there can be complex tax issues. We’ll cover this topic in the last\
    \ chapter of this book.\n\nNext, equity is another way to attract top-notch talent.\
    \ Some of the early crypto companies like Coinbase have minted many millionaires.\n\
    \nWith options, you can provide a strong incentive for employees to stay on board.\
    \ This is done by using vesting. This means an employee must remain as a part\
    \ of the company for a certain period of time to get the equity or stock option.\n\
    \nA common approach is to have vesting for four to five years. For example, suppose\
    \ you hire a hotshot developer and grant a stock option for 20,000 shares. If\
    \ the vesting is for four years, the employee will earn 5,000 shares each year.\n\
    \nBut suppose that an employee leaves after two years. In this case, they can\
    \ exercise – or purchase – 10,000 shares. But they will forfeit the remaining\
    \ 10,000 shares of the option.\n\nNow, in some cases, the option grant may backfire.\
    \ This happens when there is a huge surge in the valuation of the company. Thus,\
    \ an employee may do minimal work in order to keep vesting the options. This is\
    \ often referred to as VIP or vesting in peace.\n\nYet it can be extremely difficult\
    \ to avoid this problem. The good news is that – for many high-performance people\
    \ – they will strive to do great work.\n\nFor the types of equity compensation,\
    \ there are two main categories. One is the employee stock option. This gives\
    \ you the right to buy a fixed number of shares at a fixed price for a period\
    \ of time.\n\nLet’s take an example. Suppose you hire someone and grant an option\
    \ for 5,000 shares. At the time, the stock price of your startup is $2 a share.\
    \ This will also be the exercise price for the option or what the employee will\
    \ pay for the shares.\n\nSuppose that your startup does extremely well, and the\
    \ stock price goes to $20 a share after two years. The employee has vested 2,000\
    \ shares. They can purchase all of these for a total of $4,000 or $2 multiplied\
    \ by 2,000. In other words, the employee will have a gain of $16,000.\n\nThe next\
    \ type of equity offering is the restricted stock grant. This means that you issue\
    \ the shares to the employee but there is vesting.\n\nLet’s continue with our\
    \ prior example. Instead of granting an option for 2,000 shares, you make a restricted\
    \ grant for the same number of shares. But to get the value of these, the employee\
    \ will have a two-year vesting schedule. Using our example, in two years, your\
    \ startup will transfer ownership of the 2,000 shares to the employee.\n\nBut\
    \ there is a potential problem. The taxes could be at the ordinary rate, not the\
    \ favorable capital gains rate (which has a maximum of 20%). But there is a way\
    \ to deal with this: the `83b-1` election.\n\nThis is how it works. When you get\
    \ the restricted stock grant, you will pay for the shares. In our example, you\
    \ will write a check for $2,000. Then you will send a simple document to the IRS\
    \ within 30 days. Also, if you miss this deadline, there is no recourse.\n\nOK\
    \ then, so how much equity should you allocate? There is no clear-cut answer for\
    \ this. But the first step is to set up an option pool. This is a percentage of\
    \ the company’s equity that is for the granting of options or restricted stock.\
    \ This can range from 5% to 25% of the outstanding shares.\n\nIn the early days\
    \ of a startup, the equity allocations can be significant. For example, the first\
    \ few nonfounding employees may get 1% of the outstanding shares. Then the next\
    \ ten or twenty may receive 0.50% and so on.\n\nHowever, there are certain employees\
    \ where you will grant ever larger allocations – regardless of the stage of the\
    \ startup. Note that it is not uncommon for a CEO to get 5% to 10% of the outstanding\
    \ shares.\n\nFinally, when it comes to putting together an option plan, you should\
    \ seek the assistance of a qualified attorney. This is something that you want\
    \ to make sure that is done correctly. You do not want to be in a position where\
    \ your company falls out of compliance or you have to pay an unexpected tax bill.\n\
    \n### Note\n\nAccording to ZipRecruiter, the average salary for a blockchain engineer\
    \ is $154,550 or $74 per hour. As for a Solidity developer, it is $127,500, and\
    \ it’s $94,674 for a smart contracts developer.^([^(103)](#fn103))\n\n# Reskilling\n\
    \nSince many of your developers may not have deep experience with Web3 or blockchain,\
    \ you will have to look at ways to educate your team. There are different bootcamps\
    \ that can be a big help. There are also online education platforms like Coursera,\
    \ PluralSight, and Udemy that have useful and affordable courses.\n\nBut there\
    \ are still many gaps. Because of this, your startup may have to put together\
    \ some of its own courses. True, this will take time. But the long-term impact\
    \ is likely to be very positive. Besides, you can focus on those areas that have\
    \ the most impact for the success of your venture.\n\nYou can also set up programs\
    \ to allow your experienced developers to be mentors. This can be rewarding for\
    \ everyone. It can also allow for faster learning.\n\n# Conclusion\n\nIn this\
    \ chapter, we looked at the key team members for a typical Web3 startup. They\
    \ include community managers, legal experts, front-end developers, backend developers,\
    \ financial managers, and so on.\n\nFinding this talent is no easy feat and the\
    \ compensation is not cheap. And this is likely to last for many years. But there\
    \ are ways to help with recruiting. You can leverage equity compensation and perhaps\
    \ the use of tokens. You should also have a compelling vision that attracts top\
    \ talent.\n\nThe reality is that recruiting is a must-have priority for startups.\
    \ It’s also something that should be hands-on with the founders and executives.\n\
    \nEven when you hire developers, you will probably need to provide training. While\
    \ there are good education programs, you might need to come up with your own courses.\n\
    \nBeing a remote organization is probably the right option too. Finding talent\
    \ often means looking overseas.\n\nAs for the next chapter, we will take a look\
    \ at DAOs or Decentralized Autonomous Organizations, which provide the governance\
    \ for Web3 platforms.\n\n**Footnotes**  \n[1](#531229_1_En_4_Chapter.xhtml#Fn1_source)\
    \ [2](#531229_1_En_4_Chapter.xhtml#Fn2_source) [3](#531229_1_En_4_Chapter.xhtml#Fn3_source)\
    \ [4](#531229_1_En_4_Chapter.xhtml#Fn4_source) [5](#531229_1_En_4_Chapter.xhtml#Fn5_source)\
    \ [6](#531229_1_En_4_Chapter.xhtml#Fn6_source) [7](#531229_1_En_4_Chapter.xhtml#Fn7_source)\
