- fmt: '# Tax Scenarios


    Note that the IRS ruled – in 2014 – that cryptocurrency represents property. It
    is not treated as fiat currency like the US dollar or the euro.


    This has major consequences. Basically, the IRS considers cryptocurrencies to
    be an investment like stocks or bonds.


    Let’s take a look. Suppose you pay $30,000 for one Bitcoin. This is your “cost
    basis” in the property. Within six months, the value of your Bitcoin hits $50,000
    and you sell your coin. The IRS considers this a capital gain of $20,000 or $50,000
    minus $30,000. Since you made the transaction within a year or less, it’s treated
    as a short-term capital gain. This means that you pay the same taxes as you would
    with your ordinary income, such as your salary.


    You can deduct for any fees. For example, an exchange will charge a commission
    of 2% to 5% on the transaction. You will add this to the cost basis, which will
    reduce your taxes. Using our example, suppose the fee is 3%. In this case, the
    amount you add to the cost basis will be $600 or 3% multiplied by $20,000. The
    capital gain will come to $29,400 or $50,000 minus $20,600.


    Note


    It does not matter if you sold your cryptocurrency for another one, say Ether.
    There will still be a taxable transaction.


    OK, what if you sold your coin after a year? In this case, you have a long-term
    capital gain. You will pay the favorable tax rates for this transaction. The maximum
    is 20% versus 37% for ordinary income.


    On the other hand, suppose you generate a loss on the transaction. This will be
    a capital loss and you can offset this against any of your gains. After doing
    this, if you still have a net loss, you can deduct up to $3,000 against your ordinary
    income each year. You can do this until you have no more capital losses.


    True, all this seems standard. But the hard part is when you use cryptocurrency
    to make a purchase of product or service.


    Here’s an example. You agree to buy a Tesla by using two Bitcoins, which add up
    to $80,000. But there is a problem. You may owe taxes on this transaction!


    How so? Let’s take a look. Suppose that you bought two Bitcoins for $60,000. As
    a result, the purchase of the Tesla actually represents a “sale” of these coins,
    and you owe taxes on a $20,000 capital gain.


    This is a big reason why it is difficult to use cryptocurrencies for ordinary
    purchases. This can mean complex tax problems. Then again, this is why stablecoins
    have become popular. With less volatility in their prices, the taxes’ implications
    are not as significant.


    With cryptocurrency, you may receive income as well. This could be interest or
    even an airdrop. When this happens, the IRS considers this to be ordinary income
    and you will have to pay taxes on it.


    Another scenario is if you receive cryptocurrency for services. This could be
    as an employee or contractor. Regardless, the value of the cryptocurrency will
    be ordinary income and taxable.


    However, many people may not report this. Part of this is the common perception
    that – since there is no cash exchanged – there is no legal requirement. Or it
    could be that it would be difficult for the IRS to track this. But none of these
    reasons are valid. You are required to pay taxes.


    An area that appears to be a loophole is with the “wash rule.” For stocks and
    bonds, this means you cannot recognize a capital loss if you sell and buy back
    the security – or a similar asset – after 30 days. However, this rule does not
    apply with cryptocurrencies. Yet this may not last long. Congress has been considering
    a change.


    When you make transactions with stocks, bonds, and other securities, your brokerage
    firm will provide you a 1099-B form. This will itemize and summarize the transactions,
    which makes it easier to prepare your taxes.


    What about cryptocurrency? This is voluntary for exchanges. But by 2023, they
    will be required to issue 1099s. This will make it much easier for the IRS to
    track taxpayers and enforce the laws.


    Consider that there are Individual Retirement Accounts (IRAs) that allow you to
    invest in crypto. You do not pay taxes on the transactions until you withdraw
    the money. Some of the IRA providers include Kingdom Trust and BitcoinIRA.^([^(234)](#fn234))


    Large financial institutions are also eyeing the massive retirement market. Take
    a look at Fidelity. In early 2022, the company announced plans to offer Bitcoin
    as an investment for its 401(k)s. Fidelity is the largest provider of retirement
    plans, which has over 20 million participants.^([^(235)](#fn235))


    But the U.S. Labor Department has shown skepticism. The agency has indicated that
    employers should “exercise extreme care.”^([^(236)](#fn236))


    ## NFT Taxes


    For the most part, NFT taxes are treated in a similar way to cryptocurrencies.
    The IRS considers both to be property.


    However, with NFTs, the rules are even more opaque. The reason is that the IRS
    has provided fairly limited guidance on the tax regulations. This is primarily
    due to the fact that NFTs are new.


    First of all, let’s take a look at taxes for buying and selling NFTs. You will
    often use Ether for these transactions. Thus, when you make a purchase, there
    may be a capital gain or loss for the cryptocurrency. Then you will have the same
    for the transaction of the NFT – which could be a long or short-term capital gain.


    But there is a wrinkle to consider. The IRS has not ruled on what type of gain
    or loss is available for an NFT. This asset could actually be treated as a collectible.
    If so, this means that the maximum tax rate is 28%, compared to the 20% rate for
    a long-term capital gain. In fact, it seems that the IRS is likely to lean toward
    NFTs as collectibles. But again, you should seek advice from a qualified tax professional.


    Next, there are tax considerations for those who create NFTs. This could be about
    an artist who uses a tool to make the smart contract and then uploads the NFT
    to a marketplace.


    The creation of this digital asset has no tax consequences. It’s only when you
    sell it. In these cases, it is considered ordinary income. You will also have
    to pay self-employment taxes. This is your share for Social Security, Medicare,
    and state benefits programs. And this tax can add up. For Social Security, the
    tax rate is 12.4% of net earnings (up to $142,800 of earnings are subject to this
    tax) and is 2.9% for Medicare (there is no cap on this). If you make $200,000
    as single filer or $250,000 as a married couple with a joint return, there is
    an extra 0.9% Medicare tax.


    The IRS will consider you as a contractor. As a result, you will file a Schedule
    C form. You will list your earnings and deduct any qualified business expenses.
    This could be fees, gas, subscriptions, software, and so on.


    The creator may earn ongoing income. This could be the result of the number of
    viewers of the NFT, the royalties, commissions for sales of the NFT, and interest.
    All this is considered ordinary income and is taxable.


    Then what about when an NFT is given away? This is generally for the purposes
    of a marketing campaign. But for those who receive the NFT, there may be a tax
    consequence. The key is there must be value to this digital asset.


    And this may be tough to determine. The fact is that there may be little to no
    value. Although, if the NFT is resold on a marketplace, then this would be probably
    the best indication that there is value to it.'
