- fmt: '# Uniswap


    In the summer of 2017, Siemens laid off `Hayden Adams`, who was a mechanical engineer.^([^(123)](#fn123))
    But this turned out to be a very good thing. `Adams` delved into blockchain and
    Ethereum. He then received a $65,000 grant from the Ethereum Foundation.^([^(124)](#fn124))


    `Adams` created the `Uniswap` protocol and `DAO`. At first, he used the `Solidity`
    language. But he realized that `Vyper` would be a better option to create sophisticated
    smart contracts.


    `Uniswap` would become the basis for the largest decentralized and automated market
    system to trade on the `Ethereum` platform. The governance token is `UNI`, which
    was launched in late 2020. In a sense, `Uniswap` became a new kind of financial
    market – in which the users decided on its fate.


    The voting structure for technical proposals is as follows:


    *   Temperature Check: There needs to be a minimum level of interest in the new
    feature. This requires at least 25,000 `UNI` votes.


    *   Consensus Check: This is where the proposer makes a formal specification for
    the new function. For this, there must be a minimum of 50,000 `UNI` yes votes.


    *   Final Phase: The proposer will provide audited codes. For this, there needs
    to be 40 million `UNI` yes votes.


    As of early 2022, `Uniswap` had over $924 billion in trading volume and more than
    94 million trades.^([^(125)](#fn125))


    ## Conclusion


    A `DAO` is the main way to provide decentralized governance for a `Web3` organization.
    This allows for proposing and voting on various matters. To participate in this,
    a user will buy tokens.


    `DAOs` are a relatively new concept, and the legal implications are far from clear.
    But there are emerging core best practices. Some states and countries are also
    providing legal structures for `DAOs`.


    Despite this, it’s common for there to be a hybrid legal approach. This means
    having a traditional corporate wrapper for the `DAO`.


    But there are also downsides to `DAOs`. Let’s face it, it’s tough to anticipate
    potential issues by using smart contracts. The set up can be complex and expensive.
    Then there are the potential issues with the creators of the `DAO`, who may have
    conflicts of interest.


    Regardless, `DAOs` have become quite popular. And over time, there will certainly
    be progress in dealing with the issues.


    As for the next chapter, we’ll take a look at startups for NFTs and gaming.


