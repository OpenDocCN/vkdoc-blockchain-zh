    # NFT 的问题


    希娜·埃斯塔维是总部位于马来西亚的区块链公司 `Bridge Oracle` 的首席执行官。2021 年，她同意支付 290 万美元从杰克·多尔西那里购买了
    NFT（她将这笔钱捐给了慈善机构）。这个 NFT 是 Twitter 上的第一条推文，内容是“just setting up my twttr。”


    这笔收购引起了轰动——并进一步激发了人们对 NFT 市场的兴趣。


    但不幸的是，对埃斯塔维来说，情况并不太乐观。在不到一年的时间里，她将 NFT 挂牌拍卖——但市场反应冷淡。出价甚至没有超过 14,000 美元。^(¹³⁶)


    这样的结果并不罕见。现实情况是，NFT 市场波动性极大——甚至比加密货币还要剧烈。


    实际上，其价值往往受到投机行为的影响。此外，还有潮流风尚的影响。


    诚然，你仍然可以从 NFT 中赚到很多钱，但你可能需要采取更短期的策略。成功或许更像是日内交易。


    然而，NFT 市场还存在其他令人困扰的问题：


    *   **普及性**：正如本章前面所述，购买和创建 NFT 的过程远非直观。但如果这个市场要变得更加主流，就必须有显著的改进。本质上，它需要像亚马逊一样实现一键交易。

    *   **拉地毯**：这是指 Web3 开发者放弃项目并卷款跑路。那些被骗的人几乎没有追索的途径。

    *   **白名单**：这是指邀请特定群体参与一个项目。当项目向公众开放时，他们将获得可观的收益。这类似于低价股的“拉高出货”。根据 `Chainalysis`
    的研究，白名单用户的收益率为 75%，而普通用户仅为 20%。^(¹³⁷) 不幸的是，这是一种常见做法，并且很难对此采取任何措施。

    *   **虚假交易**：用户在同一笔交易中既是卖方又是买方。这是可能的，因为你可以轻松创建两个钱包，并且无需提供任何身份信息。通过虚假交易，可以人为地制造某个
    NFT 的交易量，从而吸引关注。

    *   **版权侵权**：某个人将他人知识产权制作成 NFT 并不困难。这不仅欺骗了真正的所有者，也欺骗了进行购买的买家。


    # 新的市场进入策略


    2010 年，凯文·斯特罗姆和迈克·克里格创建了一个名为 `Burbn` 的应用。它允许用户签到位置并发布消息和照片。但有一个问题：它几乎无人问津。这个应用很笨拙——这在早期的
    iOS 应用中很常见——并且没什么实际用途。


    但斯特罗姆和克里格注意到了一件有趣的事。`Burbn` 的用户非常喜欢照片分享功能。于是，两位创始人只专注于这一点，并创建了 Instagram。^(¹³⁸)
    它还具有编辑照片的功能。不过，也许最重要的功能是只需点击三次就能发布一张照片。


    在一个月内，Instagram 获得了超过一百万的用户。^(¹³⁹) 这期间没有任何广告或营销。增长完全靠口碑。


    两年之内，创始人以 10 亿美元的价格将 Instagram 卖给了 Facebook。


    这无疑又是一个标志性的硅谷故事。但这也是一个极其罕见的成功案例。在大多数情况下，初创公司通常需要大量的营销。这是风险投资大部分资金的去向。


    那么，有了 Web3，情况会有所不同吗？对风险资本的需求会减少吗？


    或许会。原因是，Web3 对代币的聚焦可以作为一种融资机制。它也可以是吸引用户的有效方式。嘿，谁不想赚钱呢，对吧？


    但有了 Web3，初创公司的典型演变路径通常不同。你可以在没有产品的情况下开始。相反，你会先提出一个想法，然后从拥有代币的社区那里获得反馈。这有助于实现产品与市场的契合。


    但要实现这一点，需要有一个令人信服的愿景。什么能鼓励人们加入并押注你的项目？你打算解决什么问题？


    通过回答这些问题，你将更有可能创建一个强大的社区。他们也将有更明确的方向来提供反馈，以完善这个愿景。


    就市场进入策略而言，目前涌现出多种有趣的模式。以下是一些例子：


    *   **开发者资助**：这是一种鼓励程序员加入项目的方式。资助形式可以是代币或传统货币。无论如何，通常需要某种类型的激励来引起兴趣。例如，`Compound`
    在 2022 年 3 月 12 日至 9 月 12 日期间设立了一个开发者资助计划，并提供其自有代币 `COMP` 中的 5,000 枚作为资金。^(¹⁴⁰)
    根据其网站的说法：“若没有‘胡萝卜’来激励社区成员提出变革，协议就无法在充满活力和竞争的市场中以应有的速度进行创新。” 该计划不仅仅用于开发新功能。它还用于代码审计，以及为发现漏洞提供赏金。

    *   **模因**：这些可以帮助用户基础实现病毒式增长。不过，创造模因并非易事。创始人可能也不是做这件事的最佳人选。相反，这更适合那些有营销背景的人。在传统社交媒体渠道上拥有大量粉丝也很有帮助。还需要记住另一点：模因的影响往往是暂时的。换句话说，它们的创造很可能需要持续进行。

    *   **空投**：这是指 Web3 项目免费分发代币。也可以空投 NFT。这通常是为了鼓励人们注册项目。但它也可以用于测试项目的技术。一个著名的 NFT
    空投案例是 `Bored Ape Yacht Club`。该项目创建了一个名为 `Mutant Ape Yacht Club` 的新系列。一次空投让所有现有用户都能创建
    10,000 个被称为“变异猿”的猿猴，另外还有 10,000 个可供新用户获取。这对现有用户来说是一种有趣的奖励。同时，这也是吸引新用户的有效方式。


    # Web3 的社会身份


    在 Web3 世界中，用户拥有自己的头像很常见。它们也可以作为社交媒体的头像。这些通常是复古、像素化的视觉图像，比如朋克或无聊猿。例如，Jay-Z 和 Snoop
    Dogg 就在他们的 Twitter 和 Instagram 账户上使用这些头像。


    Web3 头像背后的理念是，它们不应该被修饰打磨。相反，重要的是与社区的互动。


    请记住，许多头像都是 NFT。通过这样做，它们可以成为下一代版本的简历。由于 NFT 在区块链上，用户可以公开查看该用户的活动情况。

    '
- fmt: '# The Web3 Social Network


    By the end of 2021, Facebook’s user base reached 2.82 billion users, up 8% on
    a year-over-year basis.^([^(141)](#fn141)) At the time, there were close to eight
    billion people in the world.


    Facebook has definitely done a great job in monetizing this. The 2021 revenues
    were a massive $117.9 billion, and the profits came to $39.3 billion.


    But for those people who contributed content to Facebook, how much did it pay
    out? Basically, very little. The reason is that much of the company’s revenues
    come from advertising.


    There is nothing wrong with this. Many people enjoy Facebook. It’s not about making
    a buck.


    Yet for Web3 entrepreneurs, they are looking to upend Facebook’s model. And the
    blockchain means that users will have more control over their data and have the
    opportunity to earn tokens.


    The Web3 social network is likely to look very different from a traditional platform.
    First of all, the interface may use open-source tools, such as for the chat. Or
    it could be based on a proprietary system like `Discord`.


    Next, a Web3 social network is likely to be much smaller than a `Twitter`, `Snap`,
    or `Facebook`. The reason is that there will be a focus on a particular community.
    Part of the reason for this is there will likely be a `DAO` involved. For this,
    there will be a specific purpose. If not, it could be difficult to attract the
    right people to make the social network engaging.


    Now a key advantage of a Web3 social network is the portability. If you want to
    leave, you will not be giving up your social graph and content. It belongs to
    you, as it is on the blockchain, and you maintain the data through your ownership
    of the hash. You can then transfer this to another platform.


    By contrast, a traditional social network is a walled garden. When you leave,
    you cannot transfer your users or content. It still belongs to the social network,
    unless you delete the account or turn it off.


    This has been a huge source of power for social networks. It’s why that – when
    there are violations of privacy or other major problems – there is often little
    impact on the user numbers. The users are essentially locked in.


    As a result, social networks have significant power, such as changing policies.
    If `Twitter` no longer wants something on its platform, it can simply prohibit
    it. Or if it wants to charge the fees, it can do so.


    This is also the case with large online marketplaces. Just look at `iOS`. If you
    want to publish an app on the platform, you need to go through a review process.
    If you fail, it could be a big setback for an entrepreneur.


    Then there are the fees. `Apple` generally charges 30% on the revenues generated
    from apps. All in all, this can make it difficult for entrepreneurs to make money.
    This is even the case for the largest tech companies. Note that game maker `Epic`
    is suing `Apple` over its `Appstore` policies.


    Web3 social networks are still in the nascent stages. There has yet to be one
    that has been a breakout. But this will certainly change – and probably soon.


    Here are some interesting startups in the space:


    * `APPICS`: The founder is `Uma Hagenguth`, who is based in Switzerland. She started
    her first business at age 16, with a focus on marketing and web design.^([^(142)](#fn142))
    As for crypto, she got started with this in 2013. Her idea for `APPICS` is to
    create a rewards-based social network with a sleek interface. Users can earn tokens
    by creating content that generates certain numbers of likes and comments.^([^(143)](#fn143))
    Thus, the incentives are based on engagement. `APPICS` is built on the `Telos`
    blockchain. The app is available on `iOS` and `Google Play`.


    * `Aave`: This is another startup in Switzerland. The founder, `Stani Kulechov`,
    launched it in 2017.^([^(144)](#fn144)) He started it while as a law student in
    Helsinki. The company is one of the early developers of a `DeFi` cryptocurrency
    (based on the `Ethereum` network). But `Aave` is also moving into the social media
    space. The project is called the `Lens Protocol` and is based on the `Polygon`
    blockchain.^([^(145)](#fn145)) This allows for the creation of a user profile
    that is an `NFT`, which contains all the social media content. The user can decide
    how to monetize this. Interestingly enough, `Aave` is exploring the idea of turning
    profiles into `DAO`s.


    * `Yup`: This is a Web3 platform that allows people to curate content from platforms
    like `OpenSea`, `Twitter`, `YouTube`, and `Mirror`. `Yup` pays its users based
    on engagement. In early 2022, the company raised $3.5 million from `Distributed
    Global`.^([^(146)](#fn146))'
