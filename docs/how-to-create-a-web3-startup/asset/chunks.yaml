- fmt: '# Developer Views


    So what are some of the approaches and views of Web3 developers? Well, here’s
    a look at this from a company called GeodeFinance, which is a developer of staking
    technology.


    First, here are the takeaways from `0xCypher`^([^(87)](#fn87)):


    *   **Ethereum**: “Currently, in our application, records of dozens of data sets
    belonging to each wallet should be kept in Ethereum. That’s because keeping them
    in a central database completely forces our users to trust us. That’s why every
    web component that appears on our interfaces comes from Ethereum, a decentralized
    database. So no one, including me, can change the numbers at will. Any updates
    are made to the extent that smart contracts allow, which is why I recommend every
    DeFi and Web3 user make sure that contracts are written securely and without errors.”


    *   **Tools**: “We first find an RPC (remote procedure call) endpoint. If a node
    is running on your local machine, a port of your computer is connected to Ethereum.
    Every call you send to a URL such as `127.0.0.1/8000` can now withdraw or send
    your balance and contract information from Ethereum. After connecting the provider,
    you also need to encode all the contract interactions. We are lucky that Web3
    libraries can be used in both Javascript and Python quite effectively.”


    *   **Proof-of-stake**: “The proof-of-stake-based version 2 of the Ethereum named
    the ‘beacon chain’ is deposit-based. The main way I use Web3 libraries is to send
    API calls to these chains and load the data I get into our own smart contract
    via oracle services. Normally you can do this by simply calling a function in
    both Python and Javascript. But we use a multi-signature system called Gnosis
    to ensure data security with a secure consensus, which means we encode and sign
    the input data and send it to web3.”


    Here are the views from Pacific:


    *   **Web3 Experience**: “The main question and the hardship about all of these
    marvelous benefits of Web3 is the responsibility that comes with it. 5 billion
    people have access to the internet and still, most of them are not even comfortable
    with using it. Also, using Web3 is not as comfortable as using the usual Web2.
    Web3 is being built upon smart contract blockchains such as Ethereum, Avalanche,
    Solana, etc. To operate freely on these blockchains, you need to have all the
    responsibilities for your wallet, you need to interact with lots of different
    types of Decentralized applications and mostly and at the very basic level you
    need to know what you are doing within and on these decentralized applications.
    All of these factors can look frustrating at first for most people and it is frustrating
    when we consider the majority to be honest. There needs to be a whole paradigm
    shift, for Web3 to be the new standard, and in my point of view, it will take
    some time.”


    *   **Developing on Ethereum**: “Ethereum has been around for nearly ten years.
    It has been the first one around with the smart contracts that gave the idea of
    money that is programmable. Also, Ethereum has a strong foundation with a highly
    capable team and the community. This strong foundation makes Ethereum attractive.
    From a developer perspective, there are much more resources on the internet for
    Ethereum than any other blockchain. You can find answers with several search engine
    queries. This is not the case for most of the blockchains even that are EVM compatible.
    Technology accumulates around Ethereum, which results in bigger communities, higher
    developer support, and thus higher adaptability. Tied with that attractiveness,
    the number of Decentralized apps that are being built around Ethereum is higher
    than other blockchains combined. This gap is slowly closing, however, the Ethereum
    dominance on Web3 infrastructure will be there for a while.”


    *   **Startups**: “The main problems with Web3 are that it still can be considered
    as it is in its infancy and there is an adaptability problem. So for me, an interesting
    start-up should be solving these issues about Web3 and Ethereum. OpenSea and the
    NFT ecosystem have done a great job of arousing the interest of non-technical
    people and getting them into the space. With that showcase, we have seen that
    anybody can interact with the blockchains with a little effort. Even though the
    idea of OpenSea is still similar to the Web2 companies, there needs to be a transitional
    form, from centralized to decentralized for most people to understand what is
    really going on with the Web3.”


    *   **Hyper-Financialization**: “Everything that users do in Web3 is through their
    wallet, unlike the current Web2 paradigm where people think that they are using
    most of these platforms for free. Of course, this is not the case but it is perceived
    that way. From what we know from behavioral economics, most of the people are
    loss-averse. The absolute value of -$10 dollars is much more than the absolute
    value of +$10 in people’s eyes. So in terms of Web3 adaptation for the general
    public, an interesting start-up should build up an architecture where people won’t
    feel like they are losing money when they act on a blockchain or Web3 platform.”


    *   **Alternatives to Ethereum**: “For me, Avalanche is a great alternative to
    Ethereum, especially if you’re a new user or a small-level investor who’s only
    got a little bit of extra cash to experiment and learn with. Avalanche offers
    EVM compatibility with its C-Chain, and lower transaction costs with higher throughput
    thanks to the probabilistic nature of its consensus protocol. Also, Avalanche
    blockchain can have some advantages on scalability with its Subnets. In a future
    where Web3 is the new standard, leap-forward technologies like Subnets can still
    ensure decentralization while removing the burdens of scalability issues.”'
