  raw: '## The Competition for Talent


    A key advantage for recruiting Web3 talent is the excitement of the industry.
    For many potential candidates, they were not a part of the Web1 or even Web2\.
    Web3 is a chance to be a part of a transformative event in tech history.


    Next, there is much work to be done. There will need to be new innovations. And
    not just for software and systems. There will also need to be a rethinking of
    business models and go-to-market strategies.


    Finally, there is the allure of making substantial amounts of money. Granted,
    there are still plenty of people who are idealistic and want to change the world.
    But there are probably many more that are driven by the potential for striking
    it rich.


    Yet there are some issues to keep in mind. The reality is that there are not many
    experienced blockchain and crypto developers. A study by Electric Capital estimates
    the number at only about 18,000.^([^(92)](#fn92)) For those working in Web3, it’s
    under 5,000\. By comparison, there are over 16 million developers that use JavaScript.


    Given the demand in the Web3 industry, there will certainly be much more growth
    in the number of qualified developers. But it will take time to increase the numbers.
    The underlying concepts of Web3 can be difficult. There will even need to be some
    un-learning of traditional development concepts.


    Given all this, there should be no surprise that compensation packages for Web3
    and crypto talent have skyrocketed. For example, at Coinbase, a senior protocol
    engineer makes an average of $362,000 a year and the pay for an infrastructure
    engineer is $672,550.^([^(93)](#fn93)) This is at roughly the 75th percentile
    of the pay ranges for similar tech companies.


    Thus, for an entrepreneur, you need to have a compelling message to recruit Web3
    talent. Consider that it’s common for startups to include this in their job ads
    – usually at the top. Here are some examples:


    *   “At Matter Labs, we are building zkSync: a blockchain scaling solution secured
    purely by cutting-edge cryptography. Our mission is to scale Ethereum to billions
    of users, fully preserving its most valuable properties — permissionlessness,
    trustlessness, and resilience, — in order to protect and enhance global economic
    freedom.”^([^(94)](#fn94))


    *   “Mysten Labs believes that decentralized and open protocols are the bedrock
    of the internet of value. This is why at Mysten, we are creating foundational
    infrastructure to accelerate the adoption of decentralized protocols based on
    blockchain technologies.”^([^(95)](#fn95))


    *   “Valora Inc’s mission is to unlock access to financial opportunity so everyone
    can create and share value without barriers. We believe every person should have
    access to the information, education, and tools needed to build wealth. When everyone
    has the potential to prosper, our world will be a more supportive and interconnected
    place.”^([^(96)](#fn96))


    *   “[Alchemy’s] mission is to bring blockchain to a billion people. The Alchemy
    Platform is a world class developer platform designed to make building on the
    blockchain easy. We''ve built leading infrastructure in the space, powering over
    $105 billion in transactions for tens of millions of users in 99% of countries
    worldwide.”^([^(97)](#fn97))


    However, having the right message is just a minimum. You will likely need to raise
    venture capital or get the support of an incubator or accelerator program. If
    you cannot pay competitive salaries, you will have a tough time putting together
    the right team.


    In fact, when it comes to job ads for Web3 companies, you might want to mention
    the general funding history. This will help build more confidence in the company.


    OK then, so now let’s take a look at the various roles for a Web3 team.


    ## Developer Advocate


    For Web3 infrastructure and tools categories, there is often the use of open-source
    software. This allows for leveraging innovation, but also for providing wider
    distribution of the technology.


    But for a project to be successful, there needs to be a strong and vibrant community.
    This is where the Developer Advocate comes in. This person will cultivate the
    relationships with the developer community. This is done with a variety channels:


    *   Social media and collaboration platforms like Twitter, YouTube, Telegram,
    Discord, and Reddit.


    *   Virtual and in-person workshops.


    *   Hackathons.


    *   Conferences.


    The Developer Advocate will have a rare blend of technical and soft skills. This
    person should understand a computer language like Rust, Solidity, or C++. There
    should also be experience using platforms for creating smart contracts.


    In terms of the soft skills, the Developer Advocate should be a strong communicator.
    They can do such things as


    *   Be a speaker at an event.


    *   Write blogs.


    *   Create podcasts.


    *   Put together engaging videos, such as for tutorials or demos.


    *   Craft social media posts.


    Even though a Developer Advocate will likely have a technical background, they
    will not spend any of their time coding. There will simply not be enough time.
    Rather, the duties will often include interacting with the company’s developers
    as well as the engineering teams.


    ## Community Manager


    Whether a startup is focused on infrastructure or applications, there is usually
    a need to build a strong community. In the early stages, you want to make sure
    you can connect with early adopters. They will generally be more engaged with
    your software. They will also provide useful feedback and tell other users about
    your company.


    This is why it is common to hire a community manager. No doubt, this person will
    help with content on social media channels and blogs. But there will be other
    critical duties, including:


    *   Develop a strategy for targeting the right groups.


    *   Come up with a social media and blog calendar.


    *   Manage a newsletter.


    *   Help with customer issues, comments, and questions. There will certainly need
    to be collaboration with customer support and product teams.


    *   Provide assistance with online and live events.


    While a community manager does not have to be a programmer, they should have a
    high-level understanding of blockchain and crypto. A startup may also want to
    provide some training.


    The main qualifications for a community manager include good communication skills
    – and yes, passion for the product and industry. This person will also need thick
    skin. Communities can sometimes get unruly and harsh. A good community manager
    will know how to keep their cool.


    Creativity is also important. For example, a community manager can help come up
    with engaging memes. These can certainly be a good way to attract and retain users.
    Or a community manager can help create promos, contests, and giveaways.


    Something else: A key role for the community manager is education. Let’s face
    it, users do not want to be “sold” to. They want to get value. What’s more, when
    it comes to new users, they will have lots of questions about Web3.'
