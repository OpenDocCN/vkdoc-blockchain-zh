- fmt: '# Recruiting


    For a startup, there probably will not be an in-house recruiter. Instead, this
    may be outsourced to an agency. This can still be expensive, though.


    As a result, a company will still need to do its own recruiting as well. And often
    this is for the founders and executives. This will demonstrate to the candidates
    the importance of getting the best talent. For example, for the executive leadership
    team, the myriad of speaking engagements, conferences, and meetups can be great
    opportunities to find strong candidates.


    Although, a startup might want to hire a recruiting assistant or HR person. They
    can handle the administrative details, such as tracking the candidates, documenting
    the interviews, and doing the screening. They can also help with the sourcing.
    This could mean using resources like `LinkedIn`.


    It’s also never too early to think about a company’s culture, which is very important
    for recruiting. Here’s how `Coinbase` looks at its own: “There are a few things
    we look for across all hires we make at `Coinbase`, regardless of role or team.
    First, we look for candidates who will thrive in a culture like ours, where we
    default to trust, embrace feedback, and disrupt ourselves. Second, we expect all
    employees to commit to our mission-focused approach to our work. Finally, we seek
    people who are excited to learn about and live crypto, because those are the folks
    who enjoy the intense moments in our sprint and recharge work culture.”^([^(100)](#fn100))


    There’s a saying in the tech world that “the next five hires are the most important
    when starting a company.” This is certainly spot on. The reason is that this is
    where the culture will be formed. During this stage, you need to have a good sense
    of the vision of the company. If not, this could make it difficult to have a unified
    team that scales.


    Given the dynamic changes with Web3, it can be difficult to get a sense of what
    the goals should be. There is always a temptation to evolve with the changes.


    But ultimately, you want to take a long-term approach. What will be needed for
    the next ten years?


    Again, `Coinbase` is a good example of this. The founder and CEO, `Brian Armstrong`,
    started the company in 2012. He became part of the `YCombinator` program and raised
    $150,000. At the time, he split with his partner because they disagreed about
    the vision of the company.


    `Armstrong` was a firm believer in blockchain and bitcoin. However, he realized
    that it was too complicated for many people. So he wanted to create a marketplace
    that made it easier for anyone to buy and sell Bitcoin. He also aimed to create
    a system that focused on compliance. `Armstrong` thought this would be key to
    building trust.


    Interestingly enough, there were many people who thought his idea was terrible.


    But `Armstrong` persisted and he convinced many employees, investors, and customers
    about his vision.


    Fast-forward to today. `Armstrong` is one of the wealthiest persons in the world,
    with a net worth of over $6 billion. As for `Coinbase`, it is a clear leader in
    the crypto world.


    According to `Roger Lee`, a venture capitalist in `Battery Ventures` and an early
    investor in `Coinbase`: “The key lesson is to think long-term. `Coinbase` could
    have taken a bunch of short-cuts in building out their solution—for example, ignoring
    and minimizing compliance, regulations and so on. But they chose the long game
    and are accruing huge value as a result.”^([^(101)](#fn101))


    # Recruiting Best Practices


    Recruiting is certainly challenging. A person’s resume might look standout. But
    the person could still turn out to be the wrong match for the venture. Often this
    is when there is a clash with the company culture.


    Even a few bad hires can be problematic. It could slow the growth of a company.
    It can also encourage other top employees to leave.


    So how can you be a better recruiter? Well, there are some best practices. But
    it’s also important to keep in mind that success is often about practice.


    Before you recruit, though, there are some preliminaries. First of all, you need
    to put together clear-cut requirements for what you are looking for. True, this
    may seem basic. But then again, it’s common for the requirements to be vague and
    this can mean attracting and selecting the wrong candidates. Make sure to spend
    time on what you are looking for.


    Next, you should look at ways to improve the message and vision for the company.
    You want to make the opportunity as exciting as possible.


    You also need to come up with goals and metrics to track the performance of the
    hiring process. This will not be very exact, especially in the early stages. But
    you still need to come up with some benchmarks – and you can change these over
    time.


    With Web3 recruiting, you will probably have difficulties in finding people with
    relevant experience. The reason is that many of the technologies are fairly new.
    If you have a job ad that says you are looking for a `Solidity` programmer that
    has ten years’ experience, you will probably be laughed at.


    “Recruiting is one of the toughest parts of any tech startup,” said `Denis Mars`,
    who is the CEO and founder of `Proxy`. “But it’s even tougher for new categories.
    So, what I look for are those candidates who want to solve hard problems. And
    yes, there are many problems to be solved with Web3.”^([^(102)](#fn102))


    He points out the example of `Google`, which has hired tens of thousands of talented
    engineers. “The company was solving a tough problem – that is, searching effectively
    all the information on the Internet,” he said. “It was very interesting to computer
    science PhDs.”


    `Mars` looks for candidates that have completed their own independent projects.
    One example was a developer who used Bluetooth technology that allowed for peer-to-peer
    communication. In other words, it was able to do this without the need for Internet
    access.


    Another popular way to gauge the skills of a developer is to setup a code challenge.
    Although, make sure to have a reasonable deadline and focus on a certain element
    of Web3.


    In some cases, a startup will use pair programming. This is a code challenge,
    but two developers will work on it. You want to get a sense of the collaboration
    and communications skills.


    With the limited supply of tech talent, you have little choice but to look outside
    the United States. Because of this, many Web3 companies are remote-first organizations
    or fully remote.


    Although, this does not mean there should be no contact. For example, you can
    set up events to bring people together. There can also be periodic meetings where
    all the company’s team members meet up.


    Then what about sourcing talent? As mentioned earlier, `LinkedIn` is a good option.
    It definitely helps that you get a resume and listing of projects.


    But there are other effective channels to find Web3 tech talent, such as:


    - **Job Boards**: General purpose platforms like `Indeed` and `ZipRecruiter` can
    be useful. But there are also job boards specific for crypto and blockchain. Examples
    include `Angel`, `CryptoJobs`, and `Crypto Jobs List`.

    - **Talent Marketplaces**: These are generally focused on freelancers and contractors.
    One of the top platforms is `UpWork`. Such a service can be a good option for
    a startup because you can get a sense of the person’s capabilities. Ultimately,
    they could become employees.

    - **Social Media**: Spend time reading `Twitter`, `Reddit`, and other channels
    that focus on Web3.

    - **Referrals**: Ask your own developers if they have friends who would be good
    candidates. Often these may be the best prospects.


    You should spend time creating a compelling career page. It should not just be
    a listing of the jobs either. Instead, provide the vision for the company and
    the values. You should also have photos and videos of the team.'
  raw: '## Recruiting


    For a startup, there probably will not be an in-house recruiter. Instead, this
    may be outsourced to an agency. This can still be expensive, though.


    As a result, a company will still need to do its own recruiting as well. And often
    this is for the founders and executives. This will demonstrate to the candidates
    the importance of getting the best talent. For example, for the executive leadership
    team, the myriad of speaking engagements, conferences, and meetups can be great
    opportunities to find strong candidates.


    Although, a startup might want to hire a recruiting assistant or HR person. They
    can handle the administrative details, such as tracking the candidates, documenting
    the interviews, and doing the screening. They can also help with the sourcing.
    This could mean using resources like LinkedIn.


    It’s also never too early to think about a company’s culture, which is very important
    for recruiting. Here’s how Coinbase looks at its own: “There are a few things
    we look for across all hires we make at Coinbase, regardless of role or team.
    First, we look for candidates who will thrive in a culture like ours, where we
    default to trust, embrace feedback, and disrupt ourselves. Second, we expect all
    employees to commit to our mission-focused approach to our work. Finally, we seek
    people who are excited to learn about and live crypto, because those are the folks
    who enjoy the intense moments in our sprint and recharge work culture.”^([^(100)](#fn100))


    There’s a saying in the tech world that “the next five hires are the most important
    when starting a company.” This is certainly spot on. The reason is that this is
    where the culture will be formed. During this stage, you need to have a good sense
    of the vision of the company. If not, this could make it difficult to have a unified
    team that scales.


    Given the dynamic changes with Web3, it can be difficult to get a sense of what
    the goals should be. There is always a temptation to evolve with the changes.


    But ultimately, you want to take a long-term approach. What will be needed for
    the next ten years?


    Again, Coinbase is a good example of this. The founder and CEO, Brian Armstrong,
    started the company in 2012\. He became part of the YCombinator program and raised
    $150,000\. At the time, he split with his partner because they disagreed about
    the vision of the company.


    Armstrong was a firm believer in blockchain and bitcoin. However, he realized
    that it was too complicated for many people. So he wanted to create a marketplace
    that made it easier for anyone to buy and sell Bitcoin. He also aimed to create
    a system that focused on compliance. Armstrong thought this would be key to building
    trust.


    Interestingly enough, there were many people who thought his idea was terrible.


    But Armstrong persisted and he convinced many employees, investors, and customers
    about his vision.


    Fast-forward to today. Armstrong is one of the wealthiest persons in the world,
    with a net worth of over $6 billion. As for Coinbase, it is a clear leader in
    the crypto world.


    According to Roger Lee, a venture capitalist in Battery Ventures and an early
    investor in Coinbase: “The key lesson is to think long-term. Coinbase could have
    taken a bunch of short-cuts in building out their solution—for example, ignoring
    and minimizing compliance, regulations and so on. But they chose the long game
    and are accruing huge value as a result.”^([^(101)](#fn101))


    ## Recruiting Best Practices


    Recruiting is certainly challenging. A person’s resume might look standout. But
    the person could still turn out to be the wrong match for the venture. Often this
    is when there is a clash with the company culture.


    Even a few bad hires can be problematic. It could slow the growth of a company.
    It can also encourage other top employees to leave.


    So how can you be a better recruiter? Well, there are some best practices. But
    it’s also important to keep in mind that success is often about practice.


    Before you recruit, though, there are some preliminaries. First of all, you need
    to put together clear-cut requirements for what you are looking for. True, this
    may seem basic. But then again, it’s common for the requirements to be vague and
    this can mean attracting and selecting the wrong candidates. Make sure to spend
    time on what you are looking for.


    Next, you should look at ways to improve the message and vision for the company.
    You want to make the opportunity as exciting as possible.


    You also need to come up with goals and metrics to track the performance of the
    hiring process. This will not be very exact, especially in the early stages. But
    you still need to come up with some benchmarks – and you can change these over
    time.


    With Web3 recruiting, you will probably have difficulties in finding people with
    relevant experience. The reason is that many of the technologies are fairly new.
    If you have a job ad that says you are looking for a Solidity programmer that
    has ten years’ experience, you will probably be laughed at.


    “Recruiting is one of the toughest parts of any tech startup,” said Denis Mars,
    who is the CEO and founder of Proxy. “But it’s even tougher for new categories.
    So, what I look for are those candidates who want to solve hard problems. And
    yes, there are many problems to be solved with Web3.”^([^(102)](#fn102))


    He points out the example of Google, which has hired tens of thousands of talented
    engineers. “The company was solving a tough problem – that is, searching effectively
    all the information on the Internet,” he said. “It was very interesting to computer
    science PhDs.”


    Mars looks for candidates that have completed their own independent projects.
    One example was a developer who used Bluetooth technology that allowed for peer-to-peer
    communication. In other words, it was able to do this without the need for Internet
    access.


    Another popular way to gauge the skills of a developer is to setup a code challenge.
    Although, make sure to have a reasonable deadline and focus on a certain element
    of Web3.


    In some cases, a startup will use pair programming. This is a code challenge,
    but two developers will work on it. You want to get a sense of the collaboration
    and communications skills.


    With the limited supply of tech talent, you have little choice but to look outside
    the United States. Because of this, many Web3 companies are remote-first organizations
    or fully remote.


    Although, this does not mean there should be no contact. For example, you can
    set up events to bring people together. There can also be periodic meetings where
    all the company’s team members meet up.


    Then what about sourcing talent? As mentioned earlier, LinkedIn is a good option.
    It definitely helps that you get a resume and listing of projects.


    But there are other effective channels to find Web3 tech talent, such as:


    *   Job Boards: General purpose platforms like Indeed and ZipRecruiter can be
    useful. But there are also job boards specific for crypto and blockchain. Examples
    include Angel, CryptoJobs, and Crypto Jobs List.


    *   Talent Marketplaces: These are generally focused on freelancers and contractors.
    One of the top platforms is UpWork. Such a service can be a good option for a
    startup because you can get a sense of the person’s capabilities. Ultimately,
    they could become employees.


    *   Social Media: Spend time reading Twitter, Reddit, and other channels that
    focus on Web3.


    *   Referrals: Ask your own developers if they have friends who would be good
    candidates. Often these may be the best prospects.


    You should spend time creating a compelling career page. It should not just be
    a listing of the jobs either. Instead, provide the vision for the company and
    the values. You should also have photos and videos of the team.'
  trans: '

    # 招聘


    对于初创公司而言，很可能没有内部的招聘专员。相反，这项工作可能会外包给猎头公司。不过，这仍然可能很昂贵。


    因此，公司仍然需要自己进行招聘。而且这通常由创始人和高管亲自负责。这能向候选人展示公司对获取顶尖人才的重视。例如，为了组建高管领导团队，大量的演讲活动、会议和线下聚会可能是寻找优秀候选人的绝佳机会。


    不过，初创公司或许会想聘请一位招聘助理或人事专员。他们可以处理行政细节，例如跟踪候选人、记录面试过程以及进行筛选。他们也可以协助进行人才搜寻，这可能意味着要利用像
    `LinkedIn` 这样的资源。


    同时，考虑公司文化永远不嫌早，这对招聘至关重要。以下是 `Coinbase` 如何看待自身文化的：“无论职位或团队如何，我们在所有招聘中都寻求一些共同特质。首先，我们寻找那些能在我们这种文化中茁壮成长的候选人，在这种文化中，我们默认信任、接受反馈，并勇于自我颠覆。其次，我们期望所有员工都致力于以任务为核心的工作方式。最后，我们寻找那些对学习加密货币并以此为生活方式感到兴奋的人，因为正是这些人享受我们冲刺与休整并存的工作文化中的紧张时刻。”^(¹⁰⁰)


    科技界有句老话：“创办公司时，接下来招的五个人最重要。”这话说得一点没错。原因是这是文化形成的关键阶段。在这个阶段，你需要对公司愿景有清晰的认识。如果没有，可能会导致难以建立一个能够规模化的统一团队。


    考虑到 Web3 的动态变化，很难把握目标应该是什么。人们总是有一种随着变化而演进的冲动。


    但最终，你需要采取长远的方法。未来十年需要什么？


    再次以 `Coinbase` 为例。创始人兼首席执行官 `Brian Armstrong` 于 2012 年创办了这家公司。他加入了 `YCombinator`
    计划，并筹集了 15 万美元。当时，他因对公司愿景存在分歧而与合伙人分道扬镳。


    `Armstrong` 是区块链和比特币的坚定信徒。然而，他意识到这对许多人来说过于复杂。因此，他想创建一个市场，让任何人都能更容易地买卖比特币。他还致力于创建一个专注于合规性的系统。`Armstrong`
    认为这是建立信任的关键。


    有趣的是，当时很多人认为他的想法糟透了。


    但 `Armstrong` 坚持了下来，并说服了许多员工、投资者和客户接受他的愿景。


    让我们快进到今天。`Armstrong` 已成为全球最富有的人之一，净资产超过 60 亿美元。而 `Coinbase` 则是加密货币领域当之无愧的领导者。


    根据 `Battery Ventures` 的风险投资家兼 `Coinbase` 早期投资者 `Roger Lee` 的说法：“关键教训是要有长远眼光。`Coinbase`
    在构建解决方案时本可以走很多捷径——例如，忽视并最小化合规、监管等问题。但他们选择了长远博弈，并因此积累了巨大的价值。”^(¹⁰¹)


    # 招聘最佳实践


    招聘无疑是充满挑战的。一个人的简历可能看起来非常出色，但他仍然可能不适合这家企业。这通常发生在与公司文化产生冲突时。


    即使只是少数几次糟糕的招聘也可能带来问题。它可能会减缓公司的增长速度，也可能促使其他优秀员工离职。


    那么，如何成为一个更好的招聘者呢？有一些最佳实践可供参考。但同样要记住，成功往往在于实践。


    不过，在开始招聘之前，有一些准备工作。首先，你需要清晰地制定出你所寻找人才的具体要求。诚然，这看起来是基础，但另一方面，要求模糊不清的情况很常见，这可能导致吸引并筛选出错误的候选人。请务必花时间明确你的需求。


    接下来，你应该寻找方法来改善公司的信息传递和愿景展示。你要尽可能让这个机会显得令人兴奋。


    你还需要制定目标和指标来跟踪招聘流程的表现。在早期阶段，这不会非常精确。但你仍然需要设定一些基准——并可以随着时间的推移进行调整。


    在进行 Web3 招聘时，你很可能会发现很难找到有相关经验的人。原因是许多相关技术都相当新颖。如果你的招聘广告上说，你想找一位有十年经验的 `Solidity`
    程序员，你很可能会被嘲笑。


    “招聘是任何科技初创公司最困难的部分之一，”`Proxy` 的首席执行官兼创始人 `Denis Mars` 说。“但对于新兴类别来说，这甚至更加困难。因此，我寻找的是那些想要解决难题的候选人。没错，Web3
    领域有很多问题需要解决。”^(¹⁰²)


    他举了 `Google` 的例子，该公司雇佣了数万名才华横溢的工程师。“这家公司当时正在解决一个难题——即有效地搜索互联网上的所有信息，”他说。“这对计算机科学博士来说非常有吸引力。”


    `Mars` 寻找那些完成过自己独立项目的候选人。其中一个例子是一位使用蓝牙技术实现点对点通信的开发者。换句话说，它不需要网络连接就能做到这一点。


    另一种评估开发者技能的热门方法是设置一个代码挑战。不过，请确保设定一个合理的截止日期，并专注于 Web3 的某个特定方面。


    在某些情况下，初创公司会使用结对编程。这也是一种代码挑战，但由两名开发者共同完成。你希望借此了解他们的协作和沟通能力。


    由于技术人才供应有限，你几乎没有选择，只能将目光投向美国以外。正因为如此，许多 Web3 公司都是远程优先组织或完全远程工作。


    尽管这并不意味着可以没有联系。例如，你可以组织活动让大家聚在一起。也可以定期举行全体团队成员会议。


    那么，如何寻找人才呢？如前所述，`LinkedIn` 是一个不错的选择。它确实能帮你获取简历和项目列表。


    但还有其他有效的渠道可以寻找 Web3 技术人才，例如：


    - **招聘网站**：像 `Indeed` 和 `ZipRecruiter` 这样的通用平台可能有用。但也有专门针对加密货币和区块链的招聘网站。例子包括 `Angel`、`CryptoJobs`
    和 `Crypto Jobs List`。

    - **人才市场**：这些通常专注于自由职业者和合同工。最顶尖的平台之一是 `UpWork`。这类服务对初创公司来说是一个不错的选择，因为你可以了解这个人的能力。最终，他们可能会成为正式员工。

    - **社交媒体**：花时间浏览 `Twitter`、`Reddit` 以及其他关注 Web3 的渠道。

    - **推荐**：询问你自己的开发者是否有朋友是合适的候选人。这些人通常可能是最有希望的候选人。


    你应该花时间创建一个引人入胜的招聘页面。它不应该仅仅是一份职位列表。相反，要提供公司的愿景和价值观。你还应该放上团队的照片和视频。

