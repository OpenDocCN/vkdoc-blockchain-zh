    contracts, which are called zkApps. Another advantage is that it is easy to program
    the applications.^([^(63)](#fn63))


    In March 2022, Mina Ecosystem raised $92 million.^([^(64)](#fn64)) This was certainly
    a major validation of the zero-knowledge smart contract category.


    According to Brian Lee, a partner at FTX Ventures: “Mina’s lightweight blockchain
    architecture allows the protocol to reach a new level of decentralization by enabling
    everyone to easily participate in the network. That, combined with its native
    data-privacy capabilities makes it a unique L1 with massive potential to shape
    the future of Web3.”^([^(65)](#fn65))


    ## Mysten Labs


    In 2021, Evan Cheng, Sam Blackshear, Adeniyi Abiodun, and George Danezis cofounded
    Mysten Labs . Before this, the team worked at Novi, which was the crypto division
    at Meta. The cofounders helped to create the Move programming language as well
    as the Diem blockchain.


    While Meta had the benefit of lots of resources, it was difficult to make progress.
    One of the main reasons was the onerous regulatory scrutiny.


    So, for the cofounders, it seemed that a better path was to create a startup.
    For Mysten Labs , the focus is on building advanced infrastructure technology
    for the Layer 1 blockchain called Sui. This is a next-generation version of Diem,
    which uses a PoS protocol that is permissionless. You can also use the Move language
    to create smart contracts.


    The big differentiation then? It has potentially unlimited throughput or transactions
    per second.^([^(66)](#fn66))


    As for the business model, it is similar to the approach for many infrastructure
    operators. That is, the company generates revenues by getting a percentage of
    the tokens from the different blockchains. It is essentially an ownership model.^([^(67)](#fn67))


    ## StarkWare


    Uri Kolodny is a serial entrepreneur. He cofounded OmniGuide, which developed
    precise optical laser scalpels for minimally invasive surgery. He then went on
    to start TimnaTimna. The company created an ultrasound therapeutic product for
    cardiovascular problems.^([^(68)](#fn68))


    But after this, he would move into the software business. For example, he launched
    Mondria Technologies, which focused on a new type of declarative programming language
    for visualizing data.


    The experience would prove critical for his Web3 play – Starkware . Founded in
    2017, the company is a top developer of Ethereum scaling solutions. The two main
    ones include StarkEx and StarkNet. They make it easier for people to create dApps
    on the Ethereum network.


    StarkWare has created its own language, which is called Cairo. It has been in
    production since June 2020\. Although, you do not have to use this language for
    StarkWare. The company has been building transpilers for other systems.


    StarkWare uses a zero-knowledge rollup. This means that the verification is based
    on combining transactions, which speeds up the performance and allows for lower
    fees. StarkWare has also invested heavily in its security infrastructure. As for
    the customers, they include many top Web3 providers like Immutable, dYdX, and
    ConsenSys.^([^(69)](#fn69))


    Since inception, StarkWare has raised $173 million.^([^(70)](#fn70)) Some of the
    investors include Sequoia Capital and Paradigm.'
