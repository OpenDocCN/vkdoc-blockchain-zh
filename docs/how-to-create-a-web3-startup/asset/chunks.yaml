- fmt: '## Ox Labs


    `Ox Labs` is one of the first DeFi protocols and the operator of `Matcha`, which
    is a crypto exchange. According to CEO and cofounder, Amir Bandeali: “When we
    were starting 0x almost six years ago, we had this thesis that everything of value
    would eventually be tokenized.”^([^(194)](#fn194))


    The core business of `Ox Labs` is integration services. With these, companies
    are able to create their own Web3 platforms, such as allowing for using tokens.
    For example, the technology powers the NFT marketplace for `Coinbase`.


    `Ox Labs` supports seven large blockchains, which include `Ethereum`, `Polygon`,
    `Fantom`, `Avalanche`, `Optimism`, `BNB Chain`, and `Celo`. There are also integrations
    with the top wallets and apps like `MetaMask`, `Coinbase Wallet`, `Polygon Wallet`,
    `Brave`, `Matcha`, `dYdX`, `Zapper`, `Zerion`, and `Shapeshift`. `Ox Labs` has
    tokenized over $157 billion in value.^([^(195)](#fn195))


    In April 2022, the company raised $70 million. In a blog post from one of the
    investors – `Greylock` – had this to say: “At `Greylock`, we especially love to
    back companies that arm the builders: developers and entrepreneurs. `0x Labs`
    is one of these companies. While some may believe that decentralization of exchange
    is infeasible and users will gravitate to a small handful of already-leading exchanges
    and wallets, we take the opposite view. We believe we’re at the very early innings
    of re-building our financial infrastructure on new rails, where the minimum future
    trading volume encapsulates all existing traditional financial assets, and the
    expected end state includes an ownership economy across social networks, games,
    other real-world assets, and more.”^([^(196)](#fn196))


    ## Conclusion


    DeFi remains relatively small, but there is enormous potential for entrepreneurs.
    The technology allows for much more streamlined, faster, and cheaper financial
    transactions. DeFi can also greatly expand access to financial services, especially
    in developing countries.


    But there are certainly risks. With little regulation, there have already been
    problems with breaches and malfunctions. Yet this means entrepreneurs can build
    systems for better security and stability.


    The opportunities are not just for B2C applications. The B2B space could actually
    be a bigger market. Some of the world’s largest financial services companies have
    been investing in DeFi.


    As for the next chapter, we’ll take a look at the metaverse.


