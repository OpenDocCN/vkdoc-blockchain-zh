- fmt: '# DAO Services


    To help with the creation and management of DAOs, there are new services to streamline
    the process. These are usually traditional SaaS tools.


    For example, there is Poko, which is startup backed by YCombinator. The company’s
    platform can set up the basic structure of a DAO within a couple minutes. It handles
    such things as:


    - **Legal Infrastructure**: Poko is focused on helping the DAO engage in real-life
    interactions with the law. This is done with both on-chain and off-chain assets.

    - **Governance**: Poko has templates to allow for creating voting rights that
    are fair. But this is also done in a way that provides for a process that does
    not get bogged down.

    - **Fundraising**: The platform helps with this. In fact, it is built for large
    asset raises. One of the founders, Geoffrey See, was the Chief Strategy Officer
    and founding team member of Zilliqa. The protocol reached $2 billion.^([^(112)](#fn112))


    Another interesting service provider is Opolis. This helps to provide traditional
    employee benefits for DAOs like payroll, health insurance, 401(k) plans, and so
    on. To do this, Opolis has created an employment cooperative. This has allowed
    for getting more discounts because of the scale of the organization.


    In May 2021, Opolis raised $5 million. Note that many of the investors were DAOs,
    DeFI projects, and investment syndicates. Examples included BadgerDAO, MakerDAO
    Foundation, and MetaPurse.


    According to John Paller, Executive Steward of Opolis: “We set out to demonstrate
    that ‘communities funding communities’ is the new norm for early-stage funding
    of key infrastructural projects in Web3. Gathering investors and funders whose
    long-term goals are in alignment with that of other ecosystem stakeholders was
    top priority for us.”^([^(113)](#fn113))


    # Public Benefit Corporations


    A traditional corporation has a clear-cut goal. It’s about benefiting the shareholders.
    It’s really that simple.


    But over the years, many entrepreneurs have soured on this concept. They instead
    believe there are multiple stakeholders to focus on, such as employees, the customers,
    partners, and even the environment.


    Historically, Wall Street has generally been resistant to this. But there has
    actually been notable change lately. More investors are starting to look at principles
    like ESG (Environment, Social, and Governance).


    Take a look at Larry Fink. He is the CEO and cofounder of BlackRock, which is
    one of the world’s largest asset managers. In his 2022 annual report to shareholders,
    he defended ESG and encouraged corporations to focus on stakeholders beyond the
    shareholders.^([^(114)](#fn114))


    Consider that there is actually a new type of corporation emerging – called the
    public benefit corporation – that has the goal to focus on these ESG values. It
    is becoming more popular with Web3 startups.


    Keep in mind that the public benefit corporation is recognized in Delaware, which
    is the leading jurisdiction for corporate law. The specification is part of a
    company’s certificate of incorporation.


    Some companies are also electing for the Certified B Corp status. This essentially
    is about providing more accountability and transparency for the ESG goals. This
    is accomplished by using the criteria of third-party nonprofit organizations like
    B Lab.


    An example of a Web3 company that is a public benefit corporation is Optimism.
    Here’s how the company describes it: “Not only are we writing software that scales
    Ethereum technology, we are also scaling Ethereum values by creating the rails
    for highly impactful projects that don’t have a business model to succeed…Until
    the project is fully decentralized, we will be donating all profits from running
    a centralized sequencer towards scaling and sustaining public goods.”^([^(115)](#fn115))


    Now as for the rest of the chapter, we’ll take a look at some of the interesting
    DAOs and how they operate.


    # MakerDAO


    While studying at the University of Copenhagen and Copenhagen Business School,
    Rune Christensen ran a startup. It focused on having Westerners teach English
    to persons in China.


    But when Christensen learned about blockchain and Bitcoin in 2011, he sold his
    startup. He also put much of his money into crypto.


    However, he realized there were problems with the industry, such as the breaches.
    Bitcoin also was highly volatile. So, this is why Christensen invented a stablecoin
    – called DAI – and it became part of one of the first DAOs: MakerDAO.^([^(116)](#fn116))
    He built this on the Ethereum network.


    The timing was certainly on target. From the start, MakerDAO became quite popular
    – and it remains one of the world’s largest DAOs.


    But there were some tough times. In early 2020, MakerDAO suffered major losses
    because of the plunge in Ether. But Christensen would adapt to this and turn Dai
    into a stablecoin with various forms of collateral. Within a few months, this
    would turn into the first DeFI protocol to exceed $1 billion.^([^(117)](#fn117))


    MakerDAO has been diversifying its platform into traditional loans. A notable
    example is one of the DAO’s clients, 6s Capital, a commercial lender. The company
    used the MakerDAO technology to structure a $7.8 million loan to Tesla for the
    financing of new repair and collision centers.^([^(118)](#fn118))


    # Friends with Benefits


    Trevor McFedries’ career started in the music industry. He was a musician who
    signed a contract with Interscope while he was in his early 20s.


    But he had another important talent: he could code. This would eventually land
    him a job at Spotify in 2010.^([^(119)](#fn119)) The role for McFedries was to
    help make the streaming service mainstream.


    When he discovered crypto and Ethereum, he saw an opportunity to revolutionize
    the entertainment industry. He then went on to create the Friends with Benefits
    (F.W.B.) DAO.


    His community-building skills were definitely essential. In little time, he built
    F.W.B. into a thriving platform. He also created the first social token, which
    was `$FWB`.


    Think of F.W.B. as a modern-day forum for creatives. To join, you need to buy
    the token, which gives you access to the V.I.P. lounge. You can then communicate
    with the users via Discord. But there are also in-person meetups. By doing this,
    the community can create content – such as music, movies, and so on.


    According to a blog from Andreessen Horowitz, which is an investor in the DAO:
    “By aligning the incentives of the next generation of artists, creators, and builders,
    FWB is enabling a different kind of renaissance for the next evolution of the
    internet. Fittingly, they describe themselves as a digital city.”^([^(120)](#fn120))


    # SailGP


    Larry Ellison, the cofounder and chief technology officer of Oracle, is a long-time
    sailing enthusiast. His team has won two America’s Cups.


    In 2019, Ellison created SailGP, which is an international racing series. It uses
    the F50 catamarans.


    While Ellison is one of the wealthiest persons in the world, he still likes to
    find ways to help finance his ventures. The same goes for SailGP. To this end,
    he teamed up with Near Protocol to make a DAO for it.^([^(121)](#fn121))


    By doing this, the fans will have a way to participate. This could be by deciding
    on the lineup, the branding, and even strategies.


    According to the SailGP website: “Our ambition is to give fans the opportunity
    to own exclusive SailGP NFT moments and artwork, giving access to previously unavailable
    content and making you part of a community this is at the forefront of sports
    and technology.”^([^(122)](#fn122))'
  raw: '## DAO Services


    To help with the creation and management of DAOs, there are new services to streamline
    the process. These are usually traditional SaaS tools.


    For example, there is Poko, which is startup backed by YCombinator. The company’s
    platform can set up the basic structure of a DAO within a couple minutes. It handles
    such things as:


    *   Legal Infrastructure: Poko is focused on helping the DAO engage in real-life
    interactions with the law. This is done with both on-chain and off-chain assets.


    *   Governance: Poko has templates to allow for creating voting rights that are
    fair. But this is also done in a way that provides for a process that does not
    get bogged down.


    *   Fundraising: The platform helps with this. In fact, it is built for large
    asset raises. One of the founders, Geoffrey See, was the Chief Strategy Officer
    and founding team member of Zilliqa. The protocol reached $2 billion.^([^(112)](#fn112))


    Another interesting service provider is Opolis. This helps to provide traditional
    employee benefits for DAOs like payroll, health insurance, 401(k) plans, and so
    on. To do this, Opolis has created an employment cooperative. This has allowed
    for getting more discounts because of the scale of the organization.


    In May 2021, Opolis raised $5 million. Note that many of the investors were DAOs,
    DeFI projects, and investment syndicates. Examples included BadgerDAO, MakerDAO
    Foundation, and MetaPurse.


    According to John Paller, Executive Steward of Opolis: “We set out to demonstrate
    that ‘communities funding communities’ is the new norm for early-stage funding
    of key infrastructural projects in Web3\. Gathering investors and funders whose
    long-term goals are in alignment with that of other ecosystem stakeholders was
    top priority for us.”^([^(113)](#fn113))


