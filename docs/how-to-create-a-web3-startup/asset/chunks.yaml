- fmt: '# Conclusion


    The metaverse has been around for a long time. But with Meta’s huge investments
    in the category, this technology has become red hot. Other megatech operators
    like Apple and Microsoft are gunning for the opportunity as well.


    The metaverse will take considerable time to evolve. It may easily be more than
    a decade of effort. But then again, this is where entrepreneurs can play a big
    role. They can help with the many technologies that must be built.


    For example, there will be a need for systems to allow for haptic feedback, so
    as to make experiences more realistic. There will also be a need to create tools
    that allow for the creation of virtual items and new worlds. AI will also be a
    critical factor for the success of the metaverse. Oh, and then there will be the
    demand for more advanced infrastructure solutions, such as for edge computing.


    Currently, much of the activity with the metaverse is with gaming and consumer
    applications. However, it looks like the enterprise interest is rising. Thus,
    the total market opportunity for the metaverse is likely to be huge.


    As for the next chapter, we’ll take a look at taxes and regulations for Web3.


