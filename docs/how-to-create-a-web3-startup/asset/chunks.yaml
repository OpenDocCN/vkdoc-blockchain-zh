- fmt: '# The Problems


    For some of the most fervent advocates in Web3, the belief is that DAOs will ultimately
    become the dominant form of business organization. Some think that the next mega
    tech company will be a DAO.


    This very well may turn out to be true. But there are still many problems with
    DAOs.


    Let’s take a look:


    - **Unintended Consequences**: A DAO is only as good as the rules that it is based
    on. But unfortunately, it is extremely difficult to anticipate problems. What
    if there is a mistake in the code? A change in the law? Or a natural disaster?
    The algorithm may not be programmed for these “outlier” events – and this could
    lead to a malfunction of the DAO. One approach is to use sophisticated technologies
    like AI. But again, even this is far from perfect. AI is based on having access
    to large amounts of data and putting together the right algorithms. For a DAO,
    there just may not be enough for good outcomes.


    - **Decentralization**: While using legal wrappers is a good strategy, it does
    mean that there will likely be less decentralization. After all, there will still
    be the traditional governance approaches like executives and a board of directors.


    - **Authority**: For a DAO, the smart contract may handle some of the core decisions.
    But what about the other decisions? Well, these are generally for the creators.
    Note that this process may not be transparent. There may also be conflicts of
    interests, especially when it comes to issuing new tokens. Who will they go to?
    Back to the creators?


    - **Complexity**: It’s common to use entities across different countries. While
    this can provide protection, there is also more complexity and expense. Creating
    offshore entities can take months to establish.


    - **Regulations**: In early 2022, the Biden Administration issued an executive
    order about crypto and blockchain. It was mainly a way to encourage research on
    the issues. But this will likely be the basis for regulations on crypto and Web3.
    The result is that it could make it unpredictable for structures like DAOs.


    - **Participation**: Ironically, it is generally low for DAOs. But this should
    not be surprising either. Let’s face it, voting in political elections is often
    tepid. The same goes for corporate proxies. As for DAOs, the lack of participation
    is likely due to several factors. First of all, people may not have the time to
    vote. Next, the issues might not really matter to them. For example, if there
    is a vote on a technical matter or for the operations of the DAO, it probably
    will not get much interest.


    But perhaps the biggest disadvantage of a DAO is that it could lead to bad strategic
    decisions. If Apple Computer or Microsoft were run as this type of entity, would
    it have had the same success? It seems unlikely. The impact of Steve Jobs and
    Bill Gates were incalculable. But of course, their decisions were often far from
    transparent (especially with Jobs) and there was significant centralization.


    “Many organizations that are currently attempting to create DAOs are adopting
    a ‘progressive decentralization’ approach, because for projects to be successful,
    they do need to start with a handful of highly motivated leaders or a core team,”
    said Hinkel. “Immediately jumping into having an organization guided by a group
    of potentially thousands of people, whether through a tokenization of voting rights
    or other mechanisms, is expensive and cumbersome, and has slowed down some DAO
    projects.”


    An exception is for those projects that have substantial scale. They have been
    able to prove the value of the DAO and can raise enough capital to make it run
    properly.


    “While these projects get an outsized amount of attention, they are the exception,
    not the rule,” said Hinkel. “When you draw back the curtain on many of the most
    successful DAO projects, they have significant backing from traditional VC and
    investor sources as well as community support, which requires all of the same
    entrepreneur and fundraising skill sets in terms of networking, and building investable
    business fundamentals as a Web2 company would have.”


    Rather, it might be better for entrepreneurs – in the early stages – to have a
    hybrid approach. On the one hand, there will be traditional corporate and contract
    mechanisms. Then, in terms of the community for the Web3 project, there could
    be a focus on the DAO.


    Here are some other best practices to consider:


    - **Security**: Unfortunately, this remains a problem with DAOs. There continue
    to be breaches – and some of them have resulted in the theft of substantial amounts
    of money. In other words, when it comes to creating DAOs, security should be priority
    No. 1.


    - **SubDAO**: This is a smaller segment within a larger DAO. The idea is to breakdown
    the decision-making into different categories. This can help to improve the participation
    and effectiveness of DAOs.


    - **Limits**: It’s usually a good idea to have a small number of decisions for
    the DAO. Otherwise, the users may get overwhelmed, and they will just avoid voting.


    - **Incentives**: You can provide more tokens to members, so as to help increase
    the engagement of the DAO.


    - **Delegation**: A common problem with DAOs is getting a quorum for proposals.
    A way to deal with this is to allow members to delegate their votes.


    - **Domain-based Voting**: This means that for those users with more experience
    on certain matter, they should have more voting power. “An example is that you
    would rather have the votes of professional marketers to be weighted higher in
    a marketing campaign decision than say a software engineer,” said Nik Kalyani,
    who is the founder of Decentology.^([^(111)](#fn111))


    Nick Casares, who is the head of product at PolyientX (a Web3 tools developer
    for NFTs), has some other best practices to consider. He is an expert on DAOs.
    For example, he is a contributing member for the ATX DAO.


    Here are some of his suggestions:


    - **Establish a north star**: “DAOs are an innovative vehicle to share resources
    and collaborate on a mission with people worldwide. To take full advantage of
    a DAO''s potential, participants must define a clear mission and purpose. There
    is no right or wrong mission, but DAO members must agree on a north star to guide
    the DAO toward its goals.”


    - **Lead without hierarchy**: “The lack of hierarchy within a DAO provides a unique
    challenge that often leads to a sense of lacking leadership. However, this challenge
    is an opportunity in disguise, and DAOs should seek alternative ways to identify,
    encourage and empower contributions from participants. DAOs can use alternative
    processes such as voting, work distribution, and idea crowdsourcing to guide decision-making
    in place of a formal hierarchy.”


    - **Organize for empowerment**: “A clear mission is an important safeguard to
    help participants make decisions aligned with a DAO''s intended outcomes. To make
    up for the lack of hierarchy, DAOs can organize in a way that empowers participant
    action. Establishing clear areas of responsibility and need is an effective way
    to help participants assess their ability to contribute based on their skills
    and expertise.”


    - **Explore legal structures and risks**: “There is no formal legal entity for
    a DAO. Still, participants should seek to understand the legal structures available
    based on the DAO''s types of activity. There is a vibrant community of thought
    leaders exploring alternative entity structures, and DAOs should stay up-to-date
    with the latest developments. DAO participants should articulate the activity
    they will engage in and seek legal counsel to understand legal and financial risks.”


    - **Learn from the DAO community**: “As the concept of a DAO evolves, participants
    should seek to connect with other DAOs to share and learn best practices from
    the web3 community.”'
