  trans: '

    # Web3 框架与库


    人们常常将“库”和“框架”这两个词混为一谈，但实际上它们之间存在重要区别。


    诚然，两者都是代码库，都提供常用功能，例如身份验证、用户界面或安全功能。而且其中许多都基于 JavaScript 或 TypeScript。库和框架确实能极大地加快开发项目的进度。


    那么，区别究竟在哪里呢？关键在于**控制反转**这一概念。基本上，使用库时，你对程序的工作流程拥有更多控制权。而框架则提供了它自己的路径。这与 API 的使用类似。


    对于 Web3 来说，存在大量的库和框架。让我们来看一下：


    -   **Web3.js**（库）：它提供了一套用于链上交易的函数以及与以太坊节点交互的组件。这基本上简化了处理数据传输的 `JSON RPC` 机制（这是一种标准格式）。这是通过使用
    JavaScript 代码实现的。`Web3.js` 还能与 `Node.js` Web 应用程序和 Electron 桌面程序无缝协作。开发者通常会将 `Metamask`
    浏览器扩展（一种浏览器内的以太坊钱包）与此库结合使用。


    -   **Ethers.js**（库）：它使用 JavaScript 和 TypeScript 提供四个主要模块来与以太坊交互。`Ethers.provider`
    负责处理交易；`ethers.contract` 帮助部署和管理智能合约；`ethers.utils` 为 dApp 提供数据格式化和处理功能；`ethers.wallet`
    则用于连接以太坊地址。


    -   **oo7.js**（库）：是的，它是以詹姆斯·邦德命名的。从该库的技术层面来看，它主要涉及响应式表达式或称**绑定**。这本质上使得判断以太坊智能合约上何时触发了值成为可能。


    -   **Truffle**：Consensys 于 2017 年创建了它。Truffle 是一个全面的框架，拥有易于使用的工具，用于创建、调试和部署以太坊智能合约。它还与流行的
    Web 框架（如 `React`、`Angular` 和 `Vue`）进行了集成。使用 Truffle，你可以使用 `Solidity` 或 `JavaScript`
    进行编码。另一个有用的特性是这个框架能管理网络工件。Truffle 还包含了 `Ganache`，这是一套丰富的 GUI 组件。


    -   **Hardhat**（框架）：它允许你用很少的工作量创建一个市场。它处理了管理数字资产的所有复杂事务。该框架支持 `Django` 和 `Ruby
    on Rails` 等 Web 框架。Hardhat 还拥有强大的 `Solidity` 调试能力，这些能力通过丰富的插件生态系统得到了增强。


    -   **OpenZeppelin SDK**（框架）：该框架于 2018 年推出，基于 `Python` 语言构建，为 NFT 和其他代币提供组件。其一个主要优势是内置了强大的安全特性。OpenZeppelin
    SDK 带有自己的开发环境，称为 `Jesta`。但该框架最强大的功能或许是能够升级现有的智能合约。


    -   **Brownie 框架**（框架）：它基于 `Python`，用于在以太坊上创建智能合约。在开发过程中，你可以使用 `Solidity` 或 `Vyper`。Brownie
    框架使用了 `web3.py` 库，该库已被证明能在密集型环境中良好运行。


    **注意**


    **预言机**可以实现混合智能合约。这些合约同时处理链上和链下数据。此类别中的一个顶级解决方案是 `Chainlink`。它建立在多种技术之上，如 `Java`、`C++`、`Python`
    和 `Node.js`。


    ## Web3 编程语言


    正如我们所见，Web3 依赖于多种编程语言。有些语言已经存在多年，比如 `Java`、`JavaScript`、`C++` 和 `Python`。但也有一些是专门为区块链构建的语言。其中一些顶级的语言包括
    `Solidity` 和 `Vyper`。


    无论如何，Web3 开发有一些常用工具。通常会用到 `Node.js` 和一个代码编辑器。编辑器可以是一个用于命令行编码的纯文本应用程序，或者你也可以使用一个复杂的
    IDE（流行的有 `Remix IDE`）。然后通常会用到 Web3 框架和库。最后，开发者会使用钱包来访问节点。


    从宏观层面来看，通常有两种类型的开发者。一种是后端开发者，他们擅长处理区块链的复杂细节。另一种是前端开发者，他们专注于用户界面、工作流程和设计，并且通常不需要对底层技术有深入理解。


    请注意，Web3 开发仍然面临挑战。具体如下：


    -   **不成熟**：开发工具仍处于早期阶段。结果是用户界面可能比较笨拙。开发环境中常常缺少核心功能。

    -   **成本**：Gas 费和其他费用可能是一个主要障碍。在大多数情况下，编码人员可能会对部署应用程序犹豫不决。这意味着活动将主要以实验为主，例如在测试网上进行。

    -   **碎片化**：市场上已经有了许多开发工具。这使得编码人员难以找到最佳工具。同时还存在风险：大量投资于某个最终可能失去人气的工具。

    -   **不可变性**：当智能合约被添加到以太坊区块链后，你通常无法更改它。这无疑很困难，因为代码往往远非完美。不过，有一些变通方法，比如使用代理来指向另一个智能合约。


    但这些问题是可以预料的。其他新平台，如 `iOS` 或 `Android`，也经历过类似阶段。


    好消息是，在开发工具方面有大量投资。未来也将更加关注低代码和无代码解决方案，这将有助于推动 Web3 开发的民主化。


    现在让我们来看看其中一些语言。


    ## Rust


    `Rust` 的语法与 `C++` 相似。但它能更轻松地处理内存泄漏等问题。其性能也很高，尤其体现在处理海量数据时。


    请注意，2021 年 Stack Overflow 开发者调查（涉及超过 80,000 名开发者）将 `Rust` 评为最“受欢迎”的语言。⁸² 这已经是它连续六年获此殊荣了。使用该语言的公司包括
    `Amazon`、`Meta`、`Google` 和 `Microsoft` 等。


    但 Web3 正成为 `Rust` 发展的催化剂。例如，像 `Polkadot` 和 `Solana` 这样的平台使用该语言来创建智能合约。


    诚然，学习曲线比较陡峭。但如果你想编写具有强大安全性的高性能 Web3 应用程序，`Rust` 是一个相当不错的选择。


    **注意**


    2021 年底，杰克·多西在推特上写道：“`rust` 是一种完美的编程语言。”⁸³

