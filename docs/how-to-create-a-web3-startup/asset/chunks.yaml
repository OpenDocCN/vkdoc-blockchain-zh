- fmt: '## Iron Fish


    Elena Nadolinski has a strong background as a software engineer. She has developed
    applications for companies like Airbnb and Microsoft with `C#` and `C++`. For
    example, she developed the autocomplete search service for Airbnb.^([^(54)](#fn54))


    In early 2017, Nadolinski founded Iron Fish. At the time, she got very interested
    in crypto and thought there was an opportunity to develop technology for privacy.
    In all, she has raised about $33 million for her startup.


    While there have been ways to provide for privacy with blockchain, they have usually
    been complex. The result is that this has created friction for consumer adoption.


    For Nadolinski, she based her system on zero-knowledge proof (`ZKP`). Essentially,
    this is where a user – called the prover – can verify the information for another
    user – the verifier – without there being any more information disclosed. Interestingly
    enough, this protocol is not new. Back in the 1980s, MIT researchers Silvio Micali,
    Shafi Goldwasser, and Charles Rackoff created the theoretical basis for `ZKP`.
    The result is that you can make a transaction that has the privacy of using cash.


    Regardless, achieving privacy is no easy feat. After all, blockchain is inherently
    transparent. This means there is the risk of tracing.


    For Iron Fish, the mission is to be a complete privacy solution – not just for
    a particular blockchain.^([^(55)](#fn55))


    **Note**


    Nadolinski came up with the name for her startup – Iron Fish – from reading about
    World War II. At the time, the US Najajo Code Talkers used this as the codename
    for a submarine.


    ## Conclusion


    At the heart of Web3 is the blockchain. In this chapter, we’ve taken a look at
    how this technology allows for decentralized peer-to-peer transactions. There
    is also a public ledger that provides a history of all the transactions, which
    cannot be changed. To create new blocks, the nodes on the network will mine them.
    This often means solving complex math problems.


    The first real use case of blockchain was Bitcoin. This cryptocurrency has become
    dominant in the industry. But there have been the emergence of thousands other
    altcoins.


    There has also been the development of an ecosystem to handle the cryptocurrency
    transactions. For example, there are exchanges as well as many wallets.


    A major inflection point with blockchain – and Web3 – was Ethereum. This allowed
    for the creation of smart contracts. They have been revolutionary and have led
    to new businesses, such as NFTs and `DeFi`.


    But Ethereum suffers from some problems, such as with high fees and difficulties
    with scaling. Because of all this, there are alternative platforms. Yet Ethereum
    remains that main one for Web3.


    In the next chapter, we’ll take a look at the Web3 tech stack.


