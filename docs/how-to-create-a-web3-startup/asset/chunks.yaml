- fmt: '# The Billionaire Web3 Spat


    In late December 2021, Jack Dorsey departed as the CEO of Twitter and then changed
    the name of the other company he served as CEO: Square. He renamed the firm “Block.”
    This was because of his fervent belief in the power of blockchain and crypto.
    He noted: “I don’t think there’s anything more important in my lifetime to work
    on.”^([^(28)](#fn28))


    At the time, Block had roughly $220 million in bitcoin on its balance sheet. On
    Dorsey’s Twitter bio, it just had one hashtag: `#bitcoin`.


    Then what about his opinion about Web3? Interestingly enough, he is not so sanguine.
    He tweeted: “You don’t own ‘web3.’ The VCs and their LPs do. It will never escape
    their incentives. It’s ultimately a centralized entity with a different label.
    Know what you’re getting into…”^([^(29)](#fn29))


    This was certainly provocative. It was a direct hit against one of the central
    themes of Web3.


    The tweet sparked reactions from other tech billionaires. For example, Elon Musk
    tweeted: “Has anyone seen web3? I can’t find it.”^([^(30)](#fn30))


    Dorsey was quick to respond to this. His tweet was: “somewhere between a and z.”
    No doubt, this was a clear shot at venture firm, Andreessen Horowitz, one of the
    largest investors in crypto and Web3. The firm is often referred to as “A16Z.”


    Things got so heated that Marc Andreessen would block Dorsey on Twitter. Dorsey
    then tweeted: “I’m officially banned from Web3.”^([^(31)](#fn31))


    It is really too early to see who will be right. However, it seems inevitable
    that VCs will be critical to the growth of Web3\. They will not only provide much-needed
    capital to build the infrastructure and scale the systems, but they will be helpful
    in providing strategic advice.


    For entrepreneurs, having venture funding will likely be a key ingredient – even
    if it may ultimately dampen one of the Web3 ideals of decentralization.


    “There will likely always be centralized systems or components within the web,
    and that is okay,” said Josh Neuroth, who is the head of product at Ankr. “But
    Web3 is about getting the communities engaged and decentralizing power, not always
    the systems themselves.”^([^(32)](#fn32))


    **Note:** In late December 2021, Elon Musk tweeted: “I’m not suggesting web3 is
    real – seems more marketing buzzword than reality right now – just wondering what
    the future will be like in 10, 20 or 30 years. 2051 sounds crazy futuristic!”^([^(33)](#fn33))


    # The Web3 Platform Shift


    In the history of technology, there have been various platform shifts. This is
    when there is a disruptive change in the core layer. This is what happened when
    the mainframe industry transitioned to minicomputers. Then, minicomputers would
    transition to the PC industry.


    When this happens, the incumbents often suffer. They have to cannibalize their
    existing businesses to make the changes. But often there is little change. For
    example, many of the leaders during the 1980s in the PC software industry would
    lose their positions in the 1990s. This was because the platform changed from
    DOS-based applications to the Windows platform. The result is that companies like
    Borland, WordPerfect, Novell, and Lotus came under tremendous pressure. Of course,
    Microsoft would benefit from the changes since it controlled Windows. But there
    were many new entrants that came to the market.


    As for Web3, this could represent a massive platform change – and it is likely
    to last for many years. According to Sequoia partner, Michelle Bailhe, the firm’s
    conviction is that “crypto is one of the most important platform shifts of our
    time.”^([^(34)](#fn34))


    This means there are huge opportunities for entrepreneurs to create innovations
    and build the new ecosystem.


    # The Startup


    What are the keys to the success of a Web3 startup? Interestingly enough, much
    of it will be the same for any startup. For example, look at the founding of Microsoft
    in 1975\. Here were some of the key factors:


    - **Team:** While Bill Gates and Paul Allen were young, they actually had lots
    of experience with computers. True, they were mainframes. But Gates and Allen
    learned the core fundamentals of the technology and liked to experiment with new
    approaches. They would also recruit very smart developers – which helped to accelerate
    the growth. This, in turn, would attract more and more developers.


    - **Strategic Vision:** Gates and Allen knew that the PC would revolutionize the
    world. It would impact businesses, the home, everything. They also understood
    that software would be the key value driver.


    - **Market Size:** The mission statement for Microsoft was simple yet powerful:
    “a computer on every desk and in every home.” In other words, Gates and Allen
    were thinking very big. They saw that the market was enormous, and that Microsoft
    would be the clear leader.


    - **Platform:** Microsoft was not just a set of different tools. Rather, it was
    a platform. In the 1980s, this was based on `DOS`, which was the dominant operating
    system. It became a significant cash generator. Gates and Allen then parlayed
    this into building the next OS, which was Windows. They always looked at their
    technology strategically.


    - **Partnerships:** As a small company in the early days, Microsoft did not have
    many resources. But it was able to leverage the power of partnerships. The main
    one was with IBM. Microsoft would become the default OS for its PC.


    The preceding will definitely be part of most successful Web3 startups. But then,
    what is different? Well, it really comes down to understanding the major trends
    and the customer needs. These feed into the strategic vision, market size, and
    partnership opportunities. In fact, success can easily come down to making a few
    right choices.


    To continue with the Microsoft example, the company could have easily become a
    footnote in technology history. The reason is that – when IBM came to the company
    – it did not have an operating system. Instead, the dominant player in this category
    was Digital Research, which had `CP/M`. Funny enough, Gates recommended that IBM
    visit the company. However, the CEO of Digital Research was skeptical. So Gates
    saw an opportunity and purchased `QDOS` (which stood for “quick and dirty operating
    system”) from Seattle Computer Systems on July 27, 1981 for $50,000.^([^(35)](#fn35))
    This would become the core technology for `MS-DOS` and lead to billions of dollars
    in revenues.'
