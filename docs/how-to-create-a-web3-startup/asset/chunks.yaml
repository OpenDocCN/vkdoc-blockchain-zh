- fmt: '# Bitcoin


    The origins of cryptocurrencies go back to the late 1970s. Academics looked at
    approaches to create a digital monetary unit based on complex cryptography.


    For example, in 1979, doctorate student Ralph Merkle wrote his dissertation about
    the use of public keys and digital signatures to verify transactions. This became
    known as the Merkle tree.


    Then, by the early 1990s, professors Stuart Haber and W. Scott Stornetta released
    a paper about how to prevent the manipulation of digital transactions. To help
    with this, they used Merkle trees.


    With this academic research, entrepreneurs started to test the theories. One was
    David Chaum. He developed a technology that used public and private key systems
    for digital signatures. He then founded a company, `DigiCash`, in 1990 to prove
    his concepts. It relied on the transactions of traditional banks. However, the
    information about the parties were private. Unfortunately, Chaum could only get
    a handful of banks interested in the technology and `DigiCash` would file for
    bankruptcy in 2002.


    During the 1990s, there were other interesting startups that created cryptocurrencies.
    Examples included `Flooz`, `Bit Gold`, and `Hashcash`. But they would all eventually
    fail.


    By 2008, the situation would prove ideal for the creation of a sustainable cryptocurrency.
    With the financial crisis, many people were losing trust in the government and
    financial services companies. Maybe a digital alternative would be better?


    Well, Satoshi Nakamoto wrote a pivotal paper. It was called “Bitcoin: A Peer-to-Peer
    Electronic Cash System.”


    Keep in mind that the identity of Nakamoto was not disclosed. He or she may have
    been one person or a group of persons. But it did not matter. What was important
    is that Nakamoto’s paper ignited a revolution. Nakamoto provided the basis for
    the blockchain framework and tested it with the creation of the first sustainable
    cryptocurrency.


    On January 3, 2009, Nakamoto mined the first bitcoin block. This indicated the
    validity of the technology. For the first transaction, there were 50 bitcoins
    created – and they have since been called the “Genesis block” or block 0.


    Nakamoto then made the Bitcoin software open source. This meant that it was freely
    available for anyone to download from the Internet. It also allowed any programmer
    to make changes to the code.


    Next, on January 12, 2009, Nakamoto executed the first Bitcoin transaction. He
    sent block 170 – which had 10 bitcoin – to Hal Finney. The address of the transaction
    was the public key, which was a long string of numbers. For Hal to access and
    own it, he had his own private key. Think of this as a complex password.


    Note that the transaction involved no intermediaries. There was no bank or government
    authority to process the transaction and charge a fee. The Bitcoin was sent peer-to-peer
    and the blockchain handled everything. This meant it was a true decentralized
    system.


    In other words, Bitcoin was instantly global. All you needed was access to the
    Internet. The network was always open. You could send Bitcoin to someone at midnight
    on Sunday. It did not matter.


    The Bitcoin transaction did not require any personal information, like a Social
    Security number, address, or even a name. There was only the use of the public
    and private keys. This meant there was no chance for identity fraud or hacking
    private information.


    Finally, the Bitcoin transaction was added to the public blockchain ledger. This
    was similar to what a bank would have – except that everyone on the network could
    see it.


    **Note**


    In the Bitcoin code, there is halving. This means that – every four years – the
    amount of new coins gets reduced by 50%. The next halving will occur in May 2024.


    Then did Bitcoin have the characteristics of a true currency? Granted, it was
    not a fiat currency. This is where a government issues the currency and it is
    not backed by a physical commodity, like gold or silver. For example, in the USA,
    the dollar is backed by the “full faith and credit” of the government.


    A cryptocurrency also does not have a physical form. There are no paper versions.


    But Bitcoin certainly has other aspects of a currency. They include the following:


    - **Divisibility**: This means you can divide the currency into other denominations.
    For example, you can exchange a 10-dollar bill for 10 one-dollar bills or two
    5-dollar bills. Interestingly enough, Bitcoin is more divisible than the dollar.
    One bitcoin is divided up to eight decimal places and each is called a `Satoshi`.


    - **Limited Supply**: If the government prints too many dollars, then there will
    be inflation or even hyperinflation. Eventually, people will not accept it because
    the currency will be worthless. However, in the case of Bitcoin, it has a programmed
    limit – that is, 21 million units. There are about 19 million in existence today.
    The estimate is that it will take until 2140 for the 21 million limit to be reached.


    - **Uniformity**: A currency needs to be interchangeable. For example, a $10 bill
    is worth the same as any other one. Then what about Bitcoin? It is uniform as
    well. The main reason is that the blockchain verification system allows for authenticating
    each of the transactions.


    - **Portability**: You can easily transfer the currency. And yes, this is definitely
    true with Bitcoin. You can send it to anyone on the network. Like the US dollar,
    you do not have to use any personal information for a transaction.


    - **Durability**: This is where the currency can deteriorate or be destroyed.
    An example would be US dollars that are burned and can no longer be retrieved.
    With Bitcoin, everything is on the network. So long as this is maintained, there
    will be durability.


    - **Acceptability**: This means that you can use a currency for many transactions.
    But for Bitcoin, this is far from the case. The fact is there are only a limited
    number of places – such as retail or ecommerce platforms – that you can use the
    cryptocurrency.


    While bitcoin has many of the characteristics of a currency, it is still more
    of a store-of-value or an investment vehicle. It’s become more like a stock or
    bond. In fact, this is what the IRS considers it to be. And this can cause many
    complex tax problems. Suppose you buy one bitcoin for $20,000 and it increases
    to $30,000. You then use this coin to buy a car in the USA. In this situation,
    you would owe taxes on the $10,000 gain. This would not have been the case if
    you used the US dollar.


    Another problem with Bitcoin as a currency is the volatility. This makes it extremely
    difficult for businesses to do adequate planning. Let’s say an automotive manufacturer
    accepts Bitcoin for its vehicles. During the first quarter, it sells 200,000 units
    at an average of $40,000 each. However, during the second quarter, Bitcoin plunges
    by 50%. In other words, the car company will report a steep drop in sales – and
    probably a net loss – even though it may have sold a higher number of cars.


    Of course, there are various Bitcoin billionaires. They had the foresight or luck
    to buy up the cryptocurrency in the early years. In 2010, you could have purchased
    a Bitcoin for a fraction of a cent. As of 2022, it was fetching over $60,000.


    **Note**


    In 2013, Laszlo Hanyecz offered anyone 10,000 bitcoins to deliver two Papa John’s
    pizzas to him. Someone took him up on this and it represented the first real-world
    Bitcoin transaction. But in hindsight, it was a bad move for Hanyecz. Had he kept
    his Bitcoin instead, they would have been worth over $300 million.^([^(38)](#fn38))'
