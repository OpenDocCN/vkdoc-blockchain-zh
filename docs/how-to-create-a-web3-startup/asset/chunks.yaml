    # 7. DeFi


    Building Finance Platforms


    Kwon Do, who studied computer science at Stanford, has worked at companies like
    Apple and Microsoft. But when crypto started to grow quickly, he jumped into the
    market. Unfortunately, his first startup failed. But this did not deter him. In
    2018, he started another company, called Terraform Labs, based in Singapore.


    His vision was to create a new kind of financial services company. It was based
    on a Web3 approach called `DeFi` or decentralized finance. To this end, he created
    several projects and apps, such as for payments. At the heart of this was the
    `LUNA` token. By 2021, its value would reach $41 billion.^([^(177)](#fn177))


    Kwon also created `UST`, which was an algorithmic stable coin. It was set to have
    a 1:1 peg to the US dollar. However, `UST` was only backed by complex equations,
    not other financial assets.


    By early May, `LUNA` would crumble. Within a week, it would drop to nearly zero.^([^(178)](#fn178))


    What happened? There were a variety of factors at work. The equities markets were
    plunging as well as many other cryptocurrencies. There were also fears of a recession
    and tighter Federal Reserve policies.


    Ultimately, for `LUNA`, it was a classic case of a "run on the bank." Simply put,
    investors lost trust in this digital asset. But there was no government backing.
    So there could not be any bailout.


    Yes, this showed the inherent risks of `DeFi`. The result is that the future is
    far from secure.


    But this an important wake-up call that can lead to better protections. If anything,
    it could allow for a much more robust industry.


    So, in this chapter, we''ll take a look at `DeFi`. If it can get critical mass,
    there is the potential for it to become a huge market for entrepreneurs.'
