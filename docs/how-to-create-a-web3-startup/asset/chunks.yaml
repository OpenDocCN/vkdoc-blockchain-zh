- fmt: "## Matter Labs\n\nWhen Alex Gluchowski launched his Web3 startup – Matter\
    \ Labs – in late 2018, he did not have a crypto background. The two prior companies\
    \ he started included a camper rental marketplace and a website for holistic lifestyles.\
    \ Yet he gained valuable skills from these ventures.^([^(71)](#fn71)) He learned\
    \ how to build modern and scalable web platforms, manage remote teams, implement\
    \ payment and bookkeeping systems, create compliance automations, and work in\
    \ international markets.\n\nRegarding Matter Labs, it is based on the Layer 2\
    \ protocol called `zkSync`. For more efficiency, the funds for a smart contract\
    \ are on the mainchain, but the computation and storage are handled off-chain.\
    \ This essentially means that the transactions are rolled up to a block. In fact,\
    \ Ethereum co-founder Vitalik Buterin wrote in his blog that for the medium to\
    \ long term, the zero knowledge rollups “will win out in all use cases…”^([^(72)](#fn72))\n\
    \nMatter Labs has built an intuitive user experience, but has also been strong\
    \ with security features. This has helped to gain traction with customers, especially\
    \ in the DeFi space.\n\nThe Matter Labs platform uses `Zinc`, which is a framework\
    \ for creating smart contracts. This is important since zero-knowledge-protocol\
    \ frameworks generally lack these capabilities. The syntax of `Zinc` is similar\
    \ to the `Rust` language. Although, Matter Labs is working on a `Solidity` implementation.\n\
    \nIn late 2021, the company raised $50 million. Andreessen Horowitiz, which invested\
    \ in the round, wrote a blog about the Matter Labs: “The activity on Ethereum\
    \ L1, between DeFi, governance, NFT trading, DAO creation, and gaming has surpassed\
    \ our wildest imagination in terms of creativity and progress. One way to explain\
    \ the ingenuity we’re seeing comes back to the core idea of self-sovereignty inherent\
    \ to cryptography, and essential to the ethos of `web3`. `zkSync` is building\
    \ (and enthusiastically hiring!) for the next generation of developers and will\
    \ unleash rippling waves of originality into the already vibrant Ethereum ecosystem.”^([^(73)](#fn73))\n\
    \n## Optimism\n\nJinglan Wang is a rarity in the Layer 2 infrastructure world.\
    \ She is one of the few female CEOs and cofounders of a top startup in the industry:\
    \ Optimism.\n\nSince college, she has been fascinated with blockchain. She would\
    \ become the co-president of the MIT Bitcoin Club, where she greatly expanded\
    \ her network of industry contacts.\n\nShe did not finish her degree and instead\
    \ started a company called `Eximchain`. Then she went to `Zcash` and `Nasdaq`,\
    \ where she was a product manager for blockchain projects.\n\nShe would actually\
    \ get a scar because of Ethereum. How so? When ETH hit $300, she was at a bar\
    \ with friends. She was so excited that she fell out of her chair and split her\
    \ ankle open.^([^(74)](#fn74))\n\nBut it was Optimism that would become her breakout\
    \ venture. In March 2022, she raised $150 million in a Series B round from Andreessen\
    \ Horowitz and Paradigm. The valuation was $1.65 billion.^([^(75)](#fn75))\n\n\
    The core technology of Optimism is different from a zero-knowledge rollup. Instead,\
    \ it uses an “optimistic rollup.” This is about using a group of validators to\
    \ verify transactions, not cryptography. At the time of the funding, the Optimism\
    \ platform had over $500 million in locked value.^([^(76)](#fn76))\n\nOne of the\
    \ keys to the success of Optimism has been mostly to stick to the Ethereum approaches.^([^(77)](#fn77))\
    \ This has leveraged the large ecosystem, but has made it easier to get started.\n\
    \n> **Note**  \n> There is often confusion between Layer 2 and sidechains. But\
    \ they are very different. A Layer 2 system is built on the Ethereum platform.\
    \ A sidechain, on the other hand, runs parallel to it. It is a separate blockchain,\
    \ with its own security and consensus approaches. A top sidechain is Polygon.\n\
    \n## Offchain Labs\n\nEd Felton is 59 years old. Yet his age has not been a problem\
    \ with being the co-founder and chief scientist of a red-hot Web3 startup, Offchain\
    \ Labs. Actually, Felton has a deep academic background. He graduated from the\
    \ California Institute of Technology in 1985 with a degree in physics and got\
    \ his Ph.D. at the University of Washington. He wrote his thesis about communication\
    \ protocols for parallel processors.\n\nIn 1993, he joined the faculty at the\
    \ Princeton University in the Department of Computer Science. He would then serve\
    \ as the Chief of Technologies for the Federal Trade Commission as well as the\
    \ Deputy US Chief Technology Officer for President Obama.^([^(78)](#fn78))\n\n\
    The origins for Offchain Labs started with Felton’s research efforts at Princeton.\
    \ He met his cofounders there – Steven Goldfeder and Harry Kalodner – and they\
    \ started to create a Layer 2 platform called `Arbitrum`. This started in 2015.\
    \ The goal was to make Ethereum available to anyone.^([^(79)](#fn79))\n\nOffchain’s\
    \ platform is based on the optimism rollup, and it has gained lots of traction.\
    \ In 2021, there were more than 350 teams using it. Some of the partners include\
    \ companies like `Uniswap` and `Chainlink`.\n\nThe company raised its Series B\
    \ for $100 million and the lead investor was Lightspeed Venture partners. The\
    \ valuation was set at $1.2 billion.^([^(80)](#fn80))\n\nIn a blog post, Lightspeed\
    \ investor Amy Wu had this to say: “A lot has been written about how L2s work\
    \ and the differences between optimistic and zero-knowledge roll-ups, and which\
    \ are theoretically better. In deciding to lead Offchain Labs’ Series B, we focused\
    \ on the most important thing: what is easier and better to use for developers.”^([^(81)](#fn81))\n\
    \n## Layer 3\n\nLayer 3 is known as the application layer. This is where you have\
    \ programs like dApps as well as the protocols that power them. These apps can\
    \ be virtually anything. However, much of the development has been with areas\
    \ like NFTs, gaming, and DeFi.\n\nThere are two main parts of Layer 3. First,\
    \ there is the application itself, which is what the user interacts with. This\
    \ often involves scripts and APIs.\n\nNext, there is the execution. This is about\
    \ managing the rules and conditions of the smart contracts on the blockchain.\
    \ Essentially, this is the underlying code. Thus, there is coordination of actions\
    \ between the application and execution.\n\nIn chapters [7](#531229_1_En_7_Chapter.xhtml)\
    \ and [8](#531229_1_En_8_Chapter.xhtml), we will look deeper at the Layer 3 programs\
    \ and systems. And as for the rest of this chapter, we will cover the different\
    \ types of Web3 frameworks and libraries as well as the languages."
  raw: '## Matter Labs


    When Alex Gluchowski launched his Web3 startup – Matter Labs – in late 2018, he
    did not have a crypto background. The two prior companies he started included
    a camper rental marketplace and a website for holistic lifestyles. Yet he gained
    valuable skills from these ventures.^([^(71)](#fn71)) He learned how to build
    modern and scalable web platforms, manage remote teams, implement payment and
    bookkeeping systems, create compliance automations, and work in international
    markets.


    Regarding Matter Labs , it is based on the Layer 2 protocol called zkSync. For
    more efficiency, the funds for a smart contract are on the mainchain, but the
    computation and storage are handled off-chain. This essentially means that the
    transactions are rolled up to a block. In fact, Ethereum co-founder Vitalik Buterin
    wrote in his blog that for the medium to long term, the zero knowledge rollups
    “will win out in all use cases…”^([^(72)](#fn72))


    Matter Labs has built an intuitive user experience, but has also been strong with
    security features. This has helped to gain traction with customers, especially
    in the DeFi space.


    The Matter Labs platform uses Zinc, which is a framework for creating smart contracts.
    This is important since zero-knowledge-protocol frameworks generally lack these
    capabilities. The syntax of Zinc is similar to the Rust language. Although, Matter
    Labs is working on a Solidity implementation.


    In late 2021, the company raised $50 million. Andreessen Horowitiz, which invested
    in the round, wrote a blog about the Matter Labs : “The activity on Ethereum L1,
    between DeFi, governance, NFT trading, DAO creation, and gaming has surpassed
    our wildest imagination in terms of creativity and progress. One way to explain
    the ingenuity we’re seeing comes back to the core idea of self-sovereignty inherent
    to cryptography, and essential to the ethos of web3\. zkSync is building (and
    enthusiastically hiring!) for the next generation of developers and will unleash
    rippling waves of originality into the already vibrant Ethereum ecosystem.”^([^(73)](#fn73))


    ## Optimism


    Jinglan Wang is a rarity in the Layer 2 infrastructure world. She is one of the
    few female CEOs and cofounders of a top startup in the industry: Optimism .


    Since college, she has been fascinated with blockchain. She would become the co-president
    of the MIT Bitcoin Club, where she greatly expanded her network of industry contacts.


    She did not finish her degree and instead started a company called Eximchain.
    Then she went to Zcash and Nasdaq, where she was a product manager for blockchain
    projects.


    She would actually get a scar because of Ethereum. How so? When ETH hit $300,
    she was at a bar with friends. She was so excited that she fell out of her chair
    and split her ankle open.^([^(74)](#fn74))


    But it was Optimism that would become her breakout venture. In March 2022, she
    raised $150 million in a Series B round from Andreessen Horowitz and Paradigm.
    The valuation was $1.65 billion.^([^(75)](#fn75))


    The core technology of Optimism is different from a zero-knowledge rollup. Instead,
    it uses an “optimistic rollup.” This is about using a group of validators to verify
    transactions, not cryptography. At the time of the funding, the Optimism platform
    had over $500 million in locked value.^([^(76)](#fn76))


    One of the keys to the success of Optimism has been mostly to stick to the Ethereum
    approaches.^([^(77)](#fn77)) This has leveraged the large ecosystem, but has made
    it easier to get started.


    Note


    There is often confusion between Layer 2 and sidechains. But they are very different.
    A Layer 2 system is built on the Ethereum platform. A sidechain, on the other
    hand, runs parallel to it. It is a separate blockchain, with its own security
    and consensus approaches. A top sidechain is Polygon.


    ## Offchain Labs


    Ed Felton is 59 years old. Yet his age has not been a problem with being the co-founder
    and chief scientist of a red-hot Web3 startup, Offchain Labs . Actually, Felton
    has a deep academic background. He graduated from the California Institute of
    Technology in 1985 with a degree in physics and got his Ph.D. at the University
    of Washington. He wrote his thesis about communication protocols for parallel
    processors.


    In 1993, he joined the faculty at the Princeton University in the Department of
    Computer Science. He would then serve as the Chief of Technologies for the Federal
    Trade Commission as well as the Deputy US Chief Technology Officer for President
    Obama.^([^(78)](#fn78))


    The origins for Offchain Labs started with Felton’s research efforts at Princeton.
    He met his cofounders there – Steven Goldfeder and Harry Kalodner – and they started
    to create a Layer 2 platform called Arbitrum. This started in 2015\. The goal
    was to make Ethereum available to anyone.^([^(79)](#fn79))


    Offchain’s platform is based on the optimism rollup, and it has gained lots of
    traction. In 2021, there were more than 350 teams using it. Some of the partners
    include companies like Uniswap and Chainlink.


    The company raised its Series B for $100 million and the lead investor was Lightspeed
    Venture partners. The valuation was set at $1.2 billion.^([^(80)](#fn80))


    In a blog post, Lightspeed investor Amy Wu had this to say: “A lot has been written
    about how L2s work and the differences between optimistic and zero-knowledge roll-ups,
    and which are theoretically better. In deciding to lead Offchain Labs’ Series
    B , we focused on the most important thing: what is easier and better to use for
    developers.”^([^(81)](#fn81))


    ## Layer 3


    Layer 3 is known as the application layer . This is where you have programs like
    dApps as well as the protocols that power them. These apps can be virtually anything.
    However, much of the development has been with areas like NFTs, gaming, and DeFi.


    There are two main parts of Layer 3. First, there is the application itself, which
    is what the user interacts with. This often involves scripts and APIs.


    Next, there is the execution. This is about managing the rules and conditions
    of the smart contracts on the blockchain. Essentially, this is the underlying
    code. Thus, there is coordination of actions between the application and execution.


    In chapters [7](#531229_1_En_7_Chapter.xhtml) and [8](#531229_1_En_8_Chapter.xhtml),
    we will look deeper at the Layer 3 programs and systems. And as for the rest of
    this chapter, we will cover the different types of Web3 frameworks and libraries
    as well as the languages.'
  trans: "\n## Matter Labs\n\n当 Alex Gluchowski 于 2018 年底推出其 Web3 初创公司 Matter Labs\
    \ 时，他并没有加密货币背景。他之前创办的两家公司分别是一个房车租赁市场和一家倡导整体生活方式的网站。然而，他从这些创业经历中获得了宝贵的技能。^(⁷¹)\
    \ 他学会了如何构建现代化且可扩展的 Web 平台、管理远程团队、实施支付和记账系统、创建合规自动化流程，以及在国际市场开展业务。\n\n关于 Matter\
    \ Labs，其技术基础是名为 `zkSync` 的 Layer 2 协议。为了提高效率，智能合约的资金存放在主链上，而计算和存储则在链下处理。这基本上意味着交易被汇总到一个区块中。事实上，以太坊联合创始人\
    \ Vitalik Buterin 在他的博客中写道，从中长期来看，零知识汇总“将在所有用例中胜出……”^(⁷²)\n\nMatter Labs 不仅构建了直观的用户体验，在安全特性方面也表现出色。这有助于其赢得客户青睐，尤其是在\
    \ DeFi 领域。\n\nMatter Labs 平台使用 `Zinc`，这是一个用于创建智能合约的框架。这一点很重要，因为零知识证明协议框架通常缺乏这些能力。`Zinc`\
    \ 的语法与 `Rust` 语言类似。不过，Matter Labs 也在开发一个 `Solidity` 实现。\n\n2021 年底，该公司筹集了 5000\
    \ 万美元。参与本轮融资的 Andreessen Horowitz 在博客中写道：“以太坊 L1 上的活动，涉及 DeFi、治理、NFT 交易、DAO 创建和游戏，其在创造力和进步方面已经超出了我们最疯狂的想象。解释我们所目睹的独创性的一种方式，可以追溯到密码学固有的自我主权的核心理念，这是\
    \ `web3` 精神所必需的。`zkSync` 正在为下一代开发者构建（并且正在积极招聘！），并将创新的涟漪浪潮释放到已然充满活力的以太坊生态系统中。”^(⁷³)\n\
    \n## Optimism\n\nJinglan Wang 是 Layer 2 基础设施领域的一个罕见人物。她是该行业顶级初创公司 Optimism 为数不多的女性\
    \ CEO 和联合创始人之一。\n\n从大学开始，她就对区块链着迷。她后来成为麻省理工学院比特币俱乐部的联合主席，在那里她极大地扩展了她的行业人脉网络。\n\
    \n她没有完成学业，而是创办了一家名为 `Eximchain` 的公司。随后，她去了 `Zcash` 和 `Nasdaq`，担任区块链项目的产品经理。\n\n\
    她身上有道伤疤，实际上是因为以太坊。怎么回事呢？当 ETH 涨到 300 美元时，她正和朋友们在酒吧。她太兴奋了，以至于从椅子上摔了下来，脚踝裂开了一道口子。^(⁷⁴)\n\
    \n但最终是 Optimism 成为了她的突破性事业。2022 年 3 月，她从 Andreessen Horowitz 和 Paradigm 筹集了 1.5\
    \ 亿美元的 B 轮融资，估值达到 16.5 亿美元。^(⁷⁵)\n\nOptimism 的核心技术不同于零知识汇总。相反，它采用了“乐观汇总”。这指的是使用一组验证者来验证交易，而非密码学。在融资时，Optimism\
    \ 平台锁定的总价值已超过 5 亿美元。^(⁷⁶)\n\nOptimism 成功的关键之一在于其基本坚持了以太坊的方法论。^(⁷⁷) 这既利用了庞大的生态系统，又使得入门变得更加容易。\n\
    \n> **注意**  \n> Layer 2 和侧链之间常常存在混淆。但两者截然不同。Layer 2 系统构建在以太坊平台之上。而侧链则与之并行运行。它是一个独立的区块链，拥有自身的安全机制和共识方法。一个顶级的侧链是\
    \ Polygon。\n\n## Offchain Labs\n\nEd Felton 今年 59 岁。然而，年龄并未成为他作为炙手可热的 Web3 初创公司\
    \ Offchain Labs 联合创始人兼首席科学家的障碍。事实上，Felton 拥有深厚的学术背景。他于 1985 年毕业于加州理工学院，获得物理学学位，并在华盛顿大学获得博士学位。他的博士论文是关于并行处理器的通信协议。\n\
    \n1993 年，他加入普林斯顿大学计算机科学系任教。此后，他曾担任联邦贸易委员会首席技术官，以及奥巴马总统的副首席技术官。^(⁷⁸)\n\nOffchain\
    \ Labs 的起源始于 Felton 在普林斯顿大学的研究工作。他在那里遇到了他的联合创始人 – Steven Goldfeder 和 Harry Kalodner\
    \ – 并开始创建一个名为 `Arbitrum` 的 Layer 2 平台。这始于 2015 年，目标是让任何人都能使用以太坊。^(⁷⁹)\n\nOffchain\
    \ 的平台基于乐观汇总，并且已经获得了很大的发展势头。2021 年，有超过 350 个团队在使用它。一些合作伙伴包括 `Uniswap` 和 `Chainlink`\
    \ 等公司。\n\n该公司以 1 亿美元完成了 B 轮融资，领投方是 Lightspeed Venture Partners，估值达到 12 亿美元。^(⁸⁰)\n\
    \n在一篇博文中，Lightspeed 投资人 Amy Wu 这样说道：“关于 L2 如何运作、乐观汇总与零知识汇总之间的区别以及理论上哪种更好，已经有很多文章讨论。在决定领投\
    \ Offchain Labs 的 B 轮融资时，我们关注的是最重要的一点：什么对开发者来说更容易使用、体验更好。”^(⁸¹)\n\n## Layer 3\n\
    \nLayer 3 被称为应用层。这是 dApps 等程序以及为其提供支持的协议所在的地方。这些应用几乎可以是任何东西。然而，大部分开发工作集中在 NFT、游戏和\
    \ DeFi 等领域。\n\nLayer 3 有两个主要部分。首先是应用本身，即用户与之交互的部分。这通常涉及脚本和 API。\n\n其次是执行部分。这关乎管理区块链上智能合约的规则和条件。本质上，这是底层代码。因此，在应用和执行之间需要协调行动。\n\
    \n在第 7 章和第 8 章中，我们将更深入地探讨 Layer 3 程序和系统。至于本章的其余部分，我们将介绍不同类型的 Web3 框架和库以及编程语言。\n"
- fmt: '# Web3 Frameworks and Libraries


    It’s common for people to treat the words “library” and “framework” as if they
    were the same. But there are important differences.


    Granted, both are code bases, and they provide often-used features, such as for
    authentication, UI, or security. And many of them are based on JavaScript or TypeScript.
    Libraries and frameworks can definitely be a big help in speeding up development
    projects.


    So, what are the differences then? It comes down to the concept of inversion control.
    Basically, with a library, you have more control over the workflow of the program.
    A framework, on the other hand, provides its own paths. This is similar to the
    use of an API.


    For Web3, there are a myriad of libraries and frameworks. Let’s take a look:


    - **Web3.js** (Library): This provides a set of functions for on-chain transactions
    and components for Ethereum nodes. This basically makes it easier to handle the
    `JSON RPC` mechanism for the transmission of the data (this is a standard format).
    This is done by using JavaScript code. `Web3.js` also works seamlessly with `Node.js`
    web applications and Electron desktop programs. It’s common for developers to
    use the `Metamask` browser extension with this library, which is an in-browser
    Ethereum wallet.


    - **Ethers.js** (Library): This uses JavaScript and TypeScript to provide four
    main modules to interact with Ethereum. `Ethers.provider` allows for the transactions;
    `ethers.conrtract` helps to deploy and manage smart contracts; `ethers.utils`
    provides the formatting and processing of data for dApps; and `ethers.wallet`
    makes connections to Ethereum addresses.


    - **oo7.js** (Library): Yes, this is named after James Bond. In terms of the technical
    aspects of this library, it’s about using reactive expressions or bonds. This
    essentially makes it possible to understand when values are triggered on a smart
    contract for Ethereum.


    - **Truffle**: Consensys created this in 2017. Truffle is a comprehensive framework
    that has easy-to-use tools for creating, debugging, and deploying smart contracts
    for Ethereum. It also has integrations with popular Web frameworks like `React`,
    `Angular`, and `Vue`. With Truffle, you can use `Solidity` or `JavaScript` for
    the coding. Another helpful feature is that this framework manages the network
    artifacts. Truffle also includes `Ganache`, which is a rich set of GUI components.


    - **Hardhat** (Framework): This allows you to create a marketplace – with little
    work. This handles all the complex matters of managing digital assets. The framework
    supports `Django` and `Ruby on Rails` web frameworks. Hardhat also has strong
    debugging capabilities for `Solidity`, which are bolstered by a rich ecosystem
    of plugins.


    - **OpenZeppelin SDK** (Framework): Launched in 2018, this is a framework built
    on the `Python` language and provides components for NFTs and other tokens. A
    major advantage is that it has strong security features built in. The OpenZeppelin
    SDK comes with its own development environment, which is called `Jesta`. But perhaps
    the most powerful function of this framework is the ability to upgrade existing
    smart contracts.


    - **Brownie Framework** (Framework): This is based on `Python` and provides for
    creating smart contracts on Ethereum. For the development, you can use `Solidity`
    or `Vyper`. The Brownie Framework uses the `web3.py` library, which has shown
    to work on intensive environments.


    **Note**


    An oracle allows for hybrid smart contracts. These work with both on-chain and
    off-chain data. A top solution in this category is `Chainlink`. It is built on
    a variety of technologies like `Java`, `C++`, `Python`, and `Node.js`.


    ## Web3 Languages


    As we’ve seen, Web3 relies on a variety of languages. Some have been around for
    many years like `Java`, `JavaScript`, `C++`, and `Python`. But there are some
    languages that were built specifically for blockchain. Some of the top ones include
    `Solidity` and `Vyper`.


    Regardless, there are common tools for Web3 development. There will usually be
    the use of `Node.js` and a code editor. The editor can be just a plain text application
    for command line coding. Or, you can use a sophisticated IDE (a popular one is
    the `Remix IDE`). Then there will typically be the use of Web3 frameworks and
    libraries. And finally, a developer will work with a wallet to access the nodes.


    At a very high level, there are often two types of developers. There is the backend
    developer, who has expertise on the intricacies of working with the blockchain.
    Next, there is the front-end developer. This person will focus on the UI, workflows,
    and design. And there usually does not require to be a significant understanding
    of the underlying technologies.


    Note that there remain challenges with Web3 development. Here’s a look:


    - **Immature**: The development tools are still in the nascent stages. The result
    is that the UI’s can be cumbersome. There is often the lack of core features in
    the development environments.

    - **Costs**: Gas fees and other charges can be a major hindrance. For the most
    part, coders may be hesitant deploying apps. If anything, this means that the
    activity will be mostly with experimenting, such as with testnets.

    - **Fragmentation**: There are already many development tools on the market. This
    makes it difficult for coders to find the best one. There is also the risk that
    there will be much investment in a tool that ultimately fades in popularity.

    - **Immutability**: When a smart contract is added to the Ethereum blockchain,
    you generally cannot change it. This is certainly difficult, since the code is
    often far from perfect. Although, there are some workarounds, such as working
    with proxies to point to another smart contact.


    But such problems are to be expected. They happened with other new platforms,
    such as with `iOS` or `Android`.


    The good news is that there is much investment in building out the tools. There
    will also be more of a focus on low-code and no-code offerings, which will help
    to democratize Web3 development.


    Now let’s take a look at some of the languages.


    ## Rust


    `Rust` has a similar syntax to `C++`. But it makes it easier to deal with memory
    leaks and other issues. There is also a high level of performance. This is especially
    the case when processing enormous amounts of data.


    Note that the 2021 Stack Overflow Developer Survey, which involved more than 80,000
    developers, named `Rust` the most “loved” language.[^(82)](#fn82) This was the
    same ranking for the six consecutive prior years. Just some of the companies that
    use the language include `Amazon`, `Meta`, `Google`, and `Microsoft`.


    But Web3 is becoming a catalyst for growth for `Rust`. For example, platforms
    like `Polkadot` and `Solana` use the language to allow for the creation of smart
    contracts.


    It’s true that there is a significant learning curve. But if you want to write
    high-performance Web3 applications that have strong security, `Rust` is a pretty
    good option.


    **Note**


    In late 2021, Jack Dorsey tweeted: “`rust` is a perfect programming language.”[^(83)](#fn83)'
