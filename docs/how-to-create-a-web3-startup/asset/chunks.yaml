  trans: '

    # 加密货币交易所


    虽然区块链提供高度安全的系统，但使用起来远非便利。早期，如果你想用比特币进行交易，需要下载并使用复杂的软件。


    但企业家们将此视为创造新应用的机遇。其中重要一环便是加密货币交易所的发展。最早的交易所于 2010 年问世：`Bitcoin Market`。该平台允许用户通过`PayPal`和托管系统购买加密货币。


    毫无疑问，很快众多其他交易所纷纷涌现。例如`Mt. Gox`和`Tradehill`，它们支持即时购买。


    2011 年，市场面临严峻考验——比特币市场险些崩溃。原因是`Mt. Gox`交易所遭到黑客攻击，导致比特币价格暴跌至近 0 美元，人们对加密货币的信任度骤降。


    尽管如此，`Mt. Gox`在几年后得以复苏，并成为全球领先的交易所。


    然而，加密行业的问题依然存在。美国国土安全部展开了多项调查，并勒令部分交易所更改其运营方式。


    哦，`Mt. Gox`的问题远未结束。2014 年，该交易所在结算交易时出现故障。随后发布重磅公告：超过 85 万枚比特币被黑客盗取。^(³⁹) 尽管追回了其中的
    20 万枚，但这显然不够。该交易所最终申请破产。


    多年来，其他加密货币交易所也屡遭黑客攻击，其中包括`Bithumb`、`ShapeShift`和`Bitfinex`。


    然而，比特币市场依然坚韧。毕竟，早期采用者对风险容忍度很高，且是加密货币的坚定信仰者。


    但若要获得主流认可，“狂野西部”式的做法难以为继。因此，行业开始向更加合规的方向发展，例如采用反洗钱和反恐融资要求。


    例如，2021 年 4 月，`Coinbase`成为美国首家上市的加密货币交易所。首次公开募股（IPO）价格为 250 美元，当日收盘价为 328.28 美元，市值达到
    858 亿美元。^(⁴⁰) 对于一家成立于 2012 年的公司而言，成绩斐然。


    该公司的增长令人震惊。第一季度收入达 18 亿美元，同比增长 9 倍。净利润从 3200 万美元飙升至 7.3 亿至 8 亿美元。月均交易用户（MTU）达
    610 万。


    ## 加密货币钱包


    当你购买加密货币后，需要地方存放。这通过数字钱包实现。共有两种类型：


    *   **热钱包**：将加密货币存放在交易所内。这确实很方便。然而，若交易所出现问题，则存在风险。毕竟，没有像联邦存款保险公司（FDIC）这样的机构来保障丢失的加密货币——这与你在传统银行的存款不同。


    *   **冷钱包**：这是一种物理设备，如 U 盘。由于几乎不联网，这种方式相当安全。但缺点是可能使交易操作更困难。常见的冷钱包包括`CoolWallet
    Pro`、`Safepal S1`和`Trezor Model T`。价格大约在 50 至 150 美元之间。


    ## 山寨币


    2011 年，一种比特币的变体进入市场，名为`Namecoin`。它成为加密货币中“山寨币”类别的一员。简单来说，就是指非比特币的加密货币。


    开源平台催生了山寨币。大多数情况下，它们是增加新功能和创新的方式。以`Namecoin`为例，它支持合并挖矿，意味着矿工可以同时挖掘多条区块链。


    多年来，大量新山寨币问世。目前已有超过 17000 种。^(⁴¹)


    但比特币仍是主导加密货币，以太币位居第二。两者占据了全球交易量的绝大部分。


    面对如此多的山寨币，如何分析？一种方法是将它们分为不同类别。以下是主要类别：


    *   **稳定币**：其价值与另一种资产（如法定货币、黄金或其他有价物品）挂钩的加密货币。目标是提供稳定性，本质上可行使传统货币的功能。流行的稳定币是`Tether`，其价值与美元挂钩。它实际上是第一个被创建的稳定币。然而，2022
    年 5 月，多种稳定币价值暴跌。^(⁴²) 这基本上是一场“银行挤兑”。部分稳定币在数日内跌幅超过 90%。


    *   **治理代币**：为区块链项目投票提供机制的代币。这类代币常用于 DeFi（去中心化金融）和游戏系统。可投票的事项包括：收费及设定费用、修改网络界面、或向成员转账。此外，治理代币不可挖矿，而是根据项目投资者的投入进行分配。类似于公司的股东。


    *   **模因币**：更侧重于娱乐和趣味的代币。有趣的是，部分模因币起初只是玩笑。尽管如此，模因币可能具有巨大价值，但难以持久。坦白说，总会有新东西取而代之。模因币更像是一时风尚。


    *   **实用代币**：常用于在线服务的代币，在 Web3 应用中也十分普遍。最流行的实用代币是`Ether`，其交易需支付“Gas 费”，用于支付数据处理成本。另一个广泛使用的实用代币是`Filecoin`，可用于购买区块链上的存储空间。


    *   **证券代币**：允许你获取房地产或艺术品等权益，所有权可以是分式化的。


    每当区块链协议发生变更（例如创建新规则或山寨币）时，就会发生分叉。这意味着网络出现分裂。新的区块链将拥有自己的账本。


    分叉共有两种类型：


    *   **软分叉**：本质上是对现有区块链的升级，需经网络用户批准。同时需要与现有分叉保持向后兼容。


    *   **硬分叉**：出现明显分裂，不再向后兼容。此时通常会创建一种新的加密货币。

    '
- fmt: '## The Value of Cryptocurrency


    Cryptocurrencies can definitely be risky. For `Bitcoin`, it’s not uncommon for
    there to be jumps or drops of 20%.


    Then how do you value a cryptocurrency? There are no clear-cut rules. It’s not
    like a traditional asset like a stock. With this, the valuation is generally based
    on the profits of the company and the growth prospects.


    Despite all this, there are still some factors to consider with valuing cryptocurrencies,
    including the following:


    - **Hedge**: Some people invest in cryptocurrencies just to have some exposure
    to the asset. It’s a way to get diversification but also to not miss out on potential
    returns.


    - **Scarcity**: Many cryptocurrencies have limits on how many coins can be issued.
    This can make the digital asset scarce. So when demand rises, there can be significant
    increases in the price.


    - **Influencers**: As we’ve seen earlier in this chapter, people like Elon Musk
    can have a huge impact on the prices of cryptocurrencies – and this could be a
    matter of a single tweet.


    - **Adoption**: Traditional financial services companies like banks have been
    investing in cryptocurrencies and `blockchain`. This provides validation and demand.


    - **Hacks**: From time to time, there are high-profile ones. The result is that
    there can be disruption in the crypto markets.


    - **Regulations**: Governments tend to be slow with new restrictions. But whenever
    there are actions, there can be notable impacts on the valuations.


    - **Immature Market**: Cryptocurrencies are still in the early stages. Unlike
    stocks or bonds, there is not a long history of performance during periods of
    war, inflation, recessions, depressions, and so on.


    ## Ethereum


    `Ethereum` has several use cases. One is for allowing transactions of a cryptocurrency.
    The coin is referred to as `ETH` or ether. In early 2022, the price was about
    $3,400 and the total value of the market was $412 billion.


    Another important use case – especially for `Web3` – is that `Ethereum` allows
    you to create smart contracts. Essentially, this means you can create programs
    on the blockchain.


    For the crypto world, this was revolutionary. `Ethereum` was not just about creating
    a new cryptocurrency. You could create any type of application. This could be
    for financial services, legal services or even a cool game. It’s only a matter
    of your imagination.


    A key to smart contracts is the triggering of events based on certain conditions
    that are a part of an agreement between users. This is about traditional programming
    structures of `If/then else` statements. For example, an `Ethereum` smart contract
    may release funds if a party performs a service.


    Now this can get complicated, such as in terms of the workflows. You want to game
    out the scenarios with the applications. If not, there could be actions taken
    that may result in a financial loss or a bad customer experience. There should
    also be a system of rules for resolving disputes.


    To make an `Ethereum` transaction, you need to setup an account and there are
    two types. First, there are `Externally Owned Accounts` (`EOA`). This is where
    you have control with a private key and there is no code with it. You can send
    ether or messages from this account.


    Next, there is the `Contract` account, which has its own code that is triggered
    when there is a transaction from an `EOA`. This type of account cannot initiate
    transactions. They can only come when there is a transaction from an `EOA`.


    But there are usually few credentials you need to provide to open either account.
    You then spend `Ether` for a transaction. One of the reasons for this is to prohibit
    users – or even hackers – from bombarding the network with needless transactions.
    Next, the ether is a way to reward miners for validating transactions and providing
    compute resources to the network.


    As mentioned earlier, the fee for using the `Ethereum` network is based on a unit
    called `gas`. And yes, you pay this with `Ether`, and they have dominations called
    `gwei`. Consider that there is 1 `Ether` for 1,000,000,000 `gwei`.


    Like a typical blockchain, a smart contract makes it possible for users to transact
    with each other without the need for a trusted intermediary. The system is decentralized.
    There is also a copy of the ledger for everyone to see.


    Here are other benefits of `Ethereum`:


    - **Agility**: When you execute a contract, it is done instantly. There is nothing
    to fill out. There is also no need to reconcile errors.


    - **Security**: This is at a high level because of the use of encryption.


    - **Backup**: All smart contracts are stored many times on the blockchain. This
    means you will not have data loss.


    - **Maturity**: As the first system for smart contracts, there is the advantage
    of a refined set of features. There is also a large number of developers. This
    means that – if you have a question – you probably will get an answer from the
    community.


    - **Standard**: `Ethereum` has become the most common blockchain for `DeFi` and
    `NFTs`. This means that a large amount of value is locked in the blockchain. “The
    main pro for `Ethereum` is its enormous adoption and wide audience of users,”
    said Alex Melikhov, who is the CEO and founder of `Equilibrium`. “If you deploy
    your application on `Ethereum`, you have potential access to a large-scale audience
    of users who are already familiar with blockchain technology and its infrastructure.
    They will not struggle with basic things like setting up a wallet or sending transactions
    but will be able to start using your application right away.”


    Each smart contract is stored on an address of the blockchain. This is contract
    address. Note that the developer does not come up with this. Instead, the contract
    address is based on a complex hash function calculation.'
  raw: '## The Value of Cryptocurrency


    Cryptocurrencies can definitely be risky. For Bitcoin, it’s not uncommon for there
    to be jumps or drops of 20%.


    Then how do you value a cryptocurrency? There are no clear-cut rules. It’s not
    like a traditional asset like a stock. With this, the valuation is generally based
    on the profits of the company and the growth prospects.


    Despite all this, there are still some factors to consider with valuing cryptocurrencies,
    including the following:


    *   Hedge: Some people invest in cryptocurrencies just to have some exposure to
    the asset. It’s a way to get diversification but also to not miss out on potential
    returns.


    *   Scarcity: Many cryptocurrencies have limits on how many coins can be issued.
    This can make the digital asset scarce. So when demand rises, there can be significant
    increases in the price.


    *   Influencers: As we’ve seen earlier in this chapter, people like Elon Musk
    can have a huge impact on the prices of cryptocurrencies – and this could be a
    matter of a single tweet.


    *   Adoption: Traditional financial services companies like banks have been investing
    in cryptocurrencies and blockchain. This provides validation and demand.


    *   Hacks: From time to time, there are high-profile ones. The result is that
    there can be disruption in the crypto markets.


    *   Regulations: Governments tend to be slow with new restrictions. But whenever
    there are actions, there can be notable impacts on the valuations.


    *   Immature Market: Cryptocurrencies are still in the early stages. Unlike stocks
    or bonds, there is not a long history of performance during periods of war, inflation,
    recessions, depressions, and so on.


    ## Ethereum


    Ethereum has several use cases. One is for allowing transactions of a cryptocurrency.
    The coin is referred to as ETH or ether. In early 2022, the price was about $3,400
    and the total value of the market was $412 billion.


    Another important use case – especially for Web3 – is that Ethereum allows you
    to create smart contracts. Essentially, this means you can create programs on
    the blockchain.


    For the crypto world, this was revolutionary. Ethereum was not just about creating
    a new cryptocurrency. You could create any type of application. This could be
    for financial services, legal services or even a cool game. It’s only a matter
    of your imagination.


    A key to smart contracts is the triggering of events based on certain conditions
    that are a part of an agreement between users. This is about traditional programming
    structures of If/then else statements. For example, an Ethereum smart contract
    may release funds if a party performs a service.


    Now this can get complicated, such as in terms of the workflows. You want to game
    out the scenarios with the applications. If not, there could be actions taken
    that may result in a financial loss or a bad customer experience. There should
    also be a system of rules for resolving disputes.


    To make an Ethereum transaction, you need to setup an account and there are two
    types. First, there are Externally Owned Accounts (EOA). This is where you have
    control with a private key and there is no code with it. You can send ether or
    messages from this account.


    Next, there is the Contract account, which has its own code that is triggered
    when there is a transaction from an EOA. This type of account cannot initiate
    transactions. They can only come when there is a transaction from an EOA.


    But there are usually few credentials you need to provide to open either account.
    You then spend Ether for a transaction. One of the reasons for this is to prohibit
    users – or even hackers – from bombarding the network with needless transactions.
    Next, the ether is a way to reward miners for validating transactions and providing
    compute resources to the network.


    As mentioned earlier, the fee for using the Ethereum network is based on a unit
    called gas. And yes, you pay this with Ether, and they have dominations called
    gwei. Consider that there is 1 Ether for 1,000,000,000 gwei.


    Like a typical blockchain, a smart contract makes it possible for users to transact
    with each other without the need for a trusted intermediary. The system is decentralized.
    There is also a copy of the ledger for everyone to see.


    Here are other benefits of Ethereum:


    *   Agility: When you execute a contract, it is done instantly. There is nothing
    to fill out. There is also no need to reconcile errors.


    *   Security: This is at a high level because of the use of encryption.


    *   Backup: All smart contracts are stored many times on the blockchain. This
    means you will not have data loss.


    *   Maturity: As the first system for smart contracts, there is the advantage
    of a refined set of features. There is also a large number of developers. This
    means that – if you have a question – you probably will get an answer from the
    community.


    *   Standard: Ethereum has become the most common blockchain for DeFi and NFTs.
    This means that a large amount of value is locked in the blockchain. “The main
    pro for Ethereum is its enormous adoption and wide audience of users,” said Alex
    Melikhov, who is the CEO and founder of Equilibrium. “If you deploy your application
    on Ethereum, you have potential access to a large-scale audience of users who
    are already familiar with blockchain technology and its infrastructure. They will
    not struggle with basic things like setting up a wallet or sending transactions
    but will be able to start using your application right away.”


    Each smart contract is stored on an address of the blockchain. This is contract
    address. Note that the developer does not come up with this. Instead, the contract
    address is based on a complex hash function calculation.'
  trans: '

    ## 加密货币的价值


    加密货币无疑存在风险。以`比特币`为例，出现 20%的暴涨或暴跌并不罕见。


    那么如何评估加密货币的价值呢？目前并没有明确的规则。它不像股票这类传统资产。对于股票，估值通常基于公司利润和增长前景。


    尽管如此，评估加密货币时仍有一些因素需要考虑，包括以下几点：


    - **对冲**：有些人投资加密货币只是为了对该资产有所涉猎。这既能实现投资多元化，又能不错过潜在回报。


    - **稀缺性**：许多加密货币对可发行的代币数量设有上限。这使得数字资产具有稀缺性。因此当需求上升时，价格可能大幅上涨。


    - **影响力人物**：正如本章前面所述，像埃隆·马斯克这样的人对加密货币价格有巨大影响——有时只需一条推文就能引发波动。


    - **普及应用**：银行等传统金融服务公司一直在投资加密货币和`区块链`技术。这既提供了市场认可，也创造了需求。


    - **黑客攻击**：时不时会发生备受瞩目的黑客事件。结果是加密货币市场可能陷入混乱。


    - **监管政策**：政府对新法规的出台通常比较缓慢。但每当有监管行动时，都会对估值产生显著影响。


    - **市场不成熟**：加密货币仍处于早期阶段。与股票或债券不同，它们没有在战争、通货膨胀、经济衰退、萧条等时期长期表现的历史数据。


    ## 以太坊


    `以太坊`有多种应用场景。一是用于加密货币的交易。这种代币被称为`ETH`或以太币。2022 年初，其价格约为 3400 美元，总市值为 4120 亿美元。


    另一个重要应用场景——尤其对`Web3`而言——是`以太坊`允许创建智能合约。本质上，这意味着你可以在区块链上编写程序。


    对加密货币世界来说，这具有革命性意义。`以太坊`不仅仅是创造一种新加密货币。你可以创建任何类型的应用程序。可以是金融服务、法律服务，甚至是一款炫酷的游戏。唯一限制你的只有想象力。


    智能合约的关键在于，根据用户协议中的特定条件触发事件。这涉及传统的编程结构`If/then else`语句。例如，如果一方履行了服务，`以太坊`智能合约可能会释放资金。


    但智能合约在工作流程方面可能变得复杂。你需要对应用程序的各种场景进行推演。否则，可能出现导致财务损失或糟糕用户体验的操作。还应建立一套争端解决规则体系。


    要进行`以太坊`交易，你需要设置一个账户，账户分为两种类型。第一种是`外部拥有账户`（`EOA`）。你可以通过私钥控制该账户，且不包含任何代码。你可以从此类账户发送以太币或消息。


    第二种是`合约`账户，它拥有自己的代码，当来自`EOA`的交易发生时，这些代码会被触发。这类账户无法主动发起交易，只能响应来自`EOA`的交易。


    但通常开设任一账户只需提供少量凭证。然后你可以花费`以太币`进行交易。这样做的一个原因是为了阻止用户——甚至黑客——用无意义的交易轰炸网络。此外，以太币也是一种奖励矿工验证交易、为网络提供计算资源的方式。


    如前所述，使用`以太坊`网络的费用基于一个名为`gas`的单位。是的，你使用`以太币`支付费用，它们还有名为`gwei`的面值单位。请注意，1`以太币`等于
    1,000,000,000`gwei`。


    与典型的区块链一样，智能合约使用户无需可信中介即可相互交易。该系统是去中心化的，且每个人都可以查看账本副本。


    以下是`以太坊`的其他优势：


    - **敏捷性**：执行合约时即刻完成。无需填写任何表格，也不需要对账纠错。


    - **安全性**：由于采用加密技术，安全性处于较高水平。


    - **备份**：所有智能合约均在区块链上多次存储。这意味着你不会丢失数据。


    - **成熟度**：作为首个智能合约系统，其优势在于拥有一套精细化的功能。同时拥有庞大的开发者群体。这意味着——如果你有问题——很可能从社区获得答案。


    - **标准性**：`以太坊`已成为`DeFi`和`NFT`领域最常用的区块链。这意味着大量价值被锁定在该区块链中。"`以太坊`最大的优点是拥有巨大的采用率和广泛的用户群体，"`Equilibrium`首席执行官兼创始人亚历克斯·梅利霍夫表示，"如果你在`以太坊`上部署应用程序，你可以接触到大量已经熟悉区块链技术及其基础设施的用户。他们不会在设置钱包或发送交易等基本操作上遇到困难，而是能立即开始使用你的应用程序。"


    每个智能合约都存储在区块链的一个地址上，即合约地址。请注意，此地址并非由开发者设计，而是基于复杂的哈希函数计算得出的。'
- fmt: '# Smart Contract Development and Blockchain Platforms


    In terms of the development of smart contracts, you can use a variety of languages.
    Some of the common ones include Solidity and Vyper.


    You will then need to compile the programs using the Ethereum Virtual Machine
    (`EVM`). This translates the code into bytecode and then is put on the blockchain.


    Now this is different than a typical development environment – and the reason
    is the blockchain. For example, when a smart contract is executed, all the nodes
    on the network carry it out too. This is done with the `EVM`. This is all part
    of the process of verifying and accepting the smart contract.


    The smart contract transaction will have a gas limit. If the processing results
    in a higher amount, then the transaction will not be completed on the network.
    But the sender of the Ether for the smart contract will be reimbursed.


    Then what are the downsides of Ethereum? Let’s take a look:


    - **Scalability**: This has proven to be perhaps the biggest problem. “The transactions
    are not scalable, and its users also have to pay high transaction fees per transaction,”
    said Pratik Gandhi, who is the Head of Marketing at Covalent.

    - **Immutable**: Once you create a contract, it is nearly impossible to change.

    - **Third Parties**: They are not completely out-of-the-loop with Ethereum. For
    example, if you are creating a smart contract, you may need the help of an attorney
    to create the terms as well as to enforce them.

    - **Terms**: The conditions in a smart contract can be ambiguous and complex.
    This can make it difficult to code on the Ethereum blockchain.


    To deal with these problems, there has been work on Ethereum 2.0 (it is also referred
    to as Serenity). The goals are to increase the speed, scalability, and security
    of the blockchain.


    For example, it will use the proof-of-stake (`PoS`) mechanism, which reduces the
    need for compute power to verify blocks. This is done where users provide cryptocurrency
    as collateral for the possibility of validating blocks. This is known as staking.
    For the most part, it’s a way to gauge the commitment or “skin in the game.”


    The validators are randomly selected to mine the blocks. It’s not about many computers
    competing to solve math problems. Rather, when a minimum number of validators
    verify the block – at 16,384 – it is then added to the blockchain. This should
    help improve the security of the network.


    The blockchain will also have a different structure. It will use shards. Essentially,
    there will not be a single chain but chains that are created and managed in parallel.


    With this new approach to verification and blockchain structure, Ethereum 2.0
    will have more scale. The network capability will go from 30 transactions per
    second to up to 100,000.


    But in the meantime, there are various other projects with the aim to improve
    Ethereum. Examples include Polygon, Arbitrum, Starkware, and ZK-Sync.


    Then there have emerged alternative networks, like Solana, Near Protocol, Avalanche,
    and Ronin chains.


    ## Solana


    Solana is perhaps the biggest competitor for Ethereum. With it, you can create
    non-fungible tokens (`NFTs`) and decentralized applications (`dApps`).


    Back in 2017, Anatoly Yakovenko and Raj Gokal created the Solana project. One
    of the biggest priorities was speed. Note that Solana can get to 65,000 transactions
    per second. The fee structure is also fairly low – especially when compared to
    Ethereum.


    For the minting, Solana uses the `PoS` protocol. But it also has its own system
    called proof-of-history (`PoH`). With this, it’s possible to verify if the transactions
    are in the right sequence. This is done by dividing the blockchain into different
    time periods and the validators are selected ahead of time (this is based on the
    `PoS` staking). For the most part, this allows for more agility and efficiency.


    While this approach has seen good results, there are some nagging issues. With
    fewer validators, there is the concern that there is more centralization. For
    example, a large amount of the SOL tokens – which are the native ones for Solana
    – are owned by venture capitalists.


    In early 2022, the price of the `SOL` was $116, and the total market value was
    $37.8 billion.^([^(43)](#fn43))


    ## Near Protocol


    The Near Protocol may not necessarily be a catchy name. But this blockchain platform
    has been getting lots of traction.


    In 2018, former Microsoft employee, Alexander Skidanov, and Ilya Polosukhin, launched
    the Near Protocol project. Over the years, the team has attracted some of the
    most renowned programmers in the world. For example, two have won the Programming
    World Championship twice.


    For Skidanov, he is a fervent believer in decentralization and the power for the
    community. As a result, Near Protocol is focused essentially on the needs for
    developers. But there are features that make it user friendly. Consider that instead
    of using hash addresses, there are understandable written ones.


    The Near Protocol system provides for smart contracts and `dApps`. It also operates
    with a `PoS` blockchain and uses sharding. This breaks up the network into manageable
    segments and the result is more scale.


    As for the selection of validators, this is done by using an auction. The selections
    are for about every 12 hours or so.


    Another key to the success of the Near Protocol is its powerful cloud infrastructure.
    It is based on serverless approaches and leverages a large number of systems across
    the globe.


    For early 2022, the price of the `NEAR` token was $15.90, and the market capitalization
    was $10.5 billion.^([^(44)](#fn44))


    ## Avalanche


    On the Avalanche website, it says that its blockchain system is “blazingly fast,
    low-cost and eco-friendly.” And this is not necessarily hype. For example, the
    transactional finality is under two seconds. By contrast, it is six minutes with
    Ethereum.


    Avalanche is relatively new, with the launch in late 2020. The founders include
    two computer science professors, Emin Gün Sirer and Kevin Sekniqi, as well as
    Maofan “Ted” Yin, who is the creator of Facebook’s digital currency project Libra
    (although, the social media giant would abandon it).


    By far, `DeFi` is the main area where Avalanche has seen the most success. Then
    again, financial platforms need high speed and scale. Although, Avalanche has
    been investing more in the Metaverse, gaming, and virtual worlds.


    As for the blockchain, Avalanche has a blend of different approaches – which it
    refers to as the Avalanche Consensus Protocol. This includes the classical protocols.
    These are extremely fast and environmentally friendly. Then there are the Nakamoto
    protocols. Yes, this is the traditional system that Satoshi Nakamoto developed
    for Bitcoin.


    Avalanche’s `UI` is similar to Ethereum’s and runs on the `EVM`. You can also
    use existing Ethereum wall addresses. As for the `dApps`, they are compatible
    with the Solidity language.


    In early 2022, the native token for Avalanche – which is `AVAX` – had a price
    of $84 and a market capitalization of $22.5.^([^(45)](#fn45))'
