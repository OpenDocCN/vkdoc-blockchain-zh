- fmt: '# The Challenges


    When Zuckerberg said the metaverse will take a long time, he was being very realistic.
    This was probably not an attempt to downplay expectations.


    First of all, the metaverse currently requires significant compute power. Consider
    the example of `Decentraland`. Founded in 2017, the company is one of the top
    metaverse platforms. With it, you can buy virtual plots of land using NFTs that
    are based on the `MANA` cryptocurrency.


    But to play the game, you need a desktop computer that has a sophisticated `GPU`
    (Graphics Processing Unit) chip from Nvidia or Advanced Micro Devices. In other
    words, this will cost thousands of dollars more than a typical computer.


    With the metaverse, you will also need a VR headset. True, the prices have come
    down on these devices. For example, Meta’s `Oculus` can cost between $300 and
    $500.


    Yet the issue with VR headsets is the experience. Earlier in this chapter, we
    have noted that there are usually no legs in the visuals of the metaverse. But
    there are other problems as well.


    Perhaps the most notable one is that VR headsets can cause motion sickness. In
    some cases, people will throw up!


    Another problem has to do with space. What if you walk down a long pathway? Well,
    this may not work too well since you may be in a small room.


    There have also been cases where people have bumped into walls or other objects.
    Sometimes this has resulted in injuries – even broken bones.^([^(210)](#fn210))
    There is even the “gorilla arm syndrome.” This is pain that results from having
    your arms raised for a long period of time.


    Regardless, there continues to be progress with VR headsets. They are getting
    easier to use and more powerful. The growth has also been strong. According to
    `IDC`, the shipments of VR headsets are expected to reach 28.7 million on a global
    basis by 2025.^([^(211)](#fn211))


    Besides the issues with the gear, there will need to be major upgrades to existing
    Internet infrastructure. It’s true that `5G` will be a big help with latency.
    But there will probably need to be substantial investments in data centers. The
    amount of data required for immersive experiences is enormous.


    Another nagging issue with the metaverse is `AI`. To make this work, there will
    be a need for access to the right kinds of data, which allows the algorithms to
    learn over time. Then there are the difficulties with privacy and bias.


    If the data is not managed properly, the experience could be strange indeed. The
    shapes and movements in the environment could be out-of-sync of what’s expected.


    Although, there are innovations to help out. `AI` is getting better at using synthetic
    data. As the name implies, this is artificial data that is based on certain extrapolations
    or assumptions. This can allow for much higher volumes of data that is fairly
    clean.


    “We’re entering a new era of data-centric `AI` development whereby tapping into
    the virtual world of real-time 3D we can make the world a better place with synthetic
    data,” said Danny Lange, who is the SVP of `AI` at Unity. “Synthetic data is important
    because it’s generated to meet specific needs or conditions that are not available
    in existing data. This can be useful in numerous cases, such as when privacy requirements
    limit data availability or dictate how it can be used. The benefits extend to
    overcoming unwanted bias in real-world data.”^([^(212)](#fn212))


    Something else: It’s not clear how much adoption there will be of the metaverse.
    For example, early incarnations like `Second Life` turned out to be niches. Then
    again, they did not have the extensive technologies that exist today. Yet it does
    seem like there will probably be a considerable number of people who would prefer
    not to participate. Hey, they may just prefer their own physical universe!


    On the other hand, there will be other people who will want to spend all their
    time in the metaverse. It’s actually similar to the problem parents have with
    children who constantly play video games.


    The bottom line: The metaverse has lots of unknowns. But this is not stopping
    entrepreneurs. The fact is that there will be continued focus on this category.


    **Note**


    To deal with the special issues with the metaverse, entrepreneurs are looking
    at developing creative solutions. For example, one option is omnidirectional treadmills,
    which allow for simulating walking in a large area. In fact, some real estate
    developers are making homes that have their own metaverse rooms.^([^(213)](#fn213))


    # Marketing in the Metaverse


    While the focus for `Web3` business models is on crypto payments, the business
    opportunity may be somewhat different with the metaverse. Granted, crypto will
    still be very important, since there will be a virtual economy. But branding is
    likely to be another crucial part of monetization.


    The marketing impact is likely to be better than a typical banner ad or a video
    embedded in a Facebook feed. The advertising for the metaverse will become part
    of an immersive and engaging environment.


    An interesting example is `Roblox`. The origins of the company go back to 1989.
    Founders David Baszucki and Erik Cassel developed a popular 2D software system
    to simulate a physics lab for students. Leveraging on this experience, they would
    then go on to create the `Roblox` platform in 2004. Although, this virtual world
    was 3D. It also had tools like the `Roblox Studio` to allow users to create their
    own items, games, and applications. They could then sell them.


    Currently, the `DAUs` (daily active users) are close to 50 million.^([^(214)](#fn214))
    In 2021, the company posted $1.9 billion in revenues, up 108% on a year-over-year
    basis.


    Then what about the marketing opportunities for brands? Well, one interesting
    example is the `Chipotle Burritor Builder`.^([^(215)](#fn215)) This is a simulation
    on the `Roblox` platform. Basically, it’s a contest to see who can successfully
    roll burritos, which can be tricky. For this, the winners earn `Burrito Bucks`.
    You can use these to buy entrees from the `Chipotle` app and `Chipotle.com`.


    Another example is `Molson Coors Beverage`. The beer maker teamed up with `Decentralized`
    to create a virtual bar.^([^(216)](#fn216)) Users could pour beer and talk with
    other people. There was even an option to play the jukebox. `Molson Coors Beverage`
    selected `Decentralize` because the platform is only viewed from the browser and
    allows for restricting users by age.


    The average user spent about 20 minutes at the virtual bar. All in all, this marketing
    effort was likely more engaging than just a typical ad.


    As should be no surprise, `Meta` is already experimenting with marketing opportunities
    with its own metaverse. This has certainly been the case with the `Horizon` platform,
    which is integrated with `Oculus` VR headsets. Users can explore thousands of
    different virtual worlds and even create their own.


    In 2022, `Wendy’s` launched its own on `Horizon`. The company called it the `Wendyverse`,
    which is a virtual restaurant.^([^(217)](#fn217)) The focus was for the March
    Madness college basketball tournament. The `Wendyverse` allowed users to shoot
    baskets and do slam dunks.'
