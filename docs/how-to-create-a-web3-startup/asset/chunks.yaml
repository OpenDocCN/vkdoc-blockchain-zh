  trans: '

    # 存在的问题


    在 Web3 领域最热忱的倡导者看来，DAO 最终将成为企业组织的主导形态。有人认为下一个科技巨头就会是 DAO。


    这确实有可能成真。但 DAO 仍然存在诸多问题。


    让我们逐一审视：


    - **意外后果**：DAO 的优劣完全取决于其运行规则。但遗憾的是，预见所有问题极为困难。代码出现错误怎么办？法律发生变化怎么办？或者遭遇自然灾害怎么办？算法可能无法应对这些“异常”事件——这可能导致
    DAO 运行失灵。一种解决方案是采用人工智能等先进技术。但即便如此也远非完美。AI 需要获取海量数据并构建正确的算法。而对 DAO 而言，可能根本没有足够的数据支撑良好结果。


    - **去中心化**：虽然采用法律框架是良策，但这意味着去中心化程度可能会降低。毕竟，传统治理模式（如管理层和董事会）依然存在。


    - **权威性**：在 DAO 中，智能合约可以处理部分核心决策。但其他决策呢？这些通常由创建者掌控。值得注意的是，这个过程可能并不透明。同时可能存在利益冲突，尤其是在发行新代币时。这些代币会流向谁？回到创建者手中吗？


    - **复杂性**：跨不同国家设立实体很常见。这虽然能提供保护，但也增加了复杂性和成本。离岸实体的建立可能需要数月时间。


    - **监管**：2022 年初，拜登政府发布了关于加密货币和区块链的行政命令。这主要是鼓励相关研究。但这很可能成为加密货币和 Web3 监管的基础。其结果可能使
    DAO 这类组织面临不确定的未来。


    - **参与度**：讽刺的是，DAO 的参与度普遍较低。但这并不令人意外。坦率说，政治选举的投票率本就常常不温不火。企业代理投票也是如此。至于 DAO，参与度低可能源于几个因素。首先，人们可能没有时间投票。其次，议题对他们而言可能无关紧要。例如，关于技术问题或
    DAO 运营的投票，很可能无法引起太多兴趣。


    但 DAO 最大的劣势或许在于可能导致糟糕的战略决策。如果苹果电脑或微软以这种实体形式运营，它们还能取得同样的成功吗？这似乎不太可能。史蒂夫·乔布斯和比尔·盖茨的影响力是无法估量的。当然，他们的决策往往远非透明（尤其乔布斯），而且存在明显的集权特征。


    “许多目前试图创建 DAO 的组织都在采用‘渐进式去中心化’的方法，因为项目要成功，确实需要从少数高度积极的领导者或核心团队开始，”Hinkel 表示。“立即跳入由成千上万人——无论通过投票权代币化或其他机制——指导的组织形式，既昂贵又繁琐，已经拖慢了一些
    DAO 项目的进展。”


    那些具有相当规模的项目是个例外。它们已经证明了 DAO 的价值，并能筹集到足够的资金使其正常运转。


    “虽然这些项目获得了巨大的关注，但它们只是特例，并非普遍规律，”Hinkel 说道。“当你审视许多最成功的 DAO 项目时，会发现它们背后既有传统风投和投资者的大力支持，也有社区的支撑，这需要创业者具备和
    Web2 公司一样的社交网络、构建可投资商业基本面的全套技能。”


    相反，对于早期创业者来说，采用混合方式可能更好。一方面，保留传统的公司和合约机制。另一方面，针对 Web3 项目的社区，则可以专注于 DAO。


    以下是一些值得考虑的最佳实践：


    - **安全性**：不幸的是，这仍是 DAO 面临的问题。入侵事件持续发生——有些导致了巨额资金被盗。换句话说，创建 DAO 时，安全应该是第一要务。


    - **子 DAO**：这是大型 DAO 内部的较小板块。其理念是将决策分解到不同类别。这有助于提高 DAO 的参与度和效率。


    - **限制决策量**：通常来说，让 DAO 处理少量决策是个好主意。否则，用户可能不堪重负，从而干脆放弃投票。


    - **激励机制**：您可以向成员提供更多代币，以提高 DAO 的参与度。


    - **委托投票**：DAO 的一个常见问题是提案难以达到法定人数。解决方法是允许成员委托投票权。


    - **领域加权投票**：这意味着在特定事务上更有经验的用户应拥有更大投票权。“例如，在营销活动决策中，你更希望专业营销人员的投票权重高于软件工程师，”Decentology
    创始人 Nik Kalyani 表示。^(¹¹¹)


    PolyientX（一家为 NFT 开发 Web3 工具的公司）产品主管 Nick Casares 提供了其他一些最佳实践供参考。他是 DAO 领域的专家。例如，他是
    ATX DAO 的贡献成员。


    以下是他的一些建议：


    - **确立北极星**：“DAO 是一种创新载体，能与世界各地的人们共享资源、协作完成使命。要充分利用 DAO 的潜力，参与者必须明确使命和宗旨。使命没有对错之分，但
    DAO 成员必须就指导 DAO 实现目标的北极星达成共识。”


    - **无层级领导**：“DAO 内部缺乏层级结构带来了独特的挑战，常常让人感觉缺少领导。然而，这一挑战其实是伪装的机遇。DAO 应寻求替代方式来识别、鼓励和赋能参与者的贡献。DAO
    可以使用投票、任务分配和创意众包等替代流程来指导决策，而非依赖正式的层级结构。”


    - **为赋能而组织**：“清晰的使命是重要保障，能帮助参与者做出与 DAO 预期成果一致的决策。为弥补层级缺失，DAO 可以以赋能参与者行动的方式进行组织。明确责任领域和需求，是帮助参与者根据自身技能和专长评估贡献能力的有效方法。”


    - **探索法律结构与风险**：“DAO 没有正式的法律实体身份。尽管如此，参与者应根据 DAO 的活动类型，了解可用的法律结构。目前有一个由思想领袖组成的活跃社区正在探索替代性实体结构，DAO
    应紧跟最新发展。DAO 参与者应阐明将从事的活动，并寻求法律咨询以了解法律和财务风险。”


    - **向 DAO 社区学习**：“随着 DAO 概念的演进，参与者应积极与其他 DAO 建立联系，分享并学习 Web3 社区的最佳实践。”

