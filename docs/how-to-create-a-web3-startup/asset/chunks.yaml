- fmt: '# Conclusion


    In this chapter, we covered the various approaches to consumer Web3 applications.
    First, we looked at `NFTs`. They are a way to represent ownership in digital assets.


    A key benefit is that the creator of `NFTs` can get a higher percentage of the
    revenues. It can also allow for building stronger connections with users.


    But the values of `NFTs` are often subjective and volatile. There are also risks
    with hacking and fraud. Although, companies are investing in ways to mitigate
    these problems.


    Despite all this, `NFTs` are likely to continue to be popular. The good news is
    that there has been more progress to deal with the problems.


    `NFTs` are also likely to be the key for the emergence of Web3-style social networks
    and gaming platforms. They will be a visually interesting way to own digital items
    and make transactions. They will also allow users to move `NFTs` to other platforms,
    which should provide more value.


    For Web3 games, they have been one of the early success stories. But then again,
    the industry has been a leader in transacting in digital items and deploying innovative
    business models. Web3 gaming is also likely to be the gateway for new users to
    participate in crypto.


    Brands are also looking at `NFTs` and Web3 to connect with their customers. This
    can be an effective way to deal with the issues of privacy regulations.


    In the next chapter, we’ll take a look at `DeFi` or decentralized finance.


