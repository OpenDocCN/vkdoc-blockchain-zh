- fmt: 'Crypto Raiders CEO and cofounder, Nicholas Kneuper, noted: “We built Crypto
    Raiders with the RPG games we played growing up in mind. Those games are the perfect
    use case to bring together gaming and the blockchain.”^([^(153)](#fn153))


    Finally, there is the move-to-earn model. It’s focused on the physical world and
    promotes wellness. How so? Take a look at the top operator in the market: STEPN.
    To play this game, you purchase `NFT`s, which are based on the Solana blockchain.
    Then you track your movements with the GPS on your smartphone. By doing this,
    you get in-app token rewards. The bottom line: This is a way to promote more healthy
    living.


    In 2022, STEPN announced a `$5 million` seed funding.^([^(154)](#fn154)) The lead
    investors included Sequoia Capital India and Folius Ventures.


    ## Brands and NFTs


    Because of privacy regulations, it is getting tougher for companies to use digital
    platforms to connect with their customers. Consider the use of cookies. These
    allow for the tracking of user behavior. It has also made it possible to use retargeting
    of ads. But cookies are on their way out. Google’s Chrome will sunset them in
    2023. The same goes for Firefox and Safari.


    Or look at the new privacy requirements from Apple. For iOS apps, they require
    that users opt-in for tracking. And as should be no surprise, this has had an
    adverse impact on online marketing efforts. Facebook noted that it will reduce
    2022 sales by more than `$10 billion`.^([^(155)](#fn155))


    In light of this, advertisers are looking for alternatives. Interestingly enough,
    `NFT`s may be a big help. This is done by using existing or new content. This
    can then include incentives, perks, and discounts.


    In fact, this strategy can allow a company to have more control over its online
    domain. Let’s face it, when relying on platforms like Facebook, YouTube, TikTok,
    or Twitter, there is the possible adverse impact of a change in an algorithm.
    This could reduce the impact of the advertising or could mean that the advertiser
    will need to pay more.


    Yet there needs to be caution. When it comes to the Web3 world, the users usually
    do not want blatant marketing pitches. They instead prefer engaging content, and
    immersive experiences that enhance a company’s product or service. This may also
    include providing assistance for a cause, such as by donating funds to a nonprofit.


    Here are some examples:


    *   For the 95th anniversary of the Macy’s Thanksgiving Day Parade, the company
    auctioned ten `NFT`s.^([^(156)](#fn156)) They each had a parade balloon from prior
    events. The proceeds from the auction went to the Make-A-Wish Foundation. The
    company also gave away `9,500 NFTs` to people who signed up.

    *   For the 40th anniversary of McDonald’s McRib, the company gave away a limited-edition
    `NFT`.^([^(157)](#fn157)) To get this, people had to follow `@McDonalds` on Twitter
    and retweet the Sweepstakes Invitation.

    *   Mattel launched the Hot Wheels `NFT` Garage. This involved a series of 40
    new `NFT`s for the iconic toy cars.^([^(158)](#fn158)) There was also a promotion
    to win limited-edition die-cast vehicles.


    As a validation of this market, look at Nike. In late 2021, the company agreed
    to acquire RTFKT, an NFT studio for creating crypto collectibles. This startup
    was the partner of CloneX, which was involved in the creation of a highly successful
    `NFT` called CryptoSlam. It generated over `$65 million` in transactions.^([^(159)](#fn159))


    In the press release for the deal, Nike CEO John Donahoe said: “This acquisition
    is another step that accelerates Nike’s digital transformation and allows us to
    serve athletes and creators at the intersection of sport, creativity, gaming and
    culture.”^([^(160)](#fn160))


    OK then, as for the rest of the chapter, we’ll take a look at some of the interesting
    other startups in the NFT space.


    ## Novel


    Roger Beaman is a software engineer who has worked at Goldman Sachs and Shutterstock.^([^(161)](#fn161))
    In 2021, he co-founded Novel. The goal was to make it easier for companies to
    create, buy, and sell `NFT`s. It would be similiar to using a platform like Shopify.
    Beaman would go on to raise `$6 million` for his startup.^([^(162)](#fn162))


    His experiences at Shutterstock and Goldman Sachs turned out to be quite helpful.
    “They mapped to the NFT/Web3 world more directly than you might think,” said Beaman.
    “At Shutterstock, I worked on an in-browser image editor and pushed what was possible
    for in-browser experiences, which fed directly into the advanced tools we have
    to help creatives make `NFT`s with Novel. At Goldman, I worked on architecting
    a marketplace for complex financial products, and it was thinking this way that
    helped me map the market for `NFT`s and the role it made sense for Novel to play
    in it.”^([^(163)](#fn163))


    The inspiration for Novel came when Beaman and his cofounders – Brian Sugar and
    Anna Merzi – began to see the impact of escalating ad acquisition costs for ecommerce.
    “We asked ourselves, is there a more sustainable, community-driven way to build
    a brand?” he said. “That’s where `NFT`s fit into the marketer''s playbook. Many
    brands have a latent community waiting to be activated. Web3 brings a brand closer
    to its customers and brings those customers closer to each other.”


    There was a problem, though. Many of the brands simply did not have the technical
    know-how for creating and managing `NFT`s. Thus, Beaman set forth to leverage
    no-code.


    This means using easy-to-fill-out forms and drag-and-drop operations. There are
    no technical skills required or a deep background with cryptocurrencies and blockchain
    systems.


    Here’s how Novel works:


    *   Step 1 – Creation: The Novel Generator creates the artwork, sets the rarity,
    and establishes the royalty rates. The system then generates the underlying code
    for the smart contract.

    *   Step 2 – Sell: With the press of a few buttons, you can place your `NFT`s
    on the Shopify platform. Then customers can make purchases with a debit or credit
    card. There is no need for a crypto wallet.

    *   Step 3 – Minting: After the purchase, there is the creation for the token
    mint. Novel also covers all the gas fees for customers.


    “We were inspired to create a platform that could democratize the relation-building
    components of Web3 by removing many barriers to entry, such as the need to understand
    crypto and blockchain technology,” said Beaman.


    Novel is not just a technology either. The company also provides assistance with
    strategy. This is certainly very important given that many brands still lack much
    of an understanding of `NFT`s.


    The pricing is based on a `$99` monthly subscription for the software. Novel then
    takes a 10% fee for NFT sales and 1% to 2% for transactions on secondary marketplaces.^([^(164)](#fn164))


    As for Beaman’s advice for entrepreneurs: “There is a ton of noise in the space
    and it’s easy to get lost in that. To successfully build in the space, you need
    to cut through that and find your own truth. That’s true in business generally,
    but it’s especially true here. The keen insights at the heart of your business
    will likely sound pretty different from the present hype and media coverage of
    the space.”'
  raw: 'Crypto Raiders CEO and cofounder, Nicholas Kneuper, noted: “We built Crypto
    Raiders with the RPG games we played growing up in mind. Those games are the perfect
    use case to bring together gaming and the blockchain.”^([^(153)](#fn153))


    Finally, there is the move-to-earn model. It’s focused on the physical world and
    promotes wellness. How so? Take a look at the top operator in the market: STEPN.
    To play this game, you purchase NFTs, which are based on the Solana blockchain.
    Then you track your movements with the GPS on your smartphone. By doing this,
    you get in-app token rewards. The bottom line: This is a way to promote more healthy
    living.


    In 2022, STEPN announced a $5 million seed funding.^([^(154)](#fn154)) The lead
    investors included Sequoia Capital India and Folius Ventures.


    ## Brands and NFTs


    Because of privacy regulations, it is getting tougher for companies to use digital
    platforms to connect with their customers. Consider the use of cookies. These
    allow for the tracking of user behavior. It has also made it possible to use retargeting
    of ads. But cookies are on their way out. Google’s Chrome will sunset them in
    2023\. The same goes for Firefox and Safari.


    Or look at the new privacy requirements from Apple. For iOS apps, they require
    that users opt-in for tracking. And as should be no surprise, this has had an
    adverse impact on online marketing efforts. Facebook noted that it will reduce
    2022 sales by more than $10 billion.^([^(155)](#fn155))


    In light of this, advertisers are looking for alternatives. Interestingly enough,
    NFTs may be a big help. This is done by using existing or new content. This can
    then include incentives, perks, and discounts.


    In fact, this strategy can allow a company to have more control over its online
    domain. Let’s face it, when relying on platforms like Facebook, YouTube, TikTok,
    or Twitter, there is the possible adverse impact of a change in an algorithm.
    This could reduce the impact of the advertising or could mean that the advertiser
    will need to pay more.


    Yet there needs to be caution. When it comes to the Web3 world, the users usually
    do not want blatant marketing pitches. They instead prefer engaging content, and
    immersive experiences that enhance a company’s product or service. This may also
    include providing assistance for a cause, such as by donating funds to a nonprofit.


