    # Core Technology


    Blockchain, Ethereum, and Other Platforms


    Besides running highly successful companies like SpaceX and Tesla, Elon Musk somehow
    has time to focus on the cryptocurrency world. This is definitely apparent from
    his Twitter feed. Oh, and of course, during early 2022, he bought 9% of the company
    and attempted a takeover!


    Some of his tweets are comical – but the world pays close attention. When Musk
    posted a shiba inu puppy image on Twitter, the altcoin called shiba inu spiked.
    He also had a major impact on dogecoin. This is a cryptocurrency that actually
    started as a joke.


    Here’s what he tweeted about it: “Lots of people I talked to on the production
    lines at Tesla or building rockets at SpaceX own Doge. They aren’t financial experts
    or Silicon Valley technologists. That’s why I decided to support Doge – it felt
    like the people’s crypto.”^([^(36)](#fn36))


    In May 2021, Musk was the guest host on Saturday Night Live and his performance
    garnered mixed reviews. But he did mention dogecoin, saying it was a “hustle.”^([^(37)](#fn37))
    The price of the cryptocurrency plunged nearly 30%.


    No doubt, the crypto world is wild and volatile. But it is becoming mainstream.
    And Musk is one of the main influencers. Although, this certainly has its downsides.
    Musk is facing lawsuits, such as for his alleged manipulation of dogecoin. Tesla
    also sold a large amount of its Bitcoin holdings.


    Regardless, the core blockchain technology for crypto is relatively new. There
    continues to be much evolution and change. Thus, for entrepreneurs looking at
    Web3, you need to have a solid understanding of the core blockchain technology.
    You will also need to keep up with some of the emerging alternative platforms.


    In this chapter, we’ll get an overview of them.'
