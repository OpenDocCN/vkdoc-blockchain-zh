  > *你的官长，如起初一般*\n> \n> *此后，你必被称为*\n> \n> *公义之城*\n> \n> *忠信之邑*\n> \n> *锡安必因公平得蒙救赎*\n\
  > \n> *其中归正的人必因公义得蒙救赎*\n> \n> *但悖逆的和犯罪的必一同败亡*\n> \n> *离弃耶和华的必致消灭。*\n\n与其他先知一样，中本聪也来自边缘地带，尽管并非地理意义上的边缘。伦敦很难说是沙漠。但他来自金融领域的边缘，也就是说，他并非银行家或经济学家，而是一位专攻密码学的计算机科学家。因此，他与现有的银行体系毫无关联或联系。与密码学邮件列表中的同行相比，他的文字异常清晰，甚至可谓简洁，而且他有一种表达思想的方式能够吸引众人。\n\
  \n因此，中本聪的性格在某种程度上类似于亚伯拉罕诸教中的先知。这些特质有助于解释为什么他能像我们审视过的其他虚拟货币创始人那样，建立起追随者并将之转化为一个蓬勃发展的社区。例如，戴维（Wei\
  \ Dai）有许多类似的想法，但却无法用同样的方式阐释它们。同样，大卫·乔姆（David Chaum）创建了一种虚拟货币，实现了比特币的许多功能，但他并不具备中本聪的先知特质。\n\
  \n## 经文\n\n> *观自在菩萨，行深般若波罗蜜多时，照见五蕴皆空，度一切苦厄。舍利子，色不异空，空不异色；色即是空，空即是色。受、想、行、识，亦复如是。*\n\
  >\n> *——*《心经》（E. 孔兹译）\n\n《心经》是佛教最著名的圣典之一。现存有多部可追溯至八、九世纪的注释。如今，它是佛教最常用的经文之一。\n\n\
  在教义和教导至关重要的宗教中，神圣经文扮演着核心角色。我们从世界宗教中知道这些圣典，例如印度教的《吠陀》；亚伯拉罕诸教的《托拉》、《圣经》和《古兰经》；以及佛教的《三藏》。在那些存在一个社会阶层可以致力于官僚事务的文明中，即社会分工允许一部分人从事生存所需体力劳动之外的其他工作时，这些经文便具有重要地位。宗教文本是这些文化在掌握书写技能后最早记录下来的事物之一。\n\
  \n圣典是一种特殊的文本，因为它们被赋予了特殊的意义。历史上，这些经文在其特定文化中被指定为焦点文本。例如，公元三、四世纪流传的几种不同文本中，《福音书》就是这样被确立为圣典的。这些焦点文本具有一种无可指摘的独特品质，是启示的真理，即便不是直接来自上帝，也是受神圣启发的。\n\
  \n与此相关的还有另一类文本，包括注释、语录、格言或赞美诗，它们是次要的，但与焦点文本相关。它们并非完全是启示真理，但可以追溯到同一真理来源。它们的作用是扩展焦点文本教导的范围。在犹太教传统中，这包括《密西拿》和《塔木德》。\n\
  \n对于比特币，我们发现了类似的结构。尽管并非完全涉及神圣启示，但作为指定的“先知”，中本聪撰写了比特币白皮书，作为比特币的焦点文本。在围绕比特币的讨论中，这份文本与圣典一样无可指摘。它不像学术论文那样通常会被讨论其对错或引发辩论。相反，它在争论中被用作终极真理来源。\n\
  \n与此并存的，还有中本聪在比特币论坛上写下的数千文字。这些文字也具有特殊地位，因为可以将中本聪的愿景扩展到比特币白皮书明确写出的范围之外。最后一类是被认为出自中本聪的电子邮件，由收件人在数年后公布。中本聪退出公众视野并留下有限的文本这一事实，有助于确立这种结构。这些文本甚至被菲尔·尚帕涅（Phil\
  \ Champagne）像出版《新约》一样汇编成书，书名为《中本聪之书》。\n\n将其与其他虚拟货币的情况进行对比是很有趣的。例如，大卫·乔姆撰写了一篇与比特币白皮书非常相似的论文，描述了他对未来虚拟货币的愿景。这篇题为“不可追踪支付的盲签名”的论文发表于\
  \ 1982 年。翻阅此文，它有许多与比特币白皮书相似的特征。事实上，相似之处如此之多，以至于有理由认为它就是直接灵感来源。尽管如此，乔姆的论文从未获得追随者。因此，很可能是中本聪创作的这些文本，契合了宗教经文已知的结构，帮助像宗教文本聚焦宗教愿景那样，聚焦了比特币的愿景。\n\
  \n\n\n### 货物崇拜\n\n20 世纪 40 年代初，美国军队驻扎在当时称为新赫布里底群岛（今瓦努阿图）的地方。他们带来了大量的货物。数千名当地土著为美国人工作。战争结束后，美国人离开了瓦努阿图，当地一位宗教领袖的信徒修建了象征性的飞机跑道，希望能像他们曾看到的美国人在战争期间那样获得货物。他们还举行了军事游行，参与者穿着印有`USA`字样的\
  \ T 恤。这一切都是为了模仿他们亲眼目睹的在战争期间带来大量货物的美国人。\n\n货物崇拜现象起源于 19 世纪末的美拉尼西亚，是对西方殖民主义的回应。太平洋美拉尼西亚群岛的原住民经历过西方殖民管理者、传教士和种植园主，这些人拥有更高水平的物质财富。随之而来的是现代技术、衣物和其他商品。在巴布亚新几内亚的皮钦语（托克皮辛语）中，`cargo`一词意为贸易货物或补给品。这个词后来更广泛地代表了财富。\n\
  \n货物崇拜旨在获得殖民主义的生活方式与财富。其特点在于试图模仿西方殖民者的行为，以期获得同等水平的物质商品。例如，建造假飞机跑道，以及像二战士兵那样用木棍充当步枪进行操练。当地土著希望这样做会带来一种局面：要么祖先会带来类似的财富，要么殖民者会分享他们的财富。虽然货物崇拜起源于美拉尼西亚并在此盛行，但世界各地均有记载，尤其是在非洲和加勒比地区。这表明这种现象不仅仅是当地的文化特性，而是现代世界的一个普遍特征。\n\
  \n`比特币`也表现出一些相同的特征，尽管背景完全不同。例如，这里没有原住民（除非你把数字原住民算作原住民）；本质上也没有祖先或仪式。然而，两者之间确实存在一些显著的结构性相似之处。\n\
  \n同样存在一种对物质上和政治上更优越的社会组织的敌对情绪：货物崇拜是对西方殖民主义的回应，而`比特币`社区则是对政府和银行体系的回应。这些人认为政府和银行体系具有压迫性，同样被认为在奴役人们并剥夺个人自由。\n\
  \n在`比特币`社区中，致力于`比特币`的人也同样模仿这种敌对行为。他们从投资银行家那里获取线索，应用类似的语言和行为。经常能听到他们谈论建立一个加密资产投资组合，其中包含不同类型的加密货币，如`莱特币`、`瑞波币`和`狗狗币`，以及`比特币`。这些投资组合模仿了传统投资中的组合方法，即通过将风险分散到几种不同的证券上，以实现更可控的风险状况。但传统的投资组合是基于具有内在价值和现实世界联系的证券。例如，股票赋予你一家公司的部分所有权，这家公司生产某种产品或有明确的盈利途径。大宗商品是实物，可以在市场上买卖。而加密货币，除少数例外，与现实世界没有任何联系，也不具备任何内在价值。它们大多无法被用作货币的基本功能：交换媒介。`狗狗币`除了作为投机对象外毫无价值。当然，人们可能相信它真的会成为火星上的货币，就像埃隆·马斯克暗示的那样。\n\
  \n尽管如此，在传统金融世界中，没有任何证券会被允许基于如此不确定的承诺进行交易。流行的加密货币`瑞波币`旨在成为一种更高效的跨境支付解决方案。然而，它至今未能对西联汇款等传统巨头在汇款行业的地位造成任何明显的冲击。`莱特币`用于人与人之间的转账，与`比特币`类似但速度更快。同样，与其说它有独特的现实应用，不如说它更多是种承诺，因为像`Zelle`和`Square`这样的普通应用已为数量多得多的用户提供了此类服务。之所以选择这些例子，是因为它们是数千种替代加密货币中最有前景的，并具有显著潜力。但这与那些已经产生收入并具有账面价值的股票相比，情况截然不同。\n\
  \n自称的`分析师`为`比特币`设定目标，这再次模仿了针对普通股票或黄金等大宗商品等证券的常见做法。例如，`比特币`的目标价可能会被设定为 10 万美元，或者像方舟投资的凯茜·伍德所预测的那样，到\
  \ 2030 年达到 148 万美元。这些目标要么是凭空捏造，要么只是基于最模糊的分析支持，而这些分析最终都归结为“假设”情景和痴心妄想。当然，传统金融领域的分析师也有不确定性因素，但他们受制于必须记录如何得出这些假设的要求。除了像方舟投资这样更主流的投资者外，大多数分析对传统金融方法只是嘴上说说而已。\n\
  \n另一个模仿金融行为的领域是技术分析的应用。金融行业的交易员经常使用一种称为技术分析的技术，而这种技术本身就被批评为更像巫术而非科学。它依赖于识别交易证券价值图表中的模式。基本上，技术分析师认为市场波动并非完全随机，可以通过分析市场数据、应用各种图表工具和技术指标来预测。\n\
  \n这些实践类似于货物崇拜者修建飞机跑道、用假步枪游行以及模仿殖民地的风俗习惯。这些行为最初的应用方式、其工作原理，以及它们在加密货币世界中的应用之间没有任何关联。有人可能会反驳说，这种做法已经奏效，因为许多人通过`比特币`变得极其富有。但话说回来，对于任何邪教或庞氏骗局的早期成员来说，这种情况并不罕见。少数甚至许多人在短期内取得成功并不能证明什么。\n\
  \n我们还应该注意到，我们只是在讨论跨越不同加密货币社区人群的结构性行为相似性。这里存在许多例外情况，而`比特币`或许最终会成为未来的价值标准。实际上，这正是我们将在下一章讨论的内容。但目前，除了作为投机对象之外，它几乎没有任何有据可查的现实世界用途。\n\
  \n\n\n### 千年主义\n\n在 1877 年出版的《三个世界与现世的收割》一书中，纳尔逊·H·巴伯和查尔斯·泰兹·拉塞尔声称确定了耶稣第二次降临地球、将其恢复为乐园状态的时刻。他们相信这一过程将在\
  \ 1878 年完成。当这一预言未能实现时，他们设定了新的日期。当新日期同样落空后，又继续设定更新的日期。这自然是耶和华见证人的故事——一个反对三位一体、不朽灵魂等某些关键基督教教义的基督教运动。这也是被称为千年主义的最成功的宗教或社会运动类型之一。\n\
  \n千年主义坚信一个性质截然不同、更加美好的全新世界秩序即将来临。基督教文化中这些团体的动力可追溯至《启示录》20 章 1 至 10 节，其中预言了魔鬼被捆绑一千年的情节。因此，\"\
  千年主义\"这一名称源自拉丁语中表示\"千\"的词汇\"mille\"。千年主义运动常将现有社会视为不公，并相信世界即将发生变革，从而摆脱当前腐败的体制，建立更新更美好的秩序。\n\
  \n这种信念以两种方式影响了比特币的历史：一种较为寻常，另一种则更为普遍且微妙。在这两种情形中，比特币都不是最终目标，而是变革的驱动者。正如我们在与货物崇拜的相似性中所见，并非比特币本身能带来财富，而是比特币成为了更根本的社会乃至宇宙变革中的关键要素。\n\
  \n## 比特币标准的世界\n\n在自由意志主义者中，国际货币政策中黄金标准的美好旧日梦想是他们的指路明灯。比特币社区接纳了这种情怀，并加以变通：比特币应成为新的标准。这个新世界将见证法定货币被抛弃，中央银行和政府将不再鲁莽印钞，从而不再有效窃取普通民众的财富。请看看\
  \ Quora 上一位用户对此情怀的回应：\n\n> *也许当前的货币体系对某些人有益，但问题是人们辛勤劳作多年的财富去了哪里？为何财富集中在少数人手中？这些私人拥有的中央银行随意印钞并决定价值，难道不是欺诈吗？它们造成的苦难——从制裁安分守己的国家或企业，到煽动战争——又该如何看待？是谁一开始赋予它们扮演上帝的权力？(...)\
  \ 无论如何，看着事态如何发展会很有趣，但我坚定地相信银行必须消失。它们是世界上有史以来最大的恐怖主义机构。当前的法定货币体系对全世界人民毫无益处。知道 76\
  \ 亿人被这些银行卡特尔挟持听起来是什么感受吗？*\n>\n> ——用户 Emmanuel Bikorimana\n\n有了比特币，政府和银行的这种压迫性力量将完全消失，人们生活在虚拟社区中，可以自主选择同伴，形成基于兴趣的小型社群。个人将完全自由选择，因为比特币标准将确保完全的可预测性，无人能够干预。\n\
  \n在比特币标准的新世界里，个人可以获得自由。相信这个世界的信徒常自称\"比特币 maximalists\"，并将自己视为数字游牧部落。随着新世界秩序的来临，他们可以生活在任何地方，工作与社交互动将在线上进行。我们所知的民族国家将不复存在，或权力受到严重限制。就千年主义式的变革而言，这不过是相当平淡无奇的世界改变。\n\
  \n## 奇点\n\n千年主义思想影响比特币的另一种方式则更为微妙，但也更为普遍。可以说，如果没有这股思潮，比特币就不会存在。这股思潮在其世界观上更为激进，甚至带有宇宙维度。要理解它，我们必须从另一处说起。\n\
  \n硅谷最伟大的预言家之一是雷·库兹韦尔。凭借其技术领导地位和数十年的写作，他激励并启发了全球的技术专家。在其开创性著作《精神机器时代》中，他将计算机时代的技术进步与本体论变革的前景联系起来。基于技术发展似乎遵循指数而非线性增长的洞见，人类将在某个时刻触及奇点——在数学中，这是函数未定义的点。越过这一点，世界将发生转变。\n\
  \n人类将成为后人类。通过神经植入物，可以将思维上传到完全由超级计算机和互联网构成的虚拟世界。甚至有可能在这个新世界中复活死者，让他们重获新生。这种信念被称为超人类主义，即相信人类将能够克服自身局限，超越人类现状，成为超人。虽然超人类主义是一个相当新的现象，很大程度上由现代世界的技术进步驱动，但梅根·奥吉布林揭示了这场运动深厚的历史与宗教根源。在其著作《上帝、人类、动物、机器》中，她探究了超人类主义的根源。\n\
  \n与超人类主义者自身认为超人类主义是新兴事物、可追溯至 1957 年首次提及该词的朱利安·赫胥黎不同，彼得·哈里森和约瑟夫·沃里尼亚克指出，该词的现代用法首次见于赫胥黎\
  \ 1952 年的讲座\"知识、道德与命运\"，但其历史渊源更为深远。在但丁的《神曲》第九卷中，他创造了一个新的意大利语词汇\"transhumanar\"，用以描述人类进入天堂时所发生的转变。这个词汇在亨利·弗朗西斯·卡里\
  \ 1814 年版《神曲》中被译为\"transhuman\"。\n\n奥吉布林揭示了赫胥黎的思想如何受到其友人、法国耶稣会神父皮埃尔·泰亚尔·德·夏尔丹的影响。在\
  \ 1947 年的一篇文章中，夏尔丹注意到电视和广播等大众传播工具的发明创造了一个人类思维的全球网络，他称之为\"心智圈\"。进步最终将导致戏剧性的转变：人类机器的网络将让位于一种覆盖全球的\"\
  '以太化的'普遍意识\"。这将引发智能爆炸，他称之为\"欧米茄点\"，使人类能够\"突破时间与空间的物质框架\"。这一愿景与库兹韦尔的奇点概念之间的相似性显而易见。\n\
  \n要理解这一愿景究竟如何与比特币相关联，我们需要考虑另一小群技术狂热者，他们同样对虚拟货币的整体发展、尤其是对比特币产生了巨大影响——即外现主义者。\n\n\n\
  \n### 超人类主义者与比特币的起源\n\n超人类主义者是一个松散组织的社群，通过电子邮件列表、会议、一本杂志和一个基金会进行交流，其成员从未超过数千人。这个名称源于单词\
  \ *extropy*（外熵），该词最初在 1967 年一篇关于低温学的论文中作为 *entropy*（熵）的反义词被使用。后来，这个术语被用来指代超人类的潜力。外熵研究所于\
  \ 1991 年启动了其电子邮件列表，并开始推广关于超人类主义的会议。这个概念源于低温学，其目的是为了能够在世界已经发生变革后的未来某个时间点被复活。这些通过低温保存的人，将是那些在奇点到来时被唤醒的逝者。超人类主义者与库兹韦尔、尼克·博斯特罗姆以及其他著名的超人类主义者持有相同的超人类信念。\n\
  \n这带来了一个问题。由于超人类主义者知道自己活不到人类与机器融合的转折点，他们必须通过低温保存活到那一天。但是，当你无法信任银行，而通货膨胀又在慢慢侵蚀你的资金时，如何确保到那时还能留有资金就成了一个问题。替代方案必须是一种存在于现有银行业之外的电子虚拟货币。正如芬恩·布伦顿在他的《数字现金》一书中所言：“投资和金融投机的‘长期、超长期’时间框架，不再是规划你的退休和衰老，而是安排资产以超越你的生命，并最终彻底超越金钱。”\n\
  \n尼克·萨博在超人类主义者的活动中预言了这种货币的到来。1995 年，他预测到 1999 年将有一百万人使用虚拟货币，并且到 2005 年其经济体量将达到十亿美元。正如我们之前所见，萨博提出了许多后来汇聚成比特币的理念，尽管它们比他预测的时间晚了大约十年才实现。因此，他与其他密码学邮件列表上的超人类主义者一起，为后来诞生的比特币奠定了基础。\n\
  \n另一位在比特币创建过程中发挥更大作用的超人类主义者是哈尔·芬尼。他和他的妻子从一开始就是超人类主义者。他还尝试过自己版本的虚拟货币，称为“可重用的工作量证明”（RPOW）。如果没有他对比特币的兴趣以及在最初阶段的帮助，比特币很可能会消失得无影无踪。哈尔·芬尼独特的重要性很容易被忽视，或许是因为他在\
  \ 2014 年因肌萎缩侧索硬化症（ALS）过早去世。在他的著作《数字现金：创造加密货币的无政府主义者、乌托邦主义者和技术专家不为人知的故事》中，芬恩·布伦顿追溯了比特币的起源，并将芬尼视为加密货币出现背后真正的主角。他写道：“哈尔·芬尼，他悄然成为了本书的主角，于\
  \ 2014 年去世。他的遗体被灌注、冷却至冰点以下，并长期存放在阿尔科生命延续基金（Alcor）的低温设施中”（第 205 页）。恰如其分地，这部分的费用是由他的比特币储备资助的。芬尼因此以身心俱在的方式体现了加密货币的诞生。\n\
  \n## 千禧年统治的到来\n\n因此，我们可以看出千禧年主义思想对比特币和加密货币的发展产生的强大影响。人类始终相信世界即将发生根本性的变革，尽管不同文化中变革的模式和结果各不相同。这种信念带来了非凡的动力和改变的力量。\n\
  \n比特币从来不仅仅是像它同时代的其他许多虚拟货币那样，只是一种便捷的新支付方式。相反，它是由对世界即将发生根本性、甚至是激进性变革的信念所驱动的。这是推动这种新型虚拟货币被创造和采用的关键驱动力。比特币不一定被视为能带来这个新世界的神奇技术，而是被视为实现它的一个关键组成部分。\n\
  \n或许正是比特币支持者这些深层的千禧年主义信念，使其与 e-gold 等其他虚拟货币区别开来。与当时其他虚拟货币不同，对比特币的支持者来说，它不仅仅是一种实用工具；它是一种必需品，对于改变世界至关重要。\n\
  \n## 比特币与宗教\n\n对于比特币社区的许多人来说，比特币不仅仅是一项技术创新。它显然引发的反响和热情，甚至超过了苹果发布会上最狂热的苹果粉丝。这些人深切地认为这是通往未来的解决方案，并将为他们和其他信徒带来巨大财富。其发明者受到了堪比先知的尊崇，他的文本至今仍被阅读并持续启发着人们。\n\
  \n虽然没有明确提到神、灵魂或超自然生物，但这种外在表现与其它众所周知的宗教现象在结构上相似。这或许是一个重要的线索，解释了为什么比特币直到今天仍然吸引如此多的关注，并且有如此多的资源被投入其中。无论过去还是现在，其他任何虚拟货币都没有表现出类似的特征。第二大加密货币以太坊也拥有专注且充满活力的追随者，但它没有一个类似先知的单一人物或核心文本。当受到批评时，它当然也不会引发同样情绪化的回应。\n\
  \n比特币的成功部分可能源于它在比特币社区中激发的宗教动机。正如历史所表明的那样，这种动机可能是变革的重要驱动力。\n\n"
- '# 11. 未来


  比特币诞生于对未来的愿景，而今天，它主要由对其未来可能成为什么的预期所驱动：


  *   比特币将达到 1,000,000 美元。

  *   比特币将取代黄金成为投资的避风港。

  *   我们将看到一种新的比特币标准出现，取代法定货币。


  这些是比特币社区中常见的信念。另一方面，也有怀疑论者同样确信比特币只不过是一个庞氏骗局，并且像所有其他庞氏骗局一样，最终会崩盘。问题在于，这些观点很少得到任何超出“如果……会怎样”的思想实验和主观意见之外的分析支持。以上任何一种情景，或者一些完全不同的情景，都有可能成为现实，但我们应该能够做得更好。


  在本章中，我们将利用本书对比特币的洞察来理解其未来的可能面貌。像任何关于未来的陈述一样，它基于假设。我们将审视几种可能的情景，这些情景对这些假设进行了不同的调整，并确定它们可能如何发展以及比特币将如何融入其中。这些情景并非详尽无遗，而是意在基于当前趋势提出可能的未来发展轨迹。它们在不同的时间尺度上运作，并基于对技术和历史发展的不同假设。


  前两种情景，“常态化”和“边缘巩固”，基于一个假设，即我们将继续在已知当代世界的限制内发展。政府持续存在，人们继续生活在拥有银行和我们今天所熟知的机构的国家中。接下来的两种情景涉及重大的社会变革，时间跨度更长。“民族国家消失”的情景假设民族国家当前的统治地位终结。“奇点”则进一步假设了技术的根本性变革。我们遵循雷·库兹韦尔预测的轨迹。最后两种情景涉及我们社会的根本性变革。“后末日”情景假设了一场灾难性事件的发生，而最后一种情景“星际殖民”则考虑人类殖民太阳系时会发生什么。




  ## 规范化


  在这一情景下，比特币将适应周边的主流文化，成为大众化的事物而非小众追求。要实现这一点，需要满足若干条件。


  监管范式需要完善。如果比特币要成为一种主流货币，若干法律问题有待解决。这更多关乎监管的明确性，而非宽松或严苛。我们看到多个司法管辖区正朝这个方向努力，但尚未完全实现。最大的问题之一在于，比特币在法律上究竟如何定性需要明确，而不同国家甚至同一国家内部对此的定义都各不相同。例如，欧盟尚未通过专门针对比特币的法规。因此，成员国地方上往往沿用旧有法律（常常已逾百年历史）来管理比特币的交易和税收。在美国，比特币被归类为货币、商品还是资产，取决于你询问的是哪个政府机构。


  如果美国和欧盟决定像接受其他货币一样接受比特币，并将其纳入现有的反洗钱法规，那将是迈向规范化的一大步。这意味着银行可以开始代表客户接受和管理比特币账户。这能扩大比特币作为交易媒介的用途。银行现有的资金转账和清算流程也将适用于比特币。这将让目前对比特币交易持怀疑态度或感到疏离的人群也能使用它。实际上，银行可能会像当代加密货币交易所一样运作，仅在彼此之间转移汇总金额，并在内部账户中管理内部转账。这将最大程度减少区块链上的交易总量。


  在这一情景下，每个人都会将数字钱包作为经济交易的主要工具。它可以成为新超级应用的一部分，基于数字支付提供商现有解决方案构建，或由专业公司提供。在这款应用中，你可以无缝使用加密货币、法定货币或任何其他类型的货币进行支付。没有理由不让积分奖励也成为其中一部分。客户将能够无缝兑换比特币和加密货币。


  通过这款应用，比特币提供全球汇款服务的承诺将成为现实。身处高通胀、政治和银行体系不稳定国家的人们，可以将资金存储在其他货币中。至于这会选择比特币还是与法定货币挂钩的稳定币，则取决于它能否抑制自身波动性。第三世界国家的人们通常不太参与关于法定货币通胀特性的意识形态争论，而更关心自己的储蓄在明年计划买房时是否还在，而非在比特币的下一个萧条周期中损失殆尽。


  这款钱包也可成为法律和经济活动的新平台，所有权可以通过销售进行记录和转让。随着在数字钱包中以智能合约确立所有权日益普遍，它开始吸收此前在线下记录的所有权类型，尤其是数字资产。例如，股票可能仍会留在银行体系内，但零星股可以在此交易。同样，房屋等其他资产的所有权将保留在国家认可的所有权记录方法中，除非是最为进步的州（很可能是一些较小的州），它们可能允许使用区块链来登记合法所有权。


  由于结算速度提高且费用可能降低，这一发展将提升比特币对线上和线下商户的支付吸引力。此外，与当前状况不同，交易很可能可以提出争议，因为交易主要发生在银行体系的链下环节——大多数比特币支付由银行体系处理而非直接进行。


  我们在第 8 章中看到，比特币缺乏基本效用（尤其是作为交易媒介和记账单位）是其波动性的主要原因之一。在这一情景下，由于基本效用得以提升，波动性将降低，比特币价格将稳步上涨，但不会像头十五年那样剧烈。


  这将导致许多最初的比特币信仰者退出，他们认为这种新发展是一种可憎之物。可能会形成另一个分叉，或者他们会团结在比特币现金周围，将其作为比特币的主要变体，以保留创始人的原始理念。他们可能会试图规避许多新出台的法规，而交易所将迁往其他监管更宽松的地区。




  ## 边缘巩固


  在这种情景下，普通大众对比特币失去了耐心。繁荣与萧条的动态变化导致普通比特币投资者经历了太多次市场崩盘。这时候他们对比特币的主要记忆可能只剩下赔钱，因为与更老练的比特币交易者不同，他们缺乏识别下一个下行周期并及时退出投资的工具。


  这种发展趋势可能会因政治压力而加剧——各国对加密货币实施更严格的监管，甚至在某些情况下彻底禁止它。一些国家将效仿中国在 2021 年全面禁止加密货币交易的做法。此举是出于对金融不稳定的担忧。与此同时，中国正在开发符合国家需求的法定数字货币。其他一些国家也同样在着手开发自己法定货币的虚拟版本。推出虚拟法币可能会成为对更难监管的去中心化加密货币实施更严厉打击的推动力。


  加密货币的交易将几乎完全通过西方和亚洲民族国家监管之外的离岸目的地进行。一些领土和较小的主权国家将看到为加密货币行业提供法律和金融框架的机会。这种发展趋势已经在进行中，许多加密货币交易所和公司已在加勒比地区以及美国、中国和欧洲监管范围之外的其他司法管辖区成立。


  如果政府法定货币能借鉴加密货币的许多特性并进行本地化调整，那么对于那些并非必然反对政府的普通民众来说，接受比特币的推动力将大大减弱。另一方面，如果政府从目前容忍加密货币的态度转变为采取更积极的敌对立场，并像中国那样通过法律诉讼威胁来向公民施压，那么活跃用户的数量将大幅减少。这可能导致比特币需求下降，价格呈下跌趋势。这将引发抛售，但不会完全被抛弃，因为比特币的真正信徒、比特币极端主义者以及那些认为比特币的全球性和匿名性特征仍然有用的人会继续使用它。


  这种情景给矿工带来了不同的经济模式，因为他们的盈利能力基础是比特币的价值。之前我们了解到，比特币很难被彻底消灭，因为它能轻易适应挖矿能力的大幅下降。这种情景下同样会发生这种情况。如同比特币的任何下跌趋势一样，挖矿成本最高的矿工会率先看到利润缩水并最终消失。这会开启一个矿工退出网络的过程。虽然总算力会下降，但挖矿难度会随之调整，从而降低比特币的挖矿成本，使其对剩余矿工仍然有利可图。


  因此，在这种情景下，比特币和加密货币的用户群体会比目前更小，由坚定的信仰者和出于实际原因需要比特币的人组成。这些人可能包括网络罪犯和其他犯罪分子、恐怖分子或自由战士（取决于你如何看待他们的事业），以及专制政权下的异见人士。尽管如此，比特币仍将是需要绝对隐私的黑市的首选货币。因此，它可以继续作为一种边缘虚拟货币存在，但规模依然可观。


  ## 民族国家的消失


  过去两个世纪，现代民族国家崛起，成为地球上人类的主要组织形式。如今，除了南极洲等极少数例外，所有土地都以某种方式与某个民族国家相关联。最高级别的全球治理机构是联合国。这一点已经变得如此不言而喻，以至于我们很少停下来思考，这其实是人类文明史上的一个近期异常现象。因此，让我们回顾一下历史上更长时间内盛行过的其他组织形式。


  最基础、最普遍的是部落，它由一群通常有紧密血缘关系的人组成。事实上，当人类学作为一门研究人类文化的学科出现时，亲属关系就是其主要关注点。部落继续以正式或非正式的形式存在于民族国家内部和民族国家之间，但很少被赋予主权。


  历史上有另一种曾占主导地位的组织形式：城邦。很难想象，像意大利和德国这样的著名欧洲国家，在一百多年前还完全不是民族国家，而是在数千年的时间里由地方城邦主导。城邦类似于民族国家，但其范围由一座城市及其周边土地界定。它是主权独立、自给自足的，不依赖任何外部实体。我们知道一些著名的城邦，如威尼斯、雅典、罗马、巴比伦和曼谷。它们今天仍然存在，甚至作为主权实体存在，如摩纳哥、新加坡和梵蒂冈城。


  另一种在历史上长时间控制着大片土地的组织形式是帝国或王国。它们通常包含城邦和属于部落的领土。一些帝国持续了几个世纪，但往往更不稳定，其疆域范围不断变化，这与城邦不同。帝国通常依赖中央集权治理，并伴有不同程度的地区自治权。


  这种情景的前提是，发生了一些事情，触发我们所知的现代民族国家的衰落或崩溃。这可能是因为其失去相关性、新的政治发展，或是像第三次世界大战这样的暴力剧变。因此，很可能会回归到我们在历史上看到过的其他稳定的人类组织形式，即部落、城邦或帝国。


  第三次世界大战可能爆发，届时最强大的民族国家会决定整合它们认为可以主张的领土，或许是基于历史论点或纯粹的机会主义——这正是我们今天在俄罗斯和中国的行动和言论中所看到的。这将导致出现几个大型的区域性帝国。然而，也有可能发生另一种情况：较小的民族国家自愿放弃主权，寻求某个竞争性帝国的保护。


  在这种局面下，大部分国际银行系统将受损。帝国会试图建立自己的贸易体系，以便对贸易行使权力。这将使全球贸易领域出现竞争真空，因为将不再存在像 Swift 这样被全球接受的支付系统。在这种情况下，比特币因其中立性，对于国际支付和汇兑将非常便利。它是一种真正无法被管辖、不受任何单一实体（如美元受制于美国利益）意志左右的货币，这一特性使其能够成为一种支撑跨境支付、被广泛接受的共识支付系统。




  ## 文章排版


  ## 民族国家的式微


  一种变体是，民族国家开始和平地失去其重要性，并将城市国家作为社会组织的基本单元。这一过程如何展开的迹象已可在美国看到，其中特许城市提供了一个例子。地方治理日益增强的趋势将促进城市承担其人民的大部分（如果不是全部）需求的发展。民族国家可能仍然提供最低限度的服务，如国防和司法系统。在这种模式下，城市可以自由发展自己的替代货币和支付解决方案。在这些城市之间转移资金并支持贸易将需要一种独立货币。


  城市可以拥有本地虚拟货币和区块链来记录官方登记册（如契约）。本地货币用于奖励，也可用于支付城市税收。由于在这种模式下货币会分裂成多种本地货币，`bitcoin`将充当一种参考货币。这将导致`bitcoin`标准的兴起，所有货币都与之挂钩。大部分贸易将以本地货币进行，但本地货币之间的兑换将通过`bitcoin`完成。


  最后一种可能性是部落作为主要组织形式兴起，这可能发生在现有的民族国家内部，并且在某种程度上已经在线发生。在中国，淘宝村提供了这种在线部落的蓝图。我们还看到，人们越来越多地在线上寻找社会群体，而不考虑物理上的邻近性。在这种模式下，物理位置——也许仍由国家主导——已经失去了意义。这种情况类似于几千年来生活在帝国或王国边缘的部落所处的状态。


  正如我们之前所见，民族国家是法定货币和银行体系占据主导地位的主要原因。关于民族国家可能如何消失或失去其重要性，有几种不同的变体，这对交换具有巨大影响。在当今社会，我们看到了所有这些变体的迹象，但我们仍在确定这些趋势是会持续还是会逆转。导致这些情况的历史发展各不相同，但有趣的是，`bitcoin`在这种情景的所有变体中都扮演着重要角色。由于`Bitcoin`天生适合碎片化的交易主义，它也非常适合民族国家的碎片化。它的实用性将得到提升，与其说是作为一种交换媒介，不如说是一种主要用作货币兑换的价值储存手段。


  ## 奇点


  奇点是人类与技术互动发生根本性变化的简称。这个术语最初由未来学家和发明家雷·库兹韦尔提出，在数学中，它表示一个函数未定义的点。关键概念是指数级发展，摩尔定律就是例证。假设是，最终技术发展将使人类能够将自己的思维上传到一个运行在数字计算机硬件上的软件虚拟世界。我们的意识将被一对一地复制到我们意识的软件表示中。


  这是哲学家大卫·查尔默斯、马克斯·泰格马克和尼克·博斯特罗姆所探讨的一种可能性。实现这一目标的技术尚未到来，但基于对技术指数级进步的押注，他们假设这将在不远的将来发生。在这种情景下，人类最终能够部分或完全生活在虚拟现实中，物理身体不再作为体验和互动的主要场所存在。


  然而，到目前为止，奇点的经济学尚未得到广泛分析。认为计算机会仅仅因为能够运行虚拟世界就去运行这些上传的超人类体验的虚拟世界，似乎有些牵强。即使技术持续指数级发展，它也不会是免费的。没有任何理论论证表明奇点会生产出无需能源或维护的技术。仍然会有一个物理世界，在那里需要创造能源，并且需要制造和维护计算机的硬件和软件。


  可以合理地假设，上传的人类必须以某种方式为其上传的家园付费。没有物理存在，这必须通过虚拟货币进行。因此，我们可以想象，上传的人类将不得不向他们的虚拟世界的维护者支付租金。由于永生的虚拟世界生活无法用有限的资金支付，虚拟化身将需要工作来支付租金。因此，他们将工作并以虚拟货币获得报酬，这种虚拟货币很可能是`bitcoin`。或者，他们的储蓄可以是`bitcoin`，而虚拟世界将拥有自己的加密货币，可以与`bitcoin`进行兑换。在这样的虚拟世界中，人们可能还想购买或交易的其他功能，只受想象力的限制。这可能是在特别有趣的、逼真复刻了《指环王》或《银河护卫队》的世界里度假，在名人的陪伴下进入
  VIP 区域，或者有机会与历史人物进行一场由下一代`ChatGPT`驱动的对话。


  同样，虚拟化身可能从事的工作形式也值得思考。网络工作者和虚拟助理是明显的候选。渗透测试员、暗网私家侦探和研究员是其他令人兴奋的选择。奇点听起来很有希望，但仍然需要一种货币来运作。


  由于奇点在很大程度上是一种虚拟存在，似乎可以合理地假设虚拟货币将发挥重要作用。由于`bitcoin`已经是最大的虚拟货币，它很有可能成为虚拟世界的重要货币，甚至是储备货币。


  ## 后末日


  更悲观地看，我们所知的、拥有全球商业和通信的整个人类文明可能会崩溃。在这种情景下，世界经历一场具有全球影响的灾难。可能是小行星撞击、火山喷发、外星人攻击或热核战争。有大量末日预想可供选择，但在这种情景下，它将导致全球人口崩溃以及我们所知的全球经济崩溃。将不再有长途旅行和商业。高科技产业将消失。


  人类将像狩猎采集时代一样，以小群体或部落的形式生活，也许是在地下。人们通过耕种和狩猎生存，表面上类似于远古史前时期的狩猎采集时代，但技术不会消失。许多废旧技术仍可使用，专业知识在某种程度上仍将得到保留。灾前技术将成为稀缺资源，并且越来越难以修复。也许可以生产一些新技术，但技术水平会低得多，而且可能不是数字技术，因为半导体的生产需要一个相当复杂的生态系统。


  随着时间的推移，计算机硬件的拥有量会越来越少。由于虚拟货币依赖于在计算机芯片上运行的软件，它们不会普及，因为需要不常见的计算机作为交换媒介的实用性很低。没有互联网，全球货币将不可行。基于工作量证明的加密货币将不可行，因为能源生产将依赖技术且稀缺。


  因此，在这种情景下，`Bitcoin`消失了。如果灾难允许生产一些技术和能源，一些区块链可能会在本地存续。这些区块链可能支持本地网络，在其中可以使用虚拟货币进行交换，这些虚拟货币可能是区块链，但可能不是基于工作量证明的。一场灾难将意味着`Bitcoin`的终结。




  ## 星际航行


  在当代社会，我们看到了新一轮向太空进发的热潮。亿万富翁和主权国家重新点燃了人类对太空探索的兴趣。当前最直接的焦点是月球和火星，针对它们已有多个任务计划。此外，自
  20 世纪 60 年代太空竞赛以来，火箭技术首次得到根本性改进，新的思想层出不穷。这对人类的星际未来来说是个好兆头。


  在月球上，可以轻易地在月球的熔岩管内建造巨大的城市。由于月球没有大气层，它将成为一个便利的星际供应链运输枢纽。月球将成为太阳系的仓库和配送中心。


  建造灵活的太空电梯将确保地球和月球之间的货物轻松交换，这样所有与地球的进出口都不再依赖火箭。不幸的是，即使火箭发射成本在下降，对于大规模发展星际物流来说，它仍然会昂贵得令人望而却步。


  月球和火星未必是唯一的或最佳的殖民地点。例如，金星的高层大气提供了适合气球的空气密度和压力。事实上，它是整个太阳系中最像地球的地方。由于它含有大量惰性气体，这些气体可以被用来填充高空飞行的气体采矿城市。此外，极高浓度的`CO[2]`使得植物易于生长。例如，经过生物工程改造的空中藻类可以通过用`O2`替代`CO[2]`，逐步改变大气成分，扭转失控的温室效应。最终，空气甚至可能变得可供呼吸。


  大型行星（如木星和土星）的卫星目前是许多新探索太空任务的焦点。木星的卫星含有大量有机化合物、水、`CO[2]`和氨冰，这些都有利于支持生物生命。在这个系统中，可以收集到氦-3
  和氢气。同样，木星系统将成为殖民土星卫星系统的中转站。这样的卫星大约有 150 颗，大小和资源各不相同。


  因此，人类可以真正成为一个星际物种，永久定居在太阳系的几个行星和卫星上。像所有殖民活动一样，贸易是推动力，这一点在这里也不例外。然而，星际贸易需要一种不同的货币体系。光是距离本身就是一个挑战。光从地球到达土星需要
  1 小时 20 分钟。这意味着我们必须重新思考时间的概念，因为当前的模型基于`UTC`，即由伦敦附近格林威治天文台定义的地球时间。广义相对论也预言，由于不同重力的影响，时间在不同地点之间会“漂移”。在像木星这样的大型天体附近，时间将与在月球这样的小型天体上不同。由于`Bitcoin`严重依赖时间戳，这就产生了必须解决的挑战。


  因此，需要开发一个新的星际标准。它可以根据已知脉冲星的灯塔效应来定义时间。脉冲星是快速旋转的磁性中子星。其旋转频率非常稳定，从而提供了一种确定时间的方法，这种方法独立于地球，也不受受重力影响的原子钟物理特性的制约。这个新的时间戳可能成为星际贸易的新基础。


  通信将通过激光进行，以建立星际互联网。交易结算所需时间将变得更长。本地货币将在太阳系不同区域占主导地位，但`Bitcoin`或修改后的版本理论上可以成为用于星际贸易的星际储备货币。尽管如此，很难想象太空中相隔最远达一个半小时的各区域的矿工，如何能运行一个共享的、每十分钟就能找到下一个区块解决方案的比特币网络和区块链。如果土卫六上的一名矿工找到了一个解决方案，当它需要一个半小时才能到达每个矿工时，这个解决方案如何被整个网络接受？如何防止在如此大的时间差异下进行双重支付？同一余额的交易可能在几个不同的“时区”进行。`Bitcoin`被设想为一种基于地球的货币，因此无法原样作为星际货币使用。


  ## 未来还会有比特币吗？


  我们现设想了六种不同的情景，这些情景改变了关于社会、技术和政治的假设，以了解`Bitcoin`可能如何发展。第一个变量涉及人类社会的变化，从前两个情景中的无变化，到后两个情景中的根本性变化。与此同时，我们考虑了技术变化的参数，从无变化到衰退再到根本性变化。最后一个参数是政府控制。这个参数涉及中央政府及超国家机构能在多大程度上控制`Bitcoin`的发展和用途——这涵盖了从高度控制到完全无控制的范围。


  表 11-1


  不同未来情景下的比特币


  | 情景 | 社会变化 | 技术变化 | 政府控制 | 比特币 |

  | --- | --- | --- | --- | --- |

  | 正常化 | 无变化 | 无变化 | 积极增强 | 成为主流，使用增加 |

  | 边缘巩固 | 无变化 | 无变化 | 消极增强 | 集中于“黑暗”经济，使用减少 |

  | 民族国家消失 | 显著变化 | 无变化 | 减弱 | 比特币标准，使用增加 |

  | 奇点 | 显著变化 | 根本性变化 | 消失 | 成为储备货币，使用增加 |

  | 后末日 | 根本性变化 | 衰退 | 消失 | 消失 |

  | 星际航行 | 根本性变化 | 根本性变化 | 减弱 | 消失 |


  在所有不涉及根本性社会变化的情景下，`Bitcoin`都将存活下来，并且在大多数情景中，它可能会繁荣发展。要使比特币标准出现，民族国家必须作为政治控制的主要场所而消失。要成为主流，`Bitcoin`必须改变，或者至少其使用方式必须改变。那些更具推测性的情景对`Bitcoin`更具挑战性。奇点情景与`Bitcoin`作为首选储备货币是兼容的。然而，在后末日世界中，硬件和能源的可靠生产与维护的缺乏，削弱了`Bitcoin`的可行性。它看起来在结构上已经准备好成为未来的星际储备货币，但不幸的是，物理定律阻碍了星际比特币挖矿网络的建立。


  我们可以得出结论：如果社会不发生根本性变化，`Bitcoin`似乎很可能在未来繁荣发展，但如果社会发生了根本性变化，它也可能过时。这些只是可能的情景，人们可以从中推断出自己的主观概率。因此，如果最可能发生的是不利情景，那么大多数情景有利于`Bitcoin`这一点就没那么重要了。我将把这个判断留给读者自己去做。




