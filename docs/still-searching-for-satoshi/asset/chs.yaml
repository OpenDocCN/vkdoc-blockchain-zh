- "# 公钥加密\n\n二战期间，密码学领域展开了一场军备竞赛。然而，即便这催生了日益复杂的加密技术，但它仍然是对称加密，正如我们刚才所见，这需要预先分发用于加密和解密的共享密钥。这就是所谓的密钥分发问题，几千年来一直被认为无法解决。\n\
  \n## 迪菲-赫尔曼-默克尔\n\n20 世纪 70 年代中期，密码学领域最富有成效的合作之一开始了。惠特菲尔德·迪菲思考密钥分发问题已有一段时间。1974\
  \ 年，他受邀前往 IBM 的托马斯·J·沃森实验室，就解决密钥分发问题的各种策略发表演讲。演讲结束后，他得知斯坦福大学的马丁·赫尔曼教授最近也到访过，并且正在研究同一个问题。迪菲在加州加入了赫尔曼，他们立刻找到了共同点。他们正在寻找一种方法，能够达成一个共同的密钥，却无需交换它。他们与拉尔夫·默克尔一起研究这个问题。在两年毫无进展之后，赫尔曼想出了一个解决方案。其原理如下：爱丽丝和鲍勃约定一个数学上的单向函数。爱丽丝选择一个私钥（比如\
  \ 3），然后使用该函数生成一个公钥（4）。接着，爱丽丝将这个公钥发送给鲍勃。鲍勃生成他自己的私钥（5），并使用相同的函数生成一个公钥（6），然后将其发送给爱丽丝。\n\
  \n随后，爱丽丝使用鲍勃的公钥和她自己的私钥来生成加密密钥（9）。鲍勃同样使用爱丽丝的公钥和他自己的私钥来生成加密密钥（9）。赫尔曼发现的这个数学函数的美妙之处在于，它确保了爱丽丝和鲍勃能够生成相同的密钥（9），而无需公开共享这个密钥。此外，即使窃听者伊夫截获了全部通信内容，她也无法生成该密钥，因为生成密钥需要爱丽丝和鲍勃的私钥。由此产生的过程被称为迪菲-赫尔曼-默克尔密钥交换，这是首次公开发表的针对密钥分发问题的解决方案。\n\
  \n这极大地提升了安全加密的可能性，因为密钥的保密性一直是密码学的致命弱点。随着现代电信的出现，我们共享信息的方式开始发生改变。通信变得更加普及和便捷。然而，即使有了迪菲-赫尔曼-默克尔密钥交换，你仍然需要等待通信对象的回复，并且加密和解密使用同一个密钥。因此，它仍然是需要密钥分发的传统对称密钥加密。\n\
  \n因此，惠特菲尔德·迪菲继续思考密钥交换问题。如果他能够找到一种解决方案，使得加密密钥与解密密钥不同，那么密钥分发问题就可以完全避免了。迪菲最终找到了一种实现方法。该方法于\
  \ 1976 年在惠特菲尔德·迪菲和马丁·E·赫尔曼的开创性论文《密码学的新方向》中发表。他们指出，随着现代电信（或他们所称的远程处理）的发展，密钥分发渠道的负担日益加重。在通信开始之前，找到安全的渠道并建立共享密钥非常繁琐，尤其是对于事先互不相识的双方而言。电话、电传和互联网等技术与其他方式相比，速度快、带宽高，但容易被窃听。很难确保没有窃听者。\n\
  \n论文认为，需要解决两个问题：隐私和认证。隐私问题应通过公钥加密解决，认证问题则通过数字签名解决。\n\n迪菲和赫尔曼提出了一种方法，可以根据一个随机数构造出两个密钥：一个公钥和一个私钥。公钥可以通过非安全渠道共享，用于加密消息，而这些消息只能用私钥解密。请注意迪菲-赫尔曼-默克尔密钥交换与实际非对称加密之间的区别。在前者中，需要来回通信才能确保加密。在后者中，只要知道接收方的公钥，就不需要这样来回通信。这最终将成为使用比特币便捷转账的一个关键特性：只需要接收方的公钥，而不需要繁琐的来回交换以生成共享密钥。\n\
  \n## RSA 论文\n\n然而，迪菲和赫尔曼无法详细证明如何实现这一点。这要等到第二年，也就是 1977 年，由罗恩·里维斯特、阿迪·沙米尔和伦纳德·阿德曼发表他们开创性的论文《获取数字签名和公钥密码系统的方法》时才得以完成。计算机科学家罗恩·里维斯特在美国另一端的麻省理工学院工作，他阅读了迪菲-赫尔曼的论文。他对此非常着迷，并试图让他的同事——同为计算机科学家的阿迪·沙米尔和数学家伦纳德·阿德曼——也产生兴趣。起初，他们并不太热情。他们尝试了各种可能性，几乎对能否找到迪菲和赫尔曼所寻找的函数失去了信心。但在\
  \ 1977 年春天，里维斯特想出了一个可行的方案。\n\n该算法根据作者姓氏命名为 RSA 算法。他们建议基于质因数分解来实现这一目标。其原理是找到两个非常大的质数。这些就是私钥。将它们合在一起进行因式分解会生成一个公钥。任何人都可以用这个公钥来加密消息。用于加密的函数是一个单向函数，这意味着无法使用同一个密钥进行解密。唯一能用的密钥是私钥。\n\
  \n公钥加密的工作原理通常是创建两个数学上相关的密钥：一个公钥和一个私钥。你现在可以公开你的公钥，让任何人都能用它来为你加密消息。由此产生的密文现在只能用与生成该密钥对时所用的公钥相对应的私钥来解密。由此可见，任何人都可以公开自己的公钥，供他人用于加密通信，而无需任何事先的接触。这种模式非常适合全新且无处不在、易于访问的电信世界。\n\
  \n\n\n### 英国人的巧思\n\n大约 20 年后，人们发现，早在 20 世纪 70 年代初，为英国政府通信总部（GCHQ）工作的英国密码学家就已经发明了这样的系统。到\
  \ 20 世纪 60 年代末，英国情报部门开始研究密钥分发问题，因为密钥分发被视为未来战场通信的关键部分。他们设想了一个未来，每个士兵都能使用加密通信。这将使密钥分发变得困难重重。\n\
  \n詹姆斯·H·埃利斯受命研究密钥分发问题。他最终构思出了与迪菲和赫尔曼相似的想法，并证明了其可行性，但他未能找到实现这一想法的数学函数。多年来，GCHQ 一直致力于寻找这个函数。1973\
  \ 年，一位名叫克利福德·科克斯的年轻数学家受命尝试寻找能使非对称密码学成为可能的函数。他几乎立刻就找到了利用质数的函数，并实际上比罗恩·里维斯特早数年发现了\
  \ RSA 算法。\n\n由于为军方工作，他们并未意识到这会有任何普遍适用性，这也是该成果直到 1997 年才被英国政府解密的原因。当时这一系统更多地被视为一种新奇事物，而非重要创新，因为它依赖于当时看来极其庞大的计算能力。随后几十年的计算机技术发展使其变得可行。因此，计算能力的提升与数学上的突破相互融合，使得非对称加密在\
  \ 20 世纪 70 年代末成为可能。\n\n## 将公钥密码学带给大众\n\n军事背景及其应用后来一直困扰着公钥密码学的发展。尽管通用方法在 RSA 论文中得以发表，但具体细节却无法获取——在英国情报部门那里属于绝密，在\
  \ RSA 算法方面则受专利保护。当时并没有公开可用的版本。\n\n随着互联网向更多人开放，且个人电脑的计算能力在整个 20 世纪 80 年代稳步增长，公钥加密在原则上得以面向更广泛的受众。政府历来将密码学用于军事和外交目的。但随着互联网和电子邮件的出现，一个新的问题产生了。在实体信件时代，政府或其他行为者可以通过打开和封好信件来监听对话。由于存在物理限制，无法大规模拆阅信件。但对于电子邮件而言，情况则不同。政府可以轻松读取以明文发送的每一封电子邮件，甚至可以搜索关键词。这一事实困扰着某些不信任政府意图的人。\n\
  \n这促使美国计算机科学家菲尔·齐默尔曼基于迪菲-赫尔曼文章中的原理，开发了一个能以便捷方式使用公私钥加密的程序。他认为普通人有权享有隐私，并将这个程序命名为“Pretty\
  \ Good Privacy”（PGP 加密）。\n\n齐默尔曼将 PGP 发布到互联网上，它很快获得了关注。这看似成功，直到两年后，美国海关总署对齐默尔曼展开了刑事调查。当时，加密仍被视为军事事务，因此受到武器出口管制。由于\
  \ PGP 是通过互联网分发的，它可能被视为“无证出口军火”。这本来可能成为公钥加密方案公开化的终结，但齐默尔曼找到了一个巧妙的方法来规避这一点：他将 PGP\
  \ 程序的完整源代码出版成了一本书。这样一来，他就可以援引第一修正案赋予他的言论自由权利。\n\n虽然比特币并未使用 PGP，但它受到密码朋克的青睐，密码学邮件列表的成员通常会在邮件中公布自己的\
  \ PGP 公钥，用于加密通信。这也展示了一份蓝图，说明了公钥加密乃至整个密码系统如何可以被应用于互联网。\n\n公钥加密是一种确保机密性的方式，即保护消息明文的隐私。因此，它对于比特币的传输或生成而言并非核心关键，因为所有交易都是公开的。但它被用作其他关键功能（如数字签名）的基础。在深入探讨细节之前，我们必须考虑另一个至关重要的密码学函数。\n\
  \n\n\n### 哈希\n\n比特币运作的核心功能之一是所谓的哈希函数。哈希函数是一种将任意大小的数据作为输入，并生成一个固定、通常更短的输出长度的函数。这个较短的输出被称为哈希值。\n\
  \n让我们看一个例子：使用哈希算法`MD5`（消息摘要），这段文本\n\n> *寂静古池塘…*\n> \n> *青蛙跳入水中央，*\n> \n> *扑通一声响，重归寂静。*\n\
  > \n> *秋月明—*\n> \n> *一只虫儿静悄悄，*\n> \n> *钻入栗子中。*\n> \n> *电光一闪—*\n> \n> *我以为是脸庞，*\n\
  > \n> *却是芒草穗。*\n> \n> ——松尾芭蕉\n\n生成的哈希值为：`5e477f116910df7e60d4ca527335a6e2`。\n\n\
  > *这是个人的一小步，却是人类的一大步。*\n> \n> ——尼尔·阿姆斯特朗\n\n生成的哈希值为：`ee77e1ab9d67a32bcc00cf42d71b7ae7`。\n\
  \n可以看出，生成的哈希字符串长度完全相同。如果我们输入托尔斯泰的《战争与和平》，哈希运算仍只会产生相同大小的哈希值。\n\n哈希函数还有一个额外特性：每次应用于相同输入时，都会生成相同的输出。无论何地何时有人计算上述输入，都会得到相同的哈希值。此外，这种计算对算力要求并不高。\n\
  \n而且，对哈希函数的输入进行最微小的改动，都将导致输出发生天翻地覆的变化，如下例所示：\n\n- “Where is my mind” 生成的哈希值：`a05f82ba995f3cb65d0947373387925b`。\n\
  - “Where is my mint” 生成的哈希值：`d9f4f0831e1045363f14699ca8a9d4e6`。\n\n输出哈希值的任何位置都没有一个字符相同，而输入中仅有一个字符（最后一个）不同。此外，几乎不可能有其他输入会产生相同的输出，这种现象被称为哈希碰撞。\n\
  \n最后要观察的重要特性是，哈希函数是一种单向函数，密码学家称之为单向陷门。你只能从输入到输出，而不能反向操作。从输出中反向推导出输入是不可能的。\n\n像`MD5`、`SHA-1`和`SHA-2`这些流行哈希算法中使用的数学函数被称为\
  \ Merkle-Damgård 结构。它由拉尔夫·梅克尔在 1979 年发现，这位梅克尔正是与迪菲和赫尔曼共事的那位，十年后由伊万·比耶·达姆加德独立证明。这种结构保证了任何输入都能被压缩成固定长度。\n\
  \n罗纳德·李维斯特（RSA 论文的作者之一）在 1989 年开发了`MD2`（消息摘要）哈希函数，并逐步改进，直到 1992 年推出基于 128 位结果的`MD5`。这些算法在当时相当成功，但随着计算能力日益强大和廉价，被视为安全的门槛也在不断提高。\n\
  \n请记住，哈希碰撞意味着两个不同的输入产生了相同的结果。这种情况非常罕见，但并非不可能。一种暴力攻击尝试大量可能的组合，可能需要尝试极高的次数。如果攻击成功，就会破坏哈希函数的核心前提——即哈希值是由特定输入产生的证明。\n\
  \n对于一个生成 128 位哈希值（如`MD5`）的哈希函数，暴力攻击只需要尝试几个随机输入来产生 128 个相同的比特位。这在当时是困难的，但大约在 1993\
  \ 年，美国国家标准与技术研究院（NIST）对其安全性信心不足，便开发了输出 160 位结果的`SHA`（安全哈希算法）。随后又推出了`SHA-1`和`SHA-2`，它们是当今最常见且最广为人知的算法，因为它们构成了互联网加密的基石，并用于安全通信技术，如网络证书、`SSL`、`TLS`等。\n\
  \n目前，`MD5`和`SHA-1`已被证明容易受到碰撞攻击，不再被认为是足够安全的。NIST 正在研究一种结构不同的`SHA-3`。随着计算能力的不断提高，这种开发预计将持续进行。\n\
  \n总而言之，哈希是一种为数据输入创建摘要或“指纹”的函数。这个“指纹”犹如人类的指纹，并非绝对唯一，也可能由另一个输入产生。这被称为碰撞。碰撞只能通过暴力破解实现，即尝试大量不同的随机输入，而不是通过逐渐接近哈希值的增量式改变。这是哈希的一个关键特性，在\
  \ Hashcash 中得到了创新性的应用，我们将在后面的“工作量证明”部分看到这一点，但首先我们必须回到数字签名。\n\n### 数字签名\n\n在迪菲和赫尔曼工作的基础上，李维斯特、沙米尔和阿德曼还展示了他们的方法如何用于签署消息。如果鲍勃用爱丽丝的公钥加密了一条消息给爱丽丝，他就可以使用自己的私钥生成该文本的签名。爱丽丝随后可以解密消息，并使用鲍勃的公钥验证这确实是鲍勃签署的。这个过程被称为不可否认性，即证明某人必须签署了此文件。在合同和资金转账的情况下，不可否认性尤其重要。数字签名证明了特定文本是由属于已知所有者公钥的特定私钥签署的。\n\
  \n要实现数字签名方案，其中一个缺失的拼图块是如何便捷地签署消息。对整个消息进行签名计算量很大，因此需要另一种方法。消息可以在签署前进行缩减。无需签署整个消息，可以创建消息的哈希值。正如我们之前所见，这是一个指纹，极不可能由其他输入产生。因此，该指纹代表了这条消息。然后，这个哈希值可以用作者的私钥进行加密。\n\
  \n使用作者的公钥解密签名，即可得到哈希值。接着对原始明文消息进行哈希运算，并将得到的哈希值与从签名中推导出的哈希值进行比较。如果两者相同，则证明了持有与作者公钥对应的私钥的人加密了该消息，或者说，作者确实撰写了这条消息。\n\
  \n这种效应可以用于不同场景。首先，它可以用来记录合同文本。例如，如果合同双方持有不同版本，就能以数学确定性证明哪个版本是正确的：即产生已签署哈希值的那个版本。其次，它可以用来证明消息的完整性，即没有人在这条消息传输期间或之后在其中插入了任何内容。\n\
  \n因此，数字签名比传统签名更高效，因为它能证明签署人签署了文档以及该文档的特定形态。这是我们在区块链的许多应用中将会看到的一个特性。\n\n\n\n"
- '# 工作量证明


  不幸的是，隐私并非电子邮件引入数字通信的唯一新问题。网络世界的另一个问题恰恰源于其初衷：让交流变得即时、便捷，并且可以免费地触达任何距离、任何数量的人。绕过传统的沟通壁垒——例如印刷和分发书籍报纸，以及写信和寄信——对大多数人来说是一种解放，但其负面影响是，它催生了这些壁垒原本能遏制的新现象：诈骗。


  我小时候记得，有时你会收到一张通知，说你中了某个德国彩票，只需支付彩票费或类似费用即可。当然，这并非真实，而是一种骗取人们钱财的诈骗。不过，这类事相对少见，因为邮寄信件并非免费。诈骗的经济账必须确保有足够比例的人会上当。如果一封信的邮费是`$0.50`，而诈骗能获利`$100`，那么只能寄出`200`封信。这意味着转化率必须达到`1/200`。


  随着电子邮件的出现，这种经济账发生了变化。如果一封信的成本是`$0.0001`（预留一些资金用于支付网络连接和域名注册），那么转化率现在只需达到`1/1,000,000`。不仅诈骗可以经济地传播；任何形式的广告或政治宣传都能以这个价格点进行传播，相比报纸或电视广告的费率，这极具竞争力。这催生了垃圾邮件现象，至今仍在困扰着我们。


  这其中的根本原因并非人们突然变得更容易受广告和欺诈的影响。而是简单的事实：通信成本被降低得如此之多，以至于即使极低的成功率也能盈利。由于对通信征税有悖于互联网的基本理念，因此必须开始以不同的方式思考这个问题。如果能在发送方身上施加成本，而接收方不用——就像旧的通信模式那样——那么就有可能改变这种动态，通过提高成本来限制垃圾邮件。


  ## 打击垃圾邮件


  加密领域再次出手相助。1993 年，辛西娅·德沃克和莫尼·纳奥尔提出了一种想法：施加他们所谓的“定价函数”来打击垃圾邮件。他们认识到，电子通信的成本不会构成威慑，而实施任何法律限制也不可行。相反，他们寻找了另一种传输成本：“主要思路是让邮件系统要求发送方计算消息及一些附加信息的某种适度昂贵、但并非棘手的函数。”这里的成本将由计算的价格（即硬件和电力成本）施加。这一想法后来被称为工作量证明。


  这个问题看起来与加密中的单向函数类似。我们看到，有了密钥，解密很容易，但没有密钥则几乎不可能。我们仍然希望存在这种不对称性：一方（接收方）容易，另一方（发送方）困难，但我们不希望让它变得过于困难。因此，目标就是找到一种通过参数来调节问题难度的方法。


  为了使函数可预测且不依赖于电子邮件的长度，他们建议该函数应基于哈希函数——正如我们所知，它总是输出相同大小的字符串。基于此输入，定价函数应该能够通过某个参数来调节计算结果所需的难度。结果应该易于验证。他们提出了三族函数，但指出需要进一步研究，因为直到那时，密码学对“适度困难”的函数关注甚少。所有的注意力都集中在开发几乎牢不可破的函数上。


  ## 应用工作量证明


  直到 1999 年，这一想法才由马库斯·雅各布森和阿里·朱尔斯在一篇文章中正式提出，并命名为“工作量证明”。他们指出了工作量证明可以使用的几种不同方式。其中之一是作为控制延迟的方法。这种用法旨在控制解决密码学问题所需的时间。这种用途早在
  1996 年就由里维斯特、沙米尔（RSA 论文的作者）和瓦格纳开发出来，他们称之为“时间锁谜题”。


  里维斯特和沙米尔还开发了一种工作量证明的应用，他们称之为`MicroMint`。实际上，这是一个为互联网小额支付设计的密码系统。他们这样描述该方案：“`MicroMint`‘硬币’由经纪人生产，经纪人将其出售给用户。用户将这些硬币作为支付手段交给供应商。供应商再将硬币返还给经纪人，以换取其他方式的付款。一枚硬币是一个比特串，任何人都可以轻松验证其有效性，但生产起来却很困难。”


  作为实现此目的的一种方法，他们建议使用哈希碰撞。回忆一下，哈希碰撞是指哈希函数的两个不同输入产生相同输出（即相同哈希值）的情况。在这篇文章中，他们展示了可以控制这种碰撞的难度。


  在这个方案中，经纪人生产`MicroMint`“硬币”，客户购买这些硬币，然后从供应商那里购买物品，供应商再向经纪人兑现价值。这个方案中的问题正是密码学界在讨论数字货币时经常提到的一个问题，即双重支付问题，因为供应商如何知道这枚“硬币”没有被其他供应商使用并兑现过呢？


  ## 数字邮资


  亚当·巴克接过了这个挑战。他早在 1997 年就开始研究`Hashcash`系统。`Hashcash`解决方案有一个计算令牌的函数。他的方案允许我们动态调整生产`Hashcash`令牌的难度。这些令牌类似于里维斯特和沙米尔提出的`MicroMint`硬币。不幸的是，与他们一样，除了在一个中心化数据库中记录之外，他也没有解决双重支付问题。通过`Hashcash`，巴克试图提供一种机制，使得能够对电子邮件等未计量互联网资源进行节流。尽管他暗示这可以用于数字货币，但并未明确地朝那个方向推广。双重支付问题的解决方案以及这一应用，要等到十年后比特币的提出才得以实现。


  ## 为免费信息增加成本


  工作量证明是大规模通信成本下降的产物。它引入了一种使用密码学函数来提供谜题的方法，这些谜题需要可预测的 CPU 开销。这进而转化为了成本。现在可以为之前免费的功能附加一个可变成本。在电子邮件中应用此方法的问题在于，没有任何系统得到广泛采用。相反，业界专注于垃圾邮件检测和黑名单机制来消除垃圾邮件。如果不是后来在比特币及随后的区块链中应用了工作量证明，它可能早已被限制在密码学已经十分广泛的“稀有品”之列了。




  '
- '# 加密货币如何成为货币


  密码学曾是一个两千年来鲜有变化的边缘学科，主要局限于军事和政府外交领域。如果有人在 20 世纪 60 年代初提出，密码学将成为全球数字通信网络和一种新型货币的核心，得到的反应很可能是轻蔑一笑和翻个白眼。


  但这一切在 20 世纪 70 年代发生了改变。现代计算机的出现以及数学理论更聚焦的应用，引发了一场重大变革，彻底改变了密码学和数字通信。公钥密码学和哈希算法的发现，为如今支撑互联网信息基础设施的诸多创新铺平了道路。它也奠定了坚实基础，让数字货币的梦想成为现实——以至于这类货币后来被称为**加密货币**。


  然而，这还远远不够。正如我们所知，这类加密货币在世纪之交就已有人提出，但一些问题依然存在，最显著的是双重支付问题，即如何证明某个代币或币种尚未被花掉。另一个问题是中心化，因为所有提出的模型都或多或少依赖于一个需要信任的中心化第三方。这是一个重大缺陷，密码朋克们对此心知肚明，也不打算轻描淡写，因为这类似于令人畏惧的银行作为你资金中央看门人的角色。要兑现真正自由虚拟货币的全部承诺，还需要解决几个关键难题。我们现在就来关注这些难题。


  '
- '# 3. 公共记录


  数千年来，人类必须建立一种共享且无可争议的真相。在口语社会中，这通常通过死记硬背和口头表演来实现。古典时代是口语社会如何建立这种共享公共真相的典型例子。古希腊诗人，如赫西俄德和荷马，代表了丰富的口头传统。韵文并非创意创新的艺术出口，恰恰相反。古希腊崇尚的是过去，而非未来。韵文是建立关于过去的共享公共记录的主要技术。


  通过吟诵韵文，英雄事迹和古老神话在时空上建立了几乎相同的版本。韵文格律是一种助记技巧，吟游诗人无论走到哪里，都能以相同的方式背诵信息，并传授他人，使他们能够复刻相同的英雄事迹和神话记录。他们能记住并吟诵数万行诗句，但这仍不是建立共享公共记录的高效方式，希腊神话众多版本各异便是明证。只有使用文字，公共记录才能不受任何特定个人记忆的干预而流传后世。


  ## 最早的文字与单式簿记


  创建书面共享公共记录的过程，早在赫西俄德和荷马的作品被记录下来之前数千年就已开始。最早的文字实例来自公元前四千纪，以古代美索不达米亚（今伊拉克）的楔形文字泥板形式出现。这一地区被称为“新月沃地”，是已知最早人类文明的摇篮。


  楔形文字是象形文字，由不同形式的图画和符号组成。这些泥板记载的并非神话或英雄事迹，而是诸如牲畜、谷物和玉米等日常记录。这是一份关于所有权的公共记录，在古代中东地区以不同语言使用了三千年之久。后来逐渐加入了音节和其他符号，但其主要用途始终如一：在公共记录中记录所有权。因此，这一功能甚至比文字本身更为原始，比关于神话和法律的散文文本早出现数千年。因此，我们必须认识到，这是一项对人类文明至关重要且强大的技术。


  如果说密码学的目的是混淆和隐藏信息，那么公共记录的目的则恰恰相反：记录信息并将其提升到共享且无可争议的真理层面。将信息记录在粘土或其他石质媒介上，而非纸莎草、兽皮或蜡板等更柔软、更易变的介质，使信息变得不可篡改。这在面对相互矛盾的版本时确立真相特别有用，尤其是在涉及有价值物品所有权的问题上。一种让记录不可篡改的技术，是使其成为所有权记录基础的前提条件。


  如果记录可以随意更改，那么信息便不适合用来确立真相。因此，数千年来，石头一直是首选媒介，雕刻符号则是建立公共记录的技术。如今，我们在纪念碑、墓碑和宗教圣殿上仍能看到这种做法的遗迹。这些都是某人希望流传后世、使之无可争议的信息实例。然而，它已不再是记录经济交易的首选技术。


  随着城市人口的扩张以及随之而来的经济产出增长，交易量增加到不再适合用笨重厚重的泥板来记录所有信息的程度。每块石板能记录的信息与其体积和重量相比非常有限。纸莎草和兽皮等其他技术因其更轻便、占用空间更小而流行起来。信息内容与重量、物理体积的比率更高了。而对于大多数金融交易而言，通常并不需要像石质媒介那样将信息保存数百年或数千年。因此，这些更轻便的媒介逐渐成为记录金融信息的重要工具。从古代到中世纪，它们一直是创建财务记录的首选格式。这便是后来被称为会计学的学科所采用的技术。


  美索不达米亚体系被称为单式簿记系统或现金基础会计。它将交易作为列表上的条目进行记录。




  ## 会计革命与复式记账法


  单式记账法无疑比完全没有记录系统要好得多。然而，由于缺乏对系统内账目的核查手段，它仍然容易出现错误和欺诈。无法调查任何单笔账目是否正确，也无法查明是谁记录了该账目。因此，单式记账系统仅适用于像家庭这样存在完全信任关系的企业。当始终只有单笔交易记录时，企业必须相信这笔记录是正确的。在历史的大部分时间里，情况确实如此，但为了进一步促进经济发展，改进这种会计系统是必要的。


  罗马人发展了许多管理会计的重要技术，但中世纪时期复杂经济活动减少，这些技术似乎被遗忘了。直到文艺复兴时期的意大利，一场会计革命才逐渐成形。凭借其商业才能和全球雄心，佛罗伦萨、热那亚和威尼斯等城邦成为了财务活动记录方式发展的下一阶段中心。正是在这里，复式记账法得以发展。这些原则至今仍为现代企业所沿用。


  复式记账法最早的例子可以追溯到 13 世纪，尽管罗马人在某种程度上也实践过这种形式。罗马作家老普林尼在公元 70 年左右描述了这种做法。但直到 15 世纪末，卢卡·帕乔利在
  1494 年出版的著作《算术、几何、比与比例全书》中对其进行了描述，它才成为一种被详细描述的标准，为后世的会计师们所沿用。


  复式记账法的目的是核算所有资金交易，以发现错误和欺诈。在复式记账法中，一笔交易总是影响两个账户。这些账户有两方：借方和贷方。


  这笔交易将作为一个账户的借方和另一个账户的贷方出现。如果一位商人从供应商处购买产品，付款将显示为供应商账户的贷方和商人采购货物账户的借方。当货物售出时，则会借记到客户账户，并贷记到采购货物账户。


  另一方面，如果向采购货物账户进行了一笔记账，将其记为贷方，表示某些东西已被出售，但其他任何账户上都没有做借方记录，这可能意味着有人将钱揣进了自己的口袋。


  如果所有交易都被正确记录，借方和贷方账户应该是平衡的。如果没有，就表明存在错误。因此，复式记账系统提供了审计过往交易的可能性。


  大约在意大利城邦的商业帝国将欧洲从一个由当地竞争势力组成的僵化中世纪拼凑体转变为全球贸易网络中心之时，这套系统成为了当地商人中的标准。对企业财务交易的清晰洞见，帮助贸易从本地化事务提升为规模庞大的全球性事务。它不是唯一的因素，但对于通过诸如荷兰东印度公司等企业为现代世界奠定基础至关重要——这家公司建立了全球贸易网络，并成为了第一家股份制公司。透明的会计实践更容易让人理解为何投资者会投入如此之多。会计实践有助于澄清公司所进行的经济交易。借助复式记账法，审计账目、发现欺诈和错误成为可能，外部人员也可以对公司进行审计。


  ## 信息技术与三式记账法


  三式记账法的想法更像是一种扩展，而非像从单式记账法到复式记账法那样的全新革命。到 20 世纪末，人们开始感觉到复式记账系统中似乎缺失了某些东西。


  几十年来，卡内基梅隆大学教授井尻雄士一直在致力于将复式记账系统扩展到其他维度的不同想法。他创造了*三式记账法*这个术语来描述这一点。他的想法源于微积分，也被称为*动量会计*。它表明会计也应该追踪随时间变化的速率。他于
  1982 年在一篇文章中发表了这些想法。


  2005 年，伊恩·格里格在一篇题为“三式记账法”的论文中采用了这个术语，但没有采用其核心思想。该论文并未引用井尻，但同样是在寻找扩展而非替代复式记账系统的方法。受到英国计算机科学家埃德加·F·科德在
  20 世纪 70 年代提出的数据库设计理论的启发，他提出了另一种看待会计的方式。


  在关系型数据库设计中，可以对数据组织提出若干标准，它们被称为范式。随着每个更高的范式，对设计施加了越来越多的约束。第四范式规定必须满足前三个范式，并且数据不应包含多值依赖关系。这意味着所有附加信息都可以从这些数据中推导出来。用格里格的话来说：“关系型数据库的原理在此提供了指导。第四范式指导我们存储主要记录（在这种情况下是一组收据），然后动态地构建衍生记录，即账簿。”


  让我们尝试解读一下这个说法。格里格当时从事密码学领域的工作，特别是研究如何将密码学应用于会计。回顾上一章，公钥密码学可以实现数字数据的签名。我们看到了它如何用于认证合同或其他文本。然而，它也可以用于验证交易。这就是格里格所说的收据的含义：它就是交易本身。


  “为了计算一组相关收据的余额，或展示交易历史，可以动态地从这组收据中构建一本账簿。这相当于使用签名收据作为单式记账的基础。实际上，记账是从原始收据派生出来的，这就提出了一个问题：是否还需要保留固定的账簿。”


  在这种观点下，会计可以通过在需要时动态计算任何一组收据或交易来实现。该系统旨在通过一个中央发行机构运作，该机构在任何时间点，都能基于所有先前的收据，动态计算出其处理的每个客户的余额。例如，客户账户可以在任何时间点被动态计算出来，从而知晓其余额。


  当然，交易本身在传统的复式记账法中就已经存在，但那是作为过账输入的私人记录。这里的创新之处在于，所有先前交易的公共记录可以通过密码学方式维护，并由交易双方签署。一旦收据被双方签署确认，它就成为了由中央发行机构维护的公共交易记录的一部分，该发行机构始终能够动态计算任何账户。


  格里格引用了早期数字现金的尝试，如 DigiCash。然而，考虑到这篇论文写作于比特币白皮书发布两年前，看到公共交易账本的概念当时已被构想到，是很有趣的。只是格里格的提议仍然由一个中央实体（即发行机构）管理，而这容易受到失败和腐败的影响。因此，让我们转向通往比特币去中心化之路的下一步。




  ## 去中心化记录


  格里格设想的发行方记录和共享公共账目的方式是基于服务器。服务器是计算领域中客户端-服务器模式的核心元素。中央实例（即服务器）为客户端执行系统的计算和数据功能。所有客户端都可以访问服务器提供的同一中央资源。这是早期计算机的工作方式，在某种程度上，也是当今互联网的工作方式。


  网络浏览器是访问网络服务器所提供资源（即网站）的客户端。这是一种简单高效的模式，这解释了其普遍性。但它也容易发生中心故障。如果中央服务器宕机（例如遭遇分布式拒绝服务攻击），整个系统就会瘫痪。对于一个旨在成为经济交易公共记录来源的系统来说，这是一个关键性的弱点。


  然而，还有另一种模式。点对点（简称`P2P`）网络是一种节点（或称对等点）彼此直接连接，形成网状网络，而非客户端-服务器模式中的中心辐射型网络。系统不依赖于任何中央实例。点对点网络的概念可以追溯到互联网诞生之初，但如今的互联网并非这样的网络。万维网依赖于一个层级化的域名服务器系统，该系统将域名解析为特定的
  IP 地址。IP 地址是设备的标识符。在点对点网络中，计算机需要知道网络中其他节点的 IP 地址，因为它们不依赖中央实体来将域名解析为 IP 地址。


  由此产生的网络拓扑结构是网状网络。这是一种具有弹性的网络类型，因为它不依赖于任何单点故障。如果一个节点发生故障，其他节点会接管。如果平均连接数很高，网络就会稳定且能抵御故障。


  1999 年的 Napster 是第一个普及 P2P 计算的应用。在 20 世纪 90 年代，CD 仍主导着音乐发行，但当时已出现一种名为 MP3 的数字格式，使得数字方式分享歌曲成为可能。这类歌曲可以复制给朋友和家人，但要找到一个恰好拥有某首特定歌曲的朋友却很困难。Napster
  通过点对点连接，让陌生人之间分享 MP3 歌曲变得容易。他们创建了一个网站，你可以在上面发现哪些在线电脑拥有某首歌曲。用户随后连接到那台电脑并下载歌曲。这就是点对点网络的本质。它允许非法共享受版权保护的材料，这也是
  Napster 在 2001 年因法律问题被关闭的原因。然而，通过去中心化网络直接与他人共享的这一原则得到了验证，并至今仍在 BitTorrent 等服务中使用。


  P2P 网络在文件共享方面的优势在于，只要网络上有某人拥有某个文件的副本，整个网络都能访问它。它不依赖任何中央保管者或把关者。


  将 P2P 技术用于记账会带来一些额外的困难。将交易记录为公共账目的想法，本身就要求确定这些交易的时间。与数字歌曲不同，记录每笔交易发生的时间变得至关重要。由于每笔交易的时间戳可以被更改，这就需要一种解决方案。


  斯图尔特·哈伯和韦克菲尔德·斯托内塔在 1990 年发表于《密码学杂志》的论文《如何为数字文档添加时间戳》中，首次用密码学方法解决了这个问题。在这篇论文中，他们认为可以通过建立一个时间戳服务来解决该问题。为了保护隐私，用户不方便发送整个文档或其他数字制品。取而代之的是，用户使用哈希函数创建文档的短指纹，然后时间戳服务通过将时间戳附加到收到的哈希值上来对其进行签名。然后将证书返回给用户。任何人现在都可以在不知晓文档内容的情况下，基于此证书验证时间戳。因为文档是与附加的日期一起进行哈希运算的，所以事后篡改日期是不可能的，因为那会产生一个不同的哈希值。


  这里的问题是，我们仍然需要依赖一个中央权威机构。大约在同一时间，比利时密码学家让-雅克·基斯夸特提出了一个解决方案。他建议整个文件（或证书链）可以在一个时间戳服务器网络中共享。生成的证书不包含机密信息，因此不敏感。任何去中心化的实体都可以将带有时间戳的文档添加到这个时间戳证书链中。这个解决方案将解决在分布式公共账目中为交易添加时间戳的问题。


  ### 去中心化的点对点公共账目


  现在，我们回到了原点。在格里格的三式记账版本中，交易的公共账目由一个依赖中央服务器的中央发行方维护。尽管如此，其公共可访问性仍取决于服务器是否在线。为了确保账目真正公开且能抵御故障，它必须是分布式的。因此，多个实体拥有副本以防止数据丢失，并且有多个可用节点在线，以确保在一个或多个节点发生故障时的可用性。如果想要创建一个真正具有弹性的公共账目，最优技术将是
  P2P 网络。


  一个在去中心化网状网络上，所有节点都能访问的开放账目中维护经济交易记录的系统，将使销毁这些交易记录几乎成为不可能。如果记录的不可篡改性通过哈希运算来维持，那它就类似于美索不达米亚的楔形文字泥板一样被刻在石头上。去中心化的分布将保证持久性，石头也确保了这一点。只要网络中的节点保持连接，记录就会公开并可供查验。


  这样的系统可以通过动态查询开放账目，让任何人访问曾用于交易的所有账户余额。不再需要将记录刻在石头上，而且，它可以通过互联网在全球范围内使用，而不仅仅是在存储石板的本地。但它解决的问题是相同的：创建一个不可篡改且持久的公共记录，不是为了记录过去的英雄事迹，而是为了支持未来交换的经济活动。




