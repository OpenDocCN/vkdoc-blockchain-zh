- "# 4. 比特币\n\n现在我们可以开始梳理比特币的运作方式了。前几章内容让我们更好地理解了多种多样的技术以及虚拟货币的试验，正是这些试验使得比特币得以在这个特定时间点出现。在深入探究使其成为可能的技术细节之前，我们先简要勾勒一下比特币的一些关键组成部分。\n\
  \n简单来说，比特币是一个提供名为 `bitcoin`（比特币）的虚拟货币的系统，用户无需通过银行、公司或其他组织等任何中央中介机构即可进行交易。比特币可以精确到小数点后八位（相比之下，普通货币通常只能精确到小数点后两位）。其最小单位称为\
  \ `satoshi`（聪），类似于美分与美元的关系。\n\n要开始使用 `bitcoin`，用户需要拥有一个数字钱包。这个钱包包含用户可以用来与其他用户交换\
  \ `bitcoin` 的公开标识符。它的功能类似于我们熟知的账户，用于持有 `bitcoin`，即你可以从中支取总额的 `bitcoin`。只有两种方式可以将\
  \ `bitcoin` 存入钱包：一种是通过称为“挖矿”的过程创建 `bitcoin`（我们稍后会讲到），另一种更常见的方式是让别人将 `bitcoin` 转账到你的钱包。后一种方式可以是作为商品或服务的付款，也可以通过购买来实现。\n\
  \n不过，仍然只有少数人将 `bitcoin` 作为支付手段。当你购买 `bitcoin` 时，你实际上是将美元等法定货币转移给某个中间人，该中间人钱包里有 `bitcoin`，再将其转入你的钱包。这可以通过某个比特币交易所或任何钱包里有余额的人来完成。另一种方式是通过其他加密货币购买\
  \ `bitcoin`，这也很常见，因为 `bitcoin` 在众多不同的加密货币之间起到了桥梁作用。这些交易平台独立于比特币系统之外。比特币系统内部不存在美元或任何其他法定货币。\n\
  \n到目前为止，我们对于常规货币和银行的直观理解仍然适用：我们有一种用单位计算的货币，这些单位汇总成钱包里的余额，并且在钱包之间可以进行转账。但在这里，我们开始步入一个相对于传统货币体系而言显得非常奇特的道路。所有曾经发生过的交易都记录在一个公共账本上。这就是所谓的\
  \ `blockchain`（区块链）。任何钱包的余额都是通过查看与该钱包相关的所有转入和转出交易（借记和贷记）动态计算得出的。因此，任何地方都没有记录余额；它是基于流入和流出之间的差额计算出来的总额。比特币网络允许用户在任意时刻花费这个总额。它之所以被称为\
  \ `blockchain`，是因为大约每十分钟，网络上待处理的交易就会被打包成一个区块，该区块会获得一个编号和一个哈希值。这个哈希值会被用于下一个区块，从而形成一条链。这种方法确保了从第一个区块（称为创世块）开始，整条链上交易记录的完整性。我们稍后会详细讨论细节。\n\
  \n现在，这个系统需要有人来运行它。银行有中央服务器负责记录和清算所有交易，而比特币则采用一个节点网络。这是一个由众多计算机组成的网络，它们都在同一个公共交易记录上工作。该网络会收集用户想要进行的所有交易，并将其记录在一个区块中。这些运行比特币网络的计算机被称为矿工。他们会因验证交易的工作而获得\
  \ `bitcoin` 奖励。原则上，任何计算机都可以通过下载开源的比特币软件来开始挖掘 `bitcoin`。但实际上，普通计算机很难产出任何 `bitcoin`，因为挖矿任务已经变得高度专业化，需要定制的芯片才有可能获得奖励。请记住，对于所有其他未能生成区块的计算机，是没有任何奖励的。\n\
  \n矿工们通过尝试解决一个加密谜题来竞争创建下一个交易区块。这是一种工作量证明，需要消耗大量的计算资源。网络上第一个解决谜题并成功创建交易区块的节点，将获得新铸造的\
  \ `bitcoin` 作为奖励。每个区块产生固定数量的 `bitcoin` 作为奖励。\n\n以上是对比特币及其大致运作方式的简要概述，旨在提供一个总体概念。现在，让我们深入探讨细节。\n\
  \n\n\n## 虚拟货币\n\n比特币汲取了此前虚拟货币探索的成果，直接构建于注重隐私和稳定货币供应的加密虚拟货币体系之上。比特币白皮书中仅引用了两种先前存在的加密货币：亚当·巴克的哈希现金和戴伟的\
  \ B-money。比特币从哈希现金继承了采用工作量证明来铸造货币的理念。比特币的许多核心要素已在哈希现金中定义完毕，以至于巴克后来声称自己发明了比特币挖矿函数——这可以说是其核心组成部分。通过比特币挖矿，货币被生产并投入流通，如同哈希现金代币一样，随后即可用于交换。\n\
  \n许多虚拟货币支持者关注的核心问题之一是银行（特别是中央银行）的颠覆性作用，因为在虚拟货币信仰者看来，银行一直在“印钞”。货币供应量增加会产生通胀效应，这本质上是“窃取”货币持有者的财富，因为通胀会降低名义货币价值。而比特币的设计则截然相反：通过逐步减少货币发行量实现结构性的货币供应紧缩，旨在形成通缩机制，使货币持续增值。\n\
  \n比特币的供应遵循既定时间表，随着时间的推移，产生的货币数量会越来越少，而非越来越多。首先，理论上可生成的比特币总量在设计上就被固定了。与人们日常生活中使用的美元、欧元等法定货币不同（其货币供应量不受限制），比特币是有限的：总共只能挖出\
  \ 2100 万枚比特币。当 50%的比特币被挖出后，矿工奖励首次减半，这发生在 2012 年。此后奖励变为 25 枚比特币。第二次减半发生在 75%的比特币被挖出之后，奖励降至\
  \ 12.5 枚比特币。这一过程将持续，直至再无比特币可投入流通。根据计算，最后一枚比特币将在 2140 年左右被挖出。\n\n将稀缺性嵌入货币的设计可能受到基于贵金属的虚拟货币启发，因为贵金属的价值正源于其稀缺性。在历史上最常用于货币的三种贵金属（金、银、铜）中，黄金最为稀缺，白银次之，铜的稀缺度最低。相反，像铁这样的金属因过于普遍，作为价值储存手段的价值不大。在这方面，黄金尤为值得关注：一百多年来，全球市场每年的黄金供应量始终维持在黄金总存量的\
  \ 2%左右。这种状况形成了较高的存量-流量比（目前约为 60），即现存黄金总量与新增开采黄金量的比率。正是这种动态使得黄金能更好地保值。白银的存量-流量比约为\
  \ 20，相对更为充裕，这形成了类似于通胀性货币供应的不同动态。当总存量中新增量过多时，每个单位的价值就会缩水。\n\n虽然 e-gold、eBullion 等项目交易的是与实物黄金挂钩的电子代币，但尼克·萨博提出了一种纯数字版本，旨在创建数字价值储存手段。比特币最终接近了萨博在其关于“比特黄金”的构想中提出的理念。他设想通过解决密码学难题来铸造“比特黄金”，从而创造类似黄金的稀缺性。解决密码学难题的过程类似于黄金开采。比特币是首个实现此类系统的项目。\n\
  \n## 加密以保护隐私\n\n密码朋克关注的一个核心问题是隐私。他们特别针对银行和政府过度获取客户交易信息这一问题，因为从这些信息中可以收集到大量涉及个人隐私的数据。相比之下，比特币默认提供匿名账户，且没有银行作为交易中介。任何人都无法直接通过用户的交易信息识别其身份。\n\
  \n在讨论比特币时，“钱包”是一个核心概念，但它更多是一种思维概念，而非真正的技术产物。如今，钱包通常等同于钱包软件，其形式多样。钱包可以由在线交易所托管，也可以由用户下载并在本地作为客户端应用程序运行。从某种意义上说，“钱包”这个术语具有误导性，因为钱包本身并不存储任何比特币。要与比特币网络交互进行交易，需要一些中介服务。钱包软件提供这些服务，例如生成比特币地址、存储私钥以及显示每个比特币地址上的余额。之所以需要这些功能，是因为比特币本质上不过是一份巨大的交易清单。\n\
  \n要使用比特币进行任何操作，首先需要一个地址——这是一串用于向他人标识你的身份的字符串，允许你发送和接收比特币。你可以将其视为银行账户；只不过在比特币系统中，你无需请求任何人即可创建地址。\n\
  \n地址基于我们在第 2 章中见过的密码学技术构建。生成过程如下：首先，选择一个大的随机数，这就是你的私钥。由于只需私钥即可获取你的比特币，因此必须格外小心地保护它。基于这个私钥，通过一种称为椭圆曲线乘法的技术生成公钥。这是可用于加密和签名的标准公钥-私钥对。但目前我们还未进行任何加密或签名操作。接下来，将公钥通过单向加密哈希函数处理。首先，从公钥计算`SHA-256`哈希值，再基于该值计算`RIPEMD160`哈希，得到\
  \ 160 位的数字。然后将此数字编码为`Base58Check`，从而生成一个 58 字符的字符串。最终结果即为地址。地址可以显示为字符串，有时也以二维码形式呈现以便识别。如果你想让别人用比特币付款给你，只需将你的地址发送给他们，并请求其将资金转入该地址即可。\n\
  \n当你以新地址加入比特币网络时，在获得与地址关联的比特币之前，你几乎无法进行任何操作。这可以通过两种方式实现：要么开始挖矿获取比特币，要么请他人向你转账比特币。对于个人而言，通过挖矿获取比特币已不再可行（后续会详细说明）。因此，必须从其他途径获取比特币，例如通过交易所或出售商品。\n\
  \n在线交易所允许你存入美元等法定货币以兑换比特币。交易所随后会将比特币从其某个地址转入你的地址。这笔交易会被比特币网络捕获并记录在一个区块中。完成后，你的余额中就会有相当于刚刚转入的金额可供使用。\n\
  \n如果你想购买某物或向他人转账，只需获取对方的地址，输入转账金额，还可以添加一些文本信息。但请注意，该文本信息在区块链上对所有人可见。交易将包含以下内容：\n\
  \n*   用于提取比特币的地址\n*   转账金额\n*   你可能希望添加的额外交易费用（以加快交易确认速度）\n*   接收比特币的地址\n*   附加文本信息\n\
  \n\n\n仅仅发送一笔交易是不够的，因为任何人都可以用你的钱包地址来发送交易。为了验证交易，比特币网络需要使用与该地址关联的**私钥**对交易进行**签名**。之后，交易会以“待处理”状态发布到比特币网络。矿工将验证该交易是否已用私钥签名。一旦交易被包含在一个区块中，交易即告完成，且可供所有人查看。\n\
  \n将此与常规银行账户进行比较：银行集中保存所有数据，并持有允许你从账户转账的凭证。银行可以关闭对你账户的访问，或将你的凭证泄露给恶意第三方，而该第三方随后将能够动用你的资金。银行通过其“了解你的客户”（KYC）流程确切地知道你是谁，并且有义务遵守法院裁决，披露你的交易或冻结资金。\n\
  \n使用比特币时，没有人知道你是谁。只有一个个无意义的随机比特币地址。尽管与银行相反，所有交易都是公开的，但没有人能将它们与你这个私人身份联系起来。资金并非集中存储在任何地方，而是无处不在，这意味着即使某个服务器崩溃或在线交易所破产，资金仍然存在并可访问。最后，没有人能控制你资金的访问权限；如果你拥有某个地址的私钥，你就可以访问该地址关联的所有比特币。更重要的是，交易清算在一小时内完成，而传统银行转账则需要几天时间。\n\
  \n另一方面，比特币缺乏传统银行业务所附带的护栏和安全网。如果犯罪分子盗用了你的信用卡，你可以向信用卡公司提出争议，这通常会导致资金成功退回你的账户。而对于比特币，如果有人获取了你的私钥并转移了所有资金，那么任何人都无能为力。你无法向比特币网络申诉。同样，如果你不小心输入了错误的地址，资金将归属于该地址，并且你绝无可能找到那个人并请求他归还你的钱。资金就这样消失了。\n\
  \n## 共享公共账本\n\n传统银行对其所有交易记录保密。事实上，这是银行保密的基本原则，并在许多国家被编入法律。当资金被使用时，银行通过一个复杂的银行间清算系统确保一个账户只能消费一次。确保资金仅被使用一次是所有交易媒介的必要条件，这也是清算过程如此漫长的部分原因。\n\
  \n哈希现金（Hashcash）尚未解决双重支付问题，它依赖一个中央注册表来跟踪代币是否已被使用。公共账本是比特币解决此问题的关键创新。交易发送方和接收方的完全隐私，使得比特币能够彻底颠覆传统的银行保密原则，将所有交易公之于众。当所有交易都在假名钱包\
  \ ID 之间进行时，即使公开张贴，隐私仍能得到保障。\n\n公共账本是一份记录所有曾经发生的比特币交易的长期记录。这种共享公共账本的概念由戴伟（Wei Dai）在其\
  \ B-money 的愿景中提出。戴伟提出了分布式账本的概念，所有交易都被记录以供所有人查看。基于这个分布式账本，可以在交易发生时计算账户余额，这本质上就是格里格（Grigg）的三式记账法的概念。这些想法在比特币中首次得以实现。\n\
  \n公共账本并非单独交易简单拼接而成的一长串记录。它由交易区块组成，因此得名区块链。一个区块是交易的集合。由于区块是历史的记录，它必须是不可变的。对内容进行哈希处理即可实现这一点。区块通过其包含的所有交易的哈希值进行密封，因此任何人都可以验证后续副本中所包含的交易未被篡改。仅仅在每个区块中放入一个哈希值是不够的，因为正如我们所见，任何地方都没有记录账户余额。因此，所有余额都需要所有涉及任何给定比特币地址的先前交易的完整记录，以验证该地址是否有余额可消费。如果缺少一个或多个区块，双重支付就可能发生，因为缺失区块中的交易将不计入账户余额的计算。\n\
  \n这意味着验证交易的矿工必须能够访问整个公共账本的交易历史。这带来了确保所有区块都存在且已入账的问题。如果你支付了 100 个比特币的那个区块正好从公共账本中消失了，那么这笔钱在你的账户中仍会显示为可用余额，从而允许进行双重支付。解决方案是每个区块必须包含前一个区块的哈希值，正是这一点使其形成了一条链。通过这种方式，从公共账本中移除任何区块都是不可能的。前一个区块的哈希值和交易无法产生与后续区块相同的哈希值。请记住，哈希是基于所有输入的指纹，因此生成下一个区块的指纹需要前一个区块的指纹。尼克·萨博（Nick\
  \ Szabo）最初在其关于比特黄金（Bitgold）的想法中提出了这一机制，但从未实现。\n\n## 点对点网络\n\n比特币网络是一个运行比特币软件并通过互联网直接连接的计算机系统。交易被发布到该网络以纳入下一个区块。当新区块被创建时，它同样会被发送到其他节点进行验证并纳入区块链。\n\
  \n如果这个公共账本保存在中央服务器上，它将容易受到破坏和故障的影响。这就是系统采用点对点网络进行分布式部署的原因，网络中的每个节点都包含整个公共账本的副本。当有人想要开始挖矿时，必须连接到这个网络并下载区块链。因此，该网络也作为一个具有多个冗余副本的分布式存储系统工作。通过这种方式，即使一个节点发生故障，也会有成千上万个其他节点持有副本。\n\
  \n另一种情况是，创建了一个替代区块，其中插入了替代交易。由于大多数其他节点将拥有该区块的另一个版本，因此该替代区块会被网络拒绝。在比特币网络中，存在一个内置的共识系统，要使区块被接受，需要获得多数同意。网络建立在最长链之上。如果替代区块未被接受，它将不会成为最长链的一部分，因此其中的交易也不会被“结算”。\n\
  \n鉴于这种点对点模型，即使监管机构和权威人士宣称应该关闭比特币，任何中央机构也无法做到。只要有计算机连接并运行比特币软件，比特币就会存在。这使得比特币和其他类似的区块链成为有史以来最具韧性的交易系统。银行可以被关闭，甚至中央银行也可能随着一个国家的消失而消失，但只要有人投入算力和网络连接来运行软件，比特币和区块链就会继续存在。\n\
  \n\n\n## 工作量证明  \n\n接下来的一个自然问题是，这些连接到网络的运行比特币软件的计算机究竟在做什么？答案是，它们在进行比特币挖矿。这一过程实际上与\
  \ Hashcash 的工作量证明功能几乎相同，但它是如何具体运作的呢？  \n\n工作量证明的原则是，执行某个功能不应该是免费的。在 Hashcash 中，这个功能是发送电子邮件或向网络服务器发送请求。而对于比特币，这个功能则是将交易打包进区块并“印钞”，即生成比特币。这样的功能需要付出一定代价，这是非常合理的；否则，每个人都会随意创建区块来获取比特币。\
  \  \n\n问题在于，你如何确切地证明你为创建区块付出了努力。将几笔待处理交易捆绑在一起并进行哈希运算，本身确实需要一些工作量，但这点工作量微不足道，本身并不昂贵。为了制造成本，这项工作被附加了一个加密难题。\
  \  \n\n回顾一下，哈希本质上是一个固定长度的数字。比特币使用 SHA-256 算法为区块中的所有交易生成一个哈希值。这个哈希值是一个 256 位的字符串。它通常用十六进制值来表示。十六进制计数系统是一种基数为\
  \ 16 的编码系统。基数指的是该数字系统中有多少个不同的数字。二进制系统是基数为 2，即只有 0 和 1 两个数字。十进制系统是基数为 10，意味着有 0 到\
  \ 9 共十个不同的数字。因此，十六进制系统有 16 个不同的数字。由于我们在十进制系统中没有超过 10 的数字符号，因此额外的数字用字符 A 到 F 表示。由于任何十六进制数字都可以用\
  \ 4 个比特来表示，所以得到的十六进制字符串长度为 64 个字符（256/4），包含十进制数字和字母 A 到 F。  \n\n了解了这些之后，让我们回到这个难题。如果对最终的哈希字符串没有任何要求，生成一个哈希值是轻而易举的，任何哈希值都可以。但如果我们增加一个要求，即生成的哈希值必须以一个\
  \ 0 开头，我们就无法轻易地直接生成它了。由于我们知道重复运行哈希算法不会有任何不同，我们必须调整输入。当然，我们可以尝试添加或删除一些随机交易，但这很不方便。因此，比特币系统允许矿工向区块添加一个称为“随机数”（nonce）的数字。这个名称指的是“一次性的数字”，它是一个\
  \ 32 位的字段。由于哈希值对输入的任何变化都非常敏感，随机数中的任何数字都会导致最终的哈希值发生巨大变化。因此，这个难题就在于找出应该在随机数中添加什么值，使得对区块中的交易和其他信息进行哈希后得到的结果，低于设定的目标值。\
  \  \n\n显而易见，以 0 开头的哈希值的数量远小于所有可能的哈希值总数。如果我们再增加一个 0，可接受的哈希值总数就会进一步减少。实际上，每增加一个 0，整个解空间就会缩小。这意味着，生成正确哈希值的概率会随着目标值开头每增加一个\
  \ 0 而降低。其结果是，平均而言，需要尝试更多次才能找到一个满足目标的哈希值。这就是挖矿的本质：一场加密彩票。而难度与矿工必须为最终哈希值找到的前导零的数量成正比。\
  \  \n\n现在可能会有人问，这如何体现工作量证明呢？答案是，对哈希值的每一次猜测都需要 CPU 付出工作量。实际上，不一定是 CPU；你也可以手动计算哈希值，有人这样做过，需要花费数小时。CPU\
  \ 越快，它在单位时间内能尝试的猜测次数就越多。由于只有第一个找到解决方案的矿工才能获得奖励，时间至关重要。CPU 越快，你拥有的加密彩票就越多。难度越高，猜测出正确解所需的总体\
  \ CPU 工作量就越大。  \n\n由于摩尔定律确保了计算能力持续增长，中本聪撰写比特币白皮书时认为困难的计算，在今天可能微不足道。换句话说，在 2009 年解决特定难度所需的\
  \ CPU 工作量，今天可能要便宜得多。这可能会削弱比特币的工作量证明机制，因此比特币协议会持续设定新的难度目标。每产生 2016 个区块，难度就会重置一次。\
  \  \n\n为了避免区块生成过快，从而一次性释放所有比特币，中本聪将创建一个区块的目标时间设定为平均十分钟。如果平均出块时间少于十分钟，难度就会增加；如果平均时间多于十分钟，难度就会降低。生成正确解所需的时间取决于比特币网络可用的总\
  \ CPU 周期数，或者简单来说：比特币网络的总计算能力。这种计算能力体现在“算力”（hash rate）这个概念上，因为其最终目的是生成哈希值。目前使用的单位是每秒太赫兹（TH/s），这意味着整个网络每秒能产生多少万亿次哈希。用我们的彩票术语来说，这相当于所有彩票参与者每秒能购买多少张彩票。在撰写本文时，这个值约为每秒\
  \ 2.6 亿太赫兹。  \n\n当矿工最终成功构建了一个区块时，他们需要获得报酬。这笔报酬是在新区块中创建的新铸造的比特币。这个数字被记录在“币基”（coinbase，不要与\
  \ Coinbase 公司混淆）中。区块中的第一笔交易被称为币基交易，由创建该区块的矿工生成。它包含了矿工的地址，以及一个不超过比特币协议定义的当前区块奖励的数字。回顾一下，比特币是根据已铸造数量的既定时间表来分发的。目前，每个区块的奖励是\
  \ 6.25 个比特币。  \n\n在这个奖励之上，还要加上用户支付的交易手续费。平均交易手续费大约相当于 1 美元，但曾在 1 美元到 5 美元之间波动。目前，交易手续费仍然是矿工总奖励中的一小部分，大约在个位数百分比附近徘徊，但有时也曾占到奖励的\
  \ 50%以上。随着比特币发行量的减少，预计来自交易手续费的奖励比例将会增加。在最后一个比特币被挖出后，这将是激励矿工继续验证交易和创建区块的唯一来源。\n\n\
  \n\n## 什么是比特币？\n\n简而言之，比特币是一个提供虚拟货币（bitcoin）使用途径的系统。任何人都可以通过下载软件或使用在线服务创建钱包来开始使用它。这个钱包本质上是一组公共身份标识的集合，只有使用创建钱包时所用的私钥才能进行交易。进行交易时，需使用钱包软件指定想要发送到的钱包\
  \ ID 以及比特币数量。该系统由一个自愿提供计算资源的计算机网络支撑，使得交易能够被记录在区块链上，该区块链包含了所有过往的交易记录。这些计算机被称为矿工，他们通过交易手续费和新生成的比特币获得奖励。\n\
  \n从这个概述可以看出，比特币是一个复杂的系统，融合了来自众多不同来源的技术创新。事实上，很难指出比特币中有哪个特定特征是完全全新的发明。与此同时，比特币的整体解决方案又是如此彻底地新颖和富有创新性，以至于在\
  \ 21 世纪几乎找不到能与之匹敌的事物。某些方面在孤立看来似乎过于复杂，甚至有些刻意，但这自有其道理；当所有要素整合在一起时，便产生了一个独特且功能完备的解决方案，它已经证明自己经得起十多年的考验。\n\
  \n比特币和区块链技术是技术发展轨迹的产物，这些轨迹有时可追溯到数千年前，但直到现在才达到足以构建一个全球性、具有韧性的交易系统的水平。这些发展轨迹常常以令人惊讶且矛盾的方式交汇。回想一下，会计、银行和密码学主要关注信息的隐私和保密，而比特币则完全不同，它是完全公开的，任何人都可以访问。另一个例子是，虚拟货币，就像以往所有的货币一样，都依赖于一个中央铸币机构。历史上，货币发行者面临的最大挑战是防止任何其他方铸造货币，这种行为被称为伪造，通常伴随着严厉的惩罚。而比特币再次颠覆了这一传统，它允许任何人铸造货币。\n\
  \n比特币在诞生之初几乎只引起了人们耸肩和不多的几句批评评论。自问世以来，它被宣告死亡的次数已不止几次。尽管如此，它作为世界上最有价值的虚拟货币，至今仍在蓬勃发展。但这一切是如何融合在一起的呢？这现在正是我们关注的焦点。\n\
  \n"
- '# 5. 寻找中本聪


  在现代，很少有人比比特币的发明者中本聪的身份引发了更多的研究和谜团。然而，在 2008 年 10 月比特币白皮书发布之时，情况并非如此。这篇论文在密码学邮件列表上公布后，最初只有四位贡献者发表了一些批评性评论，之后便在一个月内销声匿迹。到了
  2008 年 12 月，根本没有人谈论比特币，认为十多年后全世界会拼命想要找出其作者中本聪是谁的想法，在当时显得十分荒诞。


  然而，15 年后的今天，一些我们这个时代最杰出的记者，为《*纽约时报*》、《*连线*》和《*福布斯*》等最负盛名的刊物撰稿，已经花费了无数时间试图查明中本聪的身份，却毫无结果。迄今为止，这些努力均徒劳无功。我们仍在寻找中本聪。有少数人曾暗示或声称自己就是中本聪，但大多数人都强烈拒绝被认定为是中本聪。


  有人可能会争辩说，这种寻找并不重要。从宏观角度来看，我同意这一点，但这仍然很有趣。中本聪的身份是一个现代谜团，因此值得进行全面调查。由于对于中本聪的身份尚未达成共识，重新审视一番或许是有价值的。接下来，我们将回顾对历史上中本聪最重要的几项调查，并得出结论：没有一项调查能令人信服地论证中本聪的身份。在下一章中，我将基于历史批判研究的原则提出一种新的方法，并梳理不同的资料来源，以理解它们能告诉我们什么，不能告诉我们什么。


  ## 谁干的？


  媒体花了一段时间才开始对比特币及其创造者产生兴趣。最初的几年很平静。2010 年 5 月，发生了第一笔用比特币进行的交易，当时拉斯洛·汉耶茨用 10000 个比特币买了一个披萨。那时，只有通过挖矿才能获得比特币。比特币还只是一件小众事物。


  这种情况在 2011 年开始改变，当时第一批交易所开始出现，并且比特币因与维基解密（其希望接受比特币捐款）的联系而声名大噪。这使比特币进入了公众的视野，主流媒体也开始报道它。


  ## 搜索开始


  第一家对比特币产生浓厚兴趣的主流媒体正是《*纽约客*》，发表文章的是美国作家约书亚·戴维斯。戴维斯对撰写科技文章并不陌生，也曾为《*连线*》杂志撰写过科技类文章。他通常被奇特而真实的故事所吸引。在
  2011 年，比特币及其神秘创始人的故事绝对是这一类别的典范。


  那篇文章确定了关于中本聪的几个关键观察点，这些观察点后来支配了后续的身份识别尝试：中本聪英语写作完美无瑕，是英式英语；他可能出生于 20 世纪 70 年代初；他对银行有意见，认为银行不可信赖；他是一位世界级的程序员，能用
  C++编程，并且理解点对点编程。


  这篇文章更像是一段发现之旅，而非一次重点明确的调查。戴维斯从安全研究员丹·卡明斯基开始，然后是普林斯顿大学的斯图尔特·哈伯，因为比特币白皮书中三次引用了他的工作。从那里，我们来到了
  Crypto 2011 会议，因为哈伯认为这可能是一个很好的起点。在会议上，戴维斯寻找表面上符合条件的人，并找到了一位来自爱尔兰的研究生，名叫迈克尔·克利尔。


  不幸的是，他并没有承认自己是中本聪，反而提出了另一名嫌疑人：芬兰研究员维利·莱赫顿维尔塔。莱赫顿维尔塔同样觉得“自己就是中本聪”这个说法很滑稽，他甚至建议像比特币这样的虚拟货币应该为政府留一个后门，这完全违背了比特币白皮书的精神。


  最终，戴维斯寻找中本聪的努力被证明是不成功的，并且始终只是一场追求，一个精彩的故事，但它巩固了比特币作为严肃关注对象的地位。该文章还精准指出了关于中本聪的许多关键观察点，任何身份识别都必须与之相符。


  另一个反复出现的主题是，被识别的对象都拒绝承认自己是中本聪。不过，这本身并不能作为反对证据，因为中本聪为了隐藏身份费尽心机。真正的中本聪也不可能期望他会承认任何指认。这两个被提出的嫌疑人显得有些随意，甚至与戴维斯对中本聪的观察不完全吻合：莱赫顿维尔塔的母语不是英语，而克利尔可能称不上是世界级程序员，也没有点对点方面的经验。两人均非出生于
  20 世纪 70 年代初。




  ### “比特币加密货币谜团再起”


  针对约书亚·戴维斯在《纽约客》上发表的文章，纽约大学新闻学教授亚当·佩南伯格撰写了《比特币加密货币谜团再起》一文，对其结论提出质疑。他认为戴维斯并未找到正确的人选，尽管除了克利尔一再否认之外并未提供新证据，但就连戴维斯本人似乎也并不认为克利尔就是中本聪。


  佩南伯格发现了关于中本聪姓名的另一条线索：在日语中，“Satoshi”意为“思路清晰；机智；聪明”。“Naka”可解释为“内部”或“关系”，而“moto”则定义为“起源；原因；基础；根基”。因此我们得到的是“清晰思考”
  “内部” “基础”。不过，这究竟指向何处尚不完全明确。


  接着，他通过推测中本聪是英国人这一说法是“误导性线索”，对戴维斯的调查结果提出质疑。但在长达两年时间里，始终如一地用非母语写出 8 万个单词——这即使并非不可能，也极其困难。他指出，中本聪最初提及比特币时使用的是美式英语，此后才转为英式英语，但如果不是因为后者更容易，为何要先用美式口音再转成英式？佩南伯格未能提出任何实质性论据，说明中本聪为何不应是英国人。


  佩南伯格采用的方法是用谷歌搜索比特币白皮书中疑似独特的短语，看是否在其他地方出现匹配结果。除了“computationally impractical to reverse”（计算上不可逆）这一短语外，一无所获。该短语还出现在
  2008 年 8 月一份名为《更新与分发加密密钥》的专利申请中，作者是尼尔·金、查尔斯·布里和弗拉基米尔·奥克斯曼。他发现这三人还撰写过其他在他看来颇具“比特币风格”的专利申请。由此推测，这三人就是中本聪背后的团队。


  但回顾我们在第二章中关于公钥加密的讨论，“计算上不可逆”不过是*陷门函数*的另一种说法：这是公钥密码系统所需数学函数的核心特征。此外，密钥分发与比特币毫无关系。金本人也对佩南伯格如此表示。比特币使用的是公钥密码学，正如我们所知，其全部目的就是为了消除密钥分发问题。这种论证类似于说，一种新型保险箱的神秘发明者，必定就是那位发明了新型锁具更新方法的锁匠。


  最后，中本聪这个人——他多年来致力于开发专有知识产权，却最终放弃了这些受专利保护的知识产权，并将其作为开源软件免费发布。这样的人申请专利的可能性有多大？专利恰恰是与知识产权相反的路径。我们对比特币的全部了解表明，它是为开放和自由而生，而非像专利那样封闭和专有。即便如佩南伯格在浏览其中一位作者的
  Facebook 页面后所声称的那样，这些作者可能持有表面上相似的观点，但他们的行为却恰恰相反。


  因此，这篇文章未能提出任何令人信服的论据或严谨的方法，来推动对中本聪真实身份的调查。


  ## 搜寻仍在继续


  最初的热潮过后，对中本聪的搜寻似乎渐渐平息——但这并非因为人们相信任何一次身份确认是正确的。2013 年，猜测再度升温。被视为互联网奠基人之一的泰德·尼尔森发布了一段视频，称中本聪就是隐居的日本数学家望月新一。除了望月新一是一位天才，曾有一次在互联网上发布过一项证明后便不再参与任何讨论之外，没有其他论据支持这一观点。虽然尼尔森推测，由于望月新一五岁时移居美国，其英语水平一定不错，但这并未解释他如何掌握了地道的英式英语。同样，也没有任何迹象表明他对密码学有兴趣或具备编程能力。


  在另一篇文章中，亚历克·刘审视了嫌疑人名单，并加上了加文·安德烈森——他于 2010 年从中本聪手中接过了比特币的开发大权。此外，Mt. Gox 的联合创始人杰德·麦卡勒布也被列入其中，因为他帮助建立了第一个成功的交易所，该交易所注册于日本。结论是，并未找到真正合适的人选。文章的一个有趣观点是，中本聪的编码风格似乎更像学术研究者，而非专业开发者。


  两位以色列计算机科学家——多里特·罗恩和阿迪·沙米尔——发表了一篇分析比特币区块链的论文，注意到比特币创造者与罗斯·乌布利希之间存在财务联系。乌布利希是“丝绸之路”暗网市场的创始人，该市场用于交易非法商品和服务。乌布利希通过其律师否认了这一说法，研究人员后来也撤回了这一发现。


  ### 《新闻周刊》报道


  2014 年，《新闻周刊》投下一枚重磅炸弹：调查记者莉亚·麦格拉思·古德曼披露，中本聪的真实身份是一位名叫多里安·普伦蒂斯·中本聪的男子：“他默然承认自己在比特币项目中的角色，低头凝视着人行道，断然拒绝回答问题。”


  “我不再参与那件事，也无法讨论它，”他说着，左手一挥，拒绝了所有进一步的追问。“已经交给其他人了。现在由他们负责。我与它再无任何关联。”


  中本聪终于被找到了吗？古德曼从另一个角度开始了为期两个月的调查：她认为中本聪并非化名，而是其真实姓名，并试图找到叫这个名字的人。她成功了，找到了一位日裔美国人，名叫多里安·中本聪，住在加州洛杉矶郊外的天普市。


  虽然中本聪的某些特征与多里安相符，比如对政府和银行的不信任，但其他大部分特征似乎并不吻合。最重要的是他妻子对其英语水平的评价：“我不会说他能写出完美的英语。他会选择单词，混用拼写。”而在我们所知的中本聪的文字中，完全看不到这一点。


  那么，问题来了：当他说自己“不再参与”时，他究竟承认了什么？多里安·中本聪在其职业生涯早期曾参与军事项目。鉴于他对英语理解有限，他似乎以为记者指的是这件事。奇怪的是，在此事件之后，中本聪显然又出现在公共写作中，在
  P2P 论坛网站上声明自己并非多里安·中本聪。




  ### 中本聪的邻居


  *福布斯*杂志在另一次试图指认中本聪身份时，曾要求将所有先前确定的嫌疑人与中本聪进行比对，结果发现与中本聪最相似的人是乔舒亚·戴维斯提到过的克利尔。时任*福布斯*撰稿人的安迪·格林伯格认为，由于语言问题，将中本聪认定为多里安·中本聪的说法站不住脚，因此他要求将自己的文章也纳入分析。分析结果显示，多里安·中本聪与克利尔相比，匹配度更低。


  受到一条线索的启发——哈罗德·芬利也住在相对较小的坦普尔城社区——格林伯格开始调查芬利是否就是中本聪。正如我们之前所见，芬利是密码学领域，尤其是数字货币领域的关键人物。即便多里安·中本聪不是中本聪本人，也有可能是哈罗德·芬利冒用了他的名字，因为他们彼此仅相距
  1.6 英里。


  芬利既否认多里安·中本聪可能是比特币的发明者，也否认对他有任何了解，并向格林伯格展示了与中本聪的电子邮件通信记录（这些记录已与真正中本聪的文章进行比对以验证真伪），以及中本聪向芬利发送
  10 枚比特币的首批交易记录。电子邮件上的时间戳与这些交易记录相符。芬利总结道：“芬利独自设立两个账户，并在比特币尚未具有任何可衡量价值之前，就与自己进行虚假对话，以此摆脱像我这样的窥探者——这种想法似乎荒谬至极。”


  ### 新嫌疑人出现


  大约在同一时期，另一位嫌疑人浮出水面：尼克·萨博。和哈罗德·芬利一样，他从一开始就深度参与了数字货币和密码朋克运动。他曾是首家成功的数字货币公司 DigiCash
  的早期员工，并一直保持着这方面的兴趣。2003 年底左右，一位名为“斯凯·格雷”的博主发布了两篇博客文章，指出尼克·萨博就是比特币的发明者。这个故事被 TechCrunch
  报道，并采访了斯凯·格雷。


  其论点主要基于对比特币白皮书与尼克·萨博文章之间相似性的分析。论证十分看重萨博一篇描述他“比特金”想法的博文，尽管那篇博文仅有千余字，且阐述的许多观点（如戴伟和亚当·拜克等人早已提出）都是前人已有的构思。


  该方法论是一种看似法证性质的分析，通过一种似乎是自制的方法来审视文本的“语言特征”，即识别比特币白皮书中的风格标记，并将其与尼克·萨博的写作风格进行比较。格雷确定了一些内容中性的术语：在“of
  course”后不使用逗号隔开、使用“can be characterized”这一表达、在描述假设时使用“for our purposes”、以“It should
  be noted”开头造句等。这些似乎都是相当常见的表达和标准的学术用语。格雷似乎未能有力地论证这些用法的独特性。


  还有诸如“时间戳服务器”（比特币论文的核心概念）、“可信第三方”、“密码学证明”、“数字签名”，以及反复将“时间戳”用作动词等“内容承载型”术语。但正如我们所见，这些在密码学领域同样是相当常规的表达方式，并贯穿于密码学邮件列表的讨论之中。更简单的解释似乎是：中本聪和萨博都属于同一个专门研究密码学的学术语言群体。


  2014 年，阿斯顿大学法医语言学研究所（由讲师杰克·格里夫及其 40 名毕设学生领导）的一项研究也采用了同样的方法。他们似乎遵循了相同的方法，并将比特币白皮书与其他
  11 名嫌疑人进行了比较。遗憾的是，该研究从未发表，因此无法核查或复现其发现，也无法了解为何没有将白皮书与中本聪所写的其他 8 万字进行比较。同样有趣的是，理解一项法医分析如何能够忽略美式英语（萨博所写）和英式英语（中本聪所写）之间的显著差异。


  ### 证据累积


  记者多米尼克·弗里斯比在其 2014 年出版的著作《比特币：未来的货币？》中也同样锁定尼克·萨博。弗里斯比提供了长篇大论的阐述，并揭示了其他旁证，例如萨博一生大部分时间都在这个领域工作，并且早在多年前就撰写过类似的想法。萨博在比特币问世前似乎还有一段空白期，期间他曾为某个项目寻求编码帮助。四个月后，`bitcoin.org`
  网站被注册，而萨博也在更新他关于相关“比特金”想法的博文。


  在语言证据方面，弗里斯比采用了斯凯·格雷那套存疑且未发表的假设，以及阿斯顿大学的学生报告。弗里斯比本人对中本聪的文章有深刻见解，声称其拼写非常一致地使用英式英语，但同时也发现了少数美式英语用法。由此，他得出结论，作者一定是美国人。然而，在始终如一的规范英式英语中出现少量美式英语，难道不是更能说明作者是接触过美国文化的英国人，而非接触过英国文化的美国人吗？这似乎才是更简洁的解释。


  最后一个观察涉及比特币的编码。没有任何证据表明萨博曾使用过`C++`编码。虽然有他用其他语言编码的例子，但这引出了一个问题：他为什么会选择`C++`。奇怪的是，弗里斯比在仅仅因为其他人不喜欢`C++`就几乎排除了所有其他人之后，却轻易地忽略了这一点。


  尽管弗里斯比迄今为止开展了最全面的研究，并揭示了大量新的旁证，值得称赞，但很难忽视两个确凿的证据：语言证据和代码证据。更直截了当的解释仍然是：中本聪是以英式英语为母语的人，并且具备记载详实的`C++`编码技能。即便萨博拥有创造比特币的想法、动机和机会，这两个条件也都不符合他。


  次年，纳撒尼尔·波普尔出版了同样详尽的作品《数字黄金：比特币与试图重塑金钱的怪才和百万富翁不为人知的故事》。他与弗里斯比一样，认为萨博就是中本聪。他设法私下联系到了这位通常深居简出的萨博，萨博否认自己是中本聪。波普尔重申了弗里斯比之前的观点，并补充了更多旁证，但同样未能解决语言和`C++`编码能力这两个核心问题。




  ## 剧情愈发复杂


  2015 年，《连线》杂志发表了一篇后来撤稿的文章，声称澳大利亚人克雷格·史蒂文·赖特就是中本聪。赖特本人也自称是中本聪，并将文件先发给了安全研究员格温·布兰文，随后又发给了《连线》杂志。这些文件最终被证实是一场精心策划的骗局。此后，赖特继续声称自己就是中本聪，并与已故的戴夫·克莱曼共同开发了比特币。


  他甚至声称能提供与中本聪相关的密钥来证明这一点，但最终这些密钥始终未能通过验证，而赖特则表示自己不愿继续提供所需证据。他甚至一度让加文·安德烈森等比特币资深人士信以为真，但由于没有提供密码学证明，这些说法始终无法得到证实。


  2019 年，《连线》杂志再次试图确认中本聪的身份，结果又离奇地与克雷格·赖特联系在了一起。作家兼记者埃文·拉特利夫花了五年时间追踪南非全球犯罪主脑保罗·卡尔德·勒鲁，此人恰好也是一名程序员。这项研究最终写成了一本关于勒鲁的
  400 页著作。在此过程中，拉特利夫多次发现一些间接证据，暗示勒鲁可能就是中本聪，但他又将这些线索搁置了。


  情况开始发生变化，是因为有人举报了佛罗里达州一起涉及数十亿美元的诉讼案。案件被告正是自称中本聪的克雷格·赖特。原告是赖特已故商业伙伴戴夫·克莱曼的兄弟艾拉·克莱曼。艾拉·克莱曼声称，赖特和克莱曼共同挖出了数十万枚比特币，而赖特将其全部转移到了自己名下。代表赖特的律师提交动议，要求封存他对某些具体问题的回应，理由是这会危及他本人、其他人以及国家安全。这些人员和脚注均被涂黑，唯独漏掉了他的律师忽略的一条。这是一条包含链接的脚注，链接指向一篇新闻文章和一篇维基百科文章，内容正是关于……保罗·卡尔德·勒鲁！


  拉特利夫重新翻阅了自己的笔记，开始重新审视那些他曾经忽略的间接证据，并发现了更多线索。以下是一些精选证据：勒鲁精通`C++`，并且在 20 世纪 90 年代就已经开发了一款磁盘加密工具，该工具后来被开源。他的年龄与中本聪合作者认为的年龄相符（生于
  1975 年）；作为一名国际毒枭，他比任何人都更有动机，并且对银行有着天生的仇恨；他获得了一本刚果外交护照，上面写着保罗·索洛希·卡尔德·勒鲁这个名字。这发生在他首次以中本聪的名义联系亚当·贝克的两周前。甚至中本聪消失的时间也与他
  2012 年被捕的时间吻合。


  至此，拉特利夫的分析遵循了此前确认中本聪身份的模式，但他退后一步，评估了针对勒鲁的证据：勒鲁并非学者，更关键的是，从哲学层面看，勒鲁并不像中本聪那样反对垃圾邮件，因为他运营着全球规模最大的垃圾邮件业务之一。这最终让拉特利夫有了如下认识：


  > *正因为勒鲁显然有可能是中本聪，所以他的可能性才更大。但这一等式缺失了一环：对所有也可能是中本聪的人进行统计。有数不清的程序员精通 C++且憎恨政府，他们觉得有责任为其他程序员署名，并使用了“为大众加密”这样的说法，他们有理由保持匿名，并且对数字货币表现出一定兴趣。要通过我的技术证明勒鲁就是中本聪，我必须推翻十几个、甚至上百个同样具有嫌疑的候选人。*


  ### 兜兜转转


  我们兜了一大圈，又回到了起点，对于中本聪是谁、或者如何找到他，依然毫无头绪。拉特利夫的文章似乎是我们所考察的所有先前调查的缩影：记者（因为这些调查全都是由记者撰写的）出于这样或那样的原因，直觉地锁定一个可能的嫌疑人，然后开始收集证据。支持性证据往往比反对性证据被赋予更大的权重。这也被称为“挑选事实”。所有先前的调查都是从嫌疑人出发，然后筛选证据，没有原则性的探究，却充满了假设和主观判断。拉特利夫值得尊敬，因为他第一个清楚地认识到，这种方法不足以提供证明中本聪身份的证据。因此，即便经过了十多年的严密审查，我们仍在寻找中本聪。


  现在是时候扭转寻找中本聪的方向了，应从源于学术历史研究的原则出发，而非临时的、拼凑事实的方法。因此，下一章将为更系统化地探究中本聪的身份，以及我们如何识别他，奠定一个基础。


  '
- '# 6. 分析中本聪


  ## 中本聪的历史基础


  为了在更坚实的基础上重启对中本聪的寻找，我们必须按照有原则的方式，顺序执行一系列步骤。第一步是要认识到这是一个历史问题，应该像对待任何其他历史问题一样进行分析和调查。借助现代史学研究方法的帮助，我们可以更有原则地处理这个问题。


  据历史与史学性质专家格奥尔格·G·伊格斯称，19 世纪以前，西方历史呈现出两种截然不同的历史写作传统。一种是学术性和古物研究性的，侧重于事实编目；另一种本质上是文学性的，侧重于讲述故事。直到
  19 世纪德国大学中诞生了现代历史学科，这种情况才得以改变。


  这一变革的主要推动者是德国历史学家利奥波德·冯·兰克，他于 1825 年成为柏林大学的历史学教授，并担任该职位长达 50 年。在他 1824 年的第一本书《1494
  年至 1514 年拉丁与条顿民族史》中，他用一句话指明了新方向，这句话后来成为了现代史学的口号，即历史学家的目的是“如实直书”。这在今天看来似乎不言而喻，但与当时注重讲述引人入胜故事的当代历史写作相比，冯·兰克使用了比同时代人更广泛的资料来源，并且只限于谈论那些有资料依据的内容，而非想象和推测。


  由此发展出了史料考证的实践，这在德国和斯堪的纳维亚史学流派中得到了特别详尽阐述。史料考证的目的是确保我们书写的历史是真实的。让我们来看看一些常见的史料考证原则，它们将作为我们寻找中本聪的指引。




  ### 原始资料与二手资料


  莱奥波德·冯·兰克的核心洞见之一，在于认识到原始资料与二手资料之间存在显著差异。原始资料能直接提供被调查历史问题的相关信息，即第一手信息。这些包括日记、抄本、信件以及部分学术论文。


  二手资料提供的是第二手信息，因此通过中介将历史问题的相关信息传递给读者。这些资料包含对原始文献材料的选择与诠释。例如传记、评论、书评以及新闻和评论文章。


  冯·兰克几乎到了完全否定二手资料价值的地步，极力推崇原始资料。原始资料确实能让我们更接近历史的本来面目，并且在历史调查中优先考虑原始资料是很有道理的。有时，在缺乏原始资料的情况下，使用二手资料可能会有帮助，但必须格外谨慎，以理解和说明资料来源的倾向性，这一点我们稍后再讨论。


  对于比特币而言，原始资料是那些与中本聪和比特币发展直接相关的资料——中本聪的所有著作、白皮书、与协作者的信件往来以及代码。二手资料则是关于比特币的访谈和文章。我们将优先采用第一类资料。


  ### 遗物与叙述


  另一个关键区别在于你如何使用资料来源。通常，我们会区分所谓的“遗物”和“叙述”。叙述最容易理解，它向我们讲述某件发生过的事情。另一方面，遗物则告诉我们关于资料创建者在创建该资料时的某些信息。库克船长船舰“决心号”上一位水手的日记，既可以是遗物，告诉我们水手当时的语言水平、教育程度、精神状态以及价值观和态度；也可以是一份关于欧洲人与夏威夷人首次接触的叙述。将资料作为遗物使用比作为叙述更可信，因为叙述带有偏见。遗物不会说谎，但叙述会。


  就比特币而言，我们可以将中本聪的著作作为遗物，用以说明他的语言、教育、态度、风格和写作时间。我们可以将协作者的访谈作为关于比特币诞生以及中本聪其人的叙述。


  ### 资料来源的倾向性


  解读资料来源时，必须始终考虑其倾向性或偏见。资料来源的作者有何利益诉求？这种诉求与资料所传达的信息如何契合？库克船长“决心号”航海日志中关于库克船长死于夏威夷人之手的节选，必然会带有偏见，倾向于描绘欧洲人自认为与夏威夷人交往的文明方式。因此，将夏威夷人的行为描绘成野蛮的叙述是有偏见的，不能只看表面。要使用任何资料来源，我们必须在将其用作任何事物的证据之前，先弄清楚作者的利益诉求。这也意味着，那些与偏见无关的中立信息是可以使用的。这些信息可以说是作者没有正当理由撒谎的信息。这在历史记述中经常被使用。因此，与偏见相悖的信息将具有更大的价值。使用符合其偏好的资料来源信息，即使有，价值也很小。例如，对一位疑似中本聪之人的采访，会倾向于不透露此人就是中本聪的证据，因为中本聪不想被识别出来。因此，这类资料来源没有任何价值。


  ### 与事件的时间接近性


  资料来源的价值会随着其与事件时间接近性的增加而增加。在库克船长与夏威夷人相遇时，在夏威夷的“决心号”上写下的一篇日记，其价值远高于 50 年后一位水手撰写的自传。


  尽管比特币的问世是相对较晚的事件，因此时间上相当接近，但接近事件的原则仍然很重要。因此，更接近比特币和中本聪诞生时期的资料来源，要优于后来的访谈，即使这些访谈是针对关键人物的。


  ### 独立印证


  最后一个重要原则与相互印证有关。能够确认某一事态的独立资料来源越多越好。仅有单一记述，即使质量很高，依赖它也可能会很危险。对于任何事实，我们都应该从其他来源找到独立的印证。


  这意味着我们应该寻找其他方法来为我们确定的每一个事实获取独立印证。以往许多调查过于依赖单一观察，比如一句评论或事件在时间上的接近性。这可能导致得出虚假的结论。这并非总是可行，但如果没有佐证，任何主张都是站不住脚的。


  ### 简约性原则


  在这些史料考证的历史原则之上，还应加上一条一般的科学原则——简约性原则。该原则认为，用于解释的实体不应超出必要的范围。我们在之前识别中本聪的尝试中已经看到这样的例子。一些作者最终提出是中本聪是由两人或更多人组成，因为单独一人只能符合部分事实。这是一种不必要的实体倍增，超出了必要范围。


  这也被称为奥卡姆剃刀。该原则要求，在比较相互竞争的假说时，必须优先选择假设最少的那一个。另一种说法是，面对多个相互竞争的理论，应选择最简单的解释。当然，这并不能保证我们一定能找到真相，但这就是科学工作的性质。然而，这确实能极大地增加我们找到真相的可能性。唯一的替代方案就是挑拣事实，走上阴谋论的道路，即为了支持自己的主张，发明精巧的理论来解释不符的证据——如果我们还能正视这些证据的话。


  ### *Ad Fontes*（追本溯源）：资料来源能告诉我们什么？


  在确立了这些原则之后，让我们来审视与比特币及其创造者诞生相关的各类资料来源。一个普遍的观察是，那些可归因于中本聪的资料是原始资料，因此优先于所有其他资料。


  关于在提到中本聪时使用男性代词的简短说明：中本聪是女性并非不可能，但在密码学这样一个女性比例仅为个位数百分比的领域，在我们开始审视实际证据之前，最简单的假设是作者是男性。我们将在后面回到这个问题。


  ### 比特币白皮书


  比特币白皮书是识别中本聪最重要的单一资料来源。这是一份原始资料，能让我们直接了解中本聪背后的人物，因为是他撰写的。因此，它可以告诉我们很多关于他本人的信息，包括他的风格、价值观和偏好。首先要注意的是，它使用流利的英式学术英语撰写。


  它的格式遵循了 IEEE 出版标准格式的指南。学术出版领域有许多相互竞争的标准，每种标准都略有不同。因此，作者必然至少提交过一篇使用 IEEE 指南的论文，该指南在计算机科学领域应用相当广泛。


  因此，中本聪必然具有学术背景。他不必是专职学者，但至少曾在某个时候参与过计算机科学领域学术论文的准备工作。




  ### 信函往来


  中本聪在多个公共论坛上进行了大量通信。据估计，其通信总量超过八万词。这是一个相当可观的语料库。这些论坛帖子也是可用作遗迹的第一手资料。例如，我们将会发现，发帖时间对于确认中本聪的身份至关重要。这些通信也是重要的资料来源，因为其中最简单的一个假设是：中本聪不会在公开场合与自己对话。此外，论坛帖子也可以让我们了解其创造背后的历史与动机。


  另一组与中本聪通信相关的资料来源是电子邮件。这些邮件是在比特币的重要性已得到证实时才向公众公布的。其中也包含一些对中本聪在邮件中所言内容的评论。从技术角度来看，这些邮件的可靠性较低，因为电子邮件数据极易被篡改。而且，与论坛帖子相比，它们离事件发生的时间更远，因此不能被视为同等价值的资料。


  ### 技术取证证据


  比特币代码是第一手资料，展示了中本聪的编码风格。因此，它是一项关键证据，因为任何被认为是中本聪可能人选的人，都必须具备编写原始比特币代码的技能。


  区块链本身也可以作为一种资料来源。我们将看到，关于嵌入了一段引文的创世区块，已有大量讨论。这是一个无法伪造的证据范例，它或许能告诉我们一些关于中本聪背后那个人的信息。


  还有其他技术来源，例如 `bitcoin.org` 网页。通过互联网档案馆，我们可以看到该网页在不同时期所显示的内容。中本聪已知的电子邮件地址也可能提供线索。


  ### 采访


  另一大类证据来自后来对比特币形成期关键人物的采访。这些都是二手资料，主要可作为佐证使用。它们在时间上距离更远，且依赖于记忆和后来的历史发展。这些资料本身几乎没有价值，只有当它们提及一些无法从第一手资料中得知的信息时才有意义。


  ### 资料来源与中本聪


  这几点处理资料来源的实用原则，将为我们分析当前问题提供指导。我们看到资料来源可分为四组：


  -   关键资料来源：比特币白皮书

  -   中本聪与协作者在公共论坛上的通信

  -   技术取证证据

  -   后来对与中本聪关系密切的早期比特币参与者的采访


  在更牢固地掌握了这些资料来源的性质之后，我们就能更好地开始寻找中本聪。我们将优先考虑中本聪本人撰写的第一手资料，特别是那些无法或难以伪造的事实，例如技术取证证据。其他二手资料可作为佐证，并帮助填补空白。接下来，我们将构建一个关于中本聪背后那个历史人物我们所知信息的画像。


  ## 构建中本聪的画像


  基于我们对资料来源的了解，我们现在可以开始探究关于历史上中本聪的已知信息。接下来，我们将根据从这些资料来源中能了解到的信息来构建一幅画像。但在那之前，有必要反思一下中本聪之谜的根源，即：他为什么要使用化名？要理解这一点，我们必须回到中本聪发表其理念的时候。那是一个涉及虚拟货币的几个引人注目的案件导致创始人陷入严重法律问题的时期。2007
  年，美国联邦调查局以涉嫌洗钱、邮件欺诈、电信欺诈和伪造货币为由，突击搜查了伯纳德·冯·诺特豪斯的自由美元。当时尚未正式提起诉讼，但在另一次对虚拟货币的打击行动中，e-gold
  的创始人已经达成认罪协议，承认无证经营资金传输业务并共谋从事洗钱活动。没有理由认为美国当局会对像比特币这样的项目持有不同看法。


  ## 假设


  如今，虚拟货币的创造者不会受到起诉，并且存在更透明的监管规定，这使得比特币的创造者面临法律纠纷的可能性大大降低。那么，他为什么还不站出来？比特币的巨大成功只会加剧最初的担忧。中本聪这个化名背后的历史人物坐拥超过一百万个比特币，价值高达数十亿美元。站出来，最好的结果是使他难以过上平静的私生活，最坏的结果则是给他自己和家人带来严重的人身威胁。


  因此，我们完全有理由预期，无论中本聪背后的人是谁，他都不太可能承认这一点。另一方面，反过来推断并不成立——有些人认为，否认自己是中本聪就是证明此人是中本聪的证据。接下来，我将提出几个假设来指导分析。我认为，任何对中本聪背后历史人物的指认都必须符合这些假设。


  ### 统一性假设


  第一个是统一性假设，即所有署名中本聪的文字都出自同一作者之手。这意味着我们认为，编写代码的人与撰写白皮书、比特币网站、密码学邮件列表中的电子邮件以及以中本聪名义发表的各类论坛帖子的人是同一个人。


  ### 单一性假设


  第二个是单一性假设；与之前的一些尝试相反，我认为没有理由认为这不是一个人。正如我们之前所见，“中本聪背后有多人”的理论曾被用来弥补无法将所有事实都归因于一个人的缺陷。但作为一种解释方法，这是不可取的。我们希望得出最简单的解释。允许多人组合而成中本聪，首先就引发了一个问题：一群人有现成的多个独立化名可用，为何要采取史无前例的步骤以一个人名写作？这为纯粹的幻想敞开了大门，任何一个人都可以被挑选出来对应任何事实。虽然这有可能是真的，但这并非一种有原则的分析方法。




  ### 常态假设


  第三个假设是常态假设。它更多地关乎我们能围绕中本聪展开何种对话。人们可能会提出各种阴谋论，认为个别证据是中本聪或其他幕后邪恶势力故意伪造的。这类情景无法排除，因为它们属于理论上的可能性范畴：美国国家安全局（NSA）和联邦调查局（FBI）可能指派某个部门创建比特币以追踪犯罪交易，或者某个秘密的恋童癖圈子策划了比特币的诞生，以便在不受政府监管的情况下更便利地进行未成年人贩卖。这些理论可能是真的，就像地精的存在或地球是扁平的一样，但它们超出了严肃讨论的范畴，仅仅依赖于*先验*信念，并有系统地无视事实和论点。


  与此相反，我将回归对人类行为的常态假设。在比特币创建时，创造者不可能预见到它会变得如此庞大，尤其是考虑到早期虚拟货币的先例。因此，那些精心设计的计划——比如从一个化名账户给自己寄信，对自己以化名发布的帖子进行评论以制造掩护，或者让每位帖子都由英国英语使用者翻译或校对——都显得过分，超出了正常人类行为的范畴。历史上的中本聪被假定为，至少最初只是以中本聪这个化名与比特币社区互动，并使用对他而言最自然的语言写作。他只表达他本人持有的观点。


  我并不打算基于间接证据进行推测。我将只依赖最简单合理的解释，即中本聪只是一个用母语向不同人讲述他自行编程的电子现金项目的人。那个项目后来被称为比特币。


  ## 剖析中本聪


  让我们看看基于现有证据我们能得出什么结论。尽管我们拥有大量的文本资料，但它们几乎全部聚焦于技术细节。几乎没有提供任何个人线索，也很少有其他明确的陈述可以用来描绘中本聪这个人物背后的详细形象。


  ### 性别


  没有明确的性别指向，但现代密码学和虚拟货币领域几乎完全是男性主导的领域。至少，我没能在这个领域找出超过几位女性。辛西娅·德沃克（Cynthia Dwork）是一个例外。从历史角度看则有所不同，因为在二战前后，有相当数量的女性从事密码学工作。


  同样，男性在密码学邮件列表中占主导地位。大约在中本聪活跃的时期，我只能找到林恩·惠勒（Lynn Wheeler）和桑迪·哈里斯（Sandy Harris）作为活跃在列表中的女性例子。当然，这些不一定是她们的真实姓名。所有我能确认的身份都是男性。


  ### 年龄


  在 P2P 基金会论坛上，中本聪列出的出生日期是 1975 年 4 月 5 日。鉴于中本聪对匿名的执着，没有理由相信这个日期。就像名字一样，人们也费了一番心思从这个日期中挖掘象征意义。1933
  年 4 月 5 日，美国总统富兰克林·D·罗斯福签署了 6102 号行政命令，禁止私人拥有金币、金条和金元券。对于许多对虚拟货币感兴趣的 libertarians（自由意志主义者）来说，这是一个重大事件。1975
  年则是美国再次允许私人拥有黄金的年份。然而，中本聪并非特别关注黄金。在我们所拥有的资料中，他仅两次提及黄金。第一次是在比特币白皮书中，他用挖金矿来解释比特币挖矿的概念。另一次是在提及
  e-gold 公司时，该公司后被 FBI 关闭。


  尽管这并非一个不可能的解释，来说明为何选择 1975 年 4 月 5 日这个特定日期，但还有其他迹象表明这个日期很可能比较接近。他的年龄可能稍大，但不会年轻太多。


  中本聪的密切合作者，比如在中本聪之后接管比特币开发的加文·安德烈森（Gavin Andresen），也暗示他大概在那个年龄段。选择 C++可能是一个线索。C++于
  1985 年首次出现，对于在 90 年代初开始学习的人来说是一个自然的选择。那时，它是最流行的面向对象语言。哈尔·芬尼（Hal Finney）在 2014 年接受安迪·格林伯格（Andy
  Greenberg）采访时，对中本聪使用 C++的情况评论道：“中本聪深谙其复杂性，我只在年轻程序员身上见过这种能力。如果你不是在年轻时学习 C++，似乎很难精通它。”


  Java 创建于 1995 年，如果中本聪是在 90 年代末接受教育，那将是一个自然的选择。如果中本聪年龄更大，且在 70 年代或 80 年代接受教育，那么可能的选择会是
  C、Fortran 或 Pascal。选择 C++与大约 1990 年开始接受教育的情况相符，这会将出生年份定在 1970 年至 1975 年之间。任何人都可以学习
  C++，但最简单的解释是，当他开始比特币项目时，C++是他最熟悉的语言，而这门语言很可能是在他性格形成时期学会的。




  ### 地理定位


  幸运的是，有更好的证据可以定位中本聪的位置。在对法证证据进行的最彻底调查之一中，唐乔·卡拉伊万诺夫提供了令人信服的证据，证明中本聪一定曾在英国，很可能在伦敦。


  通过绘制中本聪活跃期间（他在论坛发帖、发送邮件以及向 `SourceForge` 提交代码时）的 742 个已知时间戳，可以清晰地描绘出他的活动模式。首先，这排除了日本和澳大利亚作为候选国家。如果他是在澳大利亚或日本工作，那他必须像吸血鬼一样生活，白天从不工作，只在夜间活动。另外三个曾被提及的时区是：格林威治标准时间（英国/欧洲）、东部时间（美国东海岸）或太平洋时间（美国西海岸），这些都有可能。


  基于时间戳数据的文章总结道：“乍一看，这三个地点似乎都说得通。在伦敦，他是个夜猫子，工作到凌晨，然后睡到中午。在东海岸，他工作到一天结束，然后睡到清晨。在西海岸，他是个早起的鸟儿，晚上睡得很早，但起得也非常早。仅看这些数据，我们无法排除合理怀疑，确定中本聪到底生活在哪个时区。”


  最终将识别结果倾向伦敦的证据，实际上嵌入在比特币的区块链中。在所谓的创世区块（2009 年 1 月 3 日创建的第一个区块）中，嵌入了以下信息：“财政大臣濒临第二次银行救助。”
  这句话出现在 2009 年 1 月 3 日的*泰晤士报*印刷版头版上。*泰晤士报*在全英国发行，但在 2008 年，其 43%的读者来自伦敦。该报也有美国版，但其内容与英国版不同。


  *泰晤士报*也有一个网站，如果中本聪生活在另外两个时区之一，他也可以在网上浏览，但网络版的标题略有不同：“财政大臣阿里斯代尔·达林濒临第二次银行救助”。必须说明的是，网站上也有封面图片，中本聪可能看到过封面，但这位于“我们的报纸”菜单下，该菜单位于“存档”菜单的最右侧。如果你在寻找日常新闻，点击这个菜单是件很奇怪的事。还有其他方式可以看到这个标题：路透社提供了一篇文章摘要，其标题与印刷版相同。同样，这也是一种比较奇怪的阅读新闻的方式。因此，最简单的解释是，中本聪订阅了*泰晤士报*，并在
  1 月 3 日看到了印刷版的头版。


  有些证据把中本聪居住在伦敦这幅图景给搅浑了。比特币白皮书 PDF 初稿的元数据中的时间戳显示时区为 UTC-7。夏令时将地点指向了太平洋时区。目前尚不清楚这有什么意义，但法证证据中的另一个有趣线索可能表明，中本聪在
  2009 年 1 月下旬曾在加州。多米尼克·弗里斯比提到，在最初只有中本聪和哈尔·芬尼运行比特币时，芬尼曾发布了一组调试信息的日志。这份日志显示，当时中本聪的机器正在加州运行。那是在
  1 月 3 日的创世区块和 1 月 8 日比特币启动之后，哈尔·芬尼已经开始运行比特币。我无法核实这一点，弗里斯比提到的日志也无法在他提供的链接中找到。尽管如此，中本聪可能当时正在访问加州。他可能是一名学者，可能在加州某所著名大学进行学术研究或参加会议。2009
  年 3 月 24 日保存的比特币白皮书 PDF 第二版的元数据显示为 UTC-6，即山区时区，因此中本聪的电脑位于新墨西哥州、犹他州、亚利桑那州或类似地区。也许他当时正在休假旅行？也许是别人生成的这些
  PDF？谁知道呢？无论如何，这些孤立的证据并不能否定绝大多数证据所表明的中本聪位于伦敦或至少是英国的观点。


  如果我们看看另外两个候选时区，它们表明中本聪在三年多的时间里一直是在工作日期间开发比特币。这意味着他是在全职开发比特币。因此，他必须有足够的储蓄来维持三年的生活。那会是很大一笔钱。他是从哪弄到这笔钱的？他的同行判断，这些代码并非出自专业程序员之手。另一个同样非常间接的法证证据表明，他的电脑性能不强。在
  `Bitcoin Talk` 的一次讨论中，用户 `MoonShadow` 写道，当只有中本聪一个人在挖矿且难度很低时，两个区块之间需要好几个小时。这表明电脑性能并不特别强大。如果你攒了三年的钱来搭建一个系统，却没有钱买一台性能强大的电脑，这很奇怪。我认为更可能的情况是，中本聪有一份全职工作，而把比特币当作一个业余项目在下午和晚上开发。这再次与
  GMT 时区数据（显示他在晚上和夜间编写代码）更为吻合。


  总之，我们可以说，中本聪在日本或澳大利亚的可能性极小；在美国东部或太平洋时区有可能，但可能性不大；而他在 GMT 时区（可能在伦敦或英国其他地区）的可能性极大。


  ### 国籍


  这个名字毫无疑问是日式的，有些人试图从中解读出含义。*Satoshi*（聪）的意思是“思维清晰、机智”，而*Nakamoto*（中本）则意为中心起源，指住在中间的人。我不确定这该如何解读。这并非一个稀有的名字：美国有几位名叫中本聪的人。网站
  `transfermarkt.com`（列出世界足球运动员身价）统计显示，姓“中本”的职业球员不少于 66 名，名“聪”的有 115 名。因此，这个名字似乎足够常见，以至于即使是不懂其含义、对日语和日本文化没有详细了解的人，也可以将其选作化名。将中本聪与日本联系起来的线索仅有一条：他使用了邮箱地址
  `satoshi@anonymousspeech.com`。网站 `anonymousspeech.com` 是一家总部位于日本东京的公司。但中本聪也使用过其他以匿名性著称的邮件服务，比如总部在欧洲的
  `vistomail.com` 和 `gmx.com`。


  大家一致认为，中本聪使用近乎完美的英式英语写作，这表明他的国籍应在英联邦国家，很可能是英国。另一种可能是澳大利亚、新西兰或南非，但尚未发现任何属于这些国家的独特短语或术语。


  毋庸置疑，中本聪始终如一地使用英式英语。他使用英式词汇如“bloody”，拼写采用英式的“-ou-”（如“labour”）而非美式的“-o-”，以及英式的“-ise-”（如“realise”）而非美式的“-ize-”。偶尔也会用到美式词汇，但这在当今几乎任何语言中都很常见。要像中本聪那样，如果他不是以英语为母语的英国人，却令人信服且始终如一地伪装成一门外语，很可能需要像反间谍机构里那样进行多年的训练。如前所述，中本聪来自英联邦；从现实角度讲，这可能是英国、澳大利亚、新西兰或南非。考虑到他很可能位于英国，因此，他很有可能是英国人。




  ### 教育与工作


  关于中本聪的教育背景，确切信息甚少。从比特币白皮书的参考文献来看，他显然接受过数学或计算机科学领域的高等教育。很难精确判断其具体专业或最高学历，但很可能是硕士或博士。他对密码学有特殊兴趣，因为他曾在密码学邮件列表中活跃，并对特定领域有深入了解。他还对点对点计算感兴趣，参与
  P2P 基金会论坛便是佐证。


  比特币白皮书显示出作者对学术写作、结构和引用标准的扎实掌握。有理由推测他此前至少发表过一篇文章。在中本聪离开后接手比特币开发的加文·安德烈森认为，他的代码并非出自专业程序员之手。他可能曾从事安全领域的学术研究、科研或顾问工作。


  有人推测他曾在银行业工作或接受过金融教育，但这难以证实，因为他留下的内容大多集中在技术细节的解决上。他确实数次提及经济和银行业，但这些言论似乎不过是标准的自由意志主义论调，在密码学邮件列表中随处可见：银行很糟糕，部分准备金制度很糟糕，他们不负责任地放贷制造信贷泡沫，央行制造通货膨胀等等。他偶尔会引用奥地利学派经济学家的观点，但当用户`xc`于
  2010 年 7 月 27 日发表了一篇关于货币理论的深度文章，引用米塞斯和罗斯巴德讨论货币回溯、货币起源以及比特币如何满足这些条件时，中本聪似乎并未理解。作为回应，他提出了一个奇怪的思想实验，设想一种没有实际用途的稀缺金属，并能通过通信渠道进行传输。他执着于稀缺性这一属性，而这完全偏离了`xc`那篇文章的要点；他没有提供任何参考文献，而是回归到“我认为”的表述。这段文字与他撰写密码学或技术内容时展现出的自信形成了鲜明对比。因此，我认为中本聪不太可能接受过本科以上的正规教育，或拥有金融、经济相关的工作经验。


  ### 价值观


  中本聪的价值观倾向自由意志主义和反政府，但并非极端，这从 2010 年 12 月底的一起事件中可见一斑。当时有人建议维基解密开始使用比特币，Bitcoin Talk
  论坛上的其他用户表示支持，但中本聪相对坚决地反对。他的理由是这会引来不必要的关注。


  如前所述，他对央行持批判态度，因为它们滥发货币。银行也很糟糕，因为它们会与政府合作，损害你的隐私。它们还收取过高的服务费用，这也是他持续争取免费交易的原因。


  他并无激进的自由意志主义观点，比如废除所有政府权威，或彻底解除政府对于非法物质贸易的监管——而这正是后来一些比特币支持者所主张的。没有证据表明他的动机是促进毒品交易、洗钱或任何其他非法交易。事实上，当他举例说明比特币的用途时，这些例子显得有些平淡无奇。在
  2010 年 9 月 23 日的一个论坛帖子中，他写道：“比特币对于那些没有信用卡或不想使用现有信用卡的人来说会很方便，他们要么不想让配偶在账单上看到这笔消费，要么不放心把卡号告诉色情网站，要么担心被重复扣费。”


  在 2009 年 1 月 17 日回复达斯汀·特拉梅尔时，也就是比特币诞生之初，他将比特币设想为多种用途：积分奖励、捐赠代币、游戏内货币，或成人网站的微支付。中本聪设想的其他潜在应用还包括订阅网站和电子邮件工作量证明。最后一点直接取自`Hashcash`，但积分奖励的用途在千禧年之交也已存在，正如我们之前看到的`Flooz`和`Beenz`。


  这些构想似乎更多源自一个中产阶级的理想主义者，而非一个革命性的反政府毒枭或激进的自由意志主义经济思想家。


  因此，公平地说，中本聪倾向于自由意志主义，但并非政治或行动意义上的革命者。事实上，他明确拒绝了这种革命倾向。他不信任政府，但并非明确反政府。他似乎更关注订阅、隐私、积分奖励、捐赠、配偶这类中产阶级议题，并且会阅读报纸。


  ## 中本聪画像总结


  关于中本聪，能确切说明的信息不多。尽管如此，基于原始资料，我们仍能获得一些可靠线索，按确定性递减顺序排列如下：他极有可能是男性，英国人，居住在欧洲/英国，很可能在伦敦地区。可能出生于
  20 世纪 70 年代初，受过长期的学术教育，专业可能是计算机科学或数学。使用 C++编程。全职从事 IT 安全领域的学术研究、科研或顾问工作。并非革命者，而是具有自由意志主义倾向的理想主义者。可能已婚，过着稳定的中产阶级家庭生活。在技能方面，他对工作量证明、点对点技术、虚拟货币和私钥加密有深入了解。


