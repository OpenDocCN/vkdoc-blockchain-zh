- '# 7. 常见嫌疑人？


  如前所述，之前提出的中本聪身份似乎有待修正。我们绘制的画像进一步支持了这样的结论：此前的尝试尚未找到中本聪的真实身份。我们掌握的最有力的法医学证据是，中本聪是英国人，居住在伦敦。之前的嫌疑人无一符合这一事实。有必要将目光投向更广的范围。


  因此，我们必须想办法扩大搜索范围。最好的办法是再次审视中本聪本人撰写的原始资料。正如我们所见，他并未明确提及自己或任何合作者，但比特币白皮书引用了其他几位研究人员的成果。在学术界，引用导师、合作者，尤其是引用自己的成果，是非常普遍的做法。这为搜索开辟了一条激动人心的新途径：中本聪是否会引用自己？即使他没有，我们也能从中获得关于他所属的社交和学术圈子的重要线索。那么，让我们回到比特币白皮书的参考文献列表。




  ## 重新绘制嫌疑人名单


  比特币白皮书中列出了八篇参考文献，涉及总共十位不同的人物。在附录中，我详细分析了这些人的身份，以及他们在多大程度上符合中本聪的特征。这份引用列表是我们寻找中本聪众多线索之一。从白皮书中我们可以推断，他受亚当·拜克的`Hashcash`和戴维的`B-money`启发最大。这些理念可能唯一被详细讨论过的地方就是密码朋克邮件列表，拜克和戴维在
  20 世纪 90 年代末在那里宣布了它们。历史上的中本聪很有可能曾是那个社区的成员，并从中了解了`Hashcash`和`B-money`。由于该列表包含数千名普遍对密码学感兴趣的成员，他们并非都对虚拟货币这一相对小众的领域感兴趣。因此，我们应该将范围缩小到那些积极参与`Hashcash`和`B-money`相关讨论的成员。中本聪很可能就是这样做的。


  `Hashcash`于 1997 年春天被提交到该列表。此后，它被讨论过几次。`B-money`于 1998 年秋天在该邮件列表中被提出，随后也被讨论过几次。总而言之，这两个提议都没有引起太多关注，但仍有相当数量的人做出了回应。总共有
  19 个可识别的个人与戴维和拜克进行了互动，就这两个想法提供反馈并提出问题。


  这样一来，我们就得到了一个 29 人的名单，理论上他们每个人都可能是历史上的中本聪。在表 7-1 中，我们可以看到他们与我们构建的画像标准的匹配程度。`M`表示我们有证据表明此人符合该标准。`D`表示我们有证据表明此人偏离且不符合标准，而`U`表示根据我所能找到的证据，情况未知。


