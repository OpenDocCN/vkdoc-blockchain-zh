- fmt: '# Public Key Encryption


    During World War II, an arms race took place in cryptography. Still, even if it
    that led to ever more sophisticated encryption, it was symmetric encryption and,
    as we just saw, that requires a prior distribution of a shared key for encryption
    and decryption. This is known as the key distribution problem, which had been
    considered impossible to solve for thousands of years.


    ## Diffie-Hellman-Merkle


    Around the middle of the 1970s, one of the most fruitful partnerships in cryptography
    started. Whitfield Diffie had been thinking about the key distribution problem
    for a while. In 1974 he was invited to IBM’s Thomas J. Watson Laboratory to give
    a talk about various strategies for attacking the key distribution problem. After
    the talk, he was told that a Stanford professor named Martin Hellman had recently
    visited and was working on the same problem. Diffie joined Hellman in California,
    and they immediately found common ground. They were looking for a way to arrive
    at a common key without ever exchanging it. They worked together with Ralph Merkle
    on this problem. After two years without any progress, Hellman came up with a
    solution. It works like this: Alice and Bob agree on a mathematical one-way function.
    Alice picks a private key (say 3) and generates a public key (4) using the function.
    Alice then sends this key to Bob. He generates his own private key (5) and uses
    the same function to generate a public key (6) that he sends to Alice.


    Alice then takes Bob’s public key and her own private key to generate the encryption
    key (9). Bob similarly takes Alice’s public key and his own private key to generate
    the encryption key (9). Now the beauty of the mathematical function that Hellman
    found was that it ensured that Alice and Bob would thus be able to generate the
    same key (9) without it ever being shared publicly. Moreover, even if an eavesdropper,
    Eve, intercepted the entire communication, she would not be able to generate the
    key since Alice and Bob’s private keys are necessary to do that. The resulting
    process is known as the Diffie-Hellman-Merkle key exchange and was the first time
    a solution to the key distribution problem was published.


    This significantly improved the possibility of secure encryption since the confidentiality
    of the key was always the Achilles heel of cryptography. With the advent of modern
    telecommunications, things started to change in how we share information. It became
    more ubiquitous and easy. Still, even with Diffie -Hellman-Merkle key exchange,
    you would have to wait for the reply of the person you communicated with, and
    the encryption and decryption was done with the same key. It was, therefore, still
    traditional symmetric key encryption that required key distribution.


    Consequently Whitfield Diffie continued thinking about the problem of key exchange.
    If he could find a solution where the encryption key differed from the decryption
    key, key distribution would be dispensed with altogether. Diffie eventually found
    a way this could be done. It was published in the seminal paper by Whitfield Diffie
    and Martin E. Hellman titled “New Directions in Cryptography” in 1976. They noted
    that with modern telecommunication (or teleprocessing as they called it), an increased
    burden arose on the key distribution channels. Finding secure channels and establishing
    a shared key before communication could start was cumbersome, especially between
    parties that did not know each other in advance. Technologies like the telephone,
    telex, and the Internet have high speed and bandwidth compared with other sources
    but are easy to wiretap. It is impossible to be confident that there is no eavesdropping.


    The paper argued that two problems needed to be solved: privacy and authentication.
    Privacy was to be solved with public key encryption and authentication with a
    digital signature.


    Diffie and Hellman suggested a method from which two keys could be constructed
    from a random number: a public and a private key. The public key can be shared
    over nonsecure channels and used to encrypt messages that can only be decrypted
    with the private key. Note the difference between Diffie-Hellman-Merkle key exchange
    and actual asymmetric encryption. In the former, a back-and-forth is necessary
    to ensure encryption. In the latter, this is not needed as long as the receiver’s
    public key is known. This would eventually be a key feature for making it convenient
    to send money with Bitcoin: only the receiver’s public key is necessary rather
    than a cumbersome back-and-forth exchange to generate a shared key.


    ## The RSA Paper


    Diffie and Hellman could, however, not prove in detail how to achieve that. That
    would only be done the following year, in 1977, when Ron Rivest, Adi Shamir, and
    Leonard Adleman published their groundbreaking paper “A Method for Obtaining Digital
    Signatures and Public-Key Cryptosystems.” The computer scientist Ron Rivest worked
    at MIT on the other end of the country and read the Diffie-Hellman paper. He was
    fascinated and tried to get his colleagues, Adi Shamir, also a computer scientist,
    and Leonard Adleman, a mathematician, interested. Initially, they were not too
    enthusiastic. They tried different possibilities and almost lost hope that the
    function Diffie and Hellman looked for could be found. But in the spring of 1977,
    Rivest came upon an idea that would work.


    The algorithm would be known as the RSA algorithm based on the authors’ surnames.
    They suggested doing this based on prime factorization. It works by finding two
    very large prime numbers. These are the private key. Factoring them together generates
    a public key. Anyone could use this to encrypt a message. The function used to
    encrypt is a one-way function, which means it cannot be decrypted using the same
    key. The only key that can be used is the private key.


    Public key encryption, in general, works by creating two mathematically related
    keys: a public key and a private key. You can now display the public key for anyone
    to use to encrypt messages for you. The resulting ciphertext can now only be decrypted
    with the private key belonging to the public key that was generated in the key
    pair. It follows that anyone could display their public key for people to use
    for encrypted communication without any previous engagement. This model suited
    the new world of ubiquitous and easily accessible telecommunication.'
