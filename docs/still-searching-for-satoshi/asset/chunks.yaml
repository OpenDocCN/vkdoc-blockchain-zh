    Still, no security would be allowed to be traded on such a tenuous promise in
    the traditional world of finance. The popular cryptocurrency XRP aims to be a
    more efficient cross-border payment solution. Still, it has yet to make any noticeable
    dent in the incumbents like Western Union’s hold on the remittance industry. Litecoin
    is used for transfer between people, much like bitcoin but faster. Again, it is
    more the promise that it can do it than a unique real-world application since
    common applications like Zelle and Square provide such services to a vastly greater
    number of users. These examples are chosen because they are the most promising
    of the thousands of alternative cryptocurrencies and carry significant potential.
    But contrast this with stocks that already generate revenue and have a book value.
    It is not the same.


    Self-proclaimed “analysts” set targets for bitcoin, again mirroring a common practice
    for securities like common stocks or commodities like gold. Targets for bitcoin
    will be, for example, $100,000 or, as Ark Invest’s Cathie Wood has it, $1.48 million
    in 2030\. These targets are either taken out of thin air or supported by only
    the haziest of analysis, which invariably boils down to what-if scenarios and
    wishful thinking. Naturally, traditional analysts in the world of finance also
    have some element of uncertainty, but they are constrained by requirements of
    documentation of how they arrive at these assumptions. With the exception of more
    mainstream investors like Ark Invest, most analysis pays only lip service to traditional
    finance methods.


    Another area where the behavior of finance is mimicked is the application of technical
    analysis. Traders in the finance industry often use a technique called technical
    analysis, which in itself has been accused of being more magic than science. It
    relies on recognizing patterns in graphs of the value of traded equities. Basically,
    technical analysts believe that market movements are not entirely random and can
    be predicted by analyzing market data and applying various charting tools and
    technical indicators.


    These practices resemble the cargo cults building landing strips, marching with
    mock rifles, and copying colonial mores. There is no relation between the original
    application of these behaviors, how they work, and their application in the cryptocurrency
    world. One might counter that it has worked since many have gotten extremely rich
    from bitcoin. But then again, this is not uncommon for early members of cults
    in general or Ponzi schemes. The success of a few or even many individuals in
    the short term is no proof.


    We should also note that we only discuss structural behavior similarities across
    a diverse cryptocurrency community population. There are many exceptions to this,
    and bitcoin may yet become the future standard of value. Indeed that is what we
    will consider in the next chapter. It just currently has virtually no documented
    real-world use outside of its role as an object of speculation.'
  trans: '

    # 货物崇拜


    20 世纪 40 年代初，美国军队驻扎在当时称为新赫布里底群岛（今瓦努阿图）的地方。他们带来了大量的货物。数千名当地土著为美国人工作。战争结束后，美国人离开了瓦努阿图，当地一位宗教领袖的信徒修建了象征性的飞机跑道，希望能像他们曾看到的美国人在战争期间那样获得货物。他们还举行了军事游行，参与者穿着印有`USA`字样的
    T 恤。这一切都是为了模仿他们亲眼目睹的在战争期间带来大量货物的美国人。


    货物崇拜现象起源于 19 世纪末的美拉尼西亚，是对西方殖民主义的回应。太平洋美拉尼西亚群岛的原住民经历过西方殖民管理者、传教士和种植园主，这些人拥有更高水平的物质财富。随之而来的是现代技术、衣物和其他商品。在巴布亚新几内亚的皮钦语（托克皮辛语）中，`cargo`一词意为贸易货物或补给品。这个词后来更广泛地代表了财富。


    货物崇拜旨在获得殖民主义的生活方式与财富。其特点在于试图模仿西方殖民者的行为，以期获得同等水平的物质商品。例如，建造假飞机跑道，以及像二战士兵那样用木棍充当步枪进行操练。当地土著希望这样做会带来一种局面：要么祖先会带来类似的财富，要么殖民者会分享他们的财富。虽然货物崇拜起源于美拉尼西亚并在此盛行，但世界各地均有记载，尤其是在非洲和加勒比地区。这表明这种现象不仅仅是当地的文化特性，而是现代世界的一个普遍特征。


    `比特币`也表现出一些相同的特征，尽管背景完全不同。例如，这里没有原住民（除非你把数字原住民算作原住民）；本质上也没有祖先或仪式。然而，两者之间确实存在一些显著的结构性相似之处。


    同样存在一种对物质上和政治上更优越的社会组织的敌对情绪：货物崇拜是对西方殖民主义的回应，而`比特币`社区则是对政府和银行体系的回应。这些人认为政府和银行体系具有压迫性，同样被认为在奴役人们并剥夺个人自由。


    在`比特币`社区中，致力于`比特币`的人也同样模仿这种敌对行为。他们从投资银行家那里获取线索，应用类似的语言和行为。经常能听到他们谈论建立一个加密资产投资组合，其中包含不同类型的加密货币，如`莱特币`、`瑞波币`和`狗狗币`，以及`比特币`。这些投资组合模仿了传统投资中的组合方法，即通过将风险分散到几种不同的证券上，以实现更可控的风险状况。但传统的投资组合是基于具有内在价值和现实世界联系的证券。例如，股票赋予你一家公司的部分所有权，这家公司生产某种产品或有明确的盈利途径。大宗商品是实物，可以在市场上买卖。而加密货币，除少数例外，与现实世界没有任何联系，也不具备任何内在价值。它们大多无法被用作货币的基本功能：交换媒介。`狗狗币`除了作为投机对象外毫无价值。当然，人们可能相信它真的会成为火星上的货币，就像埃隆·马斯克暗示的那样。


    尽管如此，在传统金融世界中，没有任何证券会被允许基于如此不确定的承诺进行交易。流行的加密货币`瑞波币`旨在成为一种更高效的跨境支付解决方案。然而，它至今未能对西联汇款等传统巨头在汇款行业的地位造成任何明显的冲击。`莱特币`用于人与人之间的转账，与`比特币`类似但速度更快。同样，与其说它有独特的现实应用，不如说它更多是种承诺，因为像`Zelle`和`Square`这样的普通应用已为数量多得多的用户提供了此类服务。之所以选择这些例子，是因为它们是数千种替代加密货币中最有前景的，并具有显著潜力。但这与那些已经产生收入并具有账面价值的股票相比，情况截然不同。


    自称的`分析师`为`比特币`设定目标，这再次模仿了针对普通股票或黄金等大宗商品等证券的常见做法。例如，`比特币`的目标价可能会被设定为 10 万美元，或者像方舟投资的凯茜·伍德所预测的那样，到
    2030 年达到 148 万美元。这些目标要么是凭空捏造，要么只是基于最模糊的分析支持，而这些分析最终都归结为“假设”情景和痴心妄想。当然，传统金融领域的分析师也有不确定性因素，但他们受制于必须记录如何得出这些假设的要求。除了像方舟投资这样更主流的投资者外，大多数分析对传统金融方法只是嘴上说说而已。


    另一个模仿金融行为的领域是技术分析的应用。金融行业的交易员经常使用一种称为技术分析的技术，而这种技术本身就被批评为更像巫术而非科学。它依赖于识别交易证券价值图表中的模式。基本上，技术分析师认为市场波动并非完全随机，可以通过分析市场数据、应用各种图表工具和技术指标来预测。


    这些实践类似于货物崇拜者修建飞机跑道、用假步枪游行以及模仿殖民地的风俗习惯。这些行为最初的应用方式、其工作原理，以及它们在加密货币世界中的应用之间没有任何关联。有人可能会反驳说，这种做法已经奏效，因为许多人通过`比特币`变得极其富有。但话说回来，对于任何邪教或庞氏骗局的早期成员来说，这种情况并不罕见。少数甚至许多人在短期内取得成功并不能证明什么。


    我们还应该注意到，我们只是在讨论跨越不同加密货币社区人群的结构性行为相似性。这里存在许多例外情况，而`比特币`或许最终会成为未来的价值标准。实际上，这正是我们将在下一章讨论的内容。但目前，除了作为投机对象之外，它几乎没有任何有据可查的现实世界用途。

    '
- fmt: '# Millenarianism


    In their book *Three Worlds, and the Harvest of This World* from 1877, Nelson
    H. Barbour and Charles Taze Russel claimed to have determined the time of Jesus’s
    second coming to the earth to restore it to a paradise-like state. This they believed
    would be completed by 1878. When that did not happen, a new date was set. When
    that also did not happen, new dates continued to be set. This, of course, is the
    story of Jehovah’s Witnesses, a Christian movement that opposed certain key Christian
    teachings like the Trinity and the existence of an immortal soul. It is one of
    the most successful types of religious or social movements called millenarianism.


    Millenarianism is the belief in the imminent coming of a radically new constitution
    of the world that is qualitatively different and better. The impetus of these
    groups in Christian cultures can be traced to the passage in Revelation 20:1–10,
    where the imprisonment of the devil for a thousand years is foretold. The name
    *millenarianism* is thus derived from the Latin word for thousand: “mille.” Millenarianist
    movements often perceive the existing society as unjust and believe in an imminent
    transformation of the world that will rid it of the current corrupt regime and
    install a new and better one.


    This type of belief has influenced the history of Bitcoin in two ways. One is
    more mundane and the other more pervasive and subtle. For both of them, Bitcoin
    is not the end goal but the driver of the change. As we saw in the case of the
    similarity to cargo cults, it is not that Bitcoin by itself will bring wealth.
    Instead, Bitcoin is a critical ingredient in a more fundamental social or even
    cosmological change.


    ## The World of the Bitcoin Standard


    Among libertarians, the dream of the good old days of the gold standard in international
    monetary policy is a guiding light. The Bitcoin community has accepted this sentiment
    with the twist that bitcoin should be the new standard. The new world would see
    fiat currencies abandoned. Central banks and governments would no longer recklessly
    print money, effectively stealing it from ordinary people. Consider one answer
    on Quora that echoes this sentiment:


    > *Maybe the current monitory system is doing good for some, but the question
    is where is the wealth people labored for years? Why is it in the hands of the
    few? Isn’t it fraud to have these central banks, privately owned, print money
    and determine the value? What about the misery they cause, ranging from sanctioning
    countries or companies minding their own business to instigating wars? Who gave
    them that power to play God, to begin with? (…) Anywhere, it will be interesting
    to see how it goes but I am a firm believer banks must go. They are the world
    largest terrorist institutions the world have ever seen. The current fiat currency
    system is doing no good to the people of the entire world. Do you know how it
    sounds to have 7.6 billion people being held hostage by these banking cartels?*

    >

    > —User Emmanuel Bikorimana


    With Bitcoin, this oppressive power of the government and banks would entirely
    vanish, and people live in virtual communities where they choose their peers individually,
    forming smaller interest-based communities. Individuals would be completely free
    to choose because the bitcoin standard would ensure complete predictability, and
    no one would be able to interfere with it.


    With the new world of the bitcoin standard, individuals can be free. The people
    believing in this world often call themselves bitcoin maximalists and see themselves
    as digital nomadic tribes. With the coming of the new world order, they can live
    anywhere, and work and social interactions would take place online. The nation-states
    as we know them would no longer exist or be severely limited in their power. This
    is a pretty pedestrian change of the world as far as millenarian transformation
    goes.


    ## The Singularity


    The other way that millenarian thought has influenced Bitcoin is much more subtle
    but also pervasive. An argument could be made that Bitcoin would not exist without
    this current. This current is much more radical and even cosmic in its outlook.
    To understand it, we have to start in another place.


    One of the greatest prophets of Silicon Valley is Ray Kurzweil. With his technological
    leadership and decades of writing, he has inspired and stimulated technologists
    everywhere. With his groundbreaking book *The Age of Spiritual Machines*, he connected
    the technological progress of the computer age with the prospect of ontological
    transformation. Based on the insight that technological progress seemed to follow
    an exponential rather than linear progress at some point, humanity would hit the
    Singularity, which in mathematics is a point where a function is undefined. On
    the other side of this point, the world would be transformed.


    Humans would become post-humans. With neural implants, it would be possible to
    upload your mind to a completely virtual world of supercomputers and the Internet.
    It would even be possible to resurrect the dead and bring them back to life in
    this new world. This conviction is called transhumanism, which is the belief that
    humans will be able to overcome their limitations and transcend the human condition
    to become superhuman. While transhumanism is a fairly recent phenomenon driven
    in large part by the technological progress of the modern world, Meghan O’Gieblyn
    has shown the deep historical and religious roots of this movement. In her book
    *God, Human, Animal, Machine*, she investigates the roots of transhumanism.


    Contrary to the transhumanists’ own conviction that transhumanism is recent and
    can be traced back to Julian Huxley, who mentioned it for the first time in 1957,
    Peter Harrison and Joseph Wolyniak showed that the modern use of the word is attested
    for the first time in Huxley’s 1952 lecture “Knowledge, Morality, and Destiny”
    but that it has a far deeper history. It is mentioned in Dante’s “Divine Comedy”
    in book 9, where he invents a new Italian word, *transhumanar*, to describe the
    transformation that takes place of the human as he enters heaven. The word is
    translated to “transhuman” in Henry Francis Carrey’s 1814 edition of the “Divine
    Comedy.”


    O’Gieblyn shows how the thoughts of Huxley are influenced by his personal friend,
    the French Jesuit priest Pierre Teilhard de Chardin. In a 1947 essay, he noticed
    how the invention of mass communication like TV and radio had created a global
    network of human minds, which he called the “noosphere.” Progress would eventually
    lead to a dramatic transformation where a network of human machines would give
    way to an “‘etherized’ universal consciousness” that would span the globe. This
    would create an intelligence explosion, which he called the Omega Point that would
    enable humanity to “break through the material framework of time and space.” The
    similarities between this vision and Kurzweil’s singularity are evident.


    In order to see how this vision is at all related to Bitcoin, we need to consider
    another small group of technological zealots that have also had an outsized impact
    on the development of virtual currencies in general and Bitcoin in particular,
    that is, the extropians.'
