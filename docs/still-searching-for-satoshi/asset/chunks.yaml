    It thus seems likely that Bitcoin will remain volatile but also operational in
    the foreseeable future. Whether additional use cases can be added and Bitcoin
    expands its reach to other areas of society and the economy will be the topic
    of the next chapters.


    # 9. Social Organization


    Bitcoin cannot be compared to any other currency in our contemporary world with
    respect to the social engagement it elicits. Nobody is tweeting incessantly about
    the Moroccan dirham or engaging in passionate defenses of the Vietnamese dong.
    Nobody goes to conferences where the theme is the Swedish krona, and nobody lifts
    a finger to divine the future of the Brunei dollar.


    Contrast this with bitcoin, where a substantial subculture has developed that
    promotes it in every way on social media and creates software to improve its function.
    All of this is done for free without any direct remuneration. Bitcoin is the product
    of and attracts a special kind of social organization. The ideas about a cryptographically
    secure and private currency grew from specific social groups. In this chapter,
    we will focus on the different social groups and movements that played a significant
    part in developing a cryptographic virtual currency that would result in Bitcoin.


    ## Hackers and the Origin of Open Source


    In the 1970s, the counterculture movement in America also impacted computing.
    Before the 1970s, the government and big business dominated virtually everything
    related to hardware and software. Before that time, the government, mainly DARPA,
    had been a driving force in almost everything technology-related. DARPA directly
    or indirectly funded the most significant technological innovations in the post-war
    period.


    That started to change around 1970\. Before this time, the typical developer had
    been an engineer or mathematician hired out of college by IBM or a similar corporation.
    Suddenly, young computer science graduates with different mindsets started looking
    for work. They were influenced by the counterculture and talked about freedom
    and justice. This, coupled with the Silicon Valley DIY approach, was the mold
    of the original hacker. Today the term has a more negative connotation of someone
    illicitly breaking into systems and stealing money or private data. The first
    part is similar to the original hackers. They also “broke into” systems, but they
    did it partly out of curiosity and partly out of a dislike of big business and
    their proprietary intellectual property. The slogan was that information wants
    to be free and software wants to be free, not proprietary, guarded by big corporations.


    This ethos fueled the famous Homebrew Computer Club, where hobbyists built their
    own computers. Steve Wozniak was a part of this, and he managed to assemble and
    make the first Apple computer and its operating system. He did this from parts
    that became commercially available to hobbyists and by learning from his peers
    in the Homebrew Computer Club.


    The hacker ethos also drove other developers to reverse engineer and hack other
    systems to create alternative versions or just to gain control of them. These
    projects were done in the spirit of the time, which was egalitarian and cooperative.
    Together hackers built software that would be shared freely with everyone else.
    This was the beginning of what would become open source development.


    Open source refers to the software''s source code being open for inspection by
    anyone. This contrasts with proprietary software developed by corporations, which
    is intellectual property guarded with secrecy by the rights holder.


    The general principle of open source is that a loose group of volunteer developers
    work on a project and continuously release new versions to the public. The source
    code is also released to the public for inspection and for anyone else to tweak
    and further develop it.


    These groups and how they work together can be structured differently. Nadia Eghbal
    has distinguished four general types of open source software projects based on
    research and her years of work at GitHub.


    Eghbal constructs a typology along two dimensions: user growth and contributor
    growth (Table [9-1](#539536_1_En_9_Chapter.xhtml#Tab1)).


    Table 9-1


    Types of open source projects


    |   | High User Growth | Low User Growth |

    | --- | --- | --- |

    | High Contributor Growth | Federations (e.g., Linux) | Clubs (e.g., Astropy)
    |

    | Low Contributor Growth | Stadiums (e.g., Babel) | Toys (e.g., SSH-chat) |


    Federations are how we typically think of open source projects with a thriving
    user base and developer community all working together to improve the software.
    Projects such as Rust, Node.js, and Linux fall into this category. But they are
    rare in real life. Instead, they resemble NGOs and are challenging to manage from
    a governance perspective.


    Clubs are projects where most contributors are also users themselves. They are
    similar to meetups or hobby groups. That means that they attract dedicated participants
    but have a comparatively low reach. An example is Astropy, a collection of software
    packages written in Python used for astronomical purposes.'
  trans: '

    区别在于，这条虚拟线中的某处存在着真实的实物黄金，而黄金像货币一样，其用途远不止作为价值储存手段。事实上，它的主要用途是首饰和工业应用。因此，除了作为价值储存手段之外，黄金还存在持续的需求。但比特币的情况并非如此，它除了货币功能之外别无他用。尽管黄金的价格也会波动，但波动性并没有那么大。在过去十年中，黄金上涨了约
    70–80%，远低于比特币的 3000%，但与比特币不同的是，它从未经历过超过 30% 的下跌。因此，即使比特币作为一种投机对象远胜于黄金，但目前看来它似乎还无法匹敌黄金作为价值储存手段的地位。


    然而，与黄金不同的是，比特币的优势在于，挖出一枚比特币的边际成本会随着其单位价值的变动而变动。这是因为决定挖矿成本的难度取决于比特币网络的总算力。如果价值下跌，并且挖矿在电价最高的地区变得无利可图，这些矿工就会退出比特币网络。这将降低算力，从而降低挖出一个单位的边际成本。这对作为一个系统的比特币来说是好事。对某些人来说，挖矿可能永远都是有利可图的。因此，比特币动态系统在供应和开采成本之间拥有一个平衡回路。如果比特币下跌
    95%，挖矿可能仍然有利可图，因为大多数矿工会离开，导致算力下降，从而使挖矿成本降低。这与黄金或任何其他可开采或生产的商品形成对比。如果黄金下跌 95%，就再也不会有人去挖矿了，因为那将无利可图。黄金的挖矿成本不会随着金价下跌而下降。对于黄金来说，单位价值与开采成本之间不存在平衡回路。


    我相信，这正是比特币真正独特之处。在人类历史上，从未有过一种货币的开采成本会随着资产价值的涨跌而变化。开采成本通常是脱钩的。即使高资产价格能够推动降低开采成本的创新，反之亦然。实际上，这种变化似乎恰恰相反。如果价值上涨，创新会降低开采成本。如果价值下跌，开采成本可能保持稳定甚至上升。对于金属和大宗商品来说，价值和边际成本之间似乎反而存在一个微弱的增强回路。


    因此，在可预见的未来，比特币很可能仍将保持波动性，但也会持续运作。比特币能否增加更多用例，并将其影响力扩展到社会和经济的其他领域，将是接下来几章的主题。


    # 9. 社会组织


    就其引发的社会参与度而言，比特币无法与我们当代世界的任何其他货币相提并论。没有人会不停地发布关于摩洛哥迪拉姆的推文，或为越南盾进行充满激情的辩护。没有人会去参加主题是瑞典克朗的会议，也没有人会费心去预测文莱元的未来。


    对比之下，比特币则截然不同，围绕它已经发展出一个庞大的亚文化群体，他们在社交媒体上全力推广它，并编写软件来改进其功能。这一切都是无偿进行的，没有任何直接报酬。比特币是某种特定社会组织的产物，也吸引着这样的组织。关于加密安全和私人货币的想法源自特定的社会群体。在本章中，我们将重点介绍在开发最终催生比特币的加密虚拟货币过程中发挥了重要作用的不同社会群体和运动。


    ## 黑客与开源的起源


    20 世纪 70 年代，美国的反文化运动也影响了计算机领域。在 20 世纪 70 年代之前，政府和大型企业几乎主导了所有与硬件和软件相关的事务。在那之前，政府（主要是
    DARPA）几乎是所有技术相关事务的推动力。战后时期最重要的技术创新，都直接或间接地得到了 DARPA 的资助。


    这种情况在 1970 年左右开始改变。在此之前，典型的开发者是刚从大学被 IBM 或类似公司雇用的工程师或数学家。突然间，一批心态各异、刚毕业的年轻计算机科学毕业生开始寻找工作。他们深受反文化运动的影响，谈论着自由与正义。这一点，加上硅谷的
    DIY（自己动手）精神，共同塑造了最初的黑客。如今，这个词更多带有负面含义，指非法入侵系统并窃取钱财或私人数据的人。第一部分与最初的黑客相似。他们也“入侵”系统，但部分是出于好奇，部分是由于对大型企业及其专有知识产权的不满。他们的口号是：信息想要自由，软件想要自由，而不应被大公司作为专有财产保护起来。


    这种精神催生了著名的“家酿计算机俱乐部”，爱好者们在那里组装自己的计算机。史蒂夫·沃兹尼亚克就是其中一员，他成功组装并制造了第一台苹果电脑及其操作系统。他利用爱好者们可以买到的现成部件，并通过向家酿计算机俱乐部的同行学习来完成这一切。


    黑客精神也驱使其他开发者逆向工程和破解其他系统，以创建替代版本，或者仅仅是为了获得对它们的控制权。这些项目本着当时平等和合作的精神进行。黑客们共同构建了可以与所有人自由共享的软件。这就是后来成为开源开发的起点。


    开源指的是软件的源代码对任何人开放检查。这与企业开发的专有软件形成对比，后者是受权利人保密的知识产权。


    开源的一般原则是，一个松散的志愿者开发者团队合作进行一个项目，并持续向公众发布新版本。源代码也会向公众发布，供任何人检查、修改并进一步开发。


    这些群体的组织结构和工作方式各不相同。娜迪亚·埃格巴尔根据她的研究以及在 GitHub 多年的工作经验，区分了四种通用的开源软件项目类型。


    埃格巴尔沿着两个维度构建了一个类型学：用户增长和贡献者增长（表 9-1）。


    **表 9-1**


    开源项目类型


    |   | 高用户增长 | 低用户增长 |

    | --- | --- | --- |

    | 高贡献者增长 | 联邦 (例如 Linux) | 俱乐部 (例如 Astropy) |

    | 低贡献者增长 | 体育场 (例如 Babel) | 玩具 (例如 SSH-chat) |


    联邦是我们通常理解的开源项目形式，拥有活跃的用户群和开发者社区，共同合作改进软件。像 Rust、Node.js 和 Linux 这样的项目都属于这一类。但它们在现实中很少见。相反，它们类似于非政府组织，从治理角度来看很难管理。


    俱乐部是指大多数贡献者同时也是用户的项目。它们类似于聚会或兴趣小组。这意味着它们能吸引专注的参与者，但影响力相对较低。一个例子是 Astropy，这是一套用
    Python 编写的、用于天文目的的软件包集合。

