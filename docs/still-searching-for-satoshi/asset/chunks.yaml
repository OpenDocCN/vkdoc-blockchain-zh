- fmt: '# Libertarians and Austrian Economics


    The political philosophy of libertarianism originated from left-wing anti-authoritarian
    and anti-state sentiment, which it shared with anarchism. There are various schools
    of libertarianism, but they all share the value of liberty as the central value.
    They seek to minimize the encroachment of the state on individual freedom and
    are skeptical of authorities and other coercive social institutions. Apart from
    this, there is great variance of what it means to be a libertarian among libertarians
    themselves.


    Two major groups differ significantly: left-libertarians and right-libertarians.
    The left-libertarians think the earth''s resources should be distributed equally
    among all inhabitants without individual ownership. Therefore, they distrust capitalism
    in general. Right-libertarianism is the complete opposite in this respect and
    accepts only the institutions that guard the right of ownership and autonomy.
    This type of libertarianism developed from the so-called Austrian School of Economy
    and is the most common type of libertarianism in the United States.


    The Austrian School of Economy is a school of thought emphasizing radical free
    market politics and individualism. Particularly Friedrich Hayek and Ludwig von
    Mises came to define the thinking of the Austrian school. The core belief was
    that social phenomena derived from the actions and perceptions of the individual.
    Therefore, markets should be wholly free, and government intervention should be
    abandoned entirely or minimized. When this is done, price formation automatically
    allocates resources to where they do the most good for society.


    Concerning the Bitcoin community, it is naturally only the right-libertarians
    that are relevant. The libertarians in the United States had already adopted the
    idea of virtual currencies early on. The `Liberty dollar` and `e-gold` were founded
    by libertarians and promoted in the libertarian community. This fertilized the
    ground for Bitcoin.


    # The Social Structure of Bitcoin


    One can say that Bitcoin was imagined by cypherpunks, built and maintained by
    open source hackers, and adopted by libertarians. These are the three main social
    groupings that affected the development of Bitcoin. Bitcoin is the product and
    medium of these groups and, therefore, intimately connected with their preferences
    and priorities.


    There is no drive toward building a sizeable coherent movement to change society.
    None of them care deeply about what others think, even if they do like to argue
    their own opinion and ridicule each other. Group cohesion is limited and tied
    together by only a minimal set of beliefs and practices. Group cohesion is weak
    in another way since different splinter groups formed in the Bitcoin community,
    not to speak of the plethora of alternative cryptocurrencies that have been built
    subsequently in parallel with Bitcoin by people who disagreed with certain features
    of Bitcoin.


    There is a general dislike of bureaucracy and moral reasoning. For example, if
    you sent money to the wrong account, you lost your private key, or someone found
    a loophole in the code to create new bitcoin, so what? Hard-liners do not think
    this is a problem. The truth is in the code, and if you were careless enough to
    send money to the wrong account or lost your private key, that is your problem.
    Suppose somebody found a way to create new bitcoin outside the mining process;
    good for them. All of these things happened with Bitcoin. Rather than a general
    principled moral-based reasoning, there is a preference for a transactional view.
    The transaction is metaphorically, and also quite literally, all there is. The
    Bitcoin blockchain is a list of transactions. No one knows or cares what those
    transactions were or whether they were donations, investments, or payments for
    pizza, guns, or ransom.


    # Grid/Group Characterization


    One way to make sense of this is to consult anthropological theory. One of the
    key ideas of the grandfather of sociology, Emile Durkheim, was that any given
    system of classification is a product of its social relations. Ideas are formed
    by the social organization that produced them. But how may we make sense of the
    relationship between the social organization of the Bitcoin community and their
    ideas?


    The British anthropologist Mary Douglas has expanded the fundamental Durkheimian
    insight into a tool to conceptualize the relationship between cosmological ideas
    and social relations. She observes that one dimension concerns the “group,” that
    is, the extent to which the group exerts power over the individual or the individual
    exerts power itself. The other dimension is what she calls grid and describes
    the extent to which ideas about the world are shared. These two dimensions are
    laid out on two axes. The x-axis concerns the group dimension. 0 is where no forces
    are exerted on the individual. Moving right increases the pressure exerted on
    the individual by the group to comply with rules and conventions. Shifting left
    means that the individual increasingly exerts their own pressure on the surroundings.
    The y-axis is the so-called “grid” dimension describing the degree to which ideas
    are shared in society. The grid dimension thus measures the extent of a public
    system of classification that determines the individual in the cosmos. Above 0
    is the area of shared public classifications. Going down this axis just above
    and below the x-axis are increasingly marginal and fringe groups of society. At
    the bottom of the vertical dimension are private ideas no one shares. This is
    the so-called group/grid model that Douglas developed in her book *Natural Symbols*,
    which can be used to conceptualize different social groups and their ideas about
    the world.


    According to Douglas, the top-right quadrant with a strong group and strong grid
    promotes “(…) a routinized piety towards authority and its symbols, beliefs in
    a punishing, moral universe, and a category of rejects. Any bureaucratic system
    which is sufficiently secure and insulated from criticism will tend to think the
    same way. This is the monastic life, or the military society.” This is also a
    description that fits most modern Western societies. Modern nation-states are
    characterized by a requirement for the individual to be subject to the state''s
    authority. The state has a monopoly of power. This is government, and the banking
    system is just an extension of this general mode of living with its bureaucracy
    and rules.


    ![](images/539536_1_En_9_Chapter/539536_1_En_9_Fig1_HTML.jpg)


    An illustration exhibits vertical and horizontal double-headed arrows forming
    a plus sign that is labeled as follows. The grid system of shared and private
    classifications groups ego increasingly controlled and independent by or from
    other people.


    **Figure 9-1** Group and grid classification


    Contrast this with the description of the lower-left quadrant where we find the
    “voluntary outcastes, tramps, gypsies, rich eccentrics, or others who retain their
    freedom at a cost” as Mary Douglas writes in *Natural Symbols*. It is hard not
    to recognize the different social groups we have viewed here as fitting this description.
    They agree little with the surrounding majority society of the modern nation-state,
    and there are only a few shared beliefs among themselves. Furthermore, they are
    voluntary outcasts and eccentrics. This applies whether we are considering the
    libertarians, the hackers, the cypherpunks, or the Bitcoin community with only
    minor differences in the distance to the center of the grid.'
