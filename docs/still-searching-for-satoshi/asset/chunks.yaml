- fmt: '# Legal Tender


    Perhaps the most important factor is the one defined by legal tender. Legal tender
    is the form of money that courts of law are obliged to recognize as payment. Each
    jurisdiction defines its legal tender. In most modern states, it is fiat currency.
    Legal tender specifies not just the currency but also the particular types of
    banknotes and coins to be recognized for payment. Sometimes a particular banknote
    or coin is withdrawn from circulation, which renders it worthless. It also happens
    that the entire currency, which is accepted as legal tender, switches. This has
    happened frequently in recent times in Europe, where countries have adopted the
    new euro currency. In Germany, for example, the Deutch Mark stopped being legal
    tender, and the euro became the new currency.


    The question of legal tender is tied to the question of jurisdiction. Since nation-states
    in our time are sovereign, the governments of those states define what is legal
    tender. As of the time of writing, bitcoin has been accepted as legal tender only
    in El Salvador and the Central African Republic. These are small countries, and
    it is doubtful what effect it has had on Bitcoin. Still, if larger jurisdictions
    like the EU or United States were to accept Bitcoin as legal tender, this would
    significantly improve the utility of Bitcoin.


    # Supply and Demand


    In the sixteenth century, the Spanish theologian Martin de Azpilcueta observed
    that the prices of commodities changed based on their scarcity. He was the first
    to develop the law of supply and demand. This states that a traded item on a free
    market will settle at a price where the quantity demanded will equal the quantity
    supplied. The consequence is that if either demand or supply is changed, this
    will affect the price of the commodity. The price increases if demand increases
    and supply is stable. Conversely, the price will fall if supply increases and
    demand remains the same.


    This observation of the dynamic of prices forms one of the fundamental laws of
    modern economics. It is interesting in itself, but what Azpilcueta realized was
    that money itself was also subject to the law of supply and demand. Money itself
    is a commodity. If the money supply is increased and demand remains the same,
    the value of money will decrease. This is why the silver and gold standards, in
    particular, have been successful historically. Precious metals, as opposed to
    base metals, have a natural scarcity that curtails their supply. Money can only
    be supplied according to the amount of mined precious metals.


    Saifedean Ammous explains how this dynamic works relative to the metals that have
    served as standards for money. It may come as no surprise that of the precious
    metals, gold is the most scarce metal in the earth’s crust. Silver is also scarce
    but less so.


    Bronze is even more common but still scarce. This corresponds to the relative
    value of these metals, which is also seen in their use at competitions such as
    the Olympics, where gold, silver, and bronze medals are given for first, second,
    and third places. Ammous points out that the real reason behind this is the stock-to-flow
    ratio, the amount produced relative to the global stock. He shows that for gold,
    the amount of gold extraction has been surprisingly constant, around 2% of the
    stock for at least a hundred years. Silver is around 10–15%. That means the stock-to-flow
    ratio is about 60 for gold since it takes 60 years of production to match the
    current stock. For silver, it is 5, while for copper, it is less than 1.


    The stock-to-flow ratio, in turn, explains why gold fared so well as a standard
    of money and silver less so. When the amount of silver being extracted increased,
    the value fell. It also explains why the Chinese use of iron ensured that their
    coins never acquired more value than was sufficient for smaller purchases.


    # How Money Becomes Valuable


    We are now closer to a point where we can understand the dynamics of money and
    how money’s value changes with other factors. This is illustrated in Figure [8-1](#539536_1_En_8_Chapter.xhtml#Fig1).


    ![](images/539536_1_En_8_Chapter/539536_1_En_8_Fig1_HTML.jpg)


    A schematic exhibits the demand for storage of value, unit of account, medium
    of exchange, legal tender, utility, and unit value connected to supply for stock-to-flow
    ratio, stock, destruction, money supply, reserve, extraction, and marginal extraction
    cost.


    **Figure 8-1** *The dynamics of money*


    First, a note about how the figure is read. The arrow indicates the direction
    of influence. A plus means that the source and target move together in the same
    direction, that is, when the source goes up, the target goes up. Conversely, when
    the source goes down, the target goes down. The minus indicates an inverse relationship
    between the source and the target. If the source goes down, the target goes up
    and vice versa. Of particular interest are loops. A loop with pluses all the way
    around is a reinforcing loop, while one with pluses and minuses is a balancing
    loop.


    The figure should not be taken to be comprehensive as many other economic factors
    like velocity, time value, interest rate, the credibility of the issuer, and others
    also have a significant effect on the dynamics of money. Rather it is meant to
    highlight a few key factors that have historically been important and continue
    to be so.


    The center of the figure is also the center of interest for any kind of money:
    the value of a unit of money. An unfavorable change in the value of money could
    be due to inflation or devaluation. At the same time, a positive change could
    be due to deflation. It is clear that if a unit has a high or increasing value,
    it is a good store of value, which creates a reinforcing loop. This is the dynamic
    behind all asset bubbles. We might best recognize this from the real estate market.
    When house prices rise, they are seen as a good investment or store of value,
    and more people buy real estate, increasing the demand and price. This can be
    seen as a reinforcing loop until the bubble pops. Then the value of real estate
    drops, and it is no longer a good store of value, which makes the price drop even
    further. The basic utility of real estate, that is, that it affords shelter, provides
    a floor below which it will not drop.


    The top half of the figure captures the demand-side factors of money, and the
    bottom half captures the supply side. The demand for money derives from its utility.
    Remember that the transition from barter to preferred barter to primitive money
    went through commodities that had a utility due to their potential for consumption,
    like cattle, salt, and grain. These were then enhanced with the three vital monetary
    functions when they started being used as money. This positively affected the
    utility until money proper appeared, where all utility was derived from the monetary
    functions and not the utility of the base commodity.


    Some examples, like gold, may be excellent as a store of value but impractical
    as a unit of account and especially as a medium of exchange. Minting it into coins
    increased these functions. Now as coins, they were countable, easily divisible,
    and small enough to be practical for purchases. The example of Chinese iron coins
    shows a contrasting case. They were also helpful as per the three functions, but
    because iron is not equally valuable, larger loads had to be used to make more
    significant purchases. Consequently, Chinese coins remained niche and were only
    used for smaller transactions.'
