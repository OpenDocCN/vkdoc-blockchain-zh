    of Bitcoin relate to each other and produce the dynamics observed. It is evident
    that bitcoin has seen an explosive surge in value and is extremely volatile on
    a scale that no other currency or asset has matched since the inception of Bitcoin
    in 2009.


    We can now recast the dynamics of Bitcoin according to the preceding dynamics.
    In the beginning, bitcoin was seeing a technical maturation phase where it was
    nothing more than a curiosity known by very few people and used by even fewer.
    In fact, it was not until halfway through 2010 that anyone used it for monetary
    purposes. Initial attempts were to promote it by exchanging bitcoin for dollars
    for it to serve as a store of value. None were successful since the money dynamic
    was completely absent. Without this dynamic to give it some utility, it was a
    mere abstract ideological project than any real monetary system. Had things continued
    like this, it would be hard to believe that we would be talking much about it
    today. It would have joined the already long list of failed virtual currencies.
