- fmt: '# Decentralizing the Record


    The mode of recording and sharing the public record Grigg imagined for the issuer
    was on a server. The server is the central element in the client-server pattern
    in computing. A central instance, the server, performs the computational and data
    functions of the system for the clients. All clients can access the same central
    resources that the server makes available. This was how the first computers worked
    and also, to some extent, is how the Internet works today.


    The web browser is the client that accesses the resources, the website, made available
    by the web server. This is a simple and efficient pattern, which accounts for
    its ubiquity. But it is also prone to central failure. If the central server is
    down, as in the case of a distributed denial-of-service attack, the whole system
    is down. This is a critical vulnerability for a system whose ambition is to be
    the source of a public record of economic transactions.


    There is, however, another model. A peer-to-peer (or `P2P` for short) network
    is a network where nodes, or peers, connect directly to one another and form a
    mesh-type network rather than the hub-and-spoke type of the client-server model.
    There is no central instance that the system depends on. The idea of a peer-to-peer
    network goes back to the beginning of the Internet, but the present-day Internet
    is not such a network. The World Wide Web relies on a hierarchical system of name
    servers that resolve names into specific IP addresses. The IP addresses are the
    IDs of devices. In a peer-to-peer network, the computers need to know the IP addresses
    of the other nodes in the network since they do not rely on a central entity to
    resolve a name into an IP address.


    The resulting network topology is a mesh network. This is a resilient type of
    network since it doesn''t rely on any single point of failure. If one node fails,
    other nodes take over. If the average number of connections is high, the network
    is stable and resilient toward breakdowns.


    The first to popularize P2P computing was Napster in 1999. In the 1990s, CDs still
    dominated music distribution, but a digital format had emerged called MP3 that
    made it possible to share songs digitally. Such songs could be copied to friends
    and family, but finding a friend who just happened to have any given song was
    difficult. Napster made it easy to share MP3 songs between strangers through peer-to-peer
    connections. They created a website where you could discover computers that were
    online with a particular song. The user would then connect to that computer and
    download it. This is the essence of a peer-to-peer network. It allows the illegal
    sharing of copyrighted material, which is why Napster was shut down already in
    2001 due to legal issues. However, the principle of sharing directly with others
    through a decentralized network had been demonstrated and is still used today
    in services like BitTorrent.


    The power of a P2P network in relation to file sharing is that as long as someone
    on the network has a copy of a file, the whole network has access to it. It does
    not rely on any central custodian or gatekeeper.


    Leveraging P2P technology for bookkeeping carries some additional difficulties.
    The idea of documenting transactions as a public record carries with it the requirement
    of establishing the time of these transactions. Unlike digital songs, documenting
    when each transaction took place becomes of central importance. Since the timestamp
    of each transaction can be changed, it requires a solution.


    Stuart Haber and Wakefield Stornetta were the first to solve this problem cryptographically
    in their 1990 paper "How to time-stamp a digital document" in the *Journal of
    Cryptology*. In this paper, they argued that the problem could be solved by establishing
    a Time-Stamping Service. To maintain privacy, it is not convenient for the user
    to send the entire document or other digital artifacts. Instead, the user uses
    a hash function to create a short fingerprint of the document, which is then signed
    by the Time-Stamping Service by appending a timestamp to the hash received. The
    certificate is then returned to the user. Anyone can now verify the timestamp
    based on this certificate without knowing the content of the document. Because
    the document is hashed with a date appended, it is impossible to retroactively
    alter the date since that would produce a different hash.


    The problem here is that we still need to depend on a central authority. The Belgian
    cryptographer Jean-Jacques Quisquater came upon a solution to that problem around
    the same time. He suggested that the entire file, or chain of certificates, could
    be shared among a network of timestamp servers. The generated certificates did
    not contain confidential information and were, therefore, not sensitive. Any decentralized
    entity could add a timestamped document to this chain of timestamp certificates.
    This solution would solve the problem of timestamping transactions in a distributed
    public record.


    ## A Decentralized Peer-to-Peer Public Record


    Now we have come full circle. In Grigg''s version of triple-entry accounting,
    a public record of transactions is maintained by a central issuer, which depends
    on a central server. Still, the public availability of it depends on whether the
    server is online. To make sure that the record is truly public and resilient to
    failure, it needs to be distributed. Hence, multiple entities have copies to prevent
    data loss, and multiple available nodes are online to secure availability in the
    event that one or more nodes fail. If one wanted to create a genuinely resilient
    public record, the optimal technology would be a P2P network.


    A system that maintained economic transactions in an open-access ledger available
    to all nodes on a decentralized mesh network would make it virtually impossible
    to destroy the record of these transactions. If the immutability of the record
    were maintained by hashing, it would be similar to being cut in stone like the
    cuneiform tablets of Mesopotamia. The decentralized distribution would guarantee
    durability, which the stone also secured. As long as nodes are connected in a
    network, the record would be public and available for inspection.


    Such a system could offer anyone access to the balances of every account that
    had ever been used for a transaction by dynamically querying the open ledger.
    It would no longer be necessary to carve the record in stone, and furthermore,
    it would be available through the Internet globally and not just locally, where
    the slabs of stone were stored. But the problem it solves is the same: to create
    an immutable and durable public record, not of heroic deeds in times past, but
    of economic activity to support exchange in the future.'
  raw: '## Decentralizing the Record


    The mode of recording and sharing the public record Grigg imagined for the issuer
    was on a server. The server is the central element in the client-server pattern
    in computing. A central instance, the server, performs the computational and data
    functions of the system for the clients. All clients can access the same central
    resources that the server makes available. This was how the first computers worked
    and also, to some extent, is how the Internet works today.


    The web browser is the client that accesses the resources, the website, made available
    by the web server. This is a simple and efficient pattern, which accounts for
    its ubiquity. But it is also prone to central failure. If the central server is
    down, as in the case of a distributed denial-of-service attack, the whole system
    is down. This is a critical vulnerability for a system whose ambition is to be
    the source of a public record of economic transactions.


    There is, however, another model. A peer-to-peer (or P2P for short) network is
    a network where nodes, or peers, connect directly to one another and form a mesh-type
    network rather than the hub-and-spoke type of the client-server model. There is
    no central instance that the system depends on. The idea of a peer-to-peer network
    goes back to the beginning of the Internet, but the present-day Internet is not
    such a network. The World Wide Web relies on a hierarchical system of name servers
    that resolve names into specific IP addresses. The IP addresses are the IDs of
    devices. In a peer-to-peer network, the computers need to know the IP addresses
    of the other nodes in the network since they do not rely on a central entity to
    resolve a name into an IP address.


    The resulting network topology is a mesh network. This is a resilient type of
    network since it doesn’t rely on any single point of failure. If one node fails,
    other nodes take over. If the average number of connections is high, the network
    is stable and resilient toward breakdowns.


    The first to popularize P2P computing was Napster in 1999\. In the 1990s, CDs
    still dominated music distribution, but a digital format had emerged called MP3
    that made it possible to share songs digitally. Such songs could be copied to
    friends and family, but finding a friend who just happened to have any given song
    was difficult. Napster made it easy to share MP3 songs between strangers through
    peer-to-peer connections. They created a website where you could discover computers
    that were online with a particular song. The user would then connect to that computer
    and download it. This is the essence of a peer-to-peer network. It allows the
    illegal sharing of copyrighted material, which is why Napster was shut down already
    in 2001 due to legal issues. However, the principle of sharing directly with others
    through a decentralized network had been demonstrated and is still used today
    in services like BitTorrent.


    The power of a P2P network in relation to file sharing is that as long as someone
    on the network has a copy of a file, the whole network has access to it. It does
    not rely on any central custodian or gatekeeper.


    Leveraging P2P technology for bookkeeping carries some additional difficulties.
    The idea of documenting transactions as a public record carries with it the requirement
    of establishing the time of these transactions. Unlike digital songs, documenting
    when each transaction took place becomes of central importance. Since the timestamp
    of each transaction can be changed, it requires a solution.


    Stuart Haber and Wakefield Stornetta were the first to solve this problem cryptographically
    in their 1990 paper “How to time-stamp a digital document” in the *Journal of
    Cryptology*. In this paper, they argued that the problem could be solved by establishing
    a Time-Stamping Service. To maintain privacy, it is not convenient for the user
    to send the entire document or other digital artifacts. Instead, the user uses
    a hash function to create a short fingerprint of the document, which is then signed
    by the Time-Stamping Service by appending a timestamp to the hash received. The
    certificate is then returned to the user. Anyone can now verify the timestamp
    based on this certificate without knowing the content of the document. Because
    the document is hashed with a date appended, it is impossible to retroactively
    alter the date since that would produce a different hash.


    The problem here is that we still need to depend on a central authority. The Belgian
    cryptographer Jean-Jacques Quisquater came upon a solution to that problem around
    the same time. He suggested that the entire file, or chain of certificates, could
    be shared among a network of timestamp servers. The generated certificates did
    not contain confidential information and were, therefore, not sensitive. Any decentralized
    entity could add a timestamped document to this chain of timestamp certificates.
    This solution would solve the problem of timestamping transactions in a distributed
    public record.


    ## A Decentralized Peer-to-Peer Public Record


    Now we have come full circle. In Grigg’s version of triple-entry accounting, a
    public record of transactions is maintained by a central issuer, which depends
    on a central server. Still, the public availability of it depends on whether the
    server is online. To make sure that the record is truly public and resilient to
    failure, it needs to be distributed. Hence, multiple entities have copies to prevent
    data loss, and multiple available nodes are online to secure availability in the
    event that one or more nodes fail. If one wanted to create a genuinely resilient
    public record, the optimal technology would be a P2P network.


    A system that maintained economic transactions in an open-access ledger available
    to all nodes on a decentralized mesh network would make it virtually impossible
    to destroy the record of these transactions. If the immutability of the record
    were maintained by hashing, it would be similar to being cut in stone like the
    cuneiform tablets of Mesopotamia. The decentralized distribution would guarantee
    durability, which the stone also secured. As long as nodes are connected in a
    network, the record would be public and available for inspection.


    Such a system could offer anyone access to the balances of every account that
    had ever been used for a transaction by dynamically querying the open ledger.
    It would no longer be necessary to carve the record in stone, and furthermore,
    it would be available through the Internet globally and not just locally, where
    the slabs of stone were stored. But the problem it solves is the same: to create
    an immutable and durable public record, not of heroic deeds in times past, but
    of economic activity to support exchange in the future.'
  trans: '

    # 去中心化记录


    格里格设想的发行方记录和共享公共账目的方式是基于服务器。服务器是计算领域中客户端-服务器模式的核心元素。中央实例（即服务器）为客户端执行系统的计算和数据功能。所有客户端都可以访问服务器提供的同一中央资源。这是早期计算机的工作方式，在某种程度上，也是当今互联网的工作方式。


    网络浏览器是访问网络服务器所提供资源（即网站）的客户端。这是一种简单高效的模式，这解释了其普遍性。但它也容易发生中心故障。如果中央服务器宕机（例如遭遇分布式拒绝服务攻击），整个系统就会瘫痪。对于一个旨在成为经济交易公共记录来源的系统来说，这是一个关键性的弱点。


    然而，还有另一种模式。点对点（简称`P2P`）网络是一种节点（或称对等点）彼此直接连接，形成网状网络，而非客户端-服务器模式中的中心辐射型网络。系统不依赖于任何中央实例。点对点网络的概念可以追溯到互联网诞生之初，但如今的互联网并非这样的网络。万维网依赖于一个层级化的域名服务器系统，该系统将域名解析为特定的
    IP 地址。IP 地址是设备的标识符。在点对点网络中，计算机需要知道网络中其他节点的 IP 地址，因为它们不依赖中央实体来将域名解析为 IP 地址。


    由此产生的网络拓扑结构是网状网络。这是一种具有弹性的网络类型，因为它不依赖于任何单点故障。如果一个节点发生故障，其他节点会接管。如果平均连接数很高，网络就会稳定且能抵御故障。


    1999 年的 Napster 是第一个普及 P2P 计算的应用。在 20 世纪 90 年代，CD 仍主导着音乐发行，但当时已出现一种名为 MP3 的数字格式，使得数字方式分享歌曲成为可能。这类歌曲可以复制给朋友和家人，但要找到一个恰好拥有某首特定歌曲的朋友却很困难。Napster
    通过点对点连接，让陌生人之间分享 MP3 歌曲变得容易。他们创建了一个网站，你可以在上面发现哪些在线电脑拥有某首歌曲。用户随后连接到那台电脑并下载歌曲。这就是点对点网络的本质。它允许非法共享受版权保护的材料，这也是
    Napster 在 2001 年因法律问题被关闭的原因。然而，通过去中心化网络直接与他人共享的这一原则得到了验证，并至今仍在 BitTorrent 等服务中使用。


    P2P 网络在文件共享方面的优势在于，只要网络上有某人拥有某个文件的副本，整个网络都能访问它。它不依赖任何中央保管者或把关者。


    将 P2P 技术用于记账会带来一些额外的困难。将交易记录为公共账目的想法，本身就要求确定这些交易的时间。与数字歌曲不同，记录每笔交易发生的时间变得至关重要。由于每笔交易的时间戳可以被更改，这就需要一种解决方案。


    斯图尔特·哈伯和韦克菲尔德·斯托内塔在 1990 年发表于《密码学杂志》的论文《如何为数字文档添加时间戳》中，首次用密码学方法解决了这个问题。在这篇论文中，他们认为可以通过建立一个时间戳服务来解决该问题。为了保护隐私，用户不方便发送整个文档或其他数字制品。取而代之的是，用户使用哈希函数创建文档的短指纹，然后时间戳服务通过将时间戳附加到收到的哈希值上来对其进行签名。然后将证书返回给用户。任何人现在都可以在不知晓文档内容的情况下，基于此证书验证时间戳。因为文档是与附加的日期一起进行哈希运算的，所以事后篡改日期是不可能的，因为那会产生一个不同的哈希值。


    这里的问题是，我们仍然需要依赖一个中央权威机构。大约在同一时间，比利时密码学家让-雅克·基斯夸特提出了一个解决方案。他建议整个文件（或证书链）可以在一个时间戳服务器网络中共享。生成的证书不包含机密信息，因此不敏感。任何去中心化的实体都可以将带有时间戳的文档添加到这个时间戳证书链中。这个解决方案将解决在分布式公共账目中为交易添加时间戳的问题。


    ## 去中心化的点对点公共账目


    现在，我们回到了原点。在格里格的三式记账版本中，交易的公共账目由一个依赖中央服务器的中央发行方维护。尽管如此，其公共可访问性仍取决于服务器是否在线。为了确保账目真正公开且能抵御故障，它必须是分布式的。因此，多个实体拥有副本以防止数据丢失，并且有多个可用节点在线，以确保在一个或多个节点发生故障时的可用性。如果想要创建一个真正具有弹性的公共账目，最优技术将是
    P2P 网络。


    一个在去中心化网状网络上，所有节点都能访问的开放账目中维护经济交易记录的系统，将使销毁这些交易记录几乎成为不可能。如果记录的不可篡改性通过哈希运算来维持，那它就类似于美索不达米亚的楔形文字泥板一样被刻在石头上。去中心化的分布将保证持久性，石头也确保了这一点。只要网络中的节点保持连接，记录就会公开并可供查验。


    这样的系统可以通过动态查询开放账目，让任何人访问曾用于交易的所有账户余额。不再需要将记录刻在石头上，而且，它可以通过互联网在全球范围内使用，而不仅仅是在存储石板的本地。但它解决的问题是相同的：创建一个不可篡改且持久的公共记录，不是为了记录过去的英雄事迹，而是为了支持未来交换的经济活动。

