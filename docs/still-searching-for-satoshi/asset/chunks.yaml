    # Preface


    I first paid serious attention to Bitcoin and the blockchain sometime in 2015.
    I was designing anti–money laundering systems in the financial sector then and
    immediately saw that Bitcoin would be pretty convenient for this since all transactions
    were already out there in the open. Admittedly this was probably not the first
    thought of the majority of Bitcoin enthusiasts. After reading up on it, I saw
    great potential and started dabbling by buying a small portion of Bitcoin to try
    it. I also purchased a more significant amount of what I believe to be the first
    Exchange Traded Fund (ETF) that allowed retail investors to be exposed to Bitcoin.
    After a short while, some negative stories about Bitcoin emerged. Something about
    a key developer of the open source development team leaving. I don’t remember
    the details. People were saying that it is all falling apart now. Knowing full
    well that this thing was one of the investments in my portfolio that could genuinely
    have a significant nonzero chance of going to zero and coupled with the knowledge
    that Bitcoin had already appreciated with more than 100% since last year (and
    consequently probably had only limited upside, right?), I did what many people
    owning Bitcoin both before and after had done; I believe the technical term for
    this is “freaked out” and sold it all. Little did I know at the time that scare
    stories about the imminent collapse of Bitcoin were about as common as a rainy
    day in my native Denmark.


    A few years later, I found myself living in the United States while another boom
    in Bitcoin was taking place. I suddenly recalled that I had forgotten to sell
    my initial test purchase of Bitcoin when it was around $800. Now it was all over
    the news, and even New York Subway info screens, that bitcoin would soon hit the
    $20,000 mark. I decided this was lunacy, and bitcoin would probably never go higher,
    so I found my old wallet and cashed out. I used the funds to buy my wife a diamond
    ring, a good return for a small technological experiment. I wish there were more
    of these.


    After that, my assessment of Bitcoin soured, and I thought it had degraded into
    a Ponzi scheme that never really seriously tried to fulfill its potential for
    good. Sometimes I would make critical comments about Bitcoin on Quora or Twitter
    only to be flooded with trolls ridiculing me and telling me how big an idiot I
    was. So naturally, I lost interest.


    Today I can look back and note that had I not freaked out and held my initial
    investment in the Bitcoin ETF, I would actually have been able to buy the Lamborghini
    that is so coveted in the Bitcoin community. My story is not uncommon for many
    regular people, or normies as they are called in the Bitcoin community. Some have
    been lucky to hit the jackpot and get rich. Most have not.


    As I am writing this, the crypto market has fallen back down. I do not own Bitcoin
    either directly or indirectly. I have run through the full spectrum of enthusiasm,
    disdain, and indifference toward Bitcoin. However, I still feel that this is such
    a fascinating and unique technological development that it needs to have its story
    told neutrally and objectively. There is no shortage of books on Bitcoin or experts
    willing to tell you all about it. The problem is that they are invariably heavily
    invested in it and consequently heavily invested in portraying it positively.
    That does not mean there are no critics, but they stand completely outside. They
    have typically decided early on that Bitcoin was a scam and not found it necessary
    to study it more than superficially. This leaves a gaping hole for the curious
    and open nontechnical readers who just want to understand what all the fuss is
    about and be able to make up their own minds about this Bitcoin and blockchain
    thing.


    Bitcoin is currently under heavy headwinds in terms of regulatory pressure and
    scandals, but even if you think Bitcoin has peaked, it is still such a remarkable
    technological achievement, unlike anything the modern world has produced, that
    it warrants serious attention.


    If you are not already hooked on Bitcoin but are curious about what it is and
    what it could be, this book is for you. I hope to be able to guide you through
    the fascinating thoughts and history behind Bitcoin and the blockchain, to illuminate
    the aspects of human civilization that Bitcoin addresses as well as provide a
    view into the future of what the blockchain might become. Even if you are already
    hooked on Bitcoin, I hope you will be able to find new pieces of information and
    perspectives. It has been my intention to give a balanced account that does not
    dismiss Bitcoin out of hand nor latch on to the most excessive claims about its
    wonders.


    # Introduction


    One Satoshi Nakamoto first announced Bitcoin on October 13, 2008. It is the first
    implementation of a cryptocurrency on what is called the blockchain, and as such,
    it is ground zero for the blockchain revolution and the technologies that flow
    from it, like smart contracts, cryptocurrencies, NFTs, DAOs, and the so-called
    Web3, to name a few. These new and exotic phenomena purport to disrupt payment
    and transcend the way we do business and the existing global order. One will be
    forgiven for a touch of skepticism at the magnitude and rate with which our world
    is supposed to change, according to cryptocurrency advocates. Still, even to the
    casual observer, it seems reasonable to assume that we can at least expect some
    significant change due to the blockchain revolution.


    There is plenty of material to read up on Bitcoin and the blockchain. Today there
    are multiple excellent books on the subject by accomplished writers and Bitcoin
    specialists. Pundits always appear ready to explain and comment on podcasts, radio,
    and TV.'
