    # 去中心化的银行


    所有早期虚拟货币的共同问题在于，它们始终以某种方式依赖于一个你必须信任的中心化实体。密码朋克们对彼此的信任，并不比对银行和政府更多。原则上，这个中心化实体可以篡改账户余额，或以其他方式干预货币供应。因此，挑战在于设计一套能够完全规避任何中央权威需求的系统。


    在为了解决蒂姆·梅在其*《密码无政府主义宣言》*中所构想的未来加密无政府状态而创造货币的问题上，戴伟勾勒出这种货币应具备的几个关键属性。根据戴伟的说法，解决方案在于将所有账户余额的完整账本分布式地存放在网络中。这种货币被称为
    `B-money`。买卖双方通过密码学证明完成交易。这笔交易随后会在整个网络中进行广播。戴伟推测了 `B-money` 代币的价值，并建议其价值应与生成它们所耗费的货币成本挂钩。这是可行的，因为其机制类似于
    `Hashcash` 的工作量证明机制。尽管中本聪后来在比特币白皮书中引用了这一点，但这不过是戴伟在其网站上发表的几段推测性文字。它缺乏 `Hashcash`
    的细节和严谨性，并且引用了他人之前描述过的想法，特别是 `Hashcash`（亚当·贝克也立即在密码学邮件列表中向戴伟指出了这一点）。然而，去中心化公开账本的想法是新颖的。


    该领域的另一位关键人物是尼克·萨博，他是一位计算机科学家，在虚拟货币领域工作多年，也是密码学邮件列表的成员。他甚至曾是戴维·乔姆的 `DigiCash` 的早期员工，并以不拘一格和创新性的思维而闻名。他提出了一个名为
    `Bitgold` 的想法。这与戴伟的 `B-money` 类似，是他博客上一个从未实现过的推测性草图。`Bitgold` 会像黄金一样成为一种价值储存手段，用户可以通过在网络中贡献自己的计算机算力来解决密码学谜题来生产它，方式与
    `Hashcash` 和 `B-money` 相同。已解决的谜题将被发送到一个公共注册表，并分配给相应的用户。这些已解决的谜题将成为下一个谜题的一部分，这预示着比特币区块链的出现。其特别关注双重支付问题，因为数字代币的关键问题在于它们是否已经被使用过。和戴伟的想法一样，这个想法也仅发表在几篇简短博文中，从未得到任何详尽阐释，但指出了比特币将会采纳的核心概念和愿景。


    ## 虚拟货币的三个流派


    在十年间，几种虚拟货币来了又去。各种提案五花八门且富有创新性，有些相互借鉴或反映了相似的想法。我们可以区分出虚拟货币领域三个不同的创新流派，它们都源于不同的出发点。第一个是黄金流派，专注于贵金属的数字表示；第二个是电子商务流派，专注于在线购物以及以积分和代币形式提供的奖励；第三个是加密流派，它最终演变成了比特币以及随后出现的、侧重于隐私的其他加密货币。这三个流派在人员和思想方面需要更直接的互动。它们也吸引了不同的用户群体。但它们都试图解决相似的问题：如何在虚拟世界中表示和交换价值。它们也遭遇了完全相同的监管和安全问题，并通过相互学习影响了彼此。


    首先要问的问题是，为什么恰恰在这个时间点出现了虚拟货币？正如我们所见，虚拟货币的概念并不陌生。甚至在某种意义上，哈耶克在 20 世纪 20 年代就已经预见到了。虽然个人电脑确实存在并在
    20 世纪 80 年代开始广泛使用，但它们通常并没有相互连接。只有在 20 世纪 90 年代中后期，连接互联网才变得普遍。由于互联网是虚拟货币的先决条件，这为新的金融创新创造了可能性。


    让我们来看看黄金流派的虚拟货币，该流派侧重于与黄金或其他贵金属以某种方式挂钩的货币。到现在为止，应该不足为奇的是，主要是自由主义社区深度参与催生和使用了虚拟货币。对于许多自由意志主义者来说，废除货币金本位是他们反对中央银行和政府的一个关键原因。他们认为，此举使得政府能够通过增加货币供应量制造通货膨胀，从而剥夺人民手中货币的价值。因此，拥有黄金和其他贵金属作为对抗通胀的对冲手段是一个关键目标，这并不令人意外。尽管自由美元更像是一种意识形态宣言，而非在黄金本位货币中进行实际交易的方式，但
    `e-gold` 却发展成为了一家大公司，其处理的交易额价值数十亿美元。大约有十家公司出现了，其相似的重点是让普通人能够自己拥有和交易贵金属。其中一家名为
    `eBullion` 的公司，甚至在被卷入欺诈并消失之前，就已经集成到信用卡中用于支付。其他的则被证明是骗局，或者屈服于日益加强的监管审查。然而，少数公司设法适应了不断变化的监管要求并蓬勃发展至今，但已不再是作为虚拟货币存在。


    这个流派对加密流派的一个重大影响是自由美元和 `e-gold` 所陷入的严重法律问题。这在此后的密码学和密码朋克邮件列表中回响了多年，并且可能是中本聪使用化名提出其想法的直接原因：没有人愿意因为试图提出一个新颖的创新想法而面临多年法律诉讼和
    20 年监禁的风险。

    '
- fmt: '# The Evolution of Virtual Currencies


    The ecommerce strain was more of an afterthought brought about by the change of
    the Internet from a place for information exchange to one for the exchange of
    goods. It served the regular participants of commerce, shoppers, and merchants
    with no particular political axe to grind who just wanted convenience. Online
    credit card payments had yet to mature; the door was open for other potential
    currencies to pay. The model was the loyalty program that had served retailers
    and airlines well. Points, tokens, and vouchers, after all, already functioned
    as a specialized currency within loyalty programs, so it took a lot of work to
    rethink these as a general currency to be used across companies.


    This movement however suffered from the same examples of criminal abuse and regulatory
    attention as well as the collapse of the dot-com bubble. They survived though
    in the shape of loyalty programs mostly of type 1 or type 2 virtual currencies
    (internal or unidirectional), and some even created de facto local virtual currencies
    that could be used across different companies. But with the emergence of credit
    cards and `PayPal` as viable and reasonably convenient methods of payment, the
    thrust for innovation for a general type 3 (bidirectional) virtual currency for
    ecommerce disappeared.


    The community for whom a virtual currency was most central were the cypherpunks
    or extropians. These were technically savvy people with a firm belief in a radically
    different and better future for which the current currencies of governments would
    not work. For them, privacy was the central concern. We saw how works of fiction
    shaped the expectations of such an utterly private currency that could secure
    the user''s anonymity. The goal was to create a payment method that would not
    allow any government, bank, or other third party to know what anyone had purchased.


    Possibly due to a general distrust of the government, this fused with similar
    regrets of the libertarians in terms of monetary policy, in particular, the inflationary
    nature of contemporary money supply and a dislike of fractional banking. This
    community was the one that had the technical knowledge to put together an altogether
    new type of type 3 virtual currency that was not related to anything other than
    the proof of work that made it challenging to produce new coins through the process
    of what came to be known as mining. More motivated by futuristic ideas of a techno-utopia
    than practical applicability, it laid the foundation for Bitcoin.


    It was always a niche undertaking by a relatively small number of people with
    specialized knowledge of cryptography, mathematics, and engineering skills. Even
    if the discussions and ideas thrown around were not always quite civil, the people
    were the type to grind it out until a solution was found eventually. This crypto
    strain of virtual currencies is where Bitcoin arose. All the ideas that came together
    in Bitcoin were already proposed before and highlighted in this chapter. But before
    we attempt to understand the inner workings of Bitcoin, we need to consider some
    of the technical solutions that made it possible.


    ## Cryptography


    Bitcoin gave rise to the specific type of virtual currency known as cryptocurrency.
    The reason for this name is the extended use of cryptography. A fundamental purpose
    of cryptography is to maintain confidentiality and integrity in communication,
    which is done through encryption. In cryptography, the message to be communicated
    is called the plain text and can be read by anyone who understands the language.
    The encrypted message is called the ciphertext and will not be intelligible to
    anyone.


    There are many different ways to encrypt a message. The simplest and one of the
    earliest is called the Caesar cipher because Julius Caesar used it in the Gallic
    wars to send messages between army units. When you use this technique, all the
    letters in the plain text are shifted by a fixed number of places in the alphabet.
    The number of places the ciphertext is shifted in the alphabet is the key used
    for encryption. If `+3` is used as an encryption key, a letter in the plain text
    is shifted three places to the right in the ciphertext.


    The plain text `"hello world"` would produce the ciphertext `"khoor zroug."` Consequently,
    even if the encrypted message, the ciphertext, were intercepted, it would be unintelligible
    to the interceptor. Only if the interceptor knew the algorithm (shifting the letters)
    and the key (`+3`) would they be able to decrypt it.


    This type of encryption might have fooled the Romans'' enemies two thousand years
    ago, but today it would not fool anyone for long. While the discipline of encoding
    messages is called cryptography, the field of breaking codes is called cryptanalysis.
    The cryptanalyst uses different techniques to break the ciphertext and try to
    find the key. An example of this is looking at letter frequencies. If the language
    of the plain text is known, it is easy to find the most frequent letter in the
    ciphertext and assume that this represents the most frequent letter in the language
    of the plain text. There are several other structures to look for in a language,
    such as what letters often follow others and standard phrases.


    If correspondences between probable plain text letters and ciphertext values can
    be found, looking at the shift between them in the alphabet gives away the key
    when a Caesar cipher is used, and it is possible to decrypt the entire ciphertext.


    The Caesar cipher uses what is called a symmetric key. It is called such because
    it uses the same key to encrypt and decrypt the plain text. Cryptography and cryptanalysis
    have resulted in an ever-increasing arms race that has pushed the techniques used
    for encryption to be ever more complex. In World War II, this arms race between
    German cryptographers and British cryptanalysts took center stage.


    After World War I, the Germans introduced the Enigma cipher, which gave them the
    upper hand against the British cryptanalysts. The Enigma machine was complex and
    depended on a significant number of mechanical transformations, but the Germans
    assumed that at some point, the enemy would get hold of the device, so they designed
    it such that without the initial settings and the key, the messages could not
    be decrypted. At Bletchley Park, the British cryptanalysts tried frantically to
    deduce the key, but since the Enigma machine worked with a day key that was changed
    each day, it made all progress during the day worthless when the day was over.
    The next day a new day key was used, and the work started all over from scratch.
    Eventually, though, this key was also intercepted by the capture of a German codebook.


    Symmetric encryption works well in a context where the communicating parties know
    each other and have agreed on a key in advance or if they can exchange the key
    through a secure channel. Such a channel is usually much more limited in terms
    of bandwidth and delay. If, for example, the Gauls were to obtain or guess the
    key used by Caesar, the key would be compromised, and messages encrypted with
    it could no longer be considered confidential. Now Caesar would have to reconvene
    all army unit commanders and agree on a new key or send a dispatcher to them with
    the new key. This process is not convenient since it will take time. Similarly,
    for the Germans, the codebook must be distributed in a secure channel, but even
    that could be compromised.


    The weakness of symmetric encryption is thus that it is necessary to share a key
    first in a secure channel before a secure communication can be initiated. This
    channel is likely to be constrained in terms of bandwidth and delay. It is also
    always at risk of being intercepted by an eavesdropper.'
