- fmt: '# 4. Bitcoin


    Now we can start to piece together how Bitcoin works. The previous chapters allow
    us to understand better the diverse technologies and experiments with virtual
    currencies that made it possible for Bitcoin to appear at this particular time.
    Let us start with a simple outline of some key components of Bitcoin before we
    dive into the technical details that made them possible.


    To put it simply, Bitcoin is a system that provides a virtual currency called
    `bitcoin` that users can exchange without any central intermediary like a bank,
    a company, or another organization. Bitcoin is divisible into eight decimal places
    (compare this with common currencies that are only divisible into two decimal
    places). The smallest unit is called a `satoshi`, similar to what the cent is
    to the dollar.


    To start using `bitcoin`, a user needs to have a digital wallet. This wallet contains
    the public IDs the user can use to exchange `bitcoin` with other users. Its function
    is similar to what we know as an account that holds the `bitcoin` in the sense
    that you have a total of `bitcoin` to spend. It is only possible to get `bitcoin`
    into the wallet in two ways: either by creating `bitcoin` through the process
    of mining, which we will return to, or, the more common option, to have someone
    transfer `bitcoin` to your wallet. This last option can be done as payment for
    goods or services or through purchase.


    It is still a minority who use `bitcoin` as means of payment though. When you
    purchase `bitcoin`, you transfer currency, such as dollars, to an intermediary
    who has `bitcoin` in their wallet to transfer to your wallet. This can be done
    through one of the bitcoin exchanges or anyone with a balance in their wallet.
    Another option is that `bitcoin` is purchased through another cryptocurrency,
    which is also common since `bitcoin` functions as a currency cross between the
    multitude of different cryptocurrencies that exist. These exchanges are external
    to the Bitcoin system. There are no dollars or any other currencies in the Bitcoin
    system.


    So far, our intuitions from regular money and banking have held up: we have a
    currency traded in units that sum to a balance in a wallet, and transfers between
    wallets are possible. But here we start down the path where it gets positively
    strange compared with the traditional monetary system. All transactions that were
    ever made are recorded on a public ledger. This is what is known as the `blockchain`.
    The balance of any wallet is dynamically calculated by looking through all the
    ingoing and outgoing transactions (debit and credit) involving the wallet. There
    is, thus, no recorded balance anywhere; it is a calculated total based on the
    difference between inflow and outflow. The Bitcoin network will let the user spend
    the total at any given time. This is called a `blockchain` because, around every
    ten minutes, pending transactions on the network are packaged into a block that
    gets a number and a hash. This hash is used in the next block, thus forming a
    chain. This method ensures the integrity of the transactions in the chain of blocks
    going back to the very first block, called the Genesis block. We will return to
    the details later.


    Now, this system needs someone to run it. A bank has central servers where all
    transactions are recorded and cleared, but Bitcoin instead has a network of nodes.
    This is a network of computers that all work on the same public record of transactions.
    The network picks up all transactions users want to make and records them in a
    block. These computers that run the Bitcoin network are called miners. They are
    rewarded with `bitcoin` for their work validating transactions. Any computer can,
    in principle, start mining `bitcoin` by downloading the open source Bitcoin software.
    Still, in practice, it is unlikely that a regular computer will ever produce any
    `bitcoin` since the mining task has become very specialized and requires custom-built
    chips to be able ever to get the reward. Remember that there is no reward for
    all the other computers that did not generate the block.


    The miners compete to create the next block of transactions by trying to solve
    a cryptographic puzzle. This is a kind of proof of work and requires the expenditure
    of significant computing resources. The node on the network that first solves
    the puzzle and creates a block of transactions is rewarded with newly minted `bitcoin`.
    Each block generates a fixed amount of `bitcoin` as a reward.


    This is a thumbnail sketch of Bitcoin and how it works to provide a general sense.
    Now let us dive into the details.'
