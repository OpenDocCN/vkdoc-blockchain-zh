  trans: '

    ## 边缘巩固


    在这种情景下，普通大众对比特币失去了耐心。繁荣与萧条的动态变化导致普通比特币投资者经历了太多次市场崩盘。这时候他们对比特币的主要记忆可能只剩下赔钱，因为与更老练的比特币交易者不同，他们缺乏识别下一个下行周期并及时退出投资的工具。


    这种发展趋势可能会因政治压力而加剧——各国对加密货币实施更严格的监管，甚至在某些情况下彻底禁止它。一些国家将效仿中国在 2021 年全面禁止加密货币交易的做法。此举是出于对金融不稳定的担忧。与此同时，中国正在开发符合国家需求的法定数字货币。其他一些国家也同样在着手开发自己法定货币的虚拟版本。推出虚拟法币可能会成为对更难监管的去中心化加密货币实施更严厉打击的推动力。


    加密货币的交易将几乎完全通过西方和亚洲民族国家监管之外的离岸目的地进行。一些领土和较小的主权国家将看到为加密货币行业提供法律和金融框架的机会。这种发展趋势已经在进行中，许多加密货币交易所和公司已在加勒比地区以及美国、中国和欧洲监管范围之外的其他司法管辖区成立。


    如果政府法定货币能借鉴加密货币的许多特性并进行本地化调整，那么对于那些并非必然反对政府的普通民众来说，接受比特币的推动力将大大减弱。另一方面，如果政府从目前容忍加密货币的态度转变为采取更积极的敌对立场，并像中国那样通过法律诉讼威胁来向公民施压，那么活跃用户的数量将大幅减少。这可能导致比特币需求下降，价格呈下跌趋势。这将引发抛售，但不会完全被抛弃，因为比特币的真正信徒、比特币极端主义者以及那些认为比特币的全球性和匿名性特征仍然有用的人会继续使用它。


    这种情景给矿工带来了不同的经济模式，因为他们的盈利能力基础是比特币的价值。之前我们了解到，比特币很难被彻底消灭，因为它能轻易适应挖矿能力的大幅下降。这种情景下同样会发生这种情况。如同比特币的任何下跌趋势一样，挖矿成本最高的矿工会率先看到利润缩水并最终消失。这会开启一个矿工退出网络的过程。虽然总算力会下降，但挖矿难度会随之调整，从而降低比特币的挖矿成本，使其对剩余矿工仍然有利可图。


    因此，在这种情景下，比特币和加密货币的用户群体会比目前更小，由坚定的信仰者和出于实际原因需要比特币的人组成。这些人可能包括网络罪犯和其他犯罪分子、恐怖分子或自由战士（取决于你如何看待他们的事业），以及专制政权下的异见人士。尽管如此，比特币仍将是需要绝对隐私的黑市的首选货币。因此，它可以继续作为一种边缘虚拟货币存在，但规模依然可观。


    ## 民族国家的消失


    过去两个世纪，现代民族国家崛起，成为地球上人类的主要组织形式。如今，除了南极洲等极少数例外，所有土地都以某种方式与某个民族国家相关联。最高级别的全球治理机构是联合国。这一点已经变得如此不言而喻，以至于我们很少停下来思考，这其实是人类文明史上的一个近期异常现象。因此，让我们回顾一下历史上更长时间内盛行过的其他组织形式。


    最基础、最普遍的是部落，它由一群通常有紧密血缘关系的人组成。事实上，当人类学作为一门研究人类文化的学科出现时，亲属关系就是其主要关注点。部落继续以正式或非正式的形式存在于民族国家内部和民族国家之间，但很少被赋予主权。


    历史上有另一种曾占主导地位的组织形式：城邦。很难想象，像意大利和德国这样的著名欧洲国家，在一百多年前还完全不是民族国家，而是在数千年的时间里由地方城邦主导。城邦类似于民族国家，但其范围由一座城市及其周边土地界定。它是主权独立、自给自足的，不依赖任何外部实体。我们知道一些著名的城邦，如威尼斯、雅典、罗马、巴比伦和曼谷。它们今天仍然存在，甚至作为主权实体存在，如摩纳哥、新加坡和梵蒂冈城。


    另一种在历史上长时间控制着大片土地的组织形式是帝国或王国。它们通常包含城邦和属于部落的领土。一些帝国持续了几个世纪，但往往更不稳定，其疆域范围不断变化，这与城邦不同。帝国通常依赖中央集权治理，并伴有不同程度的地区自治权。


    这种情景的前提是，发生了一些事情，触发我们所知的现代民族国家的衰落或崩溃。这可能是因为其失去相关性、新的政治发展，或是像第三次世界大战这样的暴力剧变。因此，很可能会回归到我们在历史上看到过的其他稳定的人类组织形式，即部落、城邦或帝国。


    第三次世界大战可能爆发，届时最强大的民族国家会决定整合它们认为可以主张的领土，或许是基于历史论点或纯粹的机会主义——这正是我们今天在俄罗斯和中国的行动和言论中所看到的。这将导致出现几个大型的区域性帝国。然而，也有可能发生另一种情况：较小的民族国家自愿放弃主权，寻求某个竞争性帝国的保护。


    在这种局面下，大部分国际银行系统将受损。帝国会试图建立自己的贸易体系，以便对贸易行使权力。这将使全球贸易领域出现竞争真空，因为将不再存在像 Swift 这样被全球接受的支付系统。在这种情况下，比特币因其中立性，对于国际支付和汇兑将非常便利。它是一种真正无法被管辖、不受任何单一实体（如美元受制于美国利益）意志左右的货币，这一特性使其能够成为一种支撑跨境支付、被广泛接受的共识支付系统。

    '
- fmt: '# 文章排版


    ## 民族国家的式微


    一种变体是，民族国家开始和平地失去其重要性，并将城市国家作为社会组织的基本单元。这一过程如何展开的迹象已可在美国看到，其中特许城市提供了一个例子。地方治理日益增强的趋势将促进城市承担其人民的大部分（如果不是全部）需求的发展。民族国家可能仍然提供最低限度的服务，如国防和司法系统。在这种模式下，城市可以自由发展自己的替代货币和支付解决方案。在这些城市之间转移资金并支持贸易将需要一种独立货币。


    城市可以拥有本地虚拟货币和区块链来记录官方登记册（如契约）。本地货币用于奖励，也可用于支付城市税收。由于在这种模式下货币会分裂成多种本地货币，`bitcoin`将充当一种参考货币。这将导致`bitcoin`标准的兴起，所有货币都与之挂钩。大部分贸易将以本地货币进行，但本地货币之间的兑换将通过`bitcoin`完成。


    最后一种可能性是部落作为主要组织形式兴起，这可能发生在现有的民族国家内部，并且在某种程度上已经在线发生。在中国，淘宝村提供了这种在线部落的蓝图。我们还看到，人们越来越多地在线上寻找社会群体，而不考虑物理上的邻近性。在这种模式下，物理位置——也许仍由国家主导——已经失去了意义。这种情况类似于几千年来生活在帝国或王国边缘的部落所处的状态。


    正如我们之前所见，民族国家是法定货币和银行体系占据主导地位的主要原因。关于民族国家可能如何消失或失去其重要性，有几种不同的变体，这对交换具有巨大影响。在当今社会，我们看到了所有这些变体的迹象，但我们仍在确定这些趋势是会持续还是会逆转。导致这些情况的历史发展各不相同，但有趣的是，`bitcoin`在这种情景的所有变体中都扮演着重要角色。由于`Bitcoin`天生适合碎片化的交易主义，它也非常适合民族国家的碎片化。它的实用性将得到提升，与其说是作为一种交换媒介，不如说是一种主要用作货币兑换的价值储存手段。


    ## 奇点


    奇点是人类与技术互动发生根本性变化的简称。这个术语最初由未来学家和发明家雷·库兹韦尔提出，在数学中，它表示一个函数未定义的点。关键概念是指数级发展，摩尔定律就是例证。假设是，最终技术发展将使人类能够将自己的思维上传到一个运行在数字计算机硬件上的软件虚拟世界。我们的意识将被一对一地复制到我们意识的软件表示中。


    这是哲学家大卫·查尔默斯、马克斯·泰格马克和尼克·博斯特罗姆所探讨的一种可能性。实现这一目标的技术尚未到来，但基于对技术指数级进步的押注，他们假设这将在不远的将来发生。在这种情景下，人类最终能够部分或完全生活在虚拟现实中，物理身体不再作为体验和互动的主要场所存在。


    然而，到目前为止，奇点的经济学尚未得到广泛分析。认为计算机会仅仅因为能够运行虚拟世界就去运行这些上传的超人类体验的虚拟世界，似乎有些牵强。即使技术持续指数级发展，它也不会是免费的。没有任何理论论证表明奇点会生产出无需能源或维护的技术。仍然会有一个物理世界，在那里需要创造能源，并且需要制造和维护计算机的硬件和软件。


    可以合理地假设，上传的人类必须以某种方式为其上传的家园付费。没有物理存在，这必须通过虚拟货币进行。因此，我们可以想象，上传的人类将不得不向他们的虚拟世界的维护者支付租金。由于永生的虚拟世界生活无法用有限的资金支付，虚拟化身将需要工作来支付租金。因此，他们将工作并以虚拟货币获得报酬，这种虚拟货币很可能是`bitcoin`。或者，他们的储蓄可以是`bitcoin`，而虚拟世界将拥有自己的加密货币，可以与`bitcoin`进行兑换。在这样的虚拟世界中，人们可能还想购买或交易的其他功能，只受想象力的限制。这可能是在特别有趣的、逼真复刻了《指环王》或《银河护卫队》的世界里度假，在名人的陪伴下进入VIP区域，或者有机会与历史人物进行一场由下一代`ChatGPT`驱动的对话。


    同样，虚拟化身可能从事的工作形式也值得思考。网络工作者和虚拟助理是明显的候选。渗透测试员、暗网私家侦探和研究员是其他令人兴奋的选择。奇点听起来很有希望，但仍然需要一种货币来运作。


    由于奇点在很大程度上是一种虚拟存在，似乎可以合理地假设虚拟货币将发挥重要作用。由于`bitcoin`已经是最大的虚拟货币，它很有可能成为虚拟世界的重要货币，甚至是储备货币。


    ## 后末日


    更悲观地看，我们所知的、拥有全球商业和通信的整个人类文明可能会崩溃。在这种情景下，世界经历一场具有全球影响的灾难。可能是小行星撞击、火山喷发、外星人攻击或热核战争。有大量末日预想可供选择，但在这种情景下，它将导致全球人口崩溃以及我们所知的全球经济崩溃。将不再有长途旅行和商业。高科技产业将消失。


    人类将像狩猎采集时代一样，以小群体或部落的形式生活，也许是在地下。人们通过耕种和狩猎生存，表面上类似于远古史前时期的狩猎采集时代，但技术不会消失。许多废旧技术仍可使用，专业知识在某种程度上仍将得到保留。灾前技术将成为稀缺资源，并且越来越难以修复。也许可以生产一些新技术，但技术水平会低得多，而且可能不是数字技术，因为半导体的生产需要一个相当复杂的生态系统。


    随着时间的推移，计算机硬件的拥有量会越来越少。由于虚拟货币依赖于在计算机芯片上运行的软件，它们不会普及，因为需要不常见的计算机作为交换媒介的实用性很低。没有互联网，全球货币将不可行。基于工作量证明的加密货币将不可行，因为能源生产将依赖技术且稀缺。


    因此，在这种情景下，`Bitcoin`消失了。如果灾难允许生产一些技术和能源，一些区块链可能会在本地存续。这些区块链可能支持本地网络，在其中可以使用虚拟货币进行交换，这些虚拟货币可能是区块链，但可能不是基于工作量证明的。一场灾难将意味着`Bitcoin`的终结。'
  raw: 'A variant of this is that the nation-state peacefully starts to lose its significance
    and gives way to the city-state as the primary unit of organization of society.
    Some indication of how that process could unfold can already be seen in the United
    States where charter cities provide an example. The trend of increasing local
    governance would strengthen the development toward a situation where cities undertake
    most if not all of the needs of their people. The nation-state may still provide
    minimal services like defense and judicial systems. In this model, cities would
    be free to develop their own alternative currencies and payment solutions. Moving
    funds between these and supporting trade would necessitate an independent currency.


    Cities could have local virtual currencies and blockchains to document official
    registries like deeds. The local currencies are used for rewards and can be used
    for paying city taxes. Since currency in this model would splinter into multiple
    local currencies, bitcoin would act as a reference currency. This would see the
    rise of the bitcoin standard against which currencies are pegged. Most trade would
    be done in the local currencies, but exchange between them would be done through
    bitcoin.


    The last possibility is the rise of tribes as the primary mode of organization,
    which could happen inside the current nation-states and is to some extent already
    happening online. In China, Taobao villages provide the blueprint of such an online
    tribe. We also see that people increasingly find social groups online irrespective
    of physical proximity. In this model, the physical location, perhaps still dominated
    by the state, has lost its significance. This situation is similar to the state
    of affairs for tribes living on the fringe of empires or kingdoms for millennia.


    As we saw earlier, the nation-state is the primary reason for the dominance of
    fiat currencies and the banking system. There are several different variants of
    how the nation-state could disappear or lose its prominence, which has tremendous
    consequences for exchange. In current society, we see indications of all of them,
    but we are still determining if these trends will continue or reverse. The historical
    developments leading to this differ, but interestingly, bitcoin assumes a prominent
    role in all variants of this scenario. Since Bitcoin is well-designed for fragmented
    transactionalism, it is well-suited for the fragmentation of the nation-state.
    It will increase its utility, not so much as a medium of exchange, but as a store
    of value primarily used for currency exchange.


    ## The Singularity


    The singularity is a shorthand for radical changes in humans'' interaction with
    technology. It is a term originally coined by futurist and inventor Ray Kurzweil
    and, in mathematics, denotes a point where a function is undefined. The critical
    concept is exponential development, exemplified by Moore''s law. The assumption
    is that ultimately, technological development will allow humans to upload their
    minds to a virtual world of software running on digital computer hardware. Our
    minds will be copied one-to-one to a software representation of our consciousness.


    This is a possibility that philosophers such as David Chalmers, Max Tegmark, and
    Nick Bostrom have taken up. The technology for this has yet to arrive, but betting
    on the exponential improvement of technology, they assume that it will happen
    in the not-too-distant future. In this scenario, humans are thus finally able
    to partially or wholly live in virtual realities where the physical body is no
    longer present as the primary locus of experience and interaction.


    Until now the economics of the singularity have not been widely analyzed though.
    It seems far-fetched that computers would run these virtual worlds of the uploaded
    transhuman experience just because they could. Even with a continuation of the
    exponential development of technology, it will not be free. No theoretical argument
    has been made that the singularity will produce technology without energy or maintenance.
    There will still be a physical world where energy needs to be created and hardware
    and software for the computers made and maintained.


    It is reasonable to assume that uploaded humans would have to pay for their uploaded
    home somehow. Without a physical presence, that would have to be in a virtual
    currency. We can therefore imagine that uploaded humans will have to pay rent
    to the maintainers of their virtual worlds. Since eternal life in the metaverse
    can''t be paid for with finite sums, the virtual avatars would need to work to
    pay the rent. Therefore, they will work and be paid in a virtual currency, which
    could very well be bitcoin. Alternatively, their savings could be in bitcoin,
    and the virtual world would have its own cryptocurrency that could be exchanged
    with bitcoin. What other features one could want to buy or trade in such a virtual
    world are only limited by imagination. It could be vacation in particularly interesting
    worlds that are lifelike copies of *The Lord of the Rings* or *Guardians of the
    Galaxy*, VIP zones in the company of famous people, or the opportunity for a next-generation
    ChatGPT-infused conversation with historical figures.


    Similarly, the forms of work a virtual avatar could perform are interesting to
    think about. Web worker and virtual assistant are obvious candidates. Penetration
    tester, dark web private investigator, and researcher are other exciting options.
    The singularity sounds promising but would still require a currency to work.


    Since the singularity to a large extent is a virtual existence, it seems fair
    to assume that virtual currencies would play a significant role. Since bitcoin
    is already the biggest, it would stand an excellent chance to be a significant
    currency or even the reserve currency of the metaverse.


    ## Post-apocalypse


    On a darker note, the entire human civilization as we know it with global commerce
    and communication could collapse. In this scenario, the world experiences a cataclysm
    with global implications. It could be a meteor impact, volcanic eruption, alien
    attack, or thermonuclear war. There are plenty of doomsday visions to choose from,
    but in this scenario, it would lead to global population collapse and a collapse
    of the global economy as we know it. There would be no more long-range travel
    and commerce. High-tech industry would disappear.


    Humans would live in small bands or tribes as in the time of hunter-gatherers,
    perhaps underground. People would survive by farming and hunting, superficially
    resembling the hunter-gatherer days of the deep prehistoric past, but technology
    would not be gone. Much scavenged technology could be used, and know-how would
    still be preserved to some extent. Pre-apocalypse technology would become a scarce
    resource and be increasingly difficult to repair. Some new technology could perhaps
    be produced but would be at a much lower level and probably not digital since
    the production of semiconductors requires a pretty sophisticated ecosystem.


    Ownership of computer hardware would be increasingly rare with time. Since virtual
    currencies depend on software running on computer chips, they would not be widespread
    since the utility of a medium of exchange that requires computers, which are not
    common, is low. Without an Internet, global currencies would not be feasible.
    Proof-of-work-based cryptocurrencies would not be viable since energy production
    would depend on technology and be scarce.


    Consequently, in this scenario, Bitcoin disappears. Some blockchains might persist
    locally, if the apocalypse allows the production of some technology and energy.
    These could feature local networks where exchange could occur in virtual currencies,
    which could be blockchains but probably not proof-of-work-based ones. An apocalypse
    would mean the end of Bitcoin.'
