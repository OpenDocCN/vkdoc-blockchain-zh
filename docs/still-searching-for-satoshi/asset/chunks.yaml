  trans: '

    ### 比特币作为超物体


    从某种意义上说，比特币不仅超越了时间，也超越了空间。哲学家蒂莫西·莫顿提出了超物体的概念，用以描述在时空上非局域性的实体。例如全球变暖、石油储备或英语语言；即使你能感知到超物体，也很难把握其全貌。你可以经历降雨或森林火灾，但这并不能构成气候变化。气候变化作为一个超物体，通过天气现象和测量数据与现实世界互动，但由于其巨大规模，无法被简化为这些互动。


    超物体展现出一些区别于人类可感知普通物体的特征。它们在时间和空间上是非局域性的。从这个角度来看，石油储备不仅仅是埋藏在地下的黑色粘稠物质，还包括那些产生有机化合物、进而形成石油的动植物。因此，其时间尺度延伸至数千年，过去与现在交织于物理形态之中，例如让我能够驱车从一处到另一处的汽油。同样，比特币也依赖于过去，因为币是在过去生成的，任何人在交易中使用的余额都依赖于过去比特币的生成。但它也受到未来的显著影响，因为比特币的设计决定了供应量是有限的，并将在未来某个时刻停止。这一特性产生了比特币的通缩压力；稀缺性以及由此产生的当代价值，正是由未来的比特币所创造的。


    从地理意义上讲，比特币也是彻底非局域性的，因为它是分布式系统的产物，是一个由挖矿节点构成的网络。这些节点可以在任何时间、任何地点加入或离开比特币处理网络。比特币超物体以非局域的方式影响着这些本地的物理机器，因为它依赖于一个由这个网络共享并产生的分布式账本，而不受任何特定物理设备的影响。


    超物体还具有阶段性特征；它们拥有无法直接感知的高维相空间。为了想象高维过程的可理解性，可以设想一个生活在类似纸片世界里的二维生物。这个二维生物只能在其二维世界的平面上感知到线条和点。现在想象一个三维球体穿过这个平面。对这个二维生物而言，这看起来就像一个点扩展成一条线，然后收缩成一个点并消失。


    相空间是系统所有可能状态的集合。每个参数都被呈现为多维空间中的一个维度。一个二维系统被称为相平面。系统的演化会随时间在相平面上留下轨迹。但这条轨迹是由多维空间中运作的过程和力所定义的。如同球体在二维生物眼中的显现，要理解这条随时间变化的轨迹，就必须理解所有维度上的初始条件和作用力，即从系统所有参数的初始状态到每个维度上影响系统的力。比特币的这些维度可能包括哈希率（网络上总
    CPU 算力）、比特币供应量、交易量等。比特币超物体在这个多维空间中的效应，可以追溯到比特币的价格。波动性、繁荣与萧条周期，如果你愿意这么理解的话，正是多维相空间内各种过程产生的结果。


    超物体的最后一个特性是它们具有互客观性。例如，英语语言依赖于所写的书籍、所说的话语以及其他语言。这形成了一个相互作用的物体网络。我们在英语中能找到法语词汇，在法语中也能找到英语词汇。语言也通过互动而演变，这在推文、视频和文本的书写方式中可见一斑；这里出现了历史书籍中没有的新词汇，从而拓展了整个英语语言的意义和内容。这是一个物体间的关系网络。比特币也存在同样的动态，比特币被用作通往其他加密货币的桥梁：要购买其他加密货币，通常需要先通过比特币进行兑换。因此，比特币受到这些加密货币流行度和使用情况的影响。同样，比特币也被用作与法定货币的兑换桥梁，并受到传统金融世界进程的影响，正如经济危机如何推动比特币价格上涨或下跌所体现的那样。


    ### 启动搜寻


    无论比特币是什么，它都不易把握。理解它的方式多种多样；我们尚未找到唯一正确的理解。就像其发明者中本聪的身份至今仍是个谜一样，比特币的真实本质和构成也同样让我们捉摸不透。因此，从字面和隐喻意义上讲，正如本书书名所示，我们仍然在寻找中本聪。我们将用本书的剩余篇幅，来阐明这场对中本聪以及比特币和区块链本质的字面与象征性的追寻。

    '
- fmt: '# Outline of the Book


    The first part of the book is a technological history, which reviews the key developments
    that Bitcoin builds on. These developed more or less independently and combined
    into Bitcoin. Once they are explained, it is possible to give a deeper explanation
    of how Bitcoin works. This understanding will inform the remaining parts of the
    book.


    We will look at the history of electronic or virtual money before Bitcoin. The
    dream of having to dispense with the physical aspects of money is an old one,
    and several unsuccessful attempts had been made before Bitcoin. By eliminating
    the physical aspects of money, forgery is impossible or at least transformed into
    an electronic effort. But with that come new problems and regulatory challenges.


    Critical developments in cryptography in the twentieth century paved the way for
    Bitcoin. The purpose of cryptography is to keep information private by preserving
    its confidentiality and integrity. Cryptography has a long history and has only
    recently developed into a dedicated academic field. The advent of the electronic
    computer only exacerbated already existing trends, which led to the development
    of new techniques designed to mitigate the connected world of the Internet and
    resulted in fundamentally new approaches to millennia-old problems.


    Based on the knowledge we gained about the historical antecedents, we will piece
    together how Bitcoin and the blockchain work. We will see how central concepts
    like wallet, blockchain, mining, and the Bitcoin token work in the Bitcoin system
    to provide a global virtual currency.


    After the general historical investigation, we will turn our attention to the
    particular historical aspects surrounding the emergence of Bitcoin. We will try
    to provide a historical account of the development and look at what the sources
    can tell us about the mysterious inventor: Satoshi Nakamoto.


    We will try to provide some insight into who the historical Satoshi Nakamoto is.
    Much previous writing about Bitcoin has focused on who the historical person or
    persons behind Satoshi Nakamoto were, but we will apply a historical critical
    perspective to this question and sift through the available evidence to create
    a better understanding of what we can and cannot say about the identity of Satoshi
    Nakamoto.


    Since 2011 much investigation and speculation has been done by established journalists
    and amateur bloggers alike. But what do the sources actually say? By focusing
    on the sources, we are able to extract several key characteristics to look for.
    This will allow us to build a profile of Satoshi. From the basis of the primary
    sources, we will constitute a list of possible historical persons who could be
    Satoshi and match them to the profile. Indeed we will find that there is one and
    only one clear match.


    The last part of the book will try to put Bitcoin in context and look at how Bitcoin
    can be viewed in the broader context of human civilization since it does not exist
    in a technological vacuum addressing only technological issues but is rather firmly
    situated in a web of themes that are and have been central to human civilization.


    Since prehistoric times humans have engaged in exchange. This has taken many different
    shapes on a continuum from barter, through intermediaries such as cowry shells,
    gold, and silver coins, to purely symbolic means of exchange. We will look at
    the history and nature of money and see how Bitcoin fits.


    Social organization is critical to understanding cultural phenomena. We will consequently
    look deeper into the different types of social organizations that have been associated
    with Bitcoin. We will look at the cypherpunks, libertarians, and open source development
    communities and how the nature and vision of Bitcoin are tied to the social organization
    in which it developed and is used.


    A rarely debated issue is the religious aspects of Bitcoin and the crypto movement.
    But these aspects are nothing new when it comes to human cultures. Understanding
    this helps explain many of Bitcoin believers’ seemingly strange behavior without
    claiming that Bitcoin is an actual religion. We can see definite resemblances
    in the prophet, Satoshi Nakamoto; the sacred scriptures, the Bitcoin whitepaper;
    the classification of true believers and heathens; and the ubiquitous millenarianist
    aspects.


    We will then look at the possible future of Bitcoin. Based on a few future development
    scenarios, we will reason about how Bitcoin might fit. Based on the insights we
    have gathered over the course of the book, we can hypothetically model how Bitcoin
    might develop in different circumstances.


    In the final chapter, we will go beyond the human perspective and try to look
    at Bitcoin from a different perspective. We will ask the question of whether Bitcoin
    might be alive by comparing it with the criteria of ordinary biological life.
    We will find that, surprisingly, it is an independent hyperorganism that shows
    signs of being alive.


    About the Author About the Technical Reviewer


    # 1. Virtual Currency


    The dream of dispensing with the physical aspects of money is old. Several attempts
    had been made before Bitcoin. Throughout human history, an incredible array of
    mediums have been used as money ranging from massive stones on the Yap Islands,
    over seashells in Melanesia, to paper notes in China. The diversity and imaginative
    thrust notwithstanding, money always had a physical aspect.


    The physicality of money has apparent drawbacks. If one needed to go to the market
    in the next town to buy a horse, it was necessary to bring the money for that.
    This limits what mediums can be used as money since the weight would have to be
    carried or otherwise transported. Bricks and trunks of wood were thus not good
    choices for money. More common were smaller rare objects like seashells, beads,
    and precious metals, while in more recent history, paper notes gained popularity
    too. These provided a tolerable solution for the problem of transportation. Still,
    the money had to be stored between exchange events, which meant that it could
    be destroyed in the event of a fire, corroded in the case of metals like silver
    and copper, or crushed in the case of shells. The physical world allows for many
    possible ways of destruction, which is unfortunate. A further problem is the risk
    of theft since ownership of money can only be determined by possession. Add to
    these woes the possibility of forgery, whereby new money is produced and illicitly
    introduced into the economy.


    There are consequently many good reasons to wish for a virtual currency whereby
    these physical adversities would disappear. Some of these issues were eliminated
    by introducing checks and credit cards in the twentieth century. But these new
    technologies, in turn, introduced new problems. Checks have to be cleared and
    can bounce, so a transaction is not necessarily final at the time the check is
    written. The same is the case for credit cards. Payments take days to clear and
    can be contested subsequently. These were never issues with physical money. Another
    grief some people have is that banks are necessary intermediaries with a privileged
    view into our private lives that they should not have due to the fundamental right
    to privacy. Again, something different from physical money. A virtual currency
    is consequently not just a virtually mediated way of spending regular physical
    money; it is a new way to support exchange of goods and services that brings its
    own unique possibilities and challenges.'
