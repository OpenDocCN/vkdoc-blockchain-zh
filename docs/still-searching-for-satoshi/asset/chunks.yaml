- fmt: '### Other Evidence


    Other pieces of evidence are consistent with Adam Back being Satoshi. There is
    the fact that he uses double spacing after a period when he writes, similar to
    Satoshi. He is, of course, not unique in this respect since this was a writing
    style taught to people who started writing on typewriters before writing on computers.
    He matches the British language and is similarly fluent, with very few errors
    in his writing.


    Another thing to consider is that he has the unique combination of skills Satoshi
    showed. It is not very common to know about distributed computing, cryptography,
    and virtual currencies. This is a relatively rare combination, particularly knowing
    about peer-to-peer computing, which was Back’s specialty.


    The YouTuber Barely Sociable also points out the fact that Adam Back was filing
    patents until 2005 and then nothing until again in 2011 when Satoshi stepped back
    from Bitcoin. He also did not write academic papers during this period. He did
    not participate in mailing lists from 2007 to 2010. The `Hashcash` website seems
    to have stopped being updated in 2004 since no media stories are listed after
    that point. Back started updating the Wikipedia site about Bitcoin in 2012 but
    did not get involved until 2013. On Twitter, he followed the discussion about
    WikiLeaks using Bitcoin attentively. In 2013, when he joined the Bitcoin Talk
    forum, he referred to an obscure bug that was fixed in 2010 that allowed Satoshi
    to mine a second hoard of coins that could not be traced to him.


    If you compare Adam Back’s website and the first version of the Bitcoin website,
    they are similar in their lack of styling. But this is also standard cypherpunk
    style.


    These are all pieces of circumstantial evidence pointing to Back. Each of them
    can be explained away individually. What is important is that here we have shown
    that Adam Back is the only person from a list of possible suspects who fits all
    aspects of the profile we created for Satoshi. He has the skills and motive to
    be the inventor of Bitcoin. This, of course, does not prove anything beyond a
    doubt, but “if it walks like a duck and quacks like a duck…”


    ### But Then Again…


    Adam Back maintains that he had email exchanges with Satoshi but will not reveal
    them due to “netiquette.” He holds that it is not okay to reveal personal communication
    without prior consent. Another curious lead he gave on Bitcoin Talk on May 14,
    2013, is an anonymous comment made in 1999 on a cypherpunk email thread. He indicates
    that this reply might have been by Nakamoto. In this reply, the anonymous respondent
    suggests an ecash system that solves the double spending problem by a public database,
    which is distributed by combining it with `Hashcash` and `B-money`. The suggestion
    does indeed sound a lot like an early vision of Bitcoin. The author even writes
    with double spacing after a period. He seems to like Back and Dai. In a reply
    from January 9, 1998, he argues that people like Timothy May, Paul Bradley, and
    others should leave the list: “This will leave fine thinkers with good hearts
    like Adam Back, Bill Stewart, Wei Dai, and others, people who still believe that
    cryptography can make a strong contribution to our freedom.” He also demonstrates
    a relatively deep knowledge of cryptography.


    Could this be Satoshi, then? In other replies “Anonymous” seems much more confrontational,
    and he writes in American English. And if he was Satoshi, why would he say Back
    directed him to Dai’s work in 2008, and why would he write Dai about a reference
    suggesting a completely wrong year if he already knew about it since 1999? Or
    was this actually the post that put Back on the right track to create Bitcoin
    as Satoshi?


    ## Concluding the Search for Satoshi


    As with anything in history, it is difficult to know for sure who the person behind
    Satoshi is. The purpose of this investigation was to interrogate the available
    evidence and find out if it was possible to identify a possible suspect. We looked
    first at the evidence to create a profile of what we knew for certain or found
    highly likely. Then we started looking for potential suspects to match this profile.
    This was done by looking at the citations in Satoshi’s Bitcoin whitepaper since
    academics tend to cite research by themselves. Then we looked at evidence of people
    who had engaged in dialogue about the two ideas that form the basis of the Bitcoin
    whitepaper: `Hashcash` and `B-money`. This was done by combing through the cypherpunk
    mailing list for all threads about them and listing all the people who responded
    to these threads. This yielded a list of 29 people that were researched to determine
    the degree to which they matched the profile criteria. No one matched more than
    8 out of 13 criteria except Adam Back. Reviewing additional evidence supported
    the view that he had the motive, opportunity, and means to create Bitcoin. Back
    denies this, as we saw anyone being identified as Satoshi would have good reason
    to. It is, of course, possible that someone else who left no other discernible
    trace of his interest in this highly specialized niche is Satoshi. It might be
    the FBI, the Bilderberg group, or just some other “anonymous” genius listening
    in on conversations and reading research papers. But this is not the simplest
    explanation. Scientific and historical knowledge proceeds by following the evidence
    and accepting the simplest explanation, but I will leave it up to the reader to
    decide who or what created Bitcoin. I only hope to have provided clarity on what
    our quite substantial evidence actually tells us.


    ## 8. Money


    That bitcoin is money may seem straightforward, almost self-evident. You can exchange
    it for currency, check your account to see your balance, and buy goods and services.
    But from there, it gets murky since it does not resemble the regular currency
    we use to pay taxes and buy groceries. What people have come to understand as
    “normal” money is so-called fiat currencies such as dollars, yen, and euros. The
    word *fiat* comes from Latin and means “may it be done” or “let it be done.” This
    was the word used in the Vulgate, which was the Latin translation of the Bible,
    more precisely at the start of the book of Genesis where God uttered, “Let there
    be light” (“Fiat lux” Genesis 1:3). Modern currencies similarly work by decree,
    though not entirely sanctioned by God but rather by nation-states, that the money
    they print has value. One can think of fiat currency in much the same way: “Let
    it be valuable.”


    Bitcoin does not work in the same way. There is no divine governmental or another
    entity sanctioning its value. So to understand bitcoin’s meaning, we need to ask,
    “How does money become money? Or what is money?” and where does Bitcoin fit into
    that?


    ### The Variety of Money


    Before diving into the question of bitcoin as money, let us look at what money
    is from a broader perspective than modern fiat currencies, a relatively recent
    and exceptional phenomenon. First, let us consider some examples that show the
    diversity of money.'
