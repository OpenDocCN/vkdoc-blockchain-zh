  trans: '

    ### 英国人的巧思


    大约 20 年后，人们发现，早在 20 世纪 70 年代初，为英国政府通信总部（GCHQ）工作的英国密码学家就已经发明了这样的系统。到 20 世纪 60 年代末，英国情报部门开始研究密钥分发问题，因为密钥分发被视为未来战场通信的关键部分。他们设想了一个未来，每个士兵都能使用加密通信。这将使密钥分发变得困难重重。


    詹姆斯·H·埃利斯受命研究密钥分发问题。他最终构思出了与迪菲和赫尔曼相似的想法，并证明了其可行性，但他未能找到实现这一想法的数学函数。多年来，GCHQ 一直致力于寻找这个函数。1973
    年，一位名叫克利福德·科克斯的年轻数学家受命尝试寻找能使非对称密码学成为可能的函数。他几乎立刻就找到了利用质数的函数，并实际上比罗恩·里维斯特早数年发现了
    RSA 算法。


    由于为军方工作，他们并未意识到这会有任何普遍适用性，这也是该成果直到 1997 年才被英国政府解密的原因。当时这一系统更多地被视为一种新奇事物，而非重要创新，因为它依赖于当时看来极其庞大的计算能力。随后几十年的计算机技术发展使其变得可行。因此，计算能力的提升与数学上的突破相互融合，使得非对称加密在
    20 世纪 70 年代末成为可能。


    ## 将公钥密码学带给大众


    军事背景及其应用后来一直困扰着公钥密码学的发展。尽管通用方法在 RSA 论文中得以发表，但具体细节却无法获取——在英国情报部门那里属于绝密，在 RSA 算法方面则受专利保护。当时并没有公开可用的版本。


    随着互联网向更多人开放，且个人电脑的计算能力在整个 20 世纪 80 年代稳步增长，公钥加密在原则上得以面向更广泛的受众。政府历来将密码学用于军事和外交目的。但随着互联网和电子邮件的出现，一个新的问题产生了。在实体信件时代，政府或其他行为者可以通过打开和封好信件来监听对话。由于存在物理限制，无法大规模拆阅信件。但对于电子邮件而言，情况则不同。政府可以轻松读取以明文发送的每一封电子邮件，甚至可以搜索关键词。这一事实困扰着某些不信任政府意图的人。


    这促使美国计算机科学家菲尔·齐默尔曼基于迪菲-赫尔曼文章中的原理，开发了一个能以便捷方式使用公私钥加密的程序。他认为普通人有权享有隐私，并将这个程序命名为“Pretty
    Good Privacy”（PGP 加密）。


    齐默尔曼将 PGP 发布到互联网上，它很快获得了关注。这看似成功，直到两年后，美国海关总署对齐默尔曼展开了刑事调查。当时，加密仍被视为军事事务，因此受到武器出口管制。由于
    PGP 是通过互联网分发的，它可能被视为“无证出口军火”。这本来可能成为公钥加密方案公开化的终结，但齐默尔曼找到了一个巧妙的方法来规避这一点：他将 PGP
    程序的完整源代码出版成了一本书。这样一来，他就可以援引第一修正案赋予他的言论自由权利。


    虽然比特币并未使用 PGP，但它受到密码朋克的青睐，密码学邮件列表的成员通常会在邮件中公布自己的 PGP 公钥，用于加密通信。这也展示了一份蓝图，说明了公钥加密乃至整个密码系统如何可以被应用于互联网。


    公钥加密是一种确保机密性的方式，即保护消息明文的隐私。因此，它对于比特币的传输或生成而言并非核心关键，因为所有交易都是公开的。但它被用作其他关键功能（如数字签名）的基础。在深入探讨细节之前，我们必须考虑另一个至关重要的密码学函数。

    '
- fmt: "# Hashing\n\nA central function for the workings of Bitcoin is what is known\
    \ as a hash function. A hash function is a function that takes an arbitrary-size\
    \ data as input and generates a fixed, usually shorter, length output. This shorter\
    \ output is called a hash.\n\nLet us look at an example: using the hash algorithm\
    \ `MD5` (message digest), this text\n\n> *An old silent pond…*\n> \n> *A frog\
    \ jumps into the pond,*\n> \n> *splash! Silence again.*\n> \n> *Autumn moonlight—*\n\
    > \n> *a worm digs silently*\n> \n> *into the chestnut.*\n> \n> *Lightning flash—*\n\
    > \n> *what I thought were faces*\n> \n> *are plumes of pampas grass.*\n> \n>\
    \ —Basho Matsuo\n\nyields this hash: `5e477f116910df7e60d4ca527335a6e2`.\n\n>\
    \ *That's one small step for man, one giant leap for mankind.*\n> \n> —Neil Armstrong\n\
    \nyields this hash: `ee77e1ab9d67a32bcc00cf42d71b7ae7`.\n\nAs can be seen, the\
    \ resulting hash string is of precisely the same length. If we input Tolstoy’s\
    \ *War and Peace*, the hashing would still only result in the same size of the\
    \ hash.\n\nThe hash function has the additional property that every time it is\
    \ applied to the same input, it generates the same output. No matter where or\
    \ when someone calculates the preceding inputs, they will result in the same hash.\
    \ Furthermore, this calculation is not computationally intensive.\n\nMoreover,\
    \ even the slightest change in input to a hash function will result in a radically\
    \ different output, as can be seen from the following example:\n\n- “Where is\
    \ my mind” yields this hash: `a05f82ba995f3cb65d0947373387925b`.\n- “Where is\
    \ my mint” yields this hash: `d9f4f0831e1045363f14699ca8a9d4e6`.\n\nNot one character\
    \ is the same in any position of the resulting output hash, whereas only one character\
    \ (the last) differed in the input. It is also improbable that any other input\
    \ will yield the same output, a phenomenon known as a hash collision.\n\nThe last\
    \ important thing to observe is that a hash function is a one-way function, which\
    \ cryptographers call a trapdoor. You can only go from input to output, not the\
    \ other way. It is impossible to recreate the input from the output.\n\nThe mathematical\
    \ function used in popular hashing algorithms like `MD5`, `SHA-1`, and `SHA-2`\
    \ is called a Merkle-Damgård construction. It was discovered by Ralph Merkle,\
    \ the same Merkle who worked with Diffie and Hellman, in 1979 and later proven\
    \ independently by Ivan Bjerre Damgård ten years later. This construction assures\
    \ that any input can be compressed to a fixed length.\n\nRonald Rivest (one of\
    \ the authors of the RSA paper) developed the `MD2` (message digest) hashing function\
    \ in 1989 and gradually improved it until `MD5` in 1992, which was based on a\
    \ 128-bit result. These were reasonably successful, but given that computing became\
    \ increasingly powerful and cheap, the bar for what was considered secure continued\
    \ to move.\n\nRemember that a hash collision means that two different inputs create\
    \ the same result. This is very unlikely but possible. A brute-force attack that\
    \ tries a lot of possible combinations might need to try a high number of times.\
    \ If this is done, it undermines the premise that a hash function proves that\
    \ the hash is the output derived from an input.\n\nWith a hash function producing\
    \ a hash of 128 bits (like the `MD5`), a brute-force attack needs only to try\
    \ several random inputs to produce 128 identical bits. This was difficult at the\
    \ time, but around 1993, the National Institute of Standards and Technology (NIST)\
    \ was not confident in the security and developed the `SHA` (Secure Hash Algorithm)\
    \ with a 160-bit result. This was later followed by `SHA-1` and `SHA-2`, which\
    \ are the most common and well-known, since they form the bedrock of encryption\
    \ on the Internet and are used for secure communication technologies like web\
    \ certificates, `SSL`, `TLS`, etc.\n\nThe `MD5` and `SHA-1` have now been shown\
    \ to be susceptible to collision attacks and are no longer considered sufficient.\
    \ The NIST is working on a `SHA-3` with a different structure. This development\
    \ is expected to continue with the increasing availability of computing power.\n\
    \nTo sum up, hashing is a function to create a digest or fingerprint of a data\
    \ input. This “fingerprint,” like human fingerprints, is not necessarily unique\
    \ and may be achieved by another input. This is called a collision. A collision\
    \ can be achieved only by brute force, that is, trying a large number of different\
    \ random inputs, and not incremental changes that will continuously get closer\
    \ to the hash value. This is a crucial property of hashing that finds innovative\
    \ use in Hashcash, as we shall see later in the “Proof of Work” section, but first\
    \ we must return to digital signatures.\n\n# Digital Signature\n\nBuilding on\
    \ Diffie and Hellman’s work, Rivest, Shamir, and Adleman also showed how their\
    \ method could be used for signing a message. If Bob writes a message to Alice\
    \ using Alice’s public key for encryption, he can then use his private key to\
    \ generate a signature of the text. Alice can then decode the message and verify\
    \ that it was indeed Bob who signed it by using Bob’s public key. This process\
    \ is called non-repudiation, that is, proof that someone had to have signed this.\
    \ Non-repudiation is particularly important in the case of contracts and transfers\
    \ of money. The digital signature proves that this particular text was signed\
    \ with this particular private key belonging to the public key of a known owner.\n\
    \nOne of the missing pieces of the puzzle to achieve a digital signature scheme\
    \ was a convenient way to sign a message. Signing it in its entirety was computationally\
    \ intensive, so another approach was needed. The message could be reduced before\
    \ it was signed. Instead of signing the entire message, one can create a hash\
    \ of the message. As we saw previously, this is a fingerprint that, with very\
    \ high probability, cannot be produced by another input. The fingerprint thus\
    \ represents the message. This hash can then be encrypted with the author’s private\
    \ key.\n\nUsing the author’s public key to decrypt the signature yields the hash.\
    \ The original plain text message can then be hashed, and the resulting hash can\
    \ be compared to the one derived from the signature. If it is identical, it proves\
    \ that the owner of the private key belonging to the author’s public key encrypted\
    \ the message, or more simply, the author wrote precisely this message.\n\nThis\
    \ effect can be used for different things. First of all, it can be used for documenting\
    \ the wording of a contract, for example. If two parties to a contract do not\
    \ have identical versions, it can be proven with mathematical certainty which\
    \ version is correct: the one yielding the hash that was signed. Second, it can\
    \ be used to document the integrity of the message, that is, no one inserted anything\
    \ into the message during transit or afterward.\n\nDigital signatures are, therefore,\
    \ more efficient than regular ones since they prove that the signer signed the\
    \ document and the particular shape of the document. This is a feature that we\
    \ will see in many applications of the blockchain."
