- fmt: "## Proof of Work  \n\nThe next natural question is, what do these computers\
    \ running the Bitcoin software connected in a network do? The answer is that they\
    \ perform the process of bitcoin mining. This process is virtually identical to\
    \ the proof-of-work function of Hashcash, but how does that work in detail?  \n\
    \nThe proof-of-work principle is that performing a function should not be free.\
    \ In the case of Hashcash, that function was sending emails or requests to a web\
    \ server. For Bitcoin, this function is to include transactions into a block and\
    \ print money, that is, bitcoin. It makes perfect sense that such a function needs\
    \ to be somehow costly; otherwise, everyone would just start creating blocks to\
    \ get bitcoin.  \n\nThe problem is how exactly you prove that you worked on creating\
    \ the block. Bundling several pending transactions together and hashing them naturally\
    \ requires some work, but that is microscopic and not costly by itself. To create\
    \ a cost, a cryptographic puzzle is added to this work.  \n\nRecall that a hash\
    \ is essentially a number of fixed length. Bitcoin uses the SHA-256 algorithm\
    \ to create a hash of all the transactions in a block. This hash is a string of\
    \ 256 bits. It is represented as a hexadecimal value. The hexadecimal numbering\
    \ system is what is called a base-16 encoded numbering. The base refers to how\
    \ many different numbers there are in the number system. The binary system is\
    \ base 2, that is, there are only two numbers: 0 and 1. The decimal system is\
    \ base 10, meaning there are ten different numbers: 0 through 9. The hexadecimal\
    \ system thus has 16 different numbers. Since we don’t have number symbols for\
    \ more than 10 in the decimal system, the additional numbers are represented with\
    \ characters A through F. Since we can represent any number in a hexadecimal system\
    \ with 4 bits, the resulting string in hexadecimal is 64 characters long (256/4)\
    \ containing decimal numbers and letters A–F.  \n\nWith this in place, let us\
    \ return to the puzzle. Creating a hash without any requirements for the final\
    \ string is trivial. Any hash value will do. But if we add the requirement that\
    \ the resulting hash value should have one 0 in the beginning, we can no longer\
    \ trivially generate the hash value. Since we know that trying the hash algorithm\
    \ again won’t make a difference, we have to adjust the input. We could, of course,\
    \ try to add or subtract random transactions, but that is inconvenient. Instead,\
    \ the Bitcoin system lets miners add a number, called a “nonce,” to a block. The\
    \ name refers to a “number used only once,” and it is a 32-bit field. Since a\
    \ hash is very sensitive to any change in input, any number in the nonce will\
    \ change the resulting hash value dramatically. Therefore, the puzzle is to figure\
    \ out what value to add in the nonce to make the hash of the transactions and\
    \ other information in the block result in a value below the value set as the\
    \ target.  \n\nAs can easily be seen, there are fewer values that start with 0\
    \ than the total sum of possible hash values. If we add another zero, we further\
    \ decrease the number of total acceptable hash values. In fact, with each additional\
    \ 0 added, the entire solution space decreases. This means that the probability\
    \ of generating the correct hash decreases with each zero added at the beginning\
    \ of the target value. The consequence of this is that, on average, more tries\
    \ will have to be made before a hash value that satisfies the target is found.\
    \ This is the essence of mining: a cryptographic lottery. And the difficulty is\
    \ proportional to the number of leading zeroes the miners must find for the resulting\
    \ hash value.  \n\nOne could now ask how that translates to proof of work. The\
    \ answer is that each guess at the hash value requires work by a CPU. Actually,\
    \ it does not have to be a CPU; you could calculate the hash yourself by hand,\
    \ which has been done and takes hours. The faster the CPU, the more guesses it\
    \ can try out in a period. Since there is only a reward for the first miner to\
    \ arrive at a solution, time is of the essence. The faster the CPU, the more cryptographic\
    \ lottery tickets you will have. The higher the difficulty, the higher the total\
    \ CPU work needed to guess a correct solution.  \n\nSince Moore’s law has made\
    \ sure that computing power continues to expand, what was considered difficult\
    \ when Satoshi wrote the Bitcoin whitepaper might be trivial today. In other words,\
    \ the CPU work needed to solve a given difficulty in 2009 would be significantly\
    \ cheaper today. This could undermine the proof-of-work aspect of Bitcoin, which\
    \ is why the Bitcoin protocol continuously sets new targets for difficulty. For\
    \ every 2,016 blocks, the difficulty is reset.  \n\nIn order not to have the blocks\
    \ generated too quickly and thus release all the bitcoins at once, Satoshi set\
    \ the target time to create a block to an average of ten minutes. The difficulty\
    \ increases if the average block generation time is less than ten minutes and\
    \ decreases if the average time is more than ten minutes. The time it takes to\
    \ generate the right solution depends on the total number of CPU cycles available\
    \ to the Bitcoin network, or to put it simply: the total computing power of the\
    \ Bitcoin network. This computing power is captured in the “hash rate” concept\
    \ since the ultimate purpose is to generate a hash. The unit currently used is\
    \ terahash per second, which means how many trillion hashes per second the entire\
    \ network can produce. In our lottery terms, this equates to how many lottery\
    \ tickets can be bought per second by all lottery participants. At the time of\
    \ writing, it is around 260 million terahashes per second.  \n\nWhen a miner is\
    \ finally successful in constructing a block, they need to get paid. This payment\
    \ is newly minted bitcoins created in the new block. This number goes into the\
    \ coinbase (not to be confused with the company Coinbase). The first transaction\
    \ of a block is called the coinbase and is created by the miner creating the block.\
    \ It contains the address of the miner and a number no greater than the current\
    \ reward as defined by the Bitcoin protocol. Recall that bitcoin is disbursed\
    \ on a schedule depending on how many have already been minted. Currently, the\
    \ reward is 6.25 bitcoins per block.  \n\nTo this reward are added the transaction\
    \ fees that users included. The average transaction fee is around the equivalent\
    \ of $1 but has fluctuated between $1 and $5. Transaction fees are still a minor\
    \ part of the total rewards for miners. Currently, it hovers around the single-digit\
    \ percentage, but at times, it has made up more than 50% of the reward. As the\
    \ issuance of bitcoin decreases, it is expected that the percentage of reward\
    \ derived from transaction fees will increase. After the final bitcoin, this is\
    \ the only incentive for miners to continue verifying transactions and creating\
    \ blocks."
  raw: '## Proof of Work


    The next natural question is, what do these computers running the Bitcoin software
    connected in a network do? The answer is that they perform the process of bitcoin
    mining. This process is virtually identical to the proof-of-work function of Hashcash,
    but how does that work in detail?


    The proof-of-work principle is that performing a function should not be free.
    In the case of Hashcash, that function was sending emails or requests to a web
    server. For Bitcoin, this function is to include transactions into a block and
    print money, that is, bitcoin. It makes perfect sense that such a function needs
    to be somehow costly; otherwise, everyone would just start creating blocks to
    get bitcoin.


    The problem is how exactly you prove that you worked on creating the block. Bundling
    several pending transactions together and hashing them naturally requires some
    work, but that is microscopic and not costly by itself. To create a cost, a cryptographic
    puzzle is added to this work.


    Recall that a hash is essentially a number of fixed length. Bitcoin uses the SHA-256
    algorithm to create a hash of all the transactions in a block. This hash is a
    string of 256 bits. It is represented as a hexadecimal value. The hexadecimal
    numbering system is what is called a base-16 encoded numbering. The base refers
    to how many different numbers there are in the number system. The binary system
    is base 2, that is, there are only two numbers: 0 and 1\. The decimal system is
    base 10, meaning there are ten different numbers: 0 through 9\. The hexadecimal
    system thus has 16 different numbers. Since we don’t have number symbols for more
    than 10 in the decimal system, the additional numbers are represented with characters
    A through F. Since we can represent any number in a hexadecimal system with 4
    bits, the resulting string in hexadecimal is 64 characters long (256/4) containing
    decimal numbers and letters A–F.


    With this in place, let us return to the puzzle. Creating a hash without any requirements
    for the final string is trivial. Any hash value will do. But if we add the requirement
    that the resulting hash value should have one 0 in the beginning, we can no longer
    trivially generate the hash value. Since we know that trying the hash algorithm
    again won’t make a difference, we have to adjust the input. We could, of course,
    try to add or subtract random transactions, but that is inconvenient. Instead,
    the Bitcoin system lets miners add a number, called a “nonce,” to a block. The
    name refers to a “number used only once,” and it is a 32-bit field. Since a hash
    is very sensitive to any change in input, any number in the nonce will change
    the resulting hash value dramatically. Therefore, the puzzle is to figure out
    what value to add in the nonce to make the hash of the transactions and other
    information in the block result in a value below the value set as the target.


    As can easily be seen, there are fewer values that start with 0 than the total
    sum of possible hash values. If we add another zero, we further decrease the number
    of total acceptable hash values. In fact, with each additional 0 added, the entire
    solution space decreases. This means that the probability of generating the correct
    hash decreases with each zero added at the beginning of the target value. The
    consequence of this is that, on average, more tries will have to be made before
    a hash value that satisfies the target is found. This is the essence of mining:
    a cryptographic lottery. And the difficulty is proportional to the number of leading
    zeroes the miners must find for the resulting hash value.


    One could now ask how that translates to proof of work. The answer is that each
    guess at the hash value requires work by a CPU. Actually, it does not have to
    be a CPU; you could calculate the hash yourself by hand, which has been done and
    takes hours. The faster the CPU, the more guesses it can try out in a period.
    Since there is only a reward for the first miner to arrive at a solution, time
    is of the essence. The faster the CPU, the more cryptographic lottery tickets
    you will have. The higher the difficulty, the higher the total CPU work needed
    to guess a correct solution.


    Since Moore’s law has made sure that computing power continues to expand, what
    was considered difficult when Satoshi wrote the Bitcoin whitepaper might be trivial
    today. In other words, the CPU work needed to solve a given difficulty in 2009
    would be significantly cheaper today. This could undermine the proof-of-work aspect
    of Bitcoin, which is why the Bitcoin protocol continuously sets new targets for
    difficulty. For every 2,016 blocks, the difficulty is reset.


    In order not to have the blocks generated too quickly and thus release all the
    bitcoins at once, Satoshi set the target time to create a block to an average
    of ten minutes. The difficulty increases if the average block generation time
    is less than ten minutes and decreases if the average time is more than ten minutes.
    The time it takes to generate the right solution depends on the total number of
    CPU cycles available to the Bitcoin network, or to put it simply: the total computing
    power of the Bitcoin network. This computing power is captured in the “hash rate”
    concept since the ultimate purpose is to generate a hash. The unit currently used
    is terahash per second, which means how many trillion hashes per second the entire
    network can produce. In our lottery terms, this equates to how many lottery tickets
    can be bought per second by all lottery participants. At the time of writing,
    it is around 260 million terahashes per second.


    When a miner is finally successful in constructing a block, they need to get paid.
    This payment is newly minted bitcoins created in the new block. This number goes
    into the coinbase (not to be confused with the company Coinbase). The first transaction
    of a block is called the coinbase and is created by the miner creating the block.
    It contains the address of the miner and a number no greater than the current
    reward as defined by the Bitcoin protocol. Recall that bitcoin is disbursed on
    a schedule depending on how many have already been minted. Currently, the reward
    is 6.25 bitcoins per block.


    To this reward are added the transaction fees that users included. The average
    transaction fee is around the equivalent of $1 but has fluctuated between $1 and
    $5\. Transaction fees are still a minor part of the total rewards for miners.
    Currently, it hovers around the single-digit percentage, but at times, it has
    made up more than 50% of the reward. As the issuance of bitcoin decreases, it
    is expected that the percentage of reward derived from transaction fees will increase.
    After the final bitcoin, this is the only incentive for miners to continue verifying
    transactions and creating blocks.'
  trans: "\n## 工作量证明  \n\n接下来的一个自然问题是，这些连接到网络的运行比特币软件的计算机究竟在做什么？答案是，它们在进行比特币挖矿。这一过程实际上与\
    \ Hashcash 的工作量证明功能几乎相同，但它是如何具体运作的呢？  \n\n工作量证明的原则是，执行某个功能不应该是免费的。在 Hashcash 中，这个功能是发送电子邮件或向网络服务器发送请求。而对于比特币，这个功能则是将交易打包进区块并“印钞”，即生成比特币。这样的功能需要付出一定代价，这是非常合理的；否则，每个人都会随意创建区块来获取比特币。\
    \  \n\n问题在于，你如何确切地证明你为创建区块付出了努力。将几笔待处理交易捆绑在一起并进行哈希运算，本身确实需要一些工作量，但这点工作量微不足道，本身并不昂贵。为了制造成本，这项工作被附加了一个加密难题。\
    \  \n\n回顾一下，哈希本质上是一个固定长度的数字。比特币使用 SHA-256 算法为区块中的所有交易生成一个哈希值。这个哈希值是一个 256 位的字符串。它通常用十六进制值来表示。十六进制计数系统是一种基数为\
    \ 16 的编码系统。基数指的是该数字系统中有多少个不同的数字。二进制系统是基数为 2，即只有 0 和 1 两个数字。十进制系统是基数为 10，意味着有 0\
    \ 到 9 共十个不同的数字。因此，十六进制系统有 16 个不同的数字。由于我们在十进制系统中没有超过 10 的数字符号，因此额外的数字用字符 A 到 F\
    \ 表示。由于任何十六进制数字都可以用 4 个比特来表示，所以得到的十六进制字符串长度为 64 个字符（256/4），包含十进制数字和字母 A 到 F。 \
    \ \n\n了解了这些之后，让我们回到这个难题。如果对最终的哈希字符串没有任何要求，生成一个哈希值是轻而易举的，任何哈希值都可以。但如果我们增加一个要求，即生成的哈希值必须以一个\
    \ 0 开头，我们就无法轻易地直接生成它了。由于我们知道重复运行哈希算法不会有任何不同，我们必须调整输入。当然，我们可以尝试添加或删除一些随机交易，但这很不方便。因此，比特币系统允许矿工向区块添加一个称为“随机数”（nonce）的数字。这个名称指的是“一次性的数字”，它是一个\
    \ 32 位的字段。由于哈希值对输入的任何变化都非常敏感，随机数中的任何数字都会导致最终的哈希值发生巨大变化。因此，这个难题就在于找出应该在随机数中添加什么值，使得对区块中的交易和其他信息进行哈希后得到的结果，低于设定的目标值。\
    \  \n\n显而易见，以 0 开头的哈希值的数量远小于所有可能的哈希值总数。如果我们再增加一个 0，可接受的哈希值总数就会进一步减少。实际上，每增加一个\
    \ 0，整个解空间就会缩小。这意味着，生成正确哈希值的概率会随着目标值开头每增加一个 0 而降低。其结果是，平均而言，需要尝试更多次才能找到一个满足目标的哈希值。这就是挖矿的本质：一场加密彩票。而难度与矿工必须为最终哈希值找到的前导零的数量成正比。\
    \  \n\n现在可能会有人问，这如何体现工作量证明呢？答案是，对哈希值的每一次猜测都需要 CPU 付出工作量。实际上，不一定是 CPU；你也可以手动计算哈希值，有人这样做过，需要花费数小时。CPU\
    \ 越快，它在单位时间内能尝试的猜测次数就越多。由于只有第一个找到解决方案的矿工才能获得奖励，时间至关重要。CPU 越快，你拥有的加密彩票就越多。难度越高，猜测出正确解所需的总体\
    \ CPU 工作量就越大。  \n\n由于摩尔定律确保了计算能力持续增长，中本聪撰写比特币白皮书时认为困难的计算，在今天可能微不足道。换句话说，在 2009\
    \ 年解决特定难度所需的 CPU 工作量，今天可能要便宜得多。这可能会削弱比特币的工作量证明机制，因此比特币协议会持续设定新的难度目标。每产生 2016 个区块，难度就会重置一次。\
    \  \n\n为了避免区块生成过快，从而一次性释放所有比特币，中本聪将创建一个区块的目标时间设定为平均十分钟。如果平均出块时间少于十分钟，难度就会增加；如果平均时间多于十分钟，难度就会降低。生成正确解所需的时间取决于比特币网络可用的总\
    \ CPU 周期数，或者简单来说：比特币网络的总计算能力。这种计算能力体现在“算力”（hash rate）这个概念上，因为其最终目的是生成哈希值。目前使用的单位是每秒太赫兹（TH/s），这意味着整个网络每秒能产生多少万亿次哈希。用我们的彩票术语来说，这相当于所有彩票参与者每秒能购买多少张彩票。在撰写本文时，这个值约为每秒\
    \ 2.6 亿太赫兹。  \n\n当矿工最终成功构建了一个区块时，他们需要获得报酬。这笔报酬是在新区块中创建的新铸造的比特币。这个数字被记录在“币基”（coinbase，不要与\
    \ Coinbase 公司混淆）中。区块中的第一笔交易被称为币基交易，由创建该区块的矿工生成。它包含了矿工的地址，以及一个不超过比特币协议定义的当前区块奖励的数字。回顾一下，比特币是根据已铸造数量的既定时间表来分发的。目前，每个区块的奖励是\
    \ 6.25 个比特币。  \n\n在这个奖励之上，还要加上用户支付的交易手续费。平均交易手续费大约相当于 1 美元，但曾在 1 美元到 5 美元之间波动。目前，交易手续费仍然是矿工总奖励中的一小部分，大约在个位数百分比附近徘徊，但有时也曾占到奖励的\
    \ 50%以上。随着比特币发行量的减少，预计来自交易手续费的奖励比例将会增加。在最后一个比特币被挖出后，这将是激励矿工继续验证交易和创建区块的唯一来源。\n"
- fmt: '# What Is Bitcoin?


    To summarize, Bitcoin is a system that provides access to a virtual currency,
    bitcoin, that anyone can start using by downloading software or using online services
    to create a wallet. This wallet is essentially a collection of public IDs from
    which transactions can be made only with the private key used to create the wallet.
    A transaction is made by specifying the wallet ID you want to send it to and the
    amount of bitcoins using the wallet software. The system is underpinned by a computer
    network that voluntarily provides computing resources that allows transactions
    to be recorded on a blockchain, which contains all transactions ever made. These
    computers are called miners, and they are rewarded with transaction fees and newly
    minted bitcoin.


    As can be seen from this walk-through, Bitcoin is a complex system that brings
    together technological innovations from many different sources. In fact, it would
    be difficult to point to any particular feature that was a new invention in Bitcoin.
    At the same time, the complete Bitcoin solution is so radically new and innovative
    that one would be hard-pressed to find anything in the twenty-first century to
    match it. Some aspects seem unnecessarily complex and even contrived in isolation,
    but it is so for a reason, and when all of it is brought together, it produces
    a uniquely functional solution that has proved itself for more than a decade.


    Bitcoin and blockchain technology are the product of technological trajectories
    that sometimes go back thousands of years but only now have reached a level sufficient
    to build a globally resilient system of exchange. These trajectories merge in
    often surprising and paradoxical ways. Recall that accounting, banking, and cryptography
    have mainly been concerned with keeping information private and secret, but Bitcoin,
    on the other hand, is entirely public and accessible to anyone. Another example
    is that virtual currencies, like all other previous currencies, have all depended
    on one central minting authority. Historically, the greatest challenge for currency
    issuers was preventing any other party from minting the currency, which is known
    as counterfeiting and usually carries heavy punishment with it. Again, Bitcoin
    turns this on its head and lets anyone mint the currency.


    Bitcoin hardly drew more than a shrug and a couple of critical comments when it
    was created. It has been pronounced dead more times than a few times since its
    inception. Still, it continues to thrive as the world’s most valuable virtual
    currency. But how did all of this come together? That is what we now turn our
    attention to.


    # 5. Searching for Satoshi


    In modern times the identity of few people has been the object of more significant
    inquiry and mystery than the inventor of Bitcoin, Satoshi Nakamoto. That was,
    however, not in the cards when the Bitcoin whitepaper was published in October
    2008. The publication was announced on the cryptography mailing list to initial
    critical comments by only four contributors after fizzling out within a month.
    By December 2008, exactly no one talked about Bitcoin, and the notion that more
    than a decade later the world would be intensely trying to figure out who its
    author Satoshi Nakamoto was seemed outlandish.


    Yet, here we are, 15 years later, and some of the brightest journalists of our
    time writing for the most prestigious publications like *The New York Times*,
    *Wired*, and *Forbes* have spent countless hours trying to figure out the identity
    of Satoshi Nakamoto to no avail. So far, this effort has been in vain. We are
    still searching for Satoshi. A few people have hinted at or claimed to be Satoshi,
    but most have vehemently rejected being identified as him.


    One could argue that this search is not important, and in the grand scheme of
    things, I agree, but it is still interesting. The identity of Satoshi is a modern
    mystery and, as such, warrants a comprehensive investigation. Since no consensus
    has been reached on the identity of Satoshi, it could be worthwhile to take another
    look. In the following, we will go through the most important investigations of
    the historical Satoshi, concluding that none have convincingly argued for the
    identity of Satoshi. In the next chapter, I will propose a new way based on the
    principles of historical-critical research and go through the different sources
    to understand what they can and cannot tell us.


    ## Whodunnit?


    It took a while before the media started to take an interest in Bitcoin and its
    creator. The first years were quiet. In May 2010, the first transaction took place
    with bitcoin when Laszlo Hanyecz bought a pizza for 10,000 bitcoins. At that time,
    it was only possible to get bitcoin by mining it. Bitcoin was a niche affair.


    That started to change in 2011 when the first exchanges began to appear, and Bitcoin
    gained notoriety by connection to WikiLeaks, which wanted to accept donations
    in bitcoin. This brought Bitcoin to the general public’s attention, and mainstream
    media began writing about it.


    ## The Search Commences


    The first major publication to take an interest in Bitcoin was no other than *The
    New Yorker* with an article written by the American writer Joshua Davis. Davis
    is no stranger to writing about technology and has also written technology pieces
    for *Wired* magazine. He is typically drawn to odd but true stories, and in 2011,
    the story about Bitcoin and its mysterious founder was definitely that.


    The article identified several critical observations about Satoshi that would
    come to dominate subsequent attempts at identification: Satoshi writes in flawless
    British English; he was probably born in the early 1970s; he had a problem with
    banks, which he felt couldn’t be trusted; he’s a world-class programmer who programs
    in C++ and understands peer-to-peer programming.


    The article is a journey of discovery more than a focused investigation. Davis
    starts with the security researcher Dan Kaminsky and then Stuart Haber of Princeton
    University due to three references to him in the Bitcoin whitepaper. From there,
    we go to the Crypto 2011 conference because Haber thinks it might be an excellent
    place to start. At the conference, Davis looks for people ostensibly fitting the
    criteria and finds one Michael Clear, a graduate student from Ireland.


    Unfortunately, he did not confess to being Satoshi but brought forth another suspect,
    Vili Lehdonvirta, a Finnish researcher. Lehdonvirta similarly found the suggestion
    that he was Satoshi hilarious and even suggested that a virtual currency like
    Bitcoin should have a back door for governments, which completely opposes the
    Bitcoin whitepaper.


    Ultimately Davis’s quest to find Satoshi proves unsuccessful and remains just
    that, a quest, a great story that cemented Bitcoin as a serious object of interest.
    The article also pinpointed many key observations about Satoshi that any identification
    has to align with.


    Another theme that would recur is that the people identified reject being Satoshi.
    This in itself is not an argument against, though, since Satoshi went to great
    lengths to protect his identity. The real Satoshi could not be expected to admit
    to any identification either. The two suggested suspects seem a little random
    and do not even align with Davis’s observations about Satoshi: Lehdonvirta is
    not a native English speaker, and Clear is probably not a world-class programmer
    and has no experience with peer-to-peer. Both were not born at the beginning of
    the 1970s.'
