    \ therefore be looked at in more detail.\n\n## A Closer Look at Adam Back\n\n\
    Like most cypherpunks, he is a private person who does not share much about himself,\
    \ but we can piece together the most essential facts from various sources. He\
    \ was born in 1970 in London and completed his A levels in mathematics, physics,\
    \ and economics. His English is decidedly British, and his writing is flawless.\
    \ He completed his PhD in computer science from the University of Exeter in 1995\
    \ on the topic of distributed computing. The code written for the thesis was written\
    \ in C++. He was a cypherpunk, a very active cryptography mailing list contributor,\
    \ and particularly interested in virtual currencies.\n\nRegarding identifying\
    \ Satoshi, it is not the first time Back has been evaluated as Satoshi: Dominic\
    \ Frisby entertained the notion that he could be Satoshi but discarded it because\
    \ Back confessed to him that he preferred C to C++. Frisby failed to notice that\
    \ Back had used C++ extensively as the basis for his PhD and was probably working\
    \ in that language when Bitcoin was being developed. He also concluded from his\
    \ first post on Bitcoin Talk that Back was only just learning about Bitcoin. That\
    \ is an astounding conjecture. Others like the YouTuber Barely Sociable, who also\
    \ identified Adam Back as Satoshi, have correctly noted how incredibly deeply\
    \ into the details he seems to be right from the get-go. He immediately starts\
    \ contributing detailed ideas for improvements.\n\nLet us look at other evidence\
    \ to help us evaluate whether Back was Satoshi. Most of it has been supplied by\
    \ the above-mentioned YouTuber, Barely Sociable, who provided incredible forensic\
    \ detective work. We will get back to that shortly.\n\n### The Absence of Back\
    \ from Bitcoin\n\nThe first thing to notice is Back’s absence in all early discussions\
    \ about Bitcoin in the early days. Not until his introduction to Bitcoin Talk\
    \ in 2013 did he engage in Bitcoin. This is a man who has been on a quest for\
    \ a virtual currency like Bitcoin since 1997\\. Consider a reply in April 1997,\
    \ where he called for an electronic cash system on the cryptography mailing list:\n\
    \n> *The cryptographic requirements for a system such as this would be:*\n> \n\
    > 1.  *anonymous (privacy preserving, payee and payer anonymous*\n>     \n>  \
    \    \n> 2.  *distributed (to make it hard to shut down)*\n>     \n>      \n>\
    \ 3.  *have some built in scarcity*\n>     \n>      \n> 4.  *require no trust\
    \ of any one individual*\n>     \n>      \n> 5.  *preferably offline (difficult\
    \ to do with pure software)*\n>     \n>      \n> 6.  *reusable*\n\nThis is virtually\
    \ a road map for Bitcoin more than ten years before its release, and Back takes\
    \ no verifiable interest in Bitcoin for almost five years. People can of course\
    \ change interests over time, so this does not prove anything by itself. It seems\
    \ safe to conclude that Back at least had the motive to build Bitcoin.\n\n###\
    \ Back-Satoshi Interactions\n\nAnother curious fact is that Satoshi corresponded\
    \ with all key players in the field of cryptographic virtual currencies, Hal Finney,\
    \ Wei Dai, and Nick Szabo, except Adam Back. It is alleged that Satoshi communicated\
    \ with Back, but once we look closer at the evidence, it does not seem strong.\
    \ We know about this interaction from two late sources. The first is an email\
    \ made public by Wei Dai in which Satoshi mentions communication with Back. The\
    \ email is dated August 22, 2008, and Satoshi writes to Dai: “Adam Back (hashcash.org)\
    \ noticed the similarities and pointed me to your site.” The other is a 2020 interview\
    \ with Cointelegraph where Back mentions email exchanges with Satoshi around the\
    \ same time as the emails exchanged with Dai. But unlike Dai, he refused to share\
    \ them, so there is no way to verify this claim. These emails and interviews are\
    \ all secondary evidence far removed from when Bitcoin was created. There is,\
    \ therefore, no good evidence that Back ever communicated with Satoshi."
