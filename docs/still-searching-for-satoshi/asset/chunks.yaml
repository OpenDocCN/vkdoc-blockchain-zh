- fmt: '# How Crypto Became Currency


    Cryptography had been a niche discipline with little change over two millennia.
    It was confined mainly to the interest of military and government diplomacy. If
    someone had suggested, for example, in the beginning of the 1960s that cryptography
    would become central for a worldwide digital communication network and a new kind
    of currency, the response might well have been a slight giggle and rolling of
    the eyes.


    But all that changed in the 1970s. The advent of the modern computer and more
    focused application of mathematical theory led to a momentous shift that changed
    cryptography and digital communication. The discovery of public key cryptography
    and hashing paved the way for innovations that today underpin much of the information
    infrastructure of the Internet. It also formed the bedrock against which the dreams
    of a digital currency could be realized so much so that this type of currency
    would come to be known as cryptocurrency.


    It was, however, not sufficient. As we saw, such cryptocurrencies had been proposed
    around the turn of the millennium, but some problems remained, most notably the
    double spending problem, that is, how to prove that a token or coin had not already
    been spent. Another problem was centralization since all proposed models depended
    in one way or another on a centralized third party that had to be trusted. This
    was a significant weakness that the cypherpunks were well aware of and not ready
    to gloss over since this was similar to the dreaded banks’ role as central gatekeepers
    of your money. To deliver the full promise of a genuinely free virtual currency,
    a few more pieces of the puzzle had to be solved. We will now turn our attention
    to them.


    # 3. Public Record


    For millennia, humans had to establish a shared indisputable truth. In oral societies,
    this was typically done through rote learning and performance. A typical example
    of how oral societies established such shared public truth can be found in classical
    antiquity. The poets of ancient Greece, like Hesiod and Homer, are representative
    of a rich oral tradition. The verse was not an artistic outlet for creative innovation.
    Quite the contrary. Ancient Greece glorified the past, not the future. It was
    the primary technology to establish a shared public record of the past.


    Reciting verses established near-identical versions of heroic deeds and ancient
    myths across time and space. The verse meter was a mnemonic technique employed
    for the bard to be able to recite the information in the same manner everywhere
    he went and teach others so they could replicate the same record of heroic deeds
    and myth. They could remember and recite tens of thousands of lines, but it was
    still not a very efficient way to establish a shared public record, as the many
    diverging versions of Greek myth show. Only when writing was employed could a
    public record be committed to posterity without the intervention of any particular
    person’s memory.


    ## The Earliest Writing and Single-Entry Bookkeeping


    The process of creating a written shared public record started millennia before
    the works of Hesiod and Homer were written down. The first examples of writing
    are from the fourth millennium BCE in the form of the cuneiform clay tablets from
    ancient Mesopotamia, present-day Iraq. This area is known as the fertile crescent
    and was the cradle of the earliest known human civilizations.


    The cuneiform writing was pictographic, consisting of pictures and marks of different
    forms. The tablets did not contain accounts of myths or heroic deeds but rather
    something as pedestrian as records of livestock, grain, and corn. It was a public
    record of ownership and was used for three millennia in different languages across
    the ancient Middle East. There was a gradual change to incorporate syllables and
    other symbols, but the primary use case was the same: documenting ownership in
    a public record. This function is thus even more primitive than writing and predates
    prose texts about myths and laws by millennia. Consequently, we must deal with
    a powerful and essential technology for human civilization.


    Whereas the purpose of cryptography is to obfuscate and hide information, the
    purpose of a public record is the opposite: to document and elevate information
    to the level of shared indisputable truth. Putting it on clay or other stone mediums
    rather than softer and more mutable media like papyrus, animal skin, or wax tablets
    made information immutable. This is particularly handy when establishing truth
    in the face of competing versions, which you would need when it involves ownership
    of something of value. A technique that makes the record immutable is a prerequisite
    for it to serve as the basis of ownership documentation.


    If the records could be changed at will, the information would not be suitable
    to establish the truth. Thus, stone served for millennia as the medium of choice
    and engraving of signs as the technology for establishing a public record. We
    still see remnants of this today on memorials, gravestones, and religious shrines.
    These are all examples of information that someone wishes to commit to posterity
    and raise beyond dispute. However, it is no longer the technology of choice for
    documenting economic transactions.


    With the expansion of the population in cities and the resulting expansion in
    economic output, the volume of transactions increased to a size that no longer
    made it practical to document everything on bulky and heavy clay tablets. The
    information that could be recorded on one slab was low compared with its size
    and weight. Other technologies like papyrus and animal skin gained popularity
    as they were lighter and took up less space. The ratio of information content
    to weight and physical volume was higher. The need to document the information
    for hundreds or thousands of years that the stone medium supported was, in most
    cases, not needed when it came to financial transactions. As a result, these lighter
    mediums gradually became important for documenting financial information. From
    antiquity to medieval times, they remained the chosen format for creating financial
    records. This was the technology of the discipline that would come to be known
    as accounting.


    The Mesopotamian system was called a single-entry bookkeeping system or cash-based
    accounting. It documented transactions as entries on a list.'
