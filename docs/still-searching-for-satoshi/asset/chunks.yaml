  trans: '

    ### 常态假设


    第三个假设是常态假设。它更多地关乎我们能围绕中本聪展开何种对话。人们可能会提出各种阴谋论，认为个别证据是中本聪或其他幕后邪恶势力故意伪造的。这类情景无法排除，因为它们属于理论上的可能性范畴：美国国家安全局（NSA）和联邦调查局（FBI）可能指派某个部门创建比特币以追踪犯罪交易，或者某个秘密的恋童癖圈子策划了比特币的诞生，以便在不受政府监管的情况下更便利地进行未成年人贩卖。这些理论可能是真的，就像地精的存在或地球是扁平的一样，但它们超出了严肃讨论的范畴，仅仅依赖于*先验*信念，并有系统地无视事实和论点。


    与此相反，我将回归对人类行为的常态假设。在比特币创建时，创造者不可能预见到它会变得如此庞大，尤其是考虑到早期虚拟货币的先例。因此，那些精心设计的计划——比如从一个化名账户给自己寄信，对自己以化名发布的帖子进行评论以制造掩护，或者让每位帖子都由英国英语使用者翻译或校对——都显得过分，超出了正常人类行为的范畴。历史上的中本聪被假定为，至少最初只是以中本聪这个化名与比特币社区互动，并使用对他而言最自然的语言写作。他只表达他本人持有的观点。


    我并不打算基于间接证据进行推测。我将只依赖最简单合理的解释，即中本聪只是一个用母语向不同人讲述他自行编程的电子现金项目的人。那个项目后来被称为比特币。


    ## 剖析中本聪


    让我们看看基于现有证据我们能得出什么结论。尽管我们拥有大量的文本资料，但它们几乎全部聚焦于技术细节。几乎没有提供任何个人线索，也很少有其他明确的陈述可以用来描绘中本聪这个人物背后的详细形象。


    ### 性别


    没有明确的性别指向，但现代密码学和虚拟货币领域几乎完全是男性主导的领域。至少，我没能在这个领域找出超过几位女性。辛西娅·德沃克（Cynthia Dwork）是一个例外。从历史角度看则有所不同，因为在二战前后，有相当数量的女性从事密码学工作。


    同样，男性在密码学邮件列表中占主导地位。大约在中本聪活跃的时期，我只能找到林恩·惠勒（Lynn Wheeler）和桑迪·哈里斯（Sandy Harris）作为活跃在列表中的女性例子。当然，这些不一定是她们的真实姓名。所有我能确认的身份都是男性。


    ### 年龄


    在 P2P 基金会论坛上，中本聪列出的出生日期是 1975 年 4 月 5 日。鉴于中本聪对匿名的执着，没有理由相信这个日期。就像名字一样，人们也费了一番心思从这个日期中挖掘象征意义。1933
    年 4 月 5 日，美国总统富兰克林·D·罗斯福签署了 6102 号行政命令，禁止私人拥有金币、金条和金元券。对于许多对虚拟货币感兴趣的 libertarians（自由意志主义者）来说，这是一个重大事件。1975
    年则是美国再次允许私人拥有黄金的年份。然而，中本聪并非特别关注黄金。在我们所拥有的资料中，他仅两次提及黄金。第一次是在比特币白皮书中，他用挖金矿来解释比特币挖矿的概念。另一次是在提及
    e-gold 公司时，该公司后被 FBI 关闭。


    尽管这并非一个不可能的解释，来说明为何选择 1975 年 4 月 5 日这个特定日期，但还有其他迹象表明这个日期很可能比较接近。他的年龄可能稍大，但不会年轻太多。


    中本聪的密切合作者，比如在中本聪之后接管比特币开发的加文·安德烈森（Gavin Andresen），也暗示他大概在那个年龄段。选择 C++可能是一个线索。C++于
    1985 年首次出现，对于在 90 年代初开始学习的人来说是一个自然的选择。那时，它是最流行的面向对象语言。哈尔·芬尼（Hal Finney）在 2014
    年接受安迪·格林伯格（Andy Greenberg）采访时，对中本聪使用 C++的情况评论道：“中本聪深谙其复杂性，我只在年轻程序员身上见过这种能力。如果你不是在年轻时学习
    C++，似乎很难精通它。”


    Java 创建于 1995 年，如果中本聪是在 90 年代末接受教育，那将是一个自然的选择。如果中本聪年龄更大，且在 70 年代或 80 年代接受教育，那么可能的选择会是
    C、Fortran 或 Pascal。选择 C++与大约 1990 年开始接受教育的情况相符，这会将出生年份定在 1970 年至 1975 年之间。任何人都可以学习
    C++，但最简单的解释是，当他开始比特币项目时，C++是他最熟悉的语言，而这门语言很可能是在他性格形成时期学会的。

    '
- fmt: '### Geography


    There is, fortunately, better evidence to pinpoint the location of Satoshi. In
    one of the most thorough investigations of the forensic evidence, Doncho Karaivanov
    provides convincing proof that Satoshi must have been based in the United Kingdom,
    probably in London.


    Plotting the 742 known timestamps of the time Satoshi was active when he posted
    to forums, sent emails, and committed code to `SourceForge` provides a clear picture
    of his activity pattern. First, it eliminates Japan and Australia as candidate
    countries. He would have to have lived like a vampire, never working during the
    day, only at night, if he had worked out of Australia or Japan. The three other
    time zones that have been suggested, GMT (UK/Europe), Eastern Time (east coast
    of the United States), or Pacific Time (west coast of the United States), are
    all possible.


    The article based on the timestamp data concludes: “At first glance, all three
    locations seem plausible. In London, he is a night owl, working until the early
    hours of the morning and sleeping until noon. On the east coast, he works up until
    the end of the day and then sleeps until early morning. On the west coast, he
    is an early bird, going to bed early in the night, but also waking up very early.
    Looking at this data alone, we cannot determine, beyond a reasonable doubt, which
    time zone Satoshi lived in.”


    The proof that tilts the identification toward London turns out to be embedded
    in the Bitcoin blockchain. In the so-called Genesis block, the first block created
    on January 3, there is embedded the following message: “Chancellor on brink of
    second bailout for banks.” This appeared on the front page of *The Times* of London
    newspaper print edition on January 3, 2009\. *The Times* circulated in all of
    Britain, but in 2008, 43% of its readership came from London. There was also a
    US edition, but it had different content than the British edition.


    *The Times* also had an Internet site, which could have been perused if Satoshi
    had lived in one of the other two time zones, but the headline in the Internet
    edition was slightly different: “Chancellor Alistair Darling on brink of second
    bailout for banks.” It must be said that there were pictures available of covers
    on the website where Satoshi could have seen the cover, but this was under the
    menu “Our Papers” furthest to the right next to the “Archive” menu. This is an
    odd thing to click if you were looking for daily news. There are other ways too
    that this headline could have been seen: Reuters provided a summary of the article
    that featured the same headline as the print edition. This is similarly a peculiar
    way to read your news. Therefore, the simplest explanation is that Satoshi subscribed
    to *The Times* and saw the print edition’s front page on January 3.


    There is evidence that muddles this picture of Satoshi residing in London. The
    timestamp in the metadata of the first draft of the Bitcoin whitepaper PDF shows
    the time zone as UTC-7\. Daylight savings time puts the location in the Pacific
    time zone. It is not immediately clear what the significance of this is, but another
    interesting clue from forensic evidence might place Satoshi in California later
    in January 2009. Dominic Frisby mentions the fact that Hal Finney posted a log
    of debugging information in the beginning when Satoshi and Finney were the only
    ones running Bitcoin. This log reveals that Satoshi’s machine was running in California
    at that time. That would be after the Genesis block of January 3 and the launch
    of Bitcoin on January 8 when Hal Finney had started to run Bitcoin. I was not
    able to verify this, and the logs that Frisby refers to are not to be found on
    the links provided. Still, it might be possible that Satoshi was visiting California.
    Since he could be an academic, he could be there at one of California’s famous
    universities for research purposes or a conference. The second version of the
    Bitcoin whitepaper PDF saved on March 24, 2009, has metadata with UTC-6, which
    is Mountain Time, and consequently locates Satoshi’s computer in New Mexico, Utah,
    Arizona, or similar. Maybe he was on a sabbatical, traveling? Perhaps someone
    else generated the PDFs? Who knows? Either way, these isolated pieces do not invalidate
    the vast majority of evidence placing Satoshi in London or at least the United
    Kingdom.


    If we look at the two other candidate time zones, they indicate that Satoshi was
    working on Bitcoin during the workday over a three-year period. This would mean
    that he was making Bitcoin full-time. He would therefore have to have enough funds
    saved to live for three years. That would be a lot of money. Where did he get
    this? His peers judge the code not to be from a professional programmer. Another
    admittedly very circumstantial piece of forensic evidence indicates that his computer
    was small. In a discussion on `Bitcoin Talk`, the user `MoonShadow` writes that
    it would take hours between blocks when only Satoshi was mining at a time when
    the difficulty was minimal. This indicates that the computer wasn’t particularly
    powerful. It would be curious if you saved up to build a system for three years
    and did not have money for a powerful computer. I think it is more probable that
    Satoshi had a full-time job and worked afternoons and nights on Bitcoin as a hobby
    project, which again aligns better with the time zone data that would have him
    writing evenings and nights in GMT.


    In conclusion, we can say that it is highly unlikely that Satoshi was based in
    Japan or Australia, possible but unlikely that he was in the US Eastern or Pacific
    time zone, and highly likely that he was based in the GMT time zone, probably
    in London or elsewhere in the United Kingdom.


    ### Nationality


    The name is unmistakably Japanese, and some have tried to extract meaning from
    it. *Satoshi* means something like “clear-thinking, quick-witted,” and *Nakamoto*
    means central origin, someone who lives in the middle. I am not sure how that
    is to be interpreted. It is not a rare name: there are several Satoshi Nakamotos
    in the United States, and the website `transfermarkt.com`, which lists the value
    of soccer players in the world, knows of no less than 66 professional players
    with the last name Nakamoto and 115 with the first name Satoshi. The name, therefore,
    seems common enough that even someone who did not know what it means and with
    no detailed knowledge of the Japanese language and culture could have chosen it
    as a pseudonym. There is only one other reference that ties Satoshi to Japan,
    which is the use of the email address `satoshi@anonymousspeech.com`. The website
    `anonymousspeech.com` was a company based in Tokyo, Japan. But Satoshi also used
    other mail services known for their anonymity like `vistomail.com` and `gmx.com`
    that were based in Europe.


    There is consensus that Satoshi writes in almost perfect British English, indicating
    that his nationality is to be found in the British Commonwealth, probably the
    United Kingdom. Alternatively, it could be Australia, New Zealand, or South Africa,
    but no distinguishing phrases or terms used in these countries have been identified.


    It is uncontroversial that Satoshi writes in British English consistently. He
    uses British words like “bloody,” -ou- instead of the American -o- as in “labour,”
    and the British -ise- instead of the American -ize-. There are occasional uses
    of American words, but such is the case for almost any language of the world today.
    It would probably require years of training, as done in counterintelligence services,
    to be able to convincingly and consistently fake a foreign language as Satoshi
    would have to if he were not a British native speaker. As has been stated earlier,
    Satoshi is from the British Commonwealth; realistically, that would be the United
    Kingdom, Australia, New Zealand, or South Africa. Given the likely location in
    the United Kingdom, it is therefore highly likely that he was British.'
