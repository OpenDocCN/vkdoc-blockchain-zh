    to build a new theoretical framework, without which we would be unable to see
    them.


    ## Is There Life Out There?


    Today there is already a search for life beyond humans taking place. NASA and
    others in the field of astrobiology search for extraterrestrial life. This is
    done by looking into space according to assumptions about what life is. Unfortunately,
    the result is that the criteria by which we search for extraterrestrial life are
    almost identical to known life forms. We take the human or at least terrestrial
    perspective when we define criteria for finding life outside of Earth. We, therefore,
    need to step back and reflect a bit more on what life is.


    ## What Is Life?


    We are alive, as are the plants, animals, and fungi around us. They show vast
    differences in appearance and character. Think of the microbes living in the depths
    of the Kidd Mine 350 miles northwest of Toronto undisturbed for up to two billion
    years in total darkness who don’t need oxygen and live of fools’ gold. The Deep
    Carbon Observatory, a research project studying life inside the earth, estimates
    that the total biomass of these organisms is 300 times as much as all living humans.


    Another example is the fungus *Ophiocordyceps*, which causes the carpenter ants
    to climb to a high point of vegetation, grip it, and die. The fungus will then
    grow its fruiting bodies from the body of the insect to propagate.


    A final example of the immense diversity of life is lichen, which grows as a cover
    on stone and wood. Lichen is not in fact one species but a composite symbiotic
    species consisting of algae or cyanobacteria and different species of fungi. The
    species of lichen called *Rhizocarpon geographicum* is estimated to be able to
    become more than 8,000 years old, making it the oldest living organism. This species
    is estimated to cover 6–8% of the earth’s land surface.


    Life is stranger and more multifaceted than most can imagine. Still, there is
    no doubt in our minds that they all share this quality called life. Even if this
    is self-evident, it is challenging to say precisely what life is. Some researchers
    have nevertheless tried to pinpoint what the essence of life is.


    The Austrian physicist Erwin Schrödinger provided one of the first philosophical
    answers to this question from the perspective of physics. In his book *What Is
    Life?* he found that the characteristic feature of life is that an entity “(…)
    goes on ‘doing something,’ moving exchanging material with its environment.” By
    doing this, it avoids the fate inscribed in all things in the universe, that of
    being destroyed by entropy. Entropy can be thought of as the degree of disorder
    in a closed system. The second law of thermodynamics states that with time the
    entropy or disorder of a closed system increases. Schrödinger noted that any nonliving
    entity quickly reaches the state of thermodynamic equilibrium or “maximum entropy.”
    Living beings, however, do not rapidly reach this state but continue to be ordered.


    The explanation for this, according to Schrödinger, is that the organism eats,
    drinks, and breathes; more precisely, they have a metabolism by which they exchange
    something with the environment. Traditionally metabolism has been viewed as one
    of matter or energy, but that does not make sense according to Schrödinger; instead,
    he proposed the surprising solution that living organisms draw negative entropy
    from their environment. In this view, “(…) the device by which an organism maintains
    itself at a fairly high level of orderliness ( = low level of entropy) really
    consists in continually sucking orderliness from its environment (…) in the case
    of higher animals we know the kind of orderliness they feed upon (…) the extremely
    well-ordered state of matter in more or less complicated organic compounds, which
    serve them as foodstuffs. After utilizing it, they return it in a very much degraded
    form.” According to Schrödinger then, life is a process by which, through metabolism,
    order is maintained by taking it from the environment.'
