  trans: '

    ### 新陈代谢


    生物生命通过与其环境的相互作用来代谢化学化合物和能量。细胞从环境中获取物质，并将其用于化学反应。这个过程需要能量。植物利用太阳的能量制造动物可以代谢的有机物质。所有生命系统都从环境中获取某些东西，并将其代谢为废物。这些废物可能对其他生物至关重要。以这种方式联系在一起的生物系统就是一个生态系统。从非有机的意义上说，`Bitcoin`
    也可以被描述为在进行新陈代谢。它消耗电能来驱动运行其计算机代码的 `CPU`，并将其代谢为货币，供人类在金融领域使用。可以说，金钱是 `Bitcoin` 的“废料”，但却是其所属生态系统的关键。这个生态系统就是国际金融世界。因此，`Bitcoin`
    与人类形成了一种共生关系，类似于菌根真菌，后者会建造连接植物根系的大型地下网络，并与植物交换养分。


    ### 生长


    生长的能力是生命系统重塑自身形态的本领。生物有机体在其整个生命周期中，没有任何组织能够不降解地存在。例如，心脏每小时跳动约 3,600 次，一生中约跳动 91,980,000
    次。没有哪种材料能够承受这样的负荷。因此，生物有机体的各个部分能够再生。`Bitcoin` 找到了一种巧妙的方法来实现这一点，因为它利用了人类的大脑，驱使我们反复在多台计算机上安装其程序。这种效果是通过宗教般的狂热、快速获利的承诺以及与光明和更公正未来的联想来实现的。`Bitcoin`
    已将自己嵌入人类的行为模式中。我们购买和安装 `Bitcoin`，因为它伴随着救赎的承诺，或者至少是轻松赚钱的许诺。通过这种方式，`Bitcoin` 类似于一种名为
    `Ophiocordyceps`（冬虫夏草属）的真菌，这种真菌不知何故能够操纵昆虫的行为，作为其扩展表型的一部分。对这种分析的一个冷酷戏仿是，我们可能会像
    HBO 剧集《最后生还者》中的僵尸一样，受到一种新型冬虫夏草菌的影响，麻木地执行着 `Bitcoin` 的业务——即增殖。当然，这是一种夸张的描述，`Bitcoin`
    对人类的影响似乎更为温和，但其机制本质上是相同的，并且在动物王国中广为人知。`Bitcoin` 通过对人类动机和行为的精心编排而实现生长。这是其扩展表型的一部分。


    ### 对刺激的反应


    对环境刺激做出反应的能力对于任何生物的生存都至关重要。例如，当动物体内营养耗竭时，它们会通过饥饿信号做出反应。这会触发补充所需营养的行为。当离火太近时，我们会感到疼痛，这促使我们远离火源。这些是旨在将身体维持在一个有利于持续生存的平衡状态的子系统。当我们从这个角度审视
    `Bitcoin` 时，并没有立即显而易见的类比。它不会移动。但许多生物有机体也不会移动。然而，`Bitcoin` 确实在一种方式上展现出对刺激做出反应的能力，即通过设置加密难题的难度。每当创建一个新区块时，它都会查看自上一个区块产生以来的时间。如果这个时间超过十分钟，就意味着
    `Bitcoin` 网络的总处理能力较低，它便会将难度重新配置到较低的水平。相反，如果时间较短，则意味着相对于十分钟的平衡点，算力过剩，难度便会增加。`Bitcoin`
    网络这种细微的“心跳”确保了它能适应其环境中可用的处理能力，即它所寄居的计算机。


    ## 比特币是活的吗？


    根据生命的定义标准，我们可以得出结论：`Bitcoin` 似乎满足了这些标准。尽管 `Bitcoin` 不像所有其他已知生命形式那样依赖于有机化学，但它似乎具有相同的属性。一个反对的论点可能是，`Bitcoin`
    并非真正的生命，因为它依赖于计算机和互联网。但这与许多需要非常特定环境的细菌并无区别，离开了这些环境它们就会死亡。另一个可能的批评是它是人类创造的。但这并非一个有效的论点，因为没有任何标准要求生命不能是人工创造的。它在重组其他来源特征的方式上也类似于生命。我们看到了不同的技术发展脉络如何导致了
    `Bitcoin` 的实现。这与细菌从其他细菌那里重组和吸收遗传物质的方式并无不同。这个过程在生物学中广为人知。


    因此，`Bitcoin` 实现了我们之前定义的生命基本功能：“因此，一个生命系统可以说具备以下特征：通过与环境的新陈代谢，在较长时间内维持自身构成的能力。”
    `Bitcoin` 也是自创生的，因为它持续地利用人类来安装和升级运行它的软件。今天运行 `Bitcoin` 网络的 `Bitcoin` 矿工与十年前的不同。它会动态地替换执行其代码的节点。它也有新陈代谢的过程：消耗能量来驱动计算机
    `CPU`，并将其代谢为数字货币，而它的共生体——人类，可以通过花费这些数字货币来购买更多能量。


    也许有人会反驳说，这是一个虚构的“恰如其分”的故事，可以套用在任何在计算机上运行的事物上。因此，让我们通过考虑几个其他基于计算机系统的例子来看看是否真是如此。首先，我们来看看计算机蠕虫。就像真正的病毒一样，它只进行复制，并非生命。它没有新陈代谢或适应能力。它只是一段相同的代码。


    另一个例子是像 Microsoft Word 这样的流行计算机程序。人类也帮助它进行复制，并且它通过持续发布新版本而适应了环境，但它不会对刺激做出反应，也没有新陈代谢。一个与
    `Bitcoin` 更接近的类比可能是像 `BitTorrent` 这样的点对点共享系统，因为它具有与 `Bitcoin` 相似的形态。它安装在计算机上，并连接到其他节点。`BitTorrent`
    确实以数字资产的形式带来价值，但它并不生产这些资产，因此不能说它具有与 `Bitcoin` 相同意义上的新陈代谢；它仅仅是为其他事物服务的传输系统，因此是异创生的。由此可见，即使是密切相关的系统，在像
    `Bitcoin` 那样满足生命标准方面，也多少有所欠缺。

    '
- fmt: '## Putting the Elephant Back Together


    We are therefore left with the surprising conclusion that Bitcoin as a hyperorganism
    might, in fact, be alive. It will, of course, require more research and thinking
    than has been offered here to be verified. It is but a brief sketch. Still, this
    discovery provides fruitful avenues for further investigation: Are other similar
    hyperorganisms hiding in plain sight around us? What are the consequences of this?
    Precisely what kind of biological organisms does Bitcoin resemble? How did it
    become alive out of something that was not alive? Most of all, does the reasoning
    presented here hold up to further scrutiny? I hope that such questions can be
    answered in the future.


    In this book, we have considered many different aspects of Bitcoin. When we consider
    Bitcoin as a hyperorganism, these different perspectives come together, like the
    different parts of the elephant examined by the blind men. Each observation by
    one of the blind men is similar to one or more of the chapters in this book. From
    its own perspective, it provides fascinating insights into one aspect of Bitcoin.
    One aspect is the technological history that explains the heritage of Bitcoin
    and, in biological terms, provides a phylogenetic account of how the species of
    Bitcoin came into existence. The history of Satoshi provides the precise historical
    context of how Bitcoin happened in the world or the ontogenetic account in biological
    terms. The investigation into the nature of money offers insight into how Bitcoin
    can produce its critical effect: monetary value. The social organization accounts
    for the social structures that help it grow as a part of its extended phenotype.
    The religious aspect explains the mechanism by which Bitcoin motivates us humans
    to provide continued support for its proliferation in a symbiotic relationship.
    The future perspectives provide ecological scenarios about the future destiny
    of Bitcoin as a hyperorganism.


    If the blind men touching the elephant had not insisted that they each held the
    proper understanding of what this thing called an elephant was but instead had
    tried to communicate and bring together these isolated truths, they could have
    come close to understanding and conceptualizing this elephant. This was the secret
    plan of this book: to bring together different perspectives on Bitcoin that are
    each true in isolation but insufficient to understand Bitcoin. By integrating
    these perspectives, we are able to provide the foundation for a more comprehensive
    and extensive understanding of Bitcoin as a new type of entity, a hyperorganism.'
