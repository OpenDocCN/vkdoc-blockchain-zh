  trans: '

    ## 电子商务的兴起


    尽管此前制造虚拟货币的努力主要受自由主义意识形态驱动，但互联网的 dot-com 时代与商业化进程为虚拟货币开辟了全新的应用空间。在世纪之交，互联网本质上仍是一个信息共享项目。任何交易都充满风险且极其繁琐。彼时尚未形成成熟的支付方式，哪种形态将占主导地位也尚不明朗。信用卡公司和
    `PayPal` 还未赢得数字支付领域的战争。在此背景下，其他选择方案正被纳入考量并付诸试验。


    在 2000 年互联网泡沫破裂之前的时期，电子商务充满乐观情绪，蓬勃发展。互联网正从信息共享平台转向商业平台。唯一的问题是，互联网在设计上全然不具备安全可靠的交易基础。信息本应开放共享，而非像处理金钱那样需要保密。这给商家带来了根本性问题：如何通过常规交易收款？信用卡的卡号信息可用于识别交易账户，但如何保护这些信息并防止其被滥用？


    当时，数种方案竞相角逐互联网主要交易手段的地位。大型信用卡发行商已入局，但 `PayPal` 也提出了清晰的愿景。1999 年，另外两家公司 `Flooz`
    和 `Beenz` 加入了新兴的互联网支付领域。这些愿景与以往我们见过的截然不同。`Flooz` 的设想是为互联网商家建立一种类似常旅客计划的货币。用户可以通过商家奖励或从
    `Flooz` 网站购买来获取 `Flooz` 积分。但历史重演：到 2001 年，联邦调查局指出该货币被用于洗钱；一个俄罗斯-菲律宾犯罪集团使用盗窃的信用卡购买并消费积分。该公司于
    2001 年夏季关闭，留下超过 30 万客户手持一文不值的 `Flooz` 积分。


    `Beenz` 是其主要竞争对手。它被构想为一种微型货币，用于奖励用户的关注度以及在线执行的不同操作。用户获得积分后，可以出售或消费。`Beenz` 自称是“网络货币”，并因此因涉嫌经营无牌银行而受到调查。该公司坚称其仅是虚拟积分。当
    2001 年互联网泡沫破裂导致后续融资未能到位后，公司倒闭了。


    这些例子中的货币更侧重于满足普通消费者和商家的偏好与便利性，而非保护隐私。尽管如此，它们仍遭受了许多相同的弱点，例如易受欺诈性使用，以及面临监管挑战。


    ## 从数字邮资到货币


    随着互联网的普及，电子邮件应运而生。从实体邮件转向电子邮件使沟通变得便捷。事实上，这过于便捷了。允许人们免费向任何人发送邮件的结果是垃圾邮件泛滥。在传统的实体世界里，向所有人寄信并非不可能，但存在一个天然限制，因为每封信都需要邮票支付少量费用。`Hashcash`
    的目的类似，在于创造一种方法，让发送电子邮件产生成本。由于邮资与钞票并无本质区别，这反过来可以更普遍地作为生产虚拟货币的基础。正是从这一看似不可能的源头，诞生了生产比特币的解决方案。


    1997 年 5 月，英国工程师亚当·巴克提出了一个机制，“(……) 用于抑制对电子邮件等不计量互联网资源的系统性滥用”。他将其称为 `Hashcash`。该系统生成一种令牌，作为所谓的工作量证明，我们稍后会涉及这个概念。简而言之，它涉及解决一个足够困难的数学难题，以证明确实耗费了可观的
    CPU 算力。这自然会产生能量和时间上的成本。因此，`Hashcash` 令牌不同于以往那些与某种其他货币或贵金属挂钩或代表它们的虚拟货币实例。它的价值仅体现在其生产成本高昂上。


    此外，`Hashcash` 最初并非被构想为货币，而是作为邮资。然而，这可以推广至货币。巴克也曾沿着这个思路推测，建议这些令牌可以通过类似于大卫·乔姆的匿名
    e-cash 系统进行买卖。这样，一些人就可以专门从事后来被称为“挖矿”的活动，生成 `Hashcash` 令牌，然后出售给其他人使用。问题在于，一个令牌只能使用一次，并且必须有人跟踪它是否已被使用。


    哈尔·芬尼采纳了亚当·巴克的想法。芬尼并非等闲之辈，他后来对比特币的发展和成功起到了核心作用。他曾是密码朋克和密码学邮件列表的成员。他深度参与了 extropian
    运动，该运动梦想着跨越奇点后的未来，那时低温学意味着你可以复活。但如果你在几百年后复活，首要问题就是确保有些现金维持生活，而银行和政府自然不可信赖。


    因此，私人数字现金系统是这一未来愿景的核心追求。芬尼参与过不少关于此类的构想。他提出了一种方法，使这些令牌能够作为可重复使用的工作量证明（RPOW）令牌再次使用。这将把
    `Hashcash` 令牌从一种消耗性的邮资类令牌转变为真正的可重复使用的货币令牌，从而能够充当虚拟货币。

    '
- fmt: '# Decentralizing the Bank


    The problem with all earlier virtual currencies was that they always depended
    in one way or another on a central entity that you would have to trust. Cypherpunks
    were no more trusting of each other than banks and governments. This central entity
    could, in principle, meddle with the balances of accounts or otherwise interfere
    with the money supply. The challenge was, therefore, to devise a system to circumvent
    the need to have any central authority altogether.


    Working on the problem of creating the currency for the future crypto anarchy
    envisioned by Tim May in his *The Crypto Anarchist Manifesto*, Wei Dai sketched
    a few key properties such a currency should have. According to Dai, the solution
    was that the entire ledger with balances of all accounts was distributed in a
    network. The currency was called `B-money`. A transaction was made between a seller
    and a buyer through cryptographic proof. This transaction would then be promoted
    throughout the network. Dai speculated about the value of `B-money` tokens and
    suggested that they would be pegged to the money it cost to generate them. This
    was possible since the mechanism was similar to the `Hashcash` proof-of-work mechanism.
    Although Satoshi would later cite this in the Bitcoin whitepaper, it was nothing
    more than a few paragraphs of speculation on his website. It had nothing of the
    detail and rigor of `Hashcash` and referenced ideas others had described before,
    in particular, `Hashcash` (which Adam Back also immediately pointed out to Dai
    on the cryptography mailing list). The idea of a decentralized open ledger, however,
    was novel.


    Another critical actor in this space was Nick Szabo, a computer scientist who
    had worked in the virtual currency area for many years and was also a member of
    the cryptography mailing list. He had even been an early employee in David Chaum’s
    `DigiCash` and had gained a reputation for eclectic and innovative thinking. He
    presented an idea he called `Bitgold`. This was similar to Dai’s `B-money`, a
    speculative sketch on his blog that was never implemented. `Bitgold` would be
    a store of value like gold that could be produced by dedicating one’s computer
    in a network to solve cryptographic puzzles in the same manner as `Hashcash` and
    `B-money`. Solved puzzles would be sent to a public registry and assigned to the
    user. These would be part of the next puzzle foreshadowing the blockchain of Bitcoin.
    A particular focus was on the problem of double spending, since the problem with
    digital tokens is whether they have already been used. This idea, like Dai’s,
    was presented in a few short blog posts and never worked out in any detail, but
    pointed to central concepts and visions that would be picked up by Bitcoin.


    ## The Three Strains of Virtual Currencies


    In the space of a decade, several virtual currencies came and went. The different
    proposals were varied and innovative, some borrowing from each other or reflecting
    similar ideas. It is possible to distinguish three distinct strains of innovation
    in virtual currencies, all departing from different points. The first, the gold
    strain, was focused on the digital representation of precious metals; the second,
    the ecommerce strain, was on online shopping and awards in the shape of points
    and tokens; and the third, the crypto strain, is the one that turned into bitcoin
    and subsequent cryptocurrencies with a focus on privacy. These three strains needed
    more direct interaction regarding people and ideas. They also appealed to different
    segments of users. But they tried to solve similar problems, how to represent
    and exchange value virtually. They also ran into precisely the same regulatory
    and security issues, affecting each other through learning.


    The first question to ask was, why precisely at this point did virtual currencies
    appear? As we saw, the idea of a virtual currency was a familiar one. It was envisioned
    early on, even in a sense, by Hayek in the 1920s. While personal computers did
    exist and began to be used widely in the 1980s, they were not generally connected
    to anything. Only in the mid- or late 1990s did connection to the Internet become
    common. Since the Internet was a precondition for a virtual currency, this created
    the possibility for new financial innovations.


    Let us consider the gold strain of virtual currencies that focused on a currency
    somehow pegged to gold in particular or other precious metals. By now, it should
    come as no surprise that primarily the libertarian community was deeply engaged
    in bringing forth and using virtual currencies. For many libertarians, the abolition
    of the gold standard of money was a key grudge against central banks and governments.
    They felt that this move made it possible for governments to rob the people of
    the value of their money through inflation created by an increased money supply.
    Therefore, it should be no surprise that owning gold and other precious metals
    as a hedge against inflation was a key objective. While the Liberty dollar was
    more of an ideological statement than a practical way to transact in a gold-based
    currency, `e-gold` became a significant corporation with billions of dollars of
    value going through it in transactions. Around ten companies appeared with a similar
    focus of making it possible for ordinary people to own and trade precious metals
    by themselves. One of them, `eBullion`, was even integrated into a credit card
    for payment before it reverted into fraud and disappeared. Others turned out to
    be scams or succumbed to the increased regulatory attention given to them. A few,
    however, managed to adapt to the changing regulatory demands and thrive until
    this day but not as a virtual currency.


    One significant effect of this strain on the crypto strain was the severe legal
    issues in which Liberty dollar and `e-gold` found themselves. This reverberated
    through the cryptography and cypherpunk mailing lists for years and may be the
    direct cause of Satoshi presenting his ideas under a pseudonym: no one wanted
    to spend years in legal jeopardy facing 20 years in prison for trying to bring
    forth a new innovative idea.'
