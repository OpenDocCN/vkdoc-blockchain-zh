- fmt: '### Correspondence


    Satoshi corresponded a great deal in different public forums about Bitcoin. Some
    put the volume at more than 80,000 words. This is a sizeable collection. These
    forum posts are also primary sources that can be used as relics. We will, for
    example, see that the times of writing are essential for identifying Satoshi.
    The correspondences are also an important source to be used as the simplest assumption
    again is that Satoshi is not communicating with himself in public. The forum posts
    can also tell us something about the history and motives behind the creation.


    There is another group of sources relating to correspondence with Satoshi: emails.
    These were released to the public much later when it was clear that Bitcoin was
    a significant thing. There are also comments about what Satoshi said in those
    emails. These are more dubious on technical grounds since email data can easily
    be changed. They are also further removed from the event than the forum posts
    and can, therefore, not be considered as valuable sources.


    ### Technical Forensic Evidence


    The Bitcoin code is a primary source and shows the coding style of Satoshi. As
    such it is a crucial piece of evidence since anyone considered a possible match
    for Satoshi must have the skills to write the original Bitcoin code.


    The blockchain in itself can also be used as a source. As we will see, much has
    been made of the first block in which a quote was embedded. This is an example
    of evidence that is impossible to fake, which may tell us something about the
    person behind Satoshi.


    There are other technical sources, such as the `bitcoin.org` web page. Here we
    can see through the Internet archive what was displayed at different times. Satoshi’s
    known email addresses may also hold clues.


    ### Interviews


    A large body of evidence also exists in later interviews made with key actors
    in the formative period of Bitcoin. These are all secondary sources and can be
    used primarily as corroborating evidence. They are further removed in time and
    will depend on memory and later historical developments. They have virtually no
    value in themselves and only when they relate something that cannot be learned
    from primary sources.


    ### The Sources and Satoshi


    These few practical principles for approaching the sources will provide us with
    a guide to analyzing the problem at hand. We saw that the sources can be grouped
    into four groups.


    - The key source: The Bitcoin whitepaper

    - Correspondence between Satoshi and collaborators on public forums

    - Technical forensic evidence

    - Later interviews with people close to Satoshi and the beginning of Bitcoin


    With a firmer grasp on the nature of the sources, we are in a better position
    to start searching for Satoshi. We will give precedence to the primary sources
    written by Satoshi himself and especially to facts that are impossible or hard
    to fake, such as technical forensic evidence. Other secondary sources can be used
    as corroborating evidence and help fill in the blanks. In the following, we will
    construct a profile of what we can know about the historical person behind Satoshi.


    ## Building a Profile of Satoshi


    Based on our knowledge of the sources, we can now start to investigate what we
    know about the historical Satoshi. In the following, we will build a profile based
    on what we can learn about him from the sources. But before we do that, it would
    be worthwhile to reflect on the very source of the mystery of Satoshi, that is,
    why does he use a pseudonym? To understand that, we must go back to when Satoshi
    published his ideas. That was at a time when a few high-profile cases involving
    virtual currencies had seen the founders get into serious legal problems. In 2007,
    the FBI raided Bernard von NotHaus’s Liberty dollar on suspicion of money laundering,
    mail fraud, wire fraud, and counterfeiting. Charges had not yet been filed, but
    in another virtual currency crackdown, the e-gold founders had entered a plea
    agreement and pleaded guilty to the operation of an unlicensed money-transmitting
    business and conspiracy to engage in money laundering activity. There was no reason
    to assume that the US authorities would think any differently about a project
    like Bitcoin.


    ## Assumptions


    Today creators of virtual currencies are not prosecuted, and more transparent
    regulation exists that makes it less likely that the creator of Bitcoin would
    end up in legal trouble. So why does he not step forward? The immense success
    of Bitcoin only adds to the original concern. The historical person behind the
    Satoshi pseudonym sits on more than a million bitcoins, which amount to billions
    of dollars. Coming forward would best-case make it challenging to live a quiet
    private life and worst-case bring about severe threats to himself and his family.


    There is, therefore, every reason to expect that, whoever the person behind Satoshi
    is, he will not be likely to admit it. On the other hand, the reverse does not
    follow, as some people assume that the denial of being Satoshi is evidence that
    the person is Satoshi. In the following, a couple of assumptions are made that
    will guide the analysis. I believe any identification of the historical person
    behind Satoshi must fulfill these assumptions.


    ### The Assumption of Unity


    The first is the assumption of unity, which is that all writings attributed to
    Satoshi are authored by the same author. That means we assume that the code was
    written by the same person who wrote the whitepaper, the Bitcoin website, the
    emails on the cryptography mailing list, and the various forum posts signed by
    Satoshi Nakamoto.


    ### The Assumption of Singularity


    The second assumption is the assumption of singularity; contrary to some earlier
    attempts, I don’t see any reason to assume that this is not just one person. As
    we saw earlier, the theory that multiple people are behind Satoshi has been used
    to compensate for the inability to fit all facts into one individual. But as an
    explanatory approach, this is not advisable. We want to arrive at the simplest
    possible explanation. Allowing for multiple people to make up Satoshi, first of
    all, raises the question of why a group of people would take the unprecedented
    step to write as one person rather than multiple individual pseudonyms and opens
    for pure fantasy where any person can be picked to fit any fact. While it could
    be true, it is not a principled analytic way to proceed.'
