- fmt: 'This brings us to the lower half, the supply side. We saw how critical the
    stock-to-flow ratio was for explaining the value of precious metals. Recall that
    the flow is the amount produced in a year and the stock is the total existing
    stock. If the money supply is high relative to the stock, the stock-to-flow ratio
    is low. If the money supply goes up as it did with silver due to increased extraction,
    the stock-to-flow ratio goes down, which affects the value of the unit. We saw
    that base metals had a low stock-to-flow ratio, which would account for why the
    Chinese iron coins were less valuable than the Greek gold and silver coins.


    While money supply increases the stock, this should theoretically increase the
    stock-to-flow ratio, but in practice, the effect of the supply rate is more powerful.
    Similarly, the destruction of money lowers the stock, which should reduce the
    stock-to-flow ratio and, thereby, value. We don’t see this historically since
    the destruction of money is always minor compared with the total stock and production
    of new money.


    At the bottom, we see why gold is more valuable than other metals: the reserves
    in the earth’s crust are smaller than other metals. Extraction will increase if
    extraction costs fall, such as when new mines are discovered or technological
    advances are made. As we shall see, this is a crucial dynamic that Bitcoin seeks
    to exploit. Extraction is only relevant when the money supply is based either
    directly due to minting or indirectly due to being pegged to an extracted commodity
    like metals. Cowrie shells and beads followed the same dynamic. When markets where
    they were used were flooded due to improved extraction and production, value plummeted.


    ## Key Dynamics of Money


    We are now in a position to see some key dynamics of money that have been observed
    historically.


    The first is the money dynamic. This is when a commodity takes on the function
    of money by fulfilling one or more of the functions of money. This is what happened
    to grain in Mesopotamia and cigarettes in post-war Europe. Key to this is the
    increase in utility of the medium serving as money.


    The second is the bubble dynamic. When an asset rises in value, all else being
    equal, it is a better store of value, which adds to its utility. If this is the
    main source of the asset’s utility, it reinforces the value increase and can create
    a bubble. Conversely, when it suddenly stops increasing, it quickly falls in value
    because it is no longer a good store of value.


    The third is the supply dynamic. When the supply of money is increased relative
    to the stock, all else being equal, it lowers the value of the money. This happens
    during hyperinflation when governments print a lot of money, but also when suddenly
    new reserves are found of a metal or commodity that serves as the standard of
    the money.


    The fourth is the extraction dynamic. When a commodity depends on extraction,
    this dynamic is seen. The reserves provide a limit for extraction, and the cost
    of extraction determines when it is profitable and when the price of the commodity
    is stable. New deposits or new cheaper extraction techniques thus affect the extraction
    dynamic.


    ## Bitcoin and Money


    Now let us look at Bitcoin. How can these dynamics throw light on bitcoin? Let
    us try to see if we can use these insights to understand the historical dynamics
    of bitcoin and the potential future.


    ### Bitcoin as Money


    On May 22, 2010, Laszlo Hanyecz purchased pizza with Bitcoin. This was the first
    documented time Bitcoin took on the function of a medium of exchange. This is
    a crucial function of money that allows it to be used to procure goods and services.
    Around the same time, different exchanges popped up that allowed people to exchange
    Bitcoin for money. As Bitcoin became more well-known, it started to function as
    a store of value when people exchanged dollars for bitcoin. It can function as
    a unit of account but has not done so widely in the mainstream economy. It is
    mostly in black markets and ransomware attacks that bitcoin is the preferred unit
    of account.


    While there has been an increase in vendors that accept bitcoin, such as the occasional
    hairdresser or cafe, it is far from dramatic. If the average person today came
    about some bitcoin to burn, they would be hard-pressed to find places to purchase
    anything. A simple online search for where to buy products with bitcoin reveals
    that the top list of places where you can actually use bitcoin as a medium of
    exchange includes Overstock, Newegg, Shopify, Microsoft, Twitch, ProtonMail, NordVPN,
    Dish Network, and CheapAir. These are, with the exception of Microsoft, not exactly
    household names. With the possible exception of Shopify, they are all services
    or software. After being a putative virtual currency for more than ten years,
    Bitcoin does not impress on this parameter.


    As a unit of account, the present state is not much better. Few places use bitcoin
    as a unit of account and list prices in bitcoin. While I have seen the occasional
    picture of a sign listing the price in bitcoin, this is always in addition to
    another currency. In El Salvador, bitcoin is legal tender, but even here, it is
    not a unit of account. This could change, but there is one structural reason complicating
    this. Bitcoin is too volatile to be a good unit of account. If vendors need to
    continuously, even on a daily basis, adjust all of their prices to keep up with
    the fluctuations, it is not a convenient unit of account.


    The third function as a store of value has, above all, been the major success
    of bitcoin. Virtually everyone who uses bitcoin does this to use it as a store
    of value. It serves well as a store of value since it is indestructible and highly
    portable. Bitcoin itself can never be lost (but codes to access them can). Since
    its inception, bitcoin has performed better than any other store of value on average,
    and today it is easily exchanged on online exchanges for other currencies.


    If we take a step back and look at bitcoin, there is no denying that it is in
    many ways a success, but from a monetary perspective, it does not have high utility.
    It only really fulfills one of the key functions of money well and is only legal
    tender in two economically insignificant countries. The money dynamic identified
    previously is, therefore, not particularly powerful and has not historically been
    the key driver for bitcoin’s success.'
