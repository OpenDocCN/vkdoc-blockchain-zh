- fmt: '### Nakamoto’s Neighbor


    *Forbes*, in another attempt to identify Satoshi, had requested a comparison of
    all the previously identified suspects with that of Satoshi Nakamoto and found
    that the one that most resembled Satoshi was Clear, whom Joshua Davis had mentioned.
    Andy Greenberg, at the time a writer for *Forbes*, didn’t feel the identification
    of Satoshi as Dorian Nakamoto held up because of the language and asked to include
    his writings in the analysis, which showed that Dorian Nakamoto was a worse match
    than Clear.


    Spurred by a tip about the coincidence that Hal Finney also lived in the comparatively
    small community of Temple City, Greenberg started investigating whether he might
    be Satoshi. As we saw earlier, Finney was a central figure in cryptography in
    general and virtual currencies in particular. Even if Dorian Nakamoto was not
    Satoshi Nakamoto, it might have been Hal Finney taking his name since they lived
    only 1.6 miles from each other.


    Finney denied both that Dorian Nakamoto could have been the inventor and any knowledge
    about him and showed Greenberg the email communication with Nakamoto (which was
    compared against the writings of the real Satoshi Nakamoto to verify it) and the
    first transactions, where Satoshi sent ten bitcoins to Finney. The timestamps
    on the emails lined up with these transactions. He concludes, “The notion that
    Finney alone might have set up the two accounts and created a fake conversation
    with himself to throw off snoops like me, long before Bitcoin had any measurable
    value, seemed preposterous.”


    ### A New Suspect Appears


    Another suspect emerged around the same time, one that, like Hal Finney, had been
    deeply involved in virtual currencies and the cypherpunks since the beginning:
    Nick Szabo. He had been an early employee in the first successful virtual currency
    company, DigiCash, and had continued this interest throughout. Around the end
    of 2003, a blogger calling themself Skye Grey posted two blog posts that argued
    that Nick Szabo was the inventor of Bitcoin. The story was picked up by TechCrunch,
    which interviewed Skye Grey.


    The argument was made primarily from an analysis of similarities between the Bitcoin
    whitepaper and writings by Nick Szabo. Much significance was placed on Szabo’s
    blog post describing his idea of Bitgold, even though it was barely a thousand
    words and expounded many of the ideas that others like Wei Dai and Adam Back had
    already suggested.


    The methodology was a putatively forensic analysis of characteristic phrases in
    the Bitcoin whitepaper, using a seemingly homemade method of looking at textual
    “tics,” that is, identifying tells of style in the Bitcoin whitepaper and comparing
    those with Nick Szabo. Grey determines some content-neutral terms: repeated use
    of “of course” without isolating commas, the expression “can be characterized,”
    use of “for our purposes” when describing hypotheses, starting sentences with
    “It should be noted,” etc. These seem like fairly common expressions and standard
    academic language. It seems that Grey fails to argue for their distinctiveness.


    There are also “content-bearing” terms like “timestamp server,” central in the
    Bitcoin paper, “trusted third party,” “cryptographic proof,” “digital signatures,”
    and repeated use of “timestamp” as a verb,” but these are, as we have seen, similarly
    quite regular expressions in cryptography and pervade debates on the cryptography
    mailing list. It seems that the simpler explanation is that Satoshi and Szabo
    both belong to the same linguistic subcommunity of academics specializing in cryptography.


    The same method was used later in 2014 in a study by Aston University Institute
    for Forensic Linguistics headed by lecturer Jack Grieve and 40 of his final-year
    students. They seem to have followed the same method and compared the Bitcoin
    whitepaper to 11 other suspects. It was, unfortunately, never published, so it
    is not possible to check or replicate the findings or see why there was no comparison
    to the 80,000 other words Satoshi wrote. It would also have been interesting to
    understand how a forensic analysis can gloss over the glaring difference between
    American (written by Szabo) and British English (written by Satoshi).


    ### Evidence Builds


    Journalist Dominic Frisby similarly singled out Nick Szabo in his 2014 book *Bitcoin:
    The Future of Money*? Frisby provides a lengthy exposition and unveils other circumstantial
    evidence, such as the fact that he has been working in this area for most of his
    life and has written about similar ideas many years in advance. Szabo also seems
    to have had a vacant period before Bitcoin was produced and asked for help coding
    a project. Four months later, the site `bitcoin.org` was registered, and Szabo
    was updating his blog posts about his related Bitgold idea.


    As for the linguistic evidence, Frisby uses the dubious and unpublished postulates
    by Skye Grey and the Aston University student report. Frisby himself has excellent
    insight into the writings of Satoshi and claims that he is very consistent in
    his British spellings but finds a handful of Americanisms. From this, he concludes
    that the author must be American. Still, would a handful of Americanisms in a
    consistently well-formed British English not instead indicate a Brit who had some
    exposure to America than an American with exposure to Great Britain? That seems
    to be a more parsimonious explanation.


    A final observation concerns the coding of Bitcoin. There is no evidence that
    Szabo ever coded in `C++`. There are examples of his coding in other languages,
    which begs the question of why he would choose `C++`. Curiously, Frisby lets this
    fact slip easily after having dismissed almost everyone else just because they
    did not like `C++`.


    While Frisby must be commended for some of the most comprehensive research to
    date and for bringing a substantial amount of new circumstantial evidence to light,
    it is hard to dismiss the two really hard pieces of evidence: the linguistic and
    the code. The more straightforward explanation is still that Satoshi is a Native
    British English speaker with well-documented coding skills in `C++`. Neither fits
    Szabo even if he had the ideas, motive, and opportunity to create Bitcoin.


    Nathaniel Popper, who wrote a similarly thorough work released the following year,
    *Digital Gold: Bitcoin and the Inside Story of the Misfits and Millionaires Trying
    to Reinvent Money*, joined Frisby in identifying Szabo as Satoshi. He managed
    to speak to the otherwise reclusive Szabo privately, where Szabo denied being
    Satoshi. Popper reiterates the previous points made by Frisby and adds a few more
    pieces of circumstantial evidence but similarly neglects to address the central
    issue of language and the ability to code in `C++`.'
