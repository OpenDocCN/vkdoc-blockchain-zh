- fmt: '# Interplanetary


    In contemporary society, we see a new kind of drive toward space. Billionaires
    and nation-states have renewed humanity''s interest in space exploration. The
    most immediate focus is on the moon and Mars whereto several missions are already
    planned. Moreover, rocket technology is improving radically for the first time
    since the space race of the 1960s, and new thinking abounds. This bodes well for
    an interplanetary future for humanity.


    On the moon, vast cities could easily be constructed in underground lunar lava
    tubes. Since the moon has no atmosphere, it would become a convenient transport
    hub for interplanetary supply chains. The moon becomes the warehouse and distribution
    center of the solar system.


    Building flexible space elevators would secure easy exchange of goods between
    Earth and the moon, such that all import and export with Earth does not rely on
    rockets. Unfortunately, even though the cost of rocket launches is decreasing,
    it will remain prohibitively expensive for interplanetary logistics to develop
    at scale.


    The moon and Mars are not necessarily the only or best places for colonization.
    For example, Venus''s higher atmosphere offers air density and pressure suitable
    for balloons. In fact it is the place most similar to Earth in the entire solar
    system. Since it hosts large amounts of noble gases, it could be filled with high-altitude
    flying gas mining cities. In addition, the extraordinarily high concentration
    of `CO[2]` makes it easy to grow plants. For example, bioengineered airborne algae
    could gradually convert the atmosphere and reverse the runaway greenhouse effect
    by substituting `CO[2]` for oxygen. Eventually, air could even become breathable.


    The moons of the big planets, such as Jupiter and Saturn, are currently the focus
    of many new exploratory space missions. Jupiter''s moons contain large amounts
    of organic compounds, water, `CO[2]`, and ammonia ice, which are conducive to
    supporting biological life. In this system, helium 3 and hydrogen could be harvested.
    Likewise, the Jovian system would become a waystation for colonizing the Cronian
    system of moons around Saturn. There are around 150 of these with a great variety
    of sizes and resources.


    Humans could thus become a genuinely interplanetary species, permanently settling
    in several of the solar system''s planets and moons. Like all colonization, trade
    is what fuels it, and this is no different. Interplanetary trade, though, requires
    a different kind of monetary system. The distance between them alone poses challenges.
    The light takes one hour and 20 minutes to reach Saturn from Earth. That means
    we will have to rethink the concept of time since current models are based on
    `UTC`, which is the time defined by the Greenwich Observatory near London on Earth.
    The general theory of relativity also predicts that time will “drift” between
    locations because of the different effects of gravity affecting time. Close to
    a large body like Jupiter, time will be different from a small one like the moon.
    Since `Bitcoin` depends critically on timestamps, this creates challenges that
    have to be resolved.


    A new interplanetary standard will therefore need to be developed. It could define
    time from the lighthouse effect of known pulsars. Pulsars are rapidly rotating
    magnetic neutron stars. The rotation frequency is stable, thereby offering a way
    to determine time, independent of Earth or the physical properties of atomic watches
    affected by gravity. This new timestamp could become the new basis for interplanetary
    trade.


    Communication will be done through lasers to establish an interplanetary Internet.
    Transactions will now take longer to clear. Local currencies will dominate different
    parts of the solar system, but `Bitcoin` or a modified version could theoretically
    become the interstellar reserve currency used for interplanetary trade. Still,
    it is difficult to see how miners in different regions of space with up to an
    hour and a half can run a shared bitcoin network and blockchain where solutions
    for the next block are found every ten minutes. If a miner on Titan finds a solution,
    how will that be accepted by the entire network when it takes an hour and a half
    to reach every miner? How do you prevent double spending across so significant
    time differences? Transactions of the same balance could be made in several different
    “time zones.” `Bitcoin` is conceptualized as an Earth-based currency and will
    not work as is as an interplanetary one.


    ## Will There Be Bitcoin in the Future?


    We have now considered six different scenarios that change assumptions of society,
    technology, and politics to understand how `Bitcoin` could develop. The first
    variable concerns change in human society ranging from none in the two first scenarios
    to radical change in the last two. Along with this, we considered the parameter
    of technological change ranging from none to decline to radical. The last parameter
    was government control. This parameter concerns the degree to which central governments
    and supra-national structures are able to control the development and use of `Bitcoin`—these
    range from a high degree of control to none.


    Table 11-1


    Bitcoin under different future scenarios


    | Scenario | Societal Change | Technological Change | Government Control | Bitcoin
    |

    | --- | --- | --- | --- | --- |

    | Normalization | No change | No change | Increased positive | Becomes mainstream,
    increased usage |

    | Fringe consolidation | No change | No change | Increased negative | Focused
    on the “dark” economy, decreased usage |

    | Disappearance of nation-states | Substantial | No change | Decreased | The Bitcoin
    standard, increased usage |

    | Singularity | Substantial | Radical | Disappeared | Becomes reserve currency,
    increased usage |

    | Post-apocalypse | Radical | Decline | Disappeared | Disappears |

    | Interplanetary | Radical | Radical | Decreased | Disappears |


    Under all scenarios except those involving radical societal change, `Bitcoin`
    will survive, and in most of them, it will probably thrive. For the Bitcoin standard
    to emerge, nation-states must disappear as the primary locus of political control.
    To become mainstream, `Bitcoin` has to change, or at least how it is used. The
    more speculative scenarios are more challenging for `Bitcoin`. The singularity
    is compatible with `Bitcoin` as the reserve currency of choice. Still, in a post-apocalyptic
    world, the lack of reliable production and maintenance of hardware and energy
    undermines the feasibility of `Bitcoin`. It seems structurally poised for a future
    as an interplanetary reserve currency, but unfortunately, physics gets in the
    way of establishing an interplanetary Bitcoin mining network.


    We may conclude that `Bitcoin` seems likely to prosper in the future if society
    doesn''t change radically but also that it may be obsolete if it does. These are
    just possible scenarios from which one can infer one''s subjective probability.
    The fact that most are favorable to `Bitcoin` is thus not necessary if the most
    likely one is the unfavorable scenario. I will let it be up to the reader to make
    their assessments.'
  raw: '## Interplanetary


    In contemporary society, we see a new kind of drive toward space. Billionaires
    and nation-states have renewed humanity''s interest in space exploration. The
    most immediate focus is on the moon and Mars whereto several missions are already
    planned. Moreover, rocket technology is improving radically for the first time
    since the space race of the 1960s, and new thinking abounds. This bodes well for
    an interplanetary future for humanity.


    On the moon, vast cities could easily be constructed in underground lunar lava
    tubes. Since the moon has no atmosphere, it would become a convenient transport
    hub for interplanetary supply chains. The moon becomes the warehouse and distribution
    center of the solar system.


    Building flexible space elevators would secure easy exchange of goods between
    Earth and the moon, such that all import and export with Earth does not rely on
    rockets. Unfortunately, even though the cost of rocket launches is decreasing,
    it will remain prohibitively expensive for interplanetary logistics to develop
    at scale.


    The moon and Mars are not necessarily the only or best places for colonization.
    For example, Venus''s higher atmosphere offers air density and pressure suitable
    for balloons. In fact it is the place most similar to Earth in the entire solar
    system. Since it hosts large amounts of noble gases, it could be filled with high-altitude
    flying gas mining cities. In addition, the extraordinarily high concentration
    of CO[2] makes it easy to grow plants. For example, bioengineered airborne algae
    could gradually convert the atmosphere and reverse the runaway greenhouse effect
    by substituting CO[2] for oxygen. Eventually, air could even become breathable.


    The moons of the big planets, such as Jupiter and Saturn, are currently the focus
    of many new exploratory space missions. Jupiter''s moons contain large amounts
    of organic compounds, water, CO[2], and ammonia ice, which are conducive to supporting
    biological life. In this system, helium 3 and hydrogen could be harvested. Likewise,
    the Jovian system would become a waystation for colonizing the Cronian system
    of moons around Saturn. There are around 150 of these with a great variety of
    sizes and resources.


    Humans could thus become a genuinely interplanetary species, permanently settling
    in several of the solar system''s planets and moons. Like all colonization, trade
    is what fuels it, and this is no different. Interplanetary trade, though, requires
    a different kind of monetary system. The distance between them alone poses challenges.
    The light takes one hour and 20 minutes to reach Saturn from Earth. That means
    we will have to rethink the concept of time since current models are based on
    UTC, which is the time defined by the Greenwich Observatory near London on Earth.
    The general theory of relativity also predicts that time will “drift” between
    locations because of the different effects of gravity affecting time. Close to
    a large body like Jupiter, time will be different from a small one like the moon.
    Since Bitcoin depends critically on timestamps, this creates challenges that have
    to be resolved.


    A new interplanetary standard will therefore need to be developed. It could define
    time from the lighthouse effect of known pulsars. Pulsars are rapidly rotating
    magnetic neutron stars. The rotation frequency is stable, thereby offering a way
    to determine time, independent of Earth or the physical properties of atomic watches
    affected by gravity. This new timestamp could become the new basis for interplanetary
    trade.


    Communication will be done through lasers to establish an interplanetary Internet.
    Transactions will now take longer to clear. Local currencies will dominate different
    parts of the solar system, but Bitcoin or a modified version could theoretically
    become the interstellar reserve currency used for interplanetary trade. Still,
    it is difficult to see how miners in different regions of space with up to an
    hour and a half can run a shared bitcoin network and blockchain where solutions
    for the next block are found every ten minutes. If a miner on Titan finds a solution,
    how will that be accepted by the entire network when it takes an hour and a half
    to reach every miner? How do you prevent double spending across so significant
    time differences? Transactions of the same balance could be made in several different
    “time zones.” Bitcoin is conceptualized as an Earth-based currency and will not
    work as is as an interplanetary one.


    ## Will There Be Bitcoin in the Future?


    We have now considered six different scenarios that change assumptions of society,
    technology, and politics to understand how Bitcoin could develop. The first variable
    concerns change in human society ranging from none in the two first scenarios
    to radical change in the last two. Along with this, we considered the parameter
    of technological change ranging from none to decline to radical. The last parameter
    was government control. This parameter concerns the degree to which central governments
    and supra-national structures are able to control the development and use of Bitcoin—these
    range from a high degree of control to none.


    Table 11-1


    Bitcoin under different future scenarios


    | Scenario | Societal Change | Technological Change | Government Control | Bitcoin
    |

    | --- | --- | --- | --- | --- |

    | Normalization | No change | No change | Increased positive | Becomes mainstream,
    increased usage |

    | Fringe consolidation | No change | No change | Increased negative | Focused
    on the “dark” economy, decreased usage |

    | Disappearance of nation-states | Substantial | No change | Decreased | The Bitcoin
    standard, increased usage |

    | Singularity | Substantial | Radical | Disappeared | Becomes reserve currency,
    increased usage |

    | Post-apocalypse | Radical | Decline | Disappeared | Disappears |

    | Interplanetary | Radical | Radical | Decreased | Disappears |


    Under all scenarios except those involving radical societal change, Bitcoin will
    survive, and in most of them, it will probably thrive. For the Bitcoin standard
    to emerge, nation-states must disappear as the primary locus of political control.
    To become mainstream, Bitcoin has to change, or at least how it is used. The more
    speculative scenarios are more challenging for Bitcoin. The singularity is compatible
    with Bitcoin as the reserve currency of choice. Still, in a post-apocalyptic world,
    the lack of reliable production and maintenance of hardware and energy undermines
    the feasibility of Bitcoin. It seems structurally poised for a future as an interplanetary
    reserve currency, but unfortunately, physics gets in the way of establishing an
    interplanetary Bitcoin mining network.


    We may conclude that Bitcoin seems likely to prosper in the future if society
    doesn''t change radically but also that it may be obsolete if it does. These are
    just possible scenarios from which one can infer one''s subjective probability.
    The fact that most are favorable to Bitcoin is thus not necessary if the most
    likely one is the unfavorable scenario. I will let it be up to the reader to make
    their assessments.'
  trans: '

    # 星际航行


    在当代社会，我们看到了新一轮向太空进发的热潮。亿万富翁和主权国家重新点燃了人类对太空探索的兴趣。当前最直接的焦点是月球和火星，针对它们已有多个任务计划。此外，自
    20 世纪 60 年代太空竞赛以来，火箭技术首次得到根本性改进，新的思想层出不穷。这对人类的星际未来来说是个好兆头。


    在月球上，可以轻易地在月球的熔岩管内建造巨大的城市。由于月球没有大气层，它将成为一个便利的星际供应链运输枢纽。月球将成为太阳系的仓库和配送中心。


    建造灵活的太空电梯将确保地球和月球之间的货物轻松交换，这样所有与地球的进出口都不再依赖火箭。不幸的是，即使火箭发射成本在下降，对于大规模发展星际物流来说，它仍然会昂贵得令人望而却步。


    月球和火星未必是唯一的或最佳的殖民地点。例如，金星的高层大气提供了适合气球的空气密度和压力。事实上，它是整个太阳系中最像地球的地方。由于它含有大量惰性气体，这些气体可以被用来填充高空飞行的气体采矿城市。此外，极高浓度的`CO[2]`使得植物易于生长。例如，经过生物工程改造的空中藻类可以通过用`O2`替代`CO[2]`，逐步改变大气成分，扭转失控的温室效应。最终，空气甚至可能变得可供呼吸。


    大型行星（如木星和土星）的卫星目前是许多新探索太空任务的焦点。木星的卫星含有大量有机化合物、水、`CO[2]`和氨冰，这些都有利于支持生物生命。在这个系统中，可以收集到氦-3
    和氢气。同样，木星系统将成为殖民土星卫星系统的中转站。这样的卫星大约有 150 颗，大小和资源各不相同。


    因此，人类可以真正成为一个星际物种，永久定居在太阳系的几个行星和卫星上。像所有殖民活动一样，贸易是推动力，这一点在这里也不例外。然而，星际贸易需要一种不同的货币体系。光是距离本身就是一个挑战。光从地球到达土星需要
    1 小时 20 分钟。这意味着我们必须重新思考时间的概念，因为当前的模型基于`UTC`，即由伦敦附近格林威治天文台定义的地球时间。广义相对论也预言，由于不同重力的影响，时间在不同地点之间会“漂移”。在像木星这样的大型天体附近，时间将与在月球这样的小型天体上不同。由于`Bitcoin`严重依赖时间戳，这就产生了必须解决的挑战。


    因此，需要开发一个新的星际标准。它可以根据已知脉冲星的灯塔效应来定义时间。脉冲星是快速旋转的磁性中子星。其旋转频率非常稳定，从而提供了一种确定时间的方法，这种方法独立于地球，也不受受重力影响的原子钟物理特性的制约。这个新的时间戳可能成为星际贸易的新基础。


    通信将通过激光进行，以建立星际互联网。交易结算所需时间将变得更长。本地货币将在太阳系不同区域占主导地位，但`Bitcoin`或修改后的版本理论上可以成为用于星际贸易的星际储备货币。尽管如此，很难想象太空中相隔最远达一个半小时的各区域的矿工，如何能运行一个共享的、每十分钟就能找到下一个区块解决方案的比特币网络和区块链。如果土卫六上的一名矿工找到了一个解决方案，当它需要一个半小时才能到达每个矿工时，这个解决方案如何被整个网络接受？如何防止在如此大的时间差异下进行双重支付？同一余额的交易可能在几个不同的“时区”进行。`Bitcoin`被设想为一种基于地球的货币，因此无法原样作为星际货币使用。


    ## 未来还会有比特币吗？


    我们现设想了六种不同的情景，这些情景改变了关于社会、技术和政治的假设，以了解`Bitcoin`可能如何发展。第一个变量涉及人类社会的变化，从前两个情景中的无变化，到后两个情景中的根本性变化。与此同时，我们考虑了技术变化的参数，从无变化到衰退再到根本性变化。最后一个参数是政府控制。这个参数涉及中央政府及超国家机构能在多大程度上控制`Bitcoin`的发展和用途——这涵盖了从高度控制到完全无控制的范围。


    表 11-1


    不同未来情景下的比特币


    | 情景 | 社会变化 | 技术变化 | 政府控制 | 比特币 |

    | --- | --- | --- | --- | --- |

    | 正常化 | 无变化 | 无变化 | 积极增强 | 成为主流，使用增加 |

    | 边缘巩固 | 无变化 | 无变化 | 消极增强 | 集中于“黑暗”经济，使用减少 |

    | 民族国家消失 | 显著变化 | 无变化 | 减弱 | 比特币标准，使用增加 |

    | 奇点 | 显著变化 | 根本性变化 | 消失 | 成为储备货币，使用增加 |

    | 后末日 | 根本性变化 | 衰退 | 消失 | 消失 |

    | 星际航行 | 根本性变化 | 根本性变化 | 减弱 | 消失 |


    在所有不涉及根本性社会变化的情景下，`Bitcoin`都将存活下来，并且在大多数情景中，它可能会繁荣发展。要使比特币标准出现，民族国家必须作为政治控制的主要场所而消失。要成为主流，`Bitcoin`必须改变，或者至少其使用方式必须改变。那些更具推测性的情景对`Bitcoin`更具挑战性。奇点情景与`Bitcoin`作为首选储备货币是兼容的。然而，在后末日世界中，硬件和能源的可靠生产与维护的缺乏，削弱了`Bitcoin`的可行性。它看起来在结构上已经准备好成为未来的星际储备货币，但不幸的是，物理定律阻碍了星际比特币挖矿网络的建立。


    我们可以得出结论：如果社会不发生根本性变化，`Bitcoin`似乎很可能在未来繁荣发展，但如果社会发生了根本性变化，它也可能过时。这些只是可能的情景，人们可以从中推断出自己的主观概率。因此，如果最可能发生的是不利情景，那么大多数情景有利于`Bitcoin`这一点就没那么重要了。我将把这个判断留给读者自己去做。

    '
- fmt: '# 12. Beyond


    We saw in the introduction how, in his book *Hyperobjects*, Timothy Morton describes
    a type of objects of such grand temporal and spatial proportions that they defy
    regular ideas about what a thing is. He mentions several examples of hyperobjects,
    such as an oil spill, climate change, the solar system, and radioactive material.
    Unfortunately, contradictions proliferate in his characterization of hyperobjects,
    making it hard to follow and draw any general conclusions that can be used for
    further investigations.


    Still, there is one important key idea worth noting in the context of Bitcoin.
    Morton builds on a contemporary philosophical movement called object-oriented
    ontology, which derives its metaphysics from Heidegger, who holds that the world
    cannot be adequately understood by privileging human existence. Object-oriented
    ontology postulates that objects also exist beyond human perception, which can
    only be grasped obliquely, if at all.


    Hyperobjects, as they appear from the characterization of Morton, bring to mind
    an inert mechanistic reactive existence subject merely to cause and effect. Although
    they exist in a complex multidimensional or “hyper world” that is hard to grasp,
    they are still just objects. But a thing like Bitcoin is not simply an object
    in this sense, even if it is hyper. It does more than merely react to events in
    the world; it also acts by itself on the world. Whereas objects react to manipulations
    from their environment, only organisms act on the environment in a way that simple
    dynamics cannot describe. This is a crucial insight that points to the possibility
    that we may speak of hyperorganisms in the same sense as Morton speaks of hyperobjects,
    that is, as entities outside the immediate perception of humans that we can know
    only obliquely.


    Hyperorganisms would be challenging to detect, like hyperobjects are, because
    they act on different scales than the human scale. By human scale, I mean the
    scale easily perceived by humans in terms of time and space. Hyperorganisms may
    not be bound to the same limited locality a human inhabits nor the same timeframe.
    They may not move fast enough for us to perceive or even move at all in the traditional
    sense. Their actions could have a hidden logic, but we cannot be sure to comprehend
    it. A hyperorganism would be to humans what a human is to bacteria. The human
    body is perceptible for bacteria and an integral part of their environment. But
    the bacteria would only be aware of a tiny sliver of the entire organism and would
    not ever question whether their environment is part of a higher-order system.
    Suppose bacteria developed the ability to communicate as humans do. In that case,
    they may start to comprehend more aspects of the totality of the organism by integrating
    knowledge from other bacteria in different areas of the body. With ingenuity and
    imagination, they may even develop a good understanding of the logic of this type
    of entity called human.


    The characterization of a hyperorganism is similar to the parable of the blind
    men and the elephant that can be traced back to some of the earliest Buddhist
    texts, such as the Tittha Sutta from around 500 BCE. The parable describes how
    the blind men in a village go to inspect an elephant. One touched its trunk and
    concluded it was like a snake, another its ear and figured it was like a fan,
    while a third felt its leg and figured it was like a pillar. All came up with
    vastly different conceptions of what an elephant is, much like the different bacteria
    would of a human. The challenge we will take up here is similar. We will integrate
    the diverse knowledge about Bitcoin that we have gained in the course of this
    book. Each chapter may provide clues to the enigmatic nature of the hyperentity
    that is Bitcoin.


    Giving up the human perspective is a powerful tool to open our minds to the possibility
    of hyperorganisms whose existence transcends human perception. Therefore, we need
    to build a new theoretical framework, without which we would be unable to see
    them.


    ## Is There Life Out There?


    Today there is already a search for life beyond humans taking place. NASA and
    others in the field of astrobiology search for extraterrestrial life. This is
    done by looking into space according to assumptions about what life is. Unfortunately,
    the result is that the criteria by which we search for extraterrestrial life are
    almost identical to known life forms. We take the human or at least terrestrial
    perspective when we define criteria for finding life outside of Earth. We, therefore,
    need to step back and reflect a bit more on what life is.


    ## What Is Life?


    We are alive, as are the plants, animals, and fungi around us. They show vast
    differences in appearance and character. Think of the microbes living in the depths
    of the Kidd Mine 350 miles northwest of Toronto undisturbed for up to two billion
    years in total darkness who don’t need oxygen and live of fools’ gold. The Deep
    Carbon Observatory, a research project studying life inside the earth, estimates
    that the total biomass of these organisms is 300 times as much as all living humans.


    Another example is the fungus *Ophiocordyceps*, which causes the carpenter ants
    to climb to a high point of vegetation, grip it, and die. The fungus will then
    grow its fruiting bodies from the body of the insect to propagate.


    A final example of the immense diversity of life is lichen, which grows as a cover
    on stone and wood. Lichen is not in fact one species but a composite symbiotic
    species consisting of algae or cyanobacteria and different species of fungi. The
    species of lichen called *Rhizocarpon geographicum* is estimated to be able to
    become more than 8,000 years old, making it the oldest living organism. This species
    is estimated to cover 6–8% of the earth’s land surface.


    Life is stranger and more multifaceted than most can imagine. Still, there is
    no doubt in our minds that they all share this quality called life. Even if this
    is self-evident, it is challenging to say precisely what life is. Some researchers
    have nevertheless tried to pinpoint what the essence of life is.


    The Austrian physicist Erwin Schrödinger provided one of the first philosophical
    answers to this question from the perspective of physics. In his book *What Is
    Life?* he found that the characteristic feature of life is that an entity “(…)
    goes on ‘doing something,’ moving exchanging material with its environment.” By
    doing this, it avoids the fate inscribed in all things in the universe, that of
    being destroyed by entropy. Entropy can be thought of as the degree of disorder
    in a closed system. The second law of thermodynamics states that with time the
    entropy or disorder of a closed system increases. Schrödinger noted that any nonliving
    entity quickly reaches the state of thermodynamic equilibrium or “maximum entropy.”
    Living beings, however, do not rapidly reach this state but continue to be ordered.


    The explanation for this, according to Schrödinger, is that the organism eats,
    drinks, and breathes; more precisely, they have a metabolism by which they exchange
    something with the environment. Traditionally metabolism has been viewed as one
    of matter or energy, but that does not make sense according to Schrödinger; instead,
    he proposed the surprising solution that living organisms draw negative entropy
    from their environment. In this view, “(…) the device by which an organism maintains
    itself at a fairly high level of orderliness ( = low level of entropy) really
    consists in continually sucking orderliness from its environment (…) in the case
    of higher animals we know the kind of orderliness they feed upon (…) the extremely
    well-ordered state of matter in more or less complicated organic compounds, which
    serve them as foodstuffs. After utilizing it, they return it in a very much degraded
    form.” According to Schrödinger then, life is a process by which, through metabolism,
    order is maintained by taking it from the environment.'
