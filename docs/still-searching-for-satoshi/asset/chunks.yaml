  trans: "\n# 比特币、社会与宇宙\n\n总之，我们可以看到，比特币由 extropians（未来主义者）构想，由 cypherpunks（密码朋克）创造，由开源黑客开发，并被自由意志主义者采纳。它依赖于一种特定的社会组织形式，其特点是弱网格和弱群体。社区成员之间没有高度的凝聚力。参与是交易性的。将其与周围充满通用规则、法规和繁琐官僚程序的法币世界相比。\n\
    \n道格拉斯总结了这两种模式的区别：“页面上的那条线将顺从区与创新区分开来。”这一点可以从它们所使用的货币工具中看出。法币遵循顺从之道，而比特币则是创新。因此，这些货币既是不同类型社会和宇宙观的工具，也是其代理，而这些观念深植于社会群体之中。\n\
    \n比特币不仅仅是一项迷人的技术创新。它深深植根于创造它的社会结构之中，并且是这些社会结构的产物。这些社会结构也推广了一种特定的世界观，与周围社会的方式截然不同。它们试图通过颠覆性行为和公开宣传来抵制并改变这些方式。因此，这不仅仅关乎一种货币；它关系到社会乃至整个世界的理想形态。\n\
    \n# 10. 宗教\n\n对许多人来说，比特币不仅仅是一种便捷的在线支付方式，也不是一种通过投机其持续升值来赚钱的手段。这是一项事业，一些人倾注了相当大的热情投身其中。我本人也感受到，这已超出了技术爱好者的普通兴趣范围。每当我在公开场合写一些可能被解读为对比特币批评的内容时，我总会面临比特币爱好者们的愤怒，他们用各种无需在此引述的言辞指责我。这里有一个有趣的例子，来自几年前我在\
    \ Quora 上关于比特币的一个回答所收到的回复：\n\n*异端。一旦比特币价格突破 1000 万美元，解决了世界饥饿问题，并给中东带来和平，你将被*逼着*收回你的话。一旦每一次恐怖袭击都被记录在区块链上，每个人都会安全，因为有了加密。*\n\
    \n——用户 Kamran Khan\n\n我在科技领域写作和辩论了几十年，从未经历过这种情况。通常，对我的文章和帖子的回应，要么是耸耸肩，要么是来自注重细节、认真负责的读者的有益澄清，甚至是激烈的反驳。然而，这是我第一次因为批评任何与科技相关的事物而被称作异端。\n\
    \n有些人自称是比特币极端主义者，并相信它是世界上唯一真正且公平的货币。有些人，比如上面引用的 Quora 用户，相信比特币将改变世界。这种对比特币的热情有些接近于宗教热忱。的确，比特币的某些方面与宗教非常相似。\n\
    \n## 什么是宗教？\n\n宗教有多种不同的形式和形态。如果宗教仅仅是基督教、佛教或印度教这样的世界宗教，那么将比特币与它们进行比较将是荒谬的。对于宗教的本质，并没有一个公认的定义。这并非缺乏尝试。几十年来，关于宗教的定义一直存在讨论。然而，我们并不需要一个完整的宗教定义，而是需要承认宗教具有多个不同的方面。其中一些方面，我们也能在比特币周围发现。\n\
    \n一个宗教总是有一个由信徒或追随者组成的群体。我将其称为比特币社区。他们相互交流，对世界有着相似看法，并拥有共同的目标。我们并非声称比特币本身是神或神圣的，而是说宗教行为和思想在多个方面塑造了比特币社区的接纳和形成。\n\
    \n## 先知\n\n> *可叹，忠信的城*\n> \n> *竟变成了妓女！*\n> \n> *从前充满了公平，*\n> \n> *公义居在其中，*\n>\
    \ \n> *现今却有凶手居住！*\n> \n> *你的银子变为渣滓，*\n> \n> *你的酒用水搀兑。*\n> \n> *你的官长居心悖逆，*\n> \n\
    > *与盗贼作伴；*\n> \n> *他们都喜爱贿赂，*\n> \n> *追求赃物。*\n> \n> *他们不为孤儿伸冤；*\n> \n> *寡妇的案件也到不了他们面前。*\n\
    > \n> *因此，主—万军之耶和华、*\n> \n> *以色列的大能者说：*\n> \n> *“哎！我要向我的对头雪恨，*\n> \n> *向我的敌人报仇。*\n\
    > \n> *我必反手加在你身上，*\n> \n> *炼尽你的渣滓，*\n> \n> *除净你的杂质。*\n> \n> *我也必复还你的审判官，像起初一样，*\n\
    > \n> *复还你的谋士，像起先一般。*\n> \n> *然后，你必称为公义之城，*\n> \n> *忠信之邑。”*\n> \n> *锡安必因公平得蒙救赎；*\n\
    > \n> *其中归正的人必因公义得蒙救赎。*\n> \n> *但悖逆的和犯罪的必一同败亡；*\n> \n> *离弃耶和华的必致消灭。*\n> \n> ——《以赛亚书》1:21–28（译文：新国际版）\n\
    \n先知以赛亚被认为生活于公元前八世纪的古以色列。由于资料来源自然稀少，人们对其确切情况知之甚少。有些人推测他来自贵族阶层。然而，他对穷人、无家可归者和无地者的境况有深入了解，这表明他并非传统的贵族。同样重要的是要注意到，他并非祭司家族出身。这使得他置身于正式的宗教权威之外，对受害者和受压迫者抱有同情。\n\
    \n宗教中常有先知这一形象。这在亚伯拉罕诸教（犹太教、基督教和伊斯兰教）中尤为普遍，是其核心焦点。先知这一形象是指对世界的真实状态，尤其是未来，拥有隐秘知识的人。他们常常对当下社会、其风俗及普遍的堕落感到愤慨。在亚伯拉罕诸教中，先知命令人们回归上帝之道和正确的伦理生活方式。\n\
    \n这种将当下社会诊断为堕落社会的观点，伴随着对正确生活方式的处方。在伊斯兰教中，这包括每日五次礼拜、朝觐和学习《古兰经》等；在基督教中，则是黄金法则。\n\
    \n先知通常生活在社会的边缘。在《旧约》中，那是旷野。他并非来自宗教权威的主流。正是先知来自既定权力结构之外这一事实，使得预言具有力量。因此，既定权力机构常常针对先知，这反而加剧了道德义愤，从而助长了预言。\n\
    \n作为个人，先知是神秘而有魅力的，他/她能够吸引追随者的注意力，并说服他们接受自己的世界观。此外，他/她还是一位出色的演说家，能够将思想转化为精确且令人难忘的语录，让追随者能够记住并依此生活。\n\
    \n在比特币中，“先知”自然是中本聪。他是那位神秘的创始人，其起源即便不完全是神性的，也是未知的。他游走于隐秘的知识领域，即密码学之中。中本聪的世界观是，由于政府和银行过度放贷，导致了信贷泡沫，而本不该得到救助的银行却不得不被救助，这使得既有的世界秩序堕落了。\n"
- fmt: "According to Satoshi, the government runs the monetary system and is perceived\
    \ as having become morally corrupt (cf. “See how the faithful city/has become\
    \ a prostitute!/She once was full of justice;/righteousness used to dwell in her”).\
    \ Central banks are printing too much money, which leads to inflation (cf. “Your\
    \ silver has become dross/your choice wine is diluted with water”). Inflation,\
    \ according to Satoshi, effectively steals money from ordinary people. Furthermore,\
    \ the financial institutions are corrupt since, as trusted third parties, they\
    \ do not ensure that transactions are non-reversible since they mediate disputes\
    \ and decide the outcome (cf. “Your rulers are rebels/partners with thieves/they\
    \ all love bribes/and chase after gifts”). This increases the price of transactions\
    \ and makes it too high for simple payments. Since transactions are not anonymous,\
    \ they also take away peoples’ right to privacy since it is possible to trace\
    \ each transaction of the individual. This allows the government to snoop on private\
    \ affairs (cf. “They do not defend the cause of the fatherless/the widow’s case\
    \ does not come before them”). All this is unethical and unfair.\n\nIn opposition\
    \ to this, Satoshi has devised an alternative monetary system, Bitcoin, that runs\
    \ completely independent of the evil central government. Unlike fiat currencies,\
    \ Bitcoin is free to use and completely private. It is not inflationary; quite\
    \ the contrary, it prints less and less money over time until, eventually, all\
    \ has been printed. This leads to deflation, which will increase the value of\
    \ Bitcoin.\n\nSatoshi predicts a future where the existing financial institutions\
    \ are no longer needed and payments are free and completely private. There will\
    \ be no more credit bubbles, and people who want to save their money will see\
    \ them increase in value. Satoshi seems to be echoing Isaiah:\n\n> *I will turn\
    \ my hand against you*\n> \n> *I will thoroughly purge away your dross*\n> \n\
    > *and remove all your impurities*\n> \n> *will restore your leaders as in days\
    \ of old*\n> \n> *your rulers as at the beginning*\n> \n> *Afterward you will\
    \ be called*\n> \n> *the City of Righteousness*\n> \n> *the Faithful City*\n>\
    \ \n> *Zion will be delivered with justice*\n> \n> *her penitent ones with righteousness*\n\
    > \n> *But rebels and sinners will both be broken*\n> \n> *and those who forsake\
    \ the Lord will perish.*\n\nSatoshi is, like other prophets, also from the fringes\
    \ though not literally in a geographical sense. London is hardly a desert. But\
    \ he is from the fringes of finance, that is, not a banker or economist but a\
    \ computer scientist who specializes in cryptography. Therefore, he has no connection\
    \ to or affiliation with the existing banking system. His prose is unusually clear,\
    \ even crisp, compared with his peers on the cryptography mailing list, and he\
    \ has a way of formulating ideas that captivate people.\n\nSatoshi’s character\
    \ is, therefore, somewhat similar to a prophet in the Abrahamic religions. These\
    \ qualities help explain why he, unlike any of the other virtual currency founders\
    \ we have reviewed, was able to build a following and turn it into a thriving\
    \ community. Wei Dai, for example, had many similar ideas but was not able to\
    \ explain them in the same way. Likewise, David Chaum built a virtual currency\
    \ that did much of what Bitcoin does, but he did not have Satoshi’s prophetic\
    \ qualities.\n\n## Scriptures\n\n> *Avalokita, the Holy Lord and Bodhisattva,\
    \ was moving in the deep course of the Wisdom which has gone beyond. He looked\
    \ down from on high, He beheld but five heaps, and He saw that in their own-being\
    \ they were empty. Here, O Sariputra, form is emptiness and the very emptiness\
    \ is form ; emptiness does not differ from form, form does not differ from emptiness,\
    \ whatever is emptiness, that is form, the same is true of feelings, perceptions,\
    \ impulses, and consciousness.*\n> \n> *—*The Heart Sutra (translation: E. Conze)\n\
    \nThe Heart Sutra is one of the most famous sacred texts of Buddhism. Several\
    \ commentaries exist dating back to the eighth or ninth century. Today it is one\
    \ of the most commonly used texts of Buddhism.\n\nIn religions where dogma and\
    \ teachings are essential, sacred scriptures have a central role to play. We know\
    \ these holy texts from world religions such as the Vedas of Hinduism; the Torah,\
    \ Bible, and Quran of the Abrahamic faiths; as well as the Tripitaka of Buddhism.\
    \ They feature heavily in civilizations where a social class can devote themselves\
    \ to bureaucratic concerns, that is, where the division of labor in society allows\
    \ a type of people to pursue other work than the manual labor required for survival.\
    \ Religious texts are among the first things such cultures write down when they\
    \ acquire the skill of writing.\n\nThe sacred texts are a particular type of text\
    \ since they are attributed special significance. Historically, these scriptures\
    \ have been designated as focal texts in their specific culture. This is, for\
    \ example, how the Gospel was established as a sacred text from several different\
    \ texts circulated in the third and fourth centuries CE. These focal texts have\
    \ a unique quality to them that is beyond reproach, a revealed truth, if not directly\
    \ from God, then divinely inspired.\n\nIn connection with these is another class\
    \ of texts consisting of commentaries, sayings, aphorisms, or hymns that are secondary\
    \ but related to the focal text. They are not entirely revealed truth but can\
    \ be tied to the same source of truth. They serve to expand the scope of the teachings\
    \ of the focal text. In the Judaic tradition, this includes the Mishnah and Talmud.\n\
    \nFor Bitcoin, we find a similar structure. Though not quite trafficking in divine\
    \ revelations, Satoshi, as the designated “prophet,” has produced the Bitcoin\
    \ whitepaper as the focal text of Bitcoin. In discussions around Bitcoin, this\
    \ text is beyond reproach in much the same manner as sacred scripture. There is\
    \ no discussion of whether this was right or wrong or debate as is usual with\
    \ academic papers. Instead, it is used as an ultimate source of truth in arguments.\n\
    \nAlong with this are the thousands of words of Satoshi written on the Bitcoin\
    \ Forum. These also have a special status since it is possible to expand the scope\
    \ of Satoshi's vision beyond that written explicitly in the Bitcoin whitepaper.\
    \ The last group is the emails purportedly from Satoshi, released years after\
    \ by the recipients of these emails. The fact that Satoshi withdrew from the public\
    \ and left a finite body of text helps establish this structure. These texts are\
    \ even published as a book in the fashion of the New Testament by Phil Champagne\
    \ entitled *The Book of Satoshi*.\n\nIt is interesting to contrast the situation\
    \ with other virtual currencies. For example, David Chaum wrote a paper very similar\
    \ to the Bitcoin whitepaper describing his vision for a future virtual currency.\
    \ This is entitled “Blind Signatures for Untraceable Payments,” published in 1982.\
    \ Looking through this, it has many features that resemble the Bitcoin whitepaper.\
    \ So many, in fact, that it would be reasonable to assume it was the direct inspiration.\
    \ Nevertheless, Chaum’s paper never gained a following. It is, therefore, likely\
    \ that the texts produced by Satoshi, fitting a structure known from religious\
    \ scripture, helped focus the vision of Bitcoin in much the same way as religious\
    \ texts do with religious visions."
