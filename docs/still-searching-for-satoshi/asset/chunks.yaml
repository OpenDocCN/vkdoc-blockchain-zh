    and the economy would reach a billion dollars by 2005\. As we have seen earlier,
    Szabo had presented many of the ideas that would come together in Bitcoin, even
    if they arrived about ten years later than he had predicted. He thereby fertilized
    the ground for what would become Bitcoin along with other extropians on the cryptography
    mailing list.


    Another extropian who would become even more instrumental in Bitcoin’s creation
    was Hal Finney. He and his wife had been extropians from the beginning. He had
    also tried his own version of a virtual currency called reusable proof of work
    or RPOW. Without his interest in Bitcoin and assistance in the very beginning,
    Bitcoin might very well have slipped into oblivion. Hal Finney’s singular importance
    is easily overlooked, perhaps due to the fact that he died much too early from
    ALS in 2014\. In his book *Digital Cash: The Unknown Story of the Anarchists,
    Utopians, and Technologists Who Created Cryptocurrency*, Finn Brunton traces the
    origins of Bitcoin and identifies Finney as the real main character behind the
    advent of cryptocurrencies. He writes, “Hal Finney, who quietly became the main
    character of this book, died in 2014\. His body was perfused, cooled below freezing,
    and placed in long-term storage in the Alcor cryonics facility” (p. 205). Fittingly
    this was partially funded by his bitcoin reserves. Finney thus embodies the creation
    of cryptocurrencies in body and mind.


    ### The Coming of the Thousand-Year Reign


    We can thus see the powerful impact millenarian ideas have had on the development
    of Bitcoin and cryptocurrencies. Humans have all days believed in an imminent
    radical transformation of the world even if the mode and result differ across
    cultures. Such beliefs bring about extraordinary motivation and the power of change.


    Bitcoin was never just a convenient new way of making payments, like many other
    virtual currencies of its time. Instead, it was fueled by the belief in a fundamental,
    even radical, change of the world that would be imminent. This was an essential
    driver for the creation and adoption of this new virtual currency. Bitcoin was
    not necessarily seen as a magical technology that would bring about this new world
    but as a crucial component for it.


    It may be that these deep millenarist convictions of Bitcoin proponents separated
    it from other virtual currencies like e-gold. In contrast to other virtual currencies
    at the time, Bitcoin was more than just a utility to its proponents; it was a
    necessity that would be crucial in transforming the world.


    ## Bitcoin and Religion


    Bitcoin is more than just another technical innovation to many people in the Bitcoin
    community. It clearly generates responses and fervor that far outpace even the
    most ardent Apple fanatic at the Apple Keynote event. These people feel deeply
    that this is the solution to the future and will bring them and other believers
    great wealth. The inventor is treated with a reverence worthy of a prophet, and
    his texts are still read and continue to inspire to this day.


    There is no explicit reference to gods, spirits, or otherworldly creatures, but
    the appearance is structurally similar to other well-known religious phenomena.
    This could be an important clue as to why Bitcoin still, to this day, attracts
    so much attention and so many resources are invested into it. Past or present,
    none of the other virtual currencies exhibit similar features. The second greatest
    cryptocurrency, Ethereum, also commands a dedicated and energized following, but
    it does not have a single prophet-like figure or focal texts. It certainly does
    not elicit the same emotional statements when criticized.


    Part of Bitcoin’s success could be derived from the religious motivations it elicits
    in the Bitcoin community. As history has shown, such motivations can be important
    drivers of change.


    # 11. Future


    Bitcoin was born from visions of the future and is today primarily driven by expectations
    of what it could be in the future:


    *   Bitcoin will hit $1,000,000.


    *   Bitcoin will replace gold as a safe harbor in investments.


    *   We will see a new Bitcoin standard emerge in place of fiat currencies.


    These are common beliefs in the Bitcoin community. On the other hand, we have
    skeptics that are just as convinced that Bitcoin is nothing but a Ponzi scheme
    that, like all other Ponzi schemes, will fall at some point. The problem is that
    these views are rarely supported by any analysis beyond what-if thought experiments
    and subjective opinion. Either of these scenarios or some completely different
    ones may come true, but we should be able to do better.


    In this chapter, we will use the insights we gained about Bitcoin in this book
    to understand how the future of Bitcoin might look. Like any statement about the
    future, it is based on assumptions. We will look at several possible scenarios
    that vary these assumptions and ascertain how they could develop and how Bitcoin
    would fit in. These scenarios are not exhaustive but are meant to suggest possible
    future trajectories based on current trends. They operate on different timescales
    with different assumptions of technological and historical development.


    The first two scenarios, “normalization” and “fringe consolidation,” work from
    an assumption that we will continue within the limits of the known contemporary
    world. Governments persist, and people continue to live in nation-states with
    banks and the institutions we know today. The following two scenarios involve
    substantial societal changes and have a longer timeframe. The scenario “disappearance
    of the nation-state” assumes that the current dominance of nation-states ends.
    The “singularity” further assumes a radical change in technology. We follow the
    trajectory predicted by Ray Kurzweil. The final two scenarios involve a radical
    change of our society. The “post-apocalypse” scenario assumes a cataclysmic event''s
    occurrence, while the last scenario, “interplanetary,” considers what happens
    when humans colonize the solar system.'
  trans: '

    # 超人类主义者与比特币的起源


    超人类主义者是一个松散组织的社群，通过电子邮件列表、会议、一本杂志和一个基金会进行交流，其成员从未超过数千人。这个名称源于单词 *extropy*（外熵），该词最初在
    1967 年一篇关于低温学的论文中作为 *entropy*（熵）的反义词被使用。后来，这个术语被用来指代超人类的潜力。外熵研究所于 1991 年启动了其电子邮件列表，并开始推广关于超人类主义的会议。这个概念源于低温学，其目的是为了能够在世界已经发生变革后的未来某个时间点被复活。这些通过低温保存的人，将是那些在奇点到来时被唤醒的逝者。超人类主义者与库兹韦尔、尼克·博斯特罗姆以及其他著名的超人类主义者持有相同的超人类信念。


    这带来了一个问题。由于超人类主义者知道自己活不到人类与机器融合的转折点，他们必须通过低温保存活到那一天。但是，当你无法信任银行，而通货膨胀又在慢慢侵蚀你的资金时，如何确保到那时还能留有资金就成了一个问题。替代方案必须是一种存在于现有银行业之外的电子虚拟货币。正如芬恩·布伦顿在他的《数字现金》一书中所言：“投资和金融投机的‘长期、超长期’时间框架，不再是规划你的退休和衰老，而是安排资产以超越你的生命，并最终彻底超越金钱。”


    尼克·萨博在超人类主义者的活动中预言了这种货币的到来。1995 年，他预测到 1999 年将有一百万人使用虚拟货币，并且到 2005 年其经济体量将达到十亿美元。正如我们之前所见，萨博提出了许多后来汇聚成比特币的理念，尽管它们比他预测的时间晚了大约十年才实现。因此，他与其他密码学邮件列表上的超人类主义者一起，为后来诞生的比特币奠定了基础。


    另一位在比特币创建过程中发挥更大作用的超人类主义者是哈尔·芬尼。他和他的妻子从一开始就是超人类主义者。他还尝试过自己版本的虚拟货币，称为“可重用的工作量证明”（RPOW）。如果没有他对比特币的兴趣以及在最初阶段的帮助，比特币很可能会消失得无影无踪。哈尔·芬尼独特的重要性很容易被忽视，或许是因为他在
    2014 年因肌萎缩侧索硬化症（ALS）过早去世。在他的著作《数字现金：创造加密货币的无政府主义者、乌托邦主义者和技术专家不为人知的故事》中，芬恩·布伦顿追溯了比特币的起源，并将芬尼视为加密货币出现背后真正的主角。他写道：“哈尔·芬尼，他悄然成为了本书的主角，于
    2014 年去世。他的遗体被灌注、冷却至冰点以下，并长期存放在阿尔科生命延续基金（Alcor）的低温设施中”（第 205 页）。恰如其分地，这部分的费用是由他的比特币储备资助的。芬尼因此以身心俱在的方式体现了加密货币的诞生。


    ## 千禧年统治的到来


    因此，我们可以看出千禧年主义思想对比特币和加密货币的发展产生的强大影响。人类始终相信世界即将发生根本性的变革，尽管不同文化中变革的模式和结果各不相同。这种信念带来了非凡的动力和改变的力量。


    比特币从来不仅仅是像它同时代的其他许多虚拟货币那样，只是一种便捷的新支付方式。相反，它是由对世界即将发生根本性、甚至是激进性变革的信念所驱动的。这是推动这种新型虚拟货币被创造和采用的关键驱动力。比特币不一定被视为能带来这个新世界的神奇技术，而是被视为实现它的一个关键组成部分。


    或许正是比特币支持者这些深层的千禧年主义信念，使其与 e-gold 等其他虚拟货币区别开来。与当时其他虚拟货币不同，对比特币的支持者来说，它不仅仅是一种实用工具；它是一种必需品，对于改变世界至关重要。


    ## 比特币与宗教


    对于比特币社区的许多人来说，比特币不仅仅是一项技术创新。它显然引发的反响和热情，甚至超过了苹果发布会上最狂热的苹果粉丝。这些人深切地认为这是通往未来的解决方案，并将为他们和其他信徒带来巨大财富。其发明者受到了堪比先知的尊崇，他的文本至今仍被阅读并持续启发着人们。


    虽然没有明确提到神、灵魂或超自然生物，但这种外在表现与其它众所周知的宗教现象在结构上相似。这或许是一个重要的线索，解释了为什么比特币直到今天仍然吸引如此多的关注，并且有如此多的资源被投入其中。无论过去还是现在，其他任何虚拟货币都没有表现出类似的特征。第二大加密货币以太坊也拥有专注且充满活力的追随者，但它没有一个类似先知的单一人物或核心文本。当受到批评时，它当然也不会引发同样情绪化的回应。


    比特币的成功部分可能源于它在比特币社区中激发的宗教动机。正如历史所表明的那样，这种动机可能是变革的重要驱动力。


    # 11. 未来


    比特币诞生于对未来的愿景，而今天，它主要由对其未来可能成为什么的预期所驱动：


    *   比特币将达到 1,000,000 美元。

    *   比特币将取代黄金成为投资的避风港。

    *   我们将看到一种新的比特币标准出现，取代法定货币。


    这些是比特币社区中常见的信念。另一方面，也有怀疑论者同样确信比特币只不过是一个庞氏骗局，并且像所有其他庞氏骗局一样，最终会崩盘。问题在于，这些观点很少得到任何超出“如果……会怎样”的思想实验和主观意见之外的分析支持。以上任何一种情景，或者一些完全不同的情景，都有可能成为现实，但我们应该能够做得更好。


    在本章中，我们将利用本书对比特币的洞察来理解其未来的可能面貌。像任何关于未来的陈述一样，它基于假设。我们将审视几种可能的情景，这些情景对这些假设进行了不同的调整，并确定它们可能如何发展以及比特币将如何融入其中。这些情景并非详尽无遗，而是意在基于当前趋势提出可能的未来发展轨迹。它们在不同的时间尺度上运作，并基于对技术和历史发展的不同假设。


    前两种情景，“常态化”和“边缘巩固”，基于一个假设，即我们将继续在已知当代世界的限制内发展。政府持续存在，人们继续生活在拥有银行和我们今天所熟知的机构的国家中。接下来的两种情景涉及重大的社会变革，时间跨度更长。“民族国家消失”的情景假设民族国家当前的统治地位终结。“奇点”则进一步假设了技术的根本性变革。我们遵循雷·库兹韦尔预测的轨迹。最后两种情景涉及我们社会的根本性变革。“后末日”情景假设了一场灾难性事件的发生，而最后一种情景“星际殖民”则考虑人类殖民太阳系时会发生什么。

    '
- fmt: '# Normalization


    In this scenario, Bitcoin adapts to the surrounding majority culture and becomes
    mainstream rather than a niche undertaking. For this to happen, several things
    need to happen.


    The regulatory paradigm needs to improve. If bitcoin is to become a mainstream
    currency, several legal issues need to be resolved. It has more to do with clarity
    than lenience or austerity of regulation. We do see a drive toward this in multiple
    jurisdictions but are not quite there yet. One of the biggest problems is that
    it needs to be clarified precisely what bitcoin is legally and that this definition
    differs across countries and even internally in a country. The European Union,
    for example, has yet to pass specific regulations concerning Bitcoin. Consequently,
    old laws, often more than a hundred years old, are used locally in member countries
    to govern trade and taxation of bitcoin. In the United States, bitcoin is classified
    as currency, commodity, or property, depending on which government office you
    ask.


    If the United States and European Union decided to accept bitcoin as a currency
    like any other and include it in existing anti-money laundering regulations, it
    would be a big step toward normalizing it. That would mean banks could start accepting
    and managing accounts in bitcoin on behalf of their customers. That could expand
    its use as a medium of exchange. Existing processes in the banking world for money
    transfer and clearance would be brought to bear on Bitcoin. That would open its
    usage up to people currently suspicious of or alienated from the bitcoin trade.
    In practice, banks would probably act like contemporary crypto exchanges and only
    transfer aggregated sums between them and manage internal transfers in internal
    accounts. That would minimize the total number of transactions on the blockchain.


    In this scenario, everyone will use a digital wallet as the primary tool for economic
    transactions. It could be part of a new super app, built on existing solutions
    by digital payments providers or offered by specialized companies. In this app,
    you could seamlessly pay in cryptocurrency, fiat currency, or any other type of
    currency. There is no reason loyalty points should not be part of this too. Customers
    would be able to exchange bitcoin and cryptocurrencies seamlessly.


    Through this app, the promise of Bitcoin as a way to provide global remittance
    services would come true. People in countries with high inflation and unstable
    political and banking systems could store their money in other currencies. Whether
    this would be bitcoin or stable coins pegged to fiat currencies depends on whether
    it can tame its volatility. People in third-world countries tend to be less engaged
    in ideological fights about fiat currencies'' inflationary characteristics and
    more concerned with knowing that their savings are there next year when they plan
    to buy a house and not lost to the next bust cycle of Bitcoin.


    The wallet could also be a new platform for legal and economic activities where
    ownership could be documented and transferred through sales. As establishing ownership
    as a smart contract in the digital wallet becomes more common, it starts to absorb
    certain types of ownership previously documented offline, especially digital ones.
    For example, stocks will probably remain within the banking system, but fractional
    stocks could be traded here. Similarly, ownership of other assets like houses
    would remain within the nationally accepted methods of documenting ownership except
    for the most progressive states, which are probably smaller ones. Here it would
    be possible to use a blockchain to register legal ownership.


    This development would increase the attractiveness of bitcoin as a payment option
    for online and physical merchants due to an increased speed of settlement and
    presumably lower fees. In addition, it would probably be possible to dispute transactions,
    unlike the current state of affairs, since transactions would primarily happen
    off-chain in the banking system since most bitcoin payments are handled by the
    banking system rather than directly.


    We saw in Chapter [8](#539536_1_En_8_Chapter.xhtml) how bitcoin''s lack of essential
    utility, particularly as a medium of exchange and unit of account, was a primary
    reason for the volatility of bitcoin. In this scenario, the volatility is reduced
    since the essential utility is increased and the bitcoin price will rise steadily
    but not as dramatically as in the first 15 years.


    That would see the exit of many of the original Bitcoin believers, who would think
    this new development an abomination. Another fork could be formed, or they would
    rally around Bitcoin Cash as the primary flavor of bitcoin, preserving the original
    founder''s ideas. They would presumably try to evade much of the newfound regulation,
    and exchanges would move to other more leniently regulated localities.'
