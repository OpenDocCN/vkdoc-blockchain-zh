- fmt: '# Open Source Community Categories


    ## Toys


    Toys are projects with low contributor and user growth. They are closer to personal
    projects and are often side projects of programmers. They are usually meant to
    be only for fun, often with no straightforward application. An example is `SSH-chat`,
    a project that uses the Secure Shell (`SSH`) protocol to provide a client meant
    for chat. This provides encrypted chat functionality, which seems convenient,
    but so does WhatsApp.


    ## Stadiums


    The last category is stadiums. They are projects where the user growth is high
    but not followed by a corresponding contributor growth as in federations. An example
    of this is `Babel.js`, a JavaScript compiler. In a stadium, one or a few people
    make decisions on behalf of a large user base. This model is becoming more common
    today. The maintainers are proprietors through which everyone in the community
    is related. Other examples of such communities are hotels where everyone is connected
    through the central proprietor, the hotel owner.


    Of these types, Bitcoin is today a stadium. Bitcoin has only five developers at
    its core who make decisions surrounding Bitcoin and many thousands of users who
    deploy the Bitcoin software without participating in any way in the development
    and maintenance of it.


    Open source communities can go through different phases where they fit other categories.
    Initially, Bitcoin was a toy, essentially a side project for Satoshi, who first
    got the help of Hal Finney. Then Martti Malmi and Gavin Andresen joined and helped
    to work on the code. After Satoshi left, Andresen was left in charge. Throughout
    Bitcoin’s history, a small core group has had a firm grip on what would go into
    the source code. That does not mean they could just build whatever they wanted
    because any change to Bitcoin depends on the willingness of the Bitcoin miners
    to adopt the new version of the software. Technically only the core group has
    the rights to change the Bitcoin source code. That means while anyone is free
    to develop new features, they cannot commit changes to the source code of the
    next version without being approved by someone from the core group.


    There have been some heated debates about proposed changes to how Bitcoin should
    work since it has developed a lot since its original implementation, and there
    are diverging philosophies among the Bitcoin community. When such differences
    could not be resolved, this has resulted in splintering, as the example of Bitcoin
    Cash shows. In 2017 a debate around the future of Bitcoin resulted in a so-called
    hard fork, where Bitcoin split up in two: traditional Bitcoin and Bitcoin Cash.
    These two are now both available at exchanges with each their own ardent followers.


    # Cypherpunks


    Another group that had a significant impact on the development of Bitcoin was
    the so-called cypherpunks. The cypherpunks were a group of people advocating using
    cryptography to effect social and political change. The word is a contraction
    of `cipher` and `cyberpunk`. `Cyberpunk` was made famous in William Gibson’s 1984
    novel *Neuromancer* depicting a dystopian future world that features marginalized
    persons who live with technological enhancements of their bodies. In this world,
    hackers fight the system or just whoever they are paid to. The word `cipher` comes
    from cryptography, where the cipher is an algorithm used for encryption. The difference
    between this group and the other hackers is that whereas hackers are usually left-leaning,
    cypherpunks derive their political orientation from libertarianism.


    In 1992 Eric Hughes, Timothy C. May, and John Gilmore founded a group that started
    to meet regularly to discuss a wide range of themes such as politics, computer
    science, cryptography, and mathematics. There were ideological precursors to this
    movement, most notably David Chaum and his paper “Security Without Identification:
    Transaction Systems to Make Big Brother Obsolete" from 1985, which served as inspiration.
    Other inspirations were Ayn Rand and Verner Vinge’s science fiction.


    The same year a mailing list was established known as the cypherpunk mailing list.
    On this list, the cypherpunks debated an extended range of subjects from current
    political issues over grand visions of the future to complex cryptographic problems.
    The group was thus primarily connected through mailing lists where anonymous people
    communicated with no face-to-face interaction. This often resulted in a toxic
    environment of heated exchanges and, in agreement with the group''s ideals, no
    moderation was done. Eventually, this led the list to implode in sectarian debates.
    It split up into other mailing lists with many of the same people. Different iterations
    existed at different times. The most important is the cryptography mailing list,
    where Satoshi posted his idea about Bitcoin.


    Whereas the primary purpose of the open source community was to collaborate to
    build new free software, any actual group effort among the cypherpunks seems more
    incidental. Hal Finney, in an interview, was blunt enough to admit that other
    members of the community often quickly torpedoed most ideas, and Bitcoin was no
    exception.


    That does not mean they did not cooperate as Hal Finney did with Satoshi. The
    community seems to have been more about exchanging ideas than collaborating on
    building code together. Wei Dai and Adam Back are good examples of this. Dai never
    built any code for his `B-money` idea, nor did he consider it. Dai described an
    idea to the community. Back also did this when he presented `Hashcash`, but he
    went on to build the code. It is telling, however, that he did so by himself.
    The same was the case for Satoshi. Bitcoin became an open source project only
    after its release. Seen from the outside, the cypherpunks seem more like a flock
    of lone wolfs than a coherent political movement.


    The one thing that united the cypherpunks and ran through the emails on the cryptography
    mailing list was the distrust of the government. This is, of course, a common
    American trope, but in this modern version, the complete absence of government
    seems to be the dream. The first step is focusing on privacy, which naturally
    lies at the heart of cryptography. Through cryptography, the individual can secure
    privacy and escape the government completely. Apart from this, there is little
    that the cypherpunks all agree on.


    The ideal vision of society for the cypherpunks is one of freedom from government
    interference. In the words of Timothy May, people live in “virtual regions,” where
    individuals can make their own consensual transactions without any central entities,
    be it government or central banks, making rules for people to live by. The feeling
    was that the rules were unfair to the individual because they prioritized government
    and central control. In this decentralized mode, individuals can form small groups
    for particular purposes, but everything is transactional rather than rule-based.
    There should be no rules because rules are the way of government. In fact, there
    should be no ethics, either.


    One of the founders of the cypherpunk movement, Eric Hughes, put the cypherpunk
    spirit in an often-cited slogan “Cypherpunks write code.” Consequently, the only
    truth that needed to exist was the one embedded in the code. There are no moral
    points or ethics beyond that. If the code is faulty or you misused it or you were
    the subject of a hack, that is your problem only. It is your responsibility to
    understand and use the code correctly. Conversely, if someone used the code to
    obtain a result they are not entitled to, in the view of the surrounding society,
    say, access to government information, that is not their problem but those of
    who made the code that allowed them to gain access. The truth is in the code.


    The cypherpunks were thus characterized by highly diverging beliefs but a common
    sentiment that revolves around freedom from government and rules and the right
    to privacy. As a movement, joint actions are ad hoc and uncoordinated.'
