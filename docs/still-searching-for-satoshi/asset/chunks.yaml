- fmt: '### Store of Value


    The last of the major functions of money is as a store of value, which is perhaps
    the most critical and controversial. Ideally, money should function as a store
    of value, so it is possible to defer consumption into the future. Some economists
    argue that money’s function as a store of value is the most important.


    The concept is straightforward. If one earns `$100` and decides to save it for
    a year, the money should also be worth `$100` in a year’s time. This is, unfortunately,
    rarely the case. Frequently the `$100` will be worth a fraction like, say, `$90`.
    That is due to inflation. Inflation undermines money’s function as a store of
    value. This is unfortunate if you had your mind set on a particularly nice pair
    of pants. On the other hand, if you borrowed `$1,000`, you would now only have
    to repay `$900` and have thus earned `$100`.


    The opposite can also happen, where the `$100` would be worth, say, `$110`. This
    is more attractive if you want to save and defer consumption, but not if you have
    debt. If you borrowed `$1,000`, you would now have to pay back `$1,100`.


    As can be seen, money’s function as a store of value has important implications
    for the economy. Very high inflation, that is, when money is particularly bad
    as a store of value, is crippling for an economy. This is also when alternative
    currencies or commodities, like cigarettes or gold, prop up. But another thing
    to make a mental note of, since it will be important later, is that the store
    of value function is tied closely to debt.


    If you have a lot of debt denoted in a currency, you would be rooting for it as
    a bad store of value. On the other hand, if you are a creditor or saver, you would
    want it to be as good a store of value as possible. Historically commodities like
    precious metals have served and still serve as significant stores of value without
    being used as money. This has to do with the problem of their unit of measure
    being weight.


    There is no precise formula for determining what makes something a good store
    of value. We will return to this topic, but for now, we can highlight that the
    most important quality is durability. Any commodity that vanishes quickly will
    logically be a poor store of value. This is probably also why gold and precious
    metals in many cultures have been used as stores of value. Gold doesn’t tarnish
    even after millions of years. Iron corrodes comparatively fast, and so does copper.
    Cowries and other seashells have the same quality; they do not vanish, which may
    also account for their enduring success worldwide.


    ## History of Money and Exchange


    The experience of the modern world where we walk to the grocery store to shop
    for dinner or to the cafe for an oat milk cinnamon latte or pay the rent online
    may take as self-evident the existence of money. It feels almost as integrated
    a part of human existence as clothes and music. That is, however, far from the
    case historically. We already saw the diversity of money, but let us trace how
    humanity ended up in the current situation where money dominates our lives.


    ### Exchange


    First, we need to step back to the basic problem that money solves, and that is
    exchange. The ability to exchange food, goods, and other services with other fellow
    members of the species that are not direct descendants is not uniquely human.
    Ants do this systematically, as do bees. Primates also have some idea of exchange,
    but this ability took center stage when humans diverged evolutionarily from primates.
    As cognitive scientist Michael Tomasello has argued, humans are unique in their
    ability to hunt together and share the spoils. In *A Natural History of Human
    Thinking*, he suggests that *Homo heidelbergensis* was the first human species
    to engage in collaborative hunts two million years ago. The nature of a collaborative
    hunt necessitates exchange. Each participant in the hunt receives a piece of the
    prey in exchange for their participation in the hunt. This is evidenced by the
    prey that *Homo heidelbergensis* killed, such as large game animals. They would
    only have been able to kill it with their tools if they collaborated in a group.


    That the capacity for exchange became a mainstay of human civilization is evidenced
    by one of the grandfathers of modern anthropology Marcel Mauss in his classic
    essay “The Gift: The Form and Reason for Exchange in Archaic Societies” from 1950.
    In this work, he investigated how the exchange of objects builds cohesion in human
    groups. He argued that exchange was not a new concept but extended deep into prehistory,
    which he showed through an impressive array of evidence from societies around
    the globe, contemporary and historical. The most basic form of exchange is the
    gift. This is a common way objects move between individuals and groups in all
    societies.


    Gift exchange can form the basis of a gift economy, as first evidenced by another
    legend in anthropology and a contemporary of Mauss, Bronislaw Malinowski, who
    documented how the gift formed the basis of an economy around the same time on
    the Trobriand Islands. The gift works through reciprocity, the expectation of
    a return. Mauss was the first to argue that the act of giving in itself carried
    the promise of return. A gift is never free in human societies.'
