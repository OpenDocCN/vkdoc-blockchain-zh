    # 什么是虚拟货币？


    *虚拟货币*的定义存在争议。大多数人都同意虚拟货币不需要实体形态，但它能否具有实体形态？如果可以，又是如何实现的？即使在监管机构中，欧盟和美国对其不同方面也尚未达成共识。


    `virtual currency`（虚拟货币）一词在整个二十世纪被用于不同语境。其文献记录可追溯至上世纪初，用于货币理论范畴。它被用来指代某种替代货币的东西。例如，它被用来描述十八、十九世纪的西班牙殖民地如何将票据用作货币。该词也被用于所谓预测市场（在二十世纪末流行起来），在此类市场中，人们可以用虚拟货币对某一事件的结果下注，如果预测成真便能赢钱。这种虚拟货币可以与真实货币存在兑换汇率。


    在世纪之交，欧元最初在未发行纸币和硬币时就被使用，这被描述为一种虚拟货币。该词在二十一世纪初的通俗圈子中也曾使用，当时网络游戏《第二人生》（*Second
    Life*）中的货币——林登币——就被描述为一种虚拟货币。


    因此，可以说`virtual currency`这个词在比特币和其他加密货币出现之前就已存在。然而，直到比特币问世后，监管机构才感到有必要正式定义虚拟货币。


    2012 年 10 月，欧洲中央银行发布了一份关于加密货币计划的报告。其动机是观察到虚拟社区开始流通自己的货币。鉴于欧洲央行是欧洲银行体系提供支付监管的中央机构，他们认为有必要澄清这一现象。欧洲央行将`virtual
    currency`定义为“（……）一种不受监管的数字货币，通常由其开发者发行和控制，并在特定虚拟社区成员中使用和接受。”他们指出，它与电子货币不同，因为它没有具有法定货币地位的实体对应物。


    因此，虚拟货币并非你通过网上银行系统或信用卡支付的资金，尽管后者可能被体验为一种虚拟资金转移。这些是数字化媒介的货币交易。根据欧洲央行的说法，虚拟货币是由私人实体发行的货币。在该报告中，他们区分了三种类型。第一类是封闭式虚拟货币计划，用于网络游戏内部。在此类中，货币在虚拟实体内部生成，不与真实货币进行官方兑换。所谓真实货币，是指在某地具有法定地位的货币。第二类具有单向流动，可以购买虚拟货币，用于购买虚拟商品和服务，有时也可用于购买实体商品和服务。这种类型在网络游戏中也很常见。第三类具有双向流动，其运作方式与任何其他可兑换货币类似，具有买入和卖出汇率。这类货币可用于购买真实或虚拟商品及服务。比特币和其他加密货币属于此类；它们可以在线兑换并用于支付。


    这仅仅是欧盟一个机构对虚拟货币这一新现象的初步评估。2018 年出台了一项更全面的指令，为欧盟在反洗钱和金融犯罪方面设定了虚拟货币的法律参数。该指令是对第
    2015/849 号指令的修订，旨在防止金融系统被用于洗钱和恐怖主义融资。


    在此，`virtual currency`被定义为“（……）一种价值的数字表现形式，不由中央银行或公共当局发行或担保，不一定与法定货币挂钩，不具有货币或金钱的法律地位，但被自然人或法人接受为交换媒介，并且可以以电子方式转移、存储和交易”（第
    54 页）。


    在美国，财政部金融犯罪执法网络（FinCEN）自行承担了发布指导意见的任务，于 2013 年阐明了其对虚拟货币的看法。根据 FinCEN 的定义，虚拟货币是与真实货币对比而言的，因此被视为“一种交换媒介，在某些环境中像货币一样运作，但不具备真实货币的全部属性。特别是，虚拟货币在任何司法管辖区都不具有法定货币地位。”


    FinCEN 主要关注与虚拟货币相关的不同活动，并区分了三种类型的参与者及其义务。这三类分别是`用户`、`管理员`和`兑换商`。用户不被视为货币传输者，但管理员和兑换商则被视为货币传输者。与欧盟类似，美国最初也从预防犯罪的角度来对待虚拟货币。然而很快，其他监管机构如美国国税局（IRS）和美国商品期货交易委员会（CFTC）也相继跟进，它们分别裁定虚拟货币应被视为财产和商品，而非货币。


    这一裁决对比特币的发展轨迹产生了重大影响，此前比特币一直处于监管的灰色地带。对一些人来说，这被视为阻碍了虚拟货币的自由发展。而对另一些人来说，这又是积极的，因为它并未完全将虚拟货币定为非法。普通民众仍被允许使用加密货币。


    总之，各方似乎在虚拟货币具备以下属性上达成了共识：


    1. 价值的数字表现形式

    2. 由私人或非政府实体发行

    3. 用作交换媒介


    此外，可以区分出三种类型的虚拟货币：


    - 第一类（内部型）：数字价值在封闭的虚拟社区内生成和交换。

    - 第二类（单向型）：可以用真实货币购买虚拟货币并进行消费。

    - 第三类（双向型）：虚拟货币可以买卖。


    我们将主要关注第三类虚拟货币，即法定货币可以与虚拟货币双向兑换的类型。

    '
- fmt: '# The Dream of a Virtual Currency


    Even long before the first virtual currencies were implemented, dreams and visions
    described what they could be. Some of those ideas were surprisingly close to the
    end products that took shape around the turn of the new millennium. These ideas
    inspired and helped shape the first attempts at virtual currencies. We will need
    to review these early visions to fully appreciate the later trajectory of virtual
    currencies.


    The Austrian economist Friedrich Hayek was and is a major inspiration for much
    of the cryptocurrency world. A Nobel laureate, he was one of the major figures
    of the Austrian School of Economy. One of his theses was that money should be
    taken out of the grasp of the state and, instead, several private currencies should
    be allowed to compete freely. It is easy to see why this would inspire Bitcoin
    and other virtual currencies. Hayek’s vision of money was one where spontaneous
    order would arise not out of human planning, as the nation-state model of currency
    has it, but out of human action in a free market of currencies. Thus, a collective
    brain would arise out of multiple non-governmental currencies. Only the digital
    representation aspect of virtual currencies is missing from Hayek’s conception
    of virtual currency. The rest is already there to be picked up by later generations.


    The technologies for an actual virtual currency were absent when Hayek was writing
    his major works. However, with the advent of the modern personal computer in the
    1980s and the general availability of the Internet in the 1990s, a digital representation
    of value became possible or at least imaginable. For the first generation of hackers,
    the baby boomers, and the counter-culture-inspired computer programmers, ideas
    of liberty and freedom ranked high. The dream was not just for software and information
    to be free but also for the use of money to be free.


    In the world of science fiction, ideas about the future that still guide us today
    were shaped. One of the most influential early pieces of science fiction was the
    1981 novella *True Names* by Vernor Vinge, a San Diego–based mathematics professor.
    In *True Names*, Vinge presents a vision of a world mediated by computers called
    “Other Plane,” perhaps the first to portray a vision of a parallel virtual world
    that William Gibson would later adopt in his novel *Neuromancer* where the term
    “cyberspace” was used and Neal Stephenson would adopt in *Snow Crash*, where the
    term “metaverse” was coined. In *True Names*, we follow a group of hackers whose
    names are secret even to each other. They venture into the “Other Plane” to break
    into computers to steal information. They must keep their names confidential so
    the government does not catch them. This novel introduced the concept of a virtual
    world where privacy was necessary to hide from the government. But in Vinge’s
    world, there is no virtual currency. Banks and currency continue to exist.


    Vinge’s vision was picked up by Timothy C. May. May was an engineer who had retired
    at 34 from Intel after calculating how much he would need to remain independent
    for the rest of his life. May was a founding member of the cypherpunk movement,
    out of which Bitcoin would grow, and was the author of *The Crypto Anarchist Manifesto*,
    which also came to be a driving inspiration in the quest for a private virtual
    currency.


    In 1993 he wrote a piece of fiction that built on the world created by Vinge in
    which an organization called BlackNet was dealing in a black market of information.
    None of the members of BlackNet knew each other’s true names. One could communicate
    with this group through public online newsgroups (forums). BlackNet would post
    a public key with which to encrypt the message. To write to them, you could use
    this public key together with a private key to create a message that only BlackNet
    could decrypt. The message contained the requested information and payment terms.
    It was possible for BlackNet to make anonymous deposits to your bank account or,
    more interestingly, to credit you in “CryptoCredits,” the internal currency of
    BlackNet. CryptoCredits could be saved and spent on other secret information.
    In this fictitious world that is built on known technologies, we see the contours
    of future cryptocurrencies almost 20 years before any such was created.


    # Anonymous Digital Cash Awakens


    The story of David Chaum and his company DigiCash and the rise of its product
    eCash is one of a pioneer, years if not decades ahead of his time. But it was
    also one that influenced Bitcoin and all subsequent virtual currencies due to
    its successful implementation and relative early success. For many, this became
    a beacon for what a virtual currency had to be as a minimum.


    Already in the 1980s, David Chaum was working on the idea of digital cash. In
    his 1982 paper “Blind signatures for untraceable payments,” he took issue with
    the lack of privacy inherent in electronic payments. Through payment information,
    quite a deal of private information could be gathered about the payee. This was
    a theme that would recur in subsequent discussions about virtual currencies. The
    proposition was to eliminate this with the use of cryptography. The paper is merely
    an outline of the idea rather than an actual system. Through the use of so-called
    blind signatures achieved with cryptographic techniques, it would be possible
    to provide a payment system that would make payments untraceable but auditable
    to verify that the transaction had indeed taken place. This system does not speak
    of a new and separate currency but instead provides a way for the existing banking
    and payment systems to work in a confidential manner.


    In 1990 Chaum founded a company based on this idea called DigiCash. DigiCash created
    the first functional private digital payment system. The system allowed people
    to move money from their bank account to DigiCash’s eCash. With this eCash, you
    could pay merchants accepting it as you would with a credit card. The difference
    was that the payment would only verify that you had the funds and the merchants
    could redeem it at the issuing bank. All of this without anyone knowing the identity
    of the person who made the transaction. The process was as follows: When you want
    to pay, you withdraw money from your bank like an ATM. The bank generates a note
    for the amount with a serial number. Using cryptography, it is possible to create
    a serial number that does not lead back to the user but certifies that it is a
    real note backed by real money. In this system, the identity of the merchant was
    not anonymous. In this way, DigiCash created a system that secured the user’s
    privacy without aiding criminals in staying hidden. Incidentally, this may be
    why DigiCash’s eCash is the only implemented example of a virtual currency that
    did not have issues with criminal abuse and money laundering allegations.


    DigiCash was relatively successful, and its software existed for all standard
    operating systems; deals were being negotiated with Visa, ING, and Deutsche Bank.
    Microsoft even offered to buy it to integrate it into the Windows operating system,
    but within a decade DigiCash was bankrupt. This was probably more due to the failures
    on the management side than any technological, regulatory, or market causes. Still,
    the legacy can’t be underestimated as it provided a reference point and proof
    that a private digital cash was feasible, inspiring subsequent attempts at digital
    currencies. The focus was squarely on the consumer’s privacy, not evading the
    government or creating a new currency of speculative relevance. Other projects
    supplied these objectives.'
