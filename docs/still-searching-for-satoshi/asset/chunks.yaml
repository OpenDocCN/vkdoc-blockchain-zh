  trans: '

    # 千年主义


    在 1877 年出版的《三个世界与现世的收割》一书中，纳尔逊·H·巴伯和查尔斯·泰兹·拉塞尔声称确定了耶稣第二次降临地球、将其恢复为乐园状态的时刻。他们相信这一过程将在
    1878 年完成。当这一预言未能实现时，他们设定了新的日期。当新日期同样落空后，又继续设定更新的日期。这自然是耶和华见证人的故事——一个反对三位一体、不朽灵魂等某些关键基督教教义的基督教运动。这也是被称为千年主义的最成功的宗教或社会运动类型之一。


    千年主义坚信一个性质截然不同、更加美好的全新世界秩序即将来临。基督教文化中这些团体的动力可追溯至《启示录》20 章 1 至 10 节，其中预言了魔鬼被捆绑一千年的情节。因此，"千年主义"这一名称源自拉丁语中表示"千"的词汇"mille"。千年主义运动常将现有社会视为不公，并相信世界即将发生变革，从而摆脱当前腐败的体制，建立更新更美好的秩序。


    这种信念以两种方式影响了比特币的历史：一种较为寻常，另一种则更为普遍且微妙。在这两种情形中，比特币都不是最终目标，而是变革的驱动者。正如我们在与货物崇拜的相似性中所见，并非比特币本身能带来财富，而是比特币成为了更根本的社会乃至宇宙变革中的关键要素。


    ## 比特币标准的世界


    在自由意志主义者中，国际货币政策中黄金标准的美好旧日梦想是他们的指路明灯。比特币社区接纳了这种情怀，并加以变通：比特币应成为新的标准。这个新世界将见证法定货币被抛弃，中央银行和政府将不再鲁莽印钞，从而不再有效窃取普通民众的财富。请看看
    Quora 上一位用户对此情怀的回应：


    > *也许当前的货币体系对某些人有益，但问题是人们辛勤劳作多年的财富去了哪里？为何财富集中在少数人手中？这些私人拥有的中央银行随意印钞并决定价值，难道不是欺诈吗？它们造成的苦难——从制裁安分守己的国家或企业，到煽动战争——又该如何看待？是谁一开始赋予它们扮演上帝的权力？(...)
    无论如何，看着事态如何发展会很有趣，但我坚定地相信银行必须消失。它们是世界上有史以来最大的恐怖主义机构。当前的法定货币体系对全世界人民毫无益处。知道 76
    亿人被这些银行卡特尔挟持听起来是什么感受吗？*

    >

    > ——用户 Emmanuel Bikorimana


    有了比特币，政府和银行的这种压迫性力量将完全消失，人们生活在虚拟社区中，可以自主选择同伴，形成基于兴趣的小型社群。个人将完全自由选择，因为比特币标准将确保完全的可预测性，无人能够干预。


    在比特币标准的新世界里，个人可以获得自由。相信这个世界的信徒常自称"比特币 maximalists"，并将自己视为数字游牧部落。随着新世界秩序的来临，他们可以生活在任何地方，工作与社交互动将在线上进行。我们所知的民族国家将不复存在，或权力受到严重限制。就千年主义式的变革而言，这不过是相当平淡无奇的世界改变。


    ## 奇点


    千年主义思想影响比特币的另一种方式则更为微妙，但也更为普遍。可以说，如果没有这股思潮，比特币就不会存在。这股思潮在其世界观上更为激进，甚至带有宇宙维度。要理解它，我们必须从另一处说起。


    硅谷最伟大的预言家之一是雷·库兹韦尔。凭借其技术领导地位和数十年的写作，他激励并启发了全球的技术专家。在其开创性著作《精神机器时代》中，他将计算机时代的技术进步与本体论变革的前景联系起来。基于技术发展似乎遵循指数而非线性增长的洞见，人类将在某个时刻触及奇点——在数学中，这是函数未定义的点。越过这一点，世界将发生转变。


    人类将成为后人类。通过神经植入物，可以将思维上传到完全由超级计算机和互联网构成的虚拟世界。甚至有可能在这个新世界中复活死者，让他们重获新生。这种信念被称为超人类主义，即相信人类将能够克服自身局限，超越人类现状，成为超人。虽然超人类主义是一个相当新的现象，很大程度上由现代世界的技术进步驱动，但梅根·奥吉布林揭示了这场运动深厚的历史与宗教根源。在其著作《上帝、人类、动物、机器》中，她探究了超人类主义的根源。


    与超人类主义者自身认为超人类主义是新兴事物、可追溯至 1957 年首次提及该词的朱利安·赫胥黎不同，彼得·哈里森和约瑟夫·沃里尼亚克指出，该词的现代用法首次见于赫胥黎
    1952 年的讲座"知识、道德与命运"，但其历史渊源更为深远。在但丁的《神曲》第九卷中，他创造了一个新的意大利语词汇"transhumanar"，用以描述人类进入天堂时所发生的转变。这个词汇在亨利·弗朗西斯·卡里
    1814 年版《神曲》中被译为"transhuman"。


    奥吉布林揭示了赫胥黎的思想如何受到其友人、法国耶稣会神父皮埃尔·泰亚尔·德·夏尔丹的影响。在 1947 年的一篇文章中，夏尔丹注意到电视和广播等大众传播工具的发明创造了一个人类思维的全球网络，他称之为"心智圈"。进步最终将导致戏剧性的转变：人类机器的网络将让位于一种覆盖全球的"''以太化的''普遍意识"。这将引发智能爆炸，他称之为"欧米茄点"，使人类能够"突破时间与空间的物质框架"。这一愿景与库兹韦尔的奇点概念之间的相似性显而易见。


    要理解这一愿景究竟如何与比特币相关联，我们需要考虑另一小群技术狂热者，他们同样对虚拟货币的整体发展、尤其是对比特币产生了巨大影响——即外现主义者。

    '
- fmt: '# The Extropians and the Origins of Bitcoin


    The extropians were a loosely organized community participating in email lists,
    conferences, a magazine, and a foundation that never exceeded a few thousand.
    The name comes from the word *extropy*, which was first used as an antonym to
    *entropy* in a 1967 cryogenics paper. The term was later used to signify the transhuman
    potential. The Extropy Institute launched its email list in 1991 and began to
    promote conferences about transhumanism. The concept grew out of cryogenics, the
    purpose of which was to be able to be resuscitated at a later point in life when
    the world had been transformed. These cryogenically conserved people would be
    the dead that would be awoken at the time of the singularity. The extropians share
    the same transhuman convictions as Kurzweil, Nick Bostrom, and other prominent
    transhumanists.


    This posed a problem. Since extropians knew they would not live long enough to
    experience the inflection point where humans and machines merged, they had to
    be cryogenically preserved until that day. But when you can’t trust banks, and
    inflation is slowly eating away your funds over time, it becomes a problem how
    one could have funds left at this time. The alternative had to be an electronic
    virtual currency that existed outside the established banking industry. As Finn
    Brunton puts it in his *Digital Cash*: “The ‘long, long term’ time frame of investment
    and financial speculation is no longer a matter of planning your retirement and
    senescence but of arranging assets to transcend your life and ultimately money
    entirely.”


    Nick Szabo made predictions about the coming of such money at extropian events.
    In 1995 he predicted that by 1999 a million people would be using virtual currencies
    and the economy would reach a billion dollars by 2005. As we have seen earlier,
    Szabo had presented many of the ideas that would come together in Bitcoin, even
    if they arrived about ten years later than he had predicted. He thereby fertilized
    the ground for what would become Bitcoin along with other extropians on the cryptography
    mailing list.


    Another extropian who would become even more instrumental in Bitcoin’s creation
    was Hal Finney. He and his wife had been extropians from the beginning. He had
    also tried his own version of a virtual currency called reusable proof of work
    or RPOW. Without his interest in Bitcoin and assistance in the very beginning,
    Bitcoin might very well have slipped into oblivion. Hal Finney’s singular importance
    is easily overlooked, perhaps due to the fact that he died much too early from
    ALS in 2014. In his book *Digital Cash: The Unknown Story of the Anarchists, Utopians,
    and Technologists Who Created Cryptocurrency*, Finn Brunton traces the origins
    of Bitcoin and identifies Finney as the real main character behind the advent
    of cryptocurrencies. He writes, “Hal Finney, who quietly became the main character
    of this book, died in 2014. His body was perfused, cooled below freezing, and
    placed in long-term storage in the Alcor cryonics facility” (p. 205). Fittingly
    this was partially funded by his bitcoin reserves. Finney thus embodies the creation
    of cryptocurrencies in body and mind.


    ## The Coming of the Thousand-Year Reign


    We can thus see the powerful impact millenarian ideas have had on the development
    of Bitcoin and cryptocurrencies. Humans have all days believed in an imminent
    radical transformation of the world even if the mode and result differ across
    cultures. Such beliefs bring about extraordinary motivation and the power of change.


    Bitcoin was never just a convenient new way of making payments, like many other
    virtual currencies of its time. Instead, it was fueled by the belief in a fundamental,
    even radical, change of the world that would be imminent. This was an essential
    driver for the creation and adoption of this new virtual currency. Bitcoin was
    not necessarily seen as a magical technology that would bring about this new world
    but as a crucial component for it.


    It may be that these deep millenarist convictions of Bitcoin proponents separated
    it from other virtual currencies like e-gold. In contrast to other virtual currencies
    at the time, Bitcoin was more than just a utility to its proponents; it was a
    necessity that would be crucial in transforming the world.


    ## Bitcoin and Religion


    Bitcoin is more than just another technical innovation to many people in the Bitcoin
    community. It clearly generates responses and fervor that far outpace even the
    most ardent Apple fanatic at the Apple Keynote event. These people feel deeply
    that this is the solution to the future and will bring them and other believers
    great wealth. The inventor is treated with a reverence worthy of a prophet, and
    his texts are still read and continue to inspire to this day.


    There is no explicit reference to gods, spirits, or otherworldly creatures, but
    the appearance is structurally similar to other well-known religious phenomena.
    This could be an important clue as to why Bitcoin still, to this day, attracts
    so much attention and so many resources are invested into it. Past or present,
    none of the other virtual currencies exhibit similar features. The second greatest
    cryptocurrency, Ethereum, also commands a dedicated and energized following, but
    it does not have a single prophet-like figure or focal texts. It certainly does
    not elicit the same emotional statements when criticized.


    Part of Bitcoin’s success could be derived from the religious motivations it elicits
    in the Bitcoin community. As history has shown, such motivations can be important
    drivers of change.


    # 11. Future


    Bitcoin was born from visions of the future and is today primarily driven by expectations
    of what it could be in the future:


    * Bitcoin will hit $1,000,000.

    * Bitcoin will replace gold as a safe harbor in investments.

    * We will see a new Bitcoin standard emerge in place of fiat currencies.


    These are common beliefs in the Bitcoin community. On the other hand, we have
    skeptics that are just as convinced that Bitcoin is nothing but a Ponzi scheme
    that, like all other Ponzi schemes, will fall at some point. The problem is that
    these views are rarely supported by any analysis beyond what-if thought experiments
    and subjective opinion. Either of these scenarios or some completely different
    ones may come true, but we should be able to do better.


    In this chapter, we will use the insights we gained about Bitcoin in this book
    to understand how the future of Bitcoin might look. Like any statement about the
    future, it is based on assumptions. We will look at several possible scenarios
    that vary these assumptions and ascertain how they could develop and how Bitcoin
    would fit in. These scenarios are not exhaustive but are meant to suggest possible
    future trajectories based on current trends. They operate on different timescales
    with different assumptions of technological and historical development.


    The first two scenarios, “normalization” and “fringe consolidation,” work from
    an assumption that we will continue within the limits of the known contemporary
    world. Governments persist, and people continue to live in nation-states with
    banks and the institutions we know today. The following two scenarios involve
    substantial societal changes and have a longer timeframe. The scenario “disappearance
    of the nation-state” assumes that the current dominance of nation-states ends.
    The “singularity” further assumes a radical change in technology. We follow the
    trajectory predicted by Ray Kurzweil. The final two scenarios involve a radical
    change of our society. The “post-apocalypse” scenario assumes a cataclysmic event''s
    occurrence, while the last scenario, “interplanetary,” considers what happens
    when humans colonize the solar system.'
