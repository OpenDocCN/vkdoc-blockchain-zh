- fmt: '### The Many Facets of Money


    These examples give us just a small taste of the versatility and plurality of
    money. We can see that even a small society like the Rossel islanders can employ
    many types of money, serving different economic spheres. They can also be used
    as loan collaterals, and exchange rates exist between different currencies. The
    example of cigarettes emerging as alternative money shows us that different types
    of money can emerge and disappear depending on the circumstances of a society.
    In contrast, the existence of loyalty scheme points shows that alternative money
    can happily exist alongside common currency in normal times too.


    ### What Is Money?


    The preceding examples show that it is not clear where the line between money
    and not money is. There are many definitions of money. In his monumental work,
    *A History of Money*, Glyn Davies defines money as “(…) that which is universally
    recognized by the consumer and user as holding value as a commodity that can be
    exchanged for goods within the economy, and it does not have to have any characteristic,
    state-mandated or other, in order to function” (Davies, p. xxix). This is a good
    starting point to clarify what we mean by money. Others have defined it differently,
    but for this investigation, I think this definition points to some key points
    about money:


    - It is a commodity.

    - It is universally seen as holding value.

    - It can be exchanged for goods and services.


    Being a commodity means that one instance of a unit of money is the same as another.
    This is unlike artwork, for example, where a more detailed assessment of each
    piece has to be done to assess its value. Money also needs people to agree that
    it has value. It is not enough that one individual believes it has value. On the
    other hand, all it takes for money is for people to believe it has value. There
    is no inherent quality in anything that can be used to define it as money. The
    last part relates to how money can be used. It is not enough that something is
    universally considered valuable, like time or fair weather; it needs to be used
    for exchange.


    #### Functions of Money


    In *Money and the Mechanism of Exchange* from 1875, the English economist William
    Stanley Jevons distinguished four functions of money: a medium of exchange, a
    common measure of value, a standard of value (or standard of deferred payment),
    and a store of value.


    Building on his insights, it is common in modern economics to distinguish three
    key functions of money: a medium of exchange, a unit of account, and a store of
    value subsuming the standard of value function in the others. Money must fulfill
    at least these three functions to work as money. Glyn Davies mentions ten different
    functions, so this is not an exact science. For the sake of simplicity, let us
    look at the consensus of most modern treatments of money and look into the three
    key functions of money.


    #### Medium of Exchange


    A medium of exchange is any object generally accepted for exchanging goods and
    services. We saw previously how commodities like seashells, cigarettes, and points
    can become a medium of exchange. This medium should be possible to use across
    several different goods and services to fulfill this function but not necessarily
    all. Consider the example of casino chips or tokens at an arcade or laundromat.
    They are used as a medium of exchange, but the range of the economic sphere they
    apply is too limited to say they fulfill the function of money. Loyalty points
    apply to the whole range of goods a retailer offers but only to that particular
    retailer. A medium of exchange can thus be limited to a particular sphere, as
    we also saw with Western money on Rossel Island being restricted as a medium of
    exchange only for imported goods.


    Throughout history, different objects have been used as mediums of exchange. In
    particular, commodities have been used for this. Across the globe, cattle have
    served and still serve as a powerful medium of exchange. This has also been the
    case historically in Europe and the Western world, as evidenced in the English
    vocabulary. The term *pecuniary*, meaning “relating to or consisting of money,”
    derives from the Latin *pecuniarius*, which comes from the Latin *pecus* (cattle).
    Cattle have historically been used as a medium of exchange, particularly for larger
    things like bridewealth. Although big, it is a somewhat convenient medium of exchange
    since it can move by itself and inconvenient since it is not easily divisible.


    Luckily other commodities can serve this function better for smaller goods and
    services. Salt is another example of a universal and convenient medium of exchange
    that has also made it into our language. The English word *salary* similarly derives
    from the Latin word *salarium*, which comes from the word *sal*, meaning “salt.”
    In Roman times salt was a scarce and valuable commodity. In contrast to cattle,
    it was easy to subdivide and hence better suited as a medium of exchange for goods
    and services of lower value.


    #### Unit of Account


    A unit of account is a standard numerical measurement of the value of goods or
    services. We saw how cigarettes became a unit of account for the payment of eggs
    or stockings. Similarly, the ndap shells on Rossel Island specify how much is
    to be paid for a bride. It can thus be used to compare the relative value of two
    different goods or goods and services. A unit of account is also necessary for
    deferred payments, as we saw in the example of points that were deferred discounts.
    It does not mean that payments are made in this unit. It can be made in other
    units or goods that make up a specific quantity.


    Such could happen if, for example, you go to a flea market and find a nice oak
    table. After haggling appropriately, you agree with the seller that it is worth
    100 dollars. Unfortunately, you do not have that in cash. But you just bought
    a vintage lamp at another stand that the seller is interested in. You agree that
    it is worth 40 dollars. You also have 50 Canadian dollars from your trip to Vancouver
    last week. The value converted to dollars is about 35. Luckily your wife has the
    remaining 25 dollars in cash that she lets you borrow until you get home.


    Notice that you provided no money in the unit of account for this exchange. The
    unit of account is American dollars, but the lamp is a good, the Canadian dollars
    are another currency, and the remaining portion was provided through debt. Neither
    of these would be sufficient individually to purchase the oak table, but because
    of a common unit of account, it was possible to facilitate an exchange anyway.


    Basically, anything could be used as a unit of account as long as it is measurable.
    We can imagine length, heat, voltage, or pressure being used as a unit of account,
    but this is difficult to measure in practice. Historically two types of measurement
    have dominated: count and weight. Of these, the count is more versatile. This
    was used for cowry shells, beaver skins, and the like. This works well when the
    unit is fungible or very similar in quality. This does not work well for diamonds,
    for example. Although they are universally viewed as valuable, they must be individually
    assessed.


    Weight has been even more dominating, at least in Western Europe. The British
    pound derives from the value of a pound of sterling silver. Only later was this
    converted into coins representing a (now abstract) pound. The Latin “libra,” which
    is the source of the French livre, is similarly a unit of weight. The challenge
    with weight and why it did not last as the preferred unit of account is that one
    needs scales to measure it. This is more prone to fraud since the scales can be
    tampered with. Also, the substance can be tampered with. If a precious metal like
    silver is used for payment, it can be mixed with a non-precious metal like tin.'
