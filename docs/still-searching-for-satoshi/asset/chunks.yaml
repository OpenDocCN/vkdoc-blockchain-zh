    The Bitcoin code is a primary source and shows the coding style of Satoshi. As
    such it is a crucial piece of evidence since anyone considered a possible match
    for Satoshi must have the skills to write the original Bitcoin code.


    The blockchain in itself can also be used as a source. As we will see, much has
    been made of the first block in which a quote was embedded. This is an example
    of evidence that is impossible to fake, which may tell us something about the
    person behind Satoshi.


    There are other technical sources, such as the bitcoin.org web page. Here we can
    see through the Internet archive what was displayed at different times. Satoshi’s
    known email addresses may also hold clues.


    ### Interviews


    A large body of evidence also exists in later interviews made with key actors
    in the formative period of Bitcoin. These are all secondary sources and can be
    used primarily as corroborating evidence. They are further removed in time and
    will depend on memory and later historical developments. They have virtually no
    value in themselves and only when they relate something that cannot be learned
    from primary sources.


    ### The Sources and Satoshi


    These few practical principles for approaching the sources will provide us with
    a guide to analyzing the problem at hand. We saw that the sources can be grouped
    into four groups.


    *   The key source: The Bitcoin whitepaper


    *   Correspondence between Satoshi and collaborators on public forums


    *   Technical forensic evidence


    *   Later interviews with people close to Satoshi and the beginning of Bitcoin


    With a firmer grasp on the nature of the sources, we are in a better position
    to start searching for Satoshi. We will give precedence to the primary sources
    written by Satoshi himself and especially to facts that are impossible or hard
    to fake, such as technical forensic evidence. Other secondary sources can be used
    as corroborating evidence and help fill in the blanks. In the following, we will
    construct a profile of what we can know about the historical person behind Satoshi.


    ## Building a Profile of Satoshi


    Based on our knowledge of the sources, we can now start to investigate what we
    know about the historical Satoshi. In the following, we will build a profile based
    on what we can learn about him from the sources. But before we do that, it would
    be worthwhile to reflect on the very source of the mystery of Satoshi, that is,
    why does he use a pseudonym? To understand that, we must go back to when Satoshi
    published his ideas. That was at a time when a few high-profile cases involving
    virtual currencies had seen the founders get into serious legal problems. In 2007,
    the FBI raided Bernard von NotHaus’s Liberty dollar on suspicion of money laundering,
    mail fraud, wire fraud, and counterfeiting. Charges had not yet been filed, but
    in another virtual currency crackdown, the e-gold founders had entered a plea
    agreement and pleaded guilty to the operation of an unlicensed money-transmitting
    business and conspiracy to engage in money laundering activity. There was no reason
    to assume that the US authorities would think any differently about a project
    like Bitcoin.


    ## Assumptions


    Today creators of virtual currencies are not prosecuted, and more transparent
    regulation exists that makes it less likely that the creator of Bitcoin would
    end up in legal trouble. So why does he not step forward? The immense success
    of Bitcoin only adds to the original concern. The historical person behind the
    Satoshi pseudonym sits on more than a million bitcoins, which amount to billions
    of dollars. Coming forward would best-case make it challenging to live a quiet
    private life and worst-case bring about severe threats to himself and his family.


    There is, therefore, every reason to expect that, whoever the person behind Satoshi
    is, he will not be likely to admit it. On the other hand, the reverse does not
    follow, as some people assume that the denial of being Satoshi is evidence that
    the person is Satoshi. In the following, a couple of assumptions are made that
    will guide the analysis. I believe any identification of the historical person
    behind Satoshi must fulfill these assumptions.


    ### The Assumption of Unity


    The first is the assumption of unity, which is that all writings attributed to
    Satoshi are authored by the same author. That means we assume that the code was
    written by the same person who wrote the whitepaper, the Bitcoin website, the
    emails on the cryptography mailing list, and the various forum posts signed by
    Satoshi Nakamoto.


    ### The Assumption of Singularity


    The second assumption is the assumption of singularity; contrary to some earlier
    attempts, I don’t see any reason to assume that this is not just one person. As
    we saw earlier, the theory that multiple people are behind Satoshi has been used
    to compensate for the inability to fit all facts into one individual. But as an
    explanatory approach, this is not advisable. We want to arrive at the simplest
    possible explanation. Allowing for multiple people to make up Satoshi, first of
    all, raises the question of why a group of people would take the unprecedented
    step to write as one person rather than multiple individual pseudonyms and opens
    for pure fantasy where any person can be picked to fit any fact. While it could
    be true, it is not a principled analytic way to proceed.'
  trans: '

    ### 信函往来


    中本聪在多个公共论坛上进行了大量通信。据估计，其通信总量超过八万词。这是一个相当可观的语料库。这些论坛帖子也是可用作遗迹的第一手资料。例如，我们将会发现，发帖时间对于确认中本聪的身份至关重要。这些通信也是重要的资料来源，因为其中最简单的一个假设是：中本聪不会在公开场合与自己对话。此外，论坛帖子也可以让我们了解其创造背后的历史与动机。


    另一组与中本聪通信相关的资料来源是电子邮件。这些邮件是在比特币的重要性已得到证实时才向公众公布的。其中也包含一些对中本聪在邮件中所言内容的评论。从技术角度来看，这些邮件的可靠性较低，因为电子邮件数据极易被篡改。而且，与论坛帖子相比，它们离事件发生的时间更远，因此不能被视为同等价值的资料。


    ### 技术取证证据


    比特币代码是第一手资料，展示了中本聪的编码风格。因此，它是一项关键证据，因为任何被认为是中本聪可能人选的人，都必须具备编写原始比特币代码的技能。


    区块链本身也可以作为一种资料来源。我们将看到，关于嵌入了一段引文的创世区块，已有大量讨论。这是一个无法伪造的证据范例，它或许能告诉我们一些关于中本聪背后那个人的信息。


    还有其他技术来源，例如 `bitcoin.org` 网页。通过互联网档案馆，我们可以看到该网页在不同时期所显示的内容。中本聪已知的电子邮件地址也可能提供线索。


    ### 采访


    另一大类证据来自后来对比特币形成期关键人物的采访。这些都是二手资料，主要可作为佐证使用。它们在时间上距离更远，且依赖于记忆和后来的历史发展。这些资料本身几乎没有价值，只有当它们提及一些无法从第一手资料中得知的信息时才有意义。


    ### 资料来源与中本聪


    这几点处理资料来源的实用原则，将为我们分析当前问题提供指导。我们看到资料来源可分为四组：


    -   关键资料来源：比特币白皮书

    -   中本聪与协作者在公共论坛上的通信

    -   技术取证证据

    -   后来对与中本聪关系密切的早期比特币参与者的采访


    在更牢固地掌握了这些资料来源的性质之后，我们就能更好地开始寻找中本聪。我们将优先考虑中本聪本人撰写的第一手资料，特别是那些无法或难以伪造的事实，例如技术取证证据。其他二手资料可作为佐证，并帮助填补空白。接下来，我们将构建一个关于中本聪背后那个历史人物我们所知信息的画像。


    ## 构建中本聪的画像


    基于我们对资料来源的了解，我们现在可以开始探究关于历史上中本聪的已知信息。接下来，我们将根据从这些资料来源中能了解到的信息来构建一幅画像。但在那之前，有必要反思一下中本聪之谜的根源，即：他为什么要使用化名？要理解这一点，我们必须回到中本聪发表其理念的时候。那是一个涉及虚拟货币的几个引人注目的案件导致创始人陷入严重法律问题的时期。2007
    年，美国联邦调查局以涉嫌洗钱、邮件欺诈、电信欺诈和伪造货币为由，突击搜查了伯纳德·冯·诺特豪斯的自由美元。当时尚未正式提起诉讼，但在另一次对虚拟货币的打击行动中，e-gold
    的创始人已经达成认罪协议，承认无证经营资金传输业务并共谋从事洗钱活动。没有理由认为美国当局会对像比特币这样的项目持有不同看法。


    ## 假设


    如今，虚拟货币的创造者不会受到起诉，并且存在更透明的监管规定，这使得比特币的创造者面临法律纠纷的可能性大大降低。那么，他为什么还不站出来？比特币的巨大成功只会加剧最初的担忧。中本聪这个化名背后的历史人物坐拥超过一百万个比特币，价值高达数十亿美元。站出来，最好的结果是使他难以过上平静的私生活，最坏的结果则是给他自己和家人带来严重的人身威胁。


    因此，我们完全有理由预期，无论中本聪背后的人是谁，他都不太可能承认这一点。另一方面，反过来推断并不成立——有些人认为，否认自己是中本聪就是证明此人是中本聪的证据。接下来，我将提出几个假设来指导分析。我认为，任何对中本聪背后历史人物的指认都必须符合这些假设。


    ### 统一性假设


    第一个是统一性假设，即所有署名中本聪的文字都出自同一作者之手。这意味着我们认为，编写代码的人与撰写白皮书、比特币网站、密码学邮件列表中的电子邮件以及以中本聪名义发表的各类论坛帖子的人是同一个人。


    ### 单一性假设


    第二个是单一性假设；与之前的一些尝试相反，我认为没有理由认为这不是一个人。正如我们之前所见，“中本聪背后有多人”的理论曾被用来弥补无法将所有事实都归因于一个人的缺陷。但作为一种解释方法，这是不可取的。我们希望得出最简单的解释。允许多人组合而成中本聪，首先就引发了一个问题：一群人有现成的多个独立化名可用，为何要采取史无前例的步骤以一个人名写作？这为纯粹的幻想敞开了大门，任何一个人都可以被挑选出来对应任何事实。虽然这有可能是真的，但这并非一种有原则的分析方法。

    '
- fmt: '### The Assumption of Normalcy


    The third assumption is the assumption of normalcy. It has more to do with what
    kind of conversation we can have about Satoshi. Different varieties of conspiracy
    theories could be proposed where individual pieces of evidence are assumed to
    be deceitfully planted by Satoshi or other nefarious actors behind the scenes.
    Such scenarios cannot be ruled out since they are within the realm of the theoretically
    possible; the NSA and FBI could have assigned a division to create Bitcoin to
    track criminal transactions, or a clandestine circle of pedophiles could have
    orchestrated the creation of Bitcoin to be able to ease the trafficking of minors
    without government scrutiny. These theories could be true, like the existence
    of gnomes and the earth being flat, but they are outside the realm of serious
    discussion and rely only on *a priori* faith and systematically disregard facts
    and arguments.


    In contrast to that approach, I will revert to an assumption of normalcy in human
    behavior. When Bitcoin was created, the person could not have foreseen that it
    would become this big, especially given the track record of earlier virtual currencies.
    So elaborate schemes with mailing oneself from a pseudonymous account and commenting
    on one’s postings made under the pseudonym to create a cover or having every post
    translated or copyedited by a British English speaker seem excessive and outside
    normal human behavior. The historical Satoshi is assumed to have engaged with
    the Bitcoin community, at least initially, only under the pseudonym Satoshi Nakamoto
    and written in the language that was natural for him. He expressed only views
    that he held himself.


    I don’t intend to engage in speculation based on circumstantial evidence. I will
    rely only on the simplest possible explanation, which is that Satoshi is just
    one person writing in his native tongue to different people about his ecash project,
    which he programmed himself. That project came to be known as Bitcoin.


    ## Profiling Nakamoto


    Let’s see what we can say based on the evidence at hand. Although we have a vast
    corpus of texts, it is almost entirely focused on technical details. Virtually
    no personal clues are given, and very little else is explicitly stated that can
    be used to create a detailed picture of the person behind Satoshi Nakamoto.


    ### Gender


    There is no definite indication of gender, but the field of modern cryptography
    and virtual currencies is almost exclusively a male field. I have at least not
    been able to identify more than a few women in this field. One exception is Cynthia
    Dwork. Historically it is a different case since a significant number of women
    worked in cryptology around World War II.


    Males similarly dominate the cryptography mailing list. Around the time when Satoshi
    worked, I could only find Lynn Wheeler and Sandy Harris as examples of women active
    on the list. These are, of course, not necessarily their correct names. All identities
    that I could verify are male.


    ### Age


    On the P2P Foundation forum, Satoshi lists his birth date as April 5, 1975. There
    is no reason to believe that date given that Satoshi was obsessed with anonymity.
    Like the name, some effort has been made to extract symbolism from this date.
    April 5, 1933, was the day American president Franklin D. Roosevelt signed executive
    order 6102 forbidding ownership of gold coins, bullions, and certificates. This
    was a significant event for many libertarians interested in virtual currency.
    The year 1975 was the year when it again became legal to own gold in the United
    States. Satoshi is not particularly preoccupied with gold, however. He mentions
    gold only twice in the sources we have. The first time is in the Bitcoin whitepaper,
    where he uses gold mining to explain the concept of Bitcoin mining. The other
    place is in reference to e-gold, the company that was closed by the FBI.


    Still, it is not an unlikely explanation for the choice of the particular date
    April 5, 1975, but there are other indications that this date is probably pretty
    close. He might be slightly older but not much younger.


    Close collaborators of Satoshi, like Gavin Andresen, who took over Bitcoin development
    after Satoshi, also indicate that he was probably around that age. The choice
    of C++ could be an indication. C++ first appeared in 1985 and was a natural choice
    for someone studying at the start of the 1990s. At that time, it was the most
    popular object-oriented language. Hal Finney notes the following about Satoshi’s
    use of C++ in an interview with Andy Greenberg from 2014: “Satoshi was a master
    of the intricacies, and I’ve only seen this in young programmers. It seems hard
    to master C++ if you didn’t learn it while you’re young.”


    Java was created in 1995 and would have been a natural choice if Satoshi had been
    educated at the end of the 1990s. If Satoshi had been older and educated in the
    1970s or 1980s, the language of choice might have been C, Fortran, or Pascal.
    The choice of C++ is consistent with education starting around 1990, which would
    put the birth date between 1970 and 1975. Anyone can learn C++, but the simplest
    explanation is that this language was the one Satoshi was most comfortable with
    when he started on the Bitcoin project and that would be the language he learned
    during his formative years.'
