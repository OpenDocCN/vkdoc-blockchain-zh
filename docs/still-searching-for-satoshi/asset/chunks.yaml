- fmt: '智利生物学家温贝托·马图拉纳（Humberto Maturana）多年教授生物学，却在一个最简单的问题上——即生命是什么——感到难以作答。他无法在以往的生物学研究中找到令人信服的答案，这促使他花费数年时间思考生命系统的本质。为了回答这个问题，他不得不创造一个新术语：*自创生*（`autopoiesis`）：“一个自创生机器是一个被组织（定义为一个统一体）的机器，它作为一个由组件生产（转化与销毁）过程所构成的网络；这些过程（i）通过其相互作用与转化，持续地再生并实现产生它们自身的过程（关系）网络；并且（ii）通过指定该网络作为这样一个拓扑域的实现，将该机器构成为一个在空间中存在的具体统一体，组件在其中存在。”


    就像整本书《自创生与认知：生命的实现》一样，这段引文非常简洁且难以理解。核心观点在于：一个生命系统是自创生的，而一个自创生系统能够持续地再生自身的构成。我们人类能够通过自行寻找所需食物和营养，持续地再生我们的身体。植物和动物也是如此。这与一个异构生系统（如工厂）形成对比，工厂也使用原材料，但生产的是自身之外的东西。因此，自创生可以被描述为持续创造系统持续存在所需条件的能力。根据马图拉纳的说法，这就是生命的本质。


    一个生命系统的特征在于，能够通过与环境的代谢，在较长时间内维持自身的构成。所有已知的例子都是生物性的，但我们在此回顾的原理并不要求生物化学化合物。可能存在一个满足生命标准、却不基于已知生化过程的生命系统。一个超个体或许也满足所有相同标准，但如果我们发现了这样一个超个体，我们该如何判断它是否具有生命？


    我们可以用类似于定义和描述生物生命的方式来定义和描述它。即使我们并非在寻找我们已知的地球生命的确切生物学机制，我们也应寻找我们在生物生命中所发现的相同特征。


    ## 生命的特征与比特币


    在生物学中，对于生命的特征并没有一致认同的定义，但通常要求具备一个有组织的结构，能够繁殖、代谢、对刺激做出反应、生长并适应。


    ### 结构


    所有生命系统都有一个由边界定义的结构，该边界区分了内部与外部。例如，细胞有细胞膜，而动物有皮肤。对于比特币而言，我们有一种不同类型的结构。比特币代码的每个实例都在一个与其他程序共享的CPU上运行。从这个意义上说，其结构就是由比特币代码发起的过程。但比特币作为一个超个体，其更重要的结构是由另一个结构定义的：即比特币网络。所有运行在比特币区块链上并连接到其他节点的实例，共同定义了比特币的边界。运行比特币代码但未连接到其他节点的，不属于比特币结构的一部分。如果它们使用不同的区块链，情况也是如此。因此，比特币作为超个体的结构，不同于目前已知的生物物种。不过，它与真菌菌丝有些相似。真菌通过菌丝网络在环境中生长，菌丝是细长的管状丝线。因此，真菌的结构由其相连的菌丝定义。类似地，所有连接到比特币网络的节点共同定义了比特币这个有机体。


    ### 繁殖


    一个有机体要繁殖，就必须具有遗传性。对于地球上的生命系统，这是通过DNA实现的。通常，它被称为基因，基因包含了产生有机体所需的所有指令。开创性著作《自私的基因》的作者理查德·道金斯（Richard
    Dawkins）认为，基因作为复制因子的角色很有趣。基因利用它所驱动的身体（道金斯称之为生存机器）来实现自身的复制。达尔文自然选择确保只有那些最擅长达成此目标的基因才能长期生存。复制因子与执行复制的载体之间的区别至关重要。在生物学中，复制因子是基因，载体是身体。但道金斯主张一种普遍的达尔文主义，认为这些法则适用于任何地方。因此，我们也应该能够为超个体找到类似的东西。


    对于比特币而言，复制因子是源代码，因为它描述了构建比特币的所有组件。从DNA代码到计算机代码的飞跃并不特别大。主要区别在于，计算机代码是基于二进制的，在半导体中实现，只存在0和1。DNA是基于四进制的，在有机化学中实现，因为有四种可能的值，即四种不同的核苷酸：胞嘧啶（C）、鸟嘌呤（G）、腺嘌呤（A）和胸腺嘧啶（T）。我们稍后将讨论用于复制的载体。


    ### 适应


    适应是有机体在生存条件变化时改变其基因以求生存的能力。历史上，突变通过自然选择过程提供了导致适应的变化，但人类也通过选择性育种、转基因作物和基因疗法来实现适应。对于比特币而言，适应是通过开源开发者持续维护其源代码来实现的，其目的是使比特币适应比特币生态系统不断变化的条件。随着每个新代码版本的发布，都会处理环境中遇到的新问题，以使比特币的适应性更强。这反过来又创造了一个新的环境，带来新的压力。与最初的版本相比，比特币当前的代码已经过大量编辑和扩展，这表明适应已经发生。遵循理查德·道金斯有影响力的自私基因理论，适应性在表型层面发挥作用，即基因所产生的有机体，但这并非全部。基因还引出了道金斯所称的“扩展表型”。这个概念既包含了基因直接编码的生物有机体，也包含了该基因所促进的对其他有机体或环境的任何影响。动物界中最令人印象深刻的例子是河狸，它通过筑坝来改变环境，以利于自身的生存。比特币的扩展表型是比特币网络、开源开发者以及所有比特币爱好者。这个扩展表型，而不是运行比特币代码的软件本身，才是适应的单位。用道金斯的术语来说，代码是复制因子，而这个扩展表型就是载体。'
  raw: 'The Chilean biologist Humberto Maturana had for years been teaching biology
    to his students and came up short with the simplest of questions, namely, what
    life is. He was unable to find convincing answers in previous work in biology.
    This provoked years of thinking about the essential nature of living systems.
    To answer the question, he had to invent a new term, *autopoiesis*: “An autopoietic
    machine is a machine organized (defined as a unity) as a network of processes
    of production (transformation and destruction) of components which: (i) through
    their interactions and transformations continuously regenerate and realize the
    network of processes (relations) that produced them; and (ii) constitute it (the
    machine) as a concrete unity in space in which they (the components) exist by
    specifying the topological domain of its realization as such a network.”


    Like the entire book *Autopoiesis and Cognition*: *The Realization of the Living*,
    the quote is very concise and difficult to unwrap. The main point is that a living
    system is autopoietic, and an autopoietic system is able to regenerate its own
    constitution continuously. We, humans, are able to continue to regenerate our
    bodies by finding the food and nutrients we need by ourselves. The same is the
    case for plants and animals. This contrasts with an allopoietic system, like a
    factory, which also uses raw materials but produces something other than itself.
    Autopoiesis can thus be described as the ability to continuously create the conditions
    for the system’s continued existence. That is the essence of life, according to
    Maturana.


    A living system is characterized by the ability to sustain its own constitution
    over a prolonged period through metabolism with the environment. All known examples
    are biological, but the principles we have reviewed here do not require biological
    chemical compounds. A living system could exist that matched the criteria for
    life but was not based on known biochemical processes. A hyperorganism might fulfill
    all the same criteria, but if we found such a hyperorganism, how would we determine
    if it were alive?


    We might define and characterize it in much the same way as biological life. Even
    if we are not looking for the exact biological mechanisms that we know of for
    terrestrial life, we should look for the same characteristics that we find in
    biological life.


    ## Characteristics of Life and Bitcoin


    In biology there is no unanimously agreed-upon definition of the characteristics
    of life, but it is common to require an organized structure that can reproduce
    and metabolize, react to stimuli, grow, and adapt.


    ### Structure


    All living systems have a structure defined by a boundary delineating what is
    inside and outside. For example, the cell has a cell membrane, while animals have
    skin. For Bitcoin, we have a different type of structure. Each instance of the
    Bitcoin code runs on a CPU that it shares with other programs. The structure,
    in this sense, is the processes initiated by the Bitcoin code. But Bitcoin is
    defined by another more important structure as a hyperorganism, that of the Bitcoin
    network. All instances running on the Bitcoin blockchain and connected to other
    nodes define the boundary of Bitcoin. Nodes running a Bitcoin code not connected
    to others are not part of the structure of Bitcoin. The same is the case if they
    are using a different blockchain. The structure of Bitcoin as a hyperorganism
    is, therefore, different from currently known biological species. It resembles
    fungal hyphae, though. A fungus grows as a network of hyphae, which are thin tubular
    threads through the environment. Its structure is thus defined by the hyphae connected
    to it. Similarly, all nodes connected to the Bitcoin network define the organism
    of Bitcoin.


    ### Reproduction


    For an organism to reproduce, there must be heredity. For living systems on the
    earth, this is achieved through DNA. In common parlance, it is called the gene,
    which contains all the necessary instructions to produce the organism. The author
    of the groundbreaking book *The Selfish Gene*, Richard Dawkins, argues that the
    gene is interesting in its role as a replicator. It uses bodies, which he calls
    survival machines, in order to get reproduced. Darwinian selection makes sure
    that only the genes that are best at making this happen will survive in the long
    run. The distinction between the replicator and the vessel doing the replication
    is crucial. In biology, the replicator is the gene and the vessel the body. But
    Dawkins argues for a universal Darwinism where these laws apply everywhere. We
    should therefore be able to look at something similar for hyperorganisms.


    For Bitcoin, the replicator is the source code since this describes all the components
    to build Bitcoin. The leap from DNA code to computer code is not particularly
    big. The main difference is that computer code is base 2 implemented in semi-conductors,
    where only one and zero exist. DNA is base 4 implemented in organic chemistry
    since there are four possible values, those of the four different nucleotides:
    cytosine (C), guanine (G), adenine (A), and thymine (T). We will return to the
    vessel for replication shortly.


    ### Adaptation


    Adaptation is an organism’s ability to change its gene to survive if living conditions
    change. Historically, mutations have provided change that ensured adaptation through
    the process of natural selection, but humans have also done this through selective
    breeding of cultivated species, genetically modified crops, and gene therapy.
    For Bitcoin, adaptation is achieved through the open source developers’ continuous
    maintenance of its source code, designed to adapt it to the Bitcoin ecosystem’s
    changing conditions. With each new code release, new problems encountered in the
    environment are addressed to make Bitcoin better adapted. This, in turn, creates
    a new environment with new pressures. The current code of Bitcoin is heavily edited
    and expanded compared with the original, which shows that adaptation has already
    occurred. Following Richard Dawkins’s influential theory of the selfish gene,
    adaptability works at the phenotypical level, that is, the organism that the gene
    produces, but that is not always the whole story. The gene gives rise to what
    Dawkins calls the extended phenotype. This concept encapsulates both the biological
    organism the gene codes for directly and any effects on other organisms or the
    environment the gene promotes. The most impressive example from the animal kingdom
    is the beaver, which builds dams to change the environment to favor its survival.
    The extended phenotype of Bitcoin is the Bitcoin network, the open source developers,
    and all the Bitcoin enthusiasts. This extended phenotype, rather than the software
    running the Bitcoin code, is the unit of adaptation. While the code is the replicator,
    in Dawkins’s terms, this extended phenotype is the vessel.'
  trans: '

    智利生物学家温贝托·马图拉纳（Humberto Maturana）多年教授生物学，却在一个最简单的问题上——即生命是什么——感到难以作答。他无法在以往的生物学研究中找到令人信服的答案，这促使他花费数年时间思考生命系统的本质。为了回答这个问题，他不得不创造一个新术语：*自创生*（`autopoiesis`）：“一个自创生机器是一个被组织（定义为一个统一体）的机器，它作为一个由组件生产（转化与销毁）过程所构成的网络；这些过程（i）通过其相互作用与转化，持续地再生并实现产生它们自身的过程（关系）网络；并且（ii）通过指定该网络作为这样一个拓扑域的实现，将该机器构成为一个在空间中存在的具体统一体，组件在其中存在。”


    就像整本书《自创生与认知：生命的实现》一样，这段引文非常简洁且难以理解。核心观点在于：一个生命系统是自创生的，而一个自创生系统能够持续地再生自身的构成。我们人类能够通过自行寻找所需食物和营养，持续地再生我们的身体。植物和动物也是如此。这与一个异构生系统（如工厂）形成对比，工厂也使用原材料，但生产的是自身之外的东西。因此，自创生可以被描述为持续创造系统持续存在所需条件的能力。根据马图拉纳的说法，这就是生命的本质。


    一个生命系统的特征在于，能够通过与环境的代谢，在较长时间内维持自身的构成。所有已知的例子都是生物性的，但我们在此回顾的原理并不要求生物化学化合物。可能存在一个满足生命标准、却不基于已知生化过程的生命系统。一个超个体或许也满足所有相同标准，但如果我们发现了这样一个超个体，我们该如何判断它是否具有生命？


    我们可以用类似于定义和描述生物生命的方式来定义和描述它。即使我们并非在寻找我们已知的地球生命的确切生物学机制，我们也应寻找我们在生物生命中所发现的相同特征。


    ## 生命的特征与比特币


    在生物学中，对于生命的特征并没有一致认同的定义，但通常要求具备一个有组织的结构，能够繁殖、代谢、对刺激做出反应、生长并适应。


    ### 结构


    所有生命系统都有一个由边界定义的结构，该边界区分了内部与外部。例如，细胞有细胞膜，而动物有皮肤。对于比特币而言，我们有一种不同类型的结构。比特币代码的每个实例都在一个与其他程序共享的
    CPU 上运行。从这个意义上说，其结构就是由比特币代码发起的过程。但比特币作为一个超个体，其更重要的结构是由另一个结构定义的：即比特币网络。所有运行在比特币区块链上并连接到其他节点的实例，共同定义了比特币的边界。运行比特币代码但未连接到其他节点的，不属于比特币结构的一部分。如果它们使用不同的区块链，情况也是如此。因此，比特币作为超个体的结构，不同于目前已知的生物物种。不过，它与真菌菌丝有些相似。真菌通过菌丝网络在环境中生长，菌丝是细长的管状丝线。因此，真菌的结构由其相连的菌丝定义。类似地，所有连接到比特币网络的节点共同定义了比特币这个有机体。


    ### 繁殖


    一个有机体要繁殖，就必须具有遗传性。对于地球上的生命系统，这是通过 DNA 实现的。通常，它被称为基因，基因包含了产生有机体所需的所有指令。开创性著作《自私的基因》的作者理查德·道金斯（Richard
    Dawkins）认为，基因作为复制因子的角色很有趣。基因利用它所驱动的身体（道金斯称之为生存机器）来实现自身的复制。达尔文自然选择确保只有那些最擅长达成此目标的基因才能长期生存。复制因子与执行复制的载体之间的区别至关重要。在生物学中，复制因子是基因，载体是身体。但道金斯主张一种普遍的达尔文主义，认为这些法则适用于任何地方。因此，我们也应该能够为超个体找到类似的东西。


    对于比特币而言，复制因子是源代码，因为它描述了构建比特币的所有组件。从 DNA 代码到计算机代码的飞跃并不特别大。主要区别在于，计算机代码是基于二进制的，在半导体中实现，只存在
    0 和 1。DNA 是基于四进制的，在有机化学中实现，因为有四种可能的值，即四种不同的核苷酸：胞嘧啶（C）、鸟嘌呤（G）、腺嘌呤（A）和胸腺嘧啶（T）。我们稍后将讨论用于复制的载体。


    ### 适应


    适应是有机体在生存条件变化时改变其基因以求生存的能力。历史上，突变通过自然选择过程提供了导致适应的变化，但人类也通过选择性育种、转基因作物和基因疗法来实现适应。对于比特币而言，适应是通过开源开发者持续维护其源代码来实现的，其目的是使比特币适应比特币生态系统不断变化的条件。随着每个新代码版本的发布，都会处理环境中遇到的新问题，以使比特币的适应性更强。这反过来又创造了一个新的环境，带来新的压力。与最初的版本相比，比特币当前的代码已经过大量编辑和扩展，这表明适应已经发生。遵循理查德·道金斯有影响力的自私基因理论，适应性在表型层面发挥作用，即基因所产生的有机体，但这并非全部。基因还引出了道金斯所称的“扩展表型”。这个概念既包含了基因直接编码的生物有机体，也包含了该基因所促进的对其他有机体或环境的任何影响。动物界中最令人印象深刻的例子是河狸，它通过筑坝来改变环境，以利于自身的生存。比特币的扩展表型是比特币网络、开源开发者以及所有比特币爱好者。这个扩展表型，而不是运行比特币代码的软件本身，才是适应的单位。用道金斯的术语来说，代码是复制因子，而这个扩展表型就是载体。

    '
- fmt: '### Metabolism


    Biological life metabolizes chemical compounds and energy through an interaction
    with its environment. A cell takes substances from the environment and uses them
    for chemical reactions. This requires energy. Plants use the sun’s energy to create
    organic material that animals can metabolize. All living systems take something
    from the environment, metabolizing it into waste. This waste may be crucial for
    other organisms. A system of organisms tied together in this way is an ecosystem.
    In a nonorganic sense, `Bitcoin` can also be said to metabolize. It takes electrical
    energy to power the `CPU` running its computer code, which it metabolizes to currency,
    which humans can use for monetary purposes. Money is, so to say, the waste product
    of `Bitcoin` but the key to the ecosystem of which it is a part. This ecosystem
    is the international world of finance. `Bitcoin` thus forms a symbiotic relationship
    with humans and resembles mycorrhizal fungi, which create large underground networks
    connecting to plant roots through which they exchange nutrients with the plants.


    ### Growth


    The power to grow is the ability of a living system to reconstitute its shape.
    No tissue can exist for the duration of a lifetime of an organism without degrading.
    For example, the heart beats around 3,600 times an hour or about 91,980,000 times
    in a lifetime. No material exists that can withstand that. The different parts
    of biological organisms are thus able to regenerate. `Bitcoin` has found a clever
    way to make it happen since it has coopted the human brain to motivate us to repeatedly
    install its program on multiple computers. This effect has been achieved through
    religious zeal, the promise of quick gains, and associations with a bright and
    more just future. `Bitcoin` has inserted itself into the behavioral agenda of
    humans. We buy and install `Bitcoin` because it comes with a promise of salvation
    or at least an easy buck. In this way, `Bitcoin` resembles the species of fungi
    known as `Ophiocordyceps` that has somehow been able to manipulate the behavior
    of insects as part of its extended phenotype. A bleak parody of this analysis
    would have us be like the zombies in the HBO show *The Last of Us*, affected by
    a new strain of cordyceps mindlessly going about doing the business of `Bitcoin`,
    which is to proliferate. This, of course, is a caricature, and the effects of
    `Bitcoin` on humans seem somewhat more benign, but the mechanism is essentially
    the same and well-known in the animal kingdom. `Bitcoin` grows through a careful
    orchestration of human motives and behavior. This is part of its extended phenotype.


    ### Reaction to Stimuli


    The ability to respond to environmental stimuli is important for any organism’s
    survival. Animals do this, for example, when their bodies are depleted of nutrients
    by responding with hunger signals. This sets in motion behavior to replenish the
    needed nutrients. When too close to fire, we feel pain, which motivates us to
    move away from the fire. These are subsystems that have the purpose of maintaining
    the equilibrium of the body in a state conducive to continued existence. There
    is no immediately obvious analogy when we consider `Bitcoin` in this light. It
    does not move. But many biological organisms do not move either. There is, though,
    one way in which `Bitcoin` shows an ability to react to stimuli. This is through
    the setting of the difficulty of the cryptographic puzzle. Every time a new block
    is created, it looks at the time since the last block. If this is longer than
    ten minutes, it means that the total processing capacity of the `Bitcoin` network
    is low, and it reconfigures the difficulty to a lower level. Conversely, if the
    time is shorter, it means there is an excess of computing power relative to the
    equilibrium of ten minutes, and the difficulty is increased. This subtle heartbeat
    of the `Bitcoin` network makes sure that it adapts to the processing power available
    in its surroundings, that is, the computers it lives in.


    ## Is Bitcoin Alive?


    According to the criteria of life, we can conclude that `Bitcoin` seems to fulfill
    them. Even though `Bitcoin` does not rely on organic chemistry like all other
    known life forms, it appears to have the same properties. A counterargument could
    be that `Bitcoin` is not really alive since it depends on computers and the Internet.
    But that is no different than many bacteria that require very particular environments,
    without which they will die. Another possible criticism is that humans created
    it. But that is not an actual argument because there are no criteria that require
    life not to be created artificially. It also resembles life in the way that it
    recombines features from other sources. We saw how different strands of technological
    developments led to the implementation of `Bitcoin`. This is no different from
    how bacteria recombine and absorb genetic material from other bacteria. The process
    is well-known in biology.


    `Bitcoin`, therefore, fulfills the essential functions of life as we defined it
    previously: “a living system can therefore be said to be characterized by the
    ability to sustain its own constitution over a prolonged period through metabolism
    with the environment.” `Bitcoin` is also autopoietic in that it continuously coopts
    humans to install and upgrade the software that runs it. The `Bitcoin` miners
    running the `Bitcoin` network today are not the same as the ones ten years ago.
    It dynamically replaces the nodes that implement its code. It also has a metabolism
    by which it takes energy to power computer `CPU`s and metabolizes it to digital
    currency, which its symbiont, humans, can spend to buy more energy.


    One might also counter that this is a fictional just-so story that can be told
    about anything that runs on a computer. Let us, therefore, consider whether that
    is true by considering a few other examples of computer-based systems. First,
    let us look at the computer worm. Like an actual virus, it only replicates and
    is not alive. It has no metabolism or adaptability. It is the same code.


    Another example is a popular computer program like Microsoft Word. Humans also
    help reproduce it, and it has adapted through the continuous release of new versions,
    but it does not respond to stimuli and has no metabolism. A closer analogy to
    `Bitcoin` is perhaps a peer-to-peer sharing system like `BitTorrent` since it
    has a similar morphology to `Bitcoin`. It is installed on a computer and connects
    to other nodes. `BitTorrent` does bring value in the form of digital assets, but
    it does not produce these, so it cannot be said to have metabolism in the same
    sense as `Bitcoin`; it is merely a transport system for something else and, therefore,
    allopoietic. As can be seen, even close parallels are somewhat lacking to fulfill
    the criteria for life in the way that `Bitcoin` does.'
