  trans: '

    # 虚拟货币


    比特币汲取了此前虚拟货币探索的成果，直接构建于注重隐私和稳定货币供应的加密虚拟货币体系之上。比特币白皮书中仅引用了两种先前存在的加密货币：亚当·巴克的哈希现金和戴伟的
    B-money。比特币从哈希现金继承了采用工作量证明来铸造货币的理念。比特币的许多核心要素已在哈希现金中定义完毕，以至于巴克后来声称自己发明了比特币挖矿函数——这可以说是其核心组成部分。通过比特币挖矿，货币被生产并投入流通，如同哈希现金代币一样，随后即可用于交换。


    许多虚拟货币支持者关注的核心问题之一是银行（特别是中央银行）的颠覆性作用，因为在虚拟货币信仰者看来，银行一直在“印钞”。货币供应量增加会产生通胀效应，这本质上是“窃取”货币持有者的财富，因为通胀会降低名义货币价值。而比特币的设计则截然相反：通过逐步减少货币发行量实现结构性的货币供应紧缩，旨在形成通缩机制，使货币持续增值。


    比特币的供应遵循既定时间表，随着时间的推移，产生的货币数量会越来越少，而非越来越多。首先，理论上可生成的比特币总量在设计上就被固定了。与人们日常生活中使用的美元、欧元等法定货币不同（其货币供应量不受限制），比特币是有限的：总共只能挖出
    2100 万枚比特币。当 50%的比特币被挖出后，矿工奖励首次减半，这发生在 2012 年。此后奖励变为 25 枚比特币。第二次减半发生在 75%的比特币被挖出之后，奖励降至
    12.5 枚比特币。这一过程将持续，直至再无比特币可投入流通。根据计算，最后一枚比特币将在 2140 年左右被挖出。


    将稀缺性嵌入货币的设计可能受到基于贵金属的虚拟货币启发，因为贵金属的价值正源于其稀缺性。在历史上最常用于货币的三种贵金属（金、银、铜）中，黄金最为稀缺，白银次之，铜的稀缺度最低。相反，像铁这样的金属因过于普遍，作为价值储存手段的价值不大。在这方面，黄金尤为值得关注：一百多年来，全球市场每年的黄金供应量始终维持在黄金总存量的
    2%左右。这种状况形成了较高的存量-流量比（目前约为 60），即现存黄金总量与新增开采黄金量的比率。正是这种动态使得黄金能更好地保值。白银的存量-流量比约为
    20，相对更为充裕，这形成了类似于通胀性货币供应的不同动态。当总存量中新增量过多时，每个单位的价值就会缩水。


    虽然 e-gold、eBullion 等项目交易的是与实物黄金挂钩的电子代币，但尼克·萨博提出了一种纯数字版本，旨在创建数字价值储存手段。比特币最终接近了萨博在其关于“比特黄金”的构想中提出的理念。他设想通过解决密码学难题来铸造“比特黄金”，从而创造类似黄金的稀缺性。解决密码学难题的过程类似于黄金开采。比特币是首个实现此类系统的项目。


    # 加密以保护隐私


    密码朋克关注的一个核心问题是隐私。他们特别针对银行和政府过度获取客户交易信息这一问题，因为从这些信息中可以收集到大量涉及个人隐私的数据。相比之下，比特币默认提供匿名账户，且没有银行作为交易中介。任何人都无法直接通过用户的交易信息识别其身份。


    在讨论比特币时，“钱包”是一个核心概念，但它更多是一种思维概念，而非真正的技术产物。如今，钱包通常等同于钱包软件，其形式多样。钱包可以由在线交易所托管，也可以由用户下载并在本地作为客户端应用程序运行。从某种意义上说，“钱包”这个术语具有误导性，因为钱包本身并不存储任何比特币。要与比特币网络交互进行交易，需要一些中介服务。钱包软件提供这些服务，例如生成比特币地址、存储私钥以及显示每个比特币地址上的余额。之所以需要这些功能，是因为比特币本质上不过是一份巨大的交易清单。


    要使用比特币进行任何操作，首先需要一个地址——这是一串用于向他人标识你的身份的字符串，允许你发送和接收比特币。你可以将其视为银行账户；只不过在比特币系统中，你无需请求任何人即可创建地址。


    地址基于我们在第 2 章中见过的密码学技术构建。生成过程如下：首先，选择一个大的随机数，这就是你的私钥。由于只需私钥即可获取你的比特币，因此必须格外小心地保护它。基于这个私钥，通过一种称为椭圆曲线乘法的技术生成公钥。这是可用于加密和签名的标准公钥-私钥对。但目前我们还未进行任何加密或签名操作。接下来，将公钥通过单向加密哈希函数处理。首先，从公钥计算`SHA-256`哈希值，再基于该值计算`RIPEMD160`哈希，得到
    160 位的数字。然后将此数字编码为`Base58Check`，从而生成一个 58 字符的字符串。最终结果即为地址。地址可以显示为字符串，有时也以二维码形式呈现以便识别。如果你想让别人用比特币付款给你，只需将你的地址发送给他们，并请求其将资金转入该地址即可。


    当你以新地址加入比特币网络时，在获得与地址关联的比特币之前，你几乎无法进行任何操作。这可以通过两种方式实现：要么开始挖矿获取比特币，要么请他人向你转账比特币。对于个人而言，通过挖矿获取比特币已不再可行（后续会详细说明）。因此，必须从其他途径获取比特币，例如通过交易所或出售商品。


    在线交易所允许你存入美元等法定货币以兑换比特币。交易所随后会将比特币从其某个地址转入你的地址。这笔交易会被比特币网络捕获并记录在一个区块中。完成后，你的余额中就会有相当于刚刚转入的金额可供使用。


    如果你想购买某物或向他人转账，只需获取对方的地址，输入转账金额，还可以添加一些文本信息。但请注意，该文本信息在区块链上对所有人可见。交易将包含以下内容：


    *   用于提取比特币的地址

    *   转账金额

    *   你可能希望添加的额外交易费用（以加快交易确认速度）

    *   接收比特币的地址

    *   附加文本信息

    '
- fmt: '超过发送交易是不够的，因为任何人都可以用你的钱包地址发送交易。为了验证交易，比特币网络需要使用与该地址关联的私钥对交易进行签名。之后，交易会以“待处理”状态发布到比特币网络。矿工将验证该交易是否已用私钥签名。一旦交易被包含在一个区块中，交易即告完成，且可供所有人查看。


    将此与常规银行账户进行比较，银行集中保存所有数据，并持有允许你从账户转账的凭证。银行可以关闭对你账户的访问，或将你的凭证泄露给恶意第三方，而该第三方随后将能够动用你的资金。银行通过其“了解你的客户”（KYC）流程确切地知道你是谁，并且有义务遵守法院裁决，披露你的交易或冻结资金。


    使用比特币时，没有人知道你是谁。只有一个个无意义的随机比特币地址。尽管与银行相反，所有交易都是公开的，但没有人能将它们与你这个私人身份联系起来。资金并非集中存储在任何地方，而是无处不在，这意味着即使某个服务器崩溃或在线交易所破产，资金仍然存在并可访问。最后，没有人能控制你资金的访问权限；如果你拥有某个地址的私钥，你就可以访问该地址关联的所有比特币。更重要的是，交易清算在一小时内完成，而传统银行转账则需要几天时间。


    另一方面，比特币缺乏传统银行业务所附带的护栏和安全网。如果犯罪分子盗用了你的信用卡，你可以向信用卡公司提出争议，这通常会导致资金成功退回你的账户。而对于比特币，如果有人获取了你的私钥并转移了所有资金，那么任何人都无能为力。你无法向比特币网络申诉。同样，如果你不小心输入了错误的地址，资金将归属于该地址，并且你绝无可能找到那个人并请求他归还你的钱。资金就这样消失了。


    ## 共享公共账本


    传统银行对其所有交易记录保密。事实上，这是银行保密的基本原则，并在许多国家被编入法律。当资金被使用时，银行通过一个复杂的银行间清算系统确保一个账户只能消费一次。确保资金仅被使用一次是所有交易媒介的必要条件，这也是清算过程如此漫长的部分原因。


    哈希现金（Hashcash）尚未解决双重支付问题，它依赖一个中央注册表来跟踪代币是否已被使用。公共账本是比特币解决此问题的关键创新。交易发送方和接收方的完全隐私，使得比特币能够彻底颠覆传统的银行保密原则，将所有交易公之于众。当所有交易都在假名钱包ID之间进行时，即使公开张贴，隐私仍能得到保障。


    公共账本是一份记录所有曾经发生的比特币交易的长期记录。这种共享公共账本的概念由戴伟（Wei Dai）在其B-money的愿景中提出。戴伟提出了分布式账本的概念，所有交易都被记录以供所有人查看。基于这个分布式账本，可以在交易发生时计算账户余额，这本质上就是格里格（Grigg）的三式记账法的概念。这些想法在比特币中首次得以实现。


    公共账本并非单独交易简单拼接而成的一长串记录。它由交易区块组成，因此得名区块链。一个区块是交易的集合。由于区块是历史的记录，它必须是不可变的。对内容进行哈希处理即可实现这一点。区块通过其包含的所有交易的哈希值进行密封，因此任何人都可以验证后续副本中所包含的交易未被篡改。仅仅在每个区块中放入一个哈希值是不够的，因为正如我们所见，任何地方都没有记录账户余额。因此，所有余额都需要所有涉及任何给定比特币地址的先前交易的完整记录，以验证该地址是否有余额可消费。如果缺少一个或多个区块，双重支付就可能发生，因为缺失区块中的交易将不计入账户余额的计算。


    这意味着验证交易的矿工必须能够访问整个公共账本的交易历史。这带来了确保所有区块都存在且已入账的问题。如果你支付了100个比特币的那个区块正好从公共账本中消失了，那么这笔钱在你的账户中仍会显示为可用余额，从而允许进行双重支付。解决方案是每个区块必须包含前一个区块的哈希值，正是这一点使其形成了一条链。通过这种方式，从公共账本中移除任何区块都是不可能的。前一个区块的哈希值和交易无法产生与后续区块相同的哈希值。请记住，哈希是基于所有输入的指纹，因此生成下一个区块的指纹需要前一个区块的指纹。尼克·萨博（Nick
    Szabo）最初在其关于比特黄金（Bitgold）的想法中提出了这一机制，但从未实现。


    ## 点对点网络


    比特币网络是一个运行比特币软件并通过互联网直接连接的计算机系统。交易被发布到该网络以纳入下一个区块。当新区块被创建时，它同样会被发送到其他节点进行验证并纳入区块链。


    如果这个公共账本保存在中央服务器上，它将容易受到破坏和故障的影响。这就是系统采用点对点网络进行分布式部署的原因，网络中的每个节点都包含整个公共账本的副本。当有人想要开始挖矿时，必须连接到这个网络并下载区块链。因此，该网络也作为一个具有多个冗余副本的分布式存储系统工作。通过这种方式，即使一个节点发生故障，也会有成千上万个其他节点持有副本。


    另一种情况是，创建了一个替代区块，其中插入了替代交易。由于大多数其他节点将拥有该区块的另一个版本，因此该替代区块会被网络拒绝。在比特币网络中，存在一个内置的共识系统，要使区块被接受，需要获得多数同意。网络建立在最长链之上。如果替代区块未被接受，它将不会成为最长链的一部分，因此其中的交易也不会被“结算”。


    鉴于这种点对点模型，即使监管机构和权威人士宣称应该关闭比特币，任何中央机构也无法做到。只要有计算机连接并运行比特币软件，比特币就会存在。这使得比特币和其他类似的区块链成为有史以来最具韧性的交易系统。银行可以被关闭，甚至中央银行也可能随着一个国家的消失而消失，但只要有人投入算力和网络连接来运行软件，比特币和区块链就会继续存在。'
  raw: 'More than sending a transaction is required since anyone could send a transaction
    with your wallet address. For the Bitcoin network to validate the transaction,
    you need to sign it with the private key associated with the address. The transaction
    is then posted as “pending” to the Bitcoin network. The miners will then validate
    that the transaction is signed with the private key. Once it has been included
    in a block, the transaction is complete and available for all to see.


    Compare this with a regular bank account, where the bank holds all data centrally,
    who also keeps the credentials that allow you to transfer money from the account.
    The bank can close access to your account or compromise your credentials to a
    malicious third party, who will then have access to your funds. The bank knows
    precisely who you are because of their Know Your Customer (KYC) processes, and
    they are liable to comply with court rulings to disclose your transactions or
    freeze funds.


    With Bitcoin, no one knows who you are. There is only a nonsensical random Bitcoin
    address. Even though, contrary to a bank, all transactions are public, no one
    can connect them to you as a private person. The money is not stored centrally
    anywhere but rather everywhere, which means that even if a server breaks or the
    online exchange goes bankrupt, the money is still out there and available. Lastly,
    no one controls access to your funds; if you have the private key for an address,
    you can access all the bitcoins associated with that address. What’s more, clearing
    a transaction is done in less than an hour compared with a few days for traditional
    bank transfers.


    The flip side is that there are none of the guardrails and safety nets associated
    with regular banking. If a criminal abuses your credit card, you can dispute the
    transaction with the credit card company, which usually results in the successful
    return of the money to your account. With bitcoin, if someone gets access to your
    private key and transfers all the funds, there is nothing anyone can do. You cannot
    plead with the Bitcoin network. Similarly, if you accidentally typed the wrong
    address, the money would now belong to that address, and there is no way in the
    world you would be able to find out who that was to ask for your money back. The
    money would just be gone.


    ## Shared Public Ledger


    Traditional banks keep all their records of transactions secret. Indeed, that
    is the fundamental rule of bank secrecy, which is codified into law in many countries.
    When money is spent, the banks make sure an account can spend it only once through
    a complex interbank clearing system. Being sure that money is spent only once
    is a necessity for any method of exchange and part of the reason that clearing
    takes so long.


    Hashcash had yet to solve the problem of double spending and relied on a central
    registry to keep track of whether a token had already been spent. The public ledger
    was a key innovation to solve this problem in Bitcoin. The complete privacy of
    the sender and receiver of a transaction allowed Bitcoin to turn the fundamental
    bank secrecy on its head and post all transactions in public. When all transactions
    are between pseudonymous wallet IDs, privacy is still ensured even if it is publicly
    posted.


    The public ledger is one long record of all bitcoin transactions ever made. The
    idea of such a shared public ledger was presented by Wei Dai in his vision for
    B-money. From Wei Dai came the concept of a distributed ledger where all transactions
    were recorded for all to see. Based on this distributed ledger, account balances
    could be calculated at the time of a transaction, which is essentially the concept
    of Grigg’s triple-entry accounting. These ideas were implemented for the first
    time in Bitcoin.


    The public ledger is not just a long string of transactions that are added individually.
    It consists of blocks of transactions, hence the name blockchain. A block is a
    collection of transactions. Since the block is a record of history, it must be
    immutable. The hashing of the content achieves that. The block is sealed with
    a hash of all the transactions included in the block, so anyone can verify that
    the transactions contained were not altered in a later copy. It is not sufficient
    to just put a hash in each block because, as we saw, there is no account balance
    recorded anywhere. Hence, all balances require the entire record of all previous
    transactions involving any given Bitcoin address to validate that it has a balance
    to spend. If one or more blocks were missing, double spending would be possible,
    since the transactions in the missing block will not count toward calculating
    the balance of an account.


    That means it is necessary for the miners validating transactions to have access
    to the entirety of the public ledger’s history of transactions. This poses the
    problem of ensuring that all blocks are present and accounted for. If the block
    where you paid 100 bitcoins is conveniently missing from the public ledger, they
    would still figure as a balance you could spend in the Bitcoin system, thus allowing
    double spending. The solution is that each block has to include the previous block’s
    hash, which is what makes it a chain. In this way, taking out any block from the
    public ledger is impossible. The previous block’s hash and the transactions would
    not yield the same hash of subsequent blocks. Remember that a hash is a fingerprint
    based on all the input, so the fingerprint of the previous block is required to
    generate the next block’s fingerprint. Nick Szabo had initially suggested this
    mechanism with his idea about Bitgold, but it was never implemented.


    ## Peer-to-Peer Network


    The Bitcoin network is a system of computers running the Bitcoin software and
    connected directly over the Internet. Transactions are published to this network
    for inclusion in the next block. When a new block is created, it is similarly
    sent to other nodes for validation and inclusion in the blockchain.


    If this public ledger were maintained on a central server, it would be vulnerable
    to corruption and failure. This is the reason the system is distributed in a peer-to-peer
    network where each node on the network contains a copy of the entire public ledger.
    When someone wants to start mining bitcoin, it is necessary to connect to this
    network and download the blockchain. The network thus also works as a distributed
    storage system with multiple redundant copies. In this way, even if one node fails,
    there will be thousands of others with a copy.


    Another scenario is that an alternative block is created where alternative transactions
    are inserted. Since most other nodes will have another version of the block, this
    will be rejected by the network. In the Bitcoin network, there is a built-in consensus
    system whereby a majority is needed to get a block accepted. The network builds
    on the longest chain. If the alternative block is not accepted, it will not be
    part of the longest chain and thereby transactions not “settled.”


    Given this peer-to-peer model, Bitcoin cannot be closed down by any central authority,
    even if regulators and pundits claim it should be. It will exist as long as there
    are computers that connect running the Bitcoin software. This makes Bitcoin and
    other similar blockchains the most resilient systems of exchange ever made. Banks
    can be closed down, and even central banks can disappear if a country disappears,
    but Bitcoin and blockchains will continue as long as anyone is dedicating computing
    power and network connection to running the software.'
