  trans: '

    ### 价值储存


    货币主要功能的最后一项是作为价值储存手段，这或许是最关键也最具争议的。理想情况下，货币应发挥价值储存的功能，从而使消费能够推迟到未来。一些经济学家认为，货币作为价值储存手段的功能是最重要的。


    这个概念很直白。如果某人赚了`100 美元`并决定存一年，那么一年后这笔钱应该仍然值`100 美元`。不幸的是，情况很少如此。通常这`100 美元`可能只值一个零头，比如说`90
    美元`。这是由于通货膨胀造成的。通胀削弱了货币作为价值储存手段的功能。如果你原本打定主意要买一条特别好看的裤子，这可就糟了。另一方面，如果你借了`1000
    美元`，现在你只需偿还`900 美元`，从而赚了`100 美元`。


    相反的情况也可能发生：这`100 美元`可能会增值，比如说变成`110 美元`。如果你想要储蓄并推迟消费，这更有吸引力，但如果你有债务则不然。如果你借了`1000
    美元`，现在你就必须偿还`1100 美元`。


    由此可见，货币作为价值储存手段的功能对经济有着重要影响。极高的通货膨胀，即当货币作为价值储存手段的表现特别糟糕时，会对经济造成严重破坏。这时，像香烟或黄金这样的替代货币或商品就会流行起来。但还有一点需要记住，因为它以后会很重要，那就是价值储存功能与债务紧密相连。


    如果你持有大量以某种货币计价的债务，你会希望它作为一种糟糕的价值储存手段。另一方面，如果你是债权人或储蓄者，你会希望它尽可能成为一种良好的价值储存手段。历史上，像贵金属这类商品，在不作为货币使用的情况下，也曾是并且现在仍然是重要的价值储存手段。这与它们以重量为计量单位的问题有关。


    对于什么构成良好的价值储存手段，并没有精确的公式。我们稍后会回到这个话题，但目前我们可以强调，最重要的品质是耐久性。任何会快速消失的商品，按理说都会是一种糟糕的价值储存手段。这很可能也是为什么在许多文化中，黄金和贵金属被用作价值储存手段的原因。即使经过数百万年，黄金也不会失去光泽。铁腐蚀得相对较快，铜也一样。贝壳和其他海贝也具有同样的品质；它们不会消失，这可能也是它们能在世界各地长久成功的原因。


    ## 货币与交换的历史


    在现代世界，我们走到杂货店购买晚餐食材，或到咖啡馆点一杯燕麦奶肉桂拿铁，又或者在线支付房租，这些经历可能让我们觉得货币的存在是不言而喻的。它几乎像衣服和音乐一样，已成为人类生存中不可或缺的一部分。然而，从历史角度看，情况远非如此。我们已经看到了货币的多样性，但让我们追溯一下人类是如何走到如今货币主导我们生活的地步的。


    ### 交换


    首先，我们需要退一步，思考货币所要解决的基本问题，那就是交换。与并非直系后代的同类交换食物、物品和其他服务的能力并非人类独有。蚂蚁系统地进行着交换，蜜蜂也是如此。灵长类动物也有一定的交换概念，但当人类从灵长类动物中进化分化出来后，这种能力占据了中心位置。正如认知科学家迈克尔·托马塞洛所论证的，人类在共同狩猎和分享战利品的能力上是独一无二的。在《人类思维的自然史》一书中，他提出，**海德堡人**是两百万年前最早进行合作狩猎的人种。合作狩猎的性质必然要求交换。每个参与狩猎的人，以其参与行为换取一份猎物。海德堡人猎杀的猎物（如大型野生动物）就证明了这一点。除非他们以群体协作，否则仅凭他们的工具是无法杀死这些动物的。


    现代人类学奠基人之一马塞尔·莫斯在其 1950 年的经典论文《礼物：古式社会中交换的形式与理由》中，证明了交换能力成为人类文明支柱这一事实。在这部著作中，他研究了物品交换如何构建人类群体的凝聚力。他通过来自全球各地（当代和历史上）社会的令人印象深刻的大量证据，论证了交换并非新概念，而是深深植根于史前时期。物品在个人和群体之间流动最常见的基本形式就是礼物。在所有社会中，这都是物品在个人和群体间流动的一种常见方式。


    礼物交换可以构成礼物经济的基础，这在另一位人类学传奇人物、莫斯的同时代人布罗尼斯瓦夫·马林诺夫斯基的研究中首次得到证实。他在大约同一时期记录了特罗布里恩群岛上礼物如何成为经济的基础。礼物通过互惠（即期望回报）来运作。莫斯是第一个论证给予行为本身就已蕴含回报承诺的人。在人类社会中，礼物从来都不是免费的。

    '
- fmt: '### Barter


    According to most treatments of the history of money, the first stage is barter,
    which can be seen as a more focused and immediate form of exchange building on
    reciprocity like the gift economy. The difference is that gift-giving is less
    specified regarding the nature and timing of reciprocity. In barter, the precise
    nature and timing of the exchange are put into effect.


    Unfortunately, barter suffers from several structural problems. The first is the
    lack of a common standard of value. If someone wants to exchange apricots for
    knives, it is not straightforward how the apricots should be valued vis-a-vis
    the knives. You might work out that one knife is 120 apricots, which would make
    barter straightforward for this particular case, but these are just two products;
    what about tea or farmwork or milk? Each product pairing needs some exchange ratio
    to work smoothly and be predictable. This quickly becomes infeasible as the number
    of goods and services traded on the market increases.


    The next challenge is sometimes called the problem of double coincidence of wants.
    If I own an orchard and have excess apricots that I want to give away and I need
    a knife, then I need to find someone with excess knives who wants apricots. The
    double coincidence is necessary for the exchange to take place. That is perhaps
    not impossible, but unlikely, particularly in smaller societies.


    The last problem is how to store value. Come harvest, I might have an abundance
    of apricots from my orchard that I can use to barter for things I need, but they
    will spoil quickly. Outside the harvest season, I will have nothing of value to
    trade, which is inconvenient. This is the case for all perishable goods, which
    are mostly food. Knives are durable and thus better for barter.


    These facts about barter restrict the utility of barter as the backbone of an
    economic system. This is why an improvement of the barter system often develops
    where a few preferred barter items are used. Examples of such preferred barter
    items are cattle and salt, which we have already seen, but also wheat, rice, sugar,
    and blankets are commonly used as preferred barter items. These items can then
    be used as references for other goods. Perhaps 100 apricots are worth one blanket,
    and a knife is five blankets. Then I will know what to expect to pay. With a few
    preferred barter items, remembering market prices is manageable, which minimizes
    the problems of double coincidence of wants and standard of value. I can now go
    to the market with my cart of apricots and exchange them for blankets and then
    find someone to exchange a knife for them. This will work even if the knife trader
    does not want my apricots, and it also solves my store of value problem since
    the spare blankets can be stored through the winter.


    ### Primitive Money


    Preferred barter is only a small step away from what is sometimes called primitive
    money. There are different ideas about what precisely primitive money is. In *The
    Origins of Money*, Philip Grierson considers it to be "all money that is not coin
    like or modern paper money a derivative of the coin." This tells us to look for
    things based on our modern conceptualization of money as coin or paper but defers
    the question of what money actually is. A more operational conceptualization is
    offered by Paul Einzig in his book *Primitive Money in Its Ethnological, Historical,
    and Economic Aspects* from 1966: "a unit or object conforming to a reasonable
    degree to some standard of uniformity, which is employed for reckoning or for
    making a large portion of the payments in the community concerned." This quotation
    points to some key attributes, such as the objects'' uniformity and that they
    function as a unit of account and medium of exchange in a larger community. Now
    we start to see something that starts to fulfill the three functions of money.
    Many different kinds of objects have served as primitive money.


    Historically commodities have been widely used. We have already seen how cattle
    and salt were employed, but grain was even more important. The Mesopotamian culture
    was the first to develop accounting, and this was to keep track of the amount
    of grain deposited to and withdrawn from warehouses. In Egypt, grain was the basis
    of the economy over thousands of years and facilitated the building of monumental
    architectural works like the pyramids. These commodities were used because they
    were ubiquitous and stable in peoples'' lives.


    These commodities all have utility in themselves. Cows, salt, and grain can be
    eaten. Other types of primitive money do not share this characteristic. The ubiquitous
    cowries, for example, have no immediate use and are completely symbolic. People
    used them from prehistoric times around the Pacific and Indian Oceans. It comes
    from the shell of a mollusk that lives here, particularly around the Maldive Islands.
    Even in ancient China, the cowrie was used, so much so that the pictogram for
    money in Chinese is a cowrie.


    Metals were used from the late Stone Age and became central for toolmaking and
    weapons. This helped facilitate their use as money. For example, the Chinese made
    metal cowrie replicas in the late Stone Age. Tools and weapons were also known
    to be used as money. Caesar, for example, related how the Britons he encountered
    used swords as currency. Metal has been used in different shapes and forms, such
    as rods and coils or even just uneven lumps.


    ### Banking


    The next big transition in the history of money was banking. A specialized bureaucracy
    developed alongside when money became representational, as it did in ancient Mesopotamia
    in writing on cuneiform tablets. This facilitated the development of banking.
    Indeed, as the anthropologist and Occupy Wall Street organizer David Graeber argues
    in his book *Debt: The First 5000 Years*, debt is so entangled with money as to
    be indistinguishable. They appear at the same time, and Graeber contends "a history
    of debt (…) is thus necessarily a history of money." This view has much to offer
    since the ability to use debt is greatly amplified by money. Writing can even
    be said to have developed from the need to keep track of debt. The earliest texts
    from the city of Uruk from around 3,100 BCE are livestock lists.


    In this context, in the ancient Near East, banking developed. The oldest Babylonian
    private banking firms were anonymous, but we know of one called the "Grandsons
    of Egibi," with headquarters in Babylon. They offered a suite of banking services.
    They gave out loans against various securities and offered deposits from which
    customers could withdraw the whole or parts with checks. Babylonian banks also
    financed infrastructure building, such as irrigation canals, and offered leasing
    arrangements.


    But it was in Egypt that the so-called giro-banking system was perfected. In Egypt,
    grain had become the major type of currency, and state warehouses functioned effectively
    as banks, where grain could be deposited and withdrawn at will. Here a system
    was developed whereby an owner of a deposit could transfer part of his deposit
    to the king as tax through a written order. This system became generalized as
    a way to settle debts for the people of Egypt, and thus the first known instance
    of giro-banking came into existence.


    Most banking functions have been documented in the ancient Near East as early
    as the third millennium BCE. Curiously, these preceded the use of coins and metal
    as money by more than a thousand years, whereas in the West, it was the other
    way around where coins preceded the first banks by more than a thousand years.
    Consequently, we can see no unidirectional relation between coins and banking
    functions. Let us then jump to the history of coins.'
