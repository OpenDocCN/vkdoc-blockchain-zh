    \ 128 identical bits. This was difficult at the time, but around 1993, the National\
    \ Institute of Standards and Technology (NIST) was not confident in the security\
    \ and developed the SHA (Secure Hash Algorithm) with a 160-bit result. This was\
    \ later followed by SHA-1 and SHA-2, which are the most common and well-known,\
    \ since they form the bedrock of encryption on the Internet and are used for secure\
    \ communication technologies like web certificates, SSL, TLS, etc.\n\nThe MD5\
    \ and SHA-1 have now been shown to be susceptible to collision attacks and are\
    \ no longer considered sufficient. The NIST is working on a SHA-3 with a different\
    \ structure. This development is expected to continue with the increasing availability\
    \ of computing power.\n\nTo sum up, hashing is a function to create a digest or\
    \ fingerprint of a data input. This “fingerprint,” like human fingerprints, is\
    \ not necessarily unique and may be achieved by another input. This is called\
    \ a collision. A collision can be achieved only by brute force, that is, trying\
    \ a large number of different random inputs, and not incremental changes that\
    \ will continuously get closer to the hash value. This is a crucial property of\
    \ hashing that finds innovative use in Hashcash, as we shall see later in the\
    \ “Proof of Work” section, but first we must return to digital signatures.\n\n\
    ## Digital Signature\n\nBuilding on Diffie and Hellman’s work, Rivest, Shamir,\
    \ and Adleman also showed how their method could be used for signing a message.\
    \ If Bob writes a message to Alice using Alice’s public key for encryption, he\
    \ can then use his private key to generate a signature of the text. Alice can\
    \ then decode the message and verify that it was indeed Bob who signed it by using\
    \ Bob’s public key. This process is called non-repudiation, that is, proof that\
    \ someone had to have signed this. Non-repudiation is particularly important in\
    \ the case of contracts and transfers of money. The digital signature proves that\
    \ this particular text was signed with this particular private key belonging to\
    \ the public key of a known owner.\n\nOne of the missing pieces of the puzzle\
    \ to achieve a digital signature scheme was a convenient way to sign a message.\
    \ Signing it in its entirety was computationally intensive, so another approach\
    \ was needed. The message could be reduced before it was signed. Instead of signing\
    \ the entire message, one can create a hash of the message. As we saw previously,\
    \ this is a fingerprint that, with very high probability, cannot be produced by\
    \ another input. The fingerprint thus represents the message. This hash can then\
    \ be encrypted with the author’s private key.\n\nUsing the author’s public key\
    \ to decrypt the signature yields the hash. The original plain text message can\
    \ then be hashed, and the resulting hash can be compared to the one derived from\
    \ the signature. If it is identical, it proves that the owner of the private key\
    \ belonging to the author’s public key encrypted the message, or more simply,\
    \ the author wrote precisely this message.\n\nThis effect can be used for different\
    \ things. First of all, it can be used for documenting the wording of a contract,\
    \ for example. If two parties to a contract do not have identical versions, it\
    \ can be proven with mathematical certainty which version is correct: the one\
    \ yielding the hash that was signed. Second, it can be used to document the integrity\
    \ of the message, that is, no one inserted anything into the message during transit\
    \ or afterward.\n\nDigital signatures are, therefore, more efficient than regular\
    \ ones since they prove that the signer signed the document and the particular\
    \ shape of the document. This is a feature that we will see in many applications\
    \ of the blockchain."
  trans: "\n# 哈希\n\n比特币运作的核心功能之一是所谓的哈希函数。哈希函数是一种将任意大小的数据作为输入，并生成一个固定、通常更短的输出长度的函数。这个较短的输出被称为哈希值。\n\
    \n让我们看一个例子：使用哈希算法`MD5`（消息摘要），这段文本\n\n> *寂静古池塘…*\n> \n> *青蛙跳入水中央，*\n> \n> *扑通一声响，重归寂静。*\n\
    > \n> *秋月明—*\n> \n> *一只虫儿静悄悄，*\n> \n> *钻入栗子中。*\n> \n> *电光一闪—*\n> \n> *我以为是脸庞，*\n\
    > \n> *却是芒草穗。*\n> \n> ——松尾芭蕉\n\n生成的哈希值为：`5e477f116910df7e60d4ca527335a6e2`。\n\n\
    > *这是个人的一小步，却是人类的一大步。*\n> \n> ——尼尔·阿姆斯特朗\n\n生成的哈希值为：`ee77e1ab9d67a32bcc00cf42d71b7ae7`。\n\
    \n可以看出，生成的哈希字符串长度完全相同。如果我们输入托尔斯泰的《战争与和平》，哈希运算仍只会产生相同大小的哈希值。\n\n哈希函数还有一个额外特性：每次应用于相同输入时，都会生成相同的输出。无论何地何时有人计算上述输入，都会得到相同的哈希值。此外，这种计算对算力要求并不高。\n\
    \n而且，对哈希函数的输入进行最微小的改动，都将导致输出发生天翻地覆的变化，如下例所示：\n\n- “Where is my mind” 生成的哈希值：`a05f82ba995f3cb65d0947373387925b`。\n\
    - “Where is my mint” 生成的哈希值：`d9f4f0831e1045363f14699ca8a9d4e6`。\n\n输出哈希值的任何位置都没有一个字符相同，而输入中仅有一个字符（最后一个）不同。此外，几乎不可能有其他输入会产生相同的输出，这种现象被称为哈希碰撞。\n\
    \n最后要观察的重要特性是，哈希函数是一种单向函数，密码学家称之为单向陷门。你只能从输入到输出，而不能反向操作。从输出中反向推导出输入是不可能的。\n\n\
    像`MD5`、`SHA-1`和`SHA-2`这些流行哈希算法中使用的数学函数被称为 Merkle-Damgård 结构。它由拉尔夫·梅克尔在 1979 年发现，这位梅克尔正是与迪菲和赫尔曼共事的那位，十年后由伊万·比耶·达姆加德独立证明。这种结构保证了任何输入都能被压缩成固定长度。\n\
    \n罗纳德·李维斯特（RSA 论文的作者之一）在 1989 年开发了`MD2`（消息摘要）哈希函数，并逐步改进，直到 1992 年推出基于 128 位结果的`MD5`。这些算法在当时相当成功，但随着计算能力日益强大和廉价，被视为安全的门槛也在不断提高。\n\
    \n请记住，哈希碰撞意味着两个不同的输入产生了相同的结果。这种情况非常罕见，但并非不可能。一种暴力攻击尝试大量可能的组合，可能需要尝试极高的次数。如果攻击成功，就会破坏哈希函数的核心前提——即哈希值是由特定输入产生的证明。\n\
    \n对于一个生成 128 位哈希值（如`MD5`）的哈希函数，暴力攻击只需要尝试几个随机输入来产生 128 个相同的比特位。这在当时是困难的，但大约在 1993\
    \ 年，美国国家标准与技术研究院（NIST）对其安全性信心不足，便开发了输出 160 位结果的`SHA`（安全哈希算法）。随后又推出了`SHA-1`和`SHA-2`，它们是当今最常见且最广为人知的算法，因为它们构成了互联网加密的基石，并用于安全通信技术，如网络证书、`SSL`、`TLS`等。\n\
    \n目前，`MD5`和`SHA-1`已被证明容易受到碰撞攻击，不再被认为是足够安全的。NIST 正在研究一种结构不同的`SHA-3`。随着计算能力的不断提高，这种开发预计将持续进行。\n\
    \n总而言之，哈希是一种为数据输入创建摘要或“指纹”的函数。这个“指纹”犹如人类的指纹，并非绝对唯一，也可能由另一个输入产生。这被称为碰撞。碰撞只能通过暴力破解实现，即尝试大量不同的随机输入，而不是通过逐渐接近哈希值的增量式改变。这是哈希的一个关键特性，在\
    \ Hashcash 中得到了创新性的应用，我们将在后面的“工作量证明”部分看到这一点，但首先我们必须回到数字签名。\n\n# 数字签名\n\n在迪菲和赫尔曼工作的基础上，李维斯特、沙米尔和阿德曼还展示了他们的方法如何用于签署消息。如果鲍勃用爱丽丝的公钥加密了一条消息给爱丽丝，他就可以使用自己的私钥生成该文本的签名。爱丽丝随后可以解密消息，并使用鲍勃的公钥验证这确实是鲍勃签署的。这个过程被称为不可否认性，即证明某人必须签署了此文件。在合同和资金转账的情况下，不可否认性尤其重要。数字签名证明了特定文本是由属于已知所有者公钥的特定私钥签署的。\n\
    \n要实现数字签名方案，其中一个缺失的拼图块是如何便捷地签署消息。对整个消息进行签名计算量很大，因此需要另一种方法。消息可以在签署前进行缩减。无需签署整个消息，可以创建消息的哈希值。正如我们之前所见，这是一个指纹，极不可能由其他输入产生。因此，该指纹代表了这条消息。然后，这个哈希值可以用作者的私钥进行加密。\n\
    \n使用作者的公钥解密签名，即可得到哈希值。接着对原始明文消息进行哈希运算，并将得到的哈希值与从签名中推导出的哈希值进行比较。如果两者相同，则证明了持有与作者公钥对应的私钥的人加密了该消息，或者说，作者确实撰写了这条消息。\n\
    \n这种效应可以用于不同场景。首先，它可以用来记录合同文本。例如，如果合同双方持有不同版本，就能以数学确定性证明哪个版本是正确的：即产生已签署哈希值的那个版本。其次，它可以用来证明消息的完整性，即没有人在这条消息传输期间或之后在其中插入了任何内容。\n\
    \n因此，数字签名比传统签名更高效，因为它能证明签署人签署了文档以及该文档的特定形态。这是我们在区块链的许多应用中将会看到的一个特性。\n"
- fmt: '# Proof of Work


    Unfortunately, privacy was not the only new problem email introduced into digital
    communication. Another problem with the networked world was derived precisely
    from its purpose: to make communication immediate, easy, and free at any distance
    to any number of people. Bypassing traditional barriers for communication, such
    as printing and distributing books and newspapers and writing and posting emails,
    proved liberating for most, but the downside was that it opened for new phenomena
    that these barriers had kept in check: scams.


    When I was a child, I remember that sometimes you would receive a note that you
    won some German lottery and you just had to pay for the lottery ticket or something.
    Of course, this was not true but a scam to get money from people. It was, however,
    relatively rare because mailing a letter was not free. The economics of the scam
    had to make sure that a significant percentage of people would pay. If the postage
    of a letter was `$0.50` and the scam would yield `$100`, only `200` letters could
    be sent out. This means that the conversion had to be `1 in 200`.


    With the advent of email, these economics changed. If a letter costs `$0.0001`
    (allowing for some funds to cover the Internet connection and domain registration),
    the conversion rate now only has to be `1 in 1,000,000`. Not only scams could
    now be economically distributed; any kind of advertising or political propaganda
    could be communicated at this price point compared to comparable rates for advertising
    in newspapers or TV. This gave rise to the phenomenon of spam, which still haunts
    us today.


    The root cause of this is not that people suddenly became more susceptible or
    open to advertisement and fraud. Instead it is the simple fact that the cost of
    communicating had been lowered so much that even meager success rates became profitable.
    Since it would be against the very idea of the Internet to begin to tax communication,
    it was necessary to start thinking about it differently. If it was possible to
    incur a price on the sender but not the receiver as in the old model of communication,
    it would be possible to change the dynamic and limit spam by making it more costly.


    ## Combating Junk Mail


    Again the world of cryptography came to the rescue. In 1993 Cynthia Dwork and
    Moni Naor presented an idea to impose what they called a pricing function to combat
    junk mail. They recognized that the cost of electronic communication would not
    be a deterrent and that implementing any legal restrictions would not be feasible.
    Instead, they looked for another type of cost on transmission: “The main idea
    is for the mail system to require the sender to compute some moderately expensive,
    but not intractable, function of the message and some additional information.”
    The cost would here be imposed by the price of computation, that is, from hardware
    and electricity. This idea is what would later be known as proof of work.


    The problem seems similar to the one-way functions of encryption. We saw how they
    were easy to decrypt with the key but almost impossible without. We still want
    the same asymmetry where it is easy for one party (the receiver) and hard for
    the other party (the sender), but we don’t want to make it too hard. The quest
    was, therefore, for a way to adjust the difficulty of the problem through a parameter.


    To make the function predictable and not depend on the length of the email, they
    suggested the function should be based on the hash function, which, as we saw,
    always yields a string of the same size. Based on this input, the pricing function
    should be able to turn the difficulty of computing the result up and down through
    some parameter. The result should be easy to check. They suggested three families
    of functions but remarked that further research was needed since cryptography,
    until then, had paid little attention to moderately hard functions. All attention
    had been on developing virtually unbreakable functions.


    ## Applying Proof of Work


    It was not until 1999 that this idea was formalized and given the name proof of
    work in an article by Markus Jakobsson and Ari Juels. They note several different
    ways that proof of work can be used. One of them is as a way to control the delay.
    This type of usage aims to control how long it will take to solve the cryptographic
    problem. Such use had been developed in 1996 by Rivest, Shamir (of the RSA paper),
    and Wagner, which they called a time-lock puzzle.


    Rivest and Shamir also developed an application of proof of work, which they called
    MicroMint. This was, in fact, a cryptosystem designed for micropayments over the
    Internet. They describe the scheme thus: “MicroMint “coins” are produced by a
    broker, who sells them to users. Users give these coins to vendors as payments.
    Vendors return coins to the broker in return for payment by other means. A coin
    is a bit-string whose validity can be easily checked by anyone but which is hard
    to produce.”


    As a method of doing this, they suggested hash function collisions. Recall that
    a hash collision is a situation where two different inputs to a hash function
    yield the same output, that is, the same hash. In the article, they showed that
    it is possible to control how difficult such a collision should be.


    In this scheme, a broker produces MicroMint “coins,” which are bought by a customer,
    who purchases something from a vendor who redeems the value from the broker. The
    problem in this setup is the one that would be discussed frequently in the cryptographic
    community in relation to digital currencies, namely, that of double spending,
    because how would the vendor know that the “coin” was not already spent and redeemed
    by another vendor?


    ## Digital Postage


    Adam Back picked up on this challenge. He started to work on the Hashcash system
    already in 1997. The `Hashcash` solution has a function that computes a token.
    His solution allowed us to dynamically adjust the difficulty of producing `Hashcash`
    tokens. These tokens are similar to the MicroMint coins suggested by Rivest and
    Shamir. Unfortunately, like them, he had no solution for the double spending problem
    other than keeping track of it in a centralized database. Through `Hashcash`,
    Back sought to provide a mechanism whereby it would be possible to throttle un-metered
    Internet resources such as email. Even though he hinted that it could be used
    for digital cash, it was not explicitly generalized toward that end. That and
    the solution to the double spending problem would not come until ten years later
    with the proposal of Bitcoin.


    ## Adding Cost to Free Information


    Proof of work was a consequence of the falling costs of mass communication. It
    introduced a way to use cryptographic functions to provide puzzles that would
    require a predictable expenditure of CPU. This, in turn, translated into cost.
    A variable cost could now be added to previously free functions. The problem with
    doing this with email was that no system ever gained widespread adoption. Instead,
    the industry focused on spam detection and blacklisting mechanisms to eliminate
    spam. If it were not for the application of proof of work later in Bitcoin and
    subsequent blockchains, it might have been confined to the already extensive rarity
    section of cryptography.'
