    # 规范化


    在这一情景下，比特币将适应周边的主流文化，成为大众化的事物而非小众追求。要实现这一点，需要满足若干条件。


    监管范式需要完善。如果比特币要成为一种主流货币，若干法律问题有待解决。这更多关乎监管的明确性，而非宽松或严苛。我们看到多个司法管辖区正朝这个方向努力，但尚未完全实现。最大的问题之一在于，比特币在法律上究竟如何定性需要明确，而不同国家甚至同一国家内部对此的定义都各不相同。例如，欧盟尚未通过专门针对比特币的法规。因此，成员国地方上往往沿用旧有法律（常常已逾百年历史）来管理比特币的交易和税收。在美国，比特币被归类为货币、商品还是资产，取决于你询问的是哪个政府机构。


    如果美国和欧盟决定像接受其他货币一样接受比特币，并将其纳入现有的反洗钱法规，那将是迈向规范化的一大步。这意味着银行可以开始代表客户接受和管理比特币账户。这能扩大比特币作为交易媒介的用途。银行现有的资金转账和清算流程也将适用于比特币。这将让目前对比特币交易持怀疑态度或感到疏离的人群也能使用它。实际上，银行可能会像当代加密货币交易所一样运作，仅在彼此之间转移汇总金额，并在内部账户中管理内部转账。这将最大程度减少区块链上的交易总量。


    在这一情景下，每个人都会将数字钱包作为经济交易的主要工具。它可以成为新超级应用的一部分，基于数字支付提供商现有解决方案构建，或由专业公司提供。在这款应用中，你可以无缝使用加密货币、法定货币或任何其他类型的货币进行支付。没有理由不让积分奖励也成为其中一部分。客户将能够无缝兑换比特币和加密货币。


    通过这款应用，比特币提供全球汇款服务的承诺将成为现实。身处高通胀、政治和银行体系不稳定国家的人们，可以将资金存储在其他货币中。至于这会选择比特币还是与法定货币挂钩的稳定币，则取决于它能否抑制自身波动性。第三世界国家的人们通常不太参与关于法定货币通胀特性的意识形态争论，而更关心自己的储蓄在明年计划买房时是否还在，而非在比特币的下一个萧条周期中损失殆尽。


    这款钱包也可成为法律和经济活动的新平台，所有权可以通过销售进行记录和转让。随着在数字钱包中以智能合约确立所有权日益普遍，它开始吸收此前在线下记录的所有权类型，尤其是数字资产。例如，股票可能仍会留在银行体系内，但零星股可以在此交易。同样，房屋等其他资产的所有权将保留在国家认可的所有权记录方法中，除非是最为进步的州（很可能是一些较小的州），它们可能允许使用区块链来登记合法所有权。


    由于结算速度提高且费用可能降低，这一发展将提升比特币对线上和线下商户的支付吸引力。此外，与当前状况不同，交易很可能可以提出争议，因为交易主要发生在银行体系的链下环节——大多数比特币支付由银行体系处理而非直接进行。


    我们在第 8 章中看到，比特币缺乏基本效用（尤其是作为交易媒介和记账单位）是其波动性的主要原因之一。在这一情景下，由于基本效用得以提升，波动性将降低，比特币价格将稳步上涨，但不会像头十五年那样剧烈。


    这将导致许多最初的比特币信仰者退出，他们认为这种新发展是一种可憎之物。可能会形成另一个分叉，或者他们会团结在比特币现金周围，将其作为比特币的主要变体，以保留创始人的原始理念。他们可能会试图规避许多新出台的法规，而交易所将迁往其他监管更宽松的地区。

    '
- fmt: '## Fringe Consolidation


    In this scenario, the general public loses patience with Bitcoin. The boom and
    bust dynamic leads to one too many busts for the regular bitcoin investor, who
    by this time would primarily have memories of losing money on bitcoin because
    they, unlike the more sophisticated bitcoin traders, do not have the tools to
    spot the next down cycle and get out of their investment.


    This development could be exacerbated by political pressure to regulate Bitcoin
    harder and, in some cases, downright ban it. Some countries will take the route
    of China, which in 2021 banned all cryptocurrency trading. This was due to concern
    over financial instability. At the same time, China is developing its own cryptocurrency
    tailored to the state''s needs. Other countries are similarly already working
    on virtual versions of their fiat currencies. Introducing virtual fiat currencies
    could be the impetus for a more brutal crackdown on the less governable decentralized
    cryptocurrencies.


    Cryptocurrencies would almost wholly be traded through offshore destinations outside
    the regulation of Western and Asian nation-states. Some territories and smaller
    sovereign countries will see an opportunity to provide the legal and financial
    framework for the cryptocurrency industry. This development is already underway
    with many cryptocurrency exchanges and companies established in the Caribbean
    and other jurisdictions outside US, Chinese, and European regulation.


    If government fiat currencies were to adopt many of the features of cryptocurrencies
    with their local adaptions, the push to adopt bitcoin for regular people who are
    not necessarily against the government would be much smaller. On the other hand,
    if governments were to go from tolerating cryptocurrencies as is the case now
    to a more active antagonistic stance that would also pressure citizens with the
    threat of legal action, as is the case in China, it would significantly reduce
    the number of active users. This could result in a situation where the demand
    for bitcoin is reduced leading to a downward trend in the price. That would lead
    to a sell-off but not a complete abandonment since the true believers of Bitcoin,
    Bitcoin maximalists, and other people for whom the global and anonymous features
    of Bitcoin would continue to be helpful would continue to use it.


    This scenario leads to different economics for the miners since the basis for
    their profitability is the value of bitcoin. Earlier we saw that bitcoin is tough
    to kill off completely since it will easily adapt to even massive drops in mining
    power. That would also happen in this scenario. Like any downward movement in
    bitcoin, the miners with the highest cost base for mining would be the first to
    see their profitability shrink and eventually disappear. This sets in motion a
    process whereby miners leave the network. While the total hash rate would drop,
    the difficulty of mining would adapt, which would decrease the cost of mining
    bitcoin, making it profitable for the remaining miners.


    In this scenario then, bitcoin and cryptocurrencies would consolidate around a
    smaller user base than currently. It would consist of firm believers and people
    who need bitcoin for practical reasons. That could be cyber and other criminals,
    terrorists or freedom fighters (depending on how you look at their cause), and
    dissidents of oppressive regimes. Nevertheless, Bitcoin would still be the currency
    of choice to power black markets where absolute privacy is necessary. It could
    thus continue as a fringe virtual currency but with a significant scale.


    ## Disappearance of the Nation-State


    The previous two centuries have seen the rise of the modern nation-state as the
    primary mode of organization of people on the earth. Today, with very few exceptions,
    such as Antarctica, all land is in one way or another related to a nation-state.
    The highest global governance body is the United Nations. It has become so self-evident
    that we rarely pause to think that it is a recent anomaly in human civilization.
    Let us, therefore, reflect on other alternative modes of organization that have
    historically prevailed through larger periods of time.


    The most foundational and ubiquitous is the tribe consisting of a band of people
    often closely related by kinship. Indeed kinship was the primary focus of anthropology
    when it emerged as a discipline to study human culture. Tribes continue to exist
    formally and informally within and across nation-states but are rarely endowed
    with sovereignty.


    Historically, there is another mode of organization that has been dominant: the
    city-state. It is hard to think that well-known European nations such as Italy
    and Germany were emphatically not nation-states until little more than a hundred
    years ago but were dominated by local city-states for millennia. A city-state
    is similar to a nation-state but is defined by the extent of one city and its
    surrounding land. It is sovereign and self-contained. It does not depend on any
    outside entities. We know famous city-states like Venice, Athens, Rome, Babylon,
    and Bangkok. They still exist today even as sovereign entities like Monaco, Singapore,
    and Vatican City.


    Another mode that has historically also held sway over large swathes of land for
    long periods of time is the empire or kingdom. These would often comprise city-states
    and territories belonging to tribes. Some empires have lasted for centuries but
    tend to be more volatile, and their extent changes continually, unlike the city-state.
    The empire usually depends on centralized governance with varying degrees of regional
    autonomy.


    The premise of this scenario is that something happens that triggers the decline
    or fall of the modern nation-state as we know it. That could be due to losing
    relevance, new political developments, or violent upheaval like World War III.
    It would, therefore, probably revert to one of the other stable modes of human
    organization we have seen throughout history, that is, tribes, city-states, or
    empires.


    A World War III could erupt in which the most significant nation-states decided
    to consolidate territory they felt they could claim, perhaps due to historical
    arguments or pure opportunism, which we see today in actions and rhetoric from
    Russia and China. That would see the emergence of a few large regional empires.
    However, it could also happen that smaller nation-states willfully gave up their
    sovereignty to seek the protection of a competing empire.


    In this situation, much of the international banking system will be impaired.
    Empires would seek to establish their trading systems to exercise power over trade.
    That would leave the area of global trade open for competition since no globally
    accepted payment system like Swift would exist any longer. In such a situation,
    bitcoin would be very convenient for international payments and exchange since
    it is neutral. The fact that it is a currency truly ungovernable and not subject
    to the whims of any single entity (like the dollar is to American interests) allows
    it to emerge as a consensus payment system that will power cross-border payments.'
