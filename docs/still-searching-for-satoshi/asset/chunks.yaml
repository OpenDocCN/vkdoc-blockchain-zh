    # 虚拟货币之梦


    早在第一批虚拟货币问世之前，梦想与愿景就已描绘出它们可能的样子。其中一些想法惊人地接近千禧年前后成型的最终产品。这些想法启发并帮助塑造了最初的虚拟货币尝试。我们需要回顾这些早期愿景，才能充分理解虚拟货币后来的发展轨迹。


    奥地利经济学家弗里德里希·哈耶克曾是、现在也依然是加密货币世界的重要灵感来源。这位诺贝尔奖得主是奥地利经济学派的主要人物之一。他的论点之一是，货币应从国家掌控中剥离，转而允许多种私人货币自由竞争。不难理解这为何会启发比特币及其他虚拟货币。哈耶克的货币愿景是：自发的秩序并非源于人类的规划（如国家货币模式所示），而是源于人类在自由货币市场中的行动。因此，一个集体大脑将从多种非政府货币中涌现。在哈耶克的虚拟货币构想中，唯一缺失的是数字化的表现形式。其余的一切都已存在，可供后人拾取。


    在哈耶克撰写其主要著作时，实现真正虚拟货币的技术尚不存在。然而，随着 20 世纪 80 年代现代个人电脑的问世以及 90 年代互联网的普及，价值的数字化表示成为可能，或者至少可以想象。对于第一代黑客、"婴儿潮一代"以及受反主流文化启发的计算机程序员而言，自由与解放的理念占据着崇高地位。他们的梦想不仅是让软件和信息自由，还包括让货币的使用变得自由。


    在科幻世界中，至今仍指引着我们的未来构想得以成形。最具影响力的早期科幻作品之一是 1981 年的中篇小说《真名实姓》，作者是圣地亚哥的数学教授弗诺·文奇。在《真名实姓》中，文奇描绘了一个由名为“异界”的计算机中介的世界，这或许是首次描绘出一个平行虚拟世界的景象——威廉·吉布森后来在其小说《神经漫游者》（首次使用“赛博空间”一词）中，以及尼尔·斯蒂芬森在其小说《雪崩》（创造了“元宇宙”一词）中均沿用了这一概念。在《真名实姓》中，我们跟随一群黑客，他们的名字甚至对彼此都保密。他们冒险进入“异界”入侵计算机窃取信息。他们必须对自己的姓名保密，以免被政府抓获。这部小说引入了虚拟世界的概念，在这个世界中，隐私对于躲避政府至关重要。但在文奇的世界里，没有虚拟货币。银行和货币依然存在。


    蒂莫西·C·梅继承了文奇的构想。梅是一名工程师，34 岁时从英特尔退休——他计算了维持余生独立所需的生活费后便做出了这个决定。梅是密码朋克运动的创始成员之一（比特币正是从该运动中孕育而生），也是《密码无政府主义宣言》的作者，该宣言也成为了寻求私人虚拟货币的重要驱动力。


    1993 年，他写了一篇虚构作品，延续了文奇创造的世界。作品中，一个名为黑网（BlackNet）的组织从事着信息黑市交易。黑网成员无人知晓彼此的真名。人们可以通过公开的在线新闻组（论坛）与该组织交流。黑网会发布一个公钥用于加密信息。要给他们写信，你可以使用这个公钥配合一个私钥，创建一条只有黑网能解密的消息。消息中包含请求的信息和付款条款。黑网可以向你的银行账户匿名存款，或者更有趣的是，以“加密信用点”（黑网的内部货币）的形式为你增加信用额度。加密信用点可以存储起来，用于购买其他秘密信息。在这个基于已知技术构建的虚构世界中，我们看到了未来加密货币的轮廓，而此时距离任何一种加密货币被创造出来，还有近
    20 年之久。


    # 匿名数字现金觉醒


    大卫·肖姆及其公司 DigiCash 的故事，以及其产品 eCash 的崛起，是一个领先于时代（数十年甚至更久）的先驱者的故事。同时，它也是凭借成功的实施和相对早期的成功而影响了比特币及所有后续虚拟货币的故事。对许多人而言，这成为了虚拟货币至少应达到何种标准的灯塔。


    早在 20 世纪 80 年代，大卫·肖姆就致力于数字现金的想法。在他 1982 年的论文《用于不可追踪支付的盲签名》中，他对电子支付中固有的隐私缺失问题提出了质疑。通过支付信息，可以收集到付款人大量的私人信息。这一主题在后来关于虚拟货币的讨论中反复出现。他的提议是利用密码学来消除这一问题。这篇论文仅仅是对该想法的概述，而非一个实际系统。通过使用密码技术实现的所谓“盲签名”，有可能提供一个支付系统，使支付无法被追踪，但可被审计以验证交易确实发生。该系统并未提及一种新的独立货币，而是为现有的银行和支付系统提供了一种保密运作的方式。


    1990 年，肖姆基于这一想法创立了 DigiCash 公司。DigiCash 创建了第一个功能性私人数字支付系统。该系统允许人们将资金从银行账户转移到 DigiCash
    的 eCash 中。使用这种 eCash，你可以像使用信用卡一样向接受它的商家付款。区别在于，支付时只会验证你是否有资金，而商家可以在发行银行兑换这些资金。这一切都无需知道进行交易者的身份。流程如下：当你想付款时，你像使用自动取款机一样从银行提取资金。银行会生成一张带有序列号的相应金额的票据。通过密码学，可以创建一个不追溯到用户、但能证明它是由真实货币支持的真实票据的序列号。在该系统中，商家的身份并非匿名。通过这种方式，DigiCash
    创建了一个既能保护用户隐私，又不会帮助犯罪分子隐藏身份的系统。顺便说一句，这可能也是 DigiCash 的 eCash 是唯一一个没有遭遇刑事滥权和洗钱指控的虚拟货币实例的原因。


    DigiCash 相对成功，其软件适用于所有标准操作系统；公司正在与 Visa、荷兰国际集团（ING）和德意志银行进行谈判。微软甚至提出收购它，以便将其集成到
    Windows 操作系统中。然而，不到十年，DigiCash 就破产了。这很可能更多归咎于管理层面的失败，而非技术、监管或市场原因。尽管如此，其遗产不容低估，因为它提供了一个参照点和证据，证明私人数字现金是可行的，从而启发了后来对数字货币的尝试。其重点完全在于消费者隐私，而非规避政府或创造一种具有投机意义的新货币。其他项目则提供了这些目标。

    '
- fmt: '# The Liberation of the Dollar


    After `DigiCash`, another attempt was made at creating a currency in the form
    of the Liberty dollar. Although it also had a virtual component, its conception
    came from a physical manifestation in the shape of a silver dollar. It was fueled
    by the very same ideas as other virtual currencies, and its demise illuminated
    a theme that would come to dominate digital currencies in decades to follow.


    `Bernard von NotHaus` had long speculated about value. Already in 1974, he and
    his partner `Telle Presley` wrote an essay titled “To Know Value—An Economic Research
    Paper.” This document referencing `Aldous Huxley` and `Swami Kriyananda` argued
    that only gold is real and should be the basis of value. This strikes another
    cord that we will repeatedly see among libertarians and `Bitcoin` enthusiasts:
    the regret of losing the gold standard leading to the continuous printing of money
    by central banks, leading to inflation. `Von NotHaus` was adamantly opposed to
    the `Federal Reserve` and founded the organization “National Organization for
    the Repeal of the Federal Reserve” (`NORFED`).


    In 1998 it started to issue silver Liberty dollars through the `Sunshine Minting`
    company based in `Coeur d’Alene, Idaho`. Later gold and platinum versions were
    also available. These could be bought at the silver, gold, or platinum price.
    Since it is illegal to make or sell coins of gold or other metals with the intention
    of use as money in the United States, they were emphatic that they were medallions
    and not legal tender. The coins could be bought physically but also through a
    warehouse receipt that could be exchanged for a Liberty dollar at their warehouse
    in Idaho. While the warehouse receipts were pieces of paper, more interestingly,
    they could also be issued digitally as `eLibertyDollars`. The Liberty dollar thus
    presents a digital store of value, one of the three properties of money, while
    it was not used as a means of exchange or unit of account, the other two properties.


    Unfortunately for `Bernard von NotHaus`, the United States disagreed that Liberty
    dollars were mere medallions, and in November 2007 the offices were raided by
    the `FBI` and `Secret Service` who seized all the coins there. `Von NotHaus` was
    arrested in 2009 and eventually convicted for making and selling his own coins
    in 2011. While his appeal was unsuccessful, the sentence was reduced from the
    23 years in prison demanded by the prosecutor to six months of house arrest and
    three years of probation. A significant number of Liberty dollars were subsequently
    returned to their owners.


    While showing that there was indeed a market for alternative coins (more than
    250,000 were sold) and that digital representations of stores of value were feasible,
    the Liberty dollar also provided a cautionary tale for all subsequent alternative
    currencies. It demonstrated the risk of years of prolonged trials and possible
    incarceration.


    # Digital Gold Currencies


    This quest for private people to own gold and other precious metals that the Liberty
    dollar built on was picked up by other similar initiatives. Up through the 1990s
    and early aughts, there was a spike in companies that offered consumers to buy
    and sell gold digitally. These are commonly known as digital gold currencies (`DGCs`).
    Some were driven by idealists, while others descended into criminal behavior or
    were downright scams from the beginning. The legal aftermath of one of these companies,
    `e-gold`, is the most interesting due to its size and success.


    The history of private ownership of gold in the United States is a traumatic one.
    It is a history that fueled the quest for fair virtual currencies that would funnel
    into cryptocurrencies. To understand why we need to go back to April 5, 1933,
    when `Harry S. Truman` signed `Executive Order 6102`, which forbade citizens from
    owning gold in the United States. This was in effect until repealed by `Gerald
    Ford` in 1974. Owning gold was still a rather cumbersome affair since one would
    have to procure it somewhere, transport it, and keep it safe. Holding it was thus
    a niche affair, but the demand was broader. We have to remember that today it
    is easy to buy and own gold through an online brokerage, but such were only available
    to a small number of people around the turn of the century. As mentioned previously,
    there was a significant niche with a libertarian bent that distrusted government
    in general and the `Federal Reserve` and its ability to administrate the issuance
    of currency in particular. For these people, the fall from grace happened with
    the abolition of the gold standard in the 1920s, whereby money was pegged to gold.
    Under the gold standard, converting money to gold at a fixed rate and converting
    it to other currencies was easy. Since the gold standard could not be re-established,
    the next best thing was to own gold oneself.


    `e-gold` was founded in 1996 by oncologist `Douglas Jackson` and attorney `Barry
    Downey`. Their purpose was to make it possible for ordinary people to buy and
    trade gold digitally. All `e-gold` was backed by actual physical gold. Through
    their system, it was possible for users to instantly transfer any amount of gold
    or other precious metals that they had on their account to another account. This
    was anonymous and final. If a user had transferred the gold to the wrong account,
    there was nothing that the company could do except relay a request to the user
    with a request to transfer it back.


    `e-gold` set a new standard for transparency as their possessions were audited
    and updated daily. The serial numbers of the bullions were published for all to
    see. The company also did its best to stay compliant, for example, by asking the
    `IRS` for an audit to determine what regulations they would have to follow.


    While the start was slow, it accelerated after the turn of the century. At its
    peak, it was processing more than 2 billion USD per year, and it had 5 million
    accounts when its operations were halted in 2009. While the Liberty dollar was
    primarily about a store of value and a statement, `e-gold` had more success as
    a means of exchange (it was even used as a form of payment on `eBay`), so much
    so that it was eventually also used by criminals and money launderers. Finally,
    `Douglas Jackson` and `Barry Downey` ended up being charged with running an unlicensed
    money-transmitting business and conspiracy to engage in money laundering. Although
    they tried tenaciously to defend themselves against the charges, they entered
    a plea agreement that gave the two founders fines, home detention, and community
    service. The money in accounts was eventually disbursed to clients, and the company
    closed down. To many people interested in virtual currencies, this was a key case
    where the founders tried their best to follow regulations but still got criminalized
    and prosecuted by the government. This reinforced the idea of a government that
    could not be trusted.'
