- fmt: '### The Rossel Islanders


    In the tropical sun lies a small isolated island in the easternmost part of the
    Louisiade Archipelago in Papua New Guinea. It is called Rossel Island. It has
    a population of only a few thousand. Their language is not related to any other
    known language and is notoriously difficult to translate. The inhabitants live
    almost entirely secluded, with little interaction with the outside world. The
    basic social units on Rossel Island are families living in a few small villages.
    The economy is centered around subsistence farming with some growing of cash crops.
    Anthropologist John Liep who worked there for four decades beginning in the 1970s
    distinguishes three economic spheres: the domestic, commodity, and ceremonial
    exchange domains.


    Exchange in the domestic domain is rendered as kinship services and thus does
    not necessitate a balance of reciprocity mediated by gifts, barter, or money.
    This is similar to most cultures where family units help each other without keeping
    tabs. For example, the most common exchange is help in gardening, which would
    be paid for by a meal.


    The commodity domain involves clothes, kerosene, batteries, and such. This was
    mediated through cash, which the Rossel islanders earned through labor at plantations
    or through sales of cash crops. The commodity domain was dominated by Western
    currency but only related to commodities traded with the outside world. Thus,
    money was restricted and could only be used to acquire imported commodities.


    The ceremonial exchange domain is the main domain for social life on the island,
    where payments are made for dowries, concerning death and funerals, as well as
    the central ceremony of the pig feast. In this domain, payments are made with
    the local type of shell money called `ndap` and `ke`. They derive from two different
    species of seashell and have different values.


    The `ndap` is the most valuable and is further subdivided into three groups. The
    very high division is rare; probably less than a hundred shells exist. The high
    division is only slightly more prevalent, while substantially more shells exist
    from the low division. Liep estimates that only 20,000 shells exist in total,
    averaging 41 per household.


    Exchanges, as part of bridewealth, follow complex patterns where a specific number
    from the different divisions needs to be produced over several payments. Similarly,
    at the pig feast, different parts of the pig can be purchased for different types
    of `ndap`. The very high division was previously only used for the most important
    exchanges, like the taking of human life as compensation to the relatives of the
    murdered victim. They are no longer used as payments but can be used as securities
    against loans.


    The high division plays an important role in the ceremonial exchange system. One
    of the shells from this category is usually given as the first payment in a bridewealth
    sealing the marriage contract. It can also be used for the main part of the pig
    at a pig feast or for houses or canoes. The low division circulates more freely,
    but not like Western money. These are often used for payment in higher numbers
    for parts of the pig at the pig feast and all other exchanges.


    The `ke` is a string of ten shells common across the Pacific Ocean, and even fewer
    exist. Liep estimates only 2,500 in total. They are less valuable than the `ndap`
    and form their own ranked classification system denoting the value. A conversion
    rate between `ke` and the low division of `ndap` establishes a cross between these
    two currencies.


    The shell money of Rossel Island is thus used for goods and services that are
    traditional for the inhabitants, like marriage, funerals, feasts, and the building
    of canoes and houses. Western money can’t be used in this sphere. Western money
    is used for commodities acquired from the outside world and only there. In the
    domestic sphere, kinship forms a framework for exchanging services such as help
    with gardening and other domestic types of work.


    ### Cigarettes


    “Black market activities are playing havoc with the economy in most countries
    in Europe and cigarettes are supplanting national currencies as legal tender.
    12 dozen fresh eggs for 100 cigarettes. Swedish silk stockings for 35 cigarettes
    a pair,” a returned Canadian airman was quoted saying in the *Saskatchewan* newspaper
    in January 1946. In the aftermath of World War II, black markets emerged due to
    food shortages and a general economic downturn. Cigarettes were used as an alternative
    form of payment in these markets. It was not because national fiat currencies
    had disappeared but because inflation was high. In Germany, foreign currency exchange
    was restricted, which led to cigarettes taking over as a medium of exchange. It
    was also used by people who did not smoke and thus acquired value surpassing their
    commodity value.


    This is not a unique event arising out of special circumstances. The same happened
    in the Yugoslavian civil war at the beginning of the 1990s and was even documented
    in the recent war in Ukraine under the Russian occupation of Kherson. Cigarettes
    seem to continuously pop up as currency in connection with war.


    But cigarettes also seem to take on the role of money in other contexts. In American
    and British prisons, where inmates do not have access to money, they have long
    held the role of alternative currency for goods and services traded among the
    inmates, even if they have recently been eclipsed by ramen noodles, which are
    also healthier.


    It can be seen that under certain circumstances, a commodity like cigarettes can
    take on the role of money. This seems to happen when the smooth function of the
    monetary system is somehow impeded: in prisons, currency is plainly unavailable
    in post-war Europe. It was either consciously limited by blocking foreign currency
    exchange or inconvenient due to high inflation. In modern wars, using cigarettes
    instead of money happened when exchange with the outside world was constrained.
    Alternative currencies can thus emerge at different times under different circumstances.


    ### Points


    Around 2009, the Danish retailer Coop relaunched their loyalty program called
    Coop Plus. Here members could get rewarded in points rather than the local Danish
    currency, crowns (I was myself involved in the implementation of this). The points
    were pegged to crowns at a fixed rate. When you shopped in Coop’s stores, you
    received points. These could be redeemed in an online store where points could
    be used alongside crowns to pay for products.


    Once a year, any balance of points would be released for store purchases. The
    exchange rate would be used to convert to crowns. The customer could access their
    virtual wallet with these funds by scanning the membership card. It was impossible
    to withdraw or purchase points. Only purchases would generate these points. Coop
    thus seemingly minted currency for their members. From an accounting perspective,
    this was not what happened. Rather the points were considered a deferred discount.
    The points were thus considered a right to a future discount.


    It is common in retail to offer rewards. Today, almost any modern retailer has
    some sort of loyalty program where members can get rewards. Often these are discounts
    or rewards, but points are still used in some places. It is commonly restricted
    to the same company’s stores, but more generic reward programs have been known.'
