  trans: '

    # 加密货币如何成为货币


    密码学曾是一个两千年来鲜有变化的边缘学科，主要局限于军事和政府外交领域。如果有人在 20 世纪 60 年代初提出，密码学将成为全球数字通信网络和一种新型货币的核心，得到的反应很可能是轻蔑一笑和翻个白眼。


    但这一切在 20 世纪 70 年代发生了改变。现代计算机的出现以及数学理论更聚焦的应用，引发了一场重大变革，彻底改变了密码学和数字通信。公钥密码学和哈希算法的发现，为如今支撑互联网信息基础设施的诸多创新铺平了道路。它也奠定了坚实基础，让数字货币的梦想成为现实——以至于这类货币后来被称为**加密货币**。


    然而，这还远远不够。正如我们所知，这类加密货币在世纪之交就已有人提出，但一些问题依然存在，最显著的是双重支付问题，即如何证明某个代币或币种尚未被花掉。另一个问题是中心化，因为所有提出的模型都或多或少依赖于一个需要信任的中心化第三方。这是一个重大缺陷，密码朋克们对此心知肚明，也不打算轻描淡写，因为这类似于令人畏惧的银行作为你资金中央看门人的角色。要兑现真正自由虚拟货币的全部承诺，还需要解决几个关键难题。我们现在就来关注这些难题。


    # 3. 公共记录


    数千年来，人类必须建立一种共享且无可争议的真相。在口语社会中，这通常通过死记硬背和口头表演来实现。古典时代是口语社会如何建立这种共享公共真相的典型例子。古希腊诗人，如赫西俄德和荷马，代表了丰富的口头传统。韵文并非创意创新的艺术出口，恰恰相反。古希腊崇尚的是过去，而非未来。韵文是建立关于过去的共享公共记录的主要技术。


    通过吟诵韵文，英雄事迹和古老神话在时空上建立了几乎相同的版本。韵文格律是一种助记技巧，吟游诗人无论走到哪里，都能以相同的方式背诵信息，并传授他人，使他们能够复刻相同的英雄事迹和神话记录。他们能记住并吟诵数万行诗句，但这仍不是建立共享公共记录的高效方式，希腊神话众多版本各异便是明证。只有使用文字，公共记录才能不受任何特定个人记忆的干预而流传后世。


    ## 最早的文字与单式簿记


    创建书面共享公共记录的过程，早在赫西俄德和荷马的作品被记录下来之前数千年就已开始。最早的文字实例来自公元前四千纪，以古代美索不达米亚（今伊拉克）的楔形文字泥板形式出现。这一地区被称为“新月沃地”，是已知最早人类文明的摇篮。


    楔形文字是象形文字，由不同形式的图画和符号组成。这些泥板记载的并非神话或英雄事迹，而是诸如牲畜、谷物和玉米等日常记录。这是一份关于所有权的公共记录，在古代中东地区以不同语言使用了三千年之久。后来逐渐加入了音节和其他符号，但其主要用途始终如一：在公共记录中记录所有权。因此，这一功能甚至比文字本身更为原始，比关于神话和法律的散文文本早出现数千年。因此，我们必须认识到，这是一项对人类文明至关重要且强大的技术。


    如果说密码学的目的是混淆和隐藏信息，那么公共记录的目的则恰恰相反：记录信息并将其提升到共享且无可争议的真理层面。将信息记录在粘土或其他石质媒介上，而非纸莎草、兽皮或蜡板等更柔软、更易变的介质，使信息变得不可篡改。这在面对相互矛盾的版本时确立真相特别有用，尤其是在涉及有价值物品所有权的问题上。一种让记录不可篡改的技术，是使其成为所有权记录基础的前提条件。


    如果记录可以随意更改，那么信息便不适合用来确立真相。因此，数千年来，石头一直是首选媒介，雕刻符号则是建立公共记录的技术。如今，我们在纪念碑、墓碑和宗教圣殿上仍能看到这种做法的遗迹。这些都是某人希望流传后世、使之无可争议的信息实例。然而，它已不再是记录经济交易的首选技术。


    随着城市人口的扩张以及随之而来的经济产出增长，交易量增加到不再适合用笨重厚重的泥板来记录所有信息的程度。每块石板能记录的信息与其体积和重量相比非常有限。纸莎草和兽皮等其他技术因其更轻便、占用空间更小而流行起来。信息内容与重量、物理体积的比率更高了。而对于大多数金融交易而言，通常并不需要像石质媒介那样将信息保存数百年或数千年。因此，这些更轻便的媒介逐渐成为记录金融信息的重要工具。从古代到中世纪，它们一直是创建财务记录的首选格式。这便是后来被称为会计学的学科所采用的技术。


    美索不达米亚体系被称为单式簿记系统或现金基础会计。它将交易作为列表上的条目进行记录。

    '
- fmt: '# The Accounting Revolution and Double-Entry Bookkeeping


    Single-entry bookkeeping is undoubtedly superior to having no system for documentation.
    Still, it is also liable to errors and fraud since there is no check on the entry
    into the system. It is impossible to investigate whether any single entry is correct
    or who made the entry. Therefore, single-entry accounting systems are only viable
    for enterprises where perfect trust is in place, like a household. When there
    is always just a single transaction entry, the enterprise must trust that it is
    done correctly. This was indeed the case for most of history, but it was necessary
    to improve this system of accounting to achieve further economic development.


    The Romans developed many essential techniques for managing accounting, but medieval
    times saw a reduction in complex economic activity, and those techniques seem
    to have been forgotten. Only in the developments of Renaissance Italy would a
    revolution in accounting take shape. With their mercantile prowess and global
    ambition, the city-states of Florence, Genoa, and Venice became the centers of
    developing the next step in establishing a record of financial activity. It was
    here that the practice of double-entry bookkeeping was developed. These principles
    are still adhered to today in modern enterprises.


    The earliest examples of double-entry bookkeeping can be traced to the thirteenth
    century, although even the Romans practiced it in some form. The Roman writer
    Pliny the Elder described the practice around 70 CE. Still, it wasn’t until the
    end of the fifteenth century, when Luca Pacioli described it in his *Summa de
    arithmetica, geometria, proportioni et proportionalita* in 1494, that it became
    a well-described standard that subsequent generations of accountants would use.


    Double-entry bookkeeping aims to account for all transactions of money to detect
    errors and fraud. One transaction in double-entry bookkeeping always affects two
    accounts. These have two sides: debit and credit.


    The transaction will appear as debit on one account and credit on another. If
    a merchant buys products from a supplier, the payment will show up as credit on
    the supplier’s account and debit on the merchant’s account for purchased goods.
    When sold, it will be debited to a customer account and credited to the purchased
    goods account.


    If, on the other hand, a posting is made to the purchased goods account to credit
    it, indicating that something has been sold, but no debit record is made on any
    other account, it could mean that somebody pocketed the money somewhere.


    Debit and credit accounts are supposed to balance if all transactions have been
    recorded correctly. If not, it is a sign that there is an error. The double-entry
    system thus provides the possibility of auditing past transactions.


    This system became the standard among merchants of the Italian city-states around
    the time when their mercantile empires transformed Europe from a stagnant medieval
    patchwork of local competing powers to the center of a global trade network. The
    clarity and insight into a company’s financial transactions helped lift trade
    from a local occurrence to a sizeable global affair. It was not the only factor,
    but it was critical in laying a foundation for the modern world through companies
    such as the Dutch East India Company, which built a global trade network and became
    the first common stock company. Transparent accounting practices makes it easier
    to understand why investors would have invested so much in this. Accounting practices
    helped bring clarity into the economic transactions performed by a company. With
    double-entry bookkeeping, it was possible to audit the books and spot fraud and
    errors, and someone external could audit the company.


    # Information Technology and Triple-Entry Bookkeeping


    Less a new revolution, like the movement from single-entry bookkeeping to double-entry
    bookkeeping, the idea of triple-entry bookkeeping was meant as an extension. The
    sense that something was missing in the double-entry system started appearing
    by the end of the twentieth century.


    For decades, Carnegie Mellon professor Yuji Ijiri had worked on different ideas
    about extending the double-entry bookkeeping system into other dimensions. He
    coined the term *triple-entry bookkeeping* to describe this. His idea was inspired
    by calculus and was also termed *momentum accounting*. It suggested that accounting
    should also keep track of the rate of change over time. He published these ideas
    in an essay in 1982.


    The term, but not the idea, was picked up by Ian Grigg in 2005 in a paper titled
    “Triple Entry Accounting.” The paper did not refer to Ijiri but similarly looked
    for ways to expand the double-entry bookkeeping system rather than replace it.
    Taking inspiration from the theory of database design developed by the English
    computer scientist Edgar F. Codd in the 1970s, he suggested another way of looking
    at accounting.


    In relational database design, several criteria can be required for data organization.
    They are called normal forms. With every normal form, increasing constraints are
    placed on the design. The fourth normal form states that the other three must
    be fulfilled and that data should not contain multi-value dependencies. This means
    that all additional information can be derived from this data. In Grigg’s words,
    “The principles of Relational Databases provide guidance here. The fourth normal
    form directs that we store the primary records, in this case, the set of receipts,
    and we construct derivative records, the accounting books, on the fly.”


    Let us try to open this statement up. Grigg was working in the space of cryptography,
    specifically on how to apply cryptography to accounting. Remember from the previous
    chapter that public key cryptography allowed digital data signage. We saw how
    it could be used for certifying a contract or other text. It could, however, also
    be used to authenticate a transaction. This is what Grigg means by a receipt:
    it is the transaction.


    “In order to calculate balances on a related set of receipts, or to present a
    transaction history, a book would be constructed on the fly from the set. This
    amounts to using the Signed Receipt as a basis for single entry bookkeeping. In
    effect, the bookkeeping is derived from the raw receipts, and this raises the
    question as to whether to keep the books in place.”


    In this view, accounting could be done dynamically by calculating any set of receipts
    or transactions when needed. This system was meant to work through a central issuer
    who would, at any point in time, be able to calculate the balance of each customer
    the issuer handles dynamically based on all previous receipts. For example, a
    customer account could be dynamically calculated at any point in time, and the
    balance be known.


    The transaction is, of course, something that already existed in traditional double-entry
    bookkeeping, but this was a private record used as input for posting. What is
    new here is that a public record of all previous transactions can be maintained
    cryptographically and signed by both parties. Once a receipt is finalized by signing
    from the two parties, it is part of a public record of transactions maintained
    by a central issuer who would always be able to calculate any account dynamically.


    Grigg references earlier attempts at digital cash, such as DigiCash. Still, writing
    two years before the publication of the Bitcoin whitepaper, it is interesting
    to see that the idea of a public ledger of transactions was already being envisioned.
    Only Grigg’s proposal was still managed by a central entity, an issuer, which
    is vulnerable to failure and corruption. Let us, therefore, turn to the next step
    in the journey toward Bitcoin decentralization.'
