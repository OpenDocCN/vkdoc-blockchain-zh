- fmt: '# The Plot Thickens


    In 2015 *Wired* ran a piece that it subsequently retracted, claiming that the
    Australian Craig Steven Wright was Satoshi Nakamoto. Wright himself claimed to
    be Satoshi and sent the documents, first to security researcher Gwern Branwen
    and then to *Wired*. The documents turned out to be an elaborate hoax. Wright
    later continued to claim that he was Satoshi and together with the deceased Dave
    Kleiman developed Bitcoin.


    He even claimed to be able to prove it by having keys that could be linked to
    Satoshi, but in the end, they never checked out, and Wright claimed that he didn’t
    want to proceed to provide the evidence needed. He even had some senior Bitcoin
    people like Gavin Andresen convinced for a short while, but since no cryptographic
    proof was provided, the claims could not be verified.


    In 2019 *Wired* had another go at identifying Satoshi that was curiously connected
    to Craig Wright. Writer and journalist Evan Ratliff had spent five years tracking
    the South African global criminal mastermind Paul Calder Le Roux, who also happened
    to be a programmer. This research resulted in a 400-page book about Le Roux. Through
    the process, Ratliff had several times come across circumstantial evidence that
    could indicate Le Roux was Satoshi, but he had put it away again.


    That started to change after messages came in about a multibillion-dollar lawsuit
    in Florida. The defendant in the case was none other than Craig Wright, the self-proclaimed
    Satoshi. It was brought by Ira Kleiman, the brother of a deceased business partner
    of Wright, Dave Kleiman. Ira Kleiman asserted that Wright and Kleiman had mined
    hundreds of thousands of bitcoins together and that Wright transferred them to
    himself. The lawyers representing Wright filed a motion to seal his responses
    to specific questions because it would endanger himself and other persons as well
    as national security. These persons and footnotes were redacted except one that
    his lawyers had overlooked. It was a footnote containing links to a news article
    and a Wikipedia article about…Paul Calder Le Roux!


    Ratliff returned to his notes and started to re-examine the circumstantial evidence
    he had brushed away and found more. Here is a selection: Le Roux knew `C++` and
    had already, in the 1990s, developed a disk encryption tool that was later open-sourced.
    He was about the age that collaborators thought Satoshi was (born in 1975); being
    an international drug lord, he had more motive than anyone and a natural hatred
    for banks; he got a Congolese diplomatic passport with the name Paul Solotshi
    Calder Le Roux. This was two weeks before he first contacted Adam Back under the
    name Satoshi. Even the timing of Satoshi’s disappearance aligns with his arrest
    in 2012.


    So far, Ratliff’s analysis has followed the model of previous identifications
    of Satoshi, but he takes a step back and evaluates the evidence against Le Roux:
    he was not an academic, and on a more philosophical note, Le Roux was not against
    spam as Satoshi was, since he ran one of the most significant spam operations
    on the planet. Eventually, this led Ratliff to the following realization:


    > *Because Le Roux so clearly could be Satoshi, he was therefore more likely to
    be. Missing from that equation was a calculation of all possible people who could
    also be Satoshi. There were untold numbers of programmers who were adept at C++
    and hated government, who felt a responsibility to credit other coders and used
    the phrase “encryption for the masses,” who had reasons to stay anonymous and
    expressed some interest in digital currencies. To prove anything about Le Roux
    via my technique, I’d have to disprove dozens, perhaps hundreds, of equally likely
    candidates.*


    ## Full Circle


    We have come full circle, back to where we started with no clue as to who Satoshi
    is or how to find out. Ratliff’s piece seems to be emblematic of all previous
    investigations we have considered: The journalist, for they were all written by
    journalists, for one reason or another, intuits a possible suspect and starts
    collecting evidence. The evidence for is attributed greater significance than
    the evidence against. This is also called cherry-picking facts. All previous investigations
    have proceeded from a suspect to selecting evidence with no principled inquiry
    but plenty of assumptions and subjective assessments. Ratliff deserves respect
    since he as the first saw clearly that this approach was not sufficient to provide
    evidence of who Satoshi is. Consequently, even after more than a decade of intense
    scrutiny, we are still searching for Satoshi.


    It is time that the search for Satoshi was turned around and started from a basis
    of principles derived from academic historical inquiry rather than ad hoc fact
    fitting. The next chapter will therefore lay a foundation for a more structured
    investigation into what we can say about Satoshi and how we can identify him.


    # 6. Profiling Satoshi


    ## The Historical Basis for Satoshi


    To restart the search for Satoshi on a more solid basis, we have to go through
    a sequence of steps in a principled way. The first step is to realize that this
    is a historical problem and should be analyzed and investigated as we would any
    other kind of historical problem. Through the aid of the discipline of modern
    historiographical research, we can approach the problem in a more principled way.


    Before the nineteenth century, Western history was characterized by two different
    traditions of writing history, according to Georg G. Iggers, a specialist in the
    nature of history and historiography. One was learned and antiquarian focusing
    on cataloging facts, and the other was essentially literary, where the focus was
    on the story told. This changed only when the modern discipline of history emerged
    from German universities in the nineteenth century.


    The primary force in this change was the German historian Leopold von Ranke who
    became a professor of history at the University of Berlin in 1825, a post he held
    for 50 years. In his first book, *Histories of the Latin and Teutonic Nations
    from 1494 to 1514* from 1824, he set the new direction with one sentence that
    essentially became the slogan for modern history, namely, that the purpose of
    the historian was to show how it really was (“wie es eigentlich gewesen ist”).
    This might seem self-evident today, but contrasted with contemporary history writing
    where the focus was on telling an engaging narrative, von Ranke used a more significant
    variety of sources than his contemporaries and limited himself to only talk about
    what he could base on the sources, not imagination and conjectures.


    From this grew the practice of source criticism that has been particularly elaborated
    in the German and Scandinavian schools of historiography. The purpose of source
    criticism is to ensure that we write history as it was. Let us look at some of
    the common principles for source criticism that we will use as guidance for our
    search for Satoshi.'
