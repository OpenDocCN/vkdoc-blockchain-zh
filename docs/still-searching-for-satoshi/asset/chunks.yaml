- fmt: '### “The Bitcoin Crypto-Currency Mystery Reopened”


    In response to the piece written by Joshua Davis in *The New Yorker*, professor
    of journalism at NYU Adam Penenberg wrote the article “The Bitcoin Crypto-Currency
    Mystery Reopened,” which takes issue with the conclusions. He does not think Davis
    found the right man, although no new evidence except reiterated denials by Clear
    is offered, but even Davis did not seem to think Clear is Satoshi.


    Penenberg uncovers another clue to Satoshi, the name: in Japanese “Satoshi” translates
    into “clear-thinking; quick-witted; wise.” “Naka” can mean “inside” or “relationship,”
    while “moto” is defined as “the origin; the cause; the foundation; the basis.”
    So we have “clear-thinking” “inside” “the foundation.” It is, though, not entirely
    clear where that leads us.


    He then proceeds to question the findings of Davis that Satoshi is British by
    speculating that it is a red herring. But faking a different language consistently
    for 80,000 words for two years is incredibly difficult, if not impossible. He
    notes that the first mention by Satoshi was written in American and afterward
    turned to British, but why start with an attempt at an American accent and then
    switch to a British if it was not because this was easier? Penenberg fails to
    produce any actual argument for why Satoshi should not be British.


    The method used by Penenberg is to google putatively distinct phrases from the
    Bitcoin whitepaper to see if there are any hits elsewhere. This produces nothing
    except the phrase “computationally impractical to reverse.” This also shows up
    in a patent application with the title “Updating and Distributing Encryption Keys”
    from August 2008. The authors are Neal King, Charles Bry, and Vladamir Oksman.
    He finds that they have authored other applications that sound “Bitcoin-y” to
    him. The hypothesis is that these three together are behind Satoshi Nakamoto.


    But recall our treatment of public key encryption in Chapter [2](#539536_1_En_2_Chapter.xhtml);
    “computationally impractical to reverse” is merely another way of saying trapdoor
    function: the central trait of the mathematical function needed in a public key
    cryptographic system. Further, key distribution has nothing to do with Bitcoin.
    King also says as much to Penenberg. Bitcoin uses public key cryptography, whose
    entire purpose, as we saw, was to get rid of the key distribution problem. The
    argument is similar to saying that the mysterious inventor of a new type of safe
    must be the same as the locksmith who invented a new way to update locks.


    Finally, in Satoshi Nakamoto, we have a person who worked for years on proprietary
    intellectual property only to forfeit the intellectual property rights, which
    patents protect, and release it for free as open source software. How likely is
    it to find this person applying for a patent, which is the opposite approach to
    IP? Everything we know about Bitcoin is that it was made to be open and free,
    not closed and proprietary like a patent. Even if the authors may have superficially
    similar views, as Penenberg claims after viewing one author’s Facebook page, their
    actions show the opposite.


    The article thus fails to bring forth any convincing arguments or methodical rigor
    to the investigation of the identity of Satoshi.


    ## The Search Continues


    It seems that the search for Satoshi subsided after the initial interest, not
    because it was believed that any of the identifications were correct, though.
    In 2013 speculation started again. Ted Nelson, considered one of the Internet’s
    founding fathers, released a video where he identified Satoshi Nakamoto as the
    reclusive Japanese mathematician Shinichi Mochizuki. There was no argument as
    to why that would be, other than Mochizuki being a genius who had once before
    dropped a proof on the Internet and left all discussion of it. While Nelson speculates
    his English must be good since he moved to the United States at age five, it does
    not answer how he had learned to command British English. There is similarly no
    indication that he had any interest in cryptography or any abilities to program.


    In another article, Alec Liu reviews the list of suspects and adds Gavin Andresen,
    who took over the reins of developing Bitcoin from Satoshi in 2010. Also, Jed
    McCaleb, the co-founder of Mt. Gox, was identified since he helped build the first
    successful exchange, which was incorporated in Japan. The conclusion was that
    no really good fit had been found. One interesting takeaway from the article was
    that Satoshi’s coding style seems to have been something other than that of a
    professional developer, but rather an academic.


    Two Israeli computer scientists, Dorit Ron and Adi Shamir, published a paper analyzing
    the Bitcoin blockchain and noticed a financial connection between the Bitcoin
    creator and Ross Ulbricht, the creator of the Silk Road dark net market for illicit
    goods and services. Ulbricht denied it through his attorney, and the researchers
    later retracted the finding.


    ### The *Newsweek* Story


    In an apparent bombshell in *Newsweek* in 2014, the identity of Satoshi Nakamoto
    was revealed to be a man whose name is Dorian Prentice Satoshi Nakamoto by investigative
    reporter Leah McGrath Goodman: “Tacitly acknowledging his role in the Bitcoin
    project, he looks down, staring at the pavement and categorically refuses to answer
    questions.”


    “I am no longer involved in that, and I cannot discuss it,” he says, dismissing
    all further queries with a swat of his left hand. “It’s been turned over to other
    people. They are in charge of it now. I no longer have any connection.”


    Had Satoshi finally been found? Goodman started her two-month investigation from
    another angle, that Satoshi Nakamoto is not a pseudonym but his real name, and
    tried to find someone by that name. She succeeded and found a Japanese-American
    man named Dorian Nakamoto living in Temple City outside Los Angeles, California.


    While certain aspects of Satoshi Nakamoto align, such as a distrust of government
    and banks, most others seem not to. Most important is his wife’s assessment of
    his English skills: “I would not say he writes flawless English. He will pick
    up words and mix the spellings.” None of this is evident in the writings we know
    of Satoshi Nakamoto.


    The question is then, why, or what was he admitting to when he said that he was
    no longer involved? Dorian Nakamoto had worked on military projects earlier in
    his career. Given his limited understanding of English, he seems to have thought
    that the reporter was referring to this. Curiously following this incident, Satoshi
    Nakamoto apparently returned to public writing that he was not Dorian Nakamoto
    on the P2P forum site.'
