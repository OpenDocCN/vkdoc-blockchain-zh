  trans: "\n根据中本聪的说法，政府掌控着货币体系，并且被认为已经道德沦丧（参见：“看啊，这忠实的城邑/竟成了娼妓！/她从前充满公平；/公义常居其中”）。中央银行印发了过多的货币，导致了通货膨胀（参见：“你的银子变成了渣滓/你的美酒被水稀释”）。中本聪认为，通货膨胀实际上是在窃取普通人的财富。此外，金融机构是腐败的，因为作为可信的第三方，它们在调解争端并决定结果时，并未确保交易不可逆（参见：“你的官长是叛逆者/与盗贼为伍/他们都贪图贿赂/追逐礼物”）。这增加了交易成本，使得简单支付也变得过于昂贵。由于交易并非匿名，这还剥夺了人们的隐私权，因为可以追踪每个人的每一笔交易。这使得政府能够窥探私人事务（参见：“他们不为孤儿伸冤/寡妇的案件也不呈到他们面前”）。所有这些行为都是不道德且不公平的。\n\
    \n与此相反，中本聪设计了一个替代性的货币体系——比特币，它完全独立于邪恶的中央政府运作。与法定货币不同，比特币使用自由且完全匿名。它没有通货膨胀；恰恰相反，随着时间的推移，它发行的货币会越来越少，直到最终全部发行完毕。这会导致通货紧缩，从而提升比特币的价值。\n\
    \n中本聪预言了一个未来，现有的金融机构将不再被需要，支付将免费且完全匿名。将不再有信贷泡沫，想要储蓄的人们会看到自己的财富增值。中本聪似乎在呼应以赛亚书：\n\
    \n> *我必反手攻击你*\n> \n> *我要彻底炼尽你的渣滓*\n> \n> *除去你所有的杂质*\n> \n> *我必恢复你的领袖，如古时一样*\n\
    > \n> *你的官长，如起初一般*\n> \n> *此后，你必被称为*\n> \n> *公义之城*\n> \n> *忠信之邑*\n> \n> *锡安必因公平得蒙救赎*\n\
    > \n> *其中归正的人必因公义得蒙救赎*\n> \n> *但悖逆的和犯罪的必一同败亡*\n> \n> *离弃耶和华的必致消灭。*\n\n与其他先知一样，中本聪也来自边缘地带，尽管并非地理意义上的边缘。伦敦很难说是沙漠。但他来自金融领域的边缘，也就是说，他并非银行家或经济学家，而是一位专攻密码学的计算机科学家。因此，他与现有的银行体系毫无关联或联系。与密码学邮件列表中的同行相比，他的文字异常清晰，甚至可谓简洁，而且他有一种表达思想的方式能够吸引众人。\n\
    \n因此，中本聪的性格在某种程度上类似于亚伯拉罕诸教中的先知。这些特质有助于解释为什么他能像我们审视过的其他虚拟货币创始人那样，建立起追随者并将之转化为一个蓬勃发展的社区。例如，戴维（Wei\
    \ Dai）有许多类似的想法，但却无法用同样的方式阐释它们。同样，大卫·乔姆（David Chaum）创建了一种虚拟货币，实现了比特币的许多功能，但他并不具备中本聪的先知特质。\n\
    \n## 经文\n\n> *观自在菩萨，行深般若波罗蜜多时，照见五蕴皆空，度一切苦厄。舍利子，色不异空，空不异色；色即是空，空即是色。受、想、行、识，亦复如是。*\n\
    >\n> *——*《心经》（E. 孔兹译）\n\n《心经》是佛教最著名的圣典之一。现存有多部可追溯至八、九世纪的注释。如今，它是佛教最常用的经文之一。\n\n\
    在教义和教导至关重要的宗教中，神圣经文扮演着核心角色。我们从世界宗教中知道这些圣典，例如印度教的《吠陀》；亚伯拉罕诸教的《托拉》、《圣经》和《古兰经》；以及佛教的《三藏》。在那些存在一个社会阶层可以致力于官僚事务的文明中，即社会分工允许一部分人从事生存所需体力劳动之外的其他工作时，这些经文便具有重要地位。宗教文本是这些文化在掌握书写技能后最早记录下来的事物之一。\n\
    \n圣典是一种特殊的文本，因为它们被赋予了特殊的意义。历史上，这些经文在其特定文化中被指定为焦点文本。例如，公元三、四世纪流传的几种不同文本中，《福音书》就是这样被确立为圣典的。这些焦点文本具有一种无可指摘的独特品质，是启示的真理，即便不是直接来自上帝，也是受神圣启发的。\n\
    \n与此相关的还有另一类文本，包括注释、语录、格言或赞美诗，它们是次要的，但与焦点文本相关。它们并非完全是启示真理，但可以追溯到同一真理来源。它们的作用是扩展焦点文本教导的范围。在犹太教传统中，这包括《密西拿》和《塔木德》。\n\
    \n对于比特币，我们发现了类似的结构。尽管并非完全涉及神圣启示，但作为指定的“先知”，中本聪撰写了比特币白皮书，作为比特币的焦点文本。在围绕比特币的讨论中，这份文本与圣典一样无可指摘。它不像学术论文那样通常会被讨论其对错或引发辩论。相反，它在争论中被用作终极真理来源。\n\
    \n与此并存的，还有中本聪在比特币论坛上写下的数千文字。这些文字也具有特殊地位，因为可以将中本聪的愿景扩展到比特币白皮书明确写出的范围之外。最后一类是被认为出自中本聪的电子邮件，由收件人在数年后公布。中本聪退出公众视野并留下有限的文本这一事实，有助于确立这种结构。这些文本甚至被菲尔·尚帕涅（Phil\
    \ Champagne）像出版《新约》一样汇编成书，书名为《中本聪之书》。\n\n将其与其他虚拟货币的情况进行对比是很有趣的。例如，大卫·乔姆撰写了一篇与比特币白皮书非常相似的论文，描述了他对未来虚拟货币的愿景。这篇题为“不可追踪支付的盲签名”的论文发表于\
    \ 1982 年。翻阅此文，它有许多与比特币白皮书相似的特征。事实上，相似之处如此之多，以至于有理由认为它就是直接灵感来源。尽管如此，乔姆的论文从未获得追随者。因此，很可能是中本聪创作的这些文本，契合了宗教经文已知的结构，帮助像宗教文本聚焦宗教愿景那样，聚焦了比特币的愿景。\n"
- fmt: '# Cargo Cults


    At the beginning of the 1940s, American forces were stationed at what was then
    called the New Hebrides, current-day Vanuatu. With them, they brought immense
    amounts of cargo. Thousands of the natives worked for the Americans. After the
    war, when the Americans left Vanuatu, a local religious leader''s followers built
    symbolic landing strips to bring cargo like they had seen the Americans get during
    the war. They instituted military parades where participants wore T-shirts painted
    with the letters `USA`. All of this to mimic the Americans they had witnessed
    bring vast amounts of cargo during the war.


    The phenomenon of cargo cults originated in Melanesia in the late nineteenth century
    as a response to Western colonialism. The indigenous population of the Melanesian
    islands of the Pacific had experienced Western colonial administrators, missionaries,
    and plantation owners with their higher level of material wealth. With them came
    modern technology, clothes, and other goods. In Tok Pisin, the pidgin language
    of New Guinea, the word `cargo` means trade goods or supplies. This came more
    generally to represent wealth.


    Cargo cults sought to attain the lifestyle and wealth of colonialism. They are
    characterized by an attempt to copy the behavior of Western colonialists to achieve
    the same level of material goods. Examples include building mock airstrips and
    marching like soldiers with sticks for rifles, as the indigenous population witnessed
    the soldiers of World War II do. The hope was that this would bring about a situation
    where the ancestors would bring similar wealth or the colonialists would share
    their wealth. While cargo cults originated and proliferated in Melanesia, they
    are documented worldwide, particularly in Africa and the Caribbean. This hints
    that the phenomenon is more than just a local cultural peculiarity but a cohesive
    feature of the modern world.


    `Bitcoin` exhibits some of the same characteristics, albeit in a completely different
    context. For example, there are no indigenous people unless you count digital
    natives as such; there are no ancestors or rituals per se. Still, there are some
    robust structural similarities.


    There is also a perceived antagonism to a materially and politically superior
    social organization: where cargo cults respond to Western colonialism, the `Bitcoin`
    community responds to the government and the banking system. These are considered
    oppressive and similarly perceived to enslave and take away personal freedom.


    The people who devote themselves to `Bitcoin` in the `Bitcoin` community also
    copy this antagonism. They take their cues from investment bankers when they apply
    similar language and behavior. It is not uncommon to hear them talk about building
    a crypto portfolio consisting of different kinds of cryptocurrency like `Litecoin`,
    `XRP`, and `Dogecoin` alongside `Bitcoin`. These portfolios copy the portfolio
    approach in traditional investing, where risk is spread across several different
    securities to arrive at a more manageable risk profile. But traditional portfolio
    investing is based on securities with inherent value and real-world connections.
    A stock, for example, gives you fractional ownership rights of a company that
    produces something or has a demonstrable path to revenue. Commodities are physical
    and can be bought and sold on the market. Cryptocurrencies, with limited exceptions,
    have no connection to the real world or any inherent value. They mostly can''t
    be used for the basic function of a currency: a medium of exchange. `Dogecoin`
    has no value other than as an object of speculation. But, of course, people may
    believe it really will be the currency on Mars, as Elon Musk suggested.


    Still, no security would be allowed to be traded on such a tenuous promise in
    the traditional world of finance. The popular cryptocurrency `XRP` aims to be
    a more efficient cross-border payment solution. Still, it has yet to make any
    noticeable dent in the incumbents like Western Union''s hold on the remittance
    industry. `Litecoin` is used for transfer between people, much like `Bitcoin`
    but faster. Again, it is more the promise that it can do it than a unique real-world
    application since common applications like `Zelle` and `Square` provide such services
    to a vastly greater number of users. These examples are chosen because they are
    the most promising of the thousands of alternative cryptocurrencies and carry
    significant potential. But contrast this with stocks that already generate revenue
    and have a book value. It is not the same.


    Self-proclaimed `analysts` set targets for `Bitcoin`, again mirroring a common
    practice for securities like common stocks or commodities like gold. Targets for
    `Bitcoin` will be, for example, $100,000 or, as Ark Invest''s Cathie Wood has
    it, $1.48 million in 2030. These targets are either taken out of thin air or supported
    by only the haziest of analysis, which invariably boils down to what-if scenarios
    and wishful thinking. Naturally, traditional analysts in the world of finance
    also have some element of uncertainty, but they are constrained by requirements
    of documentation of how they arrive at these assumptions. With the exception of
    more mainstream investors like Ark Invest, most analysis pays only lip service
    to traditional finance methods.


    Another area where the behavior of finance is mimicked is the application of technical
    analysis. Traders in the finance industry often use a technique called technical
    analysis, which in itself has been accused of being more magic than science. It
    relies on recognizing patterns in graphs of the value of traded equities. Basically,
    technical analysts believe that market movements are not entirely random and can
    be predicted by analyzing market data and applying various charting tools and
    technical indicators.


    These practices resemble the cargo cults building landing strips, marching with
    mock rifles, and copying colonial mores. There is no relation between the original
    application of these behaviors, how they work, and their application in the cryptocurrency
    world. One might counter that it has worked since many have gotten extremely rich
    from `Bitcoin`. But then again, this is not uncommon for early members of cults
    in general or Ponzi schemes. The success of a few or even many individuals in
    the short term is no proof.


    We should also note that we only discuss structural behavior similarities across
    a diverse cryptocurrency community population. There are many exceptions to this,
    and `Bitcoin` may yet become the future standard of value. Indeed that is what
    we will consider in the next chapter. It just currently has virtually no documented
    real-world use outside of its role as an object of speculation.'
