    # 前言


    我第一次认真关注比特币和区块链是在 2015 年左右。当时我正在金融领域设计反洗钱系统，立刻意识到比特币在这方面会非常方便，因为所有交易都已经公开可见。诚然，这很可能不是大多数比特币爱好者的第一反应。经过深入研究后，我看到了巨大潜力，并开始小试牛刀，购买了一小部分比特币进行尝试。我还购买了相当数量、据信是首个允许散户投资者接触比特币的交易所交易基金（ETF）。不久之后，出现了一些关于比特币的负面消息。大概是开源开发团队的一位核心开发者离开了。我不记得具体细节了。人们都说这个东西快要完蛋了。我清楚地知道，这项投资是我投资组合中真正有相当大概率归零的资产之一，加上比特币自去年以来已经上涨了超过
    100%（因此很可能上行空间有限，对吧？），我做了许多比特币持有者（无论此前还是此后）都做过的事；我相信其专业术语是“吓坏了”，然后卖掉了所有比特币。我当时并不知道，关于比特币即将崩溃的恐吓故事，就像我家乡丹麦的下雨天一样常见。


    几年后，我身在美国，恰逢比特币又一次繁荣期。我突然想起，当初为了测试而购买的比特币，在价格约 800 美元时我忘记卖掉了。如今各大新闻，甚至纽约地铁的信息屏幕上，都在报道比特币即将突破
    20,000 美元大关。我当时觉得这简直疯了，比特币可能再也涨不了那么高了，于是我找到旧钱包，将其套现。我用这笔钱给妻子买了一枚钻戒，这算是一次小型技术实验带来的不错回报。我希望这样的机会还能再多一些。


    在那之后，我对比特币的看法变得负面，认为它已经退化为一个庞氏骗局，从未真正认真尝试去实现其应有的潜力。有时我会在 Quora 或推特上对比特币发表批评意见，结果却被大量喷子淹没，他们嘲笑我，说我有多蠢。自然而然，我失去了兴趣。


    如今回想起来，我注意到，如果当初我没有惊慌失措，而是持有最初对比特币 ETF 的投资，我实际上本可以买下一辆比特币社区梦寐以求的兰博基尼。我的故事对于许多普通人——或者比特币社区所称的“圈外人”——来说并不罕见。有些人幸运地中了头奖并发了财。大多数人则没有。


    在我写下这些文字时，加密市场已经回落。我既未直接也未间接持有比特币。我经历了对比特币的热情、鄙夷和冷漠的完整光谱。然而，我仍然觉得这是一项如此迷人且独特的技术发展，需要有人中立且客观地讲述它的故事。关于比特币或由专家们向你全面解读的书籍并不少见。问题在于，他们无一例外地在这上面投入了大量精力，因此也极力正面描绘它。这并不意味着没有批评者，但他们完全置身事外。他们通常很早就断定比特币是个骗局，并认为不需要做超过表面的研究。这为那些好奇、开放的非技术读者留下了一个巨大的空白，他们只想了解这一切喧嚣背后的原因，并能够对比特币和区块链这件事形成自己的判断。


    当前，比特币面临监管压力和丑闻等重重阻力，但即使你认为比特币已经见顶，它仍然是现代世界前所未有的杰出技术成就，值得认真关注。


    如果你尚未对比特币着迷，但对它是什么以及它可能成为什么感到好奇，那么这本书就是为你准备的。我希望能够引导你了解比特币和区块链背后那些引人入胜的思想和历史，阐明比特币所针对的人类文明中的种种问题，并提供一个关于区块链未来可能发展方向的视角。即使你已经是比特币的“老手”，我希望你也能从中找到新的信息和视角。我本意是提供一个平衡的叙述，既不草率否定比特币，也不追捧关于其神奇之处的最夸张说辞。


    # 引言


    一位名叫中本聪的人在 2008 年 10 月 13 日首次宣布了比特币。它是在所谓区块链上实现的第一种加密货币，因此，它是区块链革命及其衍生技术——如智能合约、加密货币、NFT、DAO
    以及所谓的 Web3 等——的起点。这些新奇神秘的现象声称要颠覆支付方式，并改变我们做生意的方式以及现有的全球秩序。对于加密货币倡导者所说的我们的世界将要发生的巨大变化和速度，人们抱有一丝怀疑是可以理解的。然而，即使对于一个漫不经心的观察者来说，似乎也有理由相信，至少我们可以预期区块链革命会带来一些重大的改变。


    关于比特币和区块链，有大量的资料可供阅读。如今，由优秀的作家和比特币专家撰写的多部关于此主题的杰出著作已经问世。权威人士也总是随时准备在播客、广播和电视上解释和评论。

    '
- fmt: '不幸的是，除少数例外，关于比特币和区块链的论述通常分为两派。第一派是倡导者，他们认为比特币和区块链能解决世界上所有的难题，并最终创造一个财富平等分配、战争终结、人人随心所欲的乌托邦。第二派则是批评者，他们同样坚信这不过是一场会以壮观内爆收场的闹剧。对这群人而言，比特币不过是“拉高出货”的投机者用来中饱私囊的庞氏骗局。


    这种两极分化也反映在关于比特币的讨论中。专家和权威人士无一例外都是倡导者，他们本身深度投资于比特币和加密货币，因此比特币作为一种投资对象越受欢迎，他们的个人收益就越大。在受监管的金融行业中，讨论比特币试图与之竞争交易量的证券时，有着明确的披露规则。大多数情况下，分析师甚至被禁止投资他们所研究的证券。这与出现在媒体上的比特币分析师和权威人士形成了鲜明对比。因此，中立观察者只能猜测，关于比特币和区块链的分析，有多少是出于个人利益，又有多少是公正的分析。投资于自己非常了解且深信不疑的东西本身并不奇怪或错误。但当你同时以专家和倡导者的身份公开露面时，问题就来了。


    批评者们常常对比特币和区块链不屑一顾。如果你听信这群人的说法，你很可能也会遇到类似的问题，因为他们通常深深植根于金融体系的现状。他们通常是比特币和加密货币正在颠覆的银行体系的代表，或者是专注于传统投资形式的投资顾问。这对中立观察者来说同样缺乏说服力。


    因此，我们面临着一个难以找到关于比特币和区块链的中立且公正信息的局面。我处于一个独特的位置，可以提供这样不带偏见的视角，因为我本人并未直接或间接投资于比特币或其他加密货币。因此，无论比特币、加密货币或区块链成功或失败，我个人都毫无所获。


    在本书中，我们将避免陷入任何极端，以批判但又充满好奇的眼光来看待这一现象。即使比特币最终被证明是一场骗局，所有其他区块链都崩溃了，有一点已经很明确：它已经激起了强烈的情感，并指出了金融体系中需要解决的薄弱环节。仅此一点，就足以让我们对这个十多年来吸引了大批科技和金融界人士的现象进行一番全面的探讨。


    ## 什么是比特币？


    在本书的开头，一个合理的问题可能是：“什么是比特币？”这个问题看起来简单直接，但它的简单性具有欺骗性。首先要注意的是语言的精确性。单词“Bitcoin”首字母大写通常指代整个比特币技术，而“bitcoin”指代其货币本身。如果答案很简单，互联网上就不会有那么多书籍、课程和不同媒体上的简短介绍了，也不会有无尽的人们试图解释比特币的表情包了。与咖啡、汽车或香蕉这种日常物品不同，我们无法指出任何具体事物作为参考。


    这也许并不奇怪，因为比特币是一种虚拟事物，没有物理外观可以指认。但不同于Facebook或谷歌搜索这类其他虚拟事物，我们仍然无法指出任何一个能全面描述比特币是什么的东西。例如，Facebook是一个你登录后，能与朋友联系、了解他们近况、参加什么活动以及何时生日的网站。它无缝地融入我们的社交生活，成为进行常规社交活动的另一种方式。虽然它让沟通变得更容易，但并未从根本上挑战我们已有的任何基本实践或概念。类似地，谷歌搜索极大地改进了我们查找信息的方式，其规模前所未有。尽管如此，它解决的仍然是自文字和图书馆诞生以来人类就面临的基本问题：如何索引、查找和检索零散的信息片断。当我们走到书架前，想拿出《威斯登板球年鉴》查看凯文·彼得森职业生涯的测试赛得分时，我们就能直观地理解这一点。对于没有实体书的人而言，在任何大型零售商处穿行，寻找任何商品（比如一个咖啡研磨机），也会遇到几乎相同的问题。信息是通过不同主题的区块（比如你在找厨具）进行索引的。如果你找不到，可以询问那位友好的、无处不在的店员，他会告诉你商品在第17排。对于那些无法体会这种经历的人（可能是因为你的一切活动都在线上），你只需要知道，你在设备上进行的所有搜索，都源自前几代人关于如何检索信息的直觉。


    比特币则不同。你登录比特币并不是为了做某件特定的事情。当然，在某些情况下，你可以用它来支付。但在这里，它开始与我们通常的经验产生分歧。要使用它进行支付，你需要一个所谓的钱包。对于现金而言，钱包有固然好，但并非必需。我也可以把信用卡放在口袋里而不需要钱包。在我们的日常经验中，钱包是支付的一个附带方面，而对于比特币来说，它却是必不可少的。不过，我们谈论的并非实体钱包。实际上，我们日常的支付经验在某种程度上依赖于物理实体，如钞票、硬币和卡片，而不是一个需要冗长复杂的“密码”来验证身份并检索钱包内容的虚拟数字结构。此外，比特币钱包并非由任何机构发行，即使它可能由某个机构（比如“Coinbase”）作为中介。如果任何与交易相关的问题失败，都没有追索途径，没有热线，没有客服，也没有投诉渠道。


    不仅如此，比特币也被视为一种投资，一种所谓的价值储存手段，就像黄金或铂金一样，你可以通过交易所交易基金（ETF）购买。在这种情况下，你并不直接拥有比特币，而是通过一个机构拥有。到目前为止，这可能还算直观，因为你可以通过本地银行投资货币。但接下来就变得奇怪了，因为比特币还可以用来记录合同。哦，对了，你还可以通过“挖矿”来自己制造比特币，这对于其他用于支付的货币形式来说是绝对不建议的。如果你愿意，你还可以看到自比特币诞生以来的所有交易记录。渐渐地，我们对熟悉事物的日常概念开始瓦解：这到底是货币、是价值储存手段、是认证引擎，还是一个计算任务中介？


    答案是，比特币既是所有这些，又不止于此。因此，我们面临的挑战是，要寻找超出日常经验的其他方式，来将比特币作为一种现象进行描述。'
  raw: 'Unfortunately, with few exceptions, treatments of Bitcoin and the blockchain
    fall into one of two groups. The first group is the advocates, who think Bitcoin
    and the blockchain will solve all problems the world has faced and, in due time,
    create a utopia with equal and fair distribution of wealth, the end of war, and
    the ability for everyone to do anything they want. The second group is the critics,
    who are just as convinced that it is all just a fad that will collapse in a glorious
    implosion. To this group, Bitcoin is nothing more than a Ponzi scheme used by
    pump-and-dump speculators to enrich themselves.


    This polarization is reflected in the discourse about Bitcoin. The experts and
    pundits are invariably advocates, who are themselves deeply invested in Bitcoin
    and cryptocurrencies and consequently stand to gain personally the more popular
    Bitcoin becomes as an investment object. There are clear disclosure rules when
    discussing securities in the regulated financial industry that Bitcoin seeks to
    compete with regarding deal flow. In most cases, analysts are even barred from
    investing in the securities they cover. This starkly contrasts the Bitcoin analysts
    and pundits that appear in the media. The neutral observer is consequently left
    speculating how much of the analysis about Bitcoin and the blockchain is motivated
    by personal gain and how much is impartial analysis. Investing in something you
    know a lot about and believe strongly in is not necessarily anything weird or
    wrong. But it is problematic when you also appear in public as an expert and advocate
    for it.


    Critics often dismiss Bitcoin and the blockchain. If you listen to this group,
    you may well have a similar problem since they are typically embedded in the status
    quo of the financial system. They are frequently representatives of the banking
    system that Bitcoin and cryptocurrencies are disrupting or investment advisers
    that specialize in traditional forms of investment. It is also unconvincing to
    the neutral observer.


    We are therefore left with a situation where it is hard to find neutral and impartial
    information about Bitcoin and the blockchain. I am uniquely positioned to offer
    such an unbiased perspective since I am not directly or indirectly invested in
    bitcoin or other cryptocurrencies. I consequently have nothing to gain personally
    from either the success or failure of Bitcoin, cryptocurrencies, or the blockchain.


    In this book, we will not fall into any of the extremes and look at the phenomenon
    critically but with curiosity. Even if Bitcoin turns out to be a scam and all
    other blockchains collapse, it is already clear that it has stirred deep emotions
    and pointed to weak points in the financial system that need to be addressed.
    This fact alone warrants a thorough treatment of a phenomenon that has captivated
    a large part of the technological and financial world for over a decade.


    ## What Is Bitcoin?


    At the outset of this book, a reasonable question might be, “What is Bitcoin?”
    This seems innocent and straightforward enough, but the simplicity of the question
    is deceptive. A first observation is related to the precision of language. The
    word *Bitcoin* with a capital B is usually used for the Bitcoin technology in
    general, while *bitcoin* is for the currency. If the answer were straightforward,
    there would not be a plethora of books, courses, and short introductions on different
    media on the Internet. There would not be endless memes with people trying to
    explain Bitcoin. Unlike everyday objects like coffee, cars, or bananas, there
    isn’t anything we can point to as a reference.


    That may not be surprising since Bitcoin is a virtual thing without any physical
    appearance to point to. But unlike other virtual things like Facebook or Google
    Search, we still can’t point to any one thing that comprehensively describes what
    Bitcoin is. Facebook, for example, is a site that you log into, which connects
    you with your friends. You can see what they are up to, what events they are attending,
    and when is their birthday. It blends seamlessly into our social lives as just
    another way to do regular social activities. While it has made communication easier,
    it does not fundamentally challenge any fundamental practice or concepts we had
    from the outset. Google Search is similarly a massive improvement in how we find
    information, the scale of which has never been seen before. Still, it solves a
    basic problem that humans have faced since the invention of writing and libraries:
    how to index, find, and retrieve discrete pieces of information. We can intuitively
    relate to this when we go to our bookshelf to retrieve the *Wisden Cricketers’
    Almanack* to see how many test match runs Kevin Pietersen scored in his career.
    For those who do not have physical books, a walk through any large retailer to
    find any product, say a coffee grinder, presents much the same problem. The information
    is indexed by sections with different themes (you are looking for cooking items).
    If you can’t find it, you can ask that friendly and ubiquitous store clerk who
    will inform you that it is in Isle 17\. For those who can’t relate to this experience
    either because everything you do is online, you should just know that all the
    search you do on your devices has been developed by previous generations’ intuitions
    about how to retrieve information.


    Bitcoin is different. You don’t log into Bitcoin to do anything in particular.
    Sure, you can use it for payment in some circumstances. But here, it starts to
    diverge from our usual experience. To use it for payment, you need a so-called
    wallet. For cash, a wallet is nice enough to have but not necessary. I can also
    put my credit cards in my pocket without any wallet. Our everyday experience has
    a wallet as an incidental aspect of payment, whereas for Bitcoin it is necessary.
    We are not talking about a physical wallet though. Indeed our day-to-day experience
    of payment depends to some degree on a physical aspect, like notes, coins, and
    cards, not a virtual digital construct that requires a long and complicated “password”
    for identification and retrieval of contents of the wallet. Furthermore, the Bitcoin
    wallet is not issued by any institution, even if it might be mediated by one,
    such as Coinbase. There is no recourse if anything related to the transaction
    fails. No hotline, no customer service, no way to complain.


    Moreover, Bitcoin is also considered an investment, a so-called store of value,
    like gold or platinum, which you can buy as an Exchange Traded Fund (ETF). In
    this case, you do not own bitcoin yourself, but it is owned through an institution.
    So far, it may still be somewhat intuitive since it is possible to invest in currency
    with your local bank. Now is where it gets weird because Bitcoin can also be used
    as a way to document contracts. Oh, and also, you can make bitcoin yourself by
    mining, something absolutely not advisable for other forms of currency used for
    payment. If you want, you can also see all other transactions ever made in bitcoin
    since its inception. Slowly our everyday concepts of familiar things are starting
    to break down: is this a currency, a store of value, a certification engine, or
    a computational job agency?


    The answer is that Bitcoin is all of these and more. We are therefore challenged
    to find other ways than our ordinary experience to characterize Bitcoin as a phenomenon.'
  trans: '

    不幸的是，除少数例外，关于比特币和区块链的论述通常分为两派。第一派是倡导者，他们认为比特币和区块链能解决世界上所有的难题，并最终创造一个财富平等分配、战争终结、人人随心所欲的乌托邦。第二派则是批评者，他们同样坚信这不过是一场会以壮观内爆收场的闹剧。对这群人而言，比特币不过是“拉高出货”的投机者用来中饱私囊的庞氏骗局。


    这种两极分化也反映在关于比特币的讨论中。专家和权威人士无一例外都是倡导者，他们本身深度投资于比特币和加密货币，因此比特币作为一种投资对象越受欢迎，他们的个人收益就越大。在受监管的金融行业中，讨论比特币试图与之竞争交易量的证券时，有着明确的披露规则。大多数情况下，分析师甚至被禁止投资他们所研究的证券。这与出现在媒体上的比特币分析师和权威人士形成了鲜明对比。因此，中立观察者只能猜测，关于比特币和区块链的分析，有多少是出于个人利益，又有多少是公正的分析。投资于自己非常了解且深信不疑的东西本身并不奇怪或错误。但当你同时以专家和倡导者的身份公开露面时，问题就来了。


    批评者们常常对比特币和区块链不屑一顾。如果你听信这群人的说法，你很可能也会遇到类似的问题，因为他们通常深深植根于金融体系的现状。他们通常是比特币和加密货币正在颠覆的银行体系的代表，或者是专注于传统投资形式的投资顾问。这对中立观察者来说同样缺乏说服力。


    因此，我们面临着一个难以找到关于比特币和区块链的中立且公正信息的局面。我处于一个独特的位置，可以提供这样不带偏见的视角，因为我本人并未直接或间接投资于比特币或其他加密货币。因此，无论比特币、加密货币或区块链成功或失败，我个人都毫无所获。


    在本书中，我们将避免陷入任何极端，以批判但又充满好奇的眼光来看待这一现象。即使比特币最终被证明是一场骗局，所有其他区块链都崩溃了，有一点已经很明确：它已经激起了强烈的情感，并指出了金融体系中需要解决的薄弱环节。仅此一点，就足以让我们对这个十多年来吸引了大批科技和金融界人士的现象进行一番全面的探讨。


