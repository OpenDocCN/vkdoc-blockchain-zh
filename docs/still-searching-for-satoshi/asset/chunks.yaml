- fmt: '### Coins


    The modern conception of money is intimately related to coins, that is, a piece
    of metal minted and authorized by someone. The invention of coins can be traced
    to China. Here metal representations of cowrie shells had been in use before.
    Chinese coins were made of base metals that were not worth a lot and consequently
    only used for smaller purchases. Interestingly the word `cash` derives from this
    type of Chinese money brought to Europe by the Portuguese, who opened a sea route
    to China. The Tamil word for these was `cash`.


    In Europe, coins took a different path because they were minted on precious metals
    like gold and silver. The Western invention of coins happened in Lydian and Ionian
    Greece in Asia Minor. There are many contributing factors to why it happened then
    and there, but the key among these was that this area had rivers with rich deposits
    of gold and silver. Around this time, the cities of Lydia and Ionia were among
    the wealthiest and sitting on the rim of the great Near Eastern empires with whom
    they traded. Coins emerged initially from crude versions in the middle of the
    sixth century BCE to become standardized and beautiful pieces of artwork in the
    fifth century.


    From this time, the world did not look back. The coin became the dominant form
    of money since it performs the three functions of money well. It is easily used
    as a medium of exchange. Especially precious metal money can be used for high-value
    purchases as well as low value since the weight and volume are manageable. The
    standardization of money and the minting paradigm where an authority signs the
    coins facilitate standardization and make coins easy to use as units of account.
    Since precious metals were used, coins were also convenient as stores of value.
    Precious metals have the convenient feature that they are scarce and widely dispersed.
    As long as no sudden increase in their extraction was made, the value would remain
    stable, which it did.


    ### The Invention of Money


    As we saw, the basic function of money is to facilitate exchange. Historically
    this has been done through other methods like gift-giving and barter. Through
    the path of preferred barter, the idea of primitive money won. They were often
    based on commodities with some utility, but purely symbolic or representational
    objects like seashells and metals became common. These primitive forms of money
    became the basis of purely representational money used in banking services. In
    ancient Egypt, they had a ledger documenting who owned what and allowing transactions
    between accounts without any physical exchange.


    Eventually, this led to the invention of precious metal coins that were ideally
    suited for commerce. It is important to emphasize that there is no unidirectional
    path between these different types of exchange nor are they mutually exclusive.
    Barter can be and is used alongside currency systems. It is also dynamic since
    societies can revert to barter or primitive money when the monetary system collapses.
    While there are different stages in the history of money, it seems more appropriate
    to talk about phases and focus on how individual examples of money fulfill the
    basic functions of money in concrete historical contexts. Let us, therefore, look
    closer at the dynamics of money.


    ## Dynamics of Money


    Money is a fickle object that is difficult to pin down. It seems to be always
    in motion. Different mediums are used as money, and the value goes up and down.
    Periods of stability are the exception rather than the norm from a historical
    perspective. That does not mean that every money-related event is completely novel
    and incomprehensible. It is possible to distinguish certain key factors that influence
    the dynamics of money.


    ### Key Factors of Money


    Four key factors are important to understand the dynamics of money. They are the
    standard for money, minting, legal tender, and supply and demand.


    #### Standard


    While money can be based on commodities like grain, which has some utility, it
    can also be completely symbolic, like modern currencies or cowrie shells that
    have no utility outside their function as money. The most successful type of money
    was the precious metal coin. In ancient Greece and Rome times, it was primarily
    silver that was used as the medium for making coins (while the Persians preferred
    gold). Silver was thus the standard for this type of money. Designs could change,
    but the ultimate value was derived from silver itself. This is called a silver
    standard. The standard is what the value of money is pegged against, that is,
    where the money ultimately derives its value from. If the price of this peg changes,
    like it did when silver mining suddenly produced significantly more silver, the
    value of money on the silver standard will be affected.


    Recently the gold standard has been more successful. The gold standard was a worldwide
    standard from the 1870s until the 1920s and again from after World War II until
    1971. Under the gold standard, currencies were pegged to the value of gold, which
    made it easy and transparent what the value of money was. All currencies could
    be calculated against and exchanged for gold. It is not only physical commodities
    that can serve as a standard. After the collapse of the gold standard, the American
    dollar took its place as a standard for international trade. Other currencies
    can similarly serve as this standard reserve currency that can serve as a safe
    store of value.


    When a standard has been in place internationally, like the gold, silver, or dollar
    standard, this has brought stability to international trade because prices would
    not fluctuate significantly. The consequence is that investing or storing wealth
    becomes easier since the price of goods is more predictable.


    #### Minting


    A key concern for any type of money is who is allowed to mint it. A money system
    where anyone can make their own money quickly implodes. Historically mints had
    a seal or another mechanism to prove that the coin was authorized and correct.
    The seal proved to people that it was indeed a real coin. The invention of the
    serrated edges ensured it was also not cut. Several techniques of the mint improved
    the utility of the coin.


    After the success of nation-states as the primary mode of social organization,
    the authority to mint money was guarded closely by the governments of these nations.
    They imposed a monopoly on minting money. Curiously, this was not the case in
    the United States until late in its history. Until the eighteenth century, local
    currencies thrived in the United States. Local banks issued them, and one had
    to exchange the local currency when traveling. With a single currency came the
    convenience of having a shared medium of exchange and the necessity to monopolize
    the minting of money. Since the monetary system underpins the economy, laws regulating
    money minting and enforcement tend to be severe.


    This is something many inventive virtual currency enthusiasts have felt. We saw
    how the Liberty dollar and other similar schemes that could be considered alternative
    currencies were targeted. Indeed this particular dynamic might very well be why
    Satoshi chose to write under a pseudonym.


    Cryptocurrency enthusiasts have not been slow to observe that with this privilege
    comes great responsibility, which they feel modern states have not handled well
    since they indiscriminately print money leading to inflation. But this is another
    problem due to nation-states’ controlling the minting of fiat currencies. A lack
    of control with minting altogether will lead to a general distrust in money and
    devaluing the currency.'
