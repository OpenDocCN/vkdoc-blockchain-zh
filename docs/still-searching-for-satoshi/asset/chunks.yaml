    Another essential distinction lies in how you use a source. A common distinction
    is made between what is called a relic and a narrative. The narrative is the easiest
    to understand. It tells us about something that happened. On the other hand, a
    relic tells us something about the creator of the source at the time it was created.
    A diary from a sailor on Captain Cook’s ship, the *HMS Resolution*, can be a relic
    that can tell us about sailors’ language and educational level, the state of mind,
    and the values and attitude of the sailor at the time of writing. It can also
