  trans: '

    ### 地理定位


    幸运的是，有更好的证据可以定位中本聪的位置。在对法证证据进行的最彻底调查之一中，唐乔·卡拉伊万诺夫提供了令人信服的证据，证明中本聪一定曾在英国，很可能在伦敦。


    通过绘制中本聪活跃期间（他在论坛发帖、发送邮件以及向 `SourceForge` 提交代码时）的 742 个已知时间戳，可以清晰地描绘出他的活动模式。首先，这排除了日本和澳大利亚作为候选国家。如果他是在澳大利亚或日本工作，那他必须像吸血鬼一样生活，白天从不工作，只在夜间活动。另外三个曾被提及的时区是：格林威治标准时间（英国/欧洲）、东部时间（美国东海岸）或太平洋时间（美国西海岸），这些都有可能。


    基于时间戳数据的文章总结道：“乍一看，这三个地点似乎都说得通。在伦敦，他是个夜猫子，工作到凌晨，然后睡到中午。在东海岸，他工作到一天结束，然后睡到清晨。在西海岸，他是个早起的鸟儿，晚上睡得很早，但起得也非常早。仅看这些数据，我们无法排除合理怀疑，确定中本聪到底生活在哪个时区。”


    最终将识别结果倾向伦敦的证据，实际上嵌入在比特币的区块链中。在所谓的创世区块（2009 年 1 月 3 日创建的第一个区块）中，嵌入了以下信息：“财政大臣濒临第二次银行救助。”
    这句话出现在 2009 年 1 月 3 日的*泰晤士报*印刷版头版上。*泰晤士报*在全英国发行，但在 2008 年，其 43%的读者来自伦敦。该报也有美国版，但其内容与英国版不同。


    *泰晤士报*也有一个网站，如果中本聪生活在另外两个时区之一，他也可以在网上浏览，但网络版的标题略有不同：“财政大臣阿里斯代尔·达林濒临第二次银行救助”。必须说明的是，网站上也有封面图片，中本聪可能看到过封面，但这位于“我们的报纸”菜单下，该菜单位于“存档”菜单的最右侧。如果你在寻找日常新闻，点击这个菜单是件很奇怪的事。还有其他方式可以看到这个标题：路透社提供了一篇文章摘要，其标题与印刷版相同。同样，这也是一种比较奇怪的阅读新闻的方式。因此，最简单的解释是，中本聪订阅了*泰晤士报*，并在
    1 月 3 日看到了印刷版的头版。


    有些证据把中本聪居住在伦敦这幅图景给搅浑了。比特币白皮书 PDF 初稿的元数据中的时间戳显示时区为 UTC-7。夏令时将地点指向了太平洋时区。目前尚不清楚这有什么意义，但法证证据中的另一个有趣线索可能表明，中本聪在
    2009 年 1 月下旬曾在加州。多米尼克·弗里斯比提到，在最初只有中本聪和哈尔·芬尼运行比特币时，芬尼曾发布了一组调试信息的日志。这份日志显示，当时中本聪的机器正在加州运行。那是在
    1 月 3 日的创世区块和 1 月 8 日比特币启动之后，哈尔·芬尼已经开始运行比特币。我无法核实这一点，弗里斯比提到的日志也无法在他提供的链接中找到。尽管如此，中本聪可能当时正在访问加州。他可能是一名学者，可能在加州某所著名大学进行学术研究或参加会议。2009
    年 3 月 24 日保存的比特币白皮书 PDF 第二版的元数据显示为 UTC-6，即山区时区，因此中本聪的电脑位于新墨西哥州、犹他州、亚利桑那州或类似地区。也许他当时正在休假旅行？也许是别人生成的这些
    PDF？谁知道呢？无论如何，这些孤立的证据并不能否定绝大多数证据所表明的中本聪位于伦敦或至少是英国的观点。


    如果我们看看另外两个候选时区，它们表明中本聪在三年多的时间里一直是在工作日期间开发比特币。这意味着他是在全职开发比特币。因此，他必须有足够的储蓄来维持三年的生活。那会是很大一笔钱。他是从哪弄到这笔钱的？他的同行判断，这些代码并非出自专业程序员之手。另一个同样非常间接的法证证据表明，他的电脑性能不强。在
    `Bitcoin Talk` 的一次讨论中，用户 `MoonShadow` 写道，当只有中本聪一个人在挖矿且难度很低时，两个区块之间需要好几个小时。这表明电脑性能并不特别强大。如果你攒了三年的钱来搭建一个系统，却没有钱买一台性能强大的电脑，这很奇怪。我认为更可能的情况是，中本聪有一份全职工作，而把比特币当作一个业余项目在下午和晚上开发。这再次与
    GMT 时区数据（显示他在晚上和夜间编写代码）更为吻合。


    总之，我们可以说，中本聪在日本或澳大利亚的可能性极小；在美国东部或太平洋时区有可能，但可能性不大；而他在 GMT 时区（可能在伦敦或英国其他地区）的可能性极大。


    ### 国籍


    这个名字毫无疑问是日式的，有些人试图从中解读出含义。*Satoshi*（聪）的意思是“思维清晰、机智”，而*Nakamoto*（中本）则意为中心起源，指住在中间的人。我不确定这该如何解读。这并非一个稀有的名字：美国有几位名叫中本聪的人。网站
    `transfermarkt.com`（列出世界足球运动员身价）统计显示，姓“中本”的职业球员不少于 66 名，名“聪”的有 115 名。因此，这个名字似乎足够常见，以至于即使是不懂其含义、对日语和日本文化没有详细了解的人，也可以将其选作化名。将中本聪与日本联系起来的线索仅有一条：他使用了邮箱地址
    `satoshi@anonymousspeech.com`。网站 `anonymousspeech.com` 是一家总部位于日本东京的公司。但中本聪也使用过其他以匿名性著称的邮件服务，比如总部在欧洲的
    `vistomail.com` 和 `gmx.com`。


    大家一致认为，中本聪使用近乎完美的英式英语写作，这表明他的国籍应在英联邦国家，很可能是英国。另一种可能是澳大利亚、新西兰或南非，但尚未发现任何属于这些国家的独特短语或术语。


    毋庸置疑，中本聪始终如一地使用英式英语。他使用英式词汇如“bloody”，拼写采用英式的“-ou-”（如“labour”）而非美式的“-o-”，以及英式的“-ise-”（如“realise”）而非美式的“-ize-”。偶尔也会用到美式词汇，但这在当今几乎任何语言中都很常见。要像中本聪那样，如果他不是以英语为母语的英国人，却令人信服且始终如一地伪装成一门外语，很可能需要像反间谍机构里那样进行多年的训练。如前所述，中本聪来自英联邦；从现实角度讲，这可能是英国、澳大利亚、新西兰或南非。考虑到他很可能位于英国，因此，他很有可能是英国人。

    '
- fmt: '### Education and Work


    Nothing much is known with certainty about the education of Satoshi. It seems
    clear that he had higher education in the field of mathematics or computer science,
    judging from the references in the Bitcoin whitepaper. It is difficult to say
    precisely what field or the highest level, but it seems to be either a master’s
    or PhD. He had a particular interest in cryptography since he was on the cryptography
    mailing list and had a deep knowledge of specific areas. He was also interested
    in peer-to-peer computing, evidenced by his participation in the P2P Foundation
    forum.


    The Bitcoin whitepaper shows a firm grasp on academic writing, structure, and
    citation standards. It is not unreasonable to assume that he has published at
    least one article before. Gavin Andresen, who took over Bitcoin development after
    Satoshi left, believes his code was not from a professional coder. He might have
    worked as an academic, researcher, or consultant in the field of security.


    Some have speculated that he worked in banking or had an education in finance,
    but this is difficult to ascertain since most of what he produced was focused
    on working out the technical details. He does mention the economy and banking
    a few times, but these quotes do not seem to be anything more than standard libertarian
    talking points that you can read from anyone on the cryptography mailing list:
    banks are bad, fractional banking is bad and they irresponsibly lend out money
    creating credit bubbles, central banks create inflation, etc. There is the occasional
    citation of Austrian economists, but when the user `xc` on July 27, 2010, posts
    a fairly deep piece of monetary theory referencing Mises and Rothbard about money
    regression, the emergence of money, and how Bitcoin satisfies the requirements,
    Satoshi doesn’t seem to understand. As a response, he ventures into an odd thought
    experiment of a scarce metal with no real practical value and the possibility
    to transport it over a communications channel. He latches on to the property of
    scarcity, which is entirely beside the point of the post by `xc`; he offers no
    references and reverts to “I think.” This passage contrasts to his writings on
    cryptography or technology, where Satoshi is much more confident. I, therefore,
    find it unlikely that Satoshi had any formal education above under graduate courses
    or work experience related to finance or the economy.


    ### Values


    Satoshi’s values lean libertarian and anti-government, but not excessively so,
    which is seen from the incident at the end of December 2010 where it was suggested
    that WikiLeaks should start using bitcoins. Other users in the Bitcoin Talk forum
    argued for this, but Satoshi was relatively firmly against it. The argument is
    that it would bring unwanted attention.


    As already noted, he has a problem with central banks because they recklessly
    print money. Banks are also bad because they will cooperate with the government
    and compromise your privacy. They also charge too much to supply their services,
    which is why keeping transactions free is something he continuously fights for.


    There are no radical libertarian viewpoints, such as the abolition of all government
    authority or the complete dismantling of government regulation of trade with illicit
    substances, as some later proponents of Bitcoin have assumed. There is no evidence
    that his motivation was to facilitate drug trading, money laundering, or any other
    illicit type of exchange. Indeed when he gives examples of how he sees Bitcoin
    being used, they appear somewhat pedestrian. In a forum post on September 23,
    2010, he writes, “Bitcoin would be convenient for people who don’t have a credit
    card or don’t want to use the cards they have, either don’t want the spouse to
    see it on the bill or don’t trust their number to porn guys or afraid of recurring
    billing.”


    In a reply to Dustin Trammell on January 17, 2009, the very beginning of Bitcoin,
    he imagines Bitcoin as variously: reward points, donation tokens, in-game currency,
    or micropayment for adult sites. Other potential applications Satoshi envisioned
    could be subscription sites and email proof of work. The last point is directly
    taken from `Hashcash`, but the use for reward points had also already been around
    since the turn of the millennium as evidenced by `Flooz` and `Beenz`, as we saw
    earlier.


    These visions seem to be derived more from a middle-class idealist than a revolutionary
    anti-government would-be drug kingpin or radical libertarian economic thinker.


    It, therefore, seems fair to say that Satoshi is leaning libertarian but not a
    revolutionary in the political or activist sense. Indeed he explicitly rejects
    such revolutionary leanings. He distrusted the government but was not explicitly
    anti-government. He seems informed by more middle-class concerns like subscriptions,
    privacy, reward points, donations, and spouses and reads the paper.


    ## Summary of Satoshi’s Profile


    Not much can be said with certainty about Satoshi. Still, we do have a few solid
    clues based on primary sources for the profile in descending order of certainty:
    He is in all probability male, British, living in Europe/United Kingdom probably
    in the London area. Probably born in the early 1970s with a long academic education
    probably in computer science or mathematics. Programs in C++. He is working full-time
    as an academic, researcher, or consultant in the IT security area. Not a revolutionary
    but an idealist with libertarian leanings. He may be married and living a stable
    middle-class family life. When it comes to skills, he has deep knowledge of proof
    of work, peer-to-peer technologies, virtual currencies, and private key encryption.


    # 7. The Usual Suspects?


    As we saw earlier, the proposed identities of Satoshi seemed to be in need of
    revision. The profile that we have made further supports the conclusion that the
    real identity of Satoshi has yet to be found in previous attempts. The most robust
    piece of forensic evidence we have is that Satoshi is British and based in London.
    None of the earlier suspects fit that fact. It is necessary to look beyond the
    usual suspects.


    We, therefore, have to find a way to expand the search. The best way to do that
    is again to look at the primary sources written by Satoshi himself. As we have
    seen, he does not write explicitly about himself or any collaborators, but the
    Bitcoin whitepaper references several other researchers. In academic circles,
    citing teachers, collaborators, and, most of all, oneself is very common. This
    opens a new and exciting way of approaching the search: could Satoshi have cited
    himself? Even if he didn’t, we would get a good clue as to the social and academic
    circles in which he is to be found. Let us, therefore, go back to the list of
    references we can find in the Bitcoin whitepaper.'
  raw: '### Education and Work


    Nothing much is known with certainty about the education of Satoshi. It seems
    clear that he had higher education in the field of mathematics or computer science,
    judging from the references in the Bitcoin whitepaper. It is difficult to say
    precisely what field or the highest level, but it seems to be either a master’s
    or PhD. He had a particular interest in cryptography since he was on the cryptography
    mailing list and had a deep knowledge of specific areas. He was also interested
    in peer-to-peer computing, evidenced by his participation in the P2P Foundation
    forum.


    The Bitcoin whitepaper shows a firm grasp on academic writing, structure, and
    citation standards. It is not unreasonable to assume that he has published at
    least one article before. Gavin Andresen, who took over Bitcoin development after
    Satoshi left, believes his code was not from a professional coder. He might have
    worked as an academic, researcher, or consultant in the field of security.


    Some have speculated that he worked in banking or had an education in finance,
    but this is difficult to ascertain since most of what he produced was focused
    on working out the technical details. He does mention the economy and banking
    a few times, but these quotes do not seem to be anything more than standard libertarian
    talking points that you can read from anyone on the cryptography mailing list:
    banks are bad, fractional banking is bad and they irresponsibly lend out money
    creating credit bubbles, central banks create inflation, etc. There is the occasional
    citation of Austrian economists, but when the user xc on July 27, 2010, posts
    a fairly deep piece of monetary theory referencing Mises and Rothbard about money
    regression, the emergence of money, and how Bitcoin satisfies the requirements,
    Satoshi doesn’t seem to understand. As a response, he ventures into an odd thought
    experiment of a scarce metal with no real practical value and the possibility
    to transport it over a communications channel. He latches on to the property of
    scarcity, which is entirely beside the point of the post by xc; he offers no references
    and reverts to “I think.” This passage contrasts to his writings on cryptography
