- fmt: "# Bitcoin, Society, and the Cosmos\n\nIn summary, we can see that Bitcoin\
    \ was imagined by the extropians, created by cypherpunks, developed by open source\
    \ hackers, and adopted by libertarians. It depends on a particular type of social\
    \ organization characterized by weak grid and weak group. There is no great degree\
    \ of cohesion between the members of the community. Engagement is transactional.\
    \ Compare this with the surrounding world of fiat currencies with general rules,\
    \ regulations, and elaborate bureaucratic processes.\n\nDouglas summarizes the\
    \ difference between the two modes: “The line across the page separates the area\
    \ of conformity from innovation.” This can be seen in the monetary instruments\
    \ they use. Fiat currencies follow the way of conformity, while Bitcoin is the\
    \ innovation. As such, the currencies act as both instruments of and proxies for\
    \ the different types of social and cosmological orientations embedded in the\
    \ social groups.\n\nBitcoin is much more than a fascinating technological innovation.\
    \ It is deeply embedded in the social structures by which it was created and the\
    \ product of these social structures. These social structures also promote a particular\
    \ view of the world that differs radically from the way of the surrounding society.\
    \ They try to push back on these and change them through subversive acts and overt\
    \ propaganda. So there is more at stake than just a currency; it is about the\
    \ ideal shape of society and the world in general.\n\n# 10. Religion\n\nTo many\
    \ people, Bitcoin is much more than just a convenient online payment option or\
    \ a way to make money speculating on its continued rise in value. It is a cause\
    \ to which some people dedicate themselves with considerable zeal. That this is\
    \ something more than an ordinary interest of technology enthusiasts, I have felt\
    \ myself. Whenever I have written something in public that could be interpreted\
    \ as critical to Bitcoin, I have invariably been faced with the wrath of Bitcoin\
    \ enthusiasts calling me things that do not need quoting. One interesting example\
    \ that is from a response to an answer I gave a few years back about Bitcoin on\
    \ Quora comes here:\n\n*Heretic. You will be forced to eat your word once BTC\
    \ crosses $10 million, solves world hunger, and brings peace to middle-east. Once\
    \ each terror attack is logged into the blockchain everyone will be secure because\
    \ crypto.*\n\n—User Kamran Khan\n\nHaving written and debated about tech for decades,\
    \ this is something I have never experienced. Usually, the responses to my articles\
    \ and posts are a shrug or helpful clarifications from detail-oriented conscientious\
    \ readers or even heated counterarguments. Still, this is the first time I have\
    \ been called a heretic for writing critically about anything tech related.\n\n\
    Some people call themselves Bitcoin maximalists and believe it is the only true\
    \ and fair currency in the world. Some people, like the Quora user quoted, believe\
    \ Bitcoin will transform the world. Some of this enthusiasm for Bitcoin approaches\
    \ religious zeal. Indeed some aspects of Bitcoin do resemble religion quite closely.\n\
    \n## What Is Religion?\n\nReligion comes in many different forms and shapes. If\
    \ religion were only world religions such as Christianity, Buddhism, or Hinduism,\
    \ it would be nonsensical to compare Bitcoin to them. There is no agreed definition\
    \ of what the essence of religion is. This is not for lack of trying. For decades\
    \ discussions have been made about the definition of religion. We do not, however,\
    \ need a full-fledged definition of religion but rather to accept that there are\
    \ multiple distinct aspects of religion. Some of these we find around Bitcoin\
    \ too.\n\nA religion always has a community of believers or followers. This I\
    \ will call the Bitcoin community. They engage with each other, share similar\
    \ ideas about the world, and have a shared goal. We are not claiming that Bitcoin\
    \ is a god or divine as such, but rather that religious behavior and ideas have\
    \ shaped the reception and formation of the Bitcoin community in multiple ways.\n\
    \n## The Prophet\n\n> *See how the faithful city*\n> \n> *has become a prostitute!*\n\
    > \n> *She once was full of justice;*\n> \n> *righteousness used to dwell in her—*\n\
    > \n> *but now murderers!*\n> \n> *Your silver has become dross,*\n> \n> *your\
    \ choice wine is diluted with water.*\n> \n> *Your rulers are rebels,*\n> \n>\
    \ *partners with thieves;*\n> \n> *they all love bribes*\n> \n> *and chase after\
    \ gifts.*\n> \n> *They do not defend the cause of the fatherless;*\n> \n> *the\
    \ widow’s case does not come before them.*\n> \n> *Therefore the Lord, the Lord\
    \ Almighty,*\n> \n> *the Mighty One of Israel, declares:*\n> \n> *“Ah! I will\
    \ vent my wrath on my foes*\n> \n> *and avenge myself on my enemies.*\n> \n> *I\
    \ will turn my hand against you;*\n> \n> *I will thoroughly purge away your dross*\n\
    > \n> *and remove all your impurities.*\n> \n> *I will restore your leaders as\
    \ in days of old,*\n> \n> *your rulers as at the beginning.*\n> \n> *Afterward\
    \ you will be called*\n> \n> *the City of Righteousness,*\n> \n> *the Faithful\
    \ City.”*\n> \n> *Zion will be delivered with justice,*\n> \n> *her penitent ones\
    \ with righteousness.*\n> \n> *But rebels and sinners will both be broken,*\n\
    > \n> *and those who forsake the Lord will perish.*\n> \n> —Book of Isaiah 1:21–28\
    \ (translation: New International Version)\n\nThe prophet Isaiah is believed to\
    \ have lived in ancient Israel in the eighth century BCE. Since sources are naturally\
    \ sparse, nothing much is known with certainty. Some assume that he came from\
    \ an aristocratic class. Still, he had intimate knowledge of the conditions of\
    \ poor, homeless, and landless people indicating that he was not a traditional\
    \ aristocrat. It is also vital to notice that he was not of a priestly family.\
    \ This puts him outside the formal religious authority with sympathy for the victimized\
    \ and oppressed.\n\nReligions often feature the figure of the prophet. This is\
    \ particularly prevalent in the Abrahamic religions (Judaism, Christianity, and\
    \ Islam), where it is a central focus. The figure of the prophet is someone who\
    \ has hidden knowledge about the actual state of the world, particularly about\
    \ the future. There is often resentment of the present society, its mores, and\
    \ its general decay. In the Abrahamic religions, the prophet commands people to\
    \ return to the way of God and the proper ethical way of living.\n\nThis diagnosis\
    \ of present society as a fallen society is supplied with a prescription for the\
    \ right way of living. In Islam, they include the five daily prayers, the Hajj,\
    \ and the study of the Quran, among others; in Christianity, the Golden Rule.\n\
    \nThe prophet usually lives at the fringes of society. In the Old Testament, it\
    \ is the desert. He does not come from the mainstream of religious authority.\
    \ It is precisely the fact that the prophet comes from outside the established\
    \ power structures that makes the prophecy powerful. Consequently, the established\
    \ power often targets the prophet, which adds to the moral indignation fueling\
    \ the prophecy.\n\nAs a person, the prophet is enigmatic and charismatic, drawing\
    \ followers due to his/her ability to capture their attention and convince them\
    \ of his/her worldview. In addition, he/she is a good orator and able to put thoughts\
    \ into precise and memorable quotes that his followers are able to remember and\
    \ live by.\n\nIn Bitcoin, the “prophet” is, of course, Satoshi Nakamoto. He is\
    \ the enigmatic founder whose origin, if not quite divine, is then unknown. He\
    \ travels in arcane knowledge, that is, cryptography. Satoshi’s worldview is one\
    \ where the established world order is depraved due to excessive lending by governments\
    \ and banks, resulting in credit bubbles, where the undeserving banks have to\
    \ be bailed out."
