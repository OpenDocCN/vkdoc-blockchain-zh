  trans: '

    # 本书大纲


    本书第一部分是一部技术史，梳理了比特币所依托的关键发展历程。这些发展或多或少是独立进行的，最终融合成了比特币。在解释清楚这些之后，我们才能更深入地阐述比特币的工作原理。对这些原理的理解将贯穿本书的其余部分。


    我们将考察比特币出现之前的电子货币或虚拟货币的历史。摆脱货币物理形态的梦想由来已久，在比特币之前已出现过几次失败的尝试。通过消除货币的物理属性，伪造变得不可能，或者至少转变为一种电子层面的行为。但这同时也带来了新的问题和监管挑战。


    二十世纪密码学的关键发展为比特币铺平了道路。密码学的目的是通过维护信息的机密性和完整性来保护其私密性。密码学历史悠久，但直到最近才发展成一个专门的学术领域。电子计算机的出现只是加剧了已有的趋势，这促使了旨在缓解互联世界问题的新技术的开发，并从根本上为千年难题带来了全新解决方案。


    基于我们对历史前身所获得的认识，我们将逐步拼凑出比特币和区块链的工作原理。我们将看到钱包、区块链、挖矿和比特币代币等核心概念如何在比特币系统中运作，从而提供一种全球性的虚拟货币。


    在完成一般性的历史考察之后，我们将把注意力转向围绕比特币出现的特定历史方面。我们将尝试对它的发展进行历史记述，并审视现有资料能告诉我们关于其神秘发明者——中本聪——的哪些信息。


    我们将尝试提供一些关于历史上中本聪究竟是谁的见解。此前许多关于比特币的文章都集中于探讨中本聪背后的历史人物或团体究竟是谁，但我们将以历史批判的视角来审视这个问题，并筛选现有证据，以便更清晰地理解我们能够和不能够就中本聪的身份说些什么。


    自 2011 年以来，既有资深记者，也有业余博主，对此进行了大量调查和猜测。但资料本身究竟说了什么？通过聚焦于这些资料，我们能够提取出几个需要关注的关键特征。这将使我们能够构建出中本聪的侧写画像。以一手资料为基础，我们将列出一份可能是中本聪的历史人物名单，并将他们与侧写画像进行匹配。事实上，我们会发现，只有一个明确匹配的人选。


    本书的最后一部分将尝试将比特币置于更广阔的背景下，考察如何在人类文明的宏大图景中看待比特币，因为它并非存在于技术真空中、仅解决技术问题，而是牢固地植根于一系列对人类文明至关重要、且历来如此的主题网络之中。


    自史前时代起，人类就从事交换活动。这种活动在从物物交换，到经由中介（如货贝、金银币），再到纯粹象征性交换手段的连续光谱上，呈现出许多不同的形态。我们将考察货币的历史与本质，并了解比特币如何与之契合。


    社会组织对于理解文化现象至关重要。因此，我们将更深入地研究与比特币相关的不同类型的社会组织。我们将审视密码朋克、自由意志主义者和开源开发社区，并探究比特币的本质和愿景如何与其产生、使用的社会组织紧密相连。


    一个鲜少被讨论的话题是比特币及加密运动的宗教层面。但就人类文化而言，这些层面并非新鲜事物。理解这一点，有助于解释比特币信徒许多看似奇怪的行为，而无需声称比特币是一种真正的宗教。我们可以清晰地看到其中的相似之处：先知中本聪；神圣经文——比特币白皮书；真信徒与异教徒的划分；以及无处不在的千禧年主义特征。


    接着，我们将审视比特币可能的未来。基于几种未来发展的情景，我们将推演比特币如何可能与之契合。根据我们在本书过程中所收集的见解，我们可以假设性地构建比特币在不同环境下可能的发展模式。


    在最后一章，我们将超越人类视角，尝试从另一个角度来看待比特币。我们会提出一个疑问：比特币是否可能是活的？我们将通过将其与普通生物生命的评判标准进行比较来探讨。我们会发现，出人意料的是，它竟是一个独立存在的、显示出生命迹象的超有机体。


    关于作者  关于技术审校


    # 1. 虚拟货币


    摆脱货币物理形态的梦想由来已久。在比特币之前，已经有过几次尝试。纵观人类历史，用作货币的媒介种类多得令人难以置信，从雅浦岛的巨石，到美拉尼西亚的海贝，再到中国的纸币。尽管这些媒介种类繁多且充满想象力，但货币始终具有物理形态。


    货币的物理性有着明显的缺点。如果你需要去邻近城镇的集市买一匹马，就必须为此带上钱。这限制了可以用作货币的媒介种类，因为需要随身携带或以其他方式运输其重量。因此，砖块和树干并不是好的货币选择。更常见的是较小的稀有物品，如海贝、珠子和贵金属，而在近代历史中，纸币也日益流行。这些为运输问题提供了尚可接受的解决方案。尽管如此，货币在两次交易之间仍需储存，这意味着它可能在火灾中被烧毁，像银、铜这类金属会腐蚀，而贝壳则可能被压碎。物理世界允许许多可能的破坏方式，这很不幸。另一个问题是失窃的风险，因为货币的所有权只能通过占有来确认。伴随这些问题而来的，还有伪造的可能性——即制造新货币并将其非法引入经济体系。


    因此，有诸多充分理由让人渴望一种虚拟货币，从而使这些物理上的弊端消失。20 世纪，支票和信用卡的引入消除了其中一些问题。但这些新技术反过来又引入了新问题。支票需要清算，并且可能被拒付，因此在开具支票时交易并不一定最终完成。信用卡也是如此。付款需要数天才能清算，并且之后可能会产生争议。这些问题在实体货币中从未存在。另一些人所苦恼的是，银行是必要的中间人，它们拥有窥视我们私生活的特权视角，而基于基本的隐私权，它们本不该拥有这种权力。这再次与实体货币不同。因此，虚拟货币不仅仅是一种通过虚拟方式使用普通实体货币的途径；它是一种支持商品和服务交换的新方式，带来了其独特的可能性和挑战。

    '
- fmt: '# What Is a Virtual Currency?


    The definition of *virtual currency* is contested. Most can agree that virtual
    currency does not need a physical manifestation, but can it have a physical manifestation?
    If yes, how? Even among regulators, there has yet to be a consensus on different
    aspects in the European Union (EU) and United States.


    The term `virtual currency` has been used in different contexts throughout the
    twentieth century. It can be documented back to the start of the previous century
    in the context of monetary theory. It was used in the sense of something in place
    of a currency. As such, it was used, for example, to describe how Spanish colonies
    in the eighteenth and nineteenth centuries used notes as money. It has also been
    used concerning the so-called prediction markets that gained popularity toward
    the end of the twentieth century. Here one could bet on a prediction of an event
    with a virtual currency and win if it came true. The virtual currency could have
    an exchange rate for real currency.


    Around the turn of the millennium, the euro was initially used before the European
    Central Bank (ECB) started to issue notes and coins. This was described as a virtual
    currency. It was also used in more popular circles in the 2000s, where the currency
    of the online game *Second Life*, called Linden dollars, was described as a virtual
    currency.


    The term `virtual currency` can therefore be seen to have a story that predates
    Bitcoin and other cryptocurrencies. However, it was only after Bitcoin emerged
    that regulators felt compelled to define virtual currencies formally.


    In October 2012, the European Central Bank published a report on cryptocurrency
    schemes. This was motivated by the observation that virtual communities started
    circulating their own currencies. Given that the ECB is the central authority
    of the European banking system providing oversight of payments, they felt the
    need to clarify this phenomenon. The ECB defined `virtual currency` as “(…) as
    a type of unregulated, digital money, which is issued and usually controlled by
    its developers, and used and accepted among the members of a specific virtual
    community.” They note that it differs from electronic money because it has no
    physical counterpart with legal tender status.


    Virtual currencies are thus not the money you transfer through your online banking
    system or credit card payments even though this might be experienced as a virtual
    transfer of funds. These are digitally mediated currency transactions. Virtual
    currencies are, according to the ECB, currencies that are issued by private entities.
    In the report, they distinguish three types. Type 1 is closed virtual currency
    schemes as used internally in online games. Here, the currency is generated inside
    the virtual entity and is not officially exchanged with real currency. By real
    currency, we mean currency that has legal tender somewhere. Type 2 has a unidirectional
    flow where it is possible to purchase the virtual currency that can be used for
    virtual goods and services and sometimes for physical goods and services. This
    type is also prevalent in online games. Type 3 has a bidirectional flow and acts
    like any other convertible currency with a buy-and-sell rate. These can be used
    to purchase real or virtual goods and services. Bitcoin and other cryptocurrencies
    fall into this type; they can be exchanged online and used for payments.


    This was merely an initial assessment of the new phenomenon of virtual currencies
    by one EU body. In 2018 came a more comprehensive directive that set the legal
    parameters of virtual currencies for the EU in relation to money laundering and
    financial crime. This directive is an amendment to the Directive 2015/849, the
    purpose of which is to prevent the use of the financial system for money laundering
    and financing of terrorism.


    Here `virtual currency` is defined as “(…) a digital representation of value that
    is not issued or guaranteed by a central bank or a public authority, is not necessarily
    attached to a legally established currency, and does not possess a legal status
    of currency or money, but is accepted by natural or legal persons as a means of
    exchange and which can be transferred, stored and traded electronically” (p. 54).


    In the United States, the Department of the Treasury Financial Crimes Enforcement
    Network (FinCEN) took upon itself to issue guidance clarifying its views on virtual
    currencies in 2013. According to FinCEN, a virtual currency is viewed in contrast
    to real currencies and is consequently seen as “a medium of exchange that operates
    like a currency in some environments but does not have all the attributes of real
    currency. In particular, virtual currency does not have legal tender status in
    any jurisdiction.”


    FinCEN was primarily concerned with the different activities related to virtual
    currencies and distinguished three types of agents and their obligations. These
    are `users`, `administrators`, and `exchangers`. Users are not considered money
    transmitters, but administrators and exchangers are. Similarly to the European
    Union, virtual currencies were initially approached from a crime prevention perspective.
