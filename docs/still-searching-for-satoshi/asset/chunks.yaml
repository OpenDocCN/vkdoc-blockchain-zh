  trans: '

    # 美元解放之路


    在 `DigiCash` 之后，又有人尝试以“自由美元”的形式创造一种货币。尽管它也有虚拟成分，但其构想源于一枚银元形态的实物体现。它与其他虚拟货币的驱动力相同，而它的消亡预示了未来数十年将主导数字货币的一个主题。


    `伯纳德·冯·诺特豪斯` 长期思索着价值的本质。早在 1974 年，他就与伙伴 `泰莉·普雷斯利` 合著了一篇题为《认识价值——一项经济研究论文》的文章。这份引用了
    `奥尔德斯·赫胥黎` 和 `斯瓦米·克里亚南达` 的文献主张：只有黄金才是真实的，并应成为价值的基础。这再次触动了我们在自由主义者和 `比特币` 爱好者中反复看到的一个心结：对失去金本位制、导致中央银行持续印钞并引发通胀的遗憾。`冯·诺特豪斯`
    坚决反对 `美联储`，并创立了“全国废除美联储组织”（`NORFED`）。


    1998 年，该组织开始通过位于 `爱达荷州科达伦` 的 `阳光铸造公司` 发行银质自由美元。后来也推出了金质和铂金版本。这些硬币可以按银、金或铂金的价格购买。由于在美国制造或销售意图用作货币的金或其他金属硬币是违法的，他们强调这些是纪念章而非法定货币。这些硬币可以实物购买，也可以通过仓库收据购买，该收据可在其爱达荷州的仓库兑换一枚自由美元。虽然仓库收据是纸质的，但更有趣的是，它们也可以以
    `eLibertyDollars` 的数字形式发行。因此，自由美元提供了一种数字化的价值储藏手段（货币的三个属性之一），但它并未被用作交换媒介或记账单位（另外两个属性）。


    不幸的是，对于 `伯纳德·冯·诺特豪斯` 而言，美国并不认同自由美元仅仅是纪念章。2007 年 11 月，其办公室遭到 `FBI` 和 `特勤局` 的突击搜查，所有硬币被没收。`冯·诺特豪斯`
    于 2009 年被捕，最终在 2011 年因制造和销售自己的硬币而被定罪。尽管他的上诉未获成功，但刑期从检察官要求的 23 年监禁减为 6 个月软禁和 3
    年缓刑。随后，相当数量的自由美元被归还给了其所有者。


    自由美元表明，替代性硬币确实存在市场（售出超过 25 万枚），且数字化的价值储藏手段是可行的，但它也为后来所有的替代性货币提供了一个警示故事。它展示了面临多年漫长审判和可能监禁的风险。


    # 数字黄金货币


    自由美元所开创的、由私人拥有黄金及其他贵金属的追求，被其他类似的倡议所承接。在整个 20 世纪 90 年代和 21 世纪初，提供消费者数字买卖黄金服务的公司数量激增。这些通常被称为数字黄金货币（`DGCs`）。有些是由理想主义者推动的，而另一些则沦入犯罪行为，或从一开始就是彻头彻尾的骗局。其中一家名为
    `e-gold` 的公司，因其规模和成功，其法律后果最为引人注目。


    美国私人拥有黄金的历史是一段惨痛的经历。这段历史推动了对于公平虚拟货币的追求，并最终汇入了加密货币。要理解这一点，我们需要回到 1933 年 4 月 5 日，当时
    `哈里·S·杜鲁门` 签署了 `第 6102 号行政令`，禁止美国公民拥有黄金。这一禁令一直有效，直到 1974 年被 `杰拉尔德·福特` 废除。拥有黄金在当时仍然是一件相当麻烦的事情，因为人们需要找到地方获取、运输并安全保管。因此，持有黄金是小众行为，但需求却更为广泛。我们必须记得，今天通过在线经纪商买卖和拥有黄金很容易，但在世纪之交，这样的服务只对少数人开放。如前所述，当时存在一个具有自由主义倾向的重要小众群体，他们普遍不信任政府，尤其不信任
    `美联储` 及其管理货币发行的能力。对这些人来说，金本位制在 20 世纪 20 年代被废除，是货币与黄金脱钩的堕落时刻。在金本位制下，人们可以轻松地将货币按固定比率兑换成黄金，并兑换成其他货币。由于金本位制无法恢复，退而求其次的选择就是自己拥有黄金。


    `e-gold` 由肿瘤学家 `道格拉斯·杰克逊` 和律师 `巴里·唐尼` 于 1996 年创立。其目的是让普通人能够以数字方式买卖和交易黄金。所有 `e-gold`
    都由实际的实物黄金支持。通过其系统，用户可以即时将其账户中任意数量的黄金或其他贵金属转移到另一个账户。这种转移是匿名的且不可撤销的。如果用户将黄金转错了账户，该公司除了向对方用户发送请求，要求其转回之外，别无他法。


    `e-gold` 设立了透明度的新标准，其资产每日接受审计并更新。金条的序列号公之于众。该公司也尽力遵守法规，例如，曾请求 `IRS` 进行审计，以确定他们需要遵守哪些规定。


    虽然起步缓慢，但在世纪之交之后便开始加速。在巅峰时期，它每年处理超过 20 亿美元的交易，并在 2009 年业务停止时拥有 500 万个账户。如果说自由美元主要是一种价值储藏手段和政治声明，那么
    `e-gold` 作为交换媒介则更为成功（它甚至被用作 `eBay` 上的一种支付方式），以至于最终也被罪犯和洗钱者所利用。最终，`道格拉斯·杰克逊` 和
    `巴里·唐尼` 被指控经营无牌汇款业务以及共谋洗钱。尽管他们顽强地为自己辩护，但最终还是达成了认罪协议，两位创始人被处以罚款、居家监禁和社区服务。账户中的资金最终被分配给客户，公司随之关闭。对于许多对虚拟货币感兴趣的人来说，这是一个关键案例：创始人竭尽全力遵守法规，却仍被政府定罪并起诉。这进一步强化了政府不可信任的观念。

    '
- fmt: '## Ecommerce Rises


    While these previous efforts at making virtual currencies were primarily driven
    by libertarian ideology, the dot-com era and commercialization of the Internet
    provided space for a new type of use for virtual currency. Around the turn of
    the millennium, the Internet was still very much an information-sharing project.
    Trading anything was risky and cumbersome. At this time, there was no established
    payment method, and it was unclear which form would be dominant. The credit card
    companies and `PayPal` had yet to win the battle for digital payment. In this
    context, other options were being considered and tried out.


    The time leading up to the dot-com crash of 2000 was a happy one full of optimism
    for ecommerce. The Internet was turning from an information-sharing platform to
    a platform for commerce. The only problem was that the Internet was not in any
    way built for this to be done safely and securely. Information was meant to be
    open and shared, not secret like you would expect regarding money. This presented
    merchants with a fundamental problem: receiving money for regular transactions.
    A credit card had card details that could be used to identify an account for a
    transaction, but how would one protect this information and prevent it from abuse?


    At the time, several options were competing for being the primary means of exchange
    on the Internet. The big card providers were in the game, but `PayPal` also presented
    a coherent vision. In 1999 two other companies joined the emerging payment space
    of the Internet, `Flooz` and `Beenz`. These were altogether different visions
    than the ones we had seen before. `Flooz`’s vision was to establish a currency
    for Internet merchants similar to frequent flier programs. Users could get `Flooz`
    credits either as awards by merchants or by purchasing them from the `Flooz` website.
    But the pattern repeated itself: by 2001, the FBI notified that it was used for
    money laundering; a Russian-Filipino crime syndicate was buying and spending credits
    with stolen credit cards. The company closed in the summer of 2001, leaving more
    than 300,000 customers with worthless `Flooz` credits.


    `Beenz` was the leading competitor. It was conceptualized as a micro-currency
    that would reward people for their attention and for performing different actions
    online. Once the users had gained credits, they could be sold or spent. `Beenz`
    branded itself as the Web’s currency and consequently saw itself investigated
    for running an unlicensed bank. The company insisted that it was merely virtual
    points. It folded after further funding failed to materialize when the dot-com
    bubble burst in 2001.


    These are examples of currencies tailored more to the preferences and convenience
    of the general consumer and merchant than to secure privacy. Still, they suffered
    many of the same weaknesses, such as exposure to fraudulent use and regulatory
    challenges.


    ## From Digital Postage to Money


    Along with the spread of the Internet came email. Shifting from physical mail
    to electronic mail made communication easy. Too easy, in fact. The consequence
    of letting people send mail to anyone free of charge is spam. In the old physical
    world, it was not impossible to send mail to everyone, but there was a natural
    limit since each letter had a small cost defined by postage. The purpose of `Hashcash`
    was similarly to create a method to incur expenses on sending an email. Since
    postage is not dissimilar to bank notes, this in turn could be the basis more
    generally for producing a virtual currency. From this unlikely source, the solution
    for how to produce Bitcoin was born.


    In May 1997, the British engineer Adam Back proposed a mechanism for “(…) throttling
    the systematic abuse of un-metered internet resources such as email.” He called
    this `Hashcash`. This system generated a token as so-called proof of work, a concept
    we will return to. In short, it consists of solving a mathematical challenge difficult
    enough to warrant significant use of CPU power. This naturally has a cost in terms
    of energy and time. Thus, the `Hashcash` token is unlike previous examples of
    virtual currency pegged to or representing some other currency or precious metal.
    It expresses value only insofar as it was costly to produce.


    Furthermore, `Hashcash` was not conceived as money but as postage. This could,
    however, be generalized into money. Back also speculated along these lines and
    suggested that tokens could be bought and sold through an anonymous ecash system
    like David Chaum’s. Some could then specialize in what would later be known as
    mining `Hashcash` tokens that they would sell to others to use. The problem was
    that a token could be used only once and somebody had to track whether it was
    already used.


    Hal Finney picked up on the idea of Adam Back. Finney wasn’t just anybody and
    would later be central to the development and success of Bitcoin. He had been
    part of the cypherpunk and cryptography mailing lists. He was intimately involved
    in the extropian movement, which dreamt of a future on the other side of the singularity
    where cryogenics would mean you could be resurrected. But if you were to be resurrected
    in a couple of hundred years, a primary concern would be ensuring you had some
    cash to live from, and banks and governments naturally could not be trusted.


    Consequently, a private digital cash system was a central quest of this future
    vision. Finney had been involved in more than a few ideas about such. He proposed
    a method by which these tokens could be used again as reusable proof-of-work (RPOW)
    tokens. This would transfer the `Hashcash` tokens from a form of expendable postage
    type of tokens to real reusable currency tokens that could function as a virtual
    currency.'
