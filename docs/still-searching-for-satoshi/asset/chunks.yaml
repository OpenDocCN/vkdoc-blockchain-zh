    # 4. 比特币


    现在我们可以开始梳理比特币的运作方式了。前几章内容让我们更好地理解了多种多样的技术以及虚拟货币的试验，正是这些试验使得比特币得以在这个特定时间点出现。在深入探究使其成为可能的技术细节之前，我们先简要勾勒一下比特币的一些关键组成部分。


    简单来说，比特币是一个提供名为 `bitcoin`（比特币）的虚拟货币的系统，用户无需通过银行、公司或其他组织等任何中央中介机构即可进行交易。比特币可以精确到小数点后八位（相比之下，普通货币通常只能精确到小数点后两位）。其最小单位称为
    `satoshi`（聪），类似于美分与美元的关系。


    要开始使用 `bitcoin`，用户需要拥有一个数字钱包。这个钱包包含用户可以用来与其他用户交换 `bitcoin` 的公开标识符。它的功能类似于我们熟知的账户，用于持有
    `bitcoin`，即你可以从中支取总额的 `bitcoin`。只有两种方式可以将 `bitcoin` 存入钱包：一种是通过称为“挖矿”的过程创建 `bitcoin`（我们稍后会讲到），另一种更常见的方式是让别人将
    `bitcoin` 转账到你的钱包。后一种方式可以是作为商品或服务的付款，也可以通过购买来实现。


    不过，仍然只有少数人将 `bitcoin` 作为支付手段。当你购买 `bitcoin` 时，你实际上是将美元等法定货币转移给某个中间人，该中间人钱包里有 `bitcoin`，再将其转入你的钱包。这可以通过某个比特币交易所或任何钱包里有余额的人来完成。另一种方式是通过其他加密货币购买
    `bitcoin`，这也很常见，因为 `bitcoin` 在众多不同的加密货币之间起到了桥梁作用。这些交易平台独立于比特币系统之外。比特币系统内部不存在美元或任何其他法定货币。


    到目前为止，我们对于常规货币和银行的直观理解仍然适用：我们有一种用单位计算的货币，这些单位汇总成钱包里的余额，并且在钱包之间可以进行转账。但在这里，我们开始步入一个相对于传统货币体系而言显得非常奇特的道路。所有曾经发生过的交易都记录在一个公共账本上。这就是所谓的
    `blockchain`（区块链）。任何钱包的余额都是通过查看与该钱包相关的所有转入和转出交易（借记和贷记）动态计算得出的。因此，任何地方都没有记录余额；它是基于流入和流出之间的差额计算出来的总额。比特币网络允许用户在任意时刻花费这个总额。它之所以被称为
    `blockchain`，是因为大约每十分钟，网络上待处理的交易就会被打包成一个区块，该区块会获得一个编号和一个哈希值。这个哈希值会被用于下一个区块，从而形成一条链。这种方法确保了从第一个区块（称为创世块）开始，整条链上交易记录的完整性。我们稍后会详细讨论细节。


    现在，这个系统需要有人来运行它。银行有中央服务器负责记录和清算所有交易，而比特币则采用一个节点网络。这是一个由众多计算机组成的网络，它们都在同一个公共交易记录上工作。该网络会收集用户想要进行的所有交易，并将其记录在一个区块中。这些运行比特币网络的计算机被称为矿工。他们会因验证交易的工作而获得
    `bitcoin` 奖励。原则上，任何计算机都可以通过下载开源的比特币软件来开始挖掘 `bitcoin`。但实际上，普通计算机很难产出任何 `bitcoin`，因为挖矿任务已经变得高度专业化，需要定制的芯片才有可能获得奖励。请记住，对于所有其他未能生成区块的计算机，是没有任何奖励的。


    矿工们通过尝试解决一个加密谜题来竞争创建下一个交易区块。这是一种工作量证明，需要消耗大量的计算资源。网络上第一个解决谜题并成功创建交易区块的节点，将获得新铸造的
    `bitcoin` 作为奖励。每个区块产生固定数量的 `bitcoin` 作为奖励。


    以上是对比特币及其大致运作方式的简要概述，旨在提供一个总体概念。现在，让我们深入探讨细节。

    '
- fmt: '# A Virtual Currency


    Bitcoin picks up from the previous attempts at virtual currencies that went before
    it. It builds directly on the virtual currencies in the crypto strain of virtual
    currencies, where the emphasis is on privacy and a steady money supply. The Bitcoin
    whitepaper cites only two previous cryptocurrencies: Adam Back’s Hashcash and
    Wei Dai’s B-money. From Hashcash, it inherited the idea to employ proof of work
    to mint the currency. Much of Bitcoin’s substance was already defined in Hashcash,
    so much so that Back would later say that he invented the bitcoin mining function,
    arguably a central component. Through bitcoin mining, the currency is produced
    and put into circulation like the Hashcash token, which is then subsequently ready
    for use in exchange.


    One of the central concerns for many virtual currency proponents was the subversive
    role of banks, particularly central banks, because they “printed money” in the
    eyes of virtual currency believers. The increase in money supply created an inflationary
    effect, which in essence “steals” money from owners of currency because inflation
    reduces the value of nominal amounts of currency. In Bitcoin, the opposite had
    been planned. A structural tightening of the money supply through the diminishing
    issuance of currency is designed to create a deflationary dynamic whereby the
    currency increases in value.


    The supply of Bitcoin has a schedule through which less, not more, currency is
    produced over time. First, the theoretical amount of bitcoins that can be made
    is fixed in the design. In contrast to fiat currencies, which are the national
    currencies that people use in their daily lives such as dollars and euros, where
    the money supply is limitless, bitcoin is limited: there will only ever be 21
    million bitcoins mined. After 50% of all bitcoins were mined, the first halving
    of the reward to miners occurred. That happened in 2012. After this, the reward
    was 25 bitcoins. The next halving occurred after 75% of all bitcoins were mined,
    after which the reward was 12.5 bitcoins. This will continue until there is no
    more bitcoin to put into circulation. According to calculations, the last bitcoin
    would be mined around 2140.


    Building scarcity into the currency is probably inspired by the virtual currencies
    that built on precious metals since precious metals derive their value from scarcity.
    Gold is the most scarce of the three most common precious metals used for money
    historically: gold, silver, and bronze. Silver is the second most scarce and bronze
    the least. Conversely, a metal like iron is so ubiquitous that it does not hold
    much use as a store of value. Of particular interest in this regard is gold since
    the annual supply of gold to the world market has hovered around 2% of the total
    stock of gold for more than a hundred years. This situation creates a high stock-to-flow
    ratio, currently around 60, that is, the ratio of the total amount of gold in
    existence to newly mined gold. This dynamic is the reason that gold is better
    at holding its value. For silver, the stock-to-flow ratio is about 20, making
    it more abundant. This creates a different dynamic similar to the inflationary
    money supply. When too much is added to the total stock, each unit diminishes
    in value.


    While e-gold, eBullion, and others traded electronic tokens pegged against real
    gold in storage, Nick Szabo suggested a purely digital version to create a digital
    store of value. Bitcoin eventually came close to the ideas Szabo presented in
    his thoughts on Bitgold. He imagined Bitgold being minted by solving a cryptographic
    puzzle, which creates a scarcity similar to that of gold. Solving the cryptographic
    puzzle would be similar to gold mining. Bitcoin was the first implementation of
    such a system.


    # Encrypting for Privacy


    A key concern for cypherpunks was that of privacy. They took particular aim at
    the fact that banks and the government had disproportionate access to transactions
    made by customers. From these, a great deal of information can be gathered that
    is of private concern. Bitcoin, on the contrary, provides pseudonymous accounts
    by default, and no banks mediate transactions. Users cannot be identified directly
    by anyone based on their transactions.


    The wallet is a central concept when we talk about Bitcoin, but it is more of
    a mental concept than a real technological artifact. Today a wallet is often synonymous
    with wallet software, which can take multiple forms. The wallet is either hosted
    by an online exchange or downloaded and run locally as a client application by
    the user. In one way, the term `wallet` is misleading because the wallet does
    not store any bitcoin. Engaging with the Bitcoin network to perform transactions
    requires some intermediary services. The wallet software provides these services,
    such as the ability to generate bitcoin addresses, store the private keys, and
    display the amount of bitcoins on each of your bitcoin addresses. This is necessary
    because Bitcoin is nothing more than a gigantic list of transactions.


    To do anything with bitcoin, you first need an address, which is a string that
    identifies you to others and allows you to send and receive bitcoin. It can be
    thought of as a bank account; only with Bitcoin, you do not have to ask anyone
    to create one.


    The address is based on cryptographic techniques we saw in Chapter [2](#539536_1_En_2_Chapter.xhtml).
    It is done the following way: First, a large random number is selected. This is
    your private key. Special care should be taken to protect this since this is all
    it takes to get access to your bitcoin. Based on this private key, a public key
    is generated through a technique called elliptic curve multiplication. This is
    the standard public-private key pair that can be used for encryption and signing.
    But we are not encrypting or signing anything just yet. Now, take the public key
    and run it through a one-way cryptographic hash function. First, the `SHA-256`
    hash is computed from the public key, and from this value, a `RIPEMD160` hash
    is calculated, which yields a 160-bit number. This is encoded as `Base58Check`,
    which renders the address a 58-character string. The result will be the address.
    The address can be displayed as a string of characters or sometimes as a QR code
    for easy recognition. If you want to let someone pay you in bitcoin, just send
    them your address and ask them to transfer funds to it.


    When you start on the Bitcoin network with your new address, you can’t do much
    until you have some bitcoin associated with it. This can happen in two ways: either
    you start mining bitcoin or you get someone to transfer bitcoin to you. For a
    private person, acquiring bitcoin by mining is not feasible anymore (more about
    that later). It is, therefore, necessary to get bitcoin from somewhere else, such
    as an exchange or selling goods.


    Online exchanges allow you to deposit fiat currency, such as dollars, to be exchanged
    for bitcoin. The exchange will then transfer the bitcoin from one of their addresses
    to yours. This transaction is picked up by the Bitcoin network and captured in
    a block. Once this is done, you will have a balance to spend equivalent to the
    amount just transferred to you.


    If you want to buy something or transfer it to someone else, you get their address,
    enter the amount you wish to transfer, and can add some text too. But note that
    this text will be visible to anyone on the blockchain. The transaction will then
    consist of the following:


    * The address from which the bitcoin should be taken

    * The amount

    * An additional transaction fee that you might want to add to get your transaction
    included faster

    * The address to which the bitcoin should be transferred

    * Additional text'
