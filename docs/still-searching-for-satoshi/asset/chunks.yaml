- fmt: '### Bitcoin As a Cosmogram


    In his book *Digital Cash*, Finn Brunton presents an exciting view of digital
    currencies in general and Bitcoin in particular. Following the historian of technology
    John Tresch, he sees digital currencies as cosmograms. Cosmograms are things that
    order our cosmos and our place in it. They embed a system of relationships, actions,
    and roles that define a cosmos in a concentrated fashion. The cosmogram thus becomes
    “(…) a model of the world with an agenda, an implicit utopian project expressed
    through an arrangement of objects and symbols.” Examples include Buddhist mandalas
    that depict the cosmos in the shape of a square pattern with different patterns
    and figures. One features the five Buddhas that embody various aspects of enlightenment.
    As such, they refer to a practice of meditation, reading of mantras, and a body
    of wisdom and ethical practice, all imprinted in the cosmogram.


    Bitcoin also embodies a model of the cosmos, albeit a more limited one related
    to the ideal nature of financial transactions and monetary systems, but also,
    as we shall see, the individuals’ relation with the government and economic policy.
    In this cosmogram, there is no central authority, only individual participants
    (miners and wallet users) that define the nature of reality (the transactions
    that are considered real) through a process of consensus. It offers an image of
    the world as it could be with no interference from the government and a currency
    where no individual decides whether to print more money. The rate of money supply
    is already given (until around the year 2140 where it will cease) in the cosmographical
    imprint that is the Bitcoin source code. The cosmographical imprint, like the
    Buddhist mandalas, also produces and organizes the world. For example, it organizes
    time into blocks of transactions approximately every ten minutes. In this world,
    anyone is free to join. No central authority like a bank needs to vet you and
    grant you a bank account. A world of financial egalitarianism secured by cryptographic
    certainty guardrails the privacy of the individual and what they might choose
    to spend their money on. There is no surveillance by a big brother and no need
    for trust.


    ### Bitcoin As a Heterotopia


    Bitcoin is not just a model but also constitutes a kind of place. French philosopher
    Michel Foucault suggested that a unique kind of place exists, one that is not
    quite like the utopia, which is fundamentally unreal, but a real place that points
    to other spaces in a special way. He calls this a heterotopia after the Greek
    *heteros*, meaning “different,” and *topos*, meaning “place.” A heterotopia is
    thus a somehow different space.


    Utopias are idealizations of society that, by their nature, do not exist and are
    not real. They are defined by tension with the real. Heterotopias, on the contrary,
    are real places that reach out of the present place and define other possibilities.
    An example of a heterotopia is a zoo; it is a real place but one that relates
    to other real spaces where the different animals come from.


    Another example is the amusement park that in itself is radically different from
    the surroundings. In the amusement park, you lose the sense of the place around
    you and are transported to another world of fun and imagination. These heterotopias
    are unique places with special functions, aesthetics, and possibilities. In a
    sense, Bitcoin can be seen as one such virtual heterotopia.


    According to Foucault, they exhibit some fundamental properties. They can, in
    a single space, juxtapose other real spaces that are in themselves incompatible.
    The traditional Persian garden was supposed to bring together the four corners
    of the world in a microcosm, where the garden is the smallest parcel of the world
    but also represents the whole world. A contemporary version of this is the zoo,
    where different incompatible ecosystems and climate zones are juxtaposed in the
    same space. Bitcoin and the blockchain also do this since it is at once the private
    space of everyone there but also at the same time a completely public space since
    everything is out in the open. Bitcoin thus juxtaposes complete privacy with radical
    publicness.


    Heterotopias also typically have a peculiar relationship with time. They constitute
    a break with traditional time, such as can be seen in a museum or library that
    contains indefinitely accumulating time. Prehistory meets antiquity and medieval
    times in the same space. Foucault calls this property heterochrony. The cemetery
    is also such a place where the past accumulates in the present. In the blockchain,
    this is seen in the fact that all past transactions are always present. Indeed
    the beating heart of the blockchain, the formation of a new block, defines the
    present through a relation to all of the past blocks in the blockchain as Chronos
    devouring his children.


    Heterotopias are also interesting because they define an “other space,” a real
    but perfect space, as opposed to the messy and ill-formed character of the normal
    space around it. An example is colonies like the Puritan societies of the English
    in America or the Jesuits of Paraguay. These colonies defined the perfect space
    in contrast to the mundane space that was left behind in the old world. In much
    the same way, the blockchain represents an ideal system with no middlemen and
    no trust in anyone, where transactions can flow freely. Like the Puritan ideals
    were enacted in a real space in contrast to the world left behind, the ideals
    embedded in Bitcoin and the blockchain create a space of tension toward the old
    world that is left behind.


    Bitcoin and the blockchain could thus be said to constitute a virtual heterotopia.
    Had it just been another whitepaper or sci-fi novel, it would have been merely
    a utopia, but its implementation as a real space in the world shifted it to a
    heterotopia with specific new properties and possibilities.'
