    # 什么是比特币？


    简而言之，比特币是一个提供虚拟货币（bitcoin）使用途径的系统。任何人都可以通过下载软件或使用在线服务创建钱包来开始使用它。这个钱包本质上是一组公共身份标识的集合，只有使用创建钱包时所用的私钥才能进行交易。进行交易时，需使用钱包软件指定想要发送到的钱包
    ID 以及比特币数量。该系统由一个自愿提供计算资源的计算机网络支撑，使得交易能够被记录在区块链上，该区块链包含了所有过往的交易记录。这些计算机被称为矿工，他们通过交易手续费和新生成的比特币获得奖励。


    从这个概述可以看出，比特币是一个复杂的系统，融合了来自众多不同来源的技术创新。事实上，很难指出比特币中有哪个特定特征是完全全新的发明。与此同时，比特币的整体解决方案又是如此彻底地新颖和富有创新性，以至于在
    21 世纪几乎找不到能与之匹敌的事物。某些方面在孤立看来似乎过于复杂，甚至有些刻意，但这自有其道理；当所有要素整合在一起时，便产生了一个独特且功能完备的解决方案，它已经证明自己经得起十多年的考验。


    比特币和区块链技术是技术发展轨迹的产物，这些轨迹有时可追溯到数千年前，但直到现在才达到足以构建一个全球性、具有韧性的交易系统的水平。这些发展轨迹常常以令人惊讶且矛盾的方式交汇。回想一下，会计、银行和密码学主要关注信息的隐私和保密，而比特币则完全不同，它是完全公开的，任何人都可以访问。另一个例子是，虚拟货币，就像以往所有的货币一样，都依赖于一个中央铸币机构。历史上，货币发行者面临的最大挑战是防止任何其他方铸造货币，这种行为被称为伪造，通常伴随着严厉的惩罚。而比特币再次颠覆了这一传统，它允许任何人铸造货币。


    比特币在诞生之初几乎只引起了人们耸肩和不多的几句批评评论。自问世以来，它被宣告死亡的次数已不止几次。尽管如此，它作为世界上最有价值的虚拟货币，至今仍在蓬勃发展。但这一切是如何融合在一起的呢？这现在正是我们关注的焦点。


    # 5. 寻找中本聪


    在现代，很少有人比比特币的发明者中本聪的身份引发了更多的研究和谜团。然而，在 2008 年 10 月比特币白皮书发布之时，情况并非如此。这篇论文在密码学邮件列表上公布后，最初只有四位贡献者发表了一些批评性评论，之后便在一个月内销声匿迹。到了
    2008 年 12 月，根本没有人谈论比特币，认为十多年后全世界会拼命想要找出其作者中本聪是谁的想法，在当时显得十分荒诞。


    然而，15 年后的今天，一些我们这个时代最杰出的记者，为《*纽约时报*》、《*连线*》和《*福布斯*》等最负盛名的刊物撰稿，已经花费了无数时间试图查明中本聪的身份，却毫无结果。迄今为止，这些努力均徒劳无功。我们仍在寻找中本聪。有少数人曾暗示或声称自己就是中本聪，但大多数人都强烈拒绝被认定为是中本聪。


    有人可能会争辩说，这种寻找并不重要。从宏观角度来看，我同意这一点，但这仍然很有趣。中本聪的身份是一个现代谜团，因此值得进行全面调查。由于对于中本聪的身份尚未达成共识，重新审视一番或许是有价值的。接下来，我们将回顾对历史上中本聪最重要的几项调查，并得出结论：没有一项调查能令人信服地论证中本聪的身份。在下一章中，我将基于历史批判研究的原则提出一种新的方法，并梳理不同的资料来源，以理解它们能告诉我们什么，不能告诉我们什么。


    ## 谁干的？


    媒体花了一段时间才开始对比特币及其创造者产生兴趣。最初的几年很平静。2010 年 5 月，发生了第一笔用比特币进行的交易，当时拉斯洛·汉耶茨用 10000
    个比特币买了一个披萨。那时，只有通过挖矿才能获得比特币。比特币还只是一件小众事物。


    这种情况在 2011 年开始改变，当时第一批交易所开始出现，并且比特币因与维基解密（其希望接受比特币捐款）的联系而声名大噪。这使比特币进入了公众的视野，主流媒体也开始报道它。


    ## 搜索开始


    第一家对比特币产生浓厚兴趣的主流媒体正是《*纽约客*》，发表文章的是美国作家约书亚·戴维斯。戴维斯对撰写科技文章并不陌生，也曾为《*连线*》杂志撰写过科技类文章。他通常被奇特而真实的故事所吸引。在
    2011 年，比特币及其神秘创始人的故事绝对是这一类别的典范。


    那篇文章确定了关于中本聪的几个关键观察点，这些观察点后来支配了后续的身份识别尝试：中本聪英语写作完美无瑕，是英式英语；他可能出生于 20 世纪 70 年代初；他对银行有意见，认为银行不可信赖；他是一位世界级的程序员，能用
    C++编程，并且理解点对点编程。


    这篇文章更像是一段发现之旅，而非一次重点明确的调查。戴维斯从安全研究员丹·卡明斯基开始，然后是普林斯顿大学的斯图尔特·哈伯，因为比特币白皮书中三次引用了他的工作。从那里，我们来到了
    Crypto 2011 会议，因为哈伯认为这可能是一个很好的起点。在会议上，戴维斯寻找表面上符合条件的人，并找到了一位来自爱尔兰的研究生，名叫迈克尔·克利尔。


    不幸的是，他并没有承认自己是中本聪，反而提出了另一名嫌疑人：芬兰研究员维利·莱赫顿维尔塔。莱赫顿维尔塔同样觉得“自己就是中本聪”这个说法很滑稽，他甚至建议像比特币这样的虚拟货币应该为政府留一个后门，这完全违背了比特币白皮书的精神。


    最终，戴维斯寻找中本聪的努力被证明是不成功的，并且始终只是一场追求，一个精彩的故事，但它巩固了比特币作为严肃关注对象的地位。该文章还精准指出了关于中本聪的许多关键观察点，任何身份识别都必须与之相符。


    另一个反复出现的主题是，被识别的对象都拒绝承认自己是中本聪。不过，这本身并不能作为反对证据，因为中本聪为了隐藏身份费尽心机。真正的中本聪也不可能期望他会承认任何指认。这两个被提出的嫌疑人显得有些随意，甚至与戴维斯对中本聪的观察不完全吻合：莱赫顿维尔塔的母语不是英语，而克利尔可能称不上是世界级程序员，也没有点对点方面的经验。两人均非出生于
    20 世纪 70 年代初。

