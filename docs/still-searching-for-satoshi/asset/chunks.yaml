  trans: '

    # 剧情愈发复杂


    2015 年，《连线》杂志发表了一篇后来撤稿的文章，声称澳大利亚人克雷格·史蒂文·赖特就是中本聪。赖特本人也自称是中本聪，并将文件先发给了安全研究员格温·布兰文，随后又发给了《连线》杂志。这些文件最终被证实是一场精心策划的骗局。此后，赖特继续声称自己就是中本聪，并与已故的戴夫·克莱曼共同开发了比特币。


    他甚至声称能提供与中本聪相关的密钥来证明这一点，但最终这些密钥始终未能通过验证，而赖特则表示自己不愿继续提供所需证据。他甚至一度让加文·安德烈森等比特币资深人士信以为真，但由于没有提供密码学证明，这些说法始终无法得到证实。


    2019 年，《连线》杂志再次试图确认中本聪的身份，结果又离奇地与克雷格·赖特联系在了一起。作家兼记者埃文·拉特利夫花了五年时间追踪南非全球犯罪主脑保罗·卡尔德·勒鲁，此人恰好也是一名程序员。这项研究最终写成了一本关于勒鲁的
    400 页著作。在此过程中，拉特利夫多次发现一些间接证据，暗示勒鲁可能就是中本聪，但他又将这些线索搁置了。


    情况开始发生变化，是因为有人举报了佛罗里达州一起涉及数十亿美元的诉讼案。案件被告正是自称中本聪的克雷格·赖特。原告是赖特已故商业伙伴戴夫·克莱曼的兄弟艾拉·克莱曼。艾拉·克莱曼声称，赖特和克莱曼共同挖出了数十万枚比特币，而赖特将其全部转移到了自己名下。代表赖特的律师提交动议，要求封存他对某些具体问题的回应，理由是这会危及他本人、其他人以及国家安全。这些人员和脚注均被涂黑，唯独漏掉了他的律师忽略的一条。这是一条包含链接的脚注，链接指向一篇新闻文章和一篇维基百科文章，内容正是关于……保罗·卡尔德·勒鲁！


    拉特利夫重新翻阅了自己的笔记，开始重新审视那些他曾经忽略的间接证据，并发现了更多线索。以下是一些精选证据：勒鲁精通`C++`，并且在 20 世纪 90 年代就已经开发了一款磁盘加密工具，该工具后来被开源。他的年龄与中本聪合作者认为的年龄相符（生于
    1975 年）；作为一名国际毒枭，他比任何人都更有动机，并且对银行有着天生的仇恨；他获得了一本刚果外交护照，上面写着保罗·索洛希·卡尔德·勒鲁这个名字。这发生在他首次以中本聪的名义联系亚当·贝克的两周前。甚至中本聪消失的时间也与他
    2012 年被捕的时间吻合。


    至此，拉特利夫的分析遵循了此前确认中本聪身份的模式，但他退后一步，评估了针对勒鲁的证据：勒鲁并非学者，更关键的是，从哲学层面看，勒鲁并不像中本聪那样反对垃圾邮件，因为他运营着全球规模最大的垃圾邮件业务之一。这最终让拉特利夫有了如下认识：


    > *正因为勒鲁显然有可能是中本聪，所以他的可能性才更大。但这一等式缺失了一环：对所有也可能是中本聪的人进行统计。有数不清的程序员精通 C++且憎恨政府，他们觉得有责任为其他程序员署名，并使用了“为大众加密”这样的说法，他们有理由保持匿名，并且对数字货币表现出一定兴趣。要通过我的技术证明勒鲁就是中本聪，我必须推翻十几个、甚至上百个同样具有嫌疑的候选人。*


    ## 兜兜转转


    我们兜了一大圈，又回到了起点，对于中本聪是谁、或者如何找到他，依然毫无头绪。拉特利夫的文章似乎是我们所考察的所有先前调查的缩影：记者（因为这些调查全都是由记者撰写的）出于这样或那样的原因，直觉地锁定一个可能的嫌疑人，然后开始收集证据。支持性证据往往比反对性证据被赋予更大的权重。这也被称为“挑选事实”。所有先前的调查都是从嫌疑人出发，然后筛选证据，没有原则性的探究，却充满了假设和主观判断。拉特利夫值得尊敬，因为他第一个清楚地认识到，这种方法不足以提供证明中本聪身份的证据。因此，即便经过了十多年的严密审查，我们仍在寻找中本聪。


    现在是时候扭转寻找中本聪的方向了，应从源于学术历史研究的原则出发，而非临时的、拼凑事实的方法。因此，下一章将为更系统化地探究中本聪的身份，以及我们如何识别他，奠定一个基础。


    # 6. 分析中本聪


    ## 中本聪的历史基础


    为了在更坚实的基础上重启对中本聪的寻找，我们必须按照有原则的方式，顺序执行一系列步骤。第一步是要认识到这是一个历史问题，应该像对待任何其他历史问题一样进行分析和调查。借助现代史学研究方法的帮助，我们可以更有原则地处理这个问题。


    据历史与史学性质专家格奥尔格·G·伊格斯称，19 世纪以前，西方历史呈现出两种截然不同的历史写作传统。一种是学术性和古物研究性的，侧重于事实编目；另一种本质上是文学性的，侧重于讲述故事。直到
    19 世纪德国大学中诞生了现代历史学科，这种情况才得以改变。


    这一变革的主要推动者是德国历史学家利奥波德·冯·兰克，他于 1825 年成为柏林大学的历史学教授，并担任该职位长达 50 年。在他 1824 年的第一本书《1494
    年至 1514 年拉丁与条顿民族史》中，他用一句话指明了新方向，这句话后来成为了现代史学的口号，即历史学家的目的是“如实直书”。这在今天看来似乎不言而喻，但与当时注重讲述引人入胜故事的当代历史写作相比，冯·兰克使用了比同时代人更广泛的资料来源，并且只限于谈论那些有资料依据的内容，而非想象和推测。


    由此发展出了史料考证的实践，这在德国和斯堪的纳维亚史学流派中得到了特别详尽阐述。史料考证的目的是确保我们书写的历史是真实的。让我们来看看一些常见的史料考证原则，它们将作为我们寻找中本聪的指引。

    '
- fmt: '### Primary and Secondary Sources


    One of the key insights of Leopold von Ranke was that there is a significant difference
    between primary and secondary sources. Primary sources give direct access to the
    historical issue under investigation, that is, first-hand information. These include
    diaries, transcripts, correspondence, and some scholarly articles.


    Secondary sources provide second-hand information and thus relate information
    about the historical issue to the reader through an intermediary. These contain
    an interpretation and selection of the original source material. Examples are
    biographies, commentaries, reviews, and journalistic and review articles.


    Von Ranke emphasized primary sources almost to the point where he dismissed the
    utility of secondary sources altogether. Primary sources do indeed bring us closer
    to how it really was, and there is good reason always to prioritize primary sources
    in a historical investigation. Sometimes it may be helpful to use secondary sources
    where no primary sources exist while taking great care to understand and account
    for the tendency of the source, which we will get back to shortly.


    For Bitcoin, the primary sources are those related directly to Satoshi and the
    development of Bitcoin—all writings by Satoshi, the whitepaper, correspondence
    with collaborators, and the code. Secondary sources are interviews and articles
    written about Bitcoin. We will prefer the first group of sources.


    ### Relic and Narrative


    Another essential distinction lies in how you use a source. A common distinction
    is made between what is called a relic and a narrative. The narrative is the easiest
    to understand. It tells us about something that happened. On the other hand, a
    relic tells us something about the creator of the source at the time it was created.
    A diary from a sailor on Captain Cook’s ship, the *HMS Resolution*, can be a relic
    that can tell us about sailors’ language and educational level, the state of mind,
    and the values and attitude of the sailor at the time of writing. It can also
    be a narrative about the first encounter by Europeans with Hawaiians. Using a
    source as a relic is more credible than as a narrative since narratives have biases.
    Relics don’t lie, but narratives can.


    In the case of Bitcoin, we can use the writings of Satoshi as relics saying something
    about his language, education, attitudes, style, and time of writing. We can use
    interviews of collaborators as narratives about the creation of Bitcoin and Satoshi’s
    person.


    ### Tendency of the Source


    Interpreting a source always has to account for the tendency or bias of the source.
    What is the interest of the author of the source? And how does that fit the information
    conveyed by the source? An excerpt from the ship log of Captain Cook’s *HMS Resolution*
    relating to the death of Captain Cook at the hands of the Hawaiians is bound to
    be biased toward portraying the civilized manner in which the Europeans thought
    themselves to have engaged the Hawaiians. The portrayal of the actions of the
    Hawaiians as savage will thus be biased and cannot be taken at face value. To
    use any source, we have to be clear about the author’s interest before we start
    using it as evidence for anything. This also means that information that is neutral
    in relation to the bias can be used. That is information the author can be said
    to have no natural reason to lie about. This is often used in historical accounts.
    Information going against the bias will therefore acquire even more value. Using
    information from a source that follows its bias has little, if any, value. For
    example, an interview with someone suspected of being Satoshi is biased toward
    not revealing evidence of the person being Satoshi since Satoshi does not want
    to be identified. Any sources of this type consequently have no value.


    ### Closeness to the Event


    A source’s value increases with its closeness to the event. A diary entry written
    aboard the *HMS Resolution* in Hawaii at the same time as Captain Cook’s encounter
    with the Hawaiians is much more valuable than an autobiography by a sailor related
    50 years later.


    Even though the advent of Bitcoin is a relatively recent event and therefore fairly
    close, the principle of closeness to the event is still important. Sources that
    are closer to the creation of Bitcoin and Satoshi, therefore, have preference
    to later interviews, even if they are with key people.


    ### Independent Confirmation


    The last significant principle has to do with corroboration. The more independent
    sources can confirm a state of affairs, the better. Having only a single account,
    even if it is of high quality, can be dangerous to rely on. For any fact, we should
    always find independent confirmation from other sources.


    This means that we should look at other ways to get an independent confirmation
    for each fact we identify. Much previous investigation has relied too much on
    single observations like a single comment or proximity in time of events. That
    might lead to spurious conclusions. It may not always be possible, but without
    corroborating evidence, any claim is weak.


    ### Parsimony


    The general scientific principle of parsimony should be added to these historical
    principles of source criticism. It is the principle that entities used for an
    explanation should not be multiplied beyond what is necessary. We have already
    seen examples of such in the previous attempts at the identification of Satoshi.
    Several authors end up suggesting two or more persons since one only fits some
    of the facts. This is an unnecessary multiplication of entities beyond what is
    necessary.


    It is also known as Occam’s razor. This principle requires that comparing competing
    hypotheses, the one with the fewest assumptions must be preferred. Another way
    is to say that given multiple competing theories, it should be the simplest explanation
    that is chosen. This, of course, does not guarantee that we arrive at the truth,
    but such is the nature of scientific work. It does, however, increase the likelihood
    of finding the truth vastly. The only alternative is to cherry-pick facts and
    go down the road of conspiracy theories, where we invent elaborate theories in
    support of our claims as we explain away conflicting evidence, if we even address
    it.


    ### *Ad Fontes*: What Can the Sources Tell Us?


    With the principles in place, let us consider the different groups of sources
    pertaining to the creation of Bitcoin and its creator. One general observation
    is that sources that can be attributed to Satoshi are primary sources and therefore
    take precedence over all other sources.


    A short note about the use of the male pronoun in connection with Satoshi: It
    is not impossible that Satoshi is a woman, but in a field like cryptography where
    women number in the single-digit percentage, the simplest assumption before we
    start looking at actual evidence is that the author is a man. We will return to
    this question later.


    ### The Bitcoin Whitepaper


    The Bitcoin whitepaper is the most important single source for identifying Satoshi.
    It is a primary source that can give us direct access to the person behind Satoshi
    Nakamoto since he wrote it. Consequently, it can tell us a great deal about him,
    his style, his values, and his preferences. The first thing to notice is that
    it is written in fluent academic British English.


    It is formatted according to the guidelines of the IEEE publishing standard. There
    are many competing standards in academic publishing, and each differs a little
    bit. The author must consequently have submitted at least one article using the
    IEEE guidelines, which are quite widely used in computer science.


    Satoshi must therefore have a history as an academic. He need not be employed
    full-time as such, but as a minimum, he has participated in the preparation of
    an academic paper in the field of computer science at some point.'
  raw: '### Primary and Secondary Sources


    One of the key insights of Leopold von Ranke was that there is a significant difference
    between primary and secondary sources. Primary sources give direct access to the
    historical issue under investigation, that is, first-hand information. These include
    diaries, transcripts, correspondence, and some scholarly articles.


    Secondary sources provide second-hand information and thus relate information
    about the historical issue to the reader through an intermediary. These contain
    an interpretation and selection of the original source material. Examples are
    biographies, commentaries, reviews, and journalistic and review articles.


    Von Ranke emphasized primary sources almost to the point where he dismissed the
    utility of secondary sources altogether. Primary sources do indeed bring us closer
    to how it really was, and there is good reason always to prioritize primary sources
    in a historical investigation. Sometimes it may be helpful to use secondary sources
    where no primary sources exist while taking great care to understand and account
    for the tendency of the source, which we will get back to shortly.


    For Bitcoin, the primary sources are those related directly to Satoshi and the
    development of Bitcoin—all writings by Satoshi, the whitepaper, correspondence
    with collaborators, and the code. Secondary sources are interviews and articles
    written about Bitcoin. We will prefer the first group of sources.


