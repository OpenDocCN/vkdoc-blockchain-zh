  trans: '

    ### 教育与工作


    关于中本聪的教育背景，确切信息甚少。从比特币白皮书的参考文献来看，他显然接受过数学或计算机科学领域的高等教育。很难精确判断其具体专业或最高学历，但很可能是硕士或博士。他对密码学有特殊兴趣，因为他曾在密码学邮件列表中活跃，并对特定领域有深入了解。他还对点对点计算感兴趣，参与
    P2P 基金会论坛便是佐证。


    比特币白皮书显示出作者对学术写作、结构和引用标准的扎实掌握。有理由推测他此前至少发表过一篇文章。在中本聪离开后接手比特币开发的加文·安德烈森认为，他的代码并非出自专业程序员之手。他可能曾从事安全领域的学术研究、科研或顾问工作。


    有人推测他曾在银行业工作或接受过金融教育，但这难以证实，因为他留下的内容大多集中在技术细节的解决上。他确实数次提及经济和银行业，但这些言论似乎不过是标准的自由意志主义论调，在密码学邮件列表中随处可见：银行很糟糕，部分准备金制度很糟糕，他们不负责任地放贷制造信贷泡沫，央行制造通货膨胀等等。他偶尔会引用奥地利学派经济学家的观点，但当用户`xc`于
    2010 年 7 月 27 日发表了一篇关于货币理论的深度文章，引用米塞斯和罗斯巴德讨论货币回溯、货币起源以及比特币如何满足这些条件时，中本聪似乎并未理解。作为回应，他提出了一个奇怪的思想实验，设想一种没有实际用途的稀缺金属，并能通过通信渠道进行传输。他执着于稀缺性这一属性，而这完全偏离了`xc`那篇文章的要点；他没有提供任何参考文献，而是回归到“我认为”的表述。这段文字与他撰写密码学或技术内容时展现出的自信形成了鲜明对比。因此，我认为中本聪不太可能接受过本科以上的正规教育，或拥有金融、经济相关的工作经验。


    ### 价值观


    中本聪的价值观倾向自由意志主义和反政府，但并非极端，这从 2010 年 12 月底的一起事件中可见一斑。当时有人建议维基解密开始使用比特币，Bitcoin
    Talk 论坛上的其他用户表示支持，但中本聪相对坚决地反对。他的理由是这会引来不必要的关注。


    如前所述，他对央行持批判态度，因为它们滥发货币。银行也很糟糕，因为它们会与政府合作，损害你的隐私。它们还收取过高的服务费用，这也是他持续争取免费交易的原因。


    他并无激进的自由意志主义观点，比如废除所有政府权威，或彻底解除政府对于非法物质贸易的监管——而这正是后来一些比特币支持者所主张的。没有证据表明他的动机是促进毒品交易、洗钱或任何其他非法交易。事实上，当他举例说明比特币的用途时，这些例子显得有些平淡无奇。在
    2010 年 9 月 23 日的一个论坛帖子中，他写道：“比特币对于那些没有信用卡或不想使用现有信用卡的人来说会很方便，他们要么不想让配偶在账单上看到这笔消费，要么不放心把卡号告诉色情网站，要么担心被重复扣费。”


    在 2009 年 1 月 17 日回复达斯汀·特拉梅尔时，也就是比特币诞生之初，他将比特币设想为多种用途：积分奖励、捐赠代币、游戏内货币，或成人网站的微支付。中本聪设想的其他潜在应用还包括订阅网站和电子邮件工作量证明。最后一点直接取自`Hashcash`，但积分奖励的用途在千禧年之交也已存在，正如我们之前看到的`Flooz`和`Beenz`。


    这些构想似乎更多源自一个中产阶级的理想主义者，而非一个革命性的反政府毒枭或激进的自由意志主义经济思想家。


    因此，公平地说，中本聪倾向于自由意志主义，但并非政治或行动意义上的革命者。事实上，他明确拒绝了这种革命倾向。他不信任政府，但并非明确反政府。他似乎更关注订阅、隐私、积分奖励、捐赠、配偶这类中产阶级议题，并且会阅读报纸。


    ## 中本聪画像总结


    关于中本聪，能确切说明的信息不多。尽管如此，基于原始资料，我们仍能获得一些可靠线索，按确定性递减顺序排列如下：他极有可能是男性，英国人，居住在欧洲/英国，很可能在伦敦地区。可能出生于
    20 世纪 70 年代初，受过长期的学术教育，专业可能是计算机科学或数学。使用 C++编程。全职从事 IT 安全领域的学术研究、科研或顾问工作。并非革命者，而是具有自由意志主义倾向的理想主义者。可能已婚，过着稳定的中产阶级家庭生活。在技能方面，他对工作量证明、点对点技术、虚拟货币和私钥加密有深入了解。


    # 7. 常见嫌疑人？


    如前所述，之前提出的中本聪身份似乎有待修正。我们绘制的画像进一步支持了这样的结论：此前的尝试尚未找到中本聪的真实身份。我们掌握的最有力的法医学证据是，中本聪是英国人，居住在伦敦。之前的嫌疑人无一符合这一事实。有必要将目光投向更广的范围。


    因此，我们必须想办法扩大搜索范围。最好的办法是再次审视中本聪本人撰写的原始资料。正如我们所见，他并未明确提及自己或任何合作者，但比特币白皮书引用了其他几位研究人员的成果。在学术界，引用导师、合作者，尤其是引用自己的成果，是非常普遍的做法。这为搜索开辟了一条激动人心的新途径：中本聪是否会引用自己？即使他没有，我们也能从中获得关于他所属的社交和学术圈子的重要线索。那么，让我们回到比特币白皮书的参考文献列表。

    '
- fmt: '## Redrawing the List of Suspects


    The Bitcoin whitepaper features eight references with a total of ten different
    people. In the Appendix, I present a detailed analysis of who they are and to
    what extent they fit the profile of Satoshi. The citation list is one of many
    clues we have about where to find who could be Satoshi. From the whitepaper, we
    can deduce that he was most inspired by Adam Back’s `Hashcash` and Wei Dai’s `B-money`.
    Probably the only place where these ideas were discussed in detail was on the
    cypherpunk mailing list, where Back and Dai announced them at the end of the 1990s.
    There is a good chance that the historical Satoshi would have been part of that
    community and learned about `Hashcash` and `B-money` from there. Since the list
    contained thousands of members interested in cryptography in general, they were
    not all interested in the relative niche of virtual currencies. We should therefore
    narrow the scope to those members who actively engaged in discussions around `Hashcash`
    and `B-money`. Satoshi would be likely to have done that.


    `Hashcash` was presented to the list in the spring of 1997. It was discussed on
    a few occasions after that. `B-money` was proposed on the mailing list in the
    fall of 1998. It was also discussed subsequently on a few occasions. All in all,
    both proposals did not attract a lot of attention, but still, a significant number
    of people responded. Altogether 19 identifiable persons engaged with Dai and Back
    to give feedback and ask questions about these two ideas.


    This yields a list of 29 people who could, in principle, be the historical Satoshi.
    In Table [7-1](#539536_1_En_7_Chapter.xhtml#Tab1) we can see the degree to which
    they match the criteria of the profile we constructed. `M` means that we have
    evidence that the person matches the criteria. `D` means we have evidence that
    the person deviates and does not match the criteria, while `U` means that it is
    unknown based on the evidence I have been able to find.


    **Table 7-1** Analysis of match between potential historical people and Satoshi


    | --- |

    | ![](images/539536_1_En_7_Chapter/539536_1_En_7_Figa_HTML.jpg) A table for the
    analysis of matches between potential historical people and Satoshi exhibits data
    in 14 columns and 29 rows. The blocks of the table filled with `M` are dark-shaded,
    with `U` are light-shaded and `D` non-shaded. |


    A glance at the table shows that all are male and probably all are university
    educated. But apart from that, some people match some aspects, whereas others
    match different ones. No profile criteria are uniquely matched to anyone.


    We can also see that almost all have at least a handful of criteria that do not
    match the profile and, therefore, cannot have been the historical person behind
    Satoshi. But we also see that one individual stands out and matches all parts
    of the profile. That individual is Adam Back. This does not necessarily mean that
    Adam Back is Satoshi. He is the only one who matches all the essential criteria
    of the profile and should therefore be looked at in more detail.


    ## A Closer Look at Adam Back


    Like most cypherpunks, he is a private person who does not share much about himself,
    but we can piece together the most essential facts from various sources. He was
    born in 1970 in London and completed his A levels in mathematics, physics, and
    economics. His English is decidedly British, and his writing is flawless. He completed
    his PhD in computer science from the University of Exeter in 1995 on the topic
    of distributed computing. The code written for the thesis was written in `C++`.
    He was a cypherpunk, a very active cryptography mailing list contributor, and
    particularly interested in virtual currencies.


    Regarding identifying Satoshi, it is not the first time Back has been evaluated
    as Satoshi: Dominic Frisby entertained the notion that he could be Satoshi but
    discarded it because Back confessed to him that he preferred `C` to `C++`. Frisby
    failed to notice that Back had used `C++` extensively as the basis for his PhD
    and was probably working in that language when Bitcoin was being developed. He
    also concluded from his first post on Bitcoin Talk that Back was only just learning
    about Bitcoin. That is an astounding conjecture. Others like the YouTuber Barely
    Sociable, who also identified Adam Back as Satoshi, have correctly noted how incredibly
    deeply into the details he seems to be right from the get-go. He immediately starts
    contributing detailed ideas for improvements.


    Let us look at other evidence to help us evaluate whether Back was Satoshi. Most
    of it has been supplied by the above-mentioned YouTuber, Barely Sociable, who
    provided incredible forensic detective work. We will get back to that shortly.


    ### The Absence of Back from Bitcoin


    The first thing to notice is Back’s absence in all early discussions about Bitcoin
    in the early days. Not until his introduction to Bitcoin Talk in 2013 did he engage
    in Bitcoin. This is a man who has been on a quest for a virtual currency like
    Bitcoin since 1997. Consider a reply in April 1997, where he called for an electronic
    cash system on the cryptography mailing list:


    > The cryptographic requirements for a system such as this would be:

    >

    > 1. anonymous (privacy preserving, payee and payer anonymous)

    > 2. distributed (to make it hard to shut down)

    > 3. have some built in scarcity

    > 4. require no trust of any one individual

    > 5. preferably offline (difficult to do with pure software)

    > 6. reusable


    This is virtually a road map for Bitcoin more than ten years before its release,
    and Back takes no verifiable interest in Bitcoin for almost five years. People
    can of course change interests over time, so this does not prove anything by itself.
    It seems safe to conclude that Back at least had the motive to build Bitcoin.


    ### Back-Satoshi Interactions


    Another curious fact is that Satoshi corresponded with all key players in the
    field of cryptographic virtual currencies, Hal Finney, Wei Dai, and Nick Szabo,
    except Adam Back. It is alleged that Satoshi communicated with Back, but once
    we look closer at the evidence, it does not seem strong. We know about this interaction
    from two late sources. The first is an email made public by Wei Dai in which Satoshi
    mentions communication with Back. The email is dated August 22, 2008, and Satoshi
    writes to Dai: “Adam Back (hashcash.org) noticed the similarities and pointed
    me to your site.” The other is a 2020 interview with Cointelegraph where Back
    mentions email exchanges with Satoshi around the same time as the emails exchanged
    with Dai. But unlike Dai, he refused to share them, so there is no way to verify
    this claim. These emails and interviews are all secondary evidence far removed
    from when Bitcoin was created. There is, therefore, no good evidence that Back
    ever communicated with Satoshi.'
