    ## 重新绘制嫌疑人名单


    比特币白皮书中列出了八篇参考文献，涉及总共十位不同的人物。在附录中，我详细分析了这些人的身份，以及他们在多大程度上符合中本聪的特征。这份引用列表是我们寻找中本聪众多线索之一。从白皮书中我们可以推断，他受亚当·拜克的`Hashcash`和戴维的`B-money`启发最大。这些理念可能唯一被详细讨论过的地方就是密码朋克邮件列表，拜克和戴维在
    20 世纪 90 年代末在那里宣布了它们。历史上的中本聪很有可能曾是那个社区的成员，并从中了解了`Hashcash`和`B-money`。由于该列表包含数千名普遍对密码学感兴趣的成员，他们并非都对虚拟货币这一相对小众的领域感兴趣。因此，我们应该将范围缩小到那些积极参与`Hashcash`和`B-money`相关讨论的成员。中本聪很可能就是这样做的。


    `Hashcash`于 1997 年春天被提交到该列表。此后，它被讨论过几次。`B-money`于 1998 年秋天在该邮件列表中被提出，随后也被讨论过几次。总而言之，这两个提议都没有引起太多关注，但仍有相当数量的人做出了回应。总共有
    19 个可识别的个人与戴维和拜克进行了互动，就这两个想法提供反馈并提出问题。


    这样一来，我们就得到了一个 29 人的名单，理论上他们每个人都可能是历史上的中本聪。在表 7-1 中，我们可以看到他们与我们构建的画像标准的匹配程度。`M`表示我们有证据表明此人符合该标准。`D`表示我们有证据表明此人偏离且不符合标准，而`U`表示根据我所能找到的证据，情况未知。


    **表 7-1** 潜在历史人物与中本聪的匹配度分析


    | --- |

    | ![](img/539536_1_En_7_Figa_HTML.jpg) 一张用于分析潜在历史人物与中本聪匹配度的表格，以 14 列和 29 行呈现数据。表中填充`M`的区块为深色阴影，填充`U`的为浅色阴影，填充`D`的为无阴影。
    |


    快速浏览表格可以发现，所有人都是男性，并且很可能都受过大学教育。但除此之外，有些人在某些方面匹配，而另一些人则在其他方面匹配。没有任何一项画像标准是某个人独有的。


    我们还可以看到，几乎每个人都至少有少数几项标准不符合画像，因此不可能成为中本聪背后的历史人物。但我们也看到，有一个人脱颖而出，匹配了画像的所有部分。这个人就是亚当·拜克。这并不一定意味着亚当·拜克就是中本聪。他是唯一一个符合画像所有关键标准的人，因此应该对其进行更详细的审视。


    ## 聚焦亚当·拜克


    和大多数密码朋克一样，他是一个注重隐私的人，不常分享自己的信息，但我们可以从各种来源拼凑出最核心的事实。他于 1970 年出生在伦敦，并在数学、物理和经济学方面完成了
    A-level 考试。他的英语是地道的英式英语，文章也无可挑剔。他于 1995 年在埃克塞特大学获得计算机科学博士学位，研究方向是分布式计算。其博士论文的代码是用`C++`编写的。他曾是一名密码朋克，是密码学邮件列表非常活跃的贡献者，并且对虚拟货币特别感兴趣。


    关于识别中本聪，这并非拜克第一次被评估为中本聪候选人：多米尼克·弗里斯比曾考虑过拜克可能是中本聪的可能性，但后来排除了这个想法，因为拜克向他承认自己更喜欢`C`而不是`C++`。弗里斯比没有注意到拜克在博士期间广泛使用了`C++`，并且在比特币开发期间他很可能也在使用这种语言。他还从拜克在
    Bitcoin Talk 上的第一个帖子中得出结论，认为拜克当时才刚开始了解比特币。这是一个令人震惊的推测。其他一些人，比如 YouTube 博主 Barely
    Sociable（他也认定亚当·拜克就是中本聪），则正确地指出了拜克从一开始就对细节有着难以置信的深入了解。他立即开始贡献关于改进的详细想法。


    让我们看看其他证据，以帮助我们评估拜克是否就是中本聪。其中大部分证据由上述的 YouTube 博主 Barely Sociable 提供，他做了令人难以置信的取证调查工作。我们很快就会回到这个话题。


    ### 拜克在比特币领域的缺席


    首先要注意的是，拜克在早期所有关于比特币的讨论中都是缺席的。直到 2013 年他首次出现在 Bitcoin Talk 上，他才开始涉足比特币。而这是一个自
    1997 年以来就一直像追寻比特币这样的虚拟货币的人。想想他在 1997 年 4 月的一条回复，他在密码学邮件列表中呼吁建立一种电子现金系统：


    > 这样一个系统的密码学要求应该是：

    >

    > 1.  匿名（保护隐私，付款人和收款人匿名）

    > 2.  分布式（使其难以被关闭）

    > 3.  具有一定内在稀缺性

    > 4.  无需信任任何一个人

    > 5.  最好支持离线（纯软件很难实现）

    > 6.  可重复使用


    这几乎就是比特币在发布前十几年的路线图，然而拜克在将近五年的时间里没有对比特币表现出任何可验证的兴趣。当然，人们的兴趣会随时间改变，所以这本身并不能证明什么。但似乎可以稳妥地得出结论：拜克至少拥有构建比特币的动机。


    ### 拜克与中本聪的互动


    另一个奇怪的事实是，中本聪与密码学虚拟货币领域的所有关键人物都进行过通信，包括哈尔·芬尼、戴维和尼克·萨博，唯独没有亚当·拜克。据称中本聪与拜克有过交流，但当我们仔细审视证据时，似乎并不充分。我们是通过两个较晚出现的来源了解到这种互动的。第一个是戴维公开的一封电子邮件，中本聪在其中提到了与拜克的交流。该邮件日期为
    2008 年 8 月 22 日，中本聪在给戴维的信中写道：“亚当·拜克（hashcash.org）注意到了相似之处，并将我引荐到了你的网站。”另一个来源是
    2020 年 Cointelegraph 对拜克的一次采访，他在采访中提到与中本聪的邮件往来，时间大致与中本聪和戴维的邮件通信时间相同。但与戴维不同的是，他拒绝分享这些邮件，因此无法核实这一说法。这些邮件和采访都是远离比特币创建时间的二手证据。因此，没有确凿的证据表明拜克曾与中本聪有过交流。

