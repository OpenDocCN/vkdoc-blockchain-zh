  trans: '

    这就引出了下半部分：供给端。我们看到了存流量比对于解释贵金属价值的关键作用。回想一下，流量是指一年的产量，而存量是指现有的总库存。如果货币供给相对于存量较高，那么存流量比就低。如果货币供给像白银那样因开采量增加而上升，存流量比就会下降，从而影响单位价值。我们看到了贱金属的存流量比很低，这也就解释了为什么中国的铁币不如希腊的金币和银币值钱。


    虽然货币供给的增加会提升存量，理论上这应该会提高存流量比，但实际上，供给速率的影响更为强大。同样，货币的销毁会降低存量，这应该会降低存流量比，从而降低价值。我们在历史上并没有看到这种情况，因为与货币总存量和新增产量相比，货币的销毁量总是微乎其微的。


    在底部，我们看到了为什么黄金比其他金属更值钱：地壳中的储量比其他金属更少。如果开采成本下降，例如发现新矿或取得技术进步，开采量就会增加。正如我们将要看到的，这是比特币试图利用的一个关键动态。只有当货币供应直接基于铸造，或间接基于与金属等开采商品挂钩时，开采才具有相关性。宝贝贝壳和珠子也遵循同样的规律。当它们被使用的市场因开采和生产的改进而泛滥时，其价值便一落千丈。


    ## 货币的关键动态


    现在，我们可以审视一些历史上观察到的货币关键动态了。


    第一个是货币动态。这是一种商品通过履行一项或多项货币职能，从而承担起货币功能的过程。美索不达米亚的谷物和二战后欧洲的香烟就是如此。关键在于充当货币的媒介其效用得到了提升。


    第二个是泡沫动态。当一种资产价值上升时，在其他条件不变的情况下，它是一种更好的价值储存手段，这增加了它的效用。如果这是该资产效用的主要来源，就会强化其价值增长，并可能形成泡沫。反之，当它突然停止上涨时，其价值会迅速下跌，因为它不再是一种良好的价值储存手段。


    第三个是供给动态。当货币供给相对于存量增加时，在其他条件不变的情况下，这会降低货币的价值。这种情况发生在恶性通胀期间，政府大量印钞时，但同样也发生在突然发现新的金属或作为货币本位商品的其他资源时。


    第四个是开采动态。当一种商品依赖于开采时，就会看到这种动态。储量限制了开采的上限，而开采成本则决定着何时具有良好的盈利能力以及商品价格何时能够稳定。因此，新矿床的发现或更廉价的开采技术都会影响开采动态。


    ## 比特币与货币


    现在让我们来看看比特币。这些动态如何能够阐明比特币呢？让我们试着看看能否利用这些见解来理解比特币的历史动态以及潜在的未来。


    ### 作为货币的比特币


    2010 年 5 月 22 日，拉斯洛·汉耶茨用比特币购买了披萨。这是有记录以来第一次比特币承担了交换媒介的功能。这是货币的一项关键功能，使其能够用于购买商品和服务。大约在同一时间，各种交易所涌现出来，允许人们将比特币兑换成法定货币。随着比特币越来越广为人知，当人们用美元兑换比特币时，它开始发挥价值储存的功能。它可以作为记账单位，但在主流经济中并未广泛应用。主要是在黑市和勒索软件攻击中，比特币是首选的记账单位。


    虽然接受比特币的商家数量有所增加，例如偶尔会有理发店或咖啡馆，但这远未达到显著程度。如果当今普通人意外得到了一些比特币想要花掉，他们会很难找到可以用它购买任何东西的地方。简单在线搜索哪里可以用比特币购买产品，结果会发现，你能实际使用比特币作为交换媒介的顶尖场所清单包括
    Overstock、Newegg、Shopify、Microsoft、Twitch、ProtonMail、NordVPN、Dish Network 和 CheapAir。除了微软之外，这些品牌并非家喻户晓。或许
    Shopify 是个例外，但它们都是服务或软件。在作为一种名义上的虚拟货币超过十年之后，比特币在这一指标上并不令人印象深刻。


    作为记账单位，目前的状况也好不了多少。很少有地方使用比特币作为记账单位并以比特币标价。虽然我偶尔见过一些标有比特币价格的招牌图片，但这总是作为另一种货币的补充。在萨尔瓦多，比特币是法定货币，但即使在那里，它也不是记账单位。这种情况可能会改变，但有一个结构性原因使其复杂化。比特币波动性太大，难以成为一个良好的记账单位。如果商家需要持续地、甚至每天调整所有价格以跟上波动，那它就不是一个方便的记账单位。


    第三项功能——价值储存，是比特币取得的主要成功。几乎所有使用比特币的人都是为了将其用作价值储存手段。它作为价值储存手段很好地发挥作用，因为它不可摧毁且高度便携。比特币本身永远不会丢失（但访问它的代码可能会丢失）。自诞生以来，平均而言，比特币的表现优于任何其他价值储存手段，如今它可以在线上交易所轻松兑换成其他货币。


    如果我们退一步审视比特币，不可否认它在很多方面是成功的，但从货币角度来看，它的效用并不高。它实际上只很好地履行了货币的一项关键功能，并且只在两个经济上微不足道的国家是法定货币。因此，之前确定的货币动态并不特别强大，在历史上也不是比特币成功的核心驱动力。

    '
- fmt: '### Scarcity and Store of Value


    On August 27, 2010, Satoshi wrote the following on the Bitcoin Forum:


    > *I think the traditional qualifications for money were written with the assumption
    that there are so many competing objects in the world that are scarce, an object
    with the automatic bootstrap of intrinsic value will surely win out over these
    without intrinsic value. But if there were nothing in the world with intrinsic
    value that could be used as money, only scarce but no intrinsic value, I think
    people would still take up something. (I’m using the word scarce here to only
    mean limited potential supply).*


    This shows that Satoshi thought that scarcity was the key to value for Bitcoin
    and understood that limiting the supply is important. In Bitcoin, this is secured
    by the fixed number and successive halving of the amount of bitcoins released
    into circulation. Our analysis shows that it is not the scarcity that secures
    the value of bitcoin. In fact, if Bitcoin were too scarce, it would lower its
    utility because there would be no liquid market for it. That would undermine it
    as a store of value, which is its key function. Rather it is the supply dynamic
    we identified previously that explains this. As Satoshi wrote, it is controlling
    the supply and, thereby, the stock-to-flow ratio that underpins the value of bitcoin.
    Bitcoin is the only major currency whose monetary policy is not just set in stone
    but committed to code. The diminishing creation rate of bitcoin will ensure that
    all else being equal, the value of a unit will continue to rise due to the extraction
    dynamic identified previously.


    ### Pump and Dump


    In the last ten years, bitcoin has gone from around a hundred dollars to around
    30,000 dollars as I write this. In October 2021, it was even double that, which
    is an astonishing three-hundred-fold increase over a decade but with steep drops
    of around 50–70% on five occasions in the same span. This effect is due to the
    bubble dynamic.


    We can now see why bitcoin is susceptible to the positive reinforcement loop from
    unit value to store of value compared with other currencies. Bitcoin is unique
    in that its ability to store or, indeed, generate value is the primary function
    of its utility. As we saw previously, it performs badly as money since the money
    dynamic is weak. Almost the entire utility hinges on it being perceived as a store
    of value. When that happens, it is a self-reinforcing process. The dynamic is
    familiar for anyone following bitcoin: bitcoin price goes up. More people buy
    Bitcoin because it is a good store of value. The price increases the more and
    more people buy it until they don’t. When the price stagnates or fails, the opposite
    happens because this is a reinforcing loop: the price goes down, and people start
    to sell, which makes the price go down further, which makes even more people sell.


    Other currencies derive their utility primarily from other factors of the money
    dynamic and are thus not as volatile. Even the much-dreaded fiat currencies have
    a high base utility since they are legal tender. They also fulfill well all three
    functions of money: you can actually go to the store and buy groceries for it.
