- fmt: '### Bitcoin As a Hyperobject


    In a way, Bitcoin can also be said to transcend not just time but also space.
    Philosopher Timothy Bloxam Morton has introduced the hyperobject concept to characterize
    non-local entities in space and time. Examples include global warming, oil reserves,
    or the English language; you can’t quite grasp the entirety of the hyperobject
    even if you do perceive it. You can experience rain or forest fires, but that
    does not constitute climate change. Climate change as a hyperobject interacts
    with the real world in weather phenomena and measurements, but because of its
    immensity can’t be reduced to such interactions.


    Hyperobjects exhibit a few characteristics that differentiate them from normal
    objects humans can perceive. They are non-local with regard to time and space.
    From this perspective, oil reserves are not just the black oily goo captured in
    the ground but also the plants and animals that produced the organic chemical
    compounds from which the oil derives. As such, the timescale becomes one of millennia,
    where the past intersects with the present in the physical appearance as the gasoline
    that allows me to drive my car from one place to the next. In the same way, Bitcoin
    depends on the past since the coins were generated, and any balance to be used
    by any person in a transaction depends on the generation of past bitcoins. But
    it is also nontrivially affected by the future since it is built into Bitcoin
    that the supply is finite and will stop at some point in the future. This property
    creates the deflationary forces of bitcoin; the scarcity and hence the contemporary
    value are produced by Bitcoin in the future.


    Bitcoin is also radically non-local in a geographical sense since it is the product
    of a distributed system, a mesh of processing nodes that mine bitcoin. These nodes
    can join and leave the Bitcoin processing network from anywhere in time and space.
    The Bitcoin hyperobject affects these local physical machines in non-local ways
    since it depends on a distributed ledger that is shared and produced by this mesh
    irrespective of any particular physical device.


    Hyperobjects also have the property of being phased; they have a higher-dimensional
    phase space that is impossible to perceive directly. To imagine the intelligibility
    of higher-dimensional processes, imagine a two-dimensional creature living in
    a world that resembles a piece of paper. This two-dimensional creature would only
    be able to perceive lines and dots in the plane of its two-dimensional world.
    Now imagine a three-dimensional ball passing through. To our two-dimensional creature,
    this would appear as a dot that expanded to a line, which then contracted into
    a dot and disappeared.


    A phase space is all the possible configurations of a system. Every parameter
    is presented as a dimension in a multidimensional space. A two-dimensional system
    is called a phase plane. The system’s evolution traces a path over time that can
    be recorded in a phase plane. But this trajectory is defined by processes and
    forces that operate in a multidimensional space. Much as the ball’s appearance
    to the two-dimensional creature, the trajectory over time will be understood only
    by an understanding of the initial conditions and forces operating in all the
    dimensions, that is, everything from the initial configuration of all parameters
    of the system to the forces affecting the system in each dimension. Such dimensions
    for Bitcoin might include the hash rate (the total CPU power working on the network),
    the supply of bitcoin, the transaction volume, etc. The effects of the hyperobject
    Bitcoin in this multidimensional space can be traced to the price of bitcoin.
    The volatility, the booms, and the bust cycles, if you will, are the effects of
    processes in the multidimensional phase space.


    The last property of hyperobjects to consider is that they are inter-objective.
    The English language, for example, depends on books written, words spoken, and
    other languages. This forms a mesh of objects that interact with each other. We
    find French words in English and English words in French. The language also evolves
    through interaction, which we see in how it is written in tweets, videos, and
    texts; new words appear here that do not appear in the historical books, stretching
    the meanings and contents of the English language as a whole. This is a mesh of
    relations between objects. The same dynamic can be seen for Bitcoin, where bitcoin
    is used as a bridge to other cryptocurrencies: in order to buy other cryptocurrencies,
    you typically need to go through bitcoin to exchange it in cryptocurrency crosses.
    It is therefore affected by the popularity and use of such cryptocurrencies. Likewise,
    bitcoin is also used as a currency cross with regular fiat currencies and is affected
    by processes in the world of traditional finance, as can be seen by how economic
    crises drive the price of bitcoin up or down.


    ### Starting the Search


    Whatever Bitcoin is, it is not straightforward to grasp. There are multiple ways
    of understanding it; we have not arrived upon the one true understanding yet.
    Just like the identity of the inventor, Satoshi Nakamoto, continues to elude us,
    the true nature and constitution of Bitcoin similarly elude us. This is why in
    a literal and metaphorical way, we can see that we are still searching for Satoshi,
    as the title of this book suggests. It is to this literal and figurative search
    for Satoshi and the nature of Bitcoin and the blockchain that we will devote the
    rest of this book to clarify.'
