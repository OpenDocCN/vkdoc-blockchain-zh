  trans: '

    # 公钥加密


    二战期间，密码学领域展开了一场军备竞赛。然而，即便这催生了日益复杂的加密技术，但它仍然是对称加密，正如我们刚才所见，这需要预先分发用于加密和解密的共享密钥。这就是所谓的密钥分发问题，几千年来一直被认为无法解决。


    ## 迪菲-赫尔曼-默克尔


    20 世纪 70 年代中期，密码学领域最富有成效的合作之一开始了。惠特菲尔德·迪菲思考密钥分发问题已有一段时间。1974 年，他受邀前往 IBM 的托马斯·J·沃森实验室，就解决密钥分发问题的各种策略发表演讲。演讲结束后，他得知斯坦福大学的马丁·赫尔曼教授最近也到访过，并且正在研究同一个问题。迪菲在加州加入了赫尔曼，他们立刻找到了共同点。他们正在寻找一种方法，能够达成一个共同的密钥，却无需交换它。他们与拉尔夫·默克尔一起研究这个问题。在两年毫无进展之后，赫尔曼想出了一个解决方案。其原理如下：爱丽丝和鲍勃约定一个数学上的单向函数。爱丽丝选择一个私钥（比如
    3），然后使用该函数生成一个公钥（4）。接着，爱丽丝将这个公钥发送给鲍勃。鲍勃生成他自己的私钥（5），并使用相同的函数生成一个公钥（6），然后将其发送给爱丽丝。


    随后，爱丽丝使用鲍勃的公钥和她自己的私钥来生成加密密钥（9）。鲍勃同样使用爱丽丝的公钥和他自己的私钥来生成加密密钥（9）。赫尔曼发现的这个数学函数的美妙之处在于，它确保了爱丽丝和鲍勃能够生成相同的密钥（9），而无需公开共享这个密钥。此外，即使窃听者伊夫截获了全部通信内容，她也无法生成该密钥，因为生成密钥需要爱丽丝和鲍勃的私钥。由此产生的过程被称为迪菲-赫尔曼-默克尔密钥交换，这是首次公开发表的针对密钥分发问题的解决方案。


    这极大地提升了安全加密的可能性，因为密钥的保密性一直是密码学的致命弱点。随着现代电信的出现，我们共享信息的方式开始发生改变。通信变得更加普及和便捷。然而，即使有了迪菲-赫尔曼-默克尔密钥交换，你仍然需要等待通信对象的回复，并且加密和解密使用同一个密钥。因此，它仍然是需要密钥分发的传统对称密钥加密。


    因此，惠特菲尔德·迪菲继续思考密钥交换问题。如果他能够找到一种解决方案，使得加密密钥与解密密钥不同，那么密钥分发问题就可以完全避免了。迪菲最终找到了一种实现方法。该方法于
    1976 年在惠特菲尔德·迪菲和马丁·E·赫尔曼的开创性论文《密码学的新方向》中发表。他们指出，随着现代电信（或他们所称的远程处理）的发展，密钥分发渠道的负担日益加重。在通信开始之前，找到安全的渠道并建立共享密钥非常繁琐，尤其是对于事先互不相识的双方而言。电话、电传和互联网等技术与其他方式相比，速度快、带宽高，但容易被窃听。很难确保没有窃听者。


    论文认为，需要解决两个问题：隐私和认证。隐私问题应通过公钥加密解决，认证问题则通过数字签名解决。


    迪菲和赫尔曼提出了一种方法，可以根据一个随机数构造出两个密钥：一个公钥和一个私钥。公钥可以通过非安全渠道共享，用于加密消息，而这些消息只能用私钥解密。请注意迪菲-赫尔曼-默克尔密钥交换与实际非对称加密之间的区别。在前者中，需要来回通信才能确保加密。在后者中，只要知道接收方的公钥，就不需要这样来回通信。这最终将成为使用比特币便捷转账的一个关键特性：只需要接收方的公钥，而不需要繁琐的来回交换以生成共享密钥。


    ## RSA 论文


    然而，迪菲和赫尔曼无法详细证明如何实现这一点。这要等到第二年，也就是 1977 年，由罗恩·里维斯特、阿迪·沙米尔和伦纳德·阿德曼发表他们开创性的论文《获取数字签名和公钥密码系统的方法》时才得以完成。计算机科学家罗恩·里维斯特在美国另一端的麻省理工学院工作，他阅读了迪菲-赫尔曼的论文。他对此非常着迷，并试图让他的同事——同为计算机科学家的阿迪·沙米尔和数学家伦纳德·阿德曼——也产生兴趣。起初，他们并不太热情。他们尝试了各种可能性，几乎对能否找到迪菲和赫尔曼所寻找的函数失去了信心。但在
    1977 年春天，里维斯特想出了一个可行的方案。


    该算法根据作者姓氏命名为 RSA 算法。他们建议基于质因数分解来实现这一目标。其原理是找到两个非常大的质数。这些就是私钥。将它们合在一起进行因式分解会生成一个公钥。任何人都可以用这个公钥来加密消息。用于加密的函数是一个单向函数，这意味着无法使用同一个密钥进行解密。唯一能用的密钥是私钥。


    公钥加密的工作原理通常是创建两个数学上相关的密钥：一个公钥和一个私钥。你现在可以公开你的公钥，让任何人都能用它来为你加密消息。由此产生的密文现在只能用与生成该密钥对时所用的公钥相对应的私钥来解密。由此可见，任何人都可以公开自己的公钥，供他人用于加密通信，而无需任何事先的接触。这种模式非常适合全新且无处不在、易于访问的电信世界。

    '
- fmt: '### A British Twist


    About 20 years later, it was discovered that the invention of such a system was
    made already in the early 1970s by British cryptographers working for the UK Government
    Communications Headquarters (GCHQ). By the end of the 1960s, British intelligence
    started working on the key distribution problem since key distribution was seen
    as a key part of the future of battlefield communication. They imagined a future
    where every soldier could use encrypted communication. This would make key distribution
    problematic.


    James H. Ellis was given the task of looking into the key distribution problem.
    He eventually conceived of the idea like Diffie and Hellman did and proved that
    it was possible, but he could not find the mathematical function to do it. For
    years GCHQ worked on identifying this function. In 1973 a new young mathematician
    by the name of Clifford Cocks was given the task to try and find the function
    that would make asymmetric cryptology possible. He almost immediately found the
    function using primes and effectively found the RSA algorithm years before it
    was found by Ron Rivest.


    Working for the military, they did not realize that this would have any general
    applicability, which is also why it was kept secret until 1997, when it was declassified
    by the British government. This system was viewed more as a curiosity than an
    important innovation since it depended on what, at the time, was extensive computing
    power. Development in computer technology made this feasible in the following
    decades. Thus, a convergence of increased computing power and mathematical breakthroughs
    made asymmetric encryption possible around the end of the 1970s.


    ## Bringing Public Key Cryptography to the Masses


    The military background and application would come back to haunt the development
    of public key cryptography. While the general approach was published in the RSA
    paper, the details were not accessible since they were top secret in the case
    of British intelligence and protected by a patent in the case of the RSA algorithm.
    There was no publicly available version.


    As the Internet became available to a more significant amount of people and the
    computing power of personal computers grew steadily through the 1980s, public
    key encryption became possible in principle for a wider audience. The government
    had historically employed cryptography for military and diplomatic purposes. But
    with the advent of the Internet and email, a new problem arose. In the time of
    physical letters, it was possible for the government or other actors to eavesdrop
    on conversations by opening and closing letters. This could not be done at scale
    since there was a physical limit to how many letters could be opened and read.
    With email, this was not the case. The government could easily read every email
    sent in plain text and even search for keywords. This fact bothered certain people
    who were not trusting of the government’s intentions.


    It motivated the American computer scientist Phil Zimmerman to develop a program
    based on the principles of the Diffie-Hellman article that would make it possible
    to use public-private key encryption in an accessible way. He believed regular
    people had a right to privacy and called the program Pretty Good Privacy or PGP
    encryption.


    Zimmerman shared it on the Internet, where it quickly gained traction. It seemed
    to be a success until two years later when the US Customs Service initiated a
    criminal investigation of Zimmerman. At the time, encryption was still understood
    as a military matter and consequently subject to arms trafficking export controls.
    Since PGP was distributed over the Internet, it could be considered “munitions
    export without a license.” This could have been the end of public availability
    of public key encryption schemes, but Zimmerman found an imaginative way around
    this by publishing the entire source code of his PGP program in a book. By doing
    this, he could refer to his first amendment right of freedom of speech.


    While Bitcoin does not use PGP, it was favored by cypherpunks, and it was common
    for members of the cryptography mailing list to publish their PGP public key to
    be used for encrypted communication in email. It also demonstrated a blueprint
    for how public key encryption specifically and cryptographic systems in general
    could be leveraged for the Internet.


    Public key encryption is a way to ensure confidentiality, that is, to protect
    the privacy of the plain text of a message. As such, it is not of central relevance
    to either the transmission or generation of bitcoins since all transactions are
    public. But it is used as a basis for other key features, such as digital signatures.
    Before we get to the details of that, we have to consider another crucial cryptographic
    function.'
