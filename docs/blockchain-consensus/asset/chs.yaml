- "# 2. 密码学\n\n本章将介绍密码学及其两大主要类型：对称密码和公钥密码。在探讨一些基本概念后，我们将深入研究对称密钥原语，然后介绍公钥原语。\n\n此外，我们还将研究哈希函数、消息认证码、数字签名方案和椭圆曲线密码学。最后，我们将简要介绍一些前沿的想法、提案和技术，特别是那些在区块链共识中使用的技术。\n\
  \n## 引言\n\n密码学是在有对手存在的情况下进行秘密通信的科学。历史上，这门学科更像一门艺术，但现在它已经成为一门严谨而正式的学科，拥有正式的定义、假设和安全证明。\n\
  \n密码学有三个基本原则：机密性、完整性和真实性。机密性确保信息仅对授权实体可用；完整性确保只有授权实体才能修改信息；最后，真实性保证消息的有效性或其发送者的身份。身份认证可分为两种类型：实体认证和数据来源认证。\n\
  \n实体认证确保某个声称拥有特定身份的实体（申明方）能够被另一实体（验证方）可靠地识别，并且该实体是活跃且正在参与的。用于实现身份认证协议中实体认证的方法包括：你所拥有的（例如硬件令牌）、你所知道的（例如密码）以及你所是的（例如指纹）。实体认证在安全的分布式系统中至关重要。由于分布式系统分布广泛、异构性强、用户众多，很容易成为对手攻击的目标。尤其是在区块链，特别是运行在区块链上的共识协议中，实体认证对于防范对手攻击至关重要。身份认证协议通常使用对称密码和公钥密码来构建。\n\
  \n另一种相关的保证是**不可否认性**，即实体在完成某项操作后不能否认该行为。这通常通过数字签名来实现。除了两方协议外，还有适用于多方的多方不可否认协议。\n\
  \n**数据来源认证**或**消息认证**确保信息来源是真实且经过验证的。消息认证码和数字签名用于提供数据来源认证。\n\n\n\n## 典型密码系统\n\n\
  典型的密码系统模型如图 2-1 所示。我们将密码系统定义为密码原语、协议及算法的组合体现，用于实现特定安全目标。因此，密码系统由多个组件构成。\n\n![](img/515270_1_En_2_Fig1_HTML.png)\n\
  \n密码系统模型描述了发送方与接收方之间通过密钥、明文和密文进行加密解密的关联关系。\n\n**图 2-1** 密码系统或密码方案的模型\n\n该系统包含三个关键角色：发送方、接收方和\
  \ adversary（攻击者）。发送方希望通过不安全的信道向接收方发送秘密消息，而攻击者作为恶意入侵者意图获取消息内容。其他要素包括明文、密文、密钥、安全信道、加密函数、解密函数及密钥源：\n\
  \n- **发送方**：消息的发送主体。\n- **接收方**：消息的预期接收者。\n- **加密函数**：以加密密钥和明文为输入，将明文转换为密文的加密算法。\n\
  - **解密函数**：以解密密钥和密文为输入，将密文转换为明文的解密算法。\n- **明文**：发送方希望以除预期接收者外无人能知的方式发送给接收方的原始消息。仅发送方及授权实体可读取和访问。\n\
  - **密文**：明文的乱码形式，未经解密时对任何阅读者而言均无意义。\n- **密钥源**：密钥管理系统或某些密码密钥来源，用于获取或生成密钥。\n- **密钥**：用于加密和/或解密数据的特定数值。\n\
  - **安全信道**：消息可未经加密传递且无窃听风险的通信渠道。\n- **攻击者**：能够读取加密数据，并试图通过密码分析或其他手段获取信息的恶意黑客（或窃听者、观察者）。\n\
  \n### 密码原语\n\n密码原语是实现特定安全服务（如机密性或完整性）的基础方法。这些密码原语用于构建安全协议，例如认证协议。密码原语包括对称原语、非对称原语和无密钥原语。密码原语的高级分类如图\
  \ 2-2 所示。\n\n![](img/515270_1_En_2_Fig2_HTML.jpg)\n\n密码原语组织结构图分为无密钥原语、对称密钥原语和非对称原语，并各有细分。\n\
  \n**图 2-2** 密码原语\n\n现在让我们了解对称原语。\n\n### 对称密码学\n\n对称密码系统使用相同密钥进行加密和解密。在发送方与接收方数据传输前，该密钥必须在安全信道中保密传输。为安全传输密钥，需使用密钥建立协议。通常采用公钥密码学来交换密钥，这比对称密钥管理更易于管理——后者在用户数量增长时可能变得具有挑战性。\n\
  \n设计对称密码算法的主要目的是提供机密性，但我们也可将其用于提供其他安全服务，如数据起源认证。\n\n对称密码系统分为两类：流密码和分组密码。图 2-3 展示了流密码和分组密码的高级运作方式。\n\
  \n![](img/515270_1_En_2_Fig3_HTML.png)\n\n流密码与分组密码运作示意图显示：分别对 2 位和 8 位明文进行处理，并转换为密文。\n\
  \n**图 2-3** 流密码（左）与分组密码（右）对比\n\n#### 流密码\n\n这类密码系统逐位加密明文。算法以单比特明文为输入进行处理，并产生单比特密文。处理过程涉及使用异或（XOR）运算进行加密和解密。流密码模型如图\
  \ 2-4 所示。\n\n![](img/515270_1_En_2_Fig4_HTML.png)\n\n流密码模型流程如下：明文、加密、加密数据、解密、明文。密钥生成器指向各函数。\n\
  \n**图 2-4** 流密码模型\n\n在此模型中，明文与密钥生成器生成的密钥流逐位输入加密函数。密钥生成器生成伪随机密钥流，其长度通常远小于明文（通常密钥长度为\
  \ 128 位）。密钥流与明文通过 XOR 运算生成密文。解密时应用相同过程，恢复出明文。伪随机生成意味着生成的比特并非真正随机，而是看似随机，故称“伪随机”。密钥流通常使用线性反馈移位寄存器（`LFSR`）生成。`LFSR`的输入位是其先前状态的线性函数，该线性函数通常为\
  \ XOR 运算。\n\n密钥生成器是一种密码学安全的伪随机数生成器（`CSPRNG`或`CPRNG`）。由于具有“伪”特性，其数值可被计算，且任何计算者都会得到相同结果，这意味着这些\
  \ PRNG 也是确定性的。若真正随机且非确定性，则一旦生成，他人无法重新生成该随机数，导致无法解密。因此它们看似随机，实则非随机且可计算。`CPRNG`具有特殊属性：其生成的数值不可预测。\n\
  \n流密码分为两类：同步流密码和异步流密码。同步流密码中，密钥流仅依赖于密钥；而异步流密码中，密钥流依赖于固定数量的先前传输加密位及密钥。\n\n流密码通常更适用于硬件设备，但也可用于软件环境。存在众多流密码实例，例如用于\
  \ GSM 通信提供机密性的`A5/1`。然而，`Salsa20`和`ChaCha`在软件环境中使用最广泛。其他流密码包括`Trivium`、`Rabbit`、`RC4`和`SEAL`。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将根据您提供的格式和注意事项，将给定的英文文本翻译成中文。\n\n\n#### 分组密码\n\n分组密码通过将明文划分为固定长度的块来进行加密。历史上，像\
  \ `DES` 这样的分组密码是使用费斯妥网络（Feistel mechanisms）构建的。现代密码，如 `AES`，则使用代换-置换网络（`SPN`）。\n\
  \n图 2-5 展示了一个简单的分组密码模型。\n\n![](img/515270_1_En_2_Fig5_HTML.png)\n\n分组密码模型。明文 `P`\
  \ 和密钥 `K` 被传递到分组密码加密函数中，该函数将它们结合起来以获得密文 `C`。\n\n**图 2-5** 分组密码\n\n图 2-5 所示的模型包括明文、加密和密文。加密器将固定长度的明文块和密钥作为输入，并生成密文块。\n\
  \n分组密码主要用于加密，但也可用于构建哈希函数、创建流密码、构建伪随机数生成器和消息认证码。\n\n加密试图实现两个必要的属性：混淆（confusion）和扩散（diffusion）。混淆增加了加密文本与明文之间关系的模糊性。它是通过使用代换来实现的，在现代加密算法（如\
  \ `AES`）中，代换由称为 S-box 的查找表执行。\n\n扩散确保明文在统计上分散到整个加密数据中。换句话说，它确保即使明文中的单个比特发生变化，密文也会发生很大变化，从而隐藏明文和密文之间的关系。也就是说，它隐藏了明文的统计特性，以挫败统计分析攻击。此外，在现代加密算法（如\
  \ `AES`）中，置换盒提供了扩散。因此，混淆和扩散结合起来创建安全的密码算法。\n\n数据加密标准（`DES`）于 20 世纪 70 年代开发，并在 20\
  \ 世纪 80 年代和 90 年代被广泛使用。随着时间的推移，由于技术的进步，`DES` 的效率开始下降。这主要是由于其 56 位密钥长度较短。在 1990 年代末，经过一些成功的暴力破解攻击（例如\
