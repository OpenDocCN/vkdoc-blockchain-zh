  \n链接模式模型具有 3 个框，包含以下元素：密钥指向密码加密以获取密文，该密文再指向下一个明文。\n\n**图 2-7** 密码块链接模式\n\n#####\
  \ 计数器模式\n\n计数器（`CTR`）模式将分组密码用作流密码。在这种情况下，一个唯一的随机数（nonce）与计数器值连接以生成密钥流。\n\n如图 2-8\
  \ 所示，`CTR` 模式的工作原理是利用一个随机数 `N` 和一个计数器 `C`，它们被送入分组密码加密函数。分组密码加密函数接收密钥 `KEY` 作为输入，并生成一个密钥流（伪随机或随机字符流），该密钥流与明文（`P`）进行异或运算后，生成密文（`C`）。\n\
  \n![](img/515270_1_En_2_Fig8_HTML.png)\n\n计数器模式模型包含 3 个框，具有以下元素：随机数、计数器、密钥、分组密码加密、密钥流、明文、密文。\n\
  \n**图 2-8** 计数器模式\n\n除了加密之外，我们还可以使用其他模式来实现不同的目的。我们将在下一节中讨论其中的一些模式。\n\n##### 密钥流生成模式\n\
  \n在密钥流生成模式下，加密函数生成一个密钥流。流密码使用此密钥流，将其与明文流进行异或运算以生成密文。\n\n##### 消息认证模式\n\n消息认证码（`MAC`）是通过消息认证模式下的加密函数产生的。`MAC`\
  \ 是一种提供完整性服务的加密校验和。使用密码块链接模式（`CBC` 模式）的分组密码可用于生成 `MAC`。我们可以使用 `MAC` 来检查未经授权的实体是否修改了消息。我们通过使用\
  \ `MAC` 函数用密钥加密消息来实现这一点。然后，接收者通过用密钥重新加密收到的消息并与收到的 `MAC` 进行比较来检查消息的 `MAC`。如果它们匹配，则表示没有未经授权的实体修改过该消息；因此，提供了完整性服务。如果它们不匹配，则意味着某个未经授权的实体在传输过程中更改了消息。\n\
  \n任何分组密码，例如处于 `CBC` 模式下的 `AES`，都可以生成 `MAC`。消息的 `MAC` 是 `CBC` 操作最后一轮的输出。`MAC` 输出的长度与用于生成\
  \ `MAC` 的分组密码的块长度相同。尽管 `MAC` 的工作方式类似于数字签名，但由于其对称性，它们无法提供不可否认服务。\n\n##### 密码哈希模式\n\
  \n哈希函数主要用于将消息压缩为固定长度的摘要。密码哈希模式下的分组密码也可用作压缩函数来生成哈希。\n\n现在我们将详细描述高级加密标准（`AES`）。\n\n\
  \n\n#### 高级加密标准\n\n`AES` 最初以发明者 Joan Daemen 和 Vincent Rijmen 的名字命名为 `Rijndael`。经过公开竞争后，它于\
  \ 2001 年被 `NIST` 标准化为高级加密标准（`AES`）。\n\n在 `Rijndael` 的原始版本中，允许使用不同的密钥和块大小，包括 128\
  \ 位、192 位和 256 位。然而，在 `AES` 中，仅允许使用 128 位的块大小以及 128 位、192 位和 256 位的密钥大小。\n\n`AES`\
  \ 处理一个大小为 4 x 4 的字节数组，称为 `state`（状态），根据密钥大小进行多轮处理。例如，如果密钥长度为 128 位，则需要 10 轮；对于 192\
  \ 位，需要 12 轮；对于 256 位，则需要 14 轮。\n\n在使用输入明文初始化 `state` 之后，`AES` 依次执行以下四个操作以生成密文：\n\
  \n- **AddRoundKey（轮密钥加）**：首先，将 `state` 数组与从主密钥派生出的子密钥进行异或操作。\n- **SubBytes（字节代换）**：此步骤执行字节替换，使用一个固定的查找表（S-box）来替换\
  \ 4 x 4 `state` 数组中的所有字节。\n- **ShiftRows（行移位）**：此步骤以循环和递增的方式将 `state` 数组中的每一行向左移动。第一行不动，第二行向左移动一个字节，第三行向左移动两个字节，第四行向左移动三个字节（或位置）。\n\
  - **MixColumns（列混淆）**：最后，以线性方式（即线性变换）混合所有字节，该函数将一列中的四个字节作为输入，并产生四个新字节作为输出来替换输入列。\n\
  \n上述四个步骤构成了 `AES` 的一轮。在最后一轮中，不执行步骤 4（`MixColumns`）。取而代之的是，它被 `AddRoundKey` 步骤替换，以确保前三个步骤不能轻易地被逆向。该过程如图\
  \ 2-9 所示。\n\n![](img/515270_1_En_2_Fig9_HTML.png)\n\n一个 `AES` 分组密码的原理图，包含 3 个阶段，即：内部状态、轮次（10/12/14\
  \ 轮）和最后一轮，以获取密文。\n\n**图 2-9** `AES` 分组密码\n\n#### 一些基础数学知识\n\n在我们深入密码学之前，理解一些非常基础的数学知识和相关术语很重要。\n\
  \n##### 素数\n\n素数是只能被自身和 1 整除的数。例如，23 是一个素数，因为它只能精确地被 23 或 1 整除，没有余数。\n\n##### 模算术\n\
  \n这是一种在整数上执行算术运算的系统，当数字达到某个固定的数值时，数字会绕回（取模）。这个固定的数值称为模数，所有算术运算都基于这个模数进行。\n\n#####\
  \ 群\n\n群 `G` 是一个集合，其元素可以通过运算 `∘` 进行组合。它具有以下性质：\n\n- **封闭性** 意味着所有群运算的结果都在该集合内。形式上，∀\
  \ `a`，`b` ∈ `G`：`a` ∘ `b` = `c` ∈ `G`。\n- **结合律** 意味着所有群运算满足结合律。形式上，`a` ∘ (`b` ∘\
  \ `c`) = (`a` ∘ `b`) ∘ `c`：∀ `a`， `b`， `c` ∈ `G`。\n- 存在一个特殊的**单位元** `i`，使得 ∀ `a`\
  \ ∈ `G`：`a` ∘ `i` = `i` ∘ `a` = `a`。\n- 对于每个元素 `a` ∈ `G`，都有一个对应的**逆元** `a^(-1)`，使得\
  \ `a` ∘ `a^(-1)` = `a^(-1)` ∘ `a` = `i`。\n\n##### 阿贝尔群\n\n如果一个群除了具备上述群的性质外，还满足 ∀\
  \ `a`， `b` ∈ `G`：`a` ∘ `b` = `b` ∘ `a`，则该群称为交换群或阿贝尔群。\n\n##### 域\n\n域 `F` 是一个集合，在\
  \ `F` 上定义了两种运算，称为加法和乘法。\n\n##### 有限域（伽罗瓦域）\n\n有限域是元素数量有限的域。\n\n##### 素域\n\n素域是包含素数个元素的有穷域。\n\
  \n##### 生成元\n\n生成元是椭圆曲线上的一个点。\n\n### 公钥密码学\n\n公钥密码系统使用两个不同的密钥进行加密和解密。公钥是公开的，而私钥必须保密。在这些系统中，发送方使用接收方的公钥加密数据。接收方通过使用相应的私钥解密密文。\n\
  \n此模型如图 2-10 所示。\n\n![](img/515270_1_En_2_Fig10_HTML.png)\n\n一个密码系统的原理图。来自发送方的明文和公钥被发送到加密环节。密文和私钥被发送到解密环节。\n\
  \n**图 2-10** 基于公钥密码学的密码系统\n\n对称密钥系统的一个基本问题是，在通信之前需要通过安全信道共享一个密钥，这很难实现。对称密钥系统的另一个问题是密钥管理。随着系统中用户数量的增长，密钥数量呈指数级增长。一个拥有\
  \ `n` 个用户的网络将需要 `n(n-1)/2` 个密钥，每个用户将存储 `n-1` 个密钥。在一个 100 用户的网络中，每个用户将存储 99 个密钥。公式\
  \ `100(100-1)/2` 表示总共有 4950 个密钥，这在实践中管理起来相当棘手。公钥密码学解决了这个密钥分发和密钥管理的问题。\n\n公钥密码学的一个典型用途是在两方之间建立一个共享的秘密密钥。这个共享的秘密密钥被对称算法（如\
  \ `AES`）用于加密数据。由于双方已经建立了共享密钥，他们可以在不通过线路传输该密钥的情况下进行加密和解密。这样，双方既获得了公钥密码学的高安全性，又享有了对称加密的速度。由于性能较慢，非对称密码学不常用于批量加密；然而，这却是密钥建立的常规做法。这种使用对称密钥加密数据，同时使用公钥密码学加密秘密密钥的系统称为混合密码系统。例如，集成加密方案就是一种混合加密方案。`ECIES`\
  \ 是 `IES` 方案的椭圆曲线（EC）版本。\n\n\n\n### Diffie-Hellman 密钥交换\n\n在密钥交换领域，具有开创性和基础性的方案是\
  \ Diffie-Hellman 密钥交换。这是一种在两方之间运行的交互式协议。下面展示一个关于 Diffie-Hellman 交换的基本且直观的数学示例：\n\
  \n1. Alice 和 Bob 想要建立一个共享的秘密密钥。\n2. 双方商定两个数字：一个素数 `P` = 13 和 `P` 的一个生成元 `G` = 6。但在实践中，`P`\
  \ 是非常大的。\n3. 双方都随机选择一个大的随机整数（即私钥）。\n   - Alice 的私钥 = 5，Bob 的私钥 = 4\n4. 双方计算各自的公钥：\n\
  \   - Alice：`6⁵ mod 13` = `7776 mod 13` = `2` → 公钥 = `2`\n   - Bob：`6⁴ mod 13` =\
  \ `1296 mod 13` = `9` → 公钥 = `9`\n5. Bob 将公钥 `9` 发送给 Alice，Alice 将公钥 `2` 发送给 Bob。\n\
  6. 双方使用各自的私钥 `5` 和 `4` 计算共享密钥。\n   - Alice：`9⁵ mod 13` = `3`\n   - Bob：`2⁴ mod 13`\
  \ = `3`\n7. 共享的秘密密钥建立成功。\n\n公钥密码系统依赖于单向陷门函数。陷门函数在一个方向上易于计算，但在相反方向上难以计算，除非存在一个称为“陷门”的特殊值。这个概念可以直观地通过图\
  \ 2-11 来理解。\n\n![](img/515270_1_En_2_Fig11_HTML.jpg)\n\n一幅图示包含了定义域 `f` 和值域 `f(x)`。从\
  \ `f` 到 `f(x)` 是容易计算的。从 `f(x)` 到 `f` 则难以逆转，除非陷门可用。\n\n**图 2-11** 陷门函数\n\n不同的计算困难问题，例如大整数因子分解问题和离散对数问题，提供了合适的单向陷门函数。使用整数因子分解的密码学方案基于分解大整数在计算上的不可行性。一个依赖此类假设的典型例子是\
  \ RSA。整数因子分解是将一个合数（由两个较小的整数相乘得到）分解为更小的整数（因子）。\n\n在密码学中，因子被限定为素数。我们可以通过一个简单的例子来演示这个问题。例如，很容易看出\
  \ `15` 是 `5` 乘以 `3` 的结果，即 `5 * 3 = 15`。那对于一个更大的素数呢，比如 `6887`？这会相对困难一些，但通过一定的计算，我们可以得到因子\
  \ `71` 和 `97`。如果这个数字非常巨大，比如有 1024 位，且是素数呢？那么将两个这样的素数相乘很容易，但分解它们却极其困难，这使其成为我们可以在密码学中使用的一个单向函数。\n\
  \n离散对数问题是许多不同密码学方案的基础，例如 Diffie-Hellman 密钥交换和数字签名算法。它基于模算术中的一个问题：计算模运算的结果很容易，但找到生成元的指数却很难。这种困难性创造了一个单向函数，其中根据输出找到输入在计算上是不可行的。\n\
  \n一个简单的例子可以展示这个问题的核心：\n\n```\n3² mod 10 = 9\n```\n\n现在，给定 `9`，要找到生成元 `3` 的指数 `2`\
  \ 是极其困难的。正式地说，我们可以认为，给定数字 `a` 和 `n`（其中 `n` 是一个素数），函数\n\n```\nf(b) = a^b mod n\n\
  ```\n\n是一个单向函数，因为计算 `f(b)` 很容易，但给定 `f(b)`，找到 `b` 却很难。\n\n另一种在 20 世纪 80 年代中期开发的方法是椭圆曲线密码学（ECC）。由于在比特币和以太坊等区块链平台中的应用，椭圆曲线密码学受到了特别关注。诸如椭圆曲线\
  \ Diffie-Hellman 密钥交换和椭圆曲线数字签名算法等协议在该领域最为普遍。ECC 本质上是一个离散对数问题，但它是基于有限域上的椭圆曲线建立的。ECC\
  \ 的一个关键优势是，较小的密钥大小可以提供与 RSA 中较大密钥大小相同的安全级别。例如，一个 1024 位整数分解方案（如 RSA）的安全级别，可以通过仅\
  \ 160 位的基于椭圆曲线的方案（如 ECDSA）来实现。\n\n公钥密码系统可用于加密，尽管这不太常见，并且对于大型数据集而言效率不高。它也可用于提供其他安全服务和协议，例如数字签名、实体认证和密钥协商。\n\
  \n#### 数字签名\n\n数字签名是公钥密码学最常见的应用之一。数字签名提供不可否认性服务。最常见的例子包括基于 RSA 的数字签名、数字签名算法（DSA）、ECDSA\
  \ 以及 Schnorr 签名。\n\n#### 实体认证\n\n实体认证（或称身份识别）是公钥密码系统能够提供的另一项服务。通常，质询-响应机制被广泛使用，验证者发送一个质询，要求声称身份者（证明者）正确响应，以确认声称者的合法性。\n\
  \n#### 密钥协商\n\n密钥协商协议用于在加密数据传输之前建立秘密密钥。这类协议最常见的例子是 Diffie-Hellman 密钥交换协议。\n\n###\
  \ RSA\n\nRSA 被广泛用于安全的密钥传输和构建数字签名。Diffie 和 Hellman 于 1976 年发明了公钥密码学。基于这一思想，Rivest、Shamir\
  \ 和 Adleman 在 1978 年开发了 RSA 公钥密码系统。\n\n在本节中，我将引导您了解 RSA 中生成密钥对的步骤，以及如何进行加密和解密。\n\
  \n#### 密钥对生成\n\n1.  **生成模数。**\n    -   选择 `p` 和 `q`，两个大的素数。通常为 `2¹⁰²⁴` 位或更多。\n \
  \   -   将 `p` 和 `q` 相乘得到模数 `n`。`n = p * q`。`n` 变为 `2²⁰⁴⁸` 位。\n\n2.  **选择一个具有特殊性质的随机数。**\
  \ 假设我们称这个数字为 `e`。\n    -   这个数字 `e` 应具有一些特殊性质：\n        -   必须大于 `1`。\n        -\
  \   必须小于 `ϕ(n) = (p - 1)(q - 1)`。\n        -   `gcd(e, (p - 1)(q - 1)) = 1`。\n \
  \       -   `e ∈ {1, 2, ..., ϕ(n) - 1}`。\n    -   正式地说，这个数字 `e` 应该是 `(p - 1)(q -\
  \ 1)` 的互质数（或称互素数），也就是说，除了 `1` 之外，没有其他数字能同时整除 `e` 和 `(p - 1)(q - 1)`。互质数之间除了 `1`\
  \ 之外没有共同因子，所以互质数的最大公约数（GCD）为 `1`。\n\n3.  **生成公钥**\n    -   步骤 1 中生成的模数 `n` 和步骤 2\
  \ 中生成的特殊数字 `e` 构成一对 `(n, e)`，这就是公钥。这对数字是公开的，可以分享给任何人；但 `p` 和 `q` 必须保密。\n\n4.  **生成私钥**\n\
  \    -   私钥，我们称之为 `d`，由步骤 1 中的两个素数 `p`、`q` 和步骤 2 中的特殊数字 `e` 计算得出。私钥是 `e` 模 `(p -\
  \ 1)(q - 1)` 的逆元，我们可以将其写为：\n\n    ```\n    e d = 1 mod (p - 1)(q - 1)\n    e d =\
  \ 1 mod ϕ(n)\n    d = e^(-1) = 7 mod 20\n    ```\n\n    实践中，使用扩展欧几里得算法来计算 `d`，该算法以\
  \ `p`、`q` 和 `e` 作为输入，输出 `d`。`d` 必须保密。\n\n\n好的，作为高级文档工程师和翻译员，我将遵照您的注意事项和示例，将以下英文文本翻译成中文。\n\
  \n\n#### 加密与解密\n\n现在，我们来看如何使用 RSA 执行加密和解密操作。RSA 使用以下公式生成密文：\n\n![$$ C={P}^e\\ \\\
  mathit{\\operatorname{mod}}\\ n $$](img/515270_1_En_2_Chapter_TeX_Equf.png)\n\n\
  这意味着明文 `P` 的 `e` 次方再对 `n` 取模。\n\nRSA 的解密由以下公式给出：\n\n![$$ P={C}^d\\ \\mathit{\\operatorname{mod}}\\\
  \ n $$](img/515270_1_En_2_Chapter_TeX_Equg.png)\n\n这意味着拥有公钥对 (`n`, `e`) 的接收者可以通过计算\
  \ `C` 的私钥 `d` 次方再对 `n` 取模来解密数据。\n\n#### 密钥生成、加密和解密的示例\n\n1.  将明文设为消息 `m`。`m` = 5，将由\
  \ Alice 发送给 Bob。\n2.  设 `p` = 3，`q` = 11。\n3.  `n` = `pq` = 3 * 11 = 33。\n4.  `e`\
  \ = 3，因为 (3 - 1)(11 - 1) = 20，该值大于 1 且小于 20，并且 `GCD`(3, 20) = 1。\n5.  公钥为 (`n`,\
  \ `e`) = (33, 3)。\n6.  私钥为 `ed = 1 mod (p - 1)(q - 1)`。\n\n    ![$$ d={e}^{-1}\\\
  kern0.5em 7\\ \\mathit{\\operatorname{mod}}\\ 20,\\left(33,7\\right) $$](img/515270_1_En_2_Chapter_TeX_Equh.png)\n\
  \n7.  将公钥 (`n`, `e`) (33, 3) 发送给 Alice。\n8.  Alice 计算 5³ = 125 `mod` 33 = 26。\n\
  9.  Alice 将 26 作为加密文本发送给 Bob。\n10. Bob 计算 26⁷ = 8031810176 = 8031810176 `mod` 33\
  \ = 5，并检索到明文消息 5。\n\n### 椭圆曲线密码学\n\n椭圆曲线密码学 (ECC) 基于数学中一个称为椭圆曲线的概念。它是平面上的一组点，其 `x`,\
  \ `y` 坐标满足特定的方程和一些条件。通常，它是 Weierstrass 形式 `y² = x³ + ax + b`，其中 `a` 和 `b` 是固定的。\n\
  \n椭圆曲线是群。它们被用于数学的许多不同领域，包括数论、复分析和数学物理。在密码学中使用时，有限域上的合适椭圆曲线的点形成一个群结构，该结构允许基于离散对数问题构建密码学方案。\n\
  \n椭圆曲线密码学中使用素数域。*在素数域中，所有算术运算都是对素数 `p` 取模执行的*。\n\n椭圆曲线由以下方程定义：\n\n![$$ {y}²={x}³+\
  \ ax+b\\ \\mathit{\\operatorname{mod}}\\ p $$](img/515270_1_En_2_Chapter_TeX_Equi.png)\n\
  \n这里，`a` 和 `b` 属于有限域 `Zp` 或 `Fp`（素数有限域），即 (`a`, `b`) ∈ `Z`，以及一个无穷远虚点。无穷远点 `∞` 用于为曲线上的点提供单位元运算。\n\
  \n此外，如下所示的条件确保曲线是非奇异的，这意味着曲线不会自相交或具有顶点：\n\n![$$ 4{a}³+27{b}²\\ne 0\\ \\mathit{\\\
  operatorname{mod}}\\ p $$](img/515270_1_En_2_Chapter_TeX_Equj.png)\n\n为了构建基于椭圆曲线的离散对数问题，需要一个足够大的循环群。首先，将群元素标识为满足椭圆曲线方程的一组点。之后，需要在这些点上定义群运算。椭圆曲线上的基本群运算是点加法和点倍乘。点加法是添加两个不同点的过程，而点倍乘意味着将同一个点加到自身。\n\
  \n椭圆曲线可以在实数上可视化，如图 2-12 所示。\n\n![](img/515270_1_En_2_Fig12_HTML.jpg)\n\n一张图在所有四个象限中绘制了一条椭圆曲线。该曲线水平方向呈双边对称。\n\
  图 2-12\n实数域上的椭圆曲线 `y² = x³ - 3x + 5`\n\n我们可以在几何上直观地理解曲线和群运算（即加法和倍乘）在实数上的表现，这有助于建立直观感受。然而，在实践中，使用素数域上的曲线来构建基于\
  \ ECC 的方案。尽管当我们尝试绘制它时，它看起来相当随机且不直观。\n\n#### 点加法\n\n对于添加两个点，画一条通过点 `P` 和 `Q` 的直线（图\
  \ 2-13 中的对角线），以得到第三个点。该点反射后得到点 `R`，在图 2-13 中表示为 `P+Q`。\n\n![](img/515270_1_En_2_Fig13_HTML.jpg)\n\
  \n一张图在所有象限中绘制了一条椭圆曲线。该曲线水平方向呈双边对称。两条线分别在 `P` 和 `Q` 以及 `P+Q` 处与曲线相交。\n图 2-13\n点加法\n\
  \n从代数角度来说，在点加法运算中，将两个点 `P` 和 `Q` 相加以获得曲线上第三个点 `R` 的坐标：\n\n![$$ P+Q=R $$](img/515270_1_En_2_Chapter_TeX_Equk.png)\n\
  \n其中 `P` = (`x`[1], `y`[1])，`Q` = (`x`[2], `y`[2])，`R` = (`x`[3], `y`[3])。\n\n对于加法，我们计算点之间的斜率：\n\
  \n![$$ S=\\frac{\\left({y}_2-{y}_1\\right)}{\\left({x}_2-{x}_1\\right)}\\ \\mathit{\\\
  operatorname{mod}}\\ p $$](img/515270_1_En_2_Chapter_TeX_Equl.png)\n\n其中 `S` 表示经过\
  \ `P` 和 `Q` 的直线。\n\n现在得到新点 `R`：\n\n![$$ {x}_3={s}²-{x}_1-{x}_2\\ \\mathit{\\operatorname{mod}}\\\
  \ p $$](img/515270_1_En_2_Chapter_TeX_Equm.png)\n\n![$$ {y}_3=s\\left({x}_1-{x}_2\\\
  right)-{y}_1\\ \\mathit{\\operatorname{mod}}\\ p $$](img/515270_1_En_2_Chapter_TeX_Equn.png)\n\
  \n#### 点倍乘\n\n在点倍乘中，`P` 被加到自身。换句话说，`P` 和 `Q` 是同一个点。由于该点与自身相加，我们可以称此运算为点倍乘。\n\n为了倍乘一个点，画一条经过点\
  \ `P` 的切线（图 2-14 中的虚线对角线），该线获得与曲线相交的第二个点。将该点反射即可得到结果 `R`，在图 2-14 中表示为 `2P`。\n\n\
  ![](img/515270_1_En_2_Fig14_HTML.jpg)\n\n一张图在所有象限中绘制了一条椭圆曲线。该曲线水平方向呈双边对称。两条线分别在\
  \ `P=Q` 和 `2P` 处与曲线相交。\n图 2-14\n椭圆曲线点倍乘\n\n对于倍乘，我们使用\n\n![$$ S=\\frac{\\left(3{x}_1²+a\\\
  right)}{{2_y}_1}\\ \\mathit{\\operatorname{mod}}\\ p $$](img/515270_1_En_2_Chapter_TeX_Equo.png)\n\
  \n其中 `S` 表示经过点 `P` 的切线。\n\n现在得到点 `R`：\n\n![$$ {x}_3={s}²-{x}_1-{x}_2\\ \\mathit{\\\
  operatorname{mod}}\\ p $$](img/515270_1_En_2_Chapter_TeX_Equp.png)\n\n`y`[3] = `s`(`x`[1]\
  \ - `x`[2]) - `y`[1] `mod p`\n\n\n\n##### 标量点乘\n\n该操作用于将椭圆曲线上的一个点乘以一个给定的整数，例如整数\
  \ `d` 和点 `P`。我们通过重复将 `P` 相加 `d` 次来得到 `dP`，如下所示：\n\n![$$ P+P+\\dots +P= dP $$](img/515270_1_En_2_Chapter_TeX_Equq.png)\n\
  \n该操作用于在基于 ECC 的密码系统中生成公钥。这是一个计算开销非常高的过程，因为需要反复执行点加和倍点运算来计算：\n\n![$$ Q= dP $$](img/515270_1_En_2_Chapter_TeX_Equr.png)\n\
  \n其中，`P` 是曲线上的一个点，`d` 是随机选择的用作私钥的整数，`Q` 是乘法运算后得到的公钥。\n\n提高点乘速度是一个活跃的研究领域。虽然有许多算法可以加速标量乘法，这里我们用双倍与加算法描述一个快速示例。该算法结合了点加和倍点操作来实现性能提升。\n\
  \n例如，如果仅使用加法来得到 `9P`，我们必须执行 `P + P + P + P + P + P + P + P + P` 操作，如果 `P` 的数量增加，这种方法很快就会变得不切实际。我们可以使用双倍与加机制来加快速度。这里，我们首先将九转换为二进制。从最高有效位开始，对于每个为\
  \ 1 的位，执行双倍和加法操作；对于每个为零的位，仅执行双倍操作。我们不对最高有效位执行任何操作。九的二进制是 `1001`，因此对于每个位，我们得到（从左到右）`P`、`2P`、`4P`、`8P+P`。这种方案只需要三次双倍运算和一次加法运算就能得到\
  \ `9P`，而不是九次加法运算。\n\n##### 椭圆曲线离散对数问题\n\n现在考虑 `dP` 操作会在曲线上生成另一个点 `Q`。即使我们知道点 `P`\
  \ 和 `Q`，在计算上也无法重构出我们为计算数字 `d` 而执行的所有双倍和加法操作的序列。即使有人知道 `P` 和 `Q`，他们也找不到 `d`。这意味着它是一个单向函数。这是椭圆曲线离散对数问题的基础。\n\
  \n考虑一个椭圆曲线 `E`，以及两个元素 `P` 和 `Q`。离散对数问题是要找到满足以下条件的整数 `d`（其中 `1 <= d <= #E`）：\n\n\
  ![$$ P+P+\\dots +P= dP=Q $$](img/515270_1_En_2_Chapter_TeX_Equs.png)\n\n这里，`Q` 是公钥（曲线上生成的一个点\
  \ `(x, y)`），`d` 是私钥（曲线上的另一个点）。公钥是生成点 `P` 的一个随机倍数，而私钥是用于生成该倍数的整数 `d`。生成点或基点 `G` 是曲线上一个能够生成循环子群的点，这意味着该群中的每一个点都可以通过反复添加基点来得到。\n\
  \n`#E` 代表群的阶，即椭圆曲线循环子群中存在的点的数量。循环群是由椭圆曲线上的点和无穷远点组合而成。余因子 `h` 是曲线上的点数除以子群的阶得到的值。\n\
  \n起始点 `P` 是一个公共参数，公钥 `Q` 也会公开，而私钥 `d` 则保密。如果不知道 `d`，仅凭 `Q` 和 `P` 的知识是无法计算出 `d` 的，这就构成了\
  \ ECDLP 所基于的难题。\n\n一个密钥对与椭圆曲线的特定域参数相关联。域参数是实施 ECC 方案所需的公共值。这些参数用一个元组 `{p, a, b,\
  \ G, n, h}` 表示：\n\n*   `p`：域（模素数）\n*   `a`、`b`：固定的椭圆曲线系数\n*   `G`：用于生成循环群的生成点\n\
  *   `n`：群的阶\n*   `h`：余因子\n\n例如，比特币使用 `SECP256k1` 曲线，其方程为 `y² = x³ + 7`，域参数定义如下：[`https://en.bitcoin.it/wiki/Secp256k1`](https://en.bitcoin.it/wiki/Secp256k1)\n\
  \n最常用的曲线是 NIST 提出的曲线，例如 `P-256`。其他曲线包括 `Curve25519`、`Curve1174` 等等。当然，建议选择安全的曲线。一个关于安全与不安全曲线及其解释的优秀资源在此处在线维护：[`https://safecurves.cr.yp.to`](https://safecurves.cr.yp.to)\n\
  \n#### 数字签名\n\n公钥密码学用于创建数字签名。这是公钥密码学最常见的应用之一。在本节中，我们将了解 RSA、ECDSA 和 Schnorr 签名是如何工作的。还将介绍在区块链中常用的聚合签名和多重签名等概念。\n\
  \n数字签名提供了一种将消息与其来源实体关联起来的方法。数字签名用于提供数据源认证和不可否认性。\n\n数字签名用于共识算法，尤其是在区块链网络中，用于签署用户在区块链网络上发送的交易和消息。区块使用数字签名以密码学方式进行密封，以便接收方能够验证所传输区块的真实性。同样，所有交易也会被签名。在共识算法中，常见的做法是，区块被密封并广播到网络，接收节点接收后，验证签名以确定区块的真实性。验证通过后，区块会被插入到本地区块链中。\n\
  \n数字签名具有三个安全属性：真实性、不可伪造性和不可重用性。\n\n##### 真实性\n\n这意味着数字签名可以被接收方验证。\n\n##### 不可伪造性\n\
  \n此属性保证只有消息的发送者才能使用私钥进行签名。数字签名还必须能够防止伪造。伪造是指攻击者在没有合法签名者私钥的情况下，为某条消息伪造一个有效的签名。换句话说，不可伪造性意味着没有人能生成由真正的发送者产生的已签名消息。\n\
  \n##### 不可重用性\n\n此属性要求数字签名不能与一条消息分离，并再次用于另一条消息。换句话说，数字签名与其对应的消息紧密绑定，不能与其原始消息分离并附加到另一条消息上。\n\
  \n使用数字签名的签名和验证过程如图 2-15 所示。\n\n![](img/515270_1_En_2_Fig15_HTML.png)\n\n一个由两部分组成的签名和验证流程图，分别显示了从数据到已签名数据的流程，以及从已签名数据到哈希的流程。\n\
  \n**图 2-15**  \n数字签名（左）和验证过程（右）\n\n首先，我们为想要证明其数据源认证的数据生成哈希。然后，我们使用证明者的私钥加密该哈希，以创建一个“签名”，并将其附加到数据上。最后，这个已签名的对象被发送给验证者。\n\
  \n验证者使用签名者的公钥解密数据的加密哈希，以检索原始哈希。然后，验证者获取数据，并通过哈希函数再次对其进行哈希，以生成哈希值。如果这两个哈希值匹配，则验证成功，证明签名者确实签署了该数据。这也证明了数据源认证，以及不可否认性和数据完整性属性。\n\
  \n现在，我们描述 ECDSA（椭圆曲线数字签名算法）是如何工作的。\n\n\n\n##### ECDSA 签名\n\n`ECDSA` 是一种基于椭圆曲线的数字签名算法（DSA）。DSA\
  \ 是数字签名的标准，基于模幂运算和离散对数问题。它被用于比特币和以太坊区块链平台，以验证消息并提供数据完整性服务。\n\n现在，我们将描述 `ECDSA` 的工作原理。\n\
  \n要使用 `ECDSA` 方案进行签名和验证，首先需要生成一个密钥对：\n\n1. 定义一条椭圆曲线 `E`，包含以下参数：\n   * 模数 `P`\n \
  \  * 系数 `a` 和 `b`\n   * 一个生成点 `A`，它构成一个素数为 `q` 的循环群\n\n2. 随机选择一个整数 `d`，满足 `0 < d\
  \ < q`。\n\n3. 计算公钥 `B`，使得 `B = dA`。\n   * 公共参数是一个六元组，形式如下所示：\n\n     ```\n     Kpb\
  \ = (p, a, b, q, A, B)\n     ```\n\n   * 私钥是在步骤 2 中随机选择的整数 `d`：\n\n     ```\n  \
  \   Kpr = d\n     ```\n\n现在，可以使用私钥和公钥生成签名。\n\n1. 选择一个临时密钥 `Ke`，满足 `0 < Ke < q`。同时，确保\
  \ `Ke` 是随机的，并且任何两个签名都不会使用相同的密钥；否则，私钥可以被计算出来。\n\n2. 通过 `R = Ke * A` 计算出一个值 `R`，即将生成点\
  \ `A` 与随机临时密钥相乘。\n\n3. 将点 `R` 的 `x` 坐标值赋给变量 `r`，使得 `r = xR`。\n\n4. 现在可以按如下方式计算签名：\n\
  \n   ```\n   s = (h(m) + d·r) * Ke^(-1) mod q\n   ```\n\n这里，`m` 是待签名的消息，`h(m)` 是消息\
  \ `m` 的哈希值。\n\n* `Xp = r mod q` 表示有效签名。\n* `Xp ≠ r mod q` 表示无效签名。\n\n5. 签名验证按如下方式进行：\n\
  \   * 计算一个值 `w`，即 `w = s^(-1) mod q`。\n   * 计算值 `u1 = w * h(m) mod q`。\n   * 计算值\
  \ `u2 = w * r mod q`。\n   * 计算点 `P`：\n\n     ```\n     P = u1 * A + u2 * B\n   \
  \  ```\n\n6. 验证按如下方式进行：\n   * 如果步骤 5 中计算出的点 `P` 的 `x` 坐标值与签名参数 `r mod q` 相同，则接受\
  \ `r, s` 为有效签名；即：\n\n     ```\n     xP == r mod q\n     ```\n\n至此，我们对数字签名，特别是 `ECDSA`\
  \ 的介绍就完成了。`ECDSA` 在区块链网络（包括比特币、以太坊以及若干企业级链）中非常常用。现在我们描述一些其他的数字签名变体。\n\n##### 多重签名\n\
  \n在这种方案中，由各自持有者持有的多个唯一密钥用于签署单个消息。在区块链实现中，多重签名方案允许多个用户签署一笔交易，从而增强安全性。此外，在区块链网络中，这些方案可用于让用户设置至少一个或多个签名来授权交易的条件。\n\
  \n例如，一个 1/2 多重签名方案可以代表一个联名账户，其中任一联名账户持有人需要签署交易以授权它。在另一种变体中，可以使用 2/2 多重签名，即两个联名账户持有人的签名都必须授权该交易。这个概念被推广为\
  \ m/n 签名，其中 `m` 是预期签名的最小数量，`n` 是签名的总数。\n\n该过程如图 2-16 所示。\n\n![分别展示了由用户 1 到 n 对交易\
  \ X 进行签名，以及由验证者进行验证的签名和验证过程示意图。](img/515270_1_En_2_Fig16_HTML.png)\n\n**图 2-16**\
  \ 多重签名方案\n\n图 2-16 左侧展示了签名过程，其中 `m` 是不同用户的数量，他们持有 `m` 个唯一签名来签署单个交易。当验证者收到它时，需要逐一验证其中的所有签名。\n\
  \n##### 门限签名\n\n这种方案不依赖用户使用各自的密钥签署消息；相反，它只需要一个公钥和一个私钥来生成数字签名。在多重签名方案中，签名的消息包含所有签名者的数字签名，要求验证方逐一验证，但在门限签名中，验证者只需验证一个数字签名。该方案的核心思想是将私钥分割成多个部分，每个签名者保留其私钥份额。签名过程要求每个用户使用其各自的私钥份额来签署消息。一个特定的通信协议管理签名者之间的通信。\n\
  \n与多重签名相比，门限签名产生的交易规模更小，验证速度更快。然而，一个缺点是为了使门限签名生效，所有签名者必须保持在线。在多重签名方案中，签名可以异步提交。换句话说，用户可以在方便时提供签名。一个缺点是可能出现用户恶意扣留签名的情况，从而导致拒绝服务。我们也可以使用门限签名在区块链网络中提供匿名性，因为在多重签名方案中，单个签名者是无法识别的。\n\
  \n图 2-17 左侧展示了签名过程，其中 `m` 个不同用户持有数字签名的不同部分（份额），签署单个交易。当验证者收到它时，只需要验证一个签名。\n\n![分别展示了由用户\
  \ 1 到 n 对交易 X 进行签名，以及由验证者进行验证的签名和验证过程示意图。](img/515270_1_En_2_Fig17_HTML.png)\n\n\
  **图 2-17** 门限签名\n\n\n\n##### 聚合签名\n\n聚合签名能够减小数字签名的体积。这种方案在需要同时使用多个数字签名的场景中非常有用。其核心思想是将多个签名聚合成一个单一的签名，同时不增加单个消息签名的体积。这本质上是一种支持聚合功能的数字签名类型。\n\
  \n一个微小的聚合签名就足以向验证者证明，所有用户都签署了各自的原始消息。因此，聚合签名常用于网络和安全协议中，以减少消息的体积。例如，在公钥基础设施（PKI）中，我们可以通过将证书链中的所有签名压缩成一个单一签名，显著减小数字证书链的体积。`Boneh-Lynn-Shacham`（BLS）聚合签名是聚合签名的一个典型例子。BLS\
  \ 也已被用于各种区块链，尤其是在以太坊 2.0 中。\n\nSchnorr 签名是另一种基于椭圆曲线密码学的签名类型，它支持密钥和签名的聚合。与签名大小为 71\
  \ 字节的 ECDSA 相比，Schnorr 签名的大小仅为 64 字节。ECDSA 的私钥大小为 32 字节，公钥为 33 字节；而 Schnorr 方案的私钥和公钥大小均为\
  \ 32 字节。总体而言，Schnorr 签名比 ECDSA 更小、更快。\n\n图 2-18 展示了聚合签名的工作方式。\n\n![](img/515270_1_En_2_Fig18_HTML.png)\n\
  \n聚合签名的工作流程。签名 1 到 3 指向聚合函数，聚合函数再指向最终的聚合签名。\n\n图 2-18\n聚合签名\n\n根据比特币改进提案（BIP）340，Schnorr\
  \ 签名计划被用于比特币。\n\n##### 环签名\n\n环签名方案是一种机制，允许签名者群体中的任何成员代表整个群体对消息进行签名。环中的每个成员都持有公钥和私钥。这里的关键在于，实际签署消息的签名者的身份对于外部观察者来说必须是未知的（在计算上不可确定）。看起来，可信签名者群体中的任何人都有可能签署了该消息，但无法找出具体是哪个用户签署的。因此，我们可以使用环签名来提供匿名服务。\n\
  \n### 哈希函数\n\n哈希函数是无密钥的基元，能够为任意长度的输入数据生成固定长度的摘要。哈希函数具有三个安全属性。\n\n#### 原像抗性\n\n该属性也被称为单向性。可以通过一个简单的等式来解释：\n\
  \n```\nh(x)=y\n```\n\n其中 `h` 是哈希函数，`x` 是输入，`y` 是输出的哈希值。第一个安全属性要求不能从 `y` 反向计算出 `x`。`x`\
  \ 是 `y` 的原像，因此得名原像抗性。此属性如图 2-19 所示。\n\n![](img/515270_1_En_2_Fig19_HTML.png)\n\n\
  原像抗性示意图。输入 x 经过哈希函数 h，得到输出 y。\n\n图 2-19\n原像抗性\n\n#### 第二原像抗性\n\n该属性也被称为弱抗碰撞性。此属性确保给定\
  \ `x` 和 `h(x)` 后，几乎不可能找到任何其他消息 `m`，使得 `m ≠ x` 且 `m` 的哈希值等于 `x` 的哈希值，即 `h(m) = h(x)`。此属性如图\
  \ 2-20 所示。\n\n![](img/515270_1_En_2_Fig20_HTML.png)\n\n第二原像抗性示意图。输入 x 和未知的 z 经过哈希函数\
  \ h，得到输出 y1 与 y2 相等。\n\n图 2-20\n第二原像抗性\n\n#### 抗碰撞性\n\n抗碰撞性要求两个不同的输入消息不应哈希到相同的输出。换句话说，`h(x)\
  \ ≠ h(z)`。图 2-21 展示了抗碰撞性。\n\n![](img/515270_1_En_2_Fig21_HTML.png)\n\n抗碰撞性示意图。未知的输入\
  \ x 和 z 经过哈希函数 h，得到输出 y1 与 y2 相等。\n\n图 2-21\n强抗碰撞性\n\n此外，哈希函数还有两个功能性属性：\n\n*   将任意大小的数据压缩成固定长度的摘要\n\
  *   易于计算\n\n哈希函数由于其特性，总是可能存在碰撞，即两个不同的消息哈希到相同的输出。但在一个良好的哈希函数中，找到碰撞在计算上应该是不可行的。\n\n\
  此外，哈希函数还应具备一个特性：输入文本的微小变化，哪怕只更改一个字符，也应产生完全不同的哈希输出。这被称为雪崩效应。\n\n哈希函数通常采用迭代哈希函数方法设计，即将输入数据划分为大小相等的块，然后通过压缩函数对其进行迭代处理。\n\
  \n下面列出了一些使用迭代方法构建哈希函数的著名方案：\n\n*   Merkle-Damgard 结构\n*   海绵结构\n\n最常见的哈希函数方案有 SHA-0、SHA-1、SHA-2、SHA-3、RIPEMD\
  \ 和 Whirlpool。\n\n#### 安全哈希算法（SHA）的设计\n\n在本节中，我们将介绍 SHA-256 和 SHA-3 的设计。它们分别用于比特币和以太坊。但需要注意的是，以太坊使用的是\
  \ Keccak（最初提交给 NIST 的原始算法），而非 NIST 标准的 SHA-3。NIST 在经过一些修改（如增加轮数和简化消息填充）后，将 Keccak\
  \ 标准化为 SHA-3。\n\n##### SHA-256 的设计\n\nSHA-256 的输入消息大小限制为 `2⁶⁴ − 1` 位。其块大小为 512 位，字长为\
  \ 32 位。输出是一个 256 位的摘要。\n\n压缩函数处理一个 512 位的消息块和一个 256 位的中间哈希值。该函数有两个主要组成部分：压缩函数和消息调度。\n\
  \n该算法按以下九个步骤工作。\n\n###### 预处理\n\n*   消息填充：当消息长度小于所需的 512 位块大小时，对其进行填充以使其长度达到 512\
  \ 位。\n*   将消息解析为消息块：确保消息及其填充被划分为多个 512 位的等长块。\n*   设置初始哈希值：该值由八个 32 位字组成，这些字是通过取前八个素数平方根的小数部分的前\
  \ 32 位而获得的。这些初始值是固定的，用于初始化整个过程。它们提供了一定程度的信心，确保算法中不存在后门。\n\n\n\n#### 哈希计算\n\n每个消息块按顺序处理，需要\
  \ 64 轮来计算完整的哈希输出。每一轮使用略有不同的常数，以确保没有两轮是相同的。\n\n-   进行消息调度准备。\n-   初始化八个工作变量。\n- \
  \  压缩函数执行 64 次。\n-   计算中间哈希值。\n-   最后，重复步骤 5 到 8 直到处理完输入消息中的所有块（数据块）后，通过连接中间哈希值生成输出哈希。\n\
  \n在高层次上，SHA-256 可以用图 2-22 来可视化。\n\n![A flow of a high-level overview. Initial values\
  \ of eight 32-bit words via message blocks 0, 1 to n point to the respective compression\
  \ functions.](img/515270_1_En_2_Fig22_HTML.jpg)\n\n**图 2-22** SHA-256 高级概述\n\n如图\
  \ 2-22 所示，SHA-256 是一种 Merkle-Damgard 结构，它将输入消息划分为大小相等的 512 位块。初始哈希值，或称初始化向量，由八个\
  \ 32 位字（即 256 位）组成，与第一个消息一起输入压缩函数。后续块依次输入压缩函数，直到处理完所有块，生成输出哈希。\n\nSHA-256 的压缩函数如图\
  \ 2-23 所示。\n\n![An illustration of the compression function includes the working\
  \ variables from a to h and bitwise rotations of sigma 0 and sigma 1.](img/515270_1_En_2_Fig23_HTML.png)\n\
  \n**图 2-23** SHA-256 压缩函数的一轮\n\n在图 2-23 中，`a`, `b`, `c`, `d`, `e`, `f`, `g`, 和 `h`\
  \ 是八个工作变量的寄存器。`Maj` 和 `Ch` 是按位应用的函数。`Σ[0]` 和 `Σ[1]` 执行按位旋转。轮常数 `W[j]` 和 `K[j]` 被添加到哈希函数的主循环（压缩器函数）中，该循环执行\
  \ 64 次。\n\n#### SHA-3 (Keccak) 的设计\n\nSHA-3 的结构与 SHA-1 和 SHA-2 截然不同。SHA-3 基于无密钥排列，而不是其他使用有密钥排列的典型哈希函数结构。Keccak\
  \ 也没有使用哈希函数中常用的、用于处理任意长度输入消息的 Merkle-Damgard 变换。相反，Keccak 采用了一种较新的方法，称为海绵与挤压结构。它是一种随机排列模型。\n\
  \nSHA-3 的不同变体已被标准化，例如 `SHA3-224`, `SHA3-256`, `SHA3-384`, `SHA3-512`, `SHAKE128`\
  \ 和 `SHAKE256`。此外，`SHAKE128` 和 `SHAKE256` 是可扩展输出函数（XOFs），它允许将输出扩展到任意所需长度。\n\n图 2-24\
  \ 展示了 SHA-3 或 Keccak 所基于的海绵与挤压模型。类似于海绵，数据（`m` 输入数据）在应用填充后首先被“吸收”到海绵中。然后，使用异或将其改变为置换状态的一个子集，最后，将输出从代表转换状态的海绵函数中“挤压”出来。比率`r`是海绵函数的输入块大小，而容量`c`决定了安全级别。\n\
  \n![An illustration of an S H A 3 function includes m input data, state size b equals\
  \ r plus c, absorb, squeeze, and the hash of m as output.](img/515270_1_En_2_Fig24_HTML.png)\n\
  \n**图 2-24** SHA-3 吸收与挤压函数\n\n在图 2-24 中，状态大小`b`通过将比特率`r`和容量比特`c`相加来计算。`r` 和 `c`\
  \ 可以是任何值，只要 `r + c` 的大小为 25、50、100、200、400、800 或 1600。该状态是一个三维位矩阵，初始设置为 0。数据`m`在应用填充后，通过异或运算逐块进入吸收阶段。\n\
  \n表 2-1 显示了在 `r + c = 1600` 的最高效设置下，为实现所需输出哈希大小所需的比特率`r`（块大小）和容量`c`的值。\n\n**表 2-1**\
  \ SHA-3 支持的比特率和容量\n\n| - | 比特率 `r`，块大小 | 容量 `c` | 输出哈希大小 |\n| :--- | :--- | :---\
  \ | :--- |\n\n函数`f`是一个置换函数。它包含五种变换操作，名为 Theta、Rho、Pi、Chi 和 Iota，描述如下：\n\n- `θ` -\
  \ `Theta`：对状态中的位进行异或，用于混合。\n- `ρ` - `Rho`：执行位旋转的扩散函数。\n- `π` - `Pi`：扩散函数。\n- `χ`\
  \ - `Chi`：对每个位进行异或，按位组合。\n- `ι` - `Iota`：与轮常数组合。\n\n关键思想是应用这些变换来实现雪崩效应，这确保了即使输入中发生微小的变化，输出也会发生巨大的变化。这五种操作组合在一起构成一轮。在\
  \ SHA-3 标准中，轮数为 24 轮，以达到所需的安全级别。\n\n### 消息认证码\n\n消息认证码（MACs）用于在密码系统中提供认证服务。MACs\
  \ 有时被称为密钥哈希函数，我们可以使用它们来提供消息完整性和数据源认证。MACs 可以使用分组密码或哈希函数来构建。\n\n图 2-25 展示了一个 MAC\
  \ 操作，其中发送方将认证标签`T`附加到消息`M`上。MACs 是对称密码原语，使用发送方和接收方之间的共享密钥。发送方使用此密钥生成认证标签，而接收方使用相同的密钥进行验证。MAC\
  \ 函数将密钥和消息`M`作为输入，并生成认证标签`T`。\n\n![An illustration of a MAC function for sender\
  \ and receiver includes the key, MAC, M, and T, and key, MAC, M, and T prime, respectively.](img/515270_1_En_2_Fig25_HTML.png)\n\
  \n**图 2-25** MAC 函数的操作\n\n`T` 和 `M` 被发送给接收方，接收方运行相同的过程并将 `T` 与 `T'` 进行比较，`T'` 是验证者通过应用相同的\
  \ MAC 函数生成的，如果它们匹配，则验证成功。\n\n#### 基于哈希的 MACs (HMACs)\n\n与哈希函数类似，基于哈希的 MACs（HMACs）产生固定长度的输出，并以任意长的消息作为输入。在这种方案中，发送方使用\
  \ MAC 对消息进行签名，接收方使用共享密钥对其进行验证。密钥与消息一起使用秘密前缀法或秘密后缀法进行哈希处理。对于秘密前缀法，密钥与消息连接，即密钥在前，消息在后；而对于秘密后缀法，密钥在消息之后，如下所示：\n\
  \n```\nSecret prefix: M = MAC_k(x) = h(k || x)\n```\n\n```\nSecret suffix: M = MAC_k(x)\
  \ = h(x || k)\n```\n\n两种方法各有利弊。两种方案都曾出现过一些攻击。HMAC 构造方案使用 `ipad`（内部填充）和 `opad`（外部填充）进行填充，这在某些假设下被认为是安全的。\n\
  \n哈希函数的各种重要应用用于点对点网络和区块链网络，例如 Merkle 树、Patricia 树、Merkle Patricia 树以及分布式哈希表。\n\n\
  接下来将讨论一些最新的进展，例如可验证延迟函数。\n\n\n\n## 可验证延迟函数\n\n可验证延迟函数（VDF）是一种密码学原语，其求值需要执行**按序**的多个步骤（消耗大量时间），但验证过程却非常快速高效。求值过程必须按序进行，即使采用并行计算，也必须花费指定的时间量。但验证过程是高效的。VDF\
  \ 在分布式网络中有多种应用，例如，它们可以用作随机信标，按固定间隔发布随机、不可预测且不可操纵的值。随机信标可用于构建随机领导者选举算法。VDF 在多方计算、无需许可共识以及事件时间戳领域也有应用。\n\
  \n形式上，VDF 可以定义如下。一个 VDF 涉及三个程序：\n\n- `setup(λ, t)` → `pp`，其中 `λ` 是安全参数，`t` 是时间参数，例如，十分钟的延迟。\n\
  - `evaluate(pp, x)` → `y`, `π`，其中 `x` 是输入，`pp` 是公共参数，`y` 是输出，`π` 是证明。根据具体构造的不同，`π`\
  \ 可以是可选的。\n- `verify(pp, x, y, π)` → {`true`, `false`}，其输出 `true` 或 `false`，指示检查输出正确性的验证成功或失败。\n\
  \nVDF 有两个安全属性：唯一性和顺序性。唯一性确保 VDF 为每个输入 `x` 产生的输出 `y` 是唯一的。顺序性属性确保强制实施了延迟参数 `t`。\n\
  \n图 2-26 展示了 VDF 的操作流程。\n\n![](img/515270_1_En_2_Fig26_HTML.png)\n\nVDF 的示意图。sigma\
  \ 的`设置`、`t` 作为 VDF 的输入，`y`、`pi` 作为输出。对所有参数执行验证函数。\n\n**图 2-26** – VDF 的操作流程\n\n\
  关于如何构造 VDF 有许多方案。一些方法包括使用硬件飞地，在飞地内存储加密密钥，并使用这些密钥来生成 VDF。另一种构造可验证延迟函数的方法是使用哈希函数，将输出迭代地再次作为输入，以形成哈希链。使用哈希函数迭代地创建哈希链是一个按序处理的过程，并且需要时间；因此它可以作为\
  \ VDF 的求值函数。另一种越来越流行的方法是代数构造，其中使用被认为具有未知阶数的有限循环群。\n\nVDF 在区块链中有许多创新应用，包括构建共识算法，以及作为可验证随机性和领导者选举的来源。当我们在第\
  \ 8 章讨论相关共识协议时，你将详细探索这些应用。\n\n## 可验证随机函数\n\n可验证随机函数（VRF）是一种伪随机公钥函数，它提供了一种证明，表明其生成的输出是正确计算得出的。私钥所有者生成函数的证明和输出，该输出可通过公钥公开验证，以确定该值确实是正确计算的。VRF\
  \ 在共识算法和区块链中有许多应用，例如，卡尔达诺（Cardano）和波卡（Polkadot）在区块生成机制中使用了 VRF。它们也被用于在链上提供可验证的随机性，例如，在\
  \ Chainlink 的情况下。\n\n## 总结\n\n-   密码学是关于秘密通信的科学。\n-   对称密钥密码学和非对称密码学是密码学的两大类别。\n\
  -   椭圆曲线密码学在区块链和相关共识协议中找到了主要应用，其中通常使用 ECDSA 对区块和交易进行数字签名。\n-   哈希函数为任意长度的输入创建固定长度的消息摘要。\n\
  -   MAC 是用于消息认证的消息认证码。\n-   数字签名提供不可否认性、完整性和认证服务。\n-   认证协议用于分布式系统以提供实体认证。\n-  \
  \ 混合加密方案结合了公钥和对称密钥密码学，以实现性能和安全。\n-   可验证延迟函数是需要时间求值但能快速验证的函数，在共识协议和区块链中有许多应用。\n\
  -   VRF 是基于公钥的函数，可生成可验证的正确输出。\n\n"
- "# 3. 分布式共识\n\n共识是分布式计算中的一个基本问题。本章将涵盖共识问题的基础知识，并讨论一些历史，包括拜占庭将军问题、共识的构建模块，以及我们如何在分布式系统中解决这个问题。\n\
  \n由于容错是分布式系统的一个基本要求，几种原语引入了容错机制。容错广播算法允许开发容错应用程序。共识使进程即使在发生故障时也能达成共同决策。这两个主题在学术界和工业界都得到了充分研究。\n\
  \n在深入讨论共识和协定问题之前，让我们先回顾一些构建模块，这些模块延续自第 1 章中与共识和协定问题密切相关的链接抽象。\n\n\n\n## 广播原语\n\n\
  在前面的第 1 章中，我们学习了在点对点或一对一场景下，进程之间传递消息的链接。这种一对一通信（也称为单播）非常常见，并应用于客户端-服务器架构中。例如，Web\
  \ 服务器向后端数据库发起请求，就可以看作这类双向连接的一个实例。这里有一个发送者和一个特定的接收者，分别对应 Web 服务器和后端数据库。\n\n然而，在许多涉及多个节点的场景中，客户端-服务器类型的方案并不足够。此外，在很多情况下，一对一通信是不够的，我们需要使用某种能够同时向多个节点或一组节点发送消息的机制。在这种情况下，我们会使用广播协议。\n\
  \n广播协议允许一个进程向分布式系统中的所有进程（包括自身）同时发送一条消息。\n\n在本节中，我们将探讨广播抽象。其中可能涉及多个发送者和接收者。广播抽象确保各进程就它们所传递的消息达成一致。\n\
  \n广播抽象可以通过图 3-1 的可视化方式进行解释。\n\n![](img/515270_1_En_3_Fig1_HTML.jpg)\n\n一张广播抽象示意图，包含\
  \ P、Q、R 三条水平线。线上标记了广播和传递事件。\n\n**图 3-1** – 一个节点广播消息`m`，所有三个节点都传递了该消息\n\n注意，发送与接收和广播与传递之间存在区别。发送和接收用于点对点链接的上下文中，而广播和传递则用于广播抽象中，此时消息被广播到多个/所有节点。\n\
  \n第 1 章讨论的点对点链接与发送和接收原语相关联，其中节点发送消息，接收节点接收它们。\n\n具有广播和传递原语的广播抽象描述了一种场景：节点向网络中的多个/所有节点发送消息，节点接收它们，但在这里，广播算法可以在接收后存储并缓冲消息，然后稍后再将其传递给进程。这取决于广播算法（也称为中间件）。例如，在全序广播中，运行在每个进程上的广播算法可能会收到消息，但会将其缓冲，直到满足条件后再将消息传递给应用程序。\n\
  \n图 3-2 中的示意图直观地展示了这一概念。\n\n![](img/515270_1_En_3_Fig2_HTML.jpg)\n\n一张示意图，包含进程 A\
  \ 和 B 两列。应用程序向算法广播（图中 a 部分），广播算法向应用程序传递（图中 b 部分）。\n\n**图 3-2** – 发送与接收以及广播与传递\n\n\
  通信发生在一组节点内，节点数量可能是静态的，也可能是动态的。一个进程发送消息，组内所有节点就消息达成一致并传递它。如果单个处理器或部分处理器发生故障，其余节点仍能继续工作。广播消息的目标是所有进程。\n\
  \n广播抽象使得开发容错应用程序成为可能。有以下几种类型，如下所述。\n\n### 尽力而为广播\n\n在这种抽象中，仅当发送进程没有失败时，可靠性才得到保证。这是最弱形式的可靠广播。尽力而为广播具有三个属性。\n\
  \n#### 有效性\n\n如果消息`m`由正确的进程`p`广播，那么消息`m`最终会被每个正确的进程传递。这是一个活性（liveness）属性。\n\n####\
  \ 无重复\n\n每条消息仅被传递一次。\n\n#### 无凭空创建\n\n如果某个进程传递了一条发送者为进程`p`的消息`m`，那么`m`之前必须是由发送者进程`p`广播的。换句话说，消息不会凭空产生。图\
  \ 3-3 描绘了尽力而为广播的一次执行过程。\n\n![](img/515270_1_En_3_Fig3_HTML.jpg)\n\n一张尽力而为广播示意图，包含\
  \ P、Q、R 三条水平线。线上标记了广播、传递失败和传递事件。\n\n**图 3-3** – 尽力而为广播 – 示例场景\n\n在图 3-3 中，注意进程`p`广播了消息但随后崩溃了，根据系统属性，在这种情况下不保证消息的传递。请注意，进程`q`没有传递该消息，因为我们的进程`p`不再正确。然而，进程`R`传递了它。如图\
  \ 3-3 所示，如果发送者失败，此抽象不保证消息传递。在某些进程可能传递消息而其他进程可能不传递的情况下，会导致不一致。可以想象，这种抽象在某些要求更严格的场景中可能不太有用。我们需要比这更健壮的协议。为了解决这些限制，我们使用可靠广播抽象。\n\
  \n### 可靠广播\n\n可靠广播抽象引入了一个额外的活性（liveness）属性，称为一致性（agreement）。无重复和无凭空创建属性与尽力而为广播抽象保持一致。有效性属性略有弱化。正式地，有效性和一致性属性可以描述如下。\n\
  \n#### 有效性\n\n如果消息`m`由正确的进程`p`广播，那么`p`自身最终会传递`m`。\n\n### 一致性\n\n如果消息`m`被一个正确的进程传递，那么每个正确的进程都会传递`m`。\n\
  \n#### 备注\n\n如果发送者进程在广播时崩溃，并且未能将消息发送给所有进程，一致性属性确保没有进程会传递该消息。可能某些进程已经接收到了消息，但可靠广播确保除非就传递达成一致，否则没有进程会传递它。换句话说，如果发送者进程崩溃，可靠广播确保要么所有正确的节点最终都能传递该消息，要么没有节点传递该消息。\n\
  \n如果发送者进程失败，此属性确保所有正确的节点要么都收到消息，要么都没有收到消息。这一属性是通过让正确的进程重新传输任何丢失的消息来实现的，这最终会导致消息被传递。\n\
  \n这个方案看起来足够合理，但可能存在这样的情况：广播进程可能已经能够向自身传递消息，但在能够发送给其他进程之前就崩溃了。这意味着所有正确的进程将一致同意不传递该消息，因为它们没有收到它，但原始广播者已经传递了它。这种情况可能导致安全问题。\n\
  \n为了解决这个限制，我们使用提供更强保证的**统一可靠广播**。\n\n### 统一可靠广播\n\n在统一可靠广播中，虽然所有其他属性（如有效性、无重复和无凭空创建）与尽力而为广播相同，但我们之前在可靠广播抽象中看到的一致性属性有了更强的概念。引入它是为了确保即使在发送者进程可能失败的情况下也能实现一致性。这个属性被称为**统一一致性属性**。\n\
  \n\n\n#### Uniform Agreement\n\n如果消息`m`被进程`p`投递，则每个正确的进程最终都会投递`m`。`p`可以是正确进程，也可以是故障进程。\n\
  \n在上述所有讨论的抽象中，缺少了一个在许多分布式服务中至关重要的元素。例如，设想一个在线聊天应用场景：用户 1 发送消息“England has won the\
  \ cricket match”，用户 2 回复“congratulations”，用户 3 说“But I wanted Ireland to win”。在聊天应用中，消息预期出现的顺序是：\n\
  \n- **用户 1**: England has won the cricket match  \n- **用户 2**: congratulations \
  \ \n- **用户 3**: But I wanted Ireland to win  \n\n然而，如果没有对消息投递顺序施加任何约束，即使用户 1 的消息是第一个发送的，在应用（对终端用户）中消息也可能显示为：\n\
  \n- **用户 2**: congratulations  \n- **用户 3**: But I wanted Ireland to win  \n- **用户\
  \ 1**: England has won the cricket match  \n\n这显然不是预期的顺序；缺少赢得比赛这一背景的“congratulations”消息会令人困惑。这正是通过在广播抽象上施加顺序保证所解决的问题。\n\
  \n> 注意：我们在第 1 章讨论了因果性和“happens-before”关系；如果需要回顾，请参考该章节。\n\n现在我们将讨论四种具有不同严格程度顺序保证的抽象：`FIFO`可靠广播、因果可靠广播、全序可靠广播以及`FIFO`全序广播。\n\
  \n#### FIFO 可靠广播\n\n该抽象在可靠广播之上施加了先进先出的投递顺序。这意味着消息按照发送进程发送它们的顺序被投递。\n\n在此抽象中，所有属性与可靠广播保持一致；但引入了一个新的`FIFO`投递属性。\n\
  \n##### FIFO 投递\n\n如果某个进程先后广播了两条消息`m1`和`m2`，那么任何正确的进程不会在`m1`之前投递`m2`。换句话说，如果同一进程在`m2`之前广播了`m1`，则除非该正确进程已先投递了`m1`，否则不会投递`m2`。但此保证仅适用于`m1`和`m2`由同一进程广播的情况；如果由两个不同进程广播消息，则无法保证它们的投递顺序。\n\
  \n在实践中，`TCP`是`FIFO`投递的一个例子。如果你的用例需要`FIFO`投递，可以直接使用`TCP`。\n\n### 因果可靠广播\n\n该抽象在可靠广播之上施加了因果投递顺序。这意味着如果一条消息的广播发生在另一条消息广播之前，那么每个进程都会按相同顺序投递这两条消息。在两个消息可能被并发广播的场景中，进程可以按任意顺序投递它们。\n\
  \n### 全序可靠广播或原子可靠广播\n\n该抽象通常简称为**全序广播**或**原子广播**。全序广播具有以下四个属性。\n\n#### 有效性\n\n如果正确进程`p`广播了消息`m`，那么某个正确进程最终会投递`m`。\n\
  \n### 一致性\n\n如果消息`m`被一个正确进程`p`投递，那么所有正确进程最终都会投递`m`。\n\n#### 完整性\n\n对于任何消息`m`，每个进程最多投递`m`一次，且仅当`m`之前已被广播。在文献中，此属性有时被分为两个独立属性：**无重复**（任何消息不会被投递多次）和**无创建**（已投递的消息必须由发送进程广播）。换句话说，没有消息会凭空产生。\n\
  \n#### 全序\n\n在此属性下，如果在一个进程中消息`m1`在`m2`之前被投递，那么在所有进程中`m1`都在`m2`之前被投递。\n\n\n\n###\
  \ FIFO 全序广播\n\n这一抽象结合了 FIFO 广播和全序广播两种特性。\n\n全序可以通过单一领导者（即序列器方法）或使用 Lamport 时钟来实现，但这些方法都**不具有容错性**。如果领导者宕机，序列化将无法进行；而在\
  \ Lamport 时钟方案中，如果任一节点发生故障，全序也无法得到保证。如何在全序广播中引入容错性，以自动选择新的领导者，正是通过共识协议来研究和解决的问题。从根本上看，共识协议要解决的问题就是在发生故障时选举新的领导者。这是共识协议背后的核心动机。我们将在本章后续内容中进一步探讨全序广播的细节，以及它与状态机复制、容错性和共识协议之间的关系。\n\
  \n到目前为止，我们所讨论的抽象机制只能适用于进程数量较少的场景。想象一下，一个分布式系统跨越多个大洲，有数千个节点参与其中。那么，目前所介绍的这些抽象机制，是否足以高效应对由数千个异构且分散的节点带来的通信复杂性？答案是否定的。为了满足此类需求，我们需要开发概率性协议。再设想另一种场景：由一个单一节点负责向\
  \ 1000 个节点发送消息。即便我们能借助某些硬件支持或其他方法将消息发送给这 1000 个节点，但当这个单一发送节点需要接收来自这 1000 个节点的确认消息时，问题就会变得极其复杂。这个问题被称为**确认风暴**。关键就在于我们如何避免此类问题。\n\
  \n再设想另一种情况：一个节点通过可靠链路向所有其他节点逐一发送了消息，但在传输过程中，发往某些节点的消息丢失了。此时，发送进程发生了故障，从而导致无法进行重传。结果，那些未能接收到消息的节点将永远无法收到这些消息，因为发送进程已经崩溃。在这种情况下，我们该如何提高可靠性呢？我们可以设计一种方案：一旦某个节点首次接收到一条消息，它便通过可靠信道再次将该消息广播给其他节点。这样一来，即使某些节点发生崩溃，所有正常节点也都能接收到全部消息。这被称为**急切可靠广播**。急切可靠广播是可靠的，但对于\
  \ *n* 个节点，它会产生 *O*(*n*) 个步骤和 *O*(*n*)² 条消息。\n\n图 3-4 直观展示了急切可靠协议。\n\n![](img/515270_1_En_3_Fig4_HTML.jpg)\n\
  \n一个关于急切可靠广播的示意图，包含 P、Q、R 三条线。P 向 Q 和 R 广播。R 向 Q 和 P 重新广播。Q 向 P 重新广播。\n\n图 3-4\n\
  \n急切可靠广播\n\n此外，还有一些其他算法，我们可以称之为*受自然启发*的算法。例如，思考一下传染病或谣言是如何传播的。一个人感染另外几个人，然后这些人再去感染其他人，感染率会迅速上升。现在，如果广播协议基于这种原理来设计，那么它就能非常高效地在整个网络中快速传播信息（消息）。由于这些协议本质上是随机化协议，它们并不能保证所有节点都一定能收到某条消息，但通常所有节点最终都能收到所有消息的概率非常高。概率性协议或\
  \ gossip 协议常用于点对点网络。基于这种传播方式，已经设计出了许多协议。\n\n图 3-5 展示了 gossip 协议的工作原理。其核心思想是：当一个节点首次接收到一条消息时，它会将该消息转发给随机选择的几个其他节点。这种技术对于向众多节点广播消息非常有用，消息最终能以很高的概率到达所有节点。\n\
  \n![](img/515270_1_En_3_Fig5_HTML.png)\n\n一组 3 个树状图，分别标记为跳 1、跳 2 和跳 3，用于说明 gossip\
  \ 协议。每个图表都有从 P1 到 P7 的节点，分为 4 层。\n\n图 3-5\n\nGossip 协议\n\n概率性广播抽象可以定义为一个具有两个属性的抽象。\n\
  \n#### 概率有效性\n\n如果一个正确进程 p 广播了一条消息 m，那么每个正确进程最终以概率 1 交付该消息。\n\n#### 完整性\n\n任何消息最多被交付一次，并且被交付的消息之前一定是由某个进程广播的——换句话说，不存在重复消息，也不会凭空产生消息。\n\
  \n### 广播与共识之间的关系\n\n尽力而为广播是最弱的广播模型。通过添加额外的属性和要求，我们可以实现更强的广播模型，如图 3-6 所示。\n\n![](img/515270_1_En_3_Fig6_HTML.png)\n\
  \n一个关于广播关系的流程图。流程如下：尽力而为广播与可靠广播；FIFO 广播与因果序广播；全序广播；以及共识。\n\n图 3-6\n\n广播关系——从最弱到最强——以及共识等价性\n\
  \n至此，我们完成了对广播协议的讨论。接下来，我们将转向协商抽象，这是分布式计算中最基本的问题之一。\n\n首先，我将解释什么是协商，然后我们将以此基本概念为基础，引出共识问题。\n\
  \n## 协商\n\n在分布式系统中，进程间的协商是一项基本需求。存在许多场景需要进程达成一致，以便分布式系统能够实现其目标。例如，在广播抽象中，进程之间需要就消息的交付达成协商。\n\
  \n存在多种不同的协商问题，我们将在下文介绍其中最突出的几种，然后更深入地关注共识问题。\n\n我们已经介绍过可靠广播和全序广播。在本节中，我将简要补充一些关于可靠广播和全序广播的要点；然后，我们将探讨拜占庭协商和共识。\n\
  \n### 可靠广播\n\n可靠广播能够确保即使在发送进程发生故障的情况下依然可靠。换句话说，无论发送者是否正确，可靠性都是有保障的。\n\n\n\n### 全序广播\n\
  \n全序广播保证了可靠性和在所有节点上一致的投递顺序。全序广播可以通过单领导者方法实现，即指定一个节点作为领导者。所有消息都通过这个领导者，由它建立消息的共同顺序。消息首先发送给领导者，然后领导者使用\
  \ FIFO 广播机制进行广播。然而，在这种情况下，问题在于如果领导者崩溃，则无法投递任何消息。那么问题就变成了如何在保证算法安全性的前提下更换失效的领导者。\n\
  \n如果负责建立共同投递顺序的当选领导者失效，节点必须选举一个新的领导者。现在的问题变成了选出一个新的诚实领导者，并就新领导者的选择达成一致。同样，节点现在必须达成协议，而问题也变成了就新领导者达成一致，而非就投递顺序达成一致。无论哪种情况，节点都必须运行某种协议。\n\
  \n此外，我们之前发现，使用软件事件计数器和进程标识符的 Lamport 时钟可以实现全序。结合 FIFO 链接和全序中的时间戳，Lamport 时钟实现全序在直觉上是合理的，但在实际应用中可能具有挑战性。例如，如果一个节点宕机，那么整个协议就会停止。\n\
  \n单领导者（排序器/定序器方法）和 Lamport 时钟都不具备容错性。我们很快会看到对此有什么解决办法。全序广播和共识是不同的两个问题，但它们彼此相关。如果你解决了共识问题，那么你就能解决全序问题，反之亦然。\n\
  \n全序广播也称为原子广播，因为它确保消息要么被投递给所有进程，要么完全不投递。全序广播的这种原子性（全有或全无）使其成为原子广播协议，因此得名原子广播。\n\n\
  ### 拜占庭协议问题\n\n拜占庭协议问题可以通过三种不同的方式定义：拜占庭将军问题、交互一致性问题和共识问题。\n\n#### 基础拜占庭将军问题（BGP）\n\
  \n有一个被称为源进程的指定进程，它拥有一个初始值。该问题的目标是与其他进程就源进程的初始值达成一致。需要满足三个条件：\n\n*   **一致性**：所有诚实进程就同一值达成一致。\n\
  *   **有效性**：如果源进程是诚实的，所有诚实进程决定（达成一致）的值与源进程的初始值相同。\n*   **终止性**：每个诚实进程最终都必须决定一个值。\n\
  \n这个问题本质上是一个广播原语，其中指定进程从一个初始值（输入）开始，而其他进程没有输入（初始值）。当算法终止时，所有进程就（输出）同一个值达成一致。解决拜占庭将军问题的关键在于，发送方进程可靠地将其输入发送给所有进程，以便所有进程输出（决定）相同的值。\n\
  \n#### 交互一致性问题\n\n在交互一致性问题中，每个进程都有一个初始值，所有正确进程必须就一组值（向量）达成一致，其中每个进程都有一个对应的值。要求如下：\n\
  \n*   **一致性**：所有诚实进程就相同的值数组（向量）达成一致。\n*   **有效性**：如果一个正确进程决定了一个向量 V，并且进程 P1 是正确的，且其输入值为向量中的\
  \ V1，那么 V1 对应于向量 V 中的 P1。\n*   **终止性**：每个正确进程最终都会做出决定。\n\n#### 共识问题\n\n在共识问题中，每个进程都有一个初始值，所有正确进程就单个值达成一致：\n\
  \n*   **一致性**：所有进程就同一个值达成一致；没有两个进程决定不同的值。\n*   **有效性**：决定的值必须是某个进程提出的值。\n*   **完整性**：一个进程最多只能决定一次。\n\
  *   **终止性**：每个诚实进程最终都会决定一个值。\n\n有效性和一致性是安全性属性，而终止性是活性属性。\n\n图 3-7 直观地展示了共识的样子。图中没有太多内容，但它直观地描绘出来，有助于构建共识在头脑中的模型。\n\
  \n![](img/515270_1_En_3_Fig7_HTML.jpg)\n\n一个共识图表列出了两列表情符号。之前一列中的表情符号是抿嘴的，之后一列中的是微笑的。\n\
  \n图 3-7\n\n共识——视觉呈现的样子\n\n根据系统模型和故障模型的不同，共识问题有多种变体。\n\n上述共识问题称为统一共识，其中一致性属性是严格的，不允许崩溃的进程决定不同的值。\n\
  \n共识的另一个变体是非统一共识。在非统一共识中，一致性属性被弱化，允许崩溃的进程决定一个不同的值。\n\n我们可以将统一共识的一致性属性表述为：\n\n* \
  \  **一致性**：没有两个诚实进程决定不同的值。\n\n现在，如果我们除了弱化一致性属性之外，还加强有效性属性，我们就实现了拜占庭容错共识。在这种情况下，有效性属性变为：\n\
  \n*   **有效性**：一个诚实进程决定的值必须是某个诚实进程提出的值。\n\n第一个变体，即有效性属性较弱且一致性也较弱的情况，可以归类为崩溃容错共识。\n\
  \n满足所有这些安全性和活性属性的算法被称为正确算法。在无故障的同步系统中解决共识问题并不困难；然而，在易出故障的系统中，这个问题就变得困难了。故障和异步性使得解决共识问题成为一个复杂的问题。\n\
  \n二元共识是一种简单的共识类型，其输入受到限制，因此决策值被限制为单个比特，要么是 0，要么是 1。多值共识是一种共识类型，其目标是就多个值达成一致，即随时间变化的一系列值。\n\
  \n虽然二元共识起初看起来可能不是一个非常有用的结构，但二元共识问题的解决方案会引出多值共识的解决方案；因此，它是一个重要的研究领域。\n\n\n\n## 共识属性定义\n\
  \n共识属性的定义可能因应用而异。例如，在区块链共识协议中，有效性（`validity`）属性的定义通常与既定定义不同，且可能采用较弱的变体。例如，在 `Tendermint`\
  \ 共识中，有效性属性简单地表述为：“一个被决定的值是有效的，即它满足预定义的谓词 `valid()`”。这可以是特定于应用的条件。例如，在区块链背景下，可能要求添加到\
  \ `Bitcoin` 区块链的新块必须具有一个通过节点验证检查的有效块头。在其他变体中，`valid()` 谓词要求与“如果所有诚实进程都提议同一个值，那么所有进程都决定该值”这一条件可以结合。这是有效性谓词与传统有效性条件的结合。存在多种变体和不同的定义，有些严格，有些则不严格，这取决于具体应用。我们将在本书中涵盖区块链共识及相关共识协议，并在所讨论的共识算法和故障模型的背景下定义和重新定义这些要求。\n\
  \n共识协议如果是**崩溃容错（CFT）**的，则它能容忍一定阈值内的良性故障。共识协议如果是**拜占庭容错（BFT）**的，则它能容忍任意故障。为了实现崩溃容错，底层分布式网络必须满足条件\
  \ `N >= 2F + 1`，其中 `N` 是网络中的节点数，`F` 是故障节点数。只有网络满足此条件，它才能继续正常工作并达成共识。如果需要容忍拜占庭故障，则条件变为\
  \ `N >= 3F + 1`。我们将在本章后面讨论不可能结果时更正式地介绍这一点。但请记住这些条件是最紧的下界。\n\n共识问题也适用于分布式计算中的其他问题。诸如全序广播、领导者选举问题和终止性可靠广播等问题都需要就一个公共值达成一致。这些问题可以被视为共识的变体。\n\
  \n## 系统模型\n\n为了研究共识和协议问题并开发解决方案，我们对分布式系统的行为做出了一些基本假设。我们在第 1 章中学习了关于节点和网络行为的许多抽象概念。在此，我们总结这些假设，并继续更详细地讨论共识问题。此处描述系统模型的原因有两个：第一，总结我们在该章中学到的关于节点和网络行为的知识；第二，将这些知识置于研究共识和协议问题的背景下。如需详细研究，请参阅第\
  \ 1 章。\n\n### 分布式系统\n\n分布式系统是一组通过消息传递进行通信的进程。共识算法是基于对分布式系统的时序和同步行为所做的假设来设计的。这些假设被归入时序模型或同步假设中，我们将在下文描述。\n\
  \n### 时序模型/同步\n\n同步假设捕捉了关于分布式系统的时序假设。处理器和通信的相对速度也被考虑在内。存在几种同步模型，简要描述如下：\n\n- **同步系统**：其中处理器和通信延迟存在一个已知的上界，且该上界始终成立。\n\
  - **异步系统**：其中对时序不做出假设，处理器或通信延迟没有上界。这是一个有用的概念，因为基于此假设设计的协议也会自动在同步模型及其他更有利的模型中具有弹性。换句话说，在异步模型中证明正确的程序，在同步模型中自动正确。\n\
  - **部分同步**：可以通过多种方式定义：\n    - 存在一个始终成立的未知上界。\n    - 存在一个已知上界，该上界在某个 GST（全局稳定时间）后最终成立。\n\
  \    - 存在有保证的同步周期，该周期足够长，使得可以做出决定且算法可以终止。\n    - 存在一个未知上界，该上界在某个 GST 后最终成立。\n  \
  \  - 实用拜占庭容错（PBFT）引入的弱同步假设网络延迟不会无限增长超过超时时间。\n    - 系统最初可以是异步的，但在 GST 之后变为同步。\n\n\
  通常，在实践中，关于分布式系统的时序行为会做出部分同步的假设。这一选择在区块链协议中尤其常见，大多数共识协议都是为最终同步/部分同步模型设计的，例如用于区块链的`PBFT`。当然，也有一些是为异步模型设计的，例如`HoneyBadger`。我们将在第\
  \ 5 章及本书后续章节中涵盖区块链共识。目前，我将从传统角度聚焦于一般的分布式共识问题。\n\n另外，请注意，具有拜占庭故障的异步消息传递模型表达了基于当今互联网的典型分布式系统的条件。这在诸如`Bitcoin`或`Ethereum`等公有区块链平台中尤其如此。\n\
  \n### 进程故障\n\n故障模型允许我们对可能发生哪些故障以及如何处理它们做出假设。故障模型描述了故障可能发生或不发生的条件。存在多种类别，例如崩溃故障，其中进程可能崩溃停止或崩溃失败；或者遗漏故障，其中处理器可能遗漏发送或接收消息。\n\
  \n另一种类型的遗漏故障称为动态遗漏故障。在该模型中，系统每轮最多可能丢失一定数量的消息。但是，发生消息丢失的通道可能逐轮变化。\n\n时序故障是指进程不符合同步假设的故障。进程可能表现出拜占庭行为，即进程可以任意或恶意地行为。在拜占庭模型中，被破坏的处理器可以复制、丢弃消息，并积极尝试破坏整个系统。我们还在此定义了一个对手模型，其中我们对可能对分布式系统产生不利影响并破坏处理器的对手做出一些假设。\n\
  \n在经认证的拜占庭故障中，可以通过标识来识别消息的源并检测伪造消息，通常通过数字签名实现。在此假设下发生的故障称为经认证的拜占庭故障。\n\n消息可以是已认证或未认证的。已认证消息通常使用数字签名来允许防伪检测和消息篡改。使用已认证消息时，协议问题变得相对容易解决，因为接收方可以检测到消息伪造，并拒绝未签名或签名不正确的消息，或来自未认证进程的消息。另一方面，使用未认证消息的分布式系统难以处理，因为无法验证消息的真实性。未认证消息也称为口头消息或未签名消息。尽管困难，但这确实是关于解决共识或协议问题的一个常见假设。然而，数字签名在区块链系统中无处不在，区块链共识所基于的模型几乎总是已认证的拜占庭模型。\n\
  \n\n\n## 信道可靠性\n\n人们通常假设信道是可靠的。可靠信道保证，如果一个正确的进程 `p` 向另一个正确的进程 `q` 发送了消息 `m`，那么 `q`\
  \ 最终会收到 `m`。在实践中，通常是 `TCP/IP` 协议提供了这种可靠性。\n\n另一种假设是存在损耗信道，它描述了消息可能丢失的信道概念。这种情况可能由多种原因导致，例如网络状况不佳、延迟、拒绝服务攻击、一般的黑客攻击、网络速度慢、网络配置错误、噪声干扰、缓冲区溢出、网络拥塞以及物理断连。可能还有其他许多原因，但我刚才描述了最常见的一些。\n\
  \n公平损耗信道有两种变体。其中一种变体对丢失消息的数量存在一个上限 `k`；而在另一种变体中（即通常所说的公平损耗信道），则不存在这样的上限。第一种变体更容易处理，算法可以重新传输消息\
  \ `k+1` 次，确保至少有一份副本被接收。在后一种变体（即公平损耗信道）中，如果发送方持续重发一条消息，只要发送方和接收方都是正确的，那么该消息最终会被送达。我们在第\
  \ 1 章中更详细地讨论过这一点。\n\n## 历史\n\n共识问题在分布式计算领域已经被研究了几十年。在有故障的情况下达成共识，最初由 Lamport 等人在其论文《SIFT：用于飞行器控制的容错计算机的设计与分析》中提出。\n\
  \n后来，在同步环境下的拜占庭容错协议，最初由 Lamport 等人在其开创性论文《在存在故障的情况下达成一致》中提出。\n\n即使单个进程崩溃失败也无法达成一致的结论，由\
  \ Fischer、Lynch 和 Paterson 证明。这一发现被广为人知地称为 `FLP` 不可能结果。\n\n`Ben-Or` 提出了使用随机化来规避\
  \ `FLP` 的异步拜占庭容错方法。此外，`DLS 88` 针对 `BFT` 提出了部分同步的概念。\n\n### 两将军问题\n\n两将军悖论（或称两将军问题）由\
  \ Gray 等人在 1978 年提出。在这个思想实验中，两位将军共享一个占领山头的共同目标。条件是，如果两位将军同时行动，在同一时间发起进攻，那么胜利是有保证的。如果任何一位将军单独进攻，他们将会战败。还假设两位将军驻扎在相隔一段距离的地方，他们只能通过信使（跑步者）通信。然而，这些信使并不可靠，可能会迷路或被俘。如果一位将军向另一位将军发送消息要求进攻，例如“凌晨\
  \ 0400 时进攻”，那么这条消息有可能无法送达另一位将军。假设消息没有送达第二位将军。在这种情况下，无法区分是第一位将军没有发送消息，还是信使在前往第二位将军的途中被俘。发送消息的将军不能假定他的消息已经送达，因为除非他收到第二位将军的明确确认，否则他无法确定。现在的问题是，我们能提出什么协议来就进攻计划达成一致。这种情况很棘手，因为两位将军之间没有共同知识，而知晓的唯一途径是通过不可靠的信使。\n\
  \n两位将军都有两个选择。他们可以不顾是否收到另一位将军的任何确认而继续行动，或者他们不这样做，而是等待直到收到另一位将军的回应（确认）。在第一种情况下，风险在于将军在未收到另一位将军回应的情况下独自前进，最终可能单独进攻并被击败。在后一种情况下，将军在收到回应之前不会行动。在这种情况下，等待确认的第一位将军是安全的，因为他只会在收到回应时才进攻。所以现在责任落到了第二位将军身上，他需要决定是独自进攻，还是等待第一位将军已收到其确认的确认。一个想到的解决方案是，如果将军们派遣大量信使，那么至少有一个信使可能抵达，但同样存在所有信使都被俘、没有消息送达的可能。例如，如果将军\
  \ 1 向将军 2 发送了大量消息，但所有信使都失踪了，那么将军 2 对进攻一无所知，如果将军 1 继续前进并进攻，那么战斗就输了。\n\n两将军问题如图 3-8\
  \ 所示。\n\n![](img/515270_1_En_3_Fig8_HTML.jpg)\n\n两将军问题的示意图包含两位将军，他们发送消息“凌晨 4 点进攻，好；和\
  \ 好”。\n\n图 3-8\n\n两将军问题\n\n在图 3-8 中，两位将军必须就进攻时间达成一致；否则，无法获胜。\n\n问题在于，没有哪位将军能完全确定另一位将军的承诺。如果将军\
  \ 1 无论是否收到将军 2 的确认都总是进攻，那么如果所有信使都失踪，将军 1 就冒着单独进攻的风险。因为在这种情况下，将军 2 对进攻一无所知。如果将军 1\
  \ 只有在收到将军 2 的肯定确认时才进攻，那么将军 1 是安全的。将军 2 处于与将军 1 相同的境地，因为现在他正在等待将军 1 的确认。将军 2 可能会认为自己安全，因为他知道将军\
  \ 1 只有在将军 2 的回应被将军 1 收到时才会进攻。将军 2 现在正在等待将军 1 的确认。他们都在思考对方是否收到了自己的消息，因此就产生了悖论！\n\n\
  从分布式系统的角度来看，这个实验描绘了一种情况，即两个进程没有共同知识，它们能了解彼此状态的唯一途径是通过消息。\n\n\n\n### 拜占庭将军问题\n\n\
  拜占庭将军问题由兰波特于 1982 年提出。在这一思想实验中，设想了这样一个场景：三个或更多军团驻扎在某城市周围，其共同目标是攻占该城。每个军团由一位将军统领，他们通过信使进行通信。只有当所有军团同时进攻时，城市才能被攻陷。\n\
  \n这里的要求是达成一致进攻的协议，以便所有军队能同时发动攻击，从而攻占城市。\n\n该场景可能面临的问题包括：\n\n- 消息可能丢失，即信使可能被俘或失踪。\n\
  - 任何将军都可能是叛徒，他们可以向其他将军发送误导性消息、扣留消息、不向所有将军发送消息、在转发消息前篡改内容，或发送相互矛盾的消息，其目的都是为了破坏将军之间的协商进程。\n\
  - 忠诚的将军也不知道谁是叛徒，但叛徒之间可以相互勾结。\n\n这里的挑战在于：在这种情况下，能否达成协议？如果可以，采用何种协议能解决此问题？图 3-9 展示了该问题。\n\
  \n![](img/515270_1_En_3_Fig9_HTML.png)\n\n拜占庭将军问题的示意图中，中心是一座城堡，周围是五支将军部队，分别标记为撤退、进攻和未知。\n\
  \n**图 3-9** 拜占庭将军问题——展示每个军团接收到的误导性、正确或无任何消息的情况\n\n事实证明，这个问题无法解决。已有证明表明，只有当叛徒将军少于三分之一时，该问题才能得到解决。例如，如果有`3t\
  \ + 1`位将军，那么最多只能有`t`位是恶意的。这是拜占庭容错的一个经过验证的下界。我们将在“不可能性结果”一节中更正式地探讨这一点，届时将讨论 FLP、CFT\
  \ 下界和 BFT 下界。\n\n在分布式系统中，我们可以进行类比：将军代表进程（节点），叛徒代表拜占庭进程，忠诚将军代表正确进程，信使代表通信链路，消息丢失代表信使被俘，信使到达将军处没有时间限制则代表异步性。我想你现在应该明白了吧！\n\
  \n## 复制\n\n在本节中，我们将讨论复制。复制用于在多个节点上维护数据的精确副本。该技术具有若干优势。一个关键优势是容错性。最简单的复制示例之一是存储系统中的\
  \ RAID。例如，在 RAID-1 中，有两个磁盘，它们互为精确副本（镜像）。如果其中一个不可用，副本仍然可用，从而实现容错和高可用性。在分布式系统中，复制因多种原因而被使用，与\
  \ RAID 不同，它是在多个节点之间进行的，而不是仅在服务器内的两个磁盘之间。\n\n此外，如果数据保持不变，复制就很容易。你只需创建数据的一次性副本，并将其存储在另一个磁盘或节点上即可。具有挑战性的部分在于，当数据不断变化时，如何保持复制的一致性。\n\
  \n复制有以下几个优点：\n\n- **高可用性**，源于容错能力。例如，如果一个副本宕机，另一个副本可以继续为客户提供服务。\n- **负载分布**，由于每个副本节点都是独立节点，客户端可以向不同节点发送请求（或通过负载均衡器将请求路由到负载较轻的副本——即负载均衡）。负载可以在不同副本之间进行分配，以实现更高的性能。\n\
  - **数据一致性**，意味着所有节点上都存有相同的数据副本，这有助于维护整个系统的完整性。\n- **更优的性能**，通过负载均衡实现。当某些节点接近或达到满载时，负载较轻的节点可以接管请求。实现这一目标的技术有很多，这超出了本书的范围；不过，通常使用负载均衡器，它通常以轮询方式将客户端的请求路由到各个副本。这样，负载就被分散到多个副本上，而不是让单个节点承受所有访问，从而因\
  \ CPU 负载过高导致响应变慢。\n- **数据局部性**，尤其是在地理分布式的网络中，靠近客户端的节点可以提供服务请求，而不是仅有一个位于遥远数据中心的节点，所有地理上或远或近的客户端都只向这一台服务器发送请求。物理上更靠近服务器的客户端，其响应速度会比那些位于遥远城市或大陆的客户端更快。例如，在文件下载服务中，位于爱尔兰的镜像服务器能够比位于澳大利亚的服务器更快地处理下载请求。仅网络延迟一项，就足以使这种设置面临性能下降的风险。\n\
  \n此外，也存在一些缺点：\n\n- **成本高昂**，由于需要多个副本节点，搭建成本可能较高。\n- **在副本间维护数据一致性**十分困难。\n\n复制可以通过两种方法实现。一种是**状态转移**，即将状态从一个节点发送到另一个副本节点。另一种方法是**状态机复制**。每个副本都是一个状态机，它与其他副本确定性地以相同顺序执行命令，从而在所有副本间产生一致的状态。通常，在这种情况下，主服务器接收命令，然后将这些命令广播给其他副本，由它们执行这些命令。\n\
  \n实现复制有两种常见技术。我们定义如下。\n\n### 主动复制\n\n在这种方案中，客户端命令通过一个排序协议进行排序，并转发给副本，由这些副本确定性地执行命令。其核心理念是：如果所有命令在所有副本上以相同顺序执行，那么每个副本将产生相同的状态更新。这样，所有副本就能彼此保持一致。这里的关键挑战在于，需要设计一套命令排序方案，并确保所有节点以相同顺序执行相同的命令。此外，每个副本都从相同的初始状态开始，并且是原始状态机的一个副本。主动复制也称为**状态机复制**。\n\
  \n### 被动复制\n\n在被动复制方法中，有一个副本被指定为主副本。该主副本负责执行命令，并将更新结果发送（广播）给包括其自身在内的所有副本。然后，所有副本按照接收到的顺序应用状态更新。与主动复制不同，这里的处理过程不需要是确定性的，任何异常通常由指定的主副本解决，并产生确定性的状态更新。这种方法也称为**主备份复制**。简而言之，系统中只有主副本维护着一个状态机副本，而其余副本仅维护状态。\n\
  \n\n\n#### 优点与缺点\n\n两种方法各有利弊。如果操作密集，`主动复制`会造成资源浪费。对于`被动复制`而言，大规模更新会消耗大量网络带宽。此外，在`被动复制`中，由于只有一个主副本，如果它发生故障，系统的性能和可用性都会受到影响。\n\
  \n在`被动复制方法中`，客户端的写入请求由`主节点`预处理，并转换为状态更新命令，这些命令会以相同的顺序应用于所有副本。每个副本都是`主动复制`中状态机的副本，而在`被动复制`中，只有`主节点`是状态机的单一副本。\n\
  \n请注意，尽管`主动复制`和`被动复制`在本质上有区别，但它们都是实现状态机容错的通用方法。\n\n现在，我们来看看`主备复制`是如何工作的。这里我假设采用`故障停止`模型。\n\
  \n#### 主备复制\n\n`主备复制`是最常见的复制方案类型。其中一个副本被指定为`主节点`，其余节点为`备份节点`。一个拥有最低标识符的正确进程会被指定为`主副本`。客户端向指定的`主节点`发送请求，`主节点`再将请求转发给所有`备份节点`。`主节点`只有在收到`备份节点`的响应后，才会回复客户端。当客户端发起写入请求时，`主节点`将请求发送给所有副本，并在收到`备份节点`的响应后，自身执行更新（即交付给自己）。\n\
  \n该算法的工作流程如下：\n\n1.  客户端向`主节点`发送写入请求。\n2.  `主节点`将请求广播给`备份`副本。\n3.  `备份`副本向`主`副本发送确认（响应）。\n\
  4.  `主节点`等待，直到接收到所有`备份`副本的响应。\n5.  一旦收到所有响应，它将请求交付给自己。这被称为`提交点`。\n6.  此后，`主节点`将响应返回给客户端。\n\
  \n对于读取操作：\n\n1.  客户端向`主节点`发送请求。\n2.  `主节点`进行响应。\n\n图 3-10 展示了这一概念。\n\n![](img/515270_1_En_3_Fig10_HTML.png)\n\
  \n主备复制示意图。客户端写入请求。广播从主节点发送到备份节点 3。响应发送回客户端。\n\n**图 3-10** 主备复制\n\n如何处理故障？如果`主节点`发生故障，其中一个`备份节点`将会接管。\n\
  \n现在，这看起来是一种实现容错的合适协议，但如果`主节点`发生故障呢？`主节点`故障可能导致停机，因为恢复需要时间。此外，从`主节点`读取可能会产生错误结果，因为在客户端在`提交点`之前向`主节点`发起读取请求的场景下，即使所有副本都已交付该更新，`主节点`也不会返回结果。一种解决方案可能是将读取视为更新来处理，但这种技术效率相对较低。同时，`主节点`承担了所有工作，即发送给其他副本、接收响应、提交，然后回复客户端。并且，`主节点`必须等待所有副本的响应才能回复客户端。与`主备副本`解决方案相比，一个更好的解决方案是`链式复制`。其核心思想是，由其中一个备份服务器来响应读取请求，而另一个服务器来处理更新命令。\n\
  \n#### 链式复制\n\n`链式复制`将副本组织成一个链，包含一个头和一个尾。`头`是编号最大的服务器，而`尾`是编号最小的服务器。写入请求或更新命令被发送到`头`，`头`通过可靠的先进先出链路将请求发送到链上的下一个副本，下一个副本再将其转发给下一个，直到更新到达最后一个（`尾`）服务器。然后，`尾`服务器向客户端响应。`头`副本负责对来自客户端的请求进行排序。\n\
  \n对于读取请求（查询），客户端直接将其发送给`尾`，由`尾`进行回复。当`尾`发生故障时，只需重新选择其前驱节点作为新的`尾`即可轻松恢复。如果`头`发生故障，其后继节点将成为新的`头`，并通知客户端。图\
  \ 3-11 展示了`链式复制`的工作原理。\n\n![](img/515270_1_En_3_Fig11_HTML.png)\n\n链式复制示意图。客户端写入请求。在更新和查询场景下，响应和回复分别发送回客户端。\n\
  \n**图 3-11** 链式复制\n\n`链式复制`提供了高可用性、高吞吐量和强一致性。它可以容忍多达 *n* – 1 个节点故障。\n\n\n\n### 状态机复制\n\
  \n状态机方法由莱斯利·兰波特在其 1978 年的开创性论文《分布式系统中的时间、时钟与事件排序》中提出。它是实现分布式系统容错的事实标准。\n\n首先定义什么是状态机。状态机执行一系列命令，并存储系统的状态。通过执行命令，状态转换函数将存储的状态转换为下一状态。命令是确定性的，最终状态和输出仅由机器已执行的输入命令决定。\n\
  \n清单 3-1 中的简单算法描述了一个状态机节点。\n\n```\nstate := initial\nlog := lastcommand\nwhile (true)\
  \ {\non event receivecommand()\n{\nappendtolog(command)\noutput := statetransition(command,\
  \ state)\nsendtoclient(output)\n}\n}\n清单 3-1\n状态机\n```\n\n在此伪代码中，状态机从初始状态开始。当从客户端收到命令时，它会将命令追加到日志中。之后，通过转换函数执行命令，更新状态并产生输出。该输出作为响应发送回客户端。\n\
  \n图 3-12 说明了这一概念。\n\n![](img/515270_1_En_3_Fig12_HTML.png)\n\n状态机副本的流程图。流程依次为：客户端、命令、共识、广播、状态机执行、状态机及回复。\n\
  \n图 3-12\n\n状态机副本\n\n状态机复制的核心思想是：如果系统被建模为状态机，那么只需对操作顺序达成一致，即可实现副本一致性。如果相同的命令以相同的顺序应用于所有节点，就能实现一种使所有副本彼此保持一致性的通用方法。然而，这里的挑战在于如何确定命令的全局共同顺序。\n\
  \n为了对操作顺序达成一致，我们可以使用拜占庭协议或可靠广播协议等一致性协议。本章前面讨论过全序广播抽象。也可以使用`Paxos`或`PBFT`等共识算法来实现这一点。请记住，在全序广播中，每个进程按相同顺序交付相同的消息。这一特性直接解决了我们对操作顺序达成一致的问题——这正是状态机复制背后的核心洞察。全序广播确保来自不同客户端的命令以相同顺序被交付。如果命令按相同顺序交付，它们将以相同顺序执行，且由于状态机是确定性的，所有副本最终将处于相同状态。\n\
  \n每个副本都是一个状态机，它通过执行输入命令确定性地将状态转换到下一状态。每个副本上的状态以一组（`key`，`value`）对的形式维护。命令的输出从当前状态转换到下一状态。确定性很重要，因为它确保每次命令执行都能产生相同的输出。每个副本从相同的初始状态开始。全序广播按全局顺序将相同命令交付给每个副本，这导致每个副本执行相同的命令序列并转换到相同状态。从而在每个副本上实现相同的状态。\n\
  \n该原理也应用于区块链中：通过某种共识机制对交易和区块序列实现全序，每个节点按照与其他副本相同的顺序（以及工作量证明获胜者、领导者提出的顺序）执行并存储这些交易。我们将在第\
  \ 5 章详细探讨。传统协议如实用拜占庭容错（`PBFT`）和`RAFT`都是状态机复制协议。\n\n`SMR`通常用于提高系统性能和容错能力。系统性能提升是因为多个副本托管数据副本，并且由于多副本的存在而有更多可用资源。容错能力提高则是因为数据在每个副本上都有复制，即使某些副本不可用，系统也能继续运行并响应客户端的查询和更新。\n\
  \n现在，我们来正式审视`SMR`的性质。\n\n#### 相同初始状态\n\n副本始终从相同的初始状态启动，例如一个空数据库。\n\n#### 确定性操作\n\
  \n所有正确副本针对相同的输入和状态，确定性地产生相同的输出和状态。\n\n#### 协调性\n\n所有正确副本按相同顺序处理相同的命令。\n\n协调性要求使用全序广播或某些共识算法等一致性协议。\n\
  \n此外还有两个*安全性*和*活跃性*性质，描述如下。\n\n#### 安全性\n\n所有正确副本执行相同的命令。这称为**一致性**属性。实现一致性有两种通用方法：可以使用全序广播或共识协议。全序广播协议在每个状态机复制周期只需运行一次，而共识机制则在每个命令序列周期实例化。\n\
  \n#### 活跃性\n\n所有正确命令最终都会被正确副本执行。这也称为**完成性**属性。\n\n安全性确保一致性，而活跃性确保可用性和进展。\n\n图 3-13\
  \ 展示了`SMR`的通用工作原理。\n\n![](img/515270_1_En_3_Fig13_HTML.png)\n\n`S M R`算法的流程图。流程依次为：命令、广播、追加到日志、执行和回复。命令从一个源广播到多个日志。\n\
  \n图 3-13\n\n状态机复制\n\n在图 3-13 中，我们可以看到该过程的工作方式：\n\n1. 客户端向副本 1 提交命令`x = 5`。\n2. 副本\
  \ 1 将此命令发送给副本 2 和副本 3。\n3. 所有副本将命令追加到各自的日志中。\n4. 所有副本上的每个状态机执行该命令。\n5. 副本 1 将回复/结果返回给客户端。\n\
  \n副本上的复制日志确保命令在每台副本上由状态机按相同顺序执行。共识机制（位于图像左上角）确保对命令顺序达成一致，并据此写入日志。这涉及与其他副本就命令序列达成一致。如果大多数副本处于运行状态，该复制系统将保持正常运行。\n\
  \n共识与状态机复制之间的关联在于：分布式共识建立状态机命令的全局共同顺序，而状态机则根据共识（一致性）算法确定的全局顺序执行这些命令，从而使每个节点（状态机）达到相同状态。\n\
  \n崩溃容错`SMR`至少需要`2f+1`个副本，而`BFT SMR`则需要`3f+1`个副本，其中`f`是故障副本的数量。\n\n状态机复制实现了副本间的一致性。存在多种副本一致性模型，我们将在此简要探讨。\n\
  \n\n\n##### 线性一致性\n\n状态机复制协议可能实现的另一种更强的属性称为线性一致性。线性一致性也被称为原子一致性，它意味着命令的执行效果如同在状态机的单份副本上执行一样，即使存在多个副本也是如此。线性一致性的关键要求是读取的状态始终是最新的，并且永远不会读取到过时数据。\n\
  \n一致性模型使开发者能够理解复制存储系统的行为。在与复制系统交互时，应用开发者会体验到与单系统交互相同的行为。这种透明性使得开发者能够沿用编写应用逻辑时单服务器的惯例。如果一个复制系统具备这种透明性，那么它就称为线性一致系统。\n\
  \n在文献中，线性一致性也被称为强一致性、原子一致性或即时一致性。\n\n##### 顺序一致性\n\n在这种一致性类型中，所有节点看到的命令顺序与其他节点相同。\n\
  \n线性一致性和顺序一致性是**强一致性**的两个类别。\n\n##### 最终一致性\n\n在最终一致性模型下，存在一个最终保证：如果没有更多更新，每个副本最终会处于相同状态。然而，这意味着没有时间上的保证，因为更新可能永远不会停止。因此，这并不是一个非常可靠的模型。另一种更强的方案称为强最终一致性，它有两个属性。首先，应用于一个诚实副本的更新最终会应用于所有无故障副本。其次，无论更新以何种顺序处理，如果两个副本处理了相同的更新集合，它们最终会处于相同状态。第一个属性称为最终交付，而第二个属性称为收敛。\n\
  \n这种方法有几个优点。它允许副本在网络连接恢复之前无需网络连接即可继续推进，并最终使副本收敛到同一状态。最终一致性可以使用较弱的广播模型，而不是全序广播。\n\
  \n最终一致性有多个类别，例如\"最后写入获胜\"。其技术是应用具有最新时间戳的更新，并丢弃任何写入同一键（更新相同数据）但时间戳较低的更新。这意味着我们接受一定的数据丢失，以换取所有副本最终状态收敛。\n\
  \n##### 使用较弱广播抽象的 SMR\n\nSMR 利用全序广播来实现系统中命令的全局顺序。这里出现了一个问题：我们能否使用较弱的广播抽象来构建状态机复制？答案是肯定的；然而，需要具备一种称为\"\
  交换律\"的属性以及其他一些属性。如果两个更新的顺序无关紧要，那么它们就是可交换的，例如在算术中，`A + B = B + A`，`A` 和 `B` 的顺序无关紧要，结果相同。类似地，我们说命令\
  \ `x` 和 `y` 是可交换的，如果在状态机的每个状态 *s* 中，先执行 `x` 再执行 `y` 与先执行 `y` 再执行 `x` 产生相同的状态更新，并且\
  \ `x` 和 `y` 在执行时返回相同的响应。在这种情况下，我们说 `x` 和 `y` 是可交换的。\n\n这里的关键洞察是，如果副本的状态更新是可交换的，那么副本可以按任意顺序处理命令，并且最终仍会处于相同状态。当然，你必须将可交换机制构建到协议中。表\
  \ 3-1 展示了不同的广播类型及其相关属性，以及对状态更新的假设。^(²)\n\n**表 3-1**\n构建复制所需的广播及要求\n\n| 广播类型 | 关键属性\
  \ | 状态更新要求 |\n| --- | --- | --- |\n| 全序广播 | 所有消息在所有副本上以相同顺序传递 | 确定性 |\n| 因果广播 |\
  \ 按因果顺序传递消息，但并发消息可按任意顺序传递 | 确定性，并发更新的可交换性 |\n| 可靠广播 | 无排序保证，无重复消息 | 确定性，所有更新的可交换性\
  \ |\n| 尽力而为广播 | 尽力而为，无传递保证 | 确定性，可交换性，幂等性，并能容忍消息丢失 |\n\n现在让我们探讨一些支撑分布式协议和算法的分布式计算基础成果。\n\
  \n### 基础成果\n\n在分布式计算领域，研究人员报告了许多基础性成果。这些基础成果构成了分布式计算范式立足的基石。其中最有意思的是不可能性结果。\n\n\
  ## 不可能性结果\n\n不可能性结果让我们理解一个问题是否可解，以及解决该问题所需的最小资源。如果一个问题不可解，那么这些结果能清楚地解释为什么特定问题无法解决。如果一个不可能性结果被证明成立，则无需对此进行进一步研究，研究人员可以将注意力转向其他问题，或设法绕过这些结果。这些结果告诉我们，除非提供足够的资源，否则某些问题无法解决。换句话说，它们表明，如果资源不足，某些问题就无法计算。有些问题完全无法解决，而有些问题只有在提供足够资源的情况下才能解决。解决一个问题所需的最小可用资源被称为**下界结果**。\n\
  \n为了证明某些问题无法解决，必须定义系统模型和允许的算法类别。有些问题在一种模型下可解，但在其他模型下则不可解。例如，共识在异步网络假设下不可解，但在同步网络和部分同步网络中是可解的。\n\
  \n分布式计算中最基础的成果之一是：需要多少个节点/进程才能容忍崩溃故障和拜占庭故障。\n\n#### 最小进程数\n\n已经证明，解决共识问题需要一定的最小进程数。如果没有故障，那么在同步和异步模型中都可以达成共识。在异步系统中无法达成共识，但在同步系统中，在崩溃故障模型和拜占庭故障模型下，共识是可以达成的。然而，故障进程的比例存在一个下界。只有当拜占庭进程少于三分之一时，才能达成共识。\n\
  \nLamport 表明，当故障节点不超过三分之一时，诚实节点总能达成共识。\n\n#### 崩溃故障\n\n为了实现崩溃容错，严格的下界是 `N >= 2F\
  \ + 1`，其中 `F` 是故障节点数。这意味着至少需要三个进程，如果一个进程发生崩溃才能实现崩溃容错。在崩溃容错环境下，如果 `n <= 2f`，则无法解决共识问题。\n\
  \n#### 拜占庭故障\n\n为了实现拜占庭容错，严格的下界是 `N >= 3F + 1`，其中 `F` 是故障节点数。这意味着至少需要四个节点，如果一个节点发生任意故障才能实现拜占庭容错。\n\
  \n如果 `n <= 3f`（其中 `n` 是节点数，`f` 是拜占庭节点数），则没有任何算法能解决共识问题。故障处理器数量存在一个已被证明的严格下界 `3F\
  \ + 1`。\n\n#### 最小连通性\n\n要容忍故障，网络的最小连通度至少为 `2f + 1`。\n\n#### 最小轮数\n\n所需的最小轮数为 `f\
  \ + 1`，其中 `f` 为可能发生故障的节点数。这是因为比故障数多一轮，意味着应该有一轮是无故障的，从而允许达成共识。\n\n\n## FLP 不可能性\n\
  \nFLP 不可能性结果表明，在最多一个进程可能因崩溃而失败的消息传递异步系统中，无法确定性地解决共识问题。换句话说，在一个由 `n` 个节点组成且存在无限延迟的系统中，没有任何算法能够解决共识问题。要么存在无法达成一致的执行过程，要么存在不会终止（无限执行）的执行过程。\n\
  \nFLP 不可能性结果所依据的关键问题在于，在异步系统中，无法区分崩溃的进程和仅仅运行缓慢或通过慢速链接发送消息、需要时间才能到达接收方的进程。\n\nFLP\
  \ 是分布式计算中最基本的不可解性结果之一。FLP 以其作者 MICHAEL J. FISCHER、NANCY A. LYNCH 和 MICHAEL S. PATERSON\
  \ 的名字命名，他们于 1982 年在论文《单故障进程下分布式共识的不可能性》中报告了这一结果。\n\n全局状态 `C` 的配置是**单值的**，如果从 `C`\
  \ 开始的所有执行都输出相同的值，也就是说，只有一种可能的输出。如果配置导致决定 `0`，则为 **0-单值的**；如果导致决定 `1`，则为 **1-单值的**。全局状态\
  \ `C` 的配置是**双值的**，如果存在两个从 `C` 开始的执行输出不同的值。\n\n我们可以在图 3-14 中直观地看到这一点。\n\n![](img/515270_1_En_3_Fig14_HTML.png)\n\
  \n单值和双值配置示意图。左侧的 `C` 分成 `0` 和 `1`。右侧的 `C` 分成 `V` 和 `V`。\n\n**图 3-14**\n单值和双值配置\n\
  \nFLP 背后的关键思想是，双值配置总是可以过渡到某个双值配置。由于存在一个初始双值配置，因此存在一个永不终止的执行过程，只会导致双值配置。\n\n我们可以通过一个场景来理解这一点。假设你有两个不同的节点集合，例如集合\
  \ `A` 和集合 `B`，每个集合都有五个节点。在一个无故障的五节点网络中，每个集合中的多数（即五分之三）将达成共识。假设在集合 `A` 中，五个节点的提议值都是\
  \ `1` {`11111`}，那么我们知道在诚实环境中，所有节点都将决定值为 `1`。类似地，在集合 `B` 中，如果所有节点的初始值都是 `0` {`00000`}，那么在无故障环境中，所有节点都将同意值为\
  \ `0`。我们可以说，集合 `A` 和集合 `B` 的配置（即全局状态）分别是 **1-单值的** 和 **0-单值的**。然而，现在设想一个情况，并非所有节点都是\
  \ `0` 或 `1`，而是有些是 `0`，有些是 `1`。想象在集合 `A` 中，三个节点是 `1`，两个节点是 `0`，即 {`11100`}。类似地，在集合\
  \ `B` 中，两个节点是 `1`，三个节点是 `0`，即 {`11000`}。请注意，这些集合现在只有一个节点的差异，即集合 `A` 中值为 `1` 而集合\
  \ `B` 中值为 `0` 的那个节点，也就是集合中的中间节点（第三个元素）。在集合 `A` 中，由于五分之三的多数，达成共识 `1`；而在集合 `B` 中，由于五分之三的多数，达成共识\
  \ `0`。让我们称这两个集合为配置或全局状态。现在我们有两个配置：一个达成共识 `1`，另一个达成共识 `0`。到目前为止还好，但想象现在有一个节点失败了，正是那个成为这两个集合唯一差异的中间节点。\n\
  \n如果中间节点从集合 `A` 和 `B` 中都失败了，它们各自变成 {`1100`}，这意味着这两个集合现在彼此无法区分，表明它们都可以根据第三个元素（中间节点）的可用性达成相同的共识\
  \ `0` 或 `1`。这也意味着，根据节点 `3` 的可用性，这些集合之一可以达成 `0` 或 `1` 两个共识决定。\n\n现在想象所有节点的默认值都是 `0`，那么对于一个失败的（被移除的）节点，集合\
  \ `A` {`11100`} 如果中间节点失败，最终将达成共识 `0`；如果没有节点失败，则将达成共识 `1`。这是一个矛盾的情况，称为**双值配置**，即如果持有值\
  \ `1` 的中间节点不可用，则达成共识 `0`；但如果没有节点失败，则将达成共识 `1`。现在的情况是，集合（节点）可以达成共识 `0` 或 `1`，结果不可预测。\n\
  \n已经证明，即使只有一个故障，这种双值初始配置的矛盾情况也总是可能存在；其次，它总是可以导致另一种矛盾情况。换句话说，初始双值配置总是可以过渡到另一个双值配置，因此共识是不可能的，因为无法收敛到单值（**0-单值的**\
  \ 或 **1-单值的**）。\n\n由此得出 FLP 不可能性结果的两个观察结论。首先，在任何存在故障的共识算法中，总是至少存在一个双值初始配置。其次，双值配置总是可以过渡到另一个双值配置。\n\
  \nFLP 结果得出结论：在异步系统中，首先存在一个算法无法决定的全局状态（配置），并且总是会出现系统无法得出结论的场景。换句话说，在异步条件下，总存在一个可接受的运行过程，该过程始终保持在不确定状态。\n\
  \n异步条件下的状态机复制也容易受到 FLP 不可能性限制的影响。区块链网络同样受制于 FLP 不可能性结果。如果没有通过引入一定程度的同步性来规避 FLP 不可能性，比特币、以太坊和其他区块链网络将无法构建。\n\
  \n人们提出了许多努力来以某种方式规避 FLP 不可能性。这种规避围绕着预言机的使用。其思想是向分布式系统提供一个预言机来帮助解决问题。**预言机**可以定义为一种服务或黑盒，进程（节点）可以查询它以获取某些信息，从而帮助它们决定行动方案。接下来，我们介绍一些常见的预言机，它们为分布式算法提供足够的信息来解决那些本来可能无法解决的问题。我们可以使用预言机来促进解决分布式系统中的共识问题。\n\
  \n规避 FLP 不可能性的关键思想围绕着牺牲异步性和确定性展开。当然，正如我们所了解的，在异步条件下，即使只有一个进程崩溃故障，确定性共识也是不可能的；因此，诀窍是稍微牺牲异步性或确定性，恰好足以达成决定并终止。\n\
  \n现在我们讨论一些技术：\n\n- 随机预言机\n- 故障检测器\n- 同步性假设\n- 混合模型\n\n### 同步性假设\n\n在同步性假设下，模型引入了关于时间的假设。请记住，我们在本章和第一章前面讨论过部分同步性。部分同步性是一种通过规避\
  \ FLP 不可能性来解决共识问题的技术。在部分同步性模型下，异步性在一定程度上被放弃，以引入一些允许解决共识问题的时间假设。类似地，在最终同步性模型下，假设系统在称为全局稳定时间（GST）的未知时间之后最终同步。另一种时间假设是弱同步性，它假设延迟保持在某个阈值以下，并且不会无限增长。通过假定某种时间概念（同步性），这样的时间假设允许共识算法做出决定并终止。\n\
  \n\n### 随机预言机\n\n随机预言机使得随机化算法的发展成为可能。在这种方法中，为了以概率方式达成共识，一定程度地牺牲了确定性。该方法的优点在于无需对时序做出任何假设，但缺点是随机化算法的效率不高。在随机化共识算法中，安全属性或活跃属性之一会被改为非确定性的概率版本。例如，活跃属性变为：\n\
  \n- **活跃性**：每个正确的进程最终都能以高概率做出决定。\n\n这在某种意义上解决了 FLP 不可能性——FLP 不可能性在实践中意味着存在一些不会终止的共识执行过程。如果让终止条件变为概率性的，就可以“规避”共识的不可能性：\n\
  \n- **一致性**：所有正确的进程最终都以概率 1 对某个值达成一致。\n\n然而，通常被改为概率性的是活跃属性，而非一致性、有效性及完整性等安全属性。牺牲安全属性来换取活跃（终止）属性通常并不可取。\n\
  \n随机化算法的核心技术被称为“抛硬币”。抛硬币或掷硬币可分为两种类型。\n\n本地硬币是指处理器的状态从当前状态推进到下一个状态，该状态根据算法的概率分布进行选择。这通常通过随机比特生成器实现，它以相等的概率返回\
  \ 0 或 1（正面或反面）。\n\n共享硬币或全局硬币算法利用这些本地硬币来构建一个全局硬币。其要求是向所有诚实进程提供相同的硬币值，从而实现一致。\n\n\
  本地硬币算法在指数级通信步骤后终止，而共享硬币算法则在常数级步骤内终止。\n\n牺牲确定性以采用随机化方法各有利弊。其主要优势之一是无需时序假设。然而，缺点是轮次数量显著增加，并且引入随机化所需的密码学计算成本可能很高。\n\
  \n拜占庭共识的随机化算法最早出现在 Ben-Or 和 Rabin 于 1983 年的工作中，我们将在第 6 章中与其他一些算法一同讨论。\n\n### 混合模型\n\
  \n在规避 FLP 不可能性的混合模型方法中，会结合使用随机化技术和故障检测器。\n\n虫洞是一种系统模型中的扩展，与系统的其他部分相比，它具有更强的特性。它通常是一种安全、防篡改且故障静默的可信硬件，为进程正确执行协议中的某些关键步骤提供了途径。文献中引入了多种虫洞，例如经过认证的仅追加存储器，它迫使副本提交到可验证的操作序列。可信的及时计算基础（TTCB）是首个为虫洞支持的共识而引入的虫洞。\n\
  \n\n\n### 故障检测器\n\n故障检测器背后的直觉是，如果我们能设法获得进程故障的提示，那么就可以规避 FLP 不可能性结果。请记住，FLP 不可能性结果指出，无法区分一个进程是崩溃了还是仅仅速度非常慢。没有方法可以查明这一点，因此如果我们能设法得到某个进程已故障的指示，那么处理这种情况就会更容易。在这种设置下，异步性在一定程度上被牺牲了，因为故障检测器基于心跳和超时假设来工作。故障检测器作为异步系统的扩展被添加。\n\
  \n一个故障检测器可以定义为每个进程上的一个分布式预言机，它提供关于一个进程是存活还是已崩溃的提示（怀疑）。在某种程度上，故障检测器将超时和部分同步假设封装为一个独立的模块。定义故障检测器有两类属性：\n\
  \n- **完备性** 意味着故障检测器最终会检测到故障进程。这是一个活性（liveness）属性。\n- **准确性** 意味着故障检测器永远不会怀疑一个正确的进程故障。这是一个安全性（safety）属性。\n\
  \n基于上述两个属性，Chandra 和 Toueg 在他们开创性的论文“用于可靠分布式系统的不可靠故障检测器”中提出了八类故障检测器。通过引入一个弱的不可靠故障检测器，也有可能解决共识问题。这项工作同样由\
  \ Chandra 和 Toueg 提出。\n\n一个故障检测器准确怀疑故障或活性的能力取决于系统模型。故障检测器通常使用心跳机制来实现，其中进程之间交换心跳消息，如果某些进程在一段时间内未收到这些消息，则可以怀疑发生了故障。另一种方法是实现一个基于最坏情况消息往返时间的超时机制。如果一个进程在预期的时间范围内没有收到消息，则发生超时，并且该进程被怀疑已故障。之后，如果从被怀疑的进程收到消息，则增加超时值，并且该进程不再被怀疑故障。图\
  \ 3-15 展示了一个使用心跳机制的故障检测器。\n\n![](img/515270_1_En_3_Fig15_HTML.jpg)\n\n*图 3-15：使用心跳的故障检测器*\n\
  \n在图 3-15 中，进程 `P1` 向进程 `P2` 发送常规的心跳消息“Alive”。故障检测器中有两个参数：心跳间隔 `H` 和超时值 `T`。如果 `P2`\
  \ 在超过 `T` 的时间段内没有收到来自 `P1` 的任何心跳消息，则怀疑 `P1`。在图中，消息 4 在超时值 `T` 内没有到达；因此，`P2` 现在因超时而怀疑\
  \ `P1` 故障。如果 `P2` 开始收到来自 `P1` 的任何消息（无论是心跳还是任何其他协议或应用消息），则 `P2` 不再怀疑进程 `P1`。这在图中从消息\
  \ 5 开始展示。一旦 `P2` 收到来自 `P1` 的消息，计时器 `T` 就会重新开始（重置）。\n\n故障检测器仅在同步和部分同步系统模型下是实用的。在异步系统中，故障检测器无法同时实现完备性和准确性。然而，我们可以通过立即（且天真地）怀疑所有进程都已崩溃来独立实现完备性。之后，如果某个进程确实故障了，那么这种怀疑就是正确的，从而满足了完备性属性。类似地，可以通过不怀疑任何进程来实现准确性，这当然相当无用，但大概能实现准确性。换句话说，完美的故障检测器在同步系统中是可能的，而在异步系统中则不可能有完美的故障检测器。在某种程度上，我们将部分同步和超时封装在故障检测器中，以便在我们的系统中实现故障检测能力。\n\
  \n故障检测器的另一个优点是所有超时机制都局限在故障检测器模块内部，程序可以自由地执行其他任务。在没有故障检测器模块的情况下，程序最终会无限期地等待来自已崩溃进程的预期传入消息。我们可以通过比较来理解这一点。例如，一个阻塞式接收操作“*等待来自进程\
  \ p 的消息 m*”变成了`(等待来自进程 p 的消息 m) 或 (怀疑 p 故障)`。现在你可以看到阻塞式程序变成了非阻塞式，并且不再有无限等待；如果怀疑\
  \ `p` 故障，则将其添加到怀疑列表中，然后程序继续其操作，无论那是什么操作。\n\n现在让我们看看强/弱完备性和准确性的属性。\n\n#### 强完备性\n\
  此属性要求最终每个崩溃的进程被每个正确的进程永久怀疑。\n\n#### 弱完备性\n此属性要求最终每个崩溃的进程被某个正确的进程永久怀疑。\n\n#### 强准确性\n\
  此属性表示一个进程在它崩溃之前（在它崩溃前）不会被任何正确的进程怀疑。\n\n#### 弱准确性\n此属性描述某个正确的进程永远不会被任何正确的进程怀疑。\n\n\
  #### 最终强准确性\n此属性表明，经过一段时间后，正确的进程不再怀疑任何正确的进程。\n\n#### 最终弱准确性\n此属性暗示，经过一段时间后，某个正确的进程不再被任何正确的进程怀疑。\n\
  \n我们可以在图 3-16 所示的图表中直观地看到强完备性与弱完备性。\n\n![](img/515270_1_En_3_Fig16_HTML.png)\n\n\
  *图 3-16：强完备性与弱完备性*\n\n现在我们讨论八类故障检测器。有四类故障检测器提供强完备性。前两种故障检测器在同步系统下工作，即完美检测器 `P` 和强检测器\
  \ `S`。另外两种在部分同步模型下工作，即最终完美检测器（菱形 `P`）和最终强检测器（菱形 `S`）。\n\n我们现在描述这些类别，首先是强完备性。\n\n\
  #### 完美故障检测器 P\n这种类型的故障检测器满足强完备性和强准确性属性。`P` 不能在异步系统中实现。这是因为在异步系统中无法实现 `P` 所需的强完备性和准确性。\n\
  \n#### 强故障检测器 S\n这种故障检测器具有弱准确性和强完备性。\n\n#### 最终完美故障检测器 – 菱形 P\n这类故障检测器满足强完备性和最终强准确性。\n\
  \n#### 最终强故障检测器 – 菱形 S\n这类故障检测器满足强完备性和最终弱准确性。\n\n还有四类故障检测器提供弱完备性。检测器 `Q` 和弱检测器 `W`\
  \ 在同步模型下工作。另外两种检测器，最终检测器 `Q`（菱形 `Q`）和最终弱检测器（菱形 `W`），在部分同步假设下工作。\n\n我们如下描述它们。\n\n\
  #### 弱故障检测器 W\n这种类型满足弱完备性和弱准确性属性。\n\n#### 最终弱故障检测器（菱形 W）\n这种类型满足弱完备性和最终弱准确性属性。\n\
  \n\n\n#### 探测器 Q 或 V\n\n这类探测器满足弱完备性和强准确性。\n\n#### 最终探测器 Q（菱形 Q）或菱形 V\n\n这类探测器满足弱完备性和最终强准确性。\n\
  \n图 3-17 总结了以上所有内容。\n\n![](img/515270_1_En_3_Fig17_HTML.jpg)\n\n故障检测器的框图分为强完备性和弱完备性，并进一步分为同步和部分同步。\n\
  \n**图 3-17** 故障检测器类别\n\n故障检测器的属性从根本上围绕着故障检测器在避免误报的同时，检测故障的速度和准确性。一个完美的故障检测器总能正确检测出故障进程，而一个弱故障检测器可能只能准确检测出极少甚至几乎无法检测出故障。\n\
  \n##### 领导者选举故障检测器\n\n有时，我们并不关心进程是否发生故障，只关心某个单个进程是否正确。在这种故障检测方法中，我们不怀疑其他进程，而是将单个进程视为领导者。这种故障检测器可以被视为一种领导者选举算法，称为\
  \ Omega `Ω` 故障检测器。最初，领导者选举器可能不可靠，可能会选举出一个故障进程，或者导致不同进程信任不同的领导者。我们可以将此 FD 定义为一个故障检测器，在该检测器中，每个无故障进程最终都会选举出同一个无故障领导者进程。\n\
  \n正如我们之前所见，在其他故障检测器中，有一个名为 `suspect` 的组件，其中包含一组被故障检测器怀疑为故障的进程 ID；然而，在领导者选举器 `Ω`\
  \ 中，有一个名为 `trust` 的组件，其中包含被选举出的领导者的单个进程 ID。\n\n#### 使用故障检测器解决共识问题\n\n如果我们有一个完美的故障检测器，我们就可以轻松地在同步和异步模型中解决共识问题。然而，在异步系统中，由于该模型对准确性和完备性的要求过于严格，无法实现\
  \ `P`。如果我们能在异步系统中实现一个 `P` 来解决共识问题，那将违反 FLP 不可能性原理。因此，我们知道不存在这样一个完美的 FD 能在纯粹的异步系统中解决共识问题。我们必须牺牲一点异步性，寻找能在异步条件下解决共识问题的更弱的故障检测器类别。\n\
  \n此外，此时会出现一个问题：解决共识问题所需的最弱故障检测器是什么？`⋄W`（最终弱完备性与最终弱准确性）是在异步环境下，在大多数进程正确的前提下，足以解决共识问题的最弱故障检测器。\n\
  \n## 仲裁\n\n仲裁可以定义为任何包含大多数进程的集合。该概念与在一组对象中进行投票有关。仲裁系统对于确保复制系统中的一致性、可用性、效率和容错性至关重要。\n\
  \n仲裁也可以被视为在分布式系统中决定某个操作所需的最小进程（投票）数量。基于仲裁的方法确保了分布式系统的一致性。我们刚刚在“复制”部分了解到，复制允许构建一个容错且一致的分布式系统。这时，问题来了：需要多少个副本才能最终决定提交更新或中止操作。\n\
  \n从数学上讲，仲裁定义如下：\n\n仲裁是 `π = {1, 2, 3, ..., n}` 的一个非空子集。\n\n仲裁系统定义为一组 `π` 的非空子集 `Q`，满足以下属性：\n\
  \n**仲裁交集**：`∀A, B ∈ Q : A ∩ B ≠ ϕ`\n\n这意味着任意两个仲裁必须在一个或多个进程上相交。这也被称为鸽巢原理。而且，这被称为**一致性**属性。\n\
  \n必须始终至少有一个可用的仲裁未发生故障。这是**仲裁可用性**属性。\n\n仲裁系统通常用于这样的场景：一个进程在广播其请求后，等待直到收到属于某个仲裁的所有进程的响应。通过这种方式，我们可以满足问题的一致性要求。仲裁通常用于实现崩溃和拜占庭容错。例如，在共识算法中，需要特定大小的仲裁来保证安全性和活跃性。换句话说，基于仲裁的算法只有在能够建立一个由正确进程组成的仲裁时，才能满足安全性和活跃性。\n\
  \n### 崩溃容错仲裁\n\n为了在 N 个崩溃停止进程中实现崩溃容错，仲裁 `Q` 设置为至少包含 `⌊n/2⌋ + 1` 个进程。\n\n例如，如果 `n\
  \ = 7`，那么 `⌊7/2⌋ + 1 = ⌊3.5⌋ + 1 = 3 + 1 = 4`。\n\n这意味着在一个七节点网络中，至少需要四个节点（一个由四个节点组成的仲裁）无故障且可用，才能实现崩溃容错。\n\
  \n例如，如果你有 `n` 个副本，其中 `f` 个可能会崩溃停止，那么为了实现活跃性，需要多大的仲裁 `Q` 规模？\n\n为了实现活跃性，必须有一个无故障的仲裁\
  \ `Q` 可用，其中 `Q <= n – f`。\n\n为了实现安全性，任意两个仲裁必须在一个或多个进程上相交。\n\nLamport 在 1978 年曾以“变形虫”之名使用过仲裁。\n\
  \n### 拜占庭仲裁\n\n拜占庭故障难以处理。设想如果有 `N` 个节点，其中 `f` 个节点变成了拜占庭节点。这些 `f` 个节点可以任意行为，并且可能投票支持某个值，又反对它。它们可以故意向不同节点发表不同的声明。这种情况甚至可能导致正确的节点产生分歧状态，并可能导致死锁。\n\
  \n一个能够容忍 `f` 个故障的拜占庭仲裁拥有超过 `(n + f)/2` 个进程。在两个拜占庭容错仲裁之间，始终存在至少一个正确进程的交集。如果 `N >\
  \ 3f`，则在拜占庭环境下能够保证进展。换句话说，拜占庭容错要求 `f < n/3`。\n\n例如：\n\n```\nn = 7, f = 1\n(n + f)\
  \ / 2 = (7 + 1) / 2 = 4\nceiling((7 + 1 + 1) / 2) = ceiling(9 / 2) = 5\n```\n\n\
  每个拜占庭仲裁包含超过 `n − f/2` 个诚实进程。`7 − 1/2 = 6.5 > 3`，因此，在两个拜占庭仲裁的交集中至少有一个正确进程。\n\n###\
  \ 读仲裁与写仲裁\n\n基于仲裁的协议从根本上依赖于投票来决定是否可以执行读操作或写操作。这里有读仲裁和写仲裁。读仲裁是为了就读操作达成一致所需的最少副本数。类似地，写仲裁是为了就写操作达成一致所需的最少副本数。\n\
  \n## 我们现在处于什么位置\n\n基于过去 40 多年在经典分布式共识和现代区块链时代协议方面的研究，我们可以将共识分为两大类。\n\n### 经典共识\n\
  \n经典共识或传统分布式共识作为一个研究课题已经有大约 40 年了。从 SIFT 项目以及 Lamport 和许多其他研究人员的贡献开始，我们现在拥有大量处理经典分布式共识的工作。像\
  \ Paxos、PBFT 和 RAFT 这样的协议现在已成为各种实际系统中实现的常态。\n\n\n\n### 中本聪及后中本聪共识\n\n另一方面，有一系列协议可称为中本聪共识家族，因为这一家族是由中本聪通过比特币首次引入的。\n\
  \n从区块链的角度来看，传统协议和中本聪式协议都在使用中。几乎所有许可链都使用 PBFT 经典算法的变体。另一方面，像以太坊和比特币这样的非许可公链则使用中本聪式（PoW）共识算法。还有权益证明等其他类别及其变体，但它们都是在\
  \ 2008 年比特币工作量证明引入之后才出现的。\n\n我们将在第 4 章详细讨论中本聪及后中本聪式算法。\n\n## 本章小结\n\n在本章中，我们涵盖了协议、广播、复制和共识的主要概念：\n\
  \n- 共识是分布式计算中的一个基本问题。\n- 共识与原子广播是等价的问题。解决了其中一个，另一个也迎刃而解。\n- 存在多种广播原语，例如尽力而为广播、可靠广播、急切可靠广播以及全序广播，它们在传递保证方面的严格程度各不相同。\n\
  - 还有概率性广播协议，其灵感源于公共信息流言传播方式，能以高概率传递消息。\n- 复制和状态机复制是为分布式系统提供容错能力的技术。\n- 仲裁系统对于确保复制系统中的一致性、可用性、效率和容错性至关重要。\n\
  - 过去半个世纪的研究产生了两种主要的共识类别，即经典许可共识和中本聪非许可共识。\n- 过去几十年的研究中，研究人员已经证明了多种不可能性结果。例如 FLP\
  \ 不可能性、最小进程数量要求以及网络链路等结果已被提出并得到证明。这些基础性结果使研究人员能够专注于其他问题，因为如果某件事已被证明不可能，那么投入时间和精力去试图解决它是没有价值的。\n\
  - 其他研究还包括故障检测器，它提供了一种检测分布式系统故障的方式，允许进程据此做出响应以继续推进。为分布式系统配备故障检测器、同步假设、随机化协议和混合协议等预言机，是规避\
  \ FLP 不可能性结果的一种方法。\n\n在下一章中，我们将探讨区块链，描述它是什么，以及如何从我们目前所学的知识角度来理解它。\n\n"
- "# 4. 区块链\n\n在本章中，我们将学习区块链是什么、它的各种元素，并通过分布式计算的视角审视区块链。同时，我们还将给出区块链的形式化定义和性质。此外，我们也将介绍比特币和以太坊。最后，我将介绍一些区块链的应用场景。\n\
  \n区块链之所以引人入胜，是因为它涉及众多学科，包括分布式计算、网络、密码学、经济学、博弈论、编程语言和计算机科学。\n\n区块链吸引了来自众多不同领域的人士，包括但不限于前面提到的学科。由于几乎在生活的方方面面都有应用场景，区块链已经俘获了公众以及众多学者和行业专业人士的想象力。\n\
  \n区块链于 2008 年随着比特币的出现而诞生。比特币是一种点对点、去中心化的电子现金方案，它不需要任何可信第三方来提供与货币相关的信任保障。\n\n## 什么是区块链\n\
  \n互联网上和许多不同的书籍中，对区块链有众多定义。虽然所有这些定义都是正确的，有些还非常出色，但我将尝试用自己的话来定义区块链。\n\n首先，我们将从外行的角度来定义它，然后从纯粹的技术角度来定义。\n\
  \n### 外行定义\n\n区块链是一种共享的记录保存系统，每个参与者都保存着一份按时间顺序排列记录的副本。参与者只有在集体同意的情况下才能添加新记录。\n\n\
  ### 技术定义\n\n区块链是一个点对点、密码学安全、仅可追加、不可变且防篡改的共享分布式账本，由按时间排序且可公开验证的交易组成。用户只能通过网络中节点间的共识在区块链中添加新记录（交易和区块）。\n\
  \n## 背景\n\n区块链的起源可以追溯到早期为数字文档时间戳开发的系统。此外，长期以来创建具有匿名性和可问责性等理想特性的安全电子现金的难题，也激发了区块链的发展。\n\
  \n以下讨论一些促成区块链发展的关键思想。\n\n要创建实用的数字现金，需要解决两个基本问题：\n\n- 可问责性以防止双重支付\n- 匿名性以保护用户隐私\n\
  \n问题在于如何解决可问责性和双重支付问题。下面描述的方案试图解决这些问题，并设法实现了这些特性；但可用性较差，且它们依赖于可信第三方。\n\n\n\n###\
  \ 数字现金的创建尝试\n\n历史上曾有多次创建数字现金的尝试。例如，大卫·乔姆发明了盲签名，并利用秘密共享机制来创建数字现金。盲签名能够在不透露签名内容的情况下进行签名，从而提供了匿名性，而秘密共享机制则允许检测双重支付。\n\
  \n`B-money` 是另一种电子现金方案，由戴伟于 1998 年发明。这一原始构想中提到了许多可被视为比特币直接先驱的想法。它是一个新颖的构想，但需要依赖受信任的服务器。它还提出了在不可追踪的匿名实体之间，通过一种交换媒介进行协作，以及强制执行合约的方法。每个服务器在特殊账户中存入一定金额，并用于奖惩的想法，非常接近我们今天所知的权益证明概念。同样，解决一个先前未被解决的计算问题的想法，就是我们今天所说的工作量证明。\n\
  \n另一个电子现金提案是尼克·萨博提出的 `BitGold`。`Bitgold` 可以被视为比特币的直接前身。`Bitgold` 提案强调不依赖受信任的第三方，并通过解决“挑战字符串”来实行工作量证明。\n\
  \n另一方面，密码学和计算机技术的进步与发展通常带来了多项进展和创新应用。其中一些与区块链相关的进步包括数字文档时间戳、电子邮件垃圾邮件防护以及可重用工作量证明。\n\
  \n使用时间戳服务对数字文档进行时间戳以创建有序文档（哈希）链的工作，最早由哈伯和斯托内塔提出。这一想法与区块链中的区块链密切相关。然而，这种时间戳服务是中心化的，并且需要被信任。\n\
  \n比特币中使用的基于哈希函数的工作量证明的起源，可以在德沃克和诺尔先前利用工作量证明来阻止电子邮件垃圾邮件的工作中找到。亚当·拜克发明了用于控制电子邮件垃圾邮件的\
  \ `Hashcash` 工作量证明方案。此外，哈尔·芬尼引入了用于代币货币的可重用工作量证明，该方案使用了 `Hashcash` 来铸造新的工作量证明代币。\n\
  \n另一项对比特币发展有所贡献的技术是密码学。哈希函数、默克尔树和公钥密码学等密码学原语和工具，都在比特币的发展中扮演了至关重要的角色。我们在第二章 2 中详细介绍了密码学。\n\
  \n图 4-1 展示了不同技术的融合。\n\n![](img/515270_1_En_4_Fig1_HTML.jpg)\n\n该图包含两个向下的箭头，分别标有不同的技术。这两个箭头都指向“比特币”标签。\n\
  \n图 4-1\n\n催生比特币的技术\n\n#### 第一个区块链？\n\n当比特币问世时，区块链作为比特币加密货币的基础运行层被引入。至今仍在运行的它，是第一个公共区块链。不久之后，创新开始涌现，许多不同的区块链出现了——有的用于特定目的，有的用于加密货币，还有相当一部分用于企业用例。在下一节中，我们将探讨不同类型的区块链。\n\
  \n## 区块链的优势\n\n人们设想了区块链技术的多种优势，自比特币发明以来已取得了诸多成就。特别是随着以太坊的出现，一个可编程的平台诞生了，智能合约可以在其上实现任意逻辑，这增加了其效用，并为进一步采用铺平了道路。今天，区块链最受关注的应用之一——去中心化金融（简称\
  \ DeFi）——被视为当前金融体系的重大颠覆者。非同质化代币是另一个获得爆炸性流行的应用。区块链上的非同质化代币实现了资产的代币化。目前，DeFi 生态系统中锁定的价值接近\
  \ 600 亿美元。这笔巨额投资证明了区块链已经成为我们经济的一部分。您可以在 [`https://defipulse.com/`](https://defipulse.com/)\
  \ 上追踪这一指标。\n\n现在，我列出区块链最突出的一些优势：\n\n- 成本节约\n    - 由于流程简化、透明度提高以及具有安全保障的单一数据共享平台，区块链可以带来成本节约。同时，无需创建单独的安全基础设施；用户可以使用已经存在的安全区块链网络，只需一台运行区块链软件客户端的入门级计算机即可。\n\
  \n- 透明度\n    - 由于所有交易都是公开的，任何人都可以验证交易，因此区块链引入了透明度。\n\n- 可审计性\n    - 由于记录历史的不可篡改性，区块链为审计目的提供了一个天然的平台。\n\
  \n- 速度与效率\n    - 由于交易中的所有参与方都属于同一个网络，多方之间的交易处理速度得以提高。但请注意，公共区块链中的每秒交易量相当低，例如比特币每秒只能处理三到七笔；然而，在联盟链中，情况要好得多，并且由于参与方直接相互交互，提高了交易的总体效率。\n\
  \n- 安全性\n    - 区块链基于密码学协议，这些协议确保了区块链的完整性和真实性，从而为交易提供了一个安全的平台。\n\n以下不同行业中有许多使用案例：\n\
  \n- 供应链\n- 政府\n- 医药/健康\n- 金融\n- 物联网\n- 交易\n- 身份\n- 保险\n\n接下来，我们将讨论不同类型的区块链。\n\n\n\
  \n## 区块链的类型\n\n区块链有多种类型。比特币引入的原始区块链是一种公有链：\n\n* 公有链或无需许可链\n* 需许可链\n  * 私有链\n* 联盟链或企业级区块链\n\
  * 特定应用区块链\n* 异构多链\n\n**公有链**，顾名思义，是一种**无需许可的区块链**。参与网络没有任何限制。只需要下载一个软件客户端并运行，即可成为网络的一部分。通常，这类区块链用于加密货币，例如比特币和以太坊。\n\
  \n**需许可链**有两种类型。**私有链**仅由单个组织控制，通常在一个组织内部运行。另一方面，**联盟链**或**企业级区块链**是一种需许可链，多个组织共同参与区块链的治理。企业通常使用联盟链来处理特定的企业用例。\n\
  \n我们还可以进一步对链进行分类，这些链可能由利益相关方仅为单一目的而开发。我们可以称其为**特定应用区块链**。例如，仅为单一类型的加密货币而开发的区块链。从某种意义上说，比特币就是一种特定应用区块链，只有一种应用——比特币加密货币。类似地，假设某个组织为特定目的（如审计功能）运行一条私有链，那么它也可以归类为特定应用区块链，因为它仅是为单一特定目的而开发的。\n\
  \n然而，在实践中，区块链作为一个通用平台，能够保证记录的一致性、安全性、防篡改性和有序性，使其适用于各种各样的应用。此外，根据设计的不同，单一区块链上可以运行多个应用程序。例如，以太坊可以运行名为智能合约的不同程序，使其成为一个通用区块链平台。为单一特定用例开发的区块链可以称为特定应用区块链，简写为\
  \ `ASBC`。\n\n区块链也是共享数据平台，多个组织可以以防篡改的方式共享数据，确保数据完整性。然而，如果只有一种标准区块链，这种共享是可以实现的，但自以太坊问世以来，出现了许多不同的区块链。这种多样性导致了一个问题：一条区块链运行着不同的协议，无法与另一条区块链共享数据。这种脱节导致每条区块链都是一个孤岛。为了解决这个问题，希望加入联盟网络的组织必须使用该区块链特定的软件客户端，或以某种方式设计复杂的互操作性机制。这个问题已被充分认识，关于新型互操作性协议的大量工作正在进行中。同时，新型区块链，如**异构多链**和基于分片的方法，也正在涌现。一个典型的例子是\
  \ Polkadot，这是一个可复制的分片状态机，异构链可以通过所谓的中继链相互通信。另一个努力是以太坊 2.0，其中分片链作为提供可扩展性和跨分片互操作性的机制。Cardano\
  \ 是另一条旨在提供链间可扩展性和互操作性的区块链。鉴于所有这些平台以及实现这些想法的工作进展速度，我们可以预见，在未来八到十年内，这些区块链和其他区块链将像今天的互联网一样运行，实现不同链之间数据的无缝共享。能够促进这种自然互操作性水平，从而催生一个由多个可互操作的通用企业链和\
  \ `ASBC` 组成的生态系统的链，被称为**异构多链**。\n\n现在，让我们澄清一个歧义。你可能听说过“分布式账本”这个术语，有时它被用来指代区块链。虽然区块链和分布式账本这两个术语可以互换使用，但它们之间存在区别。分布式账本是一个总括性术语，用于描述具有分布式特性的账本。区块链属于这个范畴。区块链是一种分布式账本，但并非所有分布式账本都是区块链。例如，一些分布式账本在其区块链构建中并不使用由交易组成的区块。相反，它们单独处理交易记录并以此方式存储。然而，在大多数分布式账本中，区块通常被用作一批交易以及其他几个元素（如包含多个组成部分的区块头）的容器。这种使用区块来打包交易的方式使它们成为区块链。\n\
  \n### 区块链是一种分布式系统\n\n区块链是一种分布式系统。因此，它应当根据分布式计算的原则来定义和推理。此外，这种形式化描述有助于更好地进行推理。\n\n\
  我们在第 1 章讨论了 `CAP` 定理。因此，我们可以通过 `CAP` 定理来分析区块链，以确定它属于哪种类型的系统。\n\n#### CAP 与无需许可区块链\n\
  \n无需许可区块链是 `AP`（可用性和分区容忍性）区块链，因为为了可用性而在一定程度上牺牲了一致性。我们可以说最终一致性得以实现，但由于为了可用性而牺牲了一致性（共识），我们可以说无需许可链或公有链是\
  \ `AP` 系统。例如，以太坊和比特币就是 `AP` 系统。这是由于采用工作量证明（PoW）这类概率性共识机制所致。\n\n#### CAP 与需许可区块链\n\
  \n需许可区块链是 `CP`（一致性和分区容忍性）系统，因为为了一致性而牺牲了可用性。这是因为几乎所有需许可链都使用传统的 `BFT` 协议，在这种协议中，如果节点故障达到一定阈值，整个系统就会停滞，直到故障解决，然后系统才继续运行。例如，在一个五节点网络中，如果三个节点宕机，系统将无法继续处理，除非其他节点重新上线。同样，在节点子集（如两个节点和三个节点）之间出现分区的情况下，系统也无法继续处理，除非分区愈合。这是由于使用了传统的\
  \ `BFT` 算法，如 `PBFT`。只有当存在多数诚实节点时，来自客户端的请求才会被处理。换句话说，就拜占庭容错而言，如果系统低于 `3f+1`，系统会立即降级至失效状态。\n\
  \n我们可以在图 4-2 中直观地看到这两个概念。\n\n![](img/515270_1_En_4_Fig2_HTML.png)\n\n一个三角形的顶点分别标记为一致性\
  \ `C`、分区容忍性 `P` 和可用性 `A`，在 `C` 和 `P` 之间标记为 `C P`，在 `A` 和 `P` 之间标记为 `A P`。\n\n**图\
  \ 4-2** CAP 定理与区块链\n\n接下来，我们描述区块链账本抽象，这是对区块链的一种抽象视图。\n\n\n\n#### 区块链账本抽象\n\n区块链抽象，有时也称为账本抽象，可以通过其所能执行的操作及若干属性来定义。\n\
  \n在高层面上，区块链网络中的进程可以执行三种操作：`Get()`、`append()`、`verify()`。\n\n当调用 `get()` 时，它会返回区块链（账本）当前规范状态的一个副本。\
  \  \n当调用 `append()` 时，它会创建一条新记录 *r* 并将其追加到区块链中。  \n当调用 `verify()` 时，它会验证并返回记录 *r*\
  \ 或区块链 *b* 的有效性状态。\n\n##### 属性\n\n区块链具有若干种属性，描述如下。\n\n### 一致性\n\n- 所有副本都持有相同且最新的数据副本。在公有链的情况下，通常是最终一致性；而在许可链的情况下，则是强一致性。\n\
  - 形式上，如果记录 `r` 被进程 `p` 在另一条记录 `r2` 之前首先看到，那么每个诚实的进程都会在 `r2` 之前看到 `r`。\n\n######\
  \ 容错性\n\n- 区块链是容错的分布式系统。区块链网络能够承受一定阈值内的拜占庭故障或崩溃故障。\n- 在基于 BFT 的区块链中（通常区块链中实现了 PBFT\
  \ 的变体），下限是 `3F + 1`，其中 `F` 是故障数。\n- 在基于 CFT 的区块链中（通常在联盟链中实现了 RAFT），下限是 `2F + 1`，其中\
  \ `F` 是故障数。\n- 在基于工作量证明的区块链中，下限是算力 <50%。\n\n###### 最终性\n\n- 最终性是指一笔交易被认为是不可撤销且永久确定的状态。这个事件可以是特定数量的区块、一个时间间隔，或者是共识算法执行过程中的一个步骤（阶段）。例如，在比特币中，通常是在六个区块之后，一笔交易才被认为是不可撤销的；而在使用\
  \ BFT 协议的许可链中，交易一旦提交，就被认为具有不可撤销的最终性。\n\n###### 不可篡改性\n\n- 区块链是不可篡改的，这意味着记录一旦进入账本，就永远无法被删除。\n\
  \n###### 仅追加\n\n- 新记录只能被追加到区块链中。新记录不能插入到已有记录之间。例如，新区块只能添加在最后一个最终区块之后，而不能插入在其他区块之间。\n\
  - 形式上，如果区块 `b'` 被插入在区块 `b` 之后，那么新区块 `b\"` 只能插入在 `b'` 之后，而不能插入在 `b'` 或 `b` 之前。\n\n\
  ###### 防篡改/篡改证明\n\n- 实际上，移除或重新排列区块链中已最终确定的区块是不可能的。\n- 关于区块链是防篡改还是篡改可证明，仍有争议，但出于所有实际目的，某些攻击者能够移除或重新排列区块或交易的概率几乎为零。这种保证对于所有实际目的来说已经足够好。\n\
  \n#### 有效性\n\n- 只有有效的交易和区块才会被追加到区块链中。\n\n###### 区块链操作的终止保证：`get()`、`append()`、`verify()`\n\
  \n- 最终，所有操作都会终止并返回一个结果。\n\n###### 有序性\n\n- 如果区块 `x` 发生在区块 `y` 之前，且区块 `y` 发生在区块 `z`\
  \ 之前，那么区块 `x` 也发生在区块 `z` 之前，形成传递关系。\n- 在实践中，这是一个按时间顺序排列的区块链条。\n- 这是一个有序的账本。\n\n\
  ###### 可验证性\n\n- 区块链中的所有交易和区块都是可验证的，并且遵循区块链特定的有效性谓词。任何人都可以验证交易的有效性。\n\n共识特定的属性将在第\
  \ 5 章中详细讨论。\n\n其他一些属性包括可编程性（智能合约支持）、用于机密性和用户隐私的加密账本与匿名性，以及用于在追加新区块上达成一致决策的一致性。\n\
  \n区块链也可以被视为一种状态机复制协议。区块链和状态机看起来很相似；然而，两者存在细微差别。在状态机中，日志中只存储最新状态；而在区块链状态机中，整个历史记录都会被存储，并在查询时可用。\n\
  \n比特币和区块链的发展速度已经超过了互联网。每天有成千上万的用户使用比特币。平均而言，比特币每天处理约 20 万笔交易。在以太坊上，每天处理的交易量粗略超过一百万笔，并且兴趣还在增长。与某些人持有的合理看法相反，我认为说比特币实验已经失败是不正确的。它已经实现了其最初的目标：点对点数字现金。这就是它本来的样子，并且至今仍被用作数字现金平台。比特币也刺激了进一步的创新，像以太坊，以及现在最新的区块链，如\
  \ Polkadot 和 Cardano，都已涌现。随着这种增长水平，我相信在未来八到十年内，几乎所有金融服务都将在区块链上运行，包括一些中央银行数字货币。\n\
  \n## 区块链如何工作\n\n有时，区块链在微观层面的工作方式存在细微差别；然而，在高层面上，所有区块链的工作原理基本相同。下面，我列出了显示区块链工作原理的七个关键步骤：\n\
  \n1. 两个或多个用户之间发生一笔交易。\n2. 该交易被广播到网络。\n3. 交易被验证并添加到交易池中。\n4. 矿工通过将交易添加到区块中来创建一个候选区块。\n\
  5. 矿工竞相解决工作量证明以赢得将区块插入区块链的权利，或者运行共识机制以就交易达成一致。通常，矿工运行工作量证明类型的共识机制以赢得添加区块的权利。在联盟链或私有链中，通常运行传统拜占庭故障或崩溃故障容错算法的变体，该算法通过投票就某个区块达成一致，然后将其插入区块链。\n\
  6. 如果矿工赢得权利，它将区块插入其本地链，并将该区块广播到网络。\n7. 其他节点在验证有效后接受该区块，然后过程重新开始。\n\n此过程可如图 4-3 所示。\n\
  \n![](img/515270_1_En_4_Fig3_HTML.jpg)\n\n*区块链算法的流程图，从新交易开始，到节点验证并添加新区块结束。*\n\n\
  **图 4-3** 区块链如何工作\n\n## 区块链的剖析\n\n区块链由区块组成，除了第一个创世区块外，每个区块都链接到其前一个区块。“区块链”这个术语是由中本聪首次在他的比特币代码中使用的。尽管现在它被作为一个词使用，但在他的原始比特币代码中，它被写成两个独立的词：“block\
  \ chain”。它可以被可视化为一个区块链，如图 4-4 所示。\n\n![](img/515270_1_En_4_Fig4_HTML.png)\n\n*区块链的结构图，分为创世区块、区块\
  \ 1 和区块 2 三列。区块 1 和区块 2 包含前一个区块的头哈希。*\n\n**图 4-4** 区块链的通用结构\n\n其他结构，如有向无环图、哈希图和默克尔树，现在被用于一些现代区块链的分布式账本中，以取代通常基于区块的模型。例如，Avalanche\
  \ 使用 DAG 进行存储，而不是基于线性区块的结构。当我们将在第 8 章中讨论针对这些区块链（分布式账本）的共识协议时，我们将详细介绍这些内容。\n\n\n\n\
  ### 区块\n\n区块由区块头和交易组成。区块头由多个字段构成。图 4-5 展示了一个通用的区块结构图。\n\n![](img/515270_1_En_4_Fig5_HTML.jpg)\n\
  \n区块的结构图中包含指向前一个区块哈希值的指针、`nonce`、时间戳、以及位于区块头中的默克尔根和位于区块体中的交易列表。\n\n**图 4-5** 通用区块结构\n\
  \n在本章后续关于区块链的章节中，当我介绍比特币和其他区块链时，会讨论针对特定区块链而设计的更详细的区块结构。然而，其基本结构从根本上来说就是区块头和交易，通过在当前的区块头中包含上一个区块头的哈希值来指向上一个区块，从而构建一个可验证的链表。\n\
  \n### 平台\n\n在本节中，我们将介绍两大主流区块链平台：比特币和以太坊。\n\n#### 比特币\n\n比特币由中本聪于 2008 年发明，是第一个区块链。然而，人们普遍认为这是一个化名，因为中本聪的真实身份一直是个谜。在引入比特币后，中本聪曾活跃了一段时间，但之后突然离开了社区。自此，再无他的音讯。\n\
  \n我们在本章前面讨论了创建数字货币和文档时间戳系统的前史及早期尝试。本节我将直接深入技术细节。\n\n比特币是一种点对点的电子现金系统，它解决了双重支付问题，无需依赖可信第三方。此外，比特币还具有一种名为“包容性问责制”的绝佳特性，这意味着比特币网络上的任何人都可以验证电子现金（即比特币）所有权的声明。这一特性使比特币成为一个透明且可验证的电子现金系统。\n\
  \n比特币网络由节点组成。比特币网络中有三种类型的节点：矿工节点、全节点和轻节点。矿工节点执行挖矿操作，并保存区块链的完整副本。比特币是一个由节点组成的松散耦合网络。所有节点通过点对点的传播协议进行通信。\n\
  \n##### 比特币节点与架构\n\n在实际应用中，分布式系统中的节点会运行分布式算法。类似地，在比特币中，节点运行名为 `Bitcoin Core` 的软件客户端。它可以在多种硬件上运行，包括\
  \ Intel 和 ARM 处理器。此外，支持的操作系统有 Mac OS、Linux 和 Windows。\n\n比特币网络主要包含三种不同类型的节点。全节点保存整个区块链的完整历史记录。矿工节点保存完整历史记录并参与挖矿，以向区块链添加新区块。最后，轻节点不保存整个区块链的副本。相反，它们只下载区块头，并使用一种称为简易支付验证的方法来验证交易的真实性。比特币节点架构如图\
  \ 4-6 所示。\n\n![](img/515270_1_En_4_Fig6_HTML.jpg)\n\n节点结构图包含 RPC、对等节点发现、区块、交易池、工作量证明、验证器、存储、密码学和网络连接。\n\
  \n**图 4-6** 比特币节点架构\n\n当节点启动时，它会通过一个称为节点发现的过程来发现其他节点。在此过程中，节点首先连接到种子节点，这些种子节点是由核心开发者维护的可信引导节点。在建立初始连接后，会进行后续连接。最终，会与\
  \ `x` 个其他对等节点保持活跃连接。比特币协议中还内置了垃圾邮件防护机制，该机制采用基于积分的信誉系统，根据节点尝试建立的连接次数对其进行评分。如果某个节点向另一个节点发送了过多的消息，其信誉积分将超过\
  \ 100 分的阈值，并会被屏蔽 24 小时。节点发现和节点间的握手依赖于多种协议消息。下面列出了一些协议消息及其说明。在图 4-7 中，您可以直观地看到节点握手和消息交换是如何进行的。\n\
  \n一些最常用的协议消息及其说明如下：\n\n- **Version (版本):** 这是节点向网络发送的第一条消息，用于广播其版本号和区块数量。远程节点随后会回复相同的信息，连接由此建立。\n\
  - **Verack (版本确认):** 这是对 `version` 消息的响应，表示接受连接请求。\n- **Inv (库存):** 节点使用此消息向网络广播其已知的区块和交易。\n\
  - **Getdata (获取数据):** 这是对 `inv` 消息的响应，用于请求由哈希值标识的单个区块或交易。\n- **Getblocks (获取区块):**\
  \ 该消息返回一个包含所有区块列表的 `inv` 数据包，列表从最后一个已知的哈希值之后开始，最多包含 500 个区块。\n- **Getheaders (获取区块头):**\
  \ 该消息用于请求指定范围内的区块头。\n- **Tx (交易):** 该消息用于发送一个交易，作为对 `getdata` 协议消息的响应。\n- **Block\
  \ (区块):** 该消息用于发送一个区块，作为对 `getdata` 协议消息的响应。\n- **Headers (区块头):** 该数据包最多返回 2000\
  \ 个区块头，作为对 `getheaders` 请求的回复。\n- **Getaddr (获取地址):** 该消息作为请求发送，用于获取已知对等节点的信息。\n\
  - **Addr (地址):** 该消息提供网络节点的信息。它包含地址数量以及由 IP 地址和端口号组成的地址列表。\n- **Ping (心跳):** 该消息用于确认\
  \ TCP/IP 网络连接是否处于活动状态。\n- **Pong (心跳回复):** 该消息是对 `ping` 消息的响应，用于确认网络连接处于活动状态。\n\n\
  我们可以在图 4-7 中看到这些消息的使用场景。\n\n![](img/515270_1_En_4_Fig7_HTML.png)\n\n该图展示了节点 A 和节点\
  \ B 之间交换 `version`、`verack`、`getaddr`、`ping`、`addr`、`getheaders`、`headers` 和 `getdata`\
  \ 消息以及多个区块的过程。\n\n**图 4-7** 节点发现与握手图 + 区块头与区块同步\n\n##### 比特币中的密码学\n\n密码学在比特币区块链中扮演着至关重要的角色。比特币区块链的整体安全性确实建立在密码学基础之上。虽然我们在第\
  \ 2 章中已经讨论过密码学，但现在我将具体介绍比特币中使用了哪些密码学协议以及如何使用。\n\n###### 公钥和私钥\n\n私钥用于证明比特币的所有权，用户通过使用私钥对交易进行签名来授权支付。\n\
  \n`SHA-256` 哈希函数被用于工作量证明算法中。比特币客户端中还有一个 `Base58` 编码器，用于将地址编码为比特币中可读的格式。\n\n比特币中的钱包用于存储密码学密钥。钱包使用私钥对交易进行签名。私钥是通过随机选择一个由钱包提供的\
  \ 256 位数字生成的。比特币客户端包含一个名为非确定性钱包的标准钱包。\n\n\n\n##### 地址与账户\n\n在比特币中，用户通过账户来表示。比特币地址的生成过程如图\
  \ 4-8 所示。\n\n![](img/515270_1_En_4_Fig8_HTML.jpg)\n\n该流程图展示了比特币地址的生成过程，从 ECDSA 私钥开始，以比特币地址结束。\n\
  \n**图 4-8** 比特币地址生成\n\n1. 第一步，我们有一个随机生成的 ECDSA 私钥。\n2. 从 ECDSA 私钥派生出公钥。\n3. 使用`SHA-256`加密哈希函数对公钥进行哈希运算。\n\
  4. 对步骤 3 生成的哈希值，使用`RIPEMD-160`哈希函数进行再次哈希。\n5. 将版本号添加到步骤 4 生成的`RIPEMD-160`哈希值之前。\n\
  6. 使用`SHA-256`加密哈希函数对步骤 5 产生的结果进行哈希运算。\n7. 再次应用`SHA-256`算法。\n8. 步骤 7 产生的结果的前 4 个字节即为地址校验和。\n\
  9. 将该校验和附加到步骤 4 生成的`RIPEMD-160`哈希值之后。\n10. 对得到的字节串应用 Base58 编码函数，将其编码为 Base58 格式的字符串。\n\
  11. 最终结果即是一个典型的比特币地址。\n\n##### 交易与 UTXO 模型\n\n交易是比特币中的基本操作单元。每笔交易至少包含一个输入和一个输出。未花费的交易输出（`UTXO`）是比特币交易的基本单位。交易输入引用的是之前交易的`UTXO`。交易输出则代表了未花费值的所有权转移。一个账户在比特币中的余额，等于该账户拥有的所有未花费输出的总和。因此，`UTXO`必须始终保持输入与输出相等。\n\
  \n一笔比特币交易会消耗输入，并创建具有指定值的输出。每个输入都是之前某个交易的输出。这种交易模型如图 4-9 所示。\n\n![](img/515270_1_En_4_Fig9_HTML.png)\n\
  \n一个展示比特币交易`UTXO`模型的流程图。流程包括：10 BTC，交易`t`，5 和 2 BTC，交易`t+1`以及未花费交易输出。\n\n**图 4-9**\
  \ 比特币交易`UTXO`模型\n\n比特币交易的生命周期描述如下：\n\n- 用户创建一笔交易。\n- 拥有者使用私钥对交易进行签名。\n- 通过八卦协议将交易广播到网络。\n\
  - 所有节点验证交易并将其放入各自的交易池。\n- 矿工节点将这些交易打包成一个候选区块。\n- 挖矿开始，其中一个成功解决工作量证明问题的矿工获得宣布其区块的权利，并赚取比特币作为奖励。\n\
  - 一旦该区块被广播到网络，它便会传播至整个比特币网络。\n- 经过六次确认（六个区块）后，该笔交易被视为不可撤销的最终状态；不过，在第一次确认之后也可以接受交易。\n\
  \n一个交易由多个字段组成。表 4-1 显示了所有字段及其描述。\n\n**表 4-1** 比特币交易结构\n\n| 字段 | 描述 | 大小 |\n| ---\
  \ | --- | --- |\n| 版本号 | 当前为 1 | 4 字节 |\n| 标志 | 见证数据指示器 | 可选的 2 字节数组 |\n| 输入计数器\
  \ | 输入的数量 | 1–9 字节 |\n| 输入列表 | 输入 | 多个输入 |\n| 输出计数器 | 输出的数量 | 1–9 字节 |\n| 输出列表 |\
  \ 输出列表 | 多个输出 |\n| 见证数据 | 见证数据列表 | 可变 |\n| 锁定时间 | 交易待处理的区块高度或时间戳 | 4 字节 |\n\n交易分为两种类型。链上交易是比特币网络的原生交易，而链下交易则在区块链网络之外进行。链上交易发生在区块链网络上，由网络参与者进行链上验证；而链下交易则使用支付通道或侧链来执行交易。链上交易速度较慢，存在隐私问题，且可扩展性不佳。链下机制旨在解决这些问题。一个典型的例子是比特币闪电网络，它提供了更快速的支付。\n\
  \n##### 比特币脚本与 Miniscript\n\n比特币脚本是一种非图灵完备的、基于堆栈的语言，用于描述比特币应该如何被转移。脚本在 LIFO（后进先出）堆栈中从左到右进行求值。脚本由元素和操作两部分组成，如图\
  \ 4-10 所示。元素代表数据，例如数字签名；操作则是脚本执行的动作。操作被编码为操作码。操作码包括流程控制、堆栈操作、按位逻辑运算、算术运算、密码学操作和锁定时间等操作类别。\n\
  \n一些常见的操作码列举如下：\n\n- `OP_CHECKSIG`：接受一个签名和一个公钥，验证交易的 ECDSA 签名。如果正确，则返回 1，否则返回 0。\n\
  - `OP_DUP`：取出堆栈顶部的项并复制它。\n- `OP_HASH160`：计算输入的 SHA-256 哈希，然后计算 RIPEMD-160 位哈希。\n\
  - `OP_EQUAL`：检查堆栈顶部两项是否相等。若相等，则在堆栈上输出`TRUE`，否则输出`FALSE`。\n- `OP_VERIFY`：检查堆栈顶部的项是否为假；如果是，则脚本终止并输出失败。\n\
  - `OP_EQUALVERIFY`：先运行`OP_EQUAL`，然后运行`OP_VERIFY`。\n- `OP_RETURN`：终止脚本，输出失败，并将该交易标记为无效。\n\
  - `OP_ADD`：接受两个输入并执行求和操作。\n\n脚本由一个称为`ScriptPubKey`的锁定脚本和一个称为`ScriptSig`的解锁脚本组合而成，如图\
  \ 4-10 所示。输出由`ScriptPubKey`锁定，其中包含了输出的解锁条件。换句话说，锁定意味着将比特币给予某人，而解锁意味着消费收到的比特币。\n\n\
  ![](img/515270_1_En_4_Fig10_HTML.jpg)\n\n这幅比特币脚本示意图被分为两部分：标记为`ScriptSig`的“消费比特币”部分和标记为`ScriptPubKey`的“发送比特币”部分。\n\
  \n**图 4-10** 比特币脚本（解锁 + 锁定）示意图\n\n比特币中有几种类型的脚本。最常见的是支付到公钥哈希（P2PKH），用于向比特币地址发送交易。该脚本的格式如下所示：\n\
  \n```\nScriptPubKey: OP_DUP OP_HASH160  OP_EQUALVERIFY OP_CHECKSIG\nScriptSig: \
  \ \n```\n\n`ScriptPubKey`和`ScriptSig`会被组合起来并执行，如图 4-11 所示。\n\n![](img/515270_1_En_4_Fig11_HTML.jpg)\n\
  \n一个关于比特币 P2PKH 脚本执行的表格包含两列，分别为`ScriptSig`和`ScriptPubKey`，以及三行，分别为脚本、堆栈和执行。\n\n\
  **图 4-11** 比特币 P2PKH 脚本执行\n\n虽然比特币脚本是传输支付的原始方法，并且运行良好，但它的灵活性不高。有一种为比特币开发的语言支持智能合约的开发，该语言被称为`Ivy`。一种使编写脚本更简单、更有条理的解决方案是比特币`miniscript`。\n\
  \n\n\n#### 区块与区块链\n\n区块链由区块构成。区块则由区块头和交易组成。区块头包含多个字段。比特币区块链中的第一个区块被称为创世块，作为首区块它与任何区块均无回溯链接。该区块通常被硬编码在软件客户端中。\n\
  \n我们可以在图 4-12 中看到区块、区块头、交易和脚本的完整可视化展示。\n\n![](img/515270_1_En_4_Fig12_HTML.jpg)\n\
  \n比特币区块链流程图。流程依次为脚本公钥、脚本签名、输入、交易、默克尔根、区块头、区块 2 和区块 1。\n\n图 4-12\n\n比特币区块链、区块、区块头、交易和脚本的可视化展示\n\
  \nFLM^(³)不可能性指出，如果攻击者能够控制超过 ![$$ \\frac{n}{3} $$](img/515270_1_En_4_Chapter_TeX_IEq1.png)\
  \ 个节点，则无法实现拜占庭共识。在 PKI 设置的情况下，这一下限并不成立。事实证明，比特币规避了 FLM 不可能性。在工作量证明环境中，无需 PKI^(⁴)设置即可达成拜占庭协议。\n\
  \n### 挖矿\n\n挖矿是将新币添加到比特币区块链的过程。该过程保护了网络的安全，并激励那些投入资源保护网络的用户。关于具体细节的更多信息请参见第 5 章；不过，现在我将简要介绍一下挖矿硬件。比特币刚推出时，使用\
  \ CPU 挖矿很容易，但难度迅速增加，导致矿工转向使用 GPU。在 GPU 成功采用后不久，FPGA 作为一种进一步加速 SHA-256 哈希运算的机制而出现。很快，它们便被\
  \ ASIC 超越，如今 ASIC 已成为比特币挖矿的主流机制。然而，由于挖矿难度过高，个人用户使用挖矿硬件进行独立挖矿获利甚微。相比之下，由数千台 ASIC\
  \ 组成的矿场现在更为常见。此外，矿池也很普遍，多个用户共同求解哈希难题，并根据贡献比例获得收益。\n\n### 作为平台的比特币\n\n除了作为电子现金，比特币还可用作多种用途的平台。例如，它可以作为时间戳服务或用作永久存储某些信息的通用账本。此外，我们可以使用`OP_RETURN`指令来存储数据，该指令最多可存储\
  \ 80 字节的任意数据。其他用途，如智能财产、智能资产以及将区块作为随机性来源等也相继出现。\n\n将比特币用于不同目的的愿望也催生了增强比特币的技术，从而产生了彩色币、根链、Omni\
  \ 层和对手方等项目。尽管比特币实现了其预期目标，并通过前述创新实现了更多功能，但比特币协议的根本性限制意味着所有灵活的新协议都必须构建在比特币之上。比特币本身不具备执行所有这些不同任务的内在灵活性。因此，人们感到有必要在区块链上实现超越加密货币的功能。这一雄心促成了以太坊的发明，这是第一个支持智能合约的通用区块链平台。\n\
  \n## 以太坊\n\n以太坊于 2014 年由维塔利克·布特林在一份白皮书中提出。以太坊引入了一个平台，用户可以在其上以智能合约的形式运行任意代码。为了防止因代码中的无限循环而导致的拒绝服务攻击，还引入了计量执行的概念。计量执行要求对区块链上的每项操作收取费用，该费用用以太坊的原生货币以太币支付。借助智能合约，以太坊开启了一个全新的通用平台世界，操作不再仅限于比特币式的价值转移交易，由于以太坊的图灵完备设计，用户可以在链上执行任何类型的多样化业务逻辑。以太坊目前是智能合约领域使用最广泛的区块链平台。\n\
  \n如今的互联网是中心化的，由大型公司主导。我们今天使用的互联网称为 Web 2.0。以太坊是基于 Web3 的愿景开发的，在 Web3 中，任何人都可以参与网络，无需依赖任何第三方。在\
  \ Web 2.0 模式中，大型服务提供商目前以提供个人数据为回报来提供服务；然而，在 Web3 中，任何人都可以参与，而无需为了换取服务而放弃个人信息。此外，通过去中心化应用程序（DApps），任何人都可以提供任何服务，网络上的任何用户都可以使用这些服务，并且没有人能阻止你访问该服务。\n\
  \n### 以太坊网络\n\n以太坊网络由松散耦合的节点组成，这些节点通过八卦协议交换消息。\n\n以太坊网络的高级可视化如图 4-13 所示。\n\n![](img/515270_1_En_4_Fig13_HTML.jpg)\n\
  \n以太坊网络流程图，从以太坊客户端、智能合约开发者、DApp 和钱包用户开始，最终到达其他以太坊客户端。\n\n图 4-13\n\n以太坊网络高级概述\n\n\
  节点运行客户端软件，该软件是黄皮书中描述的以太坊区块链协议的一种实现，使任何用户都能参与网络。如图 4-14 所示，节点由不同的组件构成。\n\n![](img/515270_1_En_4_Fig14_HTML.jpg)\n\
  \n结构图包含 RPC、节点发现、EVM、区块、内存池、PoW、验证器、状态与存储、密码学和网络。\n\n图 4-14\n\n以太坊节点架构\n\n以太坊网络中有三种主要的节点类型：\n\
  \n*   全节点\n*   轻节点\n*   归档节点\n\n全节点存储整个链数据，并验证区块、交易和状态。轻节点仅存储区块头，并根据区块头中的状态根来验证数据。轻节点适用于资源受限的设备，例如移动设备。归档节点包含全节点中的所有内容，同时还构建了历史状态的归档。矿工节点是全节点，但同时也执行挖矿操作并参与工作量证明共识。\n\
  \n一个加入网络的新以太坊节点使用硬编码的引导节点作为进入网络的初始入口点，从中开始进一步发现其他节点。\n\n`RLPx`是一种基于 TCP 的传输协议。它通过使用椭圆曲线集成加密方案（ECIES）进行握手和密钥交换，实现了以太坊节点间的安全通信。\n\
  \n`DEVP2P`（或称为线协议）负责在两个已经发现彼此并使用`RLPx`建立安全通道的以太坊节点之间协商应用会话。\n\n在发现节点、建立安全传输通道并协商好应用会话之后，节点使用“能力协议”交换消息，例如`eth`（版本\
  \ 62、63 和 64）、轻量级以太坊子协议（LES）、Whisper 和 Swarm。这些能力协议或应用子协议实现了不同的应用层通信，例如用于区块同步的`eth`。\n\
  \n节点发现协议和其他相关协议如图 4-15 所示。\n\n![](img/515270_1_En_4_Fig15_HTML.png)\n\n图表有四列，标记为发现协议-discV4、RLPx、DevP2P-线协议以及子协议，例如\
  \ Eth 能力协议。\n\n图 4-15\n\n节点发现与其他协议\n\n\n\n#### 以太坊中的密码学\n\n与其他区块链一样，以太坊的安全性依赖于密码学。以太坊在区块链和节点设计中广泛使用了密码学：\n\
  \n- `AES CTR` 用于 RLP 握手以及随后的 P2P 消息传递。它也在钱包文件中以 `AES CTR 128-bit` 密码的形式使用。\n- 以太坊客户端中的数字签名使用\
  \ `SECP256K1` 曲线。该曲线用于交易签名的 `ECDSA` 签名、`ECDH` 密钥交换，以及在 RLP P2P 握手之前生成共享密钥。\n- `SCRYPT`\
  \ 和 `PBKDF2` 在钱包文件中用作密钥派生函数。\n- `KECCAK-256` 哈希函数用于挖矿和工作量证明算法以及 Solidity 语言中。\n\
  - 椭圆曲线集成加密方案 (`ECIES`) 在以太坊中得到应用。\n\n如果上述术语听起来有些陌生，请参考第 2 章，我们在那里详细介绍了密码学。\n\n#####\
  \ 账户与地址\n\n比特币模型基于交易，而以太坊则基于账户。账户是以太坊状态的一部分，并保持着固有的余额和交易计数。160 位长的地址用于标识账户。账户是用户与区块链交互的方式。由账户签名的交易被验证并广播到网络，一旦执行，就会导致区块链上的状态转换。账户分为两种类型：合约账户\
  \ (`CAs`) 和外部拥有账户 (`EOAs`)。`EOAs` 与人类用户关联，而 `CAs` 则与用户没有内在关联。\n\n世界状态是地址与账户状态之间的映射。一个账户状态包含表\
  \ 4-2 中所示的字段。\n\n**表 4-2 账户状态**\n\n| 元素 | 描述 |\n| --- | --- |\n| `Nonce` | 从一个地址发起的交易数量，或者对于智能合约而言，是一个账户创建的合约数量\
  \ |\n| `Balance` | 该地址拥有的 `Wei` 数量 |\n| `StorageRoot` | Merkle Patricia 树根节点的 256\
  \ 位哈希，该树编码了账户的存储内容 |\n| `codeHash` | 关联的 EVM 代码（字节码）的哈希 |\n\n#### 交易与执行\n\n以太坊中的交易是经过签名的指令，执行后会在区块链上产生消息调用或合约创建（创建与代码关联的新账户）。从根本上说，有两种类型的交易：**消息调用**和**合约创建**，但随着时间的推移，为了便于理解，现在通常定义为三种类型：\n\
  \n- 价值转移交易\n- 合约创建交易\n- 合约执行交易\n\n一笔交易由几个字段组成。每笔交易都是交易树的一部分，交易树的根存储在区块的区块头中。当交易执行时，会返回一个收据，该收据可用作交易执行的验证。\n\
  \n无论是消息调用还是合约创建，交易都包含表 4-3 中所示的公共字段。\n\n**表 4-3 交易结构**\n\n| 元素 | 描述 |\n| --- | ---\
  \ |\n| `Nonce` | 发送方已发送的交易数量 |\n| `gasPrice` | 为执行交易每单位 Gas 需支付的 `Wei` 数量 |\n| `gasLimit`\
  \ | 预计用于执行交易的最大 Gas 量。它需要预先支付，并且之后不能增加 |\n| `to` | 消息调用（价值转移、合约执行）接收方的 160 位地址，或用于合约创建交易\
  \ |\n| `value` | 要转移到消息调用接收方的 `Wei` 数量。在合约创建的情况下，它是新创建的合约账户（智能合约）的初始资金（`Wei` 数量）\
  \ |\n| `V`、`R`、`S` | 用于确定交易发送方的交易签名对应的值 |\n| `init` | （在合约创建交易的情况下）一个不限大小的字节数组，指定用于合约账户（智能合约）初始化过程的\
  \ EVM 代码 |\n| `data` | （在消息调用交易的情况下）一个不限大小的字节数组，指定消息调用的输入数据 |\n\n一笔交易在以太坊区块链中会经历几个步骤。高层次交易流程描述如下：\n\
  \n1.  首先，创建一笔交易。它可以是合约创建交易或消息调用。\n2.  使用 `ECDSA` 对交易进行签名、验证，并广播到网络。\n3.  交易通过八卦协议传播，并被矿工和其他节点接收，填充到它们的交易池中。\n\
  4.  矿工通过向其添加交易来创建候选区块，并启动挖矿过程。\n5.  解决了工作量证明问题的矿工向网络宣布其区块。\n6.  其他节点接收该区块，对其进行验证，并将其追加到自己的区块链上。\n\
  \n#### 区块与区块链\n\n以太坊中的区块由区块头和交易组成。区块链由包含交易的区块组成。\n\n与其他区块链一样，区块是以太坊的主要构建模块。一个以太坊区块包含区块头、交易列表和叔块（Ommer）头列表。区块头也由几个元素组成。区块中的所有元素及其描述如表\
  \ 4-4 和 4-5 所示。\n\n**表 4-4 区块结构**\n\n| 元素 | 描述 |\n| --- | --- |\n| 区块头 | 区块的头部 |\n\
  | 交易列表 | 包含在区块中的一系列交易 |\n| 叔块（Ommer）头列表 | 叔块（Uncle 或 Ommer）头的列表。叔块是父区块的子区块，但没有任何子区块。它们是有效但过时的区块，虽然无法加入主链，但其参与挖矿可以获得奖励\
  \ |\n\n区块头结构如表 4-5 所述。\n\n**表 4-5 区块头结构**\n\n| 元素 | 类型 | 描述 |\n| --- | --- | ---\
  \ |\n| `Parent hash` (父哈希) | `Hash` | 父区块头的 `Keccak 256 位` 哈希 |\n| `Ommers hash`\
  \ (叔块哈希) | `Hash` | 叔块列表的 `Keccak 256 位` 哈希 |\n| `Beneficiary` (受益者) | `Address`\
  \ | 用于接收挖矿奖励的 160 位接收方地址 |\n| `State root` (状态根) | `Hash` | 状态树根节点的 `Keccak 256\
  \ 位` 哈希 |\n| `Transaction root` (交易根) | `Hash` | 交易树根节点的 `Keccak 256 位` 哈希 |\n|\
  \ `Receipts root` (收据根) | `Hash` | 交易收据树根节点的 `Keccak 256 位` 哈希，该树包含了区块中所有交易的收据 |\n\
  | `Logs bloom` (日志布隆过滤器) | `Variable` | 由日志记录器地址和日志主题组成的布隆过滤器 |\n| `Difficulty`\
  \ (难度) | `Integer` | 当前区块的难度级别 |\n| `Number` (编号) | `Integer` | 所有先前区块的总数量（即区块高度）\
  \ |\n| `Gas limit` (Gas 上限) | `Integer` | 每个区块 Gas 消耗量的上限 |\n| `Gas used` (已用 Gas)\
  \ | `Integer` | 区块中所有交易消耗的 Gas 总量 |\n| `Timestamp` (时间戳) | `Integer` | Unix 纪元时间戳\
  \ |\n| `Extra` (附加数据) | `Variable` | 用于存储额外数据的可选自由字段 |\n| `MixHash` | `Integer`\
  \ | 计算工作量证明 |\n| `Nonce` | `Integer` | 与 `MixHash` 结合使用以证明计算工作量 |\n| `basefeepergas`\
  \ (基础费用/每 Gas) | `Integer` | （`EIP-1559` 之后）记录协议计算出的、交易被纳入区块所需支付的费用 |\n\n以太坊使用一种称为\
  \ Merkle Patricia 树的新型数据结构来存储和组织交易及相关数据。它是 Patricia 树和默克尔树的结合，具有新颖的特性。\n\n以太坊使用了四种树来组织数据，如交易、状态、收据和合约存储。\n\
  \n##### 交易树（Transaction Trie）\n\n每个以太坊区块都包含一个交易树的根，该树由交易组成。\n\n\n\n##### 世界状态树\n\
  \n状态树是一个将用户地址映射到账户状态的键值对结构。它也被称为世界状态树，其根哈希被保存在区块中。状态树由多个账户状态组成。\n\n##### 交易收据树\n\
  \n交易收据存储了交易执行结果，包含状态、日志和事件等信息。每个区块都包含一棵交易收据树。交易收据树由多个交易收据组成。\n\n##### 账户存储树\n\n\
  这棵树的根哈希作为存储根保存在账户状态中。它用于存储智能合约代码及相关数据。\n\n图 4-16 展示了包括区块结构在内的所有树。\n\n![](img/515270_1_En_4_Fig16_HTML.png)\n\
  \n该图以列表形式呈现了树和区块结构。列出的树包括收据树、交易树、账户存储树和世界状态树。\n\n图 4-16\n\n区块与树\n\n区块内的交易通过以太坊虚拟机执行，我们接下来将对此进行描述。\n\
  \n### 以太坊中的挖矿\n\n与比特币不同，以太坊的挖矿具有抗 ASIC（专用集成电路）特性。\n\n基于 ASIC 的专用、高效且极快的硬件是为执行比特币挖矿而构建的。这些设备只有一项特定任务，即反复且极快地运行哈希函数`SHA-256`。\n\
  \n以太坊使用了工作量证明机制；然而其共识算法对内存要求很高，由于内存需求巨大，这使得构建 ASIC 变得困难。该协议被称为`ETHASH`，它会生成一个大型有向无环图（DAG）供矿工使用。DAG\
  \ 会根据网络难度级别增长或缩减；但随着时间的推移，其大小已增长到约 4 GB。由于这个 DAG 消耗大量内存，构建具有如此大内存的 ASIC 极其困难，因此使得`ETHASH`成为一种抗\
  \ ASIC 算法。我们将在第 8 章更详细地解释`ETHASH`。\n\n### 以太坊虚拟机与智能合约\n\n以太坊虚拟机（EVM）是以太坊区块链的核心工作引擎。它是一个深度为\
  \ 1024 项的 256 位寄存器栈。它被设计用于执行编译为字节码的智能合约代码。智能合约通常用一种名为 Solidity 的领域特定语言（DSL）编写；不过也存在其他语言，如\
  \ Vyper，开发者也可用来编写智能合约代码。\n\n我们可以将智能合约定义为一个安全且无法停止的计算机程序，它代表了一种可自动执行且可强制执行的协议。智能合约不一定需要区块链；然而，区块链是运行智能合约最自然的平台。这是因为区块链提供了所有安全保障，使得智能合约安全、无法停止、可自动执行且可强制执行。\n\
  \nEVM 被设计为图灵完备的；但它受到 gas 限制的约束，这意味着其执行是计量的，并以以太币计价的所谓 gas 费来支付。这种机制允许执行任意代码，但安全地保证当\
  \ gas 耗尽时执行将会停止，从而防止因循环或恶意代码导致的无限执行。EVM 执行由操作码组成的字节码，每个操作都需要消耗 gas。大约有 150 种操作码，分为几类：算术操作码、内存操作码和程序流程相关操作码。完整的列表可在以太坊黄皮书中找到。\n\
  \n以太坊的共识基于工作量证明，我们将在第 8 章详细介绍。\n\n以太坊 1.0 区块链将根据其路线图继续发展，并最终在以太坊 2.0 的第一阶段成为一个分片。\n\
  \n至此，我们完成了对这两个最突出且最具开创性的区块链平台的简要讨论。更多现代区块链平台，如 Polkadot、Cardano、Solana、Avalanche\
  \ 和以太坊 2.0，将在第 8 章讨论它们各自的共识协议时予以介绍。\n\n## 总结\n\n*   区块链是一个点对点、加密安全、只能追加、不可变且防篡改的共享分布式账本，由按时间顺序排列且可公开验证的交易组成。\n\
  *   区块链的起源可以追溯到早期创建数字货币和文档数字时间戳的尝试。\n*   区块链是一个分布式系统。\n*   区块链主要分为两类：许可链和公有链。\n\
  *   区块链有许多跨行业用例，包括但不限于政府、金融、医疗、供应链和技术领域。\n*   区块链提供了诸多好处，例如节省成本、提高透明度和促进数据共享。\n\
  *   公钥密码学、哈希函数和默克尔树等多种技术为构建区块链的安全性提供了基础。\n*   从 CAP 定理的角度来看，许可链是 CP 系统，而公有链是 AP\
  \ 系统。\n*   区块链账本抽象具有几种特性，以及`get()`、`append()`和`verify()`操作。\n*   比特币是中本聪发明的第一个区块链。\n\
  *   以太坊是 Vitalik Buterin 提出的第一个智能合约区块链平台。\n*   比特币和以太坊是最突出的平台。\n*   以太坊将成为以太坊 2.0\
  \ 的一个分片。\n*   现代区块链平台正专注于异构多链架构，其中多个链相互操作，形成一个合作和互操作的区块链生态系统，服务于多种用例。\n\n"
- "# 5. 区块链共识\n\n区块链共识是区块链的核心要素，它确保了区块链数据的完整性和一致性。区块链作为一个分布式系统，乍一看，我们似乎可以应用传统的分布式共识协议，如\
  \ Paxos 或 PBFT，来解决区块链中的一致性和全序要求。然而，这只适用于联盟链，因为其中的参与者是已知且数量有限的。在公有链中，由于无许可环境，传统的共识协议无法工作。然而，在\
  \ 2008 年，出现了一类新的共识算法，该算法依靠工作量证明，通过解决一个数学难题来确保随机领导者选举。被选出的领导者获得向区块链追加数据的权利。这就是所谓的中本聪共识协议。该算法首次解决了存在大量匿名参与者的无许可公共环境中的共识问题。\n\
  \n我们已经在第 3 章从传统角度讨论了分布式共识。在本章中，我们将介绍什么是区块链共识，如何将传统协议应用于区块链，工作量证明如何工作，它是如何发展的，以及区块链共识的要求是什么，并且我们将通过分布式共识的视角来分析诸如工作量证明等区块链共识。此外，我们还将看到共识的要求如何根据所使用的区块链类型而变化。例如，对于公有链，工作量证明可能是一个更好的主意，而对于许可链，BFT\
  \ 风格的协议可能效果更好。\n\n\n\n## 背景\n\n分布式共识一直是分布式系统中的基本问题。同样，在区块链中，它在确保区块链完整性方面也发挥着关键作用。在过去近\
  \ 45 年的分布式共识研究中，主要涌现出两大类算法：\n\n1.  基于领导者的传统分布式共识（或称许可型共识）\n2.  中本聪及后中本聪共识（或称非许可型共识）\n\
  \n基于领导者的协议基于投票原则运作，即分布式系统中的节点通过投票来执行某项操作。这类协议通常是确定性的，自 20 世纪 70 年代以来便一直在研究中。一些此类协议包括`Paxos`、`PBFT`和`RAFT`。另一类不同的协议于\
  \ 2008 年随比特币问世而出现，它依赖于工作量证明这类密码学难题。这类协议是概率性的，参与者通过解决工作量证明来赢得向区块链追加新区块的权利。\n\n通常，在区块链世界中，会使用拜占庭容错协议，这主要是因为区块链预计要在公开环境或联盟环境中运行，而恶意攻击在这些环境中是真实存在的。在参与者身份已知的联盟链上，情况或许没那么严重，但由于在这些平台上运行的企业应用的性质，最好还是考虑采用拜占庭容错模型。与金融、医疗、电子政务以及许多其他用例相关的应用都运行在联盟链上；因此，有必要确保能够抵御包括主动攻击者在内的任意故障。\n\
  \n这两种方法各有利弊。与工作量证明类算法相比，传统的 BFT 协议或其区块链变体能够提供更强的一致性，而工作量证明类算法只能提供最终一致性。然而，与传统的 BFT\
  \ 协议相比，工作量证明共识的可扩展性要高得多。表 5-1 对 BFT 与 PoW 共识进行了比较。\n\n**表 5-1** 传统 BFT 与中本聪共识对比\n\
  \n| 属性 | 传统 BFT | 中本聪 |\n| --- | --- | --- |\n| 一致性 | 确定性 | 最终性 |\n| 终止性 | 确定性 |\
  \ 概率性 |\n| 能源消耗 | 低 | 非常高 |\n| 女巫攻击抵抗性 | 否 | 是 |\n| 最终性 | 即时 | 概率性 |\n| 一致性 | 更强\
  \ | 较弱（最终一致性） |\n| 通信模式 | 广播 | 流行病式传播 |\n| 吞吐量（TPS） | 更高 | 低 |\n| 可扩展性 | 较低（10–100\
  \ 个节点） | 较高（数千个节点） |\n| 分叉 | 无 | 可能发生 |\n| 身份 | 已知 | 匿名（假名） |\n| 网络 | 点对点 | 点对点\
  \ |\n| 顺序 | 时序性 | 时序性 |\n| 形式化严谨性（正确性证明等） | 是 | 基本不存在 |\n| 容错能力 | 1/3，<=33% | <=25%\
  \ 算力 / >50% 算力 |\n| 客户端数量 | 多 | 多 |\n\n另一个需要牢记的要点是广播问题与共识问题之间的区别。**共识（Consensus）**\
  \ 是一个决策问题，而**广播（Broadcast）** 是一个交付问题。两者的属性相同，但定义略有差异。这些属性包括一致性（Agreement）、有效性（Validity）、完整性（Integrity）和终止性（Termination）。本质上，广播和共识是相互关联且深度耦合的问题，因为可以通过一个来实现另一个。\n\
  \n我们将更多地关注共识问题而非广播问题。\n\n## 区块链共识\n\n区块链共识协议是一种机制，它允许区块链系统中的参与者即使在存在故障的情况下也能就交易序列达成一致。换句话说，共识算法确保即使某些参与方发生故障，所有参与方也能就单一的事实来源达成一致。\n\
  \n与区块链共识相关的一些属性。这些属性与标准分布式共识几乎相同，但略有变化。\n\n标准上来说，存在安全性和活跃性属性。安全性和活跃性属性会根据区块链的类型而改变。首先，我们为许可型/联盟链定义安全性和活跃性属性，然后为公有链定义。\n\
  \n### 传统 BFT\n\n我们可以为传统 BFT 共识定义若干属性，这些属性通常用于许可型区块链中。存在多种变体，例如，区块链中使用的`Tendermint`。我们在第\
  \ 3 章中详细介绍了传统 BFT；然而，在本节中，我们将在区块链（特别是许可型区块链）的背景下重新定义它。大多数属性与公共非许可型共识保持一致；然而，关键区别在于确定性与概率性的终止性和一致性。\n\
  \n### 一致性\n\n没有两个诚实的进程会决定不同的区块。换句话说，没有两个诚实的进程会在相同高度提交不同的区块。\n\n#### 有效性\n\n如果一个诚实的进程决定了一个区块\
  \ `b`，那么 `b` 必须满足特定于应用的有效性谓词 `valid()`。此外，达成一致的区块 `b` 必须是由某个诚实节点提议的。\n\n### 终止性\n\
  \n每个诚实的进程最终都会做出决定。在全局稳定时间之后，每个诚实的进程会持续提交区块。\n\n一致性和有效性是安全性属性，而终止性是活跃性属性。\n\n####\
  \ 完整性\n\n在一个共识轮次中，一个进程最多只能决定一次。\n\n其他属性可能包括以下内容。\n\n##### 链式进展（活跃性）\n\n区块链必须在 GST\
  \ 之后通过不断追加新区块来保持增长。\n\n##### 即时不可撤销性\n\n一旦交易被纳入区块并且该区块被最终确定，该交易就无法被移除。\n\n#### 共识最终性\n\
  \n最终性是确定性的且即时的。交易一旦被纳入区块即为最终确定，区块一旦被追加到区块链上即为最终确定。\n\n尽管现在有许多区块链共识算法，但中本聪共识是首个随比特币引入的区块链协议，它具有若干新颖的特性。实际上，它并非具有确定性属性的经典拜占庭算法；相反，它具有概率性特征。\n\
  \n### 中本聪共识\n\n中本聪共识（或称 PoW 共识）可以通过若干属性来刻画。它通常用于公有区块链中，例如比特币。\n\n### 一致性\n\n最终，没有两个诚实的进程会决定不同的区块。\n\
  \n#### 有效性\n\n如果一个诚实的进程决定了一个区块 `b`，那么 `b` 必须满足特定于应用的有效性谓词 `valid()`。此外，区块内的交易必须满足特定于应用的有效性谓词\
  \ `valid()`。换句话说，只有有效且正确的交易才能被纳入区块，只有正确且有效的区块才能被追加到区块链上。节点只会接受有效的交易和区块。同时，挖矿节点（矿工）也只接受有效的交易。此外，决定的值必须是由某个诚实的进程提议的。\n\
  \n\n\n### 终止性\n\n每个诚实节点最终都会做出决定。\n\n协定性和有效性是安全属性，而终止性是活跃性属性。\n\n注意\n\n在公有区块链网络中，经济激励通常与共识属性相关联，这样，致力于确保网络安全性和活跃性的参与者会因此获得经济上的激励。\n\
  \n还记得我们在第 3 章中讨论过的随机算法，其中终止性以概率方式得到保证。随机化协议用于规避 FLP 不可能性。通常，终止性属性被设计为概率性的，以达成协定从而规避\
  \ FLP 不可能性。然而，在比特币区块链中，协定性属性被设计为概率性的，而非终止性。这里，安全属性在一定程度上被牺牲了，因为在比特币区块链中，允许暂时发生分叉，当分叉被解决时，一些先前已确定的交易会被回滚。这是由于最长链规则导致的。\n\
  \n我们现在描述另外几个属性。\n\n#### 共识最终性\n\n对于两个正确的进程`p1`和`p2`，如果`p1`在其本地区块链上追加了一个区块`b`在另一个区块`b'`之前，那么没有其他正确节点会在区块`b`之前追加`b'`。\n\
  \n从工作量证明区块链的角度来看，我们可以进一步提炼出一些属性。\n\n#### 链进展（活跃性）\n\n一条区块链必须通过新块持续不断地追加到其上而稳定增长，每隔`n`时间间隔追加一次。`n`可以是由协议预定义的时间间隔。\n\
  \n#### 一致性/一致性\n\n区块链最终必须愈合分叉链，以形成一条单一的最长链。换句话说，每个人都必须看到相同的历史。\n\n#### 最终不可撤销性\n\
  \n一笔交易被回滚的概率随着更多区块被追加到区块链上而降低。从最终用户的角度来看，这是一个至关重要的属性，因为这个属性给用户带来信心：在他们的交易成为区块的一部分并被最终确定和接受后，新加入的区块会进一步确保该交易永久且不可撤销地成为区块链的一部分。\n\
  \n表 5-1 展示了传统拜占庭容错共识与中本聪共识之间的一些关键区别。\n\n现在我们将注意力转向系统模型，描述这些模型是必要的，因为它们捕捉了我们对区块链共识协议运行环境所做的假设。\n\
  \n## 系统模型\n\n区块链共识协议假设了一个系统模型，在该模型下，它们保证安全性和活跃性属性。在此，我描述两种系统模型，它们分别普遍适用于公有链和许可链系统。\n\
  \n### 公有区块链系统模型（无许可）\n\n区块链是一个分布式系统，其中节点通过消息传递进行通信。在公有区块链中，广播协议通常是概率性的，其中交易（消息）通过利用八卦风格的协议进行传播。\n\
  \n通常，网络模型是异步的，因为处理器延迟或通信延迟没有上限，尤其是因为公有区块链系统很可能是异构且地理上分散的。节点彼此不认识，也不知道系统中总共有多少个节点。节点可以任意加入和离开网络。任何人只需在网络上运行协议软件即可加入。\n\
  \n### 联盟区块链系统模型（许可）\n\n在此模型中，区块链节点通过消息传递进行通信。在共识协议中，广播协议通常是一对所有的通信。例如，在 PBFT 中，领导者将其提议一次性广播给所有副本，而不是像我们在八卦传播中看到的那样，先将消息发送给少数节点，再由这些节点发送给其他节点。此外，网络模型是部分同步的。更准确地说，区块链共识协议在最终同步模型下建模，在该模型中，经过一个未知的全局稳定时间（GST）后，系统保证能够取得进展。\n\
  \n现在，让我们将注意力转向第一个区块链共识协议，并探索其工作原理：工作量证明协议，即中本聪共识。\n\n\n\n## 首个区块链共识机制\n\n工作量证明共识算法（即中本聪共识）最早于\
  \ 2008 年随比特币区块链问世。它本质上是一种领导者选举算法，要求在两次选举之间强制执行随机等待时间。这种机制同时也是抵御女巫攻击的手段。传统分布式共识协议的一个弱点在于，它们要求每个参与者在协议中都是已知且可识别的。例如，在`PBFT`中，所有参与者必须已知且可识别。这种限制（尽管在联盟链中有用）使得\
  \ BFT 类协议在某种程度上不适用于公有链。原因在于攻击者可以创建多个身份，并利用这些节点/身份为自己投票。这便是所谓的女巫攻击。如果我们能让在区块链上创建并使用身份的行为成本高昂，那么这种设置就能挫败任何女巫攻击的企图，阻止攻击者通过创建大量虚假身份来控制网络。\n\
  \n“女巫攻击”一词源自 1973 年出版的一本名为《*女巫*》（Sybil）的书，书中主角名叫西比尔·多塞特（Sybil Dorsett），患有多重人格障碍。\n\
  \n首个工作量证明由 Dwork 和 Naor 于 1992 年提出[1]。这项工作旨在打击垃圾邮件，通过为发送电子邮件关联计算成本（即定价函数），形成一种访问控制机制——只有通过计算一个中等难度的函数才能获得资源访问权，从而防止过度使用。工作量证明也曾出现在\
  \ Adam Back 的 Hashcash 提案[10]中。\n\n区块链中引入工作量证明的核心直觉是，普遍降低所有参与者的提案速度，这实现了两个目标：第一，它使所有参与者能就一个共同且一致的视图达成共识；第二，它使女巫攻击变得极其昂贵，从而有助于维护区块链的完整性。\n\
  \n已有研究表明，即使网络中只有一个拜占庭节点，在参与者匿名的情况下达成一致也是不可能的（不可能性结果）[2]。这是因为女巫攻击可以创建任意数量的身份，通过多次投票来为攻击者操纵系统。只有找到阻止此类攻击的方法，系统才能按预期工作；否则，攻击者可以创建任意多的身份来攻击系统。这一难题在实际中通过工作量证明共识（即中本聪共识）得到了解决[3]。在比特币之前，利用中等难度谜题在匿名网络中分配身份的想法最早由\
  \ Aspnes 提出[4]。然而，Aspnes 提出的解决方案需要认证通道，而比特币使用的是非认证通信，且谜题是非交互式且可公开验证的。\n\n因此，即使在经典文献中存在上述不可能性结果的情况下，中本聪共识依然诞生了，它首次展示了在无许可模式下也能达成共识。\n\
  \n请回想我们在第 3 章中讨论过的随机预言机。在工作量证明中，哈希函数被用来实例化随机预言机。由于哈希函数的输出足够长且具有随机性，攻击者无法预测未来的哈希值或引发哈希碰撞。这些特性使得`SHA-256`成为工作量证明机制中哈希函数的理想选择。\n\
  \n区块链的一个关键需求是交易的全局排序。如果所有参与者都是已知的，且规模仅限于少数节点，那么我们可以使用像 BFT 这样的传统共识；然而，面对成千上万个未知节点，传统\
  \ BFT 就无法胜任了。工作量证明共识机制解决了这个问题。\n\n如图 5-1 所示，在比较传统 BFT 与 PoW 时，存在一个可扩展性与性能之间的权衡[6]。\n\
  \n![](img/515270_1_En_5_Fig1_HTML.png)\n\n一张图表显示了性能与节点可扩展性的关系。图表包含三条水平平行线。最上面的线对应\
  \ ABFT，位于 y 轴值为 10000 处。\n\n**图 5-1** 性能与可扩展性对比\n\n工作量证明（即中本聪共识协议）是一种拜占庭容错协议，因为它能够容忍任意类型的故障。它可以被视为一种最终拜占庭共识机制。\n\
  \n### PoW 的工作原理\n\n我们先来定义 PoW 的一些要求。实际上，工作量证明最初在比特币中引入时，并没有附带任何严谨的文档或正确性证明。此处，为了清晰和易于理解，我们将（几乎是事后地）列出一些要求，并检验\
  \ PoW 是否以及如何满足这些要求：\n\n- **一致性**：新区块会被复制到所有节点。\n- **与前一区块链接**：日志的维护方式使得每个新条目都与前一条目链接，形成一条链。\n\
  - **无许可且开放参与**：节点无需任何访问控制即可加入，也可随时离开。\n- **分区容忍性**。\n- **地理分散性**。\n- **允许数千个节点加入**，世界任何地方的人都可以下载客户端并运行它，从而成为网络的一部分。\n\
  - **高度对抗环境**，因此拜占庭容错至关重要。\n- **异构性**，允许各种不同类型的计算机和硬件设备加入。\n- **异步性**，即对 CPU 或通信延迟没有限制，只保证消息最终有高概率到达所有节点。\n\
  \n问题是，如何为如此艰难的环境设计一个共识协议？然而，比特币 PoW 经受住了时间的考验。除了少数有限且精心策划的攻击以及一些无意的错误外，比特币网络在过去\
  \ 13 年里基本运行顺畅，没有出现任何重大问题。这是如何做到的？接下来我将进行解释。\n\n\n#### 工作量证明的教育性解释\n\n设想一个场景：某个节点提出一个区块，并将其广播到网络。收到该区块的节点可以执行两种操作：要么接受该区块并将其追加到本地区块链，要么在区块无效时拒绝它。再设想该区块确实是有效的，那么接收节点可以直接接受它，并就提议的区块达成一致。假设整个系统中只有一个提议节点，并且该节点诚实可信，这意味着实际上并不需要真正的共识；提议节点只需提出新区块，其他节点同意即可，最终形成包含交易的区块的全序列表。但这是一个中心化系统，存在一个可信的第三方，只要它保持诚实，作为领导者就能驱动整个系统，因为所有节点都信任它。但如果它变作恶意节点，那就有问题了。\n\
  \n或许，我们可以允许其他节点也提议区块，从而剥夺这个不可信节点的控制权。假设现在我们有两个节点提议有效区块并广播到网络，这就出现了一个问题：部分接收节点会先添加一个区块再添加另一个，有些节点则不知道接受哪个或拒绝哪个。由于提议是同时发出的，节点不知道应该插入哪个区块；也许它们会同时插入两个。结果，有些节点只添加了提议者\
  \ 1 的区块，有些只添加了提议者 2 的区块，还有一些则两者都添加。可想而知，这里并没有达成共识。\n\n再设想另一个场景：两个节点同时宣布一个区块；于是接收节点会收到两个区块，此时不再是一条链，而是出现两条链。换句话说，存在两条事件日志和历史记录。两个节点同时提出了区块；所有节点都添加了两个区块。现在不再是单链，而是形成了一棵树，有两个分支。这被称为分叉。换言之，如果节点同时得知两个指向同一父区块的不同区块，那么区块链就会分叉为两条链。\n\
  \n为了解决这个问题，我们可以允许节点选择当前所知的最长链，将新区块追加到该链上，并忽略另一个分支。如果碰巧有两个或更多分支高度相同（长度相等），则随机选择其中一条链，将新区块添加到该链上。这样就能解决分叉问题。所有节点知道“只允许最长链添加新区块”这一规则后，会持续构建最长链。若遇到两条或更多等长链，则随机将区块添加到其中任意一条。到目前为止，一切顺利！这种方案似乎可行。节点决定将新区块添加到随机选择的链上，并将该决定传播给其他节点，其他节点也将同一区块添加到自己的链中。随着时间的推移，最长链会胜出，较短的链则因为没有新区块添加而被忽略，因为它不是最长链。\n\
  \n但现在又出现另一个问题。设想一个场景：某个节点在分叉后随机选择了一条链，添加了一个区块，并将该决定传播给其他节点，其他节点也添加了该区块。此时，由于网络延迟，有些节点并未得知该决定。一些节点将来自另一个节点的区块添加到自己的某条链中，另一个节点则采取相反操作，如此循环。现在可以清楚地看到，两条链都在不断获得新区块。共识无法达成。出现了活锁情况，节点可以持续向两条链添加区块。\n\
  \n至此，让我们思考一下根本原因是什么，以及为什么会出现这种活锁。原因是区块生成速度太快，其他节点从不同节点收到许多不同的区块，有些快有些慢。这种异步性导致了活锁。解决方案是什么？放慢速度！给节点时间收敛到一条链上！我们来看看如何实现。\n\
  \n我们可以引入一个随机等待时间，让矿工任意休眠一段时间后再挖矿。这里的关键洞察是，活锁（持续分叉）问题可以通过在每个节点引入一个可变速定时器来解决。当节点向自己的链添加新区块时，它会停止定时器并将该区块发送给其他节点。其他节点正在等待自己的定时器到期，但在等待期间，如果它们从另一个节点得知了这个新区块，就会停止自己的定时器，添加这个新区块，然后重置定时器并重新开始等待。这样，链上只会添加一个区块，而不是两个。如果定时器时间足够长，那么分叉和活锁的几率就会显著降低。另需注意，如果系统中节点数量很多，那么某个定时器提前到期的可能性就会更高，而且随着节点数量不断增加，这种情况发生的概率会增大，因为定时器是随机的且节点数量众多。为了再次避免同样的活锁情况，我们需要在节点增加时延长这些定时器的休眠时间，从而将节点快速添加区块的概率降低到只有某个节点最终成功为链添加新区块并广播到网络的程度。同时，等待时间还能以高概率确保分叉在这个等待期内得到解决。这段时间足以确保新区块完全传播，使得同一高度不再有其他区块被提出。\n\
  \n比特币根据每 2016 个区块的出块速率来选择这个超时时间，大约相当于两周。由于出块速率大约应为每十分钟一个区块，如果协议观察到近两周出块速度过快，就会增加超时值，从而降低出块速度。如果协议观察到出块速度过慢，则会减小超时值。这个超时机制存在一个问题：如果某个节点变作恶意节点，总是设法让自己的定时器比其他节点更早到期，那么该节点每次都会创建区块。因此，我们需要构建一种能够抵抗此类作弊行为的定时器。一种方法是构建一个具有密码学安全保证的信任机制，充当安全飞地来运行定时器代码。这样，借助密码学的保障，恶意节点可能无法欺骗定时器始终提前到期。\n\
  \n该技术被用于超级账本英特尔锯齿湖区块链中的`PoET`（消逝时间证明）算法。我们将在第 8 章讨论这一点。\n\n\n\n另一种方式是中本聪设计算法的原始方式：让计算机执行一项计算量很大的任务，这项任务需要花费时间来解决——时间正好足够让区块几乎每十分钟被挖出一个。同时，该任务的设计方式使得节点无法作弊，只能尝试去求解。任何偏离求解方法的做法都无济于事，因为解决问题的唯一途径是穷举所有可能的答案，并与预期答案进行匹配。如果某个答案与预期答案匹配，问题就得以解决；否则，计算机必须尝试下一个答案，并持续以暴力（`brute-force`）方式进行，直到找到答案为止。这是中本聪的卓越洞见，它以高概率确保计算机无法作弊，并且计时器几乎每十分钟才到期，从而赋予其中一个节点将其区块添加到区块链的权利。这就是所谓的工作量证明（`proof\
  \ of work`），意味着某个节点已经完成了足够的工作，以证明它投入了足够的计算能力来解决数学问题，从而赢得在区块链中插入新区块的权利。\n\n工作量证明基于密码学哈希函数。它要求区块若要有效，其哈希值必须小于一个特定值。这意味着区块的哈希值必须以一定数量的零开头。找到这样一个哈希值的唯一方法是反复尝试每一个可能的哈希值，并检查它是否满足条件；如果不满足，则继续尝试，直到某个节点找到这样的哈希值。这意味着，要找到一个有效的哈希值，大约需要十分钟，从而引入刚好足够的延迟，使得分叉得以解决并收敛到同一条链上，同时最大限度地减少每次某个节点赢得创建新区块权利的机会。\n\
  \n现在很容易看出，工作量证明是一种机制，用于在区块创建之间引入等待时间，并确保最终只有一个领导者出现，可以将新区块插入到链中。\n\n因此，准确地说，`PoW`并不是一个共识算法；它是一个共识促进算法，通过减慢区块生成速度，使得节点能够收敛到一条共同的区块链上。\n\
  \n在我们理解了工作量证明机制背后的直觉之后，接下来将描述工作量证明算法在比特币中究竟是如何工作的。\n\n#### `PoW`公式\n\n`PoW`共识过程可以用一个公式来描述：\n\
  \n```\nSHAd256( nonce || Block header ) <= target\n```\n\n其中，`SHAd256`表示对数据进行两次`SHA-256`哈希运算。换句话说，双`SHA-256`意味着对输入的哈希值再取一次哈希。区块头由版本（`Version`）、前一个区块的哈希（`hashPrevBlock`）、`Merkle`根哈希（`hashMerkleRoot`）、时间戳（`Time`）、难度目标（`Bits`）以及随机数（`Nonce`）组成。`Nonce`是一个任意数字，会被反复更改并输入到工作量证明算法中，以检查其结果是否小于或等于难度目标。\n\
  \n目标值是根据挖矿难度计算得出的，难度每`2016`个区块调整一次，大约相当于两周的时间。如果矿工挖矿太快——比如说每八分钟就能生成一个区块，而不是十分钟——这意味着哈希算力过剩；因此，作为一种调节机制，难度会上升。如果矿工在之前的`2016`个区块中生成区块的速度太慢，比如每`12`分钟一个区块，那么速度慢于预期，因此难度会向下调整。让我们来看一些公式。\n\
  \n首先，比特币的难度公式会根据前`2016`个区块的生成速率，计算接下来`2016`个区块的新难度。公式为：\n\n```\nNew difficulty =\
  \ ( previous difficulty * 2016 * 10 minutes ) / ( time to mine most recent 2016\
  \ blocks )\n```\n\n这个公式本质上调节了区块链，使其平均每十分钟产生一个新块。\n\n现在，为了计算目标值，首先使用以下公式计算难度：\n\n\
  ```\ndifficulty = ( possible target ) / ( current target )\n```\n\n最后，使用以下公式计算目标值：\n\
  \n```\ntarget = ( possible target ) / ( difficulty )\n```\n\n既然我们已经确立了目标值的计算方法，接下来让我们看看矿工们做什么，以及他们如何找到满足上述等式的哈希值，也就是说，对区块进行哈希运算后得到的值小于目标值。换句话说，区块哈希必须匹配一个特定的模式，即哈希值以一定数量的零开头。这也被称为部分哈希逆问题。这个问题的目标是找到双重`SHA-256`哈希函数的一个部分原像，唯一找到它的方法（如果能找到的话）是逐一尝试不同的输入，直到某个输入生效。\n\
  \n从根本上说，比特币挖矿就是寻找一个随机数的过程，当这个随机数与一个区块拼接后，使用`SHA-256`哈希函数进行两次哈希运算，产生一个以特定数量零开头的数字。\n\
  \n那么，矿工们具体做什么呢？\n\n\n\n#### 矿工的任务\n\n在比特币区块链网络中，当用户执行新交易时，这些交易会通过点对点 gossip 协议广播到网络上的所有节点。这些交易最终会进入节点的交易池。矿工执行多项任务：\n\
  \n- 矿工维护交易池。他们监听传入的交易，并将这些交易保留在自己的交易池中。\n- 他们还监听新区块，并将任何有效的新区块追加到自己的链上。当然，这不仅是矿工的任务，其他非挖矿节点也会同步区块。\n\
  - 通过从交易池中选取交易来创建一个候选区块。\n- 尝试每一个随机数，找到能使该随机数与区块及前一哈希值拼接后得出的数字小于目标值（根据前述公式 3）的随机数。\n\
  - 将新挖出的区块广播到网络。\n- 通过接收发送到矿工指定地址的 Coinbase 交易来获取奖励。\n\n让我们看看候选区块包含什么内容，以及它是如何创建的。\n\
  \n一个潜在有效的候选区块，并最终成为有效区块，包含几个元素，如表 5-2 所示。\n\n**表 5-2** 区块元素\n\n| 大小 | 描述 | 数据类型\
  \ | 说明 |\n| --- | --- | --- | --- |\n| 4 | 版本 | 整数 | 区块版本 |\n| 32 | `prev_block`\
  \ | 字符 | 前一区块头的哈希值 |\n| 32 | `merkle_root` | 字符 | 区块中所有交易的默克尔根哈希 |\n| 4 | `timestamp`\
  \ | 无符号整数 | 以 Unix 时间格式表示的区块创建时间 |\n| 4 | `bits` | 无符号整数 | 区块的网络难度目标 |\n| 4 | `nonce`\
  \ | 无符号整数 | 此区块的随机数 |\n| 1+ | `txn_count` | 可变长整数 | 交易总数 |\n| 可变 | `txns` | `tx[\
  \ ]` | 交易 |\n\n图 5-2 展示了如何从交易池（图左下）中选取交易并创建一棵默克尔树，其根被包含在候选区块中。最后，对区块进行双重 SHA-256\
  \ 哈希计算，以与目标值进行比较。\n\n![](img/515270_1_En_5_Fig2_HTML.png)\n\n*图 5-2* 从交易池交易到默克尔树和候选区块\n\
  \n`nonce` 是一个从 1 到 2³² – 1 的数字，即一个 32 位的无符号整数，会被包含在区块中。在每次迭代中使用这个 `nonce` 检查结果数字是否小于目标值的过程，被称为挖矿。如果结果数字小于目标值，则意味着挖到了一个有效区块，该区块随后会被广播到网络。\n\
  \n区块中的 `nonce` 字段是一个无符号整数，因此只有 2³² 个随机数可供尝试。因此，矿工可能会很快用完这些随机数。换句话说，这意味着大约有四十亿个随机数可以尝试，鉴于可用的强大挖矿硬件，矿工可以快速完成。即便是普通的计算机，也能轻松快速地完成检查。\n\
  \n当然，这可能会产生一个问题：没有人能找所需的能产生目标哈希值的 `nonce`。即使矿工再次尝试，结果也会相同。此时，我们可以使用区块的其他属性作为变量，不断修改区块，直到区块的哈希值小于目标值，即\
  \ `SHA256(区块头 ‖ nonce) < Target`。\n\n那么在遍历所有这些迭代之后，如果仍然没有找到有效的 `nonce` 呢？此时，矿工必须设法增加搜索空间。为此，他们可以通过对区块做一些修改来获取不同的哈希值。他们可以采取以下几种操作：\n\
  \n- 舍弃部分交易、添加新交易或选取一组新的交易。这种修改会重新计算默克尔根，从而改变区块头，进而使哈希值不同。\n- 稍微修改 `timestamp`（在两小时范围内；否则会成为无效区块）。只需增加一秒即可实现，这将导致不同的区块头，从而产生不同的哈希值。\n\
  - 通过未使用的 `ScriptSig` 修改 Coinbase，可以在其中放入任意数据。这将改变默克尔根，进而改变区块头，最终产生不同的哈希值。\n\n矿工可以不断尝试不同的变体进行修改，直到满足\
  \ `SHA256(区块头 ‖ nonce) < target`，这意味着他们找到了一个能解决工作量证明的有效 `nonce`。\n\n有效哈希的发现基于一种称为部分哈希反转的概念。\n\
  \n工作量证明具有一些关键属性。正式地，我们将其列举如下。\n\n#### 工作量证明的性质\n\n工作量证明具有五个性质：完备性、计算复杂性、动态成本调整、快速验证和无进度性。\n\
  \n##### 完备性\n\n该性质意味着证明者生成的证明是可验证的，并且能被验证者接受。\n\n##### 计算复杂——难以计算——生成缓慢\n\n工作量证明的生成速度缓慢，但并非不可处理。生成证明需要消耗大量的计算资源，并且需要相当长的时间。\n\
  \n##### 自动调整成本——动态成本\n\n这是该协议的优雅之处。首先，工作量证明难以计算。生成工作量证明需要付出巨大努力。粗略估计，比特币网络上每秒需要检查超过数千万亿次的哈希值才能解决工作量证明。其次，参数是可调整的，这意味着无论区块生成得快还是慢，无论网络中添加了多少或移除了多少算力，区块生成速率大致保持在每十分钟一个区块。在早期的难度为\
  \ 1 的时代，区块仍然可以每分钟生成一个；而到了 2022 年，即使难度大约为每秒 25 万亿哈希，该协议仍然会自我调整，区块生成速率仍然保持每十分钟一个。这令人惊叹，也证明了该协议设计之稳健。总而言之，如果在\
  \ 2016 个区块的周期内，平均每个区块生成时间超过十分钟，那么在下一个 2016 个区块的周期，难度将会下调。如果区块生成过快，平均每个区块耗时少于十分钟（例如，网络引入了某种先进的哈希硬件），那么接下来\
  \ 2016 个区块的难度就会上调。这就是网络维持平衡状态的方式。另请注意，许多区块的生成时间远低于十分钟；有些则比十分钟长得多，但平均值是十分钟。这是由于该协议的概率性质所致。\n\
  \n##### 快速高效验证——快速验证\n\n该性质意味着证明的验证非常快速且高效。验证证明不应具有计算复杂性。在比特币中，只需要对包含矿工生成的 `nonce`\
  \ 的区块运行两次 SHA-256 哈希函数，如果 `SHA256(nonce ‖ 区块头) ≤ target`，则该区块有效。这个过程所需时间仅为生成 SHA-256\
  \ 哈希并进行比较的时间，这两者都是计算效率极高的操作。其核心思想在于，生成一个包含有效 `nonce` 的区块在计算上应该是复杂的；但对于其他节点来说，验证其有效性应该是容易的。\n\
  \n\n\n##### 进度无关性\n\n这一特性意味着解决工作量证明的概率与贡献的哈希算力成正比；然而，这依然是一种概率，并非百分之百保证拥有最高算力的矿工总能获胜。换句话说，算力更高的矿工仅能获得成正比的优势，而算力较低的矿工也能获得相应的补偿，有时甚至比高算力矿工更幸运地率先找到区块。\n\
  \n在实际应用中，这意味着每个矿工实际上都在处理不同的候选区块以解决工作量证明。矿工们并非在寻找同一区块的有效随机数，因为交易内容、版本号、Coinbase 差异以及其他元数据不同，经过哈希运算后会得到完全不同的哈希值（对`SHA-256`进行两次运算）。所以每个矿工解决的是不同的问题，探索的是双重`SHA-256`（可简写为`SHAd256`）搜索空间的不同部分。\n\
  \n进度无关性如图 5-3 所示。如图 5-3 所示，矿工们都在处理各自的候选区块，这些区块因上述差异而互不相同。因此，矿工将每个随机数与区块数据拼接后所得的哈希值，都是其他矿工不知晓的。这给了算力较低的矿工一定优势——当某个小矿工试图为其区块寻找有效随机数时，有可能在更高算力矿工为其区块找到有效随机数之前，率先找到解决工作量证明的随机数。\n\
  \n![](img/515270_1_En_5_Fig3_HTML.jpg)\n\n进度无关属性示意图：每个矿工按所述顺序分别处理不同的区块、哈希值及搜索空间。\n\
  \n**图 5-3** 进度无关属性——每个矿工探索双重（`SHA-256`）搜索空间的不同部分\n\n这是工作量证明的另一项巧妙特性，它确保高算力矿工虽有优势，但低算力矿工也有机会幸运地在大型矿工之前找到有效的随机数。关键在于矿工们并不处理同一个区块！如果每次都处理同一个区块，那么算力最强的矿工将始终获胜。这就是比特币工作量证明的“进度无关”特性。\n\
  \n然而，多个矿工也可以协作处理同一个区块（即同一搜索空间），从而分工合作。假设一个区块的搜索空间是 1 到 100，可以将其分为 10 个不同部分，那么所有矿工就能共同处理这一个区块。这样分工后，所有矿工都能贡献算力并按其贡献比例获得奖励。这被称为**矿池挖矿**。与**独立挖矿**（单个矿工尝试，若未找到随机数则前功尽弃，需为下一区块重新努力）不同，在矿池挖矿中，个人的贡献不会白费。\n\
  \n这一概念如图 5-4 所示。\n\n![](img/515270_1_En_5_Fig4_HTML.png)\n\n矿池挖矿示意图：每个矿工处理同一个区块及哈希值，但探索不同的搜索空间。\n\
  \n**图 5-4** 矿池——多个矿工处理同一个区块（`SHAd256` 搜索空间）\n\n在图 5-4 中，不同矿工处理由同一区块产生的同一哈希搜索空间。这样，矿池运营者将工作量证明划分为不同部分，分配给矿池中的矿工。所有矿工都贡献算力，最终有一名矿工找到区块，正常广播至比特币网络。矿池运营者获得区块奖励，再根据矿工贡献的算力比例进行分配。\n\
  \n##### 动态参数的概率方面\n\n现在我们来探讨与特性（动态且可自动调整的参数）相关的概率方面问题，我将解释“平均十分钟”的含义以及参数化的意义。\n\n\
  在概率论中，伯努利试验是一种具有两种可能结果（成功或失败）的行为。每次试验中成功或失败的概率是固定的。例如，抛硬币时正面或反面的概率是 50%，且结果相互独立。连续三次出现正面，并不意味着第四次也必然出现正面。同样，在比特币挖矿中，成功或失败的结果（如下所示）依然是独立的，几乎像抛硬币一样概率约为\
  \ 50%。我们可以通过以下公式看出这一点。\n\n挖矿中的成功与失败可写为如下两个公式：\n\n```\n成功 = SHAd256( 随机数 || 区块头 )\
  \ < 目标值\n```\n\n```\n失败 = SHAd256( 随机数 || 区块头 ) >= 目标值\n```\n\n工作量证明几乎就像掷骰子，例如，我掷了几次骰子，无法知道下一次何时会出现六点；可能第一次就掷出六点，也可能永远掷不出六点，或者掷多次后才出现六点。同样，无论矿工是尝试了一个随机数来寻找有效随机数，还是尝试了数万亿个随机数，找到有效随机数的平均时间仍然是概率性的。无论已经尝试了\
  \ 1 亿个随机数还是只尝试了一个，找到有效随机数的概率保持不变。所以尝试数百万个随机数并不会增加找到有效随机数的可能性；即使只尝试一次或寥寥数次，也有可能找到有效随机数。\n\
  \n当伯努利试验重复进行到足以产生连续结果（而非离散结果）时，就被称为泊松过程。可以正式定义：泊松过程是一系列离散事件，事件以已知的恒定平均速率独立发生，但事件发生的精确时间是随机的。\n\
  \n例如，股票价格的波动就是一个泊松过程。泊松过程具有以下特性：\n\n- 事件相互独立，即一个结果不会影响其他结果。\n- 单位时间内的事件发生率是恒定的。\n\
  - 两个事件不能同时发生。\n\n事件之间的平均时间是已知的，但间隔是随机的（具有随机性）。当然，在比特币中，我们知道两个区块生成事件之间的时间是已知的，大约为十分钟，但生成间隔是随机的。\n\
  \n新区块的平均时间约为十分钟。我们可以用一个简单公式来计算特定矿工找到下一个区块的平均时间。\n\n```\n下一个区块的平均时间（特定矿工） = 10 分钟\
  \ / （该矿工控制的哈希算力比例）\n```\n\n\n\n### 攻击者追上概率\n\n本节回答了这样一个问题：攻击者挖到足够区块以接管整条链的概率是多少。假设攻击者拥有部分算力，记为\
  \ `q`。商家在接收支付前等待 `z` 个确认（即 `z` 个区块），诚实链的哈希率记为 `p`。\n\n攻击者追上概率 `q[z]` 可按如下公式计算：\n\
  \n![$$ {q}_z=\\left\\{1\\ if\\ p\\le q\\_{\\left(\\frac{q}{p}\\right)}^z if\\ p&gt;q\\\
  kern0.75em \\right\\} $$](img/515270_1_En_5_Chapter_TeX_Equh.png)\n\n其中\n\n![$$\
  \ q=攻击者的哈希率 $$](img/515270_1_En_5_Chapter_TeX_Equi.png)\n\n![$$ p=诚实节点的哈希率 $$](img/515270_1_En_5_Chapter_TeX_Equj.png)\n\
  \n![$$ z=需要追上的区块数 $$](img/515270_1_En_5_Chapter_TeX_Equk.png)\n\n这意味着，如果诚实节点哈希率低于攻击者哈希率，那么攻击者追上的概率为\
  \ 1；如果诚实节点哈希率高于攻击者哈希率，那么追上的概率为 `(q/p)^z`。\n\n在下一节中，我们将正式描述工作量证明算法。\n\n### PoW 算法\n\
  \n我们可以将整个工作量证明算法形式化地描述如下：\n\n```\n1:  nonce := 0\n2:  hashTarget := nBits\n3:  hash\
  \ := null\n4:  while (true) {\n5:    SHA256(SHA256(blockheader || nonce))\n6:  \
  \     if (hash ≤ hashTarget) {\n7:            append to blockchain\n8:      else\n\
  9:            nonce := nonce + 1\n10:  }\n11: }\n```\n\n在上述算法中，`nonce` 初始化为零。网络难度目标\
  \ `hashTarget` 取自候选区块头的 `nBits` 字段。`hash` 初始化为 `null`。之后运行一个无限循环，首先将区块头与 `nonce`\
  \ 拼接，并对其执行两次 `SHA-256` 运算得到 `hash`。接下来，如果生成的哈希值小于目标哈希值，则接受该区块并将其追加到区块链上；否则，`nonce`\
  \ 自增，并重复上述过程。如果未找到合适的 `nonce`，则算法尝试处理下一个区块。\n\n此过程可参见图 5-5。\n\n![](img/515270_1_En_5_Fig5_HTML.png)\n\
  \n一个包含以下流程的流程图。候选区块头，双重 SHA 256，结果哈希值，哈希目标；是则停止，否则递增。\n\n**图 5-5** 工作量证明\n\n在图 5-5\
  \ 中，前一个区块哈希、交易及 `nonce` 被输入哈希函数生成一个哈希值，该哈希值与目标值进行比对。如果小于目标值，则为有效哈希，过程停止；否则 `nonce`\
  \ 递增，整个流程重复，直至生成的哈希值小于目标值时停止。\n\n### 博弈论与工作量证明\n\n博弈论研究的是在策略性互动情境中的行为——个体最佳行动方案取决于他人的选择。博弈论模型以抽象方式模拟现实情境。博弈论在诸多领域都很有用，例如经济学、生物学、社会科学、金融学、政治学、计算机科学等。举例来说，在经济学中，企业推出的产品决策会受到竞争对手产品选择及营销策略的影响。在计算机网络中，联网计算机可能为争夺带宽等资源而竞争。纳什均衡可用于研究政治竞争。在政治领域，政治家的政策会受到对手声明和承诺的影响。\n\
  \n博弈可被定义为对玩家可能采取的所有策略性行动的描述，但不描述可能的结果。\n\n博弈中包含以下几个要素：\n\n- **玩家**：博弈中具有策略理性的决策者\n\
  - **行动**：玩家可选的一组行动\n- **收益**：玩家针对特定结果获得的报酬\n\n博弈代表了不同的策略情境。一些经典的博弈包括巴赫或斯特拉文斯基博弈、囚徒困境、鹰鸽博弈和猜硬币博弈。在博弈中，玩家在做决策时并不知道其他玩家的行动；这类博弈称为**同时行动博弈**。\n\
  \n可以通过创建一个表格来分析博弈，该表格列出所有可能的玩家行动及收益。这个表格被称为博弈的**策略式**或**收益矩阵**。\n\n**纳什均衡**是博弈论中一个基础且强大的概念。在纳什均衡中，每个理性玩家都会根据其他玩家的选择来选择最佳行动方案。每个玩家都了解其他玩家的均衡策略，且任何玩家都无法通过单方面改变自身策略来获益。简而言之，任何偏离策略的行为都不会为偏离者带来任何收益。\n\
  \n\n\n#### 囚徒困境\n\n在这场同时行动的博弈中，两名犯罪嫌疑人被分别关押在无法沟通的独立牢房里。如果两人都认罪，则各自被判入狱三年。如果其中一人认罪并作为证人指控另一人，那么他的指控将被撤销；而另一名嫌疑人将面临四年监禁。如果两人都不认罪，则只会被判处一年监禁。现在你可以看到，如果两名嫌疑人合作都不认罪，这对双方来说都是最佳结果。然而，对每个人来说，免于刑罚的巨大诱惑会促使他们不合作，反而去充当指控对方的证人。如果两人合作都不认罪，这场博弈会让双方都获益，每人只需服刑一年。为了方便理解，我们给这两个角色起名为爱丽丝和鲍勃，看看在这这场博弈中有哪些可能的结果。\n\
  \n这场博弈有四种可能的结果：\n\n1.  爱丽丝不认罪，鲍勃也不认罪。\n2.  爱丽丝认罪，鲍勃不认罪。\n3.  爱丽丝不认罪，鲍勃认罪。\n4.  爱丽丝认罪，鲍勃也认罪。\n\
  \n如果爱丽丝和鲍勃能够以某种方式沟通，他们可以共同决定不认罪，这样每人只会被判一年。然而，这里的占优策略是选择认罪，而不是不认罪。\n\n**占优策略** 指的是无论博弈中其他参与者如何行动，都能使自己获得最大收益的策略。\n\
  \n我们可以用收益矩阵的形式来表示这一点，如图 5-6 所示。\n\n![](img/515270_1_En_5_Fig6_HTML.png)\n\n一个 2x2\
  \ 的囚徒收益矩阵。行和列的标题分别为“不认罪”和“认罪”。矩阵中的数值是爱丽丝和鲍勃各自的得分。\n\n图 5-6 囚徒困境收益矩阵\n\n爱丽丝和鲍勃都清楚这个矩阵，并且知道双方都依此矩阵做出选择。爱丽丝和鲍勃是参与者，“认罪”和“不认罪”是行动，而收益则是监禁年限。\n\
  \n无论爱丽丝怎么做或鲍勃怎么做，对方都会选择认罪。爱丽丝的策略是：如果鲍勃认罪，她也应该认罪，因为一年监禁总比三年好。如果鲍勃不认罪，她仍然应该认罪，因为她可以无罪释放。鲍勃也采用同样的策略。这里的占优策略就是认罪，无论对方怎么做。\n\
  \n最终，两名参与者都认罪，各自入狱三年。这是因为，即使鲍勃设法告诉爱丽丝他打算不认罪的策略，爱丽丝仍然会认罪并充当证人，以避免牢狱之灾。反过来，从爱丽丝的角度看，情况也是如此。因此，在纳什均衡下，对双方而言的最佳结果就变成了“认罪”。这可以被表述为{*认罪*，*认罪*}。\n\
  \n在囚徒困境中，双方参与者存在合作的好处，但无罪释放的可能诱惑却促使彼此竞争。当博弈中的所有参与者都理性时，最佳选择就是达到纳什均衡。\n\n博弈论模型高度抽象；因此，一旦针对特定情境开发出来，它们便可以应用于许多不同的情况。例如，囚徒困境模型可以应用于许多其他领域。在无线网络设备竞争带宽、能源供应等的网络通信中，需要以某种方式规范节点行为，使网络上的所有设备能够协调工作。设想一个网络，其中两个距离很近、工作在同一频率的手机信号塔会相互影响性能。解决这个问题的一种方法是让两个塔都以低能量运行，这样它们就不会相互干扰，但这会降低两个塔的带宽。如果一个塔增加能量而另一个不增加，那么不增加的那个塔就会处于劣势，以较低的带宽运行。因此，这里的占优策略变成了以最大功率运行信号塔，无论另一个塔如何操作，以便它们获得尽可能最大的收益。这个结果与囚徒困境相似，认罪是最佳策略。在这里，最大功率就是最佳策略。\n\
  \n现在，根据以上解释的概念，我们可以从博弈论的角度来分析比特币协议。\n\n\n\n##### 工作量证明与博弈论\n\n我们可以将比特币视为一个包含自私参与者的分布式系统；节点可能试图在不做贡献的情况下获取激励，或者试图获取超出其公平份额的更多激励。\n\
  \n比特币协议是一个纳什均衡，因为任何偏离协议均衡策略的行为都不会给偏离者带来收益。该协议的设计方式是，任何偏离协议的行为都会受到惩罚，而正常（良好）的行为则会获得经济激励。比特币中的主导策略是按照协议规则进行挖矿，因为没有其他策略能带来更好的结果。每个参与者只需遵守网络规则就能获得更好的收益。\n\
  \n如果其他矿工不改变他们的策略，攻击者就没有动力改变自己的策略。如果其他参与者不改变策略，任何一方都无法通过转向不同策略来增加自己的收益。这意味着在比特币中，如果所有其他矿工都是诚实的，那么对手就没有动力改变自己的策略并尝试进行恶意挖矿。\n\
  \n比特币中的激励措施，如区块奖励和交易费，会抑制恶意行为。这些激励措施鼓励参与者按照协议行事，这不仅保证了新区块的产生（即网络进展得到保障），也维护了网络的安全性。\n\
  \n自 2009 年以来，比特币网络吸引了大量以矿场、比特币企业、交易所和服务形式存在的投资，以至于网络参与者通过保护网络而非破坏网络能获得更多收益。他们通过保护网络来获益。即使是攻击者也难以获得太多好处。想象一下，如果某个对手设法找到一种方法，将中本聪拥有的所有比特币转移到另一个账户。攻击者可能并没有动机这样做，因为一旦发生这种情况，比特币几乎肯定会变得一文不值，因为这一事件将意味着保护网络的密码学本身已被攻破（假设真正的中本聪已不在世或无法找回其私钥）。\n\
  \n我感觉中本聪没有移动他的比特币，是因为那可能导致比特币大幅贬值。\n\n类似地，即使某个对手设法获得了网络 51%的算力，接管整个网络可能也不再有利可图。为什么？因为在这种情况下，对于对手而言，最佳行动方案是像网络上的其他人一样，用合理的算力默默挖矿以获取经济激励（赚取比特币），而不是利用全部\
  \ 51%的算力向世界宣布攻击。那几乎会彻底摧毁比特币的价值，攻击者的任何收益都将变得毫无价值。因此，除了某些因人为错误或密钥泄露导致的意外事件外，攻击者没有动机去接管比特币网络。这正是比特币的精妙与优美之处：即使是攻击者也无法通过攻击网络获利。所有参与者只需遵守规则即可获益。矿工的主导策略就是诚实。\n\
  \n这是分布式计算领域首次创建出一个不依赖任何可信第三方且无需许可的网络，但它却能阻止任何攻击者接管网络。在此，我想起了一些与比特币并不直接相关，但有助于理解许多分布式计算专家在初次认识到比特币的精妙之处时可能会产生的感受。\n\
  \n> *这看似不可能是真的，但它确实是真的。*\n>\n> ——米哈伊尔·格罗莫夫\n>\n> [`www.ams.org/notices/201003/201003FullIssue.pdf`](http://www.ams.org/notices/201003/201003FullIssue.pdf)\n\
  \n随着比特币的出现以及密码学、分布式计算和经济学的创新性结合，一个名为“加密经济学”的新研究领域应运而生。如图 5-7 所示。\n\n![](img/515270_1_En_5_Fig7_HTML.jpg)\n\
  \n加密经济学融合的示意图。经济学、密码学和分布式计算共同指向加密经济学。\n\n图 5-7\n\n分布式计算、经济学和密码学的融合——比特币\n\n我们也可以将分叉解决机制视为一个谢林点解决方案。这是一个博弈论概念，其中的焦点或谢林点是指人们在缺乏沟通的情况下默认选择的解决方案。类似地，在工作量证明的分叉解决机制中，由于最长（最强）链规则，节点倾向于选择最长的链作为规范链，以便在没有其他节点沟通或指示的情况下添加他们收到的区块。这种无沟通协作的概念是由托马斯·谢林在其著作《冲突的战略》中提出的。\n\
  \n#### PoW 与传统 BFT 的相似之处\n\n从根本上说，所有共识算法都致力于实现安全性和活跃性属性。无论是确定性还是概率性算法，基本上所有共识算法都具有三个主要属性：一致性、有效性和终止性。我们之前介绍过这些术语。问题在于，中本聪共识中我们是否可以重新定义这些属性，使其更贴近区块链世界。答案是肯定的；一致性、有效性和活跃性属性可以分别映射到中本聪共识特有的属性：公共前缀、链质量和链增长。这些术语最早在[`https://eprint.iacr.org/2014/765.pdf`](https://eprint.iacr.org/2014/765.pdf)\
  \ [7]中被提出。\n\n##### 公共前缀\n\n该属性意味着所有诚实节点将共享相同的、足够长的公共前缀。\n\n#### 链质量\n\n该属性意味着区块链包含一定比例由诚实矿工创建的正确区块。如果链质量受损，则协议的有效性属性无法得到保证。\n\
  \n#### 链增长\n\n该属性意味着新的正确区块持续地、有规律地添加到区块链中。\n\n这些属性可以被视为中本聪世界中对传统共识属性的等价物。其中，公共前缀是（传统上的）一致性属性，链质量是有效性属性，而链增长可以看作是活跃性属性。\n\
  \n### 作为状态机复制的 PoW\n\n工作量证明区块链可以被视为一种状态机复制机制：首先，选举出一个领导者，由他提出一批打包成区块的交易序列。其次，最终确定的（已挖出的）区块通过八卦协议广播给其他节点，这些节点接受该区块并将其追加到自己的本地区块链中，从而实现日志复制。我们可以将其视为领导者提议一个顺序，而所有节点根据区块中设定的交易顺序更新它们的日志（本地区块链）。\n\
  \n我们先来详细了解领导者选举算法和复制算法。\n\n\n\n## 领导者选举算法\n\n解决工作量证明难题的节点将被选为领导者，负责最终确定并广播其候选区块。在工作量证明机制中，领导者的选举是作为挖矿节点计算能力的函数来进行的。与其他传统的拜占庭容错协议不同，这里不需要其他节点进行投票。此外，与传统拜占庭容错协议不同，领导者在每个区块都会轮换。这种方法也被后续的区块链拜占庭容错协议所采用，即每个区块都轮换领导者，以防止任何破坏（攻击）领导者的企图。同样，在传统的拜占庭容错协议中，通常只有在主节点（领导者）失效时才会进行更换，而在工作量证明中，每个区块都会选举出一个领导者。工作量证明中的领导者选举基于计算能力；然而，在其他许可链中使用了多种技术，从简单地随机选择领导者或简单的轮换公式，到诸如可验证随机函数等复杂方法。我们将在第\
  \ 8 章详细介绍这些技术。\n\n领导者选举公式与我们之前在“工作量证明如何工作”一节中介绍的公式完全相同。一旦某个矿工解决了工作量证明难题，它立即被选为领导者，并获得广播其新挖出的区块的权利。此时，该矿工还将获得\
  \ 6.25 BTC 的奖励。该奖励每四年减半一次。\n\n在领导者选举阶段，矿工节点已成功解决工作量证明难题，现在可以开始日志复制。\n\n### 日志复制\n\
  \n日志复制或区块复制旨在实现节点间的一致性，通过**八卦传播协议**将新挖出的区块广播到其他节点来实现。普通日志与区块链日志之间的主要区别如下：\n\n- 它只能追加，且不可篡改。\n\
  - 每批新的交易（区块）都包含前一个区块的哈希值，从而将其链接到所谓的**工作量证明链**或**哈希链**或**区块链**或**区块链**中。\n- 区块（日志中的内容）可以通过前一个区块进行验证。\n\
  - 每个区块包含交易和区块头。第 4 章详细讨论了此结构。\n\n当新区块被广播时，网络上的每个诚实节点在将其追加到区块链之前都会对其进行验证和确认。领导者选举后的日志复制可以分为三个步骤。\n\
  \n### 新区块传播\n\n区块通过八卦协议进行广播。我们可以在图 5-8 中直观地看到区块传播机制。请注意，节点 1 向节点 2 发送了一条消息（例如，一个新区块），然后节点\
  \ 2 将该消息发送给节点 4、14 和 13。网络中其他节点的传播模式也类似。\n\n![](img/515270_1_En_5_Fig8_HTML.png)\n\
  \n*八卦协议的图示描述了节点间的关系。*\n\n**图 5-8** 比特币中的八卦协议\n\n这种传播方式确保所有节点最终都能以高概率收到该消息。此外，这种模式避免了向所有节点广播消息给单个节点带来的巨大负担。\n\
  \n### 区块验证\n\n区块验证可以被视为状态转换函数。此区块验证函数包含以下高级规则：\n\n- 区块在语法上正确。\n- 区块头的哈希值小于网络难度目标值。\n\
  - 区块的时间戳未来不超过两小时。\n- 区块大小正确。\n- 区块内的所有交易均有效。\n- 它引用了前一个哈希值。\n\n该协议规定了非常精确的规则，其详细信息可以在\
  \ `https://en.bitcoin.it/wiki/Protocol_rules` 找到；然而，上述列表是节点执行的区块验证检查的高级列表。\n\n###\
  \ 追加到区块链\n\n节点最终会将区块插入到区块链中。在追加到区块链时，可能会发生这些节点收到了两个有效区块的情况。在这种情况下，会发生分叉，节点必须决定将区块追加到哪条链。\n\
  \n我们可以在图 5-9 中直观地看到这个概念。\n\n![](img/515270_1_En_5_Fig9_HTML.png)\n\n*复制示意图。一笔交易被广播到交易池以创建新区块候选，该候选区块经过验证后被追加。*\n\
  \n**图 5-9** 作为状态机复制的工作量证明\n\n如图 5-9 所示，作为状态机复制的工作量证明包含两个主要操作：通过工作量证明选举领导者，然后通过八卦协议及接收节点的区块验证和插入机制进行复制。在节点上完成工作量证明后，如果工作量证明有效，则该区块的处理方式与从其他节点接收到的区块相同，并在验证后最终插入本地区块链数据库。\n\
  \n在发生冲突时，用于选择最终链的组件称为**分叉处理器**，它包含了如何处理分叉的分叉解决规则。\n\n\n#### 分叉解决\n\n分叉解决可被视为比特币中的一种容错机制。分叉解决规则确保，在插入新区块时，节点始终选择完成工作量最多的那条链。当同一高度出现一个有效区块时，分叉解决机制允许节点忽略较短的链，仅将区块添加到最长的链上。另请注意，最长链并不总是工作量最大的链；有可能出现一条较短的链背后拥有最大的计算哈希算力，即累积工作量证明，在这种情况下，该链将被选中。\n\
  \n我们可以通过先计算特定区块（例如区块 B）的难度，然后使用以下公式来计算累积工作量证明。一个区块的难度可以定义为：与创世区块的难度相比，找到该特定区块 B\
  \ 的有效工作量证明随机数要困难多少倍。\n\n![$$ \\frac{创世块难度目标}{B\\ 的难度目标}=\\frac{\\left(\\left({2}^{16}\\\
  right)\\times {256}²\\right)}{B\\ 的难度目标} $$](img/515270_1_En_5_Chapter_TeX_Equl.png)\n\
  \n我们可以说，一条链的累积工作量证明是该链上所有区块难度的总和。工作量证明最多的链将被选为新区块的追加目标。\n\n最长链规则最初只是指区块数量最多的链。然而，这个简单的规则后来被修改了，“最长”链变成了创建时工作量最多的链，即最强的链。\n\
  \n在实践中，区块中有一个 `chainwork` 值，有助于识别工作量最多的链，即正确的“最长”或“最强”链。\n\n例如，我们使用\n\n```\nbitcoin-cli\
  \ getblockheader 0000000000000000000811608a01b388b167d9c94c0c0870377657d524ff0003\n\
  ```\n\n对于区块 687731，我们得到\n\n```\n{\n\"result\": {\n\"hash\": \"0000000000000000000811608a01b388b167d9c94c0c0870377657d524ff0003\"\
  ,\n\"confirmations\": 1,\n\"height\": 687731,\n\"version\": 547356676,\n\"versionHex\"\
  : \"20a00004\",\n\"merkleroot\": \"73f4a59b854ed2d6597b56e6bc499a7e0b8651376e63e0825dbcca3b9dde61ae\"\
  ,\n\"time\": 1623786185,\n\"mediantime\": 1623781371,\n\"nonce\": 2840970250,\n\"\
  bits\": \"170e1ef9\",\n\"difficulty\": 19932791027262.74,\n\"chainwork\": \"00000000000000000000000000000000000000001eb70918030b922df7533fd4\"\
  ,\n\"nTx\": 2722,\n\"previousblockhash\": \"00000000000000000000f341e0046c6d82979fdfa09ab324a0e8ffbabd22815d\"\
  \n},\n\"error\": null,\n\"id\": null\n}\n```\n\n请注意，将 `chainwork` 值转换为十进制后，得到的数字非常大：6663869462529529036756。这就是该链头背后的工作量。\n\
  \n比特币区块链中可能发生几种类型的分叉：\n\n*   常规分叉\n\n*   硬分叉\n\n*   软分叉\n\n*   拜占庭分叉\n\n##### 常规分叉\n\
  \n当两个竞争解决工作量证明的矿工碰巧几乎同时解决了它时，比特币区块链中自然会发生分叉。结果，两个新区块被添加到区块链中。矿工们会继续在他们所知道的最长链上工作，很快，包含所谓孤儿区块的较短链将被忽略。\n\
  \n图 5-10 中的图表显示了分叉如何影响共识最终性。\n\n![](img/515270_1_En_5_Fig10_HTML.png)\n\n分叉影响的示意图包括正常链、被修剪的较短链以及胜出的最强链。\n\
  \n**图 5-10** 分叉对共识最终性的影响\n\n由于分叉的可能性，共识是概率性的。当分叉解决时，先前接受的交易会被回滚，最长（最强）的链胜出。\n\n\
  这些常规分叉的概率相当低。大约每两周可能发生一次单区块分裂，并且当下一个区块到达时，它会迅速解决，并将前一个区块称为父区块。发生两区块分裂的概率呈指数级降低，大约每\
  \ 90 年发生一次。发生四区块临时分叉的概率约为每 7 亿年一次。\n\n##### 硬分叉\n\n硬分叉是由于协议变更与现有规则不兼容而发生的。这实质上会创建两条链，一条运行旧规则，另一条运行新规则。\n\
  \n我们可以从图 5-11 中了解硬分叉的行为方式。\n\n![](img/515270_1_En_5_Fig11_HTML.png)\n\n硬分叉图表包括原始软件客户端，并划分为升级后的软件客户端和原始软件客户端。\n\
  \n**图 5-11** 硬分叉\n\n##### 软分叉\n\n当协议变更是向后兼容时，就会发生软分叉。这意味着无需更新所有客户端；即使并非所有客户端都升级，该链仍然是唯一的。但是，任何未升级的客户端将无法使用新规则进行操作。换句话说，旧客户端仍然能够接受新区块。\n\
  \n此概念可在图 5-12 的图表中看到。\n\n![](img/515270_1_En_5_Fig12_HTML.png)\n\n软分叉图表包括原始软件客户端，并划分为升级后的软件客户端和原始软件客户端。\n\
  \n**图 5-12** 软分叉\n\n##### 拜占庭分叉\n\n在攻击者可能试图创建一条新链并成功强加其自身版本链的场景中，可能会发生拜占庭分叉或恶意分叉。\n\
  \n至此，我们完成了关于分叉的讨论。\n\n工作量证明共识的一个核心特征是 Sybil 抗性机制，该机制确保创建大量新身份并使用它们在计算上极其复杂。让我们更详细地探讨这个概念。\n\
  \n##### Sybil 抗性\n\nSybil 攻击发生时，攻击者会创建多个身份，所有这些身份都属于他们，以通过使用所有这些身份为他们投票来颠覆依赖投票的网络。想象一下，如果攻击者创建的节点数量超过整个网络，那么攻击者就可以使网络偏向于他们。\n\
  \nSybil 攻击可以在图 5-13 中看到，其中攻击者控制的 Sybil 节点数量超过了网络。\n\n![](img/515270_1_En_5_Fig13_HTML.png)\n\
  \nSybil 攻击的流程图包括攻击者控制的 Sybil 节点、Sybil 节点和诚实节点网络，按所述顺序排列。\n\n**图 5-13** Sybil 攻击\n\
  \n工作量证明使得攻击者使用其控制的多个节点参与网络的成本高得令人望而却步，因为每个节点为了成为网络的一部分都必须执行计算上复杂的工作。因此，控制大量节点的攻击者将无法影响网络。\n\
  \n\n\n### 区块时间戳的意义\n\n比特币网络由运行在互联网上的异构、地理分散的节点组成，看起来是一个异步网络。之所以如此，是因为处理器速度和消息延迟都没有上限。在传统的拜占庭容错共识协议中，通常不依赖全局物理时钟，网络假设通常是部分同步网络。然而，在比特币中，所有区块都有一个时间戳字段，由挖出该区块的本地节点填充。这是区块验证过程的一部分，区块只有在时间戳小于或等于最近\
  \ 11 个区块的中位数时才被接受。此外，时间戳对于维持出块频率、难度调整和网络难度计算至关重要。从这个角度来看，我们可以将比特币网络视为松散同步的网络，网络需要松散的时间同步才能取得进展并确保活跃性。\n\
  \n请注意，比特币网络并非部分同步，因为我们之前已经定义了部分同步及其变体，而比特币网络似乎不符合其中任何一个定义。之所以说它是同步的，是因为区块的时间戳由生成该区块的本地节点生成；但从处理器延迟的角度来看，它几乎是异步的。此外，在区块验证机制中，有一条规则要求区块必须在过去大约两小时内生成（前\
  \ 11 个区块的中位数），这使比特币成为一个“近乎同步”的系统。这是因为时间戳对于比特币系统的正常运行至关重要；然而，由于对通信和处理器延迟有较大的容忍度，它可以被视为一个松散同步的系统。\n\
  \n另一方面，由于时间戳仅用于系统有限部分的正常运行（即难度计算和区块验证），并非达成共识的必要条件（即，通过解决工作量证明——挖矿来选择领导者），那么从这个角度来看，它是一个异步系统，因为处理器和通信延迟没有定义的上限，但消息最终会通过\
  \ gossip 协议的概率性保证到达节点。\n\n在比特币区块中，时间戳并非 100% 精确，但足以保护工作量证明机制。最初，中本聪设想结合系统时钟、其他服务器时钟的中位数以及\
  \ NTP 服务器来调整时钟。然而，NTP 从未被实现，而其他节点时钟的中位数仍然是网络中时钟调整的主要来源。\n\n区块时间戳不仅为区块哈希提供了一些变化（这对工作量证明很有用），还有助于防止区块链被操纵，例如攻击者可能试图在区块链中插入无效区块。当一个比特币节点连接到另一个节点时，它会从对方那里接收到\
  \ UTC 格式的时间戳。接收节点随后计算接收时间与本地系统时钟的偏移量并存储起来。网络调整时间则计算为本地 UTC 系统时钟加上所有已连接节点的中位数偏移量。\n\
  \n比特币区块的时间戳有两条规则。有效时间戳必须大于前 11 个区块的中位数时间戳。它还必须小于根据从其他已连接节点接收的时间（即网络调整时间）计算出的中位数时间戳加上两小时。然而，这种网络时间调整与本地系统时钟的差值绝不能超过\
  \ 70 分钟。\n\n结论是，比特币实际上只有在同步网络模型下才是安全的。更确切地说，它是一种无锁步同步，存在某个已知的有限时间界限，但执行过程并非锁步进行。\n\
  \n### 一个注意事项\n\n交易的顺序并非由共识驱动。每个矿工按照客户端中硬编码的顺序选取交易，确实存在一些可能导致交易审查、忽略或重排的攻击。事实上，共识是在区块上达成的，而且也不是通过投票实现；一旦矿工解决了\
  \ PoW，它就赢得了在链上添加新区块的权利。当然，其他节点在收到该区块后会对其进行验证，但在成功矿工广播挖出的区块后，并不存在真正的协商或投票机制。没有投票或共识来同意这个新区块；当选领导者并因解决\
  \ PoW 而赢得添加新区块权利的矿工，其他节点只要它通过`valid()`谓词检查就会接受它。\n\n因此，这里的注意事项是：当通过从交易池中选取交易来创建候选区块时，这些交易会按一定的顺序被选取，而矿工可以影响这个顺序。例如，一些矿工可能选择不包含任何无手续费的交易，只包含那些支付手续费的交易。这对矿工来说或许公平，但对用户和整个比特币系统来说并不公平！然而，最终所有交易都会被添加，即使是那些没有手续费的交易，但它们可能要在被加入交易池相当长的时间之后才会被考虑。如果它们已经“老化”，那么最终会被包含进去。此外，在假设网络中始终存在多数诚实矿工的情况下，预计交易会在合理的时间内按照协议规范被选取。\n\
  \n现在让我们看看这个顺序是什么。\n\n交易是根据其优先级从交易池中选取的，优先级使用以下公式计算 [8]：\n\n```\npriority = sum(\
  \ input value in base units × input age ) / size in bytes\n```\n\n```\np = Σ( v_i\
  \ × a_i ) / s\n```\n\n令人担忧的是，交易的排序并不公平，会导致抢先交易和其他相关攻击。我们将在第 10 章讨论公平排序问题。\n\n\n\n\
  ## 工作量证明：拜占庭将军问题的一种解决方案\n\n中本聪本人曾在帖子[5]中描述过这一点。我将在这里简明扼要地阐述其中的逻辑。\n\n回顾拜占庭将军问题，其核心在于：在存在叛徒将军和信使可能被截获的情况下，如何就进攻时间达成一致。在工作量证明的场景中，我们可以将矿工视为将军。将军们之间的共识是：任何一位将军都可以宣布进攻时间，最先被听到的进攻时间将被视为权威的进攻时间。然而，问题在于，如果两位将军几乎同时提出了不同的时间，由于消息传递的延迟，部分将军可能先收到其中一个进攻时间，而另一些将军则先收到另一个进攻时间，从而导致分歧。为了解决这个问题，每位收到进攻时间的将军都会开始求解一个复杂的数学难题。当一位将军解出这个数学难题（即工作量证明）后，他会将其广播到整个网络。当其他将军收到该解时，就会切换到这个新时间。\n\
  \n所有将军都可以提出一个时间，但最终所有将军只会接受其中一个被提出的时间为有效时间。\n\n要使一个被提出的时间有效，其条件是：每位将军必须求解一个数学难题，并将其附加到提案时间消息上；如果其他将军收到该消息并验证了数学难题的解是有效的，他们就会接受那个时间。这个数学难题有两个目的：首先，它证明了提出时间的将军是诚实的，因为他解决了数学难题；其次，它阻止了将军们快速连续地提出多个时间，因为这会导致将军们之间的分歧和混乱。我们可以看到，这种机制可以被视为拜占庭将军问题的一种解决方案；不过，它有一个折衷方案，即暂时性的分歧是可接受的。\n\
  \n比特币的工作量证明是一种概率性共识算法。现在，一个重大问题出现了：当节点数量未知且存在拜占庭节点时，是否能够实现确定性共识？\n\n现在，让我们根据目前对工作量证明算法的理解，重新审视本章开头定义的有效性、一致性和终止性这三个属性。\n\
  \n我们现在可以清楚地看到，PoW 并非经典的确定性拜占庭共识算法。它是一个具有概率性属性的协议。\n\n让我们重新审视这些属性。\n\n### 一致性\n\n\
  一致性属性是概率性的。之所以如此，是因为可能发生两个不同的矿工几乎同时生成有效区块的情况，一些节点会添加来自一个矿工的区块，而另一些节点则添加来自另一个矿工的区块。然而，最终，最长（最强）链规则将确保工作量证明较少的链被修剪掉，最长的链胜出。这将导致之前已被接受的交易被回滚；因此，一致性是概率性的。\n\
  \n### 有效性 – 基于谓词\n\n这是一个确定性的属性协议，其中诚实节点只接受那些有效的区块。形式上，我们可以说：如果一个正确的进程 `p` 最终就 `b`\
  \ 做出了决定，那么 `v` 必须满足特定于应用的 `valid()` 谓词。我们在本章前面部分已经详细讨论了有效性谓词，即区块验证标准。\n\n### 终止性\n\
  \n终止性是一个概率性属性。由于自然分叉的可能性，它只是最终才能实现。这是因为在出现分叉的情况下，必须解决分叉问题才能最终终止关于该区块的共识过程。由于之前被接受的区块有可能被回滚以支持最重/最长的链，所以终止性只能概率性地得到保证。通常，为了高概率地确保交易的最终性，实践中传统上需要六个确认。这意味着该区块在链上至少又深了六个区块，这使得回滚的可能性变得极低，几乎永远不会发生，或者千年一遇。\n\
  \n至此，我们对工作量证明的讨论就结束了。\n\n## 工作量证明的担忧\n\n关于 PoW 存在几项担忧，包括攻击和极高的能源消耗。\n\n在下一节中，我们将讨论一些可能针对工作量证明共识发起的攻击，这些攻击会对比特币网络产生不利影响。\n\
  \n### 51% 攻击\n\n当超过 50% 的挖矿算力被一个对手控制时，比特币就可能发生 51% 攻击。\n\n表 5-3 列出了对手在接管网络超过 50%\
  \ 算力后可能尝试采取的行动。\n\n**表 5-3** 对手可能的行动列表\n\n| 攻击类型 | 可能性 | 解释 |\n| --- | --- | ---\
  \ |\n| 审查交易 | 是 | 可以忽略交易 |\n| 窃取币 | 否 | 受私钥控制 |\n| 双重支付 | 是 | 可以创建私有的链外分叉，并排除包含之前已花费交易的区块\
  \ |\n| 更改协议 | 否 | 协议无法更改，因为诚实的节点会直接忽略无效区块 |\n\n请注意，一些攻击仍然不可能，而对系统最有害的攻击是可能的，比如双重支付。\n\
  \n### 自私挖矿\n\n这种攻击发生在某个找到区块的矿工不公布它，而是将其保密，并私下在其之上继续挖矿。假设攻击者设法创建了另一个区块。现在，攻击者在其私有的分叉链上有了两个区块。此时，攻击者等待其他人找到区块。当攻击者看到这个新区块时，他们会发布自己的两条区块的链。由于其他矿工是诚实的，并遵守最长链规则，他们会接受这条新链作为最长链。现在，其他矿工挖出的区块就成了孤立区块，尽管他们为此花费了资源，但那些工作都白费了。攻击者也可以等待一条更长的链被创建出来，虽然这在很大程度上靠运气，但如果攻击者成功创建了一条比诚实链更长的私有分叉，那么他们可以在其他某个区块被宣布后立即发布它。当节点看到这条新的最长链时，根据规则，它们会开始在这条新的更长链上挖矿，并孤立其他链，这些链可能只比攻击者的链短一个区块。所有投入到创建诚实链上的工作现在都浪费了，攻击者获得了奖励，而原本在诚实链上工作的其他矿工则一无所获。\n\
  \n### 竞态攻击\n\n这种攻击可能发生在对手可以向一个受益人付款，然后向自己或其他人进行第二次付款的情况下。如果第一笔付款在零确认后被接收者接受，那么第二笔交易有可能被挖出并包含在下一个区块中，而第一笔交易可能一直未被挖出。结果，第一个收款人可能永远也收不到他们的款项。\n\
  \n\n\n### 费尼攻击\n\n当收款方接受零确认付款时，可能发生费尼攻击。这是一种双花攻击，攻击者会创建两笔交易：第一笔是向收款方（受害者）付款，第二笔是向自己付款。但攻击者不广播第一笔交易，而是将第二笔交易打包进一个区块并完成挖矿。此时，攻击者才释放第一笔交易并购买商品。商户未等待确认就接受了付款。随后攻击者广播包含第二笔交易（付款给自己）的预挖区块。由于第二笔交易优先级更高，第一笔交易因此失效。\n\
  \n### Vector76 攻击\n\n此攻击结合了费尼攻击和竞态攻击。即使交易已有一笔确认，这种攻击仍能强大到足以逆转交易。\n\n### 日蚀攻击\n\n\
  此攻击试图屏蔽节点对网络状态的正确感知，可能导致服务中断、双花攻击和资源浪费。比特币已实施多种解决方案来修复该问题。更多详情可参见：[`https://cs-people.bu.edu/heilman/eclipse/`](https://cs-people.bu.edu/heilman/eclipse/)。\n\
  \n### 环境、社会和治理（ESG）影响\n\nESG 指标综合反映了环境、社会和治理方面的问题。这些指标被用于评估一家公司在环境、社会和治理方面的风险敞口。投资者会据此做出投资决策：他们可能规避\
  \ ESG 风险较高的领域，更倾向于选择 ESG 风险较低的公司。\n\n工作量证明机制因能耗过高而受到批评。确实，在撰写本文时，比特币区块链的总能耗已超过整个巴基斯坦（来源：[9]）。\n\
  \n环境、社会和治理方面的担忧一直是有远见的主流投资者兴趣低落的原因。尽管如此，尽管存在 ESG 争议，比特币在很大程度上仍可被视为成功的案例。\n\n比特币不仅因高能耗受到批评，还常被视为犯罪活动的工具——它已被接受为非法毒品及其他犯罪活动的支付方式。\n\
  \n中心化问题同样令人担忧：拥有矿场的强大矿工占据了比特币网络的大部分算力。用于建造这些矿场的 ASIC 芯片仅由少数制造商生产，这也意味着该领域高度中心化。此外，对比特币挖矿的打击行动[13]可能导致进一步的中心化，只有最强大的矿工才能承受冲击并幸存，最终只剩少数几个强大矿工。\n\
  \n然而，比特币也有有利的一面。比特币可作为跨国移民家庭汇款机制，也可用于经济困难国家的支付手段，还能服务于约 17 亿[12]无银行账户人口。比特币是金融包容性的载体。\n\
  \n我们可以设想这样的场景：比特币矿场产生的热量可用于加热水，最终为房屋供暖。甚至可以利用热电效应，通过热电发电机发电并回馈电网。当然，这需要解决经济学和工程学问题，但这个构想是可行的。\n\
  \n> *热电发电机是一类固态器件，可直接将热能转化为电能，或将电能转化为热能用于加热或制冷。此类器件基于热电效应，涉及热量和电流在固体中流动时的相互作用。[11]*\n\
  > \n> ——《大英百科全书》，2007 年 3 月 1 日，[`www.britannica.com/technology/thermoelectric-power-generator`](http://www.britannica.com/technology/thermoelectric-power-generator)\n\
  \n支付系统乃至任何系统都需要电力运行。比特币被批评消耗过多能源，但这正是为系统健壮性付出的代价。当前网络难度如此之高，以至于即使众多攻击者联手，也无法产生足够的算力发动\
  \ 51%攻击。所以，虽然消耗了电力，但同时也换来了回报。除了比特币的安全性，还有其他好处，例如：\n\n*   在受压制政权下可使用。\n*   无国界支付。\n\
  *   为无银行账户者提供金融服务。\n*   顺畅的跨境汇款。\n*   无需任何中介的替代支付系统。\n*   去中介化支付。\n\n综上所述，比特币尽管能耗高且未完全实现“一\
  \ CPU 一票”的原始理念，仍可被视为一个具有诸多优势的成功项目。\n\n### 工作量证明的变种\n\n根据运行硬件的不同，工作量证明算法分为两种类型：\n\
  \n*   CPU 密集型工作量证明\n*   内存密集型工作量证明\n\n#### CPU 密集型工作量证明\n\n此类谜题的求解速度取决于处理器速度。CPU\
  \ 密集型工作量证明是指，求解加密哈希谜题所需的处理能力与 CPU 或 ASIC 等硬件的计算速度成正比。由于 ASIC 主导了比特币工作量证明，并为有能力使用\
  \ ASIC 的矿工带来了不当优势，这种 CPU 密集型方式被视为有中心化趋势。此外，拥有超强算力的矿池可能会将权力平衡向自己倾斜。因此，引入了对 ASIC 有抗性的内存密集型工作量证明算法，这些算法基于内存导向设计而非\
  \ CPU。\n\n#### 内存密集型工作量证明\n\n内存密集型工作量证明算法依赖系统内存来提供工作量证明。在此类算法中，性能受限于内存访问速度或内存大小。这种对内存的依赖也使这些工作量证明算法具有\
  \ ASIC 抗性。Equihash 是最著名的内存密集型工作量证明算法之一。\n\n还有其他工作量证明的改进和变种，我们将在第[8]章(#515270_1_En_8_Chapter.xhtml)中介绍。\n\
  \n## 总结\n\n在本章中，我们介绍了区块链共识：\n\n*   工作量证明是比特币引入的第一个区块链共识，同时也是拜占庭将军问题的一个解决方案。\n* \
  \  区块链共识可分为两类：中本聪共识和传统的基于 BFT 的共识。\n*   传统 BFT 是确定性的，而中本聪共识是概率性的。\n*   比特币的工作量证明是一种女巫抵抗机制、双重支付预防机制，以及拜占庭将军问题的解决方案。\n\
  *   工作量证明可从博弈论角度看待，其中协议是一个纳什均衡，所有参与者的最优策略是保持诚实。\n*   工作量证明本质上是一种拜占庭容错协议。\n*   工作量证明是一种状态机复制协议，挖出的区块通过八卦协议被宣布并复制到其他节点。\n\
  *   工作量证明消耗高能量，存在 ESG 方面的担忧；然而，它也有诸多好处。\n\n\n\n"
- "# 6. 早期协议\n\n在本章中，我将介绍早期的协议。首先，我们从分布式事务和相关协议（例如两阶段提交）的背景知识入手。之后，我们将继续旅程，审视共识协议，并以分布式计算中的一些基础性结论作为本章的收尾。本章将介绍早期的共识算法，例如\
  \ Lamport 等人、Ben-Or 等人以及 Toueg 等人提出的算法。在继续我们向更复杂、更现代协议的航行之前，理解这些基本概念是很有帮助的。\n\n\
  ## 引言\n\n在我看来，20 世纪 80 年代是分布式计算领域创新和发现的黄金时代。许多基本问题、算法和结论，例如拜占庭将军问题、FLP 不可能性结论、部分同步性以及规避\
  \ FLP 不可能性的技术，都是在 20 世纪 70 年代末和 80 年代被发现的。从 Lamport 的杰出论文《分布式系统中的时间、时钟和事件排序》到拜占庭将军问题，再到\
  \ Schneider 的状态机复制论文，一个接一个，这些都对共识问题乃至整个分布式计算领域做出了最重要的贡献。\n\n共识可以定义为一种达成一致的协议。以下列出了主要贡献的概要。\n\
  \n在 1978 年发表的开创性论文《分布式系统中的时间、时钟和事件排序》中，Lamport 描述了如何在无故障情况下使用同步时钟对事件进行排序。随后在 1980\
  \ 年，论文《在存在故障的情况下达成一致》提出了一个问题：在一个不可靠的分布式系统中是否能够达成一致。该论文证明，如果分布式系统中故障节点的数量少于总进程数的三分之一，即\
  \ `n >= 3f + 1`，其中 `n` 是节点总数，`f` 是故障处理器的数量，那么一致是可以达成的。在 1982 年的论文《拜占庭将军问题》中，Lamport\
  \ 等人表明，如果超过三分之二的将军是忠诚的，那么使用口头消息就可以解决一致性问题。1982 年，Danny Dolev 的论文《拜占庭将军再次出击》表明，如果故障处理器的数量少于总数的三分之一，并且网络的连通性超过一半，那么全体一致性是可以实现的。\n\
  \n全体一致性是这样一种要求：如果所有进程的初始值都是相同的，比如说 `v`，那么所有进程都决定这个值 `v`。这是强全体一致性。然而，一种称为弱全体一致性的较弱变体只要求在所有进程都正确（即没有进程发生故障）的情况下才满足此条件。\n\
  \n这篇论文还首次证明了分布式系统必须要有 `3f + 1` 个节点才能容忍 `f` 个故障。然而，著名的 FLP 结论稍后出现，它证明了即使只有一个进程发生崩溃故障，确定性异步共识也是不可能实现的。FLP\
  \ 不可能性意味着，在异步网络中，无法保证共识协议的安全性和活性。\n\nLamport 的算法是针对同步环境设计的，并且假设所有消息最终都会被送达。此外，它不具备容错性，因为一个单一故障就会导致算法停止。\n\
  \n在 FLP 不可能性结论出现之后，人们开始尝试规避它，并仍然解决共识问题。规避 FLP 的直觉是放松对时序和确定性的一些更严格的要求。\n\nBen-Or\
  \ 提出了最早的算法，通过牺牲一定程度的确定性来规避 FLP。由于 FLP 不可能性意味着在异步条件下，总会有一些执行不会终止，避免这种情况的一种方法是尝试让终止具有概率性。因此，使用概率性终止代替确定性终止。这些算法背后的直觉是使用“通用硬币”方法，即如果一个进程没有从其他节点收到消息，它会随机选择其值。换句话说，如果一个进程没有从其他进程那里收到关于某个值的多数投票，它可以选择一个值进行投票。这意味着最终超过半数的节点最终会投票给同一个值。然而，该算法的通信复杂度随着节点数量的增加呈指数级增长。后来，Rabin\
  \ 提出了一种在固定轮数内达成共识的方法。与今天普遍已知的下界 `3f + 1` 相比，这些方案分别需要 `5f + 1` 和 `10f + 1` 轮。\n\n\
  放松时序（同步性）要求的共识协议旨在所有情况下提供安全性，而仅在网络同步时提供活性。Dwork、Lynch 和 Stockmeyer 的工作是一个重大突破，他们首次引入了更现实的**部分同步**概念。这个模型更加实用，因为它捕捉了真实分布式系统的行为方式。更准确地说，分布式系统可以在任意长的时段内处于异步状态，但最终会恢复到足够长的同步状态，以便系统做出决策并终止。这篇论文介绍了处理器和网络的同步性与异步性的各种组合，并证明了这些场景的下界。\n\
  \n> **注意**  \n> 我们在第 3 章中详细讨论了部分同步性。\n\n表 6-1 展示了 DLS88 论文的结论总结，显示了存在容错共识协议所需的最小处理器数量。\n\
  \n**表 6-1** 存在容错共识协议所需的最小处理器数量\n\n| 故障类型 | 同步 | 异步 | 部分同步通信和处理器 |\n| --- | --- |\
  \ --- | --- |\n| 停止故障 | `f` | 不适用 | `2f + 1` |\n| 遗漏故障 | `f` | 不适用 | `2f + 1` |\n\
  | 已认证拜占庭故障 | `f` | 不适用 | `3f + 1` |\n| 拜占庭故障 | `3f + 1` | 不适用 | `3f + 1` |\n\n这篇论文介绍了\
  \ DLS 算法，该算法在部分同步条件下解决了共识问题。\n\n以下列出从 20 世纪 80 年代开始的一些主要成果：\n\n*   在 LPS 82 中，Lamport\
  \ 表明，在同步环境下，使用认证至少需要 `n > 2f`，而使用口头消息至少需要 `n > 3f`。\n*   1982 年的 FLP 结论表明，即使只有一次崩溃故障，在异步条件下共识也是不可能的，并且为了安全性至少需要\
  \ `n > 3f`。\n*   Ben-Or 在 1983 年提出了一种在异步条件下的随机化解决方案。\n\n现在，让我们来探讨分布式事务，这是分布式系统中的一个重要概念。\n\
  \n\n\n## 分布式事务\n\n分布式事务是跨多个进程展开的一系列事件。事务要么以提交结束，要么以中止告终。若提交成功，所有事件均被执行并产生输出；若中止，则事务在未完全执行时停止。事务若完整执行并提交则具有原子性，否则将回滚且不产生任何影响。换言之，原子事务要么完全执行，要么完全不执行。\n\
  \n事务必须满足四项属性，即通常所说的 ACID 一致性模型：\n\n- **原子性**：事务事件要么全部执行，要么完全不执行。\n- **一致性**：若事务提交，系统将进入有效（一致）的状态，且满足某些不变约束。\n\
  - **隔离性**：除非事务已提交，否则其任何影响均不可见。\n- **持久性**：一旦提交，事务将产生永久性影响。\n\n这里需要指出一点：在单体架构中，一致性相对容易保证。相比之下，分布式架构中的一致性并非即时达成，此类架构依赖于所谓\"\
  最终一致性\"。最终一致性意味着系统中所有节点最终（在未来某一时间点）会同步并达成一致的系统状态。即便某些节点（进程）发生故障，ACID 属性也必须得到维护。\n\
  \n原子性、隔离性和持久性在单体架构中较易实现，但在分布式环境中实现这些属性则更具挑战性。\n\n两阶段提交协议用于在多个进程间实现原子性。副本之间应保持相互一致。原子提交协议本质上是一种共识机制，因为在事务提交协议中，节点必须达成一致：若一切正常则提交，若出现问题则回滚。试想，若事务预期在分布式系统（网络）的所有节点上提交，那么为保持副本一致性，它要么全部提交，要么完全不提交。绝不能出现事务在某些节点成功而在另一些节点失败的情况，否则将导致分布式系统不一致。这正是原子提交的用武之地。从根本上讲，它可被视为一种共识算法，因为该协议要求网络中所有节点达成一致。然而，原子提交与共识之间存在根本差异。在共识中，一个或多个节点提出值，节点通过共识算法决定采用其中一个值，这通常通过多数共识实现。相反，在原子提交协议中，所有节点都需要投票决定是提交还是中止事务。在共识算法中，可以提出多个值并从中协商选定一个；而在原子提交中，协议必须仅在所有节点均投票提交时才提交；否则，即使只有一个节点不同意，所有节点也必须中止该事务。原子提交与共识的一个主要区别在于：共识算法因仲裁可用性规则而能容忍故障（崩溃节点），而原子提交中即使只有一个节点失败，所有节点也必须中止事务。为处理崩溃节点，会使用一个完全且强精准的故障检测器，该检测器通过超时机制实现。\n\
  \n除了 ACID 一致性模型，数据库中另一种常用的一致性模型是 BASE 模型。BASE 代表基本可用（BA）、软状态（S）和最终一致性（E）。使用 BASE\
  \ 一致性模型的数据库通过在系统节点间复制数据来确保可用性。由于该模型不提供即时一致性，数据值可能随时间变化，从而产生最终一致性。在 BASE 模型中，一致性仅能最终达成。然而，它提供了高可用性，这在许多对即时强一致性要求较为宽松的在线服务（如社交网络和在线视频平台）中非常有用。从\
  \ CAP 定理的角度看，BASE 模型牺牲了一致性而偏向高可用性。\n\n现在我们讨论两阶段提交——这一著名的提交协议，它实现了原子性。\n\n\n\n###\
  \ 两阶段提交\n\n两阶段提交（`2PC`）是一种用于实现原子性的原子提交协议。它首次由 Lampson 和 Sturgis 在 1979 年的一篇论文中提出。两阶段提交能够在一个事务中更新多个数据库，并原子性地提交或中止。\n\
  \n顾名思义，此协议分为两个阶段执行。第一阶段是**投票收集阶段**，在该阶段中，协调节点收集参与事务的每个节点的投票。每个参与节点投票赞成（yes）或反对（no），以决定提交事务或中止事务。当所有投票收集完毕后，协调者（`transaction\
  \ manager`）启动第二阶段，称为**决策阶段**。在决策阶段，如果协调者收到了其他节点投来的全部赞成票，则提交事务；否则，中止事务。任何投票赞成的节点都会等待，直到收到协调者的最终决定。如果从协调者那里收到的是“否”，则中止事务；否则，提交事务。投反对票的节点会立即终止事务，而无需等待协调者的决定。当事务被中止时，所做的任何更改都会被回滚。只有那些在准备阶段投赞成票，并且从协调者处收到提交决定的节点，其所做的更改才会被永久保存。事务所做的任何更改都不是永久的，并且锁会在写操作执行后被释放。所有参与者在收到协调者的决定后，都会向协调者发回确认消息。作为一种故障处理机制，两阶段提交使用日志方案。在该方案中，所有消息在通过网络发送给接收者之前，都会先写入本地的稳定存储中。当协调者发生故障（崩溃）时，它会将决定写入本地磁盘的日志中，恢复后，它会将该决定发送给其他节点。如果崩溃前尚未做出任何决定，则直接中止事务。当某个节点（非协调者节点）发生故障时，协调者会等待直至超时，然后决定为所有节点中止事务。\n\
  \n图 6-1 展示了正在执行的两阶段提交协议。在这里，客户端（应用程序）照常启动事务，并对数据库节点（即事务的参与节点）执行常规的读/写操作。在每个参与者上完成常规事务执行后，当客户端准备提交事务时，协调者启动第一阶段，即**准备阶段**。它向所有节点发送准备请求，询问它们是否可以提交。如果参与者回复“是”，意味着它们愿意并准备好提交事务，那么协调者就启动第二阶段，称为**提交阶段**。此时，协调者发出提交决定，事务最终被提交，实际完成提交操作。如果任何参与节点对准备请求回复“否”，那么协调者就在第二阶段发出中止请求，所有节点相应地中止事务。请注意，第一阶段之后存在一个决策点，协调者在此决定是提交还是中止。决策阶段之后的动作要么是提交，要么是中止，具体取决于从参与者那里收到的“是”或“否”。\n\
  \n```\n![](img/515270_1_En_6_Fig1_HTML.jpg)\n\n一个示意图，带有 4 个从右指向的箭头，分别标记为客户端、协调者、参与者\
  \ 1 和参与者 2。这些线条被多向箭头分割成 3 部分。\n\n图 6-1\n\n两阶段提交算法——一个成功场景\n```\n\n两阶段提交是一种阻塞式算法，因为如果协调者在“准备”阶段之后、发出决定之前宕机，其他节点将无法获悉协调者已做出何种决定。此时，它们陷入一种不确定状态：它们先前在准备阶段已同意提交（回答“是/可以”），但现在却只能等待协调者的最终决定。在准备阶段回答“是”之后，节点不能自行提交或中止，因为这会违反原子性属性。在这种情况下，协议会阻塞，直到协调者恢复。这意味着，如果协调者或某个参与者发生故障，两阶段提交算法不具备容错能力。换句话说，`2PC`\
  \ 不具备分区容错性。\n\n更准确地说，如果协调者在准备阶段之后、发出决定之前崩溃，其他节点就完全不知道协调者做出了什么决定。在此阶段，参与者既不能提交也不能中止，协议会一直阻塞，直到协调者重新上线并且参与者收到决定。在该协议中，协调者是单点故障。有一些方法可以克服此问题，例如使用共识机制或全序广播协议。提交协议可以使用共识来选举一个新的协调者。\n\
  \n另外，请注意，如果移除第二阶段并且不进行回滚，它就变成了单阶段提交，即主/备复制。听起来很熟悉？我们在第 3 章讨论过这一点。\n\n\n\n### 三阶段提交\n\
  \n正如我们在两阶段提交中所见，它不具备容错性，并且会阻塞，直到失败的协调者恢复。如果协调者或参与者在提交阶段失败，该协议无法可靠恢复。即使更换了协调者或协调者恢复，也无法从故障发生处可靠地继续处理事务。三阶段提交通过引入一个新的预提交中间阶段解决了这个问题。在收到所有参与者的`yes`后，协调者进入这个中间阶段。与`2PC`不同，这里协调者不会立即广播`commit`；而是先发送一个`pre-commit`，表明提交事务的意图。当参与者收到`pre-commit`消息时，它们回复`ack`消息。当协调者收到所有参与者的`ack`后，便发送`commit`消息，并像两阶段提交那样继续执行。如果某个参与者在回传消息之前发生故障，协调者仍可决定提交事务。如果协调者崩溃，参与者仍可同意中止或提交事务。这是因为尚未发生实际的提交或中止。参与者现在有了另一次机会来决定：通过检查是否已看到协调者发来的`pre-commit`，如果是，则相应提交事务；否则，由于未看到协调者的`commit`消息，参与者中止事务。\n\
  \n该过程如图 6-2 所示。\n\n![](img/515270_1_En_6_Fig2_HTML.png)\n\n一幅示意图，包含协调者和参与者的两条垂直线。它们被划分为投票阶段、提交阶段和决策阶段。\n\
  \n**图 6-2** 三阶段提交协议\n\n粗略地说，提交协议可以看作是共识协议，因为参与者需要决定是否接受协调者提出的值。当然，这是一个简单的协议，不具备容错性，但它确实在各方之间达成了共识；因此，它可以被视为一种共识机制。此外，我们可以说有效性得到了实现，因为参与者提出了最终达成一致的值。同时，终止性也得到了保证，因为每个参与者都能推进。如果没有发生故障，最终所有参与者都会响应协调者，协议向前推进，最后两个阶段都结束。然而，严格来说，分布式提交协议并非共识协议。\n\
  \n现在，在介绍了这些最直接的共识协议或分布式提交协议（取决于你如何看待它们）之后，让我们关注一些早期的容错共识协议，它们为我们在各种分布式系统和区块链中今天所见到的共识协议奠定了基础。\n\
  \n## 口头消息算法\n\n口头消息（OM）算法由 Lamport 等人在 1982 年的论文《拜占庭将军问题》中提出，用于解决该问题。该递归算法在同步网络模型下运行。它假设有`N`个将军，所有将军之间构成一个完全图。其中一位将军是“指挥官”，负责启动协议。其他（`N\
  \ – 1`位）将军称为“副官”，口头传递他们收到的消息。指挥官知道最多有`f`个将军会有故障（叛徒），并以已知的`f`值启动共识算法。还有一个默认值，要么是“撤退”要么是“进攻”。该算法背后的直觉是：你在收到每条消息时，都要告诉别人你收到了什么消息。参与者接受多数决策，这保证了算法的安全性属性。\n\
  \n需要满足两个*交互一致性*要求，分别称为`IC1`和`IC2`：\n\n1.  **IC1**：所有忠诚的副官服从相同的命令。\n2.  **IC2**：如果指挥将军是忠诚的，那么每个忠诚的副官都服从其命令。\n\
  \n关于系统模型的一些假设：\n\n1.  消息的缺失可以被检测到。这是由于同步通信。\n2.  每条发送的消息都能正确送达。\n3.  消息的接收者知道是谁发送的。\n\
  \n口头消息是指内容完全由发送者控制的消息。发送者可以发送任何可能的消息。\n\n除非超过三分之二的将军是忠诚的，否则拜占庭将军问题无解。例如，如果有三个将军，其中一个是叛徒，那么在使用口头消息的情况下，拜占庭将军问题无解。正式表述为：\n\
  \n*   **引理 1**：对于`3m + 1`个将军，如果叛徒数量`> m`，则拜占庭将军问题无解。\n\n换句话说，如果`n <= 3m`，则拜占庭共识不可能实现。该算法是递归的。\n\
  \n**算法**\n\n**基本情况：`OM(0)`**\n\n1.  指挥官向每位副官广播一个提议值。\n2.  每位副官接受接收到的值。如果没有收到任何值，则使用算法启动时设置的`DEFAULT`值，要么是`retreat`要么是`attack`。\n\
  \n**存在叛徒的情况：`OM(m)`，其中 `m > 0`**\n\n1.  指挥官向每位副官发送提议值。\n2.  每位副官运行`OM(m-1)`，并作为指挥官将步骤\
  \ 1 中收到的值发送给所有其他副官。\n3.  每位副官维护一个向量，并在所收到的值中采用多数值。\n\n基本情况和`OM(1)`情况如图 6-3 所示。\n\
  \n![](img/515270_1_En_6_Fig3_HTML.png)\n\n两幅 OM 情况的示意图，包含一位指挥官和三位副官。左侧通过“进攻”连接，右侧通过“进攻”和“撤退”连接。\n\
  \n**图 6-3** OM 基本情况与`OM(1)`情况对比，其中指挥官是叛徒\n\n我们也可以可视化副官是叛徒的情况，如图 6-4 所示。\n\n![](img/515270_1_En_6_Fig4_HTML.png)\n\
  \n一幅示意图，包含一位指挥官和三位副官`L1`到`L3`。指挥官向三位副官下令“进攻”。`L3`向`L1`和`L2`发送“撤退”命令。\n\n**图 6-4**\
  \ M=1 时副官是叛徒的 OM 情况\n\n我们可以用如下代码形式化描述该算法：\n\n**基本情况**\n\n```\nOM(0)- 基本情况\nDEFAULT\
  \ := 默认值\n指挥官 C 将它的提议值广播给所有副官\n对于 i = 1 到 N – 1 执行\n  Li 将从 C 收到的值存储到数组 Vi 中\n \
  \ 如果未收到值，Vi = DEFAULT\n  Li 接受 Vi\n结束循环\n```\n\n**存在 f > 0 的情况，`OM(m)`**\n\n\n\n\
  ```\nCommander C 将其值广播给所有副官\nFor I = 1 : n-1 do\nLi 将从指挥官接收到的值存储为 vi\n若未从指挥官收到任何值，则\
  \ vi 为默认值\nLi 现在作为指挥官运行 OM(m-1)，将值 vi 发送给其他 N – 2 名副官\nEnd for\nFor I = 1 : N –\
  \ 1 do\nFor j = 1 : N – 1 AND j ≠ i do\nLi 将从 Lj 接收到的值存储为 vj\n若未收到任何值，则 vj 为默认值\n\
  End for\nLi 从 {v1, v2, v3,  , , , vn-1} 中选择多数值\nEnd for\n```\n\n你可能已经注意到，尽管这个算法能够工作，但由于需要传递的消息数量过多，它的效率并不高。更准确地说，从通信复杂度的角度来看，该算法与叛徒数量呈指数关系。如果在基础情况下没有叛徒，那么它的复杂度是常数\
  \ *O*(1)；否则，它的复杂度为 *O*(*m*^(*n*))，这意味着它随叛徒数量呈指数增长，这使得它在 *n* 值较大时变得不切实际。\n\n利用时空图，我们可以将基础情况可视化，如图\
  \ 6-5 所示。\n\n![图 6-5](img/515270_1_En_6_Fig5_HTML.jpg)\n\n一个包含 4 个右向箭头（C、L 1、L 2\
  \ 和 L 3）的示意图。从 C 向 L 1、L 2 和 L 3 发送攻击命令。时间箭头指向右侧。\n\n**图 6-5** 口头消息协议 – 基础情况 – 无叛徒\n\
  \n我们还可以将 m > 0 的情况（其中指挥官是叛徒，向副官发送相互冲突的消息）可视化，如图 6-6 所示。\n\n![图 6-6](img/515270_1_En_6_Fig6_HTML.jpg)\n\
  \n一个包含 4 个右向箭头（叛徒 C、L 1、L 2 和 L 3）的消息协议示意图。他们彼此之间发送攻击和撤退消息。\n\n**图 6-6** m = 1 情况下的口头消息协议，指挥官是叛徒\n\
  \n在数字世界中，指挥官和副官代表进程，这些进程之间的通信通过点对点链路和物理信道来实现。\n\n到目前为止，我们讨论了使用口头消息且不采用密码学的情况；然而，另一种使用签名消息的解决方案也是可行的，它利用数字签名来保证声明的完整性。换句话说，使用口头消息无法让接收者确定消息是否被篡改。而数字签名则提供了一种数据认证服务，使接收进程能够检查消息是否真实（有效）。\n\
  \n基于是否使用口头消息或数字签名，本章前面的表 6-1 总结了在不同系统模型下的不可能性结果。\n\n### 拜占庭将军问题的签名消息解决方案\n\n口头消息算法的主要问题在于，它需要\
  \ 3*t* + 1（也记作 3*f* + 1）个节点来容忍 *t*（也记作 *f*）个故障，这在所需的计算资源方面代价高昂。同时，叛徒可能会对其他节点说过的话撒谎，这使问题更加棘手。该算法的时间复杂度为\
  \ *O*(*n*^(*m*))。\n\nLamport、Shostak 和 Pease 在同一篇 BGP 论文中提出了一种针对 BGP 问题的带签名解决方案。它使用数字签名对消息进行签名。在该模型下，有以下额外的假设：\n\
  \n1.  忠诚将军的签名无法被伪造，并且对将军消息的任何修改都是可检测的。\n2.  任何人都可以验证将军签名的真实性。\n\n在此模型下，每位副官维护一个已签名订单的向量。然后，指挥官将已签名的消息发送给副官。\n\
  \n通常，该算法的工作方式如下：\n\n副官从指挥官或其他副官处接收订单，并在验证消息真实性后，将其保存到自己所维护的向量中。如果订单上的签名少于 m 个，则该副官在订单（消息）上添加自己的签名，并将此消息转发给尚未见过它的其他副官。当副官不再收到任何新消息时，他从向量中选择一个值作为决策共识值。\n\
  \n副官可以通过签名消息检测出指挥官是叛徒，因为指挥官的签名会出现在两条不同的消息上。在此模型下，我们的假设是签名不可伪造，并且任何人都可以验证签名的真实性。这意味着指挥官就是叛徒，因为只有他才能签署两条不同的消息。\n\
  \n正式地，该算法描述如下。\n\n**算法：对于 n 位将军和 m 位叛徒将军，其中 *n* > 0。** 在此算法中，每位副官 *i* 维护一个集合 *V*[*i*]，其中包含其迄今为止收到的正确签名的消息。当指挥官诚实时，集合\
  \ *V*[*i*] 仅包含一个元素。\n\n**算法 `SM(m)`**\n\n**初始化：**\n*Vi* = { }，即空集\n\n1.  指挥官 *C*\
  \ 将已签名的消息（值）发送给每位副官。\n2.  对于每个 *i*：\n    - *V*[*i*] = *V*[*i*] + {*v*}，即将 *v* 添加到\
  \ *V*[*i*]。\n    - 如果 *k* < *m*，则将消息 *v* : 0 : *j*[1]…*j*[*k*] : *i* 发送给除 *j*[1]…*j*[*k*]\
  \ 之外的每位副官。\n3.  如果副官 *i* 收到一条像 *v* : 0 : *j*[1]…*j*[*k*] 这样的消息，并且 *v* 不在集合 *V*[*i*]\
  \ 中，则：\n    - 设置 *V*[*i*] = {*v*}。\n    - 将消息 *v* : 0 : *i* 发送给其他每位副官。\n4.  如果副官\
  \ *i* 从指挥官处收到一条形如 *v* : 0 的消息，并且尚未收到来自指挥官的任何消息（订单），即 *V*[*i*] 为空，则：\n    - 设置 *V*[*i*]\
  \ = {*v*}。\n    - 将消息 *v* : 0 : *i* 发送给其他每位副官。\n5.  对于每个 *i*：\n    - 当副官 *i* 不再收到更多消息时，他通过函数\
  \ `choice(*V*[*i*])` 来执行订单（消息），该函数从一组订单中获取一个单一订单。如果集合 *V* 为空或包含多个元素，则 `Choice(*V*)\
  \ = retreat`。如果集合 *V* 中只有一个元素 *v*，则 `choice(*V*) = v`。\n\n此处，*v* : *i* 是由将军 *i*\
  \ 签名的值 *v*，而 *v* : *i* : *j* 是由将军 *j* 副签的消息 *v* : *i*。每位将军 *i* 维护一个集合 *V*[*i*]，其中包含所有收到的订单。\n\
  \n图 6-7 中的示意图展示了一个叛徒指挥官的场景。\n\n![图 6-7](img/515270_1_En_6_Fig7_HTML.jpg)\n\n一个示意图，顶部是叛徒指挥官，下方是副官\
  \ L 1 和 L 2。指挥官向 L 1 下达攻击命令，向 L 2 下达撤退命令。\n\n**图 6-7** 使用 `SM(1)` 的签名消息协议示例 – 叛徒指挥官\n\
  \n使用签名消息，很容易检测到指挥官是否为叛徒，因为其签名会出现在两条不同的订单上。根据签名不可伪造的假设，我们知道只有指挥官本人才能签署这些消息。\n\n正式地，对于任何\
  \ *m*，如果叛徒数量最多为 *m*，那么算法 `SM(m)` 就能解决拜占庭将军问题。副官维护一个值的向量，并运行一个选择函数来检索订单 `choice {attack,\
  \ retreat}`。使用超时机制来确定是否不再会有消息到达。此外，在步骤 2 中，副官 *i* 会忽略集合 *V*[*i*] 中已存在的任何消息 *v*。\n\
  \n该算法的消息复杂度为 *O*(*n*^(*m* + 1))，并且需要 *m* + 1 轮通信。此协议适用于 *N* ≥ *m* + 2 的情况。\n\n与口头消息协议相比，签名消息协议对故障更具弹性；在这里，如果在三位将军中至少存在两位忠诚将军，问题就是可解的。而在口头消息情况下，即使三位将军中只有一个叛徒，问题也无法解决。\n\
  \n\n\n## 部分同步下的 DLS 协议\n\n在 FLP 不可能性结果之后，研究人员引入的规避该结果的方法之一便是采用部分同步网络模型。本文提出了一些重要概念，例如轮换协调者、共识、部分同步下的终止性以及基于轮次机制的实现。我们在第\
  \ 3 章讨论了包括部分同步在内的多种模型。\n\n本文描述了四种针对部分同步下崩溃停止、遗漏、拜占庭和认证拜占庭错误的算法。这些算法的核心思想在于，一致性和有效性始终得到满足，而终止性仅在系统稳定时（即出现良好的同步时段）才能得到保证。\n\
  \n本文引入了一个基本轮次模型，协议执行被划分为多个消息交换和本地计算的轮次。每一轮包括发送步骤、接收步骤和计算步骤。此外，该基本轮次模型假设存在一个被称为全局稳定轮次的轮次，在该轮次期间或之后，正确的进程会接收到所有由正确进程发送的消息。\n\
  \n本节介绍算法 2，这是一个带认证的拜占庭错误下的共识算法。它假设网络模型具有部分同步的通信，且处理器可能是拜占庭式的。这一模型也被大多数（即便不是全部）区块链网络所采用。\n\
  \n该算法针对任意值集合`V`，在带认证的拜占庭错误下实现了强一致性。\n\n算法按阶段推进。每个阶段`k`由四个连续的轮次组成，从`4*k – 3`到`4*k`。每个阶段都有一个唯一的协调者`c`来主导该阶段。使用一个简单的公式`k\
  \ = i (mod n)`从所有进程中选出协调者，其中`k`是阶段号，`i`是进程编号，`n`是进程总数。\n\n每个进程维护一些变量：\n\n-   一个局部变量`PROPER`，包含进程已知的合法值的集合。\n\
  -   一个局部变量`ACCEPTABLE`，包含进程`p`认为可接受的值`v`。注意，如果进程`p`除了`v`之外没有锁定任何值，并且值`v`是合法的，那么`v`对进程`p`来说是可接受的。\n\
  -   一个局部变量`LOCK`，用于保存被锁定的值。如果一个进程相信某个进程可能会就某个值做出决定，它可以在一个阶段锁定该值。初始状态下，没有值被锁定。每个锁都关联一个阶段号。此外，每个锁还关联一个被锁定值的可接受性证明。可接受性证明的形式是一组由`n\
  \ – t`个进程发送的签名消息，表明该锁定值是可接受且合法的，即它在给定阶段开始时位于这些进程的`PROPER`集合中。\n\n**算法** `N ≥ 3*t\
  \ + 1` – **带认证的拜占庭错误**\n\n**尝试阶段 `k`**\n\n**轮次:**\n\n**第 1 轮: 轮次 `4k – 3`**\n\n\
  包括当前协调者在内的每个进程，都向当前协调者发送一个经过认证的、包含其所有可接受值的列表。进程使用消息格式`E(list, k)`，其中`E`是认证函数，`k`是阶段号，`list`是所有可接受的值。\n\
  \n**第 2 轮: 轮次 `4k – 2`**\n\n当前协调者选择一个要提议的值。如果协调者要提议某个值，它必须至少收到`n – t`个进程的响应，表明该值在阶段`k`是可接受且合法的。如果有多个可能的值可供协调者提议，它将任意选择一个。\n\
  \n协调者广播一条形式为`E(lock, v, k, proof)`的消息，其中`proof`由从`n – t`个认为`v`可接受且合法的进程处收到的签名消息集合`E(list,\
  \ k)`组成。\n\n**第 3 轮: 轮次 `4k – 1`**\n\n如果任何进程收到一条`E(lock, v, k, proof)`消息，它会验证该证明，以确认在阶段`k`确实有`n\
  \ – t`个处理器认为`v`可接受且合法。如果证明有效，它就锁定`v`，并将阶段号`k`和消息`E(lock, v, k, proof)`与锁关联起来，然后向当前协调者发送一个确认。在这种情况下，该进程会释放之前对`v`设置的任何锁。如果协调者从至少`2*t\
  \ + 1`个处理器处收到了确认，那么它就决定采用值`v`。\n\n**第 4 轮: 轮次 `4k`**\n\n这一轮用于释放锁。进程广播形式为`E(lock\
  \ v, h, proof)`的消息，表明它们对值`v`持有锁，关联的阶段号为`h`以及相关的证明，并且协调者在阶段`h`发送了导致该锁被设置的消息。如果任何进程对某个值`v`持有锁（关联阶段`h`），并且收到了一条正确签名、形式为`E(lock,\
  \ w, h^’, proof^′)`且`w ≠ v`及`h^′ ≥ h`的消息，那么该进程会释放它对`v`的锁。这意味着，如果进程收到一条最近正确签名的消息，表明对某个不同于其本地锁定值的值持有锁，且其阶段号大于或等于当前阶段号，那么它将释放本地锁定的值。\n\
  \n**说明**\n\n假设进程都是正确的，那么在同一阶段不可能锁定两个不同的值，因为正确的协调者永远不会发送可能建议锁定两个不同值的冲突消息。\n\n在部分同步、存在拜占庭错误并采用认证的情况下，该算法实现了一致性、强一致性和终止性，前提是`n\
  \ ≥ 3*t + 1`。认证拜占庭意味着故障是任意的，但消息可以使用不可伪造的数字签名进行签名。\n\n一致性意味着不会有任何两个不同的进程做出不同的决定。终止性意味着每个进程最终都会做出决定。一致性有两种类型：强一致性和弱一致性。强一致性要求，如果所有进程的初始值相同（设为`v`），并且有任何正确的进程做出决定，那么该决定只能是`v`。弱一致性意味着，如果所有进程的初始值相同（设为`v`）且所有进程都是正确的，那么如果有任何进程做出决定，它决定的是`v`。换句话说，强一致性意味着如果所有初始值都相同（例如`v`），那么`v`是唯一的共同决定。而在弱一致性下，只有当所有进程都正确时，才期望这个条件成立。\n\
  \n\n\n## Ben-Or 算法\n\nBen-Or 协议于 1983 年提出，以其作者 Michael Ben-Or 命名。这是首个在强敌手模型下，以概率性终止方式解决共识问题的协议。Ben-Or\
  \ 算法提出了如何规避 FLP 结果并在异步环境下达成共识的方案。论文中提出了两种算法：第一种算法容忍 *t* < *n*/2 的崩溃故障，第二种算法容忍 *t*\
  \ < *n*/5 的拜占庭故障。换言之，当 *N* > 2*t* 时，协议可容忍崩溃故障并达成一致；当 *N* > 5*t* 时，协议可容忍拜占庭故障并达成一致。该协议在先前描述的条件下能实现共识，但期望运行时间为指数级。换句话说，在最坏情况下，由于可能需要多轮迭代才能终止，其运行时间呈指数增长。然而，如果\
  \ *t* 非常小（即 *O*(√*n*)），则可以在常数时间内终止。\n\n该协议以异步轮次运行。一轮模拟了时间的概念，因为所有消息都带有轮次编号，因此即使消息异步到达，进程也能判断哪些消息属于哪一轮。进程会忽略属于先前轮次的消息，并将属于未来轮次的消息暂存于缓冲区中。每一轮包含两个阶段（或子轮）。第一阶段是提议（建议）阶段，每个进程\
  \ `p` 发送其值 `v`，并等待接收来自其他 `n` − `t` 个进程的消息。第二阶段称为决策（批准）阶段，协议检查是否观察到多数值，并采纳该值；否则，通过抛硬币决定。如果达到特定阈值的进程观察到相同的多数值，则决策被最终确定。如果检测到其他值成为多数，则进程切换为该值。最终，由于在某一时刻所有进程都会正确抛硬币并达到多数值，协议得以终止。你可能已经注意到，此协议仅考虑二元决策值，即\
  \ 0 或 1。另一个需要牢记的重要方面是，协议不能无限期等待所有进程响应，因为它们可能处于不可用（离线）状态。\n\n该算法仅适用于二元共识。算法中需要管理两个变量：一个值为\
  \ 0 或 1 的值，以及表示算法当前所处阶段的阶段编号 (p)。算法按轮次进行，每一轮包含两个子轮或阶段。\n\n请注意，每个进程都有自己的硬币。利用这种硬币方案的算法类别称为本地硬币算法。本地抛硬币通过输出二进制数的随机数生成器实现。每个进程抛自己的硬币，以\
  \ ½ 的概率输出 0 或 1。如果未找到多数值，进程会抛硬币以选择一个新的本地值。\n\n### 针对良性故障/崩溃故障的算法——非拜占庭\n\n```\n\
  每个进程 p 执行以下算法：\n进程 p: 初始值 x = 0 或 1\n0: 设置 r = 1\n--第一个子轮或阶段 – 提议阶段\n1: 向所有进程（包括自身）广播\
  \ (1, r, x)\n2: 等待，直到从 n - t 个进程接收到类型为 (1,r,*) 的消息。\n2(a): 如果接收到的消息中，超过 n / 2 条具有相同值\
  \ v，则\n--第二个子轮或阶段 – 决策阶段\n2(b): 向所有进程（包括自身）广播消息 (2, r, v, D)\n2(c): 否则，向所有进程（包括自身）广播消息\
  \ (2, r, ?)\n3: 等待，直到从 n - t 个进程接收到类型为 (2, r, *) 的消息。\n3(a): 如果存在 1 条 D 类型消息 (2,\
  \ r, v, D)，则投票给 v，即设置 x = v\n3(b): 如果存在超过 t 条 D 类型消息，则决定 v。\n3(c): 否则，通过抛硬币将 x 设置为\
  \ 0 或 1，每个概率为 1/2\n4: 设置 r = r + 1，开始下一轮，并跳转到步骤 1。\n```\n\n这里，`r` 是轮次编号；`x` 是进程提出的初始偏好值或提议值；`1`\
  \ 是主轮的第一个子轮、轮次或阶段；`2` 是主轮的第二个子轮、轮次或阶段；`*` 可以是 `0` 或 `1`；`?` 表示未观察到多数；`N` 是节点（进程）数量；`D`\
  \ 表示批准（认可）——换言之，表示进程已观察到多数相同值；`t` 是故障节点数量；`v` 是值；`coinflip()` 是一个均匀随机数生成器，生成 `0`\
  \ 或 `1`。\n\n我们可以在图 6-8 所示的图表中直观理解此协议。\n\n![](img/515270_1_En_6_Fig8_HTML.png)\n\n\
  一个共识协议的流程图，从设置 X 等于 0 或 1，r 等于 1 开始，经过广播、接收等步骤。\n\n**图 6-8** Ben-Or 仅容崩溃故障的共识协议——（非拜占庭）\n\
  \n如果 `n` > 2*t*，则协议以概率 1 保证所有进程最终会就同一个值达成一致；并且如果所有进程都以值 `v` 启动，那么在一轮之内所有进程都将决定 `v`。此外，如果在某一轮中，一个进程在接收到超过\
  \ `t` 条 D 类型消息后决定 `v`，则所有其他进程将在下一轮中决定 `v`。\n\n前面描述的协议适用于崩溃故障；为了容忍拜占庭故障，需要进行一些微调，我们接下来进行描述。\n\
  \n### 针对拜占庭故障的 Ben-Or 算法\n\n```\n每个进程 p 执行以下算法：\n进程 p: 初始值 x = 0 或 1\n0: 设置 r =\
  \ 1\n--第一个子轮或阶段 – 提议阶段\n1: 向所有进程（包括自身）广播 (1, r, x)\n2: 等待，直到从 N - t 个进程接收到类型为 (1,r,*)\
  \ 的消息。\n2(a): 如果接收到的消息中，超过 (N + t)/2 条具有相同值 v，则\n--第二个子轮或阶段 – 决策阶段\n2(b): 向所有进程（包括自身）广播消息\
  \ (2, r, v, D)\n2(c): 否则，向所有进程（包括自身）广播消息 (2, r, ?)\n3: 等待，直到从 n - t 个进程接收到类型为 (2,\
  \ r, *) 的消息。\n3(a): 如果存在至少 t + 1 条 D 类型消息 (2, r, v, D)，则投票给 v，即设置 x = v\n3(b): 如果存在超过\
  \ (n + t)/2 条 D 类型消息，则决定 v。\n3(c): 否则，通过抛硬币将 x 设置为 0 或 1，每个概率为 1/2\n4: 设置 r = r\
  \ + 1，开始下一轮，并跳转到步骤 1。\n```\n\n这里，`r` 是轮次编号；`x` 是进程提出的初始偏好值或提议值；`1` 是主轮的第一个子轮、轮次或阶段；`2`\
  \ 是主轮的第二个子轮、轮次或阶段；`*` 可以是 `0` 或 `1`；`?` 表示未观察到多数；`N` 是节点（进程）数量；`D` 表示批准（认可）——换言之，表示进程已观察到多数相同值；`t`\
  \ 是故障节点数量；`v` 是值；`coinflip()` 是一个均匀随机数生成器，生成 `0` 或 `1`。\n\n我们可以在图 6-9 中直观理解此协议。\n\
  \n![](img/515270_1_En_6_Fig9_HTML.png)\n\n一个共识协议的流程图，从设置 X 等于 0 或 1，r 等于 1 开始，经过广播、接收等步骤。\n\
  \n**图 6-9** Ben-Or 拜占庭共识协议\n\n在协议的第一个子轮或阶段，每个进程广播其提议的偏好值，并等待接收 `n` − `t` 条消息。如果超过\
  \ ![](img/515270_1_En_6_Chapter_TeX_IEq1.png) 个进程达成一致，则达到多数，偏好值相应设定。\n\n\n\n在协议的第二子轮（或阶段）中，如果在第一子轮观察到多数，则广播多数指示（`2,\
  \ r, v, D`）；否则，如果在第一子轮未观察到多数（`?`），则广播无多数。协议随后等待`n – t`个确认。如果观察到至少`t + 1`个关于`0`或`1`的多数确认，则相应设置首选值。此处仅设置首选值，不做出决策。若`p`收到超过`(n\
  \ + t) / 2`个确认，则`p`做出决策，仅在此之后才确定该值。如果既未收到`t + 1`个确认，也未收到`(n + t) / 2`个确认，则掷硬币以选择一个均匀随机值`0`或`1`。\n\
  \n请注意，通过等待`n – t`条消息，处理了拜占庭节点恶意决定不投票的拜占庭故障情况。这是因为在存在`t`个故障的情况下，至少有`n`个节点是诚实的。在第二子轮中，`t\
  \ + 1`个多数值的确认意味着至少有一个诚实节点观察到了多数。在`(n + t) / 2`个确认的情况下，这意味着该值被多数节点观察到。\n\n因此，总结来说，如果`n\
  \ > 5t`，该协议以概率`1`保证所有进程最终将就同一值达成一致；并且如果所有进程都以值`v`开始，那么在一轮内所有进程将就`v`达成一致。此外，如果在某一轮中，一个诚实节点在收到超过`(n\
  \ + t) / 2`个`D`类型消息后决定采用`v`，那么所有其他进程将在下一轮内决定采用`v`。\n\n*请注意，我使用`t`来表示故障进程，这与该主题的原始论文一致。然而，在文献中，`f`也被广泛用于表示故障（拜占庭故障或崩溃故障）。因此，`t\
  \ + 1`或`f + 1`含义相同，因为`t`和`f`表示同一事物。*\n\n现在问题来了：这个协议如何实现一致性、有效性和终止性？让我们尝试回答这些问题。\n\
  \n一致性之所以可能，是因为在主轮的第一阶段（子轮）中，最多只有一个值可以成为多数。如果某个进程观察到了`t + 1`个`D`类型消息（形式为`(2, r, v,\
  \ D)`的批准消息），那么每个进程都会观察到至少一个形式为`(2, r, v, D)`的批准消息。最后，如果每个进程都看到了一个形式为`(2, r, v, D)`的批准消息，那么每个进程都会在`r\
  \ + 1`轮的第一子轮（阶段）中投票给值`v`（接受值`v`），并在第二子轮（阶段）中决定采用`v`，除非它已经做出了决定。\n\n有效性之所以可能，是因为如果所有进程在一轮中都投票给（接受）它们的共同值`v`，那么所有进程都会广播`(2,\
  \ r, v, D)`并在该轮的第二子轮中做出决定。此外，请注意在一轮的第一子轮中，只有一个进程的首选值被广播。\n\nBen-Or 协议最终会终止，是因为最终大多数无故障进程会通过掷硬币来获得相同的随机值。这个多数值随后被诚实进程观察到，它们进而传播带有该多数值的`D`类型消息（批准消息）。最终，诚实进程将收到`D`类型消息（批准消息），协议将终止。\n\
  \n另外，请注意需要两个子轮的原因是：在第一阶段，首选值的提议数量被减少到最多一个；然后在第二子轮中，简单的多数投票就足以做出决定。可以设计只有一轮的共识算法，但这要求最小进程数为`3f\
  \ + 1`。而在异步环境下采用两轮，则满足了`2f + 1`的下限。\n\n前面描述的 Ben-Or 算法不使用任何密码学原语，并且假设存在强大的对手。然而，也有大量工作研究在可用密码学原语下的异步拜占庭共识。当然，在此模型下，假设对手始终是计算能力受限的。前面描述了一些在该模型下的著名早期协议，例如针对已认证拜占庭故障模型的签名消息协议和\
  \ DLS 协议。还有其他算法协同处理硬币抛掷，或者换句话说，使用全局或共享硬币抛掷机制。共享硬币或全局硬币是一种伪随机硬币，它能在同一轮中为所有进程产生相同的结果。这一属性立即意味着在基于共享硬币的机制中，收敛速度要快得多。类似的技术首次在\
  \ Rabin 的算法中使用，该算法利用密码学技术将预期时间减少到了常数轮次。\n\n在对早期共识协议进行了基本介绍之后，我现在将介绍早期的复制协议，这些协议当然从根本上基于共识，但可以被归类为复制协议而非单纯的共识算法。\n\
  \n我们在前面的第 [3] 章中看到，复制允许多个副本在分布式系统中实现一致性。它是一种在分布式系统中提供高可用性的方法。有不同的模型，包括主备复制和主动复制。你可以参考第\
  \ [3] 章来阅读更多关于状态机复制和其他技术的内容。\n\n\n\n## 利用故障检测器达成共识\n\n我们在第三章前面讨论了故障检测器及其不同类别。在此，我们概述一种名为\
  \ *Chandra-Toueg 共识协议* 的算法框架，该算法使用最终强故障检测器 `⋄S` 来解决共识问题，而该检测器是解决共识问题所需的最弱故障检测器 [10]。回顾一下，最终强故障检测器满足强完备性和最终弱准确性属性。\n\
  \n该协议考虑一个异步网络模型，其中 `f < ⌈n/2⌉`，即至少有 `⌈(n+1)/2⌉` 个正确进程。假设失效进程少于 `n/2` 个，使得进程能够等待接收大多数响应，而无需考虑故障检测器当前怀疑的对象。\n\
  \n该协议在异步环境下按轮次运行，并设有轮换的协调者。协议使用可靠广播，确保任何广播的消息要么不被任何进程接收（投递），要么被所有诚实进程恰好接收一次。\n\n\
  算法工作方式如下。\n\n每个进程维护一些变量：\n\n- 决策值的估计值 – 提议值\n- 状态\n- 进程的当前轮次号\n- 进程上次更新其估计值（偏好）的轮次\n\
  \n在状态被决定之前，进程会经历多个递增的异步轮次，每一轮分为四个阶段或子轮，协调者会轮换，直到达成决策。协调者采用轮询方式选择，公式为 `(r mod n)\
  \ + 1`，其中 `r` 是当前轮次号，`n` 是进程总数：\n\n- 最后，任何未决定的进程若通过可靠广播投递了一个值，则接受并决定该值。\n\n1. 所有进程使用类型为\
  \ `(进程 ID, 当前轮次号, 估计值, 发送方上次更新估计值的轮次号)` 的消息，将其估计值（偏好）发送给当前协调者。\n2. 当前协调者等待收集大多数\
  \ `⌈(n+1)/2⌉` 个估计值，并选择具有最新（最大）上次更新轮次号的提议值作为其估计值，然后将新的估计值提议给所有进程。\n3. 每个进程等待从当前协调者收到新的提议（估计值），或等待故障检测器怀疑当前协调者。如果收到新的估计值，则更新其偏好，将上次更新轮次号变量设置为当前轮次，并向当前协调者发送\
  \ `ack` 消息。否则，它发送 `nack`，表示怀疑当前协调者已崩溃。\n4. 当前协调者等待 `⌈(n+1)/2⌉` 个回复（即来自进程的大多数回复，要么是\
  \ `ack` 要么是 `nack`）。如果当前协调者收到大多数 ack，意味着 `⌈(n+1)/2⌉` 个进程已接受其估计值，则该估计值被锁定，协调者执行 `decide`\
  \ 消息（已决定的值）的可靠广播。\n\n请注意，论文 [10] 中还包含其他算法，但我在此仅描述了利用最终强故障检测器解决共识的那一种。\n\n现在让我们看看如何满足一致性、有效性和终止性要求。\n\
  \n**一致性** 是满足的。考虑一种场景，可能有两个协调者进行广播，导致部分进程接受第一个协调者的值，而另一部分进程接受另一个协调者的值。这将违反一致性，因为这里两个进程做出了不同的决定，即选择了两个不同的值。然而，这种情况不可能发生，因为第一个协调者要发送决策，必须收到来自大多数进程的足够多的确认（ack）。所有后续寻找大多数进程的协调者都会发现与之前协调者的结果重叠。估计值将是最新的那个。因此，任何两个广播决策的协调者发送的都是相同的决策。\n\
  \n**有效性** 也是满足的，因为每个估计值都是某个进程的输入值。协议设计不允许生成任何新的估计值。\n\n该协议最终会**终止**，因为故障检测器（一种最终强故障检测器）最终会停止怀疑某个正确进程，而该进程最终将成为协调者。在新的协调者出现后，在某个轮次，所有正确进程都会等待接收这个新协调者的估计值，并回应足够的\
  \ `ack` 消息。当协调者收集到大多数 `ack` 消息时，它会将其已决定的估计值发送给所有进程，所有进程都将终止。请注意，如果某个进程最终一直在等待一个已终止进程的响应，它也会通过其他正确节点的重传最终收到消息，并最终做出决定并终止。例如，假设一个进程因等待来自崩溃协调者的消息而卡住。最终，由于最终强故障检测器的强完备性属性，该崩溃的协调者会被怀疑，从而确保进展。\n\
  \n## 总结\n\n本章涵盖了早期的一些协议，这些协议为当今大多数共识研究奠定了坚实的基础。随着区块链的出现，许多这类协议启发了新一代区块链协议的发展，特别是针对许可型区块链。例如，Tendermint\
  \ 就基于 DLS 协议，即 DLS 论文中的算法二。\n\n我们并未讨论本章中的所有算法，但本章应为读者提供进一步学习所需的坚实基础。为了规避 FLP 不可能性，可以在系统中引入随机性，方法要么是假设随机模型，要么是在进程中进行本地抛硬币操作。第一个采用随机模型（也称为公平调度、随机化调度）机制的提案来自\
  \ Bracha 和 Toueg [17]。基于第二种方法（为进程提供本地抛硬币操作）的算法最早由 Ben-Or [2] 提出，这也是第一个随机化共识协议。通过使用基于数字签名和可信委托方实现的共享硬币（全局硬币）方法来达到期望常数轮次数的第一种方法，发表于\
  \ Rabin [14]。利用故障检测器的协议由 Chandra 和 Toueg [15] 提出。关于异步共识随机化协议的一份优秀综述来自 Aspnes [16]。\n\
  \n随机化协议是一种规避 FLP 结果的方法，但我们能否彻底驳斥 FLP 不可能性结果？这听起来不可能，但我们在第 9 章将会看到，驳斥 FLP 结果或许是有可能的。\n\
  \n在下一章中，我们将介绍经典协议，例如 PBFT，它被视为从视图戳复制（VR）协议自然演进而来，我们也会在下一章中介绍 VR 协议。虽然 VR 仅处理崩溃故障，但\
  \ PBFT 还处理拜占庭故障。我们还将介绍其他协议，例如 Paxos，它是大多数（即便不是全部）共识协议的基础。几乎所有共识算法都以某种方式利用了 Paxos\
  \ 中提出的基本思想。\n\n\n\n"
- "# 7. 经典共识算法\n\n20 世纪 80 年代出现的共识与复制协议在共识协议研究中做出了深远贡献。早期的复制协议（如视图戳复制）为容错复制的设计与实现提供了深刻见解。几乎在同一时期，Paxos\
  \ 协议问世，它提供了一套具有严格形式化规范与分析的实用协议。1999 年，首个实用的拜占庭容错协议诞生。本章将详细阐述这些经典协议的设计原理、工作机制，以及它们如何保证安全性与活性。此外，还将探讨如何以及在何种条件下可以将这些协议应用于区块链。同时，本章也会讨论近期开发的协议（如\
  \ RAFT），该协议在经典协议基础上构建了一套更易理解的共识机制。\n\n## 视图戳复制\n\n1988 年，Brian Oki 和 Barbara Liskov\
  \ 提出了视图戳复制方法，用于在节点间实现复制。这是最基本的一致性保障机制之一，能够确保复制数据的一致性（即一致的视图）。该机制在发生崩溃故障和网络分区时仍能正常运作，但前提条件是崩溃节点最终能恢复，网络分区也能愈合。它本质上也是一种共识算法——因为为了在复制数据上实现一致性，各节点必须就复制状态达成一致。\n\
  \n视图戳复制有两个主要目的。一是构建一个足够协调的分布式系统，使客户端感觉像是在与单台服务器通信。二是实现状态机复制。状态机复制要求所有副本从相同的初始状态启动，且操作具有确定性。基于这些条件（假设），我们可以很容易地推断：如果所有副本执行了相同的操作序列，那么它们最终将达到相同的状态。当然，这里的挑战在于即使发生故障，也要确保操作在所有副本上以相同的顺序执行。总而言之，该协议提供了容错性和一致性。它基于主备复制技术。\n\
  \n视图戳复制（VR）协议包含三个子协议：\n\n- **正常运行协议**：在正常条件下处理客户端请求并实现复制\n- **视图变更协议**：处理主节点故障，并启动新的视图和主节点\n\
  - **副本恢复协议**：处理故障副本恢复后的重新加入\n\nVR 协议受两阶段提交协议启发，但与两阶段提交不同：它是一种具有故障恢复能力的协议，不会因主节点（在两阶段提交术语中称为协调者）或副本失败而阻塞。只要故障副本数量不超过`f`个，该协议就能保证可靠性和可用性。它使用由`2f\
  \ + 1`个副本组成的副本组，在异步环境下可容忍`f`个副本的崩溃故障，且仲裁大小为`f+1`。\n\n每个副本维护的状态信息包括：配置信息、副本编号、当前视图、当前状态（正常/视图变更/恢复中）、最新请求分配的`op`编号、包含已接收请求及对应`op`编号的日志，以及记录最近客户端请求、执行状态及相应结果的客户端表。\n\
  \n让我们看看 VR 协议中的正常运行流程。首先，了解变量及其含义：\n\n- `op`：客户端操作\n- `c`：客户端 ID\n- `s`：请求编号\n-\
  \ `v`：客户端已知的视图编号\n- `m`：来自客户端的消息\n- `n`：分配给请求的操作编号\n- `i`：非主副本\n- `x`：结果\n\n#####\
  \ 协议步骤\n\n1. 客户端向主副本发送请求消息，格式为`<REQUEST op, c, s, v>`。\n\n2. 主节点收到请求后：\n   1. 递增操作编号。\n\
  \   2. 将请求消息追加到日志末尾。\n   3. 向其他副本发送`<PREPARE m, v, n>`消息。\n\n3. 副本收到准备消息后：\n   1.\
  \ 仅当该准备消息中操作编号之前的所有前置请求都已记录在日志中时，才接受该准备消息。\n   2. 否则，等待通过状态传输补全缺失条目。\n   3. 将请求追加到自己的日志中。\n\
  \   4. 向主副本发送`<PREPAREOK v, n, i>`消息。\n\n4. 主节点等待接收到`f`个来自其他副本的`PREPAREOK`消息后：\n\
  \   1. 认为该操作已提交\n   2. 执行所有待处理操作\n   3. 执行最新操作\n   4. 向客户端发送`<REPLY v, s, x>`消息\n\
  \n5. 提交完成后，主副本通知其他副本进行提交。\n\n6. 其他副本在将操作追加到日志后执行该操作，但需先完成所有待处理操作的执行。\n\n该过程如图 7-1\
  \ 所示。\n\n![](img/515270_1_En_7_Fig1_HTML.png)\n\nVR 协议示意图包含客户端、主节点、副本 1 和副本 2 的线条。这些线条按请求、准备、准备确认和回复阶段划分。\n\
  \n**图 7-1** – VR 协议 – 正常运行流程\n\n当主节点发生故障时，视图变更协议启动。副本通过超时机制检测故障：\n\n- `v`：视图编号\n\
  - `l`：副本的日志/新日志\n- `k`：副本已知的最新已提交请求的操作编号\n- `I`：副本标识符\n\n\n\n##### 视图变更\n\n视图变更协议的工作方式如下：\n\
  \n1.  当副本怀疑主节点发生故障时，它会：\n    1.  递增其视图编号\n    2.  将其状态更改为视图变更\n    3.  向下一个视图的主节点发送`<DOVIEWCHANGE\
  \ v, l, k, i>`消息\n\n2.  当新的主节点收到`f+1`条`<DOVIEWCHANGE>`消息时，它会：\n    1.  选择消息中最近的日志，并将其作为新的日志\n\
  \    2.  将操作编号设置为新日志中最新条目的编号\n    3.  将其状态更改为正常\n    4.  向其他副本发送`<STARTVIEW v, l,\
  \ k>`消息，表明视图变更过程完成\n\n3.  现在，新的主节点会：\n    1.  顺序执行任何未执行的已提交操作\n    2.  向客户端发送回复\n\
  \    3.  开始接受新的客户端请求\n\n4.  其他副本在收到`<STARTVIEW>`消息后：\n    1.  用消息中的日志替换自己的日志\n \
  \   2.  将操作编号设置为日志中最新的条目编号\n    3.  将视图编号设置为消息中的编号\n    4.  将其状态更改为正常\n    5.  为未提交的消息发送`PREPAREOK`\n\
  \n如果新的主节点也发生故障，视图变更协议会重复执行。\n\n图 7-2 直观地展示了这一过程。\n\n![](img/515270_1_En_7_Fig2_HTML.png)\n\
  \n这张 VR 中视图变更的示意图包含主节点、新主节点、副本 1 和副本 2 的线条。这些线条分阶段展示了视图变更和新视图。\n\n**图 7-2** VR 中的视图变更\n\
  \n这里的关键安全要求是，所有已提交的操作都必须保持其顺序传递到下一个视图。\n\n我们没有刻意讨论 VR 的所有复杂细节，因为我们更关注主流协议。尽管如此，这应该能让您了解\
  \ VR 中引入的基本概念，这些概念在几乎所有复制和共识协议中都起着至关重要的作用，尤其是 PBFT、Paxos 和 RAFT。在阅读后续章节时，您将看到 PBFT\
  \ 如何演变为 VR 的一种形式，以及 VR 与本章介绍的不同协议之间的其他相似之处。当您阅读关于 RAFT 的章节时，会发现 VR 和 RAFT 之间有很好的相似性。\n\
  \n让我们首先来看 Paxos，它无疑是最具影响力和最基础的共识协议。\n\n## Paxos\n\nPaxos 由 Leslie Lamport 发现。它于\
  \ 1988 年首次提出，随后在 1998 年以更正式的形式发表。这是最基础的分布式共识算法，允许在不可靠的通信条件下就某个值达成共识。换句话说，Paxos 用于构建即使在存在故障的情况下也能正确运行的可靠系统。Paxos\
  \ 使状态机复制的实现变得更加实用。一个称为 `multi-Paxos` 的 Paxos 变体通常用于实现复制的状态机。它在异步的消息传递模型下运行，能够容忍少于\
  \ `n/2` 的崩溃故障，即满足 `2f + 1` 的下限。\n\n早期的共识机制并没有分别处理安全性和活跃性。Paxos 协议采用了一种不同的方法来解决共识问题，它将安全性和活跃性属性分离开来。\n\
  \n运行 Paxos 协议的系统中，节点可以承担三种角色。一个进程可以同时承担所有三种角色：\n\n*   **提议者**：提议待决定的值。被选出的提议者充当单个领导者来提议新值。提议者负责处理客户端请求。\n\
  *   **接受者**：接受者根据若干规则和条件评估并接受或拒绝提议者提出的提案。\n*   **学习者**：学习决定的结果，即达成一致的值。\n\nPaxos\
  \ 节点还有一些相关的规则。Paxos 节点必须是持久化的，即它们必须存储自己的行为，并且必须记住自己已经接受了什么。节点还必须知道多少个接受者能构成多数派。\n\
  \nPaxos 可以看作类似于两阶段提交协议。两阶段提交（2PC）是一种标准的原子提交协议，用于确保只有在所有参与者都同意提交的情况下，事务才会在分布式数据库中被提交。即使单个节点不同意提交事务，整个事务也会被完全回滚。\n\
  \n类似地，在 Paxos 中，提议者在第一阶段向接受者发送一个提案。然后，当且仅当接受者接受该提案时，提议者向接受者广播一个提交请求。一旦接受者提交并向提议者报告，该提案就被视为最终确定，协议结束。与两阶段提交相比，Paxos\
  \ 引入了排序，即定序，以实现提案的全序。此外，它还引入了基于多数仲裁的提案接受方式，而不是期望所有节点都同意。这种方案允许协议即使在部分节点发生故障时也能继续推进。这两项改进都保证了\
  \ Paxos 算法的安全性和活跃性。\n\n该协议由两个阶段组成：准备阶段和接受阶段。在准备阶段结束时，多数接受者已经承诺了一个特定的提案编号。在接受阶段结束时，多数接受者已经接受了一个提议的值，共识达成。\n\
  \n算法的具体工作方式如下：\n\n**第一阶段 – 准备阶段**\n\n*   提议者收到客户端要求就某个值达成共识的请求。\n*   提议者向多数或全部接受者发送`prepare(n)`消息。在此阶段，尚未为决策提议任何值。在假定多数派中的所有接受者都会响应的情况下，多数接受者就足够了。此处，`n`代表提案编号，它必须是全局唯一的，并且必须大于该提议者之前使用过的任何提案编号。例如，`n`可以是纳秒级的时间戳或其他递增的值。如果发生超时，提议者将使用更大的`n`重试。换句话说，如果提议者因缺乏接受者的响应而无法推进，它可以使用更高的提案编号重试。\n\
  \n\n\n当一个接收者收到`prepare(n)`消息时，它做出一个“承诺”。它执行以下操作：\n\n- 如果之前没有通过响应准备消息做出过承诺，那么该接收者现在承诺忽略任何小于提案编号`n`的请求。它记录`n`，并回复消息`promise(n)`。\n\
  - 如果该接收者之前已经做出过承诺，即已经用某个低于`n`的提案编号响应过另一个准备消息，则接收者执行以下操作：\n  - 如果该接收者在接受阶段尚未从提议者那里收到任何接受消息，它会存储更高的提案编号`n`，然后向提议者发送一条承诺消息。\n\
  \  - 如果该接收者之前已收到一个带有其他较低提案编号的接受消息，则它一定已经从某个提议者那里接受了一个提议值。这个先前完整的提案会连同承诺消息一起发送给提议者，表明该接收者已经接受了一个值。\n\
  \n**阶段 2 – 接受阶段**\n\n当提议者从多数接收者那里收到针对特定`n`的足够多的响应（即承诺消息）时，阶段 2 开始：\n\n- 提议者会一直等待，直到它从多数接收者那里获得针对`n`的响应。\n\
  - 收到响应后，提议者评估要在接受消息中发送的值`v`。它执行以下操作：\n  - 如果提议者收到了一条或多条带有完整提案的承诺消息，它会选择具有最高提案编号的提案中的值`v`。\n\
  \  - 如果提议者收到的承诺消息中没有包含完整提案，提议者可以自由选择任何值。\n  - 提议者现在向接收者发送一条接受消息 —— 格式为`accept(n,\
  \ v)`的完整提案，其中`n`是被承诺的提案编号，`v`是实际提议的值。\n- 当接收者收到`accept(n, v)`消息时，它执行以下操作：\n  - 如果该接收者先前已承诺不接受此提案编号，它将忽略此消息。\n\
  \  - 否则，只有当它响应过对应的具有相同`n`的准备请求（即`prepare(n)`）时，它才会回复`accepted(n, v)`，表示接受该提案。\n\
  \  - 最后，接收者向所有学习者发送`accepted(n, v)`。\n- 如果多数接收者接受了提案中的值`v`，则`v`成为协议的决定值，即达成共识。\n\
  \n有时，人们会区分接受阶段和第三个被称为学习阶段的阶段，在学习阶段中，学习者从接收者那里了解决定值。在上述算法中，我们没有单独展示这一点，因为学习被认为是第二阶段的一部分。一旦提案在接受阶段被接受，接收者就会通知学习者。图\
  \ 7-3 确实展示了一个称为学习阶段的第三阶段，但这只是为了以更简单的方式可视化协议；学习实际上是阶段 2（接受阶段）的一部分。\n\n![](img/515270_1_En_7_Fig3_HTML.png)\n\
  \n一个 Paxos 正常运行的图，包含提议者、接收者 1、2、3、学习者 1 和 2 的连线。这些连线分为准备、接受和学习三个阶段。\n\n**图 7-3**\
  \ Paxos 的正常运行\n\n我们使用了术语“多数”，表示多数的接收者已经响应或接受了一条消息。多数来源于一个法定人数。在多数法定人数中，每个法定人数都有`⌊n/2⌋\
  \ + 1`个节点。还要注意的是，为了容忍`f`个故障接收者，至少需要一个由`2f + 1`个接收者组成的集合。我们在第 3 章中讨论了法定人数系统。\n\n\
  该协议在图 7-3 中进行了说明。\n\n请注意，Paxos 算法一旦达成一次共识，就不会继续进入下一次共识。需要再次运行 Paxos 才能达成下一次共识。此外，如果一半或一半以上的节点出现故障，Paxos\
  \ 无法取得进展，因为在这种情况下无法达成多数，而多数对于取得进展至关重要。它是安全的，因为一旦一个值被同意，它就永远不会被更改。尽管 Paxos 保证是安全的，但协议的活动性并不保证。这里的假设是，网络中有足够大的一部分在足够长的时间内是正确（无故障）的，然后协议才能达成共识；否则，协议可能永远不会终止。\n\
  \n通常，学习者是直接从接收者那里学习决定值的；然而，在大型网络中，学习者有可能通过中继其中一部分人（一个小组）直接从接收者那里学到的值，来彼此学习。或者，学习者可以定期轮询接收者，以检查是否存在决定。也可以选举出一个学习者节点，由接收者通知该节点，然后该当选的学习者将决定传播给其他学习者。\n\
  \n现在让我们考虑一些故障场景。\n\n### 故障场景\n\n想象一下，如果一个接收者在第一阶段（即准备阶段）发生故障，那么它将不会向提议者发回承诺消息。然而，如果多数法定人数能够响应，提议者将会收到这些响应，协议也将取得进展。如果一个接收者在第二阶段（即接受阶段）发生故障，那么该接收者将不会向提议者发回已接受消息。同样，如果多数接收者是正确且可用的，提议者和学习者将收到足够的响应以继续。\n\
  \n如果提议者在准备阶段或接受阶段发生故障会怎样？如果提议者在发送任何准备消息之前发生故障，则没有任何影响；其他提议者将会运行，协议将继续。如果提议者在阶段 1\
  \ 中发送了准备消息后发生故障，那么接收者将不会收到任何接受消息，因为承诺消息未能到达提议者。在这种情况下，其他提议者将以更高的提案编号进行提议，协议将继续推进。之前的准备将成为历史。如果提议者在接受阶段中发送了接受消息（该消息已被至少一个接收者收到）后发生故障，其他提议者将发送一个带有更高提案编号的准备消息，接收者将用一条承诺消息响应提议者，表明一个较早的值已经被接受。此时，提议者将转而提议同一个较早的值（即带有最高已接受提案编号的值），也就是发送一条带有相同较早值的接受消息。\n\
  \n另一种场景可能是两个提议者同时试图提议它们自己的值。想象有两个提议者已经向接收者发送了它们的准备消息。在这种情况下，任何之前从 P1 接受了更大提案编号的接收者，如果提议者\
  \ P2 提出的提案编号低于接收者之前已经接受的编号，则会忽略该提案。如果存在一个接收者 A3 之前没有见过任何值，即使 P2 的提案编号低于其他接收者之前从\
  \ P1 收到并接受的提案编号，它也会接受 P2 的提案编号，因为 A3 不知道其他接收者在做什么。该接收者随后会正常回复 P2。然而，由于提议者等待多数接收者响应，P2\
  \ 将不会从多数接收者那里收到承诺消息，因为仅凭 A3 并不构成多数。另一方面，P1 将从多数接收者那里收到承诺消息，因为 A1 和 A2（其他接收者）属于多数，并将向\
  \ P1 返回响应。当 P2 没有从多数接收者那里收到响应时，它会超时并可以尝试使用更高的提案编号重试。\n\n\n\n现在设想一个场景：某个`P1`提议的提案已被接受者达成共识，但另一个提议者`P2`对此并不知情，并发送了一个比之前编号更高的准备请求消息。此时，接受者在收到`P2`发来的更高编号的请求后，会检查自己之前是否已接受过任何消息；如果已接受，接受者将向`P2`回复一个格式为`promise(nfromp2,(nfromp1,\
  \ vfromp1))`的承诺消息，其中包含它们之前接受过的最高提案编号以及对应的已接受值。否则，它们会正常回复一个承诺消息给`P2`。当`P2`收到消息`promise(nfromp2,(nfromp1,\
  \ vfromp1))`后，会对其进行检查：如果`nfromp1`是此前最高的提案编号，那么值`v`将变为`vfromp1`；否则，`P2`将选择它自己想要的任意值`v`。总之，如果`P2`收到的承诺消息表明另一个值已被选定，那么它将提出此前已被选定的、编号最高的值。此时，`P2`会以其已选定的`n`和`v`（即`vfromp1`）发送一个接受消息。现在接受者们都很满意，因为它们看到了最高的`n`，会像往常一样回复一个已接受消息，并同时通知学习者。请注意，此时被选定的值仍然是`P2`提出的值，只是现在的编号`n`变成了最高。\n\
  \n在某些场景下，该协议可能进入活锁状态，从而导致进度停滞。一种场景可能是两个不同的提议者互相竞争提案，这种情况也被称为“决斗的提议者”。在这种情况下，Paxos\
  \ 的活性无法得到保证。\n\n假设我们有两位提议者`P1`和`P2`，以及三位接受者`A1`、`A2`和`A3`。现在，`P1`向多数派接受者`A1`和`A2`发送准备消息。`A1`和`A2`向`P1`回复了承诺消息。再假设另一位提议者`P2`也提出提案，并向`A2`和`A3`发送了一个编号更高的准备消息。由于协议规则规定，如果准备消息的提案编号高于接受者此前见过的编号，接受者就会对该准备消息做出承诺，因此`A3`和`A2`向`P2`回复了承诺消息。在第二阶段，当`P1`发送接受消息时，`A1`会接受它并回复已接受，但`A2`会忽略该消息，因为它已经承诺了来自`P2`的更高编号。此时，`P1`最终会因等待来自接受者的多数派响应而超时，因为多数派现在永远不会响应了。于是，`P1`会使用一个更高的编号再次尝试，并向`A1`和`A2`发送准备消息。假设`A1`和`A2`都回复了承诺消息。现在假设`P2`向`A2`和`A3`发送接受消息以使其值被选定。`A3`会回复已接受消息，但`A2`不会回复`P2`，因为它已经承诺了来自`P1`的另一个更高编号。于是，`P2`会因等待来自接受者的多数派响应而超时。`P2`现在会使用一个更高的编号再次尝试。这个循环可能周而复始，共识将永远无法达成，因为没有任何一个提议者能从接受者那里获得多数派响应。\n\
  \n这个问题通常通过选举一个单一的提议者作为领导者来处理所有客户端的传入请求来解决。这样一来，不同提议者之间就不会有竞争，因此不会发生这种活锁情况。然而，选举领导者也并非易事。唯一的领导者选举等同于解决共识问题。为了选举领导者，必须运行一个\
  \ Paxos 实例，而该选举共识本身也可能陷入活锁，于是我们又回到了同样的境地。一种可能性是使用不同类型的选举机制，例如“霸道算法”。Aguilera 等人的工作中还提出了其他一些领导者选举算法。我们也可以使用其他类型的共识机制来选举领导者，这种机制或许能保证终止，但在安全性上会有所牺牲。另一种处理活锁问题的方法是使用随机的指数级增长延迟，使得客户端在再次提出提案之前必须等待一段时间。我认为这些延迟也可以被引入到提议者端，这样会使某个提议者比另一个略微占优，从而在接受者收到另一个更高编号的准备消息之前，其提案值就能被接受。请注意，经典\
  \ Paxos 协议并不要求必须有一个被选举出的单一领导者，但在实际实现中，选举一个领导者是常见的做法。如果这个单一的领导者变成了单点故障，那么就必须选举另一个领导者。\n\
  \n需要记住的一个关键点是，要容忍`*f*`个崩溃故障，需要`2*f* + 1`个接受者。Paxos 也能容忍遗漏故障。假设一个准备消息丢失了，未能到达接受者，那么提议者将等待、超时，并使用更高的编号重试。同时，另一位提议者也可能在此期间使用更高的编号提出提案，协议仍然可以工作。此外，由于只需要接受者的多数派响应，只要多数派消息（`2*f*\
  \ + 1`个）从接受者成功到达提议者，协议就能继续推进。然而，由于遗漏故障，协议可能需要更长时间才能达成共识，或者在某些场景下可能永远无法终止，但它始终能保证安全性。\n\
  \n\n\n##### 安全性与活性\n\nPaxos 算法通过实现**安全性**和**活性**属性来解决共识问题。我们对每个属性都有一些要求。在安全性方面，我们主要关注一致性和有效性。**一致性**意味着不会选出两个不同的值。**有效性**（有时也称为**非平凡性**）意味着除非某个参与协议的进程提出了提议，否则不会决定任何值。另一个源于有效性属性的安全性要求可称为“**有效学习**”，即如果一个进程**学习**了一个值，则该值必须已由某个进程决定。一致性确保所有进程决定相同的值。有效性和有效学习要求确保进程仅对提议的值做出决定，而不会平凡地选择不做决定或选择某个预定义的值。\n\
  \n在**活性**方面，有两个要求。首先，协议最终会**决定**，即提议的值最终会被决定。其次，如果一个值已被决定，学习者最终会**学习**到该值。\n\n现在我们来讨论这些安全性和活性要求是如何满足的。\n\
  \n直观地说，一致性是通过确保大多数接受者只能为同一提案投票来实现的。想象两个不同的值 `v1` 和 `v2` 以某种方式被选出（决定）。我们知道，只有当大多数接受者接受了来自提议者且内容相同的接受消息时，协议才会选择一个值。这个条件意味着，一组多数接受者\
  \ `A1` 必须接受了一条包含提案 `(n1,v1)` 的接受消息。同时，另一组多数接受者 `A2` 必须接受了一条包含提案 `(n2, v2)` 的接受消息。假设这两个多数集合\
  \ `A1` 和 `A2` 必定有交集，这意味着根据法定人数交集规则，它们将至少有一个共同的接受者。这个接受者必须接受过两个提案编号相同但内容不同的提案。这种情况是不可能的，因为一个接受者会忽略任何与它已接受的提案编号相同的准备或接受消息。\n\
  \n如果 `n1 <> n2` 且 `n1 < n2` ，并且 `n1` 和 `n2` 是连续的提案轮次，那么这意味着 `A1` 必须在 `A2` 接受提案编号为\
  \ `n2` 的接受消息之前，就已经接受了提案编号为 `n1` 的接受消息。这是因为如果一个接受者之前已承诺过某个编号更大的提案，它会忽略任何提案编号更小的准备或接受消息。此外，提议者提出的值必须来自先前编号最高的提案中的值，如果接受消息中不包含任何提议的值，则使用提议者自身的提议值。正如我们所知，`A1`\
  \ 和 `A2` 必须至少有一个共同的接受者；这个共同的接受者必须同时接受了提案 `(n1,v1)` 和 `(n2,v2)` 的接受消息。这种情况也是不可能的，因为该接受者在回应提案编号为\
  \ `n2` 的准备消息时会回复 `(n1,v1)` ，这使得提议者必须选择值 `v1` 而非 `v2`。即使提案编号不连续，任何中间提案也必须选择 `v1`\
  \ 作为被选中的值。\n\n有效性是通过仅允许提议者输入的值被提议来保证的。换句话说，最终决定的值既不是预定义的，也不是由不属于运行 Paxos 集群的任何其他实体提议的。\n\
  \n由于异步性，Paxos 无法保证活性。然而，如果采用某些同步假设（即部分同步环境），那么进展是可以达成的，终止性也是可以实现的。我们假设在全局稳定时间（GST）之后，至少有多数接受者是正确且可用的。消息在已知的上限时间内送达，并且选举出的唯一非故障领导者提议者是正确且可用的。\n\
  \n### 实际应用\n\nPaxos 已在许多实际系统中得到实现。尽管 Paxos 算法核心相当简单，但通常被认为难以理解。因此，许多论文都是为了解释它而写的。尽管如此，它仍常被视为复杂且难以完全掌握。然而，这点小问题并不意味着它没有被广泛应用。相反，它已被用于许多生产系统，例如\
  \ Google 的 Spanner 和 Chubby。Paxos 的首次部署是在 Petal 分布式存储系统中。其他随机选取的例子包括 Apache ZooKeeper、NoSQL\
  \ Azure Cosmos 数据库和 Apache Cassandra。它被证明是解决共识问题最有效的协议。已有研究表明，两阶段提交是 Paxos 的一个特例，而\
  \ PBFT 是 Paxos 的一种改良。\n\n### 变体\n\n经典 Paxos 有许多变体，例如 Multi-Paxos、Fast Paxos、Byzantine\
  \ Paxos、Dynamic Paxos、Vertical Paxos、Disk Paxos、Egalitarian Paxos、Stoppable Paxos\
  \ 和 Cheap Paxos。\n\n\n\n### Multi-Paxos\n\n在经典 Paxos 中，即使在完全正确的环境中，也需要两次往返才能对单个值达成共识。这种方法速度较慢，如果需要对不断增长的值序列达成共识（实际情况通常如此），则必须重复运行此单值共识过程，效率不高。然而，通过一种优化措施，可以使经典\
  \ Paxos 足够高效，从而应用于实际系统中。回顾一下，Paxos 包含两个阶段。一旦阶段 1 和阶段 2 都完整运行过一次，那么此时，参与该轮阶段 1 和阶段\
  \ 2 的提议者就可以获得多数接受者的支持。该提议者现在成为了公认的领导者。提议者（领导者）无需重新运行阶段 1，只需利用这多数接受者持续运行阶段 2。只要它不崩溃，或者没有其他提议者以更高的提案编号出现并提议，这种连续发送接受消息的过程就可以继续。提议者甚至可以继续使用相同的提案编号运行接受/已接受轮次（阶段\
  \ 2），而无需运行准备/承诺轮次（阶段 1）。换句话说，消息延迟从四次减少到了两次。当另一个提议者出现或前一个提议者失败时，这个新提议者可以遵循经典 Paxos\
  \ 再次运行阶段 1 和阶段 2。当这个新提议者通过获得多数接受者的支持成为领导者时，基础的经典 Paxos 协议就升级为 Multi-Paxos，并且它可以开始仅运行阶段\
  \ 2。只要网络中只有一个领导者，就没有接受者会通知领导者它已接受了其他任何提案，这将允许领导者选择任何值。这个条件允许在仅有一个当选的提议者作为领导者时省略第一阶段。\n\
  \n该协议被称为优化 Paxos 或多 Paxos（Multi-Paxos）。Multi-Paxos 的正常运行流程如图 7-4 所示。\n\n![](img/515270_1_En_7_Fig4_HTML.jpg)\n\
  \n多 Paxos 的示意图包含提议者、接受者 1、2、3、学习者 1 和学习者 2 的线条。这些线条分阶段进入接受和学习阶段。\n\n**图 7-4**  \n\
  Multi-Paxos – 注意第一阶段（准备阶段）已被跳过\n\n原始的 Paxos 是一个无领导者（也称为对称）协议，而 Multi-Paxos 是领导者驱动（也称为非对称）的协议。它被用于实际系统中以实现状态机复制，而非经典\
  \ Paxos。通常在实现中，提议者、接受者和学习者的角色会被合并到所谓的服务器中，这些服务器可能同时承担这三种角色。最终，仅呈现出客户端-服务器模型。随着角色的合并、稳定领导者的确立以及准备阶段的移除，该协议变得高效且简单。\n\
  \nPaxos 被认为是一个难以理解的协议。这主要是由于规范不足。此外，Lamport 描述的原始协议是一个单法令协议，不便于实际实现。已经有过多次尝试，例如\
  \ Multi-Paxos，以及多篇试图解释 Paxos 的论文，但总体而言，该协议仍被认为在理解和实现上有些棘手。考虑到这些以及其他几点因素，一个名为 RAFT\
  \ 的协议被开发出来。我们接下来介绍 RAFT。\n\n## RAFT\n\nRAFT 的设计是为了应对 Paxos 的不足之处。RAFT 代表复制和容错（Replicated\
  \ And Fault Tolerant）。RAFT 的作者们的主要目标是开发一个易于理解和易于实现的协议。RAFT 背后的关键思想是通过持久化日志实现状态机复制。状态机的状态由持久化日志决定。RAFT\
  \ 允许集群重配置，这使得可以在不中断服务的情况下更改集群成员。此外，由于在高吞吐量系统上日志可能会变得非常大，RAFT 允许日志压缩来缓解消耗过多存储空间以及节点崩溃后重建缓慢的问题。\n\
  \nRAFT 在一个具有以下假设的系统模型下运行：\n\n- 不存在拜占庭故障。\n- 网络通信不可靠。\n- 异步通信和处理器。\n- 每个节点上运行确定性的状态机，且所有节点从相同的初始状态开始。\n\
  - 节点拥有不可篡改的持久化存储，并支持预写式日志记录，这意味着任何对存储的写入操作都将在崩溃前完成。\n- 客户端必须严格仅与当前的领导者通信。这是客户端的责任，因为客户端知道所有节点，并且静态配置了这些信息。\n\
  \nRAFT 是一个基于领导者（非对称）的协议，其中一个节点被选举为领导者。该领导者接受客户端请求并管理日志复制。在一个 RAFT 集群中，一次只能有一个领导者。如果当前的领导者发生故障，则会选举出新的领导者。在\
  \ RAFT 集群中，节点（更准确地说是节点内的共识模块）可以承担三种角色：领导者、跟随者和候选者。\n\n- **领导者** 接收客户端请求，管理复制日志，并管理与跟随者的通信。\n\
  - **跟随者** 节点本质上是被动的，仅响应远程过程调用（RPC）。它们从不主动发起任何通信。\n- **候选者** 是一种角色，由一个试图通过请求投票成为领导者的节点使用。\n\
  \n在 RAFT 中，时间被逻辑地划分为任期。一个任期（或时期）基本上是一个单调递增的值，它充当逻辑时钟，在没有全局同步时钟的情况下，为事件实现全局偏序关系。每个任期从选举新领导者开始，期间一个或多个候选者竞争成为领导者。一旦领导者被选出，它将担任领导者直至任期结束。任期的主要作用是识别过时信息，例如，过时的领导者。每个节点存储一个当前的任期号。当节点之间交换当前任期时，会检查一个节点的当前任期号是否低于另一个节点的任期号；如果是，则任期号较低的节点会将其当前任期更新为较大的值。当一个候选者或领导者发现其当前任期号已过时时，它会将自身状态转换为跟随者模式。节点接收到的任何带有过期任期号的请求都会被拒绝。\n\
  \n任期可以如图 7-5 所示。\n\n![](img/515270_1_En_7_Fig5_HTML.png)\n\nRAFT 中任期的示意图。任期 1、2\
  \ 和 5 被标记为正常运行。任期 3 和 4 被标记为未选举出领导者。\n\n**图 7-5**  \nRAFT 中的任期\n\nRAFT 协议使用两种 RPC\
  \ 工作：`AppendEntries` RPC，由领导者调用以复制日志条目，也用作心跳；`RequestVote` RPC，由候选者调用以收集选票。\n\n\
  RAFT 包含两个阶段。第一阶段是领导者选举，第二阶段是日志复制。在第一阶段，选出领导者；第二阶段是领导者接受客户端请求，更新日志，并向所有跟随者发送心跳以维持其领导地位。\n\
  \n首先，让我们看看领导者选举是如何工作的。\n\n\n\n### 领导者选举\n\n心跳机制被用于触发领导者选举过程。所有节点在启动时均为跟随者。只要跟随者能持续收到来自领导者或候选者的有效\
  \ RPC，它们就会保持跟随者状态。如果跟随者在某段时间内未收到领导者的心跳，就会发生\"选举超时\"，表明领导者已失效。选举超时时间随机设定在 150 毫秒至\
  \ 300 毫秒之间。\n\n此时，该跟随者节点承担候选者角色，并通过启动选举流程来尝试成为领导者。候选者会递增当前任期号、为自己投票、重置选举计时器，并通过`RequestVote`\
  \ RPC 向其他节点寻求选票。如果它获得多数节点的投票，则成为领导者，并开始向其他节点（此时均为跟随者）发送心跳。如果其他候选者已获胜并成为有效领导者，则该候选者将开始接收心跳，并恢复为跟随者角色。如果无人赢得选举且选举超时发生，则将在新任期重新启动选举流程。\n\
  \n请注意，仅当候选者的日志至少与接收节点的日志一样新时，接收节点才会根据`RequestVote` RPC 授予选票。此外，如果接收到的任期号低于当前任期，将回复\"\
  false\"。\n\n领导者选举的具体流程如图 7-6 所示。\n\n![](img/515270_1_En_7_Fig6_HTML.png)\n\nRAFT\
  \ 领导者选举流程图，起始于转换为候选者状态，结束于成为跟随者。\n\n图 7-6\nRAFT 领导者选举\n\n一个节点可以处于三种状态；我们可在图 7-7\
  \ 所示的状态图中可视化服务器状态，该图也展示了领导者选举。\n\n![](img/515270_1_En_7_Fig7_HTML.png)\n\nRAFT 节点状态流程图，起始于节点启动，结束于跟随者。流程从跟随者流向候选者和领导者。\n\
  \n图 7-7\nRAFT 中的节点状态\n\n一旦领导者被选举出来，它就可以随时接收来自客户端的请求。至此，日志复制可以开始了。\n\n### 日志复制\n\n\
  RAFT 的日志复制阶段非常简单直接。首先，客户端向领导者发送命令/请求，交由复制状态机执行。然后，领导者为该命令分配一个任期号和索引，以便该命令在节点持有的日志中被唯一标识。\n\
  \n它将此命令追加到自己的日志中。当领导者的日志中有新条目时，它同时通过`AppendEntries` RPC 向跟随者节点发送复制该命令的请求。\n\n当领导者能够将该命令复制到大多数跟随者节点时（即得到确认），该条目就被视为在集群中已提交。此时，领导者在其状态机中执行该命令，并将结果返回给客户端。它还会通过`AppendEntries`\
  \ RPC 通知跟随者该条目已提交，跟随者随后在其状态机中执行已提交的命令。来自五个节点的日志集合如图 7-8 所示。\n\n![](img/515270_1_En_7_Fig8_HTML.jpg)\n\
  \n一张图表列出了领导者、跟随者 1、2、3 和 4 的日志索引。在最后一个索引下方有一条水平线，标记为已提交条目。\n\n图 7-8\nRAFT 节点中的日志\n\
  \n请注意，日志索引号 6 之前的条目已在多数服务器上复制，因为领导者、跟随者 3 和跟随者 4 都拥有这些条目，构成了多数——五个节点中的三个。这意味着它们已被提交，可以安全地应用到各自的状态机中。跟随者\
  \ 1 和 3 的日志不是最新的，这可能是由于节点故障或通信链路故障所致。如果存在崩溃或缓慢的跟随者，领导者将通过`AppendEntries` RPC 持续重试，直至成功。\n\
  \n日志复制过程如图 7-9 所示。\n\n![](img/515270_1_En_7_Fig9_HTML.png)\n\n日志复制过程的流程图。流程为：领导者、命令、从节点\
  \ 1 向节点 2 和 3 复制`append entries RPC`、并回复。\n\n图 7-9\nRAFT 日志复制与状态机复制\n\n当跟随者收到用于复制日志条目的`AppendEntries`\
  \ RPC 时，它会检查组件的任期是否小于当前任期，若是则回复 false。它仅追加日志中尚不存在的新条目。如果现有条目与新条目具有相同的索引但不同的任期，它将删除该现有条目及其后的所有条目。此外，如果日志在紧邻新条目前一个条目的索引处没有条目，或者有条目但任期不匹配，它也会回复\
  \ false。\n\n如果存在失败的跟随者或候选者，该协议将通过`AppendEntries` RPC 持续重试，直至成功。\n\n如果一个命令被提交，RAFT\
  \ 集群将不会丢失它。这是 RAFT 在面对网络延迟、数据包丢失、重启或崩溃故障等任何故障时提供的保证。然而，它不处理拜占庭故障。\n\n每个日志条目包含一个任期号、一个索引和一个状态机命令。任期号有助于发现日志之间的不一致性，它指示命令发生的时间。索引标识条目在日志中的位置。命令是客户端请求执行的指令。\n\
  \n\n\n### 保证与正确性\n\nRAFT 提供的保证如下：\n\n- **选举正确性**\n  - **选举安全性**：每个任期最多只能选出一名领导者。\n\
  \  - **选举活跃性**：必定会有某个候选者最终成为领导者。\n- **领导者仅追加日志**：领导者只能向日志中追加条目，不允许覆盖或删除已有条目。\n-\
  \ **日志匹配**：如果两台不同服务器上的日志中存在索引和任期都相同的条目，那么这两条日志在此之前的所有条目完全相同，并且存储着相同的命令。\n- **领导者完备性**：在给定任期内已提交的日志条目，将始终存在于未来所有领导者（即任期号更大的领导者）的日志中。此外，日志不完整的节点绝不能当选。\n\
  - **状态机安全性**：如果某个节点已将特定索引的日志条目应用到其状态机，那么其他任何节点都不会对同一索引应用不同的日志条目。\n\n选举正确性要求同时满足安全性与活跃性。安全性意味着每个任期只允许存在一个领导者。活跃性则要求某个候选者必须最终获胜并成为领导者。为确保安全性，每个节点在一个任期内仅投票一次，并将投票记录持久化存储。竞选需要获得多数票才能获胜；不可能有两个不同候选者同时获得多数票。\n\
  \n在领导者选举过程中可能发生选票分裂。如果两个节点同时当选，就会产生所谓的\"选票分裂\"。RAFT 使用随机化的选举超时时间来确保该问题能快速解决。这之所以有效，是因为随机超时机制使得只有一个节点能在其他节点超时之前超时并赢得选举。实践中，只要选择的随机时间大于网络广播时间，这种方法就能良好运作。\n\
  \n日志匹配实现了日志间的高度一致性。我们假定领导者没有恶意行为。领导者绝不会添加两个具有相同索引和任期的条目。日志一致性检查确保了所有先前条目都完全相同。领导者会追踪其日志中已提交的最新索引，并在每次\
  \ `AppendEntries` RPC 中广播此信息。如果跟随者节点的日志中没有具有相同索引编号的条目，它将不会接受传入的条目。然而，如果跟随者接受了 `AppendEntries`\
  \ RPC，领导者就知道双方日志是一致的。除非网络发生故障，否则日志通常保持一致。若出现不一致，日志一致性检查会确保节点最终追赶上来并达成一致。如果日志不一致，领导者会向可能未收到之前消息、或曾崩溃现已恢复的跟随者重新传输缺失的条目。\n\
  \n重配置和日志压缩是 RAFT 两个有用的特性。此处未作讨论，因为它们与核心共识协议没有直接关系。如需了解更多细节，可参考参考文献中提到的原始 RAFT 论文。\n\
  \n## PBFT\n\n还记得吗，我们之前在本书中讨论过口头消息协议和拜占庭将军问题。虽然它解决了拜占庭协议问题，但并非一个实用的解决方案。口头消息协议仅在同步环境下有效，且计算复杂度（运行时间）很高，除非只有一个故障处理器——这在现实中是不切实际的。然而，在实践中，系统会表现出一定程度的通信和处理器异步性。在真实环境中，过长的算法运行时间也是不可接受的。\n\
  \n1999 年，Castro 和 Liskov 提出了一种实用的解决方案——实用拜占庭容错（PBFT）。顾名思义，这是一种旨在存在拜占庭故障时提供共识的协议。在\
  \ PBFT 出现之前，拜占庭容错被认为是不切实际的。借助 PBFT，这两位研究者首次证明了实用拜占庭容错是可行的。\n\nPBFT 包含三个子协议：正常运行、视图变更和检查点。正常运行子协议是指在一切正常运行、系统无错误时执行的机制。视图变更子协议在检测到系统中有故障领导者节点时运行。检查点子协议用于丢弃系统中的旧数据。\n\
  \nPBFT 协议包含三个阶段。这些阶段依次运行以完成一次协议运行。这三个阶段分别是预准备、准备和提交，我们稍后将详细讨论。在正常情况下，一次协议运行就足以达成共识。\n\
  \n该协议按轮次运行，在每一轮中，一个称为主节点的领导者节点负责处理与客户端的通信。在每一轮中，协议依次经历前面提到的三个阶段。PBFT 协议的参与者被称为副本。在每一轮中，其中一个副本成为领导者（主节点），其余节点作为备份节点。PBFT\
  \ 实现了我们之前讨论过的状态机复制。每个节点维护一个本地日志，并通过共识协议 PBFT 使各日志保持同步。\n\n至此我们知道，在部分同步环境中，要容忍拜占庭故障所需的最小节点数为\
  \ `n = 3f + 1`，其中 `n` 是节点数量，`f` 是故障节点数量。只要系统中的节点数量满足 `n >= 3f + 1`，PBFT 就能确保拜占庭容错。\n\
  \n当客户端向主节点（领导者）发送请求时，副本之间会执行一系列操作，从而达成共识并向客户端回复。\n\n这一系列操作由三个阶段组成：\n\n- 预准备\n- 准备\n\
  - 提交\n\n此外，每个副本维护一个包含三个主要元素的本地状态：\n\n- 服务状态\n- 消息日志\n- 代表该副本当前视图的数字\n\n下面我们来详细看看每个阶段。\n\
  \n### 预准备阶段 – 阶段一\n\n当主节点收到客户端的请求时，它会为该请求分配一个序列号。然后，主节点将带有该请求的预准备消息发送给所有备份副本。\n\n\
  当备份副本收到预准备消息时，它们会检查以下几项以确保消息的有效性：\n\n- 数字签名是否有效。\n- 当前视图编号是否有效，即副本是否处于同一视图。\n- 操作请求消息的序列号是否有效，例如，如果同一序列号被重复使用，副本将拒绝后续具有相同序列号的请求。\n\
  - 请求消息的哈希值是否有效。\n- 之前是否未收到过具有相同序列号和视图但哈希值不同的预准备消息。\n\n如果所有这些检查都通过，备份副本就接受该消息，更新其本地状态，并进入准备阶段。\n\
  \n总结一下，预准备阶段：\n\n- 接受来自客户端的请求。\n\n\n\n### PBFT 协议详解\n\n-   向它分配下一个序列号。该序列号是请求将要执行的顺序。\n\
  -   将此信息作为预准备消息广播给所有备份副本。\n\n此阶段为客户端请求分配唯一的序列号。我们可以将其视为一个排序器，对客户端请求应用顺序。\n\n####\
  \ 准备阶段 – 阶段 2\n\n每个备份副本向系统中的所有其他副本发送`prepare`消息。每个备份副本等待至少`2*f + 1`条来自其他副本的`prepare`消息。它们检查：\n\
  \n- `prepare`消息是否具有有效的数字签名。\n- 副本是否与消息中的视图相同。\n- 序列号是否有效且在预期范围内。\n- 消息摘要（哈希）值是否正确。\n\
  \n如果所有这些检查都通过，副本将更新其本地状态并进入提交阶段。\n\n总之，准备阶段执行以下步骤：\n\n- 仅当副本之前未接受过相同视图或序列号的预准备消息时，才接受该预准备消息。\n\
  - 向所有副本发送`prepare`消息。\n\n此阶段确保网络中的诚实副本在视图内就请求的总顺序达成一致。\n\n##### 提交阶段\n\n在提交阶段，每个副本向网络中的所有其他副本发送`commit`消息。与准备阶段类似，副本等待来自其他副本的`2*f\
  \ + 1`条`commit`消息。副本还检查视图编号、序列号、数字签名和消息摘要值。如果从其他副本收到的`2*f + 1`条`commit`消息有效，则副本执行请求、生成结果，并最终更新其状态以反映提交。如果有某些消息排队，副本将在处理最新序列号之前先执行这些请求。最后，副本通过回复消息将结果发送给客户端。\n\
  \n客户端仅在收到`2*f + 1`条包含相同结果的回复消息后才接受该结果。\n\n##### 提交子协议步骤\n\n- 副本等待具有相同视图、序列号和请求的`2*f\
  \ + 1`条`prepare`消息。\n- 它向所有副本发送`commit`消息。\n- 它等待直到`2*f + 1`条有效的`commit`消息到达并被接受。\n\
  - 它执行收到的请求。\n- 它向客户端发送包含执行结果的回复。\n\n此阶段确保网络中的诚实副本跨视图就客户端请求的总顺序达成一致。\n\n本质上，PBFT\
  \ 协议确保有足够多的副本处理每个请求，以便处理相同的请求并且以相同的顺序处理。\n\n我们可以在图 7-10 中看到协议的正常操作模式。\n\n![](img/515270_1_En_7_Fig10_HTML.png)\n\
  \n图表显示了客户端、主节点、副本 2、3 和 4 的线条。这些线条分为请求、预准备、准备、提交和回复阶段。\n\n**图 7-10** PBFT 正常模式操作\n\
  \n在协议执行期间，协议必须维护消息和操作的完整性，以提供足够级别的安全性和保证。数字签名满足了这一要求。假设数字签名是不可伪造的，并且哈希函数是抗碰撞的。此外，使用证书来确保参与方（节点）的适当多数。\n\
  \n### PBFT 中的证书\n\nPBFT 协议中的证书确立了至少`2*f + 1`个副本已存储所需信息。换句话说，特定类型的`2*f + 1`条消息的集合被视为一个证书。例如，假设一个节点已收集了`2*f\
  \ + 1`条类型为`prepare`的消息。在这种情况下，将其与具有相同视图、序列号和请求的相应预准备消息组合在一起表示一个证书，称为已准备证书。同样，`2*f\
  \ + 1`条`commit`消息的集合称为提交证书。\n\nPBFT 协议还维护了几个变量来执行算法。这些变量及其含义如下：\n\n- `v`：视图编号\n\
  - `o`：客户端请求的操作\n- `t`：时间戳\n- `c`：客户端标识符\n- `r`：回复\n- `m`：客户端的请求消息\n- `n`：消息的序列号\n\
  - `h`：消息`m`的哈希值\n- `i`：副本的标识符\n- `s`：稳定检查点 – 最后一个\n- `C`：稳定检查点的证书（`2f + 1`条检查点消息）\n\
  - `P`：请求的已准备证书集合\n- `O`：待处理的预准备消息集合\n- `V`：新视图的证明（`2f + 1`条视图更改消息）\n\n现在让我们看一下消息类型及其格式。如果参考前面的变量列表，这些消息很容易理解。\n\
  \n#### 消息类型\n\nPBFT 协议通过交换多种消息来工作。表 7-1 列出了这些消息及其格式和方向。\n\n**表 7-1** PBFT 协议消息\n\
  \n| 消息 | 发送方 | 接收方 | 格式 | 签名方 |\n| --- | --- | --- | --- | --- |\n| `Request` |\
  \ 客户端 | 主节点 | `<REQUEST, o, t, c>` | 客户端 |\n| `Pre-prepare` | 主节点 | 副本 | `<<PRE-PREPARE,\
  \ v, n, h>, m>` | 主节点 |\n| `Prepare` | 副本 | 副本 | `<PREPARE, v, n, h, i>` | 副本 |\n\
  | `Commit` | 副本 | 副本 | `<COMMIT, v, n, h, i>` | 副本 |\n| `Reply` | 副本 | 客户端 | `<REPLY,\
  \ r, i>` | 副本 |\n| `View change` | 副本 | 副本 | `<VIEWCHANGE, v+1, n, s, C, P, i>`\
  \ | 副本 |\n| `New view` | 主节点 | 副本 | `<NEWVIEW, v + 1, V, O>` | 副本 |\n| `Checkpoint`\
  \ | 副本 | 副本 | `<CHECKPOINT, n, h, i>` | 副本 |\n\n请注意，所有消息都使用数字签名进行签名，这使得每个节点都能识别生成了任何给定消息的是哪个副本或客户端。\n\
  \n\n\n##### 视图变更\n\n当其他副本怀疑主副本出现故障时，就会发生视图变更。此阶段用于确保协议的正常推进。通过视图变更选出新的主副本，随后再次启动正常运行模式。新主副本采用轮询方式选定，公式为\
  \ `p = v mod n`，其中 `v` 是视图编号，`n` 是系统中的节点总数。\n\n当备份副本收到请求时，会在验证消息后尝试执行该请求。但如果因任何原因，该副本在一段时间内未能执行请求，则会触发超时。此时，它将启动视图变更子协议。\n\
  \n在视图变更期间，副本停止接受与当前视图相关的消息，并将其状态更新为“视图变更”状态。在此状态下，它能接收的消息仅限于 `checkpoint`、`view\
  \ change` 和 `new view` 消息。之后，它会向所有副本广播一条包含下一个视图编号的 `view change` 消息。\n\n当此消息到达新主副本时，新主副本会等待至少\
  \ `2f` 个针对下一个视图的视图变更消息。如果收集到至少 `2f + 1` 个视图变更消息，它会向所有副本广播一条 `new view` 消息，并再次进入正常运行模式。\n\
  \n当其他副本收到 `new view` 消息时，它们会相应地更新本地状态，并启动正常运行模式。\n\n视图变更协议的算法如下：\n\n1.  停止接受当前视图的\
  \ `pre-prepare`、`prepare` 和 `commit` 消息。\n2.  构建到目前为止已准备的所有证书的集合。\n3.  向所有副本广播一条包含下一个视图编号和所有已准备证书集合的\
  \ `view change` 消息。\n\n图 7-11 展示了视图变更协议。\n\n![](img/515270_1_En_7_Fig11_HTML.png)\n\
  \n该视图变更协议示意图包含主副本、新主副本、副本 3 和副本 4 的流程。这些流程分为 `view-change` 和 `new view` 两个阶段。\n\n\
  **图 7-11**\n视图变更协议\n\n视图变更子协议是确保系统活跃性的一种手段。该子协议采用了三种巧妙技术来保证：\n\n1.  广播了 `view change`\
  \ 消息的副本会等待 `2f+1` 个视图变更消息，然后启动其计时器。如果计时器在节点收到下一个视图的 `new view` 消息之前超时，该节点将为下一个序列启动视图变更，但会增加其超时值。如果副本在执行新视图中的新唯一请求之前超时，也会出现这种情况。\n\
  2.  一旦副本收到 `f+1` 个大于其当前视图编号的视图变更消息，该副本将会为其已知集合中最小的视图编号发送 `view change` 消息，以避免下一次视图变更发生得太晚。即使计时器尚未到期，也会发送针对最小视图的\
  \ `view change` 消息。\n3.  由于只有当至少 `f + 1` 个副本发送了 `view change` 消息时才会发生视图变更，这种机制确保了故障主副本无法通过连续请求视图变更来无限期地阻止协议推进。\n\
  \n在繁忙的环境中，存储尤其可能成为瓶颈。为了解决这个问题，PBFT 协议中使用了检查点机制。\n\n##### 检查点子协议\n\n检查点是一个关键的子协议。它用于丢弃所有副本日志中的旧消息。通过这种方式，副本就一个稳定检查点达成一致，该检查点提供了在特定时间点上全局状态的快照。这是一个周期性过程，由每个副本在执行请求后执行，并在其日志中将其标记为一个检查点。一个名为\
  \ `low watermark`（低水位线，在 PBFT 术语中）的变量用于记录最后一个稳定检查点的序列号。该检查点会被广播到其他节点。一旦某个副本收到至少\
  \ `2f + 1` 个检查点消息，它就会将这些消息保存起来，作为稳定检查点的证明。同时，它会从其日志中丢弃所有先前的 `pre-prepare`、`prepare`\
  \ 和 `commit` 消息。\n\n### PBFT 的优缺点\n\nPBFT 是一项开创性的协议，开创了实用拜占庭容错协议这一新的研究领域。原始的 PBFT\
  \ 协议有很多优点，但也存在一些缺点。下面我们将逐一介绍。\n\n#### 优势\n\n*   PBFT 提供即时且确定性的交易最终性。相比之下，在 PoW 协议中，需要多次确认才能以较高概率最终确定一笔交易。\n\
  *   与消耗大量电力的 PoW 相比，PBFT 也更加节能。\n\n#### 缺点\n\n*   PBFT 的可扩展性不强。这一限制使其更适合联盟链，而非公有链。不过，它比\
  \ PoW 协议要快得多。\n*   PBFT 网络容易受到女巫攻击，即单个实体可以控制多个身份来影响投票，从而影响决策。\n*   通信复杂度高。\n*  \
  \ 不适用于具有匿名参与者的公有链。\n\nPBFT 保证了安全性和活跃性。接下来我们来看一下它是如何做到的。\n\n\n\n##### 安全性与活性\n\n\
  **活性**意味着，只要消息传递延迟的增长速度不会无限期地超过时间本身，客户端最终会收到其请求的响应。换句话说，如果延迟的增长速度慢于超时阈值，该协议就能确保系统持续推进。\n\
  \n拜占庭主节点可能故意引入延迟。然而，这种延迟不可能是无限期的，因为每个诚实的副本节点都设有一个视图变更计时器。当副本节点收到请求时，该计时器便会启动。假设在请求被执行前计时器超时，该副本节点会怀疑主节点，并向所有副本节点广播一条视图变更消息。一旦有`f\
  \ + 1`个副本节点怀疑主节点存在故障，所有诚实的副本节点就会进入视图变更流程。这种情况将导致视图变更，下一个副本节点将接替成为主节点，协议从而得以继续推进。\n\
  \n只要不超过 ![$$ \\left\\lfloor \\frac{n-1}{3}\\right\\rfloor $$](img/515270_1_En_7_Chapter_TeX_IEq2.png)\
  \ 个副本节点发生故障，并且消息延迟的增长速度不超过时间本身，活性就能得到保证。这意味着，在上述两个条件下，协议最终会取得进展。这种弱同步假设更接近现实环境，并使系统能够规避\
  \ FLP 不可能结果。这里有一个巧妙的技巧：如果在一个副本节点收到预期新视图的有效新视图消息之前，其视图变更计时器就过期了，该节点会将超时时间加倍，并重新启动其视图变更计时器。其思想是，由于消息延迟可能更长，超时计时器会加倍等待时间以等待更长时间。最终，计时器值会变得比消息延迟更大，这意味着消息最终会在计时器过期之前到达。这种机制确保最终所有诚实的副本节点都能获得一个新视图，协议也将取得进展。\n\
  \n此外，拜占庭主节点无法通过连续频繁地进行视图变更来拖慢系统。这是因为，一个诚实的副本节点只有在收到至少`f + 1`条视图变更消息时才会加入视图变更。由于最多只有`f`个故障副本节点，因此当所有诚实的副本节点都处于活跃状态且协议正在推进时，仅仅`f`个副本节点无法引发视图变更。换句话说，由于最多连续`f`个主节点可能出现故障，系统在经过最多`f\
  \ + 1`次视图变更后最终会取得进展。\n\n副本节点会等待`2f + 1`条视图变更消息，并启动一个计时器来开始一个新视图，这避免了过早启动视图变更。类似地，如果一个副本节点收到了针对一个大于其当前视图编号的`f\
  \ + 1`条视图变更消息，它就会广播一条视图变更消息。这可以防止过晚启动下一次视图变更。\n\n**安全性**要求每个诚实的副本节点以相同的全序执行收到的客户端请求，即在所有阶段中以相同的顺序执行相同的请求。\n\
  \n假设节点总数为`3f + 1`，则 PBFT 被认为是安全的。在这种情况下，可以容忍`f`个拜占庭节点。\n\n让我们首先回顾一下什么是法定人数交集。如果有两个集合，例如`S1`和`S2`，每个集合都包含≥\
  \ `2f + 1`个节点，那么`S1 ∩ S2`中总存在一个正确的节点。这是正确的，因为如果存在两个各自至少包含`2f + 1`个节点的集合，并且总共有`3f\
  \ + 1`个节点，那么根据鸽巢原理，`S1`和`S2`的交集将至少包含`f + 1`个节点。由于最多只有`f`个故障节点，因此交集`S1 ∩ S2`中必定至少包含\
  \ 1 个正确节点。\n\nPBFT 中的每个阶段都必须获得`2f + 1`个证书/投票才能被接受。事实证明，至少需要一个诚实的节点对同一个序号投两次票才会导致安全性被破坏，而这不可能发生，因为诚实的节点不能恶意投票。换句话说，如果恶意主节点为了破坏安全性而将同一个序号分配给两个不同的消息，那么由于法定人数交集的性质，至少会有一个诚实的副本节点拒绝它。这是因为一个`2f\
  \ + 1`的法定人数意味着至少存在一个诚实的交集副本节点。\n\n提交阶段确保了即使在跨视图的情况下也能实现正确的排序。如果发生视图变更，新的主节点会从`2f\
  \ + 1`个副本节点获取准备证书，这确保了新主节点能够获得由正确副本节点执行的每个客户端请求的至少一个准备证书。\n\n### 视图内的排序\n\n如果一个副本节点在一个视图内为一个请求获取了一个具有唯一序号的准备证书，那么没有其他副本节点能够为同一视图和序号的不同请求获取准备证书。副本节点只能为同一视图和序号下的相同请求获取准备证书。\n\
  \n想象一下，两个副本节点为同一视图和序号下的两个不同请求收集了准备证书。我们知道一个准备证书包含`2f+1`条消息，由于法定人数交集的存在，这意味着必须有一个正确的节点为同一序号和视图下的两个不同请求发送了`预准备`或`准备`消息。然而，一个正确的副本节点对于每个视图和序号只会发送一条`预准备`消息，也就是说，当主节点收到客户端请求并将其分配给该请求时，序号总是递增的。此外，一个正确的副本节点在每个视图中对于每个序号只会发送一条`准备`消息。只有当它之前没有接受过同一视图或序号的任何`预准备`消息时，它才会发送`准备`消息。这意味着准备消息必须针对的是同一个请求。这样就实现了视图内的排序。\n\
  \n### 跨视图的排序\n\n该协议保证，如果一个正确的副本节点在一个视图内以某个特定序号执行了一个客户端请求，那么在任何后续视图或当前视图中，没有其他正确的副本节点会以相同的序号执行任何其他客户端请求。换句话说，每个由诚实副本节点执行的请求，在进入下一个视图时都必须保持其先前分配的相同顺序。\n\
  \n我们知道，一个请求只有在副本节点收到`2f + 1`条提交消息后才会被执行。假设一个诚实的副本节点已经获得了`2f + 1`条提交消息。这意味着该客户端请求必须至少在`f\
  \ + 1`个诚实的副本节点上准备好了，并且这些副本节点中的每一个都拥有该请求以及所有先前客户端请求的准备证书。我们还知道，这`f + 1`个诚实的副本节点中至少有一个会参与视图变更协议，并报告这些请求及其证书。这意味着该请求在新视图中将始终携带相同的序号。\n\
  \n至此，我们对 PBFT 的讨论就结束了。然而，这是一个庞大的课题，你可以进一步阅读原始论文和学位论文来了解更多。\n\n\n\n## 区块链与经典共识\n\n\
  我们可以在区块链中实现经典算法。然而，挑战在于修改这些协议，使其适合区块链实现。核心算法保持不变，但某些方面被调整以使其适用于区块链。一个问题是，这些传统共识算法适用于所有参与者都已知且可识别的许可环境。但区块链网络是公开且匿名的，例如比特币和以太坊。因此，经典算法主要适用于企业用例的许可区块链网络，其中所有参与者都是已知的。此外，区块链网络环境是拜占庭式的，恶意行为者可能会试图偏离协议。而\
  \ Paxos 和 RAFT 是属于 CFT 协议，不适用于拜占庭环境。因此，要么需要将这些协议修改为 BFT 协议以容忍拜占庭故障，要么需要使用不同的 BFT\
  \ 协议。这些 BFT 协议可以是对现有经典 CFT 或 BFT 协议的修改，也可以是专门为区块链从头开发的。IBFT 是修改现有经典协议以适应许可区块链环境的一次尝试，我们将在第[8](https://wiki.example.org/515270_1_En_8_Chapter.xhtml)章中介绍。我们将在下一章进一步讨论区块链协议。\n\
  \nRAFT 支持的两个非常有用的特性是动态成员（重新配置）和使用快照的日志压缩。这两个特性在联盟链中尤其有用。随着时间的推移，区块链可能会变得非常庞大，快照是处理存储问题的一个有效方法。此外，成员管理可以是一个有用的特性，可以以自动化的方式加入新的联盟成员。然而，RAFT\
  \ 仅是 CFT，不太适合联盟链。尽管如此，正如 Tangaroa（RAFT 的 BFT 扩展）所展示的，在 RAFT 中引入拜占庭容错是可能的。Tangaroa\
  \ 中报告了一些问题，但构建 RAFT 的 BFT 版本是完全可能的。或者，这两个特性可以在区块链网络的 PBFT 变体中实现。PBFT 的变体包括 IBFT、HotStuff、LibraBFT\
  \ 等。\n\n## 总结\n\n在本章中，我们涵盖了许多主题，包括视图戳复制、实用拜占庭容错、RAFT 和 Paxos。Paxos 和视图戳复制至关重要，因为它们提供了分布式共识问题历史上非常基础的思想。Paxos\
  \ 尤其提供了协议正确性的形式化描述和证明。VR 与 Multi-Paxos 有相似之处。RAFT 是 Paxos 的改进版。PBFT 实际上被视为 Paxos\
  \ 的拜占庭容错版本，尽管 PBFT 是独立开发的。\n\n本章为理解下一章中区块链时代之前的经典协议奠定了基础。许多思想源于这些经典协议，进而促进了为区块链开发更新协议的发展。\n\
  \n"
- "# 区块链时代协议\n\n本章涵盖了区块链时代的协议。第[7](https://wiki.example.org/515270_1_En_7_Chapter.xhtml)章讨论了一些新颖的协议和一些经典区块链共识协议的变体。我们从以太坊开始，以对\
  \ Solana 的讨论结束本章。在此过程中，我们将详细探讨 Cosmos、以太坊 2.0 和 Polkadot 等平台中使用的主要共识协议的特性、优势、劣势、属性和内部工作原理。\n\
  \n我们已经在第[5](https://wiki.example.org/515270_1_En_5_Chapter.xhtml)章中详细讨论了工作量证明。因此，我不会在此重复；不过，本章将讨论以太坊的\
  \ PoW。\n\n## 引言\n\n共识协议是任何区块链的核心。随着比特币的出现，涌现出一类新的共识协议。因此，我们可以将在比特币出现及之后出现的所有区块链共识协议归类为“区块链时代共识协议”。\n\
  \n区块链中共识协议的主要目标是在保持系统安全性和活跃性的同时，就区块链的状态达成一致。状态通常指代区块链的价值、历史和规则。就区块链的规范历史达成一致至关重要，就链的管理规则达成一致同样关键。此外，就添加到链上的价值（数据）达成一致是根本性的关键。\n\
  \n与传统的区块链前协议一样，安全性和活跃性是共识协议为确保区块链的一致性和进展而应满足的两个关键属性。\n\n区块链共识协议可以分为两大类：概率最终性协议和绝对最终性协议——换句话说，即概率终止协议和确定性终止协议。概率协议广泛用于加密货币公共区块链，如以太坊和比特币。确定性协议，通常属于\
  \ BFT 协议类别，常用于企业区块链；然而，它们也用于一些公共区块链。虽然 PBFT 变体更常用于企业区块链，但它们在公共链中的使用仅限于某些公共区块链。例如，Solana\
  \ 中使用的 TowerBFT 是一种确定性最终性共识协议。EOSIO 中使用的 BFT-DPOS 是另一个例子。确定性最终性也称为*前向安全*，它保证一旦交易最终确定，就不会被回滚。\n\
  \n从共识算法的工作方式来看，区块链或分布式账本基于以下一种或多种类型的共识算法：\n\n- **基于 PoW**：例如比特币中的中本聪共识，它依赖于使用暴力破解解决数学难题。\n\
  \n- **基于领导者**：例如常见的 BFT 协议，其中领导者作为区块/价值的主要提议者。\n\n- **基于投票**：通常适用于 BFT 协议，其中领导者从追随者那里收集投票以最终确定决策。也称为“基于法定人数”。\n\
  \n- **虚拟投票**：通常，BFT 协议中的投票从通信角度来看很复杂，每个投票者都需要发送和接收多条消息给领导者。虚拟投票是 Hedera 使用的 Hashgraph\
  \ 算法中的一种技术，通过查看 Hashgraph 的本地副本而不是与其他节点进行复杂通信来评估投票。这个过程最终会达成拜占庭协议。\n\n- **基于经济**：例如依赖于网络中质押的权益证明机制。\n\
  \n在比特币诞生之后，出现了许多区块链，并引入了替代的 PoW 算法，例如莱特币。由于 PoW 消耗大量能源，社区很早就意识到需要设计不会过度消耗能源的替代方案。在引入能耗较低协议的过程中，开发者引入了权益证明。通过\
  \ PoS，构建可持续的公共区块链网络成为可能。然而，也存在一些挑战和注意事项。在了解 PoS 的工作原理之后，我们将讨论这些局限性。\n\n\n\n## 权益证明\n\
  \n尽管比特币的工作量证明已被证明是一种具有弹性且稳健的协议，但它存在若干局限性：\n\n- 能源消耗过高\n- 区块生成速度缓慢\n- 由于需要专用硬件和大型矿池，正变得中心化\n\
  - 概率性最终确定性，这不适用于大多数应用\n- 并非完美的共识算法，存在一些攻击方式，例如金手指攻击、51%攻击\n- 挖矿需要专用硬件，准入门槛越来越高\n\
  - 可扩展性不足，无法支持常规的高吞吐量应用\n\n为解决上述弱点，大量研究工作一直在进行中。尤其是，前述局限性中的高能耗问题催生了一些替代方案。权益证明便是这样一种替代方案。\n\
  \n权益证明于 2012 年首次出现在 Peercoin 中。随后，许多区块链采用了这一机制，例如 EOS、NxT、Steem、Tezos 和 Cardano。此外，以太坊也将通过其宁静升级，不久后过渡到基于\
  \ PoS 的共识机制。权益证明也被称为虚拟挖矿。如此称呼的原因是，在 PoS 中，无需要求矿工分配计算资源来解决难题，而是根据矿工拥有的价值来决定产生下一个区块的权利。这种有价值的资产可以是任何与网络利益一致的有价值之物（通常是代币）。PoW\
  \ 的座右铭是一个 CPU 等于一票，而我们可以把 PoS 理解为一个代币等于一票。\n\n下一个提议者通常是随机选举产生的。提议者通过交易费或区块奖励获得激励。与\
  \ PoW 类似，需要以持有大量权益的形式控制网络的大部分，才能攻击和控制网络。\n\nPoS 协议通常根据利益相关者质押的资产来选择他们并授予相应权利。权益的计算因具体应用而异，但通常基于总余额、存入的价值或验证者之间的投票。一旦计算出权益并选择某位利益相关者作为区块提议者，该提议者提出的区块就会被立即接受。权益越高，赢得下一个区块提议权的机会就越大。\n\
  \n一个 PoS 方案的通用架构如图 8-1 所示。\n\n![](img/515270_1_En_8_Fig1_HTML.jpg`)\n\n权益方案的流程图包含以下流程：前一个区块哈希，交易\
  \ T x 到 T x；计算器；新提议者选择；已选择；是，停止。\n\n图 8-1\n权益证明方案\n\n如图 8-1 所示，PoS 使用一个权益计算器函数来计算质押资金的数量，并据此选择一个新的提议者。\n\
  \n下一个提议者通常是随机选举产生的。提议者通过交易费或区块奖励获得激励。需要持有大部分权益以控制网络的大部分，才能攻击网络。\n\n在选择过程中引入了一些随机性元素，以确保公平性和去中心化。选举提议者的其他因素包括代币的币龄，即考虑质押的代币已有多长时间未被花费；代币未被花费的时间越长，被选中的机会就越大。\n\
  \nPoS 有几种类型：\n\n- 基于链的 PoS\n- 基于 BFT 的 PoS\n- 基于委员会的 PoS\n- 委托权益证明\n- 流动权益证明\n\n\
  ### 基于链的 PoS\n\n该方案是首个针对 PoW 提出的替代方案，于 2012 年首次在 Peercoin 中使用。这种机制类似于 PoW；然而，区块生成方法有所改变，它通过两步完成区块的最终确认：\n\
  \n- 从内存池中选取交易，并创建一个候选区块。\n- 设置一个具有恒定时钟滴答周期的时钟。在每个时钟滴答，检查区块头与时钟时间的哈希值是否小于目标值与权益值的乘积。我们可以用如下简单公式表示：\n\
  \n```\nHash (B_h || clock time) < target * stake value\n```\n\n权益值取决于算法的工作方式。在某些链中，它与质押量成正比。在其他链中，则基于参与者持有权益的时间长度。目标值是每单位权益价值的挖矿难度。\n\
  \n这种机制使用与 PoW 类似的哈希难题。但是，与其通过消耗高能量和使用专用硬件来竞争解决哈希难题，PoS 中的哈希难题仅在固定的时钟间隔内被解决一次。如果矿工的权益值很高，那么解决哈希难题的难度会按比例降低。这与\
  \ PoW 需要重复进行暴力哈希运算来解决数学难题形成对比。\n\n### 基于委员会的 PoS\n\n在该方案中，通常使用可验证随机函数（VRF）随机选择一组利益相关者。VRF\
  \ 根据利益相关者的权益和区块链的当前状态，产生一个随机的利益相关者集合。被选中的利益相关者组负责按顺序提议区块。\n\n通用方案描述如下：\n\n- 验证者加入网络并存入一笔质押金。\n\
  - 参与委员会选举过程，并持续检查自己的轮次。\n- 当轮到该验证者时，收集交易、生成区块、将新区块追加到链上，最后广播该区块。\n- 在其他接收节点上，验证区块；如果有效，则将区块追加到区块链中，并将该区块传播给其他节点。\n\
  \n委员会选举会产生一个伪随机的验证者出块轮次序列。Ouroboros Praos 和 BABE 是基于委员会的 PoS 的常见示例。\n\n### 基于 BFT\
  \ 的 PoS\n\n在该方案中，区块使用权益证明机制生成，其中根据权益证明选择区块提议者来提议新区块。提议者基于在系统中存入的质押金选举产生。被选中的几率与系统中存入的质押金数额成正比。提议者生成一个区块并将其追加到临时区块池中，BFT\
  \ 协议会从该池中最终确认一个区块。\n\n通用方案工作流程如下：\n\n- 根据与质押金成正比的 PoS 机制，选举一个区块提议者。\n- 提议者：提议一个新区块，将其添加到临时区块池，并广播新区块。\n\
  - 接收者：当其他节点接收到此区块时，它们验证该区块，如果有效，则将其添加到本地的临时区块池中。\n- 在共识时期期间：\n  - 运行 BFT 共识以最终确认一个有效（获得最多投票）的区块。\n\
  \  - 将得票最多的有效区块添加到主区块链中。\n  - 从临时区块池中移除其他区块。\n\nCosmos 中的 Tendermint 就是一个例子，其中验证者基于质押金选择，其余协议基于\
  \ BFT 原理工作。其他例子包括 Casper FFG。\n\n只要三分之二的验证者保持诚实，基于 BFT 的 PoS 就具有容错性。此外，区块会被立即最终确认。\n\
  \n\n\n#### 委托权益证明（Delegated PoS）\n\n`DPoS` 的工作方式类似于权益证明，但其关键区别在于引入了投票和委托机制，激励用户维护网络安全。`DPoS`\
  \ 限制了所选共识委员会的规模，从而降低了协议中的通信复杂度。共识委员会由通过委托机制选举产生的所谓“委托者”组成。其流程是：利益相关者利用自己的权益投票选出委托者。委托者（也称为见证人）的身份是可识别的，投票者知道他们是谁，因此降低了委托者作恶的可能性。此外，还可以实施基于声誉的机制，允许委托者根据其提供的服务以及在网络上的行为来建立声誉。委托者可以为自己宣传以争取更多选票。获得最多选票的委托者将成为共识委员会或小组的成员。通常，共识委员会成员之间运行着一种\
  \ `BFT` 风格的协议，用于生成和最终敲定区块。每个成员可以采用轮询方式提议下一个区块，但此活动仅限于选定的共识委员会内部。委托者通过生产区块获得激励。同样，在\
  \ `BFT` 假设下，共识委员会内部的协议可以在一个 `3f+1` 成员的组中容忍 `f` 个故障。换句话说，它可以容忍三分之二（即 33%）的委托者出现故障。该协议提供了即时最终确定性，并根据利益相关者的权益比例提供激励。由于无需全网共识，只需一个较小的委托者小组负责决策，因此效率显著提高。`Delegated\
  \ PoS` 已在 `EOS`、`Lisk`、`Tron` 以及不少其他链上得到实现。\n\n#### 流动权益证明（Liquid PoS）\n\n`LPoS`\
  \ 是 `DPoS` 的一种变体。代币持有者将其验证权委托给验证者，而无需转让代币的所有权。存在一个委托市场，委托者在此相互竞争，以期成为选定的验证者。在这里，竞争主要围绕费用、提供的服务、声誉、支付频率以及可能还有其他因素展开。任何不当行为，例如验证者收取过高费用，都会迅速被发现并受到相应惩罚。代币持有者也可以自由地转向任何其他验证者。与\
  \ `DPoS` 固定的验证者集合相比，`LPoS` 支持动态数量的验证者。代币持有者还可以通过自行选举成为验证者。持有少量代币的用户可以委托给持有大量代币的用户。同时，许多小额代币持有者可以组成一个联合体。与其他\
  \ `PoS` 协议相比，这种“流动”协议提供了极大的灵活性，并有助于防止形成旨在成为固定验证者集合的游说团体。`LPoS` 被用于 `Tezos` 区块链。\n\
  \n存在一些针对 `PoS` 的攻击，例如无成本利益问题（Nothing-at-Stake Attack）、长程攻击（Long-Range Attack）以及权益磨削攻击（Stake\
  \ Grinding Attack）。我们如下解释这些攻击。\n\n### 攻击\n\n`PoS` 普遍遭受一种无成本模拟（Costless Simulation）问题的困扰，即攻击者可以在不产生任何额外成本的情况下模拟链的任何历史，而\
  \ `PoW` 的成本则是算力。这种无成本的区块生成是 `PoS` 中许多攻击的基础。\n\n#### 无成本利益问题（Nothing-at-Stake Problem）\n\
  \n当出现多个分叉时，就会发生无成本利益问题或双重押注问题。攻击者可以在每个分叉之上生成一个区块，而无需任何额外成本。为了解决这个问题，协议中引入了经济惩罚机制来阻止攻击者发起此类攻击。如果有大量节点这样做，那么即使持有代币比例低于\
  \ 50% 的攻击者也能发动双花攻击。\n\n#### 长程攻击（Long-Range Attacks）\n\n长程攻击的存在是由于弱主观性（Weak Subjectivity）和无成本模拟。长程攻击之所以可能，也是因为无成本模拟：攻击者从创世区块开始创建一个新的分支，其目的是在主链被恶意链的长度超越后，接管原有的良好主链。这可能会创建一条与区块链有害的替代历史。\n\
  \n弱主观性问题会影响新节点以及长时间离线后重新加入网络的节点。由于节点不同步，并且网络中通常存在多个分叉，这些节点无法区分哪个节点是正确节点、哪个是恶意节点；它们可能会错误地将恶意分叉视为有效分支。\n\
  \n#### 其他攻击\n\n**活性拒绝（Liveness Denial）** 是 `PoS` 可能遭受的另一种攻击。在这种攻击中，部分或全部验证者共同决定停止验证区块，从而导致区块生产停滞。协议对此类活动进行惩罚可以防止这类攻击。\n\
  \n**自私挖矿（Selfish Mining）** 或扣块攻击（Block Withholding Attack）发生在攻击者离线挖掘自己的链时。一旦该链达到理想长度，攻击者就将此链发布到网络中，期望恶意链能够取代原有的良好主链。这可能导致诚实验证者浪费资源，从而扰乱网络。\n\
  \n**磨削攻击（Grinding Attack）** 发生在 `PoS` 中，如果区块生产者的选举过程不是随机的。如果该过程没有引入随机性，那么某个区块生产者就可以反复增加自己被选中的频率，从而导致审查或不成比例的奖励。解决这个问题的一个简单方法是采用良好的随机选择过程，通常基于可验证随机函数（`VRFs`）。\n\
  \n接下来，我们讨论以太坊的工作量证明——`Ethash`。\n\n\n\n## 以太坊的工作量证明\n\n我们在第 5 章中详细讨论了比特币的`PoW`。本节将介绍以太坊使用的`PoW`，即`ETHASH`的工作原理。\n\
  \n`Ethash`是 Dagger-Hashimoto 算法的演进形式。挖矿的核心思想是找到一个`nonce`（任意随机数），将其与区块头拼接并进行哈希运算后，得到的数值低于当前网络难度值。起初，以太坊刚问世时难度较低，甚至\
  \ CPU 和单 GPU 挖矿在一定程度上也能盈利，但如今已非如此。因此，现在只有矿池或大型 GPU 矿场才能用于盈利性挖矿。\n\n`Ethash`是一种内存硬算法，由于需要在`ASICS`上配备大容量高速内存，这通常不切实际，因此难以在专用硬件上实现。值得注意的是，`Ethash`的内存硬性在相当长一段时间内阻碍了`ASICs`的发展，但如今已有多种`ASIC`矿机可用于以太坊挖矿。\n\
  \n该算法需要从一种称为有向无环图（`DAG`）的固定资源中选择子集，具体选择取决于`nonce`和区块头。\n\n`DAG`是一个庞大的伪随机生成数据集。该图以矩阵形式存储于以太坊挖矿过程中创建的`DAG`文件中。`Ethash`算法将`DAG`表示为二维数组，元素为\
  \ 32 位无符号整数。只有当挖矿节点首次启动并完全创建`DAG`后，挖矿才会开始。\n\n此`DAG`被`Ethash`算法用作种子。`Ethash`算法需要`DAG`文件才能运行。`DAG`文件在每个纪元（即每\
  \ 30,000 个区块）生成一次。`DAG`随着链规模的扩大而线性增长。\n\n协议的工作流程如下：\n\n-   使用`Keccak-256`哈希函数，将最新区块的区块头与一个\
  \ 32 位随机`nonce`相结合。\n-   生成一个 128 位结构体，称为`mix`，该结构体决定从`DAG`中选择哪些数据，即一个 128 字节的页面。\n\
  -   从`DAG`中获取数据后，将其与`mix`进行“混合”，生成下一个`mix`，然后使用新的`mix`再次从`DAG`中获取数据并再次混合。此过程重复 64\
  \ 次。\n-   最终，对第 64 个`mix`执行摘要函数，生成一个 32 字节序列，称为`mix digest`。\n-   将此序列与难度目标进行比较。如果小于难度目标，则`nonce`有效，`PoW`即被解开，区块被成功挖掘。否则，算法将使用新的`nonce`重复此过程。\n\
  \n我们可以从图 8-2 中直观地看到这个过程。\n\n![](img/515270_1_En_8_Fig2_HTML.png)\n\n`DAG`的组织结构图被分为\
  \ 3 个`DAG`页面，这些页面链接到一个包含区块头、`nonce`和其他功能的循环流程中。\n\n**图 8-2** Ethash 处理流程\n\n`Ethash`有几个目标：\n\
  \n-   该算法几乎消耗所有可用的内存访问带宽，这是一种抗 ASIC 措施。\n-   使用 GPU 进行`Ethash`挖矿更容易执行。\n-   轻客户端能够更高效地验证挖矿轮次，并应能快速投入运行。\n\
  -   该算法在轻客户端上运行极其缓慢，因为不期望它们参与挖矿。\n\n随着以太坊执行层（原以太坊 1.0）向共识层（原以太坊 2.0）演进，这种`PoW`最终将被淘汰。当当前的\
  \ EVM 链接入信标链（即所谓的“合并”）发生时，`Casper FFG`将运行在`PoW`之上。然而，最终，纯粹的`PoS`算法`Casper CBC`将完全接管。\n\
  \n此外，随着冰河时代的激活，由于“冰河时代”导致的极端难度级别，`PoW`挖矿将几乎变得不可能，用户将别无选择，只能转向`PoS`。\n\n## Solana\n\
  \nSolana 是一个于 2018 年推出的、支持智能合约的第一层区块链。Solana 的开发人员致力于实现速度、安全性、可扩展性和去中心化。在撰写本文时，它仍处于测试阶段，但正在迅速流行起来。尽管它是一个运行着生产系统的运营网络，但仍有一些技术问题正在解决中。\n\
  \n其账本是一个可验证延迟函数，其中时间就是一种数据结构，即数据即时间。它潜在地支持数百万个节点，并利用 GPU 进行加速。`SOL`币是该平台的原生代币，用于治理和激励。其主要创新包括以下几点。\n\
  \n历史证明（`PoH`）使得能够使用基于数据结构的加密时钟（而非外部时间源）对事件进行排序，进而达成共识。\n\n`TowerBFT` 是一种源自`PBFT`的共识协议。请注意，`PoH`并非共识协议，它只是一种利用基于数据结构的时钟对事件进行排序的机制。仍然需要一个共识机制来让节点对账本的正确分支进行投票。\n\
  \n`Turbine`是另一项创新，它使得区块能够以小片段（称为`shreds`）进行传播，有助于实现速度和效率。Solana 中没有内存池，因为交易处理速度非常快，以至于不会形成内存池。这种机制被称为“墨西哥湾流”。\n\
  \nSolana 支持智能合约的并行执行，这再次提高了效率。\n\n交易在验证器内所谓的“交易处理单元”中，通过流水线技术以优化方式进行验证。\n\nCloud\
  \ break 是一个具有水平扩展能力的数据库的名称。最后，归档者或复制者是那些允许分布式账本存储的节点，因为在像 Solana 这样的高吞吐量系统中，数据存储可能成为瓶颈。为此，使用归档者来存储数据，并给予其激励。\n\
  \n由于我们的主要关注点是共识算法，我将在此结束对区块链的介绍，转而讨论 Solana 中的实际共识及相关机制。\n\nSolana 使用权益证明和`TowerBFT`共识算法。Solana\
  \ 的关键创新之一是历史证明，它并非共识算法，但能够创建事件的自洽记录，证明某个事件发生在一个特定时间点之前或之后。这进而促成了共识。它降低了 BFT 协议中的消息复杂度，有效地将通信替换为本地计算。这直接带来了高吞吐量和亚秒级最终性。分布式系统研究界早已认识到，如果能够以某种方式将通信替换为本地计算，则可以显著提升性能，许多时钟同步协议也因此应运而生。然而，所有这些协议通常都依赖外部时间源（通过原子钟或\
  \ GPS），然后使用 NTP 类型的协议进行同步。`PoH`则是一种无需依赖外部时间源，即可通过加密方式证明事件之间顺序和时间流逝的证明。\n\n\n\n###\
  \ 历史证明\n\n正如第 1 章所述，分布式系统中的时间至关重要。如果进程间的时间是同步的，即分布式网络中拥有同步时钟，那么通信量便可减少，从而提升性能。节点可以从过去的事件中推断信息，而无需反复向其他节点询问某些信息。例如，若存在一个所有节点都同步的全局时钟，系统就能建立一套系统范围的事件历史概念。再如，事件上的时间戳可以告知节点该事件相对于全网同步时间发生的时刻，而无需再次向产生该事件的节点询问其发生时间。\n\
  \n同步时钟的另一个应用是，系统中的实体可以推断某个事物是否已过期。例如，带有时间戳的安全令牌可以立即告知节点自其创建以来已过去了多长时间。节点便能推断该令牌是否仍然有效，而不是发生在遥远过去的事物，从而使令牌失效且不再适用。\n\
  \n在复制协议中，时钟同步也扮演着至关重要的角色。如果节点没有同步时钟，就可能导致不一致，因为每个节点对事件顺序会有不同的视角。\n\n如果节点间的时间不同步，系统就无法建立全局时间和历史的概念。在实际系统中，通常可以通过`NTP`协议实现这一点。我们在第\
  \ 2 章中讨论分布式系统的时间与顺序时，曾提及这一点。\n\n到目前为止，我们已经确定，同步时钟在分布式系统中确实是一种有价值的结构，能够带来性能提升。换句话说，如果我们能以某种方式用本地计算替代通信，就能获得巨大的效率提升。\n\
  \n此外，同步性和时间相结合可以轻松解决共识问题。安全性和活跃性这两个基本需求，在有可信时钟和同步网络的情况下很容易实现。然而，经验表明网络是异步的。我们也知道，在分布式网络中维护一个可信的同步时钟十分困难。区块链和分布式系统的特点是没有时钟，这导致它们因固有的异步性以及事件排序和达成共识所需的复杂消息传递而变得缓慢。\n\
  \n另一方面，一个可靠、可信的时钟能使网络同步变得更加简单快捷，从而带来极快的网络速度。Solana 的`PoH`是一种解决方案，它能让系统在互不信任的计算机之间可靠地保持时间。简而言之，`PoH`让无时钟的区块链拥有了时钟。\n\
  \nSolana 的`PoH`是一种在分布式网络中建立历史记录，并为节点提供全局同步时间概念的方法。其关键创新在于，它不依赖任何外部时间源（例如通过`NTP`协议）来同步节点；相反，它使用加密证明来表明一段时间已经过去，而其他节点则因加密保证直接接受这段事件历史。因此，这种机制不依赖全局时间源，而是内置于验证者中，它们生成一个事件序列，并在事件发生时附上证明。下文描述了其工作原理。\n\
  \n在区块链网络中，添加新区块的权利是在解决难题（即`PoW`）后获得的，这通常需要很长时间。尽管这种机制是安全的，并能抵御女巫攻击（如第 5 章所述），但速度很慢。如果使用\
  \ BFT 风格的共识，提议区块的领导者验证者至少需要经过两个连续的阶段才能提交，即使在正常环境下这也相当耗时。在发生故障时，随着新领导者的选举和视图变更，速度可能会进一步降低。那么，如果有一种确定性的领导者选举算法，可以快速连续地选出领导者，每个领导者迅速提议，然后算法再转向下一个领导者，如此循环往复，情况会怎样？这一切都无需经历复杂的领导者选举、其他节点的确认以及运行多个阶段来达成共识。这里的问题是，创建一种能选出下一个领导者的确定性算法很容易，但如何确保他们所提议的内容是正确的，并且选出的领导者不是恶意的，不会审查交易或表现出其他恶意行为呢？\n\
  \n这正是`PoH`发挥作用的地方。在 Solana 中，一次只有一个领导者处理交易并更新状态。其他验证者读取状态，并向领导者发送投票以确认这些交易。这个活动被分割成非常短的连续会话，领导者一个接一个地执行此操作。可以将其视为账本被分割成许多小的时间间隔。每个小间隔为`400ms`。领导者轮换计划是预先确定且确定性的，基于多个因素，例如质押量和先前交易的行为。但如何确保领导者轮换在正确的时间进行，并且不会跳过领导者的轮次呢？\n\
  \n在`PoH`中，时间的流逝是通过创建一系列哈希值来证明的，如图 8-3 所示。\n\n![](img/515270_1_En_8_Fig3_HTML.png)\n\
  \nSolana 证明的图示包含将创世输入到`4 S H A 256`哈希函数，以输出哈希`N plus pus, counter plus plus`。\n\n\
  **图 8-3.** Solana 历史证明序列\n\n在图 8-3 中，展示了一系列哈希操作。首先将创世输入（图中左侧所示）提供给哈希函数。在下一个迭代中，前一个哈希函数的输出被用作哈希函数的输入，此过程无限循环。这个序列是在单核上使用`SHA-256`函数生成的。这个过程无法并行化，因为前一个哈希函数的输出只有当且仅当哈希函数处理完前一个输入后才能获知。假设这些函数是抗原像的加密哈希函数。因此，这是一个纯粹的顺序函数。然而，这个序列可以使用多核\
  \ GPU 并行验证。由于所有输入和输出都是可用的，验证每个输出只是时间问题，而 GPU 可以并行完成。这一特性使得该序列成为一个可验证延迟函数（`VDF`），因为生成哈希序列所花费的时间（即延迟）可以通过快速的并行验证来验证。然而，对于斯坦福大学研究人员提出的加密`VDF`和\
  \ Solana 研究人员提出的硬件`VDF`，存在一些争论。请参阅参考文献中的资料。\n\n\n\n我们可以按固定时间间隔对这个序列进行采样，从而提供时间流逝的概念。这是因为哈希生成需要一定的\
  \ CPU 时间（在 Intel 或 AMD CPU 上，SHA-256 指令大约需要 1.75 个周期），并且这个过程完全是顺序的；通过观察这个序列，我们可以推断出自第一个哈希生成以来，直到序列中后面的某个哈希，已经过去了一些时间。如果我们还能向哈希函数的输入哈希中添加一些数据，那么我们可以推断出这些数据一定存在于前一个哈希之后、后一个哈希之前。这个哈希序列因此成为历史证明（**Proof\
  \ of History**），以密码学方式证明某个事件（比如事件 `e`）发生在事件 `f` 之前和事件 `d` 之后。\n\n这是一个连续运行 `SHA-256`\
  \ 的顺序过程，它反复且不间断地使用前一个输出作为其输入。它会定期记录每个输出样本的计数器（例如，每秒钟一次）和当前状态（哈希输出），其作用类似于时钟滴答。观察这种固定时间间隔采样的哈希结构，我们可以推断出已经过去了一些时间。这个过程无法并行化，因为前一个输出是下一次迭代的输入。例如，我们可以说在计数器\
  \ 1 和计数器 N 之间已经过去了一段时间（图 8-3），其中时间就是 `SHA-256` 计数器的数值。我们可以从这个计数中近似得出实际时间。我们还可以关联一些数据，将其附加到哈希函数的输入中；一旦哈希完成，我们就可以确信这些数据在哈希生成之前就已经存在。这种结构只能按顺序生成；然而，我们可以并行地验证它。例如，如果\
  \ 4000 个样本需要 40 秒生成，那么使用一个 4000 核的 GPU 只需要 1 秒就能验证整个数据结构。\n\n关键思想是，PoH 的交易吞吐量与共识是分离的，这是实现扩展性的关键。请注意，所生成事件的顺序（即序列）并非全局唯一。因此，需要一种共识机制来确定真正的链，因为任何人都可以生成一个替代的历史。\n\
  \n历史证明是一种以密码学方式证明时间流逝的方法。它可以被视为一种特定于应用的可验证延迟函数。它通过使用 `SHA-256` 哈希来对传入的事件和交易进行哈希处理，从而将时间的流逝编码为数据。它为每个事件生成一个唯一的哈希和计数，从而产生一个随时间变化的、可验证的事件排序。这意味着可以在无需等待其他节点响应的前提下达成关于时间和事件排序的共识——换句话说，不存在弱主观性，即节点无需依赖其他节点来确定系统的当前状态。这带来了高吞吐量，因为通常需要由其他节点提供的信息已经包含在\
  \ PoH 机制生成的序列中，并且是密码学可验证的，从而确保了完整性。这意味着可以在不执行通信复杂度较高的复杂协议或信任外部时间源进行时钟同步的情况下，强制执行全局事件顺序。总之，历史证明不依赖于时间戳，而是允许创建一个历史记录，证明事件\
  \ `e` 发生在特定时间点 `t`，在另一个事件 `f` 之前、事件 `d` 之后。\n\n使用 PoH，领导节点可以在无需与其他节点通信的情况下进行切换，这提高了区块生成频率。与通信复杂度高且节点容量有限的\
  \ BFT 风格协议相比，PoH 实现了高节点可扩展性和低通信复杂度。\n\n它提供了全局读取一致性以及两个事件之间密码学可验证的时间流逝。借助 PoH，节点即使在共识阶段达成之前，也可以信任事件的排序和时间。换句话说，它是一种先于共识的时钟方法。共识通过在不同的分叉上进行投票来简单运作，节点对他们认为是主链的分叉进行投票。随着时间的推移，通过持续对他们最初投票的链进行投票，并对任何其他分叉进行投票，他们可以获得奖励，最终其他分叉会成为孤块。\n\
  \n`TowerBFT` 是 `PBFT` 的一个变种。它本质上是一个分叉选择和投票算法。它用于对 PoH 生成的链进行投票，以选择真正的规范链。它的通信复杂度较低，因为\
  \ PoH 已经提供了顺序，现在只需要决定选择哪条规范链。PoH 在共识发起之前提供事件的时间信息，然后使用 `TowerBFT` 对规范链进行投票。\n\n\
  `TowerBFT` 是拜占庭容错的，因为一旦三分之二的验证者对一条链（哈希）进行了投票，该链就无法被回滚。验证者对 PoH 哈希进行投票有两个原因：第一，账本一直到该哈希（即某一时间点）都是有效的；第二，为了支持在特定高度上的某个分叉，因为在给定高度上可能存在多个分叉。\n\
  \n此外，Solana 中的 PoS 被用于经济和治理，以控制罚没、通胀、供应和惩罚。\n\n\n\n## Tendermint\n\n`Tendermint`\
  \ 的灵感来源于我们在第 6 章中介绍的 DLS 协议，该协议最初在 DLS 论文中提出。它也可以看作是 PBFT 的一个变体，在阶段划分上有相似之处。\n\n\
  `Tendermint` 协议按轮次工作。在每一轮中，一个被选出的领导者提出下一个区块。在 `Tendermint` 中，视图更换过程是常规操作的一部分。这一概念与\
  \ PBFT 不同，在 PBFT 中，视图更换仅在怀疑领导者出现故障时才会发生。`Tendermint` 的工作方式与 PBFT 类似，需要三个阶段才能达成共识。`Tendermint`\
  \ 的一个关键创新在于设计了一种新的终止机制。与其他类 PBFT 协议不同，`Tendermint` 开发了一种更直接的机制，类似于 PBFT 风格的常规操作。`Tendermint`\
  \ 在没有额外通信成本的情况下终止，而不是为正常模式和视图更换模式（在领导者出现故障时进行恢复）设置两个子协议。\n\n`Tendermint` 在关于运行环境的一些假设下工作，我们接下来将对这些假设进行描述：\n\
  \n- **进程：** 进程是网络上的一个参与者。进程被期望是诚实的，但它们可能发生故障。每个进程都拥有投票权，用于向领导者提供确认。进程可以松散地连接，也可以与它们直接相连的进程/节点子集连接。它们不一定是直接相连的。进程拥有一个本地计时器，用于测量超时。\n\
  \n- **网络模型：** 网络是一个消息传递网络，进程之间使用 Gossip 协议进行通信。标准 BFT 假设 *n* ≥ 3*f* + 1 在此处适用，这意味着只有当网络中的节点数保持在\
  \ 3F 以上时，协议才能正常运行，其中 F 是故障节点数，N 代表网络中的总节点数。在实践中，这意味着网络中至少需要有四个节点才能容忍拜占庭故障。\n\n-\
  \ **时序假设：** `Tendermint` 假设网络是部分同步的。通信延迟存在一个未知的上界，但该上界仅在一个未知的时间点（称为全局稳定时间或 GST）之后才适用。\n\
  \n- **安全与密码学：** 系统中的安全假设是所使用的公钥密码学是安全的。此外，身份冒充或欺骗也是不可能的。网络上的所有消息都经过数字签名进行身份验证和验证。协议会忽略任何带有无效数字签名的消息。\n\
  \n- **状态机复制：** SMR 用于在节点之间实现复制。SMR 确保网络上的所有进程接收并处理相同的请求序列。此外，一致性和顺序保证节点接收请求的顺序在所有节点上都是相同的。这两个要求确保了系统中的全序。协议只接受有效的交易。\n\
  \n`Tendermint` 通过满足以下列出的属性来解决共识问题：\n\n- **一致性（Agreement）**：没有两个正确的进程会决定不同的值。\n\n\
  - **终止性（Termination）**：所有正确的进程最终都会决定一个值。\n\n- **有效性（Validity）**：如果一个被决定的值满足一个应用特定的、预先定义的谓词\
  \ `valid( )`，则该值是有效的。\n\n`Tendermint` 中进程的状态转换取决于收到的消息和超时。超时机制保证了活跃性，并防止了无限期的等待。这里假设，在经历一段异步期后，最终会出现一个同步通信期，在此期间所有进程都能够及时通信，确保进程最终能决定一个值。\n\
  \n`Tendermint` 协议有三种类型的消息：提议、预投票和预提交。这些消息可以看作是 PBFT 协议中 PRE-PREPARE、PREPARE 和 COMMIT\
  \ 消息的等价物：\n\n- **提议（Proposal）：** 当前轮的领导者使用此消息来提出一个值或区块。\n\n- **预投票（Pre-vote）：**\
  \ 此消息用于对提议的值进行投票。\n\n- **预提交（Pre-commit）：** 此消息也用于对提议的值进行投票。\n\n只有提议消息包含原始值。另外两种消息，预投票和预提交，使用一个代表最初提议值的值标识符。\n\
  \n协议中有三种超时，分别对应每种消息类型：\n\n- `Timeout-propose`\n- `Timeout-prevote`\n- `Timeout-precommit`\n\
  \n这些超时机制防止算法无限期地等待某些条件满足。它们也确保进程能够在一轮一轮中取得进展。一种随着每一新轮次而增加超时时间的机制确保了在到达 GST 之后，正确进程之间的通信最终变得可靠，节点能够达成决策，协议得以终止。\n\
  \n所有进程在协议中维护一些必要的变量：\n\n- **步骤（Step）：** 该变量保存当前轮次中 `Tendermint` 状态机的当前状态。\n\n- **锁定值（lockedValue）：**\
  \ 该变量存储最近一次（相对于轮次编号）已发送预提交消息的值。\n\n- **锁定轮次（lockedRound）：** 该变量保存有关该进程发送非空预提交消息的上一轮的信息，这意味着这是可能决策值被锁定的轮次。这意味着，如果在一个轮次中，针对某个值收到了一条提议消息和相应的\
  \ `2F + 1` 条消息，那么，由于已经为该值接受了 `2F + 1` 个预投票，因此这是一个可能的决策值。\n\n- **有效值（validValue）：**\
  \ `validValue` 变量的作用是存储最近可能的决策值。\n\n- **有效轮次（validRound）：** `validRound` 变量是 `validValue`\
  \ 被更新的上一轮。\n\n- **高度（Height）：** 存储当前的共识实例。\n\n- 当前轮次编号\n\n- 一个决策数组\n\n`Tendermint`\
  \ 按轮次进行。每一轮包含三个阶段：提议、预投票、预提交。算法工作方式如下：\n\n- 每一轮从提议者提出的一个提议值开始。对于每个高度，提议者在第一轮开始时提出一个新值。\n\
  \n- 在随后的任何轮次中，只有在当前没有有效值（即，值为空）的情况下，提议者才会提出新值。否则，会提议 `validValue`（即可能的决策值），该值已在之前的轮次中被锁定。提议消息还包含一个值，指明上一次更新有效值的有效轮次。\n\
  \n- 仅当满足以下条件时，正确的进程才会接受该提议：\n  - 提议的值是有效的。\n  - 该进程尚未锁定任何值。\n  - 或者该进程已锁定一个值。\n\n\
  - 如果前述条件满足，正确的进程将接受该提议并发送一个预投票消息。\n\n- 如果条件不满足，该进程将发送一个值为空的预投票消息。\n\n- 如果一个进程在当前轮次中尚未发送预投票消息，或者提议阶段的计时器到期，则会触发与提议阶段相关联的超时机制。\n\
  \n- 如果一个正确的进程收到了一个包含有效值的提议消息和 `2F + 1` 个预投票消息，它将发送预提交消息。\n\n- 否则，它会发送一个空的预提交。\n\n\
  - 如果与预提交相关联的计时器到期，或者进程在收到提议消息和 `2F + 1` 个预提交消息后尚未发送预提交消息，则会触发与该预提交相关的超时机制。\n\n-\
  \ 如果一个正确的进程在某个轮次中收到了提议消息，并且收到了针对该提议值 ID 的 `2F + 1` 个预提交消息，它将决定该值。\n\n- 此步骤也有一个相关联的超时机制，确保处理器不会无限期地等待接收\
  \ `2F + 1` 条消息。如果在处理器能够做出决定之前计时器到期，处理器将开始下一轮。\n\n\n好的，作为高级文档工程师和翻译员，我已根据您提供的注意事项和示例，将给定的英文文本翻译成符合要求的中文文档。\n\
  \n\n### Tendermint 流程\n\n当一个处理器最终做出决定时，它会触发针对下一个区块提案的下一个共识实例，并且提案、预投票和预提交的整个周期会再次开始。\n\
  \n该协议可以简单地描述为一个重复的序列：提案 ➤ 预投票 ➤ 预提交，每次提交后，都会达到一个新的高度并开始新一轮，如图 8-4 所示。\n\n![图 8-4](img/515270_1_En_8_Fig4_HTML.jpg)\n\
  \n流程图具有以下流程：新一轮；提案；有效且及时，是；等待预投票，是；等待预提交，是；提交。\n\n**图 8-4 Tendermint 流程 – 单次运行**\n\
  \nTendermint 引入了一种新的终止机制。提案消息使用了两个变量，即`validValue`和`validRound`。当收到有效的提案消息以及随后的相应`2f\
  \ + 1`个预投票消息时，一个正确的进程会更新这两个变量。\n\n这种终止过程得益于八卦协议和同步假设。例如，假设一个正确的进程在一轮中锁定了一个值。那么所有其他正确的进程会在该轮结束时，使用被锁定的值更新它们的`validValue`和`validRound`变量。基本假设是，一旦一个正确的处理器锁定了这些值，八卦协议会在同一轮内将它们传播到其他节点。每个处理器都会知道锁定的值和轮次，即有效值。现在，当进行下一个提案时，提案者会获取到这些相同的锁定值；由于有效的提案和相应的`2f\
  \ + 1`个预投票消息，提案者已经被锁定。通过这种方式，可以确保进程最终决定的值是满足有效性条件的可接受值。\n\n至此，我们完成了关于 Tendermint\
  \ 协议的讨论。接下来，我们将探索 HotStuff，它改进了之前的 PBFT 及其变体协议中的若干局限性。\n\n## HotStuff\n\nHotStuff\
  \ 是一种用于状态机复制的 BFT 协议。多项创新使其成为比传统 PBFT 更优的协议。然而，与 PBFT 类似，它在部分同步环境下工作，基于消息传递网络，要求最小节点数`n\
  \ = 3f + 1`，并依赖于基于领导者的主备方法。它使用可靠且经过认证的通信链路。HotStuff 利用门限签名，所有节点使用单个公钥，但每个副本使用唯一的私钥。使用门限签名降低了通信复杂度。\n\
  \nHotStuff 引入了一些创新，我们介绍如下。\n\n### 线性视图变更\n\nHotStuff 协议中的视图变更只需要`O(n)`条消息。它是正常运行的一部分，而不是一个独立的子协议。在最坏情况下，如果领导者连续失败，通信成本会增加到`O(n²)`，即二次方复杂度。与\
  \ PBFT 的稳定领导者不同，HotStuff 中的领导者每三轮轮换一次，即使领导者没有失败也是如此。\n\n简单来说，二次方复杂度意味着算法的性能与输入大小的平方成正比。\n\
  \n在线性视图变更中，在 GST 之后，任何诚实的被选中的领导者只需要发送`O(n)`个认证者来推动决策，包括领导者失败并选举出新领导者的情况。因此，即使在领导者接连失败的最坏情况下，GST\
  \ 之后达成共识的通信成本也是`O(n²)`。\n\n### 乐观响应性\n\n乐观响应性允许任何正确的领导者在 GST 之后只需要前`n - f`个响应即可确保进展，而无需等待来自每个副本的`n\
  \ - f`个响应。这意味着它以网络速度运行，而不必不必要地等待来自其他节点的更多消息，然后进入下一个阶段。\n\n#### 链质量\n\n该属性通过允许频繁的领导者轮换，为系统提供了公平性和活跃性。\n\
  \n### 隐藏锁定\n\n它还解决了隐藏锁定问题。当领导者验证器不等待一轮的到期时间时，就会发生“隐藏锁定”问题。如果我们仅依赖接收`n – f`条消息，最高的锁定可能无法到达领导者。最高锁定值可能保存在另一个副本中，而领导者没有等待该副本的响应，从而导致领导者不知道最高锁定值。如果领导者随后提议一个较低的锁定值，而其他一些节点已经锁定了一个更高的值，这可能导致活跃性问题。节点会等待更高的锁定或相同的锁定回复，但领导者不知道最高锁定值，会继续发送较低的锁定值，从而导致竞态条件和活跃性违规。\n\
  \nHotStuff 通过在实际锁定轮之前添加一个前导锁定轮解决了这个问题。这里的思路是，如果`2f + 1`个节点接受了前导锁定，领导者将收到它们的响应并获知最高锁定值。因此，现在领导者不必等待`Δ`（delta\
  \ – 消息传递延迟的上限）时间，即可通过`n − f`个响应获知最高锁定值。\n\n### 心跳机制（Pacemaker）\n\nHotStuff 创新性地将安全性和活跃性机制分离开来。安全性通过网络中的参与者的投票和提交规则来确保。另一方面，活跃性由一个称为“心跳机制”的独立模块负责，该模块确保选举出一个新的、正确的且唯一的领导者。此外，心跳机制保证了在\
  \ GST 达成后能够继续取得进展。它的首要职责是将所有诚实的副本和一个唯一的领导者带到共同的高度并维持足够长的时间。为了实现同步，副本会逐步增加它们的超时时间，直到取得进展。由于我们假设一个部分同步模型，这种机制很可能会生效。此外，领导者选举过程基于一个简单的轮换协调器范式，副本遵循特定的调度策略（通常是轮询）来选择新的领导者。心跳机制还确保领导者选择一个副本能够接受的提案。\n\
  \n### 更好的参与者组织拓扑\n\nPBFT 协议以团（网状拓扑）的形式组织节点，导致二次方消息复杂度，而 HotStuff 以星型拓扑组织节点。这种设置使得领导者能够直接向所有其他节点发送消息或从所有其他节点收集消息，从而降低了消息复杂度。简单来说，它使用了一种“一对多”的通信模式。\n\
  \n如果领导者负责所有这些处理，可能会出现单个领导者负载过高的问题，这可能会拖慢网络速度。\n\n现在考虑领导者被破坏或妥协的场景。标准的 BFT 容错保证可以处理这种情况。如果领导者提议了一个恶意区块并被怀疑有故障，它将被其他正确的节点拒绝，并且协议将选择一个新的领导者。这种场景可能会暂时拖慢网络，直到新的诚实领导者接管。如果网络中的大多数节点是诚实的，一个正确的领导者最终会接管并提议一个有效的区块。此外，为了增加安全性，领导者通常每隔几轮就在验证器之间进行频繁轮换，这可以抵消任何针对领导者的恶意攻击。此属性确保了公平性，有助于实现链质量。\n\
  \nPBFT 包含一个正常模式和视图变更模式，当领导者被怀疑有故障时，会触发视图变更。这种方法提供了活跃性保证，但增加了通信复杂度。HotStuff 通过将视图变更过程与正常模式结合来处理这个问题。在\
  \ PBFT 中，节点在视图变更发生前等待`2F+1`条消息，但在 HotStuff 中，视图变更可以直接发生，而无需调用一个独立的子协议。相反，检查用于变更视图的消息阈值成为了正常视图的一部分。\n\
  \n\n\n#### 工作原理\n\n`HotStuff` 协议包含四个阶段：准备阶段（Prepare）、预提交阶段（Pre-commit）、提交阶段（Commit）和决定阶段（Decide）。\n\
  \n一个法定人数证书（`QC`）是一种数据结构，它代表由 *n* – *f* 个节点生成的签名集合，用以表示已达到所需的消息阈值。换句话说，来自 *n* − *f*\
  \ 个节点的投票集合就是一个 `QC`。\n\n##### 准备阶段\n\n一旦新的领导者从 `N – F` 个节点累积了新的视图消息，协议便由新领导者启动。领导者处理这些消息，以确定存在最高\
  \ `PREPARE` 消息法定人数证书的最新分支。\n\n##### 预提交阶段\n\n一旦领导者累积了 `N – F` 个准备投票，它就会创建一个称为“准备法定人数证书”的法定人数证书。领导者将该证书作为\
  \ `PRE-COMMIT` 消息广播给其他节点。当节点收到 `PRE-COMMIT` 消息时，它会回复一个预提交投票。该法定人数证书表示所需数量的节点已确认该请求。\n\
  \n##### 提交阶段\n\n当领导者累积了 `N – F` 个预提交投票后，它会创建一个 `PRE-COMMIT` 法定人数证书，并将其作为 `COMMIT`\
  \ 消息广播给其他节点。当节点收到此 `COMMIT` 消息时，它们会回复自己的提交投票。在此阶段，节点会锁定该 `PRE-COMMIT` 法定人数证书，以确保即使发生视图变更，算法的安全性也能得到保障。\n\
  \n##### 决定阶段\n\n当领导者收到 `N – F` 个提交投票后，它会创建一个 `COMMIT` 法定人数证书。然后，领导者将此 `COMMIT` 法定人数证书通过\
  \ `DECIDE` 消息广播给其他节点。当节点收到此 `DECIDE` 消息时，它们会执行该请求，因为此消息包含一个已经提交的证书/值。一旦由于接受并执行 `DECIDE`\
  \ 消息而发生状态转换，新的视图便会开始。\n\n我们可以在图 8-5 中直观地看到此协议。\n\n![](img/515270_1_En_8_Fig5_HTML.png)\n\
  \n对 `HotStuff` 协议的图示说明包括一个由副本 `R 1` 到 `R 4` 组成的网络，分为四层，即准备层、预提交层、提交层和决定层。\n\n**图\
  \ 8-5** HotStuff 协议\n\n更精确地说，`HotStuff` 的步骤如下所列：\n\n-   新的主节点从 `n-f` 个节点获取新的视图消息，这些消息包含每个验证者收到的最高准备法定人数证书。主节点查看这些消息，并找到具有最高视图（轮次编号）的准备\
  \ `QC`。然后，领导者通过准备消息广播提案。\n-   当其他节点收到来自领导者的此准备消息时，它们会检查该准备提案是否扩展了最高的准备 `QC` 分支，并且是否具有比它们当前锁定的视图编号更高的视图编号。\n\
  -   其他节点通过确认消息回复给领导者。\n-   领导者收集来自 *n* − *f* 个准备投票的确认。\n-   当领导者获得 `n-f` 个投票后，它会将其合并成一个准备\
  \ `QC`，并通过预提交消息广播此 `QC`。\n-   其他副本通过预提交投票回复给领导者。当领导者从其他节点收到 `n-f` 个预提交投票后，主节点会将其合并成一个预提交\
  \ `QC`，并通过提交消息广播它们。\n-   副本通过提交投票回复给领导者，并锁定在预提交 `QC` 上。当领导者从副本那里收到 `n-f` 个提交投票后，它会将其合并成一个提交\
  \ `QC`，并广播决定消息。\n-   当节点收到决定消息时，它们执行操作/命令并开始下一个视图。\n-   此过程循环重复。\n\n还有其它优化，例如流水线（pipelining），它可以进一步提高性能。由于所有这些阶段本质上都是相同的，因此很容易对\
  \ `HotStuff` 进行流水线化处理，从而提升性能。流水线化允许协议在每个阶段提交一个客户端请求。在一个视图中，每个阶段的领导者都会提出一个新的客户端请求。这样，领导者可以并发处理先前客户端请求的预提交、提交和决定消息，这些请求通过提交证书传递给之前的领导者。\n\
  \n### 安全性与活跃性\n\n`HotStuff` 通过使用心跳机制（pacemaker）来保证活跃性，该机制通过在 `GST` 之后、有界时间间隔内推进视图来确保进展。该组件封装了视图同步逻辑以确保活跃性。它使足够多的诚实节点在同一个视图中停留足够长的时间，以确保达成进展。这一特性是通过逐步增加超时时间，直到取得进展来实现的。\n\
  \n每当一个节点在某个视图内超时，它就会广播一条超时消息，并在收到 `2*f* + 1` 个超时消息组成的法定人数证书后，前进到下一个视图。该证书也会被发送给下一个领导者，由其继续推进协议。这种超时检测听起来熟悉吗？它听起来熟悉是因为心跳机制的抽象本质上就是我们在第\
  \ 3 章中讨论过的故障检测器。此外，投票和相关的提交规则确保了 `HotStuff` 的安全性。\n\n`HotStuff` 是一个简单而强大的协议，它结合了多项创新，产生了一个比其前辈更优的协议。\n\
  \n\n\n## Polkadot\n\nPolkadot 是一个现代的区块链协议，它连接了一个由专用区块链组成的网络，并允许它们协同运作。它是一个具有共享共识和共享状态的异构多链生态系统。\n\
  \nPolkadot 拥有一条被称为**中继链**的中心主链。这条中继链管理着平行链——这些连接到中继链的异构分片。中继链保存着所有平行链的状态。所有这些平行链可以相互通信并共享安全性，从而形成一个更好、更健壮的生态系统。由于平行链是异构的，它们可以服务于不同的目的；一条链可以是智能合约专用链，另一条可以用于游戏，还有的可以提供某些公共服务，等等。中继链通过提名权益证明来保障安全。\n\
  \n中继链上的验证者负责生产区块、与平行链通信并最终确定区块。链上治理决定了验证者的理想数量。\n\n图 8-6 展示了 Polkadot 链及其平行链的关系图。\n\
  \n![](img/515270_1_En_8_Fig6_HTML.png)\n\n一个 Polkadot 的圆形图表包含 4 个平行链插槽、1 个平行线程插槽、1\
  \ 个平行链社区区块，以及一个用于连接其他链的桥。\n\n图 8-6\n\nPolkadot 的简单示意图\n\nPolkadot 的目标是能够与其他区块链进行通信。为此，它使用了桥，这些桥将平行链连接到外部区块链，例如比特币和以太坊。\n\
  \nPolkadot 有多个组成部分。**中继链**是负责管理平行链、跨链互操作性、跨链消息传递、共识和安全性的主链。\n\n它由节点和角色构成。节点可以是轻客户端、全节点、归档节点或哨兵节点。轻客户端仅包含运行时和状态。全节点会在可配置的间隔进行修剪。归档节点保存完整的区块历史记录，而哨兵节点则保护验证者并抵御\
  \ DDoS 攻击，从而为中继链提供安全保障。节点可以扮演多种角色：验证者、提名人、收集者和钓鱼者。**验证者**是系统中级别最高的负责人。他们是区块生产者，要成为区块生产者，他们需要提供足够的保证金。他们负责生产并最终确定区块，以及与平行链通信。**提名人**是利益相关者，他们为验证者的安全保证金做出贡献。他们信任某个验证者会“恪尽职守”并生产区块。**收集者**负责执行交易。他们为提议区块的验证者创建未密封但有效的区块。**钓鱼者**用于检测恶意行为。钓鱼者因提供参与者行为不端的证明而获得奖励。**平行链**是连接到中继链的异构区块链。它们本质上是\
  \ Polkadot 的执行核心。平行链可以拥有自己的运行时，称为特定应用区块链。另一个名为**平行线程**的组件，是一种在 Polkadot 主机内运行并连接到中继链的区块链。它们可以被视为按需付费的链。平行线程可以通过拍卖机制成为平行链。**桥**用于将平行链与外部区块链网络（如比特币和以太坊）连接起来。\n\
  \n### Polkadot 的共识机制\n\nPolkadot 的共识是通过多种机制的组合来实现的。在治理和记账方面，使用了提名权益证明。在区块生产方面，使用了\
  \ `BABE` 算法。`GRANDPA` 是最终性工具。在网络中，验证者拥有各自的时钟，并且假定网络是部分同步的。\n\n正如我们在传统的中本聪工作量证明共识中所见，最终性通常是概率性的。在大多数许可网络和一些公共网络中，它往往是确定性的，即可证明的最终性，例如\
  \ `PBFT` 和 `Tendermint`。\n\n在 Polkadot 中，由于其多链异构架构，可能会出现某些情况，由于链之间的冲突，导致添加了一些恶意区块。这些恶意区块需要在冲突解决后被移除；在这种情况下，确定性最终性由于其不可逆的特性而不适用。另一方面，工作量证明又太慢、耗能且是概率性的。解决方案是尽可能快地持续生产区块，但将最终性的确定推迟到适合最终确定的时机。这样，区块生产可以继续进行并且是可逆的，而最终性决定可以在稍后阶段单独且可证明地做出。\n\
  \n这种可证明最终性的概念在多链异构网络中非常有用，因为它允许我们向未参与共识的其他方证明某个区块是最终的。此外，可证明的最终性也使得建立与其他区块链的桥变得更加容易。\n\
  \n这种混合方法的工作原理是，即使只有一个验证者在线且正确，也允许其生产区块，但区块的最终确定则交由一个称为“最终性工具”的独立组件处理。在正常情况下，区块最终确定也相当快，但如果出现状态冲突等问题，则可以将最终确定推迟，直至对区块进行更详细的审查。在遭受严重攻击或出现大规模网络分区时，区块生产将继续进行；然而，作为一种回退机制，Polkadot\
  \ 将回退到概率性最终确定机制。这样一来，只要至少有一个验证者正确且在线，即使在极端情况下也能保证活性。区块由 `BABE` 生产，而由 `GRANDPA` 最终确定。`GRANDPA`\
  \ 是对一条链上的区块进行最终确定，而非逐个区块进行，这提高了效率。由于最终确定是一个独立的过程，区块生产可以以网络允许的任何速度继续进行，而最终性不影响区块生产速度，并在后续完成。\n\
  \n在 `GRANDPA` 最终确定“最佳”链之前，可能会存在一些分叉。我们可以在图 8-7 中看到这一点。\n\n![](img/515270_1_En_8_Fig7_HTML.png)\n\
  \n一个流程图，流程如下。`BABE` 下的区块 4、x、y 和 z 按所述顺序指向 `GRANDPA` 下的区块 3、2 和 1。\n\n图 8-7\n\n\
  `BABE` 生产区块与 `GRANDPA` 最终确定\n\n该图右侧展示了由 `BABE` 在三个分叉中生产的三个区块；`GRANDPA` 解决这些分叉并最终确定链。现在，让我们看看区块是如何由\
  \ `BABE` 生产的。\n\n\n\n#### BABE – 区块链扩展的盲分配协议\n\n`BABE` 是一种用于区块生产的权益证明协议，验证者根据其质押量被随机选中来生产区块。该协议不依赖任何中央时钟。\n\
  \n时间被划分为持续 `n` 秒的时段，称为时隙（slot），每个时隙预计会有一个区块被生产出来。一个纪元（epoch）由一系列时隙组成。在每个时隙中，验证者会运行一个\
  \ `VRF`（可验证随机函数），该函数根据先前纪元生成的随机性来决定是否生产区块。我们可以通过图 8-8 直观理解这一过程。\n\n```markdown\n\
  ![](img/515270_1_En_8_Fig8_HTML.png)\n```\n\n创世时间线包含纪元 1 到 4。每个纪元包含一组 4 个时隙。\n\n\
  **图 8-8**  \n时隙与纪元\n\n验证者使用公钥密码学。存在两种密钥对。第一种密钥对的私钥用于区块签名。第二种密钥对用于可验证随机函数（`VRF`），也称为彩票密钥对。后者的私钥作为可验证随机函数的输入。区块签名提供了常规的不可否认性、完整性和数据源认证保障，用于验证该区块确实由该验证者生产。在\
  \ `VRF` 中，私钥生成随机性，而公钥则向其他节点证明生成的随机性确实可靠，且验证者没有作弊。\n\n每个验证者被选中的概率几乎相等。时隙领导者选举类似于\
  \ `PoW`：如果 `VRF` 的结果低于某个预设阈值，则该验证者获得区块生产权。同时，`VRF` 生成的证明使其他参与者能够验证该验证者是否遵守规则且未作弊；换句话说，它证明了生成的随机性是可靠的。如果\
  \ `VRF` 生成的值等于或高于目标值，则该验证者只需收集其他验证者生产的区块。\n\n以下是 `BABE` 协议的各个阶段。\n\n##### 创世阶段\n\
  \n在此阶段，唯一的创世区块由人工创建。创世区块包含一个随机数，该随机数在前两个纪元中用于时隙领导者选举。\n\n##### 常规阶段\n\n每个验证者在收到创世区块后，将其时间划分为所谓的时隙。验证者根据相对时间算法（我们稍后将解释）确定当前时隙编号。在常规运行中，每个验证者都应生产一个区块，而其他非验证者节点则接收生产的区块并进行同步。每个验证者应拥有当前时隙/纪元中的一组链，并通过最佳链选择机制（稍后解释）选定上一时隙中的最佳链。\n\
  \n时隙领导者的选择基于 `VRF` 的输出。如果 `VRF` 的输出低于某个阈值，则该验证者成为时隙领导者。否则，它只需从领导者处收集区块。\n\n领导者生成的区块会被添加到当前时隙选定的最佳链中。生产的区块必须至少包含时隙编号、前一个区块的哈希值、`VRF`\
  \ 输出、`VRF` 证明、交易以及数字签名。一旦链更新了新区块，该区块即被广播。当其他非领导者验证者收到区块时，会检查签名是否有效。它还会通过 `VRF` 验证算法检查\
  \ `VRF` 输出，以验证是否由有效的领导者生产了该区块。它会检查：如果 `VRF` 输出低于阈值，则领导者有效。它还会进一步检查是否存在一条包含所需头部的有效链，以便将收到的区块添加进去，并验证区块中的交易是否有效。\n\
  \n如果一切有效，验证者便将区块添加到链中。当时隙结束时，验证者最终使用最佳链选择算法选出最佳链，该算法会剔除所有不包含由最终性工具 `GRANDPA` 确定的最终区块的链条。\n\
  \n##### 纪元更新\n\n每 `n` 个时隙后，新的纪元开始。验证者必须在开始新纪元之前获取新纪元的随机性和活跃验证者集合。新纪元的新验证者集合包含在 Relay\
  \ Chain 中，以实现区块生产。新验证者需等待两个纪元后，协议才能选择它。延迟两个纪元添加验证者，可确保新验证者的 `VRF` 密钥在其即将活跃的未来纪元的随机性被揭示之前，就已添加到链中。新纪元的随机性基于前两个纪元计算得出，方法是将这两个纪元中所有区块的\
  \ `VRF` 输出串联起来。\n\n图 8-9 的图示阐明了这一时隙领导者选举过程。\n\n```markdown\n![](img/515270_1_En_8_Fig9_HTML.png)\n\
  ```\n\n创世时间线包含纪元 1 到 4。每个纪元包含一组 4 个名为 B 的时隙。每个时隙中选出的领导者指向 V R F。\n\n**图 8-9**  \n\
  通过 `VRF` 进行时隙领导者选举以及在时隙和纪元中的区块生产\n\n最佳链选择算法会简单剔除所有不包含由 `GRANDPA` 最终确定的区块的链条。如果 `GRANDPA`\
  \ 未最终确定任何区块，协议将退而使用概率性最终性，最终区块被选为最后一个区块之前若干区块（某个数量）的位置。这类似于 `PoW` 中的链深度规则。\n\n在\
  \ `BABE` 中，时间管理采用**相对时间算法**。所有参与方知晓当前时隙编号，这对 `BABE` 的安全性至关重要。`BABE` 不使用由 `NTP` 管理的时间源，因为显然中央时间源不可信。验证者通过将区块到达时间作为参考，实现一种逻辑时间的概念，而不依赖外部时间源。当验证者收到创世区块时，会记录到达时间作为第一个时隙开始的参考点。由于每个节点上的每个时隙开始时间可能不同，因此假设这种差异在合理范围内。验证者通过计算本纪元中区块到达时间的中位数来更新自身时钟。虽然机制不同，但其基本概念似乎与我们第\
  \ 1 章讨论的逻辑时钟相似。对于暂时离线后又重新加入网络的验证者，也可以临时调整时钟直到下一个纪元。\n\n\n\n### 安全性与活跃性\n\nBABE 满足四项安全属性：链增长、存在性链质量、链密度与共同前缀。\n\
  \n#### 链增长\n\n该属性确保区块间存在最低限度的增长。换言之，这是一项活跃性属性，只要诚实验证人拥有绝对多数投票权，链增长就能得到保障。作恶验证人无法阻止最佳链的推进。\n\
  \n#### 链质量\n\n该属性保证在每个`x`个时隙中，诚实方拥有的任何最佳链上至少包含一个诚实区块。协议确保即使在最坏情况下，每个纪元内的最佳链也至少会包含一个诚实区块。这保证了随机性不会被偏见影响。\n\
  \n#### 链密度\n\n该属性确保最佳链中任意足够长的区块片段内，超过半数的区块由诚实验证人生产。该属性由链增长与链质量共同推导得出。\n\n#### 共同前缀\n\
  \n该属性确保诚实验证人最佳链末尾区块之前的任何区块都不再可变，构成最终性。同样，该属性基于诚实验证人占据绝对多数的假设。恶意验证人在单个时隙中被选中的概率极低，大部分当选者均为诚实验证人；因此恶意验证人处于绝对少数，无法创建不包含终局区块的另一条\"\
  最佳链\"。\n\n### GRANDPA – 基于 GHOST 的递归祖先衍生前缀共识协议\n\n该组件在 BABE 产出区块后独立执行最终化操作。本质上是一种拜占庭共识协议，用于在多条分叉中达成链的共识。与传统\
  \ BFT 协议的区别在于：BFT 通常针对单个区块做决策，而 GRANDPA 则对一整条区块链（分叉）做出判断，并确定最终的规范链。这是一种解决分叉的最终化机制。\n\
  \nGRANDPA 假设部分同步网络环境。协议按轮次运行，每轮包含`3f+1`个合格投票者，其中`2f+1`个投票者被假定为诚实。换言之，要求验证人集合中三分之二为诚实方，并对规范链的前缀达成一致，该前缀最终被永久确认。每轮通过伪随机方式选举一名主节点，所有参与者对此达成共识。此外，所有参与者需就投票者集合达成一致。主节点选举也可基于投票者轮换机制。\n\
  \n协议分为两个阶段：预投票与预承诺。预投票阶段允许验证人评估可最终化的区块，即验证人针对最佳链进行预投票。预承诺阶段中，验证人基于收集到的预投票应用三分之二\
  \ GHOST 规则，进行预承诺。最终，预承诺结果被永久确认。\n\nGRANDPA 包含两个子协议。第一个协议适用于部分同步环境，可容忍三分之一拜占庭故障。第二个协议适用于完全异步环境，可容忍五分之一拜占庭故障。\n\
  \n#### GRANDPA 协议步骤\n\n每轮选定一名参与者作为领导者（主节点），其他参与者均知晓主节点身份：\n\n- 新一轮开始。\n\n- 主节点广播其认为可能从上一轮实现最终化的最高区块。\n\
  \n- 验证人等待特定网络延迟后，各自广播针对其认为应最终化的最高区块的\"预投票\"消息。若验证人收到主节点发布的更优最佳链区块，则采用该最佳链。若超多数验证人正确操作，该区块预期将扩展主节点广播的链。\n\
  \n- 每个验证人分析预投票结果，确定可能实现最终化的最高区块。若预投票结果扩展了已最终化的链，则每个验证人将对该链进行预承诺。\n\n- 每个验证人等待足够数量的预承诺，以在新最终化的链上组成提交消息。\n\
  \n协议通过罚没机制惩罚不当行为：对恶意行为甚至疏忽行为（例如长期未激活节点）按一定比例扣除质押金。处罚力度与参与者数量成正比。\n\n#### 安全性\n\n\
  该协议确保所有投票都是上一轮可能已最终化的区块的后代。节点基于预投票与预承诺评估区块的最终化可能性。在新一轮开始前，节点通过收集足够数量的预承诺确保：任何具有本轮评估值的区块不可能在其他链或同链后续位置被最终化。在下一轮中，协议还保证节点仅对源自上一轮评估值后代的区块进行预投票与预承诺。\n\
  \n#### 活跃性\n\n协议通过轮换方式选择验证人作为主节点。主节点通过广播其基于上一轮评估的区块最终化结果来启动本轮。验证人对最佳链进行预投票，包含主节点提议的区块需满足：(1)\
  \ 该区块至少达到验证人的评估水平；(2) 验证人在上一轮已为该区块及其后代获取超过`2/3`的预投票。\n\n核心要点在于：若主节点提议的区块尚未被最终化，则应对其进行最终化以推动进展。例如，假设主节点提议的区块尚未最终化，且所有验证人已就包含最终化区块的最佳链达成一致。此时，通过最终化最新达成共识的链即可推动进展。若\
  \ GRANDPA 无法达成结论，BABE 将作为后备机制提供概率性最终性，确保系统持续进展。\n\nGRANDPA 与 BABE 是最新的异构多链协议之一。该系列协议还包括以太坊共识层（以太坊\
  \ 2.0，信标链）中使用的 Casper FFG 等。\n\n\n\n## 以太坊 2\n\n`Ethereum 2`，也称为`Serenity`或`Eth2`，是以太坊的最终版本。当前以太坊基于工作量证明（PoW），被称为`Eth1`。现在它被称为执行层，而之前`Eth1`和`Eth2`的术语已不再适用。`Eth2`现在被称为共识层。根据原计划，现有的`PoW`链最终将被弃用，用户和应用程序将迁移到新的`PoS`链`Eth2`。然而，这一过程预计需要数年时间，一个更好的替代方案是继续改进现有的`PoW`链，并使其成为`Ethereum\
  \ 2`的一个分片。这一变化将简化向权益证明的过渡，并允许通过`rollups`而非分片执行来实现扩展。信标链已经可用；“合并”阶段——即以太坊主网与信标链合并——预计在\
  \ 2022 年发生。合并后，信标链将具备权益证明和`EVM`能力，成为可执行的链。旧的`Ethereum 1`（`Eth1`）将成为执行层，使用执行客户端（例如来自`Eth1`的`geth`）。`Ethereum\
  \ 2`（共识）客户端（如`prysm`和`lighthouse`）将继续在信标链上运行。最终，计划于 2023 年扩展以太坊容量并支持执行的分片链将上线。`Ethereum\
  \ 2.0`“共识”与`Ethereum 1`“执行”作为分片 0，以及基于其路线图的其他升级，可在图 8-10 中看到。\n\n![](img/515270_1_En_8_Fig10_HTML.png)\n\
  \n以太坊升级表包括：`Ethereum 1`、`PoW`链；阶段 0、可执行的信标链；阶段 1、分片链；阶段 2、状态执行。\n\n**图 8-10** 以太坊升级，展示合并及后续升级\n\
  \n简而言之，`Eth1`现在被称为执行层，负责处理交易和执行；而`Eth2`现在被称为共识层，管理权益证明共识。作为共识层的一部分，提出了“`Ethereum\
  \ 2`”权益证明共识协议，我们接下来将讨论它。\n\n### Casper\n\n`Casper`是一个旨在替代以太坊当前`PoW`算法的权益证明协议。该协议家族包含两种协议：\n\
  \n- `Casper the Friendly Finality Gadget` (`FFG`)\n- `Casper the Friendly GHOST`\n\
  \n`Casper FFG`是一种`PoS` `BFT`风格的混合协议，在当前`PoW`之上添加了`PoS`覆盖层；而`Casper the Friendly\
  \ GHOST`则是一个纯粹的`PoS`协议。`Casper FFG`提供了一个过渡阶段，随后将被纯粹的`PoS`协议`Casper CBC`取代。下面我们将讨论`Casper\
  \ FFG`。\n\n#### Casper FFG\n\n`Casper`可以看作是在公共区块链上结合了权益证明的改进版`PBFT`。`Casper the\
  \ Friendly Finality Gadget`引入了一些新颖的特性：\n\n- 问责制\n- 动态验证者\n- 防御机制\n- 模块化覆盖层\n\n`Casper\
  \ FFG`是运行在区块提议机制之上的覆盖层机制。其唯一目的是达成共识，而非产生区块。\n\n问责制允许检测规则违规行为并识别违规的验证者。这使得协议能够惩罚违规验证者，从而作为对抗恶意行为的一种防御手段。\n\
  \n`Casper FFG`还引入了一种安全更改（即添加/移除）参与者验证者集合的方法。\n\n该协议还引入了一种防御机制，以防止网络分区和长程攻击。即使超过三分之一的验证者离线，协议也能提供应对此类场景的防御。\n\
  \n`Casper FFG`是一个覆盖层，这使得它易于在现有的`PoW`链之上添加。作为覆盖层，它期望底层链拥有自己的分叉选择规则。在以太坊信标链中，它是基于一种称为`LMD\
  \ GHOST`（最新消息驱动的贪婪最重观测子树）的分叉选择规则之上的覆盖层。\n\n`LMD GHOST`分叉选择规则基于`GHOST`。`LMD GHOST`选择规则从多个分叉中选出正确的链。诚实的链是获得验证者最多证明和权益（即权重）的那一条。分叉是由于网络分区、拜占庭行为和其他故障引起的。我们可以在图\
  \ 8-11 中看到`LMD GHOST`的运行机制。\n\n![](img/515270_1_En_8_Fig11_HTML.png)\n\n`LMD GHOST`的图示，包含一个网络，其中不同着色区块指向创世块，并且验证者对其给出了最多证明。\n\
  \n**图 8-11** `LMD GHOST`分叉选择规则\n\n在图 8-11 中：\n\n- 区块中的数字代表该区块中按权益计算的权重。\n- 六边形代表来自验证者的证明，每个证明权重为\
  \ 1。\n- 规范链是带有阴影区块（权重 + 证明）的那一条。\n\n通常，当工作量证明或其他区块链生成机制产生区块时，区块会一个接一个地生成，形成一条顺序且线性的区块链，其中每个父区块只有一个子区块。但由于网络延迟和故障/拜占庭节点，提议机制可能会为一个父区块生成多个子区块。`Casper`负责从每个父区块中选择一个子区块，从而从区块树中选择出一条唯一的规范链。\n\
  \n然而，出于效率考虑，`Casper`并不处理整个区块树；相反，它考虑由检查点形成的子树，即检查点树。\n\n新区块被追加到区块树结构中。树的一个子树——称为检查点树——才是需要做出决策的地方。此结构如图\
  \ 8-12 所示。\n\n![](img/515270_1_En_8_Fig12_HTML.png)\n\n一个从底层到顶层包含 0 到 7 层的检查点树，展示了检查点及其通过虚线和点线的连接。\n\
  \n**图 8-12** 检查点树，显示高度、投票、检查点和规范链\n\n创世区块是一个检查点，每第 100 个区块是一个检查点。从一个检查点到另一个检查点的距离称为一个纪元。换句话说，验证者每\
  \ 100 个区块最终确定一次检查点。每个加入网络的验证者都会存入其拥有的保证金。由于惩罚和奖励机制，这笔保证金金额会增减。验证者广播投票。一个投票的权重与验证者的权益成正比。如果验证者偏离协议（即违反任何规则），则可能损失全部保证金。这是为了达成安全性。\n\
  \n投票消息具有一些属性，我们描述如下：\n\n- `s`：一个已证明的源检查点的哈希值\n\n\n\n"
- "# 排版后的文本\n\n-   `t`: 待证明目标检查点的哈希值\n-   `h(s)`: 源检查点的高度\n-   `h(t)`: 目标检查点的高度\n\
  -   `S`: 发送方对整个投票消息的签名\n\n验证者创建投票消息，对其进行签名，并广播到网络。检查点的哈希值用于标识对应的检查点。只有当 `s` 在检查点树中是\
  \ `t` 的祖先节点，且验证者的公钥存在于验证者集合中时，该投票才是有效的。当超过三分之二的验证者对从源到目标的一条链进行投票时，该链或链接就成为了**绝对多数链接**。例如，以\
  \ `cp'` 为源，`cp` 为目标，则 `cp' → cp` 是绝对多数链接。如果一个检查点是创世区块，或者它是一条已证明的检查点所在的绝对多数链接中的一个检查点，那么该检查点就是**已证明的**(justified)。准确地说，我们可以表述为：如果存在一条绝对多数链接\
  \ `cp' → cp`，且 `cp'` 是已证明的，那么检查点 `cp` 就是已证明的。如果一个检查点 `cp` 是已证明的，并且存在一条绝对多数链接 `cp\
  \ → cp'`，其中 `cp'` 是检查点 `cp` 的直接子节点，那么该检查点就被认为是**最终确认的**(final)。\n\n已证明的检查点不被视为最终确认，因为可能存在冲突的已证明检查点。为了最终确认一个检查点\
  \ `cp`，需要进行第二轮的确认，即 `cp` 的直接子节点 `cp'` 通过绝对多数链接 `cp → cp'` 被证明。\n\n##### 协议步骤\n\n\
  -   代币持有者在网络中存入一笔质押金。\n-   在一个共识周期内：\n    -   识别有效的检查点。\n-   将它们添加到检查点树中。\n-   广播对某个检查点对（源，目标）的投票。\n\
  -   评估接收到的投票的有效性，根据罚没规则和投票签名者的质押金进行检查。\n-   如果该检查点对获得了超过总质押金三分之二的支持，则该检查点被视为已验证。\n\
  -   该检查点对被证明并最终确认。\n-   重复此过程。\n\n本质上，该过程分三步进行。首先，对某个检查点进行投票；如果获得了超过 2/3 的投票，则该检查点进入已证明状态。最后，链被最终确认以形成规范链。证明并不等同于最终确认；在区块树中可能存在多个已证明的链。当两个连续的检查点都获得\
  \ 2/3 的投票时，就达成了最终确认。\n\n##### 安全性与活性\n\n任何违反这些条件的验证者都将受到罚没其质押金的处罚。这些被称为最低罚没条件：\n\
  \n-   验证者不得发布针对同一目标检查点高度的两个不同投票。\n-   验证者不得在其另一个现有投票的源到目标范围内再次投票。\n\n有两个安全性与活性要求：\n\
  \n-   可追责安全性\n-   可行的活性\n\n可追责安全性与传统共识协议中的安全性要求略有不同。安全性简单地意味着，除非超过三分之一的验证者偏离协议，否则两个冲突的检查点永远无法被最终确认。可追责性意味着行为不端的验证者可以被识别并受到处罚。\n\
  \n可行的活性意味着，只要存在扩展已最终确认链的子节点，就总能添加绝对多数链接以产生新的已最终确认检查点。\n\n## 总结\n\n本章讨论了比特币之后出现的区块链时代协议。区块链共识协议有多种类型；有些基于投票，有些是工作量证明，另一类是权益证明协议。所有这些协议都具备一定的安全性和活性属性，以确保协议在给定环境中是正确且能正常运行的。我们在本章中讨论了其中几个要点。这些协议的对比总结将在最后一章，即第\
  \ 10 章中给出。\n\n我们还详细讨论了诸如 ETHASH、权益证明及其不同类型、以及包括 HotStuff 和 Tendermint 在内的 BFT 变体等协议。本章还介绍了现代协议，如\
  \ Casper FFG、Solana 的历史证明协议、以及 Polkadot 的 GRANDPA 和 BABE 协议。在本章中不可能涵盖所有协议，但至少提供了足够的信息来帮助理解区块链中使用的不同类型的算法。我们未涉及的一些其他协议，例如\
  \ PoET、HoneyBadger BFT 和 Snow，将在最后一章中简要介绍。\n\n该领域是一个非常活跃的研究领域，学术界和工业界的许多研究者对此都非常感兴趣。因此，我们期待该领域在未来会进一步发展和进步。\n\
  \n在下一章中，我们将讨论另一个激动人心的话题——量子共识，这是随着量子计算的出现而近期兴起的一个课题。\n\n"
- "# 9. 量子共识\n\n本章涵盖量子共识。在解释什么是量子共识之前，将首先对量子计算及其优势进行基础介绍，以帮助理解量子计算机的工作原理。此外，还会涉及量子网络、量子互联网、量子密码学和量子区块链等主题。然后我们将讨论量子共识，解释其定义、量子计算如何影响经典网络和量子网络中的经典共识，以及量子计算如何增强现有的分布式共识协议。我们还将综述研究界迄今为止取得的成果以及一些开放的研究问题。\n\
  \n\n\n## 引言\n\n将量子力学与信息论相结合的思想根源可追溯至 20 世纪 70 年代。1979 年，保罗·贝尼奥夫提出了量子计算的理论基础。1982\
  \ 年，理查德·费曼在一次演讲中指出，经典计算机无法执行描述量子现象的计算。经典计算机存在固有局限，要模拟量子现象，计算设备也必须基于量子原理，从而完成经典计算世界无法实现的量子力学模拟与计算。这一观点得到了广泛认同，众多研究者开始投身该领域。\n\
  \n1985 年，大卫·多伊奇提出了通用量子计算机的概念，并指出它可能利用量子叠加态执行并行操作。他还提出了\"多伊奇算法\"，该算法仅需一次抛掷就能判断一个量子硬币是否存在偏差。此后，量子计算虽一度引发研究热潮，但很快降温。然而，1994\
  \ 年彼得·肖尔描述了一种能快速分解大数的量子算法，使量子计算重新成为焦点。这一事件引发了极大关注，因为互联网安全主要依赖于 RSA 加密，而其安全性正建立在质因数分解的难度之上。更准确地说，经典计算机对大规模质数进行因式分解在计算上不可行，这构成了\
  \ RSA 的安全基石。但量子计算机却能高效完成此任务，从而破解 RSA，动摇互联网安全根基。可想而知，这成了重磅新闻。1996 年，格罗弗提出量子搜索算法，进一步激发了研究者对量子计算的兴趣。约\
  \ 28 年后的今天，我们已进入部分公司宣称实现\"量子霸权\"的阶段。来自学术界和工业界的众多研究者正致力于量子计算，它目前的发展阶段堪比 20 世纪 60\
  \ 年代的经典计算机。在未来十年左右，量子计算将在大多数大型组织（若非所有领域）成为主流。或许量子计算机不会很快走进千家万户，但有一点是明确的：量子计算正在飞速发展，并将很快开始（无论好坏）影响我们的日常生活。\n\
  \n量子计算机借鉴了计算机科学、工程学、量子力学、物理学、数学和信息论等多领域的思想。由此衍生出量子信息科学与技术等多个学科，这是量子力学与信息技术的融合。\n\
  \n量子信息科学是计算机科学、信息论与量子力学交叉的学科。它从根本上改变了我们对信息处理的认知，开创了解决以往计算复杂难题的全新方法。量子计算机存储和处理数据的方式与经典计算机（使用\
  \ 0 和 1 编码数据）截然不同。这种信息处理方式的差异，为实现解决复杂问题的显著加速打开了大门。\n\n## 什么是量子计算机？\n\n量子计算机是一种利用量子力学特性执行计算的设备。经典计算机模拟人类可执行的计算，擅长解决日常常规问题。但仍有大量问题在经典计算机上无法解决，被称为\"\
  棘手的难题\"。这些问题包括原子粒子行为等自然现象建模、气候变化模拟等。一个简单的复杂问题示例：安排十个人围坐餐桌就餐。经计算，共有 3,628,800^(⁵)种排列方式。暴力解法就是计算阶乘。\n\
  \n另一个例子是旅行商问题，属于 NP 难问题。其目标是找到遍历多个城市的最短往返路线。\n\n我们可以在经典计算机上解决许多复杂问题，现有的超级计算机也能快速处理日常数学、代数等问题。但即便是现代超级计算机，也无法解决那些\"\
  棘手的难题\"。这正是量子计算机大显身手的领域。尤其在组合优化问题中，当超级计算机都无能为力时，量子计算机提供了解决方案。\n\n优化问题旨在从所有可行解中寻找最优解。量子计算机擅长解决这类需要探索巨大状态空间的问题。\n\
  \n高效模拟分子有助于新药研发。分子模拟之所以困难，是因为原子间相互作用方式千变万化，单个原子位置的微小变动都会影响所有其他原子。这类存在指数级变量的问题，有望在量子计算机上得到解决。此外，这些信息无法存储在经典计算机中，因为我们没有如此庞大的存储空间。\n\
  \n例如，一个咖啡因分子由 24 个原子组成，但表征它需要`10⁴⁸`比特，这使得该问题在经典计算机上不可解；然而，量子计算机仅用 160 量子比特就能处理这些信息。\n\
  \n物流公司的路线优化是令人振奋的应用场景，其目标是在运送更多包裹的同时，找到最优路线以最小化燃油消耗。\n\n量子计算应用领域极为广泛，包括但不限于密码学、机器学习、数据分析、计算生物学、化学模拟及量子模拟。\n\
  \n在化学领域，它能帮助发现新材料和化合物、新药物，并改进化肥生产工艺，从而促进农业发展。在网络安全领域，可以实现更安全可靠的密钥生成与分发机制，以及新型密码学（密码编码学与密码分析学）。预计量子计算机还能解决优化问题，如高效路线发现、金融投资风险管理等。\n\
  \n量子计算拥有众多应用前景，这正是人们竞相追求\"量子霸权\"的热情所在。量子霸权或量子优势，是指通过实验证明能解决经典计算机在合理时间内无法解决的难题。\n\
  \n要理解量子计算的世界，有几个基本构建块必不可少。我们将其描述如下：\n\n*   量子比特\n*   叠加态\n*   纠缠态\n*   量子隐形传态\n\n\
  \n\n### 量子比特\n\n经典计算机基于两种截然不同的状态工作，即`0`和`1`。经典计算机利用晶体管来产生或消除电信号，分别代表`0`或`1`。从根本上来说，即使是大多数现代超级计算机，其核心也都是晶体管。\n\
  \n量子计算机中的量子比特改变了这一基本范式，使得量子计算机能够以非凡的速度运行。一个`qubit`（量子比特）是物理原子粒子的状态，例如电子的自旋。一个`qubit`可以同时处于`0`和`1`两种状态的叠加态。随着量子比特数量的增加，计算速度呈指数级提升。经典计算机中的\
  \ 8 个比特合称为一个字节。在量子计算世界中，8 个量子比特合称为一个`qubyte`（量子字节）。\n\n想象一下经典计算机中的 4 个比特。这些比特有 16\
  \ 种可能的状态，并且只能顺序输入。然而，在量子计算机中，4 个量子比特可以处于全部 16 种可能状态的叠加态，因此可以同时输入。而在经典版本中，4 个比特虽然有\
  \ 16 种可能状态，但只能顺序输入。这种现象被称为量子并行性，是加速解决某些在经典计算机上难以处理的问题的关键。\n\n从物理上讲，构建量子比特有多种方法。这些技术包括离子阱、光子、中性原子、核磁共振（NMR）以及其他几种方法。\n\
  \n狄拉克符号用于表示量子比特。量子比特表示为∣`0`⟩和∣`1`⟩，与经典的`0`和`1`相对。区别在于，量子比特可以处于称为叠加态的线性组合状态。例如，一个量子比特可以是电子自旋向上或向下的叠加态，也可以是光子的+45\
  \ 度偏振或-45 度偏振的叠加态，以及其他多种方式。\n\n狄拉克符号用于表示量子态及其叠加态。狄拉克符号的形式为∣`0`⟩ + ∣`1`⟩，其中`0`和`1`是状态。\n\
  \n一个量子比特可以处于量子态∣*ψ*⟩ = *α* ∣`0`⟩ + *β* ∣`1`⟩，其中*α*、*β* ∈ *C*（复数概率幅），并且|*α*|² + |*β*|²\
  \ = 1。这意味着单个量子比特的状态由∣*ψ*⟩ = *α* ∣`0`⟩ + *β* ∣`1`⟩表示，概率条件是|*α*|² + |*β*|² = 1。这个概率条件意味着*α*、*β*的取值范围是受限的，并且无论如何，两者之和必须为\
  \ 1。*C*表示复数。\n\n除了狄拉克符号，我们还可以使用向量表示法。一个向量可以表示包含概率幅*α*和*β*的状态：\n\n```\n| ψ ⟩ = [\
  \ α  β ]\n```\n\n并且\n\n∣`0`⟩ = [`1` `0` ] 且 ∣`1`⟩ = [`0` `1` ]\n\n量子比特可以使用布洛赫球进行可视化，如图\
  \ 9-1 所示。\n\n布洛赫球有一个三维平面，球心位于原点。一条从原点出发的线段延伸到 psi。标记的角度是 theta 和 phi。\n\n**图 9-1**\
  \  \n布洛赫球 – 可视化量子比特的便捷方式\n\n我们可以将单个量子比特描述为布洛赫球表面上的一个点。北极代表状态∣`0`⟩，南极代表状态∣`1`⟩。量子比特的角度是，*θ*\
  \ 为纬度，*ϕ* 为经度。当对量子比特执行单门操作时，状态 *ψ*（量子比特）会旋转到布洛赫球上的另一个点。\n\n### 叠加态\n\n叠加态是量子力学的一个基本原理。叠加态意味着量子态可以相加，得到另一个有效的量子态。这类似于经典力学中的波可以叠加。相加后的量子态被称为“叠加态”。叠加态是实现非凡加速的关键，因为它允许同时探索许多计算路径。\n\
  \n### 纠缠态\n\n纠缠态是粒子之间存在的极强相关性，它允许两个或更多粒子彼此不可分割地联系在一起。它允许任意两个量子粒子存在于一个共享状态中。对其中一个粒子的任何操作都会瞬间影响另一个粒子，即使它们相隔极其遥远的距离。纠缠通常通过将两个量子比特靠近在一起，执行一项操作使其纠缠，然后纠缠后，再将它们分开来实现。即使其中一个量子比特在地球上，另一个被移动到遥远的太空，它们仍将保持纠缠。\n\
  \n纠缠态有两个特性使其特别适用于广泛的应用：最大协调性和单一配分性。\n\n#### 最大协调性\n\n当网络中不同节点的两个量子比特发生纠缠时，即两个粒子的量子态变得密不可分，它们会提供经典网络中不存在的更强的相关性和协调特性。这种性质称为最大协调性。例如，对第一个量子比特进行任何测量，如果对第二个量子比特进行相同的测量，则会瞬间显示出相同的结果，即使该结果是随机产生的且非预先确定的。更准确地说，它们总会随机产生\
  \ 0 或 1，但两者总会产生相同的结果。这一特性使得纠缠态适用于需要协调的任务，例如时钟同步、领导者选举和共识。想象一下在没有物理传输的情况下实现分布式网络的时钟同步；这可以使分布式网络变得异常快速。（回忆一下上一章中用本地计算取代通信的思想。）此外，共识过程中的状态传输/感知能立即加快共识速度。这里的基本思想是，当处于纠缠态时，只需对一个量子比特执行操作（改变参数），就有可能全局地（完全地）改变整个状态。这一特性具有深远的意义；想象一下能够立即将状态传输到网络中的所有节点。这可以在共识算法中实现非凡的加速。\n\
  \n#### 单一配分性\n\n量子纠缠是不可共享的。如果两个量子比特纠缠在一起，那么宇宙中任何地方的第三个量子比特都永远无法与其中任何一个发生纠缠。这种性质称为纠缠的单一配分性。这种性质可以实现隐私保护、加密密钥生成和身份识别等应用。\n\
  \n## 量子门\n\n就像经典计算一样，在量子世界中，我们也使用门操作来处理数据。我们熟悉经典世界中使用的布尔门，例如`NOT`、`AND`、`OR`、`XOR`、`NAND`和`NOR`。在量子世界中，我们对输入状态应用某个算子，该算子将其转换为输出状态。这个算子被称为量子门。量子门作用于单个量子比特或多个量子比特。这里的一个规则是，每个门的输入数量和输出数量必须相同。这就是使门可逆，进而使量子计算机可逆的原因。有在布洛赫球上执行旋转的单量子比特门。还有将单门组合以创建更复杂功能的双量子比特门，这最终构建出量子计算机。\n\
  \n量子门有很多种；下面介绍一些常见的类型。\n\n### 阿达玛门\n\n该门将一个基态转换为两个基态的均匀叠加态。从根本上说，它允许我们创建叠加态。它作用于一个量子比特，其符号如图\
  \ 9-2 所示。\n\n量子门的图示包括 `Hadamard` 门、`Z` 门、`C NOT` 门、`C C NOT` 门、`T` 门、`NOT` 门和交换门。\n\
  \n**图 9-2**  \n量子门\n\n### T 门\n\n`T` 门在相互贡献的基态之间引入π/4 相位差。图 9-2 所示的符号代表`T`门。在`T`门中，相对相位旋转为\
  \ 45 度。\n\n\n\n### CNOT\n\n该门称为受控非门。它与经典的异或门相同，但具有可逆性。它作用于两个量子比特。第一个量子比特作为控制量子比特，第二个量子比特作为目标量子比特。只有当第一个量子比特处于特定状态时，它才会改变目标量子比特的状态。该门可用于在包含两个或更多量子比特的系统中创建纠缠态。\n\
  \n### Toffoli（CCNOT）\n\n这是受控-受控非门。它作用于三个量子比特。它翻转三比特状态中的第三个比特（当前两个比特为 1 时），即将 ∣110⟩\
  \ 翻转为 ∣111⟩，反之亦然。其符号如图 9-2 所示。换句话说，如果前两个比特为 1，则第三个比特取反。\n\n### Z\n\n这是一个相位偏移门。它将\
  \ 1 映射为-1，并将 0 保持为 0。换句话说，∣1⟩ 的振幅被取反。从根本上说，它使相位旋转 180 度。在电路中用方框中的 Z 符号表示，如图 9-2\
  \ 所示。\n\n### NOT\n\n该门将 ∣1⟩ 翻转为 ∣0⟩，反之亦然。它是经典非门的模拟。\n\n### 交换门\n\n交换门用于交换两个量子比特。其示意图如图\
  \ 9-2 所示。当然，量子门种类繁多，但我们所介绍的这些是常用门，将有助于我们理解本章后续的算法。\n\n所有这些门都可以在图 9-2 中看到。\n\n###\
  \ 测量\n\n除了门之外，另一个重要元素是测量。测量获取一个量子态并将其坍缩到其中一个基态。我们可以在图 9-3 中看到这个过程。\n\n![](img/515270_1_En_9_Fig3_HTML.jpg)\n\
  \n测量示意图。量子态进入测量环节后，会产生一个经典态。\n\n图 9-3\n\n测量\n\n## 量子电路\n\n我们使用量子门来构建量子电路。量子电路本质上是应用于量子比特的一系列量子操作序列。它由量子门（算子）、包含输入量子比特的量子寄存器、代表随时间推移的一系列操作的量子导线，以及测量环节组成。在量子电路中，时间从左向右流动。图\
  \ 9-4 展示了一个量子电路的外观。\n\n![](img/515270_1_En_9_Fig4_HTML.png)\n\n一个量子电路图包含 3 个量子比特\
  \ q 0、q 1 和 q 2，操作 U 1 至 U 3，一个双量子比特操作 U 4，U s，以及一个测量环节。\n\n图 9-4\n\n一个量子电路\n\n\
  量子门用方框表示。左侧是量子寄存器。量子导线代表一个量子比特，例如一个光子或一个电子。每个门都会引入量子比特的变化，例如电子自旋的变化。\n\n量子电路实现量子算法。换句话说，量子算法由量子电路描述。有许多标准的量子电路。下面我们介绍一些常用的量子电路。\n\
  \n### 隐形传态电路\n\n我们能否将量子态从一个量子设备传输到另一个量子设备？答案是肯定的。为此，我们使用隐形传态技术，它利用纠缠将量子态从一个量子设备移动到另一个量子设备。\n\
  \n在图 9-5 中，展示了一个隐形传态电路，它可以将量子态从一个方传输到另一方。\n\n![](img/515270_1_En_9_Fig5_HTML.png)\n\
  \n一个隐形传态电路包含 3 个量子比特、2 个哈达玛门、3 个 CNOT 门、两个测量环节，以及一个受控 Z 门。\n\n图 9-5\n\n隐形传态电路\n\n\
  隐形传态的一些应用包括量子系统之间的态传输。这在量子分布式系统中非常有价值，其中节点之间的态传输可以实现诸如量子状态机复制等应用。\n\n### GHZ 电路\n\
  \n格林伯格-霍恩-泽林格（GHZ）态是由三个或更多量子比特组成的纠缠态。如果三个或更多粒子进入纠缠态，则称为多体纠缠。\n\n图 9-6 展示了这个电路。\n\
  \n![](img/515270_1_En_9_Fig6_HTML.png)\n\n一个 GHZ 电路包含 3 个量子比特、一个哈达玛门和 2 个 CNOT 门。\n\
  \n图 9-6\n\nGHZ 电路\n\n正如我们将在本章后面探讨的那样，GHZ 态已被证明在量子密码学和量子拜占庭协定（共识）算法中很有用。\n\n### W\
  \ 态电路\n\nW 态电路是实现三个粒子纠缠的另一种方式。它与 GHZ 的区别在于：在 W 态中，如果三个量子比特中丢失一个，剩余的两个将保持纠缠。而 GHZ\
  \ 不具备此性质。该电路如图 9-7 所示。\n\n![](img/515270_1_En_9_Fig7_HTML.png)\n\n一个 W 态电路包含 3 个量子比特、一个\
  \ R y 门、一个受控哈达玛门、两个 CNOT 门，以及一个 x 门。\n\n图 9-7\n\nW 态电路\n\n正如我们将在本章后面看到的，W 态电路在领导者选举算法中有应用。\n\
  \n## 量子算法\n\n我们知道，算法是用于解决问题的指令集。在这方面，量子算法与之相同；然而，它们在量子设备上运行，并且包含至少一个量子操作，例如叠加或纠缠操作。换句话说，量子算法与经典算法在本质上是相同的，都是一组用于解决问题的指令，但它包含用于创建叠加和纠缠的指令。\n\
  \n著名的量子算法包括多伊奇-乔萨黑盒求解算法、肖尔的离散对数问题和因数分解算法，以及格罗弗搜索算法。量子算法动物园网站维护着一个目录——[`https://quantumalgorithmzoo.org`](https://quantumalgorithmzoo.org)。\n\
  \n量子算法主要分为三类：量子搜索算法、基于量子傅里叶变换的算法和量子模拟算法。\n\n\n\n## 量子计算复杂度\n\n在计算机科学中，我们习惯于分析算法，以了解运行算法所需的资源。这种分析从两个角度审视算法：算法运行所需的步数（时间复杂度）以及它将消耗多少内存或“工作空间”（空间复杂度）。\n\
  \n为了描述和分类算法的时间与空间复杂度，我们使用大 O 符号（`Big O`）。这种分类特别基于研究算法运行时间或空间需求随输入规模增长的方式。图 9-8 展示了一张图表，直观地说明了问题类别在复杂度方面的表现。\n\
  \n![](img/515270_1_En_9_Fig8_HTML.png)\n\n一张图绘制了`O(2^n)`指数级、`O(n³)`立方级、`O(n²)`平方级、`O(n)`线性、`O(log\
  \ n)`对数、`O(√n)`次线性和`O(1)`常数。\n\n**图 9-8** 大 O 复杂度图\n\n常见的大 O 复杂度阶次在表 9-1 中描述。\n\n\
  **表 9-1** 大 O 复杂度阶次\n\n| 名称 | 大 O 符号 | 示例 |\n| --- | --- | --- |\n| 常数时间 | `O(1)`\
  \ | 判断一个数是奇数还是偶数 |\n| 对数 | `O(log n)` | 二分查找 |\n| 次线性（平方根） | `O(√n)` |  |\n| 线性\
  \ | `O(n)` | 线性查找 |\n| 平方 | `O(n²)` | 插入排序 |\n| 立方 | `O(n³)` | `n × n`矩阵的简单乘法 |\n\
  | 指数 | `O(2^n)` | 递归斐波那契 |\n\n算法是包含特定指令集以解决计算问题的方法。计算复杂度是将不同问题归入合适类别的研究。自然地，这里需要根据解决问题所需的计算资源，将算法正式划分为不同类别。为此，引入了复杂度类（`complexity\
  \ classes`）的概念。\n\n随着量子计算的出现，新的复杂度类也涌现出来。量子计算机能够解决经典计算机无法解决的`NP`困难问题。\n\n存在多种复杂度类，我们对其描述如下。\n\
  \n### P – 多项式（Polynomial）\n\n多项式时间类（`P`）对在多项式时间内（即合理的时间内）可解的问题进行分类。\n\n### NP –\
  \ 非确定性多项式（Nondeterministic Polynomial）\n\n`NP`类意味着问题的解可以更快地被验证，即在多项式时间内完成。`P`类的一个例子是乘法，而因子分解属于`NP`类。例如，两个数的乘法属于`P`类，而因数分解（找出是哪两个数相乘）属于`NP`类。然而，如果解已存在，那么验证该解很快；因此它属于`NP`类。\n\
  \n`NP`完全（`NP-complete`）问题是那些同时属于`NP`类，且所有`NP`问题都可以“多项式时间”归约到该特定`NP`问题的问题。`NP`困难（`NP-hard`）问题是这样的：如果我们知道任何`NP`问题都可以归约到该特定（可能为`NP`类）问题，但我们并不确定该问题本身是否属于`NP`类。换句话说，`NP`完全问题是指任何`NP`问题都能归约到这些问题；而`NP`困难问题是指它们可以归约到`NP`类，但不确定它们是否属于`NP`类。`NP`完全问题的一个著名例子是旅行商问题（`travelling\
  \ salesman problem`）。\n\n### BPP – 有界误差概率多项式时间（Bounded Error Probabilistic Polynomial\
  \ Time）\n\n此类包含`P`类。这些问题在多项式时间内可解，且正确概率大于`½`。`BPP`中的问题要么在多项式时间内可确定性求解，要么以超过三分之二的概率被概率性地正确求解。\n\
  \n### BQP – 有界误差量子多项式时间（Bounded Error Quantum Polynomial Time）\n\n这个新类别随量子计算的出现而诞生。一个问题属于`BQP`，如果它能在量子计算机上以大于`½`的概率（即高概率）在多项式时间内被正确求解。换句话说，此类包含那些被认为对经典计算机困难，但对量子计算机容易的问题。\n\
  \n图 9-9 展示了复杂度类。\n\n![](img/515270_1_En_9_Fig9_HTML.png)\n\n复杂度类示意图。从最内层开始，各层依次为`NP\
  \ complete`、`NP`、`P`、`BPP`、`BQP`和`PSPACE`。\n\n**图 9-9** 复杂度类\n\n### PSPACE – 多项式空间（Polynomial\
  \ Space）\n\n此类关注内存利用，而非时间。`PSPACE`中的问题需要多项式大小的内存。\n\n还有一个随着量子计算而备受关注的概念是超计算（`hypercomputation`）。超计算的思想是，它甚至能解决图灵不完备（`Turing\
  \ incomplete`）的问题，例如停机问题（`halting problem`）。然而，已有研究表明，量子计算机可以比经典计算机快得多，但它并不能解决所有经典计算机无法解决的问题。其核心思想是，即使在量子计算机上，图灵不完备的问题也无法解决。尽管如此，关于无限状态叠加和无限状态图灵机的研究仍在继续，这有可能导致超计算机的构建。\n\
  \n至此，我们完成了对复杂度的讨论。\n\n## 其他量子系统\n\n随着量子计算的发展，利用量子特性的新系统将会涌现。我们对其进行如下讨论。\n\n### 量子网络（Quantum\
  \ Networks）\n\n量子网络与经典网络类似，具有相同的路由策略和拓扑结构。关键区别在于，节点可以执行量子计算和相关的量子过程。量子网络中量子设备之间的信道可以是量子的或经典的。\n\
  \n\n\n## 量子互联网\n\n正如 1969 年仅拥有四个节点的 ARPANET 演变为如今承载着数十亿实体^(⁶)的互联网，人们预期小规模的实验性量子网络将成为未来的量子互联网。\n\
  \n可以预见，我们将构建一个量子网络基础设施，用于互联远程量子设备并实现它们之间的量子通信。量子互联网遵循量子力学定律，负责传输量子比特并分发纠缠量子态。随着量子互联网中节点数量的增长，其量子能力也随之增强。这是因为，当网络中量子设备的数量与量子比特数呈线性增长时，量子互联网能够实现指数级的量子加速，从而形成一个能够解决以往无法解决难题的\"\
  虚拟量子计算机\"。\n\n经典网络中存在的传统操作，如长期数据存储、数据复制（拷贝）和直接状态读取，在量子网络中不再适用：\n\n*   长期数据存储不可能实现，因为量子世界中的退相干现象会迅速破坏信息，使得依赖量子存储器/存储变得非常困难。\n\
  *   由于不可克隆定理禁止复制未知的量子比特，量子世界中的数据复制无法实现。这意味着用于提高网络韧性的常规机制（例如重传）不再适用。但请注意，不可克隆定理是安全通信的一个宝贵特性。\n\
  *   读取量子状态充满挑战，因为任何量子比特在被测量时都会立即坍缩为经典的单一状态（0 或 1）。由于读取量子状态的不确定性以及不可克隆定理，量子比特的直接传输仅限于极少数短距离的特定场景。\n\
  \n然而，可以利用量子隐形传态来传输量子比特。量子隐形传态是通过一种称为量子纠缠的特性来实现的，我们之前讨论过这一点。利用纠缠，可以将发送方处一个量子比特编码的量子态瞬间传输到接收方处存储的一个量子比特上。令人惊讶的是，这种传输无需物理转移发送方的量子比特。量子纠缠是量子互联网的核心使能技术。\n\
  \n量子互联网能够实现多种奇特的应用程序，例如盲量子计算、安全通信和无噪声通信。\n\n## 量子分布式系统 – 分布式量子计算\n\n随着量子互联网的出现，不难想象量子节点之间也会相互通信，以协作并采用分布式计算方法共同解决某些问题。这一发展将不可避免地导致分布式量子系统或分布式量子计算的出现。\n\
  \n我们可以考虑一种分层方法：最底层是由经典链路和量子链路组成的网络层。在其之上是一层运行着量子计算机的层级。再往上是本地和远程操作，包括本地量子操作和针对量子比特的远程操作。通过结合所有这些操作和底层的计算层，可以构想出一台虚拟量子计算机，它整合了所有量子比特，形成一个可扩展的虚拟量子计算机。然后需要一个控制器或分布式量子编译器，将量子算法翻译成一系列本地和远程操作。最后是最顶层，用于运行量子算法。这种分层方法可参见图\
  \ 9-10。\n\n![](img/515270_1_En_9_Fig10_HTML.jpg)\n\n一个区块链生态系统包含 6 层：量子算法、分布式编译器、虚拟处理器、操作、量子计算机和网络。\n\
  \n**图 9-10** 一个抽象的量子区块链生态系统\n\n## 量子区块链\n\n随着量子互联网和量子分布式系统的出现，我们不可避免地可以构想出一种量子区块链，它利用量子计算机作为节点，并将底层的量子互联网作为通信层。\n\
  \n在量子世界中，区块链有两个方面。第一个是运行在量子互联网之上的纯量子区块链。在这方面已经取得了一些进展，Rajan 和 Visser 提出了一项创新方案，将区块链编码到一个时间纠缠\
  \ GHZ 态中。\n\n另一个方面是后量子世界中经典区块链的存在性。由于能够破解经典密码学，量子计算机可能对区块链的安全性和共识机制产生不利影响。本章最后一节将对此进行更多讨论。\n\
  \n一个量子区块链可以包含多个元素。量子区块链可以同时拥有经典和量子的通道及设备。在上一节讨论的分布式量子计算生态系统中，它可以作为\"分布式量子算法\"层中的一种量子算法（以及其他算法）而存在。\n\
  \n我们在上一节详细阐述了一种分层方法。我们可以设想区块链和其他算法运行在最顶层。整个分层方法代表了基于量子互联网的分布式量子计算生态系统。\n\n另一个元素可能是量子交易协调器，负责交易的排序和分发。另一方面，通过使用盲量子计算，量子区块链可以立即实现无与伦比的隐私性，这将使需要隐私保护的量子级区块链应用成为可能，例如金融、医疗和政府相关的应用。\n\
  \n\n\n### 量子密码学\n\n量子密码学确实是量子计算中最受关注的方面，尤其是从它对现有密码学可能产生的影响来看。这里有两个维度：一个是量子密码学，另一个是后量子密码学。\n\
  \n量子密码学指基于量子力学特性的密码学原语或技术。例如，量子密钥分发、量子抛币和量子承诺。利用量子特性，可以开发出一种新型的无条件安全机制，这在经典世界中是绝无仅有的。量子密钥分发（QKD）协议，例如\
  \ `BB84`，由 Bennett 和 Brassard 于 1984 年提出，允许双方使用量子比特安全地构建私钥。这种量子方案的优势在于，由于叠加原理，任何试图窃听的敌手都必然会被检测到。\n\
  \n量子密码学研究的另一个维度是量子计算机对经典密码学的影响。我们知道，利用肖尔算法，离散对数问题可以得到解决，整数分解速度可以加快，这可能导致常用的公钥密码学方案（如\
  \ `RSA` 和椭圆曲线密码学）被破解。预计对对称密码学的影响不会太大，因为只需增加密钥长度，即可确保经典世界中的穷举搜索 `*O*(*n*)` 以及利用格罗弗算法或类似算法通过量子技术实现的\
  \ `O(\\sqrt{n})` 搜索不再有效。\n\n后量子密码学方面已经研究了几种方法，包括基于格的密码学、基于编码的密码学、多元密码学、基于哈希的密码学和基于同源的密码学。\n\
  \n由于区块链的共识机制使用了已知会受到量子计算影响的密码学，因此今天产生的区块必须具备抗量子能力至关重要，这样当量子计算机具备能力时，它们也无法重写整个区块链的历史。例如，比特币使用了数字签名方案\
  \ `ECDSA`，量子计算机可以破解该方案。即使量子技术在十年内才具备破解 `ECDSA` 的能力，它们仍然可以由于 `ECDSA` 被破解而转移资金。因此，需要解决这个问题，并为已经产生和未来的区块施加一些抗量子能力。如果未来量子技术具备破解\
  \ `ECDSA` 的能力，敌手就无法重写区块历史。比特币通常并不具备量子安全性，而 Lamport 签名已被提出以缓解此问题。请注意，在可预见的未来，比特币是安全的，而破解\
  \ ECC 所需的量子计算机仍需数十年才能实现。要在一小时内破解 256 位 ECC 加密，需要 317 × 10⁶ 个物理量子比特⁷。然而，目前我们拥有的最多量子比特数仅为\
  \ 127，搭载于 IBM 的 127 量子比特 Eagle 处理器上。因此，破解椭圆曲线密码学在短期内不会成为现实。\n\n到目前为止，我们已经讨论了什么是量子计算以及它对经典计算可能产生的影响。我们还介绍了一些量子计算的应用以及相关的技术细节，如量子门和量子电路。有一点是明确的：量子计算将很快彻底改变世界，并且人们已经在投入巨大的努力来推动这项技术的发展并使其成为主流。\n\
  \n随着量子计算的这些革命性进步，一个自然的问题出现了：是否有可能利用这种力量并将其应用于解决分布式计算问题，特别是共识问题？我们能否使共识更快？能否以某种新颖的方式规避\
  \ FLP 不可能性？或者说 FLP 不可能性是否甚至适用于量子世界？对于拜占庭将军问题，是否存在量子解决方案？量子计算如何帮助分布式系统？它能提高其效率吗？量子共识能否容忍任意数量的不诚实方，并且无需遵循通常的下界？区块链能否从这一进步中受益，并改进区块链共识以及区块链的其他方面，例如密码学、安全性、效率和可扩展性？我们将在下一节回答这些问题。\n\
  \n\n\n## 量子共识\n\n量子共识驱动一个包含若干量子比特的量子网络，使其达到对称状态。此外，随着量子计算的出现，经典计算领域的问题正通过量子计算的视角进行研究，以探究利用量子能力能否对经典世界的现有算法做出改进。本书全篇所探讨的经典计算/网络领域的分布式共识就是这样一个问题。我们将研究量子分布式系统中的协定/共识，以及量子计算对经典分布式系统（尤其是共识部分）的影响。已有研究表明，当在量子框架下研究经典分布式共识问题时，不仅能够增强经典结果，还能解决经典网络中原本无法解决的问题。\n\
  \n同时，在量子网络中，许多情况下都需要达成协定；因此，针对量子网络和量子互联网的纯量子共识也是一个值得关注的领域。\n\n在本节中，我们将更侧重于增强经典结果，而不是研究纯量子共识（即让包含若干量子比特的量子网络达成共识，也就是达到对称状态）。与本书的共识研究更相关的是对经典结果的增强。\n\
  \n量子共识算法是一个非常活跃的研究领域。在这方面，已经出现了四大类别：\n\n- 对称状态共识\n- 基于纠缠的共识\n- 基于测量的共识\n- 基于量子密钥分发的共识\n\
  \n对称状态共识指的是量子网络中量子节点的任意状态收敛到一个共识对称状态。\n\n基于纠缠的共识与经典共识问题更为相关。这是因为经典共识问题已通过量子计算的视角进行了研究。其核心思想在于，量子特性可以增强经典共识，并能解决那些被认为在经典共识世界中无法解决的问题。\n\
  \n基于测量的共识基于这样一个前提：当对一个量子态进行测量时，它会坍缩成一个经典状态，即 0 或 1。这种机制在拥有量子节点但使用经典信道的量子混合网络中可能很有用。量子态保存在量子计算机中，而经典信道则用于通信以达成共识。其目标是允许混合量子-经典网络中的量子节点收敛到一个共同状态。\n\
  \n基于量子密钥分发的共识已被提出，用于解决多方节点之间在没有纠缠情况下的拜占庭协定问题。量子密钥分发的无条件安全性是此类共识的基础。\n\n在经典分布式系统中（包括许可型区块链），参与者本质上达成共识的速度很慢，这是因为使用像\
  \ PBFT、三阶段提交或 Paxos 之类的经典协议会产生很高的时间复杂度。通常，这些共识算法的时间复杂度是 `O(n²)`，即二次复杂度。通过使用量子计算，能否显著降低经典分布式/区块链共识的时间复杂度？简短的回答是：可以。Ben-Or\
  \ 和 Hassidim 提出了一种快速的量子拜占庭协定，能够在 `O(1)` 的时间复杂度内解决共识问题。\n\n在下一节中，我们将介绍文献中出现的一些共识和协定算法。这些算法由于利用了量子特性，显著改善了经典结果，或者为量子世界中的共识及相关问题提供了新颖的算法。\n\
  \n### 快速量子拜占庭协定\n\nMichael Ben-Or 和 Avinatan Hassidim 提出了快速量子拜占庭协定协议，该协议能在 `O(1)`\
  \ 个预期的通信轮次内达成协定。该论文给出了两个结果：\n\n- 一个用于同步共识的量子协议，该协议能容忍 `t < n/3` 个故障，并在预期的常数轮数内运行。攻击者是故障-停止型、自适应的、拥有全部信息且计算能力无限的。\n\
  - 一个用于同步拜占庭协定的量子协议，能在预期的常数轮数内容忍 `t < n/3` 个故障参与者。攻击者模型是自适应、拥有全部信息且计算能力无限的攻击者。\n\n\
  系统模型包含 `n` 个节点，每对节点之间通过一个独立的双向量子信道连接。该协议按轮次运行，每轮有两个阶段。在第一阶段，所有处理器发送和接收消息；第二阶段是计算阶段，节点在此阶段进行本地计算以处理接收到的消息，并决定发送哪些消息。\n\
  \n该协议满足以下条件：\n\n- **一致性**：所有非故障处理器以概率 1 决定相同的值。\n- **有效性**：决定的值是所有处理器的输入值。\n- **终止性**：所有非故障处理器以概率\
  \ 1 决定一个值。\n\n还记得我们在前面第 6 章讨论过的抛硬币随机化协议。特别是，我们讨论了 Ben-Or 的算法，其中使用抛硬币来达成协定。从根本上说，协定问题被简化为弱全局硬币抛掷。\n\
  \n在量子世界中，其思想是不通过经典方法获得弱全局硬币，而是使用量子技术来获得弱全局硬币。利用这种量子技术，如果满足 `n > 3*t` 的条件，可以在同步情况下在\
  \ `O(1)` 个预期轮次内容忍拜占庭故障。然而，如果 `n < 3*t`，共识仍然是不可能的，但改进之处在于轮次复杂度达到了 `O(1)`。\n\n在异步模型中，如果满足\
  \ `n > 3*t`，则存在量子算法；但如果 `n < 3*t`，则不可能达成。\n\n针对故障-停止型故障的协议工作原理如下：\n\n（`C` 代表一枚硬币，`L`\
  \ 代表一个领导者，状态为 GHZ 态。）\n\nGHZ 态为 `|GHZ⟩ = (1/√2)|000⟩ + (1/√2)|111⟩`\n\n每个进程 `P[i]`\
  \ 执行：\n\n**第 1 轮**\n\n1.  在 `n` 个量子比特上生成状态 `|C_i⟩ = (1/√2)|0,0,...0⟩ + (1/√2)|1,1,...1⟩`。\n\
  \    1.  将第 `k` 个量子比特发送给第 `k` 个参与者，自己保留一份。\n2.  在 `n` 个量子比特上生成状态 `|L_i⟩ = (1/n³)\
  \ Σ_{a=1}^{n³} |a,a,...a⟩`，这是数字 1 到 `n^(3/2)` 的等概率叠加。\n    1.  将 `n` 个量子比特分发给所有进程。\n\
  3.  接收来自所有进程的量子消息。\n\n**第 2 轮**\n\n1.  测量在第 1 轮中接收到的所有 `L[j]` 量子比特。\n2.  选择拥有最高领导者值的进程作为该轮的领导者。\n\
  3.  在标准基下测量领导者的硬币。\n4.  获取领导者硬币的测量结果，该结果作为全局硬币。\n\n使用这个算法，可以获得一个弱全局硬币。如果满足 `3*t\
  \ < n`，则任一共同结果出现的概率至少为 `1/3`。该协议适用于崩溃故障。\n\n该论文还提出了另一个用于拜占庭故障的协议，该协议在异步环境下能够容忍最多\
  \ `t < n/4` 个故障节点。\n\n\n\n## 如何反驳 FLP 不可能性\n\n[Louie Helm]提出了一个有趣的论断，即在异步环境下，即使存在故障，分布式共识也可以达成，这似乎与\
  \ FLP 不可能性相矛盾。\n\nHelm 提出了一种使用量子技术解决共识问题的协议。从高层来看，该协议的工作流程如下：\n\n- 纠缠的量子比特被分发给所有节点。\n\
  - 每个节点测量其量子比特。\n- 最后，由于测量，叠加的量子态会坍缩，从而达成共识。\n\n这是因为这里的量子纠缠保证了纠缠的量子比特会坍缩到相同的状态。这意味着所有节点最终会处于相同的状态，即达成一致。\n\
  \nGHZ 态被用来实现这一方案。这里的关键假设是，每个节点在设置阶段接收一个量子比特，然后稍后进行测量，这导致所有节点都得到相同的坍缩态。\n\n该算法的工作流程如下：\n\
  \n1.  通过纠缠一组`n`个量子比特来准备 GHZ 态。\n2.  将来自叠加量子比特集合中的单个量子比特分发给网络中的每个节点。此步骤在所有节点之间分发一个共享状态。\n\
  3.  每个节点测量其量子比特。注意，在此阶段尚未做出决定。\n4.  如果量子比特测量结果为`∣0⟩`，则选择 0。如果量子比特测量结果为`∣1⟩`，则选择\
  \ 1。这就是量子优势得以体现的地方。当在一个节点上进行测量时，其量子态会以相等的概率坍缩为`∣0⟩`或`∣1⟩`。此外，随着第一个节点完成测量，所有其他节点的状态也会同时且瞬时地坍缩到与第一个进行测量的节点完全相同的值。由于量子纠缠以及量子比特之间的强相关性，这是可能的。现在，由于所有节点都拥有完全相同的值，该方案就实现了共识。\n\
  \n达成一致很简单，因为测量 GHZ 态中的任何一个全纠缠量子比特，都会导致同一 GHZ 态中的所有其他量子比特坍缩到相同的基态。有效性得以实现，是因为当在第一个节点上进行测量时，它实际上是在提议一个`∣0⟩`或`∣1⟩`。\n\
  \n这个协议可以容忍网络延迟，因为即使一个量子比特晚到某个量子节点，其他节点也会继续工作，不受任何影响。同样是由于纠缠，当迟到的量子比特在任何时刻到达时，它已经包含了达成一致的值。使用此算法可以反驳\
  \ FLP 的根本原因在于，它只需要单向广播，而不需要经典的回复。即使单个进程没有测量其量子比特，也不会影响计算的总体结果，也就是说，即使那次单独的测量不可用，其他正确的节点也会继续运行，即使缺少了一个量子比特。如果初始\
  \ GHZ 态的分发成功完成，该算法就能正常工作。一旦完成，缺失的测量将不会影响此后的协议。在面对拜占庭故障时，该算法也具有弹性。任何恶意方都无法篡改算法最终选择的值。这是因为任何测量都不会影响系统中其他量子比特的相关性。这意味着任何对手测量量子比特都无法影响最终选定的值。由于量子特性，量子比特最终总是会变为\
  \ 0 或 1。这始终意味着，无论是否存在拜占庭故障，最终都会做出决定。这保证了终止性。\n\n### 增强型分布式共识\n\nSeet 和 Griffin 提出了量子计算如何加速分布式网络中的共识达成。他们提出了一种新颖的量子共识机制。该论文中介绍的工作侧重于分布式共识的可扩展性和速度。\n\
  \n通过消除对多播回复的需求，实现了共识的速度和可扩展性。此外，利用量子特性，确保了只需要一次多播。达成共识的关键思想是聚合接收到的量子比特（来自其他节点）和量子节点本地量子比特的波函数。\n\
  \n该方案的工作流程如下：\n\n- 网络由量子计算机、通信通道和经典计算机构成。通道可以是量子到量子、经典到量子以及经典计算机之间的。\n- 每台量子计算机都与一台用于数据存储和检索的经典计算机相连。\n\
  - 一台量子计算机为每个量子比特创建一个纠缠的量子比特。\n- 将副本发送给系统中的其他节点。\n- 通过每个量子比特波函数的总和来确定共识。\n- 可以直接从量子计算机内部测量量子比特，以计算每个量子比特的波函数。其核心思想基于这样的假设：每个量子比特的波函数应该彼此相似。这里，期望获得的值应该相互一致。\n\
  - 依靠量子叠加，这些量子比特的波函数是一个标量倍数，即 `nψ`，其中 `n` 是参与共识的节点数量。\n- 这里的技术是确定理想系统状态波函数与实际系统状态波函数之间的差值。\n\
  - 如果参与共识的所有量子节点都具有一致的状态，那么随机选择的结果将与任何其他节点的状态一致。这可以与实际的系统状态波函数进行比较。\n- 如果所有量子节点上存在相同的状态，那么每个单独节点的波函数就是系统状态波函数的一个标量倍数。此时波函数输出为零。\n\
  - 如果某个节点上存在任何不同的状态，那么该节点的波函数将不会是整个系统状态函数的标量倍数。因此，系统状态波函数与节点状态波函数之间的差值不为零，这表明存在差异。随着节点状态与系统状态之间差异的增大，差值也会增大。如果差值不低于某个特定阈值，则可以确定容错水平。这可能是总系统的一个百分比，与经典的\
  \ BFT 一致，在经典 BFT 中，网络中大约有 33%的节点可能发生故障。这里也可以应用类似的阈值，尽管尚未得到证实。\n- 共识算法将一个随机选择的波函数乘以系统中的节点数量。\n\
  - 然后减去系统中每个量子比特波函数的总和。\n- 如果所有波函数都相同，则预期结果为零，表示系统一致。否则，系统不一致。差值越大，系统越不一致。\n\n在该论文中，该算法被扩展到多量子比特系统。此外，与经典模型相比，实现了若干改进，例如将状态验证的时间复杂度降低了一半。这是通过利用纠缠实现的，验证者只需要接收纠缠的量子比特，之后便可在本地通过比较所有量子比特的状态来完成验证。这与经典的、高复杂度的请求-响应式消息传递形成对比，后者会增加时间和通信复杂度。凭借量子特性，这种复杂度得以降低，并且与经典共识相比，可以在一半的时间内达成共识。这种效率提升可以应用于区块链，以提高其可扩展性。此外，任何单独篡改原始状态和发送状态的企图，都会由于纠缠而被立即检测到，从而提高了系统的安全性。该论文还提出了若干针对可扩展性、隐私和性能的增强措施，以应对区块链的三难困境。\n\
  \n\n\n#### 量子领导者选举与共识\n\nEllie D'Hondt 和 Prakash Panangaden 提出了一种量子解决方案，用于在量子网络中实现完全正确的领导者选举，这在经典世界中被认为是困难的。\n\
  \n为了利用量子特性选举领导者，他们提出了使用 W 态。在匿名网络中，如果量子节点共享 W 态，则领导者选举问题可以轻松解决。\n\n回想一下我们之前讨论过的\
  \ W 态。例如，三个量子比特的纠缠 W 态如下：\n\n![$$ \\mid W\\Big\\rangle =\\frac{1}{\\sqrt{3}}\\ \\\
  left(001\\Big\\rangle +|010\\Big\\rangle +|100\\ \\Big\\rangle \\right) $$](img/515270_1_En_9_Chapter_TeX_Equb.png)\n\
  \n这被用作一种打破对称性的量子资源。那么，针对每个进程 *i* 的量子领导者选举算法就非常简单：\n\n```\nq = 来自纠缠 W 态的第 i 个量子比特，即来自量子进程\
  \ i\n初始化 b = 0 且 result = wait\nb = 对 q 进行测量\n如果 b = 1，则 result = leader，否则 result\
  \ = follower\n```\n\n该协议的时间复杂度为 `O(1)`，即常数时间，并且不需要传递任何消息。这与经典世界中通常需要多轮、高复杂度协议的现状形成了鲜明对比。该量子协议也适用于异步网络。\n\
  \n此外，还提出了一种简单的共识算法。领导者选举基于打破对称性；然而，该算法依赖于保持对称性。\n\n其核心思想是，为了在匿名量子分布式系统中实现完全正确的共识（每个进程初始拥有一个量子比特），需要将这些处理器纠缠成一个`GHZ`态。研究表明，这不仅是必要条件，也是充分条件。\n\
  \n该协议的核心思想是在参与共识的所有节点之间共享`GHZ`纠缠态。这使得可以在一步之内创建对称性。\n\n三个量子比特的`GHZ`态如下所示：\n\n![$$\
  \ \\mid GHZ\\Big\\rangle =\\frac{\\left(|000\\Big\\rangle +|111\\Big\\rangle \\\
  right)}{\\surd 2} $$](img/515270_1_En_9_Chapter_TeX_Equc.png)\n\n每个进程 *i* 运行：\n\n\
  ```\nq = 在 n 个进程中，GHZ 态的第 i 个量子比特\nresult = wait\nresult = 测量 q\n```\n\n同样，该协议的时间复杂度为\
  \ `O(1)`，并且无需传递消息。该协议适用于不同的通信拓扑结构和异步环境。\n\n论文中的结果表明，`GHZ` 对于共识是必要且充分的。此外，`W` 对于领导者选举是必要且充分的。\n\
  \n#### 其他算法\n\n还有大量其他的量子共识算法和相关提案。这里无法详尽地一一介绍；不过，本节将总结其中一些突出的成果。\n\nLuca Mazzarella、Alain\
  \ Sarlette 和 Francesco Ticozzi 在《Consensus for Quantum Networks: From Symmetry to\
  \ Gossip Iterations》一文中，将经典的分布式计算问题扩展到了量子系统网络。他们提出了一个通用框架来研究量子世界中的共识问题。此外，文中还提出了一种量子八卦式算法。\n\
  \nGuodong Shi、Bo Li、Zibo Miao、Peter M. Dower 和 Matthew R. James 提出了《Reaching Agreement\
  \ in Quantum Hybrid Networks》一文。文中考虑的问题是将一个由持有量子比特的量子节点组成的量子混合网络驱动到一个共同状态，从而实现共识。其关键思想是量子节点测量量子比特，并通过经典通信链路交换测量结果。\n\
  \n研究表明，即使使用了量子通道，经典的拜占庭将军问题仍然无法解决。然而，利用量子特性可以解决拜占庭协议的一个变种，即**可检测的拜占庭协议**（`DBA`）。`DBA`\
  \ 协议确保要么所有将军都同意一个命令，要么都中止（即满足一致性）；并且如果所有将军都是忠诚的，他们能就一个命令达成一致（即满足有效性）。\n\nXin Sun、Piotr\
  \ Kulicki 和 Mirek Sopek 提出了《Multi-party Quantum Byzantine Agreement Without Entanglement》一文。通常，量子共识算法会使用纠缠特性。但这个算法与众不同，它并未使用纠缠。相反，该协议依赖于量子密钥分发及其无条件安全性。该协议依赖于半诚实的量子密钥分发器之间共享的相关数字序列。\n\
  \n还有其他一些提案引入了利用时间`GHZ`态的量子区块链概念。\n\n关于量子共识，有许多创新性的成果，研究人员也正在提出越来越多的进展。我们之前介绍了一些这样的成果。能够增强经典分布式共识结果的量子算法尤其重要，因为它们可能在不久的将来影响经典的分布式系统。其他纯粹的量子成果也非常吸引人，但只有在未来量子互联网和相关的量子生态系统成为现实时，它们才能完全发挥作用。\n\
  \n## 总结\n\n量子计算是一个庞大而深邃的领域，因此我们并未涵盖所有内容。尽管如此，本章应能让我们对量子计算及其如何惠及分布式系统和共识有一个良好的理解。摩尔定律几乎走到了尽头，因此我们可以用量子计算来重振它。在计算机科学领域，由于量子计算，出现了更多的复杂性类别。对于物理学家来说，其兴趣在于更深入地理解量子理论。\n\
  \n本章为我们提供了更深入思考的直觉，并为未来的研究和探索做好了准备。需要记住的要点是，量子共识机制在很大程度上利用了叠加和纠缠这两种量子特性。\n\n在下一章中，我们将总结本书提出的所有观点，以及一些新奇的想法和未来的研究方向。\n\
