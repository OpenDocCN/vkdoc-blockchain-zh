  \ 112 位。这有助于防止暴力破解攻击，事实上三重 `DES` 至今仍未被破解。然而，由于对性能缓慢和 64 位块大小的担忧，`NIST` 最终在 2001\
  \ 年用 `AES` 取代了 `DES`。\n\n分组密码有多种工作模式。这些模式使分组密码不仅能提供机密性，还能提供完整性和真实性。其中一些模式包括：\n\n\
  *   电子密码本模式（Electronic codebook mode）\n*   密码块链接模式（Cipher block chaining mode）\n\
  *   计数器模式（Counter mode）\n*   密码反馈（`CFB`）模式\n*   伽罗瓦/计数器模式（`GCM`）\n*   输出反馈（`OFB`）模式\n\
  \n我们这里只解释三种模式。\n\n##### 电子密码本\n\n电子密码本（`ECB`）是一种基本的操作模式，其中加密数据是对明文的每个块逐一应用加密算法的结果。\n\
  \n这种模式是最直接的，但我们不应该在实践中使用它，因为它是不安全的，并且可能会泄露信息。\n\n![](img/515270_1_En_2_Fig6_HTML.jpg)\n\
  \n密码本模式模型包含 3 个框，其元素如下：明文和密钥通过密码加密以获取密文。\n\n**图 2-6** 分组密码的电子密码本模式\n\n图 2-6 显示，我们将明文\
  \ `P` 作为输入提供给分组密码加密函数，并提供一个密钥，该函数输出密文 `C`。\n\n##### 密码块链接\n\n在密码块链接（`CBC`）模式下，每个明文块都与先前加密的块进行异或（XOR）运算。`CBC`\
