- "# 1. 引言\n\n在本章中，我们探索分布式计算的基础。首先，我们将回答关于分布式系统、其基本抽象、系统模型及相关概念的问题。\n\n\n\n### 分布式系统\n\
  \n在文献中，关于分布式系统有许多不同的定义。但归根结底，它们都指出一个事实：分布式系统是由多台计算机协同工作以解决某个问题的集合。\n\n该领域一些著名学者的定义如下：\n\
  \n> *一个分布式系统是这样的系统：一台你甚至不知道它存在的计算机发生故障，就能导致你的计算机无法使用。*\n> \n> ——莱斯利·兰波特\n> \n> [`https://lamport.azurewebsites.net/pubs/distributed-system.txt`](https://lamport.azurewebsites.net/pubs/distributed-system.txt)\n\
  \n> *分布式系统是一组自治计算元素的集合，这些元素在用户看来就像一个单一的、连贯一致的系统。*\n> \n> ——塔能鲍姆\n> \n> [`www.distributed-systems.net/index.php/books/ds3/`](http://www.distributed-systems.net/index.php/books/ds3/)\n\
  \n以下是我自己的尝试！\n\n分布式系统是一组自治计算机的集合，它们通过消息传递网络相互协作，以实现共同的目标。\n\n通常，这个问题无法由单台计算机解决，或者分布式系统本身就具有分布性，例如社交媒体应用。\n\
  \n分布式系统的一些日常示例包括 Google、Facebook、Twitter、Amazon 以及万维网。另一类近期出现且流行的分布式系统是区块链或分布式账本，我们将在第\
  \ 4 章中介绍。\n\n在本章中，我们将奠定基础，从总体上审视分布式系统，了解其特性与属性、构建动机，以及有助于推断分布式系统属性的系统模型。\n\n虽然分布式系统可能相当复杂，并且通常需要处理许多设计方面的问题，包括进程设计、消息（进程间的交互）、性能、安全性和事件管理，但一个核心问题是共识。\n\
  \n`共识`是分布式系统中的一个基本问题，即尽管系统中存在某些故障，分布式系统内的进程始终能就系统的状态达成一致。我们将在第 3 章中对此进行更深入的探讨。\n\
  \n在第一章中，我们将为分布式系统奠定基础，并建立关于它们是什么以及如何工作的直观认识。之后，我们将涵盖密码学、区块链和共识，这些将为我们打下坚实基础，以便继续学习后续章节，涵盖更深入的主题，例如共识协议、设计与实现，以及关于量子共识的一些最新研究。\n\
  \n但首先，让我们更仔细地审视分布式系统的基础，并讨论分布式系统具有哪些特性。\n\n### 特性\n\n是什么让一个系统成为分布式系统？以下是一些基本属性：\n\
  \n1.  无全局物理时钟\n2.  自治处理器/独立处理器/独立容错\n3.  无全局共享公共内存\n4.  异构性\n5.  连贯一致性\n6.  并发性/并发操作\n\
  \n无全局物理时钟意味着系统本质上具有异步性。分布式系统中的计算机或节点是独立的，拥有自己的内存、处理器和操作系统。这些系统没有一个全局共享的时钟作为整个系统的时间源，这使得时间概念在分布式系统中变得棘手，我们稍后将看到如何克服这一限制。没有全局共享内存这一事实意味着，进程之间进行通信的唯一方式是通过信道或链路消耗通过网络发送的消息。\n\
  \n分布式系统中的所有进程、计算机或节点都是独立的，拥有自己的操作系统、内存和处理器。分布式系统中没有全局共享内存，这意味着每个处理器都有自己的内存、对自己状态的独立视图，并且除非收到来自其他节点的消息并增加了该节点的本地知识，否则其本地知识是有限的。\n\
  \n分布式系统通常是异构的，包含多种采用不同架构和处理器的不同类型的计算机。这样的设置可以包括商用计算机、高端服务器、物联网设备、移动设备，以及几乎任何运行分布式算法以解决分布式系统所设计的共同问题（实现共同目标）的设备或“物品”。\n\
  \n分布式系统也具有连贯一致性。这一特性抽象掉了分布式系统分散结构的所有细微细节，对最终用户而言，它呈现为一个单一、内聚的系统。这个概念被称为分布透明性。\n\n\
  分布式系统中的并发性涉及这样一个要求：分布式算法应在分布式系统的所有处理器上并发运行。\n\n图 1-1 展示了一个通用的分布式系统模型。\n\n![](img/515270_1_En_1_Fig1_HTML.jpg)\n\
  \n*一个包含 5 台互联计算机的分布式系统示意图。每台计算机包含一个内存、一个处理器和一个操作系统。*\n\n图 1-1：一个分布式系统\n\n我们构建分布式系统有若干原因。最常见的原因是**可扩展性**。例如，假设你有一台服务器每天为\
  \ 100 个用户提供服务；当用户数量增长时，通常的方法是**垂直扩展**，即通过添加更强大的硬件（例如更快的 CPU、更多的 RAM、更大的硬盘等），但在某些情况下，垂直扩展存在极限，此时你必须**水平扩展**，即添加更多计算机并以某种方式在它们之间分配负载。\n\
  \n### 为何构建分布式系统\n\n下面，我们介绍构建分布式系统背后的一些动机：\n\n*   可靠性\n*   性能\n*   资源共享\n*   固有的分布性\n\
  \n让我们逐一审视这些原因。\n\n#### 可靠性\n\n**可靠性**是分布式系统的一个关键优势。想象一下，如果你只有一台计算机。那么，当它发生故障时，别无选择，只能重启它，或者在出现重大故障时更换一台新的。然而，在分布式系统中，系统内存在多个节点，这使得分布式系统能够在一定程度上容忍故障。因此，即使分布式网络中的某些计算机发生故障，分布式系统也能继续运行。**可靠性**是分布式计算领域重要的研究和学习方向之一，稍后我们将在**容错性**的背景下更详细地探讨它。\n\
  \n可靠性包含多个方面，包括**可用性**、**完整性**和**容错性**：\n\n*   **可用性** 简单来说，就是当客户端发出请求时，分布式系统应始终保持可用。\n\
  *   **完整性** 确保分布式系统的状态始终处于稳定且一致的状态。\n*   **容错性** 使得分布式系统即使在发生某些故障的情况下也能正常运行。\n\n\
  #### 性能\n\n在分布式系统中，可以自然地实现更好的**性能**。例如，在一个协同工作的计算机集群中，可以通过**并行化**计算来获得更好的性能。此外，在地理上分散的分布式网络中，访问节点的客户端（用户）可以从地理位置更近的节点获取数据，从而实现更快速的数据访问。例如，在互联网文件下载场景中，距离你地理区域更近的镜像站点将比可能位于其他大洲的站点提供快得多的下载速度。\n\
  \n分布式系统的性能通常包含两个方面：**响应性**和**吞吐量**。\n\n##### 响应性\n\n该属性保证系统具有合理的响应速度，用户能够从分布式系统获得足够的响应。\n\
  \n\n\n#### 吞吐量\n\n分布式系统的`吞吐量`是衡量其性能的另一个指标。`吞吐量`主要衡量系统处理数据的速度；通常以每秒事务数来衡量。正如我们将在第\
  \ 5 章中看到的，在区块链系统（分布式账本）中，高每秒事务数是非常理想的。对于分布式数据库，常用每秒事务数或每秒执行的查询数来衡量系统性能。`吞吐量`受到分布式系统不同方面的影响，例如处理速度、通信网络质量、速度和可靠性，以及算法。如果你的硬件很好，但算法设计得不好，这也会影响`吞吐量`、响应能力和系统的整体性能。\n\
  \n#### 资源共享\n\n分布式系统中的资源可以与其他节点/参与者共享。有时，存在一些昂贵的资源，例如超级计算机、量子计算机或某些工业级打印机，这些资源在每个站点都配备的成本过高；在这种情况下，可以通过通信链路远程共享给其他节点。另一种场景是将数据划分为多个分区（分片）以实现快速访问。\n\
  \n#### 固有分布性\n\n在某些场景下，除了构建分布式系统外别无选择，因为只有分布式系统才能解决问题。例如，消息系统本质上就是分布式的。移动网络本质上也是分布式的。在这些以及类似的应用场景中，分布式系统是唯一能够解决问题的方案；因此，系统在设计中就必须是分布式的。\n\
  \n尽管分布式系统拥有所有这些优点，但在构建时也存在一些需要解决的挑战。分布式系统的特性，例如无法访问全局时钟、异步性以及部分故障，使得设计可靠的分布式系统成为一项艰巨的任务。在下一节中，我们将探讨构建分布式系统时应解决的一些主要挑战。\n\
  \n## 挑战\n\n分布式系统很难构建。在设计分布式系统时，需要应对多种挑战。以下列举了一些常见的挑战。\n\n###### 容错性\n\n随着计算机数量的增加，有时数据中心里有数十万台计算机（例如在云计算中），不可避免地，某个地方会出故障。换句话说，分布式系统中某个部分（无论是网线、处理器还是其他硬件）发生故障的概率会随着计算机数量的增加而增加。分布式系统的这一特性要求，即使系统的某些部分发生故障（通常在某个阈值内），整个分布式系统也必须持续运行。为此，在分布式计算的容错性领域内，有许多问题被研究。容错共识就是一个例子，人们努力构建共识算法，使其即使在分布式系统中存在一定数量的故障节点或链路时，也能继续按规范正确运行。我们将在第\
  \ 3 章中看到更多细节。\n\n一个相关的研究领域是`故障检测`，它涉及开发尝试检测分布式系统中故障的算法。这在异步分布式系统中尤其值得关注，因为此类系统中消息传递时间没有上限。当无法区分是节点故障、节点速度慢还是链路丢包时，问题就变得更加棘手。故障检测算法会给出关于进程故障的概率性指示。节点的这种可用或不可用状态随后可用于处理该故障。\n\
  \n另一个研究领域是`副本`，它基于以下原理提供容错性：如果同一数据在分布式系统的多个节点上复制，那么即使某些节点宕机，数据仍然可用，这有助于保持系统稳定，继续满足其规范（保证），并保持对最终用户的可用性。我们将在第\
  \ 3 章中了解更多关于副本的内容。\n\n#### 安全性\n\n由于分布式系统有多个用户使用，其中可能包含恶意用户，其安全性便成为了首要关注点。在地理上分散的分布式系统和开放系统（例如比特币区块链）中，这种情况更为严峻。为此，用于提供分布式系统安全性的基础科学是密码学，我们将在第\
  \ 2 章中详细讨论，并且会在本书中反复提及，特别是与区块链共识相关的内容。在这里，我们将学习诸如密码学之类的主题，并解决认证、保密性、访问控制、不可否认性和数据完整性等挑战。\n\
  \n### 异构性\n\n分布式系统不一定由完全相同的硬件节点组成。有可能（这种情况被称为同构分布式系统）存在，但通常硬件和操作系统各不相同。在这种场景下，不同的操作系统和硬件可能表现各异，导致同步复杂化。某些节点可能很慢，运行着可能包含缺陷的不同操作系统；有些节点由于硬件更好而运行更快；有些节点可能像移动设备或物联网设备那样资源受限。面对分布式系统中所有这些不同类型的节点（进程、计算机），构建一个能在所有这些不同类型的系统上正确运行，并且尽管节点本地运行环境存在差异仍能继续正确运行的分布式算法，就变得很有挑战性。\n\
  \n### 分布透明性\n\n分布式系统的目标之一是实现透明性。这意味着，无论分布式系统由多少台独立的计算机和外围设备构建而成，对最终用户来说，它都应该表现为一个单一的、连贯的系统。例如，一个电子商务网站在其分布式系统中可能有许多数据库服务器、防火墙、Web\
  \ 服务器、负载均衡器和许多其他元素，但所有这些都应该对最终用户抽象隐藏。最终用户不一定关心这些后台的“无关”细节，只关心当他们发出请求时系统能够响应。总之，如果一个分布式系统尽管其异构和分散的结构，但其行为符合最终用户的期望，那么它就是连贯的。例如，思考一下`IPFS`，一个分布式文件系统。尽管文件在`IPFS`网络中的多台计算机上分布和分片存储，但对最终用户来说，所有这些细节都是透明的，他们操作起来几乎就像在使用本地文件系统。对于在线电子邮件平台和云存储服务等其他系统，也可以观察到类似的情况。\n\
  \n### 时序与同步\n\n同步是确保分布式系统全局状态稳定的关键操作。由于每个进程根据其内部物理时钟（可能产生漂移）拥有自己的时间视图，时间同步便成为设计分布式系统时需要解决的基本问题之一。我们将在本章关于`时序`、`顺序`和`时钟`的部分中，进一步探讨这个有趣的问题并研究一些解决方案。\n\
  \n\n### 全局状态\n\n由于分布式系统中的各个进程仅了解自身的局部状态，确定系统的全局状态便成为一项巨大挑战。有多种算法可用于实现此目标，例如 Chandy-Lamport\
  \ 算法。我们稍后将简要介绍该算法。\n\n#### 并发\n\n并发是指多个进程同时运行。此外，在逻辑并发与物理并发之间也存在区别。逻辑并发指的是多个程序在单个处理器上以交错方式执行的情况。物理并发则是指同一程序中的程序单元在两个或更多处理器上同时执行。\n\
  \n分布式系统无处不在。它们已融入日常使用，并成为我们社会日常生活的一部分。无论是互联网、万维网、比特币、以太坊、谷歌、脸书还是推特，分布式系统如今已成为我们日常生活的一部分。分布式系统的核心是分布式算法，这些算法构成了分布式系统所执行处理的基础。每个进程都运行着相同的算法副本，该算法旨在解决开发分布式系统所要应对的问题，因此称为分布式算法。\n\
  \n一个进程可以是一台计算机、一个物联网设备，或数据中心中的一个节点。我们将这些设备抽象化，并将其表示为进程，而物理上它们可以是任何物理计算机。\n\n现在让我们来看一些相关的技术和术语。\n\
  \n### 并行 vs. 分布式 vs. 并发\n\n并行系统与分布式系统的主要区别在于：并行系统的主要关注点是高性能，而分布式系统则侧重于容忍部分故障。此外，并行处理系统可直接访问共享内存，而在分布式系统中，所有处理器都有各自的本地内存。\n\
  \n表 1-1 对此进行了比较。\n\n表 1-1\n\n并行系统与分布式系统的对比\n\n| 资源/属性 | 并行 | 分布式 |\n| --- | ---\
  \ | --- |\n| 内存 | 共享内存，统一的地址空间 | 每个处理器拥有各自的内存 |\n| 耦合度 | 紧耦合 | 松耦合 |\n| 同步方式 | 通过全局共享时钟\
  \ | 通过同步算法 |\n| 目标 | 高性能 | 可扩展性 |\n| 算法类型 | 并发算法 | 分布式算法 |\n| 消息传递 | 无网络，使用共享内存\
  \ | 基于消息传递的网络 |\n\n在分布式计算中，有些概念存在重叠，初学者有时会感到难以理解。在下一节中，我将尝试澄清一些相关术语及可能存在的歧义。\n\n\
  ### 集中式 vs. 分散式 vs. 分布式\n\n集中式系统是一种典型的分布式系统，其中客户端连接到一个中央服务器或服务提供商。通常有一个管理员负责控制整个系统。一个典型的例子是标准的客户端-服务器架构，所有客户端向中央服务器发送请求并接收响应。这类系统通常更易于开发和维护。然而，它们不具备容错能力（在严格意义上，如果客户端-服务器模式中只有一个中央服务器）——如果中央服务器发生故障，客户端将无法连接并发出请求。\n\
  \n分散式系统是指系统中没有单一的中央所有者。相反，可以有多个位于不同地点的所有者分别监管系统的不同部分，或者像区块链系统那样没有任何控制器。\n\n与集中式和分散式系统相比，分布式系统可以被理解为一个系统中可能存在也可能不存在中央控制器，但资源和节点是分布式的。\n\
  \n图 1-2 展示了这三种系统的示意图。\n\n![](img/515270_1_En_1_Fig2_HTML.png)\n\n三个不规则的拓扑结构图，分别标注为集中式、分散式和分布式系统，包含各类节点。所有节点通过连接线彼此相连。\n\
  \n图 1-2\n\n集中式 vs. 分散式 vs. 分布式\n\n图 1-2 展示了集中式、分散式和分布式系统的传统视图。然而，近年来出现了一种略有不同的图示，它突出了存在中央控制器的系统和完全没有控制器（所有用户平等参与，不依赖任何受信任的第三方）的系统之间的区别。这类新型分布式系统就是区块链，尤其是公链，例如比特币区块链，其中没有中央控制器。我们将在第\
  \ 4 章以及后续章节中详细讨论区块链。不过，现在先来看图 1-3，该图展示了这种架构类型，并突出显示了从控制角度出发的差异。\n\n![](img/515270_1_En_1_Fig3_HTML.png)\n\
  \n五张结构图被分为集中式、分散式和分布式系统三类。每张结构图都有通过连接线彼此相连的各类节点。\n\n图 1-3\n\n集中式 vs. 分布式 vs. 分散式\n\
  \n请注意，在图 1-3 中，分布式系统和分散式系统的拓扑结构可能相同，但分布式系统中存在一个中央控制器（用图中顶部的手形符号表示）。然而，在分散式系统中，则没有出现手形符号，这表明不存在单一的中央控制器或权威机构。\n\
  \n到目前为止，我们主要关注分布式系统的架构，并对分布式系统的定义和内涵进行了大致探讨。现在，让我们来看分布式系统最重要的基本要素，即分布式算法——它使得分布式系统能够完成其预设功能。正是这种算法在分布式系统的每个节点上运行，以实现一个共同目标。例如，加密货币区块链中的一个共同目标是防止双重支付。处理这一逻辑的代码是运行在加密货币区块链每个节点上的分布式算法的一部分，通过集体协作，区块链（分布式系统）完成了防止双重支付这一任务（目标）。如果目前对这些术语感到困惑，不必担心；第\
  \ 4 章将会解释清楚。\n\n\n\n"
- '# 分布式算法


  分布式算法在多台计算机上并发运行，以在分布式系统中完成某项任务。在分布式系统中，同一算法在所有计算机上并发执行，以实现共同目标。


  与顺序算法（其中执行中的每个操作依次发生）相比，分布式算法是操作并发执行的算法。并发算法和并发性在计算中相当常见，例如，处理器中同时运行的多个线程、计算机中同时运行的多个应用程序、计算机中的多核处理器，或分布式系统中同时运行的多个进程。


  我们可以将分布式算法定义为在多台机器上并发运行的算法。


  分布式算法有若干优势，包括但不限于：与顺序算法相比，某些计算可以并行化以实现更高性能。此外，分布式算法具有容错能力；例如，如果一定阈值（我们将在第 3 章中解释）的节点发生故障，分布式算法仍能继续运行。


  存在消息传递算法，其中进程通过网络发送和接收消息进行通信。另一种类型是共享内存分布式算法，其中算法通过从共享内存中读写进行通信。


  集中式算法顺序执行，而分布式算法并发执行。集中式算法通常不以防故障为特性，而分布式算法则被设计为能容忍各种类型的故障。顺序算法通常更直观，因为它们是为顺序执行而设计的，而分布式算法可能难以理解。这也是集中式算法的正确性证明相对容易做到，并且在大多数情况下甚至通过观察就能显而易见的原因之一。但分布式算法并非如此，其正确性可能具有欺骗性。一个看似正确的算法在实践中可能无法正确运行，并且可能遭受各种故障和属性违反。为此，需要使用多种形式化规范和验证技术来确保分布式算法的正确性。我们将在第
  9 章中介绍其中一些方法。与顺序算法相比，分布式算法在设计、调试和实现上往往更具挑战性。此外，从复杂度度量的角度来看，顺序集中式算法通常以指令数量来衡量；然而，分布式算法的复杂度则以消息数量来衡量。


  '
- "# 分布式计算的要素/相关术语/概念\n\n分布式系统由若干要素组成。我们只关心系统的抽象视图，而不是具体的硬件或网络细节。抽象视图允许设计人员通过构建系统模型，在特定假设下设计和推理系统。稍后会详细说明，但首先让我们了解分布式系统的基本要素。\n\
  \n分布式系统可以表示为一个图，其中节点或进程用顶点表示，通信链路用边表示。图 1-4 展示了一些常见的拓扑结构。\n\n![](img/515270_1_En_1_Fig4_HTML.png)\n\
  \n一个六边形和一个正方形，每个顶点上有一个圆圈，分别标注为环形和团。一个带有分支的不规则结构标注为树。\n\n**图 1-4** 表示为图的分布式系统拓扑结构\n\
  \n分布式系统通常表示为由节点和顶点组成的图。节点代表网络中的进程，而顶点代表进程之间的通信链路。这些图还显示了网络的结构视图或拓扑，有助于可视化系统。\n\n\
  分布式系统可以有不同的拓扑结构，并且可以表示为图。常见的拓扑结构包括**环形**，它描述了一种每个节点有两个相邻节点的拓扑结构。**树**形结构是无环且连通的。**团**是一个全连接图，其中所有进程都直接相互连接。\n\
  \n其他要素\n\n*   进程\n    *   事件\n*   执行\n*   链路\n*   状态\n*   全局状态\n*   切割\n\n现在让我们详细了解一下它们。\n\
  \n### 进程\n\n分布式系统中的进程是执行分布式算法的计算机。它也被称为节点。它是一个自治的计算机，可以独立失效，并可以通过发送和接收消息与分布式网络中的其他节点通信。\n\
  \n### 事件\n\n事件可以定义为进程中发生的某个操作。进程中可能发生三种类型的事件：\n\n*   **内部事件**：当进程本地发生某些事情时发生。换句话说，进程执行的本地计算就是一个内部事件。\n\
  *   **消息发送**事件：当进程（节点）向其他节点发送消息时发生。\n*   **消息接收**事件：当进程（节点）接收消息时发生。\n\n图 1-5 所示示意图直观地展示了这一点。\n\
  \n![](img/515270_1_En_1_Fig5_HTML.jpg)\n\n一个包含 P、Q、R 三条线的示意图，具有本地事件、消息发送和消息接收等事件。一些事件通过时间相互连接。\n\
  \n**图 1-5** 三节点分布式系统中的事件和进程\n\n### 状态\n\n状态的概念在分布式系统中至关重要。你会在这本书以及其他关于分布式系统的文本中经常遇到这个术语，尤其是在分布式共识的上下文中。事件构成了节点的本地状态。换句话说，状态由节点中的事件（事件的结果）组成。或者我们可以说，作为事件结果的本地内存、存储和程序的内容构成了进程的状态。\n\
  \n### 全局状态\n\n分布式系统中所有进程和通信链路的状态集合称为**全局状态**。\n\n这也被称为配置，可以定义如下：\n\n分布式系统的配置由进程的状态和传输中的消息组成。\n\
  \n### 执行\n\n分布式系统中的执行是进程对分布式算法的一次运行或计算。有两种类型的执行：\n\n*   同步执行\n*   异步执行\n\n\n\n####\
  \ 切割（Cuts）\n\n切割可以定义为在时空图中连接每个进程线上单个时间点的一条线。时空图上的切割可以作为可视化分布式计算全局状态（在该切割处）的一种方式。同时，它也是可视化切割之前（即过去）和之后（即未来）发生的事件集合的一种方式。切割左侧的所有事件被视为**过去**，切割右侧的所有事件被称为**未来**。存在一致性切割和不一致性切割。如果在切割之前的已用时间内所有接收到的消息都已发送，即位于过去，则称为一致性切割。换句话说，遵循因果规则的切割就是一致性切割。不一致性切割是指消息从未来（切割右侧）跨越切割到达过去（切割左侧）的情况。\n\
  \n如果一条切割线从过去跨越到未来，则代表了传输中的消息的图形化表示。\n\n图 1-6 所示的示意图说明了这一概念，其中`C`[1]是一个不一致性切割，而`C`[2]是一个一致性切割。\n\
  \n![](img/515270_1_En_1_Fig6_HTML.jpg)\n\n一个包含 P、Q、R 三条线的示意图，列出了`E P 1`、`E P 2`等事件。所有事件被分组到标记为`C\
  \ 1`和`C 2`的两个切割中。\n\n**图 1-6**  \n描述分布式系统执行中切割的时空图\n\n诸如 Chandy-Lamport 快照算法之类的算法用于创建分布式系统的一致性切割。\n\
  \n对分布式系统进行快照有助于创建系统的全局图景。快照（或全局快照）捕获了系统的全局状态，包含系统中每个进程的本地状态和每个通信链路的独立状态。这种快照对于调试、检查点和监控非常有用。一个简单的解决方案是同步所有时钟并在特定时间创建快照，但精确的时钟同步是不可能的，我们可以利用因果关系来实现一个能够提供全局快照的算法。\n\
  \n假设无故障、单向 FIFO 通道，并且系统中任意两个进程之间存在通信路径，Chandy-Lamport 算法的工作方式如下：\n\n*   发起快照算法的发起进程执行以下操作：\n\
  \    *   记录自身状态\n    *   向所有进程发送一个标记消息（一个控制消息）\n    *   开始在其所有通道上记录传入的消息\n*   收到标记消息的进程执行以下操作：\n\
  \    *   如果是第一次看到此消息，则：\n        *   记录自身的本地状态\n        *   将该通道标记为空\n        *\
  \   向其所有通道上的所有进程发送一个标记\n        *   开始记录所有传入通道，除了之前已标记为空的那个通道\n    *   如果不是第一次：\n\
  \        *   停止记录\n*   当每个进程在其所有传入通道上都收到了标记消息时，快照即视为完成，算法终止。\n*   发起进程现在能够构建一个包含每个进程保存的状态以及所有消息的完整快照。\n\
  \n请注意，任何进程都可以发起快照，该算法不会干扰分布式系统的正常运行，并且每个进程都会记录传入通道及其自身的状态。\n\n### 分布式系统的类型\n\n从通信角度来看，有两种类型的分布式系统。共享内存系统是指所有节点都能直接访问共享内存的系统。另一方面，消息传递系统是指节点之间通过传递消息进行通信的系统。换句话说，节点使用通信链路发送和接收消息以彼此通信。\n\
  \n现在让我们讨论一下分布式系统的一些软件架构模型。软件架构模型描述了系统的设计和结构。软件架构回答了诸如涉及哪些元素以及它们如何相互交互等问题。分布式系统软件架构的核心焦点是进程，所有其他元素都围绕着它们构建。\n\
  \n### 软件架构模型\n\n有四种主要的软件架构类型，包括客户端-服务器模型、多服务器模型、代理服务器模型和对等网络模型。\n\n#### 客户端-服务器\n\
  \n这种模型是让两个进程协同工作的一种常见方式。一个进程承担客户端角色，另一个进程承担服务器角色。服务器接收客户端发出的请求并回复响应。可以有多个客户端进程，但只有一个服务器进程。例如，经典的\
  \ Web 客户端和 Web 服务器（浏览器到 Web 服务器）设计就遵循这种架构类型。图 1-7 描绘了这种架构的所谓物理视图。\n\n![](img/515270_1_En_1_Fig7_HTML.jpg)\n\
  \n一个服务器连接到 3 个客户端的示意图。请求从客户端发送到服务器，回复从服务器发送到客户端。\n\n**图 1-7**  \n客户端-服务器架构\n\n\n\
  \n#### 多服务器架构\n\n多服务器架构是指多台服务器协同工作的架构。在一种架构风格中，客户端-服务器模型中的服务器本身可以成为另一台服务器的客户端。例如，如果我通过网页浏览器向\
  \ Web 服务器发出请求，查询不同股票的价格，那么 Web 服务器可能会向后端数据库服务器发出请求，或者通过网络服务向其他服务器请求这些定价信息。在这种情况下，Web\
  \ 服务器本身就成了客户端。这种架构可以被视为多服务器架构。\n\n另一种非常常见的情景是多台服务器共同协作，为客户端提供服务，例如，多台数据库服务器为 Web\
  \ 服务器提供数据。实现这种协作式架构通常有两种方法。第一种是`数据分区`，另一种是`数据复制`。与`数据分区`密切相关的另一个术语是`数据分片`。\n\n`数据分区`指的是一种架构，其中数据分布在分布式系统的各个节点上，每个节点负责其数据分区（部分）。数据分区有助于实现更好的性能、更简便的管理、负载均衡和更高的可用性。例如，公司每个部门的数据可以分成多个分区，并分别存储在不同的本地服务器上。另一种理解方式是，如果我们有一个包含一百万行数据的大表，我可能会将其中五十万行放在一台服务器上，另外五十万行放在另一台服务器上。这种方案被称为`数据分片`或`水平分区`，或者根据分片方式的不同，被称为`水平分片`。\n\
  \n我们可以通过图 1-8 来形象地理解分区的概念。\n\n![](img/515270_1_En_1_Fig8_HTML.jpg)\n\n数据分区示意图。所有地区的公民数据库连接到位于伦敦、布拉德福德和蒙哥马利的地区办事处。\n\
  \n图 1-8\n\n数据分区\n\n请注意，图 1-8 所示的数据分区，是将一个大型中央数据库划分为与每个区域相关的较小数据集，然后由区域服务器管理该分区。然而，在另一种分区类型中，一个大表可以被分区成不同的表，但这些表仍位于同一台物理服务器上。这被称为逻辑分区。\n\
  \n分片是数据的水平分区，其中每个分片（片段）驻留在单独的服务器上。这种方法的一个直接好处是实现了负载均衡，从而在各服务器之间分散负载。这个概念如图 1-9 所示。\n\
  \n![](img/515270_1_En_1_Fig9_HTML.png)\n\n一组共 5 个表。顶部的一个表标题为“表”。两个表标题为“垂直分片”，两个标题为“水平分片”。\n\
  \n图 1-9\n\n分片\n\n`数据复制`指的是一种架构，其中分布式系统中的每个节点都保存着完全相同的数据副本。一个典型的简单例子是 RAID 0 系统；虽然它们不是独立的物理服务器，但数据会在两块磁盘之间进行复制，这就构成了数据复制（通常称为镜像）架构。在另一种场景中，数据库服务器可能会运行一个复制服务，将数据复制到多台服务器上。这种架构可以实现更好的性能、容错能力和更高的可用性。一种特定的复制类型以及分布式系统中的基本概念是状态机复制，它用于构建容错的分布式系统。我们将在第\
  \ 3 章中详细介绍。\n\n图 1-10 展示了多服务器架构，其中显示了客户端-服务器模型的一种变体。服务器可以作为另一台服务器的客户端。这是多台服务器紧密协作以提供服务的一种方法。\n\
  \n![](img/515270_1_En_1_Fig10_HTML.jpg)\n\n连接了服务器和一个客户端的示意图。底部另一个客户端发送请求并接收回复。\n\
  \n图 1-10\n\n多台服务器协同工作（客户端-服务器与多台服务器紧密协调/紧耦合服务器）\n\n另一个图，图 1-11，展示了数据复制的概念。\n\n![](img/515270_1_En_1_Fig11_HTML.jpg)\n\
  \n数据复制示意图。总部的公民数据库连接到地区办事处的 3 个公民数据库。\n\n图 1-11\n\n数据复制\n\n总之，复制是指在同一数据的副本保存在多个不同节点上的做法，而分区则是指将数据分割成更小的子集，然后将这些更小的子集分布到不同节点上的做法。\n\
  \n#### 代理服务器\n\n基于代理服务器的架构允许在客户端和后端服务器之间进行中介。代理服务器可以接收来自客户端的请求，并将其转发给后端服务器（最常见的是\
  \ Web 服务器）。此外，代理服务器可以解释客户端请求，并在处理后将其转发给服务器。这种处理可以包括对请求应用某些规则，例如通过移除客户端的 IP 地址来匿名化请求。从客户端的角度来看，使用代理服务器可以通过缓存来提高性能。这些服务器通常用于企业环境，在这些环境中，组织进出组织的所有\
  \ Web 流量都要应用公司策略和安全措施。例如，如果需要屏蔽某些网站，管理员可以使用代理服务器来实现：所有请求都经过代理服务器，任何对被屏蔽网站的请求都会被拦截、记录并忽略。\n\
  \n图 1-12 中的示意图展示了一种代理架构。\n\n![](img/515270_1_En_1_Fig12_HTML.jpg)\n\n一个示意图。客户端从代理服务器接收请求并发送其回复。代理服务器连接到另外\
  \ 2 台服务器。\n\n图 1-12\n\n代理架构 – 服务器与客户端之间的一个代理\n\n#### 点对点架构\n\n在点对点架构中，节点没有特定的客户端或服务器角色。它们具有同等的角色。没有单一的客户端或服务器。相反，每个节点可以根据情况扮演客户端或服务器的角色。所有节点都具有同等角色这一事实催生了“对等点”这个术语。\n\
  \n点对点架构如图 1-13 中的示意图所示。\n\n![](img/515270_1_En_1_Fig13_HTML.jpg)\n\n对等架构示意图。4 个对等点通过标记为“请求”和“回复”的箭头相互连接。\n\
  \n图 1-13\n\n点对点架构\n\n在某些场景下，也可能并非所有节点都具有同等角色；有些节点可能同时充当服务器和客户端。但总的来说，在点对点网络中，所有节点的角色通常是相同的。\n\
  \n现在我们已经介绍了一些分布式系统的架构风格，让我们将重点放在分布式系统更理论化的一面，即关注分布式系统的抽象视图。首先，我们来探讨分布式系统模型。\n\n\n\
  \n### 分布式系统模型\n\n系统模型使我们能够抽象地看待分布式系统。它捕获了关于分布式系统行为的假设。它使我们能够定义期望分布式系统具备的某些属性，并对其进行分析。这一切都在抽象层面进行，无需考虑任何技术或实现细节。例如，通信链路抽象仅捕获了这样一个事实：通道允许消息在进程之间传递/交换，而不指定其具体是什么。从实现角度来看，它可能是光纤电缆或电线。\n\
  \n在分布式系统模型中，我们不关心硬件技术实现的具体细节。例如，进程是一个执行某些事件的节点，我们无需关注确切的硬件或计算机类型。\n\n在本书中，我们感兴趣的是系统的抽象视图，而非物理基础设施。图\
  \ 1-14 演示了这一概念。\n\n![](img/515270_1_En_1_Fig14_HTML.png)\n\n两张示意图。左侧有从 P1 到 P11\
  \ 的互连组件。右侧，P1 到 P11 形成两条线性链，连接到一个网络。\n\n图 1-14\n\n物理架构（左）与抽象系统模型（右）\n\n现在让我们看看分布式系统中三个基本的抽象概念。故障是所有这些抽象概念的特征。我们捕获了关于系统中可能发生何种故障的假设。例如，在分布式系统中，进程或节点可能崩溃或恶意行为。网络可能丢弃消息，或者消息可能被延迟。消息延迟是通过时间假设来捕获的。\n\
  \n总而言之，在创建分布式系统模型时，我们会对系统的行为做出一些假设。这个过程包括关于进程和网络的时间假设。我们还对网络和处理器的故障做出假设，例如，进程可能如何失败，它是否可能表现出任意故障，攻击者如何影响处理器或网络，以及进程在崩溃后能否崩溃并恢复。网络链路是否可能丢弃消息？在下一节中，我们将详细讨论所有这些场景。\n\
  \n### 进程\n\n进程或节点是分布式系统中的基本元素，它运行分布式算法以实现该分布式系统被设计要达到的共同目标。\n\n现在想象一下一个进程在分布式系统中能做什么。首先，让我们思考一个正常场景。如果一个进程在没有发生任何故障的情况下按照算法运行，那么它被称为正确进程或诚实进程。因此，在我们的模型中，我们说节点正确运行是节点可能表现出的行为之一。还有什么？是的，当然，它可能会失败。如果一个节点失败，我们说它是故障节点；如果没有，那么它是非故障的、正确的或诚实的。\n\
  \n进程中可能发生不同类型的故障，例如：\n\n*   崩溃-停止\n*   遗漏\n*   崩溃后恢复\n*   窃听\n*   任意（拜占庭）\n\n####\
  \ 崩溃-停止故障\n\n崩溃-停止故障是指进程崩溃并且永远无法恢复。这种故障或节点行为模型捕获了不可修复的硬件故障，例如，主板短路导致故障。\n\n## 遗漏故障\n\
  \n遗漏故障捕获了处理器未能发送消息或接收消息的故障场景。遗漏故障分为三类：发送遗漏、接收遗漏和一般遗漏。发送遗漏是指处理器未能按照分布式算法的要求发送消息；接收遗漏发生在进程未接收到预期消息时。在实际中，这些遗漏是由于物理故障、内存问题、缓冲区溢出、恶意行为和网络拥塞引起的。\n\
  \n#### 崩溃后恢复\n\n表现出崩溃后恢复行为的进程可以在崩溃后恢复。它捕获了进程崩溃、丢失其内存状态，但稍后恢复并继续运行的场景。这种情况也可以视为一种遗漏故障，此时节点因为已崩溃而不会发送或接收任何消息。在实际中，这可能是进程的临时有意重启，或某些操作系统错误后的重启。一些例子包括\
  \ Windows 蓝屏或 Linux 内核恐慌后重启并恢复正常运行。\n\n当进程崩溃时，它可能会丢失其内部状态（称为遗忘），这使得恢复变得棘手。然而，我们可以通过保留稳定存储（日志）来缓解这个问题，它有助于从最后一个已知的良好状态恢复操作。节点在恢复后也可能丢失其所有状态，并且必须与网络的其他部分重新同步。也可能发生节点长时间宕机，与网络的其余部分（其他节点）不同步，并持有其旧的视图状态。在这种情况下，节点必须与网络重新同步。这种情况在比特币或以太坊等区块链网络中尤其常见，节点可能会离线相当长一段时间。当它重新上线时，它会与其余节点重新同步以恢复正常运行。\n\
  \n#### 窃听\n\n在这种模型中，分布式算法可能会泄露机密信息，并且攻击者可以窃听以从进程中获取信息。这种模型在区块链等不受信任且地理分散的环境中尤其如此。针对此类攻击的常见防御措施是加密，它通过加密消息来提供机密性。\n\
  \n#### 任意（拜占庭）\n\n拜占庭进程可能表现出任何任意行为。它可能以任何可能的方式偏离算法。它可能是恶意的，可能主动试图破坏分布式算法，选择性地遗漏某些消息，或者暗中试图削弱分布式算法。在分布式算法或系统中，这种类型的故障是最复杂和最具挑战性的。在实际中，它可能是一个黑客想出新颖的方法来攻击系统，网络上的病毒或蠕虫，或者其他一些前所未有的攻击。对拜占庭故障节点的行为没有限制；它可以做任何事情。\n\
  \n一个相关的概念是攻击者模型，其中攻击者的行为被建模。我们将在后面的“攻击者模型”一节中介绍这一点。\n\n现在我们来看分布式系统模型的另一个方面，网络。\n\
  \n### 网络\n\n在分布式网络中，链路（通信链路）负责传递消息，即从节点获取消息并发送给其他节点。通常，假设节点之间存在双向点对点连接。\n\n网络分区是指网络链路在两组节点之间的有限时间内变得不可用的场景。在实践中，这可能是由于一个数据中心不与另一个数据中心通信，或者是不正确/无意的，甚至是故意/恶意的防火墙规则禁止了网络的一部分到另一部分的连接。\n\
  \n\n\n#### 链路故障\n\n链路可能发生崩溃故障，即正常运行的链路可能突然停止传输消息。另一种链路故障是遗漏故障，即链路只传输部分消息，而部分消息丢失。最后，链路上还可能发生拜占庭故障或任意故障，此时链路可能创建伪造消息、篡改消息，并有选择性地投递部分消息，而忽略其他消息。\n\
  \n根据此模型，我们可以根据链路的故障方式和消息投递方式，将通信链路划分为不同类型。\n\n链路上（通道中）会发生两种类型的事件：**发送事件**，即消息被放入链路；**投递事件**，即链路分发消息，并由进程*接收*。\n\
  \n##### 公平丢失链路\n\n在此抽象中，我们描述消息如何在链路上丢失、重复或乱序。消息可能会丢失，但如果发送方和接收方进程都正确，且发送方持续重传，消息最终会被投递。更正式地说，其三个属性如下。\n\
  \n###### 公平丢失\n\n该属性保证具有此属性的链路不会系统性地丢弃每条消息。这意味着，即使需要多次重传，消息最终也能成功投递到目标节点。\n\n######\
  \ 有限重复\n\n该属性确保网络不会进行比发送方更多的重传操作。\n\n###### 无捏造\n\n该属性确保网络不会篡改消息，也不会凭空创建消息。\n\n\
  ##### 顽固链路\n\n此抽象描述了链路的行为：链路会无限次地投递任何已发送的消息。此抽象中关于进程的假设是，发送方和接收方进程都是正确的。这种类型的链路会顽固地尝试投递消息，而不考虑性能。链路会持续尝试，直到消息被投递。\n\
  \n正式来说，顽固链路具有两个属性。\n\n###### 顽固投递\n\n该属性意味着，如果一条消息 `m` 从正确的进程 `p` 发送一次给正确的进程 `q`，那么进程\
  \ `q` 将无限次地投递该消息，因此得名“顽固”！\n\n###### 无捏造\n\n这意味着消息不会凭空产生，如果某个进程投递了一条消息，那么该消息必然是由某个进程发送的。正式来说，如果进程\
  \ `q` 投递了一条来自进程 `p` 的消息 `m`，那么该消息 `m` 确实是从进程 `p` 发送给进程 `q` 的。\n\n##### 完美（可靠）链路\n\
  \n这是最常见的链路类型。在这种链路中，如果某个进程发送了一条消息，那么该消息最终将被投递。\n\n在实践中，`TCP` 是一种可靠链路。它有三个属性。\n\n\
  ###### 可靠投递\n\n如果一条消息 `m` 由正确的进程 `p` 发送给正确的进程 `q`，那么 `m` 最终会被 `q` 投递。\n\n#### 无重复\n\
  \n正确的进程 `p` 不会多次投递同一条消息 `m`。\n\n###### 无捏造\n\n该属性确保消息不会凭空产生，如果消息被投递，那么它们一定是在投递之前由正确的进程创建并发送的。\n\
  \n##### 日志式完美链路\n\n这种链路将消息投递到接收方的本地消息日志或持久化存储中。这在接收方可能崩溃，但我们仍需确保消息安全的场景中非常有用。在这种情况下，即使接收方进程崩溃，消息也不会丢失，因为它已持久化存储在本地存储中。\n\
  \n##### 认证完美链路\n\n这种链路保证从进程 `p` 发送给进程 `q` 的消息 `m` 确实是由进程 `p` 发送的。\n\n##### 任意链路\n\
  \n在此抽象中，链路可以表现出任何行为。这里，我们考虑一个能够控制消息的活跃敌手。该链路描述了攻击者可能执行恶意操作、篡改消息、重放消息或伪造消息的场景。简而言之，在这种链路上，任何攻击都是可能的。\n\
  \n在实际应用中，这代表了典型的互联网连接，黑客可以窃听、篡改、伪造或重放消息。当然，这也可能是由互联网蠕虫、流量分析器和病毒引起的。\n\n注意：这里我们只讨论点对点链路；我们将在后面的第\
  \ 3 章中介绍广播。\n\n### 同步性与时序\n\n在分布式系统中，延迟和速度假设描述了网络的行为。\n\n在实际应用中，分布式系统中延迟几乎不可避免，首先是由于固有的异步性、分散性、异构性，以及消息丢失、处理器缓慢、网络拥塞等具体原因。由于网络配置的变化，分布式系统中还可能出现意外或新的延迟。\n\
  \n分布式系统中的同步性假设关注的是网络延迟和由慢速网络链路或慢速处理器速度引起的处理器延迟。\n\n在实际应用中，处理器可能因为节点内存耗尽而变慢。例如，Java\
  \ 程序在“停止世界”类型的垃圾回收期间可能会完全暂停执行。另一方面，一些高端处理器天生就比资源受限设备上的低端处理器快。所有这些差异和情况都可能导致分布式系统出现延迟。\n\
  \n下面，我们讨论三种同步性模型，它们描述了分布式系统的时序假设。\n\n#### 同步\n\n同步分布式系统对消息到达一个节点所需的时间有已知的上限。这种情况是理想的。然而，在实践中，消息有时可能会延迟。即使在完美的网络中，也存在诸多因素，例如网络链路质量、网络延迟、消息丢失、处理速度或处理器容量，这些都可能对消息的投递产生不利影响。\n\
  \n在实践中，存在同步系统，例如片上系统（`SoC`）、嵌入式系统等。\n\n### 异步\n\n异步分布式系统则处于另一个极端。在这种模型中，不对时序做任何假设。换言之，传递消息所需的时间没有上限。节点中的消息投递或处理可能存在任意长且无界的延迟。进程可以以不同的速度运行。\n\
  \n此外，一个进程可以任意暂停或延迟执行，或者比其他进程处理得更快。你现在大概可以想象，为此类系统设计的分布式算法可以非常健壮和具有弹性。然而，许多问题在异步分布式系统中是无法解决的。有一整类被称为“不可能性结果”的结论，描述了分布式系统中无法解决的问题。我们将在本章后面以及第\
  \ 3 章中更详细地探讨不可能性结果。由于许多类型的问题在异步模型中无法解决，而同步模型又过于理想化，我们必须做出妥协。这种妥协被称为部分同步网络。\n\n\n\
  \n#### 部分同步\n\n部分同步模型假设网络在大部分情况下是同步且表现良好的，但有时也可能表现为异步。例如，处理速度可能存在差异，或者可能发生网络延迟，但系统最终会恢复到同步状态以恢复正常运行。\n\
  \n另一种理解方式是：网络通常处于同步状态，但可能在有限时间内不可预测地表现出异步行为，但系统中存在足够长的同步时期，使得系统能够正确运行。\n\n也可以这样认为：真实系统在大多数时候是同步的，但有时会表现出任意且不可预测的异步行为。在同步期内，系统能够做出决策并终止运行。\n\
  \n总之，我们可以引用列奥纳多·达·芬奇的话：\n\n> *对于善于利用时间的人来说，时间总是足够长。*\n\n图 1-15 展示了部分同步网络的行为方式。\n\
  \n![](img/515270_1_En_1_Fig15_HTML.png)\n\n一个以正弦曲线绘制处理器延迟与时间关系的图表。曲线被划分为同步区和异步区。\n\
  \n图 1-15\n\n部分同步网络\n\n#### 最终同步\n\n在部分同步的最终同步版本中，系统最初可能是异步的，但存在一个未知的时间点，称为全局稳定时间（GST），该时间点对处理器不可知，在此之后系统最终变为同步。此外，这并不意味着系统在\
  \ GST 之后将永远保持同步。这在实际中是不可能的，但系统在 GST 之后会有足够长的同步周期来做出决策并终止运行。\n\n我们可以在图 1-16 中直观地看到从异步到同步的同步模型谱系。\n\
  \n![](img/515270_1_En_1_Fig16_HTML.png)\n\n一个示意图，带有一个双向箭头，右侧标注为“同步”，左侧标注为“异步”，中间标注为“部分同步”。\n\
  \n图 1-16\n\n分布式系统中的同步模型\n\n同步模型会同时考虑消息传递延迟和进程的相对速度。\n\n##### 形式化定义\n\n以下是关于部分同步模型的一些形式化定义：\n\
  \n- 希腊字母 Delta `Δ` 表示消息从一个处理器到达另一个处理器所需时间的固定上限。\n- 希腊字母 Phi `Φ` 表示不同处理器相对速度的固定上限。\n\
  - GST 是全局稳定时间，在此之后系统表现为同步。\n\n定义了上述变量后，我们可以如下定义不同的同步模型：\n\n- 异步系统是指不存在固定上限 `Δ` 和\
  \ `Φ` 的系统。\n- 同步系统是指已知固定上限 `Δ` 和 `Φ` 的系统。\n\n部分同步系统可以通过几种方式定义：\n\n- 存在固定上限 `Δ` 和\
  \ `Φ`，但它们未知。\n- 已知固定上限 `Δ` 和 `Φ`，但仅在某个未知时间 T 之后才成立。这就是最终同步模型。我们可以说，最终同步模型是指已知固定上限\
  \ `Δ` 和 `Φ`，但仅在某个时间（称为 GST）之后才成立的模型。\n- 在另一种变体中，GST 之后 `Δ` 会持续足够长的时间，以使协议能够终止。\n\
  \n我们将在第 3 章中，围绕规避 FLP 不可能原理和共识协议，更正式地使用同步模型。目前，作为基础，前面介绍的概念已经足够。\n\n图 1-17 使用时空图展示了同步通信与异步通信的对比。\n\
  \n![](img/515270_1_En_1_Fig17_HTML.png)\n\n两个示意图，各有三条线 P、Q 和 R，以及多向箭头。右侧图没有上限，左侧图有已知的上限。\n\
  \n图 1-17\n\n同步系统与异步系统\n\n讨论完同步模型后，现在让我们将注意力转向对手模型，该模型允许我们对对手对分布式系统的影响做出假设。在此模型中，我们对对手如何行为以及对手可能拥有哪些权力以对分布式系统产生不利影响进行建模。\n\
  \n### 对手模型\n\n除了对分布式系统模型中的同步性和时序做出假设外，还有另一个模型，用于对对手的能力以及它如何对分布式系统产生不利影响做出假设。这是一个重要的模型，它允许分布式系统设计者面对对手时，推理分布式系统的不同属性。例如，一个分布式算法只有在恶意对手控制的节点少于一半的情况下，才能保证正确运行。因此，对手模型通常会对对手的能力设定限制。但是，如果假设对手是全能的，可以无所不能并控制所有节点和通信链路，那么系统就不可能保证正确运行。\n\
  \n根据分布式系统的不同，以及对手对分布式系统的影响方式和不利影响程度，对手模型可以分为不同类型。\n\n在此模型中，假设存在一个外部实体，它已经破坏了进程，并且可以控制和协调故障进程的行为。这个实体被称为对手。请注意，这与故障模型略有不同，因为在故障模型中，节点可能因各种原因发生故障，但并未假设有外部实体控制进程。\n\
  \n对手可以通过多种方式影响分布式系统。使用对手模型的系统设计者需要考虑诸如**腐败类型**、**腐败时间**和**腐败程度**（同时腐败多少进程）等因素。此外，对手可用的**计算能力**、**可视性**和**适应性**也需要考虑。对手模型还允许设计者指定网络中可被腐败的进程数量上限。\n\
  \n我们将在此简要讨论这些类型。\n\n#### 阈值对手\n\n阈值对手是分布式系统中一种标准且广泛使用的模型。在此模型中，对系统中总的故障进程数量施加了限制。换句话说，对网络中故障进程的数量有一个固定上限\
  \ `f`。该模型也称为全局对手模型。许多不同的算法都是在此假设下开发的。几乎所有的共识协议至少都在阈值对手模型下工作，该模型假设对手最多可以控制网络中 `f`\
  \ 个节点。例如，在第 7 章讨论的 Paxos 协议中，经典共识算法实现在对手控制的节点数量少于网络总节点数一半的假设下达成共识。\n\n#### 动态对手\n\
  \n该模型也称为自适应对手。在此模型中，对手可以在协议执行期间的任何时刻腐败进程。并且，被腐败的进程随后将保持故障状态，直到执行结束。\n\n#### 静态对手\n\
  \n这种类型的对手只能在对协议执行前进行腐败等敌对活动。\n\n\n#### 被动敌手\n\n这类敌手不会主动破坏系统，但可能在协议运行过程中获取系统的某些信息，因此可称之为半诚实敌手。\n\
  \n敌手可在两种模型下引发故障：崩溃故障模型和拜占庭故障模型。\n\n在崩溃故障模型中，敌手可在协议执行期间的任意时刻，使其控制的进程停止执行协议。\n\n在拜占庭故障模型中，敌手完全控制被破坏的进程，并可操纵其任意偏离协议。在这种假设下运行并能容忍此类故障的协议，分别称为崩溃容错协议（`CFT`）或拜占庭容错协议（`BFT`）。\n\
  \n"
- "# 时间、时钟与顺序\n\n时间在分布式系统中起着至关重要的作用。几乎总是需要对时间进行度量。例如，分布式系统中的日志文件需要时间戳来记录特定事件的发生时间。从安全角度看，审计时间戳用于记录特定操作的发生时间，比如特定用户登录系统的时间。在操作系统中，内部事件的调度需要定时功能。所有这些用例以及无数其他计算机和分布式系统操作，都需要某种时间概念。\n\
  \n分布式系统中的时间概念颇为棘手。如图 1-18 所示的事件必须排序，分布式系统才能合理可用。事件排序是分布式系统最基本、最关键的需求之一。由于分布式系统中不存在全局共享时钟，事件排序成为一个具有挑战性的问题。为此，这里的主要关注点是实现系统中事件的正确排序。我们在日常生活中就有这种时间概念，可以说某件事发生在另一件事之前。例如，如果我参加了一场考试，一周后成绩公布，我们可以确定地说，考试必然发生在成绩公布之前。我们可以在图\
  \ 1-19 的示意图中直观看到这种关系。\n\n![](img/515270_1_En_1_Fig19_HTML.jpg)\n\n考试示意图。一条标有“我”的水平线上有两个事件：考试和成绩。下方是一个指向右侧的箭头，标有“时间”。\n\
  \n图 1-19\n\n考试发生在成绩之前——一种“发生在...之前”的关系\n\n![](img/515270_1_En_1_Fig18_HTML.jpg)\n\
  \n一个包含 P、Q、R 三条线的示意图，标有本地事件、消息发送和消息接收等事件。部分事件通过时间线连接。\n\n图 1-18\n\n三节点分布式系统中的事件与进程\n\
  \n通常，我们熟悉的是物理时钟，即我们日常对时间的理解，例如“我今天下午 3 点见你”或“足球赛是明天上午 11 点”。这种时间概念是我们所熟悉的。此外，物理时钟可用于分布式系统，并有多种算法用于同步分布式系统中所有节点的时间。这些算法可以通过消息传递来同步分布式系统中的时钟。\n\
  \n我们先来了解物理时钟，并介绍一些基于内部物理时钟和外部时间源进行时间同步的算法。\n\n## 物理时钟\n\n物理时钟在日常生活中无处不在。如今普遍使用的数字时钟基于石英晶体，而传统机械时钟则基于弹簧机构或摆锤。从手表到计算机主板上的时钟，数字时钟都利用石英晶体。实际上，由石英晶体调控的振荡器电路用于生成精确频率。当对石英晶体施加电场时，它会弯曲并开始以其尺寸、切割方式、温度和封装所决定的频率共振。最常见的频率是\
  \ 32768 Hz，这几乎是所有石英时钟通用的频率。图 1-20 从左到右依次展示了天然形态的石英晶体、元器件形态的石英晶体，以及带有附加振荡器电路的封装晶体。\n\
  \n![](img/515270_1_En_1_Fig20_HTML.jpg)\n\n左侧是天然形态的石英晶体，右侧是电路中的石英晶体，中间是元器件形态的石英晶体。\n\
  \n图 1-20\n\n天然形态的石英晶体（左）、元器件形态的石英晶体（中）以及电路中的石英晶体（右）\n\n基于石英的时钟通常精度足以满足一般用途。然而，制造差异、封装以及工作环境（过冷或过热）等因素都会影响石英晶体的运作。通常，温度过低或过高都会导致时钟变慢。想象一下，如果现场运行的电子设备暴露在高温下，其时钟可能比在正常有利条件下工作的时钟运行得更慢。这种由时钟运行快慢导致的差异称为漂移。漂移以百万分之几（`ppm`）为单位进行测量。\n\
  \n几乎所有石英时钟中，由于切割方式、尺寸和制造工艺，石英晶体的频率都是 32,768 kHz。这是一种特定的切割方式和尺寸，形状类似于音叉，因此产生的频率始终是\
  \ 32,768 赫兹。我决定用我的示波器和一块闲置的老时钟做个简单实验来证明这一点。\n\n以下是结果！图 1-21 显示了时钟电路中的石英晶体在正常室温下正好产生\
  \ 32,768 赫兹的频率，示波器屏幕上清晰显示。\n\n![](img/515270_1_En_1_Fig21_HTML.png)\n\n连接到石英晶体时钟的示波器测量到\
  \ 32.7680 千赫兹\n\n图 1-21\n\n使用示波器测量的石英晶体时钟\n\n在图 1-21 中，示波器的探针连接到时钟电路上的石英晶体元器件，波形显示在示波器屏幕上。同时，示波器屏幕右下角显示频率，读数为\
  \ `32.7680KHz`。\n\n### 时钟偏差 vs. 漂移\n\n由于温度等环境因素和制造差异，石英晶体时钟可能会变慢，从而产生偏差和漂移。两个时钟显示时间之间的即时差异称为偏差，而两个时钟计时速率的不同称为漂移。请注意，在异构分布式系统中，各节点物理时钟之间的差异可能比同构分布式系统（所有节点的硬件、操作系统和架构相同）更为显著。\n\
  \n通常，预计大约每 11 天会产生约 1 秒的漂移，随着时间的推移，这将导致可观察到的显著差异。想象两台运行在数据中心、没有时钟同步机制、仅依赖内部石英时钟的服务器。一个月后，它们之间的时间将相差\
  \ 2 到 3 秒。所有依赖时间的操作都将相差 3 秒，并且随着时间的推移，这种差异会继续恶化。例如，一个本应在上午 11 点启动的批处理作业，一个月后将在 11\
  \ 点过 3 秒才开始。这种情况可能引发与时间相关的作业问题，导致安全问题，影响时间敏感操作，甚至可能导致软件故障或表现出异常行为。比石英时钟精确得多的时钟是原子钟。\n\
  \n\n\n### 原子钟\n\n原子钟基于原子的量子力学特性。使用`铯`、`铷`或`汞`等原子，并利用原子的共振频率（振荡）来记录高度精确的时间。\n\n我们对时间的认知基于天文观测，例如季节变化和地球自转。振荡越高，频率就越高，时间也就越精确。这就是原子钟的工作原理及其产生高精度时间的基础。\n\
  \n1967 年，时间单位“秒”被定义为“铯-133 原子基态的两个超精细能级之间跃迁所对应辐射的 9,192,631,770 个周期的持续时间”。换言之，在受控环境下，铯原子在两个能态之间恰好振荡\
  \ 9,192,631,770 次，便定义了一秒。图 1-22 展示了一台原子钟。\n\n![](img/515270_1_En_1_Fig22_HTML.jpg)\n\
  \n一组共 6 台配有各种电气机架的铯束原子钟。这些设备高度中部有一处打印输出。\n\n**图 1-22**\n\n基于铯的原子钟：图片来源于 [`​nara.​getarchive.​net/​media/​cesium-beam-atomic-clocks-at-the-us-naval-observatory-provide-the-basis-for-29fa0c`](https://nara.getarchive.net/media/cesium-beam-atomic-clocks-at-the-us-naval-observatory-provide-the-basis-for-29fa0c)\n\
  \n现在想象一个场景：我们发现时钟偏差，其中一个钟慢了十秒。通常我们可以简单地将它调快十秒来重新校准。这虽不理想，但也不至于像时钟偏差那么糟糕——当我们发现某个钟慢了十秒时，问题可能更严重。这种情况下我们能做什么？能简单地将它拨回十秒吗？这并非好主意，因为之后可能会出现消息的接收时间早于发送时间的情况。\n\
  \n为了解决时钟偏差和漂移，我们可以将时钟与一个可信且精确的时间源进行同步。\n\n你可能会问，为什么我们需要越来越精确的时钟和时间源？石英钟足以满足日常使用；后来，我们有了\
  \ GPS 这个更精确的时间源；再后来，我们有了原子钟，它更加精确，大约三亿年才误差一秒！^(¹) 但为什么我们需要如此高精度的时钟？答案是：对于日常使用来说，这并不重要。如果我的手表时间与其他钟表相差几秒，这不是问题。如果我在社交媒体上的帖子时间戳与真实发布时间相差几秒，可能也不算什么。当然，只要时间顺序得以保持，时间戳差几秒是可以接受的。但在许多其他实际场景和分布式系统中，情况就不同了。例如，高频交易系统要求（依据\
  \ MiFID II 法规）交易系统中消息的时间戳格式精确到微秒，并且误差在 100 微秒以内。从时钟同步的角度看，与 UTC 的偏差仅允许 100 微秒。虽然这类要求对于交易系统的正常运作和监管至关重要，但也带来了技术挑战。在这种场景下，精确时间源的选择、同步算法的选择以及时钟偏差和漂移的处理变得至关重要。\n\
  \n你可以在此处查看 MiFID 的具体要求作为参考：\n\n[`https://ec.europa.eu/finance/securities/docs/isd/mifid/rts/160607-rts-25-annex_en.pdf`](https://ec.europa.eu/finance/securities/docs/isd/mifid/rts/160607-rts-25-annex_en.pdf)\n\
  \n原子钟在国防、地质学、天文学、导航等领域还有其他应用。\n\n最近，蓝宝石钟被研发出来，其精度甚至远超基于铯的原子钟。它精确到每三十亿年才误差一秒。\n\n\
  通常，计算机中有两种表示时间的方式。一种是纪元时间（Epoch Time），也称为 Unix 时间，定义为自 1970 年 1 月 1 日以来经过的秒数。另一种常见的时间戳格式是\
  \ ISO8601，它定义了一套日期和时间格式标准。\n\n### 物理时钟的同步算法\n\n同步时钟有两种方法：\n\n1. 外部同步\n2. 内部同步\n\n\
  在外部时钟同步方法中，存在一个外部的权威时间源，分布式系统中的节点与之同步。\n\n在内部同步方法中，节点（进程）中的时钟相互同步。\n\n#### NTP\n\
  \n网络时间协议（NTP）允许客户端与 UTC 同步。在 NTP 中，服务器按所谓的层级组织，其中第 1 层服务器（主时间服务器）直接连接到第 0 层的精确时间源，例如\
  \ GPS 或原子钟。第 2 层服务器通过网络与第 1 层服务器同步，第 2 层服务器再与第 3 层服务器同步。这种架构提供了一种可靠、安全且可扩展的协议。可靠性来自于冗余服务器和路径的使用；安全性通过使用适当的认证机制来保障；可扩展性则体现在\
  \ NTP 能够服务大量客户端。尽管 NTP 是一个高效且健壮的协议，但固有的网络延迟、协议设置中的错误配置、可能阻塞 NTP 协议的网络错误配置以及其他一些因素仍然可能导致时钟漂移。\n\
  \n\n\n## GPS 作为时间源\n\nGPS 接收器可用作精确的时间源。所有 31 颗 GPS 卫星上都搭载了原子钟，能够产生精确的时间。这些卫星会广播其位置和时间，GPS\
  \ 接收器在接收信号后，会应用对环境因素和时间膨胀的修正，计算出地球上的时间和位置。请记住，根据相对论，GPS 卫星上的时间比地球表面的物体运行得稍快一些。其他与相对论相关的影响还包括时间膨胀、引力频移和偏心率效应。所有这些误差以及许多其他修正都会被处理，然后才能在\
  \ GPS 接收器上显示精确的时间。虽然 GPS 作为精确时间源具有很高的精度，但在网络中，即使在 GPS 接收器处获得了正确且精确的时间，之后引入的固有延迟仍会导致时钟随时间产生漂移和偏移。因此，需要引入一些时钟同步算法来解决这一局限。\n\
  \nGoogle 的 Spanner（Google 的全球分布式数据库）结合使用了原子钟和 GPS 来处理时间不确定性。\n\n然而，请注意，即使付出所有这些努力，时钟也不可能实现完美同步，但这对于大多数应用来说已经足够。然而，这些非常精确的时钟仍然不足以捕捉分布式系统中事件之间的因果关系。事件之间的因果关系以及基本的单调性属性可以通过逻辑时钟来精确捕捉。\n\
  \n在分布式系统中，即使每个进程都有一个本地时钟，并与某个全局时间源同步，每个本地处理器所看到的时间仍然可能存在差异。时钟会随时间漂移，处理器可能出现故障，或者存在固有的漂移（例如石英钟或\
  \ GPS 系统），这使得在分布式系统中处理时间变得极具挑战性。\n\n设想一个分布式系统，其中某些节点在轨道上，而另一些节点在地球上的不同地理位置，并且它们都同意使用协调世界时（UTC）。卫星或国际空间站上的物理时钟会以不同的速率运行，偏移是不可避免的。依赖物理时钟的核心局限在于，即使试图完美同步它们，时间戳也会略有差异。然而，这些物理时钟**不能（也不应该）**\
  \ 用于确定分布式系统中事件的顺序，因为很难基于不同节点上的时间戳来准确找出事件的全局顺序。\n\n物理时钟并不非常适合分布式系统，因为它们可能产生漂移。即使有统一的来源（例如通过\
  \ NTP 同步的原子钟），它们仍可能随时间与源发生漂移和失同步。哪怕只有一秒的差异，有时也可能导致重大问题。此外，软件实现中的 bug 也可能导致意外后果。例如，来看一个著名的\
  \ Bug——“闰秒 Bug”，它曾导致互联网服务严重中断。\n\n## UTC 时间\n\n协调世界时（UTC）是一种在全世界范围内使用的时间标准。构成协调世界时的两个时间源如下：\n\
  \n- **国际原子时（TAI）**\n  - 国际原子时基于全球约 400 台原子钟。综合并加权这些原子钟的输出。其精度极高，大约每 1 亿年才会偏差 1 秒！\n\
  - **天文时间**\n  - 此时间基于天文观测，即地球的自转。\n\n虽然国际原子时精度很高，但它没有考虑地球自转，即决定一天真实长度的天文观测时间。地球的自转并非恒定不变。它偶尔会加快，且总体上在减慢。因此，一天并非精确的\
  \ 24 小时。对地球自转的影响来自月球等天体、潮汐以及其他环境因素。因此，UTC 会不断与天文时间进行比较，任何差异都会累加到 UTC 中。这种差异以闰秒的形式添加；在国际原子时与天文时间的差异达到\
  \ 0.9 秒之前，就会向 UTC 添加一个闰秒。这是自 1972 年以来一直采用的惯例。\n\n好吧，这似乎是保持两种时间同步的合理解决方案；然而，计算机似乎并不能很好地处理这种情况。Unix\
  \ 系统使用 Unix 时间（纪元时间），即自 1970 年 1 月 1 日以来经过的秒数。添加闰秒时，时钟的显示如下：在正常情况下，观察到 `23:59:59`\
  \ 之后是 `00:00:00`。然而，添加闰秒后，似乎是 `23:59:59` 之后是 `23:59:60`，然后才是 `00:00:00`。换句话说，`23:59:59`\
  \ 会经历两次。当 Unix 时间处理这个额外增加的秒时，可能会产生不可预测的行为。过去，在添加闰秒时，互联网上的服务器曾出现问题，甚至像航空公司订票系统这样关键的服务也受到了影响。\n\
  \n一种称为“闰秒平摊”的技术已经被开发出来。它允许在一天内逐渐添加几毫秒，以解决突然添加一秒以及与此突然增加的一秒相关的问题。\n\n好了，到目前为止，我们看到\
  \ UTC 和天文时间是通过添加闰秒来同步的。利用“闰秒平摊”技术，我们可以逐渐添加一个闰秒，这缓解了与突然添加闰秒相关的一些问题。也有人呼吁彻底废除这一做法。然而，就目前而言，我们认为添加闰秒是一个合理的解决方案，似乎也基本可行。当地球自转变慢时，我们就添加一个闰秒。但如果地球自转变快了呢？2020\
  \ 年，地球确实自转变快了，原因暂且不论。现在的问题是，我们是否应该从 UTC 中移除一秒？换句话说，引入负闰秒！这种情况可能会带来更多挑战——甚至可能比添加闰秒更难处理。\n\
  \n问题是，对此该怎么办？忽略它？用什么算法可以移除一秒并引入负闰秒？\n\n到目前为止，有人建议直接跳过 `23:59:59`，即从 `23:59:58` 直接到\
  \ `00:00:00`。预计这比添加闰秒更容易处理。也许，根本不需要解决方案，因为我们可以完全忽略地球自转变快或变慢的现象，并废除闰秒调整的做法，无论是负调整还是正调整。这并不理想，但我们可能会这样做，以避免处理闰秒（尤其是添加闰秒！）所带来的问题和歧义。在撰写本文时，这仍是一个悬而未决的问题。\n\
  \n更多信息可在此处找到：[`https://fanf.dreamwidth.org/133823.html`](https://fanf.dreamwidth.org/133823.html)（负闰秒）和\
  \ [`www.eecis.udel.edu/~mills/leap.html`](https://www.eecis.udel.edu/%257Emills/leap.html)。\n\
  \n\n\n## 分布式系统中的逻辑时钟与物理时钟\n\n为了避免与物理时钟及同步相关的限制和问题，在分布式系统中，我们可以使用逻辑时钟。逻辑时钟与物理时钟无关，但对分布式系统中的事件进行排序是一种有效方式。尽管如我们所知，事件排序与因果关系是分布式系统的基本要求，但逻辑时钟在确保这一点的过程中扮演着至关重要的角色。\n\
  \n从分布式系统的角度来看，我们之前已经了解到全局状态的概念非常重要。它使我们能够观察分布式系统的状态，并有助于快照或检查点操作。因此，时间在这里起着关键作用：如果整个系统的时间不统一（即每个处理器运行在不同时间），当我们尝试读取系统中所有不同处理器和链路的状态时，将会导致不一致的状态。\n\
  \n### 物理时钟的类型\n\n物理时钟可分为两类：\n\n1.  一天中的时间时钟\n2.  单调时钟\n\n**一天中的时间时钟**的特点是从某个固定时刻开始表示时间。例如，从\
  \ 1970 年 1 月 1 日开始计算的 Unix 时间就是一种一天中的时间时钟。这种时间可以通过同步调整到某个时间源，并且可以向前或向后调整。然而，将时间向后调整不是一个好主意。这种情况可能导致例如消息看起来是在发送之前被接收的问题。这种问题可能由于时间戳被调整，并且因为同步算法（例如`NTP`）所做的调整而导致时间向后移动而产生。\n\
  \n由于时间总是增加的，因此时间不应该倒退；我们需要**单调时钟**来处理此类场景。\n\n使用物理时钟几乎不可能提供因果关系。即使使用了时间同步服务，一个进程的时间戳与另一个进程的时间戳仍可能存在微小差异，从而对事件顺序产生不利影响。因此，事件排序是分布式系统中的一个基本需求。为了充分理解这种排序需求的性质，我们引入一个名为“happens-before\
  \ 关系”的形式化概念。\n\n在介绍 happens-before 关系和因果关系之前，让我们先澄清一些基本的数学概念。这不仅有助于我们理解因果关系，也有助于理解本书后面讲解的概念。\n\
  \n### 集合\n\n**集合**是元素的集合。它用大写字母表示。集合的所有元素都列在花括号内。如果元素`x`存在于集合中，则记为`x ∈ X`，意思是`x`属于`X`。同样地，如果元素`x`不在集合`X`中，则记为`x\
  \ ∉ X`。元素的顺序无关紧要。如果两个集合具有相同的元素，则它们相等。相等关系表示为`X = Y`，即集合`X`等于集合`Y`。如果两个集合`X`和`Y`不相等，则记为`X\
  \ ≠ Y`。没有任何元素的集合称为空集，记为`{}`或`ϕ`。集合的一个示例如下：\n\n```\nX = {1, 5, 2, 8, 9}\n```\n\n\
  如果集合`Y`的每个元素也是集合`X`的元素，则集合`Y`是集合`X`的子集，例如：\n\n```\nY = {2, 8}\n```\n\n集合`Y`是集合`X`的子集。这种关系记为：\n\
  \n```\nY ⊆ X\n```\n\n两个集合`A`和`B`的并集包含`A`和`B`中的所有元素，例如：\n\n```\nA = {1, 2, 3}\n```\n\
  和\n```\nB = {3, 4, 5}\n```\n\n集合`A`和`B`的并集是：\n\n```\nS = {1, 2, 3, 4, 5}\n```\n\n\
  两个集合`A`和`B`的笛卡尔积是所有有序对`(a, b)`的集合。它记为`A × B`。它是对于每个`a ∈ A`和`b ∈ B`的所有有序对`(a, b)`的集合。\n\
  \n有序对由两个用括号括起来的元素组成，例如`(1, 2)`或`(2, 1)`。请注意，在有序对中元素的顺序很重要，而在集合中元素的顺序无关紧要。例如，`(1,\
  \ 2)`与`(2, 1)`不同，但`{1, 2}`和`{2, 1}`是相同的集合。\n\n前面给出的集合`A`和`B`的笛卡尔积`A × B`的一个示例如下：\n\
  \n```\n{(1,3), (1,4), (1,5), (2,3), (2,4), (2,5), (3,3), (3,4), (3,5)}\n```\n\n\
  注意，在有序对中，第一个元素取自集合`A`，第二个元素取自集合`B`。\n\n### 关系\n\n两个集合`A`和`B`之间的（二元）**关系**是笛卡尔积`A\
  \ × B`的一个子集。\n\n两个元素之间的关系是二元的，可以表示为一组有序对。我们可以将其表示为`a R b`（中缀表示法）或`(a, b) ∈ R`，即有序对`(a,\
  \ b)`在关系`R`中。\n\n当集合`S`上的二元关系具有自反性、对称性和传递性等性质时，它被称为**等价关系**。\n\n当集合`S`上的二元关系具有自反性、反对称性和传递性三个性质时，它被称为`S`上的**偏序**。\n\
  \n### 偏序\n\n**偏序**是集合`S`的元素之间的一个二元关系`≤`（用于比较的小于或等于）。集合`S`上的一个二元关系，如果它是自反的、反对称的和传递的，则称为`S`上的偏序。我们现在定义这三个条件。\n\
  \n#### 自反性\n\n这个性质意味着每个元素都与自身相关。数学上可以这样写：∀`a` ∈ `S`, `a` ≤ `a`。\n\n#### 反对称性\n\n\
  这意味着两个元素不能彼此在两个方向上相关。数学上可以写为：∀`a`, `b` ∈ `S`, 如果`a` ≤ `b` 且 `b` ≤ `a`, 则 `a` = `b`。\n\
  \n#### 传递性\n\n传递性表示一种比较关系：如果 `a` < `b` 且 `b` < `c`，则意味着 `a` < `c`。数学上可以写为：∀`a`,\
  \ `b`, `c` ∈ `S`, 如果 `a` ≤ `b` 且 `b` ≤ `c`，则 `a` ≤ `c`。\n\n带有偏序的集合称为偏序集或`poset`。就\
  \ happens-before 关系而言，集合`S`是所有事件的集合。\n\n### 非自反偏序\n\n非自反偏序或严格偏序是非自反的、反对称的和传递的。\n\
  \n#### 非自反性\n\n这个性质意味着没有元素与自身相关。数学上可以这样写：∀`a` ∈ `S`, `a` ≰ `a`，或者给定集合`S`上的关系`R`，如果∀`s`\
  \ ∈ `S` : `(s, s)` ∉ `R`，则`R`是非自反的。\n\n#### 全序\n\n**全序**或线性序是一种偏序，其中每一对元素都是可比较的。\n\
  \n在简要介绍了一些数学概念之后，现在让我们来看看什么是因果关系以及什么是 happens-before 关系。\n\n\n好的，没问题。作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成高质量的中文。\n\
  \n\n### 发生在先关系与因果关系\n\n我们之前看到，一个节点可以执行一些事件。它可以执行本地计算、发送消息或接收消息。所有事件在单个节点上按顺序发生，很容易看出哪个事件发生在下一个事件之前。这是在每个节点上施加的一种严格全序关系。\n\
  \n发生在先关系是一种具有三个性质的反自反偏序关系（严格偏序）：反自反性、反对称性和传递性。\n\n现在假设发生了两个事件 `e` 和 `f`。要确定事件 `e`\
  \ 是否发生在事件 `f` 之前，我们使用以下规则。\n\n事件 `e` 发生在事件 `f` 之前，当且仅当：`e → f`（右箭头用作发生在先关系的符号）：\n\
  \n- 如果 `e` 和 `f` 发生在同一个进程中，并且在该进程中 `e` 在 `f` 之前执行，那么我们可以推断出 `e` 先于 `f`，即一种顺序关系。\n\
  - 事件 `e` 是某个（唯一的）消息 `m` 的发送事件，而事件 `f` 是该消息 `m` 的接收事件。\n- 如果存在一个事件 `g`，使得 `e → g`\
  \ 且 `g → f`，那么 `e → f`。这被称为传递关系。\n\n我们可以在图 1-23 中看到这三种规则的可视化表示。\n\n![](img/515270_1_En_1_Fig23_HTML.jpg)\n\
  \n*一个示意图，上方有 3 个标记为 P 的右箭头，下方有 2 个标记为 Q 的右箭头。这些线上有元素，如 E、F 和 G。*\n\n**图 1-23** 发生在先规则\n\
  \n如果 `e` 和 `f` 是偏序的，那么我们称 `e` 发生在 `f` 之前。如果 `e` 和 `f` 不是偏序的，那么我们称 `e` 和 `f` 是并发的。这也不意味着\
  \ `e` 和 `f` 恰好完全独立地同时执行。它仅仅意味着 `e` 和 `f` 没有因果关系。换句话说，不存在从一个事件导致另一个事件的消息序列。这种并发关系写作\
  \ `e ∥ g`。图 1-24 详细展示了一个示例场景。\n\n![](img/515270_1_En_1_Fig24_HTML.jpg)\n\n*一个示意图，有\
  \ 3 个标记为 P、Q 和 R 的右箭头。这些线上有元素，如 E、F、G、H、I 和 J。其中一些元素彼此连接。*\n\n**图 1-24** 发生在先关系示例\n\
  \n在图 1-24 中，关系 `e → f`、`g → h`、`i → j` 是由于进程执行事件的顺序。关系 `f → g`、`h → j` 是由于消息 `m[1]`\
  \ 和 `m[2]`。此外，`e → g`、`e → h`、`e → j`、`f → h`、`f → j`、`g → j` 代表了传递关系。最后，并发事件是 `e\
  \ ∥ i`、`f ∥ i`、`g ∥ i`、`h ∥ i`。\n\n### 逻辑时钟\n\n逻辑时钟不依赖于物理时钟，可用于定义分布式系统中事件的顺序。逻辑时钟仅衡量事件的顺序，而不参考任何外部物理时间。\n\
  \n### 兰波特时钟\n\n兰波特时钟是分布式系统中每个进程维护的一个逻辑计数器，每次发生事件时，它都会递增，从而为维护和观察分布式系统中事件之间的发生在先关系提供了一种手段。\n\
  \n这里的关键思想是每个事件都被分配一个数字，该数字随着事件在系统中发生而递增。这个数字也称为兰波特时钟。兰波特时钟捕捉了因果关系。\n\n兰波特时钟/逻辑时钟的算法描述如下：\n\
  \n- 每个进程维护一个本地计数器，初始化时设置为零。\n- 进程上的每个事件发生时，该进程将计数器加一。\n- 发送消息时，进程会包含其计数器的当前值。\n\
  - 接收消息时，进程将其计数器值设置为 `max(本地值, 接收值) + 1`。\n\n在 `e → f` 的**发生在先关系**中，我们可以说可能是 `e`\
  \ 导致了 `f`。这意味着发生在先关系捕捉了事件的因果关系。\n\n更正式地说，兰波特算法如清单 1-1 所示。\n\n```\non init\nt :=\
  \ 0\non event localcomputation do\nt := t + 1\nend\non event send(m) do\nt := t\
  \ + 1\nsend(m, t)\nend\non event receive(m', t') do\nt := max(t, t') + 1\nend\n\
  ```\n\n**清单 1-1** 兰波特时钟\n\n兰波特时钟与因果关系是一致的。我们可以这样写：\n\n`如果 e → f ⇒ LC(e) < LC(f)`\n\
  \n这意味着，如果 `e` 发生在 `f` 之前，那么它意味着事件 `e` 的时间戳（兰波特时钟 – `LC`）小于事件 `f` 的时间戳。\n\n有一个称为**时钟条件**的正确性标准，用于评估逻辑时钟：\n\
  \n`∀ a,b: a → b ⇒ LC(a) < LC(b)`\n\n这解读如下：对于所有 `a` 和 `b`，如果 `a` 发生在 `b` 之前，则意味着\
  \ `a` 的兰波特时钟（时间戳）小于 `b` 的兰波特时钟（时间戳）。\n\n这意味着，如果事件 `A` 发生在事件 `B` 之前，则意味着事件 `A` 的兰波特时钟小于事件\
  \ `B` 的兰波特时钟。\n\n现在我们看到了一幅图景逐渐浮现。无需使用物理时钟，我们现在可以看到，通过使用兰波特时钟，分布式系统中的事件如何被分配一个可用于排序的编号。\n\
  \n现在，让我们在一个由三个进程（节点、计算机）`P`、`Q` 和 `R` 组成的简单分布式系统上运行此算法。\n\n该算法有两个关键性质：\n\n1. 如果\
  \ `a → b`，那么 `LC(a) < LC(b)`。\n2. 但 `LC(a) < LC(b)` 并不表示 `a → b`。\n\n这意味着两个事件可能具有相同的时间戳。如图\
  \ 1-25 所示，在进程线 `P` 和 `R` 上，注意事件时间戳都是 `1`。您发现问题了吗？在这种方案中，无法保证全序，因为两个事件可能获得相同的时间戳。\n\
  \n![](img/515270_1_En_1_Fig25_HTML.jpg)\n\n*一个示意图，有 3 条标记为 P、Q 和 R 的线。线上有事件，如 (P,\
  \ 1)、(Q, 3) 等。一些事件通过时间线彼此连接。*\n\n**图 1-25** 兰波特时钟算法运行示例\n\n一种显而易见的解决方法是使用进程标识符与时间戳结合。通过这种方式，可以实现全序。\n\
  \n图 1-26 展示了使用全序逻辑时钟的执行过程。\n\n![](img/515270_1_En_1_Fig26_HTML.jpg)\n\n*一个示意图，有\
  \ 3 条标记为 P、Q 和 R 的线。线上有事件，如 (P, 1)、(Q, 3) 等。一些事件通过时间线彼此连接。*\n\n**图 1-26** 全序兰波特时钟运行示例\n\
  \n了解分布式系统中事件的顺序非常有用。事件的顺序使我们能够找到事件之间的因果关系。对分布式系统中因果关系的了解有助于解决多个问题。一些例子包括但不限于：复制数据库中的一致性、找出不同事件之间的因果依赖关系、衡量分布式系统中执行的进度以及衡量并发性。\n\
  \n我们可以用它来构建分布式状态机。如果事件带有时间戳，我们还可以看到事件发生的具体时间、之前发生了什么以及之后发生了什么，这有助于调试和调查分布式系统的故障。这种了解在构建调试器、快照某个时间点、修剪某个时间点之前的数据以及许多其他用例中都非常有用。\n\
  \n`LC(a) < LC(b)` 并不表示 `a → b` 这一局限性意味着兰波特时钟无法判断两个事件是否并发。这个问题可以使用向量时钟来解决。\n\n\n\n\
  ## 向量时钟\n\n这是一种逻辑时钟，除了能够确定事件的偏序关系并检测因果违反之外，还能检测并发事件。其工作原理如下：\n\n- 初始时，分布式系统中所有向量时钟均设置为零，即\
  \ `[0,0,0,0,0]`。\n- 每当进程中发生内部事件时，该进程在向量中的逻辑时钟值增加 1。\n- 每当进程发送消息时，该进程在向量中的逻辑时钟值增加\
  \ 1。\n- 每当进程接收消息时，该进程在向量中的逻辑时钟值增加 1。\n- 向量中的每个元素都会递增。\n\n"
- '# 故障与容错


  分布式系统中的故障是不可避免的。事实上，故障是分布式系统的一个特点。大量研究工作致力于容错，这也是分布式系统研究的核心。为了理解故障，让我们看一个小例子。


  想象一个最简单的分布式系统，它由两个节点组成，如图 1-27 所示。


  一个由两个节点 `P1` 和 `P2` 通过通信链路连接而成的分布式系统示意图。


  **图 1-27** 一个最简单的分布式系统


  思考可能发生的故障：


  - 处理器 `p1` 或 `p2` 可能崩溃。

  - 通信链路可能失效。

  - 通信链路存在延迟。

  - `p1` 或 `p2` 处理速度缓慢。

  - `P1` 可能假装发送了某条消息；而实际上它并未发送。


  分布式系统中可能发生多种故障：


  - 进程/程序故障

  - 通信/链路故障

  - 存储故障


  分布式系统文献中已经正式定义了多种类型的故障。这些类型被归类在所谓的故障模型下，该模型基本上告诉我们可能发生哪种故障。


  我们现在对每一种故障定义如下。


  ## 崩溃-停止


  在这种情况下，进程可能在任何时间点无法停止某个功能。当节点发生硬件故障时，就可能导致这种情况。在此模型中，其他节点无法发现该节点的崩溃。


  ## 失效-停止


  在此模型中，进程可能因停止执行算法而失效。分布式系统中的其他节点通常可以通过使用故障检测器来获知此失效。


  ## 遗漏故障


  遗漏故障是指消息可能丢失的情况。


  ### 发送遗漏


  即进程未能成功发送消息。


  ### 接收遗漏


  即进程未能成功接收消息。


  ### 一般性遗漏


  即进程可能表现出发送遗漏或接收遗漏。


  ## 隐蔽故障


  该模型捕获了一种故障可能保持隐藏或未被检测到的行为。


  ## 计算故障


  在此场景中，我们捕获了处理器响应不正确的情况。


  #### 拜占庭故障


  该模型捕获了任意故障，即进程可能以任意多种方式失效。


  ### 带认证的拜占庭故障


  在此模型中，进程可能表现出任意行为；但是，可以通过使用身份认证和数字签名来验证接收到的消息。这种不可否认性和验证机制可以使处理拜占庭故障稍微容易一些。


  ### 不带认证的拜占庭故障


  在此模型中，进程可能表现出任意行为，但无法进行消息验证以确定消息的有效性。


  ## 时序故障


  即进程可能表现出行为缓慢或运行速度快于其他进程的情况。这初看可能像是部分同步的行为，但一个长时间未收到消息的节点可被视为这种故障类型的一个例子。这涵盖了预期消息传递与预期传递时间不符或超出指定时间间隔的场景。


  可以使用故障检测器来检测故障，在这种检测器中，进程可能被怀疑发生故障。例如，长时间未收到消息或已超过超时阈值的消息，可以被标记为故障进程。


  关于故障检测器的更多内容，请参见第 3 章；现在我们来了解什么是故障模型以及故障类别。


  在图 1-28 中，我们可以直观地看到各种故障类别，其中拜占庭故障以不同程度的复杂性涵盖了所有类型的故障，并且可能任意发生，而崩溃故障则是最简单的故障类型。


  由 5 个非同心圆组成的示意图。从外到内的组成部分分别是：拜占庭故障、计算故障、时序故障、遗漏故障、崩溃故障。


  **图 1-28** 故障模型与故障类别示意图


  故障类别让我们能够了解可能发生哪些故障，而故障模型则帮助我们了解系统可能表现出哪种类型的故障，以及我们的分布式算法中应容忍哪些类型的故障。


  一个只能容忍崩溃故障的系统或算法被称为崩溃容错，简称为 `CFT`。相比之下，能够处理拜占庭故障的系统或算法被称为拜占庭容错系统或算法。通常，这适用于以实现崩溃容错或拜占庭容错为目标而分类和开发的共识机制。我们将在第
  3 章讨论共识算法时进一步了解这一点。




  ##### 安全性与活性


  回想一下，我们在通信抽象中讨论过，广播协议和点对点链路具有某些属性。例如，公平丢失属性确保在公平丢失链路下，发送的消息最终会被投递。这种确保某事件最终会发生的属性被称为**活性**属性。通俗地说，这意味着最终会有好事情发生。


  同样，请记住，在公平丢失链路的有限重复属性中，我们提到消息存在有限次重复。这种可以在无限时间范围内被测量和观察的属性被称为**安全性**属性。通俗地说，这意味着坏事情永远不会发生。当然，如果你什么都不做，那么什么也不会发生，这在理论上满足了安全性属性；然而，在这种情况下，系统没有任何进展。因此，确保系统进展的**活性**属性也是必不可少的。


  这些属性被用于许多不同的分布式算法中，以论证协议的正确性。此外，它们也经常被用来描述共识协议的安全性和活性需求及属性。我们将在第 3 章中详细讨论分布式共识。


  安全性和活性是分布式算法的正确性属性。例如，十字路口交通信号灯的安全性和活性可以描述如下。此场景中的安全性属性是：在任何时刻，只有一个方向必须是绿灯，并且任何信号灯都不能同时亮起所有颜色。另一个安全性属性可能是系统不应关闭所有信号灯。而活性属性是，每个信号灯最终都必须获得绿灯通行。


  例如，在部分同步系统中，为了证明安全性属性，我们假设系统是异步的；而为了证明系统的活性，则使用部分同步假设。在部分同步系统中，系统的活性进展是有保障的——例如在
  GST（全局稳定时间）之后，当系统同步时间足够长，允许算法达成其目标并终止时，活性得以保证。


  对于一个实用的分布式系统，必须明确指定并保证其安全性与活性属性。


  ### 容错的形式


  一个正确的程序（分布式算法）应同时满足其安全性与活性属性。如果一个程序能容忍给定类别的故障，并保持**活性**和**安全性**，我们称这种容错类型为**屏蔽容错**。如果一个程序能保持安全性但无法保持活性，我们称之为**故障安全**容错。类似地，在存在故障的情况下，如果一个程序无法保持安全性（不安全）但能保持活性，这种行为被称为**非屏蔽容错**。如果一个程序在存在故障时既无活性也不安全，则意味着该程序不具备任何形式的容错能力。


  ## CAP 定理


  CAP 定理指出，一个分布式系统只能同时提供三个期望特性中的两个，即一致性、可用性和分区容错性。让我们首先定义这些术语，然后更深入地探讨该定理。


  ### 一致性


  一致性属性意味着数据在分布式系统的所有节点上应保持一致，并且同时连接到分布式系统的客户端应看到一致的相同数据。这通常通过复制来实现。


  ### 可用性


  可用性意味着即使存在故障，分布式系统也能响应客户端的请求。这通过使用容错技术（如复制、分区或分片）来实现。


  ### 分区容错性


  分区指的是两个或多个节点之间的通信链路中断的场景。分布式系统应能容忍这种情况并继续正常运行。


  我们知道，网络分区几乎是不可避免的；迟早会发生某种通信中断。这意味着，由于网络分区无法避免，真正的选择其实是在可用性和一致性之间做出取舍。问题就变成了：在发生分区时，我们愿意牺牲哪一个，一致性还是可用性？这完全取决于具体的用例。例如，在金融应用中，最好牺牲可用性以换取一致性；但在网页搜索结果中，我们或许可以牺牲一点一致性来换取可用性。需要注意的是，当没有网络分区时，一致性和可用性都能得到保证。但话说回来，如果网络分区发生了，我们该选择可用性还是一致性呢？


  如图 1-29 所示的维恩图可以用来直观理解这一概念。


  ![](img/515270_1_En_1_Fig29_HTML.png)


  一个由三个相交圆组成的示意图，分别代表一致性、可用性和分区容错性。C A、A P 和 C P 是它们的交集区域。


  图 1-29


  CAP 定理


  CAP 定理允许我们根据数据库（NoSQL 数据库）所支持的属性对其进行分类。例如，一个 **CP 数据库**提供一致性和分区容错性，但牺牲了可用性。在发生分区时，不一致的节点会被关闭，直到网络分区恢复。**AP
  数据库**牺牲一致性，但提供可用性和分区容错性。在发生网络分区时，由于分区而未能获得更新的节点可能会继续提供旧数据。这在某些场景（如网页搜索）下可能是可以接受的。当分区恢复后，不同步的节点会与最新更新同步。另一方面，**CA
  数据库**不具备分区容错性，只有在网络健康的情况下才能同时提供一致性和可用性。正如我们之前所见，网络分区是不可避免的；因此，CA 数据库仅存在于不发生网络分区的理想世界中。


  尽管 CAP 定理很有用，但在分布式计算领域还存在许多其他更精确的不可能性结果。


  现在我们来讨论什么是**最终一致性**。最终一致性指的是这样一种情况：节点之间可能不一致，或者未能更新其本地数据库，但最终，状态会达成一致并完成更新。


  这种场景的一个例子是：电子投票系统收集选民的投票，并将它们写入一个中央投票注册系统。然而，可能由于网络分区，中央投票注册系统的通信链路中断，该投票机无法将数据写入后端的投票注册系统。此时，它可以继续接收用户的投票并在本地记录，当网络分区恢复后，再将选票写回中央投票注册系统。在网络分区期间，从中央投票注册系统的角度来看，投票计数与投票机所看到的数值不同。当分区恢复后，投票机可以将数据写回中央投票注册系统以实现一致性。后端服务器存储与本地存储之间的一致性并非立即达成，而是随着时间的推移逐渐实现，这种一致性类型被称为最终一致性。


  比特币现在是一个已得到公认的最终一致性系统示例。我们将在第 4 章中进一步学习相关内容，并了解比特币是如何实现最终一致性的。




  '
- '# 域名系统与分布式共识


  域名系统（DNS）是应用最广泛、最终保证一致性的系统。当域名更新时，它会按照配置的模式进行分发，最终所有客户端都能看到更新内容。


  从 CAP 定理的角度来看，分布式共识属于 CP 系统，它牺牲了可用性以换取一致性。因此，分布式共识被用于提供强一致性保证。


  例如，假设你有一个五节点系统，其中三个节点发生故障，那么整个系统将停滞，直到另外三个节点恢复。这样做的目的是维护一致性保证，即使系统在一段时间内不可用。


  以比特币为例，它看起来像是 AP 系统，由于分叉，会在短时间内牺牲一致性，但最终仍能达到一致。因此，比特币也可以被视为一个最终实现强一致性的 CP 系统。


  通常，强一致性（也称为线性一致性）是分布式共识的目标；然而，像比特币这类系统中的最终一致性也是可接受的。


  ## 分布式系统中的密码学


  分布式系统在充满挑战的环境中运行，面临着对手攻击、故障和不可信用户的威胁。在这种条件下，保护分布式系统免受所有威胁变得至关重要。因此，必须采取适当的安全措施来挫败任何破坏系统的企图。


  分布式系统中所需的常见安全服务包括机密性、完整性、访问控制和身份认证。为此，密码学在分布式系统中发挥着至关重要的作用。


  密码协议通过利用对称密码、非对称密码和哈希函数等密码学原语，在分布式系统中提供安全服务。


  我们将在第 2 章中讨论这个主题，届时我们将研究密码学的基础知识及其在分布式系统和区块链中的应用。第 2 章将介绍几种在共识协议和区块链中有助于实现数据完整性和相关安全目的的原语。


  ## 本章小结


  我们在本章中讨论了以下几个主题：


  - 分布式系统是一组相互连接的计算机，通过消息传递协同工作以实现共同目标。

  - 分布式系统面临若干挑战，其中最突出的是：(1) 缺乏全局知识和一致性认知，(2) 缺乏全局时间，(3) 实现一致性，以及 (4) 故障处理。

  - 分布式系统模型使我们能够对整个系统进行推理，并抽象掉所有不必要的细节。

  - 闰秒错误曾导致互联网服务严重中断，人们已经开发了多种技术来解决这一问题。

  - 分布式系统必须确保安全性和活性属性。

  - 崩溃容错分布式算法仅处理崩溃故障，而拜占庭容错算法则用于处理任意类型的故障。

  - 逻辑时钟不依赖于物理时钟，可用于定义分布式系统中事件的顺序。

  - 在分布式系统中，所有计算机上同时运行相同的算法以实现共同目标。

  - CAP 定理指出，分布式系统只能同时满足三个理想特性中的两个，即一致性、可用性和分区容错性。


