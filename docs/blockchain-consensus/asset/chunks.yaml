- fmt: "# Proof of Stake\n\nEven though Bitcoin’s PoW has proven to be a resilient\
    \ and robust protocol, it has several limitations:\n\n- Excessive energy consumption\n\
    - Slow rate of block generation\n- Becoming centralized due to the requirement\
    \ of specialized hardware and large mining pools\n- Probabilistic finality which\
    \ is not suitable for most of the applications\n- Not a perfect consensus algorithm,\
    \ some attacks exist, for example, Goldfinger attack, 51% attack\n- Barrier to\
    \ entry getting higher as a special hardware requirement to mine\n- Not scalable\
    \ enough to support usual high throughput applications\n\nSignificant research\
    \ has been ongoing to address the abovementioned weaknesses. Especially, high\
    \ energy consumption from the limitations mentioned earlier led to the development\
    \ of alternatives. Proof of stake is one such alternative.\n\nProof of stake first\
    \ appeared in Peercoin in 2012. Later, many blockchains adopted this mechanism,\
    \ such as EOS, NxT, Steem, Tezos, and Cardano. In addition, Ethereum, with its\
    \ Serenity release, will soon transition to a PoS-based consensus mechanism. Proof\
    \ of stake is also called virtual mining. This is so because in PoS instead of\
    \ requiring miners to allocate compute resources to solve a puzzle, the right\
    \ to produce the next block is decided on the basis of what value the miner possesses.\
    \ This valuable possession can be anything of value (usually coins) that aligns\
    \ with the interest of the network. PoW’s motto was one CPU = one vote, whereas\
    \ we can think of PoS as one coin = one vote.\n\nThe next proposer is usually\
    \ elected randomly. Proposers are incentivized either with transaction fees or\
    \ block rewards. Like PoW, control over the majority of the network in the form\
    \ of controlling a large portion of the stake is required to attack and control\
    \ the network.\n\nPoS protocols usually select stakeholders and grant suitable\
    \ rights based on their staked assets. The stake calculation is application specific\
    \ but is typically based on the total balance, deposited value, or voting between\
    \ the validators. Once the stake is calculated and a stakeholder is selected as\
    \ the block proposer, the block proposed by the proposer is readily accepted.\
    \ The higher the stake, the better the chances of winning the right to propose\
    \ the next block.\n\nA general scheme of a PoS scheme is shown in Figure [8-1](#515270_1_En_8_Chapter.xhtml#Fig1).\n\
    \n![](`images/515270_1_En_8_Chapter/515270_1_En_8_Fig1_HTML.jpg`)\n\nA flowchart\
    \ of the stake scheme has the following flow. Previous block hash, T x to T x;\
    \ calculator; new proposer selection; selected; yes, stop.\n\nFigure 8-1\nProof\
    \ of stake scheme\n\nAs shown in Figure [8-1](#515270_1_En_8_Chapter.xhtml#Fig1),\
    \ PoS uses a stake calculator function to calculate the amount of staked funds,\
    \ and, based on that, it selects a new proposer.\n\nThe next proposer is usually\
    \ elected randomly. Proposers are incentivized either with transaction fees or\
    \ block rewards. Control over most of the network by having a large portion of\
    \ the stake is needed to attack the network.\n\nThere is some element of randomness\
    \ introduced in the selection process to ensure fairness and decentralization.\
    \ Other factors in electing a proposer include the age of the tokens, which takes\
    \ into account for how long the staked tokens have been unspent; the longer the\
    \ tokens have been unspent, the better the chances to be elected.\n\nThere are\
    \ several types of PoS:\n\n- Chain-based PoS\n- BFT-based PoS\n- Committee-based\
    \ PoS\n- Delegated proof of stake\n- Liquid proof of stake\n\n## Chain-Based PoS\n\
    \nThis scheme is the first alternative proposed to PoW. It was used first in Peercoin\
    \ in 2012. This mechanism is like PoW; however, the block generation method is\
    \ changed, which finalizes blocks in two steps:\n\n- Pick transactions from the\
    \ memory pool and create a candidate block.\n- Set up a clock with a constant\
    \ tick interval. At each clock tick, check whether the hash of the block header\
    \ concatenated with the clock time is less than the product of the target value\
    \ and the stake value. We can show this simple formula as follows:\n\n```\nHash\
    \ (B_h || clock time) < target * stake value\n```\n\nThe stake value depends on\
    \ how the algorithm works. In some chains, it is proportional to the amount of\
    \ stake. In others, it is based on the amount of time the participant has held\
    \ the stake. The target is the mining difficulty per unit of the value of the\
    \ stake.\n\nThis mechanism uses hashing puzzles, as in PoW. But, instead of competing\
    \ to solve the hashing puzzle by consuming high energy and using specialized hardware,\
    \ the hashing puzzle in PoS is solved only once at regular clock intervals. A\
    \ hashing puzzle becomes proportionally easier to solve if the stake value of\
    \ the miner is high. This contrasts with PoW where repeated brute-force hashing\
    \ is required to solve the math puzzle.\n\n## Committee-Based PoS\n\nIn this scheme,\
    \ a group of stakeholders is chosen randomly, usually using a verifiable random\
    \ function (VRF). The VRF produces a random set of stakeholders based on their\
    \ stake and the current state of the blockchain. The chosen group of stakeholders\
    \ becomes responsible for proposing blocks in sequential order.\n\nA general scheme\
    \ is described as follows:\n\n- A validator joins the network and deposits a stake.\n\
    - Participate in the committee election process and keep checking its turns.\n\
    - When it’s the turn, collect transaction, generate block, append the new block\
    \ in the chain, and finally broadcast the block.\n- At the other receiver nodes,\
    \ verify the block; if valid, append the block into the blockchain and gossip\
    \ the block to others.\n\nThe committee election produces a pseudorandom sequence\
    \ of turns for validators to produce blocks. Ouroboros Praos and BABE are common\
    \ examples of committee-based PoS.\n\n## BFT-Based PoS\n\nIn this scheme, the\
    \ blocks are generated using a proof of stake mechanism where a block proposer\
    \ is chosen based on the proof of stake which proposes new blocks. The proposer\
    \ is elected based on the stake deposited in the system. The chance of being chosen\
    \ is proportional to the amount of stake deposited in the system. The proposer\
    \ generates a block and appends it to a temporary pool of blocks from which the\
    \ BFT protocol finalizes one block.\n\nA general scheme works as follows:\n\n\
    - Elect a block proposed based on the PoS mechanism, proportional to a stake.\n\
    - Proposer: Propose a new block, add to a temporary block pool, and broadcast\
    \ the new block.\n- Receiver: When other nodes receive this, they validate the\
    \ block and, if valid, add to the local temporary block pool.\n- During the consensus\
    \ epoch:\n  - Run BFT consensus to finalize a valid (most voted) block.\n  - Add\
    \ the most voted valid block to the main blockchain.\n  - Remove other blocks\
    \ from the temporary block pool.\n\nTendermint in Cosmos is one example where\
    \ the validator is chosen based on a stake, and the rest of the protocol works\
    \ on BFT principles. Other examples include Casper FFG.\n\nBFT-based PoS is fault\
    \ tolerant as long as two-thirds of validators remain honest. Also, blocks are\
    \ finalized immediately."
