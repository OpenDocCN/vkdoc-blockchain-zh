  trans: "\n# GPS 作为时间源\n\nGPS 接收器可用作精确的时间源。所有 31 颗 GPS 卫星上都搭载了原子钟，能够产生精确的时间。这些卫星会广播其位置和时间，GPS\
    \ 接收器在接收信号后，会应用对环境因素和时间膨胀的修正，计算出地球上的时间和位置。请记住，根据相对论，GPS 卫星上的时间比地球表面的物体运行得稍快一些。其他与相对论相关的影响还包括时间膨胀、引力频移和偏心率效应。所有这些误差以及许多其他修正都会被处理，然后才能在\
    \ GPS 接收器上显示精确的时间。虽然 GPS 作为精确时间源具有很高的精度，但在网络中，即使在 GPS 接收器处获得了正确且精确的时间，之后引入的固有延迟仍会导致时钟随时间产生漂移和偏移。因此，需要引入一些时钟同步算法来解决这一局限。\n\
    \nGoogle 的 Spanner（Google 的全球分布式数据库）结合使用了原子钟和 GPS 来处理时间不确定性。\n\n然而，请注意，即使付出所有这些努力，时钟也不可能实现完美同步，但这对于大多数应用来说已经足够。然而，这些非常精确的时钟仍然不足以捕捉分布式系统中事件之间的因果关系。事件之间的因果关系以及基本的单调性属性可以通过逻辑时钟来精确捕捉。\n\
    \n在分布式系统中，即使每个进程都有一个本地时钟，并与某个全局时间源同步，每个本地处理器所看到的时间仍然可能存在差异。时钟会随时间漂移，处理器可能出现故障，或者存在固有的漂移（例如石英钟或\
    \ GPS 系统），这使得在分布式系统中处理时间变得极具挑战性。\n\n设想一个分布式系统，其中某些节点在轨道上，而另一些节点在地球上的不同地理位置，并且它们都同意使用协调世界时（UTC）。卫星或国际空间站上的物理时钟会以不同的速率运行，偏移是不可避免的。依赖物理时钟的核心局限在于，即使试图完美同步它们，时间戳也会略有差异。然而，这些物理时钟**不能（也不应该）**\
    \ 用于确定分布式系统中事件的顺序，因为很难基于不同节点上的时间戳来准确找出事件的全局顺序。\n\n物理时钟并不非常适合分布式系统，因为它们可能产生漂移。即使有统一的来源（例如通过\
    \ NTP 同步的原子钟），它们仍可能随时间与源发生漂移和失同步。哪怕只有一秒的差异，有时也可能导致重大问题。此外，软件实现中的 bug 也可能导致意外后果。例如，来看一个著名的\
    \ Bug——“闰秒 Bug”，它曾导致互联网服务严重中断。\n\n# UTC 时间\n\n协调世界时（UTC）是一种在全世界范围内使用的时间标准。构成协调世界时的两个时间源如下：\n\
    \n- **国际原子时（TAI）**\n  - 国际原子时基于全球约 400 台原子钟。综合并加权这些原子钟的输出。其精度极高，大约每 1 亿年才会偏差 1\
    \ 秒！\n- **天文时间**\n  - 此时间基于天文观测，即地球的自转。\n\n虽然国际原子时精度很高，但它没有考虑地球自转，即决定一天真实长度的天文观测时间。地球的自转并非恒定不变。它偶尔会加快，且总体上在减慢。因此，一天并非精确的\
    \ 24 小时。对地球自转的影响来自月球等天体、潮汐以及其他环境因素。因此，UTC 会不断与天文时间进行比较，任何差异都会累加到 UTC 中。这种差异以闰秒的形式添加；在国际原子时与天文时间的差异达到\
    \ 0.9 秒之前，就会向 UTC 添加一个闰秒。这是自 1972 年以来一直采用的惯例。\n\n好吧，这似乎是保持两种时间同步的合理解决方案；然而，计算机似乎并不能很好地处理这种情况。Unix\
    \ 系统使用 Unix 时间（纪元时间），即自 1970 年 1 月 1 日以来经过的秒数。添加闰秒时，时钟的显示如下：在正常情况下，观察到 `23:59:59`\
    \ 之后是 `00:00:00`。然而，添加闰秒后，似乎是 `23:59:59` 之后是 `23:59:60`，然后才是 `00:00:00`。换句话说，`23:59:59`\
    \ 会经历两次。当 Unix 时间处理这个额外增加的秒时，可能会产生不可预测的行为。过去，在添加闰秒时，互联网上的服务器曾出现问题，甚至像航空公司订票系统这样关键的服务也受到了影响。\n\
    \n一种称为“闰秒平摊”的技术已经被开发出来。它允许在一天内逐渐添加几毫秒，以解决突然添加一秒以及与此突然增加的一秒相关的问题。\n\n好了，到目前为止，我们看到\
    \ UTC 和天文时间是通过添加闰秒来同步的。利用“闰秒平摊”技术，我们可以逐渐添加一个闰秒，这缓解了与突然添加闰秒相关的一些问题。也有人呼吁彻底废除这一做法。然而，就目前而言，我们认为添加闰秒是一个合理的解决方案，似乎也基本可行。当地球自转变慢时，我们就添加一个闰秒。但如果地球自转变快了呢？2020\
    \ 年，地球确实自转变快了，原因暂且不论。现在的问题是，我们是否应该从 UTC 中移除一秒？换句话说，引入负闰秒！这种情况可能会带来更多挑战——甚至可能比添加闰秒更难处理。\n\
    \n问题是，对此该怎么办？忽略它？用什么算法可以移除一秒并引入负闰秒？\n\n到目前为止，有人建议直接跳过 `23:59:59`，即从 `23:59:58`\
    \ 直接到 `00:00:00`。预计这比添加闰秒更容易处理。也许，根本不需要解决方案，因为我们可以完全忽略地球自转变快或变慢的现象，并废除闰秒调整的做法，无论是负调整还是正调整。这并不理想，但我们可能会这样做，以避免处理闰秒（尤其是添加闰秒！）所带来的问题和歧义。在撰写本文时，这仍是一个悬而未决的问题。\n\
    \n更多信息可在此处找到：[`https://fanf.dreamwidth.org/133823.html`](https://fanf.dreamwidth.org/133823.html)（负闰秒）和\
    \ [`www.eecis.udel.edu/~mills/leap.html`](https://www.eecis.udel.edu/%257Emills/leap.html)。\n"
- fmt: '# 分布式系统中的逻辑时钟与物理时钟


    为了避免与物理时钟及同步相关的限制和问题，在分布式系统中，我们可以使用逻辑时钟。逻辑时钟与物理时钟无关，但对分布式系统中的事件进行排序是一种有效方式。尽管如我们所知，事件排序与因果关系是分布式系统的基本要求，但逻辑时钟在确保这一点的过程中扮演着至关重要的角色。


    从分布式系统的角度来看，我们之前已经了解到全局状态的概念非常重要。它使我们能够观察分布式系统的状态，并有助于快照或检查点操作。因此，时间在这里起着关键作用：如果整个系统的时间不统一（即每个处理器运行在不同时间），当我们尝试读取系统中所有不同处理器和链路的状态时，将会导致不一致的状态。


    ## 物理时钟的类型


    物理时钟可分为两类：


    1.  一天中的时间时钟

    2.  单调时钟


    **一天中的时间时钟**的特点是从某个固定时刻开始表示时间。例如，从1970年1月1日开始计算的Unix时间就是一种一天中的时间时钟。这种时间可以通过同步调整到某个时间源，并且可以向前或向后调整。然而，将时间向后调整不是一个好主意。这种情况可能导致例如消息看起来是在发送之前被接收的问题。这种问题可能由于时间戳被调整，并且因为同步算法（例如`NTP`）所做的调整而导致时间向后移动而产生。


    由于时间总是增加的，因此时间不应该倒退；我们需要**单调时钟**来处理此类场景。


    使用物理时钟几乎不可能提供因果关系。即使使用了时间同步服务，一个进程的时间戳与另一个进程的时间戳仍可能存在微小差异，从而对事件顺序产生不利影响。因此，事件排序是分布式系统中的一个基本需求。为了充分理解这种排序需求的性质，我们引入一个名为“happens-before关系”的形式化概念。


    在介绍happens-before关系和因果关系之前，让我们先澄清一些基本的数学概念。这不仅有助于我们理解因果关系，也有助于理解本书后面讲解的概念。


    ### 集合


    **集合**是元素的集合。它用大写字母表示。集合的所有元素都列在花括号内。如果元素`x`存在于集合中，则记为`x ∈ X`，意思是`x`属于`X`。同样地，如果元素`x`不在集合`X`中，则记为`x
    ∉ X`。元素的顺序无关紧要。如果两个集合具有相同的元素，则它们相等。相等关系表示为`X = Y`，即集合`X`等于集合`Y`。如果两个集合`X`和`Y`不相等，则记为`X
    ≠ Y`。没有任何元素的集合称为空集，记为`{}`或`ϕ`。集合的一个示例如下：


    ```

    X = {1, 5, 2, 8, 9}

    ```


    如果集合`Y`的每个元素也是集合`X`的元素，则集合`Y`是集合`X`的子集，例如：


    ```

    Y = {2, 8}

    ```


    集合`Y`是集合`X`的子集。这种关系记为：


    ```

    Y ⊆ X

    ```


    两个集合`A`和`B`的并集包含`A`和`B`中的所有元素，例如：


    ```

    A = {1, 2, 3}

    ```

    和

    ```

    B = {3, 4, 5}

    ```


    集合`A`和`B`的并集是：


    ```

    S = {1, 2, 3, 4, 5}

    ```


    两个集合`A`和`B`的笛卡尔积是所有有序对`(a, b)`的集合。它记为`A × B`。它是对于每个`a ∈ A`和`b ∈ B`的所有有序对`(a, b)`的集合。


    有序对由两个用括号括起来的元素组成，例如`(1, 2)`或`(2, 1)`。请注意，在有序对中元素的顺序很重要，而在集合中元素的顺序无关紧要。例如，`(1,
    2)`与`(2, 1)`不同，但`{1, 2}`和`{2, 1}`是相同的集合。


    前面给出的集合`A`和`B`的笛卡尔积`A × B`的一个示例如下：


    ```

    {(1,3), (1,4), (1,5), (2,3), (2,4), (2,5), (3,3), (3,4), (3,5)}

    ```


    注意，在有序对中，第一个元素取自集合`A`，第二个元素取自集合`B`。


    ### 关系


    两个集合`A`和`B`之间的（二元）**关系**是笛卡尔积`A × B`的一个子集。


    两个元素之间的关系是二元的，可以表示为一组有序对。我们可以将其表示为`a R b`（中缀表示法）或`(a, b) ∈ R`，即有序对`(a, b)`在关系`R`中。


    当集合`S`上的二元关系具有自反性、对称性和传递性等性质时，它被称为**等价关系**。


    当集合`S`上的二元关系具有自反性、反对称性和传递性三个性质时，它被称为`S`上的**偏序**。


    ### 偏序


    **偏序**是集合`S`的元素之间的一个二元关系`≤`（用于比较的小于或等于）。集合`S`上的一个二元关系，如果它是自反的、反对称的和传递的，则称为`S`上的偏序。我们现在定义这三个条件。


    #### 自反性


    这个性质意味着每个元素都与自身相关。数学上可以这样写：∀`a` ∈ `S`, `a` ≤ `a`。


    #### 反对称性


    这意味着两个元素不能彼此在两个方向上相关。数学上可以写为：∀`a`, `b` ∈ `S`, 如果`a` ≤ `b` 且 `b` ≤ `a`, 则 `a` =
    `b`。


    #### 传递性


    传递性表示一种比较关系：如果 `a` < `b` 且 `b` < `c`，则意味着 `a` < `c`。数学上可以写为：∀`a`, `b`, `c` ∈ `S`,
    如果 `a` ≤ `b` 且 `b` ≤ `c`，则 `a` ≤ `c`。


    带有偏序的集合称为偏序集或`poset`。就happens-before关系而言，集合`S`是所有事件的集合。


    ### 非自反偏序


    非自反偏序或严格偏序是非自反的、反对称的和传递的。


    #### 非自反性


    这个性质意味着没有元素与自身相关。数学上可以这样写：∀`a` ∈ `S`, `a` ≰ `a`，或者给定集合`S`上的关系`R`，如果∀`s` ∈ `S`
    : `(s, s)` ∉ `R`，则`R`是非自反的。


    ### 全序


    **全序**或线性序是一种偏序，其中每一对元素都是可比较的。


    在简要介绍了一些数学概念之后，现在让我们来看看什么是因果关系以及什么是happens-before关系。'
  raw: 'To avoid limitations and problems associated with physical clocks and synchronization,
    for distributed systems, we can use logical clocks, which have no correlation
    with physical clocks but are a way to order the events in a distributed system.
    Although, as we have seen, ordering of events and a causal relationship is an
    essential requirement in distributed systems, logical clocks play a vital role
    in ensuring this in distributed systems.


    From a distributed system point of view, we learned earlier that the notion of
    global state is very important, which allows us to observe the state of a distributed
    system and helps to snapshot or checkpoint. Thus, time plays a vital role here
    because if time is not uniform across the system (each processor running at a
    different time), and we try to read states from all different processors and links
    in a system, it will result in an inconsistent state.


    #### Types of Physical Clocks


    Physical clocks can be divided into two categories:


    1.  Time-of-day clocks


    2.  Monotonic clocks


    Time-of-day clocks are characterized by the representation of time since a fixed
    point in time. For example, Unix time that is calculated from January 1, 1970
    is an example of a time-of-day clock. The time can be adjusted via synchronization
    to a time source and can move backward or forward. However, moving the time backward
    is not a good idea. Such a scenario can lead to situations where, for example,
    it would appear that a message is received before it was sent. This issue can
    happen due to the timestamp being adjusted and moving backward in time due to
    adjustments made by the synchronization algorithms, for example, NTP.


    As the time always increases, time shouldn’t go backward; we need monotonic clocks
    to handle such scenarios.


    With physical clocks, it is almost impossible to provide causality. Even if time
    synchronization services are used, there is still a chance that the timestamp
    of one process differs from another just enough to impact the order of events
    adversely. Thus, the ordering of events is a fundamental requirement in distributed
    systems. To fully understand the nature of this ordering requirement, we use a
    formal notion of something called "happens-before relationship."


    Just before we introduce the happens-before relationship and causality, let us
    clarify some basic math concepts first. This will help us to not only understand
    causality but will also help with concepts explained later in this book.


    ##### Set


    A set is a collection of elements. It is denoted by a capital letter. All elements
    of the set are listed inside the brackets. If an element x is present in a set,
    then it is written as *x* ∈ *X*, which means x is in X or x belongs to X. Similarly,
    if an element x is not present in a set X, it is written as *x* ∉ *X*. It does
    not matter which order the elements are in. Two sets are equal if they have the
    same elements. Equality is expressed as *X* = *Y*, meaning set X is equal to set
    Y. If two sets X and Y are not equal, it is written as *X* ≠ *Y*. A set that does
    not have any elements is called an empty set and is denoted as { } or *ϕ*. An
    example of a set is


    ![$$ X=\left\{1,5,2,8,9\right\} $$](images/515270_1_En_1_Chapter/515270_1_En_1_Chapter_TeX_Equa.png)


    A set Y is a subset of set X if every element of Y is also an element of X, for
    example:


    ![$$ Y=\left\{2,8\right\} $$](images/515270_1_En_1_Chapter/515270_1_En_1_Chapter_TeX_Equb.png)


    Set Y is a subset of set X. This relationship is written as


    ![$$ Y\subseteq X $$](images/515270_1_En_1_Chapter/515270_1_En_1_Chapter_TeX_Equc.png)


    A union of two sets A and B contains all the elements in A and B, for example:


    ![$$ A=\left\{1,2,3\right\} $$](images/515270_1_En_1_Chapter/515270_1_En_1_Chapter_TeX_Equd.png)


    and


    ![$$ B=\left\{3,4,5\right\} $$](images/515270_1_En_1_Chapter/515270_1_En_1_Chapter_TeX_Eque.png)


    A union of sets A and B is


    ![$$ S=\left\{1,2,3,4,5\right\} $$](images/515270_1_En_1_Chapter/515270_1_En_1_Chapter_TeX_Equf.png)


    The cartesian product of two sets A and B is the set of ordered pairs (a, b) for
    each element in sets A and B. It is denoted as *A* × *B*. It is a set of ordered
    pairs (a, b) for each *a* ∈ *A* and *b* ∈ *B*.


    An ordered pair is composed of two elements inside parentheses, for example, (1,
    2) or (2, 1). Note here that the order of elements is important and matters in
    the case of ordered pairs, whereas in sets the order of elements does not matter.
    For example, (1, 2) is not the same as (2, 1), but {1,2} and {2,1} are the same
    or equal sets.


    An example of a cartesian product, *A* × *B*, for sets shown earlier is


    {(1,3), (1,4), (1,5), (2,3), (2,4), (2,5), (3,3), (3,4), (3,5)}


    Note that in the ordered pair, the first element is taken from set A and the second
    element from set B.


    ##### Relation


    A relation (binary) between two sets A and B is a subset of the cartesian product
    *A* × *B*.


    The relationship between two elements is binary and can be written as a set of
    ordered pairs. We can express this as a R b (infix notation) or (a, b) \in R,
    meaning the ordered pair (a, b) is in relation R.


    When a binary relation on a set S has properties of reflexivity, symmetry, and
    transitivity, it is called an **equivalence relation**.


    When a binary relation on a set S has three properties of reflexivity, antisymmetry,
    and transitivity, then it is called a **partial ordering** on S.


    ##### Partial Order


    It is a binary relation ≤ (less than or equal to – for comparison) between the
    elements of a set S. A binary relation on a set S, which is reflexive, antisymmetric,
    and transitive, is known as a partial ordering on S. We now define the three conditions.


    ###### Reflexivity


    This property means that every element is related to itself. Mathematically, we
    can write it like this: ∀*a* ∈ *S*, *a* ≤ *a*.


    ###### Antisymmetry


    This means that two elements cannot be related in both directions. Mathematically,
    it can be written as ∀*a*, *b* ∈ *S*, *if a* ≤ *b* ∧ *b* ≤ *a*, *a* = *b*.


    ###### Transitivity


    The transitive property indicates a comparative relationship where if *a* < *b*
    and *b* < *c*, it implies that *a* < *c*. Mathematically, it can be written as
    ∀*a*, *b*, *c* ∈ *S*, *if a* ≤ *b* ∧ *b* ≤ *c then a* ≤ *c*.


    A set with a partial order is called a partially ordered set or poset. In terms
    of the happens-before relationship, the set S is a set of all events.


    ##### Irreflexive Partial Order


    The irreflexive partial order or strict partial order is irreflexive, antisymmetric,
    and transitive.


    ###### Irreflexive


    This property means that there is no element that is related to itself. Mathematically,
    we can write it like ∀*a* ∈ *S*, *a* ≰ *a*, or given a relation R on a set S,
    R is irreflexive if ∀*s* ∈ *S* : (*s*, *s*) ∉ *R*.


    ##### Total Order


    A total order or linear order is a partial order in which each pair of elements
    is comparable.


    After this brief introduction to some math concepts, let us now look into what
    causality is and what is a happens-before relationship.'
