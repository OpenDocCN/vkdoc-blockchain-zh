    \ runs, leading to consensus and a reply to the client.\n\nThis sequence of operations\
    \ is composed of three phases:\n\n*   Pre-prepare\n\n*   Prepare\n\n*   Commit\n\
    \nIn addition, each replica maintains a local state containing three main elements:\n\
    \n*   A service state\n\n*   A message log\n\n*   A number representing that replica’s\
    \ current view\n\nLet’s look at each of the phases in detail.\n\n**Pre-prepare\
    \ phase – phase 1**\n\nWhen the primary node receives a request from the client,\
    \ it assigns a sequence number to the request. It then sends the pre-prepare message\
    \ with the request to all backup replicas.\n\nWhen the backup replicas receive\
    \ the pre-prepare message, they check several things to ensure the validity of\
    \ the message:\n\n*   Whether the digital signature is valid.\n\n*   Whether the\
    \ current view number is valid, that is, the replica is in the same view.\n\n\
    *   Whether the sequence number of the operation’s request message is valid, for\
    \ example, if the same sequence number is used again, the replica will reject\
    \ the subsequent request with the same sequence number.\n\n*   If the hash of\
    \ the request message is valid.\n\n*   No previous pre-prepare message received\
    \ with the same sequence number and view but a different hash.\n\nIf all these\
    \ checks pass, the backup replicas accept the message, update their local state,\
    \ and move to the prepare phase.\n\nIn summary, the pre-prepare phase\n\n*   Accepts\
    \ a request from the client."
  trans: "\n### 保证与正确性\n\nRAFT 提供的保证如下：\n\n- **选举正确性**\n  - **选举安全性**：每个任期最多只能选出一名领导者。\n\
    \  - **选举活跃性**：必定会有某个候选者最终成为领导者。\n- **领导者仅追加日志**：领导者只能向日志中追加条目，不允许覆盖或删除已有条目。\n\
    - **日志匹配**：如果两台不同服务器上的日志中存在索引和任期都相同的条目，那么这两条日志在此之前的所有条目完全相同，并且存储着相同的命令。\n- **领导者完备性**：在给定任期内已提交的日志条目，将始终存在于未来所有领导者（即任期号更大的领导者）的日志中。此外，日志不完整的节点绝不能当选。\n\
    - **状态机安全性**：如果某个节点已将特定索引的日志条目应用到其状态机，那么其他任何节点都不会对同一索引应用不同的日志条目。\n\n选举正确性要求同时满足安全性与活跃性。安全性意味着每个任期只允许存在一个领导者。活跃性则要求某个候选者必须最终获胜并成为领导者。为确保安全性，每个节点在一个任期内仅投票一次，并将投票记录持久化存储。竞选需要获得多数票才能获胜；不可能有两个不同候选者同时获得多数票。\n\
    \n在领导者选举过程中可能发生选票分裂。如果两个节点同时当选，就会产生所谓的\"选票分裂\"。RAFT 使用随机化的选举超时时间来确保该问题能快速解决。这之所以有效，是因为随机超时机制使得只有一个节点能在其他节点超时之前超时并赢得选举。实践中，只要选择的随机时间大于网络广播时间，这种方法就能良好运作。\n\
    \n日志匹配实现了日志间的高度一致性。我们假定领导者没有恶意行为。领导者绝不会添加两个具有相同索引和任期的条目。日志一致性检查确保了所有先前条目都完全相同。领导者会追踪其日志中已提交的最新索引，并在每次\
    \ `AppendEntries` RPC 中广播此信息。如果跟随者节点的日志中没有具有相同索引编号的条目，它将不会接受传入的条目。然而，如果跟随者接受了\
    \ `AppendEntries` RPC，领导者就知道双方日志是一致的。除非网络发生故障，否则日志通常保持一致。若出现不一致，日志一致性检查会确保节点最终追赶上来并达成一致。如果日志不一致，领导者会向可能未收到之前消息、或曾崩溃现已恢复的跟随者重新传输缺失的条目。\n\
    \n重配置和日志压缩是 RAFT 两个有用的特性。此处未作讨论，因为它们与核心共识协议没有直接关系。如需了解更多细节，可参考参考文献中提到的原始 RAFT\
    \ 论文。\n\n## PBFT\n\n还记得吗，我们之前在本书中讨论过口头消息协议和拜占庭将军问题。虽然它解决了拜占庭协议问题，但并非一个实用的解决方案。口头消息协议仅在同步环境下有效，且计算复杂度（运行时间）很高，除非只有一个故障处理器——这在现实中是不切实际的。然而，在实践中，系统会表现出一定程度的通信和处理器异步性。在真实环境中，过长的算法运行时间也是不可接受的。\n\
    \n1999 年，Castro 和 Liskov 提出了一种实用的解决方案——实用拜占庭容错（PBFT）。顾名思义，这是一种旨在存在拜占庭故障时提供共识的协议。在\
    \ PBFT 出现之前，拜占庭容错被认为是不切实际的。借助 PBFT，这两位研究者首次证明了实用拜占庭容错是可行的。\n\nPBFT 包含三个子协议：正常运行、视图变更和检查点。正常运行子协议是指在一切正常运行、系统无错误时执行的机制。视图变更子协议在检测到系统中有故障领导者节点时运行。检查点子协议用于丢弃系统中的旧数据。\n\
    \nPBFT 协议包含三个阶段。这些阶段依次运行以完成一次协议运行。这三个阶段分别是预准备、准备和提交，我们稍后将详细讨论。在正常情况下，一次协议运行就足以达成共识。\n\
    \n该协议按轮次运行，在每一轮中，一个称为主节点的领导者节点负责处理与客户端的通信。在每一轮中，协议依次经历前面提到的三个阶段。PBFT 协议的参与者被称为副本。在每一轮中，其中一个副本成为领导者（主节点），其余节点作为备份节点。PBFT\
    \ 实现了我们之前讨论过的状态机复制。每个节点维护一个本地日志，并通过共识协议 PBFT 使各日志保持同步。\n\n至此我们知道，在部分同步环境中，要容忍拜占庭故障所需的最小节点数为\
    \ `n = 3f + 1`，其中 `n` 是节点数量，`f` 是故障节点数量。只要系统中的节点数量满足 `n >= 3f + 1`，PBFT 就能确保拜占庭容错。\n\
    \n当客户端向主节点（领导者）发送请求时，副本之间会执行一系列操作，从而达成共识并向客户端回复。\n\n这一系列操作由三个阶段组成：\n\n- 预准备\n\
    - 准备\n- 提交\n\n此外，每个副本维护一个包含三个主要元素的本地状态：\n\n- 服务状态\n- 消息日志\n- 代表该副本当前视图的数字\n\n\
    下面我们来详细看看每个阶段。\n\n### 预准备阶段 – 阶段一\n\n当主节点收到客户端的请求时，它会为该请求分配一个序列号。然后，主节点将带有该请求的预准备消息发送给所有备份副本。\n\
    \n当备份副本收到预准备消息时，它们会检查以下几项以确保消息的有效性：\n\n- 数字签名是否有效。\n- 当前视图编号是否有效，即副本是否处于同一视图。\n\
    - 操作请求消息的序列号是否有效，例如，如果同一序列号被重复使用，副本将拒绝后续具有相同序列号的请求。\n- 请求消息的哈希值是否有效。\n- 之前是否未收到过具有相同序列号和视图但哈希值不同的预准备消息。\n\
    \n如果所有这些检查都通过，备份副本就接受该消息，更新其本地状态，并进入准备阶段。\n\n总结一下，预准备阶段：\n\n- 接受来自客户端的请求。\n"
- fmt: '# PBFT 协议详解


    - 向它分配下一个序列号。该序列号是请求将要执行的顺序。

    - 将此信息作为预准备消息广播给所有备份副本。


    此阶段为客户端请求分配唯一的序列号。我们可以将其视为一个排序器，对客户端请求应用顺序。


    ## 准备阶段 – 阶段 2


    每个备份副本向系统中的所有其他副本发送`prepare`消息。每个备份副本等待至少`2*f + 1`条来自其他副本的`prepare`消息。它们检查：


    - `prepare`消息是否具有有效的数字签名。

    - 副本是否与消息中的视图相同。

    - 序列号是否有效且在预期范围内。

    - 消息摘要（哈希）值是否正确。


    如果所有这些检查都通过，副本将更新其本地状态并进入提交阶段。


    总之，准备阶段执行以下步骤：


    - 仅当副本之前未接受过相同视图或序列号的预准备消息时，才接受该预准备消息。

    - 向所有副本发送`prepare`消息。


    此阶段确保网络中的诚实副本在视图内就请求的总顺序达成一致。


    ## 提交阶段


    在提交阶段，每个副本向网络中的所有其他副本发送`commit`消息。与准备阶段类似，副本等待来自其他副本的`2*f + 1`条`commit`消息。副本还检查视图编号、序列号、数字签名和消息摘要值。如果从其他副本收到的`2*f
    + 1`条`commit`消息有效，则副本执行请求、生成结果，并最终更新其状态以反映提交。如果有某些消息排队，副本将在处理最新序列号之前先执行这些请求。最后，副本通过回复消息将结果发送给客户端。


    客户端仅在收到`2*f + 1`条包含相同结果的回复消息后才接受该结果。


    ### 提交子协议步骤


    - 副本等待具有相同视图、序列号和请求的`2*f + 1`条`prepare`消息。

    - 它向所有副本发送`commit`消息。

    - 它等待直到`2*f + 1`条有效的`commit`消息到达并被接受。

    - 它执行收到的请求。

    - 它向客户端发送包含执行结果的回复。


    此阶段确保网络中的诚实副本跨视图就客户端请求的总顺序达成一致。


    本质上，PBFT 协议确保有足够多的副本处理每个请求，以便处理相同的请求并且以相同的顺序处理。


    我们可以在图 [7-10](#515270_1_En_7_Chapter.xhtml#Fig10) 中看到协议的正常操作模式。


    ![](images/515270_1_En_7_Chapter/515270_1_En_7_Fig10_HTML.png)


    图表显示了客户端、主节点、副本 2、3 和 4 的线条。这些线条分为请求、预准备、准备、提交和回复阶段。


    **图 7-10** PBFT 正常模式操作


    在协议执行期间，协议必须维护消息和操作的完整性，以提供足够级别的安全性和保证。数字签名满足了这一要求。假设数字签名是不可伪造的，并且哈希函数是抗碰撞的。此外，使用证书来确保参与方（节点）的适当多数。


    ## PBFT 中的证书


    PBFT 协议中的证书确立了至少`2*f + 1`个副本已存储所需信息。换句话说，特定类型的`2*f + 1`条消息的集合被视为一个证书。例如，假设一个节点已收集了`2*f
    + 1`条类型为`prepare`的消息。在这种情况下，将其与具有相同视图、序列号和请求的相应预准备消息组合在一起表示一个证书，称为已准备证书。同样，`2*f
    + 1`条`commit`消息的集合称为提交证书。


    PBFT 协议还维护了几个变量来执行算法。这些变量及其含义如下：


    - `v`：视图编号

    - `o`：客户端请求的操作

    - `t`：时间戳

    - `c`：客户端标识符

    - `r`：回复

    - `m`：客户端的请求消息

    - `n`：消息的序列号

    - `h`：消息`m`的哈希值

    - `i`：副本的标识符

    - `s`：稳定检查点 – 最后一个

    - `C`：稳定检查点的证书（`2f + 1`条检查点消息）

    - `P`：请求的已准备证书集合

    - `O`：待处理的预准备消息集合

    - `V`：新视图的证明（`2f + 1`条视图更改消息）


    现在让我们看一下消息类型及其格式。如果参考前面的变量列表，这些消息很容易理解。


    ### 消息类型


    PBFT 协议通过交换多种消息来工作。表 [7-1](#515270_1_En_7_Chapter.xhtml#Tab1) 列出了这些消息及其格式和方向。


    **表 7-1** PBFT 协议消息


    | 消息 | 发送方 | 接收方 | 格式 | 签名方 |

    | --- | --- | --- | --- | --- |

    | `Request` | 客户端 | 主节点 | `<REQUEST, o, t, c>` | 客户端 |

    | `Pre-prepare` | 主节点 | 副本 | `<<PRE-PREPARE, v, n, h>, m>` | 主节点 |

    | `Prepare` | 副本 | 副本 | `<PREPARE, v, n, h, i>` | 副本 |

    | `Commit` | 副本 | 副本 | `<COMMIT, v, n, h, i>` | 副本 |

    | `Reply` | 副本 | 客户端 | `<REPLY, r, i>` | 副本 |

    | `View change` | 副本 | 副本 | `<VIEWCHANGE, v+1, n, s, C, P, i>` | 副本 |

    | `New view` | 主节点 | 副本 | `<NEWVIEW, v + 1, V, O>` | 副本 |

    | `Checkpoint` | 副本 | 副本 | `<CHECKPOINT, n, h, i>` | 副本 |


    请注意，所有消息都使用数字签名进行签名，这使得每个节点都能识别生成了任何给定消息的是哪个副本或客户端。'
  raw: '*   Assigns to it the next sequence number. This sequence number is the order
    in which the request is going to be executed.


    *   Broadcasts this information as the pre-prepare message to all backup replicas.


    This phase assigns a unique sequence number to the client request. We can think
    of it as an orderer that applies order to the client requests.


    **Prepare phase – phase 2**


    Each backup replica sends the prepare message to all other replicas in the system.
    Each backup replica waits for at least 2*f* + 1 prepare messages to arrive from
    other replicas. They check


    *   Whether the prepare message has a valid digital signature.


    *   The replica is in the same view as in the message.


    *   The sequence number is valid and within the expected range.


    *   The message digest (hash) value is correct.


    If all these checks pass, the replica updates its local state and moves to the
    commit phase.


    In summary, the prepare phase performs the following steps:


    *   Accepts the pre-prepare message only if the replica has not accepted any pre-prepare
    messages for the same view or sequence number before


    *   Sends the prepare message to all replicas


    This phase ensures that honest replicas in the network agree on the total order
    of requests within a view.


    **Commit phase**


    Each replica sends a commit message to all other replicas in the network in the
    commit phase. Like the prepare phase, replicas wait for 2*f* + 1 commit messages
    to arrive from other replicas. The replicas also check the view number, sequence
    number, digital signature, and message digest values. If they are valid for 2*f* + 1 commit
    messages received from other replicas, the replica executes the request, produces
    a result, and finally updates its state to reflect a commit. If some messages
    are queued up, the replica will execute those requests first before processing
    the latest sequence numbers. Finally, the replica sends the result to the client
    in a reply message.


    The client accepts the result only after receiving 2*f* + 1 reply messages containing
    the same result.


    The commit subprotocol steps


    *   The replica waits for 2*f* + 1 prepare messages with the same view, sequence,
    and request.


    *   It sends a commit message to all replicas.


    *   It waits until a 2*f* + 1 valid commit message arrives and is accepted.


    *   It executes the received request.


    *   It sends a reply containing the execution result to the client.


    This phase ensures that honest replicas in the network agree on the total order
    of client requests across views.


    In essence, the PBFT protocol ensures that enough replicas process each request
    so that the same requests are processed and in the same order.


    We can visualize the normal mode of operation of the protocol in Figure [7-10](#515270_1_En_7_Chapter.xhtml#Fig10).


    ![](images/515270_1_En_7_Chapter/515270_1_En_7_Fig10_HTML.png)


    A diagram has lines for client, primary, replica 2, 3, and 4\. The lines are phased
    into request, pre-prepare, prepare, commit, and reply.


    Figure 7-10


    PBFT normal mode operation


    During the execution of the protocol, the protocol must maintain the integrity
    of the messages and operations to deliver an adequate level of security and assurance.
    Digital signatures fulfill this requirement. It is assumed that digital signatures
    are unforgeable, and hash functions are collision resistant. In addition, certificates
    are used to ensure the proper majority of participants (nodes).


    ### Certificates in PBFT


    Certificates in PBFT protocols establish that at least 2*f* + 1 replicas have
    stored the required information. In other words, the collection of 2*f* + 1 messages
    of a particular type is considered a certificate. For example, suppose a node
    has collected 2*f* + 1 messages of type prepare. In that case, combining it with
    the corresponding pre-prepare message with the same view, sequence, and request
    represents a certificate, called a prepared certificate. Likewise, a collection
    of 2*f* + 1 commit messages is called a commit certificate.


    There are also several variables that the PBFT protocol maintains to execute the
    algorithm. These variables and the meanings of these are listed as follows:


    *   **v**: View number


    *   **o**: Operation requested by a client


    *   **t**: Timestamp


    *   **c**: Client identifier


    *   **r**: Reply


    *   **m**: Client’s request message


    *   **n**: Sequence number of the message


    *   **h**: Hash of the message m


    *   **i**: Identifier of the replica


    *   **s**: Stable checkpoint – last


    *   **C**: Certificate of the stable checkpoint (2f + 1 checkpoint messages)


    *   **P**: Set of prepared certificates for requests


    *   **O**: Set of pre-prepare messages to be processed


    *   **V**: Proof of the new view (2f + 1 view change messages)


    Let’s now look at the types of messages and their formats. These messages are
    easy to understand if we refer to the preceding variable list.


    #### Types of Messages


    The PBFT protocol works by exchanging several messages. A list of these messages
    is shown in Table [7-1](#515270_1_En_7_Chapter.xhtml#Tab1) with their format and
    direction.


    Table 7-1


    PBFT protocol messages


    | Message | From | To | Format | Signed by |

    | --- | --- | --- | --- | --- |

    | Request | Client | Primary | <REQUEST, o, t, c> | Client |

    | Pre-prepare | Primary | Replicas | <<PRE-PREPARE, v, n, h>, m>> | Primary |

    | Prepare | Replica | Replicas | <PREPARE, v, n, h, i> | Replica |

    | Commit | Replica | Replicas | <COMMIT, v, n, h, i> | Replica |

    | Reply | Replicas | Client | <REPLY, r, i> | Replica |

    | View change | Replica | Replicas | <VIEWCHANGE, v+1, n, s, C, P, i> | Replica
    |

    | New view | Primary | Replicas | <NEWVIEW, v + 1, V, O> | Replica |

    | Checkpoint | Replica | Replicas | <CHECKPOINT, n, h, i> | Replica |


    Note that all messages are signed with digital signatures, which enable every
    node to identify which replica or client generated any given message.'
