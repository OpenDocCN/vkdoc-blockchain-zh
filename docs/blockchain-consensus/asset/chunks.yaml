  trans: '

    # 如何反驳 FLP 不可能性


    [Louie Helm]提出了一个有趣的论断，即在异步环境下，即使存在故障，分布式共识也可以达成，这似乎与 FLP 不可能性相矛盾。


    Helm 提出了一种使用量子技术解决共识问题的协议。从高层来看，该协议的工作流程如下：


    - 纠缠的量子比特被分发给所有节点。

    - 每个节点测量其量子比特。

    - 最后，由于测量，叠加的量子态会坍缩，从而达成共识。


    这是因为这里的量子纠缠保证了纠缠的量子比特会坍缩到相同的状态。这意味着所有节点最终会处于相同的状态，即达成一致。


    GHZ 态被用来实现这一方案。这里的关键假设是，每个节点在设置阶段接收一个量子比特，然后稍后进行测量，这导致所有节点都得到相同的坍缩态。


    该算法的工作流程如下：


    1.  通过纠缠一组`n`个量子比特来准备 GHZ 态。

    2.  将来自叠加量子比特集合中的单个量子比特分发给网络中的每个节点。此步骤在所有节点之间分发一个共享状态。

    3.  每个节点测量其量子比特。注意，在此阶段尚未做出决定。

    4.  如果量子比特测量结果为`∣0⟩`，则选择 0。如果量子比特测量结果为`∣1⟩`，则选择 1。这就是量子优势得以体现的地方。当在一个节点上进行测量时，其量子态会以相等的概率坍缩为`∣0⟩`或`∣1⟩`。此外，随着第一个节点完成测量，所有其他节点的状态也会同时且瞬时地坍缩到与第一个进行测量的节点完全相同的值。由于量子纠缠以及量子比特之间的强相关性，这是可能的。现在，由于所有节点都拥有完全相同的值，该方案就实现了共识。


    达成一致很简单，因为测量 GHZ 态中的任何一个全纠缠量子比特，都会导致同一 GHZ 态中的所有其他量子比特坍缩到相同的基态。有效性得以实现，是因为当在第一个节点上进行测量时，它实际上是在提议一个`∣0⟩`或`∣1⟩`。


    这个协议可以容忍网络延迟，因为即使一个量子比特晚到某个量子节点，其他节点也会继续工作，不受任何影响。同样是由于纠缠，当迟到的量子比特在任何时刻到达时，它已经包含了达成一致的值。使用此算法可以反驳
    FLP 的根本原因在于，它只需要单向广播，而不需要经典的回复。即使单个进程没有测量其量子比特，也不会影响计算的总体结果，也就是说，即使那次单独的测量不可用，其他正确的节点也会继续运行，即使缺少了一个量子比特。如果初始
    GHZ 态的分发成功完成，该算法就能正常工作。一旦完成，缺失的测量将不会影响此后的协议。在面对拜占庭故障时，该算法也具有弹性。任何恶意方都无法篡改算法最终选择的值。这是因为任何测量都不会影响系统中其他量子比特的相关性。这意味着任何对手测量量子比特都无法影响最终选定的值。由于量子特性，量子比特最终总是会变为
    0 或 1。这始终意味着，无论是否存在拜占庭故障，最终都会做出决定。这保证了终止性。


    ## 增强型分布式共识


    Seet 和 Griffin 提出了量子计算如何加速分布式网络中的共识达成。他们提出了一种新颖的量子共识机制。该论文中介绍的工作侧重于分布式共识的可扩展性和速度。


    通过消除对多播回复的需求，实现了共识的速度和可扩展性。此外，利用量子特性，确保了只需要一次多播。达成共识的关键思想是聚合接收到的量子比特（来自其他节点）和量子节点本地量子比特的波函数。


    该方案的工作流程如下：


    - 网络由量子计算机、通信通道和经典计算机构成。通道可以是量子到量子、经典到量子以及经典计算机之间的。

    - 每台量子计算机都与一台用于数据存储和检索的经典计算机相连。

    - 一台量子计算机为每个量子比特创建一个纠缠的量子比特。

    - 将副本发送给系统中的其他节点。

    - 通过每个量子比特波函数的总和来确定共识。

    - 可以直接从量子计算机内部测量量子比特，以计算每个量子比特的波函数。其核心思想基于这样的假设：每个量子比特的波函数应该彼此相似。这里，期望获得的值应该相互一致。

    - 依靠量子叠加，这些量子比特的波函数是一个标量倍数，即 `nψ`，其中 `n` 是参与共识的节点数量。

    - 这里的技术是确定理想系统状态波函数与实际系统状态波函数之间的差值。

    - 如果参与共识的所有量子节点都具有一致的状态，那么随机选择的结果将与任何其他节点的状态一致。这可以与实际的系统状态波函数进行比较。

    - 如果所有量子节点上存在相同的状态，那么每个单独节点的波函数就是系统状态波函数的一个标量倍数。此时波函数输出为零。

    - 如果某个节点上存在任何不同的状态，那么该节点的波函数将不会是整个系统状态函数的标量倍数。因此，系统状态波函数与节点状态波函数之间的差值不为零，这表明存在差异。随着节点状态与系统状态之间差异的增大，差值也会增大。如果差值不低于某个特定阈值，则可以确定容错水平。这可能是总系统的一个百分比，与经典的
    BFT 一致，在经典 BFT 中，网络中大约有 33%的节点可能发生故障。这里也可以应用类似的阈值，尽管尚未得到证实。

    - 共识算法将一个随机选择的波函数乘以系统中的节点数量。

    - 然后减去系统中每个量子比特波函数的总和。

    - 如果所有波函数都相同，则预期结果为零，表示系统一致。否则，系统不一致。差值越大，系统越不一致。


    在该论文中，该算法被扩展到多量子比特系统。此外，与经典模型相比，实现了若干改进，例如将状态验证的时间复杂度降低了一半。这是通过利用纠缠实现的，验证者只需要接收纠缠的量子比特，之后便可在本地通过比较所有量子比特的状态来完成验证。这与经典的、高复杂度的请求-响应式消息传递形成对比，后者会增加时间和通信复杂度。凭借量子特性，这种复杂度得以降低，并且与经典共识相比，可以在一半的时间内达成共识。这种效率提升可以应用于区块链，以提高其可扩展性。此外，任何单独篡改原始状态和发送状态的企图，都会由于纠缠而被立即检测到，从而提高了系统的安全性。该论文还提出了若干针对可扩展性、隐私和性能的增强措施，以应对区块链的三难困境。

    '
- fmt: '### Quantum Leader Election and Consensus


    Ellie D’Hondt and Prakash Panangaden presented a quantum solution for a totally
    correct leader election in quantum networks, which is considered difficult in
    the classical world.


    For electing a leader using quantum properties, the use of the W state is proposed.
    In an anonymous network, if quantum nodes share the W state, the leader election
    problem can be solved trivially.


    Remember we discussed the W state earlier. For example, the entangled W state
    of three qubits is:


    ![$$ \mid W\Big\rangle =\frac{1}{\sqrt{3}}\ \left(001\Big\rangle +|010\Big\rangle
    +|100\ \Big\rangle \right) $$](images/515270_1_En_9_Chapter/515270_1_En_9_Chapter_TeX_Equb.png)


    This is used as a symmetry-breaking quantum resource. The quantum leader election
    algorithm for each process *i* then simply is:


    ```

    q = ith qubit from the entangled W-state i.e., from a quantum process i

    initialize b = 0 and result = wait

    b = measurement of q

    if b = 1 then result = leader, else result = follower

    ```


    This protocol has a time complexity of `O(1)`, that is, constant, and there is
    no message passing required. This is in complete contrast with the classical world
    where multi-round protocols with higher complexity are usually common. This quantum
    protocol works in asynchronous networks too.


    Also, a simple algorithm for consensus is presented. Leader election was based
    on symmetry breaking; however, this algorithm is dependent on symmetry preservation.


    The idea is that to achieve totally correct anonymous quantum distributed consensus
    where each process has one qubit initially, the processors are required to be
    entangled in a `GHZ` state. It is shown that this is not only necessary but also
    a sufficient condition.


    The core idea of the protocol is to share the `GHZ` entangled state between all
    nodes participating in the consensus. This allows the creation of symmetry in
    one step.


    The `GHZ` state for three qubits is given as:


    ![$$ \mid GHZ\Big\rangle =\frac{\left(|000\Big\rangle +|111\Big\rangle \right)}{\surd
    2} $$](images/515270_1_En_9_Chapter/515270_1_En_9_Chapter_TeX_Equc.png)


    Each process *i* runs:


    ```

    q = ith qubit of GHZ state among n processes

    result= wait

    result = measure q

    ```


    Again, this protocol has a time complexity of `O(1)`, and no message passing is
    needed. This protocol works under different communication topologies and under
    asynchrony.


    The result in the paper shows that `GHZ` for consensus is necessary and sufficient.
    Moreover, `W` is necessary and sufficient for leader election.


    ### Other Algorithms


    There is a wide range of quantum consensus algorithms and relevant proposals.
    It is not possible to cover them all here in detail; however, this section summarizes
    some of the prominent results.


    Luca Mazzarella, Alain Sarlette, and Francesco Ticozzi in “Consensus for Quantum
    Networks: From Symmetry to Gossip Iterations” extend the classical distributed
    computing problem to networks of quantum systems. They proposed a general framework
    to study the consensus problem in the quantum world. Also, a quantum gossip-style
    algorithm is presented in the paper.


    “Reaching Agreement in Quantum Hybrid Networks” is proposed by Guodong Shi, Bo
    Li, Zibo Miao, Peter M. Dower, and Matthew R. James. The problem considered in
    the paper is to drive a quantum hybrid network composed of quantum nodes holding
    qubits to a common state, thus achieving consensus. The key idea is that quantum
    nodes measure the qubits, and the results of the measurement are exchanged through
    classical communication links.


    It has been shown that the classical Byzantine generals problem is unsolvable
    even if pairwise quantum channels are used. However, a variation of the Byzantine
    agreement problem called the **detectable Byzantine agreement** (`DBA`) can be
    solved by using quantum properties. The `DBA` protocol ensures that either all
    generals agree on an order or all abort, that is, the agreement property, and
    if all generals are loyal, they agree on an order, that is, validity.


    “Multi-party Quantum Byzantine Agreement Without Entanglement” is proposed by
    Xin Sun, Piotr Kulicki, and Mirek Sopek. Usually, an entanglement property is
    used in the quantum consensus algorithm. But this algorithm is different where
    entanglement is not used. Instead, the protocol relies on quantum key distribution
    and its unconditional security. The protocol relies on sequences of correlated
    numbers shared between semi-honest quantum key distributors.


    There are other proposals where a concept of the quantum blockchain using temporal
    `GHZ` is introduced.


    There are quite a few innovative results regarding quantum consensus, and researchers
    are presenting more and more developments. We introduced some of these results
    earlier. The quantum algorithms that can enhance classical distributed consensus
    results are of particular importance as they can impact classical distributed
    systems in the near future. Other pure quantum results are also fascinating but
    will be fully useful only in the future when the quantum internet and relevant
    quantum ecosystems become a reality.


    ## Summary


    As quantum computing is a vast and deep subject, we have not covered everything.
    Still, this chapter should give us a good understanding of quantum computing and
    how it can benefit distributed systems and consensus. Moore’s law has almost come
    to an end, so with quantum computing, we can reinvigorate it. In computer science,
    more complexity classes are emerging due to quantum computing. For physicists,
    the interest is to understand more about quantum theory.


    This chapter gives us an intuition to think more deeply and prepare ourselves
    for further research and exploration. The main point to remember is that largely
    quantum consensus mechanisms exploit the quantum properties of superposition and
    entanglement.


    In the next chapter, we conclude all ideas presented in this book and some exotic
    ideas and future research directions.


    # 10. Conclusion


    Congratulations on making it this far! We have come a long way with a lot of information
    under our belt. In this chapter, we summarize some important topics. We will also
    look at some latest research and ideas and touch upon some more consensus protocols.
    An important aspect in consensus protocol research is formal design and verification
    of the algorithms. We briefly explain this important area in this chapter. Also,
    we compare some of the most common consensus protocols from different angles and
    introduce some important research directions.


    ## Introduction


    Consensus protocols are the backbone of distributed systems and especially blockchains.
    Throughout this book, we discussed several protocols and relevant topics. Currently,
    a blockchain is the most common candidate for implementing consensus protocols.
    In fact, they are at the core of the blockchain. With the blockchain, novel schemes
    are being introduced which address various problems including node scalability,
    transaction throughput, consensus efficiency, fault tolerance, interoperability,
    and various security aspects.


    Distributed consensus is used almost everywhere between networked devices, not
    only in classical distributed systems that we are used to. This includes the Internet
    of Things, multi-agent systems, distributed real-time systems, embedded systems,
    and lightweight devices. With the evolution of the blockchain, blockchain consensus
    adoption is expected to grow in all these systems too.


    ## Other Protocols


    In this section, we briefly introduce protocols that we did not cover before.
    As it is a vast area, only a brief introduction is given.'
