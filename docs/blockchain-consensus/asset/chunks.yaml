- fmt: '# Domain Name System and Distributed Consensus


    The domain name system (DNS) is the most prevalent system that implements eventual
    consistency. When a name is updated, it is distributed as per a configured pattern,
    and, eventually, all clients see the update.


    Through the lens of the CAP theorem, the distributed consensus is a CP system
    where availability is sacrificed in favor of consistency. As a result, the distributed
    consensus is used to provide strong consistency guarantees.


    For example, if you have a five-node system and three nodes go down, then the
    whole system stalls until the other three nodes come up. This is so that a consistency
    guarantee can be maintained, even if the system is not available for some time.


    If we look at Bitcoin, it appears that it is an AP system where consistency is
    sacrificed for some time due to forks, but, eventually, the consistency is achieved.
    Therefore, Bitcoin can also be considered a CP system where consistency is eventually
    strong.


    Usually, strong consistency (also called linearizability) is for what distributed
    consensus is used for; however, eventual consistency in systems like Bitcoin is
    also acceptable.


    ## Cryptography in Distributed Systems


    Distributed systems operate under challenging conditions where they are exposed
    to adversaries, faults, and untrusted users. In such conditions, it becomes critical
    to protect the distributed system against all these threats. Therefore, appropriate
    security measures are put in place to thwart any attempts to disrupt the system.


    The usual security services required in a distributed system include confidentiality,
    integrity, access control, and authentication. To this end, cryptography plays
    a vital role in distributed systems.


    Cryptographic protocols provide security services in a distributed system by utilizing
    cryptographic primitives such as symmetric cryptography, asymmetric cryptography,
    and hash functions.


    We will cover this topic in Chapter [2](#515270_1_En_2_Chapter.xhtml), where we
    study cryptography in general and its applications in distributed systems and
    blockchain. Chapter [2](#515270_1_En_2_Chapter.xhtml) will introduce several primitives
    that are useful in consensus protocols and blockchain for achieving data integrity
    and relevant security purposes.


    ## Summary


    We covered several topics in this chapter:


    - A distributed system is a set of interconnected computers coordinating together
    via messages to achieve a common goal.

    - Distributed systems face several challenges. The most prominent are (1) no common
    global knowledge, (2) no global time, (3) achieving consistency, and (4) failures.

    - A distributed system model allows us to reason about the system and abstract
    away all unnecessary details.

    - The leap second bug that is a cause of significant disruption of Internet services
    and several techniques has been developed to address this.

    - Safety and liveness properties must be ensured in distributed systems.

    - Crash fault–tolerant distributed algorithms only handle crash faults, whereas
    Byzantine fault–tolerant algorithms are designed to handle arbitrary faults.

    - Logical clocks do not depend on physical clocks and can be used to define the
    order of events in a distributed system.

    - In a distributed system, the same algorithm runs on all computers concurrently
    to achieve a common goal.

    - The CAP theorem states that a distributed system can only deliver two of three
    desired features, that is, consistency, availability, and partition tolerance.


    # 2. Cryptography


    This chapter will cover cryptography and its two main types, symmetric cryptography
    and public key cryptography. After exploring some fundamental ideas, we will dive
    deeper into symmetric key primitives and then public key primitives.


    Moreover, we will examine hash functions, message authentication codes, digital
    signature schemes, and elliptic curve cryptography. Finally, we’ll shed some light
    on some progressive ideas, proposals, and techniques, especially those which are
    used in blockchain consensus.


    ## Introduction


    Cryptography is the science of secret communication in the presence of adversaries.
    Historically, this subject was more of an art, but, now, it is a rigorous and
    formal science with formal definitions, assumptions, and security proofs.


    There are three fundamental principles of cryptography: confidentiality, integrity,
    and authenticity. Confidentiality is the assurance that the information is available
    only to the authorized entities. Integrity assures that only authorized entities
    can modify the information. Finally, authenticity guarantees the message validity
    or identity of an entity. Authentication can be of two types, entity authentication
    or data origin authentication.


    Entity authentication ensures that an entity claiming some identity (the claimant)
    is verifiably identifiable to another identity (the verifier) and that the entity
    is alive and participating. Different methods such as something you have (e.g.,
    a hardware token), something you know (e.g., a password), and something you are
    (e.g., fingerprint) are used to achieve entity authentication in identification
    protocols. Entity authentication is of a fundamental concern in a secure distributed
    system. As a distributed system is dispersed and heterogenous, with multiple users,
    it can become an easy target for adversarial attacks. Especially in the case of
    blockchains and specifically consensus protocols running on blockchains, entity
    authentication is of prime importance to ensure protection against adversarial
    attacks. Authentication protocols are built using symmetric and public key cryptography.


    Another related assurance is nonrepudiation, where an entity after performing
    an action cannot deny its action. Usually, this is achieved by digital signatures.
    In addition to two-party protocols, there also are multiparty nonrepudiation protocols
    that are suitable for multiple parties.


    Data origin authentication or message authentication ensures that the source of
    information is authentic and verified. Message authentication codes (MACs) and
    digital signatures are used to provide data origin authentication.'
