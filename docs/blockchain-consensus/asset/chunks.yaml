  trans: '

    # 世界状态树


    状态树是一个将用户地址映射到账户状态的键值对结构。它也被称为世界状态树，其根哈希被保存在区块中。状态树由多个账户状态组成。


    # 交易收据树


    交易收据存储了交易执行结果，包含状态、日志和事件等信息。每个区块都包含一棵交易收据树。交易收据树由多个交易收据组成。


    # 账户存储树


    这棵树的根哈希作为存储根保存在账户状态中。它用于存储智能合约代码及相关数据。


    图 4-16 展示了包括区块结构在内的所有树。


    ![](img/515270_1_En_4_Fig16_HTML.png)


    该图以列表形式呈现了树和区块结构。列出的树包括收据树、交易树、账户存储树和世界状态树。


    图 4-16


    区块与树


    区块内的交易通过以太坊虚拟机执行，我们接下来将对此进行描述。


    ## 以太坊中的挖矿


    与比特币不同，以太坊的挖矿具有抗 ASIC（专用集成电路）特性。


    基于 ASIC 的专用、高效且极快的硬件是为执行比特币挖矿而构建的。这些设备只有一项特定任务，即反复且极快地运行哈希函数`SHA-256`。


    以太坊使用了工作量证明机制；然而其共识算法对内存要求很高，由于内存需求巨大，这使得构建 ASIC 变得困难。该协议被称为`ETHASH`，它会生成一个大型有向无环图（DAG）供矿工使用。DAG
    会根据网络难度级别增长或缩减；但随着时间的推移，其大小已增长到约 4 GB。由于这个 DAG 消耗大量内存，构建具有如此大内存的 ASIC 极其困难，因此使得`ETHASH`成为一种抗
    ASIC 算法。我们将在第 8 章更详细地解释`ETHASH`。


    ## 以太坊虚拟机与智能合约


    以太坊虚拟机（EVM）是以太坊区块链的核心工作引擎。它是一个深度为 1024 项的 256 位寄存器栈。它被设计用于执行编译为字节码的智能合约代码。智能合约通常用一种名为
    Solidity 的领域特定语言（DSL）编写；不过也存在其他语言，如 Vyper，开发者也可用来编写智能合约代码。


    我们可以将智能合约定义为一个安全且无法停止的计算机程序，它代表了一种可自动执行且可强制执行的协议。智能合约不一定需要区块链；然而，区块链是运行智能合约最自然的平台。这是因为区块链提供了所有安全保障，使得智能合约安全、无法停止、可自动执行且可强制执行。


    EVM 被设计为图灵完备的；但它受到 gas 限制的约束，这意味着其执行是计量的，并以以太币计价的所谓 gas 费来支付。这种机制允许执行任意代码，但安全地保证当
    gas 耗尽时执行将会停止，从而防止因循环或恶意代码导致的无限执行。EVM 执行由操作码组成的字节码，每个操作都需要消耗 gas。大约有 150 种操作码，分为几类：算术操作码、内存操作码和程序流程相关操作码。完整的列表可在以太坊黄皮书中找到。


    以太坊的共识基于工作量证明，我们将在第 8 章详细介绍。


    以太坊 1.0 区块链将根据其路线图继续发展，并最终在以太坊 2.0 的第一阶段成为一个分片。


    至此，我们完成了对这两个最突出且最具开创性的区块链平台的简要讨论。更多现代区块链平台，如 Polkadot、Cardano、Solana、Avalanche
    和以太坊 2.0，将在第 8 章讨论它们各自的共识协议时予以介绍。


    ## 总结


    *   区块链是一个点对点、加密安全、只能追加、不可变且防篡改的共享分布式账本，由按时间顺序排列且可公开验证的交易组成。

    *   区块链的起源可以追溯到早期创建数字货币和文档数字时间戳的尝试。

    *   区块链是一个分布式系统。

    *   区块链主要分为两类：许可链和公有链。

    *   区块链有许多跨行业用例，包括但不限于政府、金融、医疗、供应链和技术领域。

    *   区块链提供了诸多好处，例如节省成本、提高透明度和促进数据共享。

    *   公钥密码学、哈希函数和默克尔树等多种技术为构建区块链的安全性提供了基础。

    *   从 CAP 定理的角度来看，许可链是 CP 系统，而公有链是 AP 系统。

    *   区块链账本抽象具有几种特性，以及`get()`、`append()`和`verify()`操作。

    *   比特币是中本聪发明的第一个区块链。

    *   以太坊是 Vitalik Buterin 提出的第一个智能合约区块链平台。

    *   比特币和以太坊是最突出的平台。

    *   以太坊将成为以太坊 2.0 的一个分片。

    *   现代区块链平台正专注于异构多链架构，其中多个链相互操作，形成一个合作和互操作的区块链生态系统，服务于多种用例。


    # 5. 区块链共识


    区块链共识是区块链的核心要素，它确保了区块链数据的完整性和一致性。区块链作为一个分布式系统，乍一看，我们似乎可以应用传统的分布式共识协议，如 Paxos 或
    PBFT，来解决区块链中的一致性和全序要求。然而，这只适用于联盟链，因为其中的参与者是已知且数量有限的。在公有链中，由于无许可环境，传统的共识协议无法工作。然而，在
    2008 年，出现了一类新的共识算法，该算法依靠工作量证明，通过解决一个数学难题来确保随机领导者选举。被选出的领导者获得向区块链追加数据的权利。这就是所谓的中本聪共识协议。该算法首次解决了存在大量匿名参与者的无许可公共环境中的共识问题。


    我们已经在第 3 章从传统角度讨论了分布式共识。在本章中，我们将介绍什么是区块链共识，如何将传统协议应用于区块链，工作量证明如何工作，它是如何发展的，以及区块链共识的要求是什么，并且我们将通过分布式共识的视角来分析诸如工作量证明等区块链共识。此外，我们还将看到共识的要求如何根据所使用的区块链类型而变化。例如，对于公有链，工作量证明可能是一个更好的主意，而对于许可链，BFT
    风格的协议可能效果更好。

    '
- fmt: '# Background


    Distributed consensus has always been a fundamental problem in distributed systems.
    Similarly, in blockchain it plays a vital role in ensuring the integrity of the
    blockchain. There are two broad classes of algorithms that have emerged as a result
    of the last almost 45 years of research on distributed consensus:


    1. Leader-based traditional distributed consensus or permissioned consensus

    2. Nakamoto and post-Nakamoto consensus or permissionless consensus


    Leader-based protocols work on the principle of voting where nodes in a distributed
    system vote to perform an operation. These protocols are usually deterministic
    and have been researched since the 1970s. Some such protocols include `Paxos`,
    `PBFT`, and `RAFT`. Another different type of class emerged in 2008 with Bitcoin,
    which relied on the proof of work type of crypto puzzle. This type of protocol
    is probabilistic where a participant wins the right to append a new block to the
    blockchain by solving the proof of work.


    Usually, in the blockchain world, Byzantine fault–tolerant protocols are used,
    especially because these blockchains are expected to either run publicly or in
    a consortium environment where malicious attacks are a reality. Perhaps not so
    much on consortium chains where the participants are known, but still due to the
    nature of the enterprise applications that run on these platforms, it’s best to
    consider a Byzantine fault–tolerant model. Applications related to finance, health,
    egovernance, and many other use cases run on consortium chains; therefore, it
    is necessary to ensure protection against any arbitrary faults including even
    active adversaries.


    There are pros and cons of both approaches. Traditional BFT protocols or their
    variants in the blockchain provide stronger consistency as compared to proof of
    work–type algorithms, which can only offer eventual consistency. However, proof
    of work consensus is much more scalable as compared to traditional BFT protocols.
    See a comparison in Table [5-1](#515270_1_En_5_Chapter.xhtml#Tab1) between BFT
    and PoW consensus.


    **Table 5-1** Traditional BFT vs. Nakamoto consensus


    | Property | Traditional BFT | Nakamoto |

    | --- | --- | --- |

    | Agreement | Deterministic | Eventual |

    | Termination | Deterministic | Probabilistic |

    | Energy consumption | Low | Very high |

    | Sybil resistance | No | Yes |

    | Finality | Immediate | Probabilistic |

    | Consistency | Stronger | Weaker (eventual) |

    | Communication pattern | Broadcast | Epidemic |

    | Throughput (TPS) | Higher | Low |

    | Scalability | Lower (10–100 nodes) | Higher (1000s of nodes) |

    | Forking | None | Possible |

    | Identity | Known | Anonymous (pseudonymous) |

    | Network | Peer to peer | Peer to peer |

    | Order | Temporal | Temporal |

    | Formal rigor (correctness proofs, etc.) | Yes | Mostly nonexistent |

    | Fault tolerance | 1/3, <=33% | <=25% computing power / >50% computing power
    |

    | Number of clients | Many | Many |


    Another point to keep in mind is the distinction between a broadcast problem and
    a consensus problem. Consensus is a decision problem, whereas broadcast is a delivery
    problem. The properties of both are the same but with slightly different definitions.
    These properties include agreement, validity, integrity, and termination. In essence,
    broadcast and consensus are interrelated and deeply connected problems as it is
    possible to implement one from the other.


    We will be focusing more on a consensus problem instead of a broadcast problem.


    # Blockchain Consensus


    A blockchain consensus protocol is a mechanism that allows participants in a blockchain
    system to agree on a sequence of transactions even in the presence of faults.
    In other words, consensus algorithms ensure that all parties agree on a single
    source of truth even if some parties are faulty.


    There are some properties that are associated with blockchain consensus. The properties
    are almost the same as standard distributed consensus but with a slight variation.


    As a standard, there are safety and liveness properties. The safety and liveness
    properties change depending on the type of blockchain. First, we define the safety
    and liveness properties for a permissioned/consortium blockchain and then for
    a public blockchain.


    ## Traditional BFT


    There are several properties that we can define for traditional BFT consensus,
    which are commonly used in a permissioned blockchain. There are various variants,
    for example, `Tendermint`, that are used in a blockchain. We covered traditional
    BFT in detail in Chapter [3](#515270_1_En_3_Chapter.xhtml); however, in this section
    we will redefine that in the context of a blockchain and especially permissioned
    blockchain. Most of the properties remain the same as public permissionless consensus;
    however, the key difference is between deterministic and probabilistic termination
    and agreement.


    ### Agreement


    No two honest processes decide on a different block. In other words, no two honest
    processes commit different blocks at the same height.


    ### Validity


    If an honest process decides on a block `b`, then `b` satisfies the application-specific
    validity predicate `valid()`. Also, the block `b` agreed must be proposed by some
    honest node.


    ### Termination


    Every honest process decides. After GST, every honest process continuously commits
    blocks.


    Agreement and validity are safety properties, whereas termination is a liveness
    property.


    ### Integrity


    A process must decide at most once in a consensus round.


    Other properties can include the following.


    #### Chain Progress (Liveness)


    A blockchain must keep growing by continuously appending new blocks to it after
    GST.


    #### Instant Irrevocability


    Once a transaction has made it to the block and the block is finalized, the transaction
    cannot be removed.


    #### Consensus Finality


    Finality is deterministic and immediate. Transactions are final as soon as they’ve
    made it to the block, and blocks are final as soon as they’ve been appended to
    the blockchain.


    While there are many blockchain consensus algorithms now, Nakamoto consensus is
    the first blockchain protocol introduced with Bitcoin, which has several novel
    properties. Indeed, it is not a classical Byzantine algorithm with deterministic
    properties; instead, it has probabilistic features.


    ## Nakamoto Consensus


    The Nakamoto or PoW consensus can be characterized with several properties. It
    is commonly used in public blockchains, for example, Bitcoin.


    ### Agreement


    Eventually, no two honest processes decide on a different block.


    ### Validity


    If an honest process decides on a block `b`, then `b` satisfies the application-specific
    validity predicate `valid()`. Also, the transactions within the block satisfy
    the application-specific validity predicate `valid()`. In other words, only valid
    and correct transactions make it to the block, and only correct and valid blocks
    make it to the blockchain. Only valid transactions and blocks are accepted by
    the nodes. Also, mining nodes (miners) will only accept the valid transactions.
    In addition, the decided value must be proposed by some honest process.'
