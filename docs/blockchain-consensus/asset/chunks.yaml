- fmt: "### Finney Attack\n\nThe Finney attack can occur when a recipient of a payment\
    \ accepts the payment with zero confirmations. It is a type of double-spend attack\
    \ where an attacker creates two transactions. The first of these transactions\
    \ is a payment to the recipient (victim) and the second to themselves. However,\
    \ the attacker does not broadcast the first transaction; instead, they include\
    \ the second transaction in a block and mine it. Now at this point, the attacker\
    \ releases the first transaction and pays for the goods. The merchant does not\
    \ wait here for the confirmations and accepts the payment. Now the attacker broadcasts\
    \ the premined block with the second transaction that pays to themselves. This\
    \ invalidates the first transaction as the second transaction takes precedence\
    \ over the first one.\n\n### Vector76 Attack\n\nThis attack is a combination of\
    \ Finney and race attacks. This attack is powerful enough to reverse a transaction\
    \ even if it has one confirmation.\n\n### Eclipse Attack\n\nThis attack attempts\
    \ to obscure a node’s correct view of the network, which can lead to disruption\
    \ to service, double-spend attacks, and waste of resources. There are several\
    \ solutions to fix the issue, which have been implemented in Bitcoin. More details\
    \ can be found here: [`https://cs-people.bu.edu/heilman/eclipse/`](https://cs-people.bu.edu/heilman/eclipse/).\n\
    \n### ESG Impact\n\nESG metrics represent an overall picture of environmental,\
    \ social, and governance concerns. These metrics are used as a measure to assess\
    \ a company’s exposure to environmental, social, and governance risks. They are\
    \ used by investors to make investment decisions. Investors may not invest where\
    \ ESG risks are higher and may prefer companies where ESG risk is low.\n\nProof\
    \ of work has been criticized for consuming too much energy. It is true that currently\
    \ at the time of writing, the total energy consumption of the Bitcoin blockchain\
    \ is more than the entire country of Pakistan [9].\n\nThere are environmental,\
    \ social, and governance concerns (ESG concerns) that have been the cause of low\
    \ interest from savvy mainstream investors. Nonetheless, Bitcoin largely can be\
    \ seen as a success despite its ESG concerns.\n\nNot only has Bitcoin been criticized\
    \ for its high energy consumption but often seen as a vehicle for criminal activities,\
    \ where Bitcoin has been accepted as a mode of payment for illicit drugs and other\
    \ criminal activities.\n\nA centralization problem is also a concern where some\
    \ powerful miners with mining farms take up most of the hash rate of the Bitcoin\
    \ network. The ASICs that are used to build these mining farms are produced only\
    \ by a few manufacturers, which means that this is also a highly centralized space.\
    \ Moreover, a crackdown [13] on Bitcoin mining could also result in more centralization,\
    \ where only the most powerful miners may be able to withstand this crackdown\
    \ and survive, resulting in only a few surviving and powerful miners at the end.\n\
    \nThere are however points in favor of Bitcoin. Bitcoin can be used as a cross-border\
    \ remittance mechanism for migrant families. It can also be used as a mode of\
    \ payment in struggling economies. It can serve the unbanked population, which\
    \ is estimated to be 1.7 billion [12]. Bitcoin serves as a vehicle for financial\
    \ inclusion.\n\nWe could think of scenarios where the heat produced by Bitcoin\
    \ mining farms may be used to heat up water and eventually homes. Even electricity\
    \ could be generated and fed back into the electricity grid by using thermoelectric\
    \ generators due to thermoelectric effect. Of course, economics and engineering\
    \ need to be worked out; however, this idea can work.\n\n> *Thermoelectric power\
    \ generator, any of a class of solid-state devices that either convert heat directly\
    \ into electricity or transform electrical energy into thermal power for heating\
    \ or cooling. Such devices are based on thermoelectric effects involving interactions\
    \ between the flow of heat and of electricity through solid bodies. [11]*\n> \n\
    > —*Encyclopaedia Britannica*, March 1, 2007, [`www.britannica.com/technology/thermoelectric-power-generator`](http://www.britannica.com/technology/thermoelectric-power-generator)\n\
    \nPayment systems and in fact any system require electricity to run. Bitcoin is\
    \ criticized of consuming too much energy; however, this is the price paid for\
    \ the strength of the system. The network difficulty rate is so high now that\
    \ even many attackers colluding together won’t be able to generate enough hash\
    \ power to launch a 51% attack. So yes, electricity is consumed, but in return\
    \ there are benefits. In addition to the security of Bitcoin, there are other\
    \ benefits such as\n\n*   Bitcoin can be used in suppressed regimes.\n*   Borderless\
    \ payments.\n*   Bank the unbanked.\n*   Smooth cross-border remittance.\n*  \
    \ Alternative payment system which doesn’t have any intermediary.\n*   Payments\
    \ without a middleman.\n\nIn summary, Bitcoin, despite its energy consumption\
    \ and not living up to its original philosophy of One CPU = One Vote, still can\
    \ be seen as a successful project with many benefits.\n\n### Variants of PoW\n\
    \nThere are two types of proof of work algorithms depending on the hardware it\
    \ is intended to run on:\n\n*   CPU-bound PoW\n*   Memory-bound PoW\n\n#### CPU-Bound\
    \ PoW\n\nThese puzzles run at the speed of the processor. CPU-bound PoW refers\
    \ to a type of PoW where the processing required to find the solution to the cryptographic\
    \ hash puzzle is directly proportional to the calculation speed of the CPU or\
    \ hardware such as ASICs. Because ASICs have dominated Bitcoin PoW and provide\
    \ somewhat undue advantage to the miners who can afford to use ASICs, this CPU-bound\
    \ PoW is seen as shifting toward centralization. Moreover, mining pools with extraordinary\
    \ hash power can shift the balance of power toward them. Therefore, memory-bound\
    \ PoW algorithms have been introduced, which are ASIC resistant and are based\
    \ on memory-oriented design instead of CPU.\n\n#### Memory-Bound PoW\n\nMemory-bound\
    \ PoW algorithms rely on system RAM to provide PoW. Here, the performance is bound\
    \ by the access speed of the memory or the size of the memory. This reliance on\
    \ memory also makes these PoW algorithms ASIC resistant. Equihash is one of the\
    \ most prominent memory-bound PoW algorithms.\n\nThere are other improvements\
    \ and variations of proof of work, which we will introduce in Chapter [8](#515270_1_En_8_Chapter.xhtml).\n\
    \n## Summary\n\nIn this chapter, we covered blockchain consensus:\n\n*   Proof\
    \ of work is the first blockchain consensus introduced with Bitcoin, which is\
    \ also a solution to the Byzantine generals problem.\n*   Blockchain consensus\
    \ can be divided into two categories, the Nakamoto consensus and the traditional\
    \ BFT based.\n*   Traditional BFT is deterministic, whereas Nakamoto consensus\
    \ is probabilistic.\n*   Proof of work in Bitcoin is a Sybil resistance mechanism,\
    \ a double-spending prevention mechanism, and a solution to the Byzantine generals\
    \ problem.\n*   Proof of work can be seen in the light of game theory where the\
    \ protocol is a Nash equilibrium, and the dominant strategy for all players is\
    \ to be honest.\n*   Proof of work is effectively a Byzantine fault–tolerant protocol.\n\
    *   Proof of work is a state machine replication protocol where a mined block\
    \ is announced and replicated to other nodes via a gossip protocol.\n*   Proof\
    \ of work consumes high energy, and there are ESG concerns; however, there are\
    \ benefits as well."
