- fmt: '### PoET


    The proof of elapsed time algorithm was introduced by Intel in 2016. Remember
    we discussed earlier in Chapter [5](#515270_1_En_5_Chapter.xhtml) that a key purpose
    that PoW fulfills is the passage of some time until the network can converge to
    a canonical chain. Also, the leader, the miner whose block is accepted, wins the
    right to do so by solving PoW. PoET is fundamentally a leader election algorithm
    which utilizes trusted hardware to ensure that a certain time has elapsed before
    the next leader is selected for block proposal. The fundamental idea in PoET is
    to provide a mechanism of leader election by waiting randomly to be elected as
    a leader for proposing new blocks.


    PoET in fact emulates the passage of time that would be consumed by PoW mining.
    The core idea is that every node randomly waits for some time before producing
    a block. The random waiting process runs inside a trusted execution environment
    (TEE) to ensure that true time has indeed passed. For this purpose, Intel SGX
    or ARM TrustZone can be used. As TEEs provide confidentiality and integrity, the
    network in turn trusts the block producers. PoET tolerates up to 50% faulty TEE
    nodes. However, there is a possibility of Sybil attacks where an actor can run
    many TEE nodes, which can result in shortening the random waiting time. This can
    result in the creation of a malicious chain if more than 50% of TEEs become malicious.
    Another limitation is the stale chip problem highlighted by Ittay Eyal. This limitation
    results in hardware wastage, which results in resource wastage. The stale chip
    problem stems from the idea that it is financially beneficial for malicious actors
    to collect many old SGX chips, which increases their odds of becoming the producer
    of the next block. For example, adversarial actors can collect many old SGX chips
    to build mining rigs. It serves only one purpose, that is, mining, instead of
    buying modern CPUs with SGX, which will help in PoET consensus and be useful for
    general computation. Instead, they can choose to collect as many old SGX-enabled
    chips as they can and increase their chances of winning the mining lottery. Also,
    old SGX-enabled CPUs are cheap and can increase the use of old, inefficient CPUs.
    It is like Bitcoin miners racing to get as many fast ASICs as possible to increase
    their chances of becoming elected miners. However, it results in hardware wastage.
    There is also the possibility of hacking the chip''s hardware. If an SGX chip
    is compromised, the malicious node can win the mining round every time, resulting
    in complete system compromise and undeserved incentivization of miners. This problem
    is called the broken chip problem.


    ### Proof of Authority


    We can think of PoA as a specific kind of proof of stake where the validators
    stake with their identity instead of economic tokens. The identity of a validator
    depicts the authority associated with the validator. A usual process of earning
    authority involves identity verification, reputation building, and a publicly
    scrutinized assessment process. The resultant group becomes a highly trusted set
    of validators to participate in the consensus protocol and produce blocks. Any
    violation by a validator of the rules of the protocol or inability to justify
    the earned right to produce blocks results in the removal of the dishonest validator
    by other validators and users on the network. It’s used in Rinkeby and Kovan Ethereum
    test nets. PoA provides good security as we have trusted validators in the network,
    but the network is somewhat centralized. The resilience against collusion and
    other security threats depends on the consensus algorithm used by the validators.
    If it’s a BFT variant, then usual BFT guarantees of 33% fault tolerance apply.


    ### HoneyBadger BFT


    HoneyBadger BFT (HBBFT) is a leaderless and randomized consensus protocol that
    works under asynchrony. It is the first practical asynchronous Byzantine consensus
    protocol. Generally, in distributed system theory, randomized algorithms are thought
    to be impractical. The HoneyBadger protocol authors claim to refute this belief.
    The approach taken to build this protocol is to improve efficiency by fine-tuning
    existing primitives and introducing new encryption techniques. These techniques
    result in removing bottlenecks in the protocol.


    The first limitation to address is the leader bottleneck, for example, in PBFT
    and other variants there’s a standard reliable broadcast mechanism used to disseminate
    information from the leader to other nodes. This results in significant bandwidth
    consumption, for example, on the order of `O(n^B)` where `b` is the blocks. To
    address this limitation, erasure coding can be used which allows the leader to
    send only erasure codes to the nodes. Then each node sends the erasure code stripe
    received to other nodes. This way, there is less load on the leader. Then all
    nodes simply reconstruct the message. This reduces the leader bandwidth to `O(n)`.
    Transactions are processed in batches in HBBFT, which increases the throughput.


    It is fundamentally an atomic broadcast protocol based on the multivalue Byzantine
    agreement and agreement on common subset. HoneyBadger uses several techniques
    developed previously, including erasure-coded reliable broadcast and common coin–based
    asynchronous Byzantine agreement. It also uses a threshold public key encryption
    (signatures) to provide common coins for the randomized ABA protocol.


    HBBFT implements the total order using the asynchronous common subset (ACS). ACS
    is implemented using two other protocols, reliable broadcast (RBC) and asynchronous
    binary Byzantine agreement (ABA).


    Reliable broadcast was introduced in 1987 by Bracha, commonly known as Bracha’s
    broadcast. This protocol tolerates `f` Byzantine faulty nodes where `n = 3f +
    1`. It provides two guarantees, when a designated node (leader, broadcaster) broadcasts
    a message to all nodes. If any honest node delivers a message `m` broadcast by
    the broadcaster, then all correct nodes deliver `m`. Secondly, if the broadcasting
    node is correct, then every honest node delivers the message broadcast by the
    broadcaster node. Due to the message being echoed from all nodes to all, the communication
    complexity of this protocol becomes `O(n²m)`, which is ok for smaller size networks,
    but in the blockchain world with 1000s of nodes, it is impractical.


    The agreement on a common subset protocol for multiparty computation (ACS for
    MPC) was proposed by Ben-Or. ACS was used as a consensus primitive for multiparty
    computation under an asynchronous network. Multiparty computation (MPC) aims to
    create a mechanism to compute a function jointly over their inputs, while the
    inputs are kept private. ACS achieves an agreement on a common subset of at least
    `n – f` correct inputs. ACS uses RBC and ABA which enables a single bit agreement
    between parties.


    Due to the communication complexity of RBC, HBBFT implements a different bandwidth-efficient
    broadcast mechanism called AVID by Cachin et.al., which uses erasure coding and
    cross checksums to reduce the communication complexity to `O(nm)`. Here, the message
    `m` is erasure coded into different slices, and then each slice is hashed to produce
    a cross checksum. The broadcaster sends a slice and cross checksum to a node,
    and that node then echoes these to all other nodes. Once all slices reach all
    nodes, each node reconstructs the original message from these slices. This way,
    less bandwidth is consumed.


    In summary, HBBFT solves consensus under asynchrony by using the asynchronous
    common subset protocol (ACS) and reliable broadcast (RBC), where each node proposes
    its value, and finally an asynchronous binary agreement protocol (ABA) runs, which
    decides on each proposal.'
  raw: '### PoET


    The proof of elapsed time algorithm was introduced by Intel in 2016\. Remember
    we discussed earlier in Chapter [5](#515270_1_En_5_Chapter.xhtml) that a key purpose
    that PoW fulfills is the passage of some time until the network can converge to
    a canonical chain. Also, the leader, the miner whose block is accepted, wins the
    right to do so by solving PoW. PoET is fundamentally a leader election algorithm
    which utilizes trusted hardware to ensure that a certain time has elapsed before
    the next leader is selected for block proposal. The fundamental idea in PoET is
    to provide a mechanism of leader election by waiting randomly to be elected as
    a leader for proposing new blocks.


    PoET in fact emulates the passage of time that would be consumed by PoW mining.
    The core idea is that every node randomly waits for some time before producing
    a block. The random waiting process runs inside a Trusted execution environment
    (TEE) to ensure that true time has indeed passed. For this purpose, Intel SGX
    or ARM TrustZone can be used. As TEEs provide confidentiality and integrity, the
    network in turn trusts the block producers. PoET tolerates up to 50% faulty TEE
    nodes. However, there is a possibility of Sybil attacks where an actor can run
    many TEE nodes, which can result in shortening the random waiting time. This can
    result in the creation of a malicious chain if more than 50% of TEEs become malicious.
    Another limitation is the stale chip problem highlighted by Ittay Eyal. This limitation
    results in hardware wastage, which results in resource wastage. The stale chip
    problem stems from the idea that it is financially beneficial for malicious actors
    to collect many old SGX chips, which increases their odds of becoming the producer
    of the next block. For example, adversarial actors can collect many old SGX chips
    to build mining rigs. It serves only one purpose, that is, mining, instead of
    buying modern CPUs with SGX, which will help in PoET consensus and be useful for
    general computation. Instead, they can choose to collect as many old SGX-enabled
    chips as they can and increase their chances of winning the mining lottery. Also,
    old SGX-enabled CPUs are cheap and can increase the use of old, inefficient CPUs.
    It is like Bitcoin miners racing to get as many fast ASICs as possible to increase
    their chances of becoming elected miners. However, it results in hardware wastage.
    There is also the possibility of hacking the chip''s hardware. If an SGX chip
    is compromised, the malicious node can win the mining round every time, resulting
    in complete system compromise and undeserved incentivization of miners. This problem
    is called the broken chip problem.


    ### Proof of Authority


    We can think of PoA as a specific kind of proof of stake where the validators
    stake with their identity instead of economic tokens. The identity of a validator
    depicts the authority associated with the validator. A usual process of earning
    authority involves identity verification, reputation building, and a publicly
    scrutinized assessment process. The resultant group becomes a highly trusted set
    of validators to participate in the consensus protocol and produce blocks. Any
    violation by a validator of the rules of the protocol or inability to justify
    the earned right to produce blocks results in the removal of the dishonest validator
    by other validators and users on the network. It’s used in Rinkeby and Kovan Ethereum
    test nets. PoA provides good security as we have trusted validators in the network,
    but the network is somewhat centralized. The resilience against collusion and
    other security threats depends on the consensus algorithm used by the validators.
    If it’s a BFT variant, then usual BFT guarantees of 33% fault tolerance apply.


    ### HoneyBadger BFT


    HoneyBadger BFT (HBBFT) is a leaderless and randomized consensus protocol that
    works under asynchrony. It is the first practical asynchronous Byzantine consensus
    protocol. Generally, in distributed system theory, randomized algorithms are thought
    to be impractical. The HoneyBadger protocol authors claim to refute this belief.
    The approach taken to build this protocol is to improve efficiency by fine-tuning
    existing primitives and introducing new encryption techniques. These techniques
    result in removing bottlenecks in the protocol.


    The first limitation to address is the leader bottleneck, for example, in PBFT
    and other variants there’s a standard reliable broadcast mechanism used to disseminate
    information from the leader to other nodes. This results in significant bandwidth
    consumption, for example, on the order of *O*(*n*^(*B*)) where *b* is the blocks.
    To address this limitation, erasure coding can be used which allows the leader
    to send only erasure codes to the nodes. Then each node sends the erasure code
    stripe received to other nodes. This way, there is less load on the leader. Then
    all nodes simply reconstruct the message. This reduces the leader bandwidth to
    *O*(*n*). Transactions are processed in batches in HBBFT, which increases the
    throughput.


    It is fundamentally an atomic broadcast protocol based on the multivalue Byzantine
    agreement and agreement on common subset. HoneyBadger uses several techniques
    developed previously, including erasure-coded reliable broadcast and common coin–based
    asynchronous Byzantine agreement. It also uses a threshold public key encryption
    (signatures) to provide common coins for the randomized ABA protocol.


    HBBFT implements the total order using the asynchronous common subset (ACS). ACS
    is implemented using two other protocols, reliable broadcast (RBC) and asynchronous
    binary Byzantine agreement (ABA).


    Reliable broadcast was introduced in 1987 by Bracha, commonly known as Bracha’s
    broadcast. This protocol tolerates *f* Byzantine faulty nodes where *n* = 3*f* + 1\.
    It provides two guarantees, when a designated node (leader, broadcaster) broadcasts
    a message to all nodes. If any honest node delivers a message m broadcast by the
    broadcaster, then all correct nodes deliver m. Secondly, if the broadcasting node
    is correct, then every honest node delivers the message broadcast by the broadcaster
    node. Due to the message being echoed from all nodes to all, the communication
    complexity of this protocol becomes *O*(*n*²*m*), which is ok for smaller size
    networks, but in the blockchain world with 1000s of nodes, it is impractical.


    The agreement on a common subset protocol for multiparty computation (ACS for
    MPC) was proposed by Ben-Or. ACS was used as a consensus primitive for multiparty
    computation under an asynchronous network. Multiparty computation (MPC) aims to
    create a mechanism to compute a function jointly over their inputs, while the
    inputs are kept private. ACS achieves an agreement on a common subset of at least
    *n* – *f* correct inputs. ACS uses RBC and ABA which enables a single bit agreement
    between parties.


    Due to the communication complexity of RBC, HBBFT implements a different bandwidth-efficient
    broadcast mechanism called AVID by Cachin et.al., which uses erasure coding and
    cross checksums to reduce the communication complexity to *O*(*nm*). Here, the
    message m is erasure coded into different slices, and then each slice is hashed
    to produce a cross checksum. The broadcaster sends a slice and cross checksum
    to a node, and that node then echoes these to all other nodes. Once all slices
    reach all nodes, each node reconstructs the original message from these slices.
    This way, less bandwidth is consumed.


    In summary, HBBFT solves consensus under asynchrony by using the asynchronous
    common subset protocol (ACS) and reliable broadcast (RBC), where each node proposes
    its value, and finally an asynchronous binary agreement protocol (ABA) runs, which
    decides on each proposal.'
  trans: '

    ### PoET


    PoET（消逝时间证明）算法由英特尔于 2016 年提出。回想我们在第 5 章中讨论过，PoW（工作量证明）的一个关键作用是确保网络能汇聚到一条规范链前，让时间流逝。同时，领导者（即其区块被接受的矿工）通过解决
    PoW 来赢得该权利。PoET 本质上是一种领导者选举算法，它利用可信硬件来确保在下一个领导者被选出来提议新区块之前，已经过去了一段确定的时间。PoET 的基本思想是通过随机等待被选为领导者来提议新区块，从而提供一种领导者选举机制。


    实际上，PoET 模拟了 PoW 挖矿所消耗的时间流逝过程。其核心思想是每个节点在产生区块之前随机等待一段时间。这个随机等待过程在可信执行环境（TEE）内运行，以确保真实的时间确实已经流逝。为此，可以使用英特尔
    SGX 或 ARM TrustZone。由于 TEE 提供了机密性和完整性，网络因此信任区块生产者。PoET 可以容忍高达 50%的故障 TEE 节点。然而，存在女巫攻击的可能性，即攻击者可以运行多个
    TEE 节点，这可能导致随机等待时间缩短。如果超过 50%的 TEE 变得恶意，这可能会导致创建恶意链。另一个局限性是 Ittay Eyal 强调的陈旧芯片问题。这个局限性导致硬件浪费，进而造成资源浪费。陈旧芯片问题源于这样一个想法：对恶意行为者来说，收集大量旧的
    SGX 芯片在经济上是有利的，这增加了他们成为下一个区块生产者的几率。例如，对抗性行为者可以收集大量旧的 SGX 芯片来搭建矿机。这仅用于一个目的，即挖矿，而不是购买支持
    SGX 的现代 CPU（后者既有助于 PoET 共识，又可用于通用计算）。相反，他们可以选择尽可能多地收集支持 SGX 的旧芯片，以增加赢得挖矿彩票的机会。此外，支持
    SGX 的旧 CPU 价格低廉，可能会增加对老旧低效 CPU 的使用。这就像比特币矿工竞相获得尽可能多的快速 ASIC（专用集成电路）以增加当选矿工的几率一样。然而，这导致了硬件浪费。还存在破解芯片硬件的可能性。如果某个
    SGX 芯片被攻破，恶意节点每次都能赢得挖矿轮次，从而导致整个系统被攻破，并使矿工获得不当激励。这个问题被称为破碎芯片问题。


    ### PoA（权威证明）


    我们可以将 PoA 视为一种特定类型的权益证明，其中验证者用其身份而非经济代币进行质押。验证者的身份代表了与之相关的权威性。获得权威的常规过程包括身份验证、声誉建立以及经过公众严格审查的评估流程。由此产生的群体成为一组高度可信的验证者，可以参与共识协议并生产区块。如果验证者违反协议规则或无法证明其有正当权利生产区块，则会导致网络中的其他验证者和用户将该不诚实验证者移除。它被用于
    Rinkeby 和 Kovan 以太坊测试网络。PoA 提供了良好的安全性，因为我们在网络中拥有可信的验证者，但网络有些中心化。抵御合谋和其他安全威胁的能力取决于验证者所使用的共识算法。如果它是
    BFT（拜占庭容错）的一种变体，则适用通常的 BFT 保证（33%的容错率）。


    ### HoneyBadger BFT（蜜獾拜占庭容错协议）


    HoneyBadger BFT（HBBFT）是一种无领导者、随机化的共识协议，可在异步网络环境下运行。它是第一个实用的异步拜占庭共识协议。通常，在分布式系统理论中，随机化算法被认为是不切实际的。HoneyBadger
    协议的作者声称反驳了这一观点。构建该协议所采用的方法是，通过微调现有原语并引入新的加密技术来提高效率。这些技术消除了协议中的瓶颈。


    首先要解决的局限性是领导者瓶颈问题，例如在 PBFT（实用拜占庭容错算法）及其变体中，存在一种标准的可靠广播机制，用于将信息从领导者传播到其他节点。这会导致显著的带宽消耗，例如复杂度为`O(n^B)`，其中`b`是区块数量。为了解决这个局限性，可以使用纠删码，这允许领导者只向节点发送纠删码。然后，每个节点将接收到的纠删码条带发送给其他节点。这样，领导者的负载就减轻了。随后，所有节点只需重建消息即可。这使领导者的带宽降低到`O(n)`。在
    HBBFT 中，交易以批次方式处理，这提高了吞吐量。


    它本质上是一种基于多值拜占庭协议和公共子集协议的原生广播协议。HoneyBadger 使用了先前开发的几种技术，包括纠删码可靠广播和基于公共硬币的异步拜占庭协议。它还使用门限公钥加密（签名）来为随机化
    ABA（异步拜占庭协议）提供公共硬币。


    HBBFT 使用异步公共子集（ACS）来实现全序。ACS 通过另外两个协议来实现：可靠广播（RBC）和异步二值拜占庭协议（ABA）。


    可靠广播由 Bracha 于 1987 年提出，通常被称为 Bracha 广播。该协议可容忍`f`个拜占庭故障节点，其中`n = 3f + 1`。它提供两个保证：当指定节点（领导者、广播者）向所有节点广播消息时。如果任何诚实节点提交了广播者广播的消息`m`，那么所有正确节点都会提交`m`。其次，如果广播节点是诚实的，那么每个诚实节点都会提交由广播节点广播的消息。由于消息需要在所有节点之间来回转发，该协议的通信复杂度变为`O(n²m)`，这对于较小规模的网络是可以接受的，但在拥有数千个节点的区块链世界中，这是不切实际的。


    用于多方计算的公共子集协议（MPC 的 ACS）由 Ben-Or 提出。ACS 被用作异步网络环境下多方计算的共识原语。多方计算旨在创建一种机制，在其输入保持私密的情况下，根据各方的输入共同计算一个函数。ACS
    至少对`n – f`个正确输入组成的公共子集达成一致。ACS 使用 RBC 和 ABA，这使得各方之间能够就单个比特达成一致。


    由于 RBC 的通信复杂度问题，HBBFT 实现了一种不同的、带宽高效的广播机制，即 Cachin 等人提出的 AVID（异步可验证信息分发）。该机制使用纠删码和交叉校验和，将通信复杂度降低到`O(nm)`。这里，消息`m`被纠删码编码成不同的切片，然后对每个切片进行哈希，生成一个交叉校验和。广播者向一个节点发送一个切片和交叉校验和，然后该节点将这些信息回显给所有其他节点。一旦所有切片到达所有节点，每个节点就从这些切片中重建原始消息。这样，就消耗了更少的带宽。


    总之，HBBFT 通过使用异步公共子集协议和可靠广播解决了异步环境下的共识问题。其中每个节点提出自己的值，最后运行一个异步二值拜占庭协议，对每个提案做出决定。

    '
- fmt: '### Avalanche


    This new paradigm of consensus protocols achieves an agreement through random
    network sampling. The Avalanche family of protocols allow for a more relaxed form
    of agreement as compared to a deterministic agreement. However, it provides stronger
    safety than PoW and enjoys the node scalability of the Nakamoto consensus. We
    can think of it as a probabilistic version of the traditional quorum-based protocol
    but without explicit intersections in voting. The key idea is to combine the best
    of Nakamoto family with the best of classical family.


    The safety of these protocols is probabilistic but with negligible failure possibility.
    In terms of liveness, these protocols terminate with high probability. For liveness,
    these protocols rely on synchrony. The protocol achieves safety through metastability.
    Safety provided by the protocol is probabilistic where an adjustable system chosen
    security parameter makes the possibility of consensus failure negligibly small.
    The protocol guarantees safety and liveness properties, with high probability:


    * **Safety:** No two correct nodes accept conflicting transactions.

    * **Liveness:** Every correct node will eventually accept any transaction by an
    honest client.


    This family has several protocols that build up the complete Avalanche protocol.
    The protocol is built gradually, starting from the so-called slush protocol, which
    provides metastability, snowflake, the BFT protocol, Snowball, which affirms the
    state by adding confidence to the decision; and, finally, Avalanche, which adds
    the DAG structure to improve efficiency.


    With these innovations, the protocol provides quick finality, low latency, high
    throughput, and scalability.


    ### DAG-Based Consensus Protocols


    Usually, a blockchain is a linear structure; however, another class of algorithms
    has been proposed with nonlinear blockchain structures. The primary aim is efficiency,
    and these protocols are based on the premise that instead of relying on a limited
    and slow, linearly growing chain, the ledger should be able to expand in all directions,
    like a DAG, which can result in improved performance, high scalability, and fast
    transaction confirmation. DAGs require less communication, computation, and storage,
    thus increasing the performance. There are two types of DAG-based ledgers: block-based
    DAG and transaction-based DAG.


    #### Block-Based DAG


    Every vertex of a blockDAG contains a block. Each block can be a child of multiple
    blocks, instead of only one parent in linear designs, SPECTRE, PHANTOM, and Meshcash.


    #### Transaction-Based DAG


    Each vertex of a transaction-based DAG contains a transaction. IOTA Tangle, Byteball,
    Graphchain, and Avalanche are some examples of a transaction-based DAG.


    Hashgraph is a permissioned graph–based blockchain with a BFT-type consensus protocol.


    ### Ebb-and-Flow Protocols


    This work is a response to a liveness issue found in Gasper. Gasper is a PoS-based
    consensus mechanism proposed for Ethereum’s beacon chain. It is a combination
    of Casper FFG, the finality gadget, and LMD GHOST, the fork choice rule. In this
    work, “snap-and-chat” protocols are proposed that are provably secure.


    Nakamoto-style protocols provide liveness under network partitions and dynamic
    network participation, but they sacrifice safety over liveness. BFT protocols,
    on the other hand, provide safety (finality) under network partitions and low
    participation (participants less than `3*f+1`) but sacrifice liveness. It has
    been shown that it is impossible for a protocol to be both live under dynamic
    participation and safe under network partitions. This work answers the question
    of whether there exists a consensus mechanism that guarantees both availability
    and safety. The key idea is exquisite and proposes to create two ledgers instead
    of one. Remember, no protocol can ensure safety and liveness under network partitions
    and dynamic partitions with a single ledger. In other words, longest chain–style
    mechanisms favor liveness over safety and provide dynamic availability under different
    participation levels; however, BFT protocols favor safety over liveness and provide
    finality. This problem is called the availability-finality dilemma, as a single
    ledger cannot provide both properties. Therefore, the proposal is to create two
    ledgers. The first is an “available full ledger” that is always live but safe
    only without network partitions, similar to “longest chain–type PoW protocol.”
    The other ledger, called the “finalized prefix ledger,” is always safe but not
    live in low participation scenarios. This concept is the same as traditional BFT–style
    protocols, for example, PBFT, which stalls unless a threshold of participants
    is available. As the finalized prefix ledger is the prefix of the available full
    ledger, both ledgers eventually converge as a single authentic chain of history.
    In other words, the finalized prefix ledger is safe under network partitions and
    if less than one-third of participants are faulty.


    Moreover, the available full ledger is live under dynamic (low) participation
    and if <50% of active players are Byzantine. This technique of combining BFT-style
    with Nakamoto-style protocols and creating so-called nested ledgers has been named
    the “Ebb-and-Flow” property. The so-called “snap-and-chat” protocols are developed
    to achieve the “Ebb-and-Flow” property. The finalized ledger is always the prefix
    of the available ledger, thus creating a combined proper single chain. At a high
    level, this mechanism works by ordering transactions into a chain of blocks by
    using some longest chain–type protocol, for example, PoW. Next, snapshots of prefixes
    from this blockchain feed into a partially synchronous BFT-style protocol for
    example, PBFT, which produces a chain containing multiple chains of blocks. Next,
    any duplicates or invalid transactions are removed, which creates a finalized
    prefix ledger. This finalized prefix ledger is added before the output of the
    PoW-style protocol, and any duplicates or invalid transactions are removed. This
    process finally creates an available single ledger.


    There is a myriad of consensus protocols that exist, but we cannot cover all of
    them. However, we did explore quite a few covering different types and classes
    including randomized, deterministic, CFT, BFT, and Nakamoto-style protocols.


    Let’s now turn our attention to formal verification which allows us to ensure
    the correctness of all these different consensus protocols.'
