  trans: '好的，没问题。作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成高质量的中文。



    ### 发生在先关系与因果关系


    我们之前看到，一个节点可以执行一些事件。它可以执行本地计算、发送消息或接收消息。所有事件在单个节点上按顺序发生，很容易看出哪个事件发生在下一个事件之前。这是在每个节点上施加的一种严格全序关系。


    发生在先关系是一种具有三个性质的反自反偏序关系（严格偏序）：反自反性、反对称性和传递性。


    现在假设发生了两个事件 `e` 和 `f`。要确定事件 `e` 是否发生在事件 `f` 之前，我们使用以下规则。


    事件 `e` 发生在事件 `f` 之前，当且仅当：`e → f`（右箭头用作发生在先关系的符号）：


    - 如果 `e` 和 `f` 发生在同一个进程中，并且在该进程中 `e` 在 `f` 之前执行，那么我们可以推断出 `e` 先于 `f`，即一种顺序关系。

    - 事件 `e` 是某个（唯一的）消息 `m` 的发送事件，而事件 `f` 是该消息 `m` 的接收事件。

    - 如果存在一个事件 `g`，使得 `e → g` 且 `g → f`，那么 `e → f`。这被称为传递关系。


    我们可以在图 1-23 中看到这三种规则的可视化表示。


    ![](img/515270_1_En_1_Fig23_HTML.jpg)


    *一个示意图，上方有 3 个标记为 P 的右箭头，下方有 2 个标记为 Q 的右箭头。这些线上有元素，如 E、F 和 G。*


    **图 1-23** 发生在先规则


    如果 `e` 和 `f` 是偏序的，那么我们称 `e` 发生在 `f` 之前。如果 `e` 和 `f` 不是偏序的，那么我们称 `e` 和 `f` 是并发的。这也不意味着
    `e` 和 `f` 恰好完全独立地同时执行。它仅仅意味着 `e` 和 `f` 没有因果关系。换句话说，不存在从一个事件导致另一个事件的消息序列。这种并发关系写作
    `e ∥ g`。图 1-24 详细展示了一个示例场景。


    ![](img/515270_1_En_1_Fig24_HTML.jpg)


    *一个示意图，有 3 个标记为 P、Q 和 R 的右箭头。这些线上有元素，如 E、F、G、H、I 和 J。其中一些元素彼此连接。*


    **图 1-24** 发生在先关系示例


    在图 1-24 中，关系 `e → f`、`g → h`、`i → j` 是由于进程执行事件的顺序。关系 `f → g`、`h → j` 是由于消息 `m[1]`
    和 `m[2]`。此外，`e → g`、`e → h`、`e → j`、`f → h`、`f → j`、`g → j` 代表了传递关系。最后，并发事件是 `e
    ∥ i`、`f ∥ i`、`g ∥ i`、`h ∥ i`。


    ### 逻辑时钟


    逻辑时钟不依赖于物理时钟，可用于定义分布式系统中事件的顺序。逻辑时钟仅衡量事件的顺序，而不参考任何外部物理时间。


    ### 兰波特时钟


    兰波特时钟是分布式系统中每个进程维护的一个逻辑计数器，每次发生事件时，它都会递增，从而为维护和观察分布式系统中事件之间的发生在先关系提供了一种手段。


    这里的关键思想是每个事件都被分配一个数字，该数字随着事件在系统中发生而递增。这个数字也称为兰波特时钟。兰波特时钟捕捉了因果关系。


    兰波特时钟/逻辑时钟的算法描述如下：


    - 每个进程维护一个本地计数器，初始化时设置为零。

    - 进程上的每个事件发生时，该进程将计数器加一。

    - 发送消息时，进程会包含其计数器的当前值。

    - 接收消息时，进程将其计数器值设置为 `max(本地值, 接收值) + 1`。


    在 `e → f` 的**发生在先关系**中，我们可以说可能是 `e` 导致了 `f`。这意味着发生在先关系捕捉了事件的因果关系。


    更正式地说，兰波特算法如清单 1-1 所示。


    ```

    on init

    t := 0

    on event localcomputation do

    t := t + 1

    end

    on event send(m) do

    t := t + 1

    send(m, t)

    end

    on event receive(m'', t'') do

    t := max(t, t'') + 1

    end

    ```


    **清单 1-1** 兰波特时钟


    兰波特时钟与因果关系是一致的。我们可以这样写：


    `如果 e → f ⇒ LC(e) < LC(f)`


    这意味着，如果 `e` 发生在 `f` 之前，那么它意味着事件 `e` 的时间戳（兰波特时钟 – `LC`）小于事件 `f` 的时间戳。


    有一个称为**时钟条件**的正确性标准，用于评估逻辑时钟：


    `∀ a,b: a → b ⇒ LC(a) < LC(b)`


    这解读如下：对于所有 `a` 和 `b`，如果 `a` 发生在 `b` 之前，则意味着 `a` 的兰波特时钟（时间戳）小于 `b` 的兰波特时钟（时间戳）。


    这意味着，如果事件 `A` 发生在事件 `B` 之前，则意味着事件 `A` 的兰波特时钟小于事件 `B` 的兰波特时钟。


    现在我们看到了一幅图景逐渐浮现。无需使用物理时钟，我们现在可以看到，通过使用兰波特时钟，分布式系统中的事件如何被分配一个可用于排序的编号。


    现在，让我们在一个由三个进程（节点、计算机）`P`、`Q` 和 `R` 组成的简单分布式系统上运行此算法。


    该算法有两个关键性质：


    1. 如果 `a → b`，那么 `LC(a) < LC(b)`。

    2. 但 `LC(a) < LC(b)` 并不表示 `a → b`。


    这意味着两个事件可能具有相同的时间戳。如图 1-25 所示，在进程线 `P` 和 `R` 上，注意事件时间戳都是 `1`。您发现问题了吗？在这种方案中，无法保证全序，因为两个事件可能获得相同的时间戳。


    ![](img/515270_1_En_1_Fig25_HTML.jpg)


    *一个示意图，有 3 条标记为 P、Q 和 R 的线。线上有事件，如 (P, 1)、(Q, 3) 等。一些事件通过时间线彼此连接。*


    **图 1-25** 兰波特时钟算法运行示例


    一种显而易见的解决方法是使用进程标识符与时间戳结合。通过这种方式，可以实现全序。


    图 1-26 展示了使用全序逻辑时钟的执行过程。


    ![](img/515270_1_En_1_Fig26_HTML.jpg)


    *一个示意图，有 3 条标记为 P、Q 和 R 的线。线上有事件，如 (P, 1)、(Q, 3) 等。一些事件通过时间线彼此连接。*


    **图 1-26** 全序兰波特时钟运行示例


    了解分布式系统中事件的顺序非常有用。事件的顺序使我们能够找到事件之间的因果关系。对分布式系统中因果关系的了解有助于解决多个问题。一些例子包括但不限于：复制数据库中的一致性、找出不同事件之间的因果依赖关系、衡量分布式系统中执行的进度以及衡量并发性。


    我们可以用它来构建分布式状态机。如果事件带有时间戳，我们还可以看到事件发生的具体时间、之前发生了什么以及之后发生了什么，这有助于调试和调查分布式系统的故障。这种了解在构建调试器、快照某个时间点、修剪某个时间点之前的数据以及许多其他用例中都非常有用。


    `LC(a) < LC(b)` 并不表示 `a → b` 这一局限性意味着兰波特时钟无法判断两个事件是否并发。这个问题可以使用向量时钟来解决。

    '
- fmt: '# Vector Clocks


    It is a type of logical clock which allows detecting concurrent events in addition
    to determining partial ordering of events and detecting causality violations.
    Here is how it works:


    - At the start, all vector clocks in a distributed system are set to zero, that
    is, `[0,0,0,0,0]`.

    - Whenever an internal event occurs at a process, the process’s logical clock
    value in the vector increments by one.

    - Whenever a process sends a message, the process’s logical clock value in the
    vector increments by one.

    - Whenever a process receives a message, the process’s logical clock value in
    the vector increments by one.

    - Each element in the vector increments.


    # Faults and Fault Tolerance


    Faults in a distributed system are inevitable. In fact, distributed systems are
    characterized by faults. A large body of work is dedicated to fault tolerance
    and is at the core of the distributed systems research. To understand faults,
    let’s look at a small example.


    Imagine a simplest distributed system with two nodes, shown in Figure [1-27](#515270_1_En_1_Chapter.xhtml#Fig27).


    A schematic of distributed system with 2 nodes `P1` and `P2` joined together via
    communication link.


    **Figure 1-27** A simplest distributed system


    Think about what faults can occur:


    - The processor `p1` or `p2` may crash.

    - Communication link can fail.

    - Latency on the communication link.

    - Slow processing at `p1` or `p2`.

    - `P1` can pretend that it sent some message; in fact, it has not.


    There can be several faults that occur in a distributed system:


    - Process/program faults

    - Communication/link faults

    - Storage faults


    There are several types of faults that have been formally defined in distributed
    systems literature. These types are categorized under the so-called fault model
    which basically tells us which kind of faults can occur.


    We now define each one of these as follows.


    ## Crash-Stop


    In this scenario, a process can fail to stop a function at any point in time.
    This can happen when a hardware fault may have occurred in a node. Other nodes
    are unable to find out about the crash of the node in this model.


    ## Fail-Stop


    In this model, a process can fail by stopping execution of the algorithm. Other
    nodes in the distributed system can learn about this failure, usually by using
    failure detectors.


    ## Omission Faults


    Omission faults are where a message can be lost.


    ### Send Omission


    This is where a process fails to send a message.


    ### Receive Omission


    This is where a process fails to receive a message.


    ### General Omission


    This is where a process may exhibit either a send omission or a receive omission.


    ## Covert Faults


    This model captures a behavior where a failure might remain hidden or undetected.


    ## Computation Faults


    In this scenario, we capture the situation where a processor responds incorrectly.


    ## Byzantine Faults


    This model captures the arbitrary faults where a process may fail in arbitrarily
    many ways.


    ### Byzantine Faults with Authentication


    In this model, a process can exhibit arbitrary behavior; however, there is a verification
    of received messages to this process, which is possible by using authentication
    and digital signatures. This nonrepudiation and verification can make dealing
    with Byzantine faults a bit easier.


    ### Byzantine Faults Without Authentication


    In this model, a process can exhibit arbitrary behavior, but no message verification
    is possible to ascertain the validity of the messages.


    ## Timing Faults


    This is where a process can exhibit slow behavior or may run faster than other
    processes. This can initially look like a partially synchronous behavior, but
    a node that has not received a message for a very long time can be seen as one
    example of this type of fault. This covers scenarios where an expected message
    delivery is not in line with the expected delivery time or lies outside the specified
    time interval.


    Failures can be detected using failure detectors where a process can be suspected
    of a failure. For example, a message not received for an extended period of time
    or that has gone past the threshold of timeout can be marked as a failed process.


    More on failure detector in Chapter [3](#515270_1_En_3_Chapter.xhtml); now let’s
    discover what a fault model is and fault classes.


    In Figure [1-28](#515270_1_En_1_Chapter.xhtml#Fig28), we can visualize various
    classes of faults, where Byzantine faults encompass all types of faults at varying
    degrees of complexity and can happen arbitrarily, whereas crash faults are the
    simplest type of faults.


    A schematic with 5 non concentric circles. The components from the outer circle
    are byzantine, computation, timing, omission, crash faults.


    **Figure 1-28** Diagram of fault models and fault classes


    Fault classes allow us to see what faults can occur, whereas fault models help
    us to see what kind of faults the system can exhibit and what types of faults
    should be tolerated in our distributed algorithm.


    A system or algorithm that can tolerate crash faults only is called a crash fault
    tolerant or `CFT` in short. In contrast, a system that can handle Byzantine faults
    is called the Byzantine fault–tolerant system or algorithm. Usually, this applies
    to consensus mechanisms categorized and developed with the goal of crash fault
    tolerance or Byzantine fault tolerance. We will see more about this in Chapter
    [3](#515270_1_En_3_Chapter.xhtml), where we discuss consensus algorithms.'
