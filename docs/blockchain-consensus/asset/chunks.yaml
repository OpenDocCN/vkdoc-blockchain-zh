    ### 中本聪及后中本聪共识


    另一方面，有一系列协议可称为中本聪共识家族，因为这一家族是由中本聪通过比特币首次引入的。


    从区块链的角度来看，传统协议和中本聪式协议都在使用中。几乎所有许可链都使用 PBFT 经典算法的变体。另一方面，像以太坊和比特币这样的非许可公链则使用中本聪式（PoW）共识算法。还有权益证明等其他类别及其变体，但它们都是在
    2008 年比特币工作量证明引入之后才出现的。


    我们将在第 4 章详细讨论中本聪及后中本聪式算法。


    ## 本章小结


    在本章中，我们涵盖了协议、广播、复制和共识的主要概念：


    - 共识是分布式计算中的一个基本问题。

    - 共识与原子广播是等价的问题。解决了其中一个，另一个也迎刃而解。

    - 存在多种广播原语，例如尽力而为广播、可靠广播、急切可靠广播以及全序广播，它们在传递保证方面的严格程度各不相同。

    - 还有概率性广播协议，其灵感源于公共信息流言传播方式，能以高概率传递消息。

    - 复制和状态机复制是为分布式系统提供容错能力的技术。

    - 仲裁系统对于确保复制系统中的一致性、可用性、效率和容错性至关重要。

    - 过去半个世纪的研究产生了两种主要的共识类别，即经典许可共识和中本聪非许可共识。

    - 过去几十年的研究中，研究人员已经证明了多种不可能性结果。例如 FLP 不可能性、最小进程数量要求以及网络链路等结果已被提出并得到证明。这些基础性结果使研究人员能够专注于其他问题，因为如果某件事已被证明不可能，那么投入时间和精力去试图解决它是没有价值的。

    - 其他研究还包括故障检测器，它提供了一种检测分布式系统故障的方式，允许进程据此做出响应以继续推进。为分布式系统配备故障检测器、同步假设、随机化协议和混合协议等预言机，是规避
    FLP 不可能性结果的一种方法。


    在下一章中，我们将探讨区块链，描述它是什么，以及如何从我们目前所学的知识角度来理解它。


    # 4. 区块链


    在本章中，我们将学习区块链是什么、它的各种元素，并通过分布式计算的视角审视区块链。同时，我们还将给出区块链的形式化定义和性质。此外，我们也将介绍比特币和以太坊。最后，我将介绍一些区块链的应用场景。


    区块链之所以引人入胜，是因为它涉及众多学科，包括分布式计算、网络、密码学、经济学、博弈论、编程语言和计算机科学。


    区块链吸引了来自众多不同领域的人士，包括但不限于前面提到的学科。由于几乎在生活的方方面面都有应用场景，区块链已经俘获了公众以及众多学者和行业专业人士的想象力。


    区块链于 2008 年随着比特币的出现而诞生。比特币是一种点对点、去中心化的电子现金方案，它不需要任何可信第三方来提供与货币相关的信任保障。


    ## 什么是区块链


    互联网上和许多不同的书籍中，对区块链有众多定义。虽然所有这些定义都是正确的，有些还非常出色，但我将尝试用自己的话来定义区块链。


    首先，我们将从外行的角度来定义它，然后从纯粹的技术角度来定义。


    ### 外行定义


    区块链是一种共享的记录保存系统，每个参与者都保存着一份按时间顺序排列记录的副本。参与者只有在集体同意的情况下才能添加新记录。


    ### 技术定义


    区块链是一个点对点、密码学安全、仅可追加、不可变且防篡改的共享分布式账本，由按时间排序且可公开验证的交易组成。用户只能通过网络中节点间的共识在区块链中添加新记录（交易和区块）。


    ## 背景


    区块链的起源可以追溯到早期为数字文档时间戳开发的系统。此外，长期以来创建具有匿名性和可问责性等理想特性的安全电子现金的难题，也激发了区块链的发展。


    以下讨论一些促成区块链发展的关键思想。


    要创建实用的数字现金，需要解决两个基本问题：


    - 可问责性以防止双重支付

    - 匿名性以保护用户隐私


    问题在于如何解决可问责性和双重支付问题。下面描述的方案试图解决这些问题，并设法实现了这些特性；但可用性较差，且它们依赖于可信第三方。

