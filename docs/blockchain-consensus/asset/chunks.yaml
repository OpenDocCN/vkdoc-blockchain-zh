  trans: '

    ### 量子密码学


    量子密码学确实是量子计算中最受关注的方面，尤其是从它对现有密码学可能产生的影响来看。这里有两个维度：一个是量子密码学，另一个是后量子密码学。


    量子密码学指基于量子力学特性的密码学原语或技术。例如，量子密钥分发、量子抛币和量子承诺。利用量子特性，可以开发出一种新型的无条件安全机制，这在经典世界中是绝无仅有的。量子密钥分发（QKD）协议，例如
    `BB84`，由 Bennett 和 Brassard 于 1984 年提出，允许双方使用量子比特安全地构建私钥。这种量子方案的优势在于，由于叠加原理，任何试图窃听的敌手都必然会被检测到。


    量子密码学研究的另一个维度是量子计算机对经典密码学的影响。我们知道，利用肖尔算法，离散对数问题可以得到解决，整数分解速度可以加快，这可能导致常用的公钥密码学方案（如
    `RSA` 和椭圆曲线密码学）被破解。预计对对称密码学的影响不会太大，因为只需增加密钥长度，即可确保经典世界中的穷举搜索 `*O*(*n*)` 以及利用格罗弗算法或类似算法通过量子技术实现的
    `O(\sqrt{n})` 搜索不再有效。


    后量子密码学方面已经研究了几种方法，包括基于格的密码学、基于编码的密码学、多元密码学、基于哈希的密码学和基于同源的密码学。


    由于区块链的共识机制使用了已知会受到量子计算影响的密码学，因此今天产生的区块必须具备抗量子能力至关重要，这样当量子计算机具备能力时，它们也无法重写整个区块链的历史。例如，比特币使用了数字签名方案
    `ECDSA`，量子计算机可以破解该方案。即使量子技术在十年内才具备破解 `ECDSA` 的能力，它们仍然可以由于 `ECDSA` 被破解而转移资金。因此，需要解决这个问题，并为已经产生和未来的区块施加一些抗量子能力。如果未来量子技术具备破解
    `ECDSA` 的能力，敌手就无法重写区块历史。比特币通常并不具备量子安全性，而 Lamport 签名已被提出以缓解此问题。请注意，在可预见的未来，比特币是安全的，而破解
    ECC 所需的量子计算机仍需数十年才能实现。要在一小时内破解 256 位 ECC 加密，需要 317 × 10⁶ 个物理量子比特⁷。然而，目前我们拥有的最多量子比特数仅为
    127，搭载于 IBM 的 127 量子比特 Eagle 处理器上。因此，破解椭圆曲线密码学在短期内不会成为现实。


    到目前为止，我们已经讨论了什么是量子计算以及它对经典计算可能产生的影响。我们还介绍了一些量子计算的应用以及相关的技术细节，如量子门和量子电路。有一点是明确的：量子计算将很快彻底改变世界，并且人们已经在投入巨大的努力来推动这项技术的发展并使其成为主流。


    随着量子计算的这些革命性进步，一个自然的问题出现了：是否有可能利用这种力量并将其应用于解决分布式计算问题，特别是共识问题？我们能否使共识更快？能否以某种新颖的方式规避
    FLP 不可能性？或者说 FLP 不可能性是否甚至适用于量子世界？对于拜占庭将军问题，是否存在量子解决方案？量子计算如何帮助分布式系统？它能提高其效率吗？量子共识能否容忍任意数量的不诚实方，并且无需遵循通常的下界？区块链能否从这一进步中受益，并改进区块链共识以及区块链的其他方面，例如密码学、安全性、效率和可扩展性？我们将在下一节回答这些问题。

