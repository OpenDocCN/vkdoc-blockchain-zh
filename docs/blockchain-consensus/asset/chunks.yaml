  trans: '好的，作为一名高级文档工程师和翻译员，我将根据您提供的格式和注意事项，将给定的英文文本翻译成中文。



    ### 分组密码


    分组密码通过将明文划分为固定长度的块来进行加密。历史上，像 `DES` 这样的分组密码是使用费斯妥网络（Feistel mechanisms）构建的。现代密码，如
    `AES`，则使用代换-置换网络（`SPN`）。


    图 2-5 展示了一个简单的分组密码模型。


    ![](img/515270_1_En_2_Fig5_HTML.png)


    分组密码模型。明文 `P` 和密钥 `K` 被传递到分组密码加密函数中，该函数将它们结合起来以获得密文 `C`。


    **图 2-5** 分组密码


    图 2-5 所示的模型包括明文、加密和密文。加密器将固定长度的明文块和密钥作为输入，并生成密文块。


    分组密码主要用于加密，但也可用于构建哈希函数、创建流密码、构建伪随机数生成器和消息认证码。


    加密试图实现两个必要的属性：混淆（confusion）和扩散（diffusion）。混淆增加了加密文本与明文之间关系的模糊性。它是通过使用代换来实现的，在现代加密算法（如
    `AES`）中，代换由称为 S-box 的查找表执行。


    扩散确保明文在统计上分散到整个加密数据中。换句话说，它确保即使明文中的单个比特发生变化，密文也会发生很大变化，从而隐藏明文和密文之间的关系。也就是说，它隐藏了明文的统计特性，以挫败统计分析攻击。此外，在现代加密算法（如
    `AES`）中，置换盒提供了扩散。因此，混淆和扩散结合起来创建安全的密码算法。


    数据加密标准（`DES`）于 20 世纪 70 年代开发，并在 20 世纪 80 年代和 90 年代被广泛使用。随着时间的推移，由于技术的进步，`DES`
    的效率开始下降。这主要是由于其 56 位密钥长度较短。在 1990 年代末，经过一些成功的暴力破解攻击（例如 deep crack 和 `COPACOBANA`）之后，`DES`
    不再安全变得显而易见。因此，引入了三重 `DES`，它连续加密三次（三重加密），从而将密钥长度增加到 112 位。这有助于防止暴力破解攻击，事实上三重 `DES`
    至今仍未被破解。然而，由于对性能缓慢和 64 位块大小的担忧，`NIST` 最终在 2001 年用 `AES` 取代了 `DES`。


    分组密码有多种工作模式。这些模式使分组密码不仅能提供机密性，还能提供完整性和真实性。其中一些模式包括：


    *   电子密码本模式（Electronic codebook mode）

    *   密码块链接模式（Cipher block chaining mode）

    *   计数器模式（Counter mode）

    *   密码反馈（`CFB`）模式

    *   伽罗瓦/计数器模式（`GCM`）

    *   输出反馈（`OFB`）模式


    我们这里只解释三种模式。


    #### 电子密码本


    电子密码本（`ECB`）是一种基本的操作模式，其中加密数据是对明文的每个块逐一应用加密算法的结果。


    这种模式是最直接的，但我们不应该在实践中使用它，因为它是不安全的，并且可能会泄露信息。


    ![](img/515270_1_En_2_Fig6_HTML.jpg)


    密码本模式模型包含 3 个框，其元素如下：明文和密钥通过密码加密以获取密文。


    **图 2-6** 分组密码的电子密码本模式


    图 2-6 显示，我们将明文 `P` 作为输入提供给分组密码加密函数，并提供一个密钥，该函数输出密文 `C`。


    #### 密码块链接


    在密码块链接（`CBC`）模式下，每个明文块都与先前加密的块进行异或（XOR）运算。`CBC` 模式使用 `IV` 来加密第一个块。`IV` 必须是随机选择的。`CBC`
    模式的操作如图 2-7 所示。


    ![](img/515270_1_En_2_Fig7_HTML.png)


    链接模式模型具有 3 个框，包含以下元素：密钥指向密码加密以获取密文，该密文再指向下一个明文。


    **图 2-7** 密码块链接模式


    #### 计数器模式


    计数器（`CTR`）模式将分组密码用作流密码。在这种情况下，一个唯一的随机数（nonce）与计数器值连接以生成密钥流。


    如图 2-8 所示，`CTR` 模式的工作原理是利用一个随机数 `N` 和一个计数器 `C`，它们被送入分组密码加密函数。分组密码加密函数接收密钥 `KEY`
    作为输入，并生成一个密钥流（伪随机或随机字符流），该密钥流与明文（`P`）进行异或运算后，生成密文（`C`）。


    ![](img/515270_1_En_2_Fig8_HTML.png)


    计数器模式模型包含 3 个框，具有以下元素：随机数、计数器、密钥、分组密码加密、密钥流、明文、密文。


    **图 2-8** 计数器模式


    除了加密之外，我们还可以使用其他模式来实现不同的目的。我们将在下一节中讨论其中的一些模式。


    #### 密钥流生成模式


    在密钥流生成模式下，加密函数生成一个密钥流。流密码使用此密钥流，将其与明文流进行异或运算以生成密文。


    #### 消息认证模式


    消息认证码（`MAC`）是通过消息认证模式下的加密函数产生的。`MAC` 是一种提供完整性服务的加密校验和。使用密码块链接模式（`CBC` 模式）的分组密码可用于生成
    `MAC`。我们可以使用 `MAC` 来检查未经授权的实体是否修改了消息。我们通过使用 `MAC` 函数用密钥加密消息来实现这一点。然后，接收者通过用密钥重新加密收到的消息并与收到的
    `MAC` 进行比较来检查消息的 `MAC`。如果它们匹配，则表示没有未经授权的实体修改过该消息；因此，提供了完整性服务。如果它们不匹配，则意味着某个未经授权的实体在传输过程中更改了消息。


    任何分组密码，例如处于 `CBC` 模式下的 `AES`，都可以生成 `MAC`。消息的 `MAC` 是 `CBC` 操作最后一轮的输出。`MAC` 输出的长度与用于生成
    `MAC` 的分组密码的块长度相同。尽管 `MAC` 的工作方式类似于数字签名，但由于其对称性，它们无法提供不可否认服务。


    #### 密码哈希模式


    哈希函数主要用于将消息压缩为固定长度的摘要。密码哈希模式下的分组密码也可用作压缩函数来生成哈希。


    现在我们将详细描述高级加密标准（`AES`）。

