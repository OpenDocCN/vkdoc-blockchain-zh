  trans: "\n### 切割（Cuts）\n\n切割可以定义为在时空图中连接每个进程线上单个时间点的一条线。时空图上的切割可以作为可视化分布式计算全局状态（在该切割处）的一种方式。同时，它也是可视化切割之前（即过去）和之后（即未来）发生的事件集合的一种方式。切割左侧的所有事件被视为**过去**，切割右侧的所有事件被称为**未来**。存在一致性切割和不一致性切割。如果在切割之前的已用时间内所有接收到的消息都已发送，即位于过去，则称为一致性切割。换句话说，遵循因果规则的切割就是一致性切割。不一致性切割是指消息从未来（切割右侧）跨越切割到达过去（切割左侧）的情况。\n\
    \n如果一条切割线从过去跨越到未来，则代表了传输中的消息的图形化表示。\n\n图 1-6 所示的示意图说明了这一概念，其中`C`[1]是一个不一致性切割，而`C`[2]是一个一致性切割。\n\
    \n![](img/515270_1_En_1_Fig6_HTML.jpg)\n\n一个包含 P、Q、R 三条线的示意图，列出了`E P 1`、`E P 2`等事件。所有事件被分组到标记为`C\
    \ 1`和`C 2`的两个切割中。\n\n**图 1-6**  \n描述分布式系统执行中切割的时空图\n\n诸如 Chandy-Lamport 快照算法之类的算法用于创建分布式系统的一致性切割。\n\
    \n对分布式系统进行快照有助于创建系统的全局图景。快照（或全局快照）捕获了系统的全局状态，包含系统中每个进程的本地状态和每个通信链路的独立状态。这种快照对于调试、检查点和监控非常有用。一个简单的解决方案是同步所有时钟并在特定时间创建快照，但精确的时钟同步是不可能的，我们可以利用因果关系来实现一个能够提供全局快照的算法。\n\
    \n假设无故障、单向 FIFO 通道，并且系统中任意两个进程之间存在通信路径，Chandy-Lamport 算法的工作方式如下：\n\n*   发起快照算法的发起进程执行以下操作：\n\
    \    *   记录自身状态\n    *   向所有进程发送一个标记消息（一个控制消息）\n    *   开始在其所有通道上记录传入的消息\n*  \
    \ 收到标记消息的进程执行以下操作：\n    *   如果是第一次看到此消息，则：\n        *   记录自身的本地状态\n        * \
    \  将该通道标记为空\n        *   向其所有通道上的所有进程发送一个标记\n        *   开始记录所有传入通道，除了之前已标记为空的那个通道\n\
    \    *   如果不是第一次：\n        *   停止记录\n*   当每个进程在其所有传入通道上都收到了标记消息时，快照即视为完成，算法终止。\n\
    *   发起进程现在能够构建一个包含每个进程保存的状态以及所有消息的完整快照。\n\n请注意，任何进程都可以发起快照，该算法不会干扰分布式系统的正常运行，并且每个进程都会记录传入通道及其自身的状态。\n\
    \n### 分布式系统的类型\n\n从通信角度来看，有两种类型的分布式系统。共享内存系统是指所有节点都能直接访问共享内存的系统。另一方面，消息传递系统是指节点之间通过传递消息进行通信的系统。换句话说，节点使用通信链路发送和接收消息以彼此通信。\n\
    \n现在让我们讨论一下分布式系统的一些软件架构模型。软件架构模型描述了系统的设计和结构。软件架构回答了诸如涉及哪些元素以及它们如何相互交互等问题。分布式系统软件架构的核心焦点是进程，所有其他元素都围绕着它们构建。\n\
    \n### 软件架构模型\n\n有四种主要的软件架构类型，包括客户端-服务器模型、多服务器模型、代理服务器模型和对等网络模型。\n\n#### 客户端-服务器\n\
    \n这种模型是让两个进程协同工作的一种常见方式。一个进程承担客户端角色，另一个进程承担服务器角色。服务器接收客户端发出的请求并回复响应。可以有多个客户端进程，但只有一个服务器进程。例如，经典的\
    \ Web 客户端和 Web 服务器（浏览器到 Web 服务器）设计就遵循这种架构类型。图 1-7 描绘了这种架构的所谓物理视图。\n\n![](img/515270_1_En_1_Fig7_HTML.jpg)\n\
    \n一个服务器连接到 3 个客户端的示意图。请求从客户端发送到服务器，回复从服务器发送到客户端。\n\n**图 1-7**  \n客户端-服务器架构\n"
- fmt: '### Multiserver


    A multiserver architecture is where multiple servers work together. In one style
    of architecture, the server in the client-server model can itself become a client
    of another server. For example, if I have made a request from my web browser to
    a web server to find prices of different stocks, it is possible that the web server
    now makes a request to the backend database server or, via a web service, requests
    this pricing information from some other server. In this scenario, the web server
    itself has become a client. This type of architecture can be seen as a multiserver
    architecture.


    Another quite common scenario is where multiple servers act together to provide
    a service to a client, for example, multiple database servers providing data to
    a web server. There are two usual methods to implement such collaborative architecture.
    The first is `data partitioning`, and another is `data replication`. Another closely
    related term to `data partitioning` is `data sharding`.


    `Data partition` refers to an architecture where data is distributed among the
    nodes in a distributed system, and each node becomes responsible for its partition
    (section) of the data. Partitioning of data helps to achieve better performance,
    easier administration, load balancing, and better availability. For example, data
    for each department of a company can be divided into partitions and stored separately
    on different local servers. Another way of looking at it is that if we have a
    large table with one million rows, I might put half a million rows on one server
    and another half on another server. This scheme is called `data sharding` or `horizontal
    partitioning`, or `horizontal sharding` depending on how the sharding is performed.


    We can visualize the concept of partitioning in Figure [1-8](#515270_1_En_1_Chapter.xhtml#Fig8).


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig8_HTML.jpg)


    A schematic of data partitioning. Citizen database from all regions are connected
    to regional offices at London, Bradford, and Montgomery


    Figure 1-8


    Data partitioning


    Note that data partitioning shown in Figure [1-8](#515270_1_En_1_Chapter.xhtml#Fig8)
    is where a large central database is partitioned into smaller datasets relevant
    to each region, and a regional server then manages the partition. However, in
    another type of partitioning, a large table can be partitioned into different
    tables, but it remains on the same physical server. It is called logical partitioning.


    A shard is a horizontal partition of data where each shard (fragment) resides
    on a separate server. One immediate benefit of such an approach is load balancing
    to spread the load between servers. This concept is shown in Figure [1-9](#515270_1_En_1_Chapter.xhtml#Fig9).


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig9_HTML.png)


    A set of 5 tables. A table at the top is titled table. 2 tables are titled vertical
    shards and 2 are titled horizontal shards.


    Figure 1-9


    Sharding


    Data replication refers to an architecture where each node in the distributed
    system holds an identical copy of the data. A typical simple example is that of
    the RAID 0 system; while they are not separate physical servers, the data is replicated
    across two disks, which makes it a data replication (commonly called mirroring)
    architecture. In another scenario, a database server might run a replication service
    to replicate data across multiple servers. This type of architecture allows for
    better performance, fault tolerance, and higher availability. A specific type
    of replication and fundamental concept in a distributed system is state machine
    replication used to build fault-tolerant distributed systems. We will cover more
    about this in Chapter [3](#515270_1_En_3_Chapter.xhtml).


    Figure [1-10](#515270_1_En_1_Chapter.xhtml#Fig10) shows multiserver architectures
    where a variation of the client-server model is shown. The server can act as a
    client to another server. This is another approach where multiple servers work
    together closely to provide a service.


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig10_HTML.jpg)


    A schematic with connected servers and a client. Another client at the bottom
    sends a request and receives a reply.


    Figure 1-10


    Multiple servers acting together (client-server and multiple servers coordinating
    closely/closely coupled servers)


    Another diagram in Figure [1-11](#515270_1_En_1_Chapter.xhtml#Fig11) shows the
    concept of data replication.


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig11_HTML.jpg)


    A schematic of data replication. The citizen database at the headquarters is connected
    to 3 citizen databases at the regional offices.


    Figure 1-11


    Data replication


    In summary, replication refers to a practice where a copy of the same data is
    kept on multiple different nodes, whereas partitioning refers to a practice where
    data is split into smaller subsets, and these smaller subsets are then distributed
    across different nodes.


    ### Proxy Servers


    A proxy server–based architecture allows for intermediation between clients and
    backend servers. A proxy server can receive the request from the clients and forward
    it to the backend servers (most commonly, web servers). In addition, proxy servers
    can interpret client requests and forward them to the servers after processing
    them. This processing can include applying some rules to the request, perhaps
    anonymizing the request by removing the client’s IP address. From a client’s perspective,
    using proxy servers can improve performance by caching. These servers are usually
    used in enterprise settings where corporate policies and security measures are
    applied to all web traffic going in or out of the organization. For example, if
    some websites need to be blocked, administrators can use a proxy server to do
    just that where all requests go through the proxy server, and any requests for
    blocked sites are intercepted, logged, and ignored.


    The diagram in Figure [1-12](#515270_1_En_1_Chapter.xhtml#Fig12) shows a proxy
    architecture.


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig12_HTML.jpg)


    A schematic. The client receives a request from a proxy server and sends its reply.
    The proxy server is connected to 2 other servers.


    Figure 1-12


    Proxy architecture – one proxy between servers and clients


    ### Peer to Peer


    In the peer-to-peer architecture, the nodes do not have specific client or server
    roles. They have equal roles. There is no single client or a server. Instead,
    each node can play either a client or a server role, depending on the situation.
    The fact that all nodes have an equal role resulted in the term "peer."


    Peer-to-peer architecture is shown in the diagram in Figure [1-13](#515270_1_En_1_Chapter.xhtml#Fig13).


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig13_HTML.jpg)


    A schematic of peer architecture. 4 peers are connected together via arrows labeled
    request and reply.


    Figure 1-13


    Peer-to-peer architecture


    In some scenarios, it is also possible that not all nodes have equal roles; some
    may act as servers and clients to each other. Generally, however, all nodes have
    the same role in a peer-to-peer network.


    Now that we have covered some architectural styles of distributed systems, let’s
    focus on a more theoretical side of the distributed system, which focuses on the
    abstract view of the distributed systems. First, we explore the distributed system
    model.'
