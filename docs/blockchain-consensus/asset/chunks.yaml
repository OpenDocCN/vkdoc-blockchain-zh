    ### Technical Definition


    A blockchain is a peer-to-peer, cryptographically secure, append-only, immutable,
    and tamper-resistant shared distributed ledger composed of temporally ordered
    and publicly verifiable transactions. Users can only add new records (transactions
    and blocks) in a blockchain through consensus among peers on the network.


    ## Background


    The origins of the blockchain can be found in early systems developed for the
    digital timestamping of documents. Also, the long-standing problem of creating
    secure electronic cash with desirable features such as anonymity and accountability
    has inspired blockchain development.


    Some of the key ideas that contributed to the development of the blockchain are
