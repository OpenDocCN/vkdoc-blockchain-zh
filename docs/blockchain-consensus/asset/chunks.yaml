  trans: '

    ### 探测器 Q 或 V


    这类探测器满足弱完备性和强准确性。


    ### 最终探测器 Q（菱形 Q）或菱形 V


    这类探测器满足弱完备性和最终强准确性。


    图 3-17 总结了以上所有内容。


    ![](img/515270_1_En_3_Fig17_HTML.jpg)


    故障检测器的框图分为强完备性和弱完备性，并进一步分为同步和部分同步。


    **图 3-17** 故障检测器类别


    故障检测器的属性从根本上围绕着故障检测器在避免误报的同时，检测故障的速度和准确性。一个完美的故障检测器总能正确检测出故障进程，而一个弱故障检测器可能只能准确检测出极少甚至几乎无法检测出故障。


    #### 领导者选举故障检测器


    有时，我们并不关心进程是否发生故障，只关心某个单个进程是否正确。在这种故障检测方法中，我们不怀疑其他进程，而是将单个进程视为领导者。这种故障检测器可以被视为一种领导者选举算法，称为
    Omega `Ω` 故障检测器。最初，领导者选举器可能不可靠，可能会选举出一个故障进程，或者导致不同进程信任不同的领导者。我们可以将此 FD 定义为一个故障检测器，在该检测器中，每个无故障进程最终都会选举出同一个无故障领导者进程。


    正如我们之前所见，在其他故障检测器中，有一个名为 `suspect` 的组件，其中包含一组被故障检测器怀疑为故障的进程 ID；然而，在领导者选举器 `Ω`
    中，有一个名为 `trust` 的组件，其中包含被选举出的领导者的单个进程 ID。


    ### 使用故障检测器解决共识问题


    如果我们有一个完美的故障检测器，我们就可以轻松地在同步和异步模型中解决共识问题。然而，在异步系统中，由于该模型对准确性和完备性的要求过于严格，无法实现 `P`。如果我们能在异步系统中实现一个
    `P` 来解决共识问题，那将违反 FLP 不可能性原理。因此，我们知道不存在这样一个完美的 FD 能在纯粹的异步系统中解决共识问题。我们必须牺牲一点异步性，寻找能在异步条件下解决共识问题的更弱的故障检测器类别。


    此外，此时会出现一个问题：解决共识问题所需的最弱故障检测器是什么？`⋄W`（最终弱完备性与最终弱准确性）是在异步环境下，在大多数进程正确的前提下，足以解决共识问题的最弱故障检测器。


    ## 仲裁


    仲裁可以定义为任何包含大多数进程的集合。该概念与在一组对象中进行投票有关。仲裁系统对于确保复制系统中的一致性、可用性、效率和容错性至关重要。


    仲裁也可以被视为在分布式系统中决定某个操作所需的最小进程（投票）数量。基于仲裁的方法确保了分布式系统的一致性。我们刚刚在“复制”部分了解到，复制允许构建一个容错且一致的分布式系统。这时，问题来了：需要多少个副本才能最终决定提交更新或中止操作。


    从数学上讲，仲裁定义如下：


    仲裁是 `π = {1, 2, 3, ..., n}` 的一个非空子集。


    仲裁系统定义为一组 `π` 的非空子集 `Q`，满足以下属性：


    **仲裁交集**：`∀A, B ∈ Q : A ∩ B ≠ ϕ`


    这意味着任意两个仲裁必须在一个或多个进程上相交。这也被称为鸽巢原理。而且，这被称为**一致性**属性。


    必须始终至少有一个可用的仲裁未发生故障。这是**仲裁可用性**属性。


    仲裁系统通常用于这样的场景：一个进程在广播其请求后，等待直到收到属于某个仲裁的所有进程的响应。通过这种方式，我们可以满足问题的一致性要求。仲裁通常用于实现崩溃和拜占庭容错。例如，在共识算法中，需要特定大小的仲裁来保证安全性和活跃性。换句话说，基于仲裁的算法只有在能够建立一个由正确进程组成的仲裁时，才能满足安全性和活跃性。


    ### 崩溃容错仲裁


    为了在 N 个崩溃停止进程中实现崩溃容错，仲裁 `Q` 设置为至少包含 `⌊n/2⌋ + 1` 个进程。


    例如，如果 `n = 7`，那么 `⌊7/2⌋ + 1 = ⌊3.5⌋ + 1 = 3 + 1 = 4`。


    这意味着在一个七节点网络中，至少需要四个节点（一个由四个节点组成的仲裁）无故障且可用，才能实现崩溃容错。


    例如，如果你有 `n` 个副本，其中 `f` 个可能会崩溃停止，那么为了实现活跃性，需要多大的仲裁 `Q` 规模？


    为了实现活跃性，必须有一个无故障的仲裁 `Q` 可用，其中 `Q <= n – f`。


    为了实现安全性，任意两个仲裁必须在一个或多个进程上相交。


    Lamport 在 1978 年曾以“变形虫”之名使用过仲裁。


    ### 拜占庭仲裁


    拜占庭故障难以处理。设想如果有 `N` 个节点，其中 `f` 个节点变成了拜占庭节点。这些 `f` 个节点可以任意行为，并且可能投票支持某个值，又反对它。它们可以故意向不同节点发表不同的声明。这种情况甚至可能导致正确的节点产生分歧状态，并可能导致死锁。


    一个能够容忍 `f` 个故障的拜占庭仲裁拥有超过 `(n + f)/2` 个进程。在两个拜占庭容错仲裁之间，始终存在至少一个正确进程的交集。如果 `N >
    3f`，则在拜占庭环境下能够保证进展。换句话说，拜占庭容错要求 `f < n/3`。


    例如：


    ```

    n = 7, f = 1

    (n + f) / 2 = (7 + 1) / 2 = 4

    ceiling((7 + 1 + 1) / 2) = ceiling(9 / 2) = 5

    ```


    每个拜占庭仲裁包含超过 `n − f/2` 个诚实进程。`7 − 1/2 = 6.5 > 3`，因此，在两个拜占庭仲裁的交集中至少有一个正确进程。


    ### 读仲裁与写仲裁


    基于仲裁的协议从根本上依赖于投票来决定是否可以执行读操作或写操作。这里有读仲裁和写仲裁。读仲裁是为了就读操作达成一致所需的最少副本数。类似地，写仲裁是为了就写操作达成一致所需的最少副本数。


    ## 我们现在处于什么位置


    基于过去 40 多年在经典分布式共识和现代区块链时代协议方面的研究，我们可以将共识分为两大类。


    ### 经典共识


    经典共识或传统分布式共识作为一个研究课题已经有大约 40 年了。从 SIFT 项目以及 Lamport 和许多其他研究人员的贡献开始，我们现在拥有大量处理经典分布式共识的工作。像
    Paxos、PBFT 和 RAFT 这样的协议现在已成为各种实际系统中实现的常态。

    '
- fmt: '### Nakamoto and Post-Nakamoto Consensus


    On the other hand, we have a family of protocols which we can call the Nakamoto
    consensus family as this family was introduced for the first time by Satoshi Nakamoto,
    with Bitcoin.


    From a blockchain perspective, both traditional and Nakamoto-style protocols are
    in use. Almost all the permissioned blockchains use variants of PBFT classical
    algorithms. On the other hand, permissionless public blockchains like Ethereum
    and Bitcoin make use of Nakamoto-style (PoW) consensus algorithms. There are other
    classes such as proof of stake and other variants, but they all were introduced
    after the introduction of Bitcoin’s proof of work in 2008.


    We will cover Nakamoto and post-Nakamoto-style algorithms in detail in Chapter
    [4](#515270_1_En_4_Chapter.xhtml).


    ## Summary


    In this chapter, we covered the main concepts of agreement, broadcast, replication,
    and consensus:


    - Consensus is a fundamental problem in distributed computing.

    - Consensus and atomic broadcast are equivalent problems. If you solve one, the
    other is solved too.

    - There are several broadcast primitives such as best-effort broadcast, reliable
    broadcast, eager reliable broadcast, and total order broadcast with varying degrees
    of strictness regarding the delivery guarantees.

    - There are also probabilistic broadcast protocols that deliver messages with
    some high probability inspired by dissemination of gossip among the public.

    - Replication and state machine replication are techniques to provide fault tolerance
    in distributed systems.

    - Quorum systems are important for ensuring the consistency, availability, efficiency,
    and fault tolerance in replicated systems.

    - The last half century of research has produced two main classes of consensus,
    that is, classical permissioned consensus and Nakamoto nonpermissioned consensus.

    - Various impossibility results have been proven in the last many decades of research
    by researchers. Results such as FLP impossibility, requirement of a minimum number
    of processes, and network links have been proposed and proven. These fundamental
    results allow researchers to focus on other problems because if something has
    been proven impossible, there is no value in spending time and effort on trying
    to solve it.

    - Other research includes failure detectors which provide a means to detect failures
    in a distributed system and allow processes to respond accordingly to make progress.
    Augmenting a distributed system with oracles such as failure detectors, synchrony
    assumptions, randomized protocols, and hybrid protocols is a means to circumvent
    the FLP impossibility result.


    In the next chapter, we will cover blockchain and describe what it is and how
    we can see it in the light of what we have learned so far in this book.


    # 4. Blockchain


    In this chapter, we’ll learn what a blockchain is and its various elements and
    see the blockchain through the lens of distributed computing. Also, we will present
    formal definitions and properties of the blockchain. In addition, we will also
    introduce Bitcoin and Ethereum. Finally, I will introduce some blockchain use
    cases.


    Blockchains are fascinating because they touch many disciplines, including distributed
    computing, networking, cryptography, economics, game theory, programming languages,
    and computer science.


    Blockchains are appealing to people from so many different areas, including but
    not limited to the subjects mentioned earlier. With use cases in almost every
    walk of life, blockchains have captured the public’s imagination and, indeed,
    many academics and industry professionals.


    The blockchain emerged in 2008 with Bitcoin, a peer-to-peer, decentralized, electronic
    cash scheme that does not need any trusted third party to provide trust guarantees
    associated with money.


    ## What Is Blockchain


    There are many definitions of a blockchain on the Internet and many different
    books. While all those definitions are correct, and some are excellent, I will
    try to define the blockchain in my own words.


    First, we’ll define it from a layman’s perspective and then from a purely technical
    standpoint.


    ### Layman’s Definition


    A blockchain is a shared record-keeping system where each participant keeps a
    copy of the chronologically ordered records. Participants can add new records
    only if they collectively agree to do so.


    ### Technical Definition


    A blockchain is a peer-to-peer, cryptographically secure, append-only, immutable,
    and tamper-resistant shared distributed ledger composed of temporally ordered
    and publicly verifiable transactions. Users can only add new records (transactions
    and blocks) in a blockchain through consensus among peers on the network.


    ## Background


    The origins of the blockchain can be found in early systems developed for the
    digital timestamping of documents. Also, the long-standing problem of creating
    secure electronic cash with desirable features such as anonymity and accountability
    has inspired blockchain development.


    Some of the key ideas that contributed to the development of the blockchain are
    discussed as follows.


    Two fundamental issues need to be dealt with to create practical digital cash:


    - Accountability to prevent double-spends

    - Anonymity to provide privacy to the users


    The question is how to resolve accountability and double-spend issues. The schemes
    described in the following tried to address these issues and managed to achieve
    these properties; however, the usability was difficult, and they relied on trusted
    third parties.'
