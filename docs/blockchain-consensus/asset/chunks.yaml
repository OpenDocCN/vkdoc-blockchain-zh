    on some other.


    *   The rate of events per time period is constant.


    *   Two events cannot occur simultaneously.


    The average time between events is known, but they are randomly spaced (stochastic).
    In Bitcoin, of course, we know the time between two block generation events is
    known, that is, roughly ten minutes, but the generations are randomly spaced.


    The mean time for a new block is ten minutes on average. We can use a simple formula
    to find out the meantime of finding the next block for a particular miner.


    ![$$ Next\ block\ mean\ time\ (specific)=\frac{\ 10\ minutes}{fraction\ of\ hash\
    power\ controlled\ by\ the\ miner} $$](images/515270_1_En_5_Chapter/515270_1_En_5_Chapter_TeX_Equg.png)'
  trans: '

    ##### 进度无关性


    这一特性意味着解决工作量证明的概率与贡献的哈希算力成正比；然而，这依然是一种概率，并非百分之百保证拥有最高算力的矿工总能获胜。换句话说，算力更高的矿工仅能获得成正比的优势，而算力较低的矿工也能获得相应的补偿，有时甚至比高算力矿工更幸运地率先找到区块。


    在实际应用中，这意味着每个矿工实际上都在处理不同的候选区块以解决工作量证明。矿工们并非在寻找同一区块的有效随机数，因为交易内容、版本号、Coinbase 差异以及其他元数据不同，经过哈希运算后会得到完全不同的哈希值（对`SHA-256`进行两次运算）。所以每个矿工解决的是不同的问题，探索的是双重`SHA-256`（可简写为`SHAd256`）搜索空间的不同部分。


    进度无关性如图 5-3 所示。如图 5-3 所示，矿工们都在处理各自的候选区块，这些区块因上述差异而互不相同。因此，矿工将每个随机数与区块数据拼接后所得的哈希值，都是其他矿工不知晓的。这给了算力较低的矿工一定优势——当某个小矿工试图为其区块寻找有效随机数时，有可能在更高算力矿工为其区块找到有效随机数之前，率先找到解决工作量证明的随机数。


    ![](img/515270_1_En_5_Fig3_HTML.jpg)


    进度无关属性示意图：每个矿工按所述顺序分别处理不同的区块、哈希值及搜索空间。


    **图 5-3** 进度无关属性——每个矿工探索双重（`SHA-256`）搜索空间的不同部分


    这是工作量证明的另一项巧妙特性，它确保高算力矿工虽有优势，但低算力矿工也有机会幸运地在大型矿工之前找到有效的随机数。关键在于矿工们并不处理同一个区块！如果每次都处理同一个区块，那么算力最强的矿工将始终获胜。这就是比特币工作量证明的“进度无关”特性。


    然而，多个矿工也可以协作处理同一个区块（即同一搜索空间），从而分工合作。假设一个区块的搜索空间是 1 到 100，可以将其分为 10 个不同部分，那么所有矿工就能共同处理这一个区块。这样分工后，所有矿工都能贡献算力并按其贡献比例获得奖励。这被称为**矿池挖矿**。与**独立挖矿**（单个矿工尝试，若未找到随机数则前功尽弃，需为下一区块重新努力）不同，在矿池挖矿中，个人的贡献不会白费。


    这一概念如图 5-4 所示。


    ![](img/515270_1_En_5_Fig4_HTML.png)


    矿池挖矿示意图：每个矿工处理同一个区块及哈希值，但探索不同的搜索空间。


    **图 5-4** 矿池——多个矿工处理同一个区块（`SHAd256` 搜索空间）


    在图 5-4 中，不同矿工处理由同一区块产生的同一哈希搜索空间。这样，矿池运营者将工作量证明划分为不同部分，分配给矿池中的矿工。所有矿工都贡献算力，最终有一名矿工找到区块，正常广播至比特币网络。矿池运营者获得区块奖励，再根据矿工贡献的算力比例进行分配。


    ##### 动态参数的概率方面


    现在我们来探讨与特性（动态且可自动调整的参数）相关的概率方面问题，我将解释“平均十分钟”的含义以及参数化的意义。


    在概率论中，伯努利试验是一种具有两种可能结果（成功或失败）的行为。每次试验中成功或失败的概率是固定的。例如，抛硬币时正面或反面的概率是 50%，且结果相互独立。连续三次出现正面，并不意味着第四次也必然出现正面。同样，在比特币挖矿中，成功或失败的结果（如下所示）依然是独立的，几乎像抛硬币一样概率约为
    50%。我们可以通过以下公式看出这一点。


    挖矿中的成功与失败可写为如下两个公式：


    ```

    成功 = SHAd256( 随机数 || 区块头 ) < 目标值

    ```


    ```

    失败 = SHAd256( 随机数 || 区块头 ) >= 目标值

    ```


    工作量证明几乎就像掷骰子，例如，我掷了几次骰子，无法知道下一次何时会出现六点；可能第一次就掷出六点，也可能永远掷不出六点，或者掷多次后才出现六点。同样，无论矿工是尝试了一个随机数来寻找有效随机数，还是尝试了数万亿个随机数，找到有效随机数的平均时间仍然是概率性的。无论已经尝试了
    1 亿个随机数还是只尝试了一个，找到有效随机数的概率保持不变。所以尝试数百万个随机数并不会增加找到有效随机数的可能性；即使只尝试一次或寥寥数次，也有可能找到有效随机数。


    当伯努利试验重复进行到足以产生连续结果（而非离散结果）时，就被称为泊松过程。可以正式定义：泊松过程是一系列离散事件，事件以已知的恒定平均速率独立发生，但事件发生的精确时间是随机的。


    例如，股票价格的波动就是一个泊松过程。泊松过程具有以下特性：


    - 事件相互独立，即一个结果不会影响其他结果。

    - 单位时间内的事件发生率是恒定的。

    - 两个事件不能同时发生。


    事件之间的平均时间是已知的，但间隔是随机的（具有随机性）。当然，在比特币中，我们知道两个区块生成事件之间的时间是已知的，大约为十分钟，但生成间隔是随机的。


    新区块的平均时间约为十分钟。我们可以用一个简单公式来计算特定矿工找到下一个区块的平均时间。


    ```

    下一个区块的平均时间（特定矿工） = 10 分钟 / （该矿工控制的哈希算力比例）

    ```

    '
- fmt: '## Probability of an Attacker Catching Up


    In this section, we answer the question of what the probability is of an attacker
    to mine enough blocks to take over the chain. Suppose an attacker has some mining
    power, say `q`. A seller waits for `z` confirmation (`z` blocks) before accepting
    the payment, and the honest chain hash rate is denoted by `p`.


    The probability of an attacker catching up `q[z]` can be calculated as shown follows:


    ![$$ {q}_z=\left\{1\ if\ p\le q\_{\left(\frac{q}{p}\right)}^z if\ p&gt;q\kern0.75em
    \right\} $$](images/515270_1_En_5_Chapter/515270_1_En_5_Chapter_TeX_Equh.png)


    where


    ![$$ q={attacker}^{\prime }s\ hash\ rate $$](images/515270_1_En_5_Chapter/515270_1_En_5_Chapter_TeX_Equi.png)


    ![$$ p= honest\ hash\ rate $$](images/515270_1_En_5_Chapter/515270_1_En_5_Chapter_TeX_Equj.png)


    ![$$ z= blocks\ to\ catch\ up $$](images/515270_1_En_5_Chapter/515270_1_En_5_Chapter_TeX_Equk.png)


    This means that if the honest hash rate is less than the attacker’s hash rate,
    then the probability of an attacker catching up is one, and if the honest hash
    rate is more than the attacker’s hash rate, then the probability of catching up
    is `(q/p)^z`.


    In the next section, we formally write the proof of work algorithm.


    ## PoW Algorithm


    Formally, we can write the entire proof of work algorithm as follows:


    ```

    1:  nonce := 0

    2:  hashTarget := nBits

    3:  hash := null

    4:  while (true) {

    5:    SHA256(SHA256(blockheader || nonce))

    6:       if (hash ≤ hashTarget) {

    7:            append to blockchain

    8:      else

    9:            nonce := nonce + 1

    10:  }

    11: }

    ```


    In the preceding algorithm, the `nonce` is initialized as zero. The hash target
    which is the difficulty target of the network is taken from the `nBits` field
    of the candidate block header. The `hash` is initialized to `null`. After that,
    an infinite loop runs, which first concatenates the block header and the `nonce`
    and runs `SHA-256` twice on it to produce the `hash`. Next, if the produced hash
    is less than the target hash, then it is accepted and appended to the blockchain;
    otherwise, the `nonce` is incremented and the process starts again. If no `nonce`
    is found, then the algorithm tries the next block.


    This process can be visualized in Figure [5-5](#515270_1_En_5_Chapter.xhtml#Fig5).


    ![](images/515270_1_En_5_Chapter/515270_1_En_5_Fig5_HTML.png)


    A flowchart with the following flow. Candidate block header, double SHA 256, resultant
    hash, hash target; yes, stop, and no, increment.


    **Figure 5-5** Proof of work


    In Figure [5-5](#515270_1_En_5_Chapter.xhtml#Fig5), the previous block hash, transactions,
    and `nonce` are fed into a hash function to produce a hash which is checked against
    the target value. If it is less than the target value, then it’s a valid hash
    and the process stops; otherwise, the `nonce` is incremented, and the entire process
    repeats until the resultant hash is less than the target, where the process stops.


    ## Game Theory and Proof of Work


    Game theory is the study of behaviors in strategic interactive situations where
    an individual’s best course of action depends on the choice of others. Game theory
    models represent real-life situations in an abstract manner. Game theory is useful
    in many different fields, such as economics, biology, social science, finance,
    politics, computer science, and many more. For example, in economics, product
    launch decisions made by businesses are influenced by their competitor’s choice
    of product and marketing strategy. In computer networks, networked computers may
    compete for resources such as bandwidth. A Nash equilibrium is used to study political
    competition. In politics, politicians’ policies are influenced by announcements
    and promises made by their opponents.


    A game can be defined as a description of all strategic actions that a player
    may take but without describing the likely outcome.


    There are some entities in a game which are listed as follows:


    - **Players**: Strategic rational decision makers in a game

    - **Actions**: Set of actions available to a player

    - **Payoffs**: A payout to be received by a player for a particular outcome


    Games represent different strategic situations. There are some classical games
    such as Bach or Stravinsky, prisoner’s dilemma, Hawk-Dove, and matching pennies.
    In games, players are not aware of the actions of other players when making their
    own decisions; such games are called **simultaneous move games**.


    Games can be analyzed by creating a table where all possible actions of players
    and payoffs are listed. This table is known as the **strategic form** of the game
    or **payoff matrix**.


    A **Nash equilibrium** is a fundamental and powerful concept in game theory. In
    a Nash equilibrium, each rational player chooses the best course of action in
    response to the choice made by other players. Each player is aware of other players’
    equilibrium strategies, and no player can make any gains by changing only their
    own strategy. In short, any deviation from the strategy does not result in any
    gain for the deviant.'
