  trans: '

    # 领导者选举算法


    解决工作量证明难题的节点将被选为领导者，负责最终确定并广播其候选区块。在工作量证明机制中，领导者的选举是作为挖矿节点计算能力的函数来进行的。与其他传统的拜占庭容错协议不同，这里不需要其他节点进行投票。此外，与传统拜占庭容错协议不同，领导者在每个区块都会轮换。这种方法也被后续的区块链拜占庭容错协议所采用，即每个区块都轮换领导者，以防止任何破坏（攻击）领导者的企图。同样，在传统的拜占庭容错协议中，通常只有在主节点（领导者）失效时才会进行更换，而在工作量证明中，每个区块都会选举出一个领导者。工作量证明中的领导者选举基于计算能力；然而，在其他许可链中使用了多种技术，从简单地随机选择领导者或简单的轮换公式，到诸如可验证随机函数等复杂方法。我们将在第
    8 章详细介绍这些技术。


    领导者选举公式与我们之前在“工作量证明如何工作”一节中介绍的公式完全相同。一旦某个矿工解决了工作量证明难题，它立即被选为领导者，并获得广播其新挖出的区块的权利。此时，该矿工还将获得
    6.25 BTC 的奖励。该奖励每四年减半一次。


    在领导者选举阶段，矿工节点已成功解决工作量证明难题，现在可以开始日志复制。


    # 日志复制


    日志复制或区块复制旨在实现节点间的一致性，通过**八卦传播协议**将新挖出的区块广播到其他节点来实现。普通日志与区块链日志之间的主要区别如下：


    - 它只能追加，且不可篡改。

    - 每批新的交易（区块）都包含前一个区块的哈希值，从而将其链接到所谓的**工作量证明链**或**哈希链**或**区块链**或**区块链**中。

    - 区块（日志中的内容）可以通过前一个区块进行验证。

    - 每个区块包含交易和区块头。第 4 章详细讨论了此结构。


    当新区块被广播时，网络上的每个诚实节点在将其追加到区块链之前都会对其进行验证和确认。领导者选举后的日志复制可以分为三个步骤。


    ## 新区块传播


    区块通过八卦协议进行广播。我们可以在图 5-8 中直观地看到区块传播机制。请注意，节点 1 向节点 2 发送了一条消息（例如，一个新区块），然后节点 2 将该消息发送给节点
    4、14 和 13。网络中其他节点的传播模式也类似。


    ![](img/515270_1_En_5_Fig8_HTML.png)


    *八卦协议的图示描述了节点间的关系。*


    **图 5-8** 比特币中的八卦协议


    这种传播方式确保所有节点最终都能以高概率收到该消息。此外，这种模式避免了向所有节点广播消息给单个节点带来的巨大负担。


    ## 区块验证


    区块验证可以被视为状态转换函数。此区块验证函数包含以下高级规则：


    - 区块在语法上正确。

    - 区块头的哈希值小于网络难度目标值。

    - 区块的时间戳未来不超过两小时。

    - 区块大小正确。

    - 区块内的所有交易均有效。

    - 它引用了前一个哈希值。


    该协议规定了非常精确的规则，其详细信息可以在 `https://en.bitcoin.it/wiki/Protocol_rules` 找到；然而，上述列表是节点执行的区块验证检查的高级列表。


    ## 追加到区块链


    节点最终会将区块插入到区块链中。在追加到区块链时，可能会发生这些节点收到了两个有效区块的情况。在这种情况下，会发生分叉，节点必须决定将区块追加到哪条链。


    我们可以在图 5-9 中直观地看到这个概念。


    ![](img/515270_1_En_5_Fig9_HTML.png)


    *复制示意图。一笔交易被广播到交易池以创建新区块候选，该候选区块经过验证后被追加。*


    **图 5-9** 作为状态机复制的工作量证明


    如图 5-9 所示，作为状态机复制的工作量证明包含两个主要操作：通过工作量证明选举领导者，然后通过八卦协议及接收节点的区块验证和插入机制进行复制。在节点上完成工作量证明后，如果工作量证明有效，则该区块的处理方式与从其他节点接收到的区块相同，并在验证后最终插入本地区块链数据库。


    在发生冲突时，用于选择最终链的组件称为**分叉处理器**，它包含了如何处理分叉的分叉解决规则。'
- fmt: '##### Fork Resolution


    Fork resolution can be seen as a fault tolerance mechanism in Bitcoin. Fork resolution
    rules ensure that only the chain that has the most work done to produce it is
    the one that is always picked up by the nodes when inserting a new block. When
    a valid block arrives for the same height, then the fork resolution mechanism
    allows the node to ignore the shorter chain and add the block only to the longest
    chain. Also note that this is not always the case that the longest chain has the
    most work done; it could happen that a shorter chain may have the most computational
    hash power behind it, that is, the accumulated proof of work, and in that case,
    that chain will be selected.


    We can calculate the accumulated proof of work by first calculating the difficulty
    of a particular block, say B, then we can use the following formula. The difficulty
    of a block can be defined as finding how much harder it is to find a valid proof
    of work nonce for this specific block B in comparison to the difficulty of a genesis
    block.


    ![$$ \frac{Genesis\ {block}^{''}s\ difficulty\ target}{B^{''}s\ difficulty\ target}=\frac{\left(\left({2}^{16}\right)\times
    {256}^2\right)}{B^{''}s\ difficulty\ target} $$](images/515270_1_En_5_Chapter/515270_1_En_5_Chapter_TeX_Equl.png)


    We can say that the accumulated proof of work for a chain is the sum of the difficulty
    of all blocks in the chain. The chain that has most proof of work behind it will
    be chosen for a new block to be appended.


    The longest chain rule was originally simply the chain with the highest number
    of blocks. However, this simple rule was modified later, and the “longest” chain
    became the chain with the most work done to create it, that is, the strongest
    chain.


    In practice, there is a `chainwork` value in the block which helps to identify
    the chain with the most work, that is, the correct “longest” or “strongest” chain.


    For example, we use


    ```

    bitcoin-cli getblockheader 0000000000000000000811608a01b388b167d9c94c0c0870377657d524ff0003

    ```


    For block 687731, we get


    ```

    {

    "result": {

    "hash": "0000000000000000000811608a01b388b167d9c94c0c0870377657d524ff0003",

    "confirmations": 1,

    "height": 687731,

    "version": 547356676,

    "versionHex": "20a00004",

    "merkleroot": "73f4a59b854ed2d6597b56e6bc499a7e0b8651376e63e0825dbcca3b9dde61ae",

    "time": 1623786185,

    "mediantime": 1623781371,

    "nonce": 2840970250,

    "bits": "170e1ef9",

    "difficulty": 19932791027262.74,

    "chainwork": "00000000000000000000000000000000000000001eb70918030b922df7533fd4",

    "nTx": 2722,

    "previousblockhash": "00000000000000000000f341e0046c6d82979fdfa09ab324a0e8ffbabd22815d"

    },

    "error": null,

    "id": null

    }

    ```


    Notice the `chainwork` value when converted to a decimal results in an extremely
    large number, 6663869462529529036756. This is the amount of work behind this head
    of the chain.


    There are several types of forks that can occur in the Bitcoin blockchain:


    *   Regular fork


    *   Hard fork


    *   Soft fork


    *   Byzantine fork


    ##### Regular fork


    A fork can naturally occur in the Bitcoin blockchain when two miners competing
    to solve the proof of work happen to solve it almost at the same time. As a result,
    two new blocks are added to the blockchain. Miners will keep working on the longest
    chain that they are aware of, and soon the shorter chain with so-called orphan
    blocks will be ignored.


    The diagram in Figure 5-10 shows how consensus finality is impacted by forks.


    ![](images/515270_1_En_5_Chapter/515270_1_En_5_Fig10_HTML.png)


    A schematic of the impact of forking includes the normal chain, the pruned shorter
    chain, and the strongest chain that wins.


    **Figure 5-10** Impact of forking on consensus finality


    Due to the forking possibility, consensus is probabilistic. When the fork is resolved,
    previously accepted transactions are rolled back, and the longest (strongest)
    chain prevails.


    The probability of these regular forks is quite low. A split of one block can
    occur almost every two weeks and is quickly resolved when the next block arrives,
    referring to the previous one as a parent. The probability of occurrence of a
    two-block split is exponentially lower, which is almost once in 90 years. The
    probability of occurrence of a four-block temporary fork is once in almost 700,000,000
    years.


    ##### Hard fork


    A hard fork occurs due to changes in the protocol, which are incompatible with
    the existing rules. This essentially creates two chains, one running on the old
    rules and the new one on new rules.


    We can visualize how a hard fork behaves in Figure 5-11.


    ![](images/515270_1_En_5_Chapter/515270_1_En_5_Fig11_HTML.png)


    A chart of the hard fork includes the original software client categorized into
    an upgraded software client and the original software client.


    **Figure 5-11** Hard fork


    ##### Soft fork


    A soft fork occurs when changes in the protocol are backward compatible. It means
    that there is no need to update all the clients; even if not all the clients are
    upgraded, the chain is still one. However, any clients that do not upgrade won’t
    be able to operate using the new rules. In other words, old clients will still
    be able to accept the new blocks.


    This concept can be visualized in the diagram in Figure 5-12.


    ![](images/515270_1_En_5_Chapter/515270_1_En_5_Fig12_HTML.png)


    A chart of the soft fork includes the original software client categorized into
    an upgraded software client and the original software client.


    **Figure 5-12** Soft fork


    ##### Byzantine fork


    A Byzantine fork or malicious fork can occur in scenarios where an adversary may
    try to create a new chain and succeeds in imposing its own version of the chain.


    With this, we complete our discussion on forks.


    A core feature of proof of work consensus is the Sybil resistance mechanism which
    ensures that creating many new identities and using them is prohibitively computationally
    complex. Let’s explore this concept in more detail.


    ##### Sybil Resistance


    A Sybil attack occurs when an attacker creates multiple identities, all belonging
    to them to subvert the network relying on voting by using all those identities
    to cast vote in their favor. Imagine if an attacker creates more nodes than the
    entire network, then the attacker can skew the network in their favor.


    A Sybil attack can be visualized in Figure 5-13, where an attacker is controlling
    more Sybil nodes than the network.


    ![](images/515270_1_En_5_Chapter/515270_1_En_5_Fig13_HTML.png)


    A flowchart of a Sybil attack includes an attacker controlling the Sybil node,
    Sybil nodes, and network of honest nodes, in the order mentioned.


    **Figure 5-13** Sybil attack


    Proof of work makes it prohibitively expensive for an attacker to use multiple
    nodes controlled by them to participate in the network because each node will
    have to do computationally complex work in order to be part of the network. Therefore,
    an attacker controlling a large number of nodes will not be able to influence
    the network.'
  raw: '##### Fork Resolution


    Fork resolution can be seen as a fault tolerance mechanism in Bitcoin. Fork resolution
    rules ensure that only the chain that has the most work done to produce it is
    the one that is always picked up by the nodes when inserting a new block. When
    a valid block arrives for the same height, then the fork resolution mechanism
    allows the node to ignore the shorter chain and add the block only to the longest
    chain. Also note that this is not always the case that the longest chain has the
    most work done; it could happen that a shorter chain may have the most computational
    hash power behind it, that is, the accumulated proof of work, and in that case,
    that chain will be selected.


    We can calculate the accumulated proof of work by first calculating the difficulty
    of a particular block, say B, then we can use the following formula. The difficulty
    of a block can be defined as finding how much harder it is to find a valid proof
    of work nonce for this specific block B in comparison to the difficulty of a genesis
    block.


    ![$$ \frac{Genesis\ {block}^{''}s\ difficulty\ target}{B^{''}s\ difficulty\ target}=\frac{\left(\left({2}^{16}\right)\times
    {256}^2\right)}{B^{''}s\ difficulty\ target} $$](images/515270_1_En_5_Chapter/515270_1_En_5_Chapter_TeX_Equl.png)


