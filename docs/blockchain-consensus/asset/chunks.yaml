  trans: "\n### 三阶段提交\n\n正如我们在两阶段提交中所见，它不具备容错性，并且会阻塞，直到失败的协调者恢复。如果协调者或参与者在提交阶段失败，该协议无法可靠恢复。即使更换了协调者或协调者恢复，也无法从故障发生处可靠地继续处理事务。三阶段提交通过引入一个新的预提交中间阶段解决了这个问题。在收到所有参与者的`yes`后，协调者进入这个中间阶段。与`2PC`不同，这里协调者不会立即广播`commit`；而是先发送一个`pre-commit`，表明提交事务的意图。当参与者收到`pre-commit`消息时，它们回复`ack`消息。当协调者收到所有参与者的`ack`后，便发送`commit`消息，并像两阶段提交那样继续执行。如果某个参与者在回传消息之前发生故障，协调者仍可决定提交事务。如果协调者崩溃，参与者仍可同意中止或提交事务。这是因为尚未发生实际的提交或中止。参与者现在有了另一次机会来决定：通过检查是否已看到协调者发来的`pre-commit`，如果是，则相应提交事务；否则，由于未看到协调者的`commit`消息，参与者中止事务。\n\
    \n该过程如图 6-2 所示。\n\n![](img/515270_1_En_6_Fig2_HTML.png)\n\n一幅示意图，包含协调者和参与者的两条垂直线。它们被划分为投票阶段、提交阶段和决策阶段。\n\
    \n**图 6-2** 三阶段提交协议\n\n粗略地说，提交协议可以看作是共识协议，因为参与者需要决定是否接受协调者提出的值。当然，这是一个简单的协议，不具备容错性，但它确实在各方之间达成了共识；因此，它可以被视为一种共识机制。此外，我们可以说有效性得到了实现，因为参与者提出了最终达成一致的值。同时，终止性也得到了保证，因为每个参与者都能推进。如果没有发生故障，最终所有参与者都会响应协调者，协议向前推进，最后两个阶段都结束。然而，严格来说，分布式提交协议并非共识协议。\n\
    \n现在，在介绍了这些最直接的共识协议或分布式提交协议（取决于你如何看待它们）之后，让我们关注一些早期的容错共识协议，它们为我们在各种分布式系统和区块链中今天所见到的共识协议奠定了基础。\n\
    \n## 口头消息算法\n\n口头消息（OM）算法由 Lamport 等人在 1982 年的论文《拜占庭将军问题》中提出，用于解决该问题。该递归算法在同步网络模型下运行。它假设有`N`个将军，所有将军之间构成一个完全图。其中一位将军是“指挥官”，负责启动协议。其他（`N\
    \ – 1`位）将军称为“副官”，口头传递他们收到的消息。指挥官知道最多有`f`个将军会有故障（叛徒），并以已知的`f`值启动共识算法。还有一个默认值，要么是“撤退”要么是“进攻”。该算法背后的直觉是：你在收到每条消息时，都要告诉别人你收到了什么消息。参与者接受多数决策，这保证了算法的安全性属性。\n\
    \n需要满足两个*交互一致性*要求，分别称为`IC1`和`IC2`：\n\n1.  **IC1**：所有忠诚的副官服从相同的命令。\n2.  **IC2**：如果指挥将军是忠诚的，那么每个忠诚的副官都服从其命令。\n\
    \n关于系统模型的一些假设：\n\n1.  消息的缺失可以被检测到。这是由于同步通信。\n2.  每条发送的消息都能正确送达。\n3.  消息的接收者知道是谁发送的。\n\
    \n口头消息是指内容完全由发送者控制的消息。发送者可以发送任何可能的消息。\n\n除非超过三分之二的将军是忠诚的，否则拜占庭将军问题无解。例如，如果有三个将军，其中一个是叛徒，那么在使用口头消息的情况下，拜占庭将军问题无解。正式表述为：\n\
    \n*   **引理 1**：对于`3m + 1`个将军，如果叛徒数量`> m`，则拜占庭将军问题无解。\n\n换句话说，如果`n <= 3m`，则拜占庭共识不可能实现。该算法是递归的。\n\
    \n**算法**\n\n**基本情况：`OM(0)`**\n\n1.  指挥官向每位副官广播一个提议值。\n2.  每位副官接受接收到的值。如果没有收到任何值，则使用算法启动时设置的`DEFAULT`值，要么是`retreat`要么是`attack`。\n\
    \n**存在叛徒的情况：`OM(m)`，其中 `m > 0`**\n\n1.  指挥官向每位副官发送提议值。\n2.  每位副官运行`OM(m-1)`，并作为指挥官将步骤\
    \ 1 中收到的值发送给所有其他副官。\n3.  每位副官维护一个向量，并在所收到的值中采用多数值。\n\n基本情况和`OM(1)`情况如图 6-3 所示。\n\
    \n![](img/515270_1_En_6_Fig3_HTML.png)\n\n两幅 OM 情况的示意图，包含一位指挥官和三位副官。左侧通过“进攻”连接，右侧通过“进攻”和“撤退”连接。\n\
    \n**图 6-3** OM 基本情况与`OM(1)`情况对比，其中指挥官是叛徒\n\n我们也可以可视化副官是叛徒的情况，如图 6-4 所示。\n\n![](img/515270_1_En_6_Fig4_HTML.png)\n\
    \n一幅示意图，包含一位指挥官和三位副官`L1`到`L3`。指挥官向三位副官下令“进攻”。`L3`向`L1`和`L2`发送“撤退”命令。\n\n**图 6-4**\
    \ M=1 时副官是叛徒的 OM 情况\n\n我们可以用如下代码形式化描述该算法：\n\n**基本情况**\n\n```\nOM(0)- 基本情况\nDEFAULT\
    \ := 默认值\n指挥官 C 将它的提议值广播给所有副官\n对于 i = 1 到 N – 1 执行\n  Li 将从 C 收到的值存储到数组 Vi 中\n\
    \  如果未收到值，Vi = DEFAULT\n  Li 接受 Vi\n结束循环\n```\n\n**存在 f > 0 的情况，`OM(m)`**\n"
- fmt: "```  \nCommander C broadcast its value to all lieutenants  \nFor I = 1 : n-1\
    \ do  \nLi stores the value from commander as vi  \nVi = default if no value received\
    \ from the commander  \nLi runs OM(m-1) now as commander to send the value vi\
    \ to other N – 2 Lieutenants  \nEnd for  \nFor I = 1 : N – 1 do  \nFor j = 1 :\
    \ N – 1 AND j ≠ i do  \nLi stores the value received from Lj as vj  \nVj = default\
    \ if no value received  \nEnd for  \nLi chooses majority from {v1, v2, v3,  ,\
    \ , , vn-1}  \nEnd for  \n```  \n\nAs you may have noticed, this algorithm, while\
    \ it works, is not very efficient due to the number of messages required to be\
    \ passed around. More precisely, from a communication complexity perspective,\
    \ this algorithm is exponential in the number of traitors. If there are no traitors,\
    \ as in the base case, then its constant, *O*(1), otherwise its *O*(*m*^(*n*)),\
    \ which means that it grows exponentially with the number of traitors, which makes\
    \ it impractical for a large number of *n*.\n\nUsing the space-time diagram, we\
    \ can visualize the base case as shown in Figure 6-5.\n\n![Figure 6-5](images/515270_1_En_6_Chapter/515270_1_En_6_Fig5_HTML.jpg)\
    \  \n\nA schematic with 4 right arrows, C, L 1, L 2, and L 3. An attack order\
    \ is sent to L 1, L 2, and L 3 from C. The time arrow points to the right.  \n\
    \n**Figure 6-5** Oral message protocol – base case – with no traitors  \n\nWe\
    \ can also visualize the m > 0 case where the commander is the traitor sending\
    \ conflicting messages to lieutenants in Figure 6-6.\n\n![Figure 6-6](images/515270_1_En_6_Chapter/515270_1_En_6_Fig6_HTML.jpg)\
    \  \n\nA schematic of a message protocol with 4 right arrows, C traitor, L 1,\
    \ L 2, and L 3. Each of them sends attack and retreat messages to one another.\
    \  \n\n**Figure 6-6** Oral message protocol case where m = 1, the commander is\
    \ a traitor  \n\nIn the digital world, commanders and lieutenants represent processes,\
    \ and the communication between these processes is achieved by point-to-point\
    \ links and physical channels.\n\nSo far, we have discussed the case with oral\
    \ messages using no cryptography; however, another solution with signed messages\
    \ is also possible where digital signatures are used to guarantee the integrity\
    \ of the statements. In other words, the use of oral messages does not allow the\
    \ receiver to ascertain whether the message has been altered or not. However,\
    \ digital signatures provide a data authentication service that enables receiving\
    \ processes to check whether the message is genuine (valid) or not.\n\nBased on\
    \ whether oral messages are used, or digital signatures have been used, Table\
    \ 6-1, earlier in this chapter, summarizes the impossibility results under various\
    \ system models.\n\n### Signed Message Solution to Byzantine Generals Problem\n\
    \nThe main issue with the oral message algorithm is that it needs 3*t* + 1 (also\
    \ denoted as 3*f* + 1) nodes to tolerate *t* (also denoted as *f*) failures, which\
    \ is expensive in terms of computational resources required. It is also difficult\
    \ because traitors can lie about what other nodes said. The time complexity of\
    \ this algorithm is *O*(*n*^(*m*)).\n\nThere is a signed solution to BGP which\
    \ was proposed in the same BGP paper by Lamport, Shostak, and Pease. It uses digital\
    \ signatures to sign the messages. Here are the additional assumptions under this\
    \ model:\n\n1.  The signature of a loyal general cannot be forged, and any modification\
    \ of the general’s messages is detectable.\n2.  Anyone can verify the authenticity\
    \ of the general’s signature.\n\nUnder this model, each lieutenant maintains a\
    \ vector of signed orders received. Then, the commander sends the signed messages\
    \ to the lieutenants.\n\nGenerally, the algorithm works like this:\n\nA lieutenant\
    \ receives an order from either a commander or other lieutenants and saves it\
    \ in the vector that he maintains after verifying the message's authenticity.\
    \ If there are less than m signatures on the order, the lieutenant adds a signature\
    \ to the order (message) and relays this message to other lieutenants who have\
    \ not seen it yet. When a lieutenant does not receive any newer messages, he chooses\
