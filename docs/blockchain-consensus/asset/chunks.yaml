  trans: '

    ### FIFO 全序广播


    这一抽象结合了 FIFO 广播和全序广播两种特性。


    全序可以通过单一领导者（即序列器方法）或使用 Lamport 时钟来实现，但这些方法都**不具有容错性**。如果领导者宕机，序列化将无法进行；而在 Lamport
    时钟方案中，如果任一节点发生故障，全序也无法得到保证。如何在全序广播中引入容错性，以自动选择新的领导者，正是通过共识协议来研究和解决的问题。从根本上看，共识协议要解决的问题就是在发生故障时选举新的领导者。这是共识协议背后的核心动机。我们将在本章后续内容中进一步探讨全序广播的细节，以及它与状态机复制、容错性和共识协议之间的关系。


    到目前为止，我们所讨论的抽象机制只能适用于进程数量较少的场景。想象一下，一个分布式系统跨越多个大洲，有数千个节点参与其中。那么，目前所介绍的这些抽象机制，是否足以高效应对由数千个异构且分散的节点带来的通信复杂性？答案是否定的。为了满足此类需求，我们需要开发概率性协议。再设想另一种场景：由一个单一节点负责向
    1000 个节点发送消息。即便我们能借助某些硬件支持或其他方法将消息发送给这 1000 个节点，但当这个单一发送节点需要接收来自这 1000 个节点的确认消息时，问题就会变得极其复杂。这个问题被称为**确认风暴**。关键就在于我们如何避免此类问题。


    再设想另一种情况：一个节点通过可靠链路向所有其他节点逐一发送了消息，但在传输过程中，发往某些节点的消息丢失了。此时，发送进程发生了故障，从而导致无法进行重传。结果，那些未能接收到消息的节点将永远无法收到这些消息，因为发送进程已经崩溃。在这种情况下，我们该如何提高可靠性呢？我们可以设计一种方案：一旦某个节点首次接收到一条消息，它便通过可靠信道再次将该消息广播给其他节点。这样一来，即使某些节点发生崩溃，所有正常节点也都能接收到全部消息。这被称为**急切可靠广播**。急切可靠广播是可靠的，但对于
    *n* 个节点，它会产生 *O*(*n*) 个步骤和 *O*(*n*)² 条消息。


    图 3-4 直观展示了急切可靠协议。


    ![](img/515270_1_En_3_Fig4_HTML.jpg)


    一个关于急切可靠广播的示意图，包含 P、Q、R 三条线。P 向 Q 和 R 广播。R 向 Q 和 P 重新广播。Q 向 P 重新广播。


    图 3-4


    急切可靠广播


    此外，还有一些其他算法，我们可以称之为*受自然启发*的算法。例如，思考一下传染病或谣言是如何传播的。一个人感染另外几个人，然后这些人再去感染其他人，感染率会迅速上升。现在，如果广播协议基于这种原理来设计，那么它就能非常高效地在整个网络中快速传播信息（消息）。由于这些协议本质上是随机化协议，它们并不能保证所有节点都一定能收到某条消息，但通常所有节点最终都能收到所有消息的概率非常高。概率性协议或
    gossip 协议常用于点对点网络。基于这种传播方式，已经设计出了许多协议。


    图 3-5 展示了 gossip 协议的工作原理。其核心思想是：当一个节点首次接收到一条消息时，它会将该消息转发给随机选择的几个其他节点。这种技术对于向众多节点广播消息非常有用，消息最终能以很高的概率到达所有节点。


    ![](img/515270_1_En_3_Fig5_HTML.png)


    一组 3 个树状图，分别标记为跳 1、跳 2 和跳 3，用于说明 gossip 协议。每个图表都有从 P1 到 P7 的节点，分为 4 层。


    图 3-5


    Gossip 协议


    概率性广播抽象可以定义为一个具有两个属性的抽象。


    #### 概率有效性


    如果一个正确进程 p 广播了一条消息 m，那么每个正确进程最终以概率 1 交付该消息。


    #### 完整性


    任何消息最多被交付一次，并且被交付的消息之前一定是由某个进程广播的——换句话说，不存在重复消息，也不会凭空产生消息。


    ### 广播与共识之间的关系


    尽力而为广播是最弱的广播模型。通过添加额外的属性和要求，我们可以实现更强的广播模型，如图 3-6 所示。


    ![](img/515270_1_En_3_Fig6_HTML.png)


    一个关于广播关系的流程图。流程如下：尽力而为广播与可靠广播；FIFO 广播与因果序广播；全序广播；以及共识。


    图 3-6


    广播关系——从最弱到最强——以及共识等价性


    至此，我们完成了对广播协议的讨论。接下来，我们将转向协商抽象，这是分布式计算中最基本的问题之一。


    首先，我将解释什么是协商，然后我们将以此基本概念为基础，引出共识问题。


    ## 协商


    在分布式系统中，进程间的协商是一项基本需求。存在许多场景需要进程达成一致，以便分布式系统能够实现其目标。例如，在广播抽象中，进程之间需要就消息的交付达成协商。


    存在多种不同的协商问题，我们将在下文介绍其中最突出的几种，然后更深入地关注共识问题。


    我们已经介绍过可靠广播和全序广播。在本节中，我将简要补充一些关于可靠广播和全序广播的要点；然后，我们将探讨拜占庭协商和共识。


    ### 可靠广播


    可靠广播能够确保即使在发送进程发生故障的情况下依然可靠。换句话说，无论发送者是否正确，可靠性都是有保障的。

    '
- fmt: '### Total Order Broadcast


    The total order broadcast guarantees reliability and the same order of delivery
    at all nodes. Total order broadcast can be achieved using a single leader approach
    where one node is designated as a leader. All messages go through this leader
    which establishes a common order for the messages. The messages are sent to the
    leader first, which then broadcasts them using the FIFO broadcast mechanism. However,
    in this case, the issue is that if the leader crashes, then no messages can be
    delivered. The question then becomes how we can change the failed leader while
    ensuring the safety of the algorithm.


    If the elected leader that establishes the common delivery order fails, the nodes
    must elect a new leader. The problem now becomes to choose a new honest leader
    and agree on the new leader’s choice. Again, now nodes must achieve an agreement,
    and the problem now becomes an agreement on a new leader instead of an agreement
    on the delivery order. In either case, nodes must run some agreement protocol.


    Also, earlier, we discovered that Lamport clocks, using the software event counter
    and the process identifier, can achieve a total order. Combined with FIFO links
    and timestamps in a total order, Lamport clocks to achieve a total order make
    intuitive sense, but this can be challenging in practical terms. For example,
    if a node goes down, then the entire protocol halts.


    Both single leader (sequencer/orderer approach and Lamport clocks) are not fault
    tolerant. We will shortly see what we can do about this. Total order broadcast
    and consensus are different problems but are related to each other. If you solve
    consensus, then you can solve the total order and vice versa.


    Total order broadcast is also called atomic broadcast because it ensures that
    either the messages are delivered to all processes or not at all. This atomicity
    (all or nothing) of total order broadcast is what makes it an atomic broadcast
    protocol, hence the name atomic broadcast.


    ### The Byzantine Agreement Problem


    The Byzantine agreement problem can be defined in three different ways: the Byzantine
    generals problem, the interactive consistency problem, and the consensus problem.


    #### The Basic Byzantine Generals Problem or BGP


    There is a designated process called the source process with an initial value.
    The goal of the problem is to reach an agreement with other processes about the
    initial value of the source process. There are three conditions that need to be
    met:


    *   **Agreement**: All honest processes agree on the same value.

    *   **Validity**: If the source process is honest, the decided (agreed-upon) value
    by all honest processes is the same value as the initial value of the source process.

    *   **Termination**: Each honest process must eventually decide on a value.


    This problem is fundamentally a broadcast primitive in which the designated process
    starts with an initial value (input), and other processes do not have an input
    (initial value). When the algorithm terminates, all processes agree on (output)
    the same value. The crux of the solution for the Byzantine generals problem (BGP)
    is that the sender process reliably sends its input to all processes so that all
    processes output (decide) the same value.


    #### The Interactive Consistency Problem


    In this interactive consistency problem, each process has an initial value, and
    all correct processes must agree on a set of values (vector) where each process
    has a corresponding value. The requirements are listed as follows:


    *   **Agreement**: All honest processes agree on the same array of values (vector).

    *   **Validity**: If a correct process decides on a vector V and a process P1
    is correct and takes as input a value V1 from the vector, then V1 corresponds
    to P1 in the vector V.

    *   **Termination**: Every correct process eventually decides.


    #### The Consensus Problem


    In the consensus problem, each process has an initial value, and all correct processes
    agree on a single value:


    *   **Agreement**: All processes agree on the same value; no two processes decide
    on different values.

    *   **Validity**: A decided value must be a proposed value of a process.

    *   **Integrity**: A process decides at most only once.

    *   **Termination**: Every honest process eventually decides on a value.


    Validity and agreement are safety properties, whereas termination is a liveness
    property.


    Figure [3-7](#515270_1_En_3_Chapter.xhtml#Fig7) shows how consensus looks like
    visually. There is not much in the diagram, but it depicts visually and helps
    to build a mental model of how consensus looks like.


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig7_HTML.jpg)


    A chart of consensus lists two columns of emoticons. The emoticons in the before
    column are tight-lipped and have a smile in the after column.


    Figure 3-7


    Consensus – how it looks visually


    There are many variations of the consensus problem depending upon the system model
    and failure models.


    The abovementioned consensus problem is called uniform consensus where the agreement
    property is strict and does not allow a crashed process to decide differently.


    Another variant of consensus is non-uniform consensus. In non-uniform consensus,
    the agreement property is weakened to allow a crashed process to decide on a different
    value.


    We can write the agreement property of uniform consensus as:


    *   **Agreement**: No two honest processes decide on different values.


    Now if we make the validity property stronger in addition to weakening the agreement
    property, we achieve Byzantine-tolerant consensus. In this case, the validity
    property becomes:


    *   **Validity**: A decided value of an honest process must be a proposed value
    of an honest process.


    The first variation where the validity property is weak and the agreement is also
    weak can be categorized as crash fault–tolerant consensus.


    An algorithm that satisfies all these safety and liveness properties is called
    a correct algorithm. Solving a consensus problem is not difficult in failure-free
    synchronous systems; however, the problem becomes difficult in systems that are
    failure-prone. Failures and asynchrony make solving consensus a complex problem.


    Binary consensus is a simple type of consensus where the input is restricted,
    and as a result, the decision value is restricted to a single bit, either zero
    or one. Multivalued consensus is a type of consensus where the objective is to
    agree on multiple values, that is, a series of values over time.


    While binary consensus may not seem like a very useful construct in the first
    instance, a solution to a binary consensus problem leads to a solution for multivalued
    consensus; hence, it is an important area for research.'
  raw: '### Total Order Broadcast


    The total order broadcast guarantees reliability and the same order of delivery
    at all nodes. Total order broadcast can be achieved using a single leader approach
    where one node is designated as a leader. All messages go through this leader
    which establishes a common order for the messages. The messages are sent to the
    leader first, which then broadcasts them using the FIFO broadcast mechanism. However,
    in this case, the issue is that if the leader crashes, then no messages can be
    delivered. The question then becomes how we can change the failed leader while
    ensuring the safety of the algorithm.


    If the elected leader that establishes the common delivery order fails, the nodes
    must elect a new leader. The problem now becomes to choose a new honest leader
    and agree on the new leader’s choice. Again, now nodes must achieve an agreement,
    and the problem now becomes an agreement on a new leader instead of an agreement
    on the delivery order. In either case, nodes must run some agreement protocol.


    Also, earlier, we discovered that Lamport clocks, using the software event counter
    and the process identifier, can achieve a total order. Combined with FIFO links
    and timestamps in a total order, Lamport clocks to achieve a total order make
    intuitive sense, but this can be challenging in practical terms. For example,
    if a node goes down, then the entire protocol halts.


    Both single leader (sequencer/orderer approach and Lamport clocks) are not fault
    tolerant. We will shortly see what we can do about this. Total order broadcast
    and consensus are different problems but are related to each other. If you solve
    consensus, then you can solve the total order and vice versa.


    Total order broadcast is also called atomic broadcast because it ensures that
    either the messages are delivered to all processes or not at all. This atomicity
    (all or nothing) of total order broadcast is what makes it an atomic broadcast
    protocol, hence the name atomic broadcast.


    ### The Byzantine Agreement Problem


    The Byzantine agreement problem can be defined in three different ways: the Byzantine
    generals problem, the interactive consistency problem, and the consensus problem.


    #### The Basic Byzantine Generals Problem or BGP


    There is a designated process called the source process with an initial value.
    The goal of the problem is to reach an agreement with other processes about the
    initial value of the source process. There are three conditions that need to be
    met:


    *   **Agreement**: All honest processes agree on the same value.


    *   **Validity**: If the source process is honest, the decided (agreed-upon) value
    by all honest processes is the same value as the initial value of the source process.


    *   **Termination**: Each honest process must eventually decide on a value.


    This problem is fundamentally a broadcast primitive in which the designated process
    starts with an initial value (input), and other processes do not have an input
    (initial value). When the algorithm terminates, all processes agree on (output)
    the same value. The crux of the solution for the Byzantine generals problem (BGP)
    is that the sender process reliably sends its input to all processes so that all
    processes output (decide) the same value.


    #### The Interactive Consistency Problem


    In this interactive consistency problem, each process has an initial value, and
    all correct processes must agree on a set of values (vector) where each process
    has a corresponding value. The requirements are listed as follows:


    *   **Agreement**: All honest processes agree on the same array of values (vector).


    *   **Validity**: If a correct process decides on a vector V and a process P1
    is correct and takes as input a value V1 from the vector, then V1 corresponds
    to P1 in the vector V.


    *   **Termination**: Every correct process eventually decides.


    #### The Consensus Problem


    In the consensus problem, each process has an initial value, and all correct processes
    agree on a single value:


    *   **Agreement**: All processes agree on the same value; no two processes decide
    on different values.


    *   **Validity**: A decided value must be a proposed value of a process.


    *   **Integrity:** A process decides at most only once.


    *   **Termination**: Every honest process eventually decides on a value.


    Validity and agreement are safety properties, whereas termination is a liveness
    property.


    Figure [3-7](#515270_1_En_3_Chapter.xhtml#Fig7) shows how consensus looks like
    visually. There is not much in the diagram, but it depicts visually and helps
    to build a mental model of how consensus looks like.


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig7_HTML.jpg)


    A chart of consensus lists two columns of emoticons. The emoticons in the before
    column are tight-lipped and have a smile in the after column.


    Figure 3-7


    Consensus – how it looks visually


    There are many variations of the consensus problem depending upon the system model
    and failure models.


    The abovementioned consensus problem is called uniform consensus where the agreement
    property is strict and does not allow a crashed process to decide differently.


    Another variant of consensus is **non-uniform consensus**. In non-uniform consensus,
    the agreement property is *weakened* to allow a crashed process to decide on a
    different value.


    We can write the *agreement* property of **uniform consensus** as


    *   **Agreement**: No two honest processes decide on different values.


    Now if we make the validity property *stronger* in addition to weakening the agreement
    property, we achieve **Byzantine-tolerant consensus**. In this case, the validity
    property becomes


    *   **Validity**: A decided value of an honest process must be a proposed value
    of an honest process.


    The first variation where the validity property is weak and the agreement is also
    weak can be categorized as **crash fault–tolerant consensus**.


    An algorithm that satisfies all these safety and liveness properties is called
    a correct algorithm. Solving a consensus problem is not difficult in failure-free
    synchronous systems; however, the problem becomes difficult in systems that are
    failure-prone. Failures and asynchrony make solving consensus a complex problem.


    **Binary consensus** is a simple type of consensus where the input is restricted,
    and as a result, the decision value is restricted to a single bit, either zero
    or one. **Multivalued consensus** is a type of consensus where the objective is
    to agree on multiple values, that is, a series of values over time.


    While binary consensus may not seem like a very useful construct in the first
    instance, a solution to a binary consensus problem leads to a solution for multivalued
    consensus; hence, it is an important area for research.'
  trans: '

    ### 全序广播


    全序广播保证了可靠性和在所有节点上一致的投递顺序。全序广播可以通过单领导者方法实现，即指定一个节点作为领导者。所有消息都通过这个领导者，由它建立消息的共同顺序。消息首先发送给领导者，然后领导者使用
    FIFO 广播机制进行广播。然而，在这种情况下，问题在于如果领导者崩溃，则无法投递任何消息。那么问题就变成了如何在保证算法安全性的前提下更换失效的领导者。


    如果负责建立共同投递顺序的当选领导者失效，节点必须选举一个新的领导者。现在的问题变成了选出一个新的诚实领导者，并就新领导者的选择达成一致。同样，节点现在必须达成协议，而问题也变成了就新领导者达成一致，而非就投递顺序达成一致。无论哪种情况，节点都必须运行某种协议。


    此外，我们之前发现，使用软件事件计数器和进程标识符的 Lamport 时钟可以实现全序。结合 FIFO 链接和全序中的时间戳，Lamport 时钟实现全序在直觉上是合理的，但在实际应用中可能具有挑战性。例如，如果一个节点宕机，那么整个协议就会停止。


    单领导者（排序器/定序器方法）和 Lamport 时钟都不具备容错性。我们很快会看到对此有什么解决办法。全序广播和共识是不同的两个问题，但它们彼此相关。如果你解决了共识问题，那么你就能解决全序问题，反之亦然。


    全序广播也称为原子广播，因为它确保消息要么被投递给所有进程，要么完全不投递。全序广播的这种原子性（全有或全无）使其成为原子广播协议，因此得名原子广播。


    ### 拜占庭协议问题


    拜占庭协议问题可以通过三种不同的方式定义：拜占庭将军问题、交互一致性问题和共识问题。


    #### 基础拜占庭将军问题（BGP）


    有一个被称为源进程的指定进程，它拥有一个初始值。该问题的目标是与其他进程就源进程的初始值达成一致。需要满足三个条件：


    *   **一致性**：所有诚实进程就同一值达成一致。

    *   **有效性**：如果源进程是诚实的，所有诚实进程决定（达成一致）的值与源进程的初始值相同。

    *   **终止性**：每个诚实进程最终都必须决定一个值。


    这个问题本质上是一个广播原语，其中指定进程从一个初始值（输入）开始，而其他进程没有输入（初始值）。当算法终止时，所有进程就（输出）同一个值达成一致。解决拜占庭将军问题的关键在于，发送方进程可靠地将其输入发送给所有进程，以便所有进程输出（决定）相同的值。


    #### 交互一致性问题


    在交互一致性问题中，每个进程都有一个初始值，所有正确进程必须就一组值（向量）达成一致，其中每个进程都有一个对应的值。要求如下：


    *   **一致性**：所有诚实进程就相同的值数组（向量）达成一致。

    *   **有效性**：如果一个正确进程决定了一个向量 V，并且进程 P1 是正确的，且其输入值为向量中的 V1，那么 V1 对应于向量 V 中的 P1。

    *   **终止性**：每个正确进程最终都会做出决定。


    #### 共识问题


    在共识问题中，每个进程都有一个初始值，所有正确进程就单个值达成一致：


    *   **一致性**：所有进程就同一个值达成一致；没有两个进程决定不同的值。

    *   **有效性**：决定的值必须是某个进程提出的值。

    *   **完整性**：一个进程最多只能决定一次。

    *   **终止性**：每个诚实进程最终都会决定一个值。


    有效性和一致性是安全性属性，而终止性是活性属性。


    图 3-7 直观地展示了共识的样子。图中没有太多内容，但它直观地描绘出来，有助于构建共识在头脑中的模型。


    ![](img/515270_1_En_3_Fig7_HTML.jpg)


    一个共识图表列出了两列表情符号。之前一列中的表情符号是抿嘴的，之后一列中的是微笑的。


    图 3-7


    共识——视觉呈现的样子


    根据系统模型和故障模型的不同，共识问题有多种变体。


    上述共识问题称为统一共识，其中一致性属性是严格的，不允许崩溃的进程决定不同的值。


    共识的另一个变体是非统一共识。在非统一共识中，一致性属性被弱化，允许崩溃的进程决定一个不同的值。


    我们可以将统一共识的一致性属性表述为：


    *   **一致性**：没有两个诚实进程决定不同的值。


    现在，如果我们除了弱化一致性属性之外，还加强有效性属性，我们就实现了拜占庭容错共识。在这种情况下，有效性属性变为：


    *   **有效性**：一个诚实进程决定的值必须是某个诚实进程提出的值。


    第一个变体，即有效性属性较弱且一致性也较弱的情况，可以归类为崩溃容错共识。


    满足所有这些安全性和活性属性的算法被称为正确算法。在无故障的同步系统中解决共识问题并不困难；然而，在易出故障的系统中，这个问题就变得困难了。故障和异步性使得解决共识问题成为一个复杂的问题。


    二元共识是一种简单的共识类型，其输入受到限制，因此决策值被限制为单个比特，要么是 0，要么是 1。多值共识是一种共识类型，其目标是就多个值达成一致，即随时间变化的一系列值。


    虽然二元共识起初看起来可能不是一个非常有用的结构，但二元共识问题的解决方案会引出多值共识的解决方案；因此，它是一个重要的研究领域。

    '
- fmt: "# 共识属性定义\n\n共识属性的定义可能因应用而异。例如，在区块链共识协议中，有效性（`validity`）属性的定义通常与既定定义不同，且可能采用较弱的变体。例如，在\
    \ `Tendermint` 共识中，有效性属性简单地表述为：“一个被决定的值是有效的，即它满足预定义的谓词 `valid()`”。这可以是特定于应用的条件。例如，在区块链背景下，可能要求添加到\
    \ `Bitcoin` 区块链的新块必须具有一个通过节点验证检查的有效块头。在其他变体中，`valid()` 谓词要求与“如果所有诚实进程都提议同一个值，那么所有进程都决定该值”这一条件可以结合。这是有效性谓词与传统有效性条件的结合。存在多种变体和不同的定义，有些严格，有些则不严格，这取决于具体应用。我们将在本书中涵盖区块链共识及相关共识协议，并在所讨论的共识算法和故障模型的背景下定义和重新定义这些要求。\n\
    \n共识协议如果是**崩溃容错（CFT）**的，则它能容忍一定阈值内的良性故障。共识协议如果是**拜占庭容错（BFT）**的，则它能容忍任意故障。为了实现崩溃容错，底层分布式网络必须满足条件\
    \ `N >= 2F + 1`，其中 `N` 是网络中的节点数，`F` 是故障节点数。只有网络满足此条件，它才能继续正常工作并达成共识。如果需要容忍拜占庭故障，则条件变为\
    \ `N >= 3F + 1`。我们将在本章后面讨论不可能结果时更正式地介绍这一点。但请记住这些条件是最紧的下界。\n\n共识问题也适用于分布式计算中的其他问题。诸如全序广播、领导者选举问题和终止性可靠广播等问题都需要就一个公共值达成一致。这些问题可以被视为共识的变体。\n\
    \n# 系统模型\n\n为了研究共识和协议问题并开发解决方案，我们对分布式系统的行为做出了一些基本假设。我们在第[1](#515270_1_En_1_Chapter.xhtml)章中学习了关于节点和网络行为的许多抽象概念。在此，我们总结这些假设，并继续更详细地讨论共识问题。此处描述系统模型的原因有两个：第一，总结我们在该章中学到的关于节点和网络行为的知识；第二，将这些知识置于研究共识和协议问题的背景下。如需详细研究，请参阅第[1](#515270_1_En_1_Chapter.xhtml)章。\n\
    \n## 分布式系统\n\n分布式系统是一组通过消息传递进行通信的进程。共识算法是基于对分布式系统的时序和同步行为所做的假设来设计的。这些假设被归入时序模型或同步假设中，我们将在下文描述。\n\
    \n## 时序模型/同步\n\n同步假设捕捉了关于分布式系统的时序假设。处理器和通信的相对速度也被考虑在内。存在几种同步模型，简要描述如下：\n\n- **同步系统**：其中处理器和通信延迟存在一个已知的上界，且该上界始终成立。\n\
    - **异步系统**：其中对时序不做出假设，处理器或通信延迟没有上界。这是一个有用的概念，因为基于此假设设计的协议也会自动在同步模型及其他更有利的模型中具有弹性。换句话说，在异步模型中证明正确的程序，在同步模型中自动正确。\n\
    - **部分同步**：可以通过多种方式定义：\n    - 存在一个始终成立的未知上界。\n    - 存在一个已知上界，该上界在某个GST（全局稳定时间）后最终成立。\n\
    \    - 存在有保证的同步周期，该周期足够长，使得可以做出决定且算法可以终止。\n    - 存在一个未知上界，该上界在某个GST后最终成立。\n  \
    \  - 实用拜占庭容错（PBFT）引入的弱同步假设网络延迟不会无限增长超过超时时间。\n    - 系统最初可以是异步的，但在GST之后变为同步。\n\n\
    通常，在实践中，关于分布式系统的时序行为会做出部分同步的假设。这一选择在区块链协议中尤其常见，大多数共识协议都是为最终同步/部分同步模型设计的，例如用于区块链的`PBFT`。当然，也有一些是为异步模型设计的，例如`HoneyBadger`。我们将在第[5](#515270_1_En_5_Chapter.xhtml)章及本书后续章节中涵盖区块链共识。目前，我将从传统角度聚焦于一般的分布式共识问题。\n\
    \n另外，请注意，具有拜占庭故障的异步消息传递模型表达了基于当今互联网的典型分布式系统的条件。这在诸如`Bitcoin`或`Ethereum`等公有区块链平台中尤其如此。\n\
    \n## 进程故障\n\n故障模型允许我们对可能发生哪些故障以及如何处理它们做出假设。故障模型描述了故障可能发生或不发生的条件。存在多种类别，例如崩溃故障，其中进程可能崩溃停止或崩溃失败；或者遗漏故障，其中处理器可能遗漏发送或接收消息。\n\
    \n另一种类型的遗漏故障称为动态遗漏故障。在该模型中，系统每轮最多可能丢失一定数量的消息。但是，发生消息丢失的通道可能逐轮变化。\n\n时序故障是指进程不符合同步假设的故障。进程可能表现出拜占庭行为，即进程可以任意或恶意地行为。在拜占庭模型中，被破坏的处理器可以复制、丢弃消息，并积极尝试破坏整个系统。我们还在此定义了一个对手模型，其中我们对可能对分布式系统产生不利影响并破坏处理器的对手做出一些假设。\n\
    \n在经认证的拜占庭故障中，可以通过标识来识别消息的源并检测伪造消息，通常通过数字签名实现。在此假设下发生的故障称为经认证的拜占庭故障。\n\n消息可以是已认证或未认证的。已认证消息通常使用数字签名来允许防伪检测和消息篡改。使用已认证消息时，协议问题变得相对容易解决，因为接收方可以检测到消息伪造，并拒绝未签名或签名不正确的消息，或来自未认证进程的消息。另一方面，使用未认证消息的分布式系统难以处理，因为无法验证消息的真实性。未认证消息也称为口头消息或未签名消息。尽管困难，但这确实是关于解决共识或协议问题的一个常见假设。然而，数字签名在区块链系统中无处不在，区块链共识所基于的模型几乎总是已认证的拜占庭模型。"
  raw: "The definitions of properties of consensus may change slightly depending on\
    \ the application. For example, usually in blockchain consensus protocols the\
    \ validity property is defined differently from established definitions and may\
    \ settle for a weaker variant. For example, in Tendermint consensus the validity\
    \ property simply states, *“a decided value is valid i.e. it satisfies the predefined\
    \ predicate denoted valid( )”*. This can be an application-specific condition.\
    \ For example, in blockchain context it could be required that a new block added\
    \ to the Bitcoin blockchain must have a valid block header that passes node validation\
    \ checks. In other variations, the valid( ) predicate requirement and the condition\
    \ “if all honest processes propose the same value, then all decide on that same\
    \ value” can be combined. This is a combination of validity predicate and traditional\
    \ validity condition. There are variations and different definitions. Some are\
    \ strict, and some are not so strict, depending on the application. We will cover\
    \ blockchain consensus and relevant consensus protocols throughout this book and\
    \ will define and redefine these requirements in the context of the consensus\
    \ algorithm and fault models being discussed.\n\nA consensus protocol is **crash\
    \ fault tolerant (CFT)** if it can tolerate benign faults up to a certain threshold.\
    \ A consensus protocol is **Byzantine fault tolerant (BFT)** if it can tolerate\
    \ arbitrary faults. In order to achieve crash fault tolerance, the underlying\
    \ distributed network must satisfy the condition N >= 2F+1, where N is the number\
    \ of nodes in the network, and F is the number of faulty nodes. If the network\
    \ satisfies this condition, only then it will be able to continue to work correctly\
    \ and achieve consensus. If Byzantine faults are required to be tolerated, then\
    \ the condition becomes N>=3F+1\\. We will cover this more formally when we discuss\
    \ impossibility results later in this chapter. But remember these conditions as\
    \ lower tight bounds.\n\nA consensus problem applies to other problems in distributed\
    \ computing too. Problems like total order broadcast, leader election problem,\
    \ and terminating reliable broadcast require an agreement on a common value. These\
    \ problems can be considered consensus variants.\n\n## System Models\n\nTo study\
    \ consensus and agreement problems and develop solutions, there are some underlying\
    \ assumptions that we make about the behavior of the distributed system. We learned\
    \ many of these abstractions regarding node and network behavior in Chapter [1](#515270_1_En_1_Chapter.xhtml).\
    \ Here, we summarize those assumptions and move on to discuss the consensus problem\
    \ in more detail. The reason for describing system models here is twofold: first,\
    \ to summarize what we learned in the chapter regarding the behavior of the nodes\
    \ and networks and, second, to put this knowledge in the context of studying consensus\
    \ and agreement problems. For a detailed study, you can refer to Chapter [1](#515270_1_En_1_Chapter.xhtml).\n\
    \n### Distributed System\n\nA distributed system is a set of processes that communicate\
    \ using message passing. Consensus algorithms are designed based on assumptions\
    \ made about timing and synchrony behavior of the distributed system. These assumptions\
    \ are captured under the timing model or synchrony assumptions, which we describe\
    \ next.\n\n### Timing Model/Synchrony\n\nSynchrony assumptions capture the timing\
    \ assumption about a distributed system. The relative speed of processors and\
    \ communication is also taken into consideration. There are several synchrony\
    \ models. We briefly describe those as follows:\n\n*   Synchronous systems where\
    \ there is a known upper bound on the processor and communication delay which\
    \ always holds.\n\n*   Asynchronous systems where there are assumptions made about\
    \ timing. There is no bound on the processor or communication delay. This is a\
    \ useful notion because protocols designed with this assumption are also automatically\
    \ resilient in synchronous and other models, which are more favorable. In other\
    \ words, a program proven correct in an asynchronous model is automatically correct\
    \ in a synchronous model.\n\n*   Partial synchrony which can be defined in several\
    \ ways:\n    *   There is an unknown upper bound which always holds.\n\n    *\
    \   There is a known upper bound that eventually holds after some GST.\n\n   \
    \ *   There are guaranteed periods of synchrony, which are long enough that a\
    \ decision can be made, and an algorithm can terminate.\n\n    *   There is an\
    \ unknown upper bound which eventually holds after some GST.\n\n    *   Weak synchrony\
    \ introduced with practical Byzantine fault tolerance (PBFT) assumes that the\
    \ network latency doesn’t grow infinitely more than the timeout.\n\n    *   A\
    \ system can be asynchronous initially but is synchronous after GST.\n\nUsually,\
    \ in practice a partially synchronous assumption is made regarding the timing\
    \ behavior of the distributed system. This choice is especially true in blockchain\
    \ protocols, where most consensus protocols are designed for eventually synchronous/partially\
    \ synchronous models, for example, PBFT for blockchain. Of course, some are designed\
    \ for the asynchronous model, such as HoneyBadger. We will cover blockchain consensus\
    \ in Chapter [5](#515270_1_En_5_Chapter.xhtml) and then throughout this book.\
    \ For now, I will focus on the distributed consensus problem in general and from\
    \ a traditional point of view.\n\nAlso, note that an asynchronous message-passing\
    \ model with Byzantine faults expresses conditions of a typical distributed system\
    \ based on the Internet today. Especially, this is quite true in public blockchain\
    \ platforms such as Bitcoin or Ethereum.\n\n### Process Failures\n\nFailure models\
    \ allow us to make assumptions about which failures can occur and how we can address\
    \ them. Failure models describe the conditions under which the failure may or\
    \ may not occur. There are various classes, such as crash failures, where processes\
    \ can crash-stop or crash-fail, or omission failures where a processor can omit\
    \ sending or receiving a message.\n\nAnother type of omission fault is called\
    \ the dynamic omission fault. In this model, a system can lose a maximum number\
    \ of messages in each round. However, the channels on which the message losses\
    \ occur may change from round to round.\n\nTiming failures are those where processes\
    \ do not comply with the synchrony assumptions. The processes may exhibit Byzantine\
    \ behavior where the processes can behave arbitrarily or maliciously. In the Byzantine\
    \ model, the corrupted processor can duplicate, drop a message, and actively try\
    \ to sabotage the entire system. We also define an adversary model here where\
    \ we make some assumptions about an adversary who can adversely affect the distributed\
    \ system and corrupt the processors.\n\nIn authenticated Byzantine failures, it\
    \ is possible to identify the source of the message via identification and detect\
    \ the forged messages, usually via digital signatures. Failures that occur under\
    \ this assumption are called authenticated Byzantine failures.\n\nMessages can\
    \ be authenticated or non-authenticated. Authenticated messages usually use digital\
    \ signatures to allow forgery detection and message tampering. The agreement problem\
    \ becomes comparatively easier to solve with authenticated messages because recipients\
    \ can detect the message forgery and reject the unsigned or incorrectly signed\
    \ messages or messages coming from unauthenticated processes. On the other hand,\
    \ distributed systems with non-authenticated messages are difficult to deal with\
    \ as there is no way to verify the authenticity of the messages. Non-authenticated\
    \ messages are also called oral messages or unsigned messages. Even though it\
    \ is difficult, it is indeed a common assumption about solving consensus or agreement\
    \ problems. However, digital signatures are ubiquitous in blockchain systems,\
    \ and the model under which blockchain consensus works is almost always authenticated\
    \ Byzantine."
  trans: "\n# 共识属性定义\n\n共识属性的定义可能因应用而异。例如，在区块链共识协议中，有效性（`validity`）属性的定义通常与既定定义不同，且可能采用较弱的变体。例如，在\
    \ `Tendermint` 共识中，有效性属性简单地表述为：“一个被决定的值是有效的，即它满足预定义的谓词 `valid()`”。这可以是特定于应用的条件。例如，在区块链背景下，可能要求添加到\
    \ `Bitcoin` 区块链的新块必须具有一个通过节点验证检查的有效块头。在其他变体中，`valid()` 谓词要求与“如果所有诚实进程都提议同一个值，那么所有进程都决定该值”这一条件可以结合。这是有效性谓词与传统有效性条件的结合。存在多种变体和不同的定义，有些严格，有些则不严格，这取决于具体应用。我们将在本书中涵盖区块链共识及相关共识协议，并在所讨论的共识算法和故障模型的背景下定义和重新定义这些要求。\n\
    \n共识协议如果是**崩溃容错（CFT）**的，则它能容忍一定阈值内的良性故障。共识协议如果是**拜占庭容错（BFT）**的，则它能容忍任意故障。为了实现崩溃容错，底层分布式网络必须满足条件\
    \ `N >= 2F + 1`，其中 `N` 是网络中的节点数，`F` 是故障节点数。只有网络满足此条件，它才能继续正常工作并达成共识。如果需要容忍拜占庭故障，则条件变为\
    \ `N >= 3F + 1`。我们将在本章后面讨论不可能结果时更正式地介绍这一点。但请记住这些条件是最紧的下界。\n\n共识问题也适用于分布式计算中的其他问题。诸如全序广播、领导者选举问题和终止性可靠广播等问题都需要就一个公共值达成一致。这些问题可以被视为共识的变体。\n\
    \n# 系统模型\n\n为了研究共识和协议问题并开发解决方案，我们对分布式系统的行为做出了一些基本假设。我们在第 1 章中学习了关于节点和网络行为的许多抽象概念。在此，我们总结这些假设，并继续更详细地讨论共识问题。此处描述系统模型的原因有两个：第一，总结我们在该章中学到的关于节点和网络行为的知识；第二，将这些知识置于研究共识和协议问题的背景下。如需详细研究，请参阅第\
    \ 1 章。\n\n## 分布式系统\n\n分布式系统是一组通过消息传递进行通信的进程。共识算法是基于对分布式系统的时序和同步行为所做的假设来设计的。这些假设被归入时序模型或同步假设中，我们将在下文描述。\n\
    \n## 时序模型/同步\n\n同步假设捕捉了关于分布式系统的时序假设。处理器和通信的相对速度也被考虑在内。存在几种同步模型，简要描述如下：\n\n- **同步系统**：其中处理器和通信延迟存在一个已知的上界，且该上界始终成立。\n\
    - **异步系统**：其中对时序不做出假设，处理器或通信延迟没有上界。这是一个有用的概念，因为基于此假设设计的协议也会自动在同步模型及其他更有利的模型中具有弹性。换句话说，在异步模型中证明正确的程序，在同步模型中自动正确。\n\
    - **部分同步**：可以通过多种方式定义：\n    - 存在一个始终成立的未知上界。\n    - 存在一个已知上界，该上界在某个 GST（全局稳定时间）后最终成立。\n\
    \    - 存在有保证的同步周期，该周期足够长，使得可以做出决定且算法可以终止。\n    - 存在一个未知上界，该上界在某个 GST 后最终成立。\n\
    \    - 实用拜占庭容错（PBFT）引入的弱同步假设网络延迟不会无限增长超过超时时间。\n    - 系统最初可以是异步的，但在 GST 之后变为同步。\n\
    \n通常，在实践中，关于分布式系统的时序行为会做出部分同步的假设。这一选择在区块链协议中尤其常见，大多数共识协议都是为最终同步/部分同步模型设计的，例如用于区块链的`PBFT`。当然，也有一些是为异步模型设计的，例如`HoneyBadger`。我们将在第\
    \ 5 章及本书后续章节中涵盖区块链共识。目前，我将从传统角度聚焦于一般的分布式共识问题。\n\n另外，请注意，具有拜占庭故障的异步消息传递模型表达了基于当今互联网的典型分布式系统的条件。这在诸如`Bitcoin`或`Ethereum`等公有区块链平台中尤其如此。\n\
    \n## 进程故障\n\n故障模型允许我们对可能发生哪些故障以及如何处理它们做出假设。故障模型描述了故障可能发生或不发生的条件。存在多种类别，例如崩溃故障，其中进程可能崩溃停止或崩溃失败；或者遗漏故障，其中处理器可能遗漏发送或接收消息。\n\
    \n另一种类型的遗漏故障称为动态遗漏故障。在该模型中，系统每轮最多可能丢失一定数量的消息。但是，发生消息丢失的通道可能逐轮变化。\n\n时序故障是指进程不符合同步假设的故障。进程可能表现出拜占庭行为，即进程可以任意或恶意地行为。在拜占庭模型中，被破坏的处理器可以复制、丢弃消息，并积极尝试破坏整个系统。我们还在此定义了一个对手模型，其中我们对可能对分布式系统产生不利影响并破坏处理器的对手做出一些假设。\n\
    \n在经认证的拜占庭故障中，可以通过标识来识别消息的源并检测伪造消息，通常通过数字签名实现。在此假设下发生的故障称为经认证的拜占庭故障。\n\n消息可以是已认证或未认证的。已认证消息通常使用数字签名来允许防伪检测和消息篡改。使用已认证消息时，协议问题变得相对容易解决，因为接收方可以检测到消息伪造，并拒绝未签名或签名不正确的消息，或来自未认证进程的消息。另一方面，使用未认证消息的分布式系统难以处理，因为无法验证消息的真实性。未认证消息也称为口头消息或未签名消息。尽管困难，但这确实是关于解决共识或协议问题的一个常见假设。然而，数字签名在区块链系统中无处不在，区块链共识所基于的模型几乎总是已认证的拜占庭模型。\n"
- fmt: '# Channel Reliability


    It is often assumed that the channel is reliable. Reliable channels guarantee
    that if a correct process `p` has sent a message `m` to a correct process `q`,
    then `q` will eventually receive `m`. In practice, this is usually the `TCP/IP`
    protocol that provides reliability.


    Lossy channels are another assumption that captures the notion of channels where
    messages can be lost. This can happen due to poor network conditions, delays,
    denial-of-service attacks, hacking attacks in general, slow network, a misconfiguration
    in the network configuration, noise, buffer overflows, network congestion, and
    physical disconnections. There might be many other reasons, but I just described
    the most common ones.


    There are two variations of fair-loss channels. There is an upper bound `k` on
    the number of lost messages in one variation, and in another, known as fair-loss
    channels, there is no such upper bound. The first variation is easier to handle
    where the algorithm can retransmit the message `k+1` times, ensuring that at least
    one copy is received. In the latter variation, the fair-loss channels, if the
    sender keeps resending a message, eventually it is delivered, provided that both
    the sender and the receiver are correct. We discussed this in greater detail in
    Chapter [1](#515270_1_En_1_Chapter.xhtml).


    ## History


    Consensus problems have been studied for decades in distributed computing. Achieving
    consensus under faults was first proposed by Lamport et al. in their paper "SIFT:
    Design and analysis of a fault-tolerant computer for aircraft control."


    Later, a Byzantine fault–tolerant protocol under a synchronous setting was first
    proposed by Lamport et al. in their seminal paper "Reaching Agreement in the Presence
    of Faults."


    The impossibility of reaching an agreement even if a single process crash-fails
    was proven by Fischer, Lynch, and Paterson. This discovery is infamously known
    as the `FLP` impossibility result.


    `Ben-Or` proposed asynchronous Byzantine fault tolerance using randomization to
    circumvent `FLP`. In addition, partial synchrony was presented in `DLS 88` for
    `BFT`.


    ## Two Generals'' Problem


    The Two Generals'' Paradox or Two Generals'' Problem was formulated by Gray et
    al. in 1978. In this thought experiment, two generals are sharing a common goal
    to capture a hill. The condition is that if both of those generals act simultaneously
    and attack the hill together at the same time, then success is guaranteed. If
    either one of the generals attacks alone, they will lose the battle. It is also
    assumed that both generals are camped some distance apart, and they can communicate
    only via messengers (runners). However, these messengers are not reliable and
    can get lost or captured. If one general sends a message to another general to
    attack, for example, "Attack at 0400 hours," then it is possible that the message
    doesn''t reach the other general. Suppose the message doesn''t reach the second
    general. In that case, it is impossible to differentiate whether the first general
    sent a message or not or the messenger got captured on its way to the second general.
    The general who has sent the message cannot assume that his message got through
    because unless he receives an explicit acknowledgment from the second general,
    he cannot be sure. Now the question is what protocol we can come up with to reach
    an agreement on a plan to attack. The situation is tricky because there is no
    common knowledge between the generals, and the only way to know is via messengers,
    which are unreliable.


    Both generals have two options. Either they can go ahead regardless of any acknowledgment
    received from the other general, or they don''t and wait until a response is received
    (acknowledgment) from the other general. In the first case, the risk is that the
    general goes ahead without a response from the other general and might end up
    alone in the attack and gets defeated. In the latter case, the general will not
    act until a response is received. In this case, the first general waiting for
    an acknowledgment is safe because he will only attack if the response is received.
    So now it becomes the second general''s responsibility to decide whether to attack
    and be alone or wait for an acknowledgment from the first general that he has
    received the acknowledgment. One solution that comes to mind is that perhaps if
    generals send a lot of messengers, then there is a probability that at least one
    might get through, but there is also a chance that all messengers are captured,
    and no message goes through. For example, if general 1 sends many messages to
    general 2 and all messengers are lost, then general 2 doesn''t know about the
    attack, and if general 1 goes ahead and attacks, then the battle is lost.


    The Two Generals'' Problem is depicted in Figure [3-8](#515270_1_En_3_Chapter.xhtml#Fig8).


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig8_HTML.jpg)


    A schematic of the two generals'' problem has the figure of 2 generals sending
    the message of attack at 4 am, ok; and O K.


    Figure 3-8


    Two Generals'' Problem


    In Figure [3-8](#515270_1_En_3_Chapter.xhtml#Fig8), two generals must agree on
    the time to attack; otherwise, no win.


    The issue is that no general can ever be sure about the commitment from the other
    general. If general 1 always attacks even if no acknowledgment is received from
    general 2, then general 1 risks being alone in the attack if all messengers are
    lost. This is the case because general 2 knows nothing about the attack. If general
    1 attacks only if a positive acknowledgment is received from general 2, then general
    1 is safe. General 2 is in the same situation as general 1 because now he is waiting
    for general 1''s acknowledgment. General 2 might consider himself safe as he knows
    that general 1 will only attack if general 2''s response is received by general
    1. General 2 is now waiting for the acknowledgment from general 1. They are both
    thinking about whether the other general received their message or not, hence
    the paradox!


    From a distributed system perspective, this experiment depicts a situation where
    two processes have no common knowledge, and the only way they can find out about
    the state of each other is via messages.'
