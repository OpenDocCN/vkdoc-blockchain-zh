- fmt: "# Quantum Consensus\n\nQuantum consensus drives a quantum network with some\
    \ qubits to a symmetric state. Also, with the advent of quantum computing, the\
    \ problems from the classical computing world are being studied through the lens\
    \ of quantum computing to see if there are any improvements that can be made to\
    \ the existing algorithms from the classical world by harnessing the quantum power.\
    \ One such problem is distributed consensus from the classical computing/networking\
    \ world, which we have studied throughout this book. We’ll study the agreement/consensus\
    \ in quantum distributed systems and the impact of quantum computing on classical\
    \ distributed systems, especially consensus. It has been shown that the classical\
    \ distributed consensus problem when studied under a quantum framework results\
    \ in enhancing the classical results and can also solve problems which are otherwise\
    \ unsolvable in classical networks.\n\nAlso, in quantum networks, reaching an\
    \ agreement is required in many cases; thus, pure quantum consensus for quantum\
    \ networks and quantum Internet is also an area of interest.\n\nIn this section,\
    \ we’ll focus more on enhancement of classical results rather than pure quantum\
    \ consensus where a quantum network with some qubits is brought to consensus,\
    \ that is, in a symmetric state. Classical result enhancement is more relevant\
    \ to our study of consensus in this book.\n\nQuantum consensus algorithms are\
    \ a very active area of research. There are four categories that have emerged\
    \ in this context:\n\n- Symmetric state consensus\n- Entanglement-based consensus\n\
    - Measurement-based consensus\n- Quantum key distribution (QKD)–based consensus\n\
    \nSymmetric state consensus refers to the convergence of arbitrary states of quantum\
    \ nodes in a quantum network to a consensus symmetric state.\n\nEntanglement-based\
    \ consensus is more relevant to the classical consensus problem. This is so because\
    \ classical consensus has been investigated through the lens of quantum computing.\
    \ The key idea here is that quantum properties can enhance the classical consensus\
    \ and can solve problems which were understood to be unsolvable in the classical\
    \ consensus world.\n\nMeasurement-based consensus works on the premise that when\
    \ a measurement is made on a quantum state, it collapses to a classical state,\
    \ 0 or 1. Such a mechanism can be useful in quantum hybrid networks with quantum\
    \ nodes but classical channels. The quantum state is kept in quantum computers,\
    \ whereas the classical channels are used for communication to reach consensus.\
    \ The aim is to allow convergence of quantum nodes to a common state in a hybrid\
    \ quantum–classical network.\n\nQKD-based consensus has been proposed to solve\
    \ the Byzantine agreement problem between multiple nodes without entanglement.\
    \ The unconditional security property of QKD is fundamental to this type of consensus.\n\
    \nParticipants in a classical distributed system, including permissioned blockchains,\
    \ are inherently slow to achieve consensus due to high time complexity incurred\
    \ by the use of classical protocols like PBFT, three-phase commit, or Paxos. Usually,\
    \ the time complexity of these consensus algorithms is `O(n²)`, that is, quadratic.\
    \ Is it possible to significantly reduce time complexity of classical distributed/blockchain\
    \ consensus by using quantum computing? The short answer is yes. Ben-Or and Hassidim\
    \ proposed a fast quantum Byzantine agreement which resolves consensus in `O(1)`\
    \ time complexity.\n\nIn the next section, we introduce some consensus and agreement\
    \ algorithms that have been introduced in the literature, which due to quantum\
    \ properties significantly improve classical results or provide novel algorithms\
    \ for consensus and relevant problems in the quantum world.\n\n## Fast Quantum\
    \ Byzantine Agreement\n\nMichael Ben-Or and Avinatan Hassidim introduced the fast\
    \ quantum Byzantine agreement protocol which reaches an agreement in `O(1)` expected\
    \ communication rounds. There are two results presented in the paper:\n\n- A quantum\
    \ protocol for synchronous consensus which tolerates `t < n/3` faults and acts\
    \ in an expected constant number of rounds. The adversary is fail-stop, adaptive,\
    \ full information, and computationally unbounded.\n- A quantum protocol for a\
    \ synchronous Byzantine agreement tolerating `t < n/3` faulty actors in an expected\
    \ constant number of rounds. The adversary model is an adaptive, full information,\
    \ and computationally unbounded adversary.\n\nThe system model comprises of `n`\
    \ nodes, and each pair of nodes is connected through a separate two-way quantum\
    \ channel. The protocol works in rounds, and each round has two phases. In the\
    \ first phase, all processors send and receive messages, and the second phase\
    \ is the computation phase where nodes do local computation to process received\
    \ messages and decide what messages to send.\n\nThe protocol satisfies the following\
    \ conditions:\n\n- **Agreement**: All nonfaulty processors decide on the same\
    \ value with probability 1.\n- **Validity**: The decided value is the input value\
    \ of all processors.\n- **Termination**: All nonfaulty processes decide on a value\
    \ with probability 1.\n\nRemember we discussed coin flip randomized protocols\
    \ earlier in Chapter 6. Especially, we discussed Ben-Or’s algorithm where coin\
    \ flipping was used to achieve an agreement. Fundamentally, the agreement problem\
    \ is reduced to weak global coin flipping.\n\nThe idea in the quantum world is\
    \ that instead of obtaining a weak global coin by classical means, we use quantum\
    \ techniques to obtain a weak global coin. With this quantum technique, it is\
    \ possible to tolerate Byzantine failures under synchrony if `n > 3*t` in `O(1)`\
    \ expected rounds. Consensus however is still impossible if `n < 3*t`, but there’s\
    \ an improvement of achieving `O(1)` rounds.\n\nIn an asynchronous model, a quantum\
    \ algorithm exists if `n > 3*t`; however, it is impossible if `n < 3*t`.\n\nThe\
    \ protocol for fail-stop faults works as described in the following:\n\n(`C` represents\
    \ a coin, `L` represents a leader, and the state is GHZ.)\n\nGHZ state is `|GHZ⟩\
    \ = (1/√2)|000⟩ + (1/√2)|111⟩`\n\nEach process `P[i]` runs:\n\n**Round 1**\n\n\
    1.  Generate the state `|C_i⟩ = (1/√2)|0,0,...0⟩ + (1/√2)|1,1,...1⟩` on `n` qubit.\n\
    \    1.  Send the `k`-th qubit to the `k`-th player while keeping one part to\
    \ yourself.\n2.  Generate the state `|L_i⟩ = (1/n³) Σ_{a=1}^{n³} |a,a,...a⟩` on\
    \ `n` qubits, an equal superposition of the numbers from 1 to `n^(3/2)`.\n   \
    \ 1.  Distribute `n` qubits among all processes.\n3.  Receive the quantum message\
    \ from all processes.\n\n**Round 2**\n\n1.  Measure all `L[j]` qubits received\
    \ in round 1.\n2.  Select the process which has the highest leader value as the\
    \ leader of the round.\n3.  Measure the leader’s coin in the standard base.\n\
    4.  Obtain the measurement outcome of the leader’s coin which serves as the global\
    \ coin.\n\nUsing this algorithm, a weak global coin is obtained. The probability\
    \ for either common outcome is at least `1/3` if `3*t < n`. The protocol works\
    \ for crash faults.\n\nAnother protocol for Byzantine faults is presented in the\
    \ paper, which can tolerate up to `t < n/4` faulty nodes under an asynchronous\
    \ environment."
