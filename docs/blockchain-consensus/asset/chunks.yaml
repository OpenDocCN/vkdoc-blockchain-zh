    Multiple servers acting together (client-server and multiple servers coordinating
    closely/closely coupled servers)


    Another diagram in Figure [1-11](#515270_1_En_1_Chapter.xhtml#Fig11) shows the
    concept of data replication.


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig11_HTML.jpg)


    A schematic of data replication. The citizen database at the headquarters is connected
    to 3 citizen databases at the regional offices.


    Figure 1-11


    Data replication


    In summary, replication refers to a practice where a copy of the same data is
    kept on multiple different nodes, whereas partitioning refers to a practice where
    data is split into smaller subsets, and these smaller subsets are then distributed
    across different nodes.


    #### Proxy Servers


    A proxy server–based architecture allows for intermediation between clients and
    backend servers. A proxy server can receive the request from the clients and forward
    it to the backend servers (most commonly, web servers). In addition, proxy servers
    can interpret client requests and forward them to the servers after processing
    them. This processing can include applying some rules to the request, perhaps
    anonymizing the request by removing the client’s IP address. From a client’s perspective,
    using proxy servers can improve performance by caching. These servers are usually
    used in enterprise settings where corporate policies and security measures are
    applied to all web traffic going in or out of the organization. For example, if
    some websites need to be blocked, administrators can use a proxy server to do
    just that where all requests go through the proxy server, and any requests for
    blocked sites are intercepted, logged, and ignored.


    The diagram in Figure [1-12](#515270_1_En_1_Chapter.xhtml#Fig12) shows a proxy
    architecture.


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig12_HTML.jpg)


    A schematic. The client receives a request from a proxy server and sends its reply.
    The proxy server is connected to 2 other servers.


    Figure 1-12


    Proxy architecture – one proxy between servers and clients


    #### Peer to Peer


    In the peer-to-peer architecture, the nodes do not have specific client or server
    roles. They have equal roles. There is no single client or a server. Instead,
    each node can play either a client or a server role, depending on the situation.
    The fact that all nodes have an equal role resulted in the term "peer."


    Peer-to-peer architecture is shown in the diagram in Figure [1-13](#515270_1_En_1_Chapter.xhtml#Fig13).


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig13_HTML.jpg)


    A schematic of peer architecture. 4 peers are connected together via arrows labeled
    request and reply.


    Figure 1-13


    Peer-to-peer architecture


    In some scenarios, it is also possible that not all nodes have equal roles; some
    may act as servers and clients to each other. Generally, however, all nodes have
    the same role in a peer-to-peer network.


    Now that we have covered some architectural styles of distributed systems, let’s
    focus on a more theoretical side of the distributed system, which focuses on the
    abstract view of the distributed systems. First, we explore the distributed system
    model.'
  trans: '

    ### 多服务器架构


    多服务器架构是指多台服务器协同工作的架构。在一种架构风格中，客户端-服务器模型中的服务器本身可以成为另一台服务器的客户端。例如，如果我通过网页浏览器向 Web
    服务器发出请求，查询不同股票的价格，那么 Web 服务器可能会向后端数据库服务器发出请求，或者通过网络服务向其他服务器请求这些定价信息。在这种情况下，Web
    服务器本身就成了客户端。这种架构可以被视为多服务器架构。


    另一种非常常见的情景是多台服务器共同协作，为客户端提供服务，例如，多台数据库服务器为 Web 服务器提供数据。实现这种协作式架构通常有两种方法。第一种是`数据分区`，另一种是`数据复制`。与`数据分区`密切相关的另一个术语是`数据分片`。


    `数据分区`指的是一种架构，其中数据分布在分布式系统的各个节点上，每个节点负责其数据分区（部分）。数据分区有助于实现更好的性能、更简便的管理、负载均衡和更高的可用性。例如，公司每个部门的数据可以分成多个分区，并分别存储在不同的本地服务器上。另一种理解方式是，如果我们有一个包含一百万行数据的大表，我可能会将其中五十万行放在一台服务器上，另外五十万行放在另一台服务器上。这种方案被称为`数据分片`或`水平分区`，或者根据分片方式的不同，被称为`水平分片`。


    我们可以通过图 1-8 来形象地理解分区的概念。


    ![](img/515270_1_En_1_Fig8_HTML.jpg)


    数据分区示意图。所有地区的公民数据库连接到位于伦敦、布拉德福德和蒙哥马利的地区办事处。


    图 1-8


    数据分区


    请注意，图 1-8 所示的数据分区，是将一个大型中央数据库划分为与每个区域相关的较小数据集，然后由区域服务器管理该分区。然而，在另一种分区类型中，一个大表可以被分区成不同的表，但这些表仍位于同一台物理服务器上。这被称为逻辑分区。


    分片是数据的水平分区，其中每个分片（片段）驻留在单独的服务器上。这种方法的一个直接好处是实现了负载均衡，从而在各服务器之间分散负载。这个概念如图 1-9 所示。


    ![](img/515270_1_En_1_Fig9_HTML.png)


    一组共 5 个表。顶部的一个表标题为“表”。两个表标题为“垂直分片”，两个标题为“水平分片”。


    图 1-9


    分片


    `数据复制`指的是一种架构，其中分布式系统中的每个节点都保存着完全相同的数据副本。一个典型的简单例子是 RAID 0 系统；虽然它们不是独立的物理服务器，但数据会在两块磁盘之间进行复制，这就构成了数据复制（通常称为镜像）架构。在另一种场景中，数据库服务器可能会运行一个复制服务，将数据复制到多台服务器上。这种架构可以实现更好的性能、容错能力和更高的可用性。一种特定的复制类型以及分布式系统中的基本概念是状态机复制，它用于构建容错的分布式系统。我们将在第
    3 章中详细介绍。


    图 1-10 展示了多服务器架构，其中显示了客户端-服务器模型的一种变体。服务器可以作为另一台服务器的客户端。这是多台服务器紧密协作以提供服务的一种方法。


    ![](img/515270_1_En_1_Fig10_HTML.jpg)


    连接了服务器和一个客户端的示意图。底部另一个客户端发送请求并接收回复。


    图 1-10


    多台服务器协同工作（客户端-服务器与多台服务器紧密协调/紧耦合服务器）


    另一个图，图 1-11，展示了数据复制的概念。


    ![](img/515270_1_En_1_Fig11_HTML.jpg)


    数据复制示意图。总部的公民数据库连接到地区办事处的 3 个公民数据库。


    图 1-11


    数据复制


    总之，复制是指在同一数据的副本保存在多个不同节点上的做法，而分区则是指将数据分割成更小的子集，然后将这些更小的子集分布到不同节点上的做法。


    ### 代理服务器


    基于代理服务器的架构允许在客户端和后端服务器之间进行中介。代理服务器可以接收来自客户端的请求，并将其转发给后端服务器（最常见的是 Web 服务器）。此外，代理服务器可以解释客户端请求，并在处理后将其转发给服务器。这种处理可以包括对请求应用某些规则，例如通过移除客户端的
    IP 地址来匿名化请求。从客户端的角度来看，使用代理服务器可以通过缓存来提高性能。这些服务器通常用于企业环境，在这些环境中，组织进出组织的所有 Web 流量都要应用公司策略和安全措施。例如，如果需要屏蔽某些网站，管理员可以使用代理服务器来实现：所有请求都经过代理服务器，任何对被屏蔽网站的请求都会被拦截、记录并忽略。


    图 1-12 中的示意图展示了一种代理架构。


    ![](img/515270_1_En_1_Fig12_HTML.jpg)


    一个示意图。客户端从代理服务器接收请求并发送其回复。代理服务器连接到另外 2 台服务器。


    图 1-12


    代理架构 – 服务器与客户端之间的一个代理


    ### 点对点架构


    在点对点架构中，节点没有特定的客户端或服务器角色。它们具有同等的角色。没有单一的客户端或服务器。相反，每个节点可以根据情况扮演客户端或服务器的角色。所有节点都具有同等角色这一事实催生了“对等点”这个术语。


    点对点架构如图 1-13 中的示意图所示。


    ![](img/515270_1_En_1_Fig13_HTML.jpg)


    对等架构示意图。4 个对等点通过标记为“请求”和“回复”的箭头相互连接。


    图 1-13


    点对点架构


    在某些场景下，也可能并非所有节点都具有同等角色；有些节点可能同时充当服务器和客户端。但总的来说，在点对点网络中，所有节点的角色通常是相同的。


    现在我们已经介绍了一些分布式系统的架构风格，让我们将重点放在分布式系统更理论化的一面，即关注分布式系统的抽象视图。首先，我们来探讨分布式系统模型。

    '
- fmt: '### Distributed System Model


    A system model allows us to see a distributed system abstractly. It captures the
    assumptions about the behavior of the distributed system. It will enable us to
    define some properties we expect from our distributed system and then reason about
    them. All of this is at an abstract level without worrying about any technology
    or implementation details. For example, a communication link abstraction only
    captures the fact that a channel allows messages to be communicated/exchanged
    between processes without specifying what it is. From an implementation point
    of view, it could be a fiber optic cable or a wire.


    We are not concerned with the specifics of the implementation of hardware technology
    in a distributed system model. For example, a process is a node that performs
    some events, and we do not concern ourselves with worrying about the exact hardware
    or computer type.


    In this book, we are interested in the abstracted view of the system rather than
    physical infrastructure. Figure [1-14](#515270_1_En_1_Chapter.xhtml#Fig14) demonstrates
    this concept.


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig14_HTML.png)


    Two schematics. The left has interconnected components from P 1 to 11. On the
    right, P 1 to 11 form 2 linear chains, joined to a network.


    Figure 1-14


    Physical architecture (left) vs. abstract system model (right)


    Now let’s see what the three fundamental abstractions in a distributed system
    are. Failures characterize all these abstractions. We capture our assumption about
    what fault might occur in our system. For example, processes or nodes can crash
    or act maliciously in a distributed system. A network can drop messages, or messages
    can be delayed. Message delays are captured using timing assumptions.


    So, in summary, when a distributed system model is created, we make some assumptions
    about the behavior of the system. This process includes timing assumptions regarding
    processes and the network. We also make failure assumptions regarding the network
    and the processors, for example, how a process can fail and whether it can exhibit
    arbitrary failures, how an adversary can affect the processors or the network,
    and whether processes can crash or recover after a crash. Is it possible that
    the network links drop messages? In the next section, we discuss all these scenarios
    in detail.


    ### Processes


    A process or node is a fundamental element in a distributed system which runs
    the distributed algorithm to achieve that common goal for which the distributed
    system has been designed.


    Now imagine what a process can do in a distributed system. First, let’s think
    about a normal scenario. If a process is behaving according to the algorithm without
    any failures, then it is called a correct process or honest process. So, in our
    model we say that a node running correctly is one of the behaviors a node can
    exhibit. What else? Yes, of course, it can fail. If a node fails, we say it’s
    faulty; if not, then it is nonfaulty or correct or honest.


    There are different types of failures that can occur in a process, such as


    * Crash-stop

    * Omission

    * Crash with recovery

    * Eavesdropping

    * Arbitrary


    #### Crash-Stop Failure


    Crash-stop faults are where a process crashes and never recovers. This model of
    faults or node behavior captures an irreparable hardware fault, for example, short
    circuit in a motherboard causing failure.


    #### Omission Failure


    Omission failures capture the fault scenarios where a processor fails to send
    a message or receive a message. Omission failures are divided into three categories:
    send omissions, receive omissions, and general omissions. Send omissions are where
    a processor doesn’t send a message out which it was supposed to as per the distributed
    algorithm; receive omissions occur when a process does not receive an expected
    message. In practical terms, these omissions arise due to physical faults, memory
    issues, buffer overflows, malicious actions, and network congestions.


    #### Crash with Recovery


    A process exhibiting crash with recovery behavior can recover after a crash. It
    captures a scenario where a process crashes, loses its in-memory state, but recovers
    and resumes its operation later. This occurrence can be seen as an omission fault
    too, where now the node will not send or receive any messages because it has crashed.
    In practical terms, it can be a temporary intentional restart of a process or
    reboot after some operating system errors. Some examples include resumption of
    the normal operation after rebooting due to a blue screen in Windows or kernel
    panic in Linux.


    When a process crashes, it may lose its internal state (called amnesia), making
    a recovery tricky. However, we can alleviate this problem by keeping stable storage
    (a log) which can help to resume operations from the last known good state. A
    node may also lose all its state after recovery and must resynchronize with the
    rest of the network. It may also happen that a node is down for a long time and
    has desynchronized with the rest of the network (other nodes) and has its old
    view of the state. In that case, the node must resynchronize with the network.
    This situation is especially true in blockchain networks such as Bitcoin or Ethereum,
    where a node might be off the network for quite some time. When it comes back
    online, it synchronizes again with the rest of the nodes to resume its full normal
    operation.


    #### Eavesdropping


    In this model, a distributed algorithm may leak confidential information, and
    an adversary can eavesdrop to learn some information from the processes. This
    model is especially true in untrusted and geographically dispersed environments
    such as a blockchain. The usual defense against these attacks is encryption which
    provides confidentiality by encrypting the messages.


    #### Arbitrary (Byzantine)


    A Byzantine process can exhibit any arbitrary behavior. It can deviate from the
    algorithm in any possible way. It can be malicious, and it can actively try to
    sabotage the distributed algorithm, selectively omit some messages, or covertly
    try to undermine the distributed algorithm. This type of fault is the most complex
    and challenging in a distributed algorithm or system. In practical terms, it could
    be a hacker coming up with novel ways to attack the system, a virus or worm on
    the network, or some other unprecedented attack. There is no restriction on the
    behavior of a Byzantine faulty node; it can do anything.


    A relevant concept is that of the adversary model, where the adversary behavior
    is modelled. We will cover this later in the section “Adversary Model”.


    Now we look at another aspect of the distributed system model, network.


    ### Network


    In a distributed network, links (communication links) are responsible for passing
    messages, that is, take messages from nodes and send to others. Usually, the assumption
    is a bidirectional point-to-point connection between nodes.


    A network partition is a scenario where the network link becomes unavailable for
    some finite time between two groups of nodes. In practice, this could be due to
    a data center not speaking to another or an incorrect/unintentional or even intentional/malicious
    firewall rule prohibiting connections from one part of the network to another.'
