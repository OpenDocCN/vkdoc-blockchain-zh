    Ben-Or. This was the first protocol that solved the consensus problem with probabilistic
    termination under a model with a strong adversary. The Ben-Or algorithm proposed
    how to circumvent an FLP result and achieve consensus under asynchrony. There
    are two algorithms proposed in the paper. The first algorithm tolerates *t* < *n*/2
    crash failures, and the second algorithm tolerates *t* < *n*/5 for Byzantine failures.
    In other words, with *N* > 2*t* it tolerates crash faults and achieves an agreement,
    and with *N* > 5*t* the protocol tolerates Byzantine faults and reaches an agreement.
    The protocol achieves consensus under the conditions described earlier, but the
    expected running time of the protocol is exponential. In other words, it requires
    exponential running time to terminate in the worst case because it can require
    multiple rounds to terminate. It can however terminate in constant time if the
    value of *t* is very small, that is, *O*(√*n*).


    This protocol works in asynchronous rounds. A round simulates time because all
    messages are tagged with a round number, and because of this, processes can figure
    out which messages belong to which round even if they arrive asynchronously. A
    process ignores any messages for previous rounds and holds messages for future
    rounds in a buffer. Each round has two phases or subrounds. The first is the proposal
    (suggestion) phase, where each process p transmits its value v and waits until
    it receives from other *n* − *t* processes. In the second phase, called the decision
    (ratification) phase, the protocol checks if a majority is observed and takes
    that value; otherwise, it flips a coin. If a certain threshold of processes sees
    the same majority value, then the decision is finalized. In case some other value
    is detected as a majority, then the processor switches to that value. Eventually,
    the protocol manages to terminate because at some point all processes will flip
    the coin correctly and reach the majority value. You may have noticed that this
    protocol only considers binary decision values, either a 0 or 1\. Another important
    aspect to keep in mind is that the protocol cannot wait indefinitely for all processes
    to respond because they could be unavailable (offline).


    This algorithm works only for binary consensus. There are two variables that need
    to be managed in the algorithm, a value which is either 0 or 1 and phase (p),
    which represents the stage where the algorithm is currently at. The algorithm
    proceeds in rounds, and each round has two subrounds or phases.


    Note that each process has its own coin. This class of algorithms that utilize
    such coin scheme is called local coin algorithms. Local coin tossing is implemented
    using a random number generator that outputs binary numbers. Each process tosses
    its own coin and outputs 0 or 1, each with probability ½. The coin is tossed by
    a process to pick a new local value if a majority was not found.


    **The algorithm for benign faults/crash faults only – non-Byzantine:**


    ```

    Each process p executes the following algorithm:

    Process p: Initial value x = 0 or 1

    0: set r = 1

    --First subround or phase – proposal phase

    1: Broadcast  (1, r, x) to all processes including itself

    2: Wait until messages of type (1,r,*) are received from n - t processes.

    2(a): If > n /2 messages received have the same value v, then

    --second subround or phase – decision phase

    2(b): Broadcast the message (2, r, v, D) to all processes including itself.

    2(c): else broadcast the message (2, r, ?) to all processes including itself.

    3: Wait until messages of type (2, r, *) arrive from n - t processes.

    3(a): If there is 1 D type messages (2, r, v, D), then vote v i.e set x = v

    3(b): If there are > t, D type messages then decide v.

    3(c): Else set x = 0 or 1 each with probability 1/2 by     doing the coinflip

    4: Start the next round by setting r = r + 1 and go to 1.

    ```


    Here, `r` is the round number; `x` is the initial preference or value proposed
    by the process; `1` is the first subround, round, or phase of the main round;
    `2` is the second subround, round, or phase of the main round; `*` can be `0`
    or `1`; `?` represents no majority observed; `N` is the number of nodes (processes);
    `D` is an indication of approval (ratification) – in other words, it is an indication
    that the process has observed a majority of the same value – `t` is the number
    of faulty nodes; `v` is the value; and `coinflip()` is a uniform random number
    generator that generates either `0` or `1`.


    We can visualize this protocol in the diagram shown in Figure [6-8](#515270_1_En_6_Chapter.xhtml#Fig8).


    ![](images/515270_1_En_6_Chapter/515270_1_En_6_Fig8_HTML.png)


    A flowchart of an agreement protocol starts with set X equals 0 or 1 and r equals
    1 passes through broadcast, receive, and so on.


    Figure 6-8


    Ben-Or crash fault tolerant only agreement protocol – (non-Byzantine)


    If *n* > 2*t*, the protocol guarantees with probability 1 that all processes will
    eventually decide on the same value, and if all processes start with the value
    *v*, then within one round all processes will decide on *v*. Moreover, if in some
    round a process decides on *v* after receiving more than *t* D type messages,
    then all other processes will decide on *v* within the next round.


    The protocol described earlier works for crash faults; for tolerating Byzantine
    faults, slight modifications are required, which we describe next.


    **The Ben-Or algorithm for Byzantine faults:**


    ```

    Each process p executes the following algorithm:

    Process p: Initial value x = 0 or 1

    0: set r = 1

    --First subround or phase – proposal phase

    1: Broadcast  (1, r, x) to all processes including itself

    2: Wait until messages of type (1,r,*) are received from N - t processes.

    2(a): If more than (N + t)/2 messages have the same value v, then

    --second subround or phase – decision phase

    2(b): Broadcast the message (2, r, v, D) to all processes including itself.

    2(c): else Broadcast the message (2, r, ?) to all processes including itself.

    3: Wait until messages of type (2, r, *) arrive from n - t processes.

    3(a): If there are at least t + 1 D type messages (2, r, v, D), then vote v i.e
    set x = v

    3(b): If there are more than (n + t)/2 D type messages then decide v.

    3(c): Else set x to 0 or 1 each with probability 1/2 by     doing the coinflip

    4: Start the next round by setting r = r + 1 and go to 1.

    ```


    Here, `r` is the round number; `x` is the initial preference or value proposed
    by the process; `1` is the first subround, round, or phase of the main round;
    `2` is the second subround, round, or phase of the main round; `*` can be `0`
    or `1`; `?` represents no majority observed; `N` is the number of nodes (processes);
    `D` is an indication of approval (ratification) – in other words, it is an indication
    that the process has observed a majority of the same value – `t` is the number
    of faulty nodes; `v` is the value; and `coinflip()` is a uniform random number
    generator that generates either `0` or `1`.


    We can visualize this protocol in Figure [6-9](#515270_1_En_6_Chapter.xhtml#Fig9).


    ![](images/515270_1_En_6_Chapter/515270_1_En_6_Fig9_HTML.png)


    A flowchart of an agreement protocol starts with set X equals 0 or 1 and r equals
    1 passes through broadcast, receive, and so on.


    Figure 6-9


    Ben-Or Byzantine agreement protocol


    In the first subround or phase of the protocol, every process broadcasts its proposed
    preferred value and awaits *n* − *t* messages. If more than ![$$ \frac{n+t}{2}
    $$](images/515270_1_En_6_Chapter/515270_1_En_6_Chapter_TeX_IEq1.png) processes
    agree, then a majority is achieved, and the preferred value is set accordingly.'
  trans: '

    # Ben-Or 算法


    Ben-Or 协议于 1983 年提出，以其作者 Michael Ben-Or 命名。这是首个在强敌手模型下，以概率性终止方式解决共识问题的协议。Ben-Or
    算法提出了如何规避 FLP 结果并在异步环境下达成共识的方案。论文中提出了两种算法：第一种算法容忍 *t* < *n*/2 的崩溃故障，第二种算法容忍 *t*
    < *n*/5 的拜占庭故障。换言之，当 *N* > 2*t* 时，协议可容忍崩溃故障并达成一致；当 *N* > 5*t* 时，协议可容忍拜占庭故障并达成一致。该协议在先前描述的条件下能实现共识，但期望运行时间为指数级。换句话说，在最坏情况下，由于可能需要多轮迭代才能终止，其运行时间呈指数增长。然而，如果
    *t* 非常小（即 *O*(√*n*)），则可以在常数时间内终止。


    该协议以异步轮次运行。一轮模拟了时间的概念，因为所有消息都带有轮次编号，因此即使消息异步到达，进程也能判断哪些消息属于哪一轮。进程会忽略属于先前轮次的消息，并将属于未来轮次的消息暂存于缓冲区中。每一轮包含两个阶段（或子轮）。第一阶段是提议（建议）阶段，每个进程
    `p` 发送其值 `v`，并等待接收来自其他 `n` − `t` 个进程的消息。第二阶段称为决策（批准）阶段，协议检查是否观察到多数值，并采纳该值；否则，通过抛硬币决定。如果达到特定阈值的进程观察到相同的多数值，则决策被最终确定。如果检测到其他值成为多数，则进程切换为该值。最终，由于在某一时刻所有进程都会正确抛硬币并达到多数值，协议得以终止。你可能已经注意到，此协议仅考虑二元决策值，即
    0 或 1。另一个需要牢记的重要方面是，协议不能无限期等待所有进程响应，因为它们可能处于不可用（离线）状态。


    该算法仅适用于二元共识。算法中需要管理两个变量：一个值为 0 或 1 的值，以及表示算法当前所处阶段的阶段编号 (p)。算法按轮次进行，每一轮包含两个子轮或阶段。


    请注意，每个进程都有自己的硬币。利用这种硬币方案的算法类别称为本地硬币算法。本地抛硬币通过输出二进制数的随机数生成器实现。每个进程抛自己的硬币，以 ½ 的概率输出
    0 或 1。如果未找到多数值，进程会抛硬币以选择一个新的本地值。


    ## 针对良性故障/崩溃故障的算法——非拜占庭


    ```

    每个进程 p 执行以下算法：

    进程 p: 初始值 x = 0 或 1

    0: 设置 r = 1

    --第一个子轮或阶段 – 提议阶段

    1: 向所有进程（包括自身）广播 (1, r, x)

    2: 等待，直到从 n - t 个进程接收到类型为 (1,r,*) 的消息。

    2(a): 如果接收到的消息中，超过 n / 2 条具有相同值 v，则

    --第二个子轮或阶段 – 决策阶段

    2(b): 向所有进程（包括自身）广播消息 (2, r, v, D)

    2(c): 否则，向所有进程（包括自身）广播消息 (2, r, ?)

    3: 等待，直到从 n - t 个进程接收到类型为 (2, r, *) 的消息。

    3(a): 如果存在 1 条 D 类型消息 (2, r, v, D)，则投票给 v，即设置 x = v

    3(b): 如果存在超过 t 条 D 类型消息，则决定 v。

    3(c): 否则，通过抛硬币将 x 设置为 0 或 1，每个概率为 1/2

    4: 设置 r = r + 1，开始下一轮，并跳转到步骤 1。

    ```


    这里，`r` 是轮次编号；`x` 是进程提出的初始偏好值或提议值；`1` 是主轮的第一个子轮、轮次或阶段；`2` 是主轮的第二个子轮、轮次或阶段；`*` 可以是
    `0` 或 `1`；`?` 表示未观察到多数；`N` 是节点（进程）数量；`D` 表示批准（认可）——换言之，表示进程已观察到多数相同值；`t` 是故障节点数量；`v`
    是值；`coinflip()` 是一个均匀随机数生成器，生成 `0` 或 `1`。


    我们可以在图 6-8 所示的图表中直观理解此协议。


    ![](img/515270_1_En_6_Fig8_HTML.png)


    一个共识协议的流程图，从设置 X 等于 0 或 1，r 等于 1 开始，经过广播、接收等步骤。


    **图 6-8** Ben-Or 仅容崩溃故障的共识协议——（非拜占庭）


    如果 `n` > 2*t*，则协议以概率 1 保证所有进程最终会就同一个值达成一致；并且如果所有进程都以值 `v` 启动，那么在一轮之内所有进程都将决定 `v`。此外，如果在某一轮中，一个进程在接收到超过
    `t` 条 D 类型消息后决定 `v`，则所有其他进程将在下一轮中决定 `v`。


    前面描述的协议适用于崩溃故障；为了容忍拜占庭故障，需要进行一些微调，我们接下来进行描述。


    ## 针对拜占庭故障的 Ben-Or 算法


    ```

    每个进程 p 执行以下算法：

    进程 p: 初始值 x = 0 或 1

    0: 设置 r = 1

    --第一个子轮或阶段 – 提议阶段

    1: 向所有进程（包括自身）广播 (1, r, x)

    2: 等待，直到从 N - t 个进程接收到类型为 (1,r,*) 的消息。

    2(a): 如果接收到的消息中，超过 (N + t)/2 条具有相同值 v，则

    --第二个子轮或阶段 – 决策阶段

    2(b): 向所有进程（包括自身）广播消息 (2, r, v, D)

    2(c): 否则，向所有进程（包括自身）广播消息 (2, r, ?)

    3: 等待，直到从 n - t 个进程接收到类型为 (2, r, *) 的消息。

    3(a): 如果存在至少 t + 1 条 D 类型消息 (2, r, v, D)，则投票给 v，即设置 x = v

    3(b): 如果存在超过 (n + t)/2 条 D 类型消息，则决定 v。

    3(c): 否则，通过抛硬币将 x 设置为 0 或 1，每个概率为 1/2

    4: 设置 r = r + 1，开始下一轮，并跳转到步骤 1。

    ```


    这里，`r` 是轮次编号；`x` 是进程提出的初始偏好值或提议值；`1` 是主轮的第一个子轮、轮次或阶段；`2` 是主轮的第二个子轮、轮次或阶段；`*` 可以是
    `0` 或 `1`；`?` 表示未观察到多数；`N` 是节点（进程）数量；`D` 表示批准（认可）——换言之，表示进程已观察到多数相同值；`t` 是故障节点数量；`v`
    是值；`coinflip()` 是一个均匀随机数生成器，生成 `0` 或 `1`。


    我们可以在图 6-9 中直观理解此协议。


    ![](img/515270_1_En_6_Fig9_HTML.png)


    一个共识协议的流程图，从设置 X 等于 0 或 1，r 等于 1 开始，经过广播、接收等步骤。


    **图 6-9** Ben-Or 拜占庭共识协议


    在协议的第一个子轮或阶段，每个进程广播其提议的偏好值，并等待接收 `n` − `t` 条消息。如果超过 ![](img/515270_1_En_6_Chapter_TeX_IEq1.png)
    个进程达成一致，则达到多数，偏好值相应设定。

    '
- fmt: '在协议的第二子轮（或阶段）中，如果在第一子轮观察到多数，则广播多数指示（`2, r, v, D`）；否则，如果在第一子轮未观察到多数（`?`），则广播无多数。协议随后等待`n
    – t`个确认。如果观察到至少`t + 1`个关于`0`或`1`的多数确认，则相应设置首选值。此处仅设置首选值，不做出决策。若`p`收到超过`(n + t)
    / 2`个确认，则`p`做出决策，仅在此之后才确定该值。如果既未收到`t + 1`个确认，也未收到`(n + t) / 2`个确认，则掷硬币以选择一个均匀随机值`0`或`1`。


    请注意，通过等待`n – t`条消息，处理了拜占庭节点恶意决定不投票的拜占庭故障情况。这是因为在存在`t`个故障的情况下，至少有`n`个节点是诚实的。在第二子轮中，`t
    + 1`个多数值的确认意味着至少有一个诚实节点观察到了多数。在`(n + t) / 2`个确认的情况下，这意味着该值被多数节点观察到。


    因此，总结来说，如果`n > 5t`，该协议以概率`1`保证所有进程最终将就同一值达成一致；并且如果所有进程都以值`v`开始，那么在一轮内所有进程将就`v`达成一致。此外，如果在某一轮中，一个诚实节点在收到超过`(n
    + t) / 2`个`D`类型消息后决定采用`v`，那么所有其他进程将在下一轮内决定采用`v`。


    *请注意，我使用`t`来表示故障进程，这与该主题的原始论文一致。然而，在文献中，`f`也被广泛用于表示故障（拜占庭故障或崩溃故障）。因此，`t + 1`或`f
    + 1`含义相同，因为`t`和`f`表示同一事物。*


    现在问题来了：这个协议如何实现一致性、有效性和终止性？让我们尝试回答这些问题。


    一致性之所以可能，是因为在主轮的第一阶段（子轮）中，最多只有一个值可以成为多数。如果某个进程观察到了`t + 1`个`D`类型消息（形式为`(2, r, v,
    D)`的批准消息），那么每个进程都会观察到至少一个形式为`(2, r, v, D)`的批准消息。最后，如果每个进程都看到了一个形式为`(2, r, v, D)`的批准消息，那么每个进程都会在`r
    + 1`轮的第一子轮（阶段）中投票给值`v`（接受值`v`），并在第二子轮（阶段）中决定采用`v`，除非它已经做出了决定。


    有效性之所以可能，是因为如果所有进程在一轮中都投票给（接受）它们的共同值`v`，那么所有进程都会广播`(2, r, v, D)`并在该轮的第二子轮中做出决定。此外，请注意在一轮的第一子轮中，只有一个进程的首选值被广播。


    Ben-Or 协议最终会终止，是因为最终大多数无故障进程会通过掷硬币来获得相同的随机值。这个多数值随后被诚实进程观察到，它们进而传播带有该多数值的`D`类型消息（批准消息）。最终，诚实进程将收到`D`类型消息（批准消息），协议将终止。


    另外，请注意需要两个子轮的原因是：在第一阶段，首选值的提议数量被减少到最多一个；然后在第二子轮中，简单的多数投票就足以做出决定。可以设计只有一轮的共识算法，但这要求最小进程数为`3f
    + 1`。而在异步环境下采用两轮，则满足了`2f + 1`的下限。


    前面描述的 Ben-Or 算法不使用任何密码学原语，并且假设存在强大的对手。然而，也有大量工作研究在可用密码学原语下的异步拜占庭共识。当然，在此模型下，假设对手始终是计算能力受限的。前面描述了一些在该模型下的著名早期协议，例如针对已认证拜占庭故障模型的签名消息协议和
    DLS 协议。还有其他算法协同处理硬币抛掷，或者换句话说，使用全局或共享硬币抛掷机制。共享硬币或全局硬币是一种伪随机硬币，它能在同一轮中为所有进程产生相同的结果。这一属性立即意味着在基于共享硬币的机制中，收敛速度要快得多。类似的技术首次在
    Rabin 的算法中使用，该算法利用密码学技术将预期时间减少到了常数轮次。


    在对早期共识协议进行了基本介绍之后，我现在将介绍早期的复制协议，这些协议当然从根本上基于共识，但可以被归类为复制协议而非单纯的共识算法。


    我们在前面的第 [3] 章中看到，复制允许多个副本在分布式系统中实现一致性。它是一种在分布式系统中提供高可用性的方法。有不同的模型，包括主备复制和主动复制。你可以参考第
    [3] 章来阅读更多关于状态机复制和其他技术的内容。'
  raw: 'In the second subround or phase of the protocol, if a majority is observed
    in the first subround, then an indication of majority is broadcast (2, *r*, *v*,
    *D*); otherwise, if no majority (?) was observed in the first subround, then no
    majority is broadcast. The protocol then waits for *n* – *t* confirmations. If
    at least *t* + 1 confirmations of a majority of either 0 or 1 are observed, then
    the preferred value is set accordingly. Here, only the preferred value is set,
    but no decision is made. A decision is made by p if more than ![$$ \frac{n+t}{2}
    $$](images/515270_1_En_6_Chapter/515270_1_En_6_Chapter_TeX_IEq2.png) confirmations
    are received, only then the value is decided. If neither *t* + 1 confirmations
    nor ![$$ \frac{n+t}{2} $$](images/515270_1_En_6_Chapter/515270_1_En_6_Chapter_TeX_IEq3.png)
    confirmations are received, then the coin is flipped to choose a uniform random
    value, either 0 or 1.


    Note that, by waiting for *n* – *t* messages, the Byzantine fault case where Byzantine
    processes maliciously decide not to vote is handled. This is because in the presence
    of t faults, at least n is honest. In the second subround, *t* + 1 confirmations
    of a majority value mean that at least one honest process has observed a majority.
    In the case of ![$$ \frac{n+t}{2} $$](images/515270_1_En_6_Chapter/515270_1_En_6_Chapter_TeX_IEq4.png),
    it means a value has been observed by a majority.


    So, in summary, if *n* > 5*t*, this protocol guarantees with probability 1 that
    all processes will eventually decide on the same value, and if all processes start
    with the value v, then within one round all processes will decide on *v*. Moreover,
    if in some round an honest process decides on v after receiving more than ![$$
    \frac{\left(n+t\right)}{2} $$](images/515270_1_En_6_Chapter/515270_1_En_6_Chapter_TeX_IEq5.png)
    D type messages, then all other processes will decide on v within the next round.


    *Note that I have used t to denote faulty processes, which is in line with the
    original paper on the subject. However, in literature f is also widely used to
    denote faults, either Byzantine or crash. So, t + 1 or f + 1 means the same thing,
    as t and f denote the same thing.*


    Now the question arises as to how this protocol achieves an agreement, validity,
    and termination. Let’s try to answer these questions.


    An agreement is possible because at most one value can be in a majority in the
    first phase (subround) of the main round. If some process observes the *t* + 1
    D type message (ratification message of the form (2, r, v, D)), then every process
    observes at least one ratification message of the form (2, r, v, D). Finally,
    if every process sees a ratification message of the form (2, r, v, D), then every
    process votes for value v (accepts value v) in the first subround (phase) of r
    + 1 and decides on v in the second subround (phase) unless it has decided already.


    Validity is possible because if all processes vote for (accept) their common value
    v in a round, then all processes broadcast (2, r, v, D) and decide in the second
    subround of the round. Also, note that the preferred value of only one of the
    processes is broadcast in the first subround of the round.


    The reason why Ben-Or terminates is because eventually the majority of the nonfaulty
    processes will flip a coin to achieve the same random value. This majority value
    is then observed by the honest processes, which then propagate the D type message
    (ratification message) with the majority value. Eventually, honest processes will
    receive the D type message (ratification message), and the protocol will terminate.


    Also, note that the reason why two subrounds are required is because in the first
    phase the number of preferred value proposals is reduced to at most one, and then
    in the second subround, a simple majority vote is sufficient to make the decision.
    It is possible to design a consensus algorithm with only one round, but that will
    require a minimum number of processes to be 3*f* + 1\. With two rounds under asynchrony,
    the 2*f* + 1 lower bound is met.


    The Ben-Or algorithms described earlier do not use any cryptographic primitives
    and assume strong adversary. However, a lot of work has also been carried out
    where an asynchronous Byzantine agreement is studied under the availability of
    cryptographic primitives. Of course, under this model the adversary is assumed
    to be always computationally bounded. Some prominent early protocols under this
    model are described earlier, such as the signed message protocol and the DLS protocol
    for the authenticated Byzantine failure model. There are other algorithms that
    process coin tosses cooperatively or, in other words, use global or shared coin
    tossing mechanisms. A shared coin or global coin is a pseudorandom coin that produces
    the same result at all processes in the same round. This attribute immediately
    implies that convergence is much faster in the case of shared coin–based mechanisms.
    A similar technique was first used in Rabin’s algorithm [14] utilizing cryptographic
    techniques which reduced the expected time to the constant number of rounds.


    After this basic introduction to early consensus protocols, I’ll now introduce
    early replication protocols, which of course are fundamentally based on consensus,
    but can be classified as replication protocols rather than just consensus algorithms.


    We saw earlier, in Chapter [3](#515270_1_En_3_Chapter.xhtml), that replication
    allows multiple replicas to achieve consistency in a distributed system. It is
    a method to provide high availability in a distributed system. There are different
    models including primary backup replication and active replication. You can refer
    to Chapter [3](#515270_1_En_3_Chapter.xhtml) to read more about state machine
    replication and other techniques.'
  trans: '

    在协议的第二子轮（或阶段）中，如果在第一子轮观察到多数，则广播多数指示（`2, r, v, D`）；否则，如果在第一子轮未观察到多数（`?`），则广播无多数。协议随后等待`n
    – t`个确认。如果观察到至少`t + 1`个关于`0`或`1`的多数确认，则相应设置首选值。此处仅设置首选值，不做出决策。若`p`收到超过`(n + t)
    / 2`个确认，则`p`做出决策，仅在此之后才确定该值。如果既未收到`t + 1`个确认，也未收到`(n + t) / 2`个确认，则掷硬币以选择一个均匀随机值`0`或`1`。


    请注意，通过等待`n – t`条消息，处理了拜占庭节点恶意决定不投票的拜占庭故障情况。这是因为在存在`t`个故障的情况下，至少有`n`个节点是诚实的。在第二子轮中，`t
    + 1`个多数值的确认意味着至少有一个诚实节点观察到了多数。在`(n + t) / 2`个确认的情况下，这意味着该值被多数节点观察到。


    因此，总结来说，如果`n > 5t`，该协议以概率`1`保证所有进程最终将就同一值达成一致；并且如果所有进程都以值`v`开始，那么在一轮内所有进程将就`v`达成一致。此外，如果在某一轮中，一个诚实节点在收到超过`(n
    + t) / 2`个`D`类型消息后决定采用`v`，那么所有其他进程将在下一轮内决定采用`v`。


    *请注意，我使用`t`来表示故障进程，这与该主题的原始论文一致。然而，在文献中，`f`也被广泛用于表示故障（拜占庭故障或崩溃故障）。因此，`t + 1`或`f
    + 1`含义相同，因为`t`和`f`表示同一事物。*


    现在问题来了：这个协议如何实现一致性、有效性和终止性？让我们尝试回答这些问题。


    一致性之所以可能，是因为在主轮的第一阶段（子轮）中，最多只有一个值可以成为多数。如果某个进程观察到了`t + 1`个`D`类型消息（形式为`(2, r, v,
    D)`的批准消息），那么每个进程都会观察到至少一个形式为`(2, r, v, D)`的批准消息。最后，如果每个进程都看到了一个形式为`(2, r, v, D)`的批准消息，那么每个进程都会在`r
    + 1`轮的第一子轮（阶段）中投票给值`v`（接受值`v`），并在第二子轮（阶段）中决定采用`v`，除非它已经做出了决定。


    有效性之所以可能，是因为如果所有进程在一轮中都投票给（接受）它们的共同值`v`，那么所有进程都会广播`(2, r, v, D)`并在该轮的第二子轮中做出决定。此外，请注意在一轮的第一子轮中，只有一个进程的首选值被广播。


    Ben-Or 协议最终会终止，是因为最终大多数无故障进程会通过掷硬币来获得相同的随机值。这个多数值随后被诚实进程观察到，它们进而传播带有该多数值的`D`类型消息（批准消息）。最终，诚实进程将收到`D`类型消息（批准消息），协议将终止。


    另外，请注意需要两个子轮的原因是：在第一阶段，首选值的提议数量被减少到最多一个；然后在第二子轮中，简单的多数投票就足以做出决定。可以设计只有一轮的共识算法，但这要求最小进程数为`3f
    + 1`。而在异步环境下采用两轮，则满足了`2f + 1`的下限。


    前面描述的 Ben-Or 算法不使用任何密码学原语，并且假设存在强大的对手。然而，也有大量工作研究在可用密码学原语下的异步拜占庭共识。当然，在此模型下，假设对手始终是计算能力受限的。前面描述了一些在该模型下的著名早期协议，例如针对已认证拜占庭故障模型的签名消息协议和
    DLS 协议。还有其他算法协同处理硬币抛掷，或者换句话说，使用全局或共享硬币抛掷机制。共享硬币或全局硬币是一种伪随机硬币，它能在同一轮中为所有进程产生相同的结果。这一属性立即意味着在基于共享硬币的机制中，收敛速度要快得多。类似的技术首次在
    Rabin 的算法中使用，该算法利用密码学技术将预期时间减少到了常数轮次。


    在对早期共识协议进行了基本介绍之后，我现在将介绍早期的复制协议，这些协议当然从根本上基于共识，但可以被归类为复制协议而非单纯的共识算法。


    我们在前面的第 [3] 章中看到，复制允许多个副本在分布式系统中实现一致性。它是一种在分布式系统中提供高可用性的方法。有不同的模型，包括主备复制和主动复制。你可以参考第
    [3] 章来阅读更多关于状态机复制和其他技术的内容。

