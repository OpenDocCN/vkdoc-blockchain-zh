- fmt: "# FLP Impossibility\n\nThe FLP impossibility result states that it is impossible\
    \ to solve consensus deterministically in a message-passing asynchronous system\
    \ in which at most one process may fail by crashing. In other words, in a system\
    \ comprising `n` nodes with unbounded delays there is no algorithm that can solve\
    \ consensus. Either there will be executions in which no agreement is achieved\
    \ or there will be an execution which does not terminate (infinite execution).\n\
    \nThe key issue on which the FLP impossibility result is based is that in an asynchronous\
    \ system, it is impossible to differentiate between a crashed process and a process\
    \ that is simply slow or has sent a message on a slow link, and it's just taking\
    \ time to reach the recipient.\n\nFLP is one of the most fundamental unsolvability\
    \ results in distributed computing. FLP is named after the authors MICHAEL J.\
    \ FISCHER, NANCY A. LYNCH AND MICHAEL S. PATERSON who reported this result in\
    \ 1982 in their paper \"Impossibility of Distributed Consensus with One Faulty\
    \ Process.\"\n\nA configuration of global state `C` is **univalent** if all executions\
    \ starting from `C` output the same value, that is, there is only one possible\
    \ output. The configuration is **0-valent** if it results in deciding `0` and\
    \ **1-valent** if it results in deciding `1`. A configuration of global state\
    \ `C` is **bivalent** if there are two executions starting from `C` that output\
    \ different values.\n\nWe can visualize this in Figure [3-14](#515270_1_En_3_Chapter.xhtml#Fig14).\n\
    \n![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig14_HTML.png)\n\nA schematic\
    \ of the univalent and bivalent configurations. The `C` on the left divides into\
    \ `0` and `1`. The `C` on the right divides into `V` and `V`.\n\n**Figure 3-14**\
    \  \nUnivalent and bivalent configuration\n\nThe key idea behind FLP is that a\
    \ bivalent configuration can always transition to some bivalent configuration.\
    \ As there is an initial bivalent configuration, it follows that there is a nonterminating\
    \ execution, leading to only bivalent configurations.\n\nWe can understand this\
    \ through a scenario. Suppose you have two different sets of nodes, say set `A`\
    \ and set `B`, each with five nodes. In a five-node network with no failures,\
    \ the majority (i.e., three out of five) in each set will lead to the consensus.\
    \ Suppose that in set `A` the five nodes have a proposed value of `1` {`11111`},\
    \ then we know that in an honest environment the decision will be value `1` by\
    \ all nodes. Similarly in set `B`, if the initial value is `0` at all nodes {`00000`},\
    \ then all nodes will agree to the value `0` in a fault-free environment. We can\
    \ say the configuration, that is, global state, is **1-valent** and **0-valent**\
    \ in set `A` and set `B`, respectively. However, now imagine a situation where\
    \ not all nodes are `0` or `1`, but some are `0` and some have a value of `1`.\
    \ Imagine in set `A`, three nodes are `1`, and two have a value of `0`, that is,\
    \ {`11100`}. Similarly in set `B`, two nodes are `1` and three nodes are holding\
    \ value `0`, that is, {`11000`}. Note that these sets now only have one difference\
    \ of a single node with value `1` in set `A` and value `0` in set `B`, that is,\
    \ the middle node (third element) in the set. Consensus of `1` is reached in set\
    \ `A` due to three out of five majority, whereas consensus `0` is reached in set\
    \ `B` due to three out of five majority. Let's call these two sets, configurations\
    \ or global states. So now we have two configurations, one reaching consensus\
    \ of `1` and the other `0`. So far so good, but imagine now that one node fails,\
    \ and it is that middle node which is the only difference between these two sets.\n\
    \nIf the middle node is failed from both sets `A` and `B`, they become {`1100`}\
    \ each, which means that both sets are now indistinguishable from each other implying\
    \ that they both can reach the same consensus of either `0` or `1` depending on\
    \ the availability of the third element (middle node). This also means that one\
    \ of these sets can reach both consensus decisions, `0` or `1`, depending on the\
    \ availability of node `3`.\n\nNow imagine that the default value of all nodes\
    \ is `0`, and now with a failed (removed) node, set `A` {`11100`} will end up\
    \ reaching consensus of `0` if the middle node is failed, and it will have consensus\
    \ of `1` if no node fails. This is an ambiguous situation, called a **bivalent\
    \ configuration** where consensus `0` is reached if the middle node holding value\
    \ `1` is unavailable but will reach consensus of `1` if no node fails. The situation\
    \ is now that sets (nodes) can reach consensus of either `0` or `1` and the outcome\
    \ is unpredictable.\n\nIt is proven that this ambiguous situation of bivalent\
    \ initial configuration can always exist in case of even a single failure, and\
    \ secondly it can always lead to another ambiguous situation. In other words,\
    \ an initial bivalent configuration can always transition to another bivalent\
    \ configuration, hence the impossibility of consensus as no convergence on a univalent\
    \ (either **0-valent** or **1-valent**) is possible.\n\nThere are two observations\
    \ which lead to FLP impossibility results. First, there always exists at least\
    \ one bivalent initial configuration in any consensus algorithm working in the\
    \ presence of faults. Second, a bivalent configuration can always transition to\
    \ another bivalent configuration.\n\nThe FLP result concludes that in asynchronous\
    \ systems, first there is a global state (configuration) where the algorithm cannot\
    \ decide, and there always will be a scenario where the system is inconclusive.\
    \ In other words, there is always an admissible run which always remains in an\
    \ indecisive state under asynchrony.\n\nState machine replication under asynchrony\
    \ is also prone to FLP impossibility limitation. Blockchain networks are also\
    \ subject to FLP impossibility results. Bitcoin, Ethereum, and other blockchain\
    \ networks would have not been possible to build if FLP impossibility wasn't circumvented\
    \ by introducing some level of synchrony.\n\nMany efforts have been proposed to\
    \ somehow circumvent the FLP impossibility. This circumvention revolves around\
    \ the use of oracles. The idea is to make an oracle available to the distributed\
    \ system to help solve a problem. An **oracle** can be defined as a service or\
    \ a black box that processes (nodes) can query to get some information to help\
    \ them decide a course of action. In the following, we introduce some common oracles\
    \ that provide enough information to distributed algorithms to solve a problem,\
    \ which might be unsolvable otherwise. We can use oracles to facilitate solving\
    \ consensus problems in distributed systems.\n\nThe key ideas behind the circumvention\
    \ of FLP impossibility are based around sacrificing asynchrony and determinism.\
    \ Of course, as we have learned, deterministic consensus is not possible under\
    \ asynchrony even if one process crash-fails; therefore, the trick is to slightly\
    \ sacrifice either asynchrony or determinism, just enough to get to a point to\
    \ reach a decision and terminate.\n\nNow we discuss some techniques:\n\n- Random\
    \ oracles\n- Failure detectors\n- Synchrony assumptions\n- Hybrid models\n\n###\
    \ Synchrony Assumptions\n\nUnder the synchrony assumption, assumptions about timing\
    \ are introduced in the model. Remember, we discussed partial synchrony earlier\
    \ in this chapter and the first chapter. Partial synchrony is a technique that\
    \ allows solving consensus by circumventing FLP impossibility. Under the partial\
    \ synchrony model, asynchrony is somewhat forfeited to introduce some timing assumptions\
    \ that allow for solving the consensus problem. Similarly, under the eventual\
    \ synchrony model, assumptions are made that the system is eventually synchronous\
    \ after an unknown time called global stabilization time (GST). Another timing\
    \ assumption is the weak synchrony which assumes that the delays remain under\
    \ a certain threshold and do not grow forever. Such timing assumptions allow a\
    \ consensus algorithm to decide and terminate by assuming some notion of time\
    \ (synchrony)."
  raw: '#### FLP Impossibility


    The FLP impossibility result states that it is impossible to solve consensus deterministically
    in a message-passing asynchronous system in which at most one process may fail
    by crashing. In other words, in a system comprising n nodes with unbounded delays
    there is no algorithm that can solve consensus. Either there will be executions
    in which no agreement is achieved or there will be an execution which does not
    terminate (infinite execution).


    The key issue on which the FLP impossibility result is based is that in an asynchronous
    system, it is impossible to differentiate between a crashed process and a process
    that is simply slow or has sent a message on a slow link, and it’s just taking
    time to reach the recipient.


    FLP is one of the most fundamental unsolvability results in distributed computing.
    FLP is named after the authors MICHAEL J. FISCHER, NANCY A. LYNCH AND MICHAEL
    S. PATERSON who reported this result in 1982 in their paper “Impossibility of
    Distributed Consensus with One Faulty Process.”


    A configuration of global state C is univalent if all executions starting from
    C output the same value, that is, there is only one possible output. The configuration
    is 0-valent if it results in deciding 0 and 1-valent if it results in deciding
    1\. A configuration of global state C is bivalent if there are two executions
    starting from C that output different values.


    We can visualize this in Figure [3-14](#515270_1_En_3_Chapter.xhtml#Fig14).


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig14_HTML.png)


    A schematic of the univalent and bivalent configurations. The C on the left divides
    into 0 and 1\. The C on the right divides into V and V.


    Figure 3-14


    Univalent and bivalent configuration


    The key idea behind FLP is that a bivalent configuration can always transition
    to some bivalent configuration. As there is an initial bivalent configuration,
    it follows that there is a nonterminating execution, leading to only bivalent
    configurations.


    We can understand this through a scenario. Suppose you have two different sets
    of nodes, say set A and set B, each with five nodes. In a five-node network with
    no failures, the majority (i.e., three out of five) in each set will lead to the
    consensus. Suppose that in set A the five nodes have a proposed value of 1 {11111},
    then we know that in an honest environment the decision will be value 1 by all
    nodes. Similarly in set B, if the initial value is 0 at all nodes {00000}, then
    all nodes will agree to the value 0 in a fault-free environment. We can say the
    configuration, that is, global state, is 1-valent and 0-valent in set A and set
    B, respectively. However, now imagine a situation where not all nodes are 0 or
    1, but some are 0 and some have a value of 1\. Imagine in set A, three nodes are
    1, and two have a value of 0, that is, {11100}. Similarly in set B, two nodes
    are 1 and three nodes are holding value 0, that is, {11000}. Note that these sets
    now only have one difference of a single node with value 1 in set A and value
    0 in set B, that is, the middle node (third element) in the set. Consensus of
    1 is reached in set A due to three out of five majority, whereas consensus 0 is
    reached in set B due to three out of five majority. Let’s call these two sets,
    configurations or global states. So now we have two configurations, one reaching
    consensus of 1 and the other 0\. So far so good, but imagine now that one node
    fails, and it is that middle node which is the only difference between these two
    sets.


    If the middle node is failed from both sets A and B, they become {1100} each,
    which means that both sets are now indistinguishable from each other implying
    that they both can reach the same consensus of either 0 or 1 depending on the
    availability of the third element (middle node). This also means that one of these
    sets can reach both consensus decisions, 0 or 1, depending on the availability
    of node 3.


    Now imagine that the default value of all nodes is 0, and now with a failed (removed)
    node, set A {11100} will end up reaching consensus of 0 if the middle node is
    failed, and it will have consensus of 1 if no node fails. This is an ambiguous
    situation, called a bivalent configuration where consensus 0 is reached if the
    middle node holding value 1 is unavailable but will reach consensus of 1 if no
    node fails. The situation is now that sets (nodes) can reach consensus of either
    0 or 1 and the outcome is unpredictable.


    It is proven that this ambiguous situation of bivalent initial configuration can
    always exist in case of even a single failure, and secondly it can always lead
    to another ambiguous situation. In other words, an initial bivalent configuration
    can always transition to another bivalent configuration, hence the impossibility
    of consensus as no convergence on a univalent (either 0-valent or 1-valent) is
    possible.


    There are two observations which lead to FLP impossibility results. First, there
    always exists at least one bivalent initial configuration in any consensus algorithm
    working in the presence of faults. Second, a bivalent configuration can always
    transition to another bivalent configuration.


    The FLP result concludes that in asynchronous systems, first there is a global
    state (configuration) where the algorithm cannot decide, and there always will
    be a scenario where the system is inconclusive. In other words, there is always
    an admissible run which always remains in an indecisive state under asynchrony.


    State machine replication under asynchrony is also prone to FLP impossibility
    limitation. Blockchain networks are also subject to FLP impossibility results.
    Bitcoin, Ethereum, and other blockchain networks would have not been possible
    to build if FLP impossibility wasn’t circumvented by introducing some level of
    synchrony.


    Many efforts have been proposed to somehow circumvent the FLP impossibility. This
    circumvention revolves around the use of oracles. The idea is to make an oracle
    available to the distributed system to help solve a problem. An **oracle** can
    be defined as a service or a black box that processes (nodes) can query to get
    some information to help them decide a course of action. In the following, we
    introduce some common oracles that provide enough information to distributed algorithms
    to solve a problem, which might be unsolvable otherwise. We can use oracles to
    facilitate solving consensus problems in distributed systems.


    The key ideas behind the circumvention of FLP impossibility are based around sacrificing
    asynchrony and determinism. Of course, as we have learned, deterministic consensus
    is not possible under asynchrony even if one process crash-fails; therefore, the
    trick is to slightly sacrifice either asynchrony or determinism, just enough to
    get to a point to reach a decision and terminate.


    Now we discuss some techniques:


    *   Random oracles


    *   Failure detectors


    *   Synchrony assumptions


    *   Hybrid models


    ##### Synchrony Assumptions


    Under the synchrony assumption, assumptions about timing are introduced in the
    model. Remember, we discussed partial synchrony earlier in this chapter and the
    first chapter. Partial synchrony is a technique that allows solving consensus
    by circumventing FLP impossibility. Under the partial synchrony model, asynchrony
    is somewhat forfeited to introduce some timing assumptions that allow for solving
    the consensus problem. Similarly, under the eventual synchrony model, assumptions
    are made that the system is eventually synchronous after an unknown time called
    global stabilization time (GST). Another timing assumption is the weak synchrony
    which assumes that the delays remain under a certain threshold and do not grow
    forever. Such timing assumptions allow a consensus algorithm to decide and terminate
    by assuming some notion of time (synchrony).'
  trans: '# FLP 不可能性


    FLP 不可能性结果表明，在最多一个进程可能因崩溃而失败的消息传递异步系统中，无法确定性地解决共识问题。换句话说，在一个由 `n` 个节点组成且存在无限延迟的系统中，没有任何算法能够解决共识问题。要么存在无法达成一致的执行过程，要么存在不会终止（无限执行）的执行过程。


    FLP 不可能性结果所依据的关键问题在于，在异步系统中，无法区分崩溃的进程和仅仅运行缓慢或通过慢速链接发送消息、需要时间才能到达接收方的进程。


    FLP 是分布式计算中最基本的不可解性结果之一。FLP 以其作者 MICHAEL J. FISCHER、NANCY A. LYNCH 和 MICHAEL S.
    PATERSON 的名字命名，他们于 1982 年在论文《单故障进程下分布式共识的不可能性》中报告了这一结果。


    全局状态 `C` 的配置是**单值的**，如果从 `C` 开始的所有执行都输出相同的值，也就是说，只有一种可能的输出。如果配置导致决定 `0`，则为 **0-单值的**；如果导致决定
    `1`，则为 **1-单值的**。全局状态 `C` 的配置是**双值的**，如果存在两个从 `C` 开始的执行输出不同的值。


    我们可以在图 3-14 中直观地看到这一点。


    ![](img/515270_1_En_3_Fig14_HTML.png)


    单值和双值配置示意图。左侧的 `C` 分成 `0` 和 `1`。右侧的 `C` 分成 `V` 和 `V`。


    **图 3-14**

    单值和双值配置


    FLP 背后的关键思想是，双值配置总是可以过渡到某个双值配置。由于存在一个初始双值配置，因此存在一个永不终止的执行过程，只会导致双值配置。


    我们可以通过一个场景来理解这一点。假设你有两个不同的节点集合，例如集合 `A` 和集合 `B`，每个集合都有五个节点。在一个无故障的五节点网络中，每个集合中的多数（即五分之三）将达成共识。假设在集合
    `A` 中，五个节点的提议值都是 `1` {`11111`}，那么我们知道在诚实环境中，所有节点都将决定值为 `1`。类似地，在集合 `B` 中，如果所有节点的初始值都是
    `0` {`00000`}，那么在无故障环境中，所有节点都将同意值为 `0`。我们可以说，集合 `A` 和集合 `B` 的配置（即全局状态）分别是 **1-单值的**
    和 **0-单值的**。然而，现在设想一个情况，并非所有节点都是 `0` 或 `1`，而是有些是 `0`，有些是 `1`。想象在集合 `A` 中，三个节点是
    `1`，两个节点是 `0`，即 {`11100`}。类似地，在集合 `B` 中，两个节点是 `1`，三个节点是 `0`，即 {`11000`}。请注意，这些集合现在只有一个节点的差异，即集合
    `A` 中值为 `1` 而集合 `B` 中值为 `0` 的那个节点，也就是集合中的中间节点（第三个元素）。在集合 `A` 中，由于五分之三的多数，达成共识
    `1`；而在集合 `B` 中，由于五分之三的多数，达成共识 `0`。让我们称这两个集合为配置或全局状态。现在我们有两个配置：一个达成共识 `1`，另一个达成共识
    `0`。到目前为止还好，但想象现在有一个节点失败了，正是那个成为这两个集合唯一差异的中间节点。


    如果中间节点从集合 `A` 和 `B` 中都失败了，它们各自变成 {`1100`}，这意味着这两个集合现在彼此无法区分，表明它们都可以根据第三个元素（中间节点）的可用性达成相同的共识
    `0` 或 `1`。这也意味着，根据节点 `3` 的可用性，这些集合之一可以达成 `0` 或 `1` 两个共识决定。


    现在想象所有节点的默认值都是 `0`，那么对于一个失败的（被移除的）节点，集合 `A` {`11100`} 如果中间节点失败，最终将达成共识 `0`；如果没有节点失败，则将达成共识
    `1`。这是一个矛盾的情况，称为**双值配置**，即如果持有值 `1` 的中间节点不可用，则达成共识 `0`；但如果没有节点失败，则将达成共识 `1`。现在的情况是，集合（节点）可以达成共识
    `0` 或 `1`，结果不可预测。


    已经证明，即使只有一个故障，这种双值初始配置的矛盾情况也总是可能存在；其次，它总是可以导致另一种矛盾情况。换句话说，初始双值配置总是可以过渡到另一个双值配置，因此共识是不可能的，因为无法收敛到单值（**0-单值的**
    或 **1-单值的**）。


    由此得出 FLP 不可能性结果的两个观察结论。首先，在任何存在故障的共识算法中，总是至少存在一个双值初始配置。其次，双值配置总是可以过渡到另一个双值配置。


    FLP 结果得出结论：在异步系统中，首先存在一个算法无法决定的全局状态（配置），并且总是会出现系统无法得出结论的场景。换句话说，在异步条件下，总存在一个可接受的运行过程，该过程始终保持在不确定状态。


    异步条件下的状态机复制也容易受到 FLP 不可能性限制的影响。区块链网络同样受制于 FLP 不可能性结果。如果没有通过引入一定程度的同步性来规避 FLP 不可能性，比特币、以太坊和其他区块链网络将无法构建。


    人们提出了许多努力来以某种方式规避 FLP 不可能性。这种规避围绕着预言机的使用。其思想是向分布式系统提供一个预言机来帮助解决问题。**预言机**可以定义为一种服务或黑盒，进程（节点）可以查询它以获取某些信息，从而帮助它们决定行动方案。接下来，我们介绍一些常见的预言机，它们为分布式算法提供足够的信息来解决那些本来可能无法解决的问题。我们可以使用预言机来促进解决分布式系统中的共识问题。


    规避 FLP 不可能性的关键思想围绕着牺牲异步性和确定性展开。当然，正如我们所了解的，在异步条件下，即使只有一个进程崩溃故障，确定性共识也是不可能的；因此，诀窍是稍微牺牲异步性或确定性，恰好足以达成决定并终止。


    现在我们讨论一些技术：


    - 随机预言机

    - 故障检测器

    - 同步性假设

    - 混合模型


    ### 同步性假设


    在同步性假设下，模型引入了关于时间的假设。请记住，我们在本章和第一章前面讨论过部分同步性。部分同步性是一种通过规避 FLP 不可能性来解决共识问题的技术。在部分同步性模型下，异步性在一定程度上被放弃，以引入一些允许解决共识问题的时间假设。类似地，在最终同步性模型下，假设系统在称为全局稳定时间（GST）的未知时间之后最终同步。另一种时间假设是弱同步性，它假设延迟保持在某个阈值以下，并且不会无限增长。通过假定某种时间概念（同步性），这样的时间假设允许共识算法做出决定并终止。'
- fmt: '### Random Oracles


    Random oracles allow for the development of randomized algorithms. This is where
    determinism is somewhat sacrificed in favor of reaching an agreement probabilistically.
    The advantage of this approach is that there are no assumptions made about timing,
    but the downside is that randomized algorithms are not very efficient. In randomized
    consensus algorithms, one of the safety or liveness properties is changed to a
    nondeterministic probabilistic version. For example, the liveness property becomes:


    - **Liveness**: Each correct process eventually decides with high probability.


    This addresses FLP impossibility in the sense that FLP impossibility means in
    practice that there are executions in the consensus that do not terminate. If
    the termination is made probabilistic, it can “circumvent” the impossibility of
    consensus:


    - **Agreement**: All correct processes eventually agree on a value with probability
    1.


    Usually, however, the liveness property is made probabilistic instead of safety
    properties of agreement, validity, and integrity. Sacrificing a safety property
    in favor of a liveness (termination) property is usually not advisable.


    The core technique in randomized algorithms is something known as “coin flip.”
    Coin tossing or coin flips can be divided into two types.


    A local coin is where the state of the processor advances from the current state
    to the next, which is chosen as per the probability distribution of the algorithm.
    This is usually implemented as a random bit generator, which returns zero or one
    (head or tail) with equal probability.


    Shared coin or global coin algorithms make use of these local coins to build a
    global coin. The requirement here is to provide the same coin value to all honest
    processes and achieve an agreement.


    Local coin algorithms terminate in an exponential number of communication steps,
    whereas shared coin algorithms terminate in a constant number of steps.


    There are pros and cons of sacrificing determinism and employing randomization.
    One of the key advantages is that there are no timing assumptions required. However,
    the downside is that the number of rounds is considerably higher, and cryptography
    required to introduce randomization could be computationally expensive.


    Randomized algorithms for Byzantine consensus first appeared in Ben-Or and Rabin’s
    work in 1983, which we will discuss along with some others in Chapter [6](#515270_1_En_6_Chapter.xhtml).


    ### Hybrid Models


    In a hybrid model approach to circumvent FLP impossibility, a combination of randomization
    and failure detectors is used.


    Wormholes are extensions in a system model with stronger properties as compared
    to other parts of the system. Usually, it is a secure, tamper-proof, and fail-silent
    trusted hardware which provides a way for processes to correctly execute some
    crucial steps of the protocol. Various wormholes have been introduced in the literature
    such as attested append-only memory, which forces replicas to commit to a verifiable
    sequence of operations. The trusted timely computing base (TTCB) was the first
    wormhole introduced for consensus supported by wormholes.'
