  trans: '

    ### 领导者选举


    心跳机制被用于触发领导者选举过程。所有节点在启动时均为跟随者。只要跟随者能持续收到来自领导者或候选者的有效 RPC，它们就会保持跟随者状态。如果跟随者在某段时间内未收到领导者的心跳，就会发生"选举超时"，表明领导者已失效。选举超时时间随机设定在
    150 毫秒至 300 毫秒之间。


    此时，该跟随者节点承担候选者角色，并通过启动选举流程来尝试成为领导者。候选者会递增当前任期号、为自己投票、重置选举计时器，并通过`RequestVote`
    RPC 向其他节点寻求选票。如果它获得多数节点的投票，则成为领导者，并开始向其他节点（此时均为跟随者）发送心跳。如果其他候选者已获胜并成为有效领导者，则该候选者将开始接收心跳，并恢复为跟随者角色。如果无人赢得选举且选举超时发生，则将在新任期重新启动选举流程。


    请注意，仅当候选者的日志至少与接收节点的日志一样新时，接收节点才会根据`RequestVote` RPC 授予选票。此外，如果接收到的任期号低于当前任期，将回复"false"。


    领导者选举的具体流程如图 7-6 所示。


    ![](img/515270_1_En_7_Fig6_HTML.png)


    RAFT 领导者选举流程图，起始于转换为候选者状态，结束于成为跟随者。


    图 7-6

    RAFT 领导者选举


    一个节点可以处于三种状态；我们可在图 7-7 所示的状态图中可视化服务器状态，该图也展示了领导者选举。


    ![](img/515270_1_En_7_Fig7_HTML.png)


    RAFT 节点状态流程图，起始于节点启动，结束于跟随者。流程从跟随者流向候选者和领导者。


    图 7-7

    RAFT 中的节点状态


    一旦领导者被选举出来，它就可以随时接收来自客户端的请求。至此，日志复制可以开始了。


    ### 日志复制


    RAFT 的日志复制阶段非常简单直接。首先，客户端向领导者发送命令/请求，交由复制状态机执行。然后，领导者为该命令分配一个任期号和索引，以便该命令在节点持有的日志中被唯一标识。


    它将此命令追加到自己的日志中。当领导者的日志中有新条目时，它同时通过`AppendEntries` RPC 向跟随者节点发送复制该命令的请求。


    当领导者能够将该命令复制到大多数跟随者节点时（即得到确认），该条目就被视为在集群中已提交。此时，领导者在其状态机中执行该命令，并将结果返回给客户端。它还会通过`AppendEntries`
    RPC 通知跟随者该条目已提交，跟随者随后在其状态机中执行已提交的命令。来自五个节点的日志集合如图 7-8 所示。


    ![](img/515270_1_En_7_Fig8_HTML.jpg)


    一张图表列出了领导者、跟随者 1、2、3 和 4 的日志索引。在最后一个索引下方有一条水平线，标记为已提交条目。


    图 7-8

    RAFT 节点中的日志


    请注意，日志索引号 6 之前的条目已在多数服务器上复制，因为领导者、跟随者 3 和跟随者 4 都拥有这些条目，构成了多数——五个节点中的三个。这意味着它们已被提交，可以安全地应用到各自的状态机中。跟随者
    1 和 3 的日志不是最新的，这可能是由于节点故障或通信链路故障所致。如果存在崩溃或缓慢的跟随者，领导者将通过`AppendEntries` RPC 持续重试，直至成功。


    日志复制过程如图 7-9 所示。


    ![](img/515270_1_En_7_Fig9_HTML.png)


    日志复制过程的流程图。流程为：领导者、命令、从节点 1 向节点 2 和 3 复制`append entries RPC`、并回复。


    图 7-9

    RAFT 日志复制与状态机复制


    当跟随者收到用于复制日志条目的`AppendEntries` RPC 时，它会检查组件的任期是否小于当前任期，若是则回复 false。它仅追加日志中尚不存在的新条目。如果现有条目与新条目具有相同的索引但不同的任期，它将删除该现有条目及其后的所有条目。此外，如果日志在紧邻新条目前一个条目的索引处没有条目，或者有条目但任期不匹配，它也会回复
    false。


    如果存在失败的跟随者或候选者，该协议将通过`AppendEntries` RPC 持续重试，直至成功。


    如果一个命令被提交，RAFT 集群将不会丢失它。这是 RAFT 在面对网络延迟、数据包丢失、重启或崩溃故障等任何故障时提供的保证。然而，它不处理拜占庭故障。


    每个日志条目包含一个任期号、一个索引和一个状态机命令。任期号有助于发现日志之间的不一致性，它指示命令发生的时间。索引标识条目在日志中的位置。命令是客户端请求执行的指令。

