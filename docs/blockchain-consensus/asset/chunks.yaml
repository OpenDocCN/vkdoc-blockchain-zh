- fmt: '### Cryptography in Ethereum


    Like any other blockchain, Ethereum’s security relies on cryptography. Ethereum
    uses cryptography throughout the blockchain and node design:


    - `AES CTR` is used in RLP handshake and subsequent P2P messaging. It is also
    used in a keystore as `AES CTR 128-bit` cipher.

    - Digital signatures in Ethereum clients use the `SECP256K1` curve. It is used
    in `ECDSA` signatures for transaction signing, `ECDH` key exchanges, and for generating
    a shared key before the RLP P2P handshake.

    - `SCRYPT` and `PBKDF2` are used as key derivation functions in the keystore.

    - The `KECCAK-256` hash function is used in the proof of work algorithm for mining
    and solidity language.

    - The Elliptic Curve Integrated Encryption Scheme (`ECIES`) is used in Ethereum.


    If the terms mentioned earlier sound unfamiliar, refer to Chapter [2](#515270_1_En_2_Chapter.xhtml)
    where we covered cryptography in detail.


    #### Accounts and Addresses


    A Bitcoin model is based on transactions, whereas Ethereum is based on accounts.
    Accounts are part of the Ethereum state and keep an intrinsic balance and transaction
    count. 160-bit long addresses identify accounts. An account is how a user interacts
    with the blockchain. A transaction signed by an account is verified and broadcast
    to the network, which results in a state transition on the blockchain once executed.
    There are two types of accounts, contract accounts (`CAs`) and externally owned
    accounts (`EOAs`). `EOAs` are associated with a human user, whereas `CAs` have
    no intrinsic association with a user.


    A world state is a mapping between addresses and account states. An account state
    consists of the fields shown in Table [4-2](#515270_1_En_4_Chapter.xhtml#Tab2).


    **Table 4-2 Account state**


    | Element | Description |

    | --- | --- |

    | `Nonce` | Number of transactions originated from an address or, in the case
    of smart contracts, the number of contracts created by an account |

    | `Balance` | Number of `Wei` owned by this address |

    | `StorageRoot` | 256-bit hash of the root node of the Merkle Patricia trie, which
    encodes the storage contents of the account |

    | `codeHash` | Hash of the associated EVM code (bytecode) |


    ### Transactions and Executions


    Transactions in Ethereum are signed instructions which once executed result in
    a message call or contract creation (new account with associated code) on the
    blockchain. Fundamentally, there are two types of transactions, **message call**
    and **contract creation**, but over time for easier understanding, three types
    are now usually defined:


    - Value transfer transactions

    - Contract creation transactions

    - Contract execution transactions


    A transaction consists of several fields. Each transaction is part of the transaction
    trie, the root of which is stored in the block header in the block. When a transaction
    is executed, a receipt is returned which can be used as a verification for the
    transaction execution.


    A transaction, either a message call or a contract creation, includes the common
    fields shown in Table [4-3](#515270_1_En_4_Chapter.xhtml#Tab3).


    **Table 4-3 Transaction structure**


    | Element | Description |

    | --- | --- |

    | `Nonce` | Number of transactions sent by the sender |

    | `gasPrice` | Number of `Wei` to be paid per unit of gas for the execution of
    the transaction |

    | `gasLimit` | Maximum amount of gas that is expected to be used for executing
    a transaction. It is paid up front and cannot be increased later |

    | `to` | The 160-bit address of the message call’s (value transfer, contract execution)
    recipient or for a contract creation transaction |

    | `value` | Number of `Wei` to be transferred to the message call’s recipient.
    In the case of contract creation, it is the endowment (number of `Wei`) for the
    newly created contract account (smart contract) |

    | `V`, `R`, `S` | Values corresponding to the signature of the transaction used
    to determine the sender of the transaction |

    | `init` | (In the case of contract creation transaction) An unlimited size byte
    array specifying the EVM code for the contract account (smart contract) initialization
    procedure |

    | `data` | (In the case of message call transaction) An unlimited size byte array
    specifying the input data of the message call |


    A transaction takes several steps in the Ethereum blockchain. A high-level transaction
    flow is described as follows:


    1. First, a transaction is created. It can either be a contract creation transaction
    or a message call.

    2. The transaction is signed using `ECDSA`, verified, and broadcast to the network.

    3. The transaction is propagated via a gossip protocol and picked up by miners
    and other nodes to populate their transaction pools.

    4. Miners create a candidate block by adding transactions to it and start the
    mining process.

    5. A miner who solves the proof of work announces its block to the network.

    6. Other nodes receive the block, validate it, and append it to their blockchain.


    ### Blocks and Blockchain


    Blocks in Ethereum are composed of a block header and transactions. A blockchain
    consists of blocks, which contain transactions.


    Like any other blockchain, blocks are the main building blocks of Ethereum. An
    Ethereum block consists of the block header, the list of transactions, and the
    list of ommer block headers. A block header also consists of several elements.
    All these elements in a block are shown in Tables [4-4](#515270_1_En_4_Chapter.xhtml#Tab4)
    and [4-5](#515270_1_En_4_Chapter.xhtml#Tab5) with a description.


    **Table 4-4 Block structure**


    | Element | Description |

    | --- | --- |

    | Block header | Header of the block |

    | List of transactions | Series of transactions included in the block |

    | List of ommer block headers | List of uncle or ommer headers. An uncle block
    is a child of a parent but doesn’t have any child blocks. They are valid but stale
    blocks which do not make it to the main chain but do earn a reward for their participation
    |


    The block header structure is described in Table [4-5](#515270_1_En_4_Chapter.xhtml#Tab5).


    **Table 4-5 Block header structure**


    | Element | Type | Description |

    | --- | --- | --- |

    | `Parent hash` | `Hash` | `Keccak 256-bit` hash of the parent block’s header
    |

    | `Ommers hash` | `Hash` | `Keccak 256-bit` hash of the list of ommers |

    | `Beneficiary` | `Address` | 160-bit recipient address for mining reward |

    | `State root` | `Hash` | `Keccak 256-bit` hash of the root node of the transaction
    trie |

    | `Transaction root` | `Hash` | `Keccak 256-bit` hash of the root node of the
    transaction trie |

    | `Receipts root` | `Hash` | `Keccak 256-bit` hash of the root node of the transaction
    receipts trie, which contains receipts of all transactions included in the block
    |

    | `Logs bloom` | `Variable` | Bloom filter composed logger address and log topics
    |

    | `Difficulty` | `Integer` | Difficulty level of the current block |

    | `Number` | `Integer` | Total number of all previous blocks |

    | `Gas limit` | `Integer` | Limit set on the gas consumption per block |

    | `Gas used` | `Integer` | Total gas consumed by all transactions included in
    the block |

    | `Timestamp` | `Integer` | Unix epoch timestamp |

    | `Extra` | `Variable` | An optional free field for storing extra data |

    | `MixHash` | `Integer` | Computational effort proof |

    | `Nonce` | `Integer` | Combined with `MixHash` to prove computational effort
    |

    | `basefeepergas` | `Integer` | (Post `EIP-1559`) Records the protocol calculated
    fee required for a transaction to be included in the block |


    Ethereum uses a new data structure called Merkle Patricia trie to store and organize
    transactions and relevant data. It is a combination of Patricia and Merkle trees
    with novel properties.


    There are four tries used in Ethereum to organize data such as transactions, state,
    receipts, and contract storage.


    #### Transaction Trie


    Each Ethereum block contains the root of a transaction trie, which is composed
    of transactions.'
