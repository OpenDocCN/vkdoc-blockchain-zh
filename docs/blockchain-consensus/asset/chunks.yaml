- fmt: "##### PoW and Game Theory\n\nWe can think of Bitcoin as a distributed system\
    \ with selfish players; nodes might be trying to gain incentives without contributing\
    \ or trying to gain more incentives than their fair share.\n\nThe Bitcoin protocol\
    \ is a Nash equilibrium because no deviation from the protocol’s equilibrium strategy\
    \ can result in a gain for the deviant. The protocol is designed in such a way\
    \ that any deviation from the protocol is punished, and normal (good) behavior\
    \ is economically incentivized. The dominant strategy in Bitcoin is to mine according\
    \ to the protocol rules as there is no other strategy that would result in a better\
    \ outcome. Each participant is better off by just sticking to the rules of the\
    \ network.\n\nIf the other miners don’t switch their strategy, an attacker has\
    \ no incentive to switch their own strategy. Neither player can increase their\
    \ payoffs by switching to a different strategy if the other player doesn’t switch\
    \ their strategy. This means that in Bitcoin if all other miners are honest, an\
    \ adversary has no incentive to change their strategy and try to perform malicious\
    \ mining.\n\nIncentive mechanisms such as block reward and transaction fees in\
    \ Bitcoin discourage malicious behavior. These incentives encourage participants\
    \ to behave according to the protocol, which not only results in the creation\
    \ of new bitcoins, that is, network progress is guaranteed, but also the security\
    \ of the network is maintained.\n\nSince 2009, the Bitcoin network has attracted\
    \ so much investment in the form of mining farms and Bitcoin businesses, exchanges,\
    \ and services that network participants will benefit more by protecting the network\
    \ rather than destroying it. They gain by protecting the network. Even attackers\
    \ cannot gain much. Imagine if some adversary managed to find a way to move all\
    \ coins owned by Satoshi Nakamoto into another account. There probably is no incentive\
    \ for an attacker to do so, because the moment it happens, the Bitcoin almost\
    \ certainly will become worthless, because this event would imply that the very\
    \ cryptography that protects the network has been broken (assuming that real Satoshi\
    \ is not alive or has lost his private keys irrecoverably).\n\nI have a feeling\
    \ that Satoshi is not moving his coins because that can cause Bitcoin to lose\
    \ its value drastically.\n\nSimilarly, even if an adversary somehow gains 51%\
    \ of the network hash power, taking over the entire network may not be beneficial\
    \ anymore. Why? Because the best course of action in such a situation for the\
    \ adversary is to keep mining silently with some reasonable hash power to gain\
    \ economic incentives (earn bitcoins) just like others on the network, instead\
    \ of utilizing the entire 51% hash power announcing the attack to the world. That\
    \ would just diminish the Bitcoin value almost entirely, and any gains by the\
    \ attacker would be worthless. Therefore, attackers do not have incentive to take\
    \ over the Bitcoin network, perhaps apart from some mishaps that occurred due\
    \ to human errors and compromised keys. This is the elegance and beauty of Bitcoin\
    \ that even attackers do not gain by attacking the network. All participants gain\
    \ by just playing by the rules. The dominant strategy for miners is to be honest.\n\
    \nFor the very first time in distributed computing, a network is created which\
    \ does not rely on any trusted third party and is permissionless, yet it doesn’t\
    \ let any attacker take over the network. Here, I remember something, which is\
    \ not directly relevant to Bitcoin, but helps to feel what many distributed computing\
    \ experts might feel about Bitcoin when they first realize how elegant it is.\n\
    \n> *It could not be true but it was true.*\n> \n> —Mikhael Gromov\n> \n> [`www.ams.org/notices/201003/201003FullIssue.pdf`](http://www.ams.org/notices/201003/201003FullIssue.pdf)\n\
    \nWith the advent of Bitcoin and novel combination of cryptography, distributed\
    \ computing, and economics, a new field of study has emerged, called Cryptoeconomics\
    \ or Cryptonomics. This is depicted in Figure [5-7](#515270_1_En_5_Chapter.xhtml#Fig7).\n\
    \n![](images/515270_1_En_5_Chapter/515270_1_En_5_Fig7_HTML.jpg)\n\nAn illustration\
    \ of the fusion of crypto-economics. Economics, cryptography, and distributed\
    \ computing point to crypto-economics.\n\nFigure 5-7\n\nFusion of distributed\
    \ computing, economics, and cryptography – Bitcoin\n\nWe can also think of the\
    \ fork resolution mechanism as a Schelling point solution. This is a game theory\
    \ concept where a focal point or also called Schelling point is a solution that\
    \ people choose by default in the absence of communication. Similarly, in the\
    \ proof of work fork resolution mechanism, due to the longest (strongest) chain\
    \ rule, nodes tend to choose the longest chain as a canonical chain to add the\
    \ block that they’ve received without any communication or direction from other\
    \ nodes. This concept of cooperating without communication was introduced by Thomas\
    \ Schelling in his book *The Strategy of Conflict*.\n\n### Similarities Between\
    \ PoW and Traditional BFT\n\nFundamentally, all consensus algorithms strive toward\
    \ achieving safety and liveness properties. Either deterministic or probabilistic,\
    \ basically all consensus algorithms have three main properties: agreement, validity,\
    \ and termination. We have introduced these terms before. The question arises\
    \ in Nakamoto consensus of whether we can redefine these properties in a way which\
    \ is closer to the blockchain world. The answer is yes; agreement, validity, and\
    \ liveness properties can be mapped to Nakamoto consensus–specific properties\
    \ of common prefix, chain quality, and chain growth, respectively. These terms\
    \ were first introduced in [`https://eprint.iacr.org/2014/765.pdf`](https://eprint.iacr.org/2014/765.pdf)\
    \ [7].\n\n#### Common Prefix\n\nThis property implies that all honest nodes will\
    \ share the same large common prefix.\n\n#### Chain Quality\n\nThis property means\
    \ that the blockchain contains a certain required level of correct blocks created\
    \ by honest miners. If the chain quality is compromised, then the validity property\
    \ of the protocol cannot be guaranteed.\n\n#### Chain Growth\n\nThis property\
    \ means that new correct blocks are constantly added to the blockchain regularly.\n\
    \nThese properties can be seen as the equivalent of traditional consensus properties\
    \ in the Nakamoto world. Here, the common prefix is an agreement property, the\
    \ chain quality is a validity property, and chain growth can be seen as a liveness\
    \ property.\n\n### PoW As State Machine Replication\n\nA proof of work blockchain\
    \ can be seen as a state machine replication mechanism where first a leader is\
    \ elected who proposes a sequence of transactions batched in a block. Second,\
    \ the finalized (mined) block is broadcast to other nodes via a gossip protocol,\
    \ which is accepted and appended into their local blockchains, achieving log replication.\
    \ We can think of it as if the leader is proposing an order and all nodes updating\
    \ their log (local blockchain) based on this order of transactions set in the\
    \ block.\n\nLet’s first see the leader election algorithm and replication algorithm\
    \ in detail."
