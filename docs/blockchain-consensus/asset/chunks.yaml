  trans: '

    # 不可能性结果


    分布式系统中的不可解性结果表明某些问题是无法解决的。下界结果表明，如果资源不足，某些问题就无法解决；换言之，这些下界结果表明，只有当可用资源达到一定阈值（即解决问题所需的最小资源）时，某些问题才可能解决。


    表 10-1 总结了与共识问题相关的核心不可能性结果。


    **表 10-1** 共识问题的不可能性结果


    |   | 崩溃故障 | 拜占庭故障 |

    | --- | --- | --- |

    | 同步 | 当 `f` < `n` 时共识可能<br>至少需要 `f` + 1 轮，其中 `f` < `n`<br>`f` 网络连通度 | `f` ≥ `n`/3
    时不可能<br>至少需要 `2f` 网络连通度<br>当 `f` < `n`/2 时可能<br>需要 `f` + 1 轮 |

    | 异步 | 确定性共识不可能 | 确定性共识不可能 |

    | 部分同步 | 当 `n` ≤ `2f` 时不可能 | 当 `n` ≤ `3f` 时不可能<br>需要 `2f` 网络连通度<br>需要 `f` + 1
    轮 |


    表 10-1 的结果是标准的不可能性结果。然而，还有许多其他结果。


    随着区块链的创新研究，出现了一些新结果。Andrew Lewis-Pye 和 Tim Roughgarden 宣布了一个引人入胜的新不可能性结果，类似于 CAP
    定理，即我们只能同时从三个属性中选择两个。该结果指出，没有任何区块链协议能够同时在无约束环境（例如 PoW）中运行、在具有显著且剧烈动态变化（例如参与者数量）的同步环境下保持活跃性，并在部分同步环境下满足概率最终性（一致性）。我们只能同时从前面提到的三个属性中选择两个。


    例如，在像比特币这样的无规模环境中，假设某个节点停止接收任何新区块。此时，该节点无法区分其他节点是失去了资源而无法再产生区块，还是区块消息被延迟了。如果该节点停止产生区块，而其他节点资源不足也不产生区块，则违反了活跃性属性，因为即使其他节点不产生区块，该节点也必须继续产生区块。然而，如果它继续产生区块，但区块消息只是被延迟了，那么它就违反了一致性属性，因为可能存在其他冲突区块只是被延迟了。


    # 复杂度与性能


    可以从通信复杂度的角度来评估共识算法。这涉及如下计算：如果协议在正常模式（无故障）下运行，需要交换多少条消息才能达成共识。此外，在领导者故障并发生视图变更的情况下，需要交换多少条消息？这些指标有助于理解算法在实际中的表现，从而帮助评估算法的效率。


    消息延迟可定义为算法中那些必须等前一条消息被接收后才能发送的消息数量。换句话说，就是那些只有在前一条消息被接收之后才能发送的消息。一个算法需要 `n` 个消息延迟；如果某次执行包含一个由
    `n` 条消息组成的链，其中每条消息都必须在前一条消息被接收后才能发送。


    为了评估与算法相关的成本，我们可以考虑不同的复杂度特征。与共识算法相关的成本有三种：消息复杂度、通信复杂度和时间复杂度。


    ## 消息复杂度


    消息复杂度表示算法达成共识所需交换的消息总数。例如，假设一个算法中所有进程都向所有其他节点广播。这意味着将收到 `n(n - 1)` 条消息。这意味着该算法的消息复杂度为
    `O(n²)`。


    ## 通信复杂度（比特复杂度）


    通信复杂度关注的是算法需要交换的总比特数。考虑与消息复杂度示例中相同的算法。如果每条消息包含 `t` 比特，则该算法交换 `tn(n - 1)` 比特，这意味着通信复杂度为
    `O(tn²)` 比特，即全对全的通信模式。


    ## 时间复杂度


    时间复杂度关注的是完成算法执行所需的时间。执行算法所需的时间还取决于协议中传递消息所需的时间。与对消息进行本地计算相比，传递消息所需的时间相当大。因此，时间可以看作是连续消息延迟的次数。之前示例中在无故障网络上运行的同一算法的时间复杂度为
    `O(1)`。

    '
- fmt: '### Space Complexity


    Space complexity deals with the total amount of space required for the algorithm
    to run. Space complexity is mostly relevant in a shared memory framework.


    In message-passing distributed systems, such as blockchains, mostly message complexity
    is considered. Bit complexity is not so much relevant; however, if the size of
    the messages is big, then this can become another complexity measure to take into
    consideration.


    Table [10-2](#515270_1_En_10_Chapter.xhtml#Tab2) summarizes the complexity results
    of some common BFT protocols.


    **Table 10-2** Message complexity orders


    | Protocol | Normal Mode | View Change | Message Delays |

    | --- | --- | --- | --- |

    | Paxos | *O*(*n*) | *O*(*n*²) | 4 |

    | PBFT | *O*(*n*²) | *O*(*n*³) | 5 |

    | Tendermint | *O*(*n*²) | *O*(*n*²) | 5 |

    | HotStuff | *O*(*n*) | *O*(*n*) | 10 |

    | DLS | *O*(*n*²) | *O*(*n*⁴) | *O*(*n*) rounds |

    | HoneyBadger | *O*(*n*) | − | − |

    | PoW | *O*(*n*) | − | − |


    With these costs in mind, we can think of several bottlenecks in blockchain consensus
    protocols that result in poor performance. For example, the choice of all-to-all
    messages will inevitably result in more complexity.


    Several techniques such as erasure coding can be used to reduce message complexity.
    Another technique called star topology (one to all – all to one), instead of mesh
    topology (all-to-all communication), can also reduce message complexity. Both
    these techniques are used in `HoneyBadger` and `HotStuff`, respectively.


    Another class of algorithms that aims to improve performance and scalability of
    the consensus algorithms is to allow multiple nodes to act as leaders in parallel,
    that is, parallel leaders. Under this paradigm, multiple leaders can propose concurrently,
    which results in alleviating the CPU and bandwidth costs by distributing load
    evenly across all leaders. There are several algorithms in this category like
    `HoneyBadger`, `Hashgraph`, and `RedBelly`. However, it is possible that request
    duplication might occur with parallel leaders, which has been addressed in the
    `Mir-BFT` protocol.


    Sharding is another technique that improves consensus performance. It allows breaking
    up the system state and validators into smaller sections. Each shard is responsible
    for a small subset of the entire state, and only a smaller subset of the global
    validator set is required to achieve consensus on that part of the state. This
    way, in parallel many shards exist, and by allowing consensus to run on smaller
    parts, great efficiency is achieved. To achieve a final state, some cross-shard
    communication and consolidation mechanism is also required.


    Another technique to improve throughput is to offload data from the main chain
    to layer 2. Some techniques are developed in this regard, such as payment channels,
    lightning network for Bitcoin, commit chains, and `Plasma`. Techniques such as
    zero knowledge are used to provide evidence of off-chain execution. `Prism` and
    `Bitcoin-NG` are some of the techniques to improve consensus performance.


    DAG-based consensus discussed earlier aims to improve performance by introducing
    graph-based structures that allow for non-interdependent commands to be committed
    in parallel.


    Parallel execution of commands/smart contracts are also a technique that is proposed
    to improve performance. Parallel smart contracts (called `Sealevel`) are supported
    in the `Solana` blockchain.


    ## Comparison of Protocols


    We can compare consensus algorithms from different perspectives. Table [10-3](#515270_1_En_10_Chapter.xhtml#Tab3)
    summarizes the results.


    **Table 10-3** Comparison of the main consensus algorithms


    | Property | POW | POS | POA | RAFT | PBFT |

    | --- | --- | --- | --- | --- | --- |

    | Safety | Probabilistic | Probabilistic | Deterministic | Deterministic | Deterministic
    |

    | Adversary | Computational power control | Stake amount | Collusion/Byzantine
    | Collusion/crash | Collusion/Byzantine |

    | Method | Math puzzle solving | Value deposit | Authority | Leader-follower |
    Primary backup |

    | Network model | Synchronous | Synchronous | Synchronous | Partially synchronous
    | Partially synchronous |

    | Incentive | Yes | Yes | No | No | No |

    | Access control | Public | Public | Permissioned | Permissioned | Permissioned
    |

    | Block validation | Block header check/PoW valid | Staking rules | Identify check
    | Seal check | Seal check |

    | Finality | Probabilistic | Economic | Deterministic >50% validator agreement
    | Immediate | Immediate |

    | Misbehavior control | CPU/memory resources | Stake penalty | BFT | CFT | BFT
    |

    | Election type | Lottery | Lottery | Voting | Voting | Voting |

    | Liveness | Probabilistic | Probabilistic | Deterministic | Deterministic | Deterministic
    |

    | CAP | A over C | A over C | A over C | P over C | P over C |

    | Transaction capacity | 10s | 100s | 10s | 1000s | 1000s |

    | Fault tolerance | BFT | BFT | BFT | CFT | BFT |

    | Forking | Yes | Yes | No | No | No |

    | Special hardware | Yes | No | No | No | No |

    | Example | Bitcoin | Tezos | Rinkeby | GoQuorum | Sawtooth |

    | Dynamic membership | Yes | Yes | No | Yes | No |


    Notes:


    - PoA is assumed to be BFT based.

    - While only a single example is given, there are many, for example, Ethereum
    uses PoW too.

    - `PBFT` and `RAFT` both are state machine replication protocols with a leader-follower
    architecture, also called a primary backup. Usually, for `PBFT` a primary backup
    is used in the literature; however, for `RAFT` leader-follower terms are used.
    Fundamentally, they serve the same purpose.


    ### Network Model


    We can model a blockchain network in several ways, as shown in the following.
    Fundamentally, the networks are either synchronous, asynchronous, or partially
    synchronous. However, in literature several terms are used and as such explained
    as follows.


    #### Synchronous


    All messages are delivered within delta `Δ` time.


    #### Eventual Synchrony


    After an unknown global stabilization time (GST), all messages are delivered within
    delta `Δ` time.


    #### Partial Synchrony


    A protocol does not know what delta `Δ` is.


    #### Weak Synchrony


    `Δ` varies with time. In practice, the `Δ` increases systematically until liveness
    is achieved. However, the delays are not expected to grow exponentially.'
