  trans: '

    # 拜占庭将军问题


    拜占庭将军问题由兰波特于 1982 年提出。在这一思想实验中，设想了这样一个场景：三个或更多军团驻扎在某城市周围，其共同目标是攻占该城。每个军团由一位将军统领，他们通过信使进行通信。只有当所有军团同时进攻时，城市才能被攻陷。


    这里的要求是达成一致进攻的协议，以便所有军队能同时发动攻击，从而攻占城市。


    该场景可能面临的问题包括：


    - 消息可能丢失，即信使可能被俘或失踪。

    - 任何将军都可能是叛徒，他们可以向其他将军发送误导性消息、扣留消息、不向所有将军发送消息、在转发消息前篡改内容，或发送相互矛盾的消息，其目的都是为了破坏将军之间的协商进程。

    - 忠诚的将军也不知道谁是叛徒，但叛徒之间可以相互勾结。


    这里的挑战在于：在这种情况下，能否达成协议？如果可以，采用何种协议能解决此问题？图 3-9 展示了该问题。


    ![](img/515270_1_En_3_Fig9_HTML.png)


    拜占庭将军问题的示意图中，中心是一座城堡，周围是五支将军部队，分别标记为撤退、进攻和未知。


    **图 3-9** 拜占庭将军问题——展示每个军团接收到的误导性、正确或无任何消息的情况


    事实证明，这个问题无法解决。已有证明表明，只有当叛徒将军少于三分之一时，该问题才能得到解决。例如，如果有`3t + 1`位将军，那么最多只能有`t`位是恶意的。这是拜占庭容错的一个经过验证的下界。我们将在“不可能性结果”一节中更正式地探讨这一点，届时将讨论
    FLP、CFT 下界和 BFT 下界。


    在分布式系统中，我们可以进行类比：将军代表进程（节点），叛徒代表拜占庭进程，忠诚将军代表正确进程，信使代表通信链路，消息丢失代表信使被俘，信使到达将军处没有时间限制则代表异步性。我想你现在应该明白了吧！


    # 复制


    在本节中，我们将讨论复制。复制用于在多个节点上维护数据的精确副本。该技术具有若干优势。一个关键优势是容错性。最简单的复制示例之一是存储系统中的 RAID。例如，在
    RAID-1 中，有两个磁盘，它们互为精确副本（镜像）。如果其中一个不可用，副本仍然可用，从而实现容错和高可用性。在分布式系统中，复制因多种原因而被使用，与
    RAID 不同，它是在多个节点之间进行的，而不是仅在服务器内的两个磁盘之间。


    此外，如果数据保持不变，复制就很容易。你只需创建数据的一次性副本，并将其存储在另一个磁盘或节点上即可。具有挑战性的部分在于，当数据不断变化时，如何保持复制的一致性。


    复制有以下几个优点：


    - **高可用性**，源于容错能力。例如，如果一个副本宕机，另一个副本可以继续为客户提供服务。

    - **负载分布**，由于每个副本节点都是独立节点，客户端可以向不同节点发送请求（或通过负载均衡器将请求路由到负载较轻的副本——即负载均衡）。负载可以在不同副本之间进行分配，以实现更高的性能。

    - **数据一致性**，意味着所有节点上都存有相同的数据副本，这有助于维护整个系统的完整性。

    - **更优的性能**，通过负载均衡实现。当某些节点接近或达到满载时，负载较轻的节点可以接管请求。实现这一目标的技术有很多，这超出了本书的范围；不过，通常使用负载均衡器，它通常以轮询方式将客户端的请求路由到各个副本。这样，负载就被分散到多个副本上，而不是让单个节点承受所有访问，从而因
    CPU 负载过高导致响应变慢。

    - **数据局部性**，尤其是在地理分布式的网络中，靠近客户端的节点可以提供服务请求，而不是仅有一个位于遥远数据中心的节点，所有地理上或远或近的客户端都只向这一台服务器发送请求。物理上更靠近服务器的客户端，其响应速度会比那些位于遥远城市或大陆的客户端更快。例如，在文件下载服务中，位于爱尔兰的镜像服务器能够比位于澳大利亚的服务器更快地处理下载请求。仅网络延迟一项，就足以使这种设置面临性能下降的风险。


    此外，也存在一些缺点：


    - **成本高昂**，由于需要多个副本节点，搭建成本可能较高。

    - **在副本间维护数据一致性**十分困难。


    复制可以通过两种方法实现。一种是**状态转移**，即将状态从一个节点发送到另一个副本节点。另一种方法是**状态机复制**。每个副本都是一个状态机，它与其他副本确定性地以相同顺序执行命令，从而在所有副本间产生一致的状态。通常，在这种情况下，主服务器接收命令，然后将这些命令广播给其他副本，由它们执行这些命令。


    实现复制有两种常见技术。我们定义如下。


    ## 主动复制


    在这种方案中，客户端命令通过一个排序协议进行排序，并转发给副本，由这些副本确定性地执行命令。其核心理念是：如果所有命令在所有副本上以相同顺序执行，那么每个副本将产生相同的状态更新。这样，所有副本就能彼此保持一致。这里的关键挑战在于，需要设计一套命令排序方案，并确保所有节点以相同顺序执行相同的命令。此外，每个副本都从相同的初始状态开始，并且是原始状态机的一个副本。主动复制也称为**状态机复制**。


    ## 被动复制


    在被动复制方法中，有一个副本被指定为主副本。该主副本负责执行命令，并将更新结果发送（广播）给包括其自身在内的所有副本。然后，所有副本按照接收到的顺序应用状态更新。与主动复制不同，这里的处理过程不需要是确定性的，任何异常通常由指定的主副本解决，并产生确定性的状态更新。这种方法也称为**主备份复制**。简而言之，系统中只有主副本维护着一个状态机副本，而其余副本仅维护状态。

    '
- fmt: '### Pros and Cons


    There are pros and cons of both approaches. `Active replication` can result in
    wastage of resources if the operations are intensive. In the case of `passive
    replication`, large updates can consume a large amount of network bandwidth. Furthermore,
    in `passive replication`, as there is one primary replica, if it fails, the performance
    and availability of the system are impacted.


    In the `passive` approach, client write requests are preprocessed by the `primary`
    and transformed into state update commands, which apply to all replicas in the
    same order. Each replica is a copy of the state machine in `active replication`,
    whereas, in `passive replication`, only the `primary` is a single copy of the
    state machine.


    Note that even though there is a distinction between `active` and `passive replication`
    at a fundamental level, they both are generic approaches to making a state machine
    fault-tolerant.


    Let’s now see how `primary backup replication` works. I am assuming a `fail-stop`
    model here.


    ### Primary Backup Replication


    `Primary backup replication` is the most common type of replication scheme. There
    is one replica that is designated `primary`, and the rest of the nodes are `backups`.
    A correct process bearing the lowest identifier is designated as a `primary` replica.
    A client sends requests to the designated `primary`, which forwards the request(s)
    to all `backups`. The `primary` replies to the client only after it has received
    responses from the `backups`. When the client makes a write request, the `primary`
    sends the request to all replicas, and after receiving the response from the `backups`,
    it makes the update to itself (deliver to itself).


    The algorithm works as follows:


    1.  The client sends a write request to the `primary`.

    2.  The `primary` broadcasts it to the `backup` replicas.

    3.  `Backup` replicas send an acknowledgment (response) to the `primary` replica.

    4.  The `primary` waits until it has received all responses from `backup` replicas.

    5.  Once it has received all responses, it delivers the request to itself. This
    is called the `commit point`.

    6.  After this, the `primary` sends the response back to the client.


    In the case of read operation:


    1.  The client sends a request to the `primary`.

    2.  The `primary` responds.


    Figure [3-10](#515270_1_En_3_Chapter.xhtml#Fig10) illustrates this concept.


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig10_HTML.png)


    A diagram of primary backup replication. Client writes request. Broadcasts are
    sent from primary to backup 3\. Responses are sent back to the client.


    **Figure 3-10** Primary backup replication


    How are failures handled? If the `primary` fails, one of the `backups` will take
    over.


    Now, this looks like a suitable protocol for achieving fault tolerance, but what
    if the `primary` fails? `Primary` failure can lead to downtime as recovery can
    take time. Also, reading from the `primary` can produce incorrect results because,
    in scenarios where the client makes a read request to the `primary` before the
    `commit point`, the `primary` will not produce the result, even though all replicas
    have that update delivered to them. One solution might be to deal with reads as
    updates, but this technique is relatively inefficient. Also, the `primary` is
    doing all the work, that is, sending to other replicas, receiving responses, committing,
    and then replying to the client. Also, the `primary` must wait until all responses
    are received from the replicas for it to be able to respond to the client. A better
    solution, as compared to the `primary backup replica` solution, is `chain replication`.
    Here, the core idea is that one of the backup servers will reply to read the requests,
    and another will process the update commands.


    ### Chain Replication


    `Chain replication` organizes replicas in a chain with a head and a tail. The
    `head` is the server with the maximum number, whereas the `tail` is the one with
    the lowest number. Write requests or update commands are sent to the `head`, which
    sends the request using reliable FIFO links to the next replica on the chain,
    and the next replica then forwards it to the next until the update reaches the
    last (`tail`) server. The `tail` server then responds to the client. The `head`
    replica orders the requests coming in from the clients.


    For a read request (query), the client sends it directly to the `tail`, and the
    `tail` replies. It is easy to recover when the `tail` fails by just reselecting
    the predecessor as the new `tail`. If the `head` fails, its successor becomes
    the new `head` and clients are notified. Figure [3-11](#515270_1_En_3_Chapter.xhtml#Fig11)
    shows how `chain replication` works.


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig11_HTML.png)


    A diagram of chain replication. Client writes request. Response and reply are
    sent back to client under update and query, respectively.


    **Figure 3-11** Chain replication


    `Chain replication` provides high availability, high throughput, and strong consistency.
    It can tolerate up to *n* – 1 failures.'
