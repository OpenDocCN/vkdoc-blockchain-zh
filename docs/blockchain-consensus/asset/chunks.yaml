    **图 2-24** SHA-3 吸收与挤压函数


    在图 2-24 中，状态大小`b`通过将比特率`r`和容量比特`c`相加来计算。`r` 和 `c` 可以是任何值，只要 `r + c` 的大小为 25、50、100、200、400、800
    或 1600。该状态是一个三维位矩阵，初始设置为 0。数据`m`在应用填充后，通过异或运算逐块进入吸收阶段。


    表 2-1 显示了在 `r + c = 1600` 的最高效设置下，为实现所需输出哈希大小所需的比特率`r`（块大小）和容量`c`的值。


    **表 2-1** SHA-3 支持的比特率和容量


    | - | 比特率 `r`，块大小 | 容量 `c` | 输出哈希大小 |

    | :--- | :--- | :--- | :--- |


    函数`f`是一个置换函数。它包含五种变换操作，名为 Theta、Rho、Pi、Chi 和 Iota，描述如下：


    - `θ` - `Theta`：对状态中的位进行异或，用于混合。

    - `ρ` - `Rho`：执行位旋转的扩散函数。

    - `π` - `Pi`：扩散函数。

    - `χ` - `Chi`：对每个位进行异或，按位组合。

    - `ι` - `Iota`：与轮常数组合。


    关键思想是应用这些变换来实现雪崩效应，这确保了即使输入中发生微小的变化，输出也会发生巨大的变化。这五种操作组合在一起构成一轮。在 SHA-3 标准中，轮数为
    24 轮，以达到所需的安全级别。


    ## 消息认证码


    消息认证码（MACs）用于在密码系统中提供认证服务。MACs 有时被称为密钥哈希函数，我们可以使用它们来提供消息完整性和数据源认证。MACs 可以使用分组密码或哈希函数来构建。


    图 2-25 展示了一个 MAC 操作，其中发送方将认证标签`T`附加到消息`M`上。MACs 是对称密码原语，使用发送方和接收方之间的共享密钥。发送方使用此密钥生成认证标签，而接收方使用相同的密钥进行验证。MAC
    函数将密钥和消息`M`作为输入，并生成认证标签`T`。


    ![An illustration of a MAC function for sender and receiver includes the key,
    MAC, M, and T, and key, MAC, M, and T prime, respectively.](img/515270_1_En_2_Fig25_HTML.png)


    **图 2-25** MAC 函数的操作


    `T` 和 `M` 被发送给接收方，接收方运行相同的过程并将 `T` 与 `T''` 进行比较，`T''` 是验证者通过应用相同的 MAC 函数生成的，如果它们匹配，则验证成功。


    ### 基于哈希的 MACs (HMACs)


    与哈希函数类似，基于哈希的 MACs（HMACs）产生固定长度的输出，并以任意长的消息作为输入。在这种方案中，发送方使用 MAC 对消息进行签名，接收方使用共享密钥对其进行验证。密钥与消息一起使用秘密前缀法或秘密后缀法进行哈希处理。对于秘密前缀法，密钥与消息连接，即密钥在前，消息在后；而对于秘密后缀法，密钥在消息之后，如下所示：


    ```

    Secret prefix: M = MAC_k(x) = h(k || x)

    ```


    ```

    Secret suffix: M = MAC_k(x) = h(x || k)

    ```


    两种方法各有利弊。两种方案都曾出现过一些攻击。HMAC 构造方案使用 `ipad`（内部填充）和 `opad`（外部填充）进行填充，这在某些假设下被认为是安全的。


    哈希函数的各种重要应用用于点对点网络和区块链网络，例如 Merkle 树、Patricia 树、Merkle Patricia 树以及分布式哈希表。


    接下来将讨论一些最新的进展，例如可验证延迟函数。

    '
- fmt: '# Verifiable Delay Functions


    Verifiable delay functions (VDFs) are cryptographic primitives that require a
    sequential number of steps (substantial time) to evaluate but are very quick and
    efficient to verify. The evaluation must be sequential, and even with parallelization,
    the evaluation must take the specified amount of time. However, the verification
    is efficient. VDFs have multiple applications in distributed networks, for example,
    they can be used as randomness beacons that publish random, unpredictable, and
    non-manipulable values at fixed intervals. Randomness beacons can be used to build
    random leader election algorithms. VDFs also have applications in multiparty computations,
    permissionless consensus, and timestamping of events.


    Formally, VDFs can be defined as follows. There are three procedures involved
    in a VDF:


    - `setup(λ, t)` → `pp` where `λ` is the security parameter and `t` is the time
    parameter, for example, a ten-minute delay.

    - `evaluate(pp, x)` → `y`, `π` where `x` is the input, `pp` is the public parameters,
    `y` is the output, and `π` is the proof. `π` can be optional depending on the
    construction.

    - `verify(pp, x, y, π)` → {`true`, `false`} which outputs either true or false
    indicating the success or failure of the verification which checks the correctness
    of the output.


    There are two security properties of VDFs, uniqueness and sequentiality. Uniqueness
    ensures that the output `y` produced by VDF is unique for every input `x`. The
    sequentiality property ensures that the delay parameter `t` is enforced.


    Figure [2-26](#515270_1_En_2_Chapter.xhtml#Fig26) shows the operation of VDFs.


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig26_HTML.png)


    A schematic of the V D F. Setup of sigma, t is input to V D F, and y, pi is the
    output. A verification function is performed for all parameters.


    **Figure 2-26** – Operation of a VDF


    There are many proposals on how to construct VDFs. Some approaches include hardware
    enclaves to store cryptographic keys inside the enclave and use those keys to
    generate VDFs. Using hash functions to iteratively hash the output again as input
    to form a hash chain is another way of constructing verifiable delay functions.
    Creating a hash chain using a hash function iteratively is a sequential process
    and takes time; thus, it can work as an evaluation function of the VDF. Another
    method gaining more popularity is the algebraic construction, where finite cyclic
    groups are used which are assumed to have unknown order.


    VDFs have many innovative applications in blockchains, including constructing
    consensus algorithms, as a source of verifiable randomness and leader election.
    You will explore these applications in detail when we discuss relevant consensus
    protocols in Chapter [8](#515270_1_En_8_Chapter.xhtml).


    # Verifiable Random Functions


    A verifiable random function (VRF) is a pseudorandom public key function that
    provides a proof that the output it has generated is correctly calculated. The
    owner of the private key generates the proof and output of the function which
    is verifiable publicly by a public key to ascertain that the value is indeed correctly
    calculated. VRFs have many applications in consensus algorithms and blockchains,
    for example, Cardano and Polkadot use them in the block production mechanism.
    They also have been used to provide verifiable randomness on chains, for example,
    in the case of chainlink.


    # Summary


    - Cryptography is the science of secret communication.

    - Symmetric key cryptography and asymmetric cryptography are the two main categories
    of cryptography.

    - Elliptic curve cryptography has found major applications in blockchains and
    relevant consensus protocols, where commonly ECDSA is used for digitally signing
    blocks and transactions.

    - Hash functions create a fixed-length message digest of an arbitrary-length input.

    - MACs are message authentication codes used for message authentication.

    - Digital signatures provide nonrepudiation, integrity, and authentication services.

    - Authentication protocols are used in distributed systems to provide entity authentication.

    - Hybrid encryption schemes combine public and symmetric key cryptography to achieve
    performance and security.

    - Verifiable delay functions are functions that take time to evaluate but are
    quick to verify and have many applications in consensus protocols and blockchains.

    - VRFs are public key–based functions which generate a verifiable correct output.


    # 3. Distributed Consensus


    Consensus is a fundamental problem in distributed computing. This chapter will
    cover the fundamentals of the consensus problem and discuss some history covering
    the Byzantine generals problem, building blocks of consensus, and how we can solve
    this problem in distributed systems.


    As fault tolerance is a fundamental requirement in distributed systems, several
    primitives introduce fault tolerance. Fault-tolerant broadcast algorithms allow
    for the development of fault-tolerant applications. Consensus enables processes
    to reach a common decision despite failures. Both topics are well researched in
    academia and the industry.


    Before we dive into discussing consensus and agreement problems in detail, let''s
    cover some building blocks in continuation of link abstractions from Chapter [1](#515270_1_En_1_Chapter.xhtml)
    that are closely related to consensus and agreement problems.'
