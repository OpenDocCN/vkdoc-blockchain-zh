  trans: "\n# Tendermint\n\n`Tendermint` 的灵感来源于我们在第 6 章中介绍的 DLS 协议，该协议最初在 DLS 论文中提出。它也可以看作是\
    \ PBFT 的一个变体，在阶段划分上有相似之处。\n\n`Tendermint` 协议按轮次工作。在每一轮中，一个被选出的领导者提出下一个区块。在 `Tendermint`\
    \ 中，视图更换过程是常规操作的一部分。这一概念与 PBFT 不同，在 PBFT 中，视图更换仅在怀疑领导者出现故障时才会发生。`Tendermint` 的工作方式与\
    \ PBFT 类似，需要三个阶段才能达成共识。`Tendermint` 的一个关键创新在于设计了一种新的终止机制。与其他类 PBFT 协议不同，`Tendermint`\
    \ 开发了一种更直接的机制，类似于 PBFT 风格的常规操作。`Tendermint` 在没有额外通信成本的情况下终止，而不是为正常模式和视图更换模式（在领导者出现故障时进行恢复）设置两个子协议。\n\
    \n`Tendermint` 在关于运行环境的一些假设下工作，我们接下来将对这些假设进行描述：\n\n- **进程：** 进程是网络上的一个参与者。进程被期望是诚实的，但它们可能发生故障。每个进程都拥有投票权，用于向领导者提供确认。进程可以松散地连接，也可以与它们直接相连的进程/节点子集连接。它们不一定是直接相连的。进程拥有一个本地计时器，用于测量超时。\n\
    \n- **网络模型：** 网络是一个消息传递网络，进程之间使用 Gossip 协议进行通信。标准 BFT 假设 *n* ≥ 3*f* + 1 在此处适用，这意味着只有当网络中的节点数保持在\
    \ 3F 以上时，协议才能正常运行，其中 F 是故障节点数，N 代表网络中的总节点数。在实践中，这意味着网络中至少需要有四个节点才能容忍拜占庭故障。\n\n\
    - **时序假设：** `Tendermint` 假设网络是部分同步的。通信延迟存在一个未知的上界，但该上界仅在一个未知的时间点（称为全局稳定时间或 GST）之后才适用。\n\
    \n- **安全与密码学：** 系统中的安全假设是所使用的公钥密码学是安全的。此外，身份冒充或欺骗也是不可能的。网络上的所有消息都经过数字签名进行身份验证和验证。协议会忽略任何带有无效数字签名的消息。\n\
    \n- **状态机复制：** SMR 用于在节点之间实现复制。SMR 确保网络上的所有进程接收并处理相同的请求序列。此外，一致性和顺序保证节点接收请求的顺序在所有节点上都是相同的。这两个要求确保了系统中的全序。协议只接受有效的交易。\n\
    \n`Tendermint` 通过满足以下列出的属性来解决共识问题：\n\n- **一致性（Agreement）**：没有两个正确的进程会决定不同的值。\n\
    \n- **终止性（Termination）**：所有正确的进程最终都会决定一个值。\n\n- **有效性（Validity）**：如果一个被决定的值满足一个应用特定的、预先定义的谓词\
    \ `valid( )`，则该值是有效的。\n\n`Tendermint` 中进程的状态转换取决于收到的消息和超时。超时机制保证了活跃性，并防止了无限期的等待。这里假设，在经历一段异步期后，最终会出现一个同步通信期，在此期间所有进程都能够及时通信，确保进程最终能决定一个值。\n\
    \n`Tendermint` 协议有三种类型的消息：提议、预投票和预提交。这些消息可以看作是 PBFT 协议中 PRE-PREPARE、PREPARE 和\
    \ COMMIT 消息的等价物：\n\n- **提议（Proposal）：** 当前轮的领导者使用此消息来提出一个值或区块。\n\n- **预投票（Pre-vote）：**\
    \ 此消息用于对提议的值进行投票。\n\n- **预提交（Pre-commit）：** 此消息也用于对提议的值进行投票。\n\n只有提议消息包含原始值。另外两种消息，预投票和预提交，使用一个代表最初提议值的值标识符。\n\
    \n协议中有三种超时，分别对应每种消息类型：\n\n- `Timeout-propose`\n- `Timeout-prevote`\n- `Timeout-precommit`\n\
    \n这些超时机制防止算法无限期地等待某些条件满足。它们也确保进程能够在一轮一轮中取得进展。一种随着每一新轮次而增加超时时间的机制确保了在到达 GST 之后，正确进程之间的通信最终变得可靠，节点能够达成决策，协议得以终止。\n\
    \n所有进程在协议中维护一些必要的变量：\n\n- **步骤（Step）：** 该变量保存当前轮次中 `Tendermint` 状态机的当前状态。\n\n\
    - **锁定值（lockedValue）：** 该变量存储最近一次（相对于轮次编号）已发送预提交消息的值。\n\n- **锁定轮次（lockedRound）：**\
    \ 该变量保存有关该进程发送非空预提交消息的上一轮的信息，这意味着这是可能决策值被锁定的轮次。这意味着，如果在一个轮次中，针对某个值收到了一条提议消息和相应的\
    \ `2F + 1` 条消息，那么，由于已经为该值接受了 `2F + 1` 个预投票，因此这是一个可能的决策值。\n\n- **有效值（validValue）：**\
    \ `validValue` 变量的作用是存储最近可能的决策值。\n\n- **有效轮次（validRound）：** `validRound` 变量是 `validValue`\
    \ 被更新的上一轮。\n\n- **高度（Height）：** 存储当前的共识实例。\n\n- 当前轮次编号\n\n- 一个决策数组\n\n`Tendermint`\
    \ 按轮次进行。每一轮包含三个阶段：提议、预投票、预提交。算法工作方式如下：\n\n- 每一轮从提议者提出的一个提议值开始。对于每个高度，提议者在第一轮开始时提出一个新值。\n\
    \n- 在随后的任何轮次中，只有在当前没有有效值（即，值为空）的情况下，提议者才会提出新值。否则，会提议 `validValue`（即可能的决策值），该值已在之前的轮次中被锁定。提议消息还包含一个值，指明上一次更新有效值的有效轮次。\n\
    \n- 仅当满足以下条件时，正确的进程才会接受该提议：\n  - 提议的值是有效的。\n  - 该进程尚未锁定任何值。\n  - 或者该进程已锁定一个值。\n\
    \n- 如果前述条件满足，正确的进程将接受该提议并发送一个预投票消息。\n\n- 如果条件不满足，该进程将发送一个值为空的预投票消息。\n\n- 如果一个进程在当前轮次中尚未发送预投票消息，或者提议阶段的计时器到期，则会触发与提议阶段相关联的超时机制。\n\
    \n- 如果一个正确的进程收到了一个包含有效值的提议消息和 `2F + 1` 个预投票消息，它将发送预提交消息。\n\n- 否则，它会发送一个空的预提交。\n\
    \n- 如果与预提交相关联的计时器到期，或者进程在收到提议消息和 `2F + 1` 个预提交消息后尚未发送预提交消息，则会触发与该预提交相关的超时机制。\n\
    \n- 如果一个正确的进程在某个轮次中收到了提议消息，并且收到了针对该提议值 ID 的 `2F + 1` 个预提交消息，它将决定该值。\n\n- 此步骤也有一个相关联的超时机制，确保处理器不会无限期地等待接收\
    \ `2F + 1` 条消息。如果在处理器能够做出决定之前计时器到期，处理器将开始下一轮。\n"
- fmt: '# Tendermint 流程


    当一个处理器最终做出决定时，它会触发针对下一个区块提案的下一个共识实例，并且提案、预投票和预提交的整个周期会再次开始。


    该协议可以简单地描述为一个重复的序列：提案 ➤ 预投票 ➤ 预提交，每次提交后，都会达到一个新的高度并开始新一轮，如图 8-4 所示。


    ![图 8-4](images/515270_1_En_8_Chapter/515270_1_En_8_Fig4_HTML.jpg)


    流程图具有以下流程：新一轮；提案；有效且及时，是；等待预投票，是；等待预提交，是；提交。


    **图 8-4 Tendermint 流程 – 单次运行**


    Tendermint 引入了一种新的终止机制。提案消息使用了两个变量，即`validValue`和`validRound`。当收到有效的提案消息以及随后的相应`2f
    + 1`个预投票消息时，一个正确的进程会更新这两个变量。


    这种终止过程得益于八卦协议和同步假设。例如，假设一个正确的进程在一轮中锁定了一个值。那么所有其他正确的进程会在该轮结束时，使用被锁定的值更新它们的`validValue`和`validRound`变量。基本假设是，一旦一个正确的处理器锁定了这些值，八卦协议会在同一轮内将它们传播到其他节点。每个处理器都会知道锁定的值和轮次，即有效值。现在，当进行下一个提案时，提案者会获取到这些相同的锁定值；由于有效的提案和相应的`2f
    + 1`个预投票消息，提案者已经被锁定。通过这种方式，可以确保进程最终决定的值是满足有效性条件的可接受值。


    至此，我们完成了关于 Tendermint 协议的讨论。接下来，我们将探索 HotStuff，它改进了之前的 PBFT 及其变体协议中的若干局限性。


    # HotStuff


    HotStuff 是一种用于状态机复制的 BFT 协议。多项创新使其成为比传统 PBFT 更优的协议。然而，与 PBFT 类似，它在部分同步环境下工作，基于消息传递网络，要求最小节点数`n
    = 3f + 1`，并依赖于基于领导者的主备方法。它使用可靠且经过认证的通信链路。HotStuff 利用门限签名，所有节点使用单个公钥，但每个副本使用唯一的私钥。使用门限签名降低了通信复杂度。


    HotStuff 引入了一些创新，我们介绍如下。


    ## 线性视图变更


    HotStuff 协议中的视图变更只需要`O(n)`条消息。它是正常运行的一部分，而不是一个独立的子协议。在最坏情况下，如果领导者连续失败，通信成本会增加到`O(n²)`，即二次方复杂度。与
    PBFT 的稳定领导者不同，HotStuff 中的领导者每三轮轮换一次，即使领导者没有失败也是如此。


    简单来说，二次方复杂度意味着算法的性能与输入大小的平方成正比。


    在线性视图变更中，在 GST 之后，任何诚实的被选中的领导者只需要发送`O(n)`个认证者来推动决策，包括领导者失败并选举出新领导者的情况。因此，即使在领导者接连失败的最坏情况下，GST
    之后达成共识的通信成本也是`O(n²)`。


    ## 乐观响应性


    乐观响应性允许任何正确的领导者在 GST 之后只需要前`n - f`个响应即可确保进展，而无需等待来自每个副本的`n - f`个响应。这意味着它以网络速度运行，而不必不必要地等待来自其他节点的更多消息，然后进入下一个阶段。


    ## 链质量


    该属性通过允许频繁的领导者轮换，为系统提供了公平性和活跃性。


    ## 隐藏锁定


    它还解决了隐藏锁定问题。当领导者验证器不等待一轮的到期时间时，就会发生“隐藏锁定”问题。如果我们仅依赖接收`n – f`条消息，最高的锁定可能无法到达领导者。最高锁定值可能保存在另一个副本中，而领导者没有等待该副本的响应，从而导致领导者不知道最高锁定值。如果领导者随后提议一个较低的锁定值，而其他一些节点已经锁定了一个更高的值，这可能导致活跃性问题。节点会等待更高的锁定或相同的锁定回复，但领导者不知道最高锁定值，会继续发送较低的锁定值，从而导致竞态条件和活跃性违规。


    HotStuff 通过在实际锁定轮之前添加一个前导锁定轮解决了这个问题。这里的思路是，如果`2f + 1`个节点接受了前导锁定，领导者将收到它们的响应并获知最高锁定值。因此，现在领导者不必等待`Δ`（delta
    – 消息传递延迟的上限）时间，即可通过`n − f`个响应获知最高锁定值。


    ## 心跳机制（Pacemaker）


    HotStuff 创新性地将安全性和活跃性机制分离开来。安全性通过网络中的参与者的投票和提交规则来确保。另一方面，活跃性由一个称为“心跳机制”的独立模块负责，该模块确保选举出一个新的、正确的且唯一的领导者。此外，心跳机制保证了在
    GST 达成后能够继续取得进展。它的首要职责是将所有诚实的副本和一个唯一的领导者带到共同的高度并维持足够长的时间。为了实现同步，副本会逐步增加它们的超时时间，直到取得进展。由于我们假设一个部分同步模型，这种机制很可能会生效。此外，领导者选举过程基于一个简单的轮换协调器范式，副本遵循特定的调度策略（通常是轮询）来选择新的领导者。心跳机制还确保领导者选择一个副本能够接受的提案。


    ## 更好的参与者组织拓扑


    PBFT 协议以团（网状拓扑）的形式组织节点，导致二次方消息复杂度，而 HotStuff 以星型拓扑组织节点。这种设置使得领导者能够直接向所有其他节点发送消息或从所有其他节点收集消息，从而降低了消息复杂度。简单来说，它使用了一种“一对多”的通信模式。


    如果领导者负责所有这些处理，可能会出现单个领导者负载过高的问题，这可能会拖慢网络速度。


    现在考虑领导者被破坏或妥协的场景。标准的 BFT 容错保证可以处理这种情况。如果领导者提议了一个恶意区块并被怀疑有故障，它将被其他正确的节点拒绝，并且协议将选择一个新的领导者。这种场景可能会暂时拖慢网络，直到新的诚实领导者接管。如果网络中的大多数节点是诚实的，一个正确的领导者最终会接管并提议一个有效的区块。此外，为了增加安全性，领导者通常每隔几轮就在验证器之间进行频繁轮换，这可以抵消任何针对领导者的恶意攻击。此属性确保了公平性，有助于实现链质量。


    PBFT 包含一个正常模式和视图变更模式，当领导者被怀疑有故障时，会触发视图变更。这种方法提供了活跃性保证，但增加了通信复杂度。HotStuff 通过将视图变更过程与正常模式结合来处理这个问题。在
    PBFT 中，节点在视图变更发生前等待`2F+1`条消息，但在 HotStuff 中，视图变更可以直接发生，而无需调用一个独立的子协议。相反，检查用于变更视图的消息阈值成为了正常视图的一部分。'
  raw: '*   When a processor eventually decides, it triggers the next consensus instance
    for the following block proposal, and the entire cycle of a proposal, pre-vote,
    and pre-commit starts again.


    The protocol can be simply depicted as a recurring sequence of proposal ➤ pre-vote
    ➤ pre-commit, and after every commit, a new height is achieved and a new round
    starts, as shown in Figure [8-4](#515270_1_En_8_Chapter.xhtml#Fig4).


    ![](images/515270_1_En_8_Chapter/515270_1_En_8_Fig4_HTML.jpg)


    A flowchart has the following flow. New round; propose; valid and in time, yes;
    wait for pre-votes, yes; wait for pre-commits, yes; commit,


    Figure 8-4


    Tendermint flow – single run


    Tendermint introduced a new termination mechanism. There are two variables, namely,
    `validValue` and `validRound`, used by the proposal message. Both are updated
    by a correct process when receiving a valid proposal message and subsequent corresponding
    2f + 1 pre-vote messages.


    This termination process benefits from the gossip protocol and synchrony assumptions.
    For example, suppose a correct process has locked a value in a round. Then all
    other correct processes will update their `validValue` and `validRound` variables
    with the locked values by the end of the very round during which they were locked.
    The fundamental presumption is that a gossip protocol will propagate them to other
    nodes within the same round once a correct processor has locked these values.
    Each processor will know the locked value and round, that is, the valid values.
    Now, when the next proposal is made, the same locked values will be picked up
    by the proposer, which has already been locked due to the valid proposal and corresponding
    2*f* + 1 pre-vote messages. This way, it can be ensured that the value that processes
    eventually decide upon is acceptable as specified by the validity condition.


    This completes our discussion on the Tendermint protocol. Next, we explore HotStuff,
    which improves on several limitations in previous PBFT and its variant protocols.


    ## HotStuff


    HotStuff is a BFT protocol for state machine replication. Several innovations
    make it a better protocol than traditional PBFT. However, like PBFT, it works
    under partial synchrony in a message-passing network with minimum *n* = 3*f* + 1
    and relies on a leader-based primary backup approach. It utilizes reliable and
    authenticated communication links. HotStuff makes use of threshold signatures
    where all nodes use a single public key, but each replica uses a unique private
    key. The use of threshold signatures results in reduced communication complexity.


    HotStuff introduced some innovations which we introduce as follows.


    ### Linear View Change


    A view change in a HotStuff protocol requires only *O*(*n*) messages. It is part
    of the normal run instead of a separate subprotocol. In a worst-case scenario
    where leaders fail successively, the communication cost increases to *O*(*n*²),
    quadratic. Instead of a stable leader like PBFT, a leader rotation in HotStuff
    occurs every three rounds even if the leader doesn’t fail.


    In simpler words, quadratic complexity means that the algorithm’s performance
    is proportional to the squared size of the input.


    In a linear view change, after GST, any honest selected leader sends only *O*(*n*)
    authenticators to drive a decision, including the case where a leader fails and
    a new one is elected. So even in the worst case where leaders fail one after another,
    the communication cost to reach consensus after GST is *O*(*n*²).


    ### Optimistic Responsiveness


    Optimistic responsiveness allows any correct leader after GST to only need the
    first *n* − *f* responses to ensure progress instead of waiting for *n* − *f*
    from every replica. This means that it operates at network speed instead of waiting
    unnecessarily for more messages from other nodes and move to the next phase.


    ### Chain Quality


    This property provides fairness and liveness in the system by allowing frequent
    leader rotation.


    ### Hidden Lock


    It also solves the hidden lock problem. A “hidden lock” problem occurs when a
    leader validator does not wait for the expiration time of a round. The highest
    lock may not get to the leader if we rely only on receiving *n* – *f* messages.
    The highest locked value may be held in another replica from which the leader
    did not wait to get a response, thus resulting in a situation where the leader
    is unaware of the highest locked value. If a leader then proposes a lower lock
    value and some other nodes already have a higher value locked, this can lead to
    liveness issues. The nodes will wait for a higher lock or the same lock reply,
    but the leader is unaware of the highest lock value and will keep sending a lower
    lock value, resulting in a race condition and liveness violation.


    HotStuff has solved this problem by adding the precursor lock round before the
    actual lock round. The insight here is that if 2*f* + 1 nodes accept the precursor
    lock, the leader will get a response from them and learn the highest locked value.
    So now the leader doesn’t have to wait for *Δ* (delta – an upper bound on a message
    delivery delay) time and can learn the highest lock with *n* − *f* responses.


    ### Pacemaker


    HotStuff innovatively separates the safety and liveness mechanisms. Safety is
    ensured through voting and commit rules for participants in the network. On the
    other hand, liveness is the responsibility of a separate module, called pacemaker,
    which ensures a new, correct, and unique leader is elected. Furthermore, pacemaker
    guarantees progress after GST is reached. The first responsibility it has is to
    bring all honest replicas and a unique leader to a common height for a sufficiently
    long period. For synchronization, replicas keep increasing their timeouts gradually
    until progress is made. As we assume a partially synchronous model, this mechanism
    is likely to work. Also, the leader election process is based on a simple rotating
    coordinator paradigm, where a specific schedule, usually round-robin, is followed
    by replicas to select a new leader. Pacemaker also ensures that the leader chooses
    a proposal that replicas will accept.


    ### Better Participant Organization Topology


    A PBFT protocol organizes nodes in a clique (mesh topology), resulting in a quadratic
    message complexity, whereas HotStuff organizes nodes in a star topology. This
    setting enables the leader to send or collect messages directly to or from all
    other nodes, which results in reduced message complexity. In simpler words, it
    uses a “one-to-all” communication pattern.


    If a leader is responsible for all this processing, the problem of high load on
    a single leader can arise, which can slow down the network.


    Now think of a scenario where the leader gets corrupted or compromised. The standard
    BFT tolerance guarantees address such situations. If a leader proposes a malicious
    block and is suspected faulty, it will be rejected by other correct nodes, and
    the protocol will choose a new leader. This scenario can temporarily slow down
    the network until a new honest leader takes over. If majority of the network is
    honest, a correct leader will eventually take over and propose a valid block.
    Also, for added security, the leader usually is frequently rotated between validators
    every few rounds, which can offset any malicious attacks targeting the leader.
    This property ensures fairness, which helps to achieve chain quality.


    PBFT consists of a normal and view change mode, where a view change triggers when
    a leader is suspected faulty. This approach provides a liveness guarantee but
    increases communication complexity. HotStuff handles this by combining the view
    change process with the normal mode. In PBFT, nodes wait for 2F+1 messages before
    the view change occurs, but in HotStuff, the view change can occur directly without
    invoking a separate subprotocol. Instead, checking the threshold of the messages
    to change the view becomes part of the normal view.'
  trans: '好的，作为高级文档工程师和翻译员，我已根据您提供的注意事项和示例，将给定的英文文本翻译成符合要求的中文文档。



    # Tendermint 流程


    当一个处理器最终做出决定时，它会触发针对下一个区块提案的下一个共识实例，并且提案、预投票和预提交的整个周期会再次开始。


    该协议可以简单地描述为一个重复的序列：提案 ➤ 预投票 ➤ 预提交，每次提交后，都会达到一个新的高度并开始新一轮，如图 8-4 所示。


    ![图 8-4](img/515270_1_En_8_Fig4_HTML.jpg)


    流程图具有以下流程：新一轮；提案；有效且及时，是；等待预投票，是；等待预提交，是；提交。


    **图 8-4 Tendermint 流程 – 单次运行**


    Tendermint 引入了一种新的终止机制。提案消息使用了两个变量，即`validValue`和`validRound`。当收到有效的提案消息以及随后的相应`2f
    + 1`个预投票消息时，一个正确的进程会更新这两个变量。


    这种终止过程得益于八卦协议和同步假设。例如，假设一个正确的进程在一轮中锁定了一个值。那么所有其他正确的进程会在该轮结束时，使用被锁定的值更新它们的`validValue`和`validRound`变量。基本假设是，一旦一个正确的处理器锁定了这些值，八卦协议会在同一轮内将它们传播到其他节点。每个处理器都会知道锁定的值和轮次，即有效值。现在，当进行下一个提案时，提案者会获取到这些相同的锁定值；由于有效的提案和相应的`2f
    + 1`个预投票消息，提案者已经被锁定。通过这种方式，可以确保进程最终决定的值是满足有效性条件的可接受值。


    至此，我们完成了关于 Tendermint 协议的讨论。接下来，我们将探索 HotStuff，它改进了之前的 PBFT 及其变体协议中的若干局限性。


    # HotStuff


    HotStuff 是一种用于状态机复制的 BFT 协议。多项创新使其成为比传统 PBFT 更优的协议。然而，与 PBFT 类似，它在部分同步环境下工作，基于消息传递网络，要求最小节点数`n
    = 3f + 1`，并依赖于基于领导者的主备方法。它使用可靠且经过认证的通信链路。HotStuff 利用门限签名，所有节点使用单个公钥，但每个副本使用唯一的私钥。使用门限签名降低了通信复杂度。


    HotStuff 引入了一些创新，我们介绍如下。


    ## 线性视图变更


    HotStuff 协议中的视图变更只需要`O(n)`条消息。它是正常运行的一部分，而不是一个独立的子协议。在最坏情况下，如果领导者连续失败，通信成本会增加到`O(n²)`，即二次方复杂度。与
    PBFT 的稳定领导者不同，HotStuff 中的领导者每三轮轮换一次，即使领导者没有失败也是如此。


    简单来说，二次方复杂度意味着算法的性能与输入大小的平方成正比。


    在线性视图变更中，在 GST 之后，任何诚实的被选中的领导者只需要发送`O(n)`个认证者来推动决策，包括领导者失败并选举出新领导者的情况。因此，即使在领导者接连失败的最坏情况下，GST
    之后达成共识的通信成本也是`O(n²)`。


    ## 乐观响应性


    乐观响应性允许任何正确的领导者在 GST 之后只需要前`n - f`个响应即可确保进展，而无需等待来自每个副本的`n - f`个响应。这意味着它以网络速度运行，而不必不必要地等待来自其他节点的更多消息，然后进入下一个阶段。


    ## 链质量


    该属性通过允许频繁的领导者轮换，为系统提供了公平性和活跃性。


    ## 隐藏锁定


    它还解决了隐藏锁定问题。当领导者验证器不等待一轮的到期时间时，就会发生“隐藏锁定”问题。如果我们仅依赖接收`n – f`条消息，最高的锁定可能无法到达领导者。最高锁定值可能保存在另一个副本中，而领导者没有等待该副本的响应，从而导致领导者不知道最高锁定值。如果领导者随后提议一个较低的锁定值，而其他一些节点已经锁定了一个更高的值，这可能导致活跃性问题。节点会等待更高的锁定或相同的锁定回复，但领导者不知道最高锁定值，会继续发送较低的锁定值，从而导致竞态条件和活跃性违规。


    HotStuff 通过在实际锁定轮之前添加一个前导锁定轮解决了这个问题。这里的思路是，如果`2f + 1`个节点接受了前导锁定，领导者将收到它们的响应并获知最高锁定值。因此，现在领导者不必等待`Δ`（delta
    – 消息传递延迟的上限）时间，即可通过`n − f`个响应获知最高锁定值。


    ## 心跳机制（Pacemaker）


    HotStuff 创新性地将安全性和活跃性机制分离开来。安全性通过网络中的参与者的投票和提交规则来确保。另一方面，活跃性由一个称为“心跳机制”的独立模块负责，该模块确保选举出一个新的、正确的且唯一的领导者。此外，心跳机制保证了在
    GST 达成后能够继续取得进展。它的首要职责是将所有诚实的副本和一个唯一的领导者带到共同的高度并维持足够长的时间。为了实现同步，副本会逐步增加它们的超时时间，直到取得进展。由于我们假设一个部分同步模型，这种机制很可能会生效。此外，领导者选举过程基于一个简单的轮换协调器范式，副本遵循特定的调度策略（通常是轮询）来选择新的领导者。心跳机制还确保领导者选择一个副本能够接受的提案。


    ## 更好的参与者组织拓扑


    PBFT 协议以团（网状拓扑）的形式组织节点，导致二次方消息复杂度，而 HotStuff 以星型拓扑组织节点。这种设置使得领导者能够直接向所有其他节点发送消息或从所有其他节点收集消息，从而降低了消息复杂度。简单来说，它使用了一种“一对多”的通信模式。


    如果领导者负责所有这些处理，可能会出现单个领导者负载过高的问题，这可能会拖慢网络速度。


    现在考虑领导者被破坏或妥协的场景。标准的 BFT 容错保证可以处理这种情况。如果领导者提议了一个恶意区块并被怀疑有故障，它将被其他正确的节点拒绝，并且协议将选择一个新的领导者。这种场景可能会暂时拖慢网络，直到新的诚实领导者接管。如果网络中的大多数节点是诚实的，一个正确的领导者最终会接管并提议一个有效的区块。此外，为了增加安全性，领导者通常每隔几轮就在验证器之间进行频繁轮换，这可以抵消任何针对领导者的恶意攻击。此属性确保了公平性，有助于实现链质量。


    PBFT 包含一个正常模式和视图变更模式，当领导者被怀疑有故障时，会触发视图变更。这种方法提供了活跃性保证，但增加了通信复杂度。HotStuff 通过将视图变更过程与正常模式结合来处理这个问题。在
    PBFT 中，节点在视图变更发生前等待`2F+1`条消息，但在 HotStuff 中，视图变更可以直接发生，而无需调用一个独立的子协议。相反，检查用于变更视图的消息阈值成为了正常视图的一部分。

    '
- fmt: '#### How It Works


    `HotStuff` is composed of four phases: prepare, pre-commit, commit, and decide
    phases.


    A quorum certificate (`QC`) is a data structure that represents a collection of
    signatures produced by *n* – *f* nodes to indicate that a required threshold of
    messages has been achieved. In other words, a collection of votes from *n* − *f*
    nodes is a `QC`.


    ##### Prepare


    Once a new leader has accumulated new view messages from `N – F` nodes, the protocol
    starts with a new leader. The leader processes these messages to determine the
    latest branch in which the highest quorum certificate of `PREPARE` messages is
    present.


    ##### Pre-commit


    As soon as a leader accumulates `N – F` prepare votes, it creates a quorum certificate
    called “prepare quorum certificate.” The leader broadcasts this certificate to
    other nodes as a `PRE-COMMIT` message. When a node receives the `PRE-COMMIT` message,
    it responds with a pre-commit vote. The quorum certificate indicates that the
    required threshold of nodes has confirmed the request.


    ##### Commit


    When the leader has accumulated `N – F` pre-commit votes, it creates a `PRE-COMMIT`
    quorum certificate and broadcasts it to other nodes as the `COMMIT` message. When
    nodes receive this `COMMIT` message, they respond with their commit vote. At this
    stage, nodes lock the `PRE-COMMIT` quorum certificate to ensure the safety of
    the algorithm even if a view change occurs.


    ##### Decide


    When the leader receives `N – F` commit votes, it creates a `COMMIT` quorum certificate.
    Then, the leader broadcasts this `COMMIT` quorum certificate to other nodes in
    the `DECIDE` message. When nodes receive this `DECIDE` message, they execute the
    request because this message contains an already committed certificate/value.
    The new view starts once the state transition occurs due to the `DECIDE` message
    acceptance and execution.


    We can visualize this protocol in Figure [8-5](#515270_1_En_8_Chapter.xhtml#Fig5).


    ![](images/515270_1_En_8_Chapter/515270_1_En_8_Fig5_HTML.png)


    An illustration of the `HotStuff` protocol includes a network of replicas `R 1`
    to `R 4` in 4 layers, namely, prepare, pre-commit, commit, and decide.


    **Figure 8-5** HotStuff protocol


    More precisely, `HotStuff` steps are listed as follows:


    - A new primary acquires new view messages from `n-f` nodes with the highest prepare
    quorum certificate that each validator receives. The primary looks at these messages
    and finds the prepare `QC` with the highest view (round number). The leader then
    broadcasts the proposal in a prepare message.

    - When other nodes receive this prepare message from the leader, they check if
    the prepare proposal extends the highest prepare `QC` branch and has the higher
    view number associated than what they have currently locked.

    - Other nodes reply to the leader with an acknowledgment.

    - The leader collects the acknowledgments from *n* − *f* prepare votes.

    - When `n-f` votes are acquired by the leader, it combines them into a prepare
    `QC` and broadcasts this `QC` in a pre-commit message.

    - Other replicas reply to the leader with a pre-commit vote. When the leader has
    received `n-f` pre-commit votes from other nodes, the primary combines them into
    a pre-commit `QC` and broadcasts them in a commit message.

    - Replicas reply to the leader with commit votes and replicas lock on the pre-commit
    `QC`. When the leader receives `n-f` commit votes from the replicas, it combines
    them into a commit `QC` and broadcasts the decide message.

    - When the nodes receive a decide message, they execute the operations/commands
    and start the next view.

    - This operation repeats.


    There are other optimizations such as pipelining which allows for further performance
    improvements. As all the phases are fundamentally identical, it’s easy to pipeline
    `HotStuff`, which improves performance. Pipelining allows the protocol to commit
    a client’s request in each phase. In a view, a leader in each phase proposes a
    new client request. This way, a leader can concurrently process pre-commit, commit,
    and decide messages for previous client requests passed on to the last leader
    via the commit certificate.


    ##### Safety and Liveness


    `HotStuff` guarantees liveness by using the pacemaker, which ensures progress
    after `GST` within a bounded time interval by advancing views. This component
    encapsulates view synchronization logic to ensure liveness. It keeps enough honest
    nodes in the same view for sufficiently long periods to ensure progress. This
    property is achieved by progressively increasing the time until progress is made.


    Whenever a node times out in a view, it broadcasts a timeout message and advances
    to the following when a quorum certificate of `2*f* + 1` timeout messages is received.
    This certificate is also sent to the next leader, who takes the protocol further.
    Does this timeout detection sound familiar? It sounds familiar because pacemaker
    abstraction is basically a failure detector that we discussed before in Chapter
    [3](#515270_1_En_3_Chapter.xhtml). Moreover, voting and relevant commit rules
    ensure safety in `HotStuff`.


    `HotStuff` is a simple yet powerful protocol that combines several innovations
    to produce a better protocol than its predecessors.'
