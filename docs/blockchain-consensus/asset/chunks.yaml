- fmt: '# Consensus Using Failure Detectors


    We discussed failure detectors and its different classes earlier in Chapter 3.
    Here, we present the outline of an algorithm called the *Chandra-Toueg consensus
    protocol* to solve consensus using an eventually strong `⋄S` failure detector,
    which is the weakest failure detector for solving consensus [10]. Recall that
    an eventually strong failure detector satisfies strong completeness and eventual
    weak accuracy properties.


    This protocol considers an asynchronous network model with `f < ⌈n/2⌉`, that is,
    with at least `⌈(n+1)/2⌉` correct processes. Less than `n/2` failed process assumption
    allows processes to wait to receive majority responses regardless of what the
    failure detector is suspecting.


    The protocol works in rounds under asynchrony with a rotating coordinator. The
    protocol uses reliable broadcast which ensures that any message broadcast is either
    not received (delivered) at all by any process or exactly once by all honest processes.


    The algorithm works as follows.


    Each process maintains some variables:


    - Estimate of the decision value – proposed value

    - State

    - Process’s current round number

    - Last round in which the process updated its estimate (preference)


    Until the state is decided, the processes go through multiple incrementing asynchronous
    rounds each divided into four phases or subrounds, and coordinators are rotated
    until a decision is reached. Coordinators are chosen in a round-robin fashion
    using the formula `(r mod n) + 1`, where `r` is the current round number, and
    `n` is the total number of processes:


    - Finally, any undecided process that delivers a value via the reliable broadcast
    accepts and decides on that value.


    1. All processes send their estimate (preference) to the current coordinator using
    a message of type `(process id, current round number, estimate, round number when
    the sender updated its estimate)`.

    2. The current coordinator waits to collect a majority `⌈(n+1)/2⌉` estimates and
    chooses the proposed value with the most recent (largest) value of the last updated
    round as its estimate and then proposes the new estimate to all processes.

    3. Each process waits for the new proposal (estimate) from the current coordinator
    or for the failure detector to suspect the current coordinator. If it receives
    a new estimate, it updates its preference, updates the last round variable to
    the current round, and sends the `ack` message to the current coordinator. Otherwise,
    it sends `nack`, suspecting that the current coordinator has crashed.

    4. The current coordinator waits for the `⌈(n+1)/2⌉` – that is, a majority of
    replies from processes, either `ack` or `nack`. If the current coordinator receives
    a majority of acks, meaning `⌈(n+1)/2⌉` has accepted its estimate, then the estimate
    is locked, and the coordinator does a reliable broadcast of the `decide` message
    (decided value).


    Note that there are other algorithms in the paper [10] as well, but I have described
    here only the one that solves consensus using an eventually strong failure detector.


    Now let’s see how agreement, validity, and termination requirements are met.


    The **agreement** is satisfied. Let’s think about a scenario where it is possible
    that two coordinators broadcast, and some processes end up accepting a value from
    the first coordinator and some from the other. This will violate the agreement
    because, here, two processes are deciding differently, that is, two different
    values are both chosen. However, this cannot occur because for the first coordinator
    to send a decision, it must have received enough acknowledgments (acks) from the
    majority of the processes. All subsequent coordinators looking for the majority
    will see an overlap with the previous one. The estimate will be the most recent
    one. As such, any two coordinators broadcasting the decision are sending out the
    same decision.


    **Validity** is also satisfied because every estimate is some process’s input
    value. The protocol design does not allow generating any new estimates.


    The protocol eventually **terminates** because the failure detector, an eventually
    strong failure detector, will eventually stop suspecting some correct process,
    which will eventually become the coordinator. With the new coordinator, in some
    round, all correct processes will wait to receive this new coordinator’s estimate
    and will respond with enough `ack` messages. When the coordinator collects the
    majority of `ack` messages, it will send its decided estimate to all, and all
    processes will terminate. Note that if some process ends up waiting for a response
    from an already terminated process, it will also eventually get the message by
    retransmission through other correct nodes and eventually decide and terminate.
    For example, suppose a process gets stuck waiting for messages from a crashed
    coordinator. Eventually, due to the strong completeness property of the eventually
    strong failure detector, the failed coordinator will be suspected, ensuring progress.


    # Summary


    This chapter covered early protocols that provide a solid foundation for most
    of the consensus research done today. With the advent of blockchains, many of
    these protocols inspired the development of new blockchain age protocols, especially
    for permissioned blockchains. For example, Tendermint is based on the DLS protocol,
    that is, algorithm 2 from the DLS paper.


    We did not discuss every algorithm in this chapter, but this chapter should provide
    readers with a solid foundation to build on further. To circumvent FLP impossibility,
    randomness can be introduced into the system by either assuming the randomized
    model or local coin flips at the processes. The first proposal that assumes a
    randomized model (also called fair scheduling, randomized scheduling) mechanism
    is by Bracha and Toueg [17]. Algorithms based on the second approach where processes
    are provided with a local coin flip operation were first proposed by Ben-Or [2],
    which is the first randomized consensus protocol. The first approach to achieve
    the expected constant number of rounds by using the shared coin (global coin)
    approach implemented using digital signatures and a trusted dealer is published
    in Rabin [14]. Protocols utilizing failure detectors were proposed by Chandra
    and Toueg [15]. An excellent survey of randomized protocols for asynchronous consensus
    is by Aspnes [16].


    Randomized protocols are a way to circumvent an FLP result, but can we refute
    the FLP impossibility result altogether? Sounds impossible, but we’ll see in Chapter
    9 that refuting the FLP result might be possible.


    In the next chapter, we will cover classical protocols such as PBFT, which is
    seen as a natural progression from the viewstamped replication (VR) protocol,
    which we will also introduce in the next chapter. While VR dealt with crash faults
    only, PBFT also dealt with Byzantine faults. We’ll cover other protocols, too,
    such as Paxos, which is the foundation of most if not all consensus protocols.
    Almost all consensus algorithms utilize the fundamental ideas presented in Paxos
    in one way or another.'
