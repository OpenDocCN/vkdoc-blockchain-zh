    ## What Is Blockchain


    There are many definitions of a blockchain on the Internet and many different
    books. While all those definitions are correct, and some are excellent, I will
    try to define the blockchain in my own words.


    First, we’ll define it from a layman’s perspective and then from a purely technical
    standpoint.


    ### Layman’s Definition


    A blockchain is a shared record-keeping system where each participant keeps a
    copy of the chronologically ordered records. Participants can add new records
