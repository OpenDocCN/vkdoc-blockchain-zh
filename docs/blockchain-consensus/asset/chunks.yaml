  trans: '

    ### 分布式系统模型


    系统模型使我们能够抽象地看待分布式系统。它捕获了关于分布式系统行为的假设。它使我们能够定义期望分布式系统具备的某些属性，并对其进行分析。这一切都在抽象层面进行，无需考虑任何技术或实现细节。例如，通信链路抽象仅捕获了这样一个事实：通道允许消息在进程之间传递/交换，而不指定其具体是什么。从实现角度来看，它可能是光纤电缆或电线。


    在分布式系统模型中，我们不关心硬件技术实现的具体细节。例如，进程是一个执行某些事件的节点，我们无需关注确切的硬件或计算机类型。


    在本书中，我们感兴趣的是系统的抽象视图，而非物理基础设施。图 1-14 演示了这一概念。


    ![](img/515270_1_En_1_Fig14_HTML.png)


    两张示意图。左侧有从 P1 到 P11 的互连组件。右侧，P1 到 P11 形成两条线性链，连接到一个网络。


    图 1-14


    物理架构（左）与抽象系统模型（右）


    现在让我们看看分布式系统中三个基本的抽象概念。故障是所有这些抽象概念的特征。我们捕获了关于系统中可能发生何种故障的假设。例如，在分布式系统中，进程或节点可能崩溃或恶意行为。网络可能丢弃消息，或者消息可能被延迟。消息延迟是通过时间假设来捕获的。


    总而言之，在创建分布式系统模型时，我们会对系统的行为做出一些假设。这个过程包括关于进程和网络的时间假设。我们还对网络和处理器的故障做出假设，例如，进程可能如何失败，它是否可能表现出任意故障，攻击者如何影响处理器或网络，以及进程在崩溃后能否崩溃并恢复。网络链路是否可能丢弃消息？在下一节中，我们将详细讨论所有这些场景。


    ### 进程


    进程或节点是分布式系统中的基本元素，它运行分布式算法以实现该分布式系统被设计要达到的共同目标。


    现在想象一下一个进程在分布式系统中能做什么。首先，让我们思考一个正常场景。如果一个进程在没有发生任何故障的情况下按照算法运行，那么它被称为正确进程或诚实进程。因此，在我们的模型中，我们说节点正确运行是节点可能表现出的行为之一。还有什么？是的，当然，它可能会失败。如果一个节点失败，我们说它是故障节点；如果没有，那么它是非故障的、正确的或诚实的。


    进程中可能发生不同类型的故障，例如：


    *   崩溃-停止

    *   遗漏

    *   崩溃后恢复

    *   窃听

    *   任意（拜占庭）


    #### 崩溃-停止故障


    崩溃-停止故障是指进程崩溃并且永远无法恢复。这种故障或节点行为模型捕获了不可修复的硬件故障，例如，主板短路导致故障。


    #### 遗漏故障


    遗漏故障捕获了处理器未能发送消息或接收消息的故障场景。遗漏故障分为三类：发送遗漏、接收遗漏和一般遗漏。发送遗漏是指处理器未能按照分布式算法的要求发送消息；接收遗漏发生在进程未接收到预期消息时。在实际中，这些遗漏是由于物理故障、内存问题、缓冲区溢出、恶意行为和网络拥塞引起的。


    #### 崩溃后恢复


    表现出崩溃后恢复行为的进程可以在崩溃后恢复。它捕获了进程崩溃、丢失其内存状态，但稍后恢复并继续运行的场景。这种情况也可以视为一种遗漏故障，此时节点因为已崩溃而不会发送或接收任何消息。在实际中，这可能是进程的临时有意重启，或某些操作系统错误后的重启。一些例子包括
    Windows 蓝屏或 Linux 内核恐慌后重启并恢复正常运行。


    当进程崩溃时，它可能会丢失其内部状态（称为遗忘），这使得恢复变得棘手。然而，我们可以通过保留稳定存储（日志）来缓解这个问题，它有助于从最后一个已知的良好状态恢复操作。节点在恢复后也可能丢失其所有状态，并且必须与网络的其他部分重新同步。也可能发生节点长时间宕机，与网络的其余部分（其他节点）不同步，并持有其旧的视图状态。在这种情况下，节点必须与网络重新同步。这种情况在比特币或以太坊等区块链网络中尤其常见，节点可能会离线相当长一段时间。当它重新上线时，它会与其余节点重新同步以恢复正常运行。


    #### 窃听


    在这种模型中，分布式算法可能会泄露机密信息，并且攻击者可以窃听以从进程中获取信息。这种模型在区块链等不受信任且地理分散的环境中尤其如此。针对此类攻击的常见防御措施是加密，它通过加密消息来提供机密性。


    #### 任意（拜占庭）


    拜占庭进程可能表现出任何任意行为。它可能以任何可能的方式偏离算法。它可能是恶意的，可能主动试图破坏分布式算法，选择性地遗漏某些消息，或者暗中试图削弱分布式算法。在分布式算法或系统中，这种类型的故障是最复杂和最具挑战性的。在实际中，它可能是一个黑客想出新颖的方法来攻击系统，网络上的病毒或蠕虫，或者其他一些前所未有的攻击。对拜占庭故障节点的行为没有限制；它可以做任何事情。


    一个相关的概念是攻击者模型，其中攻击者的行为被建模。我们将在后面的“攻击者模型”一节中介绍这一点。


    现在我们来看分布式系统模型的另一个方面，网络。


    ### 网络


    在分布式网络中，链路（通信链路）负责传递消息，即从节点获取消息并发送给其他节点。通常，假设节点之间存在双向点对点连接。


    网络分区是指网络链路在两组节点之间的有限时间内变得不可用的场景。在实践中，这可能是由于一个数据中心不与另一个数据中心通信，或者是不正确/无意的，甚至是故意/恶意的防火墙规则禁止了网络的一部分到另一部分的连接。

    '
- fmt: '# Link Failures


    Links can experience crash failure where a correctly functioning link may stop
    carrying messages. Another type of link failure is omission failure, where a link
    carries some messages, and some don''t. Finally, Byzantine failures or arbitrary
    failures can occur on links where the link can create rogue messages and modify
    messages and selectively deliver some messages, and some don''t.


    With this model, we can divide the communication links into different types depending
    on how they fail and deliver the messages.


    Two types of events occur on links (channels), the **send event** where a message
    is put on the link and the **deliver event** where the link dispenses a message,
    and a process *delivers* it.


    ## Fair-Loss Links


    In this abstraction, we capture how messages on this link can be lost, duplicated,
    or reordered. The messages may be lost but eventually delivered if the sender
    and receiver process is correct and the sender keeps retransmitting. More formally,
    the three properties are as follows.


    ### Fair-Loss


    This property guarantees that the link with this property does not systematically
    drop every message, which implies that, eventually, delivery of a message to the
    destination node will be successful even if it takes several retransmissions.


    ### Finite Duplication


    This property ensures that the network does not perform more retransmissions than
    the sender does.


    ### No Creation


    This property ensures that the network does not corrupt messages or create messages
    out of thin air.


    ## Stubborn Links


    This abstraction captures the behavior of the link where the link delivers any
    message sent infinitely many times. The assumption about the processes in this
    abstraction is that both sender and receiver processes are correct. This type
    of link will stubbornly try to deliver the message without considering performance.
    The link will just keep trying regardless until the message is delivered.


    Formally, there are two properties that stubborn links have.


    ### Stubborn Delivery


    This property means that if a message `m` is sent from a correct process `p` to
    a correct process `q` once, it will be delivered infinitely many times by process
    `q`, hence the term "stubborn"!


    ### No Creation


    This means that messages are not created out of the blue, and if a message is
    delivered by some process, then it must have been sent by a process. Formally,
    if a process `q` delivers a message `m` sent from process `p`, then the message
    `m` is indeed sent from process `p` to process `q`.


    ## Perfect (Reliable) Links


    This is the most common type of link. In this link, if a process has sent a message,
    then it will eventually be delivered.


    In practice, `TCP` is a reliable link. There are three properties.


    ### Reliable Delivery


    If a message `m` is sent by a correct process `p` to a correct process `q`, then
    `m` is eventually delivered by `q`.


    ### No Duplication


    A correct process `p` does not deliver a message `m` more than once.


    ### No Creation


    This property ensures that messages are not created out of thin air, and if they
    are delivered, they must have been created and sent by a correct process before
    delivering.


    ## Logged Perfect Links


    This type of link delivers messages into the receiver''s local message log or
    persistent storage. This is useful in scenarios where the receiver might crash,
    but we need the message to be safe. In this case, even if the receiver process
    crashes, the message is not lost because it persisted in the local storage.


    ## Authenticated Perfect Links


    This link guarantees that a message `m` sent from a process `p` to process `q`
    is indeed sent from process `p`.


    ## Arbitrary Links


    In this abstraction, the link can exhibit any behavior. Here, we consider an active
    adversary who has the power to control the messages. This link depicts scenarios
    where an attacker can do malicious actions, modify the messages, replay them,
    or spoof them. In short, on this link, any attack is possible.


    In practical terms, this depicts a typical Internet connection where a hacker
    can eavesdrop, modify, spoof, or replay the messages. But, of course, this could
    also be due to Internet worms, traffic analyzers, and viruses.


    Note: Here, we are talking about point-to-point links only; we will introduce
    broadcast later in Chapter [3](#515270_1_En_3_Chapter.xhtml).


    ## Synchrony and Timing


    In distributed systems, delays and speed assumptions capture the behavior of the
    network.


    In practical terms, delays are almost inevitable in a distributed system, first
    because of inherent asynchrony, dispersion, and heterogeneity and specific causes
    such as message loss, slow processors, and congestion on the network. Due to network
    configuration changes, it may also happen that unexpected or new delays are introduced
    in the distributed system.


    Synchrony assumption in a distributed system is concerned with network delays
    and processor delays incurred by slow network links or slow processor speeds.


    In practical terms, processors can be slow because of memory exhaustion in the
    nodes. For example, Java programs can pause execution altogether during the "stop
    the world" type of garbage collection. On the other hand, some high-end processors
    are inherently faster than low-end processors on resource-constrained devices.
    All these differences and situations can cause delays in a distributed system.


    In the following, we discuss three models of synchrony that capture the timing
    assumption of distributed systems.


    ### Synchronous


    A synchronous distributed system has a known upper bound on the time it takes
    for a message to reach a node. This situation is ideal. However, in practice,
    messages can sometimes be delayed. Even in a perfect network, there are several
    factors, such as network link quality, network latency, message loss, processing
    speed, or capacity of the processors, which can adversely affect the delivery
    of the message.


    In practice, synchronous systems exist, for example, a system on a chip (`SoC`),
    embedded systems, etc.


    ### Asynchronous


    Asynchronous distributed systems are on the other end of the spectrum. In this
    model, there is no timing assumption made regarding the timing. In other words,
    there is no upper bound on the time it takes to deliver a message. There can be
    arbitrarily long and unbounded delays in message delivery or processing in a node.
    The processes can run at different speeds.


    Also, a process can arbitrarily pause or delay the execution or can process faster
    than other processes. You can probably imagine now that distributed algorithms
    designed for such a system can be very robust and resilient. However, many problems
    cannot be solved in an asynchronous distributed system. A whole class of results
    called "impossibility results" captures the unsolvable problems in distributed
    systems. We will look at impossibility results in more detail later in the chapter
    and then in Chapter [3](#515270_1_En_3_Chapter.xhtml). As several types of problems
    cannot be solved in an asynchronous model and the synchronous model is too idealistic,
    we have to compromise. The compromise is called a partially synchronous network.'
