- fmt: "### Addresses and Accounts\n\nUsers are represented by accounts in Bitcoin.\
    \ The Bitcoin address generation process is shown in Figure [4-8](#515270_1_En_4_Chapter.xhtml#Fig8).\n\
    \n![](images/515270_1_En_4_Chapter/515270_1_En_4_Fig8_HTML.jpg)\n\nA flowchart\
    \ of the bitcoin address generation starts with ECDSA private key and ends at\
    \ bitcoin address.\n\n**Figure 4-8** Bitcoin address generation\n\n1. In the first\
    \ step, we have a randomly generated ECDSA private key.\n2. The public key is\
    \ derived from the ECDSA private key.\n3. The public key is hashed using the `SHA-256`\
    \ cryptographic hash function.\n4. The hash generated in step 3 is hashed using\
    \ the `RIPEMD-160` hash function.\n5. The version number is prefixed to the `RIPEMD-160`\
    \ hash generated in step 4.\n6. The result produced in step 5 is hashed using\
    \ the `SHA-256` cryptographic hash function.\n7. `SHA-256` is applied again.\n\
    8. The first 4 bytes of the result produced from step 7 is the address checksum.\n\
    9. This checksum is appended to the `RIPEMD-160` hash generated in step 4.\n10.\
    \ The resultant byte string is encoded into a Base58-encoded string by applying\
    \ the Base58 encoding function.\n11. Finally, the result is a typical Bitcoin\
    \ address.\n\n### Transactions and UTXO Model\n\nTransactions are the fundamental\
    \ unit of operation in Bitcoin. Every transaction is composed of at least one\
    \ input and output. An unspent transaction output (`UTXO`) is the basic unit of\
    \ bitcoin transactions. The transaction inputs refer to the previous transaction’s\
    \ `UTXO`s. The transaction output represents the transfer of ownership of unspent\
    \ values. The account balance in bitcoin for an account is the sum of all unspent\
    \ outputs belonging to that account. Therefore, `UTXO` always must have equal\
    \ inputs and outputs.\n\nA bitcoin transaction consumes inputs and creates outputs\
    \ with specified values. Every input is an output from a previous transaction.\
    \ This transaction model is shown in Figure [4-9](#515270_1_En_4_Chapter.xhtml#Fig9).\n\
    \n![](images/515270_1_En_4_Chapter/515270_1_En_4_Fig9_HTML.png)\n\nA flowchart\
    \ of the bitcoin transaction `UTXO` model. The flow is 10 BTC, transaction `t`,\
    \ 5 and 2 BTC, transaction `t+1`, and unspent transaction output.\n\n**Figure\
    \ 4-9** Bitcoin transaction `UTXO` model\n\nThe Bitcoin transaction life cycle\
    \ is described as follows:\n\n- A user creates a transaction.\n- The transaction\
    \ is signed by the owner(s) using the private key.\n- The transaction is broadcast\
    \ to the network using the gossip protocol.\n- All nodes verify the transaction\
    \ and place it in their transaction pools.\n- Miner nodes bundle up these transactions\
    \ into a candidate block.\n- Mining starts and one of the miners that solves the\
    \ proof-of-work problem wins the right to announce its block and earn bitcoins\
    \ as a reward.\n- Once the block is broadcast to the network, it is propagated\
    \ across the entire Bitcoin network.\n- After six confirmations (six blocks),\
    \ the transaction is considered irrevocably final; however, it is possible to\
    \ accept transactions even after the first confirmation.\n\nA transaction is made\
    \ up of several fields. Table [4-1](#515270_1_En_4_Chapter.xhtml#Tab1) shows all\
    \ fields and their description.\n\n**Table 4-1** Bitcoin transaction\n\n| Field\
    \ | Description | Size |\n| --- | --- | --- |\n| Version no | Currently 1 | 4\
    \ bytes |\n| Flag | Witness data indicator | Optional 2-byte array |\n| In-counter\
    \ | Number of inputs | 1–9 bytes |\n| List of inputs | Inputs | Many inputs |\n\
    | Out-counter | Number of outputs | 1–9 bytes |\n| List of outputs | Outputs list\
    \ | Many outputs |\n| Witnesses | List of witnesses | Variable |\n| lock_time\
    \ | Block height or timestamp until transaction is pending | 4 bytes |\n\nTransactions\
    \ are of two types. On-chain transactions are native to the Bitcoin network, and\
    \ off-chain transactions are performed outside the blockchain network. On-chain\
    \ transactions occur on the blockchain network and are validated on-chain by network\
    \ participants, whereas off-chain transactions use payment channels or sidechains\
    \ to perform transactions. On-chain transactions are slower, have privacy issues,\
    \ and are not scalable. Off-chain mechanisms aim to solve these issues. One prime\
    \ example is the Bitcoin lightning network, which provides faster payments.\n\n\
    ### Bitcoin Script and Miniscript\n\nA Bitcoin script is a non-Turing complete,\
    \ stack-based language which is used to describe how bitcoins should be transferred.\
    \ The scripts are evaluated from left to right in a LIFO stack. Scripts are composed\
    \ of two components, elements and operations, as shown in Figure [4-10](#515270_1_En_4_Chapter.xhtml#Fig10).\
    \ Elements represent data such as digital signatures, and operations are the actions\
    \ that are performed by the script. Operations are coded as opcodes. Opcodes include\
    \ operational categories such as flow control, stack operations, bitwise logical\
    \ operations, arithmetic, cryptography operations, and lock time.\n\nSome common\
    \ opcodes are listed as follows:\n\n- `OP_CHECKSIG`: Takes a signature and a public\
    \ key and verifies the transaction’s ECDSA signature. If correct, then 1 is returned,\
    \ otherwise 0.\n- `OP_DUP`: Takes the top item on the stack and duplicates it.\n\
    - `OP_HASH160`: Calculates the SHA-256 and then RIPEMD 160-bit hash of the input.\n\
    - `OP_EQUAL`: Checks the equality of the top two items on the stack. Outputs `TRUE`\
    \ if equal, otherwise `FALSE`, on the stack.\n- `OP_VERIFY`: Checks if the top\
    \ item on the stack is false; if it is, the script terminates and outputs failure.\n\
    - `OP_EQUALVERIFY`: First runs `OP_EQUAL` and then `OP_VERIFY`.\n- `OP_RETURN`:\
    \ Terminates the script, outputs fail, and marks the transaction invalid.\n- `OP_ADD`:\
    \ Takes two inputs and performs sum operation.\n\nA script is a combination of\
    \ a locking script called `ScriptPubKey` and an unlocking script called `ScriptSig`,\
    \ as shown in Figure [4-10](#515270_1_En_4_Chapter.xhtml#Fig10). Outputs are locked\
    \ by `ScriptPubKey`, which contains the unlocking conditions for the output. In\
    \ other words, locking means giving bitcoins to someone, and unlocking means consuming\
    \ the received bitcoins.\n\n![](images/515270_1_En_4_Chapter/515270_1_En_4_Fig10_HTML.jpg)\n\
    \nA diagram of the bitcoin script is segmented into consuming bitcoins labeled\
    \ `ScriptSig` plus sending bitcoins labeled `ScriptPubKey`.\n\n**Figure 4-10**\
    \ Bitcoin script (unlocking + locking) diagram\n\nThere are several types of scripts\
    \ in Bitcoin. The most common is Pay-to-Public-Key-Hash (P2PKH), which is used\
    \ to send a transaction to a bitcoin address. The format of this script is shown\
    \ as follows:\n\n```\nScriptPubKey: OP_DUP OP_HASH160  OP_EQUALVERIFY OP_CHECKSIG\n\
    ScriptSig:  \n```\n\nBoth `ScriptPubKey` and `ScriptSig` are combined and executed,\
    \ as shown in Figure [4-11](#515270_1_En_4_Chapter.xhtml#Fig11).\n\n![](images/515270_1_En_4_Chapter/515270_1_En_4_Fig11_HTML.jpg)\n\
    \nA table for bitcoin P2PKH script execution has two columns for `ScriptSig` and\
    \ `ScriptPubKey` and three rows for script, stack, and execution.\n\n**Figure\
    \ 4-11** Bitcoin P2PKH script execution\n\nWhile the bitcoin script is the original\
    \ method of transferring payments, and it works well, it is not much flexible.\
    \ There is a language developed for bitcoin which supports development of smart\
    \ contracts. The language is called `Ivy`. A solution to make writing scripts\
    \ easier and in a more structured way is the bitcoin `miniscript`."
