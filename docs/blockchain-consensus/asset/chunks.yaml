- fmt: "# 7. Classical Consensus\n\nConsensus and replication protocols that appeared\
    \ in the 1980s have made profound contributions in consensus protocol research.\
    \ Early replication protocols like viewstamped replication provided deep insights\
    \ into how fault-tolerant replication can be designed and implemented. Around\
    \ the same time, Paxos was introduced, which offered a practical protocol with\
    \ rigorous formal specification and analysis. In 1999, the first practical Byzantine\
    \ fault–tolerant protocol was introduced. This chapter covers these classical\
    \ protocols in detail, their design, how they work, and how they provide safety\
    \ and liveness guarantees. Moreover, some ideas on how and if we can use them\
    \ in the blockchain are also presented. Additionally, recently developed protocols\
    \ such as RAFT are also discussed, which builds on previous classical protocols\
    \ to construct an easy-to-understand consensus protocol.\n\n## Viewstamped Replication\n\
    \nA viewstamped replication approach to replicate among peers was introduced by\
    \ Brian Oki and Barbara Liskov in 1988. This is one of the most fundamental mechanisms\
    \ to achieve replication to guarantee consistency (consistent view) over replicated\
    \ data. It works in the presence of crash faults and network partitions; however,\
    \ it is assumed that eventually nodes recover from crashes, and network partitions\
    \ are healed. It is also a consensus algorithm because to achieve consistency\
    \ over replicated data, nodes must agree on a replicated state.\n\nViewstamped\
    \ replication has two primary purposes. One is to provide a distributed system\
    \ which is coherent enough that the clients see that as if they are communicating\
    \ with a single server. The other one is to provide state machine replication.\
    \ State machine replication requires that all replicas start in the same initial\
    \ state and operations are deterministic. With these requirements (assumptions),\
    \ we can easily see that if all replicas execute the same sequence of operations,\
    \ then they will end up in the same state. Of course, the challenge here is to\
    \ ensure that operations execute in the same order at all replicas even in the\
    \ event of failures. So, in summary the protocol provides fault tolerance and\
    \ consistency. It is based on a primary backup copy technique.\n\nThere are three\
    \ subprotocols in the viewstamped replication (VR) protocol:\n\n- **Normal operation\
    \ protocol**: Handles client requests and achieves replication under normal conditions\n\
    - **View change protocol**: Handles primary failure and starts a new view with\
    \ a new primary\n- **Replica recovery protocol**: Handles rejoining of a failed\
    \ replica that has now recovered\n\nVR is inspired by the two-phase commit protocol,\
    \ but unlike the two-phase commit, it’s a failure-resilient protocol and does\
    \ not block if the primary (coordinator in 2PC terminology) or replicas fail.\
    \ The protocol is reliable and ensures availability if no more than `f` replicas\
    \ are faulty. It uses replica groups of `2f + 1` and tolerates crash failures\
    \ under asynchrony with `f+1` quorum sizes.\n\nEvery replica maintains a state\
    \ which contains information such as configuration, replica number, current view,\
    \ current status – normal or view change or recovering, assigned `op` number to\
    \ the latest request, log containing entries which contain the requests received\
    \ so far with their op numbers, and the client table which consists of the most\
    \ recent client request, with status if it has been executed or not and associated\
    \ result for that request.\n\nLet’s see how the normal operation works in VR.\
    \ First, let’s see the list of variables and their meanings:\n\n- `op`: Client\
    \ operation\n- `c`: Client ID\n- `s`: Number assigned to the request\n- `v`: View\
    \ number known to the client\n- `m`: Message received from the client\n- `n`:\
    \ The op number assigned to the request\n- `i`: Nonprimary replica\n- `x`: Result\n\
    \n### Protocol Steps\n\n1. A client sends a request message of the form `<REQUEST\
    \ op, c, s, v>` message to the primary replica.\n\n2. When received by the primary\n\
    \   1. It increments the op number.\n   2. It adds the request message at the\
    \ end of the log.\n   3. It sends a `<PREPARE m, v, n>` to other replicas.\n\n\
    3. When replicas receive the prepare message, they do the following:\n   1. The\
    \ prepare message is only accepted if all previous requests preceding the op number\
    \ in the prepare message have entries in their log.\n   2. Otherwise, they wait\
    \ until the missing entries are updated – via state transfer.\n   3. They append\
    \ the request to their log.\n   4. They send the `<PREPAREOK v, n, i>` message\
    \ to the primary replica.\n\n4. The primary waits for `f` `PREPAREOK` messages\
    \ from other replicas; when received, it\n   1. Considers the operation to be\
    \ committed\n   2. Executes any pending operations\n   3. Executes the latest\
    \ operation\n   4. Sends the message `<REPLY v, s, x>` to the client\n\n5. After\
    \ the commit, the primary replica informs other replicas about the commit.\n\n\
    6. Other replicas execute it after appending it in their log but only after executing\
    \ any pending operations.\n\nThis process is visualized in Figure [7-1](#515270_1_En_7_Chapter.xhtml#Fig1).\n\
    \n![](images/515270_1_En_7_Chapter/515270_1_En_7_Fig1_HTML.png)\n\nA diagram of\
    \ the VR protocol has lines for client, primary, replica 1 and 2. The lines are\
    \ phased into request, prepare, prepare work, and reply.\n\n**Figure 7-1** – VR\
    \ protocol – normal operation\n\nWhen the primary fails, the view change protocol\
    \ initiates. Failure is indicated by timeout at replicas:\n\n- `v`: View number\n\
    - `l`: Replica’s log/new log\n- `k`: The op number of the latest known committed\
    \ request that the replica is aware of\n- `I`: Replica identifier"
