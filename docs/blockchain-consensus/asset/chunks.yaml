  trans: "\n# 排版后的文本\n\n-   `t`: 待证明目标检查点的哈希值\n-   `h(s)`: 源检查点的高度\n-   `h(t)`: 目标检查点的高度\n\
    -   `S`: 发送方对整个投票消息的签名\n\n验证者创建投票消息，对其进行签名，并广播到网络。检查点的哈希值用于标识对应的检查点。只有当 `s` 在检查点树中是\
    \ `t` 的祖先节点，且验证者的公钥存在于验证者集合中时，该投票才是有效的。当超过三分之二的验证者对从源到目标的一条链进行投票时，该链或链接就成为了**绝对多数链接**。例如，以\
    \ `cp'` 为源，`cp` 为目标，则 `cp' → cp` 是绝对多数链接。如果一个检查点是创世区块，或者它是一条已证明的检查点所在的绝对多数链接中的一个检查点，那么该检查点就是**已证明的**(justified)。准确地说，我们可以表述为：如果存在一条绝对多数链接\
    \ `cp' → cp`，且 `cp'` 是已证明的，那么检查点 `cp` 就是已证明的。如果一个检查点 `cp` 是已证明的，并且存在一条绝对多数链接 `cp\
    \ → cp'`，其中 `cp'` 是检查点 `cp` 的直接子节点，那么该检查点就被认为是**最终确认的**(final)。\n\n已证明的检查点不被视为最终确认，因为可能存在冲突的已证明检查点。为了最终确认一个检查点\
    \ `cp`，需要进行第二轮的确认，即 `cp` 的直接子节点 `cp'` 通过绝对多数链接 `cp → cp'` 被证明。\n\n## 协议步骤\n\n\
    -   代币持有者在网络中存入一笔质押金。\n-   在一个共识周期内：\n    -   识别有效的检查点。\n-   将它们添加到检查点树中。\n- \
    \  广播对某个检查点对（源，目标）的投票。\n-   评估接收到的投票的有效性，根据罚没规则和投票签名者的质押金进行检查。\n-   如果该检查点对获得了超过总质押金三分之二的支持，则该检查点被视为已验证。\n\
    -   该检查点对被证明并最终确认。\n-   重复此过程。\n\n本质上，该过程分三步进行。首先，对某个检查点进行投票；如果获得了超过 2/3 的投票，则该检查点进入已证明状态。最后，链被最终确认以形成规范链。证明并不等同于最终确认；在区块树中可能存在多个已证明的链。当两个连续的检查点都获得\
    \ 2/3 的投票时，就达成了最终确认。\n\n## 安全性与活性\n\n任何违反这些条件的验证者都将受到罚没其质押金的处罚。这些被称为最低罚没条件：\n\n\
    -   验证者不得发布针对同一目标检查点高度的两个不同投票。\n-   验证者不得在其另一个现有投票的源到目标范围内再次投票。\n\n有两个安全性与活性要求：\n\
    \n-   可追责安全性\n-   可行的活性\n\n可追责安全性与传统共识协议中的安全性要求略有不同。安全性简单地意味着，除非超过三分之一的验证者偏离协议，否则两个冲突的检查点永远无法被最终确认。可追责性意味着行为不端的验证者可以被识别并受到处罚。\n\
    \n可行的活性意味着，只要存在扩展已最终确认链的子节点，就总能添加绝对多数链接以产生新的已最终确认检查点。\n\n## 总结\n\n本章讨论了比特币之后出现的区块链时代协议。区块链共识协议有多种类型；有些基于投票，有些是工作量证明，另一类是权益证明协议。所有这些协议都具备一定的安全性和活性属性，以确保协议在给定环境中是正确且能正常运行的。我们在本章中讨论了其中几个要点。这些协议的对比总结将在最后一章，即第\
    \ 10 章中给出。\n\n我们还详细讨论了诸如 ETHASH、权益证明及其不同类型、以及包括 HotStuff 和 Tendermint 在内的 BFT\
    \ 变体等协议。本章还介绍了现代协议，如 Casper FFG、Solana 的历史证明协议、以及 Polkadot 的 GRANDPA 和 BABE 协议。在本章中不可能涵盖所有协议，但至少提供了足够的信息来帮助理解区块链中使用的不同类型的算法。我们未涉及的一些其他协议，例如\
    \ PoET、HoneyBadger BFT 和 Snow，将在最后一章中简要介绍。\n\n该领域是一个非常活跃的研究领域，学术界和工业界的许多研究者对此都非常感兴趣。因此，我们期待该领域在未来会进一步发展和进步。\n\
    \n在下一章中，我们将讨论另一个激动人心的话题——量子共识，这是随着量子计算的出现而近期兴起的一个课题。\n\n# 9. 量子共识\n\n本章涵盖量子共识。在解释什么是量子共识之前，将首先对量子计算及其优势进行基础介绍，以帮助理解量子计算机的工作原理。此外，还会涉及量子网络、量子互联网、量子密码学和量子区块链等主题。然后我们将讨论量子共识，解释其定义、量子计算如何影响经典网络和量子网络中的经典共识，以及量子计算如何增强现有的分布式共识协议。我们还将综述研究界迄今为止取得的成果以及一些开放的研究问题。\n"
- fmt: '# Introduction


    The roots of the idea to combine quantum mechanics and information theory can
    be traced back to as early as the 1970s. In 1979, Paul Benioff proposed a theoretical
    foundation of quantum computing. In 1982, Richard Feynman gave a lecture in which
    he argued that classical computers cannot possibly perform calculations that describe
    quantum phenomena. Classical computers are inherently limited, and to simulate
    quantum phenomena, the computing device must also be based on quantum principles,
    thus allowing quantum mechanical simulations and calculations which otherwise
    are not possible in the classical computing world. This was received well, and
    many researchers started working on this.


    In 1985, David Deutsch proposed a universal quantum computer and indicated that
    it might perform simultaneous operations using quantum superposition. He also
    suggested the “Deutsch algorithm,” which could determine if a quantum coin is
    biased with a single toss. After this, an interest sparked again but soon waned.
    However, quantum computing came into the limelight when Peter Shor, in 1994, described
    a quantum algorithm that could factorize large numbers quickly. This event sparked
    a lot of interest because primarily Internet security is based on RSA, which uses
    prime factorization as a hard problem for its security. More precisely, it is
    computationally infeasible to factor large prime numbers on classical computers,
    which gives RSA its security. However, this can be done efficiently with quantum
    computers, thus breaking RSA, hence the security on the Internet. Of course, we
    can imagine, this was big news. In 1996, Grover introduced his quantum search
    algorithm, which further renewed the researchers’ interest in quantum computing.
    Almost 28 years later, we are at the stage where some companies have claimed quantum
    supremacy. Many researchers from academia and industry are working on quantum
    computing, and it now appears that quantum computing is at a stage where classical
    computing was in the 1960s. It will become mainstream in a decade or so in most
    large organizations, if not everywhere. Perhaps, quantum computers may not become
    a household reality soon. Still, one thing is clear; quantum computing is evolving
    rapidly and will start to impact (good or bad) quite soon on our daily lives.


    Quantum computers use ideas from various fields, including computer science, engineering,
    quantum mechanics, physics, mathematics, and information theory. Several subjects
    have emerged from this, such as quantum information science and technology (QIST),
    a merger of quantum mechanics and information technology.


    Quantum information science (QIS) is a subject at the intersection of computer
    science, information theory, and quantum mechanics. QIS changes how we fundamentally
    think about information processing and results in novel ways to solve previously
    unsolvable computationally complex problems. A quantum computer stores and processes
    data fundamentally differently from classical computing, where 0s and 1s are used
    to encode data. This difference in how the information is processed in quantum
    computers opens the door to achieving significant speedup to solve complex problems.


    # What Is a Quantum Computer?


    A quantum computer is a device that makes use of properties of quantum mechanics
    to perform computations. Classical computers mimic calculations that humans can
    perform and are good at solving general day-to-day problems. However, many problems
    are still unsolvable on classical computers, called “intractable problems.” These
    problems include modelling of natural phenomena such as atomic particle behavior
    and modelling climate change and many others. A simple example of a complex problem
    could be when you organize ten people around a table for dinner. It turns out
    that there are 3,628,800^([⁵](#fn5)) ways to solve this. A brute-force way is
    to calculate factorial.


    Another problem is the travelling salesman problem, which is an NP hard problem.
    This problem aims to find the shortest route for a round trip among multiple cities.


    We can solve many complex problems on classical computers, and we have supercomputers
    available that can solve problems very fast, such as everyday math, algebra problems,
    etc. However, the intractable problems are not solvable on even modern supercomputers.
    This is where quantum computers come in. Especially in combinatorial optimization
    problems where even supercomputers fail, quantum computers provide a way to solve
    them.


    Optimization problems are problems which try to find the best solution from all
    feasible solutions. Quantum computers are good at solving these types of problems
    where a large state space is explored.


    Efficiently simulating molecules can help in new drug discovery. This problem
    of simulation of molecules is difficult because all variations in the way atoms
    behave with each other and even a small change in the way a single atom is positioned
    impact all other atoms. Such problems where exponentially many variations exist
    are expected to be solvable on quantum computers. Also, this information cannot
    be held on a classical computer, as we don’t have such amount of space available.


    For example, a caffeine molecule is composed of 24 atoms, but representing that
    requires `10^48` bits, which makes this problem intractable on a classical computer;
    however, a quantum computer can handle this information in 160 qubits.


    Route optimization of delivery companies is an exciting application where the
    aim is to find optimized routes in order to minimize fuel usage while still able
    to deliver a greater number of packages.


    Quantum computing applications are vast, including but not limited to cryptography,
    machine learning, data analysis, computational biology, simulating chemistry,
    and quantum simulation.


    An application in chemistry helps to discover new materials and compounds, new
    drugs, and improvements in fertilizer production, which leads to better agriculture.
    In cybersecurity, better and secure key generation and distribution mechanisms
    and novel cryptology (cryptography and cryptanalysis) can be realized. Optimization
    problems such as efficient route discovery, risk management in financial investments,
    and a lot more are expected to be solvable by Quantum computers.


    Quantum computing has many applications and thus the excitement and race to achieve
    quantum supremacy. Quantum supremacy or quantum advantage is the empirical demonstration
    of solving a problem that no classical computer can solve in a reasonable amount
    of time.


    There are several building blocks which are necessary to understand the quantum
    computing world. We describe them as follows:


    *   Qubit

    *   Superposition

    *   Entanglement

    *   Teleportation'
  raw: '## Introduction


    The roots of the idea to combine quantum mechanics and information theory can
    be traced back to as early as the 1970s. In 1979, Paul Benioff proposed a theoretical
    foundation of quantum computing. In 1982, Richard Feynman gave a lecture in which
    he argued that classical computers cannot possibly perform calculations that describe
    quantum phenomena. Classical computers are inherently limited, and to simulate
    quantum phenomena, the computing device must also be based on quantum principles,
    thus allowing quantum mechanical simulations and calculations which otherwise
    are not possible in the classical computing world. This was received well, and
    many researchers started working on this.


    In 1985, David Deutsch proposed a universal quantum computer and indicated that
    it might perform simultaneous operations using quantum superposition. He also
    suggested the “Deutsch algorithm,” which could determine if a quantum coin is
    biased with a single toss. After this, an interest sparked again but soon waned.
    However, quantum computing came into the limelight when Peter Shor, in 1994, described
    a quantum algorithm that could factorize large numbers quickly. This event sparked
    a lot of interest because primarily Internet security is based on RSA, which uses
    prime factorization as a hard problem for its security. More precisely, it is
    computationally infeasible to factor large prime numbers on classical computers,
    which gives RSA its security. However, this can be done efficiently with quantum
    computers, thus breaking RSA, hence the security on the Internet. Of course, we
    can imagine, this was big news. In 1996, Grover introduced his quantum search
    algorithm, which further renewed the researchers’ interest in quantum computing.
    Almost 28 years later, we are at the stage where some companies have claimed quantum
    supremacy. Many researchers from academia and industry are working on quantum
    computing, and it now appears that quantum computing is at a stage where classical
    computing was in the 1960s. It will become mainstream in a decade or so in most
    large organizations, if not everywhere. Perhaps, quantum computers may not become
    a household reality soon. Still, one thing is clear; quantum computing is evolving
    rapidly and will start to impact (good or bad) quite soon on our daily lives.


    Quantum computers use ideas from various fields, including computer science, engineering,
    quantum mechanics, physics, mathematics, and information theory. Several subjects
    have emerged from this, such as quantum information science and technology (QIST),
    a merger of quantum mechanics and information technology.


    Quantum information science (QIS) is a subject at the intersection of computer
    science, information theory, and quantum mechanics. QIS changes how we fundamentally
    think about information processing and results in novel ways to solve previously
    unsolvable computationally complex problems. A quantum computer stores and processes
    data fundamentally differently from classical computing, where 0s and 1s are used
    to encode data. This difference in how the information is processed in quantum
    computers opens the door to achieving significant speedup to solve complex problems.


