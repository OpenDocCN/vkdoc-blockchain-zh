    The key requirement in a blockchain is to totally order the transactions. If all
    participants are known and the scale is limited to a few nodes, then we can use
    traditional consensus like BFT; however, with thousands of unknown nodes, traditional
    BFT cannot be used. The proof of work consensus mechanism addresses this issue.


    There is a scalability vs. performance trade-off [6] that comes up when comparing
    traditional BFT with PoW, as shown in Figure [5-1](#515270_1_En_5_Chapter.xhtml#Fig1).


    ![](images/515270_1_En_5_Chapter/515270_1_En_5_Fig1_HTML.png)


    A graph plots performance versus node scalability. It has 3 horizontal parallel
    lines. The top line is A B F T at y equals 10000.


    Figure 5-1


    Performance vs. scalability


    The proof of work or Nakamoto consensus protocol is a Byzantine fault–tolerant
    protocol because it can tolerate arbitrary faults. It can be seen as an **eventual
    Byzantine agreement** mechanism.


    ### How PoW Works


    Let’s first define some of the requirements of PoW. Indeed, proof of work was
    originally introduced in Bitcoin without any rigorous documentation or proofs
    of correctness. Here, for clarity and easier understanding, we will list some
    of the requirements (almost retrospectively) and see if PoW fulfills those requirements
    and how:


    *   **Consistency**: New blocks are replicated to all nodes.


    *   **Linked with previous block**: A log is maintained in such a way that each
    new entry is linked with the previous entry forming a chain.


    *   **Permissionless and open participation**: Nodes can join without any access
    control and can leave without notice.


    *   Partition tolerance.


    *   Geographically dispersed.


    *   Thousands of nodes allowed where anyone anywhere in the world can download
    a client and become part of the network by running the client.


    *   Highly adversarial environment, so Byzantine fault tolerance is of prime importance.


    *   Heterogenous where a number of different types of computers and hardware devices
    can join.


    *   Asynchronous in the sense that there is no bound on the CPU or communication
    delays, just an eventual guarantee that messages are expected to reach all nodes
    with high probability.


    The question is, how do you design a consensus protocol for such a difficult environment?
    Yet, Bitcoin PoW has stood the test of time, and apart from some limited and carefully
    orchestrated attacks and some inadvertent bugs, largely the Bitcoin network has
    been running without any issues for the last 13 years. How? I’ll explain now.'
  trans: '

    # 首个区块链共识机制


    工作量证明共识算法（即中本聪共识）最早于 2008 年随比特币区块链问世。它本质上是一种领导者选举算法，要求在两次选举之间强制执行随机等待时间。这种机制同时也是抵御女巫攻击的手段。传统分布式共识协议的一个弱点在于，它们要求每个参与者在协议中都是已知且可识别的。例如，在`PBFT`中，所有参与者必须已知且可识别。这种限制（尽管在联盟链中有用）使得
    BFT 类协议在某种程度上不适用于公有链。原因在于攻击者可以创建多个身份，并利用这些节点/身份为自己投票。这便是所谓的女巫攻击。如果我们能让在区块链上创建并使用身份的行为成本高昂，那么这种设置就能挫败任何女巫攻击的企图，阻止攻击者通过创建大量虚假身份来控制网络。


    “女巫攻击”一词源自 1973 年出版的一本名为《*女巫*》（Sybil）的书，书中主角名叫西比尔·多塞特（Sybil Dorsett），患有多重人格障碍。


    首个工作量证明由 Dwork 和 Naor 于 1992 年提出[1]。这项工作旨在打击垃圾邮件，通过为发送电子邮件关联计算成本（即定价函数），形成一种访问控制机制——只有通过计算一个中等难度的函数才能获得资源访问权，从而防止过度使用。工作量证明也曾出现在
    Adam Back 的 Hashcash 提案[10]中。


    区块链中引入工作量证明的核心直觉是，普遍降低所有参与者的提案速度，这实现了两个目标：第一，它使所有参与者能就一个共同且一致的视图达成共识；第二，它使女巫攻击变得极其昂贵，从而有助于维护区块链的完整性。


    已有研究表明，即使网络中只有一个拜占庭节点，在参与者匿名的情况下达成一致也是不可能的（不可能性结果）[2]。这是因为女巫攻击可以创建任意数量的身份，通过多次投票来为攻击者操纵系统。只有找到阻止此类攻击的方法，系统才能按预期工作；否则，攻击者可以创建任意多的身份来攻击系统。这一难题在实际中通过工作量证明共识（即中本聪共识）得到了解决[3]。在比特币之前，利用中等难度谜题在匿名网络中分配身份的想法最早由
    Aspnes 提出[4]。然而，Aspnes 提出的解决方案需要认证通道，而比特币使用的是非认证通信，且谜题是非交互式且可公开验证的。


    因此，即使在经典文献中存在上述不可能性结果的情况下，中本聪共识依然诞生了，它首次展示了在无许可模式下也能达成共识。


    请回想我们在第 3 章中讨论过的随机预言机。在工作量证明中，哈希函数被用来实例化随机预言机。由于哈希函数的输出足够长且具有随机性，攻击者无法预测未来的哈希值或引发哈希碰撞。这些特性使得`SHA-256`成为工作量证明机制中哈希函数的理想选择。


    区块链的一个关键需求是交易的全局排序。如果所有参与者都是已知的，且规模仅限于少数节点，那么我们可以使用像 BFT 这样的传统共识；然而，面对成千上万个未知节点，传统
    BFT 就无法胜任了。工作量证明共识机制解决了这个问题。


    如图 5-1 所示，在比较传统 BFT 与 PoW 时，存在一个可扩展性与性能之间的权衡[6]。


    ![](img/515270_1_En_5_Fig1_HTML.png)


    一张图表显示了性能与节点可扩展性的关系。图表包含三条水平平行线。最上面的线对应 ABFT，位于 y 轴值为 10000 处。


    **图 5-1** 性能与可扩展性对比


    工作量证明（即中本聪共识协议）是一种拜占庭容错协议，因为它能够容忍任意类型的故障。它可以被视为一种最终拜占庭共识机制。


    ## PoW 的工作原理


    我们先来定义 PoW 的一些要求。实际上，工作量证明最初在比特币中引入时，并没有附带任何严谨的文档或正确性证明。此处，为了清晰和易于理解，我们将（几乎是事后地）列出一些要求，并检验
    PoW 是否以及如何满足这些要求：


    - **一致性**：新区块会被复制到所有节点。

    - **与前一区块链接**：日志的维护方式使得每个新条目都与前一条目链接，形成一条链。

    - **无许可且开放参与**：节点无需任何访问控制即可加入，也可随时离开。

    - **分区容忍性**。

    - **地理分散性**。

    - **允许数千个节点加入**，世界任何地方的人都可以下载客户端并运行它，从而成为网络的一部分。

    - **高度对抗环境**，因此拜占庭容错至关重要。

    - **异构性**，允许各种不同类型的计算机和硬件设备加入。

    - **异步性**，即对 CPU 或通信延迟没有限制，只保证消息最终有高概率到达所有节点。


    问题是，如何为如此艰难的环境设计一个共识协议？然而，比特币 PoW 经受住了时间的考验。除了少数有限且精心策划的攻击以及一些无意的错误外，比特币网络在过去
    13 年里基本运行顺畅，没有出现任何重大问题。这是如何做到的？接下来我将进行解释。'
- fmt: '### Pedagogical Explanation of PoW


    Imagine a scenario where a node has proposed a block and has broadcast it to the
    network. The nodes that receive it can do either of two things. Either they can
    accept the block and append it to a local blockchain, or they can reject it if
    the block is not valid. Now also imagine the block is indeed valid, then the receiving
    nodes can simply accept it and agree on the proposed block. Imagine there is only
    a proposer node ever in the entire system, and that node is honest and trustworthy.
    This means that there is no real consensus required; the proposer node simply
    proposes new blocks, and nodes agree to it, resulting in an eventual total order
    of blocks containing transactions. But this is a centralized system with a trusted
    third party that, if it stays honest, as a leader, can drive the whole system
    because everyone trusts it. What if it turned malicious, then it’s a problem?


    Perhaps, we can allow other nodes to propose as well, to take away control from
    that single node, which is not trustworthy. Imagine that we now have two nodes
    proposing valid blocks and broadcasting them on the network. Now there is a problem;
    some of the receiving nodes will add one block and then the other. Some wouldn’t
    know which one to accept or which to reject. Proposals are made at the same time,
    and now nodes don’t know which block to insert; perhaps, they will insert both.
    Now some nodes have inserted blocks from proposer 1 and the others from proposer
    2 only and some from both. As you can imagine, there is no consensus here.


    Imagine another scenario where two nodes simultaneously announce a block; now
    the receiving nodes will receive two blocks, and instead of one chain, there are
    now two chains. In other words, there are two logs and histories of events. Two
    nodes proposed a block at the same time; all nodes added two blocks. Now it is
    no longer a single chain, it is a tree, with two branches. This is called a fork.
    In other words, if nodes learn about two different blocks pointing to the same
    parent at the same time, then the blockchain forks into two chains.


    Now in order to resolve this, we can allow nodes to pick the longest chain of
    blocks at that time that they know of and add the new block to that chain and
    ignore the other branch. If it so happens that there are two or more branches
    somehow with the same height (same length), then just pick up randomly one of
    the chains and add the new block to it. This way, we can resolve this fork. Now
    all nodes, knowing this rule that only the longest chain is allowed to have new
    blocks, will keep building the longest chain. In the case of two or more same
    height chains, then just randomly add the block to any of these. So far, so good!
    This scheme appears to work. A node decides to add the new block into a randomly
    chosen chain and propagates that decision to others, and other nodes add that
    same block to their chains. Over time, the longest chain takes over, and the shorter
    chain is ignored because no new blocks are added to it, because it’s not the longest
    chain.


    But now there is another problem. Imagine a situation where a node randomly chooses
    one chain after a fork, adds a block to it, propagates that decision to others,
    other nodes add as well, and, at this point, some nodes due to latency don’t hear
    about the decision. Some nodes add the block they heard from another node to one
    of its chains, another one does the opposite, and this cycle repeats. Now you
    can clearly see that there are two chains, both getting new blocks. There is no
    consensus. There is a livelock situation where nodes can keep adding to both chains.


    At this point, let’s think about what the fundamental reason is and why this livelock
    is occurring. The reason is that blocks are generating too fast, and other nodes
    receive many different blocks from different nodes, some quickly, some delayed.
    This asynchrony results in a livelock. The solution? Slow it down! Give nodes
    time to converge to one chain! Let’s see how.


    We can introduce a random waiting period, which will make miners to arbitrarily
    sleep for some time and then mine. The key insight here is that the livelock (continuous
    fork) problem can be resolved by introducing a variable speed timer at each node.
    When a node adds a new block to its chain, it stops its timer and sends it to
    other nodes. Other nodes are waiting for their timers to expire, but during that
    waiting time, if they hear about this new block from another node, they simply
    stop their timers and add this new block and reset the timers and start waiting
    again. This way, there will only be one block added to the chain, instead of two.
    If the timers are long enough, then chances of forking and livelocking decrease
    significantly. Another thing to note here is that if there are many nodes in the
    system, then there is a higher chance that some timer will expire soon, and as
    we keep adding more and more nodes, the probability of such occurrences increases
    because timers are random and there are many nodes now. In order to avoid the
    same livelock situations, we need to increase the sleeping time of these timers
    as we add more nodes, so that the probability of adding a block by nodes quickly
    is decreased to such a level that only one node will eventually succeed to add
    a new block to their chain and will announce that to the network. Also, the waiting
    period ensures with high probability that forks will be resolved during this waiting
    time. It is enough time to ensure complete propagation of a new valid block so
    that no other block for the same height can be proposed.


    Bitcoin chooses this timeout period based on the rate of block generation of 2016
    blocks, which is roughly two weeks. As the block generation should be roughly
    a single block every ten minutes, if the protocol observes that the block generation
    has been faster in the last two weeks, then it increases the timeout value, resulting
    in slower generation of blocks. If the protocols observe that the block generation
    has been slower, then it decreases the timeout value. Now one problem in this
    timeout mechanism is that if a single node turns malicious and always manages
    to somehow make its timer expire earlier than other nodes, this node will end
    up creating a block every time. Now the requirement becomes to build a timer which
    is resistant to such cheating. One way of doing this is to build a trusted mechanism
    with some cryptographic security guarantees to act as a secure enclave in which
    the timer code runs. This way, due to cryptographic guarantees, the malicious
    node may not be able to trick the time into always expiring first.


    This technique is used in the `PoET` (proof of elapsed time) algorithm used in
    Hyperledger Intel Sawtooth blockchain. We will discuss this in Chapter [8](#515270_1_En_8_Chapter.xhtml).'
