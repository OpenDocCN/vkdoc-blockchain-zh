    the basis of the elliptic curve discrete logarithm problem (ECDLP).


    Consider an elliptic curve E, with two elements P and Q. The discrete logarithm
    problem is to find the integer d, where 1 <  = *d* <  =  # *E*, such that


    ![$$ P+P+\dots +P= dP=Q $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equs.png)


    Here, *Q* is the public key (a point generated on the curve, (x, y)), and *d*
    is the private key (another point on the curve). The public key is a random multiple
    of the generator point *P*, whereas the private key is the integer d that is used
    to generate the multiple. The Generator point or base point G is a point on the
    curve that generates a cyclic subgroup, which means that every point in the group
    can be reached by repeated addition of the base point.


    #E represents the order of the group (elliptic curve), which means the number
    of points that are present in the cyclic subgroup of the elliptic curve. A cyclic
    group is formed by a combination of points on the elliptic curve and the point
    of infinity. Cofactor *h* is the number of points in the curve divided by the
    order of the subgroup.


    The initial starting point *P* is a public parameter, and the public key *Q* is
    also published, whereas d, the private key, is kept secret. If d is not known,
    it is unfeasible to calculate with only the knowledge of Q and P, thus creating
    the hard problem on which ECDLP is built.


    A key pair is linked with the specific domain parameters of an elliptic curve.
    Domain parameters are public values that are required to implement ECC schemes.
    These parameters are represented as a tuple {*p*, *a*, *b*, *G*, *n*, *h*}:


    *   *P*: Field (modulo prime)


    *   *a*, *b*: Fixed elliptic curve coefficients


    *   *G*: The generator point to generate a cyclic group


    *   *n*: Order of the group (curve)


    *   *h*: Cofactor


    For example, Bitcoin uses the SECP256k1 curve with the equation *y*² = *x*³ + 7
    and domain parameters as defined here: [`https://en.bitcoin.it/wiki/Secp256k1`](https://en.bitcoin.it/wiki/Secp256k1).


    The most used curves are NIST proposed curves, such as P-256\. Other curves include
    Curve25519, Curve1174, and many more. Of course, it is advisable to choose a safe
    curve. An excellent resource of safe and unsafe curves along with explanations
    is maintained online here: [`https://safecurves.cr.yp.to`](https://safecurves.cr.yp.to).


    ## Digital Signatures


    Public key cryptography is used to create digital signatures. It is one of the
    most common applications of public key cryptography. In this section, we will
    discover how RSA, ECDSA, and Schnorr signatures work. Concepts such as aggregate
    signatures and multisignatures, also commonly used in blockchains, will be introduced.


    Digital signatures provide a means of associating a message with an entity from
    which the message has originated. Digital signatures are used to provide data
    origin authentication and nonrepudiation.


    Digital signatures are used in consensus algorithms and especially in blockchain
    networks to sign the transactions and messages sent by a user on the blockchain
    network. Blocks are sealed cryptographically using a digital signature so that
    the recipient can verify the authenticity of the transmitted block. Similarly,
    all transactions are signed as well. It is common in consensus algorithms that
    blocks are sealed and broadcast to the network that recipients (other nodes) receive,
    who verifies the signature to ascertain the block’s authenticity. The blocks are
    inserted into the local blockchain after verification.


    Digital signatures have three security properties: authenticity, unforgeability,
    and nonreusability.


    ### Authenticity


    This means that the digital signatures are verifiable by the receiving party.


    ### Unforgeability (Nonrepudiation)


    This property guarantees that only the message’s sender can sign using the private
    key. Digital signatures must also protect against forgery. Forgery means an adversary
    fabricating a valid signature for a message without access to the legitimate signer’s
    private key. In other words, unforgeability implies that no one else can produce
    the signed message produced by a genuine sender.


    ### Nonreusability


    This property necessitates that the digital signature cannot be separated from
    a message and used again for another message. In other words, the digital signature
    is firmly bound to the corresponding message and cannot be separated from its
    original message and attached to another.


    The process of signing and verification using digital signatures is shown in Figure
    [2-15](#515270_1_En_2_Chapter.xhtml#Fig15).


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig15_HTML.png)


    A 2-part flowchart of the signing and verification process has the flow from data
    to signed data and the flow from signed data to hash, respectively.


    Figure 2-15


    Digital signing (left) and verification process (right)


    First, we produce the hash of the data for which we want to prove data origin
    authentication. Then we encrypt the hash using the prover’s private key (signing
    key) to create a “signature” and attach it with the data. Finally, this signed
    object is sent to the verifier.


    The verifier decrypts the encrypted hash of the data using the signer’s (sender)
    public key to retrieve the original hash. The verifier then takes the data and
    hashes it again through the hash function to produce the hash. If both these hashes
    match, the verification is successful, proving that the signer indeed signed the
    data. It also proves the data origin authentication, along with nonrepudiation
    and data integrity properties.


    Now we describe how ECDSA (elliptic curve digital signature algorithm) works.'
  trans: "\n### 标量点乘\n\n该操作用于将椭圆曲线上的一个点乘以一个给定的整数，例如整数 `d` 和点 `P`。我们通过重复将 `P` 相加 `d`\
    \ 次来得到 `dP`，如下所示：\n\n![$$ P+P+\\dots +P= dP $$](img/515270_1_En_2_Chapter_TeX_Equq.png)\n\
    \n该操作用于在基于 ECC 的密码系统中生成公钥。这是一个计算开销非常高的过程，因为需要反复执行点加和倍点运算来计算：\n\n![$$ Q= dP $$](img/515270_1_En_2_Chapter_TeX_Equr.png)\n\
    \n其中，`P` 是曲线上的一个点，`d` 是随机选择的用作私钥的整数，`Q` 是乘法运算后得到的公钥。\n\n提高点乘速度是一个活跃的研究领域。虽然有许多算法可以加速标量乘法，这里我们用双倍与加算法描述一个快速示例。该算法结合了点加和倍点操作来实现性能提升。\n\
    \n例如，如果仅使用加法来得到 `9P`，我们必须执行 `P + P + P + P + P + P + P + P + P` 操作，如果 `P` 的数量增加，这种方法很快就会变得不切实际。我们可以使用双倍与加机制来加快速度。这里，我们首先将九转换为二进制。从最高有效位开始，对于每个为\
    \ 1 的位，执行双倍和加法操作；对于每个为零的位，仅执行双倍操作。我们不对最高有效位执行任何操作。九的二进制是 `1001`，因此对于每个位，我们得到（从左到右）`P`、`2P`、`4P`、`8P+P`。这种方案只需要三次双倍运算和一次加法运算就能得到\
    \ `9P`，而不是九次加法运算。\n\n### 椭圆曲线离散对数问题\n\n现在考虑 `dP` 操作会在曲线上生成另一个点 `Q`。即使我们知道点 `P`\
    \ 和 `Q`，在计算上也无法重构出我们为计算数字 `d` 而执行的所有双倍和加法操作的序列。即使有人知道 `P` 和 `Q`，他们也找不到 `d`。这意味着它是一个单向函数。这是椭圆曲线离散对数问题的基础。\n\
    \n考虑一个椭圆曲线 `E`，以及两个元素 `P` 和 `Q`。离散对数问题是要找到满足以下条件的整数 `d`（其中 `1 <= d <= #E`）：\n\n\
    ![$$ P+P+\\dots +P= dP=Q $$](img/515270_1_En_2_Chapter_TeX_Equs.png)\n\n这里，`Q`\
    \ 是公钥（曲线上生成的一个点 `(x, y)`），`d` 是私钥（曲线上的另一个点）。公钥是生成点 `P` 的一个随机倍数，而私钥是用于生成该倍数的整数\
    \ `d`。生成点或基点 `G` 是曲线上一个能够生成循环子群的点，这意味着该群中的每一个点都可以通过反复添加基点来得到。\n\n`#E` 代表群的阶，即椭圆曲线循环子群中存在的点的数量。循环群是由椭圆曲线上的点和无穷远点组合而成。余因子\
    \ `h` 是曲线上的点数除以子群的阶得到的值。\n\n起始点 `P` 是一个公共参数，公钥 `Q` 也会公开，而私钥 `d` 则保密。如果不知道 `d`，仅凭\
    \ `Q` 和 `P` 的知识是无法计算出 `d` 的，这就构成了 ECDLP 所基于的难题。\n\n一个密钥对与椭圆曲线的特定域参数相关联。域参数是实施\
    \ ECC 方案所需的公共值。这些参数用一个元组 `{p, a, b, G, n, h}` 表示：\n\n*   `p`：域（模素数）\n*   `a`、`b`：固定的椭圆曲线系数\n\
    *   `G`：用于生成循环群的生成点\n*   `n`：群的阶\n*   `h`：余因子\n\n例如，比特币使用 `SECP256k1` 曲线，其方程为\
    \ `y² = x³ + 7`，域参数定义如下：[`https://en.bitcoin.it/wiki/Secp256k1`](https://en.bitcoin.it/wiki/Secp256k1)\n\
    \n最常用的曲线是 NIST 提出的曲线，例如 `P-256`。其他曲线包括 `Curve25519`、`Curve1174` 等等。当然，建议选择安全的曲线。一个关于安全与不安全曲线及其解释的优秀资源在此处在线维护：[`https://safecurves.cr.yp.to`](https://safecurves.cr.yp.to)\n\
    \n## 数字签名\n\n公钥密码学用于创建数字签名。这是公钥密码学最常见的应用之一。在本节中，我们将了解 RSA、ECDSA 和 Schnorr 签名是如何工作的。还将介绍在区块链中常用的聚合签名和多重签名等概念。\n\
    \n数字签名提供了一种将消息与其来源实体关联起来的方法。数字签名用于提供数据源认证和不可否认性。\n\n数字签名用于共识算法，尤其是在区块链网络中，用于签署用户在区块链网络上发送的交易和消息。区块使用数字签名以密码学方式进行密封，以便接收方能够验证所传输区块的真实性。同样，所有交易也会被签名。在共识算法中，常见的做法是，区块被密封并广播到网络，接收节点接收后，验证签名以确定区块的真实性。验证通过后，区块会被插入到本地区块链中。\n\
    \n数字签名具有三个安全属性：真实性、不可伪造性和不可重用性。\n\n### 真实性\n\n这意味着数字签名可以被接收方验证。\n\n### 不可伪造性\n\
    \n此属性保证只有消息的发送者才能使用私钥进行签名。数字签名还必须能够防止伪造。伪造是指攻击者在没有合法签名者私钥的情况下，为某条消息伪造一个有效的签名。换句话说，不可伪造性意味着没有人能生成由真正的发送者产生的已签名消息。\n\
    \n### 不可重用性\n\n此属性要求数字签名不能与一条消息分离，并再次用于另一条消息。换句话说，数字签名与其对应的消息紧密绑定，不能与其原始消息分离并附加到另一条消息上。\n\
    \n使用数字签名的签名和验证过程如图 2-15 所示。\n\n![](img/515270_1_En_2_Fig15_HTML.png)\n\n一个由两部分组成的签名和验证流程图，分别显示了从数据到已签名数据的流程，以及从已签名数据到哈希的流程。\n\
    \n**图 2-15**  \n数字签名（左）和验证过程（右）\n\n首先，我们为想要证明其数据源认证的数据生成哈希。然后，我们使用证明者的私钥加密该哈希，以创建一个“签名”，并将其附加到数据上。最后，这个已签名的对象被发送给验证者。\n\
    \n验证者使用签名者的公钥解密数据的加密哈希，以检索原始哈希。然后，验证者获取数据，并通过哈希函数再次对其进行哈希，以生成哈希值。如果这两个哈希值匹配，则验证成功，证明签名者确实签署了该数据。这也证明了数据源认证，以及不可否认性和数据完整性属性。\n\
    \n现在，我们描述 ECDSA（椭圆曲线数字签名算法）是如何工作的。\n"
- fmt: "### ECDSA Signatures\n\n`ECDSA` is a DSA based on elliptic curves. The DSA\
    \ is a standard for digital signatures. It is based on modular exponentiation\
    \ and the discrete logarithm problem. It is used on Bitcoin and Ethereum blockchain\
    \ platforms to validate messages and provide data integrity services.\n\nNow,\
    \ we’ll describe how `ECDSA` works.\n\nTo sign and verify using the `ECDSA` scheme,\
    \ first a key pair needs to be generated:\n\n1. Define an elliptic curve `E` with\
    \ the following:\n   * Modulus `P`\n   * Coefficients `a` and `b`\n   * A generator\
    \ point `A` that forms a cyclic group of prime order `q`\n\n2. Choose an integer\
    \ `d` randomly such that `0 < d < q`.\n\n3. Calculate the public key `B` so that\
    \ `B = dA`.\n   * The public parameters are a sextuple in the form shown here:\n\
    \n     ```\n     Kpb = (p, a, b, q, A, B)\n     ```\n\n   * The private key is\
    \ a randomly chosen integer `d` in step 2:\n\n     ```\n     Kpr = d\n     ```\n\
    \nNow, the signature can be generated using the private and public keys.\n\n1.\
    \ An ephemeral key `Ke` is chosen, where `0 < Ke < q`. Also, ensure that `Ke`\
    \ is random and that no two signatures end up with the same key; otherwise, the\
    \ private key can be calculated.\n\n2. A value `R` is calculated using `R = Ke\
    \ * A`, that is, by multiplying `A` (the generator point) and the random ephemeral\
    \ key.\n\n3. Initialize a variable `r` with the `x` coordinate value of point\
    \ `R` so that `r = xR`.\n\n4. The signature can now be calculated as follows:\n\
    \n   ```\n   s = (h(m) + d·r) * Ke^(-1) mod q\n   ```\n\nHere, `m` is the message\
    \ for which the signature is calculated, and `h(m)` is the hash of the message\
    \ `m`.\n\n* `Xp = r mod q` means a valid signature.\n* `Xp ≠ r mod q` means an\
    \ invalid signature.\n\n5. Signature verification is carried out as follows:\n\
    \   * A value `w` is calculated as `w = s^(-1) mod q`.\n   * A value `u1 = w *\
    \ h(m) mod q`.\n   * A value `u2 = w * r mod q`.\n   * Calculate point `P`:\n\n\
    \     ```\n     P = u1 * A + u2 * B\n     ```\n\n6. Verification is carried out\
    \ as follows:\n   * `r, s` is accepted as a valid signature if the `x` coordinate\
    \ of point `P` calculated in step 5 has the same value as the signature parameter\
    \ `r mod q`; that is:\n\n     ```\n     xP == r mod q\n     ```\n\nThis completes\
    \ our introduction to digital signatures and especially `ECDSA`. `ECDSA` is quite\
    \ commonly used in blockchain networks, including Bitcoin, Ethereum, and several\
    \ enterprise chains. Now we describe some other digital signature variations.\n\
    \n### Multisignatures\n\nIn this scheme, multiple unique keys held by their respective\
    \ owners are used to sign a single message. In blockchain implementations, multisignature\
    \ schemes allow multiple users to sign a transaction, which results in increased\
    \ security. Moreover, in blockchain networks, these schemes can be used so that\
    \ users can set the condition of at least one or more than one signature to authorize\
    \ transactions.\n\nFor example, a 1-of-2 multisignature scheme can represent a\
    \ joint account where either one of the joint account holders is required to authorize\
    \ a transaction by signing it. In another variation, a 2-of-2 multisignature can\
    \ be used where both joint account holders’ signatures must authorize the transaction.\
    \ This concept is generalized as m-of-n signatures, where m is the minimum number\
    \ of expected signatures and n is the total number of signatures.\n\nThis process\
    \ is shown in Figure 2-16.\n\n![An illustration of the signing and verification\
    \ process has transaction X by users 1 to n and verification by the verifier,\
    \ respectively.](images/515270_1_En_2_Chapter/515270_1_En_2_Fig16_HTML.png)\n\n\
    **Figure 2-16** Multisignature scheme\n\nFigure 2-16 shows the signing process\
    \ on the left-hand side, where m is the number of different users, and holding\
    \ m unique signatures signs a single transaction. When the validator or verifier\
    \ receives it, all the signatures in it need to be individually verified.\n\n\
    ### Threshold Signatures\n\nThis scheme does not rely on users to sign the message\
    \ with their individual keys; instead, it requires only one public key and one\
    \ private key to produce the digital signature. In a multisignature scheme, the\
    \ signed message contains digital signatures from all signers. It requires verification\
    \ individually by the verification party, but the verifier must verify only one\
    \ digital signature in threshold signatures. The key idea in this scheme is to\
    \ split the private key into multiple parts, and each signer keeps its share of\
    \ the private key. The signing process requires each user to use their respective\
    \ share of the private key to sign the message. A particular communication protocol\
    \ manages the communication between the signers.\n\nIn contrast with multisignatures,\
    \ the threshold signatures result in smaller transaction sizes and are faster\
    \ to verify. A downside, however, is that for threshold signatures to work, all\
    \ signers must remain online. In multisignature schemes, the signatures can be\
    \ delivered asynchronously. In other words, users can provide signatures whenever\
    \ available. One downside is that there could be a situation where users may withhold\
    \ their signature maliciously, resulting in a denial of service. We can also use\
    \ threshold signatures to provide anonymity in a blockchain network, as individual\
    \ signers are unidentifiable in multisignature schemes.\n\nFigure 2-17 shows the\
    \ signing process on the left-hand side, where an m number of different users,\
    \ holding different parts (shares) of a digital signature, sign a single transaction.\
    \ When the validator or verifier receives it, only one signature needs to be verified.\n\
    \n![An illustration of the signing and verification process has transaction X\
    \ by users 1 to n and verification by the verifier, respectively.](images/515270_1_En_2_Chapter/515270_1_En_2_Fig17_HTML.png)\n\
    \n**Figure 2-17** Threshold signatures"
