- fmt: '# Asynchronous


    All messages are eventually delivered but have no fixed upper bound on message
    delivery time. The message delivery delay is finite, but no time bound is assumed
    on it.


    `Adversaries` are primarily of two types, a static adversary and an adaptive adversary.
    A static adversary performs corruption before the protocol executes, whereas an
    adaptive adversary can cause corruption anytime during the execution of the protocol.
    There are two crash models, a crash failure model and a Byzantine failure model.
    Round-based algorithms have a send step, receive step, and compute step, which
    make one round.


    We can think of several aspects of consensus protocols that we can use to study,
    evaluate, or classify them:


    * **Fault tolerance/resilience level**: BFT or CFT.

    * **Time complexity**: How long the protocol takes to run and how many message
    delays.

    * **Message complexity**: What is the message complexity of the protocol in terms
    of the number of messages exchanged?

    * **Trusted setup**: Does the protocol need any setup like PKI or no dealer is
    required?

    * What is the adversary strength assumed in the model? Is it bounded or unbounded?
    What is the adversary corruption model? Is it static or adaptive?

    * What is the network model? Synchronous, asynchronous, or partially synchronous
    and its variations.

    * Is the protocol probabilistic or deterministic?

    * Does it use any cryptography?

    * **Computational assumptions**: Information-theoretic security or computational
    security.

    * **Membership**: Dynamic or fixed, permissioned, or public.


    Such questions are useful to ask when analyzing a consensus protocol.


    Just two more points to remember about consensus algorithms are as follows:


    1. Consensus algorithms aim to reach consensus on a single value, whereas SMR
    uses a consensus algorithm to decide on a sequence of operations for replication.

    2. Remember that `PoW` is not a consensus algorithm. It is a Sybil resistance
    mechanism; the consensus is reached via the choice of longest chain. Similarly,
    `PoS` is not a consensus algorithm. It is also a Sybil resistance mechanism, but
    decision on the canonical truth (choice of fork) is made by a BFT-style algorithm.
    We can think of it as a coupled mechanism where `PoS` is a Sybil control mechanism,
    whereas fork selection and finalization are done via a BFT-style algorithm. Similarly,
    `PoH` in Solana is a sequencing of events mechanism (an event orderer) which also
    allows for leader selection in a trustless manner; however, the decision on the
    final chain is made by voting on forks by a BFT-style algorithm called `TowerBFT`.


    ## Research Directions


    Blockchain consensus is a very ripe area for research. Even though tremendous
    progress has been made, still there are a few open research problems which should
    be addressed. Some of these problems are listed as follows, with possible direction
    of research:


    * Most blockchain protocols, especially permissioned blockchain protocols, are
    based on `PBFT`. However, the world is evolving, and since 1999, when `PBFT` was
    introduced, a lot has changed. There have been attempts to use `PBFT` in blockchains
    by modifying it to blockchain needs, and it does work, but efficiency and scalability
    are still issues that need to be addressed. The future of the blockchain is multichain
    and heterogeneous. Also, there will be all sorts of different devices ranging
    from computers to lightweight resource-constrained IoT systems or mobile devices.
    Such a heterogeneous network requires another consensus mechanism that can withstand
    millions of heterogeneous devices with an asynchronous network. Cross-chain transactions
    and consensus are another aspect that needs further research. Some research on
    asynchronous BFT protocols has resulted in `HoneyBadger BFT` and `BEAT`, and,
    of course, we can do more. Similarly, `Casper FFG`, `Casper CBC`, `GRANDPA`, and
    `BABE` are the steps in the right direction for a multichain heterogeneous future.
    However, significant work still needs to be done.


    * As the blockchain technology evolves, so do the adversaries. There is a possibility
    of novel attack techniques, which, due to possible economic incentives on blockchains,
    can manifest sooner rather than later. This is so because concerned parties are
    willing to invest with the hope that new novel techniques for hacking blockchain
    networks will result in immediate revenue.


    * The use of quantum computing to enhance the classical results is an interesting
    topic. For example, a quantum computer can run in parallel with a classical distributed
    network or a blockchain. The quantum computer can elect a leader using the W state–based
    quantum leader election algorithm (discussed in Chapter `9`) and pass the result
    on to the classical blockchain/distributed network. Such techniques can improve
    the security and efficiency of existing classical networks.


    * Classical permissioned network–related results cannot be directly applied to
    the permissionless settings; therefore, a need to modify those protocols to suit
    the blockchain world is needed. Some work is already done, for example, `Casper
    FFG` is inspired by `PBFT`.


    * Scalability and privacy of consensus protocols is an area of extreme importance.
    Privacy has two facets in the blockchain world: transaction value confidentiality
    and hiding users’ identities participating on the network. Scalability is concerned
    with node scalability as well as transaction throughput.


    * Mechanism design is a branch of microeconomics and built on the concept of game
    theory that studies how to design protocols that use incentivization to encourage
    rational actors to behave correctly. It is also called reverse game theory. It
    starts with an outcome and studies how entities in the system can work collaboratively
    to achieve a desired goal. As blockchains are cryptoeconomic incentive systems,
    much can be learned from the field of mechanism design. We can apply techniques
    and methods from the field of mechanism design to develop novel blockchain protocols
    that are robust.


    ## Summary


    In this last chapter, we summarized what we learned throughout this book. We also
    covered the algorithms that we did not before, especially new consensus protocols
    such as Avalanche and Ebb-and-Flow protocols. We also touched upon some research
    directions which require further work. We have come a long way from the Byzantine
    generals problem to Nakamoto consensus and now multichain consensus protocols.
    This is such a ripe area for research that we’ll only see more progress in it
    with more innovative ideas in the future.


    In this book, we have explored the foundations of a blockchain and distributed
    consensus. We learned what impact quantum computing can have on distributed consensus
    and how an agreement could be achieved in quantum networks. Blockchain consensus
    is possibly the strongest area for research in the blockchain.


    Thank you for staying with me in this wonderful journey. You are now capable of
    applying the knowledge from this book as a blockchain researcher and continuing
    your learning and research in the field of blockchain consensus.'
