    B = {3, 4, 5}

    ```


    集合`A`和`B`的并集是：


    ```

    S = {1, 2, 3, 4, 5}

    ```


    两个集合`A`和`B`的笛卡尔积是所有有序对`(a, b)`的集合。它记为`A × B`。它是对于每个`a ∈ A`和`b ∈ B`的所有有序对`(a, b)`的集合。


    有序对由两个用括号括起来的元素组成，例如`(1, 2)`或`(2, 1)`。请注意，在有序对中元素的顺序很重要，而在集合中元素的顺序无关紧要。例如，`(1,
    2)`与`(2, 1)`不同，但`{1, 2}`和`{2, 1}`是相同的集合。


    前面给出的集合`A`和`B`的笛卡尔积`A × B`的一个示例如下：


    ```

    {(1,3), (1,4), (1,5), (2,3), (2,4), (2,5), (3,3), (3,4), (3,5)}

    ```


    注意，在有序对中，第一个元素取自集合`A`，第二个元素取自集合`B`。


    ### 关系


    两个集合`A`和`B`之间的（二元）**关系**是笛卡尔积`A × B`的一个子集。


    两个元素之间的关系是二元的，可以表示为一组有序对。我们可以将其表示为`a R b`（中缀表示法）或`(a, b) ∈ R`，即有序对`(a, b)`在关系`R`中。


    当集合`S`上的二元关系具有自反性、对称性和传递性等性质时，它被称为**等价关系**。


    当集合`S`上的二元关系具有自反性、反对称性和传递性三个性质时，它被称为`S`上的**偏序**。


    ### 偏序


    **偏序**是集合`S`的元素之间的一个二元关系`≤`（用于比较的小于或等于）。集合`S`上的一个二元关系，如果它是自反的、反对称的和传递的，则称为`S`上的偏序。我们现在定义这三个条件。


    #### 自反性


    这个性质意味着每个元素都与自身相关。数学上可以这样写：∀`a` ∈ `S`, `a` ≤ `a`。


    #### 反对称性


    这意味着两个元素不能彼此在两个方向上相关。数学上可以写为：∀`a`, `b` ∈ `S`, 如果`a` ≤ `b` 且 `b` ≤ `a`, 则 `a` =
    `b`。


    #### 传递性


    传递性表示一种比较关系：如果 `a` < `b` 且 `b` < `c`，则意味着 `a` < `c`。数学上可以写为：∀`a`, `b`, `c` ∈ `S`,
    如果 `a` ≤ `b` 且 `b` ≤ `c`，则 `a` ≤ `c`。


    带有偏序的集合称为偏序集或`poset`。就 happens-before 关系而言，集合`S`是所有事件的集合。


    ### 非自反偏序


    非自反偏序或严格偏序是非自反的、反对称的和传递的。


    #### 非自反性


    这个性质意味着没有元素与自身相关。数学上可以这样写：∀`a` ∈ `S`, `a` ≰ `a`，或者给定集合`S`上的关系`R`，如果∀`s` ∈ `S`
    : `(s, s)` ∉ `R`，则`R`是非自反的。


    ### 全序


    **全序**或线性序是一种偏序，其中每一对元素都是可比较的。


    在简要介绍了一些数学概念之后，现在让我们来看看什么是因果关系以及什么是 happens-before 关系。

    '
- fmt: '### Happens-Before Relationship and Causality


    We saw earlier that a node could perform some events. It can either do the local
    computation, send a message, or receive a message. All events happen in a sequential
    order on a single node, and it is easy to see what happened before the next event.
    It is a strict total order imposed on each node.


    A happens-before relationship is an irreflexive partial order (strict partial
    order) with three properties: irreflexivity, antisymmetry, and transitivity.


    Now imagine there are two events `e` and `f` that have happened. To ascertain
    if event `e` happened before event `f`, we use the following rules.


    Event `e` happened before event `f` if and only if (iff): `e → f` (right arrow
    used as a symbol for happens-before):


    - If `e` and `f` occurred on the same process and `e` executed before `f` on this
    process, then we can deduce that `e` precedes `f`, that is, a sequential order.

    - Event `e` is a message send event of some (unique) message `m`, and event `f`
    is the receipt of message `m`.

    - If there exists an event `g` such that `e → g` and `g → f`, then `e → f`. This
    is called a transitive relationship.


    We can visualize all these three rules in Figure [1-23](#515270_1_En_1_Chapter.xhtml#Fig23).


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig23_HTML.jpg)


    *A schematic with 3 right arrows labeled P and 2 right arrows labeled Q below
    it. The lines have elements like E, F, and G.*


    **Figure 1-23** Happens-before rules


    If `e` and `f` are partially ordered, we then say that `e` happened before `f`.
    If `e` and `f` are not partially ordered, then we say that `e` and `f` are concurrent.
    This also doesn’t mean that `e` and `f` are executed independently exactly at
    the same time. It just means that `e` and `f` are not causally related. In other
    words, there is no sequence of messages which leads from one event to another.
    The concurrency is written as `e ∥ g`. Figure [1-24](#515270_1_En_1_Chapter.xhtml#Fig24)
    shows an example scenario in detail.


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig24_HTML.jpg)


    *A schematic with 3 right arrows labeled P, Q, and R. The arrows have elements
    like E, F, G, H, I, and J. Some of the elements are connected together.*


    **Figure 1-24** Example happens-before relationship


    In Figure [1-24](#515270_1_En_1_Chapter.xhtml#Fig24), the relations `e → f`, `g
    → h`, `i → j` are due to the order in which processes execute the events. The
    relations `f → g`, `h → j` are due to messages `m[1]` and `m[2]`. Moreover `e
    → g`, `e → h`, `e → j`, `f → h`, `f → j`, `g → j` represent transitive relation.
    Finally, the concurrent events are `e ∥ i`, `f ∥ i`, `g ∥ i`, `h ∥ i`.


    ### Logical Clocks


    Logical clocks do not depend on physical clocks and can be used to define the
    order of events in a distributed system. Logical clocks only measure the order
    of events without any reference to external physical time.


    ### Lamport Clocks


    A Lamport clock is a logical counter that is maintained by each process in a distributed
    system, and with each occurrence of an event, it is incremented to provide a means
    of maintaining and observing a happens-before relationship between events occurring
    in the distributed system.


    The key idea here is that each event is assigned a number which increments as
    the event occurs in the system. This number is also called the Lamport clock.
    A Lamport clock captures causality.


    The algorithm for Lamport’s clocks/logical clocks is described as follows:


    - Every process maintains a local counter which is set to zero at initialization.

    - With every event on a process, the counter is incremented by one by that process.

    - When a message is sent, a process includes its current value of the counter.

    - When a message is received, a process sets its counter value to `max(local +
    received) + 1`.


    In a happens-before relationship where `e → f`, we can say that possibly `e` caused
    `f`. This means that the happens-before relationship captures causality of the
    events.


    More formally, the Lamport algorithm is shown in Listing [1-1](#515270_1_En_1_Chapter.xhtml#PC1).


    ```

    on init

    t := 0

    on event localcomputation do

    t := t + 1

    end

    on event send(m) do

    t := t + 1

    send(m, t)

    end

    on event receive(m'', t'') do

    t := max(t, t'') + 1

    end

    ```


    **Listing 1-1** Lamport clock


    Lamport clocks are consistent with causality. We can write this like:


    `if e → f ⇒ LC(e) < LC(f)`


    This means that if `e` happened before `f`, then it implies that the timestamp
    (Lamport clock – `LC`) of event `e` is less than the timestamp of event `f`.


    There is a correctness criterion called the **clock condition** which is used
    to evaluate the logical clocks:


    `∀ a,b: a → b ⇒ LC(a) < LC(b)`


    This is read as follows: for all `a` and `b`, `a` happened before `b` implies
    that the Lamport clock (timestamp) of `a` is less than the Lamport clock (timestamp)
    of `b`.


    This means that if event `A` happens before event `B`, then it implies that the
    Lamport clock of event `A` is less than the Lamport clock of event `B`.


    Now we can see a picture emerging. Without using physical clocks, we can now see
    how events in a distributed system can be assigned a number which can be used
    for ordering them by using Lamport clocks.


    Now let’s run this algorithm on a simple distributed system composed of three
    processes (nodes, computers) – `P`, `Q`, and `R`.


    There are two key properties of this algorithm:


    1. If `a → b`, then `LC(a) < LC(b)`.

    2. But `LC(a) < LC(b)` does not mean that `a → b`.


    This means that two events can have the same timestamp. As shown in Figure [1-25](#515270_1_En_1_Chapter.xhtml#Fig25),
    on process lines `P` and `R`, notice event timestamp `1` as the same. Did you
    spot a problem here? In this scheme, the total order is not guaranteed because
    two events can get the same timestamp.


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig25_HTML.jpg)


    *A schematic with 3 lines labeled P, Q, and R. The lines have events like (P,
    1), (Q, 3), and so on. Some of the events are connected together via time.*


    **Figure 1-25** Example run of a Lamport clock algorithm


    One obvious way to fix this is to use an identifier for the process with the timestamp.
    This way, the total order can be achieved.


    Figure [1-26](#515270_1_En_1_Chapter.xhtml#Fig26) shows executions with a totally
    ordered logical clock.


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig26_HTML.jpg)


    *A schematic with 3 lines labeled P, Q, and R. The lines have events like (P,
    1), (Q, 3), and so on. Some of the events are connected together via time.*


    **Figure 1-26** Example run of a Lamport clock with a total order


    Knowing the order of events in a distributed system is very useful. The order
    of events allows us to find the causality between the events. The knowledge of
    causality in distributed systems helps to solve several problems. Some examples
    include but are not limited to consistency in replicated databases, figuring out
    causal dependency between different events, measuring the progress of executions
    in a distributed system, and measuring concurrency.


    We can use it to build distributed state machines. If events are timestamped,
    we can also see when exactly an event has occurred and what happened before and
    what occurred after, which can help debug and investigate distributed systems’
    faults. This knowledge can be instrumental in building debuggers, snapshotting
    a point in time, pruning some data before a point in time, and many other use
    cases.


    The limitation that `LC(a) < LC(b)` does not mean that `a → b`. This means that
    Lamport clocks cannot tell if two events are concurrent or not. This problem can
    be addressed using vector clocks.'
