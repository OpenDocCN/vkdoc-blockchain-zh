- fmt: "### Qubit\n\nA classical computer works based on two distinct states, `0`\
    \ and `1`. Classical computers use transistors to create the absence or presence\
    \ of an electric signal which represents `0` or `1`, respectively. Fundamentally,\
    \ it is all transistors, even in most modern supercomputers.\n\nWith qubits in\
    \ quantum computers, this fundamental paradigm shifts, which leads to extraordinary\
    \ speeds at which quantum computers can operate. A `qubit` is the state of physical\
    \ atomic particles, for example, a spin on an electron. A `qubit` can be in a\
    \ superposition of two states `0` and `1` simultaneously. The speedup rises exponentially\
    \ as more qubits are added. Eight bits together in a classical computer are called\
    \ a byte. In the quantum computing world, eight qubits together are called a `qubyte`.\n\
    \nImagine 4 bits in a classical computer. These bits can have 16 possible states\
    \ and can only be input sequentially. However, in a quantum computer, 4 qubits\
    \ can be in a superposition of all 16 possible states and thus be input simultaneously\
    \ Instead of the classical version, where 4 bits do have 16 possible states but\
    \ can only be input sequentially. This phenomenon is called quantum parallelism\
    \ and is the key to speeding up certain types of problems that are intractable\
    \ on classical computers.\n\nThere are many ways to build a qubit physically.\
    \ These techniques include trapped ions, photons, neutral atom, NMR, and several\
    \ others.\n\nDirac notation is used to represent qubits. Qubits are represented\
    \ as ∣`0`⟩ and ∣`1`⟩,as compared to classical `0` and `1`. The difference is that\
    \ a qubit can be in a linear combination of states called superpositions. A qubit\
    \ can be a superposition of, for example, an electron with spin-up or spin-down\
    \ or a photon with +45-degree polarization or –45-degree polarization and many\
    \ other ways.\n\nDirac notation is used to represent quantum states and their\
    \ superpositions. Dirac notation has the form ∣`0`⟩ + ∣`1`⟩ where `0` and `1`\
    \ are states.\n\nA qubit can be in a quantum state ∣*ψ*⟩ = *α* ∣`0`⟩ + *β* ∣`1`⟩\
    \ where *α*, *β* ∈ *C* (complex amplitudes) and |*α*|² + |*β*|² = 1. This means\
    \ that the state of a single qubit is represented by ∣*ψ*⟩ = *α* ∣`0`⟩ + *β* ∣`1`⟩,\
    \ and the probability condition is |*α*|² + |*β*|² = 1. This probability condition\
    \ means that the values that *α*, *β* can take are limited, and in any case, both\
    \ must add to one. *C* represents complex numbers.\n\nOther than Dirac notation,\
    \ we can also use vector representations. A single vector can represent the state\
    \ containing amplitudes *α* and *β*:\n\n```\n| ψ ⟩ = [ α  β ]\n```\n\nand\n\n\
    ∣`0`⟩ = [`1` `0` ] and ∣`1`⟩ = [`0` `1` ]\n\nA qubit can be visualized using a\
    \ Bloch sphere, as shown in Figure [9-1](#515270_1_En_9_Chapter.xhtml#Fig1).\n\
    \nA Bloch sphere has a 3-D plane with origin at the center of the sphere. A line\
    \ from the origin extends to psi. The marked angles are theta and phi.\n\n**Figure\
    \ 9-1**  \nThe Bloch sphere – a convenient way to visualize qubits\n\nWe can describe\
    \ a single qubit as a point on the surface of the Bloch sphere. The North pole\
    \ represents state ∣`0`⟩, and the South pole represents state ∣`1`⟩. Qubit angles\
    \ are *θ* the latitude and *ϕ* the longitude. When a single gate operation is\
    \ performed on the qubit, the state *ψ* (the qubit) rotates to another point on\
    \ the Bloch sphere.\n\n### Superposition\n\nSuperposition is a fundamental principle\
    \ of quantum mechanics. Superposition means that quantum states can be added together\
    \ to get another valid quantum state. This is analogous to classical mechanics,\
    \ where waves can be added together. Added quantum states are so-called \"superposed.\"\
    \ Superposition is the key to extraordinary speedup as it allows many computation\
    \ paths to be explored simultaneously.\n\n### Entanglement\n\nEntanglement is\
    \ an incredibly strong correlation that exists between particles, which allows\
    \ two or more particles to inseparably link with each other. It allows any two\
    \ quantum particles to exist in a shared state. Any action on one particle instantly\
    \ affects the other particle even at massive distances. Entanglement is usually\
    \ performed by bringing two qubits close together, performing an operation to\
    \ entangle them, and, once entangled, moving them apart again. They will remain\
    \ entangled even if one of them is on earth and the other is moved to outer space\
    \ at a vast distance.\n\nThere are two features of entanglement which makes it\
    \ particularly suitable for a large range of applications: maximal coordination\
    \ and monogamy.\n\n#### Maximal Coordination\n\nWhen two qubits at different nodes\
    \ in a network entangle, that is, the quantum state of two particles become inseparably\
    \ connected, they provide stronger correlation and coordination properties, which\
    \ are nonexistent in classical networks. This property is called maximal coordination.\
    \ For example, for any measurement on the first qubit, if the same measurement\
    \ is made on the second qubit, instantaneously, the same answer is shown, even\
    \ though that answer is random and was not predetermined. More precisely, they\
    \ will always yield a zero or one at random, but both will produce the same output\
    \ always. This feature makes entanglement suitable for tasks requiring coordination,\
    \ for example, clock synchronization, leader election, and consensus. Imagine\
    \ clock synchronization in a distributed network without physical transfer; it\
    \ can make distributed networks extraordinarily fast. (Remember replacing communication\
    \ with local computation from the last chapter.) Also, state transfer/awareness\
    \ during consensus immediately makes consensus faster. The fundamental idea here\
    \ is that when entangled, it is possible to change the state globally (full state)\
    \ by only performing operations (changing parameters) in one qubit. This feature\
    \ has far-reaching implications; imagine being able to do immediate state transfer\
    \ to all nodes in the network. This can result in extraordinary speedup in consensus\
    \ algorithms.\n\n#### Monogamy\n\nQuantum entanglement is not shareable. If two\
    \ qubits are entangled, then a third qubit from anywhere in the universe can never\
    \ entangle with either of them. This property is called monogamy of entanglement.\
    \ This property can enable applications in privacy, cryptographic key generation,\
    \ and identification.\n\n## Quantum Gates\n\nJust like classical computing in\
    \ the quantum world, we use gate operations for data processing. We are used to\
    \ Boolean gates used in the classical world, such as `NOT`, `AND`, `OR`, `XOR`,\
    \ `NAND`, and `NOR`. In the quantum world, we apply some operator to an input\
    \ state which transforms into an output state. This operator is called a quantum\
    \ gate. Quantum gates operate on a single qubit or multiple qubits. A rule here\
    \ is that each gate must have the same number of inputs as outputs. This is what\
    \ makes the gate reversible and consequently the quantum computers reversible.\
    \ There are single qubit gates which make rotations on a Bloch sphere. Then there\
    \ are two qubit gates which combine single gates to create more complex functions,\
    \ which leads to building quantum computers.\n\nThere are many quantum gates;\
    \ some common ones are introduced as follows.\n\n### Hadamard\n\nThis gate transforms\
    \ a basis state into an even superposition of the two basis states. Fundamentally,\
    \ it allows us to create superpositions. It operates on one qubit and is denoted\
    \ by the symbol shown in Figure [9-2](#515270_1_En_9_Chapter.xhtml#Fig2).\n\n\
    An illustration of the quantum gates includes the `Hadamard` gate, `Z` gate, `C\
    \ NOT` gate, `C C NOT` gate, `T` gate, `NOT` gate, and swap gate.\n\n**Figure\
    \ 9-2**  \nQuantum gates\n\n### T\n\nThe `T` gate induces a pi/4 phase between\
    \ contributing basis states. The symbol shown in Figure [9-2](#515270_1_En_9_Chapter.xhtml#Fig2)\
    \ represents the `T` gate. Relative phase rotation is by 45 degrees in `T` gate."
