  trans: "\n# 权益证明\n\n尽管比特币的工作量证明已被证明是一种具有弹性且稳健的协议，但它存在若干局限性：\n\n- 能源消耗过高\n- 区块生成速度缓慢\n\
    - 由于需要专用硬件和大型矿池，正变得中心化\n- 概率性最终确定性，这不适用于大多数应用\n- 并非完美的共识算法，存在一些攻击方式，例如金手指攻击、51%攻击\n\
    - 挖矿需要专用硬件，准入门槛越来越高\n- 可扩展性不足，无法支持常规的高吞吐量应用\n\n为解决上述弱点，大量研究工作一直在进行中。尤其是，前述局限性中的高能耗问题催生了一些替代方案。权益证明便是这样一种替代方案。\n\
    \n权益证明于 2012 年首次出现在 Peercoin 中。随后，许多区块链采用了这一机制，例如 EOS、NxT、Steem、Tezos 和 Cardano。此外，以太坊也将通过其宁静升级，不久后过渡到基于\
    \ PoS 的共识机制。权益证明也被称为虚拟挖矿。如此称呼的原因是，在 PoS 中，无需要求矿工分配计算资源来解决难题，而是根据矿工拥有的价值来决定产生下一个区块的权利。这种有价值的资产可以是任何与网络利益一致的有价值之物（通常是代币）。PoW\
    \ 的座右铭是一个 CPU 等于一票，而我们可以把 PoS 理解为一个代币等于一票。\n\n下一个提议者通常是随机选举产生的。提议者通过交易费或区块奖励获得激励。与\
    \ PoW 类似，需要以持有大量权益的形式控制网络的大部分，才能攻击和控制网络。\n\nPoS 协议通常根据利益相关者质押的资产来选择他们并授予相应权利。权益的计算因具体应用而异，但通常基于总余额、存入的价值或验证者之间的投票。一旦计算出权益并选择某位利益相关者作为区块提议者，该提议者提出的区块就会被立即接受。权益越高，赢得下一个区块提议权的机会就越大。\n\
    \n一个 PoS 方案的通用架构如图 8-1 所示。\n\n![](img/515270_1_En_8_Fig1_HTML.jpg`)\n\n权益方案的流程图包含以下流程：前一个区块哈希，交易\
    \ T x 到 T x；计算器；新提议者选择；已选择；是，停止。\n\n图 8-1\n权益证明方案\n\n如图 8-1 所示，PoS 使用一个权益计算器函数来计算质押资金的数量，并据此选择一个新的提议者。\n\
    \n下一个提议者通常是随机选举产生的。提议者通过交易费或区块奖励获得激励。需要持有大部分权益以控制网络的大部分，才能攻击网络。\n\n在选择过程中引入了一些随机性元素，以确保公平性和去中心化。选举提议者的其他因素包括代币的币龄，即考虑质押的代币已有多长时间未被花费；代币未被花费的时间越长，被选中的机会就越大。\n\
    \nPoS 有几种类型：\n\n- 基于链的 PoS\n- 基于 BFT 的 PoS\n- 基于委员会的 PoS\n- 委托权益证明\n- 流动权益证明\n\
    \n## 基于链的 PoS\n\n该方案是首个针对 PoW 提出的替代方案，于 2012 年首次在 Peercoin 中使用。这种机制类似于 PoW；然而，区块生成方法有所改变，它通过两步完成区块的最终确认：\n\
    \n- 从内存池中选取交易，并创建一个候选区块。\n- 设置一个具有恒定时钟滴答周期的时钟。在每个时钟滴答，检查区块头与时钟时间的哈希值是否小于目标值与权益值的乘积。我们可以用如下简单公式表示：\n\
    \n```\nHash (B_h || clock time) < target * stake value\n```\n\n权益值取决于算法的工作方式。在某些链中，它与质押量成正比。在其他链中，则基于参与者持有权益的时间长度。目标值是每单位权益价值的挖矿难度。\n\
    \n这种机制使用与 PoW 类似的哈希难题。但是，与其通过消耗高能量和使用专用硬件来竞争解决哈希难题，PoS 中的哈希难题仅在固定的时钟间隔内被解决一次。如果矿工的权益值很高，那么解决哈希难题的难度会按比例降低。这与\
    \ PoW 需要重复进行暴力哈希运算来解决数学难题形成对比。\n\n## 基于委员会的 PoS\n\n在该方案中，通常使用可验证随机函数（VRF）随机选择一组利益相关者。VRF\
    \ 根据利益相关者的权益和区块链的当前状态，产生一个随机的利益相关者集合。被选中的利益相关者组负责按顺序提议区块。\n\n通用方案描述如下：\n\n- 验证者加入网络并存入一笔质押金。\n\
    - 参与委员会选举过程，并持续检查自己的轮次。\n- 当轮到该验证者时，收集交易、生成区块、将新区块追加到链上，最后广播该区块。\n- 在其他接收节点上，验证区块；如果有效，则将区块追加到区块链中，并将该区块传播给其他节点。\n\
    \n委员会选举会产生一个伪随机的验证者出块轮次序列。Ouroboros Praos 和 BABE 是基于委员会的 PoS 的常见示例。\n\n## 基于 BFT\
    \ 的 PoS\n\n在该方案中，区块使用权益证明机制生成，其中根据权益证明选择区块提议者来提议新区块。提议者基于在系统中存入的质押金选举产生。被选中的几率与系统中存入的质押金数额成正比。提议者生成一个区块并将其追加到临时区块池中，BFT\
    \ 协议会从该池中最终确认一个区块。\n\n通用方案工作流程如下：\n\n- 根据与质押金成正比的 PoS 机制，选举一个区块提议者。\n- 提议者：提议一个新区块，将其添加到临时区块池，并广播新区块。\n\
    - 接收者：当其他节点接收到此区块时，它们验证该区块，如果有效，则将其添加到本地的临时区块池中。\n- 在共识时期期间：\n  - 运行 BFT 共识以最终确认一个有效（获得最多投票）的区块。\n\
    \  - 将得票最多的有效区块添加到主区块链中。\n  - 从临时区块池中移除其他区块。\n\nCosmos 中的 Tendermint 就是一个例子，其中验证者基于质押金选择，其余协议基于\
    \ BFT 原理工作。其他例子包括 Casper FFG。\n\n只要三分之二的验证者保持诚实，基于 BFT 的 PoS 就具有容错性。此外，区块会被立即最终确认。\n"
- fmt: '### Delegated PoS


    `DPoS` works like proof of stake, but a critical difference is a voting and delegation
    mechanism which incentivizes users to secure the network. `DPoS` limits the size
    of the chosen consensus committee, which reduces the communication complexity
    in the protocol. The consensus committee is composed of so-called delegates elected
    by a delegation mechanism. The process works by stakeholders voting for delegates
    by using their stake. Delegates (also called witnesses) are identifiable, and
    voters know who they are, thus reducing the delegates’ chance of misbehavior.
    Also, a reputation-based mechanism can be implemented, allowing delegates to earn
    a reputation based on the services they offer and their behavior on the network.
    Delegates can represent themselves for earning more votes. Delegates who get the
    most votes become members of the consensus committee or group. Usually, a `BFT`-style
    protocol runs between the members of the chosen consensus committee to produce
    and finalize blocks. Each member can take a round-robin fashion to propose the
    next block, but this activity remains within the elected consensus committee.
    Delegates earn incentives to produce blocks. Again, under the `BFT` assumptions,
    the protocol within the consensus committee can tolerate `f` faults in a `3f+1`
    member group. In other words, it can tolerate one-third or 33% of delegates being
    faulty. This protocol provides instant finality and incentives in proportion to
    the stake of the stakeholders. As network-wide consensus is not required and only
    a smaller group of delegators oversee making decisions, the efficiency increases
    significantly. `Delegated PoS` is implemented in `EOS`, `Lisk`, `Tron`, and quite
    a few other chains.


    ### Liquid PoS


    `LPoS` is a variant of `DPoS`. Token holders delegate their validation rights
    to validators without requiring transferring the ownership of the tokens. There
    exists a delegation market where delegates compete to become the chosen validator.
    Here, the competition is primarily on fees, services offered, reputation, payout
    frequency, and possibly other factors. Any misbehavior such as charging high fees
    by a validator is detectable quickly and will be penalized accordingly. Token
    holders are also free to move to any other validator. `LPoS` supports a dynamic
    number of validators as compared to `DPoS`’s fixed validator set. Token holders
    are also allowed to become validators themselves by self-electing. Token holders
    with small amount can delegate to larger amount holders. Also, a number of small
    token holders can form a syndicate. Such “liquid” protocol allows much flexibility
    as compared to other `PoS` protocols and helps to thwart creation of lobbies to
    become a fixed validator set. `LPoS` is used in the `Tezos` blockchain.


    There are some attacks against `PoS`, such as the nothing-at-stake attack, long-range
    attack, and stake grinding attack. We explain these attacks as follows.


    ### Attacks


    `PoS` suffers generally from a costless simulation problem where an adversary
    can simulate any history of the chain without incurring any additional cost, as
    opposed to `PoW` where the cost is computational power. This no-cost block generation
    is the basis of many attacks in `PoS`.


    #### Nothing-at-Stake Problem


    The nothing-at-stake or double bet problem occurs when multiple forks occur. An
    attacker can generate a block on top of each fork without any additional cost.
    To solve this problem, economic penalties are introduced in protocols that prevent
    attackers from launching this attack. If a significant number of nodes do this,
    then an attacker holding even less than 50% of tokens can launch a double-spend
    attack.


    #### Long-Range Attacks


    Long-range attacks exist due to weak subjectivity and costless simulation. Long-range
    attacks are also possible because of costless simulation where an adversary creates
    a new branch starting from the genesis block with the aim to take over the main
    good chain, once the bad chain becomes longer than the real main chain. This can
    create an alternate history which is detrimental to the blockchain.


    A weak subjectivity problem affects new nodes and the nodes which were offline
    for a long time and rejoined the network. As nodes are not synchronized and there
    are usually multiple forks available in the network, these nodes are unable to
    differentiate between which node is correct and which one is malicious; they may
    as well accept a malicious fork as valid.


    #### Other Attacks


    **Liveness denial** is another attack that `PoS` can suffer from. In this attack,
    some or all validators collectively decide to stop validating the blocks, resulting
    in halting block production. Penalizing such activities by the protocol can prevent
    these types of attacks.


    A **selfish mining** or block withholding attack occurs when an adversary mines
    their own chain offline. Once the chain is at a desired length, the adversary
    releases this chain to the network with the expectation that the bad chain will
    take over the main good chain. It can cause disruption on the network as it can
    result in causing honest validators to waste resources.


    A **grinding attack** on `PoS` occurs if a slot leader election process is not
    random. If no randomness is introduced in this process, then a slot leader can
    increase the frequency of its own election again and again, which can result in
    censorship or disproportionate rewards. An easy way to solve this is to use some
    good random selection process, usually based on verifiable random functions (`VRFs`).


    Next, we discuss Ethereum’s proof of work – `Ethash`.'
