    | 1+ | txn_count | Variable integer | Total number of transactions |

    |  variable | txns | tx[ ] | Transactions |


    The diagram in Figure [5-2](#515270_1_En_5_Chapter.xhtml#Fig2) shows how transactions
    from a transaction pool (bottom left of the figure) are picked up and a Merkle
    tree is created, the root of which is included in the candidate block. Finally,
    double (SHA-256) is computed for the block for a comparison against the target.


    ![](images/515270_1_En_5_Chapter/515270_1_En_5_Fig2_HTML.png)


    A schematic of the flow from the transaction pool to the Merkle tree root to the
    candidate block and finally to the Hash double S H A 256.


    Figure 5-2


    Transaction pool transactions to the Merkle tree and candidate block


    A nonce is a number from 1 to 2^(32) – 1, that is, a 32-bit unsigned integer which
    gets included in the block. Using this nonce in each iteration of checking if
    the resultant number is less than the target is what’s called a mining. If the
    resultant number is less than the target, then it’s a block mined and it’s valid,
    which is then broadcast to the network.


    The nonce field in a block being an unsigned integer, there are only 2^(32) nonces
    to try. As such, miners can run out of them quite quickly. In other words, it
    means that there are roughly four billion nonces to try which miners can quickly
    perform given the powerful mining hardware available. It also is very easy even
    for a normal computer to quickly check.


    This of course can create an issue where no one is able to find the required nonce
    which produces the required hash. Even if miners try again, they will try the
    same thing again with the same results. At this stage, we can use other attributes
    of the block and use them as a variable and keep modifying the block until the
    hash of the block is less than the target, that is, *SHAd*256(*Block header* ‖ *nonce* ) < *Target*.


    Now after going through all these iterations, what if the valid nonce is not found?
    At this point, miners will have to increase the search space somehow. For this,
    they can modify the block somewhat to get a different hash. They can do several
    things:


    *   Drop the transactions, add new transactions, or pick up a new set of transactions.
    This modification will recalculate the Merkle root, and hence the header, and
    as a result, the hash will be different.


    *   Modify the timestamp slightly (in the range of two hours; otherwise, it’s
    an invalid block). It can be done simply by adding just a second, which will result
    in a different header and consequently a different hash.


    *   Modify Coinbase via unused *ScriptSig*, where you can put any arbitrary data.
    This will change the Merkle root and hence the header and consequently the hash.


    And miners can keep modifying with different variations until they reach *SHAd*256(*Block
    header* ‖ *nonce* ) < *target*, which means that they’ve found a valid nonce that
    solves the proof of work.


    The discovery of the valid hash is based on the concept known as *partial hash
    inversion*.


    Proof of work has some key properties. Formally, we list them as follows.


    #### Properties of PoW


    Proof of work has five properties: completeness, computationally complex, dynamic
    cost adjustment, quick verification, and progress free.


    ##### Completeness


    This property implies that proofs produced by the prover are verifiable and acceptable
    by the verifier.


    ##### Computationally Complex – Difficult to Compute – Slow Creation


    The creation of proof of work is slow but not intractable. Creating proofs requires
    spending considerable computational resources and takes a considerable amount
    of time.


    ##### Auto-adjustable Cost – Dynamic Cost


    This is the elegance of this protocol. First, PoW is difficult to compute. It
    takes considerable effort to generate proof of work. Roughly, it is more than
    quintillions of hashes that are checked per second on the Bitcoin network to solve
    the proof of work. Second, the parameters are adjustable, which means that even
    if blocks are produced faster or slower, no matter how much hash power is put
    in place or how much is removed from the network, the block generation rate roughly
    remains ten minutes per block. In the early days when the difficulty was one,
    blocks were still generated one per minute; now in 2022, even if the difficulty
    is roughly 25 tera hashes per second, still the protocol readjusts itself, and
    the block generation rate is still one per ten minutes. This is amazing and a
    testament to the robust design of the protocol. So, in summary if the block generation
    in a period of 2016 blocks is taking more than ten minutes per block, then in
    the next 2016 block period the difficulty will be readjusted to low. If the block
    generation is faster and taking less than ten minutes per block, for example,
    in case some bleeding-edge hardware is introduced for hashing in the network,
    then the difficulty will go up for the next 2016 blocks. This is how a state of
    balance is maintained in the network. Also note that many blocks are produced
    very quickly under ten minutes; some take a lot longer than that, but the average
    is ten minutes. This is due to the probabilistic nature of the protocol.


    ##### Quick and Efficient Verification – Quick Verification


    This property implies that proofs are very quick and efficient to verify. It should
    not be computationally complex to verify the proof. In the case of Bitcoin, it
    is simply running a SHA-256 hash function twice on the block with the nonce produced
    by the miner, and if *SHAd*256(*nonce* ‖ *block header*) ≤ *target*, then the
    block is valid. It only takes as long as it takes to generate SHA-256 hash and
    then compare, which both are very compute-efficient processes. The key idea here
    is that it should be computationally complex to generate a block with a valid
    nonce; however, it should be easy for other nodes to verify its validity.'
  trans: '

    ### 矿工的任务


    在比特币区块链网络中，当用户执行新交易时，这些交易会通过点对点 gossip 协议广播到网络上的所有节点。这些交易最终会进入节点的交易池。矿工执行多项任务：


    - 矿工维护交易池。他们监听传入的交易，并将这些交易保留在自己的交易池中。

    - 他们还监听新区块，并将任何有效的新区块追加到自己的链上。当然，这不仅是矿工的任务，其他非挖矿节点也会同步区块。

    - 通过从交易池中选取交易来创建一个候选区块。

    - 尝试每一个随机数，找到能使该随机数与区块及前一哈希值拼接后得出的数字小于目标值（根据前述公式 3）的随机数。

    - 将新挖出的区块广播到网络。

    - 通过接收发送到矿工指定地址的 Coinbase 交易来获取奖励。


    让我们看看候选区块包含什么内容，以及它是如何创建的。


    一个潜在有效的候选区块，并最终成为有效区块，包含几个元素，如表 5-2 所示。


    **表 5-2** 区块元素


    | 大小 | 描述 | 数据类型 | 说明 |

    | --- | --- | --- | --- |

    | 4 | 版本 | 整数 | 区块版本 |

    | 32 | `prev_block` | 字符 | 前一区块头的哈希值 |

    | 32 | `merkle_root` | 字符 | 区块中所有交易的默克尔根哈希 |

    | 4 | `timestamp` | 无符号整数 | 以 Unix 时间格式表示的区块创建时间 |

    | 4 | `bits` | 无符号整数 | 区块的网络难度目标 |

    | 4 | `nonce` | 无符号整数 | 此区块的随机数 |

    | 1+ | `txn_count` | 可变长整数 | 交易总数 |

    | 可变 | `txns` | `tx[ ]` | 交易 |


    图 5-2 展示了如何从交易池（图左下）中选取交易并创建一棵默克尔树，其根被包含在候选区块中。最后，对区块进行双重 SHA-256 哈希计算，以与目标值进行比较。


    ![](img/515270_1_En_5_Fig2_HTML.png)


    *图 5-2* 从交易池交易到默克尔树和候选区块


    `nonce` 是一个从 1 到 2³² – 1 的数字，即一个 32 位的无符号整数，会被包含在区块中。在每次迭代中使用这个 `nonce` 检查结果数字是否小于目标值的过程，被称为挖矿。如果结果数字小于目标值，则意味着挖到了一个有效区块，该区块随后会被广播到网络。


    区块中的 `nonce` 字段是一个无符号整数，因此只有 2³² 个随机数可供尝试。因此，矿工可能会很快用完这些随机数。换句话说，这意味着大约有四十亿个随机数可以尝试，鉴于可用的强大挖矿硬件，矿工可以快速完成。即便是普通的计算机，也能轻松快速地完成检查。


    当然，这可能会产生一个问题：没有人能找所需的能产生目标哈希值的 `nonce`。即使矿工再次尝试，结果也会相同。此时，我们可以使用区块的其他属性作为变量，不断修改区块，直到区块的哈希值小于目标值，即
    `SHA256(区块头 ‖ nonce) < Target`。


    那么在遍历所有这些迭代之后，如果仍然没有找到有效的 `nonce` 呢？此时，矿工必须设法增加搜索空间。为此，他们可以通过对区块做一些修改来获取不同的哈希值。他们可以采取以下几种操作：


    - 舍弃部分交易、添加新交易或选取一组新的交易。这种修改会重新计算默克尔根，从而改变区块头，进而使哈希值不同。

    - 稍微修改 `timestamp`（在两小时范围内；否则会成为无效区块）。只需增加一秒即可实现，这将导致不同的区块头，从而产生不同的哈希值。

    - 通过未使用的 `ScriptSig` 修改 Coinbase，可以在其中放入任意数据。这将改变默克尔根，进而改变区块头，最终产生不同的哈希值。


    矿工可以不断尝试不同的变体进行修改，直到满足 `SHA256(区块头 ‖ nonce) < target`，这意味着他们找到了一个能解决工作量证明的有效 `nonce`。


    有效哈希的发现基于一种称为部分哈希反转的概念。


    工作量证明具有一些关键属性。正式地，我们将其列举如下。


    ### 工作量证明的性质


    工作量证明具有五个性质：完备性、计算复杂性、动态成本调整、快速验证和无进度性。


    #### 完备性


    该性质意味着证明者生成的证明是可验证的，并且能被验证者接受。


    #### 计算复杂——难以计算——生成缓慢


    工作量证明的生成速度缓慢，但并非不可处理。生成证明需要消耗大量的计算资源，并且需要相当长的时间。


    #### 自动调整成本——动态成本


    这是该协议的优雅之处。首先，工作量证明难以计算。生成工作量证明需要付出巨大努力。粗略估计，比特币网络上每秒需要检查超过数千万亿次的哈希值才能解决工作量证明。其次，参数是可调整的，这意味着无论区块生成得快还是慢，无论网络中添加了多少或移除了多少算力，区块生成速率大致保持在每十分钟一个区块。在早期的难度为
    1 的时代，区块仍然可以每分钟生成一个；而到了 2022 年，即使难度大约为每秒 25 万亿哈希，该协议仍然会自我调整，区块生成速率仍然保持每十分钟一个。这令人惊叹，也证明了该协议设计之稳健。总而言之，如果在
    2016 个区块的周期内，平均每个区块生成时间超过十分钟，那么在下一个 2016 个区块的周期，难度将会下调。如果区块生成过快，平均每个区块耗时少于十分钟（例如，网络引入了某种先进的哈希硬件），那么接下来
    2016 个区块的难度就会上调。这就是网络维持平衡状态的方式。另请注意，许多区块的生成时间远低于十分钟；有些则比十分钟长得多，但平均值是十分钟。这是由于该协议的概率性质所致。


    #### 快速高效验证——快速验证


    该性质意味着证明的验证非常快速且高效。验证证明不应具有计算复杂性。在比特币中，只需要对包含矿工生成的 `nonce` 的区块运行两次 SHA-256 哈希函数，如果
    `SHA256(nonce ‖ 区块头) ≤ target`，则该区块有效。这个过程所需时间仅为生成 SHA-256 哈希并进行比较的时间，这两者都是计算效率极高的操作。其核心思想在于，生成一个包含有效
    `nonce` 的区块在计算上应该是复杂的；但对于其他节点来说，验证其有效性应该是容易的。

    '
- fmt: '##### Progress Free


    This property implies that the chance of solving the proof of work is proportional
    to the hash power contributed; however, it is still a chance, not a 100% guarantee
    that a miner with the highest hash power will always win. In other words, miners
    with more hash power get only proportional advantage, and miners with less power
    get proportional compensation too and get lucky sometimes to find blocks before
    even miners with more hash power.


    In practice, this means that every miner is in fact working on a different candidate
    block to solve the proof of work. Miners are not working on the same block; they
    are not trying to find a valid nonce for the same hash. This is because of several
    differences, such as transactions, version number, Coinbase differences, and other
    metadata differences, which when hashed result in a totally different hash (`SHA-256`
    twice). This means that every miner is solving a different problem and solving
    a different part of the double `SHA-256` or conveniently written as `SHAd256`
    search space.


    The progress free property can be visualized in Figure 5-3. As shown in Figure
    5-3, miners are all working on their own candidate block, which is different from
    other blocks due to differences mentioned earlier. So, every nonce that the miners
    concatenate with the block data to get the hash will result in a hash that no
    other miner is aware of. This gives some advantage to a miner with less power,
    where it can happen that the block which this small miner is trying to find a
    valid nonce for manages to find the nonce that solves PoW before a miner with
    more hash power finds the valid nonce for their block.


    ![](images/515270_1_En_5_Chapter/515270_1_En_5_Fig3_HTML.jpg)


    A schematic of a progress-free property where each miner works on a separate block,
    hash, and search space in the order mentioned.


    **Figure 5-3** Progress free property – each miner working on a different part
    of double (`SHA-256`) search space


    This is another elegant property of PoW which ensures that miners with more hash
    power may have some advantage, but it also means that a miner with less hash power
    can be lucky in finding the nonce that works before the large miners. The key
    point is miners are not working on the same block! If it were the same block every
    time, the most powerful miner would’ve won. This is called the progress free property
    of Bitcoin PoW.


    It is however possible that many miners collaboratively work on the same block
    (same search space), hence dividing up the work between themselves. Imagine the
    search space is 1 to 100 for a block, it may be divided in 10 different parts,
    then all miners can collectively work on a single block. This divides up the work,
    and all miners can contribute and earn their share of the reward. This is called
    **pool mining**. Unlike **solo mining** where only one miner tries and the entire
    effort can be lost if it doesn’t find the nonce and tries again for the next block,
    in pool mining individual contribution is not wasted.


    This concept can be visualized in Figure 5-4.


    ![](images/515270_1_En_5_Chapter/515270_1_En_5_Fig4_HTML.png)


    A schematic of pool mining where each miner works on the same block and hash but
    different search spaces.


    **Figure 5-4** Mining pool – many miners working on a single block (`SHAd256`
    search space)


    In Figure 5-4, there are different miners working on the same hash search space
    produced by the same block. This way, the pool operators split the proof of work
    into different pieces and distribute them to the miners in the pool. All miners
    work and put in the effort, and eventually one miner finds the block which is
    broadcast normally to the Bitcoin network. The pool operator receives the block
    reward which is split between the miners in proportion to the effort put in by
    the miners.


    ##### Probabilistic Aspects of Dynamic Parameters


    Now let’s shed some light on the probabilistic aspects related to the property
    (dynamic and auto-adjustable parameters), where I will explain what the average
    of ten minutes means and what parameterization means.


    In probability theory, a Bernoulli trial is an action that has two possible outcomes,
    either success or failure. The probability of success or failure is fixed between
    trials. For example, in coin flips the probability of heads or tails is 50%. The
    outcome is also independent. It is not the case that having three heads in a row
    will lead to a definite head for the fourth time too. Similarly, in Bitcoin mining,
    the outcome of success or failure, as shown in the following, remains independent
    and almost like coin flips roughly 50% probabilistic. We can see this in the following
    formula.


    Success and failure in mining can be written like the following two formulas:


    ```

    Success = SHAd256( nonce || block header ) < target

    ```


    ```

    Failure = SHAd256( nonce || block header ) >= target

    ```


    PoW is almost like roll dicing, for example, if I have rolled the dice a few times,
    I cannot know when the next six will occur; it might be that I get six in the
    first attempt, may never get six, or get six after several rolls. Similarly, whether
    a single nonce has been tried to find the valid nonce or trillions and trillions
    of nonces have been tried, the mean time until a miner finds the valid nonce remains
    probabilistic. It doesn’t matter whether 100 million nonces have been tried or
    only one; the probability of finding the valid nonce remains the same. So trying
    millions of nonces doesn’t make it more likely to find the valid nonce; even trying
    once or only a few times could find the valid nonce.


    A Bernoulli trial iterated enough to achieve a continuous result instead of discrete
    is called a Poisson process. Formally, we can say that a Poisson process is a
    sequence of discrete events, where events occur independently at a known constant
    average rate, but the exact timing of events is random.


    For example, movements in a stock price are a Poisson process. A Poisson process
    has some properties:


    - Events are independent of each other, that is, no influence of an outcome on
    some other.

    - The rate of events per time period is constant.

    - Two events cannot occur simultaneously.


    The average time between events is known, but they are randomly spaced (stochastic).
    In Bitcoin, of course, we know the time between two block generation events is
    known, that is, roughly ten minutes, but the generations are randomly spaced.


    The mean time for a new block is ten minutes on average. We can use a simple formula
    to find out the meantime of finding the next block for a particular miner.


    ```

    Next block mean time (specific) = (10 minutes) / (fraction of hash power controlled
    by the miner)

    ```'
