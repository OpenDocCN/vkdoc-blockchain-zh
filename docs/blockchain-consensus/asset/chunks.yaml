  trans: '

    ### 聚合签名


    聚合签名能够减小数字签名的体积。这种方案在需要同时使用多个数字签名的场景中非常有用。其核心思想是将多个签名聚合成一个单一的签名，同时不增加单个消息签名的体积。这本质上是一种支持聚合功能的数字签名类型。


    一个微小的聚合签名就足以向验证者证明，所有用户都签署了各自的原始消息。因此，聚合签名常用于网络和安全协议中，以减少消息的体积。例如，在公钥基础设施（PKI）中，我们可以通过将证书链中的所有签名压缩成一个单一签名，显著减小数字证书链的体积。`Boneh-Lynn-Shacham`（BLS）聚合签名是聚合签名的一个典型例子。BLS
    也已被用于各种区块链，尤其是在以太坊 2.0 中。


    Schnorr 签名是另一种基于椭圆曲线密码学的签名类型，它支持密钥和签名的聚合。与签名大小为 71 字节的 ECDSA 相比，Schnorr 签名的大小仅为
    64 字节。ECDSA 的私钥大小为 32 字节，公钥为 33 字节；而 Schnorr 方案的私钥和公钥大小均为 32 字节。总体而言，Schnorr 签名比
    ECDSA 更小、更快。


    图 2-18 展示了聚合签名的工作方式。


    ![](img/515270_1_En_2_Fig18_HTML.png)


    聚合签名的工作流程。签名 1 到 3 指向聚合函数，聚合函数再指向最终的聚合签名。


    图 2-18

    聚合签名


    根据比特币改进提案（BIP）340，Schnorr 签名计划被用于比特币。


    ### 环签名


    环签名方案是一种机制，允许签名者群体中的任何成员代表整个群体对消息进行签名。环中的每个成员都持有公钥和私钥。这里的关键在于，实际签署消息的签名者的身份对于外部观察者来说必须是未知的（在计算上不可确定）。看起来，可信签名者群体中的任何人都有可能签署了该消息，但无法找出具体是哪个用户签署的。因此，我们可以使用环签名来提供匿名服务。


    ## 哈希函数


    哈希函数是无密钥的基元，能够为任意长度的输入数据生成固定长度的摘要。哈希函数具有三个安全属性。


    ### 原像抗性


    该属性也被称为单向性。可以通过一个简单的等式来解释：


    ```

    h(x)=y

    ```


    其中 `h` 是哈希函数，`x` 是输入，`y` 是输出的哈希值。第一个安全属性要求不能从 `y` 反向计算出 `x`。`x` 是 `y` 的原像，因此得名原像抗性。此属性如图
    2-19 所示。


    ![](img/515270_1_En_2_Fig19_HTML.png)


    原像抗性示意图。输入 x 经过哈希函数 h，得到输出 y。


    图 2-19

    原像抗性


    ### 第二原像抗性


    该属性也被称为弱抗碰撞性。此属性确保给定 `x` 和 `h(x)` 后，几乎不可能找到任何其他消息 `m`，使得 `m ≠ x` 且 `m` 的哈希值等于
    `x` 的哈希值，即 `h(m) = h(x)`。此属性如图 2-20 所示。


    ![](img/515270_1_En_2_Fig20_HTML.png)


    第二原像抗性示意图。输入 x 和未知的 z 经过哈希函数 h，得到输出 y1 与 y2 相等。


    图 2-20

    第二原像抗性


    ### 抗碰撞性


    抗碰撞性要求两个不同的输入消息不应哈希到相同的输出。换句话说，`h(x) ≠ h(z)`。图 2-21 展示了抗碰撞性。


    ![](img/515270_1_En_2_Fig21_HTML.png)


    抗碰撞性示意图。未知的输入 x 和 z 经过哈希函数 h，得到输出 y1 与 y2 相等。


    图 2-21

    强抗碰撞性


    此外，哈希函数还有两个功能性属性：


    *   将任意大小的数据压缩成固定长度的摘要

    *   易于计算


    哈希函数由于其特性，总是可能存在碰撞，即两个不同的消息哈希到相同的输出。但在一个良好的哈希函数中，找到碰撞在计算上应该是不可行的。


    此外，哈希函数还应具备一个特性：输入文本的微小变化，哪怕只更改一个字符，也应产生完全不同的哈希输出。这被称为雪崩效应。


    哈希函数通常采用迭代哈希函数方法设计，即将输入数据划分为大小相等的块，然后通过压缩函数对其进行迭代处理。


    下面列出了一些使用迭代方法构建哈希函数的著名方案：


    *   Merkle-Damgard 结构

    *   海绵结构


    最常见的哈希函数方案有 SHA-0、SHA-1、SHA-2、SHA-3、RIPEMD 和 Whirlpool。


    ### 安全哈希算法（SHA）的设计


    在本节中，我们将介绍 SHA-256 和 SHA-3 的设计。它们分别用于比特币和以太坊。但需要注意的是，以太坊使用的是 Keccak（最初提交给 NIST
    的原始算法），而非 NIST 标准的 SHA-3。NIST 在经过一些修改（如增加轮数和简化消息填充）后，将 Keccak 标准化为 SHA-3。


    #### SHA-256 的设计


    SHA-256 的输入消息大小限制为 `2⁶⁴ − 1` 位。其块大小为 512 位，字长为 32 位。输出是一个 256 位的摘要。


    压缩函数处理一个 512 位的消息块和一个 256 位的中间哈希值。该函数有两个主要组成部分：压缩函数和消息调度。


    该算法按以下九个步骤工作。


    ##### 预处理


    *   消息填充：当消息长度小于所需的 512 位块大小时，对其进行填充以使其长度达到 512 位。

    *   将消息解析为消息块：确保消息及其填充被划分为多个 512 位的等长块。

    *   设置初始哈希值：该值由八个 32 位字组成，这些字是通过取前八个素数平方根的小数部分的前 32 位而获得的。这些初始值是固定的，用于初始化整个过程。它们提供了一定程度的信心，确保算法中不存在后门。

    '
- fmt: '### Hash Computation


    每个消息块按顺序处理，需要64轮来计算完整的哈希输出。每一轮使用略有不同的常数，以确保没有两轮是相同的。


    - 消息调度进行准备。

    - 八个工作变量进行初始化。

    - 压缩函数执行64次。

    - 计算中间哈希值。

    - 最后，重复步骤5到8直到处理完输入消息中的所有块（数据块）后，通过连接中间哈希值生成输出哈希。


    在高层次上，SHA-256 可以用图 [2-22](#515270_1_En_2_Chapter.xhtml#Fig22) 来可视化。


    ![A flow of a high-level overview. Initial values of eight 32-bit words via message
    blocks 0, 1 to n point to the respective compression functions.](images/515270_1_En_2_Chapter/515270_1_En_2_Fig22_HTML.jpg)


    **图 2-22** SHA-256 高级概述


    如图 [2-22](#515270_1_En_2_Chapter.xhtml#Fig22) 所示，SHA-256 是一种 Merkle-Damgard 结构，它将输入消息划分为大小相等的512位块。初始哈希值，或称初始化向量，由八个32位字（即256位）组成，与第一个消息一起输入压缩函数。后续块依次输入压缩函数，直到处理完所有块，生成输出哈希。


    SHA-256 的压缩函数如图 [2-23](#515270_1_En_2_Chapter.xhtml#Fig23) 所示。


    ![An illustration of the compression function includes the working variables from
    a to h and bitwise rotations of sigma 0 and sigma 1.](images/515270_1_En_2_Chapter/515270_1_En_2_Fig23_HTML.png)


    **图 2-23** SHA-256 压缩函数的一轮


    在图 [2-23](#515270_1_En_2_Chapter.xhtml#Fig23) 中，`a`, `b`, `c`, `d`, `e`, `f`,
    `g`, 和 `h` 是八个工作变量的寄存器。`Maj` 和 `Ch` 是按位应用的函数。`Σ[0]` 和 `Σ[1]` 执行按位旋转。轮常数 `W[j]`
    和 `K[j]` 被添加到哈希函数的主循环（压缩器函数）中，该循环执行64次。


    ### SHA-3 (Keccak) 的设计


    SHA-3 的结构与 SHA-1 和 SHA-2 截然不同。SHA-3 基于无密钥排列，而不是其他使用有密钥排列的典型哈希函数结构。Keccak 也没有使用哈希函数中常用的、用于处理任意长度输入消息的
    Merkle-Damgard 变换。相反，Keccak 采用了一种较新的方法，称为海绵与挤压结构。它是一种随机排列模型。


    SHA-3 的不同变体已被标准化，例如 `SHA3-224`, `SHA3-256`, `SHA3-384`, `SHA3-512`, `SHAKE128`
    和 `SHAKE256`。此外，`SHAKE128` 和 `SHAKE256` 是可扩展输出函数（XOFs），它允许将输出扩展到任意所需长度。


    图 [2-24](#515270_1_En_2_Chapter.xhtml#Fig24) 展示了 SHA-3 或 Keccak 所基于的海绵与挤压模型。类似于海绵，数据（`m`
    输入数据）在应用填充后首先被“吸收”到海绵中。然后，使用异或将其改变为置换状态的一个子集，最后，将输出从代表转换状态的海绵函数中“挤压”出来。比率`r`是海绵函数的输入块大小，而容量`c`决定了安全级别。


    ![An illustration of an S H A 3 function includes m input data, state size b equals
    r plus c, absorb, squeeze, and the hash of m as output.](images/515270_1_En_2_Chapter/515270_1_En_2_Fig24_HTML.png)


    **图 2-24** SHA-3 吸收与挤压函数


    在图 [2-24](#515270_1_En_2_Chapter.xhtml#Fig24) 中，状态大小`b`通过将比特率`r`和容量比特`c`相加来计算。`r`
    和 `c` 可以是任何值，只要 `r + c` 的大小为 25、50、100、200、400、800 或 1600。该状态是一个三维位矩阵，初始设置为 0。数据`m`在应用填充后，通过异或运算逐块进入吸收阶段。


    表 [2-1](#515270_1_En_2_Chapter.xhtml#Tab1) 显示了在 `r + c = 1600` 的最高效设置下，为实现所需输出哈希大小所需的比特率`r`（块大小）和容量`c`的值。


    **表 2-1** SHA-3 支持的比特率和容量


    | - | 比特率 `r`，块大小 | 容量 `c` | 输出哈希大小 |

    | :--- | :--- | :--- | :--- |


    函数`f`是一个置换函数。它包含五种变换操作，名为 Theta、Rho、Pi、Chi 和 Iota，描述如下：


    - `θ` - `Theta`：对状态中的位进行异或，用于混合。

    - `ρ` - `Rho`：执行位旋转的扩散函数。

    - `π` - `Pi`：扩散函数。

    - `χ` - `Chi`：对每个位进行异或，按位组合。

    - `ι` - `Iota`：与轮常数组合。


    关键思想是应用这些变换来实现雪崩效应，这确保了即使输入中发生微小的变化，输出也会发生巨大的变化。这五种操作组合在一起构成一轮。在 SHA-3 标准中，轮数为
    24 轮，以达到所需的安全级别。


    ## 消息认证码


    消息认证码（MACs）用于在密码系统中提供认证服务。MACs 有时被称为密钥哈希函数，我们可以使用它们来提供消息完整性和数据源认证。MACs 可以使用分组密码或哈希函数来构建。


    图 [2-25](#515270_1_En_2_Chapter.xhtml#Fig25) 展示了一个 MAC 操作，其中发送方将认证标签`T`附加到消息`M`上。MACs
    是对称密码原语，使用发送方和接收方之间的共享密钥。发送方使用此密钥生成认证标签，而接收方使用相同的密钥进行验证。MAC 函数将密钥和消息`M`作为输入，并生成认证标签`T`。


    ![An illustration of a MAC function for sender and receiver includes the key,
    MAC, M, and T, and key, MAC, M, and T prime, respectively.](images/515270_1_En_2_Chapter/515270_1_En_2_Fig25_HTML.png)


    **图 2-25** MAC 函数的操作


    `T` 和 `M` 被发送给接收方，接收方运行相同的过程并将 `T` 与 `T''` 进行比较，`T''` 是验证者通过应用相同的 MAC 函数生成的，如果它们匹配，则验证成功。


    ### 基于哈希的 MACs (HMACs)


    与哈希函数类似，基于哈希的 MACs（HMACs）产生固定长度的输出，并以任意长的消息作为输入。在这种方案中，发送方使用 MAC 对消息进行签名，接收方使用共享密钥对其进行验证。密钥与消息一起使用秘密前缀法或秘密后缀法进行哈希处理。对于秘密前缀法，密钥与消息连接，即密钥在前，消息在后；而对于秘密后缀法，密钥在消息之后，如下所示：


    ```

    Secret prefix: M = MAC_k(x) = h(k || x)

    ```


    ```

    Secret suffix: M = MAC_k(x) = h(x || k)

    ```


    两种方法各有利弊。两种方案都曾出现过一些攻击。HMAC 构造方案使用 `ipad`（内部填充）和 `opad`（外部填充）进行填充，这在某些假设下被认为是安全的。


    哈希函数的各种重要应用用于点对点网络和区块链网络，例如 Merkle 树、Patricia 树、Merkle Patricia 树以及分布式哈希表。


    接下来将讨论一些最新的进展，例如可验证延迟函数。'
  raw: '##### Hash Computation


    *   Each message block is then processed in a sequence, and it requires 64 rounds
    to compute the full hash output. Each round uses slightly different constants
    to ensure that no two rounds are the same.


    *   The message schedule prepares.


    *   Eight working variables initialize.


    *   The compression function runs 64 times.


    *   The intermediate hash value is calculated.


    *   Finally, after repeating steps 5 through 8 until all blocks (chunks of data)
    in the input message are processed, the output hash is produced by concatenating
    intermediate hash values.


    At a high level, SHA-256 can be visualized in Figure [2-22](#515270_1_En_2_Chapter.xhtml#Fig22).


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig22_HTML.jpg)


    A flow of a high-level overview. Initial values of eight 32-bit words via message
    blocks 0, 1 to n point to the respective compression functions.


    Figure 2-22


    SHA-256 high-level overview


    As shown in Figure [2-22](#515270_1_En_2_Chapter.xhtml#Fig22), SHA-256 is a Merkle-Damgard
    construction that takes the input message and divides it into equally sized blocks
    of 512 bits. Initial hash values, or the initialization vector, which are composed
    of eight 32-bit words (i.e., 256 bits), are fed into the compression function
    with the first message. Subsequent blocks are fed into the compression function
    until all blocks are processed to produce the output hash.


    The compression function of SHA-256 is shown in Figure [2-23](#515270_1_En_2_Chapter.xhtml#Fig23).


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig23_HTML.png)


    An illustration of the compression function includes the working variables from
    a to h and bitwise rotations of sigma 0 and sigma 1.


    Figure 2-23


    One round of the SHA-256 compression function


    In Figure [2-23](#515270_1_En_2_Chapter.xhtml#Fig23), *a*, *b*, *c*, *d*, *e*,
    *f*, *g*, and *h* are the registers for eight working variables. Maj and Ch are
    functions which are applied bitwise. *Σ*[0] and *Σ*[1] perform bitwise rotation.
    The round constants are *W*[*j*] and *K*[*j*], which are added in the main loop
    (compressor function) of the hash function, which runs 64 times.


    ### Design of SHA-3 (Keccak)


    The structure of SHA-3 is very different from that of SHA-1 and SHA-2\. SHA-3
    is based on unkeyed permutations instead of other typical hash function constructions
    that used keyed permutations. Keccak also does not use the Merkle-Damgard transformation,
    commonly used to handle arbitrary-length input messages in hash functions. Instead,
    a newer approach, called sponge and squeeze construction, is used in Keccak. It
    is a random permutation model.


    Different variants of SHA-3 have been standardized, such as SHA3-224, SHA3-256,
    SHA3-384, SHA3-512, SHAKE128, and SHAKE256\. In addition, SHAKE128 and SHAKE256
    are extendable-output functions (XOFs), which allow the output to be extended
    to any desired length.


    Figure [2-24](#515270_1_En_2_Chapter.xhtml#Fig24) shows the sponge and squeeze
    model on which SHA-3 or Keccak is based. Analogous to a sponge, the data (m input
    data) is first “absorbed” into the sponge after applying padding. It is then changed
    into a subset of permutation state using XOR (exclusive OR), and, finally, the
    output is “squeezed” out of the sponge function representing the transformed state.
    The rate r is the input block size of the sponge function, whereas capacity c
    determines the security level.


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig24_HTML.png)


    An illustration of an S H A 3 function includes m input data, state size b equals
    r plus c, absorb, squeeze, and the hash of m as output.


    Figure 2-24


    The SHA-3 absorbing and squeezing function


    In Figure [2-24](#515270_1_En_2_Chapter.xhtml#Fig24), state size b is calculated
    by adding bit rate r and capacity bits c. r and c can be any values if sizes of
    r + c are 25, 50, 100, 200, 400, 800, or 1600. The state is a three-dimensional
    bit matrix which is initially set to 0. The data m is entered into the absorb
    phase block by block via XOR ⊕ after applying padding.


    Table [2-1](#515270_1_En_2_Chapter.xhtml#Tab1) shows the value of bit rate r (block
    size) and capacity c required to achieve the desired output hash size under the
    most efficient setting of r + c = 1600.


    Table 2-1


    Bit rate and capacity supported in SHA-3


    | -![](images/515270_1_En_2_Chapter/515270_1_En_2_Figa_HTML.jpg)A table with 4
    rows and 3 columns. The column headers are r, block size; c, capacity; and output
    hash size. |


    The function f is a permutation function. It contains five transformation operations
    named Theta, Rho, Pi, Chi, and Iota, which are described as follows:


    *θ*−*Theta*: XOR bits in the state, used for mixing


    *ρ*−*Rho*: Diffusion function performing rotation of bits


    *π*−*Pi*: Diffusion function


    *χ*−*Chi*: XOR each bit, bitwise combine


    *ι*−*Iota*: Combination with round constants


    The key idea is to apply these transformations to achieve the avalanche effect,
    which ensures that even a tiny change in the input results in a substantial change
    in the output. These five operations combined form a single round. In the SHA-3
    standard, the number of rounds is 24 to achieve the desired level of security.


    ## Message Authentication Codes


    Message authentication codes (MACs) are used to provide authentication services
    in a cryptosystem. MACs are sometimes called keyed hash functions, and we can
    use them to provide message integrity and data origin authentication. MACs can
    be constructed using block ciphers or hash functions.


    Figure [2-25](#515270_1_En_2_Chapter.xhtml#Fig25) shows a MAC operation where
    a sender has appended an authentication tag T to the message M. MACs are symmetric
    cryptographic primitives that use a shared key between the sender and the receiver.
    The sender uses this key to generate the authentication tag, whereas the receiver
    uses the same key for verification. The MAC function takes the key and message
    M as input and produces the authentication tag T.


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig25_HTML.png)


    An illustration of a MAC function for sender and receiver includes the key, MAC,
    M, and T, and key, MAC, M, and T prime, respectively.


    Figure 2-25


    Operation of a MAC function


    T and M are sent to the receiver who runs the same process and compares T with
    T’, which the verifier has generated by applying the same MAC function, and if
    they match, the verification is successful.


    ### Hash-Based MACs (HMACs)


    Like the hash functions, hash-based MACs (HMACs) produce a fixed-length output
    and take an arbitrarily long message as the input. In this scheme, the sender
    signs a message using the MAC, and the receiver verifies it using the shared secret
    key. The key is hashed with the message using either the secret prefix or the
    secret suffix method. With the secret prefix method, the key is concatenated with
    the message, that is, the key comes first, and the message comes afterward, whereas
    with the secret suffix method, the key comes after the message, as shown in the
    following:


    ![$$ Secret\ prefix:M= MA{C}_k(x)=h\left(k\Big\Vert x\right) $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equy.png)


    ![$$ Secret\ suffix:M= MA{C}_k(x)=h\left(x\Big\Vert k\right) $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equz.png)


    There are pros and cons to both methods. Some attacks on both schemes have occurred.
    HMAC construction schemes use *ipad* (inner padding) and *opad* (outer padding)
    for padding, which is considered secure with some assumptions.


    Various significant applications of hash functions are used in peer-to-peer networks
    and blockchain networks, such as Merkle trees, Patricia tries, Merkle Patricia
    tries, and distributed hash tables.


    Some latest advancements, such as verifiable delay functions, are discussed next.'
