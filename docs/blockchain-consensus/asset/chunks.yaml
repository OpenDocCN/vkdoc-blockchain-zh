    ### BQP – 有界误差量子多项式时间（Bounded Error Quantum Polynomial Time）


    这个新类别随量子计算的出现而诞生。一个问题属于`BQP`，如果它能在量子计算机上以大于`½`的概率（即高概率）在多项式时间内被正确求解。换句话说，此类包含那些被认为对经典计算机困难，但对量子计算机容易的问题。


    图 9-9 展示了复杂度类。


    ![](img/515270_1_En_9_Fig9_HTML.png)


    复杂度类示意图。从最内层开始，各层依次为`NP complete`、`NP`、`P`、`BPP`、`BQP`和`PSPACE`。


    **图 9-9** 复杂度类


    ### PSPACE – 多项式空间（Polynomial Space）


    此类关注内存利用，而非时间。`PSPACE`中的问题需要多项式大小的内存。


    还有一个随着量子计算而备受关注的概念是超计算（`hypercomputation`）。超计算的思想是，它甚至能解决图灵不完备（`Turing incomplete`）的问题，例如停机问题（`halting
    problem`）。然而，已有研究表明，量子计算机可以比经典计算机快得多，但它并不能解决所有经典计算机无法解决的问题。其核心思想是，即使在量子计算机上，图灵不完备的问题也无法解决。尽管如此，关于无限状态叠加和无限状态图灵机的研究仍在继续，这有可能导致超计算机的构建。


    至此，我们完成了对复杂度的讨论。


    ## 其他量子系统


    随着量子计算的发展，利用量子特性的新系统将会涌现。我们对其进行如下讨论。


    ### 量子网络（Quantum Networks）


    量子网络与经典网络类似，具有相同的路由策略和拓扑结构。关键区别在于，节点可以执行量子计算和相关的量子过程。量子网络中量子设备之间的信道可以是量子的或经典的。

    '
- fmt: '# Quantum Internet


    Just as the ARPANET from 1969 with just four nodes became the Internet of today
    with billions of entities^([⁶](#fn6)) on it, it is expected that small experimental
    scale quantum networks will become a quantum Internet of tomorrow.


    It is envisioned that a quantum network infrastructure will be developed to interconnect
    remote quantum devices and enable quantum communication between them. The quantum
    Internet is governed by laws of quantum mechanics. It transfers qubits and distributes
    entangled quantum states. As the number of nodes grows in the quantum Internet,
    so does the quantum power. This is so because, as the number of qubits scales
    linearly with the number of quantum devices on the network, the quantum Internet
    could enable an exponential quantum speedup, resulting in a “virtual quantum computer”
    capable of solving previously impossible problems.


    Traditional operations present in classical networks such as long-term data storage,
    data duplication (copying), and straightforward state reading are no longer applicable
    in quantum networks:


    *   Long-term data storage is not possible because decoherence in the quantum
    world rapidly corrupts information, making it very difficult to rely on quantum
    memories/storage.

    *   Data copying is not possible in the quantum world due to the no-cloning theorem
    which prohibits copying an unknown qubit. This means that usual mechanisms to
    improve resilience on the network, such as retransmission, are no longer applicable.
    However, note that the no-cloning theorem is a valuable property for secure communications.

    *   Reading quantum states is challenging because when measured, any qubit immediately
    collapses to a classical single state of 0 or 1. Due to uncertainty associated
    with reading quantum states and the no-cloning theorem, direct transmission of
    qubits is only limited to very specific scenarios with short distances.


    However, quantum teleportation can be used to transmit qubits. Quantum teleportation
    is realized using a quantum feature called entanglement, which we discussed earlier.
    Using entanglement, instantaneous transfer of the quantum state encoded in a qubit
    at a sender to a qubit stored at a receiver is possible. The surprising thing
    is that this transfer occurs without physical transfer of the qubit at the sender.
    Entanglement is the core enabler of the quantum Internet.


    A quantum Internet enables several exotic applications such as blind computing,
    secure communications, and noiseless communications.


    # Quantum Distributed Systems – Distributed Quantum Computing


    With the availability of the quantum Internet, it is not difficult to envisage
    that quantum nodes will also engage in communication with each other to cooperate
    and collectively solve some problem using the distributed computing approach.
    This development will inevitably lead to the emergence of distributed quantum
    systems or distributed quantum computing.


    We can think of a layered approach where at the lowest layer we have a network
    layer composed of classical and quantum links. Then we have a layer of quantum
    computers running on the next layer. Next up are local and remote operations,
    which include local quantum operations and remote operations on qubits. By combining
    all operations and computing layers underneath, a virtual quantum computer can
    be imagined, which combines all the qubits and results in a scalable virtual quantum
    computer. A controller or distributed quantum compiler is then required to translate
    quantum algorithms into a sequence of local and remote operations. Finally, we
    have a layer on top which runs quantum algorithms. This layered approach can be
    visualized in Figure [9-10](#515270_1_En_9_Chapter.xhtml#Fig10).


    ![](images/515270_1_En_9_Chapter/515270_1_En_9_Fig10_HTML.jpg)


    A blockchain ecosystem has 6 layers. Quantum algorithms, distributed compiler,
    virtual processors, operations, quantum computers, and networks.


    **Figure 9-10** An abstract quantum blockchain ecosystem


    # Quantum Blockchain


    Inevitably with the quantum Internet and quantum distributed systems, we can envisage
    a quantum blockchain that utilizes quantum computers as nodes and the underlying
    quantum Internet as the communication layer.


    There are two facets of blockchains in the quantum world. The first one is the
    pure quantum blockchains running on top of the quantum Internet. Some work has
    been done in this regard, and an innovative proposal by Rajan and Visser is to
    encode blockchains into a temporal GHZ state.


    The other aspect is the existence of classical blockchains in the post-quantum
    world. Quantum computers can impact the security of blockchains and consensus
    adversely due to the ability to break classical cryptography. More on this later
    in this chapter in the last section.


    A quantum blockchain can comprise several elements. The quantum blockchain can
    have both classical and quantum channels and devices. It can exist as a quantum
    algorithm, among others, in the “distributed quantum algorithm” layer in the distributed
    quantum computing ecosystem discussed in the previous section.


    We elaborated a layered approach in the previous section. We can envisage blockchains
    and other algorithms running on the top layer. This whole layer approach represents
    quantum Internet–based distributed quantum computing ecosystem.


    Another element could be a quantum transaction coordinator responsible for transaction
    ordering and dissemination. On the other hand, by using blind computing, quantum
    blockchains can immediately realize the unparalleled privacy which will enable
    quantum scale blockchain applications that require privacy, for example, finance,
    health, and government-related applications.'
