- fmt: "# 排版后的文本\n\n- `t`: Hash of the target checkpoint to be justified\n- `h(s)`:\
    \ Height of the source checkpoint\n- `h(t)`: Height of the target checkpoint\n\
    - `S`: Signature on the complete vote message from the sender\n\nValidators create\
    \ the vote message, sign it, and broadcast to the network. The hash of a checkpoint\
    \ is used to identify the corresponding checkpoint. The vote is valid only if\
    \ `s` is an ancestor of `t` in the checkpoint tree and the public key of the validator\
    \ is in the validator set. When more than two-thirds of validators vote on a chain\
    \ from a source to a target, this chain or link becomes the supermajority link.\
    \ For example, `cp'` as a source and `cp` as a target, then `cp' → cp` is the\
    \ majority link. A checkpoint is justified if it is the genesis block or if it\
    \ is the checkpoint in a supermajority link where the last checkpoint is justified.\
    \ Precisely, we can say a checkpoint `cp` is justified if there is a supermajority\
    \ link `cp' → cp` where `cp'` is justified. A checkpoint `cp` is considered final\
    \ if it is justified and there exists a supermajority link `cp → cp'` where `cp'`\
    \ is a direct child of checkpoint `cp`.\n\nJustified checkpoints are not considered\
    \ final as there can exist conflicting justified checkpoints. To finalize a checkpoint\
    \ `cp`, a second round of confirmation is required where a direct child `cp'`\
    \ of `cp` with a supermajority link `cp → cp'` is justified.\n\n## Protocol steps\n\
    \n- Token holders deposit a stake in the network.\n- During a consensus epoch:\n\
    \  - Identify valid checkpoints.\n- Add them to the checkpoint tree.\n- Broadcast\
    \ a vote for a checkpoint pair (source, target).\n- Evaluate received votes’ validity,\
    \ check against slashing rules and the deposited stake of the vote signer.\n-\
    \ If the checkpoint pair has more than two-thirds of total deposited stakes, then\
    \ the checkpoint is considered validated.\n- The checkpoint pair is justified\
    \ and finalized.\n- Repeat the process.\n\nEssentially, the process works in three\
    \ steps. First, votes are casted for a checkpoint; if >2/3 votes are acquired,\
    \ then the checkpoint is in a justified state. Finally, the chain is finalized\
    \ to form the canonical chain. Justification does not mean finalized; there can\
    \ be multiple justified chains in the block tree. Finality occurs when two consecutive\
    \ checkpoints receive 2/3 votes.\n\n## Safety and liveness\n\nAny validator who\
    \ violates these conditions will be penalized by slashing their deposit. These\
    \ are known as minimum slashing conditions:\n\n- A validator must not publish\
    \ two distinct votes for the same target checkpoint height.\n- A validator must\
    \ not vote again within the source to target span of its other existing vote.\n\
    \nThere are two safety and liveness requirements:\n\n- Accountable safety\n- Plausible\
    \ liveness\n\nAccountable safety is a little different from the traditional safety\
    \ requirement in consensus protocols. Safety simply means that two conflicting\
    \ checkpoints can never be finalized unless more than one-third of validators\
    \ deviate from the protocol. Accountability means that misbehaving validators\
    \ can be identified and penalized.\n\nPlausible liveness means that as long as\
    \ there exist children that extend the finalized chain, supermajority links can\
    \ always be added to produce new finalized checkpoints.\n\n## Summary\n\nThis\
    \ chapter discussed the blockchain age protocols that emerged after Bitcoin. There\
    \ are several types of blockchain consensus protocols; some are based on voting,\
    \ some are proof of work, and another class is proof of stake protocols. All these\
    \ protocols have some safety and liveness properties that ensure that the protocol\
    \ is correct and works correctly in a given environment. We discussed several\
    \ of these points in this chapter. A concluding comparison of these protocols\
    \ is presented in the last chapter, Chapter [10](#515270_1_En_10_Chapter.xhtml).\n\
    \nWe also discussed protocols such as ETHASH, proof of stake, its different types,\
    \ and BFT variations, including HotStuff and Tendermint, in detail. Modern protocols\
    \ such as Casper FFG, Solana’s proof of history, and Polkadot’s GRANDPA and BABE\
    \ were also introduced. It is impossible to cover all protocols in this chapter,\
    \ but at least adequate information is given to build a good understanding of\
    \ different types of algorithms used in the blockchain. Some more protocols that\
    \ we did not cover, such as PoET, HoneyBadger BFT, and Snow, will be briefly presented\
    \ in the last chapter.\n\nThis area is a very active field of research, and many\
    \ researchers in academia and industry are very much interested in this area.\
    \ As such, only further evolution and advancement is expected in this space.\n\
    \nIn the next chapter, we will discuss another exciting topic, quantum consensus,\
    \ a subject that has emerged recently with the advent of quantum computing.\n\n\
    # 9. Quantum Consensus\n\nThis chapter covers quantum consensus. Before we explain\
    \ what quantum consensus is, a basic introduction to quantum computing and its\
    \ advantages is given to build an understanding about how quantum computer works.\
    \ Moreover, topics like quantum networks, quantum Internet, quantum cryptography,\
    \ and quantum blockchains are also covered. Then we discuss quantum consensus\
    \ and explain what it is, how quantum computing impacts classical consensus in\
    \ classical and quantum networks, and how quantum computing can enhance existing\
    \ distributed consensus protocols. We survey what has been done so far in the\
    \ research community and some open research problems."
