- fmt: '# World State Trie


    A state trie is a key-value mapping from user addresses to an account state. Also
    called the world state trie, this trie has its root referred in the block. A state
    trie is composed of account states.


    # Transaction Receipts Trie


    Transaction receipts store results of transaction execution and include information
    such as status, logs, and events. Each block contains a transaction receipts trie.
    A transaction receipts trie consists of transaction receipts.


    # Account Storage Trie


    This trie has its root as a storage root in the account state. It stores smart
    contract code and relevant data.


    Figure [4-16](#515270_1_En_4_Chapter.xhtml#Fig16) shows all tries including the
    block structure.


    ![](images/515270_1_En_4_Chapter/515270_1_En_4_Fig16_HTML.png)


    A chart lists the tries and the block structure. The listed tries are receipts,
    transaction, account storage, and world state.


    Figure 4-16


    Block and tries


    Transactions within the blocks are executed using the Ethereum virtual machine,
    which we describe next.


    ## Mining in Ethereum


    In contrast with Bitcoin, mining in Ethereum is ASIC (application-specific integrated
    circuit) resistant.


    ASIC-based, special-purpose, efficient, and extremely fast hardware is built for
    performing Bitcoin mining. These devices have only one specific job, and that
    is to run hash function `SHA-256` repeatedly and extremely fast.


    Ethereum uses proof of work; however, the consensus is memory-hard, which makes
    building ASICs difficult due to large memory requirements. The protocol is called
    `ETHASH`, which generates a large direct acyclic graph (DAG) to be used by miners.
    DAG grows and shrinks according to the network difficulty level; however, over
    time, it has increased up to roughly about 4 GB in size. As this DAG consumes
    large memory, building ASICs with such large memory is prohibitively hard, thus
    making `ETHASH` an ASIC-resistant algorithm. We will explain `ETHASH` in more
    detail in Chapter [8](#515270_1_En_8_Chapter.xhtml).


    ## Ethereum Virtual Machine and Smart Contracts


    The Ethereum virtual machine (EVM) is the core working horse of the Ethereum blockchain.
    It is a 256-bit register stack with a depth of 1024 items. It is designed to run
    the smart contract code compiled into bytecode. Smart contracts are usually written
    in a domain-specific language (DSL) called Solidity; however, there are other
    languages, such as Vyper, which developers can also use to write smart contract
    code.


    We can define a smart contract as a secure and unstoppable computer program representing
    an automatically executable and enforceable agreement. Smart contracts do not
    necessarily need a blockchain; however, a blockchain is the most natural platform
    for running smart contracts. This is so because a blockchain provides all security
    guarantees that make smart contracts secure, unstoppable, automatically executable,
    and enforceable.


    EVM is designed to be Turing complete; however, it is bound by a gas limit, which
    means that its execution is metered and paid for in the so-called gas fee denominated
    in ether. This mechanism allows for any arbitrary code execution but with the
    safety that the execution will halt when the gas runs out, preventing infinite
    executions due to loops or malicious code. EVM executes bytecode composed of opcodes
    that cost gas on a per-operation basis. There are around 150 opcodes categorized
    into several groups: arithmetic opcodes, memory manipulating opcodes, and program
    flow–related opcodes. A complete list is available in the Ethereum yellow paper.


    The consensus in Ethereum is proof of work based, which we will cover in detail
    in Chapter [8](#515270_1_En_8_Chapter.xhtml).


    The Ethereum 1.0 blockchain will continue to evolve according to its road map
    and will eventually become a shard in phase 1 of Ethereum 2.0.


    With this, we complete our brief discussion on the two most prominent and pioneering
    blockchain platforms. More modern blockchain platforms, such as Polkadot, Cardano,
    Solana, Avalanche, and Ethereum 2.0, will be introduced when we discuss their
    respective consensus protocols in Chapter [8](#515270_1_En_8_Chapter.xhtml).


    ## Summary


    * A blockchain is a peer-to-peer, cryptographically secure, append-only, immutable,
    and tamper-proof shared distributed ledger composed of temporally ordered and
    publicly verifiable transactions.

    * Origins of the blockchain can be found in previous attempts to create digital
    cash and digital timestamping of documents.

    * A blockchain is a distributed system.

    * Blockchains are primarily of two types, permissioned and public.

    * Blockchains have many cross-industry use cases, including but by no means limited
    to government, finance, medical, supply chain, and technology.

    * Blockchains provide several benefits, such as cost saving, transparency, and
    data sharing.

    * Various technologies such as public key cryptography, hash functions, and Merkle
    trees have provided foundations for building security of the blockchain.

    * From the CAP theorem’s perspective, permissioned blockchains are CP systems,
    whereas public chains are AP systems.

    * A blockchain ledger abstraction has several properties along with `get()`, `append()`,
    and `verify()` operations.

    * Bitcoin is the first blockchain invented by Satoshi Nakamoto.

    * Ethereum is the first smart contract blockchain platform proposed by Vitalik
    Buterin.

    * Bitcoin and Ethereum are the most prominent platforms.

    * Ethereum will become a shard of Ethereum 2.0.

    * Modern blockchain platforms are focusing on the heterogenous multichain architecture
    where multiple chains interoperate and form an ecosystem of blockchains cooperating
    and interoperating together, which serve multiple use cases.


    # 5. Blockchain Consensus


    Blockchain consensus is the core element of a blockchain, which ensures the integrity
    and consistency of the blockchain data. Blockchain being a distributed system,
    in the first instance, it may appear that we can apply traditional distributed
    consensus protocols, such as Paxos or PBFT, to address the agreement and total
    order requirements in a blockchain. However, this can only work in consortium
    chains where participants are known and limited in number. In public chains, traditional
    consensus protocols cannot work due to the permissionless environment. However,
    in 2008 a new class of consensus algorithms emerged, which relied on proof of
    work to ensure random leader election by solving a mathematical puzzle. The elected
    leader wins the right to append to the blockchain. This is the so-called Nakamoto
    consensus protocol. This algorithm for the very first time solved the problem
    of consensus in a permissionless public environment with many anonymous participants.


    We have already discussed distributed consensus from a traditional perspective
    in Chapter [3](#515270_1_En_3_Chapter.xhtml). In this chapter, we will cover what
    blockchain consensus is, how the traditional protocols can be applied to a blockchain,
    how proof of work works, how it was developed, and what the blockchain consensus
    requirements are, and we will analyze blockchain consensus such as proof of work
    through the lens of distributed consensus. Also, we’ll see how the requirements
    of consensus may change depending upon the type of blockchain in use. For example,
    for public blockchains proof of work might be a better idea, whereas for permissioned
    blockchains BFT-style protocols may work better.'
