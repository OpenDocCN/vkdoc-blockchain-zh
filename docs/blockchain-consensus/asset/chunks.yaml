  trans: '

    ### 委托权益证明（Delegated PoS）


    `DPoS` 的工作方式类似于权益证明，但其关键区别在于引入了投票和委托机制，激励用户维护网络安全。`DPoS` 限制了所选共识委员会的规模，从而降低了协议中的通信复杂度。共识委员会由通过委托机制选举产生的所谓“委托者”组成。其流程是：利益相关者利用自己的权益投票选出委托者。委托者（也称为见证人）的身份是可识别的，投票者知道他们是谁，因此降低了委托者作恶的可能性。此外，还可以实施基于声誉的机制，允许委托者根据其提供的服务以及在网络上的行为来建立声誉。委托者可以为自己宣传以争取更多选票。获得最多选票的委托者将成为共识委员会或小组的成员。通常，共识委员会成员之间运行着一种
    `BFT` 风格的协议，用于生成和最终敲定区块。每个成员可以采用轮询方式提议下一个区块，但此活动仅限于选定的共识委员会内部。委托者通过生产区块获得激励。同样，在
    `BFT` 假设下，共识委员会内部的协议可以在一个 `3f+1` 成员的组中容忍 `f` 个故障。换句话说，它可以容忍三分之二（即 33%）的委托者出现故障。该协议提供了即时最终确定性，并根据利益相关者的权益比例提供激励。由于无需全网共识，只需一个较小的委托者小组负责决策，因此效率显著提高。`Delegated
    PoS` 已在 `EOS`、`Lisk`、`Tron` 以及不少其他链上得到实现。


    ### 流动权益证明（Liquid PoS）


    `LPoS` 是 `DPoS` 的一种变体。代币持有者将其验证权委托给验证者，而无需转让代币的所有权。存在一个委托市场，委托者在此相互竞争，以期成为选定的验证者。在这里，竞争主要围绕费用、提供的服务、声誉、支付频率以及可能还有其他因素展开。任何不当行为，例如验证者收取过高费用，都会迅速被发现并受到相应惩罚。代币持有者也可以自由地转向任何其他验证者。与
    `DPoS` 固定的验证者集合相比，`LPoS` 支持动态数量的验证者。代币持有者还可以通过自行选举成为验证者。持有少量代币的用户可以委托给持有大量代币的用户。同时，许多小额代币持有者可以组成一个联合体。与其他
    `PoS` 协议相比，这种“流动”协议提供了极大的灵活性，并有助于防止形成旨在成为固定验证者集合的游说团体。`LPoS` 被用于 `Tezos` 区块链。


    存在一些针对 `PoS` 的攻击，例如无成本利益问题（Nothing-at-Stake Attack）、长程攻击（Long-Range Attack）以及权益磨削攻击（Stake
    Grinding Attack）。我们如下解释这些攻击。


    ### 攻击


    `PoS` 普遍遭受一种无成本模拟（Costless Simulation）问题的困扰，即攻击者可以在不产生任何额外成本的情况下模拟链的任何历史，而 `PoW`
    的成本则是算力。这种无成本的区块生成是 `PoS` 中许多攻击的基础。


    #### 无成本利益问题（Nothing-at-Stake Problem）


    当出现多个分叉时，就会发生无成本利益问题或双重押注问题。攻击者可以在每个分叉之上生成一个区块，而无需任何额外成本。为了解决这个问题，协议中引入了经济惩罚机制来阻止攻击者发起此类攻击。如果有大量节点这样做，那么即使持有代币比例低于
    50% 的攻击者也能发动双花攻击。


    #### 长程攻击（Long-Range Attacks）


    长程攻击的存在是由于弱主观性（Weak Subjectivity）和无成本模拟。长程攻击之所以可能，也是因为无成本模拟：攻击者从创世区块开始创建一个新的分支，其目的是在主链被恶意链的长度超越后，接管原有的良好主链。这可能会创建一条与区块链有害的替代历史。


    弱主观性问题会影响新节点以及长时间离线后重新加入网络的节点。由于节点不同步，并且网络中通常存在多个分叉，这些节点无法区分哪个节点是正确节点、哪个是恶意节点；它们可能会错误地将恶意分叉视为有效分支。


    #### 其他攻击


    **活性拒绝（Liveness Denial）** 是 `PoS` 可能遭受的另一种攻击。在这种攻击中，部分或全部验证者共同决定停止验证区块，从而导致区块生产停滞。协议对此类活动进行惩罚可以防止这类攻击。


    **自私挖矿（Selfish Mining）** 或扣块攻击（Block Withholding Attack）发生在攻击者离线挖掘自己的链时。一旦该链达到理想长度，攻击者就将此链发布到网络中，期望恶意链能够取代原有的良好主链。这可能导致诚实验证者浪费资源，从而扰乱网络。


    **磨削攻击（Grinding Attack）** 发生在 `PoS` 中，如果区块生产者的选举过程不是随机的。如果该过程没有引入随机性，那么某个区块生产者就可以反复增加自己被选中的频率，从而导致审查或不成比例的奖励。解决这个问题的一个简单方法是采用良好的随机选择过程，通常基于可验证随机函数（`VRFs`）。


    接下来，我们讨论以太坊的工作量证明——`Ethash`。

    '
- fmt: '# Ethereum’s Proof of Work


    We discussed `PoW` for Bitcoin in detail in Chapter [5](#515270_1_En_5_Chapter.xhtml).
    In this section, we’ll see how `ETHASH` works, the `PoW` used in Ethereum.


    `Ethash` is the evolved form of the Dagger-Hashimoto algorithm. The key idea behind
    mining is to find a `nonce` (an arbitrary random number), which, once concatenated
    with the block header and hashed, results in a lower number than the current network
    difficulty level. Initially, the difficulty was low when Ethereum was new, and
    even CPU and single GPU mining was profitable to a certain extent, but that is
    no longer the case. So now, only pooled mining or large GPU mining farms are used
    for profitable mining purposes.


    `Ethash` is a memory-hard algorithm, making it challenging to implement on specialized
    hardware due to the requirement of large and fast memories on `ASICS`, which is
    generally not practical. Note that for quite some time, this memory hardness of
    `Ethash` prevented the development of `ASICs`, but now various `ASIC` miners are
    available for Ethereum mining.


    This algorithm requires subsets of a fixed resource called a directed acyclic
    graph (`DAG`) to be chosen, depending on the `nonce` and block headers.


    `DAG` is a large, pseudorandomly generated dataset. This graph is represented
    as a matrix in the `DAG` file created during the Ethereum mining process. The
    `Ethash` algorithm has the `DAG` as a two-dimensional array of 32-bit unsigned
    integers. Mining only starts when `DAG` is fully created the first time a mining
    node starts.


    This `DAG` is used as a seed by the `Ethash` algorithm. The `Ethash` algorithm
    requires a `DAG` file to work. A `DAG` file is generated every epoch, 30,000 blocks.
    `DAG` grows linearly as the chain size grows.


    The protocol works as follows:


    - The header from the latest block and a 32-bit random `nonce` are combined using
    the `Keccak-256` hash function.

    - This produces a 128-bit structure called `mix` which determines which data,
    that is, a 128-byte page, to select from the `DAG`.

    - Once the data is fetched from the `DAG`, it is “mixed” with the `mix` to produce
    the next `mix`, which is then used to fetch data from the `DAG` and subsequently
    mixed again. This process repeats 64 times.

    - Eventually, the 64th `mix` is run through a digest function to produce a 32-byte
    sequence called the `mix digest`.

    - This sequence is compared with the difficulty target. If it is less than the
    difficulty target, the `nonce` is valid, and the `PoW` is solved. As a result,
    the block is mined. If not, then the algorithm repeats with a new `nonce`.


    We can visualize this process in Figure [8-2](#515270_1_En_8_Chapter.xhtml#Fig2).


    ![](images/515270_1_En_8_Chapter/515270_1_En_8_Fig2_HTML.png)


    An organizational chart of `DAG` is categorized into 3 `DAG` pages that are linked
    to a cyclic flow including header, `nonce`, and other functions.


    **Figure 8-2** Ethash process


    `Ethash` has several objectives:


    - The algorithm consumes almost all available memory access bandwidth, which is
    an ASIC resistance measure.

    - Mining with `Ethash` using GPUs is easier to perform.

    - Light clients can verify mining rounds much efficiently and should be able to
    become operational quickly.

    - The algorithm runs prohibitively slow on light clients as they are not expected
    to mine.


    As the Ethereum execution layer (formerly Eth1) advances toward the consensus
    layer (formerly Ethereum 2), this `PoW` will eventually phase out. When the current
    EVM chain is docked into the beacon chain, that is, the so-called “the merge”
    happens, `Casper FFG` will run on top of `PoW`. Eventually, however, `Casper CBC`,
    the pure `PoS` algorithm, will finally take over.


    Also, with ice age activation, the `PoW` will become almost impossible to mine
    due to the extreme difficulty level induced by the “ice age,” and users will have
    no choice but to switch to `PoS`.


    # Solana


    Solana is a layer 1 blockchain with smart contract support introduced in 2018.
    Developers of Solana aimed for speed, security, scalability, and decentralization.
    At the time of writing, it is in Beta, and it is growing in popularity quickly.
    Though it is an operational network with production systems running on it, there
    are some technical issues which are being addressed.


    The ledger is a verifiable delay function where time is a data structure, that
    is, data is time. It potentially supports millions of nodes and utilizes GPUs
    for acceleration. `SOL` coin is the native token on the platform used for governance
    and incentivization. The main innovations include the following.


    Proof of history (`PoH`) enables ordering of events using a data structure–based
    cryptographic clock instead of an external source of time, which then leads to
    consensus.


    `TowerBFT` is a protocol for consensus derived from `PBFT`. Note that `PoH` is
    not a consensus protocol, it is simply a mechanism to enable ordering of events
    using a data structure–based clock. A consensus mechanism is still needed to enable
    nodes to vote on a correct branch of the ledger.


    `Turbine` is another innovation which enables block propagation in small chunks
    called `shreds`, which helps to achieve speed and efficiency. There are no memory
    pools in Solana as transactions are processed so fast that memory pools do not
    form. This mechanism has been named the Gulf stream.


    Solana supports parallel execution of smart contracts, which again results in
    efficiency gains.


    Transactions are validated in an optimized fashion using pipelining in the so-called
    transaction processing unit residing within validators.


    Cloud break is a name given to the database which is horizontally scalable. Finally,
    archivers or replicators are nodes which allow for distributed ledger storage,
    as in a high throughput system such as Solana data storage can become a bottleneck.
    For this purpose, archivers are used which are incentivized to store data.


    As our main focus is consensus algorithms, I will leave the introduction to blockchains
    here and move on to discussing the actual consensus and relevant mechanisms in
    Solana.


    Solana uses proof of stake and `TowerBFT` consensus algorithms. One of the key
    innovations in Solana is proof of history, which is not a consensus algorithm
    but allows to create a self-consistent record of events proving that some event
    occurred before and after some point in time. This then leads to consensus. It
    results in reducing the message complexity in a BFT protocol where effectively
    communication is replaced by local computations. This immediately results in high
    throughput and subsecond finality times. It has been long known in the distributed
    systems research community that if somehow communication can be replaced with
    local computation, then significant performance can be achieved, and many clock
    synchronization protocols emerged as a result. However, generally all of these
    relied on an external source of time either via atomic clocks or GPS and then
    use an NTP type of protocol to synchronize. `PoH` is a proof for cryptographically
    proving order and passage of time between events without relying on an external
    source of time.'
