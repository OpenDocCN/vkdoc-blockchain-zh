    require (by regulation MiFID II) that the mechanism format the timestamp on messages
    in the trading system in microseconds and be accurate within 100 microseconds.
    From a clock synchronization point of view, only 100 microseconds divergence is
    allowed from UTC. While such requirements are essential for the proper functioning
    and regulation of the trading systems, they also pose technical challenges. In
    such scenarios, the choice of source of accurate time, choice of synchronization
    algorithms, and handling of skews and drifts become of prime importance.


    You can see specific MiFID requirements here as a reference:


    [`https://ec.europa.eu/finance/securities/docs/isd/mifid/rts/160607-rts-25-annex_en.pdf`](https://ec.europa.eu/finance/securities/docs/isd/mifid/rts/160607-rts-25-annex_en.pdf)


    There are other applications of atomic clocks in defense, geology, astronomy,
    navigation, and many others.


    Recently, Sapphire clocks have been developed, which are much more precise than
    even cesium-based atomic clocks. It is so precise that it can lose or gain a second
    in three billion years.


    Usually, there are two ways in which time is represented in computers. One is
    epoch time, also called Unix time, which is defined as the number of seconds elapsed
    since January 1, 1970\. Another common timestamp format is ISO8601, which defines
    a date and time format standard.


    #### Synchronization Algorithms for Physical Clocks


    There are two methods to synchronize clocks:


    1.  External synchronization


    2.  Internal synchronization


    In the external clock synchronization method, there is an external and authoritative
    source of time to which nodes in a distributed system synchronize with.


    In the internal synchronization method, clocks in nodes (processes) are synchronized
    with one another.


    ##### NTP


    The network time protocol (NTP) allows clients to synchronize with UTC. In NTP,
    servers are organized in so-called strata, where stratum 1 servers (primary time
    servers) are directly connected to an accurate time source in stratum 0, for example,
    GPS or atomic clock. Stratum 2 servers synchronize with stratum 1 servers over
    the network, and stratum 2 servers synchronize with stratum 3 servers. This type
    of architecture provides a reliable, secure, and scalable protocol. Reliability
    comes from the use of redundant servers and paths. Security is provided by utilizing
    appropriate authentication mechanisms, and scalability is characterized by NTP’s
    ability to serve a large number of clients. While NTP is an efficient and robust
    protocol, inherent network latency, misconfigurations in the protocol setup, network
    misconfigurations that may block the NTP protocol, and several other factors can
    still cause clocks to drift.'
