- fmt: '## Quantum Computational Complexity


    在计算机科学中，我们习惯于分析算法，以了解运行算法所需的资源。这种分析从两个角度审视算法：算法运行所需的步数（时间复杂度）以及它将消耗多少内存或“工作空间”（空间复杂度）。


    为了描述和分类算法的时间与空间复杂度，我们使用大O符号（`Big O`）。这种分类特别基于研究算法运行时间或空间需求随输入规模增长的方式。图[9-8](#515270_1_En_9_Chapter.xhtml#Fig8)展示了一张图表，直观地说明了问题类别在复杂度方面的表现。


    ![](images/515270_1_En_9_Chapter/515270_1_En_9_Fig8_HTML.png)


    一张图绘制了`O(2^n)`指数级、`O(n^3)`立方级、`O(n^2)`平方级、`O(n)`线性、`O(log n)`对数、`O(√n)`次线性和`O(1)`常数。


    **图 9-8** 大O复杂度图


    常见的大O复杂度阶次在表[9-1](#515270_1_En_9_Chapter.xhtml#Tab1)中描述。


    **表 9-1** 大O复杂度阶次


    | 名称 | 大O符号 | 示例 |

    | --- | --- | --- |

    | 常数时间 | `O(1)` | 判断一个数是奇数还是偶数 |

    | 对数 | `O(log n)` | 二分查找 |

    | 次线性（平方根） | `O(√n)` |  |

    | 线性 | `O(n)` | 线性查找 |

    | 平方 | `O(n²)` | 插入排序 |

    | 立方 | `O(n³)` | `n × n`矩阵的简单乘法 |

    | 指数 | `O(2^n)` | 递归斐波那契 |


    算法是包含特定指令集以解决计算问题的方法。计算复杂度是将不同问题归入合适类别的研究。自然地，这里需要根据解决问题所需的计算资源，将算法正式划分为不同类别。为此，引入了复杂度类（`complexity
    classes`）的概念。


    随着量子计算的出现，新的复杂度类也涌现出来。量子计算机能够解决经典计算机无法解决的`NP`困难问题。


    存在多种复杂度类，我们对其描述如下。


    ### P – 多项式（Polynomial）


    多项式时间类（`P`）对在多项式时间内（即合理的时间内）可解的问题进行分类。


    ### NP – 非确定性多项式（Nondeterministic Polynomial）


    `NP`类意味着问题的解可以更快地被验证，即在多项式时间内完成。`P`类的一个例子是乘法，而因子分解属于`NP`类。例如，两个数的乘法属于`P`类，而因数分解（找出是哪两个数相乘）属于`NP`类。然而，如果解已存在，那么验证该解很快；因此它属于`NP`类。


    `NP`完全（`NP-complete`）问题是那些同时属于`NP`类，且所有`NP`问题都可以“多项式时间”归约到该特定`NP`问题的问题。`NP`困难（`NP-hard`）问题是这样的：如果我们知道任何`NP`问题都可以归约到该特定（可能为`NP`类）问题，但我们并不确定该问题本身是否属于`NP`类。换句话说，`NP`完全问题是指任何`NP`问题都能归约到这些问题；而`NP`困难问题是指它们可以归约到`NP`类，但不确定它们是否属于`NP`类。`NP`完全问题的一个著名例子是旅行商问题（`travelling
    salesman problem`）。


    ### BPP – 有界误差概率多项式时间（Bounded Error Probabilistic Polynomial Time）


    此类包含`P`类。这些问题在多项式时间内可解，且正确概率大于`½`。`BPP`中的问题要么在多项式时间内可确定性求解，要么以超过三分之二的概率被概率性地正确求解。


    ### BQP – 有界误差量子多项式时间（Bounded Error Quantum Polynomial Time）


    这个新类别随量子计算的出现而诞生。一个问题属于`BQP`，如果它能在量子计算机上以大于`½`的概率（即高概率）在多项式时间内被正确求解。换句话说，此类包含那些被认为对经典计算机困难，但对量子计算机容易的问题。


    图[9-9](#515270_1_En_9_Chapter.xhtml#Fig9)展示了复杂度类。


    ![](images/515270_1_En_9_Chapter/515270_1_En_9_Fig9_HTML.png)


    复杂度类示意图。从最内层开始，各层依次为`NP complete`、`NP`、`P`、`BPP`、`BQP`和`PSPACE`。


    **图 9-9** 复杂度类


    ### PSPACE – 多项式空间（Polynomial Space）


    此类关注内存利用，而非时间。`PSPACE`中的问题需要多项式大小的内存。


    还有一个随着量子计算而备受关注的概念是超计算（`hypercomputation`）。超计算的思想是，它甚至能解决图灵不完备（`Turing incomplete`）的问题，例如停机问题（`halting
    problem`）。然而，已有研究表明，量子计算机可以比经典计算机快得多，但它并不能解决所有经典计算机无法解决的问题。其核心思想是，即使在量子计算机上，图灵不完备的问题也无法解决。尽管如此，关于无限状态叠加和无限状态图灵机的研究仍在继续，这有可能导致超计算机的构建。


    至此，我们完成了对复杂度的讨论。


    ## 其他量子系统


    随着量子计算的发展，利用量子特性的新系统将会涌现。我们对其进行如下讨论。


    ### 量子网络（Quantum Networks）


    量子网络与经典网络类似，具有相同的路由策略和拓扑结构。关键区别在于，节点可以执行量子计算和相关的量子过程。量子网络中量子设备之间的信道可以是量子的或经典的。'
  raw: '## Quantum Computational Complexity


    In computer science, we are used to analyze algorithms to understand the resources
    required to run an algorithm. The analysis looks at algorithms from two angles,
    the time complexity of how many steps the algorithm will take to run and how much
    memory or “work space” it will consume. This is usually referred to as time and
    space complexity, respectively.


    To describe and classify the time and space complexity of algorithms, the big
    *O* notation is used. Particularly, this classification is based on the study
    of how the time to run or space requirements of algorithms grow as the input size
    grows. A chart is presented in Figure [9-8](#515270_1_En_9_Chapter.xhtml#Fig8),
    which gives a visual indication of how the problem class behaves from a complexity
    point of view.


    ![](images/515270_1_En_9_Chapter/515270_1_En_9_Fig8_HTML.png)


    A graph plots O 2 n exponential, O n cubed cubic, O n square quadratic, O n linear,
    O log n logarithmic, O under root n sublinear, and O 1 constant.


    Figure 9-8


    Big-O complexity chart


    Common Big-O complexity orders are described in Table [9-1](#515270_1_En_9_Chapter.xhtml#Tab1).


    Table 9-1


    Big-O complexity orders


    | Name | Big-O Notation | Examples |

    | --- | --- | --- |

    | Constant time | *O* (1) | Find if a number is odd or even |

    | Logarithmic | *O* (*log n*) | Binary search |

    | Sublinear (square root) | *O* (√*n*) |   |

    | Linear | *O*(*n*) | Linear search |

    | Quadratic | *O*(*n*²) | Insertion sort |

    | Cubic | *O*(*n*³) | Simple multiplication of *n* × *n* matrices |

    | Exponential | *O*(2^(*n*)) | Recursive Fibonacci |


    Algorithms are methods which contain a specific set of instructions to solve computational
    problems. Computation complexity is the study of categorization of different problems
    into suitable classes. Naturally, a need here arises to formally categorize the
    algorithms into different categories based on the computational resources required
    to solve a problem. For this purpose, complexity classes are considered.


    With quantum computing, new complexity classes have also emerged. Quantum computers
    can solve NP hard problems, which classical computers cannot.


    Several complexity classes exist; we describe them as follows.


    ### P – Polynomial


    A polynomial time class categorizes problems which are solvable in polynomial
    time, that is, a reasonable amount of time.


    ### NP – Nondeterministic Polynomial


    An NP class means that the solution to the problem can be checked quicker, that
    is, in polynomial time. One example of P is multiplication, whereas factorization
    is NP. For example, the multiplication of two numbers is in class P, whereas factoring
    (finding which two numbers were multiplied) is in class NP. However, if the solution
    is there, then it’s quick to verify the solution; hence, it is in the NP class.


    NP-complete problems are those if they are in NP and all NP problems are “polynomial
    time” reducible to the NP problem under consideration. NP hard problems are those
    if we know that any NP problems are reducible to the possibly NP problem under
    consideration, but we do not know if the problem is in NP. In other words, NP-complete
    are those if any NP problem can be reduced to these problems, and NP hard means
    they’re reducible to NP but don’t know if they are in NP. One famous example of
    an NP-complete problem is the travelling salesman problem.


    ### BPP – Bounded Error Probabilistic Polynomial Time


    This class contains P. These problems are solvable in polynomial time with probability
    > ½. Problems in BPP are either solvable deterministically in polynomial time
    or probabilistically correctly more than one-thirds of the time.


    ### BQP – Bounded Error Quantum Polynomial Time


    This new class emerged with quantum computing. A problem is in BQP if it is solvable
    correctly on a quantum computer in polynomial time with probability > ½, that
    is, high probability. In other words, this class includes problems that are thought
    to be hard for classical computers, but easy for quantum computers.


    Figure [9-9](#515270_1_En_9_Chapter.xhtml#Fig9) shows complexity classes.


    ![](images/515270_1_En_9_Chapter/515270_1_En_9_Fig9_HTML.png)


    An illustration of complexity classes. From the innermost, the layers are N P
    complete, N P, P, B P P, B O P, and P space.


    Figure 9-9


    Complexity classes


    ### PSPACE – Polynomial Space


    This class is concerned with memory utilization, instead of time. Problems in
    PSPACE require a polynomial size of memory.


    There is also a concept of hypercomputation that has come to limelight with quantum
    computing. The idea of hypercomputation is that it can even solve problems which
    are Turing incomplete, for example, the halting problem. It has, however, been
    shown that a quantum computer could be much faster than a classical one, but it
    cannot solve every problem that a classical computer cannot. The idea is that
    even on quantum computers, Turing-incomplete problems cannot be solved. However,
    research continues in this regard to study infinite state superposition and infinite
    state Turing machines which can lead to building hypercomputers.


    With this we complete our discussion on complexity.


    ## Other Quantum Systems


    As quantum computing evolves, new systems utilizing quantum properties will emerge.
    We discuss them as follows.


    ### Quantum Networks


    Quantum networks are like classical networks with the same routing strategies
    and topologies. The key difference is that nodes can implement quantum computations
    and relevant quantum processes. Channels between quantum devices in a quantum
    network can be quantum or classical.'
