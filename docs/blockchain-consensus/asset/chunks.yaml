  trans: '

    # 区块与区块链


    区块链由区块构成。区块则由区块头和交易组成。区块头包含多个字段。比特币区块链中的第一个区块被称为创世块，作为首区块它与任何区块均无回溯链接。该区块通常被硬编码在软件客户端中。


    我们可以在图 4-12 中看到区块、区块头、交易和脚本的完整可视化展示。


    ![](img/515270_1_En_4_Fig12_HTML.jpg)


    比特币区块链流程图。流程依次为脚本公钥、脚本签名、输入、交易、默克尔根、区块头、区块 2 和区块 1。


    图 4-12


    比特币区块链、区块、区块头、交易和脚本的可视化展示


    FLM^(³)不可能性指出，如果攻击者能够控制超过 ![$$ \frac{n}{3} $$](img/515270_1_En_4_Chapter_TeX_IEq1.png)
    个节点，则无法实现拜占庭共识。在 PKI 设置的情况下，这一下限并不成立。事实证明，比特币规避了 FLM 不可能性。在工作量证明环境中，无需 PKI^(⁴)设置即可达成拜占庭协议。


    ## 挖矿


    挖矿是将新币添加到比特币区块链的过程。该过程保护了网络的安全，并激励那些投入资源保护网络的用户。关于具体细节的更多信息请参见第 5 章；不过，现在我将简要介绍一下挖矿硬件。比特币刚推出时，使用
    CPU 挖矿很容易，但难度迅速增加，导致矿工转向使用 GPU。在 GPU 成功采用后不久，FPGA 作为一种进一步加速 SHA-256 哈希运算的机制而出现。很快，它们便被
    ASIC 超越，如今 ASIC 已成为比特币挖矿的主流机制。然而，由于挖矿难度过高，个人用户使用挖矿硬件进行独立挖矿获利甚微。相比之下，由数千台 ASIC
    组成的矿场现在更为常见。此外，矿池也很普遍，多个用户共同求解哈希难题，并根据贡献比例获得收益。


    ## 作为平台的比特币


    除了作为电子现金，比特币还可用作多种用途的平台。例如，它可以作为时间戳服务或用作永久存储某些信息的通用账本。此外，我们可以使用`OP_RETURN`指令来存储数据，该指令最多可存储
    80 字节的任意数据。其他用途，如智能财产、智能资产以及将区块作为随机性来源等也相继出现。


    将比特币用于不同目的的愿望也催生了增强比特币的技术，从而产生了彩色币、根链、Omni 层和对手方等项目。尽管比特币实现了其预期目标，并通过前述创新实现了更多功能，但比特币协议的根本性限制意味着所有灵活的新协议都必须构建在比特币之上。比特币本身不具备执行所有这些不同任务的内在灵活性。因此，人们感到有必要在区块链上实现超越加密货币的功能。这一雄心促成了以太坊的发明，这是第一个支持智能合约的通用区块链平台。


    # 以太坊


    以太坊于 2014 年由维塔利克·布特林在一份白皮书中提出。以太坊引入了一个平台，用户可以在其上以智能合约的形式运行任意代码。为了防止因代码中的无限循环而导致的拒绝服务攻击，还引入了计量执行的概念。计量执行要求对区块链上的每项操作收取费用，该费用用以太坊的原生货币以太币支付。借助智能合约，以太坊开启了一个全新的通用平台世界，操作不再仅限于比特币式的价值转移交易，由于以太坊的图灵完备设计，用户可以在链上执行任何类型的多样化业务逻辑。以太坊目前是智能合约领域使用最广泛的区块链平台。


    如今的互联网是中心化的，由大型公司主导。我们今天使用的互联网称为 Web 2.0。以太坊是基于 Web3 的愿景开发的，在 Web3 中，任何人都可以参与网络，无需依赖任何第三方。在
    Web 2.0 模式中，大型服务提供商目前以提供个人数据为回报来提供服务；然而，在 Web3 中，任何人都可以参与，而无需为了换取服务而放弃个人信息。此外，通过去中心化应用程序（DApps），任何人都可以提供任何服务，网络上的任何用户都可以使用这些服务，并且没有人能阻止你访问该服务。


    ## 以太坊网络


    以太坊网络由松散耦合的节点组成，这些节点通过八卦协议交换消息。


    以太坊网络的高级可视化如图 4-13 所示。


    ![](img/515270_1_En_4_Fig13_HTML.jpg)


    以太坊网络流程图，从以太坊客户端、智能合约开发者、DApp 和钱包用户开始，最终到达其他以太坊客户端。


    图 4-13


    以太坊网络高级概述


    节点运行客户端软件，该软件是黄皮书中描述的以太坊区块链协议的一种实现，使任何用户都能参与网络。如图 4-14 所示，节点由不同的组件构成。


    ![](img/515270_1_En_4_Fig14_HTML.jpg)


    结构图包含 RPC、节点发现、EVM、区块、内存池、PoW、验证器、状态与存储、密码学和网络。


    图 4-14


    以太坊节点架构


    以太坊网络中有三种主要的节点类型：


    *   全节点

    *   轻节点

    *   归档节点


    全节点存储整个链数据，并验证区块、交易和状态。轻节点仅存储区块头，并根据区块头中的状态根来验证数据。轻节点适用于资源受限的设备，例如移动设备。归档节点包含全节点中的所有内容，同时还构建了历史状态的归档。矿工节点是全节点，但同时也执行挖矿操作并参与工作量证明共识。


    一个加入网络的新以太坊节点使用硬编码的引导节点作为进入网络的初始入口点，从中开始进一步发现其他节点。


    `RLPx`是一种基于 TCP 的传输协议。它通过使用椭圆曲线集成加密方案（ECIES）进行握手和密钥交换，实现了以太坊节点间的安全通信。


    `DEVP2P`（或称为线协议）负责在两个已经发现彼此并使用`RLPx`建立安全通道的以太坊节点之间协商应用会话。


    在发现节点、建立安全传输通道并协商好应用会话之后，节点使用“能力协议”交换消息，例如`eth`（版本 62、63 和 64）、轻量级以太坊子协议（LES）、Whisper
    和 Swarm。这些能力协议或应用子协议实现了不同的应用层通信，例如用于区块同步的`eth`。


    节点发现协议和其他相关协议如图 4-15 所示。


    ![](img/515270_1_En_4_Fig15_HTML.png)


    图表有四列，标记为发现协议-discV4、RLPx、DevP2P-线协议以及子协议，例如 Eth 能力协议。


    图 4-15


    节点发现与其他协议

