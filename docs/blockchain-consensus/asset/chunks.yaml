    of one. Remember, no protocol can ensure safety and liveness under network partitions
    and dynamic partitions with a single ledger. In other words, longest chain–style
    mechanisms favor liveness over safety and provide dynamic availability under different
    participation levels; however, BFT protocols favor safety over liveness and provide
    finality. This problem is called the availability-finality dilemma, as a single
    ledger cannot provide both properties. Therefore, the proposal is to create two
    ledgers. The first is an “available full ledger” that is always live but safe
    only without network partitions, similar to “longest chain–type PoW protocol.”
    The other ledger, called the “finalized prefix ledger,” is always safe but not
    live in low participation scenarios. This concept is the same as traditional BFT–style
    protocols, for example, PBFT, which stalls unless a threshold of participants
    is available. As the finalized prefix ledger is the prefix of the available full
    ledger, both ledgers eventually converge as a single authentic chain of history.
    In other words, the finalized prefix ledger is safe under network partitions and
    if less than one-third of participants are faulty.


    Moreover, the available full ledger is live under dynamic (low) participation
    and if <50% of active players are Byzantine. This technique of combining BFT-style
    with Nakamoto-style protocols and creating so-called nested ledgers has been named
    the “Ebb-and-Flow” property. The so-called “snap-and-chat” protocols are developed
    to achieve the “Ebb-and-Flow” property. The finalized ledger is always the prefix
    of the available ledger, thus creating a combined proper single chain. At a high
    level, this mechanism works by ordering transactions into a chain of blocks by
    using some longest chain–type protocol, for example, PoW. Next, snapshots of prefixes
    from this blockchain feed into a partially synchronous BFT-style protocol for
    example, PBFT, which produces a chain containing multiple chains of blocks. Next,
    any duplicates or invalid transactions are removed, which creates a finalized
    prefix ledger. This finalized prefix ledger is added before the output of the
    PoW-style protocol, and any duplicates or invalid transactions are removed. This
    process finally creates an available single ledger.


    There is a myriad of consensus protocols that exist, but we cannot cover all of
    them. However, we did explore quite a few covering different types and classes
    including randomized, deterministic, CFT, BFT, and Nakamoto-style protocols.


    Let’s now turn our attention to formal verification which allows us to ensure
    the correctness of all these different consensus protocols.'
  trans: '

    ### 雪崩协议


    这种全新的共识协议范式通过随机网络采样达成一致。与确定性共识相比，雪崩协议系列允许更灵活的共识形式，但相比 PoW（工作量证明）提供了更强的安全性，并兼具中本聪共识的节点可扩展性。可以将其视作传统基于法定人数协议的概率化版本，但无需明确的投票交集。其核心理念在于融合中本聪系列协议与经典系列协议的最优特性。


    此类协议的安全性是概率性的，但失败概率可忽略不计。在活跃性方面，这些协议能以高概率终止运行，不过协议依赖同步性维持活跃性。该协议通过亚稳态机制实现安全性，其安全性具有概率性特征——通过可调节的系统安全参数使共识失败的可能性极小化。协议以高概率保证以下安全性与活跃性属性：


    * **安全性：** 任何两个正确节点不会接受冲突交易。

    * **活跃性：** 每个正确节点最终都会接受诚实客户端提交的交易。


    该系列包含构建完整雪崩协议的多个子协议。协议采用渐进式构建：从提供亚稳态的"雪泥"协议开始，到拜占庭容错型"雪花"协议、"雪球"协议（通过决策置信度强化状态），最终形成引入有向无环图（DAG）结构以提升效率的"雪崩"协议。


    这些创新使协议具备快速终结性、低延迟、高吞吐量和可扩展性。


    ### 基于 DAG 的共识协议


    传统区块链采用线性结构，但研究者已提出基于非线性区块链结构的算法类别。其主要目标在于提升效率，这些协议基于如下前提：账本不应依赖有限且缓慢增长的线性链，而应能像
    DAG 那样向各个方向扩展，从而带来性能提升、高可扩展性和快速交易确认。DAG 需要更少的通信、计算和存储资源，因此性能更优。基于 DAG 的账本分为两类：基于区块的
    DAG 和基于交易的 DAG。


    #### 基于区块的 DAG


    区块 DAG 的每个顶点包含一个区块。与线性设计中每个区块仅有一个父区块不同，SPECTRE、PHANTOM 和 Meshcash 等方案中每个区块可以是多个区块的子区块。


    #### 基于交易的 DAG


    基于交易的 DAG 中每个顶点包含一笔交易。IOTA 缠结、Byteball、Graphchain 和雪崩协议等都是基于交易的 DAG 实例。


    哈希图则是一种采用拜占庭容错型共识协议的许可制图结构区块链。


    ### 潮汐协议


    这项成果是对 Gasper 协议活跃性问题的回应。Gasper 是为以太坊信标链提出的基于权益证明（PoS）的共识机制，融合了 Casper FFG（最终确定性工具）和
    LMD GHOST（分叉选择规则）。该研究提出了可证明安全的"快照-聊天"协议。


    中本聪式协议在网络分区和动态参与情况下能保持活跃性，但会牺牲安全性来换取活跃性。而拜占庭容错协议能在网络分区和低参与度（参与者少于`3*f+1`）情况下提供安全性（最终确定性），但牺牲了活跃性。研究证明，任何协议都无法同时实现动态参与下的活跃性和网络分区下的安全性。该研究回应了"是否存在同时保证可用性和安全性的共识机制"这一问题，其核心理念精妙——提出创建两个账本而非单一账本。须知，没有任何单一账本协议能在网络分区和动态分区情况下同时保证安全性和活跃性。换言之，最长链式机制优先活跃性而非安全性，在不同参与水平下提供动态可用性；而拜占庭容错协议优先安全性而非活跃性，提供最终确定性。这种矛盾被称为"可用性-最终确定性困境"，单一账本无法同时满足这两个属性。因此，解决方案是创建两个账本：第一个是"可用完整账本"，始终保持活跃，但仅在没有网络分区时安全，类似"最长链式
    PoW 协议"；第二个称为"最终确认前缀账本"，始终保持安全，但在低参与度场景下不活跃，这等同于传统拜占庭容错协议（如 PBFT）——除非达到参与节点阈值，否则协议停滞。由于最终确认前缀账本是可用完整账本的前缀，两个账本最终会收敛为单一可信历史链。换言之，最终确认前缀账本在网络分区且故障节点数少于三分之一时安全；可用完整账本在动态（低）参与且活跃节点中拜占庭节点比例低于
    50%时保持活跃。这种将拜占庭容错式与中本聪式协议结合创建"嵌套账本"的技术被称为"潮汐属性"。为实现该属性而开发的"快照-聊天"协议，通过使最终确认账本始终作为可用账本的前缀，形成统一的单一链条。从高层看，该机制运行方式如下：首先通过最长链式协议（如
    PoW）将交易排序成区块链；随后将该区块链的前缀快照输入部分同步的拜占庭容错协议（如 PBFT），生成包含多个区块链条的链；接着删除重复或无效交易，形成最终确认前缀账本。将此最终确认前缀账本置于
    PoW 式协议输出之前，并再次删除重复/无效交易，最终形成可用的单一账本。


    共识协议种类繁多，虽无法逐一尽述，但我们已经探讨了涵盖随机化、确定性、CFT（崩溃容错）、拜占庭容错和中本聪式协议等多种类型与类别的代表性方案。


    现在，让我们聚焦于形式化验证——这项技术能够确保上述各类共识协议的正确性。

    '
- fmt: '# Formal Verification


    With all the activity in blockchain consensus research, we can now appreciate
    that it is such an active area of research. Many new protocols have been proposed
    to solve consensus problems in innovative ways. For example, some address efficiency,
    some look at scalability problems, some try to reduce message complexity, some
    modify the existing classical protocols to make them suitable for the blockchain,
    some try to speed up the consensus mechanism, and many other improvements and
    novelties are claimed. Here, a question arises: How do we ensure that these consensus
    protocols are correct and perform as we intend them to? For this purpose, usually
    researchers write research papers with proofs and arguments about the correctness
    of the protocols. Moreover, formal methods are used to ensure protocol correctness.


    Formal methods are techniques used to model systems as mathematical objects. In
    other words, these are mathematically rigorous methods used to specify, design,
    and verify software or hardware systems. Such techniques include writing specifications
    in a formal logic and verifying them using model checking and formal proofs. Formal
    methods are divided into two broad domains called formal specification and formal
    verification. The first domain deals with writing precise and concrete specifications,
    and the latter concerns the development of proofs to prove the correctness of
    a specification.


    A formal specification is a well-defined mathematical logic statement, whereas
    verification is the process of checking the specification by logic deductions,
    which is done mechanically. In other words, the specification is formally defined
    and then verified using a model checker or a theorem prover.


    The reason why formal methods provide value is that they can symbolically check
    the entire state space of a design and ascertain the correctness of the design.


    Generally, formal verification comprises three steps:


    - Create a formal model of the system to be checked.

    - Write a formal specification of the properties desired to be satisfied by our
    model.

    - Mechanically check the model to ensure that the model satisfies the specification.


    Two categories of techniques are commonly used for verification: state exploration–based
    approaches and proof-based approaches. State exploration–based methods are automatic
    but are inefficient and difficult to scale. For example, a usual problem is state
    explosion, where the number of states to check grows so exponentially large that
    the model does not fit in a computer''s memory. This is the reason the model must
    be finite, so that it can be efficiently verified. On the other hand, proof-based
    approaches (i.e., theorem proving) are more precise and less memory consuming
    but require human interaction and more in-depth knowledge of the proofs and relevant
    techniques. Proof-based techniques are the most elegant way of reasoning about
    properties of a system without any limit on the size of the spec. This is in contrast
    with model checking where there must be a limit on the size of the model. With
    proof-based techniques, you can reason about the system states and prove that
    with any input the system will always work as intended. Proof assistants such
    as `Isabelle` are used to help with reasoning about systems by allowing automated
    theorem proving.


    A model checking mechanism consists of a formal specification language and a model
    checker. Model checking verifies systems formally using automated tools. This
    approach is gaining popularity among blockchain researchers to check formal specifications
    of a consensus protocol and ensure its correctness. The automated checker checks
    for the conditions to be satisfied and then confirms if the conditions are satisfied;
    otherwise, it produces counter examples (i.e., exceptions).


    Figure [10-1](#515270_1_En_10_Chapter.xhtml#Fig1) illustrates the model checking
    mechanism.


    ![](images/515270_1_En_10_Chapter/515270_1_En_10_Fig1_HTML.jpg)


    A flowchart of the model checking mechanism. The flow starts with requirements
    and system and ends at satisfied and counter example.


    **Figure 10-1** Model checking


    `TLA+` (temporal logic for actions) is a specification language designed by Leslie
    Lamport for describing and reasoning about concurrent systems. `TLC` is a model
    checker for design specifications written in `TLA+`. Another model checker is
    `SPIN` which checks specifications written in the `Promela` specification language.


    A distributed blockchain consensus algorithm is usually evaluated against two
    classes of correctness properties: safety and liveness. Safety generally means
    “nothing bad will happen,” whereas liveness suggests “something good will eventually
    occur.” Both these properties have some subproperties, depending on the requirements.
    Usually, for consensus mechanisms, we have agreement, integrity, and validity
    conditions under the safety property, and termination is required for liveness.
    Consensus algorithms are mostly model checked under a system model by specifying
    how many nodes are in the system and what timing assumptions are made about the
    system. The model is then run to explore each state of the system and check if
    there is an execution that doesn’t terminate. Usually, this is done under a four-node
    model, based on the formula of `3f+1`, which we’ve seen before.


    A program is correct if, in all possible executions, the program behaves correctly
    according to the specification.'
  raw: '## Formal Verification


    With all the activity in blockchain consensus research, we can now appreciate
    that it is such an active area of research. Many new protocols have been proposed
    to solve consensus problems in innovative ways. For example, some address efficiency,
    some look at scalability problems, some try to reduce message complexity, some
    modify the existing classical protocols to make them suitable for the blockchain,
    some try to speed up the consensus mechanism, and many other improvements and
    novelties are claimed. Here, a question arises: How do we ensure that these consensus
    protocols are correct and perform as we intend them to? For this purpose, usually
    researchers write research papers with proofs and arguments about the correctness
    of the protocols. Moreover, formal methods are used to ensure protocol correctness.


    Formal methods are techniques used to model systems as mathematical objects. In
    other words, these are mathematically rigorous methods used to specify, design,
    and verify software or hardware systems. Such techniques include writing specifications
    in a formal logic and verifying them using model checking and formal proofs. Formal
