- fmt: "#### BABE – Blind Assignment for Blockchain Extension\n\n`BABE` is a proof\
    \ of stake protocol for block production where validators are randomly selected\
    \ based on their staked amount to produce blocks. It does not depend on any central\
    \ clock.\n\nTime is divided into periods spanning `n` seconds called slots, where\
    \ a block is expected to be produced. An epoch is a sequence of slots. At each\
    \ slot, validators run a `VRF`, which, based on randomness generated from previous\
    \ epochs, decides whether to produce a block or not. We can visualize this in\
    \ Figure [8-8](#515270_1_En_8_Chapter.xhtml#Fig8).\n\n```markdown\n![](images/515270_1_En_8_Chapter/515270_1_En_8_Fig8_HTML.png)\n\
    ```\n\nA timeline of genesis includes epochs 1 to 4. Each epoch has a set of 4\
    \ slots.\n\n**Figure 8-8**  \nSlots and epochs\n\nValidators use public key cryptography.\
    \ There are two types of key pairs. A private key from the first key pair is used\
    \ for block signing. The second pair is used for a verifiable random function\
    \ (`VRF`), also called the lottery key pair. A private key from the latter pair\
    \ is used as an input to the verifiable random function. Block signing provides\
    \ usual nonrepudiation, integrity, and data origin authentication guarantees,\
    \ verifying that the validator has indeed produced this block. In the `VRF`, the\
    \ private key generates the randomness, but the public key proves to other nodes\
    \ that the randomness generated is indeed reliable and that the validator did\
    \ not cheat.\n\nEach validator has an almost equal chance of being selected. A\
    \ slot leader election is done like `PoW`, where, if the result of `VRF` is lower\
    \ than a predetermined threshold, then the validator wins the right to produce\
    \ the block. Also, the proof generated from the `VRF` enables other participants\
    \ to verify that the validator is following the rules and not cheating; in other\
    \ words, it proves that the randomness generated is reliable. If the value produced\
    \ from the `VRF` is higher than or equal to the target, then the validator simply\
    \ collects blocks from other validators.\n\nHere are the phases of the `BABE`\
    \ protocol.\n\n##### Genesis Phase\n\nIn this phase, the unique genesis block\
    \ is created manually. A genesis block contains a random number that is used during\
    \ the first two epochs for the slot leader selection.\n\n##### Normal Phase\n\n\
    Each validator divides its time into so-called slots after receiving the genesis\
    \ block. Validators determine the current slot number according to the relative\
    \ time algorithm, which we’ll explain shortly. Each validator during normal operation\
    \ is expected to produce a block, whereas other nonvalidator nodes simply receive\
    \ the produced blocks and synchronize. It is expected that each validator has\
    \ a set of chains in the current slot/epoch and has the best chain selected in\
    \ the previous slot by using the best chain selection mechanism, which we’ll explain\
    \ shortly.\n\nThe slot leader selection is based on the output of the `VRF`. If\
    \ the output of the `VRF` is below a certain threshold, then the validator becomes\
    \ the slot leader. If not, then it simply collects the blocks from the leader.\n\
    \nThe block generated by the leader is added to the best chain selected in the\
    \ current slot. The produced block must at least contain the slot number, the\
    \ hash of the previous block, the `VRF` output, `VRF` proof, transactions, and\
    \ the digital signature. Once the chain is updated with the new block, the block\
    \ is broadcast. When another non-leader validator receives the block, it checks\
    \ if the signature is valid. It also verifies if a valid leader has produced the\
    \ block by checking the `VRF` output using the `VRF` verification algorithm. It\
    \ checks that if the output of the `VRF` is lower than the threshold, then the\
    \ leader is valid. It further checks if there is a valid chain with the required\
    \ header available in which this received block is expected to be added, and if\
    \ the transactions in the block are valid.\n\nIf all is valid, then the validator\
    \ adds the block to the chain. When the slot ends, the validator finally selects\
    \ the best chain using the best chain selection algorithm, which eliminates all\
    \ chains that do not include the finalized block by the finality gadget `GRANDPA`.\n\
    \n##### Epoch Update\n\nA new epoch starts every `n` number of slots. A validator\
    \ must obtain the new epoch randomness and active validator set for the new epoch\
    \ before beginning the new epoch. The new validator set for the new epoch is included\
    \ in the relay chain to enable block production. A new validator must wait for\
    \ two epochs before the protocol can select it. Adding a validator two epochs\
    \ later ensures that `VRF` keys of the new validators are added to the chain before\
    \ the randomness of the future epoch in which they are going to be active is revealed.\
    \ A new randomness for the epoch is calculated based on the previous two epochs\
    \ by concatenating all the `VRF` outputs of blocks in those epochs.\n\nThe diagram\
    \ in Figure [8-9](#515270_1_En_8_Chapter.xhtml#Fig9) illustrates this slot leader\
    \ election process.\n\n```markdown\n![](images/515270_1_En_8_Chapter/515270_1_En_8_Fig9_HTML.png)\n\
    ```\n\nA timeline of genesis includes epochs 1 to 4. Each epoch has a set of 4\
    \ slots named B. Leader elected in each slot points to V R F.\n\n**Figure 8-9**\
    \  \nSlot leader election via `VRF` and block production in slots and epochs\n\
    \nThe best chain selection algorithm simply removes all chains that do not contain\
    \ a finalized block by `GRANDPA`. In case `GRANDPA` does not finalize any block,\
    \ the protocol falls back to probabilistic finality, and the finalized block is\
    \ chosen as the one which is several blocks (a number) before the last block.\
    \ This works almost like a chain depth rule in `PoW`.\n\nTime is managed in `BABE`\
    \ using the **relative time algorithm**. It is critical for the security of the\
    \ `BABE` that all parties are aware of the current slot number. `BABE` does not\
    \ use a time source managed by `NTP` as clearly a central source of time cannot\
    \ be trusted. Validators realize a notion of logical time by using block arrival\
    \ times as a reference without relying on an external source of time. When a validator\
    \ receives the genesis block, it records the arrival time as a reference point\
    \ of the beginning of the first slot. As the beginning time of each slot is expected\
    \ to be different on each node, an assumption is made that this difference is\
    \ reasonably limited. Each validator updates its clock by calculating the median\
    \ of the arrival times of the blocks in the epoch. Although the mechanics are\
    \ different, the fundamental concept appears to be similar to the logical clocks\
    \ we discussed in Chapter [1](#515270_1_En_1_Chapter.xhtml). Temporary clock adjustment\
    \ until the next epoch is also possible for validators that went offline and joined\
    \ the network again."
  raw: '#### BABE – Blind Assignment for Blockchain Extension


    BABE is a proof of stake protocol for block production where validators are randomly
    selected based on their staked amount to produce blocks. It does not depend on
    any central clock.


    Time is divided into periods spanning n seconds called slots, where a block is
    expected to be produced. An epoch is a sequence of slots. At each slot, validators
    run a VRF, which, based on randomness generated from previous epochs, decides
    whether to produce a block or not. We can visualize this in Figure [8-8](#515270_1_En_8_Chapter.xhtml#Fig8).


    ![](images/515270_1_En_8_Chapter/515270_1_En_8_Fig8_HTML.png)


    A timeline of genesis includes epochs 1 to 4\. Each epoch has a set of 4 slots.


    Figure 8-8


    Slots and epochs


    Validators use public key cryptography. There are two types of key pairs. A private
    key from the first key pair is used for block signing. The second pair is used
    for a verifiable random function (VRF), also called the lottery key pair. A private
    key from the latter pair is used as an input to the verifiable random function.
    Block signing provides usual nonrepudiation, integrity, and data origin authentication
    guarantees, verifying that the validator has indeed produced this block. In the
    VRF, the private key generates the randomness, but the public key proves to other
    nodes that the randomness generated is indeed reliable and that the validator
    did not cheat.


    Each validator has an almost equal chance of being selected. A slot leader election
    is done like PoW, where, if the result of VRF is lower than a predetermined threshold,
    then the validator wins the right to produce the block. Also, the proof generated
    from the VRF enables other participants to verify that the validator is following
    the rules and not cheating; in other words, it proves that the randomness generated
    is reliable. If the value produced from the VRF is higher than or equal to the
    target, then the validator simply collects blocks from other validators.


    Here are the phases of the BABE protocol.


    ##### Genesis Phase


    In this phase, the unique genesis block is created manually. A genesis block contains
    a random number that is used during the first two epochs for the slot leader selection.


    ##### Normal Phase


    Each validator divides its time into so-called slots after receiving the genesis
    block. Validators determine the current slot number according to the relative
    time algorithm, which we’ll explain shortly. Each validator during normal operation
    is expected to produce a block, whereas other nonvalidator nodes simply receive
    the produced blocks and synchronize. It is expected that each validator has a
    set of chains in the current slot/epoch and has the best chain selected in the
    previous slot by using the best chain selection mechanism, which we’ll explain
    shortly.


    The slot leader selection is based on the output of the VRF. If the output of
    the VRF is below a certain threshold, then the validator becomes the slot leader.
    If not, then it simply collects the blocks from the leader.


    The block generated by the leader is added to the best chain selected in the current
    slot. The produced block must at least contain the slot number, the hash of the
    previous block, the VRF output, VRF proof, transactions, and the digital signature.
    Once the chain is updated with the new block, the block is broadcast. When another
    non-leader validator receives the block, it checks if the signature is valid.
    It also verifies if a valid leader has produced the block by checking the VRF
    output using the VRF verification algorithm. It checks that if the output of the
    VRF is lower than the threshold, then the leader is valid. It further checks if
    there is a valid chain with the required header available in which this received
    block is expected to be added, and if the transactions in the block are valid.


    If all is valid, then the validator adds the block to the chain. When the slot
    ends, the validator finally selects the best chain using the best chain selection
    algorithm, which eliminates all chains that do not include the finalized block
    by the finality gadget GRANDPA.


    ##### Epoch Update


    A new epoch starts every n number of slots. A validator must obtain the new epoch
    randomness and active validator set for the new epoch before beginning the new
    epoch. The new validator set for the new epoch is included in the relay chain
    to enable block production. A new validator must wait for two epochs before the
    protocol can select it. Adding a validator two epochs later ensures that VRF keys
    of the new validators are added to the chain before the randomness of the future
    epoch in which they are going to be active is revealed. A new randomness for the
    epoch is calculated based on the previous two epochs by concatenating all the
    VRF outputs of blocks in those epochs.


    The diagram in Figure [8-9](#515270_1_En_8_Chapter.xhtml#Fig9) illustrates this
    slot leader election process.


    ![](images/515270_1_En_8_Chapter/515270_1_En_8_Fig9_HTML.png)


    A timeline of genesis includes epochs 1 to 4\. Each epoch has a set of 4 slots
    named B. Leader elected in each slot points to V R F.


    Figure 8-9


    Slot leader election via VRF and block production in slots and epochs


    The best chain selection algorithm simply removes all chains that do not contain
    a finalized block by GRANDPA. In case GRANDPA does not finalize any block, the
    protocol falls back to probabilistic finality, and the finalized block is chosen
    as the one which is several blocks (a number) before the last block. This works
    almost like a chain depth rule in PoW.


    Time is managed in BABE using the **relative time algorithm**. It is critical
    for the security of the BABE that all parties are aware of the current slot number.
    BABE does not use a time source managed by NTP as clearly a central source of
    time cannot be trusted. Validators realize a notion of logical time by using block
    arrival times as a reference without relying on an external source of time. When
    a validator receives the genesis block, it records the arrival time as a reference
    point of the beginning of the first slot. As the beginning time of each slot is
    expected to be different on each node, an assumption is made that this difference
    is reasonably limited. Each validator updates its clock by calculating the median
    of the arrival times of the blocks in the epoch. Although the mechanics are different,
    the fundamental concept appears to be similar to the logical clocks we discussed
    in Chapter [1](#515270_1_En_1_Chapter.xhtml). Temporary clock adjustment until
    the next epoch is also possible for validators that went offline and joined the
    network again.'
  trans: "\n#### BABE – 区块链扩展的盲分配协议\n\n`BABE` 是一种用于区块生产的权益证明协议，验证者根据其质押量被随机选中来生产区块。该协议不依赖任何中央时钟。\n\
    \n时间被划分为持续 `n` 秒的时段，称为时隙（slot），每个时隙预计会有一个区块被生产出来。一个纪元（epoch）由一系列时隙组成。在每个时隙中，验证者会运行一个\
    \ `VRF`（可验证随机函数），该函数根据先前纪元生成的随机性来决定是否生产区块。我们可以通过图 8-8 直观理解这一过程。\n\n```markdown\n\
    ![](img/515270_1_En_8_Fig8_HTML.png)\n```\n\n创世时间线包含纪元 1 到 4。每个纪元包含一组 4 个时隙。\n\
    \n**图 8-8**  \n时隙与纪元\n\n验证者使用公钥密码学。存在两种密钥对。第一种密钥对的私钥用于区块签名。第二种密钥对用于可验证随机函数（`VRF`），也称为彩票密钥对。后者的私钥作为可验证随机函数的输入。区块签名提供了常规的不可否认性、完整性和数据源认证保障，用于验证该区块确实由该验证者生产。在\
    \ `VRF` 中，私钥生成随机性，而公钥则向其他节点证明生成的随机性确实可靠，且验证者没有作弊。\n\n每个验证者被选中的概率几乎相等。时隙领导者选举类似于\
    \ `PoW`：如果 `VRF` 的结果低于某个预设阈值，则该验证者获得区块生产权。同时，`VRF` 生成的证明使其他参与者能够验证该验证者是否遵守规则且未作弊；换句话说，它证明了生成的随机性是可靠的。如果\
    \ `VRF` 生成的值等于或高于目标值，则该验证者只需收集其他验证者生产的区块。\n\n以下是 `BABE` 协议的各个阶段。\n\n##### 创世阶段\n\
    \n在此阶段，唯一的创世区块由人工创建。创世区块包含一个随机数，该随机数在前两个纪元中用于时隙领导者选举。\n\n##### 常规阶段\n\n每个验证者在收到创世区块后，将其时间划分为所谓的时隙。验证者根据相对时间算法（我们稍后将解释）确定当前时隙编号。在常规运行中，每个验证者都应生产一个区块，而其他非验证者节点则接收生产的区块并进行同步。每个验证者应拥有当前时隙/纪元中的一组链，并通过最佳链选择机制（稍后解释）选定上一时隙中的最佳链。\n\
    \n时隙领导者的选择基于 `VRF` 的输出。如果 `VRF` 的输出低于某个阈值，则该验证者成为时隙领导者。否则，它只需从领导者处收集区块。\n\n领导者生成的区块会被添加到当前时隙选定的最佳链中。生产的区块必须至少包含时隙编号、前一个区块的哈希值、`VRF`\
    \ 输出、`VRF` 证明、交易以及数字签名。一旦链更新了新区块，该区块即被广播。当其他非领导者验证者收到区块时，会检查签名是否有效。它还会通过 `VRF`\
    \ 验证算法检查 `VRF` 输出，以验证是否由有效的领导者生产了该区块。它会检查：如果 `VRF` 输出低于阈值，则领导者有效。它还会进一步检查是否存在一条包含所需头部的有效链，以便将收到的区块添加进去，并验证区块中的交易是否有效。\n\
    \n如果一切有效，验证者便将区块添加到链中。当时隙结束时，验证者最终使用最佳链选择算法选出最佳链，该算法会剔除所有不包含由最终性工具 `GRANDPA` 确定的最终区块的链条。\n\
    \n##### 纪元更新\n\n每 `n` 个时隙后，新的纪元开始。验证者必须在开始新纪元之前获取新纪元的随机性和活跃验证者集合。新纪元的新验证者集合包含在\
    \ Relay Chain 中，以实现区块生产。新验证者需等待两个纪元后，协议才能选择它。延迟两个纪元添加验证者，可确保新验证者的 `VRF` 密钥在其即将活跃的未来纪元的随机性被揭示之前，就已添加到链中。新纪元的随机性基于前两个纪元计算得出，方法是将这两个纪元中所有区块的\
    \ `VRF` 输出串联起来。\n\n图 8-9 的图示阐明了这一时隙领导者选举过程。\n\n```markdown\n![](img/515270_1_En_8_Fig9_HTML.png)\n\
    ```\n\n创世时间线包含纪元 1 到 4。每个纪元包含一组 4 个名为 B 的时隙。每个时隙中选出的领导者指向 V R F。\n\n**图 8-9**\
    \  \n通过 `VRF` 进行时隙领导者选举以及在时隙和纪元中的区块生产\n\n最佳链选择算法会简单剔除所有不包含由 `GRANDPA` 最终确定的区块的链条。如果\
    \ `GRANDPA` 未最终确定任何区块，协议将退而使用概率性最终性，最终区块被选为最后一个区块之前若干区块（某个数量）的位置。这类似于 `PoW` 中的链深度规则。\n\
    \n在 `BABE` 中，时间管理采用**相对时间算法**。所有参与方知晓当前时隙编号，这对 `BABE` 的安全性至关重要。`BABE` 不使用由 `NTP`\
    \ 管理的时间源，因为显然中央时间源不可信。验证者通过将区块到达时间作为参考，实现一种逻辑时间的概念，而不依赖外部时间源。当验证者收到创世区块时，会记录到达时间作为第一个时隙开始的参考点。由于每个节点上的每个时隙开始时间可能不同，因此假设这种差异在合理范围内。验证者通过计算本纪元中区块到达时间的中位数来更新自身时钟。虽然机制不同，但其基本概念似乎与我们第\
    \ 1 章讨论的逻辑时钟相似。对于暂时离线后又重新加入网络的验证者，也可以临时调整时钟直到下一个纪元。\n"
- fmt: '# Safety and Liveness


    There are four security properties that BABE satisfies: chain growth, existential
    chain quality, chain density, and common prefix.


    ## Chain Growth


    This property guarantees a minimum growth between slots. In other words, it’s
    a liveness property, and chain growth is guaranteed as long as a supermajority
    of honest validators is available. Malicious validators cannot stop the progress
    of the best chain.


    ## Chain Quality


    This property ensures that at least one honest block is contributed to any best
    chain owned by an honest party in every `x` number of slots. The protocol guarantees
    that even in the worst case, there will be at least one honest block included
    in the best chain during an epoch. This ensures that the randomness is not biased.


    ## Chain Density


    This property ensures that any sufficiently long portion of blocks in the best
    chain contains more than half of the blocks produced by honest validators. This
    property is implied by chain growth and chain quality.


    ## Common Prefix


    This property ensures that any blocks before the last block in the best chain
    of an honest validator cannot be changed and are final. Again, this property is
    satisfied due to the assumption of super honest majority of honest validators.
    It is rare for a malicious validator to be elected in a slot, and only mostly
    honest validators will be elected; therefore, malicious validators are in such
    a minority that they cannot create another “best” chain which do not contain a
    finalized block.


    # GRANDPA – GHOST-Based Recursive Ancestor Deriving Prefix Agreement


    It is a gadget that finalizes the blocks separately after they have been produced
    by BABE. It is essentially a Byzantine agreement protocol that agrees on a chain
    out of many forks. The difference here is that usually in BFT protocols, a decision
    is made on a single block, whereas GRANDPA decides on a chain of blocks (a fork)
    and decides what the final chain is. It’s a finalization mechanism that resolves
    forks.


    GRANDPA assumes a partially synchronous network. It works in rounds with each
    round having `3f+1` eligible voters out of which `2f+1` voters are assumed honest.
    In other words, it requires that two-thirds of the validator set is honest and
    agrees on a prefix of the canonical chain, which ultimately becomes finalized.
    In each round, a primary is pseudorandomly elected, which is agreed upon by the
    participants. Moreover, all participants agree on the voter set. Primary selection
    can also be based on rotation between voters.


    The protocol works in two phases: pre-vote and pre-commit. The pre-vote allows
    validators to estimate what can be finalized, that is, validators pre-vote on
    a best chain. For the pre-commit, validators use the two-thirds GHOST rule to
    pre-votes collected and pre-commit. Finally, the pre-commits are finalized.


    GRANDPA consists of two protocols. The first protocol works under partial synchrony
    and tolerates one-third Byzantine faults. The second protocol works in a fully
    asynchronous environment and can tolerate one-fifth Byzantine faults.


    ## GRANDPA Protocol Steps


    In each round, a participant is selected as a leader (primary), and other participants
    are also aware who the primary is:


    - The new round starts.


    - The primary broadcasts the highest block that it thinks might be final from
    the previous round.


    - Validators wait for a certain network delay, then each validator broadcasts
    a “pre-vote” message for the highest block that it believes should be finalized.
    If validators receive a block from the primary with the better best chain, then
    the validators use that best chain. If the supermajority of the validators is
    correct, this block is expected to extend the chain that the primary has broadcast.


    - Each validator looking at the pre-votes determines the highest block that could
    be finalized. If the pre-votes extend the last finalized chain, each validator
    will cast a pre-commit to that chain.


    - Each validator waits for sufficient pre-commits to compose a commit message
    on the newly finalized chain.


    The protocol penalizes misbehavior by slashing where a percentage of the stake
    is deducted for malicious behavior or even just irresponsible behavior, for example,
    a long-running inactive node. An increase in penalties is proportional to the
    number of participants.


    ## Safety


    The protocol ensures that all votes are descendants of some block that could have
    been finalized in the previous round. Nodes estimate the finalization possibility
    of a block based on pre-votes and pre-commits. Before a new round starts, nodes
    ensure by acquiring enough pre-commits that no block with this round’s estimate
    can be finalized on a different chain or later on the same chain. In the next
    round, it also ensures that it only pre-votes and pre-commits on the blocks that
    are descended from the last round’s estimate.


    ## Liveness


    The protocols select a validator in rotation to become the primary. The primary
    starts the round by broadcasting their estimate of block finalization from the
    last round. Validators pre-vote for the best chain, including the primary’s proposed
    block if (1) the block is at least the validator’s estimate and (2) the validator
    has acquired `>2/3` pre-votes for the block and its descendants in the last round.


    The key insight here is that if the primary’s proposed block has not been finalized,
    it is finalized to make progress. For example, suppose the proposed block by the
    primary has not been finalized, and all validators have agreed on the best chain
    with the last finalized block. In that case, progress is made by finalizing the
    latest agreed final chain. If GRANDPA cannot conclude, then BABE provides its
    probabilistic finality as a fallback mechanism, ensuring progress.


    GRANDPA and BABE are one of the latest heterogenous multichain protocols. There
    are other protocols in this family such as Casper FFG used in the Ethereum consensus
    layer (Ethereum 2, beacon chain).'
