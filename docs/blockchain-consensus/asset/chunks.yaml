  trans: "\n### 费尼攻击\n\n当收款方接受零确认付款时，可能发生费尼攻击。这是一种双花攻击，攻击者会创建两笔交易：第一笔是向收款方（受害者）付款，第二笔是向自己付款。但攻击者不广播第一笔交易，而是将第二笔交易打包进一个区块并完成挖矿。此时，攻击者才释放第一笔交易并购买商品。商户未等待确认就接受了付款。随后攻击者广播包含第二笔交易（付款给自己）的预挖区块。由于第二笔交易优先级更高，第一笔交易因此失效。\n\
    \n### Vector76 攻击\n\n此攻击结合了费尼攻击和竞态攻击。即使交易已有一笔确认，这种攻击仍能强大到足以逆转交易。\n\n### 日蚀攻击\n\
    \n此攻击试图屏蔽节点对网络状态的正确感知，可能导致服务中断、双花攻击和资源浪费。比特币已实施多种解决方案来修复该问题。更多详情可参见：[`https://cs-people.bu.edu/heilman/eclipse/`](https://cs-people.bu.edu/heilman/eclipse/)。\n\
    \n### 环境、社会和治理（ESG）影响\n\nESG 指标综合反映了环境、社会和治理方面的问题。这些指标被用于评估一家公司在环境、社会和治理方面的风险敞口。投资者会据此做出投资决策：他们可能规避\
    \ ESG 风险较高的领域，更倾向于选择 ESG 风险较低的公司。\n\n工作量证明机制因能耗过高而受到批评。确实，在撰写本文时，比特币区块链的总能耗已超过整个巴基斯坦（来源：[9]）。\n\
    \n环境、社会和治理方面的担忧一直是有远见的主流投资者兴趣低落的原因。尽管如此，尽管存在 ESG 争议，比特币在很大程度上仍可被视为成功的案例。\n\n比特币不仅因高能耗受到批评，还常被视为犯罪活动的工具——它已被接受为非法毒品及其他犯罪活动的支付方式。\n\
    \n中心化问题同样令人担忧：拥有矿场的强大矿工占据了比特币网络的大部分算力。用于建造这些矿场的 ASIC 芯片仅由少数制造商生产，这也意味着该领域高度中心化。此外，对比特币挖矿的打击行动[13]可能导致进一步的中心化，只有最强大的矿工才能承受冲击并幸存，最终只剩少数几个强大矿工。\n\
    \n然而，比特币也有有利的一面。比特币可作为跨国移民家庭汇款机制，也可用于经济困难国家的支付手段，还能服务于约 17 亿[12]无银行账户人口。比特币是金融包容性的载体。\n\
    \n我们可以设想这样的场景：比特币矿场产生的热量可用于加热水，最终为房屋供暖。甚至可以利用热电效应，通过热电发电机发电并回馈电网。当然，这需要解决经济学和工程学问题，但这个构想是可行的。\n\
    \n> *热电发电机是一类固态器件，可直接将热能转化为电能，或将电能转化为热能用于加热或制冷。此类器件基于热电效应，涉及热量和电流在固体中流动时的相互作用。[11]*\n\
    > \n> ——《大英百科全书》，2007 年 3 月 1 日，[`www.britannica.com/technology/thermoelectric-power-generator`](http://www.britannica.com/technology/thermoelectric-power-generator)\n\
    \n支付系统乃至任何系统都需要电力运行。比特币被批评消耗过多能源，但这正是为系统健壮性付出的代价。当前网络难度如此之高，以至于即使众多攻击者联手，也无法产生足够的算力发动\
    \ 51%攻击。所以，虽然消耗了电力，但同时也换来了回报。除了比特币的安全性，还有其他好处，例如：\n\n*   在受压制政权下可使用。\n*   无国界支付。\n\
    *   为无银行账户者提供金融服务。\n*   顺畅的跨境汇款。\n*   无需任何中介的替代支付系统。\n*   去中介化支付。\n\n综上所述，比特币尽管能耗高且未完全实现“一\
    \ CPU 一票”的原始理念，仍可被视为一个具有诸多优势的成功项目。\n\n### 工作量证明的变种\n\n根据运行硬件的不同，工作量证明算法分为两种类型：\n\
    \n*   CPU 密集型工作量证明\n*   内存密集型工作量证明\n\n#### CPU 密集型工作量证明\n\n此类谜题的求解速度取决于处理器速度。CPU\
    \ 密集型工作量证明是指，求解加密哈希谜题所需的处理能力与 CPU 或 ASIC 等硬件的计算速度成正比。由于 ASIC 主导了比特币工作量证明，并为有能力使用\
    \ ASIC 的矿工带来了不当优势，这种 CPU 密集型方式被视为有中心化趋势。此外，拥有超强算力的矿池可能会将权力平衡向自己倾斜。因此，引入了对 ASIC\
    \ 有抗性的内存密集型工作量证明算法，这些算法基于内存导向设计而非 CPU。\n\n#### 内存密集型工作量证明\n\n内存密集型工作量证明算法依赖系统内存来提供工作量证明。在此类算法中，性能受限于内存访问速度或内存大小。这种对内存的依赖也使这些工作量证明算法具有\
    \ ASIC 抗性。Equihash 是最著名的内存密集型工作量证明算法之一。\n\n还有其他工作量证明的改进和变种，我们将在第[8]章(#515270_1_En_8_Chapter.xhtml)中介绍。\n\
    \n## 总结\n\n在本章中，我们介绍了区块链共识：\n\n*   工作量证明是比特币引入的第一个区块链共识，同时也是拜占庭将军问题的一个解决方案。\n\
    *   区块链共识可分为两类：中本聪共识和传统的基于 BFT 的共识。\n*   传统 BFT 是确定性的，而中本聪共识是概率性的。\n*   比特币的工作量证明是一种女巫抵抗机制、双重支付预防机制，以及拜占庭将军问题的解决方案。\n\
    *   工作量证明可从博弈论角度看待，其中协议是一个纳什均衡，所有参与者的最优策略是保持诚实。\n*   工作量证明本质上是一种拜占庭容错协议。\n*  \
    \ 工作量证明是一种状态机复制协议，挖出的区块通过八卦协议被宣布并复制到其他节点。\n*   工作量证明消耗高能量，存在 ESG 方面的担忧；然而，它也有诸多好处。\n"
- fmt: "# 6. Early Protocols\n\nIn this chapter, I introduce early protocols. First,\
    \ we start with a background on distributed transactions and relevant protocols,\
    \ such as the two-phase commit. After that, we’ll continue our journey, look at\
    \ the agreement protocols, and conclude the chapter with some fundamental results\
    \ in distributed computing. This chapter introduces early consensus algorithms\
    \ such as those presented in the works of Lamport et al., Ben-Or et al., and Toueg\
    \ et al. It is helpful to understand these fundamental ideas before continuing\
    \ our voyage toward more complex and modern protocols.\n\n## Introduction\n\n\
    In my view, the 1980s was the golden age for innovation and discovery in distributed\
    \ computing. Many fundamental problems, algorithms, and results such as the Byzantine\
    \ generals problem, FLP impossibility result, partial synchrony, and techniques\
    \ to circumvent FLP impossibility were discovered during the late 1970s and 1980s.\
    \ Starting from Lamport’s phenomenal paper “Time, Clocks, and the Ordering of\
    \ Events in a Distributed System” to the Byzantine generals problem and then Schneider’s\
    \ state machine replication paper, one after another, there were most significant\
    \ contributions made to the consensus problem and generally in distributed computing.\n\
    \nConsensus can be defined as a protocol for achieving agreement. A high-level\
    \ list of major contributions is described as follows.\n\nIn his seminal paper\
    \ in 1978, “Time, Clocks, and Ordering of Events in a Distributed System”, Lamport\
    \ described how to order events using synchronized clocks in the absence of faults.\
    \ Then in 1980, the paper “Reaching Agreement in the Presence of Faults” posed\
    \ the question if agreement can be reached in an unreliable distributed system.\
    \ It was proven that agreement is achievable if the number of faulty nodes in\
    \ a distributed system is less than one-third of the total number of processes,\
    \ i.e. `n >= 3f + 1`, where `n` is the number of total nodes and `f` is the number\
    \ of faulty processors. In the paper “The Byzantine Generals Problem” in 1982,\
    \ Lamport et al. showed that agreement is solvable using oral messages if more\
    \ than two-thirds of the generals are loyal. In 1982, the paper “The Byzantine\
    \ generals strike again” by Danny Dolev showed that unanimity is achievable if\
    \ less than one-third of the total number of processors are faulty and more than\
    \ one-half of the network’s connectivity is available.\n\nUnanimity is a requirement\
    \ where if all initial values of the processes are the same, say `v`, then all\
    \ processes decide on that value `v`. This is strong unanimity. However, a weaker\
    \ variant called weak unanimity only requires this condition to hold if all processes\
    \ are correct; in other words, no processes are faulty.\n\nThe paper also provided\
    \ the first proof that the distributed system must have `3f + 1` nodes to tolerate\
    \ `f` faults. However, the celebrated FLP result appeared a little later which\
    \ proved that deterministic asynchronous consensus is not possible even if a single\
    \ process is crash faulty. FLP impossibility implies that safety and liveness\
    \ of a consensus protocol cannot be guaranteed in an asynchronous network.\n\n\
    Lamport’s algorithm was for a synchronous setting and assumed that eventually\
    \ all the messages will be delivered. Moreover, it wasn’t fault tolerant because\
    \ a single failure will halt the algorithm.\n\nAfter the FLP impossibility result\
    \ appeared, attempts started to circumvent it and solve the consensus problem\
    \ nevertheless. The intuition behind circumventing FLP is to relax some stricter\
    \ requirements of timing and determinism.\n\nBen-Or proposed the earliest algorithms\
    \ to sacrifice some level of determinism to circumvent FLP. As FLP impossibility\
    \ implies that under asynchrony, there will always be an execution that does not\
    \ terminate, one way of avoiding that is to try and make termination probabilistic.\
    \ So that instead of deterministic termination, probabilistic termination is used.\
    \ The intuition behind these algorithms is to use the “common coin” approach,\
    \ where a process randomly chooses its values if it doesn’t receive messages from\
    \ other nodes. In other words, a process is allowed to select a value to vote\
    \ on if it doesn’t receive a majority of votes on the value from the rest of the\
    \ processes. This means that eventually more than half of the nodes will end up\
    \ voting for the same value. However, this algorithm’s communication complexity\
    \ increases exponentially with the number of nodes. Later, another approach that\
    \ achieved consensus in a fixed number of rounds was proposed by Rabin. These\
    \ proposals required `5f + 1` and `10f + 1` rounds, respectively, as compared\
    \ to the `3f + 1` lower bound commonly known today.\n\nConsensus protocols that\
    \ relax timing (synchrony) requirements aim to provide safety under all circumstances\
    \ and liveness only when the network is synchronous. A significant breakthrough\
    \ was the work of Dwork, Lynch, and Stockmeyer, which for the first time introduced\
    \ a more realistic idea of partial synchrony. This model is more practical as\
    \ it captures how real distributed systems behave. More precisely, distributed\
    \ systems can be asynchronous for arbitrary periods but will eventually return\
    \ to synchrony long enough for the system to make a decision and terminate. This\
    \ paper introduced various combinations of processor and network synchrony and\
    \ asynchrony and proved the lower bounds for such scenarios.\n\n> **Note**  \n\
    > We discussed partial synchrony in detail in Chapter [3](#515270_1_En_3_Chapter.xhtml).\n\
    \nTable [6-1](#515270_1_En_6_Chapter.xhtml#Tab1) shows the summary of results\
    \ from the DLS88 paper showing a minimum number of processors for which a fault-tolerant\
    \ consensus protocol exists.\n\n**Table 6-1** Minimum number of processors for\
    \ which a fault-tolerant consensus protocol exists\n\n| Type of Fault | Synchronous\
    \ | Asynchronous | Partially Synch Comms and Processor |\n| --- | --- | --- |\
    \ --- |\n| Fail-stop | `f` | NA | `2f + 1` |\n| Omission | `f` | NA | `2f + 1`\
    \ |\n| Authenticated Byzantine | `f` | NA | `3f + 1` |\n| Byzantine | `3f + 1`\
    \ | NA | `3f + 1` |\n\nThis paper introduced the DLS algorithm which solved consensus\
    \ under partial synchrony.\n\nSome major results are listed as follows, starting\
    \ from the 1980s:\n\n* Lamport showed in LPS 82 that under a synchronous setting,\
    \ `n > 2f` with authentication and `n > 3f` are at least required with oral messages.\n\
    * The FLP result in 1982 showed that even with a single crash failure, consensus\
    \ is impossible under asynchrony, and at least `n > 3f` are required for safety.\n\
    * Ben-Or in 1983 proposed a randomized solution under asynchrony.\n\nNow let’s\
    \ go through distributed transaction which is a major concept in distributed systems."
  raw: '# 6. Early Protocols


    In this chapter, I introduce early protocols. First, we start with a background
    on distributed transactions and relevant protocols, such as the two-phase commit.
    After that, we’ll continue our journey, look at the agreement protocols, and conclude
    the chapter with some fundamental results in distributed computing. This chapter
    introduces early consensus algorithms such as those presented in the works of
    Lamport et al., Ben-Or et al., and Toueg et.al. It is helpful to understand these
    fundamental ideas before continuing our voyage toward more complex and modern
    protocols.


    ## Introduction


    In my view, the 1980s was the golden age for innovation and discovery in distributed
    computing. Many fundamental problems, algorithms, and results such as the Byzantine
    generals problem, FLP impossibility result, partial synchrony, and techniques
    to circumvent FLP impossibility were discovered during the late 1970s and 1980s.
    Starting from Lamport’s phenomenal paper “Time, Clocks, and the Ordering of Events
    in a Distributed System” to the Byzantine generals problem and then Schneider’s
    state machine replication paper, one after another, there were most significant
    contributions made to the consensus problem and generally in distributed computing.


    Consensus can be defined as a protocol for achieving agreement. A high-level list
    of major contributions is described as follows.


    In his seminal paper in 1978, “Time, Clocks, and Ordering of Events in a Distributed
    System”, Lamport described how to order events using synchronized clocks in the
    absence of faults. Then in 1980, the paper “Reaching Agreement in the Presence
    of Faults” posed the question if agreement can be reached in an unreliable distributed
    system. It was proven that agreement is achievable if the number of faulty nodes
    in a distributed system is less than one-third of the total number of processes,
    i.e. n>=3f+1, where n is the number of total nodes and f is the number of faulty
    processors. In the paper “The Byzantine Generals Problem” in 1982, Lamport et
    al. showed that agreement is solvable using oral messages if more than two-thirds
    of the generals are loyal. In 1982, the paper “The Byzantine generals strike again”
    by Danny Dolev showed that unanimity is achievable if less than one-third of the
    total number of processors are faulty and more than one-half of the network’s
    connectivity is available.


    Unanimity is a requirement where if all initial values of the processes are the
    same, say v, then all processes decide on that value v. This is strong unanimity.
    However, a weaker variant called weak unanimity only requires this condition to
    hold if all processes are correct; in other words, no processes are faulty.


    The paper also provided the first proof that the distributed system must have
    3*f* + 1 nodes to tolerate *f* faults. However, the celebrated FLP result appeared
    a little later which proved that deterministic asynchronous consensus is not possible
    even if a single process is crash faulty. FLP impossibility implies that safety
    and liveness of a consensus protocol cannot be guaranteed in an asynchronous network.


    Lamport’s algorithm was for a synchronous setting and assumed that eventually
    all the messages will be delivered. Moreover, it wasn’t fault tolerant because
    a single failure will halt the algorithm.


    After the FLP impossibility result appeared, attempts started to circumvent it
    and solve the consensus problem nevertheless. The intuition behind circumventing
    FLP is to relax some stricter requirements of timing and determinism.


    Ben-Or proposed the earliest algorithms to sacrifice some level of determinism
    to circumvent FLP. As FLP impossibility implies that under asynchrony, there will
    always be an execution that does not terminate, one way of avoiding that is to
    try and make termination probabilistic. So that instead of deterministic termination,
    probabilistic termination is used. The intuition behind these algorithms is to
    use the “common coin” approach, where a process randomly chooses its values if
    it doesn’t receive messages from other nodes. In other words, a process is allowed
    to select a value to vote on if it doesn’t receive a majority of votes on the
    value from the rest of the processes. This means that eventually more than half
    of the nodes will end up voting for the same value. However, this algorithm’s
    communication complexity increases exponentially with the number of nodes. Later,
    another approach that achieved consensus in a fixed number of rounds was proposed
    by Rabin. These proposals required 5*f* + 1 and 10*f* + 1 rounds, respectively,
    as compared to the 3*f* + 1 lower bound commonly known today.


    Consensus protocols that relax timing (synchrony) requirements aim to provide
    safety under all circumstances and liveness only when the network is synchronous.
    A significant breakthrough was the work of Dwork, Lynch, and Stockmeyer, which
    for the first time introduced a more realistic idea of partial synchrony. This
    model is more practical as it captures how real distributed systems behave. More
    precisely, distributed systems can be asynchronous for arbitrary periods but will
    eventually return to synchrony long enough for the system to make a decision and
    terminate. This paper introduced various combinations of processor and network
    synchrony and asynchrony and proved the lower bounds for such scenarios.


    Note


    We discussed partial synchrony in detail in Chapter [3](#515270_1_En_3_Chapter.xhtml).


    Table [6-1](#515270_1_En_6_Chapter.xhtml#Tab1) shows the summary of results from
    the DLS88 paper showing a minimum number of processors for which a fault-tolerant
    consensus protocol exists.


    Table 6-1


    Minimum number of processors for which a fault-tolerant consensus protocol exists


    | Type of Fault | Synchronous | Asynchronous | Partially Synch Comms and Processor
    |

    | --- | --- | --- | --- |

    | Fail-stop | f | NA | 2f + 1 |

    | Omission | f | NA | 2f + 1 |

    | Authenticated Byzantine | f | NA | 3f + 1 |

    | Byzantine | 3f + 1 | NA | 3f + 1 |


    This paper introduced the DLS algorithm which solved consensus under partial synchrony.


    Some major results are listed as follows, starting from the 1980s:


    *   Lamport showed in LPS 82 that under a synchronous setting, n > 2f with authentication
    and n > 3f are at least required with oral messages.


    *   The FLP result in 1982 showed that even with a single crash failure, consensus
    is impossible under asynchrony, and at least n > 3f are required for safety.


    *   Ben-Or in 1983 proposed a randomized solution under asynchrony.


    Now let’s go through distributed transaction which is a major concept in distributed
    systems.'
  trans: "\n# 6. 早期协议\n\n在本章中，我将介绍早期的协议。首先，我们从分布式事务和相关协议（例如两阶段提交）的背景知识入手。之后，我们将继续旅程，审视共识协议，并以分布式计算中的一些基础性结论作为本章的收尾。本章将介绍早期的共识算法，例如\
    \ Lamport 等人、Ben-Or 等人以及 Toueg 等人提出的算法。在继续我们向更复杂、更现代协议的航行之前，理解这些基本概念是很有帮助的。\n\n\
    ## 引言\n\n在我看来，20 世纪 80 年代是分布式计算领域创新和发现的黄金时代。许多基本问题、算法和结论，例如拜占庭将军问题、FLP 不可能性结论、部分同步性以及规避\
    \ FLP 不可能性的技术，都是在 20 世纪 70 年代末和 80 年代被发现的。从 Lamport 的杰出论文《分布式系统中的时间、时钟和事件排序》到拜占庭将军问题，再到\
    \ Schneider 的状态机复制论文，一个接一个，这些都对共识问题乃至整个分布式计算领域做出了最重要的贡献。\n\n共识可以定义为一种达成一致的协议。以下列出了主要贡献的概要。\n\
    \n在 1978 年发表的开创性论文《分布式系统中的时间、时钟和事件排序》中，Lamport 描述了如何在无故障情况下使用同步时钟对事件进行排序。随后在 1980\
    \ 年，论文《在存在故障的情况下达成一致》提出了一个问题：在一个不可靠的分布式系统中是否能够达成一致。该论文证明，如果分布式系统中故障节点的数量少于总进程数的三分之一，即\
    \ `n >= 3f + 1`，其中 `n` 是节点总数，`f` 是故障处理器的数量，那么一致是可以达成的。在 1982 年的论文《拜占庭将军问题》中，Lamport\
    \ 等人表明，如果超过三分之二的将军是忠诚的，那么使用口头消息就可以解决一致性问题。1982 年，Danny Dolev 的论文《拜占庭将军再次出击》表明，如果故障处理器的数量少于总数的三分之一，并且网络的连通性超过一半，那么全体一致性是可以实现的。\n\
    \n全体一致性是这样一种要求：如果所有进程的初始值都是相同的，比如说 `v`，那么所有进程都决定这个值 `v`。这是强全体一致性。然而，一种称为弱全体一致性的较弱变体只要求在所有进程都正确（即没有进程发生故障）的情况下才满足此条件。\n\
    \n这篇论文还首次证明了分布式系统必须要有 `3f + 1` 个节点才能容忍 `f` 个故障。然而，著名的 FLP 结论稍后出现，它证明了即使只有一个进程发生崩溃故障，确定性异步共识也是不可能实现的。FLP\
    \ 不可能性意味着，在异步网络中，无法保证共识协议的安全性和活性。\n\nLamport 的算法是针对同步环境设计的，并且假设所有消息最终都会被送达。此外，它不具备容错性，因为一个单一故障就会导致算法停止。\n\
    \n在 FLP 不可能性结论出现之后，人们开始尝试规避它，并仍然解决共识问题。规避 FLP 的直觉是放松对时序和确定性的一些更严格的要求。\n\nBen-Or\
    \ 提出了最早的算法，通过牺牲一定程度的确定性来规避 FLP。由于 FLP 不可能性意味着在异步条件下，总会有一些执行不会终止，避免这种情况的一种方法是尝试让终止具有概率性。因此，使用概率性终止代替确定性终止。这些算法背后的直觉是使用“通用硬币”方法，即如果一个进程没有从其他节点收到消息，它会随机选择其值。换句话说，如果一个进程没有从其他进程那里收到关于某个值的多数投票，它可以选择一个值进行投票。这意味着最终超过半数的节点最终会投票给同一个值。然而，该算法的通信复杂度随着节点数量的增加呈指数级增长。后来，Rabin\
    \ 提出了一种在固定轮数内达成共识的方法。与今天普遍已知的下界 `3f + 1` 相比，这些方案分别需要 `5f + 1` 和 `10f + 1` 轮。\n\
    \n放松时序（同步性）要求的共识协议旨在所有情况下提供安全性，而仅在网络同步时提供活性。Dwork、Lynch 和 Stockmeyer 的工作是一个重大突破，他们首次引入了更现实的**部分同步**概念。这个模型更加实用，因为它捕捉了真实分布式系统的行为方式。更准确地说，分布式系统可以在任意长的时段内处于异步状态，但最终会恢复到足够长的同步状态，以便系统做出决策并终止。这篇论文介绍了处理器和网络的同步性与异步性的各种组合，并证明了这些场景的下界。\n\
    \n> **注意**  \n> 我们在第 3 章中详细讨论了部分同步性。\n\n表 6-1 展示了 DLS88 论文的结论总结，显示了存在容错共识协议所需的最小处理器数量。\n\
    \n**表 6-1** 存在容错共识协议所需的最小处理器数量\n\n| 故障类型 | 同步 | 异步 | 部分同步通信和处理器 |\n| --- | ---\
    \ | --- | --- |\n| 停止故障 | `f` | 不适用 | `2f + 1` |\n| 遗漏故障 | `f` | 不适用 | `2f + 1`\
    \ |\n| 已认证拜占庭故障 | `f` | 不适用 | `3f + 1` |\n| 拜占庭故障 | `3f + 1` | 不适用 | `3f + 1`\
    \ |\n\n这篇论文介绍了 DLS 算法，该算法在部分同步条件下解决了共识问题。\n\n以下列出从 20 世纪 80 年代开始的一些主要成果：\n\n*\
    \   在 LPS 82 中，Lamport 表明，在同步环境下，使用认证至少需要 `n > 2f`，而使用口头消息至少需要 `n > 3f`。\n*  \
    \ 1982 年的 FLP 结论表明，即使只有一次崩溃故障，在异步条件下共识也是不可能的，并且为了安全性至少需要 `n > 3f`。\n*   Ben-Or\
    \ 在 1983 年提出了一种在异步条件下的随机化解决方案。\n\n现在，让我们来探讨分布式事务，这是分布式系统中的一个重要概念。\n"
- fmt: '# Distributed Transactions


    A distributed transaction is a sequence of events spread across multiple processes.
    A transaction either concludes with a commit or abort. If committed, all events
    are executed, and the output is generated, and if aborted, the transaction halts
    without complete execution. A transaction is atomic if it executes and commits
    fully; otherwise, it rolls back with no effect. In other words, atomic transactions
    either execute in full or not at all.


    There are four properties that a transaction must satisfy, commonly known as the
    ACID consistency model:


    - **Atomicity**: Either the transaction events fully execute or not at all.

    - **Consistency**: If a transaction commits, it results in a valid (consistent)
    state of the system. It satisfies some invariants.

    - **Isolation**: Unless the transaction is committed, no effects are visible.

    - **Durability**: A transaction once committed has a permanent effect.


    One point to note here is that consistency is guaranteed much easily in monolithic
    architectures. In contrast, consistency is not immediate in distributed architectures,
    and distributed architectures rely on so-called eventual consistency. Eventual
    consistency means that all nodes in a system eventually (at some point in time
    in future) synchronize and agree on a consistent state of the system. ACID properties
    must hold even if some nodes (processes) fail.


    Atomicity, isolation, and durability are easier to achieve in monolithic architectures,
    but achieving these properties in distributed settings becomes more challenging.


    A two-phase commit protocol is used to achieve atomicity across multiple processes.
    Replicas should be consistent with one another. Atomic commit protocols are in
    fact a kind of consensus mechanism because in transaction commit protocols nodes
    must come to an agreement to either commit if all is well or roll back in case
    something goes wrong. Imagine if a transaction is expected to be committed on
    all nodes in a distributed system (a network), then either it must commit on all
    or none to maintain replica consistency. We cannot have a situation where a transaction
    succeeds on some nodes and not on others, leading to an inconsistent distributed
    system. This is where atomic commit comes in. It can be seen fundamentally as
    a consensus algorithm because this protocol requires an agreement between all
    nodes in a network. However, there are fundamental differences between atomic
    commit and consensus. In consensus, one or more nodes propose a value, and nodes
    decide on one of the values using the consensus algorithm. This is usually achieved
    by majority consensus. In contrast, in an atomic commit protocol, all nodes are
    required to vote whether they commit or abort the transaction. In consensus algorithms,
    there can be multiple values proposed out of which one can be agreed upon, whereas
    in atomic commit the protocol must commit if all nodes vote to commit; otherwise,
    even if one node doesn''t agree, then the transaction must be aborted by all nodes.
    A major distinction between atomic commit and consensus is that in consensus algorithms,
    faults (crashed nodes) are tolerated due to the quorum availability rule, whereas
    in atomic commit even if one node fails, the transaction must abort on all nodes.
    To handle crashed nodes, a complete and strongly accurate failure detector is
    used, which is implemented using a timeout mechanism.


    In addition to the ACID consistency model, another common consistency model used
    in databases is the BASE model. BASE stands for basically available (BA), soft
    state (S), and eventually consistent (E). The databases using the BASE consistency
    model ensure availability by replicating data across nodes in the system. As the
    model does not provide immediate consistency, the data values could change over
    time, which results in eventual consistency. In the BASE model, consistency is
    only achieved eventually. However, it offers high availability, which is useful
    in many online services where immediate and strong consistency requirements are
    somewhat loose, like social networks and online video platforms. From a CAP theorem
    perspective, the BASE model sacrifices consistency and favors high availability.


    Now we discuss the two-phase commit which is a famous commit protocol, achieving
    atomicity.'
