  trans: "\n# 分布式算法\n\n分布式算法在多台计算机上并发运行，以在分布式系统中完成某项任务。在分布式系统中，同一算法在所有计算机上并发执行，以实现共同目标。\n\
    \n与顺序算法（其中执行中的每个操作依次发生）相比，分布式算法是操作并发执行的算法。并发算法和并发性在计算中相当常见，例如，处理器中同时运行的多个线程、计算机中同时运行的多个应用程序、计算机中的多核处理器，或分布式系统中同时运行的多个进程。\n\
    \n我们可以将分布式算法定义为在多台机器上并发运行的算法。\n\n分布式算法有若干优势，包括但不限于：与顺序算法相比，某些计算可以并行化以实现更高性能。此外，分布式算法具有容错能力；例如，如果一定阈值（我们将在第\
    \ 3 章中解释）的节点发生故障，分布式算法仍能继续运行。\n\n存在消息传递算法，其中进程通过网络发送和接收消息进行通信。另一种类型是共享内存分布式算法，其中算法通过从共享内存中读写进行通信。\n\
    \n集中式算法顺序执行，而分布式算法并发执行。集中式算法通常不以防故障为特性，而分布式算法则被设计为能容忍各种类型的故障。顺序算法通常更直观，因为它们是为顺序执行而设计的，而分布式算法可能难以理解。这也是集中式算法的正确性证明相对容易做到，并且在大多数情况下甚至通过观察就能显而易见的原因之一。但分布式算法并非如此，其正确性可能具有欺骗性。一个看似正确的算法在实践中可能无法正确运行，并且可能遭受各种故障和属性违反。为此，需要使用多种形式化规范和验证技术来确保分布式算法的正确性。我们将在第\
    \ 9 章中介绍其中一些方法。与顺序算法相比，分布式算法在设计、调试和实现上往往更具挑战性。此外，从复杂度度量的角度来看，顺序集中式算法通常以指令数量来衡量；然而，分布式算法的复杂度则以消息数量来衡量。\n\
    \n# 分布式计算的要素/相关术语/概念\n\n分布式系统由若干要素组成。我们只关心系统的抽象视图，而不是具体的硬件或网络细节。抽象视图允许设计人员通过构建系统模型，在特定假设下设计和推理系统。稍后会详细说明，但首先让我们了解分布式系统的基本要素。\n\
    \n分布式系统可以表示为一个图，其中节点或进程用顶点表示，通信链路用边表示。图 1-4 展示了一些常见的拓扑结构。\n\n![](img/515270_1_En_1_Fig4_HTML.png)\n\
    \n一个六边形和一个正方形，每个顶点上有一个圆圈，分别标注为环形和团。一个带有分支的不规则结构标注为树。\n\n**图 1-4** 表示为图的分布式系统拓扑结构\n\
    \n分布式系统通常表示为由节点和顶点组成的图。节点代表网络中的进程，而顶点代表进程之间的通信链路。这些图还显示了网络的结构视图或拓扑，有助于可视化系统。\n\
    \n分布式系统可以有不同的拓扑结构，并且可以表示为图。常见的拓扑结构包括**环形**，它描述了一种每个节点有两个相邻节点的拓扑结构。**树**形结构是无环且连通的。**团**是一个全连接图，其中所有进程都直接相互连接。\n\
    \n其他要素\n\n*   进程\n    *   事件\n*   执行\n*   链路\n*   状态\n*   全局状态\n*   切割\n\n现在让我们详细了解一下它们。\n\
    \n## 进程\n\n分布式系统中的进程是执行分布式算法的计算机。它也被称为节点。它是一个自治的计算机，可以独立失效，并可以通过发送和接收消息与分布式网络中的其他节点通信。\n\
    \n## 事件\n\n事件可以定义为进程中发生的某个操作。进程中可能发生三种类型的事件：\n\n*   **内部事件**：当进程本地发生某些事情时发生。换句话说，进程执行的本地计算就是一个内部事件。\n\
    *   **消息发送**事件：当进程（节点）向其他节点发送消息时发生。\n*   **消息接收**事件：当进程（节点）接收消息时发生。\n\n图 1-5 所示示意图直观地展示了这一点。\n\
    \n![](img/515270_1_En_1_Fig5_HTML.jpg)\n\n一个包含 P、Q、R 三条线的示意图，具有本地事件、消息发送和消息接收等事件。一些事件通过时间相互连接。\n\
    \n**图 1-5** 三节点分布式系统中的事件和进程\n\n## 状态\n\n状态的概念在分布式系统中至关重要。你会在这本书以及其他关于分布式系统的文本中经常遇到这个术语，尤其是在分布式共识的上下文中。事件构成了节点的本地状态。换句话说，状态由节点中的事件（事件的结果）组成。或者我们可以说，作为事件结果的本地内存、存储和程序的内容构成了进程的状态。\n\
    \n## 全局状态\n\n分布式系统中所有进程和通信链路的状态集合称为**全局状态**。\n\n这也被称为配置，可以定义如下：\n\n分布式系统的配置由进程的状态和传输中的消息组成。\n\
    \n## 执行\n\n分布式系统中的执行是进程对分布式算法的一次运行或计算。有两种类型的执行：\n\n*   同步执行\n*   异步执行\n"
- fmt: "### Cuts\n\nA cut can be defined as a line joining a single point in time\
    \ on each process line in a space-time diagram. Cuts on a space-time diagram can\
    \ serve as a way of visualizing the global state (at that cut) of a distributed\
    \ computation. Also, it serves as a way to visualize what set of events occurred\
    \ before and after the cut, that is, in the past or future. All events on the\
    \ left of the cut are considered **past**, and all events on the right side of\
    \ the cut are said to be **future**. There are consistent cuts and inconsistent\
    \ cuts. If all received messages are sent within the elapsed time before the cut,\
    \ that is, the past, it is called a consistent cut. In other words, a cut that\
    \ obeys causality rules is a consistent cut. An inconsistent cut is where a message\
    \ crosses the cut from the future (right side of the cut) to the past (left side\
    \ of the cut).\n\nIf a cut crosses over a message from the past to the future,\
    \ it is a graphical representation of messages in transit.\n\nThe diagram shown\
    \ in Figure [1-6](#515270_1_En_1_Chapter.xhtml#Fig6) illustrates this concept,\
    \ where `C`[1] is an inconsistent cut and `C`[2] is a consistent cut.\n\n![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig6_HTML.jpg)\n\
    \nA schematic with 3 lines, P, Q, and R, has events like `E P 1`, `E P 2`, and\
    \ so on. All the events are grouped into 2 cuts labeled `C 1` and `C 2`.\n\n**Figure\
    \ 1-6**  \nA space-time diagram depicting cuts in a distributed system execution\n\
    \nAlgorithms such as the Chandy-Lamport snapshot algorithm are used to create\
    \ a consistent cut of a distributed system.\n\nTaking a snapshot of a distributed\
    \ system is helpful in creating a global picture of the system. A snapshot or\
    \ global snapshot captures the global state of the system containing the local\
    \ state of each process and the individual state of each communication link in\
    \ the system. Such snapshots are very useful for debugging, checkpointing, and\
    \ monitoring purposes. A simple solution is to synchronize all clocks and create\
    \ a snapshot at a specific time, but accurate clock synchronization is not possible,\
    \ and we can use causality to achieve such an algorithm that gives us a global\
    \ snapshot.\n\nAssuming no failures, unidirectional FIFO channels, and existence\
    \ of a communication path between any two processes in the system, the Chandy-Lamport\
    \ algorithm works as follows:\n\n*   An initiator process initiating the snapshot\
    \ algorithm does the following:\n    *   Records its own state\n    *   Sends\
    \ a marker message (a control message) to all processes\n    *   Starts recording\
    \ all incoming messages on its channels\n*   A process receiving the marker message\
    \ does the following:\n    *   If it is the first time it sees this message, then\
    \ it:\n        *   Records its own local state\n        *   Marks the channel\
    \ as empty\n        *   Sends out a marker to all processes on its channels\n\
    \        *   Starts recording all incoming channels, except the one it had marked\
    \ empty previously\n    *   If not the first time:\n        *   Stops recording\n\
    *   A snapshot is considered complete, and algorithm terminates, when each process\
    \ has received the marker on all its incoming channels.\n*   The initiator process\
    \ is now able to build a complete snapshot containing the saved state of each\
    \ process and all messages.\n\nNote that any process can initiate the snapshot,\
    \ the algorithm does not interfere with the normal operation of the distributed\
    \ system, and each process records the state of incoming channels and its own.\n\
    \n### Types of Distributed Systems\n\nThere are two types of distributed systems\
    \ from the communication point of view. Shared memory systems are those where\
    \ all nodes have direct access to the shared memory. On the other hand, message-passing\
    \ systems are those where nodes communicate with each other via passing messages.\
    \ In other words, nodes send and receive messages using communication links to\
    \ communicate with each other.\n\nNow let’s discuss some software architecture\
    \ models of distributed systems. Software architecture models describe the design\
    \ and structure of the system. Software architecture answers questions such as\
    \ what elements are involved and how they interact with each other. The central\
    \ focus of the distributed system software architecture is processes, and all\
    \ other elements are built around them.\n\n### Software Architecture Models\n\n\
    There are four main software architecture types which include the client-server\
    \ model, multiple server model, proxy server model, and peer-to-peer model.\n\n\
    #### Client-Server\n\nThis model is a common way to have two processes work together.\
    \ A process assumes the role of a client, and the other process assumes the role\
    \ of a server. The server receives requests made by the client and responds with\
    \ a reply. There can be multiple client processes but only a single server process.\
    \ For example, a classic web client and web server (browser to a web server) design\
    \ follows this type of architecture. Figure [1-7](#515270_1_En_1_Chapter.xhtml#Fig7)\
    \ depicts the so-called physical view of this type of architecture.\n\n![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig7_HTML.jpg)\n\
    \nA schematic of a server connected to 3 clients. The request is sent from the\
    \ client to the server, and a reply is sent from the server to the client.\n\n\
    **Figure 1-7**  \nClient-server architecture"
