  trans: '

    #### 视图变更


    当其他副本怀疑主副本出现故障时，就会发生视图变更。此阶段用于确保协议的正常推进。通过视图变更选出新的主副本，随后再次启动正常运行模式。新主副本采用轮询方式选定，公式为
    `p = v mod n`，其中 `v` 是视图编号，`n` 是系统中的节点总数。


    当备份副本收到请求时，会在验证消息后尝试执行该请求。但如果因任何原因，该副本在一段时间内未能执行请求，则会触发超时。此时，它将启动视图变更子协议。


    在视图变更期间，副本停止接受与当前视图相关的消息，并将其状态更新为“视图变更”状态。在此状态下，它能接收的消息仅限于 `checkpoint`、`view
    change` 和 `new view` 消息。之后，它会向所有副本广播一条包含下一个视图编号的 `view change` 消息。


    当此消息到达新主副本时，新主副本会等待至少 `2f` 个针对下一个视图的视图变更消息。如果收集到至少 `2f + 1` 个视图变更消息，它会向所有副本广播一条
    `new view` 消息，并再次进入正常运行模式。


    当其他副本收到 `new view` 消息时，它们会相应地更新本地状态，并启动正常运行模式。


    视图变更协议的算法如下：


    1.  停止接受当前视图的 `pre-prepare`、`prepare` 和 `commit` 消息。

    2.  构建到目前为止已准备的所有证书的集合。

    3.  向所有副本广播一条包含下一个视图编号和所有已准备证书集合的 `view change` 消息。


    图 7-11 展示了视图变更协议。


    ![](img/515270_1_En_7_Fig11_HTML.png)


    该视图变更协议示意图包含主副本、新主副本、副本 3 和副本 4 的流程。这些流程分为 `view-change` 和 `new view` 两个阶段。


    **图 7-11**

    视图变更协议


    视图变更子协议是确保系统活跃性的一种手段。该子协议采用了三种巧妙技术来保证：


    1.  广播了 `view change` 消息的副本会等待 `2f+1` 个视图变更消息，然后启动其计时器。如果计时器在节点收到下一个视图的 `new view`
    消息之前超时，该节点将为下一个序列启动视图变更，但会增加其超时值。如果副本在执行新视图中的新唯一请求之前超时，也会出现这种情况。

    2.  一旦副本收到 `f+1` 个大于其当前视图编号的视图变更消息，该副本将会为其已知集合中最小的视图编号发送 `view change` 消息，以避免下一次视图变更发生得太晚。即使计时器尚未到期，也会发送针对最小视图的
    `view change` 消息。

    3.  由于只有当至少 `f + 1` 个副本发送了 `view change` 消息时才会发生视图变更，这种机制确保了故障主副本无法通过连续请求视图变更来无限期地阻止协议推进。


    在繁忙的环境中，存储尤其可能成为瓶颈。为了解决这个问题，PBFT 协议中使用了检查点机制。


    #### 检查点子协议


    检查点是一个关键的子协议。它用于丢弃所有副本日志中的旧消息。通过这种方式，副本就一个稳定检查点达成一致，该检查点提供了在特定时间点上全局状态的快照。这是一个周期性过程，由每个副本在执行请求后执行，并在其日志中将其标记为一个检查点。一个名为
    `low watermark`（低水位线，在 PBFT 术语中）的变量用于记录最后一个稳定检查点的序列号。该检查点会被广播到其他节点。一旦某个副本收到至少
    `2f + 1` 个检查点消息，它就会将这些消息保存起来，作为稳定检查点的证明。同时，它会从其日志中丢弃所有先前的 `pre-prepare`、`prepare`
    和 `commit` 消息。


    ### PBFT 的优缺点


    PBFT 是一项开创性的协议，开创了实用拜占庭容错协议这一新的研究领域。原始的 PBFT 协议有很多优点，但也存在一些缺点。下面我们将逐一介绍。


    #### 优势


    *   PBFT 提供即时且确定性的交易最终性。相比之下，在 PoW 协议中，需要多次确认才能以较高概率最终确定一笔交易。

    *   与消耗大量电力的 PoW 相比，PBFT 也更加节能。


    #### 缺点


    *   PBFT 的可扩展性不强。这一限制使其更适合联盟链，而非公有链。不过，它比 PoW 协议要快得多。

    *   PBFT 网络容易受到女巫攻击，即单个实体可以控制多个身份来影响投票，从而影响决策。

    *   通信复杂度高。

    *   不适用于具有匿名参与者的公有链。


    PBFT 保证了安全性和活跃性。接下来我们来看一下它是如何做到的。

    '
- fmt: '### Safety and Liveness


    Liveness means that a client eventually gets a response to its request if the
    message delivery delay does not increase quicker than the time itself indefinitely.
    In other words, the protocol ensures progress if latency increases slower than
    the timeout threshold.


    A Byzantine primary may induce delay on purpose. However, this delay cannot be
    indefinite because every honest replica has a view change timer. This timer starts
    whenever the replica receives a request. Suppose the replica times out before
    the request is executed; the replica suspects the primary replica and broadcasts
    a view change message to all replicas. As soon as `f + 1` replicas suspect the
    primary as faulty, all honest replicas enter the view change process. This scenario
    will result in a view change, and the next replica will take over as the primary,
    and the protocol will progress.


    Liveness is guaranteed, as long as no more than ![$$ \left\lfloor \frac{n-1}{3}\right\rfloor
    $$](images/515270_1_En_7_Chapter/515270_1_En_7_Chapter_TeX_IEq2.png) replicas
    are faulty, and the message delay does not grow faster than the time itself. It
    means that the protocol will eventually make progress with the preceding two conditions.
    This weak synchrony assumption is closer to realistic environments and enables
    the system to circumvent the FLP result. A clever trick here is that if the view
    change timer expires before a replica receives a valid new view message for the
    expected new view, the replica doubles the timeout value and restarts its view
    change timer. The idea is that the timeout timer doubles the wait time to wait
    for a longer time as the message delays might be more extensive. Ultimately, the
    timer values become larger than the message delays, meaning messages will eventually
    arrive before the timer expires. This mechanism ensures that eventually a new
    view will be available on all honest replicas, and the protocol will make progress.


    Also, a Byzantine primary cannot do frequent view changes successively to slow
    down the system. This is so because an honest replica joins the view change only
    when it has received at least `f + 1` view change messages. As there are at most
    `f` faulty replicas, only `f` replicas cannot cause a view change when all honest
    replicas are live, and the protocol is making progress. In other words, as at
    most `f` successive primary replicas can be faulty, the system eventually makes
    progress after at most `f + 1` view changes.


    Replicas wait for `2f + 1` view change messages and start a timer to start a new
    view which avoids starting a view change too soon. Similarly, if a replica receives
    `f + 1` view change messages for a view greater than its current view, it broadcasts
    a view change. This prevents starting the next view change too late.


    Safety requires that each honest replica execute the received client request in
    the same total order, that is, execute the same request in the same order in all
    phases.


    PBFT is assumed safe if the total number of nodes is `3f + 1`. In that case, `f`
    Byzantine nodes are tolerated.


    Let’s first recall what a quorum intersection is. If there are two sets, say `S1`
    and `S2`, with ≥ `2f + 1` nodes each, then there is always a correct node in `S1
    ∩ S2`. This is true because if there are two sets of at least `2f + 1` nodes each,
    and there are `3f + 1` nodes in total, then the pigeonhole principle implies that
    the intersection of `S1` and `S2` will have at least `f + 1` nodes. As there are
    at most `f` faulty nodes, the intersection, `S1 ∩ S2` must contain at least 1
    correct node.


    Each phase in PBFT must acquire `2f + 1` certificate/votes to be accepted. It
    turns out that at least one honest node must vote twice on the same sequence number
    to result in a safety violation, which is not possible because an honest node
    cannot vote maliciously. In other words, if the same sequence number is assigned
    to two different messages by a malicious primary to violate safety, then at least
    one honest replica will reject it due to a quorum intersection property. This
    is because a `2f + 1` quorum means that there is at least one honest intersecting
    replica.


    The commit phase ensures that the correct order is achieved even across views.
    If a view change occurs, the new primary replica acquires prepared certificates
    from `2f + 1` replicas, which ensures that the new primary gets at least one prepared
    certificate for every client request executed by a correct replica.


    ### Order Within a View


    If a replica acquires a prepared certificate for a request within a view and a
    unique sequence number, then no replica can get a prepared certificate for a different
    request with the same view and sequence number. Replicas can only get a prepared
    certificate for the same request with the same view and sequence number.


    Imagine two replicas have gathered prepared certificates for two different requests
    with the same view and sequence number. We know that a prepared certificate contains
    `2f+1` messages, which implies that a correct node must have sent a `pre-prepare`
    or `prepare` message for two different requests with the same sequence and view
    due to quorum intersection. However, a correct replica only ever sends a single
    `pre-prepare` for each view and sequence, that is, a sequence number is always
    incremented when the client request is received by the primary and assigned to
    the request. Also, a correct replica only sends one `prepare` message in each
    view and for a sequence. It sends out a `prepare` message only if it has not accepted
    any `pre-prepare` messages for the same view or sequence number before. This means
    that the prepare must be for the same request. This achieves order within a view.


    ### Order Across Views


    The protocol guarantees that if a correct replica has executed a client request
    in a view with a specific sequence number, then no correct replica will execute
    any other client request with the same sequence number in any future view or current
    view. In other words, every request executed by an honest replica must make it
    to the next view in the same order assigned to it previously.


    We know that a request only executes at a replica if it has received `2f + 1`
    commit messages. Suppose an honest replica has acquired `2f + 1` commit messages.
    In that case, it means that the client request must have been prepared at, at
    least, `f + 1` honest replicas, and each of these replicas has a prepare certificate
    for it and all the previous client requests. We also know that at least one of
    these `f + 1` honest replicas will participate in the view change protocol and
    report these requests along with their certificates. This implies that the request
    will always carry the same sequence number in the new view.


    This completes our discussion on PBFT. However, it’s a vast subject, and you can
    further explore the original papers and thesis to learn more.'
  raw: '### Safety and Liveness


    Liveness means that a client eventually gets a response to its request if the
    message delivery delay does not increase quicker than the time itself indefinitely.
    In other words, the protocol ensures progress if latency increases slower than
    the timeout threshold.


    A Byzantine primary may induce delay on purpose. However, this delay cannot be
    indefinite because every honest replica has a view change timer. This timer starts
    whenever the replica receives a request. Suppose the replica times out before
    the request is executed; the replica suspects the primary replica and broadcasts
    a view change message to all replicas. As soon as *f* + 1 replicas suspect the
    primary as faulty, all honest replicas enter the view change process. This scenario
    will result in a view change, and the next replica will take over as the primary,
    and the protocol will progress.


    Liveness is guaranteed, as long as no more than ![$$ \left\lfloor \frac{n-1}{3}\right\rfloor
    $$](images/515270_1_En_7_Chapter/515270_1_En_7_Chapter_TeX_IEq2.png) replicas
    are faulty, and the message delay does not grow faster than the time itself. It
    means that the protocol will eventually make progress with the preceding two conditions.
    This weak synchrony assumption is closer to realistic environments and enables
    the system to circumvent the FLP result. A clever trick here is that if the view
    change timer expires before a replica receives a valid new view message for the
    expected new view, the replica doubles the timeout value and restarts its view
    change timer. The idea is that the timeout timer doubles the wait time to wait
    for a longer time as the message delays might be more extensive. Ultimately, the
    timer values become larger than the message delays, meaning messages will eventually
    arrive before the timer expires. This mechanism ensures that eventually a new
    view will be available on all honest replicas, and the protocol will make progress.


    Also, a Byzantine primary cannot do frequent view changes successively to slow
    down the system. This is so because an honest replica joins the view change only
    when it has received at least *f* + 1 view change messages. As there are at most
    *f* faulty replicas, only f replicas cannot cause a view change when all honest
    replicas are live, and the protocol is making progress. In other words, as at
    most *f* successive primary replicas can be faulty, the system eventually makes
    progress after at most *f* + 1 view changes.


    Replicas wait for 2*f* + 1 view change messages and start a timer to start a new
    view which avoids starting a view change too soon. Similarly, if a replica receives
    *f* + 1 view change messages for a view greater than its current view, it broadcasts
    a view change. This prevents starting the next view change too late.


    Safety requires that each honest replica execute the received client request in
    the same total order, that is, execute the same request in the same order in all
    phases.


    PBFT is assumed safe if the total number of nodes is 3*f* + 1. In that case, f
    Byzantine nodes are tolerated.


    Let’s first recall what a quorum intersection is. If there are two sets, say S1
    and S2, with ≥2*f* + 1 nodes each, then there is always a correct node in *S*1 ∩ *S*2\.
    This is true because if there are two sets of at least 2*f* + 1 nodes each, and
    there are 3*f* + 1 nodes in total, then the pigeonhole principle implies that
    the intersection of S1 and S2 will have at least *f* + 1 nodes. As there are at
    most *f* faulty nodes, the intersection, *S*1 ∩ *S*2 must contain at least 1 correct
    node.


    Each phase in PBFT must acquire 2*f* + 1 certificate/votes to be accepted. It
    turns out that at least one honest node must vote twice on the same sequence number
    to result in a safety violation, which is not possible because an honest node
    cannot vote maliciously. In other words, if the same sequence number is assigned
    to two different messages by a malicious primary to violate safety, then at least
    one honest replica will reject it due to a quorum intersection property. This
    is because a 2*f* + 1 quorum means that there is at least one honest intersecting
    replica.


    The commit phase ensures that the correct order is achieved even across views.
    If a view change occurs, the new primary replica acquires prepared certificates
    from 2*f* + 1 replicas, which ensures that the new primary gets at least one prepared
    certificate for every client request executed by a correct replica.


    #### Order Within a View


    If a replica acquires a prepared certificate for a request within a view and a
    unique sequence number, then no replica can get a prepared certificate for a different
    request with the same view and sequence number. Replicas can only get a prepared
    certificate for the same request with the same view and sequence number.


    Imagine two replicas have gathered prepared certificates for two different requests
    with the same view and sequence number. We know that a prepared certificate contains
    2f+1 messages, which implies that a correct node must have sent a pre-prepare
    or prepare message for two different requests with the same sequence and view
    due to quorum intersection. However, a correct replica only ever sends a single
    pre-prepare for each view and sequence, that is, a sequence number is always incremented
    when the client request is received by the primary and assigned to the request.
    Also, a correct replica only sends one prepare message in each view and for a
    sequence. It sends out a prepare message only if it has not accepted any pre-prepare
    messages for the same view or sequence number before. This means that the prepare
    must be for the same request. This achieves order within a view.


    #### Order Across Views


    The protocol guarantees that if a correct replica has executed a client request
    in a view with a specific sequence number, then no correct replica will execute
    any other client request with the same sequence number in any future view or current
    view. In other words, every request executed by an honest replica must make it
    to the next view in the same order assigned to it previously.


    We know that a request only executes at a replica if it has received 2*f* + 1
    commit messages. Suppose an honest replica has acquired 2*f* + 1 commit messages.
    In that case, it means that the client request must have been prepared at, at
    least, *f* + 1 honest replicas, and each of these replicas has a prepare certificate
    for it and all the previous client requests. We also know that at least one of
    these *f* + 1 honest replicas will participate in the view change protocol and
    report these requests along with their certificates. This implies that the request
    will always carry the same sequence number in the new view.


    This completes our discussion on PBFT. However, it’s a vast subject, and you can
    further explore the original papers and thesis to learn more.'
  trans: '

    ### 安全性与活性


    **活性**意味着，只要消息传递延迟的增长速度不会无限期地超过时间本身，客户端最终会收到其请求的响应。换句话说，如果延迟的增长速度慢于超时阈值，该协议就能确保系统持续推进。


    拜占庭主节点可能故意引入延迟。然而，这种延迟不可能是无限期的，因为每个诚实的副本节点都设有一个视图变更计时器。当副本节点收到请求时，该计时器便会启动。假设在请求被执行前计时器超时，该副本节点会怀疑主节点，并向所有副本节点广播一条视图变更消息。一旦有`f
    + 1`个副本节点怀疑主节点存在故障，所有诚实的副本节点就会进入视图变更流程。这种情况将导致视图变更，下一个副本节点将接替成为主节点，协议从而得以继续推进。


    只要不超过 ![$$ \left\lfloor \frac{n-1}{3}\right\rfloor $$](img/515270_1_En_7_Chapter_TeX_IEq2.png)
    个副本节点发生故障，并且消息延迟的增长速度不超过时间本身，活性就能得到保证。这意味着，在上述两个条件下，协议最终会取得进展。这种弱同步假设更接近现实环境，并使系统能够规避
    FLP 不可能结果。这里有一个巧妙的技巧：如果在一个副本节点收到预期新视图的有效新视图消息之前，其视图变更计时器就过期了，该节点会将超时时间加倍，并重新启动其视图变更计时器。其思想是，由于消息延迟可能更长，超时计时器会加倍等待时间以等待更长时间。最终，计时器值会变得比消息延迟更大，这意味着消息最终会在计时器过期之前到达。这种机制确保最终所有诚实的副本节点都能获得一个新视图，协议也将取得进展。


    此外，拜占庭主节点无法通过连续频繁地进行视图变更来拖慢系统。这是因为，一个诚实的副本节点只有在收到至少`f + 1`条视图变更消息时才会加入视图变更。由于最多只有`f`个故障副本节点，因此当所有诚实的副本节点都处于活跃状态且协议正在推进时，仅仅`f`个副本节点无法引发视图变更。换句话说，由于最多连续`f`个主节点可能出现故障，系统在经过最多`f
    + 1`次视图变更后最终会取得进展。


    副本节点会等待`2f + 1`条视图变更消息，并启动一个计时器来开始一个新视图，这避免了过早启动视图变更。类似地，如果一个副本节点收到了针对一个大于其当前视图编号的`f
    + 1`条视图变更消息，它就会广播一条视图变更消息。这可以防止过晚启动下一次视图变更。


    **安全性**要求每个诚实的副本节点以相同的全序执行收到的客户端请求，即在所有阶段中以相同的顺序执行相同的请求。


    假设节点总数为`3f + 1`，则 PBFT 被认为是安全的。在这种情况下，可以容忍`f`个拜占庭节点。


    让我们首先回顾一下什么是法定人数交集。如果有两个集合，例如`S1`和`S2`，每个集合都包含≥ `2f + 1`个节点，那么`S1 ∩ S2`中总存在一个正确的节点。这是正确的，因为如果存在两个各自至少包含`2f
    + 1`个节点的集合，并且总共有`3f + 1`个节点，那么根据鸽巢原理，`S1`和`S2`的交集将至少包含`f + 1`个节点。由于最多只有`f`个故障节点，因此交集`S1
    ∩ S2`中必定至少包含 1 个正确节点。


    PBFT 中的每个阶段都必须获得`2f + 1`个证书/投票才能被接受。事实证明，至少需要一个诚实的节点对同一个序号投两次票才会导致安全性被破坏，而这不可能发生，因为诚实的节点不能恶意投票。换句话说，如果恶意主节点为了破坏安全性而将同一个序号分配给两个不同的消息，那么由于法定人数交集的性质，至少会有一个诚实的副本节点拒绝它。这是因为一个`2f
    + 1`的法定人数意味着至少存在一个诚实的交集副本节点。


    提交阶段确保了即使在跨视图的情况下也能实现正确的排序。如果发生视图变更，新的主节点会从`2f + 1`个副本节点获取准备证书，这确保了新主节点能够获得由正确副本节点执行的每个客户端请求的至少一个准备证书。


    ### 视图内的排序


    如果一个副本节点在一个视图内为一个请求获取了一个具有唯一序号的准备证书，那么没有其他副本节点能够为同一视图和序号的不同请求获取准备证书。副本节点只能为同一视图和序号下的相同请求获取准备证书。


    想象一下，两个副本节点为同一视图和序号下的两个不同请求收集了准备证书。我们知道一个准备证书包含`2f+1`条消息，由于法定人数交集的存在，这意味着必须有一个正确的节点为同一序号和视图下的两个不同请求发送了`预准备`或`准备`消息。然而，一个正确的副本节点对于每个视图和序号只会发送一条`预准备`消息，也就是说，当主节点收到客户端请求并将其分配给该请求时，序号总是递增的。此外，一个正确的副本节点在每个视图中对于每个序号只会发送一条`准备`消息。只有当它之前没有接受过同一视图或序号的任何`预准备`消息时，它才会发送`准备`消息。这意味着准备消息必须针对的是同一个请求。这样就实现了视图内的排序。


    ### 跨视图的排序


    该协议保证，如果一个正确的副本节点在一个视图内以某个特定序号执行了一个客户端请求，那么在任何后续视图或当前视图中，没有其他正确的副本节点会以相同的序号执行任何其他客户端请求。换句话说，每个由诚实副本节点执行的请求，在进入下一个视图时都必须保持其先前分配的相同顺序。


    我们知道，一个请求只有在副本节点收到`2f + 1`条提交消息后才会被执行。假设一个诚实的副本节点已经获得了`2f + 1`条提交消息。这意味着该客户端请求必须至少在`f
    + 1`个诚实的副本节点上准备好了，并且这些副本节点中的每一个都拥有该请求以及所有先前客户端请求的准备证书。我们还知道，这`f + 1`个诚实的副本节点中至少有一个会参与视图变更协议，并报告这些请求及其证书。这意味着该请求在新视图中将始终携带相同的序号。


    至此，我们对 PBFT 的讨论就结束了。然而，这是一个庞大的课题，你可以进一步阅读原始论文和学位论文来了解更多。

    '
- fmt: '# Blockchain and Classical Consensus


    We can implement classical algorithms in the blockchain. However, the challenge
    is modifying these protocols to make them suitable for blockchain implementations.
    The core algorithm remains the same, but some aspects are changed to make the
    protocol suitable for the blockchain. One issue is that these traditional consensus
    algorithms are for permissioned environments where all participants are known
    and identifiable. But blockchain networks are public and anonymous, for example,
    Bitcoin and Ethereum. Therefore, classical algorithms are primarily suitable for
    permissioned blockchain networks for enterprise use cases where all participants
    are known. Also, blockchain network environments are Byzantine, where malicious
    actors may try to deviate from the protocol. And Paxos and RAFT are CFT protocols
    that are not suitable for Byzantine environments. As such, either these protocols
    need to be modified to BFT protocols to tolerate Byzantine faults, or different
    BFT protocols need to be used. These BFT protocols can be a modification of existing
    classical CFT or BFT protocols or can be developed specifically for blockchains
    from scratch. One attempt to modify an existing classical protocol to suit a permissioned
    blockchain environment is IBFT, which we will introduce in Chapter [8](#515270_1_En_8_Chapter.xhtml).
    We will discuss more about blockchain protocols in the next chapter.


    Dynamic membership (reconfiguration) and log compaction using snapshots are two
    very useful features which RAFT supports. These two features are particularly
    useful in consortium blockchains. Over time, the blockchain can grow significantly
    large, and snapshotting would be a useful way to handle that storage issue. Also,
    membership management can be a useful feature where a new consortium member can
    be onboarded in an automated fashion. RAFT, however, is CFT only, which is not
    quite suitable for consortium chains. Nevertheless, introducing Byzantine fault
    tolerance in RAFT is possible, as Tangaroa shows - a BFT extension to RAFT. Some
    issues however are reported in Tangaroa, but it is quite possible to build a BFT
    version of RAFT. Alternatively, these two features can be implemented in a PBFT
    variant for blockchain networks. Variants of PBFT include IBFT, HotStuff, LibraBFT,
    and many others.


    ## Summary


    In this chapter, we covered a number of topics including viewstamped replication,
    practical Byzantine fault tolerance, RAFT, and Paxos. Paxos and viewstamped replication
    are fundamentally important because they provide very fundamental ideas in the
    history of the distributed consensus problem. Paxos especially provided formal
    description and proofs of protocol correctness. VR bears resemblance with multi-Paxos.
    RAFT is a refinement of Paxos. PBFT is in fact seen as a Byzantine-tolerant version
    of Paxos, though PBFT was developed independently.


    This chapter serves as a foundation to understand classical protocols before blockchain
    age protocols in the next chapter. Many ideas originate from these classical protocols
    that lead to the development of newer protocols for the blockchain.


    # Blockchain Age Protocols


    This chapter covers blockchain age protocols. Some novel protocols and some variants
    of classical blockchain consensus protocols were discussed in Chapter [7](#515270_1_En_7_Chapter.xhtml).
    We start with Ethereum and finish this chapter with a discussion on Solana. Along
    the way, we will cover in detail the characteristics, strengths, weaknesses, properties,
    and inner workings of major consensus protocols used in platforms such as Cosmos,
    Ethereum 2.0, and Polkadot.


    We already covered proof of work in detail in Chapter [5](#515270_1_En_5_Chapter.xhtml).
    So, I will not repeat that here; however, Ethereum’s PoW will be discussed in
    this chapter.


    ## Introduction


    Consensus protocols are at the core of any blockchain. A new class of consensus
    protocols emerged with Bitcoin. Therefore, we can categorize all consensus protocols
    for a blockchain that emerged with and after Bitcoin as “blockchain age consensus
    protocols.”


    The primary aim of a consensus protocol in a blockchain is to achieve an agreement
    on the state of the blockchain while preserving the safety and liveness of the
    system. The state generally refers to the value, history, and rules of the blockchain.
    An agreement on the canonical history of the blockchain is vital, and so is the
    agreement on the governing rules of the chain. Additionally, consensus on values
    (data) added to the chain is fundamentally critical.


    Like traditional pre-blockchain protocols, safety and liveness are two key properties
    that should be fulfilled by a consensus protocol to ensure the consistency and
    progress of the blockchain.


    Blockchain consensus protocols can be divided into two main categories: the probabilistic
    finality protocols and absolute finality protocols – in other words, probabilistic
    termination protocols and deterministic termination protocols. Probabilistic protocols
    are abundantly used in cryptocurrency public blockchains like Ethereum and Bitcoin.
    Deterministic protocols, usually from the BFT class of protocols, are commonly
    used in enterprise blockchains; however, they are also used in some public blockchains.
    While PBFT variants are more commonly used in enterprise blockchains, their usage
    in public chains is somewhat limited only to some public blockchains. For example,
    TowerBFT used in Solana is a deterministic finality consensus protocol. BFT-DPOS
    used in EOSIO is another example. Deterministic finality is also known as *forward
    security* where a guarantee is provided that a transaction once finalized will
    not be rolled back.


    From the perspective of how the consensus algorithms work, blockchains or distributed
    ledgers are based on one or a combination of the following types of consensus
    algorithms:


    - **PoW based**: Such as Nakamoto consensus in Bitcoin, which relies on solving
    a math puzzle using brute force.


    - **Leader based**: Such as usual BFT protocols where a leader acts as a primary
    proposer of blocks/values.


    - **Voting based**: Usually applicable in BFT protocols where a leader gathers
    votes from followers to finalize a decision. Also called “quorum based.”


    - **Virtual voting**: Usually, voting in BFT protocols is complex from a communication
    point of view, where each voter has to send and receive several messages to the
    leader. Virtual voting is a technique in the Hashgraph algorithm used in Hedera
    where votes are evaluated by looking at the local copies of the Hashgraph instead
    of complex communication with other nodes. This process eventually leads to achieving
    a Byzantine agreement.


    - **Economy based**: Such as proof of stake mechanisms that rely on a stake bonded
    in the network.


    After Bitcoin’s inception, many blockchains emerged, and alternative PoW algorithms
    were introduced, for example, Litecoin. As PoW consumes excessive amounts of energy,
    the community felt very early that alternatives that are not excessively energy
    consuming need to be designed. In the wake of introducing less energy-consuming
    protocols, developers introduced proof of stake. With PoS, the sustainable public
    blockchain networks have become possible to build. There are, however, some challenges
    and caveats. After going through the mechanics of how PoS works, we will discuss
    these limitations.'
