- fmt: '# First Blockchain Consensus


    The proof of work consensus algorithm or Nakamoto consensus was first introduced
    with the Bitcoin blockchain in 2008. It is fundamentally a leader election algorithm
    where a mandatory and random waiting time is imposed between leader elections.
    This also serves as a Sybil attack mechanism. One of the weaknesses in traditional
    distributed consensus protocols is that they need each participant to be known
    and identifiable in the protocol. For example, in `PBFT` all participants must
    be known and identifiable. This limitation (albeit useful in consortium chains)
    makes BFT-style protocols somewhat unsuitable for public chains. This is so because
    an attacker can create multiple identities and can use those multiple nodes/identities
    to vote in their favor. This is the so-called Sybil attack. If somehow we can
    make creating and then using that identity on a blockchain an expensive operation,
    then such a setup can thwart any Sybil attack attempts and will prevent an attacker
    from taking over the network by creating multiple fake identities.


    The term Sybil attack is coined after a book named *Sybil* published in 1973,
    where the main character in the book named Sybil Dorsett has multiple personality
    disorder.


    The first proof of work was introduced by Dwork and Naor in 1992 [1]. This work
    was done to combat junk emails whereby associating a computational cost, that
    is, pricing functions, with sending emails results in creating a type of access
    control mechanism where access to resources can only be obtained by computing
    a moderately hard function which prevents excessive use. Proof of work has also
    been proposed in Adam Back’s Hashcash proposal [10].


    The key intuition behind proof of work in a blockchain is to universally slow
    down the proposals for all participants, which achieves two goals. First, it allows
    all participants to converge on a common consistent view, and, second, it makes
    Sybil attacks very expensive, which helps with the integrity of the blockchain.


    It has been observed that it is impossible (impossibility results) to achieve
    an agreement in a network where participants are anonymous even if there is only
    one Byzantine node [2]. This is due to the Sybil attack, which can create arbitrarily
    many identities to game the system in attackers’ favor by voting many times. If
    there is a way to prevent such attacks, only then there is some guarantee that
    the system will work as expected; otherwise, the attacker can create arbitrarily
    many identities to attack the system. This problem was solved practically by proof
    of work consensus or Nakamoto consensus [3]. Before Bitcoin, the use of moderately
    hard puzzles to assign identities in an anonymous network was first suggested
    by Aspnes [4]. However, the solution that Aspnes introduced requires authenticated
    channels, whereas in Bitcoin unauthenticated communication is used, and puzzles
    are noninteractive and publicly verifiable.


    So even in the presence of the abovementioned impossibility results in classical
    literature, Nakamoto consensus emerged, which for the first time showed that consensus
    can be achieved in a permissionless model.


    Remember we discussed random oracles in Chapter 3. In proof of work, hash functions
    are used to instantiate random oracles. Since the output of hash functions is
    sufficiently long and random, an adversary cannot predict future hashes or can
    cause hash collisions. These properties make `SHA-256` a good choice to use it
    as a hash function in the proof of work mechanism.


    The key requirement in a blockchain is to totally order the transactions. If all
    participants are known and the scale is limited to a few nodes, then we can use
    traditional consensus like BFT; however, with thousands of unknown nodes, traditional
    BFT cannot be used. The proof of work consensus mechanism addresses this issue.


    There is a scalability vs. performance trade-off [6] that comes up when comparing
    traditional BFT with PoW, as shown in Figure 5-1.


    ![](images/515270_1_En_5_Chapter/515270_1_En_5_Fig1_HTML.png)


    A graph plots performance versus node scalability. It has 3 horizontal parallel
    lines. The top line is A B F T at y equals 10000.


    **Figure 5-1** Performance vs. scalability


    The proof of work or Nakamoto consensus protocol is a Byzantine fault–tolerant
    protocol because it can tolerate arbitrary faults. It can be seen as an eventual
    Byzantine agreement mechanism.


    ## How PoW Works


    Let’s first define some of the requirements of PoW. Indeed, proof of work was
    originally introduced in Bitcoin without any rigorous documentation or proofs
    of correctness. Here, for clarity and easier understanding, we will list some
    of the requirements (almost retrospectively) and see if PoW fulfills those requirements
    and how:


    - **Consistency**: New blocks are replicated to all nodes.

    - **Linked with previous block**: A log is maintained in such a way that each
    new entry is linked with the previous entry forming a chain.

    - **Permissionless and open participation**: Nodes can join without any access
    control and can leave without notice.

    - Partition tolerance.

    - Geographically dispersed.

    - Thousands of nodes allowed where anyone anywhere in the world can download a
    client and become part of the network by running the client.

    - Highly adversarial environment, so Byzantine fault tolerance is of prime importance.

    - Heterogenous where a number of different types of computers and hardware devices
    can join.

    - Asynchronous in the sense that there is no bound on the CPU or communication
    delays, just an eventual guarantee that messages are expected to reach all nodes
    with high probability.


    The question is, how do you design a consensus protocol for such a difficult environment?
    Yet, Bitcoin PoW has stood the test of time, and apart from some limited and carefully
    orchestrated attacks and some inadvertent bugs, largely the Bitcoin network has
    been running without any issues for the last 13 years. How? I’ll explain now.'
