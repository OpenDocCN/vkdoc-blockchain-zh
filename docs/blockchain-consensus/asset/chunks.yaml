- fmt: "### Guarantees and Correctness\n\nGuarantees provided by RAFT are:\n\n- **Election\
    \ correctness**\n  - **Election safety**: At most, one leader can be elected in\
    \ each term.\n  - **Election liveness**: Some candidate must eventually become\
    \ a leader.\n- **Leader append-only**: A leader can only append to the log. No\
    \ overwrite or deletion of entries in the log is allowed.\n- **Log matching**:\
    \ If two logs on two different servers have an entry with the same index and term,\
    \ then these logs are identical in all previous entries, and they store the same\
    \ command.\n- **Leader completeness**: A log entry committed in a given term will\
    \ always be present in the logs of the future leaders, that is, leaders for higher-numbered\
    \ terms. Also, nodes with incomplete logs must never be elected.\n- **State machine\
    \ safety**: If a node has applied a log entry at a given index to its state machine,\
    \ no other node will ever apply a different log entry for the same index.\n\n\
    Election correctness requires safety and liveness. Safety means that at most one\
    \ leader is allowed per term. Liveness requires that some candidate must win and\
    \ become a leader eventually. To ensure safety, each node votes only once in a\
    \ term which it persists on storage. The majority is required to win the election;\
    \ no two different candidates will get a majority at the same time.\n\nSplit votes\
    \ can occur during leader election. If two nodes get elected simultaneously, then\
    \ the so-called “split vote” can occur. RAFT uses randomized election timeouts\
    \ to ensure that this problem resolves quickly. This helps because random timeouts\
    \ allow only one node to time out and win the election before other nodes time\
    \ out. In practice, this works well if the random time chosen is greater than\
    \ the network broadcast time.\n\nLog matching achieves a high level of consistency\
    \ between logs. We assume that the leader is not malicious. A leader will never\
    \ add more than one entry with the same index and same term. Log consistency checks\
    \ ensure that all previous entries are identical. The leader keeps track of the\
    \ latest index that it has committed in its log. The leader broadcasts this information\
    \ in every `AppendEntries` RPC. If a follower node doesn’t have an entry in its\
    \ log with the same index number, it will not accept the incoming entry. However,\
    \ if the follower accepts the `AppendEntries` RPC, the leader knows that the logs\
    \ are identical on both. Logs are generally consistent unless there are failures\
    \ on the network. In that case, the log consistency check ensures that nodes eventually\
    \ catch up and become consistent. If a log is inconsistent, the leader will retransmit\
    \ missing entries to followers that may not have received the message before or\
    \ crashed and now have recovered.\n\nReconfiguration and log compaction are two\
    \ useful features of RAFT. I have not discussed those here as they are not related\
    \ directly to the core consensus protocol. You can refer to the original RAFT\
    \ paper mentioned in the bibliography for more details.\n\n## PBFT\n\nRemember,\
    \ we discussed the oral message protocol and the Byzantine generals problem earlier\
    \ in the book. While it solved the Byzantine agreement, it was not a practical\
    \ solution. The oral message protocol only works in synchronous environments,\
    \ and computational complexity (runtime) is also high unless there is only one\
    \ faulty processor, which is not practical. However, systems show some level of\
    \ communication and processor asynchrony in practice. A very long algorithm runtime\
    \ is also unacceptable in real environments.\n\nA practical solution was developed\
    \ by Castro and Liskov in 1999 called practical Byzantine fault tolerance (PBFT).\
    \ As the name suggests, it is a protocol designed to provide consensus in the\
    \ presence of Byzantine faults. Before PBFT, Byzantine fault tolerance was considered\
    \ impractical. With PBFT, the duo demonstrated that practical Byzantine fault\
    \ tolerance is possible for the first time.\n\nPBFT constitutes three subprotocols\
    \ called normal operation, view change, and checkpointing. The normal operation\
    \ subprotocol refers to a mechanism executed when everything is running normally,\
    \ and the system is error-free. The view change is a subprotocol that runs when\
    \ a faulty leader node is detected in the system. Checkpointing is used to discard\
    \ the old data from the system.\n\nThe PBFT protocol consists of three phases.\
    \ These phases run one after another to complete a single protocol run. These\
    \ phases are pre-prepare, prepare, and commit, which we will cover in detail shortly.\
    \ In normal conditions, a single protocol run is enough to achieve consensus.\n\
    \nThe protocol runs in rounds where, in each round, a leader node, called the\
    \ primary node, handles the communication with the client. In each round, the\
    \ protocol progresses through the three previously mentioned phases. The participants\
    \ in the PBFT protocol are called replicas. One of the replicas becomes primary\
    \ as a leader in each round, and the rest of the nodes act as backups. PBFT enables\
    \ state machine replication, which we discussed earlier. Each node maintains a\
    \ local log, and the logs are kept in sync with each other via the consensus protocol,\
    \ PBFT.\n\nWe know by now that to tolerate Byzantine faults, the minimum number\
    \ of nodes required is `n = 3f + 1` in a partially synchronous environment, where\
    \ `n` is the number of nodes and `f` is the number of faulty nodes. PBFT ensures\
    \ Byzantine fault tolerance as long as the number of nodes in a system stays `n\
    \ >= 3f + 1`.\n\nWhen a client sends a request to the primary (leader), a sequence\
    \ of operations between replicas runs, leading to consensus and a reply to the\
    \ client.\n\nThis sequence of operations is composed of three phases:\n\n- Pre-prepare\n\
    - Prepare\n- Commit\n\nIn addition, each replica maintains a local state containing\
    \ three main elements:\n\n- A service state\n- A message log\n- A number representing\
    \ that replica’s current view\n\nLet’s look at each of the phases in detail.\n\
    \n### Pre-prepare phase – phase 1\n\nWhen the primary node receives a request\
    \ from the client, it assigns a sequence number to the request. It then sends\
    \ the pre-prepare message with the request to all backup replicas.\n\nWhen the\
    \ backup replicas receive the pre-prepare message, they check several things to\
    \ ensure the validity of the message:\n\n- Whether the digital signature is valid.\n\
    - Whether the current view number is valid, that is, the replica is in the same\
    \ view.\n- Whether the sequence number of the operation’s request message is valid,\
    \ for example, if the same sequence number is used again, the replica will reject\
    \ the subsequent request with the same sequence number.\n- If the hash of the\
    \ request message is valid.\n- No previous pre-prepare message received with the\
    \ same sequence number and view but a different hash.\n\nIf all these checks pass,\
    \ the backup replicas accept the message, update their local state, and move to\
    \ the prepare phase.\n\nIn summary, the pre-prepare phase:\n\n- Accepts a request\
    \ from the client."
