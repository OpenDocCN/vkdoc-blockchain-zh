    ∣0⟩ = [1 0 ] and ∣1⟩ = [0 1 ]


    A qubit can be visualized using a Bloch sphere, as shown in Figure [9-1](#515270_1_En_9_Chapter.xhtml#Fig1).


    ![](images/515270_1_En_9_Chapter/515270_1_En_9_Fig1_HTML.png)


    A Bloch sphere has a 3-D plane with origin at the center of the sphere. A line
    from the origin extends to psi. The marked angles are theta and phi.


    Figure 9-1


    The Bloch sphere – a convenient way to visualize qubits


    We can describe a single qubit as a point on the surface of the Bloch sphere.
    The North pole represents state ∣0⟩, and the South pole represents state ∣1⟩.
    Qubit angles are *θ* the latitude and *ϕ* the longitude. When a single gate operation
    is performed on the qubit, the state *ψ* (the qubit) rotates to another point
    on the Bloch sphere.


    ### Superposition


    Superposition is a fundamental principle of quantum mechanics. Superposition means
    that quantum states can be added together to get another valid quantum state.
    This is analogous to classical mechanics, where waves can be added together. Added
    quantum states are so-called “superposed.” Superposition is the key to extraordinary
    speedup as it allows many computation paths to be explored simultaneously.


    ### Entanglement


    Entanglement is an incredibly strong correlation that exists between particles,
    which allows two or more particles to inseparably link with each other. It allows
    any two quantum particles to exist in a shared state. Any action on one particle
    instantly affects the other particle even at massive distances. Entanglement is
    usually performed by bringing two qubits close together, performing an operation
    to entangle them, and, once entangled, moving them apart again. They will remain
    entangled even if one of them is on earth and the other is moved to outer space
    at a vast distance.


    There are two features of entanglement which makes it particularly suitable for
    a large range of applications: maximal coordination and monogamy.


    #### Maximal Coordination


    When two qubits at different nodes in a network entangle, that is, the quantum
    state of two particles become inseparably connected, they provide stronger correlation
    and coordination properties, which are nonexistent in classical networks. This
    property is called maximal coordination. For example, for any measurement on the
    first qubit, if the same measurement is made on the second qubit, instantaneously,
    the same answer is shown, even though that answer is random and was not predetermined.
    More precisely, they will always yield a zero or one at random, but both will
    produce the same output always. This feature makes entanglement suitable for tasks
    requiring coordination, for example, clock synchronization, leader election, and
    consensus. Imagine clock synchronization in a distributed network without physical
    transfer; it can make distributed networks extraordinarily fast. (Remember replacing
    communication with local computation from the last chapter.) Also, state transfer/awareness
    during consensus immediately makes consensus faster. The fundamental idea here
    is that when entangled, it is possible to change the state globally (full state)
    by only performing operations (changing parameters) in one qubit. This feature
    has far-reaching implications; imagine being able to do immediate state transfer
    to all nodes in the network. This can result in extraordinary speedup in consensus
    algorithms.


    #### Monogamy


    Quantum entanglement is not shareable. If two qubits are entangled, then a third
    qubit from anywhere in the universe can never entangle with either of them. This
    property is called monogamy of entanglement. This property can enable applications
    in privacy, cryptographic key generation, and identification.


    ## Quantum Gates


    Just like classical computing in the quantum world, we use gate operations for
    data processing. We are used to Boolean gates used in the classical world, such
    as NOT, AND, OR, XOR, NAND, and NOR. In the quantum world, we apply some operator
    to an input state which transforms into an output state. This operator is called
    a quantum gate. Quantum gates operate on a single qubit or multiple qubits. A
    rule here is that each gate must have the same number of inputs as outputs. This
    is what makes the gate reversible and consequently the quantum computers reversible.
    There are single qubit gates which make rotations on a Bloch sphere. Then there
    are two qubit gates which combine single gates to create more complex functions,
    which leads to building quantum computers.


    There are many quantum gates; some common ones are introduced as follows.


    ### Hadamard


    This gate transforms a basis state into an even superposition of the two basis
    states. Fundamentally, it allows us to create superpositions. It operates on one
    qubit and is denoted by the symbol shown in Figure [9-2](#515270_1_En_9_Chapter.xhtml#Fig2).


    ![](images/515270_1_En_9_Chapter/515270_1_En_9_Fig2_HTML.png)


    An illustration of the quantum gates includes the Hadamard gate, Z gate, C NOT
    gate, C C NOT gate, T gate, NOT gate, and swap gate.


    Figure 9-2


    Quantum gates


    ### T


    The T gate induces a pi/4 phase between contributing basis states. The symbol
    shown in Figure [9-2](#515270_1_En_9_Chapter.xhtml#Fig2) represents the T gate.
    Relative phase rotation is by 45 degrees in T gate.'
  trans: "\n### 量子比特\n\n经典计算机基于两种截然不同的状态工作，即`0`和`1`。经典计算机利用晶体管来产生或消除电信号，分别代表`0`或`1`。从根本上来说，即使是大多数现代超级计算机，其核心也都是晶体管。\n\
    \n量子计算机中的量子比特改变了这一基本范式，使得量子计算机能够以非凡的速度运行。一个`qubit`（量子比特）是物理原子粒子的状态，例如电子的自旋。一个`qubit`可以同时处于`0`和`1`两种状态的叠加态。随着量子比特数量的增加，计算速度呈指数级提升。经典计算机中的\
    \ 8 个比特合称为一个字节。在量子计算世界中，8 个量子比特合称为一个`qubyte`（量子字节）。\n\n想象一下经典计算机中的 4 个比特。这些比特有\
    \ 16 种可能的状态，并且只能顺序输入。然而，在量子计算机中，4 个量子比特可以处于全部 16 种可能状态的叠加态，因此可以同时输入。而在经典版本中，4\
    \ 个比特虽然有 16 种可能状态，但只能顺序输入。这种现象被称为量子并行性，是加速解决某些在经典计算机上难以处理的问题的关键。\n\n从物理上讲，构建量子比特有多种方法。这些技术包括离子阱、光子、中性原子、核磁共振（NMR）以及其他几种方法。\n\
    \n狄拉克符号用于表示量子比特。量子比特表示为∣`0`⟩和∣`1`⟩，与经典的`0`和`1`相对。区别在于，量子比特可以处于称为叠加态的线性组合状态。例如，一个量子比特可以是电子自旋向上或向下的叠加态，也可以是光子的+45\
    \ 度偏振或-45 度偏振的叠加态，以及其他多种方式。\n\n狄拉克符号用于表示量子态及其叠加态。狄拉克符号的形式为∣`0`⟩ + ∣`1`⟩，其中`0`和`1`是状态。\n\
    \n一个量子比特可以处于量子态∣*ψ*⟩ = *α* ∣`0`⟩ + *β* ∣`1`⟩，其中*α*、*β* ∈ *C*（复数概率幅），并且|*α*|² +\
    \ |*β*|² = 1。这意味着单个量子比特的状态由∣*ψ*⟩ = *α* ∣`0`⟩ + *β* ∣`1`⟩表示，概率条件是|*α*|² + |*β*|²\
    \ = 1。这个概率条件意味着*α*、*β*的取值范围是受限的，并且无论如何，两者之和必须为 1。*C*表示复数。\n\n除了狄拉克符号，我们还可以使用向量表示法。一个向量可以表示包含概率幅*α*和*β*的状态：\n\
    \n```\n| ψ ⟩ = [ α  β ]\n```\n\n并且\n\n∣`0`⟩ = [`1` `0` ] 且 ∣`1`⟩ = [`0` `1` ]\n\
    \n量子比特可以使用布洛赫球进行可视化，如图 9-1 所示。\n\n布洛赫球有一个三维平面，球心位于原点。一条从原点出发的线段延伸到 psi。标记的角度是\
    \ theta 和 phi。\n\n**图 9-1**  \n布洛赫球 – 可视化量子比特的便捷方式\n\n我们可以将单个量子比特描述为布洛赫球表面上的一个点。北极代表状态∣`0`⟩，南极代表状态∣`1`⟩。量子比特的角度是，*θ*\
    \ 为纬度，*ϕ* 为经度。当对量子比特执行单门操作时，状态 *ψ*（量子比特）会旋转到布洛赫球上的另一个点。\n\n### 叠加态\n\n叠加态是量子力学的一个基本原理。叠加态意味着量子态可以相加，得到另一个有效的量子态。这类似于经典力学中的波可以叠加。相加后的量子态被称为“叠加态”。叠加态是实现非凡加速的关键，因为它允许同时探索许多计算路径。\n\
    \n### 纠缠态\n\n纠缠态是粒子之间存在的极强相关性，它允许两个或更多粒子彼此不可分割地联系在一起。它允许任意两个量子粒子存在于一个共享状态中。对其中一个粒子的任何操作都会瞬间影响另一个粒子，即使它们相隔极其遥远的距离。纠缠通常通过将两个量子比特靠近在一起，执行一项操作使其纠缠，然后纠缠后，再将它们分开来实现。即使其中一个量子比特在地球上，另一个被移动到遥远的太空，它们仍将保持纠缠。\n\
    \n纠缠态有两个特性使其特别适用于广泛的应用：最大协调性和单一配分性。\n\n#### 最大协调性\n\n当网络中不同节点的两个量子比特发生纠缠时，即两个粒子的量子态变得密不可分，它们会提供经典网络中不存在的更强的相关性和协调特性。这种性质称为最大协调性。例如，对第一个量子比特进行任何测量，如果对第二个量子比特进行相同的测量，则会瞬间显示出相同的结果，即使该结果是随机产生的且非预先确定的。更准确地说，它们总会随机产生\
    \ 0 或 1，但两者总会产生相同的结果。这一特性使得纠缠态适用于需要协调的任务，例如时钟同步、领导者选举和共识。想象一下在没有物理传输的情况下实现分布式网络的时钟同步；这可以使分布式网络变得异常快速。（回忆一下上一章中用本地计算取代通信的思想。）此外，共识过程中的状态传输/感知能立即加快共识速度。这里的基本思想是，当处于纠缠态时，只需对一个量子比特执行操作（改变参数），就有可能全局地（完全地）改变整个状态。这一特性具有深远的意义；想象一下能够立即将状态传输到网络中的所有节点。这可以在共识算法中实现非凡的加速。\n\
    \n#### 单一配分性\n\n量子纠缠是不可共享的。如果两个量子比特纠缠在一起，那么宇宙中任何地方的第三个量子比特都永远无法与其中任何一个发生纠缠。这种性质称为纠缠的单一配分性。这种性质可以实现隐私保护、加密密钥生成和身份识别等应用。\n\
    \n## 量子门\n\n就像经典计算一样，在量子世界中，我们也使用门操作来处理数据。我们熟悉经典世界中使用的布尔门，例如`NOT`、`AND`、`OR`、`XOR`、`NAND`和`NOR`。在量子世界中，我们对输入状态应用某个算子，该算子将其转换为输出状态。这个算子被称为量子门。量子门作用于单个量子比特或多个量子比特。这里的一个规则是，每个门的输入数量和输出数量必须相同。这就是使门可逆，进而使量子计算机可逆的原因。有在布洛赫球上执行旋转的单量子比特门。还有将单门组合以创建更复杂功能的双量子比特门，这最终构建出量子计算机。\n\
    \n量子门有很多种；下面介绍一些常见的类型。\n\n### 阿达玛门\n\n该门将一个基态转换为两个基态的均匀叠加态。从根本上说，它允许我们创建叠加态。它作用于一个量子比特，其符号如图\
    \ 9-2 所示。\n\n量子门的图示包括 `Hadamard` 门、`Z` 门、`C NOT` 门、`C C NOT` 门、`T` 门、`NOT` 门和交换门。\n\
    \n**图 9-2**  \n量子门\n\n### T 门\n\n`T` 门在相互贡献的基态之间引入π/4 相位差。图 9-2 所示的符号代表`T`门。在`T`门中，相对相位旋转为\
    \ 45 度。\n"
- fmt: '### CNOT


    This gate is called the controlled NOT. It is the same as the classical XOR gate,
    but with the property of reversibility. It works with two qubits. The first qubit
    serves as the control qubit, and the second qubit acts as the target qubit. It
    changes the state of the target qubit only if the first qubit is in a specific
    state. This gate can be used to create an entangled state in a two or more qubit
    system.


    ### Toffoli (CCNOT)


    This is the controlled-controlled NOT gate. It operates on three qubits. It switches
    the third bit of a three-bit state where the first two bits are 1, that is, it
    switches ∣110⟩ to ∣111⟩ and vice versa. It is represented by the symbol shown
    in Figure [9-2](#515270_1_En_9_Chapter.xhtml#Fig2). In other words, if the first
    two bits are 1, the third bit inverts.


    ### Z


    It is a phase shift gate. It maps 1 to –1 and keeps 0 as 0. In other words, the
    amplitude of ∣1⟩ is negated. Fundamentally, it rotates the phase by 180 degrees.
    It is represented in the circuit with the symbol Z in a box, as shown in Figure
    [9-2](#515270_1_En_9_Chapter.xhtml#Fig2).


    ### NOT


    This gate switches ∣1⟩ to ∣1⟩ and vice versa. It is an analogue of the classical
    NOT gate.


    ### Swap Gate


    The swap gate swaps two qubits. It can be visualized in Figure [9-2](#515270_1_En_9_Chapter.xhtml#Fig2).
    Of course, there are many quantum gates, but we have introduced those which are
    commonly used and will help us to understand the algorithms later in this chapter.


    All these gates can be visualized in Figure [9-2](#515270_1_En_9_Chapter.xhtml#Fig2).


    ### Measurement


    In addition to gates, another important element is measurements. A measurement
    takes a quantum state and collapses it into one of the basis states. We can visualize
    this in Figure [9-3](#515270_1_En_9_Chapter.xhtml#Fig3).


    ![](images/515270_1_En_9_Chapter/515270_1_En_9_Fig3_HTML.jpg)


    An illustration of the measurement. A quantum state enters measurement and a classical
    state is produced.


    Figure 9-3


    Measurement


    ## Quantum Circuits


    Using quantum gates, we build quantum circuits. A quantum circuit is basically
    a sequence of quantum operations applied to qubits. It is composed of quantum
    gates (operators), quantum registers containing qubits providing input, quantum
    wires representing a sequence of operations over time, and measurements. Time
    runs from left to right in quantum circuits. Figure [9-4](#515270_1_En_9_Chapter.xhtml#Fig4)
    shows how a quantum circuit looks like.


    ![](images/515270_1_En_9_Chapter/515270_1_En_9_Fig4_HTML.png)


    A quantum circuit diagram includes 3 qubits q 0, q 1, and q 2, operations U 1
    to U 3, 2 qubits operation U 4, U s, and a measurement.


    Figure 9-4


    A quantum circuit


    Quantum gates are represented as boxes. On the left side, we have quantum registers.
    Quantum wires represent a qubit, that is, a photon or an electron. Each gate introduces
    a change in the qubit, for example, a change in the spin of an electron.


    Quantum circuits implement quantum algorithms. In other words, quantum algorithms
    are described by quantum circuits. There are many standard quantum circuits. We
    describe some commonly used as follows.


    ### Teleportation Circuit


    Can we transfer a quantum state from one quantum device to another? Yes, we can;
    for this purpose, teleportation is used, which uses entanglement to move a quantum
    state from one quantum device to another.


    In Figure [9-5](#515270_1_En_9_Chapter.xhtml#Fig5), a teleportation circuit is
    shown, which can transport a quantum state from one party to another.


    ![](images/515270_1_En_9_Chapter/515270_1_En_9_Fig5_HTML.png)


    A teleportation circuit includes 3 qubits, 2 Hadamard gates, 3 C NOT gates, two
    measurements, and a controlled Z gate.


    Figure 9-5


    Teleportation circuit


    Some applications of teleportation are state transportation between quantum systems.
    This can be valuable in quantum distributed systems where state transfer between
    nodes can enable applications like quantum state machine replication.


    ### GHZ Circuit


    The Greenberger-Horne-Zeilinger (GHZ) state is an entangled state of three or
    more qubits. If three or more particles get into an entangled state, it’s called
    a multipartite entanglement.


    Figure [9-6](#515270_1_En_9_Chapter.xhtml#Fig6) visualizes this circuit.


    ![](images/515270_1_En_9_Chapter/515270_1_En_9_Fig6_HTML.png)


    A G H Z circuit includes 3 qubits, a Hadamard gate, and 2 C NOT gates.


    Figure 9-6


    GHZ circuit


    GHZ states have been shown to be useful in quantum cryptography and quantum Byzantine
    agreement (consensus) algorithms, as we’ll explore later in this chapter.


    ### W State Circuit


    The W state circuit is another way to achieve entanglement of three particles.
    The difference with GHZ is that in the W state if one qubit is lost out of three,
    then the remaining two will remain entangled. GHZ however does not have this property.
    The circuit is shown in Figure [9-7](#515270_1_En_9_Chapter.xhtml#Fig7).


    ![](images/515270_1_En_9_Chapter/515270_1_En_9_Fig7_HTML.png)


    A W state circuit includes 3 qubits, an R y gate, a controlled Hadamard gate,
    two C NOT gates, and an x gate.


    Figure 9-7


    W state circuit


    The W state circuit has application in leader election algorithms, as we’ll see
    later in this chapter.


    ## Quantum Algorithms


    As we know, algorithms are set of instructions to solve a problem. Quantum algorithms
    are the same in this regard; however, they run on quantum devices and contain
    at least one quantum operation, for example, superpositions or entanglement operations.
    In other words, a quantum algorithm is the same as the classical algorithm in
    the sense that it is a set of instructions to solve a problem, but it has instructions
    for creating superpositions and entanglements.


    Famous quantum algorithms include the Deutsch-Jozsa blackbox solution algorithm,
    Shor’s discrete log problem and factorization algorithm, and Grover’s search algorithm.
    There is a catalogue maintained at the quantum algorithm zoo – [`https://quantumalgorithmzoo.org`](https://quantumalgorithmzoo.org).


    There are primarily three classes of quantum algorithms: quantum search algorithms,
    quantum Fourier transform–based algorithms, and quantum simulation algorithms.'
