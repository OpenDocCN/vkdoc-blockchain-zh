- fmt: "# GPS As a Time Source\n\nA GPS receiver can be used as an accurate source\
    \ of time. All 31 GPS satellites have atomic clocks on board, which produce precise\
    \ time. These satellites broadcast their location and time, where GPS receivers\
    \ receive and calculate time and position on earth after applying some corrections\
    \ for environmental factors and time dilation. Remember, time runs slightly faster\
    \ on GPS satellites than objects on the earth’s surface due to relativity. Other\
    \ relativity-related effects include time dilation, gravitational frequency shift,\
    \ and eccentricity effects. All these errors are handled, and many other corrections\
    \ are made before an accurate time is displayed on the GPS receiver. While the\
    \ GPS as a source of precise time is highly accurate, the inherent latency introduced\
    \ even after the existence of correct and accurate time at the GPS receiver in\
    \ the network can lead to drift and skew of clocks over time. There is a need\
    \ to introduce some clock synchronization algorithms to address this limitation.\n\
    \nA combination of atomic clocks and GPS is used in Google’s Spanner (Google’s\
    \ globally distributed database) for handling timing uncertainties.\n\nHowever,\
    \ note that even with all the efforts, the clocks cannot be perfectly synchronized,\
    \ which is good enough for most applications. However, these very accurate clocks\
    \ are still not enough to capture the causality relationship between events in\
    \ a distributed system. The causality relationship between events and the fundamental\
    \ monotonicity property can be accurately captured by logical clocks.\n\nIn distributed\
    \ systems, even if each process has a local clock and is synchronized with some\
    \ global clock source, there is still a chance that each local processor would\
    \ see the time differently. The clocks can drift over time, the processors can\
    \ experience bugs, or there can be an inherent drift, for example, quartz clocks\
    \ or GPS systems, making it challenging to handle time in a distributed system.\n\
    \nImagine a distributed system with some nodes in the orbit and some in other\
    \ geographical locations on earth, and they all agree to use UTC. The physical\
    \ clocks in satellites or ISS will run at a different rate, and skew is inevitable.\
    \ The core limitation in depending on physical clocks is that even if trying to\
    \ synchronize them perfectly, timestamps will be slightly apart. However, these\
    \ physical clocks cannot (should not) be used to establish the order of events\
    \ in a distributed system because it is difficult to accurately find out the global\
    \ order of events based on timestamps in different nodes.\n\nPhysical clocks are\
    \ not very suitable for distributed systems because they can drift apart. Even\
    \ with one universal source, such as the atomic clock through NTP, they can still\
    \ drift and desynchronize over time with the source. Even a difference of a second\
    \ can sometimes cause a big issue. In addition, there can be software bugs in\
    \ the implementation that can cause unintentional consequences. For example, let’s\
    \ look at a famous bug, the leap second bug that is a cause of significant disruption\
    \ of Internet services.\n\n# UTC Time\n\nUTC time is a time standard used around\
    \ the world. There are two sources of time that are used to make up coordinated\
    \ universal time (UTC):\n\n- **International atomic time (TAI)**\n  - TAI is based\
    \ on around 400 atomic clocks around the world. A combined and weighted output\
    \ from all these atomic clocks is produced. This is extremely accurate where they\
    \ only deviate one second in around 100 million years!\n- **Astronomical time**\n\
    \  - This time is based on astronomical observations, that is, the rotation of\
    \ the Earth.\n\nWhile TAI is highly accurate, it doesn’t consider the Earth’s\
    \ rotation, that is, the astronomically observed time that determines the true\
    \ length of the day. Earth’s rotation is not constant. It is occasionally faster\
    \ and is slowing down overall. Therefore, days are not exactly 24 hours. The impact\
    \ on Earth’s rotation is due to celestial bodies such as the moon, tides, and\
    \ other environmental factors. Therefore, UTC is kept in constant comparison with\
    \ the astronomical time, and any difference is added to UTC. This difference is\
    \ added in the form of leap second; before the difference between TAI and astronomical\
    \ time reaches 0.9, a leap second is added to the UTC. This is the practice since\
    \ 1972.\n\nOK, this seems like a reasonable solution to keep both times synced;\
    \ however, computers don’t seem to handle this situation well. Unix systems use\
    \ Unix time (epoch), simply the number of seconds elapsed since January 1, 1970.\
    \ When a leap second is added, this is how the clock looks: in a normal case,\
    \ it is observed that after `23:59:59`, there is `00:00:00`. However, adding a\
    \ leap second seems as if after `23:59:59`, there is `23:59:60` and then `00:00:00`.\
    \ In other words, `23:59:59` happens twice. When Unix time deals with this addition\
    \ of an extra second, it can produce arbitrary behavior. In the past, when a leap\
    \ second is added, servers across the Internet experienced issues and services\
    \ as critical as airline booking systems were disrupted.\n\nA technique called\
    \ \"leap smear\" has been developed, which allows for the gradual addition of\
    \ a few milliseconds over a day to address this issue of sudden addition and problem\
    \ associated with this sudden one-second additional.\n\nOK, so far, we have seen\
    \ that UTC and astronomical time are synced by adding a leap second. With the\
    \ \"leap second smear\" technique, we can gradually add a leap second over time,\
    \ which alleviates some of the issues associated with sudden additional leap second.\
    \ There are also calls to abolish this ritual altogether. However, so far, we\
    \ see adding a leap second as a reasonable solution, and it seems to work somewhat\
    \ OK. We just add a leap second when the Earth’s rotation slows down, but what\
    \ if the Earth is spinning faster? In 2020, the Earth indeed spun faster, during\
    \ the pandemic, for whatever reason. Now the question is, do we remove one second\
    \ from UTC? In other words, introduce the negative leap second! This situation\
    \ can pose some more challenges – perhaps even more demanding to address as compared\
    \ to adding a leap second.\n\nThe question is, what to do about this, ignore this?\
    \ What algorithm can help to remove one second and introduce a negative leap second?\n\
    \nSo far, it is suggested that simply skip `23:59:59`, that is, go from `23:59:58`\
    \ to `00:00:00` directly. It is expected that this is easier to deal with as compared\
    \ to adding a leap second. Perhaps, a solution is unnecessary because we may ignore\
    \ the Earth spinning faster or slower altogether and abolish the leap second adjustment\
    \ practice, either negative or positive. It is not ideal, but we might do that\
    \ to avoid issues and ambiguity associated with handling leap seconds, especially\
    \ adding leap seconds! At the time of writing, this is an open question.\n\nSome\
    \ more info are found here: [`https://fanf.dreamwidth.org/133823.html`](https://fanf.dreamwidth.org/133823.html)\
    \ (negative leap second) and [`www.eecis.udel.edu/~mills/leap.html`](https://www.eecis.udel.edu/%257Emills/leap.html)."
