- fmt: '### Significance of Block Timestamp


    The Bitcoin network with its heterogenous geographically dispersed nodes running
    on the Internet appears to be an asynchronous network. This appears to be the
    case because there is no upper bound on the processor speeds and no upper bound
    on the message delay. Usually, in traditional BFT consensus protocols, there is
    no reliance on a global physical clock, and network assumptions are usually partially
    synchronous networks. However, in Bitcoin all blocks have a timestamp field, which
    is populated by the local node which mined the block. This is part of the block
    validation process where a block is accepted only if its timestamp is less than
    or equal to the median of the last 11 blocks. Also, timestamps are vital for maintaining
    block frequency, difficulty retargeting, and network difficulty calculations.
    From this point of view, we can think of the Bitcoin network as loosely synchronous,
    where loose clock synchrony is required for the network to make progress and ensure
    liveness.


    Note that the Bitcoin network is not partially synchronous because we defined
    partially synchronous and its variations earlier, and the Bitcoin network doesn’t
    seem to fit in any of those definitions. It is synchronous in the sense that blocks
    have a timestamp generated from the local node on which the block was produced;
    however, from a processor delay perspective, it is almost asynchronous. Also,
    in the block validation mechanism, one of the rules requires that a block is produced
    within roughly the last two hours (median of the previous 11 blocks), making Bitcoin
    an “almost synchronous” system. This is so because timestamps are essential for
    the proper functioning of the Bitcoin system; however, due to large communication
    and processor delay tolerance, it can be thought of as a loosely synchronous system.


    On the other hand, as timestamps are required only for proper functioning of the
    limited part of the system, that is, the difficulty calculations, and block validation
    and are not a requirement for achieving consensus (i.e., by choosing a leader
    by solving proof of work – mining), then from that point of view it is an asynchronous
    system, given that processor and communication delays have no defined upper bounds,
    except that messages will reach nodes eventually with a probabilistic guarantee
    of a gossip protocol.


    In Bitcoin blocks, timestamps are not 100% accurate but enough to secure the proof
    of work mechanism. Originally, Satoshi envisioned a combination of a system clock,
    a median of other servers’ clocks, and NTP servers for clock adjustment. However,
    NTP was never implemented, and the median of other nodes’ clock remained as the
    primary source for clock adjustment in the network.


    Block timestamps not only serve to provide some variation for the block hash,
    which is useful in proof of work, but also helps to protect against blockchain
    manipulation where an adversary could try to inject an invalid block in the chain.
    When a Bitcoin node connects to another node, it receives the timestamp in UTC
    format from it. The receiving node then calculates the offset of the received
    time from the local system clock and stores it. The network adjusted time is then
    calculated as the local UTC system clock plus the median offset from all connected
    nodes.


    There are two rules regarding timestamps in Bitcoin blocks. A valid timestamp
    must be greater than the median timestamp of the previous 11 blocks. It should
    also be less than the median timestamp calculated based on the time received from
    other connected nodes (i.e., network adjusted time) plus two hours. However, this
    network time adjustment must never be more than 70 minutes from the local system
    clock.


    The conclusion is that Bitcoin is in fact secure only under a synchronous network
    model. More precisely, it is a lockstep-free synchrony where there exists some
    known finite time bound, but execution is not in lockstep.


    ### A Caveat


    The order of transaction is not consensus driven. Each miner picks up a transaction
    in a hardcoded order within the client, and indeed there have been some attacks
    that can result in transaction censorship or ignoring or reordering. Consensus
    is achieved in fact on the block, and that is also not through voting; once a
    miner has solved PoW, it just simply wins the right to append a new block to the
    chain. Of course, it will be validated by other nodes when they receive it, but
    there is no real agreement or voting mechanism after the mined block has been
    broadcast by the successful miner. There is no voting or consensus which agrees
    on this new block; the miner who is the elected leader and because they solved
    PoW has won the right to add a new block. Other nodes just accept it if it passes
    the `valid()` predicate.


    So, the caveat here is that when a candidate block is created by picking up transactions
    from the transaction pool, they are picked up in a certain order which a miner
    can influence. For example, some miners may choose not to include transactions
    without any fee and only include those which are paying fee. Fair for the miner
    perhaps, but unfair for the user and the overall Bitcoin system! However, eventually
    all transactions will be added, even those without a fee, but they might be considered
    only after some considerable time has elapsed since their inclusion in the transaction
    pool. If they’ve aged, then they’ll be eventually included. Moreover, under the
    assumption that usually there is a majority of honest miners always in the network,
    the transactions are expected to be picked up in a reasonable amount of time in
    line with the protocol specification.


    Let us now see what is that order.


    The transactions are picked up from the transaction pool based on its priority,
    which is calculated using the following formula [8]:


    ```

    priority = sum( input value in base units × input age ) / size in bytes

    ```


    ```

    p = Σ( v_i × a_i ) / s

    ```


    It is of concern that the ordering of transactions is not fair and leads to front
    running and other relevant attacks. We will discuss fair ordering in Chapter [10](#515270_1_En_10_Chapter.xhtml).'
  raw: '##### Significance of Block Timestamp


    The Bitcoin network with its heterogenous geographically dispersed nodes running
    on the Internet appears to be an asynchronous network. This appears to be the
    case because there is no upper bound on the processor speeds and no upper bound
    on the message delay. Usually, in traditional BFT consensus protocols, there is
    no reliance on a global physical clock, and network assumptions are usually partially
    synchronous networks. However, in Bitcoin all blocks have a timestamp field, which
    is populated by the local node which mined the block. This is part of the block
    validation process where a block is accepted only if its timestamp is less than
    or equal to the median of the last 11 blocks. Also, timestamps are vital for maintaining
    block frequency, difficulty retargeting, and network difficulty calculations.
    From this point of view, we can think of the Bitcoin network as loosely synchronous,
    where loose clock synchrony is required for the network to make progress and ensure
    liveness.


    Note that the Bitcoin network is not partially synchronous because we defined
    partially synchronous and its variations earlier, and the Bitcoin network doesn’t
    seem to fit in any of those definitions. It is synchronous in the sense that blocks
    have a timestamp generated from the local node on which the block was produced;
    however, from a processor delay perspective, it is almost asynchronous. Also,
    in the block validation mechanism, one of the rules requires that a block is produced
    within roughly the last two hours (median of the previous 11 blocks), making Bitcoin
    an “almost synchronous” system. This is so because timestamps are essential for
    the proper functioning of the Bitcoin system; however, due to large communication
    and processor delay tolerance, it can be thought of as a loosely synchronous system.


    On the other hand, as timestamps are required only for proper functioning of the
    limited part of the system, that is, the difficulty calculations, and block validation
    and are not a requirement for achieving consensus (i.e., by choosing a leader
    by solving proof of work – mining), then from that point of view it is an asynchronous
    system, given that processor and communication delays have no defined upper bounds,
    except that messages will reach nodes eventually with a probabilistic guarantee
    of a gossip protocol.


    In Bitcoin blocks, timestamps are not 100% accurate but enough to secure the proof
    of work mechanism. Originally, Satoshi envisioned a combination of a system clock,
    a median of other servers’ clocks, and NTP servers for clock adjustment. However,
    NTP was never implemented, and the median of other nodes’ clock remained as the
    primary source for clock adjustment in the network.


    Block timestamps not only serve to provide some variation for the block hash,
    which is useful in proof of work, but also helps to protect against blockchain
    manipulation where an adversary could try to inject an invalid block in the chain.
    When a Bitcoin node connects to another node, it receives the timestamp in UTC
    format from it. The receiving node then calculates the offset of the received
    time from the local system clock and stores it. The network adjusted time is then
    calculated as the local UTC system clock plus the median offset from all connected
    nodes.


    There are two rules regarding timestamps in Bitcoin blocks. A valid timestamp
    must be greater than the median timestamp of the previous 11 blocks. It should
    also be less than the median timestamp calculated based on the time received from
    other connected nodes (i.e., network adjusted time) plus two hours. However, this
    network time adjustment must never be more than 70 minutes from the local system
    clock.


    The conclusion is that Bitcoin is in fact secure only under a synchronous network
    model. More precisely, it is a lockstep-free synchrony where there exists some
    known finite time bound, but execution is not in lockstep.


    ##### A Caveat


    The order of transaction is not consensus driven. Each miner picks up a transaction
    in a hardcoded order within the client, and indeed there have been some attacks
    that can result in transaction censorship or ignoring or reordering. Consensus
    is achieved in fact on the block, and that is also not through voting; once a
    miner has solved PoW, it just simply wins the right to append a new block to the
    chain. Of course, it will be validated by other nodes when they receive it, but
    there is no real agreement or voting mechanism after the mined block has been
    broadcast by the successful miner. There is no voting or consensus which agrees
    on this new block; the miner who is the elected leader and because they solved
    PoW has won the right to add a new block. Other nodes just accept it if it passes
    the *valid()* predicate.


    So, the caveat here is that when a candidate block is created by picking up transactions
    from the transaction pool, they are picked up in a certain order which a miner
    can influence. For example, some miners may choose not to include transactions
    without any fee and only include those which are paying fee. Fair for the miner
    perhaps, but unfair for the user and the overall Bitcoin system! However, eventually
    all transactions will be added, even those without a fee, but they might be considered
    only after some considerable time has elapsed since their inclusion in the transaction
    pool. If they’ve aged, then they’ll be eventually included. Moreover, under the
    assumption that usually there is a majority of honest miners always in the network,
    the transactions are expected to be picked up in a reasonable amount of time in
    line with the protocol specification.


    Let us now see what is that order.


    The transactions are picked up from the transaction pool based on its priority,
    which is calculated using the following formula [8]:


    ![$$ priority=\frac{sum\left( input\ value\ in\ base\ units\times input\ age\right)}{size\
    in\ bytes} $$](images/515270_1_En_5_Chapter/515270_1_En_5_Chapter_TeX_Equm.png)


    ![$$ p=\frac{\varSigma \left({v}_i\times {a}_i\ \right)}{s} $$](images/515270_1_En_5_Chapter/515270_1_En_5_Chapter_TeX_Equn.png)


    It is of concern that the ordering of transactions is not fair and leads to front
    running and other relevant attacks. We will discuss fair ordering in Chapter [10](#515270_1_En_10_Chapter.xhtml).'
