  trans: '

    # 典型密码系统


    典型的密码系统模型如图 2-1 所示。我们将密码系统定义为密码原语、协议及算法的组合体现，用于实现特定安全目标。因此，密码系统由多个组件构成。


    ![](img/515270_1_En_2_Fig1_HTML.png)


    密码系统模型描述了发送方与接收方之间通过密钥、明文和密文进行加密解密的关联关系。


    **图 2-1** 密码系统或密码方案的模型


    该系统包含三个关键角色：发送方、接收方和 adversary（攻击者）。发送方希望通过不安全的信道向接收方发送秘密消息，而攻击者作为恶意入侵者意图获取消息内容。其他要素包括明文、密文、密钥、安全信道、加密函数、解密函数及密钥源：


    - **发送方**：消息的发送主体。

    - **接收方**：消息的预期接收者。

    - **加密函数**：以加密密钥和明文为输入，将明文转换为密文的加密算法。

    - **解密函数**：以解密密钥和密文为输入，将密文转换为明文的解密算法。

    - **明文**：发送方希望以除预期接收者外无人能知的方式发送给接收方的原始消息。仅发送方及授权实体可读取和访问。

    - **密文**：明文的乱码形式，未经解密时对任何阅读者而言均无意义。

    - **密钥源**：密钥管理系统或某些密码密钥来源，用于获取或生成密钥。

    - **密钥**：用于加密和/或解密数据的特定数值。

    - **安全信道**：消息可未经加密传递且无窃听风险的通信渠道。

    - **攻击者**：能够读取加密数据，并试图通过密码分析或其他手段获取信息的恶意黑客（或窃听者、观察者）。


    ## 密码原语


    密码原语是实现特定安全服务（如机密性或完整性）的基础方法。这些密码原语用于构建安全协议，例如认证协议。密码原语包括对称原语、非对称原语和无密钥原语。密码原语的高级分类如图
    2-2 所示。


    ![](img/515270_1_En_2_Fig2_HTML.jpg)


    密码原语组织结构图分为无密钥原语、对称密钥原语和非对称原语，并各有细分。


    **图 2-2** 密码原语


    现在让我们了解对称原语。


    ## 对称密码学


    对称密码系统使用相同密钥进行加密和解密。在发送方与接收方数据传输前，该密钥必须在安全信道中保密传输。为安全传输密钥，需使用密钥建立协议。通常采用公钥密码学来交换密钥，这比对称密钥管理更易于管理——后者在用户数量增长时可能变得具有挑战性。


    设计对称密码算法的主要目的是提供机密性，但我们也可将其用于提供其他安全服务，如数据起源认证。


    对称密码系统分为两类：流密码和分组密码。图 2-3 展示了流密码和分组密码的高级运作方式。


    ![](img/515270_1_En_2_Fig3_HTML.png)


    流密码与分组密码运作示意图显示：分别对 2 位和 8 位明文进行处理，并转换为密文。


    **图 2-3** 流密码（左）与分组密码（右）对比


    ### 流密码


    这类密码系统逐位加密明文。算法以单比特明文为输入进行处理，并产生单比特密文。处理过程涉及使用异或（XOR）运算进行加密和解密。流密码模型如图 2-4 所示。


    ![](img/515270_1_En_2_Fig4_HTML.png)


    流密码模型流程如下：明文、加密、加密数据、解密、明文。密钥生成器指向各函数。


    **图 2-4** 流密码模型


    在此模型中，明文与密钥生成器生成的密钥流逐位输入加密函数。密钥生成器生成伪随机密钥流，其长度通常远小于明文（通常密钥长度为 128 位）。密钥流与明文通过
    XOR 运算生成密文。解密时应用相同过程，恢复出明文。伪随机生成意味着生成的比特并非真正随机，而是看似随机，故称“伪随机”。密钥流通常使用线性反馈移位寄存器（`LFSR`）生成。`LFSR`的输入位是其先前状态的线性函数，该线性函数通常为
    XOR 运算。


    密钥生成器是一种密码学安全的伪随机数生成器（`CSPRNG`或`CPRNG`）。由于具有“伪”特性，其数值可被计算，且任何计算者都会得到相同结果，这意味着这些
    PRNG 也是确定性的。若真正随机且非确定性，则一旦生成，他人无法重新生成该随机数，导致无法解密。因此它们看似随机，实则非随机且可计算。`CPRNG`具有特殊属性：其生成的数值不可预测。


    流密码分为两类：同步流密码和异步流密码。同步流密码中，密钥流仅依赖于密钥；而异步流密码中，密钥流依赖于固定数量的先前传输加密位及密钥。


    流密码通常更适用于硬件设备，但也可用于软件环境。存在众多流密码实例，例如用于 GSM 通信提供机密性的`A5/1`。然而，`Salsa20`和`ChaCha`在软件环境中使用最广泛。其他流密码包括`Trivium`、`Rabbit`、`RC4`和`SEAL`。

    '
- fmt: '### Block Ciphers


    Block ciphers encrypt the plaintext by dividing it into blocks of fixed length.
    Historically, block ciphers, such as `DES`, were built using Feistel mechanisms.
    Modern ciphers, such as `AES`, use a substitution-permutation network (`SPN`).


    A simple model of a block cipher is shown in Figure [2-5](#515270_1_En_2_Chapter.xhtml#Fig5).


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig5_HTML.png)


    A block cipher model. Plain text `P` and key `K` are passed through the block
    cipher encryption function which combines them to obtain ciphertext `C`.


    **Figure 2-5** Block cipher


    The model shown in Figure [2-5](#515270_1_En_2_Chapter.xhtml#Fig5) comprises plaintext,
    encryption, and ciphertext. The encrypter takes the plaintext in fixed-length
    blocks and the secret key as input and produces the ciphertext blocks.


    Block ciphers are primarily used for encryption but can be used to build hash
    functions, create stream ciphers, and build pseudorandom number generators and
    message authentication codes.


    There are two necessary properties that encryption tries to achieve, confusion
    and diffusion. Confusion adds obscurity to the relationship between the encrypted
    text and the plaintext. It is achieved by using substitution, which is performed
    by lookup tables called S-boxes in modern encryption algorithms, such as `AES`.


    Diffusion ensures that plaintext statistically spreads over the encrypted data.
    In other words, it ensures that even if a single bit changes in the plaintext,
    the ciphertext changes so much that the relationship between the plaintext and
    the ciphertext is hidden. In other words, it hides the statistical properties
    of the plaintext to thwart statistical analysis attacks. In addition, permutation
    boxes provide diffusion in modern encryption algorithms, such as `AES`. Thus,
    both confusion and diffusion are combined to create secure cipher algorithms.


    The Data Encryption Standard (`DES`) was developed in the 1970s and was used widely
    in the 1980s and 1990s. Over time, due to technological advancements, the efficacy
    of `DES` started to decrease. It was mainly due to its smaller 56-bit key length.
    After some successful brute-force attacks in the late 1990s, such as deep crack
    and `COPACOBANA`, it became clear that the `DES` was no longer secure. As a result,
    triple `DES` was introduced, which encrypts three times in a row (triple encryption)
    to increase the key length to 112 bits essentially. It helped to protect against
    brute-force attacks, and indeed triple `DES` is still unbreakable today. However,
    `NIST` finally replaced `DES` with `AES` due to concerns over slow performance
    and 64-bit block size in 2001.


    There are different modes in which block ciphers work. These modes enable block
    ciphers to not only provide confidentiality but also integrity and authenticity.
    Some of the modes include


    *   Electronic codebook mode

    *   Cipher block chaining mode

    *   Counter mode

    *   Cipher feedback (`CFB`) mode

    *   Galois/Counter Mode (`GCM`)

    *   Output feedback (`OFB`) mode


    We will explain just three modes here.


    #### Electronic Codebook


    Electronic codebook (`ECB`) is a fundamental mode of operation in which the encrypted
    data results from applying the encryption algorithm to each block of plaintext,
    one by one.


    This mode is the most straightforward, but we should not use it in practice as
    it is insecure and can reveal information.


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig6_HTML.jpg)


    A codebook mode model includes 3 boxes with the following elements. Plain text
    and key are sent through cipher encryption to obtain ciphertext.


    **Figure 2-6** Electronic codebook mode for block ciphers


    Figure [2-6](#515270_1_En_2_Chapter.xhtml#Fig6) shows that we have plaintext `P`
    provided as an input to the block cipher encryption function and a key, which
    produces ciphertext `C` as output.


    #### Cipher Block Chaining


    In cipher block chaining (`CBC`) mode, each plaintext block is XORed with the
    previously encrypted block. `CBC` mode uses the `IV` to encrypt the first block.
    The `IV` must be randomly chosen. `CBC` mode operation is shown in Figure [2-7](#515270_1_En_2_Chapter.xhtml#Fig7).


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig7_HTML.png)


    A chaining mode model has 3 boxes with the following elements. Key points to cipher
    encryption to obtain ciphertext that points to the next plaintext.


    **Figure 2-7** Cipher block chaining mode


    #### Counter Mode


    The counter (`CTR`) mode uses a block cipher as a stream cipher. In this case,
    a unique nonce is concatenated with the counter value to generate a keystream.


    As shown in Figure [2-8](#515270_1_En_2_Chapter.xhtml#Fig8), `CTR` mode works
    by utilizing a nonce `N` and a counter `C` that feed into the block cipher encryption
    function. The block cipher encryption function takes the secret key `KEY` as input
    and produces a keystream (a stream of pseudorandom or random characters), which,
    when XORed with the plaintext (`P`), generates the ciphertext (`C`).


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig8_HTML.png)


    A counter mode model has 3 boxes with the following elements. Nonce, counter,
    key, block cipher encryption, key stream, plaintext, ciphertext.


    **Figure 2-8** Counter mode


    There are other modes that we can use for different purposes other than encryption.
    We discuss some of these in the following section.


    #### Keystream Generation Mode


    In keystream generation mode, the encryption function generates a keystream. Stream
    ciphers use this keystream where it is XORed with the plaintext stream to produce
    the ciphertext.


    #### Message Authentication Mode


    A message authentication code (`MAC`) is produced from an encryption function
    in the message authentication mode. A `MAC` is a cryptographic checksum that provides
    the integrity service. Block ciphers in the cipher block chaining mode (`CBC`
    mode) are used to generate `MACs`. We can use a `MAC` to check if an unauthorized
    entity has modified a message. We achieve this by encrypting the message with
    a key using the `MAC` function. Then, the receivers check the message’s `MAC`
    by encrypting the received message again with the key and comparing it with the
    received `MAC`. If they match, it means that no unauthorized entity has modified
    the message; thus, an integrity service is provided. If they don’t match, then
    it means that some unauthorized entity has altered the message during transmission.


    Any block cipher such as `AES` in `CBC` mode can generate a `MAC`. The `MAC` of
    the message is the output of the last round of the `CBC` operation. The length
    of the `MAC` output is the same as the block length of the block cipher used to
    generate the `MAC`. Even though `MACs` work like digital signatures, they cannot
    provide the nonrepudiation service due to their symmetric nature.


    #### Cryptographic Hash Mode


    Hash functions are primarily used to compress a message to a fixed-length digest.
    Block ciphers in cryptographic hash mode can also be used as a compression function
    to produce a hash.


    Now we describe the Advanced Encryption Standard (`AES`) in detail.'
