- fmt: '# PoW As a Solution to Byzantine Generals Problem


    This has been described by Satoshi Nakamoto himself in a post [5]. I will describe
    the logic here in a concise way.


    Remember in the Byzantine generals problem, the problem is to agree on an attack
    time in the presence of treacherous generals and the possibility of captured messengers.
    In the case of proof of work, we can consider miners as generals where the understanding
    between generals is that any general can announce the attack time and the attack
    time heard first is accepted as the authoritative time to attack. The problem
    however is that if two generals propose different times almost simultaneously,
    it could happen due to messaging delays where some generals receive one of the
    attack times first, and some others receive the other attack time first, resulting
    in disagreement. In order to solve this problem, each general who receives an
    attack time starts to solve a complex math puzzle. When a general solves this
    math puzzle (proof of work), it broadcasts that to the network. When other generals
    receive it, they switch to this new time.


    All generals are allowed to propose a time, but only one of the proposed times
    will eventually be accepted as valid by all generals.


    For a proposed time to be valid, the condition is that each general must solve
    a mathematical puzzle and attach it with the proposed time message; if other generals
    receive this message and see that the solution to the math puzzle is valid, they
    accept that time. This mathematical puzzle serves two purposes; first, it is a
    proof that the general is honest as they have solved the math puzzle, and, second,
    it stops the generals from proposing too many times in quick succession, which
    will result in disagreement and confusion between the generals. We can see that
    this mechanism can be seen as a solution to the Byzantine generals problem; however,
    with a compromise, that temporary disagreement is acceptable.


    Bitcoin PoW is a probabilistic consensus algorithm. The big question now arises
    whether deterministic consensus can be achieved when the number of nodes is unknown
    and in the presence of Byzantine nodes.


    Now let’s revisit the validity, agreement, and termination properties defined
    at the start of this chapter in the light of what we have learned so far about
    the proof of work algorithm.


    We can see clearly now that PoW is not a classical deterministic Byzantine consensus
    algorithm. It is a protocol with probabilistic properties.


    Let’s revisit the properties now.


    ### Agreement


    An agreement property is probabilistic. This is the case because it can happen
    that two different miners produce a valid block almost simultaneously, and some
    nodes add a block from one miner and some other nodes from another. Eventually,
    however, the longest (strongest) chain rule will ensure that the chain with less
    proof of work behind it is pruned and the longest chain prevails. This will result
    in previously accepted transactions to be rolled back; thus, the agreement is
    probabilistic.


    ### Validity – Predicate Based


    This is a deterministic property agreement where honest nodes only accept those
    blocks which are valid. Formally, we can say that if a correct process `p` eventually
    decides on `b`, then `v` must satisfy the application-specific `valid()` predicate.
    We discussed the validity predicate, that is, the block validation criteria, in
    detail earlier in the chapter.


    ### Termination


    Termination is a probabilistic property. It is only achieved eventually due to
    the possibility of natural forks. This is because in the case of forks, the fork
    must be resolved in order to finally terminate a consensus process on the block.
    As there is a possibility that a previously accepted block is rolled back in favor
    of the heaviest/longest chain, the termination can only be guaranteed probabilistically.
    Usually, in order to ensure with high probability the finality of the transactions,
    in practice six confirmations are traditionally required. This means that the
    block is at least six blocks deeper in the chain, which means that the possibility
    of a rollback is so low that it can never happen or happen once in a millennia.


    With this, we complete our discussion on proof of work.


    ## PoW Concerns


    There are several concerns regarding PoW, including attacks and extreme energy
    consumption.


    In the next section, we discuss some of the attacks that can be carried out against
    the proof of work consensus, which adversely affects the Bitcoin network.


    ### 51% Attack


    A 51% attack on Bitcoin can occur when more than 50% of the mining hash power
    is controlled by an adversary.


    Table [5-3](#515270_1_En_5_Chapter.xhtml#Tab3) shows a list of actions that an
    adversary can possibly try to take after taking over more than 50% hash power
    of the network.


    **Table 5-3** List of actions by adversary


    | Attack | Possibility | Explanation |

    | --- | --- | --- |

    | Censor transactions | Yes | Can ignore transactions |

    | Coin stealing | No | Controlled by a private key |

    | Double-spend | Yes | Can create a private off-chain fork and exclude the block
    which contains previously spent transaction |

    | Change protocol | No | A protocol cannot be changed as valid nodes will simply
    ignore the invalid blocks |


    Note that some attacks are still impossible, while the most detrimental to a system
    are possible, such as double-spend.


    ### Selfish Mining


    This type of attack occurs when a miner who has found a block keeps it a secret
    instead of announcing it and keeps building on top of it privately. Imagine the
    attacker has managed to create another block. Now the attacker has two blocks
    in their private forked chain. At this point, the attacker waits for someone else
    to find a block. When the attacker sees this new block, they release their two-block
    chain. Because other miners are honest and abiding by the longest chain rule,
    they will accept this new chain being the longest. Now the block that was mined
    by someone else is orphaned despite spending resources on it, but that work is
    wasted. The attacker could also wait for a longer chain to be created, albeit
    mostly by luck, but if the attacker manages to create such a private fork which
    is longer than the honest chain, then the attacker can release that as soon as
    some other block is announced. Now when the nodes see this new longest chain,
    according to the rules, they will start mining on top of this new longer chain
    and orphaning the other chains, which could just be one block shorter than the
    attacker’s chain. All the work that has gone into creating the honest chain is
    now wasted, and the attacker gets the rewards, instead of other miners who did
    the work on the honest chain.


    ### Race Attack


    This attack can occur in a situation where the adversary can make a payment to
    one beneficiary and then a second one to themselves or someone else. Now if the
    first payment is accepted by the recipient after zero confirmations, then it could
    happen that the second transaction is mined and accepted in the next block, and
    the first transaction could remain unmined. As a result, the first recipient may
    never get their payment.'
