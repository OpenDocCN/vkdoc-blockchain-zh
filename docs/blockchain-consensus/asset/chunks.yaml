- fmt: '### Three-Phase Commit


    As we saw in the two-phase commit, it is not fault tolerant and blocks until the
    failed coordinator recovers. If the coordinator or a participant fails in the
    commit phase, the protocol cannot recover reliably. Even when the coordinator
    is replaced or recovers, it cannot proceed to process the transaction reliably
    from where the failure occurred. The three-phase commit solves this problem by
    introducing a new pre-commit intermediate phase. After receiving a `yes` from
    all the participants, the coordinator moves to this intermediate phase. Unlike
    `2PC`, here, the coordinator does not immediately broadcast `commit`; instead,
    it sends a `pre-commit` first, which indicates the intention to commit the transaction.
    When participants receive the `pre-commit` message, they reply with the `ack`
    messages. When the coordinator receives this `ack` from all participants, it sends
    the `commit` message and proceeds as in the two-phase commit. If a participant
    fails before sending back a message, the coordinator can still decide to commit
    the transaction. If the coordinator crashes, the participants can still agree
    to abort or commit the transaction. This is so because no actual commit or abort
    has taken place yet. The participants now have another chance to decide by checking
    that if they have seen a `pre-commit` from the coordinator, they commit the transaction
    accordingly. Otherwise, the participants abort the transaction, as no `commit`
    message has been seen from the coordinator.


    This process can be visualized in Figure [6-2](#515270_1_En_6_Chapter.xhtml#Fig2).


    ![](images/515270_1_En_6_Chapter/515270_1_En_6_Fig2_HTML.png)


    A schematic with 2 vertical lines for coordinator and participant. They are sectioned
    into voting, commit, and decision phase.


    **Figure 6-2** Three-phase commit protocol


    Roughly speaking, commit protocols can be seen as agreement protocols because
    participants need to decide whether to accept the value proposed by the coordinator
    or not. Of course, it is a simple protocol and not fault tolerant, but it does
    achieve an agreement among parties; hence, it can be seen as a consensus mechanism.
    Moreover, we can say that validity is achieved because a participant proposes
    a final agreed-upon value. Also, termination is guaranteed because every participant
    makes progress. If there are no failures, eventually all participants respond
    to the coordinator, and the protocol moves forward and, finally, both phases end.
    Strictly speaking, however, distributed commit protocols are not consensus protocols.


    Now, after this introduction to the most straightforward consensus protocols or
    distributed commit protocols (depending on how you look at them), let us focus
    on some early fault-tolerant consensus protocols that provide the foundation of
    what we see today as consensus protocols in various distributed systems and blockchains.


    ## Oral Message Algorithm


    The oral message (OM) algorithm was proposed to solve the Byzantine generals problem
    in the “Byzantine Generals Problem” paper in 1982 by Lamport et.al. This recursive
    algorithm runs under the synchronous network model. It assumes a collection of
    `N` generals where all generals are connected as a complete graph. One general
    is the “commander” responsible for starting the protocol. Other generals (`N –
    1`) called “lieutenants” orally pass around the message they receive. The commander
    knows that at most `f` generals will be faulty (traitors) and starts the consensus
    algorithm with a known value of `f`. There is also a default value, either “retreat”
    or “attack.” The intuition behind this algorithm is that you tell others what
    message you received on receiving every message. The participants accept the majority
    decision, which ensures the safety property of the algorithm.


    There are two *interactive consistency* requirements that need to be met called
    `IC1` and `IC2`:


    1.  **IC1**: All loyal lieutenants obey the same order.

    2.  **IC2**: If the commanding general is loyal, then every loyal lieutenant obeys
    its order.


    Some assumptions about the system model are:


    1.  The absence of message can be detected. This is due to synchronous communication.

    2.  Every sent message is delivered correctly.

    3.  The receiver of the message knows who sent it.


    An oral message is a message whose contents are under complete control of the
    sender. The sender can send any possible message.


    There is no solution to the Byzantine generals problem unless more than two-thirds
    of generals are loyal. For example, if there are three generals and one is a traitor,
    then there is no solution to BGP if oral messages are used. Formally:


    *   **Lemma 1**: There is no solution to the Byzantine generals problem for `3m
    + 1` generals with `> m` traitors.


    In other words, if `n <= 3m`, then a Byzantine agreement is not possible. The
    algorithm is recursive.


    **Algorithm**


    **Base case: `OM(0)`**


    1.  The commander broadcasts a proposed value to every lieutenant.

    2.  Every lieutenant accepts the received value. If no value is received, then
    it uses the `DEFAULT` value, either set to `retreat` or `attack`, at the start
    of the algorithm.


    **With traitor(s): `OM(m)`, where `m > 0`**


    1.  The commander sends the proposed value to every lieutenant.

    2.  Every lieutenant runs `OM(m-1)` and acts as the commander to send the value
    received in step 1 to all the other lieutenants.

    3.  Each lieutenant maintains a vector from which it uses the majority value out
    of the values received.


    The base case and `OM(1)` case are depicted in Figure [6-3](#515270_1_En_6_Chapter.xhtml#Fig3).


    ![](images/515270_1_En_6_Chapter/515270_1_En_6_Fig3_HTML.png)


    Two schematics of OM cases with a commander and 3 lieutenants. They are connected
    via attack, on the left and attack and retreat on the right.


    **Figure 6-3** OM base case vs. `OM(1)` case, where the commander is the traitor


    We can also visualize the case where a lieutenant is the traitor as shown in Figure
    [6-4](#515270_1_En_6_Chapter.xhtml#Fig4).


    ![](images/515270_1_En_6_Chapter/515270_1_En_6_Fig4_HTML.png)


    A schematic with a commander and 3 lieutenants, `L1` to `L3`. The commander orders
    an attack to the 3 lieutenants. `L3` sends retreat orders to `L1` and `L2`.


    **Figure 6-4** OM case with M=1 where a lieutenant is a traitor


    We can formally describe the algorithm as shown in the following code:


    **Base case**


    ```

    OM(0)- base case

    DEFAULT := Default value

    Commander C broadcasts its proposed value to all Lieutenants

    For i = 1 : N – 1 do

    Li stores the value from C in an array as Vi

    Vi = DEFAULT if no value received

    Li accepts Vi

    End for

    ```


    **Case with f > 0, `OM(m)`**'
