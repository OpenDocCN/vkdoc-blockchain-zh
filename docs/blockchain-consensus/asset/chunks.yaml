    ### 区块时间戳的意义


    比特币网络由运行在互联网上的异构、地理分散的节点组成，看起来是一个异步网络。之所以如此，是因为处理器速度和消息延迟都没有上限。在传统的拜占庭容错共识协议中，通常不依赖全局物理时钟，网络假设通常是部分同步网络。然而，在比特币中，所有区块都有一个时间戳字段，由挖出该区块的本地节点填充。这是区块验证过程的一部分，区块只有在时间戳小于或等于最近
    11 个区块的中位数时才被接受。此外，时间戳对于维持出块频率、难度调整和网络难度计算至关重要。从这个角度来看，我们可以将比特币网络视为松散同步的网络，网络需要松散的时间同步才能取得进展并确保活跃性。


    请注意，比特币网络并非部分同步，因为我们之前已经定义了部分同步及其变体，而比特币网络似乎不符合其中任何一个定义。之所以说它是同步的，是因为区块的时间戳由生成该区块的本地节点生成；但从处理器延迟的角度来看，它几乎是异步的。此外，在区块验证机制中，有一条规则要求区块必须在过去大约两小时内生成（前
    11 个区块的中位数），这使比特币成为一个“近乎同步”的系统。这是因为时间戳对于比特币系统的正常运行至关重要；然而，由于对通信和处理器延迟有较大的容忍度，它可以被视为一个松散同步的系统。


    另一方面，由于时间戳仅用于系统有限部分的正常运行（即难度计算和区块验证），并非达成共识的必要条件（即，通过解决工作量证明——挖矿来选择领导者），那么从这个角度来看，它是一个异步系统，因为处理器和通信延迟没有定义的上限，但消息最终会通过
    gossip 协议的概率性保证到达节点。


    在比特币区块中，时间戳并非 100% 精确，但足以保护工作量证明机制。最初，中本聪设想结合系统时钟、其他服务器时钟的中位数以及 NTP 服务器来调整时钟。然而，NTP
    从未被实现，而其他节点时钟的中位数仍然是网络中时钟调整的主要来源。


    区块时间戳不仅为区块哈希提供了一些变化（这对工作量证明很有用），还有助于防止区块链被操纵，例如攻击者可能试图在区块链中插入无效区块。当一个比特币节点连接到另一个节点时，它会从对方那里接收到
    UTC 格式的时间戳。接收节点随后计算接收时间与本地系统时钟的偏移量并存储起来。网络调整时间则计算为本地 UTC 系统时钟加上所有已连接节点的中位数偏移量。


    比特币区块的时间戳有两条规则。有效时间戳必须大于前 11 个区块的中位数时间戳。它还必须小于根据从其他已连接节点接收的时间（即网络调整时间）计算出的中位数时间戳加上两小时。然而，这种网络时间调整与本地系统时钟的差值绝不能超过
    70 分钟。


    结论是，比特币实际上只有在同步网络模型下才是安全的。更确切地说，它是一种无锁步同步，存在某个已知的有限时间界限，但执行过程并非锁步进行。


    ### 一个注意事项


    交易的顺序并非由共识驱动。每个矿工按照客户端中硬编码的顺序选取交易，确实存在一些可能导致交易审查、忽略或重排的攻击。事实上，共识是在区块上达成的，而且也不是通过投票实现；一旦矿工解决了
    PoW，它就赢得了在链上添加新区块的权利。当然，其他节点在收到该区块后会对其进行验证，但在成功矿工广播挖出的区块后，并不存在真正的协商或投票机制。没有投票或共识来同意这个新区块；当选领导者并因解决
    PoW 而赢得添加新区块权利的矿工，其他节点只要它通过`valid()`谓词检查就会接受它。


    因此，这里的注意事项是：当通过从交易池中选取交易来创建候选区块时，这些交易会按一定的顺序被选取，而矿工可以影响这个顺序。例如，一些矿工可能选择不包含任何无手续费的交易，只包含那些支付手续费的交易。这对矿工来说或许公平，但对用户和整个比特币系统来说并不公平！然而，最终所有交易都会被添加，即使是那些没有手续费的交易，但它们可能要在被加入交易池相当长的时间之后才会被考虑。如果它们已经“老化”，那么最终会被包含进去。此外，在假设网络中始终存在多数诚实矿工的情况下，预计交易会在合理的时间内按照协议规范被选取。


    现在让我们看看这个顺序是什么。


    交易是根据其优先级从交易池中选取的，优先级使用以下公式计算 [8]：


    ```

    priority = sum( input value in base units × input age ) / size in bytes

    ```


    ```

    p = Σ( v_i × a_i ) / s

    ```


    令人担忧的是，交易的排序并不公平，会导致抢先交易和其他相关攻击。我们将在第 10 章讨论公平排序问题。

