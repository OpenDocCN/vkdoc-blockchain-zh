  trans: "\n# 量子共识\n\n量子共识驱动一个包含若干量子比特的量子网络，使其达到对称状态。此外，随着量子计算的出现，经典计算领域的问题正通过量子计算的视角进行研究，以探究利用量子能力能否对经典世界的现有算法做出改进。本书全篇所探讨的经典计算/网络领域的分布式共识就是这样一个问题。我们将研究量子分布式系统中的协定/共识，以及量子计算对经典分布式系统（尤其是共识部分）的影响。已有研究表明，当在量子框架下研究经典分布式共识问题时，不仅能够增强经典结果，还能解决经典网络中原本无法解决的问题。\n\
    \n同时，在量子网络中，许多情况下都需要达成协定；因此，针对量子网络和量子互联网的纯量子共识也是一个值得关注的领域。\n\n在本节中，我们将更侧重于增强经典结果，而不是研究纯量子共识（即让包含若干量子比特的量子网络达成共识，也就是达到对称状态）。与本书的共识研究更相关的是对经典结果的增强。\n\
    \n量子共识算法是一个非常活跃的研究领域。在这方面，已经出现了四大类别：\n\n- 对称状态共识\n- 基于纠缠的共识\n- 基于测量的共识\n- 基于量子密钥分发的共识\n\
    \n对称状态共识指的是量子网络中量子节点的任意状态收敛到一个共识对称状态。\n\n基于纠缠的共识与经典共识问题更为相关。这是因为经典共识问题已通过量子计算的视角进行了研究。其核心思想在于，量子特性可以增强经典共识，并能解决那些被认为在经典共识世界中无法解决的问题。\n\
    \n基于测量的共识基于这样一个前提：当对一个量子态进行测量时，它会坍缩成一个经典状态，即 0 或 1。这种机制在拥有量子节点但使用经典信道的量子混合网络中可能很有用。量子态保存在量子计算机中，而经典信道则用于通信以达成共识。其目标是允许混合量子-经典网络中的量子节点收敛到一个共同状态。\n\
    \n基于量子密钥分发的共识已被提出，用于解决多方节点之间在没有纠缠情况下的拜占庭协定问题。量子密钥分发的无条件安全性是此类共识的基础。\n\n在经典分布式系统中（包括许可型区块链），参与者本质上达成共识的速度很慢，这是因为使用像\
    \ PBFT、三阶段提交或 Paxos 之类的经典协议会产生很高的时间复杂度。通常，这些共识算法的时间复杂度是 `O(n²)`，即二次复杂度。通过使用量子计算，能否显著降低经典分布式/区块链共识的时间复杂度？简短的回答是：可以。Ben-Or\
    \ 和 Hassidim 提出了一种快速的量子拜占庭协定，能够在 `O(1)` 的时间复杂度内解决共识问题。\n\n在下一节中，我们将介绍文献中出现的一些共识和协定算法。这些算法由于利用了量子特性，显著改善了经典结果，或者为量子世界中的共识及相关问题提供了新颖的算法。\n\
    \n## 快速量子拜占庭协定\n\nMichael Ben-Or 和 Avinatan Hassidim 提出了快速量子拜占庭协定协议，该协议能在 `O(1)`\
    \ 个预期的通信轮次内达成协定。该论文给出了两个结果：\n\n- 一个用于同步共识的量子协议，该协议能容忍 `t < n/3` 个故障，并在预期的常数轮数内运行。攻击者是故障-停止型、自适应的、拥有全部信息且计算能力无限的。\n\
    - 一个用于同步拜占庭协定的量子协议，能在预期的常数轮数内容忍 `t < n/3` 个故障参与者。攻击者模型是自适应、拥有全部信息且计算能力无限的攻击者。\n\
    \n系统模型包含 `n` 个节点，每对节点之间通过一个独立的双向量子信道连接。该协议按轮次运行，每轮有两个阶段。在第一阶段，所有处理器发送和接收消息；第二阶段是计算阶段，节点在此阶段进行本地计算以处理接收到的消息，并决定发送哪些消息。\n\
    \n该协议满足以下条件：\n\n- **一致性**：所有非故障处理器以概率 1 决定相同的值。\n- **有效性**：决定的值是所有处理器的输入值。\n-\
    \ **终止性**：所有非故障处理器以概率 1 决定一个值。\n\n还记得我们在前面第 6 章讨论过的抛硬币随机化协议。特别是，我们讨论了 Ben-Or 的算法，其中使用抛硬币来达成协定。从根本上说，协定问题被简化为弱全局硬币抛掷。\n\
    \n在量子世界中，其思想是不通过经典方法获得弱全局硬币，而是使用量子技术来获得弱全局硬币。利用这种量子技术，如果满足 `n > 3*t` 的条件，可以在同步情况下在\
    \ `O(1)` 个预期轮次内容忍拜占庭故障。然而，如果 `n < 3*t`，共识仍然是不可能的，但改进之处在于轮次复杂度达到了 `O(1)`。\n\n在异步模型中，如果满足\
    \ `n > 3*t`，则存在量子算法；但如果 `n < 3*t`，则不可能达成。\n\n针对故障-停止型故障的协议工作原理如下：\n\n（`C` 代表一枚硬币，`L`\
    \ 代表一个领导者，状态为 GHZ 态。）\n\nGHZ 态为 `|GHZ⟩ = (1/√2)|000⟩ + (1/√2)|111⟩`\n\n每个进程 `P[i]`\
    \ 执行：\n\n**第 1 轮**\n\n1.  在 `n` 个量子比特上生成状态 `|C_i⟩ = (1/√2)|0,0,...0⟩ + (1/√2)|1,1,...1⟩`。\n\
    \    1.  将第 `k` 个量子比特发送给第 `k` 个参与者，自己保留一份。\n2.  在 `n` 个量子比特上生成状态 `|L_i⟩ = (1/n³)\
    \ Σ_{a=1}^{n³} |a,a,...a⟩`，这是数字 1 到 `n^(3/2)` 的等概率叠加。\n    1.  将 `n` 个量子比特分发给所有进程。\n\
    3.  接收来自所有进程的量子消息。\n\n**第 2 轮**\n\n1.  测量在第 1 轮中接收到的所有 `L[j]` 量子比特。\n2.  选择拥有最高领导者值的进程作为该轮的领导者。\n\
    3.  在标准基下测量领导者的硬币。\n4.  获取领导者硬币的测量结果，该结果作为全局硬币。\n\n使用这个算法，可以获得一个弱全局硬币。如果满足 `3*t\
    \ < n`，则任一共同结果出现的概率至少为 `1/3`。该协议适用于崩溃故障。\n\n该论文还提出了另一个用于拜占庭故障的协议，该协议在异步环境下能够容忍最多\
    \ `t < n/4` 个故障节点。\n"
- fmt: '# How to Refute FLP Impossibility


    An interesting claim is made in [by Louie Helm] that distributed consensus can
    be achieved under asynchrony even in the presence of faults, which appears to
    contradict FLP impossibility.


    Helm proposed a protocol for solving consensus using quantum techniques. At a
    high level, the protocol works as follows:


    - Entangled qubits are distributed to all nodes.

    - Each node measures its qubit(s).

    - Finally, due to measurement, the superposed quantum state will collapse, which
    leads to consensus.


    This is so because the quantum entanglement here guarantees that entangled qubits
    collapse to the same state. This means that all nodes will end up with the same
    state, which means an agreement.


    The GHZ state is used to realize this scheme. The key assumption made here is
    that each node receives a qubit during the setup phase and then later measures
    it, which results in the same collapsed state at all nodes.


    The algorithm works as follows:


    1. Prepare the GHZ state via entanglement of a set of `n` qubits.

    2. Distribute a single qubit from the set of superposed qubits to each node in
    the network. This step distributes a shared state between all nodes.

    3. Each node measures their qubit. Note there is no decision yet at this stage.

    4. If qubit measurement is `∣0⟩`, choose 0. Choose 1 if qubit measurement is `∣1⟩`.
    This is where the quantum benefit is realized. When the measurement is made on
    a node, its quantum state will collapse to either `∣0⟩` or `∣1⟩`, with equal probability.
    Also, with the first measurement on a node, the state of all other nodes will
    also collapse simultaneously and instantaneously to the exact same value as the
    first node that did the measurement. This is possible because of entanglement
    and thus strong correlation between qubits. Now as all nodes have the exact same
    value, this scheme achieves consensus.


    An agreement is provided simply because measuring any single full entangled qubit
    in the GHZ state causes all other qubits in the same GHZ state to collapse to
    the same basis state. Validity is achieved because when the measurement is made
    on the first node, it’s effectively proposing either a `∣0⟩` or `∣1⟩`.


    This protocol can tolerate network delays because even if a qubit arrives late
    on a quantum node, the other nodes will keep working without any impact. When
    the late qubit arrives at any time, it will already contain the agreed-upon value,
    again due to entanglement. The fundamental reason why FLP can be refuted using
    this algorithm is because it requires one-way broadcast, and no classical response
    is required. Even if a single process does not measure its qubit, it will not
    impact the overall outcome of the computation, that is, even if that single measurement
    is not available, the other correct nodes will continue to operate even if one
    qubit is missing. This algorithm will work if the distribution of the original
    GHZ state completes successfully. Once that’s complete, missing measurements won’t
    impact the protocol from there onward. In case of Byzantine faults, the algorithm
    is also resilient. Any malicious party cannot tamper with the value the algorithm
    will eventually choose. This is so because any measurement does not impact the
    correlation of other qubits in the system. This means that any adversary measuring
    the qubits cannot impact the final chosen value. Due to the quantum nature, the
    qubit will always end up as 0 or 1. This always means that the decision will eventually
    be made regardless of Byzantine faults. This achieves termination.


    ## Enhanced Distributed Consensus


    Seet and Griffin proposed how quantum computing can speed up an agreement on a
    distributed network. They proposed a novel quantum consensus mechanism. The work
    presented in the paper focuses on the scalability and speed of distributed consensus.


    By removing the need for multicast replies, the consensus speed and scalability
    is accomplished. Moreover, using quantum properties, it is ensured that only a
    single multicast is required. The key idea for achieving consensus is to aggregate
    the wave function of the received qubits (from other nodes) and local qubits of
    a quantum node.


    The scheme works as follows:


    - The network is composed of quantum computers, communication channels, and classical
    computers. The channels can be quantum to quantum, classical-quantum, and between
    classical computers.

    - Each quantum computer is connected with a classical computer for storage and
    data retrieval.

    - A quantum computer creates an entangled qubit of each qubit.

    - Send the duplicates to other nodes in the system.

    - Consensus to be determined via the sum of each qubit wave function.

    - The qubits can be measured directly from within the quantum computer to calculate
    the wave function of each qubit. The idea revolves around the assumption that
    the wave function of each qubit should be similar to each other. Here, the expectation
    is that the values obtained should be consistent with each other.

    - Relying on the superposition, these wavelengths of qubits are a scalar multiple,
    that is, `nψ`, where `n` is the number of nodes participating in consensus.

    - The technique here is to determine the difference between an ideal and actual
    system state wave function.

    - If all quantum nodes participating in the consensus have a consistent state,
    then a randomly selected result would be consistent with any other node’s state.
    This can be compared against the actual system state wave function.

    - If the same state exists on all quantum nodes, each individual node’s wave function
    is a scalar multiple of the system’s state wave function. The wave function then
    outputs zero.

    - In case of any different state on a node, then that node’s wave function will
    not be a scalar multiple of the entire system’s state function. So, the difference
    between the system state wave function and the node’s state wave function is not
    zero, indicating the discrepancy. The difference increases as the discrepancy
    between the node’s state and system state grows. The level of fault tolerance
    can be determined if the difference does not fall below a certain threshold. This
    could be a percentage of the total system, in line with classical BFT where roughly
    33% of the nodes can be faulty in a network. It is possible to apply similar thresholds
    here too, though not proven.

    - The consensus algorithm multiplies a randomly chosen wave function with the
    number of nodes in the system.

    - It subtracts the sum of wave functions of each qubit in the system.

    - If all wave functions are the same, then the expected result is zero, indicating
    a coherent system. Otherwise, the system is not coherent. The larger the difference,
    the more incoherent the system is.


    In the paper, this algorithm is expanded to a multiqubit system. Also, several
    improvements over the classical model are achieved such as reducing the time complexity
    of state verification by half. This is achieved by utilizing entanglement where
    the verifier only needs to receive the entangled qubit, after which verification
    can be done locally, by comparing the state of all qubits. This contrasts with
    a classical high complexity request-response style of message passing, which increases
    time and communication complexity. With quantum properties, this complexity is
    reduced, and consensus can be reached in half the time as compared to the classical
    consensus. Such efficiency gains can be utilized in blockchains to increase scalability.
    Moreover, any attempt of manipulation of the original and the sent state in isolation
    is immediately detectable due to entanglement, thus resulting in increased security
    of the system. The paper also proposes several scalability, privacy, and performance
    enhancements addressing the blockchain trilemma.'
