- fmt: '# Ethereum 2


    `Ethereum 2`，也称为`Serenity`或`Eth2`，是以太坊的最终版本。当前以太坊基于工作量证明（PoW），被称为`Eth1`。现在它被称为执行层，而之前`Eth1`和`Eth2`的术语已不再适用。`Eth2`现在被称为共识层。根据原计划，现有的`PoW`链最终将被弃用，用户和应用程序将迁移到新的`PoS`链`Eth2`。然而，这一过程预计需要数年时间，一个更好的替代方案是继续改进现有的`PoW`链，并使其成为`Ethereum
    2`的一个分片。这一变化将简化向权益证明的过渡，并允许通过`rollups`而非分片执行来实现扩展。信标链已经可用；“合并”阶段——即以太坊主网与信标链合并——预计在2022年发生。合并后，信标链将具备权益证明和`EVM`能力，成为可执行的链。旧的`Ethereum
    1`（`Eth1`）将成为执行层，使用执行客户端（例如来自`Eth1`的`geth`）。`Ethereum 2`（共识）客户端（如`prysm`和`lighthouse`）将继续在信标链上运行。最终，计划于2023年扩展以太坊容量并支持执行的分片链将上线。`Ethereum
    2.0`“共识”与`Ethereum 1`“执行”作为分片0，以及基于其路线图的其他升级，可在图[8-10](#515270_1_En_8_Chapter.xhtml#Fig10)中看到。


    ![](images/515270_1_En_8_Chapter/515270_1_En_8_Fig10_HTML.png)


    以太坊升级表包括：`Ethereum 1`、`PoW`链；阶段0、可执行的信标链；阶段1、分片链；阶段2、状态执行。


    **图 8-10** 以太坊升级，展示合并及后续升级


    简而言之，`Eth1`现在被称为执行层，负责处理交易和执行；而`Eth2`现在被称为共识层，管理权益证明共识。作为共识层的一部分，提出了“`Ethereum
    2`”权益证明共识协议，我们接下来将讨论它。


    ## Casper


    `Casper`是一个旨在替代以太坊当前`PoW`算法的权益证明协议。该协议家族包含两种协议：


    - `Casper the Friendly Finality Gadget` (`FFG`)

    - `Casper the Friendly GHOST`


    `Casper FFG`是一种`PoS` `BFT`风格的混合协议，在当前`PoW`之上添加了`PoS`覆盖层；而`Casper the Friendly
    GHOST`则是一个纯粹的`PoS`协议。`Casper FFG`提供了一个过渡阶段，随后将被纯粹的`PoS`协议`Casper CBC`取代。下面我们将讨论`Casper
    FFG`。


    ### Casper FFG


    `Casper`可以看作是在公共区块链上结合了权益证明的改进版`PBFT`。`Casper the Friendly Finality Gadget`引入了一些新颖的特性：


    - 问责制

    - 动态验证者

    - 防御机制

    - 模块化覆盖层


    `Casper FFG`是运行在区块提议机制之上的覆盖层机制。其唯一目的是达成共识，而非产生区块。


    问责制允许检测规则违规行为并识别违规的验证者。这使得协议能够惩罚违规验证者，从而作为对抗恶意行为的一种防御手段。


    `Casper FFG`还引入了一种安全更改（即添加/移除）参与者验证者集合的方法。


    该协议还引入了一种防御机制，以防止网络分区和长程攻击。即使超过三分之一的验证者离线，协议也能提供应对此类场景的防御。


    `Casper FFG`是一个覆盖层，这使得它易于在现有的`PoW`链之上添加。作为覆盖层，它期望底层链拥有自己的分叉选择规则。在以太坊信标链中，它是基于一种称为`LMD
    GHOST`（最新消息驱动的贪婪最重观测子树）的分叉选择规则之上的覆盖层。


    `LMD GHOST`分叉选择规则基于`GHOST`。`LMD GHOST`选择规则从多个分叉中选出正确的链。诚实的链是获得验证者最多证明和权益（即权重）的那一条。分叉是由于网络分区、拜占庭行为和其他故障引起的。我们可以在图[8-11](#515270_1_En_8_Chapter.xhtml#Fig11)中看到`LMD
    GHOST`的运行机制。


    ![](images/515270_1_En_8_Chapter/515270_1_En_8_Fig11_HTML.png)


    `LMD GHOST`的图示，包含一个网络，其中不同着色区块指向创世块，并且验证者对其给出了最多证明。


    **图 8-11** `LMD GHOST`分叉选择规则


    在图[8-11](#515270_1_En_8_Chapter.xhtml#Fig11)中：


    - 区块中的数字代表该区块中按权益计算的权重。

    - 六边形代表来自验证者的证明，每个证明权重为1。

    - 规范链是带有阴影区块（权重 + 证明）的那一条。


    通常，当工作量证明或其他区块链生成机制产生区块时，区块会一个接一个地生成，形成一条顺序且线性的区块链，其中每个父区块只有一个子区块。但由于网络延迟和故障/拜占庭节点，提议机制可能会为一个父区块生成多个子区块。`Casper`负责从每个父区块中选择一个子区块，从而从区块树中选择出一条唯一的规范链。


    然而，出于效率考虑，`Casper`并不处理整个区块树；相反，它考虑由检查点形成的子树，即检查点树。


    新区块被追加到区块树结构中。树的一个子树——称为检查点树——才是需要做出决策的地方。此结构如图[8-12](#515270_1_En_8_Chapter.xhtml#Fig12)所示。


    ![](images/515270_1_En_8_Chapter/515270_1_En_8_Fig12_HTML.png)


    一个从底层到顶层包含0到7层的检查点树，展示了检查点及其通过虚线和点线的连接。


    **图 8-12** 检查点树，显示高度、投票、检查点和规范链


    创世区块是一个检查点，每第100个区块是一个检查点。从一个检查点到另一个检查点的距离称为一个纪元。换句话说，验证者每100个区块最终确定一次检查点。每个加入网络的验证者都会存入其拥有的保证金。由于惩罚和奖励机制，这笔保证金金额会增减。验证者广播投票。一个投票的权重与验证者的权益成正比。如果验证者偏离协议（即违反任何规则），则可能损失全部保证金。这是为了达成安全性。


    投票消息具有一些属性，我们描述如下：


    - `s`：一个已证明的源检查点的哈希值'
  raw: '## Ethereum 2


    Ethereum 2, also called Serenity or Eth2, is the final version of Ethereum. Currently,
    Ethereum is based on proof of work and is known as Eth1\. It is now called the
    execution layer, and the previous terminology of Eth1 and Eth2 is no longer valid.
    Eth2 is now called the consensus layer. As per the original plan, the existing
    PoW chain will eventually be deprecated, and users and apps will migrate to the
    new PoS chain Eth2\. However, this process is expected to take years, and an alternative
    better proposal is to continue improving the existing PoW chain and make it a
    shard of Ethereum 2\. This change will ease the transition to proof of stake and
    allow scaling up using rollups instead of sharded execution. The beacon chain
    is already available; “the merge” phase where the Ethereum mainnet merges with
    the beacon chain is expected in 2022\. After the merge, the beacon chain will
    become executable with proof of stake and EVM capabilities. Old Ethereum 1 (Eth1)
    will become the execution layer with execution clients, for example, “geth” from
    Eth1\. Ethereum 2 (consensus) clients such as prysm and lighthouse will continue
    operating on the beacon chain. Eventually, the shard chains that expand Ethereum
    capacity and support execution are planned for 2023\. Ethereum 2.0 “consensus”
    with Ethereum 1 “execution” as shard 0, along with other upgrades based on their
    road map, can be visualized in Figure [8-10](#515270_1_En_8_Chapter.xhtml#Fig10).


    ![](images/515270_1_En_8_Chapter/515270_1_En_8_Fig10_HTML.png)


    An Ethereum upgrades chart includes Ethereum 1, P o W chain; phase 0, executable
    Beacon chain; phase 1, shared chains; phase 2, state execution.


    Figure 8-10


    Ethereum upgrades, showing the merge and subsequent upgrades


    In short, Eth1 is now called the execution layer, which handles transactions and
    executions, whereas Eth2 is now called the consensus layer, which manages proof
    of stake consensus. As part of the consensus layer, the “Ethereum 2” proof of
    stake consensus protocol is proposed, which we discuss next.


    ### Casper


    Casper is a proof of stake protocol which is built to replace the current PoW
    algorithm in Ethereum. There are two protocols in this family:


    *   Casper the Friendly Finality Gadget (FFG)


    *   Casper the Friendly GHOST


    Casper FFG is a PoS BFT–style hybrid protocol that adds a PoS overlay to the current
    PoW, whereas Casper the Friendly GHOST is purely a PoS protocol. Casper FFG provides
    a transition phase before being replaced with Casper CBC, a pure PoS protocol.
    We’ll discuss Casper FFG as follows.


    #### Casper FFG


    Casper can be seen as an improved PBFT with proof of stake for public blockchains.
    Casper the Friendly Finality Gadget introduces some novel features:


    *   Accountability


    *   Dynamic validators


    *   Defenses


    *   Modular overlay


    Casper FFG is an overlay mechanism on top of a block proposing mechanism. Its
    sole purpose is consensus, not block production.


    Accountability allows to detect rule violations and identify the validators who
    violated the rule. This enables the protocol to penalize the violating validator,
    which serves as a defense against malicious behavior.


    Casper FFG also introduces a safe way to change (i.e., add/remove) participants’
    validator set.


    The protocol also introduces a defense mechanism to protect against network partitions
    and long-range attacks. Even if more than one-third of validators go offline,
    the protocol provides a defense against such scenarios.


    Casper FFG is an overlay, which makes it easier to add on top of an existing PoW
    chain. As it is an overlay, it is expected that the underlying chain has its own
    fork choice rule. In the Ethereum beacon chain, it is an overlay on top of the
    fork choice rule called LMD GHOST (Latest Message Driven Greedy Heaviest-Observed
    Sub-Tree).


    The LMD GHOST fork choice rule is based on GHOST. The LMD GHOST choice rule selects
    the correct chain from multiple forks. The honest chain is the one that has the
    most attestations from the validators and stake (i.e., weight). Forks occur due
    to network partitions, Byzantine behavior, and other faults. We can see LMD GHOST
    in action in Figure [8-11](#515270_1_En_8_Chapter.xhtml#Fig11).


    ![](images/515270_1_En_8_Chapter/515270_1_En_8_Fig11_HTML.png)


    An illustration of the L M D GHOST includes a network of most attestations from
    the validators for different shaded blocks pointing to genesis.


    Figure 8-11


    LMD GHOST fork choice rule


    In Figure [8-11](#515270_1_En_8_Chapter.xhtml#Fig11)


    *   The number in the block represents the weight by stake in blocks.


    *   The hexagon represents attestations from validators carrying weight 1.


    *   The canonical chain is the one with shaded blocks (weight + attestations).


    Usually, when proof of work or some other blockchain production mechanism produces
    blocks, they are produced one after another, in a sequential and linear chain
    of blocks, where each parent has exactly one child. But it can happen due to network
    latency and faulty/Byzantine nodes that the proposal mechanism produces multiple
    child blocks of a parent block. Casper is responsible for choosing a single child
    from each parent block, thus choosing a single canonical chain from the block
    tree.


    Casper however does not deal with the entire block tree due to efficiency concerns;
    instead, it considers a subtree of checkpoints forming the checkpoint tree.


    New blocks are appended to the block tree structure. A subtree of a tree called
    the checkpoint tree is where the decision is required. This structure is shown
    in Figure [8-12](#515270_1_En_8_Chapter.xhtml#Fig12).


    ![](images/515270_1_En_8_Chapter/515270_1_En_8_Fig12_HTML.png)


    A checkpoint tree with layers 0 to 7 from the bottom to the top includes checkpoints
    and their links via dotted and dashed lines.


    Figure 8-12


    Checkpoint tree showing heights, votes, checkpoints, and canonical chain


    The genesis block is a checkpoint, and every 100th block is a checkpoint. The
    distance from one checkpoint to another is called an epoch. In other words, validators
    finalize checkpoints every 100 blocks. Each validator that joins the network deposits
    their owned deposit. This deposit is subject to increase and decrease due to penalty
    and reward mechanism. Validators broadcast votes. A vote weight is proportional
    to a validator’s stake. A validator can lose the entire deposit if it deviates
    from the protocol, that is, violates any rules. This is to achieve safety.


    A vote message has some attributes, which we describe as follows:


    *   **s**: Hash of a justified source checkpoint'
