    #### Inherently Distributed


    There are scenarios where there is no option but to build a distributed system
    because the problem can only be solved by a distributed system. For example, a
    messaging system is inherently distributed. Mobile network is inherently by nature
    distributed. In these and similar use cases, a distributed system is the only
    one that can solve the problem; therefore, the system has to be distributed by
    design.


    With all these benefits of distributed systems, there are some challenges that
    need to be addressed when building distributed systems. The properties of distributed
    systems such as no access to a global clock, asynchrony, and partial failures
    make designing reliable distributed systems a difficult task. In the next section,
    we look at some of the primary challenges that should be addressed while building
    distributed systems.


    ### Challenges


    Distributed systems are hard to build. There are multiple challenges that need
    to be addressed while designing distributed systems. A collection of some common
    challenges is presented as follows.


    #### Fault Tolerance


    With more computers and at times 100s of thousands in a data center, for example,
    in the case of cloud computing, inevitably something somewhere would be failing.
    In other words, the probability of failing some part of the distributed system,
    be it a network cable, a processor, or some other hardware, increases with the
    number of computers. This aspect of distributed systems requires that even if
    some parts of the distributed system fail (usually a certain threshold), the distributed
    system as a whole must keep operating. To this end, there are various problems
    that are studied in distributed computing under the umbrella of fault tolerance.
    Fault-tolerant consensus is one such example where the efforts are made to build
    consensus algorithms that continue to run correctly as specified even in the presence
    of a threshold of faulty nodes or links in a distributed system. We will see more
    details about that in Chapter [3](#515270_1_En_3_Chapter.xhtml).


    A relevant area of study is **failure detection** which is concerned with the
    development of algorithms that attempt to detect faults in a distributed system.
    This is especially an area of concern in asynchronous distributed systems where
    there is no upper bound on the message delivery times. The problem becomes even
    more tricky when there is no way to distinguish between a failed node and a node
    that is simply slower and a lost message on the link. Failure detection algorithms
    give a probabilistic indication about the failure of a process. This up or down
    status of the node then can be used to handle that fault.


    Another area of study is **replication** which provides fault tolerance on the
    principle that if the same data is replicated across multiple nodes in a distributed
    system, then even if some nodes go down the data is still available, which helps
    to keep the system stable and continue to meet its specification (guarantees)
    and remain available to the end users. We will see more about replication in Chapter
    [3](#515270_1_En_3_Chapter.xhtml).


    #### Security


    Being a distributed system with multiple users using it, out of which some might
    be malicious, the security of distributed systems becomes a prime concern. This
    situation is even more critical in geographically dispersed distributed systems
    and open systems such as blockchains, for example, Bitcoin blockchain. To this,
    the fundamental science used for providing security in distributed systems is
    cryptography, which we will cover in detail in Chapter [2](#515270_1_En_2_Chapter.xhtml),
    and we will keep referring to it throughout the book, especially in relation to
    blockchain consensus. Here, we study topics such as cryptography and address challenges
    such as authentication, confidentiality, access control, nonrepudiation, and data
    integrity.


    #### Heterogeneity


    A distributed system is not necessarily composed of exactly the same hardware
    nodes. It is possible and is called homogenous distributed system, but usually
    the hardware and operating systems are different from each other. In this type
    of scenario, different operating systems and hardware can behave differently,
    leading to synchronization complexities. Some nodes might be slow, running a different
    operating system which could have bugs, some might run faster due to better hardware,
    and some could be resource constrained as mobile devices or IoT devices. With
    all these different types of nodes (processes, computers) in a distributed system,
    it becomes challenging to build a distributed algorithm that works correctly on
    all these different types of systems and continues to operate correctly despite
    the differences in the local operating environment of the nodes.


    #### Distribution Transparency


    One of the goals of a distributed system is to achieve transparency. It means
    that the distributed system, no matter how many individual computers and peripherals
    it is built of, it should appear as a single coherent system to the end user.
    For example, an ecommerce website may have many database servers, firewalls, web
    servers, load balancers, and many other elements in their distributed system,
    but all that should be abstracted away from the end user. The end user is not
    necessarily concerned about these backend "irrelevant" details but only that when
    they make a request, the system responds. In summary, the distributed system is
    coherent if it behaves in accordance with the expectation of the end user, despite
    its heterogeneous and dispersed structure. For example, think about IPFS, a distributed
    file system. Even though the files are spread and sharded across multiple computers
    in the IPFS network, to the end user all that detail is transparent, and the end
    user operates on it almost as if they are using a local file system. Similar observation
    can be made about other systems such as online email platforms and cloud storage
    services.


    #### Timing and Synchronization


    Synchronization is a vital operation of a distributed system to ensure a stable
    global state. As each process has its view of time depending on their internal
    physical clocks which can drift apart, the time synchronization becomes one of
    the fundamental issues to address in designing distributed systems. We will see
    some more details around this interesting problem and will explore some solutions
    in our section on **timing, orders, and clocks** in this chapter.'
  trans: '

    ### 吞吐量


    分布式系统的`吞吐量`是衡量其性能的另一个指标。`吞吐量`主要衡量系统处理数据的速度；通常以每秒事务数来衡量。正如我们将在第 5 章中看到的，在区块链系统（分布式账本）中，高每秒事务数是非常理想的。对于分布式数据库，常用每秒事务数或每秒执行的查询数来衡量系统性能。`吞吐量`受到分布式系统不同方面的影响，例如处理速度、通信网络质量、速度和可靠性，以及算法。如果你的硬件很好，但算法设计得不好，这也会影响`吞吐量`、响应能力和系统的整体性能。


    ### 资源共享


    分布式系统中的资源可以与其他节点/参与者共享。有时，存在一些昂贵的资源，例如超级计算机、量子计算机或某些工业级打印机，这些资源在每个站点都配备的成本过高；在这种情况下，可以通过通信链路远程共享给其他节点。另一种场景是将数据划分为多个分区（分片）以实现快速访问。


    ### 固有分布性


    在某些场景下，除了构建分布式系统外别无选择，因为只有分布式系统才能解决问题。例如，消息系统本质上就是分布式的。移动网络本质上也是分布式的。在这些以及类似的应用场景中，分布式系统是唯一能够解决问题的方案；因此，系统在设计中就必须是分布式的。


    尽管分布式系统拥有所有这些优点，但在构建时也存在一些需要解决的挑战。分布式系统的特性，例如无法访问全局时钟、异步性以及部分故障，使得设计可靠的分布式系统成为一项艰巨的任务。在下一节中，我们将探讨构建分布式系统时应解决的一些主要挑战。


    ## 挑战


    分布式系统很难构建。在设计分布式系统时，需要应对多种挑战。以下列举了一些常见的挑战。


    ### 容错性


    随着计算机数量的增加，有时数据中心里有数十万台计算机（例如在云计算中），不可避免地，某个地方会出故障。换句话说，分布式系统中某个部分（无论是网线、处理器还是其他硬件）发生故障的概率会随着计算机数量的增加而增加。分布式系统的这一特性要求，即使系统的某些部分发生故障（通常在某个阈值内），整个分布式系统也必须持续运行。为此，在分布式计算的容错性领域内，有许多问题被研究。容错共识就是一个例子，人们努力构建共识算法，使其即使在分布式系统中存在一定数量的故障节点或链路时，也能继续按规范正确运行。我们将在第
    3 章中看到更多细节。


    一个相关的研究领域是`故障检测`，它涉及开发尝试检测分布式系统中故障的算法。这在异步分布式系统中尤其值得关注，因为此类系统中消息传递时间没有上限。当无法区分是节点故障、节点速度慢还是链路丢包时，问题就变得更加棘手。故障检测算法会给出关于进程故障的概率性指示。节点的这种可用或不可用状态随后可用于处理该故障。


    另一个研究领域是`副本`，它基于以下原理提供容错性：如果同一数据在分布式系统的多个节点上复制，那么即使某些节点宕机，数据仍然可用，这有助于保持系统稳定，继续满足其规范（保证），并保持对最终用户的可用性。我们将在第
    3 章中了解更多关于副本的内容。


    ### 安全性


    由于分布式系统有多个用户使用，其中可能包含恶意用户，其安全性便成为了首要关注点。在地理上分散的分布式系统和开放系统（例如比特币区块链）中，这种情况更为严峻。为此，用于提供分布式系统安全性的基础科学是密码学，我们将在第
    2 章中详细讨论，并且会在本书中反复提及，特别是与区块链共识相关的内容。在这里，我们将学习诸如密码学之类的主题，并解决认证、保密性、访问控制、不可否认性和数据完整性等挑战。


    ### 异构性


    分布式系统不一定由完全相同的硬件节点组成。有可能（这种情况被称为同构分布式系统）存在，但通常硬件和操作系统各不相同。在这种场景下，不同的操作系统和硬件可能表现各异，导致同步复杂化。某些节点可能很慢，运行着可能包含缺陷的不同操作系统；有些节点由于硬件更好而运行更快；有些节点可能像移动设备或物联网设备那样资源受限。面对分布式系统中所有这些不同类型的节点（进程、计算机），构建一个能在所有这些不同类型的系统上正确运行，并且尽管节点本地运行环境存在差异仍能继续正确运行的分布式算法，就变得很有挑战性。


    ### 分布透明性


    分布式系统的目标之一是实现透明性。这意味着，无论分布式系统由多少台独立的计算机和外围设备构建而成，对最终用户来说，它都应该表现为一个单一的、连贯的系统。例如，一个电子商务网站在其分布式系统中可能有许多数据库服务器、防火墙、Web
    服务器、负载均衡器和许多其他元素，但所有这些都应该对最终用户抽象隐藏。最终用户不一定关心这些后台的“无关”细节，只关心当他们发出请求时系统能够响应。总之，如果一个分布式系统尽管其异构和分散的结构，但其行为符合最终用户的期望，那么它就是连贯的。例如，思考一下`IPFS`，一个分布式文件系统。尽管文件在`IPFS`网络中的多台计算机上分布和分片存储，但对最终用户来说，所有这些细节都是透明的，他们操作起来几乎就像在使用本地文件系统。对于在线电子邮件平台和云存储服务等其他系统，也可以观察到类似的情况。


    ### 时序与同步


    同步是确保分布式系统全局状态稳定的关键操作。由于每个进程根据其内部物理时钟（可能产生漂移）拥有自己的时间视图，时间同步便成为设计分布式系统时需要解决的基本问题之一。我们将在本章关于`时序`、`顺序`和`时钟`的部分中，进一步探讨这个有趣的问题并研究一些解决方案。'
- fmt: '#### Global State


    As the processes in a distributed system only have knowledge of their local states,
    it becomes quite a challenge to ascertain the global state of the system. There
    are several algorithms that can be used to do that, such as the Chandy-Lamport
    algorithm. We will briefly touch upon that shortly.


    #### Concurrency


    Concurrency means multiple processes running at the same time. There is also a
    distinction made between logical and physical concurrency. Logical concurrency
    refers to the situation when multiple programs are executed in an interleaving
    manner on a single processor. Physical concurrency is where program units from
    the same program execute at the same time on two or more processors.


    Distributed systems are ubiquitous. They are in everyday use and have become part
    of our daily routine as a society. Be it the Internet, the World Wide Web, Bitcoin,
    Ethereum, Google, Facebook, or Twitter, distributed systems are now part of our
    daily lives. At the core of distributed systems, there are distributed algorithms
    which form the foundation of the processing being performed by the distributed
    system. Each process runs the same copy of the algorithm that intends to solve
    the problem for which the distributed system has been developed, hence the term
    distributed algorithm.


    A process can be a computer, an IoT device, or a node in a data center. We abstract
    these devices and represent these as processes, whereas physically it can be any
    physical computer.


    Now let’s see some of the relevant technologies and terminologies.


    ### Parallel vs. Distributed vs. Concurrency


    The key difference between a parallel system and a distributed system is that
    parallel systems’ primary focus is on high performance, whereas distributed systems
    are concerned with tolerating partial failures. Also, parallel processing systems
    have direct access to a shared memory, whereas in distributed systems all processors
    have their own local memory.


    A comparison is shown in Table 1-1.


    Table 1-1


    Parallel vs. distributed systems


    | Resource/Property | Parallel | Distributed |

    | --- | --- | --- |

    | Memory | Shared memory, a common address space | Each processor has its own
    memory |

    | Coupling | Tightly coupled | Loosely coupled |

    | Synchronization | Through a global shared clock | Through synchronization algorithms
    |

    | Goal | High performance | Scalability |

    | Algorithms | Concurrent | Distributed |

    | Messaging | No network, shared memory | Message-passing network |


    There are some overlapping ideas in the distributed computing, and sometimes it
    becomes a bit difficult for beginners to understand. In the next section, I will
    try to clarify some of the pertinent terminology and some ambiguities.


    ### Centralized vs. Decentralized vs. Distributed


    A centralized system is a typical distributed system where clients connect to
    a central server or a service provider. There is usually an administrator in control
    of the entire system. A typical example is the standard client-server architecture,
    where all clients send requests to a central server and receive responses. These
    systems are usually easier to develop and maintain. However, they are not fault
    tolerant (in the stricter sense of client-server where there is only one central
    server); if the central server fails, the clients cannot connect and make requests.


    A decentralized system is where there is no central owner of the system. Instead,
    there can be multiple owners in different locations who oversee different parts
    of the system, or there is no controller as in blockchain systems.


    A distributed system compared to a centralized and decentralized system can be
    thought of as a system where there may or may not be a central controller in the
    system; however, the resources and nodes are distributed.


    Figure 1-2 shows a depiction of three types of systems.


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig2_HTML.png)


    Three irregular structures titled centralized, decentralized, and distributed
    systems with various nodes. All the nodes are connected together via links.


    Figure 1-2


    Centralized vs. decentralized vs. distributed


    Figure 1-2 shows the traditional view of centralized, decentralized, and distributed
    systems. However, in recent years a slightly different picture started to emerge
    which highlights the notion of a system with a central controller and the one
    with no controller at all and where all users participate equally without any
    dependence on a trusted third party. These new types of distributed systems are
    blockchains, especially public blockchains, where there is no central controller,
    such as Bitcoin blockchain. We will cover more on blockchain in Chapter 4 and
    then throughout the book. However, let’s now look at Figure 1-3, which depicts
    this type of architecture and highlights the differences from a control point
    of view.


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig3_HTML.png)


    Five structures are grouped into centralized, decentralized, and distributed systems.
    Each structure has various nodes connected together via links.


    Figure 1-3


    Centralized vs. distributed vs. decentralized


    Notice that in Figure 1-3 the topology of distributed and decentralized systems
    may be the same, but there is a central controller, depicted by a symbolic hand
    on top of the figure. However, in a decentralized system notice that there is
    no hand shown, which depicts there is no single central controller or an authority.


    So far, we have focused mainly on the architecture of distributed systems and
    generally defined and explored what distributed systems are. Now let’s look at
    the most important fundamental element of a distributed system, that is, the distributed
    algorithm that enables a distributed system to do what it is supposed to do. It
    is the algorithm that runs on each node in a distributed system to accomplish
    a common goal. For example, a common goal in a cryptocurrency blockchain is to
    disallow double-spending. The logic to handle that is part of the distributed
    algorithm that runs on each node of the cryptocurrency blockchain, and collectively
    and collaboratively, the blockchain (the distributed system) accomplishes this
    task (goal) to avoid double-spending. Don’t worry if some of these terms don’t
    make sense now; they will become clear in Chapter 4.'
