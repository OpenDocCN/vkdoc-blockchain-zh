  trans: '

    # 分布式事务


    分布式事务是跨多个进程展开的一系列事件。事务要么以提交结束，要么以中止告终。若提交成功，所有事件均被执行并产生输出；若中止，则事务在未完全执行时停止。事务若完整执行并提交则具有原子性，否则将回滚且不产生任何影响。换言之，原子事务要么完全执行，要么完全不执行。


    事务必须满足四项属性，即通常所说的 ACID 一致性模型：


    - **原子性**：事务事件要么全部执行，要么完全不执行。

    - **一致性**：若事务提交，系统将进入有效（一致）的状态，且满足某些不变约束。

    - **隔离性**：除非事务已提交，否则其任何影响均不可见。

    - **持久性**：一旦提交，事务将产生永久性影响。


    这里需要指出一点：在单体架构中，一致性相对容易保证。相比之下，分布式架构中的一致性并非即时达成，此类架构依赖于所谓"最终一致性"。最终一致性意味着系统中所有节点最终（在未来某一时间点）会同步并达成一致的系统状态。即便某些节点（进程）发生故障，ACID
    属性也必须得到维护。


    原子性、隔离性和持久性在单体架构中较易实现，但在分布式环境中实现这些属性则更具挑战性。


    两阶段提交协议用于在多个进程间实现原子性。副本之间应保持相互一致。原子提交协议本质上是一种共识机制，因为在事务提交协议中，节点必须达成一致：若一切正常则提交，若出现问题则回滚。试想，若事务预期在分布式系统（网络）的所有节点上提交，那么为保持副本一致性，它要么全部提交，要么完全不提交。绝不能出现事务在某些节点成功而在另一些节点失败的情况，否则将导致分布式系统不一致。这正是原子提交的用武之地。从根本上讲，它可被视为一种共识算法，因为该协议要求网络中所有节点达成一致。然而，原子提交与共识之间存在根本差异。在共识中，一个或多个节点提出值，节点通过共识算法决定采用其中一个值，这通常通过多数共识实现。相反，在原子提交协议中，所有节点都需要投票决定是提交还是中止事务。在共识算法中，可以提出多个值并从中协商选定一个；而在原子提交中，协议必须仅在所有节点均投票提交时才提交；否则，即使只有一个节点不同意，所有节点也必须中止该事务。原子提交与共识的一个主要区别在于：共识算法因仲裁可用性规则而能容忍故障（崩溃节点），而原子提交中即使只有一个节点失败，所有节点也必须中止事务。为处理崩溃节点，会使用一个完全且强精准的故障检测器，该检测器通过超时机制实现。


    除了 ACID 一致性模型，数据库中另一种常用的一致性模型是 BASE 模型。BASE 代表基本可用（BA）、软状态（S）和最终一致性（E）。使用 BASE
    一致性模型的数据库通过在系统节点间复制数据来确保可用性。由于该模型不提供即时一致性，数据值可能随时间变化，从而产生最终一致性。在 BASE 模型中，一致性仅能最终达成。然而，它提供了高可用性，这在许多对即时强一致性要求较为宽松的在线服务（如社交网络和在线视频平台）中非常有用。从
    CAP 定理的角度看，BASE 模型牺牲了一致性而偏向高可用性。


    现在我们讨论两阶段提交——这一著名的提交协议，它实现了原子性。

    '
- fmt: '### Two-Phase Commit


    A two-phase commit (`2PC`) is an atomic commit protocol to achieve atomicity.
    It was first published in a paper by Lampson and Sturgis in 1979. A two-phase
    commit enables updating multiple databases in a single transaction and committing/aborting
    atomically.


    As the name suggests, it works in two phases. The first phase is the vote collection
    phase in which a coordinator node collects votes from each node participating
    in the transaction. Each participant node either votes yes or no to either commit
    the transaction or abort the transaction. When all votes are collected, the coordinator
    (`transaction manager`) starts the second phase, called the decision phase. In
    the decision phase, the coordinator commits the transaction if it has received
    all yes votes from other nodes; otherwise, it aborts the transaction. Any node
    that had voted yes to commit the transaction waits until it receives the final
    decision from the coordinator node. If it receives no from the coordinator, it
    will abort the transaction; otherwise, it will commit the transaction. Nodes that
    voted no immediately terminate the transaction without waiting to receive a decision
    from the coordinator. When a transaction is aborted, any changes made are rolled
    back. The changes are made permanent after committing at nodes that said yes when
    they receive a commit decision from the coordinator. Any changes made by the transaction
    are not permanent, and any locks are released after a write operation is performed.
    All participants send the acknowledgment back to the coordinator after they’ve
    received the decision from the coordinator. As a failure handling mechanism, a
    logging scheme is used in two-phase commits. In this scheme, all messages are
    written to a local stable storage before they are sent out to the recipients in
    the network. When the coordinator fails (crashes), it writes its decision to the
    local disk in the log, and when it recovers, it sends its decision to other nodes.
    If no decision was made before the crash, then it simply aborts the transaction.
    When a node fails (other than the coordinator node), the coordinator waits until
    it times out, and a decision is made to abort the transaction for all.


    Figure [6-1](#515270_1_En_6_Chapter.xhtml#Fig1) shows the two-phase commit protocol
    in action. Here, the client (application) starts the transaction as usual and
    performs a usual read/write operation on the database nodes, that is, on the transaction
    participant nodes. After a normal transaction execution on each participant, when
    the client is ready to commit the transaction, the coordinator starts the first
    phase, that is, the prepare phase. It sends the prepare request to all nodes and
    asks them whether they can commit or not. If the participants reply with a yes,
    it means that they are willing and ready to commit the transaction, then the coordinator
    starts the second phase called the commit phase. This is when the coordinator
    sends out the commit decision, and the transaction is finally committed, and a
    commit actually takes place. If any of the participant nodes replies to the prepare
    request with a no, then the coordinator sends out the abort request in phase two,
    and all nodes abort accordingly. Note that after the first phase, there is a decision
    point where the coordinator decides whether to commit or abort. The action after
    the decision phase is either commit or abort, based on the yes or no received
    from the participants.


    ```

    ![](images/515270_1_En_6_Chapter/515270_1_En_6_Fig1_HTML.jpg)


    A schematic with 4 right arrows labeled client, coordinator, participant 1 and
    2\. The lines are sectioned into 3 with multi-directional arrows.


    Figure 6-1


    The two-phase commit algorithm – a successful scenario

    ```


    The two-phase commit is a blocking algorithm because if the coordinator goes down
    after the “prepare” phase but before sending out its decision, other nodes have
    no way of finding out what has been decided by the coordinator. Now they are stuck
    in an uncertain state where they have agreed earlier to commit by saying yes/ok
    in the prepare phase but are now waiting to hear the final decision from the coordinator.
    Nodes cannot either commit or abort on their own after responding yes in the prepare
    phase because it will violate the atomicity property. The protocol in this situation
    blocks until the coordinator recovers. This means that the two-phase commit algorithm
    is not fault tolerant if the coordinator or a participant fails. In other words,
    `2PC` is not partition tolerant.


    More precisely, if the coordinator crashes just after the prepare phase before
    sending the decision, other nodes then have no idea what decision is made by the
    coordinator. At this stage, participants cannot commit or abort, and the protocol
    is blocked until the coordinator comes back online and participants receive the
    decision. The coordinator is a single point of failure in this protocol. There
    are ways to overcome this problem using a consensus mechanism or total order broadcast
    protocol. The commit protocol can use consensus to elect a new coordinator.


    Also, note that if we remove the second phase and hence no rolling back, it becomes
    a one-phase commit, that is, the primary/backup replication. Sounds familiar?
    We discussed this in Chapter [3](#515270_1_En_3_Chapter.xhtml).'
