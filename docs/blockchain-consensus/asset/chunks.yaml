- fmt: "# Tendermint\n\n`Tendermint` is inspired by the DLS protocol that we covered\
    \ in Chapter [6](#515270_1_En_6_Chapter.xhtml) and was originally introduced in\
    \ the DLS paper. It can be seen as a variant of PBFT too with similarities in\
    \ the phases.\n\nThe `Tendermint` protocol works in rounds. In each round, an\
    \ elected leader proposes the next block. In `Tendermint`, the view change process\
    \ is part of the normal operation. This concept is different from PBFT, where\
    \ a view change only occurs in the event of a suspected faulty leader. `Tendermint`\
    \ works similarly to PBFT, where three phases are required to achieve consensus.\
    \ A key innovation in `Tendermint` is the design of a new termination mechanism.\
    \ Unlike other PBFT-like protocols, `Tendermint` has developed a more straightforward\
    \ mechanism like a PBFT-style normal operation. Instead of having two subprotocols\
    \ for normal mode and view change mode (recovery in case of a faulty leader),\
    \ `Tendermint` terminates without additional communication costs.\n\n`Tendermint`\
    \ works under some assumptions about the operating environment, which we describe\
    \ next:\n\n- **Processes:** A process is a participant on the network. Processes\
    \ are expected to be honest, but they can turn faulty. Each process has a voting\
    \ power that serves as a confirmation to the leader. Processes can connect loosely\
    \ or with their immediate subset of processes/nodes. They are not necessarily\
    \ connected directly. Processes have a local timer that they use to measure timeout.\n\
    \n- **Network model:** The network is a message-passing network where a gossip\
    \ protocol is used for communication between processes. The standard BFT assumption\
    \ of *n* ≥ 3*f* + 1 applies here, which means that the protocol operates correctly\
    \ only if the number of nodes in the network stays more than 3F, where F is the\
    \ number of faulty nodes and N represents the total number of nodes in the network.\
    \ In practice, this means that there must be at least four nodes in a network\
    \ to tolerate Byzantine faults.\n\n- **Timing assumptions:** `Tendermint` assumes\
    \ a partially synchronous network. There is an unknown bound on the communication\
    \ delay, but it only applies after an unknown instance of time called global stabilization\
    \ time or GST.\n\n- **Security and cryptography:** The security assumption in\
    \ the system is that the public key cryptography used is secure. Also, the impersonation\
    \ or spoofing of identities is not possible. All messages on the network are authenticated\
    \ and verified via digital signatures. The protocol ignores any messages with\
    \ an invalid digital signature.\n\n- **State machine replication:** SMR is used\
    \ to achieve replication among the nodes. SMR ensures that all processes on the\
    \ network receive and process the same sequence of requests. In addition, the\
    \ agreement and order provide that the sequence in which the nodes have received\
    \ requests is the same on all nodes. Both requirements ensure the total order\
    \ in the system. The protocol only accepts valid transactions.\n\n`Tendermint`\
    \ solves consensus by fulfilling the properties listed as follows:\n\n- **Agreement**:\
    \ No two correct processes decide on different values.\n\n- **Termination**: All\
    \ correct processes eventually decide on a value.\n\n- **Validity**: A decided-upon\
    \ value is valid if it satisfies an application specific predefined predicate\
    \ denoted `valid( )`.\n\nState transition at processes in `Tendermint` depends\
    \ on the messages received and timeouts. The timeout mechanism guarantees liveness\
    \ and prevents indefinite waiting. Here, the assumption is that eventually, after\
    \ some period of asynchrony, there will be a synchronous communication period\
    \ during which all processes can communicate in a timely fashion, ensuring that\
    \ processes eventually decide on a value.\n\nA `Tendermint` protocol has three\
    \ types of messages: proposal, pre-vote, and pre-commit. These messages can be\
    \ viewed as equivalent to the PBFT protocol’s PRE-PREPARE, PREPARE, and COMMIT\
    \ messages:\n\n- **Proposal:** This message is used by the leader of the current\
    \ round to propose a value or block.\n\n- **Pre-vote:** This message is used to\
    \ vote on a proposed value.\n\n- **Pre-commit:** This message is also used to\
    \ vote on a proposed value.\n\nOnly the proposal message contains the original\
    \ value. The other two messages, pre-vote and pre-commit, use a value identifier\
    \ representing the initially proposed value.\n\nThere are three timeouts in the\
    \ protocol, corresponding to each message type:\n\n- `Timeout-propose`\n- `Timeout-prevote`\n\
    - `Timeout-precommit`\n\nThese timeouts prevent the algorithm from waiting indefinitely\
    \ for certain conditions to be met. They also ensure that processes make progress\
    \ through the rounds. A mechanism to increase timeout with every new round assures\
    \ that after reaching GST, the communication between correct processes eventually\
    \ becomes reliable, nodes can reach a decision, and protocol terminates.\n\nAll\
    \ processes maintain some necessary variables in the protocol:\n\n- **Step:**\
    \ This variable holds the current state of the `Tendermint` state machine in the\
    \ current round.\n\n- **lockedValue:** This variable stores the most recent value\
    \ (concerning the round number) for which a pre-commit message has been sent.\n\
    \n- **lockedRound:** This variable holds information about the last round where\
    \ the process sent a non-nil pre-commit message which implies that this is the\
    \ round where a possible decision value has been locked. This means that if a\
    \ proposal message and corresponding `2F + 1` messages have been received for\
    \ a value in a round, then, due to the reason that `2F + 1` pre-votes have already\
    \ been accepted for this value, this is a possible decision value.\n\n- **validValue:**\
    \ The role of the `validValue` variable is to store the most recent possible decision\
    \ value.\n\n- **validRound:** The `validRound` variable is the last round in which\
    \ `validValue` was updated.\n\n- **Height:** Stores the current consensus instance.\n\
    \n- Current round number\n\n- An array of decisions\n\n`Tendermint` proceeds in\
    \ rounds. Each round contains three phases: propose, pre-vote, pre-commit. The\
    \ algorithm works as follows:\n\n- Every round starts with a proposal value proposed\
    \ by a proposer. The proposer proposes a new value at the start of the first round\
    \ for each height.\n\n- Any subsequent rounds will only have a proposer proposing\
    \ a new value if there is no valid value already present, that is, null. Otherwise,\
    \ the `validValue`, the possible decision value, is proposed, already locked from\
    \ a previous round. The proposal message also includes a value denoting the last\
    \ valid round in which there was a valid value updated.\n\n- A correct process\
    \ accepts the proposal only if:\n  - The proposed value is valid.\n  - The process\
    \ has not locked on a value.\n  - Or the process has a value locked.\n\n- The\
    \ correct process accepts the proposal and sends a pre-vote message if the preceding\
    \ conditions meet.\n\n- If the conditions do not meet, the process will send a\
    \ pre-vote message with a nil value.\n\n- A timeout mechanism associated with\
    \ the proposal phase triggers timeout if a process has not sent a pre-vote message\
    \ in the current round or the timer expires in the proposal stage.\n\n- If a correct\
    \ process receives a proposal message with a valid value and `2F + 1` pre-vote\
    \ messages, it sends the pre-commit message.\n\n- Otherwise, it sends out a nil\
    \ pre-commit.\n\n- A timeout mechanism associated with the pre-commit will initialize\
    \ if the associated timer expires or if the process has not sent a pre-commit\
    \ message after receiving a proposal message and `2F + 1` pre-commit messages.\n\
    \n- A correct process decides on a value if it has received the proposal message\
    \ in some round and `2F + 1` pre-commit messages for the ID of the proposed value.\n\
    \n- This step also has an associated timeout mechanism, ensuring that the processor\
    \ does not wait indefinitely to receive `2F + 1` messages. If the timer expires\
    \ before the processor can decide, the processor starts the next round."
