    \ to sign the message with their individual keys; instead, it requires only one\
    \ public key and one private key to produce the digital signature. In a multisignature\
    \ scheme, the signed message contains digital signatures from all signers. It\
    \ requires verification individually by the verification party, but the verifier\
    \ must verify only one digital signature in threshold signatures. The key idea\
    \ in this scheme is to split the private key into multiple parts, and each signer\
    \ keeps its share of the private key. The signing process requires each user to\
    \ use their respective share of the private key to sign the message. A particular\
    \ communication protocol manages the communication between the signers.\n\nIn\
    \ contrast with multisignatures, the threshold signatures result in smaller transaction\
    \ sizes and are faster to verify. A downside, however, is that for threshold signatures\
    \ to work, all signers must remain online. In multisignature schemes, the signatures\
    \ can be delivered asynchronously. In other words, users can provide signatures\
    \ whenever available. One downside is that there could be a situation where users\
    \ may withhold their signature maliciously, resulting in a denial of service.\
    \ We can also use threshold signatures to provide anonymity in a blockchain network,\
    \ as individual signers are unidentifiable in multisignature schemes.\n\nFigure\
    \ [2-17](#515270_1_En_2_Chapter.xhtml#Fig17) shows the signing process on the\
    \ left-hand side, where an m number of different users, holding different parts\
    \ (shares) of a digital signature, sign a single transaction. When the validator\
    \ or verifier receives it, only one signature needs to be verified.\n\n![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig17_HTML.png)\n\
    \nAn illustration of the signing and verification process has transaction X by\
    \ users 1 to n and verification by the verifier, respectively.\n\nFigure 2-17\n\
    \nThreshold signatures"
  trans: "\n### ECDSA 签名\n\n`ECDSA` 是一种基于椭圆曲线的数字签名算法（DSA）。DSA 是数字签名的标准，基于模幂运算和离散对数问题。它被用于比特币和以太坊区块链平台，以验证消息并提供数据完整性服务。\n\
    \n现在，我们将描述 `ECDSA` 的工作原理。\n\n要使用 `ECDSA` 方案进行签名和验证，首先需要生成一个密钥对：\n\n1. 定义一条椭圆曲线\
    \ `E`，包含以下参数：\n   * 模数 `P`\n   * 系数 `a` 和 `b`\n   * 一个生成点 `A`，它构成一个素数为 `q` 的循环群\n\
    \n2. 随机选择一个整数 `d`，满足 `0 < d < q`。\n\n3. 计算公钥 `B`，使得 `B = dA`。\n   * 公共参数是一个六元组，形式如下所示：\n\
    \n     ```\n     Kpb = (p, a, b, q, A, B)\n     ```\n\n   * 私钥是在步骤 2 中随机选择的整数\
    \ `d`：\n\n     ```\n     Kpr = d\n     ```\n\n现在，可以使用私钥和公钥生成签名。\n\n1. 选择一个临时密钥\
    \ `Ke`，满足 `0 < Ke < q`。同时，确保 `Ke` 是随机的，并且任何两个签名都不会使用相同的密钥；否则，私钥可以被计算出来。\n\n2.\
    \ 通过 `R = Ke * A` 计算出一个值 `R`，即将生成点 `A` 与随机临时密钥相乘。\n\n3. 将点 `R` 的 `x` 坐标值赋给变量 `r`，使得\
    \ `r = xR`。\n\n4. 现在可以按如下方式计算签名：\n\n   ```\n   s = (h(m) + d·r) * Ke^(-1) mod\
    \ q\n   ```\n\n这里，`m` 是待签名的消息，`h(m)` 是消息 `m` 的哈希值。\n\n* `Xp = r mod q` 表示有效签名。\n\
    * `Xp ≠ r mod q` 表示无效签名。\n\n5. 签名验证按如下方式进行：\n   * 计算一个值 `w`，即 `w = s^(-1) mod\
    \ q`。\n   * 计算值 `u1 = w * h(m) mod q`。\n   * 计算值 `u2 = w * r mod q`。\n   * 计算点\
    \ `P`：\n\n     ```\n     P = u1 * A + u2 * B\n     ```\n\n6. 验证按如下方式进行：\n   *\
    \ 如果步骤 5 中计算出的点 `P` 的 `x` 坐标值与签名参数 `r mod q` 相同，则接受 `r, s` 为有效签名；即：\n\n     ```\n\
    \     xP == r mod q\n     ```\n\n至此，我们对数字签名，特别是 `ECDSA` 的介绍就完成了。`ECDSA` 在区块链网络（包括比特币、以太坊以及若干企业级链）中非常常用。现在我们描述一些其他的数字签名变体。\n\
    \n### 多重签名\n\n在这种方案中，由各自持有者持有的多个唯一密钥用于签署单个消息。在区块链实现中，多重签名方案允许多个用户签署一笔交易，从而增强安全性。此外，在区块链网络中，这些方案可用于让用户设置至少一个或多个签名来授权交易的条件。\n\
    \n例如，一个 1/2 多重签名方案可以代表一个联名账户，其中任一联名账户持有人需要签署交易以授权它。在另一种变体中，可以使用 2/2 多重签名，即两个联名账户持有人的签名都必须授权该交易。这个概念被推广为\
    \ m/n 签名，其中 `m` 是预期签名的最小数量，`n` 是签名的总数。\n\n该过程如图 2-16 所示。\n\n![分别展示了由用户 1 到 n 对交易\
    \ X 进行签名，以及由验证者进行验证的签名和验证过程示意图。](img/515270_1_En_2_Fig16_HTML.png)\n\n**图 2-16**\
    \ 多重签名方案\n\n图 2-16 左侧展示了签名过程，其中 `m` 是不同用户的数量，他们持有 `m` 个唯一签名来签署单个交易。当验证者收到它时，需要逐一验证其中的所有签名。\n\
    \n### 门限签名\n\n这种方案不依赖用户使用各自的密钥签署消息；相反，它只需要一个公钥和一个私钥来生成数字签名。在多重签名方案中，签名的消息包含所有签名者的数字签名，要求验证方逐一验证，但在门限签名中，验证者只需验证一个数字签名。该方案的核心思想是将私钥分割成多个部分，每个签名者保留其私钥份额。签名过程要求每个用户使用其各自的私钥份额来签署消息。一个特定的通信协议管理签名者之间的通信。\n\
    \n与多重签名相比，门限签名产生的交易规模更小，验证速度更快。然而，一个缺点是为了使门限签名生效，所有签名者必须保持在线。在多重签名方案中，签名可以异步提交。换句话说，用户可以在方便时提供签名。一个缺点是可能出现用户恶意扣留签名的情况，从而导致拒绝服务。我们也可以使用门限签名在区块链网络中提供匿名性，因为在多重签名方案中，单个签名者是无法识别的。\n\
    \n图 2-17 左侧展示了签名过程，其中 `m` 个不同用户持有数字签名的不同部分（份额），签署单个交易。当验证者收到它时，只需要验证一个签名。\n\n\
    ![分别展示了由用户 1 到 n 对交易 X 进行签名，以及由验证者进行验证的签名和验证过程示意图。](img/515270_1_En_2_Fig17_HTML.png)\n\
    \n**图 2-17** 门限签名\n"
- fmt: '### Aggregate Signatures


    Aggregate signatures reduce the size of digital signatures. This scheme is beneficial
    in scenarios where multiple digital signatures are in use. The core idea is to
    aggregate multiple signatures into a single signature without increasing the size
    of the signature of a single message. It is simply a type of digital signature
    that supports aggregation.


    The small aggregate signature is enough to prove to the verifier that all users
    signed their original messages. Thus, aggregate signatures are commonly used to
    reduce the size of messages in network and security protocols. For example, we
    can significantly reduce the size of digital certificate chains in Public Key
    Infrastructure (PKI) by compressing all signatures in the chain into a single
    signature. `Boneh-Lynn-Shacham` (BLS) aggregate signatures are a typical example
    of the aggregate signature. BLS has also been used in various blockchains and
    especially in Ethereum 2.0.


    Schnorr signatures are another type of signature based on elliptic curve cryptography
    that allows key and signature aggregation. Schnorr signatures are 64 bytes in
    size as compared to ECDSA, which is 71 bytes in signature size. ECDSA’s private
    key size is 32 bytes and its public key is 33 bytes, whereas the Schnorr scheme’s
    private and public keys are 32 bytes in size. Overall, Schnorr signatures are
    smaller and faster than ECDSA.


    Figure [2-18](#515270_1_En_2_Chapter.xhtml#Fig18) shows how the aggregate signatures
    work.


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig18_HTML.png)


    A workflow of the aggregate signature. Signatures 1 to 3 point to the aggregate
    function that points to the aggregate signature.


    Figure 2-18


    Aggregate signatures


    Schnorr signatures are proposed to be used in Bitcoin under Bitcoin Improvement
    Proposal (BIP) 340.


    ### Ring Signatures


    Ring signature schemes are mechanisms where any member of a group of signers can
    sign a message on behalf of the entire group. Each member of the ring group keeps
    a public key and a private key. The key point here is that the identity of the
    actual signer who signed the message must remain unknown (computationally infeasible
    to determine) to an outside observer. It looks equally likely that anyone from
    the trusted group of signers could have signed the message, but it is not possible
    to figure out the individual user who signed the message. Thus, we can use ring
    signatures to provide an anonymity service.


    ## Hash Functions


    Hash functions are keyless primitives which create fixed-length digests of arbitrarily
    long input data. There are three security properties of hash functions.


    ### Preimage Resistance


    This property is also called a one-way property. It can be explained by using
    the simple equation:


    ```

    h(x)=y

    ```


    where `h` is the hash function, `x` is the input, and `y` is the output hash.
    The first security property requires that `y` cannot be reverse-computed to `x`.
    `x` is the preimage of `y`, thus the name preimage resistance. This property is
    depicted in Figure [2-19](#515270_1_En_2_Chapter.xhtml#Fig19).


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig19_HTML.png)


    An illustration of the pre-image resistance. An input x is sent through a hash
    function h, and an output y is obtained.


    Figure 2-19


    Preimage resistance


    ### Second Preimage Resistance


    This property is also known as the weak collision resistance property. This property
    ensures that given `x` and `h(x)`, it is almost impossible to find any other message
    `m`, where `m ≠ x` and hash of `m` = hash of `x` or `h(m) = h(x)`. This property
    is shown in Figure [2-20](#515270_1_En_2_Chapter.xhtml#Fig20).


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig20_HTML.png)


    An illustration of a second pre-image resistance. Inputs x and unknown z are sent
    through a hash function h, and output y 1 equals y 2 is obtained.


    Figure 2-20


    Second preimage resistance


    ### Collision Resistance


    The collision resistance property requires that two different input messages should
    not hash to the same output. In other words, `h(x) ≠ h(z)`. Figure [2-21](#515270_1_En_2_Chapter.xhtml#Fig21)
    shows a depiction of collision resistance.


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig21_HTML.png)


    An illustration of the collision resistance. Unknown inputs x and z are sent through
    a hash function h, and output y 1 equals y 2 is obtained.


    Figure 2-21


    Strong collision resistance


    In addition, there are two functional properties of hash functions:


    *   Compression of arbitrary size data into a fixed-length digest

    *   Easy to compute


    Hash functions, due to their very nature, are always expected to have collisions,
    where two different messages hash to the same output, but in a good hash function,
    collisions must be computationally infeasible to find.


    Moreover, hash functions should also have a property that a small change, even
    a single character change in the input text, should result in an entirely different
    hash output. This is known as the avalanche effect.


    Hash functions are usually designed by using the iterated hash function method,
    where the input data is divided into equal block sizes and then they are processed
    iteratively through the compression functions.


    Some prominent approaches to build hash functions using iterative methods are
    listed as follows:


    *   Merkle-Damgard construction

    *   Sponge construction


    The most common hash function schemes are SHA-0, SHA-1, SHA-2, SHA-3, RIPEMD,
    and Whirlpool.


    ### Design of Secure Hash Algorithms (SHA)


    In this section, we will introduce the design of SHA-256 and SHA-3. Both are used
    in Bitcoin and Ethereum, respectively. However, Ethereum uses Keccak, the original
    algorithm presented to NIST, rather than NIST standard SHA-3. NIST, after some
    modifications, such as an increase in the number of rounds and simpler message
    padding, standardized Keccak as SHA-3.


    #### Design of SHA-256


    SHA-256 has an input message size limit of `2^64 − 1` bits. The block size is
    512 bits, and it has a word size of 32 bits. The output is a 256-bit digest.


    The compression function processes a 512-bit message block and a 256-bit intermediate
    hash value. There are two main components of this function: the compression function
    and a message schedule.


    The algorithm works as follows, in nine steps.


    ##### Preprocessing


    *   Padding of the message is used to adjust the length of a block to 512 bits
    if it is smaller than the required block size of 512 bits.

    *   Parsing the message into message blocks, which ensures that the message and
    its padding are divided into equal blocks of 512 bits.

    *   Setting up the initial hash value, which consists of the eight 32-bit words
    obtained by taking the first 32 bits of the fractional parts of the square roots
    of the first eight prime numbers. These initial values are fixed and chosen to
    initialize the process. They provide a level of confidence that no backdoor exists
    in the algorithm.'
