  trans: '

    ### 工作量证明的教育性解释


    设想一个场景：某个节点提出一个区块，并将其广播到网络。收到该区块的节点可以执行两种操作：要么接受该区块并将其追加到本地区块链，要么在区块无效时拒绝它。再设想该区块确实是有效的，那么接收节点可以直接接受它，并就提议的区块达成一致。假设整个系统中只有一个提议节点，并且该节点诚实可信，这意味着实际上并不需要真正的共识；提议节点只需提出新区块，其他节点同意即可，最终形成包含交易的区块的全序列表。但这是一个中心化系统，存在一个可信的第三方，只要它保持诚实，作为领导者就能驱动整个系统，因为所有节点都信任它。但如果它变作恶意节点，那就有问题了。


    或许，我们可以允许其他节点也提议区块，从而剥夺这个不可信节点的控制权。假设现在我们有两个节点提议有效区块并广播到网络，这就出现了一个问题：部分接收节点会先添加一个区块再添加另一个，有些节点则不知道接受哪个或拒绝哪个。由于提议是同时发出的，节点不知道应该插入哪个区块；也许它们会同时插入两个。结果，有些节点只添加了提议者
    1 的区块，有些只添加了提议者 2 的区块，还有一些则两者都添加。可想而知，这里并没有达成共识。


    再设想另一个场景：两个节点同时宣布一个区块；于是接收节点会收到两个区块，此时不再是一条链，而是出现两条链。换句话说，存在两条事件日志和历史记录。两个节点同时提出了区块；所有节点都添加了两个区块。现在不再是单链，而是形成了一棵树，有两个分支。这被称为分叉。换言之，如果节点同时得知两个指向同一父区块的不同区块，那么区块链就会分叉为两条链。


    为了解决这个问题，我们可以允许节点选择当前所知的最长链，将新区块追加到该链上，并忽略另一个分支。如果碰巧有两个或更多分支高度相同（长度相等），则随机选择其中一条链，将新区块添加到该链上。这样就能解决分叉问题。所有节点知道“只允许最长链添加新区块”这一规则后，会持续构建最长链。若遇到两条或更多等长链，则随机将区块添加到其中任意一条。到目前为止，一切顺利！这种方案似乎可行。节点决定将新区块添加到随机选择的链上，并将该决定传播给其他节点，其他节点也将同一区块添加到自己的链中。随着时间的推移，最长链会胜出，较短的链则因为没有新区块添加而被忽略，因为它不是最长链。


    但现在又出现另一个问题。设想一个场景：某个节点在分叉后随机选择了一条链，添加了一个区块，并将该决定传播给其他节点，其他节点也添加了该区块。此时，由于网络延迟，有些节点并未得知该决定。一些节点将来自另一个节点的区块添加到自己的某条链中，另一个节点则采取相反操作，如此循环。现在可以清楚地看到，两条链都在不断获得新区块。共识无法达成。出现了活锁情况，节点可以持续向两条链添加区块。


    至此，让我们思考一下根本原因是什么，以及为什么会出现这种活锁。原因是区块生成速度太快，其他节点从不同节点收到许多不同的区块，有些快有些慢。这种异步性导致了活锁。解决方案是什么？放慢速度！给节点时间收敛到一条链上！我们来看看如何实现。


    我们可以引入一个随机等待时间，让矿工任意休眠一段时间后再挖矿。这里的关键洞察是，活锁（持续分叉）问题可以通过在每个节点引入一个可变速定时器来解决。当节点向自己的链添加新区块时，它会停止定时器并将该区块发送给其他节点。其他节点正在等待自己的定时器到期，但在等待期间，如果它们从另一个节点得知了这个新区块，就会停止自己的定时器，添加这个新区块，然后重置定时器并重新开始等待。这样，链上只会添加一个区块，而不是两个。如果定时器时间足够长，那么分叉和活锁的几率就会显著降低。另需注意，如果系统中节点数量很多，那么某个定时器提前到期的可能性就会更高，而且随着节点数量不断增加，这种情况发生的概率会增大，因为定时器是随机的且节点数量众多。为了再次避免同样的活锁情况，我们需要在节点增加时延长这些定时器的休眠时间，从而将节点快速添加区块的概率降低到只有某个节点最终成功为链添加新区块并广播到网络的程度。同时，等待时间还能以高概率确保分叉在这个等待期内得到解决。这段时间足以确保新区块完全传播，使得同一高度不再有其他区块被提出。


    比特币根据每 2016 个区块的出块速率来选择这个超时时间，大约相当于两周。由于出块速率大约应为每十分钟一个区块，如果协议观察到近两周出块速度过快，就会增加超时值，从而降低出块速度。如果协议观察到出块速度过慢，则会减小超时值。这个超时机制存在一个问题：如果某个节点变作恶意节点，总是设法让自己的定时器比其他节点更早到期，那么该节点每次都会创建区块。因此，我们需要构建一种能够抵抗此类作弊行为的定时器。一种方法是构建一个具有密码学安全保证的信任机制，充当安全飞地来运行定时器代码。这样，借助密码学的保障，恶意节点可能无法欺骗定时器始终提前到期。


    该技术被用于超级账本英特尔锯齿湖区块链中的`PoET`（消逝时间证明）算法。我们将在第 8 章讨论这一点。

    '
- fmt: '另一种方式是中本聪设计算法的原始方式：让计算机执行一项计算量很大的任务，这项任务需要花费时间来解决——时间正好足够让区块几乎每十分钟被挖出一个。同时，该任务的设计方式使得节点无法作弊，只能尝试去求解。任何偏离求解方法的做法都无济于事，因为解决问题的唯一途径是穷举所有可能的答案，并与预期答案进行匹配。如果某个答案与预期答案匹配，问题就得以解决；否则，计算机必须尝试下一个答案，并持续以暴力（`brute-force`）方式进行，直到找到答案为止。这是中本聪的卓越洞见，它以高概率确保计算机无法作弊，并且计时器几乎每十分钟才到期，从而赋予其中一个节点将其区块添加到区块链的权利。这就是所谓的工作量证明（`proof
    of work`），意味着某个节点已经完成了足够的工作，以证明它投入了足够的计算能力来解决数学问题，从而赢得在区块链中插入新区块的权利。


    工作量证明基于密码学哈希函数。它要求区块若要有效，其哈希值必须小于一个特定值。这意味着区块的哈希值必须以一定数量的零开头。找到这样一个哈希值的唯一方法是反复尝试每一个可能的哈希值，并检查它是否满足条件；如果不满足，则继续尝试，直到某个节点找到这样的哈希值。这意味着，要找到一个有效的哈希值，大约需要十分钟，从而引入刚好足够的延迟，使得分叉得以解决并收敛到同一条链上，同时最大限度地减少每次某个节点赢得创建新区块权利的机会。


    现在很容易看出，工作量证明是一种机制，用于在区块创建之间引入等待时间，并确保最终只有一个领导者出现，可以将新区块插入到链中。


    因此，准确地说，`PoW`并不是一个共识算法；它是一个共识促进算法，通过减慢区块生成速度，使得节点能够收敛到一条共同的区块链上。


    在我们理解了工作量证明机制背后的直觉之后，接下来将描述工作量证明算法在比特币中究竟是如何工作的。


    ### `PoW`公式


    `PoW`共识过程可以用一个公式来描述：


    ```

    SHAd256( nonce || Block header ) <= target

    ```


    其中，`SHAd256`表示对数据进行两次`SHA-256`哈希运算。换句话说，双`SHA-256`意味着对输入的哈希值再取一次哈希。区块头由版本（`Version`）、前一个区块的哈希（`hashPrevBlock`）、`Merkle`根哈希（`hashMerkleRoot`）、时间戳（`Time`）、难度目标（`Bits`）以及随机数（`Nonce`）组成。`Nonce`是一个任意数字，会被反复更改并输入到工作量证明算法中，以检查其结果是否小于或等于难度目标。


    目标值是根据挖矿难度计算得出的，难度每`2016`个区块调整一次，大约相当于两周的时间。如果矿工挖矿太快——比如说每八分钟就能生成一个区块，而不是十分钟——这意味着哈希算力过剩；因此，作为一种调节机制，难度会上升。如果矿工在之前的`2016`个区块中生成区块的速度太慢，比如每`12`分钟一个区块，那么速度慢于预期，因此难度会向下调整。让我们来看一些公式。


    首先，比特币的难度公式会根据前`2016`个区块的生成速率，计算接下来`2016`个区块的新难度。公式为：


    ```

    New difficulty = ( previous difficulty * 2016 * 10 minutes ) / ( time to mine
    most recent 2016 blocks )

    ```


    这个公式本质上调节了区块链，使其平均每十分钟产生一个新块。


    现在，为了计算目标值，首先使用以下公式计算难度：


    ```

    difficulty = ( possible target ) / ( current target )

    ```


    最后，使用以下公式计算目标值：


    ```

    target = ( possible target ) / ( difficulty )

    ```


    既然我们已经确立了目标值的计算方法，接下来让我们看看矿工们做什么，以及他们如何找到满足上述等式的哈希值，也就是说，对区块进行哈希运算后得到的值小于目标值。换句话说，区块哈希必须匹配一个特定的模式，即哈希值以一定数量的零开头。这也被称为部分哈希逆问题。这个问题的目标是找到双重`SHA-256`哈希函数的一个部分原像，唯一找到它的方法（如果能找到的话）是逐一尝试不同的输入，直到某个输入生效。


    从根本上说，比特币挖矿就是寻找一个随机数的过程，当这个随机数与一个区块拼接后，使用`SHA-256`哈希函数进行两次哈希运算，产生一个以特定数量零开头的数字。


    那么，矿工们具体做什么呢？'
  raw: 'Another way, the original way, Nakamoto designed the algorithm is to make
    computers do a computationally complex task which takes time to solve – just enough
    to be able to solve it almost every ten minutes. Also, the task is formulated
    in such a way that nodes cannot cheat, except to try to solve the problem. Any
    deviation from the method of solving the problem will not help, as the only way
    to solve the problem is to try every possible answer and match it with the expected
    answer. If the answer matches with the expected answer, then the problem is solved;
    otherwise, the computer will have to try the next answer and keep doing that in
    a brute-force manner until the answer is found. This is a brilliant insight by
    Satoshi Nakamoto which ensures with high probability that computers cannot cheat,
    and timers only expire almost every ten minutes, giving one of the nodes the right
    to add its block to the blockchain. This is the so-called proof of work, meaning
    a node has done enough work to demonstrate that it has spent enough computational
    power to solve the math problem to earn the right to insert a new block to the
    blockchain.


    Proof of work is based on cryptographic hash functions. It requires that for a
    block to be valid, its hash must be less than a specific value. This means that
    the hash of the block must start with a certain number of zeroes. The only way
    to find such a hash is to repeatedly try each possible hash and see if it matches
    the criterion; if not, then try again until one node finds such a hash. This means
    that in order to find a valid hash, it takes roughly ten minutes, thus introducing
    just enough delay which results in resolving forks and convergence on one chain
    while minimizing the chance of one node winning the right to create a new block
    every time.


    Now it is easy to see that proof of work is a mechanism to introduce waiting time
    between block creation and ensuring that only one leader eventually emerges, which
    can insert the new block to the chain.


    So, it turns out that PoW is not, precisely speaking, a consensus algorithm; it
    is a consensus facilitation algorithm which, due to slowing down block generations,
    allows nodes to converge to a common blockchain.


    Now as we understand the intuition behind the proof of work mechanism, next we
    will describe how exactly the proof of work algorithm works in Bitcoin.


    ### PoW Formula


    The PoW consensus process can be described with the help of a formula:


    ![$$ SHAd256\left(\ nonce\ \Big\Vert\ Block\ header\ \right)\le target $$](images/515270_1_En_5_Chapter/515270_1_En_5_Chapter_TeX_Equa.png)


    where *SHAd*256 represents a SHA-256 hash twice. In other words, double SHA-256
    means the hash of the hash of the input. A block header consists of Version, hashPrevBlock,
    hashMerkleRoot, Time, Bits (difficulty target), and Nonce. Nonce is an arbitrary
    number that is repeatedly changed and fed into the proof of work algorithm to
    see if it results in a value which is less than or equal to the difficulty target.


    The target value is calculated from the mining difficulty which changes every
    2016 blocks, which is equivalent to roughly two weeks. If miners are mining too
    fast – let’s say every eight minutes, they manage to generate a block instead
    of ten minutes – it means there is too much hash power; therefore, as a regulation
    mechanism, the difficulty goes up. If miners are producing blocks over the course
    of the previous 2016 blocks too slowly, say 1 block every 12 minutes, then it
    is slower than expected; therefore, the difficulty is regulated down. Let’s go
    through some formulas.


    First, Bitcoin’s difficulty formula calculates the new difficulty for the next
    2016 blocks based on the rate of block generation of the previous 2016 blocks.
    The formula is


    ![$$ New\ difficulty=\frac{\left( previous\ difficulty\times 2016\times 10\ minutes\right)}{\left(
    time\ to ok\ to\ mine\ most\ recent\ 2016\ blocks\right)} $$](images/515270_1_En_5_Chapter/515270_1_En_5_Chapter_TeX_Equb.png)


    This formula basically regulates the blockchain to produce new blocks roughly
    at a mean rate of ten minutes.


    Now in order to calculate the target, first calculate the difficulty using the
    following formula:


    ![$$ difficulty=\frac{\left( possible\ target\ \right)}{\left( current\ target\right)}
    $$](images/515270_1_En_5_Chapter/515270_1_En_5_Chapter_TeX_Equc.png)


    Finally, the target is calculated using the following formula:


    ![$$ target=\frac{\left( possible\ target\ \right)}{(difficulty)} $$](images/515270_1_En_5_Chapter/515270_1_En_5_Chapter_TeX_Equd.png)


    Now that we have established how the target value is calculated, let’s see what
    miners do and how they find a hash which satisfies the preceding equation, that
    is, the value obtained after hashing the block is less than the target value.
    In other words, the block hash must match a specific pattern where the hash starts
    with a certain number of zeroes. This is also known as the partial hash inversion
    problem. This problem is to find a partial preimage to the double SHA-256 hash
    function, which can only be found (if ever) by trying different inputs one by
    one until one of the inputs works.


    Fundamentally, Bitcoin mining is the process of finding a nonce that, when concatenated
    with a block and hashed twice using the SHA-256 hash function, produces a number
    which starts with a specific number of zeroes.


    So, what do miners do?'
