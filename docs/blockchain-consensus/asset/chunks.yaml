  trans: '

    # 链路故障


    链路可能发生崩溃故障，即正常运行的链路可能突然停止传输消息。另一种链路故障是遗漏故障，即链路只传输部分消息，而部分消息丢失。最后，链路上还可能发生拜占庭故障或任意故障，此时链路可能创建伪造消息、篡改消息，并有选择性地投递部分消息，而忽略其他消息。


    根据此模型，我们可以根据链路的故障方式和消息投递方式，将通信链路划分为不同类型。


    链路上（通道中）会发生两种类型的事件：**发送事件**，即消息被放入链路；**投递事件**，即链路分发消息，并由进程*接收*。


    ## 公平丢失链路


    在此抽象中，我们描述消息如何在链路上丢失、重复或乱序。消息可能会丢失，但如果发送方和接收方进程都正确，且发送方持续重传，消息最终会被投递。更正式地说，其三个属性如下。


    ### 公平丢失


    该属性保证具有此属性的链路不会系统性地丢弃每条消息。这意味着，即使需要多次重传，消息最终也能成功投递到目标节点。


    ### 有限重复


    该属性确保网络不会进行比发送方更多的重传操作。


    ### 无捏造


    该属性确保网络不会篡改消息，也不会凭空创建消息。


    ## 顽固链路


    此抽象描述了链路的行为：链路会无限次地投递任何已发送的消息。此抽象中关于进程的假设是，发送方和接收方进程都是正确的。这种类型的链路会顽固地尝试投递消息，而不考虑性能。链路会持续尝试，直到消息被投递。


    正式来说，顽固链路具有两个属性。


    ### 顽固投递


    该属性意味着，如果一条消息 `m` 从正确的进程 `p` 发送一次给正确的进程 `q`，那么进程 `q` 将无限次地投递该消息，因此得名“顽固”！


    ### 无捏造


    这意味着消息不会凭空产生，如果某个进程投递了一条消息，那么该消息必然是由某个进程发送的。正式来说，如果进程 `q` 投递了一条来自进程 `p` 的消息 `m`，那么该消息
    `m` 确实是从进程 `p` 发送给进程 `q` 的。


    ## 完美（可靠）链路


    这是最常见的链路类型。在这种链路中，如果某个进程发送了一条消息，那么该消息最终将被投递。


    在实践中，`TCP` 是一种可靠链路。它有三个属性。


    ### 可靠投递


    如果一条消息 `m` 由正确的进程 `p` 发送给正确的进程 `q`，那么 `m` 最终会被 `q` 投递。


    ### 无重复


    正确的进程 `p` 不会多次投递同一条消息 `m`。


    ### 无捏造


    该属性确保消息不会凭空产生，如果消息被投递，那么它们一定是在投递之前由正确的进程创建并发送的。


    ## 日志式完美链路


    这种链路将消息投递到接收方的本地消息日志或持久化存储中。这在接收方可能崩溃，但我们仍需确保消息安全的场景中非常有用。在这种情况下，即使接收方进程崩溃，消息也不会丢失，因为它已持久化存储在本地存储中。


    ## 认证完美链路


    这种链路保证从进程 `p` 发送给进程 `q` 的消息 `m` 确实是由进程 `p` 发送的。


    ## 任意链路


    在此抽象中，链路可以表现出任何行为。这里，我们考虑一个能够控制消息的活跃敌手。该链路描述了攻击者可能执行恶意操作、篡改消息、重放消息或伪造消息的场景。简而言之，在这种链路上，任何攻击都是可能的。


    在实际应用中，这代表了典型的互联网连接，黑客可以窃听、篡改、伪造或重放消息。当然，这也可能是由互联网蠕虫、流量分析器和病毒引起的。


    注意：这里我们只讨论点对点链路；我们将在后面的第 3 章中介绍广播。


    ## 同步性与时序


    在分布式系统中，延迟和速度假设描述了网络的行为。


    在实际应用中，分布式系统中延迟几乎不可避免，首先是由于固有的异步性、分散性、异构性，以及消息丢失、处理器缓慢、网络拥塞等具体原因。由于网络配置的变化，分布式系统中还可能出现意外或新的延迟。


    分布式系统中的同步性假设关注的是网络延迟和由慢速网络链路或慢速处理器速度引起的处理器延迟。


    在实际应用中，处理器可能因为节点内存耗尽而变慢。例如，Java 程序在“停止世界”类型的垃圾回收期间可能会完全暂停执行。另一方面，一些高端处理器天生就比资源受限设备上的低端处理器快。所有这些差异和情况都可能导致分布式系统出现延迟。


    下面，我们讨论三种同步性模型，它们描述了分布式系统的时序假设。


    ### 同步


    同步分布式系统对消息到达一个节点所需的时间有已知的上限。这种情况是理想的。然而，在实践中，消息有时可能会延迟。即使在完美的网络中，也存在诸多因素，例如网络链路质量、网络延迟、消息丢失、处理速度或处理器容量，这些都可能对消息的投递产生不利影响。


    在实践中，存在同步系统，例如片上系统（`SoC`）、嵌入式系统等。


    ### 异步


    异步分布式系统则处于另一个极端。在这种模型中，不对时序做任何假设。换言之，传递消息所需的时间没有上限。节点中的消息投递或处理可能存在任意长且无界的延迟。进程可以以不同的速度运行。


    此外，一个进程可以任意暂停或延迟执行，或者比其他进程处理得更快。你现在大概可以想象，为此类系统设计的分布式算法可以非常健壮和具有弹性。然而，许多问题在异步分布式系统中是无法解决的。有一整类被称为“不可能性结果”的结论，描述了分布式系统中无法解决的问题。我们将在本章后面以及第
    3 章中更详细地探讨不可能性结果。由于许多类型的问题在异步模型中无法解决，而同步模型又过于理想化，我们必须做出妥协。这种妥协被称为部分同步网络。

    '
- fmt: '### Partially Synchronous


    A partially synchronous model captures the assumption that the network is primarily
    synchronous and well behaved, but it can sometimes behave asynchronously. For
    example, processing speeds can differ, or network delays can occur, but the system
    ultimately returns to a synchronous state to resume normal operation.


    Another way to think about this is that the network usually is synchronous but
    can unpredictably, for a bounded amount of time, behave asynchronously, but there
    are long enough periods of synchrony where the system behaves correctly.


    Another way to think about this is that real systems are synchronous most of the
    time but can behave arbitrarily and unpredictably asynchronous at times. During
    the synchronous period, the system is able to make decisions and terminate.


    In summary, we can quote Leonardo da Vinci:


    > *Time stays long enough for anyone who will use it.*


    Figure [1-15](#515270_1_En_1_Chapter.xhtml#Fig15) shows how a partially synchronous
    network behaves.


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig15_HTML.png)


    A graph plots processor delay versus time with a sinusoidal curve. The curve is
    sectioned as synchronous and asynchronous.


    Figure 1-15


    Partially synchronous network


    ### Eventually Synchronous


    In the eventually synchronous version of partial synchrony, the system can be
    initially asynchronous, but there is an unknown time called global stabilization
    time (GST), unknown to processors, after which the system eventually becomes synchronous.
    Also, it does not mean that the system will forever remain synchronous after GST.
    That is not possible practically, but the system is synchronous for a long enough
    period after GST to make a decision and terminate.


    We can visualize the spectrum of synchrony models from asynchronous to synchronous
    in Figure [1-16](#515270_1_En_1_Chapter.xhtml#Fig16).


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig16_HTML.png)


    A schematic with a double-headed arrow labeled synchronous on the right and asynchronous
    on the left, with partially synchronous in the center.


    Figure 1-16


    Synchrony models in distributed systems


    Both message delivery delay and relative speed of the processes are taken into
    consideration in synchrony models.


    #### Formal Definitions


    Some formal definitions regarding the partial synchrony model are stated as follows:


    - Delta `Δ` denotes a fixed upper bound on the time required for a message to
    reach from one processor to another.

    - Phi `Φ` denotes a fixed upper bound on the relative speed of different processors.

    - GST is the global stabilization time after which the system behaves synchronously.


    With these preceding variables defined, we can define various models of synchrony
    as follows:


    - Asynchronous systems are those where no fixed upper bounds `Δ` and `Φ` exist.

    - Synchronous systems are those where fixed upper bounds `Δ` and `Φ` are known.


    Partially synchronous systems can be defined in several ways:


    - Where fixed upper bounds `Δ` and `Φ` exist, but they are not known.

    - Where fixed upper bounds `Δ` and `Φ` are known but hold after some unknown time
    T. This is the eventually synchronous model. We can say that eventually synchronous
    model is where fixed upper bounds `Δ` and `Φ` are known but only hold after some
    time, known as GST.

    - In another variation after GST `Δ` holds for long enough to allow the protocol
    to terminate.


    We will use synchrony models more formally in Chapter [3](#515270_1_En_3_Chapter.xhtml)
    in the context of circumventing FLP and consensus protocols. For now, as a foundation
    the concepts introduced earlier are sufficient.


    Figure [1-17](#515270_1_En_1_Chapter.xhtml#Fig17) shows synchronous vs. asynchronous
    communication using a space-time diagram.


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig17_HTML.png)


    Two schematics each with 3 lines, P, Q, and R, and multi-directional arrows. The
    right has no upper bounds and the left has known upper bounds.


    Figure 1-17


    Synchronous and asynchronous system


    Now that we have discussed the synchrony model, let’s now turn our attention to
    the adversary model, which allows us to make assumptions about the effect of adversary
    on a distributed system. In this model, we model how an adversary can behave and
    what powers an adversary may have in order to adversely influence the distributed
    system.


    ### Adversary Model


    In addition to assumptions about synchrony and timing in a distributed system
    model, there is another model where assumptions about the power of the adversary
    and how it can adversely affect the distributed system are made. This is an important
    model which allows a distributed system designer to reason about different properties
    of the distributed system while facing the adversary. For example, a distributed
    algorithm is guaranteed to work correctly only if less than half of the nodes
    are controlled by a malicious adversary. Therefore, adversary models are usually
    modelled with a limit to what an adversary can do. But, if an adversary is assumed
    to be all-powerful who can do anything and control all nodes and communication
    links, then there is no guarantee that the system will ever work correctly.


    Adversary models can be divided into different types depending on the distributed
    system and the influence they can have on the distributed system and adversely
    affect them.


    In this model, it is assumed there is an external entity that has corrupted the
    processes and can control and coordinate faulty processes’ actions. This entity
    is called an adversary. Note that there is a slight difference compared to the
    failure model here because, in the failure model, the nodes can fail for all sorts
    of reasons, but no external entity is assumed to take control of processes.


    Adversaries can affect a distributed system in several ways. A system designer
    using an adversary model considers factors such as the **type of corruption**,
    **time of corruption**, and **extent of corruption** (how many processes simultaneously).
    In addition, **computational power** available to the adversary, **visibility**,
    and **adaptability** of the adversary are also considered. The adversary model
    also allows designers to specify to what limit the number of processes in a network
    can be corrupted.


    We will briefly discuss these types here.


    #### Threshold Adversary


    A threshold adversary is a standard and widely used model in distributed systems.
    In this model, there is a limit imposed on the number of overall faulty processes
    in the system. In other words, there is a fixed upper bound `f` on the number
    of faulty processes in the network. This model is also called the global adversary
    model. Many different algorithms have been developed under this assumption. Almost
    all of the consensus protocols work under at least the threshold adversary model
    where it is assumed that an adversary can control up to `f` number of nodes in
    a network. For example, in the Paxos protocol discussed in Chapter [7](#515270_1_En_7_Chapter.xhtml),
    classical consensus algorithms achieve consensus under the assumption that an
    adversary can control less than half of the total number of nodes in the network.


    #### Dynamic Adversary


    Also called adaptive adversary, in this model the adversary can corrupt processes
    anytime during the execution of the protocol. Also, the faulty process then remains
    faulty until the execution ends.


    #### Static Adversary


    This type of adversary is able to perform its adversarial activities such as corrupting
    processes only before the protocol is executed.'
