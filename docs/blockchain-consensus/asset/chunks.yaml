- fmt: "# Distributed Algorithm\n\nA distributed algorithm runs on multiple computers\
    \ concurrently to accomplish something in a distributed system. In a distributed\
    \ system, the same algorithm runs on all computers concurrently to achieve a common\
    \ goal.\n\nIn contrast with a sequential algorithm where each operation in execution\
    \ comes one after another, distributed algorithms are algorithms where the operations\
    \ are performed concurrently. Concurrent algorithms and concurrency are quite\
    \ common in computing, for example, multiple threads running simultaneously in\
    \ a processor, multiple applications running in a computer, multicore processors\
    \ in a computer, or multiple processes running concurrently in a distributed system.\n\
    \nWe can define a distributed algorithm as an algorithm that runs concurrently\
    \ on multiple machines.\n\nThere are several advantages of distributed algorithms,\
    \ including but not limited to better performance where some computation can be\
    \ parallelized to achieve higher performance as compared to sequential algorithms.\
    \ In addition, distributed algorithms allow for fault tolerance; for example,\
    \ if a certain threshold (which we will explain in Chapter [3](#515270_1_En_3_Chapter.xhtml))\
    \ of nodes fails, the distributed algorithms continue to operate.\n\nThere are\
    \ message-passing algorithms where processes communicate over the network by sending\
    \ and receiving messages. Another type is shared memory distributed algorithms,\
    \ where the algorithms communicate by reading and writing from shared memory.\n\
    \nCentralized algorithms execute sequentially, whereas distributed algorithms\
    \ execute concurrently. Centralized algorithms are not usually characterized by\
    \ failures, whereas distributed algorithms are designed to tolerate various types\
    \ of failures. Sequential algorithms tend to be more intuitive as they are designed\
    \ for sequential execution, whereas distributed algorithms can be challenging\
    \ to understand. This is one of the reasons why the correctness proofs of centralized\
    \ algorithms are comparatively easier to do and, in most cases, even apparent\
    \ by observation. This is not the case in distributed algorithms, where correctness\
    \ can be deceiving. A seemingly correct algorithm may not behave correctly in\
    \ practice and could be subject to various failures and violations of properties.\
    \ For this purpose, several formal specifications and verification techniques\
    \ are used to ascertain the correctness of distributed algorithms. We will cover\
    \ some of these methods in Chapter [9](#515270_1_En_9_Chapter.xhtml). Distributed\
    \ algorithms tend to be more challenging to design, debug, and implement as compared\
    \ to sequential algorithms. Moreover, from a complexity measure point of view,\
    \ it's generally the measure of the number of instructions in a sequential centralized\
    \ algorithm; however, the complexity of distributed algorithms is measured in\
    \ the number of messages.\n\n# Elements of Distributed Computing/Pertinent Terms/Concepts\n\
    \nA distributed system is composed of several elements. We are only interested\
    \ in an abstracted view of the system instead of specific hardware or network\
    \ details. The abstracted view allows designers to design and reason about the\
    \ system under some assumptions by building a system model. More on that later\
    \ but let's first look at the basic elements in a distributed system.\n\nA distributed\
    \ system can be presented as a graph where nodes or processes are depicted by\
    \ vertices and communication links are depicted by edges. Some common topologies\
    \ are shown in Figure [1-4](#515270_1_En_1_Chapter.xhtml#Fig4).\n\n![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig4_HTML.png)\n\
    \nA hexagon and a square with circles on each vertex are labeled ring and clique.\
    \ An irregular structure with branches is labeled tree.\n\n**Figure 1-4** Distributed\
    \ system topologies depicted as graphs\n\nA distributed system is usually represented\
    \ as a graph composed of nodes and vertices. Nodes represent processes in the\
    \ network, whereas vertices represent communication links between the processes.\
    \ These graphs also show the structural view or topology of the network and help\
    \ to visualize the system.\n\nA distributed system can have different topologies\
    \ (structures) and can be presented as graphs. Common topologies include **ring**\
    \ which depicts a topology where each node has two adjacent nodes. A **tree**\
    \ structure is acyclic and connected. **Clique** is a fully connected graph where\
    \ all processes are connected to each other directly.\n\nOther elements\n\n* \
    \  Processes\n    *   Events\n*   Executions\n*   Links\n*   State\n*   Global\
    \ state\n*   Cuts\n\nLet's look at them in detail now.\n\n## Processes\n\nA process\
    \ in a distributed system is a computer that executes the distributed algorithm.\
    \ It is also called a node. It is an autonomous computer that can fail independently\
    \ and can communicate with other nodes in the distributed network by sending and\
    \ receiving messages.\n\n## Events\n\nAn event can be defined as some operation\
    \ occurring in a process. There can occur three types of events in a process:\n\
    \n*   **Internal events** occur when something happens locally in a process. In\
    \ other words, a local computation performed by a process is an internal event.\n\
    *   **Message send** events occur when a process (node) sends a message out to\
    \ other nodes.\n*   **Message receive** events occur when a process (node) receives\
    \ a message.\n\nThe diagram shown in Figure [1-5](#515270_1_En_1_Chapter.xhtml#Fig5)\
    \ presents this visually.\n\n![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig5_HTML.jpg)\n\
    \nA schematic with 3 lines, P, Q, and R, has events like local, message sent,\
    \ and message received. Some of the events are connected together via time.\n\n\
    **Figure 1-5** Events and processes in a three-node distributed system\n\n## State\n\
    \nThe concept of state is critical in distributed systems. You will come across\
    \ this term quite a lot in this book and other texts on distributed systems, especially\
    \ in the context of distributed consensus. Events make up the local state of a\
    \ node. In other words, a state is composed of events (results of events) in a\
    \ node. Or we can say that the contents of the local memory, storage, and program\
    \ as a result of events make up the process's state.\n\n## Global State\n\nThe\
    \ collection of states in all processes and communication links in a distributed\
    \ system is called a **global state**.\n\nThis is also known as configuration\
    \ which can be defined as follows:\n\nThe configuration of a distributed system\
    \ is composed of states of the processes and messages in transit.\n\n## Execution\n\
    \nAn execution in a distributed system is a run or computation of the distributed\
    \ algorithm by a process. There are two types of executions:\n\n*   Synchronous\
    \ execution\n*   Asynchronous execution"
