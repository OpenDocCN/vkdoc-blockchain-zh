    # PBFT 协议详解


    -   向它分配下一个序列号。该序列号是请求将要执行的顺序。

    -   将此信息作为预准备消息广播给所有备份副本。


    此阶段为客户端请求分配唯一的序列号。我们可以将其视为一个排序器，对客户端请求应用顺序。


    ## 准备阶段 – 阶段 2


    每个备份副本向系统中的所有其他副本发送`prepare`消息。每个备份副本等待至少`2*f + 1`条来自其他副本的`prepare`消息。它们检查：


    - `prepare`消息是否具有有效的数字签名。

    - 副本是否与消息中的视图相同。

    - 序列号是否有效且在预期范围内。

    - 消息摘要（哈希）值是否正确。


    如果所有这些检查都通过，副本将更新其本地状态并进入提交阶段。


    总之，准备阶段执行以下步骤：


    - 仅当副本之前未接受过相同视图或序列号的预准备消息时，才接受该预准备消息。

    - 向所有副本发送`prepare`消息。


    此阶段确保网络中的诚实副本在视图内就请求的总顺序达成一致。


    ## 提交阶段


    在提交阶段，每个副本向网络中的所有其他副本发送`commit`消息。与准备阶段类似，副本等待来自其他副本的`2*f + 1`条`commit`消息。副本还检查视图编号、序列号、数字签名和消息摘要值。如果从其他副本收到的`2*f
    + 1`条`commit`消息有效，则副本执行请求、生成结果，并最终更新其状态以反映提交。如果有某些消息排队，副本将在处理最新序列号之前先执行这些请求。最后，副本通过回复消息将结果发送给客户端。


    客户端仅在收到`2*f + 1`条包含相同结果的回复消息后才接受该结果。


    ### 提交子协议步骤


    - 副本等待具有相同视图、序列号和请求的`2*f + 1`条`prepare`消息。

    - 它向所有副本发送`commit`消息。

    - 它等待直到`2*f + 1`条有效的`commit`消息到达并被接受。

    - 它执行收到的请求。

    - 它向客户端发送包含执行结果的回复。


    此阶段确保网络中的诚实副本跨视图就客户端请求的总顺序达成一致。


    本质上，PBFT 协议确保有足够多的副本处理每个请求，以便处理相同的请求并且以相同的顺序处理。


    我们可以在图 7-10 中看到协议的正常操作模式。


    ![](img/515270_1_En_7_Fig10_HTML.png)


    图表显示了客户端、主节点、副本 2、3 和 4 的线条。这些线条分为请求、预准备、准备、提交和回复阶段。


    **图 7-10** PBFT 正常模式操作


    在协议执行期间，协议必须维护消息和操作的完整性，以提供足够级别的安全性和保证。数字签名满足了这一要求。假设数字签名是不可伪造的，并且哈希函数是抗碰撞的。此外，使用证书来确保参与方（节点）的适当多数。


    ## PBFT 中的证书


    PBFT 协议中的证书确立了至少`2*f + 1`个副本已存储所需信息。换句话说，特定类型的`2*f + 1`条消息的集合被视为一个证书。例如，假设一个节点已收集了`2*f
    + 1`条类型为`prepare`的消息。在这种情况下，将其与具有相同视图、序列号和请求的相应预准备消息组合在一起表示一个证书，称为已准备证书。同样，`2*f
    + 1`条`commit`消息的集合称为提交证书。


    PBFT 协议还维护了几个变量来执行算法。这些变量及其含义如下：


    - `v`：视图编号

    - `o`：客户端请求的操作

    - `t`：时间戳

    - `c`：客户端标识符

    - `r`：回复

    - `m`：客户端的请求消息

    - `n`：消息的序列号

    - `h`：消息`m`的哈希值

    - `i`：副本的标识符

    - `s`：稳定检查点 – 最后一个

    - `C`：稳定检查点的证书（`2f + 1`条检查点消息）

    - `P`：请求的已准备证书集合

    - `O`：待处理的预准备消息集合

    - `V`：新视图的证明（`2f + 1`条视图更改消息）


    现在让我们看一下消息类型及其格式。如果参考前面的变量列表，这些消息很容易理解。


    ### 消息类型


    PBFT 协议通过交换多种消息来工作。表 7-1 列出了这些消息及其格式和方向。


    **表 7-1** PBFT 协议消息


    | 消息 | 发送方 | 接收方 | 格式 | 签名方 |

    | --- | --- | --- | --- | --- |

    | `Request` | 客户端 | 主节点 | `<REQUEST, o, t, c>` | 客户端 |

    | `Pre-prepare` | 主节点 | 副本 | `<<PRE-PREPARE, v, n, h>, m>` | 主节点 |

    | `Prepare` | 副本 | 副本 | `<PREPARE, v, n, h, i>` | 副本 |

    | `Commit` | 副本 | 副本 | `<COMMIT, v, n, h, i>` | 副本 |

    | `Reply` | 副本 | 客户端 | `<REPLY, r, i>` | 副本 |

    | `View change` | 副本 | 副本 | `<VIEWCHANGE, v+1, n, s, C, P, i>` | 副本 |

    | `New view` | 主节点 | 副本 | `<NEWVIEW, v + 1, V, O>` | 副本 |

    | `Checkpoint` | 副本 | 副本 | `<CHECKPOINT, n, h, i>` | 副本 |


    请注意，所有消息都使用数字签名进行签名，这使得每个节点都能识别生成了任何给定消息的是哪个副本或客户端。

    '
- fmt: '#### View Change


    A view change occurs when a primary replica is suspected faulty by other replicas.
    This phase ensures protocol progress. A new primary is selected with a view change,
    which starts normal mode operation again. The new primary is chosen in a round-robin
    fashion using the formula `p = v mod n`, where `v` is the view number and `n`
    is the total number of nodes in the system.


    When a backup replica receives a request, it tries to execute it after validating
    the message, but for any reason, if it does not execute it for a while, the replica
    times out. It then initiates the view change subprotocol.


    During the view change, the replica stops accepting messages related to the current
    view and updates its state to a view change. The only messages it can receive
    in this state are `checkpoint`, `view change`, and `new view` messages. After
    that, it broadcasts a `view change` message with the next view number to all replicas.


    When this message reaches the new primary, the primary waits for at least `2f`
    view change messages for the next view. If at least `2f + 1` view change messages
    are acquired, it broadcasts a `new view` message to all replicas and runs normal
    operation mode once again.


    When other replicas receive a `new view` message, they update their local state
    accordingly and start the normal operation mode.


    The algorithm for the view change protocol is as follows:


    1.  Stop accepting `pre-prepare`, `prepare`, and `commit` messages for the current
    view.

    2.  Construct a set of all the certificates prepared so far.

    3.  Broadcast a `view change` message with the next view number and a set of all
    the prepared certificates to all replicas.


    Figure [7-11](#515270_1_En_7_Chapter.xhtml#Fig11) illustrates the view change
    protocol.


    ![](images/515270_1_En_7_Chapter/515270_1_En_7_Fig11_HTML.png)


    A diagram of view change protocol has lines for primary, new primary, replica
    3, and 4. The lines are phased into `view-change` and `new view`.


    **Figure 7-11**

    View change protocol


    The view change subprotocol is a means to achieve liveness. Three clever techniques
    are used in this subprotocol to ensure that:


    1.  A replica that has broadcast the `view change` message waits for `2f+1` view
    change messages and then starts its timer. If the timer expires before the node
    receives a `new view` message for the next view, the node will start the view
    change for the next sequence but increase its timeout value. This situation will
    also occur if the replica times out before executing the new unique request in
    the new view.

    2.  As soon as the replica receives `f+1` view change messages for a view number
    greater than its current view, the replica will send the `view change` message
    for the smallest view it knows of in the set so that the next view change does
    not occur too late. This is also the case even if the timer has not expired; it
    will still send the `view change` for the smallest view.

    3.  As the view change will only occur if at least `f + 1` replicas have sent
    the `view change` message, this mechanism ensures that a faulty primary cannot
    indefinitely stop progress by successively requesting view changes.


    It can happen especially in busy environments that storage becomes a bottleneck.
    To solve this issue, checkpointing is used in the PBFT protocol.


    #### The Checkpoint Subprotocol


    Checkpointing is a crucial subprotocol. It is used to discard old messages in
    the log of all replicas. With this, the replicas agree on a stable checkpoint
    that provides a snapshot of the global state at a certain point in time. This
    is a periodic process carried out by each replica after executing the request
    and marking that as a checkpoint in its log. A variable called `low watermark`
    (in PBFT terminology) is used to record the last stable checkpoint sequence number.
    This checkpoint is broadcast to other nodes. As soon as a replica has at least
    `2f + 1` checkpoint messages, it saves these messages as proof of a stable checkpoint.
    It discards all previous `pre-prepare`, `prepare`, and `commit` messages from
    its logs.


    ### PBFT Advantages and Disadvantages


    PBFT is a groundbreaking protocol that has introduced a new research area of practical
    Byzantine fault–tolerant protocols. The original PBFT have many strengths, but
    it also has some weaknesses. We introduce those next.


    #### Strengths


    *   PBFT provides immediate and deterministic transaction finality. In comparison,
    in the PoW protocol, several confirmations are required to finalize a transaction
    with high probability.

    *   PBFT is also energy efficient as compared to PoW, which consumes a tremendous
    amount of electricity.


    #### Weaknesses


    *   PBFT is not very scalable. This limitation is why it is more suitable for
    consortium networks than public blockchains. It is, however, considerably faster
    than PoW protocols.

    *   Sybil attacks are possible to perform on a PBFT network, where a single entity
    can control many identities to influence the voting and, consequently, the decision.

    *   High communication complexity.

    *   Not suitable for public blockchains with anonymous participants.


    PBFT guarantees safety and liveness. Let’s see how.'
