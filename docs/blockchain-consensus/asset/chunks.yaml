  trans: "\n```\nCommander C 将其值广播给所有副官\nFor I = 1 : n-1 do\nLi 将从指挥官接收到的值存储为 vi\n\
    若未从指挥官收到任何值，则 vi 为默认值\nLi 现在作为指挥官运行 OM(m-1)，将值 vi 发送给其他 N – 2 名副官\nEnd for\nFor\
    \ I = 1 : N – 1 do\nFor j = 1 : N – 1 AND j ≠ i do\nLi 将从 Lj 接收到的值存储为 vj\n若未收到任何值，则\
    \ vj 为默认值\nEnd for\nLi 从 {v1, v2, v3,  , , , vn-1} 中选择多数值\nEnd for\n```\n\n你可能已经注意到，尽管这个算法能够工作，但由于需要传递的消息数量过多，它的效率并不高。更准确地说，从通信复杂度的角度来看，该算法与叛徒数量呈指数关系。如果在基础情况下没有叛徒，那么它的复杂度是常数\
    \ *O*(1)；否则，它的复杂度为 *O*(*m*^(*n*))，这意味着它随叛徒数量呈指数增长，这使得它在 *n* 值较大时变得不切实际。\n\n利用时空图，我们可以将基础情况可视化，如图\
    \ 6-5 所示。\n\n![图 6-5](img/515270_1_En_6_Fig5_HTML.jpg)\n\n一个包含 4 个右向箭头（C、L 1、L\
    \ 2 和 L 3）的示意图。从 C 向 L 1、L 2 和 L 3 发送攻击命令。时间箭头指向右侧。\n\n**图 6-5** 口头消息协议 – 基础情况\
    \ – 无叛徒\n\n我们还可以将 m > 0 的情况（其中指挥官是叛徒，向副官发送相互冲突的消息）可视化，如图 6-6 所示。\n\n![图 6-6](img/515270_1_En_6_Fig6_HTML.jpg)\n\
    \n一个包含 4 个右向箭头（叛徒 C、L 1、L 2 和 L 3）的消息协议示意图。他们彼此之间发送攻击和撤退消息。\n\n**图 6-6** m = 1\
    \ 情况下的口头消息协议，指挥官是叛徒\n\n在数字世界中，指挥官和副官代表进程，这些进程之间的通信通过点对点链路和物理信道来实现。\n\n到目前为止，我们讨论了使用口头消息且不采用密码学的情况；然而，另一种使用签名消息的解决方案也是可行的，它利用数字签名来保证声明的完整性。换句话说，使用口头消息无法让接收者确定消息是否被篡改。而数字签名则提供了一种数据认证服务，使接收进程能够检查消息是否真实（有效）。\n\
    \n基于是否使用口头消息或数字签名，本章前面的表 6-1 总结了在不同系统模型下的不可能性结果。\n\n### 拜占庭将军问题的签名消息解决方案\n\n口头消息算法的主要问题在于，它需要\
    \ 3*t* + 1（也记作 3*f* + 1）个节点来容忍 *t*（也记作 *f*）个故障，这在所需的计算资源方面代价高昂。同时，叛徒可能会对其他节点说过的话撒谎，这使问题更加棘手。该算法的时间复杂度为\
    \ *O*(*n*^(*m*))。\n\nLamport、Shostak 和 Pease 在同一篇 BGP 论文中提出了一种针对 BGP 问题的带签名解决方案。它使用数字签名对消息进行签名。在该模型下，有以下额外的假设：\n\
    \n1.  忠诚将军的签名无法被伪造，并且对将军消息的任何修改都是可检测的。\n2.  任何人都可以验证将军签名的真实性。\n\n在此模型下，每位副官维护一个已签名订单的向量。然后，指挥官将已签名的消息发送给副官。\n\
    \n通常，该算法的工作方式如下：\n\n副官从指挥官或其他副官处接收订单，并在验证消息真实性后，将其保存到自己所维护的向量中。如果订单上的签名少于 m 个，则该副官在订单（消息）上添加自己的签名，并将此消息转发给尚未见过它的其他副官。当副官不再收到任何新消息时，他从向量中选择一个值作为决策共识值。\n\
    \n副官可以通过签名消息检测出指挥官是叛徒，因为指挥官的签名会出现在两条不同的消息上。在此模型下，我们的假设是签名不可伪造，并且任何人都可以验证签名的真实性。这意味着指挥官就是叛徒，因为只有他才能签署两条不同的消息。\n\
    \n正式地，该算法描述如下。\n\n**算法：对于 n 位将军和 m 位叛徒将军，其中 *n* > 0。** 在此算法中，每位副官 *i* 维护一个集合 *V*[*i*]，其中包含其迄今为止收到的正确签名的消息。当指挥官诚实时，集合\
    \ *V*[*i*] 仅包含一个元素。\n\n**算法 `SM(m)`**\n\n**初始化：**\n*Vi* = { }，即空集\n\n1.  指挥官 *C*\
    \ 将已签名的消息（值）发送给每位副官。\n2.  对于每个 *i*：\n    - *V*[*i*] = *V*[*i*] + {*v*}，即将 *v*\
    \ 添加到 *V*[*i*]。\n    - 如果 *k* < *m*，则将消息 *v* : 0 : *j*[1]…*j*[*k*] : *i* 发送给除\
    \ *j*[1]…*j*[*k*] 之外的每位副官。\n3.  如果副官 *i* 收到一条像 *v* : 0 : *j*[1]…*j*[*k*] 这样的消息，并且\
    \ *v* 不在集合 *V*[*i*] 中，则：\n    - 设置 *V*[*i*] = {*v*}。\n    - 将消息 *v* : 0 : *i*\
    \ 发送给其他每位副官。\n4.  如果副官 *i* 从指挥官处收到一条形如 *v* : 0 的消息，并且尚未收到来自指挥官的任何消息（订单），即 *V*[*i*]\
    \ 为空，则：\n    - 设置 *V*[*i*] = {*v*}。\n    - 将消息 *v* : 0 : *i* 发送给其他每位副官。\n5.  对于每个\
    \ *i*：\n    - 当副官 *i* 不再收到更多消息时，他通过函数 `choice(*V*[*i*])` 来执行订单（消息），该函数从一组订单中获取一个单一订单。如果集合\
    \ *V* 为空或包含多个元素，则 `Choice(*V*) = retreat`。如果集合 *V* 中只有一个元素 *v*，则 `choice(*V*)\
    \ = v`。\n\n此处，*v* : *i* 是由将军 *i* 签名的值 *v*，而 *v* : *i* : *j* 是由将军 *j* 副签的消息 *v*\
    \ : *i*。每位将军 *i* 维护一个集合 *V*[*i*]，其中包含所有收到的订单。\n\n图 6-7 中的示意图展示了一个叛徒指挥官的场景。\n\n\
    ![图 6-7](img/515270_1_En_6_Fig7_HTML.jpg)\n\n一个示意图，顶部是叛徒指挥官，下方是副官 L 1 和 L 2。指挥官向\
    \ L 1 下达攻击命令，向 L 2 下达撤退命令。\n\n**图 6-7** 使用 `SM(1)` 的签名消息协议示例 – 叛徒指挥官\n\n使用签名消息，很容易检测到指挥官是否为叛徒，因为其签名会出现在两条不同的订单上。根据签名不可伪造的假设，我们知道只有指挥官本人才能签署这些消息。\n\
    \n正式地，对于任何 *m*，如果叛徒数量最多为 *m*，那么算法 `SM(m)` 就能解决拜占庭将军问题。副官维护一个值的向量，并运行一个选择函数来检索订单\
    \ `choice {attack, retreat}`。使用超时机制来确定是否不再会有消息到达。此外，在步骤 2 中，副官 *i* 会忽略集合 *V*[*i*]\
    \ 中已存在的任何消息 *v*。\n\n该算法的消息复杂度为 *O*(*n*^(*m* + 1))，并且需要 *m* + 1 轮通信。此协议适用于 *N*\
    \ ≥ *m* + 2 的情况。\n\n与口头消息协议相比，签名消息协议对故障更具弹性；在这里，如果在三位将军中至少存在两位忠诚将军，问题就是可解的。而在口头消息情况下，即使三位将军中只有一个叛徒，问题也无法解决。\n"
- fmt: '# DLS Protocols Under Partial Synchrony


    After the FLP impossibility result, one of the ways that researchers introduced
    to circumvent the FLP impossibility is to use the partial synchrony network model.
    There are some important concepts presented in this paper, such as rotating coordinators,
    consensus, termination under partial synchrony, and implementation of the round-based
    mechanism. We discussed various models, including partial synchrony, in Chapter
    [3](#515270_1_En_3_Chapter.xhtml).


    The paper describes four algorithms for crash-stop, omissions, Byzantine, and
    authenticated Byzantine faults under partial synchrony. The key idea in these
    algorithms is that the agreement and validity are always satisfied, whereas termination
    is guaranteed when the system stabilizes, that is, has good episodes of synchrony.


    A basic round model is introduced where protocol execution is divided into rounds
    of message exchange and local computations. Each round comprises a send step,
    a receive step, and a computation step. In addition, the basic round model assumes
    a round, called the global stabilization round, during which or after correct
    processes receive all messages sent from correct processes.


    In this section, algorithm 2 is presented, a consensus algorithm for Byzantine
    faults with authentication. It assumes a network model with partially synchronous
    communications and processors that can be Byzantine. This model is also adopted
    for most, if not all, blockchain networks.


    The algorithm achieves strong unanimity for a set `V` with an arbitrary value
    under Byzantine faults with authentication.


    The algorithm progresses in phases. Each phase `k` consists of four consecutive
    rounds, from `4*k – 3` to `4*k`. Each phase has a unique coordinator `c` which
    leads the phase. A simple formula `k = i (mod n)` is used to select the coordinator
    from all processes, where `k` is the phase, `i` is the process number, and `n`
    is the total number of processes.


    Each process maintains some variables:


    - A local variable `PROPER`, which contains a set of values that the process knows
    to be proper.

    - A local variable `ACCEPTABLE`, which contains value `v` that process `p` has
    found to be acceptable. Note that a value `v` is acceptable to process `p` if
    `p` does not have a lock on any value except possibly `v`. Also, value `v` is
    proper.

    - A local variable `LOCK` which keeps the locked value. A process may lock a value
    in a phase if it believes that some process may decide on this value. Initially,
    no value is locked. A phase number is associated with every lock. In addition,
    a proof of acceptability of the locked value is also associated with every lock.
    Proof of acceptability is in the form of a set of signed messages sent by `n –
    t` processes, indicating that the locked value is acceptable and proper, that
    is, it is in their `PROPER` sets at the start of the given phase.


    **Algorithm** `N ≥ 3*t + 1` – **Byzantine faults with authentication**


    **Trying phase `k`**


    **Rounds:**


    **Round 1: Round `4k – 3`**


    Each process including the current coordinator sends an authenticated list of
    all its acceptable values to the current coordinator. Processes use the message
    format `E(list, k)`, where `E` is an authentication function, `k` is the phase,
    and `list` is all acceptable values.


    **Round 2: Round `4k – 2`**


    The current coordinator chooses a value to propose. If a value is to be proposed
    by the coordinator, the coordinator must have received at least `n – t` responses
    from the processes suggesting that this value is acceptable and proper at phase
    `k`. If there is more than one possible value that the coordinator may propose,
    then it will choose one arbitrarily.


    The coordinator broadcasts a message of the form `E(lock, v, k, proof)`, where
    the `proof` is composed of the set of signed messages `E(list, k)` received from
    the `n – t` processes that found `v` acceptable and proper.


    **Round 3: Round `4k – 1`**


    If any process receives an `E(lock, v, k, proof)` message, it validates the proof
    to ascertain that `n – t` processors do find `v` acceptable and proper at phase
    `k`. If the proof is valid, it locks `v`, associating the phase number `k` and
    the message `E(lock, v, k, proof)` with the lock, and sends an acknowledgment
    to the current coordinator. In this case, the processes release any earlier lock
    placed on `v`. If the coordinator receives acknowledgments from at least `2*t
    + 1` processors, then it decides on the value `v`.


    **Round 4: Round `4k`**


    This is where locks are released. Processes broadcast messages of the form `E(lock
    v, h, proof)`, indicating that they have a lock on value `v` with associated phase
    `h` and the associated proof and that a coordinator sent the message at phase
    `h`, which caused the lock to be placed. If any process has a lock on some value
    `v` with associated phase `h` and receives a properly signed message `E(lock,
    w, h^’, proof^′)` with `w ≠ v` and `h^′ ≥ h`, then the process releases its lock
    on `v`. This means that if a most recent properly signed message is received by
    a process indicating a lock on some value which is different from its locally
    locked value and the phase number is either higher or equal to the current phase
    number, then it will release the lock from the local locked value.


    **Notes**


    Assuming that the processes are correct, two different values cannot be locked
    in the same phase because the correct coordinator will never send conflicting
    messages which may suggest locks on two different values.


    This algorithm achieves consistency, strong unanimity, and termination under partial
    synchrony, with Byzantine faults and authentication, where `n ≥ 3*t + 1`. Authenticated
    Byzantine means that failures are arbitrary, but messages can be signed with unforgeable
    digital signatures.


    Consistency means no two different processes decide differently. Termination means
    every process eventually decides. Unanimity has two flavors, strong unanimity
    and weak unanimity. Strong unanimity requires that if all processes have the same
    initial value `v` and if any correct process decides, then it only decides on
    `v`. Weak unanimity means that if all processes have the same initial value `v`
    and all processes are correct, then if any process decides, it decides on `v`.
    In other words, strong unanimity means that if all initial values are the same,
    for example, `v`, then `v` is the only common decision. Under weak unanimity,
    this condition is expected to hold only if all processes are correct.'
  raw: '## DLS Protocols Under Partial Synchrony


    After the FLP impossibility result, one of the ways that researchers introduced
    to circumvent the FLP impossibility is to use the partial synchrony network model.
    There are some important concepts presented in this paper, such as rotating coordinators,
    consensus, termination under partial synchrony, and implementation of the round-based
    mechanism. We discussed various models, including partial synchrony, in Chapter
    [3](#515270_1_En_3_Chapter.xhtml).


    The paper describes four algorithms for crash-stop, omissions, Byzantine, and
    authenticated Byzantine faults under partial synchrony. The key idea in these
    algorithms is that the agreement and validity are always satisfied, whereas termination
    is guaranteed when the system stabilizes, that is, has good episodes of synchrony.


    A basic round model is introduced where protocol execution is divided into rounds
    of message exchange and local computations. Each round comprises a send step,
    a receive step, and a computation step. In addition, the basic round model assumes
    a round, called the global stabilization round, during which or after correct
    processes receive all messages sent from correct processes.


    In this section, algorithm 2 is presented, a consensus algorithm for Byzantine
    faults with authentication. It assumes a network model with partially synchronous
    communications and processors that can be Byzantine. This model is also adopted
    for most, if not all, blockchain networks.


    The algorithm achieves strong unanimity for a set V with an arbitrary value under
    Byzantine faults with authentication.


    The algorithm progresses in phases. Each phase *k* consists of four consecutive
    rounds, from 4*k* – 3 to 4*k*. Each phase has a unique coordinator c which leads
    the phase. A simple formula *k* = *i* (*mod n*) is used to select the coordinator
    from all processes, where *k* is the phase, *i* is the process number, and *n*
    is the total number of processes.


    Each process maintains some variables:


    *   A local variable PROPER, which contains a set of values that the process knows
    to be proper.


    *   A local variable ACCEPTABLE, which contains value v that process p has found
    to be acceptable. Note that a value v is acceptable to process p if p does not
    have a lock on any value except possibly v. Also, value v is proper.


    *   A local variable LOCK which keeps the locked value. A process may lock a value
    in a phase if it believes that some process may decide on this value. Initially,
    no value is locked. A phase number is associated with every lock. In addition,
    a proof of acceptability of the locked value is also associated with every lock.
    Proof of acceptability is in the form of a set of signed messages sent by *n* − *t*
    processes, indicating that the locked value is acceptable and proper, that is,
    it is in their PROPER sets at the start of the given phase.


    **Algorithm** *N* ≥ 3*t* + 1 – **Byzantine faults with authentication**


    **Trying phase k**


    **Rounds:**


    **Round 1: Round 4k – 3**


    Each process including the current coordinator sends an authenticated list of
    all its acceptable values to the current coordinator. Processes use the message
    format *E*(*list*, *k*), where *E* is an authentication function, *k* is the phase,
    and *list* is all acceptable values.


    **Round 2: Round 4k – 2**


    The current coordinator chooses a value to propose. If a value is to be proposed
    by the coordinator, the coordinator must have received at least *n* – *t* responses
    from the processes suggesting that this value is acceptable and proper at phase
    *k*. If there is more than one possible value that the coordinator may propose,
    then it will choose one arbitrarily.


    The coordinator broadcasts a message of the form *E*(*lock*, *v*, *k*, *proof*),
    where the *proof* is composed of the set of signed messages *E*(*list*, *k*) received
    from the *n* − *t* processes that found *v* acceptable and proper.


    **Round 3: Round 4k – 1**


    If any process receives an *E*(*lock*, *v*, *k*, *proof*) message, it validates
    the proof to ascertain that *n* − *t* processors do find *v* acceptable and proper
    at phase *k*. If the proof is valid, it locks *v*, associating the phase number
    *k* and the message *E*(*lock*, *v*, *k*, *proof*) with the lock, and sends an
    acknowledgment to the current coordinator. In this case, the processes release
    any earlier lock placed on *v*. If the coordinator receives acknowledgments from
    at least 2*t* + 1 processors, then it decides on the value *v*.


    **Round 4: Round 4k**


    This is where locks are released. Processes broadcast messages of the form *E*(*lock v*,
    *h*, *proof*), indicating that they have a lock on value *v* with associated phase
    *h* and the associated proof and that a coordinator sent the message at phase
    *h*, which caused the lock to be placed. If any process has a lock on some value
    *v* with associated phase *h* and receives a properly signed message *E*(*lock*,
    *w*, *h*^’, *proof*^′) with *w* ≠ *v* and *h*^′ ≥ *h*, then the process releases
    its lock on *v*. This means that if a most recent properly signed message is received
    by a process indicating a lock on some value which is different from its locally
    locked value and the phase number is either higher or equal to the current phase
    number, then it will release the lock from the local locked value.


    **Notes**


    Assuming that the processes are correct, two different values cannot be locked
    in the same phase because the correct coordinator will never send conflicting
    messages which may suggest locks on two different values.


    This algorithm achieves consistency, strong unanimity, and termination under partial
    synchrony, with Byzantine faults and authentication, where *n* ≥ 3*t* + 1\. Authenticated
    Byzantine means that failures are arbitrary, but messages can be signed with unforgeable
    digital signatures.


    Consistency means no two different processes decide differently. Termination means
    every process eventually decides. Unanimity has two flavors, strong unanimity
    and weak unanimity. Strong unanimity requires that if all processes have the same
    initial value v and if any correct process decides, then it only decides on v.
    Weak unanimity means that if all processes have the same initial value v and all
    processes are correct, then if any process decides, it decides on v. In other
    words, strong unanimity means that if all initial values are the same, for example,
    v, then v is the only common decision. Under weak unanimity, this condition is
    expected to hold only if all processes are correct.'
  trans: '

    # 部分同步下的 DLS 协议


    在 FLP 不可能性结果之后，研究人员引入的规避该结果的方法之一便是采用部分同步网络模型。本文提出了一些重要概念，例如轮换协调者、共识、部分同步下的终止性以及基于轮次机制的实现。我们在第
    3 章讨论了包括部分同步在内的多种模型。


    本文描述了四种针对部分同步下崩溃停止、遗漏、拜占庭和认证拜占庭错误的算法。这些算法的核心思想在于，一致性和有效性始终得到满足，而终止性仅在系统稳定时（即出现良好的同步时段）才能得到保证。


    本文引入了一个基本轮次模型，协议执行被划分为多个消息交换和本地计算的轮次。每一轮包括发送步骤、接收步骤和计算步骤。此外，该基本轮次模型假设存在一个被称为全局稳定轮次的轮次，在该轮次期间或之后，正确的进程会接收到所有由正确进程发送的消息。


    本节介绍算法 2，这是一个带认证的拜占庭错误下的共识算法。它假设网络模型具有部分同步的通信，且处理器可能是拜占庭式的。这一模型也被大多数（即便不是全部）区块链网络所采用。


    该算法针对任意值集合`V`，在带认证的拜占庭错误下实现了强一致性。


    算法按阶段推进。每个阶段`k`由四个连续的轮次组成，从`4*k – 3`到`4*k`。每个阶段都有一个唯一的协调者`c`来主导该阶段。使用一个简单的公式`k
    = i (mod n)`从所有进程中选出协调者，其中`k`是阶段号，`i`是进程编号，`n`是进程总数。


    每个进程维护一些变量：


    -   一个局部变量`PROPER`，包含进程已知的合法值的集合。

    -   一个局部变量`ACCEPTABLE`，包含进程`p`认为可接受的值`v`。注意，如果进程`p`除了`v`之外没有锁定任何值，并且值`v`是合法的，那么`v`对进程`p`来说是可接受的。

    -   一个局部变量`LOCK`，用于保存被锁定的值。如果一个进程相信某个进程可能会就某个值做出决定，它可以在一个阶段锁定该值。初始状态下，没有值被锁定。每个锁都关联一个阶段号。此外，每个锁还关联一个被锁定值的可接受性证明。可接受性证明的形式是一组由`n
    – t`个进程发送的签名消息，表明该锁定值是可接受且合法的，即它在给定阶段开始时位于这些进程的`PROPER`集合中。


    **算法** `N ≥ 3*t + 1` – **带认证的拜占庭错误**


    **尝试阶段 `k`**


    **轮次:**


    **第 1 轮: 轮次 `4k – 3`**


    包括当前协调者在内的每个进程，都向当前协调者发送一个经过认证的、包含其所有可接受值的列表。进程使用消息格式`E(list, k)`，其中`E`是认证函数，`k`是阶段号，`list`是所有可接受的值。


    **第 2 轮: 轮次 `4k – 2`**


    当前协调者选择一个要提议的值。如果协调者要提议某个值，它必须至少收到`n – t`个进程的响应，表明该值在阶段`k`是可接受且合法的。如果有多个可能的值可供协调者提议，它将任意选择一个。


    协调者广播一条形式为`E(lock, v, k, proof)`的消息，其中`proof`由从`n – t`个认为`v`可接受且合法的进程处收到的签名消息集合`E(list,
    k)`组成。


    **第 3 轮: 轮次 `4k – 1`**


    如果任何进程收到一条`E(lock, v, k, proof)`消息，它会验证该证明，以确认在阶段`k`确实有`n – t`个处理器认为`v`可接受且合法。如果证明有效，它就锁定`v`，并将阶段号`k`和消息`E(lock,
    v, k, proof)`与锁关联起来，然后向当前协调者发送一个确认。在这种情况下，该进程会释放之前对`v`设置的任何锁。如果协调者从至少`2*t + 1`个处理器处收到了确认，那么它就决定采用值`v`。


    **第 4 轮: 轮次 `4k`**


    这一轮用于释放锁。进程广播形式为`E(lock v, h, proof)`的消息，表明它们对值`v`持有锁，关联的阶段号为`h`以及相关的证明，并且协调者在阶段`h`发送了导致该锁被设置的消息。如果任何进程对某个值`v`持有锁（关联阶段`h`），并且收到了一条正确签名、形式为`E(lock,
    w, h^’, proof^′)`且`w ≠ v`及`h^′ ≥ h`的消息，那么该进程会释放它对`v`的锁。这意味着，如果进程收到一条最近正确签名的消息，表明对某个不同于其本地锁定值的值持有锁，且其阶段号大于或等于当前阶段号，那么它将释放本地锁定的值。


    **说明**


    假设进程都是正确的，那么在同一阶段不可能锁定两个不同的值，因为正确的协调者永远不会发送可能建议锁定两个不同值的冲突消息。


    在部分同步、存在拜占庭错误并采用认证的情况下，该算法实现了一致性、强一致性和终止性，前提是`n ≥ 3*t + 1`。认证拜占庭意味着故障是任意的，但消息可以使用不可伪造的数字签名进行签名。


    一致性意味着不会有任何两个不同的进程做出不同的决定。终止性意味着每个进程最终都会做出决定。一致性有两种类型：强一致性和弱一致性。强一致性要求，如果所有进程的初始值相同（设为`v`），并且有任何正确的进程做出决定，那么该决定只能是`v`。弱一致性意味着，如果所有进程的初始值相同（设为`v`）且所有进程都是正确的，那么如果有任何进程做出决定，它决定的是`v`。换句话说，强一致性意味着如果所有初始值都相同（例如`v`），那么`v`是唯一的共同决定。而在弱一致性下，只有当所有进程都正确时，才期望这个条件成立。

    '
- fmt: '# Ben-Or Algorithms


    The Ben-Or protocol was introduced in 1983. It is named after its author Michael
    Ben-Or. This was the first protocol that solved the consensus problem with probabilistic
    termination under a model with a strong adversary. The Ben-Or algorithm proposed
    how to circumvent an FLP result and achieve consensus under asynchrony. There
    are two algorithms proposed in the paper. The first algorithm tolerates *t* <
    *n*/2 crash failures, and the second algorithm tolerates *t* < *n*/5 for Byzantine
    failures. In other words, with *N* > 2*t* it tolerates crash faults and achieves
    an agreement, and with *N* > 5*t* the protocol tolerates Byzantine faults and
    reaches an agreement. The protocol achieves consensus under the conditions described
    earlier, but the expected running time of the protocol is exponential. In other
    words, it requires exponential running time to terminate in the worst case because
    it can require multiple rounds to terminate. It can however terminate in constant
    time if the value of *t* is very small, that is, *O*(√*n*).


    This protocol works in asynchronous rounds. A round simulates time because all
    messages are tagged with a round number, and because of this, processes can figure
    out which messages belong to which round even if they arrive asynchronously. A
    process ignores any messages for previous rounds and holds messages for future
    rounds in a buffer. Each round has two phases or subrounds. The first is the proposal
    (suggestion) phase, where each process `p` transmits its value `v` and waits until
    it receives from other `n` − `t` processes. In the second phase, called the decision
    (ratification) phase, the protocol checks if a majority is observed and takes
    that value; otherwise, it flips a coin. If a certain threshold of processes sees
    the same majority value, then the decision is finalized. In case some other value
    is detected as a majority, then the processor switches to that value. Eventually,
    the protocol manages to terminate because at some point all processes will flip
    the coin correctly and reach the majority value. You may have noticed that this
    protocol only considers binary decision values, either a 0 or 1. Another important
    aspect to keep in mind is that the protocol cannot wait indefinitely for all processes
    to respond because they could be unavailable (offline).


    This algorithm works only for binary consensus. There are two variables that need
    to be managed in the algorithm, a value which is either 0 or 1 and phase (p),
    which represents the stage where the algorithm is currently at. The algorithm
    proceeds in rounds, and each round has two subrounds or phases.


    Note that each process has its own coin. This class of algorithms that utilize
    such coin scheme is called local coin algorithms. Local coin tossing is implemented
    using a random number generator that outputs binary numbers. Each process tosses
    its own coin and outputs 0 or 1, each with probability ½. The coin is tossed by
    a process to pick a new local value if a majority was not found.


    ## The algorithm for benign faults/crash faults only – non-Byzantine


    ```

    Each process p executes the following algorithm:

    Process p: Initial value x = 0 or 1

    0: set r = 1

    --First subround or phase – proposal phase

    1: Broadcast  (1, r, x) to all processes including itself

    2: Wait until messages of type (1,r,*) are received from n - t processes.

    2(a): If > n /2 messages received have the same value v, then

    --second subround or phase – decision phase

    2(b): Broadcast the message (2, r, v, D) to all processes including itself.

    2(c): else broadcast the message (2, r, ?) to all processes including itself.

    3: Wait until messages of type (2, r, *) arrive from n - t processes.

    3(a): If there is 1 D type messages (2, r, v, D), then vote v i.e set x = v

    3(b): If there are > t, D type messages then decide v.

    3(c): Else set x = 0 or 1 each with probability 1/2 by     doing the coinflip

    4: Start the next round by setting r = r + 1 and go to 1.

    ```


    Here, `r` is the round number; `x` is the initial preference or value proposed
    by the process; `1` is the first subround, round, or phase of the main round;
    `2` is the second subround, round, or phase of the main round; `*` can be `0`
    or `1`; `?` represents no majority observed; `N` is the number of nodes (processes);
    `D` is an indication of approval (ratification) – in other words, it is an indication
    that the process has observed a majority of the same value – `t` is the number
    of faulty nodes; `v` is the value; and `coinflip()` is a uniform random number
    generator that generates either `0` or `1`.


    We can visualize this protocol in the diagram shown in Figure [6-8](#515270_1_En_6_Chapter.xhtml#Fig8).


    ![](images/515270_1_En_6_Chapter/515270_1_En_6_Fig8_HTML.png)


    A flowchart of an agreement protocol starts with set X equals 0 or 1 and r equals
    1 passes through broadcast, receive, and so on.


    **Figure 6-8** Ben-Or crash fault tolerant only agreement protocol – (non-Byzantine)


    If `n` > 2*t*, the protocol guarantees with probability 1 that all processes will
    eventually decide on the same value, and if all processes start with the value
    `v`, then within one round all processes will decide on `v`. Moreover, if in some
    round a process decides on `v` after receiving more than `t` D type messages,
    then all other processes will decide on `v` within the next round.


    The protocol described earlier works for crash faults; for tolerating Byzantine
    faults, slight modifications are required, which we describe next.


    ## The Ben-Or algorithm for Byzantine faults


    ```

    Each process p executes the following algorithm:

    Process p: Initial value x = 0 or 1

    0: set r = 1

    --First subround or phase – proposal phase

    1: Broadcast  (1, r, x) to all processes including itself

    2: Wait until messages of type (1,r,*) are received from N - t processes.

    2(a): If more than (N + t)/2 messages have the same value v, then

    --second subround or phase – decision phase

    2(b): Broadcast the message (2, r, v, D) to all processes including itself.

    2(c): else Broadcast the message (2, r, ?) to all processes including itself.

    3: Wait until messages of type (2, r, *) arrive from n - t processes.

    3(a): If there are at least t + 1 D type messages (2, r, v, D), then vote v i.e
    set x = v

    3(b): If there are more than (n + t)/2 D type messages then decide v.

    3(c): Else set x to 0 or 1 each with probability 1/2 by     doing the coinflip

    4: Start the next round by setting r = r + 1 and go to 1.

    ```


    Here, `r` is the round number; `x` is the initial preference or value proposed
    by the process; `1` is the first subround, round, or phase of the main round;
    `2` is the second subround, round, or phase of the main round; `*` can be `0`
    or `1`; `?` represents no majority observed; `N` is the number of nodes (processes);
    `D` is an indication of approval (ratification) – in other words, it is an indication
    that the process has observed a majority of the same value – `t` is the number
    of faulty nodes; `v` is the value; and `coinflip()` is a uniform random number
    generator that generates either `0` or `1`.


    We can visualize this protocol in Figure [6-9](#515270_1_En_6_Chapter.xhtml#Fig9).


    ![](images/515270_1_En_6_Chapter/515270_1_En_6_Fig9_HTML.png)


    A flowchart of an agreement protocol starts with set X equals 0 or 1 and r equals
    1 passes through broadcast, receive, and so on.


    **Figure 6-9** Ben-Or Byzantine agreement protocol


    In the first subround or phase of the protocol, every process broadcasts its proposed
    preferred value and awaits `n` − `t` messages. If more than ![](images/515270_1_En_6_Chapter/515270_1_En_6_Chapter_TeX_IEq1.png)
    processes agree, then a majority is achieved, and the preferred value is set accordingly.'
  raw: '## Ben-Or Algorithms


