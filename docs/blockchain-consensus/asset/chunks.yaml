    In other words, a quantum algorithm is the same as the classical algorithm in
    the sense that it is a set of instructions to solve a problem, but it has instructions
    for creating superpositions and entanglements.


    Famous quantum algorithms include the Deutsch-Jozsa blackbox solution algorithm,
    Shor’s discrete log problem and factorization algorithm, and Grover’s search algorithm.
    There is a catalogue maintained at the quantum algorithm zoo – [`https://quantumalgorithmzoo.org`](https://quantumalgorithmzoo.org).


    There are primarily three classes of quantum algorithms: quantum search algorithms,
    quantum Fourier transform–based algorithms, and quantum simulation algorithms.'
  trans: '

    ### CNOT


    该门称为受控非门。它与经典的异或门相同，但具有可逆性。它作用于两个量子比特。第一个量子比特作为控制量子比特，第二个量子比特作为目标量子比特。只有当第一个量子比特处于特定状态时，它才会改变目标量子比特的状态。该门可用于在包含两个或更多量子比特的系统中创建纠缠态。


    ### Toffoli（CCNOT）


    这是受控-受控非门。它作用于三个量子比特。它翻转三比特状态中的第三个比特（当前两个比特为 1 时），即将 ∣110⟩ 翻转为 ∣111⟩，反之亦然。其符号如图
    9-2 所示。换句话说，如果前两个比特为 1，则第三个比特取反。


    ### Z


    这是一个相位偏移门。它将 1 映射为-1，并将 0 保持为 0。换句话说，∣1⟩ 的振幅被取反。从根本上说，它使相位旋转 180 度。在电路中用方框中的 Z
    符号表示，如图 9-2 所示。


    ### NOT


    该门将 ∣1⟩ 翻转为 ∣0⟩，反之亦然。它是经典非门的模拟。


    ### 交换门


    交换门用于交换两个量子比特。其示意图如图 9-2 所示。当然，量子门种类繁多，但我们所介绍的这些是常用门，将有助于我们理解本章后续的算法。


    所有这些门都可以在图 9-2 中看到。


    ### 测量


    除了门之外，另一个重要元素是测量。测量获取一个量子态并将其坍缩到其中一个基态。我们可以在图 9-3 中看到这个过程。


    ![](img/515270_1_En_9_Fig3_HTML.jpg)


    测量示意图。量子态进入测量环节后，会产生一个经典态。


    图 9-3


    测量


    ## 量子电路


    我们使用量子门来构建量子电路。量子电路本质上是应用于量子比特的一系列量子操作序列。它由量子门（算子）、包含输入量子比特的量子寄存器、代表随时间推移的一系列操作的量子导线，以及测量环节组成。在量子电路中，时间从左向右流动。图
    9-4 展示了一个量子电路的外观。


    ![](img/515270_1_En_9_Fig4_HTML.png)


    一个量子电路图包含 3 个量子比特 q 0、q 1 和 q 2，操作 U 1 至 U 3，一个双量子比特操作 U 4，U s，以及一个测量环节。


    图 9-4


    一个量子电路


    量子门用方框表示。左侧是量子寄存器。量子导线代表一个量子比特，例如一个光子或一个电子。每个门都会引入量子比特的变化，例如电子自旋的变化。


    量子电路实现量子算法。换句话说，量子算法由量子电路描述。有许多标准的量子电路。下面我们介绍一些常用的量子电路。


    ### 隐形传态电路


    我们能否将量子态从一个量子设备传输到另一个量子设备？答案是肯定的。为此，我们使用隐形传态技术，它利用纠缠将量子态从一个量子设备移动到另一个量子设备。


    在图 9-5 中，展示了一个隐形传态电路，它可以将量子态从一个方传输到另一方。


    ![](img/515270_1_En_9_Fig5_HTML.png)


    一个隐形传态电路包含 3 个量子比特、2 个哈达玛门、3 个 CNOT 门、两个测量环节，以及一个受控 Z 门。


    图 9-5


    隐形传态电路


    隐形传态的一些应用包括量子系统之间的态传输。这在量子分布式系统中非常有价值，其中节点之间的态传输可以实现诸如量子状态机复制等应用。


    ### GHZ 电路


    格林伯格-霍恩-泽林格（GHZ）态是由三个或更多量子比特组成的纠缠态。如果三个或更多粒子进入纠缠态，则称为多体纠缠。


    图 9-6 展示了这个电路。


    ![](img/515270_1_En_9_Fig6_HTML.png)


    一个 GHZ 电路包含 3 个量子比特、一个哈达玛门和 2 个 CNOT 门。


    图 9-6


    GHZ 电路


    正如我们将在本章后面探讨的那样，GHZ 态已被证明在量子密码学和量子拜占庭协定（共识）算法中很有用。


    ### W 态电路


    W 态电路是实现三个粒子纠缠的另一种方式。它与 GHZ 的区别在于：在 W 态中，如果三个量子比特中丢失一个，剩余的两个将保持纠缠。而 GHZ 不具备此性质。该电路如图
    9-7 所示。


    ![](img/515270_1_En_9_Fig7_HTML.png)


    一个 W 态电路包含 3 个量子比特、一个 R y 门、一个受控哈达玛门、两个 CNOT 门，以及一个 x 门。


    图 9-7


    W 态电路


    正如我们将在本章后面看到的，W 态电路在领导者选举算法中有应用。


    ## 量子算法


    我们知道，算法是用于解决问题的指令集。在这方面，量子算法与之相同；然而，它们在量子设备上运行，并且包含至少一个量子操作，例如叠加或纠缠操作。换句话说，量子算法与经典算法在本质上是相同的，都是一组用于解决问题的指令，但它包含用于创建叠加和纠缠的指令。


    著名的量子算法包括多伊奇-乔萨黑盒求解算法、肖尔的离散对数问题和因数分解算法，以及格罗弗搜索算法。量子算法动物园网站维护着一个目录——[`https://quantumalgorithmzoo.org`](https://quantumalgorithmzoo.org)。


    量子算法主要分为三类：量子搜索算法、基于量子傅里叶变换的算法和量子模拟算法。

