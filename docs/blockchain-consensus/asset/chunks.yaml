    # 3. Distributed Consensus


    Consensus is a fundamental problem in distributed computing. This chapter will
    cover the fundamentals of the consensus problem and discuss some history covering
    the Byzantine generals problem, building blocks of consensus, and how we can solve
    this problem in distributed systems.


    As fault tolerance is a fundamental requirement in distributed systems, several
    primitives introduce fault tolerance. Fault-tolerant broadcast algorithms allow
    for the development of fault-tolerant applications. Consensus enables processes
    to reach a common decision despite failures. Both topics are well researched in
    academia and the industry.


    Before we dive into discussing consensus and agreement problems in detail, let’s
    cover some building blocks in continuation of link abstractions from Chapter [1](#515270_1_En_1_Chapter.xhtml)
    that are closely related to consensus and agreement problems.'
