- fmt: '# A Typical Cryptosystem


    A typical model of a cryptographic system is shown in Figure [2-1](#515270_1_En_2_Chapter.xhtml#Fig1).
    We can define a cryptographic system as a combined manifestation of cryptographic
    primitives, protocols, and algorithms to accomplish specified security goals.
    Thus, a cryptosystem is composed of several components.


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig1_HTML.png)


    A model of a cryptographic system describes the relationship between sender, encryption,
    decryption, and receiver via key, plain, and cipher texts.


    **Figure 2-1** A model of a cryptographic system or cryptographic scheme


    There are three key actors in this system: sender, receiver, and adversary. The
    sender wants to send a secret message to the receiver via an insecure channel
    in the presence of an adversary who is a malicious attacker wishing to learn about
    the message. Other elements are plaintext, ciphertext, keys, secure channel, encryption
    function, decryption function, and key source:


    - A sender is the sending party of the message.

    - A receiver is the intended recipient of the message.

    - An encryption function is the encryption algorithm which transforms a plaintext
    into ciphertext by using an encryption key and plaintext as input.

    - A decryption function is the decryption algorithm which converts ciphertext
    into plaintext by using a decryption key and ciphertext as input.

    - Plaintext is the raw message which Alice wants to send to Bob in such a way
    that no one learns about the original message except the intended recipient. It
    is readable and accessible by Alice and any authorized entity.

    - Ciphertext is the scrambled form of the plaintext, which unless decrypted is
    meaningless to anyone reading it.

    - A key source is a key management system or some source of cryptographic keys
    from which keys are obtained or generated.

    - A key is some value that is used to encrypt and/or decrypt data.

    - A secure channel is some channel through which messages can pass unencrypted
    without the possibility of eavesdropping.

    - An adversary is some malicious hacker (or eavesdropper, observer) who can read
    the encrypted data and tries to learn some information by cryptanalyzing it or
    by some other means.


    ## Cryptographic Primitives


    A cryptographic primitive is a fundamental method that delivers particular security
    services, for example, confidentiality or integrity. These cryptographic primitives
    are used to build security protocols, such as authentication protocols. Cryptographic
    primitives include symmetric primitives, asymmetric primitives, and keyless primitives.
    A high-level taxonomy of cryptographic primitives is shown in Figure [2-2](#515270_1_En_2_Chapter.xhtml#Fig2).


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig2_HTML.jpg)


    An organizational chart of cryptographic primitives divides into keyless, symmetric
    key, and asymmetric primitives which have further divisions.


    **Figure 2-2** Cryptographic primitives


    Now let’s have a look at the symmetric primitives.


    ## Symmetric Cryptography


    Symmetric cryptosystems use the same key for encryption and decryption. The key
    must be kept secret and transferred over a secure channel before the data transfer
    between a sender and a receiver. For secure key transfers, key establishment protocols
    are used. Usually, public key cryptography is used to exchange keys, allowing
    for easier key management than symmetric key management, where it can become challenging
    to manage keys as the number of users grows.


    The primary purpose of designing symmetric cryptography algorithms is to provide
    confidentiality, but we can also use them to provide other security services,
    such as data origin authentication.


    There are two classes of symmetric cryptosystems, stream ciphers and block ciphers.
    Figure [2-3](#515270_1_En_2_Chapter.xhtml#Fig3) shows how stream and block ciphers
    operate at a high level.


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig3_HTML.png)


    An illustration of the operation of stream and block ciphers includes the 2 and
    8 bits of plain texts, respectively, which convert to cipher texts.


    **Figure 2-3** Stream (left) vs. block ciphers (right)


    ### Stream Ciphers


    These cryptosystems encrypt the plaintext one bit at a time. The algorithm takes
    a single bit of the plaintext as input, processes it, and produces a single bit
    of ciphertext. The processing involves the use of XOR operations to perform encryption
    and decryption. The model of stream ciphers is in Figure [2-4](#515270_1_En_2_Chapter.xhtml#Fig4).


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig4_HTML.png)


    A flow of stream cipher model is as follows: plain text, encryption, encrypted
    data, decryption, and plain text. Key generator points to functions.


    **Figure 2-4** Stream cipher model


    In this model, plaintext feeds into the encryption function bit by bit along with
    a keystream generated by the key generator. The key generator generates a pseudorandom
    keystream which is usually much smaller than the plaintext. Usually, the key length
    is 128 bits. The keystream and plaintext go through the XOR to produce the ciphertext.
    During decryption, the same process applies again, and plaintext is retrieved.
    Pseudorandom generation means that the bits generated are not random but appear
    random, hence the term pseudorandom. Keystreams are commonly generated using linear
    feedback shift registers (`LFSR`s). The input bit of `LFSR` is a linear function
    of its previous state, where the linear function is usually the XOR operation.


    The key generator is a cryptographically secure pseudorandom number generator
    (`CSPRNG` or `CPRNG`). Being "pseudo," we can compute the number, and anyone computing
    it will have the same result, which implies that these PRNGs are also deterministic.
    If they are truly random and not deterministic, then once generated, the random
    number cannot be regenerated by anyone else, meaning the decryption won''t be
    possible. So, they look random, but actually they are not and are computable.
    `CPRNG`s have a particular property that the numbers they generate are unpredictable.


    There are two types of stream ciphers: synchronous stream ciphers and asynchronous
    stream ciphers. In synchronous stream ciphers, the keystream is dependent only
    on the key. In contrast, the keystream relies on the fixed number of previously
    transmitted encrypted bits and the key in asynchronous stream ciphers.


    Stream ciphers are usually more suited for hardware devices; however, they can
    also be used in software environments. Many examples of stream ciphers exist,
    such as `A5/1`, used in GSM communications to provide confidentiality. However,
    `Salsa20` and `ChaCha` are most used in software environments. Some other stream
    ciphers include `Trivium`, `Rabbit`, `RC4`, and `SEAL`.'
