    HotStuff is composed of four phases: prepare, pre-commit, commit, and decide phases.


    A quorum certificate (QC) is a data structure that represents a collection of
    signatures produced by *n* – *f* nodes to indicate that a required threshold of
    messages has been achieved. In other words, a collection of votes from *n* − *f*
    nodes is a QC.


    ##### Prepare


    Once a new leader has accumulated new view messages from N – F nodes, the protocol
    starts with a new leader. The leader processes these messages to determine the
    latest branch in which the highest quorum certificate of PREPARE messages is present.


    ##### Pre-commit


    As soon as a leader accumulates N – F prepare votes, it creates a quorum certificate
    called “prepare quorum certificate.” The leader broadcasts this certificate to
    other nodes as a PRE-COMMIT message. When a node receives the PRE-COMMIT message,
    it responds with a pre-commit vote. The quorum certificate indicates that the
    required threshold of nodes has confirmed the request.


    ##### Commit


    When the leader has accumulated N – F pre-commit votes, it creates a PRE-COMMIT
    quorum certificate and broadcasts it to other nodes as the COMMIT message. When
    nodes receive this COMMIT message, they respond with their commit vote. At this
    stage, nodes lock the PRE-COMMIT quorum certificate to ensure the safety of the
    algorithm even if a view change occurs.


    ##### Decide


    When the leader receives N – F commit votes, it creates a COMMIT quorum certificate.
    Then, the leader broadcasts this COMMIT quorum certificate to other nodes in the
    DECIDE message. When nodes receive this DECIDE message, they execute the request
    because this message contains an already committed certificate/value. The new
    view starts once the state transition occurs due to the DECIDE message acceptance
    and execution.


    We can visualize this protocol in Figure [8-5](#515270_1_En_8_Chapter.xhtml#Fig5).


    ![](images/515270_1_En_8_Chapter/515270_1_En_8_Fig5_HTML.png)


    An illustration of the HotStuff protocol includes a network of replicas R 1 to
    R 4 in 4 layers, namely, prepare, pre-commit, commit, and decide.


    Figure 8-5


    HotStuff protocol


    More precisely, HotStuff steps are listed as follows:


    *   A new primary acquires new view messages from n-f nodes with the highest prepare
    quorum certificate that each validator receives. The primary looks at these messages
    and finds the prepare QC with the highest view (round number). The leader then
    broadcasts the proposal in a prepare message.


    *   When other nodes receive this prepare message from the leader, they check
    if the prepare proposal extends the highest prepare QC branch and has the higher
    view number associated than what they have currently locked.


    *   Other nodes reply to the leader with an acknowledgment.


    *   The leader collects the acknowledgments from *n* − *f* prepare votes.


    *   When n-f votes are acquired by the leader, it combines them into a prepare
    QC and broadcasts this QC in a pre-commit message.


    *   Other replicas reply to the leader with a pre-commit vote. When the leader
    has received n-f pre-commit votes from other nodes, the primary combines them
    into a pre-commit QC and broadcasts them in a commit message.


    *   Replicas reply to the leader with commit votes and replicas lock on the pre-commit
    QC. When the leader receives n-f commit votes from the replicas, it combines them
    into a commit QC and broadcasts the decide message.


    *   When the nodes receive a decide message, they execute the operations/commands
    and start the next view.


    *   This operation repeats.


    There are other optimizations such as pipelining which allows for further performance
    improvements. As all the phases are fundamentally identical, it’s easy to pipeline
    HotStuff, which improves performance. Pipelining allows the protocol to commit
    a client’s request in each phase. In a view, a leader in each phase proposes a
    new client request. This way, a leader can concurrently process pre-commit, commit,
    and decide messages for previous client requests passed on to the last leader
    via the commit certificate.


    ##### Safety and Liveness


    HotStuff guarantees liveness by using the pacemaker, which ensures progress after
    GST within a bounded time interval by advancing views. This component encapsulates
    view synchronization logic to ensure liveness. It keeps enough honest nodes in
    the same view for sufficiently long periods to ensure progress. This property
    is achieved by progressively increasing the time until progress is made.


    Whenever a node times out in a view, it broadcasts a timeout message and advances
    to the following when a quorum certificate of 2*f* + 1 timeout messages is received.
    This certificate is also sent to the next leader, who takes the protocol further.
    Does this timeout detection sound familiar? It sounds familiar because pacemaker
    abstraction is basically a failure detector that we discussed before in Chapter
    [3](#515270_1_En_3_Chapter.xhtml). Moreover, voting and relevant commit rules
    ensure safety in HotStuff.


    HotStuff is a simple yet powerful protocol that combines several innovations to
    produce a better protocol than its predecessors.'
  trans: '

    #### 工作原理


    `HotStuff` 协议包含四个阶段：准备阶段（Prepare）、预提交阶段（Pre-commit）、提交阶段（Commit）和决定阶段（Decide）。


    一个法定人数证书（`QC`）是一种数据结构，它代表由 *n* – *f* 个节点生成的签名集合，用以表示已达到所需的消息阈值。换句话说，来自 *n* − *f*
    个节点的投票集合就是一个 `QC`。


    ##### 准备阶段


    一旦新的领导者从 `N – F` 个节点累积了新的视图消息，协议便由新领导者启动。领导者处理这些消息，以确定存在最高 `PREPARE` 消息法定人数证书的最新分支。


    ##### 预提交阶段


    一旦领导者累积了 `N – F` 个准备投票，它就会创建一个称为“准备法定人数证书”的法定人数证书。领导者将该证书作为 `PRE-COMMIT` 消息广播给其他节点。当节点收到
    `PRE-COMMIT` 消息时，它会回复一个预提交投票。该法定人数证书表示所需数量的节点已确认该请求。


    ##### 提交阶段


    当领导者累积了 `N – F` 个预提交投票后，它会创建一个 `PRE-COMMIT` 法定人数证书，并将其作为 `COMMIT` 消息广播给其他节点。当节点收到此
    `COMMIT` 消息时，它们会回复自己的提交投票。在此阶段，节点会锁定该 `PRE-COMMIT` 法定人数证书，以确保即使发生视图变更，算法的安全性也能得到保障。


    ##### 决定阶段


    当领导者收到 `N – F` 个提交投票后，它会创建一个 `COMMIT` 法定人数证书。然后，领导者将此 `COMMIT` 法定人数证书通过 `DECIDE`
    消息广播给其他节点。当节点收到此 `DECIDE` 消息时，它们会执行该请求，因为此消息包含一个已经提交的证书/值。一旦由于接受并执行 `DECIDE` 消息而发生状态转换，新的视图便会开始。


    我们可以在图 8-5 中直观地看到此协议。


    ![](img/515270_1_En_8_Fig5_HTML.png)


    对 `HotStuff` 协议的图示说明包括一个由副本 `R 1` 到 `R 4` 组成的网络，分为四层，即准备层、预提交层、提交层和决定层。


    **图 8-5** HotStuff 协议


    更精确地说，`HotStuff` 的步骤如下所列：


    -   新的主节点从 `n-f` 个节点获取新的视图消息，这些消息包含每个验证者收到的最高准备法定人数证书。主节点查看这些消息，并找到具有最高视图（轮次编号）的准备
    `QC`。然后，领导者通过准备消息广播提案。

    -   当其他节点收到来自领导者的此准备消息时，它们会检查该准备提案是否扩展了最高的准备 `QC` 分支，并且是否具有比它们当前锁定的视图编号更高的视图编号。

    -   其他节点通过确认消息回复给领导者。

    -   领导者收集来自 *n* − *f* 个准备投票的确认。

    -   当领导者获得 `n-f` 个投票后，它会将其合并成一个准备 `QC`，并通过预提交消息广播此 `QC`。

    -   其他副本通过预提交投票回复给领导者。当领导者从其他节点收到 `n-f` 个预提交投票后，主节点会将其合并成一个预提交 `QC`，并通过提交消息广播它们。

    -   副本通过提交投票回复给领导者，并锁定在预提交 `QC` 上。当领导者从副本那里收到 `n-f` 个提交投票后，它会将其合并成一个提交 `QC`，并广播决定消息。

    -   当节点收到决定消息时，它们执行操作/命令并开始下一个视图。

    -   此过程循环重复。


    还有其它优化，例如流水线（pipelining），它可以进一步提高性能。由于所有这些阶段本质上都是相同的，因此很容易对 `HotStuff` 进行流水线化处理，从而提升性能。流水线化允许协议在每个阶段提交一个客户端请求。在一个视图中，每个阶段的领导者都会提出一个新的客户端请求。这样，领导者可以并发处理先前客户端请求的预提交、提交和决定消息，这些请求通过提交证书传递给之前的领导者。


    ##### 安全性与活跃性


    `HotStuff` 通过使用心跳机制（pacemaker）来保证活跃性，该机制通过在 `GST` 之后、有界时间间隔内推进视图来确保进展。该组件封装了视图同步逻辑以确保活跃性。它使足够多的诚实节点在同一个视图中停留足够长的时间，以确保达成进展。这一特性是通过逐步增加超时时间，直到取得进展来实现的。


    每当一个节点在某个视图内超时，它就会广播一条超时消息，并在收到 `2*f* + 1` 个超时消息组成的法定人数证书后，前进到下一个视图。该证书也会被发送给下一个领导者，由其继续推进协议。这种超时检测听起来熟悉吗？它听起来熟悉是因为心跳机制的抽象本质上就是我们在第
    3 章中讨论过的故障检测器。此外，投票和相关的提交规则确保了 `HotStuff` 的安全性。


    `HotStuff` 是一个简单而强大的协议，它结合了多项创新，产生了一个比其前辈更优的协议。

    '
- fmt: '# Polkadot


    Polkadot is a modern blockchain protocol that connects a network of purpose-built
    blockchains and allows them to operate together. It is a heterogenous multichain
    ecosystem with shared consensus and shared state.


    Polkadot has a central main chain, called a relay chain. This relay chain manages
    the Parachains – the heterogenous shards that are connected to the relay chain.
    A relay chain holds the states of all Parachains. All these Parachains can communicate
    with each other and share the security, which leads to a better and more robust
    ecosystem. As the Parachains are heterogenous, they can serve different purposes;
    a chain can be a specific chain for smart contracts, another for gaming, another
    could be for providing some public services, and so on and so forth. The relay
    chain is secured by a nominated proof of stake.


    The validators on the relay chain produce blocks and communicate with Parachains
    and finalize blocks. On-chain governance decides what the ideal number of validators
    should be.


    A depiction of the Polkadot chain with Parachains is shown in Figure [8-6](#515270_1_En_8_Chapter.xhtml#Fig6).


    ![](images/515270_1_En_8_Chapter/515270_1_En_8_Fig6_HTML.png)


    A circular chart of Polkadot includes 4 para chain slots, 1 para thread slot,
    1 para chain community block, and a bridge for other chains.


    Figure 8-6


    A simple depiction of Polkadot


    Polkadot aims to be able to communicate with other blockchains as well. For its
    purposes, bridges are used, which connect Parachains to external blockchains,
    such as Bitcoin and Ethereum.


    There are several components in Polkadot. The **relay chain** is the main chain
    responsible for managing Parachains, cross-chain interoperability, and interchain
    messaging, consensus, and security.


    It consists of nodes and roles. Nodes can be light clients, full nodes, archive
    nodes, or sentry nodes. Light clients consist of only the runtime and state. Full
    nodes are pruned at configurable intervals. Archive nodes keep the entire history
    of blocks, and sentry nodes protect validators and thwart DDoS attacks to provide
    security to the relay chain. There are several roles that nodes can perform: validator,
    nominator, collator, and fisherman. **Validators** are the highest level in charge
    in the system. They are block producers, and to become block producers, they need
    to provide a sufficient bond deposit. They produce and finalize blocks and communicate
    with Parachains. **Nominators** are stakeholders and contribute to the validators’
    security bond. They place trust in a validator to “be good” and produce blocks.
    **Collators** are responsible for transaction execution. They create unsealed
    but valid blocks to validators that propose. **Fishermen** are used to detect
    malicious behavior. Fishermen are rewarded for providing proof of misbehavior
    of participants. **Parachains** are heterogenous blockchains connected to the
    relay chain. These are fundamentally the execution core of Polkadot. Parachains
    can be with their own runtime called application-specific blockchains. Another
    component called **Parathread** is a blockchain that works within the Polkadot
    host and connects to the relay chain. They can be thought of as pay-as-you-go
    chains. A Parathread can become a Parachain via an auction mechanism. **Bridges**
    are used to connect Parachains with external blockchain networks like Bitcoin
    and Ethereum.


    ## Consensus in Polkadot


    Consensus in Polkadot is achieved through a combination of various mechanisms.
    For governance and accounting, a nominated proof of stake is used. For block production,
    `BABE` is used. `GRANDPA` is the finality gadget. In the network, validators have
    their own clocks, and a partially synchronous network is assumed.


    Finality is usually probabilistic as we saw in traditional Nakamoto PoW consensus.
    In most permissioned networks and some public networks, it tends to be deterministic,
    that is, provable finality, for example, `PBFT` and `Tendermint`.


    In Polkadot, due to the reason that it is a multichain heterogenous architecture,
    there could be some situations where, due to some conflicts between chains, some
    rogue blocks are added. These rogue blocks will need to be removed after conflict
    resolution; in such situations, deterministic finality is not suitable due to
    its irreversible property. On the other hand, `PoW` is too slow, energy consuming,
    and probabilistic. The solution for this is to keep producing blocks as fast as
    possible but postpone finality for later as soon as it is suitable to finalize.
    This way, block production can continue and is revertible, but finality decision
    can be made separately and provably at a later stage.


    This notion of provable finality is quite useful in a multichain heterogenous
    network because it allows us to prove to other parties that are not involved in
    consensus that a block is final. Also, provable finality makes it easier to make
    bridges to other blockchains.


    This hybrid approach works by allowing validators to produce blocks even if only
    one validator is online and correct, but the finalization of the blocks is offloaded
    to a separate component called a finality gadget. Under normal conditions, block
    finalization is also quite fast, but in case of issues such as state conflicts,
    the finalization can be postponed until more scrutiny checks are performed on
    the blocks. In case of severe attacks or huge network partitions, block production
    will continue; however, as a fallback mechanism, Polkadot will fall back to the
    probabilistic finalization mechanism. This way, liveness is guaranteed even under
    extreme scenarios, as long as at least one validator is correct and alive. The
    blocks are produced by `BABE`, whereas they are finalized by `GRANDPA`. `GRANDPA`
    finalizes a chain of blocks instead of block-by-block finalization which improves
    efficiency. As finalization is a separate process, block production can continue
    at whatever speed the network allows for, but finality doesn’t impact the block
    production speed and is done later.


    There can be some forks before a “best” chain is finalized by `GRANDPA`. We can
    visualize this in Figure [8-7](#515270_1_En_8_Chapter.xhtml#Fig7).


    ![](images/515270_1_En_8_Chapter/515270_1_En_8_Fig7_HTML.png)


    A flowchart has the following flow. Blocks 4, x, y, and z under `BABE` point to
    blocks 3, 2, and 1, under `GRANDPA`, in the order mentioned.


    Figure 8-7


    `BABE` producing and `GRANDPA` finalizing


    The diagram shows on the right side three produced blocks by `BABE` in three forks;
    `GRANDPA` resolves these forks and finalizes the chain. Now let’s see how blocks
    are produced by `BABE`.'
