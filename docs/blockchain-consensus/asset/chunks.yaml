  trans: '

    ### 随机预言机


    随机预言机使得随机化算法的发展成为可能。在这种方法中，为了以概率方式达成共识，一定程度地牺牲了确定性。该方法的优点在于无需对时序做出任何假设，但缺点是随机化算法的效率不高。在随机化共识算法中，安全属性或活跃属性之一会被改为非确定性的概率版本。例如，活跃属性变为：


    - **活跃性**：每个正确的进程最终都能以高概率做出决定。


    这在某种意义上解决了 FLP 不可能性——FLP 不可能性在实践中意味着存在一些不会终止的共识执行过程。如果让终止条件变为概率性的，就可以“规避”共识的不可能性：


    - **一致性**：所有正确的进程最终都以概率 1 对某个值达成一致。


    然而，通常被改为概率性的是活跃属性，而非一致性、有效性及完整性等安全属性。牺牲安全属性来换取活跃（终止）属性通常并不可取。


    随机化算法的核心技术被称为“抛硬币”。抛硬币或掷硬币可分为两种类型。


    本地硬币是指处理器的状态从当前状态推进到下一个状态，该状态根据算法的概率分布进行选择。这通常通过随机比特生成器实现，它以相等的概率返回 0 或 1（正面或反面）。


    共享硬币或全局硬币算法利用这些本地硬币来构建一个全局硬币。其要求是向所有诚实进程提供相同的硬币值，从而实现一致。


    本地硬币算法在指数级通信步骤后终止，而共享硬币算法则在常数级步骤内终止。


    牺牲确定性以采用随机化方法各有利弊。其主要优势之一是无需时序假设。然而，缺点是轮次数量显著增加，并且引入随机化所需的密码学计算成本可能很高。


    拜占庭共识的随机化算法最早出现在 Ben-Or 和 Rabin 于 1983 年的工作中，我们将在第 6 章中与其他一些算法一同讨论。


    ### 混合模型


    在规避 FLP 不可能性的混合模型方法中，会结合使用随机化技术和故障检测器。


    虫洞是一种系统模型中的扩展，与系统的其他部分相比，它具有更强的特性。它通常是一种安全、防篡改且故障静默的可信硬件，为进程正确执行协议中的某些关键步骤提供了途径。文献中引入了多种虫洞，例如经过认证的仅追加存储器，它迫使副本提交到可验证的操作序列。可信的及时计算基础（TTCB）是首个为虫洞支持的共识而引入的虫洞。

    '
- fmt: '### Failure Detectors


    The intuition behind failure detectors is that if somehow we can get a hint about
    the failure of a process, then we can circumvent FLP impossibility. Remember the
    FLP impossibility result suggests that it is impossible to distinguish between
    a crashed process and simply a very slow one. There is no way to find out, so
    if somehow we can get an indication that some process has failed, then it would
    be easier to handle the situation. In this setting, asynchrony is somewhat sacrificed
    because failure detectors work based on heartbeats and timeout assumptions. Failure
    detectors are added as an extension to the asynchronous systems.


    A failure detector can be defined as a distributed oracle at each process that
    gives hints about (suspects) whether a process is alive or has crashed. In a way,
    failure detectors encapsulate timeout and partial synchrony assumptions as a separate
    module. There are two categories of properties that define failure detectors:


    - **Completeness** implies that a failure detector will eventually detect faulty
    processes. This is a liveness property.

    - **Accuracy** implies that a failure detector will never suspect a correct process
    as failed. This is a safety property.


    Based on the preceding two properties, eight classes of failure detectors have
    been proposed by Chandra and Toueg in their seminal paper “Unreliable Failure
    Detectors for Reliable Distributed Systems.” It is also possible to solve consensus
    by introducing a weak unreliable failure detector. This work was also proposed
    by Chandra and Toueg.


    The ability of a failure detector to accurately suspect failure or liveness depends
    on the system model. A failure detector is usually implemented using a heartbeat
    mechanism where heartbeat messages are exchanged between processes, and if these
    messages are not received by some processes for some time, then failure can be
    suspected. Another method is to implement a timeout mechanism which is based on
    worst-case message round-trip time. If a message is not received by a process
    in the expected timeframe, then timeout occurs, and the process is suspected failed.
    After this, if a message is received from the suspected process, then the timeout
    value is increased, and the process is no longer suspected failed. A failure detector
    using a heartbeat mechanism is shown in Figure [3-15](#515270_1_En_3_Chapter.xhtml#Fig15).


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig15_HTML.jpg)


    *Figure 3-15: Failure detector using heartbeats*


    In Figure [3-15](#515270_1_En_3_Chapter.xhtml#Fig15), process `P1` sends a regular
    heartbeat message “Alive” to process `P2`. There are two parameters in the failure
    detector: a heartbeat interval `H` and a timeout value `T`. Process `P1` is suspected
    if `P2` does not receive any heartbeat messages from `P1` for a time period longer
    than `T`. In the diagram, message 4 did not arrive within the timeout value `T`;
    therefore, `P2` now suspects `P1` of failure, due to timeout. If `P2` starts to
    receive any message (either heartbeat or any other protocol, application message)
    from `P1`, then `P2` no longer suspects process `P1`. This is shown from message
    5 onward in the diagram. Timer `T` starts again (resets) as soon as `P2` receives
    a message from `P1`.


    Failure detectors are practical only under synchronous and partially synchronous
    system models. In asynchronous systems, failure detectors cannot achieve completeness
    and accuracy at the same time. However, we may achieve completeness independently
    by immediately (and naively) suspecting all processes have crashed. After that,
    if some process fails, then the suspicion will be true, fulfilling the completeness
    property. Similarly, accuracy can be achieved by just not suspecting any processes,
    which of course is quite useless, but presumably achieves accuracy. In other words,
    perfect failure detectors are possible in synchronous systems, whereas no perfect
    failure detector is possible in asynchronous systems. In a way, we encapsulate
    partial synchrony and timeouts in failure detectors to achieve failure detection
    capability in our system.


    Another advantage of failure detectors is that all the timeout mechanics are localized
    within the failure detector module, and the program is free to perform other tasks.
    In the case where no failure detector module is present, the program ends up waiting
    infinitely long for an expected incoming message from a crashed process. We can
    understand this with a comparison. For example, a blocking receive operation “*Wait
    for message m from process p*” becomes `(wait for message m from process p) or
    (suspect p of failure)`. Now you can see the blocking program becomes nonblocking,
    and there is now no infinite waiting; if the `p` is suspected, then it’s added
    to the suspected list, and the program continues its operation, whatever that
    might be.


    Now let’s look at the properties of strong and weak completeness and accuracy.


    ### Strong Completeness

    This property requires that eventually every crashed process is permanently suspected
    by every correct process.


    ### Weak Completeness

    The property requires that eventually each crashed process is permanently suspected
    by some correct process.


    ### Strong Accuracy

    This property denotes that a process is never suspected until it crashes (before
    it crashes) by any correct process.


    ### Weak Accuracy

    This property describes that some correct process is never suspected by any correct
    process.


    ### Eventual Strong Accuracy

    This property suggests that after some time, correct processes do not suspect
    any correct processes any longer.


    ### Eventual Weak Accuracy

    This property implies that after some time, some correct process is not suspected
    anymore by any correct process.


    We can visualize strong and weak completeness in the diagram shown in Figure [3-16](#515270_1_En_3_Chapter.xhtml#Fig16).


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig16_HTML.png)


    *Figure 3-16: Strong completeness vs. weak completeness*


    Now we discuss eight classes of failure detectors. There are four classes of failure
    detectors which provide strong completeness. The first two failure detectors work
    under synchronous systems, namely, perfect detector `P` and strong detector `S`.
    The other two work under partially synchronous models, namely, eventually perfect
    detector (diamond `P`) and eventually strong detector (diamond `S`).


    We describe these classes now, first with strong completeness.


    ### Perfect Failure Detector P

    This type of failure detector satisfies strong completeness and strong accuracy
    properties. `P` cannot be implemented in asynchronous systems. This is because
    strong completeness and accuracy cannot be achieved for `P` in asynchronous systems.


    ### Strong Failure Detector S

    This failure detector has weak accuracy and strong completeness.


    ### Eventually Perfect Failure Detector – Diamond P

    This class of FDs satisfies strong completeness and eventual strong accuracy.


    ### Eventually Strong Failure Detector – Diamond S

    This class of FDs satisfies strong completeness and eventual weak accuracy.


    There are also four classes of failure detectors which provide weak completeness.
    Detector `Q` and weak detector `W` work under synchronous models. Two other detectors,
    eventually detector `Q` (diamond `Q`) and eventually weak detector (diamond `W`),
    work under partial synchrony assumptions.


    We describe these as follows.


    ### Weak Failure Detector W

    This type satisfies weak completeness and weak accuracy properties.


    ### Eventually Weak Failure Detector (Diamond W)

    This type satisfies weak completeness and eventual weak accuracy properties.'
