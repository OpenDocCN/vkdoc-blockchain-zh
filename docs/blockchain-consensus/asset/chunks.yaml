    the suspected list, and the program continues its operation, whatever that might
    be.


    Now let’s look at the properties of strong and weak completeness and accuracy.


    ###### Strong Completeness


    This property requires that eventually every crashed process is permanently suspected
    by every correct process.


    ###### Weak Completeness


    The property requires that eventually each crashed process is permanently suspected
    by some correct process.


    ###### Strong Accuracy


    This property denotes that a process is never suspected until it crashes (before
    it crashes) by any correct process.


    ###### Weak Accuracy


    This property describes that some correct process is never suspected by any correct
    process.


    ###### Eventual Strong Accuracy


    This property suggests that after some time, correct processes do not suspect
    any correct processes any longer.


    ###### Eventual Weak Accuracy


    This property implies that after some time, some correct process is not suspected
    anymore by any correct process.


    We can visualize strong and weak completeness in the diagram shown in Figure [3-16](#515270_1_En_3_Chapter.xhtml#Fig16).


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig16_HTML.png)


    A diagram of strong and weak completeness has two star-shaped interconnected node
    charts. Each chart has 5 nodes, 3 of them are labeled suspect.


    Figure 3-16


    Strong completeness vs. weak completeness


    Now we discuss eight classes of failure detectors. There are four classes of failure
    detectors which provide strong completeness. The first two failure detectors work
    under synchronous systems, namely, perfect detector P and strong detector S. The
    other two work under partially synchronous models, namely, eventually perfect
    detector (diamond P) and eventually strong detector (diamond S).


    We describe these classes now, first with strong completeness.


    ###### Perfect Failure Detector P


    This type of failure detector satisfies strong completeness and strong accuracy
    properties. P cannot be implemented in asynchronous systems. This is because strong
    completeness and accuracy cannot be achieved for P in asynchronous systems.


    ###### Strong Failure Detector S


    This failure detector has weak accuracy and strong completeness.


    ###### Eventually Perfect Failure Detector – Diamond P


    This class of FDs satisfies strong completeness and eventual strong accuracy.


    ###### Eventually Strong Failure Detector – Diamond S


    This class of FDs satisfies strong completeness and eventual weak accuracy.


    There are also four classes of failure detectors which provide weak completeness.
    Detector Q and weak detector W work under synchronous models. Two other detectors,
    eventually detector Q (diamond Q) and eventually weak detector (diamond W), work
    under partial synchrony assumptions.


    We describe these as follows.


    ###### Weak Failure Detector W


    This type satisfies weak completeness and weak accuracy properties.


    ###### Eventually Weak Failure Detector (Diamond W)


    This type satisfies weak completeness and eventual weak accuracy properties.'
  trans: '

    ### 故障检测器


    故障检测器背后的直觉是，如果我们能设法获得进程故障的提示，那么就可以规避 FLP 不可能性结果。请记住，FLP 不可能性结果指出，无法区分一个进程是崩溃了还是仅仅速度非常慢。没有方法可以查明这一点，因此如果我们能设法得到某个进程已故障的指示，那么处理这种情况就会更容易。在这种设置下，异步性在一定程度上被牺牲了，因为故障检测器基于心跳和超时假设来工作。故障检测器作为异步系统的扩展被添加。


    一个故障检测器可以定义为每个进程上的一个分布式预言机，它提供关于一个进程是存活还是已崩溃的提示（怀疑）。在某种程度上，故障检测器将超时和部分同步假设封装为一个独立的模块。定义故障检测器有两类属性：


    - **完备性** 意味着故障检测器最终会检测到故障进程。这是一个活性（liveness）属性。

    - **准确性** 意味着故障检测器永远不会怀疑一个正确的进程故障。这是一个安全性（safety）属性。


    基于上述两个属性，Chandra 和 Toueg 在他们开创性的论文“用于可靠分布式系统的不可靠故障检测器”中提出了八类故障检测器。通过引入一个弱的不可靠故障检测器，也有可能解决共识问题。这项工作同样由
    Chandra 和 Toueg 提出。


    一个故障检测器准确怀疑故障或活性的能力取决于系统模型。故障检测器通常使用心跳机制来实现，其中进程之间交换心跳消息，如果某些进程在一段时间内未收到这些消息，则可以怀疑发生了故障。另一种方法是实现一个基于最坏情况消息往返时间的超时机制。如果一个进程在预期的时间范围内没有收到消息，则发生超时，并且该进程被怀疑已故障。之后，如果从被怀疑的进程收到消息，则增加超时值，并且该进程不再被怀疑故障。图
    3-15 展示了一个使用心跳机制的故障检测器。


    ![](img/515270_1_En_3_Fig15_HTML.jpg)


    *图 3-15：使用心跳的故障检测器*


    在图 3-15 中，进程 `P1` 向进程 `P2` 发送常规的心跳消息“Alive”。故障检测器中有两个参数：心跳间隔 `H` 和超时值 `T`。如果 `P2`
    在超过 `T` 的时间段内没有收到来自 `P1` 的任何心跳消息，则怀疑 `P1`。在图中，消息 4 在超时值 `T` 内没有到达；因此，`P2` 现在因超时而怀疑
    `P1` 故障。如果 `P2` 开始收到来自 `P1` 的任何消息（无论是心跳还是任何其他协议或应用消息），则 `P2` 不再怀疑进程 `P1`。这在图中从消息
    5 开始展示。一旦 `P2` 收到来自 `P1` 的消息，计时器 `T` 就会重新开始（重置）。


    故障检测器仅在同步和部分同步系统模型下是实用的。在异步系统中，故障检测器无法同时实现完备性和准确性。然而，我们可以通过立即（且天真地）怀疑所有进程都已崩溃来独立实现完备性。之后，如果某个进程确实故障了，那么这种怀疑就是正确的，从而满足了完备性属性。类似地，可以通过不怀疑任何进程来实现准确性，这当然相当无用，但大概能实现准确性。换句话说，完美的故障检测器在同步系统中是可能的，而在异步系统中则不可能有完美的故障检测器。在某种程度上，我们将部分同步和超时封装在故障检测器中，以便在我们的系统中实现故障检测能力。


    故障检测器的另一个优点是所有超时机制都局限在故障检测器模块内部，程序可以自由地执行其他任务。在没有故障检测器模块的情况下，程序最终会无限期地等待来自已崩溃进程的预期传入消息。我们可以通过比较来理解这一点。例如，一个阻塞式接收操作“*等待来自进程
    p 的消息 m*”变成了`(等待来自进程 p 的消息 m) 或 (怀疑 p 故障)`。现在你可以看到阻塞式程序变成了非阻塞式，并且不再有无限等待；如果怀疑
    `p` 故障，则将其添加到怀疑列表中，然后程序继续其操作，无论那是什么操作。


    现在让我们看看强/弱完备性和准确性的属性。


    ### 强完备性

    此属性要求最终每个崩溃的进程被每个正确的进程永久怀疑。


    ### 弱完备性

    此属性要求最终每个崩溃的进程被某个正确的进程永久怀疑。


    ### 强准确性

    此属性表示一个进程在它崩溃之前（在它崩溃前）不会被任何正确的进程怀疑。


    ### 弱准确性

    此属性描述某个正确的进程永远不会被任何正确的进程怀疑。


    ### 最终强准确性

    此属性表明，经过一段时间后，正确的进程不再怀疑任何正确的进程。


    ### 最终弱准确性

    此属性暗示，经过一段时间后，某个正确的进程不再被任何正确的进程怀疑。


    我们可以在图 3-16 所示的图表中直观地看到强完备性与弱完备性。


    ![](img/515270_1_En_3_Fig16_HTML.png)


    *图 3-16：强完备性与弱完备性*


    现在我们讨论八类故障检测器。有四类故障检测器提供强完备性。前两种故障检测器在同步系统下工作，即完美检测器 `P` 和强检测器 `S`。另外两种在部分同步模型下工作，即最终完美检测器（菱形
    `P`）和最终强检测器（菱形 `S`）。


    我们现在描述这些类别，首先是强完备性。


    ### 完美故障检测器 P

    这种类型的故障检测器满足强完备性和强准确性属性。`P` 不能在异步系统中实现。这是因为在异步系统中无法实现 `P` 所需的强完备性和准确性。


    ### 强故障检测器 S

    这种故障检测器具有弱准确性和强完备性。


    ### 最终完美故障检测器 – 菱形 P

    这类故障检测器满足强完备性和最终强准确性。


    ### 最终强故障检测器 – 菱形 S

    这类故障检测器满足强完备性和最终弱准确性。


    还有四类故障检测器提供弱完备性。检测器 `Q` 和弱检测器 `W` 在同步模型下工作。另外两种检测器，最终检测器 `Q`（菱形 `Q`）和最终弱检测器（菱形
    `W`），在部分同步假设下工作。


    我们如下描述它们。


    ### 弱故障检测器 W

    这种类型满足弱完备性和弱准确性属性。


    ### 最终弱故障检测器（菱形 W）

    这种类型满足弱完备性和最终弱准确性属性。

