- fmt: "### Diffie-Hellman Key Exchange\n\nFor key exchange, the pioneering and fundamental\
    \ scheme is the Diffie-Hellman key exchange. It is an interactive protocol that\
    \ runs between two parties. A basic and intuitive mathematical example of the\
    \ Diffie-Hellman exchange is shown as follows:\n\n1. Alice and Bob want to establish\
    \ a shared secret key.\n2. Both agree on two numbers, a prime number `P` = 13\
    \ and a generator of `P`, `G` = 6. In practice, however, `P` is very large.\n\
    3. Both randomly choose a large random integer (i.e., private keys).\n   - Alice’s\
    \ private key = 5, Bob’s private key = 4\n4. Both calculate public keys:\n   -\
    \ Alice: `6⁵ mod 13` = `7776 mod 13` = `2` → Public key = `2`\n   - Bob: `6⁴ mod\
    \ 13` = `1296 mod 13` = `9` → Public key = `9`\n5. Bob sends public key `9` to\
    \ Alice, and Alice sends public key `2` to Bob.\n6. Both calculate the shared\
    \ key using private keys `5` and `4`.\n   - Alice: `9⁵ mod 13` = `3`\n   - Bob:\
    \ `2⁴ mod 13` = `3`\n7. A shared secret key is established.\n\nPublic key cryptosystems\
    \ rely on one-way trapdoor functions. Trapdoor functions are easy to compute in\
    \ one direction but difficult to compute in the opposite direction, unless there\
    \ is a special value, called the trapdoor, available. This concept can be visualized\
    \ in Figure 2-11.\n\n![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig11_HTML.jpg)\n\
    \nAn illustration includes domains `f` and `f(x)`. `F to f(x)` is easy to compute.\
    \ `f(x)` to `f` is difficult to invert unless the trapdoor is available.\n\n**Figure\
    \ 2-11** Trapdoor function\n\nDifferent hard computational problems, such as a\
    \ large integer factorization problem and a discrete logarithm problem, provide\
    \ suitable one-way trapdoor functions. Cryptography schemes using integer factorization\
    \ are based on the infeasibility of factoring large integers. A typical example\
    \ that relies on such an assumption is RSA. Integer factorization is the decomposition\
    \ of a composite number (formed by multiplying two smaller integers) into smaller\
    \ integers (factors).\n\nIn cryptography, factors are restricted to prime numbers.\
    \ We can demonstrate the problem with a simple example as follows. For example,\
    \ it is straightforward to see that `15` is the product of `5` and `3` as `5 *\
    \ 3 = 15`. What about a larger prime number, for example, `6887`? It is comparatively\
    \ difficult, but we get `71` and `97` as factors with some calculation. What if\
    \ the number is huge, say 1024 bits, and prime? Then multiplying two such primes\
    \ is easy to do but extremely hard to factor, making it a one-way function that\
    \ we can use in cryptography.\n\nA discrete logarithm problem is the basis for\
    \ many different cryptography schemes such as the Diffie-Hellman key exchange\
    \ and digital signature algorithms. It is based on a problem in modular arithmetic\
    \ where it is easy to calculate the result of a modulo operation, but it is hard\
    \ to find the exponent of the generator. This hardness creates a one-way function\
    \ where it is computationally infeasible to find the input from the output.\n\n\
    A simple example can demonstrate the crux of this problem:\n\n```\n3^2 mod 10\
    \ = 9\n```\n\nNow, given `9`, finding `2`, the exponent of the generator `3`,\
    \ is extremely hard to do. Formally, we can say that given numbers `a` and `n`\
    \ where `n` is a prime, the function\n\n```\nf(b) = a^b mod n\n```\n\nis a one-way\
    \ function, because calculating `f(b)` is easy, but given `f(b)`, finding `b`\
    \ is hard.\n\nAnother method developed in the mid-1980s is elliptic curve cryptography\
    \ (ECC). Elliptic curve cryptography has gained special attention due to its usage\
    \ in blockchain platforms, such as Bitcoin and Ethereum. Protocols such as the\
    \ Elliptic Curve Diffie-Hellman key exchange and elliptic curve digital signature\
    \ algorithms are most prevalent in this space. ECC is fundamentally a discrete\
    \ logarithm problem but founded upon elliptic curves over finite fields. A key\
    \ advantage of ECC is that a smaller key size provides the same level of security\
    \ as a larger key size in RSA. For example, a security level of a 1024-bit integer\
    \ factorization scheme, such as RSA, can be achieved by only a 160-bit elliptic\
    \ curve–based scheme, such as ECDSA.\n\nPublic key cryptosystems can be used for\
    \ encryption, though it is very less common and not efficient for large datasets.\
    \ It is also used for providing other security services and protocols, such as\
    \ digital signatures, entity authentication, and key agreement.\n\n### Digital\
    \ Signatures\n\nDigital signatures are one of the most common uses of public key\
    \ cryptography. Digital signatures provide nonrepudiation services. Most common\
    \ examples include RSA-based digital signatures, digital signature algorithms\
    \ (DSA), and ECDSA and Schnorr signatures.\n\n#### Entity Authentication\n\nEntity\
    \ authentication or identification is another service that public key cryptosystems\
    \ can provide. Usually, challenge-response mechanisms are in widespread use where\
    \ a challenge sent by the verifier is required to be responded to correctly by\
    \ the prover (claimant of identity) to ascertain the legitimacy of the claimant.\n\
    \n#### Key Agreement\n\nKey agreement protocols are used to establish secret keys\
    \ before an encrypted data transfer. The most common example of such protocols\
    \ is the Diffie-Hellman key exchange protocol.\n\n### RSA\n\nRSA is widely used\
    \ for secure key transport and building digital signatures. Diffie and Hellman\
    \ invented public key cryptography in 1976. Based on this idea, in 1978, the RSA\
    \ public key cryptosystem was developed by Rivest, Shamir, and Adleman.\n\nIn\
    \ this section, I will walk you through the steps of generating key pairs in RSA\
    \ and how to encrypt and decrypt.\n\n#### Key Pair Generation\n\n1. **Generate\
    \ a modulus.**\n   - Select `p` and `q`, two large prime numbers. Usually, `2^1024`\
    \ bits or more.\n   - Multiply `p` and `q` to generate modulus `n`. `n = p * q`.\
    \ `n` becomes `2^2048`.\n\n2. **Choose a random number with some special properties.**\
    \ Assume that we call this number `e`.\n   - This number `e` should have some\
    \ special properties:\n     - It should be greater than `1`.\n     - It should\
    \ be less than `ϕ(n) = (p - 1)(q - 1)`.\n     - `gcd(e, (p - 1)(q - 1)) = 1`.\n\
    \     - `e ∈ {1, 2, ..., ϕ(n) - 1}`.\n   - Formally speaking, this number `e`\
    \ should be the coprime (relatively prime) of `(p - 1)(q - 1)`, that is, no number\
    \ other than `1` can be divided fully into `e` and `(p - 1)(q - 1)`. Coprimes\
    \ have no common factors except `1`, so the greatest common divisor (GCD) of coprimes\
    \ is `1`.\n\n3. **Public key generation**\n   - The modulus `n` generated in step\
    \ 1 and the special number `e` generated in step 2 form the pair `(n, e)`, which\
    \ is the public key. This pair is public, so it can be shared with anyone; however,\
    \ `p` and `q` must be kept secret.\n\n4. **Private key generation**\n   - The\
    \ private key, let’s call it `d`, is calculated from the two primes `p` and `q`\
    \ from step 1 and the special number `e` from step 2. The private key is the inverse\
    \ of `e` modulo `(p - 1)(q - 1)`, which we can write as:\n\n   ```\n   e d = 1\
    \ mod (p - 1)(q - 1)\n   e d = 1 mod ϕ(n)\n   d = e^(-1) = 7 mod 20\n   ```\n\n\
    \   In practice, the extended Euclidean algorithm is used to calculate `d`, which\
    \ takes `p`, `q`, and `e` as input and outputs `d`. `d` must be kept secret."
