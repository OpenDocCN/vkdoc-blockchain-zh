    \n*如果你在研究问题上陷入困境，请仔细阅读所有相关文献，你会找到答案。*  \n*——科学家巴希尔·艾哈迈德·汗*\n\n# 引言\n\n本书是对分布式共识及其在区块链中应用的介绍。它涵盖了经典协议、比特币之后出现的区块链时代协议以及量子协议。许多来自不同背景的爱好者进入了区块链世界，可能缺乏传统的分布式系统经验。本书填补了这一知识空白。它介绍了分布式共识的经典协议和基础，从而为理解区块链共识研究打下坚实基础。其他许多人来自传统的分布式系统背景，无论是开发者还是理论家，但他们可能缺乏对区块链及相关概念（如比特币和以太坊）的理解。本书也将填补这一空白。\n\
    \n此外，由于量子计算未来将几乎影响一切，我还介绍了量子计算如何帮助构建量子共识算法。通过使用量子计算，可以在共识算法的效率和安全性方面实现明显的优势。因此，专门有一章讨论量子共识。\n\
    \n本书面向所有希望了解区块链共识和广义分布式共识这一迷人世界的人。只需具备计算机科学基础知识即可充分利用本书。本书亦可作为区块链与分布式共识一学期课程的学习资源。\n\
    \n本书首先简要介绍分布式共识是什么，并涵盖因果关系、时间及各种分布式系统模型等基本概念。然后，为理解区块链共识的安全方面奠定基础，介绍了密码学入门知识。接着，详细介绍了分布式共识。随后介绍了区块链，让读者扎实理解什么是区块链以及它本质上是一个分布式系统。然后我们讨论区块链共识，重点介绍首个加密货币区块链——比特币，以及它如何实现其安全性和分布式共识目标。从第\
    \ 6 章开始，介绍早期协议，涵盖拜占庭将军问题及其各种解决方案等经典工作。之后，介绍了 Paxos、DLS 和 PBFT 等经典协议。接着，介绍了 ETHASH、Tendermint、GRANDPA、BABE、HotStuff\
    \ 和 Casper 等区块链协议。这些协议是区块链共识机制研究的最新成果。当然，由于主题广泛，我们无法涵盖所有内容。但本章专门介绍区块链共识，涵盖了那些最先进且在主流区块链平台（如\
    \ Polkadot、以太坊和 Cosmos）中使用的所有协议。\n\n下一章是另一个激动人心的主题：量子共识。随着量子计算的出现，人们认识到量子计算可以显著增强经典分布式共识的结果。甚至像\
    \ FLP 不可能性这样的结果，也可能利用叠加和纠缠等量子特性被推翻。\n\n最后，最后一章总结了本书所学内容，介绍了一些特殊协议，并提出了一些研究方向。\n\
    \n由于本书侧重于区块链和共识的基础，我相信它将为所有想学习区块链和区块链共识的爱好者提供极好的学习资源。此外，我希望本书在未来许多年里能为技术人员、研究人员、学生、开发者以及任何想深入了解这一迷人主题的人提供帮助。\n\
    \n# 致谢\n\n没有许多人的帮助，这本书是不可能完成的。首先，我要感谢 Apress 的 Aditee Mirashi，感谢她为这个项目付出的时间、耐心和奉献。\n\
    \n多年来，我阅读了许多书籍、论文、在线资源以及该领域专家和学者的讲座，才得以学习这个主题。我要感谢所有分享知识的科研人员和工程师。我还要感谢审阅者，他们的建议极大地改进了这本书。\n\
    \n我要感谢我的妻子和孩子们，感谢他们的支持，并在我本应与他们共度的周末忙于写作时包容我。\n\n最后，我要感谢我的父亲，我的指路明灯。他为我牺牲了一切，在人生的每一步指导我，赋予我能力去实现生命中最好的成就。谢谢您，爸爸！他激励我写这本书，并建议我在\
    \ 2022 年出版。还有我的母亲，她对我无条件的爱永无止境。谢谢您，妈妈！\n\n# 关于作者\n\n# 关于技术审阅者\n\n# 1. 引言\n\n在本章中，我们探索分布式计算的基础。首先，我们将回答关于分布式系统、其基本抽象、系统模型及相关概念的问题。\n"
- fmt: "## Distributed Systems\n\nIn the literature, there are many different definitions\
    \ of distributed systems. Still, fundamentally they all address the fact that\
    \ a distributed system is a collection of computers working together to solve\
    \ a problem.\n\nSome definitions from famous scholars in this field are as follows:\n\
    \n> *A distributed system is one in which the failure of a computer you didn’t\
    \ even know existed can render your own computer unusable.*\n> \n> —Leslie Lamport\n\
    > \n> [`https://lamport.azurewebsites.net/pubs/distributed-system.txt`](https://lamport.azurewebsites.net/pubs/distributed-system.txt)\n\
    \n> *A distributed system is a collection of autonomous computing elements that\
    \ appears to its users as a single coherent system.*\n> \n> —Tanenbaum\n> \n>\
    \ [`www.distributed-systems.net/index.php/books/ds3/`](http://www.distributed-systems.net/index.php/books/ds3/)\n\
    \nHere is my own attempt!\n\nA distributed system is a collection of autonomous\
    \ computers that collaborate with each other on a message-passing network to achieve\
    \ a common goal.\n\nUsually, this problem is not solvable by a single computer,\
    \ or the distributed system is inherently distributed such as a social media application.\n\
    \nSome everyday examples of distributed systems are Google, Facebook, Twitter,\
    \ Amazon, and the World Wide Web. Another class of recently emerged and popular\
    \ distributed systems is blockchain or distributed ledgers, which we will cover\
    \ in Chapter [4](#515270_1_En_4_Chapter.xhtml).\n\nIn this chapter, we lay the\
    \ foundations and look at the distributed systems in general, their characteristics\
    \ and properties, motivations, and system models that help reason about the properties\
    \ of a distributed system.\n\nWhile distributed systems can be quite complex and\
    \ usually have to address many design aspects, including process design, messages\
    \ (interaction between processes), performance, security, and event management,\
    \ a core problem is consensus.\n\n`Consensus` is a fundamental problem in distributed\
    \ systems where despite some failures in the system, the processes within the\
    \ distributed system always agree to the state of the system. We will do more\
    \ of this in Chapter [3](#515270_1_En_3_Chapter.xhtml).\n\nIn the first chapter,\
    \ we will lay the foundation of distributed systems and build an intuition about\
    \ what they are and how they work. After this, we will cover cryptography, blockchain,\
    \ and consensus, which will provide a solid foundation to then move on and read\
    \ the rest of the chapters, covering more in-depth topics such as consensus protocols,\
    \ design and implementation, and some latest research on quantum consensus.\n\n\
    But first, let’s have a closer look at the distributed system foundations and\
    \ discuss what characteristics a distributed system has.\n\n### Characteristics\n\
    \nWhat makes a system distributed? Here are some fundamental properties:\n\n1.\
    \  No global physical clocks\n2.  Autonomous processors/independent processors/indepedently\
    \ failing\n3.  No global shared common memory\n4.  Heterogeneous\n5.  Coherent\n\
    6.  Concurrency/concurrent operation\n\nNo global physical clock implies that\
    \ the system is distributed in nature and asynchronous. The computers or nodes\
    \ in a distributed system are independent with their own memory, processor, and\
    \ operating system. These systems do not have a global shared clock as a source\
    \ of time for the entire system, which makes the notion of time tricky in distributed\
    \ systems, and we will shortly see how to overcome this limitation. The fact that\
    \ there is no global shared memory implies that the only way processes can communicate\
    \ with each other is by consuming messages sent over a network using channels\
    \ or links.\n\nAll processes or computers or nodes in a distributed system are\
    \ independent, with their own operating system, memory, and processor. There is\
    \ no global shared memory in a distributed system, which implies that each processor\
    \ has its own memory and its own view of its state and has limited local knowledge\
    \ unless a message from other node(s) arrives and adds to the local knowledge\
    \ of the node.\n\nDistributed systems are usually heterogeneous with multiple\
    \ different types of computers with different architecture and processors. Such\
    \ a setup can include commodity computers, high-end servers, IoT devices, mobile\
    \ devices, and virtually any device or \"thing\" that runs the distributed algorithm\
    \ to solve a common problem (achieve a common goal) the distributed system has\
    \ been designed for.\n\nDistributed systems are also coherent. This feature abstracts\
    \ away all minute details of the dispersed structure of a distributed system,\
    \ and to an end user, it appears as a single cohesive system. This concept is\
    \ known as distribution transparency.\n\nConcurrency in a distributed system is\
    \ concerned with the requirement that the distributed algorithm should run concurrently\
    \ on all processors in the distributed system.\n\nFigure [1-1](#515270_1_En_1_Chapter.xhtml#Fig1)\
    \ shows a generic model of a distributed system.\n\n![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig1_HTML.jpg)\n\
    \n*A chart of a distributed system with 5 connected computers. Each computer comprise\
    \ a memory, a processor, and an operating system.*\n\nFigure 1-1: A distributed\
    \ system\n\nThere are several reasons why we would want to build a distributed\
    \ system. The most common reason is scalability. For example, imagine you have\
    \ a single server serving 100 users a day; when the number of users grows, the\
    \ usual method is to scale vertically by adding more powerful hardware, for example,\
    \ faster CPU, more RAM, bigger hard disk, etc., but in some scenarios, you can\
    \ only go so much vertically, and at some point, you have to scale horizontally\
    \ by adding more computers and somehow distributing the load between them.\n\n\
    ### Why Build Distributed Systems\n\nIn the following, we introduce some motivations\
    \ behind building distributed systems:\n\n*   Reliability\n*   Performance\n*\
    \   Resource sharing\n*   Inherently distributed\n\nLet’s have a look at each\
    \ one of these reasons separately.\n\n#### Reliability\n\nReliability is a key\
    \ advantage of distributed systems. Imagine if you have a single computer. Then,\
    \ when it fails, there is no choice but to reboot it or get a new one if it had\
    \ developed a significant fault. However, there are multiple nodes in distributed\
    \ systems in a system that allows a distributed system to tolerate faults up to\
    \ a level. Thus, even if some computers fail in a distributed network, the distributed\
    \ system keeps functioning. Reliability is one of the significant areas of study\
    \ and research in distributed computing, and we will look at it in more detail\
    \ in the context of fault tolerance shortly.\n\nReliability encompasses several\
    \ aspects including availability, integrity, and fault tolerance:\n\n*   **Availability**\
    \ simply means that when a request is made by a client, the distributed system\
    \ should always be available.\n*   **Integrity** ensures that the state of the\
    \ distributed system should always be in stable and consistent state.\n*   **Fault\
    \ tolerance** enables a distributed system to function even in case of some failures.\n\
    \n#### Performance\n\nIn distributed systems, better performance can be achieved\
    \ naturally. For example, in the case of a cluster of computers working together,\
    \ better performance can be achieved by parallelizing the computation. Also, in\
    \ a geographically dispersed distributed network, clients (users) accessing nodes\
    \ can get data from the node which is closer to their geographic region, which\
    \ results in quicker data access. For example, in the case of Internet file download,\
    \ a mirror that is closer to your geographic region will provide much better download\
    \ speed as compared to the one that might be in another continent.\n\nPerformance\
    \ of a distributed system generally encompasses two facets, responsiveness and\
    \ throughput.\n\n##### Responsiveness\n\nThis property guarantees that the system\
    \ is reasonably responsive, and users can get adequate response from the distributed\
    \ system."
  raw: "## Distributed Systems\n\nIn the literature, there are many different definitions\
    \ of distributed systems. Still, fundamentally they all address the fact that\
    \ a distributed system is a collection of computers working together to solve\
    \ a problem.\n\nSome definitions from famous scholars in this field are as follows:\n\
    \n> *A distributed system is one in which the failure of a computer you didn’t\
    \ even know existed can render your own computer unusable.*\n> \n> —Leslie Lamport\n\
    > \n> [`https://lamport.azurewebsites.net/pubs/distributed-system.txt`](https://lamport.azurewebsites.net/pubs/distributed-system.txt)\n\
    \n> *A distributed system is a collection of autonomous computing elements that\
    \ appears to its users as a single coherent system.*\n> \n> —Tanenbaum\n> \n>\
    \ [`www.distributed-systems.net/index.php/books/ds3/`](http://www.distributed-systems.net/index.php/books/ds3/)\n\
    \nHere is my own attempt!\n\nA distributed system is a collection of autonomous\
    \ computers that collaborate with each other on a message-passing network to achieve\
    \ a common goal.\n\nUsually, this problem is not solvable by a single computer,\
    \ or the distributed system is inherently distributed such as a social media application.\n\
    \nSome everyday examples of distributed systems are Google, Facebook, Twitter,\
    \ Amazon, and the World Wide Web. Another class of recently emerged and popular\
    \ distributed systems is blockchain or distributed ledgers, which we will cover\
    \ in Chapter [4](#515270_1_En_4_Chapter.xhtml).\n\nIn this chapter, we lay the\
    \ foundations and look at the distributed systems in general, their characteristics\
    \ and properties, motivations, and system models that help reason about the properties\
    \ of a distributed system.\n\nWhile distributed systems can be quite complex and\
    \ usually have to address many design aspects, including process design, messages\
    \ (interaction between processes), performance, security, and event management,\
    \ a core problem is consensus.\n\nConsensus is a fundamental problem in distributed\
    \ systems where despite some failures in the system, the processes within the\
    \ distributed system always agree to the state of the system. We will do more\
    \ of this in Chapter [3](#515270_1_En_3_Chapter.xhtml).\n\nIn the first chapter,\
    \ we will lay the foundation of distributed systems and build an intuition about\
    \ what they are and how they work. After this, we will cover cryptography, blockchain,\
    \ and consensus, which will provide a solid foundation to then move on and read\
    \ the rest of the chapters, covering more in-depth topics such as consensus protocols,\
    \ design and implementation, and some latest research on quantum consensus.\n\n\
    But first, let’s have a closer look at the distributed system foundations and\
    \ discuss what characteristics a distributed system has.\n\n### Characteristics\n\
    \nWhat makes a system distributed? Here are some fundamental properties:\n\n1.\
    \  No global physical clocks\n\n2.  Autonomous processors/independent processors/indepedently\
    \ failing\n\n3.  No global shared common memory\n\n4.  Heterogeneous\n\n5.  Coherent\n\
    \n6.  Concurrency/concurrent operation\n\nNo global physical clock implies that\
    \ the system is distributed in nature and asynchronous. The computers or nodes\
    \ in a distributed system are independent with their own memory, processor, and\
    \ operating system. These systems do not have a global shared clock as a source\
    \ of time for the entire system, which makes the notion of time tricky in distributed\
    \ systems, and we will shortly see how to overcome this limitation. The fact that\
    \ there is no global shared memory implies that the only way processes can communicate\
    \ with each other is by consuming messages sent over a network using channels\
    \ or links.\n\nAll processes or computers or nodes in a distributed system are\
    \ independent, with their own operating system, memory, and processor. There is\
    \ no global shared memory in a distributed system, which implies that each processor\
    \ has its own memory and its own view of its state and has limited local knowledge\
    \ unless a message from other node(s) arrives and adds to the local knowledge\
    \ of the node.\n\nDistributed systems are usually heterogeneous with multiple\
    \ different types of computers with different architecture and processors. Such\
    \ a setup can include commodity computers, high-end servers, IoT devices, mobile\
    \ devices, and virtually any device or \"thing\" that runs the distributed algorithm\
    \ to solve a common problem (achieve a common goal) the distributed system has\
    \ been designed for.\n\nDistributed systems are also coherent. This feature abstracts\
    \ away all minute details of the dispersed structure of a distributed system,\
    \ and to an end user, it appears as a single cohesive system. This concept is\
    \ known as distribution transparency.\n\nConcurrency in a distributed system is\
    \ concerned with the requirement that the distributed algorithm should run concurrently\
    \ on all processors in the distributed system.\n\nFigure [1-1](#515270_1_En_1_Chapter.xhtml#Fig1)\
    \ shows a generic model of a distributed system.\n\n![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig1_HTML.jpg)\n\
    \nA chart of a distributed system with 5 connected computers. Each computer comprise\
    \ a memory, a processor, and an operating system.\n\nFigure 1-1\n\nA distributed\
    \ system\n\nThere are several reasons why we would want to build a distributed\
    \ system. The most common reason is scalability. For example, imagine you have\
    \ a single server serving 100 users a day; when the number of users grows, the\
    \ usual method is to scale vertically by adding more powerful hardware, for example,\
    \ faster CPU, more RAM, bigger hard disk, etc., but in some scenarios, you can\
    \ only go so much vertically, and at some point, you have to scale horizontally\
    \ by adding more computers and somehow distributing the load between them.\n\n\
    ### Why Build Distributed Systems\n\nIn the following, we introduce some motivations\
    \ behind building distributed systems:\n\n*   Reliability\n\n*   Performance\n\
    \n*   Resource sharing\n\n*   Inherently distributed\n\nLet’s have a look at each\
    \ one of these reasons separately.\n\n#### Reliability\n\nReliability is a key\
    \ advantage of distributed systems. Imagine if you have a single computer. Then,\
    \ when it fails, there is no choice but to reboot it or get a new one if it had\
    \ developed a significant fault. However, there are multiple nodes in distributed\
    \ systems in a system that allows a distributed system to tolerate faults up to\
    \ a level. Thus, even if some computers fail in a distributed network, the distributed\
    \ system keeps functioning. Reliability is one of the significant areas of study\
    \ and research in distributed computing, and we will look at it in more detail\
    \ in the context of fault tolerance shortly.\n\nReliability encompasses several\
    \ aspects including availability, integrity, and fault tolerance:\n\n*   **Availability**\
    \ simply means that when a request is made by a client, the distributed system\
    \ should always be available.\n\n*   **Integrity** ensures that the state of the\
    \ distributed system should always be in stable and consistent state.\n\n*   **Fault\
    \ tolerance** enables a distributed system to function even in case of some failures.\n\
    \n#### Performance\n\nIn distributed systems, better performance can be achieved\
    \ naturally. For example, in the case of a cluster of computers working together,\
    \ better performance can be achieved by parallelizing the computation. Also, in\
    \ a geographically dispersed distributed network, clients (users) accessing nodes\
    \ can get data from the node which is closer to their geographic region, which\
    \ results in quicker data access. For example, in the case of Internet file download,\
    \ a mirror that is closer to your geographic region will provide much better download\
    \ speed as compared to the one that might be in another continent.\n\nPerformance\
    \ of a distributed system generally encompasses two facets, responsiveness and\
    \ throughput.\n\n##### Responsiveness\n\nThis property guarantees that the system\
    \ is reasonably responsive, and users can get adequate response from the distributed\
    \ system."
  trans: "\n## 分布式系统\n\n在文献中，关于分布式系统有许多不同的定义。但归根结底，它们都指出一个事实：分布式系统是由多台计算机协同工作以解决某个问题的集合。\n\
    \n该领域一些著名学者的定义如下：\n\n> *一个分布式系统是这样的系统：一台你甚至不知道它存在的计算机发生故障，就能导致你的计算机无法使用。*\n> \n\
    > ——莱斯利·兰波特\n> \n> [`https://lamport.azurewebsites.net/pubs/distributed-system.txt`](https://lamport.azurewebsites.net/pubs/distributed-system.txt)\n\
    \n> *分布式系统是一组自治计算元素的集合，这些元素在用户看来就像一个单一的、连贯一致的系统。*\n> \n> ——塔能鲍姆\n> \n> [`www.distributed-systems.net/index.php/books/ds3/`](http://www.distributed-systems.net/index.php/books/ds3/)\n\
    \n以下是我自己的尝试！\n\n分布式系统是一组自治计算机的集合，它们通过消息传递网络相互协作，以实现共同的目标。\n\n通常，这个问题无法由单台计算机解决，或者分布式系统本身就具有分布性，例如社交媒体应用。\n\
    \n分布式系统的一些日常示例包括 Google、Facebook、Twitter、Amazon 以及万维网。另一类近期出现且流行的分布式系统是区块链或分布式账本，我们将在第\
    \ 4 章中介绍。\n\n在本章中，我们将奠定基础，从总体上审视分布式系统，了解其特性与属性、构建动机，以及有助于推断分布式系统属性的系统模型。\n\n虽然分布式系统可能相当复杂，并且通常需要处理许多设计方面的问题，包括进程设计、消息（进程间的交互）、性能、安全性和事件管理，但一个核心问题是共识。\n\
    \n`共识`是分布式系统中的一个基本问题，即尽管系统中存在某些故障，分布式系统内的进程始终能就系统的状态达成一致。我们将在第 3 章中对此进行更深入的探讨。\n\
    \n在第一章中，我们将为分布式系统奠定基础，并建立关于它们是什么以及如何工作的直观认识。之后，我们将涵盖密码学、区块链和共识，这些将为我们打下坚实基础，以便继续学习后续章节，涵盖更深入的主题，例如共识协议、设计与实现，以及关于量子共识的一些最新研究。\n\
    \n但首先，让我们更仔细地审视分布式系统的基础，并讨论分布式系统具有哪些特性。\n\n### 特性\n\n是什么让一个系统成为分布式系统？以下是一些基本属性：\n\
    \n1.  无全局物理时钟\n2.  自治处理器/独立处理器/独立容错\n3.  无全局共享公共内存\n4.  异构性\n5.  连贯一致性\n6.  并发性/并发操作\n\
    \n无全局物理时钟意味着系统本质上具有异步性。分布式系统中的计算机或节点是独立的，拥有自己的内存、处理器和操作系统。这些系统没有一个全局共享的时钟作为整个系统的时间源，这使得时间概念在分布式系统中变得棘手，我们稍后将看到如何克服这一限制。没有全局共享内存这一事实意味着，进程之间进行通信的唯一方式是通过信道或链路消耗通过网络发送的消息。\n\
    \n分布式系统中的所有进程、计算机或节点都是独立的，拥有自己的操作系统、内存和处理器。分布式系统中没有全局共享内存，这意味着每个处理器都有自己的内存、对自己状态的独立视图，并且除非收到来自其他节点的消息并增加了该节点的本地知识，否则其本地知识是有限的。\n\
    \n分布式系统通常是异构的，包含多种采用不同架构和处理器的不同类型的计算机。这样的设置可以包括商用计算机、高端服务器、物联网设备、移动设备，以及几乎任何运行分布式算法以解决分布式系统所设计的共同问题（实现共同目标）的设备或“物品”。\n\
    \n分布式系统也具有连贯一致性。这一特性抽象掉了分布式系统分散结构的所有细微细节，对最终用户而言，它呈现为一个单一、内聚的系统。这个概念被称为分布透明性。\n\
    \n分布式系统中的并发性涉及这样一个要求：分布式算法应在分布式系统的所有处理器上并发运行。\n\n图 1-1 展示了一个通用的分布式系统模型。\n\n![](img/515270_1_En_1_Fig1_HTML.jpg)\n\
    \n*一个包含 5 台互联计算机的分布式系统示意图。每台计算机包含一个内存、一个处理器和一个操作系统。*\n\n图 1-1：一个分布式系统\n\n我们构建分布式系统有若干原因。最常见的原因是**可扩展性**。例如，假设你有一台服务器每天为\
    \ 100 个用户提供服务；当用户数量增长时，通常的方法是**垂直扩展**，即通过添加更强大的硬件（例如更快的 CPU、更多的 RAM、更大的硬盘等），但在某些情况下，垂直扩展存在极限，此时你必须**水平扩展**，即添加更多计算机并以某种方式在它们之间分配负载。\n\
    \n### 为何构建分布式系统\n\n下面，我们介绍构建分布式系统背后的一些动机：\n\n*   可靠性\n*   性能\n*   资源共享\n*   固有的分布性\n\
    \n让我们逐一审视这些原因。\n\n#### 可靠性\n\n**可靠性**是分布式系统的一个关键优势。想象一下，如果你只有一台计算机。那么，当它发生故障时，别无选择，只能重启它，或者在出现重大故障时更换一台新的。然而，在分布式系统中，系统内存在多个节点，这使得分布式系统能够在一定程度上容忍故障。因此，即使分布式网络中的某些计算机发生故障，分布式系统也能继续运行。**可靠性**是分布式计算领域重要的研究和学习方向之一，稍后我们将在**容错性**的背景下更详细地探讨它。\n\
    \n可靠性包含多个方面，包括**可用性**、**完整性**和**容错性**：\n\n*   **可用性** 简单来说，就是当客户端发出请求时，分布式系统应始终保持可用。\n\
    *   **完整性** 确保分布式系统的状态始终处于稳定且一致的状态。\n*   **容错性** 使得分布式系统即使在发生某些故障的情况下也能正常运行。\n\
    \n#### 性能\n\n在分布式系统中，可以自然地实现更好的**性能**。例如，在一个协同工作的计算机集群中，可以通过**并行化**计算来获得更好的性能。此外，在地理上分散的分布式网络中，访问节点的客户端（用户）可以从地理位置更近的节点获取数据，从而实现更快速的数据访问。例如，在互联网文件下载场景中，距离你地理区域更近的镜像站点将比可能位于其他大洲的站点提供快得多的下载速度。\n\
    \n分布式系统的性能通常包含两个方面：**响应性**和**吞吐量**。\n\n##### 响应性\n\n该属性保证系统具有合理的响应速度，用户能够从分布式系统获得足够的响应。\n"
- fmt: '### Throughput


    `Throughput` of a distributed system is another measure by which the performance
    of the distributed system can be judged. `Throughput` basically captures the rate
    at which processing is done in the system; usually, it is measured in transactions
    per second. As we will see later in Chapter [5](#515270_1_En_5_Chapter.xhtml),
    high transaction per second rate is quite desirable in blockchain systems (distributed
    ledgers). Quite often, transactions per second or queries executed per second
    are measured for a distributed database as a measure of the performance of the
    system. `Throughput` is impacted by different aspects of the distributed system,
    for example, processing speeds, communication network quality, speed and reliability,
    and the algorithm. If your hardware is good, but the algorithm is designed poorly,
    then that can also impact the `throughput`, responsiveness, and the overall performance
    of the system.


    ### Resource Sharing


    Resources in a distributed system can be shared with other nodes/participants
    in the distributed system. Sometimes, there are expensive resources such as a
    supercomputer, a quantum computer, or some industrial grade printer which can
    be too expensive to be made available at each site; in that case, resources can
    be shared via communication links to other nodes remotely. Another scenario could
    be where data can be divided into multiple partitions (shards) to enable quick
    access.


    ### Inherently Distributed


    There are scenarios where there is no option but to build a distributed system
    because the problem can only be solved by a distributed system. For example, a
    messaging system is inherently distributed. Mobile network is inherently by nature
    distributed. In these and similar use cases, a distributed system is the only
    one that can solve the problem; therefore, the system has to be distributed by
    design.


    With all these benefits of distributed systems, there are some challenges that
    need to be addressed when building distributed systems. The properties of distributed
    systems such as no access to a global clock, asynchrony, and partial failures
    make designing reliable distributed systems a difficult task. In the next section,
    we look at some of the primary challenges that should be addressed while building
    distributed systems.


    ## Challenges


    Distributed systems are hard to build. There are multiple challenges that need
    to be addressed while designing distributed systems. A collection of some common
    challenges is presented as follows.


    ### Fault Tolerance


    With more computers and at times 100s of thousands in a data center, for example,
    in the case of cloud computing, inevitably something somewhere would be failing.
    In other words, the probability of failing some part of the distributed system,
    be it a network cable, a processor, or some other hardware, increases with the
    number of computers. This aspect of distributed systems requires that even if
    some parts of the distributed system fail (usually a certain threshold), the distributed
    system as a whole must keep operating. To this end, there are various problems
    that are studied in distributed computing under the umbrella of fault tolerance.
    Fault-tolerant consensus is one such example where the efforts are made to build
    consensus algorithms that continue to run correctly as specified even in the presence
    of a threshold of faulty nodes or links in a distributed system. We will see more
    details about that in Chapter [3](#515270_1_En_3_Chapter.xhtml).


    A relevant area of study is `failure detection` which is concerned with the development
    of algorithms that attempt to detect faults in a distributed system. This is especially
    an area of concern in asynchronous distributed systems where there is no upper
    bound on the message delivery times. The problem becomes even more tricky when
    there is no way to distinguish between a failed node and a node that is simply
    slower and a lost message on the link. Failure detection algorithms give a probabilistic
    indication about the failure of a process. This up or down status of the node
    then can be used to handle that fault.


    Another area of study is `replication` which provides fault tolerance on the principle
    that if the same data is replicated across multiple nodes in a distributed system,
    then even if some nodes go down the data is still available, which helps to keep
    the system stable and continue to meet its specification (guarantees) and remain
    available to the end users. We will see more about replication in Chapter [3](#515270_1_En_3_Chapter.xhtml).


    ### Security


    Being a distributed system with multiple users using it, out of which some might
    be malicious, the security of distributed systems becomes a prime concern. This
    situation is even more critical in geographically dispersed distributed systems
    and open systems such as blockchains, for example, Bitcoin blockchain. To this,
    the fundamental science used for providing security in distributed systems is
    cryptography, which we will cover in detail in Chapter [2](#515270_1_En_2_Chapter.xhtml),
    and we will keep referring to it throughout the book, especially in relation to
    blockchain consensus. Here, we study topics such as cryptography and address challenges
    such as authentication, confidentiality, access control, nonrepudiation, and data
    integrity.


    ### Heterogeneity


    A distributed system is not necessarily composed of exactly the same hardware
    nodes. It is possible and is called homogenous distributed system, but usually
    the hardware and operating systems are different from each other. In this type
    of scenario, different operating systems and hardware can behave differently,
    leading to synchronization complexities. Some nodes might be slow, running a different
    operating system which could have bugs, some might run faster due to better hardware,
    and some could be resource constrained as mobile devices or IoT devices. With
    all these different types of nodes (processes, computers) in a distributed system,
    it becomes challenging to build a distributed algorithm that works correctly on
    all these different types of systems and continues to operate correctly despite
    the differences in the local operating environment of the nodes.


    ### Distribution Transparency


    One of the goals of a distributed system is to achieve transparency. It means
    that the distributed system, no matter how many individual computers and peripherals
    it is built of, it should appear as a single coherent system to the end user.
    For example, an ecommerce website may have many database servers, firewalls, web
    servers, load balancers, and many other elements in their distributed system,
    but all that should be abstracted away from the end user. The end user is not
    necessarily concerned about these backend "irrelevant" details but only that when
    they make a request, the system responds. In summary, the distributed system is
    coherent if it behaves in accordance with the expectation of the end user, despite
    its heterogeneous and dispersed structure. For example, think about `IPFS`, a
    distributed file system. Even though the files are spread and sharded across multiple
    computers in the `IPFS` network, to the end user all that detail is transparent,
    and the end user operates on it almost as if they are using a local file system.
    Similar observation can be made about other systems such as online email platforms
    and cloud storage services.


    ### Timing and Synchronization


    Synchronization is a vital operation of a distributed system to ensure a stable
    global state. As each process has its view of time depending on their internal
    physical clocks which can drift apart, the time synchronization becomes one of
    the fundamental issues to address in designing distributed systems. We will see
    some more details around this interesting problem and will explore some solutions
    in our section on `timing`, `orders`, and `clocks` in this chapter.'
