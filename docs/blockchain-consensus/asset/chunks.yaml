    # 可验证延迟函数


    可验证延迟函数（VDF）是一种密码学原语，其求值需要执行**按序**的多个步骤（消耗大量时间），但验证过程却非常快速高效。求值过程必须按序进行，即使采用并行计算，也必须花费指定的时间量。但验证过程是高效的。VDF
    在分布式网络中有多种应用，例如，它们可以用作随机信标，按固定间隔发布随机、不可预测且不可操纵的值。随机信标可用于构建随机领导者选举算法。VDF 在多方计算、无需许可共识以及事件时间戳领域也有应用。


    形式上，VDF 可以定义如下。一个 VDF 涉及三个程序：


    - `setup(λ, t)` → `pp`，其中 `λ` 是安全参数，`t` 是时间参数，例如，十分钟的延迟。

    - `evaluate(pp, x)` → `y`, `π`，其中 `x` 是输入，`pp` 是公共参数，`y` 是输出，`π` 是证明。根据具体构造的不同，`π`
    可以是可选的。

    - `verify(pp, x, y, π)` → {`true`, `false`}，其输出 `true` 或 `false`，指示检查输出正确性的验证成功或失败。


    VDF 有两个安全属性：唯一性和顺序性。唯一性确保 VDF 为每个输入 `x` 产生的输出 `y` 是唯一的。顺序性属性确保强制实施了延迟参数 `t`。


    图 2-26 展示了 VDF 的操作流程。


    ![](img/515270_1_En_2_Fig26_HTML.png)


    VDF 的示意图。sigma 的`设置`、`t` 作为 VDF 的输入，`y`、`pi` 作为输出。对所有参数执行验证函数。


    **图 2-26** – VDF 的操作流程


    关于如何构造 VDF 有许多方案。一些方法包括使用硬件飞地，在飞地内存储加密密钥，并使用这些密钥来生成 VDF。另一种构造可验证延迟函数的方法是使用哈希函数，将输出迭代地再次作为输入，以形成哈希链。使用哈希函数迭代地创建哈希链是一个按序处理的过程，并且需要时间；因此它可以作为
    VDF 的求值函数。另一种越来越流行的方法是代数构造，其中使用被认为具有未知阶数的有限循环群。


    VDF 在区块链中有许多创新应用，包括构建共识算法，以及作为可验证随机性和领导者选举的来源。当我们在第 8 章讨论相关共识协议时，你将详细探索这些应用。


    # 可验证随机函数


    可验证随机函数（VRF）是一种伪随机公钥函数，它提供了一种证明，表明其生成的输出是正确计算得出的。私钥所有者生成函数的证明和输出，该输出可通过公钥公开验证，以确定该值确实是正确计算的。VRF
    在共识算法和区块链中有许多应用，例如，卡尔达诺（Cardano）和波卡（Polkadot）在区块生成机制中使用了 VRF。它们也被用于在链上提供可验证的随机性，例如，在
    Chainlink 的情况下。


    # 总结


    -   密码学是关于秘密通信的科学。

    -   对称密钥密码学和非对称密码学是密码学的两大类别。

    -   椭圆曲线密码学在区块链和相关共识协议中找到了主要应用，其中通常使用 ECDSA 对区块和交易进行数字签名。

    -   哈希函数为任意长度的输入创建固定长度的消息摘要。

    -   MAC 是用于消息认证的消息认证码。

    -   数字签名提供不可否认性、完整性和认证服务。

    -   认证协议用于分布式系统以提供实体认证。

    -   混合加密方案结合了公钥和对称密钥密码学，以实现性能和安全。

    -   可验证延迟函数是需要时间求值但能快速验证的函数，在共识协议和区块链中有许多应用。

    -   VRF 是基于公钥的函数，可生成可验证的正确输出。


    # 3. 分布式共识


    共识是分布式计算中的一个基本问题。本章将涵盖共识问题的基础知识，并讨论一些历史，包括拜占庭将军问题、共识的构建模块，以及我们如何在分布式系统中解决这个问题。


    由于容错是分布式系统的一个基本要求，几种原语引入了容错机制。容错广播算法允许开发容错应用程序。共识使进程即使在发生故障时也能达成共同决策。这两个主题在学术界和工业界都得到了充分研究。


    在深入讨论共识和协定问题之前，让我们先回顾一些构建模块，这些模块延续自第 1 章中与共识和协定问题密切相关的链接抽象。

    '
- fmt: '# Broadcast Primitives


    Earlier in Chapter [1](#515270_1_En_1_Chapter.xhtml), we learned about links that
    pass messages between a pair of processes in a point-to-point or one-to-one setting.
    This one-to-one communication (also called unicast) is quite common and used in
    the client-server architecture. For example, a web server making requests to a
    backend database can be seen as an example of this type of two-sided connection.
    There is one sender and one specific recipient, that is, the web server and backend
    database, respectively.


    However, in many cases where multiple nodes are involved, the client-server type
    scheme is not adequate. Moreover, in many situations, one-to-one communication
    is not sufficient, and we need to use some mechanism that can send messages to
    multiple nodes or a group of nodes simultaneously. In such situations, we use
    broadcast protocols.


    Broadcast protocols allow a process to send a message simultaneously to all processes
    in a distributed system, including itself.


    In this section, we will look at broadcast abstractions. There can be multiple
    senders and receivers involved. Broadcast abstractions ensure that the processes
    agree on the messages that they deliver.


    Broadcast abstractions can be explained with a visualization in Figure [3-1](#515270_1_En_3_Chapter.xhtml#Fig1).


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig1_HTML.jpg)


    A diagram of broadcast abstractions has 3 horizontal lines for P, Q, and R. The
    lines are marked with events for broadcast and deliver.


    **Figure 3-1** – A node broadcasting a message `m` and all three nodes delivering
    it


    Note that there is a difference between sending and receiving and broadcasting
    and delivering. Sending and receiving are used in the context of point-to-point
    links, and broadcast and delivery are used in broadcast abstractions where a message
    is broadcast to multiple/all nodes.


    Point-to-point links discussed in Chapter [1](#515270_1_En_1_Chapter.xhtml) are
    associated with send and receive primitives where a node sends a message, and
    the recipient node receives them.


    Broadcast abstractions with broadcast and deliver primitives depict a situation
    where a node sends a message to multiple/all nodes in the network and nodes receive
    them, but, here, the broadcast algorithm can store and buffer the message after
    receiving it and deliver it to the process later. It depends on the broadcast
    algorithm (also called middleware). For example, in total order broadcast, the
    message may be received by broadcast algorithms running on each process but can
    be buffered until the conditions meet to deliver the message to the application.


    The diagram in Figure [3-2](#515270_1_En_3_Chapter.xhtml#Fig2) shows this concept
    visually.


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig2_HTML.jpg)


    A diagram has 2 columns for processes A and B. Application broadcasts to the algorithm
    in a and broadcast algorithm delivers to application in b.


    **Figure 3-2** – Send and receive and broadcast and delivery


    The communication occurs within a group of nodes where the number of nodes might
    be static or dynamic. One process sends it, and all nodes in the group agree on
    it and deliver it. If a single processor or some processors become faulty, the
    remaining nodes carry on working. Broadcast messages are targeted to all processes.


    Broadcast abstractions allow for the development of fault-tolerant applications.
    There are several types which I describe as follows.


    ## Best-Effort Broadcast


    In this abstraction, reliability is guaranteed only if the sender process does
    not fail. This is the weakest form of reliable broadcast. There are three properties
    that best-effort broadcast has.


    ### Validity


    If a message `m` is broadcast by a correct process `p`, then message `m` is eventually
    delivered by every correct process. This is a liveness property.


    ### No Duplication


    Every message is delivered only once.


    ### No Creation


    If a process delivers a message `m` with a sender process `p`, then `m` was previously
    broadcast by sender process `p`. In other words, messages are not created out
    of thin air. Figure [3-3](#515270_1_En_3_Chapter.xhtml#Fig3) depicts an execution
    of best-effort broadcast.


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig3_HTML.jpg)


    A diagram of best-effort broadcast has 3 horizontal lines for P, Q, and R. The
    lines marked with events for broadcast, delivery failed, and delivery.


    **Figure 3-3** – Best-effort broadcast – an example scenario


    In Figure [3-3](#515270_1_En_3_Chapter.xhtml#Fig3), notice that process `p` has
    broadcast the message but then crashed, and as per system properties, message
    delivery is not guaranteed in this case. Notice that process `q` did not deliver
    the message because our process `p` is no longer correct. However, process `R`
    delivered it. There is no delivery guarantee in this abstraction if the sender
    fails, as shown in Figure [3-3](#515270_1_En_3_Chapter.xhtml#Fig3). In case some
    processes may deliver the messages, and some don’t, it results in disagreement.
    As you can imagine, this abstraction may not be quite useful in some stricter
    scenarios. We need some more robust protocol than this. To address such limitations,
    a reliable broadcast abstraction is used.


    ## Reliable Broadcast


    A reliable broadcast abstraction introduces an additional liveness property called
    agreement. No duplication and no creation properties remain the same as the best-effort
    broadcast abstraction. The validity property is slightly weakened. Formally, validity
    and agreement properties can be stated as follows.


    ### Validity


    If a message `m` is broadcast by a correct process `p`, then `p` itself eventually
    delivers `m`.


    ### Agreement


    If a message `m` is delivered by a correct process, then every correct process
    delivers `m`.


    ### Remarks


    In case the sender process crashes while broadcasting and has not been able to
    send to all processes, the agreement property ensures that no process delivers
    it. It is possible that some processes may have received the message, but reliable
    broadcast ensures that no process will deliver it unless there’s an agreement
    on the delivery. In other words, if the sender process crashes, the reliable broadcast
    ensures that either all correct nodes eventually deliver the message or no nodes
    deliver the message at all.


    If the sender process fails, this property ensures that all correct nodes get
    the message or none of the correct nodes receives the message. This property is
    achieved by correct processes retransmitting any dropped messages, which result
    in the eventual delivery of the message.


    This solution seems reasonable enough, but there might be situations in which
    the broadcaster process may have been able to deliver to itself but then crashed
    before it could send to other processes. This means that all correct processes
    will agree not to deliver the message because they have not received it, but the
    original broadcaster delivers it. Such situations can cause safety issues.


    To address this limitation, uniform reliable broadcast, which provides a stronger
    guarantee, is used.


    ## Uniform Reliable Broadcast


    In uniform reliable broadcast, while all other properties such as validity, no
    duplication, and no creation remain the same as best-effort broadcast, there’s
    a stronger notion of the agreement property that we saw in the reliable broadcast
    abstraction. It is introduced to ensure that agreement is achieved even in the
    scenarios where the sender process might fail. This property is called the uniform
    agreement property.'
  raw: '## Broadcast Primitives


    Earlier in Chapter [1](#515270_1_En_1_Chapter.xhtml), we learned about links that
    pass messages between a pair of processes in a point-to-point or one-to-one setting.
    This one-to-one communication (also called unicast) is quite common and used in
    the client-server architecture. For example, a web server making requests to a
    backend database can be seen as an example of this type of two-sided connection.
    There is one sender and one specific recipient, that is, the web server and backend
    database, respectively.


    However, in many cases where multiple nodes are involved, the client-server type
    scheme is not adequate. Moreover, in many situations, one-to-one communication
    is not sufficient, and we need to use some mechanism that can send messages to
    multiple nodes or a group of nodes simultaneously. In such situations, we use
    broadcast protocols.


    Broadcast protocols allow a process to send a message simultaneously to all processes
    in a distributed system, including itself.


    In this section, we will look at broadcast abstractions. There can be multiple
    senders and receivers involved. Broadcast abstractions ensure that the processes
    agree on the messages that they deliver.


    Broadcast abstractions can be explained with a visualization in Figure [3-1](#515270_1_En_3_Chapter.xhtml#Fig1).


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig1_HTML.jpg)


    A diagram of broadcast abstractions has 3 horizontal lines for P, Q, and R. The
    lines are marked with events for broadcast and deliver.


    Figure 3-1


    A node broadcasting a message m and all three nodes delivering it


    Note that there is a difference between sending and receiving and broadcasting
    and delivering. Sending and receiving are used in the context of point-to-point
    links, and broadcast and delivery are used in broadcast abstractions where a message
    is broadcast to multiple/all nodes.


    Point-to-point links discussed in Chapter [1](#515270_1_En_1_Chapter.xhtml) are
    associated with send and receive primitives where a node sends a message, and
    the recipient node receives them.


    Broadcast abstractions with broadcast and deliver primitives depict a situation
    where a node sends a message to multiple/all nodes in the network and nodes receive
    them, but, here, the broadcast algorithm can store and buffer the message after
    receiving it and deliver it to the process later. It depends on the broadcast
    algorithm (also called middleware). For example, in total order broadcast, the
    message may be received by broadcast algorithms running on each process but can
    be buffered until the conditions meet to deliver the message to the application.


    The diagram in Figure [3-2](#515270_1_En_3_Chapter.xhtml#Fig2) shows this concept
    visually.


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig2_HTML.jpg)


    A diagram has 2 columns for processes A and B. Application broadcasts to the algorithm
    in a and broadcast algorithm delivers to application in b.


    Figure 3-2


    Send and receive and broadcast and delivery


    The communication occurs within a group of nodes where the number of nodes might
    be static or dynamic. One process sends it, and all nodes in the group agree on
    it and deliver it. If a single processor or some processors become faulty, the
    remaining nodes carry on working. Broadcast messages are targeted to all processes.


    Broadcast abstractions allow for the development of fault-tolerant applications.
    There are several types which I describe as follows.


    ### Best-Effort Broadcast


    In this abstraction, reliability is guaranteed only if the sender process does
    not fail. This is the weakest form of reliable broadcast. There are three properties
    that best-effort broadcast has.


    #### Validity


    If a message m is broadcast by a correct process p, then message m is eventually
    delivered by every correct process. This is a liveness property.


    #### No Duplication


    Every message is delivered only once.


    #### No Creation


    If a process delivers a message m with a sender process p, then m was previously
    broadcast by sender process p. In other words, messages are not created out of
    thin air. Figure [3-3](#515270_1_En_3_Chapter.xhtml#Fig3) depicts an execution
    of best-effort broadcast.


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig3_HTML.jpg)


    A diagram of best-effort broadcast has 3 horizontal lines for P, Q, and R. The
    lines marked with events for broadcast, delivery failed, and delivery.


    Figure 3-3


    Best-effort broadcast – an example scenario


    In Figure [3-3](#515270_1_En_3_Chapter.xhtml#Fig3), notice that process p has
    broadcast the message but then crashed, and as per system properties, message
    delivery is not guaranteed in this case. Notice that process q did not deliver
    the message because our process p is no longer correct. However, process R delivered
    it. There is no delivery guarantee in this abstraction if the sender fails, as
    shown in Figure [3-3](#515270_1_En_3_Chapter.xhtml#Fig3). In case some processes
    may deliver the messages, and some don’t, it results in disagreement. As you can
    imagine, this abstraction may not be quite useful in some stricter scenarios.
    We need some more robust protocol than this. To address such limitations, a reliable
    broadcast abstraction is used.


    ### Reliable Broadcast


    A reliable broadcast abstraction introduces an additional liveness property called
    agreement. **No duplication** and **no creation** properties remain the same as
    the best-effort broadcast abstraction. The **validity** property is slightly weakened.
    Formally, validity and agreement properties can be stated as follows.


    #### Validity


    If a message m is broadcast by a correct process p, then p itself eventually delivers
    m.


    #### Agreement


    If a message m is delivered by a correct process, then every correct process delivers
    m.


    #### Remarks


    In case the sender process crashes while broadcasting and has not been able to
    send to all processes, the agreement property ensures that no process delivers
    it. It is possible that some processes may have received the message, but reliable
    broadcast ensures that no process will deliver it unless there’s an agreement
    on the delivery. In other words, if the sender process crashes, the reliable broadcast
    ensures that either all correct nodes eventually deliver the message or no nodes
    deliver the message at all.


    If the sender process fails, this property ensures that all correct nodes get
    the message or none of the correct nodes receives the message. This property is
    achieved by correct processes retransmitting any dropped messages, which result
    in the eventual delivery of the message.


    This solution seems reasonable enough, but there might be situations in which
    the broadcaster process may have been able to deliver to itself but then crashed
    before it could send to other processes. This means that all correct processes
    will agree not to deliver the message because they have not received it, but the
    original broadcaster delivers it. Such situations can cause safety issues.


    To address this limitation, uniform reliable broadcast, which provides a stronger
    guarantee, is used.


    ### Uniform Reliable Broadcast


    In uniform reliable broadcast, while all other properties such as validity, no
    duplication, and no creation remain the same as best-effort broadcast, there’s
    a stronger notion of the agreement property that we saw in the reliable broadcast
    abstraction. It is introduced to ensure that agreement is achieved even in the
    scenarios where the sender process might fail. This property is called the uniform
    agreement property.'
  trans: '

    # 广播原语


    在前面的第 1 章中，我们学习了在点对点或一对一场景下，进程之间传递消息的链接。这种一对一通信（也称为单播）非常常见，并应用于客户端-服务器架构中。例如，Web
    服务器向后端数据库发起请求，就可以看作这类双向连接的一个实例。这里有一个发送者和一个特定的接收者，分别对应 Web 服务器和后端数据库。


    然而，在许多涉及多个节点的场景中，客户端-服务器类型的方案并不足够。此外，在很多情况下，一对一通信是不够的，我们需要使用某种能够同时向多个节点或一组节点发送消息的机制。在这种情况下，我们会使用广播协议。


    广播协议允许一个进程向分布式系统中的所有进程（包括自身）同时发送一条消息。


    在本节中，我们将探讨广播抽象。其中可能涉及多个发送者和接收者。广播抽象确保各进程就它们所传递的消息达成一致。


    广播抽象可以通过图 3-1 的可视化方式进行解释。


    ![](img/515270_1_En_3_Fig1_HTML.jpg)


    一张广播抽象示意图，包含 P、Q、R 三条水平线。线上标记了广播和传递事件。


    **图 3-1** – 一个节点广播消息`m`，所有三个节点都传递了该消息


    注意，发送与接收和广播与传递之间存在区别。发送和接收用于点对点链接的上下文中，而广播和传递则用于广播抽象中，此时消息被广播到多个/所有节点。


    第 1 章讨论的点对点链接与发送和接收原语相关联，其中节点发送消息，接收节点接收它们。


    具有广播和传递原语的广播抽象描述了一种场景：节点向网络中的多个/所有节点发送消息，节点接收它们，但在这里，广播算法可以在接收后存储并缓冲消息，然后稍后再将其传递给进程。这取决于广播算法（也称为中间件）。例如，在全序广播中，运行在每个进程上的广播算法可能会收到消息，但会将其缓冲，直到满足条件后再将消息传递给应用程序。


    图 3-2 中的示意图直观地展示了这一概念。


    ![](img/515270_1_En_3_Fig2_HTML.jpg)


    一张示意图，包含进程 A 和 B 两列。应用程序向算法广播（图中 a 部分），广播算法向应用程序传递（图中 b 部分）。


    **图 3-2** – 发送与接收以及广播与传递


    通信发生在一组节点内，节点数量可能是静态的，也可能是动态的。一个进程发送消息，组内所有节点就消息达成一致并传递它。如果单个处理器或部分处理器发生故障，其余节点仍能继续工作。广播消息的目标是所有进程。


    广播抽象使得开发容错应用程序成为可能。有以下几种类型，如下所述。


    ## 尽力而为广播


    在这种抽象中，仅当发送进程没有失败时，可靠性才得到保证。这是最弱形式的可靠广播。尽力而为广播具有三个属性。


    ### 有效性


    如果消息`m`由正确的进程`p`广播，那么消息`m`最终会被每个正确的进程传递。这是一个活性（liveness）属性。


    ### 无重复


    每条消息仅被传递一次。


    ### 无凭空创建


    如果某个进程传递了一条发送者为进程`p`的消息`m`，那么`m`之前必须是由发送者进程`p`广播的。换句话说，消息不会凭空产生。图 3-3 描绘了尽力而为广播的一次执行过程。


    ![](img/515270_1_En_3_Fig3_HTML.jpg)


    一张尽力而为广播示意图，包含 P、Q、R 三条水平线。线上标记了广播、传递失败和传递事件。


    **图 3-3** – 尽力而为广播 – 示例场景


    在图 3-3 中，注意进程`p`广播了消息但随后崩溃了，根据系统属性，在这种情况下不保证消息的传递。请注意，进程`q`没有传递该消息，因为我们的进程`p`不再正确。然而，进程`R`传递了它。如图
    3-3 所示，如果发送者失败，此抽象不保证消息传递。在某些进程可能传递消息而其他进程可能不传递的情况下，会导致不一致。可以想象，这种抽象在某些要求更严格的场景中可能不太有用。我们需要比这更健壮的协议。为了解决这些限制，我们使用可靠广播抽象。


    ## 可靠广播


    可靠广播抽象引入了一个额外的活性（liveness）属性，称为一致性（agreement）。无重复和无凭空创建属性与尽力而为广播抽象保持一致。有效性属性略有弱化。正式地，有效性和一致性属性可以描述如下。


    ### 有效性


    如果消息`m`由正确的进程`p`广播，那么`p`自身最终会传递`m`。


    ### 一致性


    如果消息`m`被一个正确的进程传递，那么每个正确的进程都会传递`m`。


    ### 备注


    如果发送者进程在广播时崩溃，并且未能将消息发送给所有进程，一致性属性确保没有进程会传递该消息。可能某些进程已经接收到了消息，但可靠广播确保除非就传递达成一致，否则没有进程会传递它。换句话说，如果发送者进程崩溃，可靠广播确保要么所有正确的节点最终都能传递该消息，要么没有节点传递该消息。


    如果发送者进程失败，此属性确保所有正确的节点要么都收到消息，要么都没有收到消息。这一属性是通过让正确的进程重新传输任何丢失的消息来实现的，这最终会导致消息被传递。


    这个方案看起来足够合理，但可能存在这样的情况：广播进程可能已经能够向自身传递消息，但在能够发送给其他进程之前就崩溃了。这意味着所有正确的进程将一致同意不传递该消息，因为它们没有收到它，但原始广播者已经传递了它。这种情况可能导致安全问题。


    为了解决这个限制，我们使用提供更强保证的**统一可靠广播**。


    ## 统一可靠广播


    在统一可靠广播中，虽然所有其他属性（如有效性、无重复和无凭空创建）与尽力而为广播相同，但我们之前在可靠广播抽象中看到的一致性属性有了更强的概念。引入它是为了确保即使在发送者进程可能失败的情况下也能实现一致性。这个属性被称为**统一一致性属性**。

    '
- fmt: "### Uniform Agreement\n\n如果消息`m`被进程`p`投递，则每个正确的进程最终都会投递`m`。`p`可以是正确进程，也可以是故障进程。\n\
    \n在上述所有讨论的抽象中，缺少了一个在许多分布式服务中至关重要的元素。例如，设想一个在线聊天应用场景：用户1发送消息“England has won the\
    \ cricket match”，用户2回复“congratulations”，用户3说“But I wanted Ireland to win”。在聊天应用中，消息预期出现的顺序是：\n\
    \n- **用户1**: England has won the cricket match  \n- **用户2**: congratulations \
    \ \n- **用户3**: But I wanted Ireland to win  \n\n然而，如果没有对消息投递顺序施加任何约束，即使用户1的消息是第一个发送的，在应用（对终端用户）中消息也可能显示为：\n\
    \n- **用户2**: congratulations  \n- **用户3**: But I wanted Ireland to win  \n- **用户1**:\
    \ England has won the cricket match  \n\n这显然不是预期的顺序；缺少赢得比赛这一背景的“congratulations”消息会令人困惑。这正是通过在广播抽象上施加顺序保证所解决的问题。\n\
    \n> 注意：我们在第[1](#515270_1_En_1_Chapter.xhtml)章讨论了因果性和“happens-before”关系；如果需要回顾，请参考该章节。\n\
    \n现在我们将讨论四种具有不同严格程度顺序保证的抽象：`FIFO`可靠广播、因果可靠广播、全序可靠广播以及`FIFO`全序广播。\n\n### FIFO 可靠广播\n\
    \n该抽象在可靠广播之上施加了先进先出的投递顺序。这意味着消息按照发送进程发送它们的顺序被投递。\n\n在此抽象中，所有属性与可靠广播保持一致；但引入了一个新的`FIFO`投递属性。\n\
    \n#### FIFO 投递\n\n如果某个进程先后广播了两条消息`m1`和`m2`，那么任何正确的进程不会在`m1`之前投递`m2`。换句话说，如果同一进程在`m2`之前广播了`m1`，则除非该正确进程已先投递了`m1`，否则不会投递`m2`。但此保证仅适用于`m1`和`m2`由同一进程广播的情况；如果由两个不同进程广播消息，则无法保证它们的投递顺序。\n\
    \n在实践中，`TCP`是`FIFO`投递的一个例子。如果你的用例需要`FIFO`投递，可以直接使用`TCP`。\n\n### 因果可靠广播\n\n该抽象在可靠广播之上施加了因果投递顺序。这意味着如果一条消息的广播发生在另一条消息广播之前，那么每个进程都会按相同顺序投递这两条消息。在两个消息可能被并发广播的场景中，进程可以按任意顺序投递它们。\n\
    \n### 全序可靠广播或原子可靠广播\n\n该抽象通常简称为**全序广播**或**原子广播**。全序广播具有以下四个属性。\n\n#### 有效性\n\n\
    如果正确进程`p`广播了消息`m`，那么某个正确进程最终会投递`m`。\n\n#### 一致性\n\n如果消息`m`被一个正确进程`p`投递，那么所有正确进程最终都会投递`m`。\n\
    \n#### 完整性\n\n对于任何消息`m`，每个进程最多投递`m`一次，且仅当`m`之前已被广播。在文献中，此属性有时被分为两个独立属性：**无重复**（任何消息不会被投递多次）和**无创建**（已投递的消息必须由发送进程广播）。换句话说，没有消息会凭空产生。\n\
    \n#### 全序\n\n在此属性下，如果在一个进程中消息`m1`在`m2`之前被投递，那么在所有进程中`m1`都在`m2`之前被投递。"
  raw: '#### Uniform Agreement


    If a message m is delivered by a process p, every correct process eventually delivers
    m. p can be either a correct or a failed process.


    In all the preceding discussed abstractions, there’s a crucial element missing
    which is required in many distributed services. For example, imagine a scenario
    of an online chat app. If a user sends a message saying “England has won the cricket
    match,” and another user replies “congratulations,” and a third user says “But
    I wanted Ireland to win,” the expected sequence in which the messages are supposed
    to appear in the chat app is


    *   **User 1**: England has won the cricket match


    *   **User 2**: congratulations


    *   **User 3**: But I wanted Ireland to win


    However, if there is no order imposed on the message delivery, it might appear
    that even if User 1’s message was sent first, it may turn out that in the app
    (to the end user) the messages might appear like this:


    *   **User 2**: congratulations


    *   **User 3**: But I wanted Ireland to win


    *   **User 1**: England has won the cricket match


    Now this is not the expected order; the “congratulations” message without the
    context of winning the match would appear confusing. This is the problem that
    is solved by imposing an order guarantee on the broadcast abstractions.


    Note


    We discussed causality and happens-before relationships in Chapter [1](#515270_1_En_1_Chapter.xhtml);
    if you need a refresher, refer to that chapter.


    Now we will discuss four abstractions that deliver messages with an order guarantee
    with varying degrees of strictness: FIFO reliable broadcast, causal reliable broadcast,
    total order reliable broadcast, and FIFO total order broadcast.


    ### FIFO Reliable Broadcast


    This abstraction imposes a first-in, first-out (FIFO) delivery order on reliable
    broadcast. This means that messages broadcast are delivered in the same that they
    were sent by the sender process.


    In this abstraction, all properties remain the same as reliable broadcast; however,
    a new property for FIFO delivery is introduced.


    #### FIFO Delivery


    If a process has broadcast two messages m1 and m2, respectively, then any correct
    process does not deliver m2 before m1\. In other words, if m1 is broadcast before
    m2 by the same process, then no correct process delivers m2 unless it has delivered
    m1 first. This guarantee is however only in the case when m1 and m2 are broadcast
    by the same process; if two different processes have broadcast messages, then
    there is no guarantee in which order they will be delivered.


    In practice, TCP is an example of FIFO delivery. If you need FIFO delivery in
    your use case, you can simply use TCP.


    ### Causal Reliable Broadcast


    This abstraction imposes a causal delivery order on reliable broadcast. This means
    that if a message broadcast happens before broadcast of another message, then
    every process delivers these two messages in the same order. In scenarios where
    two messages might have been broadcast concurrently, then a process can deliver
    them in any order.


    ### Total Order Reliable Broadcast or Atomic Reliable Broadcast


    This abstraction is usually just called **total order broadcast** or **atomic
    broadcast**. There are four properties that total order broadcast has, which are
    described as follows.


    #### Validity


    If a correct process p broadcasts a message m, then some correct process eventually
    delivers m.


    #### Agreement


    If a message m is delivered by a correct process p, then all correct processes
    eventually deliver m.


    #### Integrity


    For any message m, each process delivers m at most once and only if m was previously
    broadcast. In literature, this property is sometimes divided into two separate
    properties: **no duplication** where no message is delivered more than once and
    **no creation** which states that a delivered message must be broadcast by the
    sender process. In other words, no messages are created out of thin air.


    #### Total Order


    In this property, if a message m1 is delivered before m2 in a process, then m1
    is delivered before m2 in all processes.'
  trans: "\n### Uniform Agreement\n\n如果消息`m`被进程`p`投递，则每个正确的进程最终都会投递`m`。`p`可以是正确进程，也可以是故障进程。\n\
    \n在上述所有讨论的抽象中，缺少了一个在许多分布式服务中至关重要的元素。例如，设想一个在线聊天应用场景：用户 1 发送消息“England has won\
    \ the cricket match”，用户 2 回复“congratulations”，用户 3 说“But I wanted Ireland to win”。在聊天应用中，消息预期出现的顺序是：\n\
    \n- **用户 1**: England has won the cricket match  \n- **用户 2**: congratulations\
    \  \n- **用户 3**: But I wanted Ireland to win  \n\n然而，如果没有对消息投递顺序施加任何约束，即使用户 1\
    \ 的消息是第一个发送的，在应用（对终端用户）中消息也可能显示为：\n\n- **用户 2**: congratulations  \n- **用户 3**:\
    \ But I wanted Ireland to win  \n- **用户 1**: England has won the cricket match\
    \  \n\n这显然不是预期的顺序；缺少赢得比赛这一背景的“congratulations”消息会令人困惑。这正是通过在广播抽象上施加顺序保证所解决的问题。\n\
    \n> 注意：我们在第 1 章讨论了因果性和“happens-before”关系；如果需要回顾，请参考该章节。\n\n现在我们将讨论四种具有不同严格程度顺序保证的抽象：`FIFO`可靠广播、因果可靠广播、全序可靠广播以及`FIFO`全序广播。\n\
    \n### FIFO 可靠广播\n\n该抽象在可靠广播之上施加了先进先出的投递顺序。这意味着消息按照发送进程发送它们的顺序被投递。\n\n在此抽象中，所有属性与可靠广播保持一致；但引入了一个新的`FIFO`投递属性。\n\
    \n#### FIFO 投递\n\n如果某个进程先后广播了两条消息`m1`和`m2`，那么任何正确的进程不会在`m1`之前投递`m2`。换句话说，如果同一进程在`m2`之前广播了`m1`，则除非该正确进程已先投递了`m1`，否则不会投递`m2`。但此保证仅适用于`m1`和`m2`由同一进程广播的情况；如果由两个不同进程广播消息，则无法保证它们的投递顺序。\n\
    \n在实践中，`TCP`是`FIFO`投递的一个例子。如果你的用例需要`FIFO`投递，可以直接使用`TCP`。\n\n### 因果可靠广播\n\n该抽象在可靠广播之上施加了因果投递顺序。这意味着如果一条消息的广播发生在另一条消息广播之前，那么每个进程都会按相同顺序投递这两条消息。在两个消息可能被并发广播的场景中，进程可以按任意顺序投递它们。\n\
    \n### 全序可靠广播或原子可靠广播\n\n该抽象通常简称为**全序广播**或**原子广播**。全序广播具有以下四个属性。\n\n#### 有效性\n\n\
    如果正确进程`p`广播了消息`m`，那么某个正确进程最终会投递`m`。\n\n#### 一致性\n\n如果消息`m`被一个正确进程`p`投递，那么所有正确进程最终都会投递`m`。\n\
    \n#### 完整性\n\n对于任何消息`m`，每个进程最多投递`m`一次，且仅当`m`之前已被广播。在文献中，此属性有时被分为两个独立属性：**无重复**（任何消息不会被投递多次）和**无创建**（已投递的消息必须由发送进程广播）。换句话说，没有消息会凭空产生。\n\
    \n#### 全序\n\n在此属性下，如果在一个进程中消息`m1`在`m2`之前被投递，那么在所有进程中`m1`都在`m2`之前被投递。\n"
- fmt: '### FIFO Total Order Broadcast


    This abstraction combines both FIFO broadcast and total order broadcast.


    The total order can be achieved using a single leader known as the sequencer approach
    and using Lamport clocks, but none of these are fault-tolerant approaches. What
    if the leader goes down then there is no sequencing and in case of Lamport clocks
    if any of the nodes fail then the total order cannot be guaranteed? Introducing
    fault tolerance in total order broadcast to automatically choose a new leader
    is the problem that is studied and addressed using consensus protocols. A consensus
    protocol, at a fundamental level, addresses the problem of choosing a new leader
    in case of failure. This is the key motivation behind consensus protocols. We
    will see more about this and details on total order broadcast and its relationship
    with state machine replication, fault tolerance, and consensus protocols later
    in this chapter.


    So far, the abstractions that we have discussed can work with a smaller set of
    processes. Imagine a distributed system is spread across multiple continents and
    there are 1000s of nodes participating in it. Can the abstractions presented so
    far be efficient enough to withstand the communication complexity that arises
    with 1000s of heterogenous and dispersed nodes in a distributed system? The answer
    is no, and in order to address such requirements, probabilistic protocols are
    developed. Also, imagine a scenario where a single node is responsible for sending
    messages to 1000 nodes. Even if we manage to send a message to 1000 nodes with
    some hardware support or some other method, the problem becomes complex to handle
    when that single sender node receives the acknowledgements from 1000 nodes. This
    problem is called **ack implosion**. The question is how we can avoid such issues.


    Imagine another situation where using reliable links a node has sent a message
    to all nodes individually, but while in transit to some nodes, some messages were
    dropped. At this point, the sender process fails and consequently no retransmission
    occurred. As a result, those nodes that did not receive messages will now never
    receive messages because the sender process has crashed. How can we improve reliability
    in this scenario? We can devise a scheme where if one node receives a message
    for the first time, it broadcasts it again to other nodes through reliable channels.
    This way, all correct nodes will receive all the messages, even if some nodes
    crash. This is called **eager reliable broadcast**. Eager reliable broadcast is
    reliable; however, it can incur *O*(*n*) steps and *O*(*n*)² messages for n number
    of nodes.


    Figure [3-4](#515270_1_En_3_Chapter.xhtml#Fig4) visualizes the eager reliable
    protocol.


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig4_HTML.jpg)


    A diagram for eager reliable broadcast has 3 lines for P, Q, and R. P broadcasts
    to Q and R. R rebroadcasts to Q and P. Q rebroadcasts to P.


    Figure 3-4


    Eager reliable broadcast


    There are also other algorithms which we can call *nature-inspired* algorithms.
    For example, consider how an infectious disease might spread or a rumor might
    spread. One person infects a few others, and then those others infect others,
    and quickly the infection rate increases. Now imagine if a broadcast protocol
    is designed on such principle, then it can be very effective at disseminating
    information (messages) throughout the network quickly. As these protocols are
    basically randomized protocols, they do not guarantee that all nodes will receive
    a message, but there is usually a very high probability that all nodes eventually
    get all messages. Probabilistic protocols or gossip protocols are commonly used
    in peer-to-peer networks. There are many protocols that have been designed based
    on this type of dissemination.


    Figure [3-5](#515270_1_En_3_Chapter.xhtml#Fig5) illustrates how a gossip protocol
    works. The idea here is that when a node receives a message for the first time,
    it forwards it to some randomly chosen other nodes. This technique is useful for
    broadcasting messages to many nodes, and the message eventually reaches all nodes
    with high probability.


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig5_HTML.png)


    A set of 3 tree diagrams labeled hop 1, 2, and 3 illustrate the gossip protocol.
    Each chart has nodes labeled from P 1 to P 7 divided into 4 levels.


    Figure 3-5


    Gossip protocol


    A probabilistic broadcast abstraction can be defined as an abstraction which has
    two properties.


    #### Probabilistic Validity


    If a correct process p broadcasts a message m, then every correct process eventually
    delivers it with probability 1.


    #### Integrity


    Any message is delivered at most once, and the message delivered has been previously
    broadcast by a process – in other words, no duplicate message and no message creation
    out of thin air.


    ### Relationship Between Broadcasts and Consensus


    Best-effort broadcast is the weakest broadcast model. By adding additional properties
    and requirements, we can achieve stronger broadcast models, as shown in Figure
    [3-6](#515270_1_En_3_Chapter.xhtml#Fig6).


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig6_HTML.png)


    A flowchart of broadcast relationship. The flow is as follows. Best effort and
    reliable broadcasts; F I F O and casual order; T O B; and consensus.


    Figure 3-6


    Broadcast relationship – from weakest to strongest – and consensus equivalency


    With this, we complete our discussion on broadcast protocols. Let’s now move on
    to the agreement abstraction, which is one of the most fundamental problems in
    distributed computing.


    First, I’ll explain what an agreement is, and then we’ll build upon this fundamental
    idea and present the consensus problem.


    ## Agreement


    In a distributed system, the agreement between the processes is a fundamental
    requirement. There are many scenarios where processes need to agree for the distributed
    system to achieve its goals. For example, in broadcast abstractions, an agreement
    is needed between processes for the delivery of messages.


    There are various agreement problems, and we will cover the most prominent of
    them in the following and then focus more on consensus.


    We have already covered reliable broadcast and total order broadcast. In this
    section, I will explain some additional points briefly on reliable broadcast and
    total order broadcast; then, we’ll explore the Byzantine agreement and consensus.


    ### Reliable Broadcast


    The reliable broadcast assures reliability even if the sender process fails. In
    other words, reliability is guaranteed whether the sender is correct or not.'
