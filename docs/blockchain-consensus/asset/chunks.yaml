    ##### 工作量证明与博弈论


    我们可以将比特币视为一个包含自私参与者的分布式系统；节点可能试图在不做贡献的情况下获取激励，或者试图获取超出其公平份额的更多激励。


    比特币协议是一个纳什均衡，因为任何偏离协议均衡策略的行为都不会给偏离者带来收益。该协议的设计方式是，任何偏离协议的行为都会受到惩罚，而正常（良好）的行为则会获得经济激励。比特币中的主导策略是按照协议规则进行挖矿，因为没有其他策略能带来更好的结果。每个参与者只需遵守网络规则就能获得更好的收益。


    如果其他矿工不改变他们的策略，攻击者就没有动力改变自己的策略。如果其他参与者不改变策略，任何一方都无法通过转向不同策略来增加自己的收益。这意味着在比特币中，如果所有其他矿工都是诚实的，那么对手就没有动力改变自己的策略并尝试进行恶意挖矿。


    比特币中的激励措施，如区块奖励和交易费，会抑制恶意行为。这些激励措施鼓励参与者按照协议行事，这不仅保证了新区块的产生（即网络进展得到保障），也维护了网络的安全性。


    自 2009 年以来，比特币网络吸引了大量以矿场、比特币企业、交易所和服务形式存在的投资，以至于网络参与者通过保护网络而非破坏网络能获得更多收益。他们通过保护网络来获益。即使是攻击者也难以获得太多好处。想象一下，如果某个对手设法找到一种方法，将中本聪拥有的所有比特币转移到另一个账户。攻击者可能并没有动机这样做，因为一旦发生这种情况，比特币几乎肯定会变得一文不值，因为这一事件将意味着保护网络的密码学本身已被攻破（假设真正的中本聪已不在世或无法找回其私钥）。


    我感觉中本聪没有移动他的比特币，是因为那可能导致比特币大幅贬值。


    类似地，即使某个对手设法获得了网络 51%的算力，接管整个网络可能也不再有利可图。为什么？因为在这种情况下，对于对手而言，最佳行动方案是像网络上的其他人一样，用合理的算力默默挖矿以获取经济激励（赚取比特币），而不是利用全部
    51%的算力向世界宣布攻击。那几乎会彻底摧毁比特币的价值，攻击者的任何收益都将变得毫无价值。因此，除了某些因人为错误或密钥泄露导致的意外事件外，攻击者没有动机去接管比特币网络。这正是比特币的精妙与优美之处：即使是攻击者也无法通过攻击网络获利。所有参与者只需遵守规则即可获益。矿工的主导策略就是诚实。


    这是分布式计算领域首次创建出一个不依赖任何可信第三方且无需许可的网络，但它却能阻止任何攻击者接管网络。在此，我想起了一些与比特币并不直接相关，但有助于理解许多分布式计算专家在初次认识到比特币的精妙之处时可能会产生的感受。


    > *这看似不可能是真的，但它确实是真的。*

    >

    > ——米哈伊尔·格罗莫夫

    >

    > [`www.ams.org/notices/201003/201003FullIssue.pdf`](http://www.ams.org/notices/201003/201003FullIssue.pdf)


    随着比特币的出现以及密码学、分布式计算和经济学的创新性结合，一个名为“加密经济学”的新研究领域应运而生。如图 5-7 所示。


    ![](img/515270_1_En_5_Fig7_HTML.jpg)


    加密经济学融合的示意图。经济学、密码学和分布式计算共同指向加密经济学。


    图 5-7


    分布式计算、经济学和密码学的融合——比特币


    我们也可以将分叉解决机制视为一个谢林点解决方案。这是一个博弈论概念，其中的焦点或谢林点是指人们在缺乏沟通的情况下默认选择的解决方案。类似地，在工作量证明的分叉解决机制中，由于最长（最强）链规则，节点倾向于选择最长的链作为规范链，以便在没有其他节点沟通或指示的情况下添加他们收到的区块。这种无沟通协作的概念是由托马斯·谢林在其著作《冲突的战略》中提出的。


    ### PoW 与传统 BFT 的相似之处


    从根本上说，所有共识算法都致力于实现安全性和活跃性属性。无论是确定性还是概率性算法，基本上所有共识算法都具有三个主要属性：一致性、有效性和终止性。我们之前介绍过这些术语。问题在于，中本聪共识中我们是否可以重新定义这些属性，使其更贴近区块链世界。答案是肯定的；一致性、有效性和活跃性属性可以分别映射到中本聪共识特有的属性：公共前缀、链质量和链增长。这些术语最早在[`https://eprint.iacr.org/2014/765.pdf`](https://eprint.iacr.org/2014/765.pdf)
    [7]中被提出。


    #### 公共前缀


    该属性意味着所有诚实节点将共享相同的、足够长的公共前缀。


    #### 链质量


    该属性意味着区块链包含一定比例由诚实矿工创建的正确区块。如果链质量受损，则协议的有效性属性无法得到保证。


    #### 链增长


    该属性意味着新的正确区块持续地、有规律地添加到区块链中。


    这些属性可以被视为中本聪世界中对传统共识属性的等价物。其中，公共前缀是（传统上的）一致性属性，链质量是有效性属性，而链增长可以看作是活跃性属性。


    ### 作为状态机复制的 PoW


    工作量证明区块链可以被视为一种状态机复制机制：首先，选举出一个领导者，由他提出一批打包成区块的交易序列。其次，最终确定的（已挖出的）区块通过八卦协议广播给其他节点，这些节点接受该区块并将其追加到自己的本地区块链中，从而实现日志复制。我们可以将其视为领导者提议一个顺序，而所有节点根据区块中设定的交易顺序更新它们的日志（本地区块链）。


    我们先来详细了解领导者选举算法和复制算法。

    '
- fmt: '# Leader Election Algorithm


    A node that solves the proof of work puzzle is elected to finalize and broadcast
    its candidate block. The leader in proof of work is elected as a function of computational
    power of the mining node. There is no voting required from other nodes as opposed
    to other traditional BFT protocols. Also, unlike traditional BFT protocols, the
    leader is rotated every block. This approach has been used in later blockchain
    BFT protocols as well where the leader is rotated every block to thwart any attempts
    to sabotage (compromise) the leader. Also, in traditional BFT protocols, usually
    the primary or leader is only changed when the primary fails, but in PoW a leader
    is elected every block. Leader election in PoW is based on computational power;
    However, several techniques have been used in other permissioned blockchains,
    from simply randomly choosing a leader or simple rotation formula to complex means
    such as verifiable random functions. We will cover these techniques in Chapter
    [8](#515270_1_En_8_Chapter.xhtml) in detail.


    The leader election formula is simply the same PoW formula that we have already
    covered in the section “How PoW Works.” A soon as any miner solves the proof of
    work, it immediately is elected as a leader and earns the right to broadcast its
    newly mined block. At this point, the miner is also awarded 6.25 BTC. This reward
    halves every four years.


    At the leader election stage, the miner node has successfully solved the PoW puzzle,
    and now the log replication can start.


    # Log Replication


    The log replication or block replication to achieve consistency among nodes is
    achieved by broadcasting the newly mined block to other nodes via a gossip dissemination
    protocol. The key differences between a normal log and a blockchain log are as
    follows:


    - It is append-only and immutable.

    - Each new batch of transactions (block) has a hash of the previous block, thus
    linking it in a so-called proof of work chain or hash chain or chain of blocks
    or blockchain.

    - The blocks (content in the log) are verifiable from the previous block.

    - Each block contains transactions and a block header. This structure was discussed
    in detail in Chapter [4](#515270_1_En_4_Chapter.xhtml).


    When a new block is broadcast, it is validated and verified by each honest node
    on the network before it is appended to the blockchain. Log replication after
    leader election can be divided into three steps.


    ## New Block Propagation


    A block is broadcast using the gossip protocol. We can visualize the block propagation
    mechanism in Figure [5-8](#515270_1_En_5_Chapter.xhtml#Fig8). Notice that node
    1 has sent a message, for example, a new block, to node 2, which is then sent
    to nodes 4, 14, and 13 by node 2. A similar pattern can be seen in the network
    for other nodes too.


    ![](images/515270_1_En_5_Chapter/515270_1_En_5_Fig8_HTML.png)


    *An illustration of the gossip protocol describes the relationships between nodes
    14.*


    **Figure 5-8** Gossip protocol in Bitcoin


    This type of propagation ensures that eventually all nodes get the message with
    high probability. Moreover, this pattern does not overwhelm a single node with
    the requirement of broadcasting a message to all nodes.


    ## Block Validation


    Block validation can be seen as the state transition function (STF). This block
    validation function has the following high-level rules:


    - The block is syntactically correct.

    - The block header hash is less than the network difficulty target.

    - The block timestamp is not more than two hours in future.

    - The block size is correct.

    - All transactions are valid within the block.

    - It is referring to the previous hash.


    The protocol specifies very precise rules, details of which can be found at `https://en.bitcoin.it/wiki/Protocol_rules`;
    however, the preceding list is a high-level list of block validation checks a
    node performs.


    ## Append to the Blockchain


    The block is finally inserted into the blockchain by the nodes. When appending
    to the blockchain, it may happen that those nodes may have received two valid
    blocks. In that case, a fork will occur, and nodes will have to decide which chain
    to append the block to.


    We can visualize this concept in Figure [5-9](#515270_1_En_5_Chapter.xhtml#Fig9).


    ![](images/515270_1_En_5_Chapter/515270_1_En_5_Fig9_HTML.png)


    *A schematic of replication. A transaction is broadcasted to a transaction pool
    to create a new candidate block that is validated and appended.*


    **Figure 5-9** Proof of work as state machine replication


    As shown in Figure [5-9](#515270_1_En_5_Chapter.xhtml#Fig9), proof of work as
    a state machine replication consists of two main operations: leader election through
    proof of work and then replication via a gossip protocol and receiving node’s
    block validation and insertion mechanism. After proof of work on a node, if the
    proof of work is valid, then the block is treated the same as if it has been received
    from another node and eventually inserted into the local blockchain database after
    validation.


    A component that chooses which chain is conclusive in case of a conflict is called
    a fork handler which embodies fork resolution rules on how to handle a fork.'
