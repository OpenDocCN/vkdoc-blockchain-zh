  trans: '

    # 以太坊的工作量证明


    我们在第 5 章中详细讨论了比特币的`PoW`。本节将介绍以太坊使用的`PoW`，即`ETHASH`的工作原理。


    `Ethash`是 Dagger-Hashimoto 算法的演进形式。挖矿的核心思想是找到一个`nonce`（任意随机数），将其与区块头拼接并进行哈希运算后，得到的数值低于当前网络难度值。起初，以太坊刚问世时难度较低，甚至
    CPU 和单 GPU 挖矿在一定程度上也能盈利，但如今已非如此。因此，现在只有矿池或大型 GPU 矿场才能用于盈利性挖矿。


    `Ethash`是一种内存硬算法，由于需要在`ASICS`上配备大容量高速内存，这通常不切实际，因此难以在专用硬件上实现。值得注意的是，`Ethash`的内存硬性在相当长一段时间内阻碍了`ASICs`的发展，但如今已有多种`ASIC`矿机可用于以太坊挖矿。


    该算法需要从一种称为有向无环图（`DAG`）的固定资源中选择子集，具体选择取决于`nonce`和区块头。


    `DAG`是一个庞大的伪随机生成数据集。该图以矩阵形式存储于以太坊挖矿过程中创建的`DAG`文件中。`Ethash`算法将`DAG`表示为二维数组，元素为
    32 位无符号整数。只有当挖矿节点首次启动并完全创建`DAG`后，挖矿才会开始。


    此`DAG`被`Ethash`算法用作种子。`Ethash`算法需要`DAG`文件才能运行。`DAG`文件在每个纪元（即每 30,000 个区块）生成一次。`DAG`随着链规模的扩大而线性增长。


    协议的工作流程如下：


    -   使用`Keccak-256`哈希函数，将最新区块的区块头与一个 32 位随机`nonce`相结合。

    -   生成一个 128 位结构体，称为`mix`，该结构体决定从`DAG`中选择哪些数据，即一个 128 字节的页面。

    -   从`DAG`中获取数据后，将其与`mix`进行“混合”，生成下一个`mix`，然后使用新的`mix`再次从`DAG`中获取数据并再次混合。此过程重复
    64 次。

    -   最终，对第 64 个`mix`执行摘要函数，生成一个 32 字节序列，称为`mix digest`。

    -   将此序列与难度目标进行比较。如果小于难度目标，则`nonce`有效，`PoW`即被解开，区块被成功挖掘。否则，算法将使用新的`nonce`重复此过程。


    我们可以从图 8-2 中直观地看到这个过程。


    ![](img/515270_1_En_8_Fig2_HTML.png)


    `DAG`的组织结构图被分为 3 个`DAG`页面，这些页面链接到一个包含区块头、`nonce`和其他功能的循环流程中。


    **图 8-2** Ethash 处理流程


    `Ethash`有几个目标：


    -   该算法几乎消耗所有可用的内存访问带宽，这是一种抗 ASIC 措施。

    -   使用 GPU 进行`Ethash`挖矿更容易执行。

    -   轻客户端能够更高效地验证挖矿轮次，并应能快速投入运行。

    -   该算法在轻客户端上运行极其缓慢，因为不期望它们参与挖矿。


    随着以太坊执行层（原以太坊 1.0）向共识层（原以太坊 2.0）演进，这种`PoW`最终将被淘汰。当当前的 EVM 链接入信标链（即所谓的“合并”）发生时，`Casper
    FFG`将运行在`PoW`之上。然而，最终，纯粹的`PoS`算法`Casper CBC`将完全接管。


    此外，随着冰河时代的激活，由于“冰河时代”导致的极端难度级别，`PoW`挖矿将几乎变得不可能，用户将别无选择，只能转向`PoS`。


    # Solana


    Solana 是一个于 2018 年推出的、支持智能合约的第一层区块链。Solana 的开发人员致力于实现速度、安全性、可扩展性和去中心化。在撰写本文时，它仍处于测试阶段，但正在迅速流行起来。尽管它是一个运行着生产系统的运营网络，但仍有一些技术问题正在解决中。


    其账本是一个可验证延迟函数，其中时间就是一种数据结构，即数据即时间。它潜在地支持数百万个节点，并利用 GPU 进行加速。`SOL`币是该平台的原生代币，用于治理和激励。其主要创新包括以下几点。


    历史证明（`PoH`）使得能够使用基于数据结构的加密时钟（而非外部时间源）对事件进行排序，进而达成共识。


    `TowerBFT` 是一种源自`PBFT`的共识协议。请注意，`PoH`并非共识协议，它只是一种利用基于数据结构的时钟对事件进行排序的机制。仍然需要一个共识机制来让节点对账本的正确分支进行投票。


    `Turbine`是另一项创新，它使得区块能够以小片段（称为`shreds`）进行传播，有助于实现速度和效率。Solana 中没有内存池，因为交易处理速度非常快，以至于不会形成内存池。这种机制被称为“墨西哥湾流”。


    Solana 支持智能合约的并行执行，这再次提高了效率。


    交易在验证器内所谓的“交易处理单元”中，通过流水线技术以优化方式进行验证。


    Cloud break 是一个具有水平扩展能力的数据库的名称。最后，归档者或复制者是那些允许分布式账本存储的节点，因为在像 Solana 这样的高吞吐量系统中，数据存储可能成为瓶颈。为此，使用归档者来存储数据，并给予其激励。


    由于我们的主要关注点是共识算法，我将在此结束对区块链的介绍，转而讨论 Solana 中的实际共识及相关机制。


    Solana 使用权益证明和`TowerBFT`共识算法。Solana 的关键创新之一是历史证明，它并非共识算法，但能够创建事件的自洽记录，证明某个事件发生在一个特定时间点之前或之后。这进而促成了共识。它降低了
    BFT 协议中的消息复杂度，有效地将通信替换为本地计算。这直接带来了高吞吐量和亚秒级最终性。分布式系统研究界早已认识到，如果能够以某种方式将通信替换为本地计算，则可以显著提升性能，许多时钟同步协议也因此应运而生。然而，所有这些协议通常都依赖外部时间源（通过原子钟或
    GPS），然后使用 NTP 类型的协议进行同步。`PoH`则是一种无需依赖外部时间源，即可通过加密方式证明事件之间顺序和时间流逝的证明。

    '
- fmt: '### Proof of History


    As discussed in Chapter [1](#515270_1_En_1_Chapter.xhtml), time in distributed
    systems is crucial. If time is synchronized among processes, that is, a synchronized
    clock is available in a distributed network, then communication can be reduced,
    which results in improved performance. A node can deduce information from past
    events instead of asking another node repeatedly about some information. For example,
    with the availability of a global clock where all nodes are synchronized, the
    system can establish a notion of the system-wide history of events. For example,
    a timestamp on an event can inform a node when this event occurred in reference
    to the globally synchronized time across the network, instead of asking a node
    again who produced that event when this event occurred.


    Another application of a synchronized clock is that entities in the system can
    deduce if something has expired, for example, a timestamped security token can
    immediately tell a node how much time has elapsed since its creation. The node
    can infer if it is valid anymore or not and not something that occurred in the
    distant past, making this token no longer applicable and expired.


    In replication protocols, clock synchronization also plays a crucial role. If
    nodes don’t have clocks synchronized, that can lead to inconsistency because every
    node will have a different view of the order of events.


    If the time is not synchronized among nodes, the system cannot establish a global
    notion of time and history. It is usually possible in practical systems using
    an `NTP` protocol. We discussed this in Chapter [2](#515270_1_En_2_Chapter.xhtml)
    before in the context of time and order in distributed systems.


    So far, we have established that synchronized time is indeed a valuable construct
    in distributed systems for performance gains. In other words, if we can somehow
    replace communication with local computation, then we can gain tremendous efficiency.


    Also, synchrony and time together solve consensus easily. Safety and liveness,
    the two fundamental requirements, are easy to implement with a trusted clock and
    synchronous network. However, networks are empirically asynchronous. We also know
    that a trusted synchronized clock in distributed networks is difficult to maintain.
    Blockchains and distributed systems are characterized by no clocks, which make
    them slow due to inherent asynchrony and the need for complex message passing
    for ordering of events and agreement.


    On the other hand, a reliable, trusted clock makes network synchronization much
    simpler and quicker, which leads to very fast networks. Solana’s `PoH` is a solution
    where the system can keep time reliably between nontrusting computers. In short,
    `PoH` enables clocks in clockless blockchains.


    Solana’s `PoH` is a way to establish the history and provide that global notion
    of synchronized time among nodes in a distributed network. The key innovation
    here is that it does not use any external source of time and synchronize nodes
    using that, for example, via an `NTP` protocol; instead, it uses a cryptographic
    proof to show that some time has passed, and other nodes directly accept this
    history of events due to cryptographic guarantees. So instead of relying on a
    source of global time, this mechanism is built into validators that generate a
    sequence of events with a proof when an event has occurred. The following describes
    how it works.


    In a blockchain network, the right of adding a new block is won after solving
    a puzzle, that is, `PoW`, which takes a long time. Although this mechanism is
    secure and thwarts Sybil attacks (as we saw in Chapter [5](#515270_1_En_5_Chapter.xhtml)),
    it is slow. If BFT-style consensus is used, the leader validator that proposes
    a block only gets to commit after at least two sequential phases, which is also
    time-consuming even under a normal environment. In case of failures, it can ever
    further slow down with new leader selection (election) and view changes. What
    if somehow there is a deterministic leader election algorithm that can select
    leaders in quick successions, and each leader quickly proposes, and then the algorithm
    moves to the next leader and so on? All this without going through complex leader
    election, acknowledgment from other nodes, and running multiple phases to reach
    consensus. The problem here is that it’s quick to create a deterministic algorithm
    that can select the next leader, but how do I ensure that what they propose is
    correct and that selected leaders are not malicious and will not censor transactions
    or exhibit other malicious behaviors?


    This is where `PoH` comes in. In Solana, one leader at a time processes transactions
    and updates the state. Other validators read the state and send votes to the leader
    to confirm them. This activity is split into very short successive sessions where
    one leader after another performs this. It can be thought of as if the ledger
    is split into small intervals. These small intervals are of `400ms` each. The
    leader rotation schedule is predetermined and deterministic based on several factors
    such as the stake and behavior of previous transactions. But how can we ensure
    that the leader rotation is done at the right time and does not skip the leader’s
    turn?


    In `PoH`, the passage of time is proven by creating a sequence of these hashes,
    as shown in Figure [8-3](#515270_1_En_8_Chapter.xhtml#Fig3).


    ![](images/515270_1_En_8_Chapter/515270_1_En_8_Fig3_HTML.png)


    An illustration of the Solana proof includes genesis input to `4 S H A 256` hash
    functions to output hash `N plus pus, counter plus plus`.


    **Figure 8-3.** Solana proof of history sequence


    In Figure [8-3](#515270_1_En_8_Chapter.xhtml#Fig3), a sequence of hash operations
    is shown. The genesis input (shown at the left in the diagram) is first provided
    to the hash function. In the next iteration, the output of the previous hash function
    is used as an input to the hash function, and this process continues indefinitely.
    This sequence is generated using the `SHA-256` function on a single core. This
    process cannot parallelize it because the output of the previous hash function
    can only be known if and only if the hash function has processed the previous
    input. It is assumed that the functions are cryptographic hash functions that
    are preimage resistant. Therefore, this is a purely sequential function. However,
    this sequence can be verified in parallel using multicore GPUs. As all the inputs
    and outputs are available, it becomes just a matter of verifying each output,
    which GPUs can do in parallel. This property makes this sequence a verifiable
    delay function (`VDF`) because the time taken (i.e., delay) in generating the
    hash sequence can be verified using quick parallel verification. However, there
    is some debate between cryptographic `VDFs` introduced by researchers at Stanford
    and hardware `VDF` introduced by Solana researchers. See the reference in the
    bibliography.'
  raw: '### Proof of History


    As discussed in Chapter [1](#515270_1_En_1_Chapter.xhtml), time in distributed
    systems is crucial. If time is synchronized among processes, that is, a synchronized
    clock is available in a distributed network, then communication can be reduced,
    which results in improved performance. A node can deduce information from past
    events instead of asking another node repeatedly about some information. For example,
    with the availability of a global clock where all nodes are synchronized, the
    system can establish a notion of the system-wide history of events. For example,
    a timestamp on an event can inform a node when this event occurred in reference
    to the globally synchronized time across the network, instead of asking a node
    again who produced that event when this event occurred.


    Another application of a synchronized clock is that entities in the system can
    deduce if something has expired, for example, a timestamped security token can
    immediately tell a node how much time has elapsed since its creation. The node
    can infer if it is valid anymore or not and not something that occurred in the
    distant past, making this token no longer applicable and expired.


    In replication protocols, clock synchronization also plays a crucial role. If
    nodes don’t have clocks synchronized, that can lead to inconsistency because every
    node will have a different view of the order of events.


    If the time is not synchronized among nodes, the system cannot establish a global
    notion of time and history. It is usually possible in practical systems using
    an NTP protocol. We discussed this in Chapter [2](#515270_1_En_2_Chapter.xhtml)
    before in the context of time and order in distributed systems.


    So far, we have established that synchronized time is indeed a valuable construct
    in distributed systems for performance gains. In other words, if we can somehow
    replace communication with local computation, then we can gain tremendous efficiency.


    Also, synchrony and time together solve consensus easily. Safety and liveness,
    the two fundamental requirements, are easy to implement with a trusted clock and
    synchronous network. However, networks are empirically asynchronous. We also know
    that a trusted synchronized clock in distributed networks is difficult to maintain.
    Blockchains and distributed systems are characterized by no clocks, which make
    them slow due to inherent asynchrony and the need for complex message passing
    for ordering of events and agreement.


    On the other hand, a reliable, trusted clock makes network synchronization much
    simpler and quicker, which leads to very fast networks. Solana’s PoH is a solution
    where the system can keep time reliably between nontrusting computers. In short,
    PoH enables clocks in clockless blockchains.


    Solana’s PoH is a way to establish the history and provide that global notion
    of synchronized time among nodes in a distributed network. The key innovation
    here is that it does not use any external source of time and synchronize nodes
    using that, for example, via an NTP protocol; instead, it uses a cryptographic
    proof to show that some time has passed, and other nodes directly accept this
    history of events due to cryptographic guarantees. So instead of relying on a
    source of global time, this mechanism is built into validators that generate a
    sequence of events with a proof when an event has occurred. The following describes
    how it works.


    In a blockchain network, the right of adding a new block is won after solving
    a puzzle, that is, PoW, which takes a long time. Although this mechanism is secure
    and thwarts Sybil attacks (as we saw in Chapter [5](#515270_1_En_5_Chapter.xhtml)),
    it is slow. If BFT-style consensus is used, the leader validator that proposes
    a block only gets to commit after at least two sequential phases, which is also
    time-consuming even under a normal environment. In case of failures, it can ever
    further slow down with new leader selection (election) and view changes. What
    if somehow there is a deterministic leader election algorithm that can select
    leaders in quick successions, and each leader quickly proposes, and then the algorithm
    moves to the next leader and so on? All this without going through complex leader
    election, acknowledgment from other nodes, and running multiple phases to reach
    consensus. The problem here is that it’s quick to create a deterministic algorithm
    that can select the next leader, but how do I ensure that what they propose is
    correct and that selected leaders are not malicious and will not censor transactions
    or exhibit other malicious behaviors?


    This is where PoH comes in. In Solana, one leader at a time processes transactions
    and updates the state. Other validators read the state and send votes to the leader
    to confirm them. This activity is split into very short successive sessions where
    one leader after another performs this. It can be thought of as if the ledger
    is split into small intervals. These small intervals are of 400ms each. The leader
    rotation schedule is predetermined and deterministic based on several factors
    such as the stake and behavior of previous transactions. But how can we ensure
    that the leader rotation is done at the right time and does not skip the leader’s
    turn?


    In PoH, the passage of time is proven by creating a sequence of these hashes,
    as shown in Figure [8-3](#515270_1_En_8_Chapter.xhtml#Fig3).


    ![](images/515270_1_En_8_Chapter/515270_1_En_8_Fig3_HTML.png)


    An illustration of the Solana proof includes genesis input to 4 S H A 256 hash
    functions to output hash N plus pus, counter plus plus.


    Figure 8-3


    Solana proof of history sequence


    In Figure [8-3](#515270_1_En_8_Chapter.xhtml#Fig3), a sequence of hash operations
    is shown. The genesis input (shown at the left in the diagram) is first provided
    to the hash function. In the next iteration, the output of the previous hash function
    is used as an input to the hash function, and this process continues indefinitely.
    This sequence is generated using the SHA-256 function on a single core. This process
    cannot parallelize it because the output of the previous hash function can only
    be known if and only if the hash function has processed the previous input. It
    is assumed that the functions are cryptographic hash functions that are preimage
    resistant. Therefore, this is a purely sequential function. However, this sequence
    can be verified in parallel using multicore GPUs. As all the inputs and outputs
    are available, it becomes just a matter of verifying each output, which GPUs can
    do in parallel. This property makes this sequence a verifiable delay function
    (VDF) because the time taken (i.e., delay) in generating the hash sequence can
    be verified using quick parallel verification. However, there is some debate between
    cryptographic VDFs introduced by researchers at Stanford and hardware VDF introduced
    by Solana researchers. See the reference in the bibliography.'
  trans: '

    ### 历史证明


    正如第 1 章所述，分布式系统中的时间至关重要。如果进程间的时间是同步的，即分布式网络中拥有同步时钟，那么通信量便可减少，从而提升性能。节点可以从过去的事件中推断信息，而无需反复向其他节点询问某些信息。例如，若存在一个所有节点都同步的全局时钟，系统就能建立一套系统范围的事件历史概念。再如，事件上的时间戳可以告知节点该事件相对于全网同步时间发生的时刻，而无需再次向产生该事件的节点询问其发生时间。


    同步时钟的另一个应用是，系统中的实体可以推断某个事物是否已过期。例如，带有时间戳的安全令牌可以立即告知节点自其创建以来已过去了多长时间。节点便能推断该令牌是否仍然有效，而不是发生在遥远过去的事物，从而使令牌失效且不再适用。


    在复制协议中，时钟同步也扮演着至关重要的角色。如果节点没有同步时钟，就可能导致不一致，因为每个节点对事件顺序会有不同的视角。


    如果节点间的时间不同步，系统就无法建立全局时间和历史的概念。在实际系统中，通常可以通过`NTP`协议实现这一点。我们在第 2 章中讨论分布式系统的时间与顺序时，曾提及这一点。


    到目前为止，我们已经确定，同步时钟在分布式系统中确实是一种有价值的结构，能够带来性能提升。换句话说，如果我们能以某种方式用本地计算替代通信，就能获得巨大的效率提升。


    此外，同步性和时间相结合可以轻松解决共识问题。安全性和活跃性这两个基本需求，在有可信时钟和同步网络的情况下很容易实现。然而，经验表明网络是异步的。我们也知道，在分布式网络中维护一个可信的同步时钟十分困难。区块链和分布式系统的特点是没有时钟，这导致它们因固有的异步性以及事件排序和达成共识所需的复杂消息传递而变得缓慢。


    另一方面，一个可靠、可信的时钟能使网络同步变得更加简单快捷，从而带来极快的网络速度。Solana 的`PoH`是一种解决方案，它能让系统在互不信任的计算机之间可靠地保持时间。简而言之，`PoH`让无时钟的区块链拥有了时钟。


    Solana 的`PoH`是一种在分布式网络中建立历史记录，并为节点提供全局同步时间概念的方法。其关键创新在于，它不依赖任何外部时间源（例如通过`NTP`协议）来同步节点；相反，它使用加密证明来表明一段时间已经过去，而其他节点则因加密保证直接接受这段事件历史。因此，这种机制不依赖全局时间源，而是内置于验证者中，它们生成一个事件序列，并在事件发生时附上证明。下文描述了其工作原理。


    在区块链网络中，添加新区块的权利是在解决难题（即`PoW`）后获得的，这通常需要很长时间。尽管这种机制是安全的，并能抵御女巫攻击（如第 5 章所述），但速度很慢。如果使用
    BFT 风格的共识，提议区块的领导者验证者至少需要经过两个连续的阶段才能提交，即使在正常环境下这也相当耗时。在发生故障时，随着新领导者的选举和视图变更，速度可能会进一步降低。那么，如果有一种确定性的领导者选举算法，可以快速连续地选出领导者，每个领导者迅速提议，然后算法再转向下一个领导者，如此循环往复，情况会怎样？这一切都无需经历复杂的领导者选举、其他节点的确认以及运行多个阶段来达成共识。这里的问题是，创建一种能选出下一个领导者的确定性算法很容易，但如何确保他们所提议的内容是正确的，并且选出的领导者不是恶意的，不会审查交易或表现出其他恶意行为呢？


    这正是`PoH`发挥作用的地方。在 Solana 中，一次只有一个领导者处理交易并更新状态。其他验证者读取状态，并向领导者发送投票以确认这些交易。这个活动被分割成非常短的连续会话，领导者一个接一个地执行此操作。可以将其视为账本被分割成许多小的时间间隔。每个小间隔为`400ms`。领导者轮换计划是预先确定且确定性的，基于多个因素，例如质押量和先前交易的行为。但如何确保领导者轮换在正确的时间进行，并且不会跳过领导者的轮次呢？


    在`PoH`中，时间的流逝是通过创建一系列哈希值来证明的，如图 8-3 所示。


    ![](img/515270_1_En_8_Fig3_HTML.png)


    Solana 证明的图示包含将创世输入到`4 S H A 256`哈希函数，以输出哈希`N plus pus, counter plus plus`。


    **图 8-3.** Solana 历史证明序列


    在图 8-3 中，展示了一系列哈希操作。首先将创世输入（图中左侧所示）提供给哈希函数。在下一个迭代中，前一个哈希函数的输出被用作哈希函数的输入，此过程无限循环。这个序列是在单核上使用`SHA-256`函数生成的。这个过程无法并行化，因为前一个哈希函数的输出只有当且仅当哈希函数处理完前一个输入后才能获知。假设这些函数是抗原像的加密哈希函数。因此，这是一个纯粹的顺序函数。然而，这个序列可以使用多核
    GPU 并行验证。由于所有输入和输出都是可用的，验证每个输出只是时间问题，而 GPU 可以并行完成。这一特性使得该序列成为一个可验证延迟函数（`VDF`），因为生成哈希序列所花费的时间（即延迟）可以通过快速的并行验证来验证。然而，对于斯坦福大学研究人员提出的加密`VDF`和
    Solana 研究人员提出的硬件`VDF`，存在一些争论。请参阅参考文献中的资料。

    '
- fmt: '我们可以按固定时间间隔对这个序列进行采样，从而提供时间流逝的概念。这是因为哈希生成需要一定的 CPU 时间（在 Intel 或 AMD CPU 上，SHA-256
    指令大约需要 1.75 个周期），并且这个过程完全是顺序的；通过观察这个序列，我们可以推断出自第一个哈希生成以来，直到序列中后面的某个哈希，已经过去了一些时间。如果我们还能向哈希函数的输入哈希中添加一些数据，那么我们可以推断出这些数据一定存在于前一个哈希之后、后一个哈希之前。这个哈希序列因此成为历史证明（Proof
    of History），以密码学方式证明某个事件（比如事件 `e`）发生在事件 `f` 之前和事件 `d` 之后。


    这是一个连续运行 `SHA-256` 的顺序过程，它反复且不间断地使用前一个输出作为其输入。它会定期记录每个输出样本的计数器（例如，每秒钟一次）和当前状态（哈希输出），其作用类似于时钟滴答。观察这种固定时间间隔采样的哈希结构，我们可以推断出已经过去了一些时间。这个过程无法并行化，因为前一个输出是下一次迭代的输入。例如，我们可以说在计数器
    1 和计数器 N 之间已经过去了一段时间（图 [8-3](#515270_1_En_8_Chapter.xhtml#Fig3)），其中时间就是 `SHA-256`
    计数器的数值。我们可以从这个计数中近似得出实际时间。我们还可以关联一些数据，将其附加到哈希函数的输入中；一旦哈希完成，我们就可以确信这些数据在哈希生成之前就已经存在。这种结构只能按顺序生成；然而，我们可以并行地验证它。例如，如果
    4000 个样本需要 40 秒生成，那么使用一个 4000 核的 GPU 只需要 1 秒就能验证整个数据结构。


    关键思想是，PoH 的交易吞吐量与共识是分离的，这是实现扩展性的关键。请注意，所生成事件的顺序（即序列）并非全局唯一。因此，需要一种共识机制来确定真正的链，因为任何人都可以生成一个替代的历史。


    历史证明是一种以密码学方式证明时间流逝的方法。它可以被视为一种特定于应用的可验证延迟函数。它通过使用 `SHA-256` 哈希来对传入的事件和交易进行哈希处理，从而将时间的流逝编码为数据。它为每个事件生成一个唯一的哈希和计数，从而产生一个随时间变化的、可验证的事件排序。这意味着可以在无需等待其他节点响应的前提下达成关于时间和事件排序的共识——换句话说，不存在弱主观性，即节点无需依赖其他节点来确定系统的当前状态。这带来了高吞吐量，因为通常需要由其他节点提供的信息已经包含在
    PoH 机制生成的序列中，并且是密码学可验证的，从而确保了完整性。这意味着可以在不执行通信复杂度较高的复杂协议或信任外部时间源进行时钟同步的情况下，强制执行全局事件顺序。总之，历史证明不依赖于时间戳，而是允许创建一个历史记录，证明事件
    `e` 发生在特定时间点 `t`，在另一个事件 `f` 之前、事件 `d` 之后。


    使用 PoH，领导节点可以在无需与其他节点通信的情况下进行切换，这提高了区块生成频率。与通信复杂度高且节点容量有限的 BFT 风格协议相比，PoH 实现了高节点可扩展性和低通信复杂度。


    它提供了全局读取一致性以及两个事件之间密码学可验证的时间流逝。借助 PoH，节点即使在共识阶段达成之前，也可以信任事件的排序和时间。换句话说，它是一种先于共识的时钟方法。共识通过在不同的分叉上进行投票来简单运作，节点对他们认为是主链的分叉进行投票。随着时间的推移，通过持续对他们最初投票的链进行投票，并对任何其他分叉进行投票，他们可以获得奖励，最终其他分叉会成为孤块。


    `TowerBFT` 是 `PBFT` 的一个变种。它本质上是一个分叉选择和投票算法。它用于对 PoH 生成的链进行投票，以选择真正的规范链。它的通信复杂度较低，因为
    PoH 已经提供了顺序，现在只需要决定选择哪条规范链。PoH 在共识发起之前提供事件的时间信息，然后使用 `TowerBFT` 对规范链进行投票。


    `TowerBFT` 是拜占庭容错的，因为一旦三分之二的验证者对一条链（哈希）进行了投票，该链就无法被回滚。验证者对 PoH 哈希进行投票有两个原因：第一，账本一直到该哈希（即某一时间点）都是有效的；第二，为了支持在特定高度上的某个分叉，因为在给定高度上可能存在多个分叉。


    此外，Solana 中的 PoS 被用于经济和治理，以控制罚没、通胀、供应和惩罚。'
  raw: 'We can then sample this sequence at regular intervals to provide a notion
    of the passage of time. This is so because hash generation takes some CPU time
    (roughly 1.75 cycles for SHA-256 instruction on an Intel or AMD CPU), and this
    process is purely sequential; we can infer from looking at this sequence, that
    since the first hash is generated, up to a later hash in the sequence, some time
    has passed. If we can also add some data with the input hash to the hash function,
    then we can also deduce that this data must have existed before the next hash
    and after the previous hash. This sequence of hashes thus becomes a proof of history,
    proving cryptographically that some event, let’s say event e, occurred before
    event f and after event d.


    It is a sequential process that runs SHA-256 repeatedly and continuously, using
    its previous output as its input. It periodically records a counter for each output
    sample, for example, every one second, and current state (hash output), which
    acts like clock ticks. Looking at this structure of sampled hashes at regular
    intervals, we can infer that some time has passed. It is impossible to parallelize
    because the previous output is the input for the next iteration. For example,
    we can say time has passed between counter 1 and counter N (Figure [8-3](#515270_1_En_8_Chapter.xhtml#Fig3)),
    where time is the SHA-256 counter. We can approximate real time from this count.
    We can also associate some data, which we can append to the input of the hash
    function; once hashed, we can be sure that data must have existed before the hash
    is generated. This structure can only be generated in sequence; however, we can
    verify it in parallel. For example, if 4000 samples took 40 seconds to produce,
    it will take only 1 second to verify the entire data structure with a 4000 core
    GPU.


    The key idea is that PoH transactional throughput is separated from consensus,
    which is key to scaling. Note that the order of events generated, that is, the
    sequence, is not globally unique. Therefore, a consensus mechanism is needed to
    ascertain the true chain, as anyone can generate an alternate history.


    Proof of history is a cryptographically proven way of saying that time has elapsed.
    It can be seen as an application-specific verifiable delay function. It encodes
    the passage of time as data using SHA-256 hashing to hash the incoming events
    and transactions. It produces a unique hash and count of each event, which produces
    a verifiable ordering of events as a function of time. This means that time and
    ordering of events can be agreed without waiting to hear from other nodes – in
    other words, no weak subjectivity where nodes must rely on other nodes to determine
    the current state of the system. This results in high throughput, because the
    information that is usually required to be provided by other nodes is already
    there in the sequence generated by the PoH mechanism and is cryptographically
    verifiable, ensuring integrity. This means that a global order of events can be
    enforced without going through a communication-wise complex agreement protocol
    or trusting an external source of time for clock synchronization. In summary,
    instead of trusting the timestamp, proof of history allows to create a historical
    record proving that an event e occurred at a particular point in time t, before
    another event f and after an event d.


    Using PoH, leadership can be switched without needing to communicate with other
    nodes, which results in increased block production frequency. PoH results in high
    node scalability and low communication complexity as compared to BFT-style protocols
    with high communication complexity and limited node capacity.


    It provides global read consistency and cryptographically verifiable passage of
    time between two events. With PoH, nodes can trust the ordering and timing of
    events, even before the consensus stage is reached. In other words, it’s a clock
    before consensus approach. Consensus then simply works by voting on different
    branches where nodes vote on a branch that they believe is the main chain. Over
    time, by keep voting on the chain they first voted on, and by voting on any other
    branch, they earn rewards and eventually the other branches orphan.


    TowerBFT is a variant of PBFT. It is basically a fork selection and voting algorithm.
    It is used to vote on the chains produced by PoH to select the true canonical
    chain. It is less communication-wise complex because PoH has already provided
    an order, and now the decision is only required on the choice of canonical chain.
    PoH provides timing of events before consensus initiates, and TowerBFT is then
    used for voting on the canonical chain.


    TowerBFT is BFT in the sense that once two-thirds of validators have voted on
    a chain (hash), then it cannot be rolled back. Validators vote on a PoH hash for
    two reasons: first, the ledger is valid up until that hash, that is, a point in
    time, and, second, to support for a fork at a given height as many forks can exist
    at a given height.


    Furthermore, PoS in Solana is used for economics and governance to control slashing,
    inflation, supply, and penalties.'
  trans: '

    我们可以按固定时间间隔对这个序列进行采样，从而提供时间流逝的概念。这是因为哈希生成需要一定的 CPU 时间（在 Intel 或 AMD CPU 上，SHA-256
    指令大约需要 1.75 个周期），并且这个过程完全是顺序的；通过观察这个序列，我们可以推断出自第一个哈希生成以来，直到序列中后面的某个哈希，已经过去了一些时间。如果我们还能向哈希函数的输入哈希中添加一些数据，那么我们可以推断出这些数据一定存在于前一个哈希之后、后一个哈希之前。这个哈希序列因此成为历史证明（**Proof
    of History**），以密码学方式证明某个事件（比如事件 `e`）发生在事件 `f` 之前和事件 `d` 之后。


    这是一个连续运行 `SHA-256` 的顺序过程，它反复且不间断地使用前一个输出作为其输入。它会定期记录每个输出样本的计数器（例如，每秒钟一次）和当前状态（哈希输出），其作用类似于时钟滴答。观察这种固定时间间隔采样的哈希结构，我们可以推断出已经过去了一些时间。这个过程无法并行化，因为前一个输出是下一次迭代的输入。例如，我们可以说在计数器
    1 和计数器 N 之间已经过去了一段时间（图 8-3），其中时间就是 `SHA-256` 计数器的数值。我们可以从这个计数中近似得出实际时间。我们还可以关联一些数据，将其附加到哈希函数的输入中；一旦哈希完成，我们就可以确信这些数据在哈希生成之前就已经存在。这种结构只能按顺序生成；然而，我们可以并行地验证它。例如，如果
    4000 个样本需要 40 秒生成，那么使用一个 4000 核的 GPU 只需要 1 秒就能验证整个数据结构。


    关键思想是，PoH 的交易吞吐量与共识是分离的，这是实现扩展性的关键。请注意，所生成事件的顺序（即序列）并非全局唯一。因此，需要一种共识机制来确定真正的链，因为任何人都可以生成一个替代的历史。


    历史证明是一种以密码学方式证明时间流逝的方法。它可以被视为一种特定于应用的可验证延迟函数。它通过使用 `SHA-256` 哈希来对传入的事件和交易进行哈希处理，从而将时间的流逝编码为数据。它为每个事件生成一个唯一的哈希和计数，从而产生一个随时间变化的、可验证的事件排序。这意味着可以在无需等待其他节点响应的前提下达成关于时间和事件排序的共识——换句话说，不存在弱主观性，即节点无需依赖其他节点来确定系统的当前状态。这带来了高吞吐量，因为通常需要由其他节点提供的信息已经包含在
    PoH 机制生成的序列中，并且是密码学可验证的，从而确保了完整性。这意味着可以在不执行通信复杂度较高的复杂协议或信任外部时间源进行时钟同步的情况下，强制执行全局事件顺序。总之，历史证明不依赖于时间戳，而是允许创建一个历史记录，证明事件
    `e` 发生在特定时间点 `t`，在另一个事件 `f` 之前、事件 `d` 之后。


    使用 PoH，领导节点可以在无需与其他节点通信的情况下进行切换，这提高了区块生成频率。与通信复杂度高且节点容量有限的 BFT 风格协议相比，PoH 实现了高节点可扩展性和低通信复杂度。


    它提供了全局读取一致性以及两个事件之间密码学可验证的时间流逝。借助 PoH，节点即使在共识阶段达成之前，也可以信任事件的排序和时间。换句话说，它是一种先于共识的时钟方法。共识通过在不同的分叉上进行投票来简单运作，节点对他们认为是主链的分叉进行投票。随着时间的推移，通过持续对他们最初投票的链进行投票，并对任何其他分叉进行投票，他们可以获得奖励，最终其他分叉会成为孤块。


    `TowerBFT` 是 `PBFT` 的一个变种。它本质上是一个分叉选择和投票算法。它用于对 PoH 生成的链进行投票，以选择真正的规范链。它的通信复杂度较低，因为
    PoH 已经提供了顺序，现在只需要决定选择哪条规范链。PoH 在共识发起之前提供事件的时间信息，然后使用 `TowerBFT` 对规范链进行投票。


    `TowerBFT` 是拜占庭容错的，因为一旦三分之二的验证者对一条链（哈希）进行了投票，该链就无法被回滚。验证者对 PoH 哈希进行投票有两个原因：第一，账本一直到该哈希（即某一时间点）都是有效的；第二，为了支持在特定高度上的某个分叉，因为在给定高度上可能存在多个分叉。


    此外，Solana 中的 PoS 被用于经济和治理，以控制罚没、通胀、供应和惩罚。

