    ![](images/515270_1_En_10_Chapter/515270_1_En_10_Fig1_HTML.jpg)


    A flowchart of the model checking mechanism. The flow starts with requirements
    and system and ends at satisfied and counter example.


    Figure 10-1


    Model checking


    TLA+ (temporal logic for actions) is a specification language designed by Leslie
    Lamport for describing and reasoning about concurrent systems. TLC is a model
    checker for design specifications written in TLA+. Another model checker is SPIN
    which checks specifications written in the Promela specification language.


    A distributed blockchain consensus algorithm is usually evaluated against two
    classes of correctness properties: safety and liveness. Safety generally means
    “nothing bad will happen,” whereas liveness suggests “something good will eventually
    occur.” Both these properties have some subproperties, depending on the requirements.
    Usually, for consensus mechanisms, we have agreement, integrity, and validity
    conditions under the safety property, and termination is required for liveness.
    Consensus algorithms are mostly model checked under a system model by specifying
    how many nodes are in the system and what timing assumptions are made about the
    system. The model is then run to explore each state of the system and check if
    there is an execution that doesn’t terminate. Usually, this is done under a four-node
    model, based on the formula of 3f+1, which we’ve seen before.


    A program is correct if, in all possible executions, the program behaves correctly
    according to the specification.'
  trans: '

    # 形式化验证


    随着区块链共识研究领域的蓬勃发展，我们现在能够体会到这是一个多么活跃的研究方向。许多新协议被提出，以创新的方式解决共识问题。例如，有些协议专注于效率，有些着眼于可扩展性问题，有些试图减少消息复杂度，有些修改现有的经典协议使其适用于区块链，有些尝试加速共识机制，此外还有诸多其他改进和新颖之处。这就引出了一个问题：我们如何确保这些共识协议是正确无误的，并且能按我们的预期运行？为此，研究人员通常会撰写包含协议正确性证明和论证的研究论文。此外，还会使用形式化方法来确保协议的正确性。


    形式化方法是一种将系统建模为数学对象的技术。换句话说，这些是用于规约、设计和验证软件或硬件系统的数学严谨方法。这类技术包括用形式逻辑编写规约，并通过模型检测和形式化证明对其进行验证。形式化方法分为两大领域：形式化规约和形式化验证。前者涉及编写精确具体的规约，后者则关注于开发证明来验证规约的正确性。


    形式化规约是一个定义明确的数学逻辑陈述，而验证则是通过逻辑推理（以机械方式完成）来检查规约的过程。换句话说，就是先正式定义规约，然后使用模型检测器或定理证明器进行验证。


    形式化方法能提供价值的原因在于，它可以符号化地检查设计的整个状态空间，并确定设计的正确性。


    通常，形式化验证包含三个步骤：


    -   为待检查的系统创建一个形式化模型。

    -   编写模型需满足的属性形式化规约。

    -   机械地检查模型，以确保模型满足规约。


    常用的验证技术分为两类：基于状态探索的方法和基于证明的方法。基于状态探索的方法是自动化的，但效率低下且难以扩展。例如，一个常见问题是状态爆炸，即待检查的状态数量呈指数级增长，导致模型无法放入计算机内存。因此模型必须是有限的，以便能被高效验证。另一方面，基于证明的方法（即定理证明）更精确，内存消耗更少，但需要人工交互以及对证明和相关技术有更深入的了解。基于证明的技术是对系统属性进行推理的最优雅方式，且对规约的大小没有限制。这与模型检测形成对比，后者对模型大小必须有所限制。借助基于证明的技术，你可以对系统状态进行推理，并证明无论输入什么，系统都能按预期工作。诸如
    `Isabelle` 等证明辅助工具通过支持自动化定理证明，被用来帮助对系统进行推理。


    模型检测机制包含一个形式化规约语言和一个模型检测器。模型检测使用自动化工具对系统进行形式化验证。这种方法在区块链研究人员中越来越受欢迎，用于检查共识协议的形式化规约并确保其正确性。自动化检测器会检查条件是否得到满足，如果满足则予以确认；否则，它会生成反例（即异常情况）。


    图 10-1 展示了模型检测机制。


    ![](img/515270_1_En_10_Fig1_HTML.jpg)


    模型检测机制的流程图。流程始于需求和系统，止于满足和反例。


    **图 10-1** 模型检测


    `TLA+`（动作的时序逻辑）是由 Leslie Lamport 设计的一种规约语言，用于描述和推理并发系统。`TLC` 是一个用于对用 `TLA+` 编写的设计规约进行模型检测的工具。另一个模型检测器是
    `SPIN`，它检查用 `Promela` 规约语言编写的规约。


    分布式区块链共识算法通常针对两类正确性属性进行评估：安全性和活性。安全性通常意味着“不会发生坏事”，而活性则意味着“好事终将发生”。根据需求，这两个属性都有一些子属性。通常，对于共识机制，我们在安全性属性下有共识性、完整性和有效性条件，而活性则需要终止性。共识算法大多在系统模型下进行模型检测，通过指定系统中有多少个节点以及系统的时间假设。然后运行模型以探索系统的每个状态，并检查是否存在不会终止的执行路径。通常，这基于我们之前见过的
    `3f+1` 公式，在一个四节点模型下进行。


    一个程序是正确的，当且仅当在所有可能的执行中，该程序都能根据规约正确运行。

    '
- fmt: '# Impossibility Results


    Unsolvability results in distributed systems show that certain problems cannot
    be solved. Lower bound results show that certain problems cannot be solved if
    resources are insufficient; in other words, these lower bound results show that
    certain problems are only solvable if a certain threshold of sufficient resources
    is available, that is, minimum resources required to solve a problem.


    Table [10-1](#515270_1_En_10_Chapter.xhtml#Tab1) summarizes the core impossibility
    results related to the consensus problem.


    **Table 10-1** Consensus problem impossibility results


    |   | Crash Faults | Byzantine Faults |

    | --- | --- | --- |

    | Synchronous | Consensus possible if `f` < `n`<br>At least `f` + 1 rounds required
    where `f` < `n`<br>`f` network connectivity | `f` ≥ `n`/3 impossible<br>`2f` network
    connectivity minimum<br>`f` < `n`/2 possible<br>`f` + 1 rounds |

    | Asynchronous | Deterministic consensus impossible | Deterministic consensus
    impossible |

    | Partially synchronous | Impossible if `n` ≤ `2f` | Impossible if `n` ≤ `3f`<br>`2f`
    network connectivity<br>`f` + 1 rounds |


    The results in Table [10-1](#515270_1_En_10_Chapter.xhtml#Tab1) are standard impossibility
    results. However, there are many others.


    With the innovative research on blockchains, some new results have emerged. Andrew
    Lewis-Pye and Tim Roughgarden announced a fascinating new impossibility result
    similar to the CAP theorem where we can simultaneously choose only two of three
    properties. It states that no blockchain protocol can operate in the unconstrained
    environment (e.g., PoW), is live under a synchronous environment with significant
    and sharp dynamic changes in network resources (e.g., participant numbers), and
    satisfies probabilistic finality (consistency) in the partially synchronous environment.
    We can only choose two properties simultaneously out of the three properties stated
    earlier.


    For example, in an unsized environment such as Bitcoin, imagine a node stops receiving
    any new blocks. Now the node cannot differentiate between whether the other nodes
    have lost their resources and cannot produce blocks anymore and if the block messages
    are delayed. Now if the node stops producing blocks and other nodes are low on
    resources and not producing blocks, it violates the liveness property, because
    this node must keep producing blocks even if others don’t. However, if it keeps
    producing blocks but the block messages are just delayed, then it is violating
    the consistency property, because there could be other conflicting blocks which
    are just delayed.


    # Complexity and Performance


    A consensus algorithm can be evaluated from a communication complexity point of
    view. This involves calculations such as if the protocol is running in normal
    mode (no failures), then how many messages are required to be exchanged to reach
    consensus. Also, in case of leader failure when a view change occurs, how many
    messages are exchanged? Such metrics can help to understand how the algorithm
    behaves practically, which helps to estimate the efficiency of the algorithm.


    Message delays can be defined as the number of messages required by an algorithm
    that cannot be sent before the previous message is received. In other words, it’s
    a message which is sent only after the previous one has been received. An algorithm
    requires `n` message delay; if some execution contains a chain of `n` messages,
    each of which cannot be sent before receiving the previous one.


    To evaluate the cost associated with an algorithm, we can think of different complexity
    traits. There are three costs associated with a consensus algorithm: message complexity,
    communication complexity, and time complexity.


    ## Message Complexity


    Message complexity denotes the total number of messages that are required to be
    exchanged by the algorithm to reach consensus. For example, imagine an algorithm
    where all processes broadcast to all other nodes. This means that `n(n - 1)` messages
    will be received. This means this algorithm has `O(n²)` message complexity.


    ## Communication Complexity (Bit Complexity)


    Communication complexity is concerned with the total number of bits required to
    be exchanged by the algorithm. Think of the same algorithm we imagined about in
    the context of message complexity. If each message contains `t` bits, the algorithm
    exchanges `tn(n - 1)` bits, which means that the communication complexity is `O(tn²)`
    bits, that is, all to all.


    ## Time Complexity


    Time complexity is concerned with the amount of time needed to complete the execution
    of the algorithm. The time taken to execute the algorithm also depends on the
    time it takes to deliver the messages in the protocol. The time to deliver messages
    is quite large as compared to the local computation on the message. Time can be
    then thought of as the number of consecutive message delays. The same algorithm
    from the previous example running on a faultless network has `O(1)` time complexity.'
