- fmt: '# Byzantine Generals Problem


    The Byzantine generals problem was proposed by Lamport in 1982. In this thought
    experiment, an imaginary scenario is presented in which three or more army units
    are camped around a city, and the collective aim of the units is to capture the
    city. Each army unit is led by a general, and they communicate via messengers.
    The city can only be captured if all army units attack simultaneously.


    The requirement here is to reach an agreement to attack so that all armies can
    attack at the same time and as a result capture the city.


    The problems this setting can face are:


    - Messages can be lost, that is, messengers can be captured or lost.

    - Any general can be a traitor who can send misleading messages to other generals,
    can withhold the messages, may not send messages to all generals, may tamper with
    the messages before relaying them to other generals, or can send contradictory
    messages, all with an aim to subvert the agreement process between the generals.

    - The honest generals also don''t know who the traitors are, but traitors can
    collude together.


    The challenge here is whether in this situation an agreement can be reached and
    what protocol can solve this problem, if any. Figure [3-9](#515270_1_En_3_Chapter.xhtml#Fig9)
    shows this problem.


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig9_HTML.png)


    A schematic of the byzantine generals problem has a castle in the center and 5
    troops of generals around it labeled retreat, attack, and no knowledge.


    **Figure 3-9** Byzantine generals problem – showing each army unit receiving misleading,
    correct, or no messages at all


    It turns out that this problem is impossible to solve. It has been proven that
    this problem can be solved only if fewer than one-third of generals are traitors.
    For example, if there are `3t + 1` generals, only up to `t` can be malicious.
    This is a proven lower bound on the Byzantine fault tolerance. We will see this
    more formally under the section "Impossibility Results" where we discuss FLP,
    CFT lower bounds, and BFT lower bounds.


    In distributed systems, we can have an analog where generals represent processes
    (nodes), traitors represent Byzantine processes, honest generals represent correct
    processes, messengers represent communication links, loss of a message is a captured
    messenger, and no time limit on the messenger to reach generals represents asynchrony.
    I think you get the picture now!


    # Replication


    In this section, we will discuss replication. Replication is used to maintain
    an exact copy of the data in multiple nodes. This technique has several advantages.
    One key advantage is fault tolerance. One example of the simplest replication
    is RAID in storage systems. For example, in RAID-1, there are two disks, and they
    are exact replicas (mirror) of each other. If one is unavailable, the copy is
    available, resulting in fault tolerance and high availability. In distributed
    systems, replication is used for various reasons and, unlike RAID, is between
    multiple nodes instead of just between two disks within a server.


    Also, if data remains unchanged, then replication is easy. You can just make a
    one-off copy of the data and store it on another disk or node. The challenging
    part is how to keep replication consistent when the data is subject to constant
    change.


    There are several advantages:


    - **High availability** due to fault tolerance, for example, if one replica goes
    down, another is available to serve clients.

    - **Load distribution** due to each replica node being an independent node, and
    clients can send requests to different nodes (or can be managed via load balancers
    to route requests to less busy replicas – load balancing). The load can be distributed
    among different replicas to achieve higher performance.

    - **Data consistency** means that the same copy of data is available across all
    nodes, which helps with the integrity of the overall system.

    - **Better performance**, which is achieved via load balancing, where nodes that
    are less busy can take up the requests in case other nodes are near or full capacity.
    There are several techniques for this, which are beyond the scope of this book;
    however, usually load balancers are used which route requests from clients usually
    in a round-robin fashion to replicas. This way, the load is distributed across
    multiple replicas instead of one node getting all the hits and as a result becoming
    less responsive due to CPU load.

    - **Data locality**, where, especially in a geographically distributed network,
    the nodes that are local to a client can serve the requests instead of scenarios
    where there might be only one node in some remote data center and all clients
    either geographically close or far make requests to only that single server. The
    clients that are physically nearer to the server will get their response quicker
    as compared to clients that are physically located cities or continents apart.
    For example, in file download services, a mirror that is, for example, available
    in Ireland will be able to serve the download requests much faster than a server
    that might be in Australia. The network latency alone makes such setting vulnerable
    to performance hit.


    There are some shortcomings as well:


    - **High cost**, due to multiple replica nodes required, the setup might be expensive.

    - **Maintaining data consistency** among replicas is hard.


    Replication can be achieved by using two methods. One is the **state transfer**,
    where a state is sent from one node to another replica. The other approach is
    **state machine replication**. Each replica is a state machine that runs commands
    deterministically in the same sequence as other replicas, resulting in a consistent
    state across replicas. Usually, in this case, a primary server receives the commands,
    which then broadcasts them to other replicas that apply those commands.


    There are two common techniques for achieving replication. We define them as follows.


    ## Active Replication


    In this scheme, the client commands are ordered via an ordering protocol and forwarded
    to replicas that execute those commands deterministically. The intuition here
    is that if all commands are applied in the same order at all replicas, then each
    replica will produce the same state update. This way, all replicas can be kept
    consistent with each other. The key challenge here is to develop a scheme for
    ordering the commands and that all nodes execute the same commands in the same
    order. Also, each replica starts in the same state and is a copy of the original
    state machine. Active replication is also known as **state machine replication**.


    ## Passive Replication


    In the passive replication approach, there is one replica that is designated as
    primary. This primary replica is responsible for executing the commands and sending
    (broadcast) the updates to each replica, including itself. All replicas then apply
    the state update in the order received. Unlike active replication, the processing
    is not required to be deterministic, and any anomalies are usually resolved by
    the designated primary replica and produce deterministic state updates. This approach
    is also called **primary backup replication**. In short, there is only a single
    copy of the state machine in the system kept by the primary replica, and the rest
    of the replicas only maintain the state.'
