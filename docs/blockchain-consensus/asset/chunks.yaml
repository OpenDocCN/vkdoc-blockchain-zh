  trans: '

    # 背景


    分布式共识一直是分布式系统中的基本问题。同样，在区块链中，它在确保区块链完整性方面也发挥着关键作用。在过去近 45 年的分布式共识研究中，主要涌现出两大类算法：


    1.  基于领导者的传统分布式共识（或称许可型共识）

    2.  中本聪及后中本聪共识（或称非许可型共识）


    基于领导者的协议基于投票原则运作，即分布式系统中的节点通过投票来执行某项操作。这类协议通常是确定性的，自 20 世纪 70 年代以来便一直在研究中。一些此类协议包括`Paxos`、`PBFT`和`RAFT`。另一类不同的协议于
    2008 年随比特币问世而出现，它依赖于工作量证明这类密码学难题。这类协议是概率性的，参与者通过解决工作量证明来赢得向区块链追加新区块的权利。


    通常，在区块链世界中，会使用拜占庭容错协议，这主要是因为区块链预计要在公开环境或联盟环境中运行，而恶意攻击在这些环境中是真实存在的。在参与者身份已知的联盟链上，情况或许没那么严重，但由于在这些平台上运行的企业应用的性质，最好还是考虑采用拜占庭容错模型。与金融、医疗、电子政务以及许多其他用例相关的应用都运行在联盟链上；因此，有必要确保能够抵御包括主动攻击者在内的任意故障。


    这两种方法各有利弊。与工作量证明类算法相比，传统的 BFT 协议或其区块链变体能够提供更强的一致性，而工作量证明类算法只能提供最终一致性。然而，与传统的 BFT
    协议相比，工作量证明共识的可扩展性要高得多。表 5-1 对 BFT 与 PoW 共识进行了比较。


    **表 5-1** 传统 BFT 与中本聪共识对比


    | 属性 | 传统 BFT | 中本聪 |

    | --- | --- | --- |

    | 一致性 | 确定性 | 最终性 |

    | 终止性 | 确定性 | 概率性 |

    | 能源消耗 | 低 | 非常高 |

    | 女巫攻击抵抗性 | 否 | 是 |

    | 最终性 | 即时 | 概率性 |

    | 一致性 | 更强 | 较弱（最终一致性） |

    | 通信模式 | 广播 | 流行病式传播 |

    | 吞吐量（TPS） | 更高 | 低 |

    | 可扩展性 | 较低（10–100 个节点） | 较高（数千个节点） |

    | 分叉 | 无 | 可能发生 |

    | 身份 | 已知 | 匿名（假名） |

    | 网络 | 点对点 | 点对点 |

    | 顺序 | 时序性 | 时序性 |

    | 形式化严谨性（正确性证明等） | 是 | 基本不存在 |

    | 容错能力 | 1/3，<=33% | <=25% 算力 / >50% 算力 |

    | 客户端数量 | 多 | 多 |


    另一个需要牢记的要点是广播问题与共识问题之间的区别。**共识（Consensus）** 是一个决策问题，而**广播（Broadcast）** 是一个交付问题。两者的属性相同，但定义略有差异。这些属性包括一致性（Agreement）、有效性（Validity）、完整性（Integrity）和终止性（Termination）。本质上，广播和共识是相互关联且深度耦合的问题，因为可以通过一个来实现另一个。


    我们将更多地关注共识问题而非广播问题。


    # 区块链共识


    区块链共识协议是一种机制，它允许区块链系统中的参与者即使在存在故障的情况下也能就交易序列达成一致。换句话说，共识算法确保即使某些参与方发生故障，所有参与方也能就单一的事实来源达成一致。


    与区块链共识相关的一些属性。这些属性与标准分布式共识几乎相同，但略有变化。


    标准上来说，存在安全性和活跃性属性。安全性和活跃性属性会根据区块链的类型而改变。首先，我们为许可型/联盟链定义安全性和活跃性属性，然后为公有链定义。


    ## 传统 BFT


    我们可以为传统 BFT 共识定义若干属性，这些属性通常用于许可型区块链中。存在多种变体，例如，区块链中使用的`Tendermint`。我们在第 3 章中详细介绍了传统
    BFT；然而，在本节中，我们将在区块链（特别是许可型区块链）的背景下重新定义它。大多数属性与公共非许可型共识保持一致；然而，关键区别在于确定性与概率性的终止性和一致性。


    ### 一致性


    没有两个诚实的进程会决定不同的区块。换句话说，没有两个诚实的进程会在相同高度提交不同的区块。


    ### 有效性


    如果一个诚实的进程决定了一个区块 `b`，那么 `b` 必须满足特定于应用的有效性谓词 `valid()`。此外，达成一致的区块 `b` 必须是由某个诚实节点提议的。


    ### 终止性


    每个诚实的进程最终都会做出决定。在全局稳定时间之后，每个诚实的进程会持续提交区块。


    一致性和有效性是安全性属性，而终止性是活跃性属性。


    ### 完整性


    在一个共识轮次中，一个进程最多只能决定一次。


    其他属性可能包括以下内容。


    #### 链式进展（活跃性）


    区块链必须在 GST 之后通过不断追加新区块来保持增长。


    #### 即时不可撤销性


    一旦交易被纳入区块并且该区块被最终确定，该交易就无法被移除。


    #### 共识最终性


    最终性是确定性的且即时的。交易一旦被纳入区块即为最终确定，区块一旦被追加到区块链上即为最终确定。


    尽管现在有许多区块链共识算法，但中本聪共识是首个随比特币引入的区块链协议，它具有若干新颖的特性。实际上，它并非具有确定性属性的经典拜占庭算法；相反，它具有概率性特征。


    ## 中本聪共识


    中本聪共识（或称 PoW 共识）可以通过若干属性来刻画。它通常用于公有区块链中，例如比特币。


    ### 一致性


    最终，没有两个诚实的进程会决定不同的区块。


    ### 有效性


    如果一个诚实的进程决定了一个区块 `b`，那么 `b` 必须满足特定于应用的有效性谓词 `valid()`。此外，区块内的交易必须满足特定于应用的有效性谓词
    `valid()`。换句话说，只有有效且正确的交易才能被纳入区块，只有正确且有效的区块才能被追加到区块链上。节点只会接受有效的交易和区块。同时，挖矿节点（矿工）也只接受有效的交易。此外，决定的值必须是由某个诚实的进程提议的。

    '
- fmt: '### Termination


    每个诚实节点最终都会做出决定。


    协定性和有效性是安全属性，而终止性是活跃性属性。


    注意


    在公有区块链网络中，经济激励通常与共识属性相关联，这样，致力于确保网络安全性和活跃性的参与者会因此获得经济上的激励。


    还记得我们在第[3](#515270_1_En_3_Chapter.xhtml)章中讨论过的随机算法，其中终止性以概率方式得到保证。随机化协议用于规避FLP不可能性。通常，终止性属性被设计为概率性的，以达成协定从而规避FLP不可能性。然而，在比特币区块链中，协定性属性被设计为概率性的，而非终止性。这里，安全属性在一定程度上被牺牲了，因为在比特币区块链中，允许暂时发生分叉，当分叉被解决时，一些先前已确定的交易会被回滚。这是由于最长链规则导致的。


    我们现在描述另外几个属性。


    ### 共识最终性


    对于两个正确的进程`p1`和`p2`，如果`p1`在其本地区块链上追加了一个区块`b`在另一个区块`b''`之前，那么没有其他正确节点会在区块`b`之前追加`b''`。


    从工作量证明区块链的角度来看，我们可以进一步提炼出一些属性。


    ### 链进展（活跃性）


    一条区块链必须通过新块持续不断地追加到其上而稳定增长，每隔`n`时间间隔追加一次。`n`可以是由协议预定义的时间间隔。


    ### 一致性/一致性


    区块链最终必须愈合分叉链，以形成一条单一的最长链。换句话说，每个人都必须看到相同的历史。


    ### 最终不可撤销性


    一笔交易被回滚的概率随着更多区块被追加到区块链上而降低。从最终用户的角度来看，这是一个至关重要的属性，因为这个属性给用户带来信心：在他们的交易成为区块的一部分并被最终确定和接受后，新加入的区块会进一步确保该交易永久且不可撤销地成为区块链的一部分。


    表[5-1](#515270_1_En_5_Chapter.xhtml#Tab1)展示了传统拜占庭容错共识与中本聪共识之间的一些关键区别。


    现在我们将注意力转向系统模型，描述这些模型是必要的，因为它们捕捉了我们对区块链共识协议运行环境所做的假设。


    ## 系统模型


    区块链共识协议假设了一个系统模型，在该模型下，它们保证安全性和活跃性属性。在此，我描述两种系统模型，它们分别普遍适用于公有链和许可链系统。


    ### 公有区块链系统模型（无许可）


    区块链是一个分布式系统，其中节点通过消息传递进行通信。在公有区块链中，广播协议通常是概率性的，其中交易（消息）通过利用八卦风格的协议进行传播。


    通常，网络模型是异步的，因为处理器延迟或通信延迟没有上限，尤其是因为公有区块链系统很可能是异构且地理上分散的。节点彼此不认识，也不知道系统中总共有多少个节点。节点可以任意加入和离开网络。任何人只需在网络上运行协议软件即可加入。


    ### 联盟区块链系统模型（许可）


    在此模型中，区块链节点通过消息传递进行通信。在共识协议中，广播协议通常是一对所有的通信。例如，在PBFT中，领导者将其提议一次性广播给所有副本，而不是像我们在八卦传播中看到的那样，先将消息发送给少数节点，再由这些节点发送给其他节点。此外，网络模型是部分同步的。更准确地说，区块链共识协议在最终同步模型下建模，在该模型中，经过一个未知的全局稳定时间（GST）后，系统保证能够取得进展。


    现在，让我们将注意力转向第一个区块链共识协议，并探索其工作原理：工作量证明协议，即中本聪共识。'
  raw: '#### Termination


    Every honest process eventually decides.


    Agreement and validity are safety properties, whereas termination is a liveness
    property.


    Note


    In public blockchain networks, an economic incentive is usually associated with
    the consensus properties so that participants who are working toward ensuring
    the safety and liveness of the network are economically incentivized to do so.


    Remember we discussed randomized algorithms earlier in Chapter [3](#515270_1_En_3_Chapter.xhtml),
    where termination is guaranteed probabilistically. Randomized protocols are used
    to circumvent FLP impossibility. Usually, the termination property is made probabilistic
    to achieve an agreement to circumvent FLP impossibility. However, with the Bitcoin
    blockchain, the agreement property is made probabilistic instead of termination.
    Here, the safety property is somewhat sacrificed because in the Bitcoin blockchain,
    it is allowed that temporarily a fork can occur, and when the fork is resolved,
    some previously finalized transactions are rolled back. This is due to the longest
    chain rule.


    There are a few other properties which we describe now.


    #### Consensus Finality


    With two correct processes p1 and p2, if p1 appends a block b to its local blockchain
    before another block b’, then no other correct node appends b’ before b.


    For a proof of work blockchain point of view, we can further carve out some properties.


    #### Chain Progress (Liveness)


    A blockchain must keep growing steadily by new blocks continuously being appended
    to it every n interval. N can be a predefined time interval defined by the protocol.


    #### Consistent/Consistency


    The blockchain must eventually heal a forked chain to arrive at a single longest
    chain. In other words, everyone must see the same history.


    #### Eventual Irrevocability


    The probability of a transaction being rolled back decreases with more blocks
    appended to the blockchain. This is a crucial property from end users’ point of
    view as this property gives confidence to the users that after their transaction
    has been made part of a block and it’s been finalized and accepted, then new blocks
    being added to the blockchain further ensure that the transaction is permanently
    and irrevocably part of the blockchain.


    Table [5-1](#515270_1_En_5_Chapter.xhtml#Tab1) shows some key differences between
    traditional BFT and Nakamoto consensus.


    Now we turn our attention to system models, which are necessary to describe as
    they capture the assumption that we make about the environment in which blockchain
    consensus protocols will operate.


    ## System Model


    Blockchain consensus protocols assume a system model under which they guarantee
    the safety and liveness properties. Here, I describe two system models, which
    are generally applicable to public and permissioned blockchain systems, respectively.


    ### Public Blockchain System Model (Permissionless)


    A blockchain is a distributed system where nodes communicate via message passing.
    The broadcast protocol is usually probabilistic in the case of a public blockchain
    where transactions (messages) are disseminated by utilizing a gossip-style protocol.


    Usually, the network model is asynchronous as there is no bound on the processor
    delay or communication delay, especially because a public blockchain system is
    most likely to be heterogenous and geographically dispersed. Nodes do not know
    each other, nor do they know how many total nodes are there in the system. Nodes
    can arbitrarily join and drop off the network. Anyone can join by simply running
    the protocol software on the network.


    ### Consortium Blockchain System Model (Permissioned)


    In this model, blockchain nodes communicate via message passing. A broadcast protocol
    is usually a one-to-all communication within the consensus protocol. For example,
    in PBFT the leader broadcasts its proposal in one go to all replicas, instead
    of sending it to a few, and then those other nodes send it to other nodes, as
    we saw in gossip dissemination. Moreover, the network model is partially synchronous.
    More precisely, blockchain consensus protocols are modelled under an eventually
    synchronous model where after an unknown GST the system is guaranteed to make
    progress.


    Now let’s turn our attention to the first blockchain consensus protocol and explore
    how it works: the proof of work protocol or Nakamoto consensus.'
