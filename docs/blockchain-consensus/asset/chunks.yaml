  trans: "\n### 地址与账户\n\n在比特币中，用户通过账户来表示。比特币地址的生成过程如图 4-8 所示。\n\n![](img/515270_1_En_4_Fig8_HTML.jpg)\n\
    \n该流程图展示了比特币地址的生成过程，从 ECDSA 私钥开始，以比特币地址结束。\n\n**图 4-8** 比特币地址生成\n\n1. 第一步，我们有一个随机生成的\
    \ ECDSA 私钥。\n2. 从 ECDSA 私钥派生出公钥。\n3. 使用`SHA-256`加密哈希函数对公钥进行哈希运算。\n4. 对步骤 3 生成的哈希值，使用`RIPEMD-160`哈希函数进行再次哈希。\n\
    5. 将版本号添加到步骤 4 生成的`RIPEMD-160`哈希值之前。\n6. 使用`SHA-256`加密哈希函数对步骤 5 产生的结果进行哈希运算。\n\
    7. 再次应用`SHA-256`算法。\n8. 步骤 7 产生的结果的前 4 个字节即为地址校验和。\n9. 将该校验和附加到步骤 4 生成的`RIPEMD-160`哈希值之后。\n\
    10. 对得到的字节串应用 Base58 编码函数，将其编码为 Base58 格式的字符串。\n11. 最终结果即是一个典型的比特币地址。\n\n### 交易与\
    \ UTXO 模型\n\n交易是比特币中的基本操作单元。每笔交易至少包含一个输入和一个输出。未花费的交易输出（`UTXO`）是比特币交易的基本单位。交易输入引用的是之前交易的`UTXO`。交易输出则代表了未花费值的所有权转移。一个账户在比特币中的余额，等于该账户拥有的所有未花费输出的总和。因此，`UTXO`必须始终保持输入与输出相等。\n\
    \n一笔比特币交易会消耗输入，并创建具有指定值的输出。每个输入都是之前某个交易的输出。这种交易模型如图 4-9 所示。\n\n![](img/515270_1_En_4_Fig9_HTML.png)\n\
    \n一个展示比特币交易`UTXO`模型的流程图。流程包括：10 BTC，交易`t`，5 和 2 BTC，交易`t+1`以及未花费交易输出。\n\n**图 4-9**\
    \ 比特币交易`UTXO`模型\n\n比特币交易的生命周期描述如下：\n\n- 用户创建一笔交易。\n- 拥有者使用私钥对交易进行签名。\n- 通过八卦协议将交易广播到网络。\n\
    - 所有节点验证交易并将其放入各自的交易池。\n- 矿工节点将这些交易打包成一个候选区块。\n- 挖矿开始，其中一个成功解决工作量证明问题的矿工获得宣布其区块的权利，并赚取比特币作为奖励。\n\
    - 一旦该区块被广播到网络，它便会传播至整个比特币网络。\n- 经过六次确认（六个区块）后，该笔交易被视为不可撤销的最终状态；不过，在第一次确认之后也可以接受交易。\n\
    \n一个交易由多个字段组成。表 4-1 显示了所有字段及其描述。\n\n**表 4-1** 比特币交易结构\n\n| 字段 | 描述 | 大小 |\n| ---\
    \ | --- | --- |\n| 版本号 | 当前为 1 | 4 字节 |\n| 标志 | 见证数据指示器 | 可选的 2 字节数组 |\n| 输入计数器\
    \ | 输入的数量 | 1–9 字节 |\n| 输入列表 | 输入 | 多个输入 |\n| 输出计数器 | 输出的数量 | 1–9 字节 |\n| 输出列表\
    \ | 输出列表 | 多个输出 |\n| 见证数据 | 见证数据列表 | 可变 |\n| 锁定时间 | 交易待处理的区块高度或时间戳 | 4 字节 |\n\n\
    交易分为两种类型。链上交易是比特币网络的原生交易，而链下交易则在区块链网络之外进行。链上交易发生在区块链网络上，由网络参与者进行链上验证；而链下交易则使用支付通道或侧链来执行交易。链上交易速度较慢，存在隐私问题，且可扩展性不佳。链下机制旨在解决这些问题。一个典型的例子是比特币闪电网络，它提供了更快速的支付。\n\
    \n### 比特币脚本与 Miniscript\n\n比特币脚本是一种非图灵完备的、基于堆栈的语言，用于描述比特币应该如何被转移。脚本在 LIFO（后进先出）堆栈中从左到右进行求值。脚本由元素和操作两部分组成，如图\
    \ 4-10 所示。元素代表数据，例如数字签名；操作则是脚本执行的动作。操作被编码为操作码。操作码包括流程控制、堆栈操作、按位逻辑运算、算术运算、密码学操作和锁定时间等操作类别。\n\
    \n一些常见的操作码列举如下：\n\n- `OP_CHECKSIG`：接受一个签名和一个公钥，验证交易的 ECDSA 签名。如果正确，则返回 1，否则返回\
    \ 0。\n- `OP_DUP`：取出堆栈顶部的项并复制它。\n- `OP_HASH160`：计算输入的 SHA-256 哈希，然后计算 RIPEMD-160\
    \ 位哈希。\n- `OP_EQUAL`：检查堆栈顶部两项是否相等。若相等，则在堆栈上输出`TRUE`，否则输出`FALSE`。\n- `OP_VERIFY`：检查堆栈顶部的项是否为假；如果是，则脚本终止并输出失败。\n\
    - `OP_EQUALVERIFY`：先运行`OP_EQUAL`，然后运行`OP_VERIFY`。\n- `OP_RETURN`：终止脚本，输出失败，并将该交易标记为无效。\n\
    - `OP_ADD`：接受两个输入并执行求和操作。\n\n脚本由一个称为`ScriptPubKey`的锁定脚本和一个称为`ScriptSig`的解锁脚本组合而成，如图\
    \ 4-10 所示。输出由`ScriptPubKey`锁定，其中包含了输出的解锁条件。换句话说，锁定意味着将比特币给予某人，而解锁意味着消费收到的比特币。\n\
    \n![](img/515270_1_En_4_Fig10_HTML.jpg)\n\n这幅比特币脚本示意图被分为两部分：标记为`ScriptSig`的“消费比特币”部分和标记为`ScriptPubKey`的“发送比特币”部分。\n\
    \n**图 4-10** 比特币脚本（解锁 + 锁定）示意图\n\n比特币中有几种类型的脚本。最常见的是支付到公钥哈希（P2PKH），用于向比特币地址发送交易。该脚本的格式如下所示：\n\
    \n```\nScriptPubKey: OP_DUP OP_HASH160  OP_EQUALVERIFY OP_CHECKSIG\nScriptSig:\
    \  \n```\n\n`ScriptPubKey`和`ScriptSig`会被组合起来并执行，如图 4-11 所示。\n\n![](img/515270_1_En_4_Fig11_HTML.jpg)\n\
    \n一个关于比特币 P2PKH 脚本执行的表格包含两列，分别为`ScriptSig`和`ScriptPubKey`，以及三行，分别为脚本、堆栈和执行。\n\n\
    **图 4-11** 比特币 P2PKH 脚本执行\n\n虽然比特币脚本是传输支付的原始方法，并且运行良好，但它的灵活性不高。有一种为比特币开发的语言支持智能合约的开发，该语言被称为`Ivy`。一种使编写脚本更简单、更有条理的解决方案是比特币`miniscript`。\n"
- fmt: '# Blocks and Blockchain


    A blockchain is composed of blocks. Blocks are composed of a block header and
    transactions. A block header consists of several fields. The first block in the
    Bitcoin blockchain is called the genesis block, which doesn’t link back to any
    block, being the first block. It is usually hardcoded in the software clients.


    We can see a complete visualization of blocks, block headers, transactions, and
    scripts in Figure [4-12](#515270_1_En_4_Chapter.xhtml#Fig12).


    ![](images/515270_1_En_4_Chapter/515270_1_En_4_Fig12_HTML.jpg)


    A flowchart of the bitcoin blockchain. The flow is script pub key, script sig,
    input, transaction, Merkle root, header, block 2, and block 1.


    Figure 4-12


    A visualization of a Bitcoin blockchain, blocks, block headers, transactions,
    and scripts


    The FLM^([³](#fn3)) impossibility states that Byzantine consensus is not possible
    if an adversary can control more than ![$$ \frac{n}{3} $$](images/515270_1_En_4_Chapter/515270_1_En_4_Chapter_TeX_IEq1.png)
    nodes. In the case of the PKI setup, this lower bound does not hold. It turns
    out that Bitcoin circumvents FLM impossibility. In proof of work environments,
    a Byzantine agreement is possible without the PKI ^([⁴](#fn4))setup.


    ## Mining


    Mining is the process by which new coins are added to the Bitcoin blockchain.
    This process secures the network and incentivizes the users who spend resources
    to protect the network. More details on the specifics are in Chapter [5](#515270_1_En_5_Chapter.xhtml);
    however, now I will touch upon the mining hardware. When Bitcoin was introduced,
    it was easy to mine with CPUs, which quickly increased the difficulty, leading
    to miners using GPUs. Shortly after the successful adoption of GPUs, FPGAs emerged
    as a mechanism to further speed up SHA-256 hashing. Soon, these were outperformed
    by ASICs, and now ASICs are a prevalent mechanism to mine Bitcoin. However, solo
    mining where individual users use mining hardware to mine is also not much profitable
    due to exorbitant mining difficulty. Instead, mining farms comprising thousands
    of ASICs are commonly used now. Also, mining pools are common where multiple users
    collectively solve the hash puzzle to earn rewards proportionate to their contribution.


    ## Bitcoin As a Platform


    Other than electronic cash, Bitcoin as a platform can be used for several use
    cases. For example, it can be used as a timestamping service or a general ledger
    to store some information permanently. In addition, we can use the `OP_RETURN`
    instruction to store data, which can store up to 80 bytes of arbitrary data. Other
    use cases such as smart property, smart assets, and blocks as a source of randomness
    also transpired.


    The desire to use Bitcoin for different purposes also resulted in techniques to
    enhance Bitcoin, resulting in colored coins, rootstock, Omni layer, and counterparty
    projects. While Bitcoin did what it intended to do and a lot more in the form
    of innovations mentioned earlier, the fundamental limitation in Bitcoin protocols
    meant that all flexible new protocols would have to be built on top of Bitcoin.
    There is no inherent flexibility in Bitcoin to perform all these different tasks.
    Therefore, there was a need felt to do more than just cryptocurrency on Blockchain.
    This ambition motivated the invention of Ethereum, the first general-purpose blockchain
    platform that supported smart contracts.


    # Ethereum


    Ethereum was introduced in 2014 in a whitepaper by Vitalik Buterin. Ethereum introduced
    a platform on which users can run arbitrary code in the form of smart contracts.
    To thwart the denial-of-service attacks caused by infinite loops in code, the
    concept of metered execution was also introduced. Metered executions require that
    for every operation performed on the blockchain, a fee is charged, which is paid
    in Ether, the native currency of the Ethereum blockchain. With smart contracts,
    Ethereum opened a whole new world of generic platforms where the operations are
    no longer limited to only bitcoin-style value transfer transactions, but users
    can execute any type of diverse business logic on-chain due to Ethereum’s Turing
    complete design. Ethereum is currently the most used blockchain platform for smart
    contracts.


    Today’s Internet is centralized, which is dominated by large companies. The Internet
    that we use today is called Web 2. Ethereum is developed with the vision of Web3,
    where anyone can participate in the network without any reliance on a third party.
    In the Web 2 model, big service providers currently provide services in return
    for personal data; however, in Web3, anyone can participate without giving up
    their personal information in exchange for services. However, with decentralized
    applications (DApps), anyone can provide any service which any user on the network
    can use, and no one can block your access to the service.


    ## Ethereum Network


    An Ethereum network is composed of loosely coupled nodes which exchange messages
    via a gossip protocol.


    A high-level visualization of the Ethereum network is shown in Figure [4-13](#515270_1_En_4_Chapter.xhtml#Fig13).


    ![](images/515270_1_En_4_Chapter/515270_1_En_4_Fig13_HTML.jpg)


    A flowchart of the Ethereum network starts with Ethereum client, smart contract
    developers, D app, and wallet users and ends at other Ethereum clients.


    Figure 4-13


    Ethereum network high-level overview


    Nodes run client software which is an implementation of the Ethereum blockchain
    protocol described in the yellow paper to enable any user to participate on the
    network. A node is composed of different components, as shown in Figure [4-14](#515270_1_En_4_Chapter.xhtml#Fig14).


    ![](images/515270_1_En_4_Chapter/515270_1_En_4_Fig14_HTML.jpg)


    A structure chart has R P C, peer discovery, E V M, blocks, memory pool, P o W,
    validator, state and storage, cryptography, and networking.


    Figure 4-14


    Ethereum node architecture


    There are three main types of nodes in the Ethereum network:


    *   Full node

    *   Light node

    *   Archive node


    Full nodes store the entire chain data and validate blocks, transactions, and
    states. Light nodes only store the block headers and verify the data against state
    roots present in the block headers. Light nodes are suitable for resource-constrained
    devices, such as mobile devices. Archive nodes include everything that is in a
    full node but also builds an archive of historical states. Miner nodes are a full
    node but also perform mining operation and participate in proof of work consensus.


    A new Ethereum node joining the network uses hardcoded bootstrap nodes as an initial
    entry point into the network from where the further discovery of other nodes begins.


    `RLPx` is a TCP-based transport protocol. It enables secure communication between
    Ethereum nodes by using the Elliptic Curve Integrated Encryption Scheme (ECIES)
    for handshaking and key exchange.


    `DEVP2P` or the wire protocol negotiates an application session between two Ethereum
    nodes that have been discovered and have established a secure channel using `RLPx`.


    After discovering and establishing a secure transport channel and negotiating
    an application session, the nodes exchange messages using “capability protocols,”
    for example, `eth` (versions 62, 63, and 64), Light Ethereum Subprotocol (LES),
    Whisper, and Swarm. These capability protocols or application subprotocols enable
    different application-level communications, for example, `eth` for block synchronization.


    The node discovery protocol and other relevant protocols are shown in Figure [4-15](#515270_1_En_4_Chapter.xhtml#Fig15).


    ![](images/515270_1_En_4_Chapter/515270_1_En_4_Fig15_HTML.png)


    A chart has four columns labeled discovery protocol- disc V 4, R L P x, Dev P
    2 P-wire protocol, and sub-protocol such as E t h capability protocol.


    Figure 4-15


    Node discovery and other protocols'
