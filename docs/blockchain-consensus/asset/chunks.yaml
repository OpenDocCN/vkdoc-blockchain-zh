    \ organization that wants to join a consortium network must either use the software\
    \ client specific to that blockchain or somehow devise a complex interoperability\
    \ mechanism. This problem is well understood, and a lot of work is underway regarding\
    \ novel interoperability protocols. Also, new types of blockchains, such as **heterogeneous\
    \ multichains** and sharding-based approaches, are emerging. One prime example\
    \ is Polkadot, a replicated sharded state machine where heterogenous chains can\
    \ talk to each other through a so-called relay chain. Another effort is Ethereum\
    \ 2.0, where sharded chains serve as a mechanism to provide scalability and cross-shard\
    \ interoperability. Cardano is another blockchain that is on course to provide\
    \ scalability and interoperability between chains. With all these platforms and\
    \ the pace of the work in progress to realize these ideas, we can envisage that\
    \ in the next eight to ten years, these blockchains and others will be running\
    \ just like we have the Internet today with seamless data sharing between different\
    \ chains. The chains that facilitate such a level of natural interoperability,\
    \ giving rise to an ecosystem of multiple interoperating, general-purpose enterprise\
    \ chains and ASBCs, are called **heterogeneous multichains**.\n\nNow let’s clarify\
    \ an ambiguity. You might have heard the term “distributed ledger,” which is sometimes\
    \ used to represent a blockchain. While both terms, blockchain and distributed\
    \ ledger, are used interchangeably, there’s a difference. The distributed ledger\
    \ is an overarching term describing a ledger with distributed properties. Blockchains\
    \ fall under this umbrella. A blockchain is a distributed ledger, but not all\
    \ distributed ledgers are a blockchain. For example, some distributed ledgers\
    \ do not use blocks composed of transactions in their blockchain construction.\
    \ Instead, they treat transaction records individually and store them as such.\
    \ Usually, however, in most distributed ledgers, blocks are used as containers\
    \ for a batch of transactions and several other elements such as block header,\
    \ which also contains several components. Such use of blocks to bundle transactions\
    \ makes them a blockchain.\n\n## Blockchain Is a Distributed System\n\nA blockchain\
    \ is a distributed system. As such, it should be defined and reasoned about in\
    \ the light of distributed computing. Furthermore, this formal description allows\
    \ for better reasoning.\n\nWe discussed the CAP theorem in Chapter [1](#515270_1_En_1_Chapter.xhtml).\
    \ Therefore, we can analyze the blockchain through the CAP theorem to ascertain\
    \ what type of system it is.\n\n### CAP and Permissionless Blockchain\n\nPermissionless\
    \ blockchains are AP (availability and partition tolerance) blockchains because\
    \ consistency is somewhat sacrificed in favor of availability. We could argue\
    \ that eventual consistency is achieved, but as consistency (agreement) is sacrificed\
    \ in favor of availability, we can say that permissionless or public blockchains\
    \ are AP systems. For example, Ethereum and Bitcoin are AP systems. This is the\
    \ case due to the proof of work (PoW) type of probabilistic consensus.\n\n###\
    \ CAP and Permissioned Blockchain\n\nPermissioned blockchains are CP (consistency\
    \ and partition tolerance) systems because availability is sacrificed in favor\
    \ of consistency. This is the case because almost all permissioned blockchains\
    \ use traditional BFT protocols, where if a threshold of nodes is faulty, then\
    \ the whole system stalls until the faults are resolved, and then the system continues\
    \ to operate. For example, in a five-node network, if three nodes go down, the\
    \ system doesn’t progress unless the other nodes come back online. Similarly,\
    \ in the case of partitioning between subsets of two and three nodes, the system\
    \ doesn’t make progress unless the partition heals. This is the case due to the\
    \ use of traditional BFT algorithms, such as PBFT. The requests coming from the\
    \ clients are processed only if there’s a majority of honest nodes. In other words,\
    \ if the system falls below 3f+1 in the case of Byzantine fault tolerance, the\
    \ system immediately degrades to nonfunctional.\n\nWe can visualize both these\
    \ concepts in Figure [4-2](#515270_1_En_4_Chapter.xhtml#Fig2).\n\n![](images/515270_1_En_4_Chapter/515270_1_En_4_Fig2_HTML.png)\n\
    \nA triangle is labeled consistency C, partition-tolerance P, and availability\
    \ A on its vertices and C P between C and P and A P between A and P.\n\nFigure\
    \ 4-2\n\nCAP theorem and blockchain\n\nNext, we describe blockchain ledger abstraction\
    \ which is an abstract view of a blockchain."
  trans: "\n# 区块链的类型\n\n区块链有多种类型。比特币引入的原始区块链是一种公有链：\n\n* 公有链或无需许可链\n* 需许可链\n  * 私有链\n\
    * 联盟链或企业级区块链\n* 特定应用区块链\n* 异构多链\n\n**公有链**，顾名思义，是一种**无需许可的区块链**。参与网络没有任何限制。只需要下载一个软件客户端并运行，即可成为网络的一部分。通常，这类区块链用于加密货币，例如比特币和以太坊。\n\
    \n**需许可链**有两种类型。**私有链**仅由单个组织控制，通常在一个组织内部运行。另一方面，**联盟链**或**企业级区块链**是一种需许可链，多个组织共同参与区块链的治理。企业通常使用联盟链来处理特定的企业用例。\n\
    \n我们还可以进一步对链进行分类，这些链可能由利益相关方仅为单一目的而开发。我们可以称其为**特定应用区块链**。例如，仅为单一类型的加密货币而开发的区块链。从某种意义上说，比特币就是一种特定应用区块链，只有一种应用——比特币加密货币。类似地，假设某个组织为特定目的（如审计功能）运行一条私有链，那么它也可以归类为特定应用区块链，因为它仅是为单一特定目的而开发的。\n\
    \n然而，在实践中，区块链作为一个通用平台，能够保证记录的一致性、安全性、防篡改性和有序性，使其适用于各种各样的应用。此外，根据设计的不同，单一区块链上可以运行多个应用程序。例如，以太坊可以运行名为智能合约的不同程序，使其成为一个通用区块链平台。为单一特定用例开发的区块链可以称为特定应用区块链，简写为\
    \ `ASBC`。\n\n区块链也是共享数据平台，多个组织可以以防篡改的方式共享数据，确保数据完整性。然而，如果只有一种标准区块链，这种共享是可以实现的，但自以太坊问世以来，出现了许多不同的区块链。这种多样性导致了一个问题：一条区块链运行着不同的协议，无法与另一条区块链共享数据。这种脱节导致每条区块链都是一个孤岛。为了解决这个问题，希望加入联盟网络的组织必须使用该区块链特定的软件客户端，或以某种方式设计复杂的互操作性机制。这个问题已被充分认识，关于新型互操作性协议的大量工作正在进行中。同时，新型区块链，如**异构多链**和基于分片的方法，也正在涌现。一个典型的例子是\
    \ Polkadot，这是一个可复制的分片状态机，异构链可以通过所谓的中继链相互通信。另一个努力是以太坊 2.0，其中分片链作为提供可扩展性和跨分片互操作性的机制。Cardano\
    \ 是另一条旨在提供链间可扩展性和互操作性的区块链。鉴于所有这些平台以及实现这些想法的工作进展速度，我们可以预见，在未来八到十年内，这些区块链和其他区块链将像今天的互联网一样运行，实现不同链之间数据的无缝共享。能够促进这种自然互操作性水平，从而催生一个由多个可互操作的通用企业链和\
    \ `ASBC` 组成的生态系统的链，被称为**异构多链**。\n\n现在，让我们澄清一个歧义。你可能听说过“分布式账本”这个术语，有时它被用来指代区块链。虽然区块链和分布式账本这两个术语可以互换使用，但它们之间存在区别。分布式账本是一个总括性术语，用于描述具有分布式特性的账本。区块链属于这个范畴。区块链是一种分布式账本，但并非所有分布式账本都是区块链。例如，一些分布式账本在其区块链构建中并不使用由交易组成的区块。相反，它们单独处理交易记录并以此方式存储。然而，在大多数分布式账本中，区块通常被用作一批交易以及其他几个元素（如包含多个组成部分的区块头）的容器。这种使用区块来打包交易的方式使它们成为区块链。\n\
    \n## 区块链是一种分布式系统\n\n区块链是一种分布式系统。因此，它应当根据分布式计算的原则来定义和推理。此外，这种形式化描述有助于更好地进行推理。\n\
    \n我们在第 1 章讨论了 `CAP` 定理。因此，我们可以通过 `CAP` 定理来分析区块链，以确定它属于哪种类型的系统。\n\n### CAP 与无需许可区块链\n\
    \n无需许可区块链是 `AP`（可用性和分区容忍性）区块链，因为为了可用性而在一定程度上牺牲了一致性。我们可以说最终一致性得以实现，但由于为了可用性而牺牲了一致性（共识），我们可以说无需许可链或公有链是\
    \ `AP` 系统。例如，以太坊和比特币就是 `AP` 系统。这是由于采用工作量证明（PoW）这类概率性共识机制所致。\n\n### CAP 与需许可区块链\n\
    \n需许可区块链是 `CP`（一致性和分区容忍性）系统，因为为了一致性而牺牲了可用性。这是因为几乎所有需许可链都使用传统的 `BFT` 协议，在这种协议中，如果节点故障达到一定阈值，整个系统就会停滞，直到故障解决，然后系统才继续运行。例如，在一个五节点网络中，如果三个节点宕机，系统将无法继续处理，除非其他节点重新上线。同样，在节点子集（如两个节点和三个节点）之间出现分区的情况下，系统也无法继续处理，除非分区愈合。这是由于使用了传统的\
    \ `BFT` 算法，如 `PBFT`。只有当存在多数诚实节点时，来自客户端的请求才会被处理。换句话说，就拜占庭容错而言，如果系统低于 `3f+1`，系统会立即降级至失效状态。\n\
    \n我们可以在图 4-2 中直观地看到这两个概念。\n\n![](img/515270_1_En_4_Fig2_HTML.png)\n\n一个三角形的顶点分别标记为一致性\
    \ `C`、分区容忍性 `P` 和可用性 `A`，在 `C` 和 `P` 之间标记为 `C P`，在 `A` 和 `P` 之间标记为 `A P`。\n\n\
    **图 4-2** CAP 定理与区块链\n\n接下来，我们描述区块链账本抽象，这是对区块链的一种抽象视图。\n"
- fmt: "### Blockchain Ledger Abstraction\n\nBlockchain abstraction, or sometimes\
    \ called ledger abstraction, can be defined with the help of operations it can\
    \ perform and several properties.\n\nThere are at a high level three operations\
    \ that processes in a blockchain network can perform: `Get()`, `append()`, `verify()`.\n\
    \nWhen `get()` is invoked, it returns a copy of the current canonical state of\
    \ the blockchain (ledger).  \nWhen `append()` is invoked, it creates and appends\
    \ a new record *r* to the blockchain.  \nWhen `verify()` is invoked, it verifies\
    \ and returns the validity status of the record *r* or blockchain *b*.\n\n####\
    \ Properties\n\nThere are several properties associated with a blockchain, which\
    \ are described as follows.\n\n##### Consistency\n\n- All replicas hold the same\
    \ up-to-date copy of the data. In the case of public blockchains, it is usually\
    \ eventual consistency, and in the case of permissioned blockchains, it is strong\
    \ consistency.\n- Formally, if a record `r` is seen first by a process `p` before\
    \ another record `r2`, then every honest process sees `r` before `r2`.\n\n#####\
    \ Fault Tolerant\n\n- Blockchains are fault-tolerant distributed systems. A blockchain\
    \ network can withstand Byzantine or crash faults up to a threshold.\n- In BFT-based\
    \ blockchains (usually with a PBFT variant implemented in blockchains), the lower\
    \ bound is `3F + 1`, where `F` is the number of faults.\n- In CFT-based blockchains\
    \ (usually with RAFT implementation in consortium chains), the lower bound is\
    \ `2F + 1`, where `F` is the number of faults.\n- In proof of work–based blockchains,\
    \ it is the <50% of the hash power.\n\n##### Finality\n\n- Finality occurs when\
    \ a transaction is considered irrevocable and permanent. This event can be a certain\
    \ number of blocks, a time interval, or a step (phase) in the execution of a consensus\
    \ algorithm. For example, in Bitcoin it is usually six blocks after which a transaction\
    \ is considered irrevocable, and in permissioned blockchains using BFT protocols,\
    \ the moment the transaction is committed, it is considered irrevocably final.\n\
    \n##### Immutability\n\n- Blockchains are immutable, which means that once a record\
    \ has made it to the ledger, it can never be removed.\n\n##### Append Only\n\n\
    - New records can only be appended to the blockchain. New records cannot be inserted\
    \ in between previously existing records. For example, a new block can only be\
    \ added after the last final block, not in between other blocks.\n- Formally,\
    \ if a block `b'` is inserted after a block `b`, then a new block `b\"` can only\
    \ be inserted after `b'` and not before `b'` or `b`.\n\n##### Tamper Resistant/Proof\n\
    \n- It is practically impossible to remove or rearrange finalized blocks in a\
    \ blockchain.\n- It is arguable whether a blockchain is tamper resistant or tamper-proof,\
    \ but for all practical purposes, the probability that some adversary can remove\
    \ or rearrange blocks or transactions becomes almost zero. This guarantee is good\
    \ enough for all practical purposes.\n\n##### Validity\n\n- Only valid transactions\
    \ and blocks are appended to the blockchain.\n\n##### Termination Guarantee of\
    \ Blockchain Operations: `get()`, `append()`, `verify()`\n\n- Eventually, all\
    \ the operations will terminate with a result.\n\n##### Order\n\n- If a block\
    \ `x` happens before block `y` and block `y` happens before block `z`, then block\
    \ `x` happens before block `z` and forms a transitive relationship.\n- In practice,\
    \ this is a chronologically ordered chain of blocks.\n- It is an ordered ledger.\n\
    \n##### Verifiable\n\n- All transactions and blocks in a blockchain are verifiable\
    \ and adhere to a validity predicate specific to the blockchain. Anyone can verify\
    \ the validity of a transaction.\n\nConsensus-specific properties are discussed\
    \ in more detail in Chapter [5](#515270_1_En_5_Chapter.xhtml).\n\nSome other properties\
    \ include programmability (smart contract support), encrypted ledger and anonymity\
    \ for confidentiality and user privacy, and unanimity for allowing unanimous decisions\
    \ on appending new blocks.\n\nA blockchain can also be seen as a state machine\
    \ replication protocol. A blockchain and a state machine appear to be the same;\
    \ however, there’s a subtle difference. In a state machine, only the latest state\
    \ is stored in the log, whereas in a blockchain state machine, the entire history\
    \ is stored and available when queried.\n\nBitcoin and blockchains have outpaced\
    \ the growth of the Internet. Thousands of users are using Bitcoin daily. On average,\
    \ about 200,000 transactions are processed on Bitcoin daily. On Ethereum, roughly\
    \ more than a million transactions are processed daily, and the interest is growing.\
    \ Contrary to a reasonable belief held by some, I think it is not correct to say\
    \ that the Bitcoin experiment has failed. It has accomplished what it set out\
    \ to achieve, peer-to-peer digital cash. That’s what it is and is being used as\
    \ a digital cash platform today. Bitcoin also stimulated further innovation, and\
    \ platforms like Ethereum and now the latest blockchains like Polkadot and Cardano\
    \ have emerged. With such a level of growth, in the next eight to ten years, I\
    \ believe almost all financial services will run on a blockchain, including some\
    \ central bank digital currencies.\n\n## How Blockchain Works\n\nAt times, there\
    \ are subtle differences in the way a blockchain works at a micro level; however,\
    \ at a high level all blockchains principally work the same. In the following,\
    \ I list seven key steps that show how a blockchain works:\n\n1. A transaction\
    \ occurs between two or more users.\n2. The transaction is broadcast to the network.\n\
    3. The transaction is validated and added to the transaction pools.\n4. A proposed\
    \ block is created by adding transactions to it by miners.\n5. Miners race to\
    \ solve the proof of work to win the right to insert their block into the blockchain,\
    \ or a consensus mechanism runs to agree on the transactions. Usually, miners\
    \ run a proof of work type of consensus mechanism to win the right to add a block.\
    \ In consortium or private chains, usually a variant of traditional Byzantine\
    \ or crash fault–tolerant algorithm runs, which by voting achieves the agreement\
    \ on a block which is then inserted into the blockchain.\n6. If a miner wins the\
    \ right, it inserts the block in its local chain and broadcasts that block to\
    \ the network.\n7. Other nodes accept it if valid, and the process starts again.\n\
    \nThis process can be visualized in Figure [4-3](#515270_1_En_4_Chapter.xhtml#Fig3).\n\
    \n![](images/515270_1_En_4_Chapter/515270_1_En_4_Fig3_HTML.jpg)\n\n*A flow diagram\
    \ of the blockchain algorithm starts with new transaction and ends at nodes validate\
    \ and add new block.*\n\n**Figure 4-3** How a blockchain works\n\n## Anatomy of\
    \ a Blockchain\n\nA blockchain is composed of blocks, where each block is linked\
    \ to its previous block except the first genesis block. The blockchain term was\
    \ used by Satoshi Nakamoto in his Bitcoin code for the first time. Even though\
    \ now it is used as one word, in his original Bitcoin code it was written as two\
    \ separate words, “block chain.” It can be visualized as a chain of blocks, as\
    \ shown in Figure [4-4](#515270_1_En_4_Chapter.xhtml#Fig4).\n\n![](images/515270_1_En_4_Chapter/515270_1_En_4_Fig4_HTML.png)\n\
    \n*A structure chart of blockchain has three columns for genesis block, block\
    \ 1, and 2. Blocks 1 and 2 have previous block header hash.*\n\n**Figure 4-4**\
    \ Generic structure of a blockchain\n\nOther structures such as DAGs, hash graphs,\
    \ and Merkle trees are now used in some distributed ledgers instead of the usual\
    \ block-based model in modern blockchains. For example, Avalanche uses DAGs for\
    \ storage instead of a linear block-based structure. We will cover these in detail\
    \ when we discuss consensus protocols specific to these blockchains (distributed\
    \ ledgers) in Chapter [8](#515270_1_En_8_Chapter.xhtml)."
