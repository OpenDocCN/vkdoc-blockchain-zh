  trans: '

    ## 攻击者追上概率


    本节回答了这样一个问题：攻击者挖到足够区块以接管整条链的概率是多少。假设攻击者拥有部分算力，记为 `q`。商家在接收支付前等待 `z` 个确认（即 `z`
    个区块），诚实链的哈希率记为 `p`。


    攻击者追上概率 `q[z]` 可按如下公式计算：


    ![$$ {q}_z=\left\{1\ if\ p\le q\_{\left(\frac{q}{p}\right)}^z if\ p&gt;q\kern0.75em
    \right\} $$](img/515270_1_En_5_Chapter_TeX_Equh.png)


    其中


    ![$$ q=攻击者的哈希率 $$](img/515270_1_En_5_Chapter_TeX_Equi.png)


    ![$$ p=诚实节点的哈希率 $$](img/515270_1_En_5_Chapter_TeX_Equj.png)


    ![$$ z=需要追上的区块数 $$](img/515270_1_En_5_Chapter_TeX_Equk.png)


    这意味着，如果诚实节点哈希率低于攻击者哈希率，那么攻击者追上的概率为 1；如果诚实节点哈希率高于攻击者哈希率，那么追上的概率为 `(q/p)^z`。


    在下一节中，我们将正式描述工作量证明算法。


    ## PoW 算法


    我们可以将整个工作量证明算法形式化地描述如下：


    ```

    1:  nonce := 0

    2:  hashTarget := nBits

    3:  hash := null

    4:  while (true) {

    5:    SHA256(SHA256(blockheader || nonce))

    6:       if (hash ≤ hashTarget) {

    7:            append to blockchain

    8:      else

    9:            nonce := nonce + 1

    10:  }

    11: }

    ```


    在上述算法中，`nonce` 初始化为零。网络难度目标 `hashTarget` 取自候选区块头的 `nBits` 字段。`hash` 初始化为 `null`。之后运行一个无限循环，首先将区块头与
    `nonce` 拼接，并对其执行两次 `SHA-256` 运算得到 `hash`。接下来，如果生成的哈希值小于目标哈希值，则接受该区块并将其追加到区块链上；否则，`nonce`
    自增，并重复上述过程。如果未找到合适的 `nonce`，则算法尝试处理下一个区块。


    此过程可参见图 5-5。


    ![](img/515270_1_En_5_Fig5_HTML.png)


    一个包含以下流程的流程图。候选区块头，双重 SHA 256，结果哈希值，哈希目标；是则停止，否则递增。


    **图 5-5** 工作量证明


    在图 5-5 中，前一个区块哈希、交易及 `nonce` 被输入哈希函数生成一个哈希值，该哈希值与目标值进行比对。如果小于目标值，则为有效哈希，过程停止；否则
    `nonce` 递增，整个流程重复，直至生成的哈希值小于目标值时停止。


    ## 博弈论与工作量证明


    博弈论研究的是在策略性互动情境中的行为——个体最佳行动方案取决于他人的选择。博弈论模型以抽象方式模拟现实情境。博弈论在诸多领域都很有用，例如经济学、生物学、社会科学、金融学、政治学、计算机科学等。举例来说，在经济学中，企业推出的产品决策会受到竞争对手产品选择及营销策略的影响。在计算机网络中，联网计算机可能为争夺带宽等资源而竞争。纳什均衡可用于研究政治竞争。在政治领域，政治家的政策会受到对手声明和承诺的影响。


    博弈可被定义为对玩家可能采取的所有策略性行动的描述，但不描述可能的结果。


    博弈中包含以下几个要素：


    - **玩家**：博弈中具有策略理性的决策者

    - **行动**：玩家可选的一组行动

    - **收益**：玩家针对特定结果获得的报酬


    博弈代表了不同的策略情境。一些经典的博弈包括巴赫或斯特拉文斯基博弈、囚徒困境、鹰鸽博弈和猜硬币博弈。在博弈中，玩家在做决策时并不知道其他玩家的行动；这类博弈称为**同时行动博弈**。


    可以通过创建一个表格来分析博弈，该表格列出所有可能的玩家行动及收益。这个表格被称为博弈的**策略式**或**收益矩阵**。


    **纳什均衡**是博弈论中一个基础且强大的概念。在纳什均衡中，每个理性玩家都会根据其他玩家的选择来选择最佳行动方案。每个玩家都了解其他玩家的均衡策略，且任何玩家都无法通过单方面改变自身策略来获益。简而言之，任何偏离策略的行为都不会为偏离者带来任何收益。

    '
- fmt: '### Prisoner’s Dilemma


    In this simultaneous move game, two suspects of a crime are put into separate
    cells without any way to communicate. If they both confess, then they both will
    be imprisoned for three years each. If one of them confesses and acts as a witness
    against the other, then charges against him will be dropped; however, the other
    suspect will get four years in prison. If none of them confesses, then both will
    be sentenced to only one year in prison. Now you can see that if both suspects
    cooperate and don’t confess, then it results in the best outcome for both. However,
    there is a big incentive of going free for both to not cooperate and act as a
    witness against the other. This game results in gains for both if they cooperate
    and don’t confess and results in only one year in prison each. Let’s name these
    characters Alice and Bob for ease and see what possible outcomes there are in
    this game.


    There are four possible outcomes of this game:


    1. Alice does not confess, and Bob does not confess.

    2. Alice confesses, and Bob does not confess.

    3. Alice does not confess, and Bob confesses.

    4. Alice confesses, and Bob confesses.


    If Alice and Bob can somehow communicate, then they can jointly decide to not
    confess, which will result in only a one-year sentence each. However, the dominant
    strategy here is to confess rather than don’t confess.


    A **dominant strategy** is a strategy that results in the largest payoff regardless
    of the behaviors of other players in the game.


    We can represent this in a payoff matrix form as shown in Figure [5-6](#515270_1_En_5_Chapter.xhtml#Fig6).


    ![](images/515270_1_En_5_Chapter/515270_1_En_5_Fig6_HTML.png)


    A 2 by 2 matrix of prisoner''s payoff. The row and column headers are do not confess,
    confess. The entries are the points for Alice and Bob.


    Figure 5-6 Prisoner’s dilemma payoff matrix


    Alice and Bob are both aware of this matrix and know that they both have this
    matrix to choose from. Alice and Bob are players, “confess” and “don’t confess”
    are actions, and payoffs are prison sentences.


    Regardless of what Alice does or Bob does, the other player still confesses. Alice’s
    strategy is that if Bob confesses, she should confess too because a one-year prison
    sentence is better than three. If Bob does not confess, she should still confess
    because she will go free. The same strategy is employed by Bob. The dominant strategy
    here is to confess, regardless of what the other player does.


    Both players confess and go to prison for three years each. This is because even
    if Bob had somehow managed to tell Alice about his no confession strategy, Alice
    would have still confessed and became a witness to avoid prison altogether. Similar
    is the case from Alice’s perspective. Therefore, the best outcome for both becomes
    “confession” in a Nash equilibrium. This is written as {*confess*, *confess*}.


    In the prisoner’s dilemma, there is a benefit of cooperation for both players,
    but the possible incentive of going free for each player entices contest. When
    all players in a game are rational, the best choice is to be in a Nash equilibrium.


    Game theory models are highly abstract; therefore, they can be used in many different
    situations, once developed for a particular situation. For example, the prisoner’s
    dilemma model can be used in many other areas. In network communications where
    wireless network devices compete for bandwidth, energy supply, etc., there is
    a need to regulate node behavior in such a way that all devices on the network
    can work in harmony. Imagine a network where two cell towers working on the same
    frequency in close vicinity can affect each other’s performance. One way to counter
    this problem is to run both towers at low energy so that they don’t interfere
    with each other, but that will decrease the bandwidth of both the towers. If one
    tower increases its energy and the other don’t, then the one that doesn’t loses
    and runs on lower bandwidth. So, the dominant strategy here becomes to run towers
    at maximum power regardless of what the other tower does, so that they achieve
    maximum possible gain. This result is like the prisoner’s dilemma where confession
    is the best strategy. Here, maximum power is the best strategy.


    Now in the light of the preceding explained concepts, we can analyze the Bitcoin
    protocol from a game theoretic perspective.'
  raw: '##### Prisoner’s Dilemma


    In this simultaneous move game, two suspects of a crime are put into separate
    cells without any way to communicate. If they both confess, then they both will
    be imprisoned for three years each. If one of them confesses and acts as a witness
    against the other, then charges against him will be dropped; however, the other
    suspect will get four years in prison. If none of them confesses, then both will
    be sentenced to only one year in prison. Now you can see that if both suspects
    cooperate and don’t confess, then it results in the best outcome for both. However,
    there is a big incentive of going free for both to not cooperate and act as a
    witness against the other. This game results in gains for both if they cooperate
    and don’t confess and results in only one year in prison each. Let’s name these
    characters Alice and Bob for ease and see what possible outcomes there are in
    this game.


