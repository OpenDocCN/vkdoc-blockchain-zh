  trans: '

    ### 优点与缺点


    两种方法各有利弊。如果操作密集，`主动复制`会造成资源浪费。对于`被动复制`而言，大规模更新会消耗大量网络带宽。此外，在`被动复制`中，由于只有一个主副本，如果它发生故障，系统的性能和可用性都会受到影响。


    在`被动复制方法中`，客户端的写入请求由`主节点`预处理，并转换为状态更新命令，这些命令会以相同的顺序应用于所有副本。每个副本都是`主动复制`中状态机的副本，而在`被动复制`中，只有`主节点`是状态机的单一副本。


    请注意，尽管`主动复制`和`被动复制`在本质上有区别，但它们都是实现状态机容错的通用方法。


    现在，我们来看看`主备复制`是如何工作的。这里我假设采用`故障停止`模型。


    ### 主备复制


    `主备复制`是最常见的复制方案类型。其中一个副本被指定为`主节点`，其余节点为`备份节点`。一个拥有最低标识符的正确进程会被指定为`主副本`。客户端向指定的`主节点`发送请求，`主节点`再将请求转发给所有`备份节点`。`主节点`只有在收到`备份节点`的响应后，才会回复客户端。当客户端发起写入请求时，`主节点`将请求发送给所有副本，并在收到`备份节点`的响应后，自身执行更新（即交付给自己）。


    该算法的工作流程如下：


    1.  客户端向`主节点`发送写入请求。

    2.  `主节点`将请求广播给`备份`副本。

    3.  `备份`副本向`主`副本发送确认（响应）。

    4.  `主节点`等待，直到接收到所有`备份`副本的响应。

    5.  一旦收到所有响应，它将请求交付给自己。这被称为`提交点`。

    6.  此后，`主节点`将响应返回给客户端。


    对于读取操作：


    1.  客户端向`主节点`发送请求。

    2.  `主节点`进行响应。


    图 3-10 展示了这一概念。


    ![](img/515270_1_En_3_Fig10_HTML.png)


    主备复制示意图。客户端写入请求。广播从主节点发送到备份节点 3。响应发送回客户端。


    **图 3-10** 主备复制


    如何处理故障？如果`主节点`发生故障，其中一个`备份节点`将会接管。


    现在，这看起来是一种实现容错的合适协议，但如果`主节点`发生故障呢？`主节点`故障可能导致停机，因为恢复需要时间。此外，从`主节点`读取可能会产生错误结果，因为在客户端在`提交点`之前向`主节点`发起读取请求的场景下，即使所有副本都已交付该更新，`主节点`也不会返回结果。一种解决方案可能是将读取视为更新来处理，但这种技术效率相对较低。同时，`主节点`承担了所有工作，即发送给其他副本、接收响应、提交，然后回复客户端。并且，`主节点`必须等待所有副本的响应才能回复客户端。与`主备副本`解决方案相比，一个更好的解决方案是`链式复制`。其核心思想是，由其中一个备份服务器来响应读取请求，而另一个服务器来处理更新命令。


    ### 链式复制


    `链式复制`将副本组织成一个链，包含一个头和一个尾。`头`是编号最大的服务器，而`尾`是编号最小的服务器。写入请求或更新命令被发送到`头`，`头`通过可靠的先进先出链路将请求发送到链上的下一个副本，下一个副本再将其转发给下一个，直到更新到达最后一个（`尾`）服务器。然后，`尾`服务器向客户端响应。`头`副本负责对来自客户端的请求进行排序。


    对于读取请求（查询），客户端直接将其发送给`尾`，由`尾`进行回复。当`尾`发生故障时，只需重新选择其前驱节点作为新的`尾`即可轻松恢复。如果`头`发生故障，其后继节点将成为新的`头`，并通知客户端。图
    3-11 展示了`链式复制`的工作原理。


    ![](img/515270_1_En_3_Fig11_HTML.png)


    链式复制示意图。客户端写入请求。在更新和查询场景下，响应和回复分别发送回客户端。


    **图 3-11** 链式复制


    `链式复制`提供了高可用性、高吞吐量和强一致性。它可以容忍多达 *n* – 1 个节点故障。

    '
- fmt: '# State Machine Replication


    The state machine methodology was introduced by Leslie Lamport in his seminal
    paper “Time, Clocks, and the Ordering of Events in a Distributed System” in 1978.
    It is a de facto standard for achieving fault tolerance in distributed systems.


    Let’s first define what a state machine is. A state machine executes a sequence
    of commands. It stores the state of the system. This stored state transitions
    to the next state through a state transition function as a result of executing
    commands. Commands are deterministic, and the resultant state and output are only
    determined by the input commands which the machine has executed.


    The simple algorithm in Listing [3-1](#515270_1_En_3_Chapter.xhtml#PC1) describes
    a state machine node.


    ```

    state := initial

    log := lastcommand

    while (true) {

    on event receivecommand()

    {

    appendtolog(command)

    output := statetransition(command, state)

    sendtoclient(output)

    }

    }

    Listing 3-1

    State machine

    ```


    In this pseudocode, the state machine starts with an initial state. When a command
    is received from the client, it appends that to the log. After that, it executes
    the command through the transition function and updates the state and produces
    an output. This output is sent to the client as a response.


    Figure [3-12](#515270_1_En_3_Chapter.xhtml#Fig12) illustrates this concept.


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig12_HTML.png)


    A flowchart of the state machine replica. The flow is client, command, consensus,
    broadcast, state machine execution, state machine, and reply.


    Figure 3-12


    State machine replica


    The key idea behind state machine replication is that if the system is modelled
    as a state machine, then replica consistency can be achieved by simply achieving
    an agreement on the order of operations. If the same commands are applied to all
    nodes in the same order, then a general approach to keep all replicas consistent
    with each other is achieved. However, the challenge here is to figure out how
    to achieve a common global order of the commands.


    In order to achieve an agreement on the order of operations, we can use agreement
    protocols such as Byzantine agreement protocols or reliable broadcast protocols.
    We discussed the total order broadcast abstraction earlier in this chapter. We
    can also use consensus algorithms such as `Paxos` or `PBFT` to achieve this. Remember
    that in total order broadcast, each process delivers the same message in the same
    order. This property immediately solves our problem of achieving an agreement
    on the order of operations, which is the core insight behind state machine replication.
    Total order broadcast ensures that commands from different clients are delivered
    in the same order. If commands are delivered in the same order, they will be executed
    in the same order and as state machine is deterministic, all replicas will end
    up in the same state.


    Each replica is a state machine which transitions its state to the next deterministically
    as a result of executing the input command. The state on each replica is maintained
    as a set of (`key`, `value`) pairs. The output of commands is transitioned from
    the current state to the next. Determinism is important because this ensures that
    each command execution produces the same output. Each replica starts in the same
    initial state. Total order broadcast delivers the same command to each replica
    in the global order, which results in each replica executing the same sequence
    of commands and transitioning to the same state. This achieves the same state
    at each replica.


    This principle is also used in blockchains where a total order is achieved on
    the sequence of transactions and blocks via some consensus mechanism, and each
    node executes and stores those transactions in the same sequence as other replicas
    and as proposed by proof of work winner, leader. We will explore this in detail
    in Chapter [5](#515270_1_En_5_Chapter.xhtml). Traditional protocols such as Practical
    Byzantine Fault Tolerance (`PBFT`) and `RAFT` are state machine replication protocols.


    `SMR` is usually used to achieve increased system performance and fault tolerance.
    System performance can increase because multiple replicas host copies of data,
    and more resources are available due to multiple replicas. Fault tolerance increases
    due to the simple fact that as data is replicated on each replica, even if some
    replicas are not available, the system will continue to operate and respond to
    client queries and updates.


    Now let’s look at `SMR` properties formally.


    ### Same Initial State


    The replicas always start in the same initial state. It could just be an empty
    database.


    ### Deterministic Operations


    All correct replicas deterministically produce the same output and state for the
    same input and state.


    ### Coordination


    All correct replicas process the same commands in the same order.


    The coordination property requires the use of agreement protocols such as total
    order broadcast or some consensus algorithms.


    There are also two *safety* and *liveness* properties which we describe as follows.


    ### Safety


    All correct replicas execute the same commands. This is the **agreement** property.
    There are two general approaches to achieve an agreement. We can use either a
    total order broadcast or a consensus protocol. A total order broadcast protocol
    needs to run only once per state machine replication, whereas a consensus mechanism
    is instantiated for each period of the sequence of commands.


    ### Liveness


    All correct commands are eventually executed by correct replicas. This is also
    called the **completion** property.


    Safety ensures consistency, whereas liveness ensures availability and progress.


    Figure [3-13](#515270_1_En_3_Chapter.xhtml#Fig13) demonstrates how `SMR` generally
    works.


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig13_HTML.png)


    A flowchart of `S M R` algorithm. The flow is command, broadcast, append to log,
    execution, and reply. Command is broadcasted from one to multiple logs.


    Figure 3-13


    State machine replication


    In Figure [3-13](#515270_1_En_3_Chapter.xhtml#Fig13), we can see how the process
    works:


    1. The client submits the command `x = 5` to replica 1.


    2. Replica 1 sends this command to replica 2 and replica 3.


    3. All replicas append the command to their logs.


    4. Each state machine on all replicas executes the command.


    5. Replica 1 responds back to the client with the reply/result.


    The replicated log on the replicas ensures that commands are executed by the state
    machine in the same order on each replica. The consensus mechanism (in the top-left
    corner of the image) ensures that an agreement is achieved on the order of commands
    and as a result written into the log as such. This involves reaching an agreement
    on the sequence of commands with other replicas. This replicated system will make
    progress if majority of the replicas are up.


    Consensus and state machine replication are related in the sense that distributed
    consensus establishes the global common order of state machine commands, whereas
    the state machine executes these commands according to the global order determined
    by the consensus (agreement) algorithm, and thus each node (state machine) reaches
    the same state.


    A crash fault–tolerant `SMR` requires at least `2f+1` replicas, whereas a `BFT
    SMR` requires `3f+1` replicas, where `f` is the number of failed replicas.


    State machine replication achieves consistency among replicas. There are various
    replica consistency models. We’ll briefly explore them here.'
