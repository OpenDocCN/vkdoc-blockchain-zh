  trans: '

    ### 部分同步


    部分同步模型假设网络在大部分情况下是同步且表现良好的，但有时也可能表现为异步。例如，处理速度可能存在差异，或者可能发生网络延迟，但系统最终会恢复到同步状态以恢复正常运行。


    另一种理解方式是：网络通常处于同步状态，但可能在有限时间内不可预测地表现出异步行为，但系统中存在足够长的同步时期，使得系统能够正确运行。


    也可以这样认为：真实系统在大多数时候是同步的，但有时会表现出任意且不可预测的异步行为。在同步期内，系统能够做出决策并终止运行。


    总之，我们可以引用列奥纳多·达·芬奇的话：


    > *对于善于利用时间的人来说，时间总是足够长。*


    图 1-15 展示了部分同步网络的行为方式。


    ![](img/515270_1_En_1_Fig15_HTML.png)


    一个以正弦曲线绘制处理器延迟与时间关系的图表。曲线被划分为同步区和异步区。


    图 1-15


    部分同步网络


    ### 最终同步


    在部分同步的最终同步版本中，系统最初可能是异步的，但存在一个未知的时间点，称为全局稳定时间（GST），该时间点对处理器不可知，在此之后系统最终变为同步。此外，这并不意味着系统在
    GST 之后将永远保持同步。这在实际中是不可能的，但系统在 GST 之后会有足够长的同步周期来做出决策并终止运行。


    我们可以在图 1-16 中直观地看到从异步到同步的同步模型谱系。


    ![](img/515270_1_En_1_Fig16_HTML.png)


    一个示意图，带有一个双向箭头，右侧标注为“同步”，左侧标注为“异步”，中间标注为“部分同步”。


    图 1-16


    分布式系统中的同步模型


    同步模型会同时考虑消息传递延迟和进程的相对速度。


    #### 形式化定义


    以下是关于部分同步模型的一些形式化定义：


    - 希腊字母 Delta `Δ` 表示消息从一个处理器到达另一个处理器所需时间的固定上限。

    - 希腊字母 Phi `Φ` 表示不同处理器相对速度的固定上限。

    - GST 是全局稳定时间，在此之后系统表现为同步。


    定义了上述变量后，我们可以如下定义不同的同步模型：


    - 异步系统是指不存在固定上限 `Δ` 和 `Φ` 的系统。

    - 同步系统是指已知固定上限 `Δ` 和 `Φ` 的系统。


    部分同步系统可以通过几种方式定义：


    - 存在固定上限 `Δ` 和 `Φ`，但它们未知。

    - 已知固定上限 `Δ` 和 `Φ`，但仅在某个未知时间 T 之后才成立。这就是最终同步模型。我们可以说，最终同步模型是指已知固定上限 `Δ` 和 `Φ`，但仅在某个时间（称为
    GST）之后才成立的模型。

    - 在另一种变体中，GST 之后 `Δ` 会持续足够长的时间，以使协议能够终止。


    我们将在第 3 章中，围绕规避 FLP 不可能原理和共识协议，更正式地使用同步模型。目前，作为基础，前面介绍的概念已经足够。


    图 1-17 使用时空图展示了同步通信与异步通信的对比。


    ![](img/515270_1_En_1_Fig17_HTML.png)


    两个示意图，各有三条线 P、Q 和 R，以及多向箭头。右侧图没有上限，左侧图有已知的上限。


    图 1-17


    同步系统与异步系统


    讨论完同步模型后，现在让我们将注意力转向对手模型，该模型允许我们对对手对分布式系统的影响做出假设。在此模型中，我们对对手如何行为以及对手可能拥有哪些权力以对分布式系统产生不利影响进行建模。


    ### 对手模型


    除了对分布式系统模型中的同步性和时序做出假设外，还有另一个模型，用于对对手的能力以及它如何对分布式系统产生不利影响做出假设。这是一个重要的模型，它允许分布式系统设计者面对对手时，推理分布式系统的不同属性。例如，一个分布式算法只有在恶意对手控制的节点少于一半的情况下，才能保证正确运行。因此，对手模型通常会对对手的能力设定限制。但是，如果假设对手是全能的，可以无所不能并控制所有节点和通信链路，那么系统就不可能保证正确运行。


    根据分布式系统的不同，以及对手对分布式系统的影响方式和不利影响程度，对手模型可以分为不同类型。


    在此模型中，假设存在一个外部实体，它已经破坏了进程，并且可以控制和协调故障进程的行为。这个实体被称为对手。请注意，这与故障模型略有不同，因为在故障模型中，节点可能因各种原因发生故障，但并未假设有外部实体控制进程。


    对手可以通过多种方式影响分布式系统。使用对手模型的系统设计者需要考虑诸如**腐败类型**、**腐败时间**和**腐败程度**（同时腐败多少进程）等因素。此外，对手可用的**计算能力**、**可视性**和**适应性**也需要考虑。对手模型还允许设计者指定网络中可被腐败的进程数量上限。


    我们将在此简要讨论这些类型。


    #### 阈值对手


    阈值对手是分布式系统中一种标准且广泛使用的模型。在此模型中，对系统中总的故障进程数量施加了限制。换句话说，对网络中故障进程的数量有一个固定上限 `f`。该模型也称为全局对手模型。许多不同的算法都是在此假设下开发的。几乎所有的共识协议至少都在阈值对手模型下工作，该模型假设对手最多可以控制网络中
    `f` 个节点。例如，在第 7 章讨论的 Paxos 协议中，经典共识算法实现在对手控制的节点数量少于网络总节点数一半的假设下达成共识。


    #### 动态对手


    该模型也称为自适应对手。在此模型中，对手可以在协议执行期间的任何时刻腐败进程。并且，被腐败的进程随后将保持故障状态，直到执行结束。


    #### 静态对手


    这种类型的对手只能在对协议执行前进行腐败等敌对活动。'
- fmt: '# Passive Adversary


    This type of adversary does not actively try to sabotage the system; however,
    it can learn some information about the system while running the protocol. Thus,
    it can be called a semi-honest adversary.


    An adversary can cause faults under two models: the crash failure model and the
    Byzantine failure model.


    In the crash failure model, the adversary can stop a process from executing the
    protocol it has control over anytime during the execution.


    In the Byzantine failure model, the adversary has complete control over the corrupted
    process and can control it to deviate arbitrarily from the protocol. Protocols
    that work under these assumptions and tolerate such faults are called crash fault–tolerant
    protocols (`CFT`) or Byzantine fault–tolerant protocols (`BFT`), respectively.


    ## Time, Clocks, and Order


    Time plays a critical role in distributed systems. Almost always, there is a need
    to measure time. For example, timestamps are required in log files in a distributed
    system to show when a particular event occurred. From a security point of view,
    audit timestamps are needed to indicate when a specific operation occurred, for
    example, when a specific user logged in to the system. In operating systems, timing
    is required for scheduling internal events. All these use cases and countless
    other computer and distributed systems operations require some notion of time.


    The notion of time in distributed systems is tricky. Events shown in Figure [1-18](#515270_1_En_1_Chapter.xhtml#Fig18)
    need to be ordered for a distributed system to be reasonably useful. Ordering
    of events in a distributed system is one of the fundamental and critical requirements.
    As there is no global shared clock in distributed systems, the ordering of events
    becomes a challenging problem. To this end, the main concern here is to accomplish
    the correct order of events in the system. We have this notion of time in our
    daily lives where we can say that something happened before something else. For
    example, if I sat an exam and the results came out a week later, we can say confidently
    that the exam must have occurred or happened before the results came out. We can
    visualize this relationship in the diagram in Figure [1-19](#515270_1_En_1_Chapter.xhtml#Fig19).


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig19_HTML.jpg)


    A schematic of the exam. A horizontal line labeled me has 2 events of the exam
    and the result. Below it is a right arrow labeled time.


    Figure 1-19


    Exam happened before the result – a happened-before relation


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig18_HTML.jpg)


    A schematic with 3 lines, P, Q, and R, has events like local, message sent, and
    message received. Some of the events are connected together via time.


    Figure 1-18


    Events and processes in a three-node distributed system


    Usually, we are familiar with the physical clock, that is, our typical day-to-day
    understanding and the notion of time where I can say something like I will meet
    you at 3 PM today, or the football match is at 11 AM tomorrow. This notion of
    time is what we are familiar with. Moreover, physical clocks can be used in distributed
    systems, and several algorithms are used to synchronize time across all nodes
    in a distributed system. These algorithms can synchronize clocks in a distributed
    system using message passing.


    Let’s first have a look at the physical clocks and see some algorithms that can
    be used for time synchronization based on internal physical clocks and external
    time source.


    ## Physical Clocks


    Physical clocks are in everyday use. Now prevalent digital clocks are based on
    quartz crystal, whereas traditional mechanical clocks are based on spring mechanisms
    or pendulums. Digital clocks, from wristwatches to clocks on a computer motherboard,
    make use of quartz crystals. In practice, an oscillator circuit regulated by a
    quartz crystal is used to generate an accurate frequency. When the electric field
    is applied to a quartz crystal, it bends and starts to resonate at a frequency
    depending upon its size, cut, temperature, and housing. The most common frequency
    is 32768 Hz which is almost universally used in quartz-based clocks. Figure [1-20](#515270_1_En_1_Chapter.xhtml#Fig20)
    shows, from left to right, a quartz crystal in a natural form, in a component
    form, and inside a casing with additional oscillator circuitry.


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig20_HTML.jpg)


    A quartz crystal in its natural form is on the left, and in a circuit on the right.
    In the center is the crystal in its component form.


    Figure 1-20


    A quartz crystal in a natural form (left), in a component form (middle), and in
    a circuit (right)


    Quartz-based clocks are usually accurate enough for general-purpose use. However,
    several factors such as manufacturing differences, casing, and operating environment
    (too cold, too hot) impact the operation of a quartz crystal. Usually, too low
    or high a temperature can slow down the clock. Imagine if an electronic device
    operating in the field is exposed to high temperatures; the clock can run slower
    than a clock working in normal favorable conditions. This difference caused by
    the clock running faster or slower is called drift. Drift is measured in parts
    per million (`ppm`) units.


    In almost all quartz clocks, the frequency of the quartz crystal is 32,768 kHz
    due to its cut and size and how it is manufactured. This is a specific cut and
    size which looks like a tuning fork, due to which the frequency produced is always
    32,768 Hertz. I decided to do a small experiment with my oscilloscope and an old
    clock lying around to demonstrate this fact.


    Here are the results! Figure [1-21](#515270_1_En_1_Chapter.xhtml#Fig21) shows
    a quartz crystal in a clock circuit producing exactly 32,768 Hertz at normal room
    temperature, shown on the oscilloscope screen.


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig21_HTML.png)


    An oscilloscope connected to a quartz crystal clock measures 32.7680 kilohertz


    Figure 1-21


    Quartz crystal clock measured using an oscilloscope


    In Figure [1-21](#515270_1_En_1_Chapter.xhtml#Fig21), the probes from the oscilloscope
    are connected to the quartz crystal component on the clock circuit, and the waveform
    is shown on the oscilloscope screen. Also, the frequency is displayed at the right
    bottom of the oscilloscope screen, which reads `32.7680KHz`.


    ### Clock Skew vs. Drift


    Due to environmental factors such as temperature and manufacturing differences,
    quartz crystal clocks can slow down, resulting in skew and drift. The immediate
    difference between the time shown by two clocks is called their skew, whereas
    the rate at which two clocks count time differently is called drift. Note that
    the difference between physical clocks between nodes in a heterogeneous distributed
    system may be even more significant than homogenous distributed systems where
    hardware, OS, and architecture are the same for all nodes.


    Generally, it is expected that roughly a drift of one second over 11 days can
    develop, which over time can lead to an observable and significant difference.
    Imagine two servers running in a data center with no clock synchronization mechanism
    and are only dependent on their internal quartz clock. In a month, they will be
    running two to three seconds apart from each other. All time-dependent operations
    will run three seconds apart, and over time this will continue to worsen. For
    example, a batch job that is supposed to start at 11 AM will begin at 11 + 3 seconds
    in a month. This situation can cause issues with time-dependent jobs, can cause
    security issues, and can impact time-sensitive operations, and software may fail
    or depict an arbitrary behavior. A much more accurate clock than a quartz clock
    is an atomic clock.'
  raw: '##### Passive Adversary


    This type of adversary does not actively try to sabotage the system; however,
    it can learn some information about the system while running the protocol. Thus,
    it can be called a semi-honest adversary.


    An adversary can cause faults under two models: the crash failure model and the
    Byzantine failure model.


    In the crash failure model, the adversary can stop a process from executing the
    protocol it has control over anytime during the execution.


    In the Byzantine failure model, the adversary has complete control over the corrupted
    process and can control it to deviate arbitrarily from the protocol. Protocols
    that work under these assumptions and tolerate such faults are called crash fault–tolerant
    protocols (CFT) or Byzantine fault–tolerant protocols (BFT), respectively.


    ### Time, Clocks, and Order


    Time plays a critical role in distributed systems. Almost always, there is a need
    to measure time. For example, timestamps are required in log files in a distributed
    system to show when a particular event occurred. From a security point of view,
    audit timestamps are needed to indicate when a specific operation occurred, for
    example, when a specific user logged in to the system. In operating systems, timing
    is required for scheduling internal events. All these use cases and countless
    other computer and distributed systems operations require some notion of time.


    The notion of time in distributed systems is tricky. Events shown in Figure [1-18](#515270_1_En_1_Chapter.xhtml#Fig18)
    need to be ordered for a distributed system to be reasonably useful. Ordering
    of events in a distributed system is one of the fundamental and critical requirements.
    As there is no global shared clock in distributed systems, the ordering of events
    becomes a challenging problem. To this end, the main concern here is to accomplish
    the correct order of events in the system. We have this notion of time in our
    daily lives where we can say that something happened before something else. For
    example, if I sat an exam and the results came out a week later, we can say confidently
    that the exam must have occurred or happened before the results came out. We can
    visualize this relationship in the diagram in Figure [1-19](#515270_1_En_1_Chapter.xhtml#Fig19).


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig19_HTML.jpg)


    A schematic of the exam. A horizontal line labeled me has 2 events of the exam
    and the result. Below it is a right arrow labeled time.


    Figure 1-19


    Exam happened before the result – a happened-before relation


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig18_HTML.jpg)


    A schematic with 3 lines, P, Q, and R, has events like local, message sent, and
    message received. Some of the events are connected together via time.


    Figure 1-18


    Events and processes in a three-node distributed system


    Usually, we are familiar with the physical clock, that is, our typical day-to-day
    understanding and the notion of time where I can say something like I will meet
    you at 3 PM today, or the football match is at 11 AM tomorrow. This notion of
    time is what we are familiar with. Moreover, physical clocks can be used in distributed
    systems, and several algorithms are used to synchronize time across all nodes
    in a distributed system. These algorithms can synchronize clocks in a distributed
    system using message passing.


    Let’s first have a look at the physical clocks and see some algorithms that can
    be used for time synchronization based on internal physical clocks and external
    time source.


    ### Physical Clocks


    Physical clocks are in everyday use. Now prevalent digital clocks are based on
    quartz crystal, whereas traditional mechanical clocks are based on spring mechanisms
    or pendulums. Digital clocks, from wristwatches to clocks on a computer motherboard,
    make use of quartz crystals. In practice, an oscillator circuit regulated by a
    quartz crystal is used to generate an accurate frequency. When the electric field
    is applied to a quartz crystal, it bends and starts to resonate at a frequency
    depending upon its size, cut, temperature, and housing. The most common frequency
    is 32768 Hz which is almost universally used in quartz-based clocks. Figure [1-20](#515270_1_En_1_Chapter.xhtml#Fig20)
    shows, from left to right, a quartz crystal in a natural form, in a component
    form, and inside a casing with additional oscillator circuitry.


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig20_HTML.jpg)


    A quartz crystal in its natural form is on the left, and in a circuit on the right.
    In the center is the crystal in its component form.


    Figure 1-20


    A quartz crystal in a natural form (left), in a component form (middle), and in
    a circuit (right)


    Quartz-based clocks are usually accurate enough for general-purpose use. However,
    several factors such as manufacturing differences, casing, and operating environment
    (too cold, too hot) impact the operation of a quartz crystal. Usually, too low
    or high a temperature can slow down the clock. Imagine if an electronic device
    operating in the field is exposed to high temperatures; the clock can run slower
    than a clock working in normal favorable conditions. This difference caused by
    the clock running faster or slower is called drift. Drift is measured in parts
    per million (ppm) units.


    In almost all quartz clocks, the frequency of the quartz crystal is 32,768 kHz
    due to its cut and size and how it is manufactured. This is a specific cut and
    size which looks like a tuning fork, due to which the frequency produced is always
    32,768 Hertz. I decided to do a small experiment with my oscilloscope and an old
    clock lying around to demonstrate this fact.


    Here are the results! Figure [1-21](#515270_1_En_1_Chapter.xhtml#Fig21) shows
    a quartz crystal in a clock circuit producing exactly 32,768 Hertz at normal room
    temperature, shown on the oscilloscope screen.


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig21_HTML.png)


    An oscilloscope connected to a quartz crystal clock measures 32.7680 kilohertz


    Figure 1-21


    Quartz crystal clock measured using an oscilloscope


    In Figure [1-21](#515270_1_En_1_Chapter.xhtml#Fig21), the probes from the oscilloscope
    are connected to the quartz crystal component on the clock circuit, and the waveform
    is shown on the oscilloscope screen. Also, the frequency is displayed at the right
    bottom of the oscilloscope screen, which reads 32.7680KHz.


    #### Clock Skew vs. Drift


    Due to environmental factors such as temperature and manufacturing differences,
    quartz crystal clocks can slow down, resulting in skew and drift. The immediate
    difference between the time shown by two clocks is called their skew, whereas
    the rate at which two clocks count time differently is called drift. Note that
    the difference between physical clocks between nodes in a heterogeneous distributed
    system may be even more significant than homogenous distributed systems where
    hardware, OS, and architecture are the same for all nodes.


    Generally, it is expected that roughly a drift of one second over 11 days can
    develop, which over time can lead to an observable and significant difference.
    Imagine two servers running in a data center with no clock synchronization mechanism
    and are only dependent on their internal quartz clock. In a month, they will be
    running two to three seconds apart from each other. All time-dependent operations
    will run three seconds apart, and over time this will continue to worsen. For
    example, a batch job that is supposed to start at 11 AM will begin at 11 + 3 seconds
    in a month. This situation can cause issues with time-dependent jobs, can cause
    security issues, and can impact time-sensitive operations, and software may fail
    or depict an arbitrary behavior. A much more accurate clock than a quartz clock
    is an atomic clock.'
  trans: '

    # 被动敌手


    这类敌手不会主动破坏系统，但可能在协议运行过程中获取系统的某些信息，因此可称之为半诚实敌手。


    敌手可在两种模型下引发故障：崩溃故障模型和拜占庭故障模型。


    在崩溃故障模型中，敌手可在协议执行期间的任意时刻，使其控制的进程停止执行协议。


    在拜占庭故障模型中，敌手完全控制被破坏的进程，并可操纵其任意偏离协议。在这种假设下运行并能容忍此类故障的协议，分别称为崩溃容错协议（`CFT`）或拜占庭容错协议（`BFT`）。


    ## 时间、时钟与顺序


    时间在分布式系统中起着至关重要的作用。几乎总是需要对时间进行度量。例如，分布式系统中的日志文件需要时间戳来记录特定事件的发生时间。从安全角度看，审计时间戳用于记录特定操作的发生时间，比如特定用户登录系统的时间。在操作系统中，内部事件的调度需要定时功能。所有这些用例以及无数其他计算机和分布式系统操作，都需要某种时间概念。


    分布式系统中的时间概念颇为棘手。如图 1-18 所示的事件必须排序，分布式系统才能合理可用。事件排序是分布式系统最基本、最关键的需求之一。由于分布式系统中不存在全局共享时钟，事件排序成为一个具有挑战性的问题。为此，这里的主要关注点是实现系统中事件的正确排序。我们在日常生活中就有这种时间概念，可以说某件事发生在另一件事之前。例如，如果我参加了一场考试，一周后成绩公布，我们可以确定地说，考试必然发生在成绩公布之前。我们可以在图
    1-19 的示意图中直观看到这种关系。


    ![](img/515270_1_En_1_Fig19_HTML.jpg)


    考试示意图。一条标有“我”的水平线上有两个事件：考试和成绩。下方是一个指向右侧的箭头，标有“时间”。


    图 1-19


    考试发生在成绩之前——一种“发生在...之前”的关系


    ![](img/515270_1_En_1_Fig18_HTML.jpg)


    一个包含 P、Q、R 三条线的示意图，标有本地事件、消息发送和消息接收等事件。部分事件通过时间线连接。


    图 1-18


    三节点分布式系统中的事件与进程


    通常，我们熟悉的是物理时钟，即我们日常对时间的理解，例如“我今天下午 3 点见你”或“足球赛是明天上午 11 点”。这种时间概念是我们所熟悉的。此外，物理时钟可用于分布式系统，并有多种算法用于同步分布式系统中所有节点的时间。这些算法可以通过消息传递来同步分布式系统中的时钟。


    我们先来了解物理时钟，并介绍一些基于内部物理时钟和外部时间源进行时间同步的算法。


    ## 物理时钟


    物理时钟在日常生活中无处不在。如今普遍使用的数字时钟基于石英晶体，而传统机械时钟则基于弹簧机构或摆锤。从手表到计算机主板上的时钟，数字时钟都利用石英晶体。实际上，由石英晶体调控的振荡器电路用于生成精确频率。当对石英晶体施加电场时，它会弯曲并开始以其尺寸、切割方式、温度和封装所决定的频率共振。最常见的频率是
    32768 Hz，这几乎是所有石英时钟通用的频率。图 1-20 从左到右依次展示了天然形态的石英晶体、元器件形态的石英晶体，以及带有附加振荡器电路的封装晶体。


    ![](img/515270_1_En_1_Fig20_HTML.jpg)


    左侧是天然形态的石英晶体，右侧是电路中的石英晶体，中间是元器件形态的石英晶体。


    图 1-20


    天然形态的石英晶体（左）、元器件形态的石英晶体（中）以及电路中的石英晶体（右）


    基于石英的时钟通常精度足以满足一般用途。然而，制造差异、封装以及工作环境（过冷或过热）等因素都会影响石英晶体的运作。通常，温度过低或过高都会导致时钟变慢。想象一下，如果现场运行的电子设备暴露在高温下，其时钟可能比在正常有利条件下工作的时钟运行得更慢。这种由时钟运行快慢导致的差异称为漂移。漂移以百万分之几（`ppm`）为单位进行测量。


    几乎所有石英时钟中，由于切割方式、尺寸和制造工艺，石英晶体的频率都是 32,768 kHz。这是一种特定的切割方式和尺寸，形状类似于音叉，因此产生的频率始终是
    32,768 赫兹。我决定用我的示波器和一块闲置的老时钟做个简单实验来证明这一点。


    以下是结果！图 1-21 显示了时钟电路中的石英晶体在正常室温下正好产生 32,768 赫兹的频率，示波器屏幕上清晰显示。


    ![](img/515270_1_En_1_Fig21_HTML.png)


    连接到石英晶体时钟的示波器测量到 32.7680 千赫兹


    图 1-21


    使用示波器测量的石英晶体时钟


    在图 1-21 中，示波器的探针连接到时钟电路上的石英晶体元器件，波形显示在示波器屏幕上。同时，示波器屏幕右下角显示频率，读数为 `32.7680KHz`。


    ### 时钟偏差 vs. 漂移


    由于温度等环境因素和制造差异，石英晶体时钟可能会变慢，从而产生偏差和漂移。两个时钟显示时间之间的即时差异称为偏差，而两个时钟计时速率的不同称为漂移。请注意，在异构分布式系统中，各节点物理时钟之间的差异可能比同构分布式系统（所有节点的硬件、操作系统和架构相同）更为显著。


    通常，预计大约每 11 天会产生约 1 秒的漂移，随着时间的推移，这将导致可观察到的显著差异。想象两台运行在数据中心、没有时钟同步机制、仅依赖内部石英时钟的服务器。一个月后，它们之间的时间将相差
    2 到 3 秒。所有依赖时间的操作都将相差 3 秒，并且随着时间的推移，这种差异会继续恶化。例如，一个本应在上午 11 点启动的批处理作业，一个月后将在 11
    点过 3 秒才开始。这种情况可能引发与时间相关的作业问题，导致安全问题，影响时间敏感操作，甚至可能导致软件故障或表现出异常行为。比石英时钟精确得多的时钟是原子钟。

    '
- fmt: '### Atomic Clocks


    Atomic clocks are based on the quantum mechanical properties of atoms. Atoms such
    as `cesium` or `rubidium` and `mercury` are used, and resonant frequencies (oscillations)
    of atoms are used to record accurate and precise times.


    Our notion of time is based on astronomical observations such as changing seasons
    and the Earth’s rotation. The higher the oscillation, the higher the frequency
    and the more precise the time. This is the principle on which atomic clocks work
    and produce highly precise time.


    In 1967, the unit of time was defined as a second of “the duration of 9,192,631,770
    periods of the radiation corresponding to the transition between the two hyperfine
    levels of the ground state of the caesium-133 atom.” In other words, oscillation
    of cesium atoms between two energy states exactly 9,192,631,770 times under controlled
    environment defines a true second. An atomic clock is shown in Figure [1-22](#515270_1_En_1_Chapter.xhtml#Fig22).


    ![](images/515270_1_En_1_Chapter/515270_1_En_1_Fig22_HTML.jpg)


    A set of 6 of the Cesium Beam atomic clocks with various electrical racks. They
    have a printout halfway through their height.


    **Figure 1-22**


    Cesium-based atomic clocks: image from [https://​nara.​getarchive.​net/​media/​cesium-beam-atomic-clocks-at-the-us-naval-observatory-provide-the-basis-for-29fa0c](https://nara.getarchive.net/media/cesium-beam-atomic-clocks-at-the-us-naval-observatory-provide-the-basis-for-29fa0c)


    Now imagine a scenario where we discover a clock skew and see that one clock is
    running behind ten seconds. We can usually and simply advance it to ten seconds
    to make the clock accurate again. It is not ideal but not as bad as the clock
    skew, where we may discover a clock to run ten seconds behind. What can we do
    in that case? Can we simply push it back to ten seconds? It is not a very good
    idea because we can then run into situations where it would appear that a message
    is received before we sent it.


    To address clock skews and drifts, we can synchronize clocks with a trusted and
    accurate time source.


    You might be wondering why there is such a requirement for more and more precise
    clocks and sources of time. Quartz clocks are good enough for day-to-day use;
    then we saw GPS as a more accurate time source, and then we saw atomic clocks
    that are even more accurate and can drift only a second in about 300 million years!^([¹](#fn1))
    But why do we need such highly accurate clocks? The answer is that for day-to-day
    use, it doesn’t matter. If the time on my wristwatch is a few seconds different
    from other clocks, it’s not a problem. If my post on a social media site has a
    timestamp that is a few seconds apart from the exact time I posted it, perhaps
    that is not an issue. Of course, as long as the sequence is maintained, the timestamp
    is acceptable within a few seconds. But the situation changes in many other practical
    scenarios and distributed systems. For example, high-frequency trading systems
    require (by regulation MiFID II) that the mechanism format the timestamp on messages
    in the trading system in microseconds and be accurate within 100 microseconds.
    From a clock synchronization point of view, only 100 microseconds divergence is
    allowed from UTC. While such requirements are essential for the proper functioning
    and regulation of the trading systems, they also pose technical challenges. In
    such scenarios, the choice of source of accurate time, choice of synchronization
    algorithms, and handling of skews and drifts become of prime importance.


    You can see specific MiFID requirements here as a reference:


    [`https://ec.europa.eu/finance/securities/docs/isd/mifid/rts/160607-rts-25-annex_en.pdf`](https://ec.europa.eu/finance/securities/docs/isd/mifid/rts/160607-rts-25-annex_en.pdf)


    There are other applications of atomic clocks in defense, geology, astronomy,
    navigation, and many others.


    Recently, Sapphire clocks have been developed, which are much more precise than
    even cesium-based atomic clocks. It is so precise that it can lose or gain a second
    in three billion years.


    Usually, there are two ways in which time is represented in computers. One is
    epoch time, also called Unix time, which is defined as the number of seconds elapsed
    since January 1, 1970. Another common timestamp format is ISO8601, which defines
    a date and time format standard.


    ### Synchronization Algorithms for Physical Clocks


    There are two methods to synchronize clocks:


    1. External synchronization

    2. Internal synchronization


    In the external clock synchronization method, there is an external and authoritative
    source of time to which nodes in a distributed system synchronize with.


    In the internal synchronization method, clocks in nodes (processes) are synchronized
    with one another.


    #### NTP


    The network time protocol (NTP) allows clients to synchronize with UTC. In NTP,
    servers are organized in so-called strata, where stratum 1 servers (primary time
    servers) are directly connected to an accurate time source in stratum 0, for example,
    GPS or atomic clock. Stratum 2 servers synchronize with stratum 1 servers over
    the network, and stratum 2 servers synchronize with stratum 3 servers. This type
    of architecture provides a reliable, secure, and scalable protocol. Reliability
    comes from the use of redundant servers and paths. Security is provided by utilizing
    appropriate authentication mechanisms, and scalability is characterized by NTP’s
    ability to serve a large number of clients. While NTP is an efficient and robust
    protocol, inherent network latency, misconfigurations in the protocol setup, network
    misconfigurations that may block the NTP protocol, and several other factors can
    still cause clocks to drift.'
