    \ can detect that the commander is a traitor by using signed messages because\
    \ the commander's signature appears on two different messages. Our assumptions\
    \ under this model are that signatures are unforgeable, and anyone can verify\
    \ the signature's authenticity. This implies that the commander is a traitor because\
    \ only he could have signed two different messages.\n\nFormally, the algorithm\
    \ is described as follows.\n\n**Algorithm: For n generals and m traitor generals\
    \ where *n* > 0.** In this algorithm, each lieutenant *i* keeps a set *V*[*i*]\
    \ of properly signed messages it has received so far. When the commander is honest,\
    \ then the set *V*[*i*] contains only a single element.\n\n**Algorithm `SM(m)`**\n\
    \n**Initialization:**  \n*Vi* = { }, that is, empty\n\n1.  Commander *C* sends\
    \ the signed message (value) to every lieutenant.\n2.  For each *i*:\n    - *V*[*i*]\
    \ = *V*[*i*] + {*v*}, that is, add *v* to *V*[*i*].\n    - If *k* < *m*, then\
    \ send message *v* : 0 : *j*[1]…*j*[*k*] : *i* to every lieutenant other than\
    \ *j*[1]…*j*[*k*].\n3.  If lieutenant *i* receives a message like *v* : 0 : *j*[1]…*j*[*k*]\
    \ and *v* is not in the set *V*[*i*], then:\n    - Set *V*[*i*] = {*v*}.\n   \
    \ - It sends the message *v* : 0 : *i* to every other lieutenant.\n4.  If lieutenant\
    \ *i* receives a message of the form *v* : 0 from the commander and has not yet\
    \ received any message (order) from the commander, that is, *V*[*i*] is empty,\
    \ then:\n    - Set *V*[*i*] = {*v*}.\n    - It sends the message *v* : 0 : *i*\
    \ to every other lieutenant.\n5.  For each *i*:\n    - When no more messages received\
    \ by lieutenant *i*, then it obeys the order (message) via the function `choice(*V*[*i*])`,\
    \ which obtains a single order from a set of orders. `Choice(*V*) = retreat` if\
    \ set *V* is empty or it consists of more than one element. If there is only a\
    \ single element *v* in set *V*, then `choice(*V*) = v`.\n\nHere, *v* : *i* is\
    \ the value *v* signed by general *i*, and *v* : *i* : *j* is the message *v*\
    \ : *i* counter signed by general *j*. Each general *i* maintains a set *V*[*i*]\
    \ which contains all orders received.\n\nThe diagram in Figure 6-7 visualizes\
    \ a traitor commander scenario.\n\n![Figure 6-7](images/515270_1_En_6_Chapter/515270_1_En_6_Fig7_HTML.jpg)\
    \  \n\nA schematic with a traitor commander at the top and lieutenants L 1 and\
    \ 2. The commander orders attack to L 1 and retreat to L 2.  \n\n**Figure 6-7**\
    \ Example of a signed message protocol with `SM(1)` – traitor commander  \n\n\
    With signed messages, it’s easy to detect if a commander is a traitor because\
    \ its signature would appear on two different orders, and by the assumption of\
    \ unforgeable signature, we know that only the commander could have signed the\
    \ message.\n\nFormally, for any *m*, the algorithm `SM(m)` solves the Byzantine\
    \ generals problem if there are at most *m* traitors. The lieutenants maintain\
    \ a vector of values and run a choice function to retrieve the order `choice {attack,\
    \ retreat}`. Timeouts are used to ascertain if no more messages will arrive. Also,\
    \ in step 2, lieutenant *i* ignores any message *v* that is already in the set\
    \ *V*[*i*].\n\nThis algorithm has message complexity *O*(*n*^(*m* + 1)), and it\
    \ requires *m* + 1 number of rounds. This protocol works for *N* ≥ *m* + 2.\n\n\
    In contrast with the oral message protocol, the signed message protocol is more\
    \ resilient against faults; here, if at least two generals are loyal in three\
    \ generals, the problem is solvable. In the oral message, even if there is a single\
    \ traitor in three generals, the problem is unsolvable."
