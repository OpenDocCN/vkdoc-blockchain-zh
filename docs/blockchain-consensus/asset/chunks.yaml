    \ including some central bank digital currencies.\n\n## How Blockchain Works\n\
    \nAt times, there are subtle differences in the way a blockchain works at a micro\
    \ level; however, at a high level all blockchains principally work the same. In\
    \ the following, I list seven key steps that show how a blockchain works:\n\n\
    1.  A transaction occurs between two or more users.\n\n2.  The transaction is\
    \ broadcast to the network.\n\n3.  The transaction is validated and added to the\
    \ transaction pools.\n\n4.  A proposed block is created by adding transactions\
    \ to it by miners.\n\n5.  Miners race to solve the proof of work to win the right\
    \ to insert their block into the blockchain, or a consensus mechanism runs to\
    \ agree on the transactions. Usually, miners run a proof of work type of consensus\
    \ mechanism to win the right to add a block. In consortium or private chains,\
    \ usually a variant of traditional Byzantine or crash fault–tolerant algorithm\
    \ runs, which by voting achieves the agreement on a block which is then inserted\
    \ into the blockchain.\n\n6.  If a miner wins the right, it inserts the block\
    \ in its local chain and broadcasts that block to the network.\n\n7.  Other nodes\
    \ accept it if valid, and the process starts again.\n\nThis process can be visualized\
    \ in Figure [4-3](#515270_1_En_4_Chapter.xhtml#Fig3).\n\n![](images/515270_1_En_4_Chapter/515270_1_En_4_Fig3_HTML.jpg)\n\
    \nA flow diagram of the blockchain algorithm starts with new transaction and ends\
    \ at nodes validate and add new block.\n\nFigure 4-3\n\nHow a blockchain works\n\
    \n## Anatomy of a Blockchain\n\nA blockchain is composed of blocks, where each\
    \ block is linked to its previous block except the first genesis block. The blockchain\
    \ term was used by Satoshi Nakamoto in his Bitcoin code for the first time. Even\
    \ though now it is used as one word, in his original Bitcoin code it was written\
    \ as two separate words, “block chain.” It can be visualized as a chain of blocks,\
    \ as shown in Figure [4-4](#515270_1_En_4_Chapter.xhtml#Fig4).\n\n![](images/515270_1_En_4_Chapter/515270_1_En_4_Fig4_HTML.png)\n\
    \nA structure chart of blockchain has three columns for genesis block, block 1,\
    \ and 2\\. Blocks 1 and 2 have previous block header hash.\n\nFigure 4-4\n\nGeneric\
    \ structure of a blockchain\n\nOther structures such as DAGs, hash graphs, and\
    \ Merkle trees are now used in some distributed ledgers instead of the usual block-based\
    \ model in modern blockchains. For example, Avalanche uses DAGs for storage instead\
    \ of a linear block-based structure. We will cover these in detail when we discuss\
    \ consensus protocols specific to these blockchains (distributed ledgers) in Chapter\
    \ [8](#515270_1_En_8_Chapter.xhtml)."
  trans: "\n### 区块链账本抽象\n\n区块链抽象，有时也称为账本抽象，可以通过其所能执行的操作及若干属性来定义。\n\n在高层面上，区块链网络中的进程可以执行三种操作：`Get()`、`append()`、`verify()`。\n\
    \n当调用 `get()` 时，它会返回区块链（账本）当前规范状态的一个副本。  \n当调用 `append()` 时，它会创建一条新记录 *r* 并将其追加到区块链中。\
    \  \n当调用 `verify()` 时，它会验证并返回记录 *r* 或区块链 *b* 的有效性状态。\n\n#### 属性\n\n区块链具有若干种属性，描述如下。\n\
    \n##### 一致性\n\n- 所有副本都持有相同且最新的数据副本。在公有链的情况下，通常是最终一致性；而在许可链的情况下，则是强一致性。\n- 形式上，如果记录\
    \ `r` 被进程 `p` 在另一条记录 `r2` 之前首先看到，那么每个诚实的进程都会在 `r2` 之前看到 `r`。\n\n##### 容错性\n\n\
    - 区块链是容错的分布式系统。区块链网络能够承受一定阈值内的拜占庭故障或崩溃故障。\n- 在基于 BFT 的区块链中（通常区块链中实现了 PBFT 的变体），下限是\
    \ `3F + 1`，其中 `F` 是故障数。\n- 在基于 CFT 的区块链中（通常在联盟链中实现了 RAFT），下限是 `2F + 1`，其中 `F`\
    \ 是故障数。\n- 在基于工作量证明的区块链中，下限是算力 <50%。\n\n##### 最终性\n\n- 最终性是指一笔交易被认为是不可撤销且永久确定的状态。这个事件可以是特定数量的区块、一个时间间隔，或者是共识算法执行过程中的一个步骤（阶段）。例如，在比特币中，通常是在六个区块之后，一笔交易才被认为是不可撤销的；而在使用\
    \ BFT 协议的许可链中，交易一旦提交，就被认为具有不可撤销的最终性。\n\n##### 不可篡改性\n\n- 区块链是不可篡改的，这意味着记录一旦进入账本，就永远无法被删除。\n\
    \n##### 仅追加\n\n- 新记录只能被追加到区块链中。新记录不能插入到已有记录之间。例如，新区块只能添加在最后一个最终区块之后，而不能插入在其他区块之间。\n\
    - 形式上，如果区块 `b'` 被插入在区块 `b` 之后，那么新区块 `b\"` 只能插入在 `b'` 之后，而不能插入在 `b'` 或 `b` 之前。\n\
    \n##### 防篡改/篡改证明\n\n- 实际上，移除或重新排列区块链中已最终确定的区块是不可能的。\n- 关于区块链是防篡改还是篡改可证明，仍有争议，但出于所有实际目的，某些攻击者能够移除或重新排列区块或交易的概率几乎为零。这种保证对于所有实际目的来说已经足够好。\n\
    \n##### 有效性\n\n- 只有有效的交易和区块才会被追加到区块链中。\n\n##### 区块链操作的终止保证：`get()`、`append()`、`verify()`\n\
    \n- 最终，所有操作都会终止并返回一个结果。\n\n##### 有序性\n\n- 如果区块 `x` 发生在区块 `y` 之前，且区块 `y` 发生在区块\
    \ `z` 之前，那么区块 `x` 也发生在区块 `z` 之前，形成传递关系。\n- 在实践中，这是一个按时间顺序排列的区块链条。\n- 这是一个有序的账本。\n\
    \n##### 可验证性\n\n- 区块链中的所有交易和区块都是可验证的，并且遵循区块链特定的有效性谓词。任何人都可以验证交易的有效性。\n\n共识特定的属性将在第\
    \ 5 章中详细讨论。\n\n其他一些属性包括可编程性（智能合约支持）、用于机密性和用户隐私的加密账本与匿名性，以及用于在追加新区块上达成一致决策的一致性。\n\
    \n区块链也可以被视为一种状态机复制协议。区块链和状态机看起来很相似；然而，两者存在细微差别。在状态机中，日志中只存储最新状态；而在区块链状态机中，整个历史记录都会被存储，并在查询时可用。\n\
    \n比特币和区块链的发展速度已经超过了互联网。每天有成千上万的用户使用比特币。平均而言，比特币每天处理约 20 万笔交易。在以太坊上，每天处理的交易量粗略超过一百万笔，并且兴趣还在增长。与某些人持有的合理看法相反，我认为说比特币实验已经失败是不正确的。它已经实现了其最初的目标：点对点数字现金。这就是它本来的样子，并且至今仍被用作数字现金平台。比特币也刺激了进一步的创新，像以太坊，以及现在最新的区块链，如\
    \ Polkadot 和 Cardano，都已涌现。随着这种增长水平，我相信在未来八到十年内，几乎所有金融服务都将在区块链上运行，包括一些中央银行数字货币。\n\
    \n## 区块链如何工作\n\n有时，区块链在微观层面的工作方式存在细微差别；然而，在高层面上，所有区块链的工作原理基本相同。下面，我列出了显示区块链工作原理的七个关键步骤：\n\
    \n1. 两个或多个用户之间发生一笔交易。\n2. 该交易被广播到网络。\n3. 交易被验证并添加到交易池中。\n4. 矿工通过将交易添加到区块中来创建一个候选区块。\n\
    5. 矿工竞相解决工作量证明以赢得将区块插入区块链的权利，或者运行共识机制以就交易达成一致。通常，矿工运行工作量证明类型的共识机制以赢得添加区块的权利。在联盟链或私有链中，通常运行传统拜占庭故障或崩溃故障容错算法的变体，该算法通过投票就某个区块达成一致，然后将其插入区块链。\n\
    6. 如果矿工赢得权利，它将区块插入其本地链，并将该区块广播到网络。\n7. 其他节点在验证有效后接受该区块，然后过程重新开始。\n\n此过程可如图 4-3\
    \ 所示。\n\n![](img/515270_1_En_4_Fig3_HTML.jpg)\n\n*区块链算法的流程图，从新交易开始，到节点验证并添加新区块结束。*\n\
    \n**图 4-3** 区块链如何工作\n\n## 区块链的剖析\n\n区块链由区块组成，除了第一个创世区块外，每个区块都链接到其前一个区块。“区块链”这个术语是由中本聪首次在他的比特币代码中使用的。尽管现在它被作为一个词使用，但在他的原始比特币代码中，它被写成两个独立的词：“block\
    \ chain”。它可以被可视化为一个区块链，如图 4-4 所示。\n\n![](img/515270_1_En_4_Fig4_HTML.png)\n\n\
    *区块链的结构图，分为创世区块、区块 1 和区块 2 三列。区块 1 和区块 2 包含前一个区块的头哈希。*\n\n**图 4-4** 区块链的通用结构\n\
    \n其他结构，如有向无环图、哈希图和默克尔树，现在被用于一些现代区块链的分布式账本中，以取代通常基于区块的模型。例如，Avalanche 使用 DAG 进行存储，而不是基于线性区块的结构。当我们将在第\
    \ 8 章中讨论针对这些区块链（分布式账本）的共识协议时，我们将详细介绍这些内容。\n"
- fmt: '### Block


    A block consists of a block header and transactions. A block header is composed
    of several fields. A generic depiction is shown in Figure [4-5](#515270_1_En_4_Chapter.xhtml#Fig5).


    ![](images/515270_1_En_4_Chapter/515270_1_En_4_Fig5_HTML.jpg)


    A structure chart of a block has pointer to previous block’s hash, `nonce`, time
    stamp, and Merkle root under header and list of transactions under body.


    **Figure 4-5** Generic block structure


    Later in this chapter, in the section on blockchains, where I introduce Bitcoin
    and other blockchains, I will discuss a more detailed design of blocks specific
    to that blockchain. However, the structure is fundamentally like a block header
    and transactions, pointing to the previous block by including the hash of the
    last header block in the current block header, thus creating a verifiable linked
    list.


    ### Platforms


    In this section, we will describe two major blockchain platforms, Bitcoin and
    Ethereum.


    #### Bitcoin


    Bitcoin was invented in 2008 as the first blockchain by Satoshi Nakamoto. However,
    it is believed to be a pseudonym as the identity of Satoshi Nakamoto is shrouded
    in mystery. After the introduction of Bitcoin, Satoshi remained active for some
    time but left the community abruptly. Since then, no contact has been made by
    him.


    We discussed the prehistory and attempts to create digital cash and document timestamping
    system before in this chapter. In this section, I will jump straight into technical
    details.


    Bitcoin is a peer-to-peer electronic cash system that solved the double-spending
    problem without requiring a trusted third party. Furthermore, Bitcoin has this
    fantastic property called “inclusive accountability,” which means that anyone
    on the Bitcoin network can verify claims of possession of electronic cash, that
    is, the Bitcoin. This property makes Bitcoin a transparent and verifiable electronic
    cash system.


    The Bitcoin network is composed of nodes. There are three types of nodes in a
    Bitcoin network: miner nodes, full nodes, and light nodes. Miner nodes perform
    mining and keep a full copy of the chain. Bitcoin is a loosely coupled network
    composed of nodes. All nodes communicate with each other using a peer-to-peer
    gossip protocol.


    ##### Bitcoin Node and Architecture


    In practical terms, a node in a distributed system runs the distributed algorithm.
    Similarly, in Bitcoin, a node runs the software client called `Bitcoin Core`.
    It can run on several types of hardware, including Intel and ARM processors. Also,
    the supported operating systems are Mac OS, Linux, and Windows.


    There are primarily three different types of nodes in the Bitcoin network. Full
    nodes keep the entire history of the blockchain. Miner nodes keep the whole history
    and participate in mining to add new blocks to the blockchain. Finally, light
    nodes do not keep a copy of the entire blockchain. Instead, they only download
    the block headers and use a method called simple payment verification to validate
    the authenticity of the transactions. The Bitcoin node architecture is shown in
    Figure [4-6](#515270_1_En_4_Chapter.xhtml#Fig6).


    ![](images/515270_1_En_4_Chapter/515270_1_En_4_Fig6_HTML.jpg)


    A structure chart of a node has RPC, peer discovery, blocks, transaction pool,
    proof of work, validator, storage, cryptography, and networking.


    **Figure 4-6** Bitcoin node architecture


    When a node starts up, it discovers other nodes using a process called node discovery.
    In this process, the node first connects to the seed nodes, which are trusted
    bootstrap nodes maintained by the core developers. After this initial connection,
    further connections are made. At one point, there are `x` connections alive with
    other peers. There is also spam protection built in the Bitcoin protocol, where
    a points-based reputation system scores the nodes based on the connection attempts
    it is trying to make. If a node sends excessive messages to another node, its
    reputation score goes above a threshold of 100 points, and it gets blocked for
    24 hours. The node discovery and handshake between nodes rely on several protocol
    messages. A list is shown in the following with their explanations. In Figure
    [4-7](#515270_1_En_4_Chapter.xhtml#Fig7), you can visualize how node handshake
    and message exchange occurs.


    Some of the most used protocol messages and an explanation of them are listed
    as follows:


    - **Version:** This is the first message that a node sends out to the network,
    advertising its version and block count. The remote node then replies with the
    same information, and the connection is then established.

    - **Verack:** This is the response of the version message accepting the connection
    request.

    - **Inv:** This is used by nodes to advertise their knowledge of blocks and transactions.

    - **Getdata:** This is a response to `inv`, requesting a single block or transaction
    identified by its hash.

    - **Getblocks:** This returns an `inv` packet containing the list of all blocks
    starting after the last known hash or 500 blocks.

    - **Getheaders:** This is used to request block headers in a specified range.

    - **Tx:** This is used to send a transaction as a response to the `getdata` protocol
    message.

    - **Block:** This sends a block in response to the `getdata` protocol message.

    - **Headers:** This packet returns up to 2000 block headers as a reply to the
    `getheaders` request.

    - **Getaddr:** This is sent as a request to get information about known peers.

    - **Addr:** This provides information about nodes on the network. It contains
    the number of addresses and address list in the form of an IP address and port
    number.

    - **Ping:** This message is used to confirm if the TCP/IP network connection is
    active.

    - **Pong:** This message is the response to a `ping` message confirming that the
    network connection is live.


    We can see these messages in use in Figure [4-7](#515270_1_En_4_Chapter.xhtml#Fig7).


    ![](images/515270_1_En_4_Chapter/515270_1_En_4_Fig7_HTML.png)


    A diagram has node A and B exchanging `version`; `verack`; `getaddr`; `ping`;
    `addr`; `getheaders`, `headers`, and `getdata` messages; and multiple blocks.


    **Figure 4-7** Node discovery and handshake diagram + header and block synchronization


    ##### Cryptography in Bitcoin


    Cryptography plays a vital role in the Bitcoin blockchain. The entire security
    of the Bitcoin blockchain is indeed based on cryptography. Although we discussed
    cryptography in Chapter [2](#515270_1_En_2_Chapter.xhtml), I will now describe
    which cryptographic protocols are used in Bitcoin and how.


    ###### Public Keys and Private Keys


    Private keys prove the ownership of bitcoins and users use them to authorize a
    payment by signing the transactions with the private key.


    The `SHA-256` hash function is used in a proof of work algorithm. There is also
    a `Base58` encoder in the Bitcoin client, which is used to encode the addresses
    in a readable format in Bitcoin.


    Wallets in Bitcoin are used to store cryptographic keys. Wallets sign transactions
    using private keys. Private keys are generated by randomly choosing a 256-bit
    number provided by the wallet. A Bitcoin client includes a standard wallet called
    nondeterministic wallet.'
