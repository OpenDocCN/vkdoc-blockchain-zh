  trans: '

    # 量子互联网


    正如 1969 年仅拥有四个节点的 ARPANET 演变为如今承载着数十亿实体^(⁶)的互联网，人们预期小规模的实验性量子网络将成为未来的量子互联网。


    可以预见，我们将构建一个量子网络基础设施，用于互联远程量子设备并实现它们之间的量子通信。量子互联网遵循量子力学定律，负责传输量子比特并分发纠缠量子态。随着量子互联网中节点数量的增长，其量子能力也随之增强。这是因为，当网络中量子设备的数量与量子比特数呈线性增长时，量子互联网能够实现指数级的量子加速，从而形成一个能够解决以往无法解决难题的"虚拟量子计算机"。


    经典网络中存在的传统操作，如长期数据存储、数据复制（拷贝）和直接状态读取，在量子网络中不再适用：


    *   长期数据存储不可能实现，因为量子世界中的退相干现象会迅速破坏信息，使得依赖量子存储器/存储变得非常困难。

    *   由于不可克隆定理禁止复制未知的量子比特，量子世界中的数据复制无法实现。这意味着用于提高网络韧性的常规机制（例如重传）不再适用。但请注意，不可克隆定理是安全通信的一个宝贵特性。

    *   读取量子状态充满挑战，因为任何量子比特在被测量时都会立即坍缩为经典的单一状态（0 或 1）。由于读取量子状态的不确定性以及不可克隆定理，量子比特的直接传输仅限于极少数短距离的特定场景。


    然而，可以利用量子隐形传态来传输量子比特。量子隐形传态是通过一种称为量子纠缠的特性来实现的，我们之前讨论过这一点。利用纠缠，可以将发送方处一个量子比特编码的量子态瞬间传输到接收方处存储的一个量子比特上。令人惊讶的是，这种传输无需物理转移发送方的量子比特。量子纠缠是量子互联网的核心使能技术。


    量子互联网能够实现多种奇特的应用程序，例如盲量子计算、安全通信和无噪声通信。


    # 量子分布式系统 – 分布式量子计算


    随着量子互联网的出现，不难想象量子节点之间也会相互通信，以协作并采用分布式计算方法共同解决某些问题。这一发展将不可避免地导致分布式量子系统或分布式量子计算的出现。


    我们可以考虑一种分层方法：最底层是由经典链路和量子链路组成的网络层。在其之上是一层运行着量子计算机的层级。再往上是本地和远程操作，包括本地量子操作和针对量子比特的远程操作。通过结合所有这些操作和底层的计算层，可以构想出一台虚拟量子计算机，它整合了所有量子比特，形成一个可扩展的虚拟量子计算机。然后需要一个控制器或分布式量子编译器，将量子算法翻译成一系列本地和远程操作。最后是最顶层，用于运行量子算法。这种分层方法可参见图
    9-10。


    ![](img/515270_1_En_9_Fig10_HTML.jpg)


    一个区块链生态系统包含 6 层：量子算法、分布式编译器、虚拟处理器、操作、量子计算机和网络。


    **图 9-10** 一个抽象的量子区块链生态系统


    # 量子区块链


    随着量子互联网和量子分布式系统的出现，我们不可避免地可以构想出一种量子区块链，它利用量子计算机作为节点，并将底层的量子互联网作为通信层。


    在量子世界中，区块链有两个方面。第一个是运行在量子互联网之上的纯量子区块链。在这方面已经取得了一些进展，Rajan 和 Visser 提出了一项创新方案，将区块链编码到一个时间纠缠
    GHZ 态中。


    另一个方面是后量子世界中经典区块链的存在性。由于能够破解经典密码学，量子计算机可能对区块链的安全性和共识机制产生不利影响。本章最后一节将对此进行更多讨论。


    一个量子区块链可以包含多个元素。量子区块链可以同时拥有经典和量子的通道及设备。在上一节讨论的分布式量子计算生态系统中，它可以作为"分布式量子算法"层中的一种量子算法（以及其他算法）而存在。


    我们在上一节详细阐述了一种分层方法。我们可以设想区块链和其他算法运行在最顶层。整个分层方法代表了基于量子互联网的分布式量子计算生态系统。


    另一个元素可能是量子交易协调器，负责交易的排序和分发。另一方面，通过使用盲量子计算，量子区块链可以立即实现无与伦比的隐私性，这将使需要隐私保护的量子级区块链应用成为可能，例如金融、医疗和政府相关的应用。

    '
- fmt: '### Quantum Cryptography


    Quantum cryptography is indeed the most talked-about aspect of quantum computing,
    especially from the point of view of the impact that it can have on existing cryptography.
    There are two dimensions here; one is quantum cryptography, and the other is post-quantum
    cryptography.


    Quantum cryptography refers to cryptography primitives or techniques that are
    based on properties of quantum mechanics. For example, quantum key distribution,
    quantum coin flipping, and quantum commitment. Using quantum properties, a new
    type of unconditionally secure mechanisms can be developed, which have no counterpart
    in the classical world. Quantum key distribution (QKD) protocols, such as `BB84`,
    were proposed by Bennett and Brassard in 1984, which allow two parties to construct
    private keys securely using qubits. The benefit of this quantum scheme is that
    due to superposition any adversary trying to eavesdrop will inevitably be detected.


    The other dimension of the study of quantum cryptography is the impact of quantum
    computers on classical cryptography. We know that using Shor’s algorithm, the
    discrete log problem can be solved, and integer factorization can be sped up,
    which can result in breaking commonly used public key cryptography schemes, such
    as `RSA` and elliptic curve cryptography. Not so much impact is expected on symmetric
    cryptography because simply key lengths can be increased to ensure that exhaustive
    searches `*O*(*n*)` in the classic world and `O(\sqrt{n})` using quantum techniques
    made possible by Grover’s algorithm or similar no longer are effective.


    Several approaches have been studied for post-quantum cryptography, including
    lattice-based cryptography, code-based cryptography, multivariate cryptography,
    hash-based cryptography, and isogeny-based cryptography.


    As blockchain consensus mechanisms use cryptography, which is known to be impacted
    by quantum computing, it is essential that the blocks produced today are quantum
    resistant so that when quantum computers can do so, they cannot rewrite the entire
    history of a blockchain. For example, Bitcoin uses the digital signature scheme
    `ECDSA`, which quantum computers can break. If quantum technology becomes capable
    of breaking `ECDSA` even in ten years, they can still move funds around due to
    broken `ECDSA`. Therefore, there is a need to address this issue and apply some
    quantum resistance to already produced and future blocks. If quantum technology
    becomes capable of breaking `ECDSA` in future, an adversary cannot rewrite the
    block history. Bitcoin generally is not quantum safe, and Lamport signatures have
    been proposed to alleviate this issue. Note that Bitcoin is secure for the foreseeable
    future, and the quantum computer required to break ECC is still decades away.
    To break the 256-bit ECC encryption within one hour, 317 × 10⁶ physical qubits[⁷](#fn7)
    are required. However, currently the most qubits we have today are only 127 on
    IBM’s 127-qubit Eagle processor. So breaking elliptic curve cryptography is not
    going to be a reality any time soon.


    So far, we have discussed what quantum computing is and what effect it can have
    on classical computing. We also covered some applications of quantum computing
    and relevant technical details such as gates and circuits. One thing is clear:
    quantum computing is going to revolutionize the world soon, and a tremendous effort
    is already being put into making the technology grow and become mainstream.


    With all this revolutionary advancement in quantum computing, a natural question
    arises whether it is possible to harness this power and apply it to solve distributed
    computing problems, especially the consensus problem. Can we make consensus faster,
    can we circumvent FLP in some novel way, or does FLP even apply in the quantum
    world? Is there a quantum solution for the Byzantine generals problem? How can
    quantum computing help in distributed systems? Can it increase its efficiency?
    Can quantum consensus tolerate any number of dishonest parties, and no usual lower
    bounds apply? Can blockchains benefit from this advancement and improve blockchain
    consensus and other aspects of blockchains, such as cryptography, security, efficiency,
    and scalability? We answer these questions in the next section.'
