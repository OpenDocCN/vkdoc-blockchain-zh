    \ l, k, i> message to the primary of the next view\n\n2.  When the new primary\
    \ gets f+1 of the DOVIEWCHANGE message, it\n    1.  Chooses the most recent log\
    \ in the message and picks that as its new log\n\n    2.  Sets the op number to\
    \ that of the latest entry in the new log\n\n    3.  Changes its status to normal\n\
    \n    4.  Sends the <STARTVIEW v, l, k> message to other replicas, indicating\
    \ the completion of the view change process\n\n3.  Now the new primary\n    1.\
    \  Sequentially executes any unexecuted committed operations\n\n    2.  Sends\
    \ a reply to the client\n\n    3.  Starts accepting new client requests\n\n4.\
