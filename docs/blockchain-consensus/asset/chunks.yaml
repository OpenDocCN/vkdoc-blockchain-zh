- fmt: "### Digital Cash Creation Attempts\n\nThere are several attempts to create\
    \ digital cash in the past. For example, David Chaum invented blind signatures\
    \ and used secret sharing mechanisms to create digital cash. Blind signatures\
    \ enabled signing without revealing what is being signed, which provided anonymity,\
    \ and secret sharing allowed detection of double-spending.\n\n`B-money` is another\
    \ electronic cash scheme that was invented in 1998 by Wei Dai. This original idea\
    \ mentions many ideas that can be considered direct precursors to Bitcoin. It\
    \ was a novel idea; however, it required trusted servers. It also introduced possible\
    \ solutions to cooperate between untraceable pseudonymous entities with a medium\
    \ of exchange and a method to enforce contracts. The idea of each server depositing\
    \ a certain amount in a special account and using this for penalties and rewards\
    \ is very close to the concept that we know as proof of stake today. Similarly,\
    \ the idea of solving a previously unsolved computational problem is what we know\
    \ today as proof of work.\n\nAnother electronic cash proposal is `BitGold`, introduced\
    \ by Nick Szabo. `Bitgold` can be seen as a direct precursor of Bitcoin. The `Bitgold`\
    \ proposal emphasized no dependence on trusted third parties and proof of work\
    \ by solving a “challenge string.”\n\nOn the other hand, progress and development\
    \ in cryptography and computer technology generally resulted in several advances\
    \ and innovative applications. Some of these advances related to the blockchain\
    \ are digital timestamping of documents, email spam protection, and reusable proof\
    \ of work.\n\nThe work on timestamping of digital documents to create an ordered\
    \ chain of documents (hashes) by using a timestamping service was first proposed\
    \ by Haber and Stornetta. This idea is closely related to the chain of blocks\
    \ in a blockchain. However, the timestamping service is centralized and needs\
    \ to be trusted.\n\nThe origins of proof of work based on hash functions used\
    \ in Bitcoin can be found in previous work by Dwork and Naor to use proof of work\
    \ to thwart email spam. Adam Back invented the `Hashcash` proof of work scheme\
    \ for email spam control. Moreover, Hal Finney introduced reusable proof of work\
    \ for token money, which used `Hashcash` to mint a new PoW token.\n\nAnother technology\
    \ that contributed to the development of Bitcoin is cryptography. Cryptographic\
    \ primitives and tools like hash functions, Merkle trees, and public key cryptography\
    \ all played a vital role in the development of Bitcoin. We covered cryptography\
    \ in Chapter [2](#515270_1_En_2_Chapter.xhtml) in detail.\n\nFigure [4-1](#515270_1_En_4_Chapter.xhtml#Fig1)\
    \ illustrates this fusion of different techniques.\n\n![](images/515270_1_En_4_Chapter/515270_1_En_4_Fig1_HTML.jpg)\n\
    \nA diagram has 2 down arrows labeled with different techniques. The two arrows\
    \ are pointing to the label bitcoin.\n\nFigure 4-1\n\nTechnologies leading to\
    \ Bitcoin\n\n#### The First Blockchain?\n\nWhen Bitcoin was revealed, the blockchain\
    \ was introduced as a base operating layer for Bitcoin cryptocurrency. Still operational\
    \ today, this is the first public blockchain. Soon after, the innovation started,\
    \ and many different blockchains emerged – some for a specific purpose, some for\
    \ cryptocurrencies, and quite a few for enterprise use cases. In the next section,\
    \ we will look at different types of blockchain.\n\n## Benefits of Blockchain\n\
    \nMultiple benefits of blockchain technology are envisaged, and a lot has been\
    \ accomplished since the invention of Bitcoin. Especially with the advent of Ethereum,\
    \ a programmable platform is available where smart contracts can implement any\
    \ logic, which resulted in increased utility and paved the path for further adoption.\
    \ Today, one of the most talked-about applications of the blockchain, decentralized\
    \ finance, or DeFi for short, is seen as a significant disruptor of the current\
    \ financial system. Non-fungible tokens (NFTs) are another application that has\
    \ gained explosive popularity. NFTs on the blockchain enable tokenization of assets.\
    \ Currently, there is almost 60 billion USD worth of value locked in the DeFi\
    \ ecosystem. This huge investment is a testament that the blockchain has now become\
    \ part of our economy. You can track this metric at [`https://defipulse.com/`](https://defipulse.com/).\n\
    \nNow I list some of the most prominent benefits of the blockchain:\n\n- Cost\
    \ saving\n    - Due to streamlining of processes, transparency, and single data\
    \ sharing platform which comes with security guarantees, the blockchain can result\
    \ in cost saving. Also, there is no need to create separate secure infrastructure;\
    \ users can use an already existing secure blockchain network with an entry-level\
    \ computer running the blockchain software client.\n\n- Transparency\n    - As\
    \ all transactions are public and anyone can verify the transactions, the blockchain\
    \ introduces transparency.\n\n- Auditability\n    - Due to immutable history of\
    \ records, blockchains provide a natural platform for auditing purposes.\n\n-\
    \ Speed and efficiency\n    - As all parties involved in a transaction are part\
    \ of the same network, the speed of transaction dealing between multiple parties\
    \ is increased. However, note that the transactions per second in a public blockchain\
    \ are quite low, for example, three to seven in Bitcoin; however, in consortium\
    \ blockchains, it’s much better, and with parties directly interacting with each\
    \ other, it increases the overall efficiency of the transaction.\n\n- Security\n\
    \    - Blockchains are based on cryptographic protocols which ensure integrity\
    \ and authenticity of the blockchain, thus providing a secure platform for transactions.\n\
    \nThere are many use cases in different industries:\n\n- Supply chain\n- Government\n\
    - Medicine/health\n- Finance\n- IoT – Internet of Things\n- Trading\n- Identity\n\
    - Insurance\n\nNext, we discuss the different types of blockchain."
  raw: "### Digital Cash Creation Attempts\n\nThere are several attempts to create\
    \ digital cash in the past. For example, David Chaum invented blind signatures\
    \ and used secret sharing mechanisms to create digital cash. Blind signatures\
    \ enabled signing without revealing what is being signed, which provided anonymity,\
    \ and secret sharing allowed detection of double-spending.\n\nB-money is another\
    \ electronic cash scheme that was invented in 1998 by Wei Dai. This original idea\
    \ mentions many ideas that can be considered direct precursors to Bitcoin. It\
    \ was a novel idea; however, it required trusted servers. It also introduced possible\
    \ solutions to cooperate between untraceable pseudonymous entities with a medium\
    \ of exchange and a method to enforce contracts. The idea of each server depositing\
    \ a certain amount in a special account and using this for penalties and rewards\
    \ is very close to the concept that we know as proof of stake today. Similarly,\
    \ the idea of solving a previously unsolved computational problem is what we know\
    \ today as proof of work.\n\nAnother electronic cash proposal is **BitGold**,\
    \ introduced by Nick Szabo. Bitgold can be seen as a direct precursor of Bitcoin.\
    \ The Bitgold proposal emphasized no dependence on trusted third parties and proof\
    \ of work by solving a “challenge string.”\n\nOn the other hand, progress and\
    \ development in cryptography and computer technology generally resulted in several\
    \ advances and innovative applications. Some of these advances related to the\
    \ blockchain are digital timestamping of documents, email spam protection, and\
    \ reusable proof of work.\n\nThe work on timestamping of digital documents to\
    \ create an ordered chain of documents (hashes) by using a timestamping service\
    \ was first proposed by Haber and Stornetta. This idea is closely related to the\
    \ chain of blocks in a blockchain. However, the timestamping service is centralized\
    \ and needs to be trusted.\n\nThe origins of proof of work based on hash functions\
    \ used in Bitcoin can be found in previous work by Dwork and Naor to use proof\
    \ of work to thwart email spam. Adam Back invented the Hashcash proof of work\
    \ scheme for email spam control. Moreover, Hal Finney introduced reusable proof\
    \ of work for token money, which used Hashcash to mint a new PoW token.\n\nAnother\
    \ technology that contributed to the development of Bitcoin is cryptography. Cryptographic\
    \ primitives and tools like hash functions, Merkle trees, and public key cryptography\
    \ all played a vital role in the development of Bitcoin. We covered cryptography\
    \ in Chapter [2](#515270_1_En_2_Chapter.xhtml) in detail.\n\nFigure [4-1](#515270_1_En_4_Chapter.xhtml#Fig1)\
    \ illustrates this fusion of different techniques.\n\n![](images/515270_1_En_4_Chapter/515270_1_En_4_Fig1_HTML.jpg)\n\
    \nA diagram has 2 down arrows labeled with different techniques. The two arrows\
    \ are pointing to the label bitcoin.\n\nFigure 4-1\n\nTechnologies leading to\
    \ Bitcoin\n\n#### The First Blockchain?\n\nWhen Bitcoin was revealed, the blockchain\
    \ was introduced as a base operating layer for Bitcoin cryptocurrency. Still operational\
    \ today, this is the first public blockchain. Soon after, the innovation started,\
    \ and many different blockchains emerged – some for a specific purpose, some for\
    \ cryptocurrencies, and quite a few for enterprise use cases. In the next section,\
    \ we will look at different types of blockchain.\n\n## Benefits of Blockchain\n\
    \nMultiple benefits of blockchain technology are envisaged, and a lot has been\
    \ accomplished since the invention of Bitcoin. Especially with the advent of Ethereum,\
    \ a programmable platform is available where smart contracts can implement any\
    \ logic, which resulted in increased utility and paved the path for further adoption.\
    \ Today, one of the most talked-about applications of the blockchain, decentralized\
    \ finance, or DeFi for short, is seen as a significant disruptor of the current\
    \ financial system. Non-fungible tokens (NFTs) are another application that has\
    \ gained explosive popularity. NFTs on the blockchain enable tokenization of assets.\
    \ Currently, there is almost 60 billion USD worth of value locked in the DeFi\
    \ ecosystem. This huge investment is a testament that the blockchain has now become\
    \ part of our economy. You can track this metric at [`https://defipulse.com/`](https://defipulse.com/).\n\
    \nNow I list some of the most prominent benefits of the blockchain:\n\n*   Cost\
    \ saving\n    *   Due to streamlining of processes, transparency, and single data\
    \ sharing platform which comes with security guarantees, the blockchain can result\
    \ in cost saving. Also, there is no need to create separate secure infrastructure;\
    \ users can use an already existing secure blockchain network with an entry-level\
    \ computer running the blockchain software client.\n\n*   Transparency\n    *\
    \   As all transactions are public and anyone can verify the transactions, the\
    \ blockchain introduces transparency.\n\n*   Auditability\n    *   Due to immutable\
    \ history of records, blockchains provide a natural platform for auditing purposes.\n\
    \n*   Speed and efficiency\n    *   As all parties involved in a transaction are\
    \ part of the same network, the speed of transaction dealing between multiple\
    \ parties is increased. However, note that the transactions per second in a public\
    \ blockchain are quite low, for example, three to seven in Bitcoin; however, in\
    \ consortium blockchains, it’s much better, and with parties directly interacting\
    \ with each other, it increases the overall efficiency of the transaction.\n\n\
    *   Security\n    *   Blockchains are based on cryptographic protocols which ensure\
    \ integrity and authenticity of the blockchain, thus providing a secure platform\
    \ for transactions.\n\nThere are many use cases in different industries:\n\n*\
    \   Supply chain\n\n*   Government\n\n*   Medicine/health\n\n*   Finance\n\n*\
    \   IoT – Internet of Things\n\n*   Trading\n\n*   Identity\n\n*   Insurance\n\
    \nNext, we discuss the different types of blockchain."
  trans: "\n### 数字现金的创建尝试\n\n历史上曾有多次创建数字现金的尝试。例如，大卫·乔姆发明了盲签名，并利用秘密共享机制来创建数字现金。盲签名能够在不透露签名内容的情况下进行签名，从而提供了匿名性，而秘密共享机制则允许检测双重支付。\n\
    \n`B-money` 是另一种电子现金方案，由戴伟于 1998 年发明。这一原始构想中提到了许多可被视为比特币直接先驱的想法。它是一个新颖的构想，但需要依赖受信任的服务器。它还提出了在不可追踪的匿名实体之间，通过一种交换媒介进行协作，以及强制执行合约的方法。每个服务器在特殊账户中存入一定金额，并用于奖惩的想法，非常接近我们今天所知的权益证明概念。同样，解决一个先前未被解决的计算问题的想法，就是我们今天所说的工作量证明。\n\
    \n另一个电子现金提案是尼克·萨博提出的 `BitGold`。`Bitgold` 可以被视为比特币的直接前身。`Bitgold` 提案强调不依赖受信任的第三方，并通过解决“挑战字符串”来实行工作量证明。\n\
    \n另一方面，密码学和计算机技术的进步与发展通常带来了多项进展和创新应用。其中一些与区块链相关的进步包括数字文档时间戳、电子邮件垃圾邮件防护以及可重用工作量证明。\n\
    \n使用时间戳服务对数字文档进行时间戳以创建有序文档（哈希）链的工作，最早由哈伯和斯托内塔提出。这一想法与区块链中的区块链密切相关。然而，这种时间戳服务是中心化的，并且需要被信任。\n\
    \n比特币中使用的基于哈希函数的工作量证明的起源，可以在德沃克和诺尔先前利用工作量证明来阻止电子邮件垃圾邮件的工作中找到。亚当·拜克发明了用于控制电子邮件垃圾邮件的\
    \ `Hashcash` 工作量证明方案。此外，哈尔·芬尼引入了用于代币货币的可重用工作量证明，该方案使用了 `Hashcash` 来铸造新的工作量证明代币。\n\
    \n另一项对比特币发展有所贡献的技术是密码学。哈希函数、默克尔树和公钥密码学等密码学原语和工具，都在比特币的发展中扮演了至关重要的角色。我们在第二章 2 中详细介绍了密码学。\n\
    \n图 4-1 展示了不同技术的融合。\n\n![](img/515270_1_En_4_Fig1_HTML.jpg)\n\n该图包含两个向下的箭头，分别标有不同的技术。这两个箭头都指向“比特币”标签。\n\
    \n图 4-1\n\n催生比特币的技术\n\n#### 第一个区块链？\n\n当比特币问世时，区块链作为比特币加密货币的基础运行层被引入。至今仍在运行的它，是第一个公共区块链。不久之后，创新开始涌现，许多不同的区块链出现了——有的用于特定目的，有的用于加密货币，还有相当一部分用于企业用例。在下一节中，我们将探讨不同类型的区块链。\n\
    \n## 区块链的优势\n\n人们设想了区块链技术的多种优势，自比特币发明以来已取得了诸多成就。特别是随着以太坊的出现，一个可编程的平台诞生了，智能合约可以在其上实现任意逻辑，这增加了其效用，并为进一步采用铺平了道路。今天，区块链最受关注的应用之一——去中心化金融（简称\
    \ DeFi）——被视为当前金融体系的重大颠覆者。非同质化代币是另一个获得爆炸性流行的应用。区块链上的非同质化代币实现了资产的代币化。目前，DeFi 生态系统中锁定的价值接近\
    \ 600 亿美元。这笔巨额投资证明了区块链已经成为我们经济的一部分。您可以在 [`https://defipulse.com/`](https://defipulse.com/)\
    \ 上追踪这一指标。\n\n现在，我列出区块链最突出的一些优势：\n\n- 成本节约\n    - 由于流程简化、透明度提高以及具有安全保障的单一数据共享平台，区块链可以带来成本节约。同时，无需创建单独的安全基础设施；用户可以使用已经存在的安全区块链网络，只需一台运行区块链软件客户端的入门级计算机即可。\n\
    \n- 透明度\n    - 由于所有交易都是公开的，任何人都可以验证交易，因此区块链引入了透明度。\n\n- 可审计性\n    - 由于记录历史的不可篡改性，区块链为审计目的提供了一个天然的平台。\n\
    \n- 速度与效率\n    - 由于交易中的所有参与方都属于同一个网络，多方之间的交易处理速度得以提高。但请注意，公共区块链中的每秒交易量相当低，例如比特币每秒只能处理三到七笔；然而，在联盟链中，情况要好得多，并且由于参与方直接相互交互，提高了交易的总体效率。\n\
    \n- 安全性\n    - 区块链基于密码学协议，这些协议确保了区块链的完整性和真实性，从而为交易提供了一个安全的平台。\n\n以下不同行业中有许多使用案例：\n\
    \n- 供应链\n- 政府\n- 医药/健康\n- 金融\n- 物联网\n- 交易\n- 身份\n- 保险\n\n接下来，我们将讨论不同类型的区块链。\n"
- fmt: "# Types of Blockchain\n\nThere are several types of blockchains. The original\
    \ blockchain introduced with Bitcoin is a public blockchain:\n\n* Public blockchain\
    \ or permissionless blockchain\n* Permissioned blockchain\n  * Private blockchain\n\
    * Consortium or enterprise blockchain\n* Application-specific blockchain\n* Heterogeneous\
    \ multichain\n\nA **public blockchain**, as the name suggests, is a **permissionless\
    \ blockchain**. There is no restriction on participating in the network. All that\
    \ is required is to download a software client and run it to become part of the\
    \ network. Usually, these types of blockchains are used for cryptocurrencies,\
    \ such as Bitcoin and Ethereum.\n\nThere are two types of **permissioned blockchains**.\
    \ **Private blockchains** are in control of only one organization and are usually\
    \ run within an organization. On the other hand, **consortium blockchains** or\
    \ **enterprise blockchains** are permissioned blockchains where multiple organizations\
    \ participate in the blockchain’s governance. Enterprises commonly use consortium\
    \ chains for specific enterprise use cases.\n\nWe can also further classify chains\
    \ that stakeholders may have only developed for a single purpose. We can call\
    \ them **application-specific blockchains**. For example, a blockchain developed\
    \ only for a single type of cryptocurrency. In a way, Bitcoin is an application-specific\
    \ blockchain, with only one application, Bitcoin cryptocurrency. Similarly, suppose\
    \ an organization runs a private blockchain for a specific purpose, such as an\
    \ audit function. In that case, it can also be classified as an application-specific\
    \ blockchain, as it has only been developed for a single specific purpose.\n\n\
    However, in practice, blockchains serve as a generic platform that guarantees\
    \ a consistent, secure, tamper-resistant, and ordered ledger of records, making\
    \ it suitable for a wide variety of applications. Also, depending on the design,\
    \ multiple applications can run on a single blockchain. For example, Ethereum\
    \ can run different programs called smart contracts on it, making it a general-purpose\
    \ blockchain platform. A blockchain that has been developed for a specific single\
    \ use case can be called application-specific blockchain, or `ASBC` for short.\n\
    \nBlockchains are also shared data platforms where multiple organizations can\
    \ share data in a tamper-resistant manner, ensuring data integrity. However, this\
    \ sharing can be achieved if there is only one standard blockchain, but many different\
    \ blockchains have emerged since the advent of Ethereum. This variety has resulted\
    \ in a problem where one blockchain runs a different protocol and cannot share\
    \ its data with another blockchain. This disconnect creates a situation where\
    \ each blockchain is a silo. To solve this issue, the organization that wants\
    \ to join a consortium network must either use the software client specific to\
    \ that blockchain or somehow devise a complex interoperability mechanism. This\
    \ problem is well understood, and a lot of work is underway regarding novel interoperability\
    \ protocols. Also, new types of blockchains, such as **heterogeneous multichains**\
    \ and sharding-based approaches, are emerging. One prime example is Polkadot,\
    \ a replicated sharded state machine where heterogenous chains can talk to each\
    \ other through a so-called relay chain. Another effort is Ethereum 2.0, where\
    \ sharded chains serve as a mechanism to provide scalability and cross-shard interoperability.\
    \ Cardano is another blockchain that is on course to provide scalability and interoperability\
    \ between chains. With all these platforms and the pace of the work in progress\
    \ to realize these ideas, we can envisage that in the next eight to ten years,\
    \ these blockchains and others will be running just like we have the Internet\
    \ today with seamless data sharing between different chains. The chains that facilitate\
    \ such a level of natural interoperability, giving rise to an ecosystem of multiple\
    \ interoperating, general-purpose enterprise chains and `ASBC`s, are called **heterogeneous\
    \ multichains**.\n\nNow let’s clarify an ambiguity. You might have heard the term\
    \ “distributed ledger,” which is sometimes used to represent a blockchain. While\
    \ both terms, blockchain and distributed ledger, are used interchangeably, there’s\
    \ a difference. The distributed ledger is an overarching term describing a ledger\
    \ with distributed properties. Blockchains fall under this umbrella. A blockchain\
    \ is a distributed ledger, but not all distributed ledgers are a blockchain. For\
    \ example, some distributed ledgers do not use blocks composed of transactions\
    \ in their blockchain construction. Instead, they treat transaction records individually\
    \ and store them as such. Usually, however, in most distributed ledgers, blocks\
    \ are used as containers for a batch of transactions and several other elements\
    \ such as block header, which also contains several components. Such use of blocks\
    \ to bundle transactions makes them a blockchain.\n\n## Blockchain Is a Distributed\
    \ System\n\nA blockchain is a distributed system. As such, it should be defined\
    \ and reasoned about in the light of distributed computing. Furthermore, this\
    \ formal description allows for better reasoning.\n\nWe discussed the `CAP` theorem\
    \ in Chapter [1](#515270_1_En_1_Chapter.xhtml). Therefore, we can analyze the\
    \ blockchain through the `CAP` theorem to ascertain what type of system it is.\n\
    \n### CAP and Permissionless Blockchain\n\nPermissionless blockchains are `AP`\
    \ (availability and partition tolerance) blockchains because consistency is somewhat\
    \ sacrificed in favor of availability. We could argue that eventual consistency\
    \ is achieved, but as consistency (agreement) is sacrificed in favor of availability,\
    \ we can say that permissionless or public blockchains are `AP` systems. For example,\
    \ Ethereum and Bitcoin are `AP` systems. This is the case due to the proof of\
    \ work (PoW) type of probabilistic consensus.\n\n### CAP and Permissioned Blockchain\n\
    \nPermissioned blockchains are `CP` (consistency and partition tolerance) systems\
    \ because availability is sacrificed in favor of consistency. This is the case\
    \ because almost all permissioned blockchains use traditional `BFT` protocols,\
    \ where if a threshold of nodes is faulty, then the whole system stalls until\
    \ the faults are resolved, and then the system continues to operate. For example,\
    \ in a five-node network, if three nodes go down, the system doesn’t progress\
    \ unless the other nodes come back online. Similarly, in the case of partitioning\
    \ between subsets of two and three nodes, the system doesn’t make progress unless\
    \ the partition heals. This is the case due to the use of traditional `BFT` algorithms,\
    \ such as `PBFT`. The requests coming from the clients are processed only if there’s\
    \ a majority of honest nodes. In other words, if the system falls below `3f+1`\
    \ in the case of Byzantine fault tolerance, the system immediately degrades to\
    \ nonfunctional.\n\nWe can visualize both these concepts in Figure [4-2](#515270_1_En_4_Chapter.xhtml#Fig2).\n\
    \n![](images/515270_1_En_4_Chapter/515270_1_En_4_Fig2_HTML.png)\n\nA triangle\
    \ is labeled consistency `C`, partition-tolerance `P`, and availability `A` on\
    \ its vertices and `C P` between `C` and `P` and `A P` between `A` and `P`.\n\n\
    **Figure 4-2** CAP theorem and blockchain\n\nNext, we describe blockchain ledger\
    \ abstraction which is an abstract view of a blockchain."
