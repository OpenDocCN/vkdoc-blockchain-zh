- fmt: '### Advanced Encryption Standard


    `AES` was originally named `Rijndael`, after its inventors’ names Joan Daemen
    and Vincent Rijmen. It was standardized as Advanced Encryption Standard (`AES`)
    by `NIST` in 2001 after an open competition.


    In the original version of `Rijndael`, different key and block sizes of 128 bits,
    192 bits, and 256 bits are allowed. However, only a 128-bit block size and key
    sizes of 128 bits, 192 bits, and 256 bits are allowed in `AES`.


    `AES` processes an array of bytes of size 4 x 4 called `state` in multiple rounds
    depending on the key size. For example, if the key length is 128 bits, 10 rounds
    are required; for 192 bits, it needs 12 rounds; and for 256 bits, it needs 14
    rounds.


    After `state` initialization using the input plaintext, `AES` sequentially performs
    the following four operations to produce the ciphertext:


    - **AddRoundKey**: First, the `state` array is XORed with a subkey derived from
    the master key.

    - **SubBytes**: This step performs byte substitution where a fixed lookup table
    (S-box) is used to replace all bytes of the 4 x 4 `state` array.

    - **ShiftRows**: This step shifts each row to the left in the `state` array in
    a cyclic and incremental manner. The first row is excluded, the second row is
    shifted left by one byte, the third row is shifted left by two bytes, and the
    fourth row is shifted left by three bytes or positions.

    - **MixColumns**: Finally, all bytes are mixed in a linear fashion (i.e., linear
    transformation), where four bytes of the column are taken as input by this function,
    and four new bytes are produced as output which replaces the input column.


    The abovementioned four steps form a single round of `AES`. In the final round,
    step 4 (`MixColumns`) is not performed. Instead, it is replaced with the `AddRoundKey`
    step to ensure that the first three steps cannot be simply reversed. This process
    is shown in Figure [2-9](#515270_1_En_2_Chapter.xhtml#Fig9).


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig9_HTML.png)


    A schematic of an `AES` block cipher in 3 stages, namely, internal state, rounds,
    10/12/14, and final round to obtain ciphertext.


    **Figure 2-9** `AES` block cipher


    ### Some Basic Mathematics


    Before we dive into cryptography, it is important to understand some very basic
    mathematics and related terminology.


    #### Prime


    A prime is a number which is only divisible fully by itself and 1. For example,
    23 is a prime number as it can only be divided precisely without leaving any remainder
    either by 23 or 1.


    #### Modular Arithmetic


    It is a system of performing arithmetic operations on integers where numbers wrap
    around when they reach a certain fixed number. This fixed number is called a modulus,
    and all arithmetic operations are performed based on this modulus.


    #### Group


    A group `G` is a set whose elements can be combined with an operation `∘`. It
    has the following properties:


    - **Closure** means that all group operations are closed. Formally, ∀`a`, `b`
    ∈ `G`: `a` ∘ `b` = `c` ∈ `G`.

    - **Associativity** means that all group operations are associative. Formally,
    `a` ∘ (`b` ∘ `c`) = (`a` ∘ `b`) ∘ `c`: ∀ `a`, `b`, `c` ∈ `G`.

    - There exists a special **identity** element `i` such that ∀`a` ∈ `G`: `a` ∘
    `i` = `i` ∘ `a` = `a`.

    - In each element `a` ∈ `G`, there is a corresponding **inverse** element `a^(-1)`
    such that `a` ∘ `a^(-1)` = `a^(-1)` ∘ `a` = `i`.


    #### Abelian Group


    A group is a commutative or abelian group if in addition to the abovementioned
    properties of groups, ∀`a`, `b` ∈ `G`: `a` ∘ `b` = `b` ∘ `a`.


    #### Field


    A field `F` is a set with two operations on `F` called addition and multiplication.


    #### Finite Field (Galois Field)


    A finite field is a field with a finite number of elements.


    #### Prime Fields


    A prime field is a finite field containing a prime number of elements.


    #### Generator


    A generator is a point on an elliptic curve.


    ### Public Key Cryptography


    Public key cryptographic systems use two different keys for encryption and decryption.
    The public key is known openly, and the private key must remain secret. In these
    systems, the sender uses the recipient’s public key to encrypt data. The recipient
    decrypts the ciphertext by using the corresponding private key.


    This model is shown in Figure [2-10](#515270_1_En_2_Chapter.xhtml#Fig10).


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig10_HTML.png)


    A schematic of a cryptosystem. Plaintext from sender and public key is sent to
    the encryption. Ciphertext and private key are sent to the decryption.


    **Figure 2-10** Public key cryptography–based cryptosystem


    A fundamental issue in symmetric key systems is that they need a secret key to
    be shared before the communication using a secure channel, which can be challenging
    to achieve. Another issue with symmetric key systems is key management. The number
    of keys grows exponentially as the number of users grows in the system. An `n`
    user network will need `n(n-1)/2` keys where each user will store `n-1` keys.
    In a 100-user network, each user will store 99 keys. The formula `100(100-1)/2`
    means there are 4950 keys in total, which is quite tricky to manage practically.
    Public key cryptography solves this issue of key distribution and key management.


    A typical use of public key cryptography is to establish a shared secret key between
    two parties. This shared secret key is used by symmetric algorithms, such as `AES`,
    to encrypt the data. As they have already established a secret key, both parties
    can then encrypt and decrypt without ever transmitting the secret key on the wire.
    This way, the parties get the high security of public key cryptography with the
    speed of symmetric encryption. Asymmetric cryptography is not used much for bulk
    encryption due to slow performance; however, this is the norm for key establishment.
    Such systems where a symmetric key is used to encrypt the data and a secret key
    is encrypted using public key cryptography are called hybrid cryptosystems. For
    example, the Integrated Encryption Scheme is a hybrid encryption scheme. `ECIES`
    is the elliptic curve (EC) version of the `IES` scheme.'
  raw: '### Advanced Encryption Standard


    AES was originally named Rijndael, after its inventors’ names Joan Daemen and
    Vincent Rijmen. It was standardized as Advanced Encryption Standard (AES) by NIST
    in 2001 after an open competition.


    In the original version of Rijndael, different key and block sizes of 128 bits,
    192 bits, and 256 bits are allowed. However, only a 128-bit block size and key
    sizes of 128 bits, 192 bits, and 256 bits are allowed in AES.


    AES processes an array of bytes of size 4 x 4 called state in multiple rounds
    depending on the key size. For example, if the key length is 128 bits, 10 rounds
    are required; for 192 bits, it needs 12 rounds; and for 256 bits, it needs 14
    rounds.


    After state initialization using the input plaintext, AES sequentially performs
    the following four operations to produce the ciphertext:


    *   **AddRoundKey**: First, the state array is XORed with a subkey derived from
    the master key.


    *   **SubBytes**: This step performs **byte substitution** where a fixed lookup
    table (S-box) is used to replace all bytes of the 4 x 4 state array.


    *   **ShiftRows**: This step shifts each row to the left in the state array in
    a cyclic and incremental manner. The first row is excluded, the second row is
    shifted left by one byte, the third row is shifted left by two bytes, and the
    fourth row is shifted left by three bytes or positions.


    *   **MixColumns**: Finally, all bytes are mixed in a linear fashion (i.e., linear
    transformation), where four bytes of the column are taken as input by this function,
    and four new bytes are produced as output which replaces the input column.


    The abovementioned four steps form a single round of AES. In the final round,


    step 4 (MixColumns) is not performed. Instead, it is replaced with the AddRoundKey
    step to ensure that the first three steps cannot be simply reversed. This process
    is shown in Figure [2-9](#515270_1_En_2_Chapter.xhtml#Fig9).


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig9_HTML.png)


    A schematic of an A E S block cipher in 3 stages, namely, internal state, rounds,
    10 slash 12 slash 14, and final round to obtain ciphertext.


    Figure 2-9


    AES block cipher


    ## Some Basic Mathematics


    Before we dive into cryptography, it is important to understand some very basic
    mathematics and related terminology.


    ### Prime


    A prime is a number which is only divisible fully by itself and 1. For example,
    23 is a prime number as it can only be divided precisely without leaving any remainder
    either by 23 or 1.


    ### Modular Arithmetic


    It is a system of performing arithmetic operations on integers where numbers wrap
    around when they reach a certain fixed number. This fixed number is called a modulus,
    and all arithmetic operations are performed based on this modulus.


    ### Group


    A group *G* is a set whose elements can be combined with an operation ∘. It has
    the following properties:


    **Closure** means that all group operations are closed. Formally, ∀*a*, *b* ∈ *G* : *a* ∘ *b* = *c* ∈ *G*.


    **Associativity** means that all group operations are associative. Formally, *a* ∘ (*b* ∘ *c*) = (*a* ∘ *b* ) ∘ *c* :  ∀ *a*,
    *b*, *c* ∈ *G*.


    There exists a special **identity** element *i* such that ∀*a* ∈ *G* : *a* ∘ *i* = *i* ∘ *a* = *a*.


    In each element *a* ∈ *G* , there is a corresponding **inverse** element *a*^(−1)
    such that *a* ∘ *a*^(−1) = *a*^(−1) ∘ *a* = *i*.


    ### Abelian Group


    A group is a commutative or abelian group if in addition to the abovementioned
    properties of groups, ∀*a*, *b* ∈ *G* : *a* ∘ *b* = *b* ∘ *a* .


    ### Field


    A field F is a set with two operations on F called addition and multiplication.


    ### Finite Field (Galois Field)


    A finite field is a field with a finite number of elements.


    ### Prime Fields


    A prime field is a finite field containing a prime number of elements.


    ### Generator


    A generator is a point on an elliptic curve.


    ## Public Key Cryptography


    Public key cryptographic systems use two different keys for encryption and decryption.
    The public key is known openly, and the private key must remain secret. In these
    systems, the sender uses the recipient’s public key to encrypt data. The recipient
    decrypts the ciphertext by using the corresponding private key.


    This model is shown in Figure [2-10](#515270_1_En_2_Chapter.xhtml#Fig10).


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig10_HTML.png)


    A schematic of a cryptosystem. Plaintext from sender and public key is sent to
    the encryption. Ciphertext and private key are sent to the decryption.


    Figure 2-10


    Public key cryptography–based cryptosystem


    A fundamental issue in symmetric key systems is that they need a secret key to
    be shared before the communication using a secure channel, which can be challenging
    to achieve. Another issue with symmetric key systems is key management. The number
    of keys grows exponentially as the number of users grows in the system. An n user
    network will need n(n-1)/2 keys where each user will store n-1 keys. In a 100-user
    network, each user will store 99 keys. The formula 100(100-1)/2 means there are
    4950 keys in total, which is quite tricky to manage practically. Public key cryptography
    solves this issue of key distribution and key management.


    A typical use of public key cryptography is to establish a shared secret key between
    two parties. This shared secret key is used by symmetric algorithms, such as AES,
    to encrypt the data. As they have already established a secret key, both parties
    can then encrypt and decrypt without ever transmitting the secret key on the wire.
    This way, the parties get the high security of public key cryptography with the
    speed of symmetric encryption. Asymmetric cryptography is not used much for bulk
    encryption due to slow performance; however, this is the norm for key establishment.
    Such systems where a symmetric key is used to encrypt the data and a secret key
    is encrypted using public key cryptography are called hybrid cryptosystems. For
    example, the Integrated Encryption Scheme is a hybrid encryption scheme. ECIES
    is the elliptic curve (EC) version of the IES scheme.'
  trans: '

    ### 高级加密标准


    `AES` 最初以发明者 Joan Daemen 和 Vincent Rijmen 的名字命名为 `Rijndael`。经过公开竞争后，它于 2001 年被
    `NIST` 标准化为高级加密标准（`AES`）。


    在 `Rijndael` 的原始版本中，允许使用不同的密钥和块大小，包括 128 位、192 位和 256 位。然而，在 `AES` 中，仅允许使用 128
    位的块大小以及 128 位、192 位和 256 位的密钥大小。


    `AES` 处理一个大小为 4 x 4 的字节数组，称为 `state`（状态），根据密钥大小进行多轮处理。例如，如果密钥长度为 128 位，则需要 10
    轮；对于 192 位，需要 12 轮；对于 256 位，则需要 14 轮。


    在使用输入明文初始化 `state` 之后，`AES` 依次执行以下四个操作以生成密文：


    - **AddRoundKey（轮密钥加）**：首先，将 `state` 数组与从主密钥派生出的子密钥进行异或操作。

    - **SubBytes（字节代换）**：此步骤执行字节替换，使用一个固定的查找表（S-box）来替换 4 x 4 `state` 数组中的所有字节。

    - **ShiftRows（行移位）**：此步骤以循环和递增的方式将 `state` 数组中的每一行向左移动。第一行不动，第二行向左移动一个字节，第三行向左移动两个字节，第四行向左移动三个字节（或位置）。

    - **MixColumns（列混淆）**：最后，以线性方式（即线性变换）混合所有字节，该函数将一列中的四个字节作为输入，并产生四个新字节作为输出来替换输入列。


    上述四个步骤构成了 `AES` 的一轮。在最后一轮中，不执行步骤 4（`MixColumns`）。取而代之的是，它被 `AddRoundKey` 步骤替换，以确保前三个步骤不能轻易地被逆向。该过程如图
    2-9 所示。


    ![](img/515270_1_En_2_Fig9_HTML.png)


    一个 `AES` 分组密码的原理图，包含 3 个阶段，即：内部状态、轮次（10/12/14 轮）和最后一轮，以获取密文。


    **图 2-9** `AES` 分组密码


    ### 一些基础数学知识


    在我们深入密码学之前，理解一些非常基础的数学知识和相关术语很重要。


    #### 素数


    素数是只能被自身和 1 整除的数。例如，23 是一个素数，因为它只能精确地被 23 或 1 整除，没有余数。


    #### 模算术


    这是一种在整数上执行算术运算的系统，当数字达到某个固定的数值时，数字会绕回（取模）。这个固定的数值称为模数，所有算术运算都基于这个模数进行。


    #### 群


    群 `G` 是一个集合，其元素可以通过运算 `∘` 进行组合。它具有以下性质：


    - **封闭性** 意味着所有群运算的结果都在该集合内。形式上，∀ `a`，`b` ∈ `G`：`a` ∘ `b` = `c` ∈ `G`。

    - **结合律** 意味着所有群运算满足结合律。形式上，`a` ∘ (`b` ∘ `c`) = (`a` ∘ `b`) ∘ `c`：∀ `a`， `b`，
    `c` ∈ `G`。

    - 存在一个特殊的**单位元** `i`，使得 ∀ `a` ∈ `G`：`a` ∘ `i` = `i` ∘ `a` = `a`。

    - 对于每个元素 `a` ∈ `G`，都有一个对应的**逆元** `a^(-1)`，使得 `a` ∘ `a^(-1)` = `a^(-1)` ∘ `a` =
    `i`。


    #### 阿贝尔群


    如果一个群除了具备上述群的性质外，还满足 ∀ `a`， `b` ∈ `G`：`a` ∘ `b` = `b` ∘ `a`，则该群称为交换群或阿贝尔群。


    #### 域


    域 `F` 是一个集合，在 `F` 上定义了两种运算，称为加法和乘法。


    #### 有限域（伽罗瓦域）


    有限域是元素数量有限的域。


    #### 素域


    素域是包含素数个元素的有穷域。


    #### 生成元


    生成元是椭圆曲线上的一个点。


    ### 公钥密码学


    公钥密码系统使用两个不同的密钥进行加密和解密。公钥是公开的，而私钥必须保密。在这些系统中，发送方使用接收方的公钥加密数据。接收方通过使用相应的私钥解密密文。


    此模型如图 2-10 所示。


    ![](img/515270_1_En_2_Fig10_HTML.png)


    一个密码系统的原理图。来自发送方的明文和公钥被发送到加密环节。密文和私钥被发送到解密环节。


    **图 2-10** 基于公钥密码学的密码系统


    对称密钥系统的一个基本问题是，在通信之前需要通过安全信道共享一个密钥，这很难实现。对称密钥系统的另一个问题是密钥管理。随着系统中用户数量的增长，密钥数量呈指数级增长。一个拥有
    `n` 个用户的网络将需要 `n(n-1)/2` 个密钥，每个用户将存储 `n-1` 个密钥。在一个 100 用户的网络中，每个用户将存储 99 个密钥。公式
    `100(100-1)/2` 表示总共有 4950 个密钥，这在实践中管理起来相当棘手。公钥密码学解决了这个密钥分发和密钥管理的问题。


    公钥密码学的一个典型用途是在两方之间建立一个共享的秘密密钥。这个共享的秘密密钥被对称算法（如 `AES`）用于加密数据。由于双方已经建立了共享密钥，他们可以在不通过线路传输该密钥的情况下进行加密和解密。这样，双方既获得了公钥密码学的高安全性，又享有了对称加密的速度。由于性能较慢，非对称密码学不常用于批量加密；然而，这却是密钥建立的常规做法。这种使用对称密钥加密数据，同时使用公钥密码学加密秘密密钥的系统称为混合密码系统。例如，集成加密方案就是一种混合加密方案。`ECIES`
    是 `IES` 方案的椭圆曲线（EC）版本。

