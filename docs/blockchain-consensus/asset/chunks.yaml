  trans: "\n# 7. 经典共识算法\n\n20 世纪 80 年代出现的共识与复制协议在共识协议研究中做出了深远贡献。早期的复制协议（如视图戳复制）为容错复制的设计与实现提供了深刻见解。几乎在同一时期，Paxos\
    \ 协议问世，它提供了一套具有严格形式化规范与分析的实用协议。1999 年，首个实用的拜占庭容错协议诞生。本章将详细阐述这些经典协议的设计原理、工作机制，以及它们如何保证安全性与活性。此外，还将探讨如何以及在何种条件下可以将这些协议应用于区块链。同时，本章也会讨论近期开发的协议（如\
    \ RAFT），该协议在经典协议基础上构建了一套更易理解的共识机制。\n\n## 视图戳复制\n\n1988 年，Brian Oki 和 Barbara Liskov\
    \ 提出了视图戳复制方法，用于在节点间实现复制。这是最基本的一致性保障机制之一，能够确保复制数据的一致性（即一致的视图）。该机制在发生崩溃故障和网络分区时仍能正常运作，但前提条件是崩溃节点最终能恢复，网络分区也能愈合。它本质上也是一种共识算法——因为为了在复制数据上实现一致性，各节点必须就复制状态达成一致。\n\
    \n视图戳复制有两个主要目的。一是构建一个足够协调的分布式系统，使客户端感觉像是在与单台服务器通信。二是实现状态机复制。状态机复制要求所有副本从相同的初始状态启动，且操作具有确定性。基于这些条件（假设），我们可以很容易地推断：如果所有副本执行了相同的操作序列，那么它们最终将达到相同的状态。当然，这里的挑战在于即使发生故障，也要确保操作在所有副本上以相同的顺序执行。总而言之，该协议提供了容错性和一致性。它基于主备复制技术。\n\
    \n视图戳复制（VR）协议包含三个子协议：\n\n- **正常运行协议**：在正常条件下处理客户端请求并实现复制\n- **视图变更协议**：处理主节点故障，并启动新的视图和主节点\n\
    - **副本恢复协议**：处理故障副本恢复后的重新加入\n\nVR 协议受两阶段提交协议启发，但与两阶段提交不同：它是一种具有故障恢复能力的协议，不会因主节点（在两阶段提交术语中称为协调者）或副本失败而阻塞。只要故障副本数量不超过`f`个，该协议就能保证可靠性和可用性。它使用由`2f\
    \ + 1`个副本组成的副本组，在异步环境下可容忍`f`个副本的崩溃故障，且仲裁大小为`f+1`。\n\n每个副本维护的状态信息包括：配置信息、副本编号、当前视图、当前状态（正常/视图变更/恢复中）、最新请求分配的`op`编号、包含已接收请求及对应`op`编号的日志，以及记录最近客户端请求、执行状态及相应结果的客户端表。\n\
    \n让我们看看 VR 协议中的正常运行流程。首先，了解变量及其含义：\n\n- `op`：客户端操作\n- `c`：客户端 ID\n- `s`：请求编号\n\
    - `v`：客户端已知的视图编号\n- `m`：来自客户端的消息\n- `n`：分配给请求的操作编号\n- `i`：非主副本\n- `x`：结果\n\n###\
    \ 协议步骤\n\n1. 客户端向主副本发送请求消息，格式为`<REQUEST op, c, s, v>`。\n\n2. 主节点收到请求后：\n   1.\
    \ 递增操作编号。\n   2. 将请求消息追加到日志末尾。\n   3. 向其他副本发送`<PREPARE m, v, n>`消息。\n\n3. 副本收到准备消息后：\n\
    \   1. 仅当该准备消息中操作编号之前的所有前置请求都已记录在日志中时，才接受该准备消息。\n   2. 否则，等待通过状态传输补全缺失条目。\n  \
    \ 3. 将请求追加到自己的日志中。\n   4. 向主副本发送`<PREPAREOK v, n, i>`消息。\n\n4. 主节点等待接收到`f`个来自其他副本的`PREPAREOK`消息后：\n\
    \   1. 认为该操作已提交\n   2. 执行所有待处理操作\n   3. 执行最新操作\n   4. 向客户端发送`<REPLY v, s, x>`消息\n\
    \n5. 提交完成后，主副本通知其他副本进行提交。\n\n6. 其他副本在将操作追加到日志后执行该操作，但需先完成所有待处理操作的执行。\n\n该过程如图\
    \ 7-1 所示。\n\n![](img/515270_1_En_7_Fig1_HTML.png)\n\nVR 协议示意图包含客户端、主节点、副本 1 和副本\
    \ 2 的线条。这些线条按请求、准备、准备确认和回复阶段划分。\n\n**图 7-1** – VR 协议 – 正常运行流程\n\n当主节点发生故障时，视图变更协议启动。副本通过超时机制检测故障：\n\
    \n- `v`：视图编号\n- `l`：副本的日志/新日志\n- `k`：副本已知的最新已提交请求的操作编号\n- `I`：副本标识符\n"
- fmt: "### View Change\n\nA view change protocol works as follows:\n\n1. When a replica\
    \ suspects the primary of failure, it  \n   1. Increments its view number  \n\
    \   2. Changes its status to view change  \n   3. Sends a `<DOVIEWCHANGE v, l,\
    \ k, i>` message to the primary of the next view  \n\n2. When the new primary\
    \ gets `f+1` of the `<DOVIEWCHANGE>` message, it  \n   1. Chooses the most recent\
    \ log in the message and picks that as its new log  \n   2. Sets the op number\
    \ to that of the latest entry in the new log  \n   3. Changes its status to normal\
    \  \n   4. Sends the `<STARTVIEW v, l, k>` message to other replicas, indicating\
    \ the completion of the view change process  \n\n3. Now the new primary  \n  \
    \ 1. Sequentially executes any unexecuted committed operations  \n   2. Sends\
    \ a reply to the client  \n   3. Starts accepting new client requests  \n\n4.\
    \ Other replicas upon receiving the `<STARTVIEW>` message  \n   1. Replace their\
    \ log with the one in the message  \n   2. Set their op number to the one in the\
    \ latest entry in the log  \n   3. Set their view number to what is in the message\
    \  \n   4. Change their status to normal  \n   5. Send `PREPAREOK` for uncommitted\
    \ messages  \n\nThe view change protocol repeats if even a new primary fails.\n\
    \nFigure [7-2](#515270_1_En_7_Chapter.xhtml#Fig2) visualizes this process.\n\n\
    ![](images/515270_1_En_7_Chapter/515270_1_En_7_Fig2_HTML.png)\n\nA diagram of\
    \ the view change in VR has lines for primary, new primary, replica 1 and 2. The\
    \ lines are phased into view change and new view.\n\n**Figure 7-2** View change\
    \ in VR\n\nThe key safety requirement here is that all committed operations make\
    \ it to the next views with their order preserved.\n\nVR is not discussed with\
    \ all intricate details on purpose, as we focus more on mainstream protocols.\
    \ Still, it should give you an idea about the fundamental concepts introduced\
    \ in VR, which play an essential role in almost all replication and consensus\
    \ protocols, especially PBFT, Paxos, and RAFT. When you read the following sections,\
    \ you will see how PBFT is an evolved form of VR and other similarities between\
    \ VR and different protocols introduced in this chapter. When you read the section\
    \ on RAFT, you will find good resemblance between VR and RAFT.\n\nLet’s look at\
    \ Paxos first, undoubtedly the most influential and fundamental consensus protocol.\n\
    \n## Paxos\n\nLeslie Lamport discovered Paxos. It was proposed first in 1988 and\
    \ then later more formally in 1998. It is the most fundamental distributed consensus\
    \ algorithm which allows consensus over a value under unreliable communications.\
    \ In other words, Paxos is used to build a reliable system that works correctly,\
    \ even in the presence of faults. Paxos made state machine replication more practical\
    \ to implement. A version of Paxos called `multi-Paxos` is commonly used to implement\
    \ a replicated state machine. It runs under a message-passing model with asynchrony.\
    \ It tolerates fewer than `n/2` crash faults, that is, it meets the lower bound\
    \ of `2f + 1`.\n\nEarlier consensus mechanisms did not handle safety and liveness\
    \ separately. The Paxos protocol takes a different approach to solving the consensus\
    \ problem by separating the safety and liveness properties.\n\nThere are three\
    \ roles that nodes in a system running the Paxos protocol can undertake. A single\
    \ process may assume all three roles:\n\n* **Proposer**: Proposes values to be\
    \ decided. An elected proposer acts as a single leader to propose a new value.\
    \ Proposers handle client requests.  \n* **Acceptor**: Acceptors evaluate and\
    \ accept or reject proposals proposed by the proposers according to several rules\
    \ and conditions.  \n* **Learner**: Learns the decision, that is, the agreed-upon\
    \ value.\n\nThere are also some rules associated with Paxos nodes. Paxos nodes\
    \ must be persistent, that is, they must store what their action is and must remember\
    \ what they’ve accepted. Nodes must also know how many acceptors make a majority.\n\
    \nPaxos can be seen as similar to the two-phase commit protocol. A two-phase commit\
    \ (2PC) is a standard atomic commitment protocol to ensure that the transactions\
    \ are committed in distributed databases only if all participants agree to commit.\
    \ Even if a single node does not agree to commit the transaction, it is rolled\
    \ back completely.\n\nSimilarly, in Paxos, the proposer sends a proposal to the\
    \ acceptors in the first phase. Then, the proposer broadcasts a request to commit\
    \ to the acceptors if and when they accept the proposal. Once the acceptors commit\
    \ and report back to the proposer, the proposal is deemed final, and the protocol\
    \ concludes. In contrast with the two-phase commit, Paxos introduced ordering,\
    \ that is, sequencing, to achieve the total order of the proposals. In addition,\
    \ it also introduced a majority quorum–based acceptance of the proposals rather\
    \ than expecting all nodes to agree. This scheme allows the protocol to make progress\
    \ even if some nodes fail. Both improvements ensure the safety and liveness of\
    \ the Paxos algorithm.\n\nThe protocol is composed of two phases, the prepare\
    \ phase and the accept phase. At the end of the prepare phase, a majority of acceptors\
    \ have promised a specific proposal number. At the end of the accept phase, a\
    \ majority of acceptors have accepted a proposed value, and consensus is reached.\n\
    \nThe algorithm works as follows:\n\n**Phase 1 – prepare phase**\n\n* The proposer\
    \ receives a request to reach consensus on a value by a client.  \n* The proposer\
    \ sends a message `prepare(n)` to a majority or all acceptors. At this stage,\
    \ no value is proposed for a decision yet. The majority of acceptors is enough\
    \ under the assumption that all acceptors in the majority will respond. Here,\
    \ the `n` represents the proposal number which must be globally unique and must\
    \ be greater than any proposal number this proposer has used before. For example,\
    \ `n` can be a timestamp in nanoseconds or some other incrementing value. If a\
    \ timeout occurs, then the proposer will retry with a higher `n`. In other words,\
    \ if the proposer is unable to make progress due to a lack of responses from the\
    \ acceptors, it can retry with a higher proposal number."
  raw: "### View Change\n\nA view change protocol works as follows:\n\n1.  When a\
