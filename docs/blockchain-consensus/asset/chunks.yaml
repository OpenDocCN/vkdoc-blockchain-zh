  trans: '

    ### 安全性与活性


    Paxos 算法通过实现**安全性**和**活性**属性来解决共识问题。我们对每个属性都有一些要求。在安全性方面，我们主要关注一致性和有效性。**一致性**意味着不会选出两个不同的值。**有效性**（有时也称为**非平凡性**）意味着除非某个参与协议的进程提出了提议，否则不会决定任何值。另一个源于有效性属性的安全性要求可称为“**有效学习**”，即如果一个进程**学习**了一个值，则该值必须已由某个进程决定。一致性确保所有进程决定相同的值。有效性和有效学习要求确保进程仅对提议的值做出决定，而不会平凡地选择不做决定或选择某个预定义的值。


    在**活性**方面，有两个要求。首先，协议最终会**决定**，即提议的值最终会被决定。其次，如果一个值已被决定，学习者最终会**学习**到该值。


    现在我们来讨论这些安全性和活性要求是如何满足的。


    直观地说，一致性是通过确保大多数接受者只能为同一提案投票来实现的。想象两个不同的值 `v1` 和 `v2` 以某种方式被选出（决定）。我们知道，只有当大多数接受者接受了来自提议者且内容相同的接受消息时，协议才会选择一个值。这个条件意味着，一组多数接受者
    `A1` 必须接受了一条包含提案 `(n1,v1)` 的接受消息。同时，另一组多数接受者 `A2` 必须接受了一条包含提案 `(n2, v2)` 的接受消息。假设这两个多数集合
    `A1` 和 `A2` 必定有交集，这意味着根据法定人数交集规则，它们将至少有一个共同的接受者。这个接受者必须接受过两个提案编号相同但内容不同的提案。这种情况是不可能的，因为一个接受者会忽略任何与它已接受的提案编号相同的准备或接受消息。


    如果 `n1 <> n2` 且 `n1 < n2` ，并且 `n1` 和 `n2` 是连续的提案轮次，那么这意味着 `A1` 必须在 `A2` 接受提案编号为
    `n2` 的接受消息之前，就已经接受了提案编号为 `n1` 的接受消息。这是因为如果一个接受者之前已承诺过某个编号更大的提案，它会忽略任何提案编号更小的准备或接受消息。此外，提议者提出的值必须来自先前编号最高的提案中的值，如果接受消息中不包含任何提议的值，则使用提议者自身的提议值。正如我们所知，`A1`
    和 `A2` 必须至少有一个共同的接受者；这个共同的接受者必须同时接受了提案 `(n1,v1)` 和 `(n2,v2)` 的接受消息。这种情况也是不可能的，因为该接受者在回应提案编号为
    `n2` 的准备消息时会回复 `(n1,v1)` ，这使得提议者必须选择值 `v1` 而非 `v2`。即使提案编号不连续，任何中间提案也必须选择 `v1`
    作为被选中的值。


    有效性是通过仅允许提议者输入的值被提议来保证的。换句话说，最终决定的值既不是预定义的，也不是由不属于运行 Paxos 集群的任何其他实体提议的。


    由于异步性，Paxos 无法保证活性。然而，如果采用某些同步假设（即部分同步环境），那么进展是可以达成的，终止性也是可以实现的。我们假设在全局稳定时间（GST）之后，至少有多数接受者是正确且可用的。消息在已知的上限时间内送达，并且选举出的唯一非故障领导者提议者是正确且可用的。


    ### 实际应用


    Paxos 已在许多实际系统中得到实现。尽管 Paxos 算法核心相当简单，但通常被认为难以理解。因此，许多论文都是为了解释它而写的。尽管如此，它仍常被视为复杂且难以完全掌握。然而，这点小问题并不意味着它没有被广泛应用。相反，它已被用于许多生产系统，例如
    Google 的 Spanner 和 Chubby。Paxos 的首次部署是在 Petal 分布式存储系统中。其他随机选取的例子包括 Apache ZooKeeper、NoSQL
    Azure Cosmos 数据库和 Apache Cassandra。它被证明是解决共识问题最有效的协议。已有研究表明，两阶段提交是 Paxos 的一个特例，而
    PBFT 是 Paxos 的一种改良。


    ### 变体


    经典 Paxos 有许多变体，例如 Multi-Paxos、Fast Paxos、Byzantine Paxos、Dynamic Paxos、Vertical
    Paxos、Disk Paxos、Egalitarian Paxos、Stoppable Paxos 和 Cheap Paxos。

    '
- fmt: "### Multi-Paxos\n\nIn classical Paxos, even in an all-correct environment,\
    \ it takes two round trips to achieve consensus on a single value. This approach\
    \ is slow, and if consensus is required on a growing sequence of values (which\
    \ is practically the case), this single value consensus must repeatedly run, which\
    \ is not efficient. However, an optimization can make classical Paxos efficient\
    \ enough to be used in practical systems. Recall that Paxos has two phases. Once\
    \ phases 1 and 2 both have completely run once, then, at that point, a majority\
    \ of acceptors is now available to that proposer who ran this round of phases\
    \ 1 and 2. This proposer is now a recognized leader. Instead of rerunning phase\
    \ 1, the proposer (leader) can keep running phase 2 only, with the available majority\
    \ of acceptors. As long as it does not crash, or some other proposer doesn’t come\
    \ along and propose with a higher proposal number, this process of successive\
    \ accept messages can continue. The proposer can keep running the accept/accepted\
    \ round (phase 2) with even the same proposal number without running the prepare/promise\
    \ round (phase 1). In other words, the message delays are reduced from four to\
    \ two. When another proposer comes along or the previous one fails, this new proposer\
    \ can run another round of phases 1 and 2 by following classical Paxos. When this\
    \ new proposer becomes the leader by receiving a majority from the acceptors,\
    \ the basic classical Paxos protocol upgrades to multi-Paxos, and it can start\
    \ running phase 2 only. As long as there is only a single leader in the network,\
    \ no acceptor would notify the leader that it has accepted any other proposal,\
    \ which will let the leader choose any value. This condition allows omitting the\
    \ first phase when only one elected proposer is the leader.\n\nThis protocol is\
    \ known as optimization Paxos or multi-Paxos. A normal run of multi-Paxos is shown\
    \ in Figure [7-4](#515270_1_En_7_Chapter.xhtml#Fig4).\n\n![](images/515270_1_En_7_Chapter/515270_1_En_7_Fig4_HTML.jpg)\n\
    \nA diagram of multi-Paxos has lines for proposer, acceptor 1, 2, 3, learner 1,\
    \ and 2. The lines are phased into accept and learn.\n\n**Figure 7-4**  \nMulti-Paxos\
    \ – note the first phase, prepare phase, skipped\n\nOriginal Paxos is a leaderless\
    \ (also called symmetric) protocol, whereas multi-Paxos is leader driven (also\
    \ called asymmetric). It is used in practical systems instead of classical Paxos\
    \ to enable state machine replication. Commonly in implementations, the role of\
    \ the proposer, acceptor, and learner is contracted to so-called servers, which\
    \ may all assume these three roles. Eventually, only a client-server model emerges.\
    \ With roles collapsed, a steady leader and prepare phase removed, the protocol\
    \ becomes efficient and simple.\n\nPaxos is seen as a difficult protocol to understand.\
    \ This is mostly due to underspecification. Also, the original protocol described\
    \ by Lamport is a single decree protocol, which is not practical to implement.\
    \ There have been several attempts, such as multi-Paxos, and several papers that\
    \ try to explain Paxos, but, overall, the protocol is still considered a bit tricky\
    \ to understand and implement. With these and several other points in mind, a\
    \ protocol called RAFT was developed. We introduce RAFT next.\n\n## RAFT\n\nRAFT\
    \ is designed in response to shortcomings in Paxos. RAFT stands for Replicated\
    \ And Fault Tolerant. The authors of RAFT had the main aim of developing a protocol\
    \ which is easy to understand and easy to implement. The key idea behind RAFT\
    \ is to enable state machine replication with a persistent log. The state of the\
    \ state machine is determined by the persistent log. RAFT allows cluster reconfiguration\
    \ which enables cluster membership changes without service interruption. Moreover,\
    \ as logs can grow quite large on high throughput systems, RAFT allows log compaction\
    \ to alleviate the issue of consuming too much storage and slow rebuild after\
    \ node crashes.\n\nRAFT operates under a system model with the following assumptions:\n\
    \n- No Byzantine failures.\n- Unreliable network communication.\n- Asynchronous\
    \ communication and processors.\n- Deterministic state machine on each node that\
    \ starts with the same initial state on each node.\n- Nodes have uncorruptible\
    \ persistent storage with write-ahead logging, meaning any write to storage will\
    \ complete before crashing.\n- The Client must communicate strictly with only\
    \ the current leader. It is the Client’s responsibility as clients know all nodes\
    \ and are statically configured with this information.\n\nRAFT is a leader-based\
    \ (asymmetric) protocol, where one node is elected as a leader. This leader accepts\
    \ client requests and manages the log replication. There can only be one leader\
    \ at a time in a RAFT cluster. If a current leader fails, then a new leader is\
    \ elected. There are three roles that nodes (more precisely the consensus module\
    \ within nodes) can assume in a RAFT cluster: leader, follower, and candidate.\n\
    \n- The **leader** receives client requests, manages replication logs, and manages\
    \ communication with the followers.\n- **Follower** nodes are passive in nature\
    \ and only respond to Remote Procedure Call (RPCs). They never initiate any communication.\n\
    - A **candidate** is a role that is used by a node that is trying to become a\
    \ leader by requesting votes.\n\nTime in RAFT is logically divided into terms.\
    \ A term (or epoch) is basically a monotonically increasing value which acts as\
    \ a logical clock to achieve global partial ordering on events in the absence\
    \ of a global synchronized clock. Each term starts with an election of a new leader,\
    \ where one or more candidates compete to become the leader. Once a leader is\
    \ elected, it serves as a leader until the end of the term. The key role of terms\
    \ is to identify stale information, for example, stale leaders. Each node stores\
    \ a current term number. When current terms are exchanged between nodes, it is\
    \ checked if one node’s current term number is lower than the other node’s term\
    \ number; if it is, then the node with the lower term number updates its current\
    \ term to the larger value. When a candidate or a leader finds out that its current\
    \ term number is stale, it transitions its state to follower mode. Any requests\
    \ with a stale term number received by a node are rejected.\n\nTerms can be visualized\
    \ in Figure [7-5](#515270_1_En_7_Chapter.xhtml#Fig5).\n\n![](images/515270_1_En_7_Chapter/515270_1_En_7_Fig5_HTML.png)\n\
    \nA schematic of the terms in RAFT. The terms 1, 2, and 5 are labeled normal operation.\
    \ The terms 3 and 4 are labeled no leader elected.\n\n**Figure 7-5**  \nTerms\
    \ in RAFT\n\nA RAFT protocol works using two RPCs, `AppendEntries` RPC, which\
    \ is invoked by a leader to replicate log entries and is also used as a heartbeat,\
    \ and `RequestVote` RPC, which is invoked by candidates to collect votes.\n\n\
    RAFT consists of two phases. The first is leader election, and the second is log\
    \ replication. In the first phase, the leader is elected, and the second phase\
    \ is where the leader accepts the clients’ requests, updates the logs, and sends\
    \ a heartbeat to all followers to maintain its leadership.\n\nFirst, let’s see\
    \ how leader election works."
  raw: '### Multi-Paxos


    In classical Paxos, even in an all-correct environment, it takes two round trips
    to achieve consensus on a single value. This approach is slow, and if consensus
    is required on a growing sequence of values (which is practically the case), this
    single value consensus must repeatedly run, which is not efficient. However, an
    optimization can make classical Paxos efficient enough to be used in practical
    systems. Recall that Paxos has two phases. Once phases 1 and 2 both have completely
    run once, then, at that point, a majority of acceptors is now available to that
    proposer who ran this round of phases 1 and 2\. This proposer is now a recognized
    leader. Instead of rerunning phase 1, the proposer (leader) can keep running phase
    2 only, with the available majority of acceptors. As long as it does not crash,
    or some other proposer doesn’t come along and propose with a higher proposal number,
    this process of successive accept messages can continue. The proposer can keep
    running the accept/accepted round (phase 2) with even the same proposal number
    without running the prepare/promise round (phase 1). In other words, the message
    delays are reduced from four to two. When another proposer comes along or the
    previous one fails, this new proposer can run another round of phases 1 and 2
    by following classical Paxos. When this new proposer becomes the leader by receiving
    a majority from the acceptors, the basic classical Paxos protocol upgrades to
    multi-Paxos, and it can start running phase 2 only. As long as there is only a
    single leader in the network, no acceptor would notify the leader that it has
    accepted any other proposal, which will let the leader choose any value. This
    condition allows omitting the first phase when only one elected proposer is the
    leader.


    This protocol is known as optimization Paxos or multi-Paxos. A normal run of multi-Paxos
    is shown in Figure [7-4](#515270_1_En_7_Chapter.xhtml#Fig4).


    ![](images/515270_1_En_7_Chapter/515270_1_En_7_Fig4_HTML.jpg)


    A diagram of multi-Paxos has lines for proposer, acceptor 1, 2, 3, learner 1,
    and 2\. The lines are phased into accept and learn.


    Figure 7-4


    Multi-Paxos – note the first phase, prepare phase, skipped


    Original Paxos is a leaderless (also called symmetric) protocol, whereas multi-Paxos
    is leader driven (also called asymmetric). It is used in practical systems instead
    of classical Paxos to enable state machine replication. Commonly in implementations,
    the role of the proposer, acceptor, and learner is contracted to so-called servers,
    which may all assume these three roles. Eventually, only a client-server model
    emerges. With roles collapsed, a steady leader and prepare phase removed, the
    protocol becomes efficient and simple.


    Paxos is seen as a difficult protocol to understand. This is mostly due to underspecification.
    Also, the original protocol described by Lamport is a single decree protocol,
    which is not practical to implement. There have been several attempts, such as
    multi-Paxos, and several papers that try to explain Paxos, but, overall, the protocol
    is still considered a bit tricky to understand and implement. With these and several
    other points in mind, a protocol called RAFT was developed. We introduce RAFT
    next.


    ## RAFT


    RAFT is designed in response to shortcomings in Paxos. RAFT stands for Replicated
    And Fault Tolerant. The authors of RAFT had the main aim of developing a protocol
    which is easy to understand and easy to implement. The key idea behind RAFT is
    to enable state machine replication with a persistent log. The state of the state
    machine is determined by the persistent log. RAFT allows cluster reconfiguration
    which enables cluster membership changes without service interruption. Moreover,
    as logs can grow quite large on high throughput systems, RAFT allows log compaction
    to alleviate the issue of consuming too much storage and slow rebuild after node
    crashes.


    RAFT operates under a system model with the following assumptions:


    *   No Byzantine failures.


    *   Unreliable network communication.


    *   Asynchronous communication and processors.


    *   Deterministic state machine on each node that starts with the same initial
    state on each node.


    *   Nodes have uncorruptible persistent storage with write-ahead logging, meaning
    any write to storage will complete before crashing.


    *   The Client must communicate strictly with only the current leader. It is the
    Client’s responsibility as clients know all nodes and are statically configured
    with this information.


    RAFT is a leader-based (asymmetric) protocol, where one node is elected as a leader.
    This leader accepts client requests and manages the log replication. There can
    only be one leader at a time in a RAFT cluster. If a current leader fails, then
    a new leader is elected. There are three roles that nodes (more precisely the
    consensus module within nodes) can assume in a RAFT cluster: leader, follower,
    and candidate.


    *   The **leader** receives client requests, manages replication logs, and manages
    communication with the followers.


    *   **Follower** nodes are passive in nature and only respond to Remote Procedure
    Call (RPCs). They never initiate any communication.


    *   A **candidate** is a role that is used by a node that is trying to become
    a leader by requesting votes.


    Time in RAFT is logically divided into terms. A term (or epoch) is basically a
    monotonically increasing value which acts as a logical clock to achieve global
    partial ordering on events in the absence of a global synchronized clock. Each
    term starts with an election of a new leader, where one or more candidates compete
    to become the leader. Once a leader is elected, it serves as a leader until the
    end of the term. The key role of terms is to identify stale information, for example,
    stale leaders. Each node stores a current term number. When current terms are
    exchanged between nodes, it is checked if one node’s current term number is lower
    than the other node’s term number; if it is, then the node with the lower term
    number updates its current term to the larger value. When a candidate or a leader
    finds out that its current term number is stale, it transitions its state to follower
    mode. Any requests with a stale term number received by a node are rejected.


    Terms can be visualized in Figure [7-5](#515270_1_En_7_Chapter.xhtml#Fig5).


    ![](images/515270_1_En_7_Chapter/515270_1_En_7_Fig5_HTML.png)


    A schematic of the terms in R A F T. The terms 1, 2, and 5 are labeled normal
    operation. The terms 3 and 4 are labeled no leader elected.


    Figure 7-5


    Terms in RAFT


    A RAFT protocol works using two RPCs, `AppendEntries` RPC, which is invoked by
    a leader to replicate log entries and is also used as a heartbeat, and `RequestVote`
    RPC, which is invoked by candidates to collect votes.


    RAFT consists of two phases. The first is leader election, and the second is log
    replication. In the first phase, the leader is elected, and the second phase is
    where the leader accepts the clients’ requests, updates the logs, and sends a
    heartbeat to all followers to maintain its leadership.


    First, let’s see how leader election works.'
  trans: "\n### Multi-Paxos\n\n在经典 Paxos 中，即使在完全正确的环境中，也需要两次往返才能对单个值达成共识。这种方法速度较慢，如果需要对不断增长的值序列达成共识（实际情况通常如此），则必须重复运行此单值共识过程，效率不高。然而，通过一种优化措施，可以使经典\
    \ Paxos 足够高效，从而应用于实际系统中。回顾一下，Paxos 包含两个阶段。一旦阶段 1 和阶段 2 都完整运行过一次，那么此时，参与该轮阶段 1\
    \ 和阶段 2 的提议者就可以获得多数接受者的支持。该提议者现在成为了公认的领导者。提议者（领导者）无需重新运行阶段 1，只需利用这多数接受者持续运行阶段\
    \ 2。只要它不崩溃，或者没有其他提议者以更高的提案编号出现并提议，这种连续发送接受消息的过程就可以继续。提议者甚至可以继续使用相同的提案编号运行接受/已接受轮次（阶段\
    \ 2），而无需运行准备/承诺轮次（阶段 1）。换句话说，消息延迟从四次减少到了两次。当另一个提议者出现或前一个提议者失败时，这个新提议者可以遵循经典 Paxos\
    \ 再次运行阶段 1 和阶段 2。当这个新提议者通过获得多数接受者的支持成为领导者时，基础的经典 Paxos 协议就升级为 Multi-Paxos，并且它可以开始仅运行阶段\
    \ 2。只要网络中只有一个领导者，就没有接受者会通知领导者它已接受了其他任何提案，这将允许领导者选择任何值。这个条件允许在仅有一个当选的提议者作为领导者时省略第一阶段。\n\
    \n该协议被称为优化 Paxos 或多 Paxos（Multi-Paxos）。Multi-Paxos 的正常运行流程如图 7-4 所示。\n\n![](img/515270_1_En_7_Fig4_HTML.jpg)\n\
    \n多 Paxos 的示意图包含提议者、接受者 1、2、3、学习者 1 和学习者 2 的线条。这些线条分阶段进入接受和学习阶段。\n\n**图 7-4**\
    \  \nMulti-Paxos – 注意第一阶段（准备阶段）已被跳过\n\n原始的 Paxos 是一个无领导者（也称为对称）协议，而 Multi-Paxos\
    \ 是领导者驱动（也称为非对称）的协议。它被用于实际系统中以实现状态机复制，而非经典 Paxos。通常在实现中，提议者、接受者和学习者的角色会被合并到所谓的服务器中，这些服务器可能同时承担这三种角色。最终，仅呈现出客户端-服务器模型。随着角色的合并、稳定领导者的确立以及准备阶段的移除，该协议变得高效且简单。\n\
    \nPaxos 被认为是一个难以理解的协议。这主要是由于规范不足。此外，Lamport 描述的原始协议是一个单法令协议，不便于实际实现。已经有过多次尝试，例如\
    \ Multi-Paxos，以及多篇试图解释 Paxos 的论文，但总体而言，该协议仍被认为在理解和实现上有些棘手。考虑到这些以及其他几点因素，一个名为 RAFT\
    \ 的协议被开发出来。我们接下来介绍 RAFT。\n\n## RAFT\n\nRAFT 的设计是为了应对 Paxos 的不足之处。RAFT 代表复制和容错（Replicated\
    \ And Fault Tolerant）。RAFT 的作者们的主要目标是开发一个易于理解和易于实现的协议。RAFT 背后的关键思想是通过持久化日志实现状态机复制。状态机的状态由持久化日志决定。RAFT\
    \ 允许集群重配置，这使得可以在不中断服务的情况下更改集群成员。此外，由于在高吞吐量系统上日志可能会变得非常大，RAFT 允许日志压缩来缓解消耗过多存储空间以及节点崩溃后重建缓慢的问题。\n\
    \nRAFT 在一个具有以下假设的系统模型下运行：\n\n- 不存在拜占庭故障。\n- 网络通信不可靠。\n- 异步通信和处理器。\n- 每个节点上运行确定性的状态机，且所有节点从相同的初始状态开始。\n\
    - 节点拥有不可篡改的持久化存储，并支持预写式日志记录，这意味着任何对存储的写入操作都将在崩溃前完成。\n- 客户端必须严格仅与当前的领导者通信。这是客户端的责任，因为客户端知道所有节点，并且静态配置了这些信息。\n\
    \nRAFT 是一个基于领导者（非对称）的协议，其中一个节点被选举为领导者。该领导者接受客户端请求并管理日志复制。在一个 RAFT 集群中，一次只能有一个领导者。如果当前的领导者发生故障，则会选举出新的领导者。在\
    \ RAFT 集群中，节点（更准确地说是节点内的共识模块）可以承担三种角色：领导者、跟随者和候选者。\n\n- **领导者** 接收客户端请求，管理复制日志，并管理与跟随者的通信。\n\
    - **跟随者** 节点本质上是被动的，仅响应远程过程调用（RPC）。它们从不主动发起任何通信。\n- **候选者** 是一种角色，由一个试图通过请求投票成为领导者的节点使用。\n\
    \n在 RAFT 中，时间被逻辑地划分为任期。一个任期（或时期）基本上是一个单调递增的值，它充当逻辑时钟，在没有全局同步时钟的情况下，为事件实现全局偏序关系。每个任期从选举新领导者开始，期间一个或多个候选者竞争成为领导者。一旦领导者被选出，它将担任领导者直至任期结束。任期的主要作用是识别过时信息，例如，过时的领导者。每个节点存储一个当前的任期号。当节点之间交换当前任期时，会检查一个节点的当前任期号是否低于另一个节点的任期号；如果是，则任期号较低的节点会将其当前任期更新为较大的值。当一个候选者或领导者发现其当前任期号已过时时，它会将自身状态转换为跟随者模式。节点接收到的任何带有过期任期号的请求都会被拒绝。\n\
    \n任期可以如图 7-5 所示。\n\n![](img/515270_1_En_7_Fig5_HTML.png)\n\nRAFT 中任期的示意图。任期 1、2\
    \ 和 5 被标记为正常运行。任期 3 和 4 被标记为未选举出领导者。\n\n**图 7-5**  \nRAFT 中的任期\n\nRAFT 协议使用两种\
    \ RPC 工作：`AppendEntries` RPC，由领导者调用以复制日志条目，也用作心跳；`RequestVote` RPC，由候选者调用以收集选票。\n\
    \nRAFT 包含两个阶段。第一阶段是领导者选举，第二阶段是日志复制。在第一阶段，选出领导者；第二阶段是领导者接受客户端请求，更新日志，并向所有跟随者发送心跳以维持其领导地位。\n\
    \n首先，让我们看看领导者选举是如何工作的。\n"
- fmt: '### Leader Election


    A heartbeat mechanism is used to trigger a leader election process. All nodes
    start up as followers. Followers will run as followers as long as they keep receiving
    valid RPCs from a leader or a candidate. If a follower does not receive heartbeats
    from the leader for some time, then an "election timeout" occurs, which indicates
    that the leader has failed. The election timeout is randomly set to be between
    150ms and 300ms.


    Now the follower node undertakes the candidate role and attempts to become the
    leader by starting the election process. The candidate increments the current
    term number, votes for itself, resets election timer, and seeks votes from others
    via the `RequestVote` RPC. If it receives votes from the majority of the nodes,
    then it becomes the leader and starts sending heartbeats to other nodes, which
    are now followers. If another candidate has won and became a valid leader, then
    this candidate would start receiving heartbeats and will return to a follower
    role. If no one wins the elections and election timeout occurs, the election process
    starts again with a new term.


    Note that votes will only be granted by the receiver node in response to the `RequestVote`
    RPC if a candidate''s log is at least as up to date as the receiver''s log. Also,
    a "false" will be replied if the received term number is lower than the current
    term.


    The specific process of a leader election is shown in Figure [7-6](#515270_1_En_7_Chapter.xhtml#Fig6).


    ![](images/515270_1_En_7_Chapter/515270_1_En_7_Fig6_HTML.png)


    A flowchart of the R A F T leader election process starts with transition to candidate
    state and ends at become follower.


    Figure 7-6


    RAFT leader election


    A node can be in three states; we can visualize server states in the state diagram
    shown in Figure [7-7](#515270_1_En_7_Chapter.xhtml#Fig7), which also shows leader
    election.


    ![](images/515270_1_En_7_Chapter/515270_1_En_7_Fig7_HTML.png)


    A flowchart for the node states in R A F T starts with node start up and ends
    at the follower. The flows pass from follower to candidate and leader.


    Figure 7-7


    Node states in RAFT


    Once a leader is elected, it is ready to receive requests from clients. Now the
    log replication can start.


    ### Log Replication


    The log replication phase of RAFT is straightforward. First, the client sends
    commands/requests to the leader to be executed by the replicated state machines.
    The leader then assigns a term and index to the command so that the command can
    be uniquely identified in the logs held by nodes.


    It appends this command to its log. When the leader has a new entry in its log,
    at the same time it sends out the requests to replicate this command via the `AppendEntries`
    RPC to the follower nodes.


    When the leader is able to replicate the command to the majority of the follower
    nodes, that is, acknowledged, the entry is considered committed on the cluster.
    Now the leader executes the command in its state machine and returns the result
    to the client. It also notifies the followers that the entry is committed via
    the `AppendEntries` RPC, and the followers execute committed commands in their
    state machines. A set of logs from five nodes is shown in Figure [7-8](#515270_1_En_7_Chapter.xhtml#Fig8).


    ![](images/515270_1_En_7_Chapter/515270_1_En_7_Fig8_HTML.jpg)


    A chart lists the log indexes of leader, follower 1, 2, 3, and 4. A horizontal
    line at the bottom, under the last index, is labeled committed entries.


    Figure 7-8


    Logs in RAFT nodes


    Notice that entries up to log index number 6 are replicated on a majority of servers
    as the leader, follower 3, and follower 4 all have these entries, resulting in
    a majority – three out of five nodes. This means that they are committed and are
    safe to apply to their respective state machines. The log on followers 1 and 3
    is not up to date, which could be due to a fault on the node or communication
    link failure. If there is a crashed or slow follower, the leader will keep retrying
    via the `AppendEntries` RPC until it succeeds.


    The log replication process is shown in Figure [7-9](#515270_1_En_7_Chapter.xhtml#Fig9).


    ![](images/515270_1_En_7_Chapter/515270_1_En_7_Fig9_HTML.png)


    A flowchart of the log replication process. The flow is leader, command, replicate
    `append entries RPC` from node 1 to 2 and 3, and reply.


    Figure 7-9


    RAFT log replication and state machine replication


    When a follower receives an `AppendEntries` RPC for replication of log entries,
    it checks if the term is less than the current term it replies false. It appends
    only new entries that are not already in the logs. If an existing entry has the
    same index as the new one, but different terms, it will delete the existing entry
    and all entries following it. It will also reply false if the log does not have
    an entry at the index of the log entry immediately preceding the new one but the
    term matches.


    If there is a failed follower or candidate, the protocol will keep retrying via
    the `AppendEntries` RPC until it succeeds.


    If a command is committed, the RAFT cluster will not lose it. This is the guarantee
    provided by RAFT despite any failures such as network delays, packet loss, reboots,
    or crash faults. However, it does not handle Byzantine failures.


    Each log entry consists of a term number, an index, and a state machine command.
    A term number helps to discover inconsistencies between logs. It gives an indication
    about the time of the command. An index identifies the position of an entry in
    the log. A command is the request made by the client for execution.'
  raw: '### Leader Election


    A heartbeat mechanism is used to trigger a leader election process. All nodes
    start up as followers. Followers will run as followers as long as they keep receiving
    valid RPCs from a leader or a candidate. If a follower does not receive heartbeats
    from the leader for some time, then an “election timeout” occurs, which indicates
    that the leader has failed. The election timeout is randomly set to be between
    150ms and 300ms.


    Now the follower node undertakes the candidate role and attempts to become the
    leader by starting the election process. The candidate increments the current
    term number, votes for itself, resets election timer, and seeks votes from others
    via the `RequestVote` RPC. If it receives votes from the majority of the nodes,
    then it becomes the leader and starts sending heartbeats to other nodes, which
    are now followers. If another candidate has won and became a valid leader, then
    this candidate would start receiving heartbeats and will return to a follower
    role. If no one wins the elections and election timeout occurs, the election process
    starts again with a new term.


    Note that votes will only be granted by the receiver node in response to the `RequestVote`
    RPC if a candidate’s log is at least as up to date as the receiver’s log. Also,
    a “false” will be replied if the received term number is lower than the current
    term.


    The specific process of a leader election is shown in Figure [7-6](#515270_1_En_7_Chapter.xhtml#Fig6).


    ![](images/515270_1_En_7_Chapter/515270_1_En_7_Fig6_HTML.png)


    A flowchart of the R A F T leader election process starts with transition to candidate
    state and ends at become follower.


    Figure 7-6


    RAFT leader election


    A node can be in three states; we can visualize server states in the state diagram
    shown in Figure [7-7](#515270_1_En_7_Chapter.xhtml#Fig7), which also shows leader
    election.


    ![](images/515270_1_En_7_Chapter/515270_1_En_7_Fig7_HTML.png)


    A flowchart for the node states in R A F T starts with node start up and ends
    at the follower. The flows pass from follower to candidate and leader.


