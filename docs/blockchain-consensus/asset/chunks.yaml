- fmt: '### Detector Q or V


    This type satisfies weak completeness and strong accuracy.


    ### Eventually Detector Q (Diamond Q) or Diamond V


    This type satisfies weak completeness and eventual strong accuracy.


    Figure [3-17](#515270_1_En_3_Chapter.xhtml#Fig17) shows all this in summary.


    ![](images/515270_1_En_3_Chapter/515270_1_En_3_Fig17_HTML.jpg)


    A block diagram of failure detectors is divided into strong and weak completeness
    and further into synchronous and partially synchronous.


    **Figure 3-17** Failure detector classes


    The properties of failure detectors fundamentally revolve around the idea of how
    fast and correctly a failure detector detects faults while avoiding false positives.
    A perfect failure detector will always correctly detect failed processes, whereas
    a weak failure detector may only be able to detect very few or almost no faults
    accurately.


    #### Leader Elector Failure Detector


    Sometimes, we are not interested in finding out if processes have failed but just
    that if a single process is correct. In this approach of failure detection, instead
    of suspecting other processes a single process is considered a leader. This failure
    detector can be seen as a leader election algorithm called the Omega `Ω` failure
    detector. Initially, the leader elector can be unreliable and may elect a faulty
    process or can cause different processes to trust different leaders. We can define
    this FD as a failure detector where eventually every nonfaulty process elects
    the same nonfaulty leader process.


    As we saw earlier, in other failure detectors there is a component called `suspect`
    which contains a set of process IDs that the failure detector has suspected as
    faulty; however, in leader elector `Ω`, there is a component called `trust` which
    contains a single process ID of the elected leader.


    ### Solving Consensus Using Failure Detectors


    If we have a perfect failure detector, we can easily solve consensus in both synchronous
    and asynchronous models. However, in asynchronous systems, `P` cannot be implemented
    due to too strong accuracy and completeness requirements for this model. If somehow
    we can implement a `P` in an asynchronous system to solve consensus, that would
    violate the FLP impossibility. Therefore, we know that no such perfect FD exists
    which can solve consensus in a purely asynchronous system. We must sacrifice a
    little bit asynchrony and look for weaker failure detector classes which can solve
    consensus under asynchrony.


    Also, at this point a question arises: What is the weakest failure detector to
    solve consensus? The `⋄W` (eventually weak) is the weakest failure detector sufficient
    to solve consensus under asynchrony with a majority of correct processes.


    ## Quorums


    A quorum can be defined as any set of majority of processes. The concept is related
    to voting among a set of objects. Quorum systems are important to ensuring the
    consistency, availability, efficiency, and fault tolerance in replicated systems.


    A quorum can also be thought of as a set of minimum number of processes (votes)
    required to decide about an operation in a distributed system. A quorum-based
    methodology ensures consistency in a distributed system. We just learned under
    the “Replication” section that replication allows to build a fault-tolerant consistent
    distributed system. Here, the question arises about how many replicas are required
    to decide to finally commit an update or abort.


    Mathematically, a quorum is defined as follows:


    A quorum is a non-empty subset of `π = {1, 2, 3, ..., n}`.


    A quorum system is defined as a set `Q` of non-empty subsets of `π` which satisfies
    the following property:


    **Quorum intersection**: `∀A, B ∈ Q : A ∩ B ≠ ϕ`


    This means that any two quorums must intersect at one or more processes. This
    is also known as the pigeonhole principle. Moreover, this is called the **consistency**
    property.


    There must always be at least one quorum available that is not failed. This is
    the **quorum availability** property.


    Quorum systems are usually used in scenarios where a process, after broadcasting
    its request, awaits until it has received a response from all processes that belong
    to a quorum. This way, we can address the consistency requirements of a problem.
    Quorums are usually used to achieve crash and Byzantine fault tolerance. In consensus
    algorithms, for example, a certain size of a quorum is needed to guarantee safety
    and liveness. In other words, algorithms based on quorums satisfy safety and liveness
    only if a quorum of correct processes can be established.


    ### Crash Fault–Tolerant Quorums


    To achieve crash fault tolerance in N number of crash-stop processes, Quorum `Q`
    is set with at least `⌊n/2⌋ + 1` processes.


    For example, if `n = 7`, then `⌊7/2⌋ + 1 = ⌊3.5⌋ + 1 = 3 + 1 = 4`.


    This means that in a network of seven nodes, at least four nodes (a quorum of
    four nodes) should be nonfaulty and available to achieve crash fault tolerance.


    For example, if you have `n` replicas, out of which `f` may crash-stop, what Quorum
    `Q` size is required to achieve liveness?


    For liveness, there must be a nonfaulty Quorum `Q` available where `Q <= n – f`.


    For safety, there must be any two quorums that must intersect at one or more processes.


    Lamport used quorums under the name of amoeba in 1978.


    ### Byzantine Quorums


    Byzantine failures are difficult to handle. Imagine if there are `N` nodes, out
    of which `f` number of nodes turn Byzantine. Now these `f` nodes can behave arbitrarily,
    and there can be a case where they can vote in favor of a value and against it.
    They can make different statements to different nodes on purpose. Such a situation
    can cause even correct nodes to have divergent states and can also lead to dead
    locks.


    A Byzantine quorum that can tolerate `f` faults has more than `(n + f)/2` processes.
    There is always an intersection of at least one correct process between two Byzantine
    fault–tolerating quorums. The progress is guaranteed in Byzantine settings if
    `N > 3f`. In other words, Byzantine fault tolerance requires that `f < n/3`.


    For example:


    ```

    n = 7, f = 1

    (n + f) / 2 = (7 + 1) / 2 = 4

    ceiling((7 + 1 + 1) / 2) = ceiling(9 / 2) = 5

    ```


    Each Byzantine quorum contains more than `n − f/2` honest processes. `7 − 1/2
    = 6.5 > 3`, so there is at least one correct process in the intersection of two
    Byzantine quorums.


    ### Read and Write Quorums


    Quorum-based protocols fundamentally rely on voting to determine whether a read
    or write operation can be performed or not. There are read quorums and write quorums.
    A read quorum is the minimum number of replicas required to achieve an agreement
    on a read operation. Similarly, a write quorum is the minimum number of replicas
    required to achieve an agreement on a write operation.


    ## Where Are We Now


    Based on the last more than 40 years of research in classical distributed consensus
    and modern blockchain era protocols, we can divide consensus into two broad families.


    ### Classical Consensus


    Classical consensus or traditional distributed consensus has been a topic of research
    for around 40 years now. Starting with the SIFT project and Lamport’s and many
    other researchers’ contributions, we now have a large body of work that deals
    with the classical distributed consensus. Protocols such as Paxos, PBFT, and RAFT
    are now a norm for implementation in various practical systems.'
