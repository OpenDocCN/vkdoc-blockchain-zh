  trans: "\n### 视图变更\n\n视图变更协议的工作方式如下：\n\n1.  当副本怀疑主节点发生故障时，它会：\n    1.  递增其视图编号\n\
    \    2.  将其状态更改为视图变更\n    3.  向下一个视图的主节点发送`<DOVIEWCHANGE v, l, k, i>`消息\n\n2.\
    \  当新的主节点收到`f+1`条`<DOVIEWCHANGE>`消息时，它会：\n    1.  选择消息中最近的日志，并将其作为新的日志\n    2.\
    \  将操作编号设置为新日志中最新条目的编号\n    3.  将其状态更改为正常\n    4.  向其他副本发送`<STARTVIEW v, l, k>`消息，表明视图变更过程完成\n\
    \n3.  现在，新的主节点会：\n    1.  顺序执行任何未执行的已提交操作\n    2.  向客户端发送回复\n    3.  开始接受新的客户端请求\n\
    \n4.  其他副本在收到`<STARTVIEW>`消息后：\n    1.  用消息中的日志替换自己的日志\n    2.  将操作编号设置为日志中最新的条目编号\n\
    \    3.  将视图编号设置为消息中的编号\n    4.  将其状态更改为正常\n    5.  为未提交的消息发送`PREPAREOK`\n\n如果新的主节点也发生故障，视图变更协议会重复执行。\n\
    \n图 7-2 直观地展示了这一过程。\n\n![](img/515270_1_En_7_Fig2_HTML.png)\n\n这张 VR 中视图变更的示意图包含主节点、新主节点、副本\
    \ 1 和副本 2 的线条。这些线条分阶段展示了视图变更和新视图。\n\n**图 7-2** VR 中的视图变更\n\n这里的关键安全要求是，所有已提交的操作都必须保持其顺序传递到下一个视图。\n\
    \n我们没有刻意讨论 VR 的所有复杂细节，因为我们更关注主流协议。尽管如此，这应该能让您了解 VR 中引入的基本概念，这些概念在几乎所有复制和共识协议中都起着至关重要的作用，尤其是\
    \ PBFT、Paxos 和 RAFT。在阅读后续章节时，您将看到 PBFT 如何演变为 VR 的一种形式，以及 VR 与本章介绍的不同协议之间的其他相似之处。当您阅读关于\
    \ RAFT 的章节时，会发现 VR 和 RAFT 之间有很好的相似性。\n\n让我们首先来看 Paxos，它无疑是最具影响力和最基础的共识协议。\n\n\
    ## Paxos\n\nPaxos 由 Leslie Lamport 发现。它于 1988 年首次提出，随后在 1998 年以更正式的形式发表。这是最基础的分布式共识算法，允许在不可靠的通信条件下就某个值达成共识。换句话说，Paxos\
    \ 用于构建即使在存在故障的情况下也能正确运行的可靠系统。Paxos 使状态机复制的实现变得更加实用。一个称为 `multi-Paxos` 的 Paxos\
    \ 变体通常用于实现复制的状态机。它在异步的消息传递模型下运行，能够容忍少于 `n/2` 的崩溃故障，即满足 `2f + 1` 的下限。\n\n早期的共识机制并没有分别处理安全性和活跃性。Paxos\
    \ 协议采用了一种不同的方法来解决共识问题，它将安全性和活跃性属性分离开来。\n\n运行 Paxos 协议的系统中，节点可以承担三种角色。一个进程可以同时承担所有三种角色：\n\
    \n*   **提议者**：提议待决定的值。被选出的提议者充当单个领导者来提议新值。提议者负责处理客户端请求。\n*   **接受者**：接受者根据若干规则和条件评估并接受或拒绝提议者提出的提案。\n\
    *   **学习者**：学习决定的结果，即达成一致的值。\n\nPaxos 节点还有一些相关的规则。Paxos 节点必须是持久化的，即它们必须存储自己的行为，并且必须记住自己已经接受了什么。节点还必须知道多少个接受者能构成多数派。\n\
    \nPaxos 可以看作类似于两阶段提交协议。两阶段提交（2PC）是一种标准的原子提交协议，用于确保只有在所有参与者都同意提交的情况下，事务才会在分布式数据库中被提交。即使单个节点不同意提交事务，整个事务也会被完全回滚。\n\
    \n类似地，在 Paxos 中，提议者在第一阶段向接受者发送一个提案。然后，当且仅当接受者接受该提案时，提议者向接受者广播一个提交请求。一旦接受者提交并向提议者报告，该提案就被视为最终确定，协议结束。与两阶段提交相比，Paxos\
    \ 引入了排序，即定序，以实现提案的全序。此外，它还引入了基于多数仲裁的提案接受方式，而不是期望所有节点都同意。这种方案允许协议即使在部分节点发生故障时也能继续推进。这两项改进都保证了\
    \ Paxos 算法的安全性和活跃性。\n\n该协议由两个阶段组成：准备阶段和接受阶段。在准备阶段结束时，多数接受者已经承诺了一个特定的提案编号。在接受阶段结束时，多数接受者已经接受了一个提议的值，共识达成。\n\
    \n算法的具体工作方式如下：\n\n**第一阶段 – 准备阶段**\n\n*   提议者收到客户端要求就某个值达成共识的请求。\n*   提议者向多数或全部接受者发送`prepare(n)`消息。在此阶段，尚未为决策提议任何值。在假定多数派中的所有接受者都会响应的情况下，多数接受者就足够了。此处，`n`代表提案编号，它必须是全局唯一的，并且必须大于该提议者之前使用过的任何提案编号。例如，`n`可以是纳秒级的时间戳或其他递增的值。如果发生超时，提议者将使用更大的`n`重试。换句话说，如果提议者因缺乏接受者的响应而无法推进，它可以使用更高的提案编号重试。\n"
- fmt: "当一个接收者收到`prepare(n)`消息时，它做出一个“承诺”。它执行以下操作：\n\n- 如果之前没有通过响应准备消息做出过承诺，那么该接收者现在承诺忽略任何小于提案编号`n`的请求。它记录`n`，并回复消息`promise(n)`。\n\
    - 如果该接收者之前已经做出过承诺，即已经用某个低于`n`的提案编号响应过另一个准备消息，则接收者执行以下操作：\n  - 如果该接收者在接受阶段尚未从提议者那里收到任何接受消息，它会存储更高的提案编号`n`，然后向提议者发送一条承诺消息。\n\
    \  - 如果该接收者之前已收到一个带有其他较低提案编号的接受消息，则它一定已经从某个提议者那里接受了一个提议值。这个先前完整的提案会连同承诺消息一起发送给提议者，表明该接收者已经接受了一个值。\n\
    \n**阶段 2 – 接受阶段**\n\n当提议者从多数接收者那里收到针对特定`n`的足够多的响应（即承诺消息）时，阶段 2 开始：\n\n- 提议者会一直等待，直到它从多数接收者那里获得针对`n`的响应。\n\
    - 收到响应后，提议者评估要在接受消息中发送的值`v`。它执行以下操作：\n  - 如果提议者收到了一条或多条带有完整提案的承诺消息，它会选择具有最高提案编号的提案中的值`v`。\n\
    \  - 如果提议者收到的承诺消息中没有包含完整提案，提议者可以自由选择任何值。\n  - 提议者现在向接收者发送一条接受消息 —— 格式为`accept(n,\
    \ v)`的完整提案，其中`n`是被承诺的提案编号，`v`是实际提议的值。\n- 当接收者收到`accept(n, v)`消息时，它执行以下操作：\n  -\
    \ 如果该接收者先前已承诺不接受此提案编号，它将忽略此消息。\n  - 否则，只有当它响应过对应的具有相同`n`的准备请求（即`prepare(n)`）时，它才会回复`accepted(n,\
    \ v)`，表示接受该提案。\n  - 最后，接收者向所有学习者发送`accepted(n, v)`。\n- 如果多数接收者接受了提案中的值`v`，则`v`成为协议的决定值，即达成共识。\n\
    \n有时，人们会区分接受阶段和第三个被称为学习阶段的阶段，在学习阶段中，学习者从接收者那里了解决定值。在上述算法中，我们没有单独展示这一点，因为学习被认为是第二阶段的一部分。一旦提案在接受阶段被接受，接收者就会通知学习者。图\
    \ [7-3](#515270_1_En_7_Chapter.xhtml#Fig3) 确实展示了一个称为学习阶段的第三阶段，但这只是为了以更简单的方式可视化协议；学习实际上是阶段\
    \ 2（接受阶段）的一部分。\n\n![](images/515270_1_En_7_Chapter/515270_1_En_7_Fig3_HTML.png)\n\
    \n一个 Paxos 正常运行的图，包含提议者、接收者 1、2、3、学习者 1 和 2 的连线。这些连线分为准备、接受和学习三个阶段。\n\n**图 7-3**\
    \ Paxos 的正常运行\n\n我们使用了术语“多数”，表示多数的接收者已经响应或接受了一条消息。多数来源于一个法定人数。在多数法定人数中，每个法定人数都有`⌊n/2⌋\
    \ + 1`个节点。还要注意的是，为了容忍`f`个故障接收者，至少需要一个由`2f + 1`个接收者组成的集合。我们在第 [3](#515270_1_En_3_Chapter.xhtml)\
    \ 章中讨论了法定人数系统。\n\n该协议在图 [7-3](#515270_1_En_7_Chapter.xhtml#Fig3) 中进行了说明。\n\n请注意，Paxos\
    \ 算法一旦达成一次共识，就不会继续进入下一次共识。需要再次运行 Paxos 才能达成下一次共识。此外，如果一半或一半以上的节点出现故障，Paxos 无法取得进展，因为在这种情况下无法达成多数，而多数对于取得进展至关重要。它是安全的，因为一旦一个值被同意，它就永远不会被更改。尽管\
    \ Paxos 保证是安全的，但协议的活动性并不保证。这里的假设是，网络中有足够大的一部分在足够长的时间内是正确（无故障）的，然后协议才能达成共识；否则，协议可能永远不会终止。\n\
    \n通常，学习者是直接从接收者那里学习决定值的；然而，在大型网络中，学习者有可能通过中继其中一部分人（一个小组）直接从接收者那里学到的值，来彼此学习。或者，学习者可以定期轮询接收者，以检查是否存在决定。也可以选举出一个学习者节点，由接收者通知该节点，然后该当选的学习者将决定传播给其他学习者。\n\
    \n现在让我们考虑一些故障场景。\n\n### 故障场景\n\n想象一下，如果一个接收者在第一阶段（即准备阶段）发生故障，那么它将不会向提议者发回承诺消息。然而，如果多数法定人数能够响应，提议者将会收到这些响应，协议也将取得进展。如果一个接收者在第二阶段（即接受阶段）发生故障，那么该接收者将不会向提议者发回已接受消息。同样，如果多数接收者是正确且可用的，提议者和学习者将收到足够的响应以继续。\n\
    \n如果提议者在准备阶段或接受阶段发生故障会怎样？如果提议者在发送任何准备消息之前发生故障，则没有任何影响；其他提议者将会运行，协议将继续。如果提议者在阶段\
    \ 1 中发送了准备消息后发生故障，那么接收者将不会收到任何接受消息，因为承诺消息未能到达提议者。在这种情况下，其他提议者将以更高的提案编号进行提议，协议将继续推进。之前的准备将成为历史。如果提议者在接受阶段中发送了接受消息（该消息已被至少一个接收者收到）后发生故障，其他提议者将发送一个带有更高提案编号的准备消息，接收者将用一条承诺消息响应提议者，表明一个较早的值已经被接受。此时，提议者将转而提议同一个较早的值（即带有最高已接受提案编号的值），也就是发送一条带有相同较早值的接受消息。\n\
    \n另一种场景可能是两个提议者同时试图提议它们自己的值。想象有两个提议者已经向接收者发送了它们的准备消息。在这种情况下，任何之前从 P1 接受了更大提案编号的接收者，如果提议者\
    \ P2 提出的提案编号低于接收者之前已经接受的编号，则会忽略该提案。如果存在一个接收者 A3 之前没有见过任何值，即使 P2 的提案编号低于其他接收者之前从\
    \ P1 收到并接受的提案编号，它也会接受 P2 的提案编号，因为 A3 不知道其他接收者在做什么。该接收者随后会正常回复 P2。然而，由于提议者等待多数接收者响应，P2\
    \ 将不会从多数接收者那里收到承诺消息，因为仅凭 A3 并不构成多数。另一方面，P1 将从多数接收者那里收到承诺消息，因为 A1 和 A2（其他接收者）属于多数，并将向\
    \ P1 返回响应。当 P2 没有从多数接收者那里收到响应时，它会超时并可以尝试使用更高的提案编号重试。"
  raw: "*   When an acceptor receives this *prepare*(*n*) message, it makes a “promise.”\
    \ It performs the following:\n    *   If no previous promise has been made by\
    \ responding to the prepare message, then the acceptor now promises to ignore\
    \ any request less than the proposal number *n*. It records *n* and replies with\
    \ message *promise*(*n*).\n\n*   If the acceptor has previously promised, that\
    \ is, already responded to another prepare message with some proposal number lower\
    \ than *n*, the acceptor performs the following:\n\n*   If the acceptor has not\
    \ received any accept messages already from a proposer in the accept phase, it\
    \ stores the higher proposal number *n* and then sends a promise message to the\
    \ proposer.\n\n*   If the acceptor has received an accept message earlier with\
    \ some other lower proposal number, it must have already accepted a proposed value\
    \ from some proposer. This previous full proposal is now sent along with the promise\
    \ message to the proposer, indicating that the acceptor has already accepted a\
    \ value.\n\n**Phase 2 – accept phase**\n\nPhase 2 starts when the proposer has\
    \ received enough responses, that is, promise messages, from the majority of the\
    \ acceptors for a specific *n*:\n\n*   The proposer waits until it gets responses\
    \ from the majority of the acceptors for *n*.\n\n*   When responses are received,\
    \ the proposer evaluates what value *v* to be sent in the accept message. It performs\
    \ the following:\n    *   If the proposer received one or more promise messages\
    \ with full proposals, it chooses the value *v* in the proposal with the highest\
    \ proposal number.\n\n*   If no promise messages received by the proposer include\
    \ a full proposal, the proposer can choose any value it wants.\n\n*   The proposer\
    \ now sends an accept message – a full proposal of the form *accept*(*n*, *v*)\
    \ – to the acceptors, where *n* is the promised proposal number and *v* is the\
    \ actual proposed value.\n\n*   When an acceptor receives this *accept*(*n*, *v*)\
    \ message, it does the following:\n    *   If the acceptor has promised not to\
    \ accept this proposal number previously, it will ignore the message.\n\n*   Otherwise,\
    \ if it has responded to the corresponding prepare request with the same *n*,\
    \ that is, *prepare*(*n*), only then it replies with *accepted*(*n*, *v*) indicating\
    \ acceptance of the proposal.\n\n*   Finally, the acceptor sends *accepted*(*n*,\
    \ *v*) to all learners.\n\n*   If a majority of acceptors accept the value *v*\
    \ in the proposal, then *v* becomes the decided value of the protocol i.e., consensus\
    \ is reached.\n\nSometimes, there is a distinction made between the accept phase\
    \ and a third phase called the learning phase where learners learn about the decided\
    \ value from the acceptors. We have not shown that separately in the preceding\
    \ algorithm, as learning is considered part of the second phase. As soon as a\
    \ proposal is accepted in the accept phase, the acceptor informs the learners.\
    \ Figure [7-3](#515270_1_En_7_Chapter.xhtml#Fig3) does show a third phase called\
    \ the learn phase, but it is just for visualizing the protocol in a simpler way;\
    \ learning is in fact part of phase 2, the accept phase.\n\n![](images/515270_1_En_7_Chapter/515270_1_En_7_Fig3_HTML.png)\n\
    \nA diagram of a normal run of Paxos has lines for proposer, acceptor 1, 2, 3,\
    \ learner 1, and 2\\. The lines are phased into prepare, accept, and learn.\n\n\
    Figure 7-3\n\nA normal run of Paxos\n\nWe have used the term majority indicating\
    \ that a majority of acceptors have responded to or accepted a message. Majority\
    \ comes from a quorum. In the majority quorum, every quorum has ![$$ \\left\\\
    lfloor \\frac{n}{2}\\right\\rfloor +1 $$](images/515270_1_En_7_Chapter/515270_1_En_7_Chapter_TeX_IEq1.png)\
    \ nodes. Also note that in order to tolerate *f* faulty acceptors, at least a\
    \ set consisting of 2*f* + 1 acceptors is required. We discussed quorum systems\
    \ in Chapter [3](#515270_1_En_3_Chapter.xhtml).\n\nThe protocol is illustrated\
    \ in Figure [7-3](#515270_1_En_7_Chapter.xhtml#Fig3).\n\nNote that the Paxos algorithm\
    \ once reached a single consensus will not proceed to another consensus. Another\
    \ run of Paxos is needed to reach another consensus. Moreover, Paxos cannot make\
    \ progress if half or more than half of the nodes are faulty because in such a\
    \ case a majority cannot be achieved, which is essential for making progress.\
    \ It is safe because once a value is agreed, it is never changed. Even though\
    \ Paxos is guaranteed to be safe, liveness of the protocol is not guaranteed.\
    \ The assumption here is that a large portion of the network is correct (nonfaulty)\
    \ for adequately enough time, and then the protocol reaches consensus; otherwise,\
    \ the protocol may never terminate.\n\nUsually, learners learn the decision value\
    \ directly from the acceptors; however, it is possible that in a large network\
    \ learners may learn values from each other by relaying what some of them (a small\
    \ group) have learned directly from acceptors. Alternatively, learners can poll\
    \ the acceptors at intervals to check if there’s a decision. There can also be\
    \ an elected learner node which is notified by the acceptors, and this elected\
    \ learner disseminates the decision to other learners.\n\nNow let’s consider some\
    \ failure scenarios.\n\n### Failure Scenarios\n\nImagine if an acceptor fails\
    \ in the first phase, that is, the prepare phase, then it won’t send the promise\
    \ message back to the proposer. However, if a majority quorum can respond back,\
    \ the proposer will receive the responses, and the protocol will make progress.\
    \ If an acceptor fails in the second phase, that is, the accept phase, then the\
    \ acceptor will not send the accepted message back to the proposer. Here again,\
    \ if the majority of the acceptors is correct and available, the proposer and\
    \ learners will receive enough responses to proceed.\n\nWhat if the proposer failed\
    \ either in the prepare phase or the accept phase? If a proposer fails before\
    \ sending any prepare messages, there is no impact; some other proposer will run,\
    \ and the protocol will continue. If a proposer fails in phase 1, after sending\
    \ the prepare messages, then acceptors will not receive any accept messages, because\
    \ promise messages did not make it to the proposer. In this case, some other proposer\
    \ will propose with a higher proposal number, and the protocol will progress.\
    \ The old prepare will become history. If a proposer fails during the accept phase\
    \ after sending the accept message which was received by at least one acceptor,\
    \ some other proposer will send a prepare message with a higher proposal number,\
    \ and the acceptor will respond to the proposer with a promise message that an\
    \ earlier value is already accepted. At this point, the proposer will switch to\
    \ proposing the same earlier value bearing the highest accepted proposal number,\
    \ that is, send an accept message with the same earlier value.\n\nAnother scenario\
    \ could be if there are two proposers trying to propose their value at the same\
    \ time. Imagine there are two proposers who have sent their prepare messages to\
    \ the acceptors. In this case, any acceptor who had accepted a larger proposal\
    \ number previously from P1 would ignore the proposal if the proposal number proposed\
    \ by the proposer P2 is lower than what acceptors had accepted before. If there\
    \ is an acceptor A3 who has not seen any value before, it would accept the proposal\
    \ number from P2 even if it is lower than the proposal number that the other acceptors\
    \ have received and accepted from P1 before because the acceptor A3 has no idea\
    \ what other acceptors are doing. The acceptor will then respond as normal back\
    \ to P2\\. However, as proposers wait for a majority of acceptors to respond,\
    \ P2 will not receive promise messages from a majority, because A3 only is not\
    \ a majority. On the other hand, P1 will receive promise messages from the majority,\
    \ because A1 and A2 (other proposers) are in the majority and will respond back\
    \ to P1\\. When P2 doesn’t hear from a majority, it times out and can retry with\
    \ a higher proposal number."
  trans: "\n当一个接收者收到`prepare(n)`消息时，它做出一个“承诺”。它执行以下操作：\n\n- 如果之前没有通过响应准备消息做出过承诺，那么该接收者现在承诺忽略任何小于提案编号`n`的请求。它记录`n`，并回复消息`promise(n)`。\n\
    - 如果该接收者之前已经做出过承诺，即已经用某个低于`n`的提案编号响应过另一个准备消息，则接收者执行以下操作：\n  - 如果该接收者在接受阶段尚未从提议者那里收到任何接受消息，它会存储更高的提案编号`n`，然后向提议者发送一条承诺消息。\n\
    \  - 如果该接收者之前已收到一个带有其他较低提案编号的接受消息，则它一定已经从某个提议者那里接受了一个提议值。这个先前完整的提案会连同承诺消息一起发送给提议者，表明该接收者已经接受了一个值。\n\
    \n**阶段 2 – 接受阶段**\n\n当提议者从多数接收者那里收到针对特定`n`的足够多的响应（即承诺消息）时，阶段 2 开始：\n\n- 提议者会一直等待，直到它从多数接收者那里获得针对`n`的响应。\n\
    - 收到响应后，提议者评估要在接受消息中发送的值`v`。它执行以下操作：\n  - 如果提议者收到了一条或多条带有完整提案的承诺消息，它会选择具有最高提案编号的提案中的值`v`。\n\
    \  - 如果提议者收到的承诺消息中没有包含完整提案，提议者可以自由选择任何值。\n  - 提议者现在向接收者发送一条接受消息 —— 格式为`accept(n,\
    \ v)`的完整提案，其中`n`是被承诺的提案编号，`v`是实际提议的值。\n- 当接收者收到`accept(n, v)`消息时，它执行以下操作：\n  -\
    \ 如果该接收者先前已承诺不接受此提案编号，它将忽略此消息。\n  - 否则，只有当它响应过对应的具有相同`n`的准备请求（即`prepare(n)`）时，它才会回复`accepted(n,\
    \ v)`，表示接受该提案。\n  - 最后，接收者向所有学习者发送`accepted(n, v)`。\n- 如果多数接收者接受了提案中的值`v`，则`v`成为协议的决定值，即达成共识。\n\
    \n有时，人们会区分接受阶段和第三个被称为学习阶段的阶段，在学习阶段中，学习者从接收者那里了解决定值。在上述算法中，我们没有单独展示这一点，因为学习被认为是第二阶段的一部分。一旦提案在接受阶段被接受，接收者就会通知学习者。图\
    \ 7-3 确实展示了一个称为学习阶段的第三阶段，但这只是为了以更简单的方式可视化协议；学习实际上是阶段 2（接受阶段）的一部分。\n\n![](img/515270_1_En_7_Fig3_HTML.png)\n\
    \n一个 Paxos 正常运行的图，包含提议者、接收者 1、2、3、学习者 1 和 2 的连线。这些连线分为准备、接受和学习三个阶段。\n\n**图 7-3**\
    \ Paxos 的正常运行\n\n我们使用了术语“多数”，表示多数的接收者已经响应或接受了一条消息。多数来源于一个法定人数。在多数法定人数中，每个法定人数都有`⌊n/2⌋\
    \ + 1`个节点。还要注意的是，为了容忍`f`个故障接收者，至少需要一个由`2f + 1`个接收者组成的集合。我们在第 3 章中讨论了法定人数系统。\n\n\
    该协议在图 7-3 中进行了说明。\n\n请注意，Paxos 算法一旦达成一次共识，就不会继续进入下一次共识。需要再次运行 Paxos 才能达成下一次共识。此外，如果一半或一半以上的节点出现故障，Paxos\
    \ 无法取得进展，因为在这种情况下无法达成多数，而多数对于取得进展至关重要。它是安全的，因为一旦一个值被同意，它就永远不会被更改。尽管 Paxos 保证是安全的，但协议的活动性并不保证。这里的假设是，网络中有足够大的一部分在足够长的时间内是正确（无故障）的，然后协议才能达成共识；否则，协议可能永远不会终止。\n\
    \n通常，学习者是直接从接收者那里学习决定值的；然而，在大型网络中，学习者有可能通过中继其中一部分人（一个小组）直接从接收者那里学到的值，来彼此学习。或者，学习者可以定期轮询接收者，以检查是否存在决定。也可以选举出一个学习者节点，由接收者通知该节点，然后该当选的学习者将决定传播给其他学习者。\n\
    \n现在让我们考虑一些故障场景。\n\n### 故障场景\n\n想象一下，如果一个接收者在第一阶段（即准备阶段）发生故障，那么它将不会向提议者发回承诺消息。然而，如果多数法定人数能够响应，提议者将会收到这些响应，协议也将取得进展。如果一个接收者在第二阶段（即接受阶段）发生故障，那么该接收者将不会向提议者发回已接受消息。同样，如果多数接收者是正确且可用的，提议者和学习者将收到足够的响应以继续。\n\
    \n如果提议者在准备阶段或接受阶段发生故障会怎样？如果提议者在发送任何准备消息之前发生故障，则没有任何影响；其他提议者将会运行，协议将继续。如果提议者在阶段\
    \ 1 中发送了准备消息后发生故障，那么接收者将不会收到任何接受消息，因为承诺消息未能到达提议者。在这种情况下，其他提议者将以更高的提案编号进行提议，协议将继续推进。之前的准备将成为历史。如果提议者在接受阶段中发送了接受消息（该消息已被至少一个接收者收到）后发生故障，其他提议者将发送一个带有更高提案编号的准备消息，接收者将用一条承诺消息响应提议者，表明一个较早的值已经被接受。此时，提议者将转而提议同一个较早的值（即带有最高已接受提案编号的值），也就是发送一条带有相同较早值的接受消息。\n\
    \n另一种场景可能是两个提议者同时试图提议它们自己的值。想象有两个提议者已经向接收者发送了它们的准备消息。在这种情况下，任何之前从 P1 接受了更大提案编号的接收者，如果提议者\
    \ P2 提出的提案编号低于接收者之前已经接受的编号，则会忽略该提案。如果存在一个接收者 A3 之前没有见过任何值，即使 P2 的提案编号低于其他接收者之前从\
    \ P1 收到并接受的提案编号，它也会接受 P2 的提案编号，因为 A3 不知道其他接收者在做什么。该接收者随后会正常回复 P2。然而，由于提议者等待多数接收者响应，P2\
    \ 将不会从多数接收者那里收到承诺消息，因为仅凭 A3 并不构成多数。另一方面，P1 将从多数接收者那里收到承诺消息，因为 A1 和 A2（其他接收者）属于多数，并将向\
    \ P1 返回响应。当 P2 没有从多数接收者那里收到响应时，它会超时并可以尝试使用更高的提案编号重试。\n"
- fmt: 'Now imagine a scenario where with `P1` the acceptors have already reached
    a consensus, but there is another proposer `P2` which doesn’t know that and sends
    a prepare message with a higher than before proposal number. The acceptors at
    this point, after receiving the higher proposal number message from `P2`, will
    check if they have accepted any message at all before; if yes, the acceptors will
    respond back to `P2` with the promise message of the form `promise(nfromp2,(nfromp1,
    vfromp1))` containing the previous highest proposal number they have accepted,
    along with the previous accepted value. Otherwise, they will respond normally
    back to `P2` with a promise message. When `P2` receives this message, `promise(nfromp2,(nfromp1,
    vfromp1))`, it will check the message, and value `v` will become `vfromp1` if
    `nfromp1` is the highest previous proposal number. Otherwise, `P2` will choose
    any value `v` it wants. In summary, if `P2` has received promise messages indicating
    that another value has already been chosen, it will propose the previously chosen
    value with the highest proposal number. At this stage, `P2` will send an accept
    message with its `n` and `v` already chosen (`vfromp1`). Now acceptors are happy
    because they see the highest `n` and will respond back with an accepted message
    as normal and will inform learners too. Note that the previously chosen value
    is still the value proposed by `P2`, just with the highest proposal number `n`
    now.


    There are scenarios where the protocol could get into a livelock state and progress
    can halt. A scenario could be where two different proposers are competing with
    proposals. This situation is also known as “dueling proposers.” In such cases,
    the liveness of Paxos cannot be guaranteed.


    Imagine we have two proposers, `P1` and `P2`. We have three acceptors, `A1`, `A2`,
    and `A3`. Now, `P1` sends the prepare messages to the majority of acceptors, `A1`
    and `A2`. `A1` and `A2` reply with promise messages to `P1`. Imagine now the other
    proposer, `P2`, also proposes and sends a prepare message with a higher proposal
    number to `A2` and `A3`. `A3` and `A2` send the promise back to `P2` because,
    by protocol rules, acceptors will promise back to the prepare message if the prepare
    message comes with a higher proposal number than what the acceptors have seen
    before. In phase 2, when `P1` sends the accept message, `A1` will accept it and
    reply with accepted, but `A2` will ignore this message because it has already
    promised a higher proposal number from `P2`. In this case, `P1` will eventually
    time out, waiting for a majority response from acceptors because the majority
    will now never respond. Now, `P1` will try again with a higher proposal number
    and send the prepare message to `A1` and `A2`. Assume both `A1` and `A2` have
    responded with promise messages. Now suppose `P2` sends an accept message to get
    its value chosen to `A2` and `A3`. `A3` will respond with an accepted message,
    but `A2` will not respond to `P2` because it has already promised another higher
    proposal number from `P1`. Now, `P2` will time out, waiting for the majority response
    from the acceptors. `P2` now will try again with a higher proposal number. This
    cycle can repeat again and again, and consensus will never be reached because
    there is never a majority response from the acceptors to any proposers.


    This issue is typically handled by electing a single proposer as the leader to
    administer all clients’ incoming requests. This way, there is no competition among
    different proposers, and this livelock situation cannot occur. However, electing
    a leader is also not straightforward. A unique leader election is equivalent to
    solving consensus. For leader election, an instance of Paxos will have to run,
    that election consensus may get a livelock too, and we are in the same situation
    again. One possibility is to use a different type of election mechanism, for example,
    the bully algorithm. Some other leader election algorithms are presented in works
    of Aguilera et.al. We may use some other kind of consensus mechanism to elect
    a leader that perhaps guarantees termination but somewhat sacrifices safety. Another
    way to handle the livelock problem is to use random exponentially increasing delays,
    resulting in a client having to wait for a while before proposing again. I think
    these delays may well also be introduced at proposers, which will result in one
    proposer taking a bit of precedence over another and getting its value accepted
    before the acceptors could receive another prepared message with a higher proposal
    number. Note that there is no requirement in classical Paxos to have a single
    elected leader, but in practical implementations, it is commonly the case to elect
    a leader. Now if that single leader becomes the single point of failure, then
    another leader must be elected.


    A key point to remember is that `2*f* + 1` acceptors are required for `*f*` crash
    faults to be tolerated. Paxos can also tolerate omission faults. Suppose a prepare
    message is lost and didn’t make it to acceptors, the proposer will wait and time
    out and retry with a higher proposal number. Also, another proposer can propose
    meanwhile with a higher proposal number, and the protocol can still work. Also,
    as only a majority of acceptor responses are required, as long as a majority of
    messages (`2*f* + 1`) made it through to the proposer from acceptors, the protocol
    will progress. It is however possible that due to omission faults, the protocol
    takes longer to reach consensus or may never terminate under some scenarios, but
    it will always be safe.'
  raw: 'Now imagine a scenario where with P1 the acceptors have already reached a
    consensus, but there is another proposer P2 which doesn’t know that and sends
    a prepare message with a higher than before proposal number. The acceptors at
    this point, after receiving the higher proposal number message from P2, will check
    if they have accepted any message at all before; if yes, the acceptors will respond
    back to P2 with the promise message of the form promise(nfromp2,(nfromp1, vfromp1))
    containing the previous highest proposal number they have accepted, along with
    the previous accepted value. Otherwise, they will respond normally back to P2
    with a promise message. When P2 receives this message, promise(nfromp2,(nfromp1,
    vfromp1)), it will check the message, and value v will become vfromp1 if nfromp1
    is the highest previous proposal number. Otherwise, P2 will choose any value v
    it wants. In summary, if P2 has received promise messages indicating that another
    value has already been chosen, it will propose the previously chosen value with
    the highest proposal number. At this stage, P2 will send an accept message with
    its n and v already chosen (vfromp1). Now acceptors are happy because they see
    the highest n and will respond back with an accepted message as normal and will
    inform learners too. Note that the previously chosen value is still the value
    proposed by P2, just with the highest proposal number n now.


    There are scenarios where the protocol could get into a livelock state and progress
    can halt. A scenario could be where two different proposers are competing with
    proposals. This situation is also known as “dueling proposers.” In such cases,
    the liveness of Paxos cannot be guaranteed.


    Imagine we have two proposers, P1 and P2\. We have three acceptors, A1, A2, and
    A3\. Now, P1 sends the prepare messages to the majority of acceptors, A1 and A2\.
    A1 and A2 reply with promise messages to P1. Imagine now the other proposer, P2,
    also proposes and sends a prepare message with a higher proposal number to A2
    and A3\. A3 and A2 send the promise back to P2 because, by protocol rules, acceptors
    will promise back to the prepare message if the prepare message comes with a higher
    proposal number than what the acceptors have seen before. In phase 2, when P1
    sends the accept message, A1 will accept it and reply with accepted, but A2 will
    ignore this message because it has already promised a higher proposal number from
    P2\. In this case, P1 will eventually time out, waiting for a majority response
    from acceptors because the majority will now never respond. Now, P1 will try again
    with a higher proposal number and send the prepare message to A1 and A2. Assume
    both A1 and A2 have responded with promise messages. Now suppose P2 sends an accept
    message to get its value chosen to A2 and A3\. A3 will respond with an accepted
    message, but A2 will not respond to P2 because it has already promised another
    higher proposal number from P1\. Now, P2 will time out, waiting for the majority
    response from the acceptors. P2 now will try again with a higher proposal number.
    This cycle can repeat again and again, and consensus will never be reached because
    there is never a majority response from the acceptors to any proposers.


    This issue is typically handled by electing a single proposer as the leader to
    administer all clients’ incoming requests. This way, there is no competition among
    different proposers, and this livelock situation cannot occur. However, electing
    a leader is also not straightforward. A unique leader election is equivalent to
    solving consensus. For leader election, an instance of Paxos will have to run,
    that election consensus may get a livelock too, and we are in the same situation
    again. One possibility is to use a different type of election mechanism, for example,
    the bully algorithm. Some other leader election algorithms are presented in works
    of Aguilera et.al. We may use some other kind of consensus mechanism to elect
    a leader that perhaps guarantees termination but somewhat sacrifices safety. Another
    way to handle the livelock problem is to use random exponentially increasing delays,
    resulting in a client having to wait for a while before proposing again. I think
    these delays may well also be introduced at proposers, which will result in one
    proposer taking a bit of precedence over another and getting its value accepted
    before the acceptors could receive another prepared message with a higher proposal
    number. Note that there is no requirement in classical Paxos to have a single
    elected leader, but in practical implementations, it is commonly the case to elect
    a leader. Now if that single leader becomes the single point of failure, then
    another leader must be elected.


    A key point to remember is that 2*f* + 1 acceptors are required for *f* crash
    faults to be tolerated. Paxos can also tolerate omission faults. Suppose a prepare
    message is lost and didn’t make it to acceptors, the proposer will wait and time
    out and retry with a higher proposal number. Also, another proposer can propose
    meanwhile with a higher proposal number, and the protocol can still work. Also,
    as only a majority of acceptor responses are required, as long as a majority of
    messages (2*f* + 1) made it through to the proposer from acceptors, the protocol
    will progress. It is however possible that due to omission faults, the protocol
    takes longer to reach consensus or may never terminate under some scenarios, but
    it will always be safe.'
  trans: '

    现在设想一个场景：某个`P1`提议的提案已被接受者达成共识，但另一个提议者`P2`对此并不知情，并发送了一个比之前编号更高的准备请求消息。此时，接受者在收到`P2`发来的更高编号的请求后，会检查自己之前是否已接受过任何消息；如果已接受，接受者将向`P2`回复一个格式为`promise(nfromp2,(nfromp1,
    vfromp1))`的承诺消息，其中包含它们之前接受过的最高提案编号以及对应的已接受值。否则，它们会正常回复一个承诺消息给`P2`。当`P2`收到消息`promise(nfromp2,(nfromp1,
    vfromp1))`后，会对其进行检查：如果`nfromp1`是此前最高的提案编号，那么值`v`将变为`vfromp1`；否则，`P2`将选择它自己想要的任意值`v`。总之，如果`P2`收到的承诺消息表明另一个值已被选定，那么它将提出此前已被选定的、编号最高的值。此时，`P2`会以其已选定的`n`和`v`（即`vfromp1`）发送一个接受消息。现在接受者们都很满意，因为它们看到了最高的`n`，会像往常一样回复一个已接受消息，并同时通知学习者。请注意，此时被选定的值仍然是`P2`提出的值，只是现在的编号`n`变成了最高。


    在某些场景下，该协议可能进入活锁状态，从而导致进度停滞。一种场景可能是两个不同的提议者互相竞争提案，这种情况也被称为“决斗的提议者”。在这种情况下，Paxos
    的活性无法得到保证。


    假设我们有两位提议者`P1`和`P2`，以及三位接受者`A1`、`A2`和`A3`。现在，`P1`向多数派接受者`A1`和`A2`发送准备消息。`A1`和`A2`向`P1`回复了承诺消息。再假设另一位提议者`P2`也提出提案，并向`A2`和`A3`发送了一个编号更高的准备消息。由于协议规则规定，如果准备消息的提案编号高于接受者此前见过的编号，接受者就会对该准备消息做出承诺，因此`A3`和`A2`向`P2`回复了承诺消息。在第二阶段，当`P1`发送接受消息时，`A1`会接受它并回复已接受，但`A2`会忽略该消息，因为它已经承诺了来自`P2`的更高编号。此时，`P1`最终会因等待来自接受者的多数派响应而超时，因为多数派现在永远不会响应了。于是，`P1`会使用一个更高的编号再次尝试，并向`A1`和`A2`发送准备消息。假设`A1`和`A2`都回复了承诺消息。现在假设`P2`向`A2`和`A3`发送接受消息以使其值被选定。`A3`会回复已接受消息，但`A2`不会回复`P2`，因为它已经承诺了来自`P1`的另一个更高编号。于是，`P2`会因等待来自接受者的多数派响应而超时。`P2`现在会使用一个更高的编号再次尝试。这个循环可能周而复始，共识将永远无法达成，因为没有任何一个提议者能从接受者那里获得多数派响应。


    这个问题通常通过选举一个单一的提议者作为领导者来处理所有客户端的传入请求来解决。这样一来，不同提议者之间就不会有竞争，因此不会发生这种活锁情况。然而，选举领导者也并非易事。唯一的领导者选举等同于解决共识问题。为了选举领导者，必须运行一个
    Paxos 实例，而该选举共识本身也可能陷入活锁，于是我们又回到了同样的境地。一种可能性是使用不同类型的选举机制，例如“霸道算法”。Aguilera 等人的工作中还提出了其他一些领导者选举算法。我们也可以使用其他类型的共识机制来选举领导者，这种机制或许能保证终止，但在安全性上会有所牺牲。另一种处理活锁问题的方法是使用随机的指数级增长延迟，使得客户端在再次提出提案之前必须等待一段时间。我认为这些延迟也可以被引入到提议者端，这样会使某个提议者比另一个略微占优，从而在接受者收到另一个更高编号的准备消息之前，其提案值就能被接受。请注意，经典
    Paxos 协议并不要求必须有一个被选举出的单一领导者，但在实际实现中，选举一个领导者是常见的做法。如果这个单一的领导者变成了单点故障，那么就必须选举另一个领导者。


    需要记住的一个关键点是，要容忍`*f*`个崩溃故障，需要`2*f* + 1`个接受者。Paxos 也能容忍遗漏故障。假设一个准备消息丢失了，未能到达接受者，那么提议者将等待、超时，并使用更高的编号重试。同时，另一位提议者也可能在此期间使用更高的编号提出提案，协议仍然可以工作。此外，由于只需要接受者的多数派响应，只要多数派消息（`2*f*
    + 1`个）从接受者成功到达提议者，协议就能继续推进。然而，由于遗漏故障，协议可能需要更长时间才能达成共识，或者在某些场景下可能永远无法终止，但它始终能保证安全性。

    '
- fmt: '### Safety and Liveness


    The Paxos algorithm solves the consensus problem by achieving **safety** and **liveness**
    properties. We have some requirements for each property. Under safety, we mainly
    have the agreement and validity. An **agreement** means that no two different
    values are chosen. **Validity** or sometimes called **nontriviality** means no
    value is decided unless proposed by some process participating in the protocol.
    Another safety requirement which stems from the validity property and may be called
    “**valid learning**” is that if a process **learns** a value, the value must have
    been decided by a process. An agreement ensures that all processes decide on the
    same value. Validity and valid learning requirements ensure that processes decide
    only on a proposed value and do not trivially choose to not decide or just choose
    some predefined value.


    Under **liveness**, there are two requirements. First, the protocol eventually
    **decides**, that is, a proposed value is eventually decided. Second, if a value
    is decided, the learners eventually **learn** that value.


    Let’s now discuss how these safety and liveness requirements are met.


    Intuitively, the agreement is achieved by ensuring that a majority of acceptors
    can vote for only one proposal. Imagine two different values `v1` and `v2` are
    somehow chosen (decided). We know that the protocol will choose a value only if
    a majority of the acceptors accept the same accept message from a proposer. This
    condition implies that a set of majority acceptors `A1` must have accepted an
    accept message with a proposal `(n1,v1)`. Also, another accept message with proposal
    `(n2, v2)` must have been accepted by another set of majority acceptors `A2`.
    Assuming that two majority sets `A1` and `A2` must intersect, meaning they will
    have at least one acceptor in common due to the quorum intersection rule. This
    acceptor must have accepted two different proposals with the same proposal number.
    Such a scenario is impossible because an acceptor will ignore any prepare or accept
    messages with the same proposal number they have already accepted.


    If `n1 <> n2` and `n1 < n2` and `n1` and `n2` are consecutive proposal rounds,
    then this means that `A1` must have accepted the accept message with proposal
    number `n1` before `A2` accepted the accept messages with `n2`. This is because
    an acceptor ignores any prepare or accept messages if they have a smaller proposal
    number than the previously promised proposal number. Also, the proposed value
    by a proposer must be from either an earlier proposal with the highest proposal
    number or the proposer’s own proposed value if no proposed value is included in
    the accepted message. As we know, `A1` and `A2` must intersect with at least one
    common acceptor; this common acceptor must have accepted the accept messages for
    both proposals `(n1,v1)` and `(n2,v2)`. This scenario is also impossible because
    the acceptor would have replied with `(n1,v1)` in response to the prepare message
    with proposal number `n2`, and the proposer must have selected the value `v1`
    instead of `v2`. Even with nonconsecutive proposals, any intermediate proposals
    must also select `v1` as the chosen value.


    Validity is ensured by allowing only the input values of proposers to be proposed.
    In other words, the decided value is never predefined, nor is it proposed by any
    other entity that is not part of the cluster running Paxos.


    Liveness is not guaranteed in Paxos due to asynchrony. However, if some synchrony
    assumption, that is, a partially synchronous environment, is assumed, then progress
    can be made, and termination is achievable. We assume that after GST, at least
    a majority of acceptors is correct and available. Messages are delivered within
    a known upper bound, and an elected unique nonfaulty leader proposer is correct
    and available.


    ### In Practice


    Paxos has been implemented in many practical systems. Even though the Paxos algorithm
    is quite simple at its core, it is often viewed as difficult to understand. As
    a result, many papers have been written to explain it. Still, it is often considered
    complicated and tricky to comprehend fully. Nevertheless, this slight concern
    does not mean that it has not been implemented anywhere. On the contrary, it has
    been implemented in many production systems, such as Google’s Spanner and Chubby.
    The first deployment of Paxos was in a Petal distributed storage system. Some
    other randomly chosen examples include Apache ZooKeeper, NoSQL Azure Cosmos database,
    and Apache Cassandra. It proves to be the most efficient protocol to solve the
    consensus problem. It has been shown that the two-phase commit is a special case
    of Paxos, and PBFT is a refinement of Paxos.


    ### Variants


    There are many variants of classical Paxos, such as multi-Paxos, Fast Paxos, Byzantine
    Paxos, Dynamic Paxos, Vertical Paxos, Disk Paxos, Egalitarian Paxos, Stoppable
    Paxos, and Cheap Paxos.'
