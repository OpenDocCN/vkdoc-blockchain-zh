- fmt: "##### Linearizability\n\nAnother stronger property that a state machine replication\
    \ protocol may implement is called linearizability. Linearizability is also called\
    \ atomic consistency, and it means that command execution appears as if executed\
    \ on a single copy of the state machine, even if there are multiple replicas.\
    \ The critical requirement of linearizability is that the state read is always\
    \ up to date, and no stale data is ever read.\n\nConsistency models allow developers\
    \ to understand the behavior of the replicated storage system. When interacting\
    \ with a replicated system, the application developers experience the same behavior\
    \ as interacting with a single system. Such transparency allows developers to\
    \ use the same single server convention of writing application logic. If a replicated\
    \ system possesses such transparency, then it is said to be linearizable.\n\n\
    In literature, linearizability is also called strong consistency, atomic consistency,\
    \ or immediate consistency.\n\n##### Sequential Consistency\n\nIn this type of\
    \ consistency, all nodes see the same order of commands as other nodes.\n\nLinearizability\
    \ and sequential consistency are two classes of **strong consistency**.\n\n#####\
    \ Eventual Consistency\n\nUnder the eventual consistency model, there is an eventual\
    \ guarantee that each replica will be in the same state if there are no more updates.\
    \ However, this implies that there is no timing guarantee because updates may\
    \ never stop. Therefore, this is not quite a reliable model. Another stronger\
    \ scheme is called strong eventual consistency which has two properties. Firstly,\
    \ updates applied to one honest replica are eventually applied to every nonfaulty\
    \ replica. Secondly, regardless of the order in which the updates have been processed,\
    \ if two replicas have processed the same set of updates, they end up in the same\
    \ state. The first property is called eventual delivery, whereas the second property\
    \ is named convergence.\n\nThere are several advantages of this approach. It allows\
    \ replicas to progress without network connectivity until the connectivity is\
    \ restored, and eventually replicas converge to the same state. Eventual consistency\
    \ can work with weaker models of broadcast, instead of total order broadcast.\n\
    \nEventual consistency has several categories such as last write wins. The technique\
    \ here is to apply updates with the most recent timestamp and discard any other\
    \ updates writing to the same key (updating the same data) with lower timestamps.\
    \ This means that we accept some data loss in favor of eventually converging state\
    \ at all replicas.\n\n##### SMR Using Weaker Broadcast Abstractions\n\nSMR makes\
    \ use of total order broadcast for achieving a global order of commands in the\
    \ system. Here, the question arises whether we can use weaker types of broadcast\
    \ abstractions to build state machine replication. The answer is yes; however,\
    \ a property called “commutativity” is required along with some other properties.\
    \ Updates are commutative if the order of two updates does not matter, for example,\
    \ in arithmetic, `A + B = B + A`, the order of `A` and `B` doesn’t matter; it\
    \ will achieve the same result. Similarly, we say that commands `x` and `y` commute,\
    \ if in every state *s* of the state machine executing `x` before `y` or `y` executing\
    \ before `x` results in the same state update and `x` and `y` returns the same\
    \ response when executed. In this, we say `x` and `y` commute.\n\nThe key insight\
    \ here is that if replica state updates are commutative, then replicas can process\
    \ the commands in any order and still would end up in the same state. Of course,\
    \ you must build commutative mechanics into the protocol. Table [3-1](#515270_1_En_3_Chapter.xhtml#Tab1)\
    \ shows different broadcasts and relevant properties along with assumptions regarding\
    \ a state update.^([²](#fn2))\n\n**Table 3-1**  \nBroadcasts and requirements\
    \ to build replication\n\n| Type of Broadcast | Key Property | State Update Requirement\
    \ |\n| --- | --- | --- |\n| Total order | All messages delivered in the same order\
    \ at all replicas | Deterministic |\n| Causal broadcast | Delivers messages in\
    \ causal order, but concurrent messages could be delivered in any order | Deterministic,\
    \ concurrent updates commutativity |\n| Reliable broadcast | No ordering guarantee\
    \ with no duplicate messages | Deterministic, all updates commutativity |\n| Best-effort\
    \ broadcast | Best effort, no delivery guarantee | Deterministic, commutative,\
    \ idempotent, and tolerates message loss |\n\nNow let’s explore some fundamental\
    \ results in distributed computing which underpins distributed protocols and algorithms.\n\
    \n### Fundamental Results\n\nIn distributed computing, there are many fundamental\
    \ results that have been reported by researchers. These fundamental results provide\
    \ the foundation on which the distributed computing paradigm stands. Most interesting\
    \ of these are impossibility results.\n\n#### Impossibility Results\n\nImpossibility\
    \ results provide us an understanding of whether a problem is solvable or not\
    \ and the minimum resources required to do so. If a problem is unsolvable, then\
    \ these results provide a clear understanding why a specific problem is unsolvable.\
    \ If an impossibility result is proven, then no further research is necessary\
    \ on that, and researchers can focus their attention on other problems or to circumvent\
    \ these results somehow. These results show us that certain problems are unsolvable\
    \ unless sufficient resources are provided. In other words, they show that certain\
    \ problems cannot be computed if resources are insufficient. There are problems\
    \ that are outright unsolvable, and some are solvable only if given enough resources.\
    \ The requirement of minimum available resources to solve a problem is known as\
    \ **lower bound results**.\n\nIn order to prove that some problems cannot be solved,\
    \ it is essential to define a system model and the class of allowable algorithms.\
    \ Some problems are solvable under one model but not in others. For example, consensus\
    \ is unsolvable under asynchronous network assumptions but is solvable under synchronous\
    \ and in partially synchronous networks.\n\nOne of the most fundamental results\
    \ in distributed computing is how many nodes/processes are required to tolerate\
    \ crash only and Byzantine faults.\n\n#### Minimum Number of Processes\n\nIt has\
    \ been proven that a certain minimum number of processes is required to solve\
    \ consensus. If there is no failure, then consensus (agreement) is achievable\
    \ in both synchronous and asynchronous models. Consensus is not possible in asynchronous\
    \ systems, but in synchronous systems under a crash failure model and Byzantine\
    \ failure model, consensus can be achieved. However, there is a lower bound on\
    \ the ratio of fault processes. Consensus can only be achieved if less than one-third\
    \ of the processors are Byzantine.\n\nLamport showed that when faulty nodes do\
    \ not exceed one-third, then honest nodes can always reach consensus.\n\n####\
    \ Crash Failure\n\nTo achieve crash fault tolerance, the tight lower bound is\
    \ `N >= 2F + 1`, where `F` is the number of failed nodes. This means that a minimum\
    \ of three processes are required, if one crash-fails to achieve crash fault tolerance.\
    \ Consensus is impossible to solve if `n <= 2f` in crash fault–tolerant settings.\n\
    \n#### Byzantine Failure\n\nTo achieve Byzantine fault tolerance, the tight lower\
    \ bound is `N >= 3F + 1`, where `F` is the number of failed nodes. This means\
    \ that a minimum of four nodes are required, if one fails arbitrarily to achieve\
    \ Byzantine fault tolerance.\n\nNo algorithm can solve a consensus problem if\
    \ `n <= 3f`, where `n` are nodes and `f` are Byzantine nodes. There is a proven\
    \ tight lower bound of `3F + 1` on the number of faulty processors.\n\n#### Minimum\
    \ Connectivity\n\nThe minimum network connectivity to tolerate failures is at\
    \ least `2f + 1`.\n\n#### Minimum Rounds\n\nThe minimum number of rounds required\
    \ is `f + 1`, where `f` can fail. This is because one round more than the number\
    \ of failures ought to have one round failure-free, thus allowing consensus."
  raw: '##### Linearizability


    Another stronger property that a state machine replication protocol may implement
    is called linearizability. Linearizability is also called atomic consistency,
    and it means that command execution appears as if executed on a single copy of
    the state machine, even if there are multiple replicas. The critical requirement
    of linearizability is that the state read is always up to date, and no stale data
    is ever read.


    Consistency models allow developers to understand the behavior of the replicated
    storage system. When interacting with a replicated system, the application developers
    experience the same behavior as interacting with a single system. Such transparency
    allows developers to use the same single server convention of writing application
    logic. If a replicated system possesses such transparency, then it is said to
    be linearizable.


    In literature, linearizability is also called strong consistency, atomic consistency,
    or immediate consistency.


    ##### Sequential Consistency


    In this type of consistency, all nodes see the same order of commands as other
    nodes.


    Linearizability and sequential consistency are two classes of **strong consistency**.


    ##### Eventual Consistency


    Under the eventual consistency model, there is an eventual guarantee that each
    replica will be in the same state if there are no more updates. However, this
    implies that there is no timing guarantee because updates may never stop. Therefore,
    this is not quite a reliable model. Another stronger scheme is called strong eventual
    consistency which has two properties. Firstly, updates applied to one honest replica
    are eventually applied to every nonfaulty replica. Secondly, regardless of the
    order in which the updates have been processed, if two replicas have processed
    the same set of updates, they end up in the same state. The first property is
    called eventual delivery, whereas the second property is named convergence.


    There are several advantages of this approach. It allows replicas to progress
    without network connectivity until the connectivity is restored, and eventually
    replicas converge to the same state. Eventual consistency can work with weaker
    models of broadcast, instead of total order broadcast.


    Eventual consistency has several categories such as last write wins. The technique
    here is to apply updates with the most recent timestamp and discard any other
    updates writing to the same key (updating the same data) with lower timestamps.
    This means that we accept some data loss in favor of eventually converging state
    at all replicas.


    ##### SMR Using Weaker Broadcast Abstractions


    SMR makes use of total order broadcast for achieving a global order of commands
    in the system. Here, the question arises whether we can use weaker types of broadcast
    abstractions to build state machine replication. The answer is yes; however, a
    property called “commutativity” is required along with some other properties.
    Updates are commutative if the order of two updates does not matter, for example,
    in arithmetic, A + B = B + A, the order of A and B doesn’t matter; it will achieve
    the same result. Similarly, we say that commands x and y commute, if in every
    state *s* of the state machine executing x before y or y executing before x results
    in the same state update and x and y returns the same response when executed.
    In this, we say x and y commute.


    The key insight here is that if replica state updates are commutative, then replicas
    can process the commands in any order and still would end up in the same state.
    Of course, you must build commutative mechanics into the protocol. Table [3-1](#515270_1_En_3_Chapter.xhtml#Tab1)
    shows different broadcasts and relevant properties along with assumptions regarding
    a state update.^([²](#fn2))


    Table 3-1


    Broadcasts and requirements to build replication


    | Type of Broadcast | Key Property | State Update Requirement |

    | --- | --- | --- |

    | Total order | All messages delivered in the same order at all replicas | Deterministic
    |

    | Causal broadcast | Delivers messages in causal order, but concurrent messages
    could be delivered in any order | Deterministic, concurrent updates commutativity
    |

    | Reliable broadcast | No ordering guarantee with no duplicate messages | Deterministic,
    all updates commutativity |

    | Best-effort broadcast | Best effort, no delivery guarantee | Deterministic,
    commutative, idempotent, and tolerates message loss |


    Now let’s explore some fundamental results in distributed computing which underpins
    distributed protocols and algorithms.


    ### Fundamental Results


    In distributed computing, there are many fundamental results that have been reported
    by researchers. These fundamental results provide the foundation on which the
    distributed computing paradigm stands. Most interesting of these are impossibility
    results.


    #### Impossibility Results


    Impossibility results provide us an understanding of whether a problem is solvable
    or not and the minimum resources required to do so. If a problem is unsolvable,
    then these results provide a clear understanding why a specific problem is unsolvable.
    If an impossibility result is proven, then no further research is necessary on
    that, and researchers can focus their attention on other problems or to circumvent
    these results somehow. These results show us that certain problems are unsolvable
    unless sufficient resources are provided. In other words, they show that certain
    problems cannot be computed if resources are insufficient. There are problems
    that are outright unsolvable, and some are solvable only if given enough resources.
    The requirement of minimum available resources to solve a problem is known as
    **lower bound results**.


    In order to prove that some problems cannot be solved, it is essential to define
    a system model and the class of allowable algorithms. Some problems are solvable
    under one model but not in others. For example, consensus is unsolvable under
    asynchronous network assumptions but is solvable under synchronous and in partially
    synchronous networks.


    One of the most fundamental results in distributed computing is how many nodes/processes
    are required to tolerate crash only and Byzantine faults.


    #### Minimum Number of Processes


    It has been proven that a certain minimum number of processes is required to solve
    consensus. If there is no failure, then consensus (agreement) is achievable in
    both synchronous and asynchronous models. Consensus is not possible in asynchronous
    systems, but in synchronous systems under a crash failure model and Byzantine
    failure model, consensus can be achieved. However, there is a lower bound on the
    ratio of fault processes. Consensus can only be achieved if less than one-third
    of the processors are Byzantine.


    Lamport showed that when faulty nodes do not exceed one-third, then honest nodes
    can always reach consensus.


    #### Crash Failure


    To achieve crash fault tolerance, the tight lower bound is N => 2F + 1, where
    F is the number of failed nodes. This means that a minimum of three processes
    are required, if one crash-fails to achieve crash fault tolerance. Consensus is
    impossible to solve if n <= 2f in crash fault–tolerant settings.


    #### Byzantine Failure


    To achieve Byzantine fault tolerance, the tight lower bound is N >= 3F + 1, where
    F is the number of failed nodes. This means that a minimum of four nodes are required,
    if one fails arbitrarily to achieve Byzantine fault tolerance.


    No algorithm can solve a consensus problem if n<=3f, where n are nodes and f are
    Byzantine nodes. There is a proven tight lower bound of 3F+1 on the number of
    faulty processors.


    #### Minimum Connectivity


    The minimum network connectivity to tolerate failures is at least 2f+1.


    #### Minimum Rounds


    The minimum number of rounds required is f+1, where f can fail. This is because
    one round more than the number of failures ought to have one round failure-free,
    thus allowing consensus.'
  trans: '

    ##### 线性一致性


    状态机复制协议可能实现的另一种更强的属性称为线性一致性。线性一致性也被称为原子一致性，它意味着命令的执行效果如同在状态机的单份副本上执行一样，即使存在多个副本也是如此。线性一致性的关键要求是读取的状态始终是最新的，并且永远不会读取到过时数据。


    一致性模型使开发者能够理解复制存储系统的行为。在与复制系统交互时，应用开发者会体验到与单系统交互相同的行为。这种透明性使得开发者能够沿用编写应用逻辑时单服务器的惯例。如果一个复制系统具备这种透明性，那么它就称为线性一致系统。


    在文献中，线性一致性也被称为强一致性、原子一致性或即时一致性。


    ##### 顺序一致性


    在这种一致性类型中，所有节点看到的命令顺序与其他节点相同。


    线性一致性和顺序一致性是**强一致性**的两个类别。


    ##### 最终一致性


    在最终一致性模型下，存在一个最终保证：如果没有更多更新，每个副本最终会处于相同状态。然而，这意味着没有时间上的保证，因为更新可能永远不会停止。因此，这并不是一个非常可靠的模型。另一种更强的方案称为强最终一致性，它有两个属性。首先，应用于一个诚实副本的更新最终会应用于所有无故障副本。其次，无论更新以何种顺序处理，如果两个副本处理了相同的更新集合，它们最终会处于相同状态。第一个属性称为最终交付，而第二个属性称为收敛。


    这种方法有几个优点。它允许副本在网络连接恢复之前无需网络连接即可继续推进，并最终使副本收敛到同一状态。最终一致性可以使用较弱的广播模型，而不是全序广播。


    最终一致性有多个类别，例如"最后写入获胜"。其技术是应用具有最新时间戳的更新，并丢弃任何写入同一键（更新相同数据）但时间戳较低的更新。这意味着我们接受一定的数据丢失，以换取所有副本最终状态收敛。


    ##### 使用较弱广播抽象的 SMR


    SMR 利用全序广播来实现系统中命令的全局顺序。这里出现了一个问题：我们能否使用较弱的广播抽象来构建状态机复制？答案是肯定的；然而，需要具备一种称为"交换律"的属性以及其他一些属性。如果两个更新的顺序无关紧要，那么它们就是可交换的，例如在算术中，`A
    + B = B + A`，`A` 和 `B` 的顺序无关紧要，结果相同。类似地，我们说命令 `x` 和 `y` 是可交换的，如果在状态机的每个状态 *s*
    中，先执行 `x` 再执行 `y` 与先执行 `y` 再执行 `x` 产生相同的状态更新，并且 `x` 和 `y` 在执行时返回相同的响应。在这种情况下，我们说
    `x` 和 `y` 是可交换的。


    这里的关键洞察是，如果副本的状态更新是可交换的，那么副本可以按任意顺序处理命令，并且最终仍会处于相同状态。当然，你必须将可交换机制构建到协议中。表 3-1
    展示了不同的广播类型及其相关属性，以及对状态更新的假设。^(²)


    **表 3-1**

    构建复制所需的广播及要求


    | 广播类型 | 关键属性 | 状态更新要求 |

    | --- | --- | --- |

    | 全序广播 | 所有消息在所有副本上以相同顺序传递 | 确定性 |

    | 因果广播 | 按因果顺序传递消息，但并发消息可按任意顺序传递 | 确定性，并发更新的可交换性 |

    | 可靠广播 | 无排序保证，无重复消息 | 确定性，所有更新的可交换性 |

    | 尽力而为广播 | 尽力而为，无传递保证 | 确定性，可交换性，幂等性，并能容忍消息丢失 |


    现在让我们探讨一些支撑分布式协议和算法的分布式计算基础成果。


    ### 基础成果


    在分布式计算领域，研究人员报告了许多基础性成果。这些基础成果构成了分布式计算范式立足的基石。其中最有意思的是不可能性结果。


    #### 不可能性结果


    不可能性结果让我们理解一个问题是否可解，以及解决该问题所需的最小资源。如果一个问题不可解，那么这些结果能清楚地解释为什么特定问题无法解决。如果一个不可能性结果被证明成立，则无需对此进行进一步研究，研究人员可以将注意力转向其他问题，或设法绕过这些结果。这些结果告诉我们，除非提供足够的资源，否则某些问题无法解决。换句话说，它们表明，如果资源不足，某些问题就无法计算。有些问题完全无法解决，而有些问题只有在提供足够资源的情况下才能解决。解决一个问题所需的最小可用资源被称为**下界结果**。


    为了证明某些问题无法解决，必须定义系统模型和允许的算法类别。有些问题在一种模型下可解，但在其他模型下则不可解。例如，共识在异步网络假设下不可解，但在同步网络和部分同步网络中是可解的。


    分布式计算中最基础的成果之一是：需要多少个节点/进程才能容忍崩溃故障和拜占庭故障。


    #### 最小进程数


    已经证明，解决共识问题需要一定的最小进程数。如果没有故障，那么在同步和异步模型中都可以达成共识。在异步系统中无法达成共识，但在同步系统中，在崩溃故障模型和拜占庭故障模型下，共识是可以达成的。然而，故障进程的比例存在一个下界。只有当拜占庭进程少于三分之一时，才能达成共识。


    Lamport 表明，当故障节点不超过三分之一时，诚实节点总能达成共识。


    #### 崩溃故障


    为了实现崩溃容错，严格的下界是 `N >= 2F + 1`，其中 `F` 是故障节点数。这意味着至少需要三个进程，如果一个进程发生崩溃才能实现崩溃容错。在崩溃容错环境下，如果
    `n <= 2f`，则无法解决共识问题。


    #### 拜占庭故障


    为了实现拜占庭容错，严格的下界是 `N >= 3F + 1`，其中 `F` 是故障节点数。这意味着至少需要四个节点，如果一个节点发生任意故障才能实现拜占庭容错。


    如果 `n <= 3f`（其中 `n` 是节点数，`f` 是拜占庭节点数），则没有任何算法能解决共识问题。故障处理器数量存在一个已被证明的严格下界 `3F
    + 1`。


    #### 最小连通性


    要容忍故障，网络的最小连通度至少为 `2f + 1`。


    #### 最小轮数


    所需的最小轮数为 `f + 1`，其中 `f` 为可能发生故障的节点数。这是因为比故障数多一轮，意味着应该有一轮是无故障的，从而允许达成共识。

