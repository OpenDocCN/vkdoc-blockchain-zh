    \nNow, given 9, finding 2, the exponent of the generator 3, is extremely hard\
    \ to do. Formally, we can say that given numbers *a* and *n* where *n* is a prime,\
    \ the function\n\n![$$ f(b)={a}^b\\ \\mathit{\\operatorname{mod}}\\ n $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equb.png)\n\
    \nis a one-way function, because calculating *f*(*b*) is easy, but given *f*(*b*),\
    \ finding *b* is hard.\n\nAnother method developed in the mid-1980s is elliptic\
    \ curve cryptography. Elliptic curve cryptography has gained special attention\
    \ due to its usage in blockchain platforms, such as Bitcoin and Ethereum. Protocols\
    \ such as the Elliptic Curve Diffie-Hellman key exchange and elliptic curve digital\
    \ signature algorithms are most prevalent in this space. ECC is fundamentally\
    \ a discrete logarithm problem but founded upon elliptic curves over finite fields.\
    \ A key advantage of ECC is that a smaller key size provides the same level of\
    \ security as a larger key size in RSA. For example, a security level of a 1024-bit\
    \ integer factorization scheme, such as RSA, can be achieved by only a 160-bit\
    \ elliptic curve–based scheme, such as ECDSA.\n\nPublic key cryptosystems can\
    \ be used for encryption, though it is very less common and not efficient for\
    \ large datasets. It is also used for providing other security services and protocols,\
    \ such as digital signatures, entity authentication, and key agreement.\n\n###\
    \ Digital Signatures\n\nDigital signatures are one of the most common uses of\
    \ public key cryptography. Digital signatures provide nonrepudiation services.\
    \ Most common examples include RSA-based digital signatures, digital signature\
    \ algorithms, and ECDSA and Schnorr signatures.\n\n#### Entity Authentication\n\
    \nEntity authentication or identification is another service that public key cryptosystems\
    \ can provide. Usually, challenge-response mechanisms are in widespread use where\
    \ a challenge sent by the verifier is required to be responded to correctly by\
    \ the prover (claimant of identity) to ascertain the legitimacy of the claimant.\n\
    \n#### Key Agreement\n\nKey agreement protocols are used to establish secret keys\
    \ before an encrypted data transfer. The most common example of such protocols\
    \ is the Diffie-Hellman key exchange protocol.\n\n### RSA\n\nRSA is widely used\
    \ for secure key transport and building digital signatures. Diffie and Hellman\
    \ invented public key cryptography in 1976\\. Based on this idea, in 1978, the\
    \ RSA public key cryptosystem was developed by Rivest, Shamir, and Adleman.\n\n\
    In this section, I will walk you through the steps of generating key pairs in\
    \ RSA and how to encrypt and decrypt.\n\n#### Key Pair Generation\n\n1.  Generate\
    \ a modulus.\n    1.  Select *p* and *q*, two large prime numbers. Usually, 2^1024\
    \ bits or more.\n\n2.  Multiply *p* and *q* to generate modulus *n*. *n* = *p*.\
    \ *q*. n becomes 2^2048.\n\n3.  Choose a random number with some special properties.\
    \ Assume that we call this number *e*.\n    1.  This number *e* should have some\
    \ special properties:\n        1.  It should be greater than 1.\n\n        2.\
    \  It should be less than *ϕ*(*n*) = (*p* − 1) (*q* − 1).\n\n        3.  *gcd*(*e*,\
    \ (*p* − 1)(*q* − 1) = 1.\n\n        4.  *e* ∈ {1, 2,   . . . , *ϕ*(*n*) − 1}.\n\
    \n    Formally speaking, this number e should be the coprime (relatively prime)\
    \ of (*p* − 1) (*q* − 1), that is, no number other than 1 can be divided fully\
    \ into e and (*p* − 1) (*q* − 1). Coprimes have no common factors except 1, so\
    \ the greatest common divisor (GCD) of coprimes is 1.\n\n4.  Public key generation\n\
    \    1.  The modulus n generated in step 1 and the special number e generated\
    \ in step 2 is pair (n, e) that is the public key. This pair is public, so it\
    \ can be shared with anyone; however, p and q must be kept secret.\n\n5.  Private\
    \ key generation\n    1.  The private key, let’s call it *d*, is calculated from\
    \ two primes *p* and *q* from step 1 and the special number *e* from step 2\\\
    . The private key is the inverse of *e* modulo (*p* − 1)(*q* − 1), which we can\
    \ write as\n\n![$$ ed=1\\ \\mathit{\\operatorname{mod}}\\ \\left(p-1\\right)\\\
    left(q-1\\right) $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equc.png)\n\
    \n![$$ ed=1\\ \\mathit{\\operatorname{mod}}\\ \\phi n $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equd.png)\n\
    \n![$$ d={e}^{-1}=7\\ \\mathit{\\operatorname{mod}}\\ 20 $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Eque.png)\n\
    \nIn practice, the extended Euclidean algorithm is used to calculate *d* which\
    \ takes *p*, *q*, and e as input and outputs *d*. *d* must be kept secret."
  trans: "\n### Diffie-Hellman 密钥交换\n\n在密钥交换领域，具有开创性和基础性的方案是 Diffie-Hellman 密钥交换。这是一种在两方之间运行的交互式协议。下面展示一个关于\
    \ Diffie-Hellman 交换的基本且直观的数学示例：\n\n1. Alice 和 Bob 想要建立一个共享的秘密密钥。\n2. 双方商定两个数字：一个素数\
    \ `P` = 13 和 `P` 的一个生成元 `G` = 6。但在实践中，`P` 是非常大的。\n3. 双方都随机选择一个大的随机整数（即私钥）。\n \
    \  - Alice 的私钥 = 5，Bob 的私钥 = 4\n4. 双方计算各自的公钥：\n   - Alice：`6⁵ mod 13` = `7776\
    \ mod 13` = `2` → 公钥 = `2`\n   - Bob：`6⁴ mod 13` = `1296 mod 13` = `9` → 公钥 =\
    \ `9`\n5. Bob 将公钥 `9` 发送给 Alice，Alice 将公钥 `2` 发送给 Bob。\n6. 双方使用各自的私钥 `5` 和 `4`\
    \ 计算共享密钥。\n   - Alice：`9⁵ mod 13` = `3`\n   - Bob：`2⁴ mod 13` = `3`\n7. 共享的秘密密钥建立成功。\n\
    \n公钥密码系统依赖于单向陷门函数。陷门函数在一个方向上易于计算，但在相反方向上难以计算，除非存在一个称为“陷门”的特殊值。这个概念可以直观地通过图 2-11\
    \ 来理解。\n\n![](img/515270_1_En_2_Fig11_HTML.jpg)\n\n一幅图示包含了定义域 `f` 和值域 `f(x)`。从\
    \ `f` 到 `f(x)` 是容易计算的。从 `f(x)` 到 `f` 则难以逆转，除非陷门可用。\n\n**图 2-11** 陷门函数\n\n不同的计算困难问题，例如大整数因子分解问题和离散对数问题，提供了合适的单向陷门函数。使用整数因子分解的密码学方案基于分解大整数在计算上的不可行性。一个依赖此类假设的典型例子是\
    \ RSA。整数因子分解是将一个合数（由两个较小的整数相乘得到）分解为更小的整数（因子）。\n\n在密码学中，因子被限定为素数。我们可以通过一个简单的例子来演示这个问题。例如，很容易看出\
    \ `15` 是 `5` 乘以 `3` 的结果，即 `5 * 3 = 15`。那对于一个更大的素数呢，比如 `6887`？这会相对困难一些，但通过一定的计算，我们可以得到因子\
    \ `71` 和 `97`。如果这个数字非常巨大，比如有 1024 位，且是素数呢？那么将两个这样的素数相乘很容易，但分解它们却极其困难，这使其成为我们可以在密码学中使用的一个单向函数。\n\
    \n离散对数问题是许多不同密码学方案的基础，例如 Diffie-Hellman 密钥交换和数字签名算法。它基于模算术中的一个问题：计算模运算的结果很容易，但找到生成元的指数却很难。这种困难性创造了一个单向函数，其中根据输出找到输入在计算上是不可行的。\n\
    \n一个简单的例子可以展示这个问题的核心：\n\n```\n3² mod 10 = 9\n```\n\n现在，给定 `9`，要找到生成元 `3` 的指数 `2`\
    \ 是极其困难的。正式地说，我们可以认为，给定数字 `a` 和 `n`（其中 `n` 是一个素数），函数\n\n```\nf(b) = a^b mod n\n\
    ```\n\n是一个单向函数，因为计算 `f(b)` 很容易，但给定 `f(b)`，找到 `b` 却很难。\n\n另一种在 20 世纪 80 年代中期开发的方法是椭圆曲线密码学（ECC）。由于在比特币和以太坊等区块链平台中的应用，椭圆曲线密码学受到了特别关注。诸如椭圆曲线\
    \ Diffie-Hellman 密钥交换和椭圆曲线数字签名算法等协议在该领域最为普遍。ECC 本质上是一个离散对数问题，但它是基于有限域上的椭圆曲线建立的。ECC\
    \ 的一个关键优势是，较小的密钥大小可以提供与 RSA 中较大密钥大小相同的安全级别。例如，一个 1024 位整数分解方案（如 RSA）的安全级别，可以通过仅\
    \ 160 位的基于椭圆曲线的方案（如 ECDSA）来实现。\n\n公钥密码系统可用于加密，尽管这不太常见，并且对于大型数据集而言效率不高。它也可用于提供其他安全服务和协议，例如数字签名、实体认证和密钥协商。\n\
    \n### 数字签名\n\n数字签名是公钥密码学最常见的应用之一。数字签名提供不可否认性服务。最常见的例子包括基于 RSA 的数字签名、数字签名算法（DSA）、ECDSA\
    \ 以及 Schnorr 签名。\n\n#### 实体认证\n\n实体认证（或称身份识别）是公钥密码系统能够提供的另一项服务。通常，质询-响应机制被广泛使用，验证者发送一个质询，要求声称身份者（证明者）正确响应，以确认声称者的合法性。\n\
    \n#### 密钥协商\n\n密钥协商协议用于在加密数据传输之前建立秘密密钥。这类协议最常见的例子是 Diffie-Hellman 密钥交换协议。\n\n\
    ### RSA\n\nRSA 被广泛用于安全的密钥传输和构建数字签名。Diffie 和 Hellman 于 1976 年发明了公钥密码学。基于这一思想，Rivest、Shamir\
    \ 和 Adleman 在 1978 年开发了 RSA 公钥密码系统。\n\n在本节中，我将引导您了解 RSA 中生成密钥对的步骤，以及如何进行加密和解密。\n\
    \n#### 密钥对生成\n\n1.  **生成模数。**\n    -   选择 `p` 和 `q`，两个大的素数。通常为 `2¹⁰²⁴` 位或更多。\n\
    \    -   将 `p` 和 `q` 相乘得到模数 `n`。`n = p * q`。`n` 变为 `2²⁰⁴⁸` 位。\n\n2.  **选择一个具有特殊性质的随机数。**\
    \ 假设我们称这个数字为 `e`。\n    -   这个数字 `e` 应具有一些特殊性质：\n        -   必须大于 `1`。\n      \
    \  -   必须小于 `ϕ(n) = (p - 1)(q - 1)`。\n        -   `gcd(e, (p - 1)(q - 1)) = 1`。\n\
    \        -   `e ∈ {1, 2, ..., ϕ(n) - 1}`。\n    -   正式地说，这个数字 `e` 应该是 `(p - 1)(q\
    \ - 1)` 的互质数（或称互素数），也就是说，除了 `1` 之外，没有其他数字能同时整除 `e` 和 `(p - 1)(q - 1)`。互质数之间除了\
    \ `1` 之外没有共同因子，所以互质数的最大公约数（GCD）为 `1`。\n\n3.  **生成公钥**\n    -   步骤 1 中生成的模数 `n`\
    \ 和步骤 2 中生成的特殊数字 `e` 构成一对 `(n, e)`，这就是公钥。这对数字是公开的，可以分享给任何人；但 `p` 和 `q` 必须保密。\n\
    \n4.  **生成私钥**\n    -   私钥，我们称之为 `d`，由步骤 1 中的两个素数 `p`、`q` 和步骤 2 中的特殊数字 `e` 计算得出。私钥是\
    \ `e` 模 `(p - 1)(q - 1)` 的逆元，我们可以将其写为：\n\n    ```\n    e d = 1 mod (p - 1)(q -\
    \ 1)\n    e d = 1 mod ϕ(n)\n    d = e^(-1) = 7 mod 20\n    ```\n\n    实践中，使用扩展欧几里得算法来计算\
    \ `d`，该算法以 `p`、`q` 和 `e` 作为输入，输出 `d`。`d` 必须保密。\n"
- fmt: "# Encryption and Decryption\n\nNow, let’s see how encryption and decryption\
    \ operations are performed using RSA. RSA uses the following equation to produce\
    \ ciphertext:\n\n![$$ C={P}^e\\ \\mathit{\\operatorname{mod}}\\ n $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equf.png)\n\
    \nThis means that plaintext `P` is raised to the power of `e` and then reduced\
    \ to modulo `n`.\n\nDecryption in RSA is provided in the following equation:\n\
    \n![$$ P={C}^d\\ \\mathit{\\operatorname{mod}}\\ n $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equg.png)\n\
    \nThis means that the receiver who has a public key pair (`n`, `e`) can decipher\
    \ the data by raising `C` to the value of the private key `d` and then reducing\
    \ to modulo `n`.\n\n## Example of Key Generation, Encryption, and Decryption\n\
    \n1.  Let the plaintext be message `m`. `m` = 5, to be sent from Alice to Bob.\n\
    2.  Let `p` = 3 and `q` = 11.\n3.  `n` = `pq` = 3 * 11 = 33.\n4.  `e` = 3, because\
    \ (3 - 1)(11 - 1) = 20 which is greater than 1 and less than 20 and `GCD`(3, 20)\
    \ = 1.\n5.  The public key is pair (`n`, `e`) = (33, 3).\n6.  The private key\
    \ is `ed = 1 mod (p - 1)(q - 1)`.\n\n    ![$$ d={e}^{-1}\\kern0.5em 7\\ \\mathit{\\\
    operatorname{mod}}\\ 20,\\left(33,7\\right) $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equh.png)\n\
    \n7.  Send public key (`n`, `e`) (33, 3) to Alice.\n8.  Alice does 5³ = 125 `mod`\
    \ 33 = 26.\n9.  Alice sends 26 as the encrypted text to Bob.\n10. Bob does 26⁷\
    \ = 8031810176 = 8031810176 `mod` 33 = 5 and retrieves the plaintext message 5.\n\
    \n# Elliptic Curve Cryptography\n\nElliptic curve cryptography (ECC) is based\
    \ on a concept in mathematics called elliptic curves. It is a set of points on\
    \ a plane whose `x`, `y` coordinates satisfy a specific equation and some conditions.\
    \ Typically, it is the Weierstrass form `y² = x³ + ax + b` where `a` and `b` are\
    \ fixed.\n\nElliptic curves are groups. They are used in many different areas\
    \ of mathematics, including number theory, complex analysis, and mathematical\
    \ physics. When used in cryptography, a suitable elliptic curve’s points over\
    \ a finite field form a group structure which allows to build cryptography schemes\
    \ based on a discrete logarithm problem.\n\nA prime field is used in elliptic\
    \ curve cryptography. *In a prime field, all arithmetic operations are performed\
    \ modulo a prime number `p`*.\n\nAn elliptic curve is defined in the following\
    \ equation:\n\n![$$ {y}^2={x}^3+ ax+b\\ \\mathit{\\operatorname{mod}}\\ p $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equi.png)\n\
    \nHere, `a` and `b` belong to a finite field `Zp` or `Fp` (prime finite field),\
    \ that is, (`a`, `b`) ∈ `Z`, and an imaginary point of infinity. The point of\
    \ infinity `∞` is used to provide identity operations for points on the curve.\n\
    \nFurthermore, a condition shown below ensures that the curve is nonsingular,\
    \ meaning the curve does not self-intersect or has vertices:\n\n![$$ 4{a}^3+27{b}^2\\\
    ne 0\\ \\mathit{\\operatorname{mod}}\\ p $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equj.png)\n\
    \nTo construct the discrete logarithm problem based on elliptic curves, a large\
    \ enough cyclic group is required. First, the group elements are identified as\
    \ a set of points that satisfy the elliptic curve equation. After this, group\
    \ operations need to be defined on these points. The fundamental group operations\
    \ on elliptic curves are point addition and point doubling. Point addition is\
    \ a process where two different points are added, and point doubling means that\
    \ the same point is added to itself.\n\nAn elliptic curve can be visualized over\
    \ real numbers as shown in Figure [2-12](#515270_1_En_2_Chapter.xhtml#Fig12).\n\
    \n![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig12_HTML.jpg)\n\nA graph plots\
    \ an elliptic curve in all 4 quadrants. The curve is bilaterally symmetrical horizontally.\n\
    Figure 2-12\nAn elliptic curve over real numbers `y² = x³ - 3x + 5`\n\nWe can\
    \ visualize the curve and group operations, that is, addition and doubling, geometrically\
    \ over real numbers, which helps to build intuition. In practice, however, the\
    \ curve over prime field is used to build ECC-based schemes. Though, when we try\
    \ to plot it, it appears quite random and not intuitive.\n\n## Point Addition\n\
    \nFor adding two points, a line is drawn through points `P` and `Q` (the diagonal\
    \ line in Figure [2-13](#515270_1_En_2_Chapter.xhtml#Fig13)) to obtain a third\
    \ point. This point, when reflected, is point `R`, shown as `P+Q` in Figure [2-13](#515270_1_En_2_Chapter.xhtml#Fig13).\n\
    \n![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig13_HTML.jpg)\n\nA graph plots\
    \ an elliptic curve in all quadrants. The curve is bilaterally symmetrical horizontally.\
    \ 2 lines intersect the curve at `P` and `Q` and `P+Q`.\nFigure 2-13\nPoint addition\n\
    \nAlgebraically speaking, in point addition operation, two points `P` and `Q`\
    \ are added to obtain the coordinates of the third point `R` on the curve:\n\n\
    ![$$ P+Q=R $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equk.png)\n\
    \nwhere `P` = (`x`[1], `y`[1]) and `Q` = (`x`[2], `y`[2]) and `R` = (`x`[3], `y`[3]).\n\
    \nFor addition, we calculate the gradient between the points:\n\n![$$ S=\\frac{\\\
    left({y}_2-{y}_1\\right)}{\\left({x}_2-{x}_1\\right)}\\ \\mathit{\\operatorname{mod}}\\\
    \ p $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equl.png)\n\nwhere\
    \ `S` depicts the line going through `P` and `Q`.\n\nNow to obtain the new point\
    \ `R`:\n\n![$$ {x}_3={s}^2-{x}_1-{x}_2\\ \\mathit{\\operatorname{mod}}\\ p $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equm.png)\n\
    \n![$$ {y}_3=s\\left({x}_1-{x}_2\\right)-{y}_1\\ \\mathit{\\operatorname{mod}}\\\
    \ p $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equn.png)\n\n##\
    \ Point Doubling\n\nIn point doubling, `P` is added to itself. In other words,\
    \ `P` and `Q` are the same point. As the point adds to itself, we can call this\
    \ operation point doubling.\n\nTo double a point, a tangent line (the dotted diagonal\
    \ line in Figure [2-14](#515270_1_En_2_Chapter.xhtml#Fig14)) is drawn through\
    \ point `P`, which obtains a second point where the line intersects with the curve.\
    \ This point is reflected to yield the result `R`, shown as `2P` in Figure [2-14](#515270_1_En_2_Chapter.xhtml#Fig14).\n\
    \n![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig14_HTML.jpg)\n\nA graph plots\
    \ an elliptic curve in all quadrants. The curve is bilaterally symmetrical horizontally.\
    \ 2 lines intersect the curve at `P=Q` and `2P`.\nFigure 2-14\nElliptic curve\
    \ point doubling\n\nFor doubling, we use\n\n![$$ S=\\frac{\\left(3{x}_1^2+a\\\
    right)}{{2_y}_1}\\ \\mathit{\\operatorname{mod}}\\ p $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equo.png)\n\
    \nwhere `S` depicts the tangent line going through point `P`.\n\nNow to obtain\
    \ the point `R`:\n\n![$$ {x}_3={s}^2-{x}_1-{x}_2\\ \\mathit{\\operatorname{mod}}\\\
    \ p $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equp.png)\n\n`y`[3]\
    \ = `s`(`x`[1] - `x`[2]) - `y`[1] `mod p`"
  raw: "#### Encryption and Decryption\n\nNow, let’s see how encryption and decryption\
    \ operations are performed using RSA. RSA uses the following equation to produce\
    \ ciphertext:\n\n![$$ C={P}^e\\ \\mathit{\\operatorname{mod}}\\ n $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equf.png)\n\
    \nThis means that plaintext P is raised to the power of e and then reduced to\
    \ modulo n.\n\nDecryption in RSA is provided in the following equation:\n\n![$$\
    \ P={C}^d\\ \\mathit{\\operatorname{mod}}\\ n $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equg.png)\n\
    \nThis means that the receiver who has a public key pair (*n*, *e*) can decipher\
    \ the data by raising *C* to the value of the private key *d* and then reducing\
    \ to modulo *n*.\n\n##### Example of Key Generation, Encryption, and Decryption\n\
    \n1.  Let the plaintext be message *m*. *m* = 5, to be sent from Alice to Bob.\n\
    \n2.  Let *p* = 3 and *q* = 11.\n\n3.  *n* = *pq* = 3 *x* 11 = 33.\n\n4.  *e* = 3,\
    \ because (3 − 1) (11 − 1) = 20 which is greater than 1 and less than 20 and *GCD*(3,\
    \ 20) = 1.\n\n5.  The public key is pair (*n*, *e*) = (33, 3).\n\n6.  The private\
    \ key is *ed* = 1 *mod* (*p* − 1)(*q* − 1).\n\n    ![$$ d={e}^{-1}\\kern0.5em\
    \ 7\\ \\mathit{\\operatorname{mod}}\\ 20,\\left(33,7\\right) $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equh.png)\n\
    \n7.  Send public key (*n*, *e*) (33, 3) to Alice.\n\n8.  Alice does 5³ = 125 *mod* 33 = 26.\n\
    \n9.  Alice sends 26 as the encrypted text to Bob.\n\n10.  Bob does 26⁷ = 8031810176 = 8031810176 *mod* 33 = 5\
    \ and retrieves the plaintext message 5.\n\n### Elliptic Curve Cryptography\n\n\
    Elliptic curve cryptography (ECC) is based on a concept in mathematics called\
    \ elliptic curves. It is a set of points on a plane whose x, y coordinates satisfy\
    \ a specific equation and some conditions. Typically, it is the Weierstrass form\
    \ *y*² = *x*³ + *ax* + *b* where *a* and *b* are fixed.\n\nElliptic curves are\
    \ groups. They are used in many different areas of mathematics, including number\
    \ theory, complex analysis, and mathematical physics. When used in cryptography,\
    \ a suitable elliptic curve’s points over a finite field form a group structure\
    \ which allows to build cryptography schemes based on a discrete logarithm problem.\n\
    \nA prime field is used in elliptic curve cryptography. *In a prime field, all\
    \ arithmetic operations are performed modulo a prime number p*.\n\nAn elliptic\
    \ curve is defined in the following equation:\n\n![$$ {y}^2={x}^3+ ax+b\\ \\mathit{\\\
    operatorname{mod}}\\ p $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equi.png)\n\
    \nHere, a and b belong to a finite field *Zp* or *Fp* (prime finite field), that\
    \ is, (*a*, *b*) ∈ *Z*, and an imaginary point of infinity. The point of infinity\
    \ ∞ is used to provide identity operations for points on the curve.\n\nFurthermore,\
    \ a condition shown below ensures that the curve is nonsingular, meaning the curve\
    \ does not self-intersect or has vertices:\n\n![$$ 4{a}^3+27{b}^2\\ne 0\\ \\mathit{\\\
    operatorname{mod}}\\ p $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equj.png)\n\
    \nTo construct the discrete logarithm problem based on elliptic curves, a large\
    \ enough cyclic group is required. First, the group elements are identified as\
    \ a set of points that satisfy the elliptic curve equation. After this, group\
    \ operations need to be defined on these points. The fundamental group operations\
    \ on elliptic curves are point addition and point doubling. Point addition is\
    \ a process where two different points are added, and point doubling means that\
    \ the same point is added to itself.\n\nAn elliptic curve can be visualized over\
    \ real numbers as shown in Figure [2-12](#515270_1_En_2_Chapter.xhtml#Fig12).\n\
    \n![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig12_HTML.jpg)\n\nA graph plots\
    \ an elliptic curve in all 4 quadrants. The curve is bilaterally symmetrical horizontally.\n\
    \nFigure 2-12\n\nAn elliptic curve over real numbers *y*² = *x*³ − 3*x* + 5\n\n\
    We can visualize the curve and group operations, that is, addition and doubling,\
    \ geometrically over real numbers, which helps to build intuition. In practice,\
    \ however, the curve over prime field is used to build ECC-based schemes. Though,\
    \ when we try to plot it, it appears quite random and not intuitive.\n\n#### Point\
    \ Addition\n\nFor adding two points, a line is drawn through points P and Q (the\
    \ diagonal line in Figure [2-13](#515270_1_En_2_Chapter.xhtml#Fig13)) to obtain\
    \ a third point. This point, when reflected, is point R, shown as P+Q in Figure\
    \ [2-13](#515270_1_En_2_Chapter.xhtml#Fig13).\n\n![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig13_HTML.jpg)\n\
    \nA graph plots an elliptic curve in all quadrants. The curve is bilaterally symmetrical\
    \ horizontally. 2 lines intersect the curve at P and Q and P+Q.\n\nFigure 2-13\n\
    \nPoint addition\n\nAlgebraically speaking, in point addition operation, two points\
    \ P and Q are added to obtain the coordinates of the third point R on the curve:\n\
    \n![$$ P+Q=R $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equk.png)\n\
    \nwhere *P* = (*x*[1], *y*[1]) and *Q* = (*x*[2], *y*[2]) and *R* = (*x*[3], *y*[3]).\n\
    \nFor addition, we calculate the gradient between the points:\n\n![$$ S=\\frac{\\\
    left({y}_2-{y}_1\\right)}{\\left({x}_2-{x}_1\\right)}\\ \\mathit{\\operatorname{mod}}\\\
    \ p $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equl.png)\n\nwhere\
    \ S depicts the line going through P and Q.\n\nNow to obtain the new point R:\n\
    \n![$$ {x}_3={s}^2-{x}_1-{x}_2\\ \\mathit{\\operatorname{mod}}\\ p $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equm.png)\n\
    \n![$$ {y}_3=s\\left({x}_1-{x}_2\\right)-{y}_1\\ \\mathit{\\operatorname{mod}}\\\
    \ p $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equn.png)\n\n####\
    \ Point Doubling\n\nIn point doubling, P is added to itself. In other words, P\
    \ and Q are the same point. As the point adds to itself, we can call this operation\
    \ point doubling.\n\nTo double a point, a tangent line (the dotted diagonal line\
    \ in Figure [2-14](#515270_1_En_2_Chapter.xhtml#Fig14)) is drawn through point\
    \ P, which obtains a second point where the line intersects with the curve. This\
    \ point is reflected to yield the result R, shown as 2P in Figure [2-14](#515270_1_En_2_Chapter.xhtml#Fig14).\n\
    \n![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig14_HTML.jpg)\n\nA graph plots\
    \ an elliptic curve in all quadrants. The curve is bilaterally symmetrical horizontally.\
    \ 2 lines intersect the curve at P=Q and 2 P.\n\nFigure 2-14\n\nElliptic curve\
    \ point doubling\n\nFor doubling, we use\n\n![$$ S=\\frac{\\left(3{x}_1^2+a\\\
    right)}{{2_y}_1}\\ \\mathit{\\operatorname{mod}}\\ p $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equo.png)\n\
    \nwhere S depicts the tangent line going through point P.\n\nNow to obtain the\
    \ point R:\n\n![$$ {x}_3={s}^2-{x}_1-{x}_2\\ \\mathit{\\operatorname{mod}}\\ p\
    \ $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equp.png)\n\n*y*[3] = *s*(*x*[1] − *x*[2]) − *y*[1] *mod p*"
  trans: "好的，作为高级文档工程师和翻译员，我将遵照您的注意事项和示例，将以下英文文本翻译成中文。\n\n\n# 加密与解密\n\n现在，我们来看如何使用\
    \ RSA 执行加密和解密操作。RSA 使用以下公式生成密文：\n\n![$$ C={P}^e\\ \\mathit{\\operatorname{mod}}\\\
    \ n $$](img/515270_1_En_2_Chapter_TeX_Equf.png)\n\n这意味着明文 `P` 的 `e` 次方再对 `n` 取模。\n\
    \nRSA 的解密由以下公式给出：\n\n![$$ P={C}^d\\ \\mathit{\\operatorname{mod}}\\ n $$](img/515270_1_En_2_Chapter_TeX_Equg.png)\n\
    \n这意味着拥有公钥对 (`n`, `e`) 的接收者可以通过计算 `C` 的私钥 `d` 次方再对 `n` 取模来解密数据。\n\n## 密钥生成、加密和解密的示例\n\
    \n1.  将明文设为消息 `m`。`m` = 5，将由 Alice 发送给 Bob。\n2.  设 `p` = 3，`q` = 11。\n3.  `n`\
    \ = `pq` = 3 * 11 = 33。\n4.  `e` = 3，因为 (3 - 1)(11 - 1) = 20，该值大于 1 且小于 20，并且\
    \ `GCD`(3, 20) = 1。\n5.  公钥为 (`n`, `e`) = (33, 3)。\n6.  私钥为 `ed = 1 mod (p - 1)(q\
    \ - 1)`。\n\n    ![$$ d={e}^{-1}\\kern0.5em 7\\ \\mathit{\\operatorname{mod}}\\\
    \ 20,\\left(33,7\\right) $$](img/515270_1_En_2_Chapter_TeX_Equh.png)\n\n7.  将公钥\
    \ (`n`, `e`) (33, 3) 发送给 Alice。\n8.  Alice 计算 5³ = 125 `mod` 33 = 26。\n9.  Alice\
    \ 将 26 作为加密文本发送给 Bob。\n10. Bob 计算 26⁷ = 8031810176 = 8031810176 `mod` 33 = 5，并检索到明文消息\
    \ 5。\n\n# 椭圆曲线密码学\n\n椭圆曲线密码学 (ECC) 基于数学中一个称为椭圆曲线的概念。它是平面上的一组点，其 `x`, `y` 坐标满足特定的方程和一些条件。通常，它是\
    \ Weierstrass 形式 `y² = x³ + ax + b`，其中 `a` 和 `b` 是固定的。\n\n椭圆曲线是群。它们被用于数学的许多不同领域，包括数论、复分析和数学物理。在密码学中使用时，有限域上的合适椭圆曲线的点形成一个群结构，该结构允许基于离散对数问题构建密码学方案。\n\
    \n椭圆曲线密码学中使用素数域。*在素数域中，所有算术运算都是对素数 `p` 取模执行的*。\n\n椭圆曲线由以下方程定义：\n\n![$$ {y}²={x}³+\
    \ ax+b\\ \\mathit{\\operatorname{mod}}\\ p $$](img/515270_1_En_2_Chapter_TeX_Equi.png)\n\
    \n这里，`a` 和 `b` 属于有限域 `Zp` 或 `Fp`（素数有限域），即 (`a`, `b`) ∈ `Z`，以及一个无穷远虚点。无穷远点 `∞`\
    \ 用于为曲线上的点提供单位元运算。\n\n此外，如下所示的条件确保曲线是非奇异的，这意味着曲线不会自相交或具有顶点：\n\n![$$ 4{a}³+27{b}²\\\
    ne 0\\ \\mathit{\\operatorname{mod}}\\ p $$](img/515270_1_En_2_Chapter_TeX_Equj.png)\n\
    \n为了构建基于椭圆曲线的离散对数问题，需要一个足够大的循环群。首先，将群元素标识为满足椭圆曲线方程的一组点。之后，需要在这些点上定义群运算。椭圆曲线上的基本群运算是点加法和点倍乘。点加法是添加两个不同点的过程，而点倍乘意味着将同一个点加到自身。\n\
    \n椭圆曲线可以在实数上可视化，如图 2-12 所示。\n\n![](img/515270_1_En_2_Fig12_HTML.jpg)\n\n一张图在所有四个象限中绘制了一条椭圆曲线。该曲线水平方向呈双边对称。\n\
    图 2-12\n实数域上的椭圆曲线 `y² = x³ - 3x + 5`\n\n我们可以在几何上直观地理解曲线和群运算（即加法和倍乘）在实数上的表现，这有助于建立直观感受。然而，在实践中，使用素数域上的曲线来构建基于\
    \ ECC 的方案。尽管当我们尝试绘制它时，它看起来相当随机且不直观。\n\n## 点加法\n\n对于添加两个点，画一条通过点 `P` 和 `Q` 的直线（图\
    \ 2-13 中的对角线），以得到第三个点。该点反射后得到点 `R`，在图 2-13 中表示为 `P+Q`。\n\n![](img/515270_1_En_2_Fig13_HTML.jpg)\n\
    \n一张图在所有象限中绘制了一条椭圆曲线。该曲线水平方向呈双边对称。两条线分别在 `P` 和 `Q` 以及 `P+Q` 处与曲线相交。\n图 2-13\n\
    点加法\n\n从代数角度来说，在点加法运算中，将两个点 `P` 和 `Q` 相加以获得曲线上第三个点 `R` 的坐标：\n\n![$$ P+Q=R $$](img/515270_1_En_2_Chapter_TeX_Equk.png)\n\
    \n其中 `P` = (`x`[1], `y`[1])，`Q` = (`x`[2], `y`[2])，`R` = (`x`[3], `y`[3])。\n\n\
    对于加法，我们计算点之间的斜率：\n\n![$$ S=\\frac{\\left({y}_2-{y}_1\\right)}{\\left({x}_2-{x}_1\\\
    right)}\\ \\mathit{\\operatorname{mod}}\\ p $$](img/515270_1_En_2_Chapter_TeX_Equl.png)\n\
    \n其中 `S` 表示经过 `P` 和 `Q` 的直线。\n\n现在得到新点 `R`：\n\n![$$ {x}_3={s}²-{x}_1-{x}_2\\ \\\
    mathit{\\operatorname{mod}}\\ p $$](img/515270_1_En_2_Chapter_TeX_Equm.png)\n\n\
    ![$$ {y}_3=s\\left({x}_1-{x}_2\\right)-{y}_1\\ \\mathit{\\operatorname{mod}}\\\
    \ p $$](img/515270_1_En_2_Chapter_TeX_Equn.png)\n\n## 点倍乘\n\n在点倍乘中，`P` 被加到自身。换句话说，`P`\
    \ 和 `Q` 是同一个点。由于该点与自身相加，我们可以称此运算为点倍乘。\n\n为了倍乘一个点，画一条经过点 `P` 的切线（图 2-14 中的虚线对角线），该线获得与曲线相交的第二个点。将该点反射即可得到结果\
    \ `R`，在图 2-14 中表示为 `2P`。\n\n![](img/515270_1_En_2_Fig14_HTML.jpg)\n\n一张图在所有象限中绘制了一条椭圆曲线。该曲线水平方向呈双边对称。两条线分别在\
    \ `P=Q` 和 `2P` 处与曲线相交。\n图 2-14\n椭圆曲线点倍乘\n\n对于倍乘，我们使用\n\n![$$ S=\\frac{\\left(3{x}_1²+a\\\
    right)}{{2_y}_1}\\ \\mathit{\\operatorname{mod}}\\ p $$](img/515270_1_En_2_Chapter_TeX_Equo.png)\n\
    \n其中 `S` 表示经过点 `P` 的切线。\n\n现在得到点 `R`：\n\n![$$ {x}_3={s}²-{x}_1-{x}_2\\ \\mathit{\\\
    operatorname{mod}}\\ p $$](img/515270_1_En_2_Chapter_TeX_Equp.png)\n\n`y`[3] =\
    \ `s`(`x`[1] - `x`[2]) - `y`[1] `mod p`\n"
- fmt: '### Scalar Point Multiplication


    This operation is used to multiply a point on the elliptic curve by a given integer,
    for example, an integer `d` and the point `P`. We get `dP` by repeatedly adding
    `P`, `d` times, as shown in the following:


    ![$$ P+P+\dots +P= dP $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equq.png)


    This operation is used to generate a public key in ECC-based cryptosystems. It
    is a very computationally expensive process as both point addition and doubling
    are performed repeatedly to calculate:


    ![$$ Q= dP $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equr.png)


    where `P` is a point on the curve, `d` is a randomly chosen integer as the private
    key, and `Q` is the public key obtained after the multiplication.


    Making point multiplication faster is an active area of research. While there
    are many algorithms for making scalar multiplication more quickly, we describe
    a quick example here using the double and add algorithm. It combines point addition
    and doubling operations to achieve performance.


    For example, if using addition only, to get `9P` we must do `P + P + P + P + P
    + P + P + P + P`, which can become impracticable very quickly if the number of
    `P`s increases. We can use the double and add mechanism to make this faster. Here,
    we first convert nine into binary. Starting from the most significant bit (MSB),
    for each bit that is one (high), perform the double and addition operations, and
    for each zero, perform only the double operation. We do not perform any operation
    on the most significant bit. Nine is `1001` in binary, so for each bit we get
    (starting from left to right) `P`, `2P`, `4P`, `8P+P`. This scheme produces `9P`
    only with three double operations and one addition operation, instead of nine
    addition operations.


    ### Elliptic Curve Discrete Logarithm Problem


    Now consider that `dP` results in producing another point `Q` on the curve. Even
    if we know the points `P` and `Q`, it is computationally infeasible to reconstruct
    the sequence of all the double and addition operations that we did to calculate
    the number `d`. Even if someone knows `P` and `Q`, it is impossible for them to
    find `d`. This means that it is a one-way (trapdoor function) function. It is
    the basis of the elliptic curve discrete logarithm problem (ECDLP).


    Consider an elliptic curve `E`, with two elements `P` and `Q`. The discrete logarithm
    problem is to find the integer `d`, where `1 <= d <= #E`, such that


    ![$$ P+P+\dots +P= dP=Q $$](images/515270_1_En_2_Chapter/515270_1_En_2_Chapter_TeX_Equs.png)


    Here, `Q` is the public key (a point generated on the curve, `(x, y)`), and `d`
    is the private key (another point on the curve). The public key is a random multiple
    of the generator point `P`, whereas the private key is the integer `d` that is
    used to generate the multiple. The Generator point or base point `G` is a point
    on the curve that generates a cyclic subgroup, which means that every point in
    the group can be reached by repeated addition of the base point.


    `#E` represents the order of the group (elliptic curve), which means the number
    of points that are present in the cyclic subgroup of the elliptic curve. A cyclic
    group is formed by a combination of points on the elliptic curve and the point
    of infinity. Cofactor `h` is the number of points in the curve divided by the
    order of the subgroup.


    The initial starting point `P` is a public parameter, and the public key `Q` is
    also published, whereas `d`, the private key, is kept secret. If `d` is not known,
    it is unfeasible to calculate with only the knowledge of `Q` and `P`, thus creating
    the hard problem on which ECDLP is built.


    A key pair is linked with the specific domain parameters of an elliptic curve.
    Domain parameters are public values that are required to implement ECC schemes.
    These parameters are represented as a tuple `{p, a, b, G, n, h}`:


    *   `p`: Field (modulo prime)

    *   `a`, `b`: Fixed elliptic curve coefficients

    *   `G`: The generator point to generate a cyclic group

    *   `n`: Order of the group (curve)

    *   `h`: Cofactor


    For example, Bitcoin uses the `SECP256k1` curve with the equation `y² = x³ + 7`
    and domain parameters as defined here: [`https://en.bitcoin.it/wiki/Secp256k1`](https://en.bitcoin.it/wiki/Secp256k1).


    The most used curves are NIST proposed curves, such as `P-256`. Other curves include
    `Curve25519`, `Curve1174`, and many more. Of course, it is advisable to choose
    a safe curve. An excellent resource of safe and unsafe curves along with explanations
    is maintained online here: [`https://safecurves.cr.yp.to`](https://safecurves.cr.yp.to).


    ## Digital Signatures


    Public key cryptography is used to create digital signatures. It is one of the
    most common applications of public key cryptography. In this section, we will
    discover how RSA, ECDSA, and Schnorr signatures work. Concepts such as aggregate
    signatures and multisignatures, also commonly used in blockchains, will be introduced.


    Digital signatures provide a means of associating a message with an entity from
    which the message has originated. Digital signatures are used to provide data
    origin authentication and nonrepudiation.


    Digital signatures are used in consensus algorithms and especially in blockchain
    networks to sign the transactions and messages sent by a user on the blockchain
    network. Blocks are sealed cryptographically using a digital signature so that
    the recipient can verify the authenticity of the transmitted block. Similarly,
    all transactions are signed as well. It is common in consensus algorithms that
    blocks are sealed and broadcast to the network that recipients (other nodes) receive,
    who verifies the signature to ascertain the block’s authenticity. The blocks are
    inserted into the local blockchain after verification.


    Digital signatures have three security properties: authenticity, unforgeability,
    and nonreusability.


    ### Authenticity


    This means that the digital signatures are verifiable by the receiving party.


    ### Unforgeability (Nonrepudiation)


    This property guarantees that only the message’s sender can sign using the private
    key. Digital signatures must also protect against forgery. Forgery means an adversary
    fabricating a valid signature for a message without access to the legitimate signer’s
    private key. In other words, unforgeability implies that no one else can produce
    the signed message produced by a genuine sender.


    ### Nonreusability


    This property necessitates that the digital signature cannot be separated from
    a message and used again for another message. In other words, the digital signature
    is firmly bound to the corresponding message and cannot be separated from its
    original message and attached to another.


    The process of signing and verification using digital signatures is shown in Figure
    [2-15](#515270_1_En_2_Chapter.xhtml#Fig15).


    ![](images/515270_1_En_2_Chapter/515270_1_En_2_Fig15_HTML.png)


    A 2-part flowchart of the signing and verification process has the flow from data
    to signed data and the flow from signed data to hash, respectively.


    Figure 2-15


    Digital signing (left) and verification process (right)


    First, we produce the hash of the data for which we want to prove data origin
    authentication. Then we encrypt the hash using the prover’s private key (signing
    key) to create a “signature” and attach it with the data. Finally, this signed
    object is sent to the verifier.


    The verifier decrypts the encrypted hash of the data using the signer’s (sender)
    public key to retrieve the original hash. The verifier then takes the data and
    hashes it again through the hash function to produce the hash. If both these hashes
    match, the verification is successful, proving that the signer indeed signed the
    data. It also proves the data origin authentication, along with nonrepudiation
    and data integrity properties.


    Now we describe how ECDSA (elliptic curve digital signature algorithm) works.'
