- fmt: "# Outlook\n\nThis step introduced the blockchain-data-structure and explained\
    \ its construction. The way in which the blockchain-data-structure makes extensive\
    \ use of hash references makes it a very change-sensitive data store. The next\
    \ step explains that property in more detail, as it is the key to understanding\
    \ how the blockchain is made secure.\n\n# Summary\n\n- The blockchain-data-structure\
    \ is a specific kind of data structure that is made up of ordered units called\
    \ blocks.\n- Each block of the blockchain-data-structure consists of a block header\
    \ and a Merkle tree that contains transaction data.\n- The blockchain-data-structure\
    \ consists of two major data structures: an ordered chain of block headers and\
    \ Merkle trees.\n- One can imagine the ordered chain of block headers as being\
    \ the digital equivalent to an old-fashioned library card catalog, where the individual\
    \ catalog cards are sorted according to the order in which they were added to\
    \ the catalog.\n- Having each block header referencing its preceding block header\
    \ preserves the order of the individual block headers and blocks, respectively,\
    \ that make up the blockchain-data-structure.\n- Each block header in the blockchain-data-structure\
    \ is identified by its cryptographic hash value and contains a hash reference\
    \ to its preceding block header and a hash reference to the application-specific\
    \ data whose order it maintains.\n- The hash reference to the application-specific\
    \ data is typically the root of a Merkle tree that maintains hash references to\
    \ the application-specific data.\n\nFootnotes [1](#A436689_1_En_14_Chapter.html#Fn1_source)\n\
    \nNakamoto, Satoshi. Bitcoin: A peer-to-peer electronic cash system. 2008. [`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf).\n\
    \n# 15. Using the Data Store\n\nChaining blocks of data\n\nStep [14](#A436689_1_En_14_Chapter.html)\
    \ introduced the `blockchain-data-structure`. It turns out that the `blockchain-data-structure`\
    \ consists of two major components: an ordered chain of block headers and Merkle\
    \ trees containing transaction data. This data structure was invented with the\
    \ goal of storing transaction data in a secure fashion. But what does storing\
    \ data in a secure fashion mean in this context? Answering this question is the\
    \ purpose of this step. This step points out the consequences of changing data\
    \ in the blockchain and it illustrates how the `blockchain-data-structure` detects\
    \ changes. Furthermore, this step highlights the power of hash references when\
    \ storing data in a change-sensitive manner. Finally, this step explains how to\
    \ add new blocks to the `blockchain-data-structure` in a correct way.\n\n## The\
    \ Metaphor\n\nKnitting is the craft of turning yarn into a textile or fabric by\
    \ creating a sequence of multiple interlocking loops of yarn, the so-called stitches.\
    \ When produced manually, the sizes of knitting stitches vary significantly. Hence,\
    \ during the process of knitting, it is sometimes necessary to correct individual\
    \ stitches. In order to correct a knitting stitch located somewhere in the fabric,\
    \ one has to rip out all of its succeeding stitches in reverse order starting\
    \ from the end of the row until one eventually arrives at the stitch to be corrected.\
    \ After the stitch under consideration has been corrected, one has to re-create\
    \ all its succeeding stitches. Since this procedure is quite elaborate, it is\
    \ important to ensure that all stitches fulfill the quality requirements when\
    \ they are created the first time. This step explains that using the `blockchain-data-structure`\
    \ is very similar to knitting: Adding a new block at the end of the `blockchain-data-structure`\
    \ is easy, while changing data located somewhere in the chain is quite elaborate.\
    \ With this metaphor in mind, you should easily be able to understand how the\
    \ `blockchain-data-structure` detects changes, on the one hand, and how data are\
    \ added and changed correctly, on the other hand.\n\n## Adding New Transactions\n\
    \nIn order to understand how to add new transactions to an existing `blockchain-data-structure`\
    \ in an orderly way, let’s consider a simple example. Figure [15-1](#A436689_1_En_15_Chapter.html#Fig1)\
    \ illustrates the initial situation of a `blockchain-data-structure` that consist\
    \ of one block only. The existing `blockchain-data-structure` only maintains two\
    \ transactions. Transaction 3 and Transaction 4 at the bottom of Figure [15-1](#A436689_1_En_15_Chapter.html#Fig1)\
    \ are not yet added to the `blockchain-data-structure`. The steps to be performed\
    \ in order to add new transaction data are:\n\n1. Create a new Merkle tree that\
    \ contains all new transaction data to be added, as shown in Figure [15-2](#A436689_1_En_15_Chapter.html#Fig2).\n\
    \n   ![A436689_1_En_15_Fig2_HTML.jpg](A436689_1_En_15_Fig2_HTML.jpg)\n\n   Figure\
    \ 15-2.\n\n   Step [1](#A436689_1_En_1_Chapter.html): Creating a new Merkle tree\
    \ that contains the new transactions\n\n2. Create a new block header (Block Header\
    \ 2) that contains both the hash reference (B1) that points to the header of its\
    \ preceding block (Block Header 1) and the root of the Merkle tree that contains\
    \ the new transaction data (R34), as shown in Figure [15-3](#A436689_1_En_15_Chapter.html#Fig3).\n\
    \n   ![A436689_1_En_15_Fig3_HTML.jpg](A436689_1_En_15_Fig3_HTML.jpg)\n\n   Figure\
    \ 15-3.\n\n   Step [2](#A436689_1_En_2_Chapter.html): Create a new block header\
    \ that contains both the hash reference to its preceding header and the root of\
    \ the Merkle tree that contains the new transaction data\n\n3. Create a new hash\
    \ reference (B2) to the new block header, as shown in Figure [15-4](#A436689_1_En_15_Chapter.html#Fig4),\
    \ and declare it the new head of the updated `blockchain-data-structure`. Remember\
    \ that the reference that points to the most currently added piece of data in\
    \ a chain is also called the head of the whole chain (see Step [11](#A436689_1_En_11_Chapter.html)).\n\
    \n   ![A436689_1_En_15_Fig4_HTML.jpg](A436689_1_En_15_Fig4_HTML.jpg)\n\n   Figure\
    \ 15-4.\n\n   Step [3](#A436689_1_En_3_Chapter.html): Create a new hash reference\
    \ that points to the new block header, which is now the new head of the whole\
    \ updated `blockchain-data-structure`\n\n![A436689_1_En_15_Fig1_HTML.jpg](A436689_1_En_15_Fig1_HTML.jpg)\n\
    \nFigure 15-1.\n\nInitial situation: Two new transactions (Transaction 3 and Transaction\
    \ 4) should be added to the existing `blockchain-data-structure`\n\n## Detecting\
    \ Changes\n\nThe step depicted in Figure [15-4](#A436689_1_En_15_Chapter.html#Fig4)\
    \ serves as the initial situation for studying the impact of changing data that\
    \ are already part of the `blockchain-data-structure`. I will discuss the following\
    \ cases:\n\n- Changing the content of transaction data\n- Changing a reference\
    \ in the Merkle tree\n- Replacing a transaction\n- Changing the Merkle root\n\
    - Changing a block header reference\n\n### Changing the Content of Transaction\
    \ Data\n\nFigure [15-5](#A436689_1_En_15_Chapter.html#Fig5) illustrates what happens\
    \ if we change Transaction 2. This transaction is part of a Merkle tree, which\
    \ consists of hash references. By changing some properties of the Transaction\
    \ 2 (e.g., the amount of goods being transferred or the account that receives\
    \ ownership), one also changes its fingerprint or its cryptographic hash value,\
    \ respectively. As a result, the hash reference `R2` that pointed to the original\
    \ transaction data is broken. It detects that the transaction data it originally\
    \ referred were changed in the meantime and hence violates the rules of staying\
    \ unchanged. As a result, the whole `blockchain-data-structure` is invalid.\n\n\
    ![A436689_1_En_15_Fig5_HTML.jpg](A436689_1_En_15_Fig5_HTML.jpg)\n\nFigure 15-5.\n\
    \nChanging the details of a transaction invalidates the hash reference that pointed\
    \ to the original data, which invalidates the whole data structure"
