  trans: '

    # 交易


    交易是一种将所有权从一个账户转移到另一个账户的手段，也是描述和验证所有权的一种方式。事实证明，交易实际上是微型的自包含合约。它们包含了实现所有权转移所需的全部信息。这一洞察促成了由区块链执行的智能合约的发展。与交易数据类似，智能合约是相关各方意愿的机器可读描述。但与简单的交易数据不同，智能合约在用于描述期望所有权转移的对象、主体、行为和条件方面要灵活得多。从技术角度来看，智能合约是用区块链特定编程语言编写的自包含计算机程序。为了容纳智能合约，区块链技术通过增加执行编程代码的能力得到了扩展。这一扩展将区块链从一个主要专注于存储交易数据的分布式系统，转变为一个执行智能合约的分布式虚拟机系统。¹⁵


    运行程序代码的能力为在区块链上开发应用程序开辟了可能性，而不仅仅是维护简单的交易数据。在谈论智能合约时，我们需要谨慎；尽管该术语最初暗示了对手方之间的合约，但现在它被用来指代在特定区块链中管理和执行的一段代码。然而，法律界已有动向，基于李嘉图合约的思想，开发更接近初始概念的方案。¹⁶


    由于灵活性，智能合约可用于描述各种现实世界中的合约，例如定期支付租金、获得贷款、偿还贷款、下注并结算复杂赌注、以及在发生损失或复杂事件时支付保险金。因此，智能合约是过去几年中区块链最重要且最有前途的发展。


    # 库存数据


    前述步骤中讨论的初始区块链关注于维护一个不可变的、仅可追加的数据存储的完整性，该存储可用于维护交易数据的完整历史记录等。然而，正如步骤 9 中所讨论的，所有权可以基于交易数据和库存数据两种方式进行管理。前一种方法在管理简单数据时似乎合适，而后一种方法在智能合约的背景下已被证明十分有用，在这种背景下，整个系统通常被视为一个状态的集合，可以包含任意信息，如账户余额、赌注、保险合同、声誉，或代表物理世界中对象的数据。¹⁷
    因此，整个系统的状态作为库存数据存储，并通过智能合约的执行进行转换，而智能合约则单独存储在一个不可变的、仅可追加的数据存储中。


    # 数据结构


    区块链数据结构并非一条直线的区块链；实际上，它是一种树形数据结构，其分支代表了交易数据历史记录的冲突版本。区块链算法的主要挑战是让分布式系统的节点一致地选择其中一个分支作为权威链。存储交易数据的另一种方法是利用区块的有向无环图，而不是树形数据结构。可以将区块的有向无环图想象为一种树形的区块链数据结构，其分支在后期会合并。使用无环图来存储交易历史对性能、明确所有权以及在节点间达成共识有着深远的影响。¹⁸


    # 区块链的主要成就


    众所周知，人们倾向于高估技术的短期效果，而忽视其长期影响。互联网的演变及其对我们社会的影响不仅证实了这一智慧，还显示出估算技术创新的长期影响是多么困难。然而，以下方面有望成为区块链的长期成就：


    * 去中介化

    * 自动化

    * 标准化

    * 流程精简

    * 处理速度提升

    * 成本降低

    * 转向信任协议和技术

    * 使信任成为一种商品

    * 技术意识提升


    ## 去中介化


    区块链并没有摧毁中间人的角色，而是将自身建立为一个数字化的、严格遵循规则的中间人。用一个中间人替换另一个可能没什么大不了的，但用一个编码了信任的软件系统来替换一个依赖客户信任的人类组织，是一项巨大的成就。此外，用一个能安全协调节点间直接交互的系统来替换一连串的中间人，确实是一项巨大的成就。因此，去中介化是区块链的一项成就，其影响可能会持续存在。


    ## 自动化


    为了履行其作为数字中间人的角色，区块链依赖于自动化。区块链使用得越多，它就越能通过节点间的自动化交互来取代既有的中介机构的手动任务。因此，区块链的另一项成就可能是其促进自动化的潜力。


    ## 标准化


    区块链提供的自动化交易处理基于规则和标准的存在。因此，区块链使用得越多，合约方之间的交易和互动就会越标准化。因此，促进节点间互动的标准化可能是区块链的另一项长期成就。


    ## 流程精简


    作为标准化和自动化的结果，业务流程将变得更加透明和精简。许多组织在准备向区块链过渡的过程中，作为附带效应，审查并分析了自身的业务流程。因此，审查现有业务流程，并对其重新设计和精简，可能是区块链的另一项可能持久存在的成就。


    ## 处理速度提升


    去中介化、标准化、流程精简和自动化导致了流程的显著加速。因此，可以预期的是，区块链使用得越多，合约方之间的交易和互动执行得就越及时。曾经涉及耗时手动任务的流程得以加速，这可能是区块链的另一项长期贡献。


    ## 成本降低


    自动化、去中介化和标准化的经济后果往往是成本的降低。历史表明，自动化的成本降低效应推动并重塑了许多行业，并因此使许多商品能够被更广泛的人群所负担。然而，自动化的成本降低效应并不仅限于生产汽车、电视、手机和服装。从经济角度看，中介服务的成本降低可能是区块链最显著的长期贡献。

    '
- fmt: '### Shift Toward Trust in Protocols and Technology


    The blockchain replaces trust in humans or human organizations with the trust
    in the unerring logic of computer-based verification and the power of consensus.
    This may change our perception of trust and reliability on the individual level
    as well as on the level of the society. Hence, the shift toward trust in security
    protocols and computationally attained consensus may be regarded as one of the
    most important long-term effects of the blockchain from a sociological point of
    view.


    ### Making Trust a Commodity


    Automation and standardization did not only reduce production time and costs in
    many industries but also made many consumer goods that were expensive in the past
    affordable for a huge number of people. For example, can you remember how expensive
    a pocket calculator, a PC, or a mobile phone was 30 years ago? Nowadays, pocket
    calculators are given away as marketing goodies, and computers with magnitudes
    more power than the computers used in the first NASA space programs are affordable
    on a pocket change budget. This is mainly due to the automation and standardization
    in the production of computer chips and semiconductors. We can expect that trust
    and secure initiation, execution, and settlement of business interactions will
    become as inexpensive and ubiquitously available as pocket calculators due to
    the automation and standardization introduced by the blockchain. This could be
    the most visible long-term impact of the blockchain for those who need to initiate,
    execute, and settle business interactions every day as part of their daily business.


    ### Increased Technology Awareness


    The blockchain is a technical construct of high complexity that solves the highly
    technical problem of achieving integrity in distributed peer-to-peer systems by
    using immutable data structures and a consensus algorithm. This topic does not
    seem to be predestinated to attract the attention of the business world. However,
    the blockchain has received and continues to receive a lot of attention from many
    sides. The increased interest in technology and the rising awareness about the
    role of technology in our lives may be regarded as side effects of the blockchain,
    but they are welcome developments since the success of many industries as well
    as the wealth of our society critically depend on mastering technological challenges.


    ## Possible Disadvantages


    Besides its positive effects and accomplishments, the blockchain can also cause
    unwanted side effects or even negative outcomes. The most important ones are:


    - Lack of privacy

    - Loss of personal responsibility

    - Loss of jobs

    - Reintermediation


    ### Lack of Privacy


    Public blockchains do not hide any of their data. Instead, everyone is able to
    read the whole history of transactions. This level of transparency is frightening
    for those who want to protect their privacy. These concerns are understandable
    when taking into account the level at which personal data are already collected
    and utilized by large corporations or intelligence agencies. However, this criticism
    may foster the development and spread of private blockchains or the utilization
    of advanced security protocols. Additionally, this could initiate the idea that
    people could own their personal data and be able to sell the right to access or
    use it. As a result, intermediaries such as established providers of search engines
    and social media platforms may lose user acceptance and market share.


    ### Loss of Responsibility


    Loss of personal responsibility is often considered a consequence of disintermediation.
    Intermediaries not only bring different parties of a contract together but may
    also provide guarantees. They offer reconciliation in cases when transactions
    do not work out as intended, and they are also obliged to take responsibility
    for their actions. The shift from trust in people and human organizations toward
    trust in protocols and technology may lead to a loss of personal service and personal
    responsibility in the context of initiating, executing, and settling contractual
    interactions. Due to open questions regarding the legal acceptance of the blockchain,
    people expressed their doubt whether the blockchain as a fully automated protocol-driven
    transaction machinery can take the responsibility of its actions in the same way
    traditional intermediaries do. However, this criticism may foster legal initiatives
    for clarifying open issues regarding the legal status of the blockchain.


    ### Loss of Jobs


    Automation and standardization have not only shaped the process and the costs
    of producing goods but also caused friction in the labor market. Many players
    in the financial industry such as banks, brokers, custodians, money-transfer agencies,
    and notaries are directly tied to their roles as intermediaries. Many jobs in
    these institutions could be at risk when a huge portion of financial transactions
    are processed in an automated fashion through the blockchain.


    ### Reintermediation


    The complexity and its open legal status may discourage individual people as well
    as organizations from using the blockchain, which can cause an effect that counteracts
    disintermediation. Instead of using the blockchain in order to interact with contracting
    parties directly, people may decide to utilize services offered by intermediaries,
    which in turn use the blockchain. This could lead to a renaissance of intermediaries
    that are supposed to be replaced by the blockchain. This effect could seriously
    slow down the adoption of the blockchain and counteract some of its major accomplishments.'
