    Not all distributed systems are open to everyone and grant reading and writing
    access to all their nodes. There are versions of the blockchain that differ with
    respect to the allocation of reading and writing access among the nodes. These
    differences have an impact on the architecture and the distributed nature of the
    system as well as on the purpose of the blockchain within those systems. Hence,
    it is important to find satisfying answers to the following questions:


    *   What kind of blockchain is used (public vs. private and permissioned vs. permissionless)?

    *   What rights are restricted?

    *   What groups of nodes have which rights?

    *   Why has the specific type of blockchain been chosen?

    *   Who decides which rights are given to what group of nodes?

    *   Who makes and enforces the rules regarding granting or refusing reading or
    writing access to the system?

    *   Who runs the on-boarding process?

    *   Are there any privacy or scalability concerns in the specific solution that
    could justify the restriction of certain rights?


    ### What Is the Added Value of Using the Purely Peer-to-Peer System?


    Both purely distributed peer-to-peer systems and centralized systems have their
    own advantages and disadvantages. Centralized systems are not inherently bad,
    they just pursue a different architectural concept that serves many application
    cases very well and still continues to do so. With some characteristics, centralized
    systems may be more desirable than distributed peer-to-peer systems . This is
    particularly true as integrity in purely distributed peer-to-peer systems is notoriously
    hard to maintain and costs additional effort. Hence, one needs good reasons for
    choosing a distributed peer-to-peer system over a centralized one. When analyzing
    a concrete blockchain application, it is important to find satisfying answers
    to the following questions:


    *   Why was the system implemented as a purely distributed peer-to-peer system
    in the first place?

    *   What are the alternatives?

    *   What are the advantages of utilizing a purely distributed peer-to-peer architecture
    over the alternatives and what are the disadvantages?

    *   What is the added value of using a distributed peer-to-peer architecture?

    *   Do the advantages of the peer-to-peer architecture outweigh the disadvantages?


    Asking and insisting on the answers to these questions is important to distinguish
    those who consciously choose the distributed peer-to-peer architecture from those
    who use the blockchain just for the sake of using it.'
  trans: '

    # 具体应用场景


    区块链对于其所存储的数据类型并无特定限制。因此，存储在区块链中的数据范围及其应用领域，与人类活动本身一样广泛多样。因此，不可能对所有区块链应用提供完整的概述。为此，本节仅介绍一小部分具体的区块链应用领域，这些领域已在使用或即将使用区块链技术¹：


    - **支付**：管理数字法定货币的所有权与转移。

    - **加密货币**：管理与创建独立于任何政府、央行或其他中央机构之外的数字支付工具的所有权与发行。

    - **小额支付**：转移通过传统方式成本过高的小额资金。

    - **数字资产**：管理具有自身价值或代表现实世界中有价值物品的数字项目的创建、所有权和转移。

    - **数字身份**：基于独特数字项目进行身份证明和身份验证。

    - **公证服务**：对文件或合同以及所有权或转让证明进行数字化、存储和验证。

    - **合规与审计**：在审计跟踪中，对受监管行业的人员或组织的业务活动进行审计。

    - **税务**：根据交易或单一所有权计算和征收税款，以减少避税²或双重征税。

    - **投票**：创建、分发和统计数字选票。

    - **记录管理**：创建和存储医疗记录。


    # 分析区块链应用


    在多种情况下，可能需要对区块链应用进行分析，例如成为一家使用区块链的公司客户、投资一家区块链初创公司，或在自己的公司中使用区块链应用。在所有这些情况下，都需要判断某个区块链应用是否有用，或者是否能创造实际价值。由于区块链是一种复杂的技术架构，要清晰了解所考虑的软件系统的能力，并做出明智的购买、投资或使用决策，可能颇具挑战。因此，提出以下部分或全部问题可能会有所帮助：


    - 使用哪种类型的区块链？

    - 使用区块链的条件是否满足？

    - 使用分布式点对点系统带来了哪些附加值？

    - 应用理念是什么？

    - 商业案例是什么？

    - 如何补偿为系统贡献资源的节点？


    ## 使用区块链的条件是否满足？


    区块链是一个纯分布式点对点系统，由数量未知、可靠性和可信度也未知的节点组成。因此，在分析具体区块链应用时，首先要考虑的是其架构，以及该架构是否满足应用“区块链技术套件”的条件。为以下问题找到满意的答案至关重要：


    - 系统的架构是什么？

    - 系统组件有哪些？它们之间如何相互连接？

    - 系统是纯分布式的，还是存在一个可能导致整个系统瘫痪的中心组件？

    - 新节点如何加入系统？

    - 是否所有人都可以加入系统并开始贡献计算资源？

    - 是否存在某种新节点加入流程、尽职调查流程或事先安全检查，这些可能会建立中心控制元素？

    - 所有节点在系统中是否拥有相同的角色和权限？还是节点在读取或写入数据的权限上有所不同？


    回答这些问题将帮助你获得对系统的基本理解，并判断是否真的需要“区块链技术套件”。你可能会发现，所认为的所谓区块链系统，实际上是一个中心化系统。


    ## 使用哪种类型的区块链？


    并非所有分布式系统都向所有人开放，并授予所有节点读写权限。区块链存在不同的版本，它们在节点之间读写权限的分配上有所区别。这些差异会影响系统的架构、分布式特性，以及区块链在这些系统中所扮演的角色。因此，为以下问题找到满意的答案非常重要：


    - 使用哪种类型的区块链（公有链与私有链，以及有许可链与无许可链）？

    - 哪些权限受到了限制？

    - 哪些节点组拥有哪些权限？

    - 为什么选择了特定类型的区块链？

    - 由谁决定将哪些权限授予哪个节点组？

    - 谁制定并执行关于授予或拒绝系统读写访问权限的规则？

    - 谁负责运行节点加入流程？

    - 在特定解决方案中，是否存在任何隐私或可扩展性问题，可以作为限制某些权限的理由？


    ## 使用纯点对点系统带来了哪些附加值？


    纯分布式点对点系统和中心化系统各有其优缺点。中心化系统本身并非不好，它们只是遵循不同的架构概念，这种概念很好地服务于许多应用场景，并且至今依然如此。在某些特性上，中心化系统可能比分布式点对点系统更具吸引力。尤其值得注意的是，在纯分布式点对点系统中，保证完整性是出了名的困难，并且需要付出额外的努力。因此，需要有充分的理由来选择分布式点对点系统而非中心化系统。在分析具体的区块链应用时，为以下问题找到满意的答案至关重要：


    - 为什么系统最初被实现为一个纯分布式点对点系统？

    - 有哪些替代方案？

    - 与替代方案相比，采用纯分布式点对点架构的优势是什么，劣势又是什么？

    - 使用分布式点对点架构带来了哪些附加值？

    - 点对点架构的优势是否大于劣势？


    提出并坚持寻求这些问题的答案至关重要，这有助于区分那些有意选择分布式点对点架构的人，和那些仅仅为了使用区块链而使用它的人。

