    # 区块链数据结构


    什么是`区块链数据结构`？实际上，答案你已经知晓，因为前面的例子开发了一个简化的`区块链数据结构`，只是我们使用了不同的术语。本节通过将改造后的书籍元素与区块链语境下的术语进行关联，完成类比分析。


    我们改造后的书籍包含：


    - 由订购目录页及其对应内容页构成的逻辑单元

    - 称为订购目录的散页堆

    - 存放内容的散页堆

    - 用于标识和关联订购目录页的页码引用

    - 用于标识和关联内容页的内容引用


    为便于查阅，本节末尾的表格 14-2 通过对比改造后书籍元素与`区块链数据结构`元素，总结了对应关系。


    表 14-2.

    改造后书籍与区块链数据结构对比


    | 改造后书籍 | 区块链数据结构¹ |

    | --- | --- |

    | 订购目录中的一页 | 区块头 |

    | 整个订购目录 | 区块头链 |

    | 订购目录中的页码号 | 区块头的加密哈希值 |

    | 前一页的引用编号 | 前一个区块头的加密哈希值 |

    | 内容 | 交易数据 |

    | 内容页 | 包含交易数据的默克尔树 |

    | 内容页引用 | 包含交易数据的默克尔树根 |

    | 订购目录页及其对应内容页构成的逻辑单元 | `区块链数据结构`中的一个区块 |

    | 整个订购目录和所有内容页 | `区块链数据结构` |


    ### 订购目录页及其对应内容页构成的逻辑单元


    订购目录页及其对应内容页构成的逻辑单元对应`区块链数据结构`中的一个区块。所有这些区块共同构成`区块链数据结构`。需要特别指出的是，订购页与内容页的单元仅是逻辑上的概念，因为订购目录页和内容页在物理上是分离的实体。前者通过哈希引用关联后者，从而形成逻辑上的统一体。


    ### 订购目录


    改造后书籍的订购目录等同于`区块链数据结构`中的区块头链。订购目录中的每一页对应`区块链数据结构`中的单个区块头。由于区块头通过引用以线性方式相互连接，如同链条的链环，它们形成了区块头链。与订购目录类似，区块头链不直接存储交易数据，仅存储对应交易数据的哈希引用。这正是订购目录与内容的逻辑单元变得重要的关键点。


    ### 内容页


    改造后书籍的内容等同于区块链维护的交易数据。这些数据专属于我们管理所有权的应用领域。现实世界的区块链应用中没有"内容页"这一概念——我是出于教学目的编造了这个术语。实际区块链应用将内容数据（如交易数据）直接存储在数据库中，我们称其为默克尔树，其根植于区块头中。


    ### 目录页码引用


    改造后书籍中用于标识订购目录页的页码引用，等同于`区块链数据结构`中单个区块头的加密哈希值。它们分别被称为区块哈希或前一个区块的哈希。这些哈希值用于唯一标识每个区块头，并引用前一个区块头。从一个区块头到其前任的实际引用通过哈希引用实现。


    ### 内容引用编号


    改造后书籍中用于标识内容页的内容引用编号，等同于区块头链中指向关联交易数据的哈希引用。更具体地说，存储在区块头中的内容引用编号，是数据库中交易数据默克尔树的树根。这正是订购目录（区块头）与其对应内容（包含交易数据的默克尔树）构成逻辑统一体的关键所在。


    ## 在区块链数据结构中存储交易


    图 14-5 通过示意图总结了您学到的知识，展示了一个存储四笔交易的`区块链数据结构`。图 14-5 所示的简化`区块链数据结构`包含两个区块，分别标注为`区块
    1`和`区块 2`。为强调区块的逻辑本质，它们用虚线绘制。两个区块分别包含标注为`区块头 1`和`区块头 2`的区块头。`区块 1`是该数据结构中的第一个区块，因此没有前驱区块，故`区块头
    1`不含指向前驱区块头的引用。由于`区块 2`有前驱，`区块头 2`维护了一个指向其前驱区块头的哈希引用（标注为`B1`）。图中展示的`区块链数据结构`维护了两个不同默克尔树的哈希引用，其树根分别标注为`R12`和`R34`。默克尔树根的标签已经提示了它们包含的交易数据（例如，根为`R12`的默克尔树包含前两笔交易，标注为`交易
    1`和`交易 2`，以及指向它们的哈希引用`R1`和`R2`）。


    ![A436689_1_En_14_Fig5_HTML.jpg](img/A436689_1_En_14_Fig5_HTML.jpg)


    图 14-5.

    一个包含四笔交易的简化`区块链数据结构`


    如果您加入了一个维护如图 14-5 所示`区块链数据结构`的分布式点对点系统，您将收到所有交易数据、所有哈希引用值以及所有区块头。基于这些数据，您的本地计算机会创建包含指向本地存储数据的哈希引用的`区块链数据结构`。拥有这些数据以及对最新区块头的引用，您就能按逆序浏览自系统创建以来提交的所有交易数据的历史记录——在此例中就是四笔交易。请注意，最新添加的区块头引用被称为`区块链数据结构`的头部，因为它是下一个区块将添加的位置。有时最新添加的区块头及其指向的引用都被称为`区块链数据结构`的头部。在图
    14-5 中，标注为`B2`的引用就是`区块链数据结构`的头部。务必注意不要混淆"头部"和"区块头"这两个术语：`区块链数据结构`由多个区块组成，每个区块都有自己的区块头，但整个`区块链数据结构`只有一个头部。


    ⚠️ 注意


    本节讨论的及图 14-5 所示的`区块链数据结构`已因教学目的进行了简化。关于区块头中存储信息的许多细节已被刻意省略。其中的部分内容将在后续步骤中，随着您对区块链理解的深入而逐步介绍。

