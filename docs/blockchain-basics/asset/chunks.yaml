- fmt: "### Task 7: Deciding Which Ledgers Represent the Truth\n\nOnce new transactions\
    \ can be added to the individual ledgers in the peer-to-peer system, one runs\
    \ into a problem that is typical for any distributed peer-to-peer system: different\
    \ peers may have received different transactions and soon the history of transactions\
    \ maintained by them differs. Hence, different versions of the transaction history\
    \ can exist in the peer-to-peer system. Since the transaction history is the basis\
    \ for identifying lawful owners, having different conflicting transaction histories\
    \ is a serious threat to the integrity of the system. Hence, it is important to\
    \ find a way either to prevent the emergence of different transaction histories\
    \ in the first place or to find a way to decide which transaction history represents\
    \ the truth. Due to the nature of a purely distributed peer-to-peer system, the\
    \ former approach is not possible. As a result, you need a criterion for how to\
    \ find and choose one transaction history that represents the truth. But there\
    \ is another problem: there is no central authority in a purely distributed peer-to-peer\
    \ system that can declare which transaction history has to be chosen. It turns\
    \ out that one can solve that problem by making every node in the peer-to-peer\
    \ system decide on its own which transaction history represents the truth in a\
    \ way that the majority of the peers independently agree on that decision. It\
    \ also turns out that the way in which the blockchain lets you add new transactions\
    \ to the append-only blockchain-data-structure already contains the solution to\
    \ this problem. Step [19](#A436689_1_En_19_Chapter.html) explains these criteria\
    \ in detail and how they are used.\n\n## Outlook\n\nThis step identified seven\
    \ tasks that provide a challenging intellectual journey through the concepts that\
    \ constitute the blockchain. Once you fulfill these tasks, you will arrive at\
    \ the summit: an understanding of the blockchain. Step [21](#A436689_1_En_21_Chapter.html)\
    \ is the point where you will put all of these concepts together and enjoy the\
    \ results of this learning effort. Step [21](#A436689_1_En_21_Chapter.html) will\
    \ be an overview chapter like this one, but it will draw on the technical knowledge\
    \ you will have acquired in the meantime.\n\n## Summary\n\n*   In order to design\
    \ a purely distributed peer-to-peer system of ledgers for managing ownership,\
    \ one has to address the following tasks:\n    *   Describing ownership\n    *\
    \   Protecting ownership from unauthorized access\n    *   Storing transaction\
    \ data\n    *   Preparing ledgers to be distributed in an untrustworthy environment\n\
    \    *   Forming a system of distributed the ledgers\n    *   Adding and verifying\
    \ new transactions to the ledgers\n    *   Deciding which ledgers represent the\
    \ truth\n*   The tasks outlined above will be addressed in the following 12 steps.\n\
    \n# 9. Documenting Ownership\n\nUsing the course of history as evidence for the\
    \ current state of ownership\n\nThis step considers the task of describing ownership\
    \ in a way that is useful for a purely distributed peer-to-peer system of ledgers.\
    \ This step explains how the blockchain documents ownership and handles the transfer\
    \ of ownership. Additionally, this step points out the importance of ordering\
    \ when documenting the transfer of ownership. Finally, this step highlights the\
    \ importance of the integrity of transaction data for the integrity of the whole\
    \ system.\n\n## The Metaphor\n\nA relay race is a race between teams of runners,\
    \ where each team member covers only a part of the total distance. During the\
    \ race, each runner must hand off a specific item, the so-called baton, to the\
    \ next runner within a certain zone marked on the track. At any given time during\
    \ the race, only one member of the competing teams carries a baton. In order to\
    \ determine which member of a given team is currently carrying the baton, it is\
    \ sufficient to know to whom of the team the baton was handed over at the latest\
    \ hand off. In order to keep track of who carried a baton at any given time, one\
    \ needs to record the time of each hand off and the athletes who were involved.\
    \ This step explains how the blockchain treats ownership in a similar fashion\
    \ to that of the way relay races utilize batons.\n\n## The Goal\n\nThe goal is\
    \ the documentation of ownership in a transparent and comprehensible way. Anyone\
    \ who reads that documentation should be able to make an unambiguous statement\
    \ concerning the association of the goods to its owners.\n\n## The Challenge\n\
    \nThe challenge is to find documentation of ownership that not just claims that\
    \ someone is the owner of something, but also provides evidence of ownership and\
    \ hence serves as proof of ownership.\n\n## The Idea\n\nInstead of describing\
    \ the current state of ownership by inventory data (i.e., by listing the current\
    \ possessions of all owners), one maintains a list of all transfers of ownership\
    \ in a ledger in an ongoing fashion. Every transfer of ownership is described\
    \ by transaction data that clearly point out which owner hands off ownership of\
    \ what item and to whom at what time. The whole history of transaction data stored\
    \ in a ledger becomes an audit trail that provides evidence of how everyone achieved\
    \ his or her possession.[¹](#A436689_1_En_9_Chapter.html#Fn1) This is equivalent\
    \ to tracking every hand off of the baton in a relay race, which allows everyone\
    \ to reconstruct the whole race later on.\n\n## A Short Detour to Inventory and\
    \ Transaction Data\n\nThere are two competing ways to describe ownership—through\
    \ inventory data or transaction data. Inventory data describe the current state\
    \ of ownership. They are similar to a bank account statement that just displays\
    \ the amount of money that is currently available. Transaction data describe transfers\
    \ of ownership. They are similar to a bank account statement that lists every\
    \ withdrawal, deposit, and transferal of money. One can derive inventory data\
    \ by aggregating transaction data. Besides the fact that both inventory data and\
    \ transaction data describe ownership, their underlying philosophy differs dramatically.\
    \ Inventory data just state or claim ownership, while transaction data explain\
    \ and thereby justify ownership. However, inventory data are often considered\
    \ more convenient as they immediately state the fact that is interesting to most\
    \ people, that is, the current state of ownership."
