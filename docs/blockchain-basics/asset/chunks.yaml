    \ referred were changed in the meantime and hence violates the rules of staying\
    \ unchanged. As a result, the whole blockchain-data-structure is invalid.\n\n\
    ![A436689_1_En_15_Fig5_HTML.jpg](A436689_1_En_15_Fig5_HTML.jpg)\n\nFigure 15-5.\n\
    \nChanging the details of a transaction invalidates the hash reference that pointed\
    \ to the original data, which invalidates the whole data structure"
  trans: "\n# 展望\n\n本步骤介绍了区块链数据结构并阐释了其构建方式。区块链数据结构通过大量使用哈希引用，成为一种对数据变更极其敏感的存储方式。下一步将更详细地解释这一特性，因为它是理解区块链如何实现安全性的关键。\n\
    \n# 总结\n\n-   区块链数据结构是一种特殊的数据结构，由称为区块的有序单元构成。\n-   区块链数据结构中的每个区块由一个区块头和一个包含交易数据的默克尔树组成。\n\
    -   区块链数据结构包含两大主要数据结构：一个有序的区块头链和多个默克尔树。\n-   可以将有序的区块头链想象为传统图书馆目录卡的数字对等物，其中每张目录卡均按其加入目录的顺序进行排序。\n\
    -   每个区块头引用其前一个区块头，这分别保留了构成区块链数据结构的各个区块头与区块的顺序。\n-   区块链数据结构中的每个区块头通过其加密哈希值进行标识，且包含指向其前一个区块头的哈希引用，以及一个指向其维护顺序的特定应用数据的哈希引用。\n\
    -   指向特定应用数据的哈希引用通常是默克尔树的树根，该树维护着指向各特定应用数据的哈希引用。\n\n脚注 1\n\n中本聪. 比特币：一种点对点的电子现金系统.\
    \ 2008. [`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf).\n\
    \n# 15. 使用数据存储\n\n数据块的链接\n\n第 14 步介绍了`区块链数据结构`。事实证明，`区块链数据结构`包含两个主要组成部分：一个有序的区块头链和包含交易数据的默克尔树。发明这种数据结构的目的是以安全的方式存储交易数据。但在这种语境下，以安全方式存储数据究竟意味着什么？回答这个问题正是本步骤的目的。本步骤指出了在区块链中更改数据的后果，并阐释了`区块链数据结构`如何检测变更。此外，本步骤还强调了在以对变更敏感的方式存储数据时哈希引用的强大功能。最后，本步骤解释了如何以正确的方式向`区块链数据结构`添加新区块。\n\
    \n## 隐喻\n\n编织是通过创建一系列相互交错的线圈（即所谓的针脚）将纱线转化为纺织品或织物的手艺。手工编织时，针脚的大小差异很大。因此，在编织过程中，有时需要修正个别的针脚。为了修正织物中某个位置的针脚，必须从该行的末端开始，按相反顺序拆除其之后的所有针脚，直至最终到达待修正的针脚。在修正完目标针脚后，还必须重新编织其之后的所有针脚。由于这一过程相当复杂，因此在首次创建所有针脚时确保其符合质量要求至关重要。本步骤将解释使用`区块链数据结构`与编织非常相似：在`区块链数据结构`的末尾添加新区块很容易，而更改链中某处的数据则相当复杂。牢记这个隐喻，你应该能轻松理解`区块链数据结构`一方面如何检测变更，另一方面如何正确地添加和更改数据。\n\
    \n## 添加新交易\n\n为了理解如何有条理地向现有`区块链数据结构`中添加新交易，让我们考虑一个简单的例子。图 15-1 展示了一个仅包含一个区块的`区块链数据结构`的初始状态。现有的`区块链数据结构`仅管理两笔交易。图\
    \ 15-1 底部的交易 3 和交易 4 尚未添加到`区块链数据结构`中。执行添加新交易数据的步骤如下：\n\n1.  创建一个新的默克尔树，包含所有待添加的新交易数据，如图\
    \ 15-2 所示。\n\n    ![A436689_1_En_15_Fig2_HTML.jpg](img/A436689_1_En_15_Fig2_HTML.jpg)\n\
    \n    图 15-2.\n\n    步骤 1：创建一个包含新交易的新默克尔树\n\n2.  创建一个新的区块头（区块头 2），使其既包含指向前一个区块头（区块头\
    \ 1）的哈希引用 (B1)，又包含包含新交易数据的默克尔树的树根 (R34)，如图 15-3 所示。\n\n    ![A436689_1_En_15_Fig3_HTML.jpg](img/A436689_1_En_15_Fig3_HTML.jpg)\n\
    \n    图 15-3.\n\n    步骤 2：创建一个新的区块头，使其既包含指向前一个区块头的哈希引用，又包含包含新交易数据的默克尔树的树根\n\n\
    3.  为新的区块头创建一个新的哈希引用 (B2)，如图 15-4 所示，并将其声明为更新后`区块链数据结构`的新头部。请记住，指向链中最近添加数据的引用也称为整个链的头部（参见第\
    \ 11 步）。\n\n    ![A436689_1_En_15_Fig4_HTML.jpg](img/A436689_1_En_15_Fig4_HTML.jpg)\n\
    \n    图 15-4.\n\n    步骤 3：创建一个指向新区块头的新哈希引用，该新区块头现为整个更新后`区块链数据结构`的新头部\n\n![A436689_1_En_15_Fig1_HTML.jpg](img/A436689_1_En_15_Fig1_HTML.jpg)\n\
    \n图 15-1.\n\n初始状态：两笔新交易（交易 3 和交易 4）应添加到现有的`区块链数据结构`中\n\n## 检测变更\n\n图 15-4 所示的步骤作为研究更改已属于`区块链数据结构`的数据所产生影响的初始状态。我将讨论以下情形：\n\
    \n-   更改交易数据的内容\n-   更改默克尔树中的引用\n-   替换一笔交易\n-   更改默克尔树根\n-   更改区块头引用\n\n### 更改交易数据的内容\n\
    \n图 15-5 展示了如果更改交易 2 会发生什么。该交易是默克尔树的一部分，而默克尔树由哈希引用构成。通过更改交易 2 的某些属性（例如，转移的商品数量或接收所有权的账户），其指纹或加密哈希值也会随之改变。结果，指向原始交易数据的哈希引用\
    \ `R2` 被破坏。它检测到其最初引用的交易数据在此期间被更改了，因此违反了保持不变的原则。最终，整个`区块链数据结构`变得无效。\n\n![A436689_1_En_15_Fig5_HTML.jpg](img/A436689_1_En_15_Fig5_HTML.jpg)\n\
    \n图 15-5.\n\n更改交易的详细信息会使指向原始数据的哈希引用失效，从而导致整个数据结构无效\n"
- fmt: '### Changing a Reference in the Merkle Tree


    Figure [15-6](#A436689_1_En_15_Chapter.html#Fig6) illustrates what happens if
    one not only changes details of a transaction but also changes the hash reference
    that points to the updated transaction. The updated hash reference (`R2`) is valid
    as it correctly points to the new transaction data. However, the updated hash
    reference is part of a Merkle tree whose root is a hash reference as well. The
    root of the Merkle tree (`R12`) points to a piece of data that contains the hash
    references `R1` and `R2`. The latter one has been changed in order to be consistent
    with the manipulated version of Transaction 2. Hence, the cryptographic hash value
    of the piece of data containing the updated version of `R2` changes as well, which
    in turn invalidates the root of the Merkle tree `R12`.


    ![A436689_1_En_15_Fig6_HTML.jpg](A436689_1_En_15_Fig6_HTML.jpg)


    Figure 15-6. Changing a transaction and its hash reference in the Merkle tree
    invalidates the root of the Merkle tree, which invalidates the whole data structure


    ### Replacing a Transaction


    Figure [15-7](#A436689_1_En_15_Chapter.html#Fig7) considers the case of replacing
    a whole transaction instead of only manipulating details of an existing transaction
    and updating its hash reference.


    ![A436689_1_En_15_Fig7_HTML.jpg](A436689_1_En_15_Fig7_HTML.jpg)


    Figure 15-7. Replacing a transaction and its hash reference in the Merkle tree
    invalidates the root of the Merkle tree, which invalidates the whole data structure


    When you compare Figure [15-6](#A436689_1_En_15_Chapter.html#Fig6) with Figure
    [15-7](#A436689_1_En_15_Chapter.html#Fig7), you can only find minor difference
    regarding the name of the transaction and its hash reference. Concerning the consequences,
    both illustrations are identical. In both cases the root of the Merkle tree `R12`
    will be invalid due to changes that happened within the Merkle tree. As a result,
    we find that changing a transaction or replacing a transaction will have the same
    impact on the `blockchain-data-structure`. The manipulation will be detected in
    both cases and will invalidate the whole data structure.


    **Note**: Changing or replacing data in the `blockchain-data-structure` will have
    identical results as both have identical effects on hash references.


    ### Changing the Merkle Root


    Figure [15-8](#A436689_1_En_15_Chapter.html#Fig8) illustrates what happens if
    a whole Merkle tree, including its root, is changed.


    ![A436689_1_En_15_Fig8_HTML.jpg](A436689_1_En_15_Fig8_HTML.jpg)


    Figure 15-8. Changing a Merkle tree invalidates the hash reference that points
    to the block header that contains it, which in turn invalidates the whole data
    structure


    The root of the manipulated Merkle tree (`R12`) is part of a block header (Block
    Header 1). The change of the Merkle root changes the cryptographic hash value
    of Block Header 1, which in turn causes the hash reference that points to it (`B1`)
    to be invalid. The hash reference `B1` that maintains the connection or serves
    as a link from Block Header 2 to Block Header 1 becomes invalid as it detects
    the change. As a result, the whole `blockchain-data-structure` becomes invalid.


    ### Changing a Block Header Reference


    Figure [15-9](#A436689_1_En_15_Chapter.html#Fig9) illustrates what happens if
    not only a whole Merkle tree but also the hash reference to the manipulated block
    header is changed.


    ![A436689_1_En_15_Fig9_HTML.jpg](A436689_1_En_15_Fig9_HTML.jpg)


    Figure 15-9. Changing a hash reference within a block header invalidates the hash
    reference that points to the manipulated block header, which in turn invalidates
    the whole data structure


    If the hash reference (`B1`) to the manipulated block header (Block Header 1)
    is changed, the following happens: Starting with hash reference `B1`, all hash
    references that point toward the manipulated data are consistent and valid since
    they were adjusted to the performed manipulation. However, the manipulated hash
    reference `B1` is part of Block Header 2 and hence its cryptographic hash value
    changes, which in turn invalidates the hash reference `B2` that pointed to the
    original data block header containing the original version of the hash reference
    `B1`. As a result, the whole `blockchain-data-structure` is invalid as well.


    ## Changing Data Orderly


    After this discussion of the many approaches to manipulate the `blockchain-data-structure`,
    which all yielded an invalid data structure, it is time to illustrate what needs
    to be done to change or update the `blockchain-data-structure` orderly. Figure
    [15-10](#A436689_1_En_15_Chapter.html#Fig10) illustrates how to change the `blockchain-data-structure`
    in the correct way.


    ![A436689_1_En_15_Fig10_HTML.jpg](A436689_1_En_15_Fig10_HTML.jpg)


    Figure 15-10. Changing a transaction orderly includes changing all subsequent
    hash references


    If we consider changing or updating some details of Transaction 2, we have to
    subsequently update the whole sequence of hash references: `R2`, `R12`, `B1`,
    and `B2`. This means that all hash references, starting with the one that directly
    points to the manipulated data and ending with the hash reference that points
    to the most recent block header as well as all hash references in between them,
    need to be changed and updated so that they reflect the changes of their targets.
    This is quite an elaborate task. And it is an elaborate process on purpose. All
    of this work is necessary to keep the whole `blockchain-data-structure` consistent
    and to keep its integrity. All other attempts to change or manipulate data that
    are part of the `blockchain-data-structure` will cause invalid hash references,
    which in turn will invalidate the whole data structure.


    ## Intended vs. Unintended Changes


    The preceding discussion showed that the `blockchain-data-structure` pursues a
    radical all-or-nothing approach when it comes to changing its data: One either
    changes the whole data structure completely from the point that causes the change
    until the head of the whole chain or one better leave it all unchanged in the
    first place. All other half-hearted, halfway through, or partial changes will
    leave the whole `blockchain-data-structure` in an inconsistent state, which will
    be detected easily and quickly. This is due to the properties of hash references,
    where the `blockchain-data-structure` does not differentiate between intended
    or unintended changes. Actually there are no such things as intended or unintended
    changes in the blockchain. These words refer to a valuation of the motives or
    the person who caused a change. But the `blockchain-data-structure` values neither
    the motives nor the person who causes an inconsistency. The blockchain only cares
    about correctness and consistency of all its hash references. If one of them is
    invalid, the whole data structure is invalid, regardless of who or what caused
    that change or why it was made. And this property makes the `blockchain-data-structure`
    very valuable.


    ## Outlook


    This step illustrated in great detail how the `blockchain-data-structure` deals
    with changes of its data. It turned out that the `blockchain-data-structure` is
    very change sensitive. It pursues a radical all-or-nothing approach when it comes
    to changing its data. The next step explains how this property can be used to
    make data unchangeable, which makes the `blockchain-data-structure` the perfect
    candidate for storing data in an unreliable and untrustworthy environment.'
