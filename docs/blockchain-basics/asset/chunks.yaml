- fmt: "### What Is the Application Idea?\n\nAnalyzing the architecture of a system\
    \ is important, but this does not yield answers concerning its application idea\
    \ and how the system is supposed to create added value for its users. It is important\
    \ to keep in mind that even the most sophisticated system architecture can never\
    \ compensate for a weak or poor application idea. Excitement about the `blockchain`-technology-suite\
    \ may make it easy to overlook a weak or poor application concept. Hence, when\
    \ analyzing a blockchain application, it is important to find convincing answers\
    \ to the following questions:\n\n- What is the purpose of the application in the\
    \ first place?\n- What is the major problem domain of the system?\n- Can the system\
    \ be associated with specific industries or sectors and if yes what are they?\n\
    - What kind of service does the system offer to its users?\n- What is the added\
    \ value of using the system?\n- What kind of generic blockchain use pattern does\
    \ the system utilize?\n- Are there any issues with the legal acceptance of the\
    \ blockchain in the particular application area?\n- What kinds of data are stored\
    \ in the blockchain?\n- What kinds of operations or transactions can be done?\n\
    - What kinds of security features are utilized?\n- How do these aspects relate\
    \ to the application idea of the system?\n\n### What Is the Business Case?\n\n\
    Another important aspect when analyzing blockchain applications is the commercial\
    \ concept of the software system itself. The creation and operation of any software\
    \ consume resources and hence cause costs. The blockchain is no exception to that.\
    \ Analyzing the commercial conditions of blockchain software is an important step\
    \ since many products or technical innovations fail due to flaws in their commercial\
    \ concepts. Hence, it is necessary to find good answers to the following questions:\n\
    \n- What are the costs of purchasing or using the software?\n- What are the fixed\
    \ and variable costs of running or using the software?\n- Who covers what costs?\n\
    - What license model is used?\n- Who receives profits or who has to cover losses?\n\
    \n### How Are Peers Compensated for Contributing Resources to the System and Maintaining\
    \ Integrity?\n\nThe blockchain achieves integrity through the forces of reward\
    \ and punishment implemented by income through fees and proof of work. Step [18](#A436689_1_En_18_Chapter.html)\
    \ highlighted the importance of reward to compensate the contributors of the blockchain,\
    \ while Step [20](#A436689_1_En_20_Chapter.html) pointed out the impact of the\
    \ instrument of payment on the integrity, openness, and distributed nature of\
    \ the system. Knowing and understanding how the peers are compensated for maintaining\
    \ integrity is a crucial aspect in analyzing blockchain applications. Therefore,\
    \ it is necessary to get satisfying answers to the following questions:\n\n- What\
    \ are the rules for compensating peers?\n- Do the compensation rules together\
    \ with the game theoretic aspects of the blockchain ensure and reward honesty\
    \ to those who contribute to the system?\n- What are the fees for having actions\
    \ or transactions verified and executed by the system?\n- What instrument of payment\
    \ is used to pay transaction fees?\n- What instrument of payment is used to compensate\
    \ the peers for verifying and writing data in the blockchain?\n\nSome blockchain\
    \ applications use a cryptographic currency such as Bitcoin as an instrument of\
    \ payment for fees and compensating peers. The resulting dependence on Bitcoin\
    \ or another blockchain application may not be desirable in all circumstances.\n\
    \n## Outlook\n\nThis step discussed aspects of applying the blockchain in the\
    \ real world. However, I have not reached the point of finishing this discussion\
    \ of the blockchain yet. The next step will summarize the learning path and point\
    \ out areas for further development.\n\n## Summary\n\n- The blockchain can be\
    \ considered a purely distributed data store with additional properties such as\
    \ being immutable, append-only, ordered, time-stamped, and eventually consistent.\n\
    - Being a generic data store means that the blockchain can store a wide range\
    \ of data, which in turn makes it usable in a wide range of application areas.\n\
    - Based on its properties, we can identify the following generic-use patterns\
    \ of the blockchain:\n  - Proof of existence\n  - Proof of nonexistence\n  - Proof\
    \ of time\n  - Proof of order\n  - Proof of identity\n  - Proof of authorship\n\
    \  - Proof of ownership\n- Specific application areas of the blockchain that have\
    \ already received attention or may receive attention in the future are:\n  -\
    \ Payments\n  - Cryptocurrencies\n  - Micropayments\n  - Digital assets\n  - Digital\
    \ identity\n  - Notary services\n  - Compliance and audit\n  - Tax\n  - Voting\n\
    \  - Record management\n- When analyzing specific blockchain applications or blockchain\
    \ services, some questions need to be answered:\n  - What kind of blockchain is\
    \ used?\n  - Are the requirements for using the blockchain fulfilled?\n  - What\
    \ is the added value of using a purely distributed peer-to-peer system?\n  - What\
    \ is the application idea?\n  - What is the business case?\n  - How are peers\
    \ compensated for contributing resources to the system?\n\nFootnotes [1](#A436689_1_En_24_Chapter.html#Fn1_source)\n\
    \nWorld Economic Forum. The future of financial services—How disruptive innovations\
    \ are reshaping the way financial services are structured, provisioned and consumed.\
    \ An Industry Project of the Financial Services Community, 2015; World Economic\
    \ Forum. The future of financial infrastructure—An ambitious look at how blockchain\
    \ can reshape financial services. An Industry Project of the Financial Services\
    \ Community, 2016; Foroglou, George, and Anna-Lali Tsilidou. Further applications\
    \ of the blockchain. 2015. Paper presented at the Columbia University PhD in Sustainable\
    \ Development 10 Year Anniversary Conference, February 28, 2014.\n\n[2](#A436689_1_En_24_Chapter.html#Fn2_source)\n\
    \nOn the other hand, the use of truly anonymous cryptocurrencies may make tax\
    \ avoidance easier.\n\n# 25. Summarizing and Going Further\n\nFurther developments,\
    \ alternatives, and the future of the blockchain\n\nThis step finishes this intellectual\
    \ journey through the blockchain universe. After highlighting areas of further\
    \ development and research, this step considers possible accomplishments of the\
    \ blockchain within society. Before concluding with some comments about possible\
    \ future trends in using the blockchain, this step also discusses some of its\
    \ possible disadvantages."
