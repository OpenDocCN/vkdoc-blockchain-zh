- fmt: "# Summary\n\n- Transaction data provide the following information for describing\
    \ a transfer of ownership:\n  - An identifier of the account who initiates the\
    \ transaction and is to transfer ownership to another account\n  - An identifier\
    \ of that account that is to receive ownership\n  - The amount of the goods to\
    \ be transferred\n  - The time the transaction is to be done\n  - A fee to be\
    \ paid to the system for executing the transaction\n  - A proof that the owner\
    \ of the account who hands off ownership agrees with that transfer\n- The complete\
    \ history of transaction data is an audit trail that provides evidence of how\
    \ people acquired and handed off ownership.\n- Any transaction not being part\
    \ of that history is regarded as if it never happened.\n- A transaction is executed\
    \ by adding it to the history of transaction data and allowing it to influence\
    \ the result of aggregating them.\n- The order in which transaction data are added\
    \ to the history must be preserved in order to yield identical results when aggregating\
    \ these data.\n- In order to maintain integrity, only those transaction data are\
    \ added to the `blockchain-data-structure` that fulfill the following three criteria:\n\
    \  - Formal correctness\n  - Semantic correctness\n  - Authorization\n\nFootnotes\
    \ [1](#A436689_1_En_9_Chapter.html#Fn1_source)\n\nNakamoto, Satoshi. *Bitcoin:\
    \ A peer-to-peer electronic cash system* (2008).\n\n# 10. Hashing Data\n\nIdentifying\
    \ data from their digital fingerprint\n\nThis step explains one of the most important\
    \ base technologies of the blockchain: hash values. It discusses important properties\
    \ of cryptographic hash functions and introduces patterns of applying hash functions\
    \ to data.\n\n## The Metaphor\n\nFingerprints are impressions of the friction\
    \ ridges of all or any part of the fingers of the human hand. They are considered\
    \ to be able to identify humans uniquely. They have been used to investigate crimes,\
    \ identify offenders, and to exonerate the innocent. This step introduces a concept\
    \ for identifying data, which can be seen as the digital equivalent to fingerprints.\
    \ The concept is called cryptographic hash value, and the blockchain makes extensive\
    \ use of it. Hence, understanding cryptographic hashing is mandatory for understanding\
    \ the blockchain.\n\n## The Goal\n\nIn the distributed peer-to-peer system, you\
    \ will deal with a huge number of transaction data. As a result, you will need\
    \ to identify them uniquely and compare them as quickly and as easily as possible.\
    \ Hence, the goal is to identify transaction data and possibly any kind of data\
    \ uniquely by their digital fingerprints.\n\n## How It Works\n\nHash functions\
    \ are small computer programs that transform any kind of data into a number of\
    \ fixed lengths, regardless of the size of the input data.[¹](#A436689_1_En_10_Chapter.html#Fn1)\
    \ Hash functions only accept one piece of data at any given time as input and\
    \ create a hash value based on the bits and bytes that make up the data. Hash\
    \ values can have leading zeros in order to provide the required length. There\
    \ are many different hash functions that differ among others with respect to the\
    \ length of the hash value they produce. An important group of hash functions\
    \ is called cryptographic hash functions, which create digital fingerprints for\
    \ any kind of data. Cryptographic hash functions have the following properties[²](#A436689_1_En_10_Chapter.html#Fn2):\n\
    \n- Providing hash values for any kind of data quickly\n- Being deterministic\n\
    - Being pseudorandom\n- Being one-way functions\n- Being collision resistant\n\
    \n### Providing Hash Values for Any Data Quickly\n\nThis property is actually\
    \ a combination of two properties. First, the hash function is able to calculate\
    \ hash values for all kinds of data. Second, the hash function does its calculation\
    \ quickly. These properties are important, as you do not want the hash function\
    \ to yield useless things like error messages or to take a large amount of time\
    \ to return the results.\n\n### Deterministic\n\nDeterministic means that the\
    \ hash function yields identical hash values for identical input data. This means\
    \ that any observed discrepancies of the hash values of data must be solely caused\
    \ by the discrepancies of the input data and not by the internals of the hash\
    \ function.\n\n### Pseudorandom\n\nBeing pseudorandom means that the hash value\
    \ returned by a hash function changes unpredictably when the input data are changed.\
    \ Even if the input data were changed only a little bit, the resulting hash value\
    \ will differ unpredictably. To put it differently, the hash value of changed\
    \ data must always be a surprise. It should not be possible to predict the hash\
    \ value based on the input data.\n\n### One-Way Function\n\nA one-way function\
    \ does not provide any way to trace its input values by its outputs. Hence, being\
    \ a one-way function means that it cannot be used the other way around. To put\
    \ it differently, it is impossible to recover the original input data based on\
    \ the hash value. This means that hash values do not tell you anything about the\
    \ content of the input data in the same way as an isolated fingerprint does not\
    \ tell you anything about the person whose finger created it. One-way functions\
    \ are also said to be noninvertible.\n\n### Collision Resistant\n\nA hash function\
    \ is called collision resistant if it is very hard to find two or more distinct\
    \ pieces of data for which it yields the identical hash value. Or, to put it differently,\
    \ if the chance to receive an identical hash value for distinct pieces of data\
    \ is small, then the hash function is collision resistant. In this case, you can\
    \ consider the hash values created by the hash function as being unique and hence\
    \ being usable to identify data. If you obtained an identical hash value for different\
    \ pieces of data, you would face a hash collision. A hash collision is the digital\
    \ equivalent to having two people with identical fingerprints. Being collision\
    \ resistant is mandatory for hash values to be usable as digital fingerprints.\
    \ How collision resistant hash functions work internally is beyond the scope of\
    \ this book, but you can be assured that huge effort has been spent on reducing\
    \ their risk to produce hash collisions."
