  trans: '

    # 两种软件架构


    实现软件系统的方法有很多种。然而，在实现系统时，一个基本决策关乎其架构，即系统组件的组织方式及其相互关系。软件系统的两种主要架构方法是集中式和分布式。¹


    在集中式软件系统中，所有组件都围绕一个中心组件布置并与之连接。相比之下，分布式系统的组件则形成一个相互连接的组件网络，没有任何中央协调或控制元素。


    图 2-1 描绘了这两种截然相反的架构。图中的圆圈代表系统组件，也称为节点，线条代表它们之间的连接。此时，无需了解这些组件的具体功能以及节点之间交换何种信息的细节。关键在于，存在这两种不同的软件系统组织方式。在图
    2-1 的左侧，展示了一种分布式架构，其中组件相互连接，没有中心元素。重要的是要注意，没有任何一个组件与所有其他组件直接相连。然而，所有组件至少间接地相互连接。图
    2-1 的右侧展示了一种集中式架构，其中每个组件都连接到一个中心组件。组件之间不直接相互连接。它们只有一条与中心组件之间的直接连接。


    ![A436689_1_En_2_Fig1_HTML.jpg](img/A436689_1_En_2_Fig1_HTML.jpg)


    图 2-1. 分布式（左）与集中式（右）系统架构


    # 分布式系统的优势


    与单台计算机相比，分布式系统的主要优势在于²：


    - 更高的计算能力

    - 成本降低

    - 更高的可靠性

    - 自然扩展的能力


    ## 更高的计算能力


    分布式系统的计算能力是所有连接计算机计算能力的总和。因此，分布式系统通常比任何单个计算机都拥有更强的计算能力。即使将计算能力相对较低的计算机组成的分布式系统与独立的超级计算机相比，这一点也已被证实。


    ## 成本降低


    过去 20 年间，主流计算机、内存、磁盘空间和网络设备的价格大幅下跌。由于分布式系统由多台计算机组成，其初始成本高于单台计算机。然而，创建、维护和运营一台超级计算机的成本仍然远高于创建、维护和运营一个分布式系统。尤其当更换分布式系统中的单台计算机对整体系统影响甚微时，这一点尤为突出。


    ## 更高的可靠性


    分布式系统更高的可靠性基于这样一个事实：即使个别机器崩溃，整个计算机网络也能继续运行。分布式系统不存在单点故障。如果某个元素失效，其余元素可以接管其工作。因此，单台超级计算机的可靠性通常低于分布式系统。


    ## 自然扩展的能力


    分布式系统的计算能力是其组成部分计算能力的总和。通过将额外的计算机连接到系统中，可以提升整个系统的计算能力。因此，整个系统的计算能力可以以细粒度的方式渐进式增长。这符合许多组织对计算能力需求增长的模式。分布式系统的渐进式增长，与单台计算机计算能力的增长方式形成对比。单台计算机在更换为性能更强的计算机之前，其计算能力是恒定不变的。这导致计算能力呈非连续增长，而这种增长方式很少受到计算服务消费者的欢迎。


    # 分布式系统的劣势


    与单台计算机相比，分布式系统的劣势在于：


    - 协调开销

    - 通信开销

    - 对网络的依赖

    - 更高的程序复杂性

    - 安全问题


    ## 协调开销


    分布式系统没有中央实体来协调其成员。因此，协调工作必须由系统成员自行完成。在分布式系统中协调成员之间的工作极具挑战性，并且会消耗原本可用于核心计算任务的精力和计算能力，因此称之为协调开销。


    ## 通信开销


    协调需要通信。因此，构成分布式系统的计算机必须相互通信。这需要存在通信协议，并涉及消息的发送、接收和处理，而这些又会消耗无法用于核心计算任务的精力和计算能力，因此称之为通信开销。


    ## 对网络的依赖


    任何形式的通信都需要介质。介质负责在相互通信的实体之间传输信息。分布式系统中的计算机通过网络传递消息进行通信。网络本身也面临挑战和困难，这些反过来又会影响构成分布式系统的计算机之间的通信与协调。然而，没有网络，就不会有分布式系统，不会有通信，也不会有节点间的协调，因此对网络存在依赖。


    ## 更高的程序复杂性


    解决计算问题需要编写程序和软件。由于前面提到的劣势，分布式系统中的任何软件都必须解决额外的问题，如协调、通信和网络利用。这增加了软件的复杂性。


    ## 安全问题


    通过网络进行通信意味着发送和共享对核心计算任务至关重要的数据。然而，通过网络发送信息会带来安全隐患，因为不可信的实体可能滥用网络来访问和利用信息。因此，任何分布式系统都必须解决安全问题。分布式节点通信所依托的网络访问限制越少，分布式系统的安全隐患就越大。


    # 分布式对等系统


    对等网络是一种特殊的分布式系统。它们由独立的计算机（也称为节点）组成，这些节点将其计算资源（例如，处理能力、存储容量、数据或网络带宽）直接提供给网络中的所有其他成员，没有任何中央协调点。网络中的节点在系统中的权利和角色是平等的。此外，它们既是资源的提供者，也是资源的消费者。


    对等系统具有有趣的应用，例如文件共享、内容分发和隐私保护。这些应用大多利用了一个简单而强大的想法：将用户的计算机转变为构成整个分布式系统的节点。结果是，使用该软件的用户或客户越多，系统就变得越大、越强大。这个想法、其后果以及它所面临的挑战将在接下来的步骤中讨论。

    '
- fmt: '# Mixing Centralized and Distributed Systems


    Centralized and distributed systems are architectural antipodes. Technical antipodes
    have always inspired engineers to create hybrid systems that inherit the strength
    of their parents. Centralized and distributed systems are no exception to this.
    There are two archetypical ways of combining these antipodes, and they need to
    be understood since they will become important when learning about blockchain
    applications in the real world. They are centrality within a distributed system
    and the distributed system inside the center.


    The graphic on the left-hand side of Figure [2-2](#A436689_1_En_2_Chapter.html#Fig2)
    illustrates an architecture that establishes a central component within a distributed
    system. On first glance, the components seem to form a distributed system. However,
    all of the circles are connected with the larger circle located in the middle.
    Hence, such a system only appears to be distributed on a superficial view, but
    it is a centralized system in reality.


    ![A436689_1_En_2_Fig2_HTML.jpg](A436689_1_En_2_Fig2_HTML.jpg)


    Figure 2-2. Mixing distributed with centralized architecture


    The graph on the right-hand side of Figure [2-2](#A436689_1_En_2_Chapter.html#Fig2)
    illustrates the opposite approach. Such a system appears to be a centralized system
    on first glance, because all the circles in the periphery only have one direct
    connection to a large central component. However, the central component contains
    a distributed system inside. The components in the periphery may not even be aware
    of the distributed system that lives within the central component.


    What these two approaches have in common is that it is hard to determine their
    true nature. Are they distributed or centralized? It may not be necessary to give
    these architectures unique names. However, it is important to point out their
    dual nature. This is particularly important because it may not be easy to spot
    the centrality or the distributed nature within them. I will come back to this
    point later when I discuss the way the blockchain is commercialized.


    # Identifying Distributed Systems


    The emergence of hybrid architectures makes it hard to identify distributed systems
    clearly. Formulating a generally accepted definition of distributed systems is
    beyond the scope of this book. However, for the course of this book it is important
    to have an idea of what a distributed system is and how it differs from other
    software systems. If you are in doubt whether or not a system is distributed,
    look for a single component (e.g., a database, a name or user registry, a login
    or logoff component, or an emergency switch-off button) that could terminate the
    whole system. If you find such a component, the system under consideration is
    not distributed.


    **Note**


    If one single component exists, e.g., a single switch-off button that can bring
    down the whole system, then the system is not distributed.


    # The Purpose of the Blockchain


    When designing a software system, one can choose which architectural style will
    be used, similar to choosing an engine for a car. The architectural decision can
    be done independently from the functional aspects of the application layer. As
    a result, one can create distributed as well as centralized systems with identical
    functionality on the application layer. The architecture is only a means to an
    end when it comes to implementing a system. Hence, a payment system, as was proposed
    in Table [2-1](#A436689_1_En_2_Chapter.html#Tab1), can be implemented as a distributed
    or centralized system.


    Each of the two architectural concepts has its own advantages and disadvantages
    and their own specific way of doing things. Choosing a specific architecture has
    consequences on how you will achieve the functional and nonfunctional aspects
    of a system. In particular, both architectural concepts have very different approaches
    to ensure integrity. And this is the point where the blockchain enters the picture.
    The blockchain is a tool for achieving integrity in distributed software systems.
    Hence, it can be seen as a tool to achieve a nonfunctional aspect of the implementation
    layer.


    **Note**


    The purpose of the blockchain is to achieve and maintain integrity in distributed
    systems.


    # Outlook


    Achieving integrity in a distributed system is very technical and it may sound
    a bit boring. However, the question that makes this achievement exciting for many
    people depends on what the distributed system will do and what kind of centralized
    system it replaces. The next step explains how a peer-to-peer system has changed
    our world and why the blockchain as a tool for achieving integrity in distributed
    software systems has the potential to change the world too.


    # Summary


    - The architecture of a software system determines how its components are organized
    and related to one another.

    - Centralized and distributed software architectures can be seen as antipodes.

    - A distributed system consists of a number of independent computers that cooperate
    with one another by using a communication medium in order to achieve a specific
    objective without having any centralized element of control or coordination.

    - As a rule of thumb, one can state that as soon as a system has a single component
    that could bring down the whole system it is not distributed, regardless of how
    complex its architecture looks.

    - The blockchain is part of the implementation layer of a distributed software
    system.

    - The purpose of the blockchain is to ensure a specific nonfunctional aspect of
    a distributed software system that is: achieving and maintaining its integrity.


    **Footnotes**


    Tanenbaum, Andrew S., and Maarten Van Steen. Distributed systems: principles and
    paradigms. Upper Saddle River, NJ: Pearson Prentice Hall, 2007.


    Tanenbaum, Andrew S., and Maarten Van. Steen. Distributed systems: principles
    and paradigms. Upper Saddle River, NJ: Pearson Prentice Hall, 2007.


    # 3. Recognizing the Potential


    How peer-to-peer systems may change the world


    This step deepens our understanding of the purpose of the blockchain by considering
    a specific kind of distributed system: the peer-to-peer system. As a result, this
    step will help you understanding why there is so much excitement about the blockchain
    among technologists and business professionals alike. This step also points out
    the major area of application in which the blockchain is expected to provide the
    most value. Additionally, this step discusses some consequences of peer-to-peer
    systems in the real world.


    ## The Metaphor


    Can you remember the last time you bought a CD for yourself in a music store or
    in a department store? Most people have not bought actual CDs for a long time
    now, because the music industry went through a dramatic change. Nowadays, people
    download individual songs from music portals, share `mp3` files among friends,
    or use music streams on their mobile devices instead of buying CDs. This change
    started with the emergence of a piece of software that allowed people to share
    their music files with one another. But what was so special about that software?
    This is what one of its inventors had to say about this:


    > This system, what’s most interesting about it is, you’re interacting with peers,
    you’re exchanging information with a person down the street. —Shawn Fanning, cofounder
    of Napster


    What Fanning and his coworkers invented was a peer-to-peer system for sharing
    music. Back in the late 1990s, this software ushered in a new era for the established
    business model of the music industry. This step explains what the emergence of
    Napster, the decline of CD sales, and the dramatic changes of the music industry
    have to do with the blockchain.'
