- fmt: '# Specific Use Cases


    The blockchain is agnostic with respect to the data it stores. Hence, the range
    of data being stored in the blockchain and the range of its application areas
    are as wide and as diverse as human activities themselves. As a result, it is
    impossible to provide a complete overview of all blockchain applications. For
    that reason, this section presents a small selection of concrete blockchain application
    areas in which the blockchain is already used or may be used soon[¹](#A436689_1_En_24_Chapter.html#Fn1):


    - **Payments**: Managing ownership and transfer of digital fiat currencies.

    - **Cryptocurrencies**: Managing ownership and creation of digital instruments
    of payment that exist independently from any government, central bank, or other
    central institution.

    - **Micropayments**: Transfer of small amounts of money that would be too costly
    by using traditional means of transfer.

    - **Digital assets**: Managing creation, ownership, and transfer of digital items
    that have value in their own right or represent valuable goods in the real world.

    - **Digital identity**: Proving identity and authentication based on unique digital
    items.

    - **Notary services**: Digitizing, storing, and verifying documents or contracts
    and proof of ownership or transfer.

    - **Compliance and audit**: Auditing business activities of people or organizations
    in regulated industries in an audit track.

    - **Tax**: Calculating and collecting taxes based on transactions or on sole ownership,
    reducing tax avoidance,[²](#A436689_1_En_24_Chapter.html#Fn2) or double taxation.

    - **Voting**: Creating, distributing, and counting digital ballot papers.

    - **Record management**: Creation and storing of medical records.


    # Analyzing Blockchain Applications


    Analyzing a blockchain application may become necessary in a variety of occasions
    such as becoming a customer of a company that uses the blockchain, investing in
    a blockchain startup, or using a blockchain application in your own company. In
    all of these cases, it needs to be decided whether a certain blockchain application
    is useful or whether it creates a tangible value. Since the blockchain is a complex
    technical construct, it may be challenging to get a clear view of the capabilities
    of the software system under consideration and to make a conscious purchase, investment,
    or usage decision. Hence, it may help to ask some or all of the following questions:


    - What kind of blockchain is used?

    - Are the requirements for using the blockchain fulfilled?

    - What is the added value of using a distributed peer-to-peer system?

    - What is the application idea?

    - What is the business case?

    - How are peers compensated for contributing resources to the system?


    ## Are the Requirements for Using the Blockchain Fulfilled?


    The blockchain is a purely distributed peer-to-peer system that consists of an
    unknown number of peers of unknown reliability and trustworthiness. Hence, the
    first point to be considered when analyzing a concrete blockchain application
    is its architecture and whether the architecture fulfills the conditions for applying
    the `blockchain-technology-suite`. It is important to find satisfactory answers
    to the following questions:


    - What is the architecture of the system?

    - What are the system components and how are they connected with one another?

    - Is the system purely distributed or is there a central component whose failure
    can bring down the whole system?

    - How do new nodes join the system?

    - Can everyone join the system and start to contribute computational resources?

    - Is there any kind of on-boarding process, due diligence process, or upfront
    security checking of new nodes that may establish a central element of control?

    - Do all nodes have identical roles and rights in the system or do the nodes differ
    with respect to their rights to read or write data?


    Answering these questions will help you to gain a basic understanding of the system
    and determine whether the `blockchain-technology-suite` is really needed. You
    could find out that the presumably blockchain system under consideration is a
    centralized system instead.


    ## What Kind of Blockchain Is Used?


    Not all distributed systems are open to everyone and grant reading and writing
    access to all their nodes. There are versions of the blockchain that differ with
    respect to the allocation of reading and writing access among the nodes. These
    differences have an impact on the architecture and the distributed nature of the
    system as well as on the purpose of the blockchain within those systems. Hence,
    it is important to find satisfying answers to the following questions:


    - What kind of blockchain is used (public vs. private and permissioned vs. permissionless)?

    - What rights are restricted?

    - What groups of nodes have which rights?

    - Why has the specific type of blockchain been chosen?

    - Who decides which rights are given to what group of nodes?

    - Who makes and enforces the rules regarding granting or refusing reading or writing
    access to the system?

    - Who runs the on-boarding process?

    - Are there any privacy or scalability concerns in the specific solution that
    could justify the restriction of certain rights?


    ## What Is the Added Value of Using the Purely Peer-to-Peer System?


    Both purely distributed peer-to-peer systems and centralized systems have their
    own advantages and disadvantages. Centralized systems are not inherently bad,
    they just pursue a different architectural concept that serves many application
    cases very well and still continues to do so. With some characteristics, centralized
    systems may be more desirable than distributed peer-to-peer systems. This is particularly
    true as integrity in purely distributed peer-to-peer systems is notoriously hard
    to maintain and costs additional effort. Hence, one needs good reasons for choosing
    a distributed peer-to-peer system over a centralized one. When analyzing a concrete
    blockchain application, it is important to find satisfying answers to the following
    questions:


    - Why was the system implemented as a purely distributed peer-to-peer system in
    the first place?

    - What are the alternatives?

    - What are the advantages of utilizing a purely distributed peer-to-peer architecture
    over the alternatives and what are the disadvantages?

    - What is the added value of using a distributed peer-to-peer architecture?

    - Do the advantages of the peer-to-peer architecture outweigh the disadvantages?


    Asking and insisting on the answers to these questions is important to distinguish
    those who consciously choose the distributed peer-to-peer architecture from those
    who use the blockchain just for the sake of using it.'
