- fmt: "## Why It Works\n\nThe different kinds of communication ensure that new computers\
    \ can join the system and hence contribute to its growth. Additionally, the system\
    \ is kept together based on communication that focuses on establishing new and\
    \ maintaining existing connections. Most important, the system utilizes a gossip\
    \ type of communication that ensures that eventually all members of the peer-to-peer\
    \ system will receive all transaction data and blocks to be added to the `blockchain-data-structure`.\n\
    \n## Outlook\n\nThis step focused on how individual computers become nodes of\
    \ a distributed peer-to-peer system and how the computers that make up the system\
    \ communicate with one another. In particular, this step focused on the aspects\
    \ of message delivery in an unreliable network. However, this discussion did not\
    \ consider what the individual nodes do with the information once they received\
    \ it, but processing information is as important as receiving information. Hence,\
    \ the next step discusses how transaction data are processed within the individual\
    \ nodes.\n\n## Summary\n\n*   Computers in a distributed peer-to-peer system communicate\
    \ with one another via a digital network.\n*   Due to the omnipresence of the\
    \ Internet, it is compelling to create a distributed peer-to-peer system by connecting\
    \ the individual nodes via the Internet.\n*   A peer-to-peer system that uses\
    \ the Internet as a medium of communication is characterized by the following\
    \ facts:\n    *   The computers are connected with one another via the Internet.\n\
    \    *   Each computer is identified by a unique address.\n    *   Each computer\
    \ can disconnect and reconnect to the system at any given time.\n    *   Each\
    \ computer independently maintains a list of peers with which it communicates.\n\
    \    *   Communication between nodes is based on messages.\n    *   Messages are\
    \ sent from one node to another over the Internet by using their unique addresses.\n\
    *   Due to the adversaries of networks, the communication among the nodes is characterized\
    \ by the following facts:\n    *   Messages are not guaranteed to arrive at the\
    \ addressees, but they may get lost instead.\n    *   Messages may arrive more\
    \ than once.\n    *   Messages may arrive in a different order than they were\
    \ sent.\n*   The blockchain counteracts the adversaries of communicating over\
    \ an unreliable network in the following ways:\n    *   Messages are sent in a\
    \ gossip style. Every node that receives a message will forward it to the peers\
    \ it communicates with, which in turn will handle the message in the same way.\n\
    \    *   Duplicates of transactions or blocks are identified and filtered out\
    \ based on their cryptographic hash values.\n    *   Each node can order the received\
    \ information because transaction data and block headers contain time stamps.\n\
    *   The communication among the computers that make up the peer-to-peer system\
    \ serves the following three purposes:\n    *   Keeping existing connections alive\n\
    \    *   Establishing new connections\n    *   Distributing new information\n\
    *   Forwarding ownership-related information happens on three occasions:\n   \
    \ *   In an ongoing fashion by forwarding new transaction data and new blocks\
    \ to all nodes that are connected to the system\n    *   As an update for nodes\
    \ that reconnect to the system after being disconnected for a while\n    *   As\
    \ part of the on-boarding procedure that transfers a copy of the whole up-to-date\
    \ version of the `blockchain-data-structure` to the new nodes to ensure that they\
    \ become full-fledged nodes after joining the system\n\nFootnotes [1](#A436689_1_En_17_Chapter.html#Fn1_source)\n\
    \nTanenbaum, Andrew S., and Maarten Van Steen. Distributed systems: principles\
    \ and paradigms (2nd ed.). Upper Saddle River, NJ: Pearson Prentice Hall, 2007;\
    \ Tanenbaum, Andrew S., and David J. Wetherall. Computer networks (5th ed.). Upper\
    \ Saddle River, NJ: Prentice Hall, 2010.\n\n# Verifying and Adding Transactions\n\
    \nRuling a group of computers with carrot and stick\n\nIn Step 17 individual computers\
    \ were turned into nodes of a purely distributed peer-to-peer system that communicate\
    \ with one another about transaction data and new blocks to be added to the `blockchain-data-structure`.\
    \ This step focuses on what happens once a node receives transaction data and\
    \ how to ensure that only valid transaction data and blocks are added to the `blockchain-data-structure`.\n\
    \n## The Metaphor\n\nLet’s consider a company that offers a simple service: grading\
    \ multiple-choice tests for schools and universities. Schools and universities\
    \ can send the multiple-choice answer forms of their students together with the\
    \ correct solutions to the company, which in turn will grade all of the answer\
    \ sheets. Unfortunately, the employees of the company show little motivation to\
    \ do their job well. As a result, the company turns all of its employees into\
    \ contractors who only receive a performance-related compensation that is governed\
    \ by the following three rules:\n\n1.  All answer sheets to be marked, the solutions\
    \ as well as all marked answer sheets are available to all contractors at any\
    \ time through the company’s software system.\n2.  Only the first contractor who\
    \ marks an answer sheet correctly receives one dollar as a reward.\n3.  If a contractor\
    \ finds out that another contractor marked an answer sheet incorrectly, the contractor\
    \ who made the mistake has to repay the compensation and the one who found and\
    \ corrected the mistake will receive the compensation instead.\n\n### Consequences\n\
    \nThere are several consequences for the rules of the above scenario:\n\n*   Due\
    \ to the fact that the contractors only receive performance-related compensation,\
    \ they have a strong economic incentive to follow the rules.\n*   Due to rule\
    \ 1, all contractors have the same chance to contribute work and earn money.\n\
    *   Due to rule 1, all contractors have the necessary information to control and\
    \ correct the work of their coworkers.\n*   Due to rule 2, each contractor has\
    \ an incentive to work fast. However, the quality of work may suffer due to speed.\n\
    *   Due to rule 3, each contractor has an incentive to work conscientiously.\n\
    *   Due to rule 3, each contractor has an incentive to control and correct the\
    \ work of its coworkers.\n\nDue to these rules, the efficiency of the company\
    \ increased significantly but after some months, the company received massive\
    \ complaints from its customers. The quality of work had dropped dramatically.\
    \ It seems that all multiple-choice tests were marked completely randomly. After\
    \ doing some research, the company found that the contractors had made a pact.\
    \ They agreed among themselves not to control any coworker’s results and instead\
    \ to do the marking as quickly as possible. Since assigning marks randomly is\
    \ the fastest way to do the job, all contractors eventually ended up using that\
    \ marking strategy.\n\nThe lesson learned from this metaphor is that the combination\
    \ of reward, punishment, peer pressure, and competition can be used to manage\
    \ a group of independently acting individuals as long as they do not collectively\
    \ counteract.\n\nThis step explains the `blockchain-algorithm`, which it is nothing\
    \ more than a clever implementation of the carrot-and-stick approach combined\
    \ with competition and peer pressure that works in a similar fashion as the company\
    \ in this example. However, the challenge is to get all the details right.\n\n\
    ## The Goal\n\nThe goal is to allow everyone to add new transaction data to the\
    \ history of transaction data while preserving its integrity.\n\n## The Challenge\n\
    \nThe blockchain is completely open. Everyone, even the most dishonest, can connect\
    \ computers to the system and as a result can create transactions and send them\
    \ to all other nodes that make up the system. As a result, it cannot be guaranteed\
    \ that the transactions sent through the network are correct. Hence, the challenge\
    \ is to keep the system open to everyone while ensuring that only valid transactions\
    \ are added."
