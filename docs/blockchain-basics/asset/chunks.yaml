  trans: '

    # 创建签名


    假设我想以授权方式向全世界发送一条“Hello World！”问候语。因此，我创建了一条包含该问候语及其对应数字签名的消息。图 13-1 描述了数字签名数据的完整过程。该过程从图
    13-1 左上角包含问候语的白色方框开始。我创建该问候语的哈希值，即 `7F83B165`，并用我的私钥对其进行加密。该问候语哈希值的密文（包含白色字母的黑色方框）就是我对该问候语的数字签名。它在两个方面具有唯一性：首先，它可以唯一地追溯到我的身份，因为它是由我独特的私钥创建的。其次，它对于问候语的文本也是唯一的，因为它基于问候语的数字指纹。问候语和数字签名被共同放入一个文件（灰色方框）中，这就是我向全世界发送的数字签名消息。


    ![A436689_1_En_13_Fig1_HTML.jpg](img/A436689_1_En_13_Fig1_HTML.jpg)


    图 13-1. 创建数字签名的示意图


    # 使用签名验证数据


    这条消息，即我的问候语连同数字签名，被发送给了全世界。任何人都可以使用我的公钥来验证我是否授权了这条消息。图 13-2 说明了使用数字签名验证消息的过程。该过程从问候语开始。首先，消息接收者自行计算问候语的哈希值，得到
    `7F83B165`。然后，消息接收者用我的公钥解密附带的密文（数字签名）。解密后得到的值为 `7F83B165`，这正是我希望发送给全世界的那个版本问候语的哈希值。比较两个哈希值即可完成验证。由于两个哈希值完全相同，接收者可以正确得出结论：第一，这条消息是由我签名的，因为他能够用我的公钥解密签名；第二，消息中的问候语文本确实是我想要发送的，因为解密的密文与消息中问候语的哈希值一致。


    ![A436689_1_En_13_Fig2_HTML.jpg](img/A436689_1_En_13_Fig2_HTML.jpg)


    图 13-2. 使用数字签名验证消息


    # 使用签名识别欺诈


    图 13-3 说明了数字签名如何揭示一条被篡改的问候语。


    ![A436689_1_En_13_Fig3_HTML.jpg](img/A436689_1_En_13_Fig3_HTML.jpg)


    图 13-3. 使用数字签名识别欺诈


    图 13-3 显示了到达我朋友邮箱的消息。注意问候语文本的变化。某个黑客将感叹号替换成了问号，从而改变了问候语的整体语气。这不是我向世界问候的方式。幸运的是，数字签名会向所有人指出该消息是在违背我意愿的情况下被篡改的。


    首先，消息接收者自行计算问候语的哈希值，得到 `8A0B7C66`。然后，消息接收者用我的公钥解密数字签名。解密后得到 `7F83B165`，这是我希望发送给全世界的那个版本问候语的哈希值。比较两个哈希值，会发现它们并不相同。这清楚地表明，消息中的问候语并非我本想发送给世界的问候语。因此，所有人都能得出结论：我并未授权此消息，所以没有人会让我对其内容负责。


    # 工作原理


    区块链中的数字签名满足以下要求：


    -   它们表明移交所有权的账户所有者同意特定的交易数据。

    -   它们对于整个交易数据内容是唯一的，以防止在没有其作者同意的情况下被用于授权其他交易。

    -   只有移交所有权的账户所有者才能创建此类签名。

    -   任何人都可以轻松验证它们。


    区块链中的数字签名有两种用例：


    -   签署交易

    -   验证交易


    ## 签署交易


    为了创建交易的数字签名，移交所有权的账户所有者执行以下步骤：


    1.  描述交易及其所有必要信息，例如涉及的账户号码、转账金额等，但不包括签名本身，因为此时签名尚不可用。

    2.  创建交易数据的加密哈希值。

    3.  使用移交所有权的账户的私钥加密交易的哈希值。

    4.  将步骤 3 中创建的密文作为该交易的数字签名添加到交易中。


    ## 验证交易


    为了验证一笔交易，必须执行以下步骤：


    1.  计算待验证交易数据（除签名本身外）的哈希值。

    2.  使用移交所有权的账户号码解密所考虑交易的数字签名。

    3.  比较步骤 1 中的哈希值与步骤 2 中得到的值。如果两者相同，则该交易已得到与移交所有权的账户相对应的私钥所有者的授权；否则未授权。


    # 为何有效


    交易数据的数字签名是以下两者的结合：


    -   交易数据的加密哈希值

    -   可以追溯到账户对应私钥的密文


    由于加密哈希值可以被视为数字指纹，因此它们对每笔交易都是唯一的。公钥-私钥加密的一个构成特性是，用一个密钥创建的密文只能用对应的密钥解密。两个密钥的关联是唯一的。因此，用特定公钥成功解密密文，可以作为该密文是由对应私钥创建的证明。这两个概念结合起来，用于创建可以在一个过程中唯一追溯到特定交易数据和特定私钥的密文。这一特性使得数字签名适合作为证据，证明用于创建数字签名的私钥所有者确实同意该交易的内容。


    # 展望


    这一步骤完成了区块链如何在单个交易数据层面保护所有权的流程。因此，交易及其用于转移和证明所有权的目的是安全可靠的。然而，确保交易数据不仅在单个层面得到保护这一点至关重要。仍然需要以安全的方式存储整个交易数据的历史记录。后续步骤将更详细地解释如何实现这一点。

    '
- fmt: "# Summary\n\n- Handwritten signatures on documents state the agreement of\
    \ their authors with the content of the signed documents and authorize their implementation.\n\
    - The evidential power of handwritten signatures is based on the uniqueness of\
    \ the handwriting.\n- Digital signatures are the digital equivalent to handwritten\
    \ signatures.\n- Digital signatures serve two purposes:\n    - Identify its author\
    \ uniquely\n    - State agreement of its author with the content of a document\
    \ and authorize its execution\n- In the blockchain, digital signatures of transactions\
    \ are cryptographic hash values of transaction data encrypted with the private\
    \ key that corresponds to the account that hands off ownership.\n- Digital signatures\
    \ in the blockchain can be traced back uniquely to one specific private key and\
    \ to one specific transaction in one process.\n\n# 14. Storing Transaction Data\n\
    \nBuilding and maintaining a history of transaction data\n\nBased on the previous\
    \ five steps, you should now be able to trace ownership based on the whole history\
    \ of transaction data and to describe individual transfers of ownership in a secure\
    \ way by authorizing transactions with digital signatures and identifying user\
    \ accounts uniquely. However, I have not spent any time discussing how to store\
    \ all the transaction data that make up the transaction history in a secure fashion.\
    \ This is the point where the blockchain-data-structure enters the discussion.\
    \ This step introduces the blockchain-data-structure and explains how it is constructed.\n\
    \n## The Metaphor\n\nDo you remember the last time you visited a library and used\
    \ one of the traditional card catalogs? Library catalogs are registers of all\
    \ of the books owned by a library. Some traditional libraries still use card catalogs\
    \ for managing their inventory. Each card in one of these catalogs represents\
    \ one book, and the card displays the major information about that book, such\
    \ as the name of the author, the title of the book, the date of publication, and\
    \ the location of the book within the library such as floor, room, shelf, and\
    \ rack number. In order to identify books, the catalog cards often contain unique\
    \ reference numbers that are also displayed on the books’ spines. Most libraries\
    \ maintain more than one card catalog, which differ with respect to the criterion\
    \ used to order the cards. For example, in an author catalog, the cards are sorted\
    \ alphabetically according to the names of authors, while in a title catalog the\
    \ cards are sorted alphabetically according to the titles. One could also come\
    \ up with an ordering catalog whose cards are sorted according to the order in\
    \ which the books were added to the library. This step explains how the blockchain\
    \ stores transaction data in a way that is similar to a library with an ordering\
    \ catalog.\n\n## The Goal\n\nThe goal of the blockchain is to maintain the whole\
    \ history of transaction data in an ordered fashion.\n\n## The Challenge\n\nThe\
    \ challenge is to store all transaction data that have ever happened in a way\
    \ that preserves the order in which the transactions happened and in a way that\
    \ quickly and easily detects any changes made to the data. Detecting changes quickly\
    \ is important since it is the basis to prevent manipulation or forgery of the\
    \ transaction history.\n\n## The Idea\n\nThe idea is to create a library of transaction\
    \ data and to maintain an ordering catalog, which preserves the order in which\
    \ transactions were added to the library. In order to detect any changes made\
    \ either to the ordering catalog or to the individual transaction data, the data\
    \ must be stored in a change-sensitive manner by using hash references.\n\n##\
    \ Transforming a Book into a Blockchain-Data-Structure\n\nThis section explains\
    \ how to turn a book into a small library with an ordering catalog, which turns\
    \ out to be a simplified version of the blockchain-data-structure.\n\n### Starting\
    \ Point: A Book\n\nFor many centuries, written information was preserved on unwieldy\
    \ spools of parchment, which were called scrolls. Nowadays, we are used to having\
    \ written information preserved in codices: hardback-bound bundles of numbered\
    \ pages, which we call books. Because books are so commonplace, we may take their\
    \ innovation for granted. Some of their important properties include:\n\n- Storing\
    \ content: Books store content on their pages.\n- Ordering: The sentences on the\
    \ pages as well as the pages within the book are kept in order.\n- Connecting\
    \ pages: Pages are physically connected via the book spine and logically connected\
    \ via their content and the page numbers.\n\nAs a result of these properties,\
    \ we can browse through books forward and backward by moving pages or we can jump\
    \ directly to specific pages by utilizing the page numbers. Let’s see what we\
    \ could achieve if we changed some of these properties.\n\n### Transformation\
    \ 1: Making Page Dependency Explicit\n\nFigure 14-1 exhibits a schematic illustration\
    \ of two pages from a very simple book. Each page contains a top margin that presents\
    \ the page number and a content area that carries only one word.\n\n![A436689_1_En_14_Fig1_HTML.jpg](A436689_1_En_14_Fig1_HTML.jpg)\n\
    \nFigure 14-1. A schematic illustration of book pages\n\nThe page numbers serve\
    \ an important purpose: You can find out whether someone removed a page from the\
    \ book by verifying that the page numbers continue without leaving out a number.\
    \ Imagine you are currently reading page number 42 of our simplified book. What\
    \ page number should the preceding page have? This is very simple: The preceding\
    \ page should have the number 41, which equals 42 minus 1. In order to verify\
    \ that indeed no one has removed the preceding page, we compare the number being\
    \ displayed on the preceding page with the expected page number, which is the\
    \ number of the current page minus 1. If both numbers are equal, we can conclude\
    \ that the preceding page has not been removed.\n\nWhy do we know that the number\
    \ of the preceding page should equal the current page's number minus 1? The answer\
    \ is that we assume that all books follow the convention of labeling the pages\
    \ consecutively with natural numbers. But what if that assumption is not true\
    \ because the author or the publisher of the book decided to use a different page\
    \ numbering schema (e.g., by only using even numbers or multiples of three)? In\
    \ this case, our approach of verifying that the preceding page has not been removed\
    \ fails. In order to make it easy to verify that no page has been removed from\
    \ the book, we could point out the connection of each page to its predecessor\
    \ explicitly. Figure 14-2 shows how this is done in our simple book. Each page\
    \ not only exhibits its own number but also exhibits the number of its preceding\
    \ page. This page numbering schema makes the dependency between any page and its\
    \ preceding page explicit. The explicit referencing of the preceding page makes\
    \ verifying that no page has been removed very easy since it does not rely on\
    \ implicit assumptions anymore.\n\n![A436689_1_En_14_Fig2_HTML.jpg](A436689_1_En_14_Fig2_HTML.jpg)\n\
    \nFigure 14-2. Book pages with explicit reference to their preceding pages"
