  trans: "\n# 区块链中的非对称加密\n\n区块链使用非对称加密来实现两个目标：\n\n-   识别账户\n-   授权交易\n\n## 识别账户\n\n\
    区块链需要识别用户或用户账户，以维护所有者与财产之间的映射关系。区块链采用非对称加密的公钥到私钥方法来识别用户账户，并在账户之间转移所有权。区块链中的账户号码实际上是公钥。因此，交易数据使用公钥来识别参与所有权转移的账户。在这方面，区块链将用户账户视为邮箱：它们拥有一个公开的地址，任何人都可以向其发送消息。\n\
    \n## 授权交易\n\n交易数据必须始终包含一段数据，用于证明放弃所有权的账户所有者确实同意所描述的所有权转移。这种同意所隐含的信息流始于放弃所有权的账户所有者，并应传递给所有检查交易数据的人。这种信息流类似于非对称加密的私钥到公钥用例所隐含的信息流。放弃所有权的账户所有者使用其私钥创建一段密文。所有其他人可以通过使用公钥（恰好是放弃所有权的账户号码）来验证这一同意证明。这个被称为数字签名的过程的细节将在下一步中详细解释。\n\
    \n## 展望\n\n这一步解释了非对称加密的概念，以及它如何在现实生活中作为公私钥加密使用。此外，这一步还解释了区块链使用公钥来识别用户账户。此外，合法所有者通过创建可追溯其私钥的数字签名来授权交易。下一步将更详细地解释这一概念，因为这种非对称加密的用法不如通过公钥识别账户那么直观。\n\
    \n## 总结\n\n-   加密的主要目标是保护数据不被未经授权的人访问。\n-   加密的主要活动包括：\n    -   加密：通过使用加密密钥将数据转换为密文来保护数据。\n\
    \    -   解密：通过使用匹配的加密密钥将密文恢复为可用的数据。\n-   非对称加密总是使用两个互补的密钥：使用其中一个密钥创建的密文只能用另一个密钥解密，反之亦然。\n\
    -   在现实生活中使用非对称加密时，这些密钥通常被称为公钥和私钥，以突出它们的作用。公钥与所有人共享，而私钥则保密。因此，非对称加密也被称为公私钥加密。\n\
    -   公钥和私钥有两个经典用例：\n    -   每个人都使用公钥加密数据，这些数据只能由相应私钥的所有者解密。这相当于一个公共邮箱的数字版本，每个人都可以往里面放信件，但只有所有者才能打开。\n\
    \    -   私钥的所有者使用它加密数据，任何拥有相应公钥的人都可以解密这些数据。这相当于一个证明作者身份的公共公告板的数字版本。\n-   区块链使用非对称加密来实现两个目标：\n\
    \    -   识别账户：用户账户是公钥。\n    -   授权交易：放弃所有权的账户所有者使用相应的私钥创建一段密文。这段密文可以通过使用对应的公钥（恰好是放弃所有权的账户号码）进行验证。\n\
    \n脚注 1\n\nNakamoto, Satoshi. Bitcoin: A peer-to-peer electronic cash system. 2008.\
    \ [`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf)。\n\n2\n\
    \n参见 Van Tilborg, Henk, 和 Sushil Jajodia 编辑的《密码学与安全百科全书》。纽约：Springer Science &\
    \ Business Media，2014 年。\n\n# 13. 授权交易\n\n利用数字签名作为手写签名的数字等价物\n\n第 12 步对非对称加密进行了简要介绍。它还指出，区块链使用公钥作为账户号码，并利用非对称加密的公钥到私钥方法在账户之间转移所有权。然而，这只是故事的一半。区块链需要确保只有合法所有者才能将其财产转移到其他账户。这正是授权概念出现的切入点。因此，这一步解释了如何在区块链中使用非对称加密来授权交易。特别是，这一步致力于解释数字签名的概念，它利用了非对称加密的私钥到公钥方法。\n\
    \n## 比喻\n\n手写签名有一个重要目的：表示同意文件的内容并同意其执行。我们接受手写签名作为同意的证据，是因为每个人的笔迹都是独一无二的。每个人都有自己书写姓名的独特方式。因此，当我们识别出以特定方式书写的姓名时，我们得出结论，以这种特定方式书写姓名的人确实产生了那个手写签名，因此，我们可以得出结论，此人已同意文件的内容及其执行。这一步解释了在电子账本中声明同意交易的概念，这与手写签名类似。这个概念对于区块链中单个交易的安全性至关重要。\n\
    \n## 目标\n\n确保只有账户所有者才能将其关联的财产转移到其他账户，这一点很重要。任何非合法所有者访问账户及其关联财产的尝试都应被识别为未经授权并被拒绝。\n\
    \n## 挑战\n\n所讨论的点对点系统对所有人开放。因此，任何人都可以创建交易并将其提交到系统中。交易数据是描述和明确所有权的基础。只有账户的合法所有者才能将其账户关联的财产或所有权转移到另一个账户。区块链面临的挑战是，在将所有权转移限制为仅合法所有者的同时，保持其开放性。\n\
    \n## 思路\n\n确保只有合法所有者才能转移所有权的主要思路是利用一种数字安全措施，该措施相当于手写签名并服务于相同的目的：识别账户，声明其所有者同意特定交易数据的内容，并通过允许数据添加到交易历史中批准其执行。\n\
    \n## 数字签名简介\n\n数字签名相当于手写签名。它们利用加密哈希和非对称加密的私钥到公钥信息流。以下简短示例说明了数字签名的三个主要元素：\n\n-\
    \   创建签名\n-   使用签名验证数据\n-   使用签名识别欺诈\n"
- fmt: '# Creating a Signature


    Let’s say I want to send a Hello World! greeting to the world in an authorized
    way. Hence, I create a message that contains the greeting and a corresponding
    digital signature. Figure [13-1](#A436689_1_En_13_Chapter.html#Fig1) depicts the
    whole process of signing data digitally. The process starts with the white box
    in the top left area of Figure [13-1](#A436689_1_En_13_Chapter.html#Fig1) that
    contains the greeting. I create the hash value of the greeting, which is `7F83B165`,
    and encrypt it with my private key. The cypher text of the greeting’s hash value
    (the black box containing white letters) is my digital signature of the greeting.
    It is unique with respect to two aspects: First, it can be traced back to me uniquely
    because I created it with my unique private key. Second, it is unique regarding
    the text of the greeting because it is based on the digital fingerprint of the
    greeting. Both the greeting and the digital signature are put together in a file
    (the gray box), which is my digitally signed message to the world.


    ![A436689_1_En_13_Fig1_HTML.jpg](A436689_1_En_13_Fig1_HTML.jpg)


    Figure 13-1. Schematic illustration of creating a digital signature


    # Verifying Data by Using the Signature


    The message, that is, my greeting together with the digital signature, is sent
    to the whole world. Everyone can verify that I authorized this message by utilizing
    my public key. Figure [13-2](#A436689_1_En_13_Chapter.html#Fig2) illustrates the
    process of verifying the message by using the digital signature. The process starts
    with the greeting. At first the recipient of the message calculates the hash value
    of the greeting by himself, which yields the value `7F83B165`. Then the recipient
    of my message decrypts the attached cypher text (the digital signature) with my
    public key. Doing so yields the value `7F83B165`, which is the hash value of that
    version of the greeting I wanted to send to the world. Comparing both hash values
    completes the verification. Since both hash values are identical, the recipient
    correctly concludes, first, that the message was signed by me, because he was
    able to decrypt the signature with my public key, and second, that the greeting
    text found in the message is indeed the one I wanted to send because the decrypted
    cypher text is identical with the hash value of the greeting in the message.


    ![A436689_1_En_13_Fig2_HTML.jpg](A436689_1_En_13_Fig2_HTML.jpg)


    Figure 13-2. Using a digital signature to verify a message


    # Identifying Fraud by Using the Signature


    Figure [13-3](#A436689_1_En_13_Chapter.html#Fig3) illustrates how the digital
    signature points out a forged greeting.


    ![A436689_1_En_13_Fig3_HTML.jpg](A436689_1_En_13_Fig3_HTML.jpg)


    Figure 13-3. Using a digital signature to identify fraud


    Figure [13-3](#A436689_1_En_13_Chapter.html#Fig3) shows the message that arrived
    in my friend’s mailbox. Note the change of the greeting text. Some hacker replaced
    the exclamation mark with a question mark and hence changed the whole tone of
    the greeting. This is not the way I wanted to greet the world. Fortunately, the
    digital signature will point out to everyone that the message has been altered
    against my will.


    At first the recipient of the message will create the hash value of the greeting
    by himself, which yields the value `8A0B7C66`. Then the recipient of my message
    decrypts the digital signature with my public key. Doing so yields `7F83B165`,
    which is the hash value of the version of the greeting I wanted to send to the
    world. Comparing both hash values reveals that they are not identical. This clearly
    points out that the greeting in the message is not the greeting I wanted to send
    to the world. Hence, everyone concludes that I did not authorize this message,
    and, therefore, no one will make me responsible for its content.


    # How It Works


    Digital signatures in the blockchain fulfill the following requirements:


    - They state agreement of the owner of the account who hands off ownership with
    specific transaction data.

    - They are unique for the whole content of transaction data in order to prevent
    it from being used to authorize other transactions without the agreement of its
    author.

    - Only the owner of the account who hands off ownership can create such a signature.

    - They are easy to verify by everyone.


    There are two use cases of digital signatures in the blockchain:


    - Signing a transaction

    - Verifying a transaction


    ## Signing a Transaction


    In order to create a digital signature for a transaction, the owner of the account
    who hands off ownership performs the following steps:


    1. Describes the transaction with all necessary information such as the involved
    account numbers, amount being transferred, and so on except the signature itself
    as it is not yet available.

    2. Create the cryptographic hash value of the transaction data.

    3. Encrypt the hash value of the transaction with the private key of the account
    that hands off ownership.

    4. Add the cypher text created in point 3 to the transaction as its digital signature.


    ## Verifying a Transaction


    In order to verify a transaction, the following steps must be performed:


    1. Create the hash value of the transaction data to be verified except the signature
    itself.

    2. Decrypt the digital signature of the transaction under consideration with the
    account number that hands off ownership.

    3. Compare the hash value of step 1 with the value gained in step 2. If both are
    identical, the transaction is authorized by the owner of the private key that
    corresponds to the account that hands off ownership, otherwise it is not.


    # Why It Works


    Digital signatures of transaction data are a combination of the following:


    - Cryptographic hash values of transaction data

    - Cypher text that can be traced back to the corresponding private key of an account


    Due to the fact that cryptographic hash values can be considered digital fingerprints,
    they are unique for each transaction. A constituting property of public-private-key
    cryptography is that cypher text created with one key can only be decrypted with
    the corresponding key. The association of both keys is unique. Hence, a successful
    decryption of cypher text with a specific public key serves as proof that it was
    created with the corresponding private key. Both concepts combined are used to
    create cypher text that can be traced back uniquely to one specific transaction
    data and to one specific private key in one process. This property make digital
    signatures suitable to serve as proof that the owner of the private key that was
    used to create the digital signature indeed agrees with the content of the transaction.


    # Outlook


    This step completes the process of how the blockchain protects ownership on the
    level of individual transaction data. As a result, transactions and their purpose
    to transfer and prove ownership are safe and secure. However, it is important
    to ensure that transaction data are not only secured on the individual level.
    There is still a need to store the whole history of transaction data in a secure
    way. The next steps will explain in more detail how to achieve this.'
