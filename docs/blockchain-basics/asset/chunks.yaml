- fmt: "### Sequential Hashing\n\nThe goal of sequential hashing is the incremental\
    \ update of a hash value as new data arrive. This is achieved by using combined\
    \ and repeated hashing at the same time. The existing hash value is combined with\
    \ new data and is then handed over to the hash function in order to get the updated\
    \ hash value. Sequential hashing is in particular useful if you want to maintain\
    \ a single hash value over time and update it as soon as new data arrive. An advantage\
    \ of this type of hashing is that at any given point in time you have a hash value\
    \ whose evolution can be traced back to the arrival of new data.\n\nFigure [10-6](#A436689_1_En_10_Chapter.html#Fig6)\
    \ illustrates the concept of sequential hashing by starting with hashing the word\
    \ `Hello` individually, which yields the shortened hash value `185F8DB3`. Once\
    \ new data represented by the word `World!` arrive, it is combined with the existing\
    \ hash value and provided as input to a hash function. The hash value `5795A986`\
    \ is the shortened hash value of the input text `World! 185F8DB3`.\n\n![A436689_1_En_10_Fig6_HTML.jpg](A436689_1_En_10_Fig6_HTML.jpg)\n\
    \nFigure 10-6. Calculating hash values sequentially\n\n### Hierarchical Hashing\n\
    \nFigure [10-7](#A436689_1_En_10_Chapter.html#Fig7) illustrates the concept of\
    \ hierarchical hashing.\n\n![A436689_1_En_10_Fig7_HTML.jpg](A436689_1_En_10_Fig7_HTML.jpg)\n\
    \nFigure 10-7. Calculating hash values hierarchically\n\nThe application of combined\
    \ hashing to a pair of hash values forms a small hierarchy of hash values with\
    \ a single value on its top. Similar to combined hashing, the idea of hierarchical\
    \ hashing is the creation of one single hash value for a collection of data. Hierarchical\
    \ hashing is more efficient because it combines hash values that are always of\
    \ fixed size instead of the original data that could be of any size. Additionally,\
    \ hierarchical hashing only combines two hash values in every step, while combined\
    \ hashing will combine as many data as you provide in one attempt.\n\n### Outlook\n\
    \nThis step was devoted to the concept of hash functions. Step [11](#A436689_1_En_11_Chapter.html)\
    \ illustrates how hash values are used in real life and highlights how the blockchain\
    \ uses them.\n\n### Summary\n\n*   Hash functions transform any kind of data into\
    \ a number of fixed length, regardless of the size of the input data.\n*   There\
    \ are many different hash functions that differ among others with respect to the\
    \ length of the hash value they produce.\n*   Cryptographic hash functions are\
    \ an important group of hash functions that create digital fingerprints for any\
    \ kind of data.\n*   Cryptographic hash functions exhibit the following properties:\n\
    \    *   Provide hash values for any kind of data quickly\n    *   Deterministic\n\
    \    *   Pseudorandom\n    *   One-way usage\n    *   Collision resistant\n* \
    \  Application of hash functions to data can be accomplished by using the following\
    \ patterns:\n    *   Repeated hashing\n    *   Independent hashing\n    *   Combined\
    \ hashing\n    *   Sequential hashing\n    *   Hierarchical hashing\n\n**Footnotes**\n\
    \n[1](#A436689_1_En_10_Chapter.html#Fn1_source) Weisstein, Eric W. Hash function.\
    \ From MathWorld: [`http://mathworld.wolfram.com/HashFunction.html`](http://mathworld.wolfram.com/HashFunction.html).\n\
    \n[2](#A436689_1_En_10_Chapter.html#Fn2_source) Rogaway, Phillip, and Thomas Shrimpton.\
    \ Cryptographic hash-function basics: definitions, implications, and separations\
    \ for preimage resistance, second-preimage resistance, and collision resistance.\
    \ In B. Roy and W. Meier (eds.), Fast software encryption. FSE 2004. Lecture Notes\
    \ in Computer Science, vol. 3017. International Workshop on Fast Software Encryption.\
    \ Berlin Heidelberg: Springer, 2004.\n\n# 11. Hashing in the Real World\n\nA tale\
    \ of comparing data and creating computational puzzles\n\nStep [10](#A436689_1_En_10_Chapter.html)\
    \ introduced cryptographic hash functions and discussed different patterns of\
    \ applying hash functions to data. Step [10](#A436689_1_En_10_Chapter.html) may\
    \ have appeared to be a dry intellectual exercise, but it is actually of highly\
    \ practical relevance. Hence, this step focuses on the application of hash functions\
    \ and hash values in the real world. It considers major use cases of hash functions\
    \ in real life and explains the idea behind them. This step also sketches why\
    \ these use cases work out as intended. Finally, this step points out where the\
    \ blockchain uses hash values.\n\n### Comparing Data\n\nBecause it is the most\
    \ straightforward use case of hash values, comparing data based on their hash\
    \ values is considered first.\n\n#### The Goal\n\nThe goal is to compare data\
    \ (e.g., files or transaction data) without comparing their content piece by piece\
    \ and to make comparing any kind of data, regardless of their size and content,\
    \ as easy as comparing two numbers.\n\n#### The Idea\n\nInstead of comparing data\
    \ by explicitly comparing their content piece by piece, you compare their cryptographic\
    \ hash values.\n\n#### How It Works\n\nYou calculate and compare the cryptographic\
    \ hash value of all data under consideration. If all of the cryptographic hash\
    \ values differ, all the data under consideration differ as well. If two or more\
    \ of the cryptographic hash values are identical, their corresponding input data\
    \ are also identical.[¹](#A436689_1_En_11_Chapter.html#Fn1)\n\n#### Why It Works\n\
    \nComparing data by comparing their cryptographic hash values works due to collision\
    \ resistance of cryptographic hash functions.\n\n### Detecting Changes in Data\n\
    \nThe idea of comparing data based on their hash values can be easily extended\
    \ to the case of detecting changes.\n\n#### The Goal\n\nThe goal is to determine\
    \ whether data (e.g., a file or transaction data) that is supposed to stay unchanged\
    \ was changed after a certain date or after sending it to someone or after it\
    \ was stored in a database.\n\n#### The Idea\n\nComparing the cryptographic hash\
    \ value of the data under consideration that was created in the past with a newly\
    \ created cryptographic hash value of the same data is the key in identifying\
    \ changes. If both hash values are identical, the data were not changed after\
    \ the time at which the old hash value was created.\n\n#### How It Works\n\nYou\
    \ create the cryptographic hash value of the data that are supposed to stay unchanged.\
    \ When you need to verify whether the data were changed at a later time, you create\
    \ the cryptographic hash value of the data again. You then compare the newly created\
    \ hash value with the hash value that was created in the past. If both hash values\
    \ are identical, the data were not changed after the first hash value was created.\
    \ Otherwise, the data have been changed in the meantime. The same idea can be\
    \ applied when sending data to someone. If you create the hash value of the data\
    \ before they are sent and the receiver creates the hash value of the data he\
    \ or she receives, both the sender and the receiver compare both hash values.\
    \ If both hash values are identical, the data were not altered in the course of\
    \ the transfer.\n\n#### Why It Works\n\nDetecting changes in data is actually\
    \ a process of comparing data with themselves before and after certain events,\
    \ such as lapses of time, storing to or retrieval from a database, or sending\
    \ them through a network. Detecting changes in data that are supposed to stay\
    \ unchanged works due to collision resistance of cryptographic hash functions.\n\
    \n### Referring to Data in a Change-Sensitive Manner\n\nComparing data and detecting\
    \ changes based on their hash values can be considered basic use cases of hash\
    \ values. A slightly more advanced application case of hash values is hash references,\
    \ which are introduced in the following.\n\n#### The Goal\n\nThe goal is to refer\
    \ to data (e.g., transaction data) that are stored somewhere else (e.g., on a\
    \ hard disk or in a database) and ensure that the data have remain unchanged."
