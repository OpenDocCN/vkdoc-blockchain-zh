  trans: "\n# 总结\n\n-   文件上的手写签名表明签署者同意所签署文件的内容，并授权执行这些文件。\n-   手写签名的证明力基于笔迹的独特性。\n\
    -   数字签名是手写签名的数字等价物。\n-   数字签名有两个目的：\n    -   唯一地识别签署者\n    -   表明签署者同意文件内容并授权执行\n\
    -   在区块链中，交易的数字签名是交易数据的加密哈希值，该哈希值使用与转移所有权的账户相对应的私钥进行加密。\n-   区块链中的数字签名可以唯一地追溯到一个特定的私钥，以及一个过程中的一个特定交易。\n\
    \n# 14. 存储交易数据\n\n构建并维护交易数据的历史记录\n\n基于前面五个步骤，你现在应该能够根据整个交易数据历史追溯所有权，并通过使用数字签名授权交易和唯一识别用户账户，以安全的方式描述单个所有权的转移。然而，我还没有讨论如何安全地存储构成交易历史的所有交易数据。这正是区块链数据结构进入讨论的地方。这一步将介绍区块链数据结构，并解释其构建方式。\n\
    \n## 隐喻\n\n你还记得上一次去图书馆并使用传统卡片目录是什么时候吗？图书馆目录是图书馆所藏所有书籍的登记册。一些传统图书馆仍然使用卡片目录来管理库存。这些目录中的每张卡片代表一本书，卡片上显示该书的主要信息，例如作者姓名、书名、出版日期以及该书在图书馆中的位置，如楼层、房间、书架和架号。为了识别书籍，目录卡片通常包含唯一的参考编号，这些编号也显示在书脊上。大多数图书馆会维护不止一个卡片目录，这些目录的排序标准不同。例如，在作者目录中，卡片按作者姓名的字母顺序排序；而在书名目录中，卡片则按书名的字母顺序排序。也可以设计一个排序目录，其中的卡片按书籍添加到图书馆的顺序排序。这一步将解释区块链如何以一种类似于拥有排序目录的图书馆的方式存储交易数据。\n\
    \n## 目标\n\n区块链的目标是以有序的方式维护整个交易数据的历史记录。\n\n## 挑战\n\n挑战在于存储所有发生过的交易数据，既要保持交易发生的顺序，又要能够快速、轻松地检测到对数据所做的任何更改。快速检测更改非常重要，因为这是防止篡改或伪造交易历史的基础。\n\
    \n## 思路\n\n思路是创建一个交易数据图书馆，并维护一个排序目录，该目录保存交易添加到图书馆的顺序。为了检测对排序目录或单个交易数据所做的任何更改，必须使用哈希引用以对更改敏感的方式存储数据。\n\
    \n## 将一本书转化为区块链数据结构\n\n本节将解释如何将一本书转化为一个带有排序目录的小型图书馆，这实际上是区块链数据结构的简化版本。\n\n###\
    \ 起点：一本书\n\n几个世纪以来，书面信息被保存在笨重的羊皮纸卷轴上，这些卷轴被称为卷轴。如今，我们习惯将书面信息保存在手抄本中：用硬皮装订的、带有编号页码的册子，我们称之为书籍。由于书籍如此普遍，我们可能认为其创新理所当然。它们的一些重要特性包括：\n\
    \n-   存储内容：书籍在其页面上存储内容。\n-   排序：页面上的句子以及书中的页面都保持顺序。\n-   连接页面：页面通过书脊物理连接，并通过其内容和页码逻辑连接。\n\
    \n由于这些特性，我们可以通过翻页在书中前后浏览，或者利用页码直接跳转到特定页面。让我们看看如果改变其中一些特性，我们能实现什么。\n\n### 转换 1：使页面依赖关系显式化\n\
    \n图 14-1 展示了一本非常简单的书的两页的示意图。每页包含一个显示页码的顶部边距，以及一个只包含一个单词的内容区域。\n\n![A436689_1_En_14_Fig1_HTML.jpg](img/A436689_1_En_14_Fig1_HTML.jpg)\n\
    \n图 14-1. 书页示意图\n\n页码有一个重要用途：你可以通过验证页码是否连续（没有遗漏任何数字）来查明是否有人从书中移除了一页。假设你现在正在阅读这本简化书的第\
    \ 42 页。前一页应该是多少页码？这非常简单：前一页应该是 41 页，等于 42 减 1。为了验证确实没有人移除前一页，我们将前一页上显示的数字与预期的页码（即当前页码减\
    \ 1）进行比较。如果这两个数字相等，我们就可以断定前一页没有被移除。\n\n为什么我们知道前一页的页码应该等于当前页码减 1？答案是我们假设所有书籍都遵循使用自然数连续标注页码的惯例。但是，如果书籍的作者或出版商决定使用不同的页码方案（例如，只使用偶数或三的倍数），那么这个假设就不成立。在这种情况下，我们验证前一页未被移除的方法就失效了。为了更容易地验证书中没有页面被移除，我们可以显式地指出每个页面与其前驱页面的联系。图\
    \ 14-2 展示了在我们的简化书中如何做到这一点。每一页不仅显示自己的页码，还显示其前驱页面的页码。这种页码方案使任何页面与其前驱页面之间的依赖关系显式化。显式引用前驱页面使得验证没有页面被移除变得非常容易，因为它不再依赖于隐含的假设。\n\
    \n![A436689_1_En_14_Fig2_HTML.jpg](img/A436689_1_En_14_Fig2_HTML.jpg)\n\n图 14-2.\
    \ 带有显式前驱页面引用的书页\n"
- fmt: '### Transformation 2: Outsourcing the Content


    The pages of our book contain the content and the information necessary to maintain
    their ordering: the page numbers. We can make our book handier by outsourcing
    the content and let it solely focus on the task of maintaining the order. Figure
    [14-3](#A436689_1_En_14_Chapter.html#Fig3) shows how the pages of our schematic
    book look after we outsourced the content. The pages no longer contain any content,
    instead they contain reference numbers that point to the content, which can be
    stored wherever we want (e.g., in a box, on a shelf, or somewhere else).


    ![A436689_1_En_14_Fig3_HTML.jpg](A436689_1_En_14_Fig3_HTML.jpg)


    Figure 14-3. Book pages with reference values to the outsourced content


    The achievement of this step is the following: We turned our book into a small
    library. The book that once stored content and page numbers together has been
    turned into a catalog, whose sole purpose is maintaining the order of the content
    while the content is stored on separated pages that are identified by unique reference
    numbers.


    ### Transformation 3: Replacing Page Numbers


    Our book that is now an ordering catalog maintains the order of its pages in two
    distinct ways: First, by the physical location of the pages within the book fixated
    in the book spine; second, by the page numbers and the explicit referencing of
    the preceding page. Due to the fact that the physical construction of the book
    preserves the order of the pages, we can experiment with a different page numbering
    schema. We can actually replace the natural numbers used to label the pages with
    reference numbers. Figure [14-4](#A436689_1_En_14_Chapter.html#Fig4) shows the
    result of this transformation. For example, the page previously carrying the page
    number 42 is now identified with the page reference number `8118E736`. In a similar
    fashion, the page that previously carried the page number 41 is now identified
    with the page reference number `B779E800`. Notice that the references to the preceding
    page have been updated as well. The page with the reference number `8118E736`
    contains the correct reference number to its preceding page.


    ![A436689_1_En_14_Fig4_HTML.jpg](A436689_1_En_14_Fig4_HTML.jpg)


    Figure 14-4. Book pages using reference numbers as page numbers


    ### Transformation 4: Creating Reference Numbers


    In the previous transformation, we replaced page numbers in our book with reference
    numbers. However, I have not discussed how they would be created. The best way
    to create unique reference numbers is to use cryptographic hash values. Hence,
    we can identify pages in our catalog as well as the corresponding content pages
    with their cryptographic hash values, which are digital fingerprints of their
    content. For simplicity, both Figure [14-3](#A436689_1_En_14_Chapter.html#Fig3)
    and Figure [14-4](#A436689_1_En_14_Chapter.html#Fig4) use shortened hash values.
    (You can verify the results by using the tool provided at [`www.blockchain-basics.com/Hashing.html`](http://www.blockchain-basics.com/Hashing.html).)
    For example, the content page that contains the word `Hello` is identified by
    the shortened hash value of `Hello` that is `185F8DB3`. The reference value of
    our book pages are calculated based on their content, which is the content reference
    number and the reference number of the preceding page. For example, the page reference
    number `B779E800` is the hash value of `011C01C1 185F8DB3`.


    ### Transformation 5: Getting Rid of the Book Spine


    Our ordering catalog is an unusual book because each of its pages contains its
    own reference number, the reference number of the preceding page, and the reference
    number of the corresponding content page. However, our ordering catalog is still
    a traditional book whose pages are fixated in the book spine.


    What happens if we get rid of the book spine and turn our ordering book into a
    pile of loose pages? By doing so we destroy the physical connection of the pages
    and as a result we lose the physical ordering of our pages as well. Fortunately,
    the ordering of the pages is not completely lost. Every page contains the reference
    number of its preceding page. As a result, we can move from page to page backward
    by following the page reference numbers to the preceding page. If we keep the
    last page of the ordering catalog separated, we can always browse through all
    pages in reverse order.


    ### Goal Achieved: Appreciating the Result


    Let’s summarize what we have achieved in this example. We turned a classical book
    into two physically unordered piles of loose pages that are linked together with
    unique reference numbers. One pile of pages contains the content, while the other
    pile of pages maintains the ordering. For simplicity, we refer to the latter pile
    of pages as an ordering catalog. Each page of the ordering catalog contains the
    reference number to its preceding page and the reference number of the corresponding
    content page. As a result, we have separated ordering from storing information
    and the logical location (the order) from the physical location of the pages.
    Due to the fact that we used hash values as reference numbers, everyone can verify
    their correctness by simply recalculating them. Since the pages of the ordering
    catalog are no longer fixated on a book spine, we can only browse through it backward
    in a page-by-page fashion by following the page reference numbers that point to
    the preceding page. For easy reference, Table [14-1](#A436689_1_En_14_Chapter.html#Tab1)
    summarizes the properties of our book before and after the transformations.


    Table 14-1. Comparing the Book Before and After the Transformation


    | Property | Book | Transformed Book |

    | --- | --- | --- |

    | Storing content | On the pages themselves | On separate content pages. Each
    content page is identified by a unique reference number |

    | Ordering content | Physically: Based on the location of the pages within the
    book. Logically: Based on the page numbers | Logically: Via an ordering catalog
    that contains reference values to the content pages |

    | Connecting pages | Physically: By fixating pages in the book spine. Logically:
    Based on page numbers | Logically: Via reference numbers |

    | Browsing through the pages | Forward. Backward. Jumping to pages directly by
    using page numbers | Backward only: By following the reference numbers to the
    preceding page |'
  raw: '### Transformation 2: Outsourcing the Content


    The pages of our book contain the content and the information necessary to maintain
    their ordering : the page numbers. We can make our book handier by outsourcing
    the content and let it solely focus on the task of maintaining the order. Figure
    [14-3](#A436689_1_En_14_Chapter.html#Fig3) shows how the pages of our schematic
    book look after we outsourced the content. The pages no longer contain any content,
    instead they contain reference numbers that point to the content, which can be
    stored wherever we want (e.g., in a box, on a shelf, or somewhere else).


    ![A436689_1_En_14_Fig3_HTML.jpg](A436689_1_En_14_Fig3_HTML.jpg)


    Figure 14-3.


    Book pages with reference values to the outsourced content


    The achievement of this step is the following: We turned our book into a small
    library. The book that once stored content and page numbers together has been
    turned into a catalog, whose sole purpose is maintaining the order of the content
    while the content is stored on separated pages that are identified by unique reference
    numbers .


    ### Transformation 3: Replacing Page Numbers


    Our book that is now an ordering catalog maintains the order of its pages in two
    distinct ways: First, by the physical location of the pages within the book fixated
    in the book spine; second, by the page numbers and the explicit referencing of
    the preceding page. Due to the fact that the physical construction of the book
    preserves the order of the pages, we can experiment with a different page numbering
    schema. We can actually replace the natural numbers used to label the pages with
    reference numbers . Figure [14-4](#A436689_1_En_14_Chapter.html#Fig4) shows the
    result of this transformation. For example, the page previously carrying the page
    number 42 is now identified with the page reference number 8118E736\. In a similar
    fashion, the page that previously carried the page number 41 is now identified
    with the page reference number B779E800\. Notice that the references to the preceding
    page have been updated as well. The page with the reference number 8118E736 contains
    the correct reference number to its preceding page.


    ![A436689_1_En_14_Fig4_HTML.jpg](A436689_1_En_14_Fig4_HTML.jpg)


    Figure 14-4.


    Book pages using reference numbers as page numbers


    ### Transformation 4: Creating Reference Numbers


    In the previous transformation, we replaced page numbers in our book with reference
    numbers . However, I have not discussed how they would be created. The best way
    to create unique reference numbers is to use cryptographic hash values. Hence,
    we can identify pages in our catalog as well as the corresponding content pages
    with their cryptographic hash values, which are digital fingerprints of their
    content. For simplicity, both Figure [14-3](#A436689_1_En_14_Chapter.html#Fig3)
    and Figure [14-4](#A436689_1_En_14_Chapter.html#Fig4) use shortened hash values.
    (You can verify the results by using the tool provided at [`www.blockchain-basics.com/Hashing.html`](http://www.blockchain-basics.com/Hashing.html)
    .) For example, the content page that contains the word Hello is identified by
    the shortened hash value of Hello that is 185F8DB3\. The reference value of our
    book pages are calculated based on their content, which is the content reference
    number and the reference number of the preceding page. For example, the page reference
    number B779E800 is the hash value of 011C01C1 185F8DB3.


    ### Transformation 5: Getting Rid of the Book Spine


    Our ordering catalog is an unusual book because each of its pages contains its
    own reference number, the reference number of the preceding page, and the reference
    number of the corresponding content page. However, our ordering catalog is still
    a traditional book whose pages are fixated in the book spine.


    What happens if we get rid of the book spine and turn our ordering book into a
    pile of loose pages? By doing so we destroy the physical connection of the pages
    and as a result we lose the physical ordering of our pages as well. Fortunately,
    the ordering of the pages is not completely lost. Every page contains the reference
    number of its preceding page. As a result, we can move from page to page backward
    by following the page reference numbers to the preceding page. If we keep the
    last page of the ordering catalog separated, we can always browse through all
    pages in reverse order.


    ### Goal Achieved: Appreciating the Result


    Let’s summarize what we have achieved in this example. We turned a classical book
    into two physically unordered piles of loose pages that are linked together with
    unique reference numbers. One pile of pages contains the content, while the other
    pile of pages maintains the ordering. For simplicity, we refer to the latter pile
    of pages as an ordering catalog. Each page of the ordering catalog contains the
    reference number to its preceding page and the reference number of the corresponding
    content page. As a result, we have separated ordering from storing information
    and the logical location (the order) from the physical location of the pages.
    Due to the fact that we used hash values as reference numbers , everyone can verify
    their correctness by simply recalculating them. Since the pages of the ordering
    catalog are no longer fixated on a book spine, we can only browse through it backward
    in a page-by-page fashion by following the page reference numbers that point to
    the preceding page. For easy reference, Table [14-1](#A436689_1_En_14_Chapter.html#Tab1)
    summarizes the properties of our book before and after the transformations.


    Table 14-1.


    Comparing the Book Before and After the Transformation


    | Property | Book | Transformed Book |

    | --- | --- | --- |

    | Storing content | On the pages themselves | On separate content pages Each content
    page is identified by a unique reference number |

    | Ordering content | Physically: Based on the location of the pages within the
    book Logically: Based on the page numbers | Logically: Via an ordering catalog
    that contains reference values to the content pages |

    | Connecting pages | Physically: By fixating pages in the book spine Logically:
    Based on page numbers | Logically: Via reference numbers |

    | Browsing through the pages | Forward Backward Jumping to pages directly by using
    page numbers | Backward only: By following the reference numbers to the preceding
    page |'
  trans: '

    ### 转换 2：内容外包


    书中的页面包含内容以及维持其顺序所需的信息：页码。我们可以通过将内容外包来让书更方便，使其只专注于维护顺序这一任务。图 14-3 展示了我们书中的页面在外包内容后的样子。这些页面不再包含任何内容，而是包含指向内容的引用编号，这些内容可以存放在我们想要的任何地方（例如，放在一个盒子里、架子上或别处）。


    ![A436689_1_En_14_Fig3_HTML.jpg](img/A436689_1_En_14_Fig3_HTML.jpg)


    图 14-3. 带有指向外包内容的引用值的书页


    这一步骤的成果如下：我们把书变成了一座小型图书馆。那本曾将内容和页码存储在一起的书，已经变成了一本目录，其唯一目的是维护内容的顺序，而内容则存储在由唯一引用编号标识的独立页面上。


    ### 转换 3：替换页码


    现在已成为排序目录的这本书通过两种不同的方式来维护其页面的顺序：首先，通过页面在书中被固定于书脊的物理位置；其次，通过页码以及对前序页面的显式引用。由于书的物理结构保留了页面的顺序，我们可以尝试一种不同的页码编号方案。我们实际上可以用引用编号来替换用于标记页面的自然数。图
    14-4 展示了这一转换的结果。例如，之前页码为 42 的页面现在由页面引用编号 `8118E736` 标识。类似地，之前页码为 41 的页面现在由页面引用编号
    `B779E800` 标识。注意，对前序页面的引用也已更新。引用编号为 `8118E736` 的页面包含其前序页面的正确引用编号。


    ![A436689_1_En_14_Fig4_HTML.jpg](img/A436689_1_En_14_Fig4_HTML.jpg)


    图 14-4. 使用引用编号作为页码的书页


    ### 转换 4：创建引用编号


    在上一个转换中，我们用引用编号替换了书中的页码。然而，我还没有讨论这些引用编号是如何创建的。创建唯一引用编号的最佳方法是使用加密哈希值。因此，我们可以使用其内容的数字指纹——加密哈希值——来标识目录中的页面以及对应的内容页面。为简单起见，图
    14-3 和图 14-4 都使用了缩短的哈希值。（你可以通过使用 [`www.blockchain-basics.com/Hashing.html`](http://www.blockchain-basics.com/Hashing.html)
    提供的工具来验证结果。）例如，包含单词 `Hello` 的内容页面由 `Hello` 的缩短哈希值 `185F8DB3` 标识。我们的书页面的引用值是根据其内容计算得出的，该内容包含内容引用编号和前序页面的引用编号。例如，页面引用编号
    `B779E800` 是 `011C01C1 185F8DB3` 的哈希值。


    ### 转换 5：取消书脊


    我们的排序目录是一本不寻常的书，因为它的每个页面都包含自身的引用编号、前序页面的引用编号以及相应内容页面的引用编号。然而，我们的排序目录仍然是一本传统书籍，其页面被固定于书脊之中。


    如果我们取消书脊，把我们的排序书变成一堆散页，会发生什么呢？这样做会破坏页面之间的物理连接，从而我们也会失去页面的物理顺序。幸运的是，页面的顺序并没有完全丢失。每个页面都包含其前序页面的引用编号。因此，我们可以通过跟随指向下一页的页面引用编号，逐页向前移动。如果我们把排序目录的最后一页单独保留，我们总是可以逆序浏览所有页面。


    ### 目标达成：品味成果


    让我们总结一下在这个例子中取得的成果。我们把一本经典的书变成了两堆物理上无序的散页，这些页面通过唯一的引用编号连接在一起。一堆页面包含内容，而另一堆页面维护顺序。为简单起见，我们将后一堆页面称为排序目录。排序目录的每个页面都包含指向其前序页面的引用编号以及相应内容页面的引用编号。这样一来，我们将排序与信息存储分离开来，也将逻辑位置（顺序）与页面的物理位置分离开来。由于我们使用了哈希值作为引用编号，任何人都可以通过简单地重新计算它们来验证其正确性。由于排序目录的页面不再固定在书脊上，我们只能通过跟随指向下一页的页面引用编号，以逐页的方式向后浏览。为便于参考，表
    14-1 总结了我们的书在转换前后的属性。


    表 14-1. 比较转换前后的书


    | 属性 | 书 | 转换后的书 |

    | --- | --- | --- |

    | 存储内容 | 在页面本身 | 在独立的内容页面上。每个内容页面由一个唯一的引用编号标识 |

    | 内容排序 | 物理上：基于页面在书中的位置。逻辑上：基于页码 | 逻辑上：通过一个包含指向内容页面的引用值的排序目录 |

    | 连接页面 | 物理上：通过将页面固定在书脊中。逻辑上：基于页码 | 逻辑上：通过引用编号 |

    | 浏览页面 | 向前。向后。通过页码直接跳转到页面 | 仅向后：通过跟随指向下一页的引用编号 |

    '
- fmt: '# The Blockchain-Data-Structure


    What is the `blockchain-data-structure`? Actually, you already know the answer
    because the preceding example developed a simplified `blockchain-data-structure`.
    However, we used different terminology. This section finishes the analogy by linking
    the elements of the transformed book with the terminology used in the context
    of the blockchain.


    Our transformed book consists of:


    - A mental unit consisting of a page of the ordering catalog and its corresponding
    content page

    - A pile of loose pages called the ordering catalog

    - A pile of loose pages that contain the content

    - Page reference numbers for identifying and linking pages of the ordering catalog

    - Content reference numbers for identifying and linking content pages


    For easy reference Table [14-2](#A436689_1_En_14_Chapter.html#Tab2) at the end
    of this section summarizes the results by comparing the elements of our simplified
    book after transformation with elements of the `blockchain-data-structure`.


    Table 14-2.

    Comparing the Transformed Book with the Blockchain-Data-Structure


    | Transformed Book | Blockchain-Data-Structure[¹](#A436689_1_En_14_Chapter.html#Fn1)
    |

    | --- | --- |

    | A page in the ordering catalog | A block header |

    | The whole ordering catalog | The chain of block headers |

    | The reference number of a page in the ordering catalog | The cryptographic hash
    value of a block header |

    | The reference number to the preceding page | The cryptographic hash value of
    the preceding block header |

    | Content | Transaction data |

    | A content page | A Merkle tree containing transaction data |

    | Reference to the content page | The root of the Merkle tree that contains transaction
    data |

    | The mental unit of a page of the ordering catalog and its corresponding content
    page | One block of the `blockchain-data-structure` |

    | The whole ordering catalog and all content pages together | The `blockchain-data-structure`
    |


    ### The Mental Unit of a Page of the Ordering Catalog and Its Corresponding Content
    Page


    The mental unit of a page of the ordering catalog and its corresponding content
    page relates to one block in the `blockchain-data-structure`. All these blocks
    together form the `blockchain-data-structure`. It is important to point out that
    the unit of ordering page and corresponding content page is only a mental unit
    because the pages of the ordering catalog and the content pages are physically
    distinct entities. The former refer to the latter via hash references, which as
    a result constitutes the mental unity.


    ### Ordering Catalog


    The ordering catalog of our transformed book equates to the chain of block headers
    in the `blockchain-data-structure`. Each page of the ordering catalog equates
    to a single block header in the `blockchain-data-structure`. Since the block headers
    are connected with one another via references in a linear fashion, like the links
    of a chain, they form a chain of block headers. Similar to our ordering catalog,
    the chain of block headers does not store transaction data directly, but only
    stores hash references to the corresponding transaction data. This is the point
    where the mental unit of the ordering catalog and content becomes important.


    ### Content Pages


    The content of the transformed book is equivalent to the transaction data being
    maintained by the blockchain. They are specific to our application area that is
    managing ownership. There are no content pages in real-world blockchain applications;
    I made up the term content pages for didactical reasons. Real-world blockchain
    applications store the content data (e.g., transaction data) directly in a database,
    and we refer to them as Merkle trees, whose roots are stored in block headers.


    ### Catalog Page Reference Numbers


    The page reference numbers of our transformed book used to identify pages of the
    ordering catalog equate to cryptographic hash values of individual block headers
    in the `blockchain-data-structure`. They are called block hash or previous block’s
    hash, respectively. They are used to identify each block header uniquely and to
    refer to the previous block header. The actual referencing from one block header
    to its predecessor is done by hash reference.


    ### Content Reference Numbers


    The content reference numbers in our transformed book used to identify content
    pages equate to hash references in the chain of block headers that point to the
    associated transaction data. To be more specific, the content reference number
    that is stored in a block header is the root of a Merkle tree of the transaction
    data being stored in a database. This is the point where the mental unit of the
    ordering catalog (block header) and its corresponding content (Merkle tree with
    transaction data) are constituted.


    ## Storing Transactions in the Blockchain-Data-Structure


    Figure [14-5](#A436689_1_En_14_Chapter.html#Fig5) summarizes what you have learned
    by schematically depicting a `blockchain-data-structure` that stores four transactions.
    The illustration given in Figure [14-5](#A436689_1_En_14_Chapter.html#Fig5) shows
    a simplified `blockchain-data-structure` that consists of two blocks labeled `BLOCK
    1` and `BLOCK 2`. In order to emphasize the mental nature of the blocks, they
    are drawn with dashed lines. Both blocks contain block headers labeled `Block
    Header 1` and `Block Header 2`, respectively. `BLOCK 1` is the very first block
    in this data structure, hence, it does not have a preceding block, and, consequently,
    `Block Header 1` does not contain any reference to a preceding block header. Since
    `BLOCK 2` has a predecessor, `Block Header 2` maintains a hash reference to its
    preceding block header labeled as `B1`. The depicted `blockchain-data-structure`
    maintains hash reference to two distinct Merkle trees whose roots are labeled
    `R12` and `R34`, respectively. The labels of the Merkle roots already give us
    an indication of the transaction data they contain (e.g., the Merkle tree with
    the root `R12` contains the first two transactions labeled as `Transaction 1`
    and `Transaction 2` and their corresponding hash references `R1` and `R2` that
    point to them).


    ![A436689_1_En_14_Fig5_HTML.jpg](A436689_1_En_14_Fig5_HTML.jpg)


    Figure 14-5.

    A simplified `blockchain-data-structure` containing four transactions


    If you joined a distributed peer-to-peer system that maintained a `blockchain-data-structure`,
    as shown in Figure [14-5](#A436689_1_En_14_Chapter.html#Fig5), you would receive
    all transaction data, all hash reference values, and all block headers. Based
    on these data, your local computer would create the `blockchain-data-structure`
    including the hash references that point to data stored on your local computer.
    Equipped with these data and the reference to the most current block header, you
    could browse through the history of all transaction data that were ever submitted
    to the system since its creation in reverse order, which in our case is just four
    transactions. Note that the reference to the most currently added block header
    is called the head of the `blockchain-data-structure` because it is the place
    where the next block will be added. Sometimes both the most currently added block
    header and the reference that points to it is called the head of the `blockchain-data-structure`.
    In Figure [14-5](#A436689_1_En_14_Chapter.html#Fig5) the reference labeled `B2`
    is the head of the `blockchain-data-structure`. It is important not to mix the
    terms "head" and "header": The `blockchain-data-structure` consists of many blocks
    that each has its own header, but the whole `blockchain-data-structure` has only
    one head.


    Caution


    The `blockchain-data-structure` discussed in this step and illustrated in Figure
    [14-5](#A436689_1_En_14_Chapter.html#Fig5) has been simplified for didactical
    reasons. Many details regarding the information stored in the block headers have
    been left out deliberately. Some of them will be covered in the next steps as
    you complete your understanding of the blockchain.'
