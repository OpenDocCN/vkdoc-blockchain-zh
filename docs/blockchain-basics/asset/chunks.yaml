  trans: "\n### 任务 7：决定哪些账本代表真相\n\n一旦新交易可以被添加到点对点系统中的各个账本中，就会遇到一个典型的分布式点对点系统问题：不同节点可能收到不同的交易，很快它们维护的交易历史就会出现差异。因此，点对点系统中可能存在不同版本的交易历史。由于交易历史是识别合法所有者的基础，存在相互冲突的交易历史对系统的完整性构成了严重威胁。因此，必须找到一种方法，要么从一开始就防止不同交易历史的出现，要么找到一种方法来决定哪个交易历史代表真相。纯粹的分布式点对点系统的特性决定了前一种方法不可行。因此，你需要一个标准来寻找和选择代表真相的交易历史。但还有另一个问题：在纯粹的分布式点对点系统中，没有中央权威机构可以宣布必须选择哪个交易历史。事实证明，可以通过让点对点系统中的每个节点自行决定哪个交易历史代表真相，并且大多数节点独立地对该决定达成一致，来解决这个问题。同样，区块链让你将新交易添加到仅追加的区块链数据结构中的方式，本身就已经包含了解决这个问题的方案。第\
    \ 19 步将详细解释这些标准及其使用方法。\n\n## 展望\n\n本步骤确定了七项任务，这些任务将引导你经历一次富有挑战性的智力旅程，深入理解构成区块链的各种概念。一旦你完成这些任务，你将抵达顶峰：对区块链的理解。第\
    \ 21 步是你将所有概念整合在一起并享受学习成果的时刻。和本步一样，第 21 步将是一篇概述性章节，但它将借鉴你在此期间学到的技术知识。\n\n## 总结\n\
    \n*   为了设计一个用于管理所有权的纯粹分布式点对点账本系统，必须解决以下任务：\n    *   描述所有权\n    *   保护所有权免受未经授权的访问\n\
    \    *   存储交易数据\n    *   准备在不可信环境中分发的账本\n    *   形成分布式账本系统\n    *   向账本添加和验证新交易\n\
    \    *   决定哪些账本代表真相\n*   上述任务将在接下来的 12 个步骤中逐一解决。\n\n# 9. 记录所有权\n\n以历史进程作为当前所有权状态的证据\n\
    \n本步骤考虑如何以一种对纯粹分布式点对点账本系统有用的方式来描述所有权。本步骤解释了区块链如何记录所有权以及处理所有权的转移。此外，本步骤还指出了在记录所有权转移时排序的重要性。最后，本步骤强调了交易数据的完整性对整个系统完整性的重要意义。\n\
    \n## 隐喻\n\n接力赛是队伍之间的赛跑，每队队员只跑总距离的一部分。比赛中，每位队员必须在赛道上标记的特定区域内将一件特定物品（即接力棒）交给下一位队员。在比赛中的任何给定时刻，参赛队伍中只有一名队员手持接力棒。要确定某支队伍的哪位队员当前正拿着接力棒，只需知道在最近一次交接中接力棒交给了该队的谁即可。为了追踪在任何时刻是谁拿着接力棒，就需要记录每次交接的时间和参与的运动员。本步骤将解释区块链如何处理所有权，其方式类似于接力赛利用接力棒的方式。\n\
    \n## 目标\n\n目标是以透明且易于理解的方式记录所有权。任何阅读该记录的人都应该能够就商品与其所有者之间的关联做出明确的陈述。\n\n## 挑战\n\n\
    挑战在于找到一种所有权记录方式，它不仅要声称某人是某物的所有者，还要提供所有权的证据，从而作为所有权的证明。\n\n## 思路\n\n与其通过库存数据（即列出所有所有者的当前财产）来描述当前的所有权状态，不如持续维护一个账本，其中记录所有所有权的转移。每一次所有权转移都通过交易数据来描述，这些数据清晰地指明哪个所有者何时将什么物品的所有权转移给了谁。存储在账本中的整个交易历史形成了一条审计线索，为每个人如何获得其财产提供了证据。¹\
    \ 这等同于追踪接力赛中每一次接力棒的交接，使得任何人都可以在之后重构整场比赛。\n\n## 关于库存数据和交易数据的简要说明\n\n有两种相互竞争的方式来描述所有权——通过库存数据或交易数据。库存数据描述当前的所有权状态。它们类似于银行账户对账单，仅显示当前可用的资金数额。交易数据描述所有权的转移。它们类似于银行账户对账单，列出了每一笔取款、存款和资金转账。可以通过汇总交易数据来推导出库存数据。除了两者都描述所有权这一事实外，它们的基本理念截然不同。库存数据只是陈述或声称所有权，而交易数据则解释并由此证明所有权。然而，库存数据通常被认为更方便，因为它能立即陈述大多数人所感兴趣的事实，即当前的所有权状态。\n"
- fmt: '# How It Works


    Documenting ownership with the blockchain involves the following aspects:


    - Describing the transfer of ownership

    - Maintaining the history of transfers


    ## Describing the Transfer of Ownership


    A transaction is the act of transferring ownership from one owner to someone else.
    The act of transferring ownership relies on data that describe the intended transfer.
    These data contain all information necessary to execute the transfer of ownership.
    An example of data that describe an intended transfer of ownership would be a
    bank transfer form that is used to request a bank to make a money transfer on
    behalf of a customer. The bank transfer form requires you to provide all information
    necessary to allow the bank to make the transfer on your behalf. In a similar
    fashion, the information used by the blockchain to describe a transaction are:


    - An identifier of the account that is to hand off ownership to another account

    - An identifier of the account that is to receive ownership

    - The amount of the goods to be transferred

    - The time the transaction is to be done

    - A fee to be paid to the system for executing the transaction

    - A proof that the owner of the account that hands off ownership indeed agrees
    with that transfer


    Most of these data are familiar to anyone who has made a money transfer with a
    bank. However, the analogy with a bank transfer ends when fees are considered.
    Due to the fact that banks are centralized institutions, they maintain a central
    fee schedule that is applied to all customers. In contrast to that, the blockchain
    is a distributed system without any central point of control. Hence, the blockchain
    cannot have a central fee schedule. When using the blockchain, each user has to
    tell the system in advance how much he or she is willing to pay for having the
    transaction executed. The account that hands off ownership also pays the transaction
    fee.


    ## Maintaining the History of Transfers


    Transaction data provide the mandatory information necessary to execute a transfer
    of ownership as intended. Executing a transaction means making the transfer of
    ownership happen as described by the transaction data. Executing a transaction
    means adding the transaction data to a ledger. By adding transaction data to a
    ledger, the transaction becomes part of the transaction history, which is used
    to clarify ownership. When the ledger is used the next time to clarify ownership
    by aggregating the transaction data it contains, the newly added transaction will
    be included in the aggregation and hence will impact the resulting state of ownership.


    The blockchain maintains the whole history of all transactions that have ever
    happened by storing their transaction data in the `blockchain-data-structure`
    in the order in which they occurred. Any transaction not being part of that history
    is regarded as if it never happened. Hence, adding transaction data to the `blockchain-data-structure`
    means making this transaction happen and allowing it to influence the result of
    using the history in order to identify the current owner.


    # Why It Works


    Since transaction data contain all the information about the account that hands
    off ownership, the account that receives ownership, and the item and the amount
    to be transferred, one can reconstruct ownership information for each account
    as long as the whole history of transactions is available. As a result, the whole
    history of all transaction data is sufficient to document ownership.


    # Importance of Ordering


    Aggregating transaction data is done for the purpose of recovering the current
    state of ownership and clarifying ownership. It is important to recognize that
    the order in which the transactions occurred must be preserved in order to arrive
    at the identical result every time the data are aggregated. Changing the order
    of transaction data will change the result of aggregating them. At first glance,
    the result does not seem to change very much whether I receive a payment of $50
    from a friend first and transferred $50 afterward in order to pay a bill or whether
    these two transactions occurred in the opposite order. But what happens if my
    bank account does not contain any money at all and I am not allowed to overdraw
    it? In this case, my ability to pay my bill depends on having received the payment
    from my friend first. Otherwise, the bank will refuse to transfer the money to
    pay the bill due to a lack of funds. Hence, the order in which transactions occur
    does indeed matter.


    # Integrity of the Transaction History


    Without exaggeration, one can state that the history of transaction data is the
    heart of any blockchain that manages ownership because it is the basis for reconstructing
    the state of ownership. As a result, it is necessary to keep that history of data
    safe, complete, correct, and consistent in order to maintain the integrity of
    the whole system and, as a result, be able to make true statements regarding the
    current state of ownership. Hence, the blockchain needs to provide security measures
    to ensure that only valid transaction data are added to the `blockchain-data-structure`.
    Examining validity of transaction data involves three aspects:


    - Formal correctness

    - Semantic correctness

    - Authorization


    ## Formal Correctness


    Formal correctness means that the description of a transaction contains all required
    data and that the data are provided in the correct format.


    ## Semantic Correctness


    Semantic correctness focuses on the meaning of transaction data and their intended
    effect. Hence, validating semantic correctness requires knowledge of the business
    domain. Examining semantic correctness of transaction data is often done based
    on business rules, such as:


    - Ensuring that an account does not hand off more than it currently owns

    - Preventing double spending

    - Limiting the amount of items that can be transferred in a single transaction

    - Limiting the number of transactions per user

    - Limiting the total amount of items spent in a given time period

    - Enforcing that an account keeps an item for a minimum time period before it
    can be transferred further


    ## Authorization


    Only the owner of the account who hands off ownership should be allowed to advise
    the blockchain to execute a transaction on his or her behalf. As a result, the
    blockchain requires every transaction to carry information that proves that the
    owner of the account who hands off ownership indeed agrees with that transfer.


    # Outlook


    This step explained transactions and their role for clarifying ownership. The
    following steps are mainly concerned with how the blockchain enforces that only
    valid transaction data are added to the history and how the history is protected
    from being manipulated or forged.'
  raw: '## How It Works


    Documenting ownership with the blockchain involves the following aspects:


    *   Describing the transfer of ownership

    *   Maintaining the history of transfers


    ### Describing the Transfer of Ownership


    A transaction is the act of transferring ownership from one owner to someone else.
    The act of transferring ownership relies on data that descibe the intended transfer.
    These data contain all information necessary to execute the transfer of ownership.
    An example of data that describe an intended transfer of ownership would be a
    bank transfer form that is used to request a bank to make a money transfer on
    behalf of a customer. The bank transfer form requires you to provide all information
    necessary to allow the bank to make the transfer on your behalf. In a similar
    fashion, the information used by the blockchain to describe a transaction are:


    *   An identifier of the account that is to hand off ownership to another account

    *   An identifier of the account that is to receive ownership

    *   The amount of the goods to be transferred

    *   The time the transaction is to be done

    *   A fee to be paid to the system for executing the transaction

    *   A proof that the owner of the account that hands off ownership indeed agrees
    with that transfer


    Most of these data are familiar to anyone who has made a money transfer with a
    bank. However, the analogy with a bank transfer ends when fees are considered.
    Due to the fact that banks are centralized institutions, they maintain a central
    fee schedule that is applied to all customers. In contrast to that, the blockchain
    is a distributed system without any central point of control. Hence, the blockchain
    cannot have a central fee schedule. When using the blockchain, each user has to
    tell the system in advance how much he or she is willing to pay for having the
    transaction executed. The account that hands off ownership also pays the transaction
    fee.


