  trans: '好的，作为高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。



    ### 更改 Merkle 树中的引用


    图 15-6 展示了如果不仅更改交易的详细信息，同时还更改指向该更新交易的哈希引用时会发生什么。更新后的哈希引用 (`R2`) 是有效的，因为它正确地指向了新的交易数据。然而，这个更新后的哈希引用是一棵
    Merkle 树的一部分，该树的根也是一个哈希引用。Merkle 树的根 (`R12`) 指向包含哈希引用 `R1` 和 `R2` 的一段数据。后者已被更改，以便与被篡改后的交易
    2 保持一致。因此，包含更新后的 `R2` 版本的那段数据的加密哈希值也随之改变，这反过来又会使 Merkle 树的根 `R12` 失效。


    ![A436689_1_En_15_Fig6_HTML.jpg](img/A436689_1_En_15_Fig6_HTML.jpg)


    图 15-6. 在 Merkle 树中更改一笔交易及其哈希引用会使 Merkle 树的根失效，进而导致整个数据结构失效


    ### 替换一笔交易


    图 15-7 考虑的是替换整笔交易的情况，而不是仅修改现有交易的细节并更新其哈希引用。


    ![A436689_1_En_15_Fig7_HTML.jpg](img/A436689_1_En_15_Fig7_HTML.jpg)


    图 15-7. 在 Merkle 树中替换一笔交易及其哈希引用会使 Merkle 树的根失效，进而导致整个数据结构失效


    当你比较图 15-6 和图 15-7 时，只能发现交易名称及其哈希引用存在微小差异。就后果而言，两幅图是相同的。在这两种情况下，由于 Merkle 树内部发生的变化，Merkle
    树的根 `R12` 都将失效。因此，我们发现更改一笔交易或替换一笔交易对 `blockchain-data-structure` 的影响是相同的。这两种情况下的篡改行为都会被检测到，并导致整个数据结构失效。


    **注意**：在 `blockchain-data-structure` 中更改或替换数据会产生相同的结果，因为两者对哈希引用的影响是相同的。


    ### 更改 Merkle 根


    图 15-8 展示了当整棵 Merkle 树（包括其根）被更改时会发生什么。


    ![A436689_1_En_15_Fig8_HTML.jpg](img/A436689_1_En_15_Fig8_HTML.jpg)


    图 15-8. 更改 Merkle 树会使指向包含它的区块头的哈希引用失效，进而导致整个数据结构失效


    被篡改后的 Merkle 树的根 (`R12`) 是区块头（区块头 1）的一部分。Merkle 根的更改改变了区块头 1 的加密哈希值，这进而导致指向它的哈希引用
    (`B1`) 失效。用于维护连接或作为从区块头 2 指向区块头 1 的链接的哈希引用 `B1`，在检测到更改后变得无效。结果，整个 `blockchain-data-structure`
    变得无效。


    ### 更改区块头引用


    图 15-9 展示了当不仅更改整棵 Merkle 树，还更改指向被篡改区块头的哈希引用时会发生什么。


    ![A436689_1_En_15_Fig9_HTML.jpg](img/A436689_1_En_15_Fig9_HTML.jpg)


    图 15-9. 更改区块头内的哈希引用会使指向被篡改区块头的哈希引用失效，进而导致整个数据结构失效


    如果指向被篡改区块头（区块头 1）的哈希引用 (`B1`) 被更改，则会发生以下情况：从哈希引用 `B1` 开始，所有指向被篡改数据的哈希引用都是一致且有效的，因为它们已被调整为适应所执行的篡改。然而，被篡改后的哈希引用
    `B1` 是区块头 2 的一部分，因此它的加密哈希值会发生变化，这进而使指向原始数据区块头（包含原始版本哈希引用 `B1`）的哈希引用 `B2` 失效。结果，整个
    `blockchain-data-structure` 也同样无效。


    ## 有序地更改数据


    在讨论了多种篡改 `blockchain-data-structure` 的方法（所有这些方法都会导致数据结构无效）之后，现在来说明如何有序地更改或更新 `blockchain-data-structure`。图
    15-10 说明了以正确方式更改 `blockchain-data-structure` 的方法。


    ![A436689_1_En_15_Fig10_HTML.jpg](img/A436689_1_En_15_Fig10_HTML.jpg)


    图 15-10. 有序地更改一笔交易包括更改所有后续的哈希引用


    如果我们考虑更改或更新交易 2 的一些细节，我们必须随后更新整个哈希引用序列：`R2`、`R12`、`B1` 和 `B2`。这意味着从直接指向被篡改数据的那个哈希引用开始，到指向最新区块头的那个哈希引用结束，以及它们之间的所有哈希引用，都需要被更改和更新，以便它们反映其目标的变化。这是一项相当复杂的工作。而且，这是一个有意为之的复杂过程。所有这些工作都是为了保持整个
    `blockchain-data-structure` 的一致性并维护其完整性。所有其他试图更改或篡改 `blockchain-data-structure`
    中数据的行为都将导致无效的哈希引用，这反过来会使整个数据结构无效。


    ## 有意更改与无意更改


    前面的讨论表明，`blockchain-data-structure` 在更改其数据时采用了一种激进的全有或全无的方式：要么彻底地更改从引起变化的点一直到整条链的末端整个数据结构，要么从一开始就压根儿不要更改。所有其他不彻底的、半途而废的或局部的更改都会使整个
    `blockchain-data-structure` 处于不一致的状态，这种状态很容易被快速检测到。这是由于哈希引用的特性决定的，`blockchain-data-structure`
    不会区分有意更改和无意更改。实际上，在区块链中不存在有意或无意更改这类概念。这些词语指的是对导致变化的人或其动机的评价。但 `blockchain-data-structure`
    既不评估动机，也不评估导致不一致的人。区块链只关心所有哈希引用的正确性和一致性。如果其中一个无效，整个数据结构就无效，无论谁或什么导致了这个变化，也不论为何做出这个变化。而这个特性使得
    `blockchain-data-structure` 非常有价值。


    ## 展望


    本步骤详细说明了 `blockchain-data-structure` 如何处理其数据的更改。事实证明，`blockchain-data-structure`
    对变化非常敏感。它在更改其数据时采用了一种激进的全有或全无的方式。下一步将解释如何利用这一特性使数据不可更改，这使得 `blockchain-data-structure`
    成为在不可靠和不可信环境中存储数据的完美候选方案。

