  trans: '

    # 安全相关简介


    图 6-1 中使用了三个与安全相关的主要概念，需要更详细地解释，因为它们在软件系统语境中的含义可能与日常用法略有不同：


    *   `标识`

    *   `身份验证`

    *   `授权`


    这三个概念的含义和相互关系可以通过一个现实世界的例子来说明。设想你试图在一家酒类商店购买一瓶葡萄酒。酒类商店不允许向未成年人出售酒精饮料。酒类商店如何确保只向符合条件的人出售葡萄酒？酒类商店通过使用标识、身份验证和授权来实现这一点。以下是其工作原理的说明。


    ## `标识`


    `标识`仅仅意味着通过陈述一个名称或任何其他可用作标识符的信息来声称自己是谁。¹ 在酒类商店的例子中，你可以通过陈述一个名字来声称自己是某个人。`标识`并不能证明你确实是你所声称的那个人。`标识`不涉及证明你不是未成年人。`标识`仅仅意味着声称自己是某个人。


    ## `身份验证`


    `身份验证`的目的是防止有人冒充他人。`身份验证`意味着验证或证明你确实是你所声称的那个人¹。这种证明可以通过你拥有的某物或你知道的某物来提供，这些可以作为你确实是你所声称的那个人的证据（例如，身份证、驾照，或者你所声称之人的一些生活细节）。重要的是，对你声称身份的证明必须与你唯一关联（例如，你的脸部照片、指纹或其他能够唯一识别你的信息）。在酒类商店的例子中，这意味着你可以通过出示一张包含你照片的驾照来证明你确实是你所声称的那个人。将你的脸与驾照照片上的脸进行比对即可完成验证。如果你看起来像驾照照片中的人，则`身份验证`成功。否则，`身份验证`失败。将一个人的脸与驾照照片进行双重核实，旨在防止有人使用他人的驾照。


    ## `授权`


    `授权`意味着根据某人身份的特征或属性，授予其对特定资源或服务的访问权限¹。`授权`是`身份验证`成功以及对其特征或权利进行评估后的结果。在酒类商店的例子中，`授权`意味着根据你驾照上显示的出生日期，决定是否允许你购买一瓶葡萄酒。如果根据你驾照上的出生日期，你年龄太小，店员将拒绝向你出售葡萄酒。请注意，在这种情况下，拒绝并非由于`身份验证`失败。`标识`和`身份验证`都成功了，并且正因为正确的标识，店员才能识别出你是未成年人。因此，`授权`始终是根据某些规则对先前已验证身份的特征或属性进行评估的结果。


    > **注意：** `标识`意味着声称自己是谁。`身份验证`意味着证明你确实是你所声称的那个人。`授权`意味着基于先前已验证的身份获得对某物的访问权限。


    ## 账本的目的与属性


    图 6-2 说明了所有权证明和所有权转移如何与账本的目的和属性相关联。


    ![A436689_1_En_6_Fig2_HTML.jpg](img/A436689_1_En_6_Fig2_HTML.jpg)


    **图 6-2.** 账本的概念与原则


    从图 6-2 中学到的主要经验是，账本必须履行两个相互对立的角色。一方面，账本作为所有权证明的手段，依赖于读取保存在账本中的历史数据。另一方面，账本必须记录任何所有权的转移，这反过来意味着要产生新数据并写入账本。这两个目的最重要的区别之一可以概括为透明性与隐私性的对立本质。


    当账本对任何人开放时，证明所有权更容易。因此，透明性是证明所有权的基础，其方式类似于证人在法庭上公开作证。然而，所有权的转移必须仅限合法所有者进行。因此，隐私构成了所有权转移的基础。由于在账本中写入意味着所有权变更，因此只有非常值得信赖的实体才能拥有对账本的写入权限。


    透明性与隐私性、证明所有权与转移所有权、读取账本与写入账本——这些相互冲突的力量同样存在于区块链中。事实证明，区块链是一个巨大的分布式点对点系统，由类似账本的数据结构构成，任何人都可以读取。


    ## 所有权与区块链


    以政府监管账本为形式的见证人，是厘清贵重物品所有权的关键。但如果这样的账本被损坏或销毁了，会发生什么？或者，如果负责更新账本的人犯了错误或故意伪造账本，又会怎样？在这种情况下，账本就不能反映现实。这是灾难性的，因为每个人都相信账本代表了真相，就像法庭上的证人一样。


    仅凭一个账本来作为厘清所有权的唯一来源，其问题可以用法庭审判中已解决的方式来处理。仅基于一个证人的证词来做出判决是有风险的，因为这个证人可能不诚实。拥有更多证人则更好。被质询的独立证人越多，那些在多数证词中一致提及的事实就越有可能反映真相。这个事实可以通过统计学和大数定律来证明。拥有许多独立观察、不受相互影响的证人，是这种探寻真相方法的关键。


    将这一发现应用于使用账本厘清所有权是直接的：与其维护一个可能被伪造的单一账本，不如利用一个完全分布式的点对点账本系统，并根据多数节点达成一致的现实版本来处理有关所有权的请求。


    此时，你可能想知道这一切与区块链有什么关系。使用账本管理所有权与区块链之间的关系总结如下：


    *   单个账本用于维护所有权信息，这相当于一个存储所有权相关数据的`区块链数据结构`。

    *   各个账本存储在点对点系统的计算机（节点）上。

    *   `区块链算法`负责让各个节点共同达成一个关于所有权状态的、作为最终判决依据的一致版本。

    *   该系统的完整性体现在其能够做出关于所有权的真实陈述。

    *   密码学对于创建可信的标识、身份验证和授权手段，以及确保数据安全性是必需的。


    ## 前景展望


    本步骤强调了所有权的重要特征，以及它们与账本属性之间的关系。此外，本步骤还概述了区块链如何与所有权和账本相关联。下一步将讨论在完全分布式的点对点账本系统中管理所有权所产生的一个重要影响。

    '
- fmt: "## Summary\n\n- A proof of ownership has three elements:\n    - Identification\
    \ of the owner\n    - Identification of the object being owned\n    - Mapping\
    \ the owner to the object\n- `ID` cards, birth certificates, and driver’s licenses\
    \ as well as serial numbers, production dates, production certificates, or a detailed\
    \ object description can be used in order to identify owners and objects.\n- The\
    \ mapping between owners and objects can be maintained in a ledger, which plays\
    \ the same role as a witness in a trial.\n- Having only one ledger is risky since\
    \ it can be damaged, destroyed, or forged. In this case, the ledger is no longer\
    \ a trustworthy source for clarifying ownership.\n- Instead of using only one\
    \ central ledger, one can utilize a group of independent ledgers for documenting\
    \ ownership and clarify requests concerning the ownership on that version of the\
    \ reality on which the majority of ledgers agrees.\n- It is possible to create\
    \ a purely distributed peer-to-peer system of ledgers by using the `blockchain-data-structure`.\
    \ Each `blockchain-data-structure` represents one ledger and is maintained by\
    \ one node of the system. The `blockchain-algorithm` is responsible for letting\
    \ the individual nodes collectively arrive at one consistent version of the state\
    \ of ownership. Cryptography is used to implement identification, authentication,\
    \ and authorization.\n- Integrity of a purely distributed peer-to-peer system\
    \ of ledgers is found in its ability to make true statements about ownership and\
    \ to ensure that only the lawful owner can transfer his or her property rights\
    \ to others.\n\nFootnotes [1]\n\nVan Tilborg, Henk, and Sushil Jajodia, eds. *Encyclopedia\
    \ of cryptography and security*. New York: Springer Science & Business Media,\
    \ 2014.\n\n# 7. Spending Money Twice\n\nExploiting a vulnerability of distributed\
    \ peer-to-peer systems\n\nIn the previous step, you learned about the relation\
    \ between purely distributed peer-to-peer systems and the most prominent use case\
    \ of the blockchain as a means to manage ownership. You also learned that the\
    \ integrity of a distributed peer-to-peer system of ledgers is found in its ability\
    \ to make true statements about ownership and to ensure that only the lawful owner\
    \ can transfer his or her property rights to others. But what does this statement\
    \ mean in real life? What happens if integrity is violated? This step considers\
    \ these questions in more details. In particular, this step introduces one of\
    \ the most important examples of violated integrity in distributed peer-to-peer\
    \ systems: the double spending problem.\n\n## The Metaphor\n\nCounterfeiting bank\
    \ notes is a severe crime in any country because it undermines the foundation\
    \ and functioning of the economy by creating purchasing power that is not backed\
    \ up by valuable resources. As a result, most bank notes are equipped with security\
    \ features that make counterfeiting impossible or prohibitively costly at least.\
    \ These security features, such as unique numbers, watermarks, or fluorescent\
    \ fibers, work well with physical bank notes and other physical goods. But what\
    \ happens if money or goods become digital and are managed in distributed peer-to-peer\
    \ systems of ledgers? This step explains a specific vulnerability of distributed\
    \ peer-to-peer systems used for managing ownership that is equivalent to counterfeiting\
    \ bank notes. As it turns out, this vulnerability is a prominent example of violated\
    \ system integrity.\n\n## The Double Spending Problem\n\nLet’s consider a peer-to-peer\
    \ system for managing ownership of real estate. In such a system, the ledgers\
    \ that keep track of ownership information are maintained by the individual computers\
    \ of its members instead of being maintained in a central database. Hence, each\
    \ peer maintains his or her own copy of the ledger. As soon as the ownership of\
    \ a house is transferred from one person to another, all the ledgers of the system\
    \ need to be updated in order to contain the latest version of reality. However,\
    \ passing information forward among peers and updating the individual ledgers\
    \ require time. Until the last member of the system receives the new information\
    \ and updates his or her copy of the ledger, the system will not be consistent.\
    \ Some peers already know about the latest transfer of ownership, while other\
    \ peers have not yet received that information. The fact that not all ledgers\
    \ have up-to-date information makes them prone to be exploited by anyone who already\
    \ has the latest information.\n\nLet’s also imagine the following situation. Person\
    \ A sells his house to person B. The transfer of ownership from A to B is documented\
    \ in one of the ledgers in the peer-to-peer system. This particular ledger needs\
    \ to inform other peers about this transfer, who in turn inform other peers as\
    \ well, until eventually all peers learn about the transfer of ownership from\
    \ A to B. However, suppose that person A quickly approaches another ledger of\
    \ the system and demands to document a different transfer of ownership of the\
    \ identical house: the sale from person A to person C. If this peer has not yet\
    \ learned about the transfer of ownership from A to B that happened in the past,\
    \ this peer will approve and document the transfer of ownership from A to C for\
    \ the identical house. Hence, A was able to sell his house twice by exploiting\
    \ the fact that distributing information about his first sell requires time. But\
    \ B and C cannot own the house at the same time. Only one of them is supposed\
    \ to be the new and lawful owner. Hence, the situation is called the double spending\
    \ problem."
