  trans: '

    # 隐喻


    1994 年，一位计算机科学家兼发明家描述了他即将开发的一个软件系统¹：


    - **去中心化**：没有中央权威，也没有单点故障。

    - **非歧视性**：每个人都可以自由选择自己的方式接入系统。

    - **开放性**：系统将在众目睽睽之下开发，鼓励最大程度的参与和试验。

    - **普适性**：所有参与的计算机，无论其硬件或地理位置如何，都能相互通信。

    - **共识**：系统及其用户将遵守那些通过基于共识的透明参与过程所制定的标准。


    这一系列特性读起来就像是对区块链的简短描述。然而，在 1994 年，区块链还不存在！实际上，这些要点所描述的系统是互联网，或者至少是蒂姆·伯纳斯-李对互联网的愿景。


    由于技术进步、互联网商业的兴起以及当今互联网巨头的崛起，互联网可能与蒂姆·伯纳斯-李早在 1994 年提出的互联网愿景已大相径庭。在思考区块链的未来时，应牢记一个事实：技术会不断发展，并因此与其发明者的愿景产生偏离。因此，互联网的演变可以被视为区块链未来演变的蓝图。


    # 进一步的演进与替代方案


    区块链并非一个一旦开发完成就一成不变的静态结构。本书所介绍和讨论的区块链仅提供了基础，而这个基础已经并将继续成为研究、改进和进一步发展的对象。² 其中一些可以看作是微小的技术改进，而另一些则是概念上的变革，甚至是可能导致独立和竞争性方法的根本性进步。在不声称完整性的前提下，以下改进和进一步发展的领域值得关注：


    - 微小的技术改进与变体

    - 提升可扩展性

    - 概念演进与替代方案


    ## 微小的技术改进与变体


    区块链利用了软件工程和计算机科学的广泛概念与原理，例如哈希函数、哈希引用、数据结构、数据存储、密码学、网络架构、计算机间通信以及计算难题。这些概念和技术中的每一个都曾是、并且仍然是活跃的研究领域。例如，有各种各样的哈希函数、数据结构、密码学过程、通信协议和计算难题可以用于区块链。因此，我们只需使用不同的哈希函数、创建密钥的密码学方法或用作工作量证明的计算难题，就能创建出不同版本的区块链。然而，这些变体对区块链的影响微乎其微，因为它们并未改变其基本运作方式；它们仅仅是在某些实现细节上有所变化。


    ## 提升可扩展性


    专注于提升区块链可扩展性的主要研究领域包括网络效率、存储、数据使用以及共识算法。³ 在这一领域非常有前景的方法有闪电通道⁴和支付通道，⁵ 它们能够实现商业上可接受的交易时间。


    ## 概念演进


    概念演进是区块链在运作方式、所提供的服务以及用户与其交互方式方面的真正进步。区块链概念演进最重要的领域包括：


    - 访问权限

    - 隐私性

    - 共识

    - 交易

    - 库存数据

    - 数据结构


    ### 访问权限


    限制对`blockchain-data-structure`的读取或写入访问权限，导致开发了区块链的不同版本。⁶ 正如在步骤 23 中已经解释的那样，结合关于读取区块链中数据权限的不同限制，产生了私有链和公有链；而限制向区块链写入数据的权限，则导致了无许可链和许可链的出现。这四种不同类型区块链的出现可被视为一种概念上的进步，因为它们对区块链的主要特性（如其目的、分布式性质和架构）产生了影响。


    ### 隐私性


    公有链的开放性早已成为讨论和进一步发展的主题，因为它与某些应用场景所需的隐私保护水平相冲突。私有链限制了读取权限，因此不再能被所有人用于根据交易数据的历史记录来厘清所有权。保护隐私的替代方法包括在现有区块链之上的隐私覆盖层，⁷
    或是专门关注隐私的分布式计算平台。⁸ 另一种方法是零知识证明，它允许你在无需完全访问用于创建证明的数据的情况下，证明陈述（例如，关于数字资产当前所有者的陈述）的正确性。⁹
    对于区块链而言，这项技术可以让每个人都能证明与所有权相关的陈述，而无需读取交易数据的所有细节。¹⁰


    ### 共识


    区块链的一个核心要素是，它持续选择所有节点一致同意的交易历史版本。导致计算成本的工作量证明，为选择交易历史以及解决过去竞争版本之间的冲突提供了标准基础。然而，基于创建交易历史所投入的计算能力来选择历史版本，让许多计算机科学家感到不满，因为巨大的计算能力可能被单个组织征服和积累，从而使其能够随意影响共识。


    因此，人们开发并讨论了在分布式系统中达成共识的不同标准以及不同算法。权益证明¹¹和权益速度证明¹² 是可能适用于加密货币的共识标准，因为它们将投票权与由共识本身管理的该资产的持有量或流通量挂钩。完全不同的共识算法包括`Paxos`¹³
    和`Raft`。¹⁴ 它们在区块链出现之前很久就已经被开发出来。然而，要令人满意地解释`Raft`或`Paxos`本身就是一项挑战，这超出了本书的范围。替代性共识机制面临的一个主要挑战是，它们通常在概念上更为复杂，因此更难进行形式化证明。如果其中存在博弈论上的缺陷，就可能导致使用该机制的区块链被破坏，并因此摧毁对该区块链的信心。

    '
- fmt: '# Transactions


    Transactions are a means to transfer ownership from one account to another and
    serve as a way to describe and verify ownership. It turns out that transactions
    are actually tiny self-contained contracts. They contain all of the necessary
    information to make a transfer of ownership happen. That insight led to the development
    of smart contracts that are executed by the blockchain. Similar to transaction
    data, smart contracts are machine-readable descriptions of the will of the involved
    parties. But unlike simple transaction data, smart contracts are much more flexible
    regarding the objects, subjects, actions, and conditions that can be used to describe
    the desired transfer of ownership. From a technical point of view, smart contracts
    are self-contained computer programs written in a blockchain-specific programming
    language. In order to accommodate smart contracts, the blockchain technology has
    been extended by the capability to execute programming code. This extension has
    transformed the blockchain from a distributed system that mainly focuses on storing
    transaction data into a distributed system of virtual machines that executes smart
    contracts.[^(15)](#A436689_1_En_25_Chapter.html#Fn15)


    The ability to run program code has opened up the possibilities for application
    development on the blockchain instead of just maintaining simple transaction data.
    When talking about smart contracts, we need to be careful; although the term initially
    implied a contract between counterparties, it is now used to refer to a piece
    of code that is managed and executed in an appropriated blockchain. However, there
    are moves from the legal profession to develop something more akin to that initial
    idea based on the idea of Ricardian contracts.[^(16)](#A436689_1_En_25_Chapter.html#Fn16)


    Due to their flexibility, smart contracts can be used to describe a wide range
    of real-world contracts such as paying rent on a regular basis, taking out a loan,
    repaying a loan, placing and settling complex bets, and issuing insurance payments
    on the occurrence of damages or complex events. As a result, the smart contract
    is the most important and promising development of the blockchain in the past
    few years.


    # Inventory Data


    The initial blockchain as discussed in the preceding steps is concerned with maintaining
    the integrity of an immutable append-only data store that can be used among others
    for maintaining the whole history of transaction data. However, as discussed in
    Step [9](#A436689_1_En_9_Chapter.html), ownership can be managed based on both
    transaction data and inventory data. The former approach seems to be appropriate
    when managing simple data, while the latter has proven useful in the context of
    smart contracts where the whole system is often considered a collection of states
    that can include arbitrary information such as account balances, bets, insurance
    contracts, reputation, or data that represent objects in the physical world.[^(17)](#A436689_1_En_25_Chapter.html#Fn17)
    As a result, the state of the whole system is stored as inventory data and is
    transformed by the execution of smart contracts, which are stored separately in
    an immutable append-only data store.


    # Data Structure


    The blockchain-data-structure is not a straight line of blocks; instead, it is
    actually a tree-shaped data structure whose branches represent conflicting versions
    of the history of transaction data. The major challenge of the blockchain-algorithm
    is to let the nodes of the distributed system select one of the branches as the
    authoritative chain consistently. An alternative approach of storing transaction
    data is to utilize a directed acyclic graph of blocks instead of a tree-shaped
    data structure. One can imagine a directed acyclic graph of blocks as a tree-shaped
    blockchain-data-structure whose branches merge later on. The usage of an acyclic
    graph for storing the transaction history has far-reaching consequences on performance,
    clarifying ownership, and reaching consensus among peers.[^(18)](#A436689_1_En_25_Chapter.html#Fn18)


    # Major Accomplishments of the Blockchain


    It is well-accepted knowledge that people tend to overestimate the short-term
    effects of technology while ignoring its long-term impacts. The evolution of the
    Internet and its impact on our society not only confirm that wisdom, but it also
    shows that estimating long-term effects of technical innovations is hard. However,
    the following aspects are promising candidates for becoming the long-term accomplishments
    of the blockchain:


    * Disintermediation

    * Automation

    * Standardization

    * Streamlining processes

    * Increased processing speed

    * Cost reduction

    * Shift toward trust in protocols and technology

    * Making trust a commodity

    * Increased technology awareness


    ## Disintermediation


    The blockchain does not destroy the role of the middleman but instead it establishes
    itself as a digital and strictly rule-following middleman. Replacing one middleman
    with another may not be a big deal, but replacing a human organization that relies
    on the trust of its customers with a software system that encodes trust is a huge
    achievement. Furthermore, replacing a cascade of middlemen with one system that
    orchestrates the direct interactions of peers in a secure way is indeed a huge
    achievement. Hence, disintermediation is an accomplishment of the blockchain whose
    impact could remain.


    ## Automation


    In order to fulfill its role as digital middleman, the blockchain relies on automation.
    The more the blockchain is used, the more it will replace manual tasks of established
    intermediaries by automated interactions between peers. Hence, another accomplishment
    of the blockchain could its potential to foster automation.


    ## Standardization


    The automated processing of transactions offered by the blockchain is based on
    the existence of rules and standards. Hence, the more the blockchain is used,
    the more transactions and interactions between contracting parties will be standardized.
    So fostering standardization of peer interactions could be another long-term accomplishment
    of the blockchain.


    ## Streamlining Processes


    As a consequence of standardization and automation, business processes will become
    more transparent and streamlined. Many organizations reviewed and analyzed their
    business processes as a side effect of preparing themselves for transition to
    the blockchain. Hence, the review of existing business processes and redesigning
    and streamlining them could be another accomplishment of the blockchain that may
    persist.


    ## Increased Processing Speed


    Disintermediation, standardization, streamlined processes, and automation lead
    to a significant speed up of processes. Hence, one can expect that the more the
    blockchain is used, the more timely transactions and interactions between contracting
    parties will be executed. The speeding up of processes that once involved time-consuming
    manually performed tasks could be another long-term contribution of the blockchain.


    ## Cost Reduction


    The economic consequence of automation, disintermediation, and standardization
    is often a reduction of costs. History has shown that cost-reducing effects of
    automation have driven and reshaped many industries and as a result made many
    goods affordable to a wider range of people. However, the cost-reducing effect
    of automation is not limited to producing cars, televisions, mobile phones, and
    clothes. The cost-reduction of intermediation could be the most noticeable long-term
    contribution of the blockchain from an economic point of view.'
  raw: '#### Transactions


    Transactions are a means to transfer ownership from one account to another and
    serve as a way to describe and verify ownership. It turns out that transactions
    are actually tiny self-contained contracts. They contain all of the necessary
    information to make a transfer of ownership happen. That insight led to the development
    of smart contracts that are executed by the blockchain. Similar to transaction
    data, smart contracts are machine-readable descriptions of the will of the involved
    parties. But unlike simple transaction data, smart contracts are much more flexible
    regarding the objects, subjects, actions, and conditions that can be used to describe
    the desired transfer of ownership. From a technical point of view, smart contracts
    are self-contained computer programs written in a blockchain-specific programming
    language. In order to accommodate smart contracts, the blockchain technology has
    been extended by the capability to execute programming code . This extension has
    transformed the blockchain from a distributed system that mainly focuses on storing
    transaction data into a distributed system of virtual machines that executes smart
