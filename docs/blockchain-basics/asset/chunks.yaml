  trans: "\n# 同时考虑两个层面\n\n识别功能性与非功能性方面，以及分离应用层与实现层可以同时进行，从而形成一个二维表格。表 1-1 展示了以这种方式对手机进行心智分层的结果。\n\
    \n表 1-1. 手机心智分层示例\n\n| 层面 | 功能性方面 | 非功能性方面 |\n| --- | --- | --- |\n| 应用层 | 拍照\
    \ 打电话 发送电子邮件 浏览互联网 发送聊天消息 | 图形用户界面美观 易于使用 消息发送速度快 |\n| 实现层 | 内部保存用户数据 连接最近的移动基站\
    \ 访问数码相机像素点 | 高效存储数据 节省能源 保持完整性 确保用户隐私 |\n\n表 1-1 或许可以解释系统中特定元素对用户而言的可见性（或不可见性）。应用层的功能性方面是系统中最显而易见的元素，因为它们服务于用户的显性需求。用户通常最先学习的就是这些元素。另一方面，实现层的非功能性方面很少被视为系统的主要元素，它们通常被认为是理所当然的。\n\
    \n## 完整性\n\n完整性是任何软件系统的一个重要非功能性方面。它包含三个主要组成部分²：\n\n*   **数据完整性**：系统使用和维护的数据是完整、正确且无矛盾的。\n\
    *   **行为完整性**：系统的行为符合预期，没有逻辑错误。\n*   **安全性**：系统能够仅限授权用户访问其数据和功能。\n\n我们大多数人可能认为软件系统的完整性是理所当然的，因为大多数时候我们幸运地与保持完整性的系统进行交互。这是因为程序员和软件工程师投入了大量时间和精力来开发系统，以实现和维护完整性。因此，在欣赏软件工程师为创建高完整性系统所做的工作时，我们可能有点被宠坏了。但是，一旦我们与一个未能保持完整性的系统交互时，我们的感受就会改变。在那些时刻，你会面临数据丢失、软件行为不合逻辑，或者意识到陌生人能够访问你的私人数据。在那些时刻，你的手机、电脑、电子邮件软件、文字处理器或电子表格计算器会让你生气，让你忘了礼貌！在这些时刻，我们开始意识到软件完整性是一种非常有价值的商品。因此，软件专业人士花费大量时间处理这个看似微小的实现层非功能性方面，也就不足为奇了。\n\
    \n## 展望\n\n本步骤介绍了软件工程的一些通用原则。特别是，阐述了完整性、功能性与非功能性方面，以及软件系统的应用与实现等概念。理解这些概念将有助于你体会区块链存在的更广阔背景。下一步将使用本步骤引入的概念来呈现更宏观的图景。\n\
    \n## 总结\n\n*   可以通过以下方式分析系统：\n    *   应用层和实现层\n    *   功能性和非功能性方面\n*   应用层关注用户需求，而实现层关注如何实现需求。\n\
    *   功能性方面关注“做什么”，而非功能性方面关注“怎么做”。\n*   大多数用户关心的是系统应用层的功能性方面，而系统的非功能性方面，尤其是实现层的非功能性方面，对用户来说不那么显眼。\n\
    *   完整性是任何软件系统的重要非功能性方面，它包含三个主要元素：\n    *   数据完整性\n    *   行为完整性\n    *   安全性\n\
    *   大多数软件故障，例如数据丢失、行为不合逻辑或陌生人访问个人数据，都是系统完整性被破坏的结果。\n\n**脚注**\n\n1 Chung, Lawrence,\
    \ 等. *软件工程中的非功能性需求*. 第 5 卷. 纽约: Springer Science & Business Media, 2012.\n\n2\
    \ Boritz, J. Efrim. *IS 从业者对信息完整性核心概念的看法*. International Journal of Accounting\
    \ Information Systems 6.4 (2005): 260–279.\n\n# 2. 纵观全局\n\n软件架构及其与区块链的关系\n\n本步骤不仅提供了区块链所处的宏观图景，还突出了它在宏观图景中的位置。为了让您能够看清全局，本步骤引入了软件架构的概念，并解释了它与将系统分为层次和方面这一概念的关系。为了帮助您识别区块链在宏观图景中的位置，本步骤强调了区块链与软件架构之间的关系。最后，本步骤用一句话指出了区块链的核心目的。理解其目的是理解区块链以及后续步骤课程的基础。\n\
    \n## 隐喻\n\n您买过车吗？我们大多数人都有过。即使您从未买过车，您可能也知道汽车配备了不同类型的发动机（例如，柴油、汽油或电动发动机）。这是模块化过程的一个例子，是将分层思想应用于汽车的结果。购买汽车时可以选择不同的发动机，这会导致车辆性能产生惊人的差异。两辆外观相同的汽车，其发动机功率可能存在巨大差异，从而产生截然不同的驾驶性能。此外，您对发动机的选择还会影响汽车的其他特性，例如价格、运营成本、消耗的燃料类型、排气系统以及制动器的尺寸。有了这幅图景，理解区块链在宏观图景中的作用就会容易得多。\n\
    \n## 支付系统\n\n让我们将分层概念应用于支付系统。表 2-1 显示了用户的一些需求以及应用层和实现层的一些非功能性方面。\n\n表 2-1. 支付系统的方面与层面\n\
    \n| 层面 | 功能性方面 | 非功能性方面 |\n| --- | --- | --- |\n| 应用层 | 存钱 取钱 转账 监控账户余额 | 图形用户界面美观\
    \ 易于使用 转账速度快 系统参与者众多 |\n| 实现层 | ？ | 全天候可用 防欺诈 保持完整性 确保用户隐私 |\n\n您是否注意到表格中通常显示用于使系统正常工作的技术信息的那部分有一个问号？这个位置是有意留空的。这是您决定使用哪个“引擎”来运行您系统的地方。下一节将告诉您更多关于软件系统中与发动机相当的内容。\n"
- fmt: '# Two Types of Software Architecture


    There are many ways to implement software systems. However, one of the fundamental
    decisions when implementing a system concerns its architecture, the way in which
    its components are organized and related to one another. The two major architectural
    approaches for software systems are centralized and distributed.[¹](#A436689_1_En_2_Chapter.html#Fn1)


    In centralized software systems, the components are located around and connected
    with one central component. In contrast, the components of distributed systems
    form a network of connected components without having any central element of coordination
    or control.


    Figure [2-1](#A436689_1_En_2_Chapter.html#Fig1) depicts these two contrary architectures.
    The circles in the figure represent system components, also called nodes, and
    the lines represent connections between them. At this point, it is not important
    to know the details of what these components do and what information is exchanged
    between the nodes. The important point is the existence of these two different
    ways of organizing software systems. On the left-hand side of Figure [2-1](#A436689_1_En_2_Chapter.html#Fig1),
    a distributed architecture is illustrated where components are connected with
    one another without having a central element. It is important to see that none
    of the components is directly connected with all other components. However, all
    components are connected with one another at least indirectly. The right-hand
    side of Figure [2-1](#A436689_1_En_2_Chapter.html#Fig1) illustrates a centralized
    architecture where each component is connected to one central component. The components
    are not connected with one another directly. They only have one direct connection
    to the central component.


    ![A436689_1_En_2_Fig1_HTML.jpg](A436689_1_En_2_Fig1_HTML.jpg)


    Figure 2-1. Distributed (left) vs. centralized (right) system architecture


    # The Advantages of Distributed Systems


    The major advantages of a distributed system over single computers are[²](#A436689_1_En_2_Chapter.html#Fn2):


    - Higher computing power

    - Cost reduction

    - Higher reliability

    - Ability to grow naturally


    ## Higher Computing Power


    The computing power of a distributed system is the result of combining the computing
    power of all connected computers. Hence, distributed systems typically have more
    computing power than each individual computer. This has been proven true even
    when comparing distributed systems comprised of computers of relatively low computing
    power with isolated super computers.


    ## Cost Reduction


    The price of mainstream computers, memory, disk space, and networking equipment
    has fallen dramatically during the past 20 years. Since distributed systems consist
    of many computers, the initial costs of distributed systems are higher than the
    initial costs of individual computers. However, the costs of creating, maintaining,
    and operating a super computer are still much higher than the costs of creating,
    maintaining, and operating a distributed system. This is particularly true since
    replacing individual computers of a distributed system can be done with no significant
    overall system impact.


    ## Higher Reliability


    The increased reliability of a distributed system is based on the fact that the
    whole network of computers can continue operating even when individual machines
    crash. A distributed system does not have a single point of failure. If one element
    fails, the remaining elements can take over. Hence, a single super computer typically
    has a lower reliability than a distributed system.


    ## Ability to Grow Naturally


    The computing power of a distributed system is the result of the aggregated computing
    power of its constituents. One can increase the computing power of the whole system
    by connecting additional computers with the system. As a result, the computing
    power of the whole system can be increased incrementally on a fine-grained scale.
    This supports the way in which the demand for computing power increases in many
    organizations. The incremental growth of distributed systems is in contrast to
    the growth of the computing power of individual computers. Individual computers
    provide identical power until they are replaced by a more powerful computer. This
    results in a discontinuous growth of computing power, which is only rarely appreciated
    by the consumers of computing services.


    # The Disadvantages of Distributed Systems


    The disadvantages of distributed systems compared to single computers are:


    - Coordination overhead

    - Communication overhead

    - Dependency on networks

    - Higher program complexity

    - Security issues


    ## Coordination Overhead


    Distributed systems do not have central entities that coordinate their members.
    Hence, the coordination must be done by the members of the system themselves.
    Coordinating work among coworkers in a distributed system is challenging and costs
    effort and computing power that cannot be spent on the genuine computing task,
    hence, the term coordination overhead.


    ## Communication Overhead


    Coordination requires communication. Hence, the computers that form a distributed
    system have to communicate with one another. This requires the existence of a
    communication protocol and the sending, receiving, and processing of messages,
    which in turn costs effort and computing power that cannot be spend on the genuine
    computing task, hence, the term communication overhead.


    ## Dependencies on Networks


    Any kind of communication requires a medium. The medium is responsible for transferring
    information between the entities communicating with one another. Computers in
    distributed systems communicate by means of messages passed through a network.
    Networks have their own challenges and adversities, which in turn impact the communication
    and coordination among computers that form a distributed system. However, without
    any network, there will be no distributed system, no communication, and therefore
    no coordination among the nodes, thus the dependency on networks.


    ## Higher Program Complexity


    Solving a computation problem involves writing programs and software. Due to the
    disadvantages mentioned previously, any software in a distributed system has to
    solve additional problems such as coordination, communication, and utilizing of
    networks. This increases the complexity of the software.


    ## Security Issues


    Communication over a network means sending and sharing data that are critical
    for the genuine computing task. However, sending information through a network
    implies security concerns as untrustworthy entities may misuse the network in
    order to access and exploit information. Hence, any distributed system has to
    address security concerns. The less restricted the access to the network over
    which the distributed nodes communicate is, the higher the security concerns are
    for the distributed system.


    # Distributed Peer-to-Peer Systems


    Peer-to-peer networks are a special kind of distributed systems. They consist
    of individual computers (also called nodes), which make their computational resources
    (e.g., processing power, storage capacity, data or network bandwidth) directly
    available to all other members of the network without having any central point
    of coordination. The nodes in the network are equal concerning their rights and
    roles in the system. Furthermore, all of them are both suppliers and consumers
    of resources.


    Peer-to-peer systems have interesting applications such as file sharing, content
    distribution, and privacy protection. Most of these applications utilize a simple
    but powerful idea: turning the computers of the users into nodes that make up
    the whole distributed system. As a result, the more users or customers use the
    software, the larger and more powerful the system becomes. This idea, its consequences,
    and it challenges are discussed in the following steps.'
