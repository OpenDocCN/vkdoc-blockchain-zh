    \ content of the input data in the same way as an isolated fingerprint does not\
    \ tell you anything about the person whose finger created it. One-way functions\
    \ are also said to be noninvertible.\n\n### Collision Resistant\n\nA hash function\
    \ is called collision resistant if it is very hard to find two or more distinct\
    \ pieces of data for which it yields the identical hash value. Or, to put it differently,\
    \ if the chance to receive an identical hash value for distinct pieces of data\
    \ is small, then the hash function is collision resistant. In this case, you can\
    \ consider the hash values created by the hash function as being unique and hence\
    \ being usable to identify data. If you obtained an identical hash value for different\
    \ pieces of data, you would face a hash collision. A hash collision is the digital\
    \ equivalent to having two people with identical fingerprints . Being collision\
    \ resistant is mandatory for hash values to be usable as digital fingerprints.\
    \ How collision resistant hash functions work internally is beyond the scope of\
    \ this book, but you can be assured that huge effort has been spent on reducing\
    \ their risk to produce hash collisions ."
  trans: "\n# 摘要\n\n- 交易数据提供以下信息，用于描述所有权的转移：\n  - 发起交易并将其所有权转移至另一账户的账户标识符\n  - 将接收所有权的账户标识符\n\
    \  - 要转移的商品数量\n  - 交易完成的时间\n  - 为执行交易而向系统支付的费用\n  - 证明交出所有权的账户所有者同意该转移的凭据\n- 交易数据的完整历史构成一条审计轨迹，为人们如何获取和交出所有权提供证据。\n\
    - 任何不属于该历史记录的交易都被视为从未发生过。\n- 通过将交易添加到历史记录中，并使其影响数据聚合结果，交易即被执行。\n- 交易数据添加到历史记录中的顺序必须保留，以确保在聚合这些数据时得到相同的结果。\n\
    - 为维护完整性，只有满足以下三个条件的交易数据才能添加到`blockchain-data-structure`中：\n  - 形式正确性\n  - 语义正确性\n\
    \  - 授权\n\n脚注 ¹\n\n中本聪（Satoshi Nakamoto）。*比特币：一种点对点的电子现金系统*（2008 年）。\n\n# 10.\
    \ 数据哈希\n\n从数字指纹识别数据\n\n本步骤阐释区块链最重要的基础技术之一：哈希值。它讨论了加密哈希函数的重要属性，并介绍了将哈希函数应用于数据的几种模式。\n\
    \n## 隐喻\n\n指纹是人类手指全部或任意部分摩擦嵴的印痕。人们认为指纹能够唯一地识别人类个体。指纹已被用于调查犯罪、识别罪犯以及为无辜者脱罪。本步骤介绍了一个用于识别数据的概念，可以将其视为数字领域的指纹等价物。该概念被称为加密哈希值，区块链广泛使用了这一概念。因此，理解加密哈希是理解区块链的必要条件。\n\
    \n## 目标\n\n在分布式点对点系统中，你将处理海量的交易数据。因此，你需要能够尽可能快速、简便地唯一识别并比较这些数据。所以，目标是通过数字指纹来唯一识别交易数据，以及可能产生的任何类型的数据。\n\
    \n## 工作原理\n\n哈希函数是小型计算机程序，它能够将任何类型的数据转换为固定长度的数字，无论输入数据的大小如何。¹ 哈希函数在任意给定时刻只接受一条数据作为输入，并根据构成该数据的比特和字节创建一个哈希值。哈希值可能包含前导零以达到所需长度。存在许多不同的哈希函数，它们之间在生成的哈希值长度等方面有所差异。一组重要的哈希函数被称为加密哈希函数，它们能为任何类型的数据创建数字指纹。加密哈希函数具有以下特性²：\n\
    \n- 快速为任何类型的数据提供哈希值\n- 确定性\n- 伪随机性\n- 单向函数\n- 抗碰撞性\n\n### 快速为任何数据提供哈希值\n\n这个特性实际上是两个特性的组合。首先，哈希函数能够为所有类型的数据计算哈希值。其次，哈希函数能快速完成计算。这些特性很重要，因为你不会希望哈希函数产生无用的东西，比如错误消息，或者花费大量时间才返回结果。\n\
    \n### 确定性\n\n确定性意味着哈希函数对于相同的输入数据会产生相同的哈希值。这意味着，数据哈希值出现的任何差异都必须完全由输入数据的差异引起，而不是由哈希函数的内部机制造成。\n\
    \n### 伪随机性\n\n伪随机性意味着当输入数据发生变化时，哈希函数返回的哈希值会发生不可预测的改变。即使只对输入数据进行了一点点修改，产生的哈希值也会不可预测地变化。换句话说，修改后数据的哈希值必须总是出乎意料的。不可能根据输入数据来预测哈希值。\n\
    \n### 单向函数\n\n单向函数无法通过其输出值追溯其输入值。因此，作为单向函数意味着它不能反过来使用。换句话说，基于哈希值恢复原始输入数据是不可能的。这意味着哈希值不会告诉你关于输入数据内容的任何信息，就像一张孤立的指纹不会告诉你关于生成该指纹的人的任何信息一样。单向函数也被称为不可逆函数。\n\
    \n### 抗碰撞性\n\n如果一个哈希函数极难找到两段或多段不同的数据能产生相同的哈希值，则称该哈希函数具有抗碰撞性。或者，换句话说，如果不同数据得到相同哈希值的几率很小，那么该哈希函数就是抗碰撞的。在这种情况下，你可以认为该哈希函数生成的哈希值是唯一的，因此可用于识别数据。如果你为不同的数据得到了相同的哈希值，那就会面临哈希碰撞。哈希碰撞在数字领域相当于两个人拥有相同的指纹。抗碰撞性是哈希值能用作数字指纹的必要条件。哈希函数内部如何实现抗碰撞性超出了本书的讨论范围，但请放心，人们已经投入巨大努力来降低哈希函数产生碰撞的风险。\n"
- fmt: '# Trying It Out Yourself


    This section will help you become comfortable with applying hash functions by
    guiding you through a simple example. For this purpose, I refer to the accompanying
    website that provides a tool for creating hash values of simple text data: [`http://www.blockchain-basics.com/HashFunctions.html`](http://www.blockchain-basics.com/HashFunctions.html).


    When you open that webpage in your Internet browser, you will see an input box
    and an output box, as shown in Figure [10-1](#A436689_1_En_10_Chapter.html#Fig1).
    Type the text `Hello World!` in the input box on the left-hand side and click
    the button with the label "Calculate Hash Value" located below the text field.
    Make sure that you type `Hello World!` exactly in the input box, otherwise you
    will get results that differ from those shown in Figure [10-1](#A436689_1_En_10_Chapter.html#Fig1).


    ![A436689_1_En_10_Fig1_HTML.jpg](A436689_1_En_10_Fig1_HTML.jpg)


    **Figure 10-1.** Calculating hash values of a short text


    As a result of clicking the button, the output box on the right-hand side will
    present the hash value of the input text calculated with four different hash functions.
    Hash values are often regarded as hash numbers since they use not only the digits
    0 to 9 but also the letters A to F, which represent the values 11 to 16 in order
    to express numerical values. Those numbers are called hexadecimal numbers. Computer
    scientists love them for reasons I do not want discuss here. Notice that the hash
    values differ due to the different implementation details of the hash functions
    that produce them. These values are taken for granted, since we do not want to
    lose ourselves in the wide topic of implementation of hash functions.


    Cryptographic hash values are quite long and therefore hard to read or to compare
    for the human eye. However, in the course of this step, you will compare different
    ways of hashing data, which involves reading and comparing hash values. Doing
    so with cryptographic hash values will quickly become a tedious task. Hence, for
    didactical reasons, I use a shortened version of the SHA256 cryptographic hash
    value in the remainder of this step. You can reproduce all hash values by using
    the tool provided on the accompanying website: [`www.blockchain-basics.com/Hashing.html`](http://www.blockchain-basics.com/Hashing.html).


    When you open that website in your Internet browser, you will see an input box
    for simple texts, a button with an arrow that points to an output box, as shown
    in Figure [10-2](#A436689_1_En_10_Chapter.html#Fig2). When you click the button
    with the arrow, the output box will present the shortened hash value of the text
    provided in the input box.


    ![A436689_1_En_10_Fig2_HTML.jpg](A436689_1_En_10_Fig2_HTML.jpg)


    **Figure 10-2.** Calculating the shortened hash value of a text


    # Patterns of Hashing Data


    So far you have learned that a piece of data can be used as input for a hash function,
    which in turn yields the hash value of that data. This implies that each independent
    piece of data has its own unique cryptographic hash value. But what would you
    do if you were asked to provide one single hash value for a bunch of independent
    pieces of data? Remember, hash functions only accept one piece of data at a given
    time. There is no hash function that accepts a bunch of independent data at once,
    but, in reality, we often need one single hash value for a large collection of
    data. In particular, the blockchain-data-structure has to deal with many transaction
    data at once and requires one single hash value for all of them. How do you deal
    with this task?


    The answer is to utilize one of the following patterns in applying hash functions
    to data:


    * Independent hashing

    * Repeated hashing

    * Combined hashing

    * Sequential hashing

    * Hierarchical hashing


    ## Independent Hashing


    Independent hashing means applying the hash function to each piece of data independently.
    Figure [10-3](#A436689_1_En_10_Chapter.html#Fig3) illustrates this concept by
    calculating the shortened hash value of two distinct words separately.


    ![A436689_1_En_10_Fig3_HTML.jpg](A436689_1_En_10_Fig3_HTML.jpg)


    **Figure 10-3.** Schematic illustration of hashing different data independently


    The white boxes that each contain a word represent the data to be hashed and the
    gray circles exhibit the corresponding hash values. The arrows that point from
    the boxes to the circles schematically illustrate the transformation of data into
    hash values. As one can see in Figure [10-3](#A436689_1_En_10_Chapter.html#Fig3),
    the distinct words yield different hash values.


    ## Repeated Hashing


    You have learned that hash functions transform any arbitrary piece of data into
    a hash value. A hash value itself can be considered a piece of data. Hence, it
    should be possible to provide a hash value as input to a hash function and calculate
    its hash value too. And this in fact works! Repeated hashing is the repeated application
    of a hash function to its own outcome. Figure [10-4](#A436689_1_En_10_Chapter.html#Fig4)
    illustrates the concept by calculating the shortened hash value repeatedly. The
    text `Hello World!` yields the hash value `7F83B165`, which in turn yields the
    shortened hash value of `45A47BE7`.


    ![A436689_1_En_10_Fig4_HTML.jpg](A436689_1_En_10_Fig4_HTML.jpg)


    **Figure 10-4.** Calculating hash values repeatedly


    ## Combined Hashing


    The goal of combined hashing is to get a single hash value for more than one piece
    of data in one attempt. Combining all independent pieces of data into one piece
    of data and calculating its hash value afterward is the way to achieve this. This
    is in particular useful if you want to create one single hash value for a collection
    of data that is available at a given time. Since combining data costs computing
    power, time, and memory space, combined hashing should only be used when the individual
    pieces of data are small. Another drawback of combined hashing is that the hash
    values of the individual pieces of data are not available since only the combined
    data are handed over to the hash function.


    Figure [10-5](#A436689_1_En_10_Chapter.html#Fig5) depicts the concept of combined
    hashing. The individual words are first combined into one word with a letter space
    between them and the resulting phrase is hashed afterward. The resulting hash
    value shown in Figure [10-5](#A436689_1_En_10_Chapter.html#Fig5) is consequently
    identical to the first hash value in Figure [10-4](#A436689_1_En_10_Chapter.html#Fig4).
    Note that the hash value of the combined data critically depends on the way the
    data are combined. In Figure [10-4](#A436689_1_En_10_Chapter.html#Fig4), the two
    words were combined by writing them next to each other with a letter space between
    them, which consequently yields `Hello World!`. Sometimes specific symbols such
    as the plus sign (`+`) or hashtag sign (`#`) are used to mark the point where
    the data are connected, which, as a result, influences the resulting hash value.


    ![A436689_1_En_10_Fig5_HTML.jpg](A436689_1_En_10_Fig5_HTML.jpg)


    **Figure 10-5.** Combining data and subsequently calculating the hash value'
