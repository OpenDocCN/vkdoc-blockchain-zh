    responsibility in the context of initiating, executing, and settling contractual
    interactions. Due to open questions regarding the legal acceptance of the blockchain,
    people expressed their doubt whether the blockchain as a fully automated protocol-driven
    transaction machinery can take the responsibility of its actions in the same way
    traditional intermediaries do. However, this criticism may foster legal initiatives
    for clarifying open issues regarding the legal status of the blockchain .


    ### Loss of Jobs


    Automation and standardization have not only shaped the process and the costs
    of producing goods but also caused friction in the labor market. Many players
    in the financial industry such as banks, brokers, custodians, money-transfer agencies,
    and notaries are directly tied to their roles as intermediaries. Many jobs in
    these institutions could be at risk when a huge portion of financial transactions
    are processed in an automated fashion through the blockchain.


    ### Reintermediation


    The complexity and its open legal status may discourage individual people as well
    as organizations from using the blockchain, which can cause an effect that counteracts
    disintermediation. Instead of using the blockchain in order to interact with contracting
    parties directly, people may decide to utilize services offered by intermediaries,
    which in turn use the blockchain. This could lead to a renaissance of intermediaries
    that are supposed to be replaced by the blockchain. This effect could seriously
    slow down the adoption of the blockchain and counteract some of its major accomplishments.'
  trans: '

    ### 向协议与技术的信任转变


    区块链用对基于计算机验证的绝对逻辑以及共识机制力量的信任，取代了对人或人类组织的信任。这可能会改变我们在个人层面以及社会层面对信任和可靠性的认知。因此，从社会学角度来看，向安全协议和计算达成共识的信任转变，可被视为区块链最重要的长期影响之一。


    ### 将信任变成一种商品


    自动化与标准化不仅降低了许多行业的生产时间和成本，还让过去昂贵的许多消费品变得对大众而言负担得起。例如，你还记得 30 年前一个袖珍计算器、一台个人电脑或一部手机有多贵吗？如今，袖珍计算器被当作营销赠品，而性能比早期美国国家航空航天局太空计划所用计算机高出数个数量级的电脑，用零花钱就能买得起。这主要归功于计算机芯片和半导体生产的自动化与标准化。我们可以期待，由于区块链引入的自动化与标准化，商业互动的信任、安全启动、执行与结算将变得像袖珍计算器一样廉价且无处不在。对于那些每天都需要启动、执行和结算商业互动作为日常工作一部分的人来说，这可能是区块链最显著的长期影响。


    ### 技术意识的提升


    区块链是一个高度复杂的技术构造，它通过使用不可变数据结构和共识算法，解决了在分布式点对点系统中实现完整性的高难度技术问题。这个主题似乎并非注定能吸引商业世界的关注。然而，区块链已经并持续从众多方面获得大量关注。对技术兴趣的增加以及我们对技术在生活中作用的认识提升，可被视为区块链的附带效应，但这些是受欢迎的发展，因为许多行业的成功以及我们社会的财富，都关键取决于对技术挑战的掌握。


    ## 可能的缺点


    除了积极影响和成就，区块链也可能导致不想要的副作用甚至负面结果。其中最重要的几点是：


    -   缺乏隐私

    -   个人责任的丧失

    -   工作岗位的流失

    -   再中介化


    ### 缺乏隐私


    公共区块链不会隐藏其任何数据。相反，任何人都能读取全部的交易历史。这种透明程度对那些想保护隐私的人来说是可怕的。考虑到大型企业或情报机构已经收集和利用个人数据的程度，这些担忧是可以理解的。然而，这种批评可能会促进私有区块链的发展与普及，或推动高级安全协议的应用。此外，这可能会催生一种观念，即人们可以拥有自己的个人数据，并能够出售访问或使用这些数据的权利。其结果是，搜索引擎和社交媒体平台等现有的中介机构可能会失去用户的认可和市场份额。


    ### 个人责任的丧失


    个人责任的丧失通常被认为是去中介化的后果。中介机构不仅将合同各方联系在一起，还可能提供担保。当交易出现意外时，他们提供调解，并且有义务为其行为承担责任。从对人和人类组织的信任转向对协议和技术的信任，可能会导致在发起、执行和结算合同互动过程中，个人服务和个人责任的缺失。由于区块链法律认可方面存在悬而未决的问题，人们质疑，作为完全自动化的、由协议驱动的交易机制，区块链能否像传统中介机构那样为其行为承担责任。然而，这种批评可能会推动法律倡议，以澄清关于区块链法律地位的未解决问题。


    ### 工作岗位的流失


    自动化与标准化不仅塑造了商品的生产流程和成本，也导致了劳动力市场的摩擦。金融行业的许多参与者，如银行、经纪商、托管机构、汇款机构和公证人，都直接与其中介角色绑定。当大量金融交易通过区块链以自动化方式处理时，这些机构中的许多工作岗位可能面临风险。


    ### 再中介化


    区块链的复杂性及其尚不明确的法律地位，可能会阻碍个人和组织使用区块链，从而产生一种与去中介化相悖的效果。人们可能不会为了直接与合同方互动而使用区块链，而是决定使用中介机构提供的服务，而这些中介机构则转而使用区块链。这可能导致本应被区块链取代的中介机构迎来复兴。这种效应可能会严重减缓区块链的采用，并抵消其一些主要成就。

