  trans: "\n# 为何有效\n\n共同构建`blockchain-data-structure`有点类似于参与一个持续进行的投票机制。在这场关于应选择哪条交易历史的持续投票中，每个单一节点只有微弱的发言权，但所有节点共同构成了一个强大的群体，持续地选择其自身的历史。之所以有效，是因为参与这场持续投票既非毫无成本，也非无法容纳。参与投票需要完成解决哈希难题所需的工作量，而通过提交投票或一个新的区块，节点为了获得奖励而将其自身承诺于此。由于所有节点都独立使用相同的标准来选择交易历史，最终所有节点达成共识。\n\
    \n# 展望\n\n本步骤聚焦于纯分布式点对点系统中的节点如何就共同维护的交易数据历史达成一致意见，并强调了`hash-puzzle`对于达成共识和维护完整性的重要性。下一步将讨论奖励的重要性，以及用于补偿节点为系统完整性做出贡献的支付工具。\n\
    \n# 总结\n\n-   网络中发送新区块的延迟，或两个节点几乎同时创建新区块，会导致`blockchain-data-structure`长成一棵树或柱状仙人掌的形状，其分支从共同的主干上生出，代表交易历史的冲突版本。\n\
    -   选择交易历史的相同版本是一个集体决策问题。\n-   分布式共识是纯分布式点对点系统中的成员在集体决策问题上达成的一致意见。\n-   区块链的集体决策问题具有以下特征：\n\
    \    -   所有节点都在相同的环境中运行，该环境由网络、维护各自`blockchain-data-structure`副本的节点，以及规范节点行为的`blockchain-algorithm`组成。\n\
    \    -   决策问题是在所有节点间选择相同的交易历史。\n    -   所有节点都力求最大化其个人收入，这些收入作为将有效新区块添加到`blockchain-data-structure`中的奖励。\n\
    \    -   为了实现目标，所有节点将其新区块发送给所有对等节点，以供其检查和接受。结果，每个节点都在共同维护的`blockchain-data-structure`这个环境中留下了自己的印记。\n\
    \    -   所有节点使用相同的标准来选择交易数据的历史。\n-   `最长链标准`指出每个节点独立选择树形`blockchain-data-structure`中包含最多区块的那条路径。\n\
    -   `最重链标准`指出每个节点独立选择树形`blockchain-data-structure`中累计难度最高的那条路径。\n-   选择树形`blockchain-data-structure`中的一条路径会产生以下后果：\n\
    \    -   孤儿区块\n    -   被追回的奖励\n    -   明确所有权\n    -   交易重新处理\n    -   不断增长的主干\n\
    \    -   最终一致性\n    -   对抗操纵的鲁棒性\n-   一个区块在权威链中位置越深：\n    -   它被添加的时间越早\n    -\
    \   自它被纳入`blockchain-data-structure`以来经过的时间越长\n    -   花费在添加后续区块上的共同工作量越多\n  \
    \  -   它受属于最长链的区块随机变化的影响越小\n    -   它被放弃的可能性越小\n    -   它被系统节点接受的程度越高\n    - \
    \  它在节点共同历史中的根基越稳固\n-   随着时间推移和后续区块的添加，关于区块被纳入权威链的确定性会逐渐增加，这一事实被称为`最终一致性`。\n-\
    \   `51%攻击`是一种试图在集体决策过程中收集或控制多数投票权的行为，其目的是将权威链中的部分区块变成孤儿区块，并建立一条包含对攻击者更有利的交易历史的新权威链。\n\
    -   `51%攻击`具有以下特征：\n    -   经济上：通过改变集体的交易数据历史来改变所有权分配。\n    -   决策上：收集多数投票权以强制推行期望的结果。\n\
    \    -   技术上：破坏系统的完整性。\n    -   架构上：至少暂时建立一个隐藏的中心化元素，从而改变系统状态。\n\n## 脚注\n\n[1]\
    \ Hassanien, Aboul Ella, and Eid Emary. *Swarm intelligence: Principles, advances,\
    \ and applications*. Boca Raton, FL: CRC Press, 2016.\n\n[2] Nakamoto, Satoshi.\
    \ *Bitcoin: A peer-to-peer electronic cash system*. 2008. [`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf).\n\
    \n[3] Wood, Gavin. *Ethereum: A secure decentralized generalized transaction ledger*.\
    \ 2014. [`http://gavwood.com/paper.pdf`](http://gavwood.com/paper.pdf); Okupski,\
    \ Krzysztof. *Bitcoin developer reference*. Working paper. 2014.\n\n[4] Okupski,\
    \ Krzysztof. *Bitcoin developer reference*. Working paper. 2014.\n\n# 20. 为完整性付费\n\
    \n诚信和信任的建立都不是没有成本的。\n\n关于区块链如何处理新的交易数据，以及系统节点如何就交易的真实历史达成一致的讨论，揭示了`hash-puzzle`的重要性。解决`hash-puzzle`在实现和维护系统完整性方面扮演着重要角色。但解决`hash-puzzle`需要消耗计算资源，因此也需要花费金钱。出于这个原因，有必要对那些为系统完整性做出贡献的节点进行补偿。然而，在整个讨论过程中，我们一直假设节点以某种方式得到了补偿，而没有询问使用了哪种支付工具。因此，本步骤将专门聚焦于节点如何因其对系统完整性的贡献而获得补偿。\n"
- fmt: '# The Metaphor


    Let’s imagine you are the owner of a bakery. One day you come up with a great
    idea on how to improve your business. You realized that money is scarce, but you
    always have bread for sale in your bakery, and at the end of most business days
    there is a significant amount of bread left over. Hence, you decide to pay your
    employees with bread instead of paying them money. This will accomplish two things:
    save you money and avoid the need to throw away leftover bread. Your employees
    are not excited about this idea, but soon other companies imitate you and finally
    all companies begin to apply this compensation schedule: car manufacturers pay
    their employees with cars, construction companies pay their employees with houses,
    and so on. One day your friends are complaining about their impractical compensation,
    except for one of them who is still getting paid with money. Which company or
    institution do you think this person works for? It turns out that he works for
    a central bank, which happens to be a producer of money!


    This example plays with the dependency between the goods we create by fulfilling
    our jobs and the goods we receive as compensation. This step discusses that connection
    in the context of the blockchain. It will turn out that under some conditions
    it may become desirable for the blockchain to become more like a central bank
    that pays its employees with the bank notes it produces. But before I discuss
    this special case, let’s review in more detail the role of fees and the importance
    of compensation within the blockchain.


    # The Role of Fees Within the Blockchain


    Step [18](#A436689_1_En_18_Chapter.html) highlighted that the blockchain utilizes
    the carrot-and-stick approach in order to get the peers that make up the system
    control one another. Competition for reward and threat of punishment are the two
    forces that keep peers of the system verifying transactions orderly and selecting
    that transaction history that unites the most collective effort. Reward and punishment
    are implemented with rewards based on transaction fees and proof of work.[¹](#A436689_1_En_20_Chapter.html#Fn1)
    This effect is universal in all blockchain applications regardless of their concrete
    application goal. However, the choice of a concrete instrument of payment used
    to compensate the maintainers of the system is not identical in all blockchain
    applications. Defining and using an instrument of payment that will be given to
    the peers for verifying and adding new blocks to the blockchain is considered
    one of the major challenges in establishing a blockchain application. As a result,
    the following consequences of choosing an instrument of payment have to be considered:


    * The impact on the integrity of the system

    * The impact on the openness of the system

    * The impact on the distributed nature of the system

    * The impact on the philosophy of the system


    ## Impact on the Integrity of the System


    The forces of reward and punishment are the foundation of achieving and maintaining
    integrity in the blockchain. This works because the peers of the system receive
    a valuable compensation for maintaining the integrity of the system. But how do
    we know that the peers indeed receive a valuable compensation for their work in
    the first place? Well, that is the whole point. Which instrument of payment is
    considered valuable and worthwhile for doing the work of maintaining the system?
    What happens if this instrument of payment is known to lose its value or is not
    trustworthy? Can we expect that the peers who maintain the blockchain will continue
    doing so when they are compensated with an untrustworthy and worthless instrument
    of payment? No, we cannot. Lack of trust in the instrument of payment used to
    compensate the peers of the system will contaminate the whole system. Hence, the
    instrument of payment used for compensating the supporters of the system directly
    impacts the trustworthiness of the blockchain itself.


    ## Impact on the Openness of the System


    The blockchain is supposed to be an open peer-to-peer system. Everyone can connect
    his or her computer to the system and will be rewarded for contributing to the
    maintenance of its integrity. But what happens if the instrument of payment used
    to compensate peers is not as open as the blockchain itself? What if the compensation
    is done by using an instrument of payment that is available or accepted only in
    specific countries or is subject to capital movement restrictions? In this case,
    the instrument of payment counteracts the technical openness of the system by
    inducing economic constraints.


    ## Impact on the Distributed Nature of the System


    The blockchain is a purely distributed peer-to-peer system without any element
    of central control or coordination. But what happens if the instrument of payment
    used to compensate peers is controlled and governed by one central institution?
    This means allowing centrality to enter the system through the back door. It would
    counteract the distributed nature of the system.


    ## Impact on the Philosophy of the System


    The preceding discussion revealed that the properties of the instrument of payment
    used to compensate peers for supporting the system have the potential to counteract
    major aspects of the blockchain. This raises a fundamental question: How can a
    purely distributed peer-to-peer system that is designed to stay free of centralized
    control be considered credible if it uses an instrument of payment to compensate
    its peers that counteracts its major values? Every blockchain that claims to be
    completely open and purely distributed has to find a satisfying answer to this
    question.


    # Desirable Properties of an Instrument of Payment for Compensating Peers


    In order to interfere as little as possible with the goals and values of the blockchain,
    an instrument of payment to be used for compensating peers should:


    * Be available in digital form; otherwise it cannot be included in the blockchain.

    * Be accepted as an instrument of payment in the real world; otherwise peers cannot
    use their income from supporting the system to pay their bills in the real world.

    * Be accepted as an instrument of payment in all countries; otherwise supporting
    the system will become unattractive to peers who live in those countries that
    do not accept it as an instrument of payment.

    * Not be subject to capital movement restrictions; otherwise its transfer to peers
    is restricted.

    * Have a stable value; otherwise the peers have an economic risk of losing purchasing
    power.

    * Be trustworthy; otherwise it undermines the ability of the blockchain to create
    trust.

    * Not be controlled by one single central organization or state; otherwise it
    causes a serious conflict to the distributed nature of the blockchain.


    This list of properties reads like a wish list for the perfect world currency.
    Hence, it is no surprise that none of the existing fiat currencies fulfills these
    desired properties.'
