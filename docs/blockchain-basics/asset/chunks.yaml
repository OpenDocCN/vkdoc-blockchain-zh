  trans: '

    ### 理念


    其核心理念是将所存储数据的加密哈希值与数据存储位置信息相结合。如果数据被篡改，这两部分信息将不再一致，从而导致哈希引用失效。


    ### 工作原理


    数据引用在数字世界中的角色，相当于衣帽间的寄存牌。寄存牌指向你外套在衣帽间中的具体存放位置，你凭此牌稍后取回外套。计算机中的数据引用原理相同：它们是一组指向其他数据的数据片段。计算机程序利用引用来记住数据的存储位置，以便日后检索。哈希引用是一种特殊的引用，它利用了加密哈希值的强大功能。为简单起见，你可以将哈希引用想象成显示哈希值而非普通号码的衣帽间寄存牌。


    哈希引用指向其他数据，并能额外验证被引用的数据自引用创建以来是否被更改。如果被引用的数据发生了更改，则该引用将不再允许检索这些数据。此时，哈希引用被视为损坏或无效。这类似于你有一张指向某个挂钩的寄存牌，但挂钩上已不再挂着你的外套。这种情况下，衣帽间服务员将无法再交还你的外套。


    哈希引用的整体思路是保护其使用者，避免因技术错误导致的意外篡改，或他人未经告知的故意更改而检索到被修改的数据。因此，哈希引用被应用于所有要求数据一旦创建就应保持不变的场景。


    ### 示意图解


    区块链高度依赖哈希引用。因此，理解哈希引用对于理解区块链以及掌握本书后续步骤至关重要。基于此，以下三张图有两个目的：第一，它们以示意图方式阐释哈希引用的工作原理。第二，它们引入了一种哈希引用的图示表示法，该表示法将在后续步骤中用于说明区块链数据结构的运作。


    图 11-1 通过展示一个有效的哈希引用，以示意图方式阐释了其工作原理。标注为 `R1` 的灰色圆圈代表一个有效的哈希引用。白色方框代表应保持不变的数据。从圆圈指向方框的箭头描绘了哈希引用的工作过程，即从引用指向其引用的数据。


    ![A436689_1_En_11_Fig1_HTML.jpg](img/A436689_1_En_11_Fig1_HTML.jpg)


    图 11-1. 有效哈希引用的示意图


    图 11-2 展示了一个损坏或无效哈希引用的符号表示。


    ![A436689_1_En_11_Fig2_HTML.jpg](img/A436689_1_En_11_Fig2_HTML.jpg)


    图 11-2. 无效哈希引用的示意图


    包含修改后问候语的黑色方框代表在引用创建后被修改的数据。灰色圆圈仍代表最初创建的哈希引用。从圆圈指向修改后方框的折断箭头强调，哈希引用 `R1` 已损坏，它不再允许访问以检索数据，因为数据在此期间已被更改。


    图 11-3 展示了数据更改后创建新哈希引用时的情况。该情况由代表已修改数据的黑色方框、代表新创建哈希引用的黑色圆圈，以及从圆圈指向方框的直箭头共同描绘。


    ![A436689_1_En_11_Fig3_HTML.jpg](img/A436689_1_En_11_Fig3_HTML.jpg)


    图 11-3. 被引用数据更改后新创建哈希引用的示意图


    ### 原理阐释


    哈希引用的关键在于它们利用了加密哈希值，这些哈希值可被视为数据的唯一指纹。因此，两个不同的数据片段拥有相同哈希值的可能性极低。由此，一个损坏的哈希引用即被视为是数据在引用创建后被篡改的证据。


    ## 以变更敏感的方式存储数据


    基于数据哈希值进行引用的思想可以进一步扩展。一个自然的拓展便是以变更敏感的方式来存储数据。


    ### 目标


    目标是存储大量数据，例如应保持不变的事务数据。任何对数据的更改都应能被快速、容易地检测到。


    ### 理念


    衣帽间寄存牌指向挂着外套的挂钩。这简单又直接。但是，什么能阻止你将一张寄存牌放入另一件外套的口袋，并将那第二件外套也存放在衣帽间呢？结果是，后一张寄存牌指向一件口袋里装有另一张寄存牌的外套，而那张寄存牌又指向另一件外套。实际上，你可以创建由外套组成的长而复杂的链条：外套口袋里有寄存牌，指向其他外套，这些外套口袋里也有一张寄存牌，指向更远的外套，依此类推。类似地，我们可以将数据与指向其他数据的哈希引用存储在一起，而其他数据中又存储着指向更远数据的哈希引用，以此类推。如果在创建之后，任何一个数据或哈希引用被更改，那么所有的哈希引用都将被破坏。由于损坏的哈希引用可作为数据在引用创建后被篡改的证据，整个结构便以变更敏感的方式存储了数据。


    ### 工作原理


    利用哈希引用以变更敏感方式存储数据有两种经典模式：


    -   链式

    -   树式


    #### 链式


    一条由数据链接而成的链条，也称为链表，² 当每块数据都包含一个指向另一块数据的哈希引用时形成。这种结构对于存储和链接那些并非在某一时刻全部可用，而是随着时间推移逐步到达的数据非常有用。图
    11-4 使用前面介绍的符号说明了这一概念。创建这样的链条始于标记为 `Data 1` 的数据块以及哈希引用 `R1` 的创建。作为第一块数据，`Data
    1` 不包含任何哈希引用。当新数据到达时，它们与指向 `Data 1` 的哈希引用放在一起。哈希引用 `R2` 指向新到达的数据和哈希引用 `R1`。哈希引用
    `R3` 指向 `Data 3` 和哈希引用 `R2`，以类似方式创建。


    ![A436689_1_En_11_Fig4_HTML.jpg](img/A436689_1_En_11_Fig4_HTML.jpg)


    图 11-4. 以链式方式链接在一起的数据


    你只需要使用哈希引用 `R3` 即可按数据到达的逆序访问链中的所有数据。引用 `R3` 也被称为链的头部，因为它指向最近添加的数据块。注意不要混淆术语“头部”（指最近添加的数据块）与“区块头”，后者将在步骤
    14 讨论区块链数据结构时引入。'
- fmt: '### The Tree


    Figure [11-5](#A436689_1_En_11_Chapter.html#Fig5) illustrates how transaction
    data can be linked together with hash references in a tree-like fashion.


    ![A436689_1_En_11_Fig5_HTML.jpg](A436689_1_En_11_Fig5_HTML.jpg)


    Figure 11-5. Data linked together in a tree-like fashion


    Such a structure is also called a Merkle tree [³](#A436689_1_En_11_Chapter.html#Fn3)
    because a computer scientist named Merkle proposed it and it looks like a tree
    that was turned upside down. It is very useful for grouping many distinct pieces
    of data that are available at the same time and to make them accessible via a
    single hash reference. In order to create the tree illustrated in Figure [11-5](#A436689_1_En_11_Chapter.html#Fig5),
    you start with the four transaction data represented by the boxes at the bottom
    of the figure. At first the hash references to the individual transaction data
    are created (`R1` to `R4`), which are grouped together in a pair-wise fashion
    afterward. Subsequently, hash references to the pairs of hash references are created
    (`R12` and `R34`). This procedure is repeated until you eventually arrive at a
    single hash reference, which is also called the root of the Merkle tree (labeled
    `R`).


    ### Why It Works


    The explained data structures store data in a change-sensitive fashion because
    they connect and combine data with hash references. These references get broken
    when the data they refer to are changed after the references were created. Hence,
    observing a broken reference in such a construct is proof that some of the data
    were changed after the structure was created. Otherwise, it could be concluded
    that the whole construct has not been changed since it was created.


    ## Causing Time-Consuming Computations


    Hash values are not only useful for making basic file operations such as comparing,
    referring and storing data secure and efficient. Hash values can also be used
    to allow computers to challenge other computers with elaborate puzzles. While
    this may sound a bit odd it will turn out that this usage of hash values is one
    of the most important concepts of the blockchain.


    ### The Goal


    For reasons that will become understandable in later steps of this book, you may
    need to create puzzles that require computational resources in order to be solved.
    It should not be possible to solve these puzzles based on knowledge or data stored
    somewhere or by means of thinking, like an IQ test or a knowledge test. The only
    way to solve these puzzles is by sheer computational power and hard computational
    work.


    ### The Idea


    A combination lock is a specific lock that requires a unique sequence of numbers
    in order for it to be opened. If you do not know the sequence that opens the lock,
    you would systematically try all possible combinations until you eventually arrived
    at the unique combination that opens the lock. This procedure is guaranteed to
    open the lock, but it is time-consuming. Systematically trying all possible combinations
    has nothing to do with knowledge or intellectual reasoning. The approach of opening
    a combination lock is based on sheer diligence and hard work. Hash puzzles are
    computational puzzles that can be seen as the digital equivalent to the task of
    opening a combination lock by trial and error.


    ### How It Works


    Elements of a hash puzzle are[⁴](#A436689_1_En_11_Chapter.html#Fn4):


    *   Given data that have to be kept unchanged

    *   Data that can be freely changed, the so-called nonce

    *   The hash function to be applied

    *   Restrictions on the hash value of the combined hashing, also called the difficulty
    level


    Figure [11-6](#A436689_1_En_11_Chapter.html#Fig6) illustrates the setting of the
    hash puzzle. Combined hashing is applied to the data and the nonce. The resulting
    hash value has to fulfill the given restrictions.


    ![A436689_1_En_11_Fig6_HTML.jpg](A436689_1_En_11_Fig6_HTML.jpg)


    Figure 11-6. Schematic illustration of a hash puzzle


    Hash puzzles can only be solved by trial and error. This requires guessing a nonce,
    calculating the hash value of the combined data with the required hash function,
    and evaluating the resulting hash value based on the restrictions. If the hash
    value satisfies the restrictions, you will have solved the hash puzzle; otherwise,
    you would continue with another nonce until you eventually solve the puzzle. The
    nonce that, when combined with the given data, yields a hash value that satisfies
    the restrictions is called the solution. You always have to present that particular
    nonce when claiming that you solved a hash puzzle.


    ### An Illustrative Example


    Let’s consider a real hash puzzle for illustrating its functioning. In Step [10](#A436689_1_En_10_Chapter.html)
    you saw that the shortened hash value of `Hello World!` is `7F83B165`. But what
    data combined with `Hello World!` would yield a shortened hash value with three
    leading zeros? So the hash puzzle is: Find the nonce that combined with `Hello
    World!` yields a shortened hash value that starts with three leading zeros.


    Let’s get our hands dirty and try some nonce. Table [11-1](#A436689_1_En_11_Chapter.html#Tab1)
    shows the nonce, the text to be hashed, and the resulting shortened hash value.
    As you can see, the nonce `614` solves the hash puzzle, which implies that starting
    with a nonce `0` and incrementing sequentially by `1` you would need `615` steps
    to find the solution. If the restriction were to find a hash value with one leading
    zero, you would have solved it already after four steps, since `Hello World! 3`
    yields a hash value with one leading zero.


    Table 11-1. Nonces for Solving a Hash Puzzle


    | Nonce | Text to Be Hashed | Output |

    | --- | --- | --- |

    | 0 | `Hello World! 0` | `4EE4B774` |

    | 1 | `Hello World! 1` | `3345B9A3` |

    | 2 | `Hello World! 2` | `72040842` |

    | 3 | `Hello World! 3` | `02307D5F` |

    | … | … | … |

    | 613 | `Hello World! 613` | `E861901E` |

    | 614 | `Hello World! 614` | `00068A3C` |

    | 615 | `Hello World! 615` | `5EB7483F` |


    You can try this yourself at [`www.blockchain-basics.com/HashPuzzle.html`](http://www.blockchain-basics.com/HashPuzzle.html).


    ### The Difficulty Level


    Requiring the hash value to fulfill a certain restriction is the core of the hash
    puzzle. Hence, neither the restriction nor its description is arbitrary. Instead,
    the restriction used by hash puzzles is standardized so that computers can challenge
    other computers with hash puzzles. In the context of hash puzzles, the restrictions
    are often called difficulty or difficulty level, respectively. The difficulty
    is expressed as a natural number and refers to the number of leading zeros the
    hash value has to have. Hence, a difficulty of `1` means that the hash value has
    to have (at least) one leading zero, while a difficulty of `10` means that the
    hash value has to have at least `10` leading zeros. The higher the difficulty
    level, the more leading zeros are required and the more complicated the hash puzzle
    is. The more complicated the hash puzzle is, the more computational power or time
    are needed to solve it.'
  raw: '#### The Tree


    Figure [11-5](#A436689_1_En_11_Chapter.html#Fig5) illustrates how transaction
    data can be linked together with hash references in a tree-like fashion.


    ![A436689_1_En_11_Fig5_HTML.jpg](A436689_1_En_11_Fig5_HTML.jpg)


    Figure 11-5.


    Data linked together in a tree-like fashion


    Such a structure is also called a Merkle tree [³](#A436689_1_En_11_Chapter.html#Fn3)
    because a computer scientist named Merkle proposed it and it looks like a tree
    that was turn upside down. It is very useful for grouping many distinct pieces
    of data that are available at the same time and to make them accessible via a
    single hash reference. In order to create the tree illustrated in Figure [11-5](#A436689_1_En_11_Chapter.html#Fig5),
    you start with the four transaction data represented by the boxes at the bottom
    of the figure. At first the hash references to the individual transaction data
    are created (R1 to R4), which are grouped together in a pair-wise fashion afterward.
    Subsequently, hash references to the pairs of hash references are created (R12
    and R34). This procedure is repeated until you eventually arrive at a single hash
    reference, which is also called the root of the Merkle tree (labeled R).


    ### Why It Works


    The explained data structures store data in a change-sensitive fashion because
    they connect and combine data with hash references. These references get broken
    when the data they refer to are changed after the references were created. Hence,
    observing a broken reference in such a construct is proof that some of the data
    were changed after the structure was created. Otherwise, it could be concluded
    that the whole construct has not been changed since it was created.


    ## Causing Time-Consuming Computations


    Hash values are not only useful for making basic file operations such as comparing,
    referring and storing data secure and efficient. Hash values can also be used
    to allow computers to challenge other computers with elaborate puzzles. While
    this may sound a bit odd it will turn out that this usage of hash values is one
    of the most important concept of the blockchain.


    ### The Goal


    For reasons that will become understandable in later steps of this book, you may
    need to create puzzles that require computational resources in order to be solved.
    It should not be possible to solve these puzzles based on knowledge or data stored
    somewhere or by means of thinking, like an IQ test or a knowledge test. The only
    way to solve these puzzle is by sheer computational power and hard computational
    work.


    ### The Idea


    A combination lock is a specific lock that requires a unique sequence of numbers
    in order for it to be opened. If you do not know the sequence that opens the lock,
    you would systematically try all possible combinations until you eventually arrived
    at the unique combination that opens the lock. This procedure is guaranteed to
    open the lock, but it is time-consuming. Systematically trying all possible combinations
    has nothing to do with knowledge or intellectual reasoning. The approach of opening
    a combination lock is based on sheer diligence and hard work. Hash puzzles are
    computational puzzles that can be seen as the digital equivalent to the task of
    opening a combination lock by trial and error.


    ### How It Works


    Elements of a hash puzzle are[⁴](#A436689_1_En_11_Chapter.html#Fn4):


    *   Given data that have to be kept unchanged

    *   Data that can be freely changed, the so-called nonce

    *   The hash function to be applied

    *   Restrictions on the hash value of the combined hashing, also called the difficulty
    level


    Figure [11-6](#A436689_1_En_11_Chapter.html#Fig6) illustrates the setting of the
    hash puzzle. Combined hashing is applied to the data and the nonce. The resulting
    hash value has to fulfill the given restrictions.


    ![A436689_1_En_11_Fig6_HTML.jpg](A436689_1_En_11_Fig6_HTML.jpg)


    Figure 11-6.


    Schematic illustration of a hash puzzle


    Hash puzzles can only be solved by trial and error. This requires guessing a nonce,
    calculating the hash value of the combined data with the required hash function,
    and evaluating the resulting hash value based on the restrictions. If the hash
    value satisfies the restrictions, you will have solved the hash puzzle; otherwise,
    you would continue with another nonce until you eventually solve the puzzle. The
    nonce that, when combined with the given data, yields a hash value that satisfies
    the restrictions is called the solution. You always have to present that particular
    nonce when claiming that you solved a hash puzzle.


    ### An Illustrative Example


    Let’s consider a real hash puzzle for illustrating its functioning. In Step [10](#A436689_1_En_10_Chapter.html)
    you saw that the shortened hash value of Hello World! is 7F83B165\. But what data
    combined with Hello World! would yield a shortened hash value with three leading
    zeros? So the hash puzzle is: Find the nonce that combined with Hello World! yields
    a shortened hash value that starts with three leading zeros.


    Let’s get our hands dirty and try some nonce. Table [11-1](#A436689_1_En_11_Chapter.html#Tab1)
    shows the nonce, the text to be hashed, and the resulting shortened hash value.
    As you can see, the nonce 614 solves the hash puzzle, which implies that starting
    with a nonce 0 and incrementing sequentially by 1 you would need 615 steps to
    find the solution. If the restriction were to find a hash value with one leading
    zero, you would have solved it already after four steps, since Hello World! 3
    yields a hash value with one leading zero.


    Table 11-1.


    Nonces for Solving a Hash Puzzle


    | Nonce | Text to Be Hashed | Output |

    | --- | --- | --- |

    | 0 | Hello World! 0 | 4EE4B774 |

    | 1 | Hello World! 1 | 3345B9A3 |

    | 2 | Hello World! 2 | 72040842 |

    | 3 | Hello World! 3 | 02307D5F |

    |   | … |   |

    | 613 | Hello World! 613 | E861901E |

    | 614 | Hello World! 614 | 00068A3C |

    | 615 | Hello World ! 615 | 5EB7483F |


    You can try this yourself at [`www.blockchain-basics.com/HashPuzzle.html`](http://www.blockchain-basics.com/HashPuzzle.html)
    .


