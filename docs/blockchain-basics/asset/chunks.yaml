- fmt: "# The Future\n\nPredicting the future is not an easy task, in particular when\
    \ considering a new technology that is the object of active research and further\
    \ development. However, one can identify some indications that point to a likely\
    \ future scenario. In particular, it seems that public permissionless blockchains\
    \ have a limited commercial use due to their limited scalability and lack or privacy.\
    \ On the other hand, it seems that private permissioned blockchains are those\
    \ that attract the most attention from the business side. As a result, we may\
    \ see the following developments in the future:\n\n- Limited enthusiast projects\n\
    - Large-scale commercial usage\n- Governmental projects\n\n## Limited Enthusiast\
    \ Projects\n\nLimited enthusiast projects may utilize public permissionless blockchains\
    \ and are most likely to be initiated and supported by blockchain enthusiasts\
    \ and blockchain purists who are motivated by the complete openness and the purely\
    \ distributed nature of the system. The supporters of those projects may regard\
    \ their engagement as a political statement or commitment to alternative software\
    \ systems that absolves them from any kind of governmental or commercial control\
    \ and coordination. Cryptocurrencies as alternative money that is supposed to\
    \ be independent of governmental regulation as well as independent reputation\
    \ systems or systems for managing identity independently from governmental identity\
    \ documents might be a major application case in that context.\n\n## Large-Scale\
    \ Commercial Usage\n\nLarge-scale commercial blockchain projects are expected\
    \ to utilize private permissioned blockchains. These projects will most likely\
    \ be initiated and run by consortiums of leading companies of a certain sector\
    \ or industry. Realizing the gains of standardization, automation, process streamlining,\
    \ and cost reduction will be the major reason for supporting those projects. These\
    \ projects may also be based on the idea of finding a compromise that allows the\
    \ participants to utilize the advantages of the blockchain without making themselves\
    \ dispensable due to disintermediation. It could be possible that each major sector\
    \ such as banking, financial exchanges, insurance, health care, payments, and\
    \ retail will develop and offer their own sector-wide blockchain solution.\n\n\
    ## Governmental Projects\n\nAs governmental projects, these blockchain ventures\
    \ are tax funded and therefore free from most commercial restrictions that influence\
    \ blockchain projects in the private sector. These projects may be initiated and\
    \ run as part of e-government initiatives that aim to digitalize manual processes\
    \ or to replace legacy infrastructure. Taxation, monitoring, digital identity,\
    \ record management, or monetary policy could benefit from the properties of the\
    \ blockchain. However, open legal questions as well as existing data security\
    \ and privacy laws may significantly limit the benefit of the blockchain within\
    \ the public sector.\n\n# Outlook\n\nThis step finished and rounded off this intellectual\
    \ journey toward an understanding of the blockchain. After highlighting areas\
    \ of research and further development of the blockchain, this step mentioned some\
    \ of its alternatives and possible long-term accomplishments, disadvantages, and\
    \ future usages. The history of the Internet has taught us not only how volatile\
    \ and unpredictable but also how challenging and rewarding the usage and the development\
    \ of a new technology can be. Whatever the future of the blockchain will be, we\
    \ can decide to be not just witnesses but also active participants of an exciting\
    \ and challenging technological transition that has the potential to be one of\
    \ the biggest things since the invention of the Internet.\n\n# Summary\n\n- The\
    \ blockchain has been and will continue to be the subject of further improvements\
    \ and developments such as variations in its implementation, improving efficiency,\
    \ improving scalability, and conceptual advances.\n- Smart contracts, zero-knowledge\
    \ proofs, and alternative ways to achieve consensus are major areas of conceptual\
    \ advancement of the blockchain.\n- Besides it technical merits, the blockchain\
    \ may be honored for the following long-term accomplishments:\n  - Disintermediation\n\
    \  - Automation\n  - Standardization\n  - Streamlining processes\n  - Increased\
    \ processing speed\n  - Cost reduction\n  - Shift toward trust in protocols and\
    \ technology\n  - Making trust a commodity\n  - Increased technology awareness\n\
    - Possible disadvantages of the blockchain are:\n  - Lack of privacy\n  - Loss\
    \ of personal responsibility\n  - Loss of jobs\n  - Reintermediation\n- Possible\
    \ usages of the blockchain to be seen in the future are:\n  - Limited enthusiast\
    \ projects\n  - Large-scale commercial projects\n  - Governmental projects\n\n\
    Footnotes\n\n[1] World Wide Web Foundation. History of the Web. 2016. [http://webfoundation.org/about/vision/history-of-the-web/](http://webfoundation.org/about/vision/history-of-the-web/).\n\
    \n[2] Bonneau, Joseph, Andrew Miller, Jeremy Clark, Arvind Narayanan, Joshua A.\
    \ Kroll, and Edward W. Felten. Research perspectives and challenges for Bitcoin\
    \ and cryptocurrencies. In IEEE Symposium on Security and Privacy. IEEE, 2015,\
    \ 104–121; Yli-Huumo, Jesse et al. Where is current research on blockchain technology?—A\
    \ systematic review. *PloS One* 11.10 (2016), e0163477: doi:10.1371/journal. pone.0163477.\n\
    \n[3] Croman, Kyle, et al. On scaling decentralized blockchains. In Proceedings\
    \ of the 3rd workshop on Bitcoin and Blockchain Research. 2016. [https://www.researchgate.net/publication/292782219_On_Scaling_Decentralized_Blockchains_A_Position_Paper](https://www.researchgate.net/publication/292782219_On_Scaling_Decentralized_Blockchains_A_Position_Paper);\
    \ Buterin, Vitalik, Jeff Coleman, and Matthew Wampler-Doty. Notes on scalable\
    \ blockchain protocols (verson 0.3). 2015. [https://pdfs.semanticscholar.org/ae5b/c3aaf0e02a42f4cd41916072c87db0e04ac6.pdf?_ga=1.234210142.1100460187.1484935336](https://pdfs.semanticscholar.org/ae5b/c3aaf0e02a42f4cd41916072c87db0e04ac6.pdf?_ga=1.234210142.1100460187.1484935336).\n\
    \n[4] Poon, Joseph, and Thaddeus Dryja. The bitcoin lightning network: Scalable\
    \ off-chain instant payments. Technical Report (draft). 2015. [https://lightning.network](https://lightning.network).\n\
    \n[5] Tremback, Jehan, and Zack Hess. Universal payment channels. 2015. [http://altheamesh.com/documents/universal-payment-channels.pdf](http://altheamesh.com/documents/universal-payment-channels.pdf).\n\
    \n[6] BitFury Group. Public versus private blockchains: Part 1, Permissioned blockchains.\
    \ White paper. 2015; BitFury Group. Public versus private blockchains: Part 2,\
    \ Permissionless blockchains. White paper. 2015.\n\n[7] Meiklejohn, Sarah, and\
    \ Claudio Orlandi. Privacy-enhancing overlays in bitcoin. International Conference\
    \ on Financial Cryptography and Data Security. Berlin Heidelberg: Springer, 2015.\n\
    \n[8] Zyskind, Guy, Oz Nathan, and Alex Pentland. Enigma: Decentralized computation\
    \ platform with guaranteed privacy. 2015. arXiv preprint arXiv:1506.03471.\n\n\
    [9] Krantz, Steven G. Zero knowledge proofs. July 2007. AIM Preprint Series, Volume\
    \ 10-46.\n\n[10]"
