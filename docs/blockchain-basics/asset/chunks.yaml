  trans: "\n## 总结\n\n-   所有权证明包含三个要素：\n    -   所有者身份的识别\n    -   被拥有物件的识别\n    - \
    \  所有者与物件之间的映射关系\n-   `ID`卡、出生证明和驾照，以及序列号、生产日期、生产证明或详细的物件描述，均可用于识别所有者和物件。\n- \
    \  所有者与物件之间的映射关系可以记录在分类账中，其作用类似于审判中的证人。\n-   仅使用单一分类账存在风险，因为它可能被损坏、销毁或伪造。在这种情况下，该分类账将不再成为厘清所有权的可靠来源。\n\
    -   与其只使用一个中心化分类账，不如利用一组独立的分类账来记录所有权，并就多数分类账达成一致的现实版本，来厘清所有权的相关请求。\n-   通过使用`区块链数据结构`，可以创建一个纯粹分布式的点对点分类账系统。每个`区块链数据结构`代表一个分类账，由系统中的一个节点维护。`区块链算法`负责让各个节点共同达成一个一致的所有权状态版本。密码学被用于实现身份识别、身份验证和授权。\n\
    -   纯粹分布式点对点分类账系统的完整性，体现在其能够就所有权做出真实陈述，并确保只有合法所有者才能将其财产权转让给他人。\n\n脚注 [1]\n\nVan\
    \ Tilborg, Henk, and Sushil Jajodia, eds. *Encyclopedia of cryptography and security*.\
    \ New York: Springer Science & Business Media, 2014.\n\n# 7. 双重花费\n\n利用分布式点对点系统的漏洞\n\
    \n在上一节中，您了解了纯粹分布式点对点系统与区块链作为所有权管理手段的最突出用例之间的关系。您还了解到，分布式点对点分类账系统的完整性，体现在其能够就所有权做出真实陈述，并确保只有合法所有者才能将其财产权转让给他人。但这一陈述在现实生活中意味着什么？如果完整性遭到破坏，会发生什么？本节将更详细地探讨这些问题。尤其，本节将介绍分布式点对点系统中完整性被破坏的最重要例子之一：双重花费问题。\n\
    \n## 比喻\n\n伪造纸币在任何国家都是严重的犯罪行为，因为它通过创造没有宝贵资源支持的购买力，破坏了经济的基础和运行。因此，大多数纸币都配备了安全特征，使得伪造变得不可能，或至少成本高昂。这些安全特征，如唯一编号、水印或荧光纤维，对于实体纸币和其他实体商品效果良好。但是，如果货币或商品变成数字形式，并在分布式点对点分类账系统中管理，会发生什么？本节解释了用于管理所有权的分布式点对点系统的一个特定漏洞，该漏洞等同于伪造纸币。事实证明，这个漏洞是系统完整性被破坏的一个突出例子。\n\
    \n## 双重花费问题\n\n让我们考虑一个用于管理房地产所有权的点对点系统。在这种系统中，记录所有权信息的分类账由系统成员的个体计算机维护，而不是由中心数据库维护。因此，每个对等节点都维护着自己的一份分类账副本。一旦房屋的所有权从一个人转移到另一个人，系统中的所有分类账都需要更新，以包含最新的现实版本。然而，在对等节点之间传递信息并更新各个分类账需要时间。在系统的最后一个成员收到新信息并更新其分类账副本之前，系统将处于不一致状态。一些对等节点已经知道最新的所有权转让，而其他对等节点尚未收到该信息。并非所有分类账都拥有最新信息这一事实，使得它们容易被任何已经拥有最新信息的人利用。\n\
    \n让我们再设想以下情景。个人 A 将他的房子卖给了个人 B。从 A 到 B 的所有权转让记录在点对点系统中的某一个分类账上。这个特定的分类账需要将此转让告知其他对等节点，这些节点再依次告知其他对等节点，直到最终所有对等节点都获知了从\
    \ A 到 B 的所有权转让。然而，假设个人 A 迅速找到系统中的另一个分类账，并要求记录同一栋房子的另一项不同所有权转让：从个人 A 到个人 C 的出售。如果这个对等节点尚未得知过去发生的从\
    \ A 到 B 的所有权转让，该节点将会批准并记录同一栋房子从 A 到 C 的所有权转让。因此，A 通过利用其第一次出售信息传播需要时间这一事实，成功地将他的房子卖了两次。但\
    \ B 和 C 不能同时拥有这栋房子。他们中只有一人应该是新的合法所有者。因此，这种情况被称为双重花费问题。\n"
- fmt: "## The Term\n\nSimilar to the term `blockchain`, the term `double spending`\
    \ is ambiguous as it is used to refer to the following concepts:\n\n- A problem\
    \ caused by copying digital goods\n- A problem that may appear in distributed\
    \ peer-to-peer systems of ledgers\n- An example of violated integrity in purely\
    \ distributed peer-to-peer systems\n\n### Double Spending as a Problem of Copying\
    \ Digital Goods\n\nIn the context of copying digital goods, the `double spending`\
    \ problem refers to the fact that data on a computer can be copied without noticeable\
    \ limitations. This fact causes problems with digital money or any other data\
    \ that are supposed to have only one owner at a given time. Copying makes it possible\
    \ to replicate data that represent pieces of digital money and use them more than\
    \ once for making payments. This is the digital equivalent to replicating bank\
    \ notes with a copying machine. Besides being technically possible, the copying\
    \ of digital money violates the core principle of money: an identical piece of\
    \ money cannot be given to different people at the same time. The ability to copy\
    \ and spend digital money multiple times renders the money useless, hence, the\
    \ `double spending` problem.\n\n### Double Spending as a Problem of Distributed\
    \ Peer-to-Peer Systems of Ledgers\n\nWhen used to describe the problem of a distributed\
    \ peer-to-peer system of ledgers, `double spending` problem refers to the fact\
    \ that forwarding information to all elements of such a system requires time,\
    \ thus not all peers have the same ownership information at the same time. Because\
    \ not all peers have up-to-date information, they are prone to be exploited by\
    \ anyone who already has the latest information. As a result, one may be able\
    \ to transfer ownership more than once, resulting in `double spending`.\n\n###\
    \ Double Spending as an Example of Violated Integrity in Distributed Peer-to-Peer\
    \ Systems\n\nThe use of distributed peer-to-peer systems is not restricted to\
    \ managing ownership. However, the problem of forwarding information among peers\
    \ and updating the data maintained by the members of the system stays the same,\
    \ regardless of the specific application domain. Hence, on a more abstract level,\
    \ the `double spending` problem can be seen as a problem of maintaining data consistency\
    \ in distributed peer-to-peer systems. Since data consistency is one aspect of\
    \ system integrity, one could say that the `double spending` problem is a specific\
    \ example of violated system integrity.\n\n## How to Solve the Double Spending\
    \ Problem\n\nBecause `double spending` can have different meanings, there is no\
    \ single way to prevent it. Instead, many different solutions may exist. The following\
    \ sections describe some of them.\n\n### Solving Double Spending as a Problem\
    \ of Copying Digital Goods\n\nThe problem of spending digital money or any other\
    \ digital assets more than once just by copying the data is actually a problem\
    \ related to the nature of ownership. Any accepted means of mapping data that\
    \ represents digital goods to their owners will solve that problem, regardless\
    \ of its specific implementation. Even a physical central book or (more realistically)\
    \ an electronic ledger, regardless of its architecture (centralized or peer-to-peer),\
    \ can ensure that a digital good will only be spent once, provided the ledger\
    \ works correctly all the time.\n\n### Solving Double Spending as a Problem of\
    \ a Distributed Peer-to-Peer System of Ledgers\n\nIn this context, the architecture\
    \ as well as the application domain of the system are given. Distributed peer-to-peer\
    \ systems of ledgers are often regarded as the classical example to derive the\
    \ `blockchain`. The explanations provided in Step [6](#A436689_1_En_6_Chapter.html)\
    \ highlighted the relation between the `blockchain` and distributed peer-to-peer\
    \ systems of ledgers. Hence, the `blockchain`, as this term is used throughout\
    \ this book, can be seen as a solution to the `double spending` problem in a distributed\
    \ peer-to-peer system of ledgers.\n\n### Solving Double Spending as an Example\
    \ of Violated Integrity in Distributed Peer-to-Peer Systems\n\nIn this context,\
    \ the architecture of the system is specified but the application domain is left\
    \ unspecified. Hence, solutions on this level focus on achieving and maintaining\
    \ integrity in distributed peer-to-peer systems, regardless of their concrete\
    \ usage. However, the concrete usage of a distributed peer-to-peer system determines\
    \ the meaning of integrity. For example, a simple file-sharing application may\
    \ consider different aspects for defining integrity as compared to a system that\
    \ manages ownership in a digital currency. Hence, the question of whether the\
    \ `blockchain-technology-suite` is the right tool for achieving and maintaining\
    \ system integrity cannot be answered without knowledge of the specific application\
    \ goals. Hence, it could be possible that in specific application areas of distributed\
    \ peer-to-peer systems, other technologies, data structures, and algorithms are\
    \ more suitable for achieving and maintaining integrity.\n\n> **Note**  \n> The\
    \ `double spending` problem is a prominent example of violated integrity in distributed\
    \ peer-to-peer systems of ledgers, and the `blockchain-technology-suite` is a\
    \ tool used to solve it.\n\n## The Usage of Double Spending in This Book\n\nIn\
    \ this book the term `double spending` is used to refer to a vulnerability that\
    \ may appear in purely distributed peer-to-peer systems of ledgers.\n\n## Outlook\n\
    \nThis step explained `double spending` and highlighted the importance of the\
    \ `blockchain` to achieve integrity in purely distributed peer-to-peer systems.\
    \ The next steps focus on how the `blockchain` achieves and maintains integrity.\n\
    \n## Summary\n\n- The term `double spending` is ambiguous; it has different meanings.\n\
    - `Double spending` can refer to:\n  - A problem caused by copying digital goods\n\
    \  - A problem that may appear in a distributed peer-to-peer system of ledgers\n\
    \  - An example of violating the integrity of distributed peer-to-peer systems\n\
    - In this book the term `double spending` is used to refer to a vulnerability\
    \ of purely distributed peer-to-peer systems of ledgers.\n- The `blockchain` is\
    \ a means to solve the `double spending` problem.\n\n# Part III  \nHow the Blockchain\
    \ Works\n\nThis learning stage is the centerpiece of this book because it explains\
    \ how the `blockchain` works internally. The 14 learning steps in this stage will\
    \ guide you through all of the concepts of the `blockchain` and their underlying\
    \ technologies. By the end of this stage, you will have reached a solid understanding\
    \ of all the major concepts of the `blockchain`, how they work in isolation, and\
    \ how they interact in order to create the big machinery that is called the `blockchain`.\n\
    \n# 8. Planning the Blockchain\n\nThe basic concepts of managing ownership with\
    \ the `blockchain`\n\nThe preceding steps uncovered the relation between trust,\
    \ integrity, purely distributed peer-to-peer systems, and the `blockchain`. As\
    \ a result, you now have a good understanding of what the `blockchain` is, why\
    \ it is needed, and what problem it solves. However, you still do not know how\
    \ the `blockchain` works internally. This step provides a first impression of\
    \ how the `blockchain` works by explaining the general application scenario that\
    \ will guide you through the succeeding steps. It also highlights the major tasks\
    \ in designing a `blockchain` for managing ownership and provides an overview\
    \ of its major concepts. This step serves as the starting point for the succeeding\
    \ steps that will discuss in great detail the concepts and technologies that make\
    \ up the `blockchain`."
