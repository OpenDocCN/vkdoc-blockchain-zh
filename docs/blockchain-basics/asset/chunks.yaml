- fmt: "# Lack of Flexibility\n\nThe blockchain is a complex technical construct that\
    \ consists of a variety of concepts and protocols that are optimized and adopted\
    \ to one another. Changing that fine-tuned ecosystem can be very challenging.\
    \ Actually, there is no established procedure for how to change or upgrade major\
    \ components of a blockchain once it has started its operation. This implicitly\
    \ constitutes a long service life for the technologies that make up the blockchain.\
    \ For example, the cryptographic procedures have to be valid for the lifetime\
    \ of the blockchain, which is potentially centuries. This is also true for the\
    \ blockchain-algorithm and how conflicts are resolved. There is also a problem\
    \ for people developing on the blockchain caused by immutability, in that it is\
    \ difficult to fix bugs or make adjustments to the blockchain protocol. These\
    \ characteristics make the whole blockchain-technology-suite less flexible than\
    \ other technologies.\n\n# Critical Size\n\nThe robustness against manipulations\
    \ and hence the trustworthiness of the collectively maintained history of transaction\
    \ data rely on the assumption that the majority of the system’s computational\
    \ power is controlled by honest nodes. However, in small peer-to-peer systems\
    \ with a limited computational power, that majority can still be very small, which\
    \ in turn could make it possible to perform a 51 percent attack. This problem\
    \ is in particularly relevant for cryptocurrencies with low market capitalization\
    \ and limited user adoption. Hence, any blockchain will require a critical mass\
    \ of honest nodes to support it and make it resistant to attackers with a lot\
    \ of computational power. Reaching a critical size that makes 51 percent attacks\
    \ impossible is a challenge that every new blockchain has to face.\n\n## Nontechnical\
    \ Limitations of the Blockchain\n\nThe most important nontechnical limitations\
    \ of the blockchain are:\n\n*   Lack of legal acceptance\n*   Lack of user acceptance\n\
    \n### Lack of Legal Acceptance\n\nThe blockchain is a technology that offers its\
    \ users the possibility to manage and transfer ownership in an open and purely\
    \ distributed peer-to-peer system. The way independent peers manage ownership\
    \ collectively through a distributed consensus has raised questions concerning\
    \ the legal consequences of transactions being made and managed in the blockchain.\
    \ Questions regarding the legal implications and acceptance of transactions performed\
    \ in the blockchain need to be discussed regardless of the safety, security, and\
    \ sophistication of its technology. It is a question regarding the incorporation\
    \ of a new approach of managing ownership in the established legal system. Those\
    \ who witnessed the emergence and development of the Internet may see a similarity\
    \ between legal statuses of the blockchain nowadays and the lack of legal acceptance\
    \ of Internet commerce in the 1990s.\n\n### Lack of User Acceptance\n\nUser acceptance,\
    \ or a lack of it, is another limitation that cannot be underestimated. An open\
    \ legal status of the blockchain will cause uncertainty among its users, which\
    \ in turn will reduce their interest in using it. An additional aspect of user\
    \ acceptance is knowledge and education. It is unrealistic to expect that customers\
    \ will use and trust the blockchain when its fundamental functioning is not understood.\n\
    \n## Overcoming the Limitations\n\nBoth the technical and the nontechnical limitations\
    \ are considered major hurdles for the adoption of the blockchain in real-world\
    \ applications. How to overcome particular limitations has been, and still is,\
    \ an area of active research and further developments. A detailed discussion of\
    \ these activities is beyond the scope of this book. However, the following sections\
    \ sketch how to overcome the limitations of the blockchain.\n\n### Technical Limitations\n\
    \nOvercoming the technical limitations of the blockchain may require interventions\
    \ on all components and technical levels. One of the major challenges in overcoming\
    \ technical limitation of the blockchain is the distinction between improving\
    \ its technology and changing its technology fundamentally. The next step discusses\
    \ this subject in more detail.\n\n### Nontechnical Limitations\n\nThe nontechnical\
    \ limitations of the blockchain can be seen as social, economic, legal, and psychological\
    \ aspects of adapting to a new technology. Education and legal initiatives can\
    \ be seen as the appropriate measures to master the adoption of the blockchain.\
    \ The example of the Internet and e-commerce has already shown that it takes time\
    \ to answer legal questions that come with new technologies and that it takes\
    \ time for users to understand, trust, and use them. Fortunately, the case of\
    \ the Internet and e-commerce has also illustrated that educational initiatives\
    \ about the functioning of a new technologies increase its acceptance and adoption\
    \ among users and foster the solution of legal issues.\n\n## Outlook\n\nThis step\
    \ highlighted major technical and nontechnical limitations of the blockchain that\
    \ can be regarded as hurdles for its adoption. Educational and legal initiatives\
    \ can be seen as a way to overcome the nontechnical initiatives of the blockchain.\
    \ The next step focuses on overcoming some of the technical limitations.\n\n##\
    \ Summary\n\n*   The openness of the blockchain and the absence of any form of\
    \ central control are the fundamentals of its functioning but can also cause limitations\
    \ for its adoption.\n*   Major technical limitations of the blockchain are:\n\
    \    *   Lack of privacy\n    *   The security model\n    *   Limited scalability\n\
    \    *   High costs\n    *   Hidden centrality\n    *   Lack of flexibility\n\
    \    *   Critical size\n*   The most important nontechnical limitations of the\
    \ blockchain are:\n    *   Lack of legal acceptance\n    *   Lack of user acceptance\n\
    *   Technical limitations of the blockchain can be overcome by improving the existing\
    \ technology or by introducing conceptual changes.\n*   The nontechnical limitations\
    \ of the blockchain can be overcome by educational and legislative initiatives.\n\
    \n**Footnotes**\n\n[1](#A436689_1_En_22_Chapter.html#Fn1_source) Nakamoto, Satoshi.\
    \ Bitcoin: A peer-to-peer electronic cash system. 2008. `https:bitcoin.org/bitcoin.pdf`.\n\
    \n[2](#A436689_1_En_22_Chapter.html#Fn2_source) Taylor, Michael Bedford. Bitcoin\
    \ and the age of bespoke silicon. In Proceedings of the 2013 International Conference\
    \ on Compilers, Architectures and Synthesis for Embedded Systems. Montreal: IEEE\
    \ Press, 2013.\n\n[3](#A436689_1_En_22_Chapter.html#Fn3_source) Kroll, Joshua\
    \ A., Ian C. Davey, and Edward W. Felten. The economics of Bitcoin mining, or\
    \ Bitcoin in the presence of adversaries. Proceedings of WEIS. 2013.\n\n# Reinventing\
    \ the Blockchain\n\nThe emergence of four different kinds of blockchain\n\nStep\
    \ 22 highlighted the major limitations of the blockchain and sketched possible\
    \ approaches to overcome them. This step goes a bit further in analyzing two of\
    \ the major technical limitations of the blockchain. It explains the root of the\
    \ major technical limitations of the blockchain and explains how they have been\
    \ overcome. This step will also explain the emergence of four distinct versions\
    \ of the blockchain and their differences and discusses the consequences of the\
    \ emergence of these versions of the blockchain.\n\n## The Metaphor\n\nOftentimes\
    \ we try to achieve two or more goals that cannot be fulfilled at the same time,\
    \ such as doing work quickly and correctly or driving fast and safe. The incompatibility\
    \ between two or more opinions or goals is called a conflict, which can be solved\
    \ either by finding a compromise or by deciding in favor of one option to the\
    \ disadvantage of all alternatives. This step presents two major conflicts of\
    \ the blockchain that are represented in two of its major technical limitations\
    \ and how the attempt to overcome them led to the invention of four distinct versions\
    \ of the blockchain."
