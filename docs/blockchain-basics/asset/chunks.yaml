    \  \n\n> Apress 商业团队  \n\n## 引言  \n\n本引言回答了每位作者都必须回答的最重要问题：为什么有人应该读这本书？或者更具体地说：为什么有人应该再读一本关于区块链的书？请继续阅读，您将了解本书的写作缘由、您能从本书中期待什么、您不能期待什么、本书的读者对象以及本书的结构。\
    \  \n\n### 为何要再写一本关于区块链的书？  \n\n区块链在公众讨论和媒体中受到了广泛关注。一些爱好者声称，区块链是互联网出现以来最伟大的发明。因此，过去几年中涌现了大量关于区块链的书籍和文章。然而，如果您想更深入地了解区块链的工作原理，您可能会发现自己迷失在这样一个书籍宇宙中：它们要么对技术细节匆匆带过，要么以高度形式化的水平讨论底层技术概念。前者可能会让您感到不满足，因为它们未能解释理解和欣赏区块链所必需的技术细节；而后者可能会让您感到不满足，因为它们已经要求您具备想要获取的知识。\
    \  \n\n本书填补了纯粹技术性区块链书籍与主要关注特定应用、或讨论其预期经济影响、或展望其未来的文献之间的空白。  \n\n撰写本书是因为，要理解特定的区块链应用、评估区块链初创企业的商业案例，或跟上关于其预期经济影响的讨论，对区块链技术基础的概念性理解是必要的。如果不理解其底层概念，就无法评估区块链的总体价值或潜在影响，也无法理解特定区块链应用带来的增值。本书聚焦于区块链的底层概念，因为对一项新技术缺乏理解，可能会导致被热潮冲昏头脑，而后因不切实际、毫无根据的期望而失望。\
    \  \n\n本书以非技术性、简洁且易于理解的方式，教授构成区块链的那些概念。它回答了接触一项新技术时产生的三个大问题：它是什么？我们为什么需要它？它是如何工作的？\
    \  \n\n### 您不能从本书中期待什么  \n\n本书特意对区块链的应用持中立态度。尽管加密货币（尤其是比特币）是区块链的突出应用，但本书将区块链作为一种通用技术进行阐释。之所以选择这种方法，是为了突出区块链的通用概念和技术模式，而不是聚焦于某个特定的、狭隘的应用案例。因此，本书：\
    \  \n\n*   并非专门关于比特币或任何其他加密货币的文本  \n*   并非仅关于某一特定区块链应用的文本  \n*   并非关于证明区块链数学基础的文本\
    \  \n*   并非关于编程实现区块链的文本  \n*   并非关于区块链法律后果和影响的文本  \n*   并非关于区块链对我们社会或人类整体在社会、经济或伦理方面影响的文本\
    \  \n\n然而，其中一些观点会在本书的适当章节中得到一定程度的阐述。"
- fmt: '# What You Can Expect from This Book


    This book explains the technical concepts of the blockchain such as transactions,
    hash values, cryptography, data structures, peer-to-peer systems, distributed
    systems, system integrity, and distributed consensus in a nontechnical fashion.
    The didactical approach of this book is based on four elements:


    - Conversational style

    - No mathematics and no formulas

    - Incremental steps through the problem domain

    - Use of metaphors and analogies


    ## Conversational Style


    This book is deliberately written in a conversational style. It does not use mathematical
    or computer science jargon in order to avoid any hurdle for nontechnical readers.
    However, the book introduces and explains the necessary terminology needed to
    join the discussion and to understand other publications about the blockchain.


    ## No Mathematics and No Formulas


    Major elements of the blockchain such as cryptography and algorithms are based
    on complex mathematical concepts, which in turn come with their own demanding
    and sometimes frightening mathematical notation and formulas. However, this book
    deliberately does not use any mathematical notation or formulas in order to avoid
    any unnecessary complexity or hurdle for nontechnical readers.


    ## Incremental Steps Through the Problem Domain


    The chapters in this book are called steps for a good reason. These steps form
    a learning path that incrementally builds the knowledge about the blockchain.
    The order of the steps was chosen carefully. They cover the fundamentals of software
    engineering, explain the terminology, point out the reason why the blockchain
    is needed, and explain the individual concepts that make up the blockchain as
    well as their interactions. Calling the individual chapters steps highlights their
    dependence and their didactical purpose. They form a logical sequence to be followed
    instead of being chapters that could be read independently.


    ## Use of Metaphors and Analogies


    Each step that introduces a new concept starts with a pictorial explanation by
    referring to a situation from real life. These metaphors serve four major purposes.
    First, they prepare the reader for introduction to a new technical concept. Second,
    by connecting a technical concept to an easy-to-understand real-world scenario,
    the metaphors reduce the mental hurdle to discover a new territory. Third, metaphors
    allow learning new concepts by similarities and analogies. Finally, metaphors
    provide rules of thumb for memorizing new concepts.


    # How This Book Is Organized


    This book consists of 25 steps grouped into five major stages that all together
    form a learning path, which incrementally builds your knowledge of the blockchain.
    These steps cover some fundamentals of software engineering, explain the required
    terminology, point out the reasons why the blockchain is needed, explain the individual
    concepts that make up the blockchain as well as their interactions, consider applications
    of the blockchain, and mention areas of active development and research.


    ## Stage I: Terminology and Technical Foundations


    Steps [1](#A436689_1_En_1_Chapter.html) to [3](#A436689_1_En_3_Chapter.html) explain
    major concepts of software engineering and set the terminology necessary for understanding
    the succeeding steps. By the end of Step [3](#A436689_1_En_3_Chapter.html), you
    will have gained an overview of the fundamental concepts and an appreciation of
    the big picture in which the blockchain is located.


    ## Stage II: Why the Blockchain Is Needed


    Steps [4](#A436689_1_En_4_Chapter.html) to [7](#A436689_1_En_7_Chapter.html) explain
    why the blockchain is needed, what problem it solves, why solving this problem
    is important, and what potential the blockchain has. By the end of Step [7](#A436689_1_En_7_Chapter.html),
    you will have gained a good understanding of the problem domain in which the blockchain
    is located, the environment in which it provides the most value, and why it is
    needed in the first place.


    ## Stage III: How the Blockchain Works


    The third stage is the centerpiece of this book since it explains how the blockchain
    works internally. Steps [8](#A436689_1_En_8_Chapter.html) to [21](#A436689_1_En_21_Chapter.html)
    guide you through 15 distinct technical concepts that all together make up the
    blockchain. By the end of Step [21](#A436689_1_En_21_Chapter.html), you will have
    reached an understanding of all the major concepts of the blockchain, how they
    work in isolation, and how they interact in order to create the big machinery
    that is called the blockchain.


    ## Stage IV: Limitations and How to Overcome Them


    Steps [22](#A436689_1_En_22_Chapter.html) to [23](#A436689_1_En_23_Chapter.html)
    focus on major limitations of the blockchain, explain their reasons, and sketch
    possible ways to overcome them. By the end of Step [23](#A436689_1_En_23_Chapter.html),
    you will understand why the original idea of the blockchain as explained in the
    previous steps may not be suitable for large-scale commercial applications, what
    changes were made to overcome these limitations, and how these changes altered
    the properties of the blockchain.


    ## Stage V: Using the Blockchain, Summary, and Outlook


    Steps [24](#A436689_1_En_24_Chapter.html) and [25](#A436689_1_En_25_Chapter.html)
    consider how the blockchain can be used in real life and what questions should
    to be addressed when selecting a blockchain application. This stage also points
    out areas of active research and further development. By the end of Step [25](#A436689_1_En_25_Chapter.html),
    you will have gained a well-grounded understanding of the blockchain and you will
    be well prepared to read more advanced texts or to become an active part in the
    ongoing discussion about the blockchain.'
  raw: '## What You Can Expect from This Book


    This book explains the technical concepts of the blockchain such as ­transactions,
    hash values, cryptography, data structures, peer-to-peer systems, distributed
    systems, system integrity, and distributed consensus in a ­nontechnical fashion.
    The didactical approach of this book is based on four elements:


    *   Conversational style

    *   No mathematics and no formulas

    *   Incremental steps through the problem domain

    *   Use of metaphors and analogies


    ### Conversational Style


    This book is deliberately written in a conversational style. It does not use mathematical
    or computer science jargon in order to avoid any hurdle for nontechnical readers.
    However, the book introduces and explains the necessary terminology needed to
    join the discussion and to understand other publications about the blockchain.


    ### No Mathematics and No Formulas


    Major elements of the blockchain such as cryptography and algorithms are based
    on complex mathematical concepts, which in turn come with their own demanding
    and sometimes frightening mathematical notation and formulas. However, this book
    deliberately does not use any mathematical notation or formulas in order to avoid
    any unnecessary complexity or hurdle for nontechnical readers.


    ### Incremental Steps Through the Problem Domain


    The chapters in this book are called steps for a good reason. These steps form
    a learning path that incrementally builds the knowledge about the blockchain.
    The order of the steps was chosen carefully. They cover the fundamentals of software
    engineering, explain the terminology, point out the reason why the blockchain
    is needed, and explain the individual concepts that make up the blockchain as
    well as their interactions. Calling the individual chapters steps highlights their
    dependence and their didactical purpose. They form a logical sequence to be followed
    instead of being chapters that could be read independently.


    ### Use of Metaphors and Analogies


    Each step that introduces a new concept starts with a pictorial explanation by
    referring to a situation from real life. These metaphors serve four major purposes.
    First, they prepare the reader for introduction to a new technical concept. Second,
    by connecting a technical concept to an easy-to-understand real-world scenario,
    the metaphors reduce the mental hurdle to discover a new territory. Third, metaphors
    allow learning new concepts by similarities and analogies. Finally, metaphors
    provide rules of thumb for memorizing new concepts.


    ## How This Book Is Organized


    This book consists of 25 steps grouped into five major stages that all together
    form a learning path, which incrementally builds your knowledge of the blockchain.
    These steps cover some fundamentals of software engineering, explain the required
    terminology, point out the reasons why the blockchain is needed, explain the individual
    concepts that make up the blockchain as well as their interactions, consider applications
    of the blockchain, and mention areas of active development and research.


    ### Stage I: Terminology and Technical Foundations


    Steps [1](#A436689_1_En_1_Chapter.html) to [3](#A436689_1_En_3_Chapter.html) explain
    major concepts of software engineering and set the terminology necessary for understanding
    the succeeding steps. By the end of Step [3](#A436689_1_En_3_Chapter.html) , you
    will have gained an overview of the fundamental concepts and an appreciation of
    the big picture in which the blockchain is located.


    ### Stage II: Why the Blockchain Is Needed


    Steps [4](#A436689_1_En_4_Chapter.html) to [7](#A436689_1_En_7_Chapter.html) explain
    why the blockchain is needed, what problem it solves, why solving this problem
    is important, and what potential the blockchain has. By the end of Step [7](#A436689_1_En_7_Chapter.html)
    , you will have gained a good understanding of the problem domain in which the
    blockchain is located, the environment in which it provides the most value, and
    why it is needed in the first place.


    ### Stage III: How the Blockchain Works


    The third stage is the centerpiece of this book since it explains how the blockchain
    works internally. Steps [8](#A436689_1_En_8_Chapter.html) to [21](#A436689_1_En_21_Chapter.html)
    guide you through 15 distinct technical concepts that all together make up the
    blockchain. By the end of Step [21](#A436689_1_En_21_Chapter.html) , you will
    have reached an understanding of all the major concepts of the blockchain, how
    they work in isolation, and how they interact in order to create the big machinery
    that is called the blockchain.


    ### Stage IV: Limitations and How to Overcome Them


    Steps [22](#A436689_1_En_22_Chapter.html) to [23](#A436689_1_En_23_Chapter.html)
    focus on major limitations of the blockchain, explain their reasons, and sketch
    possible ways to overcome them. By the end of Step [23](#A436689_1_En_23_Chapter.html)
    , you will understand why the original idea of the blockchain as explained in
    the previous steps may not be suitable for large-scale commercial applications,
    what changes were made to overcome these limitations, and how these changes altered
    the properties of the blockchain.


    ### Stage V: Using the Blockchain, Summary, and Outlook


    Steps [24](#A436689_1_En_24_Chapter.html) and [25](#A436689_1_En_25_Chapter.html)
    consider how the blockchain can be used in real life and what questions should
    to be addressed when selecting a blockchain application. This stage also points
    out areas of active research and further development. By the end of Step [25](#A436689_1_En_25_Chapter.html)
    , you will have gained a well-grounded understanding of the blockchain and you
    will be well prepared to read more advanced texts or to become an active part
    in the ongoing discussion about the blockchain.'
