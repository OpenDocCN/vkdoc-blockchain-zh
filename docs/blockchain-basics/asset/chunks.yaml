    \ regarded as the classical example to derive the blockchain. The explanations\
    \ provided in Step [6](#A436689_1_En_6_Chapter.html) highligted the relation between\
    \ the blockchain and distributed peer-to-peer systems of ledgers. Hence, the blockchain,\
    \ as this term is used throughoutthis book, can be seen as a solution to the double\
    \ spending problem in a distributed peer-to-peer system of ledgers.\n\n### Solving\
    \ Double Spending as an Example of Violated Integrity in Distributed Peer-to-Peer\
    \ Systems\n\nIn this context, the architecture of the system is specified but\
    \ the application domain is left unspecified. Hence, solutions on this level focus\
    \ on achieving and maintaining integrity in distributed peer-to-peer systems,\
    \ regardless of their concrete usage. However, the concrete usage of a distributed\
    \ peer-to-peer system determines the meaning of integrity. For example, a simple\
    \ file-sharing application may consider different aspects for defining integrity\
    \ as compared to a system that manages ownership in a digital currency. Hence,\
    \ the question of whether the blockchain-technology-suite is the right tool for\
    \ achieving and maintaining system integrity cannot be answered without knowledge\
    \ of the specific application goals. Hence, it could be possible that in specific\
    \ application areas of distributed peer-to-peer systems, other technologies, data\
    \ structures, and algorithms are more suitable for achieving and maintaining integrity.\n\
    \nNote\n\nThe double spending problem is a prominent example of violated integrity\
    \ in distributed peer-to-peer systems of ledgers, and the blockchain-technology-suite\
    \ is a tool used to solve it.\n\n## The Usage of Double Spending in This Book\n\
    \nIn this book the term double spending is used to refer to a vulnerability that\
    \ may appear in purely distributed peer-to-peer systems of ledgers.\n\n## Outlook\n\
    \nThis step explained double spending and highlighted the importance of the blockchain\
    \ to achieve integrity in purely distributed peer-to-peer systems. The next steps\
    \ focus on how the blockchain achieves and maintains integrity.\n\n## Summary\n\
    \n*   The term double spending is ambiguous; it has different meanings.\n*   Double\
    \ spending can refer to:\n    *   A problem caused by copying digital goods\n\
    \    *   A problem that may appear in a distributed peer-to-peer system of ledgers\n\
    \    *   An example of violating the integrity of distributed peer-to-peer systems\n\
    *   In this book the term double spending is used to refer to a vulnerability\
    \ of purely distributed peer-to-peer systems of ledgers.\n*   The blockchain is\
    \ a means to solve the double spending problem.\n\n# Part III\nHow the Blockchain\
    \ Works\n\nHow the Blockchain Works\n\nThis learning stage is the centerpiece\
    \ of this book because it explains how the blockchain works internally. The 14\
    \ learning steps in this stage will guide you through all of the concepts of the\
    \ blockchain and their underlying technologies. By the end of this stage, you\
    \ will have reached a solid understanding of all the major concepts of the blockchain,\
    \ how they work in isolation, and how they interact in order to create the big\
    \ machinery that is called the blockchain.\n\n# 8. Planning the Blockchain\n\n\
    The basic concepts of managing ownership with the blockchain\n\nThe preceding\
    \ steps uncovered the relation between trust, integrity, purely distributed peer-to-peer\
    \ systems, and the blockchain. As a result, you now have a good understanding\
    \ of what the blockchain is, why it is needed, and what problem it solves. However,\
    \ you still do not know how the blockchain works internally. This step provides\
    \ a first impression of how the blockchain works by explaining the general application\
    \ scenario that will guide you through the succeeding steps. It also highlights\
    \ the major tasks in designing a blockchain for managing ownership and provides\
    \ an overview of its major concepts. This step serves as the starting point for\
    \ the succeeding steps that will discuss in great detail the concepts and technologies\
    \ that make up the blockchain."
  trans: "\n## 术语\n\n类似于术语`blockchain`，术语`double spending`也存在歧义，它被用来指代以下概念：\n\n- 由复制数字商品引发的问题\n\
    - 分布式点对点账本系统中可能出现的问题\n- 纯分布式点对点系统中完整性被破坏的一个例子\n\n### 双花作为数字商品复制的问题\n\n在复制数字商品的语境下，`双花`问题指的是计算机上的数据可以不受显著限制地进行复制。这一事实给数字货币或任何在特定时间只能有一个所有者的数据带来了问题。复制使得代表数字货币的数据可以被复制，并多次用于支付。这在数字领域相当于用复印机复制纸币。除了技术上的可行性，复制数字货币违背了货币的核心原则：同一份货币不能同时给予不同的人。能够多次复制和花费数字货币会使货币失去价值，因此产生了`双花`问题。\n\
    \n### 双花作为分布式点对点账本系统的问题\n\n当用于描述分布式点对点账本系统的问题时，`双花`问题指的是将信息转发给系统中所有节点需要时间，因此并非所有节点同时拥有相同的所有权信息。由于并非所有节点都拥有最新信息，它们容易受到已掌握最新信息者的利用。结果，有人可能能够多次转移所有权，导致`双花`。\n\
    \n### 双花作为分布式点对点系统中完整性被破坏的例子\n\n分布式点对点系统的使用并不局限于管理所有权。然而，无论具体的应用领域如何，在节点间转发信息以及更新系统成员所维护数据的问题都是相同的。因此，在更抽象的层面上，`双花`问题可以被视为在分布式点对点系统中维护数据一致性的问题。由于数据一致性是系统完整性的一方面，可以说`双花`问题是系统完整性被破坏的一个具体例子。\n\
    \n## 如何解决双花问题\n\n由于`双花`可能有不同的含义，因此没有单一的预防方法。相反，可能存在多种不同的解决方案。以下部分将描述其中一些方案。\n\n\
    ### 解决作为数字商品复制问题的双花\n\n仅通过复制数据来多次花费数字货币或其他数字资产的问题，实际上是一个与所有权本质相关的问题。任何被接受的、将代表数字商品的数据映射到其所有者的方法，无论其具体实现如何，都能解决这个问题。即使是物理的总账本，或者（更现实地）一个电子账本，无论其架构如何（中心化或点对点），只要账本始终正确运行，就能确保数字商品只被花费一次。\n\
    \n### 解决作为分布式点对点账本系统问题的双花\n\n在这种语境下，系统的架构和应用领域都是给定的。分布式点对点账本系统通常被视为推导出`区块链`的经典例子。步骤\
    \ 6 中的解释强调了`区块链`与分布式点对点账本系统之间的关系。因此，正如本书所使用的术语，`区块链`可以被看作是解决分布式点对点账本系统中`双花`问题的一种方案。\n\
    \n### 解决作为分布式点对点系统中完整性被破坏例子的双花\n\n在这种语境下，系统的架构是明确的，但应用领域则未作规定。因此，这一层面的解决方案侧重于在分布式点对点系统中实现和维护完整性，而不管其具体用途如何。然而，分布式点对点系统的具体用途决定了完整性的含义。例如，与管理系统数字货币所有权的系统相比，一个简单的文件共享应用可能在定义完整性时考虑不同的方面。因此，不了解具体的应用目标，就无法回答`区块链技术套件`是否是实现和维护系统完整性的正确工具。因此，在分布式点对点系统的特定应用领域，可能其他技术、数据结构和算法更适合用于实现和维护完整性。\n\
    \n> **注意**  \n> `双花`问题是分布式点对点账本系统中完整性被破坏的一个突出例子，而`区块链技术套件`是用于解决该问题的工具。\n\n## 本书中双花的用法\n\
    \n在本书中，术语`双花`用于指代纯分布式点对点账本系统中可能出现的一个漏洞。\n\n## 展望\n\n本步骤解释了`双花`，并强调了`区块链`在纯分布式点对点系统中实现完整性的重要性。接下来的步骤将重点介绍`区块链`如何实现和维护完整性。\n\
    \n## 总结\n\n- 术语`双花`具有歧义性；它有多种不同的含义。\n- `双花`可以指：\n  - 由复制数字商品引发的问题\n  - 分布式点对点账本系统中可能出现的问题\n\
    \  - 违反分布式点对点系统完整性的一个例子\n- 在本书中，术语`双花`用于指代纯分布式点对点账本系统的一个漏洞。\n- `区块链`是解决`双花`问题的一种手段。\n\
    \n# 第三部分  \n区块链如何运作\n\n这一学习阶段是本书的核心部分，因为它解释了`区块链`的内部工作原理。本阶段的 14 个学习步骤将引导你了解`区块链`的所有概念及其底层技术。在本阶段结束时，你将扎实理解`区块链`的所有主要概念、它们各自如何独立工作，以及它们如何相互作用以构建出被称为`区块链`的巨大机器。\n\
    \n# 8. 规划区块链\n\n使用`区块链`管理所有权的基本概念\n\n前面的步骤揭示了信任、完整性、纯分布式点对点系统与`区块链`之间的关系。因此，你现在已经很好地理解了什么是`区块链`、为什么需要它以及它解决了什么问题。然而，你仍然不知道`区块链`内部是如何运作的。本步骤通过解释将引导你进入后续步骤的通用应用场景，首次介绍了`区块链`的工作原理。它还强调了在设计用于管理所有权的`区块链`时的主要任务，并概述了其主要概念。本步骤是后续步骤的起点，后续步骤将详细讨论构成`区块链`的概念和技术。\n"
- fmt: '# The Goal


    The goal here is to understand the concepts that make up the blockchain. For didactical
    reasons, I will present the challenge of designing your own system for managing
    ownership. Hence, you will face the same challenges that the inventor of the blockchain
    once faced and successfully solved: designing a piece of software that manages
    ownership in a purely distributed peer-to-peer system of ledgers that operates
    in a completely open and untrustworthy environment.


    # Starting Point


    As a starting point, the major facts about the system under consideration can
    be summarized as following:


    - The system will be a purely distributed peer-to-peer system, which is made of
    the computational resources contributed by its users.

    - The peer-to-peer system uses the Internet as a network for connecting the individual
    nodes.

    - Neither the number of nodes nor their trustworthiness and reliability is known.

    - The goal of the peer-to-peer system is the management of ownership of a digital
    good (e.g., sales bonus points or digital money).


    # The Path to Follow


    There are seven major tasks that need to be addressed when designing and developing
    a software system that manages ownership by using a purely distributed peer-to-peer
    system of ledgers in an open and untrustworthy environment:


    - Describing ownership

    - Protecting ownership

    - Storing transaction data

    - Preparing ledgers to be distributed in an untrustworthy environment

    - Distributing the ledgers

    - Adding new transaction to the ledgers

    - Deciding which ledgers represents the truth


    ## Task 1: Describing Ownership


    Before you can start developing the blockchain, you need to ask yourself what
    you want to do with it. Since you will want to design a software system that manages
    ownership, you have to decide how to describe ownership first. It turns out that
    transactions are a good way to describe any transfer of ownership, and the complete
    history of transactions is the key to identifying the current owners. Hence, Step
    [9](#A436689_1_En_9_Chapter.html) will explain transactions, what they are, how
    you can describe them, and how you can use them to clarify ownership.


    ## Task 2: Protecting Ownership


    Describing ownership by using transactions is just the starting point. Moreover,
    you need a way to prevent people from accessing the property of others. In real
    life, you can easily prevent people from using your car or from entering your
    house by using doors with locks. It turns out that cryptography provides a way
    to protect transactions on an individual level, similar to the way doors with
    locks protect your individual car or house.


    Protecting ownership has three major elements: identifying and authenticating
    owners as well as restricting access to the property to its owners. Steps [12](#A436689_1_En_12_Chapter.html)
    and [13](#A436689_1_En_13_Chapter.html) will explain these concepts in more details.
    However, these steps rely on the concept of hash values. If you have never heard
    about hash values before, you do not have to worry. I devoted Steps [10](#A436689_1_En_10_Chapter.html)
    and [11](#A436689_1_En_11_Chapter.html) to explaining hash values in great detail.
    These two steps will also offer interesting insights for those who already have
    a technical background or know about hash values.


    ## Task 3: Storing Transaction Data


    Describing ownership by means of transactions and having security measures that
    protect ownership on the level of individual transactions are important steps
    toward the goal of designing a software system that manages ownership. However,
    you need a way to store the whole history of transactions, as this history is
    used to clarify ownership. Since the transaction history is the core element in
    clarifying ownership, it must be stored in a secure way. It turns out that the
    blockchain-data-structure is the digital equivalent to a ledger. Steps [14](#A436689_1_En_14_Chapter.html)
    and [15](#A436689_1_En_15_Chapter.html) explain the requirement that the blockchain-data-structure
    has to fulfill in order to serve as a digital ledger and how it is implemented.


    ## Task 4: Preparing Ledgers to Be Distributed in an Untrustworthy Environment


    Having one isolated ledger or blockchain-data-structure that contains transaction
    data is great, but your aim is to design a distributed peer-to-peer system of
    ledgers that operates in an untrustworthy environment. Hence, you will have copies
    of the ledger running on untrustworthy nodes in an untrustworthy network. Furthermore,
    you will hand over the control of the ledgers to the whole network without having
    any central point of control or coordination. How can you prevent the ledgers
    from being forged or manipulated (e.g., by deleting transactions from the history
    or adding illegal transactions to it)? It turns out that the best way to prevent
    the transaction history from being changed is to make it unchangeable. This means
    the ledgers and therefore the transaction history cannot be changed once written.
    As a result, you will not have to fear that the ledgers will be tampered with
    or forged because they cannot be changed in the first place. However, having a
    distributed peer-to-peer system of ledgers that can never be changed sounds like
    a very secure but pretty useless thing because it will not allow you to add new
    transactions. Hence, the challenge of the blockchain-data-structure is to be unchangeable,
    on the one hand, while accepting new transactions being added to it, on the other
    hand. This sounds like a contradiction in terms, but it turns out that this is
    achievable with a technical trick that is explained in Step [16](#A436689_1_En_16_Chapter.html).
    The result is a blockchain-data-structure that is append-only: it is possible
    to add new transactions, but it is nearly impossible to change data that were
    added in the past.


    ## Task 5: Distributing the Ledgers


    Once the ledger is append-only, you can create a distributed peer-to-peer system
    of ledgers by making copies of it available to everyone who asks for it. However,
    just providing copies of append-only ledgers does not fulfill your goals. A distributed
    system that manages ownership involves interaction between the peers or nodes,
    respectively. Hence, Step [17](#A436689_1_En_17_Chapter.html) explains how the
    nodes in the system interact with one another and what information is exchanged
    among them.


    ## Task 6: Adding New Transactions to the Ledgers


    The distributed peer-to-peer system will consist of members whose computers maintain
    individual copies of an append-only blockchain-data-structure. Since the data
    structure allows you to add new transaction data, you will have to ensure that
    only valid and authorized transactions are added. It turns out that this is possible
    by allowing all members of the peer-to-peer system to add new data and additionally
    turning each member of the peer-to-peer system into supervisors of their peers.
    As a result, all members will supervise one another and point out any mistakes
    made by their peers. Step [18](#A436689_1_En_18_Chapter.html) explains this approach
    in more detail as well as the incentives given to the peers for fulfilling their
    role.'
