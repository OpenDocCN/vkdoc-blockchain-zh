    \ and its potential.\n\n# 1. Thinking in Layers and Aspects\n\nAnalyzing systems\
    \ by separating them into layers and aspects\n\nThis step lays the foundation\
    \ of our learning path through the blockchain by introducing a way to organize\
    \ and standardize our communication about technology. This step explains how you\
    \ can analyze a software system and why it is important to consider a software\
    \ system as a composition of layers. Furthermore, this step illustrates what you\
    \ can gain from considering different layers in a system and how this approach\
    \ helps us to understand the blockchain. Finally, this step provides a short introduction\
    \ to the concept of software integrity and highlights its importance.\n\n## The\
    \ Metaphor\n\nDo you have a mobile phone? I would guess yes, as most people now\
    \ have at least one. How much do you know about the different wireless communication\
    \ protocols that are used to send and receive data? How much do you know about\
    \ electromagnetic waves that are the foundation of mobile communication? Well,\
    \ most of us do not know very much about these details because it is not necessary\
    \ to know them in order to use a mobile phone and most of us do not have the time\
    \ to learn about them. We mentally separate the mobile phone into the parts we\
    \ need to know and the parts that can be ignored or taken for granted.\n\nThis\
    \ approach to technology is not restricted to mobile phones. We use it all the\
    \ time when we learn how to use a new television set, a computer, a washing machine,\
    \ and so forth. However, these mental partitions are highly individual since what\
    \ is considered important and what is not depends on our individual preferences,\
    \ the specific technology, and our goals and experiences. As a result, your mental\
    \ partition of a mobile phone may differ from my mental partition of the same\
    \ mobile phone. This typically leads to problems in communication in particular\
    \ when I try to explain to you what you should know about a certain mobile phone.\
    \ Hence, unifying the way of partitioning a system is the key point when teaching\
    \ and discussing technology. This step explains how to partition or layer a system\
    \ and hence sets the basis for our communication about the blockchain.\n\n## Layers\
    \ of a Software System\n\nThe following two ways of partitioning a system are\
    \ used throughout this book:\n\n- Application vs. implementation\n- Functional\
    \ vs. nonfunctional aspects\n\n### Application vs. Implementation\n\nMentally\
    \ separating the user’s needs from the technical internals of a system leads to\
    \ a separation of the application layer from the implementation layer. Everything\
    \ that belongs to the application layer is concerned with the user’s needs (e.g.,\
    \ listening to music, taking photos, or booking hotel rooms). Everything that\
    \ belongs to the implementation layer is concerned with making these things happen\
    \ (e.g., converting digital information into acoustic signals, recognizing the\
    \ color of a pixel in a digital camera, or sending messages over the Internet\
    \ to a booking system). Elements of the implementation layer are technical by\
    \ nature and are considered a means to an end.\n\n### Functional vs. Nonfunctional\
    \ Aspects\n\nDistinguishing between what a system does and how it does what it\
    \ does leads to the separation of functional and nonfunctional aspects. Examples\
    \ of functional aspects are sending data over a network, playing music, taking\
    \ photos, and manipulating individual pixels of a picture. Examples of nonfunctional\
    \ aspects are a beautiful graphical user interface, fast-running software, and\
    \ an ability to keep user data private and save. Other important nonfunctional\
    \ aspects of a system are security and integrity. Integrity means that a system\
    \ behaves as intended, and it involves many aspects such as security and correctness.[¹](#A436689_1_En_1_Chapter.html#Fn1)\
    \ There is a nice way to remember the difference between functional and nonfunctional\
    \ aspects of a system by referring to grammar usage in the English language: verbs\
    \ describe actions or what is done, while adverbs describe how an action is done.\
    \ For example, a person can walk quickly or slowly. In both cases, the action\
    \ of “walk” is identical but how the action is performed differs. As a rule of\
    \ thumb, one can say that functional aspects are similar to verbs, while nonfunctional\
    \ aspects are similar to adverbs."
