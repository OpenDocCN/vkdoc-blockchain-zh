  trans: '

    ## 工作原理：宏观概览


    区块链使交易历史不可篡改的核心思路是，让篡改的代价高到足以阻止任何人去尝试。实现交易数据历史记录的不可篡改包含三个要素：


    1.  以任何微小的数据篡改都会暴露且被察觉的方式存储交易历史数据。

    2.  确保在交易历史中嵌入篡改内容需要重写其中的绝大部分数据。

    3.  在历史记录中增加、写入或重写数据在计算上是昂贵的。


    ### 让篡改行为无所遁形


    采用`blockchain-data-structure`数据结构以敏感于变更的方式来存储数据，满足了第一个要素。因此，任何人都无法在`blockchain-data-structure`数据中静默地篡改数据并期望无人察觉。任何更改都会因破坏哈希引用而引发巨大的“噪音”，因为更改所引用的数据会导致这些引用失效。


    ### 强制重写历史以嵌入更改


    `blockchain-data-structure`数据结构也满足了第二个要素，因为它在处理数据变更时采用了一种极端、非黑即白的方法：要么从引发变更的点开始，一直重写到整个链的顶端；要么就最好不要去改它。


    ### 让添加数据在计算上变得昂贵


    第三个要素是针对那些不畏惧在交易历史中嵌入篡改内容时重写`blockchain-data-structure`大部分数据的人。但是，一旦写入或重写`blockchain-data-structure`会带来巨大的计算成本，人们就会首先三思，这样做是否是个好主意。


    `blockchain-technology-suite`技术套件通过在向`blockchain-data-structure`写入、重写或添加每个区块时产生巨大的计算成本，来确保`blockchain-data-structure`的内容不可篡改。这些计算成本源于每个区块头独有的哈希谜题¹。因此，你要么通过为涉及的每个区块头解开哈希谜题来承担从变更点重写到链顶端的全部成本，要么最好保持原样不变。


    ## 工作原理：详细说明


    如步骤 15 所述，向`blockchain-data-structure`添加新区块的过程本身计算成本并不高，因为它只需要将指向当前链顶端的哈希引用添加到新区块头中，并将其声明为新的链顶端即可。使`blockchain-data-structure`不可篡改的挑战在于，让添加新区块本身成为一项计算成本高昂的任务。要实现这一点，需要考虑以下几个方面：


    -   区块头的必需数据

    -   创建新区块头的流程

    -   区块头的验证规则


    ### 必需数据


    `blockchain-data-structure`中的每个区块头至少必须包含以下数据²：


    -   包含交易数据的默克尔树根

    -   指向前一个区块头的哈希引用

    -   哈希谜题的难度级别

    -   开始解哈希谜题的时间

    -   解开哈希谜题的随机数（nonce）


    ### 创建新区块的流程


    创建新区块包含以下步骤：


    1.  获取包含待添加交易数据的默克尔树的根。

    2.  创建一个指向将成为新区块头前驱区块的区块头的哈希引用。

    3.  获取所需的难度级别。

    4.  获取当前时间。

    5.  创建一个包含步骤 1 至 4 所述数据的初步区块头。

    6.  为这个初步区块头解开哈希谜题。

    7.  将解开哈希谜题的随机数添加到初步区块头中，完成新区块。


    图 16-1 展示了向`blockchain-data-structure`添加新区块时需要解决的哈希谜题。它展示了区块头的数据，其哈希值必须满足给定的约束条件或难度级别。请注意，难度级别是区块头的一部分，因此也是区块哈希值的一部分。这确保了任何人都无法通过随意降低难度级别来绕过哈希谜题的计算成本。


    ![A436689_1_En_16_Fig1_HTML.jpg](img/A436689_1_En_16_Fig1_HTML.jpg)


    图 16-1. 向`blockchain-data-structure`添加新区块时需要解决的哈希谜题示意图


    ### 验证规则


    每个区块头都必须满足以下规则：


    1.  必须包含一个指向前一个区块的有效哈希引用。

    2.  必须包含一个包含交易数据的有效默克尔树根。

    3.  必须包含正确的难度级别。

    4.  其时间戳必须晚于其前一个区块头的时间戳。

    5.  必须包含一个随机数（nonce）。

    6.  将这五部分数据组合在一起计算的哈希值必须满足难度级别。


    这些验证规则确保了只有那些为哈希谜题付出计算成本而求解的区块才能被添加到`blockchain-data-structure`中。规则 4 保证了区块和交易数据确实是按照添加时间排序的。


    > **注意：** 通过解哈希谜题向`blockchain-data-structure`添加新区块的活动也称为**挖矿**或**区块挖掘**。


    ## 为何有效


    `blockchain-data-structure`数据结构使得对其数据的任何更改都会因为哈希引用对于所引用数据更改的脆弱性而无所遁形。这导致需要重写所有受篡改影响的区块。哈希谜题则为每个在嵌入篡改内容时需要重写的区块带来了成本。在嵌入篡改内容过程中重写`blockchain-data-structure`所累积的巨大成本，首先就使得篡改交易历史变得毫无吸引力。因此，`blockchain-data-structure`成为了一个不可篡改、只能追加写入的数据存储库。


    ## 篡改`Blockchain-Data-Structure`的成本


    假设我们试图篡改一笔特定的交易数据，该数据属于一个默克尔树，该树的根位于当前`blockchain-data-structure`顶端下方 20 个区块的区块头中。嵌入被篡改的交易数据需要完成以下工作：


    1.  重写被篡改交易所属的默克尔树。

    2.  重写被重写后的默克尔树根所属的区块头。

    3.  重写所有后续的区块头，直到`blockchain-data-structure`的顶端。


    第 2 点需要解一个哈希谜题，因为更改默克尔根会改变区块头的哈希值，从而改变其哈希谜题的解。第 3 点由于需要连续更改指向前一个区块头的哈希引用，因此需要解开
    20 个哈希谜题。假设平均解开一个哈希谜题需要 10 分钟，那么要将一笔属于当前顶端下方 20 个区块的区块头的交易嵌入篡改内容，总共需要 210 分钟。如此巨大的成本会阻止节点去更`blockchain-data-structure`。

    '
- fmt: "# The Immutable Data Store in the Real World\n\nThe immutability of the `blockchain-data-structure`\
    \ depends on the computational costs induced by the hash puzzle. The difficulty\
    \ of the hash puzzles determines how much computational effort and hence how much\
    \ time is needed to solve them, which in turn determines the immutability of the\
    \ `blockchain-data-structure`. If the difficulty is too low, the computational\
    \ costs of changing the `blockchain-data-structure` will decline and may no longer\
    \ be regarded as prohibitively high, which in turn may encourage nodes to manipulate\
    \ the history of transaction data. On the other hand, if the difficulty is too\
    \ high, even the computational costs of adding a new block may be regarded as\
    \ prohibitively high, which in turn discourages nodes from adding new transaction\
    \ data. Hence, a challenge in designing a blockchain is to determine the appropriate\
    \ level of difficulty for the hash puzzles. This challenge is even more demanding\
    \ as computational power of computers changes due to technical advances. As a\
    \ result, the difficulty level may need to be determined dynamically.\n\nBlockchain\
    \ applications in the real world rarely utilize a constant difficulty level for\
    \ all blocks. Instead they typically utilize a dynamic difficulty level based\
    \ on the speed at which new blocks are added.[³](#A436689_1_En_16_Chapter.html#Fn3)\
    \ This ensures that the time needed to solve the hash puzzle stays at a level\
    \ that prevents nodes from manipulating the history of transaction data while\
    \ the actual computational effort may increase.\n\n# Outlook\n\nThis step explained\
    \ that the blockchain prevents the history of transaction data from being manipulated\
    \ or forged by turning the `blockchain-data-structure` into an immutable append-only\
    \ data store. The next step focuses on making that data store available to everyone\
    \ in a distributed peer-to-peer system.\n\n# Summary\n\n- The blockchain protects\
    \ the history of transaction data from manipulation and forgery by storing transaction\
    \ data in an immutable data store.\n- The history of a transaction is made immutable\
    \ by utilizing two ideas:\n    - Storing the transaction data in the change-sensitive\
    \ `blockchain-data-structure`, which when being changed requires rewriting the\
    \ data structure starting at the point that causes the change until the head of\
    \ the whole chain.\n    - Requiring the solution of a hash puzzle for writing,\
    \ rewriting, or adding every single block header in the `blockchain-data-structure`.\n\
    - The hash puzzle is unique for each block header because it depends on its unique\
    \ content.\n- The need to rewrite the `blockchain-data-structure` when it is changed\
    \ and the costs of doing so make it unattractive to manipulate the history of\
    \ transaction data in the first place.\n- Requiring the solution of a hash puzzle\
    \ for every writing, rewriting or adding of block headers in the `blockchain-data-structure`\
    \ turns is into an append-only data store.\n- A block header contains at least\
    \ the following data:\n    - A hash reference to the header of its preceding block\n\
    \    - The root of a Merkle tree that contains transaction data\n    - The difficulty\
    \ of its hash puzzle\n    - The time when solving the hash puzzle was started\n\
    \    - The nonce that solves the hash puzzle\n\nFootnotes [1](#A436689_1_En_16_Chapter.html#Fn1_source)\n\
    \nNakamoto, Satoshi. Bitcoin: A peer-to-peer electronic cash system. 2008. [`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf)\
    \ .\n\n[2](#A436689_1_En_16_Chapter.html#Fn2_source)\n\nOkupski, Krzysztof. Bitcoin\
    \ developer reference. Working paper. 2014.\n\n[3](#A436689_1_En_16_Chapter.html#Fn3_source)\n\
    \nOkupski, Krzysztof. Bitcoin developer reference. Working paper. 2014; Wood,\
    \ Gavin. Ethereum: A secure decentralized generalized transaction ledger. 2014.\
    \ [`http://gavwood.com/paper.pdf`](http://gavwood.com/paper.pdf) .\n\n# Distributing\
    \ the Data Store Among Peers\n\nWhen computers gossip\n\nStep [16](#A436689_1_En_16_Chapter.html)\
    \ turned the `blockchain-data-structure` into an immutable append-only data store,\
    \ which can be used as a manipulation-resistant ledger for transaction data. Having\
    \ one immutable append-only history of transaction data in isolation may be of\
    \ limited value for the goal of clarifying ownership based on a group of computers\
    \ that acts as witnesses of ownership-related events. Hence, this step focuses\
    \ on establishing a purely distributed peer-to-peer system that allows sharing\
    \ of information about transactions.\n\n## The Metaphor\n\nWhat is the best way\
    \ to spread some personal news among all employees of a company if you do not\
    \ have access to a global e-mail distribution list? One approach that guarantees\
    \ that all employees will eventually receive the news is to share it with one\
    \ or two well-connected and chatty colleagues and ask them to keep the news a\
    \ secret. This approach works out because there is almost no other information\
    \ that is more quickly exchanged among colleagues than personal news that is shared\
    \ under conditions of confidentiality. The reason for this fact is quite simple:\
    \ Human beings are social creatures who have a genuine interest in their peers,\
    \ and sharing information about others is a usual behavioral pattern for renewing\
    \ or strengthening social connections. This step considers an aspect of the blockchain\
    \ that may portray peer-to-peer systems in a different and almost human light.\
    \ The aspect that is discussed in this step is the exchange of information among\
    \ computers by means of communication.\n\n## The Goal\n\nThe blockchain is a purely\
    \ distributed peer-to-peer system for managing ownership. It consists of individual\
    \ computers that maintain their own version of an immutable ledger that stores\
    \ the whole history of transaction data. Hence, the individual computers are equivalent\
    \ to witnesses who can testify whether a certain transaction has happened according\
    \ to their own memories. But how do the individual computers observe or learn\
    \ about transactions in the first place? Hence, the major goal of this step is\
    \ to ensure that the individual computers that make up the peer-to-peer system\
    \ get informed about transactions and are able to maintain their own history of\
    \ transaction data.\n\n## The Challenge\n\nA purely distributed peer-to-peer system\
    \ does not have any central point of coordination or control. Hence, there is\
    \ no central component that spreads information to all computers that make up\
    \ the system. The existence of such a central information point would be a contradiction\
    \ in terms. In addition, the distribution of information can fail due to technical\
    \ problems. Hence, the challenge is to have all nodes of the system receiving\
    \ information of all transactions without falling back to a central component."
  raw: "## The Immutable Data Store in the Real World\n\nThe immutability of the blockchain-data-structure\
    \ depends on the computational costs induced by the hash puzzle. The difficulty\
    \ of the hash puzzles determines how much computational effort and hence how much\
    \ time is needed to solve them, which in turn determines the immutability of the\
    \ blockchain-data-structure. If the difficulty is too low, the computational costs\
    \ of changing the blockchain-data-structure will decline and may no longer be\
    \ regarded as prohibitively high, which in turn may encourage nodes to manipulate\
    \ the history of transaction data. On the other hand, if the difficulty is too\
    \ high, even the computational costs of adding a new block may be regarded as\
    \ prohibitively high, which in turn discourages nodes from adding new transaction\
    \ data. Hence, a challenge in designing a blockchain is to determine the appropriate\
    \ level of difficulty for the hash puzzles. This challenge is even more demanding\
    \ as computational power of computers changes due to technical advances. As a\
    \ result, the difficulty level may need to be determined dynamically.\n\nBlockchain\
    \ applications in the real world rarely utilize a constant difficulty level for\
    \ all blocks. Instead they typically utilize a dynamic difficulty level based\
    \ on the speed at which new blocks are added.[³](#A436689_1_En_16_Chapter.html#Fn3)\
    \ This ensures that the time needed to solve the hash puzzle stays at a level\
    \ that prevents nodes from manipulating the history of transaction data while\
    \ the actual computational effort may increase.\n\n## Outlook\n\nThis step explained\
    \ that the blockchain prevents the history of transaction data from being manipulated\
    \ or forged by turning the blockchain-data-structure into an immutable append-only\
    \ data store. The next step focuses on making that data store available to everyone\
    \ in a distributed peer-to-peer system.\n\n## Summary\n\n*   The blockchain protects\
    \ the history of transaction data from manipulation and forgery by storing transaction\
    \ data in an immutable data store.\n*   The history of a transaction is made immutable\
    \ by utilizing two ideas:\n    *   Storing the transaction data in the change-sensitive\
    \ blockchain-data-structure, which when being changed requires rewriting the data\
    \ structure starting at the point that causes the change until the head of the\
    \ whole chain.\n    *   Requiring the solution of a hash puzzle for writing, rewriting,\
    \ or adding every single block header in the blockchain-data-structure.\n*   The\
    \ hash puzzle is unique for each block header because it depends on its unique\
    \ content.\n*   The need to rewrite the blockchain-data-structure when it is changed\
    \ and the costs of doing so make it unattractive to manipulate the history of\
    \ transaction data in the first place.\n*   Requiring the solution of a hash puzzle\
    \ for every writing, rewriting or adding of block headers in the blockchain-data-structure\
    \ turns is into an append-only data store.\n*   A block header contains at least\
    \ the following data:\n    *   A hash reference to the header of its preceding\
    \ block\n    *   The root of a Merkle tree that contains transaction data\n  \
    \  *   The difficulty of its hash puzzle\n    *   The time when solving the hash\
    \ puzzle was started\n    *   The nonce that solves the hash puzzle\n\nFootnotes\
    \ [1](#A436689_1_En_16_Chapter.html#Fn1_source)\n\nNakamoto, Satoshi. Bitcoin:\
    \ A peer-to-peer electronic cash system. 2008. [`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf)\
    \ .\n\n  [2](#A436689_1_En_16_Chapter.html#Fn2_source)\n\nOkupski, Krzysztof.\
    \ Bitcoin developer reference. Working paper. 2014.\n\n  [3](#A436689_1_En_16_Chapter.html#Fn3_source)\n\
    \nOkupski, Krzysztof. Bitcoin developer reference. Working paper. 2014; Wood,\
    \ Gavin. Ethereum: A secure decentralized generalized transaction ledger. 2014\\\
    . [`http://gavwood.com/paper.pdf`](http://gavwood.com/paper.pdf) .\n\n# 17. Distributing\
    \ the Data Store Among Peers\n\nWhen computers gossip\n\nStep [16](#A436689_1_En_16_Chapter.html)\
    \ turned the blockchain-data-structure into an immutable append-only data store,\
    \ which can be used as a manipulation-resistant ledger for transaction data. Having\
    \ one immutable append-only history of transaction data in insolation may be of\
    \ limited value for the goal of clarifying ownership based on a group of computers\
    \ that acts as witnesses of ownership-related events. Hence, this step focuses\
    \ on establishing a purely distributed peer-to-peer system that allows sharing\
    \ of information about transactions.\n\n## The Metaphor\n\nWhat is the best way\
    \ to spread some personal news among all employees of a company if you do not\
    \ have access to a global e-mail distribution list? One approach that guarantees\
    \ that all employees will eventually receive the news is to share it with one\
    \ or two well-connected and chatty colleagues and ask them to keep the news a\
    \ secret. This approach works out because there is almost no other information\
    \ that is more quickly exchanged among colleagues than personal news that is shared\
    \ under conditions of confidentiality. The reason for this fact is quite simple:\
    \ Human beings are social creatures who have a genuine interest in their peers,\
    \ and sharing information about others is a usual behavioral pattern for renewing\
    \ or strengthening social connections. This step considers an aspect of the blockchain\
    \ that may portray peer-to-peer systems in a different and almost human light.\
    \ The aspect that is discussed in this step is the exchange of information among\
    \ computers by means of communication.\n\n## The Goal\n\nThe blockchain is a purely\
    \ distributed peer-to-peer system for managing ownership. It consists of individual\
    \ computers that maintain their own version of an immutable ledger that stores\
    \ the whole history of transaction data. Hence, the individual computers are equivalent\
    \ to witnesses who can testify whether a certain transaction has happened according\
    \ to their own memories. But how do the individual computers observe or learn\
    \ about transactions in the first place? Hence, the major goal of this step is\
    \ to ensure that the individual computers that make up the peer-to-peer system\
    \ get informed about transactions and are able to maintain their own history of\
    \ transaction data.\n\n## The Challenge\n\nA purely distributed peer-to-peer system\
    \ does not have any central point of coordination or control. Hence, there is\
    \ no central component that spreads information to all computers that make up\
    \ the system. The existence of such a central information point would be a contradiction\
    \ in terms. In addition, the distribution of information can fail due to technical\
    \ problems. Hence, the challenge is to have all nodes of the system receiving\
    \ information of all transactions without falling back to a central component."
  trans: "\n# 现实世界中的不可变数据存储\n\n`blockchain-data-structure`的不可变性取决于哈希难题所带来的计算成本。哈希难题的难度决定了需要多少计算量，进而决定了解题所需的时间，而这也反过来决定了`blockchain-data-structure`的不可变性。如果难度过低，篡改`blockchain-data-structure`的计算成本就会下降，可能不再被视作高得令人望而却步，这可能会鼓励节点操纵交易数据的历史记录。另一方面，如果难度过高，即使只是新增一个区块的计算成本也可能被视为高得令人无法接受，这又会阻碍节点添加新的交易数据。因此，设计区块链时面临的一个挑战，就是为哈希难题确定合适的难度级别。随着技术进步带来的计算机算力变化，这一挑战变得更加艰巨。因此，难度级别可能需要动态确定。\n\
    \n现实世界中的区块链应用很少对所有区块使用固定的难度级别。相反，它们通常会根据新区块的添加速度，采用动态的难度级别。³ 这可以确保解决哈希难题所需的时间保持在一个既能防止节点操纵交易历史记录，同时实际计算量又可能增加的合理水平。\n\
    \n# 展望\n\n本步骤解释了区块链如何通过将`blockchain-data-structure`转化为一个不可变的仅追加数据存储，来防止交易数据历史记录被篡改或伪造。下一步将侧重于如何在分布式对等系统中让所有人都能访问该数据存储。\n\
    \n# 总结\n\n- 区块链通过将交易数据存储在不可变的数据存储中，保护交易数据历史记录免遭篡改和伪造。\n- 利用以下两个理念实现交易历史的不可变性：\n\
    \    - 将交易数据存储在对变更敏感的`blockchain-data-structure`中，当该结构发生变更时，需要从变更点开始重写数据结构，直至整个链的顶端。\n\
    \    - 要求在`blockchain-data-structure`中写入、重写或添加每个区块头时，都必须解决一个哈希难题。\n- 每个区块头的哈希难题都是唯一的，因为它取决于其独特的内容。\n\
    - 当`blockchain-data-structure`发生变更时需要重写，以及为此付出的成本，从源头上使得操纵交易数据历史记录变得不具吸引力。\n-\
    \ 要求在`blockchain-data-structure`中每次写入、重写或添加区块头时都解决一个哈希难题，这使得它成为了一个仅追加的数据存储。\n\
    - 区块头至少包含以下数据：\n    - 指向前一个区块头的哈希引用\n    - 包含交易数据的默克尔树根\n    - 其哈希难题的难度\n    -\
    \ 开始解决哈希难题的时间\n    - 解决哈希难题的随机数（nonce）\n\n脚注 1\n\nNakamoto, Satoshi. Bitcoin:\
    \ A peer-to-peer electronic cash system. 2008. [`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf)\
    \ 。\n\n2\n\nOkupski, Krzysztof. Bitcoin developer reference. Working paper. 2014。\n\
    \n3\n\nOkupski, Krzysztof. Bitcoin developer reference. Working paper. 2014; Wood,\
    \ Gavin. Ethereum: A secure decentralized generalized transaction ledger. 2014.\
    \ [`http://gavwood.com/paper.pdf`](http://gavwood.com/paper.pdf) 。\n\n# 在节点间分发数据存储\n\
    \n当计算机开始“闲聊”\n\n第 16 步将`blockchain-data-structure`转化为一个不可变的仅追加数据存储，它可以用作一个防篡改的交易数据账本。孤立地拥有一个不可变的仅追加交易历史记录，对于实现“基于一组充当所有权相关事件见证者的计算机来澄清所有权”这一目标而言，其价值可能有限。因此，本步骤侧重于建立一个纯粹的分布式对等系统，以允许共享有关交易的信息。\n\
    \n## 隐喻\n\n如果你无法访问公司的全局电子邮件分发列表，向公司所有员工传播某些个人新闻的最佳方式是什么？一种能确保所有员工最终都能收到消息的方法是，将消息分享给一两位人脉广、爱闲聊的同事，并要求他们保密。这个方法之所以行得通，是因为在同事之间，几乎没有比“在保密条件下分享的个人新闻”传播得更快的信息了。这个现象背后的原因相当简单：人类是社会性生物，对自己圈子里的同伴有着真诚的兴趣，而分享关于他人的信息是更新或加强社会联系的一种常见行为模式。本步骤将探讨区块链的一个方面，它可能以一种不同的、近乎人性化的视角来描绘对等系统。本步骤讨论的这个方面，就是计算机之间通过通信手段进行的信息交换。\n\
    \n## 目标\n\n区块链是一个纯粹用于管理所有权的分布式对等系统。它由独立的计算机组成，每台计算机都维护着自己版本的不可变账本，其中存储了整个交易数据的历史记录。因此，这些独立的计算机就相当于可以凭自己的记忆证明某个交易是否发生的见证人。但问题是，这些独立的计算机最初是如何观察到或了解到交易的呢？因此，本步骤的主要目标是确保组成这个对等系统的各个独立计算机能够获知交易信息，并能维护自己的交易数据历史记录。\n\
    \n## 挑战\n\n一个纯粹的分布式对等系统没有任何中心化的协调或控制点。因此，不存在一个向组成系统的所有计算机传播信息的中心化组件。这样一个中心化信息点的存在本身就是自相矛盾的。此外，信息的分布也可能因技术问题而失败。因此，挑战在于让系统中的所有节点都能接收到所有交易的信息，同时又不能依赖中心化组件。\n"
- fmt: '# The Idea


    The idea is to let the computers that make up the peer-to-peer system share and
    exchange information in the same fashion as humans share news. If the nodes of
    the peer-to-peer system forward information to their peer nodes, which in turn
    forward the information to their peers, then eventually all nodes in the system
    will receive the information.


    On a more detailed level, the peer-to-peer system will mimic the way in which
    groups of humans, such as employees of a company, groups of friends, or the members
    of a sports club, communicate with one another. In a nutshell, the members of
    these groups are engaged in three different kinds of conversations that serve
    distinct purposes:


    - **Small talk**, which serves an important purpose from a social point of view
    as it keeps existing relationships alive but it does not contain any substantial
    information.

    - **News**, comprising conversations in which substantial information is exchanged
    among the participants.

    - **Introducing new peers**, the kinds of conversations that are necessary to
    let new people join the existing group of friends or colleagues. Establishing
    a new relationship and accepting a new member to a group always require some form
    of initiation rite. This is the point where aspiring members are made familiar
    with the group’s history and their values and are introduced to prominent members
    of the group.


    # How It Works: The Overview


    Peer-to-peer systems of computers are the digital equivalent to groups of people.
    The individual computers that make up the peer-to-peer system also have small
    talk, exchange news, and accept new members through an initiation rite. These
    interactions are an integral part of any peer-to-peer system. Similar to human
    beings who communicate with one another via the medium of spoken words, computers
    in a distributed peer-to-peer system communicate via a digital network. The largest
    network that connects a huge number of computers is the Internet. Hence, the least
    expensive way to construct a peer-to-peer system is to let the nodes communicate
    with one another over the Internet. Hence, the distributed peer-to-peer system
    utilizing the Internet as a medium of communication is characterized by the following
    facts:


    - Each computer is connected with the system through the Internet.

    - Each computer is identified by a unique address.

    - Each computer can disconnect and reconnect with the system at any given time.

    - Each computer independently maintains a list of peers it communicates with.

    - Communication between nodes is based on messages.

    - Messages are sent from one node to another over the Internet by using their
    unique Internet addresses.


    The fact that the nodes communicate over a network and that they can disconnect
    and reconnect at any time influences the delivery of messages. The delivery of
    messages in such a network has the following characteristics:


    - Messages are not guaranteed to arrive at the addressees, they may get lost instead.

    - Messages may arrive more than once.

    - Messages may arrive in a different order than they were sent.


    These characteristics cause some hurdles in the communication, but they are solved
    in the following ways:


    - Messages are sent in a gossip style. Every node that receives new information
    will forward it to the peers it communicates with, which in turn will handle the
    news in the same way. This ensures that eventually every node receives the news,
    even if some individual messages get lost.

    - Due to the fact that messages can be identified by their digital fingerprint
    or cryptographic hash value, nodes can identify duplicates easily and ignore them.

    - The fact that transaction data as well as block headers contain time stamps
    allows the nodes to order them based on an objective criterion.


    # How It Works: The Details


    The communication between the nodes that make up the distributed peer-to-peer
    system has the following three purposes:


    - Keeping existing connections alive

    - Establishing new connections

    - Distributing new information


    The first two kinds of communication are mainly focused on the peer-to-peer system
    itself. They are concerned with keeping the network of peers together and doing
    some digital housekeeping. But the purpose of the peer-to-peer system is not keeping
    itself busy just for the sake of staying busy. Instead, the purpose of the peer-to-peer
    system is the management of ownership. Hence, the third type of communication
    focuses on new transaction data and new blocks to be added to the `blockchain-data-structure`.
    This information is needed by every node of the system in order to maintain its
    own version of the transaction history.


    ## Keeping Existing Connections Alive


    Each computer in the network independently maintains a list of peers it communicates
    with. This list contains only a subset of all nodes that make up the whole system.
    This is similar to employees who maintain social connections to some of their
    colleagues, comprising only a subgroup of all the employees of the same company.
    On a regular basis, each computer verifies that these peers are still available.
    This is done by sending peers a small message, often called `ping`, with the request
    to answer it with a message called `pong`. Peers that repeatedly do not answer
    these messages are removed from the list of peers. This is similar to small talk
    between colleagues, which mainly serves the purpose of keeping the social relationship
    alive.


    ## Establishing New Connections


    Every computer can request to join the peer-to-peer system by sending a corresponding
    request message to any of the nodes that make up the system. The requested node
    adds the address of the inquirer to its list of peers and sends a confirmation
    as reply. When receiving the reply the node will add the address of the sender
    to its own list of peers as well. As a result, a new connection is established
    and the system has grown by one more node. Having only one connection to the system
    is risky as every node can terminate a connection, shut down, or even crash at
    any time. Hence, when joining a peer-to-peer system, a computer typically establishes
    connections to many different nodes that are already part of the system. This
    ensures that the connection to the system as a whole is maintained, even if individual
    nodes disconnect or shut down.


    ## Distributing New Information


    This kind of communication serves the application goal of the system that is managing
    ownership. This is done by forwarding new transaction data and new blocks to be
    added to the `blockchain-data-structure` in a gossip type of information forwarding.
    Sharing ownership-related information happens in the following three occasions:


    - **In an ongoing fashion**: new information (e.g., new transaction data and new
    blocks) are distributed as they occur. Every node connected to the system will
    eventually receive all news.

    - **As an update**: nodes that reconnect to the system after they were disconnected
    for a while will receive all transaction data and blocks they have missed out
    in the meantime.

    - **As part of the on-boarding procedure**: new nodes that join the system have
    not had the chance to build their own history of transactions because they have
    never been connected with the system before. Hence, they need to get the whole
    history of transactions that happened up to the time they joined the system. Transferring
    a copy of the whole up-to-date version of the `blockchain-data-structure` to the
    newbie node ensures that it becomes a full-fledged node after joining the system.
    This type of information delivery can be seen as an extreme case of an update:
    an update of the whole history of transactions that have ever happened in the
    system.'
