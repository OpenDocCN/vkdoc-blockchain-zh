- fmt: "# Summary\n\n- The steps to be performed in order to add new transaction data\
    \ to the `blockchain-data-structure` are:\n    - Create a new Merkle tree that\
    \ contains all new transaction data to be added.\n    - Create a new block header\
    \ that contains both a hash reference to its preceding header and the root of\
    \ the Merkle tree that contains the new transaction data.\n    - Create a hash\
    \ reference to the new block header, which is now the current head of the `blockchain-data-structure`.\n\
    - Changing data in the `blockchain-data-structure` requires renewing all hash\
    \ references starting with the one that directly points to the manipulated data\
    \ and ending with the head of the whole `blockchain-data-structure` as well as\
    \ all hash references in between them.\n- The `blockchain-data-structure` pursues\
    \ a radical all-or-nothing approach when it comes to changing its data: One either\
    \ changes the whole data structure completely starting from the point that causes\
    \ the change until the head of the whole chain or one better leave it unchanged\
    \ in the first place.\n- All half-hearted, halfway through, or partial changes\
    \ will leave the whole `blockchain-data-structure` in an inconsistent state, which\
    \ will be detected easily and quickly.\n- Changing the `blockchain-data-structure`\
    \ completely is a very elaborate process on purpose.\n- The high sensitivity of\
    \ the `blockchain-data-structure` regarding changes is due to the properties of\
    \ hash references.\n\n# 16. Protecting the Data Store\n\nDiscovering the power\
    \ of immutability\n\nStep [15](#A436689_1_En_15_Chapter.html) concluded with the\
    \ finding that the `blockchain-data-structure` stores data in a change-sensitive\
    \ manner. Any alteration of data stored in the `blockchain-data-structure` will\
    \ stand out and require an elaborate process for incorporating it into the existing\
    \ structure. This step explains how that property can be used to prepare the history\
    \ of transaction data to be shared and distributed in an untrustworthy environment\
    \ without having to fear that dishonest members of a peer-to-peer system can manipulate\
    \ its content for its own advantage.\n\n## The Metaphor\n\nLet’s assume I want\
    \ to pretend to be a member of a prestigious aristocratic family. How could I\
    \ achieve that? Forging my family tree could do that. For example, I could make\
    \ up an aristocratic grandfather and connect myself to him with a forged family\
    \ tree. Will this suffice to convince others from my fake aristocratic roots?\
    \ Well, this fake will be quickly uncovered since family trees rarely exist in\
    \ isolation; instead, they are connected and interwoven with other family trees\
    \ via family relationships. Hence, if none of the family trees of the established\
    \ aristocratic families have a reference or relation to my fictional grandfather,\
    \ my fictional family history will be quickly discovered as fake. In order to\
    \ get my fictional family accepted, I would need to forge the family documents\
    \ of some of the established aristocratic families by embedding references to\
    \ my fictional family tree in their family history. But even this may not suffice.\
    \ Real people have real lives and leave their footprints in our world. But my\
    \ fictional grandfather never really lived. Hence, I have to make up his life\
    \ in order to make the fake appear real. This implies that I have to invent the\
    \ entire life of my fictional grandfather, including his childhood as well as\
    \ his education and career history. Additionally, the supporting documents would\
    \ also need to be faked, such as the birth certificate, school registration documents,\
    \ school certificates, university degrees, professional certifications, memberships,\
    \ and so on. Schools, universities, and employers maintain records of their students\
    \ and employees and publish almanacs and photographs of social events. Hence,\
    \ it would be necessary to manipulate their documents as well in order to make\
    \ my fictional grandfather a former member of these institutions. Since manipulating\
    \ all these documents would be complicated and costly, I probably would decide\
    \ to stay with my real but nonaristocratic family history.\n\nThis intellectual\
    \ game illustrates that forging the past is possible but extremely expensive,\
    \ since it requires rewriting and forging large parts of history in order to embed\
    \ the fake information into many documents and references of the true history.\
    \ The costs of doing so are prohibitively high; hence, it is much easier and less\
    \ expensive to stick with the truth. This step explains how the blockchain utilizes\
    \ this finding in order to protect its history of transaction data from being\
    \ forged.\n\n## The Goal\n\nIt is important that the whole history of transaction\
    \ data maintained by the blockchain always represents the truth and therefore\
    \ makes it a trustworthy source for clarifying ownership-related matters.\n\n\
    ## The Challenge\n\nThe blockchain is a purely distributed peer-to-peer system\
    \ that is open to everyone. Hence, there is a risk that dishonest peers could\
    \ manipulate or forge the history of transaction data for their own advantage.\
    \ The challenge is to keep the system open to everyone yet protect the history\
    \ of transaction data from being forged or manipulated.\n\n## The Idea\n\nDistinguishing\
    \ honest from dishonest nodes in an open system in advance is hard or even impossible.\
    \ Hence, in order to protect the history of transactions from being manipulated\
    \ by dishonest nodes, we want to prevent anyone from manipulating the history\
    \ in the first place. If no one can change the history of transaction data, regardless\
    \ of whether it is honest or dishonest, we do not have to fear that it can be\
    \ manipulated at all. Hence, making the history of transaction data unchangeable\
    \ in the first place solves the problem. As a result, the system can stay open\
    \ to everyone and no one has to worry about dishonest nodes manipulating the history\
    \ of transactions.\n\n## A Short Detour to Immutability\n\nImmutability means\
    \ that something cannot be changed. Data that are immutable cannot be changed\
    \ once they have been created or written. For that reason, these data are also\
    \ called read-only data. Their whole benefit is solely presenting information\
    \ for reading or presentation purposes. This fact is particularly desirable if\
    \ one needs to give data to others and hence loses control on how the data are\
    \ used. Handing over immutable data is an effective way of preventing changes\
    \ or manipulation of data. Driver’s licenses, passports, and educational certificates\
    \ are examples of immutable objects in real life. Authorities produce them in\
    \ order to document something and their only legible use is to be shown and to\
    \ be read."
