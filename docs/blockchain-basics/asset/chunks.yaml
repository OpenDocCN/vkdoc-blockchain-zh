- fmt: "# Why It Works\n\nBuilding up the `blockchain-data-structure` collectively\
    \ is a bit like taking part in a continuous voting schema. Each single node has\
    \ only a tiny voice in the ongoing poll about which transaction history should\
    \ be chosen, but all nodes together form a powerful population that consistently\
    \ selects its own history. This works because taking part in the ongoing voting\
    \ scheme is neither without costs nor is it unaccommodating. Taking part in the\
    \ vote costs work necessary to solve the hash puzzle, and by submitting a vote\
    \ or a new block, a node commits itself to it in order to receive a reward. Since\
    \ all nodes independently utilize the identical criterion for selecting a transaction\
    \ history, eventually all nodes reach a consensus.\n\n# Outlook\n\nThis step focused\
    \ on the way the nodes of a purely distributed peer-to-peer system reach an agreement\
    \ concerning the collectively maintained history of transaction data and highlighted\
    \ the importance of the `hash-puzzle` for reaching consensus and maintaining integrity.\
    \ The next step discusses the importance of reward and the instrument of payment\
    \ used to compensate the peers for contributing to the integrity of the system.\n\
    \n# Summary\n\n- Delays in sending new blocks across the network or two nodes\
    \ creating new blocks nearly at the same time cause the `blockchain-data-structure`\
    \ to grow into the shape of a tree or a columnar cactus with branches that arise\
    \ from a common trunk that represent conflicting versions of the transaction history.\n\
    - Selecting an identical version of the transaction history is a collective decision-making\
    \ problem.\n- Distributed consensus is an agreement among the members of a purely\
    \ distributed peer-to-peer system in a collective decision-making problem.\n-\
    \ The collective decision-making problem of the blockchain is characterized by\
    \ the following facts:\n  - All nodes operate in the identical environment, consisting\
    \ of the network, nodes that maintain their individual copies of the `blockchain-data-structure`,\
    \ and the `blockchain-algorithm` that governs the behavior of the nodes.\n  -\
    \ The decision-making problem is to select the identical transaction history across\
    \ all nodes.\n  - All nodes strive to maximize their individual income earned\
    \ as a reward for adding new valid blocks to the `blockchain-data-structure`.\n\
    \  - In order to achieve their goals, all nodes send their new blocks to all their\
    \ peers to have them examined and accepted. As a result, each node leaves its\
    \ individual footprint in the environment that is the collectively maintained\
    \ `blockchain-data-structure`.\n  - All nodes use the identical criterion for\
    \ selecting a history of transaction data.\n- The `longest-chain-criterion` states\
    \ that each node independently chooses the path of the tree-shaped `blockchain-data-structure`\
    \ that contains the most blocks.\n- The `heaviest-chain-criterion` states that\
    \ each node independently chooses that path of the tree-shaped `blockchain-data-structure`\
    \ that has the highest aggregated difficulty.\n- Selecting one path of the tree-shaped\
    \ `blockchain-data-structure` has the following consequences:\n  - Orphan blocks\n\
    \  - Reclaimed reward\n  - Clarifying ownership\n  - Reprocessing of transactions\n\
    \  - A growing common trunk\n  - Eventual consistency\n  - Robustness against\
    \ manipulations\n- The deeper down the authoritative chain a block is located:\n\
    \  - The further in the past it was added\n  - The more time has passed since\
    \ its inclusion in the `blockchain-data-structure`\n  - The more common effort\
    \ has been spent on adding subsequent blocks\n  - The less it is affected by random\
    \ changes of the blocks that belong to the longest chain\n  - The less likely\
    \ it will be abandoned\n  - The more accepted it is by the nodes of the system\n\
    \  - The more anchored it is in the common history of the nodes\n- The fact that\
    \ certainty concerning the inclusion of blocks in the authoritative chain increases\
    \ as time goes by and as more blocks are added eventually is called `eventual-consistency`.\n\
    - A `51-percent-attack` is an attempt to gather or control the majority of the\
    \ whole voting power in a collective decision-making process with the goal to\
    \ turn blocks that are part of the authoritative chain into orphan blocks and\
    \ establish a new authoritative chain that contains a transaction history that\
    \ is more favorable from the attacker's point of view.\n- A `51-percent-attack`\
    \ has the following characteristics:\n  - Economically: Changing the allocation\
    \ of ownership rights by changing the collective history of transaction data.\n\
    \  - Decision making: Gathering the majority of voting power in order to enforce\
    \ a desired result.\n  - Technically: Undermining the integrity of the system.\n\
    \  - Architecturally: Establish at least temporarily a hidden element of centrality\
    \ that changes the state of the system.\n\n## Footnotes\n\n[1](#A436689_1_En_19_Chapter.html#Fn1_source)\
    \ Hassanien, Aboul Ella, and Eid Emary. *Swarm intelligence: Principles, advances,\
    \ and applications*. Boca Raton, FL: CRC Press, 2016.\n\n[2](#A436689_1_En_19_Chapter.html#Fn2_source)\
    \ Nakamoto, Satoshi. *Bitcoin: A peer-to-peer electronic cash system*. 2008. [`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf).\n\
    \n[3](#A436689_1_En_19_Chapter.html#Fn3_source) Wood, Gavin. *Ethereum: A secure\
    \ decentralized generalized transaction ledger*. 2014. [`http://gavwood.com/paper.pdf`](http://gavwood.com/paper.pdf);\
    \ Okupski, Krzysztof. *Bitcoin developer reference*. Working paper. 2014.\n\n\
    [4](#A436689_1_En_19_Chapter.html#Fn4_source) Okupski, Krzysztof. *Bitcoin developer\
    \ reference*. Working paper. 2014.\n\n# 20. Paying for Integrity\n\nNeither integrity\
    \ nor the creation of trust is without costs.\n\nThe discussion of how the blockchain\
    \ processes new transaction data and how the nodes of the system reach an agreement\
    \ concerning the true history of transactions revealed the importance of the `hash-puzzle`.\
    \ Solving the `hash-puzzle` plays an important role in achieving and maintaining\
    \ the integrity of the system. But solving the `hash-puzzle` costs computational\
    \ resources and, as a consequence, it costs money. For that reason, it is necessary\
    \ to compensate the nodes that contribute to the integrity of the system for doing\
    \ so. However, throughout the discussion, it has been assumed that the nodes are\
    \ compensated somehow without asking which instrument of payment is used to do\
    \ so. Hence, this step focuses exclusively on how nodes are compensated for their\
    \ contribution to the integrity of the system."
