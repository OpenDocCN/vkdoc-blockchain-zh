    \ in the case of heterogeneous difficulty levels, the longest path is not necessarily\
    \ the one that represents the most computational effort.\n\nFor each path, the\
    \ computational effort that was spent upon it can be measured by adding up the\
    \ difficulty level of all blocks that belong to it. This value can be calculated\
    \ by utilizing the fact that the block header contains the difficulty level of\
    \ its hash puzzle. The aggregated difficulty level of a path is often called its\
    \ weight. Figure [19-6](#A436689_1_En_19_Chapter.html#Fig6) depicts the identical\
    \ blockchain-data-structure as shown in Figure [19-5](#A436689_1_En_19_Chapter.html#Fig5)\
