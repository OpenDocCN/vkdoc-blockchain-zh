  trans: '

    # 隐喻


    假设你是一家面包店的老板。有一天，你想出了一个改善生意的绝妙主意。你意识到现金很稀缺，但你的面包店里总有面包在售，而且大多数营业日结束时都会剩下大量面包。因此，你决定用面包而不是现金来支付员工工资。这将实现两个目标：节省你的现金开支，并且避免浪费剩余面包。你的员工对此并不兴奋，但很快其他公司开始效仿你，最终所有公司都开始采用这种报酬方式：汽车制造商用汽车支付员工工资，建筑公司用房子支付员工工资，等等。有一天，你的朋友们都在抱怨他们那不实用的报酬方式，但其中一个人例外，他仍然用现金领取报酬。你认为这个人会在哪家公司或机构工作？原来，他在一家中央银行工作，而这家银行恰好是货币的生产者！


    这个例子巧妙地展现了我们通过完成工作所创造的商品与我们作为报酬所获得的商品之间的依赖关系。本步骤将在区块链的背景下讨论这种联系。事实证明，在某些条件下，区块链可能会变得更像一家用自己印制的钞票支付员工工资的中央银行。但在讨论这种特殊情况之前，让我们更详细地审视一下费用在区块链中的作用，以及报酬的重要性。


    # 费用在区块链中的作用


    步骤 18 强调，区块链采用“胡萝卜加大棒”的方法，让组成系统的对等节点相互控制。对奖励的竞争和对惩罚的威胁是促使系统内的对等节点有序地验证交易，并选择凝聚了最多集体努力的那条交易历史记录的两股力量。奖励和惩罚通过基于交易费用和工作量证明来实现。¹
    这种效应在所有区块链应用中都是普遍存在的，无论其具体的应用目标为何。然而，用于补偿系统维护者的具体支付工具的选择，在所有区块链应用中并非完全相同。定义并使用一种支付工具，将其交给对等节点，作为其验证并将新区块添加到区块链的报酬，这被认为是建立区块链应用的主要挑战之一。因此，必须考虑选择支付工具所带来的以下后果：


    *   对系统完整性的影响

    *   对系统开放性的影响

    *   对系统去中心化性质的影响

    *   对系统哲学的影响


    ## 对系统完整性的影响


    奖励和惩罚的力量是在区块链中实现并维护完整性的基础。这之所以有效，是因为系统的对等节点为维护系统完整性而获得了有价值的报酬。但是，我们如何首先知道对等节点确实为他们的工作获得了有价值的报酬呢？嗯，这正是关键所在。哪种支付工具被认为是有价值的、值得完成维护系统的工作？如果这种支付工具已知会贬值或不可信，会发生什么？当对等节点被支付一种不可信且毫无价值的工具时，我们能否期望他们会继续维护区块链？不，我们不能。对用于补偿系统对等节点的支付工具缺乏信任，将会污染整个系统。因此，用于补偿系统支持者的支付工具直接影响着区块链本身的可靠性。


    ## 对系统开放性的影响


    区块链应该是一个开放的点对点系统。每个人都可以将自己的计算机连接到系统，并因贡献于维护其完整性而获得奖励。但是，如果用于补偿对等节点的支付工具不像区块链本身那样开放，会发生什么？如果报酬是通过一种仅在特定国家可用或接受、或受资本流动限制的支付工具来进行的呢？在这种情况下，支付工具会通过引入经济限制来抵消系统的技术开放性。


    ## 对系统去中心化性质的影响


    区块链是一个纯粹的去中心化点对点系统，没有任何集中控制或协调的元素。但是，如果用于补偿对等节点的支付工具由一个中央机构控制和治理，会发生什么？这意味着允许中心化通过后门进入系统。它将与系统的去中心化性质背道而驰。


    ## 对系统哲学的影响


    前面的讨论揭示出，用于补偿支持系统的对等节点的支付工具的特性，有可能抵消区块链的主要方面。这引出了一个根本性问题：一个旨在摆脱集中控制的纯粹去中心化点对点系统，如果使用一种与其核心价值观背道而驰的支付工具来补偿其对等节点，它还能被认为是可信赖的吗？每个声称完全开放和纯粹去中心化的区块链都必须为这个问题找到一个令人满意的答案。


    # 用于补偿对等节点的支付工具的理想特性


    为了尽可能少地干扰区块链的目标和价值观，用于补偿对等节点的支付工具应满足以下条件：


    *   以数字形式存在；否则无法被纳入区块链。

    *   在现实世界中被接受为支付工具；否则系统中的对等节点无法利用支持系统获得的收入来支付他们在现实世界中的账单。

    *   在所有国家都被接受为支付工具；否则，对于那些生活在该支付工具不被接受国家的对等节点来说，支持系统将变得缺乏吸引力。

    *   不受资本流动限制；否则其向对等节点的转移将受到限制。

    *   具有稳定的价值；否则对等节点将面临购买力损失的经济风险。

    *   值得信赖；否则会削弱区块链建立信任的能力。

    *   不受任何一个单一的中央机构或国家控制；否则将与区块链的去中心化性质产生严重冲突。


    这份特性清单读起来就像是对完美世界货币的愿望清单。因此，现有的任何一种法定货币都无法满足这些期望，也就不足为奇了。

    '
- fmt: "# A Detour to the Emergence of Cryptographic Currencies\n\nThe previous section\
    \ listed desired properties of an instrument of payment for compensating peers\
    \ of a blockchain. The finding that none of the existing fiat currencies fulfills\
    \ these properties is a bit sobering because they are desirable in their own right.\
    \ A currency or an instrument of payment that has these properties would also\
    \ be useful in many occasions other than compensating peers of a distributed system.\
    \ It turns out that many people have already thought about that problem. The first\
    \ and most prominent blockchain application was formed to solve this problem.\
    \ The idea of that blockchain is brilliant: It is a purely distributed peer-to-peer\
    \ system that manages ownership of a new kind of digital money, which, in turn,\
    \ is used to compensate the peers of the system for verifying and adding new blocks\
    \ to the blockchain-data-structure. This particular new money connects its application\
    \ goal, the management of ownership of a new kind of money, with the need to have\
    \ a trustworthy instrument of payment for compensating its contributors. I am\
    \ talking about Bitcoin. The Bitcoin system not only manages ownership of the\
    \ new digital money in a purely distributed peer-to-peer system but it also compensates\
    \ its peers with the money to whose integrity they contribute. Due to the fact\
    \ that the blockchain relies heavily on cryptography, this new kind of money is\
    \ also called cryptographic money or cryptocurrency for short. As a rule of thumb,\
    \ you could say that Bitcoin and many other cryptographic currencies are like\
    \ bakeries that pay their employees with the bread they produce, with the difference\
    \ being that the bread they produce is actually a new digital currency.\n\n##\
    \ Outlook\n\nThis step highlighted the importance of the instrument of payment\
    \ used to compensate the peers of the blockchain. This step is the last of a series\
    \ of steps, which focus on the fundamental principles of the blockchain individually.\
    \ The next step will bring all the pieces together and summarize what you have\
    \ learned in the preceding learning steps.\n\n## Summary\n\n- The blockchain utilizes\
    \ fees for compensating its peers for contributing to the integrity of the system.\n\
    - The instrument of payment used to compensate peers has an impact on major aspects\
    \ of the blockchain such as:\n    - Integrity\n    - Openness\n    - The distributed\
    \ nature\n    - The philosophy of the system\n- Desirable properties of an instrument\
    \ of payment for compensating peers are:\n    - Being available in digital form\n\
    \    - Being accepted in the real world\n    - Being accepted in all countries\n\
    \    - Not being the subject to capital movement restrictions\n    - Being trustworthy\n\
    \    - Not being controlled by one single central organization or state\n- A cryptocurrency\
    \ is an independent digital currency whose ownership is managed by a blockchain\
    \ that uses it as an instrument of payment for compensating its peers for maintaining\
    \ the integrity of the system.\n\n**Footnotes** [1](#A436689_1_En_20_Chapter.html#Fn1_source)\n\
    \nNakamoto, Satoshi. Bitcoin: A peer-to-peer electronic cash system. 2008. [`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf).\n\
    \n# 21. Bringing the Pieces Together\n\nMore than just the sum of its pieces\n\
    \nThis step is the summit of this book’s intellectual journey toward an understanding\
    \ of the blockchain. While Steps [9](#A436689_1_En_9_Chapter.html)–[20](#A436689_1_En_20_Chapter.html)\
    \ explored the individual concepts that make up the blockchain in isolation, this\
    \ step brings all these pieces together. As a result, you will gain not only an\
    \ understanding of the blockchain as a whole but also see how the different concepts\
    \ work together. This learning step starts with reviewing the major concepts and\
    \ technologies of the blockchain and continues with an explanation about what\
    \ the blockchain is based on the technical knowledge gained in the previous steps.\
    \ Finally, this step provides a review of the definition of the blockchain-technology-suite,\
    \ which consequently opens the blockchain to a wide range of application areas.\n\
    \n## Reviewing Concepts and Technologies\n\nThe intellectual journey toward an\
    \ understanding of the blockchain started in Step [8](#A436689_1_En_8_Chapter.html)\
    \ where we planned the design of a purely distributed peer-to-peer system for\
    \ managing ownership. Table [21-1](#A436689_1_En_21_Chapter.html#Tab1) presents\
    \ these tasks, their goals, the corresponding steps, and the corresponding concepts\
    \ of the blockchain.\n\n**Table 21-1.** Review of the Tasks of Designing a Distributed\
    \ Peer-to-Peer System for Managing Ownership\n\n| Task Number | Goal | Step Number\
    \ | Major Concept |\n| --- | --- | --- | --- |\n| 1 | Describing Ownership | 9\
    \ | History of Transaction Data |\n| 2 | Protecting Ownership | 10–13 | Digital\
    \ Signature |\n| 3 | Storing Transaction Data | 10, 11, 14, 15 | Blockchain-Data-Structure\
    \ |\n| 4 | Preparing Ledgers for Being Distributed | 16 | Immutability |\n| 5\
    \ | Distributing Ledgers | 17 | Information Forwarding in Networks |\n| 6 | Adding\
    \ New Transactions | 18 | Blockchain-Algorithm |\n| 7 | Deciding Which Ledger\
    \ Represents the Truth | 19 | Distributed Consensus |\n\nIt is important to understand\
    \ that these major concepts that make up the blockchain rely on other concepts\
    \ and technologies. Understanding the blockchain requires at least an appreciation\
    \ of these concepts as well. For that reason, Table [21-2](#A436689_1_En_21_Chapter.html#Tab2)\
    \ summarizes on a more detailed level the technologies that make up the blockchain.\
    \ The remainder of this step draws on the concepts exhibited in these two tables.\n\
    \n**Table 21-2.** Technical Concepts of the Blockchain, Their Purpose, and Metaphor\n\
    \n| Concept | Purpose | Metaphor Used |\n| --- | --- | --- |\n| Transaction Data\
    \ | Describing transfer of ownership | Bank transfer form |\n| Transaction History\
    \ | Proving the current state of ownership | The course of a relay race |\n| Cryptographic\
    \ Hash Value | Identifying any kind of data uniquely | Human fingerprints |\n\
    | Asymmetric Cryptography | Encrypting and decrypting data | Public mailbox with\
    \ lock |\n| Digital Signature | Stating agreement with the content of transaction\
    \ data | Handwritten signature |\n| Hash Reference | A reference that becomes\
    \ invalid once the data being referred are changed | Cloakroom tickets that utilize\
    \ hash values for identifying cloak hooks |\n| Change-Sensitive Data Structures\
    \ | Storing data in a way that makes any manipulation stand out immediately |\
    \ Jackets that carry cloakroom tickets in their pockets |\n| Hash Puzzle | Imposing\
    \ a computationally expensive task | Opening a number lock by trial and error\
    \ |\n| Blockchain-Data-Structure | Storing transaction data in a change-sensitive\
    \ way and maintaining their order | A library with a card catalog |\n| Immutability\
    \ | Making it impossible to change the history of transaction data | Attempt to\
    \ establish a fake family history |\n| Distributed Peer-to-Peer Network | Sharing\
    \ the transaction history among all nodes of a network | Groups of independent\
    \ witnesses |\n| Message Passing | Ensure that all nodes of the system eventually\
    \ receive all information | Gossip among people |\n| Blockchain-Algorithm | Ensure\
    \ that only valid transaction data are added to the blockchain-data-structure\
    \ | Carrot-and-stick approach to ruling contractors |\n| Distributed Consensus\
    \ | Ensure that all nodes of the system use the identical history of transaction\
    \ data | Beaten path in a park as a result of visitors voting with their feet\
    \ |\n| Compensation | Giving nodes an incentive to maintain integrity | Bakery\
    \ that pays its employees with bread |"
  raw: "## A Detour to the Emergence of Cryptographic Currencies\n\nThe previous section\
