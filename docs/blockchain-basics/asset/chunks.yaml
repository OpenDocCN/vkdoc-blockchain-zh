  trans: "\n# 摘要\n\n-   向`blockchain-data-structure`添加新交易数据所需执行的步骤如下：\n    -   创建一个包含所有待添加新交易数据的新的**默克尔树**。\n\
    \    -   创建一个新的区块头，其中包含指向前一个区块头的哈希引用，以及包含新交易数据的默克尔树的根哈希。\n    -   创建指向新区块头的哈希引用，该区块头现在成为`blockchain-data-structure`的当前链头。\n\
    -   更改`blockchain-data-structure`中的数据需要更新所有哈希引用，从直接指向被篡改数据的那个引用开始，一直更新到整个`blockchain-data-structure`的链头，并包括它们之间的所有哈希引用。\n\
    -   在更改数据方面，`blockchain-data-structure`采取了一种彻底的“要么全有，要么全无”的方法：你要么从引起变化的那个点开始，完全改变整个数据结构，直到整个链的链头；要么就最好一开始就不要改变它。\n\
    -   任何半心半意、半途而废或部分更改都会使整个`blockchain-data-structure`处于不一致的状态，而这种状态会很快且容易被检测到。\n\
    -   完全更改`blockchain-data-structure`本身就是一个非常复杂的过程，这是有意设计的。\n-   `blockchain-data-structure`对更改的高度敏感性归因于哈希引用的特性。\n\
    \n# 16. 保护数据存储\n\n发现不可变性的力量\n\n第 15 步的结论是，`blockchain-data-structure`以对更改敏感的方式存储数据。存储在`blockchain-data-structure`中的任何数据变更都会凸显出来，并且需要一个复杂的过程才能将其整合到现有结构中。本步骤将解释如何利用这一特性，准备好在不可信环境中共享和分发的交易数据历史记录，而无需担心点对点系统中的不诚实成员为自身利益操纵其内容。\n\
    \n## 隐喻\n\n假设我想冒充一个显赫贵族家族的成员。我该如何实现呢？伪造家谱或许可以做到。例如，我可以虚构一个贵族祖父，并通过一份伪造的家谱将自己与他联系起来。这足以让别人相信我这个虚假的贵族血统吗？嗯，这个谎言很快就会被揭穿，因为家谱很少孤立存在；相反，它们通过家族关系相互连接和交织。因此，如果已建立的贵族家族谱系中没有一个提及或关联到我虚构的祖父，那么我虚构的家族史很快就会被认为是假的。为了让我的虚构家族被接受，我需要通过在我的虚构家谱中嵌入指向一些已建立贵族家族谱系的引用，来伪造他们的家族文件。但即便如此也可能不够。真实的人有真实的生活，会在我们的世界中留下足迹。但我虚构的祖父从未真正活过。因此，为了让这个谎言看起来真实，我必须虚构他的一生。这意味着我必须编造我虚构祖父的全部生活，包括他的童年、教育背景和职业生涯。此外，还需要伪造支持性文件，例如出生证明、入学登记文件、学校证书、大学学位、专业资格认证、会员资格等等。学校、大学和雇主都会保存学生和员工的记录，并出版年鉴和社会活动的照片。因此，还需要篡改他们的文件，以使我虚构的祖父成为这些机构的曾经成员。由于篡改所有这些文件既复杂又昂贵，我大概会选择安于我真实但非贵族的家族历史。\n\
    \n这个思想实验说明，伪造过去是可能的，但代价极其高昂，因为它需要重写和伪造历史的大部分内容，以便将虚假信息嵌入到真实历史的许多文件和引用中。这样做的成本高得令人望而却步；因此，坚持真相要容易得多，成本也低得多。本步骤将解释区块链如何利用这一发现来保护其交易数据历史不被伪造。\n\
    \n## 目标\n\n重要的是，区块链维护的整个交易数据历史始终代表真相，从而成为澄清所有权相关事务的可信来源。\n\n## 挑战\n\n区块链是一个完全分布式的点对点系统，对所有人开放。因此，存在不诚实的节点可能为了自身利益而操纵或伪造交易数据历史的风险。挑战在于既要保持系统的开放性，又要保护交易数据历史不被伪造或篡改。\n\
    \n## 思路\n\n在一个开放系统中，事先区分诚实和不诚实的节点是困难的，甚至是不可能的。因此，为了保护交易历史不被不诚实的节点篡改，我们首先要防止任何人篡改历史。如果任何人都不能更改交易数据的历史，无论其是诚实还是不诚实，我们根本无需担心它会被操纵。因此，从一开始就让交易数据历史变得不可更改就解决了问题。这样一来，系统可以对所有人保持开放，也无需担心不诚实节点操纵交易历史。\n\
    \n## 关于不可变性的简短探讨\n\n不可变性意味着某事物不能被更改。一旦被创建或写入，不可变的数据就无法被更改。出于这个原因，这些数据也被称为只读数据。它们全部的价值仅仅在于提供信息以供阅读或展示。当需要将数据交给他人，从而失去对数据使用方式的控制时，这一特性就显得尤为可取。交出不可变数据是防止数据被更改或操纵的有效方法。驾照、护照和教育证书是现实世界中不可变对象的例子。权威机构制作它们是为了记录某些事情，而它们唯一合理的用途就是被出示和读取。\n"
- fmt: '## How It Works: The Big Picture


    The main idea used by the blockchain to make the transaction history immutable
    is to make changing it prohibitively costly and make those costs deter everyone
    from changing it. Making the history of transaction data immutable has three elements:


    1. Storing the history of transaction data in a way that even the smallest manipulation
    of its content stands out and becomes noticeable.

    2. Enforcing that embedding a manipulation in the transaction history requires
    rewriting a huge part of it.

    3. Making adding, writing, or rewriting of data to the history computationally
    expensive.


    ### Making Manipulations Stand Out


    The `blockchain-data-structure` that stores data in a change-sensitive manner
    fulfills the first element. As a result, one cannot silently manipulate data that
    are part of the `blockchain-data-structure` and hope that no one will notice it.
    Any change will stand out with a huge “noise” caused by breaking hash references
    that become invalid as a result of changing the data they refer to.


    ### Enforcing Rewriting the History for Embedding Changes


    The `blockchain-data-structure` also fulfills the second element because it pursues
    a radical all-or-nothing approach when it comes to changing its data: One either
    changes the data structure starting from the point that causes the change until
    the head of the whole chain or one better leave it unchanged in the first place.


    ### Making Adding Data Computationally Expensive


    The third element is for those who are not afraid to rewrite large parts of the
    `blockchain-data-structure` in the course of having a manipulation embedded in
    the transaction history. But as soon as writing or rewriting the `blockchain-data-structure`
    incurs huge computational costs, people will think twice about whether changing
    it was a good idea in the first place.


    The `blockchain-technology-suite` makes the content of the `blockchain-data-structure`
    immutable by incurring significant computational costs for every block being written,
    rewritten, or added to the `blockchain-data-structure`. The computational costs
    are incurred by hash puzzles that are unique for each block header.[¹](#A436689_1_En_16_Chapter.html#Fn1)
    As a result, one either accepts the whole cost of changing the data structure
    from the point that causes the change until the head of the chain by solving a
    hash puzzle for every block header involved or it is better to leave it unchanged.


    ## How It Works: The Details


    The procedure to add a new block to the `blockchain-data-structure`, as discussed
    in Step [15](#A436689_1_En_15_Chapter.html), is not computationally expensive
    because it only requires adding the hash reference that points to the current
    head of the chain to the new block header and declaring it as the new head of
    the chain. The challenge of making the `blockchain-data-structure` immutable is
    to make adding a new block a computationally expensive task. The following aspects
    need to be considered in the course of achieving this:


    - Compulsory data of block headers

    - The process of creating a new block header

    - Validation rules for block headers


    ### Compulsory Data


    Every block header of the `blockchain-data-structure` has to carry at least the
    following data[²](#A436689_1_En_16_Chapter.html#Fn2):


    - The root of a Merkle tree containing transaction data

    - A hash reference to the header of the preceding block

    - The difficulty level of the hash puzzle

    - The time when solving the hash puzzle started

    - The nonce that solves the hash puzzle


    ### The Process of Creating A New Block


    Creating a new block involves the following steps:


    1. Get the root of the Merkle tree that contains the transaction data to be added.

    2. Create a hash reference to the header of that block that will be the predecessor
    from the new block header’s point of view.

    3. Obtain the required difficulty level.

    4. Get the current time.

    5. Create a preliminary block header that contains the data mentioned in points
    1 to 4.

    6. Solve the hash puzzle for the preliminary block header.

    7. Finish the new block by adding the nonce that solves the hash puzzle to the
    preliminary header.


    Figure [16-1](#A436689_1_En_16_Chapter.html#Fig1) illustrates the hash puzzle
    that needs to be solved when adding a new block to the `blockchain-data-structure`.
    It shows the data of the block header whose hash value has to fulfill the given
    restriction or difficulty level, respectively. Note that the difficulty level
    is part of the block header and hence is also part of the block''s hash value.
    This ensures that no one can bypass the computational costs of the hash puzzle
    by arbitrarily reducing the difficulty level.


    ![A436689_1_En_16_Fig1_HTML.jpg](A436689_1_En_16_Fig1_HTML.jpg)


    Figure 16-1. Schematic illustration of the hash puzzle required to be solved when
    adding a new block to the `blockchain-data-structure`


    ### Validation Rules


    Every block header of has to fulfill the following rules:


    1. It must contain a valid hash reference to a previous block.

    2. It must contain a valid root of a Merkle tree containing transaction data.

    3. It must contain a correct difficulty level.

    4. Its time stamp is after the time stamp of its preceding block header.

    5. It must contain a nonce.

    6. The hash value of all the five pieces of data combined together fulfills the
    difficulty level.


    The validation rules ensure that only those blocks are added to the `blockchain-data-structure`
    for which the hash puzzle was solved and the computational costs were paid. Rule
    4 ensures that the blocks and the transaction data are indeed ordered according
    to the time being added.


    > **Note:** The activity of adding a new block to the `blockchain-data-structure`
    by solving a hash puzzle is also called **mining** or **block mining**.


    ## Why It Works


    The `blockchain-data-structure` makes any change of its data stand out due to
    the fragility of the hash references with respect to changes of the data being
    referred. This causes the need to rewrite all blocks that are affected by a manipulation.
    The hash puzzle causes costs for every block that needs to be rewritten in the
    course of embedding a manipulation. The accumulated costs of rewriting the `blockchain-data-structure`
    in the course of embedding a manipulation make it unattractive to manipulate the
    transaction history in the first place. As a result, the `blockchain-data-structure`
    becomes an immutable append-only data store.


    ## The Costs of Manipulating the `Blockchain-Data-Structure`


    Let''s assume we were going to try to manipulate a particular piece of transaction
    data that is part of a Merkle tree whose root belongs to a block header located
    20 blocks below the current head of the `blockchain-data-structure`. Embedding
    the manipulated transaction data requires the following work:


    1. Rewrite the Merkle tree to which the manipulated transaction belongs.

    2. Rewrite the block header to which the root of the rewritten Merkle tree belongs.

    3. Rewrite all succeeding block headers up to the head of the `blockchain-data-structure`.


    Point 2 requires the solution of a hash puzzle because changing the Merkle root
    changes the hash value of the block header and hence the solution of its hash
    puzzle. Point 3 requires solving 20 hash puzzles due to successive changes of
    the hash references to the previous block header. Under the assumption that solving
    a hash puzzle takes on average 10 minutes, we would need in total 210 minutes
    to embed a manipulation in a transaction that belongs to a block header located
    20 blocks below the current head. These huge costs deter nodes from changing the
    `blockchain-data-structure`.'
  raw: '## How It Works: The Big Picture


    The main idea used by the blockchain to make the transaction history immutable
    is to make changing it prohibitively costly and make those costs deter everyone
    from changing it. Making the history of transaction data immutable has three elements
    :


    1.  Storing the history of transaction data in a way that even the smallest manipulation
    of its content stands out and becomes noticeable.  

    2.  Enforcing that embedding a manipulation in the transaction history requires
    rewriting a huge part of it.  

    3.  Making adding, writing, or rewriting of data to the history computationally
    expensive.  


    ### Making Manipulations Stand Out


    The blockchain-data-structure that stores data in a change-sensitive manner fulfills
    the first element. As a result, one cannot silently manipulate data that are part
    of the blockchain-data-structure and hope that no one will notice it. Any change
    will stand out with a huge “noise” caused by breaking hash references that become
    invalid as a result of changing the data they refer to.


    ### Enforcing Rewriting the History for Embedding Changes


    The blockchain-data-structure also fulfills the second element because it pursues
    a radical all-or-nothing approach when it comes to changing its data: One either
    changes the data structure starting from the point that causes the change until
    the head of the whole chain or one better leave it unchanged in the first place.


    ### Making Adding Data Computationally Expensive


