  trans: "\n# 4. 发现核心问题\n\n## 如何统率一群独立的计算机\n\n前两个步骤概括指出了区块链的总体目标，并特别强调了其对纯分布式点对点系统的重要性。事实证明，维护分布式系统的完整性是区块链的主要目标。但为什么在分布式系统（尤其是纯分布式点对点系统）中维护完整性如此具有挑战性？本步骤通过揭示纯分布式点对点系统中信任与完整性之间的微妙关系来回答这个问题。因此，本步骤将加深您对完整性重要性的理解，并揭示区块链需要解决的主要问题。最后，本步骤描述了区块链有望提供最大价值的环境。\n\
    \n## 隐喻\n\n许多语言中都有形象的俗语来描述试图组织一群混乱个体的情形。例如，在英语中，人们将这种情况描述为“试图把猫赶在一起”（herding cats），这说明了将一群固执难缠、不服从甚至不承认中央权威的动物聚拢起来的挑战。试图组织一群不接受或不承认中央权威的个体这个问题听起来是否很熟悉？这恰好就是纯分布式点对点系统的情况，该系统由独立且自主的节点组成，没有任何形式的中央控制或协调。本步骤将解释纯分布式点对点系统的一个主要挑战及其与区块链的关系。\n\
    \n## 点对点系统中的信任与完整性\n\n信任和完整性是一枚硬币的两面。在软件系统的语境中，完整性是系统在安全、完整、一致、正确以及无破坏无错误方面的一个非功能性指标。信任则是人类在缺乏证据、证明或调查的情况下，对某人或某物的可靠性、真实性或能力的坚定信念。信任是预先给予的，并会根据持续互动结果而增强或减弱。\n\
    \n就点对点系统而言，这意味着用户只有在信任该系统，并且与系统持续交互的结果能够确认并强化这种信任时，才会加入并持续为系统做出贡献。为了满足用户的期望并强化他们对系统的信任，系统的完整性是必需的。如果由于缺乏完整性，系统未能强化用户的信任，用户就会放弃该系统，最终导致系统终止运行。鉴于信任对于点对点系统存续的重要性，主要问题在于：我们如何在纯分布式点对点系统中实现并维护完整性？\n\
    \n在纯分布式系统中实现并维护完整性取决于多种因素，其中一些最重要的因素包括：\n\n*   对节点或对等点数量的了解\n*   对对等点可信度的了解\n\n\
    如果已知节点的数量及其可信度，那么在分布式点对点系统中实现完整性的可能性就更高。这种情况类似于运营一个恪守高道德标准并对新成员实行严格准入流程的私人俱乐部。然而，在分布式点对点系统中实现完整性的最坏情况，是当节点的数量及其可信度都未知的时候。在互联网上运行一个对所有人开放的纯分布式点对点系统就是这种情况。\n\
    \n## 点对点系统中的完整性威胁\n\n为简单起见，我们可以考虑点对点系统中两个主要的完整性威胁：\n\n*   技术故障\n*   恶意对等点\n\n\
    ### 技术故障\n\n点对点系统由用户的个人计算机构成，这些计算机通过网络进行通信。计算机系统的所有硬件和软件组件，以及计算机网络的任何组件，都存在发生故障或产生错误的固有风险。因此，任何分布式系统都必须面对其组件可能发生故障或偶然产生错误结果的问题。\n\
    \n### 恶意对等点\n\n恶意成员是点对点系统中的第二个完整性威胁。这种不可信来源并非技术问题，而是由那些决定利用系统为自身牟利的个体目标所引起的问题。可以说，这种威胁更多地与社会学和群体动力学相关，而非技术。不诚实和恶意的对等点构成了对点对点系统最严重的威胁，因为它们攻击了所有点对点系统赖以建立的基础：信任。一旦用户无法再信任他们的对等点，他们就会离开并停止向系统贡献计算资源。因此，成员数量将会减少，整个系统对剩余成员的吸引力也会降低，这反过来又会加速系统的衰落，最终导致系统被完全抛弃。\n\
    \n## 区块链需要解决的核心问题\n\n在所有条件最优的情况下实现完整性和信任很容易。真正的挑战是在最坏的情况下，在一个分布式系统中实现完整性和信任。而这正是区块链应该解决的问题。区块链需要解决的核心问题是，在一个由数量未知且可靠性和可信度未知的对等点组成的纯分布式点对点系统中，实现并维护完整性。这个问题并非新问题。它实际上是计算机科学中一个广为人知且被广泛讨论的问题。借用军事术语，这个问题通常被称为**拜占庭将军问题**。¹\n\
    \n> **注意**\n> 区块链要解决的问题是：在一个由数量未知且可靠性和可信度未知的对等点组成的纯分布式点对点系统中，实现并维护完整性。\n\n## 展望\n\
    \n本步骤强调了完整性和信任在点对点系统中的重要性。此外，本步骤指出了区块链需要解决的核心问题，并强调了其在实现点对点系统完整性和信任方面的重要性。然而，我们仍未给出“区块链”这个术语的定义。这将是下一步的主题。\n\
    \n## 总结\n\n*   完整性和信任是点对点系统的主要关注点。\n*   只有当用户信任点对点系统，并且与系统持续交互的结果能够确认并强化这种信任时，他们才会加入并持续做出贡献。\n\
    *   一旦用户对点对点系统失去信任，他们就会放弃它，这最终将导致系统终止。\n*   点对点系统中的主要完整性威胁包括：\n    *   技术故障\n\
    \    *   恶意对等点\n*   在点对点系统中实现完整性取决于：\n    *   对对等点数量的了解\n    *   对对等点可信度的了解\n\
    *   区块链需要解决的核心问题是：在一个由数量未知且可靠性和可信度未知的对等点组成的纯分布式点对点系统中，实现并维护完整性。\n\n**脚注**\n\n\
    1 Lamport, Leslie, Robert Shostak, and Marshall Pease. The Byzantine generals\
    \ problem. *ACM Transactions on Programming Languages and Systems (TOPLAS)* 4.3\
    \ (1982): 382–401.\n"
- fmt: '# 5. Disambiguating the Term


    Four ways to define the blockchain


    In the preceding steps you learned about the major purpose of the blockchain and
    the relation between trust and integrity of the software system. As a result,
    you gained a well-grounded appreciation of the purpose of the blockchain, but
    you are still missing a definition of the term blockchain itself. This step will
    turn your attention to the definition of the term and explain its different usages.
    This step will present a provisional definition of blockchain, which will guide
    you through the remainder of this book. Finally, this step explains why the management
    of ownership is a prominent application case of the blockchain.


    ## The Term


    In this discussion about the blockchain, the term is used as follows:


    - As a name for a data structure

    - As a name for an algorithm

    - As a name for a suite of technologies

    - As an umbrella term for purely distributed peer-to-peer systems with a common
    application area


    ### A Data Structure


    In computer science and software engineering, a data structure is a way to organize
    data regardless of their concrete informational content. You can think about a
    data structure in terms of a floor plan for a building in architecture. A floor
    plan for a building addresses separating and connecting space with walls, floors,
    and stairs regardless of their concrete usage. When used as a name for a data
    structure, blockchain refers to data put together into units called blocks. One
    can think of these blocks much like pages in a book. These blocks are connected
    to one another like a chain, hence the name blockchain. In relation to a book,
    the words and sentences are the information to be stored. They are written on
    different pages instead of being written on a large spool. The pages are connected
    with one another via their position in the book and via the page numbers. You
    can determine if someone removed a page from the book by checking whether the
    page numbers continue without leaving out a number. Furthermore, the information
    on the pages as well as the pages within the book are ordered. The ordering is
    an important detail, which will be used extensively. Additionally, the chaining
    of the data blocks in the data structure is achieved by using a very special numbering
    system, which differs from the page numbering in ordinary books.


    ### An Algorithm


    In software engineering, the term algorithm refers to a sequence of instructions
    to be completed by a computer. These instructions often involve data structures.
    When used as a name for an algorithm, blockchain refers to a sequence of instructions
    that negotiates the informational content of many blockchain-data-structures in
    a purely distributed peer-to-peer system, similar to a democratic voting schema.


    ### A Suite of Technologies


    When used to refer to a suite of technologies, blockchain refers to a combination
    of the blockchain-data-structure, the blockchain-algorithm, as well as cryptographic
    and security technologies that combined can be used to achieve integrity in purely
    distributed peer-to-peer systems, regardless of the application goal.


    ### An Umbrella Term for Purely Distributed Peer-to-Peer Systems with a Common
    Application Area


    Blockchain can also be used as an umbrella term for purely distributed peer-to-peer
    systems of ledgers that utilize the blockchain-technology-suite. Note that in
    this context blockchain refers to a purely distributed system as a whole instead
    of referring to a software unit that is part of a purely distributed system.


    ## The Usage of the Term in This Book


    Throughout the rest of this book, blockchain refers to the shortcut for the umbrella
    term for purely distributed peer-to-peer systems of ledgers that utilize the blockchain-technology-suite.
    If any other meaning is intended, I will indicate this by explicitly using the
    term blockchain-data-structure, blockchain-algorithm, or blockchain-technology-suite.


    Note


    The technology that is nowadays regarded as blockchain was proposed in 2008 under
    the pseudonym Satoshi Nakamoto,[¹](#A436689_1_En_5_Chapter.html#Fn1) whose true
    identity has not yet been revealed.


    ## Provisional Definition


    The following definition is not complete. It still lacks important details that
    have not yet been presented. However, this definition serves as an intermediate
    step toward a more complete understanding of the term:


    > The blockchain is a purely distributed peer-to-peer system of ledgers that utilizes
    a software unit that consist of an algorithm, which negotiates the informational
    content of ordered and connected blocks of data together with cryptographic and
    security technologies in order to achieve and maintain its integrity.


    ## The Role of Managing Ownership


    The provisional definition does not say anything about Bitcoin or managing ownership
    of cryptographic money. This may come as a surprise since many articles and books
    written about the blockchain claim that its purpose is to manage ownership of
    digital currencies. The truth is, managing ownership of cryptographic money is
    a very prominent and natural application case of the blockchain, but it is not
    the only one. The blockchain has a wide and diverse range of applications. However,
    there are two reasons why the management of ownership of digital goods is the
    most discussed application of the blockchain. First, it is the easiest to understand
    and to explain. Second, it is the use case with the most impact on the economy.
    The concept of ownership and the enforcement of ownership rights are core elements
    of almost every human society (even some animals have the concept of ownership
    and fight over its enforcement). A huge proportion of the activities of banks,
    insurance companies, custodians, lawyers, courts, solicitors, and consulates are
    concerned with just the management of ownership rights or their enforcement. Hence,
    managing ownership is a multibillion dollar market, and any technical innovation
    that could change the way we manage ownership will have a huge impact. It turns
    out that the blockchain can indeed dramatically change the way we manage ownership.


    ## The Application Area of the Blockchain in This Book


    The blockchain as a technology suite as used for managing distributed peer-to-peer
    systems of ledgers can have many specific applications such as managing ownership
    in digital goods or cryptographic currencies. However, this book deliberately
    does not consider just one specific application of the blockchain because I do
    not want to distract the attention from the core concepts by discussing just one
    specific application case in great detail. However, in order to make it easier
    for you to understand the blockchain, this book considers the general application
    case of managing and clarifying ownership regardless of the specific good whose
    ownership is managed. As a result, the general goal of managing and clarifying
    ownership will provide some mental guidance through your learning path and help
    to create a mental picture of the blockchain.


    ## Outlook


    This step clarified the term blockchain and provided a provisional definition.
    This book considers the general application case of managing and clarifying ownership
    in order to explain the blockchain, but there really needs to be a discussion
    of ownership in more detail. A more detailed understanding of ownership will help
    you to understand the functioning of the blockchain. The next step will explore
    the foundation of ownership in more detail.'
