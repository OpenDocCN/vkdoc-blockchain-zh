    \ manner\n    *   To create computationally expensive tasks\n\nFootnotes [1](#A436689_1_En_11_Chapter.html#Fn1_source)\n\
    \nTsudik, Gene. Message authentication with one-way hash functions. ACM SIGCOMM\
    \ Computer Communication Review 22.5 (1992): 29–38.\n\n  [2](#A436689_1_En_11_Chapter.html#Fn2_source)\n\
    \nCormen, Thomas H. Introduction to algorithms (3rd ed.). Cambridge: MIT Press,\
    \ 2009.\n\n  [3](#A436689_1_En_11_Chapter.html#Fn3_source)\n\nMerkle, Ralph C.\
    \ Protocols for Public Key Cryptosystems. IEEE Symposium on Security and Privacy\
    \ 122 (1980).\n\n  [4](#A436689_1_En_11_Chapter.html#Fn4_source)\n\nBack, Adam.\
    \ Hashcash—a denial of service counter-measure. 2002\\. [`http://www.hashcash.org/papers/hashcash.pdf`](http://www.hashcash.org/papers/hashcash.pdf)\
    \ .\n\n# 12. Identifying and Protecting User Accounts\n\nA gentle introduction\
    \ to cryptography\n\nBesides hash functions, the blockchain uses another base\
    \ technology extensively: asymmetric cryptography. It is the foundation for identifying\
    \ users in the blockchain and protecting their property. Cryptography is often\
    \ considered complicated and hard to understand. Hence, this step focuses on introducing\
    \ cryptography in a gentle way that is easy to comprehend and sufficient for understanding\
    \ the security concept of the blockchain.\n\n## The Metaphor\n\nLong before e-mails,\
    \ facsimiles, telephones, and chat apps were invented, people used conventional\
    \ mail to send messages. Along with its modern competitors, conventional mail\
    \ still exists and is still used by many people. Conventional letters are still\
    \ delivered by postal employees, who deliver letters by putting them in the mailboxes\
    \ of the addressees. Mailboxes functioning like trapdoors. By design, it is easy\
    \ to insert a letter through the letter slot, but it is very hard to pull a letter\
    \ out that way because taking out letters is supposed to be done only by the addressee\
    \ who owns the key necessary to open the mailbox. This concept has been used for\
    \ a very long time and we still use a similar concept when we send an e-mail to\
    \ an e-mail address, when we send a message in the latest chat app, or when we\
    \ transfer money to a bank account. In all these cases, the security concept is\
    \ based on a separation of two kinds of information: first, publicly known information\
    \ that serves as an address to a trapdoor-like box; and second, private information\
    \ that serves as the key for opening the box and accessing the things it contains.\
    \ The blockchain applies the same concept when protecting private data. Hence,\
    \ keeping this metaphor in mind may provide some guidance on your way in learning\
    \ about the world of cryptography.\n\n## The Goal\n\nThe goal is to identify owners\
    \ and property uniquely and to ensure that only the lawful owner can access his\
    \ or her property .\n\n## The Challenge\n\nThe blockchain is a peer-to-peer system\
    \ that is open to everyone. Everyone can connect and contribute computational\
    \ resources or submit new transaction data to the system. However, it is not desirable\
    \ for everyone to access the property assigned to the accounts managed by the\
    \ blockchain. A constituting characteristic of private property is its exclusiveness.\
    \ The right to transfer ownership to another account is restricted to the owner\
    \ of the account who hands off ownership. Hence, the challenge of the blockchain\
    \ is to protect the property assigned to the accounts without restricting the\
    \ open architecture of the distributed system.\n\n## The Idea\n\nThe idea is to\
    \ treat accounts like mailboxes : everyone can transfer property to it, but only\
    \ the owner of the account can access the things that are collected inside. The\
    \ major characteristic of a mailbox is that its location is known and hence anyone\
    \ can put something in but only the owner can open it with a key. The duality\
    \ of a public mailbox, on the one hand, and a privately held key, on the other\
    \ hand, has an equivalent in the digital world: public-private-key encryption.\
    \ One uses public keys for identifying accounts to which everyone can transfer\
    \ ownership, while access is restricted to those who possess the corresponding\
    \ private keys.[¹](#A436689_1_En_12_Chapter.html#Fn1)\n\n## A Short Detour to\
    \ Cryptography\n\nIn order to help you understand cryptography, I will discuss\
    \ the following aspects:\n\n*   The major idea of cryptography\n*   Terminology\n\
    *   Symmetric cryptography\n*   Asymmetric cryptography\n\n### The Major Idea\
    \ of Cryptography\n\nThe major idea of cryptography is to protect data from being\
    \ accessed by unauthorized people. It is the digital equivalent to door locks\
    \ or bank safes, which also protect their content from being accessed by unauthorized\
    \ people. Similar to locks and keys in the physical world, cryptography also uses\
    \ keys to protect data."
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n### 为何如此有效\n\n\
    哈希谜题的功能关键依赖于哈希函数是单向函数这一事实。无法通过检查哈希值必须满足的限制条件，然后反向应用哈希函数（即从期望的输出推导所需的输入）来解决哈希谜题。哈希谜题只能通过试错法求解，这需要消耗大量的算力，进而耗费大量的时间和能源。难度级别直接影响找到解所需要的平均尝试次数，这反过来又影响找到解所需的计算资源或时间。\n\
    \n哈希函数是确定性的，并能快速为任何类型的数据生成哈希值。因此，一旦找到解，就很容易验证：将数据与随机数结合后，确实能产生一个满足限制条件的哈希值。如果计算出的值不满足限制条件，不能归咎于哈希函数，因为偏差仅仅是由谜题未被解开这一事实引起的。\n\
    \n> **注意：** 在区块链的语境中，哈希谜题通常被称为工作量证明，因为它的解证明了某人已经完成了求解所必需的工作。\n\n## 哈希在区块链中的应用\n\
    \n在区块链中，哈希被用于以下场景：\n\n*   以变更敏感的方式存储交易数据\n*   作为交易数据的数字指纹\n*   作为一种对变更区块链数据结构施加计算成本的方式\n\
    \n## 展望\n\n本步骤解释了哈希值的主要用途，并概述了它们在区块链中的使用。后续步骤将更详细地讨论区块链如何利用哈希。\n\n## 总结\n\n* \
    \  哈希值可用于：\n    *   比较数据\n    *   检测本应保持不变的数据是否被篡改\n    *   以变更敏感的方式引用数据\n   \
    \ *   以变更敏感的方式存储数据集合\n    *   创建计算密集型任务\n\n**脚注**\n\n[1] Tsudik, Gene. *使用单向哈希函数的消息认证*。ACM\
    \ SIGCOMM 计算机通信评论 22.5 (1992): 29–38。\n\n[2] Cormen, Thomas H. *算法导论*（第 3 版）。剑桥：麻省理工学院出版社，2009。\n\
    \n[3] Merkle, Ralph C. *公钥密码系统协议*。IEEE 安全与隐私研讨会 122 (1980)。\n\n[4] Back, Adam.\
    \ *Hashcash——一种拒绝服务攻击的应对措施*。2002。 [`http://www.hashcash.org/papers/hashcash.pdf`](http://www.hashcash.org/papers/hashcash.pdf)。\n\
    \n# 12. 识别与保护用户账户\n\n密码学入门指南\n\n除了哈希函数，区块链还广泛使用了另一项基础技术：非对称密码学。它是区块链中识别用户及保护其财产的基础。密码学常被认为复杂且难以理解。因此，本步骤旨在以一种易于理解的温和方式介绍密码学，使其足以理解区块链的安全概念。\n\
    \n## 隐喻\n\n早在电子邮件、传真、电话和聊天应用发明之前，人们就使用传统邮件来发送消息。尽管有现代的竞争对手，传统邮件仍然存在，并被许多人使用。传统信件仍然由邮政员工递送，他们会将信件放入收件人的邮箱中。邮箱的工作原理类似于活板门。从设计上讲，通过投信口塞入一封信很容易，但想用同样的方式把信取出来却非常困难，因为取信本应只能由拥有开箱钥匙的收件人进行。这个概念已经使用了很久，当我们向电子邮件地址发送邮件、在最新的聊天应用中发送消息，或者向银行账户转账时，我们仍在沿用类似的概念。在所有这些情况下，安全概念都基于两种信息的分离：一是作为通往类似活板门盒子地址的公开信息；二是作为打开盒子并获取其中物品之钥匙的私有信息。区块链在保护私有数据时也应用了相同的概念。因此，记住这个隐喻可能会为你学习密码学世界提供一些指导。\n\
    \n## 目标\n\n目标是唯一地识别所有者和财产，并确保只有合法所有者才能访问其财产。\n\n## 挑战\n\n区块链是一个对所有人开放的*点对点*系统。任何人都可以连接并贡献计算资源或向系统提交新的交易数据。然而，并非所有人都能访问分配给区块链所管理账户的财产。私有财产的一个基本特征是其排他性。将所有权转让给另一个账户的权利仅限于放弃所有权的账户所有者。因此，区块链面临的挑战是在不限制分布式系统开放架构的前提下，保护分配给账户的财产。\n\
    \n## 理念\n\n理念是将账户视为邮箱：任何人都可以向其转移财产，但只有账户所有者才能访问收集在内的物品。邮箱的主要特征是它的位置是公开的，因此任何人都可以放入东西，但只有所有者才能用钥匙打开它。一方面是公开的邮箱，另一方面是私人持有的钥匙，这种二元性在数字世界中有其对应物：公私钥加密。公钥用于识别账户，任何人都可以向其转移所有权，而访问权限则仅限于拥有对应私钥的人。¹\n\
    \n## 密码学小讲堂\n\n为了帮助你理解密码学，我将讨论以下几个方面：\n\n*   密码学的主要思想\n*   术语\n*   对称密码学\n*  \
    \ 非对称密码学\n\n### 密码学的主要思想\n\n密码学的主要思想是保护数据不被未经授权的人访问。它是门锁或银行保险箱的数字等效物，后者也是保护其内容不被未经授权的人访问。类似于物理世界中的锁和钥匙，密码学也使用密钥来保护数据。\n"
- fmt: '### Terminology


    The digital equivalent to closing a lock is encryption, while the digital equivalent
    to opening a lock is decryption. Hence, when talking about protecting data by
    using cryptography, we use the terms `encryption` and `decryption` for protecting
    data and unprotecting data, respectively. Encrypted data are called `cypher text`.
    `Cypher text` looks like a useless pile of letters and figures to everyone who
    does not know how to decrypt it. However, `cypher text` is indeed useful but only
    for those who possess the key necessary to decrypt it. Decrypted `cypher text`
    is identical to the original data that have been encrypted. Hence, the whole round
    trip through cryptography can be summed up as: start with some data, produce `cypher
    text` by encrypting the original data with a cryptographic key, preserve the `cypher
    text` or send it to someone, and finally recover the original data by decrypting
    the `cypher text` with a cryptographic key. Figure [12-1](#A436689_1_En_12_Chapter.html#Fig1)
    illustrates the basic functioning of cryptography.


    ![A436689_1_En_12_Fig1_HTML.jpg](A436689_1_En_12_Fig1_HTML.jpg)


    Figure 12-1. Schematic illustration of basic cryptographic concepts and their
    terminology


    What happens if someone tries to decrypt `cypher text` by using an incorrect key?
    The result is a useless pile of numbers, letters, and signs that do not reveal
    any of the data that were encrypted.


    ### Symmetric Cryptography


    For many years people utilized methods of cryptography where the identical key
    was used to do both the encrypting and decrypting of data. Hence, everyone who
    was able to encrypt data with such a key was automatically able to decrypt `cypher
    text` created with that key as well. Since the identical key was used for both
    methods, this was called `symmetric cryptography`. Figure [12-2](#A436689_1_En_12_Chapter.html#Fig2)
    illustrates the basic functioning of symmetric cryptography where the identical
    key is used to encrypt and to decrypt a short greeting.


    ![A436689_1_En_12_Fig2_HTML.jpg](A436689_1_En_12_Fig2_HTML.jpg)


    Figure 12-2. Schematic illustration of symmetric cryptography


    However, it turned out that having one key for encryption and decryption was not
    always desirable. As a result, `asymmetric cryptography` was invented.


    ### Asymmetric Cryptography


    `Asymmetric cryptography` always uses two complementary keys. But there is a trick
    to this: `cypher text` created with one of these keys can only be decrypted with
    the other key and vice versa.


    Figure [12-3](#A436689_1_En_12_Chapter.html#Fig3) illustrates the encryption-decryption
    round trip for asymmetric cryptography. You can view this figure in the following
    way: The upper part of Figure [12-3](#A436689_1_En_12_Chapter.html#Fig3) illustrates
    encryption, while the lower part illustrates decryption. There are two keys: a
    white key and a black key. Together they form the pair of corresponding keys.
    The original message is encrypted with the black key, which yields `cypher text`
    represented by the black box containing white letters. The original message can
    also be encrypted with the second key, which yields different `cypher text` represented
    by the white box containing black letters. For didactical reasons, the colors
    of the boxes representing `cypher text` and the colors of the keys used to produce
    them are identical in order to highlight their relation: The black key yields
    black `cypher text`, while the white key produces white `cypher text`.


    ![A436689_1_En_12_Fig3_HTML.jpg](A436689_1_En_12_Fig3_HTML.jpg)


    Figure 12-3. Schematic illustration of asymmetric cryptography


    The lower part of Figure [12-3](#A436689_1_En_12_Chapter.html#Fig3) illustrates
    how decryption works in asymmetric cryptography. Black `cypher text` can only
    be decrypted with the white key and vice versa.


    The trick to asymmetric cryptography is that you can never decrypt `cypher text`
    with the key that was used to create it. The decision on which key to use for
    encryption and which to use for decryption is up to you. You can switch the roles
    of the keys as you like for every new piece of data you want to encrypt, but you
    always have to keep both keys for doing both encryption and decryption. If you
    have only one of the keys, your power is limited. While you can always create
    `cypher text` by applying your key to data, you cannot decrypt it because you
    are missing the complementary key. However, you can decrypt `cypher text` that
    was created with the corresponding complementary key. An isolated key is like
    a one-way street: You can drive down the street but you can never drive back on
    the identical street. Due to the asymmetric distribution of their cryptographic
    power, the two keys allow you to separate the group of people who are able to
    create `cypher text` from those who can decrypt it.


    ## Asymmetric Cryptography in the Real World


    Using asymmetric cryptography in real life consists of two major steps:


    * Creating and distributing the keys

    * Using the keys


    ### Creating and Distributing the Keys


    When using asymmetric cryptography in real life, you would give the two keys specific
    names in order to highlight each one’s role. Typically these keys are called the
    `private key` and `public key`. For that reason, asymmetric cryptography is called
    `public-private-key cryptography`. However, there are no such things as the `private
    key` and `public key` in asymmetric cryptography per se because you know that
    you can encrypt data and decrypt `cypher text` with each of them. It is the role
    that is assigned to these keys that makes them private or public. The `public
    key` is given to everyone, regardless of their trustworthiness. Literally anyone
    can have a copy of the `public key`. However, the `private key` is kept safe and
    private.


    Hence, the first steps to be performed in any application of asymmetric cryptography
    are:


    1.  Create a pair of complementary keys by using cryptographic software

    2.  Give one key the name `public key`

    3.  Give the other key the name `private key`

    4.  Keep the `private key` for yourself

    5.  Give your `public key` to everyone else


    ### Using the Keys


    There are two general ways to use the pair of keys, which differ in the direction
    to which the data flows:


    * `Public to private`

    * `Private to public`


    #### Public to Private


    By using the keys in this way, the information flows from the `public key`, where
    it is encrypted, to the `private key`, where it is decrypted. This usage of the
    two complementary keys is similar to a mailbox, where everyone can put letters
    in but only the owner can open it. It is the straightforward usage of asymmetric
    cryptography because it fits our intuition about privacy and publicity in the
    same way as our address and our mailbox is public but its content is private.
    Hence, this way of using asymmetric cryptography is all about sending information
    in a secured fashion to the owner of the `private key`. It works because everyone
    can create `cypher text` with the `public key`, but only the owner of the `private
    key` can decrypt the `cypher text` and read the message.


    #### Private to Public


    By using the keys in this way, the information flows from the `private key`, where
    it is encrypted, to the `public key`, where it is decrypted. This way of using
    the two keys is similar to a public news board or public notice board where everyone
    who has a copy of the `public key` can read messages but only the owner of the
    `private key` can create messages. Hence, this way of using asymmetric cryptography
    is all about proving authorship. It works because everyone can use the `public
    key` to decrypt `cypher text` that was created with the corresponding `private
    key`. The fact that `cypher text` created with the `private key` can only be decrypted
    with the corresponding `public key` serves as proof that the owner of the corresponding
    `private key` has encrypted the message.'
