- fmt: "# Terminology and the Link to the Blockchain\n\nNow that you have learned\
    \ about the potential of peer-to-peer systems, it is necessary to clarify the\
    \ terminology of the problem domain and to explain its relation to the blockchain.\
    \ In particular, the following points need to be discussed:\n\n- The definition\
    \ of a peer-to-peer system\n- Architecture of peer-to-peer systems\n- The link\
    \ between peer-to-peer systems and the blockchain\n\n## The Definition of a Peer-to-Peer\
    \ System\n\nPeer-to-peer systems are distributed software systems that consist\
    \ of nodes (individual computers), which make their computational resources (e.g.,\
    \ processing power, storage capacity, or information distribution) directly available\
    \ to another. When joining a peer-to-peer system, users turn their computers into\
    \ nodes of the system that are equal concerning their rights and roles. Although\
    \ users may differ with respect to the resources they contribute, all the nodes\
    \ in the system have the same functional capability and responsibility. Hence,\
    \ the computers of all users are both suppliers and consumers of resources. [²](#A436689_1_En_3_Chapter.html#Fn2)\n\
    \nFor example, in a peer-to-peer file sharing system, the individual files are\
    \ stored on the users’ machines. When someone wants to download a file in such\
    \ a system, he or she is downloading it from another person’s machine, which could\
    \ be the next door neighbor or someone located halfway around the world.\n\n##\
    \ Architecture of Peer-to-Peer Systems\n\nPeer-to-peer systems are distributed\
    \ computer systems by construction since they are made of individual nodes that\
    \ share their computational resources among others. However, there are also peer-to-peer\
    \ systems that still utilize elements of centralization. Centralized peer-to-peer\
    \ systems maintain central nodes to facilitate the interaction between peers,\
    \ to maintain directories that describe the services offered by the peer nodes,\
    \ or to perform look-ups and identification of the nodes. [³](#A436689_1_En_3_Chapter.html#Fn3)\
    \ Centralized peer-to-peer systems typically utilize a hybrid architecture, such\
    \ as the one that was illustrated on the left-hand side of Figure [2-2](#A436689_1_En_2_Chapter.html#Fig2).\
    \ Such architecture allows combining the advantages of centralized and distributed\
    \ computing. On the other hand, purely distributed peer-to-peer systems do not\
    \ have any element of central control or coordination. Hence, all nodes in those\
    \ systems perform the same tasks, acting both as providers and consumers of resources\
    \ and services.\n\nAn example of a centralized peer-to-peer system is Napster,\
    \ which maintained a central database of all nodes connected with the system and\
    \ the songs available on these nodes.\n\n## The Link Between Peer-to-Peer Systems\
    \ and the Blockchain\n\nAs discussed in Step [2](#A436689_1_En_2_Chapter.html),\
    \ the blockchain can be considered a tool for achieving and maintaining integrity\
    \ in distributed systems. Purely distributed peer-to-peer systems may use the\
    \ blockchain in order to achieve and to maintain system integrity. Hence, the\
    \ link between purely distributed peer-to-peer systems and the blockchain is its\
    \ usage for achieving and maintaining integrity in purely distributed systems.\n\
    \n# The Potential of the Blockchain\n\nThe relation between purely distributed\
    \ peer-to-peer systems to the blockchain is that the former uses the latter as\
    \ a tool to achieve and maintain integrity. Hence, the argument that explains\
    \ the excitement about and the potential of the blockchain is: Purely distributed\
    \ peer-to-peer systems have a huge commercial potential as they can replace centralized\
    \ systems and change whole industries due to disintermediation. Since purely distributed\
    \ peer-to-peer systems may use the blockchain for achieving and maintaining integrity,\
    \ the blockchain becomes important as well. However, the major fact that excites\
    \ people is the disintermediation. The blockchain is only a means to an end that\
    \ helps to achieve that.\n\n> **Note**  \n> The excitement about the blockchain\
    \ is based on its ability to serve as a tool for achieving and maintaining integrity\
    \ in purely distributed peer-to-peer systems that have the potential to change\
    \ whole industries due to disintermediation.\n\n# Outlook\n\nThis step explained\
    \ what peer-to-peer systems are and highlighted their potential to change whole\
    \ industries due to disintermediation. Additionally, this step pointed out that\
    \ the excitement about the blockchain is due to its ability to serve purely distributed\
    \ peer-to-peer systems to fulfill their tasks. However, the question of why achieving\
    \ and maintaining integrity in distributed systems is so important has not been\
    \ answered yet. The next step will discuss that question in more detail.\n\n#\
    \ Summary\n\n- Peer-to-peer systems consist of computers, which make their computational\
    \ resources directly available to another.\n- The advantage of peer-to-peer systems\
    \ is their ability to allow users to interact directly with one another instead\
    \ of interacting indirectly through middlemen.\n- Replacing middlemen with peer-to-peer\
    \ systems increases processing speed and reduces costs.\n- Peer-to-peer systems\
    \ can be centralized or purely distributed.\n- Purely distributed peer-to-peer\
    \ systems form a network of equal members that interact directly with one another\
    \ without having any central coordination.\n- Napster demonstrated the power of\
    \ peer-to-peer systems as its file sharing system ushered in a new era for the\
    \ business model of the traditional music industry, which mainly acted as a middleman\
    \ between artists and consumers.\n- Every industry that mainly acts as a middleman\
    \ between producers and customers of immaterial or digital goods and services\
    \ is vulnerable to being replaced by peer-to-peer systems.\n- A huge part of our\
    \ financial system is simple intermediation between suppliers and consumers of\
    \ money, which mainly exists as digital or immaterial good. Hence, digitalization\
    \ and peer-to-peer systems may reshape the financial industry in a similar fashion\
    \ as Napster reshaped the music industry.\n- As digitalization continues, more\
    \ aspects of our everyday lives and an increasing amount of goods and services\
    \ will become immaterial and will benefit from the advantages of peer-to-peer\
    \ systems.\n- The excitement about the blockchain is based on its ability to serve\
    \ as a tool for achieving and maintaining integrity in purely distributed peer-to-peer\
    \ systems that have the potential to change whole industries due to disintermediation.\n\
    \n---\n\n**Footnotes**\n\n[1] Hong, Seung-Hyun. The effect of Napster on recorded\
    \ music sales: evidence from the consumer expenditure survey. Stanford Institute\
    \ for Economic Policy Research Working Paper (2004): 3–18; Leyshon, Andrew. Scary\
    \ monsters? Software formats, peer-to-peer networks, and the spectre of the gift.\
    \ Environment and Planning D: Society and Space 21.5 (2003): 533–558.\n\n[2] Tanenbaum,\
    \ Andrew S., and Maarten Van Steen. Distributed systems: principles and paradigms.\
    \ Upper Saddle River, NJ: Pearson Prentice Hall, 2007.\n\n[3] Eberspächer, Jörg,\
    \ and Rüdiger Schollmeier. First and second generation of peer-to-peer systems.\
    \ In Peer-to-peer systems and applications. Berlin Heidelberg: Springer Verlag,\
    \ 2005: 35–56.\n\n---\n\n# Part II  \nWhy the Blockchain Is Needed\n\nWhy the\
    \ Blockchain Is Needed\n\nThis stage explains the problem that the blockchain\
    \ is supposed to solve and why solving this problem is important. This stage also\
    \ deepens your understanding of the problem domain in which the blockchain is\
    \ located, the environment in which it provides the most value, and its relation\
    \ to trust, integrity, and the management of ownership. By the end of this stage,\
    \ you will have gained a deeper understanding of the purpose of the blockchain\
    \ and you will have reached a differentiated understanding of the term blockchain\
    \ itself."
  raw: '## Terminology and the Link to the Blockchain


    Now that you have learned about the potential of peer-to-peer systems, it is necessary
    to clarify the terminology of the problem domain and to explain its relation to
    the blockchain. In particular, the following points need to be discussed:


    *   The definition of a peer-to-peer system

    *   Architecture of peer-to-peer systems

    *   The link between peer-to-peer systems and the blockchain


    ### The Definition of a Peer-to-Peer System


    Peer-to-peer systems are distributed software systems that consist of nodes (individual
    computers), which make their computational resources (e.g., processing power,
    storage capacity, or information distribution) directly available to another.
    When joining a peer-to-peer system, users turn their computers into nodes of the
    system that are equal concerning their rights and roles. Although users may differ
    with respect to the resources they contribute, all the nodes in the system have
    the same functional capability and responsibility. Hence, the computers of all
    users are both suppliers and consumers of resources.[²](#A436689_1_En_3_Chapter.html#Fn2)


    For example, in a peer-to-peer file sharing system, the individual files are stored
    on the users’ machines. When someone wants to download a file in such a system,
    he or she is downloading it from another person’s machine, which could be the
    next door neighbor or someone located halfway around the world.


    ### Architecture of Peer-to-Peer Systems


    Peer-to-peer systems are distributed computer systems by construction since they
    are made of individual nodes that share their computational resources among others.
    However, there are also peer-to-peer systems that still utilize elements of centralization.
    Centralized peer-to-peer systems maintain central nodes to facilitate the interaction
    between peers, to maintain directories that describe the services offered by the
    peer nodes, or to perform look-ups and identification of the nodes.[³](#A436689_1_En_3_Chapter.html#Fn3)
    Centralized peer-to-peer systems typically utilize a hybrid architecture, such
    as the one that was illustrated on the left-hand side of Figure [2-2](#A436689_1_En_2_Chapter.html#Fig2).
    Such architecture allows combining the advantages of centralized and distributed
    computing. On the other hand, purely distributed peer-to-peer systems do not have
    any element of central control or coordination. Hence, all nodes in those systems
    perform the same tasks, acting both as providers and consumers of resources and
    services.


    An example of a centralized peer-to-peer system is Napster, which maintained a
    central database of all nodes connected with the system and the songs ­available
    on these nodes.


    ### The Link Between Peer-to-Peer Systems and the Blockchain


    As discussed in Step [2](#A436689_1_En_2_Chapter.html), the blockchain can be
    considered a tool for achieving and maintaining integrity in distributed systems
    . Purely distributed peer-to-peer systems may use the blockchain in order to achieve
    and to maintain system integrity. Hence, the link between purely distributed peer-to-peer
    systems and the blockchain is its usage for achieving and maintaining integrity
    in purely distributed systems.


    ## The Potential of the Blockchain


    The relation between purely distributed peer-to-peer systems to the blockchain
    is that the former uses the latter as a tool to achieve and maintain integrity.
    Hence, the argument that explains the excitement about and the potential of the
    blockchain is: Purely distributed peer-to-peer systems have a huge commercial
    potential as they can replace centralized systems and change whole industries
    due to disintermediation. Since purely distributed peer-to-peer systems may use
    the blockchain for achieving and maintaining integrity, the blockchain becomes
    important as well. However, the major fact that excites people is the disintermediation.
    The blockchain is only a means to an end that helps to achieve that.


    Note


    The excitement about the blockchain is based on its ability to serve as a tool
    for achieving and maintaining integrity in purely distributed peer-to-peer systems
    that have the potential to change whole industries due to disintermediation.


    ## Outlook


    This step explained what peer-to-peer systems are and highlighted their potential
    to change whole industries due to disintermediation. Additionally, this step pointed
    out that the excitement about the blockchain is due to its ability to serve purely
    distributed peer-to-peer systems to fulfill their tasks. However, the question
    of why achieving and maintaining integrity in distributed systems is so important
    has not been answered yet. The next step will discuss that question in more detail.


    ## Summary


    *   Peer-to-peer systems consist of computers, which make their computational
    resources directly available to another.

    *   The advantage of peer-to-peer systems is their ability to allow users to interact
    directly with one another instead of interacting indirectly through middlemen.

    *   Replacing middlemen with peer-to-peer systems increases processing speed and
    reduces costs.

    *   Peer-to-peer systems can be centralized or purely distributed.

    *   Purely distributed peer-to-peer systems form a network of equal members that
    interact directly with one another without having any central coordination.

    *   Napster demonstrated the power of peer-to-peer systems as its file sharing
    system ushered in a new era for the business model of the traditional music industry,
    which mainly acted as a middleman between artists and consumers.

    *   Every industry that mainly acts as a middleman between producers and customers
    of immaterial or digital goods and services is vulnerable to being replaced by
    peer-to-peer systems.

    *   A huge part of our financial system is simple intermediation between suppliers
    and consumers of money, which mainly exists as digital or immaterial good. Hence,digitalization
    and peer-to-peer systems may reshape the financial industry in a similar fashion
    as Napster reshaped the music industry.

    *   As digitalization continues, more aspects of our everyday lives and an increasing
    amount of goods and services will become immaterial and will benefit from the
    advantages of peer-to-peer systems.

    *   The excitement about the blockchain is based on its ability to serve as a
    tool for achieving and maintaining integrity in purely distributed peer-to-peer
    systems that have the potential to change whole industries due to disintermediation.


    Footnotes [1](#A436689_1_En_3_Chapter.html#Fn1_source)


    Hong, Seung-Hyun. The effect of Napster on recorded music sales: evidence from
    the consumer expenditure survey. Stanford Institute for Economic Policy Research
    Working Paper (2004): 3–18; Leyshon, Andrew. Scary monsters? Software formats,
    peer-to-peer networks, and the spectre of the gift. Environment and Planning D:
    Society and Space 21.5 (2003): 533–558.


      [2](#A436689_1_En_3_Chapter.html#Fn2_source)


    Tanenbaum, Andrew S., and Maarten Van Steen. Distributed systems: principles and
    paradigms. Upper Saddle River, NJ: Pearson Prentice Hall, 2007.


      [3](#A436689_1_En_3_Chapter.html#Fn3_source)


    Eberspächer, Jörg, and Rüdiger Schollmeier. First and second generation of peer-to-peer
    systems. In Peer-to-peer systems and applications. Berlin Heidelberg: Springer
    Verlag, 2005: 35–56.


    # Part II

    Why the Blockchain Is Needed


    Why the Blockchain Is Needed


    This stage explains the problem that the blockchain is supposed to solve and why
    solving this problem is important. This stage also deepens your understanding
    of the problem domain in which the blockchain is located, the environment in which
    it provides the most value, and its relation to trust, integrity, and the management
    of ownership. By the end of this stage, you will have gained a deeper understanding
    of the purpose of the blockchain and you will have reached a differentiated understanding
    of the term blockchain itself.'
  trans: "\n# 术语及其与区块链的联系\n\n既然你已经了解了点对点系统的潜力，就有必要阐明该问题领域的术语，并解释其与区块链的关系。具体而言，需要讨论以下几点：\n\
    \n-   点对点系统的定义\n-   点对点系统的架构\n-   点对点系统与区块链之间的联系\n\n## 点对点系统的定义\n\n点对点系统是一种分布式软件系统，由节点（即单台计算机）组成，这些节点将其计算资源（例如处理能力、存储容量或信息分发）直接提供给其他节点。当用户加入一个点对点系统时，他们的计算机就变成了系统中的节点，这些节点在权限和角色上是平等的。尽管用户贡献的资源可能有所不同，但系统中的所有节点都具有相同的功能能力和职责。因此，所有用户的计算机既是资源的提供者，也是资源的消费者。²\n\
    \n例如，在一个点对点文件共享系统中，各个文件存储在用户的机器上。当有人想在这样的系统中下载一个文件时，他/她是从另一个人的机器上下载，这个人可能是隔壁邻居，也可能是在地球的另一端。\n\
    \n## 点对点系统的架构\n\n点对点系统本质上是分布式计算机系统，因为它们由多个节点组成，这些节点相互共享计算资源。然而，也存在一些仍利用中心化元素的点对点系统。中心化的点对点系统维护着中心节点，以促进节点之间的交互，维护描述各节点所提供服务的目录，或执行节点查找和识别。³\
    \ 中心化点对点系统通常采用混合架构，例如图 2-2 左侧所示的架构。这种架构能够结合中心化和分布式计算的优势。另一方面，纯分布式点对点系统没有任何集中控制或协调的元素。因此，这些系统中的所有节点执行相同的任务，同时充当资源和服务的提供者和消费者。\n\
    \n中心化点对点系统的一个例子是 **Napster**，它维护着一个中央数据库，记录所有连接到系统的节点以及这些节点上可用的歌曲。\n\n## 点对点系统与区块链之间的联系\n\
    \n正如在步骤 2 中讨论的，区块链可以被视为在分布式系统中实现和保持完整性的一种工具。纯分布式点对点系统可以使用区块链来实现和保持系统完整性。因此，纯分布式点对点系统与区块链之间的联系在于，区块链被用作在纯分布式系统中实现和保持完整性的工具。\n\
    \n# 区块链的潜力\n\n纯分布式点对点系统与区块链的关系在于，前者将后者作为实现和保持完整性的工具。因此，解释区块链为何令人兴奋并具有潜力的论点是：纯分布式点对点系统具有巨大的商业潜力，因为它们可以替代中心化系统，并通过去中介化改变整个行业。由于纯分布式点对点系统可以使用区块链来实现和保持完整性，区块链也因此变得重要。然而，真正令人兴奋的主要因素是**去中介化**。区块链只是实现这一目标的一种手段。\n\
    \n> **注**  \n> 区块链令人兴奋之处在于，它能够作为一种工具，在具有通过去中介化改变整个行业潜力的纯分布式点对点系统中，实现和保持完整性。\n\n\
    # 展望\n\n本步骤解释了什么是点对点系统，并强调了它们通过去中介化改变整个行业的潜力。此外，本步骤还指出，区块链令人兴奋的原因是它能够服务于纯分布式点对点系统以完成其任务。然而，为什么在分布式系统中实现和保持完整性如此重要的问题尚未得到解答。下一步将更详细地讨论这个问题。\n\
    \n# 总结\n\n-   点对点系统由计算机组成，这些计算机将其计算资源直接提供给其他计算机。\n-   点对点系统的优势在于，它允许用户直接相互交互，而不是通过中间人间接交互。\n\
    -   用点对点系统取代中间人可以提高处理速度并降低成本。\n-   点对点系统可以是中心化的，也可以是纯分布式的。\n-   纯分布式点对点系统形成一个由平等成员组成的网络，这些成员无需任何中央协调即可直接相互交互。\n\
    -   **Napster** 展示了点对点系统的力量，其文件共享系统开启了传统音乐产业商业模式的新纪元，传统音乐产业主要扮演艺术家和消费者之间的中间人角色。\n\
    -   任何主要充当非物质或数字商品及服务生产者与消费者之间中间人的行业，都面临被点对点系统取代的风险。\n-   我们金融体系的很大一部分是资金供应方和需求方之间的简单中介，而资金主要以数字或非物质商品的形式存在。因此，数字化和点对点系统可能会像\
    \ **Napster** 重塑音乐产业一样，重塑金融业。\n-   随着数字化的持续推进，我们日常生活的更多方面以及越来越多的商品和服务将变得非物质化，并将受益于点对点系统的优势。\n\
    -   区块链令人兴奋之处在于，它能够作为一种工具，在具有通过去中介化改变整个行业潜力的纯分布式点对点系统中，实现和保持完整性。\n\n---\n\n**脚注**\n\
    \n[1] Hong, Seung-Hyun. Napster 对录播音乐销售的影响：来自消费者支出调查的证据。斯坦福经济政策研究所工作论文 (2004)：3–18；Leyshon,\
    \ Andrew. 恐怖的怪物？软件格式、点对点网络和礼物的幽灵。环境与规划 D：社会与空间 21.5 (2003)：533–558。\n\n[2] Tanenbaum,\
    \ Andrew S., 和 Maarten Van Steen. 分布式系统：原理与范式。Upper Saddle River, NJ: Pearson\
    \ Prentice Hall, 2007。\n\n[3] Eberspächer, Jörg, 和 Rüdiger Schollmeier. 第一代和第二代点对点系统。见点对点系统与应用。柏林海德堡：施普林格出版社，2005：35–56。\n\
    \n---\n\n# 第二部分  \n为什么需要区块链\n\n为什么需要区块链\n\n这一阶段解释了区块链旨在解决的问题以及解决此问题为何重要。本阶段还将加深你对区块链所在问题领域、其提供最大价值的环境，以及它与信任、完整性和所有权管理之间关系的理解。在本阶段结束时，你将更深入地理解区块链的目的，并对区块链这一术语本身达成有区分度的理解。\n"
- fmt: "# 4. Discovering the Core Problem\n\n## How to herd a group of independent\
    \ computers\n\nThe previous two steps pointed out the purpose of the blockchain\
    \ in general and highlighted its importance for purely distributed peer-to-peer\
    \ systems in particular. It turned out that maintaining integrity in distributed\
    \ systems is the major purpose of the blockchain. But why is maintaining integrity\
    \ in distributed systems and purely distributed peer-to-peer systems in particular\
    \ such a challenge? This step answers that question by discovering the subtle\
    \ relation between trust and integrity of purely distributed peer-to-peer systems.\
    \ As a result, this step will deepen your understanding of the importance of integrity\
    \ and uncovers the major problem to be solved by the blockchain. Finally, this\
    \ step describes the environment in which the blockchain is expected to provide\
    \ the most value.\n\n## The Metaphor\n\nMany languages have a pictorial saying\
    \ for describing the situation when someone tries to organize a chaotic group\
    \ of individuals. For example, in English one would describe such a situation\
    \ as trying to herd cats, as it illustrates the challenges of herding a group\
    \ of obstinate and intractable animals that do not accept or even recognize a\
    \ central authority. Does the problem of trying to organize a group of individuals\
    \ who do not accept or recognize a central authority sound familiar? It happens\
    \ that this is exactly the situation of a purely distributed peer-to-peer system,\
    \ which consists of individual and independent nodes without having any kind of\
    \ central control or coordination. This step explains a major challenge of purely\
    \ distributed peer-to-peer systems and how it relates to the blockchain.\n\n##\
    \ Trust and Integrity in Peer-to-Peer Systems\n\nTrust and integrity are two sides\
    \ of the same coin. In the context of software systems, integrity is a nonfunctional\
    \ aspect of a system to be safe, complete, consistent, correct, and free of corruption\
    \ and errors. Trust is also the firm belief of humans in the reliability, truth,\
    \ or ability of someone or something without evidence, proof, or investigation.\
    \ Trust is given in advance and will increase or decline based on the results\
    \ of interactions on an ongoing basis.\n\nWith respect to peer-to-peer systems,\
    \ this means that people will join and continue to contribute to a system if they\
    \ trust it and if the results of interacting with the system on an ongoing basis\
    \ confirm and reinforce their trust. Integrity of the system is needed in order\
    \ to fulfill the expectations of the users and reinforce their trust in the system.\
    \ If the trust of the users is not reinforced by the system due to a lack of integrity,\
    \ the users will abandon the system, which, as a result, will eventually cause\
    \ it to terminate. Due to the importance of trust for the existence of peer-to-peer\
    \ systems, the major question is: How do we achieve and maintain integrity in\
    \ a purely distributed peer-to-peer system?\n\nAchieving and maintaining integrity\
    \ in purely distributed systems depends on a variety of factors, some of the most\
    \ important are:\n\n* Knowledge about the number of nodes or peers\n* Knowledge\
    \ about the trustworthiness of the peers\n\nThe chances of achieving integrity\
    \ in a distributed peer-to-peer system are higher if the number of nodes as well\
    \ as their trustworthiness is known. This situation is comparable to running a\
    \ private club that adheres to high moral standards and utilizes a rigorous on-boarding\
    \ process for new members. However, the worst circumstances for achieving integrity\
    \ in a distributed peer-to-peer system are given when the number of nodes and\
    \ their trustworthiness is unknown. This is the case when running a purely distributed\
    \ peer-to-peer system on the Internet that is open to everyone.\n\n## Integrity\
    \ Threats in Peer-to-Peer Systems\n\nFor simplicity, one can consider two major\
    \ integrity threats in peer-to-peer systems:\n\n* Technical failures\n* Malicious\
    \ peers\n\n### Technical Failures\n\nPeer-to-peer systems are comprised of the\
    \ individual computers of its users who communicate via a network. All hardware\
    \ and software components of a computer system as well as any component of a computer\
    \ network have the immanent risk of failing or creating errors. Hence, any distributed\
    \ system has to face the problem that its components may fail or may produce wrong\
    \ results by chance.\n\n### Malicious Peers\n\nMalicious members are the second\
    \ integrity threat in peer-to-peer systems. This source of untrustworthiness is\
    \ not a technical problem, but rather a problem caused by the goals of the individuals\
    \ who decide to exploit the system for their own purposes. One could say that\
    \ this threat is more related to sociology and group dynamics than to technology.\
    \ Dishonest and malicious peers comprise the most severe threat to the peer-to-peer\
    \ system, because they attack the foundation on which any peer-to-peer system\
    \ is built: trust. As soon as users can no longer trust their peers, they will\
    \ turn away and stop contributing computational resources to the system. Hence,\
    \ the number of members will decline and the whole system will become less attractive\
    \ to the remaining members, which in turn will accelerate the decline of the system\
    \ that eventually will be abandoned completely.\n\n## The Core Problem to Be Solved\
    \ by the Blockchain\n\nAchieving integrity and trust in the best of all conditions\
    \ is easy. The real challenge is to achieve integrity and trust in a distributed\
    \ system in the worst of all conditions. And this is the problem that the blockchain\
    \ is supposed to solve. The core problem to be solved by the blockchain is achieving\
    \ and maintaining integrity in a purely distributed peer-to-peer system that consists\
    \ of an unknown number of peers with unknown reliability and trustworthiness.\
    \ This problem is not a new one. It is actually a well-known and widely discussed\
    \ problem in computer science. By utilizing a metaphor from the military, the\
    \ problem is widely regarded as the Byzantine general problem.[¹](#A436689_1_En_4_Chapter.html#Fn1)\n\
    \n> **Note**\n> The problem to be solved by the blockchain is achieving and maintaining\
    \ integrity in a purely distributed peer-to-peer system that consists of an unknown\
    \ number of peers with unknown reliability and trustworthiness.\n\n## Outlook\n\
    \nThis step highlighted the importance of integrity and trust in peer-to-peer\
    \ systems. Furthermore, this step pointed out the core problem to be solved by\
    \ the blockchain and emphasized its importance for achieving integrity and trust\
    \ in peer-to-peer systems. However, a definition of the term blockchain is still\
    \ missing. This will be the subject of the next step.\n\n## Summary\n\n* Integrity\
    \ and trust are major concerns of peer-to-peer systems.\n* People will join and\
    \ continue to contribute to a peer-to-peer system if they trust it and if the\
    \ results of interacting with the system on an ongoing basis confirm and reinforce\
    \ that trust.\n* As soon as people lose trust in a peer-to-peer system, they will\
    \ abandon it, which in turn will cause the system to terminate eventually.\n*\
    \ Major integrity threats in peer-to-peer systems are:\n  * Technical failures\n\
    \  * Malicious peers\n* Achieving integrity in a peer-to-peer system depends on:\n\
    \  * The knowledge about the number of peers\n  * The knowledge about the trustworthiness\
    \ of the peers\n* The core problem to be solved by the blockchain is achieving\
    \ and maintaining integrity in a purely distributed peer-to-peer system that is\
    \ comprised of an unknown number of peers with unknown reliability and trustworthiness.\n\
    \n**Footnotes**\n\n[1](#A436689_1_En_4_Chapter.html#Fn1_source) Lamport, Leslie,\
    \ Robert Shostak, and Marshall Pease. The Byzantine generals problem. *ACM Transactions\
    \ on Programming Languages and Systems (TOPLAS)* 4.3 (1982): 382–401."
