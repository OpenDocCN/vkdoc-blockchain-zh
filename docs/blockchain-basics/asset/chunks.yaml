  trans: "\n### 什么是应用构想？\n\n分析系统架构很重要，但这并不能回答关于其应用构想以及系统如何为用户创造附加值的问题。必须牢记，即使是最复杂的系统架构，也永远无法弥补一个薄弱或糟糕的应用构想。对`区块链`技术套件的兴奋，可能会让人轻易忽略薄弱或糟糕的应用概念。因此，在分析区块链应用时，为以下问题找到令人信服的答案至关重要：\n\
    \n-   该应用的初衷是什么？\n-   系统的主要问题领域是什么？\n-   该系统能否关联到特定的行业或领域？如果能，是哪些？\n-   该系统为其用户提供何种服务？\n\
    -   使用该系统的附加值是什么？\n-   该系统利用了哪种通用的区块链使用模式？\n-   在特定的应用领域，区块链的法律接受度是否存在问题？\n- \
    \  哪些类型的数据存储在区块链中？\n-   可以执行哪些类型的操作或交易？\n-   利用了哪些类型的安全功能？\n-   这些方面与系统的应用构想有何关联？\n\
    \n### 什么是商业模式？\n\n分析区块链应用时的另一个重要方面是软件系统本身的商业概念。任何软件的创建和运行都会消耗资源，从而产生成本。区块链也不例外。分析区块链软件的商业条件是一个重要步骤，因为许多产品或技术创新都因其商业概念中的缺陷而失败。因此，有必要为以下问题找到好的答案：\n\
    \n-   购买或使用该软件的成本是多少？\n-   运行或使用该软件的固定成本和可变成本是多少？\n-   谁承担哪些成本？\n-   使用了哪种许可模式？\n\
    -   谁获得利润，或者谁必须承担亏损？\n\n### 同行贡献资源并维护完整性如何获得补偿？\n\n区块链通过由费用和工作量证明实现的收入所构建的奖惩机制来实现完整性。第\
    \ 18 步强调了奖励对于补偿区块链贡献者的重要性，而第 20 步则指出了支付工具对系统的完整性、开放性和去中心化特性的影响。了解并理解同行如何因维护完整性而获得补偿，是分析区块链应用的一个关键方面。因此，有必要为以下问题找到令人满意的答案：\n\
    \n-   补偿同行的规则是什么？\n-   这些补偿规则与区块链的博弈论方面相结合，是否能确保并奖励那些为系统做出贡献者的诚实行为？\n-   系统验证和执行操作或交易需要支付哪些费用？\n\
    -   使用哪种支付工具来支付交易费用？\n-   使用哪种支付工具来补偿那些验证数据并将数据写入区块链的同行？\n\n一些区块链应用使用诸如比特币之类的加密货币作为支付费用和补偿同行的工具。由此产生的对比特币或其他区块链应用的依赖，在某些情况下可能并不可取。\n\
    \n## 展望\n\n这一步讨论了在现实世界中应用区块链的各个方面。然而，我对区块链的讨论尚未结束。下一步将总结学习路径，并指出有待进一步发展的领域。\n\n\
    ## 总结\n\n-   区块链可以被视为一个纯粹的分布式数据存储，具有不可篡改、仅追加、有序、带时间戳和最终一致性等附加属性。\n-   作为一个通用型数据存储，意味着区块链可以存储广泛的数据，这反过来使其能够在广泛的应用领域中使用。\n\
    -   基于其属性，我们可以识别出以下区块链的通用使用模式：\n    -   存在证明\n    -   不存在证明\n    -   时间证明\n  \
    \  -   顺序证明\n    -   身份证明\n    -   作者身份证明\n    -   所有权证明\n-   已经或将受到关注的区块链特定应用领域包括：\n\
    \    -   支付\n    -   加密货币\n    -   微支付\n    -   数字资产\n    -   数字身份\n    -   公证服务\n\
    \    -   合规与审计\n    -   税务\n    -   投票\n    -   记录管理\n-   在分析特定的区块链应用或区块链服务时，需要回答一些问题：\n\
    \    -   使用了哪种类型的区块链？\n    -   使用区块链的要求是否得到满足？\n    -   使用纯粹的分布式点对点系统有何附加值？\n\
    \    -   应用构想是什么？\n    -   商业模式是什么？\n    -   同行贡献资源给系统如何获得补偿？\n\n脚注 1\n\n世界经济论坛。金融服务未来——颠覆性创新如何重塑金融服务的结构、提供与消费方式。金融服务社区行业项目，2015\
    \ 年；世界经济论坛。金融基础设施未来——雄心勃勃地展望区块链如何重塑金融服务。金融服务社区行业项目，2016 年；Foroglou, George, 和\
    \ Anna-Lali Tsilidou。区块链的进一步应用。2015 年。在哥伦比亚大学可持续发展博士十周年纪念会议上的演讲，2014 年 2 月 28\
    \ 日。\n\n2\n\n另一方面，使用真正匿名的加密货币可能会使避税更加容易。\n\n# 25. 总结与展望\n\n区块链的进一步发展、替代方案与未来\n\
    \n这一步结束了这次穿越区块链宇宙的智力之旅。在强调了进一步发展和研究的领域之后，这一步将思考区块链在社会中可能取得的成就。在总结关于使用区块链可能未来趋势的一些评论之前，本步也讨论了一些可能存在的缺点。\n"
- fmt: '# The Metaphor


    In 1994, a computer scientist and inventor described a software system he was
    about to develop[¹](#A436689_1_En_25_Chapter.html#Fn1):


    - **Decentralization**: No central authority and no single point of failure.

    - **Nondiscrimination**: Everyone is free to choose his own way to connect to
    the system.

    - **Openness**: The system will be developed in full view of everyone, encouraging
    maximum participation and experimentation.

    - **Universality**: All the computers involved communicate with each other regardless
    of their hardware or location.

    - **Consensus**: The system and its users will comply with standards that are
    created through a transparent participatory process based on consensus.


    That list of properties reads like a short description of the blockchain. However,
    back in 1994, the blockchain did not exist! Actually, the system described by
    these points was the Internet, or at least Tim Berners-Lee''s vision of the Internet.


    As a result of technical progress, the emergence of Internet commerce, and the
    rise of Internet giants nowadays, the Internet may not have very much in common
    with Tim Berners-Lee''s vision of the Internet formulated back in 1994. The fact
    that technology evolves and as a result diverges from the vision of its inventors
    should be kept in mind when considering the future of the blockchain. Hence, the
    evolution of the Internet could be considered a blueprint for the future evolution
    of the blockchain.


    # Further Developments and Alternatives


    The blockchain is not a static construct that once developed remains unchanged
    for the rest of its existence. The blockchain as introduced and discussed in this
    book only provides the basis, which has already been and will continue to be the
    subject of research, improvements, and further developments.[²](#A436689_1_En_25_Chapter.html#Fn2)
    Some of them can be seen as minor technical improvements, while others are conceptual
    changes or even radical advancements that may lead to separate and competing approaches.
    Without any claim to completeness, the following areas of improvement and further
    development should be noticed:


    - Minor technical improvements and variations

    - Improving scalability

    - Conceptual evolutions and alternatives


    ## Minor Technical Improvements and Variations


    The blockchain utilizes a wide range of concepts and principles of software engineering
    and computer science such as hash functions, hash references, data structures,
    data storages, cryptography, network architectures, computer-to-computer communication,
    and computational puzzles. Each of these concepts and technologies has been and
    still is the area of active research. For example, there are a variety of hash
    functions, data structures, cryptographic procedures, communication protocols,
    and computational puzzles that can be used in a blockchain. As a result, we can
    create different versions of the blockchain just by utilizing different hash functions,
    cryptographic methods for creating keys, or computational puzzles used as proof
    of work. However, these variations have only a minor impact on the blockchain,
    as they do not alter its fundamental functioning; instead, they are only variations
    in some of its implementation details.


    ## Improving Scalability


    The major areas of research that focus on improving the scalability of the blockchain
    are network efficiency, storage, data usage, and the consensus algorithm.[³](#A436689_1_En_25_Chapter.html#Fn3)
    Very promising approaches in this area are the lightning channel[⁴](#A436689_1_En_25_Chapter.html#Fn4)
    and payment channels,[⁵](#A436689_1_En_25_Chapter.html#Fn5) which allow commercially
    acceptable transaction times.


    ## Conceptual Evolutions


    Conceptual evolutions are real advancements in the way the blockchain works, what
    services it offers, or how users interact with it. The most important areas of
    conceptual evolutions of the blockchain are:


    - Access rights

    - Privacy

    - Consensus

    - Transactions

    - Inventory data

    - Data structure


    ### Access Rights


    Restricting reading or writing access to the `blockchain-data-structure` has led
    to the development of different versions of the blockchain.[⁶](#A436689_1_En_25_Chapter.html#Fn6)
    As already explained in Step [23](#A436689_1_En_23_Chapter.html), combining different
    restrictions concerning the right to read data in the blockchain led to private
    and public blockchains, while restrictions on the right to write data into the
    blockchain led to the emergence of permissionless and permissioned blockchains.
    The emergence of four different types of blockchains can be seen as a conceptual
    advancement as they have an impact on major characteristics of the blockchain
    such as its purpose, distributed nature, and architecture.


    ### Privacy


    The openness of public blockchains has already been the subject of discussions
    and further development since it conflicts with the level of privacy required
    in some application contexts. Private blockchains restrict reading access and
    as a result can no longer be used by everyone to clarify ownership based on the
    history of transaction data. Alternative approaches of protecting privacy are
    privacy overlays over existing blockchains[⁷](#A436689_1_En_25_Chapter.html#Fn7)
    or distributed computing platforms that focus specifically on privacy.[⁸](#A436689_1_En_25_Chapter.html#Fn8)
    Another approach is zero knowledge proofs, which allows you to prove the correctness
    of statements (e.g., statements about the current owner of a digital good) without
    having full access to the data on which the proof is created.[⁹](#A436689_1_En_25_Chapter.html#Fn9)
    Regarding the blockchain, this technology could allow everyone to prove ownership-related
    statements without having read access to all details of transaction data.[^(10)](#A436689_1_En_25_Chapter.html#Fn10)


    ### Consensus


    A core element of the blockchain is its approach to select one version of the
    transaction history in an ongoing fashion on which all nodes consistently agree.
    The proof of work that causes computational costs provides the basis for the criterion
    that is used to choose a transaction history and to resolve conflicts between
    competing versions of the past. However, choosing a transaction history based
    on the computational power that was invested to create it left many computer scientists
    unsatisfied since huge computational power could be conquered and accumulated
    by a single organization that as a result could influence the consensus at its
    will.


    Hence, different criteria as well as different algorithms for finding consensus
    in distributed systems have been developed and discussed. Proof of stake[^(11)](#A436689_1_En_25_Chapter.html#Fn11)
    and proof of stake velocity[^(12)](#A436689_1_En_25_Chapter.html#Fn12) are consensus
    criteria that may work well for cryptocurrencies since they tie voting power to
    the possession or turnover of that good that is managed by the consensus itself.
    Completely different algorithms for finding consensus are `Paxos`[^(13)](#A436689_1_En_25_Chapter.html#Fn13)
    and `Raft`.[^(14)](#A436689_1_En_25_Chapter.html#Fn14) They were developed long
    before the emergence of the blockchain. However, explaining `Raft` or `Paxos`
    at a satisfactory level is a challenge in its own right, which is beyond the scope
    of this book. A major challenge with alternative consensus mechanisms is that
    they are often conceptually more complex and thereby more difficult to prove formally.
    If there is a game theoretic flaw in them, it could allow corruption of the blockchain
    using it, and as a consequence destroy confidence in that blockchain.'
