    \ 为本书中的部分步骤提供了配套材料。\n\n## 目录\n\n**第一阶段：术语与技术基础**  \n第 1 步：分层与分面思考 3  \n第 2 步：纵观全局\
    \ 9  \n第 3 步：识别潜力 19\n\n**第二阶段：为何需要区块链**  \n第 4 步：发现核心问题 29  \n第 5 步：厘清术语 33 \
    \ \n第 6 步：理解所有权的本质 39  \n第 7 步：双重花费 49\n\n**第三阶段：区块链如何运作**  \n第 8 步：规划区块链 57 \
    \ \n第 9 步：记录所有权 63  \n第 10 步：数据哈希 71  \n第 11 步：现实世界中的哈希 81  \n第 12 步：识别与保护用户账户\
    \ 93  \n第 13 步：授权交易 103  \n第 14 步：存储交易数据 111  \n第 15 步：使用数据存储 123  \n第 16 步：保护数据存储\
    \ 135  \n第 17 步：在节点间分布式存储数据 145  \n第 18 步：验证并添加交易 153  \n第 19 步：选择交易历史 165  \n\
    第 20 步：为完整性买单 183  \n第 21 步：整合所有环节 189\n\n**第四阶段：局限性与克服方法**  \n第 22 步：认识局限性 205\
    \  \n第 23 步：重塑区块链 213\n\n**第五阶段：使用区块链、总结与展望**  \n第 24 步：使用区块链 223  \n第 25 步：总结与进阶\
    \ 235\n\n**索引** 249\n\n**作者简介与技术审校者简介**  \n作者简介  \n技术审校者简介\n\n# 第一部分：术语与技术基础\n\
    \n术语与技术基础\n\n本阶段阐释软件工程的主要概念，并建立一种组织与标准化技术沟通的方式。本学习阶段还介绍了软件架构与完整性的概念，以及它们与区块链的关系。到本阶段结束时，您将理解区块链的目的及其潜力。\n\
    \n# 1. 分层与分面思考\n\n通过将系统分为不同层与不同面来进行分析\n\n本步骤通过介绍一种组织与标准化技术沟通的方式，为我们学习区块链的旅程奠定基础。本步骤解释了如何分析一个软件系统，以及为何将软件系统视为多个层的组合至关重要。此外，本步骤还阐述了从系统的不同层面进行思考能带来哪些收获，以及这种方法如何帮助我们理解区块链。最后，本步骤简要介绍了软件完整性的概念，并强调了其重要性。\n\
    \n## 隐喻\n\n你有手机吗？我猜答案是肯定的，因为现在大多数人至少都有一部手机。你对用于发送和接收数据的各种无线通信协议了解多少？你对作为移动通信基础的电磁波又了解多少？好吧，我们大多数人对此知之甚少，因为使用手机并不需要了解这些细节，而且大多数人也没有时间去学习它们。我们在心理上将手机分为需要了解的部分和可以忽略或视为理所当然的部分。\n\
    \n这种对待技术的方式并不仅限于手机。我们在学习使用新电视、电脑、洗衣机等设备时，一直在使用这种方法。然而，这些心理划分是高度个性化的，因为什么重要、什么不重要，取决于我们个人的偏好、具体的技术、我们的目标和经验。因此，你对某部手机的心理划分可能与我对同一部手机的心理划分不同。这通常会导致沟通问题，尤其是当我试图向你解释你应该了解某部手机的哪些方面时。因此，统一划分系统的方式是教授和讨论技术的关键点。本步骤将解释如何划分或分层一个系统，从而为我们讨论区块链奠定基础。\n\
    \n## 软件系统的层\n\n本书通篇使用以下两种系统划分方式：\n\n- 应用与实现\n- 功能性与非功能性方面\n\n### 应用与实现\n\n在心理上将用户需求与系统的技术内部细节分开，会导致应用层与实现层的分离。属于应用层的所有内容都与用户的需求有关（例如，听音乐、拍照或预订酒店房间）。属于实现层的所有内容都与实现这些功能有关（例如，将数字信息转换为声学信号、识别数码相机中像素的颜色，或通过互联网向预订系统发送消息）。实现层的元素本质上是技术性的，被视为达到目的的手段。\n\
    \n### 功能性与非功能性方面\n\n区分系统做什么以及它如何做，会导致功能性与非功能性方面的分离。功能性方面的例子包括通过网络发送数据、播放音乐、拍照以及操作图片的单个像素。非功能性方面的例子包括美观的图形用户界面、运行快速的软件，以及保护用户数据私密和安全的能力。系统其他重要的非功能性方面还包括安全性和完整性。完整性意味着系统按预期运行，它涉及许多方面，如安全性和正确性。¹\
    \ 有一种很好的方法可以记住系统功能性与非功能性方面的区别，即参考英语中的语法用法：动词描述动作或所做的事情，而副词描述动作如何完成。例如，一个人可以走得快或慢。在这两种情况下，“走”的动作是相同的，但动作的执行方式不同。作为经验法则，可以说功能性方面类似于动词，而非功能性方面类似于副词。\n"
- fmt: "# Considering Two Layers at the Same Time\n\nIdentifying functional and nonfunctional\
    \ aspects as well as separating application and implementation layer can be done\
    \ at the same time, which leads to a two-dimensional table. Table [1-1](#A436689_1_En_1_Chapter.html#Tab1)\
    \ illustrates the result of mentally layering a mobile phone in this way.\n\n\
    Table 1-1. Example of Mentally Layering a Mobile Phone\n\n| Layer | Functional\
    \ Aspects | Nonfunctional Aspects |\n| --- | --- | --- |\n| Application | Taking\
    \ photos Making phone calls Sending e-mails Browsing the Internet Sending chat\
    \ messages | The graphical user interface looks beautiful Easy to use Messages\
    \ are sent fast |\n| Implementation | Saving user data internally Making a connection\
    \ to the nearest mobile connector Accessing pixels in the digital camera | Store\
    \ data efficiently Saving energy Maintaining integrity Ensure user privacy |\n\
    \nTable 1-1 may explain the visibility (or the lack of it) of specific elements\
    \ of a system to its users. Functional aspects of the application layer are the\
    \ most obvious elements of a system, because they serve obvious needs of the users.\
    \ These elements are typically the ones users learn about. On the other hand,\
    \ the nonfunctional aspects of the implementation layer are rarely seen as major\
    \ elements of the system. They are typically taken for granted.\n\n## Integrity\n\
    \nIntegrity is an important nonfunctional aspect of any software system. It has\
    \ three major components[²](#A436689_1_En_1_Chapter.html#Fn2):\n\n*   **Data integrity**:\
    \ The data used and maintained by the system are complete, correct, and free of\
    \ contradictions.\n*   **Behavioral integrity**: The system behaves as intended\
    \ and it is free of logical errors.\n*   **Security**: The system is able to restrict\
    \ access to its data and functionality to authorized users only.\n\nMost of us\
    \ may take integrity of software systems for granted because most of the time\
    \ we luckily interact with systems that keep their integrity. This is due to the\
    \ fact that programmers and software engineers have invested a lot of time and\
    \ effort into the development of systems to achieve and maintain integrity. As\
    \ a result, we may be a bit spoiled when it comes to appreciating the work done\
    \ by software engineers to create systems that maintain a high level of integrity.\
    \ But our feelings may change as soon as we interact with a system that fails\
    \ to do so. These are the occasions when you face a loss of data, illogical software\
    \ behavior, or realize that strangers were able to access your private data. These\
    \ are the occasions when your mobile phone, your computer, your e-mail software,\
    \ your word processor, or your spreadsheet calculator make you angry and forget\
    \ your good manners! On these occasions, we begin to realize that software integrity\
    \ is a highly valuable commodity. Hence, it should not come as a surprise that\
    \ software professionals spend a lot of their time working on this seemingly tiny\
    \ nonfunctional aspect of the implementation layer.\n\n## Outlook\n\nThis step\
    \ provided an introduction to some general principles of software engineering.\
    \ In particular, the concepts of integrity and functional vs. nonfunctional aspects\
    \ as well as application vs. implementation of a software system were illustrated.\
    \ Understanding these concepts will help you appreciate the wider scope in which\
    \ the blockchain exists. The next step will present the bigger picture by using\
    \ the concepts introduced in this step.\n\n## Summary\n\n*   Systems can be analyzed\
    \ by separating them into:\n    *   Application and implementation layer\n   \
    \ *   Functional and nonfunctional aspects\n*   The application layer focuses\
    \ on the user’s needs, while the implementation layer focuses on making things\
    \ happen.\n*   Functional aspects focus on what is done, while nonfunctional aspects\
    \ focus on how things are done.\n*   Most users are concerned with the functional\
    \ aspects of the application layer of a system, while nonfunctional aspects of\
    \ a system, in particular those of the implementation layer, are less visible\
    \ to users.\n*   Integrity is an important nonfunctional aspect of any software\
    \ system and it has three major elements:\n    *   Data integrity\n    *   Behavioral\
    \ integrity\n    *   Security\n*   Most software failures, such as losses of data,\
    \ illogical behavior, or strangers accessing one’s private data, are the result\
    \ of violated system integrity.\n\n**Footnotes**\n\n[1](#A436689_1_En_1_Chapter.html#Fn1_source)\
    \ Chung, Lawrence, et al. *Non-functional requirements in software engineering*.\
    \ Vol. 5. New York: Springer Science & Business Media, 2012.\n\n[2](#A436689_1_En_1_Chapter.html#Fn2_source)\
    \ Boritz, J. Efrim. *IS practitioners’ views on core concepts of information integrity*.\
    \ International Journal of Accounting Information Systems 6.4 (2005): 260–279.\n\
    \n# 2. Seeing the Big Picture\n\nSoftware architecture and its relation to the\
    \ blockchain\n\nThis step not only provides the big picture in which the blockchain\
    \ is located, but it also highlights its location within the big picture. In order\
    \ to allow you to see the big picture, this step introduces the concept of software\
    \ architecture and explains its relation to the concept of separating a system\
    \ into layers and aspects. In order to help you recognize the location of the\
    \ blockchain within the big picture, this step highlights the relationship between\
    \ the blockchain and software architecture. Finally, this step points out the\
    \ core purpose of the blockchain in just one sentence. Appreciating its purpose\
    \ is a cornerstone in understanding the blockchain and understanding the course\
    \ of the succeeding steps.\n\n## The Metaphor\n\nHave you ever bought a car? Most\
    \ of us have. Even if you have never bought a car, you probably know that cars\
    \ are equipped with different types of engines (e.g., diesel, gasoline, or electric\
    \ engine). This is an example of the process of modularization, which is the result\
    \ of applying the idea of layering to cars. Having the choice among different\
    \ engines when buying a car can result in amazing differences in the vehicle.\
    \ Two cars that look identical from the outside can differ dramatically with respect\
    \ to the power of their engines and hence have very different driving performance.\
    \ Additionally, your choice of the engine will have an impact on other characteristics\
    \ of the car, like its price, its operational costs, the type of fuel consumed,\
    \ the exhaust system, and the dimensions of the brakes. With this picture in mind,\
    \ understanding the role of the blockchain within the big picture will be much\
    \ easier.\n\n## A Payment System\n\nLet’s apply the concept of layering to a payment\
    \ system. Table [2-1](#A436689_1_En_2_Chapter.html#Tab1) shows some of the user’s\
    \ needs as well as some of the nonfunctional aspects of both the application and\
    \ the implementation layers.\n\nTable 2-1. Aspects and Layers of a Payment System\n\
    \n| Layer | Functional Aspects | Nonfunctional Aspects |\n| --- | --- | --- |\n\
    | Application | Deposit money Withdraw money Transfer money Monitor account balance\
    \ | The graphical user interface looks beautiful Easy to use Transfer of money\
    \ is done fast System has many participants |\n| Implementation | ? | Available\
    \ 24 hours a day Fraud resistant Maintaining integrity Ensure user privacy |\n\
    \nHave you spotted the question mark in that part of the table were you normally\
    \ see information about the technology used to make the system work? This space\
    \ was left blank on purpose. It is the place where you decide which “engine” should\
    \ be used to run your system. The next section will tell you a bit more about\
    \ the engine equivalent in software systems."
