    Introduction


    This introduction answers the most important question that every author has to
    answer: Why should anyone read this book? Or more specifically: Why should anyone
    read another book about the blockchain? Continue reading and you will learn why
    this book was written, what you can expect from this book, what you cannot expect
    from this book, for whom the book was written, and how the book is structured.


    ## Why Another Book About the Blockchain?


    The blockchain has received a lot of attention in the public discussion and in
    the media. Some enthusiasts claim that the blockchain is the biggest invention
    since the emergence of the Internet. Hence, a lot of books and articles have been
    written in the past few years about the blockchain. However, if you want to learn
    more about how the blockchain works, you may find yourself lost in a universe
    of books that either quickly skim over the technical details or that discuss the
    underlying technical concepts at a highly formal level. The former may leave you
    unsatisfied because they miss to explain the technical details necessary to understand
    and appreciate the blockchain, while the latter may leave you unsatisfied because
    they already require the knowledge you want to acquire.


    This book fills the gap that exists between purely technical books about the blockchain,
    on the one hand, and the literature that is mostly concerned with specific applications
    or discussions about its expected economic impact or visions about its future,
    on the other hand.


    This book was written because a conceptual understanding of the technical foundations
    of the blockchain is necessary in order to understand specific blockchain applications,
    evaluate business cases of blockchain startups, or follow the discussion about
    its expected economic impacts. Without an appreciation of the underlying concepts,
    it will be impossible to assess the value or the potential impact of the blockchain
    in general or understand the added value of specific blockchain applications.
    This book focuses on the underlying concepts of the blockchain since a lack of
    understanding of a new technology can lead to being carried away with the hype
    and being disappointed later on because of unrealistic unsubstantiated expectations.


    This book teaches the concepts that make up the blockchain in a nontechnical fashion
    and in a concise and comprehensible way. It addresses the three big questions
    that arise when being introduced to a new technology: What is it? Why do we need
    it? How does it work?


    ## What You Cannot Expect from This Book


    The book is deliberately agnostic to the application of the blockchain. While
    cryptocurrencies in general and Bitcoin in particular are prominent applications
    of the blockchain, this book explains the blockchain as a general technology.
    This approach has been chosen in order to highlight generic concepts and technical
    patterns of the blockchain instead of focusing on a specific and narrow application
    case. Hence, this book is:


    *   Not a text specifically about Bitcoin or any other cryptocurrency

    *   Not a text solely about one specific blockchain application

    *   Not a text about proofing the mathematical foundations of the blockchain

    *   Not a text about programming a blockchain

    *   Not a text about the legal consequences and implications of the blockchain

    *   Not a text about the social, economic, or ethical impacts of the blockchain
    on our society or humankind in general


    However, some of these points are addressed to some extent at appropriate points
    in this book.'
