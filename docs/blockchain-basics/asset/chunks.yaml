  trans: "\n# 概述\n\n本步骤解释了区块链如何处理交易数据并将其添加到 `blockchain-data-structure` 中，从而将其纳入交易数据的正式历史记录。本步骤中讨论的指令旨在确保系统中的所有节点都维护相同版本的\
    \ `blockchain-data-structure`，并因此维护相同的交易数据历史记录。然而，有时节点会维护不同的历史记录，这意味着它们无法就同一份交易数据历史记录达成一致。解决这些冲突是\
    \ `blockchain-algorithm` 的另一项任务，将在下一步中进行探讨。\n\n# 总结\n\n*   `blockchain-algorithm`\
    \ 是一系列规则和指令，用于管理交易数据的处理方式并将其添加到系统中。\n*   `blockchain-algorithm` 所解决的挑战是，在确保仅添加有效且经过授权的交易的同时，保持系统对所有人开放。\n\
    *   `blockchain-algorithm` 采用了胡萝卜加大棒的方法，并结合了竞争与同行监督。\n*   `blockchain-algorithm`\
    \ 的主要理念是允许系统中的所有节点充当其同行的监督者，并奖励它们添加有效且经过授权的交易，以及在他人工作中发现错误。\n*   由于 `blockchain-algorithm`\
    \ 的规则，系统中的所有节点都有动力去正确地处理交易，并监督和指出其他同行所犯的任何错误。\n*   `blockchain-algorithm` 基于以下概念：\n\
    \    *   交易数据和区块头的验证规则\n    *   提交有效区块的奖励\n    *   破坏系统完整性的惩罚\n    *   基于处理速度和质量，为获得奖励而进行的同行竞争\n\
    \    *   同行监督\n*   竞争规则建立了一个两步节奏，用于管理网络中每个节点的工作。在任何给定时间点，系统中的所有节点都处于以下两个阶段之一：\n\
    \    *   评估由其他节点创建的新区块\n    *   努力成为下一个创建新区块（该区块必须由所有其他节点评估）的节点\n*   这种工作节奏是由到达各个节点的消息所决定的。\n\
    *   大多数诚实节点及其对奖励的追求将战胜不诚实节点试图破坏系统完整性的行为。\n\n脚注 1\n\n中本聪。比特币：一种点对点电子现金系统。2008 年。[`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf)。\n\
    \n2\n\n后来被识别为无效的区块实际上并未从 `blockchain-data-structure` 中物理移除。相反，它们会被标记为无效，并被视为已被移除。因此，所有更改都按记录保留。\n\
    \n# 19. 选择交易历史\n\n让计算机用脚投票\n\n步骤 18 解释了区块链节点如何处理交易数据和新区块。然而，由于消息传递中的延迟或错误，系统中各个节点维护的交易历史可能仍然不同。因此，本步骤专注于解决系统中各个节点所维护的不同版本交易历史之间的冲突。\n\
    \n## 比喻\n\n你上次在公园散步是什么时候？你有没有注意到一个在全球大多数公园都能观察到的现象？公园里有依照景观设计师的规划和想法修建的铺砌小路，也有游客踩出的土路。这些土路通常是一条条穿过草坪的直线，在两个地标、两张公园长椅或其他兴趣点之间提供了高效的捷径。当许多人都独立且持续地决定偏离铺砌的小路，因为这样做似乎比沿着铺砌的小路走更可取时，土路就出现了。因此，公园里土路的形成可以被看作是某种最基础形式的民主的结果。这些道路的出现并非由官方的民意调查或选举来支配，而是每位游客通过自己独立的选择——是否沿着某些路径行走——并在地上留下足迹，从而促成了它们的形成。人迹罕至的土路会随着大自然重新夺回领地而消失，但其他的土路则因为许多人继续行走而得以保留。本学习步骤解释了区块链的一个方面，其运作方式类似于公园中土路的出现与消失。\n\
    \n## 目标\n\n目标是在网络中的所有节点之间维护一份明确无误的交易数据历史记录，使得在处理所有权查询时，无论联系或请求的是哪个特定节点，都能得到相同的结果。\n\
    \n## 挑战\n\n步骤 18 中解释的 `blockchain-algorithm` 向系统中的所有节点强加了一个两步节奏。在任何给定时间点，系统中的每个节点要么在检查由某个同行创建的新区块，要么在努力成为下一个创建新区块（随后必须由所有其他节点检查）的节点。然而，并没有一个全局时钟来统辖所有节点，并规定在任何给定时间必须执行两种工作中的哪一种。新区块到达各个节点收件箱的情况，就是驱动任何给定节点工作的时钟脉冲发生器。然而，新区块到达各个节点收件箱的情况深受网络消息传递能力的影响，而网络本身也面临各种不利因素。消息可能会丢失、延迟送达，或者以任意顺序到达。其结果是，网络中的节点无法在同一时间拥有相同的信息。此外，所有节点在工作阶段之间的切换并非同时发生。相反，每个节点会根据其收件箱中消息的到达情况，在各自独立的时间进行工作阶段的切换。这导致了各个节点工作阶段的重叠。这两种效应都给在网络中所有同行之间维护一份明确无误的交易数据历史记录带来了巨大障碍。因此，挑战在于：在面临所有消息传递的不利因素，并且不依赖集中式解决方案的情况下，找到一种方法来识别一份明确无误的交易数据历史记录。\n"
- fmt: '# The Idea


    The example of beaten paths in parks shows that a group of people can reach agreement
    or consensus in collective decision-making problems by independently and consistently
    voting with their feet. The result of that kind of voting is often called distributed
    consensus because it is reached among independently acting individuals without
    a central element of control or coordination.


    > **Note**: Consensus is a synonym for an agreement among independent individuals.
    Distributed consensus is an agreement among the members of a purely distributed
    peer-to-peer system.


    Situations in which a crowd or swarm of independently acting individuals solves
    a collective problem can be characterized by the following conditions[¹](#A436689_1_En_19_Chapter.html#Fn1):


    1. A group of individuals operate in the identical environment.

    2. A collective decision-making problem exists.

    3. The individuals independently strive to achieve an identical goal.

    4. The individual actions performed to achieve one’s goal leave visible marks
    in the environment that help to decide the collective decision-making problem.

    5. The individuals use identical criterion for evaluating the decision-making
    problem based on the alteration of their environment.


    The idea of the blockchain is to let all nodes independently vote with their feet
    and thereby reach a collective agreement regarding the selection of one version
    of the transaction history. The blockchain as we know it at this point of the
    book fulfills the first four conditions of collective decision making:


    1. All nodes operate in the identical environment consisting of the network, nodes
    that maintain their individual copies of the `blockchain-data-structure`, and
    the `blockchain-algorithm` that governs the behavior of the nodes.

    2. The decision-making problem is to select one transaction history collectively.

    3. All nodes strive to maximize their individual income earned as reward for adding
    new valid blocks to the `blockchain-data-structure`.

    4. In order to achieve their goals, all nodes send their new blocks to all their
    peers to have them examined and accepted. As a result, each node leaves its individual
    footprint in the environment that is the collectively maintained `blockchain-data-structure`.


    However, a fifth point is missing: a criterion that all nodes use for making a
    decision based on the alteration of their environment. The idea of how to select
    a history of transaction data is based on how new blocks are added to the `blockchain-data-structure`
    and how the data are protected against manipulation. Due to the proof of work,
    adding a new block is computationally expensive and makes attempts to manipulate
    the transaction history even more computationally expensive. Hence, the amount
    of aggregated computational effort spent on creating a transaction history seems
    to be a natural criterion for selecting a history of transaction data in the case
    that more than one conflicting version exists. If all nodes of the system apply
    the identical criterion for selecting a transaction history, then all nodes of
    the system eventually agree on the identical version of the history. The collectively
    selected version of the transaction history is often called the authoritative
    chain or history.


    ## How It Works


    The idea of selecting a transaction history based on the computational effort
    that was spent for creating it has led to the following two criteria:


    - The longest-chain-criterion[²](#A436689_1_En_19_Chapter.html#Fn2)

    - The heaviest-chain-criterion[³](#A436689_1_En_19_Chapter.html#Fn3)'
