- fmt: "# Asymmetric Cryptography in the Blockchain\n\nThe blockchain uses asymmetric\
    \ cryptography in order to achieve two goals:\n\n- Identifying accounts\n- Authorizing\
    \ transactions\n\n## Identifying Accounts\n\nThe blockchain needs to identify\
    \ users or user accounts, respectively, in order to maintain the mapping between\
    \ owner and property. The blockchain uses the public-to-private approach of asymmetric\
    \ cryptography for identifying user accounts and transferring ownership between\
    \ them. Account numbers in the blockchain are actually public cryptographic keys.\
    \ Hence, transaction data use the public cryptographic keys for identifying the\
    \ accounts involved in the transfer of ownership. In this regard, the blockchain\
    \ treats user accounts similar to mailboxes: They have a publicly known address\
    \ and everyone is able to send messages to them.\n\n## Authorizing Transactions\n\
    \nTransaction data always have to include a piece of data that serves as proof\
    \ that the owner of the account who hands off ownership indeed agrees with the\
    \ described transfer of ownership. The flow of information implied by this agreement\
    \ starts at the owner of the account who hands off ownership and is supposed to\
    \ reach everyone who inspects the transaction data. This kind of information flow\
    \ is similar to that implied by the private-to-public use case of asymmetric cryptography.\
    \ The owner of the account who hands off ownership creates some cypher text with\
    \ his or her private key. All others can verify this proof of agreement by using\
    \ the public cryptographic key, which happens to be the number of the account\
    \ that hands off ownership. The details of this procedure, which is called digital\
    \ signature, will be explained in more detail in the next step.\n\n## Outlook\n\
    \nThis step explained the concept of asymmetric cryptography and how it is used\
    \ as public-private-key cryptography in real life. Furthermore, this step explained\
    \ that cryptographic public keys are used in the blockchain to identify user accounts.\
    \ Furthermore, the lawful owner authorizes transactions by creating a digital\
    \ signature that can be traced back to his or her private cryptographic key. The\
    \ next step explains this concept in more detail, as this usage of asymmetric\
    \ cryptography is less intuitive than the identification of accounts by public\
    \ keys.\n\n## Summary\n\n- The major goal of cryptography is to protect data from\
    \ being accessed by unauthorized people.\n- The major cryptographic activities\
    \ are:\n    - Encryption: Protecting data by turning them into cypher text by\
    \ utilizing a cryptographic key\n    - Decryption: Turning cypher text back into\
    \ useful data by utilizing a matching cryptographic key\n- Asymmetric cryptography\
    \ always uses two complementary keys: cypher text created with one of these keys\
    \ can only be decrypted with the other key and vice versa.\n- When utilizing asymmetric\
    \ cryptography in real life, these keys are typically called the public key and\
    \ private key in order to highlight their role. The public key is shared with\
    \ everyone, while the private key is kept secret. For this reason, asymmetric\
    \ cryptography is also called public-private-key cryptography.\n- There are two\
    \ classical use cases of public and private keys:\n    - Everyone uses the public\
    \ key to encrypt data that can only be decrypted by the owner of the corresponding\
    \ private key. This is the digital equivalent to a public mailbox where everyone\
    \ can put letters in but only the owner can open it.\n    - The owner of the private\
    \ key uses it to encrypt data that can be decrypted by everyone who possesses\
    \ the corresponding public key. This is the digital equivalent to a public notice\
    \ board that proves authorship.\n- The blockchain uses asymmetric cryptography\
    \ in order to achieve two goals:\n    - Identifying accounts: User accounts are\
    \ public cryptographic keys.\n    - Authorizing transactions: The owner of the\
    \ account who hands off ownership creates a piece of cypher text with the corresponding\
    \ private key. This piece of cypher text can be verified by using the corresponding\
    \ public key, which happens to be the number of the account that hands off ownership.\n\
    \nFootnotes [1](#A436689_1_En_12_Chapter.html#Fn1_source)\n\nNakamoto, Satoshi.\
    \ Bitcoin: A peer-to-peer electronic cash system. 2008. [`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf).\n\
    \n[2](#A436689_1_En_12_Chapter.html#Fn2_source)\n\nSee Van Tilborg, Henk, and\
    \ Sushil Jajodia, eds. Encyclopedia of cryptography and security. New York: Springer\
    \ Science & Business Media, 2014.\n\n# 13. Authorizing Transactions\n\nUtilizing\
    \ the digital equivalent to handwritten signatures\n\nStep [12](#A436689_1_En_12_Chapter.html)\
    \ provided a gentle introduction to asymmetric cryptography. It also pointed out\
    \ that the blockchain uses public cryptographic keys as account numbers and utilizes\
    \ the public-to-private approach of asymmetric cryptography for transferring ownership\
    \ among accounts. However, that was only half of the story. The blockchain needs\
    \ to ensure that only the lawful owner can transfer his or her property to other\
    \ accounts. This is the point were the concept of authorization enters the scene.\
    \ Hence, this step explains how asymmetric cryptography is used within the blockchain\
    \ for authorizing transactions. In particular, this step is devoted to the concept\
    \ of digital signatures, which utilize the private-to-public approach of asymmetric\
    \ cryptography.\n\n## The Metaphor\n\nHandwritten signatures serve an important\
    \ purpose: they state agreement with the content of a document and agree with\
    \ its execution. The reason why we accept handwritten signatures as evidence for\
    \ agreement is the uniqueness of each person’s handwriting. Every human being\
    \ has his or her own characteristic way of writing his or her name. Hence, when\
    \ we identify a name being written in a specific way, we conclude that the person\
    \ who writes his or her name in that particular way has indeed produced that handwritten\
    \ signature, and, as a result, we can conclude that this person has agreed with\
    \ the content of the document and its implementation. This step explains the concept\
    \ of stating agreement with transactions in an electronic ledger that is similar\
    \ to handwritten signatures. This concept is crucial for the security of individual\
    \ transactions in the blockchain.\n\n## The Goal\n\nIt is important to ensure\
    \ that only the owner of an account can transfer the property associated with\
    \ it to other accounts. Every attempt to access an account and its associated\
    \ property by any person other than the lawful owner should be identified as unauthorized\
    \ and should be rejected.\n\n## The Challenge\n\nThe peer-to-peer system under\
    \ consideration is open to everyone. Hence, everyone may create transactions and\
    \ can submit them to the system. Transaction data are the foundation of describing\
    \ and clarifying ownership. Only the lawful owner of an account should be able\
    \ to transfer property or ownership rights associated with his or her account\
    \ to another account. The challenge of the blockchain is to maintain its openness\
    \ while restricting the transfer of ownership to the lawful owner.\n\n## The Idea\n\
    \nThe main idea of ensuring that only the lawful owner can transfer ownership\
    \ is to utilize a digital security measure that is equivalent to handwritten signatures\
    \ and serves the same purpose: identifying an account, stating the agreement of\
    \ its owner with the content of specific transaction data, and approving its execution\
    \ by allowing the data to be added to the history of transaction data.\n\n## A\
    \ Short Detour to Digital Signatures\n\nDigital signatures are the equivalent\
    \ of handwritten signatures. They utilize cryptographic hashing and the private-to-public\
    \ information flow of asymmetric cryptography. The following short example illustrates\
    \ the three major elements of digital signatures:\n\n- Creating a signature\n\
    - Verifying data by using the signature\n- Identifying fraud by using the signature"
