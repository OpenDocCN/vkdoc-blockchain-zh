  trans: "\n# 灵活性缺失\n\n区块链是一个由多种概念和协议构成的复杂技术结构，这些概念和协议相互优化、彼此适配。改变这个精细调节的生态系统可能极具挑战性。实际上，一旦区块链开始运行，对于如何更改或升级其主要组件，并没有既定的程序。这隐性地意味着构成区块链的各类技术具有较长的使用寿命。例如，密码学过程必须在区块链的整个生命周期内有效，这个周期可能长达数百年。这对于区块链算法以及冲突解决方式也同样适用。此外，由于不可篡改性，在区块链上进行开发的人员也面临一个问题，即难以修复漏洞或对区块链协议进行调整。这些特性使得整个区块链技术套件比其他技术缺乏灵活性。\n\
    \n# 关键规模\n\n对于集体维护的交易数据历史的防篡改能力以及可信度，依赖于一个假设：系统的大部分计算能力由诚实节点控制。然而，在计算能力有限的小型点对点系统中，这个“大部分”可能仍然非常小，这反而使得执行\
    \ 51%攻击成为可能。这个问题对于市值较低且用户采用率有限的加密货币尤为突出。因此，任何一条区块链都需要达到一个诚实节点的临界规模，才能支持自身运转，并抵御拥有强大计算能力的攻击者。达到使\
    \ 51%攻击不可能发生的关键规模，是每一条新区块链都必须面对的挑战。\n\n## 区块链的非技术性限制\n\n区块链最重要的非技术性限制包括：\n\n*\
    \   法律上缺乏认可\n*   用户缺乏接受度\n\n### 法律上缺乏认可\n\n区块链是一项为其用户提供在开放、纯粹分布式点对点系统中管理和转移所有权可能性的技术。独立节点通过分布式共识集体管理所有权的方式，引发了关于在区块链中进行和管理的交易的法律后果的疑问。无论其技术多么安全、可靠和复杂，都需要讨论在区块链中执行交易的法律含义和认可度问题。这是一个关乎如何在现有法律体系中融入一种新的所有权管理方法的问题。那些见证了互联网兴起和发展的人可能会发现，当前区块链的法律地位与上世纪\
    \ 90 年代互联网商务缺乏法律认可的情况有相似之处。\n\n### 用户缺乏接受度\n\n用户接受度（或缺乏接受度）是另一个不容忽视的限制。区块链的法律地位不明确将导致用户产生不确定性，从而降低他们使用的兴趣。用户接受度的另一个方面是知识和教育。期望用户在未能理解其基本运作原理的情况下使用并信任区块链，是不切实际的。\n\
    \n## 克服局限\n\n技术性和非技术性的局限都被认为是在现实世界应用中采用区块链的主要障碍。如何克服特定的局限一直是（并且现在仍然是）一个活跃的研究和进一步开发的领域。对这些活动的详细讨论超出了本书的范围。然而，以下章节将简要阐述如何克服区块链的局限性。\n\
    \n### 技术限制\n\n克服区块链的技术限制可能需要对其所有组件和技术层面进行干预。克服区块链技术限制的主要挑战之一，在于区分是改进其现有技术还是从根本上改变其技术。下一步将更详细地讨论这个主题。\n\
    \n### 非技术限制\n\n区块链的非技术限制可以被视为适应新技术的社交、经济、法律和心理方面的挑战。教育和法律举措可以被看作是掌握区块链采用进程的适当措施。互联网和电子商务的例子已经表明，回答伴随新技术而来的法律问题需要时间，用户理解、信任并使用它们也需要时间。幸运的是，互联网和电子商务的案例也表明，关于新技术功能的教育举措能够提高用户对它们的接受度和采用率，并促进法律问题的解决。\n\
    \n## 展望\n\n本步骤重点介绍了区块链的主要技术性和非技术性限制，这些限制被视为其被采用的障碍。教育和法律举措可以被视为克服区块链非技术性障碍的一种方式。下一步将重点讨论如何克服部分技术限制。\n\
    \n## 总结\n\n*   区块链的开放性以及任何形式中央控制的缺失是其运行的基础，但也可能导致其在被采用时面临限制。\n*   区块链的主要技术限制包括：\n\
    \    *   缺乏隐私性\n    *   安全模型\n    *   扩展性有限\n    *   成本高昂\n    *   隐藏的中心化\n  \
    \  *   灵活性缺失\n    *   关键规模\n*   区块链最重要的非技术性限制包括：\n    *   法律上缺乏认可\n    *   用户缺乏接受度\n\
    *   区块链的技术限制可以通过改进现有技术或引入概念性变革来克服。\n*   区块链的非技术限制可以通过教育和立法举措来克服。\n\n**脚注**\n\n\
    1 Nakamoto, Satoshi. Bitcoin: A peer-to-peer electronic cash system. 2008. `https:bitcoin.org/bitcoin.pdf`.\n\
    \n2 Taylor, Michael Bedford. Bitcoin and the age of bespoke silicon. In Proceedings\
    \ of the 2013 International Conference on Compilers, Architectures and Synthesis\
    \ for Embedded Systems. Montreal: IEEE Press, 2013.\n\n3 Kroll, Joshua A., Ian\
    \ C. Davey, and Edward W. Felten. The economics of Bitcoin mining, or Bitcoin\
    \ in the presence of adversaries. Proceedings of WEIS. 2013.\n\n# 重塑区块链\n\n四种不同类型区块链的出现\n\
    \n第 22 步强调了区块链的主要限制，并勾勒了克服这些限制的可能方法。本步将进一步分析区块链的两大主要技术限制。它解释了区块链主要技术限制的根源，并阐述了这些限制是如何被克服的。本步还将解释四种不同版本区块链的出现及其差异，并讨论这些版本出现所带来的后果。\n\
    \n## 隐喻\n\n我们常常试图同时实现两个或多个无法同时达成的目标，比如既快又好地完成工作，或者既快又安全地驾驶。两种或多种观点或目标之间的不相容称为冲突，解决冲突的方式要么是找到折衷方案，要么是选择其中一个选项而放弃其他所有替代方案。本步介绍了区块链的两个主要冲突，它们体现在其两大主要技术限制中，并阐述了为解决这些冲突所做的尝试如何导致了四种不同版本区块链的发明。\n"
- fmt: '# Conflicting Goals of the Blockchain


    The blockchain faces two conflicts:


    - Transparency vs. privacy

    - Security vs. speed


    ## Transparency vs. Privacy


    The blockchain clarifies ownership based on the whole history of transaction data,
    which is available to everyone. As a result, the blockchain is similar to a public
    transaction register or a public ledger. Being open and transparent is the core
    concept of the blockchain for verifying ownership. This openness is the foundation
    of solving the double-spending problem because everyone can audit everyone else’s
    transactions and hence can uncover double-spending attacks easily.


    However, this approach is in contrast to the concept of privacy. Privacy means
    keeping transaction data or details of them such as the involved accounts or the
    amount being transferred hidden from the public. Hence, the resulting conflict
    is between the transparency needed for clarifying ownership, on the one hand,
    and higher privacy requirements of its users, on the other hand.


    ## Security vs. Speed


    Without exaggeration, it can be stated that the history of transaction data is
    the heart of the blockchain. The history of transaction data is protected from
    being manipulated and forged by storing it in an immutable append-only `blockchain-data-structure`,
    which requires the solution of a hash puzzle for every block being added or rewritten.
    This not only makes it prohibitively costly to manipulate or forge the history
    of transaction data but also slows down the speed at which new transaction data
    can be added to the `blockchain-data-structure`. This is in contrast to the speed
    and scalability requirements of many applications in a commercial context. Hence,
    the resulting conflict is between securing the history of transaction data based
    on a time-consuming proof of work, on the one hand, and speed and scalability
    requirement of its users, on the other hand.


    # The Roots of the Conflicts


    The roots of the two conflicts are two fundamental operations of the blockchain:
    reading and writing transaction data. The conflict of openness vs. privacy can
    be traced back to the operation of reading the `blockchain-data-structure`, while
    the conflict of security vs. speed can be traced back to the operation of writing
    data to the `blockchain-data-structure`. Table [23-1](#A436689_1_En_23_Chapter.html#Tab1)
    summarizes the relation between the two major technical limitations, the underlying
    conflict, and the corresponding fundamental functionality of the blockchain.


    **Table 23-1.** Technical Limitations of the Blockchain and Their Reasons


    | Technical Limitation | Conflict | Fundamental Functionality |

    | --- | --- | --- |

    | Lack of privacy | Transparency vs. privacy | Reading the history of transaction
    data |

    | Lack of scalability | Security vs. speed | Writing transaction data to the data
    store |


    # Solving the Conflicts


    Conflicts can be solved either by finding a compromise that balances the competing
    goals or by enforcing one of the goals to the disadvantage of all others. The
    blockchain, as discussed so far, decided in favor of transparency and security
    to the disadvantage of privacy and speed. But there are alternative ways to solve
    these conflicts, which will be discussed in more detail in the following sections.


    ## Deciding on Transparency vs. Privacy


    Making a decision on the transparency vs. privacy conflict actually means deciding
    on whom to grant reading access. If only extreme cases of granting reading access
    are considered, there are two options: granting read access to everyone or granting
    read access only to a limited group of nodes or users. One can distinguish between
    the following types of blockchains that differ with respect to which users or
    nodes have the right to read the `blockchain-data-structure` and to create new
    transactions[¹](#A436689_1_En_23_Chapter.html#Fn1):


    - Public blockchains grant read access and the right to create new transactions
    to all users or nodes.

    - Private blockchains limit read access and the right to create new transactions
    to a preselected group of users or nodes.


    ## Deciding on Security vs. Speed


    Making a decision for the security vs. speed conflict actually means to decide
    to whom you will grant writing access. If only extreme cases of granting writing
    access are considered, there are two options: granting writing access to everyone
    but making it computationally expensive by requiring the proof of work or restricting
    write access to a preselected group of users or nodes that were identified as
    trustworthy and requiring them to provide a less-expensive version of the proof
    of work. We can distinguish between the following types of blockchains based on
    granting write access[²](#A436689_1_En_23_Chapter.html#Fn2):


    - Permissionless blockchains grant write access to everyone. Every user or node
    can verify transactions and create and add new blocks to the `blockchain-data-structure`.

    - Permissioned blockchains grant write access only to a limited group of preselected
    nodes or users that are identified as trustworthiness through an on-boarding process.
    As a result, only the group of nodes that have write access are allowed to verify
    transactions and take part in the distributed consensus procedure.


    # Four Versions of the Blockchain


    The decisions concerning reading and writing access can be made independently.
    Table [23-2](#A436689_1_En_23_Chapter.html#Tab2) presents the four versions of
    the blockchain that arise when combining the extreme cases of reading and writing
    restrictions.


    **Table 23-2.** Four Versions of the Blockchain as a Result of Combining Reading
    and Writing Restrictions


    | Writing Access | Everyone (Reading Access) | Restricted (Reading Access) |

    | --- | --- | --- |

    | Everyone | Public & Permissionless | Private & Permissionless |

    | Restricted | Public & Permissioned | Private & Permissioned |


    The blockchain as defined in Step [5](#A436689_1_En_5_Chapter.html) and discussed
    throughout all the preceding steps is a public permissionless blockchain. Any
    restriction regarding reading or writing access to the `blockchain-data-structure`
    will yield one of the alternative versions. The most secretive version of the
    blockchain is the private permissioned blockchain. This version is the one that
    is considered the most useful in a commercial context because of its higher processing
    speed and its ability to hide transaction data from the public.


    # Consequences


    Restricting reading or writing access to the history of transaction data impacts
    the following aspects of the blockchain:


    - The peer-to-peer architecture

    - The distributed nature

    - The purpose


    ## The Peer-to-Peer Architecture


    In Step [3](#A436689_1_En_3_Chapter.html) you learned about peer-to-peer systems
    and their properties. One of the major features that is often considered the constituting
    characteristic of peer-to-peer systems is that they include computers that are
    all equal concerning their rights and roles. Although individual nodes may differ
    with respect to the resources they contribute, all the nodes in the system have
    the same functional capabilities and responsibilities. However, the four versions
    of the blockchain, as introduced above, differ with respect to granting reading
    and writing access to the nodes that make up the system. If nodes differ with
    respect to their ability to read or write transaction data, they are no longer
    equal. Hence, an important characteristic of peer-to-peer systems seems to be
    violated as a result of introducing restrictions on read and write access to the
    system.'
