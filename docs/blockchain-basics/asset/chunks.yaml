  trans: "\n### 顺序哈希\n\n顺序哈希的目标是在新数据到达时增量更新哈希值。这是通过同时使用组合哈希和重复哈希来实现的。现有哈希值与新数据合并，然后传递给哈希函数以获得更新后的哈希值。如果你希望随时间维护单个哈希值，并在新数据到达时立即更新它，顺序哈希尤其有用。这种哈希方式的一个优点是，在任何给定时间点，你都有一个哈希值，其演变过程可以追溯到新数据的到达。\n\
    \n图 10-6 通过先对单词 `Hello` 进行单独哈希来说明顺序哈希的概念，这产生了缩短后的哈希值 `185F8DB3`。一旦由单词 `World!`\
    \ 表示的新数据到达，它就会与现有哈希值合并，并作为输入提供给哈希函数。哈希值 `5795A986` 是输入文本 `World! 185F8DB3` 的缩短哈希值。\n\
    \n![A436689_1_En_10_Fig6_HTML.jpg](img/A436689_1_En_10_Fig6_HTML.jpg)\n\n图 10-6.\
    \ 顺序计算哈希值\n\n### 分层哈希\n\n图 10-7 说明了分层哈希的概念。\n\n![A436689_1_En_10_Fig7_HTML.jpg](img/A436689_1_En_10_Fig7_HTML.jpg)\n\
    \n图 10-7. 分层计算哈希值\n\n将组合哈希应用于一对哈希值，会形成一个小的哈希值层级结构，其顶部只有一个值。与组合哈希类似，分层哈希的思想是为一组数据创建单个哈希值。分层哈希更高效，因为它组合的是始终固定大小的哈希值，而不是可能任意大小的原始数据。此外，分层哈希在每一步只组合两个哈希值，而组合哈希会在一次尝试中组合你提供的所有数据。\n\
    \n### 展望\n\n本步骤专门讨论了哈希函数的概念。步骤 11 将说明哈希值在实际生活中的使用方式，并重点介绍区块链如何使用它们。\n\n### 总结\n\
    \n*   哈希函数将任何类型的数据转换为固定长度的数字，无论输入数据的大小如何。\n*   存在许多不同的哈希函数，它们在生成的哈希值长度等方面有所不同。\n\
    *   密码学哈希函数是一类重要的哈希函数，可为任何类型的数据创建数字指纹。\n*   密码学哈希函数具有以下属性：\n    *   快速为任何类型的数据提供哈希值\n\
    \    *   确定性\n    *   伪随机性\n    *   单向使用性\n    *   抗碰撞性\n*   可以通过使用以下模式来对数据应用哈希函数：\n\
    \    *   重复哈希\n    *   独立哈希\n    *   组合哈希\n    *   顺序哈希\n    *   分层哈希\n\n**脚注**\n\
    \n1 Weisstein, Eric W. 哈希函数. 来自 MathWorld: [`http://mathworld.wolfram.com/HashFunction.html`](http://mathworld.wolfram.com/HashFunction.html).\n\
    \n2 Rogaway, Phillip, 和 Thomas Shrimpton. 密码学哈希函数基础：原像抗性、第二原像抗性和碰撞抗性的定义、含义与区分.\
    \ 载于 B. Roy 和 W. Meier (编), 快速软件加密. FSE 2004. 计算机科学讲义, 第 3017 卷. 国际快速软件加密研讨会.\
    \ 柏林海德堡: Springer, 2004.\n\n# 11. 现实世界中的哈希\n\n比较数据与创建计算难题的故事\n\n步骤 10 介绍了密码学哈希函数，并讨论了将哈希函数应用于数据的不同模式。步骤\
    \ 10 可能看起来像是一项枯燥的智力练习，但实际上它具有高度的实践相关性。因此，本步骤专注于哈希函数和哈希值在现实世界中的应用。它考虑了哈希函数在现实生活中的主要用例，并解释了其背后的思路。本步骤还简要说明了这些用例为何能按预期工作。最后，本步骤指出了区块链在何处使用了哈希值。\n\
    \n### 比较数据\n\n由于这是哈希值最直接的用例，因此首先考虑基于哈希值来比较数据。\n\n#### 目标\n\n目标是在不逐字节比较内容的情况下比较数据（例如，文件或交易数据），并使比较任何类型、任何大小和内容的数据变得像比较两个数字一样简单。\n\
    \n#### 思路\n\n不是通过显式地逐字节比较内容来比较数据，而是比较它们的密码学哈希值。\n\n#### 工作原理\n\n计算并比较所有待比较数据的密码学哈希值。如果所有密码学哈希值都不同，那么所有待比较的数据也不同。如果两个或多个密码学哈希值相同，那么它们对应的输入数据也是相同的。¹\n\
    \n#### 为何有效\n\n通过比较密码学哈希值来比较数据之所以有效，是因为密码学哈希函数具有抗碰撞性。\n\n### 检测数据变更\n\n基于哈希值比较数据的思路可以很容易地扩展到检测数据变更的情形。\n\
    \n#### 目标\n\n目标在于确定本应保持不变的数据（例如，文件或交易数据）在某个特定日期之后、或发送给某人之后、或存入数据库之后是否发生了更改。\n\n\
    #### 思路\n\n将过去创建的待检测数据的密码学哈希值与同一数据新创建的密码学哈希值进行比较，是识别变更的关键。如果两个哈希值相同，则说明数据在旧哈希值创建之后未发生更改。\n\
    \n#### 工作原理\n\n创建本应保持不变的数据的密码学哈希值。当需要在稍后时间点验证数据是否被更改时，再次创建该数据的密码学哈希值。然后将新创建的哈希值与过去创建的哈希值进行比较。如果两个哈希值相同，则说明数据在第一个哈希值创建之后未发生更改。否则，说明数据在此期间发生了更改。同样的思路也适用于将数据发送给某人的情况。如果发送方在发送数据前创建了数据的哈希值，接收方也创建了其收到数据的哈希值，那么发送方和接收方就可以比较这两个哈希值。如果两个哈希值相同，则说明数据在传输过程中未被篡改。\n\
    \n#### 为何有效\n\n检测数据变更实际上是一个将数据与自身在特定事件（例如时间流逝、存入或从数据库检索、通过网络发送）前后的状态进行比较的过程。检测本应不变的数据是否发生更改之所以有效，是因为密码学哈希函数具有抗碰撞性。\n\
    \n### 以变更敏感的方式引用数据\n\n比较数据和基于哈希值检测变更可以被视为哈希值的基本用例。哈希值的一个稍微高级的应用是哈希引用，下面将对此进行介绍。\n\
    \n#### 目标\n\n目标是引用存储在别处（例如，硬盘上或数据库中）的数据（例如，交易数据），并确保这些数据保持不变。\n"
- fmt: '### The Idea


    The idea is to combine the cryptographic hash value of the data being stored with
    information about the place where the data are located. If the data were changed,
    both pieces of information would no longer be consistent and hence the hash reference
    would become invalid.


    ### How It Works


    References to data are the digital equivalent to cloakroom tickets. Cloakroom
    tickets point to the physical location at which your jacket is stored in the cloakroom.
    You use the cloakroom ticket for retrieving your jacket later on. References to
    data in computers work the same way: they are pieces of data that refer to other
    data. Computer programs use references in order to remember the place where the
    data have been stored and to retrieve them later on. Hash references are a specific
    kind of reference that utilize the power of cryptographic hash values. For simplicity,
    you could think of hash references as cloakroom tickets that display hash values
    instead of ordinary numbers.


    Hash references refer to other data, and they additionally verify that the data
    being referred to were not changed since the reference was created. In the case
    where the data being referred have been changed, the reference no longer allows
    retrieval of the data. In this case, the hash reference is deemed broken or invalid.
    This is similar to having a cloakroom ticket that points to a coat hook that no
    longer carries your jacket. In this case, the cloakroom attendant can no longer
    hand over your jacket.


    The whole idea of hash reference is to protect its users from retrieving data
    that have been changed accidently due to technical errors or intentionally by
    someone else without informing you about that. Hence, hash references are used
    in all occasions where data are supposed to stay unchanged once created.


    ### A Schematic Illustration


    The blockchain heavily depends on hash references. Hence, understanding them is
    crucial for understanding the blockchain and for comprehending the following steps
    of this book. For this reason, the following three figures serve two purposes:
    First, they schematically illustrate the functioning of hash references. Second,
    they introduce a pictorial representation of hash references that is used in the
    following steps when illustrating the functioning of the blockchain-data-structure.


    Figure [11-1](#A436689_1_En_11_Chapter.html#Fig1) illustrates the functioning
    of hash references schematically by presenting a valid hash reference. The gray
    circle labeled `R1` represents a valid hash reference. The white box represents
    some data that are supposed to stay unchanged. The arrow that goes from the circle
    to the box depicts the functioning of the hash reference. The arrow points from
    the reference to the data it refers to.


    ![A436689_1_En_11_Fig1_HTML.jpg](A436689_1_En_11_Fig1_HTML.jpg)


    Figure 11-1. Schematic illustration of a valid hash reference


    Figure [11-2](#A436689_1_En_11_Chapter.html#Fig2) illustrates the symbolic representation
    of a broken or invalid hash reference.


    ![A436689_1_En_11_Fig2_HTML.jpg](A436689_1_En_11_Fig2_HTML.jpg)


    Figure 11-2. Schematic illustration of an invalid hash reference


    The black box containing a modified greeting represents data that were altered
    after the reference was created. The gray circle still represents the originally
    created hash reference. The jacked arrow that points from the circle to the altered
    box highlights that the hash reference `R1` is broken, it no longer allows access
    to retrieve the data because they have been changed in the meantime.


    Figure [11-3](#A436689_1_En_11_Chapter.html#Fig3) illustrates the situation when
    a new hash reference was created after the data were changed. This situation is
    depicted by a black box representing altered data, a black circle representing
    a newly created hash reference, and the straight arrow pointing from the circle
    to the box.


    ![A436689_1_En_11_Fig3_HTML.jpg](A436689_1_En_11_Fig3_HTML.jpg)


    Figure 11-3. Schematic illustration of a newly created hash reference after altering
    the data being referred


    ### Why It Works


    The key point of hash references is the fact that they utilize cryptographic hash
    values, which can be seen as unique fingerprints of data. Hence, it is very unlikely
    to have two different pieces of data that have an identical hash value. As a result,
    a broken hash reference is considered to be evidence that the data were altered
    after the hash reference was created.


    ## Storing Data in a Change-Sensitive Manner


    The idea of referring to data based on their hash values can be extended further.
    A natural extension of that idea is storing data in a change-sensitive manner.


    ### The Goal


    The goal is to store a large amount of data, e.g., transaction data that are supposed
    to stay unchanged. Any changes to these data are to be detected quickly and easily.


    ### The Idea


    Cloakroom tickets point to coat hooks that carry jackets. This is simple and straightforward.
    But what precludes you from putting a cloakroom ticket in the pocket of another
    jacket and storing that second jacket in the cloakroom as well? As a result, the
    latter cloakroom ticket points to a jacket that contains a cloakroom ticket, which
    in turn points to another jacket. Actually you can create long and complicated
    chains of jackets that have cloakroom tickets in their pockets, which point to
    other jackets, which also have a cloakroom ticket in their pockets, and so on
    and so forth. In a similar fashion, one can store data together with hash references
    that point to other data, which in turn store hash references that refer to further
    data, and so on and so forth. If any of the data or hash references is changed
    after their creation, all the hash references are broken. Since broken hash references
    serve as evidence that data were changed after the reference was created, the
    whole construct stores data in a change-sensitive manner.


    ### How It Works


    There are two classical patterns of using hash references in order to store data
    in a change-sensitive manner:


    - The chain

    - The tree


    #### The Chain


    A chain of linked data, also called a linked list,² is formed when each piece
    of data also contains a hash reference to another piece of data. Such a structure
    is useful for storing and linking data together that are not fully available at
    one given point in time but instead arrive step by step in an ongoing fashion.
    Figure [11-4](#A436689_1_En_11_Chapter.html#Fig4) illustrates this idea by using
    the symbols introduced above. The creation of such a chain starts with the piece
    of data labeled `Data 1` and the creation of the hash reference `R1`. Being the
    first piece of data, `Data 1` does not contain any hash reference. When new data
    arrive, they are put together with the hash reference that points to `Data 1`.
    The hash reference `R2` refers to the newly arrived data and the hash reference
    `R1`. The hash reference `R3`, which refers to `Data 3` and the hash reference
    `R2`, is created in a similar fashion.


    ![A436689_1_En_11_Fig4_HTML.jpg](A436689_1_En_11_Fig4_HTML.jpg)


    Figure 11-4. Data linked together in a chain-like fashion


    Hash reference `R3` is all you need in order to access all the data in the chain
    in the reverse order of their arrival. The reference `R3` is also called the head
    of the chain because it refers to the most currently added piece of data. It is
    important not to mix up the term "head" (that is the most currently added piece
    of data) with the term "header", which will be introduced in Step 14 when we discuss
    the blockchain-data-structure.'
