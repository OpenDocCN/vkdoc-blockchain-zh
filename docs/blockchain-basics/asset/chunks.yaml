  trans: '

    # 集中式与分布式系统的混合


    集中式系统和分布式系统在架构上是两个对立面。技术上的对立面一直激励着工程师们创建能够继承两者优势的混合系统，集中式和分布式系统也不例外。有两种典型的组合方式需要理解，因为这在学习现实世界中的区块链应用时会变得很重要。它们分别是：分布式系统中的中心化，以及中心内部的分布式系统。


    图 2-2 左侧的示意图展示了一种在分布式系统内部建立中心组件的架构。乍看之下，这些组件似乎构成了一个分布式系统。然而，所有的小圆点都与中心处较大的圆点相连。因此，这样的系统表面上看起来是分布式的，但实际上是一个集中式系统。


    ![A436689_1_En_2_Fig2_HTML.jpg](img/A436689_1_En_2_Fig2_HTML.jpg)


    图 2-2. 分布式与集中式架构的混合


    图 2-2 右侧的示意图则展示了相反的方法。乍看之下，这样的系统像是集中式系统，因为外围的所有圆点只有一个直接连接至一个巨大的中心组件。然而，这个中心组件内部却包含了一个分布式系统。外围的组件甚至可能不知道中心组件内部存在着一个分布式系统。


    这两种方法的共同之处在于，很难判断它们的真实性质。它们是分布式的还是集中式的？或许没有必要给这些架构起独特的名字。然而，指出它们的双重性质却很重要。这一点尤为重要，因为可能不容易一眼看出其中的中心化或分布式特征。稍后当我讨论区块链的商业化方式时，会再次提到这一点。


    # 识别分布式系统


    混合架构的出现使得清晰地识别分布式系统变得困难。为分布式系统制定一个普遍接受的定义超出了本书的范围。然而，对于本书的讨论而言，重要的是要了解分布式系统是什么，以及它与其他软件系统的区别。如果你不确定一个系统是否是分布式的，可以寻找是否存在一个能够使整个系统停机的单一组件（例如，数据库、名称或用户注册表、登录或注销组件，或紧急关闭按钮）。如果找到了这样的组件，那么所考察的系统就不是分布式的。


    **注**


    如果存在一个单一的组件，例如一个能关闭整个系统的单一开关按钮，那么这个系统就不是分布式的。


    # 区块链的用途


    在设计软件系统时，可以选择采用哪种架构风格，这类似于为汽车选择发动机。架构决策可以独立于应用层的功能方面进行。因此，可以在应用层创建功能相同但架构为分布式或集中式的系统。在实现系统时，架构仅仅是达成目的的手段。因此，如表
    2-1 所提议的支付系统，既可以被实现为分布式系统，也可以被实现为集中式系统。


    这两种架构概念各有其优缺点以及特定的运作方式。选择特定的架构会影响你将如何实现系统的功能性和非功能性需求。特别是，这两种架构概念在确保完整性方面有着截然不同的方法。而这就是区块链进入视野的地方。区块链是在分布式软件系统中实现完整性的工具。因此，它可以被视为实现实现层非功能性特性的工具。


    **注**


    区块链的用途是在分布式系统中实现并维护完整性。


    # 展望


    在分布式系统中实现完整性非常技术性，听起来可能有点枯燥。然而，让许多人对此感到兴奋的问题，取决于这个分布式系统将做什么，以及它取代了什么样的集中式系统。下一步将解释点对点系统如何改变了我们的世界，以及为什么区块链作为在分布式软件系统中实现完整性的工具，也有潜力改变世界。


    # 总结


    -   软件系统的架构决定了其组件如何组织以及相互之间的关系。

    -   集中式和分布式软件架构可以被视为对立面。

    -   分布式系统由多个独立的计算机组成，它们通过使用通信介质相互协作，以实现特定目标，且没有任何集中式的控制或协调元素。

    -   根据经验法则，可以说，一旦系统存在一个能导致整个系统宕机的单一组件，那么无论其架构看起来多么复杂，它都不是分布式的。

    -   区块链是分布式软件系统实现层的一部分。

    -   区块链的用途是确保分布式软件系统的一个特定非功能性方面，即：实现并维护其完整性。


    **脚注**


    Tanenbaum, Andrew S., and Maarten Van Steen. Distributed systems: principles and
    paradigms. Upper Saddle River, NJ: Pearson Prentice Hall, 2007.


    Tanenbaum, Andrew S., and Maarten Van. Steen. Distributed systems: principles
    and paradigms. Upper Saddle River, NJ: Pearson Prentice Hall, 2007.


    # 3. 认识潜力


    点对点系统如何改变世界


    这一步骤通过考虑一种特定类型的分布式系统——点对点系统，来加深我们对区块链用途的理解。因此，这一步将帮助你理解为什么技术人员和商业专业人士都对区块链如此兴奋。本章还指出了区块链预计能提供最大价值的主要应用领域。此外，本章还讨论了点对点系统在现实世界中的一些影响。


    ## 比喻


    你还能记得上一次在音像店或百货商店为自己买一张 CD 是什么时候吗？大多数人已经很长时间没有购买实体 CD 了，因为音乐行业经历了一场剧变。如今，人们从音乐门户网站下载单曲，与朋友分享`mp3`文件，或者在移动设备上使用音乐流媒体服务，而不是购买
    CD。这种变化始于一款允许人们相互分享音乐文件的软件的出现。但这款软件有什么特别之处呢？以下是其发明者之一的说法：


    > 这个系统，它最有趣的地方在于，你在与对等节点互动，你在与街对面的一个人交换信息。——肖恩·范宁，Napster 联合创始人


    范宁和他的同事发明的是一个用于分享音乐的点对点系统。早在 20 世纪 90 年代末，这款软件就为音乐行业既有的商业模式开创了一个新时代。本章将解释 Napster
    的出现、CD 销量的下滑以及音乐行业的剧变与区块链有何关联。

    '
- fmt: '# How a Peer-to-Peer System Changed a Whole Industry


    The music industry has worked for a long time in the following way: musicians
    made contracts with studios, which recorded the songs, produced and marketed the
    music records on a variety of media (e.g., vinyl, tape, or CD), which in turn
    were sold to the customers via a variety of distribution channels, including department
    stores and specialized shops. The studios actually worked as intermediaries between
    musicians and people who enjoy listening to music. Music studios could maintain
    their role as intermediaries due to their exclusive knowledge and skills in producing,
    marketing, and distributing records. However, in the first decade of the 2000s,
    the environment in which the music studios operated changed dramatically.


    The digitalization of music, the availability of recording equipment at affordable
    prices, the growing spread of privately used PCs, and the emergence of the Internet
    made music studios dispensable. The three functions of music studios—producing,
    marketing, and distributing records—could be done by the artists and the consumers
    themselves. `Napster` played a major role in the replacement of the music studios
    as intermediaries. With `Napster`, people no longer relied on the music studios
    to get the latest hits. It was possible to share individual music files with people
    all over the world without the need to buy any CDs. The peer-to-peer approach
    of `Napster`, actually being a kind of a digital sharing bazaar for mp3 files,
    gave consumers access to a wider range of music than ever before, making the music
    studios partly dispensable and causing them significant losses.[¹](#A436689_1_En_3_Chapter.html#Fn1)


    ## The Potential of Peer-to-Peer Systems


    The `Napster` case taught us that peer-to-peer systems have the potential to reshape
    whole industries based on a simple idea: replacing the middleman with peer-to-peer
    interactions. In the case of the music industry, the traditional studios and their
    marketing and distribution channels that acted as the middlemen between artists
    and consumers have been replaced by peer-to-peer file sharing systems. The major
    characteristics that made the music industry so vulnerable to being replaced by
    peer-to-peer systems are the immaterial nature of music and the low costs of copying
    and transferring data.


    The power of peer-to-peer systems is not restricted to the music industry. Each
    industry that mainly acts as a middleman between producers and customers of immaterial
    or digital goods and services is vulnerable to being replaced by a peer-to-peer
    system. This statement may sound a bit abstract, but you may discover many middlemen
    for immaterial and digital goods and services around you once you recognize the
    largest of them all: the financial industry.


    What is it that you have in your bank account or on your credit or debit card?
    Is it really money? The money you own has been turned into immaterial bits and
    bytes long ago. Only a small amount of actual money exists as physical banknotes
    and coins. The vast majority of the world’s money and assets exists as immaterial
    bits and bytes in the centralized information technology systems of the financial
    industry. Banks and many other players of the financial industry are just middlemen
    between producers and consumers of bits and bytes that make up our money and our
    wealth. The act of borrowing, lending, or transferring money from one account
    to another is just the transfer of an immaterial good operated by middlemen, also
    called intermediaries. It is amazing how many middlemen are involved in seemingly
    simple transactions (e.g., transferring money from one bank account to another
    one in a different country involves up to five middlemen, which all need their
    processing time and impose their own fees). As a result, something as simple as
    transferring an amount of money from one bank account to another in a different
    country involves a long processing time and incurs high transactions costs. In
    a peer-to-peer system, the same transfer would be much simpler and it would take
    less time and costs since it could be processed as what it is: a transfer of bits
    and bytes between two peers or nodes, respectively.


    The advantage of peer-to-peer systems over centralized systems is that direct
    interactions occur between contractual partners instead of indirect interactions
    through a middleman, hence, there is less processing time and lower costs.


    The advantages of peer-to-peer systems are not restricted to money transfer. Every
    industry that mainly acts as a middleman between producers and customers of immaterial
    or digital goods and services is vulnerable to being replaced by a peer-to-peer
    system. As digitalization continues, more and more items of everyday life and
    an increasing amount of goods and services will become immaterial and will benefit
    from the efficiencies of peer-to-peer systems. Advocates of peer-to-peer systems
    argue that almost all aspects of our life will be affected by the emergence of
    digitalization and peer-to-peer networks such as payments, money saving, loans,
    insurance, as well as issuance and validation of birth certificates, driving licenses,
    passports, identity cards, educational certificates, and patents and labor contracts.
    Most of them already exist in digital form in centralized systems run by institutions
    that are nothing other than a middleman between natural suppliers and customers.


    **Note**


    Replacing the middleman is also called **disintermediation**. It is considered
    a serious threat to many business and companies that mainly act as intermediaries
    between different groups of people, such as buyers and seller, borrowers and lenders,
    or producers and consumers.'
  raw: '## How a Peer-to-Peer System Changed a Whole Industry


    The music industry has worked for a long time in the following way: musicians
    made contracts with studios , which recorded the songs, produced and marketed
    the music records on a variety of media (e.g., vinyl, tape, or CD), which in turn
    were sold to the customers via a variety of distribution channels, including department
    stores and specialized shops. The studios actually worked as intermediaries between
    musicians and people who enjoy listening to music. Music studios could maintain
    their role as intermediaries due to their exclusive knowledge and skills in producing,
    marketing, and distributing records. However, in the first decade of the 2000s,
    the environment in which the music studios operated changed dramatically.


    The digitalization of music , the availability of recording equipment at affordable
    prices, the growing spread of privately used PCs, and the emergence of the Internet
    made music studios dispensable. The three functions of music studios—producing,
    marketing, and distributing records—could be done by the artists and the consumers
    themselves. Napster played a major role in the replacement of the music studios
    as intermediaries. With Napster, people no longer relied on the music studios
    to get the latest hits. It was possible to share individual music files with people
    all over the world without the need to buy any CDs . The peer-to-peer approach
    of Napster , actually being a kind of a digital sharing bazaar for mp3 files,
    gave consumers access to a wider range of music than ever before, making the music
    studios partly dispensable and causing them significant losses.[¹](#A436689_1_En_3_Chapter.html#Fn1)


    ## The Potential of Peer-to-Peer Systems


    The Napster case taught us that peer-to-peer systems have the potential to reshape
    whole industries based on a simple idea: replacing the middleman with peer-to-peer
    interactions. In the case of the music industry, the traditional studios and their
    marketing and distribution channels that acted as the middlemen between artists
    and consumers have been replaced by peer-to-peer file sharing systems. The major
    characteristics that made the music industry so vulnerable to being replaced by
    peer-to-peer systems are the immaterial nature of music and the low costs of copying
    and transferring data.


    The power of peer-to-peer systems is not restricted to the music industry . Each
    industry that mainly acts as a middleman between producers and customers of immaterial
    or digital goods and services is vulnerable to being replaced by a peer-to-peer
    system. This statement may sound a bit abstract, but you may discover many middlemen
    for immaterial and digital goods and services around you once you recognize the
    largest of them all: the financial industry.


    What is it that you have in your bank account or on your credit or debit card?
    Is it really money? The money you own has been turned into immaterial bits and
    bytes long ago. Only a small amount of actual money exists as physical banknotes
    and coins. The vast majority of the world’s money and assets exists as immaterial
    bits and bytes in the centralized information technology systems of the financial
    industry. Banks and many other players of the financial industry are just middlemen
    between producers and consumers of bits and bytes that make up our money and our
    wealth. The act of borrowing, lending, or transferring money from one account
    to another is just the transfer of an immaterial good operated by middlemen, also
    called intermediaries . It is amazing how many middlemen are involved in seemingly
    simple transactions (e.g., transferring money from one bank account to another
    one in a different country involves up to five middlemen, which all need their
    processing time and impose their own fees). As a result, something as simple as
    transferring an amount of money from one bank account to another in a different
    country involves a long processing time and incurs high transactions costs. In
    a peer-to-peer system, the same transfer would be much simpler and it would take
    less time and costs since it could be processed as what it is: a transfer of bits
    and bytes between two peers or nodes, respectively.


    The advantage of peer-to-peer systems over centralized systems is that direct
    interactions occur between contractual partners instead of indirect interactions
    through a middleman, hence, there is less processing time and lower costs.


    The advantages of peer-to-peer systems are not restricted to money transfer .
    Every industry that mainly acts as a middleman between producers and customers
    of immaterial or digital goods and services is vulnerable to being replaced by
    a peer-to-peer system. As digitalization continues, more and more items of everyday
    life and an increasing amount of goods and services will become immaterial and
    will benefit from the efficiencies of peer-to-peer systems. Advocates of peer-to-peer
    systems argue that almost all aspects of our life will be affected by the emergence
    of digitalization and peer-to-peer networks such as payments, money saving, loans,
    insurance, as well as issuance and validation of birth certificates, driving licenses,
    passports, identity cards, educational certificates, and patents and labor contracts.
    Most of them already exist in digital form in centralized systems run by institutions
    that are nothing other than a middleman between natural suppliers and customers.


    Note


    Replacing the middleman is also called disintermediation . It is considered a
    serious threat to many business and companies that mainly act as intermediaries
    between different groups of people, such as buyers and seller, borrowers and lenders,
    or producers and consumers.'
  trans: '

    # 点对点系统如何颠覆整个行业


    长期以来，音乐行业一直以如下方式运作：音乐人与唱片公司签约，由唱片公司录制歌曲、制作唱片，并通过多种媒介（如黑胶唱片、磁带或 CD）进行营销，随后通过包括百货商店和专业音像店在内的多种分销渠道销售给顾客。唱片公司实际上充当了音乐人与音乐爱好者之间的中介。音乐唱片公司凭借其在制作、营销和分销唱片方面的独家知识和技能，得以维持其作为中介的角色。然而，在
    21 世纪的第一个十年里，音乐唱片公司的运营环境发生了剧变。


    音乐的数字化、录播设备价格的亲民化、个人电脑的普及以及互联网的兴起，使得唱片公司变得可有可无。唱片公司制作、营销和分销唱片的三大功能可由艺术家和消费者自行完成。`Napster`（纳普斯特）在取代唱片公司作为中介的过程中扮演了关键角色。有了`Napster`，人们不再依赖唱片公司来获取最新热门歌曲。它让人们能够与世界各地的人分享单个音乐文件，而无需购买任何
    CD。`Napster`的点对点模式，实际上就像一个针对 mp3 文件的数字共享集市，让消费者接触到的音乐范围比以往任何时候都更广，这使得唱片公司在一定程度上变得多余，并给它们造成了重大损失。¹


    ## 点对点系统的潜力


    `Napster`案例告诉我们，点对点系统有潜力基于一个简单的理念重塑整个行业：用点对点互动取代中间商。就音乐行业而言，那些充当艺术家和消费者之间中介的传统唱片公司及其营销和分销渠道，已被点对点文件共享系统所取代。使得音乐行业如此容易被点对点系统取代的主要特征是音乐的*非物质*属性以及复制和传输数据的低成本。


    点对点系统的力量并不仅限于音乐行业。任何主要充当非物质或数字商品及服务生产者与消费者之间中介的行业，都容易被点对点系统取代。这种说法可能有点抽象，但一旦你认识到其中最大的一个——金融行业，你就可能会发现身边存在着许多非物质和数字商品及服务的中介。


    你银行账户或信用卡/借记卡里有什么？那真的是钱吗？你所拥有的货币早已被转化成了非物质的比特和字节。只有少量的实际货币以物理纸币和硬币的形式存在。世界上绝大部分的货币和资产，都是以非物质的比特和字节形式存在于金融行业的集中式信息技术系统中。银行和金融行业的许多其他参与者，不过是我们财富与金钱所构成的比特和字节的生产者与消费者之间的中介。借贷行为，或者将资金从一个账户转移到另一个账户，不过是中介（也称为中间人）操作的一种非物质商品的转移。令人惊讶的是，即使是很简单的交易（例如，将一个银行账户的资金转移到另一个国家的另一个银行账户，会涉及到多达五个中间人，他们都需要处理时间并收取自己的费用）也涉及如此多的中间人。因此，像将一笔钱从一个银行账户转到另一个国家银行账户这样简单的事情，处理时间很长，交易成本也很高。在一个点对点系统中，同样的转账会简单得多，耗时更少，成本更低，因为它可以按其本质那样被处理：即两个对等节点之间比特和字节的转移。


    点对点系统相对于集中式系统的优势在于，合同双方之间进行的是直接互动，而不是通过中间人的间接互动，因此处理时间更短，成本更低。


    点对点系统的优势并不仅限于资金转账。任何主要充当非物质或数字商品及服务生产者与消费者之间中介的行业，都容易被点对点系统取代。随着数字化的持续深入，日常生活中越来越多的物品以及越来越多的商品和服务将变得非物质化，并将受益于点对点系统的高效性。点对点系统的倡导者认为，我们生活的几乎各个方面都将受到数字化和点对点网络兴起的冲击，例如支付、储蓄、贷款、保险，以及出生证明、驾照、护照、身份证、教育证书、专利和劳动合同的签发与验证。其中大部分已经以数字形式存在于由各类机构管理的集中式系统中，而这些机构只不过是充当自然供应商和客户之间的中间商。


    **注**


    取代中间商的行为也被称为**去中介化**。它被视作对许多主要充当不同群体（如买卖双方、借贷双方或生产者和消费者）之间中介的企业和公司构成的严重威胁。

