  trans: "\n### 分布式特性\n\n在第 2 步中，你学习了分布式系统及其部分特性。分布式系统的一个主要特征，通常被认为是其构成性特征，即缺乏任何形式的中央控制或协调。然而，如上所述，四种不同区块链版本的出现，是基于授予预选节点或用户群组对交易数据历史的读取或写入权限，同时拒绝所有其他节点或用户的这些权利。但由谁来决策授予或拒绝系统的读写权限？由谁来制定授予或拒绝读写权限的规则？\n\
    \n如果管理读写权限分配的规则并非由纯粹分布式的系统来管理和执行，那么该系统将存在一个中心化元素，这反过来会与区块链的分布式特性相矛盾。一个假设为分布式、却利用中心化元素来管理和执行读写权限分配规则的系统架构，可以用图\
    \ 2-2 所示的示意图来描绘。这意味着要么存在隐藏的中心化元素，要么对于所有受限访问的节点来说，该系统表现为一个中心化系统，同时内部却利用着分布式系统。在这两种情况下，整个系统更像是一个由分布式和中心化元素组成的混合系统。\n\
    \n### 目的\n\n在第 4 步中，你了解到区块链要解决的核心问题是在一个纯分布式对等网络中实现并维护完整性，该网络由数量未知、可靠性和可信度也未知的对等节点组成。对读写访问施加限制不仅改变了分布式对等网络的构成特性，也改变了节点的可信度。如果允许向`blockchain-data-structure`写入数据的用户或节点在加入流程中事先通过了可信度评估，那么最终的环境可能不再由可信度未知的节点构成。因此，可以得出这样的结论：在这种环境下，区块链从不可信环境中建立信任的能力已不再必要。\n\
    \n即使在一个由已知数量、且据推测已知可靠性和可信度的节点构成的环境中，区块链也能创造价值，原因如下：首先，这类系统中的节点数量可能因技术故障或停机而变化。其次，每个分布式系统都面临着网络的对抗，这使得单个消息层面的通信变得不可靠。最后，即使是加入流程也无法百分百保证节点的可信度。此外，即使是可信的节点也可能因技术故障而产生错误结果。\n\
    \n## 重新审视区块链的目的\n\n由于对节点施加限制对区块链的主要方面产生影响，我们可能需修正对其目的的看法。对读写访问施加限制可能会与对等网络的定义、系统的分布式特性以及区块链的目的相冲突。然而，即使在最严格的私有许可型区块链中，区块链对于维护完整性也是有用的。因此，我们或许可以放宽区块链创造价值的条件。我们不必坚持认为区块链的目的是维护开放且纯粹分布式对等网络的完整性，而是可以将其目的表述为：通常而言，实现并维护分布式系统的完整性。\n\
    \n## 区块链一词在本书余下部分的使用\n\n本书余下部分将继续使用术语`blockchain`，其含义指代公共且无需许可的系统。在所有其他情况下，将明确说明所讨论的是何种受限类型的区块链。\n\
    \n## 展望\n\n本步重点介绍了克服区块链两大主要技术限制的两种方法。它解释了四种不同类型的区块链是如何根据对`blockchain-data-structure`读写访问权限的分配而产生的。至此，本书已讨论了区块链的主要思想及其基本概念。然而，我尚未讨论它如何应用于现实世界。下一步将通过考虑通用和更具体的使用案例来对此进行讨论。\n\
    \n## 总结\n\n*   区块链固有地包含以下冲突：\n    *   透明度与隐私权：一方面，需要透明度来明确所有权并防止双重支付；但另一方面，其用户需要隐私保护。\n\
    \    *   安全性与速度：一方面，通过利用计算密集型的“工作量证明”来保护交易数据历史不被篡改；但另一方面，在大多数商业场景中，速度和可扩展性是必需的。\n\
    *   透明度与隐私权的冲突源于对`blockchain-data-structure`读取访问权限的分配。\n*   安全性与速度的冲突源于对`blockchain-data-structure`写入访问权限的分配。\n\
    *   解决透明度与隐私权的冲突催生了以下版本的区块链：\n    *   公共区块链向所有用户或节点授予读取访问权限以及创建新交易的权利。\n    *\
    \   私有区块链将读取访问权限以及创建新交易的权利限制在预选的用户或节点群组内。\n*   解决安全性与速度的冲突催生了以下版本的区块链：\n    *\
    \   无需许可区块链向所有人授予写入访问权限。每个用户或节点都可以验证交易数据，并创建新区块添加到`blockchain-data-structure`中。\n\
    \    *   许可区块链仅向通过加入流程被识别为可信的、有限的预选节点或用户群组授予写入访问权限。\n*   将这些限制两两组合，催生了四种不同类型的区块链。\n\
    *   限制读取或写入访问权限会对区块链的以下属性产生影响：\n    *   对等网络架构\n    *   分布式特性\n    *   其目的\n*\
    \   `blockchain-technology-suite`即使在受限环境中也能创造价值，原因如下：\n    *   节点数量可能因技术故障或停机而变化。\n\
    \    *   每个分布式系统都面临着网络的对抗，这使得单个消息层面的通信变得不可靠。\n    *   即使是加入流程也无法百分百保证节点的可信度。\n\
    \    *   即使是可信的节点也可能因技术故障而产生错误结果。\n\n### 脚注\n\n1\n\nBitFury Group. 公共与私有区块链 第一部分：许可型区块链.\
    \ 白皮书，2015. [`http://bitfury.com/content/5-white-papers-research/public-vs-private-pt1-1.pdf`](http://bitfury.com/content/5-white-papers-research/public-vs-private-pt1-1.pdf).\n\
    \n2\n\nBitFury Group. 公共与私有区块链 第二部分：许可型区块链. 白皮书，2015. [`http://bitfury.com/content/5-white-papers-research/public-vs-private-pt2-1.pdf`](http://bitfury.com/content/5-white-papers-research/public-vs-private-pt2-1.pdf).\n"
- fmt: '# Part V

    Using the Blockchain, Summary, and Outlook


    Using the Blockchain, Summary, and Outlook


    This stage concludes this intellectual journey through the blockchain. It considers
    how the blockchain can be used in real life, what generic use cases exist, and
    how to analyze existing blockchain applications. This stage also points out areas
    of active research and further developments. By the end of this stage, you will
    have gained a well-grounded understanding of major application scenarios of the
    blockchain, its most important advances, and its possible long-term accomplishments
    and disadvantages.


    # 24. Using the Blockchain


    A tool with thousands of applications


    Steps [1](#A436689_1_En_1_Chapter.html) through [23](#A436689_1_En_23_Chapter.html)
    described what the blockchain is, what problem it solves, and how its works. However,
    the blockchain was not invented for the sake of busying ourselves with discussing
    its technological concepts. Instead, the blockchain was invented for use in the
    real world. Hence, this step explores in more detail how the blockchain can be
    used. It also describes generic application patterns of the blockchain and relates
    them to its properties. Additionally, this step sketches some specific applications
    of the blockchain and explains what details should be considered when analyzing
    a specific blockchain application.


    ## The Metaphor


    Why do people use shelves, cabinets, drawers, and boxes? These means of storage
    are widely used because they provide a way to store things and keep things tidy,
    regardless of their specific use. For example, one can use a box to store documents,
    technical spare parts, office supplies, photographs, money, DVDs, clothes, or
    wine bottles. The variety of the uses of boxes, drawers, cabinets, or shelves
    is only limited by the variety of the items that are stored in them. This learning
    step discusses the application of the blockchain by focusing on the variety of
    the things that can be stored in it and the variety of contexts in which it can
    be used. But first I will review the properties of the blockchain as a special
    kind of box for digital items.


    ## Characteristics of the Blockchain


    The blockchain is a purely distributed peer-to-peer data store with the following
    properties:


    * Immutable

    * Append-only

    * Ordered

    * Time-stamped

    * Open and transparent

    * Secure (identification, authentication, and authorization)

    * Eventually consistent


    These properties of the blockchain are independent of the specific data stored
    in it. Hence, from a simplified point of view, we can consider the blockchain
    a special kind of box for storing digital items. This will open a huge variety
    of applications for the blockchain.


    ## Generic Application Patterns


    Based on the properties of the blockchain and its characteristic as being a generic
    data store for all kinds of data, we can come up with the following generic use
    cases:


    * Proof of existence

    * Proof of nonexistence

    * Proof of time

    * Proof of order

    * Proof of identity

    * Proof of authorship

    * Proof of ownership


    ### Proof of Existence


    This use of the blockchain focuses on storing data for the sole purpose of proving
    its existence. Hence, this use utilizes neither the ordering nor the time-stamping
    capabilities of the blockchain. Concrete applications are, for example, registries
    of items that are supposed to be unique such as brand names, patents, license
    codes, and Internet or e-mail addresses.


    ### Proof of Nonexistence


    This use of the blockchain focuses on the opposite of the proof of existence.
    It provides ways to verify whether specific entries or items do not exist in the
    blockchain. Concrete applications of this could be records of complaints, fines,
    or convictions.


    ### Proof of Time


    In this case not only the sheer existence of an entry in the blockchain is important
    but also the time when the entry was added. The blockchain can serve that need
    since the blocks of the blockchain-data-structure store the time when the process
    of adding them was started. Applications that benefit from the time-stamping capabilities
    of the blockchain are those that track the occurrence of events in time such as
    delivery or notification tracking, tracking of payments, tracking of orderly opening
    and closing of public bidding procedures, and management of predictions.


    ### Proof of Order


    This pattern of usage utilizes the ordering capability of the blockchain. Applications
    that benefits from that property of the blockchain are those that track the relative
    ordering of events regardless of their absolute time, for example, tracking of
    application processes, auditing public bidding procedures, and escrow services.
    Proving that some event was the first or the last of its kind is a specific example
    of proof of order. This kind of proof can be important when resources are allocated
    in the same order in which certain claims or documents are submitted such as college
    or university applications, patent applications, or copyright claims.


    ### Proof of Identity


    Proof of identity can be considered a specific case of proof of existence because
    it proves that a certain identity already exists. The blockchain serves that use
    case since it not only stores data that can be used to identify someone or something
    but also provides basic security concepts for identification and authentication.
    Concrete applications of this use pattern are digital identity documents for people,
    animals, or goods. Governments could utilize such blockchains as part of their
    e-government strategy for managing personal documents, drivers’ licenses, or passports.


    ### Proof of Authorship


    This use pattern focuses on proving that a specific person or institution added
    certain data to the blockchain. The blockchain can serve that purpose because
    it not only stores data that can be identified by its cryptographic fingerprint
    but also offers basic security concepts such as identification, authentication,
    and authorization. Identification and authentication are necessary to identify
    authors and verify their identity. Authorization is necessary in this use case
    in order to prevent someone from adding data to the blockchain without having
    the right to do so. Applications that utilize this use pattern are, for example,
    electronic publishing, tracking of content changes in documents, content delivery,
    collaborative editing, and protecting copyrights.


    ### Proof of Ownership


    This use pattern focuses on managing and clarify ownership. It relies on all previously
    mentioned patterns such as proof of existence, proof of order, proof of identity,
    and proof of authorship together with the three basic security concepts: identification,
    authentication, and authorization. Applications that utilize this use pattern
    are, for example, systems for managing ownership of real estate, cars, company
    shares, bonds, digital money, or cryptographic currencies.'
