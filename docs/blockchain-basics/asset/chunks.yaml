  trans: "\n## 工作原理\n\n不同类型的通信确保了新计算机能够加入系统，从而促进其发展。此外，系统通过专注于建立新连接和维护现有连接的通信方式得以维系。最重要的是，系统采用了一种**八卦协议**式的通信方式，确保点对点系统中的所有成员最终都能收到所有交易数据以及待添加到`blockchain-data-structure`中的区块。\n\
    \n## 展望\n\n本节重点介绍了单个计算机如何成为分布式点对点系统的节点，以及组成该系统的计算机之间如何进行通信。具体来说，本节聚焦于不可靠网络中的消息传递方面。然而，此讨论并未考虑单个节点在收到信息后如何处理这些信息，但处理信息与接收信息同等重要。因此，下一步将讨论交易数据如何在单个节点内部进行处理。\n\
    \n## 总结\n\n*   分布式点对点系统中的计算机通过数字网络相互通信。\n*   由于互联网的普遍存在，通过互联网连接各个节点来创建分布式点对点系统具有很大的吸引力。\n\
    *   使用互联网作为通信媒介的点对点系统具有以下特征：\n    *   计算机之间通过互联网相互连接。\n    *   每台计算机由一个唯一的地址标识。\n\
    \    *   每台计算机可以在任何时间断开与系统的连接或重新连接。\n    *   每台计算机独立维护一份与其通信的对等节点列表。\n    *  \
    \ 节点之间的通信基于消息。\n    *   消息通过使用节点的唯一地址，经由互联网从一个节点发送到另一个节点。\n*   由于网络的对抗性，节点之间的通信具有以下特征：\n\
    \    *   消息不能保证送达收件人，反而可能丢失。\n    *   消息可能会重复到达。\n    *   消息到达的顺序可能与发送顺序不同。\n\
    *   区块链通过以下方式应对在不可靠网络上通信的对抗性：\n    *   消息以**八卦协议**风格发送。每个收到消息的节点会将其转发给与之通信的对等节点，而这些对等节点会以同样的方式处理该消息。\n\
    \    *   重复的交易或区块会根据其加密哈希值被识别并过滤掉。\n    *   每个节点可以对接收到的信息进行排序，因为交易数据和区块头包含时间戳。\n\
    *   组成点对点系统的计算机之间的通信服务于以下三个目的：\n    *   保持现有连接活跃\n    *   建立新连接\n    *   分发新信息\n\
    *   转发与所有权相关的信息发生在三种情况下：\n    *   以持续的方式，将新的交易数据和新区块转发给系统中所有已连接的节点。\n    *   作为对断开连接一段时间后重新连接系统的节点的更新。\n\
    \    *   作为节点加入流程的一部分，将整个最新版本的`blockchain-data-structure`副本传输给新节点，以确保它们在加入系统后成为功能完备的节点。\n\
    \nFootnotes 1\n\nTanenbaum, Andrew S., and Maarten Van Steen. Distributed systems:\
    \ principles and paradigms (2nd ed.). Upper Saddle River, NJ: Pearson Prentice\
    \ Hall, 2007; Tanenbaum, Andrew S., and David J. Wetherall. Computer networks\
    \ (5th ed.). Upper Saddle River, NJ: Prentice Hall, 2010.\n\n# 验证并添加交易\n\n用胡萝卜加大棒来管理一组计算机\n\
    \n在第 17 步中，单个计算机被转变为纯粹分布式点对点系统的节点，它们相互之间就交易数据和待添加到`blockchain-data-structure`中的新区块进行通信。本节重点介绍节点收到交易数据后会发生什么，以及如何确保只有有效的交易数据和区块才会被添加到`blockchain-data-structure`中。\n\
    \n## 隐喻\n\n让我们考虑一家提供简单服务的公司：为学校和大学批改选择题。学校和大学可以将学生的多项选择题答题卡连同正确答案发送给该公司，公司负责批改所有答题卡。不幸的是，该公司的员工缺乏做好本职工作的动力。结果，公司将所有员工转变为承包商，他们只能获得与绩效相关的报酬，该报酬受以下三条规则约束：\n\
    \n1.  所有待批改的答题卡、正确答案以及所有已批改的答题卡都通过公司的软件系统随时可供所有承包商查看。\n2.  只有第一个正确批改某张答题卡的承包商才能获得一美元作为奖励。\n\
    3.  如果某承包商发现另一承包商批改的答题卡有误，犯错的承包商必须退还报酬，而发现并纠正错误的承包商将获得该报酬。\n\n### 后果\n\n上述场景的规则会带来几个后果：\n\
    \n*   由于承包商只能获得与绩效相关的报酬，他们有着强烈的经济动机去遵守规则。\n*   根据规则 1，所有承包商都有平等的机会投入工作并赚钱。\n*\
    \   根据规则 1，所有承包商都掌握必要信息来控制和纠正同事的工作。\n*   根据规则 2，每个承包商都有动力快速工作。然而，工作质量可能会因追求速度而受损。\n\
    *   根据规则 3，每个承包商都有动力认真工作。\n*   根据规则 3，每个承包商都有动力去控制和纠正同事的工作。\n\n由于这些规则，公司的效率显著提高。但几个月后，公司收到了客户的大量投诉。工作质量急剧下降。看起来所有选择题都像是被完全随机批改的。经过一番调查，公司发现承包商们达成了默契。他们相互约定不去检查任何同事的工作结果，而是尽可能快速地批改。由于随机分配分数是完成工作的最快方式，所有承包商最终都采用了这种批改策略。\n\
    \n从这个隐喻中得出的教训是：奖励、惩罚、同伴压力和竞争的结合可以用来管理一群独立行动的个人，只要他们不集体抵制。\n\n本节解释了`blockchain-algorithm`，它不过是对这种胡萝卜加大棒方法，并结合竞争与同伴压力的巧妙实现，其运作方式与此示例中的公司类似。然而，挑战在于如何妥善处理所有细节。\n\
    \n## 目标\n\n目标是在保持交易历史数据完整性的同时，允许任何人向其中添加新的交易数据。\n\n## 挑战\n\n区块链是完全开放的。任何人，即使是最不诚实的人，都可以将计算机连接到系统，从而创建交易并将其发送给组成系统的所有其他节点。因此，无法保证通过网络发送的交易是正确的。所以，挑战在于既要保持系统对所有人开放，又要确保只有有效的交易被添加进去。\n"
- fmt: '# The Idea


    In order to ensure that only valid transactions are added to the system, all nodes
    of the system are allowed to also act as supervisors of their peers and reward
    them for adding valid and authorized transactions and for finding errors in the
    work of others. As a result, all nodes of the system have an incentive to process
    transactions correctly and to supervise and point out any mistake made by any
    of its peers.[¹](#A436689_1_En_18_Chapter.html#Fn1)


    # How It Works: The Building Blocks


    The `blockchain-algorithm` is a sequence of instructions that governs how nodes
    process new transaction data and blocks. The individual rules and procedures can
    be traced back to the following building blocks:


    *   Validation rules

    *   Reward

    *   Punishment

    *   Competition

    *   Peer control


    ## Validation Rules


    The ultimate goal of the `blockchain-algorithm` is to ensure that the `blockchain-data-structure`
    only contains valid blocks, which in turn consist of valid transaction data and
    valid block headers. The validity of these data is evaluated based on two distinct
    groups of validation rules:


    *   Validation rules for transaction data

    *   Validation rules for block headers


    ### Validation Rules for Transaction Data


    Validation rules for transaction data define which data are required for describing
    a transaction. These rules encompass formal correctness, semantic correctness,
    and authorization. Step [9](#A436689_1_En_9_Chapter.html) discussed the validation
    rules for transaction data. These rules are specific to the application goal of
    the blockchain. Hence, a blockchain for managing ownership in digital bonus points
    may have different validation rules than a blockchain that manages ownership of
    real estate.


    ### Validation Rules for Block Headers


    The validation rules for block headers focus on the formal and semantic correctness
    of the block headers. These rules are agnostic to the content of the transaction
    data; instead they are concerned with the way information is added to the `blockchain-data-structure`.
    Step [16](#A436689_1_En_16_Chapter.html) discussed the compulsory data of block
    headers and their validation rules. A central element of validating block headers
    is the verification of the proof of work or the hash puzzle respectively. Only
    blocks whose headers contain a correct solution of its individual hash puzzle
    are processed further. Every block whose header fails the verification of its
    proof of work is discarded immediately.


    ## Reward


    Creating valid blocks costs energy, time, and money because it requires solving
    the computationally expensive hash puzzle that is unique for every block. The
    hash puzzle is the integral element to make the `blockchain-data-structure` immutable.
    Hence, solving the hash puzzle is absolutely indispensible and so are the entailed
    costs. The only way to convince peers to carry the burden of solving the hash
    puzzle is to offer them a reward as compensation for their work. Hence, the `blockchain-algorithm`
    defines how nodes that submit valid blocks are rewarded. From a more abstract
    point of view, one can state that the reward is the compensation for all burdens
    related to achieve and maintain the integrity of the whole system.


    ## Punishment


    Reward is only one instrument to provide peers an incentive to validate transaction
    data and to create valid blocks. The blockchain also needs a way to punish peers
    for counteracting the integrity of the system. Typical measures of punishment
    are reclaiming the reward for blocks that were accepted in the past but were identified
    as invalid or useless later on. Another form of punishment is the absence of reward.
    Letting nodes do the proof of work but not rewarding them because of identifying
    the block as duplicate, being too old, or being useless is a punishment in its
    own right. This is true since the creation of a valid block requires the solution
    of a hash puzzle, which in turn incurs costs. Not getting rewarded for creating
    a block implies that the costs for creating it cannot be covered. Hence, not realizing
    a reward is a form of punishment too.


    ## Competition


    Rewarding nodes for submitting valid blocks is a core concept of the `blockchain-algorithm`,
    but handing out rewards costs resources. Hence, it is important to prevent wasting
    resources by giving rewards to nodes that do not contribute significantly to the
    maintenance of the system. The best way to achieve a high quality of work while
    reducing costs is to establish a competition for rewards based on a well-defined
    criterion. The `blockchain-algorithm` holds a continuous competition for rewards
    based on two criteria. The competition is actually a combination of the following
    competitions that are held sequentially:


    *   Speed competition

    *   Quality competition


    Only the node that wins both competitions receives the reward for submitting a
    new block. The trick of the competition is that the losers of the speed competition
    are the referees in the quality competition, and they validate the block that
    the winner of the speed competition submits. This ensures a strict examination
    of the submitted block.


    ### Speed Competition


    The speed competition among the nodes is based on the hash puzzle. The central
    element of creating a valid block is creating the proof of work, which means solving
    the unique hash puzzle of the new block. Based on the nature of cryptographic
    hash functions, solving the hash puzzle takes an unknown period of time. There
    is no way to solve a hash puzzle in advance because the puzzle depends on the
    content of the block itself. As a result, all nodes take part in a competition
    for solving the hash puzzle of a new block. Once a node submits a new block, the
    speed competition is over. The first node that submits a new block with a valid
    solution of its hash puzzle is the winner of the speed competition and becomes
    the only candidate in the quality competition.


    ### Quality Competition


    The quality competition focuses on the correctness of the submitted block. Once
    a node submits a new block, it is sent to all nodes of the system. By receiving
    a new block, each node has to act as a referee in the quality competition, which
    means validating the new block based on the validation rules for transaction data
    and block headers. If the block is found valid, the node that submitted the new
    block receives the reward and a new speed competition opens with transaction data
    that were left over or have arrived in the meantime. If the block is found to
    be invalid, it is thrown away and the speed competition reopens with all the transactions
    that were already at stake.


    The quality competition has an interesting aspect of peer control. By receiving
    a new block, each node realizes that it has already lost the speed competition
    and that it has to work as a referee in the quality competition. It goes without
    saying that these referees are the most meticulous and strict referees one can
    imagine because they have already lost the speed competition and hence have nothing
    more to lose. Actually, all nodes know that they can get back in the game for
    the reward if they can prove that the submitted block is invalid. In this case,
    the speed competition reopens and they have the chance to finish their own block,
    whose completion was interrupted, and to win the race themselves. As a result,
    the quality competition or the examination of the submitted block, respectively,
    will be done at a very high level of accuracy.'
