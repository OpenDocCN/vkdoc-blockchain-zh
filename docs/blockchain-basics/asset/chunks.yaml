- fmt: "### Storage Logic\nThe processing of valid transactions results in them being\
    \ added to the whole history of transaction data, which means adding them to a\
    \ data store that maintains the whole history of transaction data. The integrity\
    \ of the whole system and its ability to fulfill its purpose of clarifying and\
    \ transferring ownership relies on the integrity of this data store. Hence, the\
    \ storage logic is concerned with maintaining the whole history of transaction\
    \ data and protecting them from being manipulated, forged, or counterfeited by\
    \ pursuing the idea of making changes to data prohibitive expensive. As illustrated\
    \ by Figure [21-4](#A436689_1_En_21_Chapter.html#Fig4), the storage logic achieves\
    \ this by maintaining an immutable append-only data store that is based on the\
    \ proof of work and the `blockchain-data-structure`. Its functioning can be traced\
    \ back to hash puzzles, hash references, and change-sensitive data structures,\
    \ which in turn can be traced back to the basic concept of cryptographic hash\
    \ values. Figure [21-4](#A436689_1_En_21_Chapter.html#Fig4) depicts the dependence\
    \ of the storage logic by layering derived concepts on top of boxes that represent\
    \ more basic concepts.\n\n![A436689_1_En_21_Fig4_HTML.jpg](A436689_1_En_21_Fig4_HTML.jpg)\n\
    \nFigure 21-4. Storage logic and its underlying concepts\n\n### Peer-to-Peer Architecture\n\
    The architecture determines how the components or nodes of the system are related\
    \ and connected with one another. As illustrated in Figure [21-5](#A436689_1_En_21_Chapter.html#Fig5),\
    \ the blockchain utilizes a purely distributed peer-to-peer system that consists\
    \ of independent peers called nodes. These nodes are connected with one another\
    \ via a network that serves as a medium for communication. Each of the peers maintains\
    \ its own copy of the `blockchain-data-structure` containing the whole history\
    \ of transaction data. The peers communicate with one another by utilizing a gossip-style\
    \ message-passing protocol that ensures that eventually each peer will receive\
    \ all of the information.\n\n![A436689_1_En_21_Fig5_HTML.jpg](A436689_1_En_21_Fig5_HTML.jpg)\n\
    \nFigure 21-5. Architecture and its underlying concepts\n\n### Consensus Logic\n\
    Since all the nodes of the distributed system maintain their history of transaction\
    \ data independently, their content can differ due to delays or other adversities\
    \ of passing messages through a network. As a result, the data store that was\
    \ meant to form a straight line of linked data blocks actually forms a three-shaped\
    \ data structure where each branch represents a conflicting version of the transaction\
    \ history. The consensus logic as depicted in Figure [21-6](#A436689_1_En_21_Chapter.html#Fig6)\
    \ makes all nodes of the system eventually consistent by making them choose the\
    \ identical version of the transaction history that unites the most collective\
    \ effort.\n\n![A436689_1_En_21_Fig6_HTML.jpg](A436689_1_En_21_Fig6_HTML.jpg)\n\
    \nFigure 21-6. Consensus logic and its underlying concepts\n\n## Gaining Abstraction\n\
    Abstraction is gained by identifying and distinguishing the components of the\
    \ blockchain that are specific to the goal of managing ownership from those that\
    \ are agnostic to the specific application goal. This is consistent with our understanding\
    \ of the `blockchain-technology-suite`, as discussed in Step [5](#A436689_1_En_5_Chapter.html).\
    \ Evidently, the ownership logic and transaction data are components that are\
    \ specific to the application, since they determine how ownership is described\
    \ with transaction data and how ownership is clarified and transferred. On the\
    \ other hand, transaction security and the transaction procession logic are less\
    \ specific to the application goal. The former utilizes the generic concepts of\
    \ identification, authentication, authorization, and digital signatures that can\
    \ be used in any other application as well. As shown in Figure [21-3](#A436689_1_En_21_Chapter.html#Fig3),\
    \ the latter is a huge data processing apparatus whose majority of components\
    \ are agnostic to the application goal. The only component of the transaction\
    \ processing logic that is tightly coupled with the application goal is the validation\
    \ of transaction data. All other components such as competition, peer control,\
    \ reward, punishment, and the validation of block headers are agnostic to the\
    \ specific data being processed. Figure [21-7](#A436689_1_En_21_Chapter.html#Fig7)\
    \ illustrates the result of distinguishing application-specific components of\
    \ a blockchain from those that are agnostic to the specific application goal,\
    \ which in turn form the `blockchain-technology-suite`.\n\n![A436689_1_En_21_Fig7_HTML.jpg](A436689_1_En_21_Fig7_HTML.jpg)\n\
    \nFigure 21-7. The `blockchain-technology-suite` within the blockchain\n\n## Outlook\n\
    This step focused on bringing all of the pieces of the preceding steps together\
    \ in order to gain an overview of the blockchain. The openness and the absence\
    \ of any form of central control or coordination are the foundation of the system\
    \ as they allow its nodes to act as independent witnesses for clarifying ownership-related\
    \ matters. However, these characteristics may also cause unwanted consequences.\
    \ What these unwanted consequences are and how they may limit the use of the blockchain\
    \ will be discussed in the next step.\n\n## Summary\n* The blockchain is a purely\
    \ distributed peer-to-peer system that addresses the following aspects of managing\
    \ ownership:\n    * Describing ownership: History of Transaction Data\n    * Protecting\
    \ ownership: Digital Signature\n    * Storing transaction data: `Blockchain-Data-Structure`\n\
    \    * Preparing ledgers for being distributed: Immutability\n    * Distributing\
    \ ledgers: Gossip-Style Information Forwarding Through a Network\n    * Processing\
    \ new transactions: `Blockchain-Algorithm`\n    * Deciding which ledger represents\
    \ the truth: Distributed Consensus\n* Analyzing the blockchain involves the following\
    \ aspects:\n    * The application goal\n    * Its properties\n    * Its internal\
    \ functioning\n* The blockchain has two application goals:\n    * Clarifying ownership\n\
    \    * Transferring ownership\n* The blockchain fulfills its application goals\
    \ while exhibiting the following qualities:\n    * Highly available\n    * Censorship\
    \ proof\n    * Reliable\n    * Open\n    * Pseudoanonymous\n    * Secure\n   \
    \ * Resilient\n    * Eventually consistent\n    * Keeping integrity\n* Internally\
    \ the blockchain consists of components that are either specific or agnostic to\
    \ the application goal of managing ownership.\n* The application-specific components\
    \ of the blockchain are:\n    * Ownership logic\n    * Transaction data\n    *\
    \ Transaction processing logic\n    * Transaction security\n* The application-agnostic\
    \ components are:\n    * The `blockchain-technology-suite`\n    * The purely distributed\
    \ peer-to-peer architecture\n* The `blockchain-technology-suite` consists of:\n\
    \    * Storage logic\n    * Consensus logic\n    * Data processing logic\n   \
    \ * Asymmetric cryptography\n\n# Part IV: Limitations and Their Solutions\n##\
    \ Limitations and How to Overcome Them\nThis learning stage focuses on the major\
    \ limitations of the blockchain, the reasons they occur, and the possible ways\
    \ to overcome them. By the end of this stage, you will understand why the original\
    \ idea of the blockchain that was explained in the previous steps may not be suitable\
    \ for large-scale commercial applications and what changes have been suggested\
    \ to overcome these limitations as well as their consequences. Finally, this stage\
    \ will familiarize you with the terminology used to refer to the major variations\
    \ of the blockchain."
