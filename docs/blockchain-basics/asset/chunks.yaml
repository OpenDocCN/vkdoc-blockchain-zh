- fmt: "### Peer Control\n\nEven the best rules are useless if no one follows them,\
    \ observes that they were followed, and enforces their fulfillment. Unfortunately,\
    \ purely distributed peer-to-peer systems neither have nor would accept a central\
    \ point of control or coordination that could supervise the adherence to the rules\
    \ and enforce their implementation. Hence, the blockchain-algorithm makes all\
    \ nodes of the system the supervisors of all other nodes. The nodes of the system\
    \ are workers and supervisors at the same time because they verify transactions\
    \ and create new blocks while receiving, reviewing, and validating the blocks\
    \ created by other nodes as well. The work of each node contributes to the creation\
    \ of new valid blocks as well as to the detection, refusal, or removal of invalid\
    \ transaction data or invalid blocks.\n\n## How It Works: The Skeleton\n\nThe\
    \ rules of the competition establish a simple two-step rhythm that governs the\
    \ work of every node in the network. At any given point in time, all nodes of\
    \ the system are in either of the two phases:\n\n1. Evaluating a new block that\
    \ was created and submitted by one of the peers  \n2. Trying hard to be the next\
    \ node that creates a new block that in turn has to be evaluated by all others\
    \  \n\nOne of the most important results of the blockchain-algorithm is that it\
    \ not only ensures validation of transaction data and blocks but also ensures\
    \ all nodes have an identical working rhythm. This identical working rhythm is\
    \ the core concept to ensure that all blocks maintain an identical history of\
    \ transaction data. However, the working rhythm is not imposed on the nodes by\
    \ a central clock because that would be a contradiction to the purely distributed\
    \ nature of the system. What makes the rhythm tick is the arrival of messages\
    \ at the individual nodes. As soon as a node receives a message that contains\
    \ a new block, it switches to the evaluation phase; and as soon as the evaluation\
    \ phase finishes, the node switches back to verifying new transaction data and\
    \ creating a new block itself.\n\n## How It Works: The Details\n\nThe procedure\
    \ that governs how nodes deal with new transaction data and blocks they receive\
    \ from their peers consists of the following rules (the rules printed in bold\
    \ are the ones that establish the two-step rhythm):\n\n1. New transaction data\
    \ as well as new blocks are forwarded to all nodes in a gossip fashion.  \n2.\
    \ Each node collects new transaction data in an inbox and selects them for processing.\
    \  \n3. Each node processes new blocks immediately with highest priority.  \n\
    4. Each node processes new transaction data by validating them for authorization\
    \ and formal and semantic correctness.  \n5. Each node collects only valid transaction\
    \ data into a Merkle tree and starts creating a new block by solving its hash\
    \ puzzle.  \n6. As soon as a node finishes the hash puzzle, it sends the newly\
    \ created block to all other nodes.  \n7. Each node processes new blocks by verifying\
    \ the solution of its hash puzzle and by verifying all its containing transaction\
    \ data for formal correctness, semantic correctness, and authorization.  \n8.\
    \ Each node adds valid blocks to its own copy of the blockchain-data-structure.\
    \  \n9. If a newly arrived block has been identified as invalid, it will be discarded\
    \ and the nodes continue with processing transaction data or with finishing the\
    \ hash puzzle of a new block.  \n10. If a newly arrived block has been identified\
    \ as valid, the node removes those transactions that are contained in the new\
    \ block from its own inbox and starts with processing transaction data and the\
    \ creation of a new block.  \n11. If a block that was added to the blockchain-data-structure\
    \ is identified as invalid or useless later on, that block as well as all its\
    \ subsequent blocks will be removed from the blockchain-data-structure and their\
    \ transactions will be added to the inbox to be processed again.  \n12. The node\
    \ whose block was accepted will receive the fees for all transactions contained\
    \ in the block as reward.  \n13. If a block is removed from the blockchain-data-structure,\
    \ then the reward for adding it is withdrawn from the node that initially received\
    \ it.\n\n## Why It Works\n\nThe reasons the preceding rules work are:\n\n- Due\
    \ to rule 1, all nodes receive all information needed to validate and add transaction\
    \ data.\n- Due to rule 2, nodes process new transaction data they receive.\n-\
    \ Due to rule 3, the blocks created by other nodes are processed immediately on\
    \ arrival at the nodes inbox.\n- Due to rule 4, only valid transaction data are\
    \ added to the blockchain-data-structure.\n- Due to rule 5, all nodes take part\
    \ in a race for solving the hash puzzle. Due to the nature of the hash puzzle\
    \ it is unpredictable which node will solve it first.\n- Due to rule 6, all nodes\
    \ are informed when a node solves the hash puzzle of a new block.\n- Due to rules\
    \ 6 and 3, all nodes receive the newly created block and recognize the winner\
    \ of the race for solving the hash puzzle.\n- Due to rule 7, all nodes of the\
    \ system review and verify newly created blocks and ensure that only correct blocks\
    \ are accepted.\n- Due to rule 8, all nodes add new blocks to their own copy of\
    \ the blockchain-data-structure and hence grow the transaction history.\n- Due\
    \ to rule 9, the collectively maintained transaction history is kept free of invalid\
    \ transactions and hence maintains integrity.\n- Due to rule 10, no transaction\
    \ data will be added twice.\n- Due to rule 11, no valid transaction will get lost\
    \ even if previously processed blocks are reprocessed.\n- Due to rule 11, the\
    \ system is able to perform ex post validity checks on the transaction history\
    \ and correct it retrospectively.\n- Due to rule 12, nodes have an incentive to\
    \ process transactions and to create new blocks quickly.\n- Due to rule 12, all\
    \ nodes have an incentive to inform all other nodes about a new block because\
    \ earning a reward depends on having transactions examined and accepted by all\
    \ other nodes.\n- Due to rule 13, nodes have an incentive to work correctly, to\
    \ avoid accepting any invalid transaction data, or producing invalid blocks.\n\
    - Due to rule 13, nodes have an incentive to review and revalidate blocks and\
    \ transactions in a retrospective way.\n\n## Dealing with Dishonest Behavior\n\
    \nThe blockchain aims to create integrity and trust in a completely open peer-to-peer\
    \ system that is made up of an unknown number of nodes with unknown reliability\
    \ and trustworthiness. The most prominent kinds of dishonest behavior in peer-to-peer\
    \ systems that manage ownership are:\n\n- Submitting transactions by pretending\
    \ to be someone else\n- Accepting invalid transaction data or blocks\n- Overwhelming\
    \ a node with many transaction data with the goal to make it crash\n- Refusing\
    \ to process certain transaction data\n- Refusing to forward information\n\nAll\
    \ of these cases of dishonest behavior are already covered by:\n\n- The security\
    \ concept of the transactions (identification, authentication, and authorization\
    \ via asymmetric cryptography and digital signatures) that restricts access to\
    \ an account to the owner of the corresponding private key\n- The gossip communication\
    \ model that ensures that every node eventually receives all information\n- The\
    \ architecture of the system that ensures that the whole system stays alive even\
    \ if some individual nodes crash or stop processing data\n- The blockchain-algorithm\n\
    \nThe most important weapon of the blockchain against dishonest nodes is the power\
    \ of the honest majority and the effects of reward and punishment. Even if some\
    \ nodes send forged transactions or accept invalid transaction data or invalid\
    \ blocks, the majority of honest nodes and their striving for reward will outweigh\
    \ the attempts of the dishonest to counteract the integrity of the system. Clearly,\
    \ this approach depends on the assumption that there really is a majority of honest\
    \ nodes."
  raw: '### Peer Control


    Even the best rules are useless if no one follows them, observes that they were
    followed, and enforces their fulfillment. Unfortunately, purely distributed peer-to-peer
    systems neither have nor would accept a central point of control or coordination
    that could supervise the adherence to the rules and enforce their implementation.
    Hence, the blockchain-algorithm makes all nodes of the system the supervisors
    of all other nodes. The nodes of the system are workers and supervisors at the
    same time because they verify transactions and create new blocks while receiving,
    reviewing, and validating the blocks created by other nodes as well. The work
    of each node contributes to the creation of new valid blocks as well as to the
    detection, refusal, or removal of invalid transaction data or invalid blocks.


    ## How It Works: The Skeleton


    The rules of the competition establish a simple two-step rhythm that governs the
    work of every node in the network. At any given point in time, all nodes of the
    system are in either of the two phases:


    1.  Evaluating a new block that was created and submitted by one of the peers
     

    2.  Trying hard to be the next node that creates a new block that in turn has
    to be evaluated by all others  


    One of the most important results of the blockchain-algorithm is that it not only
    ensures validation of transaction data and blocks but also ensures all nodes have
    an identical working rhythm . This identical working rhythm is the core concept
    to ensure that all blocks maintain an identical history of transaction data. However,
    the working rhythm is not imposed on the nodes by a central clock because that
    would be a contradiction to the purely distributed nature of the system. What
    makes the rhythm tick is the arrival of messages at the individual nodes. As soon
    as a node receives a message that contains a new block, it switches to the evaluation
    phase; and as soon as the evaluation phase finishes, the node switches back to
    verifying new transaction data and creating a new block itself.


    ## How It Works: The Details


    The procedure that governs how nodes deal with new transaction data and blocks
    they receive from their peers consists of the following rules (the rules printed
    in bold are the one that establish the two-step rhythm):


    1.  New transaction data as well as new blocks are forwarded to all nodes in a
    gossip fashion.  

    2.  Each node collects new transaction data in an inbox and selects them for processing.
     

    3.  Each node processes new blocks immediately with highest priority.  

    4.  Each node processes new transaction data by validating them for authorization
    and formal and semantic correctness.  

    5.  Each node collects only valid transaction data into a Merkle tree and starts
    creating a new block by solving its hash puzzle.  

    6.  As soon as a node finishes the hash puzzle, it sends the newly created block
    to all other nodes.  

    7.  Each node processes new blocks by verifying the solution of its hash puzzle
    and by verifying all its containing transaction data for formal correctness, semantic
    correctness, and authorization.  

    8.  Each node adds valid blocks to its own copy of the blockchain-data-structure.
     

    9.  If a newly arrived block has been identified as invalid, it will be discarded
    and the nodes continue with processing transaction data or with finishing the
    hash puzzle of a new block.  

    10.  If a newly arrived block has been identified as valid, the node removes those
    transactions that are contained in the new block from its own inbox and starts
    with processing transaction data and the creation of a new block.  

    11.  If a block that was added to the blockchain-data-structure is identified
    as invalid or useless later on, that block as well as all its subsequent blocks
    will be removed[²](#A436689_1_En_18_Chapter.html#Fn2) from the blockchain-data-structure
    and their transactions will be added to the inbox to be processed again.  

    12.  The node whose block was accepted will receive the fees for all transactions
    contained in the block as reward.  

    13.  If a block is removed from the blockchain-data-structure, then the reward
    for adding it is withdrawn from the node that initially received it.


    ## Why It Works


    The reasons the preceding rules work are:


    *   Due to rule 1, all nodes receive all information needed to validate and add
    transaction data.

    *   Due to rule 2, nodes process new transaction data they receive.

    *   Due to rule 3, the blocks created by other nodes are processed immediately
    on arrival at the nodes inbox.

    *   Due to rule 4, only valid transaction data are added to the blockchain-data-structure.

    *   Due to rule 5, all nodes take part in a race for solving the hash puzzle.
    Due to the nature of the hash puzzle it is unpredictable which node will solve
    it first.

    *   Due to rule 6, all nodes are informed when a node solves the hash puzzle of
    a new block.

    *   Due to rules 6 and 3, all nodes receive the newly created block and recognize
    the winner of the race for solving the hash puzzle.

    *   Due to rule 7, all nodes of the system review and verify newly created blocks
    and ensure that only correct blocks are accepted.

    *   Due to rule 8, all nodes add new blocks to their own copy of the blockchain-data-structure
    and hence grow the transaction history.

    *   Due to rule 9, the collectively maintained transaction history is kept free
    of invalid transactions and hence maintains integrity.

    *   Due to rule 10, no transaction data will be added twice.

    *   Due to rule 11, no valid transaction will get lost even if previously processed
    blocks are reprocessed.

    *   Due to rule 11, the system is able to perform ex post validity checks on the
    transaction history and correct it retrospectively.

    *   Due to rule 12, nodes have an incentive to process transactions and to create
    new blocks quickly.

    *   Due to rule 12, all nodes have an incentive to inform all other nodes about
    a new block because earning a reward depends on having transactions examined and
    accepted by all other nodes.

    *   Due to rule 13, nodes have an incentive to work correctly, to avoid accepting
    any invalid transaction data, or producing invalid blocks.

    *   Due to rule 13, nodes have an incentive to review and revalidate blocks and
    transactions in a retrospective way.


    ## Dealing with Dishonest Behavior


    The blockchain aims to create integrity and trust in a completely open peer-to-peer
    system that is made up of an unknown number of nodes with unknown reliability
    and trustworthiness. The most prominent kinds of dishonest behavior in peer-to-peer
    systems that manage ownership are:


    *   Submitting transactions by pretending to be someone else

    *   Accepting invalid transaction data or blocks

    *   Overwhelming a node with many transaction data with the goal to make it crash

    *   Refusing to process certain transaction data

    *   Refusing to forward information


    All of these cases of dishonest behavior are already covered by:


    *   The security concept of the transactions (identification, authentication,
    and authorization via asymmetric cryptography and digital signatures) that restricts
    access to an account to the owner of the corresponding private key

    *   The gossip communication model that ensures that every node eventually receives
    all information

    *   The architecture of the system that ensures that the whole system stays alive
    even if some individual nodes crash or stop processing data

    *   The blockchain-algorithm


    The most important weapon of the blockchain against dishonest nodes is the power
    of the honest majority and the effects of reward and punishment. Even if some
    nodes send forged transactions or accept invalid transaction data or invalid blocks,
    the majority of honest nodes and their striving for reward will outweigh the attempts
    of the dishonest to counteract the integrity of the system . Clearly, this approach
    depends on the assumption that there really is a majority of honest nodes.'
  trans: '

    ### 节点相互监督


    即使规则再完善，如果无人遵守、无人监督执行、无人强制实施，也毫无用处。不幸的是，纯粹分布式的点对点系统既没有，也不会接受一个能够监督规则遵守情况并强制执行的中央控制或协调点。因此，区块链算法让系统中的所有节点都成为其他节点的监督者。系统中的节点同时扮演着工作者和监督者的角色，因为它们既要验证交易、创建新区块，同时也要接收、审查并验证其他节点创建的区块。每个节点的工作既有助于创建新的有效区块，也有助于发现、拒绝或移除无效的交易数据或无效区块。


    ## 工作原理：骨架


    竞赛规则建立了一个简单的两步节奏，支配着网络中每个节点的工作。在任何给定的时间点，系统中的所有节点都处于以下两个阶段之一：


    1.  评估某个对等节点创建并提交的新区块

    2.  努力成为下一个创建新区块的节点，而该新区块又必须经过所有其他节点的评估


    区块链算法最重要的成果之一是，它不仅确保了对交易数据和区块的验证，还确保了所有节点拥有相同的工作节奏。这种相同的工作节奏是确保所有区块维护相同交易数据历史记录的核心概念。然而，工作节奏并非由中央时钟强加给节点，因为那将与系统纯粹的分布式特性相矛盾。推动节奏运转的是到达各个节点的消息。一旦节点收到包含新区块的消息，它就会切换到评估阶段；一旦评估阶段结束，节点就会切换回来，继续验证新的交易数据并自行创建新区块。


    ## 工作原理：细节


    管理节点如何处理从对等节点接收的新交易数据和区块的程序包含以下规则（**加粗**的规则是建立两步节奏的规则）：


    1.  新交易数据以及新区块以八卦协议的方式转发给所有节点。

    2.  每个节点将新交易数据收集到收件箱中，并选择它们进行处理。

    3.  每个节点立即以最高优先级处理新区块。

    4.  每个节点通过验证新交易数据的授权以及形式和语义正确性来处理它们。

    5.  每个节点仅将有效的交易数据收集到一个默克尔树中，并通过求解其哈希难题开始创建新区块。

    6.  一旦节点完成哈希难题，它就将新创建的区块发送给所有其他节点。

    7.  每个节点通过验证新区块哈希难题的解，并验证其包含的所有交易数据的格式正确性、语义正确性和授权来处理新区块。

    8.  每个节点将有效区块添加到其自身的区块链数据结构副本中。

    9.  如果新到达的区块被识别为无效，它将被丢弃，节点继续处理交易数据或完成新区块的哈希难题。

    10. 如果新到达的区块被识别为有效，节点将从其自身的收件箱中移除该新区块中包含的那些交易，并开始处理交易数据和创建新区块。

    11. 如果后来某个已添加到区块链数据结构的区块被识别为无效或无用时，该区块及其所有后续区块都将从区块链数据结构中移除，其交易将被添加到收件箱中以便重新处理。

    12. 其区块被接受的节点将获得该区块中包含的所有交易的费用作为奖励。

    13. 如果某个区块从区块链数据结构中移除，那么最初获得该区块奖励的节点将被收回该奖励。


    ## 为何有效


    上述规则之所以有效，原因在于：


    -   由于规则 1，所有节点都能收到验证和添加交易数据所需的所有信息。

    -   由于规则 2，节点会处理它们收到的新交易数据。

    -   由于规则 3，其他节点创建的区块到达节点收件箱后会立即得到处理。

    -   由于规则 4，只有有效的交易数据才会被添加到区块链数据结构中。

    -   由于规则 5，所有节点都参与了解哈希难题的竞赛。由于哈希难题的性质，无法预测哪个节点会首先解出。

    -   由于规则 6，当某个节点解出新区块的哈希难题时，所有节点都会得到通知。

    -   由于规则 6 和规则 3，所有节点都会收到新创建的区块，并识别出解哈希难题竞赛的获胜者。

    -   由于规则 7，系统中的所有节点都会审查和验证新创建的区块，确保只有正确的区块被接受。

    -   由于规则 8，所有节点都会将新区块添加到它们自己的区块链数据结构副本中，从而增长交易历史记录。

    -   由于规则 9，共同维护的交易历史记录保持无无效交易，从而维护了完整性。

    -   由于规则 10，没有交易数据会被重复添加。

    -   由于规则 11，即使之前处理过的区块被重新处理，也不会有有效交易丢失。

    -   由于规则 11，系统能够对交易历史记录进行事后有效性检查并进行追溯修正。

    -   由于规则 12，节点有动力快速处理交易并创建新区块。

    -   由于规则 12，所有节点都有动力将新区块告知所有其他节点，因为获得奖励取决于交易被所有其他节点审查和接受。

    -   由于规则 13，节点有动力正确工作，避免接受任何无效交易数据或产生无效区块。

    -   由于规则 13，节点有动力以追溯的方式审查和重新验证区块和交易。


    ## 应对不当行为


    区块链旨在完全开放、由数量未知且可靠性与可信度未知的节点组成的点对点系统中建立完整性和信任。在管理所有权的点对点系统中，最常见的不当行为包括：


    -   通过冒充他人来提交交易

    -   接受无效的交易数据或区块

    -   用大量交易数据淹没某个节点，试图使其崩溃

    -   拒绝处理某些交易数据

    -   拒绝转发信息


    所有这些不当行为的情况都已通过以下方式得到涵盖：


    -   交易的安全概念（通过非对称密码学和数字签名实现的身份识别、认证和授权），它将账户的访问权限限制在相应私钥持有者手中

    -   八卦通信模型，确保每个节点最终都能收到所有信息

    -   系统的架构，确保即使某些个别节点崩溃或停止处理数据，整个系统也能保持存活

    -   区块链算法


    区块链对抗不诚实节点最重要的武器是诚实多数的力量以及奖惩效应。即使某些节点发送伪造交易或接受无效交易数据或无效区块，诚实的多数节点及其对奖励的追求将压倒不诚实者试图破坏系统完整性的行为。显然，这种方法依赖于一个假设，即确实存在诚实的多数节点。'
- fmt: "# Outlook\n\nThis step explained how the blockchain processes transaction\
    \ data and adds them to the `blockchain-data-structure` and thereby includes them\
    \ in the official history of transaction data. The instructions discussed in this\
    \ step are supposed to ensure that all nodes in the system maintain identical\
    \ versions of the `blockchain-data-structure` and hence maintain the identical\
    \ history of transaction data. However, sometimes nodes maintain different histories,\
    \ and this means they do not agree on one identical history of transaction data.\
    \ Resolving these conflicts is another task of the `blockchain-algorithm`, which\
    \ will be considered in the next step.\n\n# Summary\n\n*   The `blockchain-algorithm`\
    \ is a series of rules and instructions that governs the way in which transaction\
    \ data are processed and added to the system.\n*   The challenge solved by the\
    \ `blockchain-algorithm` is to keep the system open to everyone while ensuring\
    \ that only valid and authorized transactions are added.\n*   The `blockchain-algorithm`\
    \ utilizes the carrot-and-stick approach, combined with competition and peer control.\n\
    *   The major idea of the `blockchain-algorithm` is to allow all nodes of the\
    \ system to act as supervisors of their peers and reward them for adding valid\
    \ and authorized transactions and for finding errors in the work of others.\n\
    *   Due to the rules of the `blockchain-algorithm`, all nodes of the system have\
    \ an incentive to process transactions correctly and to supervise and point out\
    \ any mistakes made by the other peers.\n*   The `blockchain-algorithm` is based\
    \ on the following concepts:\n    *   Validation rules for transaction data and\
    \ block headers\n    *   Reward for submitting valid blocks\n    *   Punishment\
    \ for counteracting the integrity of the system\n    *   Competition among peers\
    \ for earning reward based on processing speed and quality\n    *   Peer control\n\
    *   The rules of the competition establish a two-step rhythm that governs the\
    \ work of every node in the network. At any given point in time, all nodes of\
    \ the system are in either of the two phases:\n    *   Evaluating a new block\
    \ that was created by others\n    *   Trying hard to be the next node that creates\
    \ a new block that has to be evaluated by all others\n*   The working rhythm is\
    \ imposed by the arrival of messages at the individual nodes.\n*   The majority\
    \ of honest nodes and their striving for reward will outweigh the attempts of\
    \ dishonest nodes to counteract the integrity of the system.\n\nFootnotes [1](#A436689_1_En_18_Chapter.html#Fn1_source)\n\
    \nNakamoto, Satoshi. Bitcoin: A peer-to-peer electronic cash system. 2008. [`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf).\n\
    \n[2](#A436689_1_En_18_Chapter.html#Fn2_source)\n\nBlocks that are identified\
    \ as invalid later on are actually not physically removed from the `blockchain-data-structure`.\
    \ Instead, they are marked as invalid and treated as if they had been removed.\
    \ As a result, all changes are retained as documented.\n\n# 19. Choosing a Transaction\
    \ History\n\nLet computers vote with their feet\n\nStep [18](#A436689_1_En_18_Chapter.html)\
    \ explained how the nodes of the blockchain process transaction data and new blocks.\
    \ However, the transaction history maintained by the individual nodes of the system\
    \ may still differ due to delays or errors in message passing. Hence, this step\
    \ focuses on resolving conflicts among the different versions of the transaction\
    \ history maintained by the individual nodes of the system.\n\n## The Metaphor\n\
    \nWhen was the last time you took a walk through a park? Have you noticed a phenomenon\
    \ that can be observed in most parks all over the world? They have paved paths\
    \ that were created based on the plans and ideas of landscape architects, and\
    \ there are also beaten paths created by visitors. Often these beaten paths are\
    \ straight lines across the lawn and provide efficient shortcuts between two landmarks,\
    \ two park benches, or other points of interest. Beaten paths emerge at places\
    \ where many people independently and consistently decide to walk off the paved\
    \ paths because doing so appears to be more desirable than following the paved\
    \ path. Hence, the creation of dirt paths in parks can be seen as the result of\
    \ a very basic form of democracy. There are no official polls or elections that\
    \ rule the creation of these paths, instead every visitor contributes to their\
    \ emergence with his or her own independent decision to walk or not to walk along\
    \ certain paths and to leave his or her footprints on the ground. Less-often–used\
    \ beaten paths disappear as nature takes back its territory, but others remain\
    \ since many people continue to walk on them. This learning step explains an aspect\
    \ of the blockchain that functions similar to the emergence and disappearance\
    \ of beaten paths in parks.\n\n## The Goal\n\nThe goal is to maintain one unambiguous\
    \ history of transaction data among all nodes in the network that as a result\
    \ yields identical outcomes when clarifying ownership requests, regardless of\
    \ the specific node being contacted or requested.\n\n## The Challenge\n\nThe `blockchain-algorithm`\
    \ as explained in Step [18](#A436689_1_En_18_Chapter.html) imposes a two-step\
    \ rhythm to all nodes of the system. At any given point in time, each node of\
    \ the system is either examining a new block that was created by one of their\
    \ peers or trying hard to be the next node that creates a new block that subsequently\
    \ has to be examined by all others. However, there is no global clock that rules\
    \ the nodes and stipulates which of the two kinds of work has to be done at any\
    \ given time. The arrival of new blocks at the inboxes of the individual nodes\
    \ is the clock-pulse generator that governs the work of any given node. However,\
    \ the arrival of new blocks at the inboxes of the individual nodes is highly influenced\
    \ by the message delivery capabilities of the network, which has its own adversities.\
    \ Messages may get lost, may be delivered with time delay, or may arrive in any\
    \ order. As a result, the nodes of the network do not have the identical information\
    \ at their disposal at the same time. Furthermore, the switch between the two\
    \ working phases does not take place at the identical time for all the nodes.\
    \ Instead, each node switches between the two working phases at its own individual\
    \ time governed by the arrival of messages in its inbox. This causes an overlap\
    \ of the working phases of the individual nodes. Both effects impose a huge obstacle\
    \ toward maintaining one unambiguous history of transaction data among all peers\
    \ in the network. Hence, the challenge is to find a way to identify one unambiguous\
    \ history of transaction data in the face of all message delivery adversities\
    \ and without falling back to a centralized solution."
