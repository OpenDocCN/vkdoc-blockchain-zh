  trans: "\n# 加密货币诞生的迂回之路\n\n上一节列出了用于补偿区块链节点的支付工具应具备的理想属性。现有法定货币无一满足这些属性这一发现有点令人沮丧，因为这些属性本身是可取的。具有这些属性的货币或支付工具除了用于补偿分布式系统的节点之外，在许多其他场合也很有用。事实证明，许多人早已思考过这个问题。第一个也是最著名的区块链应用就是为了解决这个问题而诞生的。该区块链的理念非常巧妙：它是一个纯粹的分布式点对点系统，用于管理一种新型数字货币的所有权，而这种货币反过来又用于补偿系统中为验证新区块并将其添加到区块链数据结构中的节点。这种特殊的新货币将其应用目标——管理一种新型货币的所有权——与需要一种可信赖的支付工具来补偿其贡献者联系起来。我说的就是比特币。比特币系统不仅在一个纯粹的分布式点对点系统中管理这种新型数字货币的所有权，而且还用这种货币来补偿那些为其完整性做出贡献的节点。由于区块链严重依赖密码学，这种新型货币也被称为密码学货币或简称加密货币。打个比方，你可以认为比特币和许多其他加密货币就像是用自己生产的面包来支付员工工资的面包店，不同之处在于，它们生产的面包实际上是一种新的数字货币。\n\
    \n## 展望\n\n这一步强调了用于补偿区块链节点的支付工具的重要性。这是聚焦于区块链基本原理的一系列步骤中的最后一步。下一步将把所有部分整合起来，并总结你在之前的学习步骤中学到的内容。\n\
    \n## 总结\n\n-   区块链利用费用来补偿节点为系统完整性所做的贡献。\n-   用于补偿节点的支付工具会影响区块链的主要方面，例如：\n    -\
    \   完整性\n    -   开放性\n    -   分布式特性\n    -   系统理念\n-   用于补偿节点的支付工具的理想属性是：\n  \
    \  -   以数字形式存在\n    -   在现实世界中被接受\n    -   在所有国家都被接受\n    -   不受资本流动限制\n    -\
    \   值得信赖\n    -   不受单一中央组织或国家控制\n-   加密货币是一种独立的数字货币，其所有权由区块链管理，该区块链将其用作支付工具，以补偿节点维护系统完整性的贡献。\n\
    \n**脚注** 1\n\n中本聪。比特币：一种点对点的电子现金系统。2008 年。[`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf)。\n\
    \n# 21. 整合所有部分\n\n整体大于部分之和\n\n这一步是本书理解区块链的知识旅程的顶峰。虽然步骤 9–20 分别探讨了构成区块链的各个概念，但这一步将所有部分整合在一起。因此，你不仅能够从整体上理解区块链，还能看到不同概念是如何协同工作的。本学习步骤首先回顾区块链的主要概念和技术，然后根据前几步获得的技术知识解释区块链是什么。最后，这一步将回顾区块链技术套件的定义，从而将区块链开放给广泛的应用领域。\n\
    \n## 回顾概念与技术\n\n理解区块链的知识之旅始于步骤 8，我们在那里规划了一个用于管理所有权的纯分布式点对点系统的设计。表 21-1 列出了这些任务、目标、对应的步骤以及区块链的相应概念。\n\
    \n**表 21-1.** 设计用于管理所有权的分布式点对点系统的任务回顾\n\n| 任务编号 | 目标 | 步骤编号 | 主要概念 |\n| --- |\
    \ --- | --- | --- |\n| 1 | 描述所有权 | 9 | 交易数据历史 |\n| 2 | 保护所有权 | 10–13 | 数字签名 |\n\
    | 3 | 存储交易数据 | 10, 11, 14, 15 | 区块链数据结构 |\n| 4 | 准备用于分发的账本 | 16 | 不可篡改性 |\n| 5\
    \ | 分发账本 | 17 | 网络中的信息转发 |\n| 6 | 添加新交易 | 18 | 区块链算法 |\n| 7 | 决定哪个账本代表真相 | 19\
    \ | 分布式共识 |\n\n理解构成区块链的这些主要概念也依赖于其他概念和技术，这一点很重要。理解区块链至少也需要理解这些概念。因此，表 21-2 在更详细的层面上总结了构成区块链的技术。本步骤的其余部分将借鉴这两个表中展示的概念。\n\
    \n**表 21-2.** 区块链的技术概念、目的及比喻\n\n| 概念 | 目的 | 使用的比喻 |\n| --- | --- | --- |\n| 交易数据\
    \ | 描述所有权的转移 | 银行转账单 |\n| 交易历史 | 证明所有权的当前状态 | 接力赛的过程 |\n| 密码学哈希值 | 唯一标识任何类型的数据\
    \ | 人类指纹 |\n| 非对称密码学 | 加密和解密数据 | 带锁的公共邮箱 |\n| 数字签名 | 表示同意交易数据的内容 | 手写签名 |\n| 哈希引用\
    \ | 一旦引用的数据被更改就失效的引用 | 利用哈希值识别衣帽钩的衣帽间牌 |\n| 变更敏感的数据结构 | 以任何篡改都会立即显现的方式存储数据 | 口袋里装有衣帽间牌的外套\
    \ |\n| 哈希谜题 | 施加一项计算量大的任务 | 通过试错法打开数字锁 |\n| 区块链数据结构 | 以变更敏感的方式存储交易数据并保持其顺序 | 带有卡片目录的图书馆\
    \ |\n| 不可篡改性 | 使得更改交易数据历史成为不可能 | 试图建立虚假族谱 |\n| 分布式点对点网络 | 在网络所有节点之间共享交易历史 | 独立的见证人小组\
    \ |\n| 消息传递 | 确保系统中所有节点最终都能收到所有信息 | 人际间的流言蜚语 |\n| 区块链算法 | 确保只有有效的交易数据被添加到区块链数据结构中\
    \ | 胡萝卜加大棒的管理承包者方式 |\n| 分布式共识 | 确保系统中所有节点使用相同的交易数据历史 | 公园里因游客用脚投票而形成的小路 |\n| 补偿\
    \ | 给予节点维护完整性的激励 | 用面包支付员工工资的面包店 |\n"
- fmt: '# What Is the Blockchain?


    After gaining an overview of the individual concepts that make up the blockchain,
    it is important to see how they work together. The approach of analyzing systems
    by identifying functional and nonfunctional aspects of their application and implementation
    layer provides support for tackling the challenge of understanding how the concepts
    of the blockchain work together. Table [21-3](#A436689_1_En_21_Chapter.html#Tab3)
    provides an overview of the layers and the aspects of the blockchain, which will
    guide you in bringing the concepts together.


    **Table 21-3.** Layers and Aspects of the Blockchain


    | Layer | Functional Aspects | Nonfunctional Aspects |

    | --- | --- | --- |

    | Application | Clarifying ownership Transferring ownership | Highly available
    Reliable Open Pseudoanonymous |

    | Implementation | Ownership logic Transaction security Transaction processing
    logic Storage logic Consensus logic Purely distributed peer-to-peer architecture
    | Secure Resilient Eventually consistent Keeping Integrity |


    ## The Purpose of the Blockchain: Functional Aspects of the Application Layer


    The blockchain serves two purposes:


    - Clarifying ownership

    - Transferring ownership


    ### Clarifying Ownership


    Clarifying ownership means answering the major question that constitutes ownership,
    which is: Who owns what amount of what object at what time?


    ### Transferring Ownership


    Transferring ownership means changing the current state of ownership. With regard
    to this purpose, the blockchain lets owners transfer their property to someone
    else. Hence, it answers another major question for proving ownership, which is:
    Who has transferred ownership of what by which amount to whom at what time?


    ## Properties of the Blockchain: Nonfunctional Aspects


    When interacting with the blockchain, you will notice how it fulfills its duties.
    The quality at which the blockchain serves its purpose is described by its nonfunctional
    aspects:


    - Highly available

    - Censorship proof

    - Reliable

    - Open

    - Pseudoanonymous

    - Secure

    - Resilient

    - Eventually consistent

    - Keeping integrity


    ### Highly Available


    The blockchain does not have a downtime. Instead, the blockchain is available
    all the time 24 hours a day, 7 days a week, the whole year all the time. It does
    not even have a switch off button.


    ### Censorship Proof


    There is no one who individually dictates the content of the blockchain or can
    switch off the whole system.


    ### Reliable


    The blockchain fulfills its purpose consistently with a good quality. One can
    trust the blockchain in clarifying and transferring ownership correctly.


    ### Open


    The blockchain does not exclude certain users or computers from utilizing its
    services. Instead, it is open to everyone.


    ### Pseudoanonymous


    The blockchain identifies owners uniquely but it neither maintains nor reveals
    their real-world identity.


    ### Secure


    The blockchain is secure in two aspects: (1) on the level of individual transactions,
    (2) on the level of the whole system. Regarding the individual level, the blockchain
    ensures that ownership is kept exclusive to the disposal of the lawful owner only.
    On the overall level, the blockchain protects the ownership of all owners from
    manipulation, forgery, counterfeiting, double spending, and unauthorized access.


    ### Resilient


    The blockchain is able to clarify and transfer ownership correctly even under
    difficult conditions. The blockchain withstands a wide range of attacks on ownership
    such as forgery, double spending, counterfeiting, and accessing ones property
    by pretending to be someone else.


    ### Eventually Consistent


    The blockchain will not yield consistent results all the time. Instead, the chance
    of getting consistent results will increase over time and will eventually reach
    full consistency throughout the whole system.


    ### Keeping Integrity


    The blockchain maintains its integrity by displaying behavior that is free of
    logical errors. It maintains data consistency and ensures security on the level
    of individual transactions and the whole history of transaction data.


    ## Internal Functioning: Functional Aspects of the Implementation Layer


    The internal functioning of the blockchain can be traced back to the following
    major components:


    - Ownership logic

    - Transaction security

    - Transaction processing logic

    - Storage logic

    - Peer-to-peer architecture

    - Consensus logic


    ### Ownership Logic


    The ownership logic governs how ownership is clarified and transferred. The blockchain
    utilizes individual transaction data for describing the transfer of ownership
    and maintains the whole transaction data for clarifying ownership. Figure [21-1](#A436689_1_En_21_Chapter.html#Fig1)
    illustrates the ownership logic and its underlying concepts. Concepts shown by
    boxes on the top depend on those below them. The very bottom row of boxes exhibits
    the concepts on which the ownership logic depends and that need to be specified
    further.


    ![A436689_1_En_21_Fig1_HTML.jpg](A436689_1_En_21_Fig1_HTML.jpg)


    **Figure 21-1.** Ownership logic and its underlying concepts


    The ownership logic utilized by the blockchain relies on a storage logic that
    maintains the whole history of transaction data and a consensus logic that ensures
    its consistency. Additionally, the ownership logic relies on a transaction processing
    logic that ensures that only valid transaction data are added to the data store
    and transaction security that ensures that only the lawful owner can transfer
    his or her property to another account. These four concerns are addressed by the
    remaining components of the blockchain.


    ### Transaction Security


    Transaction security ensures that only the lawful owner can access and transfer
    his or her ownership to another account. Figure [21-2](#A436689_1_En_21_Chapter.html#Fig2)
    illustrates the concepts involved in implementing transaction security. Basic
    concepts such as cryptographic hash values and asymmetric cryptography are located
    in boxes at the very bottom since they serve as the foundation for all other concepts
    located in boxes above them. For example, digital signature is located below authorization
    because it is a measure to authorize a transaction, but it is located above cryptographic
    hash values and private key since it utilizes these concepts. In a similar fashion,
    Figure [21-2](#A436689_1_En_21_Chapter.html#Fig2) makes the dependence between
    authentication and identification on lower-level cryptography more obvious.


    ![A436689_1_En_21_Fig2_HTML.jpg](A436689_1_En_21_Fig2_HTML.jpg)


    **Figure 21-2.** Transaction security and its underlying concepts


    ### Transaction Processing Logic


    The transaction logic ensures that only valid transaction data are added to the
    collectively maintained history of transaction data. It clearly depends on the
    validation of transaction data that represent the genuine goal of the system.
    Every single node of the system in isolation can do the validation of transaction
    data. However, a single node could make errors in validating transaction data
    or it could accept invalid transaction data on purpose. Both cases are threats
    to the integrity of the whole system. For that reason, the processing of transactions
    involves a sophisticated mechanic containing the validation of new blocks or its
    headers, respectively: peer-to-peer architecture and peer control and competition,
    which in turn rely on the forces of reward and punishment. Figure [21-3](#A436689_1_En_21_Chapter.html#Fig3)
    depicts the relation of these concepts by presenting them in boxes that are built
    on top of one another to point out their dependence.


    ![A436689_1_En_21_Fig3_HTML.jpg](A436689_1_En_21_Fig3_HTML.jpg)


    **Figure 21-3.** Transaction processing logic and its underlying concepts'
  raw: '## What Is the Blockchain?


    After gaining an overview of the individual concepts that make up the blockchain,
    it is important to see how they work together. The approach of analyzing systems
    by identifying functional and nonfunctional aspects of their application and implementation
    layer provides support for tackling the challenge of understanding how the concepts
    of the blockchain work together. Table [21-3](#A436689_1_En_21_Chapter.html#Tab3)
    provides an overview of the layers and the aspects of the blockchain, which will
    guide you in bringing the concepts together.


    Table 21-3.


    Layers and Aspects of the Blockchain


    | Layer | Functional Aspects | Nonfunctional Aspects |

    | --- | --- | --- |

    | Application | Clarifying ownership Transferring ownership | Highly available
    Reliable Open Pseudoanonymous |

    | Implementation | Ownership logic Transaction security Transaction processing
    logic Storage logic Consensus logic Purely distributed peer-to-peer architecture
    | Secure Resilient Eventually consistent Keeping Integrity |


    ### The Purpose of the Blockchain: Functional Aspects of the Application Layer


    The blockchain serves two purposes:


    *   Clarifying ownership

    *   Transferring ownership


    #### Clarifying Ownership


    Clarifying ownership means answering the major question that constitutes ownership,
    which is: Who owns what amount of what object at what time?


    #### Transferring Ownership


    Transferring ownership means changing the current state of ownership. With regard
    to this purpose, the blockchain lets owners transfer their property to someone
    else. Hence, it answers another major question for proving ownership, which is:
    Who has transferred ownership of what by which amount to whom at what time?


    ### Properties of the Blockchain: Nonfunctional Aspects


    When interacting with the blockchain, you will notice how it fulfills its duties.
    The quality at which the blockchain serves its purpose is described by its nonfunctional
    aspects:


    *   Highly available

    *   Censorship proof

    *   Reliable

    *   Open

    *   Pseudoanonymous

    *   Secure

    *   Resilient

    *   Eventually consistent

    *   Keeping integrity


    #### Highly Available


    The blockchain does not have a downtime. Instead, the blockchain is available
    all the time 24 hours a day, 7 days a week, the whole year all the time. It does
    not even have a switch off button.


    #### Censorship Proof


    There is no one who individually dictates the content of the blockchain or can
    switch off the whole system.


    #### Reliable


    The blockchain fulfills its purpose consistently with a good quality. One can
    trust the blockchain in clarifying and transferring ownership correctly.


    #### Open


    The blockchain does not exclude certain users or computers from utilizing its
    services. Instead, it is open to everyone.


    #### Pseudoanonymous


    The blockchain identifies owners uniquely but it neither maintains nor reveals
    their real-world identity.


    #### Secure


    The blockchain is secure in two aspects: (1) on the level of individual transactions,
    (2) on the level of the whole system. Regarding the individual level, the blockchain
    ensures that ownership is kept exclusive to the disposal of the lawful owner only.
    On the overall level, the blockchain protects the ownership of all owners from
    manipulation, forgery, counterfeiting, double spending, and unauthorized access.


    #### Resilient


    The blockchain is able to clarify and transfer ownership correctly even under
    difficult conditions. The blockchain withstands a wide range of attacks on ownership
    such as forgery, double spending, counterfeiting, and accessing ones property
    by pretending to be someone else.


    #### Eventually Consistent


    The blockchain will not yield consistent results all the time. Instead, the chance
    of getting consistent results will increase over time and will eventually reach
    full consistency throughout the whole system.


    #### Keeping Integrity


    The blockchain maintains its integrity by displaying behavior that is free of
    logical errors. It maintains data consistency and ensures security on the level
    of individual transactions and the whole history of transaction data.


    ### Internal Functioning: Functional Aspects of the Implementation Layer


    The internal functioning of the blockchain can be traced back to the following
    major components:


    *   Ownership logic

    *   Transaction security

    *   Transaction processing logic

    *   Storage logic

    *   Peer-to-peer architecture

    *   Consensus logic


    #### Ownership Logic


    The ownership logic governs how ownership is clarified and transferred. The blockchain
    utilizes individual transaction data for describing the transfer of ownership
    and maintains the whole transaction data for clarifying ownership. Figure [21-1](#A436689_1_En_21_Chapter.html#Fig1)
    illustrates the ownership logic and its underlying concepts. Concepts shown by
    boxes on the top depend on those below them. The very bottom row of boxes exhibits
    the concepts on which the ownership logic depends and that need to be specified
    further.


    ![A436689_1_En_21_Fig1_HTML.jpg](A436689_1_En_21_Fig1_HTML.jpg)


    Figure 21-1.


    Ownership logic and its underlying concepts


    The ownership logic utilized by the blockchain relies on a storage logic that
    maintains the whole history of transaction data and a consensus logic that ensures
    its consistency. Additionally, the ownership logic relies on a transaction processing
    logic that ensures that only valid transaction data are added to the data store
    and transaction security that ensures that only the lawful owner can transfer
    his or her property to another account. These four concerns are addressed by the
    remaining components of the blockchain.


    #### Transaction Security


    Transaction security ensures that only the lawful owner can access and transfer
    his or her ownership to another account. Figure [21-2](#A436689_1_En_21_Chapter.html#Fig2)
    illustrates the concepts involved in implementing transaction security. Basic
    concepts such as cryptographic hash values and asymmetric cryptography are located
    in boxes at the very bottom since they serve as the foundation for all other concepts
    located in boxes above them. For example, digital signature is located below authorization
    because it is a measure to authorize a transaction, but it is located above cryptographic
    hash values and private key since it utilizes these concepts. In a similar fashion,
    Figure [21-2](#A436689_1_En_21_Chapter.html#Fig2) makes the dependence between
    authentication and identification on lower-level cryptography more obvious.


    ![A436689_1_En_21_Fig2_HTML.jpg](A436689_1_En_21_Fig2_HTML.jpg)


    Figure 21-2.


    Transaction security and its underlying concepts


    #### Transaction Processing Logic


    The transaction logic ensures that only valid transaction data are added to the
    collectively maintained history of transaction data. It clearly depends on the
    validation of transaction data that represent the genuine goal of the system.
    Every single node of the system in isolation can do the validation of transaction
    data. However, a single node could make errors in validating transaction data
    or it could accept invalid transaction data on purpose. Both cases are threats
    to the integrity of the whole system. For that reason, the processing of transactions
    involves a sophisticated mechanic containing the validation of new blocks or its
    headers, respectively: peer-to-peer architecture and peer control and competition,
    which in turn rely on the forces of reward and punishment. Figure [21-3](#A436689_1_En_21_Chapter.html#Fig3)
    depicts the relation of these concepts by presenting them in boxes that are built
    on top of one another to point out their dependence.


    ![A436689_1_En_21_Fig3_HTML.jpg](A436689_1_En_21_Fig3_HTML.jpg)


    Figure 21-3.


    Transaction processing logic and its underlying concepts'
