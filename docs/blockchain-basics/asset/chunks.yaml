  trans: '

    ### 最重链准则


    在步骤 16 中你已了解到，区块链应用在为`blockchain-data-structure`添加新区块时，很少使用恒定难度的哈希难题。相反，它们通常动态确定难度级别，这导致各区块因添加到`blockchain-data-structure`所投入的计算工作量不同而存在差异。另一方面，`最长链准则`基于这样一种理念：包含最多区块的路径代表了最大的计算工作量。然而，在难度级别不一致的情况下，最长路径未必就是代表最大计算工作量的那条。


    对于每条路径，可以通过累加其所有区块的难度级别来衡量所投入的计算工作量。该值可利用区块头包含其哈希难题难度级别这一事实来计算。路径的聚合难度级别通常被称为其**权重**。图
    19-6 描绘了与图 19-5 相同的`blockchain-data-structure`，但这次还显示了其中每个区块的难度级别。最长链（从根`33FF`到叶子`0101`的路径）的权重为
    5，而第二长链（从根`33FF`到叶子`CCC1`的路径）的权重为 6。因此，图 19-6 所示的`blockchain-data-structure`说明了这样一种情况：此时`最长链准则`会导致节点选择一条并未代表最大计算工作量的链。


    ![A436689_1_En_19_Fig6_HTML.jpg](img/A436689_1_En_19_Fig6_HTML.jpg)


    图 19-6. 带有难度级别的`blockchain-data-structure`示意图


    因此，动态确定难度级别的区块链不使用`最长链准则`。相反，它们使用`最重链准则`：选择由最重链所代表的交易数据历史。在所有区块难度级别都相同的情况下，最长路径与最重路径是相同的，`最长链准则`和`最重链准则`会得出相同的结果。


    ## 选择一条链的后果


    从冲突的版本中选择一条特定链并将其确立为权威链会带来以下后果：


    - 孤块

    - 奖励回收

    - 明确所有权

    - 交易重新处理

    - 共同主干增长

    - 最终一致性

    - 抗操纵性


    ### 孤块


    共同增长的`blockchain-data-structure`形似一棵树，其分支代表了交易历史的不同冲突版本。应用选择准则实际上意味着选择该树的一条路径，并将其确立为交易数据历史的权威版本。树状数据结构中不属于权威路径的所有区块都会被节点抛弃，并被称为**孤块**。⁴
    例如，将`最长链准则`应用于图 19-4 所示情况时，区块`DD01`是一个孤块；而在图 19-5 中，区块`DD01`和`CCC1`不属于最长链并被抛弃。将`最重链准则`应用于图
    19-6 所示情况时，区块`0101`、`BB11`和`DD01`不属于权威链，因此被抛弃。


    ### 奖励回收


    孤块在明确所有权方面毫无用处，因为它们对权威链没有贡献。因此，创建并提交这些孤块的节点所获得的奖励会被回收。这是由于步骤 18 中解释的`blockchain-algorithm`的规则
    11 和规则 13 所致，这些规则规定：如果一个后来被添加到`blockchain-data-structure`的区块被认定为无效或无用，该区块及其所有后续区块将被逻辑上从`blockchain-data-structure`中移除，并且因添加该区块而给予的奖励将从最初接收它的节点那里收回。


    ### 明确所有权


    只有属于权威链的交易才被视为已发生，并用于处理与所有权相关的请求。孤块不属于集体选择的链。因此，它们的交易数据不构成交易数据历史的一部分。相反，它们被视为从未发生过，在处理与所有权相关的请求时也不被考虑。


    ### 交易重新处理


    属于孤块的交易数据最初提交的目的是将其添加到交易历史中。它们被当作从未发生过这一事实并非事先计划好的，而是工作量证明的随机性及其在增长`blockchain-data-structure`中所起作用的结果。不幸落入孤块的交易数据会再次获得机会成为所选交易历史的一部分：它们被重新放入节点的收件箱，以便后续重新处理并添加到`blockchain-data-structure`中。这是由于步骤
    18 中解释的`blockchain-algorithm`的规则 11 所致。因此，曾经属于权威链的交易可能会暂时消失（如果大多数节点抛弃了它们所属的区块），但一旦它们被重新处理，便会再次出现。


    ### 共同主干增长


    应用选择准则并不总能产生明确的结果。例如，在图 19-3 和图 19-4 所示的情况下，存在多条最长链。在这些情况下，`blockchain-data-structure`有两条长度相等的路径，它们源于一个**共同主干**。在图
    19-3 中，共同主干仅由两个区块组成，形成一条短链`A397 → 33FF`。在图 19-4 中，共同主干已由三个区块组成，形成链`AB12 → A397
    → 33FF`，其中包含了前一情况的共同主干。因此，即使选择准则产生模棱两可的结果，交易历史的冲突版本也是源于一个歧义较少的共同主干。越往区块链的深层追溯，判断某个区块是否属于最长链的决定就越明确。

    '
- fmt: '### Eventual Consistency


    Let’s consider the situation depicted in Figure [19-4](#A436689_1_En_19_Chapter.html#Fig4),
    where the longest-chain-criterion does not yield an unambiguous result. As you
    can see in Figure [19-5](#A436689_1_En_19_Chapter.html#Fig5), the next block being
    added to the `blockchain-data-structure` determines whether block `BB11` or `CCC1`
    will either be part of the longest chain or be abandoned instead. But who decides
    that the next block being added to the `blockchain-data-structure` shown in Figure
    [19-4](#A436689_1_En_19_Chapter.html#Fig4) refers to block `BB11` as its predecessor
    and hence abandons block `CCC1`? The surprising and maybe disappointing answer
    is that it is purely random. In the situation shown in Figure [19-4](#A436689_1_En_19_Chapter.html#Fig4),
    the nodes are free to decide which branch to extend. As a result, some nodes may
    strive to find a new block that refers to block `BB11` as its predecessor, while
    other nodes may strive to find a new block that refers to block `CCC1` as its
    predecessor. Which of them finishes the new block first depends on the solution
    of the hash puzzle, which takes a finite but random length of time. The node that
    solves the hash puzzle of a new block first decides which of the conflicting branches
    gets extended and which blocks get abandoned. Hence, the growth of the tree-shaped
    `blockchain-data-structure` exhibits a random behavior due to the speed race for
    solving the hash puzzle and the random fluctuations in messages passing through
    the network. The next block, whose time of appearance is governed by the random
    duration needed to solve its hash puzzle, determines which of the paths will be
    extended and which block will be abandoned.


    As previously discussed, conflicting branches of the tree-shaped `blockchain-data-structure`
    share a common trunk that stays constant regardless of the blocks or leafs that
    are abandoned. Hence, the blocks located at or near the top of the authoritative
    chain are most affected by the random nature of the arrival of new blocks, while
    blocks deeper down in the `blockchain-data-structure` are less affected. Hence,
    it can be stated: The deeper down the authoritative chain a block is located:


    - The further in the past it was added

    - The more time has passed since its inclusion in the `blockchain-data-structure`

    - The more common effort has been spent on adding subsequent blocks

    - The less it is affected by random changes of the blocks that belong to the longest
    chain

    - The less likely it will be abandoned

    - The more accepted it is by the nodes of the system

    - The more anchored it is in the common history of the nodes


    The fact that certainty concerning the inclusion of blocks in the authoritative
    chain increases as time goes by and more blocks are added eventually is called
    eventually consistency.


    ### Robustness Against Manipulations


    That path of the tree-shaped `blockchain-data-structure` that represents the most
    computational effort is the authoritative version of the transaction history.
    Establishing and maintaining the authoritative path is just a matter of controlling
    the majority of the computational power of the whole system. Establishing a new
    authoritative path that starts at one of the inner blocks of the `blockchain-data-structure`
    requires catching up with and overtaking the path maintained by the majority.
    This fact is the basis for the robustness of the blockchain.


    As long as honest nodes own the majority of computational resources of the whole
    system, the path maintained by them will grow fastest and outpace any competing
    paths. In order to manipulate an inner block, an attacker would have to redo the
    proof of work of that block and subsequently redo the hash puzzle of all blocks
    after it and then catch up with and overtake the path maintained by the honest
    nodes [²](#A436689_1_En_19_Chapter.html#Fn2). However, establishing a new path
    by catching up with and overtaking the path maintained by the majority is impossible
    for any attacker that controls less computational power than the majority. Hence,
    any attempt to establish a new authoritative path that contains fraudulent transactions
    will be outpaced and therefore abandoned by the path that is maintained by the
    honest majority. As a result, the history of transactions maintained by the system
    is robust against manipulations.


    ## Threats to the Voting Schema


    Any procedure of collective decision making will be the target of manipulations
    if it appears to be worthwhile to influence the outcome of the whole process.
    The blockchain and its distributed consensus algorithm is no exception to that.
    There are many discussions about how the blockchain consensus algorithm can be
    manipulated. Regardless of how diverse these manipulations may appear, they have
    only one goal: turning blocks that are part of the authoritative chain into orphan
    blocks and establishing a new authoritative chain that represents a history of
    transaction data and an alternative distribution of ownership rights that is more
    favorable from the attacker''s point of view.


    However, one can discuss these manipulations from a variety of viewpoints. Economically,
    these manipulations try to change the allocation of ownership rights by changing
    the collective history of transaction data. Regarding collective decision making,
    these manipulations try to gather the majority of voting power in order to enforce
    a desired result. From a technical point of view, any attempt to manipulate the
    collective decision-making process aims to undermine the integrity of the system.
    Regarding the distributed nature of the system, these manipulations try to establish,
    at least temporarily, a hidden element of centrality that changes the state of
    the system. Hence, these attacks are often called 51 percent attacks.


    **Note**


    A 51 percent attack is an attempt to gather or control the majority of the whole
    voting power in a collective decision-making process.


    ## The Role of the Hash Puzzle


    In Step [16](#A436689_1_En_16_Chapter.html) you learned how to make the `blockchain-data-structure`
    immutable. Hence, from a purely technical point of view, the hash puzzle is just
    a means to an end to make the `blockchain-data-structure` immutable. However,
    when you consider the usage of the `blockchain-data-structure`, another aspect
    of the hash puzzle is seen. In the course of reaching a collective agreement regarding
    the transaction history, the individual blocks that make up the `blockchain-data-structure`
    can be seen as a voting ballot, while the hash puzzle can be seen as a price that
    makes submitting a ballot costly and hence detains the dishonest from taking part
    in the vote.


    Any attempt to manipulate the collective decision-making process of the blockchain
    aims to gather the majority of the voting power. Due to the fact that the blockchain
    binds voting power on computational power via the hash puzzle, any attempt to
    gather the majority of voting power actually means gathering the majority of the
    computational power of the whole peer-to-peer system. The reliability and trustworthiness
    of the way the blockchain reaches collective agreement relies on the assumption
    that no single person or entity can acquire or gather the majority of accumulated
    computational power of the whole peer-to-peer system.'
