  trans: "\n# 未来\n\n预测未来并非易事，尤其是在考虑一项尚处于积极研究和持续开发阶段的新技术时。然而，我们可以识别出一些指向未来可能情景的迹象。特别是，公共无许可区块链由于其可扩展性有限且缺乏隐私性，商业用途似乎有限。另一方面，私有许可区块链似乎最受商业层面的关注。因此，我们未来可能会看到以下发展：\n\
    \n- 有限的爱好者项目\n- 大规模商业应用\n- 政府项目\n\n## 有限的爱好者项目\n\n有限的爱好者项目可能会利用公共无许可区块链，并且极有可能由区块链爱好者和纯粹主义者发起和支持。他们受到系统完全开放和纯粹去中心化特性的驱动。这些项目的支持者可能将他们的参与视为一种政治声明，或是对某种替代性软件系统的承诺，这种系统使他们摆脱任何形式的政府或商业控制与协调。在这种背景下，加密货币作为旨在独立于政府监管的替代货币，以及独立的声誉系统或独立于政府身份证件管理身份的系统，可能成为主要应用案例。\n\
    \n## 大规模商业应用\n\n大规模商业区块链项目预计将利用私有许可区块链。这些项目极有可能由特定部门或行业的领先企业联盟发起和运营。实现标准化、自动化、流程精简和成本降低的收益，将是支持这些项目的主要原因。这些项目也可能基于这样一种理念：寻找一种折中方案，使参与者能够利用区块链的优势，同时又不因去中介化而显得可有可无。有可能每个主要行业，如银行业、金融交易所、保险、医疗保健、支付和零售业，都将开发并提供各自行业范围内的区块链解决方案。\n\
    \n## 政府项目\n\n作为政府项目，这些区块链企业的资金来源于税收，因此不受影响私营部门区块链项目的大部分商业限制。这些项目可能作为电子政务倡议的一部分发起和运营，旨在实现手动流程数字化或替换传统基础设施。税收、监控、数字身份、记录管理或货币政策都可能受益于区块链的特性。然而，悬而未决的法律问题以及现有的数据安全和隐私法律，可能会严重限制区块链在公共部门中的益处。\n\
    \n# 展望\n\n这一步完成了并圆满结束了我们这次理解区块链的智识之旅。在强调了区块链的研究和进一步开发领域之后，这一步还提到了它的一些替代方案、可能的长期成就、缺点以及未来的用途。互联网的历史不仅教会我们一项新技术的使用和发展是多么变幻莫测、难以预测，也教会了我们它是多么充满挑战且回报丰厚。无论区块链的未来如何，我们都可以决定不仅仅是这场激动人心且充满挑战的技术变革的见证者，更是积极的参与者——这场变革有潜力成为自互联网发明以来最伟大的事物之一。\n\
    \n# 总结\n\n-   区块链一直是，并将继续是进一步改进和发展的对象，例如其实现方式的变化、效率提升、可扩展性改进以及概念上的进步。\n-   智能合约、零知识证明以及达成共识的替代方式是区块链概念进步的三大主要领域。\n\
    -   除了技术上的优点，区块链还可能因其以下长期成就而受到赞誉：\n    -   去中介化\n    -   自动化\n    -   标准化\n  \
    \  -   流程精简\n    -   处理速度提升\n    -   成本降低\n    -   转向对协议和技术的信任\n    -   使信任成为一种商品\n\
    \    -   技术意识增强\n-   区块链可能的缺点包括：\n    -   缺乏隐私性\n    -   个人责任丧失\n    -   就业岗位流失\n\
    \    -   再中介化\n-   未来可能看到的区块链用途包括：\n    -   有限的爱好者项目\n    -   大规模商业项目\n    - \
    \  政府项目\n\n脚注\n\n[1] World Wide Web Foundation. History of the Web. 2016. [`webfoundation.org/about/vision/history-of-the-web/`](http://webfoundation.org/about/vision/history-of-the-web/).\n\
    \n[2] Bonneau, Joseph, Andrew Miller, Jeremy Clark, Arvind Narayanan, Joshua A.\
    \ Kroll, and Edward W. Felten. Research perspectives and challenges for Bitcoin\
    \ and cryptocurrencies. In IEEE Symposium on Security and Privacy. IEEE, 2015,\
    \ 104–121；Yli-Huumo, Jesse et al. Where is current research on blockchain technology?—A\
    \ systematic review. *PloS One* 11.10 (2016), e0163477: doi:10.1371/journal. pone.0163477.\n\
    \n[3] Croman, Kyle, et al. On scaling decentralized blockchains. In Proceedings\
    \ of the 3rd workshop on Bitcoin and Blockchain Research. 2016. [`www.researchgate.net/publication/292782219_On_Scaling_Decentralized_Blockchains_A_Position_Paper`](https://www.researchgate.net/publication/292782219_On_Scaling_Decentralized_Blockchains_A_Position_Paper)；Buterin,\
    \ Vitalik, Jeff Coleman, and Matthew Wampler-Doty. Notes on scalable blockchain\
    \ protocols (verson 0.3). 2015. [`pdfs.semanticscholar.org/ae5b/c3aaf0e02a42f4cd41916072c87db0e04ac6.pdf?_ga=1.234210142.1100460187.1484935336`](https://pdfs.semanticscholar.org/ae5b/c3aaf0e02a42f4cd41916072c87db0e04ac6.pdf?_ga=1.234210142.1100460187.1484935336).\n\
    \n[4] Poon, Joseph, and Thaddeus Dryja. The bitcoin lightning network: Scalable\
    \ off-chain instant payments. Technical Report (draft). 2015. [`lightning.network`](https://lightning.network).\n\
    \n[5] Tremback, Jehan, and Zack Hess. Universal payment channels. 2015. [`altheamesh.com/documents/universal-payment-channels.pdf`](http://altheamesh.com/documents/universal-payment-channels.pdf).\n\
    \n[6] BitFury Group. Public versus private blockchains: Part 1, Permissioned blockchains.\
    \ White paper. 2015；BitFury Group. Public versus private blockchains: Part 2,\
    \ Permissionless blockchains. White paper. 2015.\n\n[7] Meiklejohn, Sarah, and\
    \ Claudio Orlandi. Privacy-enhancing overlays in bitcoin. International Conference\
    \ on Financial Cryptography and Data Security. Berlin Heidelberg: Springer, 2015.\n\
    \n[8] Zyskind, Guy, Oz Nathan, and Alex Pentland. Enigma: Decentralized computation\
    \ platform with guaranteed privacy. 2015. arXiv preprint arXiv:1506.03471.\n\n\
    [9] Krantz, Steven G. Zero knowledge proofs. July 2007. AIM Preprint Series, Volume\
    \ 10-46.\n\n[10]\n"
