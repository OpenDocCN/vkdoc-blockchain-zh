  trans: '

    ### 树


    图 11-5 展示了交易数据如何通过哈希引用以树状方式链接在一起。


    ![A436689_1_En_11_Fig5_HTML.jpg](img/A436689_1_En_11_Fig5_HTML.jpg)


    图 11-5. 数据以树状方式链接


    这种结构也被称为默克尔树 ³，因为它是由一位名叫默克尔的计算机科学家提出的，并且它看起来像一棵倒置的树。它对于将同一时间可用的许多不同数据分组，并通过单个哈希引用使它们可访问非常有用。为了创建图
    11-5 中所示的树，你从图底部方框代表的四个交易数据开始。首先，创建各个交易数据的哈希引用（`R1` 到 `R4`），然后将它们成对分组。随后，创建这些哈希引用对的哈希引用（`R12`
    和 `R34`）。重复此过程，直到最终得到单个哈希引用，它也被称为默克尔树的根（标记为 `R`）。


    ### 为何有效


    所解释的数据结构以对变更敏感的方式存储数据，因为它们通过哈希引用连接和组合数据。当这些引用所指向的数据在引用创建后被更改时，这些引用就会失效。因此，在此类结构中观察到失效的引用，就证明某些数据在结构创建后被更改了。否则，可以得出结论，整个结构自创建以来未被更改。


    ## 引发耗时的计算


    哈希值不仅有助于使诸如比较、引用和存储数据等基本文件操作安全且高效。哈希值还可以用于让计算机用精心设计的谜题来挑战其他计算机。虽然这听起来有点奇怪，但事实证明，哈希值的这种用途是区块链最重要的概念之一。


    ### 目标


    出于在本书后续步骤中会变得清晰的原因，你可能需要创建需要计算资源才能解决的谜题。这些谜题不应能通过存储在某个地方的知识或数据，或凭借思考（如智商测试或知识测试）来解决。解决这些谜题的唯一方法是依靠纯粹的计算能力和艰苦的计算工作。


    ### 思路


    密码锁是一种特殊的锁，需要一组唯一的数字序列才能打开。如果你不知道打开锁的序列，你会系统地尝试所有可能的组合，直到最终找到打开锁的唯一组合。这种方法保证能打开锁，但非常耗时。系统地尝试所有可能的组合与知识或智力推理无关。打开密码锁的方法基于纯粹的努力和艰苦工作。哈希谜题是可以被视为通过反复试验打开密码锁的数字等价物的计算谜题。


    ### 工作原理


    哈希谜题的要素包括 ⁴：


    *   必须保持不变的数据

    *   可以自由更改的数据，即所谓的 nonce

    *   要使用的哈希函数

    *   对组合哈希结果的限制，也称为难度级别


    图 11-6 展示了哈希谜题的设置。对数据和 nonce 应用组合哈希。得到的哈希值必须满足给定的限制条件。


    ![A436689_1_En_11_Fig6_HTML.jpg](img/A436689_1_En_11_Fig6_HTML.jpg)


    图 11-6. 哈希谜题的示意图


    哈希谜题只能通过反复试验来解决。这需要猜测一个 nonce，使用所需的哈希函数计算组合数据的哈希值，并根据限制条件评估得到的哈希值。如果哈希值满足限制条件，你就解开了哈希谜题；否则，你继续尝试另一个
    nonce，直到最终解开谜题。当 nonce 与给定数据组合后产生的哈希值满足限制条件时，该 nonce 被称为解。当你声称解开了哈希谜题时，必须始终提供那个特定的
    nonce。


    ### 一个说明性示例


    让我们考虑一个真实的哈希谜题来说明其工作原理。在第 10 步中，你看到 `Hello World!` 的缩短哈希值是 `7F83B165`。但是，哪些数据与
    `Hello World!` 组合后会产生一个以三个前导零开头的缩短哈希值呢？因此哈希谜题是：找到与 `Hello World!` 组合后能产生一个以三个前导零开头的缩短哈希值的
    nonce。


    让我们动手尝试一些 nonce。表 11-1 显示了 nonce、要哈希的文本以及得到的缩短哈希值。如你所见，nonce `614` 解开了哈希谜题，这意味着从
    nonce `0` 开始并以 `1` 递增，你需要 `615` 步才能找到解。如果限制条件是找到一个具有一个前导零的哈希值，那么你在四步之后就已经解决了，因为
    `Hello World! 3` 产生的哈希值有一个前导零。


    表 11-1. 求解哈希谜题的 Nonce


    | Nonce | 要哈希的文本 | 输出 |

    | --- | --- | --- |

    | 0 | `Hello World! 0` | `4EE4B774` |

    | 1 | `Hello World! 1` | `3345B9A3` |

    | 2 | `Hello World! 2` | `72040842` |

    | 3 | `Hello World! 3` | `02307D5F` |

    | … | … | … |

    | 613 | `Hello World! 613` | `E861901E` |

    | 614 | `Hello World! 614` | `00068A3C` |

    | 615 | `Hello World! 615` | `5EB7483F` |


    你可以自己在 [`www.blockchain-basics.com/HashPuzzle.html`](http://www.blockchain-basics.com/HashPuzzle.html)
    尝试。


    ### 难度级别


    要求哈希值满足特定限制是哈希谜题的核心。因此，限制条件及其描述都不是随意的。相反，哈希谜题使用的限制条件被标准化，以便计算机可以用哈希谜题来挑战其他计算机。在哈希谜题的背景下，限制条件通常分别称为难度或难度级别。难度用自然数表示，指哈希值必须具有的前导零的数量。因此，难度为
    `1` 表示哈希值必须具有（至少）一个前导零，而难度为 `10` 表示哈希值必须具有至少 `10` 个前导零。难度级别越高，所需的前导零就越多，哈希谜题就越复杂。哈希谜题越复杂，解决它所需的计算能力或时间就越多。

