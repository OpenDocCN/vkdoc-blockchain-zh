- fmt: "## Summary\n\n- 术语“区块链”具有歧义性；对不同的人来说，根据上下文其含义也不同。\n- 区块链可以指：\n    - 一种数据结构\n\
    \    - 一种算法\n    - 一套技术组合\n    - 一类具有共同应用领域的纯分布式点对点系统\n- 管理和明确所有权是区块链最突出的应用场景，但并非唯一场景。\n\
    - 区块链是一种纯分布式点对点账本系统，它利用一个由算法组成的软件单元，该算法协商有序且相互连接的区块的 informational 内容，并结合密码学和安全技术，以实现并维护其完整性。\n\
    \n**脚注** [1](#A436689_1_En_5_Chapter.html#Fn1_source)\n\nNakamoto, Satoshi. Bitcoin:\
    \ a peer-to-peer electronic cash system. 2008. [`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf).\n\
    \n# 6. 理解所有权的本质\n\n我们为何知道自己所拥有之物\n\n步骤 [5](#A436689_1_En_5_Chapter.html) 提供了区块链的初步定义，并阐述了为何所有权管理被视为其最突出的应用场景。本章节将深化区块链与其所有权管理这一重要应用场景之间的关系。具体而言，本章节揭示了纯分布式点对点系统中的信任与诚信（一方面）和所有权管理（另一方面）之间的联系。此外，本章节还对所有权的本质提供了一些通用见解，并介绍了基本的安全概念。\n\
    \n## 隐喻\n\n想象以下情景。在家里，你正将一个苹果装进午餐包。在去办公室的路上，你决定进一家超市买三明治和饼干。在收银台，你打开包准备取出要购买的商品。就在这时，超市员工看到了你，并注意到了你包里的那个苹果，恰好与超市出售的是同一种苹果。此时超市员工会作何感想？他可能会错误地根据观察断定你偷了店里的苹果。不幸的是，这家超市没有监控摄像头，也没有安保人员，而且你是此刻唯一的顾客。那么，你如何证明自己没有偷苹果呢？\n\
    \n## 所有权与见证人\n\n你是否曾想过，究竟是什么让你成为你所属物品的主人？可能因为你还在想超市里那个苹果的故事吧！那么，是什么让你成为包里那个苹果的主人呢？你如何证明你没有从超市偷它？\n\
    \n想象一下，你正站在法庭上，法官正在审理你那被指控的“苹果盗窃案”。你会如何证明你是苹果的主人？我们知道，在超市的例子中，如果没有人能证明你偷了苹果，就足以证明你的清白。然而，摆脱偷窃嫌疑并非所有权证明。所以，让我们回到证明所有权的问题上。\n\
    \n如果有人能证明你在去超市之前就已经买了这个苹果，那将大有帮助。幸运的是，你记得买苹果的那家店，并且卖苹果给你的店员愿意为你作证。但你低估了检察官。他在交叉询问中与你的证人交谈，并提出尖锐问题：他还记得卖给你的那个苹果吗？他能确认卖给你的那个特定苹果就是你包里的那个吗？他能确认你就是买那个特定苹果的人吗？最后，他究竟为什么能记住所有这些细节？有没有可能你付钱给了证人，让他为你的清白作证？这就归结为一个基本原则：有一个证人是好的，但拥有许多独立的证人才是说服检察官相信你清白的关键。\n\
    \n最后一点极为重要。为同一事实作证的独立证人越多，该事实为真的可能性就越大。事实证明，这一理念将成为区块链的核心概念之一。\n\n## 所有权的基础\n\n\
    将前一节的发现提升到更抽象的层面，可以说证明所有权涉及三个要素：\n\n- 对所有人的身份识别\n- 对所属物品的身份识别\n- 所有人对物品的映射关系\n\
    \n证人的证词可以实现所有这些要素。历史上，目击者常常是澄清这些要素的唯一来源。然而，依赖证人的口头证词非常耗时。因此，这些要素已被可信实体签发的文件所取代。如今，我们可以用身份证、出生证明和驾照来识别个人。可以使用序列号、生产日期、生产证明或详细描述来识别物品。这些文件一旦创建便不会改变，因为人与物的身份不会改变。\n\
    \n所有人对物品的映射关系通常通过分类账或登记簿来完成。这种文件并非创建后一成不变。每一次所有权的转移都需要记录在这样的登记簿中，因为过时的登记簿或分类账无法成为证明所有权的可信证人。拥有一份实时更新且管理有序的登记簿的重要性，促使许多社会建立了专门的机构。某些类型的物品价值越高，就越有可能存在由政府监管的登记簿来记录这些物品的所有权。这些登记簿大多数对所有人开放，以便于验证所有权并提供便捷的途径来澄清权属。你可以自行研究一下，在你的国家有哪些这样的登记簿，以及它们证明了什么。我找到了用于记录房地产、专利、船舶、飞机和公司所有权的分类账。我甚至还找到了用于记录婚姻、出生和死亡的登记簿。\n\
    \n图 [6-1](#A436689_1_En_6_Chapter.html#Fig1) 描绘了在设计所有权管理软件时所涉及的不同概念之间的关系。\n\n\
    ![A436689_1_En_6_Fig1_HTML.jpg](A436689_1_En_6_Fig1_HTML.jpg)\n\n*图 6-1. 所有权概念*\n\
    \n在图 [6-1](#A436689_1_En_6_Chapter.html#Fig1) 中，上层的概念比下层更为通用。每一层的概念可以被看作是上一层概念的具体化实现。例如，所有权证明需要同时对所有人及财产进行身份识别，以及建立所有人对财产的映射关系。所有权的行使则需要身份识别，以及认证和授权，以确保只有合法的人才能使用该财产。最底层的方框代表了实现层。它们展示了，例如，`password`和`signature`是用于实现认证和授权的概念。`ledger`可以被看作是一种实现所有人对财产映射关系的具体方式。"
  raw: "## Summary\n\n*   The term blockchain is ambiguous; it has different meanings\
    \ for different people depending on the context.\n*   Blockchain can refer to:\n\
    \    *   A data structure\n    *   An algorithm\n    *   A suite of technologies\n\
    \    *   A group of purely distributed peer-to-peer systems with a common application\
    \ area\n*   Managing and clarifying ownership is the most prominent application\
    \ case of the blockchain but is not the only one.\n*   The blockchain is a purely\
    \ distributed peer-to-peer system of ledgers that utilizes a software unit that\
    \ consists of an algorithm, which negotiates the informational content of ordered\
    \ and connected blocks of data together with cryptographic and security technologies\
    \ in order to achieve and maintain its integrity.\n\nFootnotes [1](#A436689_1_En_5_Chapter.html#Fn1_source)\n\
    \nNakamoto, Satoshi. Bitcoin: a peer-to-peer electronic cash system. 2008. [`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf)\
    \ .\n\n# 6. Understanding the Nature of Ownership\n\nWhy we know what we own\n\
    \nStep [5](#A436689_1_En_5_Chapter.html) provided a preliminary definition of\
    \ the blockchain and insight into why the management of ownership is regarded\
    \ as its most prominent application case. This step deepens the relation between\
    \ the blockchain and its prominent use case of managing ownership. In particular,\
    \ this step reveals the connection between trust and integrity of purely distributed\
    \ peer-to-peer systems, on the one hand, and managing ownership, on the other\
    \ hand. In addition, this step also provides some general insights into the nature\
    \ of ownership and introduces basic security concepts.\n\n## The Metaphor\n\n\
    Imagine the following situation. At home you are packing an apple into your bag\
    \ for lunch. On your way to the office, you decide to go into a supermarket to\
    \ buy a sandwich and some cookies. At the checkout point, you are opening your\
    \ bag to collect the items you are buying. Just in this moment the employee of\
    \ the supermarket is looking at you and sees the apple in your bag, which happens\
    \ to be the same kind of apples sold at the supermarket. What would the employee\
    \ of the supermarket be thinking in this moment? He could falsely conclude from\
    \ his observation that you may have stolen the apple from his store. Unfortunately,\
    \ that supermarket does not have any supervision cameras or any security personnel,\
    \ and you are the only customer at this moment. So how could you prove that you\
    \ did not steal the apple?\n\n## Ownership and Witnesses\n\nHave you ever thought\
    \ about what makes you the owner of the things that belong to you? Probably, because\
    \ you are still thinking about the apple in the supermarket story! So what makes\
    \ you the owner of the apple in your bag? How can you prove that you have not\
    \ stolen it from the supermarket?\n\nSo imagine you are in front of a court that\
    \ disputes your alleged apple-theft case. How would you prove that you are the\
    \ owner of the apple? We know that in the supermarket example, it would suffice\
    \ to prove your innocence when no one could testify that you had stolen the apple.\
    \ However, being discharged from the suspicion of being a thief is not proof of\
    \ ownership. So let’s stick to the question of proving your ownership.\n\nIt would\
    \ be of great help if someone could testify that you had bought the apple before\
    \ you went to the supermarket . Luckily, you remember the shop were you bought\
    \ the apple and the employee who sold the apple to you is willing to testify to\
    \ this. But you underestimated the prosecutor. He is talking to your witness in\
    \ the cross-examination and asking your witness hard questions: Can he remember\
    \ the apple he sold to you? Can he identify the specific apple he sold to you\
    \ as the apple found in your bag? Can he identify you as the person who bought\
    \ that particular apple? And finally why does he remember all these details in\
    \ the first place? Could it be possible that you paid the witness money for testifying\
    \ to your innocence? So this comes down to a basic principle: having one witness\
    \ is good, but having many independent witnesses is the key to convincing the\
    \ prosecutor of your innocence.\n\nThe last point is extremely important. The\
    \ more independent witnesses who testify to the same fact, the higher the chance\
    \ that this fact is indeed true. It turns out that this idea will be one of the\
    \ core concepts of the blockchain.\n\n## Foundations of Ownership\n\nTaking the\
    \ findings of the previous section to a more abstract level, one can state that\
    \ proving ownership involves three elements:\n\n*   An identification of the owner\n\
    *   An identification of the object being owned\n*   A mapping of the owner to\
    \ the object\n\nThe testimony of witnesses accomplishes all of these. Historically,\
    \ eyewitnesses have often been the only source of clarifying these elements. However,\
    \ relying on oral testimonies of witnesses is time-consuming. As a result, these\
    \ elements have been replaced by documents issued by trustworthy entities. Nowadays,\
    \ we can identify people with ID cards, birth certificates, and driver’s licenses.\
    \ Serial numbers, production dates, production certificates, or a detailed description\
    \ can be used to identify objects. These documents do not change once they are\
    \ created because the identities of people and objects do not change.\n\nThe mapping\
    \ between owners and objects is typically done with a ledger or register . This\
    \ is not a document that stays constant once created. Every transfer of ownership\
    \ needs to be documented in such a register because an outdated register or ledger\
    \ cannot be a trustworthy witness for testifying ownership. The importance of\
    \ having an up-to-date and orderly managed register has led to the development\
    \ of special institutions in many societies. The more valuable certain kinds of\
    \ objects are, the higher the chance for the existence of a government-regulated\
    \ ledger that documents the ownership of those objects. Most of these ledgers\
    \ are open to everyone in order to make it easy to verify ownership and provide\
    \ easy access to clarify ownership. You may do some research on your own to identify\
    \ some of these ledgers in your country and to what they testify. I found ledgers\
    \ for documenting ownership of real estate, patents, ships, airplanes, and companies.\
    \ I even found registers for marriages, births, and deaths.\n\nFigure [6-1](#A436689_1_En_6_Chapter.html#Fig1)\
    \ depicts the relation of the different concepts involved when designing software\
    \ for managing ownership.\n\n![A436689_1_En_6_Fig1_HTML.jpg](A436689_1_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1.\n\nConcepts of ownership\n\nIn Figure [6-1](#A436689_1_En_6_Chapter.html#Fig1),\
    \ the concepts in the top layers are more general than those in the lower layers.\
    \ The concepts on each layer can be seen as realizations of the concepts in layers\
    \ above them. For example, the proof of ownership requires identification of owners\
    \ and property alike as well as the mapping between owners and property. The use\
    \ of ownership requires identification as well as authentication and authorization\
    \ to ensure that only the legitimate person uses the property. The boxes in the\
    \ very bottom row represent the implementation layer. They show, for example,\
    \ that password and signature are concepts used to implement authentication and\
    \ authorization. A ledger can be seen as a concrete implementation of a mapping\
    \ between owners to their property."
