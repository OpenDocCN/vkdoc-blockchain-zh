    that was spent for creating it has led to the following two criteria:


    *   The longest-chain-criterion[²](#A436689_1_En_19_Chapter.html#Fn2)

    *   The heaviest-chain-criterion[³](#A436689_1_En_19_Chapter.html#Fn3)'
  trans: '

    # 核心理念


    公园里踏出小径的例子表明，群体可以通过独立且一致地用脚投票，在集体决策问题上达成一致或共识。这种投票的结果通常被称为**分布式共识**，因为它是在独立行动的个体之间达成的，没有中央控制或协调元素。


    > **注意**：共识是独立个体间达成一致的代名词。分布式共识则是纯粹分布式点对点系统成员之间达成的一致。


    由独立行动的群体或蜂群解决集体问题的情况，可以通过以下条件来描述¹：


    1.  一群个体在相同的环境中运作。

    2.  存在一个集体决策问题。

    3.  这些个体独立地努力实现同一个目标。

    4.  为实现目标所执行的个体行为会在环境中留下可见标记，有助于解决集体决策问题。

    5.  个体基于环境的变化，使用相同的标准来评估决策问题。


    区块链的理念是让所有节点独立地用脚投票，从而就交易历史版本的选择达成集体共识。在本书目前阶段我们所知的区块链，满足了集体决策的前四个条件：


    1.  所有节点都在相同的环境中运作，这个环境包括网络、维护各自 `blockchain-data-structure` 副本的节点，以及规范节点行为的 `blockchain-algorithm`。

    2.  决策问题是要集体选择一条交易历史。

    3.  所有节点都力求最大化其通过向 `blockchain-data-structure` 添加有效新区块所获得的个人奖励收入。

    4.  为了实现各自的目标，所有节点都将自己的新区块发送给所有对等节点，以供其检验和接受。因此，每个节点都在由集体维护的 `blockchain-data-structure`
    这一环境中留下了自己的足迹。


    然而，还缺少第五点：所有节点基于环境变化做出决策时所使用的标准。如何选择交易数据历史的思路，基于新区块是如何被添加到 `blockchain-data-structure`
    中，以及数据是如何被保护免受篡改的。由于工作量证明的存在，添加新区块的计算成本很高，并且使得篡改交易历史的尝试在计算上更加昂贵。因此，当存在多个冲突版本时，花费在创建交易历史上的累计计算工作量似乎是一个自然的选择标准。如果系统中的所有节点都应用相同的标准来选择交易历史，那么系统中的所有节点最终都会就该历史的同一版本达成一致。这个集体选定的交易历史版本通常被称为权威链或权威历史。


    ## 工作原理


    根据创建交易历史所花费的计算工作量来选择交易历史的思路，引出了以下两个标准：


    -   最长链准则²

    -   最重链准则³

    '
- fmt: "### The Longest-Chain-Criterion\n\nThe longest-chain-criterion is based on\
    \ the idea that the blockchain-data-structure that comprises the most blocks represents\
    \ the most aggregated computational effort. In order to study this criterion,\
    \ let’s consider an initial situation were all the nodes of a distributed system\
    \ maintain and agree on the identical version of the blockchain-data-structure,\
    \ as depicted in Figure [19-1](#A436689_1_En_19_Chapter.html#Fig1), which presents\
    \ a schematic blockchain-data-structure that omits many details for simplicity.\
    \ Each of the boxes represents one block that is identified with a shortened hash\
    \ value. The arrow that points from one box to another represents the hash reference\
    \ that links a block header to its predecessor. In this initial situation, all\
    \ nodes agree on one history of the transaction data and strive for extending\
    \ the existing chain with another block that refers to block `A397` as its predecessor.\n\
    \n![A436689_1_En_19_Fig1_HTML.jpg](A436689_1_En_19_Fig1_HTML.jpg)\n\nFigure 19-1.\
    \ Initial blockchain-data-structure in a distributed system\n\nFinding a new block\
    \ is a race among all nodes because it requires the solution of the block-specific\
    \ hash puzzle. Figure [19-2](#A436689_1_En_19_Chapter.html#Fig2) shows the blockchain-data-structure\
    \ that the majority of nodes maintain after one node solved the hash puzzle of\
    \ a new block and sent it to its peers. As a result, those nodes that maintain\
    \ a blockchain-data-structure as depicted in Figure [19-2](#A436689_1_En_19_Chapter.html#Fig2)\
    \ strive to extend it with a new block that refers to block `AB12` as its predecessor.\
    \ From the majority point of view, only one version of the blockchain-data-structure\
    \ consisting of three blocks exists. However, sending a new block through a network\
    \ costs time and it encounters all sorts of adversaries. Due to a delay in the\
    \ message passing, a minority of nodes have not received block `AB12` yet. Hence,\
    \ they still try to extend the chain depicted in Figure [19-1](#A436689_1_En_19_Chapter.html#Fig1).\
    \ Eventually, one of them successfully solves the hash puzzle for a new block\
    \ with the hash value `DD01` and passes it to its peers. Eventually, the majority\
    \ of nodes have received both block `AB12` and block `DD01`. As a result, the\
    \ majority of nodes maintain a blockchain-data-structure as depicted in Figure\
    \ [19-3](#A436689_1_En_19_Chapter.html#Fig3), which consists of two branches on\
    \ top of a common trunk. In such a situation, the longest-chain-criterion does\
    \ not yield an unambiguous result because both chains (`AB12 → A397 → 33FF` and\
    \ `DD01 → A397 → 33FF`) have the same length.\n\n![A436689_1_En_19_Fig3_HTML.jpg](A436689_1_En_19_Fig3_HTML.jpg)\n\
    \nFigure 19-3. The blockchain-data-structure after a delayed block was delivered\n\
    \n![A436689_1_En_19_Fig2_HTML.jpg](A436689_1_En_19_Fig2_HTML.jpg)\n\nFigure 19-2.\
    \ Result of adding a new block to the existing blockchain-data-structure\n\nIn\
    \ the situation presented in Figure [19-3](#A436689_1_En_19_Chapter.html#Fig3),\
    \ the nodes are free to decide which branch to extend. Some nodes may strive to\
    \ find a new block that refers to block `AB12` as its predecessor, while other\
    \ nodes strive for finding a new block that refers to block `DD01` as its predecessor.\
    \ Suddenly, the majority of nodes receive two new blocks, `BB11` and `CCC1`, which\
    \ both refer to block `AB12` as its predecessor. This can happen due to two nodes\
    \ finishing the proof of work for their blocks nearly at the same time. The result\
    \ of incorporating these two new blocks into the blockchain-data-structure is\
    \ a data structure that contains three chains, as shown in Figure [19-4](#A436689_1_En_19_Chapter.html#Fig4).\
    \ One of the chains only consists of three blocks, while the other two consist\
    \ of four blocks.\n\n![A436689_1_En_19_Fig4_HTML.jpg](A436689_1_En_19_Fig4_HTML.jpg)\n\
    \nFigure 19-4. A blockchain-data-structure after two nodes finish the proof of\
    \ work at nearly the same time\n\nThe longest-chain-criterion clearly rules out\
    \ the shortest chain, which is the chain `DD01 → A397 → 33FF`. However, the longest-chain-criterion\
    \ does not yield an unambiguous result because there are two chains of the same\
    \ length. As a result, some nodes may strive to find a new block that refers to\
    \ block `BB11` as its predecessor, while other nodes may strive to find a new\
    \ block that refers to block `CCC1` as its predecessor.\n\nEventually, one new\
    \ block arrives that refers to block `BB11` as its predecessor, which yields the\
    \ data structure as depicted in Figure [19-5](#A436689_1_En_19_Chapter.html#Fig5).\
    \ The blockchain-data-structure depicted in Figure [19-5](#A436689_1_En_19_Chapter.html#Fig5)\
    \ contains many conflicting versions of the transaction history, but the longest-chain-criterion\
    \ yields one unambiguous result that is the chain consisting of the blocks `0101\
    \ → BB11 → AB12 → A397 → 33FF`. The majority of nodes and eventually all nodes\
    \ of the system will use that chain for clarifying ownership-related requests.\
    \ The majority of nodes and eventually all nodes of the system will strive to\
    \ extend this branch by finding a new block that refers to block `0101` as its\
    \ predecessor.\n\n![A436689_1_En_19_Fig5_HTML.jpg](A436689_1_En_19_Fig5_HTML.jpg)\n\
    \nFigure 19-5. Schematic illustration of a blockchain-data-structure that contains\
    \ one longest chain after a new block arrived\n\nAn important result is that the\
    \ blockchain-data-structure actually does not look like a straight chain, instead\
    \ it looks more like a tree or a columnar cactus, a blockcactus so to speak. The\
    \ branches of the tree represent conflicting versions of the transaction history,\
    \ but based on the longest-chain-criterion, all nodes eventually identify the\
    \ identical version of the transaction history consentaneously.\n\n> **Note**\
    \  \n> Due to its shape, the blockchain-data-structure is often referred to as\
    \ a tree-data-structure. The very first and therefore oldest block in the blockchain-data-structure\
    \ is the one that has no predecessor, and it is often called the root of the tree-shaped\
    \ structure. A block without a successor is called the leaf. A straight sequence\
    \ of blocks from the root to a leaf is called the path."
  raw: '### The Longest-Chain-Criterion


    The longest-chain-criterion is based on the idea that the blockchain-data-structure
    that comprises the most blocks represents the most aggregated computational effort.
    In order to study this criterion, let’s consider an initial situation were all
    the nodes of a distributed system maintain and agree on the identical version
    of the blockchain-data-structure, as depicted in Figure [19-1](#A436689_1_En_19_Chapter.html#Fig1),
    which presents a schematic blockchain-data-structure that omits many details for
    simplicity. Each of the boxes represents one block that is identified with a shortened
    hash value. The arrow that points from one box to another represents the hash
    reference that links a block header to its predecessor. In this initial situation,
    all nodes agree on one history of the transaction data and strive for extending
    the existing chain with another block that refers to block A397 as its predecessor.


    ![A436689_1_En_19_Fig1_HTML.jpg](A436689_1_En_19_Fig1_HTML.jpg)


    Figure 19-1.


    Initial blockchain-data-structure in a distributed system


    Finding a new block is a race among all nodes because it requires the solution
    of the block-specific hash puzzle . Figure [19-2](#A436689_1_En_19_Chapter.html#Fig2)
    shows the blockchain-data-structure that the majority of nodes maintain after
    one node solved the hash puzzle of a new block and sent it to its peers. As a
    result, those nodes that maintain a blockchain-data-structure as depicted in Figure
    [19-2](#A436689_1_En_19_Chapter.html#Fig2) strive to extend it with a new block
    that refers to block AB12 as its predecessor. From the majority point of view,
    only one version of the blockchain-data-structure consisting of three blocks exists.
    However, sending a new block through a network costs time and it encounters all
    sorts of adversaries. Due to a delay in the message passing, a minority of nodes
    have not received block AB12 yet. Hence, they still try to extend the chain depicted
    in Figure [19-1](#A436689_1_En_19_Chapter.html#Fig1). Eventually, one of them
    successfully solves the hash puzzle for a new block with the hash value DD01 and
    passes it to its peers. Eventually, the majority of nodes have received both block
    AB12 and block DD01\. As a result, the majority of nodes maintain a blockchain-data-structure
    as depicted in Figure [19-3](#A436689_1_En_19_Chapter.html#Fig3), which consists
    of two branches on top of a common trunk. In such a situation, the longest-chain-criterion
    does not yield an unambiguous result because both chains (AB12 → A397 → 33FF and
    DD01 → A397 → 33FF) have the same length.


    ![A436689_1_En_19_Fig3_HTML.jpg](A436689_1_En_19_Fig3_HTML.jpg)


    Figure 19-3.


    The blockchain-data-structure after a delayed block was delivered


    ![A436689_1_En_19_Fig2_HTML.jpg](A436689_1_En_19_Fig2_HTML.jpg)


    Figure 19-2.


    Result of adding a new block to the existing blockchain-data-structure


    In the situation presented in Figure [19-3](#A436689_1_En_19_Chapter.html#Fig3),
    the nodes are free to decide which branch to extend.


    Some nodes may strive to find a new block that refers to block AB12 as its predecessor,
    while other nodes strive for finding a new block that refers to block DD01 as
    its predecessor. Suddenly, the majority of nodes receive two new blocks, BB11
    and CCC1, which both refer to block AB12 as its predecessor. This can happen due
    to two nodes finishing the proof of work for their blocks nearly at the same time.
    The result of incorporating these two new blocks into the blockchain-data-structure
    is a data structure that contains three chains, as shown in Figure [19-4](#A436689_1_En_19_Chapter.html#Fig4).
    One of the chains only consists of three blocks, while the other two consist of
    four blocks.


    ![A436689_1_En_19_Fig4_HTML.jpg](A436689_1_En_19_Fig4_HTML.jpg)


    Figure 19-4.


    A blockchain-data-structure after two nodes finish the proof of work at nearly
    the same time


    The longest-chain-criterion clearly rules out the shortest chain, which is the
    chain DD01 → A397 → 33FF. However, the longest-chain-criterion does not yield
    an unambiguous result because there are two chains of the same length. As a result,
    some nodes may strive to find a new block that refers to block BB11 as its predecessor,
    while other nodes may strive to find a new block that refers to block CCC1 as
    its predecessor.


    Eventually, one new block arrives that refers to block BB11 as its predecessor,
    which yields the data structure as depicted in Figure [19-5](#A436689_1_En_19_Chapter.html#Fig5).
    The blockchain-data-structure depicted in Figure [19-5](#A436689_1_En_19_Chapter.html#Fig5)
    contains many conflicting versions of the transaction history, but the longest-chain-criterion
    yields one unambiguous result that is the chain consisting of the blocks 0101
    → BB11 → AB12 → A397 → 33FF. The majority of nodes and eventually all nodes of
    the system will use that chain for clarifying ownership-related requests. The
    majority of nodes and eventually all nodes of the system will strive to extend
    this branch by finding a new block that refers to block 0101 as its predecessor.


    ![A436689_1_En_19_Fig5_HTML.jpg](A436689_1_En_19_Fig5_HTML.jpg)


    Figure 19-5.


    Schematic illustration of a blockchain-data-structure that contains one longest
    chain after a new block arrived


    An important result is that the blockchain-data-structure actually does not look
    like a straight chain , instead it looks more like a tree or a columnar cactus,
    a blockcactus so to speak. The branches of the tree represent conflicting versions
    of the transaction history, but based on the longest-chain-criterion, all nodes
    eventually identify the identical version of the transaction history consentaneously.


    Note


    Due to its shape, the blockchain-data-structure is often referred to as a tree-data-structure
    . The very first and therefore oldest block in the blockchain-data-structure is
    the one that has no predecessor, and it is often called the root of the tree-shaped
    structure. A block without a successor is called the leaf. A straight sequence
    of blocks from the root to a leaf is called the path.'
  trans: "\n### 最长链准则\n\n最长链准则基于以下理念：包含最多区块的区块链数据结构代表着最集中的计算工作量。为了研究这一准则，让我们考虑一个初始情形：分布式系统的所有节点都维护并认同同一个版本的区块链数据结构，如图\
    \ 19-1 所示，该图展示了一个简化了许多细节的区块链数据结构示意图。每个方框代表一个区块，并用缩短的哈希值进行标识。从一个方框指向另一个方框的箭头，代表将区块头链接到其前一个区块的哈希引用。在这个初始状态下，所有节点都认同同一个交易数据历史记录，并致力于用另一个以区块`A397`作为前驱的新区块来扩展现有链。\n\
    \n![A436689_1_En_19_Fig1_HTML.jpg](img/A436689_1_En_19_Fig1_HTML.jpg)\n\n图 19-1.\
    \ 分布式系统中的初始区块链数据结构\n\n寻找新区块是所有节点之间的一场竞赛，因为这需要解出该区块特定的哈希谜题。图 19-2 展示了当某个节点解出了新区块的哈希谜题并将其发送给对等节点后，大多数节点所维护的区块链数据结构。因此，那些维护如图\
    \ 19-2 所示区块链数据结构的节点，会致力于用另一个以区块`AB12`作为前驱的新区块来扩展它。从多数节点的角度来看，只存在一个由三个区块组成的区块链数据结构版本。然而，通过网络发送新区块需要时间，并且会遭遇各种不利情况。由于消息传输的延迟，少数节点尚未收到区块`AB12`。因此，它们仍在尝试扩展图\
    \ 19-1 中所示的链。最终，其中一个节点成功解出了哈希值为`DD01`的新区块的哈希谜题，并将其传递给其对等节点。最终，大多数节点都收到了区块`AB12`和区块`DD01`。结果，大多数节点维护的区块链数据结构如图\
    \ 19-3 所示，该结构在共同的主干之上产生了两个分支。在这种情况下，最长链准则无法给出明确的结果，因为两条链（`AB12 → A397 → 33FF`\
    \ 和 `DD01 → A397 → 33FF`）长度相同。\n\n![A436689_1_En_19_Fig3_HTML.jpg](img/A436689_1_En_19_Fig3_HTML.jpg)\n\
    \n图 19-3. 延迟区块送达后的区块链数据结构\n\n![A436689_1_En_19_Fig2_HTML.jpg](img/A436689_1_En_19_Fig2_HTML.jpg)\n\
    \n图 19-2. 向现有区块链数据结构添加新区块的结果\n\n在图 19-3 所示的情况下，节点可以自由决定扩展哪个分支。一些节点可能会努力寻找以区块`AB12`作为前驱的新区块，而另一些节点则会努力寻找以区块`DD01`作为前驱的新区块。突然，大多数节点收到了两个新区块`BB11`和`CCC1`，这两个区块都以区块`AB12`作为前驱。这可能是因为两个节点几乎同时完成了各自区块的工作量证明。将这两个新区块纳入区块链数据结构的结果是产生了一个包含三条链的数据结构，如图\
    \ 19-4 所示。其中一条链仅由三个区块组成，而另外两条链则由四个区块组成。\n\n![A436689_1_En_19_Fig4_HTML.jpg](img/A436689_1_En_19_Fig4_HTML.jpg)\n\
    \n图 19-4. 两个节点几乎同时完成工作量证明后的区块链数据结构\n\n最长链准则明确排除了最短的链，即 `DD01 → A397 → 33FF` 这条链。然而，最长链准则无法给出明确的结果，因为存在两条长度相同的链。因此，一些节点可能会努力寻找以区块`BB11`作为前驱的新区块，而其他节点则可能努力寻找以区块`CCC1`作为前驱的新区块。\n\
    \n最终，一个以区块`BB11`作为前驱的新区块到达，形成了如图 19-5 所示的数据结构。图 19-5 中描绘的区块链数据结构包含多个相互冲突的交易历史版本，但最长链准则给出了一个明确的结果：即由区块`0101\
    \ → BB11 → AB12 → A397 → 33FF` 组成的链。系统中的大多数节点，并最终是所有节点，都将使用这条链来处理与所有权相关的请求。系统中的大多数节点，并最终是所有节点，将致力于通过寻找一个以区块`0101`作为前驱的新区块来扩展这个分支。\n\
    \n![A436689_1_En_19_Fig5_HTML.jpg](img/A436689_1_En_19_Fig5_HTML.jpg)\n\n图 19-5.\
    \ 新区块到达后包含一条最长链的区块链数据结构的示意图\n\n一个重要结论是，区块链数据结构实际上并不是一条笔直的链，而更像一棵树或一种柱状仙人掌——可以说是一个区块仙人掌。树的分支代表了交易历史记录的冲突版本，但基于最长链准则，所有节点最终都会一致地识别出相同的交易历史记录版本。\n\
    \n> **注意**  \n> 由于其形状，区块链数据结构通常被称为树形数据结构。区块链数据结构中第一个，也是最古老的区块是没有前驱的区块，它通常被称为树形结构的根。没有后继的区块被称为叶节点。从根到叶节点的一条直线序列被称为路径。\n"
- fmt: '### The Heaviest-Chain-Criterion


    In Step [16](#A436689_1_En_16_Chapter.html) you learned that blockchain applications
    rarely utilize a constant difficulty level for the hash puzzle to be solved for
    adding a new block to the `blockchain-data-structure`. Instead, they typically
    determine the difficulty level dynamically, which causes the blocks to differ
    with respect to the computational effort that was spent for adding them to the
    `blockchain-data-structure`. On the other hand, the `longest-chain-criterion`
    is based on the idea that the path that contains the most blocks is the one that
    represents the most computational effort. However, in the case of heterogeneous
    difficulty levels, the longest path is not necessarily the one that represents
    the most computational effort.


    For each path, the computational effort that was spent upon it can be measured
    by adding up the difficulty level of all blocks that belong to it. This value
    can be calculated by utilizing the fact that the block header contains the difficulty
    level of its hash puzzle. The aggregated difficulty level of a path is often called
    its weight. Figure [19-6](#A436689_1_En_19_Chapter.html#Fig6) depicts the identical
    `blockchain-data-structure` as shown in Figure [19-5](#A436689_1_En_19_Chapter.html#Fig5)
    but this time it also shows the difficulty level for each of its blocks. The longest
    chain (the path from root `33FF` to leaf `0101`) has a weight of 5, while the
    second-longest chain (the path from root `33FF` to leaf `CCC1`) has a weight of
    6. Hence, the `blockchain-data-structure` depicted in Figure [19-6](#A436689_1_En_19_Chapter.html#Fig6)
    illustrates the situation where the `longest-chain-criterion` will cause the nodes
    to select a chain that does not represent the most computational effort.


    ![A436689_1_En_19_Fig6_HTML.jpg](A436689_1_En_19_Fig6_HTML.jpg)


    Figure 19-6. Schematic illustration of a `blockchain-data-structure` with difficulty
    levels


    As a result, blockchains that determine the difficulty level dynamically do not
    utilize the `longest-chain-criterion`. Instead, they utilize the `heaviest-chain-criterion`:
    they select that history of transaction data, which is represented by the heaviest
    chain. In the case that the difficulty level is identical for all blocks, the
    longest path is identical with the heaviest path and both the `longest-chain-criterion`
    and the `heaviest-chain-criterion` yield the identical result.


    ## Consequences of Selecting One Chain


    Selecting one specific chain among conflicting versions and establishing it as
    the authoritative chain has the following consequences:


    - Orphan blocks

    - Reclaimed reward

    - Clarifying ownership

    - Reprocessing of transactions

    - A growing common trunk

    - Eventual consistency

    - Robustness against manipulations


    ### Orphan Blocks


    The `blockchain-data-structure` that is grown collectively looks like a tree whose
    branches represent different conflicting versions of the transaction history.
    Applying a selection criterion actually means selecting one path of that tree
    and establishing it as the authoritative version of the history of transaction
    data. All blocks in the tree-shaped data structure that are not part of the authoritative
    path are abandoned by the nodes and are called orphan blocks.[⁴](#A436689_1_En_19_Chapter.html#Fn4)
    For example, when applying the `longest-chain-criterion` to the situation depicted
    in Figure [19-4](#A436689_1_En_19_Chapter.html#Fig4), the block `DD01` is an orphan
    block, while in Figure [19-5](#A436689_1_En_19_Chapter.html#Fig5), the blocks
    `DD01` and `CCC1` are not part of the longest chain and are abandoned. When applying
    the `heaviest-chain-criterion` to the situation depicted in Figure [19-6](#A436689_1_En_19_Chapter.html#Fig6),
    the blocks `0101`, `BB11`, and `DD01` are not part of the authoritative chain
    and therefore are abandoned.


    ### Reclaimed Reward


    Orphan blocks are useless for the purpose of clarifying ownership, as they do
    not contribute to the authoritative chain. As a result, the reward given to the
    node that created and submitted them is reclaimed. This is due to rule 11 and
    rule 13 of the `blockchain-algorithm` as explained in Step [18](#A436689_1_En_18_Chapter.html),
    which state that if a block that was added to the `blockchain-data-structure`
    is identified as invalid or useless later on, that block as well as all its subsequent
    blocks will be logically removed from the `blockchain-data-structure` and the
    reward that was given for adding it is withdrawn from the node that initially
    received it.


    ### Clarifying Ownership


    Only those transactions that are part of the authoritative chain are considered
    to have happened and are used to clarify ownership-related requests. Orphan blocks
    are not part of the collectively selected chain. Hence, their transaction data
    are not part of the history of the transaction data. Instead they are considered
    as if they never happened, and they are treated as nonexistent when it comes to
    clarifying ownership-related requests.


    ### Reprocessing of Transactions


    Transaction data that are part of orphan blocks were originally submitted with
    the goal of adding them to the transaction history. The fact that they are treated
    as if they never happened was never planned beforehand, instead, it is the result
    of the random nature of the proof of work and its role in growing the `blockchain-data-structure`.
    Transaction data that unluckily ended up in orphan blocks are given another chance
    to become part of the selected transaction history by putting them in the node''s
    inbox again to be reprocessed and added to the `blockchain-data-structure` later
    on. This is due to rule 11 of the `blockchain-algorithm`, as explained in Step
    [18](#A436689_1_En_18_Chapter.html). As a result, transactions that were once
    part of the authoritative chain can disappear for a while if the majority of nodes
    abandon the block to which they belong, but they will appear later as soon as
    they have been reprocessed.


    ### A Growing Common Trunk


    Applying a selection criterion does not always yield an unambiguous result. For
    example, in situations such as those depicted in Figure [19-3](#A436689_1_En_19_Chapter.html#Fig3)
    and Figure [19-4](#A436689_1_En_19_Chapter.html#Fig4), more than one longest chain
    exists. In these situations, the `blockchain-data-structure` has two equal length
    paths that arise from a common trunk. In Figure [19-3](#A436689_1_En_19_Chapter.html#Fig3),
    the common trunk consists of just two blocks that form a short chain `A397 → 33FF`.
    In Figure [19-4](#A436689_1_En_19_Chapter.html#Fig4), the common trunk already
    consists of three blocks that form the chain `AB12 → A397 → 33FF`, which includes
    the common trunk of the previous situation. Hence, even if a selection criterion
    yields ambiguous results, the conflicting versions of the transaction history
    arise from a less ambiguous common trunk. The deeper down the blockchain you look,
    the less ambiguous the decision whether or not a block is part of the longest
    chain.'
  raw: "### The Heaviest-Chain-Criterion\n\nIn Step [16](#A436689_1_En_16_Chapter.html)\
