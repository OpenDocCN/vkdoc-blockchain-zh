    \ Architecture\n\nThe architecture determines how the components or nodes of the\
    \ system are related and connected with one another. As illustrated in Figure\
    \ [21-5](#A436689_1_En_21_Chapter.html#Fig5), the blockchain utilizes a purely\
    \ distributed peer-to-peer system that consists of independent peers called nodes.\
    \ These nodes are connected with one another via a network that serves as a medium\
    \ for communication. Each of the peers maintains its own copy of the blockchain-data-structure\
    \ containing the whole history of transaction data. The peers communicate with\
    \ one another by utilizing a gossip-style message-passing protocol that ensures\
    \ that eventually each peer will receive all of the information.\n\n![A436689_1_En_21_Fig5_HTML.jpg](A436689_1_En_21_Fig5_HTML.jpg)\n\
    \nFigure 21-5.\n\nArchitecture and its underlying concepts\n\n#### Consensus Logic\n\
    \nSince all the nodes of the distributed system maintain their history of transaction\
    \ data independently, their content can differ due to delays or other adversities\
    \ of passing messages through a network. As a result, the data store that was\
    \ meant to form a straight line of linked data blocks actually forms a three-shaped\
    \ data structure where each branch represents a conflicting version of the transaction\
    \ history. The consensus logic as depicted in Figure [21-6](#A436689_1_En_21_Chapter.html#Fig6)\
    \ makes all nodes of the system eventually consistent by making them choose the\
    \ identical version of the transaction history that unites the most collective\
    \ effort.\n\n![A436689_1_En_21_Fig6_HTML.jpg](A436689_1_En_21_Fig6_HTML.jpg)\n\
    \nFigure 21-6.\n\nConsensus logic and its underlying concepts\n\n## Gaining Abstraction\n\
    \nAbstraction is gained by identifying and distinguishing the components of the\
    \ blockchain that are specific to the goal of managing ownership from those that\
    \ are agnostic to the specific application goal. This is consistent with our understanding\
    \ of the blockchain-technology-suite, as discussed in Step [5](#A436689_1_En_5_Chapter.html).\
    \ Evidently, the ownership logic and transaction data are components that are\
    \ specific to the application, since they determine how ownership is described\
    \ with transaction data and how ownership is clarified and transferred. On the\
    \ other hand, transaction security and the transaction procession logic are less\
    \ specific to the application goal. The former utilizes the generic concepts of\
    \ identification, authentication, authorization, and digital signatures that can\
    \ be used in any other application as well. As shown in Figure [21-3](#A436689_1_En_21_Chapter.html#Fig3),\
    \ the latter is a huge data processing apparatus whose majority of components\
    \ are agnostic to the application goal. The only component of the transaction\
    \ processing logic that is tightly coupled with the application goal is the validation\
    \ of transaction data. All other components such as competition, peer control,\
    \ reward, punishment, and the validation of block headers are agnostic to the\
    \ specific data being processed. Figure [21-7](#A436689_1_En_21_Chapter.html#Fig7)\
    \ illustrates the result of distinguishing application-specific components of\
    \ a blockchain from those that are agnostic to the specific application goal,\
    \ which in turn form the blockchain-technology-suite.\n\n![A436689_1_En_21_Fig7_HTML.jpg](A436689_1_En_21_Fig7_HTML.jpg)\n\
    \nFigure 21-7.\n\nThe blockchain-technology-suite within the blockchain\n\n##\
    \ Outlook\n\nThis step focused on bringing all of the pieces of the preceding\
    \ steps together in order to gain an overview of the blockchain. The openness\
    \ and the absence of any form of central control or coordination are the foundation\
    \ of the system as they allow its nodes to act as independent witnesses for clarifying\
    \ ownership-related matters. However, these characteristics may also cause unwanted\
    \ consequences. What these unwanted consequences are and how they may limit the\
    \ use of the blockchain will be discussed in the next step.\n\n## Summary\n\n\
    *   The blockchain is a purely distributed peer-to-peer system that addresses\
    \ the following aspects of managing ownership:\n    *   Describing ownership:\
    \ History of Transaction Data\n    *   Protecting ownership: Digital Signature\n\
    \    *   Storing transaction data: Blockchain-Data-Structure\n    *   Preparing\
    \ ledgers for being distributed: Immutability\n    *   Distributing ledgers: Gossip-Style\
    \ Information Forwarding Through a Network\n    *   Processing new transactions:\
    \ Blockchain-Algorithm\n    *   Deciding which ledger represents the truth: Distributed\
    \ Consensus\n*   Analyzing the blockchain involves the following aspects:\n  \
    \  *   The application goal\n    *   Its properties\n    *   Its internal functioning\n\
    *   The blockchain has two application goals:\n    *   Clarifying ownership\n\
    \    *   Transferring ownership\n*   The blockchain fulfills its application goals\
    \ while exhibiting the following qualities:\n    *   Highly available\n    * \
    \  Censorship proof\n    *   Reliable\n    *   Open\n    *   Pseudoanonymous\n\
    \    *   Secure\n    *   Resilient\n    *   Eventually consistent\n    *   Keeping\
    \ integrity\n*   Internally the blockchain consists of components that are either\
    \ specific or agnostic to the application goal of managing ownership.\n*   The\
    \ application-specific components of the blockchain are:\n    *   Ownership logic\n\
    \    *   Transaction data\n    *   Transaction processing logic\n    *   Transaction\
    \ security\n*   The application-agnostic components are:\n    *   The blockchain-technology-suite\n\
    \    *   The purely distributed peer-to-peer architecture\n*   The blockchain-technology-suite\
    \ consists of:\n    *   Storage logic\n    *   Consensus logic\n    *   Data processing\
    \ logic\n    *   Asymmetric cryptography\n\n# Part IV\nLimitations and Their Solutions\n\
    \nLimitations and How to Overcome Them\n\nThis learning stage focuses on the major\
    \ limitations of the blockchain, the reasons they occur, and the possible ways\
    \ to overcome them. By the end of this stage, you will understand why the original\
    \ idea of the blockchain that was explained in the previous steps may not be suitable\
    \ for large-scale commercial applications and what changes have been suggested\
    \ to overcome these limitations as well as their consequences. Finally, this stage\
    \ will familiarize you with the terminology used to refer to the major variations\
    \ of the blockchain."
  trans: "\n### 存储逻辑\n对有效交易的处理会导致它们被添加到整个交易数据历史记录中，即将其添加到一个维护完整交易数据历史记录的数据存储中。整个系统的完整性及其履行其阐明和转移所有权目的的能力，依赖于该数据存储的完整性。因此，存储逻辑关注于维护完整的交易数据历史记录，并通过追求让修改数据变得极其昂贵的理念，来保护这些数据免遭篡改、伪造或仿冒。如图\
    \ 21-4 所示，存储逻辑通过维护一个基于工作量证明和`区块链数据结构`的、不可变且仅可追加的数据存储来实现这一点。其运作可以追溯到哈希谜题、哈希引用和对变更敏感的数据结构，而后者又可以追溯到加密哈希值的基本概念。图\
    \ 21-4 通过将派生概念分层放置在代表更基本概念的方框之上，描绘了存储逻辑的依赖关系。\n\n![A436689_1_En_21_Fig4_HTML.jpg](img/A436689_1_En_21_Fig4_HTML.jpg)\n\
    \n图 21-4. 存储逻辑及其基础概念\n\n### 点对点架构\n该架构决定了系统的组件或节点如何相互关联和连接。如图 21-5 所示，区块链利用了一个纯粹分布式的点对点系统，该系统由称为节点的独立对等点组成。这些节点通过作为通信媒介的网络相互连接。每个对等点都维护着自己的一份包含完整交易数据历史记录的`区块链数据结构`副本。对等点通过利用一种\
    \ gossip 风格的消息传递协议进行通信，该协议确保每个对等点最终都能接收到所有信息。\n\n![A436689_1_En_21_Fig5_HTML.jpg](img/A436689_1_En_21_Fig5_HTML.jpg)\n\
    \n图 21-5. 架构及其基础概念\n\n### 共识逻辑\n由于分布式系统的所有节点都独立维护自己的交易数据历史记录，因此由于网络传递消息的延迟或其他不利因素，它们的内容可能会有所不同。结果，原本应形成一条直线状链接数据块的数据存储，实际上形成了一个树状的数据结构，其中每个分支代表交易历史的一个冲突版本。如图\
    \ 21-6 所示的共识逻辑，通过让所有节点选择凝聚了最多集体努力的、完全相同的交易历史版本，最终使系统的所有节点达成一致。\n\n![A436689_1_En_21_Fig6_HTML.jpg](img/A436689_1_En_21_Fig6_HTML.jpg)\n\
    \n图 21-6. 共识逻辑及其基础概念\n\n## 获得抽象\n获得抽象的过程，涉及识别和区分区块链中那些特定于管理所有权目标的组件与那些对特定应用目标无关的组件。这与我们在第\
    \ 5 步中所讨论的对`区块链技术套件`的理解是一致的。显然，所有权逻辑和交易数据是特定于应用的组件，因为它们决定了如何用交易数据描述所有权，以及如何阐明和转移所有权。另一方面，交易安全和交易处理逻辑则不那么特定于应用目标。前者利用了识别、认证、授权和数字签名这些通用概念，这些概念同样可用于任何其他应用。如图\
    \ 21-3 所示，后者是一个庞大的数据处理装置，其大部分组件与应用目标无关。交易处理逻辑中唯一与应用目标紧密耦合的组件是交易数据的验证。所有其他组件，如竞争、对等点控制、奖励、惩罚以及区块头的验证，都与正在处理的特定数据无关。图\
    \ 21-7 展示了区分区块链中特定于应用的组件与对特定应用目标无关的组件的结果，这些无关组件反过来构成了`区块链技术套件`。\n\n![A436689_1_En_21_Fig7_HTML.jpg](img/A436689_1_En_21_Fig7_HTML.jpg)\n\
    \n图 21-7. 区块链中的`区块链技术套件`\n\n## 展望\n这一步专注于将前面所有步骤的各个部分整合在一起，以便对区块链有一个全面的了解。开放性以及没有任何形式的中央控制或协调，是该系统的基础，因为它们允许其节点充当独立的证人，以澄清与所有权相关的事务。然而，这些特性也可能导致意想不到的后果。这些意想不到的后果是什么，以及它们可能如何限制区块链的使用，将在下一步中讨论。\n\
    \n## 总结\n*   区块链是一个纯粹分布式的点对点系统，它解决了管理所有权的以下方面：\n    *   描述所有权：交易数据历史记录\n    *\
    \   保护所有权：数字签名\n    *   存储交易数据：`区块链数据结构`\n    *   准备账本以便分发：不可变性\n    *   分发账本：通过网络的\
    \ Gossip 风格信息转发\n    *   处理新交易：`区块链算法`\n    *   决定哪个账本代表真相：分布式共识\n*   分析区块链涉及以下几个方面：\n\
    \    *   应用目标\n    *   其特性\n    *   其内部运作机制\n*   区块链有两个应用目标：\n    *   阐明所有权\n\
    \    *   转移所有权\n*   区块链在展现以下特质的同时实现其应用目标：\n    *   高可用性\n    *   抗审查性\n    * \
    \  可靠性\n    *   开放性\n    *   伪匿名性\n    *   安全性\n    *   弹性\n    *   最终一致性\n  \
    \  *   保持完整性\n*   从内部看，区块链由特定于管理所有权应用目标或与该目标无关的组件组成。\n*   区块链中特定于应用的组件是：\n   \
    \ *   所有权逻辑\n    *   交易数据\n    *   交易处理逻辑\n    *   交易安全\n*   与应用无关的组件是：\n    *\
    \   `区块链技术套件`\n    *   纯粹分布式的点对点架构\n*   `区块链技术套件`由以下部分组成：\n    *   存储逻辑\n    *\
    \   共识逻辑\n    *   数据处理逻辑\n    *   非对称加密\n\n# 第四部分：局限性及其解决方案\n## 局限性与如何克服它们\n本学习阶段聚焦于区块链的主要局限性、它们产生的原因，以及可能的克服方法。在本阶段结束时，你将理解为什么前面步骤中解释的区块链原始想法可能不适合大规模商业应用，以及为克服这些局限性及其后果而提出了哪些变革。最后，本阶段将使你熟悉用于指代区块链主要变体的术语。\n"
- fmt: '# 22. Seeing the Limitations


    Even a perfect machine has limitations


    Step [21](#A436689_1_En_21_Chapter.html) brought all the pieces together and yielded
    an overview of the blockchain as a whole, highlighting the interdependency of
    its underlying technical concepts. As a result, we concluded that the blockchain
    is a complex and highly sophisticated technical construct. One can state without
    exaggeration that it is the masterpiece of an ingenious mind. However, the blockchain
    is neither perfect nor free of limitations. Hence, this step highlights and explains
    major limitations of the blockchain and why these limitations cause significant
    hurdles for its commercial use. Finally, this step sketches how the limitations
    of the blockchain can be overcome.


    ## The Challenge


    The blockchain is a purely distributed peer-to-peer system that allows everyone
    to read the transaction history and add new transaction data to the collectively
    maintained data store. The openness and the absence of any form of central control
    or coordination are the foundation of the system as they allow its nodes to act
    as independent witnesses for clarifying ownership-related matters. However, openness
    and the absence of central control may have unwanted consequences that limit the
    usability of the system. Hence, the challenge is to identify and understand the
    consequences of the system in order to formulate strategies to overcome them.


    ## Technical Limitations of the Blockchain


    The most important technical limitations of the blockchain are:


    - Lack of privacy

    - The security model

    - Limited scalability

    - High costs

    - Hidden centrality

    - Lack of flexibility

    - Critical size


    ### Lack of Privacy


    The blockchain is a purely distributed peer-to-peer ledger that maintains the
    whole history of transaction data. All transaction details such as the goods and
    the amount being transferred, the involved accounts, and the time of transfer
    are accessible to everyone.[¹](#A436689_1_En_22_Chapter.html#Fn1) This is necessary
    in order to allow every peer to clarify ownership and to verify new transactions
    (e.g., by identifying double-spending attacks). Hence, the lack of privacy is
    a constituting element of the blockchain. Without that level of transparency,
    the blockchain could not fulfill its duty. However, this level of transparency
    is often regarded as a limiting factor for application cases that require more
    privacy.


    ### The Security Model


    The blockchain utilizes asymmetric cryptography for identification, authentication
    of users, and for authorizing transactions. Account numbers in the blockchain
    are actually public cryptographic keys. Only the one who possesses the corresponding
    private key can access the property that is associated with an account. Only transaction
    data that contain a digital signature that was created with the corresponding
    private key are valid and can transfer property from one account to another one.
    The private key is the only security instrument that authorizes the lawful owner.
    As soon as the private key of an account is given to some else, either on purpose,
    by accident, by mistake, or due to data robbery, the security for that individual
    account is broken.


    There are no additional security measures that protect the property that is associated
    with an account number. It is important to point out that the asymmetric cryptography
    used in the blockchain is considered as being among the best and strongest cryptographic
    methods available. Hence, there is no failure or flaw in the security concept
    of the blockchain per se. However, there is no additional safety net to protect
    the users of the blockchain from losing or unwillingly share their private key
    with others. This is similar to the way security keys are used in real life to
    protect houses or cars or the way in which PIN numbers are used to secure credit
    or debit cards. Once you give someone the key, regardless of the circumstances
    or the reason why that happened, the security is broken and anyone who has the
    PIN or the key can withdraw money from your credit card or can drive away with
    your car. The private key of a blockchain account is no exception to that. However,
    some people consider the lack of additional security measures a limiting factor
    for the usage of the blockchain.


    ### Limited Scalability


    The blockchain is a peer-to-peer system that aims to achieve two goals: on the
    one hand, it allows everyone to add new transaction data to the collectively maintained
    history; on the other hand, it ensures that the history of transaction data is
    protected from being manipulated or forged. The blockchain balances both goals
    by utilizing an immutable append-only data structure that requires the solution
    of a hash puzzle every time a new block is added. Solving that hash puzzle is
    time consuming on purpose. Insisting on the solution of the hash puzzle is an
    appropriate way to make attempts to manipulate the history of transaction data
    prohibitive costly. Unfortunately, this security measure comes at the price of
    reduced processing speed and hence limited scalability. This characteristic of
    the blockchain is considered a serious hurdle for using it in contexts that require
    high processing speed, high scalability, and high throughput.


    ### High Costs


    The issue of high costs is related to the problem of limited scalability. Solving
    the hash puzzle or providing the proof of work is computationally expensive on
    purpose. It is the security measure that makes the history of transaction data
    immutable. The computational costs can be expressed in a variety of scales such
    as the number of computational cycles, physical time, electrical energy, and money.
    However, the result is always the same: The proof of work is expensive. Hence,
    the whole blockchain incurs costs. The magnitude of these costs depends on the
    difficulty of the hash puzzles.


    ### Hidden Centrality


    The requirement to solve a hash puzzle for each block being added to the blockchain-data-structure
    and the rules for distributing rewards for contributing to the integrity of the
    system cause a race of arms among the peers. Those who have the necessary financial
    resources invest in specialist hardware that makes solving the hash puzzle and
    hence contributing to the system profitable.[²](#A436689_1_En_22_Chapter.html#Fn2)
    On the other hand, the venture of validating and adding new transaction data to
    the system becomes unprofitable for those without access to specialist hardware,
    which as a consequence causes them to withdraw from contributing computational
    resources to the system. As a result, the supposedly large and diverse group of
    peers that collectively maintains the integrity of the system eventually becomes
    a very small group of entities that each owns huge computational power in the
    form of specialist hardware. The remaining group of peers forms an oligopoly that
    divides the responsibility of maintaining the integrity of the system among themselves.
    Similar to oligopolies in other industries, this small group of entities could
    abuse its power (e.g., by omitting specific transactions or discriminating specific
    users). This effect establishes a kind of hidden centrality that undermines the
    distributed nature of the whole system.[³](#A436689_1_En_22_Chapter.html#Fn3)
    From a technical point of view, such a system is still a distributed system, but
    it is a system whose integrity is maintained by only a small number of entities.'
