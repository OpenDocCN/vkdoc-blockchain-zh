  trans: '

    # 目标


    此处的目标是理解构成区块链的概念。出于教学目的，我将提出一个挑战：设计你自己的所有权管理系统。因此，你将面临与区块链发明者曾经面对并成功解决的相同挑战：设计一个软件系统，在一个完全开放且不可信的环境中，通过纯粹的分布式点对点账本系统来管理所有权。


    # 起点


    作为起点，所考虑系统的主要事实可总结如下：


    - 该系统将是一个纯粹的分布式点对点系统，由用户贡献的计算资源构成。

    - 该点对点系统使用互联网作为连接各个节点的网络。

    - 节点的数量、可信度以及可靠性均未知。

    - 该点对点系统的目标是管理数字商品（例如，销售积分或数字货币）的所有权。


    # 遵循的路径


    当设计和开发一个软件系统，该软件系统通过在一个开放且不可信的环境中使用纯粹的分布式点对点账本系统来管理所有权时，需要处理七个主要任务：


    - 描述所有权

    - 保护所有权

    - 存储交易数据

    - 准备可在不可信环境中分发的账本

    - 分发账本

    - 向账本中添加新交易

    - 决定哪个账本代表真相


    ## 任务 1：描述所有权


    在开始开发区块链之前，你需要问自己想要用它做什么。由于你将设计一个管理所有权的软件系统，你必须首先决定如何描述所有权。结果证明，交易是描述任何所有权转移的好方法，而完整的交易历史是识别当前所有者的关键。因此，步骤
    9 将解释交易、它们是什么、如何描述它们，以及如何使用它们来阐明所有权。


    ## 任务 2：保护所有权


    使用交易来描述所有权仅仅是起点。此外，你需要一种方法来防止他人访问他人的财产。在现实生活中，你可以通过使用带锁的门来轻松防止他人使用你的汽车或进入你的房屋。事实证明，密码学提供了一种在个体层面保护交易的方法，类似于带锁的门保护你的个人汽车或房屋的方式。


    保护所有权有三个主要要素：识别和验证所有者，以及限制对财产的访问仅限其所有者。步骤 12 和 13 将更详细地解释这些概念。然而，这些步骤依赖于哈希值的概念。如果你以前从未听说过哈希值，也不必担心。我在步骤
    10 和 11 中详细解释了哈希值。这两个步骤也将为那些已经具有技术背景或了解哈希值的人提供有趣的见解。


    ## 任务 3：存储交易数据


    通过交易描述所有权，并拥有在个体交易层面保护所有权的安全措施，是朝着设计一个管理所有权的软件系统这一目标迈出的重要步骤。然而，你需要一种方法来存储完整的交易历史，因为此历史记录用于阐明所有权。由于交易历史是阐明所有权的核心要素，因此必须以安全的方式存储它。事实证明，区块链数据结构在数字上等同于账本。步骤
    14 和 15 解释了区块链数据结构作为数字账本所需满足的要求以及其实现方式。


    ## 任务 4：准备可在不可信环境中分发的账本


    拥有一个包含交易数据的孤立账本或区块链数据结构固然很好，但你的目标是设计一个在不可信环境中运行的分布式点对点账本系统。因此，你将拥有在不可信网络中不可信节点上运行的账本副本。此外，你将把对账本的控制权交给整个网络，而没有任何中央控制或协调点。你如何防止账本被伪造或篡改（例如，通过从历史中删除交易或向其中添加非法交易）？事实证明，防止交易历史被更改的最佳方法是使其不可更改。这意味着账本以及其中的交易历史一旦写入便无法更改。因此，你将不必担心账本被篡改或伪造，因为它们从一开始就无法更改。然而，拥有一个永远无法更改的分布式点对点账本系统听起来非常安全，但几乎毫无用处，因为它不允许你添加新交易。因此，区块链数据结构的挑战在于：一方面要不可更改，另一方面要接受新交易的添加。这听起来像是术语上的矛盾，但事实证明，通过步骤
    16 中解释的一个技术技巧，这是可以实现的。结果是一种仅可追加的区块链数据结构：可以添加新交易，但几乎不可能更改过去已添加的数据。


    ## 任务 5：分发账本


    一旦账本仅可追加，你就可以通过向任何请求的人提供其副本来创建一个分布式点对点账本系统。然而，仅仅提供仅可追加账本的副本并不能实现你的目标。一个管理所有权的分布式系统分别涉及对等点或节点之间的交互。因此，步骤
    17 解释了系统中的节点如何相互交互以及它们之间交换什么信息。


    ## 任务 6：向账本中添加新交易


    分布式点对点系统将由成员组成，其计算机维护着仅可追加区块链数据结构的个人副本。由于该数据结构允许你添加新的交易数据，你必须确保只添加有效且经过授权的交易。事实证明，这可以通过允许点对点系统的所有成员添加新数据，并将点对点系统的每个成员转变为其他成员的监督者来实现。结果，所有成员将相互监督，并指出其同伴犯下的任何错误。步骤
    18 更详细地解释了这种方法，以及给予成员履行其职责的激励措施。

