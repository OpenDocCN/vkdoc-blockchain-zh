    将前一节的发现提升到更抽象的层面，可以说证明所有权涉及三个要素：\n\n- 对所有人的身份识别\n- 对所属物品的身份识别\n- 所有人对物品的映射关系\n\
    \n证人的证词可以实现所有这些要素。历史上，目击者常常是澄清这些要素的唯一来源。然而，依赖证人的口头证词非常耗时。因此，这些要素已被可信实体签发的文件所取代。如今，我们可以用身份证、出生证明和驾照来识别个人。可以使用序列号、生产日期、生产证明或详细描述来识别物品。这些文件一旦创建便不会改变，因为人与物的身份不会改变。\n\
    \n所有人对物品的映射关系通常通过分类账或登记簿来完成。这种文件并非创建后一成不变。每一次所有权的转移都需要记录在这样的登记簿中，因为过时的登记簿或分类账无法成为证明所有权的可信证人。拥有一份实时更新且管理有序的登记簿的重要性，促使许多社会建立了专门的机构。某些类型的物品价值越高，就越有可能存在由政府监管的登记簿来记录这些物品的所有权。这些登记簿大多数对所有人开放，以便于验证所有权并提供便捷的途径来澄清权属。你可以自行研究一下，在你的国家有哪些这样的登记簿，以及它们证明了什么。我找到了用于记录房地产、专利、船舶、飞机和公司所有权的分类账。我甚至还找到了用于记录婚姻、出生和死亡的登记簿。\n\
    \n图 6-1 描绘了在设计所有权管理软件时所涉及的不同概念之间的关系。\n\n![A436689_1_En_6_Fig1_HTML.jpg](img/A436689_1_En_6_Fig1_HTML.jpg)\n\
    \n*图 6-1. 所有权概念*\n\n在图 6-1 中，上层的概念比下层更为通用。每一层的概念可以被看作是上一层概念的具体化实现。例如，所有权证明需要同时对所有人及财产进行身份识别，以及建立所有人对财产的映射关系。所有权的行使则需要身份识别，以及认证和授权，以确保只有合法的人才能使用该财产。最底层的方框代表了实现层。它们展示了，例如，`password`和`signature`是用于实现认证和授权的概念。`ledger`可以被看作是一种实现所有人对财产映射关系的具体方式。\n"
- fmt: '# A Short Detour to Security


    Figure [6-1](#A436689_1_En_6_Chapter.html#Fig1) used three major security related
    concepts that need to be explained in more detail, as their meaning in the context
    of software systems might be a bit different from their common usage:


    *   `Identification`

    *   `Authentication`

    *   `Authorization`


    The meaning and interrelation of these three concepts can be illustrated by a
    real-world example. Perhaps you attempt to buy a bottle of wine in a liquor shop.
    Liquor shops are not allowed to sell alcoholic drinks to those who are underage.
    How does the liquor shop ensure that it sells wine only to the right people? The
    liquor shop accomplishes this by using identification, authentication, and authorization.
    And here is an explanation how this works.


    ## `Identification`


    `Identification` just means to claim to be someone by stating a name or anything
    else that could be used as an identifier.[¹](#A436689_1_En_6_Chapter.html#Fn1)
    In the liquor shop example, one could claim to be a certain person by stating
    a name. `Identification` does not prove that you really are who you claim to be.
    `Identification` does not involve the proof that you are not underage. `Identification`
    just means claiming to be a certain person.


    ## `Authentication`


    The purpose of `authentication` is to prevent someone from claiming to be someone
    else. `Authentication` means verifying or proving that you really are who you
    claim to be [¹](#A436689_1_En_6_Chapter.html#Fn1) . This proof can be provided
    by something you have or something you know that can serve as proof that you really
    are who you claim to be (e.g., an ID card, a driver’s license, or some details
    of the life of the person you claim to be). It is important that the proof of
    your claimed identity is uniquely connected to you (e.g., a photograph of your
    face, a fingerprint, or something else that identifies you uniquely). In the liquor
    shop example, this means that you can prove that you really are who you claimed
    to be by showing a driver’s license that contains a photograph of you. Comparing
    your face with the face shown on the photograph on the driver’s license accomplishes
    the verification. If you look like the person in the photograph of the driver’s
    license, the `authentication` is successful. Otherwise, the `authentication` fails.
    Double checking one’s face with the photograph on the driver’s license aims to
    prevent someone from using someone else’s driver’s license.


    ## `Authorization`


    `Authorization` means granting access to specific resources or services due to
    the characteristics or properties of one’s identity [¹](#A436689_1_En_6_Chapter.html#Fn1)
    . `Authorization` is the consequence of both a successful `authentication` and
    evaluation of one’s characteristics or rights. In the liquor shop example, `authorization`
    means to decide whether you are allowed to buy a bottle of wine based on the date
    of birth shown on your driver’s license. The shop assistant will refuse to sell
    you a bottle of wine if you are too young based on the date of birth shown on
    your driver’s license. Note that in this case the refusal is not due to a failed
    `authentication`. `Identification` and `authentication` worked well, and because
    of the correct identification, the shop assistant can identify you as an underage
    person. Hence, `authorization` is always the result of evaluating the characteristics
    or properties of the previously authenticated identity against some rules.


    > **Note:** `Identification` means claiming to be someone. `Authentication` means
    proving that you really are who you claimed to be. `Authorization` means getting
    access to something due to the previously authenticated identity.


    ## Purposes and Properties of a Ledger


    Figure [6-2](#A436689_1_En_6_Chapter.html#Fig2) illustrates how the proof of ownership
    and transfer of ownership relate to the purpose and the properties of a ledger.


    ![A436689_1_En_6_Fig2_HTML.jpg](A436689_1_En_6_Fig2_HTML.jpg)


    **Figure 6-2.** Concepts and principles of a ledger


    The major lesson to be learned from Figure [6-2](#A436689_1_En_6_Chapter.html#Fig2)
    is the fact that a ledger has to fulfill two opposing roles. On the one hand,
    a ledger serves as a means for proving ownership, which relies on reading historic
    data preserved in the ledger . On the other hand, the ledger has to document any
    transfer of ownership, which in turn implies that new data are produced and written
    to the ledger. One of the most important differences of these two purposes can
    be summarized in the opposing nature of transparency and privacy.


    Proving ownership is easier when the ledger is open to anyone. Hence, transparency
    is the basis of proving ownership rights in a similar way as witnesses making
    a public testimony in court. However, transferring ownership must be exclusively
    restricted to the lawful owner. So privacy forms the basis of transferring ownership.
    Since writing in the ledger means changing ownership, only very trustful entities
    should be given writing access to ledgers.


    The conflicting forces of transparency vs. privacy, proving ownership vs. transferring
    ownership, and reading the ledger vs. writing the ledger can also be found in
    the blockchain. It turns out that the blockchain is a gigantic distributed peer-to-peer
    system of ledger-like data structures that can be read by everyone.


    ## Ownership and the Blockchain


    A witness in the form of a government-regulated ledger is the key in clarifying
    ownership of valuable goods. But what happens if such a ledger is damaged or destroyed?
    Or what happens if someone responsible for updating the ledger makes an error
    or forges it on purpose? In this case, the ledger does not reflect reality. This
    is disastrous because everybody believes that the ledger represents the truth,
    similar to a witness in court.


    The problem of having only one ledger as the source for clarifying ownership can
    be solved in the same way as it has been solved for trials in court. Basing a
    verdict only on the testimony of one single witness is risky since this witness
    could be dishonest. Having more witnesses is better. The more independent witnesses
    who are interrogated, the higher the chance that those facts that are consistently
    mentioned among the majority of testimonies reflect the truth. This fact can be
    proved by means of statistics and the law of large numbers. Having many witnesses
    who independently make their own observations free of mutual influences is the
    key for this approach to finding the truth.


    Applying this finding to the use of a ledger for clarifying ownership is straightforward:
    Instead of maintaining only one single ledger that could be forged, one should
    utilize a purely distributed peer-to-peer system of ledgers and clarify requests
    concerning ownership on that version of the reality on which the majority of peers
    agrees.


    At this point you might be wondering what all this has to do with the blockchain.
    The relation between managing ownership with a ledger and the blockchain is summed
    up as:


    *   An individual ledger is used for maintaining information about ownership,
    which is equivalent to one `blockchain-data-structure` storing ownership-related
    data.

    *   The individual ledgers are stored on the computers (nodes) of a peer-to-peer
    system.

    *   The `blockchain-algorithm` is responsible for letting the individual nodes
    collectively arrive at one consistent version of the state of ownership on which
    the final verdict is based.

    *   Integrity in this system is its ability to make true statements about ownership.

    *   Cryptography is necessary for creating a trustworthy means of identification,
    authentication, and authorization and ensuring data security.


    ## Outlook


    This step highlighted important characteristics of ownership and how they relate
    to the properties of ledgers. Furthermore, this step sketched how the blockchain
    relates to ownership and ledgers. The next step discusses an important consequence
    of having ownership managed in a purely distributed peer-to-peer system of ledgers.'
