  trans: '

    # 区块链的目标冲突


    区块链面临两大冲突：


    - 透明性 vs. 隐私性

    - 安全性 vs. 速度


    ## 透明性 vs. 隐私性


    区块链根据所有交易数据的完整历史记录来明确所有权，这些数据对所有人公开。因此，区块链类似于一个公开的交易登记簿或公共账本。公开透明是区块链验证所有权的核心理念。这种公开性是解决双重支付问题的基础，因为每个人都可以审计他人的交易，从而轻松发现双重支付攻击。


    然而，这种做法与隐私概念背道而驰。隐私意味着将交易数据或其细节（如涉及的账户或转账金额）对公众隐藏。因此，由此产生的冲突在于：一方面是需要澄清所有权的透明性，另一方面是用户对更高隐私性的需求。


    ## 安全性 vs. 速度


    可以毫不夸张地说，交易数据的历史记录是区块链的核心。交易数据的历史记录受到保护，防止被篡改和伪造，其方式是将数据存储在一个不可变的仅追加的 `blockchain-data-structure`
    中，这要求每添加或重写一个区块都要解决一个哈希难题。这不仅使得篡改或伪造交易数据历史记录的成本高得令人望而却步，也拖慢了向 `blockchain-data-structure`
    添加新交易数据的速度。这与商业环境中许多应用对速度和可扩展性的需求形成了对比。因此，由此产生的冲突在于：一方面是基于耗时的工作量证明来保障交易数据历史记录的安全性，另一方面是用户对速度和可扩展性的需求。


    # 冲突的根源


    这两大冲突的根源在于区块链的两项基本操作：读取和写入交易数据。公开性 vs. 隐私性的冲突可以追溯到读取 `blockchain-data-structure`
    的操作，而安全性 vs. 速度的冲突则可以追溯到向 `blockchain-data-structure` 写入数据的操作。表格 23-1 总结了两大主要技术限制、潜在冲突以及区块链相应基本功能之间的关系。


    **表 23-1.** 区块链的技术限制及其原因


    | 技术限制 | 冲突 | 基本功能 |

    | --- | --- | --- |

    | 缺乏隐私性 | 透明性 vs. 隐私性 | 读取交易数据历史记录 |

    | 缺乏可扩展性 | 安全性 vs. 速度 | 向数据存储中写入交易数据 |


    # 解决冲突


    解决冲突可以通过在相互竞争的目标之间寻找平衡点来实现，也可以通过强制执行其中一个目标而牺牲其他所有目标。迄今为止所讨论的区块链，选择了透明性和安全性，而牺牲了隐私性和速度。但还有其他的方法可以解决这些冲突，将在以下章节中详细讨论。


    ## 在透明性与隐私性之间做出决策


    在透明性与隐私性的冲突中做出决策，实际上意味着决定授予谁读取权限。如果只考虑授予读取权限的极端情况，有两种选择：向所有人授予读取权限，或仅向有限的一组节点或用户授予读取权限。可以根据哪些用户或节点有权读取
    `blockchain-data-structure` 以及创建新交易¹，来区分以下类型的区块链：


    - **公有链**向所有用户或节点授予读取权限和创建新交易的权利。

    - **私有链**将读取权限和创建新交易的权利限制在一组预先选定的用户或节点中。


    ## 在安全性与速度之间做出决策


    在安全性与速度的冲突中做出决策，实际上意味着决定授予谁写入权限。如果只考虑授予写入权限的极端情况，有两种选择：向所有人授予写入权限，但通过要求工作量证明使其在计算上代价高昂；或者将写入权限限制在一组预先选定的、被认定为可信赖的用户或节点，并要求他们提供一种成本较低的工作量证明变体。我们可以根据授予写入权限的方式²，区分以下类型的区块链：


    - **无许可链**向所有人授予写入权限。每个用户或节点都可以验证交易，并创建新区块添加到 `blockchain-data-structure` 中。

    - **许可链**仅将写入权限授予一组有限的、通过入职流程被认定为可信赖的预选节点或用户。因此，只有拥有写入权限的节点组才被允许验证交易并参与分布式共识过程。


    # 区块链的四种版本


    关于读取和写入权限的决策可以独立进行。表 23-2 展示了在结合读取和写入限制的极端情况时出现的四种区块链版本。


    **表 23-2.** 结合读取和写入限制产生的四种区块链版本


    | 写入权限 | 所有人（读取权限） | 受限（读取权限） |

    | --- | --- | --- |

    | 所有人 | 公有 & 无许可 | 私有 & 无许可 |

    | 受限 | 公有 & 许可 | 私有 & 许可 |


    在步骤 5 中定义并在前面所有步骤中讨论的区块链是一种公有无许可链。对 `blockchain-data-structure` 的读取或写入权限施加任何限制，都会产生其中一种替代版本。区块链中保密性最强的版本是私有许可链。这个版本被认为在商业环境中最为实用，因为它具有更高的处理速度，并且能够向公众隐藏交易数据。


    # 后果


    限制对交易数据历史记录的读取或写入权限，会影响区块链的以下几个方面：


    - 点对点架构

    - 分布式特性

    - 目的


    ## 点对点架构


    在步骤 3 中，您了解到了点对点系统及其特性。点对点系统的一个主要特征（通常被视为其构成性特征）是，系统中包含的计算机在权利和角色方面都是平等的。尽管单个节点在其贡献的资源方面可能有所不同，但系统中的所有节点都具有相同的功能能力和责任。然而，如上文介绍的四种区块链版本，在向构成系统的节点授予读取和写入权限方面存在差异。如果节点在读取或写入交易数据的能力上存在差异，那么它们就不再平等。因此，由于对系统的读取和写入权限引入限制，点对点系统的一个重要特征似乎受到了破坏。

    '
- fmt: "### The Distributed Nature\n\nIn Step [2](#A436689_1_En_2_Chapter.html) you\
    \ learned about distributed systems and some of their properties. One of the major\
    \ features that is often considered the constituting characteristic of distributed\
    \ systems is the absence of any kind of central control or coordination. However,\
    \ the emergence of the four different versions of the blockchain, as introduced\
    \ above, is based on granting a preselected group of nodes or users read or write\
    \ access to the history of transaction data while refusing these rights to all\
    \ others. But who decides on granting or refusing reading or writing access to\
    \ the system? Who makes the rules for granting or refusing reading or writing\
    \ access?\n\nIf the rules that govern the allocation of reading and writing access\
    \ are not administered and enforced by a purely distributed system, the system\
    \ will have a central element, which in turn causes a contradiction to the distributed\
    \ nature of the blockchain. The architecture of a presumably distributed system\
    \ that utilizes a central element for administering and enforcing the rules that\
    \ govern the allocation of reading and writing access could be depicted by the\
    \ illustration shown in Figure [2-2](#A436689_1_En_2_Chapter.html#Fig2). That\
    \ means there is either a hidden element of centrality or the system appears as\
    \ a centralized system to all nodes that have restricted access while utilizing\
    \ a distributed system internally. In both cases, the whole system has more in\
    \ common with a hybrid system consisting of distributed and centralized elements.\n\
    \n### Purpose\n\nIn Step [4](#A436689_1_En_4_Chapter.html) you learned that the\
    \ core problem to be solved by the blockchain is achieving and maintaining integrity\
    \ in a purely distributed peer-to-peer system that consists of an unknown number\
    \ of peers with unknown reliability and trustworthiness. Establishing restrictions\
    \ on reading and writing access not only changes constituting properties of distributed\
    \ peer-to-peer systems but also changes the trustworthiness of the nodes. If users\
    \ or nodes that are allowed to write data to the `blockchain-data-structure` are\
    \ evaluated regarding their trustworthiness beforehand in the course of an on-boarding\
    \ process, the resulting environment may no longer consist of nodes whose trustworthiness\
    \ is unknown. Hence, one may conclude that in such an environment the ability\
    \ of the blockchain to create trust from an untrustworthy environment is no longer\
    \ needed.\n\nThe blockchain causes value even in an environment that is made up\
    \ of a known number of nodes with presumably known reliability and trustworthiness\
    \ for the following reasons. First, the number of nodes in such a system can vary\
    \ due to technical failures or downtime. Second, every distributed system faces\
    \ the adversaries of networks that make communication on the level of individual\
    \ messages unreliable. Finally, even an on-boarding process may not guarantee\
    \ the trustworthiness of nodes at a 100 percent level. Additionally, even trustworthy\
    \ nodes may yield wrong results due to technical failures.\n\n## Reviewing the\
    \ Purpose of the Blockchain\n\nDue to the consequences of imposing restrictions\
    \ on the nodes on major aspects of the blockchain, we might revise our perception\
    \ of its purpose. Imposing restrictions on reading and writing access may cause\
    \ conflicts with the definition of the peer-to-peer system, the distributed nature\
    \ of systems, and the purpose of the blockchain. However, the blockchain is also\
    \ useful for maintaining integrity even in the most restricted case of a private\
    \ permissioned blockchain. As a result, we may decide to relax the conditions\
    \ under which the blockchain is supposed to create value. Instead of insisting\
    \ that the blockchain’s purpose is to maintain integrity of open and purely distributed\
    \ peer-to-peer systems, we could state that its purpose is achieving and maintaining\
    \ the integrity of distributed systems in general.\n\n## The Usage of the Term\
    \ Blockchain in the Remainder of This Book\n\nThe remainder of this book continues\
    \ with the use of the term `blockchain` in the sense of a public and permissionless\
    \ system. In all other cases, it will be pointed out explicitly what kind of restricted\
    \ blockchain is being considered.\n\n## Outlook\n\nThis step highlighted two approaches\
    \ for overcoming two major technical limitations of the blockchain. It explained\
    \ the emergence of four different kinds of blockchain with respect to the allocation\
    \ of reading and writing access rights to the `blockchain-data-structure`. Up\
    \ to this point of the book, the major ideas of the blockchain and its underlying\
    \ concepts have been discussed. However, I have not discussed how it can be used\
    \ in the real world. The next step will do that by considering both generic and\
    \ more specific-use cases.\n\n## Summary\n\n*   The blockchain inherently contains\
    \ the following conflicts:\n    *   Transparency vs. privacy: On the one hand,\
    \ transparency is needed for clarifying ownership and preventing double spending,\
    \ but on the other hand, its users require privacy.\n    *   Security vs. speed:\
    \ On the one hand, protecting the history of transaction data from being manipulated\
    \ is done by utilizing the computationally expensive proof of work, but on the\
    \ other hand, speed and scalability are required in most commercial contexts.\n\
    *   The transparency vs. privacy conflict has its root in the allocation of reading\
    \ access rights to the `blockchain-data-structure`.\n*   The security vs. speed\
    \ conflict has its root in the allocation of writing access rights to the `blockchain-data-structure`.\n\
    *   Solving the transparency vs. privacy conflict led to the following versions\
    \ of the blockchain:\n    *   Public blockchains grant reading access and the\
    \ right to create new transactions to all users or nodes.\n    *   Private blockchains\
    \ limit reading access and the right to create new transactions to a preselected\
    \ group of users or nodes.\n*   Solving the security vs. speed conflict led to\
    \ the following versions of the blockchain:\n    *   Permissionless blockchains\
    \ grant writing access to everyone. Every user or node can verify transaction\
    \ data and create and add new blocks to the `blockchain-data-structure`.\n   \
    \ *   Permissioned blockchains grant writing access only to a limited group of\
    \ preselected nodes or users that are identified as trustworthy through an on-boarding\
    \ process.\n*   Combining these restrictions pairwise led to the emergence of\
    \ four different kinds of blockchains.\n*   Restricting reading or writing access\
    \ results in consequences on the following properties of the blockchain:\n   \
    \ *   The peer-to-peer architecture\n    *   The distributed nature\n    *   Its\
    \ purpose\n*   The `blockchain-technology-suite` causes value even in restricted\
    \ environments for the following reasons:\n    *   The number of nodes can vary\
    \ due to technical failures or downtime.\n    *   Every distributed system faces\
    \ the adversaries of networks that make communication on the level of individual\
    \ messages unreliable.\n    *   Even an on-boarding process may not guarantee\
    \ the trustworthiness of nodes at a 100 percent level.\n    *   Even trustworthy\
    \ nodes may yield wrong results due to technical failures.\n\n### Footnotes\n\n\
    [1](#A436689_1_En_23_Chapter.html#Fn1_source)\n\nBitFury Group. Public versus\
    \ private blockchains Part 1: Permissioned blockchains. White paper, 2015. [`http://bitfury.com/content/5-white-papers-research/public-vs-private-pt1-1.pdf`](http://bitfury.com/content/5-white-papers-research/public-vs-private-pt1-1.pdf).\n\
    \n[2](#A436689_1_En_23_Chapter.html#Fn2_source)\n\nBitFury Group. Public versus\
    \ private blockchains Part 2: Permissioned blockchains. White paper, 2015. [`http://bitfury.com/content/5-white-papers-research/public-vs-private-pt2-1.pdf`](http://bitfury.com/content/5-white-papers-research/public-vs-private-pt2-1.pdf)."
