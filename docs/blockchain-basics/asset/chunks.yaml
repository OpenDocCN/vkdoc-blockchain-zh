    # 什么是区块链？


    在对构成区块链的各个概念有了总体了解之后，重要的是要看清它们如何协同工作。通过识别其应用层和实现层的功能性与非功能性方面来分析系统的方法，有助于我们迎接理解区块链各概念如何协同工作的挑战。表
    21-3 提供了区块链各层及其方面的概览，这将指导您将这些概念整合在一起。


    **表 21-3.** 区块链的层与方面


    | 层 | 功能性方面 | 非功能性方面 |

    | --- | --- | --- |

    | 应用层 | 明确所有权<br>转移所有权 | 高可用性<br>可靠<br>开放<br>伪匿名 |

    | 实现层 | 所有权逻辑<br>交易安全<br>交易处理逻辑<br>存储逻辑<br>共识逻辑<br>纯分布式点对点架构 | 安全<br>弹性<br>最终一致性<br>保持完整性
    |


    ## 区块链的目的：应用层的功能性方面


    区块链服务于两个目的：


    - 明确所有权

    - 转移所有权


    ### 明确所有权


    明确所有权意味着回答构成所有权的核心问题，即：谁在什么时间拥有多少数量的什么对象？


    ### 转移所有权


    转移所有权意味着改变当前的所有权状态。为此，区块链允许所有者将其财产转移给他人。因此，它回答了另一个证明所有权的核心问题，即：谁在什么时间将多少数量的什么对象的所有权转移给了谁？


    ## 区块链的特性：非功能性方面


    在与区块链交互时，您会注意到它如何履行其职责。区块链实现其目的的质量由其非功能性方面描述：


    - 高可用性

    - 抗审查

    - 可靠

    - 开放

    - 伪匿名

    - 安全

    - 弹性

    - 最终一致性

    - 保持完整性


    ### 高可用性


    区块链不会出现停机。相反，区块链全天候可用，一天 24 小时，一周 7 天，全年无休。它甚至没有关闭按钮。


    ### 抗审查


    没有任何人能单独决定区块链的内容或关闭整个系统。


    ### 可靠


    区块链始终如一地以高质量实现其目的。人们可以信任区块链能正确地明确和转移所有权。


    ### 开放


    区块链不排斥特定用户或计算机使用其服务。相反，它对所有人开放。


    ### 伪匿名


    区块链唯一地标识所有者，但既不维护也不揭示他们在现实世界中的身份。


    ### 安全


    区块链在两个方面是安全的：(1) 在单个交易层面，(2) 在整个系统层面。就个体层面而言，区块链确保所有权仅由合法所有者支配。在整体层面，区块链保护所有所有者的所有权免受操纵、篡改、伪造、双重支付和未授权访问。


    ### 弹性


    即使在不理想的条件下，区块链也能正确地明确和转移所有权。区块链能够抵御针对所有权的各种攻击，例如伪造、双重支付、假冒他人访问财产等。


    ### 最终一致性


    区块链并非始终产生一致的结果。相反，获得一致结果的可能性会随着时间推移而增加，并最终在整个系统中达到完全一致。


    ### 保持完整性


    区块链通过展现无逻辑错误的行为来维护其完整性。它在单个交易层面以及整个交易数据历史中维护数据一致性并确保安全性。


    ## 内部运作：实现层的功能性方面


    区块链的内部运作可追溯到以下几个主要组件：


    - 所有权逻辑

    - 交易安全

    - 交易处理逻辑

    - 存储逻辑

    - 点对点架构

    - 共识逻辑


    ### 所有权逻辑


    所有权逻辑规定了如何明确和转移所有权。区块链利用单个交易数据来描述所有权的转移，并维护整个交易数据来明确所有权。图 21-1 说明了所有权逻辑及其底层概念。上方方框所示的概念依赖于其下方的概念。最底行的方框展示了所有权逻辑所依赖且需要进一步详细说明的概念。


    ![A436689_1_En_21_Fig1_HTML.jpg](img/A436689_1_En_21_Fig1_HTML.jpg)


    **图 21-1.** 所有权逻辑及其底层概念


    区块链使用的所有权逻辑依赖于维护整个交易数据历史的存储逻辑和确保其一致性的共识逻辑。此外，所有权逻辑还依赖于确保仅有效交易数据被添加到数据存储中的交易处理逻辑，以及确保只有合法所有者才能将其财产转移到另一个账户的交易安全。这四个关注点由区块链的其余组件处理。


    ### 交易安全


    交易安全确保只有合法所有者才能访问其所有权并将其转移到另一个账户。图 21-2 说明了实现交易安全所涉及的概念。诸如加密哈希值和非对称加密等基本概念位于最底部的方框中，因为它们是位于其上方所有其他概念的基础。例如，数字签名位于授权之下，因为它是授权交易的一种手段，但它位于加密哈希值和私钥之上，因为它利用了这些概念。类似地，图
    21-2 使认证和身份识别对底层密码学的依赖关系更加明显。


    ![A436689_1_En_21_Fig2_HTML.jpg](img/A436689_1_En_21_Fig2_HTML.jpg)


    **图 21-2.** 交易安全及其底层概念


    ### 交易处理逻辑


    交易逻辑确保只有有效的交易数据被添加到集体维护的交易数据历史中。它显然依赖于对代表系统真正目标的交易数据的验证。系统中的每个单个节点都可以独立地验证交易数据。然而，单个节点可能在验证交易数据时出错，或者可能故意接受无效的交易数据。这两种情况都对整个系统的完整性构成威胁。因此，交易处理涉及一个复杂的机制，分别包含新区块或其区块头的验证：点对点架构以及对等节点的控制和竞争，这反过来依赖于奖惩的力量。图
    21-3 通过将这些概念呈现在相互叠加的方框中以指出它们的依赖关系，描绘了这些概念之间的关系。


    ![A436689_1_En_21_Fig3_HTML.jpg](img/A436689_1_En_21_Fig3_HTML.jpg)


    **图 21-3.** 交易处理逻辑及其底层概念

