- "# 第二部分  \n为什么需要区块链\n\n为什么需要区块链\n\n这一阶段解释了区块链旨在解决的问题以及解决此问题为何重要。本阶段还将加深你对区块链所在问题领域、其提供最大价值的环境，以及它与信任、完整性和所有权管理之间关系的理解。在本阶段结束时，你将更深入地理解区块链的目的，并对区块链这一术语本身达成有区分度的理解。\n\
  \n\n\n## 4. 发现核心问题\n\n### 如何统率一群独立的计算机\n\n前两个步骤概括指出了区块链的总体目标，并特别强调了其对纯分布式点对点系统的重要性。事实证明，维护分布式系统的完整性是区块链的主要目标。但为什么在分布式系统（尤其是纯分布式点对点系统）中维护完整性如此具有挑战性？本步骤通过揭示纯分布式点对点系统中信任与完整性之间的微妙关系来回答这个问题。因此，本步骤将加深您对完整性重要性的理解，并揭示区块链需要解决的主要问题。最后，本步骤描述了区块链有望提供最大价值的环境。\n\
  \n### 隐喻\n\n许多语言中都有形象的俗语来描述试图组织一群混乱个体的情形。例如，在英语中，人们将这种情况描述为“试图把猫赶在一起”（herding cats），这说明了将一群固执难缠、不服从甚至不承认中央权威的动物聚拢起来的挑战。试图组织一群不接受或不承认中央权威的个体这个问题听起来是否很熟悉？这恰好就是纯分布式点对点系统的情况，该系统由独立且自主的节点组成，没有任何形式的中央控制或协调。本步骤将解释纯分布式点对点系统的一个主要挑战及其与区块链的关系。\n\
  \n### 点对点系统中的信任与完整性\n\n信任和完整性是一枚硬币的两面。在软件系统的语境中，完整性是系统在安全、完整、一致、正确以及无破坏无错误方面的一个非功能性指标。信任则是人类在缺乏证据、证明或调查的情况下，对某人或某物的可靠性、真实性或能力的坚定信念。信任是预先给予的，并会根据持续互动结果而增强或减弱。\n\
  \n就点对点系统而言，这意味着用户只有在信任该系统，并且与系统持续交互的结果能够确认并强化这种信任时，才会加入并持续为系统做出贡献。为了满足用户的期望并强化他们对系统的信任，系统的完整性是必需的。如果由于缺乏完整性，系统未能强化用户的信任，用户就会放弃该系统，最终导致系统终止运行。鉴于信任对于点对点系统存续的重要性，主要问题在于：我们如何在纯分布式点对点系统中实现并维护完整性？\n\
  \n在纯分布式系统中实现并维护完整性取决于多种因素，其中一些最重要的因素包括：\n\n*   对节点或对等点数量的了解\n*   对对等点可信度的了解\n\n\
  如果已知节点的数量及其可信度，那么在分布式点对点系统中实现完整性的可能性就更高。这种情况类似于运营一个恪守高道德标准并对新成员实行严格准入流程的私人俱乐部。然而，在分布式点对点系统中实现完整性的最坏情况，是当节点的数量及其可信度都未知的时候。在互联网上运行一个对所有人开放的纯分布式点对点系统就是这种情况。\n\
  \n### 点对点系统中的完整性威胁\n\n为简单起见，我们可以考虑点对点系统中两个主要的完整性威胁：\n\n*   技术故障\n*   恶意对等点\n\n####\
  \ 技术故障\n\n点对点系统由用户的个人计算机构成，这些计算机通过网络进行通信。计算机系统的所有硬件和软件组件，以及计算机网络的任何组件，都存在发生故障或产生错误的固有风险。因此，任何分布式系统都必须面对其组件可能发生故障或偶然产生错误结果的问题。\n\
  \n#### 恶意对等点\n\n恶意成员是点对点系统中的第二个完整性威胁。这种不可信来源并非技术问题，而是由那些决定利用系统为自身牟利的个体目标所引起的问题。可以说，这种威胁更多地与社会学和群体动力学相关，而非技术。不诚实和恶意的对等点构成了对点对点系统最严重的威胁，因为它们攻击了所有点对点系统赖以建立的基础：信任。一旦用户无法再信任他们的对等点，他们就会离开并停止向系统贡献计算资源。因此，成员数量将会减少，整个系统对剩余成员的吸引力也会降低，这反过来又会加速系统的衰落，最终导致系统被完全抛弃。\n\
  \n### 区块链需要解决的核心问题\n\n在所有条件最优的情况下实现完整性和信任很容易。真正的挑战是在最坏的情况下，在一个分布式系统中实现完整性和信任。而这正是区块链应该解决的问题。区块链需要解决的核心问题是，在一个由数量未知且可靠性和可信度未知的对等点组成的纯分布式点对点系统中，实现并维护完整性。这个问题并非新问题。它实际上是计算机科学中一个广为人知且被广泛讨论的问题。借用军事术语，这个问题通常被称为**拜占庭将军问题**。¹\n\
  \n> **注意**\n> 区块链要解决的问题是：在一个由数量未知且可靠性和可信度未知的对等点组成的纯分布式点对点系统中，实现并维护完整性。\n\n### 展望\n\
  \n本步骤强调了完整性和信任在点对点系统中的重要性。此外，本步骤指出了区块链需要解决的核心问题，并强调了其在实现点对点系统完整性和信任方面的重要性。然而，我们仍未给出“区块链”这个术语的定义。这将是下一步的主题。\n\
  \n### 总结\n\n*   完整性和信任是点对点系统的主要关注点。\n*   只有当用户信任点对点系统，并且与系统持续交互的结果能够确认并强化这种信任时，他们才会加入并持续做出贡献。\n\
  *   一旦用户对点对点系统失去信任，他们就会放弃它，这最终将导致系统终止。\n*   点对点系统中的主要完整性威胁包括：\n    *   技术故障\n  \
  \  *   恶意对等点\n*   在点对点系统中实现完整性取决于：\n    *   对对等点数量的了解\n    *   对对等点可信度的了解\n*   区块链需要解决的核心问题是：在一个由数量未知且可靠性和可信度未知的对等点组成的纯分布式点对点系统中，实现并维护完整性。\n\
  \n**脚注**\n\n1 Lamport, Leslie, Robert Shostak, and Marshall Pease. The Byzantine\
  \ generals problem. *ACM Transactions on Programming Languages and Systems (TOPLAS)*\
  \ 4.3 (1982): 382–401.\n\n\n\n## 5. 厘清术语\n\n定义区块链的四种方式\n\n在前面的步骤中，你了解了区块链的主要目的，以及信任与软件系统完整性之间的关系。因此，你对区块链的目的有了扎实的理解，但仍缺少对“区块链”这一术语本身的定义。本步骤将引导你关注该术语的定义，并解释其不同用法。本步骤将提供一个区块链的临时定义，这将指导你阅读本书的其余部分。最后，本步骤将解释为什么所有权管理是区块链的一个突出应用案例。\n\
  \n#### 术语\n\n在关于区块链的讨论中，该术语有如下用法：\n\n-   作为数据结构的名称\n-   作为算法的名称\n-   作为一套技术的名称\n\
  -   作为具有共同应用领域的纯分布式点对点系统的总称\n\n#### 一种数据结构\n\n在计算机科学和软件工程中，数据结构是一种组织数据的方式，与其具体的信息内容无关。你可以将数据结构想象成建筑学中的楼层平面图。建筑的楼层平面图处理的是用墙壁、地板和楼梯分隔和连接空间的问题，与其具体用途无关。当作为数据结构的名称时，区块链指的是将数据组合成称为“区块”的单位。你可以将这些区块想象成书中的页面。这些区块像链条一样相互连接，因此得名区块链。以一本书为例，单词和句子是要存储的信息。它们被写在不同的页面上，而不是写在一个巨大的卷轴上。这些页面通过它们在书中的位置和页码相互连接。你可以通过检查页码是否连续且没有遗漏数字，来判断是否有人从书中移除了某一页。此外，页面上的信息和书中的页面都是有序的。这种顺序是一个重要的细节，将在后续内容中广泛使用。另外，数据结构中数据块的链接是通过一种非常特殊的编号系统实现的，这与普通书籍的页码编号不同。\n\
  \n#### 一种算法\n\n在软件工程中，算法一词指的是由计算机完成的一系列指令。这些指令通常涉及数据结构。当作为算法的名称时，区块链指的是一系列指令，这些指令在一个纯分布式点对点系统中协商众多区块链数据结构的信息内容，类似于民主投票方案。\n\
  \n#### 一套技术\n\n当作为一套技术的名称时，区块链指的是区块链数据结构、区块链算法以及密码学和安全技术的组合。这些技术结合起来可用于在纯分布式点对点系统中实现完整性，而与应用目标无关。\n\
  \n#### 具有共同应用领域的纯分布式点对点系统的总称\n\n区块链也可以作为利用区块链技术套件的纯分布式点对点账本系统的总称。请注意，在这种语境下，区块链指的是作为一个整体的纯分布式系统，而不是作为纯分布式系统组成部分的软件单元。\n\
  \n### 本书中术语的用法\n\n在本书的其余部分，区块链指的是利用区块链技术套件的纯分布式点对点账本系统总称的简称。如果意在表达其他含义，我会通过明确使用“区块链数据结构”、“区块链算法”或“区块链技术套件”这些术语来指明。\n\
  \n注意\n\n如今被视为区块链的技术是在 2008 年以化名中本聪¹提出的，其真实身份至今仍未公开。\n\n### 临时定义\n\n以下定义并不完整。它仍然缺少一些尚未介绍的重要细节。不过，这个定义可以作为更全面理解该术语的一个中间步骤：\n\
  \n> 区块链是一个纯分布式的点对点账本系统，它利用一个软件单元，该单元包含一种算法，该算法协商有序且连接的數據塊的信息内容，并结合密码学和安全技术，以实现并维护其完整性。\n\
  \n### 所有权管理的作用\n\n临时定义并未提及比特币或加密货币所有权的管理。这可能令人惊讶，因为许多关于区块链的文章和书籍声称其目的是管理数字货币的所有权。事实是，管理加密货币的所有权是区块链一个非常突出且自然的应用案例，但并非唯一案例。区块链拥有广泛多样的应用。然而，有两个原因使得数字商品的所有权管理成为讨论最广泛的区块链应用。首先，它最容易理解和解释。其次，它是对经济影响最大的用例。所有权的概念和所有权权利的强制执行几乎是每个人类社会的核心要素（甚至一些动物也有所有权的概念，并为其强制执行而争斗）。银行、保险公司、托管人、律师、法院、事务律师和领事馆的绝大部分活动都涉及所有权权利的管理或强制执行。因此，所有权管理是一个数十亿美元的市场，任何能够改变我们管理所有权方式的技术创新都将产生巨大影响。事实证明，区块链确实可以极大地改变我们管理所有权的方式。\n\
  \n### 本书中区块链的应用领域\n\n作为用于管理分布式点对点账本系统的技术套件，区块链可以有许多具体的应用，例如管理数字商品或加密货币的所有权。然而，本书有意不局限于区块链的某一个特定应用，因为我不想通过详细讨论一个特定应用案例来分散你对核心概念的注意力。但是，为了让你更容易理解区块链，本书考虑了管理和明确所有权的一般应用案例，而无论被管理的具体商品是什么。因此，管理和明确所有权的总体目标将为你学习之路提供一些思维引导，并帮助你构建对区块链的心理图景。\n\
  \n### 展望\n\n本步骤阐明了“区块链”这一术语，并给出了一个临时定义。本书考虑管理和明确所有权的一般应用案例来解释区块链，但确实需要更详细地讨论所有权。对所有权更深入的理解将有助于你理解区块链的功能。下一步将更详细地探讨所有权的基础。\n\
  \n\n\n### 总结\n\n- 术语“区块链”具有歧义性；对不同的人来说，根据上下文其含义也不同。\n- 区块链可以指：\n    - 一种数据结构\n \
  \   - 一种算法\n    - 一套技术组合\n    - 一类具有共同应用领域的纯分布式点对点系统\n- 管理和明确所有权是区块链最突出的应用场景，但并非唯一场景。\n\
  - 区块链是一种纯分布式点对点账本系统，它利用一个由算法组成的软件单元，该算法协商有序且相互连接的区块的信息内容，并结合密码学和安全技术，以实现并维护其完整性。\n\
  \n**脚注** 1\n\n中本聪. 比特币：一种点对点电子现金系统. 2008. [`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf).\n\
  \n## 6. 理解所有权的本质\n\n我们为何知道自己所拥有之物\n\n步骤 5 提供了区块链的初步定义，并阐述了为何所有权管理被视为其最突出的应用场景。本章节将深化区块链与其所有权管理这一重要应用场景之间的关系。具体而言，本章节揭示了纯分布式点对点系统中的信任与诚信（一方面）和所有权管理（另一方面）之间的联系。此外，本章节还对所有权的本质提供了一些通用见解，并介绍了基本的安全概念。\n\
  \n### 隐喻\n\n想象以下情景。在家里，你正将一个苹果装进午餐包。在去办公室的路上，你决定进一家超市买三明治和饼干。在收银台，你打开包准备取出要购买的商品。就在这时，超市员工看到了你，并注意到了你包里的那个苹果，恰好与超市出售的是同一种苹果。此时超市员工会作何感想？他可能会错误地根据观察断定你偷了店里的苹果。不幸的是，这家超市没有监控摄像头，也没有安保人员，而且你是此刻唯一的顾客。那么，你如何证明自己没有偷苹果呢？\n\
  \n### 所有权与见证人\n\n你是否曾想过，究竟是什么让你成为你所属物品的主人？可能因为你还在想超市里那个苹果的故事吧！那么，是什么让你成为包里那个苹果的主人呢？你如何证明你没有从超市偷它？\n\
  \n想象一下，你正站在法庭上，法官正在审理你那被指控的“苹果盗窃案”。你会如何证明你是苹果的主人？我们知道，在超市的例子中，如果没有人能证明你偷了苹果，就足以证明你的清白。然而，摆脱偷窃嫌疑并非所有权证明。所以，让我们回到证明所有权的问题上。\n\
  \n如果有人能证明你在去超市之前就已经买了这个苹果，那将大有帮助。幸运的是，你记得买苹果的那家店，并且卖苹果给你的店员愿意为你作证。但你低估了检察官。他在交叉询问中与你的证人交谈，并提出尖锐问题：他还记得卖给你的那个苹果吗？他能确认卖给你的那个特定苹果就是你包里的那个吗？他能确认你就是买那个特定苹果的人吗？最后，他究竟为什么能记住所有这些细节？有没有可能你付钱给了证人，让他为你的清白作证？这就归结为一个基本原则：有一个证人是好的，但拥有许多独立的证人才是说服检察官相信你清白的关键。\n\
  \n最后一点极为重要。为同一事实作证的独立证人越多，该事实为真的可能性就越大。事实证明，这一理念将成为区块链的核心概念之一。\n\n### 所有权的基础\n\n\
  将前一节的发现提升到更抽象的层面，可以说证明所有权涉及三个要素：\n\n- 对所有人的身份识别\n- 对所属物品的身份识别\n- 所有人对物品的映射关系\n\n\
  证人的证词可以实现所有这些要素。历史上，目击者常常是澄清这些要素的唯一来源。然而，依赖证人的口头证词非常耗时。因此，这些要素已被可信实体签发的文件所取代。如今，我们可以用身份证、出生证明和驾照来识别个人。可以使用序列号、生产日期、生产证明或详细描述来识别物品。这些文件一旦创建便不会改变，因为人与物的身份不会改变。\n\
  \n所有人对物品的映射关系通常通过分类账或登记簿来完成。这种文件并非创建后一成不变。每一次所有权的转移都需要记录在这样的登记簿中，因为过时的登记簿或分类账无法成为证明所有权的可信证人。拥有一份实时更新且管理有序的登记簿的重要性，促使许多社会建立了专门的机构。某些类型的物品价值越高，就越有可能存在由政府监管的登记簿来记录这些物品的所有权。这些登记簿大多数对所有人开放，以便于验证所有权并提供便捷的途径来澄清权属。你可以自行研究一下，在你的国家有哪些这样的登记簿，以及它们证明了什么。我找到了用于记录房地产、专利、船舶、飞机和公司所有权的分类账。我甚至还找到了用于记录婚姻、出生和死亡的登记簿。\n\
  \n图 6-1 描绘了在设计所有权管理软件时所涉及的不同概念之间的关系。\n\n![A436689_1_En_6_Fig1_HTML.jpg](img/A436689_1_En_6_Fig1_HTML.jpg)\n\
  \n*图 6-1. 所有权概念*\n\n在图 6-1 中，上层的概念比下层更为通用。每一层的概念可以被看作是上一层概念的具体化实现。例如，所有权证明需要同时对所有人及财产进行身份识别，以及建立所有人对财产的映射关系。所有权的行使则需要身份识别，以及认证和授权，以确保只有合法的人才能使用该财产。最底层的方框代表了实现层。它们展示了，例如，`password`和`signature`是用于实现认证和授权的概念。`ledger`可以被看作是一种实现所有人对财产映射关系的具体方式。\n\
  \n\n\n### 安全相关简介\n\n图 6-1 中使用了三个与安全相关的主要概念，需要更详细地解释，因为它们在软件系统语境中的含义可能与日常用法略有不同：\n\
  \n*   `标识`\n*   `身份验证`\n*   `授权`\n\n这三个概念的含义和相互关系可以通过一个现实世界的例子来说明。设想你试图在一家酒类商店购买一瓶葡萄酒。酒类商店不允许向未成年人出售酒精饮料。酒类商店如何确保只向符合条件的人出售葡萄酒？酒类商店通过使用标识、身份验证和授权来实现这一点。以下是其工作原理的说明。\n\
  \n## `标识`\n\n`标识`仅仅意味着通过陈述一个名称或任何其他可用作标识符的信息来声称自己是谁。¹ 在酒类商店的例子中，你可以通过陈述一个名字来声称自己是某个人。`标识`并不能证明你确实是你所声称的那个人。`标识`不涉及证明你不是未成年人。`标识`仅仅意味着声称自己是某个人。\n\
  \n## `身份验证`\n\n`身份验证`的目的是防止有人冒充他人。`身份验证`意味着验证或证明你确实是你所声称的那个人¹。这种证明可以通过你拥有的某物或你知道的某物来提供，这些可以作为你确实是你所声称的那个人的证据（例如，身份证、驾照，或者你所声称之人的一些生活细节）。重要的是，对你声称身份的证明必须与你唯一关联（例如，你的脸部照片、指纹或其他能够唯一识别你的信息）。在酒类商店的例子中，这意味着你可以通过出示一张包含你照片的驾照来证明你确实是你所声称的那个人。将你的脸与驾照照片上的脸进行比对即可完成验证。如果你看起来像驾照照片中的人，则`身份验证`成功。否则，`身份验证`失败。将一个人的脸与驾照照片进行双重核实，旨在防止有人使用他人的驾照。\n\
  \n## `授权`\n\n`授权`意味着根据某人身份的特征或属性，授予其对特定资源或服务的访问权限¹。`授权`是`身份验证`成功以及对其特征或权利进行评估后的结果。在酒类商店的例子中，`授权`意味着根据你驾照上显示的出生日期，决定是否允许你购买一瓶葡萄酒。如果根据你驾照上的出生日期，你年龄太小，店员将拒绝向你出售葡萄酒。请注意，在这种情况下，拒绝并非由于`身份验证`失败。`标识`和`身份验证`都成功了，并且正因为正确的标识，店员才能识别出你是未成年人。因此，`授权`始终是根据某些规则对先前已验证身份的特征或属性进行评估的结果。\n\
  \n> **注意：** `标识`意味着声称自己是谁。`身份验证`意味着证明你确实是你所声称的那个人。`授权`意味着基于先前已验证的身份获得对某物的访问权限。\n\
  \n### 账本的目的与属性\n\n图 6-2 说明了所有权证明和所有权转移如何与账本的目的和属性相关联。\n\n![A436689_1_En_6_Fig2_HTML.jpg](img/A436689_1_En_6_Fig2_HTML.jpg)\n\
  \n**图 6-2.** 账本的概念与原则\n\n从图 6-2 中学到的主要经验是，账本必须履行两个相互对立的角色。一方面，账本作为所有权证明的手段，依赖于读取保存在账本中的历史数据。另一方面，账本必须记录任何所有权的转移，这反过来意味着要产生新数据并写入账本。这两个目的最重要的区别之一可以概括为透明性与隐私性的对立本质。\n\
  \n当账本对任何人开放时，证明所有权更容易。因此，透明性是证明所有权的基础，其方式类似于证人在法庭上公开作证。然而，所有权的转移必须仅限合法所有者进行。因此，隐私构成了所有权转移的基础。由于在账本中写入意味着所有权变更，因此只有非常值得信赖的实体才能拥有对账本的写入权限。\n\
  \n透明性与隐私性、证明所有权与转移所有权、读取账本与写入账本——这些相互冲突的力量同样存在于区块链中。事实证明，区块链是一个巨大的分布式点对点系统，由类似账本的数据结构构成，任何人都可以读取。\n\
  \n### 所有权与区块链\n\n以政府监管账本为形式的见证人，是厘清贵重物品所有权的关键。但如果这样的账本被损坏或销毁了，会发生什么？或者，如果负责更新账本的人犯了错误或故意伪造账本，又会怎样？在这种情况下，账本就不能反映现实。这是灾难性的，因为每个人都相信账本代表了真相，就像法庭上的证人一样。\n\
  \n仅凭一个账本来作为厘清所有权的唯一来源，其问题可以用法庭审判中已解决的方式来处理。仅基于一个证人的证词来做出判决是有风险的，因为这个证人可能不诚实。拥有更多证人则更好。被质询的独立证人越多，那些在多数证词中一致提及的事实就越有可能反映真相。这个事实可以通过统计学和大数定律来证明。拥有许多独立观察、不受相互影响的证人，是这种探寻真相方法的关键。\n\
  \n将这一发现应用于使用账本厘清所有权是直接的：与其维护一个可能被伪造的单一账本，不如利用一个完全分布式的点对点账本系统，并根据多数节点达成一致的现实版本来处理有关所有权的请求。\n\
  \n此时，你可能想知道这一切与区块链有什么关系。使用账本管理所有权与区块链之间的关系总结如下：\n\n*   单个账本用于维护所有权信息，这相当于一个存储所有权相关数据的`区块链数据结构`。\n\
  *   各个账本存储在点对点系统的计算机（节点）上。\n*   `区块链算法`负责让各个节点共同达成一个关于所有权状态的、作为最终判决依据的一致版本。\n* \
  \  该系统的完整性体现在其能够做出关于所有权的真实陈述。\n*   密码学对于创建可信的标识、身份验证和授权手段，以及确保数据安全性是必需的。\n\n###\
  \ 前景展望\n\n本步骤强调了所有权的重要特征，以及它们与账本属性之间的关系。此外，本步骤还概述了区块链如何与所有权和账本相关联。下一步将讨论在完全分布式的点对点账本系统中管理所有权所产生的一个重要影响。\n\
  \n\n\n### 总结\n\n-   所有权证明包含三个要素：\n    -   所有者身份的识别\n    -   被拥有物件的识别\n    -   所有者与物件之间的映射关系\n\
  -   `ID`卡、出生证明和驾照，以及序列号、生产日期、生产证明或详细的物件描述，均可用于识别所有者和物件。\n-   所有者与物件之间的映射关系可以记录在分类账中，其作用类似于审判中的证人。\n\
  -   仅使用单一分类账存在风险，因为它可能被损坏、销毁或伪造。在这种情况下，该分类账将不再成为厘清所有权的可靠来源。\n-   与其只使用一个中心化分类账，不如利用一组独立的分类账来记录所有权，并就多数分类账达成一致的现实版本，来厘清所有权的相关请求。\n\
  -   通过使用`区块链数据结构`，可以创建一个纯粹分布式的点对点分类账系统。每个`区块链数据结构`代表一个分类账，由系统中的一个节点维护。`区块链算法`负责让各个节点共同达成一个一致的所有权状态版本。密码学被用于实现身份识别、身份验证和授权。\n\
  -   纯粹分布式点对点分类账系统的完整性，体现在其能够就所有权做出真实陈述，并确保只有合法所有者才能将其财产权转让给他人。\n\n脚注 [1]\n\nVan\
  \ Tilborg, Henk, and Sushil Jajodia, eds. *Encyclopedia of cryptography and security*.\
  \ New York: Springer Science & Business Media, 2014.\n\n## 7. 双重花费\n\n利用分布式点对点系统的漏洞\n\
  \n在上一节中，您了解了纯粹分布式点对点系统与区块链作为所有权管理手段的最突出用例之间的关系。您还了解到，分布式点对点分类账系统的完整性，体现在其能够就所有权做出真实陈述，并确保只有合法所有者才能将其财产权转让给他人。但这一陈述在现实生活中意味着什么？如果完整性遭到破坏，会发生什么？本节将更详细地探讨这些问题。尤其，本节将介绍分布式点对点系统中完整性被破坏的最重要例子之一：双重花费问题。\n\
  \n### 比喻\n\n伪造纸币在任何国家都是严重的犯罪行为，因为它通过创造没有宝贵资源支持的购买力，破坏了经济的基础和运行。因此，大多数纸币都配备了安全特征，使得伪造变得不可能，或至少成本高昂。这些安全特征，如唯一编号、水印或荧光纤维，对于实体纸币和其他实体商品效果良好。但是，如果货币或商品变成数字形式，并在分布式点对点分类账系统中管理，会发生什么？本节解释了用于管理所有权的分布式点对点系统的一个特定漏洞，该漏洞等同于伪造纸币。事实证明，这个漏洞是系统完整性被破坏的一个突出例子。\n\
  \n### 双重花费问题\n\n让我们考虑一个用于管理房地产所有权的点对点系统。在这种系统中，记录所有权信息的分类账由系统成员的个体计算机维护，而不是由中心数据库维护。因此，每个对等节点都维护着自己的一份分类账副本。一旦房屋的所有权从一个人转移到另一个人，系统中的所有分类账都需要更新，以包含最新的现实版本。然而，在对等节点之间传递信息并更新各个分类账需要时间。在系统的最后一个成员收到新信息并更新其分类账副本之前，系统将处于不一致状态。一些对等节点已经知道最新的所有权转让，而其他对等节点尚未收到该信息。并非所有分类账都拥有最新信息这一事实，使得它们容易被任何已经拥有最新信息的人利用。\n\
  \n让我们再设想以下情景。个人 A 将他的房子卖给了个人 B。从 A 到 B 的所有权转让记录在点对点系统中的某一个分类账上。这个特定的分类账需要将此转让告知其他对等节点，这些节点再依次告知其他对等节点，直到最终所有对等节点都获知了从\
  \ A 到 B 的所有权转让。然而，假设个人 A 迅速找到系统中的另一个分类账，并要求记录同一栋房子的另一项不同所有权转让：从个人 A 到个人 C 的出售。如果这个对等节点尚未得知过去发生的从\
  \ A 到 B 的所有权转让，该节点将会批准并记录同一栋房子从 A 到 C 的所有权转让。因此，A 通过利用其第一次出售信息传播需要时间这一事实，成功地将他的房子卖了两次。但\
  \ B 和 C 不能同时拥有这栋房子。他们中只有一人应该是新的合法所有者。因此，这种情况被称为双重花费问题。\n\n\n\n#### 术语\n\n类似于术语`blockchain`，术语`double\
  \ spending`也存在歧义，它被用来指代以下概念：\n\n- 由复制数字商品引发的问题\n- 分布式点对点账本系统中可能出现的问题\n- 纯分布式点对点系统中完整性被破坏的一个例子\n\
  \n#### 双花作为数字商品复制的问题\n\n在复制数字商品的语境下，`双花`问题指的是计算机上的数据可以不受显著限制地进行复制。这一事实给数字货币或任何在特定时间只能有一个所有者的数据带来了问题。复制使得代表数字货币的数据可以被复制，并多次用于支付。这在数字领域相当于用复印机复制纸币。除了技术上的可行性，复制数字货币违背了货币的核心原则：同一份货币不能同时给予不同的人。能够多次复制和花费数字货币会使货币失去价值，因此产生了`双花`问题。\n\
  \n#### 双花作为分布式点对点账本系统的问题\n\n当用于描述分布式点对点账本系统的问题时，`双花`问题指的是将信息转发给系统中所有节点需要时间，因此并非所有节点同时拥有相同的所有权信息。由于并非所有节点都拥有最新信息，它们容易受到已掌握最新信息者的利用。结果，有人可能能够多次转移所有权，导致`双花`。\n\
  \n#### 双花作为分布式点对点系统中完整性被破坏的例子\n\n分布式点对点系统的使用并不局限于管理所有权。然而，无论具体的应用领域如何，在节点间转发信息以及更新系统成员所维护数据的问题都是相同的。因此，在更抽象的层面上，`双花`问题可以被视为在分布式点对点系统中维护数据一致性的问题。由于数据一致性是系统完整性的一方面，可以说`双花`问题是系统完整性被破坏的一个具体例子。\n\
  \n### 如何解决双花问题\n\n由于`双花`可能有不同的含义，因此没有单一的预防方法。相反，可能存在多种不同的解决方案。以下部分将描述其中一些方案。\n\n\
  #### 解决作为数字商品复制问题的双花\n\n仅通过复制数据来多次花费数字货币或其他数字资产的问题，实际上是一个与所有权本质相关的问题。任何被接受的、将代表数字商品的数据映射到其所有者的方法，无论其具体实现如何，都能解决这个问题。即使是物理的总账本，或者（更现实地）一个电子账本，无论其架构如何（中心化或点对点），只要账本始终正确运行，就能确保数字商品只被花费一次。\n\
  \n#### 解决作为分布式点对点账本系统问题的双花\n\n在这种语境下，系统的架构和应用领域都是给定的。分布式点对点账本系统通常被视为推导出`区块链`的经典例子。步骤\
  \ 6 中的解释强调了`区块链`与分布式点对点账本系统之间的关系。因此，正如本书所使用的术语，`区块链`可以被看作是解决分布式点对点账本系统中`双花`问题的一种方案。\n\
  \n#### 解决作为分布式点对点系统中完整性被破坏例子的双花\n\n在这种语境下，系统的架构是明确的，但应用领域则未作规定。因此，这一层面的解决方案侧重于在分布式点对点系统中实现和维护完整性，而不管其具体用途如何。然而，分布式点对点系统的具体用途决定了完整性的含义。例如，与管理系统数字货币所有权的系统相比，一个简单的文件共享应用可能在定义完整性时考虑不同的方面。因此，不了解具体的应用目标，就无法回答`区块链技术套件`是否是实现和维护系统完整性的正确工具。因此，在分布式点对点系统的特定应用领域，可能其他技术、数据结构和算法更适合用于实现和维护完整性。\n\
  \n> **注意**  \n> `双花`问题是分布式点对点账本系统中完整性被破坏的一个突出例子，而`区块链技术套件`是用于解决该问题的工具。\n\n### 本书中双花的用法\n\
  \n在本书中，术语`双花`用于指代纯分布式点对点账本系统中可能出现的一个漏洞。\n\n### 展望\n\n本步骤解释了`双花`，并强调了`区块链`在纯分布式点对点系统中实现完整性的重要性。接下来的步骤将重点介绍`区块链`如何实现和维护完整性。\n\
  \n### 总结\n\n- 术语`双花`具有歧义性；它有多种不同的含义。\n- `双花`可以指：\n  - 由复制数字商品引发的问题\n  - 分布式点对点账本系统中可能出现的问题\n\
  \  - 违反分布式点对点系统完整性的一个例子\n- 在本书中，术语`双花`用于指代纯分布式点对点账本系统的一个漏洞。\n- `区块链`是解决`双花`问题的一种手段。\n\
  \n"
- "# 第三部分  \n区块链如何运作\n\n这一学习阶段是本书的核心部分，因为它解释了`区块链`的内部工作原理。本阶段的 14 个学习步骤将引导你了解`区块链`的所有概念及其底层技术。在本阶段结束时，你将扎实理解`区块链`的所有主要概念、它们各自如何独立工作，以及它们如何相互作用以构建出被称为`区块链`的巨大机器。\n\
  \n## 8. 规划区块链\n\n使用`区块链`管理所有权的基本概念\n\n前面的步骤揭示了信任、完整性、纯分布式点对点系统与`区块链`之间的关系。因此，你现在已经很好地理解了什么是`区块链`、为什么需要它以及它解决了什么问题。然而，你仍然不知道`区块链`内部是如何运作的。本步骤通过解释将引导你进入后续步骤的通用应用场景，首次介绍了`区块链`的工作原理。它还强调了在设计用于管理所有权的`区块链`时的主要任务，并概述了其主要概念。本步骤是后续步骤的起点，后续步骤将详细讨论构成`区块链`的概念和技术。\n\
  \n\n\n### 目标\n\n此处的目标是理解构成区块链的概念。出于教学目的，我将提出一个挑战：设计你自己的所有权管理系统。因此，你将面临与区块链发明者曾经面对并成功解决的相同挑战：设计一个软件系统，在一个完全开放且不可信的环境中，通过纯粹的分布式点对点账本系统来管理所有权。\n\
  \n### 起点\n\n作为起点，所考虑系统的主要事实可总结如下：\n\n- 该系统将是一个纯粹的分布式点对点系统，由用户贡献的计算资源构成。\n- 该点对点系统使用互联网作为连接各个节点的网络。\n\
  - 节点的数量、可信度以及可靠性均未知。\n- 该点对点系统的目标是管理数字商品（例如，销售积分或数字货币）的所有权。\n\n### 遵循的路径\n\n当设计和开发一个软件系统，该软件系统通过在一个开放且不可信的环境中使用纯粹的分布式点对点账本系统来管理所有权时，需要处理七个主要任务：\n\
  \n- 描述所有权\n- 保护所有权\n- 存储交易数据\n- 准备可在不可信环境中分发的账本\n- 分发账本\n- 向账本中添加新交易\n- 决定哪个账本代表真相\n\
  \n#### 任务 1：描述所有权\n\n在开始开发区块链之前，你需要问自己想要用它做什么。由于你将设计一个管理所有权的软件系统，你必须首先决定如何描述所有权。结果证明，交易是描述任何所有权转移的好方法，而完整的交易历史是识别当前所有者的关键。因此，步骤\
  \ 9 将解释交易、它们是什么、如何描述它们，以及如何使用它们来阐明所有权。\n\n#### 任务 2：保护所有权\n\n使用交易来描述所有权仅仅是起点。此外，你需要一种方法来防止他人访问他人的财产。在现实生活中，你可以通过使用带锁的门来轻松防止他人使用你的汽车或进入你的房屋。事实证明，密码学提供了一种在个体层面保护交易的方法，类似于带锁的门保护你的个人汽车或房屋的方式。\n\
  \n保护所有权有三个主要要素：识别和验证所有者，以及限制对财产的访问仅限其所有者。步骤 12 和 13 将更详细地解释这些概念。然而，这些步骤依赖于哈希值的概念。如果你以前从未听说过哈希值，也不必担心。我在步骤\
  \ 10 和 11 中详细解释了哈希值。这两个步骤也将为那些已经具有技术背景或了解哈希值的人提供有趣的见解。\n\n#### 任务 3：存储交易数据\n\n通过交易描述所有权，并拥有在个体交易层面保护所有权的安全措施，是朝着设计一个管理所有权的软件系统这一目标迈出的重要步骤。然而，你需要一种方法来存储完整的交易历史，因为此历史记录用于阐明所有权。由于交易历史是阐明所有权的核心要素，因此必须以安全的方式存储它。事实证明，区块链数据结构在数字上等同于账本。步骤\
  \ 14 和 15 解释了区块链数据结构作为数字账本所需满足的要求以及其实现方式。\n\n#### 任务 4：准备可在不可信环境中分发的账本\n\n拥有一个包含交易数据的孤立账本或区块链数据结构固然很好，但你的目标是设计一个在不可信环境中运行的分布式点对点账本系统。因此，你将拥有在不可信网络中不可信节点上运行的账本副本。此外，你将把对账本的控制权交给整个网络，而没有任何中央控制或协调点。你如何防止账本被伪造或篡改（例如，通过从历史中删除交易或向其中添加非法交易）？事实证明，防止交易历史被更改的最佳方法是使其不可更改。这意味着账本以及其中的交易历史一旦写入便无法更改。因此，你将不必担心账本被篡改或伪造，因为它们从一开始就无法更改。然而，拥有一个永远无法更改的分布式点对点账本系统听起来非常安全，但几乎毫无用处，因为它不允许你添加新交易。因此，区块链数据结构的挑战在于：一方面要不可更改，另一方面要接受新交易的添加。这听起来像是术语上的矛盾，但事实证明，通过步骤\
  \ 16 中解释的一个技术技巧，这是可以实现的。结果是一种仅可追加的区块链数据结构：可以添加新交易，但几乎不可能更改过去已添加的数据。\n\n#### 任务 5：分发账本\n\
  \n一旦账本仅可追加，你就可以通过向任何请求的人提供其副本来创建一个分布式点对点账本系统。然而，仅仅提供仅可追加账本的副本并不能实现你的目标。一个管理所有权的分布式系统分别涉及对等点或节点之间的交互。因此，步骤\
  \ 17 解释了系统中的节点如何相互交互以及它们之间交换什么信息。\n\n#### 任务 6：向账本中添加新交易\n\n分布式点对点系统将由成员组成，其计算机维护着仅可追加区块链数据结构的个人副本。由于该数据结构允许你添加新的交易数据，你必须确保只添加有效且经过授权的交易。事实证明，这可以通过允许点对点系统的所有成员添加新数据，并将点对点系统的每个成员转变为其他成员的监督者来实现。结果，所有成员将相互监督，并指出其同伴犯下的任何错误。步骤\
  \ 18 更详细地解释了这种方法，以及给予成员履行其职责的激励措施。\n\n\n\n#### 任务 7：决定哪些账本代表真相\n\n一旦新交易可以被添加到点对点系统中的各个账本中，就会遇到一个典型的分布式点对点系统问题：不同节点可能收到不同的交易，很快它们维护的交易历史就会出现差异。因此，点对点系统中可能存在不同版本的交易历史。由于交易历史是识别合法所有者的基础，存在相互冲突的交易历史对系统的完整性构成了严重威胁。因此，必须找到一种方法，要么从一开始就防止不同交易历史的出现，要么找到一种方法来决定哪个交易历史代表真相。纯粹的分布式点对点系统的特性决定了前一种方法不可行。因此，你需要一个标准来寻找和选择代表真相的交易历史。但还有另一个问题：在纯粹的分布式点对点系统中，没有中央权威机构可以宣布必须选择哪个交易历史。事实证明，可以通过让点对点系统中的每个节点自行决定哪个交易历史代表真相，并且大多数节点独立地对该决定达成一致，来解决这个问题。同样，区块链让你将新交易添加到仅追加的区块链数据结构中的方式，本身就已经包含了解决这个问题的方案。第\
  \ 19 步将详细解释这些标准及其使用方法。\n\n### 展望\n\n本步骤确定了七项任务，这些任务将引导你经历一次富有挑战性的智力旅程，深入理解构成区块链的各种概念。一旦你完成这些任务，你将抵达顶峰：对区块链的理解。第\
  \ 21 步是你将所有概念整合在一起并享受学习成果的时刻。和本步一样，第 21 步将是一篇概述性章节，但它将借鉴你在此期间学到的技术知识。\n\n### 总结\n\
  \n*   为了设计一个用于管理所有权的纯粹分布式点对点账本系统，必须解决以下任务：\n    *   描述所有权\n    *   保护所有权免受未经授权的访问\n\
  \    *   存储交易数据\n    *   准备在不可信环境中分发的账本\n    *   形成分布式账本系统\n    *   向账本添加和验证新交易\n\
  \    *   决定哪些账本代表真相\n*   上述任务将在接下来的 12 个步骤中逐一解决。\n\n## 9. 记录所有权\n\n以历史进程作为当前所有权状态的证据\n\
  \n本步骤考虑如何以一种对纯粹分布式点对点账本系统有用的方式来描述所有权。本步骤解释了区块链如何记录所有权以及处理所有权的转移。此外，本步骤还指出了在记录所有权转移时排序的重要性。最后，本步骤强调了交易数据的完整性对整个系统完整性的重要意义。\n\
  \n### 隐喻\n\n接力赛是队伍之间的赛跑，每队队员只跑总距离的一部分。比赛中，每位队员必须在赛道上标记的特定区域内将一件特定物品（即接力棒）交给下一位队员。在比赛中的任何给定时刻，参赛队伍中只有一名队员手持接力棒。要确定某支队伍的哪位队员当前正拿着接力棒，只需知道在最近一次交接中接力棒交给了该队的谁即可。为了追踪在任何时刻是谁拿着接力棒，就需要记录每次交接的时间和参与的运动员。本步骤将解释区块链如何处理所有权，其方式类似于接力赛利用接力棒的方式。\n\
  \n### 目标\n\n目标是以透明且易于理解的方式记录所有权。任何阅读该记录的人都应该能够就商品与其所有者之间的关联做出明确的陈述。\n\n### 挑战\n\n\
  挑战在于找到一种所有权记录方式，它不仅要声称某人是某物的所有者，还要提供所有权的证据，从而作为所有权的证明。\n\n### 思路\n\n与其通过库存数据（即列出所有所有者的当前财产）来描述当前的所有权状态，不如持续维护一个账本，其中记录所有所有权的转移。每一次所有权转移都通过交易数据来描述，这些数据清晰地指明哪个所有者何时将什么物品的所有权转移给了谁。存储在账本中的整个交易历史形成了一条审计线索，为每个人如何获得其财产提供了证据。¹\
  \ 这等同于追踪接力赛中每一次接力棒的交接，使得任何人都可以在之后重构整场比赛。\n\n### 关于库存数据和交易数据的简要说明\n\n有两种相互竞争的方式来描述所有权——通过库存数据或交易数据。库存数据描述当前的所有权状态。它们类似于银行账户对账单，仅显示当前可用的资金数额。交易数据描述所有权的转移。它们类似于银行账户对账单，列出了每一笔取款、存款和资金转账。可以通过汇总交易数据来推导出库存数据。除了两者都描述所有权这一事实外，它们的基本理念截然不同。库存数据只是陈述或声称所有权，而交易数据则解释并由此证明所有权。然而，库存数据通常被认为更方便，因为它能立即陈述大多数人所感兴趣的事实，即当前的所有权状态。\n\
  \n\n\n### 工作原理\n\n利用区块链记录所有权涉及以下方面：\n\n- 描述所有权的转移\n- 维护转移历史记录\n\n#### 描述所有权转移\n\n\
  交易是将所有权从一方转移给另一方的行为。所有权转移行为依赖于描述预期转移的数据。这些数据包含执行所有权转移所需的所有信息。描述预期所有权转移的数据示例，可以是用于请求银行代客户进行资金转账的银行转账表格。该表格要求您提供所有必要信息，以便银行能够代表您执行转账。类似地，区块链用于描述交易的信息包括：\n\
  \n- 将要交出所有权的账户标识符\n- 将要接收所有权的账户标识符\n- 待转移商品的数量\n- 交易的执行时间\n- 为执行交易而向系统支付的费用\n- 证明交出所有权的账户所有者确实同意该转移的凭证\n\
  \n对于任何曾在银行进行过资金转账的人来说，这些数据大部分都很熟悉。然而，在考虑费用时，与银行转账的类比就失效了。由于银行是中心化机构，它们维护着适用于所有客户的统一费用表。与此相反，区块链是一个没有任何中心控制点的分布式系统。因此，区块链无法拥有一个中心化的费用表。在使用区块链时，每个用户必须预先告知系统，他或她愿意为执行该交易支付多少费用。交出所有权的账户也需要支付交易费用。\n\
  \n#### 维护转移历史记录\n\n交易数据提供了按预期执行所有权转移所必需的强制性信息。执行交易意味着让所有权按照交易数据描述的方式发生转移。执行交易意味着将交易数据添加到分类账中。通过将交易数据添加到分类账，该交易成为交易历史的一部分，而交易历史则用于明确所有权。下次再通过汇总分类账中包含的交易数据来明确所有权时，新添加的交易将被纳入汇总，从而影响最终的所有权状态。\n\
  \n区块链通过按发生顺序将交易数据存储在`区块链数据结构`中，来维护所有曾发生过的交易的完整历史。任何不属于该历史的交易都被视为从未发生过。因此，将交易数据添加到`区块链数据结构`中，意味着让该交易发生，并允许它影响利用历史记录来识别当前所有者的结果。\n\
  \n### 为何有效\n\n由于交易数据包含了关于交出所有权的账户、接收所有权的账户、待转移物品及数量等所有信息，只要整个交易历史可用，就可以为每个账户重建所有权信息。因此，所有交易数据的完整历史记录足以记录所有权。\n\
  \n### 顺序的重要性\n\n汇总交易数据的目的是为了恢复当前的所有权状态并明确所有权。重要的是要认识到，为了每次汇总数据时都能得到相同的结果，必须保留交易发生的顺序。改变交易数据的顺序将会改变汇总结果。乍一看，我先从朋友那里收到\
  \ 50 美元付款，然后转出 50 美元支付账单，或者这两笔交易以相反的顺序发生，结果似乎没有太大变化。但如果我的银行账户里分文没有，并且不允许透支呢？在这种情况下，我支付账单的能力取决于是否先收到了朋友的付款。否则，银行会因资金不足而拒绝转账支付账单。因此，交易发生的顺序确实至关重要。\n\
  \n### 交易历史的完整性\n\n毫不夸张地说，交易数据的历史是任何管理所有权的区块链的核心，因为它是重建所有权状态的基础。因此，必须确保该数据历史的安全、完整、正确和一致，以维护整个系统的完整性，从而能够就当前所有权状态做出真实陈述。因此，区块链需要提供安全措施，确保只有有效的交易数据才能被添加到`区块链数据结构`中。检验交易数据的有效性涉及三个方面：\n\
  \n- 形式正确性\n- 语义正确性\n- 授权\n\n#### 形式正确性\n\n形式正确性意味着交易描述包含所有必需的数据，并且这些数据以正确的格式提供。\n\
  \n#### 语义正确性\n\n语义正确性关注交易数据的含义及其预期效果。因此，验证语义正确性需要了解业务领域知识。检验交易数据的语义正确性通常基于业务规则进行，例如：\n\
  \n- 确保账户不会交出超过其当前拥有的数量\n- 防止双重支付\n- 限制单笔交易中可转移的物品数量\n- 限制每个用户的交易次数\n- 限制在给定时间段内花费的总物品数量\n\
  - 强制要求一个账户在物品可以进一步转移之前，必须持有该物品达到最短时间\n\n#### 授权\n\n只有交出所有权的账户所有者才能被允许指示区块链代表其执行交易。因此，区块链要求每笔交易携带能够证明交出所有权的账户所有者确实同意该转移的凭证信息。\n\
  \n### 展望\n\n本步骤解释了交易及其在明确所有权方面的作用。接下来的步骤主要关注区块链如何确保只有有效的交易数据被添加到历史记录中，以及如何保护历史记录免受篡改或伪造。\n\
  \n\n\n### 摘要\n\n- 交易数据提供以下信息，用于描述所有权的转移：\n  - 发起交易并将其所有权转移至另一账户的账户标识符\n  - 将接收所有权的账户标识符\n\
  \  - 要转移的商品数量\n  - 交易完成的时间\n  - 为执行交易而向系统支付的费用\n  - 证明交出所有权的账户所有者同意该转移的凭据\n- 交易数据的完整历史构成一条审计轨迹，为人们如何获取和交出所有权提供证据。\n\
  - 任何不属于该历史记录的交易都被视为从未发生过。\n- 通过将交易添加到历史记录中，并使其影响数据聚合结果，交易即被执行。\n- 交易数据添加到历史记录中的顺序必须保留，以确保在聚合这些数据时得到相同的结果。\n\
  - 为维护完整性，只有满足以下三个条件的交易数据才能添加到`blockchain-data-structure`中：\n  - 形式正确性\n  - 语义正确性\n\
  \  - 授权\n\n脚注 ¹\n\n中本聪（Satoshi Nakamoto）。*比特币：一种点对点的电子现金系统*（2008 年）。\n\n## 10. 数据哈希\n\
  \n从数字指纹识别数据\n\n本步骤阐释区块链最重要的基础技术之一：哈希值。它讨论了加密哈希函数的重要属性，并介绍了将哈希函数应用于数据的几种模式。\n\n###\
  \ 隐喻\n\n指纹是人类手指全部或任意部分摩擦嵴的印痕。人们认为指纹能够唯一地识别人类个体。指纹已被用于调查犯罪、识别罪犯以及为无辜者脱罪。本步骤介绍了一个用于识别数据的概念，可以将其视为数字领域的指纹等价物。该概念被称为加密哈希值，区块链广泛使用了这一概念。因此，理解加密哈希是理解区块链的必要条件。\n\
  \n### 目标\n\n在分布式点对点系统中，你将处理海量的交易数据。因此，你需要能够尽可能快速、简便地唯一识别并比较这些数据。所以，目标是通过数字指纹来唯一识别交易数据，以及可能产生的任何类型的数据。\n\
  \n### 工作原理\n\n哈希函数是小型计算机程序，它能够将任何类型的数据转换为固定长度的数字，无论输入数据的大小如何。¹ 哈希函数在任意给定时刻只接受一条数据作为输入，并根据构成该数据的比特和字节创建一个哈希值。哈希值可能包含前导零以达到所需长度。存在许多不同的哈希函数，它们之间在生成的哈希值长度等方面有所差异。一组重要的哈希函数被称为加密哈希函数，它们能为任何类型的数据创建数字指纹。加密哈希函数具有以下特性²：\n\
  \n- 快速为任何类型的数据提供哈希值\n- 确定性\n- 伪随机性\n- 单向函数\n- 抗碰撞性\n\n#### 快速为任何数据提供哈希值\n\n这个特性实际上是两个特性的组合。首先，哈希函数能够为所有类型的数据计算哈希值。其次，哈希函数能快速完成计算。这些特性很重要，因为你不会希望哈希函数产生无用的东西，比如错误消息，或者花费大量时间才返回结果。\n\
  \n#### 确定性\n\n确定性意味着哈希函数对于相同的输入数据会产生相同的哈希值。这意味着，数据哈希值出现的任何差异都必须完全由输入数据的差异引起，而不是由哈希函数的内部机制造成。\n\
  \n#### 伪随机性\n\n伪随机性意味着当输入数据发生变化时，哈希函数返回的哈希值会发生不可预测的改变。即使只对输入数据进行了一点点修改，产生的哈希值也会不可预测地变化。换句话说，修改后数据的哈希值必须总是出乎意料的。不可能根据输入数据来预测哈希值。\n\
  \n#### 单向函数\n\n单向函数无法通过其输出值追溯其输入值。因此，作为单向函数意味着它不能反过来使用。换句话说，基于哈希值恢复原始输入数据是不可能的。这意味着哈希值不会告诉你关于输入数据内容的任何信息，就像一张孤立的指纹不会告诉你关于生成该指纹的人的任何信息一样。单向函数也被称为不可逆函数。\n\
  \n#### 抗碰撞性\n\n如果一个哈希函数极难找到两段或多段不同的数据能产生相同的哈希值，则称该哈希函数具有抗碰撞性。或者，换句话说，如果不同数据得到相同哈希值的几率很小，那么该哈希函数就是抗碰撞的。在这种情况下，你可以认为该哈希函数生成的哈希值是唯一的，因此可用于识别数据。如果你为不同的数据得到了相同的哈希值，那就会面临哈希碰撞。哈希碰撞在数字领域相当于两个人拥有相同的指纹。抗碰撞性是哈希值能用作数字指纹的必要条件。哈希函数内部如何实现抗碰撞性超出了本书的讨论范围，但请放心，人们已经投入巨大努力来降低哈希函数产生碰撞的风险。\n\
  \n\n\n### 动手尝试\n\n本节将通过一个简单示例，帮助您熟练掌握哈希函数的应用。为此，我参考了配套网站，该网站提供了一个工具，用于为简单文本数据创建哈希值：[`http://www.blockchain-basics.com/HashFunctions.html`](http://www.blockchain-basics.com/HashFunctions.html)\n\
  \n当您用浏览器打开该网页时，将看到一个输入框和一个输出框，如图 10-1 所示。在左侧的输入框中输入文本 `Hello World!`，然后点击文本框下方标有“计算哈希值”的按钮。请确保在输入框中准确输入\
  \ `Hello World!`，否则得到的结果将与图 10-1 所示不同。\n\n![A436689_1_En_10_Fig1_HTML.jpg](img/A436689_1_En_10_Fig1_HTML.jpg)\n\
  \n**图 10-1.** 计算一段短文本的哈希值\n\n点击按钮后，右侧的输出框将显示使用四种不同哈希函数计算出的输入文本哈希值。哈希值通常也被称为哈希数，因为它们不仅使用数字\
  \ 0 到 9，还使用字母 A 到 F（这些字母分别代表数值 11 到 16）来表示数值。这些数字被称为十六进制数。计算机科学家喜欢使用它们，原因在此我不赘述。请注意，由于生成这些值的哈希函数的具体实现细节不同，哈希值也各不相同。这些值被视为既定事实，因为我们不想陷入哈希函数实现这一广泛话题的细节中。\n\
  \n密码学哈希值通常很长，因此人眼难以阅读或比较。然而，在本步骤中，您将比较不同的数据哈希方式，这涉及阅读和比较哈希值。用密码学哈希值来执行此操作很快会变成一项繁琐的任务。因此，出于教学目的，在本步骤的后续部分，我将使用\
  \ SHA256 密码学哈希值的缩短版本。您可以通过配套网站提供的工具重现所有哈希值：[`www.blockchain-basics.com/Hashing.html`](http://www.blockchain-basics.com/Hashing.html)\n\
  \n当您用浏览器打开该网站时，会看到一个用于输入简单文本的输入框、一个带箭头指向输出框的按钮，如图 10-2 所示。点击带箭头的按钮，输出框将显示输入框中文本的缩短哈希值。\n\
  \n![A436689_1_En_10_Fig2_HTML.jpg](img/A436689_1_En_10_Fig2_HTML.jpg)\n\n**图 10-2.**\
  \ 计算一段文本的缩短哈希值\n\n### 数据哈希的模式\n\n到目前为止，您已经了解到可以将一段数据作为哈希函数的输入，从而得到该数据的哈希值。这意味着每一段独立的数据都有其唯一的密码学哈希值。但是，如果您需要为一组独立的数据提供一个单一的哈希值，该怎么办？请记住，哈希函数在给定时间内只接受一段数据。没有哈希函数能同时接受一组独立的数据，但在现实中，我们常常需要为大量数据提供一个单一的哈希值。特别是，区块链数据结构必须同时处理许多交易数据，并且需要为所有这些数据提供一个单一的哈希值。您该如何处理这个任务？\n\
  \n答案是使用以下某种模式来对数据应用哈希函数：\n\n* 独立哈希\n* 重复哈希\n* 组合哈希\n* 顺序哈希\n* 分层哈希\n\n#### 独立哈希\n\
  \n独立哈希意味着对每一段数据独立地应用哈希函数。图 10-3 通过分别计算两个不同单词的缩短哈希值来说明这一概念。\n\n![A436689_1_En_10_Fig3_HTML.jpg](img/A436689_1_En_10_Fig3_HTML.jpg)\n\
  \n**图 10-3.** 独立哈希不同数据的示意图\n\n每个包含一个单词的白色方框代表待哈希的数据，灰色圆圈显示对应的哈希值。从方框指向圆圈的箭头示意性地展示了数据到哈希值的转换过程。如图\
  \ 10-3 所示，不同的单词会产生不同的哈希值。\n\n#### 重复哈希\n\n您已经了解到哈希函数可以将任意数据转换为哈希值。哈希值本身也可以被视为一段数据。因此，应该可以将一个哈希值作为哈希函数的输入，并计算其哈希值。这实际上是可行的！重复哈希就是将哈希函数重复应用于其自身输出。图\
  \ 10-4 通过重复计算缩短哈希值来说明这一概念。文本 `Hello World!` 生成哈希值 `7F83B165`，而该值又进一步生成缩短哈希值 `45A47BE7`。\n\
  \n![A436689_1_En_10_Fig4_HTML.jpg](img/A436689_1_En_10_Fig4_HTML.jpg)\n\n**图 10-4.**\
  \ 重复计算哈希值\n\n#### 组合哈希\n\n组合哈希的目标是在一次操作中为多段数据得到一个单一的哈希值。将所有独立的数据合并为一段数据，然后计算其哈希值，是实现此目标的方法。如果您想为某个时刻可用的一组数据创建一个单一的哈希值，这尤其有用。由于合并数据会消耗计算能力、时间和内存空间，因此组合哈希仅在各个数据段较小时使用。组合哈希的另一个缺点是，各个数据段的哈希值无法获取，因为只有合并后的数据被传递给了哈希函数。\n\
  \n图 10-5 描绘了组合哈希的概念。各个单词首先被合并成一个单词，单词之间用空格隔开，然后再对生成的短语进行哈希。因此，图 10-5 中所示的哈希值结果与图\
  \ 10-4 中的第一个哈希值相同。请注意，合并数据的哈希值关键取决于数据合并的方式。在图 10-4 中，两个单词是通过将它们并排写在一起、中间隔一个空格来合并的，因此最终生成了\
  \ `Hello World!`。有时，会使用特定的符号，如加号（`+`）或井号（`#`），来标记数据连接的点，这也会影响最终的哈希值。\n\n![A436689_1_En_10_Fig5_HTML.jpg](img/A436689_1_En_10_Fig5_HTML.jpg)\n\
  \n**图 10-5.** 合并数据并随后计算哈希值\n\n\n\n##### 顺序哈希\n\n顺序哈希的目标是在新数据到达时增量更新哈希值。这是通过同时使用组合哈希和重复哈希来实现的。现有哈希值与新数据合并，然后传递给哈希函数以获得更新后的哈希值。如果你希望随时间维护单个哈希值，并在新数据到达时立即更新它，顺序哈希尤其有用。这种哈希方式的一个优点是，在任何给定时间点，你都有一个哈希值，其演变过程可以追溯到新数据的到达。\n\
  \n图 10-6 通过先对单词 `Hello` 进行单独哈希来说明顺序哈希的概念，这产生了缩短后的哈希值 `185F8DB3`。一旦由单词 `World!` 表示的新数据到达，它就会与现有哈希值合并，并作为输入提供给哈希函数。哈希值\
  \ `5795A986` 是输入文本 `World! 185F8DB3` 的缩短哈希值。\n\n![A436689_1_En_10_Fig6_HTML.jpg](img/A436689_1_En_10_Fig6_HTML.jpg)\n\
  \n图 10-6. 顺序计算哈希值\n\n##### 分层哈希\n\n图 10-7 说明了分层哈希的概念。\n\n![A436689_1_En_10_Fig7_HTML.jpg](img/A436689_1_En_10_Fig7_HTML.jpg)\n\
  \n图 10-7. 分层计算哈希值\n\n将组合哈希应用于一对哈希值，会形成一个小的哈希值层级结构，其顶部只有一个值。与组合哈希类似，分层哈希的思想是为一组数据创建单个哈希值。分层哈希更高效，因为它组合的是始终固定大小的哈希值，而不是可能任意大小的原始数据。此外，分层哈希在每一步只组合两个哈希值，而组合哈希会在一次尝试中组合你提供的所有数据。\n\
  \n### 展望\n\n本步骤专门讨论了哈希函数的概念。步骤 11 将说明哈希值在实际生活中的使用方式，并重点介绍区块链如何使用它们。\n\n### 总结\n\n\
  *   哈希函数将任何类型的数据转换为固定长度的数字，无论输入数据的大小如何。\n*   存在许多不同的哈希函数，它们在生成的哈希值长度等方面有所不同。\n*\
  \   密码学哈希函数是一类重要的哈希函数，可为任何类型的数据创建数字指纹。\n*   密码学哈希函数具有以下属性：\n    *   快速为任何类型的数据提供哈希值\n\
  \    *   确定性\n    *   伪随机性\n    *   单向使用性\n    *   抗碰撞性\n*   可以通过使用以下模式来对数据应用哈希函数：\n\
  \    *   重复哈希\n    *   独立哈希\n    *   组合哈希\n    *   顺序哈希\n    *   分层哈希\n\n**脚注**\n\
