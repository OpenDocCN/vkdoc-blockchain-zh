  \ `blockchain-data-structure` 也同样无效。\n\n### 有序地更改数据\n\n在讨论了多种篡改 `blockchain-data-structure`\
  \ 的方法（所有这些方法都会导致数据结构无效）之后，现在来说明如何有序地更改或更新 `blockchain-data-structure`。图 15-10 说明了以正确方式更改\
  \ `blockchain-data-structure` 的方法。\n\n![A436689_1_En_15_Fig10_HTML.jpg](img/A436689_1_En_15_Fig10_HTML.jpg)\n\
  \n图 15-10. 有序地更改一笔交易包括更改所有后续的哈希引用\n\n如果我们考虑更改或更新交易 2 的一些细节，我们必须随后更新整个哈希引用序列：`R2`、`R12`、`B1`\
  \ 和 `B2`。这意味着从直接指向被篡改数据的那个哈希引用开始，到指向最新区块头的那个哈希引用结束，以及它们之间的所有哈希引用，都需要被更改和更新，以便它们反映其目标的变化。这是一项相当复杂的工作。而且，这是一个有意为之的复杂过程。所有这些工作都是为了保持整个\
  \ `blockchain-data-structure` 的一致性并维护其完整性。所有其他试图更改或篡改 `blockchain-data-structure`\
  \ 中数据的行为都将导致无效的哈希引用，这反过来会使整个数据结构无效。\n\n### 有意更改与无意更改\n\n前面的讨论表明，`blockchain-data-structure`\
  \ 在更改其数据时采用了一种激进的全有或全无的方式：要么彻底地更改从引起变化的点一直到整条链的末端整个数据结构，要么从一开始就压根儿不要更改。所有其他不彻底的、半途而废的或局部的更改都会使整个\
  \ `blockchain-data-structure` 处于不一致的状态，这种状态很容易被快速检测到。这是由于哈希引用的特性决定的，`blockchain-data-structure`\
  \ 不会区分有意更改和无意更改。实际上，在区块链中不存在有意或无意更改这类概念。这些词语指的是对导致变化的人或其动机的评价。但 `blockchain-data-structure`\
  \ 既不评估动机，也不评估导致不一致的人。区块链只关心所有哈希引用的正确性和一致性。如果其中一个无效，整个数据结构就无效，无论谁或什么导致了这个变化，也不论为何做出这个变化。而这个特性使得\
  \ `blockchain-data-structure` 非常有价值。\n\n### 展望\n\n本步骤详细说明了 `blockchain-data-structure`\
  \ 如何处理其数据的更改。事实证明，`blockchain-data-structure` 对变化非常敏感。它在更改其数据时采用了一种激进的全有或全无的方式。下一步将解释如何利用这一特性使数据不可更改，这使得\
  \ `blockchain-data-structure` 成为在不可靠和不可信环境中存储数据的完美候选方案。\n\n\n\n### 摘要\n\n-   向`blockchain-data-structure`添加新交易数据所需执行的步骤如下：\n\
  \    -   创建一个包含所有待添加新交易数据的新的**默克尔树**。\n    -   创建一个新的区块头，其中包含指向前一个区块头的哈希引用，以及包含新交易数据的默克尔树的根哈希。\n\
  \    -   创建指向新区块头的哈希引用，该区块头现在成为`blockchain-data-structure`的当前链头。\n-   更改`blockchain-data-structure`中的数据需要更新所有哈希引用，从直接指向被篡改数据的那个引用开始，一直更新到整个`blockchain-data-structure`的链头，并包括它们之间的所有哈希引用。\n\
  -   在更改数据方面，`blockchain-data-structure`采取了一种彻底的“要么全有，要么全无”的方法：你要么从引起变化的那个点开始，完全改变整个数据结构，直到整个链的链头；要么就最好一开始就不要改变它。\n\
  -   任何半心半意、半途而废或部分更改都会使整个`blockchain-data-structure`处于不一致的状态，而这种状态会很快且容易被检测到。\n\
  -   完全更改`blockchain-data-structure`本身就是一个非常复杂的过程，这是有意设计的。\n-   `blockchain-data-structure`对更改的高度敏感性归因于哈希引用的特性。\n\
  \n## 16. 保护数据存储\n\n发现不可变性的力量\n\n第 15 步的结论是，`blockchain-data-structure`以对更改敏感的方式存储数据。存储在`blockchain-data-structure`中的任何数据变更都会凸显出来，并且需要一个复杂的过程才能将其整合到现有结构中。本步骤将解释如何利用这一特性，准备好在不可信环境中共享和分发的交易数据历史记录，而无需担心点对点系统中的不诚实成员为自身利益操纵其内容。\n\
  \n### 隐喻\n\n假设我想冒充一个显赫贵族家族的成员。我该如何实现呢？伪造家谱或许可以做到。例如，我可以虚构一个贵族祖父，并通过一份伪造的家谱将自己与他联系起来。这足以让别人相信我这个虚假的贵族血统吗？嗯，这个谎言很快就会被揭穿，因为家谱很少孤立存在；相反，它们通过家族关系相互连接和交织。因此，如果已建立的贵族家族谱系中没有一个提及或关联到我虚构的祖父，那么我虚构的家族史很快就会被认为是假的。为了让我的虚构家族被接受，我需要通过在我的虚构家谱中嵌入指向一些已建立贵族家族谱系的引用，来伪造他们的家族文件。但即便如此也可能不够。真实的人有真实的生活，会在我们的世界中留下足迹。但我虚构的祖父从未真正活过。因此，为了让这个谎言看起来真实，我必须虚构他的一生。这意味着我必须编造我虚构祖父的全部生活，包括他的童年、教育背景和职业生涯。此外，还需要伪造支持性文件，例如出生证明、入学登记文件、学校证书、大学学位、专业资格认证、会员资格等等。学校、大学和雇主都会保存学生和员工的记录，并出版年鉴和社会活动的照片。因此，还需要篡改他们的文件，以使我虚构的祖父成为这些机构的曾经成员。由于篡改所有这些文件既复杂又昂贵，我大概会选择安于我真实但非贵族的家族历史。\n\
  \n这个思想实验说明，伪造过去是可能的，但代价极其高昂，因为它需要重写和伪造历史的大部分内容，以便将虚假信息嵌入到真实历史的许多文件和引用中。这样做的成本高得令人望而却步；因此，坚持真相要容易得多，成本也低得多。本步骤将解释区块链如何利用这一发现来保护其交易数据历史不被伪造。\n\
  \n### 目标\n\n重要的是，区块链维护的整个交易数据历史始终代表真相，从而成为澄清所有权相关事务的可信来源。\n\n### 挑战\n\n区块链是一个完全分布式的点对点系统，对所有人开放。因此，存在不诚实的节点可能为了自身利益而操纵或伪造交易数据历史的风险。挑战在于既要保持系统的开放性，又要保护交易数据历史不被伪造或篡改。\n\
  \n### 思路\n\n在一个开放系统中，事先区分诚实和不诚实的节点是困难的，甚至是不可能的。因此，为了保护交易历史不被不诚实的节点篡改，我们首先要防止任何人篡改历史。如果任何人都不能更改交易数据的历史，无论其是诚实还是不诚实，我们根本无需担心它会被操纵。因此，从一开始就让交易数据历史变得不可更改就解决了问题。这样一来，系统可以对所有人保持开放，也无需担心不诚实节点操纵交易历史。\n\
  \n### 关于不可变性的简短探讨\n\n不可变性意味着某事物不能被更改。一旦被创建或写入，不可变的数据就无法被更改。出于这个原因，这些数据也被称为只读数据。它们全部的价值仅仅在于提供信息以供阅读或展示。当需要将数据交给他人，从而失去对数据使用方式的控制时，这一特性就显得尤为可取。交出不可变数据是防止数据被更改或操纵的有效方法。驾照、护照和教育证书是现实世界中不可变对象的例子。权威机构制作它们是为了记录某些事情，而它们唯一合理的用途就是被出示和读取。\n\
  \n\n\n### 工作原理：宏观概览\n\n区块链使交易历史不可篡改的核心思路是，让篡改的代价高到足以阻止任何人去尝试。实现交易数据历史记录的不可篡改包含三个要素：\n\
  \n1.  以任何微小的数据篡改都会暴露且被察觉的方式存储交易历史数据。\n2.  确保在交易历史中嵌入篡改内容需要重写其中的绝大部分数据。\n3.  在历史记录中增加、写入或重写数据在计算上是昂贵的。\n\
  \n#### 让篡改行为无所遁形\n\n采用`blockchain-data-structure`数据结构以敏感于变更的方式来存储数据，满足了第一个要素。因此，任何人都无法在`blockchain-data-structure`数据中静默地篡改数据并期望无人察觉。任何更改都会因破坏哈希引用而引发巨大的“噪音”，因为更改所引用的数据会导致这些引用失效。\n\
  \n#### 强制重写历史以嵌入更改\n\n`blockchain-data-structure`数据结构也满足了第二个要素，因为它在处理数据变更时采用了一种极端、非黑即白的方法：要么从引发变更的点开始，一直重写到整个链的顶端；要么就最好不要去改它。\n\
  \n#### 让添加数据在计算上变得昂贵\n\n第三个要素是针对那些不畏惧在交易历史中嵌入篡改内容时重写`blockchain-data-structure`大部分数据的人。但是，一旦写入或重写`blockchain-data-structure`会带来巨大的计算成本，人们就会首先三思，这样做是否是个好主意。\n\
  \n`blockchain-technology-suite`技术套件通过在向`blockchain-data-structure`写入、重写或添加每个区块时产生巨大的计算成本，来确保`blockchain-data-structure`的内容不可篡改。这些计算成本源于每个区块头独有的哈希谜题¹。因此，你要么通过为涉及的每个区块头解开哈希谜题来承担从变更点重写到链顶端的全部成本，要么最好保持原样不变。\n\
  \n### 工作原理：详细说明\n\n如步骤 15 所述，向`blockchain-data-structure`添加新区块的过程本身计算成本并不高，因为它只需要将指向当前链顶端的哈希引用添加到新区块头中，并将其声明为新的链顶端即可。使`blockchain-data-structure`不可篡改的挑战在于，让添加新区块本身成为一项计算成本高昂的任务。要实现这一点，需要考虑以下几个方面：\n\
  \n-   区块头的必需数据\n-   创建新区块头的流程\n-   区块头的验证规则\n\n#### 必需数据\n\n`blockchain-data-structure`中的每个区块头至少必须包含以下数据²：\n\
  \n-   包含交易数据的默克尔树根\n-   指向前一个区块头的哈希引用\n-   哈希谜题的难度级别\n-   开始解哈希谜题的时间\n-   解开哈希谜题的随机数（nonce）\n\
  \n#### 创建新区块的流程\n\n创建新区块包含以下步骤：\n\n1.  获取包含待添加交易数据的默克尔树的根。\n2.  创建一个指向将成为新区块头前驱区块的区块头的哈希引用。\n\
  3.  获取所需的难度级别。\n4.  获取当前时间。\n5.  创建一个包含步骤 1 至 4 所述数据的初步区块头。\n6.  为这个初步区块头解开哈希谜题。\n\
  7.  将解开哈希谜题的随机数添加到初步区块头中，完成新区块。\n\n图 16-1 展示了向`blockchain-data-structure`添加新区块时需要解决的哈希谜题。它展示了区块头的数据，其哈希值必须满足给定的约束条件或难度级别。请注意，难度级别是区块头的一部分，因此也是区块哈希值的一部分。这确保了任何人都无法通过随意降低难度级别来绕过哈希谜题的计算成本。\n\
  \n![A436689_1_En_16_Fig1_HTML.jpg](img/A436689_1_En_16_Fig1_HTML.jpg)\n\n图 16-1.\
  \ 向`blockchain-data-structure`添加新区块时需要解决的哈希谜题示意图\n\n#### 验证规则\n\n每个区块头都必须满足以下规则：\n\
  \n1.  必须包含一个指向前一个区块的有效哈希引用。\n2.  必须包含一个包含交易数据的有效默克尔树根。\n3.  必须包含正确的难度级别。\n4.  其时间戳必须晚于其前一个区块头的时间戳。\n\
  5.  必须包含一个随机数（nonce）。\n6.  将这五部分数据组合在一起计算的哈希值必须满足难度级别。\n\n这些验证规则确保了只有那些为哈希谜题付出计算成本而求解的区块才能被添加到`blockchain-data-structure`中。规则\
  \ 4 保证了区块和交易数据确实是按照添加时间排序的。\n\n> **注意：** 通过解哈希谜题向`blockchain-data-structure`添加新区块的活动也称为**挖矿**或**区块挖掘**。\n\
  \n### 为何有效\n\n`blockchain-data-structure`数据结构使得对其数据的任何更改都会因为哈希引用对于所引用数据更改的脆弱性而无所遁形。这导致需要重写所有受篡改影响的区块。哈希谜题则为每个在嵌入篡改内容时需要重写的区块带来了成本。在嵌入篡改内容过程中重写`blockchain-data-structure`所累积的巨大成本，首先就使得篡改交易历史变得毫无吸引力。因此，`blockchain-data-structure`成为了一个不可篡改、只能追加写入的数据存储库。\n\
  \n## 篡改`Blockchain-Data-Structure`的成本\n\n假设我们试图篡改一笔特定的交易数据，该数据属于一个默克尔树，该树的根位于当前`blockchain-data-structure`顶端下方\
  \ 20 个区块的区块头中。嵌入被篡改的交易数据需要完成以下工作：\n\n1.  重写被篡改交易所属的默克尔树。\n2.  重写被重写后的默克尔树根所属的区块头。\n\
  3.  重写所有后续的区块头，直到`blockchain-data-structure`的顶端。\n\n第 2 点需要解一个哈希谜题，因为更改默克尔根会改变区块头的哈希值，从而改变其哈希谜题的解。第\
  \ 3 点由于需要连续更改指向前一个区块头的哈希引用，因此需要解开 20 个哈希谜题。假设平均解开一个哈希谜题需要 10 分钟，那么要将一笔属于当前顶端下方 20\
  \ 个区块的区块头的交易嵌入篡改内容，总共需要 210 分钟。如此巨大的成本会阻止节点去更`blockchain-data-structure`。\n\n\n\n\
  ### 现实世界中的不可变数据存储\n\n`blockchain-data-structure`的不可变性取决于哈希难题所带来的计算成本。哈希难题的难度决定了需要多少计算量，进而决定了解题所需的时间，而这也反过来决定了`blockchain-data-structure`的不可变性。如果难度过低，篡改`blockchain-data-structure`的计算成本就会下降，可能不再被视作高得令人望而却步，这可能会鼓励节点操纵交易数据的历史记录。另一方面，如果难度过高，即使只是新增一个区块的计算成本也可能被视为高得令人无法接受，这又会阻碍节点添加新的交易数据。因此，设计区块链时面临的一个挑战，就是为哈希难题确定合适的难度级别。随着技术进步带来的计算机算力变化，这一挑战变得更加艰巨。因此，难度级别可能需要动态确定。\n\
  \n现实世界中的区块链应用很少对所有区块使用固定的难度级别。相反，它们通常会根据新区块的添加速度，采用动态的难度级别。³ 这可以确保解决哈希难题所需的时间保持在一个既能防止节点操纵交易历史记录，同时实际计算量又可能增加的合理水平。\n\
  \n### 展望\n\n本步骤解释了区块链如何通过将`blockchain-data-structure`转化为一个不可变的仅追加数据存储，来防止交易数据历史记录被篡改或伪造。下一步将侧重于如何在分布式对等系统中让所有人都能访问该数据存储。\n\
  \n### 总结\n\n- 区块链通过将交易数据存储在不可变的数据存储中，保护交易数据历史记录免遭篡改和伪造。\n- 利用以下两个理念实现交易历史的不可变性：\n\
  \    - 将交易数据存储在对变更敏感的`blockchain-data-structure`中，当该结构发生变更时，需要从变更点开始重写数据结构，直至整个链的顶端。\n\
  \    - 要求在`blockchain-data-structure`中写入、重写或添加每个区块头时，都必须解决一个哈希难题。\n- 每个区块头的哈希难题都是唯一的，因为它取决于其独特的内容。\n\
  - 当`blockchain-data-structure`发生变更时需要重写，以及为此付出的成本，从源头上使得操纵交易数据历史记录变得不具吸引力。\n- 要求在`blockchain-data-structure`中每次写入、重写或添加区块头时都解决一个哈希难题，这使得它成为了一个仅追加的数据存储。\n\
  - 区块头至少包含以下数据：\n    - 指向前一个区块头的哈希引用\n    - 包含交易数据的默克尔树根\n    - 其哈希难题的难度\n    - 开始解决哈希难题的时间\n\
  \    - 解决哈希难题的随机数（nonce）\n\n脚注 1\n\nNakamoto, Satoshi. Bitcoin: A peer-to-peer electronic\
  \ cash system. 2008. [`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf)\
  \ 。\n\n2\n\nOkupski, Krzysztof. Bitcoin developer reference. Working paper. 2014。\n\
  \n3\n\nOkupski, Krzysztof. Bitcoin developer reference. Working paper. 2014; Wood,\
  \ Gavin. Ethereum: A secure decentralized generalized transaction ledger. 2014.\
  \ [`http://gavwood.com/paper.pdf`](http://gavwood.com/paper.pdf) 。\n\n"
- "# 在节点间分发数据存储\n\n当计算机开始“闲聊”\n\n第 16 步将`blockchain-data-structure`转化为一个不可变的仅追加数据存储，它可以用作一个防篡改的交易数据账本。孤立地拥有一个不可变的仅追加交易历史记录，对于实现“基于一组充当所有权相关事件见证者的计算机来澄清所有权”这一目标而言，其价值可能有限。因此，本步骤侧重于建立一个纯粹的分布式对等系统，以允许共享有关交易的信息。\n\
  \n### 隐喻\n\n如果你无法访问公司的全局电子邮件分发列表，向公司所有员工传播某些个人新闻的最佳方式是什么？一种能确保所有员工最终都能收到消息的方法是，将消息分享给一两位人脉广、爱闲聊的同事，并要求他们保密。这个方法之所以行得通，是因为在同事之间，几乎没有比“在保密条件下分享的个人新闻”传播得更快的信息了。这个现象背后的原因相当简单：人类是社会性生物，对自己圈子里的同伴有着真诚的兴趣，而分享关于他人的信息是更新或加强社会联系的一种常见行为模式。本步骤将探讨区块链的一个方面，它可能以一种不同的、近乎人性化的视角来描绘对等系统。本步骤讨论的这个方面，就是计算机之间通过通信手段进行的信息交换。\n\
  \n### 目标\n\n区块链是一个纯粹用于管理所有权的分布式对等系统。它由独立的计算机组成，每台计算机都维护着自己版本的不可变账本，其中存储了整个交易数据的历史记录。因此，这些独立的计算机就相当于可以凭自己的记忆证明某个交易是否发生的见证人。但问题是，这些独立的计算机最初是如何观察到或了解到交易的呢？因此，本步骤的主要目标是确保组成这个对等系统的各个独立计算机能够获知交易信息，并能维护自己的交易数据历史记录。\n\
  \n### 挑战\n\n一个纯粹的分布式对等系统没有任何中心化的协调或控制点。因此，不存在一个向组成系统的所有计算机传播信息的中心化组件。这样一个中心化信息点的存在本身就是自相矛盾的。此外，信息的分布也可能因技术问题而失败。因此，挑战在于让系统中的所有节点都能接收到所有交易的信息，同时又不能依赖中心化组件。\n\
  \n\n\n### 核心理念\n\n核心理念是让构成点对点系统的计算机以人类分享新闻的方式共享和交换信息。如果点对点系统中的节点将信息转发给它们的对等节点，而这些节点再将信息转发给它们的对等节点，那么最终系统中的所有节点都将接收到该信息。\n\
  \n在更详细的层面上，点对点系统将模仿人类群体的交流方式，例如公司员工、朋友群体或体育俱乐部成员之间的沟通方式。简而言之，这些群体的成员参与三种不同类型的对话，每种对话都有其独特目的：\n\
  \n-   **闲聊**：从社交角度来看，它发挥着重要作用，因为它能维持现有关系，但其中不包含任何实质信息。\n-   **新闻**：包含参与者之间交换实质信息的对话。\n\
  -   **介绍新成员**：这是让新人加入现有朋友或同事群体所必需的对话类型。建立新关系并接纳新成员始终需要某种形式的入会仪式。正是在这个环节，有志加入的成员会熟悉群体的历史、价值观，并被介绍给群体中的重要成员。\n\
  \n### 工作原理：概述\n\n计算机点对点系统是人群的数字对等物。构成点对点系统的单个计算机也拥有闲聊、交换新闻，并通过入会仪式接纳新成员。这些交互是任何点对点系统不可分割的一部分。与通过口头语言媒介进行交流的人类类似，分布式点对点系统中的计算机通过数字网络进行通信。连接大量计算机的最大网络是互联网。因此，构建点对点系统成本最低的方式是让节点通过互联网相互通信。因此，利用互联网作为通信媒介的分布式点对点系统具有以下特点：\n\
  \n-   每台计算机都通过互联网与系统相连。\n-   每台计算机都由一个唯一的地址标识。\n-   每台计算机可以在任何时间断开和重新连接系统。\n-  \
  \ 每台计算机独立维护一个它与之通信的对等节点列表。\n-   节点之间的通信基于消息。\n-   消息通过使用节点的唯一互联网地址，在互联网上从一个节点发送到另一个节点。\n\
  \n节点通过网络通信以及它们可以随时断开和重新连接这一事实，会影响消息的投递。在此类网络中，消息投递具有以下特性：\n\n-   不保证消息能送达收件人，它们可能会丢失。\n\
  -   消息可能到达多次。\n-   消息到达的顺序可能与发送顺序不同。\n\n这些特性给通信带来了一些障碍，但它们通过以下方式得到了解决：\n\n-   消息以谣言传播（Gossip）的方式发送。每个接收到新信息的节点都会将其转发给它所通信的对等节点，这些对等节点将以相同方式处理该新闻。这确保了即使某些单独的消息丢失，最终每个节点都能收到新闻。\n\
  -   由于消息可以通过其数字指纹或加密哈希值来识别，节点可以轻松识别重复消息并将其忽略。\n-   交易数据和区块头都包含时间戳，这使得节点能够基于客观标准对它们进行排序。\n\
  \n### 工作原理：细节\n\n构成分布式点对点系统的节点之间的通信具有以下三个目的：\n\n-   保持现有连接\n-   建立新连接\n-   分发新信息\n\
  \n前两种通信主要关注点对点系统本身。它们涉及维护对等节点网络并执行一些数字“内务管理”。但点对点系统的目的并非仅仅为了保持忙碌而忙碌。相反，点对点系统的目的是管理所有权。因此，第三种通信侧重于新的交易数据和待添加到\
  \ `blockchain-data-structure` 的新区块。系统中的每个节点都需要这些信息，以便维护其自身版本的事务历史记录。\n\n#### 保持现有连接\n\
  \n网络中的每台计算机都独立维护一个它与之通信的对等节点列表。此列表仅包含构成整个系统的所有节点的一个子集。这类似于员工与部分同事保持社交联系，这些同事仅占同一公司所有员工的一个子群。每台计算机会定期验证这些对等节点是否仍然可用。这通过向对等节点发送一个简短消息（通常称为\
  \ `ping`）来完成，请求其用一个称为 `pong` 的消息进行回复。反复不回复这些消息的对等节点将从对等节点列表中移除。这类似于同事之间的闲聊，其主要目的是维持社交关系。\n\
  \n#### 建立新连接\n\n任何计算机都可以向组成系统的任何节点发送相应的请求消息，以请求加入点对点系统。被请求的节点会将请求者的地址添加到其节点列表中，并发送确认作为回复。收到回复后，该节点也会将发送者的地址添加到自己的节点列表中。结果，一个新的连接建立，系统增加了一个节点。仅与系统建立一个连接是有风险的，因为任何节点都可能随时终止连接、关闭甚至崩溃。因此，在加入点对点系统时，一台计算机通常会与系统中已有的许多不同节点建立连接。这确保了即使单个节点断开或关闭，与整个系统的连接也能维持。\n\
  \n#### 分发新信息\n\n这种通信服务于系统管理所有权的应用目标。这通过以谣言传播的信息转发方式，将新的交易数据和待添加到 `blockchain-data-structure`\
  \ 的新区块进行转发来实现。与所有权相关的信息共享发生在以下三种情况：\n\n-   **持续进行时**：新信息（例如，新的交易数据和新区块）在出现时即被分发。连接到系统的每个节点最终都会收到所有新闻。\n\
  -   **作为更新**：在断开连接一段时间后重新连接到系统的节点，会收到它们在此期间错过的所有交易数据和区块。\n-   **作为引导流程的一部分**：新加入系统的节点此前从未与系统连接过，因此没有机会建立自己的事务历史记录。因此，它们需要获取从系统开始到它们加入之时发生的全部事务历史记录。将整个最新版本的\
  \ `blockchain-data-structure` 副本传输给新节点，确保其在加入系统后成为一个成熟的节点。这种信息交付方式可以被视为更新的极端情况：系统中曾经发生过的所有事务历史的完整更新。\n\
  \n\n\n### 工作原理\n\n不同类型的通信确保了新计算机能够加入系统，从而促进其发展。此外，系统通过专注于建立新连接和维护现有连接的通信方式得以维系。最重要的是，系统采用了一种**八卦协议**式的通信方式，确保点对点系统中的所有成员最终都能收到所有交易数据以及待添加到`blockchain-data-structure`中的区块。\n\
  \n### 展望\n\n本节重点介绍了单个计算机如何成为分布式点对点系统的节点，以及组成该系统的计算机之间如何进行通信。具体来说，本节聚焦于不可靠网络中的消息传递方面。然而，此讨论并未考虑单个节点在收到信息后如何处理这些信息，但处理信息与接收信息同等重要。因此，下一步将讨论交易数据如何在单个节点内部进行处理。\n\
  \n### 总结\n\n*   分布式点对点系统中的计算机通过数字网络相互通信。\n*   由于互联网的普遍存在，通过互联网连接各个节点来创建分布式点对点系统具有很大的吸引力。\n\
  *   使用互联网作为通信媒介的点对点系统具有以下特征：\n    *   计算机之间通过互联网相互连接。\n    *   每台计算机由一个唯一的地址标识。\n\
  \    *   每台计算机可以在任何时间断开与系统的连接或重新连接。\n    *   每台计算机独立维护一份与其通信的对等节点列表。\n    *   节点之间的通信基于消息。\n\
  \    *   消息通过使用节点的唯一地址，经由互联网从一个节点发送到另一个节点。\n*   由于网络的对抗性，节点之间的通信具有以下特征：\n    * \
  \  消息不能保证送达收件人，反而可能丢失。\n    *   消息可能会重复到达。\n    *   消息到达的顺序可能与发送顺序不同。\n*   区块链通过以下方式应对在不可靠网络上通信的对抗性：\n\
  \    *   消息以**八卦协议**风格发送。每个收到消息的节点会将其转发给与之通信的对等节点，而这些对等节点会以同样的方式处理该消息。\n    *  \
  \ 重复的交易或区块会根据其加密哈希值被识别并过滤掉。\n    *   每个节点可以对接收到的信息进行排序，因为交易数据和区块头包含时间戳。\n*   组成点对点系统的计算机之间的通信服务于以下三个目的：\n\
  \    *   保持现有连接活跃\n    *   建立新连接\n    *   分发新信息\n*   转发与所有权相关的信息发生在三种情况下：\n    *\
  \   以持续的方式，将新的交易数据和新区块转发给系统中所有已连接的节点。\n    *   作为对断开连接一段时间后重新连接系统的节点的更新。\n    *\
  \   作为节点加入流程的一部分，将整个最新版本的`blockchain-data-structure`副本传输给新节点，以确保它们在加入系统后成为功能完备的节点。\n\
  \nFootnotes 1\n\nTanenbaum, Andrew S., and Maarten Van Steen. Distributed systems:\
  \ principles and paradigms (2nd ed.). Upper Saddle River, NJ: Pearson Prentice Hall,\
  \ 2007; Tanenbaum, Andrew S., and David J. Wetherall. Computer networks (5th ed.).\
  \ Upper Saddle River, NJ: Prentice Hall, 2010.\n\n"
- "# 验证并添加交易\n\n用胡萝卜加大棒来管理一组计算机\n\n在第 17 步中，单个计算机被转变为纯粹分布式点对点系统的节点，它们相互之间就交易数据和待添加到`blockchain-data-structure`中的新区块进行通信。本节重点介绍节点收到交易数据后会发生什么，以及如何确保只有有效的交易数据和区块才会被添加到`blockchain-data-structure`中。\n\
  \n### 隐喻\n\n让我们考虑一家提供简单服务的公司：为学校和大学批改选择题。学校和大学可以将学生的多项选择题答题卡连同正确答案发送给该公司，公司负责批改所有答题卡。不幸的是，该公司的员工缺乏做好本职工作的动力。结果，公司将所有员工转变为承包商，他们只能获得与绩效相关的报酬，该报酬受以下三条规则约束：\n\
  \n1.  所有待批改的答题卡、正确答案以及所有已批改的答题卡都通过公司的软件系统随时可供所有承包商查看。\n2.  只有第一个正确批改某张答题卡的承包商才能获得一美元作为奖励。\n\
  3.  如果某承包商发现另一承包商批改的答题卡有误，犯错的承包商必须退还报酬，而发现并纠正错误的承包商将获得该报酬。\n\n### 后果\n\n上述场景的规则会带来几个后果：\n\
  \n*   由于承包商只能获得与绩效相关的报酬，他们有着强烈的经济动机去遵守规则。\n*   根据规则 1，所有承包商都有平等的机会投入工作并赚钱。\n*  \
  \ 根据规则 1，所有承包商都掌握必要信息来控制和纠正同事的工作。\n*   根据规则 2，每个承包商都有动力快速工作。然而，工作质量可能会因追求速度而受损。\n\
  *   根据规则 3，每个承包商都有动力认真工作。\n*   根据规则 3，每个承包商都有动力去控制和纠正同事的工作。\n\n由于这些规则，公司的效率显著提高。但几个月后，公司收到了客户的大量投诉。工作质量急剧下降。看起来所有选择题都像是被完全随机批改的。经过一番调查，公司发现承包商们达成了默契。他们相互约定不去检查任何同事的工作结果，而是尽可能快速地批改。由于随机分配分数是完成工作的最快方式，所有承包商最终都采用了这种批改策略。\n\
  \n从这个隐喻中得出的教训是：奖励、惩罚、同伴压力和竞争的结合可以用来管理一群独立行动的个人，只要他们不集体抵制。\n\n本节解释了`blockchain-algorithm`，它不过是对这种胡萝卜加大棒方法，并结合竞争与同伴压力的巧妙实现，其运作方式与此示例中的公司类似。然而，挑战在于如何妥善处理所有细节。\n\
  \n### 目标\n\n目标是在保持交易历史数据完整性的同时，允许任何人向其中添加新的交易数据。\n\n### 挑战\n\n区块链是完全开放的。任何人，即使是最不诚实的人，都可以将计算机连接到系统，从而创建交易并将其发送给组成系统的所有其他节点。因此，无法保证通过网络发送的交易是正确的。所以，挑战在于既要保持系统对所有人开放，又要确保只有有效的交易被添加进去。\n\
  \n\n\n### 核心理念\n\n为了确保只有有效交易被添加到系统中，系统中的所有节点都可以同时充当其他节点的监督者，并对那些添加有效授权交易以及发现他人工作错误的节点给予奖励。因此，系统中的所有节点都会受到激励，去正确处理交易、监督并指出任何其他节点所犯的错误。¹\n\
  \n### 工作原理：基础模块\n\n`blockchain-algorithm` 是一套指令序列，用于规定节点如何处理新的交易数据和区块。各个具体的规则和流程可以追溯到以下基础模块：\n\
  \n*   验证规则\n*   奖励\n*   惩罚\n*   竞争\n*   节点互控\n\n#### 验证规则\n\n`blockchain-algorithm`\
  \ 的最终目标是确保 `blockchain-data-structure` 只包含有效的区块，而这些区块又由有效的交易数据和有效的区块头组成。这些数据的有效性基于两个不同的验证规则组进行评估：\n\
  \n*   交易数据验证规则\n*   区块头验证规则\n\n##### 交易数据验证规则\n\n交易数据验证规则定义了描述一笔交易所需的数据。这些规则涵盖了形式正确性、语义正确性以及授权。步骤\
  \ 9 讨论了交易数据的验证规则。这些规则特定于区块链的应用目标。因此，用于管理数字积分所有权的区块链可能与管理房地产所有权的区块链有着不同的验证规则。\n\n\
  ##### 区块头验证规则\n\n区块头验证规则重点关注区块头的形式和语义正确性。这些规则与交易数据的内容无关；相反，它们关注的是信息添加到 `blockchain-data-structure`\
  \ 的方式。步骤 16 讨论了区块头的强制数据及其验证规则。验证区块头的一个核心要素是分别验证工作量证明或哈希难题。只有那些区块头包含其各自哈希难题正确解的区块才会被进一步处理。任何区块头未能通过工作量证明验证的区块都将被立即丢弃。\n\
  \n#### 奖励\n\n创建有效区块会消耗能量、时间和金钱，因为这需要解决计算成本高昂且每个区块独有的哈希难题。哈希难题是使 `blockchain-data-structure`\
  \ 不可篡改的关键要素。因此，解决哈希难题是绝对不可或缺的，其带来的成本也同样不可避免。要说服节点承担解决哈希难题的负担，唯一的方法就是为他们提供奖励作为工作的补偿。因此，`blockchain-algorithm`\
  \ 定义了如何奖励提交有效区块的节点。从更抽象的角度来看，可以说奖励是对为达成和维护整个系统完整性所付出所有努力的补偿。\n\n#### 惩罚\n\n奖励只是一种激励节点验证交易数据并创建有效区块的手段。区块链还需要一种方式来惩罚那些破坏系统完整性的节点。典型的惩罚措施包括收回过去被接受但后来被认定为无效或无用的区块的奖励。另一种惩罚形式是取消奖励。让节点执行工作量证明，但因其提交的区块被认定为重复、过时或无用而拒绝给予奖励，这本身就是一种惩罚。这是因为创建有效区块需要解决哈希难题，而这会产生成本。创建区块却得不到奖励意味着无法覆盖创建成本。因此，得不到奖励也构成了一种惩罚。\n\
  \n#### 竞争\n\n奖励提交有效区块的节点是 `blockchain-algorithm` 的核心概念，但发放奖励会消耗资源。因此，关键是要防止将资源浪费在那些对系统维护没有显著贡献的节点上。在降低成本的同时实现高质量工作的最佳方式，是基于一个明确定义的标准建立奖励竞争机制。`blockchain-algorithm`\
  \ 基于两个标准维持着一场持续的奖励竞争。这场竞争实际上是以下按序进行的多项竞争的组合：\n\n*   速度竞争\n*   质量竞争\n\n只有同时赢得这两项竞争的节点才能获得提交新区块的奖励。这场竞争的巧妙之处在于，速度竞争的失败者将成为质量竞争的裁判，负责验证速度竞争获胜者提交的区块。这确保了提交的区块会受到严格的审查。\n\
  \n##### 速度竞争\n\n节点间的速度竞争基于哈希难题。创建有效区块的核心要素是生成工作量证明，这意味着要解决新区块独有的哈希难题。基于加密哈希函数的特性，解决哈希难题所需的时间是未知的。由于难题本身依赖于区块的内容，因此无法提前解决。因此，所有节点都参与到解决新区块哈希难题的竞争中。一旦有节点提交了新区块，速度竞争即告结束。第一个提交包含有效哈希难题解的新区块的节点，就是速度竞争的胜出者，并成为质量竞争的唯一候选者。\n\
  \n##### 质量竞争\n\n质量竞争聚焦于所提交区块的正确性。一旦某个节点提交了新区块，该区块就会被发送到系统中的所有节点。每个节点在收到新区块后，都必须担任质量竞争的裁判，这意味着要根据交易数据和区块头的验证规则来验证新区块。如果区块被认定有效，则提交该新区块的节点获得奖励，同时一场新的速度竞争开始，其竞争对象是尚未处理或在此期间新到达的交易数据。如果区块被认定无效，它将被丢弃，并且速度竞争重新开始，包含所有原本处于竞争状态的交易。\n\
  \n质量竞争包含一个有趣的节点互控方面。通过接收新区块，每个节点都意识到自己已经输掉了速度竞争，并且必须作为裁判参与质量竞争。不言而喻，这些裁判是所有参与者中最为一丝不苟和严格的，因为他们已经输掉了速度竞争，所以没有什么可再失去的了。实际上，所有节点都知道，如果他们能够证明提交的区块无效，就能重新回到竞争中获得奖励。在这种情况下，速度竞争会重新开始，他们就有机会完成自己因竞争中断而尚未完成的区块，并赢得这场竞赛。因此，质量竞争，或者说对所提交区块的审查，将会以极高的精确度进行。\n\
  \n\n\n##### 节点相互监督\n\n即使规则再完善，如果无人遵守、无人监督执行、无人强制实施，也毫无用处。不幸的是，纯粹分布式的点对点系统既没有，也不会接受一个能够监督规则遵守情况并强制执行的中央控制或协调点。因此，区块链算法让系统中的所有节点都成为其他节点的监督者。系统中的节点同时扮演着工作者和监督者的角色，因为它们既要验证交易、创建新区块，同时也要接收、审查并验证其他节点创建的区块。每个节点的工作既有助于创建新的有效区块，也有助于发现、拒绝或移除无效的交易数据或无效区块。\n\
  \n### 工作原理：骨架\n\n竞赛规则建立了一个简单的两步节奏，支配着网络中每个节点的工作。在任何给定的时间点，系统中的所有节点都处于以下两个阶段之一：\n\
  \n1.  评估某个对等节点创建并提交的新区块\n2.  努力成为下一个创建新区块的节点，而该新区块又必须经过所有其他节点的评估\n\n区块链算法最重要的成果之一是，它不仅确保了对交易数据和区块的验证，还确保了所有节点拥有相同的工作节奏。这种相同的工作节奏是确保所有区块维护相同交易数据历史记录的核心概念。然而，工作节奏并非由中央时钟强加给节点，因为那将与系统纯粹的分布式特性相矛盾。推动节奏运转的是到达各个节点的消息。一旦节点收到包含新区块的消息，它就会切换到评估阶段；一旦评估阶段结束，节点就会切换回来，继续验证新的交易数据并自行创建新区块。\n\
  \n### 工作原理：细节\n\n管理节点如何处理从对等节点接收的新交易数据和区块的程序包含以下规则（**加粗**的规则是建立两步节奏的规则）：\n\n1. \
  \ 新交易数据以及新区块以八卦协议的方式转发给所有节点。\n2.  每个节点将新交易数据收集到收件箱中，并选择它们进行处理。\n3.  每个节点立即以最高优先级处理新区块。\n\
  4.  每个节点通过验证新交易数据的授权以及形式和语义正确性来处理它们。\n5.  每个节点仅将有效的交易数据收集到一个默克尔树中，并通过求解其哈希难题开始创建新区块。\n\
  6.  一旦节点完成哈希难题，它就将新创建的区块发送给所有其他节点。\n7.  每个节点通过验证新区块哈希难题的解，并验证其包含的所有交易数据的格式正确性、语义正确性和授权来处理新区块。\n\
  8.  每个节点将有效区块添加到其自身的区块链数据结构副本中。\n9.  如果新到达的区块被识别为无效，它将被丢弃，节点继续处理交易数据或完成新区块的哈希难题。\n\
  10. 如果新到达的区块被识别为有效，节点将从其自身的收件箱中移除该新区块中包含的那些交易，并开始处理交易数据和创建新区块。\n11. 如果后来某个已添加到区块链数据结构的区块被识别为无效或无用时，该区块及其所有后续区块都将从区块链数据结构中移除，其交易将被添加到收件箱中以便重新处理。\n\
  12. 其区块被接受的节点将获得该区块中包含的所有交易的费用作为奖励。\n13. 如果某个区块从区块链数据结构中移除，那么最初获得该区块奖励的节点将被收回该奖励。\n\
  \n### 为何有效\n\n上述规则之所以有效，原因在于：\n\n-   由于规则 1，所有节点都能收到验证和添加交易数据所需的所有信息。\n-   由于规则\
  \ 2，节点会处理它们收到的新交易数据。\n-   由于规则 3，其他节点创建的区块到达节点收件箱后会立即得到处理。\n-   由于规则 4，只有有效的交易数据才会被添加到区块链数据结构中。\n\
  -   由于规则 5，所有节点都参与了解哈希难题的竞赛。由于哈希难题的性质，无法预测哪个节点会首先解出。\n-   由于规则 6，当某个节点解出新区块的哈希难题时，所有节点都会得到通知。\n\
  -   由于规则 6 和规则 3，所有节点都会收到新创建的区块，并识别出解哈希难题竞赛的获胜者。\n-   由于规则 7，系统中的所有节点都会审查和验证新创建的区块，确保只有正确的区块被接受。\n\
  -   由于规则 8，所有节点都会将新区块添加到它们自己的区块链数据结构副本中，从而增长交易历史记录。\n-   由于规则 9，共同维护的交易历史记录保持无无效交易，从而维护了完整性。\n\
  -   由于规则 10，没有交易数据会被重复添加。\n-   由于规则 11，即使之前处理过的区块被重新处理，也不会有有效交易丢失。\n-   由于规则 11，系统能够对交易历史记录进行事后有效性检查并进行追溯修正。\n\
  -   由于规则 12，节点有动力快速处理交易并创建新区块。\n-   由于规则 12，所有节点都有动力将新区块告知所有其他节点，因为获得奖励取决于交易被所有其他节点审查和接受。\n\
  -   由于规则 13，节点有动力正确工作，避免接受任何无效交易数据或产生无效区块。\n-   由于规则 13，节点有动力以追溯的方式审查和重新验证区块和交易。\n\
  \n### 应对不当行为\n\n区块链旨在完全开放、由数量未知且可靠性与可信度未知的节点组成的点对点系统中建立完整性和信任。在管理所有权的点对点系统中，最常见的不当行为包括：\n\
  \n-   通过冒充他人来提交交易\n-   接受无效的交易数据或区块\n-   用大量交易数据淹没某个节点，试图使其崩溃\n-   拒绝处理某些交易数据\n\
  -   拒绝转发信息\n\n所有这些不当行为的情况都已通过以下方式得到涵盖：\n\n-   交易的安全概念（通过非对称密码学和数字签名实现的身份识别、认证和授权），它将账户的访问权限限制在相应私钥持有者手中\n\
  -   八卦通信模型，确保每个节点最终都能收到所有信息\n-   系统的架构，确保即使某些个别节点崩溃或停止处理数据，整个系统也能保持存活\n-   区块链算法\n\
  \n区块链对抗不诚实节点最重要的武器是诚实多数的力量以及奖惩效应。即使某些节点发送伪造交易或接受无效交易数据或无效区块，诚实的多数节点及其对奖励的追求将压倒不诚实者试图破坏系统完整性的行为。显然，这种方法依赖于一个假设，即确实存在诚实的多数节点。\n\
  \n\n### 概述\n\n本步骤解释了区块链如何处理交易数据并将其添加到 `blockchain-data-structure` 中，从而将其纳入交易数据的正式历史记录。本步骤中讨论的指令旨在确保系统中的所有节点都维护相同版本的\
  \ `blockchain-data-structure`，并因此维护相同的交易数据历史记录。然而，有时节点会维护不同的历史记录，这意味着它们无法就同一份交易数据历史记录达成一致。解决这些冲突是\
  \ `blockchain-algorithm` 的另一项任务，将在下一步中进行探讨。\n\n### 总结\n\n*   `blockchain-algorithm`\
  \ 是一系列规则和指令，用于管理交易数据的处理方式并将其添加到系统中。\n*   `blockchain-algorithm` 所解决的挑战是，在确保仅添加有效且经过授权的交易的同时，保持系统对所有人开放。\n\
  *   `blockchain-algorithm` 采用了胡萝卜加大棒的方法，并结合了竞争与同行监督。\n*   `blockchain-algorithm`\
  \ 的主要理念是允许系统中的所有节点充当其同行的监督者，并奖励它们添加有效且经过授权的交易，以及在他人工作中发现错误。\n*   由于 `blockchain-algorithm`\
  \ 的规则，系统中的所有节点都有动力去正确地处理交易，并监督和指出其他同行所犯的任何错误。\n*   `blockchain-algorithm` 基于以下概念：\n\
  \    *   交易数据和区块头的验证规则\n    *   提交有效区块的奖励\n    *   破坏系统完整性的惩罚\n    *   基于处理速度和质量，为获得奖励而进行的同行竞争\n\
  \    *   同行监督\n*   竞争规则建立了一个两步节奏，用于管理网络中每个节点的工作。在任何给定时间点，系统中的所有节点都处于以下两个阶段之一：\n\
  \    *   评估由其他节点创建的新区块\n    *   努力成为下一个创建新区块（该区块必须由所有其他节点评估）的节点\n*   这种工作节奏是由到达各个节点的消息所决定的。\n\
  *   大多数诚实节点及其对奖励的追求将战胜不诚实节点试图破坏系统完整性的行为。\n\n脚注 1\n\n中本聪。比特币：一种点对点电子现金系统。2008 年。[`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf)。\n\
  \n2\n\n后来被识别为无效的区块实际上并未从 `blockchain-data-structure` 中物理移除。相反，它们会被标记为无效，并被视为已被移除。因此，所有更改都按记录保留。\n\
  \n## 19. 选择交易历史\n\n让计算机用脚投票\n\n步骤 18 解释了区块链节点如何处理交易数据和新区块。然而，由于消息传递中的延迟或错误，系统中各个节点维护的交易历史可能仍然不同。因此，本步骤专注于解决系统中各个节点所维护的不同版本交易历史之间的冲突。\n\
  \n### 比喻\n\n你上次在公园散步是什么时候？你有没有注意到一个在全球大多数公园都能观察到的现象？公园里有依照景观设计师的规划和想法修建的铺砌小路，也有游客踩出的土路。这些土路通常是一条条穿过草坪的直线，在两个地标、两张公园长椅或其他兴趣点之间提供了高效的捷径。当许多人都独立且持续地决定偏离铺砌的小路，因为这样做似乎比沿着铺砌的小路走更可取时，土路就出现了。因此，公园里土路的形成可以被看作是某种最基础形式的民主的结果。这些道路的出现并非由官方的民意调查或选举来支配，而是每位游客通过自己独立的选择——是否沿着某些路径行走——并在地上留下足迹，从而促成了它们的形成。人迹罕至的土路会随着大自然重新夺回领地而消失，但其他的土路则因为许多人继续行走而得以保留。本学习步骤解释了区块链的一个方面，其运作方式类似于公园中土路的出现与消失。\n\
  \n### 目标\n\n目标是在网络中的所有节点之间维护一份明确无误的交易数据历史记录，使得在处理所有权查询时，无论联系或请求的是哪个特定节点，都能得到相同的结果。\n\
  \n### 挑战\n\n步骤 18 中解释的 `blockchain-algorithm` 向系统中的所有节点强加了一个两步节奏。在任何给定时间点，系统中的每个节点要么在检查由某个同行创建的新区块，要么在努力成为下一个创建新区块（随后必须由所有其他节点检查）的节点。然而，并没有一个全局时钟来统辖所有节点，并规定在任何给定时间必须执行两种工作中的哪一种。新区块到达各个节点收件箱的情况，就是驱动任何给定节点工作的时钟脉冲发生器。然而，新区块到达各个节点收件箱的情况深受网络消息传递能力的影响，而网络本身也面临各种不利因素。消息可能会丢失、延迟送达，或者以任意顺序到达。其结果是，网络中的节点无法在同一时间拥有相同的信息。此外，所有节点在工作阶段之间的切换并非同时发生。相反，每个节点会根据其收件箱中消息的到达情况，在各自独立的时间进行工作阶段的切换。这导致了各个节点工作阶段的重叠。这两种效应都给在网络中所有同行之间维护一份明确无误的交易数据历史记录带来了巨大障碍。因此，挑战在于：在面临所有消息传递的不利因素，并且不依赖集中式解决方案的情况下，找到一种方法来识别一份明确无误的交易数据历史记录。\n\
  \n\n\n### 核心理念\n\n公园里踏出小径的例子表明，群体可以通过独立且一致地用脚投票，在集体决策问题上达成一致或共识。这种投票的结果通常被称为**分布式共识**，因为它是在独立行动的个体之间达成的，没有中央控制或协调元素。\n\
  \n> **注意**：共识是独立个体间达成一致的代名词。分布式共识则是纯粹分布式点对点系统成员之间达成的一致。\n\n由独立行动的群体或蜂群解决集体问题的情况，可以通过以下条件来描述¹：\n\
  \n1.  一群个体在相同的环境中运作。\n2.  存在一个集体决策问题。\n3.  这些个体独立地努力实现同一个目标。\n4.  为实现目标所执行的个体行为会在环境中留下可见标记，有助于解决集体决策问题。\n\
  5.  个体基于环境的变化，使用相同的标准来评估决策问题。\n\n区块链的理念是让所有节点独立地用脚投票，从而就交易历史版本的选择达成集体共识。在本书目前阶段我们所知的区块链，满足了集体决策的前四个条件：\n\
  \n1.  所有节点都在相同的环境中运作，这个环境包括网络、维护各自 `blockchain-data-structure` 副本的节点，以及规范节点行为的 `blockchain-algorithm`。\n\
  2.  决策问题是要集体选择一条交易历史。\n3.  所有节点都力求最大化其通过向 `blockchain-data-structure` 添加有效新区块所获得的个人奖励收入。\n\
  4.  为了实现各自的目标，所有节点都将自己的新区块发送给所有对等节点，以供其检验和接受。因此，每个节点都在由集体维护的 `blockchain-data-structure`\
  \ 这一环境中留下了自己的足迹。\n\n然而，还缺少第五点：所有节点基于环境变化做出决策时所使用的标准。如何选择交易数据历史的思路，基于新区块是如何被添加到 `blockchain-data-structure`\
  \ 中，以及数据是如何被保护免受篡改的。由于工作量证明的存在，添加新区块的计算成本很高，并且使得篡改交易历史的尝试在计算上更加昂贵。因此，当存在多个冲突版本时，花费在创建交易历史上的累计计算工作量似乎是一个自然的选择标准。如果系统中的所有节点都应用相同的标准来选择交易历史，那么系统中的所有节点最终都会就该历史的同一版本达成一致。这个集体选定的交易历史版本通常被称为权威链或权威历史。\n\
  \n### 工作原理\n\n根据创建交易历史所花费的计算工作量来选择交易历史的思路，引出了以下两个标准：\n\n-   最长链准则²\n-   最重链准则³\n\
  \n\n\n#### 最长链准则\n\n最长链准则基于以下理念：包含最多区块的区块链数据结构代表着最集中的计算工作量。为了研究这一准则，让我们考虑一个初始情形：分布式系统的所有节点都维护并认同同一个版本的区块链数据结构，如图\
  \ 19-1 所示，该图展示了一个简化了许多细节的区块链数据结构示意图。每个方框代表一个区块，并用缩短的哈希值进行标识。从一个方框指向另一个方框的箭头，代表将区块头链接到其前一个区块的哈希引用。在这个初始状态下，所有节点都认同同一个交易数据历史记录，并致力于用另一个以区块`A397`作为前驱的新区块来扩展现有链。\n\
  \n![A436689_1_En_19_Fig1_HTML.jpg](img/A436689_1_En_19_Fig1_HTML.jpg)\n\n图 19-1.\
  \ 分布式系统中的初始区块链数据结构\n\n寻找新区块是所有节点之间的一场竞赛，因为这需要解出该区块特定的哈希谜题。图 19-2 展示了当某个节点解出了新区块的哈希谜题并将其发送给对等节点后，大多数节点所维护的区块链数据结构。因此，那些维护如图\
  \ 19-2 所示区块链数据结构的节点，会致力于用另一个以区块`AB12`作为前驱的新区块来扩展它。从多数节点的角度来看，只存在一个由三个区块组成的区块链数据结构版本。然而，通过网络发送新区块需要时间，并且会遭遇各种不利情况。由于消息传输的延迟，少数节点尚未收到区块`AB12`。因此，它们仍在尝试扩展图\
  \ 19-1 中所示的链。最终，其中一个节点成功解出了哈希值为`DD01`的新区块的哈希谜题，并将其传递给其对等节点。最终，大多数节点都收到了区块`AB12`和区块`DD01`。结果，大多数节点维护的区块链数据结构如图\
  \ 19-3 所示，该结构在共同的主干之上产生了两个分支。在这种情况下，最长链准则无法给出明确的结果，因为两条链（`AB12 → A397 → 33FF` 和\
  \ `DD01 → A397 → 33FF`）长度相同。\n\n![A436689_1_En_19_Fig3_HTML.jpg](img/A436689_1_En_19_Fig3_HTML.jpg)\n\
  \n图 19-3. 延迟区块送达后的区块链数据结构\n\n![A436689_1_En_19_Fig2_HTML.jpg](img/A436689_1_En_19_Fig2_HTML.jpg)\n\
  \n图 19-2. 向现有区块链数据结构添加新区块的结果\n\n在图 19-3 所示的情况下，节点可以自由决定扩展哪个分支。一些节点可能会努力寻找以区块`AB12`作为前驱的新区块，而另一些节点则会努力寻找以区块`DD01`作为前驱的新区块。突然，大多数节点收到了两个新区块`BB11`和`CCC1`，这两个区块都以区块`AB12`作为前驱。这可能是因为两个节点几乎同时完成了各自区块的工作量证明。将这两个新区块纳入区块链数据结构的结果是产生了一个包含三条链的数据结构，如图\
  \ 19-4 所示。其中一条链仅由三个区块组成，而另外两条链则由四个区块组成。\n\n![A436689_1_En_19_Fig4_HTML.jpg](img/A436689_1_En_19_Fig4_HTML.jpg)\n\
  \n图 19-4. 两个节点几乎同时完成工作量证明后的区块链数据结构\n\n最长链准则明确排除了最短的链，即 `DD01 → A397 → 33FF` 这条链。然而，最长链准则无法给出明确的结果，因为存在两条长度相同的链。因此，一些节点可能会努力寻找以区块`BB11`作为前驱的新区块，而其他节点则可能努力寻找以区块`CCC1`作为前驱的新区块。\n\
  \n最终，一个以区块`BB11`作为前驱的新区块到达，形成了如图 19-5 所示的数据结构。图 19-5 中描绘的区块链数据结构包含多个相互冲突的交易历史版本，但最长链准则给出了一个明确的结果：即由区块`0101\
  \ → BB11 → AB12 → A397 → 33FF` 组成的链。系统中的大多数节点，并最终是所有节点，都将使用这条链来处理与所有权相关的请求。系统中的大多数节点，并最终是所有节点，将致力于通过寻找一个以区块`0101`作为前驱的新区块来扩展这个分支。\n\
  \n![A436689_1_En_19_Fig5_HTML.jpg](img/A436689_1_En_19_Fig5_HTML.jpg)\n\n图 19-5.\
  \ 新区块到达后包含一条最长链的区块链数据结构的示意图\n\n一个重要结论是，区块链数据结构实际上并不是一条笔直的链，而更像一棵树或一种柱状仙人掌——可以说是一个区块仙人掌。树的分支代表了交易历史记录的冲突版本，但基于最长链准则，所有节点最终都会一致地识别出相同的交易历史记录版本。\n\
  \n> **注意**  \n> 由于其形状，区块链数据结构通常被称为树形数据结构。区块链数据结构中第一个，也是最古老的区块是没有前驱的区块，它通常被称为树形结构的根。没有后继的区块被称为叶节点。从根到叶节点的一条直线序列被称为路径。\n\
  \n\n\n#### 最重链准则\n\n在步骤 16 中你已了解到，区块链应用在为`blockchain-data-structure`添加新区块时，很少使用恒定难度的哈希难题。相反，它们通常动态确定难度级别，这导致各区块因添加到`blockchain-data-structure`所投入的计算工作量不同而存在差异。另一方面，`最长链准则`基于这样一种理念：包含最多区块的路径代表了最大的计算工作量。然而，在难度级别不一致的情况下，最长路径未必就是代表最大计算工作量的那条。\n\
  \n对于每条路径，可以通过累加其所有区块的难度级别来衡量所投入的计算工作量。该值可利用区块头包含其哈希难题难度级别这一事实来计算。路径的聚合难度级别通常被称为其**权重**。图\
  \ 19-6 描绘了与图 19-5 相同的`blockchain-data-structure`，但这次还显示了其中每个区块的难度级别。最长链（从根`33FF`到叶子`0101`的路径）的权重为\
  \ 5，而第二长链（从根`33FF`到叶子`CCC1`的路径）的权重为 6。因此，图 19-6 所示的`blockchain-data-structure`说明了这样一种情况：此时`最长链准则`会导致节点选择一条并未代表最大计算工作量的链。\n\
  \n![A436689_1_En_19_Fig6_HTML.jpg](img/A436689_1_En_19_Fig6_HTML.jpg)\n\n图 19-6.\
  \ 带有难度级别的`blockchain-data-structure`示意图\n\n因此，动态确定难度级别的区块链不使用`最长链准则`。相反，它们使用`最重链准则`：选择由最重链所代表的交易数据历史。在所有区块难度级别都相同的情况下，最长路径与最重路径是相同的，`最长链准则`和`最重链准则`会得出相同的结果。\n\
  \n### 选择一条链的后果\n\n从冲突的版本中选择一条特定链并将其确立为权威链会带来以下后果：\n\n- 孤块\n- 奖励回收\n- 明确所有权\n- 交易重新处理\n\
  - 共同主干增长\n- 最终一致性\n- 抗操纵性\n\n#### 孤块\n\n共同增长的`blockchain-data-structure`形似一棵树，其分支代表了交易历史的不同冲突版本。应用选择准则实际上意味着选择该树的一条路径，并将其确立为交易数据历史的权威版本。树状数据结构中不属于权威路径的所有区块都会被节点抛弃，并被称为**孤块**。⁴\
  \ 例如，将`最长链准则`应用于图 19-4 所示情况时，区块`DD01`是一个孤块；而在图 19-5 中，区块`DD01`和`CCC1`不属于最长链并被抛弃。将`最重链准则`应用于图\
  \ 19-6 所示情况时，区块`0101`、`BB11`和`DD01`不属于权威链，因此被抛弃。\n\n#### 奖励回收\n\n孤块在明确所有权方面毫无用处，因为它们对权威链没有贡献。因此，创建并提交这些孤块的节点所获得的奖励会被回收。这是由于步骤\
  \ 18 中解释的`blockchain-algorithm`的规则 11 和规则 13 所致，这些规则规定：如果一个后来被添加到`blockchain-data-structure`的区块被认定为无效或无用，该区块及其所有后续区块将被逻辑上从`blockchain-data-structure`中移除，并且因添加该区块而给予的奖励将从最初接收它的节点那里收回。\n\
  \n##### 明确所有权\n\n只有属于权威链的交易才被视为已发生，并用于处理与所有权相关的请求。孤块不属于集体选择的链。因此，它们的交易数据不构成交易数据历史的一部分。相反，它们被视为从未发生过，在处理与所有权相关的请求时也不被考虑。\n\
  \n#### 交易重新处理\n\n属于孤块的交易数据最初提交的目的是将其添加到交易历史中。它们被当作从未发生过这一事实并非事先计划好的，而是工作量证明的随机性及其在增长`blockchain-data-structure`中所起作用的结果。不幸落入孤块的交易数据会再次获得机会成为所选交易历史的一部分：它们被重新放入节点的收件箱，以便后续重新处理并添加到`blockchain-data-structure`中。这是由于步骤\
  \ 18 中解释的`blockchain-algorithm`的规则 11 所致。因此，曾经属于权威链的交易可能会暂时消失（如果大多数节点抛弃了它们所属的区块），但一旦它们被重新处理，便会再次出现。\n\
  \n#### 共同主干增长\n\n应用选择准则并不总能产生明确的结果。例如，在图 19-3 和图 19-4 所示的情况下，存在多条最长链。在这些情况下，`blockchain-data-structure`有两条长度相等的路径，它们源于一个**共同主干**。在图\
  \ 19-3 中，共同主干仅由两个区块组成，形成一条短链`A397 → 33FF`。在图 19-4 中，共同主干已由三个区块组成，形成链`AB12 → A397\
  \ → 33FF`，其中包含了前一情况的共同主干。因此，即使选择准则产生模棱两可的结果，交易历史的冲突版本也是源于一个歧义较少的共同主干。越往区块链的深层追溯，判断某个区块是否属于最长链的决定就越明确。\n\
  \n\n\n##### 最终一致性\n\n让我们考虑图 19-4 所示的情况，其中最长链准则并未产生明确的结果。如图 19-5 所示，下一个被添加到`blockchain-data-structure`中的区块将决定区块`BB11`或`CCC1`是成为最长链的一部分，还是会被废弃。然而，谁来决定图\
  \ 19-4 中所示的下一个添加到`blockchain-data-structure`的区块会将`BB11`作为其前驱区块，从而废弃`CCC1`呢？答案令人惊讶，或许也令人失望，那就是纯属随机。在图\
  \ 19-4 所示的情况下，节点可以自由决定扩展哪个分支。因此，一些节点可能会努力寻找一个将`BB11`作为其前驱区块的新区块，而另一些节点则可能努力寻找一个将`CCC1`作为其前驱区块的新区块。它们谁先完成新区块的创建取决于哈希难题的解决，而解决该难题需要一段有限但随机的时间。首先解决新区块哈希难题的节点决定了冲突分支中哪一个被扩展，以及哪些区块被废弃。因此，由于解决哈希难题的速度竞赛以及网络中消息传递的随机波动，树形`blockchain-data-structure`的增长表现出随机行为。下一个区块的出现时间由其解决哈希难题所需的随机时长决定，而这个区块又会决定哪条路径被扩展，哪个区块被放弃。\n\
  \n如前所述，树形`blockchain-data-structure`的冲突分支共享一个共同的骨干，无论废弃的是哪些区块或叶子节点，这个骨干都保持不变。因此，位于权威链顶端或接近顶端的区块受新区块到达随机性的影响最大，而位于`blockchain-data-structure`更深处的区块受影响较小。因此可以这样说：一个区块在权威链中的位置越深：\n\
  \n-   它被添加的时间就越早\n-   自它被纳入`blockchain-data-structure`以来过去的时间就越长\n-   用于添加后续区块的总工作量就越大\n\
  -   它受属于最长链的区块随机变化的影响就越小\n-   它被废弃的可能性就越小\n-   它被系统节点接受的程度就越高\n-   它在节点的共同历史中就越根深蒂固\n\
  \n随着时间推移和更多区块最终被添加，关于区块被纳入权威链的确定性会随之增加，这一事实被称为**最终一致性**。\n\n#### 抗操纵性\n\n代表最大计算工作量的树形`blockchain-data-structure`路径，就是交易历史的权威版本。建立和维护权威路径只需控制整个系统的大部分计算能力即可。如果要从`blockchain-data-structure`的一个内部区块开始建立一条新的权威路径，则需要追上并超越由大多数节点维护的路径。这一事实是区块链鲁棒性的基础。\n\
  \n只要诚实节点拥有整个系统大部分的算力资源，由它们维护的路径就会增长最快，并超越任何竞争路径。为了操纵一个内部区块，攻击者将不得不重做该区块的工作量证明，然后重做其后所有区块的哈希难题，接着追上并超越由诚实节点维护的路径²。然而，对于任何控制算力少于多数的攻击者来说，通过追上并超越多数节点维护的路径来建立一条新路径是不可能的。因此，任何建立包含欺诈交易的新权威路径的尝试都将被诚实多数所维护的路径超越，从而被废弃。结果，由系统维护的交易历史对于操纵是具有鲁棒性的。\n\
  \n### 对投票模式的威胁\n\n如果影响整个过程的最终结果看起来有利可图，那么任何集体决策程序都可能成为操纵的目标。区块链及其分布式共识算法也不例外。关于如何操纵区块链共识算法存在许多讨论。无论这些操纵手段表面上多么五花八门，它们都只有一个目标：将属于权威链的区块变成孤立区块，并建立一条新的权威链，这条链代表一种对攻击者更有利的交易数据历史和所有权权利替代分配方案。\n\
  \n然而，我们可以从多种视角来讨论这些操纵行为。从经济角度看，这些操纵试图通过改变集体的交易数据历史来改变所有权权利的分配。从集体决策来看，这些操纵试图聚集多数投票权以强制实现期望的结果。从技术角度来看，任何操纵集体决策过程的尝试都旨在破坏系统的完整性。鉴于系统的分布式特性，这些操纵试图（至少暂时）建立一个隐藏的中心化要素来改变系统状态。因此，这些攻击通常被称为**51%攻击**。\n\
  \n**注意**\n\n51%攻击是指在集体决策过程中试图聚集或控制整个投票权多数的一种尝试。\n\n### 哈希难题的作用\n\n在第 16 步中，您学习了如何使`blockchain-data-structure`变得不可篡改。因此，从纯技术角度讲，哈希难题只是实现`blockchain-data-structure`不可篡改目的的一种手段。然而，当您考量`blockchain-data-structure`的用途时，哈希难题的另一个方面便显现出来。在就交易历史达成集体共识的过程中，构成`blockchain-data-structure`的单个区块可以被视为一张选票，而哈希难题则可以被视为一种代价，这种代价使得提交选票需要付出成本，从而阻止不诚实者参与投票。\n\
  \n任何操纵区块链集体决策过程的尝试都旨在聚集多数投票权。由于区块链通过哈希难题将投票权与计算能力绑定，因此任何聚集多数投票权的尝试实际上意味着聚集整个点对点系统的大部分计算能力。区块链达成集体共识方式的可靠性和可信赖性，依赖于一个假设，即没有任何个人或实体能够获取或聚集整个点对点系统的累积计算能力的多数。\n\
  \n\n\n### 为何有效\n\n共同构建`blockchain-data-structure`有点类似于参与一个持续进行的投票机制。在这场关于应选择哪条交易历史的持续投票中，每个单一节点只有微弱的发言权，但所有节点共同构成了一个强大的群体，持续地选择其自身的历史。之所以有效，是因为参与这场持续投票既非毫无成本，也非无法容纳。参与投票需要完成解决哈希难题所需的工作量，而通过提交投票或一个新的区块，节点为了获得奖励而将其自身承诺于此。由于所有节点都独立使用相同的标准来选择交易历史，最终所有节点达成共识。\n\
  \n### 展望\n\n本步骤聚焦于纯分布式点对点系统中的节点如何就共同维护的交易数据历史达成一致意见，并强调了`hash-puzzle`对于达成共识和维护完整性的重要性。下一步将讨论奖励的重要性，以及用于补偿节点为系统完整性做出贡献的支付工具。\n\
  \n### 总结\n\n-   网络中发送新区块的延迟，或两个节点几乎同时创建新区块，会导致`blockchain-data-structure`长成一棵树或柱状仙人掌的形状，其分支从共同的主干上生出，代表交易历史的冲突版本。\n\
  -   选择交易历史的相同版本是一个集体决策问题。\n-   分布式共识是纯分布式点对点系统中的成员在集体决策问题上达成的一致意见。\n-   区块链的集体决策问题具有以下特征：\n\
  \    -   所有节点都在相同的环境中运行，该环境由网络、维护各自`blockchain-data-structure`副本的节点，以及规范节点行为的`blockchain-algorithm`组成。\n\
  \    -   决策问题是在所有节点间选择相同的交易历史。\n    -   所有节点都力求最大化其个人收入，这些收入作为将有效新区块添加到`blockchain-data-structure`中的奖励。\n\
  \    -   为了实现目标，所有节点将其新区块发送给所有对等节点，以供其检查和接受。结果，每个节点都在共同维护的`blockchain-data-structure`这个环境中留下了自己的印记。\n\
  \    -   所有节点使用相同的标准来选择交易数据的历史。\n-   `最长链标准`指出每个节点独立选择树形`blockchain-data-structure`中包含最多区块的那条路径。\n\
  -   `最重链标准`指出每个节点独立选择树形`blockchain-data-structure`中累计难度最高的那条路径。\n-   选择树形`blockchain-data-structure`中的一条路径会产生以下后果：\n\
  \    -   孤儿区块\n    -   被追回的奖励\n    -   明确所有权\n    -   交易重新处理\n    -   不断增长的主干\n\
  \    -   最终一致性\n    -   对抗操纵的鲁棒性\n-   一个区块在权威链中位置越深：\n    -   它被添加的时间越早\n    - \
  \  自它被纳入`blockchain-data-structure`以来经过的时间越长\n    -   花费在添加后续区块上的共同工作量越多\n    -\
  \   它受属于最长链的区块随机变化的影响越小\n    -   它被放弃的可能性越小\n    -   它被系统节点接受的程度越高\n    -   它在节点共同历史中的根基越稳固\n\
  -   随着时间推移和后续区块的添加，关于区块被纳入权威链的确定性会逐渐增加，这一事实被称为`最终一致性`。\n-   `51%攻击`是一种试图在集体决策过程中收集或控制多数投票权的行为，其目的是将权威链中的部分区块变成孤儿区块，并建立一条包含对攻击者更有利的交易历史的新权威链。\n\
  -   `51%攻击`具有以下特征：\n    -   经济上：通过改变集体的交易数据历史来改变所有权分配。\n    -   决策上：收集多数投票权以强制推行期望的结果。\n\
  \    -   技术上：破坏系统的完整性。\n    -   架构上：至少暂时建立一个隐藏的中心化元素，从而改变系统状态。\n\n#### 脚注\n\n[1]\
  \ Hassanien, Aboul Ella, and Eid Emary. *Swarm intelligence: Principles, advances,\
  \ and applications*. Boca Raton, FL: CRC Press, 2016.\n\n[2] Nakamoto, Satoshi.\
  \ *Bitcoin: A peer-to-peer electronic cash system*. 2008. [`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf).\n\
  \n[3] Wood, Gavin. *Ethereum: A secure decentralized generalized transaction ledger*.\
  \ 2014. [`http://gavwood.com/paper.pdf`](http://gavwood.com/paper.pdf); Okupski,\
  \ Krzysztof. *Bitcoin developer reference*. Working paper. 2014.\n\n[4] Okupski,\
  \ Krzysztof. *Bitcoin developer reference*. Working paper. 2014.\n\n## 20. 为完整性付费\n\
  \n诚信和信任的建立都不是没有成本的。\n\n关于区块链如何处理新的交易数据，以及系统节点如何就交易的真实历史达成一致的讨论，揭示了`hash-puzzle`的重要性。解决`hash-puzzle`在实现和维护系统完整性方面扮演着重要角色。但解决`hash-puzzle`需要消耗计算资源，因此也需要花费金钱。出于这个原因，有必要对那些为系统完整性做出贡献的节点进行补偿。然而，在整个讨论过程中，我们一直假设节点以某种方式得到了补偿，而没有询问使用了哪种支付工具。因此，本步骤将专门聚焦于节点如何因其对系统完整性的贡献而获得补偿。\n\
  \n\n\n### 隐喻\n\n假设你是一家面包店的老板。有一天，你想出了一个改善生意的绝妙主意。你意识到现金很稀缺，但你的面包店里总有面包在售，而且大多数营业日结束时都会剩下大量面包。因此，你决定用面包而不是现金来支付员工工资。这将实现两个目标：节省你的现金开支，并且避免浪费剩余面包。你的员工对此并不兴奋，但很快其他公司开始效仿你，最终所有公司都开始采用这种报酬方式：汽车制造商用汽车支付员工工资，建筑公司用房子支付员工工资，等等。有一天，你的朋友们都在抱怨他们那不实用的报酬方式，但其中一个人例外，他仍然用现金领取报酬。你认为这个人会在哪家公司或机构工作？原来，他在一家中央银行工作，而这家银行恰好是货币的生产者！\n\
  \n这个例子巧妙地展现了我们通过完成工作所创造的商品与我们作为报酬所获得的商品之间的依赖关系。本步骤将在区块链的背景下讨论这种联系。事实证明，在某些条件下，区块链可能会变得更像一家用自己印制的钞票支付员工工资的中央银行。但在讨论这种特殊情况之前，让我们更详细地审视一下费用在区块链中的作用，以及报酬的重要性。\n\
  \n### 费用在区块链中的作用\n\n步骤 18 强调，区块链采用“胡萝卜加大棒”的方法，让组成系统的对等节点相互控制。对奖励的竞争和对惩罚的威胁是促使系统内的对等节点有序地验证交易，并选择凝聚了最多集体努力的那条交易历史记录的两股力量。奖励和惩罚通过基于交易费用和工作量证明来实现。¹\
  \ 这种效应在所有区块链应用中都是普遍存在的，无论其具体的应用目标为何。然而，用于补偿系统维护者的具体支付工具的选择，在所有区块链应用中并非完全相同。定义并使用一种支付工具，将其交给对等节点，作为其验证并将新区块添加到区块链的报酬，这被认为是建立区块链应用的主要挑战之一。因此，必须考虑选择支付工具所带来的以下后果：\n\
  \n*   对系统完整性的影响\n*   对系统开放性的影响\n*   对系统去中心化性质的影响\n*   对系统哲学的影响\n\n#### 对系统完整性的影响\n\
  \n奖励和惩罚的力量是在区块链中实现并维护完整性的基础。这之所以有效，是因为系统的对等节点为维护系统完整性而获得了有价值的报酬。但是，我们如何首先知道对等节点确实为他们的工作获得了有价值的报酬呢？嗯，这正是关键所在。哪种支付工具被认为是有价值的、值得完成维护系统的工作？如果这种支付工具已知会贬值或不可信，会发生什么？当对等节点被支付一种不可信且毫无价值的工具时，我们能否期望他们会继续维护区块链？不，我们不能。对用于补偿系统对等节点的支付工具缺乏信任，将会污染整个系统。因此，用于补偿系统支持者的支付工具直接影响着区块链本身的可靠性。\n\
  \n#### 对系统开放性的影响\n\n区块链应该是一个开放的点对点系统。每个人都可以将自己的计算机连接到系统，并因贡献于维护其完整性而获得奖励。但是，如果用于补偿对等节点的支付工具不像区块链本身那样开放，会发生什么？如果报酬是通过一种仅在特定国家可用或接受、或受资本流动限制的支付工具来进行的呢？在这种情况下，支付工具会通过引入经济限制来抵消系统的技术开放性。\n\
  \n#### 对系统去中心化性质的影响\n\n区块链是一个纯粹的去中心化点对点系统，没有任何集中控制或协调的元素。但是，如果用于补偿对等节点的支付工具由一个中央机构控制和治理，会发生什么？这意味着允许中心化通过后门进入系统。它将与系统的去中心化性质背道而驰。\n\
  \n#### 对系统哲学的影响\n\n前面的讨论揭示出，用于补偿支持系统的对等节点的支付工具的特性，有可能抵消区块链的主要方面。这引出了一个根本性问题：一个旨在摆脱集中控制的纯粹去中心化点对点系统，如果使用一种与其核心价值观背道而驰的支付工具来补偿其对等节点，它还能被认为是可信赖的吗？每个声称完全开放和纯粹去中心化的区块链都必须为这个问题找到一个令人满意的答案。\n\
  \n### 用于补偿对等节点的支付工具的理想特性\n\n为了尽可能少地干扰区块链的目标和价值观，用于补偿对等节点的支付工具应满足以下条件：\n\n*   以数字形式存在；否则无法被纳入区块链。\n\
  *   在现实世界中被接受为支付工具；否则系统中的对等节点无法利用支持系统获得的收入来支付他们在现实世界中的账单。\n*   在所有国家都被接受为支付工具；否则，对于那些生活在该支付工具不被接受国家的对等节点来说，支持系统将变得缺乏吸引力。\n\
  *   不受资本流动限制；否则其向对等节点的转移将受到限制。\n*   具有稳定的价值；否则对等节点将面临购买力损失的经济风险。\n*   值得信赖；否则会削弱区块链建立信任的能力。\n\
  *   不受任何一个单一的中央机构或国家控制；否则将与区块链的去中心化性质产生严重冲突。\n\n这份特性清单读起来就像是对完美世界货币的愿望清单。因此，现有的任何一种法定货币都无法满足这些期望，也就不足为奇了。\n\
  \n\n\n### 加密货币诞生的迂回之路\n\n上一节列出了用于补偿区块链节点的支付工具应具备的理想属性。现有法定货币无一满足这些属性这一发现有点令人沮丧，因为这些属性本身是可取的。具有这些属性的货币或支付工具除了用于补偿分布式系统的节点之外，在许多其他场合也很有用。事实证明，许多人早已思考过这个问题。第一个也是最著名的区块链应用就是为了解决这个问题而诞生的。该区块链的理念非常巧妙：它是一个纯粹的分布式点对点系统，用于管理一种新型数字货币的所有权，而这种货币反过来又用于补偿系统中为验证新区块并将其添加到区块链数据结构中的节点。这种特殊的新货币将其应用目标——管理一种新型货币的所有权——与需要一种可信赖的支付工具来补偿其贡献者联系起来。我说的就是比特币。比特币系统不仅在一个纯粹的分布式点对点系统中管理这种新型数字货币的所有权，而且还用这种货币来补偿那些为其完整性做出贡献的节点。由于区块链严重依赖密码学，这种新型货币也被称为密码学货币或简称加密货币。打个比方，你可以认为比特币和许多其他加密货币就像是用自己生产的面包来支付员工工资的面包店，不同之处在于，它们生产的面包实际上是一种新的数字货币。\n\
  \n### 展望\n\n这一步强调了用于补偿区块链节点的支付工具的重要性。这是聚焦于区块链基本原理的一系列步骤中的最后一步。下一步将把所有部分整合起来，并总结你在之前的学习步骤中学到的内容。\n\
  \n### 总结\n\n-   区块链利用费用来补偿节点为系统完整性所做的贡献。\n-   用于补偿节点的支付工具会影响区块链的主要方面，例如：\n    -\
  \   完整性\n    -   开放性\n    -   分布式特性\n    -   系统理念\n-   用于补偿节点的支付工具的理想属性是：\n    -\
  \   以数字形式存在\n    -   在现实世界中被接受\n    -   在所有国家都被接受\n    -   不受资本流动限制\n    -   值得信赖\n\
  \    -   不受单一中央组织或国家控制\n-   加密货币是一种独立的数字货币，其所有权由区块链管理，该区块链将其用作支付工具，以补偿节点维护系统完整性的贡献。\n\
  \n**脚注** 1\n\n中本聪。比特币：一种点对点的电子现金系统。2008 年。[`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf)。\n\
  \n## 21. 整合所有部分\n\n整体大于部分之和\n\n这一步是本书理解区块链的知识旅程的顶峰。虽然步骤 9–20 分别探讨了构成区块链的各个概念，但这一步将所有部分整合在一起。因此，你不仅能够从整体上理解区块链，还能看到不同概念是如何协同工作的。本学习步骤首先回顾区块链的主要概念和技术，然后根据前几步获得的技术知识解释区块链是什么。最后，这一步将回顾区块链技术套件的定义，从而将区块链开放给广泛的应用领域。\n\
  \n### 回顾概念与技术\n\n理解区块链的知识之旅始于步骤 8，我们在那里规划了一个用于管理所有权的纯分布式点对点系统的设计。表 21-1 列出了这些任务、目标、对应的步骤以及区块链的相应概念。\n\
  \n**表 21-1.** 设计用于管理所有权的分布式点对点系统的任务回顾\n\n| 任务编号 | 目标 | 步骤编号 | 主要概念 |\n| --- | ---\
  \ | --- | --- |\n| 1 | 描述所有权 | 9 | 交易数据历史 |\n| 2 | 保护所有权 | 10–13 | 数字签名 |\n| 3 |\
  \ 存储交易数据 | 10, 11, 14, 15 | 区块链数据结构 |\n| 4 | 准备用于分发的账本 | 16 | 不可篡改性 |\n| 5 | 分发账本\
  \ | 17 | 网络中的信息转发 |\n| 6 | 添加新交易 | 18 | 区块链算法 |\n| 7 | 决定哪个账本代表真相 | 19 | 分布式共识 |\n\
  \n理解构成区块链的这些主要概念也依赖于其他概念和技术，这一点很重要。理解区块链至少也需要理解这些概念。因此，表 21-2 在更详细的层面上总结了构成区块链的技术。本步骤的其余部分将借鉴这两个表中展示的概念。\n\
  \n**表 21-2.** 区块链的技术概念、目的及比喻\n\n| 概念 | 目的 | 使用的比喻 |\n| --- | --- | --- |\n| 交易数据\
  \ | 描述所有权的转移 | 银行转账单 |\n| 交易历史 | 证明所有权的当前状态 | 接力赛的过程 |\n| 密码学哈希值 | 唯一标识任何类型的数据 |\
  \ 人类指纹 |\n| 非对称密码学 | 加密和解密数据 | 带锁的公共邮箱 |\n| 数字签名 | 表示同意交易数据的内容 | 手写签名 |\n| 哈希引用\
  \ | 一旦引用的数据被更改就失效的引用 | 利用哈希值识别衣帽钩的衣帽间牌 |\n| 变更敏感的数据结构 | 以任何篡改都会立即显现的方式存储数据 | 口袋里装有衣帽间牌的外套\
  \ |\n| 哈希谜题 | 施加一项计算量大的任务 | 通过试错法打开数字锁 |\n| 区块链数据结构 | 以变更敏感的方式存储交易数据并保持其顺序 | 带有卡片目录的图书馆\
  \ |\n| 不可篡改性 | 使得更改交易数据历史成为不可能 | 试图建立虚假族谱 |\n| 分布式点对点网络 | 在网络所有节点之间共享交易历史 | 独立的见证人小组\
  \ |\n| 消息传递 | 确保系统中所有节点最终都能收到所有信息 | 人际间的流言蜚语 |\n| 区块链算法 | 确保只有有效的交易数据被添加到区块链数据结构中\
  \ | 胡萝卜加大棒的管理承包者方式 |\n| 分布式共识 | 确保系统中所有节点使用相同的交易数据历史 | 公园里因游客用脚投票而形成的小路 |\n| 补偿\
  \ | 给予节点维护完整性的激励 | 用面包支付员工工资的面包店 |\n\n\n\n### 什么是区块链？\n\n在对构成区块链的各个概念有了总体了解之后，重要的是要看清它们如何协同工作。通过识别其应用层和实现层的功能性与非功能性方面来分析系统的方法，有助于我们迎接理解区块链各概念如何协同工作的挑战。表\
  \ 21-3 提供了区块链各层及其方面的概览，这将指导您将这些概念整合在一起。\n\n**表 21-3.** 区块链的层与方面\n\n| 层 | 功能性方面 |\
  \ 非功能性方面 |\n| --- | --- | --- |\n| 应用层 | 明确所有权<br>转移所有权 | 高可用性<br>可靠<br>开放<br>伪匿名\
  \ |\n| 实现层 | 所有权逻辑<br>交易安全<br>交易处理逻辑<br>存储逻辑<br>共识逻辑<br>纯分布式点对点架构 | 安全<br>弹性<br>最终一致性<br>保持完整性\
  \ |\n\n#### 区块链的目的：应用层的功能性方面\n\n区块链服务于两个目的：\n\n- 明确所有权\n- 转移所有权\n\n##### 明确所有权\n\
  \n明确所有权意味着回答构成所有权的核心问题，即：谁在什么时间拥有多少数量的什么对象？\n\n##### 转移所有权\n\n转移所有权意味着改变当前的所有权状态。为此，区块链允许所有者将其财产转移给他人。因此，它回答了另一个证明所有权的核心问题，即：谁在什么时间将多少数量的什么对象的所有权转移给了谁？\n\
  \n#### 区块链的特性：非功能性方面\n\n在与区块链交互时，您会注意到它如何履行其职责。区块链实现其目的的质量由其非功能性方面描述：\n\n- 高可用性\n\
  - 抗审查\n- 可靠\n- 开放\n- 伪匿名\n- 安全\n- 弹性\n- 最终一致性\n- 保持完整性\n\n##### 高可用性\n\n区块链不会出现停机。相反，区块链全天候可用，一天\
  \ 24 小时，一周 7 天，全年无休。它甚至没有关闭按钮。\n\n##### 抗审查\n\n没有任何人能单独决定区块链的内容或关闭整个系统。\n\n#####\
  \ 可靠\n\n区块链始终如一地以高质量实现其目的。人们可以信任区块链能正确地明确和转移所有权。\n\n##### 开放\n\n区块链不排斥特定用户或计算机使用其服务。相反，它对所有人开放。\n\
  \n##### 伪匿名\n\n区块链唯一地标识所有者，但既不维护也不揭示他们在现实世界中的身份。\n\n##### 安全\n\n区块链在两个方面是安全的：(1)\
  \ 在单个交易层面，(2) 在整个系统层面。就个体层面而言，区块链确保所有权仅由合法所有者支配。在整体层面，区块链保护所有所有者的所有权免受操纵、篡改、伪造、双重支付和未授权访问。\n\
  \n##### 弹性\n\n即使在不理想的条件下，区块链也能正确地明确和转移所有权。区块链能够抵御针对所有权的各种攻击，例如伪造、双重支付、假冒他人访问财产等。\n\
  \n##### 最终一致性\n\n区块链并非始终产生一致的结果。相反，获得一致结果的可能性会随着时间推移而增加，并最终在整个系统中达到完全一致。\n\n#####\
  \ 保持完整性\n\n区块链通过展现无逻辑错误的行为来维护其完整性。它在单个交易层面以及整个交易数据历史中维护数据一致性并确保安全性。\n\n#### 内部运作：实现层的功能性方面\n\
  \n区块链的内部运作可追溯到以下几个主要组件：\n\n- 所有权逻辑\n- 交易安全\n- 交易处理逻辑\n- 存储逻辑\n- 点对点架构\n- 共识逻辑\n\n\
  ##### 所有权逻辑\n\n所有权逻辑规定了如何明确和转移所有权。区块链利用单个交易数据来描述所有权的转移，并维护整个交易数据来明确所有权。图 21-1 说明了所有权逻辑及其底层概念。上方方框所示的概念依赖于其下方的概念。最底行的方框展示了所有权逻辑所依赖且需要进一步详细说明的概念。\n\
  \n![A436689_1_En_21_Fig1_HTML.jpg](img/A436689_1_En_21_Fig1_HTML.jpg)\n\n**图 21-1.**\
  \ 所有权逻辑及其底层概念\n\n区块链使用的所有权逻辑依赖于维护整个交易数据历史的存储逻辑和确保其一致性的共识逻辑。此外，所有权逻辑还依赖于确保仅有效交易数据被添加到数据存储中的交易处理逻辑，以及确保只有合法所有者才能将其财产转移到另一个账户的交易安全。这四个关注点由区块链的其余组件处理。\n\
  \n##### 交易安全\n\n交易安全确保只有合法所有者才能访问其所有权并将其转移到另一个账户。图 21-2 说明了实现交易安全所涉及的概念。诸如加密哈希值和非对称加密等基本概念位于最底部的方框中，因为它们是位于其上方所有其他概念的基础。例如，数字签名位于授权之下，因为它是授权交易的一种手段，但它位于加密哈希值和私钥之上，因为它利用了这些概念。类似地，图\
  \ 21-2 使认证和身份识别对底层密码学的依赖关系更加明显。\n\n![A436689_1_En_21_Fig2_HTML.jpg](img/A436689_1_En_21_Fig2_HTML.jpg)\n\
  \n**图 21-2.** 交易安全及其底层概念\n\n##### 交易处理逻辑\n\n交易逻辑确保只有有效的交易数据被添加到集体维护的交易数据历史中。它显然依赖于对代表系统真正目标的交易数据的验证。系统中的每个单个节点都可以独立地验证交易数据。然而，单个节点可能在验证交易数据时出错，或者可能故意接受无效的交易数据。这两种情况都对整个系统的完整性构成威胁。因此，交易处理涉及一个复杂的机制，分别包含新区块或其区块头的验证：点对点架构以及对等节点的控制和竞争，这反过来依赖于奖惩的力量。图\
  \ 21-3 通过将这些概念呈现在相互叠加的方框中以指出它们的依赖关系，描绘了这些概念之间的关系。\n\n![A436689_1_En_21_Fig3_HTML.jpg](img/A436689_1_En_21_Fig3_HTML.jpg)\n\
  \n**图 21-3.** 交易处理逻辑及其底层概念\n\n\n\n##### 存储逻辑\n对有效交易的处理会导致它们被添加到整个交易数据历史记录中，即将其添加到一个维护完整交易数据历史记录的数据存储中。整个系统的完整性及其履行其阐明和转移所有权目的的能力，依赖于该数据存储的完整性。因此，存储逻辑关注于维护完整的交易数据历史记录，并通过追求让修改数据变得极其昂贵的理念，来保护这些数据免遭篡改、伪造或仿冒。如图\
  \ 21-4 所示，存储逻辑通过维护一个基于工作量证明和`区块链数据结构`的、不可变且仅可追加的数据存储来实现这一点。其运作可以追溯到哈希谜题、哈希引用和对变更敏感的数据结构，而后者又可以追溯到加密哈希值的基本概念。图\
  \ 21-4 通过将派生概念分层放置在代表更基本概念的方框之上，描绘了存储逻辑的依赖关系。\n\n![A436689_1_En_21_Fig4_HTML.jpg](img/A436689_1_En_21_Fig4_HTML.jpg)\n\
  \n图 21-4. 存储逻辑及其基础概念\n\n#### 点对点架构\n该架构决定了系统的组件或节点如何相互关联和连接。如图 21-5 所示，区块链利用了一个纯粹分布式的点对点系统，该系统由称为节点的独立对等点组成。这些节点通过作为通信媒介的网络相互连接。每个对等点都维护着自己的一份包含完整交易数据历史记录的`区块链数据结构`副本。对等点通过利用一种\
  \ gossip 风格的消息传递协议进行通信，该协议确保每个对等点最终都能接收到所有信息。\n\n![A436689_1_En_21_Fig5_HTML.jpg](img/A436689_1_En_21_Fig5_HTML.jpg)\n\
  \n图 21-5. 架构及其基础概念\n\n##### 共识逻辑\n由于分布式系统的所有节点都独立维护自己的交易数据历史记录，因此由于网络传递消息的延迟或其他不利因素，它们的内容可能会有所不同。结果，原本应形成一条直线状链接数据块的数据存储，实际上形成了一个树状的数据结构，其中每个分支代表交易历史的一个冲突版本。如图\
  \ 21-6 所示的共识逻辑，通过让所有节点选择凝聚了最多集体努力的、完全相同的交易历史版本，最终使系统的所有节点达成一致。\n\n![A436689_1_En_21_Fig6_HTML.jpg](img/A436689_1_En_21_Fig6_HTML.jpg)\n\
  \n图 21-6. 共识逻辑及其基础概念\n\n### 获得抽象\n获得抽象的过程，涉及识别和区分区块链中那些特定于管理所有权目标的组件与那些对特定应用目标无关的组件。这与我们在第\
  \ 5 步中所讨论的对`区块链技术套件`的理解是一致的。显然，所有权逻辑和交易数据是特定于应用的组件，因为它们决定了如何用交易数据描述所有权，以及如何阐明和转移所有权。另一方面，交易安全和交易处理逻辑则不那么特定于应用目标。前者利用了识别、认证、授权和数字签名这些通用概念，这些概念同样可用于任何其他应用。如图\
  \ 21-3 所示，后者是一个庞大的数据处理装置，其大部分组件与应用目标无关。交易处理逻辑中唯一与应用目标紧密耦合的组件是交易数据的验证。所有其他组件，如竞争、对等点控制、奖励、惩罚以及区块头的验证，都与正在处理的特定数据无关。图\
  \ 21-7 展示了区分区块链中特定于应用的组件与对特定应用目标无关的组件的结果，这些无关组件反过来构成了`区块链技术套件`。\n\n![A436689_1_En_21_Fig7_HTML.jpg](img/A436689_1_En_21_Fig7_HTML.jpg)\n\
  \n图 21-7. 区块链中的`区块链技术套件`\n\n### 展望\n这一步专注于将前面所有步骤的各个部分整合在一起，以便对区块链有一个全面的了解。开放性以及没有任何形式的中央控制或协调，是该系统的基础，因为它们允许其节点充当独立的证人，以澄清与所有权相关的事务。然而，这些特性也可能导致意想不到的后果。这些意想不到的后果是什么，以及它们可能如何限制区块链的使用，将在下一步中讨论。\n\
  \n### 总结\n*   区块链是一个纯粹分布式的点对点系统，它解决了管理所有权的以下方面：\n    *   描述所有权：交易数据历史记录\n    * \
  \  保护所有权：数字签名\n    *   存储交易数据：`区块链数据结构`\n    *   准备账本以便分发：不可变性\n    *   分发账本：通过网络的\
  \ Gossip 风格信息转发\n    *   处理新交易：`区块链算法`\n    *   决定哪个账本代表真相：分布式共识\n*   分析区块链涉及以下几个方面：\n\
  \    *   应用目标\n    *   其特性\n    *   其内部运作机制\n*   区块链有两个应用目标：\n    *   阐明所有权\n  \
  \  *   转移所有权\n*   区块链在展现以下特质的同时实现其应用目标：\n    *   高可用性\n    *   抗审查性\n    *   可靠性\n\
  \    *   开放性\n    *   伪匿名性\n    *   安全性\n    *   弹性\n    *   最终一致性\n    *   保持完整性\n\
  *   从内部看，区块链由特定于管理所有权应用目标或与该目标无关的组件组成。\n*   区块链中特定于应用的组件是：\n    *   所有权逻辑\n    *\
  \   交易数据\n    *   交易处理逻辑\n    *   交易安全\n*   与应用无关的组件是：\n    *   `区块链技术套件`\n    *\
  \   纯粹分布式的点对点架构\n*   `区块链技术套件`由以下部分组成：\n    *   存储逻辑\n    *   共识逻辑\n    *   数据处理逻辑\n\
  \    *   非对称加密\n\n"
- "# 第四部分：局限性及其解决方案\n## 局限性与如何克服它们\n本学习阶段聚焦于区块链的主要局限性、它们产生的原因，以及可能的克服方法。在本阶段结束时，你将理解为什么前面步骤中解释的区块链原始想法可能不适合大规模商业应用，以及为克服这些局限性及其后果而提出了哪些变革。最后，本阶段将使你熟悉用于指代区块链主要变体的术语。\n\
  \n\n\n## 22. 认识局限性\n\n即使是完美的机器也有局限性\n\n步骤 21 将所有部分整合在一起，呈现了区块链整体的概况，突出了其底层技术概念之间的相互依存关系。因此，我们得出结论：区块链是一种复杂且高度精妙的技术构造。可以毫不夸张地说，它是天才头脑的杰作。然而，区块链既非完美，也并非没有局限性。因此，本步骤将重点阐述并解释区块链的主要局限性，以及这些局限性为何会为其商业应用带来重大障碍。最后，本步骤将勾勒出如何克服区块链的局限性。\n\
  \n### 挑战\n\n区块链是一个纯粹的分布式点对点系统，允许任何人读取交易历史，并向集体维护的数据存储中添加新的交易数据。开放性和任何形式的中心控制或协调的缺失是该系统的基础，这使得其节点能够作为独立的见证者来澄清所有权相关事宜。然而，开放性和中心控制的缺失可能会带来不良后果，从而限制该系统的可用性。因此，挑战在于识别并理解这些后果，以便制定克服它们的策略。\n\
  \n### 区块链的技术局限性\n\n区块链最重要的技术局限性包括：\n\n- 缺乏隐私性\n- 安全模型\n- 可扩展性有限\n- 高昂成本\n- 隐藏的中心化\n\
  - 缺乏灵活性\n- 规模瓶颈\n\n#### 缺乏隐私性\n\n区块链是一个纯粹的分布式点对点账本，维护着全部交易数据的历史记录。所有交易细节，例如转移的商品和数量、涉及的账户以及转移时间，对所有人都是公开的。¹\
  \ 这是为了让每个节点都能澄清所有权并验证新交易（例如，通过识别双重支付攻击）所必需的。因此，缺乏隐私性是区块链的一个构成要素。没有这种程度的透明度，区块链就无法履行其职责。然而，这种透明度水平通常被视为对需要更多隐私的应用场景的一个限制因素。\n\
  \n#### 安全模型\n\n区块链利用非对称密码学进行用户身份的识别、认证以及交易授权。区块链中的账户号码实际上是公钥。只有持有相应私钥的人才能访问与该账户关联的财产。只有包含使用相应私钥创建的数字签名的交易数据才是有效的，才能将财产从一个账户转移到另一个账户。私钥是授权合法所有者的唯一安全工具。一旦一个账户的私钥被泄露给他人，无论是出于故意、意外、错误还是数据被盗，该个人账户的安全性就被破坏了。\n\
  \n没有额外的安全措施来保护与账户号码关联的财产。需要指出的是，区块链中使用的非对称密码学被认为是现有最强大、最安全的密码学方法之一。因此，区块链的安全概念本身既无缺陷也无漏洞。然而，并没有额外的安全网来保护区块链用户，防止他们丢失或非自愿地将私钥分享给他人。这与现实生活中使用安全钥匙保护房屋或汽车，或使用\
  \ PIN 码保护信用卡或借记卡的方式类似。一旦你将钥匙交给别人，无论出于何种情况或原因，安全性就被破坏了，任何拥有 PIN 码或钥匙的人都可以从你的信用卡中取钱，或者开走你的车。区块链账户的私钥也不例外。然而，有些人认为缺乏额外的安全措施是限制区块链使用的一个因素。\n\
  \n#### 可扩展性有限\n\n区块链是一个点对点系统，旨在实现两个目标：一方面，它允许每个人向集体维护的历史记录中添加新的交易数据；另一方面，它确保交易数据的历史记录受到保护，免遭篡改或伪造。区块链通过利用一种不可变的仅追加数据结构来平衡这两个目标，该结构要求在每次添加新区块时都解决一个哈希难题。故意解决这个哈希难题非常耗时。坚持要求解决哈希难题是一种使篡改交易历史记录的行为代价高昂的适当方法。不幸的是，这种安全措施的代价是处理速度降低，从而导致可扩展性受限。区块链的这一特性被认为是将其用于需要高处理速度、高可扩展性和高吞吐量的场景时的严重障碍。\n\
  \n#### 高昂成本\n\n高昂成本的问题与可扩展性有限的问题相关。解决哈希难题或提供工作量证明在计算上故意设计得非常昂贵。这是使交易历史记录不可变的安全措施。计算成本可以用多种尺度来表示，例如计算周期数、物理时间、电能和金钱。但结果总是一样的：工作量证明成本高昂。因此，整个区块链都会产生成本。这些成本的大小取决于哈希难题的难度。\n\
  \n#### 隐藏的中心化\n\n为添加到区块链数据结构中的每个区块解决哈希难题的要求，以及为维护系统完整性而分配奖励的规则，导致了节点之间的一场军备竞赛。那些拥有必要财务资源的人投资于专用硬件，这使得解决哈希难题并为系统做出贡献变得有利可图。²\
  \ 另一方面，对于无法获得专用硬件的人来说，验证和向系统添加新交易数据的工作变得无利可图，这导致他们撤回对系统的计算资源贡献。结果，那个原本以为庞大且多样化的、共同维护系统完整性的节点群体，最终变成了一个非常小型的实体群体，每个实体都拥有以专用硬件形式存在的巨大计算能力。剩下的节点群体形成了一个寡头垄断，他们在自己之间瓜分维护系统完整性的责任。与其他行业的寡头垄断类似，这个小型实体群体可能会滥用其权力（例如，忽略特定交易或歧视特定用户）。这种效应建立了一种隐藏的中心化，破坏了整个系统的分布式性质。³\
  \ 从技术角度看，这样的系统仍然是一个分布式系统，但其完整性仅由少数实体维护。\n\n\n\n#### 灵活性缺失\n\n区块链是一个由多种概念和协议构成的复杂技术结构，这些概念和协议相互优化、彼此适配。改变这个精细调节的生态系统可能极具挑战性。实际上，一旦区块链开始运行，对于如何更改或升级其主要组件，并没有既定的程序。这隐性地意味着构成区块链的各类技术具有较长的使用寿命。例如，密码学过程必须在区块链的整个生命周期内有效，这个周期可能长达数百年。这对于区块链算法以及冲突解决方式也同样适用。此外，由于不可篡改性，在区块链上进行开发的人员也面临一个问题，即难以修复漏洞或对区块链协议进行调整。这些特性使得整个区块链技术套件比其他技术缺乏灵活性。\n\
  \n#### 关键规模\n\n对于集体维护的交易数据历史的防篡改能力以及可信度，依赖于一个假设：系统的大部分计算能力由诚实节点控制。然而，在计算能力有限的小型点对点系统中，这个“大部分”可能仍然非常小，这反而使得执行\
  \ 51%攻击成为可能。这个问题对于市值较低且用户采用率有限的加密货币尤为突出。因此，任何一条区块链都需要达到一个诚实节点的临界规模，才能支持自身运转，并抵御拥有强大计算能力的攻击者。达到使\
  \ 51%攻击不可能发生的关键规模，是每一条新区块链都必须面对的挑战。\n\n### 区块链的非技术性限制\n\n区块链最重要的非技术性限制包括：\n\n* \
  \  法律上缺乏认可\n*   用户缺乏接受度\n\n#### 法律上缺乏认可\n\n区块链是一项为其用户提供在开放、纯粹分布式点对点系统中管理和转移所有权可能性的技术。独立节点通过分布式共识集体管理所有权的方式，引发了关于在区块链中进行和管理的交易的法律后果的疑问。无论其技术多么安全、可靠和复杂，都需要讨论在区块链中执行交易的法律含义和认可度问题。这是一个关乎如何在现有法律体系中融入一种新的所有权管理方法的问题。那些见证了互联网兴起和发展的人可能会发现，当前区块链的法律地位与上世纪\
  \ 90 年代互联网商务缺乏法律认可的情况有相似之处。\n\n#### 用户缺乏接受度\n\n用户接受度（或缺乏接受度）是另一个不容忽视的限制。区块链的法律地位不明确将导致用户产生不确定性，从而降低他们使用的兴趣。用户接受度的另一个方面是知识和教育。期望用户在未能理解其基本运作原理的情况下使用并信任区块链，是不切实际的。\n\
  \n### 克服局限\n\n技术性和非技术性的局限都被认为是在现实世界应用中采用区块链的主要障碍。如何克服特定的局限一直是（并且现在仍然是）一个活跃的研究和进一步开发的领域。对这些活动的详细讨论超出了本书的范围。然而，以下章节将简要阐述如何克服区块链的局限性。\n\
  \n#### 技术限制\n\n克服区块链的技术限制可能需要对其所有组件和技术层面进行干预。克服区块链技术限制的主要挑战之一，在于区分是改进其现有技术还是从根本上改变其技术。下一步将更详细地讨论这个主题。\n\
  \n#### 非技术限制\n\n区块链的非技术限制可以被视为适应新技术的社交、经济、法律和心理方面的挑战。教育和法律举措可以被看作是掌握区块链采用进程的适当措施。互联网和电子商务的例子已经表明，回答伴随新技术而来的法律问题需要时间，用户理解、信任并使用它们也需要时间。幸运的是，互联网和电子商务的案例也表明，关于新技术功能的教育举措能够提高用户对它们的接受度和采用率，并促进法律问题的解决。\n\
  \n### 展望\n\n本步骤重点介绍了区块链的主要技术性和非技术性限制，这些限制被视为其被采用的障碍。教育和法律举措可以被视为克服区块链非技术性障碍的一种方式。下一步将重点讨论如何克服部分技术限制。\n\
  \n### 总结\n\n*   区块链的开放性以及任何形式中央控制的缺失是其运行的基础，但也可能导致其在被采用时面临限制。\n*   区块链的主要技术限制包括：\n\
  \    *   缺乏隐私性\n    *   安全模型\n    *   扩展性有限\n    *   成本高昂\n    *   隐藏的中心化\n    *\
  \   灵活性缺失\n    *   关键规模\n*   区块链最重要的非技术性限制包括：\n    *   法律上缺乏认可\n    *   用户缺乏接受度\n\
  *   区块链的技术限制可以通过改进现有技术或引入概念性变革来克服。\n*   区块链的非技术限制可以通过教育和立法举措来克服。\n\n**脚注**\n\n1\
  \ Nakamoto, Satoshi. Bitcoin: A peer-to-peer electronic cash system. 2008. `https:bitcoin.org/bitcoin.pdf`.\n\
  \n2 Taylor, Michael Bedford. Bitcoin and the age of bespoke silicon. In Proceedings\
  \ of the 2013 International Conference on Compilers, Architectures and Synthesis\
  \ for Embedded Systems. Montreal: IEEE Press, 2013.\n\n3 Kroll, Joshua A., Ian C.\
  \ Davey, and Edward W. Felten. The economics of Bitcoin mining, or Bitcoin in the\
  \ presence of adversaries. Proceedings of WEIS. 2013.\n\n"
- "# 重塑区块链\n\n四种不同类型区块链的出现\n\n第 22 步强调了区块链的主要限制，并勾勒了克服这些限制的可能方法。本步将进一步分析区块链的两大主要技术限制。它解释了区块链主要技术限制的根源，并阐述了这些限制是如何被克服的。本步还将解释四种不同版本区块链的出现及其差异，并讨论这些版本出现所带来的后果。\n\
  \n### 隐喻\n\n我们常常试图同时实现两个或多个无法同时达成的目标，比如既快又好地完成工作，或者既快又安全地驾驶。两种或多种观点或目标之间的不相容称为冲突，解决冲突的方式要么是找到折衷方案，要么是选择其中一个选项而放弃其他所有替代方案。本步介绍了区块链的两个主要冲突，它们体现在其两大主要技术限制中，并阐述了为解决这些冲突所做的尝试如何导致了四种不同版本区块链的发明。\n\
  \n\n\n### 区块链的目标冲突\n\n区块链面临两大冲突：\n\n- 透明性 vs. 隐私性\n- 安全性 vs. 速度\n\n#### 透明性 vs.\
  \ 隐私性\n\n区块链根据所有交易数据的完整历史记录来明确所有权，这些数据对所有人公开。因此，区块链类似于一个公开的交易登记簿或公共账本。公开透明是区块链验证所有权的核心理念。这种公开性是解决双重支付问题的基础，因为每个人都可以审计他人的交易，从而轻松发现双重支付攻击。\n\
  \n然而，这种做法与隐私概念背道而驰。隐私意味着将交易数据或其细节（如涉及的账户或转账金额）对公众隐藏。因此，由此产生的冲突在于：一方面是需要澄清所有权的透明性，另一方面是用户对更高隐私性的需求。\n\
  \n#### 安全性 vs. 速度\n\n可以毫不夸张地说，交易数据的历史记录是区块链的核心。交易数据的历史记录受到保护，防止被篡改和伪造，其方式是将数据存储在一个不可变的仅追加的\
  \ `blockchain-data-structure` 中，这要求每添加或重写一个区块都要解决一个哈希难题。这不仅使得篡改或伪造交易数据历史记录的成本高得令人望而却步，也拖慢了向\
  \ `blockchain-data-structure` 添加新交易数据的速度。这与商业环境中许多应用对速度和可扩展性的需求形成了对比。因此，由此产生的冲突在于：一方面是基于耗时的工作量证明来保障交易数据历史记录的安全性，另一方面是用户对速度和可扩展性的需求。\n\
  \n### 冲突的根源\n\n这两大冲突的根源在于区块链的两项基本操作：读取和写入交易数据。公开性 vs. 隐私性的冲突可以追溯到读取 `blockchain-data-structure`\
  \ 的操作，而安全性 vs. 速度的冲突则可以追溯到向 `blockchain-data-structure` 写入数据的操作。表格 23-1 总结了两大主要技术限制、潜在冲突以及区块链相应基本功能之间的关系。\n\
  \n**表 23-1.** 区块链的技术限制及其原因\n\n| 技术限制 | 冲突 | 基本功能 |\n| --- | --- | --- |\n| 缺乏隐私性\
  \ | 透明性 vs. 隐私性 | 读取交易数据历史记录 |\n| 缺乏可扩展性 | 安全性 vs. 速度 | 向数据存储中写入交易数据 |\n\n### 解决冲突\n\
  \n解决冲突可以通过在相互竞争的目标之间寻找平衡点来实现，也可以通过强制执行其中一个目标而牺牲其他所有目标。迄今为止所讨论的区块链，选择了透明性和安全性，而牺牲了隐私性和速度。但还有其他的方法可以解决这些冲突，将在以下章节中详细讨论。\n\
  \n#### 在透明性与隐私性之间做出决策\n\n在透明性与隐私性的冲突中做出决策，实际上意味着决定授予谁读取权限。如果只考虑授予读取权限的极端情况，有两种选择：向所有人授予读取权限，或仅向有限的一组节点或用户授予读取权限。可以根据哪些用户或节点有权读取\
  \ `blockchain-data-structure` 以及创建新交易¹，来区分以下类型的区块链：\n\n- **公有链**向所有用户或节点授予读取权限和创建新交易的权利。\n\
  - **私有链**将读取权限和创建新交易的权利限制在一组预先选定的用户或节点中。\n\n#### 在安全性与速度之间做出决策\n\n在安全性与速度的冲突中做出决策，实际上意味着决定授予谁写入权限。如果只考虑授予写入权限的极端情况，有两种选择：向所有人授予写入权限，但通过要求工作量证明使其在计算上代价高昂；或者将写入权限限制在一组预先选定的、被认定为可信赖的用户或节点，并要求他们提供一种成本较低的工作量证明变体。我们可以根据授予写入权限的方式²，区分以下类型的区块链：\n\
  \n- **无许可链**向所有人授予写入权限。每个用户或节点都可以验证交易，并创建新区块添加到 `blockchain-data-structure` 中。\n\
  - **许可链**仅将写入权限授予一组有限的、通过入职流程被认定为可信赖的预选节点或用户。因此，只有拥有写入权限的节点组才被允许验证交易并参与分布式共识过程。\n\
  \n### 区块链的四种版本\n\n关于读取和写入权限的决策可以独立进行。表 23-2 展示了在结合读取和写入限制的极端情况时出现的四种区块链版本。\n\n**表\
  \ 23-2.** 结合读取和写入限制产生的四种区块链版本\n\n| 写入权限 | 所有人（读取权限） | 受限（读取权限） |\n| --- | --- |\
  \ --- |\n| 所有人 | 公有 & 无许可 | 私有 & 无许可 |\n| 受限 | 公有 & 许可 | 私有 & 许可 |\n\n在步骤 5 中定义并在前面所有步骤中讨论的区块链是一种公有无许可链。对\
  \ `blockchain-data-structure` 的读取或写入权限施加任何限制，都会产生其中一种替代版本。区块链中保密性最强的版本是私有许可链。这个版本被认为在商业环境中最为实用，因为它具有更高的处理速度，并且能够向公众隐藏交易数据。\n\
  \n### 后果\n\n限制对交易数据历史记录的读取或写入权限，会影响区块链的以下几个方面：\n\n- 点对点架构\n- 分布式特性\n- 目的\n\n####\
  \ 点对点架构\n\n在步骤 3 中，您了解到了点对点系统及其特性。点对点系统的一个主要特征（通常被视为其构成性特征）是，系统中包含的计算机在权利和角色方面都是平等的。尽管单个节点在其贡献的资源方面可能有所不同，但系统中的所有节点都具有相同的功能能力和责任。然而，如上文介绍的四种区块链版本，在向构成系统的节点授予读取和写入权限方面存在差异。如果节点在读取或写入交易数据的能力上存在差异，那么它们就不再平等。因此，由于对系统的读取和写入权限引入限制，点对点系统的一个重要特征似乎受到了破坏。\n\
  \n\n\n##### 分布式特性\n\n在第 2 步中，你学习了分布式系统及其部分特性。分布式系统的一个主要特征，通常被认为是其构成性特征，即缺乏任何形式的中央控制或协调。然而，如上所述，四种不同区块链版本的出现，是基于授予预选节点或用户群组对交易数据历史的读取或写入权限，同时拒绝所有其他节点或用户的这些权利。但由谁来决策授予或拒绝系统的读写权限？由谁来制定授予或拒绝读写权限的规则？\n\
  \n如果管理读写权限分配的规则并非由纯粹分布式的系统来管理和执行，那么该系统将存在一个中心化元素，这反过来会与区块链的分布式特性相矛盾。一个假设为分布式、却利用中心化元素来管理和执行读写权限分配规则的系统架构，可以用图\
  \ 2-2 所示的示意图来描绘。这意味着要么存在隐藏的中心化元素，要么对于所有受限访问的节点来说，该系统表现为一个中心化系统，同时内部却利用着分布式系统。在这两种情况下，整个系统更像是一个由分布式和中心化元素组成的混合系统。\n\
  \n##### 目的\n\n在第 4 步中，你了解到区块链要解决的核心问题是在一个纯分布式对等网络中实现并维护完整性，该网络由数量未知、可靠性和可信度也未知的对等节点组成。对读写访问施加限制不仅改变了分布式对等网络的构成特性，也改变了节点的可信度。如果允许向`blockchain-data-structure`写入数据的用户或节点在加入流程中事先通过了可信度评估，那么最终的环境可能不再由可信度未知的节点构成。因此，可以得出这样的结论：在这种环境下，区块链从不可信环境中建立信任的能力已不再必要。\n\
  \n即使在一个由已知数量、且据推测已知可靠性和可信度的节点构成的环境中，区块链也能创造价值，原因如下：首先，这类系统中的节点数量可能因技术故障或停机而变化。其次，每个分布式系统都面临着网络的对抗，这使得单个消息层面的通信变得不可靠。最后，即使是加入流程也无法百分百保证节点的可信度。此外，即使是可信的节点也可能因技术故障而产生错误结果。\n\
  \n### 重新审视区块链的目的\n\n由于对节点施加限制对区块链的主要方面产生影响，我们可能需修正对其目的的看法。对读写访问施加限制可能会与对等网络的定义、系统的分布式特性以及区块链的目的相冲突。然而，即使在最严格的私有许可型区块链中，区块链对于维护完整性也是有用的。因此，我们或许可以放宽区块链创造价值的条件。我们不必坚持认为区块链的目的是维护开放且纯粹分布式对等网络的完整性，而是可以将其目的表述为：通常而言，实现并维护分布式系统的完整性。\n\
  \n### 区块链一词在本书余下部分的使用\n\n本书余下部分将继续使用术语`blockchain`，其含义指代公共且无需许可的系统。在所有其他情况下，将明确说明所讨论的是何种受限类型的区块链。\n\
  \n### 展望\n\n本步重点介绍了克服区块链两大主要技术限制的两种方法。它解释了四种不同类型的区块链是如何根据对`blockchain-data-structure`读写访问权限的分配而产生的。至此，本书已讨论了区块链的主要思想及其基本概念。然而，我尚未讨论它如何应用于现实世界。下一步将通过考虑通用和更具体的使用案例来对此进行讨论。\n\
  \n### 总结\n\n*   区块链固有地包含以下冲突：\n    *   透明度与隐私权：一方面，需要透明度来明确所有权并防止双重支付；但另一方面，其用户需要隐私保护。\n\
  \    *   安全性与速度：一方面，通过利用计算密集型的“工作量证明”来保护交易数据历史不被篡改；但另一方面，在大多数商业场景中，速度和可扩展性是必需的。\n\
  *   透明度与隐私权的冲突源于对`blockchain-data-structure`读取访问权限的分配。\n*   安全性与速度的冲突源于对`blockchain-data-structure`写入访问权限的分配。\n\
  *   解决透明度与隐私权的冲突催生了以下版本的区块链：\n    *   公共区块链向所有用户或节点授予读取访问权限以及创建新交易的权利。\n    *  \
  \ 私有区块链将读取访问权限以及创建新交易的权利限制在预选的用户或节点群组内。\n*   解决安全性与速度的冲突催生了以下版本的区块链：\n    *   无需许可区块链向所有人授予写入访问权限。每个用户或节点都可以验证交易数据，并创建新区块添加到`blockchain-data-structure`中。\n\
  \    *   许可区块链仅向通过加入流程被识别为可信的、有限的预选节点或用户群组授予写入访问权限。\n*   将这些限制两两组合，催生了四种不同类型的区块链。\n\
  *   限制读取或写入访问权限会对区块链的以下属性产生影响：\n    *   对等网络架构\n    *   分布式特性\n    *   其目的\n*  \
  \ `blockchain-technology-suite`即使在受限环境中也能创造价值，原因如下：\n    *   节点数量可能因技术故障或停机而变化。\n\
  \    *   每个分布式系统都面临着网络的对抗，这使得单个消息层面的通信变得不可靠。\n    *   即使是加入流程也无法百分百保证节点的可信度。\n \
  \   *   即使是可信的节点也可能因技术故障而产生错误结果。\n\n#### 脚注\n\n1\n\nBitFury Group. 公共与私有区块链 第一部分：许可型区块链.\
  \ 白皮书，2015. [`http://bitfury.com/content/5-white-papers-research/public-vs-private-pt1-1.pdf`](http://bitfury.com/content/5-white-papers-research/public-vs-private-pt1-1.pdf).\n\
  \n2\n\nBitFury Group. 公共与私有区块链 第二部分：许可型区块链. 白皮书，2015. [`http://bitfury.com/content/5-white-papers-research/public-vs-private-pt2-1.pdf`](http://bitfury.com/content/5-white-papers-research/public-vs-private-pt2-1.pdf).\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将根据您提供的格式和注意事项，将给定的英文文本翻译成中文。\n\n\n"
- "# 第五部分\n使用区块链、总结与展望\n\n使用区块链、总结与展望\n\n本阶段将结束这段关于区块链的知识之旅。它探讨了如何在现实生活中使用区块链，存在哪些通用用例，以及如何分析现有的区块链应用。本阶段还指出了当前活跃的研究领域和未来的发展方向。在本阶段结束时，您将对区块链的主要应用场景、其最重要的进展，以及其可能带来的长期成就与不足之处，有一个扎实的理解。\n\
  \n## 24. 使用区块链\n\n一个拥有数千种应用的工具\n\n步骤 1 到 23 描述了区块链是什么、它解决了什么问题以及它是如何工作的。然而，区块链的发明不是为了让我们忙于讨论其技术概念。相反，区块链是为了在现实世界中应用而发明的。因此，本步骤将更详细地探讨如何使用区块链。它还描述了区块链的通用应用模式，并将其与自身特性联系起来。此外，本步骤概述了区块链的一些具体应用，并解释了在分析特定区块链应用时应考虑哪些细节。\n\
  \n### 隐喻\n\n人们为什么使用架子、橱柜、抽屉和盒子？这些存储工具被广泛使用，是因为它们提供了一种存储物品并保持整洁的方式，而不管其具体用途如何。例如，可以用一个盒子来存放文件、技术备件、办公用品、照片、钱、DVD、衣服或酒瓶。盒子、抽屉、橱柜或架子的用途多样性，仅受限于存放其中物品的多样性。本学习步骤通过关注可以存储在区块链中的物品的多样性以及其可以使用的场景的多样性，来讨论区块链的应用。但首先，我将回顾区块链作为一种用于数字物品的特殊盒子的特性。\n\
  \n### 区块链的特性\n\n区块链是一个纯粹的分布式点对点数据存储，具有以下特性：\n\n*   不可篡改\n*   只可追加\n*   有序\n*   带时间戳\n\
  *   开放且透明\n*   安全（身份识别、身份验证和授权）\n*   最终一致性\n\n区块链的这些特性与存储其中的具体数据无关。因此，从一个简化的角度来看，我们可以将区块链视为一种用于存储数字物品的特殊盒子。这将为区块链开启极其多样的应用。\n\
  \n### 通用应用模式\n\n基于区块链的特性及其作为各类数据的通用数据存储的特征，我们可以得出以下通用用例：\n\n*   存在性证明\n*   不存在性证明\n\
  *   时间证明\n*   顺序证明\n*   身份证明\n*   作者身份证明\n*   所有权证明\n\n#### 存在性证明\n\n这种区块链的用途侧重于存储数据的唯一目的是证明其存在性。因此，这种用途既未利用区块链的排序功能，也未利用其时间戳功能。具体的应用例如：旨在保证唯一性的物品登记簿，如品牌名称、专利、许可证代码以及互联网或电子邮件地址。\n\
  \n#### 不存在性证明\n\n这种区块链的用途与存在性证明相反。它提供了验证特定条目或物品是否不在区块链中的方法。这种应用的具体例子可以是投诉、罚款或定罪的记录。\n\
  \n#### 时间证明\n\n在这种情况下，不仅区块链中条目的单纯存在很重要，条目被添加的时间也很重要。区块链可以满足这一需求，因为其数据结构中的区块存储了开始添加过程的时间。受益于区块链时间戳功能的应用是那些追踪事件在时间上发生顺序的应用，例如交货或通知跟踪、支付跟踪、公共招标程序的开标与截标跟踪以及预测管理。\n\
  \n#### 顺序证明\n\n这种使用模式利用了区块链的排序功能。受益于区块链此项特性的应用是那些追踪事件相对顺序（不论其绝对时间）的应用，例如：申请流程跟踪、公共招标程序审计和第三方托管服务。证明某个事件是其同类事件中的第一个或最后一个，是顺序证明的一个具体例子。当资源按照某些声明或文件（如大学申请、专利申请或版权声明）提交的相同顺序进行分配时，这种证明可能很重要。\n\
  \n#### 身份证明\n\n身份证明可以被视为存在性证明的一个特例，因为它证明了某个特定身份已经存在。区块链能服务于这个用例，是因为它不仅存储可用于识别某人或某物的数据，还为身份识别和身份验证提供了基本的安全概念。这种使用模式的具体应用包括为人类、动物或物品建立的数字身份文件。政府可以将此类区块链作为其电子政务战略的一部分，用于管理个人文件、驾驶执照或护照。\n\
  \n#### 作者身份证明\n\n这种使用模式侧重于证明特定个人或机构将某些数据添加到了区块链中。区块链可以实现此目的，因为它不仅存储可通过其加密指纹识别的数据，还提供基本的安全概念，如身份识别、身份验证和授权。身份识别和身份验证对于识别作者和验证其身份是必要的。在此用例中，授权对于防止某人无权向区块链添加数据是必要的。利用这种使用模式的应用例如：电子出版、文档内容变更跟踪、内容交付、协作编辑和版权保护。\n\
  \n#### 所有权证明\n\n这种使用模式侧重于管理和明确所有权。它依赖于前面提到的所有模式，如存在性证明、顺序证明、身份证明和作者身份证明，以及三个基本安全概念：身份识别、身份验证和授权。利用这种使用模式的应用例如：管理房地产、汽车、公司股份、债券、数字货币或加密货币所有权的系统。\n\
  \n\n\n### 具体应用场景\n\n区块链对于其所存储的数据类型并无特定限制。因此，存储在区块链中的数据范围及其应用领域，与人类活动本身一样广泛多样。因此，不可能对所有区块链应用提供完整的概述。为此，本节仅介绍一小部分具体的区块链应用领域，这些领域已在使用或即将使用区块链技术¹：\n\
  \n- **支付**：管理数字法定货币的所有权与转移。\n- **加密货币**：管理与创建独立于任何政府、央行或其他中央机构之外的数字支付工具的所有权与发行。\n\
  - **小额支付**：转移通过传统方式成本过高的小额资金。\n- **数字资产**：管理具有自身价值或代表现实世界中有价值物品的数字项目的创建、所有权和转移。\n\
  - **数字身份**：基于独特数字项目进行身份证明和身份验证。\n- **公证服务**：对文件或合同以及所有权或转让证明进行数字化、存储和验证。\n- **合规与审计**：在审计跟踪中，对受监管行业的人员或组织的业务活动进行审计。\n\
  - **税务**：根据交易或单一所有权计算和征收税款，以减少避税²或双重征税。\n- **投票**：创建、分发和统计数字选票。\n- **记录管理**：创建和存储医疗记录。\n\
  \n### 分析区块链应用\n\n在多种情况下，可能需要对区块链应用进行分析，例如成为一家使用区块链的公司客户、投资一家区块链初创公司，或在自己的公司中使用区块链应用。在所有这些情况下，都需要判断某个区块链应用是否有用，或者是否能创造实际价值。由于区块链是一种复杂的技术架构，要清晰了解所考虑的软件系统的能力，并做出明智的购买、投资或使用决策，可能颇具挑战。因此，提出以下部分或全部问题可能会有所帮助：\n\
  \n- 使用哪种类型的区块链？\n- 使用区块链的条件是否满足？\n- 使用分布式点对点系统带来了哪些附加值？\n- 应用理念是什么？\n- 商业案例是什么？\n\
  - 如何补偿为系统贡献资源的节点？\n\n#### 使用区块链的条件是否满足？\n\n区块链是一个纯分布式点对点系统，由数量未知、可靠性和可信度也未知的节点组成。因此，在分析具体区块链应用时，首先要考虑的是其架构，以及该架构是否满足应用“区块链技术套件”的条件。为以下问题找到满意的答案至关重要：\n\
  \n- 系统的架构是什么？\n- 系统组件有哪些？它们之间如何相互连接？\n- 系统是纯分布式的，还是存在一个可能导致整个系统瘫痪的中心组件？\n- 新节点如何加入系统？\n\
  - 是否所有人都可以加入系统并开始贡献计算资源？\n- 是否存在某种新节点加入流程、尽职调查流程或事先安全检查，这些可能会建立中心控制元素？\n- 所有节点在系统中是否拥有相同的角色和权限？还是节点在读取或写入数据的权限上有所不同？\n\
  \n回答这些问题将帮助你获得对系统的基本理解，并判断是否真的需要“区块链技术套件”。你可能会发现，所认为的所谓区块链系统，实际上是一个中心化系统。\n\n####\
  \ 使用哪种类型的区块链？\n\n并非所有分布式系统都向所有人开放，并授予所有节点读写权限。区块链存在不同的版本，它们在节点之间读写权限的分配上有所区别。这些差异会影响系统的架构、分布式特性，以及区块链在这些系统中所扮演的角色。因此，为以下问题找到满意的答案非常重要：\n\
  \n- 使用哪种类型的区块链（公有链与私有链，以及有许可链与无许可链）？\n- 哪些权限受到了限制？\n- 哪些节点组拥有哪些权限？\n- 为什么选择了特定类型的区块链？\n\
  - 由谁决定将哪些权限授予哪个节点组？\n- 谁制定并执行关于授予或拒绝系统读写访问权限的规则？\n- 谁负责运行节点加入流程？\n- 在特定解决方案中，是否存在任何隐私或可扩展性问题，可以作为限制某些权限的理由？\n\
  \n#### 使用纯点对点系统带来了哪些附加值？\n\n纯分布式点对点系统和中心化系统各有其优缺点。中心化系统本身并非不好，它们只是遵循不同的架构概念，这种概念很好地服务于许多应用场景，并且至今依然如此。在某些特性上，中心化系统可能比分布式点对点系统更具吸引力。尤其值得注意的是，在纯分布式点对点系统中，保证完整性是出了名的困难，并且需要付出额外的努力。因此，需要有充分的理由来选择分布式点对点系统而非中心化系统。在分析具体的区块链应用时，为以下问题找到满意的答案至关重要：\n\
  \n- 为什么系统最初被实现为一个纯分布式点对点系统？\n- 有哪些替代方案？\n- 与替代方案相比，采用纯分布式点对点架构的优势是什么，劣势又是什么？\n-\
  \ 使用分布式点对点架构带来了哪些附加值？\n- 点对点架构的优势是否大于劣势？\n\n提出并坚持寻求这些问题的答案至关重要，这有助于区分那些有意选择分布式点对点架构的人，和那些仅仅为了使用区块链而使用它的人。\n\
  \n\n\n##### 什么是应用构想？\n\n分析系统架构很重要，但这并不能回答关于其应用构想以及系统如何为用户创造附加值的问题。必须牢记，即使是最复杂的系统架构，也永远无法弥补一个薄弱或糟糕的应用构想。对`区块链`技术套件的兴奋，可能会让人轻易忽略薄弱或糟糕的应用概念。因此，在分析区块链应用时，为以下问题找到令人信服的答案至关重要：\n\
  \n-   该应用的初衷是什么？\n-   系统的主要问题领域是什么？\n-   该系统能否关联到特定的行业或领域？如果能，是哪些？\n-   该系统为其用户提供何种服务？\n\
  -   使用该系统的附加值是什么？\n-   该系统利用了哪种通用的区块链使用模式？\n-   在特定的应用领域，区块链的法律接受度是否存在问题？\n-   哪些类型的数据存储在区块链中？\n\
  -   可以执行哪些类型的操作或交易？\n-   利用了哪些类型的安全功能？\n-   这些方面与系统的应用构想有何关联？\n\n##### 什么是商业模式？\n\
  \n分析区块链应用时的另一个重要方面是软件系统本身的商业概念。任何软件的创建和运行都会消耗资源，从而产生成本。区块链也不例外。分析区块链软件的商业条件是一个重要步骤，因为许多产品或技术创新都因其商业概念中的缺陷而失败。因此，有必要为以下问题找到好的答案：\n\
  \n-   购买或使用该软件的成本是多少？\n-   运行或使用该软件的固定成本和可变成本是多少？\n-   谁承担哪些成本？\n-   使用了哪种许可模式？\n\
  -   谁获得利润，或者谁必须承担亏损？\n\n##### 同行贡献资源并维护完整性如何获得补偿？\n\n区块链通过由费用和工作量证明实现的收入所构建的奖惩机制来实现完整性。第\
  \ 18 步强调了奖励对于补偿区块链贡献者的重要性，而第 20 步则指出了支付工具对系统的完整性、开放性和去中心化特性的影响。了解并理解同行如何因维护完整性而获得补偿，是分析区块链应用的一个关键方面。因此，有必要为以下问题找到令人满意的答案：\n\
  \n-   补偿同行的规则是什么？\n-   这些补偿规则与区块链的博弈论方面相结合，是否能确保并奖励那些为系统做出贡献者的诚实行为？\n-   系统验证和执行操作或交易需要支付哪些费用？\n\
  -   使用哪种支付工具来支付交易费用？\n-   使用哪种支付工具来补偿那些验证数据并将数据写入区块链的同行？\n\n一些区块链应用使用诸如比特币之类的加密货币作为支付费用和补偿同行的工具。由此产生的对比特币或其他区块链应用的依赖，在某些情况下可能并不可取。\n\
  \n### 展望\n\n这一步讨论了在现实世界中应用区块链的各个方面。然而，我对区块链的讨论尚未结束。下一步将总结学习路径，并指出有待进一步发展的领域。\n\n\
  ### 总结\n\n-   区块链可以被视为一个纯粹的分布式数据存储，具有不可篡改、仅追加、有序、带时间戳和最终一致性等附加属性。\n-   作为一个通用型数据存储，意味着区块链可以存储广泛的数据，这反过来使其能够在广泛的应用领域中使用。\n\
  -   基于其属性，我们可以识别出以下区块链的通用使用模式：\n    -   存在证明\n    -   不存在证明\n    -   时间证明\n    -\
  \   顺序证明\n    -   身份证明\n    -   作者身份证明\n    -   所有权证明\n-   已经或将受到关注的区块链特定应用领域包括：\n\
  \    -   支付\n    -   加密货币\n    -   微支付\n    -   数字资产\n    -   数字身份\n    -   公证服务\n\
  \    -   合规与审计\n    -   税务\n    -   投票\n    -   记录管理\n-   在分析特定的区块链应用或区块链服务时，需要回答一些问题：\n\
  \    -   使用了哪种类型的区块链？\n    -   使用区块链的要求是否得到满足？\n    -   使用纯粹的分布式点对点系统有何附加值？\n  \
  \  -   应用构想是什么？\n    -   商业模式是什么？\n    -   同行贡献资源给系统如何获得补偿？\n\n脚注 1\n\n世界经济论坛。金融服务未来——颠覆性创新如何重塑金融服务的结构、提供与消费方式。金融服务社区行业项目，2015\
  \ 年；世界经济论坛。金融基础设施未来——雄心勃勃地展望区块链如何重塑金融服务。金融服务社区行业项目，2016 年；Foroglou, George, 和 Anna-Lali\
  \ Tsilidou。区块链的进一步应用。2015 年。在哥伦比亚大学可持续发展博士十周年纪念会议上的演讲，2014 年 2 月 28 日。\n\n2\n\n\
  另一方面，使用真正匿名的加密货币可能会使避税更加容易。\n\n## 25. 总结与展望\n\n区块链的进一步发展、替代方案与未来\n\n这一步结束了这次穿越区块链宇宙的智力之旅。在强调了进一步发展和研究的领域之后，这一步将思考区块链在社会中可能取得的成就。在总结关于使用区块链可能未来趋势的一些评论之前，本步也讨论了一些可能存在的缺点。\n\
  \n\n\n### 隐喻\n\n1994 年，一位计算机科学家兼发明家描述了他即将开发的一个软件系统¹：\n\n- **去中心化**：没有中央权威，也没有单点故障。\n\
  - **非歧视性**：每个人都可以自由选择自己的方式接入系统。\n- **开放性**：系统将在众目睽睽之下开发，鼓励最大程度的参与和试验。\n- **普适性**：所有参与的计算机，无论其硬件或地理位置如何，都能相互通信。\n\
  - **共识**：系统及其用户将遵守那些通过基于共识的透明参与过程所制定的标准。\n\n这一系列特性读起来就像是对区块链的简短描述。然而，在 1994 年，区块链还不存在！实际上，这些要点所描述的系统是互联网，或者至少是蒂姆·伯纳斯-李对互联网的愿景。\n\
  \n由于技术进步、互联网商业的兴起以及当今互联网巨头的崛起，互联网可能与蒂姆·伯纳斯-李早在 1994 年提出的互联网愿景已大相径庭。在思考区块链的未来时，应牢记一个事实：技术会不断发展，并因此与其发明者的愿景产生偏离。因此，互联网的演变可以被视为区块链未来演变的蓝图。\n\
  \n### 进一步的演进与替代方案\n\n区块链并非一个一旦开发完成就一成不变的静态结构。本书所介绍和讨论的区块链仅提供了基础，而这个基础已经并将继续成为研究、改进和进一步发展的对象。²\
  \ 其中一些可以看作是微小的技术改进，而另一些则是概念上的变革，甚至是可能导致独立和竞争性方法的根本性进步。在不声称完整性的前提下，以下改进和进一步发展的领域值得关注：\n\
  \n- 微小的技术改进与变体\n- 提升可扩展性\n- 概念演进与替代方案\n\n#### 微小的技术改进与变体\n\n区块链利用了软件工程和计算机科学的广泛概念与原理，例如哈希函数、哈希引用、数据结构、数据存储、密码学、网络架构、计算机间通信以及计算难题。这些概念和技术中的每一个都曾是、并且仍然是活跃的研究领域。例如，有各种各样的哈希函数、数据结构、密码学过程、通信协议和计算难题可以用于区块链。因此，我们只需使用不同的哈希函数、创建密钥的密码学方法或用作工作量证明的计算难题，就能创建出不同版本的区块链。然而，这些变体对区块链的影响微乎其微，因为它们并未改变其基本运作方式；它们仅仅是在某些实现细节上有所变化。\n\
  \n#### 提升可扩展性\n\n专注于提升区块链可扩展性的主要研究领域包括网络效率、存储、数据使用以及共识算法。³ 在这一领域非常有前景的方法有闪电通道⁴和支付通道，⁵\
  \ 它们能够实现商业上可接受的交易时间。\n\n#### 概念演进\n\n概念演进是区块链在运作方式、所提供的服务以及用户与其交互方式方面的真正进步。区块链概念演进最重要的领域包括：\n\
  \n- 访问权限\n- 隐私性\n- 共识\n- 交易\n- 库存数据\n- 数据结构\n\n##### 访问权限\n\n限制对`blockchain-data-structure`的读取或写入访问权限，导致开发了区块链的不同版本。⁶\
  \ 正如在步骤 23 中已经解释的那样，结合关于读取区块链中数据权限的不同限制，产生了私有链和公有链；而限制向区块链写入数据的权限，则导致了无许可链和许可链的出现。这四种不同类型区块链的出现可被视为一种概念上的进步，因为它们对区块链的主要特性（如其目的、分布式性质和架构）产生了影响。\n\
  \n##### 隐私性\n\n公有链的开放性早已成为讨论和进一步发展的主题，因为它与某些应用场景所需的隐私保护水平相冲突。私有链限制了读取权限，因此不再能被所有人用于根据交易数据的历史记录来厘清所有权。保护隐私的替代方法包括在现有区块链之上的隐私覆盖层，⁷\
  \ 或是专门关注隐私的分布式计算平台。⁸ 另一种方法是零知识证明，它允许你在无需完全访问用于创建证明的数据的情况下，证明陈述（例如，关于数字资产当前所有者的陈述）的正确性。⁹\
  \ 对于区块链而言，这项技术可以让每个人都能证明与所有权相关的陈述，而无需读取交易数据的所有细节。¹⁰\n\n##### 共识\n\n区块链的一个核心要素是，它持续选择所有节点一致同意的交易历史版本。导致计算成本的工作量证明，为选择交易历史以及解决过去竞争版本之间的冲突提供了标准基础。然而，基于创建交易历史所投入的计算能力来选择历史版本，让许多计算机科学家感到不满，因为巨大的计算能力可能被单个组织征服和积累，从而使其能够随意影响共识。\n\
  \n因此，人们开发并讨论了在分布式系统中达成共识的不同标准以及不同算法。权益证明¹¹和权益速度证明¹² 是可能适用于加密货币的共识标准，因为它们将投票权与由共识本身管理的该资产的持有量或流通量挂钩。完全不同的共识算法包括`Paxos`¹³\
  \ 和`Raft`。¹⁴ 它们在区块链出现之前很久就已经被开发出来。然而，要令人满意地解释`Raft`或`Paxos`本身就是一项挑战，这超出了本书的范围。替代性共识机制面临的一个主要挑战是，它们通常在概念上更为复杂，因此更难进行形式化证明。如果其中存在博弈论上的缺陷，就可能导致使用该机制的区块链被破坏，并因此摧毁对该区块链的信心。\n\
  \n\n\n#### 交易\n\n交易是一种将所有权从一个账户转移到另一个账户的手段，也是描述和验证所有权的一种方式。事实证明，交易实际上是微型的自包含合约。它们包含了实现所有权转移所需的全部信息。这一洞察促成了由区块链执行的智能合约的发展。与交易数据类似，智能合约是相关各方意愿的机器可读描述。但与简单的交易数据不同，智能合约在用于描述期望所有权转移的对象、主体、行为和条件方面要灵活得多。从技术角度来看，智能合约是用区块链特定编程语言编写的自包含计算机程序。为了容纳智能合约，区块链技术通过增加执行编程代码的能力得到了扩展。这一扩展将区块链从一个主要专注于存储交易数据的分布式系统，转变为一个执行智能合约的分布式虚拟机系统。¹⁵\n\
  \n运行程序代码的能力为在区块链上开发应用程序开辟了可能性，而不仅仅是维护简单的交易数据。在谈论智能合约时，我们需要谨慎；尽管该术语最初暗示了对手方之间的合约，但现在它被用来指代在特定区块链中管理和执行的一段代码。然而，法律界已有动向，基于李嘉图合约的思想，开发更接近初始概念的方案。¹⁶\n\
  \n由于灵活性，智能合约可用于描述各种现实世界中的合约，例如定期支付租金、获得贷款、偿还贷款、下注并结算复杂赌注、以及在发生损失或复杂事件时支付保险金。因此，智能合约是过去几年中区块链最重要且最有前途的发展。\n\
  \n#### 库存数据\n\n前述步骤中讨论的初始区块链关注于维护一个不可变的、仅可追加的数据存储的完整性，该存储可用于维护交易数据的完整历史记录等。然而，正如步骤\
  \ 9 中所讨论的，所有权可以基于交易数据和库存数据两种方式进行管理。前一种方法在管理简单数据时似乎合适，而后一种方法在智能合约的背景下已被证明十分有用，在这种背景下，整个系统通常被视为一个状态的集合，可以包含任意信息，如账户余额、赌注、保险合同、声誉，或代表物理世界中对象的数据。¹⁷\
  \ 因此，整个系统的状态作为库存数据存储，并通过智能合约的执行进行转换，而智能合约则单独存储在一个不可变的、仅可追加的数据存储中。\n\n#### 数据结构\n\
  \n区块链数据结构并非一条直线的区块链；实际上，它是一种树形数据结构，其分支代表了交易数据历史记录的冲突版本。区块链算法的主要挑战是让分布式系统的节点一致地选择其中一个分支作为权威链。存储交易数据的另一种方法是利用区块的有向无环图，而不是树形数据结构。可以将区块的有向无环图想象为一种树形的区块链数据结构，其分支在后期会合并。使用无环图来存储交易历史对性能、明确所有权以及在节点间达成共识有着深远的影响。¹⁸\n\
  \n### 区块链的主要成就\n\n众所周知，人们倾向于高估技术的短期效果，而忽视其长期影响。互联网的演变及其对我们社会的影响不仅证实了这一智慧，还显示出估算技术创新的长期影响是多么困难。然而，以下方面有望成为区块链的长期成就：\n\
  \n* 去中介化\n* 自动化\n* 标准化\n* 流程精简\n* 处理速度提升\n* 成本降低\n* 转向信任协议和技术\n* 使信任成为一种商品\n* 技术意识提升\n\
  \n#### 去中介化\n\n区块链并没有摧毁中间人的角色，而是将自身建立为一个数字化的、严格遵循规则的中间人。用一个中间人替换另一个可能没什么大不了的，但用一个编码了信任的软件系统来替换一个依赖客户信任的人类组织，是一项巨大的成就。此外，用一个能安全协调节点间直接交互的系统来替换一连串的中间人，确实是一项巨大的成就。因此，去中介化是区块链的一项成就，其影响可能会持续存在。\n\
  \n#### 自动化\n\n为了履行其作为数字中间人的角色，区块链依赖于自动化。区块链使用得越多，它就越能通过节点间的自动化交互来取代既有的中介机构的手动任务。因此，区块链的另一项成就可能是其促进自动化的潜力。\n\
  \n#### 标准化\n\n区块链提供的自动化交易处理基于规则和标准的存在。因此，区块链使用得越多，合约方之间的交易和互动就会越标准化。因此，促进节点间互动的标准化可能是区块链的另一项长期成就。\n\
  \n#### 流程精简\n\n作为标准化和自动化的结果，业务流程将变得更加透明和精简。许多组织在准备向区块链过渡的过程中，作为附带效应，审查并分析了自身的业务流程。因此，审查现有业务流程，并对其重新设计和精简，可能是区块链的另一项可能持久存在的成就。\n\
  \n#### 处理速度提升\n\n去中介化、标准化、流程精简和自动化导致了流程的显著加速。因此，可以预期的是，区块链使用得越多，合约方之间的交易和互动执行得就越及时。曾经涉及耗时手动任务的流程得以加速，这可能是区块链的另一项长期贡献。\n\
  \n#### 成本降低\n\n自动化、去中介化和标准化的经济后果往往是成本的降低。历史表明，自动化的成本降低效应推动并重塑了许多行业，并因此使许多商品能够被更广泛的人群所负担。然而，自动化的成本降低效应并不仅限于生产汽车、电视、手机和服装。从经济角度看，中介服务的成本降低可能是区块链最显著的长期贡献。\n\
  \n\n\n#### 向协议与技术的信任转变\n\n区块链用对基于计算机验证的绝对逻辑以及共识机制力量的信任，取代了对人或人类组织的信任。这可能会改变我们在个人层面以及社会层面对信任和可靠性的认知。因此，从社会学角度来看，向安全协议和计算达成共识的信任转变，可被视为区块链最重要的长期影响之一。\n\
  \n#### 将信任变成一种商品\n\n自动化与标准化不仅降低了许多行业的生产时间和成本，还让过去昂贵的许多消费品变得对大众而言负担得起。例如，你还记得 30\
  \ 年前一个袖珍计算器、一台个人电脑或一部手机有多贵吗？如今，袖珍计算器被当作营销赠品，而性能比早期美国国家航空航天局太空计划所用计算机高出数个数量级的电脑，用零花钱就能买得起。这主要归功于计算机芯片和半导体生产的自动化与标准化。我们可以期待，由于区块链引入的自动化与标准化，商业互动的信任、安全启动、执行与结算将变得像袖珍计算器一样廉价且无处不在。对于那些每天都需要启动、执行和结算商业互动作为日常工作一部分的人来说，这可能是区块链最显著的长期影响。\n\
  \n#### 技术意识的提升\n\n区块链是一个高度复杂的技术构造，它通过使用不可变数据结构和共识算法，解决了在分布式点对点系统中实现完整性的高难度技术问题。这个主题似乎并非注定能吸引商业世界的关注。然而，区块链已经并持续从众多方面获得大量关注。对技术兴趣的增加以及我们对技术在生活中作用的认识提升，可被视为区块链的附带效应，但这些是受欢迎的发展，因为许多行业的成功以及我们社会的财富，都关键取决于对技术挑战的掌握。\n\
  \n### 可能的缺点\n\n除了积极影响和成就，区块链也可能导致不想要的副作用甚至负面结果。其中最重要的几点是：\n\n-   缺乏隐私\n-   个人责任的丧失\n\
  -   工作岗位的流失\n-   再中介化\n\n#### 缺乏隐私\n\n公共区块链不会隐藏其任何数据。相反，任何人都能读取全部的交易历史。这种透明程度对那些想保护隐私的人来说是可怕的。考虑到大型企业或情报机构已经收集和利用个人数据的程度，这些担忧是可以理解的。然而，这种批评可能会促进私有区块链的发展与普及，或推动高级安全协议的应用。此外，这可能会催生一种观念，即人们可以拥有自己的个人数据，并能够出售访问或使用这些数据的权利。其结果是，搜索引擎和社交媒体平台等现有的中介机构可能会失去用户的认可和市场份额。\n\
  \n#### 个人责任的丧失\n\n个人责任的丧失通常被认为是去中介化的后果。中介机构不仅将合同各方联系在一起，还可能提供担保。当交易出现意外时，他们提供调解，并且有义务为其行为承担责任。从对人和人类组织的信任转向对协议和技术的信任，可能会导致在发起、执行和结算合同互动过程中，个人服务和个人责任的缺失。由于区块链法律认可方面存在悬而未决的问题，人们质疑，作为完全自动化的、由协议驱动的交易机制，区块链能否像传统中介机构那样为其行为承担责任。然而，这种批评可能会推动法律倡议，以澄清关于区块链法律地位的未解决问题。\n\
  \n#### 工作岗位的流失\n\n自动化与标准化不仅塑造了商品的生产流程和成本，也导致了劳动力市场的摩擦。金融行业的许多参与者，如银行、经纪商、托管机构、汇款机构和公证人，都直接与其中介角色绑定。当大量金融交易通过区块链以自动化方式处理时，这些机构中的许多工作岗位可能面临风险。\n\
  \n#### 再中介化\n\n区块链的复杂性及其尚不明确的法律地位，可能会阻碍个人和组织使用区块链，从而产生一种与去中介化相悖的效果。人们可能不会为了直接与合同方互动而使用区块链，而是决定使用中介机构提供的服务，而这些中介机构则转而使用区块链。这可能导致本应被区块链取代的中介机构迎来复兴。这种效应可能会严重减缓区块链的采用，并抵消其一些主要成就。\n\
  \n\n\n### 未来\n\n预测未来并非易事，尤其是在考虑一项尚处于积极研究和持续开发阶段的新技术时。然而，我们可以识别出一些指向未来可能情景的迹象。特别是，公共无许可区块链由于其可扩展性有限且缺乏隐私性，商业用途似乎有限。另一方面，私有许可区块链似乎最受商业层面的关注。因此，我们未来可能会看到以下发展：\n\
  \n- 有限的爱好者项目\n- 大规模商业应用\n- 政府项目\n\n#### 有限的爱好者项目\n\n有限的爱好者项目可能会利用公共无许可区块链，并且极有可能由区块链爱好者和纯粹主义者发起和支持。他们受到系统完全开放和纯粹去中心化特性的驱动。这些项目的支持者可能将他们的参与视为一种政治声明，或是对某种替代性软件系统的承诺，这种系统使他们摆脱任何形式的政府或商业控制与协调。在这种背景下，加密货币作为旨在独立于政府监管的替代货币，以及独立的声誉系统或独立于政府身份证件管理身份的系统，可能成为主要应用案例。\n\
  \n#### 大规模商业应用\n\n大规模商业区块链项目预计将利用私有许可区块链。这些项目极有可能由特定部门或行业的领先企业联盟发起和运营。实现标准化、自动化、流程精简和成本降低的收益，将是支持这些项目的主要原因。这些项目也可能基于这样一种理念：寻找一种折中方案，使参与者能够利用区块链的优势，同时又不因去中介化而显得可有可无。有可能每个主要行业，如银行业、金融交易所、保险、医疗保健、支付和零售业，都将开发并提供各自行业范围内的区块链解决方案。\n\
  \n#### 政府项目\n\n作为政府项目，这些区块链企业的资金来源于税收，因此不受影响私营部门区块链项目的大部分商业限制。这些项目可能作为电子政务倡议的一部分发起和运营，旨在实现手动流程数字化或替换传统基础设施。税收、监控、数字身份、记录管理或货币政策都可能受益于区块链的特性。然而，悬而未决的法律问题以及现有的数据安全和隐私法律，可能会严重限制区块链在公共部门中的益处。\n\
  \n### 展望\n\n这一步完成了并圆满结束了我们这次理解区块链的智识之旅。在强调了区块链的研究和进一步开发领域之后，这一步还提到了它的一些替代方案、可能的长期成就、缺点以及未来的用途。互联网的历史不仅教会我们一项新技术的使用和发展是多么变幻莫测、难以预测，也教会了我们它是多么充满挑战且回报丰厚。无论区块链的未来如何，我们都可以决定不仅仅是这场激动人心且充满挑战的技术变革的见证者，更是积极的参与者——这场变革有潜力成为自互联网发明以来最伟大的事物之一。\n\
  \n### 总结\n\n-   区块链一直是，并将继续是进一步改进和发展的对象，例如其实现方式的变化、效率提升、可扩展性改进以及概念上的进步。\n-   智能合约、零知识证明以及达成共识的替代方式是区块链概念进步的三大主要领域。\n\
  -   除了技术上的优点，区块链还可能因其以下长期成就而受到赞誉：\n    -   去中介化\n    -   自动化\n    -   标准化\n    -\
  \   流程精简\n    -   处理速度提升\n    -   成本降低\n    -   转向对协议和技术的信任\n    -   使信任成为一种商品\n\
  \    -   技术意识增强\n-   区块链可能的缺点包括：\n    -   缺乏隐私性\n    -   个人责任丧失\n    -   就业岗位流失\n\
  \    -   再中介化\n-   未来可能看到的区块链用途包括：\n    -   有限的爱好者项目\n    -   大规模商业项目\n    -   政府项目\n\
