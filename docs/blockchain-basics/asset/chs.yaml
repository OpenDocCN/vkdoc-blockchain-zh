  \ 是区块头（区块头 1）的一部分。Merkle 根的更改改变了区块头 1 的加密哈希值，这进而导致指向它的哈希引用 (`B1`) 失效。用于维护连接或作为从区块头\
  \ 2 指向区块头 1 的链接的哈希引用 `B1`，在检测到更改后变得无效。结果，整个 `blockchain-data-structure` 变得无效。\n\n\
  #### 更改区块头引用\n\n图 15-9 展示了当不仅更改整棵 Merkle 树，还更改指向被篡改区块头的哈希引用时会发生什么。\n\n![A436689_1_En_15_Fig9_HTML.jpg](img/A436689_1_En_15_Fig9_HTML.jpg)\n\
