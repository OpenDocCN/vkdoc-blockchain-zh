- fmt: '另一个例子是发生在2021年8月的`Poly Network`黑客攻击事件。`Poly Network`是一个跨链DeFi协议，旨在促进多个区块链之间的代币交换。黑客利用了智能合约代码中的一个漏洞，盗走了价值约6亿美元的加密货币。然而，在与`Poly
    Network`及更广泛的加密货币社区谈判后，黑客最终归还了资金。这一事件凸显了DeFi协议安全性的重要性，以及持续审计和测试智能合约的必要性。


    某些情况需要人为判断、道德或伦理考量，或其他需要人类“参与其中”才能做出决定的情形，这限制了智能合约在许多场景下的使用。智能合约自动执行且无法适应不断变化的环境，若环境意外改变或出现原始合约未预见的意外情况，这可能会带来问题。此外，智能合约可能无法处理需要人工干预解决的复杂业务逻辑。


    例如，智能合约可能不适用于复杂的法律协议，包括那些涉及知识产权或许可协议的合同，因为这类协议通常需要人类的解释和谈判。即使有AI的协助，智能合约开发者也可能无法在部署前考虑到此类协议中可能出现的所有场景和意外情况。


    智能合约也可能不适用于需要争议解决或调解的交易。当双方就智能合约条款发生争议时，合约条款内可能没有明确的争议解决机制。这可能导致双方无法达成解决方案，进而可能造成财务损失，甚至引发法律纠纷。


    此外，智能合约可能不适合处理涉及实物商品或服务的交易。某个智能合约很可能无法验证实物产品的质量或真实性，这对于食品或制药等行业来说是一个重要的考量因素。在这些情况下，可能需要人工干预，以确保合约条款得到履行，且实物产品符合预期质量。


    仔细评估智能合约对于特定交易或协议的适用性非常重要。虽然智能合约在效率和透明度方面提供了诸多好处，但在决定使用该技术之前，必须考虑到某些局限性和潜在风险。


    智能合约开发者必须勤勉地识别和解决其代码中的潜在安全漏洞，以确保代码的安全且无错误。此过程的关键步骤之一是，由专注于区块链安全的独立第三方审计师对智能合约代码进行严格的测试和审计。这些审计师会评估智能合约代码的漏洞，并提出改进安全性的建议。


    审计智能合约涉及对代码进行彻底分析，以确保其安全、高效并按预期运行。该过程通常包括以下几个步骤：


    1.  静态分析：检查代码中的潜在漏洞和安全缺陷，例如缓冲区溢出、竞态条件和整数溢出。

    2.  动态分析：测试代码以确保其按预期运行，且没有错误或逻辑缺陷。

    3.  代码审查：由人类专家审查代码，确保其遵循最佳实践、组织良好且易于阅读和理解。

    4.  渗透测试：尝试攻击或利用智能合约，以识别攻击者可能利用的任何弱点或漏洞。

    5.  风险分析：评估与智能合约相关的潜在风险，例如安全漏洞发生的可能性或漏洞的潜在影响。

    6.  文档审查：审查智能合约的文档，确保其准确描述了预期的行为以及使用中的任何限制或风险。


    审计智能合约的目标是识别并修复任何可能被攻击者利用的漏洞或缺陷。在整个开发过程中以及部署后进行定期审计非常重要，以确保智能合约随着时间的推移保持安全和有效。


    智能合约防护机制是用于预防或减轻与智能合约执行相关的潜在风险的机制。一种常见的防护机制是使用断路器。断路器是一种软件机制，会在发生错误或漏洞时暂停智能合约的执行。这使得开发者能够在允许智能合约恢复执行之前调查并修复问题。


    另一种防护机制是使用多重签名钱包。多重签名钱包要求多方在对交易进行签名后才能执行，这可以防止未经授权或欺诈性的交易。这对于涉及大额价值的交易尤其有用。


    其他智能合约防护机制包括使用时间锁，它会延迟智能合约的执行，直到指定的时间或日期。时间锁对于需要等待期后才能执行的交易很有用，例如在某个条件满足后释放资金。另一种防护机制是使用访问控制，它只允许授权方执行智能合约。这可以防止对智能合约的未经授权访问或篡改。


    智能合约开发者使用标准且广泛接受的编码实践并遵循智能合约开发的最佳实践也很重要。这包括遵循安全编码指南、使用安全的编程语言，以及定期更新代码以应对可能出现的新漏洞。


    在智能合约无法完全自动化某些流程，或者合约条款可能存在歧义的情况下，纳入人工监督或争议解决机制有助于确保交易的公平和透明。


    确保公平透明交易的一种机制是实施争议解决流程。该流程可以内置于智能合约中，并涉及一个中立的第三方仲裁员，负责解决出现的任何争议。仲裁员可以审查合约条款以及任何相关数据或证据，以确定争议结果。在合约条款模糊不清或需要人为判断的情况下，例如在NFT所有权存在争议时，此机制可能特别有用。


    开发者需要仔细考量在其智能合约中使用人工监督和争议解决机制，因为这可能会增加合约执行过程的复杂性和潜在成本。然而，在错误或争议的潜在风险和后果非常严重的情况下，这些机制可以为所有相关方提供重要的保护层。'
  raw: 'Another example is the Poly Network hack, which occurred in August 2021\.
    Poly Network is a cross-chain DeFi protocol that facilitates the exchange of tokens
    across multiple blockchains. The hackers exploited a vulnerability in the smart
    contract code, allowing them to steal approximately $600 million worth of cryptocurrency.
    However, the hackers eventually returned the funds after negotiations with Poly
    Network and the wider cryptocurrency community. This incident underscored the
    importance of security in DeFi protocols and the need for continuous auditing
    and testing of smart contracts.


    The fact that some situations require judgment calls, moral or ethical considerations,
    or other circumstances which need a human “in-the-loop” to make a determination
    restricts the use of smart contracts in a lot of scenarios. Smart contracts are
    executed automatically and are unable to adapt to changing circumstances, which
    can be problematic if circumstances change unexpectedly or if there are unforeseen
    contingencies that were not accounted for in the original contract. Additionally,
    smart contracts may not be able to handle complex business logic, which may require
    human intervention to resolve.


    For example, smart contracts may not be suitable for complex legal agreements.
    This would include those involving intellectual property or licensing agreements,
    as these types of agreements often require human interpretation and negotiation.
    It is possible that smart contract developers might fail to account for all the
    possible scenarios and contingencies that could arise in such agreements prior
    to their deployment, even with the assistance of AI.


    Smart contracts may also not be suitable for transactions that require dispute
    resolution or mediation. In the case of a dispute between two parties over the
    terms of a smart contract, there may not be a clear mechanism for resolving the
    dispute within the terms of the contract. This could result in a situation where
    the parties are unable to reach a resolution, leading to possible financial loss
    and or even legal disputes.


    Furthermore, smart contracts may not be suited to handle transactions that involve
    physical goods or services. It is distinctly likely that a given smart contract
    may be unable to verify the quality or authenticity of a physical product, which
    is an important consideration for industries such as food or pharmaceuticals.
    In these cases, there may be a need for human intervention to ensure that the
    terms of the contract are being met and that the physical product is of the expected
    quality.


    It’s important to carefully consider the suitability of smart contracts for a
    given transaction or agreement. While they offer many benefits in terms of efficiency
    and transparency, there are certain limitations and potential risks that must
    be taken into account before deciding to use this technology.


    Smart contract developers must be diligent in identifying and addressing potential
    security vulnerabilities in their code to ensure that it is secure and free from
    errors. One key step in this process is to undergo rigorous testing and auditing
    of the smart contract code by independent third-party auditors who specialize
    in blockchain security. These auditors will assess the smart contract’s code for
    vulnerabilities and recommend changes that can improve its security.


    Auditing a smart contract involves a thorough analysis of the code to ensure that
    it is secure, efficient, and functioning as intended. The process typically involves
    several steps, including the following:


    1.  Static analysis: This involves reviewing the code for potential vulnerabilities
    and security flaws, such as buffer overflows, race conditions, and integer overflows.


    2.  Dynamic analysis: This involves testing the code to ensure that it functions
    as intended and that there are no bugs or logical errors.


    3.  Code review: This involves a human expert reviewing the code to ensure that
    it follows best practices, is well organized, and is easy to read and understand.


    4.  Penetration testing: This involves attempting to hack or exploit the smart
    contract to identify any weaknesses or vulnerabilities that could be exploited
    by an attacker.


    5.  Risk analysis: This involves assessing the potential risks associated with
    the smart contract, such as the likelihood of a security breach or the potential
    impact of a vulnerability.


    6.  Documentation review: This involves reviewing the documentation for the smart
    contract to ensure that it accurately describes its intended behavior and any
    limitations or risks associated with its use.


    The goal of auditing a smart contract is to identify and remediate any vulnerabilities
    or flaws that could be exploited by an attacker. It is important to conduct regular
    audits throughout the development process, as well as after deployment, to ensure
    that the smart contract remains secure and effective over time.


    Smart contract safeguards are mechanisms put in place to prevent or mitigate potential
    risks associated with the execution of smart contracts. One common safeguard is
    the use of circuit breakers. A circuit breaker is a software mechanism that pauses
    the execution of a smart contract in the event of an error or vulnerability. This
    allows developers to investigate and fix the issue before allowing the smart contract
    to resume execution.


    Another safeguard is the use of multisignature wallets. Multisignature wallets
    require multiple parties to sign off on a transaction before it can be executed,
    which can prevent unauthorized or fraudulent transactions. This is particularly
    useful for transactions involving large amounts of value.


    Other smart contract safeguards include the use of time locks, which delay the
    execution of a smart contract until a specified time or date. Time locks can be
    useful for transactions that require a waiting period before execution, such as
    the release of funds after a certain condition has been met. Another safeguard
    is the use of access controls, which restrict the execution of a smart contract
    to authorized parties only. This can prevent unauthorized access or tampering
    with the smart contract.


    It develops also important for smart contract developers to use standard and widely
    accepted coding practices and to follow best practices for smart contract development.
    This includes following secure coding guidelines, using secure programming languages,
    and regularly updating the code to address any new vulnerabilities that may arise.


    In cases where smart contracts cannot fully automate certain processes or where
    there may be ambiguity in the contract terms, incorporating human oversight or
    dispute resolution mechanisms can help ensure fair and transparent transactions.


    One mechanism for ensuring fair and transparent transactions is to implement a
    dispute resolution process. This process can be built into the smart contract
    and can involve a neutral third-party arbitrator who is responsible for resolving
    any disputes that arise. The arbitrator can review the terms of the contract and
    any relevant data or evidence to determine the outcome of the dispute. This mechanism
    can be particularly useful in cases where the terms of the contract are ambiguous
    or require human judgment, such as in cases where there is a dispute over the
    ownership of an NFT.


    It is important for developers to carefully consider the use of human oversight
    and dispute resolution mechanisms in their smart contracts, as they can add complexity
    and potential costs to the contract execution process. However, in cases where
    the potential risks and consequences of errors or disputes are significant, these
    mechanisms can provide an important layer of protection for all parties involved.'
  trans: '

    另一个例子是发生在 2021 年 8 月的`Poly Network`黑客攻击事件。`Poly Network`是一个跨链 DeFi 协议，旨在促进多个区块链之间的代币交换。黑客利用了智能合约代码中的一个漏洞，盗走了价值约
    6 亿美元的加密货币。然而，在与`Poly Network`及更广泛的加密货币社区谈判后，黑客最终归还了资金。这一事件凸显了 DeFi 协议安全性的重要性，以及持续审计和测试智能合约的必要性。


    某些情况需要人为判断、道德或伦理考量，或其他需要人类“参与其中”才能做出决定的情形，这限制了智能合约在许多场景下的使用。智能合约自动执行且无法适应不断变化的环境，若环境意外改变或出现原始合约未预见的意外情况，这可能会带来问题。此外，智能合约可能无法处理需要人工干预解决的复杂业务逻辑。


    例如，智能合约可能不适用于复杂的法律协议，包括那些涉及知识产权或许可协议的合同，因为这类协议通常需要人类的解释和谈判。即使有 AI 的协助，智能合约开发者也可能无法在部署前考虑到此类协议中可能出现的所有场景和意外情况。


    智能合约也可能不适用于需要争议解决或调解的交易。当双方就智能合约条款发生争议时，合约条款内可能没有明确的争议解决机制。这可能导致双方无法达成解决方案，进而可能造成财务损失，甚至引发法律纠纷。


    此外，智能合约可能不适合处理涉及实物商品或服务的交易。某个智能合约很可能无法验证实物产品的质量或真实性，这对于食品或制药等行业来说是一个重要的考量因素。在这些情况下，可能需要人工干预，以确保合约条款得到履行，且实物产品符合预期质量。


    仔细评估智能合约对于特定交易或协议的适用性非常重要。虽然智能合约在效率和透明度方面提供了诸多好处，但在决定使用该技术之前，必须考虑到某些局限性和潜在风险。


    智能合约开发者必须勤勉地识别和解决其代码中的潜在安全漏洞，以确保代码的安全且无错误。此过程的关键步骤之一是，由专注于区块链安全的独立第三方审计师对智能合约代码进行严格的测试和审计。这些审计师会评估智能合约代码的漏洞，并提出改进安全性的建议。


    审计智能合约涉及对代码进行彻底分析，以确保其安全、高效并按预期运行。该过程通常包括以下几个步骤：


    1.  静态分析：检查代码中的潜在漏洞和安全缺陷，例如缓冲区溢出、竞态条件和整数溢出。

    2.  动态分析：测试代码以确保其按预期运行，且没有错误或逻辑缺陷。

    3.  代码审查：由人类专家审查代码，确保其遵循最佳实践、组织良好且易于阅读和理解。

    4.  渗透测试：尝试攻击或利用智能合约，以识别攻击者可能利用的任何弱点或漏洞。

    5.  风险分析：评估与智能合约相关的潜在风险，例如安全漏洞发生的可能性或漏洞的潜在影响。

    6.  文档审查：审查智能合约的文档，确保其准确描述了预期的行为以及使用中的任何限制或风险。


    审计智能合约的目标是识别并修复任何可能被攻击者利用的漏洞或缺陷。在整个开发过程中以及部署后进行定期审计非常重要，以确保智能合约随着时间的推移保持安全和有效。


    智能合约防护机制是用于预防或减轻与智能合约执行相关的潜在风险的机制。一种常见的防护机制是使用断路器。断路器是一种软件机制，会在发生错误或漏洞时暂停智能合约的执行。这使得开发者能够在允许智能合约恢复执行之前调查并修复问题。


    另一种防护机制是使用多重签名钱包。多重签名钱包要求多方在对交易进行签名后才能执行，这可以防止未经授权或欺诈性的交易。这对于涉及大额价值的交易尤其有用。


    其他智能合约防护机制包括使用时间锁，它会延迟智能合约的执行，直到指定的时间或日期。时间锁对于需要等待期后才能执行的交易很有用，例如在某个条件满足后释放资金。另一种防护机制是使用访问控制，它只允许授权方执行智能合约。这可以防止对智能合约的未经授权访问或篡改。


    智能合约开发者使用标准且广泛接受的编码实践并遵循智能合约开发的最佳实践也很重要。这包括遵循安全编码指南、使用安全的编程语言，以及定期更新代码以应对可能出现的新漏洞。


    在智能合约无法完全自动化某些流程，或者合约条款可能存在歧义的情况下，纳入人工监督或争议解决机制有助于确保交易的公平和透明。


    确保公平透明交易的一种机制是实施争议解决流程。该流程可以内置于智能合约中，并涉及一个中立的第三方仲裁员，负责解决出现的任何争议。仲裁员可以审查合约条款以及任何相关数据或证据，以确定争议结果。在合约条款模糊不清或需要人为判断的情况下，例如在
    NFT 所有权存在争议时，此机制可能特别有用。


    开发者需要仔细考量在其智能合约中使用人工监督和争议解决机制，因为这可能会增加合约执行过程的复杂性和潜在成本。然而，在错误或争议的潜在风险和后果非常严重的情况下，这些机制可以为所有相关方提供重要的保护层。

    '
- fmt: '# 智能合约与预言机


    许多智能合约的一个重要方面是预言机（oracle）的概念。预言机是指为智能合约提供外部信息的可信第三方服务或实体。


    智能合约在区块链生态系统内运行，这意味着它们无法访问外部数据源，例如现实世界的事件或数据源。预言机用于向智能合约提供此类数据，使其能够根据接收到的信息执行预定义操作。


    预言机可以利用各种类型的外部数据运行，例如市场价格、天气数据或体育比分。它们还可以用于验证特定事件的结果，例如供应链中的货物交付，或保险合同中特定条件是否发生。


    预言机可以通过允许智能合约根据外部事件和数据编程执行操作，来增强其功能。这意味着智能合约可以被设计为在需要实时数据的现实场景中运行，例如衍生品市场或体育博彩。借助预言机，智能合约可以自主执行，无需人工干预，从而使其更加高效。


    然而，预言机确实在智能合约生态系统中引入了信任因素。由于它们是第三方服务，存在提供不准确或偏见数据的风险。这可能损害智能合约的完整性。缓解此风险需要仔细选择和审计计划使用的预言机，以确保其可信赖且可靠。


    除了与数据相关的风险外，使用预言机还可能引入额外的安全风险。主要风险之一在于预言机本身可能遭受操纵或破坏。这反过来又会引入更多的数据相关风险，不过这次风险来自于蓄意的恶意行为，而不仅仅是偏见或错误的数据——攻破预言机的攻击者可以使其向智能合约发送虚假信息，从而触发本不应执行的代码。这可能是耗尽智能合约内所持有资产的一个途径。


    此外，使用预言机也可能在智能合约代码本身引入漏洞。如果智能合约未设计为能处理来自预言机的意外或不正确数据，它可能执行错误甚至崩溃。此类事件可能无法恢复，并导致重大损失，无论是财务上的还是其他方面的。


    而且，预言机还可能危及智能合约所用数据的隐私。如果预言机能够访问敏感数据，例如个人信息或财务数据，则存在这些数据泄露或滥用的风险。


    为缓解这些风险，仔细选择和审查智能合约中使用的预言机并实施适当的安全措施（例如数据加密和验证机制）以防范潜在攻击非常重要。同时，智能合约的设计方式也应使其能够处理来自预言机的意外或不正确数据。代码中应包含应急计划，以应对任何安全漏洞或其他意外情况。


    不过，一般而言，由于预言机引入了众多风险，尽可能避免使用它们被认为是安全最佳实践。在开发区块链解决方案时，有时无法避免使用预言机，但通常存在变通方法。计划将
    NFT 作为其运营或服务一部分的商业领袖需要了解这些风险，以便进行充分的成本效益分析。


    此类领导者至少需要对这里描述的智能合约有一定程度的熟悉，以避免承担不必要的风险、误解其能力或做出糟糕的商业决策。由于包括 NFT 在内的区块链代币是智能合约的一种形式，在考虑是否实施此类解决方案时，掌握该技术的基础知识至关重要。


    回顾一下，智能合约是自动执行的合约，协议条款直接写入代码中。它们无需可信第三方来强制执行协议条款，并通过基于预定条件自动执行代码来自动化业务流程。这在自动化至关重要的各种情况下可能特别有利。


    就 NFT 而言，智能合约用于其创建和转移，以及指定所有权和其他相关细节。它们还可以被编程，通过版税协议确保艺术家和创作者因其作品获得公平补偿——每当 NFT
    在合规平台上出售时，版税协议会自动将销售额的一定比例转入艺术家的账户。但这只是该技术众多应用中的一个。


    然而，智能合约并非没有缺点。区块链工程师应严格测试和审计代码，以确保其不易受攻击并融入了最新的最佳实践。实施诸如断路器之类的安全措施会有所帮助，但与任何支持互联网的解决方案一样，没有银弹——保持警惕是必要的。


    智能合约的另一个潜在问题在于它们无法适应原始合同中未考虑到的变化情况或意外事件。幸运的是，智能合约通常是“可升级的”，这仅意味着它们可以被编辑以修复发现的问题，但保留这种能力通常会降低用户社区对项目的信任，因为开发者可能会通过以损害用户但有利于开发者的方式更改智能合约来“拉地毯”（`rug
    pull`）项目。


    为解决此问题，许多项目在将智能合约部署到区块链后“放弃”（`renounce`）它们。这仅意味着创建者不再对合约拥有任何控制权，并且无法进行任何未来的更改。当然，这也意味着之后发现的任何缺陷或错误都无法修复。


    开发者需要在创建智能合约时考虑这些决策。他们可能需要在某些情况下纳入人工监督或争议解决机制，以确保交易公平透明地执行。这可能包括在能够安全实现的情况下使用预言机，或采用其他可信第三方来验证智能合约所用数据的准确性。一种越来越普遍的方法是实施
    DAO（去中心化自治组织），使社区能够对智能合约进行修改或批准修改，但这同样充满担忧。


    总体而言，智能合约在自动化业务流程、提高透明度和安全性以及确保艺术家和创作者获得公平补偿方面具有巨大潜力。然而，它们也带来了风险和限制，必须通过严格测试、标准编码实践以及纳入安全措施来仔细考虑和缓解。随着
    NFT 市场的持续增长，开发者和企业了解智能合约潜在收益和风险的重要性也在增长，将其有效融入运营的需求也同样如此。'
  raw: 'One other important aspect of many smart contracts is the concept of oracles.
    An oracle refers to a trusted third-party service or entity that provides external
    information to the smart contract.


    Smart contracts operate within the blockchain ecosystem, which means that they
    have no access to external data sources, such as real-world events or data feeds.
    Oracles are used to provide that sort of data to the smart contract, allowing
    it to execute predefined actions based on the information received.


    Oracles can operate using various types of external data, such as market prices,
    weather data, or sports scores. They can also be used to verify the outcome of
    specific events, such as the delivery of goods in a supply chain or the occurrence
    of a specific condition in an insurance contract.


    Oracles can augment the functionality of smart contracts by allowing them to be
    programmed to execute actions based on external events and data. This means that
    smart contracts can be designed to operate in real-world situations that require
    real-time data, such as derivatives markets or sports betting. With oracles, smart
    contracts can be executed autonomously without the need for human intervention,
    making them more efficient.


    However, oracles do introduce an element of trust into the smart contract ecosystem.
    As they are third-party services, there is a risk that they may provide inaccurate
    or biased data. This could compromise the integrity of the smart contract. Mitigating
    the risks this can pose can require carefully selecting and auditing the oracles
    intended for use to ensure that they are trustworthy and reliable.


    Beyond the data-related risks, using an oracle can also introduce additional security
    risks. One of the main risks is that the oracle itself may be subject to manipulation
    or corruption. This in turn can introduce more data-related risks, though this
    time the risk comes from deliberate malicious actions rather than merely biased
    or incorrect data – attackers who compromise an oracle can cause it to send false
    information to the smart contract which triggers the execution of code that should
    not have run. This can be a vector to drain a smart contract of assets held within
    it.


    In addition, the use of an oracle can also introduce vulnerabilities in the smart
    contract code itself. If the smart contract is not designed to handle unexpected
    or incorrect data from the oracle, it may execute incorrectly or even crash. Such
    events may be unrecoverable and lead to major losses, financial or otherwise.


    Furthermore, oracles can also potentially compromise the privacy of the data being
    used in the smart contract. If the oracle has access to sensitive data, such as
    personal information or financial data, there is a risk that this data could be
    leaked or misused.


    To mitigate these risks, it is important to carefully select and vet the oracle
    used in a smart contract and to implement appropriate security measures, such
    as data encryption and verification mechanisms, to protect against potential attacks.
    It is also important for the smart contract to be designed in a way that enables
    it to handle unexpected or incorrect data from the oracle. Contingency plans should
    be included within the code to handle any security breaches or other unexpected
    eventualities.


    In general, though, it is considered a security best practice to avoid the use
    of oracles wherever possible due to the myriad risks they introduce. Sometimes
    they cannot be avoided when a blockchain-based solution is being developed, but
    often there are workarounds. Business leaders who seek to use NFTs as a part of
    their operations or service offerings need to know about these risks so they can
    perform an adequate cost–benefit analysis.


    Such leaders must have at least some level of familiarity with smart contracts
    like what has been described here to avoid taking unnecessary risks, mistaking
    their capabilities, or making poor business decisions. Since blockchain tokens,
    including NFTs, are a form of smart contract, the foundations of this technology
    are critical to have when considering whether to implement such solutions.


    Recall that smart contracts are self-executing contracts with the terms of the
    agreement written directly into code. They operate without the need for a trusted
    third party to enforce the terms of the agreement, and they automate business
    processes by executing code automatically based on predetermined conditions. This
    can be particularly advantageous in a variety of circumstances where automation
    is important.


    As it relates to NFTs, smart contracts are used in the creation and transfer thereof,
    as well as to specify ownership and other relevant details. They can also be programmed
    to ensure that artists and creators are fairly compensated for their work via
    royalty protocols, which automatically transfer a percentage of the amount of
    a sale to the artist’s account whenever the NFT is sold on a compliant platform,
    but this is just one of many applications of this technology.


    However, smart contracts are not without their drawbacks. Blockchain engineers
    should rigorously test and audit the code to ensure that it is not subject to
    exploits and incorporates the latest best practices. Implementing safeguards such
    as circuit breakers can help, but as with any Internet-enabled solution, there
    is no silver bullet – vigilance is required.


    Another potential issue with smart contracts is their inability to adapt to changing
    circumstances or unforeseen contingencies that were not accounted for in the original
    contract. Thankfully, smart contracts are generally “upgradable” which simply
    means they can be edited to fix issues uncovered, but retaining this ability generally
    reduces the trust a community of users has in the project as the developers could
    “rug pull” the project by changing the smart contracts in ways that harm the users
    but benefit the developers.


    To address this, many projects “renounce” their smart contracts after deploying
    them to the blockchain. This simply means that the creators no longer have any
    control over the contract and are unable to make any future changes. Of course,
    this also means that any flaws or errors discovered later cannot be fixed.


    Developers need to account for these decisions when creating their smart contracts.
    They may need to incorporate human oversight or dispute resolution mechanisms
    in certain cases to ensure that transactions are executed fairly and transparently.
    This may include using an oracle if it can be done securely, or employing some
    other trusted third party to verify the accuracy of data used in the smart contract.
    One approach that is increasingly common is to implement a DAO, which enables
    the community to make or approve changes to the smart contracts, but this is also
    fraught with concern.


    Overall, smart contracts have significant potential for automating business processes,
    improving transparency and security, and ensuring fair compensation for artists
    and creators. However, they also pose risks and limitations that must be carefully
    considered and mitigated through rigorous testing, standard coding practices,
    and the incorporation of safeguards. As the NFT market continues to grow, the
    importance of developers and businesses alike understanding the potential benefits
    and risks of smart contracts continues to grow, as does the need to incorporate
    them effectively in their operations.'
  trans: '

    # 智能合约与预言机


    许多智能合约的一个重要方面是预言机（oracle）的概念。预言机是指为智能合约提供外部信息的可信第三方服务或实体。


    智能合约在区块链生态系统内运行，这意味着它们无法访问外部数据源，例如现实世界的事件或数据源。预言机用于向智能合约提供此类数据，使其能够根据接收到的信息执行预定义操作。


    预言机可以利用各种类型的外部数据运行，例如市场价格、天气数据或体育比分。它们还可以用于验证特定事件的结果，例如供应链中的货物交付，或保险合同中特定条件是否发生。


    预言机可以通过允许智能合约根据外部事件和数据编程执行操作，来增强其功能。这意味着智能合约可以被设计为在需要实时数据的现实场景中运行，例如衍生品市场或体育博彩。借助预言机，智能合约可以自主执行，无需人工干预，从而使其更加高效。


    然而，预言机确实在智能合约生态系统中引入了信任因素。由于它们是第三方服务，存在提供不准确或偏见数据的风险。这可能损害智能合约的完整性。缓解此风险需要仔细选择和审计计划使用的预言机，以确保其可信赖且可靠。


    除了与数据相关的风险外，使用预言机还可能引入额外的安全风险。主要风险之一在于预言机本身可能遭受操纵或破坏。这反过来又会引入更多的数据相关风险，不过这次风险来自于蓄意的恶意行为，而不仅仅是偏见或错误的数据——攻破预言机的攻击者可以使其向智能合约发送虚假信息，从而触发本不应执行的代码。这可能是耗尽智能合约内所持有资产的一个途径。


    此外，使用预言机也可能在智能合约代码本身引入漏洞。如果智能合约未设计为能处理来自预言机的意外或不正确数据，它可能执行错误甚至崩溃。此类事件可能无法恢复，并导致重大损失，无论是财务上的还是其他方面的。


    而且，预言机还可能危及智能合约所用数据的隐私。如果预言机能够访问敏感数据，例如个人信息或财务数据，则存在这些数据泄露或滥用的风险。


    为缓解这些风险，仔细选择和审查智能合约中使用的预言机并实施适当的安全措施（例如数据加密和验证机制）以防范潜在攻击非常重要。同时，智能合约的设计方式也应使其能够处理来自预言机的意外或不正确数据。代码中应包含应急计划，以应对任何安全漏洞或其他意外情况。


    不过，一般而言，由于预言机引入了众多风险，尽可能避免使用它们被认为是安全最佳实践。在开发区块链解决方案时，有时无法避免使用预言机，但通常存在变通方法。计划将
    NFT 作为其运营或服务一部分的商业领袖需要了解这些风险，以便进行充分的成本效益分析。


    此类领导者至少需要对这里描述的智能合约有一定程度的熟悉，以避免承担不必要的风险、误解其能力或做出糟糕的商业决策。由于包括 NFT 在内的区块链代币是智能合约的一种形式，在考虑是否实施此类解决方案时，掌握该技术的基础知识至关重要。


    回顾一下，智能合约是自动执行的合约，协议条款直接写入代码中。它们无需可信第三方来强制执行协议条款，并通过基于预定条件自动执行代码来自动化业务流程。这在自动化至关重要的各种情况下可能特别有利。


    就 NFT 而言，智能合约用于其创建和转移，以及指定所有权和其他相关细节。它们还可以被编程，通过版税协议确保艺术家和创作者因其作品获得公平补偿——每当 NFT
    在合规平台上出售时，版税协议会自动将销售额的一定比例转入艺术家的账户。但这只是该技术众多应用中的一个。


    然而，智能合约并非没有缺点。区块链工程师应严格测试和审计代码，以确保其不易受攻击并融入了最新的最佳实践。实施诸如断路器之类的安全措施会有所帮助，但与任何支持互联网的解决方案一样，没有银弹——保持警惕是必要的。


    智能合约的另一个潜在问题在于它们无法适应原始合同中未考虑到的变化情况或意外事件。幸运的是，智能合约通常是“可升级的”，这仅意味着它们可以被编辑以修复发现的问题，但保留这种能力通常会降低用户社区对项目的信任，因为开发者可能会通过以损害用户但有利于开发者的方式更改智能合约来“拉地毯”（`rug
    pull`）项目。


    为解决此问题，许多项目在将智能合约部署到区块链后“放弃”（`renounce`）它们。这仅意味着创建者不再对合约拥有任何控制权，并且无法进行任何未来的更改。当然，这也意味着之后发现的任何缺陷或错误都无法修复。


    开发者需要在创建智能合约时考虑这些决策。他们可能需要在某些情况下纳入人工监督或争议解决机制，以确保交易公平透明地执行。这可能包括在能够安全实现的情况下使用预言机，或采用其他可信第三方来验证智能合约所用数据的准确性。一种越来越普遍的方法是实施
    DAO（去中心化自治组织），使社区能够对智能合约进行修改或批准修改，但这同样充满担忧。


    总体而言，智能合约在自动化业务流程、提高透明度和安全性以及确保艺术家和创作者获得公平补偿方面具有巨大潜力。然而，它们也带来了风险和限制，必须通过严格测试、标准编码实践以及纳入安全措施来仔细考虑和缓解。随着
    NFT 市场的持续增长，开发者和企业了解智能合约潜在收益和风险的重要性也在增长，将其有效融入运营的需求也同样如此。

    '
- fmt: '## Summary


    There are many different blockchains out there, and each blockchain is structured
    differently so as to be optimized for specific purposes. Understanding the benefits
    and drawbacks of each consensus mechanism, approach to decentralization, level
    of permissiveness, and more is crucial for business leaders trying to identify
    an appropriate chain for their use case.


    While possessing a deep knowledge of details like the differences between a `Layer
    1` and a `Layer 2` or higher blockchain, the specifics of how each individual
    consensus mechanism works, and how each ledger approaches encryption are not critical
    to making a decision on where to go, it is all helpful information to have. A
    more comprehensive understanding of these attributes can help optimize a decision
    when multiple blockchains meet the basic requirements.


    One thing that decision makers **must** understand is how a chain handles smart
    contracts. Smart contracts are the core of any blockchain’s ability to address
    a business need – tokens are smart contracts, NFTs are smart contracts, logical
    processes are smart contracts, and everything that runs on a blockchain uses smart
    contracts. Almost everything built on a blockchain is built using smart contracts.


    Making sure the smart contract logic is understandable by your developers and
    that they grasp the coding language is a core need when selecting a chain. A developer
    who only knows Ethereum’s Solidity will be at home on chains like Polygon or BNB
    Chain but have major difficulties coding on Flow or Polkadot which use other languages.


    Different languages are optimized for different purposes, too. Selecting the wrong
    blockchain may impair your ability to deliver a product or service. This and other
    things such as the transaction fees and built-in privacy functions are among the
    key considerations when considering where to deploy any blockchain-driven project
    such as those using NFTs.


    Another critical point is understanding the ecosystem which currently exists on
    the chain being considered, including which wallets support the chain and what
    marketplaces or other gateways already exist on it. The next chapter goes into
    greater detail on this subject.


    # 3. Creating and Selling NFTs


    Now that we have covered the specifics of how blockchain technology works, and
    specifically how it powers NFTs, the next most important topic is the creation
    and sale or distribution of those NFTs. For NFTs to serve any purpose, they must
    be created and put out into the world so people can make use of them.


    While there are many factors to be considered throughout this process, one of
    the most important ones is the characteristics of the NFTs one intends to create.
    It’s also important to consider how the eventual holders of those NFTs will actually
    hold them, which means thinking about wallets, and how to get those NFTs into
    their hands, which is usually by selling them.


    ## Characteristics


    When creating an NFT, the first step is to determine the aspects that will make
    your NFT unique and valuable. This could be anything from a piece of artwork or
    a collectible card to a tweet or a virtual real estate property. The key is to
    ensure that the NFT has qualities that set it apart from other digital assets,
    and that these qualities are reflected in its design and metadata.


    The aspects or variables of an NFT can vary greatly depending on the type of digital
    asset being represented.


    ### Variables


    In general, the variables of an NFT can be categorized into two main types: intrinsic
    and extrinsic.


    #### Intrinsic Variables


    These variables refer to the inherent qualities of the NFT itself. For example,
    in the case of a piece of artwork, intrinsic variables might include the artist’s
    signature, the date it was created, the medium used, the dimensions, and any special
    techniques or materials used. For a virtual real estate property, intrinsic variables
    might include the location of the property, the size of the property, and any
    special features or amenities.


    An example of NFTs which derive their value from intrinsic variables is the popular
    CryptoPunks NFT collection; each NFT has a unique 8-bit pixelated design that
    makes it easily identifiable and collectible. Another example is the Bored Ape
    Yacht Club NFT collection, where each NFT features a different illustration of
    a cartoon ape, with unique accessories and background elements.


    #### Extrinsic Variables


    On the other hand, these variables refer to external factors that contribute to
    the value or uniqueness of the NFT. For example, if the artwork was created by
    a well-known artist, this could increase its value. Similarly, if the virtual
    real estate property is located in a popular virtual world, this could increase
    its value and desirability.


    For instance, in the NBA Top Shot NFT collection, each NFT represents a specific
    basketball moment, such as a dunk or a three-point shot, and has a limited-edition
    number that indicates its rarity. In the case of the Beeple Everydays collection,
    the extrinsic value comes from the fact that it was the first NFT collection to
    be sold at a major auction house, Christie’s, and that it was sold for a record-breaking
    sum of $69 million.


    Some NFT collections attempt to increase their value over time by adding extrinsic
    value. Bored Ape Yacht Club is one example of this – Bored Apes creator Yuga Labs
    continues to develop new ways in which owners of Bored Apes can use them, such
    as avatars in their Otherside metaverse and access passes to special events.'
