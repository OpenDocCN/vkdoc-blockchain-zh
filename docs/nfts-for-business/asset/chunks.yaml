    was sold as an NFT. The sale of “Everydays: The First 5000 Days” was a landmark
    event in the history of digital art as it was the first NFT artwork to sell at
    a major auction house. Sold for over $65 million, it set the record for the most
    money spent on digital art. This sale has had a major impact on the art world
    as it has given digital art, and NFTs in particular, the legitimacy that it lacked.


    Other high-profile NFT sales have since followed, including the sale of Grimes’
    “WarNymph” for over $6 million and the sale of “Crossroads 2” by artist Pak for
    over $16 million. These auctions have had a major impact on the art world and
    are sure to shape the future of digital art for years to come.


    ## The Adoption of NFTs by Established Artists and Brands


    The legitimization of NFTs in the digital art brought on by Beeple’s and other
    successes has paved the way for established artists and brands to monetize their
    artwork and merchandise.


    Established brands and companies have released limited-edition and exclusive products
    as NFTs. For example, the NBA recently released a series of NFT trading cards,
    called The Association, where the collectible’s design changes over time. The
    appearance of the NFTs evolves based on players’ on-court performance. The more
    accomplished a player is throughout the season, the more their NFT will visually
    change. Besides this NFT initiative, the NBA has heavily contributed to putting
    sports NFTs on the map through Dapper Labs’ NBA Top Shot. In 2022, the platform
    was largely responsible for the NFT sports-craze driving sales that reached almost
    $1 billion.


    In addition to monetization, established artists and brands have also adopted
    NFTs to increase engagement with their fans, customers, and followers. For example,
    music artist Steve Aoki recently released an NFT collection that includes limited-edition
    digital art pieces and merchandise. Other artists and brands have leveraged NFTs
    for marketing campaigns, offering rewards to fans who purchase their NFTs.


    ## The Benefits of NFTs for Artists and Collectors


    Overall, the use of NFTs by established artists and brands is proving to be beneficial.
    NFTs offer a way for artists to monetize and certify their artwork, and for brands
    to create exclusive products and incentive-based marketing campaigns. The use
    of NFTs by these established entities is making digital art and collectibles more
    widely accepted.'
  trans: '

    # NFT 在艺术界的崛起


    几个世纪以来，实体艺术的创作者和收藏者会在博物馆甚至自己的客厅等实体空间展示艺术品。这些艺术品的所有权和真实性也易于证明，因为收藏家可以通过独立专家和艺术家本人来认证其真伪。实体艺术与数字艺术的关键区别在于，后者以数字形式存在，表现为虚拟形态。数字艺术可以包括插图、照片、GIF
    动图、3D 模型等。然而，数字艺术很容易被复制和展示。例如，若我们在网页上看到喜欢的图片，只需截屏，或是在多数情况下直接将图像以 PDF 或 JPEG 格式保存到自己的电脑上，便可随时随地展示。


    `NFT`被用于数字艺术领域，因为它能认证艺术品的真实性，并提供永久的所有权记录。通过将艺术品代币化并记录在区块链上，艺术品的买家可以确信自己拥有的是原作。


    此外，`NFT`可以为数字艺术创造稀缺性，使其成为有价值的资产。这正是数字艺术成为`NFT`最早的应用场景之一的原因，也开启了区块链在艺术界复兴的序幕。换句话说，`NFT`作为一种特定资产的数字所有权证书，与流通中的其他任何`NFT`都截然不同。正是凭借这一特性，`NFT`被用于认证数字艺术的所有权。


    这项技术还促进了`NFT`的买卖，并将所有权信息存储在区块链上，使得数字资产能够在区块链上进行交换、追踪和管理。


    ## 早期 NFT 艺术项目及其对艺术界的影响


    `NFT`的应用给艺术界带来了显著变化，为创意表达、所有权和交易提供了新的可能性。艺术界最早的一些`NFT`应用是诸如`CryptoPunks`和`CryptoKitties`等项目，为众多艺术家和收藏家探索这一新疆域铺平了道路。


    `CryptoPunks`由 Larva Labs 的软件开发者马特·霍尔和约翰·沃特金森创作，于 2017 年 6 月首次亮相，是最早的`NFT`艺术项目之一。该项目包含
    10,000 个独特的 24x24 像素艺术角色，每个 Punk 都拥有独特的属性组合，例如不同的发型、面部表情和配饰。最初，任何拥有以太坊钱包的人都可以免费获取这些数字角色。但随着需求增长，这些
    Punk 的价值迅速攀升，其中一些的售价高达数十万甚至数百万美元。


    `CryptoPunks`的成功昭示了`NFT`作为数字艺术和收藏品媒介的潜力。该项目证明了独特的数字物品可以拥有价值，并能在以太坊等区块链平台上交易。此外，它也凸显了数字艺术世界中可证明的稀缺性和所有权的重要性——由于区块链技术不可篡改的特性，每个
    Punk 都无法被复制或伪造，因为每个 Punk 基于其铸造时间的不同而具有不同的价值。


    2017 年 11 月，一个名为`CryptoKitties`的新型数字艺术应用向艺术界展示了游戏与艺术如何融合。`CryptoKitties`由 Axiom
    Zen（现 Dapper Labs）开发，是一款同样基于以太坊网络的虚拟繁殖游戏。用户可以收集、繁殖和交易数字猫咪，每只猫咪都有独特的遗传特征，并可遗传给后代。该项目广受欢迎。在巅峰时期，该游戏甚至占据了以太坊网络交易量的很大一部分，甚至导致网络速度变慢。（这些问题暴露了当时区块链平台潜在的可扩展性问题。）


    随着`CryptoPunks`和`CryptoKitties`的成功在艺术界引起反响，艺术家们开始尝试数字艺术形式，探索这种新媒介所提供的可能性。与此同时，社交媒体和在线平台逐渐成为熙熙攘攘的市场，艺术家们可以在那里展示作品，收藏家们则可以寻觅新奇有趣的艺术品。过去，一件艺术品常常需要数年甚至数百年才能获得大众的关注。而借助这些新的社交网络和数字集市，艺术家可以在几天甚至几小时内就使其创作迅速吸引眼球。正是在这些数字集市中，艺术家们开始看到了`NFT`的真正潜力。


    其中一位艺术家是迈克·温克尔曼，也被称为“Beeple”。《每一天：前 5000 天》是 Beeple 在 13 年间创作的 5,000 幅图像合集，随后被汇编成一个单一的整体作品。这件艺术品以`NFT`的形式售出。《每一天：前
    5000 天》的拍卖是数字艺术史上的里程碑事件，因为它是在主要拍卖行售出的第一件`NFT`艺术品。它以超过 6500 万美元的价格成交，创下了数字艺术品的最高成交价纪录。此次拍卖对艺术界产生了重大影响，赋予了数字艺术——尤其是`NFT`——此前所缺失的合法性。


    此后，其他备受瞩目的`NFT`销售接踵而至，包括 Grimes 的《WarNymph》售价超过 600 万美元，以及艺术家 Pak 的作品《Crossroads
    2》售价超过 1600 万美元。这些拍卖对艺术界产生了重大影响，并必将塑造未来多年数字艺术的发展方向。


    ## 知名艺术家和品牌对 NFT 的采用


    Beeple 等人的成功所带来的`NFT`在数字艺术领域的合法化，为知名艺术家和品牌通过其艺术品和商品进行变现铺平了道路。


    知名品牌和公司已推出限量版和独家产品作为`NFT`。例如，NBA 近期发布了一系列名为`The Association`的`NFT`交易卡，其收藏品的设计会随时间变化。这些`NFT`的外观会根据球员在赛场上的表现而演变。球员在整个赛季中取得的成就越高，其`NFT`的视觉效果变化就越大。除了这个`NFT`项目，NBA
    还通过 Dapper Labs 的`NBA Top Shot`极大地推动了体育`NFT`的发展。2022 年，该平台在很大程度上推动了`NFT`体育热潮，带动了近
    10 亿美元的销售额。


    除了变现，知名艺术家和品牌也采用`NFT`来增加与粉丝、顾客和关注者的互动。例如，音乐艺术家史蒂夫·青木近期发布了一个`NFT`系列，其中包括限量版数字艺术品和商品。其他艺术家和品牌则利用`NFT`开展营销活动，为购买其`NFT`的粉丝提供奖励。


    ## NFT 对艺术家和收藏家的好处


    总体而言，知名艺术家和品牌使用`NFT`正被证明是有益的。`NFT`为艺术家提供了一种变现和认证其艺术品的方式，也为品牌创造了专属产品和基于激励的营销活动。这些知名实体对`NFT`的使用，正在使数字艺术和收藏品得到更广泛的接受。

