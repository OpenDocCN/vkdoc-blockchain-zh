    more plainly, our ways of being in each world as we inhabit our multiple identities
    – our personal habitats – sometimes more than one habitat at a time.


    The innovation here, if we can call it one, as we attempt to identify value opportunities
    that the ontology attached to the world NFTs introduces in “*a* real world” (for
    there are *many* real worlds) is to flesh out to whatever extent we can a given
    “real-world” ontology and mash it up with the NFT ontology and then see what we
    can obtain. More specifically, the project at hand is to identify those problems
    that exist in the ontology of a chosen “real world” that can be solved with the
    introduction of an NFT ontology (for there, also, thanks to smart contracts, there
    exists a multiplicity of them), now that the objects of the two ontologies coexist
    in a mashed-up ontology, with proviso, obviously, that this newly mashed-up ontology
    is taken seriously by those humans that live in and through it. Beyond identifying
    problems to solve, the hope is that we will also be able to identify *opportunities*
    for delivering value that is enabled by the new mashed-up ontology, given for,
    as almost always, a mash-up is always greater than the sum of the parts that were
    mashed up together.


    ## Applications and Use Cases


    The best way to explain what we mean by all of this is to go through the four
    “real worlds” that we have chosen – events, food and drink, fashion, and supply
    chain management – one by one, and apply our methodology against each one.


    ### Events


    This is the world of, among other things, tickets, ticket issuers, performers,
    event organizers, event suppliers, advertisers, festivals, passes, authorized
    ticket sellers, scalpers, fans of the performers, members of the media, venues,
    and event-goers.


    In this world, (1) fans buy tickets from authorized ticket sellers, or, if they
    can’t find tickets from such authorized sellers, they buy them from scalpers,
    who sell them at a higher price than the ticket was initially selling for; (2)
    fans attend events, miss them because something came up at the last minute, and
    attend them but are not happy with them; (3) performers of an event perform and
    receive compensation for their work, with which they may or may not be happy,
    and engage with fans, who may respond to their performance in fulfilling ways
    or dispiriting ways; (4) organizers of these events set up the events, find advertisers,
    engage with suppliers, provide security to these events, engage the media, with
    the authorities, if such engagements are necessary, etc.


    With this quick run-through of our rather simplified ontology of the world of
    events, we can already identify several of the chronic problems that the world
    of events is plagued with. Here is a small list of them:


    1.  Fake tickets


    2.  Ticket scalping and opportunistic middlemen


    3.  Lost tickets


    4.  Canceled events


    5.  Unhappy fans that go unidentified, with little chance to make up for their
    disappointment


    6.  Very happy fans that go unidentified, with little chance of leveraging their
    happiness


    NFTs can potentially help solve many of these problems in the following ways:


    1.  Every ticket is an NFT, and hence, the ticket’s provenance is public and immutable.
    And so, in one fell swoop, fake tickets disappear from the landscape.


    2.  Every ticket is an NFT, and hence, in the NFT’s smart contract, a clause can
    be introduced that would prohibit the owner of the NFT from selling it. And in
    one fell swoop, the scalper disappears from the landscape.


    3.  If the ticket you are holding in your digital wallet is an NFT, then, as long
    as you don’t lose your digital wallet, your ticket is safe and you will never
    need to look for it.


    4.  An event is canceled and anyone who bought a ticket for the canceled event
    can either choose to accept a refund or register for an event in the future. With
    NFTs, the effort of making this possible is not more than a few lines of programming
    or the triggering for some rules in some software stack. For both the organizers
    and the ticket holders, all of this happens by magic, with no more than clicking
    a button or two on an interface from them.


    5.  You are an artist and you owe your livelihood to the fans. Without them, you
    can’t put food on the table, let alone practice your art, your craft, or deliver
    your wisdom. Ensuring that you are aware of what your fans feel about you, and
    that you engage with those who were not happy to regain their enthusiastic support,
    is something that you would probably wish you could do. Without NFTs that can
    easily track who attended which event, and that can easily enable the attendees
    to share their experiences, making it up to disappointed fans is almost impossible.
    With NFTs, this all becomes, again, a matter of an app or a web interface.


    6.  The same holds with fans who are very happy with the event: such fans would
    be ripe for buying merchandise, for spreading the word, for promoting the performer’s
    brand, the venue, and the organizers, and for buying tickets for future events.
    Again, all of this is nearly impossible to do without NFTs, but more than possible,
    in fact, easy to do with NFTs.


    *An Example of a Current Implementation*'
  trans: '

    # 数字人工制品的认知与机遇


    我们意识到，所有被称为坚实真实的东西（如`金钱`、`财产`、`声誉`、`身份`、`财富`等）并不属于一个与"不太真实"的数字世界（我们在此遇到诸如`区块链`、`账本`、`DAO`、`DeFi`、`加密货币`、`dApp`、`燃料费`、`铸造`、`NFT`等奇异事物）在本质上截然不同或更加坚固的领域。正是这种认知——我们正在处理一个由参与者对其共享世界所授予的集体认同构成的现实生态系统——使我们能够向一个充满机遇的全新世界敞开大门。如果我们坚持将数字世界（所谓的
    Web3）的人工制品与工具神秘化，并将其隔离到一个由怪异人群从事怪异活动的、分离且不平等的奇异世界，那么这个机遇世界将始终遥不可及。换言之，我们面前的机遇在于将这些工具引入我们笼统称为"现实世界"（即房屋、食物、文凭和现金的世界），对它们进行探索，并发现如何利用它们解决实际问题。在此过程中，我们不仅能够解决现有的"现实"问题，还能创造出我们之前甚至无法想象的真正的价值。


    本章旨在实现双重目标：首先，提出一套方法论，用于识别这种名为`NFT`的新奇事物如何在现实世界中解决实际问题；其次，运用这套方法论来解释并揭示`NFT`在五个"现实生活"领域——活动票务、食品饮料、时尚、金融贷款和供应链管理——中已经实现和能够实现的价值。


    ## 方法论


    让我们重申基本的核心洞见：我们栖居的每一个世界——无论我们将其称为"现实"、"虚拟"、"增强"、"混合"或其他什么——其支撑基础，从栖居这些世界的目的来看，无非就是这些世界各自的本体论。而我们这些栖居并穿行于这些世界的人，已经逐渐接受、使用并认真对待这些本体论。额外的推论洞见是：这些本体论仅仅依靠我们的认同与接受来维系；一旦我们决定不再认真对待它们各自的本体论，这些世界就会随之消失。正是*在这些本体论之中*，我们创造了多重现象学*内在性*，或者更通俗地说，我们在栖居多重身份——我们的个人栖息地——时，在每个世界中的存在方式，有时甚至同时栖居多于一个栖息地。


    如果说这里存在什么创新，那就是当我们试图识别`NFT`世界所附带的数字本体论在"*一个*现实世界"（因为存在*多个*现实世界）中引入的价值机遇时，我们需要尽可能详尽地描绘某个给定的"现实世界"本体论，将其与`NFT`本体论融合，然后观察我们能得到什么。更具体地说，眼前的任务是识别所选"现实世界"本体论中存在哪些问题，可以通过引入`NFT`本体论来解决（因为由于智能合约的存在，`NFT`本体论也存在多种变体），前提是两个本体论的对象在融合后的本体论中共存，并且这种新的融合本体论显然被生活在其中并透过它生活的人类认真对待。除了识别待解决的问题，我们还希望能够在融合本体论所催生的价值交付中识别出*机遇*，因为通常情况下，融合的整体总是大于各个部分之和。


    ## 应用与用例


    解释我们所有这些论述的最佳方式，就是逐一审视我们选择的四个"现实世界"——活动、食品饮料、时尚和供应链管理——并针对每个领域运用我们的方法论。


    ### 活动领域


    这个领域涉及票据、票据发行方、表演者、活动组织者、活动供应商、广告商、节日活动、通行证、授权票务代理、黄牛、表演者粉丝、媒体成员、场地以及活动参与者。


    在这个世界中，（1）粉丝从授权票务代理处购票，若无法从授权渠道购得，则从黄牛处加价购买；（2）粉丝参加活动，或因临时有事错过活动，或参加了活动却不满意；（3）表演者登台演出并获得报酬，他们可能满意也可能不满意，并与粉丝互动，而粉丝的回应可能令人满足也可能令人沮丧；（4）活动组织者策划活动、寻找广告商、与供应商接洽、提供安全保障、与媒体沟通，必要时与当局协调等。


    通过对这个简化的活动世界本体论的快速梳理，我们已能识别出困扰该领域的若干顽疾。以下列举其中一部分：


    1. 假票

    2. 黄牛倒票与投机中介

    3. 丢票

    4. 活动取消

    5. 不满意的粉丝无人识别，几乎无法弥补他们的失望

    6. 非常满意的粉丝无人识别，几乎无法利用他们的热情


    `NFT`有望通过以下方式帮助解决这些问题：


    1. 每张票据都是一个`NFT`，因此票据的来源公开且不可篡改。如此一来，假票便当场消失。

    2. 每张票据都是一个`NFT`，因此在`NFT`的智能合约中可以加入禁止持有人转售的条款。如此一来，黄牛便当场消失。

    3. 如果你数字钱包中的票据是`NFT`，那么只要你不丢失数字钱包，票据就安全无忧，无需再四处寻找。

    4. 活动取消时，已购票者可选择接受退款或登记参加未来活动。有了`NFT`，实现这一切只需几行编程代码或在某个软件栈中触发某些规则。对于组织者和持票人而言，这一切神奇地发生，只需他们在界面上点击一两个按钮。

    5. 作为艺术家，你的生计依赖于粉丝。没有他们，你连饭都吃不上，更不用说从事艺术、技艺或传递智慧。你很可能希望能了解粉丝对你的感受，能与不满意的人互动以重新赢得他们的热情支持。如果没有能够轻松追踪谁参加了哪场活动、并能方便参与者分享体验的`NFT`，安抚失望的粉丝几乎不可能。有了`NFT`，这一切再次变成仅需一个应用或网页界面的事情。

    6. 对于对活动非常满意的粉丝也同样适用：这些粉丝是购买商品、口碑传播、推广表演者品牌、场地和组织者以及购买未来活动门票的理想对象。同样，没有`NFT`几乎无法做到这些，但有了`NFT`，不仅可能，而且轻而易举。


    *当前实施案例*

    '
- fmt: '截至撰写本文时，NFT领域中最有前景的公司，确实是那些承诺通过解决实际问题来产生现实影响的公司，这些公司将区块链和智能合约作为其技术基础设施的一部分，赋能活动举办、电子票务及其他周边服务。此类公司的例子包括`EventsFrame`、`GUTS`、`UTIX`、`Blocktix`、`Plentix`和`TicketMint`，这里仅列举其中一小部分。


    ### 餐饮


    这是一个涉及预订、餐桌、侍者、精致餐点、三明治、甜点、咖啡、葡萄酒、酒瓶、常客、餐厅、厨师、食谱、食材和鸡尾酒的世界。


    在这个世界里：（1）餐厅预订会被创建和取消；（2）餐厅的餐食被享用，顾客对餐食满意或不满意；（3）顾客在餐厅里待上几个小时，他们对侍者提供的服务、餐厅环境（太热、太冷或装修简陋）、或餐桌的位置感到满意或不满意；（4）在餐厅场景之外，人们购买瓶装葡萄酒，其中一些是目标明确的买家，他们寻找高品质的葡萄酒并愿意为此支付高价；（5）在餐厅场景之外，人们在家烹饪，许多人总是热衷于从他们关注的厨师（也许就是他们最喜爱餐厅的厨师）那里寻找绝妙的食谱。


    在对我们相当简化的餐饮本体论进行快速梳理之后，再次列举一些在餐饮世界中遇到的典型问题。以下是其中几个问题：


    1.  临时取消或未到场（对餐厅来说是个大问题）

    2.  糟糕的食物（对顾客而言）

    3.  糟糕的服务（对顾客而言）

    4.  假酒

    5.  未被识别的不满意顾客，几乎没有机会弥补他们的失望

    6.  未被识别的非常满意的顾客，几乎没有机会利用他们的满意度来扩大影响


    NFT可以通过以下方式帮助解决其中许多问题，甚至开辟新的机遇：


    1.  如果每一次预订都是一个`NFT`，那么在该`NFT`的智能合约中可以引入一个条款，对任何取消或未到场行为收取费用。此外，如果一个有长期取消记录的人试图进行预订，智能合约可以被编写为拒绝此人的预订。


    2.  在顾客对服务或餐食不满意的情况下，如果餐厅本身就是一个`NFT`，可以编写软件，只允许那些实际进行了预订（预订本身就是账本上的`NFT`）并在餐厅用餐（他们已办理入店手续）的顾客，对用餐体验进行评价。这将使餐厅获得近乎绝对真实的评分（这困扰着像`Yelp!`这样的服务，因为虚假的正面和负面评价都会造成扭曲的评估结果）。


    3.  类似地，对于满意的顾客，这里的机会是利用这些满意的客户进行口碑传播，让他们加入忠诚度计划，提供折扣，并邀请他们参加独家活动（例如，感恩节、新年前夜、情人节）。


    4.  想象一下，每一瓶实体葡萄酒都与一个`NFT`配对，该`NFT`的元数据包含有关这瓶葡萄酒的重要详细信息，例如其年份、葡萄园、产区以及任何其他显著特征，然后在瓶子上附加一个物理标识符（例如，唯一的二维码）。通过这种方式，为了验证酒瓶的真伪，用户可以扫描或验证物理标识符，这将提供对`NFT`元数据的访问权限，然后可以将元数据与酒瓶进行比较，从而确定或否定其真实性。将其与目前需要做的事情进行比较：目前只能相信卖家，或者聘请昂贵的品酒专家，他们会检查多个细节，例如标签的印刷类型、纸张的年代、墨水和字体、印刷方法、做旧技术——换句话说，由于需要积累深厚的知识，聘请这样的人可能非常昂贵。


    *当前实施的一个示例*


    `Bored Breakfast Club`是一家Web3 NFT咖啡订阅公司，提供一系列存在于以太坊区块链上的NFT早餐场景。每个`NFT`都是一个独特的数字收藏品，并作为会员令牌，解锁新鲜烘焙咖啡的免费配送服务。该`NFT`还为买家提供了访问在线社区、参加现场活动、浏览数字内容库以及购买补充包装咖啡时享受折扣的权限。'
  raw: 'As of this time of writing, the most promising companies in the NFT space
    are indeed those that promise to have a real-life impact by solving real problems,
    companies that enable event hosting and e-ticketing, among other adjacent services,
    with the blockchain and smart contract as part of their tech infrastructure. Examples
    of such companies are EventsFrame, GUTS, UTIX, Blocktix, Plentix, and TicketMint
    to single out just a small subset of such companies.


    ### Food and Drink


    This is the world of, among other things, reservations, tables, hosts, fancy meals,
    sandwiches, deserts, coffee, wine, wine bottles, patrons, restaurants, chefs,
    recipes, ingredients, and cocktails,


    In this world, (1) restaurant reservations are made and canceled; (2) restaurant
    meals are eaten, and patrons are happy or unhappy with the meal; (3) patrons are
    in the restaurant for the couple of hours or so, and they are either happy or
    unhappy with the service provided by the host, or the condition of the restaurant
    (too hot or too cold or shabbily decorated), or the location of their table; (4)
    outside of the restaurant setting, people buy bottles of wine, and some of them
    are very intentional buyers and seek out high-quality wine for which they are
    willing to pay a high price; (5) outside of the restaurant setting, people cook
    at home, and many are always on the hunt for killer recipes from chefs that they
    follow (perhaps the chef at their favorite restaurant).


    Again, after this quick run-through of our rather simplified ontology of the world
    of food and drink, here are several of the chronic problems that one encounters
    in the world of food and drink. Here is a small list of them:


    1.  Last-minute cancellations or no-shows (a big problem for the restaurant)


    2.  Bad food (for the patron)


    3.  Bad service (for the patron)


    4.  Inauthentic wine


    5.  Unhappy patrons that go unidentified, with little chance to make up for their
    disappointment


    6.  Very happy patrons that go unidentified, with little chance of leveraging
    their happiness


    NFTs can help solve many of these problems, and even open new opportunities, in
    the following ways:


    1.  If every reservation is an NFT, in the NFT’s smart contract, a clause can
    be introduced that would charge a fee for any cancellations or no-shows. Additionally,
    if someone with a long track record of canceling tried to make a reservation,
    the smart contract can be written in such a way that such a person’s reservation
    is rejected.


    2.  In cases where the patron is not happy with the service or the food, if the
    establishment is itself an NFT, software can be written to enable only those who
    actually made reservations (the reservations themselves NFTs on the ledgers) and
    ate at the restaurant (they were checked in to the establishment), to put in a
    review on their experience. This would enable an almost hermetically honest rating
    of the restaurant (something that plagues services such as Yelp!, where fake reviews
    in both directions create distorted evaluations).


    3.  Similarly for those who were happy, here, the opportunity is to leverage such
    happy customers for spreading the word, enrolling them into loyalty programs,
    offering them discounts, and including them in exclusive events (e.g., Thanksgiving,
    New Year’s Eve, Valentine’s Day).


    4.  Imagine every physical bottle of wine is paired with an NFT that contains
    with its metadata important details about the bottle of wine, such as its vintage,
    vineyard, region, and any other distinguishing characteristics, then attach a
    physical identifier to the bottle itself (for instance, unique QR code). In this
    way, to authenticate the bottle, a user can scan or verify the physical identifier,
    which will provide access to the NFT’s metadata, which could then be compared
    to the bottle, and its authenticity either established or rejected. Compare this
    to what one need to do today: which simply to trust the seller, or to hire an
    expensive connoisseurs who will look at several details, such as the print type
    of the labels, the age of the paper, ink and font, print methods, aging techniques
    – in other words, someone who is probably very expensive to hire given the deep
    knowledge that they have had to accumulate.


    *An Example of a Current Implementation*


    Bored Breakfast Club is a Web3 NFT coffee subscription company that offers a collection
    of NFT breakfast scenes living on the Ethereum blockchain. Each NFT is a unique,
    digital collectible and serves as a membership token unlocking free shipments
    of freshly roasted coffee. The NFT also provides the buyer with access to an online
    community, live events, digital content library, and discounts on supplemental
    bags of coffee.'
