  trans: '

    # 真实性


    真实性是一个在艺术、文学和哲学等多个领域被广泛讨论的概念。其核心是指一种品质，即真实的、原汁原味的，或忠于自我及原始来源。在数字世界中，由于数字内容的创建、复制和分享变得十分容易，真实性问题便应运而生。这导致了虚假或伪造数字内容的泛滥，使得区分真伪变得困难。近年来，非同质化代币（NFT）的出现彻底改变了数字世界中真实性的感知和管理方式。


    `NFT` 是用来代表对独特或稀有资产或内容所有权的数字代币。`NFT` 旨在通过提供一种独一无二且不可篡改的所有权记录来解决数字世界中的真实性问题，这种记录无法被复制或仿造。


    以下五个例子说明了 NFT 如何解决数字世界中的真实性问题：


    -   **数字艺术**：过去，数字艺术家很难证明其作品的所有权，也难以因创作获得合理报酬。借助 NFT，数字艺术家可以为每件作品创建独特的代币，提供一个安全且不可复制的所有权记录。

    -   **音乐**：NFT 也被用于音乐行业，为稀有或独家音乐曲目提供安全的所有权记录。NFT 可以用来代表原始录音的所有权，为艺术家提供了将其作品变现并控制其发行的机会。

    -   **游戏**：在游戏行业，NFT 被用来代表游戏内物品和虚拟资产的所有权。玩家可以买卖稀有或专属物品的 NFT，这提供了真实所有权的安全记录，并为数字收藏品创造了新市场。

    -   **体育**：NFT 也被用于体育行业，代表稀有或独家纪念品（如比赛穿过的球衣或签名物品）的所有权。NFT 提供了安全且可验证的所有权记录，使粉丝能够在透明且安全的市场上买卖独特的体育纪念品。

    -   **房地产**：NFT 也被用于房地产行业，代表独特或专属房产的所有权。NFT 可以提供安全且不可篡改的所有权记录，使买卖双方更容易转移高价值房产的所有权。


    # 来源出处


    来源出处指的是特定物品或物件（包括其起源、保管链条以及随时间发生的任何变化）的所有权与保管历史。例如，在艺术界，来源出处用于确立一件艺术品的真实性、所有权和历史，这对于确定其价值至关重要。在数字世界中，来源出处指的是数字资产（如文档、图像或视频）的所有权及更改历史。它对于确定数字资产的真实性、完整性和所有权至关重要，随着数字资产变得更有价值和无处不在，这一点也愈发重要。


    数字世界中的来源出处问题之所以产生，是因为数字资产易于复制和篡改，并且难以确定数字资产的原创性和所有权。这使得人们很容易创建和分发伪造或篡改的数字资产，这些资产可能被用于欺诈目的，例如身份盗用、知识产权盗窃和金融诈骗。此外，追踪数字资产的所有权和历史也很困难，这可能导致所有权和控制权的纠纷。


    NFT 已成为解决数字世界来源出处问题的一种方案。NFT 是代表特定数字资产（如图像、视频或音乐文件）所有权的独特数字代币。每个 NFT 都是独一无二的，无法复制或仿造，这意味着很容易确定数字资产的原创性和所有权。NFT
    存储在区块链上，区块链是一种分布式账本，记录着数字资产所有权的所有交易和变更。这使得追踪数字资产的所有权和历史变得容易，从而可以确立其来源出处。


    以下是五个例子，说明 NFT 如何解决数字世界中的来源出处问题：


    -   **艺术**：NFT 在艺术界变得流行，用于确立数字艺术的所有权和来源出处。NFT 可以用来验证数字艺术品的真实性，而区块链可用于追踪其所有权及随时间发生的任何变更。例如，艺术家
    Beeple 在 2021 年 3 月以 6900 万美元出售了一件数字艺术品，用于代表该艺术品的 NFT 确立了该作品的所有权和真实性。

    -   **音乐**：NFT 可用于确立音乐文件的所有权和来源出处，音乐文件经常遭受盗版和知识产权盗窃。NFT 可以用来验证音乐文件的所有权，而区块链可用于追踪其使用情况及随时间发生的任何变更。例如，2021
    年 3 月，摇滚乐队 Kings of Leon 成为第一支以 NFT 形式发行专辑的乐队，此举确立了该专辑的所有权和真实性。

    -   **游戏**：NFT 在游戏行业日益流行，可用于确立游戏内资产（如虚拟房地产、角色和物品）的所有权和来源出处。NFT 可以用来验证游戏内资产的所有权，而区块链可用于追踪其使用情况及随时间发生的任何变更。例如，游戏`Axie
    Infinity`允许玩家拥有并交易代表游戏内资产的 NFT，从而确立了这些资产的所有权和真实性。

    -   **房地产**：NFT 可用于确立房地产资产（如地契和合同）的所有权和来源出处。NFT 可以用来验证房地产资产的所有权，而区块链可用于追踪其所有权及随时间发生的任何变更。

    -   **体育纪念品**：NFT 可用于确立体育纪念品（如球星卡、球衣和装备）的所有权和来源出处。NFT 可以用来验证体育纪念品物品的真实性，而区块链可用于追踪其所有权及随时间发生的任何变更。例如，美国国家篮球协会（NBA）与一家名为`NBA
    Top Shot`的公司合作，销售代表数字收藏品（如比赛集锦和球员卡）的 NFT，这些 NFT 确立了收藏品的所有权和真实性。

    '
- fmt: '# Royalties


    Royalties are a form of payment made to the owner of an intellectual property
    right, typically in exchange for the use of that right. In the context of music,
    for example, royalties are paid to songwriters and publishers when their music
    is used in a variety of ways, such as when it is played on the radio, streamed
    online, or included in a movie or TV show.


    In the digital world, the concept of royalties is equally important, if not more
    so. With the rise of digital media, it has become easier than ever for people
    to create and distribute their own content, whether it be music, videos, images,
    or other forms of digital art. However, this ease of distribution has also created
    new challenges for creators, who must now contend with issues like piracy, unauthorized
    use of their work, and difficulty in tracking and enforcing their intellectual
    property rights.


    One way that creators can address these challenges is by using NFTs. NFTs are
    a type of digital asset that are stored on a blockchain, a decentralized ledger
    that records transactions in a secure and transparent way. When someone buys an
    NFT, they are essentially buying a unique digital token that represents ownership
    of a particular piece of content, such as a song, video, or artwork.


    NFTs are designed to solve a number of problems that have long plagued the world
    of digital content, including the issue of royalties. Because NFTs are stored
    on a blockchain, they allow creators to establish ownership of their work in a
    way that is transparent and easily verifiable. This means that if someone wants
    to use a piece of content that is associated with an NFT, they will need to obtain
    permission from the owner and pay any required royalties.


    To illustrate the concept of royalties and how NFTs can help solve the problem,
    let’s look at five different examples:


    - **Music**: A musician creates a new song and releases it on a streaming platform
    like Spotify. Because the song is associated with an NFT, the musician can ensure
    that they receive a share of the revenue generated from streams of the song, even
    if it is added to playlists or used in other contexts without their direct involvement.

    - **Art**: An artist creates a digital artwork and sells it as an NFT. Because
    the ownership of the artwork is recorded on a blockchain, the artist can ensure
    that they receive a portion of any subsequent sales of the artwork, even if it
    is sold or traded multiple times.

    - **Video games**: A game developer creates a new video game and distributes it
    through an online platform like Steam. By associating the game with an NFT, the
    developer can ensure that they receive a share of the revenue generated by the
    game, even if it is sold or distributed through other channels.

    - **Photography**: A photographer takes a stunning photograph and licenses it
    for use on a website or in a magazine. By using an NFT to establish ownership
    of the photograph, the photographer can ensure that they receive a royalty payment
    for each use of the photograph, whether it is used once or multiple times.

    - **Writing**: An author writes a new book and self-publishes it on a platform
    like Amazon. By associating the book with an NFT, the author can ensure that they
    receive a share of the revenue generated by sales of the book, even if it is sold
    or distributed through other channels.


    # Summary


    In this chapter we discussed the rapid pace of technological innovation and its
    impact on various aspects of our lives. We highlighted how information technology
    has evolved from providing mere tools to do specific things for us to platforms
    that drive further innovations. The chapter emphasizes that the present era is
    characterized by pervasive digital engagement in almost every aspect of our lives.
    Despite this digital transformation, we identify a misalignment between the core
    attributes of the digital ecosystem and traditional economic value chains. Five
    critical attributes of the digital world are addressed: scarcity, ownership, authenticity,
    provenance, and royalties. The chapter delves into the significance of these attributes,
    discusses the challenges posed by the digital realm, and introduces non-fungible
    tokens (NFTs) as a solution that addresses these challenges. It examines how NFTs
    provide digital scarcity, unique ownership, authenticity verification, and provenance
    tracking and facilitate royalty payments in the digital domain. The introduction
    sets the stage for exploring the role of NFTs in reshaping the way we perceive
    and interact with digital assets.


    # 2. The Technology Behind NFTs


    The technology which powers the creation, transfer, and use of NFTs is broadly
    known as either blockchain or distributed ledger technology in some circles. While
    Bitcoin was the first commonly used blockchain protocol, the technology has roots
    decades older than that. In this chapter we’ll get familiar with the technology.'
