  trans: '

    ## 概述


    市面上存在众多不同的区块链，每种区块链的结构都各有不同，以便针对特定用途进行优化。理解每种共识机制的优缺点、去中心化的方式、许可级别等因素，对于试图为自身应用场景寻找合适链的业务领导者而言至关重要。


    虽然深入了解诸如 `Layer 1` 与 `Layer 2` 或更高级别区块链之间的区别、每种共识机制的具体工作原理以及各分类账处理加密方式的细节，对于决策去向并非关键，但这些信息都有助于决策。更全面地理解这些属性，有助于在多个区块链均满足基本要求时，优化最终决策。


    决策者**必须**理解的一点是，链如何处理智能合约。智能合约是任何区块链满足业务需求能力的核心——代币是智能合约，NFT 是智能合约，逻辑流程是智能合约，在区块链上运行的一切都使用智能合约。几乎所有基于区块链构建的内容都是使用智能合约构建的。


    在选择链时，确保你的开发者能理解智能合约逻辑并掌握其编码语言，是一项核心需求。只懂以太坊的 Solidity 语言的开发者，在 Polygon 或 BNB
    Chain 这样的链上会感到得心应手，但在使用其他语言的 Flow 或 Polkadot 上进行编码则会遇到巨大困难。


    不同的语言也针对不同的目的进行了优化。选错区块链可能会影响你交付产品或服务的能力。这点以及其他因素，如交易费用和内置的隐私功能，是在考虑部署任何区块链驱动项目（例如那些使用
    NFT 的项目）时的关键考量因素。


    另一个关键点是了解所考虑链上现有的生态系统，包括哪些钱包支持该链，以及该链上已存在哪些市场或其他门户。下一章将对此主题进行更详细的阐述。


    # 3. 创建与出售 NFT


    既然我们已经涵盖了区块链技术如何工作的具体细节，特别是它如何为 NFT 提供动力，那么下一个最重要的主题就是这些 NFT 的创建、出售或分发。为了让 NFT
    发挥任何作用，它们必须被创建出来并推向世界，以便人们能够使用它们。


    虽然在此过程中需要考虑许多因素，但最重要的因素之一是你打算创建的 NFT 的特性。同样重要的是，要考虑这些 NFT 的最终持有者将如何实际持有它们，这意味着要考虑钱包，以及如何将这些
    NFT 交到他们手中，这通常是通过出售的方式。


    ## 特性


    在创建 NFT 时，第一步是确定使你的 NFT 独特且有价值的方面。这些可以是任何东西，从一件艺术品或收藏卡到一条推文或虚拟房地产。关键在于确保 NFT 具有使其区别于其他数字资产的品质，并且这些品质在其设计和元数据中得以体现。


    NFT 的方面或变量可能会因所代表的数字资产类型而有很大差异。


    ### 变量


    一般来说，NFT 的变量可分为两大类型：内在变量和外在变量。


    #### 内在变量


    这些变量指的是 NFT 本身的固有品质。例如，就一件艺术品而言，内在变量可能包括艺术家的签名、创作日期、使用的媒介、尺寸，以及任何特殊的技术或材料。对于虚拟房地产，内在变量可能包括房产的位置、大小，以及任何特殊的功能或设施。


    从内在变量中获取价值的 NFT 的一个例子是流行的 CryptoPunks NFT 系列；每个 NFT 都有独特的 8 位像素化设计，使其易于识别和收藏。另一个例子是
    Bored Ape Yacht Club NFT 系列，其中每个 NFT 都有一幅不同的卡通猿猴插图，并带有独特的配饰和背景元素。


    #### 外在变量


    另一方面，这些变量指的是有助于提升 NFT 价值或独特性的外部因素。例如，如果艺术品是由知名艺术家创作的，这可能会增加其价值。同样，如果虚拟房地产位于一个受欢迎的虚拟世界中，这也可能会增加其价值和吸引力。


    例如，在 NBA Top Shot NFT 系列中，每个 NFT 代表一个特定的篮球瞬间，如扣篮或三分球，并有一个表示其稀有性的限量编号。就 Beeple
    Everyday 系列而言，其外在价值源于它是第一个在主要拍卖行佳士得售出的 NFT 系列，并且它以创纪录的 6900 万美元成交。


    一些 NFT 系列试图通过增加外在价值来随时间提升其价值。Bored Ape Yacht Club 就是其中一个例子——Bored Ape 的创造者 Yuga
    Labs 不断开发新方式，让 Bored Ape 的所有者可以使用它们，例如在他们的 Otherside 元宇宙中作为头像，以及作为特殊活动的入场通行证。

    '
- fmt: '### Utility


    Another variable to consider is the utility of the NFT. While some NFTs are purely
    collectible, many others have functional utility within a particular ecosystem
    or platform. For example, some gaming NFTs can be used as in-game items or currency,
    while others may be used as access keys to certain areas or features within a
    virtual world. Creators may want to consider how they can add functional utility
    to their NFTs to increase their value and appeal.


    `Utility` can be considered as an extrinsic variable for an NFT. This is because
    the utility of an NFT is not inherent to the asset itself, but rather is derived
    from its use or purpose within a particular ecosystem or platform. In other words,
    the value of an NFT with functional utility depends on external factors and how
    it is integrated and utilized within a particular context.


    For example, a gaming NFT may have functional utility within a particular game
    or virtual world, but this utility is dependent on the game or world in which
    it is used. The NFT itself does not have inherent functional utility without the
    context of the game or world. Similarly, an NFT that provides access to certain
    features or content within a platform has utility within that platform, but this
    utility is not intrinsic to the NFT itself.


    For an example of a utility NFT, we can look again at NBA’s Top Shot, where NFTs
    are used to represent digital collectibles in the form of basketball game highlights.
    These NFTs have both intrinsic and extrinsic value, with their functional utility
    being the ability to participate in fantasy sports games and access exclusive
    content and events.


    Another example is the use of NFTs as access keys to exclusive content or events
    within a virtual world. For example, Decentraland, a virtual world built on the
    Ethereum blockchain, allows users to buy and sell NFTs that serve as tickets to
    exclusive virtual events and experiences.


    In addition, some NFTs can be used as in-game items or currency, adding functional
    utility to the collectible asset. This is the case in many blockchain-based games,
    such as Axie Infinity and The Sandbox, where NFTs can be used as in-game assets
    and traded on decentralized marketplaces.


    The inclusion of functional utility in an NFT can increase its appeal and value,
    as it provides a tangible benefit beyond just ownership of a collectible asset.
    Aspiring NFT creators would do well to consider the potential use cases for their
    NFTs and how they can add functional utility to attract a wider range of buyers
    and increase the long-term value of their NFTs.


    ### Additional Variable Functions


    Other aspects or variables of an NFT might include its rarity, its history, and
    its provenance.


    `Rarity` refers to the scarcity of the NFT, which is generally considered to increase
    its value. History and provenance refer to the chain of ownership and the authentication
    of NFTs, which are also often considered to increase their value and ensure authenticity.
    This is by no means guaranteed though; bad provenance can certainly *decrease*
    value.


    Rarity/scarcity is one of the most common factors used by NFT creators to try
    and increase their value. It creates a sense of exclusivity. To achieve this,
    creators can limit the number of NFTs in a collection, or create unique one-of-a-kind
    NFTs. This often called a “one of one.” Scarcity can also be achieved by releasing
    NFTs in limited editions, with each edition having a fixed number of NFTs available
    for purchase.


    Almost every NFT collection attempts to use the concept of rarity to increase
    value. Examples include the CryptoKitties NFT collection, in which each NFT represents
    a unique virtual cat with its own set of attributes, such as fur color and eye
    shape. Some of these cats are rarer than others, and collectors are willing to
    pay a premium for them. In the case of the World of Women NFT collection, each
    NFT represents a unique illustration of a female character, with some of them
    being rarer than others due to their unique features or backstory.


    Keep in mind that as with provenance, rarity does not automatically increase value.
    If an NFT has no other value other than the fact that it is rare, that does not
    mean it will be inherently valuable. Many creators forget this and create collections
    that feature rarity thinking this will make them worth more, only to discover
    that nobody cares because there is no other value.


    This brings us to another potentially valuable aspect of an NFT: historical significance.
    For example, the first tweet ever sent by Twitter CEO Jack Dorsey was turned into
    an NFT and sold for $2.9 million, with the historical significance of the tweet
    adding to its value. Another example is the first NFT ever created, which was
    sold for $1.5 million due to its historical significance and its role in establishing
    the NFT market.


    Keep in mind though that this type of value is very dependent on the market and
    buyers’ sentiment. The Jack Dorsey first tweet NFT may have sold for $2.9 million
    in March 2021, but was only able to fetch a top bid of $277 in April 2022 when
    it was put up for sale again.


    There are multiple instances where NFTs have been minted that drew upon historically
    significant works or events outside the digital realm as well. The José Napoleón
    Duarte collection represents the body of work from the former president of El
    Salvador, with each NFT representing ownership of an authenticated reproduction
    of Duarte’s works, speeches, and more by his estate.


    Another important consideration when creating an NFT is its potential for interactivity.
    Unlike traditional physical artwork, NFTs can be designed to incorporate interactive
    elements such as animations, sound effects, and other multimedia components. This
    can add value and uniqueness to an NFT, as well as provide a more engaging and
    immersive experience for collectors and buyers. Bored Apes are a good example
    of NFTs that include components of interactivity – Snoop Dogg and Eminem even
    made a music video starring their Bored Apes.


    Creators must take caution when creating secondary or derivative works from an
    NFT though: the creation and ownership of NFTs do not necessarily confer the copyright
    or intellectual property rights to the underlying artwork or asset. Copyright
    laws still apply, and it is crucial to ensure that all necessary permissions have
    been obtained before creating and selling an NFT. It is also important to consider
    the potential for plagiarism or copyright infringement when selling and distributing
    NFTs.


    When Yuga Labs created the Bored Ape Yacht Club collection, they conferred full
    intellectual property rights for that Ape to whomever owns it. This is an uncommon
    move, but it’s worth considering for anyone creating an NFT collection as a potential
    aspect to make each NFT more valuable.


    Unfortunately, many variables are limited by a simple constraint: file size.'
  raw: '### Utility


    Another variable to consider is the utility of the NFT. While some NFTs are purely
    collectible, many others have functional utility within a particular ecosystem
    or platform. For example, some gaming NFTs can be used as in-game items or currency,
    while others may be used as access keys to certain areas or features within a
    virtual world. Creators may want to consider how they can add functional utility
    to their NFTs to increase their value and appeal.


    Utility can be considered as an extrinsic variable for an NFT. This is because
    the utility of an NFT is not inherent to the asset itself, but rather is derived
    from its use or purpose within a particular ecosystem or platform. In other words,
    the value of an NFT with functional utility depends on external factors and how
    it is integrated and utilized within a particular context.


    For example, a gaming NFT may have functional utility within a particular game
    or virtual world, but this utility is dependent on the game or world in which
    it is used. The NFT itself does not have inherent functional utility without the
    context of the game or world. Similarly, an NFT that provides access to certain
    features or content within a platform has utility within that platform, but this
    utility is not intrinsic to the NFT itself.


    For an example of a utility NFT, we can look again at NBA’s Top Shot, where NFTs
    are used to represent digital collectibles in the form of basketball game highlights.
    These NFTs have both intrinsic and extrinsic value, with their functional utility
    being the ability to participate in fantasy sports games and access exclusive
    content and events.


    Another example is the use of NFTs as access keys to exclusive content or events
    within a virtual world. For example, Decentraland, a virtual world built on the
    Ethereum blockchain, allows users to buy and sell NFTs that serve as tickets to
    exclusive virtual events and experiences.


    In addition, some NFTs can be used as in-game items or currency, adding functional
    utility to the collectible asset. This is the case in many blockchain-based games,
    such as Axie Infinity and The Sandbox, where NFTs can be used as in-game assets
    and traded on decentralized marketplaces.


    The inclusion of functional utility in an NFT can increase its appeal and value,
    as it provides a tangible benefit beyond just ownership of a collectible asset.
    Aspiring NFT creators would do well to consider the potential use cases for their
    NFTs and how they can add functional utility to attract a wider range of buyers
    and increase the long-term value of their NFTs.


