- fmt: '# Addressing Obstacles


    One of the primary challenges most blockchains face is scalability. As the level
    of activity on a blockchain network grows, the size of the blockchain also grows,
    making it increasingly difficult and time-consuming to process transactions. This
    can cause slower transaction times and higher transaction fees, particularly during
    periods of high network activity.


    To address the issue of scalability, several solutions have been developed and
    implemented in different ways. These solutions include state channels, sidechains,
    and sharding. State channels and sidechains are both considered to be “Layer 2”
    solutions.


    A Layer 2 solution is, in short, a blockchain built on top of another blockchain.
    Most Layer 2s are built on Ethereum, which is considered a Layer 1 because it
    is a base-layer blockchain. They allow for transactions to take place in a separate
    environment which are then posted to the Layer 1 chain. This reduces the load
    on the main blockchain and enables the improved performance.


    State channels are a simple Layer 2 that enables two parties to transact with
    one another off the main blockchain. This can help to reduce the number of transactions
    on the main blockchain and improve scalability.


    Sidechains are a type of off-chain solution that enables the creation of separate,
    parallel blockchains that are linked to the main blockchain. These sidechains
    can be used to process transactions that are not critical to the main blockchain,
    helping to improve overall network efficiency and scalability. This can help to
    reduce the load on the main blockchain, allowing it to process critical transactions
    more quickly and efficiently. Sidechain transactions are generally “rolled up”
    into a larger transaction which is then settled on the main chain.


    One popular sidechain solution is the Polygon network, which is designed to address
    the issue of scalability in the Ethereum blockchain. The Polygon network is a
    Layer 2 scaling solution that is built on top of the Ethereum blockchain, enabling
    faster and cheaper transactions while still maintaining the benefits of the primary
    Ethereum network.


    The Polygon network achieves this by using a combination of Plasma and PoS (proof-of-stake)
    technologies. This enables transactions to be processed in a separate blockchain
    that is linked to the Ethereum Mainnet. This helps reduce the load on the main
    Ethereum blockchain, allowing it to process critical transactions more quickly
    and efficiently. The Polygon network, like most blockchains modeled after Ethereum,
    supports the use of smart contracts written in the Solidity programming language.


    Binance Smart Chain (BSC), also called BNB Chain, is another example of a successful
    sidechain solution. BSC is a blockchain network built on top of the Binance Chain,
    which is a high-performance blockchain that was designed specifically for the
    Binance exchange. BSC is compatible with the Ethereum Virtual Machine (EVM), which
    means that it supports the use of Ethereum-based smart contracts.


    BSC was designed to address the scalability and transaction speed limitations
    of the Ethereum network. Like other sidechain solutions, BSC allows for faster
    and cheaper transactions by processing them off the main Ethereum blockchain.
    This is achieved through a system of validators, which are responsible for verifying
    and processing transactions on the BSC network.


    One of the key features of BSC is that its transaction fees are significantly
    lower than those on the Ethereum network. For people and organizations who use
    BSC over Ethereum, this is almost always the reason they made that decision. The
    fees are lower because BSC uses its proof-of-staked authority (PoSA) consensus
    mechanism, which enables faster transaction processing times while still maintaining
    a sufficient degree of network security and decentralization.


    BSC also supports a wide range of decentralized finance (DeFi) applications, including
    decentralized exchanges (DEXs), yield farming, and lending and borrowing protocols.
    These applications are all powered by smart contracts written in the Solidity
    programming language.


    Sharding is a different solution to the scalability problem in blockchain networks
    which initially shows promise, though it has been subject to criticism. It is
    a technique used to improve the scalability and performance of blockchain networks
    by dividing the blockchain into smaller, more manageable segments called “shards,”
    which can be processed independently. Each shard processes a subset of transactions,
    which allows for parallel processing and increased throughput, improving overall
    transaction processing times and network scalability.


    One of the primary benefits of sharding is that it enables blockchain networks
    to scale horizontally, rather than vertically. This means that instead of relying
    on a single, monolithic blockchain to process all transactions, the network can
    be divided into smaller, more manageable pieces that can work together to process
    transactions in a more efficient manner.


    With the launch of Ethereum 2.0, in an event also known as “The Merge,” the network
    now includes a sharding solution known as the Beacon Chain. The Beacon Chain “merged”
    with the Ethereum Mainnet on September 15, 2022, coinciding with the transition
    of the Ethereum network from a PoW consensus mechanism to a PoS mechanism. The
    Beacon Chain coordinates the various shards in the Ethereum network and ensures
    that they are all working together in a secure and decentralized manner. This
    has helped to improve the scalability and efficiency of the network and has allowed
    for faster transaction processing times.


    Sharding is not without flaws. For example, since each shard processes transactions
    independently, the security of the entire network can be compromised if a single
    shard is attacked successfully. A smaller number of nodes in each shard may make
    it easier for an attacker to gain control of a significant portion of the shard,
    potentially leading to double-spending or other malicious activities. Furthermore,
    the fact that nodes on sharded chains need not store the entire blockchain history
    means if one shard goes offline there can be delays or loss of data. It also increases
    network fragmentation, which can create unbalanced resource distribution and systemic
    inefficiency.


    The use of sharding in Ethereum has been a significant step for the chain, as
    it demonstrates that this approach to improving network scalability can be both
    viable and effective. As a result, other blockchain projects may very well follow
    suit and explore the use of sharding in their own networks if the drawbacks are
    shown to be properly manageable.


    Another blockchain project that is exploring the use of sharding is Zilliqa. Zilliqa
    is a high-throughput blockchain platform that uses sharding to improve network
    scalability and transaction processing times. The platform is designed to be fast,
    secure, and efficient and has already been used for a variety of applications,
    including payments, gaming, and digital advertising.


    In addition to its sharding technology, Zilliqa also utilizes a unique consensus
    mechanism known as Practical Byzantine Fault Tolerance (PBFT). PBFT is well suited
    for permissioned blockchain networks, where the nodes are known and can be authenticated.
    Its major advantages are its resilience to Byzantine faults and finality of transactions,
    but it has limited scalability which Zilliqa has attempted to address through
    sharding.


    Zilliqa also features a smart contract platform known as Scilla, which is designed
    to be more secure and developer-friendly than other smart contract languages.
    Scilla uses formal verification techniques to ensure that smart contracts are
    free from bugs and vulnerabilities, and it provides a clear and easy-to-use programming
    language for developers.'
