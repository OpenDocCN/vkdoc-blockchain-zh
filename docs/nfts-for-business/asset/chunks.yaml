  trans: '

    ## 总结


    NFT 的出现无疑颠覆了艺术界，在为艺术家和收藏家带来新机遇的同时，也引发了重大的争议和讨论。


    随着 NFT 的普及度持续增长，利益相关者持续探讨这项技术的影响及其对艺术界的作用至关重要。NFT 的采用者也需要深思熟虑的策略——艺术家和收藏家需精心挑选合适的
    NFT 市场，并制定恰当的目标受众和营销策略。艺术界唯有在拥抱 NFT 带来的益处的同时，正视围绕它的争议，才能在这场数字革命的复杂格局中稳步前行。


    对于艺术家和收藏家来说，进入 NFT 艺术世界既令人兴奋，也充满挑战。通过采纳本章概述的策略，艺术家和收藏家可以更好地应对 NFT 市场的复杂性，最大化自身成功的可能性，并为数字艺术的持续发展与演变做出贡献。


    # 5. 游戏行业与 NFT


    近年来，游戏行业经历了翻天覆地的变化，这得益于技术的飞速进步和互联网的普及。随着游戏复杂性和精巧度的提升，对独特且个性化的游戏内资产的需求也与日俱增。


    非同质化代币（NFT）在游戏领域的应用是一个自然而然的发展过程，它提供了一个能够同时满足开发者和玩家需求的框架。区块链的这一应用场景已迅速火热起来，超过一半的区块链活动都来自游戏，并且几乎每天都有新游戏上线。


    绝大多数新的区块链游戏都来自初创公司。这些由风险投资支持的工作室，通常自身没有任何游戏作品（尽管团队中常至少有一人拥有传统游戏工作室的背景），会为目标游戏构建一个集成了加密货币和
    NFT 的可玩演示版。其中许多项目获得了资金支持，随后推出游戏，其重点往往首先放在代币经济学上，为玩家提供一种避免陷入“死亡螺旋”的赚钱方式。不过，并非所有区块链游戏都遵循这种方法。


    ## 游戏对 NFT 的处理方式


    有些游戏在保持以游戏性为核心的同时集成了 Web3 功能；有些则在作为 Web2 游戏发布一段时间后才添加 Web3 功能；还有些游戏玩家甚至根本察觉不到自己玩的是
    Web3 游戏。让我们来看几个主要游戏集成区块链方式的例子。


    一个经典的纯 Web3 游戏是《Splinterlands》。这是一款“卡牌”游戏，与许多其他纯 Web3 游戏类似；玩家通过构建代表不同法术和生物“卡牌”的“卡组”，在
    PvP 回合制战斗中与其他玩家对战。卡牌可以随着时间推移，使用经验值和游戏内资源进行升级。每张卡牌都是一个 NFT，这意味着游戏的核心完全建立在这项技术之上。


    当然，当大多数人想到 Web3 游戏时，最先想到的游戏之一就是 Sky Mavis 的《Axie Infinity》。在这款游戏中，玩家组建“Axie”团队进行对战，游戏中的所有角色都是
    NFT。


    另一种类型的游戏是 Raini Studios 开发并于 2021 年发布的《Lords of Light》，它在发布时就包含了一系列 Web3 功能。这是一款手机角色扮演游戏（RPG），玩家在其中建立王国、收集并升级王国中的英雄，在一个充满中世纪奇幻色彩的世界中与其他玩家战斗，收集资源、探索区域并完成任务。《Lords
    of Light》的游戏内货币是 Light 代币，但更重要的是，该游戏使用 NFT 作为资产。玩家收集的英雄、武器和盔甲都是 NFT，其他 NFT 则用于解锁特殊游戏功能，例如限时活动。


    Hit Box Games 开发的《Swords of Blood》是另一款融合了 NFT 等 Web3 功能的 RPG 游戏。它是同一发行商此前一款名为《Blade
    Bound》（纯 Web2，没有任何 Web3 元素）游戏的扩展。《Swords of Blood》采用了以往成功的模式，并为高价值物品引入了 NFT，所有这些物品都存放在游戏内置的钱包中。该游戏仍然保留着
    Web2 模式，但玩家在游戏过程中会开始积累 NFT 和 Web3 资产。


    NFT 游戏并非仅仅是小众或专业工作室的尝试。大型品牌和机构也在围绕它们构建体验。Altered State Machine 开发的《World Cup AI
    League》就是这样一个例子。这款由国际足联（FIFA）赞助的游戏，让玩家组建一支由四个 AI 驱动的角色组成的队伍。开发者的目标是集成一个 NFT 市场，届时游戏中的所有玩家和角色都将成为
    NFT。这款游戏在设计之初就考虑了 Web3 功能，但最初发布时并未包含，因为开发者打算稍后融入。


    史克威尔艾尼克斯（Square Enix）可能是开始构建 NFT 游戏的最大游戏开发商。其游戏《Symbiogenesis》实际上并不要求玩家拥有任何 NFT，但如果没有，游戏体验会大打折扣。角色
    NFT 使玩家能够阅读独特的故事、快速积累经验值、从完成任务中获得额外奖励、创建自己角色的“复制品”等等。


    然而，所有这些例子大多是开拓者的情况——关于区块链在游戏领域采用率的统计数据显示，这远未普及。截至 2023 年初，行业会议组织 GDC 对游戏开发者的一项调查表明，大约四分之一的游戏工作室对开发基于区块链的游戏有一定兴趣，但只有约
    2% 的工作室正在积极进行。这一数字较 2022 年初发布的上一份报告略有下降，当时加密和 NFT 的比例分别约为 27% 和 28%。


    许多游戏开发商和工作室认为，区块链在游戏领域没有立足之地，认为它是在为不存在的问题寻找解决方案，纯粹是欺诈的工具，甚至认为在中心化数据库就能胜任的情况下，这是一种低劣的方式。在许多情况下，这些批评不无道理，而且许多已上线的区块链游戏要么构思不周，要么因为过度关注区块链方面而忽视了游戏本身，从而亮起红灯。尽管如此，对
    NFT 等资产进行恰当的实施，只会提升用户体验。

    '
- fmt: '## Publishers’ Approaches to NFTs


    The pro- and anti-blockchain/NFTs in gaming argument can be seen through the lens
    of two popular game stores: Steam and the Epic Games Store.


    Game developer/publisher Valve imposed a blanket ban on all games that included
    blockchain or NFT technology in them from Steam, their game store. This was a
    major move considering that Steam is one of the primary ways desktop gamers find,
    purchase, download, and launch games. Despite this restriction, a few blockchain-powered
    games did persist on the platform.


    The move was met with mixed responses. Though many in the community praised the
    decision, Valve was accused of simply trying to eliminate the existence of game
    marketplaces powered by NFTs where they couldn’t earn a cut, including by one
    developer whose game was purged from the platform. Valve’s president claimed they
    did this because while blockchain is a great technology, “the ways in which has
    been utilized are currently are all pretty sketchy” and that “people who are currently
    active in that space are not usually good actors.”


    One Web3 game publisher, Gala Games, listed one of its games on Steam by removing
    all NFT functionality from the game in that version of it. This allows them to
    onboard players from Steam’s ecosystem then migrate them to an internal system
    in the future so those players can gain the fullest experience.


    On the other side of the spectrum, Epic Games welcomes NFTs in its Epic Games
    Store. Their CEO stated that he believes “stores and operating system makers shouldn’t
    interfere [with developer choices in how to build games] by forcing their views
    onto others” and followed up that Epic certainly would not be doing that.


    Considering Epic Games developed and launched Fortnite, one of the biggest success
    stories in gaming history, this shows how polarized major actors in the industry
    are when it comes to NFTs. The Epic Games Store is much smaller than Steam, but
    could end up benefiting as one of the biggest game libraries which permits NFT-powered
    products. Gala Games has indicated that it intends to publish its releases there,
    and the platform published its first banner NFT title called Blankos Block Party,
    produced by Mythical Games which is valued at over $1bn as of its last funding
    round.


    It’s clear that publishers, studios, and other gaming platforms are adopting this
    technology. It’s also clear that interest in doing so varies greatly between highly
    enthusiastic and diametrically opposed. With only 1 in 50 studios currently building
    NFT-powered games and 75% of the industry having zero interest in considering
    it, the value of using blockchain technology still needs to be proven before widespread
    adoption can ensue.


    The trepidation caused by NFTs’ poor reputation needs to be overcome, possibly
    through rehabilitation of rebranding, if the industry is to take advantage of
    the benefits the technology can bring. The legacy of “rug pulls” and abandoned
    projects leaves many people skeptical at best and hostile at worst toward even
    the idea of building or playing an NFT game. Developers often vocally support
    the possibilities and ideals of what NFTs can do for gaming, but often cannot
    embrace those due to their tainted legacy.


    Fixing this issue requires an infrastructure and a commitment to quality by developers
    who leverage blockchain technology without making it the forefront of what they
    create. Similar to how nobody thinks about how Fortnite requires an always-on
    Internet connection when they play the game, at least until they lag or lose service,
    games need to integrate blockchain in ways that allow players to enjoy their experience
    without thinking about how they are using those protocols. Once this has been
    overcome, hesitancy is sure to drop off as well.


    ## Benefits of Blockchain Gaming


    The benefits blockchain and NFTs can bring to games are quite substantial, when
    properly implemented.


    Having an immutable record of transactions, transferrable unique assets, decentralized
    storage, and cross-platform portability offers numerous benefits to games, gamers,
    and game developers.


    One example is verifiable ownership. Blockchain’s ability to create an immutable
    record of transactions allows for the clear establishment of ownership of in-game
    assets. For gamers, this means that they can prove they own the digital items
    they have acquired, which is crucial for trading, selling, or transferring these
    assets, especially if they wish to do this outside of the closed environment provided
    by a game’s creators.


    This can be seen in Star Atlas’ record of asset ownership being public. Anyone
    can check the leaderboards at any time and see exactly who owns what. As of this
    writing, the top player has $654,844 and anyone can click on their page to verify
    exactly what those assets are. That person can then check the marketplace and
    see exactly what those assets are currently trading for and act on that information.


    This function prevents people who want to buy an asset from getting ripped off
    and ensures those who want to sell an asset get exactly what it is worth. Furthermore,
    the verifiability means asset provenance can be traced. If someone in this game
    owns a star cruiser which participated in a particularly famous battle, for example,
    it may be worth more than the basic trading price for other versions of that asset
    and command a premium.


    Developers also benefit from this verifiable ownership. They can track the distribution
    of in-game assets and enable transfers outside their cloistered ecosystems while
    still reaping benefits such as those provided by royalties. This helps prevent
    fraudulent activities and ensure the game’s economy remains balanced. They can
    monitor transactions of their assets and verify that everything is above board
    if a dispute arises, even outside of their own markets.


    This is in stark contrast to the cloistered systems of Web2 gaming, where nobody
    can take anything they buy anywhere else. A real-world analogy to the benefits
    this provides can be found by imagining a person who buys a car, but they are
    only able to use it on roads built by the car dealer and can only sell it on the
    car dealer’s lot if they’re able to sell it at all. This would make cars effectively
    equivalent to go-karts at a go-kart track, even though you’re “buying” it. NFTs
    remove this restriction.


    Trust is essential in online environments where players and developers need to
    have confidence in the system’s integrity. Because blockchains ensure transaction
    records cannot be manipulated or altered by a single entity, they provide a higher
    level of security and trust than a centralized database. Even in the case of a
    blockchain hack, past records can never be altered. This trust fosters a more
    vibrant gaming community. It also encourages players to buy more digital assets,
    especially since they can take them off the proverbial go-kart track.


    Since Web3 assets, specifically NFTs, are more akin to buying a car you can take
    anywhere as opposed to metaphorical Web2 assets you buy and have to leave at the
    track, Web3 enables far superior asset exchanges among gamers. They disintermediate
    transactions and provide a transparent transaction history, reducing the risk
    of fraud for anyone who does a modicum of research into what they’re buying.


    This efficiency encourages the growth of in-game economies and further incentivizes
    player participation.'
