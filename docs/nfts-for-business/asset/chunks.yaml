- fmt: '# The Rise of NFTs in the Art World


    For centuries, a creator and collector of physical art would display their art
    in a physical space, like a museum or even in their own living rooms. Ownership
    and authenticity of that art was also easy to prove as collectors could certify
    their authenticity through independent experts and from the artist themselves.
    The key difference between physical art and digital art is that the latter is
    digital and exists in a virtual form. Digital art can include illustrations, photographs,
    GIFs, 3D models, and more. However, digital art can easily be copied and displayed.
    For instance, if we see a picture we like on the Web, we can simply screenshot
    the digital art, or in many cases just save the image as a PDF or JPEG on our
    own computers, to be displayed wherever and whenever we want.


    `NFTs` are used for digital art because they can certify the authenticity of the
    artwork and provide a permanent record of ownership. By tokenizing the artwork
    and recording it on the blockchain, buyers of the artwork can have confidence
    that it is the original work.


    Additionally, `NFTs` can be used to create scarcity for digital art, making it
    a valuable asset. This is why digital art is one of the earliest implementations
    of `NFTs` ushering in the implementation of the renaissance of blockchain in the
    art world. In other words, an `NFT` functions as a digital certificate of ownership
    for a given asset and is distinct from any other `NFT` in circulation. Because
    of this feature, `NFTs` are being used to certify ownership of digital art.


    This technology also facilitates the buying and selling of `NFTs` as well as the
    storage of ownership information on the blockchain, allowing for the digital asset
    to be exchanged, tracked, and managed on the blockchain.


    ## Early NFT Art Projects and Impact on the Art World


    The application of `NFTs` has brought about significant changes in the art world,
    offering new possibilities for creative expression, ownership, and trading. Some
    of the earliest implementations of `NFTs` in the art world were projects such
    as `CryptoPunks` and `CryptoKitties`, paving the way for numerous artists and
    collectors to explore this new frontier.


    `CryptoPunks`, created by software developers Matt Hall and John Watkinson of
    Larva Labs, debuted in June 2017 as one of the earliest examples of `NFT` art
    projects. The project consists of 10,000 unique 24x24 pixel art characters, with
    each Punk featuring a distinct combination of attributes, such as different hairstyles,
    facial expressions, and accessories. Originally, these digital characters were
    available for free to anyone with an Ethereum wallet. However, as demand grew,
    the value of these Punks rapidly increased, with some selling for hundreds of
    thousands or even millions of dollars.


    `CryptoPunks`’ success signaled the potential of `NFTs` as a medium for digital
    art and collectibles. The project demonstrated that unique digital items could
    hold value and be traded on blockchain platforms like Ethereum. In addition, it
    showcased the significance of provable scarcity and ownership in the digital art
    world, as the immutable nature of blockchain technology ensured that each Punk
    could not be replicated or counterfeited since each Punk has a different value
    based on when the art was minted.


    In November 2017, a new implementation of digital art called `CryptoKitties` showed
    the art world how gaming and art could converge. `CryptoKitties`, developed by
    Axiom Zen (now Dapper Labs), was a virtual breeding game built also on the Ethereum
    network. Users could collect, breed, and trade digital cats, each with its distinct
    genetic traits that could be passed down to their offspring. The project gained
    widespread popularity. At its peak, the game even accounted for a significant
    percentage of transactions on the Ethereum network, even causing slowdowns on
    the network. (These problems exposed potential scalability issues of blockchain
    platforms at that time.)


    As the success of `CryptoPunks` and `CryptoKitties` reverberated throughout the
    art world, artists began to experiment with digital art forms, exploring the possibilities
    that this new medium offered. Meanwhile, social media and online platforms emerged
    as bustling marketplaces where artists could showcase their works and collectors
    could seek out new and exciting pieces. In the past, an art object would often
    take years and sometimes centuries to gain the attention of the masses. With these
    new social networks and digital bazaars, an artist could quickly draw attention
    to their creation in days, if not a few hours. It was in these digital bazaars
    that artists began to see the true potential of `NFTs`.


    One of these artists was Mike Winkelmann, also known as “Beeple.” “Everydays:
    The First 5000 Days” is a collection of 5,000 images created by Beeple over a
    13-year period which were then compiled into a single, collective piece. The artwork
    was sold as an `NFT`. The sale of “Everydays: The First 5000 Days” was a landmark
    event in the history of digital art as it was the first `NFT` artwork to sell
    at a major auction house. Sold for over $65 million, it set the record for the
    most money spent on digital art. This sale has had a major impact on the art world
    as it has given digital art, and `NFTs` in particular, the legitimacy that it
    lacked.


    Other high-profile `NFT` sales have since followed, including the sale of Grimes’
    “WarNymph” for over $6 million and the sale of “Crossroads 2” by artist Pak for
    over $16 million. These auctions have had a major impact on the art world and
    are sure to shape the future of digital art for years to come.


    ## The Adoption of NFTs by Established Artists and Brands


    The legitimization of `NFTs` in the digital art brought on by Beeple’s and other
    successes has paved the way for established artists and brands to monetize their
    artwork and merchandise.


    Established brands and companies have released limited-edition and exclusive products
    as `NFTs`. For example, the NBA recently released a series of `NFT` trading cards,
    called `The Association`, where the collectible’s design changes over time. The
    appearance of the `NFTs` evolves based on players’ on-court performance. The more
    accomplished a player is throughout the season, the more their `NFT` will visually
    change. Besides this `NFT` initiative, the NBA has heavily contributed to putting
    sports `NFTs` on the map through Dapper Labs’ `NBA Top Shot`. In 2022, the platform
    was largely responsible for the `NFT` sports-craze driving sales that reached
    almost $1 billion.


    In addition to monetization, established artists and brands have also adopted
    `NFTs` to increase engagement with their fans, customers, and followers. For example,
    music artist Steve Aoki recently released an `NFT` collection that includes limited-edition
    digital art pieces and merchandise. Other artists and brands have leveraged `NFTs`
    for marketing campaigns, offering rewards to fans who purchase their `NFTs`.


    ## The Benefits of NFTs for Artists and Collectors


    Overall, the use of `NFTs` by established artists and brands is proving to be
    beneficial. `NFTs` offer a way for artists to monetize and certify their artwork,
    and for brands to create exclusive products and incentive-based marketing campaigns.
    The use of `NFTs` by these established entities is making digital art and collectibles
    more widely accepted.'
