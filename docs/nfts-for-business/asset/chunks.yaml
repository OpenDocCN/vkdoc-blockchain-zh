- fmt: '# The Realization and Opportunity of Digital Artifacts


    The realization that all of what which we call solid and real (`money`, `property`,
    `reputation`, `identity`, `wealth`, etc.) does not belong to a world that is fundamentally
    different from, or more solid than, the artifacts of the “less real” digital world
    where we encounter bizarre things like `blockchains` and `ledgers`, `DAOs`, `DeFis`,
    `cryptocurrencies`, `dApps`, `gas fees`, `minting`, `NFTs`, and much more; this
    realization that we are dealing with an ecosystem of realities that share in common
    the collective ascent granted by the participants to the world they are sharing
    – a world where people buy things, cooperate with one another, own objects, transfer
    wealth, information, affection, display pride, and so forth – enables us to open
    ourselves up to a whole world of opportunity that would otherwise remain out of
    reach if we insisted on mystifying the artifacts and the instruments of the digital
    world (the so-called Web3) and quarantining it to its separate and not equal bizarro
    world, populated by bizarro people doing bizarro things. In other words, the opportunity
    in front of us is in pulling these instruments into what we loosely call “the
    real world” (the world of houses and food and diplomas and cash money), poking
    at them, and finding out how we can use them to solve real problems. And, as we
    do this, we come to understand that we can not only solve existing “real” problems
    but in fact create some real value that we otherwise would not have been able
    to conceive of, even better.


    In this chapter, our aim is twofold: first, to propose a methodology for identifying
    how this exotic thing called an `NFT` can be used in the real world to solve real
    problems, and second, to apply this methodology to explain and surface the value
    that `NFTs` are delivering and can deliver in five “real-life” sectors: event
    ticketing, food and drink, fashion, financial loans, and supply chain management.


    ## The Methodology


    Let us reiterate our basic, fundamental insight: the backbone of each of the worlds
    that we inhabit, whether we want to call such worlds “real,” “virtual,” “augmented,”
    “mixed,” or whatever else, is nothing more and nothing less, for the purposes
    of inhabiting those worlds, than the respective ontologies of such worlds – ontologies
    which we, the people who populate and navigate those worlds, have come to accept
    and use and take very seriously. The additional corollary insight is that these
    ontologies are sustained by nothing more than our assent, our acceptance of them,
    and that they, these worlds, would vanish as soon as we decide to no longer take
    their respective ontologies seriously, should we decide to do so. It is *within*
    these ontologies that we create our multiple phenomenological *immanences*, or
    more plainly, our ways of being in each world as we inhabit our multiple identities
    – our personal habitats – sometimes more than one habitat at a time.


    The innovation here, if we can call it one, as we attempt to identify value opportunities
    that the ontology attached to the world `NFTs` introduces in “*a* real world”
    (for there are *many* real worlds) is to flesh out to whatever extent we can a
    given “real-world” ontology and mash it up with the `NFT` ontology and then see
    what we can obtain. More specifically, the project at hand is to identify those
    problems that exist in the ontology of a chosen “real world” that can be solved
    with the introduction of an `NFT` ontology (for there, also, thanks to smart contracts,
    there exists a multiplicity of them), now that the objects of the two ontologies
    coexist in a mashed-up ontology, with proviso, obviously, that this newly mashed-up
    ontology is taken seriously by those humans that live in and through it. Beyond
    identifying problems to solve, the hope is that we will also be able to identify
    *opportunities* for delivering value that is enabled by the new mashed-up ontology,
    given for, as almost always, a mash-up is always greater than the sum of the parts
    that were mashed up together.


    ## Applications and Use Cases


    The best way to explain what we mean by all of this is to go through the four
    “real worlds” that we have chosen – events, food and drink, fashion, and supply
    chain management – one by one, and apply our methodology against each one.


    ### Events


    This is the world of, among other things, tickets, ticket issuers, performers,
    event organizers, event suppliers, advertisers, festivals, passes, authorized
    ticket sellers, scalpers, fans of the performers, members of the media, venues,
    and event-goers.


    In this world, (1) fans buy tickets from authorized ticket sellers, or, if they
    can’t find tickets from such authorized sellers, they buy them from scalpers,
    who sell them at a higher price than the ticket was initially selling for; (2)
    fans attend events, miss them because something came up at the last minute, and
    attend them but are not happy with them; (3) performers of an event perform and
    receive compensation for their work, with which they may or may not be happy,
    and engage with fans, who may respond to their performance in fulfilling ways
    or dispiriting ways; (4) organizers of these events set up the events, find advertisers,
    engage with suppliers, provide security to these events, engage the media, with
    the authorities, if such engagements are necessary, etc.


    With this quick run-through of our rather simplified ontology of the world of
    events, we can already identify several of the chronic problems that the world
    of events is plagued with. Here is a small list of them:


    1. Fake tickets

    2. Ticket scalping and opportunistic middlemen

    3. Lost tickets

    4. Canceled events

    5. Unhappy fans that go unidentified, with little chance to make up for their
    disappointment

    6. Very happy fans that go unidentified, with little chance of leveraging their
    happiness


    `NFTs` can potentially help solve many of these problems in the following ways:


    1. Every ticket is an `NFT`, and hence, the ticket’s provenance is public and
    immutable. And so, in one fell swoop, fake tickets disappear from the landscape.

    2. Every ticket is an `NFT`, and hence, in the `NFT`''s smart contract, a clause
    can be introduced that would prohibit the owner of the `NFT` from selling it.
    And in one fell swoop, the scalper disappears from the landscape.

    3. If the ticket you are holding in your digital wallet is an `NFT`, then, as
    long as you don’t lose your digital wallet, your ticket is safe and you will never
    need to look for it.

    4. An event is canceled and anyone who bought a ticket for the canceled event
    can either choose to accept a refund or register for an event in the future. With
    `NFTs`, the effort of making this possible is not more than a few lines of programming
    or the triggering for some rules in some software stack. For both the organizers
    and the ticket holders, all of this happens by magic, with no more than clicking
    a button or two on an interface from them.

    5. You are an artist and you owe your livelihood to the fans. Without them, you
    can’t put food on the table, let alone practice your art, your craft, or deliver
    your wisdom. Ensuring that you are aware of what your fans feel about you, and
    that you engage with those who were not happy to regain their enthusiastic support,
    is something that you would probably wish you could do. Without `NFTs` that can
    easily track who attended which event, and that can easily enable the attendees
    to share their experiences, making it up to disappointed fans is almost impossible.
    With `NFTs`, this all becomes, again, a matter of an app or a web interface.

    6. The same holds with fans who are very happy with the event: such fans would
    be ripe for buying merchandise, for spreading the word, for promoting the performer’s
    brand, the venue, and the organizers, and for buying tickets for future events.
    Again, all of this is nearly impossible to do without `NFTs`, but more than possible,
    in fact, easy to do with `NFTs`.


    *An Example of a Current Implementation*'
