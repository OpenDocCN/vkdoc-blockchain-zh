  raw: '### Minting and Whitelisting


    To mint an NFT, one typically interacts with the smart contract via a dApp using
    a Web3-enabled wallet, which enables them to send transactions to the blockchain.
    They must have enough gas to pay the fees.


    Once the transaction is sent, it will be processed by the network and included
    in the next block. This process typically takes a few seconds to a few minutes,
    depending on the blockchain and the current network congestion. Once the transaction
    is confirmed, the NFT will be minted. Depending on the dApp used to interact with
    the smart contract, the NFT may be sent to the creator’s wallet or to some other
    wallet address.


    Many NFT creators sell them through a process called “whitelisting,” where rather
    than minting the NFTs directly, they “whitelist” community members who do the
    minting themselves. Oftentimes creators sell these whitelist spots or give them
    to highly engaged community members as rewards for driving greater interest in
    their collection. This enables some community members to buy NFTs from the collection
    at an initial starting price.


    This is generally a more complex process, but helps ensure buyers exist before
    the collection is listed for sale. Some creators though prefer to list directly
    on marketplaces and use the marketplace to mint NFTs.


    OpenSea’s dApp can provide an example of how this works. To mint an NFT using
    OpenSea’s interface, create a new item and upload the digital asset and metadata
    for the NFT. Users also set a price and royalty percentage here.


    Select the “Create” option and choose the smart contract they want to use to mint
    the NFT. OpenSea supports a range of smart contracts for NFTs, including the popular
    ERC-721 and ERC-1155 standards. Then sign and send the transaction to the blockchain,
    which contains the data needed to create the NFT.


    Recall that “signing” a transaction uses the digital signature associated with
    the user’s cryptocurrency wallet to verify the authenticity of the proposed activity.
    In some cases, a simple signature can be done without a gas fee, but when creating
    an NFT, the user is also sending a transaction, which requires a fee.


    If a user opts to have OpenSea only mint an NFT upon sale, rather than in advance,
    this means that the NFT will not be created until a buyer purchases it. In this
    case, users need not pay the transaction fee for minting the NFT upfront, as it
    will be paid by the buyer as part of the purchase transaction. This can be a useful
    option for creators who do not want to pay upfront, or who are uncertain whether
    there is sufficient demand for their NFT to justify the cost of minting it in
    advance.


    Once minted, the NFT appears in the user’s connected wallet as a new token with
    a unique identifier. The user can then list the NFT for sale on a marketplace,
    transfer it to another wallet, or use it in any manner they wish. Any transactions
    using the NFT will incur another fee, and possibly charge a royalty.


    ## Summary


    Choosing the right NFT marketplace is one of the foundational steps for sellers.
    Renowned platforms like OpenSea, Rarible, and Nifty Gateway are often preferred,
    although some niche platforms present unique attributes, sometimes even offering
    hard-coded collections. Collections are an integral part of NFT marketplaces,
    so organizing NFTs by shared themes is an important consideration.


    Defining a collection requires creators to select the theme and design of their
    NFTs with care. While this might simply be a curation of existing assets, a collection
    more frequently reflects the innate attributes of the NFTs a creator intends to
    sell.


    The next stage is the listing process, where sellers market their collections
    with labels and descriptions. This process helps the targeted buyers identify
    that this collection is suitable for them. Subsequent steps involve the uploading
    of metadata, digital assets, and the specifics of royalties or commission percentages
    for potential resale. Before any collection launches on the marketplace, sellers
    would do well to reviewing details all the details, including pricing, of their
    assets and ensure everything aligns with their objectives.


    Successful NFT sales frequently owe their results to marketing and promotional
    strategies every bit as much as the details and value of the NFTs themselves.
    Sellers are advised to cultivate anticipation and demand long before the NFTs
    are minted – engaging potential buyers through social media channels, vibrant
    forums, and interactions with esteemed collectors is a crucial part of this process.


    Minting, the point where an NFT is actually created on the blockchain, is often
    best delayed as long as possible to minimize unnecessary expenses. In many cases
    this is one of the last steps in the process of creating and selling an NFT for
    the first time. In other situations, minting occurred long before the transaction
    and the asset is now just changing hands. The process of whitelisting enables
    community members to mint the NFT directly rather than the seller themselves,
    possibly giving them a certain level of control over what they receive or possibly
    leaving it entirely up to chance. Either way, this allows the actual creator to
    save on fees.


    From start to finish using OpenSea as an example, creators start by uploading
    the digital asset and metadata, determine the price, and decide on any royalties.
    The next step involves choosing a smart contract, signing, and sending the transaction
    to the chosen blockchain. Choosing to only mint when a sale is made allows the
    creator sidesteps the initial fees, with the buyer shouldering. The NFT is then
    sent to the purchaser’s wallet with its unique ID. At this point, many may simply
    attempt to flip the NFT for a profit, but for assets with real utility, this is
    a much less frequent occurrence. NFTs that truly serve some purpose apart from
    enriching the creator through sales are retained longer and employed by their
    owners to further their desires.


    # 4. NFT Disruption and Innovation in the Art World


    The art world has long been a space for creative expression and cultural significance,
    with physical works of art being bought, sold, and collected by enthusiasts for
    centuries. However, the digital age has also brought about transformative changes
    with one of the most significant being the emergence of NFTs. This chapter delves
    into the adoption of NFTs in the art world, the benefits for artists and collectors,
    and the controversies that have arisen as a result, and offers a comprehensive
    strategy for those looking to successfully implement NFTs into their artistic
    endeavors.'
  trans: '

    ### 铸造与白名单


    要铸造 NFT，用户通常需要通过支持 Web3 的钱包与去中心化应用（dApp）中的智能合约进行交互，从而向区块链发送交易。用户必须拥有足够的 Gas 费来支付相关费用。


    交易发送后，将由网络处理并打包进下一个区块。此过程通常需要几秒到几分钟，具体取决于区块链和当前的网络拥堵状况。交易一旦得到确认，NFT 就会被铸造出来。根据与智能合约交互所使用的
    dApp 不同，该 NFT 可能被发送到创作者的账户，也可能被发送到其他钱包地址。


    许多 NFT 创作者通过所谓的“白名单”流程进行销售：他们不直接铸造 NFT，而是将铸造权“白名单”给社区成员，由他们自行铸造。创作者通常会出售这些白名单名额，或将其赠予高活跃度的社区成员，作为对其推动藏品热度增长的奖励。这使得部分社区成员能够以初始价格购买该系列的
    NFT。


    这通常是一个更复杂的过程，但有助于确保在藏品上架销售之前就已存在买家。不过，也有一些创作者更倾向于直接在市场上架，并利用市场来铸造 NFT。


    OpenSea 的 dApp 可以作为一个例子说明其运作方式。要使用 OpenSea 的界面铸造 NFT，需要创建一个新条目，并上传 NFT 的数字资产和元数据。用户还需要在此设置价格和版税比例。


    选择“创建”选项，并挑选用于铸造 NFT 的智能合约。OpenSea 支持多种 NFT 智能合约，包括流行的 `ERC-721` 和 `ERC-1155`
    标准。然后对交易进行签名并将其发送到区块链，该交易包含创建 NFT 所需的数据。


    回想一下，“签名”交易是使用用户加密货币钱包关联的数字签名，来验证拟议活动的真实性。在某些情况下，简单的签名可以免 Gas 费完成，但在创建 NFT 时，用户同时也在发送一笔需要付费的交易。


    如果用户选择让 OpenSea 仅在售出时铸造 NFT（而非预先铸造），这意味着 NFT 将在有买家购买时才会被创建出来。在这种情况下，用户无需预先支付铸造
    NFT 的交易费，该费用将由买家在购买交易中支付。对于不想预付费用，或不确定其 NFT 是否有足够需求以证明预先铸造成本合理的创作者来说，这是一个有用的选项。


    一旦铸造完成，该 NFT 就会作为一枚带有唯一标识符的新代币出现在用户连接的钱包中。随后，用户可以将该 NFT 上架销售、转移到其他钱包，或以任何期望的方式使用。任何涉及该
    NFT 的交易都会产生额外费用，并可能需支付版税。


    ## 总结


    选择合适的 NFT 市场是卖家最基础的步骤之一。像 OpenSea、Rarible 和 Nifty Gateway 这样的知名平台通常是首选，尽管一些小众平台也具备独特属性，有时甚至提供硬编码的系列藏品。系列藏品是
    NFT 市场不可或缺的组成部分，因此按共享主题组织 NFT 是一个重要的考量。


    定义系列藏品需要创作者精心挑选其 NFT 的主题和设计。虽然这可能只是对现有资产进行策展，但系列藏品更常反映创作者打算出售的 NFT 的内在属性。


    下一个阶段是上架流程，卖家用标签和描述来推广他们的系列藏品。此过程有助于目标买家识别该系列藏品是否适合自己。后续步骤包括上传元数据、数字资产，以及潜在转售时的版税或佣金比例等细节。在任何藏品上架市场之前，卖家最好仔细检查其资产的各项细节（包括定价），确保一切符合自身目标。


    NFT 的成功销售，其营销和推广策略的重要性往往不亚于 NFT 本身的细节和价值。建议卖家在 NFT 铸造之前就早早培养市场期待和需求——通过社交媒体渠道、活跃的论坛以及与知名收藏家的互动来吸引潜在买家，是这一过程的关键部分。


    铸造（即在区块链上实际创建 NFT）的环节通常应尽可能推迟，以最大限度地减少不必要的开支。在许多情况下，这是首次创建和销售 NFT 过程中的最后步骤之一。在其他情况下，铸造可能在交易发生前很久就已完成，此时资产只是在易手。白名单流程使社区成员能够直接铸造
    NFT，而非由卖家自行铸造，这让他们对所获内容拥有一定程度的控制权，或者完全交由运气决定。无论哪种方式，这都能让实际创作者节省费用。


    以 OpenSea 为例，从头到尾的流程是：创作者首先上传数字资产和元数据，确定价格，并决定版税事宜。下一步是选择智能合约，签名并将交易发送到选定的区块链。选择仅在交易售出时铸造，可以让创作者规避初始费用，而由买家承担。随后，NFT
    会带着其唯一 ID 被发送到购买者的钱包。此时，许多人可能只想转手 NFT 以获利，但对于具有实际效用的资产而言，这种情况并不常见。那些真正除了通过销售为创作者牟利之外还有其用途的
    NFT，会被持有者更长久地保留，并用来实现自己的愿望。


    # NFT 对艺术界的颠覆与创新


    长久以来，艺术界一直是创意表达和文化意义的空间，几个世纪以来，实体艺术品被爱好者买卖和收藏。然而，数字时代也带来了变革性的变化，其中最重要的之一便是 NFT
    的出现。本章深入探讨了 NFT 在艺术界的应用，对艺术家和收藏家的益处，以及由此引发的争议，并为那些希望成功将 NFT 融入艺术创作的人提供了全面策略。

