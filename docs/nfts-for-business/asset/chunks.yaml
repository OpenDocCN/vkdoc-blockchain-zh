- fmt: '# Fashion


    This is the world of, among other things, brands, shoes, clothes, styles, accessories,
    factories, workers, models, stores, and fashion shows.


    In this world, (1) people buy clothes, (2) styles are in fashion during a period
    of time, (3) styles are out of fashion, (4) styles once out of fashion are back
    in vogue, (4) brands issue new products, and (5) brands announce that they have
    discontinued a product.


    Here are a handful of potential problems and opportunities that one encounters
    in the world of fashion:


    1. A company is selling clothing that was manufactured in a developing nation
    under near-slave conditions and a story is breaking out about how the brand manufacturing
    it has profited greatly from the sales of these products.


    2. A limited edition of a product sold by a brand is being bought and resold in
    the marketplace at a high premium.


    3. A sneaker company wants to set up a promotion event by entering into a lottery
    the first 100 people who bought a specific shoe brand five years ago.


    4. Someone wants to buy a highly sought-after limited-edition bag but they are
    not sure whether or not that bag is authentic.


    NFTs can help solve many of these problems, and even open new opportunities, in
    the following ways:


    1. If each clothing item is an NFT that contains metadata about each step of the
    production, packaging, shipment, and delivery of the product to the retail store,
    a brand associated with product can track exactly where its products are made,
    how they are packaged and shipped, and who transports and delivers them. This
    then would enable whoever in the company is in charge of the brand to quickly
    identify any risk points that may emerge – for instance, a manufacturer whose
    workers are kept in near-slave conditions – and quickly to eliminate the risk
    (for instance, seeking out a new manufacturer who treats their workers much better).


    2. To curb the practice of buying a limited-edition product only to resell it
    for high profit, a brand might require anyone who wishes to buy the product to
    place an NFT provided by the brand inside the wallet of the buyer, and market
    the product as one that comes with an NFT that enables buyer to own a virtual
    badge that they can flash in their `Instagram` or `Twitter` or other virtual places.
    The NFTs can then be attached to smart contracts that forbid the reselling of
    the NFT, making the physical product, now that the buyer is not able to buy the
    associated NFT, far less attractive than it would have been if it came with the
    NFT.


    3. When buying a pair of highly covered sneakers, a buyer may also get an NFT
    that goes into their digital wallet as proof that they own the coveted pair of
    sneakers. For the brand, the distributed NFTs could serve as a way to market to
    the NFT owners in ways that they could not have been able to do without the NFTs,
    such as identifying the first 100 people who bought the sneakers exactly five
    years to the day of the sneaker’s fifth anniversary.


    4. Similar to the bottle of wine example in the previous section, imagine pairing
    a brand bag with an NFT that contains the bag’s metadata, with specific identifying
    marks on the bag that would be nearly impossible for someone to identify, let
    alone replicate. Only someone who bought the bag for real would have the specific
    NFT that contains the unique information on the bag. This would not, of course,
    make it mathematically impossible for someone to sell fake bags, but it makes
    such counterfeit goods extremely expensive to produce, at the very least far more
    expensive than just slapping an easy to replicate brand logo on any old cheap
    bag.


    ## An Example of a Current Implementation


    `WrapTag` is a service that provides physical near-field communication tags which
    contain a `WrapTag` NFT verifying the authenticity, ownership, and history of
    the item. In other words, it is a solution that twins a physical thing with a
    record of that thing on the blockchain and blocks attempts to assert ownership
    of fake items.


    # Supply Chain


    Here, we are dealing with the world of, among other things, shipments, pallets,
    warehouses, demand, permits, shelf lives, suppliers, transportation, last miles,
    and labor.


    In this world, (1) factories make products, (2) truckers drive trucks to transport
    goods to shipment points, (3) permits are issued to enable ships to dock into
    ports or leave ports with pallets of products, (4) received product are stored
    in warehouses, and (5) customers buy things by going to stores or an online through
    ecommerce websites.


    Here are a handful of potential problems and opportunities that one encounters
    in the logistics and supply chain world:


    1. Truckers quit their jobs.


    2. A factory has slowed down production because of missing parts.


    3. Products with a rapidly approaching expiration date are languishing in a warehouse
    because the paperwork needed to transport the products is missing due to a shortage
    in the staffing of permit issuing authority.


    4. Demand for a product is slowing down because of economic conditions.


    5. On April 24, 2013, a building Rana Plaza in Savar, a suburb of Dhaka, Bangladesh,
    that housed several garment factories, a bank, and shops collapsed, resulting
    in the loss of over 1,100 lives and left more than 2,500 people injured. The catastrophe
    was one of the deadliest industrial disasters in history. Most of the victims
    were factory workers, primarily women, who were producing clothing for major global
    brands, such as H&M, Gucci, and Versace. Brands claimed that they were not aware
    that their clothes were being made in such appalling work conditions. They blamed
    lower-tier managers, their sourcing partners, and the local and national governments
    in Bangladesh.


    Here is how NFTs can help:


    1. Imagine each trucker and each truck have each an NFT associated with them,
    and that up-to-date metadata is kept on each trucker and each truck, enabling
    management to know exactly the most minute fluctuations in the supply of truckers
    and trucks and where and when bottlenecks are starting to build before they build
    and become manifest, creating last-minute pressures on truckers to drive long
    hours to make up for the shortages resulting from the bubbling shortages. Such
    information could help not only the private companies but the local, state, and
    federal government engage in actions where they are able to, to assist in averting
    the buildup of transportation bottlenecks that may result in shortages of critical
    products such as medicine, medical equipment, and baby formula, as we saw happen
    during and after the COVID pandemic. Software written on top of the NFTs, in combination
    with AI that can detect patterns and make predictions given prior scenarios, can
    provide actionable information much earlier in time, when quick adjustments, potentially
    themselves recommended by the AI, can be made.


    2. Imagine each factory is an NFT whose metadata – such as production volume and
    staffing levels – are available publicly in times of crisis, enabling everyone
    in the ecosystem that is vested in the smooth running of the factory as well as
    those who make critical decisions, such purchasing, stocking, and staffing, of
    their respective organizations, to act accordingly. Being able to obtain such
    data in a reliable way and in a timely basis can be the difference between an
    averted economic crisis and a cascading one that touches many critical sectors
    of the economy.


    3. NFTs can also help ensure that information about products with short shelf
    lives and expiration dates is available reliably and in real time to ensure proper
    prioritization of resource allocation, including staffing, and timely communication
    and coordination with various stakeholders, including government authorities to
    expedite procedures that otherwise would result expensive delays and general population
    negative impacts.'
