  trans: '

    # 市场平台


    在用户拥有加密货币钱包并获取了支付交易费用所需的资产之后，参与 NFT 生态系统的下一步便是获取 NFT 本身。许多项目拥有自己的专属 NFT 市场，您可以在其中购买其生态体系中的特定资产，但同时也有几个主流市场销售其支持区块链上的几乎所有
    NFT。


    `OpenSea`是一个广受欢迎且用户友好的 NFT 市场，支持用户购买、出售和发现 NFT。要在`OpenSea`上创建账户，只需访问网站并点击首页右上角的"注册"按钮。随后系统会提示您使用电子邮件、Google
    或 Apple 账户创建账户。账户创建完成后，您就可以开始浏览 NFT、创建藏品集，并与平台上的其他用户互动。


    在`OpenSea`上创建账户时，务必牢记需要将加密货币钱包与账户关联，才能购买、出售或创建 NFT。`OpenSea`支持多种钱包，包括`MetaMask`、`WalletConnect`和`Coinbase
    Wallet`。要将钱包关联到`OpenSea`账户，只需进入账户设置，从下拉菜单中选择"钱包"，然后按照提示输入钱包地址或扫描二维码即可完成连接。


    钱包与`OpenSea`账户关联后，您就可以开始购买、出售和创建 NFT 了。


    ## 买卖基础


    购买 NFT 相对简单。


    浏览市场并找到您喜欢的 NFT。然后您可以使用加密货币出价或直接购买。`OpenSea`主要运行在以太坊区块链上，这意味着用户通常需要持有以太坊或其他加密货币才能购买
    NFT。不过，`OpenSea`已与`MoonPay`合作，在某些情况下支持信用卡支付，通过名为"即时购买"的功能，用户可以使用法币在`OpenSea`上购买特定
    NFT。


    "即时购买"允许用户使用银行卡购买 NFT，随后由第三方支付处理商将其兑换为以太坊。这使得没有加密货币的用户也能通过传统支付方式购买 NFT。


    要在`OpenSea`上使用"即时购买"功能，用户必须先将其信用卡或借记卡关联到`OpenSea`账户。操作方法是导航至`OpenSea`首页的"即时购买"选项卡，并按照提示输入支付信息。


    添加支付方式后，用户可以搜索支持"即时购买"的 NFT。这些 NFT 在`OpenSea`市场旁边会显示"即时购买"按钮。点击此按钮将启动购买流程，用户即可使用关联的支付方式购买该
    NFT。


    并非`OpenSea`上的所有 NFT 都支持"即时购买"功能。此功能仅适用于`OpenSea`团队批准的特定 NFT。此外，"即时购买"交易需支付购买价格
    2.5%的费用。出售 NFT 则更为复杂。


    您需要先在市场上为其创建列表，包括价格、描述以及任何相关元数据等详细信息。同时，您还必须提前创建好 NFT 本身，并在此过程中仔细考虑您希望集成的所有方面和变量。NFT
    上架后，其他用户可以通过前述流程出价或直接购买。


    ## 选择市场


    如前所述，有许多 NFT 市场可供用户选择，每个市场都有其独特的功能和用户体验。例如，`SuperRare`以其精挑细选的高质量 NFT 和强调支持艺术家而闻名。


    要在`SuperRare`上创建账户，用户必须先通过验证流程申请批准，该流程包括提交作品样本和个人信息。获批后，用户可以创建个人资料，并开始浏览和竞拍 NFT。


    另一个受欢迎的 NFT 市场是`Nifty Gateway`，以其备受瞩目的艺术家合作和限量版发售而闻名。要在`Nifty Gateway`上创建账户，用户只需使用电子邮件地址注册并关联支付方式（如信用卡或银行账户）即可。


    最后，`Rarible`是另一个在独立艺术家和创作者中颇受欢迎的 NFT 市场。与`SuperRare`和`Nifty Gateway`不同，`Rarible`允许用户无需第三方验证流程即可创建和出售自己的
    NFT。要在`Rarible`上创建账户，用户只需使用电子邮件地址注册并连接其加密货币钱包即可。


    这些仅仅是众多支持各类 NFT 的市场中的一小部分。本书附录中提供了更多市场信息。建议探索多个平台，了解它们提供的不同选项和用户体验，以找到最适合您的平台。


    还有许多针对特定生态系统或应用场景的小众市场。


    其中一个例子是`Axie Infinity Marketplace`，该市场专为购买和出售`Axie` NFT 而设计，这些 NFT 用于`Axie Infinity`发行商`Sky
    Mavis`开发的游戏中。`Axie`是玩家可以在`Axie Infinity`宇宙中用来战斗并赚取奖励的生物。NFT 用于代表对这些生物的所有权。


    要参与`Axie Infinity Marketplace`，用户必须先在`Axie Infinity`平台上创建账户。随后用户可以通过在市场购买、在游戏中赚取，或参与奖学金计划来获取`Axie`。获得`Axie`后，用户可以在`Axie
    Infinity Marketplace`上将其挂牌出售，或购买其他玩家挂出的`Axie`，不过奖学金获得者不允许出售其`Axie`，因为他们并不拥有这些生物，仅是借用。

    '
- fmt: '### Transaction Details


    The Axie Infinity Marketplace uses a Dutch auction format, where the price of
    the NFT is gradually lowered until a buyer is found. NFT marketplaces can use
    a variety of other auction formats, each with their own advantages and disadvantages.


    An English Auction is the most common type of auction used in NFT marketplaces.
    These auctions start with a low price and gradually increase until a buyer is
    found. Bidders place bids that are higher than the current bid, and the highest
    bidder at the end of the auction wins the item.


    In a Vickrey auction, bidders submit sealed bids, and the highest bidder wins
    the item at the second-highest bid price. This type of auction is used to encourage
    bidders to submit their true valuations of an item, as there is no incentive to
    bid lower than what they believe the item is worth.


    A sealed bid auction is where bidders submit their bids in a sealed "envelope,"
    and the highest bidder wins the item at their bid price. This type of auction
    is commonly used in art auctions and can help to keep bids private and prevent
    auction sniping.


    Hybrid auctions combine two or more types of auctions to create a unique bidding
    process. For example, an auction might start with a Dutch auction format and then
    switch to a Vickrey auction once the price has reached a certain level. This can
    help to balance the advantages and disadvantages of each type of auction and create
    a more dynamic bidding process.


    The type of auctions a marketplace supports is one of many considerations to account
    for when deciding whether to create an account on any given NFT marketplace. However,
    there are other factors to consider besides the platform''s ease of use and user
    interface.


    One should always consider the blockchain(s) a marketplace supports. This determines
    the types of NFTs that can be traded on the platform. Some marketplaces may only
    support NFTs minted on Ethereum, while others may support a variety of blockchains
    such as Binance Smart Chain, Polygon, or Flow.


    Another factor is the fees charged. This can include fees for listing NFTs for
    sale, transaction fees for buying or selling NFTs, and royalties paid to the original
    creator of the NFT. Research and compare the fees charged by different marketplaces
    to find the one that offers the best value for your needs.


    Whether the marketplace supports royalty payments to the original creators of
    NFTs is important. Many artists and creators rely on royalties as a source of
    income. Some marketplaces, such as Foundation, prioritize supporting artists and
    enforce royalties on secondary sales of the NFTs to continue supporting creators.
    Other marketplaces may not incorporate this requirement and it is important account
    for that.


    Additionally, users should consider the market share and availability of NFTs
    on each marketplace. Some NFT marketplaces have a larger user base and a wider
    selection of NFTs, while others are more niche and offer a more limited selection
    of NFTs. It may be beneficial to research the popularity and reputation of each
    marketplace before choosing where to buy or sell NFTs.


    It is important to carefully research and consider different NFT marketplaces
    before creating an account or buying/selling NFTs. By understanding the features
    and limitations of each marketplace, users can make informed decisions that maximize
    the potential for success and profitability in the NFT space.


    Finally, it may be worth considering the reputation and community surrounding
    each NFT marketplace. This can include factors such as the marketplace''s history
    of security and transparency as well as the level of activity and innovation within
    the platform. Considering these factors allows users to make informed decisions
    about which NFT marketplaces to join and which ones are best suited to their needs
    and interests.


    ## Selling


    Once you have settled on a marketplace, the next step for a seller is creating
    a collection. For a buyer, you are largely browsing NFTs listed as part of collections
    when deciding what to purchase based on your motivations. Sellers must create
    these collections.


    Creating an NFT collection allows you to group together a set of NFTs that share
    a common theme, such as a collection of artwork or a set of trading cards. This
    can make it easier for buyers to find and purchase your NFTs and can also increase
    their value by creating a sense of exclusivity and rarity.


    Most major NFT marketplaces, such as OpenSea, Rarible, and Nifty Gateway, support
    collections. Niche ones may not support them, or may have NFTs grouped into specific
    collections which already exist in ways that are hard-coded by the developers
    based on the NFTs attributes.


    Once you''ve chosen a marketplace, created an account, and verified your identity
    (if applicable), you''ll need to decide on the theme and design of your NFT collection.
    This depends on the attributes and variables of your NFTs which you decided upon
    earlier if you are creating your own NFTs, or curating a set of existing assets
    that fit the theme of your collection. Consider the market demand for your chosen
    theme, as well as the quality and uniqueness of your assets, to maximize the value
    of your NFTs.


    Once you''ve decided on your theme and assets, you can begin the process of creating
    your NFT collection on the marketplace.


    In the case of a general NFT marketplace, you will typically be prompted to enter
    a name and description for your collection. This helps buyers understand what
    your collection is about and what they can expect from it. Then you will need
    to upload the metadata and digital assets for each NFT in the collection. This
    typically involves uploading an image or video file, along with any additional
    information about the NFT such as its name, description, and attributes. After
    that, specify any royalty or commission percentages that you wish to receive when
    your NFTs are resold.


    Finally, review and confirm the details of your NFT collection before it is listed
    for sale. This may involve reviewing the marketplace''s terms and conditions,
    but generally involves setting prices and other details for your NFTs.


    Once your NFT collection is live on the marketplace, you can start promoting it
    to potential buyers and tracking its performance over time. This involves sharing
    it on social media or other online platforms, participating in NFT communities
    and forums, and reaching out to collectors or influencers in your niche. Building
    awareness and interest in your collection increases the likelihood of sales and
    maximize the value of your NFTs.


    Take note: in most cases, this is a months-long process which is usually started
    well in advance of creating your NFTs. The moment a prospective NFT seller has
    the idea to create and sell a collection is when they should ideally begin building
    a community and interest. This way, prospective buyers are already waiting for
    these NFTs well before they are minted or sold.


    If you already have an NFT that you have uploaded, this is where the process typically
    ends. However, if you are creating new NFTs, they still need to be minted. Most
    marketplaces recommend that you do not mint your NFTs until they sell to save
    on transaction fees, so this is often the last step in the life cycle of an NFT
    transaction on a marketplace.


    Without minting the NFT, it doesn''t actually exist except as a concept in the
    mind of its creator.'
