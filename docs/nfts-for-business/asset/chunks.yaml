  trans: '

    4.  产品的旅程通常始于最终销售前六到十二个月，无论是通过零售还是批发渠道。考虑到供应链交付链中几乎每项服务都外包给某个第三方，而该第三方本身可能再进一步将服务分包给下游的第四方，要追踪任何产品的来源，更不用说产品组件的来源，更不用说其整个旅程的路径，几乎在物理上是不可能做到的。将产品乃至产品部件与
    NFT 配对，将使此类追踪变得几乎微不足道。不再有互不沟通的记录保存协议的系统孤岛，或因系统间缺乏集成而无法相互对话的情况。只有一个协议，即 NFT，以及一个系统，即区块链，每个人都在使用它来引用产品或部件，并追踪该产品或部件沿途发生的情况。


    5.  想象一下，如果我们只需扫描一件服装上的标签，就能确切知道每件物品是在哪里制造的、源自何处、如何运输、存放在哪里等等。品牌方将再也无法像 2013 年拉纳广场事件那样声称不知情。而那些本应报道剥削事件的媒体记者和编辑，也不能再声称报道此类故事成本高昂。


    ## 当前实施案例


    全球食品饮料公司雀巢推出了`Chain of Origin`，为咖啡豆提供“从作物到杯子”的供应链透明度，使供应链中所有交易的记录透明、不可篡改且可验证。这使得雀巢的合作伙伴能够以可信赖且高效的方式进行互动。该解决方案还能发现任何错误、不当行为或篡改，以便快速做出反应。


    ## 总结


    就目前而言，在 2023 年，美国每四个人中最多只有一个人听说过“NFT”这个缩写，而大多数听说过的人并不完全理解它，或者仅将其理解为与图像、视频和音频文件等数字艺术品相关的东西。在这种对
    NFT 的理解中，存在着真实世界（事物以真实方式影响人们）和 NFT 世界（一个虚构、伪装和炒作的世界，某种对游戏感兴趣的人会参与并认真对待的游戏）。这种对
    NFT 的概念是严重错误的，并且因其错误而错过了整个世界的机遇。我们的真实世界并不比数字世界更真实、更可触知：在两个世界中，我们都处理概念和类别、约定和协议，而将两个世界维系在一起的，是那些参与并在此世界中行动的人的认同。一旦我们认识到现实世界和数字世界可以融合成一个共存对象的世界，不仅解决问题而且创造新价值的创新方式的可能很快就会涌现。就目前而言，我们甚至才刚刚开始触及可能性的表面。令人兴奋的解决方案和创新就在我们面前。


    脚注


    # 8. NFT 的未来


    NFT 的未来与网络的未来紧密交织。NFT 并非凭空出现，也不是极客们在他们与世隔绝的黑暗屏幕实验室里偶然创造的古怪产物。NFT 的出现是为了解决数字世界中一个长期存在的问题——非稀缺性，并在此过程中揭示出，它们能够通过引入商品约束，让我们在数字世界中重建现实世界的基本构建模块（实体砖瓦经济），从而提供的远不止是对“现实生活”的模拟。我们发现，NFT
    实际上可以帮助我们实现最初在 20 世纪 90 年代初随着网络诞生而萌生的那个愿景：一个分布式、民主、开放、人人可访问且安全可靠的网络。而就目前而言，30
    年过去了，我们距离那个我们向往的理想之地仍然非常遥远。

