  raw: '### Music NFT Marketplaces to Consider (as of 2023)


    The landscape for NFTS in music is rapidly evolving. If you are pursuing an NFT
    strategy for your music, you may want to consider the platform to use and understand
    both its strengths and limitations. Here are some platforms that you may consider:


    1.  OpenSea: As one of the most versatile and user-friendly NFT marketplaces,
    OpenSea is highly favored among artists. Its flexibility to handle a wide range
    of digital assets, including music, art, domain names, and virtual goods, gives
    artists ample room for creative expression. OpenSea also boasts an expansive user
    base, increasing artists’ potential reach and marketability. Kings of Leon leveraged
    OpenSea to release their NFT albums, making it a well-trusted platform in the
    music industry.


    2.  Async Art: Async Art focuses on “programmable art,” which includes music.
    The unique feature here is the ability to create layered NFTs where each layer
    can be controlled independently, allowing for interactivity and dynamic change
    over time. This opens up new possibilities for musicians to create programmable
    music, where different aspects of a track can be owned and controlled by different
    people.


    3.  PlayTreks: PlayTreks is a music platform offering a 360-degree view of song
    data analytics across various platforms, including streaming services, social
    media, and online music stores. By introducing NFTs, PlayTreks allows artists
    to tokenize their music and reap the financial benefits directly, without intermediaries.
    Its comprehensive analytics can provide valuable insights into the reach and impact
    of an artist’s work, informing their strategy and marketing.


    4.  One of: One of is a green NFT platform built specifically for the music community.
    Its focus is on making NFTs affordable and accessible to all artists and fans,
    with minting costs reportedly 97% less than on Ethereum. OneOf has also partnered
    with environmental organizations to offset its carbon footprint, which could make
    it an appealing choice for environmentally conscious artists.


    5.  TuneGoNFT: TuneGoNFT is a platform that focuses on connecting artists directly
    with their fans via NFTs. The platform is designed to allow artists to tokenize
    their music, merchandise, and experiences and then sell them to their fans. TuneGoNFT
    ’s focus on creating a direct artist-to-fan connection can help artists foster
    deeper engagement with their fan base.


    6.  AirNFTs: AirNFTs is a platform where anyone can create, buy, and sell NFTs.
    For musicians, this means an accessible way to tokenize their music and sell it
    directly to fans. The platform provides a streamlined process for minting NFTs
    and offers tools to promote artists’ work, making it a favorable platform for
    artists new to the NFT space.


    7.  Onlymusix: Onlymusix presents a specialized platform for musicians, where
    artists can mint and sell their NFTs. It offers solutions for artists to monetize
    their music, live concerts, merchandise, and more. Its focus on the music industry
    makes it a highly relevant choice for artists looking to capitalize on the NFT
    wave in a space dedicated to their craft.


    Each platform provides its unique spin on the intersection of NFTs and music,
    catering to different needs and priorities of artists. Whether it’s the versatility
    of OpenSea, the programmable art concept of Async, or the green and accessible
    approach of OneOf, these platforms are paving the way for artists to explore,
    innovate, and thrive in the new digital economy of music.


    ## Summary


    Music NFTs represent a new verse in the ongoing song of music evolution. They
    offer exciting possibilities by fusing music, art, technology, and fan engagement.
    While we are only at the cusp of understanding their full potential, one thing
    is clear – music NFTs are striking a chord that’s too compelling to ignore. As
    we dance to this digital rhythm, it is crucial to keep adapting, exploring, and
    innovating. After all, isn’t that what music is all about?


    # 7. Other Use Cases


    In this chapter, our aim is twofold: first, to propose a methodology for identifying
    how this exotic thing called an NFT can be used in the real world to solve real
    problems, and second, to apply this methodology to explain and surface the value
    that NFTs are delivering and can deliver in five “real-life” sectors: event ticketing,
    food and drink, fashion, financial loans, and supply chain management.


    ## Understanding NFTs


    When someone encounters the word “NFT” today, as of this time of writing in mid-2023,
    in the crushing majority of cases their reaction is one of two: either they have
    never heard the word at all or have heard it but have no idea what it means (three
    out of four people in the United States fall into this category),^([¹](#fn1))
    or they have heard it, understand it to a nontrivial extent, but believe that
    it is a tool that one uses in the context of digital visual art – images or videos
    that one stamps with some digitally created and tracked identifier to render unique
    that piece of digital artifact within a community of other like-minded people
    who take seriously the notion that because something digital is rendered unique,
    it is valuable and worth paying *real* money for. Do NFTs *do* anything beyond
    help facilitate a game of digital pretend, where as soon as the people gathered
    were to stop pretending, the NFT, the coins, the tokens, and the ledger, used
    to keep track of this and that, go away in a puff, leaving no trace other than
    the real-life damage resulting from the real money and time and energy and emotion
    lost propping up the game? The answer – for those who have understood enough of
    NFT to be able to come up with the question – is a “no.” NFTs are essentially
    a scam, according to them, a sham, a big delusional house of pretend cards that
    is sure to come down crashing, sooner or later. This is where the vast, vast majority
    of real people who live in real life and deal with real problems stand today when
    it comes to NFTs.


    Those who do understand NFTs and who do take them seriously have a good answer
    to this witheringly skeptical perspective. They note that what we call real money
    is also a big giant pretend game, so is the consent that we give to the authorities
    that manage the game, so is everything else that complex, modern life relies on:
    from norms to ethical standards, to moral infrastructures and even taboos. None
    of it is any more “real,” less susceptible to immediate vanishing, than any of
    the instruments used in the digital world. It takes one loss of faith event in
    a currency by enough people, and that currency will collapse, with that initial
    loss of faith within a small number of panicked skeptics creating an epidemic
    of faithlessness. And once the currency has lost the confidence of those who use
    it, it becomes instantly useless – the same with the leader of a country – even
    one who has under their command all the generals and all the weaponry that come
    with it, or a mayor, or a teacher, or a spiritual leader, or an influencer. Should
    enough people decide to withdraw their assent for something, the value of that
    something, no matter how tangible in real life may be, will vanish into thin air,
    its erstwhile seeming solidity now revealed to be a mirage sustained by a tacit
    collective agreement that gave it a place and a name and a set of functions in
    our ontology of what we call “reality.”'
  trans: '

    ### 值得关注的音乐 NFT 市场（截至 2023 年）


    音乐领域的 NFT 格局正在快速演变。如果你正在为自己的音乐制定 NFT 策略，可能需要考虑使用的平台，并了解其优势与局限性。以下是一些可供参考的平台：


    1. **OpenSea**：作为功能最全面、最用户友好的 NFT 市场之一，`OpenSea`深受艺术家青睐。它支持音乐、艺术、域名和虚拟商品等多种数字资产，为艺术家提供了充分的创意表达空间。`OpenSea`还拥有庞大的用户基础，扩大了艺术家的潜在影响力和市场价值。莱昂国王乐队曾借助`OpenSea`发行
    NFT 专辑，使其成为音乐界值得信赖的平台。


    2. **Async Art**：`Async Art`专注于“可编程艺术”，其中包含音乐。其独特之处在于能够创建分层 NFT，每一层都可以独立控制，从而实现交互性和随时间动态变化。这为音乐人创造了新的可能性，得以创作可编程音乐，让一首曲目的不同方面由不同人拥有和控制。


    3. **PlayTreks**：`PlayTreks`是一个音乐平台，提供跨流媒体服务、社交媒体和在线音乐商店等多平台的歌曲数据分析全景视图。通过引入 NFT，`PlayTreks`让艺术家能够将音乐代币化，直接获得经济收益，无需中间商。其全面的数据分析功能可为艺术家提供关于作品影响力和覆盖面的宝贵见解，从而指导其策略与营销。


    4. **One of**：`One of`是一个专为音乐社区打造的绿色 NFT 平台。其核心目标是让所有艺术家和粉丝都能负担得起、便捷地使用 NFT，据报道其铸造成本比以太坊低
    97%。`OneOf`还与环保组织合作抵消碳足迹，对具有环保意识的艺术家而言颇具吸引力。


    5. **TuneGoNFT**：`TuneGoNFT`是一个专注于通过 NFT 将艺术家与粉丝直接连接的平台。该平台允许艺术家将音乐、周边商品和体验代币化，并直接出售给粉丝。`TuneGoNFT`致力于建立艺术家与粉丝的直接联系，有助于艺术家深化与粉丝群体的互动。


    6. **AirNFTs**：`AirNFTs`是一个任何人都能创建、买卖 NFT 的平台。对音乐人而言，这意味着一种便捷的方式，可以将音乐代币化并直接出售给粉丝。该平台提供简化的
    NFT 铸造流程，并提供推广艺术家作品的工具，是 NFT 领域新入行艺术家的理想选择。


    7. **Onlymusix**：`Onlymusix`是一个专为音乐人打造的专业平台，艺术家可在此铸造和出售 NFT。它为艺术家提供了音乐、现场演唱会、周边商品等的变现方案。其专注于音乐行业的定位，使其成为希望在这个专属领域把握
    NFT 浪潮的艺术家的高度相关选择。


    每个平台都为 NFT 与音乐的结合提供了独特视角，满足艺术家不同的需求和侧重点。无论是`OpenSea`的通用性、`Async`的可编程艺术概念，还是`OneOf`的绿色与亲民路线，这些平台都在为艺术家探索、创新并在新的音乐数字经济中蓬勃发展铺平道路。


    ### 总结


    音乐 NFT 代表了音乐进化长歌中的新篇章。它们融合音乐、艺术、技术和粉丝互动，带来了激动人心的可能性。虽然我们才刚刚开始理解其全部潜力，但有一件事是明确的——音乐
    NFT 正奏响一曲令人难以抗拒的强音。当我们随着这数字节奏起舞时，持续适应、探索和创新至关重要。毕竟，这不正是音乐的真谛吗？


    # 其他应用场景


    在本章中，我们的目标有二：首先，提出一套方法论，用以识别这种名为 NFT 的新奇事物如何在现实世界中解决实际问题；其次，运用这套方法论，解释并揭示 NFT
    在五个“现实生活”领域（活动票务、餐饮、时尚、金融贷款和供应链管理）中正在及能够创造的价值。


    ## 理解 NFT


    在当下（2023 年年中撰写本文时），当人们接触到“NFT”这个词时，绝大多数情况下会有两种反应：要么从未听说过，要么听说过但完全不懂其含义（四分之三的美国人属于此类）^(¹)；要么听说过并有一定程度理解，但认为它是一种用于数字视觉艺术领域的工具——通过给图像或视频打上数字创建并追踪的标识符，使其在一群志同道合的人组成的社区中变得独一无二。这些人认真相信，正是因为数字事物被赋予了独特性，它就有价值，值得用*真金白银*去购买。NFT
    除了帮助维系一场数字扮演游戏——一旦参与者停止扮演，用于记录各种信息的 NFT、代币、代币和账本就会烟消云散，除了因支撑这场游戏而损失的真金白银、时间、精力和情感所导致的现实损害外，不留痕迹——之外，还能做什么呢？对于那些对
    NFT 有足够了解、能够提出上述问题的人来说，答案是“不能”。他们认为，NFT 本质上是一场骗局、一个幌子、一座由幻想纸牌搭建的巨厦，迟早会轰然倒塌。这就是绝大多数生活在现实世界、处理现实问题的人，当下对
    NFT 的认知。


    而那些真正理解并认真对待 NFT 的人，对这种尖锐的怀疑论有很好的回应。他们指出，我们所谓的“真钱”同样是一场巨大的扮演游戏，我们赋予管理该游戏的当局的同意亦是如此，现代复杂生活所依赖的一切——从社会规范、道德标准、道德基础设施到禁忌——无一不是如此。它们中没有任何东西比数字世界使用的工具更“真实”、更不容易瞬间消失。只要足够多的人对一种货币丧失一次信心，该货币就会崩溃，最初少数惊慌失措的怀疑者的信心丧失会引发一场不信任的流行病。一旦货币失去使用者的信心，它就会瞬间变得毫无价值——国家领导人（即使他手下有所有将军和所有武器）、市长、教师、精神领袖或网红亦然。如果足够多的人决定撤回对某事物的认可，那么该事物的价值，无论其在真实生活中多么有形，都会化为乌有，其曾经看似坚固的外表将显现为一场海市蜃楼，而这场海市蜃楼不过是由一种默认的集体共识所维系的——正是这种共识，在我们所谓的“现实”本体论中，赋予了它一个位置、一个名称和一系列功能。

