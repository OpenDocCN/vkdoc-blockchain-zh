  trans: '

    我要感谢我的合著者艾哈迈德·布齐德博士和保罗·纳西索博士，感谢他们为这本书的诞生所提供的支持。这是我第一本与多人合著的作品。他们对我的稿件进行审阅、帮助我联系专家以提供更多见解、撰写手稿的很大一部分内容，以及其他诸多贡献，都使得这一切成为可能。


    此外，所有为我加深对区块链（尤其是 NFT）的认知做出过贡献的人都值得被特别感谢。我的好友兼商业伙伴让-菲利普·博德，从技术角度上，是对我理解 Web3 技术贡献最大的人。同样要特别感谢币安实验室董事总经理大卫·沙特尔沃思，他为我提供了关于
    NFT 未来发展方向的观点与洞见。


    还要感谢我的同事亚伯拉罕·崔、米哈尔·普塔奇尼克，以及其他几位在过去数年间与我深入共事的人，他们帮助我理解了区块链技术和 NFT 所能提供的广泛实际应用场景。没有这些人，我对此书的贡献将无从谈起。


    当然，如果不提及我的妻子艾米，这份致谢就不完整——感谢你在漫长的工作日和周末，当我埋头撰写这份手稿时，独自照看我们的孩子。


    ——史蒂夫·伍德


    ## 关于作者


    # 1. NFT 解决的问题


    非同质化代币（NFT）是一种数字资产，可以以艺术、音乐、游戏内物品、视频等形式呈现，如今似乎无处不在。从艺术和音乐到墨西哥卷饼和卫生纸，这些数字资产正像 17
    世纪风靡一时的异域荷兰郁金香一样热销——其中一些甚至能卖出数百万美元。


    因此，当你创造出新事物时，你理应获得与所创造价值相称的回报。为了实现这一点，我们需要将物理世界的约束复刻到数字世界中。也就是说，我们需要引入稀缺性、明确所有权、验证真实性、追溯来源，并实现版税的收取——这正是本章的基础。


    ## 引言


    技术创新的速率正以前所未有的速度加速发展，这已是不言而喻的事实。一项新技术不仅能解决一系列现有问题，还为下一代创新工具的诞生铺平了道路。最明显的例子就是个人电脑。最初问世时，PC
    是一种帮助人们更高效地完成已有事务的小工具：打字时无需再使用需要纸张、墨水和涂改液（还时不时会出故障）的打字机；计算时无需计算器；制作资产负债表时无需铅笔、钢笔、纸张和尺子；学习时无需去图书馆；玩游戏时也无需去游戏厅。


    但很快，PC 本身就成为了一个平台，催生了进一步的创新。BASIC、FORTRAN、COBOL 和 Pascal 等高级编程语言，让任何愿意学习的人都能编写新软件，为现有问题提供新的解决方案。此类软件（例如
    AutoCAD）使其用户能够以更低的成本更快地进行试验。这反过来又催生了更新的解决方案，这些解决方案本身又成为了下一代的创新引擎。


    自 20 世纪 70 年代末第一代 PC 问世以来，我们已经进入了第五个十年。从那时起，我们见证了好几波创新浪潮，每一波都开辟了新的可能性前景，同时也带来了市场采用这些可能性转化成的产品和解决方案而产生的挑战生态系统：互联网、万维网、Wi-Fi
    连接、手机、云、智能手机及其运行的移动应用，以及最近的社交网络。


    但第五个十年的新现实在于，我们几乎日复一日、在一天中几乎每一个清醒的时刻（甚至当我们睡觉时，如果包括在睡眠中监测和收集我们生命体征的设备），所做的每一件事都涉及使用数字设备——无论是台式机、笔记本电脑、平板、智能手机、智能音箱还是可穿戴设备。我们与同胞互动、购物、规划旅行、组织政治运动、听音乐、工作、点餐、学习、娱乐，以及其他一切可以想象的事情，几乎都完全在数字世界中进行。


    确实，从 Radio Shack 的 TRS-80、Commodore PET 和 Atari 800 时代以来，无论从硬件、软件，还是支撑我们世界运转的基础设施来看，我们都已取得了长足的进步。但数字生态系统的一些核心属性与支撑我们经济价值链交付体系的基本支柱之间的错位，至今仍未得到任何有意义的解决。


    数字世界的基本特征是近乎零成本和即时复制：我可以随时随地以几乎零成本无限次地复制一份文件。我可以以任何我想的方式分发这些文件。收到这些文件的人也可以这样做：他们可以以任何他们希望的方式复制和分发这些文件。在这种情况下，稀缺性、所有权、真实性、来源追溯和版税收取要么成为无意义的概念，要么几乎无法实现。在财富分配不再依赖劳动之前（而且没有人会屏息以待这样一个体系能很快出现），人类必须采用一种机制，使我们经济所依赖的价值交换能够适应我们日益数字化的现实。

    '
- fmt: '# Scarcity


    Scarcity refers to the concept of limited availability or a shortage of resources
    in relation to the demand for those resources. In economics, scarcity is a fundamental
    concept that affects the decisions individuals, businesses, and governments make
    about how to allocate resources effectively.


    In the digital world, scarcity is often a problem, since digital goods can be
    easily reproduced without limit. This means that once an original digital asset
    is created, it can be copied infinitely, leading to a lack of scarcity and a corresponding
    decrease in value.


    NFTs provide digital scarcity by creating unique, noninterchangeable digital assets.
    This means that each NFT is unique and cannot be replicated, which helps to establish
    its value. NFTs can be used to represent a variety of digital assets, including
    art, music, video games, and more. For example, an artist can create a unique
    piece of digital art and sell it as an NFT, ensuring that there is only one authentic
    copy of that piece of art in existence. Yes, replicas will exist – just as they
    exist in the physical world – but unlike the physical world, the digital world
    can solve the problem of determining whether something is an original or a copy
    of that original.


    An example of an NFT that has achieved significant value is the `CryptoPunks`
    collection. `CryptoPunks` are a series of 10,000 unique digital characters that
    were created on the `Ethereum` blockchain. Each `CryptoPunk` is one of a kind,
    and some of them have sold for millions of dollars.


    Another example is the digital artist `Beeple`, who sold a single NFT artwork
    for $69 million at a Christie’s auction in March 2021. This sale demonstrated
    the potential value of unique, noninterchangeable digital assets and the ability
    of NFTs to create scarcity in the digital world.


    A third example is the `NBA Top Shot`, a blockchain-based platform that allows
    users to buy, sell, and trade NFTs in the form of video highlights of NBA basketball
    games. Each highlight is a unique NFT, and the scarcity of each highlight is ensured
    by the limited number of moments available for each game. The popularity of `NBA
    Top Shot` has exploded, with some moments selling for hundreds of thousands of
    dollars.


    And one more is `Decentraland`, a virtual reality platform built on the `Ethereum`
    blockchain that allows users to buy, sell, and trade virtual land parcels as NFTs.
    Each land parcel is unique and cannot be replicated, creating scarcity in the
    virtual world. Users can use their land parcels to build virtual experiences,
    such as games, art galleries, and more, and monetize their creations by selling
    them as NFTs. The value of each land parcel is determined by its location, size,
    and the content that is built on it.


    # Ownership


    Ownership refers to the legal and ethical right of an individual or entity to
    claim control and possession of a tangible or intangible asset. Traditionally,
    ownership has been associated with physical objects such as a house, a car, or
    a piece of land. In the digital world, however, ownership often refers to the
    ability to control and claim ownership of digital assets, such as images, videos,
    music, podcasts, software, and other types of digital content.


    The digital world has brought about many challenges in regard to ownership. Unlike
    physical assets, digital assets can be easily replicated, shared, and distributed.
    This has made it difficult for individuals and businesses to claim ownership of
    their digital assets and control how they are used and distributed. The ease of
    digital reproduction has also led to issues of copyright infringement and intellectual
    property theft, making it challenging for artists and creators to monetize their
    work and protect their rights.


    NFTs have emerged as a solution to the problem of ownership in the digital world.
    By creating a one-of-a-kind token for a specific digital asset, NFTs not only
    allow for the creation of digital scarcity, but also unique ownership of digital
    assets.


    NFTs solve the problem of ownership in the digital world by providing a way to
    prove ownership and authenticity of digital assets. NFTs provide a way for artists,
    musicians, and creators to sell and monetize their digital creations as unique,
    one-of-a-kind assets. NFTs also provide a way for collectors to claim ownership
    of digital collectibles, such as trading cards, limited-edition collectibles,
    and rare in-game items.


    Here are five examples of how NFTs solve the problem of ownership in the digital
    world:


    - **Digital Art**: NFTs allow artists to prove ownership and authenticity of their
    digital artwork, providing a way to sell and trade their digital creations as
    unique, one-of-a-kind assets. For example, the artist `Beeple` sold a digital
    artwork called “Everydays: The First 5000 Days” for $69 million as an NFT.


    - **Collectibles**: NFTs allow collectors to claim ownership of digital collectibles,
    such as trading cards, limited-edition items, and rare in-game items. For example,
    the NBA has created `NBA Top Shot`, a platform for buying and selling digital
    collectibles in the form of NFTs.


    - **Music**: NFTs provide a way for musicians and music producers to claim ownership
    of their music, sell unique experiences, and control the distribution of their
    music. For example, the musician `Grimes` sold an NFT collection that included
    unreleased music and art for nearly $6 million.


    - **Virtual real estate**: NFTs allow for ownership of virtual real estate in
    online games and virtual worlds, providing a way for players to own and trade
    virtual assets. For example, the virtual world `Decentraland` allows players to
    buy and sell virtual land as NFTs.


    - **Domain names**: NFTs allow for the ownership and transfer of domain names,
    providing a way for individuals and businesses to claim and sell unique domain
    names as one-of-a-kind assets. For example, the domain name `eth.com` was sold
    for $2 million as an NFT.'
