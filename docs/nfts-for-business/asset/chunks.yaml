  trans: "\n### 艺术与文化的商品化\n\n批评者认为，非同质化代币的兴起导致了艺术的过度商业化，收藏家和投机者更倾向于将数字艺术品视为可交易资产，而非具有意义的创意表达。他们声称，这种转变可能导致人们追逐经济利益，而牺牲艺术价值与文化意义。\n\
    \n然而，非同质化代币的支持者认为，艺术界始终与商业密不可分，而非同质化代币只是艺术家将其作品变现的一种新媒介。他们坚持认为，非同质化代币的经济成功可以使艺术家维持生计，并为未来项目提供资金，从而最终丰富文化景观。\n\
    \n### 排他性与可及性\n\n最后，排他性与可及性问题一直是 NFT 艺术界争论的关键点。有些人认为，NFT 迎合了富有的收藏家，并为财力较弱的群体设置了准入门槛，从而延续了艺术界的精英主义本质。他们主张，这可能导致代表性不足的艺术家和社区进一步被边缘化。\n\
    \n另一方面，支持者则强调 NFT 在艺术市场民主化方面的作用。他们声称，NFT 平台为新兴艺术家提供了向全球观众展示其作品的机会，绕过了画廊和拍卖行等传统守门人。此外，有人提出通过\
    \ NFT 的部分所有权，来让更广泛的收藏家群体更容易接触数字艺术。\n\n## 艺术家与收藏家的策略\n\n随着非同质化代币的出现，数字艺术界经历了变革性的转变，为艺术家和收藏家都带来了新的机遇。随着越来越多人进入\
    \ NFT 艺术市场，了解有助于他们在这一快速发展的领域中取得成功的策略至关重要。\n\n以下是艺术家和收藏家在进入 NFT 艺术世界时应考虑的一些关键策略。\n\
    \n1. 艺术家的策略\n    1. 建立独特的艺术身份\n        1. 形成独特且可识别的风格，使艺术家在 NFT 领域脱颖而出。\n    \
    \    2. 通过数字创作传达一致的艺术愿景或信息。\n    2. 建立线上形象\n        1. 利用社交媒体平台展示艺术作品，与粉丝互动，并建立社群。\n\
    \        2. 创建个人网站或作品集来展示和销售数字艺术。这是在 NFT 市场平台上市之外的补充方式。\n    3. 拥抱合作与人脉拓展\n  \
    \      1. 与其他艺术家、影响者或品牌合作，创建联合 NFT 项目或相互推广作品。\n        2. 参与致力于数字艺术和 NFT 的在线论坛和社群，以拓展专业人脉并向其他艺术家学习。\n\
    \    4. 选择合适的 NFT 市场\n        1. 研究不同的 NFT 市场，找到最符合艺术家风格、目标受众和价值观的平台。\n      \
    \  2. 评估平台费用、用户体验以及对环保实践的支持等因素。\n        3. 可供考虑的若干 NFT 市场：\n            1. `OpenSea`：`OpenSea`是规模最大、最受欢迎的\
    \ NFT 市场之一，提供包括艺术品、收藏品、域名和虚拟商品在内的广泛数字资产。它支持以太坊和 Polygon 区块链，并为创作者和收藏家提供易用的界面。\n\
    \            2. `Rarible`：`Rarible`是一个去中心化的 NFT 市场，允许用户创建、购买和销售数字艺术与收藏品。它具有用户友好的平台，并提供治理代币（`RARI`），使其社区能够参与决策过程。\n\
    \            3. `SuperRare`：`SuperRare`是一个策展型市场，专注于高质量的单版数字艺术品。它拥有严格的筛选流程，并以展示\
    \ NFT 领域顶尖艺术家的作品而闻名。该平台基于以太坊区块链构建。\n            4. `Foundation`：`Foundation`是另一个策展型\
    \ NFT 市场，连接数字艺术家与收藏家。它强调创意创新，并支持从新兴人才到知名艺术家的多元化艺术家群体。该平台在以太坊网络上运行。\n         \
    \   5. `Nifty Gateway`：`Nifty Gateway`是一个中心化的 NFT 平台，定期举办来自知名艺术家和品牌的独家限量版数字艺术品的“发售”活动。它提供用户友好的体验并支持信用卡支付，使其对加密社区之外的更广泛受众也具有可及性。\n\
    \            6. `Async Art`：`Async Art`是一个独特的 NFT 平台，专注于可编程艺术，允许艺术家创作具有可调整图层或元素的数字艺术品。收藏家可以拥有艺术品的单个图层或元素并进行修改，从而产生动态且不断演变的艺术作品。\n\
    \            7. `KnownOrigin`：`KnownOrigin`是一个策展型 NFT 平台，专注于来自新兴和知名艺术家的高质量数字艺术品。它在以太坊区块链上运行，并提供包括拍卖、版次和艺术家合作在内的一系列功能。\n\
    \            8. `Hic et Nunc`（`HEN`）：`Hic et Nunc`是一个基于 Tezos 区块链构建的 NFT 平台，以其节能的权益证明共识机制而闻名。它高度关注可持续性，并为艺术家提供铸造和销售数字创作的简单界面。\n\
    \    5. 这些市场提供不同的功能、费用和体验，因此艺术家和收藏家在进入 NFT 艺术世界之前，应仔细考虑哪个平台最符合他们的需求、偏好和价值观。\n\
    \    6. 定价与版次\n        1. 根据市场需求、制作成本和艺术家声誉等因素，确定数字艺术的适当定价结构。\n        2. 考虑创建限量版或独一无二的作品的好处，以提升艺术品的感知价值和排他性。\n\
    \    7. 营销与推广\n        1. 利用社交媒体、电子邮件营销和公共关系来为 NFT 艺术品的发布造势。\n        2. 利用数据分析来监控营销工作的有效性，并相应调整策略。\n\
    \n2. 收藏家的策略\n    1. 制定收藏策略\n        1. 明确收藏家的目标和动机，例如获取经济利益、支持新兴艺术家或保护文化遗产。\n\
    \        2. 为收藏品确定一个焦点或利基领域，例如特定的艺术风格、主题或艺术家。\n    2. 进行充分研究\n        1. 在购买数字艺术品之前，调查艺术家的背景和资质。\n\
    \        2. 分析市场趋势和销售数据，以便就收购哪些 NFT 做出明智的决定。\n    3. 融入艺术社群\n        1. 参与致力于\
    \ NFT 艺术的在线论坛、社交媒体群组和活动，以拓展知识并在社群内建立联系。\n        2. 参加虚拟展览、拍卖和艺术家讲座，以了解 NFT 艺术世界的最新发展动态。\n\
    \    4. 确保 NFT 艺术品的真实性与来源\n        1. 在购买前，验证与 NFT 相关的来源、所有权历史和智能合约。\n       \
    \ 2. 如有必要，咨询专家或利用第三方认证服务。\n    5. 管理和保护 NFT 收藏品\n        1. 选择安全的数字钱包来存储 NFT 并保护私钥。\n\
    \        2. 定期监控收藏品的价值，并考虑保险或资产保护方案。\n"
- fmt: '## Summary


    The advent of NFTs has undoubtedly disrupted the art world, introducing new opportunities
    for artists and collectors while also raising significant concerns and debates.


    As the adoption of NFTs continues to grow, it is crucial for stakeholders to engage
    in ongoing conversations about the implications of this technology and its impact
    on the art world. Adopters of NFT also require a thoughtful strategy – where artists
    and collectors carefully select the right NFT marketplaces, developing the appropriate
    target audience and marketing strategies. Only by embracing both the benefits
    and addressing the controversies surrounding NFTs can the art world navigate the
    complex landscape of this digital revolution.


    Entering the NFT art world can be both exciting and challenging for artists and
    collectors. By adopting the strategies outlined in this chapter, artists and collectors
    can better navigate the complexities of the NFT market, maximize their success,
    and contribute to the continued growth and evolution of digital art.


    # 5. The Gaming Industry and NFTs


    The gaming industry has experienced a monumental shift in recent years, driven
    by rapid advancements in technology and the proliferation of the Internet. As
    games have grown in complexity and sophistication, the demand for unique and personalized
    in-game assets has also increased.


    The implementation of non-fungible tokens (NFTs) in the gaming sector is a natural
    progression, providing a framework that can accommodate the needs of both developers
    and players alike. This use case for blockchain has caught fire, with over half
    of all blockchain activity coming from games and new games launching almost every
    day.


    The vast majority of new blockchain game launches come from startups. Venture
    capital–backed studios with oftentimes zero games of their own, though frequently
    composed of at least one person with a background at a more traditional game studio,
    build a playable demo for a proposed game which integrates crypto and NFTs. Many
    of these get funded and then go on to launch games where the focus is often primarily
    on the tokenomics, giving gamers a way to earn money while trying to avoid a death
    spiral. Not all blockchain games follow this approach though.


    ## Games’ Approaches to NFTs


    There are games which keep their focus on gameplay while integrating Web3 functions,
    some which add Web3 functions after having been released as a Web2 game for a
    while, and some where players wouldn’t even be able to tell the game they’re playing
    is Web3. Let’s take a look at a few examples of each major implementation of blockchain
    into games.


    A classic fully Web3 game would be Splinterlands. Splinterlands is a “card” game,
    similar to many other pure Web3 games; players build “decks” of “cards” representing
    different spells and creatures, which they use to battle other players in PvP
    turn-based combat. Cards can be upgraded over time with experience points and
    in-game resources. Each card is an NFT, meaning the entire core of the game is
    built around this technology.


    Of course, when most people think of Web3 games, one of the first games which
    comes to mind is Sky Mavis’ Axie Infinity. All the characters in this game, where
    players assemble teams of “Axies” to fight each other, are NFTs.


    A different sort of game is Lords of Light, developed by Raini Studios and released
    in 2021 and had a collection of Web3 features included upon launch. This game
    is a mobile role-playing game (RPG) where players build kingdoms, collect and
    upgrade heroes within that kingdom, and battle other players in a medieval fantasy
    world with resources to collect, areas to explore, and quests to complete. The
    in-game currency for Lords of Light is Light tokens, but more importantly, the
    game uses NFTs for assets. The heroes, weapons, and armor that players collect
    are all NFTs, and other NFTs unlock access to special game features such as limited-time
    events.


    Swords of Blood by Hit Box Games is another RPG-style game incorporating Web3
    features like NFTs. It is an extension of a prior game by the same publisher called
    Blade Bound, which did not have any Web3 aspects at all and was entirely Web2.
    Swords of Blood takes that previously successful model and adds NFTs for high-value
    items, all housed within a wallet incorporated into the game. The Web2 model is
    still part of this game, but players start to accumulate NFTs and Web3 assets
    as they play.


    NFT games aren’t just an endeavor for smaller or niche studios though. Major brands
    and institutions are building experiences around them as well. World Cup AI League,
    developed by Altered State Machine, is one such example. This game, sponsored
    by none other than FIFA, has players assemble a team of four AI-powered players.
    The developers aim to integrate an NFT marketplace, after which all players and
    characters in the game will be NFTs. This game was designed with Web3 features
    in mind from the beginning, but initially released without them as the developers
    wanted to incorporate them later.


    Square Enix is probably the biggest game developer to start building a game that
    incorporates NFTs. The game, Symbiogenesis, does not actually require a player
    to have any NFTs but have a degraded experience if they do not. Character NFTs
    enable players to read unique stories, gain experience fast, earn additional rewards
    from completing missions, create “replicas” of their characters, and more.


    All these examples are mostly cases of trailblazers though – statistics on blockchain
    adoption in gaming show that it is far from universal. As of early 2023, a survey
    of game developers by industry conference group GDC indicated that roughly a quarter
    of game studios have any interest in developing blockchain-powered games, but
    only about 2% of studios are actively doing so. This figure represented a small
    decrease from the previous report issued in early 2022, which put the figure at
    around 27% for crypto and 28% for NFTs.


    Many game developers and studios view blockchain as having no place in the gaming
    sector, a solution in search of a problem, strictly a vehicle for fraud, or even
    just an inferior way to do things when a centralized database can do the job.
    There is merit to these criticisms in many cases, and many of the scores of blockchain
    games that launch are poorly thought-out or raise red flags by focusing far too
    much on the blockchain aspects and not on the game aspects. That said, a proper
    implementation of assets like NFTs only serves to improve user experiences.'
