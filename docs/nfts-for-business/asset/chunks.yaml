  trans: '

    ### 文件大小


    文件大小问题在 NFT 领域是一个重要的考量，尤其是在区块链上存储和传输它们时。由于 NFT 通常由数字文件（例如图片或视频）组成，这些文件的体积可能相当大，特别是对于高质量或高分辨率的内容而言。这给存储容量和带宽有限的区块链网络带来了挑战。


    解决这个问题的一种方法是使用压缩技术，在不牺牲质量的情况下减小文件大小。然而，文件大小和质量之间存在权衡，在某些情况下，压缩可能导致细节丢失或视觉伪影，从而对
    NFT 的价值产生负面影响。


    最常见的方法是将文件存储在链下，而不是存储在区块链本身。这涉及将文件存储在单独的服务器或云存储平台上，并通过唯一的标识符或哈希值从 NFT 链接到该文件。这种方法有助于减小区块链上
    NFT 的体积，同时在需要时仍能访问原始文件。然而，这也引入了额外的复杂性和潜在的故障点——链下存储平台必须保持维护和可访问，以便访问该文件。


    这种方法在 NFT 社区中也一直是争议点，有些人指责其是骗局。链下存储要求用于链接文件的唯一标识符或哈希值保持安全且可访问，这本身就是一个挑战。此外，维持存储平台的在线状态也可能出现问题，如果平台宕机或被黑客攻击，可能会危及
    NFT 的真实性。


    这也造成了一个漏洞，即创建 NFT 和链下存储的人可以修改存储在链下的文件，从而从远处有效销毁该 NFT。这个漏洞在 2021 年由加密短信应用 Signal
    的创始人展示，他出售的 NFT 指向一个文件，后来他将该文件替换为便便表情符号，以此作为一个警示故事。


    ### 存储考量


    为了解决这些问题，一些 NFT 创作者转向了去中心化的存储解决方案，例如 `IPFS`（星际文件系统）或 `Arweave`。这些平台提供了一种更安全、更去中心化的文件存储方法，有助于减轻与链下存储相关的潜在风险。这些解决方案并非完美，但随着时间的推移在不断改进。


    尽管存在这些担忧，链下存储仍然是许多 NFT 创作者青睐的方法，因为它允许他们创建和销售 NFT，而无需担心链上存储的限制。然而，NFT 买家在购买前应了解相关风险，并仔细评估
    NFT 的真实性和价值。


    `BSV`（比特币中本聪愿景）区块链是原始比特币区块链的一个分叉，它对 NFT 文件大小问题采取了不同的方法。与其他限制单个交易大小的区块链不同，`BSV`
    区块链允许更大的交易，因为它对区块大小没有上限。这是因为 `BSV` 区块链专注于支持大规模数据应用。


    通过允许更大的交易，`BSV` 区块链能够在链上存储更多信息，包括更大的 NFT 文件。这种方法消除了对链下存储的需求。此外，它还可以降低创建和转移 NFT
    相关的交易成本，因为其他区块链上的大额交易可能更昂贵。


    然而，`BSV` 区块链更大的交易大小限制也带来了潜在的安全风险。大额交易在网络中传播以及被节点验证所需的时间可能更长，这可能会使其容易受到攻击。此外，较大的交易也可能被用来膨胀区块链，消耗更多的存储和处理资源。


    文件大小对 NFT 创作者和收藏者来说是一个重大挑战，尤其是在对高质量和高分辨率内容的需求持续增长的情况下。在文件大小、质量和可访问性之间找到平衡，对于确保
    NFT 作为一种数字资产类别的长期价值和可行性至关重要。


    最终，NFT 的各个方面或变量将取决于具体的用例和目标市场。例如，一张收藏卡可能具有与一块虚拟房地产不同的内在和外在变量。仔细考虑 NFT 的各个方面和变量，以创建独特且有价值的数字资产，这一点至关重要。

    '
- fmt: '### Content and Chain Selection


    Once you have determined the aspects of your NFT, the next step is to create the
    digital content that will make up the NFT. This could include creating the artwork
    or other digital media, or it could involve compiling and organizing existing
    content into a format that can be tokenized as an NFT. Make sure the digital content
    is of high quality and properly licensed, or at least attributed to the appropriate
    creators.


    Once the digital file for the NFT is created, the next step is to prepare the
    metadata. This includes information such as the name of the NFT, a description
    of the artwork, and the artist’s name. Additionally, metadata can include any
    additional attributes that are relevant to the NFT, such as its rarity or edition
    number.


    This information is stored on the blockchain along with the digital file, creating
    a permanent record of the NFT’s characteristics. It is also used to provide information
    about the NFT’s provenance, ownership, and other relevant details. The metadata
    should be carefully curated and should accurately reflect the unique qualities
    and characteristics of the NFT.


    Once you have created the digital content and metadata for your NFT, the next
    step is to choose the blockchain on which you will mint the NFT.


    This typically involves choosing a chain that supports NFTs and selecting a compatible
    smart contract to use for minting the NFT. Ensure the blockchain and smart contract
    you choose are secure and well maintained, as this helps maintain the long-term
    viability and value of your NFT.


    Ethereum is currently the most widely used blockchain for creating and trading
    NFTs. The `ERC-721` and `ERC-1155` smart contracts are specifically designed for
    creating and managing NFTs. They are supported by a wide range of wallets, marketplaces,
    and other NFT-related tools. These contracts have been used to create NFTs for
    a wide range of use cases, including art, music, gaming, and collectibles.


    For art, music, and collectibles, the `ERC-721` contract is a popular choice,
    as it allows for the creation of unique, one-of-a-kind NFTs that can be used to
    represent individual pieces of content. For gaming and other use cases that involve
    the creation of multiple, identical NFTs, the `ERC-1155` contract is often used,
    as it allows for the creation of semi-fungible NFTs sometimes called SFTs that
    can be used to represent multiple copies of the same content.


    In addition to Ethereum, other blockchains are also being used to create and trade
    NFTs. For example, the Binance Smart Chain (BSC) and Polygon networks have gained
    popularity as alternatives to Ethereum due to their lower transaction fees and
    faster transaction times. The Binance Smart Chain supports the creation of NFTs
    using the `BEP-721` and `BEP-1155` smart contracts, while Polygon still uses the
    `ERC-1155` and `ERC-721` contracts.


    Other blockchains that support NFTs include the Flow blockchain, which is specifically
    designed for creating NFTs and other digital assets for use in games and other
    applications, and the Tezos blockchain, which supports NFTs through the `FA2`
    token standard. The Polkadot blockchain also supports NFTs through the Substrate
    framework, which allows for the creation of custom smart contracts.


    When it comes to specific use cases, there are certain blockchains and smart contracts
    that may be more optimal. For example, the WAX blockchain has gained popularity
    in the collectibles space, due to its focus on creating a user-friendly experience
    for creating and trading NFTs. The WAX blockchain uses the `AtomicAssets` standard,
    which is specifically designed for creating NFTs for use in games, collectibles,
    and other applications.


    In the music industry, there are several platforms that have emerged to help artists
    create and sell NFTs. These include platforms such as Audius, which uses the Solana
    blockchain, and Royal, which uses the Ethereum blockchain. These platforms are
    specifically designed to help musicians create and sell NFTs that represent their
    music, and often include features such as royalty tracking and revenue sharing.


    In the event ticketing space, blockchains such as the Hedera Hashgraph and the
    Polygon network are being used to create NFT-based ticketing systems. These systems
    allow event organizers to create NFTs that represent tickets to their events,
    which can then be securely transferred and verified using the blockchain. This
    helps to reduce fraud and ensure that only legitimate ticket holders are able
    to attend the event.


    Finally, you will need to choose a marketplace on which to list and sell your
    NFT.


    There are a number of popular NFT marketplaces, such as OpenSea, Rarible, and
    SuperRare, each of which has its own strengths and weaknesses. Choose a marketplace
    that is well suited to the particular qualities and characteristics of your NFT
    and that has a strong user base.'
