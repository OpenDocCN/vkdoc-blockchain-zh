  trans: '

    ### 内容与区块链选择


    在确定好 NFT 的各个属性后，下一步就是创作构成 NFT 的数字内容。这可能包括创作艺术品或其他数字媒体，也可能涉及将现有内容汇编整理成可代币化为 NFT
    的格式。请确保数字内容具有高质量且获得适当授权，或至少注明原创作者。


    创建好 NFT 的数字文件后，下一步是准备元数据。这些信息包括 NFT 的名称、艺术品描述以及艺术家姓名。此外，元数据还可以包含与 NFT 相关的任何附加属性，例如稀有度或版本编号。


    这些信息与数字文件一同存储在区块链上，从而创建 NFT 特征的永久记录。元数据还用于提供关于 NFT 来源、所有权及其他相关细节的信息。元数据应经过精心策划，并准确反映
    NFT 的独特品质与特征。


    为 NFT 创建好数字内容和元数据后，下一步是选择铸造 NFT 的区块链。


    这通常涉及选择一个支持 NFT 的区块链，并选用兼容的智能合约进行铸造。确保所选用的区块链和智能合约安全可靠且维护良好，因为这有助于维护 NFT 的长期可行性及价值。


    以太坊是目前用于创建和交易 NFT 最广泛的区块链。专门用于创建和管理 NFT 的`ERC-721`和`ERC-1155`智能合约，得到众多钱包、市场及其他
    NFT 相关工具的支持。这些合约已被用于创建涵盖艺术、音乐、游戏和收藏品等广泛用例的 NFT。


    对于艺术、音乐和收藏品，`ERC-721`合约是热门选择，因为它允许创建独一无二、可用于代表单件内容的 NFT。对于涉及创建大量相同 NFT 的游戏及其他用例，则常使用`ERC-1155`合约，因为它允许创建半同质化
    NFT（有时称为 SFT），可用于代表同一内容的多个副本。


    除以太坊外，其他区块链也在被用于创建和交易 NFT。例如，币安智能链和 Polygon 网络因其较低的交易费用和更快的交易速度，已成为以太坊的热门替代方案。币安智能链支持使用`BEP-721`和`BEP-1155`智能合约创建
    NFT，而 Polygon 仍沿用`ERC-1155`和`ERC-721`合约。


    其他支持 NFT 的区块链包括 Flow 区块链——专门为在游戏和其他应用中创建 NFT 及其他数字资产而设计；以及 Tezos 区块链，它通过`FA2`代币标准支持
    NFT。Polkadot 区块链也通过 Substrate 框架支持 NFT，该框架允许创建自定义智能合约。


    针对特定用例，某些区块链和智能合约可能更具优势。例如，WAX 区块链在收藏品领域备受青睐，因其专注于为创建和交易 NFT 打造用户友好的体验。WAX 区块链使用`AtomicAssets`标准，该标准专为在游戏、收藏品及其他应用中创建
    NFT 而设计。


    在音乐行业，已涌现多个帮助艺术家创建和销售 NFT 的平台。这些平台包括使用 Solana 区块链的 Audius，以及使用以太坊区块链的 Royal。这些平台专门帮助音乐人创建和销售代表其音乐作品的
    NFT，并常包含版税追踪和收入分成等功能。


    在活动票务领域，Hedera Hashgraph 和 Polygon 网络等区块链正被用于创建基于 NFT 的票务系统。这些系统允许活动组织者创建代表活动门票的
    NFT，并可通过区块链安全转移和验证。这有助于减少欺诈，确保只有合法持票人才能参加活动。


    最后，您需要选择一个市场来上架和销售您的 NFT。


    目前有许多流行的 NFT 市场，例如 OpenSea、Rarible 和 SuperRare，每个都有自己的优缺点。请选择一个最适合您 NFT 特质、且拥有强大用户基础的市场。

    '
- fmt: '## Wallets


    Cryptocurrency wallets are a crucial component of the NFT ecosystem, as they are
    used to store, manage, and transfer NFTs. You will need to have a cryptocurrency
    wallet that supports the chain on which you plan to mint and trade your NFTs.


    There are many different types of cryptocurrency wallets available, including
    desktop wallets, mobile wallets, and hardware wallets. Desktop wallets are software
    programs that you install on your computer. They are convenient for users who
    want to store their NFTs on their computer and have easy access to them. One of
    the benefits of desktop wallets is that they are typically free to use and offer
    a high degree of security if properly configured.


    Desktop wallets do have vulnerability to malware and hacking attempts, which could
    result in the loss of your NFTs. Also, if your computer crashes or is stolen,
    you could lose access to your NFTs.


    Mobile wallets are apps that you download to your smartphone or tablet. They are
    convenient for users who want to access their NFTs on the go. One of the benefits
    of mobile wallets is that they are typically easy to use and offer a high degree
    of accessibility.


    However, mobile wallets may not offer the same level of security as desktop or
    hardware wallets. Unfortunately, if you lose your phone or it is stolen, you could
    lose access to your NFTs unless you have a backup of your wallet.


    Hardware wallets are physical devices that you connect to your computer or smartphone.
    They are convenient for users who want to safeguard their NFTs with air-gapped
    storage to protect them from hacking attempts and malware. Hardware wallets are
    typically considered the most secure option for digital assets like NFTs; they
    offer an extra layer of security through the use of a physical device.


    One drawback to hardware wallets is that they can be expensive to purchase, and
    may require some technical knowledge to set up and use properly. In addition,
    hardware wallets can be damaged or stolen, which could cause irreparable loss.


    Regardless of the type of wallet you choose, it is imperative that you back it
    up and follow best practices for wallet security. This includes creating a strong,
    unique password, enabling two-factor authentication, and writing down your wallet''s
    seed phrase or private key, then storing it in a secure location.


    Since wallets are very commonly secured with a 12- or 24-word mnemonic seed phrase,
    those who create them must write this seed phrase down in a secure location should
    something happen to their wallet, and make certain never to show this phrase to
    anyone or risk it in any way. Do not allow it to be seen by any cameras, and do
    not read it out loud.


    Additionally, it is important to only download wallets and other cryptocurrency-related
    software from trusted sources and to be vigilant for phishing scams and other
    forms of fraud that could compromise your wallet''s security.


    Consider factors such as security, ease of use, and compatibility with the chain
    you plan to use when choosing a wallet. Some wallets are designed specifically
    for certain chains, while others support many. Choose a wallet that allows you
    to maintain control over your private keys.


    One of the most popular options for storing and managing NFTs is the `MetaMask`
    wallet. `MetaMask` is a browser extension that is free to use and is available
    for Chrome, Firefox, Brave, and other popular browsers. There is also a mobile
    app available for Android and iOS devices. It allows users to connect to decentralized
    applications (dApps) on various blockchains, including Ethereum and Polygon, and
    is compatible with a wide range of NFT marketplaces and platforms.


    Another popular option is the `Trust Wallet`, which is a mobile wallet that supports
    a variety of blockchains. `Trust Wallet` is commonly praised for its ease of use
    and intuitive interface.


    When it comes to hardware wallets, some of the most popular options are the `Ledger
    Nano` or `Trezor`. While they often operate in a stand-alone environment and are
    mainly suited for providing an offline, cold storage solution for storing cryptocurrency
    and NFTs rather than facilitating active usage, there have been advances on this
    front.


    `Trezor`, for example, has an integration with the popular software wallet `Exodus`
    which makes using your NFTs easier. Also, while `Ledger` was long considered the
    gold standard for hardware wallets, its controversial move to offer "seed phrase
    recovery" services has called its security into question.


    To create a `MetaMask` wallet, the first thing to do is go to the `MetaMask` website
    and click "Get Extension", selecting the relevant choice based on your browser.
    Install the extension and follow the prompts to create a new wallet. Write down
    your seed phrase and store it somewhere safe. You can then connect it to various
    dApps that support NFT transactions by clicking the `MetaMask` extension.


    As for the `Trust Wallet`, download the app from the App Store or Google Play
    Store, then open it. Write down your seed phrase and store it somewhere safe.
    At that point the wallet is set up, and you can connect it to various dApps that
    support NFT transactions by using the built-in web browser.


    After all this is done, you can start interacting with NFTs. If you want to buy
    or sell an NFT, connect your wallet to a marketplace and authorize transactions
    through your wallet. The process may differ slightly depending on the specific
    dApp and transaction, but generally involves following a few prompts within the
    wallet app to confirm the transaction and pay any associated fees.


    Nearly every activity on a blockchain requires the user to pay a transaction fee.
    Transaction fees, or gas fees, are part of almost every blockchain. Any transaction
    on a blockchain network carries a fee paid to the network to compensate the nodes
    for processing the transaction. Fees tend to be paid in the chain''s native cryptocurrency.


    The size of the fee depends on several factors, such as the network''s congestion,
    the complexity of the transaction, the desired processing time, and some intrinsic
    aspects of the blockchain in question such as its consensus mechanism. The more
    congested the network is, the higher the fees. Miners and validators prioritize
    transactions with higher fees since they earn more rewards for processing them.


    Purchase the needed assets on exchanges or get them from other users. Remember
    to monitor transaction fees regularly to avoid paying excessive amounts for transactions.'
