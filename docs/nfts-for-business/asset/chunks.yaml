  trans: '

    # 时尚


    这是一个由品牌、鞋履、服饰、风格、配饰、工厂、工人、模特、店铺以及时装秀等元素共同构筑的世界。


    在这个世界里，(1) 人们购买衣物，(2) 风格在一段时间内成为时尚，(3) 风格逐渐过时，(4) 一度过时的风格再度流行，(5) 品牌发布新品，以及 (6)
    品牌宣布某产品停产。


    以下是人们在时尚界可能会遇到的一些潜在问题与机遇：


    1. 某公司正在销售由发展中国家在近乎奴隶制条件下生产的服装，而一则新闻曝光了该品牌通过这些产品的销售获得了巨额利润。


    2. 某品牌销售的限量版产品在市场上被高价买进并转售。


    3. 一家运动鞋公司希望举办促销活动，在五年前购买特定鞋款的前 100 名顾客中，通过抽奖方式选出参与者。


    4. 有人想购买一款备受追捧的限量版手袋，但不确定该手袋是否为正品。


    NFT 可以通过以下方式帮助解决这些问题，甚至开辟新的机遇：


    1. 如果每件服装都是一个包含产品生产、包装、运输及配送至零售店各环节元数据的 NFT，与该产品相关的品牌就能精确追踪产品的产地、包装与运输方式，以及负责运输和配送的人员。这样一来，公司负责品牌管理的人员就能迅速识别可能出现的任何风险点——例如，某家工厂的工人处于近乎奴隶制的劳动条件下——并及时消除风险（比如，寻找一家对待员工更优的新制造商）。


    2. 为遏制购买限量版产品仅为了高价转售的行为，品牌可以要求任何希望购买该产品的人，将品牌提供的 NFT 放入购买者的钱包中，并将产品宣传为附有 NFT 的版本，使购买者能够拥有一个虚拟徽章，可在其
    `Instagram` 或 `Twitter` 等虚拟空间展示。这些 NFT 随后可附加到禁止转售该 NFT 的智能合约上。由于购买者无法购得与之关联的 NFT，该实体产品的吸引力便会远低于附带
    NFT 的版本。


    3. 当购买一双备受追捧的运动鞋时，买家还可能获得一个存入其数字钱包的 NFT，作为其拥有这双梦寐以求运动鞋的凭证。对于品牌而言，这些分发出去的 NFT 可作为一种营销手段，通过在没有
    NFT 的情况下无法实现的方式（例如，在运动鞋上市五周年之际，精准锁定恰好于五年前当天购买该鞋的前 100 名顾客）向 NFT 所有者进行推广。


    4. 类似于上一节中提到的酒瓶示例，设想将一款品牌手袋与一个包含该手袋元数据的 NFT 关联起来，并在手袋上添加几乎无法被识别、更难以复制的特定标识。只有真正购买该手袋的人，才拥有包含手袋上独特信息的专属
    NFT。这当然无法从数学上杜绝假包销售，但至少会使得生产此类仿冒品的成本变得极其高昂，远高于随便在一个廉价旧包上贴个易仿冒的品牌标识。


    ## 当前实现的一个示例


    `WrapTag` 是一项提供实体近场通信标签的服务，这些标签包含一个 `WrapTag` NFT，用于验证物品的真实性、所有权和历史记录。换言之，它是一种将实体物品与该物品在区块链上的记录相结合的解决方案，并能阻止声称拥有假冒物品所有权企图。


    # 供应链


    在这里，我们面对的是一个由货运、托盘、仓库、需求、许可证、保质期、供应商、运输、最后一公里和劳动力等元素构成的世界。


    在这个世界里，(1) 工厂制造产品，(2) 卡车司机驾驶卡车将货物运至装运点，(3) 颁发许可证以允许船舶装载货物托盘进港或离港，(4) 接收到的产品被储存在仓库中，(5)
    顾客通过前往商店或通过电商网站在线购买商品。


    以下是人们在物流与供应链领域可能会遇到的一些潜在问题与机遇：


    1. 卡车司机离职。

    2. 工厂因零部件缺失而减产。

    3. 保质期即将临近的产品因许可证发放机构人员短缺，导致运输所需文件缺失，而在仓库中积压。

    4. 经济形势导致某产品需求放缓。

    5. 2013 年 4 月 24 日，位于孟加拉国达卡郊区萨瓦的拉纳广场大楼倒塌，该建筑内设有多家服装厂、一家银行和多家商店，事故导致超过 1100 人丧生，2500
    多人受伤。这场灾难是工业史上最致命的悲剧之一。大多数遇难者是工厂工人，其中主要是女性，她们当时正在为 H&M、古驰和范思哲等全球知名品牌生产服装。这些品牌声称，他们并不知道自家的服装是在如此恶劣的工作条件下生产的。他们将责任归咎于下级管理者、采购合作伙伴以及孟加拉国的地方和中央政府。


    以下是 NFT 可以提供的帮助：


    1. 设想每位卡车司机和每辆卡车都各自关联一个 NFT，并且实时更新每个司机和每辆卡车的元数据。这将使管理层能够精确掌握卡车司机和卡车供应量的最细微波动，以及在瓶颈形成和显现之前，就能知道瓶颈即将在何时何地出现，从而避免在最后一刻给卡车司机带来长时间驾驶的压力，以弥补初现端倪的短缺。这类信息不仅能帮助私营企业，还能帮助地方、州乃至联邦政府采取力所能及的措施，协助避免可能导致关键产品（如药品、医疗设备和婴儿配方奶粉）短缺的运输瓶颈的积累，正如我们在新冠疫情期间及之后所看到的那样。基于
    NFT 编写的软件，结合能够识别模式并根据以往情景进行预测的人工智能，可以在更早的时间点提供可操作的信息，从而及时做出调整——而调整建议本身也可能来自人工智能。


    2. 设想每家工厂都是一个 NFT，其元数据（例如产量和员工数量）在危机时期可公开获取。这使得产业生态系统中与工厂平稳运行利益相关的各方，以及负责各自组织采购、库存和人员配置等关键决策的人，都能据此采取行动。能够以可靠的方式及时获取此类数据，可能决定着危机是得以避免，还是演变成波及众多关键经济部门的连锁危机。


    3. NFT 还可以帮助确保关于保质期短、易过期产品信息的可靠和实时获取，以便优先分配包括人力资源在内的各项资源，并与包括政府机构在内的各利益相关方及时沟通协调，以加速处理那些否则将导致昂贵延误并对普通民众产生负面影响的流程。

    '
- fmt: '4. The journey of a product usually begins six to twelve months before it
    is finally sold, whether through a retail or a wholesale channel. Given that nearly
    every service in the supply delivery chain is outsourced to some third party,
    that may itself further subcontract the service to a fourth party down the line,
    tracking the source of any product, let alone a product component, let alone the
    path of its journey, is almost physically impossible to do. Twinning products,
    and even parts of products, with NFTs, would make such tracking almost trivial.
    No more islands of systems and record-keeping protocols that don’t speak to each
    other, or can’t talk to each other because integrations between the systems don’t
    exist. There is one protocol, the NFT, and one system, the blockchain, that everyone
    is using to refer to the product or its part, and to track what happens to that
    product or its parts along the way.


    5. Imagine if we could tell, with the simple scan of a tag on a clothing item,
    exactly where each item was made, where it originated, how it was transported,
    where it was housed, and so forth. Brands would no longer be able to plead ignorance,
    as they did in the case of the Rana Plaza in 2013. Nor would reporters and their
    editors in media outlets, who are supposed to be working on stories of exploitation,
    can claim that it is expensive to report on such stories.


    ## An Example of a Current Implementation


    Nestlé, a global food and beverage company, launched `Chain of Origin` to provide
    supply chain transparency “from crop to cup” for coffee beans, making all record
    of all transactions throughout the supply chain transparent, immutable, and verifiable.
    This enables Nestlé’s partners to interact in a trustworthy and efficient manner.
    This solution also makes possible the spotting of any mistakes, malpractices,
    or tampering, for quick reaction.


    ## Summary


    As things stand today, in 2023, no more than one out of four people in the United
    States has even heard of the abbreviation “NFT,” while the majority of those who
    have heard it do not fully understand it, or understand it only as something related
    to digital artifacts such as images, videos, and audio files. In this understanding
    of NFTs, there is the real world where real things affect people in real ways,
    and then there is the world of NFTs, a world of make-believe, pretending, and
    hype, a game of sorts that people who are interested in that game play and take
    seriously. Such a conception of NFTs is deeply misguided, and in its misguidance
    misses a whole world of opportunities. Our real world is no more real and no more
    tangible than the digital world: in both worlds we deal with concepts and categories,
    conventions and protocols, and what holds everything together in both worlds in
    assent of those who are participating and acting in this world. Once we realize
    that the real world and the digital world can be merged into one world of coexisting
    objects, possibilities for innovative ways of not only solving problems but creating
    new value quickly emerge. As things, we have barely even begun to scratch the
    surface of what is possible. Exciting solutions and innovations are ahead of us.


    [Footnotes](#604872_1_En_7_Chapter.xhtml#Fn1_source)


    # 8. The Future of NFTs


    The future of NFTs is intimately intertwined with the future of the Web. NFTs
    did not emerge ex nihilo, nor were they the accidental exotic creations of geeks
    experimenting in their secluded dark-screened labs. NFTs emerged to solve a long-standing
    problem in the digital world, that of non-scarcity, and along the way revealed
    that they could deliver much more than a simulation “real life” by introducing
    commodity constraints so that we may re-create the basic building blocks of our
    real world, brick-and-mortar economies in the digital world. NFTs, we discovered,
    could in fact help us deliver on that original vision that came to life with the
    emergence of the Web back in the early 1990s, a web that was distributed, democratic,
    open, accessible to all, and safe and secure. As things stand today, 30 years
    on, we remain very far from that dream place where we wanted to go.'
