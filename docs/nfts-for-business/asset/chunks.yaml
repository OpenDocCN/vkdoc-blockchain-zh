    of all block producers, which in a PoW system are the miners and in a PoS system
    are the validators. This ensures the integrity and security of the blockchain
    assuming it is mature enough to resist a “51% attack” whereby a malicious actor
    seizes control of over half the block producers, giving them the ability to edit
    the blockchain. This makes it an ideal technology for the creation and transfer
    of valuable digital assets, such as NFTs, on more mature networks.


    However, immutability can also pose a challenge in situations where errors need
    to be corrected or transactions need to be reversed, such as in the case of a
    hack or criminal activity. Some blockchains such as Energi have been designed
    with this problem in mind and offer solutions, which are appealing for enterprise
    use cases, but these chains are relatively few in number.


    That said, there has been a growing interest in the development of enterprise
    blockchain solutions in recent years. These solutions are designed to meet the
    needs of businesses and organizations and typically offer additional features
    such as permissioned access, scalability, and interoperability. Some of the leading
    enterprise blockchain solutions include Hyperledger Fabric, R3 Corda, and Quorum.


    Thanks to the decentralized nature of these blockchains, enterprises which face
    risks from storing important data on centralized servers can mitigate these risks.
    Because the blockchain is stored across a network of computers rather than in
    a central location, it is highly resistant to attacks and tampering. This technology
    has sparked interest in sectors such as healthcare where institutions would rather
    not hold user data but still need to know about their customers – NFTs can serve
    a valuable role here by allowing patients to provide customized access to their
    health data to various providers.


    Another widely regarded benefit of blockchain technology is transparency. All
    transactions are publicly recorded on the blockchain, meaning they are publicly
    visible and easily auditable. There are some exceptions with privacy chains such
    as Grin or Secret Network, but even in many of those chains a lot of data can
    be made natively public. This ensures that all parties in the network, or to a
    given transaction, have a clear and accurate view of what has taken place. This
    promotes trust between actors.


    Also, despite the media barrage about hacks and security breaches, blockchain
    technology itself is highly secure. Flaws almost always come from poorly designed
    smart contracts which are then exploited to drain tokens. However, on-chain information
    and data are extremely hack resistant. Each block in the chain is cryptographically
    linked to the previous block, creating a secure and immutable record of transactions.
    This ensures that transactions cannot be altered or deleted without being detected,
    which helps prevent fraud.


    This fraud prevention is one of the key benefits offered by blockchain technology.
    Since every transaction on a blockchain is verified by a vast network of nodes,
    the system is virtually tamper-proof unless a malicious actor manages to execute
    a 51% attack. The technology is also resistant to cyberattacks, as blockchains
    use advanced cryptographic techniques to protect against unauthorized access.
    Also, any discrepancies or irregularities can be quickly identified and investigated.


    Another key benefit of blockchain technology is its ability to create trust. Since
    every transaction is verified and recorded on the blockchain, no trusted intermediaries
    are needed for transactions – escrows can be fully automated. This “cuts out the
    middleman” which can reduce costs and increase efficiency. It also means nobody
    can “cheat” or misallocate funds. For example, a nonprofit running a fundraiser
    using cryptocurrency cannot simply pocket donor money without spending it on the
    initiatives they promised to support.


    Blockchains generally consist of five layers, each serving a different function.
    These layers are as follows:


    1.  Hardware layer


    2.  Network layer


    3.  Protocol layer


    4.  Middleware layer


    5.  Application layer


    The hardware layer is the lowest layer. It is the physical infrastructure, consisting
    of physical components such as servers, storage devices, and miners, and other
    hardware depending on the specifics of the chain.


    The network layer sits above the hardware layer and provides the underlying infrastructure
    for communication between nodes on the network, such as peer-to-peer networking,
    data propagation, and security.


    The protocol layer is above the network layer and defines the rules and protocols
    that govern the operation of the network, such as consensus mechanisms, block
    validation, and transaction processing.'
  trans: '

    # 区块链基础


    爱沙尼亚政府于 2008 年开始使用区块链技术，这比比特币问世还早一年。事实上，可以认为区块链技术是由研究人员斯图尔特·哈伯和 W·斯科特·斯托内塔于 1991
    年在发表《如何为数字文档添加时间戳》一文时发明的。


    其核心而言，区块链技术是一种去中心化且透明的账本系统，能够提供安全且不可篡改的带时间戳的交易记录。区块链允许创建智能合约——这是一种自动执行的合约，买卖双方之间的协议条款被直接写入代码行中，一旦智能合约部署完毕，无需任何人干预即可运行。这项技术实现了“无需信任”的交易，这意味着交易双方无需依赖可信中介即可进行交易。


    因此，区块链是一个分布式数据库，用于跨计算机网络存储交易记录。链中的每个“区块”都包含一组交易——一旦一个区块被添加到链中，就无法更改或删除。这确保了区块链上的记录是安全、透明且防篡改的。每条区块链都使用所谓的“共识机制”来向链中添加区块。这些机制确保网络中的参与者就每笔交易的有效性达成一致。


    区块链可以使用多种不同的共识机制。例如工作量证明、权益证明以及委托权益证明。工作量证明（PoW）是比特币使用的共识机制，并被区块链领域的许多人认为是最安全的一种。对
    PoW 最常见的批评并非基于其安全性，而是其能耗问题：在工作量证明系统中，矿工们竞相解决复杂的数学问题，以验证交易并向区块链添加新区块，在某些实现中，这可能是一个能源密集的过程。


    权益证明（PoS）是另一种非常流行的共识机制。它是以太坊所使用的机制，以太坊于 2022 年 9 月 15 日从 PoW 协议过渡而来。PoS 不需要矿工解决复杂问题，而是依赖于验证者，这些验证者持有并“质押”一定数量的“账本原生代币”（即区块链运行所基于的代币）来验证交易并向区块链添加新区块。对于以太坊区块链而言，其账本原生代币是
    ETH（以太币）。由于 PoS 生态系统中没有矿工，其能源消耗要低得多，并且通常交易费用也更低。


    区块链技术的关键特性之一是其不可篡改性。一旦一个区块被添加到区块链中，在不被察觉的情况下更改或删除它是几乎不可能的。进行此类更改是可能的，但需要获得大多数区块生产者的同意。在
    PoW 系统中，这些生产者是矿工；在 PoS 系统中，则是验证者。这确保了区块链的完整性和安全性，前提是其足够成熟，能够抵御“51%攻击”——即恶意行为者控制了超过半数的区块生产者，从而获得编辑区块链的能力。这使得它成为在更成熟的网络上创建和转移有价值的数字资产（如
    NFT）的理想技术。


    然而，在需要纠正错误或逆转交易（例如发生黑客攻击或犯罪活动）的情况下，不可篡改性也可能构成挑战。一些区块链（如 Energi）在设计时就考虑到了这个问题，并提供了解决方案，这对企业用例很有吸引力，但此类链的数量相对较少。


    尽管如此，近年来对企业级区块链解决方案的开发兴趣日益增长。这些解决方案旨在满足企业和组织的需求，通常提供额外功能，如许可访问、可扩展性和互操作性。一些领先的企业级区块链解决方案包括超级账本
    Fabric、R3 Corda 和 Quorum。


    得益于这些区块链的去中心化特性，那些面临将重要数据存储在中心化服务器上风险的企业可以降低这些风险。由于区块链存储在一个计算机网络中，而非一个中心位置，因此它对攻击和篡改具有很强的抵抗力。这项技术在医疗保健等领域激发了兴趣——在这些领域，机构不愿持有用户数据，但仍需了解其客户——NFT
    可以在此发挥重要作用，允许患者向不同的医疗服务提供者提供对其健康数据的定制化访问权限。


    区块链技术另一个广受认可的好处是透明性。所有交易都公开记录在区块链上，这意味着它们是公开可见且易于审计的。存在一些例外情况，例如 Grin 或 Secret
    Network 等注重隐私的链，但即便在其中许多链上，大量数据也可以原生地公开。这确保了网络中的各方，或针对特定交易的所有相关方，都能清晰准确地了解所发生的事情。这促进了参与者之间的信任。


    此外，尽管媒体上充斥着关于黑客攻击和安全漏洞的报道，但区块链技术本身是高度安全的。缺陷几乎总是源于设计不良的智能合约，这些合约随后被利用以耗尽代币。然而，链上的信息和数据极难被攻击。链中的每个区块都通过密码学方式与前一个区块相连，从而创建了安全且不可篡改的交易记录。这确保了交易无法在不被察觉的情况下被更改或删除，有助于防止欺诈。


    这种欺诈防范是区块链技术提供的关键优势之一。由于区块链上的每笔交易都经过庞大的节点网络验证，该系统几乎是防篡改的，除非恶意行为者成功实施 51%攻击。该技术还能抵御网络攻击，因为区块链使用先进的密码学技术来防止未经授权的访问。此外，任何差异或违规行为都能被迅速识别和调查。


    区块链技术的另一个关键优势是其建立信任的能力。由于每笔交易都经过验证并记录在区块链上，交易不再需要可信的中介——托管可以完全自动化。这“去掉了中间人”，可以降低成本并提高效率。这也意味着没有人能够“作弊”或错误分配资金。例如，一个使用加密货币进行筹款的非营利组织不能简单地将捐赠者的钱收入囊中，而不将其用于他们承诺支持的项目。


    区块链通常由五个层级组成，每个层级功能不同。这些层级如下：


    1.  硬件层

    2.  网络层

    3.  协议层

    4.  中间件层

    5.  应用层


    硬件层是最底层。它是物理基础设施，由物理组件组成，例如服务器、存储设备、矿工，以及根据链的具体情况所需的其他硬件。


    网络层位于硬件层之上，提供网络节点间通信的基础设施，例如点对点网络、数据传播和安全性。


    协议层位于网络层之上，定义了管理网络运行的规则和协议，例如共识机制、区块验证和交易处理。'
- fmt: '中间件层位于协议层与应用层之间，提供支持链上程序运行所需的基础设施，包括数据存储、消息传递以及网络不同组件间通信的协议。


    应用层是最高的层级，用户在此与网络交互，应用程序也在此构建。它包括用户界面、智能合约和去中心化应用（简称dApp）。使用区块链的大多数人只与这一层交互。


    区块链技术所创造的安全环境，使得数字资产能够以其他技术无法实现的方式蓬勃发展。由于过往信息难以被篡改，数据无法被简单复制粘贴，所有权可以得到验证，中介机构可以被移除，因此对于希望简化运营并降低成本的企业或其他组织而言，区块链可能是一个有吸引力的选择。随着该技术的持续发展，我们很可能会看到更多进步以及越来越多的应用场景。许多不同类型区块链的持续部署（每种都有其特定的用途）就体现了这一点。


    存在几种不同类型的区块链网络，包括公有链、私有链和混合链。


    公有区块链网络对任何希望参与网络的人开放。这些网络是去中心化的，依靠分布式的节点网络来验证交易并将新区块添加到链上。像`Bitcoin`和`Ethereum`这样的公有网络通常被称为无许可网络，因为任何人都可以无需中心化机构的许可参与到网络中。


    相比之下，私有区块链网络仅限于特定的用户群体，例如一家公司或组织。这些网络通常被称为许可网络，因为参与者必须获得中心化机构的许可才能加入网络。私有网络相对于公有网络有几个优势，包括更高的隐私性和对网络治理的控制权。


    混合区块链网络结合了公有和私有网络的元素，在企业应用中的使用越来越普遍。这些网络兼具公有和私有网络的优点，包括去中心化信任、许可访问和更高的安全性。混合网络通常用于隐私性很重要，但又希望享有公有网络优势的应用场景，例如供应链管理或身份验证。


    除了公有、私有和混合网络外，还有不同类型的共识机制可用于在区块链上验证交易。这些机制包括之前提到的工作量证明和权益证明机制，但远不止这些。每种共识机制都有一套自身的优缺点，适用于不同类型的区块链网络和应用。


    我们来更详细地看看一些更流行的共识机制：


    - **工作量证明（PoW）**：`工作量证明`是区块链技术中使用的原始共识机制，至今仍被`Bitcoin`等流行的加密货币所采用。在`PoW`中，矿工们竞相解决复杂的数学问题，以验证区块链上的新区块。最先解决问题的矿工将获得新铸造的加密货币作为奖励。虽然`PoW`是安全且去中心化的，但它也非常耗能，并可能导致算力中心化。


    - **权益证明（PoS）**：`权益证明`是`PoW`的一种替代方案，旨在提高能源效率。在`PoS`中，验证者在区块链中持有质押权益，并根据其质押权益的大小被选中来验证新区块。验证者有动力以网络的最佳利益行事，因为如果他们被发现行为不端，其质押权益可能会被罚没。`PoS`通常被宣传为比`PoW`更可持续、更环保的替代方案。`Ethereum`是最流行的`PoS`区块链。


    - **委托权益证明（DPoS）**：`委托权益证明`与`PoS`类似，但在选择验证者的方式上有所不同。在`DPoS`中，代币持有者投票选举有限数量的代表，由这些代表负责验证区块链上的交易。这种方法比`PoW`或`PoS`更为中心化，但可以带来更快的交易处理速度和更低的能耗。`EOS`是一个`DPoS`区块链的例子，它提供零交易费用。


    - **权威证明（PoA）**：`权威证明`是一种共识机制，它依赖一小群受信任的验证者来验证区块链上的交易。这种方法快速高效，但可能不如其他共识机制安全且去中心化。`Binance
    Smart Chain（BSC）`使用`权威证明`模型的一个变体，称为`proof-of-staked authority`。


    - **历史证明（PoH）**：`历史证明`是一种新的共识机制，由`Solana`区块链平台开发。`PoH`旨在通过使验证者能够预先计算交易的顺序，而不是在实时中达成交易顺序的共识，从而提高网络的可扩展性。


    不同类型的区块链网络提供了独特的优势，适用于不同类型的应用程序和用例。公有网络非常适合去中心化和开放访问很重要的应用，而私有网络则提供更强的控制力和隐私性。混合网络则集两者之长，提供了去中心化信任、许可访问和更高的安全性。然而，区块链确实也存在一些固有的缺点，这些缺点因每条链的具体情况而异。'
  raw: 'The middleware layer sits between the protocol layer and the application layer,
    providing the necessary infrastructure to support programs running on the chain.
    It includes protocols for data storage, messaging, and communication between different
    components of the network.


    The application layer is the highest layer and is where users interact with the
    network and where applications are built. It includes the user interface, smart
    contracts, and decentralized applications (dApps). Most people using a blockchain
    only ever interface with this layer.


    The security blockchain technology creates an environment for digital assets to
    flourish in ways they never could have with other technologies. Since past information
    cannot be easily altered, data cannot simply be copied and pasted, ownership can
    be verified, and intermediaries can be removed, blockchain can be an attractive
    option for businesses or other organizations looking to streamline operations
    and reduce costs. We will likely see more developments and an increasing number
    of use cases as the technology continues to develop. This is exemplified by the
    continued deployment of many different types of blockchains, each with their own
    specialized purposes.


    There are several different types of blockchain networks, including public, private,
    and hybrid networks.


    Public blockchain networks are open to anyone who wishes to participate in the
    network. These networks are decentralized and rely on a distributed network of
    nodes to validate transactions and add new blocks to the chain. Public networks,
    such as Bitcoin and Ethereum, are often referred to as permissionless networks,
    as anyone can participate in the network without the need for permission from
    a central authority.


    Private blockchain networks, on the other hand, are restricted to a specific group
    of users, such as a company or organization. These networks are often referred
    to as permissioned networks, as participants must be granted permission to join
    the network by a central authority. Private networks offer several benefits over
    public networks, including increased privacy and control over network governance.


    Hybrid blockchain networks combine elements of both public and private networks
    and are becoming increasingly popular for use in enterprise applications. These
    networks offer the benefits of both public and private networks, including decentralized
    trust, permissioned access, and increased security. Hybrid networks are often
    used in applications where privacy is important, but where the benefits of a public
    network are also desired, such as in supply chain management or identity verification.


    In addition to public, private, and hybrid networks, there are also different
    types of consensus mechanisms that can be used to validate transactions on a blockchain.
    These mechanisms include the previously mentioned proof-of-work and proof-of-stake
    mechanisms, but there are many more. Each consensus mechanism has its own set
    of advantages and disadvantages and is suited to different types of blockchain
    networks and applications.


    Let’s take a more detailed look at some of the more popular consensus mechanisms:


    *   Proof of work (PoW): Proof of work is the original consensus mechanism used
    in blockchain technology and is still used by popular cryptocurrencies like Bitcoin.
    In PoW, miners compete to solve complex mathematical problems in order to validate
    new blocks on the blockchain. The first miner to solve the problem is rewarded
    with newly minted cryptocurrency. While PoW is secure and decentralized, it is
    also energy-intensive and can lead to centralization of mining power.


    *   Proof of stake (PoS): Proof of stake is an alternative to PoW that is designed
    to be more energy-efficient. In PoS, validators hold a stake in the blockchain
    and are chosen to validate new blocks based on the size of their stake. Validators
    are incentivized to act in the best interest of the network, as their stake can
    be slashed if they are found to be acting maliciously. PoS is often marketed as
    a more sustainable and environmentally friendly alternative to PoW. Ethereum is
    the most popular PoS blockchain.


    *   Delegated proof of stake (DPoS): Delegated proof of stake is similar to PoS,
    but with a different approach to selecting validators. In DPoS, token holders
    vote for a limited number of delegates who are responsible for validating transactions
    on the blockchain. This approach is more centralized than PoW or PoS, but can
    lead to faster transaction processing times and lower energy consumption. An example
    of a DPoS blockchain is EOS, which offers zero transaction fees.


    *   Proof of authority (PoA): Proof of authority is a consensus mechanism that
    relies on a small group of trusted validators to validate transactions on the
    blockchain. This approach is fast and efficient, but can be less secure and decentralized
    than other consensus mechanisms. Binance Smart Chain (BSC) uses a variant on the
    proof-of-authority model, called proof-of-staked authority.


    *   Proof of history (PoH): Proof of history is a new consensus mechanism that
    is being developed by the Solana blockchain platform. PoH is designed to improve
    network scalability by enabling validators to precompute the order of transactions,
    rather than having to reach consensus on transaction order in real time.


    The different types of blockchain networks offer unique advantages and are suited
    to different types of applications and use cases. Public networks are ideal for
    applications where decentralization and open access are important, while private
    networks offer increased control and privacy. Hybrid networks combine the best
    of both worlds, offering decentralized trust, permissioned access, and increased
    security. However, blockchains do come with some inherent disadvantages which
    vary depending on the specifics of each chain.'
  trans: '

    中间件层位于协议层与应用层之间，提供支持链上程序运行所需的基础设施，包括数据存储、消息传递以及网络不同组件间通信的协议。


    应用层是最高的层级，用户在此与网络交互，应用程序也在此构建。它包括用户界面、智能合约和去中心化应用（简称 dApp）。使用区块链的大多数人只与这一层交互。


    区块链技术所创造的安全环境，使得数字资产能够以其他技术无法实现的方式蓬勃发展。由于过往信息难以被篡改，数据无法被简单复制粘贴，所有权可以得到验证，中介机构可以被移除，因此对于希望简化运营并降低成本的企业或其他组织而言，区块链可能是一个有吸引力的选择。随着该技术的持续发展，我们很可能会看到更多进步以及越来越多的应用场景。许多不同类型区块链的持续部署（每种都有其特定的用途）就体现了这一点。


    存在几种不同类型的区块链网络，包括公有链、私有链和混合链。


    公有区块链网络对任何希望参与网络的人开放。这些网络是去中心化的，依靠分布式的节点网络来验证交易并将新区块添加到链上。像`Bitcoin`和`Ethereum`这样的公有网络通常被称为无许可网络，因为任何人都可以无需中心化机构的许可参与到网络中。


    相比之下，私有区块链网络仅限于特定的用户群体，例如一家公司或组织。这些网络通常被称为许可网络，因为参与者必须获得中心化机构的许可才能加入网络。私有网络相对于公有网络有几个优势，包括更高的隐私性和对网络治理的控制权。


    混合区块链网络结合了公有和私有网络的元素，在企业应用中的使用越来越普遍。这些网络兼具公有和私有网络的优点，包括去中心化信任、许可访问和更高的安全性。混合网络通常用于隐私性很重要，但又希望享有公有网络优势的应用场景，例如供应链管理或身份验证。


    除了公有、私有和混合网络外，还有不同类型的共识机制可用于在区块链上验证交易。这些机制包括之前提到的工作量证明和权益证明机制，但远不止这些。每种共识机制都有一套自身的优缺点，适用于不同类型的区块链网络和应用。


    我们来更详细地看看一些更流行的共识机制：


    - **工作量证明（PoW）**：`工作量证明`是区块链技术中使用的原始共识机制，至今仍被`Bitcoin`等流行的加密货币所采用。在`PoW`中，矿工们竞相解决复杂的数学问题，以验证区块链上的新区块。最先解决问题的矿工将获得新铸造的加密货币作为奖励。虽然`PoW`是安全且去中心化的，但它也非常耗能，并可能导致算力中心化。


    - **权益证明（PoS）**：`权益证明`是`PoW`的一种替代方案，旨在提高能源效率。在`PoS`中，验证者在区块链中持有质押权益，并根据其质押权益的大小被选中来验证新区块。验证者有动力以网络的最佳利益行事，因为如果他们被发现行为不端，其质押权益可能会被罚没。`PoS`通常被宣传为比`PoW`更可持续、更环保的替代方案。`Ethereum`是最流行的`PoS`区块链。


    - **委托权益证明（DPoS）**：`委托权益证明`与`PoS`类似，但在选择验证者的方式上有所不同。在`DPoS`中，代币持有者投票选举有限数量的代表，由这些代表负责验证区块链上的交易。这种方法比`PoW`或`PoS`更为中心化，但可以带来更快的交易处理速度和更低的能耗。`EOS`是一个`DPoS`区块链的例子，它提供零交易费用。


    - **权威证明（PoA）**：`权威证明`是一种共识机制，它依赖一小群受信任的验证者来验证区块链上的交易。这种方法快速高效，但可能不如其他共识机制安全且去中心化。`Binance
    Smart Chain（BSC）`使用`权威证明`模型的一个变体，称为`proof-of-staked authority`。


    - **历史证明（PoH）**：`历史证明`是一种新的共识机制，由`Solana`区块链平台开发。`PoH`旨在通过使验证者能够预先计算交易的顺序，而不是在实时中达成交易顺序的共识，从而提高网络的可扩展性。


    不同类型的区块链网络提供了独特的优势，适用于不同类型的应用程序和用例。公有网络非常适合去中心化和开放访问很重要的应用，而私有网络则提供更强的控制力和隐私性。混合网络则集两者之长，提供了去中心化信任、许可访问和更高的安全性。然而，区块链确实也存在一些固有的缺点，这些缺点因每条链的具体情况而异。

