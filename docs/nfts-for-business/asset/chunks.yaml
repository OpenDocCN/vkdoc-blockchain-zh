- fmt: 'I would like to thank my co-authors Drs. Ahmed Bouzid and Paolo Narciso for
    their support in bringing this book to life. This is my first book written with
    multiple authors. Their reviews of my contributions, help in connecting with experts
    to provide additional insights, writing of large portions of the manuscript, and
    more all made this possible.


    Furthermore, everyone who has contributed to the depth of my knowledge regarding
    blockchain generally and NFTs specifically deserves a shout-out. My good friend
    and business partner Jean-Philippe Beaudet has been the single largest contributor
    to my understanding of Web3 technologies from a technical point of view. Special
    thanks are also due to David Shuttleworth, Managing Director of Binance Labs,
    for his perspective and insights on the future direction of NFTs.


    Additional credit is due to my colleagues Abraham Choi, Michal Ptáčník, and others
    who worked with me in detail over several years, which helped me understand the
    vast breadth of practical use cases blockchain technology and NFTs can offer.
    Without all these individuals, my contributions to this book would not have been
    possible.


    Of course, no acknowledgment would be complete without due credit to my wife Ammy
    – thank you for wrangling our children while I worked on this manuscript over
    many long days and weekends.


    —Steve Wood


    ## About the Authors


    # 1. Problems Solved by NFTs


    Non-fungible tokens (NFTs) are digital assets that can come in the form of art,
    music, in-game items, videos, and more and seem to be everywhere these days. From
    art and music to tacos and toilet paper, these digital assets are selling like
    17th-century exotic Dutch tulips – some for millions of dollars.


    So, when you create something new, you should be rewarded for the effort in proportion
    to the value that you have created. For that to happen, we need to replicate the
    constraints of the physical world into the digital world. That is, we need to
    introduce scarcity, identify ownership, validate authenticity, trace back provenance,
    and enable the collection of royalties, which is the basis of this chapter.


    ## Introduction


    It is a truism to state that the rate of technological innovation has been accelerating
    at an unprecedented pace. A new technology not only solves a given set of problems,
    but also paves the way for the creation of new tools for the next generation of
    innovations. The most obvious example is the personal computer. When initially
    introduced, the PC was a gadget that helped you do the things that you already
    did, but do them more efficiently: type without having to deal with typewriters
    that needed paper and ink and white-out liquids (and that broke down every once
    in a while); calculate without needing a calculator; create balance sheets without
    pencils, pens, paper, and rulers; learn without having to go to the library; or
    play games without having to go to the arcade.


    But very quickly, the PC became a platform that enabled further innovation in
    its own right. High-level programming languages such as BASIC, FORTRAN, COBOL,
    and Pascal enabled anyone willing to learn them to write new software that delivered
    new solutions to existing problems. Such software (for instance, AutoCAD) enabled
    its users to experiment faster and with minimal cost. This enabled the creation
    of yet newer solutions, which then themselves became the next generation of innovation
    engines.


    We are now well into the fifth decade since the introduction of that first generation
    of PCs in the late 1970s. Since then, we have seen several waves of innovation,
    each opening up new vistas of possibilities, along with the ecosystem of challenges
    that emerge as a result of the market’s adoption of the products and solutions
    to which some of those possibilities converted: the Internet, the Web, Wi-Fi connectivity,
    cell phones, the cloud, smartphones, and the mobile apps that they run, and most
    recently social networks.


    But what is new about this fifth decade is the reality that nearly everything
    that we do, day in and day out, at nearly every waking moment of our day (and
    even when we sleep, if we include devices that monitor and collect our vital signs
    during our slumber) involves us engaged in doing something with a digital device
    – whether a desktop, a laptop, a surface, a smartphone, a smart speaker, or a
    wearable device. We interact with our fellow human beings, buy our stuff, plan
    our trips, organize political movements, listen to our music, do our work, order
    our food, learn, play, and everything else imaginable, almost entirely in the
    digital world.


    And indeed, we have come a long way since the days of Radio Shack’s TRS-80, the
    Commodore PET, and the Atari 800, both in terms of the hardware, the software,
    and the plumbing that is enabling our world to keep on turning. But what has remained
    nearly unaddressed in any meaningful way is the misalignment between several core
    attributes of the digital ecosystem and the fundamental pillars upon which our
    economic value chain delivery system rests.


    Elemental to the digital world is near zero-cost and instant replication: I can
    replicate a file as many times as I want in no time and at virtually no cost.
    I can distribute those files in any way I wish. Those who receive those files
    can do likewise: they can replicate and distribute those files in any way they
    wish. In all of this, scarcity, ownership, authenticity, provenance, and royalties
    collection become either meaningless concepts or nearly impossible to establish.
    Until the time when wealth distribution no longer relies on labor (and no one
    is holding their breath for such a system to emerge any time soon), humanity must
    adopt a mechanism to enable the value exchanges on which our economy relies that
    works for our increasingly digital reality.'
