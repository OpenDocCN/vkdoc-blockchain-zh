    to maintain control over your private keys.


    One of the most popular options for storing and managing NFTs is the MetaMask
    wallet. MetaMask is a browser extension that is free to use and is available for
    Chrome, Firefox, Brave, and other popular browsers. There is also a mobile app
    available for Android and iOS devices. It allows users to connect to decentralized
    applications (dApps) on various blockchains, including Ethereum and Polygon, and
    is compatible with a wide range of NFT marketplaces and platforms.


    Another popular option is the Trust Wallet, which is a mobile wallet that supports
    a variety of blockchains. Trust Wallet is commonly praised its ease of use and
    intuitive interface.


    When it comes to hardware wallets, some of the most popular options are the Ledger
    Nano or Trezor. While they often operate in a stand-alone environment and are
    mainly suited for providing an offline, cold storage solution for storing cryptocurrency
    and NFTs rather than facilitating active usage, there have been advances on this
    front.


    Trezor, for example, has an integration with the popular software wallet Exodus
    which makes using your NFTs easier. Also, while Ledgers were long considered the
    gold standard for hardware wallets, their controversial move to offer “seed phrase
    recovery” services has called their security into question.


    To create a MetaMask wallet, the first thing to do is go to the MetaMask website
    and click “Get Extension”, selecting the relevant choice based on your browser.
    Install the extension and follow the prompts to create a new wallet. Write down
    your seed phrase and store it somewhere safe. You can then connect it to various
    dApps that support NFT transactions by clicking the MetaMask extension.


    As for the Trust Wallet, download the app from the App Store or Google Play Store
    then open it. Write down your seed phrase and store it somewhere safe. At that
    point the wallet is set up, and you can connect it to various dApps that support
    NFT transactions by using the built-in web browser.


    After all this is done, you can start interacting with NFTs. If you want to buy
    or sell an NFT, connect your wallet to a marketplace and authorize transactions
    through your wallet. The process may differ slightly depending on the specific
    dApp and transaction, but generally involves following a few prompts within the
    wallet app to confirm the transaction and pay any associated fees.


    Nearly every activity on a blockchain requires the user to pay a transaction fee.
    Transaction fees, or gas fees, are part of almost every blockchain. Any transaction
    on a blockchain network carries a fee paid to the network to compensate the nodes
    for processing the transaction. Fees tend to be paid in the chain’s native cryptocurrency.


    The size of the fee depends on several factors, such as the network’s congestion,
    the complexity of the transaction, the desired processing time, and some intrinsic
    aspects of the blockchain in question such as its consensus mechanism. The more
    congested the network is, the higher the fees. Miners and validators prioritize
    transactions with higher fees since they earn more rewards for processing them.


    Purchase the needed assets on exchanges or get them from other users. Remember
    to monitor transaction fees regularly to avoid paying excessive amounts for transactions.'
  trans: '

    ## 钱包


    加密货币钱包是 NFT 生态系统的关键组成部分，用于存储、管理和转移 NFT。你需要拥有一个支持你计划铸造和交易 NFT 的区块链的加密货币钱包。


    市面上存在多种类型的加密货币钱包，包括桌面钱包、移动钱包和硬件钱包。桌面钱包是安装在电脑上的软件程序，适合希望将 NFT 存储在电脑上并方便访问的用户。其优点在于通常免费使用，且配置得当的情况下安全性较高。


    但桌面钱包容易受到恶意软件和黑客攻击，可能导致 NFT 丢失。此外，如果电脑崩溃或被盗，你可能无法再访问自己的 NFT。


    移动钱包是下载到智能手机或平板电脑上的应用程序，方便用户随时随地访问 NFT。其优点在于通常易于使用且可访问性高。


    然而，移动钱包的安全性可能不及桌面钱包或硬件钱包。如果不幸丢失手机或手机被盗，除非有钱包备份，否则可能无法再访问自己的 NFT。


    硬件钱包是连接到电脑或智能手机的物理设备，适合希望通过离线存储来保护 NFT 免受黑客攻击和恶意软件侵扰的用户。硬件钱包通常被认为是最安全的数字资产（如 NFT）存储方案，通过物理设备提供了额外的安全层。


    硬件钱包的一个缺点是购买成本较高，且可能需要一定的技术知识才能正确设置和使用。此外，硬件钱包可能损坏或被盗，导致无法挽回的损失。


    无论选择哪种钱包，务必进行备份并遵循钱包安全的最佳实践。这包括创建强大且唯一的密码、启用双重身份验证，以及写下钱包的助记词或私钥并将其存放在安全位置。


    由于钱包通常通过 12 或 24 个单词的助记词进行安全保护，创建者必须将这些助记词写在安全的地方，以防钱包出现问题，同时确保绝不向任何人展示此助记词或以任何方式冒险。不要让任何摄像头拍到，也不要大声读出。


    此外，务必只从可信来源下载钱包及其他加密货币相关软件，并警惕可能危及钱包安全的钓鱼诈骗和其他欺诈形式。


    在选择钱包时，需考虑安全性、易用性以及与计划使用区块链的兼容性等因素。有些钱包专为特定区块链设计，而有些则支持多个区块链。选择一个能让你自行控制私钥的钱包。


    存储和管理 NFT 最流行的选项之一是`MetaMask`钱包。`MetaMask`是一款浏览器扩展，免费使用，支持 Chrome、Firefox、Brave
    等主流浏览器，同时也有适用于 Android 和 iOS 设备的移动应用程序。它允许用户连接到包括以太坊和 Polygon 在内的多个区块链上的去中心化应用（dApps），并兼容大量
    NFT 市场和平台。


    另一个热门选项是`Trust Wallet`，这是一款支持多种区块链的移动钱包。`Trust Wallet`因其易用性和直观的界面而广受好评。


    在硬件钱包方面，最流行的选项包括`Ledger Nano`和`Trezor`。虽然它们通常在独立环境中运行，主要作为存储加密货币和 NFT 的离线冷存储解决方案，而非用于日常频繁操作，但在这方面已有技术进步。


    例如，`Trezor`与流行的软件钱包`Exodus`实现了集成，使得使用 NFT 更加便捷。同时，尽管`Ledger`长期被视为硬件钱包的黄金标准，但其推出“助记词恢复”服务的争议性举动使其安全性受到质疑。


    要创建`MetaMask`钱包，首先前往`MetaMask`网站，点击“获取扩展程序”，根据你的浏览器选择相应选项。安装扩展后，按照提示创建一个新钱包。写下助记词并将其存放在安全的地方。然后，点击`MetaMask`扩展即可将其连接到支持
    NFT 交易的各种 dApps。


    至于`Trust Wallet`，从 App Store 或 Google Play 商店下载应用并打开。写下助记词并将其存放在安全的地方。至此钱包设置完成，你可以通过内置浏览器将其连接到支持
    NFT 交易的各种 dApps。


    完成以上步骤后，你就可以开始与 NFT 进行交互了。如果想购买或出售 NFT，需将钱包连接到市场，并通过钱包授权交易。具体过程因 dApp 和交易类型略有不同，但通常只需在钱包应用中按照提示操作，确认交易并支付相关费用。


    区块链上的几乎每项活动都需要用户支付交易费。交易费（或称 Gas 费）是大多数区块链的组成部分。区块链网络上的任何交易都需向网络支付费用，以补偿处理交易的节点。费用通常以该链的原生加密货币支付。


    费用大小取决于多个因素，如网络拥堵程度、交易复杂性、期望处理时间，以及区块链本身的一些内在特性（如其共识机制）。网络越拥堵，费用越高。矿工和验证者会优先处理费用较高的交易，因为他们从中获得更多奖励。


    在交易所购买所需资产，或从其他用户处获取。记得定期监控交易费，避免为交易支付过高费用。

    '
- fmt: '# Marketplaces


    Once a user has a cryptocurrency wallet and obtained the required assets to pay
    transaction fees, the next step to participating in the NFT ecosystem is to obtain
    the NFTs themselves. Many projects have their own proprietary NFT marketplaces
    where you can buy assets specific to their ecosystem, but there are also several
    popular marketplaces that sell nearly any NFT on the blockchains they support.


    `OpenSea` is a popular and user-friendly NFT marketplace that allows users to
    buy, sell, and discover NFTs. To create an account on `OpenSea`, simply visit
    the website and click the “Sign Up” button in the top-right corner of the home
    page. You will then be prompted to create an account using your email address,
    Google, or Apple account. Once you have created your account, you can start browsing
    NFTs, creating collections, and interacting with other users on the platform.


    When creating an account on `OpenSea`, it is important to keep in mind that you
    will need to link a cryptocurrency wallet to your account in order to buy, sell,
    or create NFTs. `OpenSea` supports a variety of different wallets, including `MetaMask`,
    `WalletConnect`, and `Coinbase Wallet`. To link your wallet to your `OpenSea`
    account, simply go to your account settings and select “Wallets” from the drop-down
    menu. You will then be prompted to connect your wallet by entering your wallet
    address or scanning a QR code.


    Once your wallet is linked to your `OpenSea` account, you can start buying, selling,
    and creating NFTs.


    ## Buying and Selling Basics


    Buying an NFT is relatively simple.


    Browse the marketplace and find an NFT that you like. You can then place a bid
    or buy it outright using cryptocurrency. `OpenSea` primarily operates on the Ethereum
    blockchain, which means that users typically need to have Ethereum or another
    cryptocurrency in order to buy an NFT. However, `OpenSea` has partnered with `MoonPay`
    to enable purchases with credit cards in some cases, making it possible to use
    fiat currency to purchase certain NFTs on `OpenSea` through a feature called “Instant
    Buy.”


    Instant Buy allows users to purchase NFTs using a card, which is then converted
    to Ethereum by the third-party payment processor. This allows users who do not
    have cryptocurrency to buy NFTs using traditional payment methods.


    To use Instant Buy on `OpenSea`, users must first connect their credit card or
    debit card to their `OpenSea` account. This is done by navigating to the “Instant
    Buy” tab on the `OpenSea` home page and following the prompts to enter payment
    information.


    Once a payment method is added, users can search for NFTs that are available for
    purchase using Instant Buy. These NFTs will have an “Instant Buy” button next
    to them on the `OpenSea` marketplace. Clicking this button will initiate the purchase
    process and allow users to buy the NFT using their connected payment method.


    Not all NFTs on `OpenSea` are available for purchase using Instant Buy. This feature
    is only available for certain NFTs that have been approved by `OpenSea`’s team.
    Additionally, Instant Buy purchases are subject to a fee of 2.5% of the purchase
    price. Selling an NFT is more complex.


    You will need to create a listing for it on the marketplace, including details
    such as the price, description, and any relevant metadata. You must also create
    the NFT itself in advance, keeping in mind all the aspects and variables you care
    to integrate as you do so. Once your NFT is listed, other users can make offers
    or buy it outright via the process outlined earlier.


    ## Selecting a Marketplace


    As mentioned earlier, there are many NFT marketplaces that users can consider,
    each with their own unique features and user experiences. One such platform is
    `SuperRare`, which is known for its curated selection of high-quality NFTs and
    its emphasis on supporting artists.


    To create an account on `SuperRare`, users must first apply for approval through
    a verification process that involves submitting samples of their artwork and personal
    information. Once approved, users can create a profile and start browsing and
    bidding on NFTs.


    Another popular NFT marketplace is `Nifty Gateway`, which is known for its high-profile
    artist collaborations and limited-edition drops. To create an account on `Nifty
    Gateway`, users can simply sign up with their email address and link a payment
    method, such as a credit card or bank account.


    Finally, `Rarible` is another NFT marketplace that is popular among independent
    artists and creators. Unlike `SuperRare` and `Nifty Gateway`, `Rarible` allows
    users to create and sell their own NFTs without the need for a third-party verification
    process. To create an account on `Rarible`, users can simply sign up with an email
    address and connect their cryptocurrency wallet.


    These are only a few of the many marketplaces which offer support for a wide variety
    of NFTs. More are provided in the appendices to this book. Explore multiple platforms
    and understand the different options and user experiences they offer to find the
    best platform for you.


    Many niche marketplaces that cater to specific ecosystems or use cases also exist.


    One example is the `Axie Infinity Marketplace`, which is specifically designed
    for buying and selling `Axie` NFTs for use in games created by `Axie Infinity`
    publisher `Sky Mavis`. `Axies` are creatures that players can use to battle and
    earn rewards within the `Axie Infinity` universe. NFTs are used to represent ownership
    of these creatures.


    To participate in the `Axie Infinity Marketplace`, users must first create an
    account on the `Axie Infinity` platform. The user can then acquire `Axies` by
    buying them on the marketplace, earning them through gameplay, or participating
    in a scholarship program. Once they have acquired `Axies`, they can then list
    them for sale on the `Axie Infinity Marketplace` or purchase other `Axies` listed
    by other players, although scholars are not permitted to sell their `Axies` as
    they do not own them but are merely borrowing them.'
