  trans: '

    # 版税


    版税是向知识产权所有者支付的一种费用形式，通常作为使用该权利的交换。例如，在音乐领域，当歌曲以多种方式被使用时，例如在电台播放、在线流媒体播放，或用于电影、电视节目中，需要向词曲作者和出版商支付版税。


    在数字世界中，版税的概念同样重要，甚至更为关键。随着数字媒体的兴起，人们比以往任何时候都更容易创作和分发自己的内容，无论是音乐、视频、图像，还是其他形式的数字艺术。然而，这种便捷的分发方式也给创作者带来了新的挑战，他们现在必须应对盗版、作品未经授权使用，以及在追踪和执行知识产权方面遇到的困难。


    创作者应对这些挑战的一种方式是使用 NFT。NFT 是一种数字资产，存储在区块链上——这是一种以安全、透明方式记录交易的去中心化账本。当有人购买 NFT 时，他们本质上是在购买一个独特的数字代币，代表对特定内容（例如歌曲、视频或艺术品）的所有权。


    NFT 旨在解决长期困扰数字内容世界的诸多问题，其中就包括版税问题。由于 NFT 存储在区块链上，它们使创作者能够以一种透明且易于验证的方式确立对其作品的所有权。这意味着如果有人想使用与某个
    NFT 关联的内容，他们必须获得所有者的许可，并支付所需的版税。


    为了说明版税的概念以及 NFT 如何帮助解决这一问题，我们来看五个不同的例子：


    - **音乐**：一位音乐人创作了一首新歌，并在 Spotify 等流媒体平台上发布。由于这首歌与一个 NFT 相关联，音乐人可以确保从歌曲的流媒体播放收入中获得分成，即使歌曲被加入播放列表或在其他场景中被使用而未经其直接参与。

    - **艺术**：一位艺术家创作了一件数字艺术品，并以 NFT 形式出售。由于艺术品的所有权记录在区块链上，艺术家可以确保从该艺术品的任何后续销售中获得分成，即使它被多次转售或交易。

    - **电子游戏**：一位游戏开发者开发了一款新游戏，并通过 Steam 等在线平台发布。通过将游戏与 NFT 关联，开发者可以确保从游戏产生的收入中获得分成，即使游戏通过其他渠道销售或分发。

    - **摄影**：一位摄影师拍摄了一张精彩的照片，并授权给网站或杂志使用。通过使用 NFT 确立对照片的所有权，摄影师可以确保每次使用该照片时都能获得版税，无论是一次性使用还是多次使用。

    - **写作**：一位作者写了一本新书，并在亚马逊等平台上自行出版。通过将书与 NFT 关联，作者可以确保从书籍销售产生的收入中获得分成，即使书籍通过其他渠道销售或分发。


    # 总结


    在本章中，我们讨论了技术创新的快速步伐及其对我们生活各个方面的影响。我们着重指出，信息技术已从仅为特定任务提供工具，演变为驱动进一步创新的平台。本章强调，当今时代的特征是数字技术几乎渗透到我们生活的方方面面。尽管经历了这种数字变革，我们却发现了数字生态系统的核心属性与传统经济价值链之间的错位。数字世界的五个关键属性被提出：稀缺性、所有权、真实性、来源和版税。本章深入探讨了这些属性的重要性，讨论了数字领域带来的挑战，并介绍了非同质化代币（NFT）作为应对这些挑战的解决方案。它阐述了
    NFT 如何在数字领域提供数字稀缺性、独特所有权、真实性验证与来源追踪，并促进版税支付。本章的引言为探索 NFT 在重塑我们感知和互动数字资产方式中的作用奠定了基础。


    # 2. NFT 背后的技术


    支撑 NFT 创建、转移和使用的技术，在业界通常被称为区块链或分布式账本技术。虽然比特币是第一个被广泛使用的区块链协议，但这项技术的历史可以追溯到几十年前。在本章中，我们将熟悉这项技术。

    '
- fmt: '# Blockchain Basics


    The government of Estonia began using blockchain in 2008, a year before Bitcoin
    was launched. In fact, it can be argued that blockchain technology was invented
    by researchers Stuart Haber and W. Scott Stornetta when they published “How to
    Time-Stamp a Digital Document” in 1991.


    At its core, blockchain technology is a decentralized and transparent ledger system
    that provides a secure and immutable record of time-stamped transactions. Blockchain
    allows for the creation of smart contracts, which are self-executing contracts
    with the terms of the agreement between buyer and seller being directly written
    into lines of code and run without requiring any human actions once the smart
    contract has been deployed. This technology enables trustless transactions, meaning
    that parties can transact with one another without the need for a trusted intermediary.


    A blockchain is thus a distributed database that stores records of transactions
    across a network of computers. Each “block” in the chain contains a set of transactions
    – once a block is added to the chain, it cannot be altered or deleted. This ensures
    that the records on the blockchain are secure, transparent, and tamper-proof.
    Each blockchain uses what is called a “consensus mechanism” to add a block to
    the chain. These mechanisms ensure network users agree on the validity of each
    transaction.


    There are a variety of different consensus mechanisms a blockchain can use. Examples
    include proof of work, proof of stake, and delegated proof of stake. Proof of
    work (PoW) is the consensus mechanism used by Bitcoin and is considered by many
    in the blockchain space to be the most secure one. The most common criticism of
    PoW is not based on its security, but its energy consumption; in a proof-of-work
    system, miners compete to solve complex mathematical problems in order to validate
    transactions and add new blocks to the blockchain, which can be an energy-intensive
    process in certain implementations.


    Proof of stake (PoS) is another very popular consensus mechanism. It is the mechanism
    used by Ethereum, which transitioned from a PoW protocol on September 15, 2022.
    PoS does not require miners to solve complex problems, but instead relies on validators
    who hold and “stake” a certain amount of the “ledger-native token,” or the token
    on which the blockchain runs, to validate transactions and add new blocks to the
    blockchain. For the Ethereum blockchain, the ledger-native token is ETH (Ethereum).
    Due to the lack of miners in a PoS ecosystem, it is much less energy intensive
    and often carries lower transaction fees.


    One of the key features of blockchain technology is its immutability. Once a block
    has been added to the blockchain, altering or deleting it without being detected
    is impossible. Such changes are possible but require the consent of a majority
    of all block producers, which in a PoW system are the miners and in a PoS system
    are the validators. This ensures the integrity and security of the blockchain
    assuming it is mature enough to resist a “51% attack” whereby a malicious actor
    seizes control of over half the block producers, giving them the ability to edit
    the blockchain. This makes it an ideal technology for the creation and transfer
    of valuable digital assets, such as NFTs, on more mature networks.


    However, immutability can also pose a challenge in situations where errors need
    to be corrected or transactions need to be reversed, such as in the case of a
    hack or criminal activity. Some blockchains such as Energi have been designed
    with this problem in mind and offer solutions, which are appealing for enterprise
    use cases, but these chains are relatively few in number.


    That said, there has been a growing interest in the development of enterprise
    blockchain solutions in recent years. These solutions are designed to meet the
    needs of businesses and organizations and typically offer additional features
    such as permissioned access, scalability, and interoperability. Some of the leading
    enterprise blockchain solutions include Hyperledger Fabric, R3 Corda, and Quorum.


    Thanks to the decentralized nature of these blockchains, enterprises which face
    risks from storing important data on centralized servers can mitigate these risks.
    Because the blockchain is stored across a network of computers rather than in
    a central location, it is highly resistant to attacks and tampering. This technology
    has sparked interest in sectors such as healthcare where institutions would rather
    not hold user data but still need to know about their customers – NFTs can serve
    a valuable role here by allowing patients to provide customized access to their
    health data to various providers.


    Another widely regarded benefit of blockchain technology is transparency. All
    transactions are publicly recorded on the blockchain, meaning they are publicly
    visible and easily auditable. There are some exceptions with privacy chains such
    as Grin or Secret Network, but even in many of those chains a lot of data can
    be made natively public. This ensures that all parties in the network, or to a
    given transaction, have a clear and accurate view of what has taken place. This
    promotes trust between actors.


    Also, despite the media barrage about hacks and security breaches, blockchain
    technology itself is highly secure. Flaws almost always come from poorly designed
    smart contracts which are then exploited to drain tokens. However, on-chain information
    and data are extremely hack resistant. Each block in the chain is cryptographically
    linked to the previous block, creating a secure and immutable record of transactions.
    This ensures that transactions cannot be altered or deleted without being detected,
    which helps prevent fraud.


    This fraud prevention is one of the key benefits offered by blockchain technology.
    Since every transaction on a blockchain is verified by a vast network of nodes,
    the system is virtually tamper-proof unless a malicious actor manages to execute
    a 51% attack. The technology is also resistant to cyberattacks, as blockchains
    use advanced cryptographic techniques to protect against unauthorized access.
    Also, any discrepancies or irregularities can be quickly identified and investigated.


    Another key benefit of blockchain technology is its ability to create trust. Since
    every transaction is verified and recorded on the blockchain, no trusted intermediaries
    are needed for transactions – escrows can be fully automated. This “cuts out the
    middleman” which can reduce costs and increase efficiency. It also means nobody
    can “cheat” or misallocate funds. For example, a nonprofit running a fundraiser
    using cryptocurrency cannot simply pocket donor money without spending it on the
    initiatives they promised to support.


    Blockchains generally consist of five layers, each serving a different function.
    These layers are as follows:


    1. Hardware layer

    2. Network layer

    3. Protocol layer

    4. Middleware layer

    5. Application layer


    The hardware layer is the lowest layer. It is the physical infrastructure, consisting
    of physical components such as servers, storage devices, and miners, and other
    hardware depending on the specifics of the chain.


    The network layer sits above the hardware layer and provides the underlying infrastructure
    for communication between nodes on the network, such as peer-to-peer networking,
    data propagation, and security.


    The protocol layer is above the network layer and defines the rules and protocols
    that govern the operation of the network, such as consensus mechanisms, block
    validation, and transaction processing.'
