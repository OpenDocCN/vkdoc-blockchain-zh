- fmt: '区块链技术的基石使得像 NFT 这样的资产成为可能，但另一个核心组成部分是密码学的运用。没有密码学，这些协议及其上的资产将毫无价值。


    ## 密码学与加密


    密码学是区块链技术的一个基本方面，它确保了交易的安全性和真实性。它采用数字签名等多种技术，来确认交易确实是由声称发起的一方发起的。在区块链中，每个用户都有一对公钥和私钥。私钥是保密的，用于创建数字签名；而任何人都可以访问的公钥则用于解密该签名。


    当涉及到 NFT 时，密码学的主要用途是创建和传输数字签名，用户使用数字签名来验证交易的真实性并防止篡改或伪造。数字签名是使用密码学技术创建的，这些技术涉及区块链上每个用户的一对公钥和私钥，为验证真实性和所有权提供了一种安全可靠的方法。


    用户在发起交易时生成数字签名，使用其私钥创建一个包含交易细节的签名。该签名与交易一起被发送到区块链网络，允许网络上的其他用户使用发送者的公钥来验证数字签名并确认发送者的身份。


    数字签名的生成过程是：将一种密码学哈希函数应用于 NFT 数据，然后使用私钥对得到的哈希值进行加密。加密后的哈希值和公钥作为数字签名存储在区块链上，这确保了该签名对特定
    NFT 的唯一性，并且无法用于验证任何其他 NFT 的真实性。


    这些技术对智能合约和 NFT 都至关重要——它确保了它们的唯一性、真实性和价值。它验证了 NFT 的所有权和转移，防止了复制或伪造。没有它，NFT 将失去其功能价值。


    这种方法还允许用户在参与区块链交易时保持匿名。公钥可以在不透露发送者身份的情况下验证交易的真实性，这对于在维护隐私和匿名性的同时传输敏感财务或个人信息至关重要。


    参与创建和使用 NFT 的智能合约确保了执行过程的安全且防篡改。当创建一个 NFT 时，会被分配一个存储在区块链网络上的唯一标识符。该标识符是使用密码学哈希函数生成的，这是一种数学算法，接收数据并产生固定大小的输出。


    哈希函数的使用确保了 NFT 的唯一性并且无法被复制或伪造。它还使用户能够通过比较 NFT 的哈希值与区块链上存储的哈希值来验证 NFT 的所有权。如果哈希值匹配，则该
    NFT 是真实的，并且归声称拥有它的用户所有。


    区块链中最常见的哈希函数是`SHA-256`（安全哈希算法 256 位），它是一种被广泛认可且安全的密码学算法。`SHA-256`接收任意长度的输入，并产生一个固定长度的
    256 位输出，该输出根据输入数据唯一生成。


    虽然`SHA-256`是区块链技术中最常用的哈希函数，但在 NFT 中也可以使用其他哈希算法。一种替代方案是`SHA-3`（安全哈希算法 3），它由美国国家标准与技术研究院（NIST）开发，并于
    2015 年推出。与`SHA-256`类似，`SHA-3`也是一种产生固定长度输出的密码学哈希函数。然而，它使用了与`SHA-256`不同的算法，这使其在某些类型的攻击面前不那么脆弱。


    另一种替代哈希函数是`BLAKE2`，它于 2012 年推出，是比`SHA-256`更快、更高效的替代方案。`BLAKE2`是一个哈希函数族，包括`BLAKE2b`和`BLAKE2s`，分别针对
    64 位和 32 位平台进行了优化。`BLAKE2`也具有高度可并行化的特点，使其非常适合在 GPU 和其他硬件加速器上使用。


    尽管`SHA-256`是最广泛使用的区块链哈希函数，但在某些场景下，例如当速度、效率或对特定类型攻击的抵抗能力是重要考虑因素时，替代算法可能会很有用。最终，哈希函数的选择将取决于
    NFT 应用的具体要求以及安全性、效率和其他因素之间的期望平衡。


    一些区块链已经实施了除`SHA-256`之外的替代哈希算法，以保护其网络并提高效率。以下是一些例子：


    *   **以太坊**：以太坊使用一种名为`Keccak-256`的哈希算法来保护其网络。`Keccak-256`是通过美国国家标准与技术研究院（NIST）为创建名为`SHA-3`的新哈希函数标准而举办的竞赛中选出的。`Keccak-256`产生
    256 位输出，以其高安全性和高效率而闻名。

    *   **瑞波**：瑞波是一个区块链平台，在其共识协议中使用哈希算法`SHA-512`来提供高安全性和效率。`SHA-512`产生 512 位输出，被认为比`SHA-256`更安全。

    *   **Zcash**：Zcash 是一种注重隐私的加密货币，在其工作量证明共识协议中使用哈希算法`Equihash`。`Equihash`是一种内存密集型算法，需要大量内存来解决，这使得它对
    ASIC 挖矿具有抵抗力，并确保了网络的去中心化程度更高。

    *   **Grin**：Grin 是一种注重隐私的加密货币，使用哈希算法`MimbleWimble`来确保交易的隐私性。`MimbleWimble`结合了多种密码学技术，包括椭圆曲线密码学（ECC）、机密交易和`Pedersen`承诺，以提供高度的隐私和安全性。


    这些只是使用替代哈希算法来保护其网络的几个区块链例子。随着时间的推移，几乎可以肯定会在哈希算法和其他安全措施方面出现进一步的创新，以提高区块链网络的效率、安全性和隐私性。


    当创建一个 NFT 时，其独特的数字内容会使用相关算法进行哈希处理。这会创建该 NFT 的一个唯一数字指纹，并存储在区块链上，同时存储的还有诸如所有者的公钥（他们的钱包地址）、创建日期以及管理该
    NFT 的智能合约等其他信息。由于哈希函数是确定性的，相同的输入数据将始终产生相同的输出哈希值。这意味着哈希值可用于验证 NFT 的真实性和所有权。


    可以将一个 NFT 的哈希值与存储在区块链上的哈希值进行比较，以确保该 NFT 是真实的且未被篡改。由于哈希值对于该 NFT 是唯一的，因此无法用它来创建伪造或重复的
    NFT。即使对 NFT 的数字内容进行微小改动，也会导致完全不同的哈希值，这使得创建与原始 NFT 哈希值匹配的伪造或重复 NFT 实际上是不可能的。


    在 NFT 中使用哈希函数是其真实性和价值的关键组成部分。它使用户能够验证一个 NFT 是唯一的、真实的，并且归声称拥有它的用户所有。这在许多领域都很重要，尤其是在数字艺术领域，因为
    NFT 的价值通常基于其独特性和真实性。如果没有可靠的方法来验证 NFT 的真实性，就很难确定其价值或防止伪造。'
  raw: 'The foundations of blockchain technology make assets like NFTs possible, but
    one other core component is the use of cryptography. Without cryptography, these
    protocols and the assets on them would be completely useless.


    ## Cryptography and Encryption


    Cryptography is a fundamental aspect of blockchain technology that ensures the
    security and authenticity of transactions. It employs various techniques, such
    as digital signatures, to confirm that transactions are genuinely initiated by
    the claiming party. In the blockchain, each user has a public and private key
    pair. The private key remains secret and is used to create digital signatures,
    which can only be decrypted using the user’s public key, accessible to everyone.


    The creation and transfer of digital signatures, which users employ to verify
    transaction authenticity and prevent tampering or forgery, is the primary use
    case for cryptography when it comes to NFTs. Digital signatures are created using
    cryptographic techniques involving a public and private key pair for each user
    on the blockchain, providing a secure and reliable method to verify authenticity
    and ownership.


    Users generate digital signatures when initiating transactions, employing their
    private key to create a signature that includes transaction details. This signature
    is sent with the transaction to the blockchain network, allowing other network
    users to use the sender’s public key to verify the digital signature and confirm
    the sender’s identity.


    Digital signatures are created by applying a cryptographic hash function to the
    NFT data and encrypting the resulting hash value using the private key. The encrypted
    hash value and public key are stored on the blockchain as a digital signature,
    ensuring the signature’s uniqueness to the NFT and its inability to verify any
    other NFT’s authenticity.


    These techniques are integral to smart contracts as well as NFTs – it ensures
    their uniqueness, authenticity, and value. It verifies ownership and transfer
    of NFTs, preventing replication or counterfeiting. Without it, NFTs would lose
    their functional value.


    This approach also enables user anonymity while allowing blockchain transaction
    participation. The public key verifies transaction authenticity without disclosing
    the sender’s identity, essential for transferring sensitive financial or personal
    information while maintaining privacy and anonymity.


    The smart contracts involved in the creation and use of NFTs ensure that execution
    is secure and tamper-proof. When an NFT is created, it is assigned a unique identifier
    that is stored on the blockchain network. This identifier is generated using a
    cryptographic hash function, which is a mathematical algorithm that takes in data
    and produces a fixed-size output.


    The use of a hash function ensures that the NFT is unique and cannot be replicated
    or counterfeited. It also enables users to verify the ownership of an NFT by comparing
    the hash value of the NFT with the hash value stored on the blockchain. If the
    hash values match, then the NFT is authentic and owned by the user who claims
    to own it.


    The most common hash function in blockchain is the SHA-256 (Secure Hash Algorithm
    256-bit), which is a widely recognized and secure cryptographic algorithm. SHA-256
    takes an input of any length and produces a fixed-length 256-bit output, which
    is uniquely generated based on the input data.


    While SHA-256 is the most commonly used hash function in blockchain technology,
    there are other hash algorithms that could be used in NFTs as well. One alternative
    is the SHA-3 (Secure Hash Algorithm 3) algorithm, which was developed by the National
    Institute of Standards and Technology (NIST) and introduced in 2015\. Like SHA-256,
    SHA-3 is a cryptographic hash function that produces a fixed-length output. However,
    it uses a different algorithm than SHA-256, which makes it less vulnerable to
    certain types of attacks.


    Another alternative hash function is BLAKE2, which was introduced in 2012 and
    is a faster and more efficient alternative to SHA-256. BLAKE2 is a family of hash
    functions that includes BLAKE2b and BLAKE2s, which are optimized for 64-bit and
    32-bit platforms, respectively. BLAKE2 is also highly parallelizable, which makes
    it well suited for use in GPUs and other hardware accelerators.


    Even though SHA-256 is the most widely used blockchain hash function, alternative
    algorithms could be useful in certain scenarios, such as when speed, efficiency,
    or resistance to certain types of attacks are important considerations. Ultimately,
    the choice of hash function will depend on the specific requirements of the NFT
    application and the desired balance between security, efficiency, and other factors.


    Several blockchains have implemented alternative hash algorithms beyond SHA-256
    to secure their networks and improve their efficiency. Some examples include the
    following:


    *   Ethereum: Ethereum uses a hash algorithm called Keccak-256 to secure its network.
    Keccak-256 was selected through a competition held by the National Institute of
    Standards and Technology (NIST) to create a new hash function standard called
    SHA-3\. Keccak-256 produces a 256-bit output and is known for its high security
    and efficiency.


    *   Ripple: Ripple is a blockchain platform that uses the hash algorithm SHA-512
    in its consensus protocol to provide high security and efficiency. SHA-512 produces
    a 512-bit output and is considered more secure than SHA-256.


    *   Zcash: Zcash is a privacy-focused cryptocurrency that uses the hash algorithm
    Equihash for its proof-of-work consensus protocol. Equihash is a memory-intensive
    algorithm that requires significant amounts of memory to solve, which makes it
    resistant to ASIC mining and ensures a more decentralized network.


    *   Grin: Grin is a privacy-focused cryptocurrency that uses the hash algorithm
    MimbleWimble to ensure the privacy of transactions. MimbleWimble combines multiple
    cryptographic techniques, including elliptic curve cryptography (ECC), confidential
    transactions, and Pedersen commitments, to provide a high degree of privacy and
    security.


    These are just a few examples of blockchains that use alternative hash algorithms
    to secure their networks. Over time, there will almost certainly be further innovations
    in hash algorithms and other security measures to improve the efficiency, security,
    and privacy of blockchain networks.


    When an NFT is created, its unique digital content is hashed using the relevant
    algorithm. This creates a unique digital fingerprint of the NFT, which is stored
    on the blockchain along with other information such as the owner’s public key
    (their wallet address), the date of creation, and the smart contract governing
    the NFT. Because the hash function is deterministic, the same input data will
    always produce the same output hash value. This means that the hash value can
    be used to verify the authenticity and ownership of an NFT.


    The hash value of an NFT can be compared with the hash value stored on the blockchain
    to ensure that the NFT is authentic and has not been tampered with. Because the
    hash value is unique to the NFT, it cannot be used to create a counterfeit or
    duplicate NFT. Even small changes in the digital content of the NFT will result
    in a completely different hash value, making it effectively impossible to create
    a counterfeit or duplicate NFT that matches the hash value of the original.


    The use of a hash function in NFTs is a critical component of their authenticity
    and value. It enables users to verify that an NFT is unique, authentic, and owned
    by the user who claims to own it. This is important in many sectors, but particularly
    in the world of digital art, where the value of an NFT is often based on its uniqueness
    and authenticity. Without a reliable way to verify the authenticity of an NFT,
    it would be difficult to establish its value or prevent counterfeiting.'
