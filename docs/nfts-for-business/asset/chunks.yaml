- fmt: '# A Tale of Three Webs


    The pursuit of that dream came to a sudden halt, it seemed, with the stock market
    crash of March 2000, a crash that washed off all that “silliness” and “insanity,”
    we were told, that had been bubbling and brewing as our imaginations shot off
    to new exhilarating heights and depths. The party was over, it was announced,
    no more “irrational exuberance,” and the clearing at once commenced, sweeping
    the debris of that decade-long experiment off into some unmarked dustbin to make
    way for the next phase: the “sober,” “subdued,” and “orderly” Web.


    Not all was lost, we were assured, however. The pipes underneath remained, along
    with the various infrastructures and the learnings and the experiments and the
    failures from that zany, crazy, wacky decade of the 1990s; pipes that made possible
    all that we now take for granted – from smartphones to videos to smart speakers
    to `AirPods` to the podcasts that we can’t sleep without.


    Many like us, those who actively participated in that wonderful madness, are experiencing
    a visceral sense of *deja vu* with NFTs and other emerging Web3 tools. Wild claims
    and naysayers, thrilling prospects and dark counter-visions, heady dreams and
    the scoffing of realists – none of that is really news. But instead of the brick-and-mortar
    baseline of the mid-1990s, our current baseline is our mature Web 2.0-infused
    lifeworld, one that has long figured out how one can make lots and lots of money
    from it. But more than making money, how we live our daily life and how we exist
    as sentient humans. Being “off the grid” is now such an odd state that one needs
    to announce it to others days if not weeks in advance. And even then, we are never
    off the grid.


    Hence the challenge: while the deltas between going from no-Web to Web 1.0 or
    from Web 1.0 to Web 2.0 are significant, even obvious and relatively easy to grasp,
    going from Web 2.0 to Web 3.0 is apparently not.


    But a brief pause to quickly define what the three iterations of the Web mean
    in general terms.


    **Web 1.0** can be described as the state of the Web when the vast majority of
    those who surfed it were passive readers, while a very tiny number were creators
    of that content. The mission of Web1 was to enable those who had the means (usually
    universities) to create content, and those who had the means to look for such
    content (`Yahoo`, `AltaVista`) and find it using an interface that did not require
    any knowledge other than clicking on links and perhaps (in rare occasions) filling
    out forms (`Mosaic`, `Netscape`).


    With **Web 2.0,** we went from a few passive readers looking for and reading documents,
    and fewer creators of such content, to a much larger number not only of readers
    but creators. Publishing blogs and websites by the intrepid (`Blogger`) were the
    first Web2 actions, along with curating content, podcasting, and social media.
    It is during this phase that application programming interfaces and the protocols
    that support them were born (`REST`, `RPC`, `SOAP`, `XML`, `JSON`, etc.).


    The jumps from no-Web to Web 1.0 to Web 2.0 are therefore easy enough to grasp
    – at least in hindsight. We went from a very tiny minority creating and sharing
    information to a full-on democratization and mainstreaming of creation and distribution.
    The purported nonlinear jump from Web 2.0 to Web 3.0, however, is apparently harder
    to characterize.


    Or is it? Because, we all know that it’s very easy to see phases and milestones
    when one looks back. At the time, when we were in the middle of “evolving,” the
    Web was a newfangled thing, and the vast majority of people did not take it seriously,
    let alone see it for the seismic shift that it has turned out to be. This included
    Bill Gates, who published his 1995 book, *The Road Ahead*, without mentioning
    the Web at all, only to quickly fix the blunderous miss by tacking on a chapter
    on the Web in a hurried second edition.


    Did we predict that we would order almost all of our stuff using the Web, that
    we would bank using the Web, that we would communicate with each other using the
    Web, that we would self-medicate using the Web, that we would learn using the
    Web, that we would find the solution to any of our problems? This includes how
    to extract a broken key by watching a YouTube video that someone posted – who
    knows why? In essence, live online?


    No, we didn’t. Not at all.


    But the fact is that the future was already there, like the future is always here,
    except that, as William Gibson’s famous saying goes, “it’s just not evenly distributed”
    – yet.


    I suspect that the same is taking place today.


    To begin understanding what Web 3.0 is all about, digging into the technologies
    that purport to implement it – blockchains, NFTs, DAOs, DeFi, etc. – I discovered,
    is the wrong way to go about reaching such understanding. Doing so would be akin
    to diving into `TCP/IP`, `HTTP`, `FTP`, `SMTP`, or `XML`, to understand what Web1
    or Web2 were all about. Instead, a more fruitful way perhaps is to enumerate the
    values, the principles, and the goals of this coming phase, as well as the problems
    that we wish this new iteration to solve for us.


    In a nutshell, here is what I have come to understand what Web 3.0 to be about
    after engaging via phone and Zoom conversations, and email exchanges with more
    than two dozen Web 3.0 experts and practitioners. Among other things, Web 3.0
    is about decentralization, frictionless transaction, collective and community
    base creation, ownership, access to meaning rather than simply to information,
    creation of meaning rather than just information, and security and privacy.'
