  trans: '

    ### 实用性


    另一个需要考虑的变量是 NFT 的实用性。虽然有些 NFT 纯粹是收藏品，但许多其他 NFT 在特定生态系统或平台内具有功能性用途。例如，一些游戏 NFT
    可用作游戏内物品或货币，而另一些则可用作访问虚拟世界中特定区域或功能的密钥。创作者不妨考虑如何为自己的 NFT 增加功能性用途，以提升其价值和吸引力。


    `实用性`可以被视为 NFT 的外部变量。这是因为 NFT 的实用性并非资产本身固有的，而是源于其在特定生态系统或平台内的使用目的或用途。换言之，具有功能性用途的
    NFT 的价值取决于外部因素，以及它如何在特定背景下被整合和利用。


    例如，一个游戏 NFT 可能在特定游戏或虚拟世界中具有功能性用途，但这种用途依赖于其所处的游戏或世界。脱离了该游戏或世界的背景，NFT 本身并不具备内在的功能性用途。同样，一个提供访问平台内特定功能或内容的
    NFT，其用途仅限于该平台，而这种用途并非 NFT 本身所固有。


    以功能性 NFT 为例，我们可以再次审视 NBA 的 Top Shot，其中 NFT 以篮球比赛精彩片段的形式代表数字收藏品。这些 NFT 兼具内在价值和外在价值，其功能性用途在于能够参与梦幻体育游戏，并访问独家内容和活动。


    另一个例子是将 NFT 用作访问虚拟世界中独家内容或活动的门票。例如，建立在以太坊区块链上的虚拟世界 Decentraland，允许用户买卖作为独家虚拟活动和体验门票的
    NFT。


    此外，一些 NFT 可用作游戏内物品或货币，为收藏品资产增添了功能性用途。这在许多基于区块链的游戏中很常见，例如 Axie Infinity 和 The Sandbox，在这些游戏中，NFT
    可用作游戏内资产，并在去中心化市场上进行交易。


    在 NFT 中加入功能性用途可以提升其吸引力和价值，因为它提供了超越单纯拥有收藏品资产的实际益处。有志于创作 NFT 的人应仔细考量其 NFT 的潜在用例，以及如何增加功能性用途以吸引更广泛的买家，并提升
    NFT 的长期价值。


    ### 其他变量功能


    NFT 的其他方面或变量可能包括其稀有性、历史记录和出处。


    `稀有性`指的是 NFT 的稀缺程度，通常认为稀缺性会提升其价值。历史记录和出处指的是 NFT 的所有权链条和真伪认证，这通常也被认为能提升价值并确保真实性。不过，这并非绝对保证；糟糕的出处记录肯定会*降低*价值。


    稀有性或稀缺性是 NFT 创作者试图提升其价值时最常使用的因素之一。它营造了一种专属感。为了实现这一点，创作者可以限制一个系列中 NFT 的数量，或者创作独一无二的
    NFT。这通常被称为“孤品”。稀缺性也可以通过限量版发行来实现，每个版本都有固定数量的 NFT 可供购买。


    几乎每一个 NFT 系列都试图利用稀有性的概念来提升价值。例子包括 CryptoKitties NFT 系列，其中的每个 NFT 代表一只拥有自身属性（如毛色和眼型）的独特虚拟猫。这些猫中的一些比其他的更稀有，收藏家们愿意为此支付溢价。以
    World of Women NFT 系列为例，每个 NFT 代表一幅独特的女性角色插画，其中一些因其独特的特征或背景故事而比其他更稀有。


    请记住，与出处一样，稀有性并不会自动提升价值。如果一个 NFT 除了稀有之外没有其他价值，那并不意味着它本身就有价值。许多创作者忘记了这一点，创作出以稀有性为卖点的系列，以为这会让它们更值钱，结果却发现没人关心，因为缺乏其他价值。


    这引出了 NFT 的另一个潜在价值方面：历史意义。例如，推特 CEO 杰克·多西发布的第一条推文被铸成了 NFT，并以 290 万美元的价格售出，该推文的历史意义为其增加了价值。另一个例子是有史以来第一个被创建的
    NFT，因其历史意义及其在建立 NFT 市场中的作用，以 150 万美元的价格售出。


    不过请记住，这种价值很大程度上取决于市场和买家的情绪。杰克·多西的第一条推文 NFT 在 2021 年 3 月可能卖出了 290 万美元，但在 2022 年
    4 月再次挂牌出售时，最高出价仅为 277 美元。


    也有多个实例表明，NFT 的铸造还借鉴了数字领域之外具有历史意义的作品或事件。何塞·拿破仑·杜阿尔特系列代表了这位萨尔瓦多前总统的作品全集，每个 NFT 代表对其遗产中杜阿尔特作品、演讲等经认证复制品的所有权。


    创建 NFT 时的另一个重要考虑因素是它的交互潜力。与传统的实体艺术品不同，NFT 可以设计融入互动元素，例如动画、音效和其他多媒体组件。这可以为 NFT
    增加价值和独特性，同时为收藏家和买家提供更具吸引力和沉浸感的体验。Bored Apes 就是包含互动元素的 NFT 的一个好例子——Snoop Dogg 和
    Eminem 甚至制作了一个以他们的 Bored Apes 为主角的音乐视频。


    不过，创作者在基于 NFT 创作衍生作品或二次创作时必须谨慎：NFT 的创建和拥有并不必然赋予其底层艺术品或资产的版权或知识产权。版权法仍然适用，在创建和销售
    NFT 之前，确保已获得所有必要的许可至关重要。在销售和分发 NFT 时，考虑潜在的剽窃或版权侵权问题也很重要。


    当 Yuga Labs 创建 Bored Ape Yacht Club 系列时，他们将每只猿猴的完整知识产权赋予了其所有者。这是一种不常见的做法，但对于任何正在创建
    NFT 系列的人来说，这值得作为一种潜在的方面进行考虑，以使每个 NFT 更具价值。


    不幸的是，许多变量都受限于一个简单的限制：文件大小。

    '
- fmt: '### File Size


    The issue of file size is a significant concern when it comes to NFTs, particularly
    with regard to storing and transferring them on the blockchain. Because NFTs are
    typically comprised of digital files, such as images or videos, the size of these
    files can be quite large, particularly for high-quality or high-resolution content.
    This presents a challenge for blockchain networks, which have limited storage
    capacity and bandwidth.


    One approach to addressing this issue is to use compression techniques to reduce
    the size of the files without sacrificing quality. However, there is a trade-off
    between file size and quality, and in some cases, compression can lead to loss
    of detail or visual artifacts that can negatively impact the value of an NFT.


    The most common approach is to store files off-chain, rather than on the blockchain
    itself. This involves storing the file on a separate server or cloud storage platform
    and linking to it from the NFT using a unique identifier or hash value. This approach
    can help reduce the size of the NFT on the blockchain while still providing access
    to the original file when needed. However, it also introduces additional complexity
    and potential points of failure – the off-chain storage platform must be maintained
    and accessible in order to access the file.


    This approach has also been a point of controversy in the NFT community, with
    some accusing it of being a scam. Off-chain storage requires that the unique identifier
    or hash value used to link to the file be kept secure and accessible, which can
    be a challenge in itself. Also, keeping the storage platform online can be problematic
    if the platform goes down or is hacked, which can compromise the authenticity
    of the NFT.


    This also creates a vulnerability where the person who created the NFT and the
    off-chain storage can modify the file stored off-chain, effectively destroying
    the NFT from afar. This vulnerability was demonstrated in 2021 by the founder
    of encrypted messaging app Signal, who sold NFTs that pointed to a file he later
    replaced with a poop emoji to serve as a cautionary tale.


    ### Storage Considerations


    To address these concerns, some NFT creators have turned to decentralized storage
    solutions such as `IPFS` (InterPlanetary File System) or `Arweave`. These platforms
    offer a more secure and decentralized approach to file storage, which can help
    to mitigate the potential risks associated with off-chain storage. These solutions
    are not perfect, but continue to improve over time.


    Despite these concerns, off-chain storage remains a popular approach for many
    NFT creators, as it allows them to create and sell NFTs without having to worry
    about the limitations of on-chain storage. However, NFT buyers should understand
    the associated risks and carefully evaluate the authenticity and value of the
    NFT before making a purchase.


    The `BSV` (Bitcoin Satoshi Vision) blockchain, which is a fork of the original
    Bitcoin blockchain, has taken a different approach to the NFT file size issue.
    Unlike other blockchains, which limit the size of individual transactions, the
    `BSV` blockchain allows for much larger transactions as it has no cap on the block
    size. This is because the `BSV` blockchain is focused on enabling large-scale
    data applications.


    By allowing for larger transactions, the `BSV` blockchain is able to store more
    information on-chain, including larger NFT files. This approach eliminates the
    need for off-chain storage. Additionally, it can reduce the transaction costs
    associated with creating and transferring NFTs, as larger transactions on other
    blockchains can be more expensive.


    However, the larger transaction size limit of the `BSV` blockchain also introduces
    potential security risks. Large transactions can take longer to propagate through
    the network and be validated by nodes, potentially leaving them vulnerable to
    attack. Additionally, larger transactions can also be used to bloat the blockchain
    and consume more storage and processing resources.


    File size presents a significant challenge for NFT creators and collectors, particularly
    as the demand for high-quality and high-resolution content continues to grow.
    Finding a balance between file size, quality, and accessibility is critical to
    ensure the long-term value and viability of NFTs as a digital asset class.


    Ultimately, the aspects or variables of an NFT will depend on the specific use
    case and the intended market. For example, a collectible card might have different
    intrinsic and extrinsic variables than a piece of virtual real estate. It is important
    to carefully consider the aspects and variables of an NFT to create a unique and
    valuable digital asset.'
