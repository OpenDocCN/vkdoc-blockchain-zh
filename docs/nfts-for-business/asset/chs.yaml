- '# 关于作者


  '
- '# 1. NFT 解决的问题


  非同质化代币（NFT）是一种数字资产，可以以艺术、音乐、游戏内物品、视频等形式呈现，如今似乎无处不在。从艺术和音乐到墨西哥卷饼和卫生纸，这些数字资产正像 17
  世纪风靡一时的异域荷兰郁金香一样热销——其中一些甚至能卖出数百万美元。


  因此，当你创造出新事物时，你理应获得与所创造价值相称的回报。为了实现这一点，我们需要将物理世界的约束复刻到数字世界中。也就是说，我们需要引入稀缺性、明确所有权、验证真实性、追溯来源，并实现版税的收取——这正是本章的基础。


  ## 引言


  技术创新的速率正以前所未有的速度加速发展，这已是不言而喻的事实。一项新技术不仅能解决一系列现有问题，还为下一代创新工具的诞生铺平了道路。最明显的例子就是个人电脑。最初问世时，PC
  是一种帮助人们更高效地完成已有事务的小工具：打字时无需再使用需要纸张、墨水和涂改液（还时不时会出故障）的打字机；计算时无需计算器；制作资产负债表时无需铅笔、钢笔、纸张和尺子；学习时无需去图书馆；玩游戏时也无需去游戏厅。


  但很快，PC 本身就成为了一个平台，催生了进一步的创新。BASIC、FORTRAN、COBOL 和 Pascal 等高级编程语言，让任何愿意学习的人都能编写新软件，为现有问题提供新的解决方案。此类软件（例如
  AutoCAD）使其用户能够以更低的成本更快地进行试验。这反过来又催生了更新的解决方案，这些解决方案本身又成为了下一代的创新引擎。


  自 20 世纪 70 年代末第一代 PC 问世以来，我们已经进入了第五个十年。从那时起，我们见证了好几波创新浪潮，每一波都开辟了新的可能性前景，同时也带来了市场采用这些可能性转化成的产品和解决方案而产生的挑战生态系统：互联网、万维网、Wi-Fi
  连接、手机、云、智能手机及其运行的移动应用，以及最近的社交网络。


  但第五个十年的新现实在于，我们几乎日复一日、在一天中几乎每一个清醒的时刻（甚至当我们睡觉时，如果包括在睡眠中监测和收集我们生命体征的设备），所做的每一件事都涉及使用数字设备——无论是台式机、笔记本电脑、平板、智能手机、智能音箱还是可穿戴设备。我们与同胞互动、购物、规划旅行、组织政治运动、听音乐、工作、点餐、学习、娱乐，以及其他一切可以想象的事情，几乎都完全在数字世界中进行。


  确实，从 Radio Shack 的 TRS-80、Commodore PET 和 Atari 800 时代以来，无论从硬件、软件，还是支撑我们世界运转的基础设施来看，我们都已取得了长足的进步。但数字生态系统的一些核心属性与支撑我们经济价值链交付体系的基本支柱之间的错位，至今仍未得到任何有意义的解决。


  数字世界的基本特征是近乎零成本和即时复制：我可以随时随地以几乎零成本无限次地复制一份文件。我可以以任何我想的方式分发这些文件。收到这些文件的人也可以这样做：他们可以以任何他们希望的方式复制和分发这些文件。在这种情况下，稀缺性、所有权、真实性、来源追溯和版税收取要么成为无意义的概念，要么几乎无法实现。在财富分配不再依赖劳动之前（而且没有人会屏息以待这样一个体系能很快出现），人类必须采用一种机制，使我们经济所依赖的价值交换能够适应我们日益数字化的现实。




  ### 稀缺性


  稀缺性是指资源相对于需求而言有限可用或短缺的概念。在经济学中，稀缺性是影响个人、企业和政府如何有效分配资源决策的基本概念。


  在数字世界中，稀缺性常常是一个问题，因为数字商品可以轻易地无限复制。这意味着一旦创建了原始数字资产，就可以无限复制，导致稀缺性缺失，价值也随之降低。


  NFT 通过创建独特、不可互换的数字资产来提供数字稀缺性。这意味着每个 NFT 都是独一无二的，无法复制，这有助于确立其价值。NFT 可用于代表多种数字资产，包括艺术、音乐、电子游戏等。例如，艺术家可以创作一件独特的数字艺术品，并将其作为
  NFT 出售，确保该艺术品在世界上仅存一份真实的副本。是的，复制品会存在——正如在物理世界中一样——但与物理世界不同，数字世界可以解决判断某物是原作还是复制品的问题。


  一个取得显著价值的 NFT 例子是 `CryptoPunks` 系列。`CryptoPunks` 是在 `Ethereum` 区块链上创建的 10,000 个独特的数字角色系列。每个
  `CryptoPunk` 都是独一无二的，其中一些售价高达数百万美元。


  另一个例子是数字艺术家 `Beeple`，他于 2021 年 3 月在佳士得拍卖会上以 6900 万美元售出了一件 NFT 艺术品。这次销售展示了独特、不可互换的数字资产的潜在价值，以及
  NFT 在数字世界中创造稀缺性的能力。


  第三个例子是 `NBA Top Shot`，这是一个基于区块链的平台，允许用户以 NBA 篮球比赛视频精彩片段的形式购买、出售和交易 NFT。每个精彩片段都是一个独特的
  NFT，并且通过限制每场比赛可用的瞬间数量来确保其稀缺性。`NBA Top Shot` 大受欢迎，部分精彩片段售价高达数十万美元。


  还有一个例子是 `Decentraland`，这是一个建立在 `Ethereum` 区块链上的虚拟现实平台，允许用户将虚拟土地地块作为 NFT 进行购买、出售和交易。每个土地地块都是独一无二的，无法复制，从而在虚拟世界中创造了稀缺性。用户可以利用自己的土地地块构建虚拟体验，例如游戏、艺术画廊等，并通过将其作为
  NFT 出售来实现创收。每个土地地块的价值由其位置、大小以及其上构建的内容决定。


  ### 所有权


  所有权是指个人或实体对有形或无形资产主张控制权和拥有权的法律和道德权利。传统上，所有权与房屋、汽车或土地等实物相关联。然而，在数字世界中，所有权通常指控制和主张对数字资产（如图像、视频、音乐、播客、软件及其他类型的数字内容）拥有权的能力。


  数字世界在所有权方面带来了许多挑战。与实物资产不同，数字资产可以轻易地被复制、共享和分发。这使得个人和企业难以主张对其数字资产的所有权，并难以控制它们的使用和分发方式。数字复制的便利性也导致了版权侵权和知识产权盗窃问题，使艺术家和创作者难以通过作品盈利并保护自身权益。


  NFT 作为数字世界中所有权问题的解决方案应运而生。通过为特定的数字资产创建一个独一无二的代币，NFT 不仅能创造数字稀缺性，还能实现数字资产的独有所有权。


  NFT 通过提供一种证明数字资产所有权和真实性的方式，解决了数字世界中的所有权问题。NFT 为艺术家、音乐家和创作者提供了一种将其数字创作作为独一无二的资产进行销售和变现的方式。NFT
  也为收藏家提供了一种主张对数字收藏品（如交易卡、限量版收藏品和稀有游戏内物品）拥有权的方式。


  以下是 NFT 如何解决数字世界中所有权问题的五个示例：


  - **数字艺术**：NFT 允许艺术家证明其数字艺术品的所有权和真实性，提供了一种将其数字创作作为独特、独一无二的资产进行销售和交易的方式。例如，艺术家 `Beeple`
  以 NFT 形式售出了一件名为“每一天：前 5000 天”的数字艺术品，售价为 6900 万美元。


  - **收藏品**：NFT 允许收藏家主张对数字收藏品的拥有权，例如交易卡、限量版物品和稀有游戏内物品。例如，NBA 创建了 `NBA Top Shot`，这是一个以
  NFT 形式买卖数字收藏品的平台。


  - **音乐**：NFT 为音乐家和音乐制作人提供了一种主张其音乐所有权、销售独特体验以及控制其音乐分发的方式。例如，音乐人 `Grimes` 出售了一个 NFT
  系列，其中包括未发布的音乐和艺术品，售价近 600 万美元。


  - **虚拟房地产**：NFT 允许拥有在线游戏和虚拟世界中的虚拟房地产，为玩家提供了一种拥有和交易虚拟资产的方式。例如，虚拟世界 `Decentraland`
  允许玩家以 NFT 形式买卖虚拟土地。


  - **域名**：NFT 允许域名的拥有和转让，为个人和企业提供了一种将独特域名作为独一无二的资产进行主张和出售的方式。例如，域名 `eth.com` 曾以 200
  万美元的价格作为 NFT 售出。




  ### 真实性


  真实性是一个在艺术、文学和哲学等多个领域被广泛讨论的概念。其核心是指一种品质，即真实的、原汁原味的，或忠于自我及原始来源。在数字世界中，由于数字内容的创建、复制和分享变得十分容易，真实性问题便应运而生。这导致了虚假或伪造数字内容的泛滥，使得区分真伪变得困难。近年来，非同质化代币（NFT）的出现彻底改变了数字世界中真实性的感知和管理方式。


  `NFT` 是用来代表对独特或稀有资产或内容所有权的数字代币。`NFT` 旨在通过提供一种独一无二且不可篡改的所有权记录来解决数字世界中的真实性问题，这种记录无法被复制或仿造。


  以下五个例子说明了 NFT 如何解决数字世界中的真实性问题：


  -   **数字艺术**：过去，数字艺术家很难证明其作品的所有权，也难以因创作获得合理报酬。借助 NFT，数字艺术家可以为每件作品创建独特的代币，提供一个安全且不可复制的所有权记录。

  -   **音乐**：NFT 也被用于音乐行业，为稀有或独家音乐曲目提供安全的所有权记录。NFT 可以用来代表原始录音的所有权，为艺术家提供了将其作品变现并控制其发行的机会。

  -   **游戏**：在游戏行业，NFT 被用来代表游戏内物品和虚拟资产的所有权。玩家可以买卖稀有或专属物品的 NFT，这提供了真实所有权的安全记录，并为数字收藏品创造了新市场。

  -   **体育**：NFT 也被用于体育行业，代表稀有或独家纪念品（如比赛穿过的球衣或签名物品）的所有权。NFT 提供了安全且可验证的所有权记录，使粉丝能够在透明且安全的市场上买卖独特的体育纪念品。

  -   **房地产**：NFT 也被用于房地产行业，代表独特或专属房产的所有权。NFT 可以提供安全且不可篡改的所有权记录，使买卖双方更容易转移高价值房产的所有权。


  ### 来源出处


  来源出处指的是特定物品或物件（包括其起源、保管链条以及随时间发生的任何变化）的所有权与保管历史。例如，在艺术界，来源出处用于确立一件艺术品的真实性、所有权和历史，这对于确定其价值至关重要。在数字世界中，来源出处指的是数字资产（如文档、图像或视频）的所有权及更改历史。它对于确定数字资产的真实性、完整性和所有权至关重要，随着数字资产变得更有价值和无处不在，这一点也愈发重要。


  数字世界中的来源出处问题之所以产生，是因为数字资产易于复制和篡改，并且难以确定数字资产的原创性和所有权。这使得人们很容易创建和分发伪造或篡改的数字资产，这些资产可能被用于欺诈目的，例如身份盗用、知识产权盗窃和金融诈骗。此外，追踪数字资产的所有权和历史也很困难，这可能导致所有权和控制权的纠纷。


  NFT 已成为解决数字世界来源出处问题的一种方案。NFT 是代表特定数字资产（如图像、视频或音乐文件）所有权的独特数字代币。每个 NFT 都是独一无二的，无法复制或仿造，这意味着很容易确定数字资产的原创性和所有权。NFT
  存储在区块链上，区块链是一种分布式账本，记录着数字资产所有权的所有交易和变更。这使得追踪数字资产的所有权和历史变得容易，从而可以确立其来源出处。


  以下是五个例子，说明 NFT 如何解决数字世界中的来源出处问题：


  -   **艺术**：NFT 在艺术界变得流行，用于确立数字艺术的所有权和来源出处。NFT 可以用来验证数字艺术品的真实性，而区块链可用于追踪其所有权及随时间发生的任何变更。例如，艺术家
  Beeple 在 2021 年 3 月以 6900 万美元出售了一件数字艺术品，用于代表该艺术品的 NFT 确立了该作品的所有权和真实性。

  -   **音乐**：NFT 可用于确立音乐文件的所有权和来源出处，音乐文件经常遭受盗版和知识产权盗窃。NFT 可以用来验证音乐文件的所有权，而区块链可用于追踪其使用情况及随时间发生的任何变更。例如，2021
  年 3 月，摇滚乐队 Kings of Leon 成为第一支以 NFT 形式发行专辑的乐队，此举确立了该专辑的所有权和真实性。

  -   **游戏**：NFT 在游戏行业日益流行，可用于确立游戏内资产（如虚拟房地产、角色和物品）的所有权和来源出处。NFT 可以用来验证游戏内资产的所有权，而区块链可用于追踪其使用情况及随时间发生的任何变更。例如，游戏`Axie
  Infinity`允许玩家拥有并交易代表游戏内资产的 NFT，从而确立了这些资产的所有权和真实性。

  -   **房地产**：NFT 可用于确立房地产资产（如地契和合同）的所有权和来源出处。NFT 可以用来验证房地产资产的所有权，而区块链可用于追踪其所有权及随时间发生的任何变更。

  -   **体育纪念品**：NFT 可用于确立体育纪念品（如球星卡、球衣和装备）的所有权和来源出处。NFT 可以用来验证体育纪念品物品的真实性，而区块链可用于追踪其所有权及随时间发生的任何变更。例如，美国国家篮球协会（NBA）与一家名为`NBA
  Top Shot`的公司合作，销售代表数字收藏品（如比赛集锦和球员卡）的 NFT，这些 NFT 确立了收藏品的所有权和真实性。




  ### 版税


  版税是向知识产权所有者支付的一种费用形式，通常作为使用该权利的交换。例如，在音乐领域，当歌曲以多种方式被使用时，例如在电台播放、在线流媒体播放，或用于电影、电视节目中，需要向词曲作者和出版商支付版税。


  在数字世界中，版税的概念同样重要，甚至更为关键。随着数字媒体的兴起，人们比以往任何时候都更容易创作和分发自己的内容，无论是音乐、视频、图像，还是其他形式的数字艺术。然而，这种便捷的分发方式也给创作者带来了新的挑战，他们现在必须应对盗版、作品未经授权使用，以及在追踪和执行知识产权方面遇到的困难。


  创作者应对这些挑战的一种方式是使用 NFT。NFT 是一种数字资产，存储在区块链上——这是一种以安全、透明方式记录交易的去中心化账本。当有人购买 NFT 时，他们本质上是在购买一个独特的数字代币，代表对特定内容（例如歌曲、视频或艺术品）的所有权。


  NFT 旨在解决长期困扰数字内容世界的诸多问题，其中就包括版税问题。由于 NFT 存储在区块链上，它们使创作者能够以一种透明且易于验证的方式确立对其作品的所有权。这意味着如果有人想使用与某个
  NFT 关联的内容，他们必须获得所有者的许可，并支付所需的版税。


  为了说明版税的概念以及 NFT 如何帮助解决这一问题，我们来看五个不同的例子：


  - **音乐**：一位音乐人创作了一首新歌，并在 Spotify 等流媒体平台上发布。由于这首歌与一个 NFT 相关联，音乐人可以确保从歌曲的流媒体播放收入中获得分成，即使歌曲被加入播放列表或在其他场景中被使用而未经其直接参与。

  - **艺术**：一位艺术家创作了一件数字艺术品，并以 NFT 形式出售。由于艺术品的所有权记录在区块链上，艺术家可以确保从该艺术品的任何后续销售中获得分成，即使它被多次转售或交易。

  - **电子游戏**：一位游戏开发者开发了一款新游戏，并通过 Steam 等在线平台发布。通过将游戏与 NFT 关联，开发者可以确保从游戏产生的收入中获得分成，即使游戏通过其他渠道销售或分发。

  - **摄影**：一位摄影师拍摄了一张精彩的照片，并授权给网站或杂志使用。通过使用 NFT 确立对照片的所有权，摄影师可以确保每次使用该照片时都能获得版税，无论是一次性使用还是多次使用。

  - **写作**：一位作者写了一本新书，并在亚马逊等平台上自行出版。通过将书与 NFT 关联，作者可以确保从书籍销售产生的收入中获得分成，即使书籍通过其他渠道销售或分发。


  ## 总结


  在本章中，我们讨论了技术创新的快速步伐及其对我们生活各个方面的影响。我们着重指出，信息技术已从仅为特定任务提供工具，演变为驱动进一步创新的平台。本章强调，当今时代的特征是数字技术几乎渗透到我们生活的方方面面。尽管经历了这种数字变革，我们却发现了数字生态系统的核心属性与传统经济价值链之间的错位。数字世界的五个关键属性被提出：稀缺性、所有权、真实性、来源和版税。本章深入探讨了这些属性的重要性，讨论了数字领域带来的挑战，并介绍了非同质化代币（NFT）作为应对这些挑战的解决方案。它阐述了
  NFT 如何在数字领域提供数字稀缺性、独特所有权、真实性验证与来源追踪，并促进版税支付。本章的引言为探索 NFT 在重塑我们感知和互动数字资产方式中的作用奠定了基础。


  '
- '# 2. NFT 背后的技术


  支撑 NFT 创建、转移和使用的技术，在业界通常被称为区块链或分布式账本技术。虽然比特币是第一个被广泛使用的区块链协议，但这项技术的历史可以追溯到几十年前。在本章中，我们将熟悉这项技术。




  ## 区块链基础


  爱沙尼亚政府于 2008 年开始使用区块链技术，这比比特币问世还早一年。事实上，可以认为区块链技术是由研究人员斯图尔特·哈伯和 W·斯科特·斯托内塔于 1991
  年在发表《如何为数字文档添加时间戳》一文时发明的。


  其核心而言，区块链技术是一种去中心化且透明的账本系统，能够提供安全且不可篡改的带时间戳的交易记录。区块链允许创建智能合约——这是一种自动执行的合约，买卖双方之间的协议条款被直接写入代码行中，一旦智能合约部署完毕，无需任何人干预即可运行。这项技术实现了“无需信任”的交易，这意味着交易双方无需依赖可信中介即可进行交易。


  因此，区块链是一个分布式数据库，用于跨计算机网络存储交易记录。链中的每个“区块”都包含一组交易——一旦一个区块被添加到链中，就无法更改或删除。这确保了区块链上的记录是安全、透明且防篡改的。每条区块链都使用所谓的“共识机制”来向链中添加区块。这些机制确保网络中的参与者就每笔交易的有效性达成一致。


  区块链可以使用多种不同的共识机制。例如工作量证明、权益证明以及委托权益证明。工作量证明（PoW）是比特币使用的共识机制，并被区块链领域的许多人认为是最安全的一种。对
  PoW 最常见的批评并非基于其安全性，而是其能耗问题：在工作量证明系统中，矿工们竞相解决复杂的数学问题，以验证交易并向区块链添加新区块，在某些实现中，这可能是一个能源密集的过程。


  权益证明（PoS）是另一种非常流行的共识机制。它是以太坊所使用的机制，以太坊于 2022 年 9 月 15 日从 PoW 协议过渡而来。PoS 不需要矿工解决复杂问题，而是依赖于验证者，这些验证者持有并“质押”一定数量的“账本原生代币”（即区块链运行所基于的代币）来验证交易并向区块链添加新区块。对于以太坊区块链而言，其账本原生代币是
  ETH（以太币）。由于 PoS 生态系统中没有矿工，其能源消耗要低得多，并且通常交易费用也更低。


  区块链技术的关键特性之一是其不可篡改性。一旦一个区块被添加到区块链中，在不被察觉的情况下更改或删除它是几乎不可能的。进行此类更改是可能的，但需要获得大多数区块生产者的同意。在
  PoW 系统中，这些生产者是矿工；在 PoS 系统中，则是验证者。这确保了区块链的完整性和安全性，前提是其足够成熟，能够抵御“51%攻击”——即恶意行为者控制了超过半数的区块生产者，从而获得编辑区块链的能力。这使得它成为在更成熟的网络上创建和转移有价值的数字资产（如
  NFT）的理想技术。


  然而，在需要纠正错误或逆转交易（例如发生黑客攻击或犯罪活动）的情况下，不可篡改性也可能构成挑战。一些区块链（如 Energi）在设计时就考虑到了这个问题，并提供了解决方案，这对企业用例很有吸引力，但此类链的数量相对较少。


  尽管如此，近年来对企业级区块链解决方案的开发兴趣日益增长。这些解决方案旨在满足企业和组织的需求，通常提供额外功能，如许可访问、可扩展性和互操作性。一些领先的企业级区块链解决方案包括超级账本
  Fabric、R3 Corda 和 Quorum。


  得益于这些区块链的去中心化特性，那些面临将重要数据存储在中心化服务器上风险的企业可以降低这些风险。由于区块链存储在一个计算机网络中，而非一个中心位置，因此它对攻击和篡改具有很强的抵抗力。这项技术在医疗保健等领域激发了兴趣——在这些领域，机构不愿持有用户数据，但仍需了解其客户——NFT
  可以在此发挥重要作用，允许患者向不同的医疗服务提供者提供对其健康数据的定制化访问权限。


  区块链技术另一个广受认可的好处是透明性。所有交易都公开记录在区块链上，这意味着它们是公开可见且易于审计的。存在一些例外情况，例如 Grin 或 Secret Network
  等注重隐私的链，但即便在其中许多链上，大量数据也可以原生地公开。这确保了网络中的各方，或针对特定交易的所有相关方，都能清晰准确地了解所发生的事情。这促进了参与者之间的信任。


  此外，尽管媒体上充斥着关于黑客攻击和安全漏洞的报道，但区块链技术本身是高度安全的。缺陷几乎总是源于设计不良的智能合约，这些合约随后被利用以耗尽代币。然而，链上的信息和数据极难被攻击。链中的每个区块都通过密码学方式与前一个区块相连，从而创建了安全且不可篡改的交易记录。这确保了交易无法在不被察觉的情况下被更改或删除，有助于防止欺诈。


  这种欺诈防范是区块链技术提供的关键优势之一。由于区块链上的每笔交易都经过庞大的节点网络验证，该系统几乎是防篡改的，除非恶意行为者成功实施 51%攻击。该技术还能抵御网络攻击，因为区块链使用先进的密码学技术来防止未经授权的访问。此外，任何差异或违规行为都能被迅速识别和调查。


  区块链技术的另一个关键优势是其建立信任的能力。由于每笔交易都经过验证并记录在区块链上，交易不再需要可信的中介——托管可以完全自动化。这“去掉了中间人”，可以降低成本并提高效率。这也意味着没有人能够“作弊”或错误分配资金。例如，一个使用加密货币进行筹款的非营利组织不能简单地将捐赠者的钱收入囊中，而不将其用于他们承诺支持的项目。


  区块链通常由五个层级组成，每个层级功能不同。这些层级如下：


  1.  硬件层

  2.  网络层

  3.  协议层

  4.  中间件层

  5.  应用层


  硬件层是最底层。它是物理基础设施，由物理组件组成，例如服务器、存储设备、矿工，以及根据链的具体情况所需的其他硬件。


  网络层位于硬件层之上，提供网络节点间通信的基础设施，例如点对点网络、数据传播和安全性。


  协议层位于网络层之上，定义了管理网络运行的规则和协议，例如共识机制、区块验证和交易处理。



  中间件层位于协议层与应用层之间，提供支持链上程序运行所需的基础设施，包括数据存储、消息传递以及网络不同组件间通信的协议。


  应用层是最高的层级，用户在此与网络交互，应用程序也在此构建。它包括用户界面、智能合约和去中心化应用（简称 dApp）。使用区块链的大多数人只与这一层交互。


  区块链技术所创造的安全环境，使得数字资产能够以其他技术无法实现的方式蓬勃发展。由于过往信息难以被篡改，数据无法被简单复制粘贴，所有权可以得到验证，中介机构可以被移除，因此对于希望简化运营并降低成本的企业或其他组织而言，区块链可能是一个有吸引力的选择。随着该技术的持续发展，我们很可能会看到更多进步以及越来越多的应用场景。许多不同类型区块链的持续部署（每种都有其特定的用途）就体现了这一点。


  存在几种不同类型的区块链网络，包括公有链、私有链和混合链。


  公有区块链网络对任何希望参与网络的人开放。这些网络是去中心化的，依靠分布式的节点网络来验证交易并将新区块添加到链上。像`Bitcoin`和`Ethereum`这样的公有网络通常被称为无许可网络，因为任何人都可以无需中心化机构的许可参与到网络中。


  相比之下，私有区块链网络仅限于特定的用户群体，例如一家公司或组织。这些网络通常被称为许可网络，因为参与者必须获得中心化机构的许可才能加入网络。私有网络相对于公有网络有几个优势，包括更高的隐私性和对网络治理的控制权。


  混合区块链网络结合了公有和私有网络的元素，在企业应用中的使用越来越普遍。这些网络兼具公有和私有网络的优点，包括去中心化信任、许可访问和更高的安全性。混合网络通常用于隐私性很重要，但又希望享有公有网络优势的应用场景，例如供应链管理或身份验证。


  除了公有、私有和混合网络外，还有不同类型的共识机制可用于在区块链上验证交易。这些机制包括之前提到的工作量证明和权益证明机制，但远不止这些。每种共识机制都有一套自身的优缺点，适用于不同类型的区块链网络和应用。


  我们来更详细地看看一些更流行的共识机制：


  - **工作量证明（PoW）**：`工作量证明`是区块链技术中使用的原始共识机制，至今仍被`Bitcoin`等流行的加密货币所采用。在`PoW`中，矿工们竞相解决复杂的数学问题，以验证区块链上的新区块。最先解决问题的矿工将获得新铸造的加密货币作为奖励。虽然`PoW`是安全且去中心化的，但它也非常耗能，并可能导致算力中心化。


  - **权益证明（PoS）**：`权益证明`是`PoW`的一种替代方案，旨在提高能源效率。在`PoS`中，验证者在区块链中持有质押权益，并根据其质押权益的大小被选中来验证新区块。验证者有动力以网络的最佳利益行事，因为如果他们被发现行为不端，其质押权益可能会被罚没。`PoS`通常被宣传为比`PoW`更可持续、更环保的替代方案。`Ethereum`是最流行的`PoS`区块链。


  - **委托权益证明（DPoS）**：`委托权益证明`与`PoS`类似，但在选择验证者的方式上有所不同。在`DPoS`中，代币持有者投票选举有限数量的代表，由这些代表负责验证区块链上的交易。这种方法比`PoW`或`PoS`更为中心化，但可以带来更快的交易处理速度和更低的能耗。`EOS`是一个`DPoS`区块链的例子，它提供零交易费用。


  - **权威证明（PoA）**：`权威证明`是一种共识机制，它依赖一小群受信任的验证者来验证区块链上的交易。这种方法快速高效，但可能不如其他共识机制安全且去中心化。`Binance
  Smart Chain（BSC）`使用`权威证明`模型的一个变体，称为`proof-of-staked authority`。


  - **历史证明（PoH）**：`历史证明`是一种新的共识机制，由`Solana`区块链平台开发。`PoH`旨在通过使验证者能够预先计算交易的顺序，而不是在实时中达成交易顺序的共识，从而提高网络的可扩展性。


  不同类型的区块链网络提供了独特的优势，适用于不同类型的应用程序和用例。公有网络非常适合去中心化和开放访问很重要的应用，而私有网络则提供更强的控制力和隐私性。混合网络则集两者之长，提供了去中心化信任、许可访问和更高的安全性。然而，区块链确实也存在一些固有的缺点，这些缺点因每条链的具体情况而异。




  ### 应对挑战


  大多数区块链面临的主要挑战之一是可扩展性。随着区块链网络活跃度的提升，区块链的体积也随之增大，导致交易处理变得日益困难和耗时。这会造成交易速度变慢和交易费用升高，尤其是在网络活动高峰期。


  为了解决可扩展性问题，业界已开发并实施了多种解决方案，包括状态通道、侧链和分片技术。状态通道和侧链都被视为**“二层”解决方案**。


  简而言之，二层解决方案是构建在另一条区块链之上的区块链。大多数二层网络都构建在以太坊上，以太坊因其基础层区块链的地位而被视作一层网络。这类方案允许交易在一个独立环境中进行，随后再提交至一层链。这减轻了主区块链的负载，从而提升了性能。


  状态通道是一种简单的二层方案，允许两方在主区块链之外进行交易。这有助于减少主链上的交易数量并提升可扩展性。


  侧链是一种链下解决方案，能够创建与主链相连的独立平行区块链。这些侧链可用于处理对主链非关键的交易，从而提升整体网络效率和可扩展性。这有助于减轻主区块链的负载，使其能更快速、高效地处理关键交易。侧链交易通常会被“汇总”成一笔更大的交易，然后在主链上结算。


  一个广受欢迎的侧链解决方案是 Polygon 网络，它旨在解决以太坊区块链的可扩展性问题。Polygon 网络是一个构建在以太坊区块链之上的二层扩容方案，在保持主以太坊网络优势的同时，实现了更快、更便宜的交易。


  Polygon 网络通过结合使用 Plasma 和权益证明技术来实现这一目标。这使得交易能够在与以太坊主网相连的独立区块链上进行处理，从而减轻主网负载，使其能更快速、高效地处理关键交易。与大多数仿照以太坊构建的区块链一样，Polygon
  网络支持使用 Solidity 编程语言编写的智能合约。


  币安智能链，也称为 BNB Chain，是另一个成功的侧链解决方案实例。BSC 是构建在币安链之上的区块链网络，币安链是为币安交易所专门设计的高性能区块链。BSC
  与以太坊虚拟机兼容，这意味着它支持使用基于以太坊的智能合约。


  BSC 旨在解决以太坊网络的可扩展性和交易速度限制。与其他侧链方案类似，BSC 通过在以太坊主链之外处理交易来实现更快、更便宜的交易。这是通过一个验证者系统实现的，这些验证者负责验证和处理
  BSC 网络上的交易。


  BSC 的一个关键特性是其交易费用远低于以太坊网络。对于选择 BSC 而非以太坊的个人和组织而言，这几乎总是他们做出这一决定的原因。费用更低是因为 BSC 采用了其权益权威证明共识机制，该机制在保持足够程度的网络安全和去中心化的同时，实现了更快的交易处理速度。


  BSC 还支持广泛的去中心化金融应用，包括去中心化交易所、流动性挖矿以及借贷协议。这些应用均由以 Solidity 编程语言编写的智能合约驱动。


  分片是解决区块链网络可扩展性问题的另一种方案，它最初显示出潜力，但也受到了批评。这是一种通过将区块链分割成更小、更易管理的片段（称为“分片”）来提升区块链网络可扩展性和性能的技术，这些分片可以独立处理。每个分片处理一部分交易，从而实现并行处理并提高吞吐量，改善整体交易处理时间和网络可扩展性。


  分片的主要优势之一是它使区块链网络能够水平扩展，而非垂直扩展。这意味着网络不再依赖单一的、庞大的区块链来处理所有交易，而是可以分割成更小、更易管理的部分，这些部分协同工作，以更高效的方式处理交易。


  随着以太坊 2.0 的启动（该事件也被称为“合并”），网络现在包含了一个被称为**信标链**的分片解决方案。信标链于 2022 年 9 月 15 日与以太坊主网“合并”，恰逢以太坊网络从工作量证明共识机制向权益证明机制过渡。信标链协调以太坊网络中的各个分片，确保它们以安全、去中心化的方式协同工作。这有助于提升网络的可扩展性和效率，并实现了更快的交易处理速度。


  分片并非没有缺陷。例如，由于每个分片独立处理交易，如果单个分片成功受到攻击，整个网络的安全性可能会受到损害。每个分片中节点数量较少，可能使攻击者更容易控制该分片的很大一部分，从而导致双花或其他恶意活动。此外，分片链上的节点无需存储完整的区块链历史，这意味着如果一个分片离线，可能会导致延迟或数据丢失。这还会增加网络碎片化，可能造成资源分配不均和系统性效率低下。


  分片技术在以太坊中的应用是其发展的重要一步，它证明了这种提升网络可扩展性的方法既可行又有效。因此，如果分片的缺陷被证明能够得到妥善管理，其他区块链项目很可能会效仿，并在其自身网络中探索使用分片技术。


  另一个探索使用分片技术的区块链项目是 Zilliqa。Zilliqa 是一个高吞吐量的区块链平台，它使用分片技术来提升网络可扩展性和交易处理速度。该平台设计快速、安全且高效，已用于支付、游戏和数字广告等多种应用。


  除了分片技术，Zilliqa 还采用了一种称为**实用拜占庭容错**的独特共识机制。PBFT 非常适合节点已知且可被认证的许可型区块链网络。其主要优点是对拜占庭故障的容忍性和交易的最终确定性，但其可扩展性有限，而
  Zilliqa 正尝试通过分片来解决这一问题。


  Zilliqa 还拥有一个名为 Scilla 的智能合约平台，它被设计得比其他智能合约语言更安全、对开发者更友好。Scilla 使用形式化验证技术来确保智能合约没有错误和漏洞，并为开发者提供了一种清晰易用的编程语言。



  区块链技术的基石使得像 NFT 这样的资产成为可能，但另一个核心组成部分是密码学的运用。没有密码学，这些协议及其上的资产将毫无价值。


  #### 密码学与加密


  密码学是区块链技术的一个基本方面，它确保了交易的安全性和真实性。它采用数字签名等多种技术，来确认交易确实是由声称发起的一方发起的。在区块链中，每个用户都有一对公钥和私钥。私钥是保密的，用于创建数字签名；而任何人都可以访问的公钥则用于解密该签名。


  当涉及到 NFT 时，密码学的主要用途是创建和传输数字签名，用户使用数字签名来验证交易的真实性并防止篡改或伪造。数字签名是使用密码学技术创建的，这些技术涉及区块链上每个用户的一对公钥和私钥，为验证真实性和所有权提供了一种安全可靠的方法。


  用户在发起交易时生成数字签名，使用其私钥创建一个包含交易细节的签名。该签名与交易一起被发送到区块链网络，允许网络上的其他用户使用发送者的公钥来验证数字签名并确认发送者的身份。


  数字签名的生成过程是：将一种密码学哈希函数应用于 NFT 数据，然后使用私钥对得到的哈希值进行加密。加密后的哈希值和公钥作为数字签名存储在区块链上，这确保了该签名对特定
  NFT 的唯一性，并且无法用于验证任何其他 NFT 的真实性。


  这些技术对智能合约和 NFT 都至关重要——它确保了它们的唯一性、真实性和价值。它验证了 NFT 的所有权和转移，防止了复制或伪造。没有它，NFT 将失去其功能价值。


  这种方法还允许用户在参与区块链交易时保持匿名。公钥可以在不透露发送者身份的情况下验证交易的真实性，这对于在维护隐私和匿名性的同时传输敏感财务或个人信息至关重要。


  参与创建和使用 NFT 的智能合约确保了执行过程的安全且防篡改。当创建一个 NFT 时，会被分配一个存储在区块链网络上的唯一标识符。该标识符是使用密码学哈希函数生成的，这是一种数学算法，接收数据并产生固定大小的输出。


  哈希函数的使用确保了 NFT 的唯一性并且无法被复制或伪造。它还使用户能够通过比较 NFT 的哈希值与区块链上存储的哈希值来验证 NFT 的所有权。如果哈希值匹配，则该
  NFT 是真实的，并且归声称拥有它的用户所有。


  区块链中最常见的哈希函数是`SHA-256`（安全哈希算法 256 位），它是一种被广泛认可且安全的密码学算法。`SHA-256`接收任意长度的输入，并产生一个固定长度的
  256 位输出，该输出根据输入数据唯一生成。


  虽然`SHA-256`是区块链技术中最常用的哈希函数，但在 NFT 中也可以使用其他哈希算法。一种替代方案是`SHA-3`（安全哈希算法 3），它由美国国家标准与技术研究院（NIST）开发，并于
  2015 年推出。与`SHA-256`类似，`SHA-3`也是一种产生固定长度输出的密码学哈希函数。然而，它使用了与`SHA-256`不同的算法，这使其在某些类型的攻击面前不那么脆弱。


  另一种替代哈希函数是`BLAKE2`，它于 2012 年推出，是比`SHA-256`更快、更高效的替代方案。`BLAKE2`是一个哈希函数族，包括`BLAKE2b`和`BLAKE2s`，分别针对
  64 位和 32 位平台进行了优化。`BLAKE2`也具有高度可并行化的特点，使其非常适合在 GPU 和其他硬件加速器上使用。


  尽管`SHA-256`是最广泛使用的区块链哈希函数，但在某些场景下，例如当速度、效率或对特定类型攻击的抵抗能力是重要考虑因素时，替代算法可能会很有用。最终，哈希函数的选择将取决于
  NFT 应用的具体要求以及安全性、效率和其他因素之间的期望平衡。


  一些区块链已经实施了除`SHA-256`之外的替代哈希算法，以保护其网络并提高效率。以下是一些例子：


  *   **以太坊**：以太坊使用一种名为`Keccak-256`的哈希算法来保护其网络。`Keccak-256`是通过美国国家标准与技术研究院（NIST）为创建名为`SHA-3`的新哈希函数标准而举办的竞赛中选出的。`Keccak-256`产生
  256 位输出，以其高安全性和高效率而闻名。

  *   **瑞波**：瑞波是一个区块链平台，在其共识协议中使用哈希算法`SHA-512`来提供高安全性和效率。`SHA-512`产生 512 位输出，被认为比`SHA-256`更安全。

  *   **Zcash**：Zcash 是一种注重隐私的加密货币，在其工作量证明共识协议中使用哈希算法`Equihash`。`Equihash`是一种内存密集型算法，需要大量内存来解决，这使得它对
  ASIC 挖矿具有抵抗力，并确保了网络的去中心化程度更高。

  *   **Grin**：Grin 是一种注重隐私的加密货币，使用哈希算法`MimbleWimble`来确保交易的隐私性。`MimbleWimble`结合了多种密码学技术，包括椭圆曲线密码学（ECC）、机密交易和`Pedersen`承诺，以提供高度的隐私和安全性。


  这些只是使用替代哈希算法来保护其网络的几个区块链例子。随着时间的推移，几乎可以肯定会在哈希算法和其他安全措施方面出现进一步的创新，以提高区块链网络的效率、安全性和隐私性。


  当创建一个 NFT 时，其独特的数字内容会使用相关算法进行哈希处理。这会创建该 NFT 的一个唯一数字指纹，并存储在区块链上，同时存储的还有诸如所有者的公钥（他们的钱包地址）、创建日期以及管理该
  NFT 的智能合约等其他信息。由于哈希函数是确定性的，相同的输入数据将始终产生相同的输出哈希值。这意味着哈希值可用于验证 NFT 的真实性和所有权。


  可以将一个 NFT 的哈希值与存储在区块链上的哈希值进行比较，以确保该 NFT 是真实的且未被篡改。由于哈希值对于该 NFT 是唯一的，因此无法用它来创建伪造或重复的
  NFT。即使对 NFT 的数字内容进行微小改动，也会导致完全不同的哈希值，这使得创建与原始 NFT 哈希值匹配的伪造或重复 NFT 实际上是不可能的。


  在 NFT 中使用哈希函数是其真实性和价值的关键组成部分。它使用户能够验证一个 NFT 是唯一的、真实的，并且归声称拥有它的用户所有。这在许多领域都很重要，尤其是在数字艺术领域，因为
  NFT 的价值通常基于其独特性和真实性。如果没有可靠的方法来验证 NFT 的真实性，就很难确定其价值或防止伪造。



  当用户想要验证 NFT 的所有权时，可以对比存储在区块链上的数字签名与根据 NFT 数据创建的数字签名。这一过程涉及对 NFT 数据应用相同的哈希函数，然后使用公钥解密数字签名。如果解密后的值与哈希值匹配，则说明该
  NFT 是真实的，并且归声称拥有它的用户所有。


  从数字签名到所用的哈希算法，再到每个 NFT 的指纹，这一切都确保了每个数字资产的真实性和所有权。它们提供了一种安全可靠的方式来验证 NFT 的所有权，并致力于防止
  NFT 市场中的伪造和欺诈行为。随着 NFT 不断成熟并出现更多用例，除了数字签名和当前采用的密码学技术之外，新的创新几乎肯定将进一步提高 NFT 的安全性和真实性。


  区块链安全以及由此延伸出的 NFT 安全的另一个关键方面是加密。没有加密，钱包地址和私钥等敏感信息就会暴露在未经授权的访问之下，可能导致有价值的 NFT 甚至整个钱包的丢失。如果没有安全的加密来确保只有授权方才能访问这些敏感信息，区块链技术就毫无用处；加密提供了防止盗窃和未经授权访问的关键保护层。


  事实上，加密是数字技术所有领域中安全性的一个关键方面。不仅如此，随着破解加密的技术以及其背后的原始算力不断增强，加密的重要性日益凸显。开发者和用户都必须保持警惕，确保证加密被正确实施和维护，以保护所有数字资产的安全，防止盗窃和欺诈。


  一个高度重视加密的区块链例子是注重隐私的区块链门罗币。门罗币使用一种名为环签名的独特加密技术，该技术通过允许多个用户对一笔交易进行签名，但不透露实际发起交易的用户，从而模糊了交易的来源。这使得任何人都极难追踪门罗币区块链上的交易，为用户提供了高水平的隐私和安全性。到目前为止，还没有人在未入侵用于发起交易的设备的情况下成功追踪到一笔门罗币交易。


  大零币也广泛使用加密技术。它使用零知识证明来加密交易信息，包括发送者地址、接收者地址和交易金额。这使得用户可以在不透露任何关于自身或交易信息的情况下在区块链上进行交易，确保了高水平的隐私和安全性。


  零知识证明是一种密码学证明，它允许一方在不透露除陈述本身真实性之外的任何额外信息的情况下，向另一方证明某个陈述是真的。这是通过使用数学算法来实现的，这些算法能够在不透露证明中所用的底层数据的情况下构建一个证明。


  大零币使用的零知识证明协议被称为`zk-SNARKs`（零知识简洁非交互式知识论证），这是零知识证明最强大的应用之一。`zk-SNARKs` 是一种零知识证明，它允许在不透露任何交易细节或相关方身份的情况下验证一笔交易。其使用并不仅限于大零币，也被海盗链和以太坊等采用，不过目前在以太坊上的实现还相当有限。


  `zk-SNARKs` 通过使用数学算法来创建一个简洁的交易有效性证明。该证明随后会与网络共享，网络可以在不知道任何交易底层细节的情况下验证该证明。这使得 `zk-SNARKs`
  成为确保区块链交易隐私和机密性的强大工具，因为它们能够在不泄露任何敏感信息的情况下验证交易。


  `zk-SNARKs` 的主要用例之一是创建私有区块链，在此类区块链中，交易需要在不泄露任何敏感信息的情况下被验证。例如，在供应链管理系统中，可以使用私有区块链来追踪货物从一个地点到另一个地点的移动。通过使用
  `zk-SNARKs`，供应链中的每笔交易都可以在不透露所运输货物的详细信息或交易相关方的情况下得到验证。


  零知识证明和`zk-SNARKs` 可以通过多种方式应用于 NFT。


  首先，零知识证明可用于证明 NFT 的所有权，而无需泄露任何敏感信息。例如，用户可以在不透露其钱包地址或任何其他识别信息的情况下证明他们拥有一个 NFT。这有助于保护
  NFT 所有者的隐私和安全。


  其次，零知识证明可用于证明 NFT 的真实性，而无需泄露关于 NFT 本身的任何细节。例如，用户可以证明一个 NFT 是真实的，而无需透露关于数字内容或正在被验证的特定
  NFT 的任何信息。这有助于防止假冒 NFT 进入市场，并确保买家购买到的是真实的 NFT。


  第三，`zk-SNARKs` 可用于实现 NFT 的私有交易。这意味着用户可以买卖和交易 NFT，而无需向公众透露任何交易细节。这有助于保护 NFT 所有者的隐私和安全，尤其是在涉及大额资金的情况下。


  零知识证明和`zk-SNARKs` 是强大的工具。通过实现隐私、安全和真实性，这些密码学技术有助于提高 NFT 的整体信任度和价值。


  这使得它们成为从供应链管理到身份验证再到溯源证明等广泛应用中的宝贵工具。例如，一家生产高端奢侈品的公司可以利用借助零知识证明保护的 NFT 来确保其产品的真实性并防止伪造。每件产品都可以关联一个独特的
  NFT，其中包含有关产品来源、生产和分销的信息。该 NFT 将使用零知识证明进行保护，以防止所有敏感信息被未经授权访问。


  当产品易手时，NFT 可以在不同的参与方（如分销商、零售商和客户）之间转移。每次转移都将记录在区块链上，从而确保产品流转记录的透明且不可篡改。


  使用零知识证明保护的 NFT 还有助于减少买卖艺术品所涉及的文书工作。目前，买卖双方必须依赖纸质文件来验证艺术品的真实性和出处。这可能既耗时又昂贵，并且可能无法提供艺术品历史的完整图景。通过使用
  NFT，买卖双方可以以更高效、更具成本效益的方式访问艺术品完整且可验证的历史记录。


  以这种方式使用的零知识证明保护的 NFT 将为企业与消费者双方带来诸多益处。对于企业而言，它将为其产品提供额外的安全保障，有助于防止伪造并保护品牌声誉。对于消费者而言，它将提供一种验证所购买产品真实性和质量的方法，有助于建立对供应链的信任并降低欺诈风险。




  加密因此在保护 NFT 和区块链网络中的敏感信息方面发挥着关键作用。如果没有适当的加密，区块链生态系统的安全性和完整性将受到损害，用户的个人和财务数据将面临被恶意行为者泄露的风险。也就是说，确保所有此类加密都适当应用于所有相关交易和智能合约至关重要。


  #### 智能合约


  智能合约是使用专门为区块链设计的编程语言创建的，例如以太坊以及大约 90%的其他 EVM 兼容区块链所使用的`Solidity`。除了常用于自动化业务流程外，智能合约也是
  NFT、去中心化应用程序（`dApps`）和去中心化自治组织（`DAOs`）的一个关键特性。


  关于智能合约如何管理 NFT，在创建 NFT 时，会在区块链上部署一个智能合约，以指定该 NFT 的所有权和转移权。由于该智能合约存储在区块链上，每当 NFT
  被买卖时，它都可以自动执行，确保所有权安全透明地转移。


  智能合约被设计为无需信任，这意味着它们不需要依赖可信第三方来强制执行协议条款。所涉及的密码学确保了合约的执行是安全且防篡改的。由于智能合约也是不可变的，一旦部署，协议的条款就无法更改。这意味着未经智能合约的预设规则，NFT
  不能被简单地重新分配或更改。


  智能合约自动化流程的能力非常广泛，并为 NFT 带来了许多好处。例如，在艺术行业，智能合约可用于确保艺术家在其艺术作品的 NFT 每次被转售时都能获得版税。智能合约可以被编程为在艺术品被出售时，自动将一定比例的销售价格转入艺术家的账户，无需人工干预。


  假设一位艺术家创作了一件数字艺术作品，并在区块链平台上将其铸造为 NFT。他们可以在智能合约中指定销售条款，包括在 NFT 被转售时，他们希望作为版税获得的销售价格百分比。


  每当相关的 NFT 被出售时，这个智能合约就会自动执行，并将指定比例的销售价格作为版税转入艺术家的账户。由于智能合约存储在区块链上，它是透明的，任何一方都无法更改或操纵。这确保了艺术家因其作品获得适当的报酬，并且所有权得到正确转移。


  同样地，智能合约提供的去中介化作用也通过 NFT 体现出来，作为提高效率的一种方式。通过自动化合同条款，智能合约消除了对银行和律师等传统中介的需求，从而降低了交易成本并提高了效率。由于这些智能合约存储在区块链上，因此是不可变且防篡改的，它们为利用它们的商业交易提供了额外的安全性和透明度层。


  然而，智能合约并非完美无缺；它们存在局限性。它们的质量取决于定义它们的代码。如果代码中存在错误，可能会导致意想不到的后果和安全漏洞。攻击者可以利用此类漏洞窃取资金或造成其他损害。由于
  NFT 因其独特性而作为数字资产被珍视，管理它们的智能合约代码中的任何错误都可能产生重大后果，包括财务上的后果。


  一个备受瞩目的智能合约黑客攻击案例发生在 2016 年，涉及去中心化自治组织（`DAO`）。`DAO`是一个建立在以太坊区块链上的去中心化风险投资基金，从投资者那里筹集了超过
  1.5 亿美元。然而，智能合约代码中的一个漏洞被利用，导致三分之一的资金被盗，按当时价格计算约为 5000 万美元。这一事件凸显了正确审计和测试智能合约代码以预防此类漏洞的重要性。




  另一个例子是发生在 2021 年 8 月的`Poly Network`黑客攻击事件。`Poly Network`是一个跨链 DeFi 协议，旨在促进多个区块链之间的代币交换。黑客利用了智能合约代码中的一个漏洞，盗走了价值约
  6 亿美元的加密货币。然而，在与`Poly Network`及更广泛的加密货币社区谈判后，黑客最终归还了资金。这一事件凸显了 DeFi 协议安全性的重要性，以及持续审计和测试智能合约的必要性。


  某些情况需要人为判断、道德或伦理考量，或其他需要人类“参与其中”才能做出决定的情形，这限制了智能合约在许多场景下的使用。智能合约自动执行且无法适应不断变化的环境，若环境意外改变或出现原始合约未预见的意外情况，这可能会带来问题。此外，智能合约可能无法处理需要人工干预解决的复杂业务逻辑。


  例如，智能合约可能不适用于复杂的法律协议，包括那些涉及知识产权或许可协议的合同，因为这类协议通常需要人类的解释和谈判。即使有 AI 的协助，智能合约开发者也可能无法在部署前考虑到此类协议中可能出现的所有场景和意外情况。


  智能合约也可能不适用于需要争议解决或调解的交易。当双方就智能合约条款发生争议时，合约条款内可能没有明确的争议解决机制。这可能导致双方无法达成解决方案，进而可能造成财务损失，甚至引发法律纠纷。


  此外，智能合约可能不适合处理涉及实物商品或服务的交易。某个智能合约很可能无法验证实物产品的质量或真实性，这对于食品或制药等行业来说是一个重要的考量因素。在这些情况下，可能需要人工干预，以确保合约条款得到履行，且实物产品符合预期质量。


  仔细评估智能合约对于特定交易或协议的适用性非常重要。虽然智能合约在效率和透明度方面提供了诸多好处，但在决定使用该技术之前，必须考虑到某些局限性和潜在风险。


  智能合约开发者必须勤勉地识别和解决其代码中的潜在安全漏洞，以确保代码的安全且无错误。此过程的关键步骤之一是，由专注于区块链安全的独立第三方审计师对智能合约代码进行严格的测试和审计。这些审计师会评估智能合约代码的漏洞，并提出改进安全性的建议。


  审计智能合约涉及对代码进行彻底分析，以确保其安全、高效并按预期运行。该过程通常包括以下几个步骤：


  1.  静态分析：检查代码中的潜在漏洞和安全缺陷，例如缓冲区溢出、竞态条件和整数溢出。

  2.  动态分析：测试代码以确保其按预期运行，且没有错误或逻辑缺陷。

  3.  代码审查：由人类专家审查代码，确保其遵循最佳实践、组织良好且易于阅读和理解。

  4.  渗透测试：尝试攻击或利用智能合约，以识别攻击者可能利用的任何弱点或漏洞。

  5.  风险分析：评估与智能合约相关的潜在风险，例如安全漏洞发生的可能性或漏洞的潜在影响。

  6.  文档审查：审查智能合约的文档，确保其准确描述了预期的行为以及使用中的任何限制或风险。


  审计智能合约的目标是识别并修复任何可能被攻击者利用的漏洞或缺陷。在整个开发过程中以及部署后进行定期审计非常重要，以确保智能合约随着时间的推移保持安全和有效。


  智能合约防护机制是用于预防或减轻与智能合约执行相关的潜在风险的机制。一种常见的防护机制是使用断路器。断路器是一种软件机制，会在发生错误或漏洞时暂停智能合约的执行。这使得开发者能够在允许智能合约恢复执行之前调查并修复问题。


  另一种防护机制是使用多重签名钱包。多重签名钱包要求多方在对交易进行签名后才能执行，这可以防止未经授权或欺诈性的交易。这对于涉及大额价值的交易尤其有用。


  其他智能合约防护机制包括使用时间锁，它会延迟智能合约的执行，直到指定的时间或日期。时间锁对于需要等待期后才能执行的交易很有用，例如在某个条件满足后释放资金。另一种防护机制是使用访问控制，它只允许授权方执行智能合约。这可以防止对智能合约的未经授权访问或篡改。


  智能合约开发者使用标准且广泛接受的编码实践并遵循智能合约开发的最佳实践也很重要。这包括遵循安全编码指南、使用安全的编程语言，以及定期更新代码以应对可能出现的新漏洞。


  在智能合约无法完全自动化某些流程，或者合约条款可能存在歧义的情况下，纳入人工监督或争议解决机制有助于确保交易的公平和透明。


  确保公平透明交易的一种机制是实施争议解决流程。该流程可以内置于智能合约中，并涉及一个中立的第三方仲裁员，负责解决出现的任何争议。仲裁员可以审查合约条款以及任何相关数据或证据，以确定争议结果。在合约条款模糊不清或需要人为判断的情况下，例如在
  NFT 所有权存在争议时，此机制可能特别有用。


  开发者需要仔细考量在其智能合约中使用人工监督和争议解决机制，因为这可能会增加合约执行过程的复杂性和潜在成本。然而，在错误或争议的潜在风险和后果非常严重的情况下，这些机制可以为所有相关方提供重要的保护层。




  #### 智能合约与预言机


  许多智能合约的一个重要方面是预言机（oracle）的概念。预言机是指为智能合约提供外部信息的可信第三方服务或实体。


  智能合约在区块链生态系统内运行，这意味着它们无法访问外部数据源，例如现实世界的事件或数据源。预言机用于向智能合约提供此类数据，使其能够根据接收到的信息执行预定义操作。


  预言机可以利用各种类型的外部数据运行，例如市场价格、天气数据或体育比分。它们还可以用于验证特定事件的结果，例如供应链中的货物交付，或保险合同中特定条件是否发生。


  预言机可以通过允许智能合约根据外部事件和数据编程执行操作，来增强其功能。这意味着智能合约可以被设计为在需要实时数据的现实场景中运行，例如衍生品市场或体育博彩。借助预言机，智能合约可以自主执行，无需人工干预，从而使其更加高效。


  然而，预言机确实在智能合约生态系统中引入了信任因素。由于它们是第三方服务，存在提供不准确或偏见数据的风险。这可能损害智能合约的完整性。缓解此风险需要仔细选择和审计计划使用的预言机，以确保其可信赖且可靠。


  除了与数据相关的风险外，使用预言机还可能引入额外的安全风险。主要风险之一在于预言机本身可能遭受操纵或破坏。这反过来又会引入更多的数据相关风险，不过这次风险来自于蓄意的恶意行为，而不仅仅是偏见或错误的数据——攻破预言机的攻击者可以使其向智能合约发送虚假信息，从而触发本不应执行的代码。这可能是耗尽智能合约内所持有资产的一个途径。


  此外，使用预言机也可能在智能合约代码本身引入漏洞。如果智能合约未设计为能处理来自预言机的意外或不正确数据，它可能执行错误甚至崩溃。此类事件可能无法恢复，并导致重大损失，无论是财务上的还是其他方面的。


  而且，预言机还可能危及智能合约所用数据的隐私。如果预言机能够访问敏感数据，例如个人信息或财务数据，则存在这些数据泄露或滥用的风险。


  为缓解这些风险，仔细选择和审查智能合约中使用的预言机并实施适当的安全措施（例如数据加密和验证机制）以防范潜在攻击非常重要。同时，智能合约的设计方式也应使其能够处理来自预言机的意外或不正确数据。代码中应包含应急计划，以应对任何安全漏洞或其他意外情况。


  不过，一般而言，由于预言机引入了众多风险，尽可能避免使用它们被认为是安全最佳实践。在开发区块链解决方案时，有时无法避免使用预言机，但通常存在变通方法。计划将 NFT
  作为其运营或服务一部分的商业领袖需要了解这些风险，以便进行充分的成本效益分析。


  此类领导者至少需要对这里描述的智能合约有一定程度的熟悉，以避免承担不必要的风险、误解其能力或做出糟糕的商业决策。由于包括 NFT 在内的区块链代币是智能合约的一种形式，在考虑是否实施此类解决方案时，掌握该技术的基础知识至关重要。


  回顾一下，智能合约是自动执行的合约，协议条款直接写入代码中。它们无需可信第三方来强制执行协议条款，并通过基于预定条件自动执行代码来自动化业务流程。这在自动化至关重要的各种情况下可能特别有利。


  就 NFT 而言，智能合约用于其创建和转移，以及指定所有权和其他相关细节。它们还可以被编程，通过版税协议确保艺术家和创作者因其作品获得公平补偿——每当 NFT
  在合规平台上出售时，版税协议会自动将销售额的一定比例转入艺术家的账户。但这只是该技术众多应用中的一个。


  然而，智能合约并非没有缺点。区块链工程师应严格测试和审计代码，以确保其不易受攻击并融入了最新的最佳实践。实施诸如断路器之类的安全措施会有所帮助，但与任何支持互联网的解决方案一样，没有银弹——保持警惕是必要的。


  智能合约的另一个潜在问题在于它们无法适应原始合同中未考虑到的变化情况或意外事件。幸运的是，智能合约通常是“可升级的”，这仅意味着它们可以被编辑以修复发现的问题，但保留这种能力通常会降低用户社区对项目的信任，因为开发者可能会通过以损害用户但有利于开发者的方式更改智能合约来“拉地毯”（`rug
  pull`）项目。


  为解决此问题，许多项目在将智能合约部署到区块链后“放弃”（`renounce`）它们。这仅意味着创建者不再对合约拥有任何控制权，并且无法进行任何未来的更改。当然，这也意味着之后发现的任何缺陷或错误都无法修复。


  开发者需要在创建智能合约时考虑这些决策。他们可能需要在某些情况下纳入人工监督或争议解决机制，以确保交易公平透明地执行。这可能包括在能够安全实现的情况下使用预言机，或采用其他可信第三方来验证智能合约所用数据的准确性。一种越来越普遍的方法是实施
  DAO（去中心化自治组织），使社区能够对智能合约进行修改或批准修改，但这同样充满担忧。


  总体而言，智能合约在自动化业务流程、提高透明度和安全性以及确保艺术家和创作者获得公平补偿方面具有巨大潜力。然而，它们也带来了风险和限制，必须通过严格测试、标准编码实践以及纳入安全措施来仔细考虑和缓解。随着
  NFT 市场的持续增长，开发者和企业了解智能合约潜在收益和风险的重要性也在增长，将其有效融入运营的需求也同样如此。




  ## 概述


  市面上存在众多不同的区块链，每种区块链的结构都各有不同，以便针对特定用途进行优化。理解每种共识机制的优缺点、去中心化的方式、许可级别等因素，对于试图为自身应用场景寻找合适链的业务领导者而言至关重要。


  虽然深入了解诸如 `Layer 1` 与 `Layer 2` 或更高级别区块链之间的区别、每种共识机制的具体工作原理以及各分类账处理加密方式的细节，对于决策去向并非关键，但这些信息都有助于决策。更全面地理解这些属性，有助于在多个区块链均满足基本要求时，优化最终决策。


  决策者**必须**理解的一点是，链如何处理智能合约。智能合约是任何区块链满足业务需求能力的核心——代币是智能合约，NFT 是智能合约，逻辑流程是智能合约，在区块链上运行的一切都使用智能合约。几乎所有基于区块链构建的内容都是使用智能合约构建的。


  在选择链时，确保你的开发者能理解智能合约逻辑并掌握其编码语言，是一项核心需求。只懂以太坊的 Solidity 语言的开发者，在 Polygon 或 BNB Chain
  这样的链上会感到得心应手，但在使用其他语言的 Flow 或 Polkadot 上进行编码则会遇到巨大困难。


  不同的语言也针对不同的目的进行了优化。选错区块链可能会影响你交付产品或服务的能力。这点以及其他因素，如交易费用和内置的隐私功能，是在考虑部署任何区块链驱动项目（例如那些使用
  NFT 的项目）时的关键考量因素。


  另一个关键点是了解所考虑链上现有的生态系统，包括哪些钱包支持该链，以及该链上已存在哪些市场或其他门户。下一章将对此主题进行更详细的阐述。


  '
- '# 3. 创建与出售 NFT


  既然我们已经涵盖了区块链技术如何工作的具体细节，特别是它如何为 NFT 提供动力，那么下一个最重要的主题就是这些 NFT 的创建、出售或分发。为了让 NFT 发挥任何作用，它们必须被创建出来并推向世界，以便人们能够使用它们。


  虽然在此过程中需要考虑许多因素，但最重要的因素之一是你打算创建的 NFT 的特性。同样重要的是，要考虑这些 NFT 的最终持有者将如何实际持有它们，这意味着要考虑钱包，以及如何将这些
  NFT 交到他们手中，这通常是通过出售的方式。


  ## 特性


  在创建 NFT 时，第一步是确定使你的 NFT 独特且有价值的方面。这些可以是任何东西，从一件艺术品或收藏卡到一条推文或虚拟房地产。关键在于确保 NFT 具有使其区别于其他数字资产的品质，并且这些品质在其设计和元数据中得以体现。


  NFT 的方面或变量可能会因所代表的数字资产类型而有很大差异。


  ### 变量


  一般来说，NFT 的变量可分为两大类型：内在变量和外在变量。


  #### 内在变量


  这些变量指的是 NFT 本身的固有品质。例如，就一件艺术品而言，内在变量可能包括艺术家的签名、创作日期、使用的媒介、尺寸，以及任何特殊的技术或材料。对于虚拟房地产，内在变量可能包括房产的位置、大小，以及任何特殊的功能或设施。


  从内在变量中获取价值的 NFT 的一个例子是流行的 CryptoPunks NFT 系列；每个 NFT 都有独特的 8 位像素化设计，使其易于识别和收藏。另一个例子是
  Bored Ape Yacht Club NFT 系列，其中每个 NFT 都有一幅不同的卡通猿猴插图，并带有独特的配饰和背景元素。


  #### 外在变量


  另一方面，这些变量指的是有助于提升 NFT 价值或独特性的外部因素。例如，如果艺术品是由知名艺术家创作的，这可能会增加其价值。同样，如果虚拟房地产位于一个受欢迎的虚拟世界中，这也可能会增加其价值和吸引力。


  例如，在 NBA Top Shot NFT 系列中，每个 NFT 代表一个特定的篮球瞬间，如扣篮或三分球，并有一个表示其稀有性的限量编号。就 Beeple Everyday
  系列而言，其外在价值源于它是第一个在主要拍卖行佳士得售出的 NFT 系列，并且它以创纪录的 6900 万美元成交。


  一些 NFT 系列试图通过增加外在价值来随时间提升其价值。Bored Ape Yacht Club 就是其中一个例子——Bored Ape 的创造者 Yuga
  Labs 不断开发新方式，让 Bored Ape 的所有者可以使用它们，例如在他们的 Otherside 元宇宙中作为头像，以及作为特殊活动的入场通行证。




  ### 实用性


  另一个需要考虑的变量是 NFT 的实用性。虽然有些 NFT 纯粹是收藏品，但许多其他 NFT 在特定生态系统或平台内具有功能性用途。例如，一些游戏 NFT 可用作游戏内物品或货币，而另一些则可用作访问虚拟世界中特定区域或功能的密钥。创作者不妨考虑如何为自己的
  NFT 增加功能性用途，以提升其价值和吸引力。


  `实用性`可以被视为 NFT 的外部变量。这是因为 NFT 的实用性并非资产本身固有的，而是源于其在特定生态系统或平台内的使用目的或用途。换言之，具有功能性用途的
  NFT 的价值取决于外部因素，以及它如何在特定背景下被整合和利用。


  例如，一个游戏 NFT 可能在特定游戏或虚拟世界中具有功能性用途，但这种用途依赖于其所处的游戏或世界。脱离了该游戏或世界的背景，NFT 本身并不具备内在的功能性用途。同样，一个提供访问平台内特定功能或内容的
  NFT，其用途仅限于该平台，而这种用途并非 NFT 本身所固有。


  以功能性 NFT 为例，我们可以再次审视 NBA 的 Top Shot，其中 NFT 以篮球比赛精彩片段的形式代表数字收藏品。这些 NFT 兼具内在价值和外在价值，其功能性用途在于能够参与梦幻体育游戏，并访问独家内容和活动。


  另一个例子是将 NFT 用作访问虚拟世界中独家内容或活动的门票。例如，建立在以太坊区块链上的虚拟世界 Decentraland，允许用户买卖作为独家虚拟活动和体验门票的
  NFT。


  此外，一些 NFT 可用作游戏内物品或货币，为收藏品资产增添了功能性用途。这在许多基于区块链的游戏中很常见，例如 Axie Infinity 和 The Sandbox，在这些游戏中，NFT
  可用作游戏内资产，并在去中心化市场上进行交易。


  在 NFT 中加入功能性用途可以提升其吸引力和价值，因为它提供了超越单纯拥有收藏品资产的实际益处。有志于创作 NFT 的人应仔细考量其 NFT 的潜在用例，以及如何增加功能性用途以吸引更广泛的买家，并提升
  NFT 的长期价值。


  ### 其他变量功能


  NFT 的其他方面或变量可能包括其稀有性、历史记录和出处。


  `稀有性`指的是 NFT 的稀缺程度，通常认为稀缺性会提升其价值。历史记录和出处指的是 NFT 的所有权链条和真伪认证，这通常也被认为能提升价值并确保真实性。不过，这并非绝对保证；糟糕的出处记录肯定会*降低*价值。


  稀有性或稀缺性是 NFT 创作者试图提升其价值时最常使用的因素之一。它营造了一种专属感。为了实现这一点，创作者可以限制一个系列中 NFT 的数量，或者创作独一无二的
  NFT。这通常被称为“孤品”。稀缺性也可以通过限量版发行来实现，每个版本都有固定数量的 NFT 可供购买。


  几乎每一个 NFT 系列都试图利用稀有性的概念来提升价值。例子包括 CryptoKitties NFT 系列，其中的每个 NFT 代表一只拥有自身属性（如毛色和眼型）的独特虚拟猫。这些猫中的一些比其他的更稀有，收藏家们愿意为此支付溢价。以
  World of Women NFT 系列为例，每个 NFT 代表一幅独特的女性角色插画，其中一些因其独特的特征或背景故事而比其他更稀有。


  请记住，与出处一样，稀有性并不会自动提升价值。如果一个 NFT 除了稀有之外没有其他价值，那并不意味着它本身就有价值。许多创作者忘记了这一点，创作出以稀有性为卖点的系列，以为这会让它们更值钱，结果却发现没人关心，因为缺乏其他价值。


  这引出了 NFT 的另一个潜在价值方面：历史意义。例如，推特 CEO 杰克·多西发布的第一条推文被铸成了 NFT，并以 290 万美元的价格售出，该推文的历史意义为其增加了价值。另一个例子是有史以来第一个被创建的
  NFT，因其历史意义及其在建立 NFT 市场中的作用，以 150 万美元的价格售出。


  不过请记住，这种价值很大程度上取决于市场和买家的情绪。杰克·多西的第一条推文 NFT 在 2021 年 3 月可能卖出了 290 万美元，但在 2022 年 4
  月再次挂牌出售时，最高出价仅为 277 美元。


  也有多个实例表明，NFT 的铸造还借鉴了数字领域之外具有历史意义的作品或事件。何塞·拿破仑·杜阿尔特系列代表了这位萨尔瓦多前总统的作品全集，每个 NFT 代表对其遗产中杜阿尔特作品、演讲等经认证复制品的所有权。


  创建 NFT 时的另一个重要考虑因素是它的交互潜力。与传统的实体艺术品不同，NFT 可以设计融入互动元素，例如动画、音效和其他多媒体组件。这可以为 NFT 增加价值和独特性，同时为收藏家和买家提供更具吸引力和沉浸感的体验。Bored
  Apes 就是包含互动元素的 NFT 的一个好例子——Snoop Dogg 和 Eminem 甚至制作了一个以他们的 Bored Apes 为主角的音乐视频。


  不过，创作者在基于 NFT 创作衍生作品或二次创作时必须谨慎：NFT 的创建和拥有并不必然赋予其底层艺术品或资产的版权或知识产权。版权法仍然适用，在创建和销售
  NFT 之前，确保已获得所有必要的许可至关重要。在销售和分发 NFT 时，考虑潜在的剽窃或版权侵权问题也很重要。


  当 Yuga Labs 创建 Bored Ape Yacht Club 系列时，他们将每只猿猴的完整知识产权赋予了其所有者。这是一种不常见的做法，但对于任何正在创建
  NFT 系列的人来说，这值得作为一种潜在的方面进行考虑，以使每个 NFT 更具价值。


  不幸的是，许多变量都受限于一个简单的限制：文件大小。




  ### 文件大小


  文件大小问题在 NFT 领域是一个重要的考量，尤其是在区块链上存储和传输它们时。由于 NFT 通常由数字文件（例如图片或视频）组成，这些文件的体积可能相当大，特别是对于高质量或高分辨率的内容而言。这给存储容量和带宽有限的区块链网络带来了挑战。


  解决这个问题的一种方法是使用压缩技术，在不牺牲质量的情况下减小文件大小。然而，文件大小和质量之间存在权衡，在某些情况下，压缩可能导致细节丢失或视觉伪影，从而对
  NFT 的价值产生负面影响。


  最常见的方法是将文件存储在链下，而不是存储在区块链本身。这涉及将文件存储在单独的服务器或云存储平台上，并通过唯一的标识符或哈希值从 NFT 链接到该文件。这种方法有助于减小区块链上
  NFT 的体积，同时在需要时仍能访问原始文件。然而，这也引入了额外的复杂性和潜在的故障点——链下存储平台必须保持维护和可访问，以便访问该文件。


  这种方法在 NFT 社区中也一直是争议点，有些人指责其是骗局。链下存储要求用于链接文件的唯一标识符或哈希值保持安全且可访问，这本身就是一个挑战。此外，维持存储平台的在线状态也可能出现问题，如果平台宕机或被黑客攻击，可能会危及
  NFT 的真实性。


  这也造成了一个漏洞，即创建 NFT 和链下存储的人可以修改存储在链下的文件，从而从远处有效销毁该 NFT。这个漏洞在 2021 年由加密短信应用 Signal
  的创始人展示，他出售的 NFT 指向一个文件，后来他将该文件替换为便便表情符号，以此作为一个警示故事。


  ### 存储考量


  为了解决这些问题，一些 NFT 创作者转向了去中心化的存储解决方案，例如 `IPFS`（星际文件系统）或 `Arweave`。这些平台提供了一种更安全、更去中心化的文件存储方法，有助于减轻与链下存储相关的潜在风险。这些解决方案并非完美，但随着时间的推移在不断改进。


  尽管存在这些担忧，链下存储仍然是许多 NFT 创作者青睐的方法，因为它允许他们创建和销售 NFT，而无需担心链上存储的限制。然而，NFT 买家在购买前应了解相关风险，并仔细评估
  NFT 的真实性和价值。


  `BSV`（比特币中本聪愿景）区块链是原始比特币区块链的一个分叉，它对 NFT 文件大小问题采取了不同的方法。与其他限制单个交易大小的区块链不同，`BSV` 区块链允许更大的交易，因为它对区块大小没有上限。这是因为
  `BSV` 区块链专注于支持大规模数据应用。


  通过允许更大的交易，`BSV` 区块链能够在链上存储更多信息，包括更大的 NFT 文件。这种方法消除了对链下存储的需求。此外，它还可以降低创建和转移 NFT 相关的交易成本，因为其他区块链上的大额交易可能更昂贵。


  然而，`BSV` 区块链更大的交易大小限制也带来了潜在的安全风险。大额交易在网络中传播以及被节点验证所需的时间可能更长，这可能会使其容易受到攻击。此外，较大的交易也可能被用来膨胀区块链，消耗更多的存储和处理资源。


  文件大小对 NFT 创作者和收藏者来说是一个重大挑战，尤其是在对高质量和高分辨率内容的需求持续增长的情况下。在文件大小、质量和可访问性之间找到平衡，对于确保 NFT
  作为一种数字资产类别的长期价值和可行性至关重要。


  最终，NFT 的各个方面或变量将取决于具体的用例和目标市场。例如，一张收藏卡可能具有与一块虚拟房地产不同的内在和外在变量。仔细考虑 NFT 的各个方面和变量，以创建独特且有价值的数字资产，这一点至关重要。




  ### 内容与区块链选择


  在确定好 NFT 的各个属性后，下一步就是创作构成 NFT 的数字内容。这可能包括创作艺术品或其他数字媒体，也可能涉及将现有内容汇编整理成可代币化为 NFT 的格式。请确保数字内容具有高质量且获得适当授权，或至少注明原创作者。


  创建好 NFT 的数字文件后，下一步是准备元数据。这些信息包括 NFT 的名称、艺术品描述以及艺术家姓名。此外，元数据还可以包含与 NFT 相关的任何附加属性，例如稀有度或版本编号。


  这些信息与数字文件一同存储在区块链上，从而创建 NFT 特征的永久记录。元数据还用于提供关于 NFT 来源、所有权及其他相关细节的信息。元数据应经过精心策划，并准确反映
  NFT 的独特品质与特征。


  为 NFT 创建好数字内容和元数据后，下一步是选择铸造 NFT 的区块链。


  这通常涉及选择一个支持 NFT 的区块链，并选用兼容的智能合约进行铸造。确保所选用的区块链和智能合约安全可靠且维护良好，因为这有助于维护 NFT 的长期可行性及价值。


  以太坊是目前用于创建和交易 NFT 最广泛的区块链。专门用于创建和管理 NFT 的`ERC-721`和`ERC-1155`智能合约，得到众多钱包、市场及其他 NFT
  相关工具的支持。这些合约已被用于创建涵盖艺术、音乐、游戏和收藏品等广泛用例的 NFT。


  对于艺术、音乐和收藏品，`ERC-721`合约是热门选择，因为它允许创建独一无二、可用于代表单件内容的 NFT。对于涉及创建大量相同 NFT 的游戏及其他用例，则常使用`ERC-1155`合约，因为它允许创建半同质化
  NFT（有时称为 SFT），可用于代表同一内容的多个副本。


  除以太坊外，其他区块链也在被用于创建和交易 NFT。例如，币安智能链和 Polygon 网络因其较低的交易费用和更快的交易速度，已成为以太坊的热门替代方案。币安智能链支持使用`BEP-721`和`BEP-1155`智能合约创建
  NFT，而 Polygon 仍沿用`ERC-1155`和`ERC-721`合约。


  其他支持 NFT 的区块链包括 Flow 区块链——专门为在游戏和其他应用中创建 NFT 及其他数字资产而设计；以及 Tezos 区块链，它通过`FA2`代币标准支持
  NFT。Polkadot 区块链也通过 Substrate 框架支持 NFT，该框架允许创建自定义智能合约。


  针对特定用例，某些区块链和智能合约可能更具优势。例如，WAX 区块链在收藏品领域备受青睐，因其专注于为创建和交易 NFT 打造用户友好的体验。WAX 区块链使用`AtomicAssets`标准，该标准专为在游戏、收藏品及其他应用中创建
  NFT 而设计。


  在音乐行业，已涌现多个帮助艺术家创建和销售 NFT 的平台。这些平台包括使用 Solana 区块链的 Audius，以及使用以太坊区块链的 Royal。这些平台专门帮助音乐人创建和销售代表其音乐作品的
  NFT，并常包含版税追踪和收入分成等功能。


  在活动票务领域，Hedera Hashgraph 和 Polygon 网络等区块链正被用于创建基于 NFT 的票务系统。这些系统允许活动组织者创建代表活动门票的
  NFT，并可通过区块链安全转移和验证。这有助于减少欺诈，确保只有合法持票人才能参加活动。


  最后，您需要选择一个市场来上架和销售您的 NFT。


  目前有许多流行的 NFT 市场，例如 OpenSea、Rarible 和 SuperRare，每个都有自己的优缺点。请选择一个最适合您 NFT 特质、且拥有强大用户基础的市场。




  ## 钱包


  加密货币钱包是 NFT 生态系统的关键组成部分，用于存储、管理和转移 NFT。你需要拥有一个支持你计划铸造和交易 NFT 的区块链的加密货币钱包。


  市面上存在多种类型的加密货币钱包，包括桌面钱包、移动钱包和硬件钱包。桌面钱包是安装在电脑上的软件程序，适合希望将 NFT 存储在电脑上并方便访问的用户。其优点在于通常免费使用，且配置得当的情况下安全性较高。


  但桌面钱包容易受到恶意软件和黑客攻击，可能导致 NFT 丢失。此外，如果电脑崩溃或被盗，你可能无法再访问自己的 NFT。


  移动钱包是下载到智能手机或平板电脑上的应用程序，方便用户随时随地访问 NFT。其优点在于通常易于使用且可访问性高。


  然而，移动钱包的安全性可能不及桌面钱包或硬件钱包。如果不幸丢失手机或手机被盗，除非有钱包备份，否则可能无法再访问自己的 NFT。


  硬件钱包是连接到电脑或智能手机的物理设备，适合希望通过离线存储来保护 NFT 免受黑客攻击和恶意软件侵扰的用户。硬件钱包通常被认为是最安全的数字资产（如 NFT）存储方案，通过物理设备提供了额外的安全层。


  硬件钱包的一个缺点是购买成本较高，且可能需要一定的技术知识才能正确设置和使用。此外，硬件钱包可能损坏或被盗，导致无法挽回的损失。


  无论选择哪种钱包，务必进行备份并遵循钱包安全的最佳实践。这包括创建强大且唯一的密码、启用双重身份验证，以及写下钱包的助记词或私钥并将其存放在安全位置。


  由于钱包通常通过 12 或 24 个单词的助记词进行安全保护，创建者必须将这些助记词写在安全的地方，以防钱包出现问题，同时确保绝不向任何人展示此助记词或以任何方式冒险。不要让任何摄像头拍到，也不要大声读出。


  此外，务必只从可信来源下载钱包及其他加密货币相关软件，并警惕可能危及钱包安全的钓鱼诈骗和其他欺诈形式。


  在选择钱包时，需考虑安全性、易用性以及与计划使用区块链的兼容性等因素。有些钱包专为特定区块链设计，而有些则支持多个区块链。选择一个能让你自行控制私钥的钱包。


  存储和管理 NFT 最流行的选项之一是`MetaMask`钱包。`MetaMask`是一款浏览器扩展，免费使用，支持 Chrome、Firefox、Brave
  等主流浏览器，同时也有适用于 Android 和 iOS 设备的移动应用程序。它允许用户连接到包括以太坊和 Polygon 在内的多个区块链上的去中心化应用（dApps），并兼容大量
  NFT 市场和平台。


  另一个热门选项是`Trust Wallet`，这是一款支持多种区块链的移动钱包。`Trust Wallet`因其易用性和直观的界面而广受好评。


  在硬件钱包方面，最流行的选项包括`Ledger Nano`和`Trezor`。虽然它们通常在独立环境中运行，主要作为存储加密货币和 NFT 的离线冷存储解决方案，而非用于日常频繁操作，但在这方面已有技术进步。


  例如，`Trezor`与流行的软件钱包`Exodus`实现了集成，使得使用 NFT 更加便捷。同时，尽管`Ledger`长期被视为硬件钱包的黄金标准，但其推出“助记词恢复”服务的争议性举动使其安全性受到质疑。


  要创建`MetaMask`钱包，首先前往`MetaMask`网站，点击“获取扩展程序”，根据你的浏览器选择相应选项。安装扩展后，按照提示创建一个新钱包。写下助记词并将其存放在安全的地方。然后，点击`MetaMask`扩展即可将其连接到支持
  NFT 交易的各种 dApps。


  至于`Trust Wallet`，从 App Store 或 Google Play 商店下载应用并打开。写下助记词并将其存放在安全的地方。至此钱包设置完成，你可以通过内置浏览器将其连接到支持
  NFT 交易的各种 dApps。


  完成以上步骤后，你就可以开始与 NFT 进行交互了。如果想购买或出售 NFT，需将钱包连接到市场，并通过钱包授权交易。具体过程因 dApp 和交易类型略有不同，但通常只需在钱包应用中按照提示操作，确认交易并支付相关费用。


  区块链上的几乎每项活动都需要用户支付交易费。交易费（或称 Gas 费）是大多数区块链的组成部分。区块链网络上的任何交易都需向网络支付费用，以补偿处理交易的节点。费用通常以该链的原生加密货币支付。


  费用大小取决于多个因素，如网络拥堵程度、交易复杂性、期望处理时间，以及区块链本身的一些内在特性（如其共识机制）。网络越拥堵，费用越高。矿工和验证者会优先处理费用较高的交易，因为他们从中获得更多奖励。


  在交易所购买所需资产，或从其他用户处获取。记得定期监控交易费，避免为交易支付过高费用。




  ## 市场平台


  在用户拥有加密货币钱包并获取了支付交易费用所需的资产之后，参与 NFT 生态系统的下一步便是获取 NFT 本身。许多项目拥有自己的专属 NFT 市场，您可以在其中购买其生态体系中的特定资产，但同时也有几个主流市场销售其支持区块链上的几乎所有
  NFT。


  `OpenSea`是一个广受欢迎且用户友好的 NFT 市场，支持用户购买、出售和发现 NFT。要在`OpenSea`上创建账户，只需访问网站并点击首页右上角的"注册"按钮。随后系统会提示您使用电子邮件、Google
  或 Apple 账户创建账户。账户创建完成后，您就可以开始浏览 NFT、创建藏品集，并与平台上的其他用户互动。


  在`OpenSea`上创建账户时，务必牢记需要将加密货币钱包与账户关联，才能购买、出售或创建 NFT。`OpenSea`支持多种钱包，包括`MetaMask`、`WalletConnect`和`Coinbase
  Wallet`。要将钱包关联到`OpenSea`账户，只需进入账户设置，从下拉菜单中选择"钱包"，然后按照提示输入钱包地址或扫描二维码即可完成连接。


  钱包与`OpenSea`账户关联后，您就可以开始购买、出售和创建 NFT 了。


  ### 买卖基础


  购买 NFT 相对简单。


  浏览市场并找到您喜欢的 NFT。然后您可以使用加密货币出价或直接购买。`OpenSea`主要运行在以太坊区块链上，这意味着用户通常需要持有以太坊或其他加密货币才能购买
  NFT。不过，`OpenSea`已与`MoonPay`合作，在某些情况下支持信用卡支付，通过名为"即时购买"的功能，用户可以使用法币在`OpenSea`上购买特定
  NFT。


  "即时购买"允许用户使用银行卡购买 NFT，随后由第三方支付处理商将其兑换为以太坊。这使得没有加密货币的用户也能通过传统支付方式购买 NFT。


  要在`OpenSea`上使用"即时购买"功能，用户必须先将其信用卡或借记卡关联到`OpenSea`账户。操作方法是导航至`OpenSea`首页的"即时购买"选项卡，并按照提示输入支付信息。


  添加支付方式后，用户可以搜索支持"即时购买"的 NFT。这些 NFT 在`OpenSea`市场旁边会显示"即时购买"按钮。点击此按钮将启动购买流程，用户即可使用关联的支付方式购买该
  NFT。


  并非`OpenSea`上的所有 NFT 都支持"即时购买"功能。此功能仅适用于`OpenSea`团队批准的特定 NFT。此外，"即时购买"交易需支付购买价格 2.5%的费用。出售
  NFT 则更为复杂。


  您需要先在市场上为其创建列表，包括价格、描述以及任何相关元数据等详细信息。同时，您还必须提前创建好 NFT 本身，并在此过程中仔细考虑您希望集成的所有方面和变量。NFT
  上架后，其他用户可以通过前述流程出价或直接购买。


  ### 选择市场


  如前所述，有许多 NFT 市场可供用户选择，每个市场都有其独特的功能和用户体验。例如，`SuperRare`以其精挑细选的高质量 NFT 和强调支持艺术家而闻名。


  要在`SuperRare`上创建账户，用户必须先通过验证流程申请批准，该流程包括提交作品样本和个人信息。获批后，用户可以创建个人资料，并开始浏览和竞拍 NFT。


  另一个受欢迎的 NFT 市场是`Nifty Gateway`，以其备受瞩目的艺术家合作和限量版发售而闻名。要在`Nifty Gateway`上创建账户，用户只需使用电子邮件地址注册并关联支付方式（如信用卡或银行账户）即可。


  最后，`Rarible`是另一个在独立艺术家和创作者中颇受欢迎的 NFT 市场。与`SuperRare`和`Nifty Gateway`不同，`Rarible`允许用户无需第三方验证流程即可创建和出售自己的
  NFT。要在`Rarible`上创建账户，用户只需使用电子邮件地址注册并连接其加密货币钱包即可。


  这些仅仅是众多支持各类 NFT 的市场中的一小部分。本书附录中提供了更多市场信息。建议探索多个平台，了解它们提供的不同选项和用户体验，以找到最适合您的平台。


  还有许多针对特定生态系统或应用场景的小众市场。


  其中一个例子是`Axie Infinity Marketplace`，该市场专为购买和出售`Axie` NFT 而设计，这些 NFT 用于`Axie Infinity`发行商`Sky
  Mavis`开发的游戏中。`Axie`是玩家可以在`Axie Infinity`宇宙中用来战斗并赚取奖励的生物。NFT 用于代表对这些生物的所有权。


  要参与`Axie Infinity Marketplace`，用户必须先在`Axie Infinity`平台上创建账户。随后用户可以通过在市场购买、在游戏中赚取，或参与奖学金计划来获取`Axie`。获得`Axie`后，用户可以在`Axie
  Infinity Marketplace`上将其挂牌出售，或购买其他玩家挂出的`Axie`，不过奖学金获得者不允许出售其`Axie`，因为他们并不拥有这些生物，仅是借用。




  #### 交易详情


  Axie Infinity 市场采用荷兰式拍卖模式，即 NFT 的价格会逐步降低，直到找到买家。NFT 市场可以采用多种其他拍卖模式，每种模式都各有其优缺点。


  英式拍卖是 NFT 市场中最常见的一种拍卖类型。这类拍卖从低价开始，价格逐渐升高，直到找到买家。竞拍者的出价必须高于当前出价，拍卖结束时出价最高的竞拍者赢得该物品。


  在维克里拍卖中，竞拍者提交密封出价，出价最高者以第二高的出价赢得该物品。这种拍卖旨在鼓励竞拍者提交其对该物品的真实估价，因为出价低于其认为的物品价值并不会带来任何好处。


  密封投标拍卖是指竞拍者将出价放入密封的“信封”中提交，出价最高者以其出价金额赢得该物品。这种拍卖常见于艺术品拍卖，有助于保密出价并防止拍卖狙击。


  混合拍卖结合了两种或两种以上的拍卖类型，形成独特的竞价流程。例如，一次拍卖可能以荷兰式拍卖开始，一旦价格达到某个水平，就切换到维克里拍卖。这有助于平衡每种拍卖类型的优缺点，并创建一个更具动态性的竞价过程。


  市场支持的拍卖类型是在决定是否要在某个 NFT 市场创建账户时需要考虑的众多因素之一。然而，除了平台的易用性和用户界面之外，还有其他因素需要考虑。


  人们还应始终考虑某个市场支持的区块链。这决定了可以在该平台上交易哪些类型的 NFT。一些市场可能只支持在以太坊上铸造的 NFT，而另一些市场则可能支持多种区块链，例如币安智能链、Polygon
  或 Flow。


  另一个因素是收取的费用。这包括上架 NFT 出售的费用、买卖 NFT 的交易费用，以及支付给 NFT 原创作者的版税。研究和比较不同市场收取的费用，以便找到最符合您需求、性价比最高的市场。


  市场是否支持向 NFT 的原创作者支付版税很重要。许多艺术家和创作者依赖版税作为收入来源。一些市场，如 Foundation，优先支持艺术家，并在 NFT 的二次销售中强制收取版税以持续支持创作者。其他市场可能没有这项要求，这一点需要予以考虑。


  此外，用户还应考虑每个市场的份额和 NFT 的可用性。一些 NFT 市场拥有更大的用户群和更广泛的 NFT 选择，而另一些市场则更加小众，提供的 NFT 选择也更为有限。在选择买卖
  NFT 的平台之前，研究每个市场的受欢迎程度和声誉可能会有所帮助。


  在创建账户或买卖 NFT 之前，仔细研究和考虑不同的 NFT 市场非常重要。通过了解每个市场的功能和局限性，用户可以做出明智的决定，从而最大限度地提高在 NFT
  领域获得成功和盈利的可能性。


  最后，考虑每个 NFT 市场的声誉和社区氛围也是值得的。这包括市场的安全性和透明度历史，以及平台内的活跃度和创新水平等因素。考虑这些因素，用户就可以就加入哪些
  NFT 市场、哪些市场最适合自己的需求和兴趣做出明智的决定。


  ### 出售


  一旦您选定了一个市场，对于卖家来说，下一步就是创建藏品。对于买家来说，当决定根据自身动机购买什么时，大部分情况是在浏览作为藏品一部分列出的 NFT。卖家必须创建这些藏品。


  创建 NFT 藏品可以让您将一组具有共同主题的 NFT 组合在一起，例如一个艺术品系列或一套集换式卡牌。这可以让买家更容易找到并购买您的 NFT，也可以通过营造专属感和稀缺感来增加其价值。


  多数主要的 NFT 市场，如 OpenSea、Rarible 和 Nifty Gateway，都支持藏品。小众市场可能不支持藏品，或者其 NFT 可能被归入开发人员根据
  NFT 属性硬编码的特定已有藏品中。


  一旦您选择了市场、创建了账户并验证了身份（如适用），您就需要决定 NFT 藏品的主题和设计。这取决于您的 NFT 的属性和变量——如果您在创建自己的 NFT，这些属性是您之前决定好的；如果您是从已有的符合藏品主题的资产中精选，则取决于这些资产。考虑您所选主题的市场需求，以及您资产的质量和独特性，以最大化您
  NFT 的价值。


  确定主题和资产后，您就可以开始在市场上创建您的 NFT 藏品了。


  在一般的 NFT 市场上，系统通常会提示您为藏品输入名称和描述。这有助于买家了解您的藏品内容以及可以期待什么。然后，您需要为藏品中的每个 NFT 上传元数据和数字资产。这通常涉及上传图片或视频文件，以及
  NFT 的其他信息，如其名称、描述和属性。之后，请指定您希望在自己的 NFT 被转售时获得的任何版税或佣金比例。


  最后，在您的 NFT 藏品上架出售前，请检查并确认其详细信息。这可能涉及查看市场条款和条件，但通常包括为您的 NFT 设定价格和其他细节。


  一旦您的 NFT 藏品在市场上线，您就可以开始向潜在买家进行推广，并持续跟踪其表现。这包括在社交媒体或其他在线平台上分享它，参与 NFT 社区和论坛，并联系您所在领域的收藏家或影响者。提高藏品的知名度和兴趣度，会增加销售的可能性，并最大化您
  NFT 的价值。


  请注意：在大多数情况下，这是一个长达数月的过程，通常需要在创建您的 NFT 之前就提前很久开始。一个有潜力的 NFT 卖家在产生创建和销售藏品的想法之时，就应开始着手建立社区和吸引兴趣。这样，潜在的买家就会在
  NFT 被铸造或出售之前很久就在等待它们。


  如果您已经拥有一个上传好的 NFT，那么流程通常到此结束。但是，如果您正在创建新的 NFT，它们仍然需要被铸造。大多数市场建议您在 NFT 售出之前不要进行铸造，以节省交易费用，因此这通常是
  NFT 在市场交易生命周期中的最后一步。


  如果没有铸造，该 NFT 实际上并不存在，它只是其创造者脑海中的一个概念。




  #### 铸造与白名单


  要铸造 NFT，用户通常需要通过支持 Web3 的钱包与去中心化应用（dApp）中的智能合约进行交互，从而向区块链发送交易。用户必须拥有足够的 Gas 费来支付相关费用。


  交易发送后，将由网络处理并打包进下一个区块。此过程通常需要几秒到几分钟，具体取决于区块链和当前的网络拥堵状况。交易一旦得到确认，NFT 就会被铸造出来。根据与智能合约交互所使用的
  dApp 不同，该 NFT 可能被发送到创作者的账户，也可能被发送到其他钱包地址。


  许多 NFT 创作者通过所谓的“白名单”流程进行销售：他们不直接铸造 NFT，而是将铸造权“白名单”给社区成员，由他们自行铸造。创作者通常会出售这些白名单名额，或将其赠予高活跃度的社区成员，作为对其推动藏品热度增长的奖励。这使得部分社区成员能够以初始价格购买该系列的
  NFT。


  这通常是一个更复杂的过程，但有助于确保在藏品上架销售之前就已存在买家。不过，也有一些创作者更倾向于直接在市场上架，并利用市场来铸造 NFT。


  OpenSea 的 dApp 可以作为一个例子说明其运作方式。要使用 OpenSea 的界面铸造 NFT，需要创建一个新条目，并上传 NFT 的数字资产和元数据。用户还需要在此设置价格和版税比例。


  选择“创建”选项，并挑选用于铸造 NFT 的智能合约。OpenSea 支持多种 NFT 智能合约，包括流行的 `ERC-721` 和 `ERC-1155` 标准。然后对交易进行签名并将其发送到区块链，该交易包含创建
  NFT 所需的数据。


  回想一下，“签名”交易是使用用户加密货币钱包关联的数字签名，来验证拟议活动的真实性。在某些情况下，简单的签名可以免 Gas 费完成，但在创建 NFT 时，用户同时也在发送一笔需要付费的交易。


  如果用户选择让 OpenSea 仅在售出时铸造 NFT（而非预先铸造），这意味着 NFT 将在有买家购买时才会被创建出来。在这种情况下，用户无需预先支付铸造 NFT
  的交易费，该费用将由买家在购买交易中支付。对于不想预付费用，或不确定其 NFT 是否有足够需求以证明预先铸造成本合理的创作者来说，这是一个有用的选项。


  一旦铸造完成，该 NFT 就会作为一枚带有唯一标识符的新代币出现在用户连接的钱包中。随后，用户可以将该 NFT 上架销售、转移到其他钱包，或以任何期望的方式使用。任何涉及该
  NFT 的交易都会产生额外费用，并可能需支付版税。


  ## 总结


  选择合适的 NFT 市场是卖家最基础的步骤之一。像 OpenSea、Rarible 和 Nifty Gateway 这样的知名平台通常是首选，尽管一些小众平台也具备独特属性，有时甚至提供硬编码的系列藏品。系列藏品是
  NFT 市场不可或缺的组成部分，因此按共享主题组织 NFT 是一个重要的考量。


  定义系列藏品需要创作者精心挑选其 NFT 的主题和设计。虽然这可能只是对现有资产进行策展，但系列藏品更常反映创作者打算出售的 NFT 的内在属性。


  下一个阶段是上架流程，卖家用标签和描述来推广他们的系列藏品。此过程有助于目标买家识别该系列藏品是否适合自己。后续步骤包括上传元数据、数字资产，以及潜在转售时的版税或佣金比例等细节。在任何藏品上架市场之前，卖家最好仔细检查其资产的各项细节（包括定价），确保一切符合自身目标。


  NFT 的成功销售，其营销和推广策略的重要性往往不亚于 NFT 本身的细节和价值。建议卖家在 NFT 铸造之前就早早培养市场期待和需求——通过社交媒体渠道、活跃的论坛以及与知名收藏家的互动来吸引潜在买家，是这一过程的关键部分。


  铸造（即在区块链上实际创建 NFT）的环节通常应尽可能推迟，以最大限度地减少不必要的开支。在许多情况下，这是首次创建和销售 NFT 过程中的最后步骤之一。在其他情况下，铸造可能在交易发生前很久就已完成，此时资产只是在易手。白名单流程使社区成员能够直接铸造
  NFT，而非由卖家自行铸造，这让他们对所获内容拥有一定程度的控制权，或者完全交由运气决定。无论哪种方式，这都能让实际创作者节省费用。


  以 OpenSea 为例，从头到尾的流程是：创作者首先上传数字资产和元数据，确定价格，并决定版税事宜。下一步是选择智能合约，签名并将交易发送到选定的区块链。选择仅在交易售出时铸造，可以让创作者规避初始费用，而由买家承担。随后，NFT
  会带着其唯一 ID 被发送到购买者的钱包。此时，许多人可能只想转手 NFT 以获利，但对于具有实际效用的资产而言，这种情况并不常见。那些真正除了通过销售为创作者牟利之外还有其用途的
  NFT，会被持有者更长久地保留，并用来实现自己的愿望。


