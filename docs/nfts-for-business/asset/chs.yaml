- "# NFT 对艺术界的颠覆与创新\n\n长久以来，艺术界一直是创意表达和文化意义的空间，几个世纪以来，实体艺术品被爱好者买卖和收藏。然而，数字时代也带来了变革性的变化，其中最重要的之一便是\
  \ NFT 的出现。本章深入探讨了 NFT 在艺术界的应用，对艺术家和收藏家的益处，以及由此引发的争议，并为那些希望成功将 NFT 融入艺术创作的人提供了全面策略。\n\
  \n\n\n## NFT 在艺术界的崛起\n\n几个世纪以来，实体艺术的创作者和收藏者会在博物馆甚至自己的客厅等实体空间展示艺术品。这些艺术品的所有权和真实性也易于证明，因为收藏家可以通过独立专家和艺术家本人来认证其真伪。实体艺术与数字艺术的关键区别在于，后者以数字形式存在，表现为虚拟形态。数字艺术可以包括插图、照片、GIF\
  \ 动图、3D 模型等。然而，数字艺术很容易被复制和展示。例如，若我们在网页上看到喜欢的图片，只需截屏，或是在多数情况下直接将图像以 PDF 或 JPEG 格式保存到自己的电脑上，便可随时随地展示。\n\
  \n`NFT`被用于数字艺术领域，因为它能认证艺术品的真实性，并提供永久的所有权记录。通过将艺术品代币化并记录在区块链上，艺术品的买家可以确信自己拥有的是原作。\n\
  \n此外，`NFT`可以为数字艺术创造稀缺性，使其成为有价值的资产。这正是数字艺术成为`NFT`最早的应用场景之一的原因，也开启了区块链在艺术界复兴的序幕。换句话说，`NFT`作为一种特定资产的数字所有权证书，与流通中的其他任何`NFT`都截然不同。正是凭借这一特性，`NFT`被用于认证数字艺术的所有权。\n\
  \n这项技术还促进了`NFT`的买卖，并将所有权信息存储在区块链上，使得数字资产能够在区块链上进行交换、追踪和管理。\n\n### 早期 NFT 艺术项目及其对艺术界的影响\n\
  \n`NFT`的应用给艺术界带来了显著变化，为创意表达、所有权和交易提供了新的可能性。艺术界最早的一些`NFT`应用是诸如`CryptoPunks`和`CryptoKitties`等项目，为众多艺术家和收藏家探索这一新疆域铺平了道路。\n\
  \n`CryptoPunks`由 Larva Labs 的软件开发者马特·霍尔和约翰·沃特金森创作，于 2017 年 6 月首次亮相，是最早的`NFT`艺术项目之一。该项目包含\
  \ 10,000 个独特的 24x24 像素艺术角色，每个 Punk 都拥有独特的属性组合，例如不同的发型、面部表情和配饰。最初，任何拥有以太坊钱包的人都可以免费获取这些数字角色。但随着需求增长，这些\
  \ Punk 的价值迅速攀升，其中一些的售价高达数十万甚至数百万美元。\n\n`CryptoPunks`的成功昭示了`NFT`作为数字艺术和收藏品媒介的潜力。该项目证明了独特的数字物品可以拥有价值，并能在以太坊等区块链平台上交易。此外，它也凸显了数字艺术世界中可证明的稀缺性和所有权的重要性——由于区块链技术不可篡改的特性，每个\
  \ Punk 都无法被复制或伪造，因为每个 Punk 基于其铸造时间的不同而具有不同的价值。\n\n2017 年 11 月，一个名为`CryptoKitties`的新型数字艺术应用向艺术界展示了游戏与艺术如何融合。`CryptoKitties`由\
  \ Axiom Zen（现 Dapper Labs）开发，是一款同样基于以太坊网络的虚拟繁殖游戏。用户可以收集、繁殖和交易数字猫咪，每只猫咪都有独特的遗传特征，并可遗传给后代。该项目广受欢迎。在巅峰时期，该游戏甚至占据了以太坊网络交易量的很大一部分，甚至导致网络速度变慢。（这些问题暴露了当时区块链平台潜在的可扩展性问题。）\n\
  \n随着`CryptoPunks`和`CryptoKitties`的成功在艺术界引起反响，艺术家们开始尝试数字艺术形式，探索这种新媒介所提供的可能性。与此同时，社交媒体和在线平台逐渐成为熙熙攘攘的市场，艺术家们可以在那里展示作品，收藏家们则可以寻觅新奇有趣的艺术品。过去，一件艺术品常常需要数年甚至数百年才能获得大众的关注。而借助这些新的社交网络和数字集市，艺术家可以在几天甚至几小时内就使其创作迅速吸引眼球。正是在这些数字集市中，艺术家们开始看到了`NFT`的真正潜力。\n\
  \n其中一位艺术家是迈克·温克尔曼，也被称为“Beeple”。《每一天：前 5000 天》是 Beeple 在 13 年间创作的 5,000 幅图像合集，随后被汇编成一个单一的整体作品。这件艺术品以`NFT`的形式售出。《每一天：前\
  \ 5000 天》的拍卖是数字艺术史上的里程碑事件，因为它是在主要拍卖行售出的第一件`NFT`艺术品。它以超过 6500 万美元的价格成交，创下了数字艺术品的最高成交价纪录。此次拍卖对艺术界产生了重大影响，赋予了数字艺术——尤其是`NFT`——此前所缺失的合法性。\n\
  \n此后，其他备受瞩目的`NFT`销售接踵而至，包括 Grimes 的《WarNymph》售价超过 600 万美元，以及艺术家 Pak 的作品《Crossroads\
  \ 2》售价超过 1600 万美元。这些拍卖对艺术界产生了重大影响，并必将塑造未来多年数字艺术的发展方向。\n\n### 知名艺术家和品牌对 NFT 的采用\n\
  \nBeeple 等人的成功所带来的`NFT`在数字艺术领域的合法化，为知名艺术家和品牌通过其艺术品和商品进行变现铺平了道路。\n\n知名品牌和公司已推出限量版和独家产品作为`NFT`。例如，NBA\
  \ 近期发布了一系列名为`The Association`的`NFT`交易卡，其收藏品的设计会随时间变化。这些`NFT`的外观会根据球员在赛场上的表现而演变。球员在整个赛季中取得的成就越高，其`NFT`的视觉效果变化就越大。除了这个`NFT`项目，NBA\
  \ 还通过 Dapper Labs 的`NBA Top Shot`极大地推动了体育`NFT`的发展。2022 年，该平台在很大程度上推动了`NFT`体育热潮，带动了近\
  \ 10 亿美元的销售额。\n\n除了变现，知名艺术家和品牌也采用`NFT`来增加与粉丝、顾客和关注者的互动。例如，音乐艺术家史蒂夫·青木近期发布了一个`NFT`系列，其中包括限量版数字艺术品和商品。其他艺术家和品牌则利用`NFT`开展营销活动，为购买其`NFT`的粉丝提供奖励。\n\
  \n### NFT 对艺术家和收藏家的好处\n\n总体而言，知名艺术家和品牌使用`NFT`正被证明是有益的。`NFT`为艺术家提供了一种变现和认证其艺术品的方式，也为品牌创造了专属产品和基于激励的营销活动。这些知名实体对`NFT`的使用，正在使数字艺术和收藏品得到更广泛的接受。\n\
  \n\n\n#### 经济收益\n\n比普尔和史蒂夫·青木的 NFT 藏品案例，已经展示了艺术家和收藏家通过出售原创作品所能获得的潜在经济收益。但除了直接出售这些\
  \ NFT 藏品，还有通过提供“二次销售版税”功能的平台来赚取版税的更多机会。利用这些功能，艺术家可以设定二次销售购买价格的一定比例作为自己的版税收入。例如，艺术家可以设定二次销售的\
  \ 5%版税，这样他们就能从任何二次销售其 NFT 的购买价格中获得 5%的收入。除了设定二次销售的版税比例，艺术家还可以在平台上指定不同的许可类型。这使得艺术家能够控制其艺术作品的用途，除了创造额外的版税收入流之外，还能让他们对自己的创作有更大的控制权。\n\
  \n目前有许多为艺术家提供二次销售版税选项的平台。一些流行的例子包括 `SuperRare`、`MakersPlace`、`Foundation` 和 `OpenSea`\
  \ 等。这些平台各自提供不同的功能和服务，所以请务必自行研究，找到最适合你的那一个。\n\n除了这些平台，还有一些专门为艺术家打造的区块链项目。这些项目通常提供各种工具来帮助艺术家将作品货币化并加以保护，例如版税支付服务和版权管理。\n\
  \n最后，也有一些传统平台开始提供 NFT 和二次销售版税功能。`eBay` 和 `Patreon` 就是其中的两个例子，相信未来会有更多平台跟进。\n\n####\
  \ 来源与认证\n\n来源与认证是艺术界两个至关重要的组成部分。来源指的是艺术品的所有权历史，而认证则是验证艺术品真伪的过程。这两个因素都会显著影响艺术品的价值，因此对于希望出售作品的艺术家来说至关重要。\n\
  \n最近，NFT 已成为艺术家利用来源与认证获益的新工具。NFT 是独特的数字代币，用于代表对数字资产（如一件艺术品）的所有权。当艺术家为其作品创建 NFT 时，他们可以包含有关艺术品来源的信息，例如其前任所有者和展览历史。\n\
  \n通过包含这些信息，艺术家可以向潜在买家展示艺术品的历史和意义，从而提升作品的价值。这有助于确立艺术品的真实性并验证其价值。此外，使用 NFT 可以让艺术家对作品的发行和所有权拥有更大程度的控制，使他们能够保留所有权，并在作品每次售出时都有可能获得版税。\n\
  \n使用 NFT 也有助于保护艺术家免受欺诈和盗窃。由于 NFT 存储在区块链上，它们几乎不可能被伪造或篡改。这使得欺诈者更难将假艺术品冒充为真品，从而有助于保护艺术家和买家双方。\n\
  \n#### 通过民主化为新兴艺术家拓展机会\n\n艺术市场的民主化正在对新兴艺术家的机会产生重大影响，这在很大程度上归功于 NFT。传统艺术市场通常被视为对新兴艺术家封闭且难以进入，画廊和其他渠道往往有很高的准入门槛。然而，随着民主化，越来越多的艺术家找到了无需机构场所就能展示自己作品的机会。通过将艺术品代币化并记录在区块链上，艺术家可以确信自己的作品将得到保护且其真实性得到认证。这使得艺术家能够为其作品创建一个数字市场，赋予他们更多控制权，并为他们接触更广泛的受众创造更多机会。\n\
  \n此外，数字平台的使用也促进了艺术市场的民主化。像 `Instagram`、`Twitter` 和 `YouTube` 这样的平台允许艺术家分享他们的作品并与潜在买家建立联系。这些平台还允许艺术家与观众之间进行更多互动，从而开展有意义的互动并获得反馈。\n\
  \n#### 数字艺术对收藏家的吸引力\n\n得益于数字所有权的出现以及独一无二物品日益增长的吸引力，NFT 也改变了收藏家的市场。有了 NFT，收藏家现在有机会拥有独特、稀有且可验证真伪的数字资产，从而开启了一个全新的投资世界。\n\
  \n对于收藏家来说，数字所有权的一个关键吸引力在于拥有一件独一无二物品所带来的专属感和独特感。对于传统的收藏品，如艺术品或体育纪念品，同一物品可能存在多个副本，导致价值稀释。然而，对于\
  \ NFT，每件物品都是独一无二的，拥有自己独特的属性和特征，确保其价值保持高位。\n\nNFT 的出现也为收藏家创造了新的投资机会。对于传统收藏品，物品的价值通常与特定类型物品的更广阔市场挂钩。然而，对于\
  \ NFT，其价值完全由供需决定，从而创造了获得显著投资回报的潜力。\n\n此外，NFT 具有高度的可移植性，意味着它们可以在数字市场上轻松买卖，为收藏家提供了更大的流动性和投资灵活性。这导致了一个全新的数字市场和平台生态系统的创建，专门用于\
  \ NFT 的交易。\n\n### 围绕 NFT 在艺术界的争议\n\nNFT 的出现彻底改变了艺术界，为艺术家和收藏家都提供了新的机会。然而，NFT 也在艺术界内部引发了激烈的争论。\n\
  \n#### 环境担忧\n\n围绕 NFT 最突出的争议之一是其对环境的影响。在像 `Ethereum` 这样的区块链网络上创建和交易 NFT 需要大量的计算能力，导致高能耗，并因此产生巨大的碳足迹。批评者认为，艺术界对\
  \ NFT 的拥抱正在加剧气候变化，破坏了减少碳排放和促进可持续发展的努力。\n\n另一方面，NFT 的支持者指出，许多区块链网络正在向更节能的共识机制过渡，例如\
  \ `Ethereum` 从工作量证明向权益证明的转变。此外，一些 NFT 平台正采用环保做法，如碳抵消，以减轻其对环境的影响。\n\n#### 艺术完整性与真实性\n\
  \n另一个争议是关于艺术完整性和真实性的辩论。一些批评者认为，NFT 的数字特性使得艺术家更容易抄袭或歪曲其他创作者的作品。他们认为，实体艺术品的缺失降低了数字艺术的感知价值，并助长了可能忽视知识产权的环境。\n\
  \n相比之下，NFT 支持者声称，区块链技术实际上可以增强数字艺术的真实性和来源。通过去中心化账本，NFT 的所有权和转让历史可以被安全地追踪和验证，使得赝品难以进入市场。他们认为，NFT\
  \ 为艺术家提供了一个在数字领域保护其作品的机会，而在数字领域，抄袭长期以来一直是一个普遍存在的问题。\n\n\n\n#### 艺术与文化的商品化\n\n批评者认为，非同质化代币的兴起导致了艺术的过度商业化，收藏家和投机者更倾向于将数字艺术品视为可交易资产，而非具有意义的创意表达。他们声称，这种转变可能导致人们追逐经济利益，而牺牲艺术价值与文化意义。\n\
  \n然而，非同质化代币的支持者认为，艺术界始终与商业密不可分，而非同质化代币只是艺术家将其作品变现的一种新媒介。他们坚持认为，非同质化代币的经济成功可以使艺术家维持生计，并为未来项目提供资金，从而最终丰富文化景观。\n\
  \n#### 排他性与可及性\n\n最后，排他性与可及性问题一直是 NFT 艺术界争论的关键点。有些人认为，NFT 迎合了富有的收藏家，并为财力较弱的群体设置了准入门槛，从而延续了艺术界的精英主义本质。他们主张，这可能导致代表性不足的艺术家和社区进一步被边缘化。\n\
  \n另一方面，支持者则强调 NFT 在艺术市场民主化方面的作用。他们声称，NFT 平台为新兴艺术家提供了向全球观众展示其作品的机会，绕过了画廊和拍卖行等传统守门人。此外，有人提出通过\
  \ NFT 的部分所有权，来让更广泛的收藏家群体更容易接触数字艺术。\n\n### 艺术家与收藏家的策略\n\n随着非同质化代币的出现，数字艺术界经历了变革性的转变，为艺术家和收藏家都带来了新的机遇。随着越来越多人进入\
  \ NFT 艺术市场，了解有助于他们在这一快速发展的领域中取得成功的策略至关重要。\n\n以下是艺术家和收藏家在进入 NFT 艺术世界时应考虑的一些关键策略。\n\
  \n1. 艺术家的策略\n    1. 建立独特的艺术身份\n        1. 形成独特且可识别的风格，使艺术家在 NFT 领域脱颖而出。\n      \
  \  2. 通过数字创作传达一致的艺术愿景或信息。\n    2. 建立线上形象\n        1. 利用社交媒体平台展示艺术作品，与粉丝互动，并建立社群。\n\
  \        2. 创建个人网站或作品集来展示和销售数字艺术。这是在 NFT 市场平台上市之外的补充方式。\n    3. 拥抱合作与人脉拓展\n    \
  \    1. 与其他艺术家、影响者或品牌合作，创建联合 NFT 项目或相互推广作品。\n        2. 参与致力于数字艺术和 NFT 的在线论坛和社群，以拓展专业人脉并向其他艺术家学习。\n\
  \    4. 选择合适的 NFT 市场\n        1. 研究不同的 NFT 市场，找到最符合艺术家风格、目标受众和价值观的平台。\n        2.\
  \ 评估平台费用、用户体验以及对环保实践的支持等因素。\n        3. 可供考虑的若干 NFT 市场：\n            1. `OpenSea`：`OpenSea`是规模最大、最受欢迎的\
  \ NFT 市场之一，提供包括艺术品、收藏品、域名和虚拟商品在内的广泛数字资产。它支持以太坊和 Polygon 区块链，并为创作者和收藏家提供易用的界面。\n\
  \            2. `Rarible`：`Rarible`是一个去中心化的 NFT 市场，允许用户创建、购买和销售数字艺术与收藏品。它具有用户友好的平台，并提供治理代币（`RARI`），使其社区能够参与决策过程。\n\
  \            3. `SuperRare`：`SuperRare`是一个策展型市场，专注于高质量的单版数字艺术品。它拥有严格的筛选流程，并以展示 NFT\
  \ 领域顶尖艺术家的作品而闻名。该平台基于以太坊区块链构建。\n            4. `Foundation`：`Foundation`是另一个策展型\
  \ NFT 市场，连接数字艺术家与收藏家。它强调创意创新，并支持从新兴人才到知名艺术家的多元化艺术家群体。该平台在以太坊网络上运行。\n           \
  \ 5. `Nifty Gateway`：`Nifty Gateway`是一个中心化的 NFT 平台，定期举办来自知名艺术家和品牌的独家限量版数字艺术品的“发售”活动。它提供用户友好的体验并支持信用卡支付，使其对加密社区之外的更广泛受众也具有可及性。\n\
  \            6. `Async Art`：`Async Art`是一个独特的 NFT 平台，专注于可编程艺术，允许艺术家创作具有可调整图层或元素的数字艺术品。收藏家可以拥有艺术品的单个图层或元素并进行修改，从而产生动态且不断演变的艺术作品。\n\
  \            7. `KnownOrigin`：`KnownOrigin`是一个策展型 NFT 平台，专注于来自新兴和知名艺术家的高质量数字艺术品。它在以太坊区块链上运行，并提供包括拍卖、版次和艺术家合作在内的一系列功能。\n\
  \            8. `Hic et Nunc`（`HEN`）：`Hic et Nunc`是一个基于 Tezos 区块链构建的 NFT 平台，以其节能的权益证明共识机制而闻名。它高度关注可持续性，并为艺术家提供铸造和销售数字创作的简单界面。\n\
  \    5. 这些市场提供不同的功能、费用和体验，因此艺术家和收藏家在进入 NFT 艺术世界之前，应仔细考虑哪个平台最符合他们的需求、偏好和价值观。\n  \
  \  6. 定价与版次\n        1. 根据市场需求、制作成本和艺术家声誉等因素，确定数字艺术的适当定价结构。\n        2. 考虑创建限量版或独一无二的作品的好处，以提升艺术品的感知价值和排他性。\n\
  \    7. 营销与推广\n        1. 利用社交媒体、电子邮件营销和公共关系来为 NFT 艺术品的发布造势。\n        2. 利用数据分析来监控营销工作的有效性，并相应调整策略。\n\
  \n2. 收藏家的策略\n    1. 制定收藏策略\n        1. 明确收藏家的目标和动机，例如获取经济利益、支持新兴艺术家或保护文化遗产。\n  \
  \      2. 为收藏品确定一个焦点或利基领域，例如特定的艺术风格、主题或艺术家。\n    2. 进行充分研究\n        1. 在购买数字艺术品之前，调查艺术家的背景和资质。\n\
  \        2. 分析市场趋势和销售数据，以便就收购哪些 NFT 做出明智的决定。\n    3. 融入艺术社群\n        1. 参与致力于 NFT\
  \ 艺术的在线论坛、社交媒体群组和活动，以拓展知识并在社群内建立联系。\n        2. 参加虚拟展览、拍卖和艺术家讲座，以了解 NFT 艺术世界的最新发展动态。\n\
  \    4. 确保 NFT 艺术品的真实性与来源\n        1. 在购买前，验证与 NFT 相关的来源、所有权历史和智能合约。\n        2.\
  \ 如有必要，咨询专家或利用第三方认证服务。\n    5. 管理和保护 NFT 收藏品\n        1. 选择安全的数字钱包来存储 NFT 并保护私钥。\n\
  \        2. 定期监控收藏品的价值，并考虑保险或资产保护方案。\n\n\n\n## 总结\n\nNFT 的出现无疑颠覆了艺术界，在为艺术家和收藏家带来新机遇的同时，也引发了重大的争议和讨论。\n\
  \n随着 NFT 的普及度持续增长，利益相关者持续探讨这项技术的影响及其对艺术界的作用至关重要。NFT 的采用者也需要深思熟虑的策略——艺术家和收藏家需精心挑选合适的\
  \ NFT 市场，并制定恰当的目标受众和营销策略。艺术界唯有在拥抱 NFT 带来的益处的同时，正视围绕它的争议，才能在这场数字革命的复杂格局中稳步前行。\n\n\
  对于艺术家和收藏家来说，进入 NFT 艺术世界既令人兴奋，也充满挑战。通过采纳本章概述的策略，艺术家和收藏家可以更好地应对 NFT 市场的复杂性，最大化自身成功的可能性，并为数字艺术的持续发展与演变做出贡献。\n\
  \n"
- '# 5. 游戏行业与 NFT


  近年来，游戏行业经历了翻天覆地的变化，这得益于技术的飞速进步和互联网的普及。随着游戏复杂性和精巧度的提升，对独特且个性化的游戏内资产的需求也与日俱增。


  非同质化代币（NFT）在游戏领域的应用是一个自然而然的发展过程，它提供了一个能够同时满足开发者和玩家需求的框架。区块链的这一应用场景已迅速火热起来，超过一半的区块链活动都来自游戏，并且几乎每天都有新游戏上线。


  绝大多数新的区块链游戏都来自初创公司。这些由风险投资支持的工作室，通常自身没有任何游戏作品（尽管团队中常至少有一人拥有传统游戏工作室的背景），会为目标游戏构建一个集成了加密货币和
  NFT 的可玩演示版。其中许多项目获得了资金支持，随后推出游戏，其重点往往首先放在代币经济学上，为玩家提供一种避免陷入“死亡螺旋”的赚钱方式。不过，并非所有区块链游戏都遵循这种方法。


  ## 游戏对 NFT 的处理方式


  有些游戏在保持以游戏性为核心的同时集成了 Web3 功能；有些则在作为 Web2 游戏发布一段时间后才添加 Web3 功能；还有些游戏玩家甚至根本察觉不到自己玩的是
  Web3 游戏。让我们来看几个主要游戏集成区块链方式的例子。


  一个经典的纯 Web3 游戏是《Splinterlands》。这是一款“卡牌”游戏，与许多其他纯 Web3 游戏类似；玩家通过构建代表不同法术和生物“卡牌”的“卡组”，在
  PvP 回合制战斗中与其他玩家对战。卡牌可以随着时间推移，使用经验值和游戏内资源进行升级。每张卡牌都是一个 NFT，这意味着游戏的核心完全建立在这项技术之上。


  当然，当大多数人想到 Web3 游戏时，最先想到的游戏之一就是 Sky Mavis 的《Axie Infinity》。在这款游戏中，玩家组建“Axie”团队进行对战，游戏中的所有角色都是
  NFT。


  另一种类型的游戏是 Raini Studios 开发并于 2021 年发布的《Lords of Light》，它在发布时就包含了一系列 Web3 功能。这是一款手机角色扮演游戏（RPG），玩家在其中建立王国、收集并升级王国中的英雄，在一个充满中世纪奇幻色彩的世界中与其他玩家战斗，收集资源、探索区域并完成任务。《Lords
  of Light》的游戏内货币是 Light 代币，但更重要的是，该游戏使用 NFT 作为资产。玩家收集的英雄、武器和盔甲都是 NFT，其他 NFT 则用于解锁特殊游戏功能，例如限时活动。


  Hit Box Games 开发的《Swords of Blood》是另一款融合了 NFT 等 Web3 功能的 RPG 游戏。它是同一发行商此前一款名为《Blade
  Bound》（纯 Web2，没有任何 Web3 元素）游戏的扩展。《Swords of Blood》采用了以往成功的模式，并为高价值物品引入了 NFT，所有这些物品都存放在游戏内置的钱包中。该游戏仍然保留着
  Web2 模式，但玩家在游戏过程中会开始积累 NFT 和 Web3 资产。


  NFT 游戏并非仅仅是小众或专业工作室的尝试。大型品牌和机构也在围绕它们构建体验。Altered State Machine 开发的《World Cup AI
  League》就是这样一个例子。这款由国际足联（FIFA）赞助的游戏，让玩家组建一支由四个 AI 驱动的角色组成的队伍。开发者的目标是集成一个 NFT 市场，届时游戏中的所有玩家和角色都将成为
  NFT。这款游戏在设计之初就考虑了 Web3 功能，但最初发布时并未包含，因为开发者打算稍后融入。


  史克威尔艾尼克斯（Square Enix）可能是开始构建 NFT 游戏的最大游戏开发商。其游戏《Symbiogenesis》实际上并不要求玩家拥有任何 NFT，但如果没有，游戏体验会大打折扣。角色
  NFT 使玩家能够阅读独特的故事、快速积累经验值、从完成任务中获得额外奖励、创建自己角色的“复制品”等等。


  然而，所有这些例子大多是开拓者的情况——关于区块链在游戏领域采用率的统计数据显示，这远未普及。截至 2023 年初，行业会议组织 GDC 对游戏开发者的一项调查表明，大约四分之一的游戏工作室对开发基于区块链的游戏有一定兴趣，但只有约
  2% 的工作室正在积极进行。这一数字较 2022 年初发布的上一份报告略有下降，当时加密和 NFT 的比例分别约为 27% 和 28%。


  许多游戏开发商和工作室认为，区块链在游戏领域没有立足之地，认为它是在为不存在的问题寻找解决方案，纯粹是欺诈的工具，甚至认为在中心化数据库就能胜任的情况下，这是一种低劣的方式。在许多情况下，这些批评不无道理，而且许多已上线的区块链游戏要么构思不周，要么因为过度关注区块链方面而忽视了游戏本身，从而亮起红灯。尽管如此，对
  NFT 等资产进行恰当的实施，只会提升用户体验。




  ## 发行商对 NFT 的态度


  在游戏领域，支持与反对区块链/NFT 的争论，可以通过两大热门游戏平台——Steam 和 Epic 游戏商城——的视角来观察。


  游戏开发商/发行商 Valve 在其游戏平台 Steam 上全面禁止了所有包含区块链或 NFT 技术的游戏。考虑到 Steam 是 PC 玩家寻找、购买、下载和启动游戏的主要途径之一，这是一项重大举措。尽管有这项限制，平台上仍有一些基于区块链的游戏存在。


  此举引发了褒贬不一的反应。虽然许多社区成员对这一决定表示赞赏，但 Valve 被指控只是试图消除那些他们无法从中抽成的、由 NFT 驱动的游戏市场的存在，其中包括一位其游戏被从平台下架的开发商的指责。Valve
  总裁声称，他们这样做是因为，虽然区块链是一项伟大的技术，“但其目前的使用方式都相当可疑”，并且“目前活跃在该领域的人通常不是善意的行为者”。


  一家 Web3 游戏发行商 Gala Games，通过从其游戏在 Steam 上的版本中移除所有 NFT 功能，将其一款游戏上架了 Steam。这使他们能够从
  Steam 生态系统中引入玩家，并在未来将其迁移到内部系统，以便这些玩家获得最完整的体验。


  另一方面，Epic Games 则在其 Epic 游戏商城中欢迎 NFT。其 CEO 表示，他认为“商店和操作系统制造商不应该通过将自己的观点强加于他人来干涉（开发者如何构建游戏的选择）”，并补充说
  Epic 肯定不会这样做。


  考虑到 Epic Games 开发并推出了《堡垒之夜》——游戏史上最成功的案例之一——这表明业内主要参与者对于 NFT 的看法有多么两极分化。Epic 游戏商城规模远小于
  Steam，但最终可能因成为允许 NFT 产品的最大游戏库之一而受益。Gala Games 已表示计划在该平台发布其游戏，而该平台也发布了其首个主打 NFT 游戏《Blankos
  Block Party》，该游戏由 Mythical Games 制作，根据其最近一轮融资，该公司估值超过 10 亿美元。


  很明显，发行商、工作室和其他游戏平台正在采用这项技术。同样明显的是，对此的兴趣程度在极度热情和截然反对之间差异巨大。鉴于目前只有五十分之一的工作室在开发基于 NFT
  的游戏，而 75%的行业对此毫无兴趣，区块链技术的价值仍需在广泛采用之前得到证实。


  如果游戏行业要利用这项技术带来的好处，就需要克服因 NFT 不良声誉而引发的惶恐，可能要通过重新品牌化来修复形象。“拉地毯”诈骗和废弃项目的遗留问题，使得许多人即便只是想到要制作或玩一款
  NFT 游戏，也至少持怀疑态度，最坏的情况则是充满敌意。开发者们常常公开支持 NFT 能为游戏带来的可能性和理想，但往往因其污点历史而无法接受它们。


  解决这个问题需要一种基础设施，以及开发者对质量的承诺，他们要利用区块链技术，但又不将其作为所创造内容的核心。就像没人会在玩《堡垒之夜》时考虑它需要始终在线的互联网连接一样（至少在他们卡顿或断线之前不会），游戏需要以允许玩家享受体验而不去想他们如何使用那些协议的方式来整合区块链。一旦这一点被克服，犹豫不决的情况也必然会减少。


  ## 区块链游戏的优势


  如果实施得当，区块链和 NFT 能为游戏带来的好处是相当可观的。


  拥有不可篡改的交易记录、可转移的独特资产、去中心化存储以及跨平台可移植性，为游戏、玩家和游戏开发者提供了众多好处。


  一个例子是可验证的所有权。区块链创建不可篡改交易记录的能力，允许清晰地确立游戏内资产的所有权。对于玩家来说，这意味着他们可以证明自己拥有所获得的数字物品，这对于交易、出售或转让这些资产至关重要，尤其是当他们希望在游戏创造者提供的封闭环境之外这样做时。


  这在《星图》的资产所有权公开记录中可见一斑。任何人都可以随时查看排行榜，并确切知道谁拥有什么。在撰写本文时，排名第一的玩家拥有$654,844 的资产，任何人都可以点击其页面来验证这些资产具体是什么。然后，该人（意欲购买者）可以查看市场，了解这些资产当前的交易价格，并据此行动。


  这一功能防止了意图购买资产的人被骗，并确保了想要出售资产的人能获得其应有的价值。此外，可验证性意味着资产来源可以追溯。例如，如果游戏中的某人拥有一艘参加过某场著名战役的星际巡洋舰，那么它可能会比该资产的其他普通版本价值更高，并能卖出溢价。


  开发者也能从这种可验证的所有权中受益。他们可以追踪游戏内资产的分布，并允许在其封闭生态系统之外进行转移，同时仍能获得版税等好处。这有助于防止欺诈活动，并确保游戏经济保持平衡。他们可以监控其资产的交易情况，并在出现争议时（即使是在自己的市场之外）核实一切是否合规。


  这与 Web2 游戏的封闭系统形成了鲜明对比，在那些系统中，人们在任何地方购买的物品都无法带出。想象一下，一个人买了一辆车，但只能使用由汽车经销商建造的道路，并且如果他能卖掉的话，也只能在经销商的停车场出售。这将使汽车实际上等同于卡丁车赛道上的卡丁车，尽管你是在“购买”它。NFT
  移除了这一限制。


  在玩家和开发者需要信任系统完整性的在线环境中，信任至关重要。由于区块链确保交易记录不能被单一实体操纵或篡改，因此它比集中式数据库提供了更高水平的安全性和信任。即使在区块链被黑客攻击的情况下，过去的记录也永远无法被篡改。这种信任促进了更具活力的游戏社区。它也鼓励玩家购买更多数字资产，特别是因为他们可以将其带离那个所谓的卡丁车赛道。


  由于 Web3 资产（特别是 NFT）更像是购买一辆可以随处行驶的汽车，而非隐喻中那些买了就必须留在赛道上的 Web2 资产，Web3 实现了玩家之间更优越的资产交换。它去除了交易中介，并提供了透明的交易历史，降低了任何对其所购物品稍作研究的玩家的欺诈风险。


  这种效率促进了游戏内经济的发展，并进一步激励了玩家的参与。




  ## 去中心化市场与区块链游戏


  像 `OpenSea` 这样的去中心化市场允许用户交易各种基于 NFT 的游戏内资产，包括来自《去中心大陆》（`Decentraland`）和《Axie Infinity》等游戏的资产。玩家不必局限于游戏开发者自己创建的市场。尽管玩家可能会觉得这些专门平台更适合特定游戏的交易，但生态系统的开放性意味着玩家不会被锁定，这迫使所有参与方行为更诚实并维持高标准。


  与中心化系统相比，区块链为游戏提供了若干其他优势，尤其是在安全性和抗审查方面。


  中心化数据库因其单点故障而更容易受到攻击。一旦黑客获得中央服务器的访问权限，他们就能操纵并危害整个系统。相比之下，由于区块链技术运行在去中心化网络上，它们对此类攻击更具抵抗力。由于数据存储于多个节点，要攻破系统需要巨大的计算能力和协调，这使得恶意行为者更难入侵网络。


  ### 安全性与抗审查


  不过，使用区块链解决方案并不能消除安全问题，因为将某些内容上链并不意味着它就能免遭攻击。攻击向量发生了变化。`Ronin Bridge` 被黑事件就是去中心化系统中安全漏洞的一个警示性案例。


  `Ronin Bridge` 是一个由《Axie Infinity》使用的区块链平台，它允许用户在 `Ethereum` 网络和 `Ronin` 侧链之间转移资产。该侧链由《Axie
  Infinity》的开发者 `Sky Mavis` 创建，旨在为玩其游戏的人提供更流畅的体验。


  2022 年 3 月，`Ronin Bridge` 遭遇安全漏洞，黑客盗走了当时价值约 6.25 亿美元的加密货币。攻击者利用了该平台多重签名钱包系统中的漏洞，该系统需要多个钱包签名才能授权交易。


  这一事件凸显了一个现实：即使是基于区块链的系统，如果安全防护不足，也可能受到攻击。这次入侵事件凸显了强有力的安全措施以及持续保持警惕以识别和解决中心化及去中心化系统中潜在漏洞的重要性。


  在这个案例中，漏洞并非区块链技术本身固有的，而是多重签名钱包系统实现方式的问题。因此，开发者采用最佳安全实践并定期进行审计，以确保其平台的安全性至关重要。


  在为数不多的 NFT 因黑客攻击（而非诈骗或钓鱼攻击）而丢失的案例中，2021 年的 “Sturmer” 黑客事件就是其中之一。在这次攻击中，黑客从 `Nifty
  Gateway` NFT 市场盗走了价值超过 60 万美元的 NFT。然而，值得注意的是，黑客是利用网站认证系统的漏洞得手的，而非攻击区块链或相关的智能合约。


  为了降低风险并增强基于区块链系统的安全性，开发者和运营者应考虑以下措施：


  - **定期审计智能合约和平台代码**：对智能合约和平台代码进行全面审查，可以在漏洞被利用之前发现并解决它们。

  - **正确实现多重签名钱包和安全的授权机制**：多重签名钱包在正确实现和维护的情况下，通过要求多个签名来授权交易，可以提供额外的安全层。

  - **采用去中心化安全解决方案**：去中心化安全解决方案，例如去中心化自治组织（DAO），在某些情况下可以通过将控制和决策权分散到更大的参与者群体中来提高协议安全性。

  - **教育与意识提升**：确保特定生态系统中的所有参与者（从开发者到用户）都了解潜在的安全风险和最佳实践，有助于降低攻击成功的可能性。


  虽然 `Ronin Bridge` 被黑事件表明基于区块链的系统容易遭受安全漏洞的攻击，但请记住，这些事件是系统实现或管理中特定漏洞的结果，而非技术本身的固有缺陷。采用最佳安全实践并保持警惕，可以帮助开发者确保其基于区块链的平台保持安全并抵御攻击。


  安全问题暂且不谈，抗审查性是区块链（以及随之而来的 NFT）最受推崇的优势之一。这一流行特性的好处在游戏领域也并未被忽视。


  抗审查性促进了更公平、更开放、更民主的游戏者和开发者环境，这也推动了 NFT 在该行业的普及。去中心化是 NFT 的关键特征之一，也是更广泛的区块链技术的关键特征之一。


  与传统的中心化游戏平台（通常由游戏开发者这一单一实体对游戏资产和规则拥有巨大权力）不同，基于 NFT 的游戏将控制权分散到整个网络中。这种去中心化结构使得任何单一一方更难审查或操纵游戏内资产或经济，从而带来更公平、更透明的游戏体验。


  然而，要充分利用这项技术，需要开发者自身放弃对核心游戏的控制权。如果他们不这样做，那么特定游戏内资产的可用性就可能因游戏其他方面的更改而被削弱。但这带来了一个问题，因为如今的游戏开发者比过去游戏最终发布版本即是完整版的年代，更不愿意放弃对游戏的控制权。当今的游戏开发中，开发者常常快速发布游戏，然后打补丁并添加可下载内容（DLC），这迫使玩家不断接受其游戏的变更。现代游戏开发的这一事实限制了
  NFT 在这类环境中的实用性。


  抗审查性的另一个优势体现在 NFT 如何实现游戏内资产的真正数字所有权。玩家可以购买、出售或交易这些资产，而无需中心化机构的批准。这种无需审查或干预即可进行交易的自由，鼓励了游戏社区内更高水平的创造力和创新，例如通过模组或“创造即赚”类游戏，因为玩家拥有自主权，可以自行决定如何使用其资产并将其货币化。NFT
  的这一特性对于那些希望打造玩家驱动经济并赋权用户的游戏开发者来说尤其具有吸引力，因为这些玩家知道他们的创作不会被他人“审查”，甚至可以在封闭的游戏生态系统之外自由交易。




  ## 互操作性 与 变现能力


  NFT 有潜力在不同的游戏平台间，甚至跨不同游戏实现互操作性。这意味着，至少在理论上，玩家可以将基于 NFT 的游戏内资产从一个平台或游戏转移到另一个，而无需担心中心化机构施加的审查或限制。这是
  NFT 在游戏领域最常被提及的优势之一。在实践中，这需要游戏之间共享某种通用协议或网络，使其能够正确解读和情境化并非游戏原生的资产。


  这一特性有望通过培育一个更开放、更互联的生态系统来彻底改变游戏产业，进而鼓励游戏开发者采用 NFT 以保持竞争力并提供更佳的用户体验。目前已有项目致力于开发这些通用协议，索尼在
  2021 年 7 月也为相关的 NFT 技术提交了专利申请，这表明无论是初创企业家还是根深蒂固的行业巨头，都在积极构建这些解决方案。


  NFT 抗审查特性带来的另一项优势是赋予了玩家和游戏开发者更大的**表达自由**。NFT 的去中心化特性允许更丰富多样的游戏内资产和体验，因为创作者可以在无需担心中心化守门人审查的情况下开发内容。这又关联到“创造即收益”的概念，模组制作者和其他独立参与者可以通过为游戏环境制作物品来表达自我，并将其作为自我表达的一种形式与各自社区分享。


  这种自由可以带来更具创新性和多样化的游戏体验，吸引更广泛的受众，并培育一个更有活力、更具包容性的游戏社区。通过“虚拟形象皮肤”这一视角，我们可以观察到玩家和开发者何其重视自我表达。


  虚拟形象皮肤是独特且个性化游戏内资产的一个典型例子，近年来其需求激增。这些皮肤仅仅是对玩家虚拟角色的外观进行改动，对游戏玩法几乎没有任何影响，却因多种原因而大受欢迎。


  虚拟形象皮肤使玩家能够在游戏世界中表达自己的身份和风格。随着在线游戏社区的发展，玩家通常将虚拟形象视为自身个性的延伸。在元宇宙等在线环境中尤其如此，个体玩家在那里以接近现实生活互动的方式与数字世界进行交互。


  通过使用独特的皮肤来自定义虚拟角色，玩家能够展示自己的个性，并宣示自己的品味、偏好或所属群体。通过这样做，他们能在社区中与其他志同道合的玩家建立归属感和联系。


  这些皮肤也可以作为游戏社区内社会地位和成就的象征。


  某些皮肤只能通过游戏内成就、特殊推广活动或限时活动获得。拥有稀有或备受追捧的皮肤可以彰显玩家对游戏的投入、技巧或忠诚度。这种排他性常常助长了对独特虚拟形象皮肤的渴望，因为它们被视为玩家在社区中地位和声誉的体现。此外，对虚拟形象皮肤的需求与虚拟商品价值的增长直接相关。


  许多游戏都建立了市场，玩家可以在其中购买、出售或交易其游戏内资产，包括虚拟形象皮肤。随着 NFT 的引入，这些皮肤可以被代币化并在各种平台上交易，为玩家提供了将其资产变现的机会。


  潜在的盈利可能性，加上某些皮肤的稀有性和美学吸引力，进一步推动了对独特虚拟形象皮肤的需求。因此，NFT 的抗审查性和安全性特征与虚拟形象皮肤形成了天然的契合。这使得游戏对开发者和工作室更具吸引力，因为玩家在消费时可以确信，如果兴趣改变，他们能够转售自己宝贵的皮肤，或将其带到别处。


  NFT，乃至更广泛的区块链所提供的抗审查性，对游戏领域具有重大意义。NFT 提供的去中心化控制、真正的数字所有权、跨平台兼容性和表达自由，为玩家和开发者创造了一个更开放、更公平、更民主的环境。


  这两个群体都已认识到这一点，这也是推动游戏行业采用 NFT 的主要原因——它们提供了比传统中心化游戏平台更具吸引力和赋能效果的替代方案。即使是那些回避 NFT
  的开发者，通常也认同这项技术所支持的哲学理念；他们回避 NFT 是出于其他原因，这些原因必须通过其他方式解决。


  对于那些已采取措施在其产品中采用 NFT 的开发者来说，有两个主要的有利因素促进了这一过程：将游戏内资产代币化的能力，以及创建去中心化游戏生态系统的潜力。


  将游戏内资产（例如角色、武器或虚拟房地产）代币化，使得这些数字物品能够在区块链上转换为独特的、可交易的代币。这实现了可验证的所有权，并创造了在用户之间或跨不同游戏平台转移资产的能力。本质上，代币化提供了游戏行业此前无法实现的互操作性程度。


  这具有巨大的价值，尽管许多游戏开发者出于担心失去控制权或收入而刻意避免承认这一点。收入问题很容易解决，但控制权问题则是另一回事，因为如果开发者将 NFT 融入游戏，他们就必须发布或多或少完整的游戏，或者至少承诺在发布后不会改变太多内容。


  去中心化游戏生态系统为在游戏行业中利用 NFT 和区块链技术提供了深远的机会。虽然并非在所有情况下都理想，但利用去中心化自治组织、智能合约和去中心化应用可以预示一种新的游戏范式，即社区对游戏本身的发展和治理拥有直接影响力。社区运营的游戏和开发平台可以以前所未有的方式涌现。


  随着去中心化金融和元宇宙的引入，游戏平台可以进一步利用 NFT 的潜力。玩家现在可以参与去中心化金融活动，例如借贷和质押，并使用他们的游戏内资产作为抵押品。这种金融整合为游戏内资产增加了额外的价值层和实用性，使它们对玩家和开发者都更具吸引力。当然，这确实会在多个层面产生风险，这也是许多开发者不愿将区块链技术融入其游戏的原因之一，因为这会将不良行为者引入该领域并导致名声败坏。


  此外，元宇宙概念——一个超越单个游戏平台的相互连接的虚拟宇宙——为 NFT 在不同游戏和虚拟世界中的无缝集成创造了机会。通过实现游戏内资产和虚拟形象的可移植性，NFT
  可以促进玩家之间新的互动和协作形式，进一步加深他们与游戏世界的互动。




  ## 回顾


  随着`NFTs`在游戏行业中的采用率持续增长，我们可以预见基于`Web3`的游戏平台开发将加速。这些平台将充分利用区块链技术的潜力，为玩家和开发者提供更强的安全性、信任度以及创作自由。这为游戏行业的新纪元奠定了基础，其特点是去中心化技术的融合及其带来的无限可能性。


  对于玩家而言，`NFTs`的主要优势在于能够真正拥有、控制和变现其游戏内资产。传统游戏系统通常会限制游戏内物品的转移或资产在游戏环境外的变现。然而，借助`NFTs`，玩家可以在各种市场上交易或出售其独特的数字资产，从而利用他们在游戏中创造的价值。这种增强的控制权和所有权能带来对游戏生态体系更长期的投入和参与。


  玩家的另一个好处是有潜力通过使用基于`NFT`的游戏内资产来获得被动收入。如前所述，`DeFi`的集成允许玩家参与各种金融活动，例如质押或借贷，并将其`NFTs`作为抵押品。这种金融参与可以产生被动收入流，激励玩家持续参与游戏并积累有价值的资产。


  对于游戏开发者而言，使用`NFTs`和区块链技术可以带来新的收入来源并提高玩家留存率。通过将游戏内资产代币化并允许其在二级市场上销售，开发者可以从每笔交易中获得一定比例的收益，从而提供持续的收入来源。此外，将`DeFi`元素集成到游戏平台中可以为开发者创造新颖的金融机会，例如游戏内资产借贷或流动性挖矿。


  开发者的另一个优势是通过利用区块链技术来降低成本并提高效率。通过使用智能合约，开发者可以自动化游戏环境的各个方面，例如游戏内资产的创建、分发和管理。这种自动化可以降低运营成本，同时提高整个游戏生态系统的安全性和透明度。


  此外，使用`NFTs`有助于培养玩家之间的社区意识和忠诚度。当玩家对自身拥有的游戏内资产拥有既得利益时，他们更有可能在游戏世界中保持参与和活跃。这种增强的投入程度可以提高玩家留存率，并最终为开发者带来更高的收入。


  在游戏行业中采用`NFTs`和区块链技术，有望从多个方面改变行业格局。展望未来，由于这种融合，几个关键领域可能会经历重大的颠覆和创新。


  首先，跨平台游戏和互操作性的概念将变得越来越重要。随着`NFTs`能够在不同游戏平台和虚拟世界之间无缝转移游戏内资产，玩家将享受到更具凝聚力和互联性的体验。这种向统一游戏生态系统的转变将促进跨平台的协作与竞争，进一步推动行业的创新和创造力。


  其次，去中心化游戏平台和社区驱动开发模式的兴起将把游戏的创建和治理权力下放。玩家将有机会参与围绕游戏开发和更新的决策过程，从而打造一个更具包容性、以玩家为中心的游戏环境。这种玩家与开发者之间增强的协作将促进创新，并确保游戏能根据玩家的偏好和反馈持续发展演变。


  最后，`DeFi`元素的集成以及元宇宙的扩展将在游戏行业内带来新的经济机遇和商业模式。随着虚拟经济与现实世界经济的界限日益模糊，游戏平台将成为数字资产创建、交易和投资的中心。这种游戏与金融的融合将重新定义游戏格局，为玩家和开发者创造一个互联互通和价值创造的新时代。


  ## 总结


  在游戏行业中采用`NFTs`和区块链技术，为玩家和开发者都带来了众多机遇。随着这些技术日益深入地融入游戏世界的方方面面，我们可以预见，游戏生态系统将向一个更加去中心化、互联互通且经济活跃的模式发生范式转变，这种影响也将波及音乐等完全不同的领域。


