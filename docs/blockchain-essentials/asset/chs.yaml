  \ “23” 时，谜题被解开，生成了所需的哈希值 “0E93EC58”（图 2-6）。请尝试使用该工具，为同一笔交易生成一个具有不同前导零个数的解。\n\n![一个已解谜题的示例。它包括一组用于计算哈希值的输入及其带限制的相应输出。](img/604909_1_En_2_Fig6_HTML.jpg)\n\
  \n**图 2-6** 已解谜题\n\n![一个流程图展示了解决谜题的各种尝试。它展示了使用不同随机数计算交易哈希值以生成哈希值的过程。限制条件是哈希输出中有一个前导零。](img/604909_1_En_2_Fig5_HTML.jpg)\n\
