- '# 3.9.2 共识


  根据`中本聪`共识，所有参与者都同意遵循拥有最多累计`PoW`的最长有效链。这种共识机制保证了网络无需依赖中心化权威机构即可就交易顺序和有效性达成一致。如果多个矿工同时发现了有效区块，可能会发生临时分叉。然而，随着更多区块被添加到其中一个竞争分叉中，它会变得更长并最终超过其他分叉，从而形成一条被接受的单一区块链。


  `比特币`中的共识对于维护网络的安全性、不可篡改性和可信度至关重要。它使参与者能够就区块链的当前状态达成共识，并确保交易根据预定规则被接受或拒绝。


