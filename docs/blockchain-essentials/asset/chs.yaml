- "# 5. Hyperledger\n\n**关键词**：目的、历史、架构、链码、项目、联盟与网络、区块链即服务\n\nHyperledger 是一个专注于开发企业级区块链框架和工具的开源社区。它旨在使组织能够为不同行业构建和部署健壮、可扩展且安全的区块链解决方案。Hyperledger\
  \ 非常强调隐私、性能和互操作性，提供了一系列可定制的模块化平台以满足特定的业务需求。通过为开发者提供协作环境，Hyperledger 促进了创新并加速了区块链技术在企业界的采用。\n\
  \n## 5.1 Hyperledger 简介\n\nHyperledger 是一个隶属于 Linux 基金会的开源倡议，为开发与区块链技术相关的各种用例提供了强大的框架。根据\
  \ Hyperledger 执行董事 Brian Behlendorf 的说法，该组织可以被描述为拥有共同目标——在许多工业领域探索和实施区块链应用的社区集合。本节概述了使用\
  \ Hyperledger 的目的和益处。\n\n### 5.1.1 Hyperledger 的目的\n\nHyperledger 提供了一个强大且量身定制的区块链基础设施，以促进去中心化账本的创建和维护，确保增强的安全性和个性化功能。交易的保密性至关重要，尤其是在涉及敏感信息（如医疗数据）的情况下。与公有区块链相比，Hyperledger\
  \ 促进了交易参与者之间直接连接的建立，从而保证了匿名性和机密性。Hyperledger 发展过程中的重要里程碑如表 5-1 所示。\n\n**表 5-1**\n\
  Hyperledger 发展历史中的里程碑\n\n| 序号 | 里程碑 | 重要进展 |\n| --- | --- | --- |\n| 1 | Hyperledger\
  \ 的创立 | 在 Linux 基金会下创建 Hyperledger 项目，促进区块链技术的协作与创新 |\n| 2 | Hyperledger Fabric\
  \ 的引入 | 发布 Hyperledger Fabric，这是一个用于企业级区块链应用的模块化框架，具备智能合约和隐私通道 |\n| 3 | Hyperledger\
  \ Sawtooth 发布 | 发布 Hyperledger Sawtooth，引入了一个专注于简单性和模块化的独特共识算法框架 |\n| 4 | Hyperledger\
  \ Composer 贡献 | 贡献 Hyperledger Composer，提供了一种直观的方式来定义和部署区块链业务网络 |\n| 5 | 用于去中心化身份的\
  \ Hyperledger Indy | 引入 Hyperledger Indy，通过用于自主主权数字身份的工具和库来解决去中心化身份解决方案 |\n| 6 |\
  \ Hyperledger Burrow 与智能合约 | 纳入 Hyperledger Burrow，增加了对以太坊智能合约的支持以及现有以太坊工具的兼容性 |\n\
  | 7 | 用于基准测试的 Hyperledger Caliper | 引入 Hyperledger Caliper，一个用于测量和分析区块链性能的基准测试工具\
  \ |\n| 8 | Hyperledger Avalon 与 TEE | 开发了带有可信执行环境（`TEE`）的 Hyperledger Avalon，用于增强链下处理的隐私和安全性\
  \ |\n| 9 | Hyperledger 生态系统的扩展 | 通过各种项目和工具持续扩展 Hyperledger 生态系统，以满足多样化的用例和行业需求 |\n\
  | 10 | 持续协作与创新 | 以持续的协作、创新以及开发者、研究人员和行业领袖在 Hyperledger 社区中的积极参与为标志的历史 |\n\n\n\n\
  ## 5.2 Hyperledger 架构\n\nHyperledger 的架构被组织成三个不同的层级：基础设施层、框架层和工具层。这种分层结构建立了一个支持区块链解决方案开发的弹性生态系统。该架构设计包含一系列服务，旨在增强交易处理、共识流程和数据管理的安全性与效率。Hyperledger\
  \ 架构中的各项服务如图 5-1 所示。\n\n### 5.2.1 基础设施层\n\n基础设施层是整个系统架构中的一个关键组成部分。这个基础层包含了 Hyperledger\
  \ 生态系统的基本组件。前述技术作为创建、管理和实施区块链系统的基础框架。基础设施层涵盖了构成系统或网络基础的各种组件。\n\n![](img/604909_1_En_5_Fig1_HTML.jpg)\n\
  \n一张信息图展示了会员、账本、交易和链码下的各种操作。\n\n图 5-1 Hyperledger 架构中的各类服务\n\n- **共识层：** 该层作为平台的核心组件，执行处理交易所必需的商业逻辑。此机制的实施保证了交易和区块的精确性与恰当管理。\n\
  - **智能合约层（链码）：** 智能合约层，通常称为链码，是区块链技术的一个基础组件。在智能合约层中，通过执行链码函数内定义的商业逻辑来完成对交易请求的验证。交易状态得以以极其重要的方式进行处理和管理。\n\
  - **通信/协议层：** 在网络系统中，通信/协议层是一个必不可少的组件。其主要功能是监督不同设备之间的数据传输。该层通过对等通信协议促进网络元素之间的数据传输。它负责监督执行交易和维护共享账本所需的消息传输。\n\
  \n### 5.2.2 框架层\n\n框架层指的是作为特定应用或系统基础的概念结构。它包含了基本元素。框架层包含针对特定业务需求量身定制的区块链框架，这些框架有助于开发定制化的区块链应用。该平台提供了广泛的库和工具，用于开发适应各种使用场景的区块链解决方案。这一层由\
  \ Hyperledger Fabric、Hyperledger Indy、Hyperledger Iroha 和 Hyperledger Sawtooth 等框架构成。\n\
  \n### 5.2.3 工具层\n\n工具层包含了一系列加速器和实用工具，用于增强利用框架层构建的区块链应用的开发和管理。该平台提供了额外的功能和资源，以提高集成区块链技术的效率。\n\
  \n#### 附加组件\n\n- **数据层：** 数据层负责管理许多与数据相关的功能，包括但不限于增强交易、维护审计追踪，以及通过利用密码学技术安全地存储数据。区块链实例中的信任根得以建立。\n\
  - **身份服务层：** 身份服务层是整个系统架构中的一个关键组件。它监督管理会员注册服务，其主要目标是确保在各个网络节点上实施用于授权和验证会员访问的强大协议。\n\
  - **API 层：** 作为软件系统的一部分，应用编程接口层提供了一套协议和接口，用于促进与其他软件服务或组件的通信。该系统通过充当中介，提高了外部框架和工具的服务接口效能。在区块链网络上，它监督发送和接收请求与响应的同步通信。\n\
  - **策略服务层：** 策略服务层是系统架构内部的一个关键组件。该区块链平台确保了治理规则和企业策略的实施。\n\n## 5.3 Hyperledger 社区与开发\n\
  \n开源的 Hyperledger 开发社区由 Hyperledger 架构工作组管理。该工作组促进社区成员与架构师之间的协作，以开发生态系统并实施底层框架。共识机制对于区块链操作至关重要，它根据用例需求确定，并且在\
  \ Fabric、Indy、Iroha 和 Sawtooth 等 Hyperledger 项目中可能有所不同。\n\n## 5.4 Hyperledger 智能合约（链码）\n\
  \n链码，也称为智能合约，构成了 Hyperledger 架构中的一个关键组件。它管理交易状态和相关的业务处理功能。链码定义了交易如何被执行、处理和更新，在实现模块化和可扩展的区块链架构中发挥着关键作用。\n\
  \n凭借基于容器的架构，Hyperledger 确保了可扩展且高性能解决方案的部署。链码作为交易处理的核心实现，包含了逻辑执行、状态处理以及与用于应用处理的 API\
  \ 层的交互。\n\n## 5.5 Hyperledger 的运行机制\n\nHyperledger 通过应用程序来促进合约先决条件的建立。会员服务负责验证合约，而参与的对等节点生成相同的结果，这些结果被传输到共识云。经过验证过程后，与已连接对等节点相关联的账本会进行更新，从而确保机密性得到维护。这个方法可以通过一个实际例子来有效演示。\n\
  \n### 5.5.1 贡献者\n\n委员会负责将已验证的交易添加到指定的账本中，从而保证数据的精确性。\n\n### 5.5.2 背书者\n\n“背书者”这一称谓指的是特定个人或组织的公开支持者或推广者。通过模拟网络特有的交易，背书者降低了发生错误活动的可能性。他们在维护区块链完整性方面扮演着至关重要的角色。\n\
  \n### 5.5.3 同意者\n\n“同意者”一词指的是表示同意或批准的个人。交易验证过程涉及同意者通过将交易结果与其他参与者提供的信息进行交叉核对来确认交易结果，从而建立已正式提交的账本条目。所有这些角色如图\
  \ 5-2 所示。\n\n### 5.5.4 示例\n\n让我们借助算法 1 中给出的图示以及图 5-3 中的简化版来理解这一概念。\n\n\n\n### 5.5.5\
  \ Hyperledger 的优势\n\n`Hyperledger` 提供了众多优势，使其成为企业级应用的理想选择。\n\n- **灵活性**\n\n    `Hyperledger`\
  \ 提供了一个可修改且模块化的平台，能够根据企业的特定需求进行定制。\n\n    ![](img/604909_1_En_5_Fig2_HTML.jpg)\n\
