  \ is valid`。\n\n\n\n## 2.8 本章小结\n\n本章概述了哈希函数、安全哈希算法、默克尔树以及公钥密码学，重点介绍了它们在区块链技术中的应用。本章首先讨论了哈希函数的特性、在数据结构中的作用及其防篡改性。它强调了篡改哈希函数所涉及的计算挑战，这使得哈希函数非常适合维护数据完整性。本章还探讨了哈希函数在区块链技术中的作用以及确保数据不可变性的重要性。它介绍了安全哈希算法（`SHA`），并讨论了不同的哈希模式以增强安全性。此外，还引入了公钥密码学，解释了使用公钥和私钥进行加密和数字签名的原理。`SHA`作为一种广泛使用的密码学哈希函数被重点强调。本章也深入探讨了默克尔树，解释了其创建过程、结构以及在确保区块链数据完整性方面的作用。内容涵盖了默克尔树中的成员证明和非成员证明，并强调了默克尔树在区块链技术之外的优势和多种应用。讨论了使用默克尔树进行准备金证明，这有助于证明区块链系统中资金的存在。再次回顾了公钥密码学，特别聚焦于区块链技术背景下的数字签名。本章最后通过使用\
  \ Python 进行实验室工作练习，以实操方式实现所讨论的概念，包括生成哈希码、解谜、实现区块链、验证哈希属性、挖矿过程、创建默克尔树，以及在默克尔树区块链中证明成员/非成员身份。本章末尾还提供了代码解释以及使用\
  \ Python 演示 RSA 数字签名方案的实例。\n\n## 2.9 习题\n\n本节提供基于本章所涵盖主题的习题。\n\n### 2.9.1 选择题\n\n\
