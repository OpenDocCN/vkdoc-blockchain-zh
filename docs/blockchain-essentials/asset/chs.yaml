  \ `nonce_str` 和 `hash_value` 值。在 `solve_puzzle` 函数外部，代码提示用户输入一个字符串和所需的前导零数量，这些值分别存储在变量\
  \ `input_string` 和 `input_zeros` 中。随后，使用用户提供的输入调用 `solve_puzzle` 函数，并将结果值赋给 `nonce_value`\
  \ 和 `hash_result`。\n\n最后，代码打印出原始输入字符串、解决难题时使用的随机数值，以及生成的哈希值。通过执行此代码，您可以找到一个随机数值，当它与输入字符串结合时，能产生具有所需前导零数量的哈希值。\n\
