- "# 2. 区块链编程基础\n\n**关键词：** 密码学原语、哈希、安全 SHA、默克尔树、公钥密码学、数字签名、区块挖掘\n\n## 2.1 密码学原语\n\
  \n区块链技术建立在许多密码学原语之上。这些原语包括：\n\n- `哈希函数`\n- `SHA-256`\n- 谜题友好性\n\n### 2.1.1 哈希函数\n\
  \n哈希函数在连接区块链中的各个区块方面起着重要作用。哈希函数通常接受可变大小的输入，并产生固定长度的输出（在区块链中通常为 256 位），以十六进制表示法表示，称为哈希值或消息摘要。如果\
  \ `\"x\"` 是一个任意长度的输入，那么 `h(x)` 表示其哈希值。\n\n## 2.2 哈希函数\n\n哈希函数是一种数学函数，它接受任意大小的输入，并生成一个固定大小的输出，称为哈希值或消息摘要。哈希过程的一个简单示意图如图\
  \ 2-1 所示。\n\n哈希函数广泛应用于密码学和计算机科学，特别是在验证数据完整性和保护敏感信息方面。\n\n哈希函数接受任意长度的输入，并生成一个称为消息摘要的固定大小输出。哈希函数的输出通常是一个对输入数据唯一的字符串，并且输入的任何微小变化都会导致完全不同的哈希值。这个特性被称为雪崩效应，对于确保数据的完整性和安全性至关重要。\n\
  \n哈希函数用于多种应用，包括数字签名、密码验证、数据完整性验证以及在哈希表中索引数据。最常见的加密哈希函数是 `MD5`、`SHA-1`、`SHA-2` 和\
  \ `SHA-3`，其中 `SHA-256` 使用最广泛。\n\n![](img/604909_1_En_2_Fig1_HTML.jpg)\n\n该框图说明了哈希的过程。使用加密哈希函数将纯文本转换为哈希文本。\n\
  \n**图 2-1：** 哈希过程\n\n\n\n### 2.2.1 哈希函数的特性\n\n哈希函数具有几个基本特性，包括：\n\n- **确定性：** 给定相同的输入，哈希函数将始终产生相同的输出。这一特性对于验证数据完整性至关重要。\n\
  - **单向性：** 从计算角度来看，根据对应的哈希值推导出原始输入应该极其困难。这一特性使得哈希函数适用于密码哈希和数字签名等任务。\n- **固定输出：**\
  \ 无论输入大小如何，哈希函数都会生成固定大小的输出。这一特性使其能够有效地用于哈希表中的数据索引。\n- **雪崩效应：** 输入的微小改变应导致输出的显著变化。这一特性保证了即使数据发生细微变化，也会产生截然不同的哈希值。\n\
  - **抗碰撞性：** 从计算角度来看，找出两个产生相同哈希值的不同输入应该极不可能。这一特性确保了不同的数据元素会被一致地映射到不同的哈希值。\n- **不可逆性：**\
  \ 仅给定哈希值，从计算角度来看，推断出原始输入应该极其困难。这一特性确保了哈希函数在面对试图从哈希值逆向工程出原始输入的攻击时能保持安全。\n\n### 2.2.2\
  \ 哈希指针与数据结构\n\n哈希指针和数据结构在区块链技术的设计与实现中扮演着至关重要的角色。哈希指针本质上是对存储在区块链上数据的引用，它们是通过哈希函数与指向数据位置的指针结合而创建的，如图\
  \ 2-2 所示。\n\n在区块链中，每个区块通常包含一组交易以及一个指向前一个区块的哈希指针。这创建了一个区块链，每个区块包含前一个区块头数据的加密哈希，其中也包括哈希指针。这确保了任何对单个区块的篡改都能被立即检测到，因为这将导致所有后续区块的哈希指针失效。\n\
  \n![一个区块图展示了哈希指针。哈希指针作为对存储在区块链上数据的引用。每个区块通常包含一组交易以及一个指向链中前一个区块的哈希指针。](img/604909_1_En_2_Fig2_HTML.jpg)\n\
  \n**图 2-2** 哈希指针\n\n哈希指针也可用于在区块链中创建更复杂的数据结构，例如默克尔树。默克尔树是一种二叉树，其中每个叶节点代表一条数据，每个非叶节点代表其子节点的哈希。这创建了一个层级哈希结构，根哈希代表整个数据集。\n\
  \n区块链（如比特币）中的典型交易如下：\n\n![A -> B : 2 BTC](img/604909_1_En_2_Chapter_TeX_Equa.png)\n\
  \n![A -> C : 3 BTC](img/604909_1_En_2_Chapter_TeX_Equb.png)\n\n图 2-3 给出了使用在线工具¹\
  \ 获得的哈希值。\n\n由于生成的哈希值是唯一的，并且遵循密码学中的扩散和混淆原则，因此篡改哈希值极其困难。\n\n### 2.2.3 篡改在计算上具有挑战性\n\
  \n让我们看一个例子，说明为何在区块链中进行篡改在计算上具有挑战性。我们延续上一节的示例：\n\n![A -> B : 2 BTC](img/604909_1_En_2_Chapter_TeX_Equc.png)\n\
