  \n### 2.7.6 演示使用哈希码作为区块链接的简单区块链实现程序\n\n![](img/604909_1_En_2_Figaah_HTML.gif) 一个包含\
  \ 57 行 Python 代码的代码框，用于演示使用哈希码作为区块链接的简单区块链实现。步骤包括创建区块链并添加区块、检查区块链是否有效、篡改区块链以及检查篡改后的区块链是否有效。\n\
  \n#### 代码解释\n\n在这段代码中，我们定义了两个类：`Block` 和 `Blockchain`。`Block` 类代表区块链中的每个区块，而 `Blockchain`\
  \ 类则管理区块的链条。每个区块包含一个时间戳、数据（可以代表你想存储的任何信息）、一个哈希码，以及一个指向前一个区块哈希码的引用。哈希码是使用 SHA-256\
  \ 算法计算得出的，这是一种常用的密码学哈希函数。\n\n`Blockchain` 类初始化时会创建一个创世区块（链条中的第一个区块），并通过计算新区块的哈希码并将其链接到前一个区块的哈希码来添加新区块。`is_valid()`\
  \ 方法会遍历整个链条，检查哈希码和前一哈希码是否一致。\n\n该示例演示了向区块链中添加三个区块，然后检查区块链的有效性。随后，它修改了第二个区块的数据以引入不一致性，并再次检查有效性。\n\
  \n要运行区块链演示程序，请遵循以下步骤：\n\n1.  将代码保存到名为 `blockchain_demo.py` 的文件中。\n2.  打开命令提示符或终端，并导航到\
