  \n### 3.11.3 演示数字钱包部分功能的程序\n\n![](img/604909_1_En_3_Figaad_HTML.gif)\n\n此程序使用 `requests`\
  \ 库与 BlockCypher 提供的比特币区块链应用程序编程接口（API）进行交互。`check_balance()` 函数以一个比特币地址为输入，并检索该地址的余额。`view_history()`\
  \ 函数检索该地址的交易历史。`create_address()` 函数在钱包内创建一个新的比特币地址。`set_fees()` 函数为钱包设置交易手续费。\n\
