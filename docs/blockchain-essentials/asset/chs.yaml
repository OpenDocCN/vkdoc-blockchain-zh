  \ 51% 攻击的程序\n\n![](img/604909_1_En_3_Figaap_HTML.gif)\n\n在这个程序中，我们定义了一个 `Block`\
  \ 类，其中包含数据、前一个区块的哈希以及自身的哈希。然后，我们定义了一个 `Blockchain` 类，该类跟踪一个区块列表，并包含用于添加区块、验证链以及检查\
  \ 51% 攻击的函数。\n\n`validate_chain()` 函数遍历链中的每个区块，并检查哈希和前一个哈希是否有效。`get_chain_length()`\
  \ 函数返回链的长度，`get_chain_hashrate()` 函数计算链的总哈希率。\n\n`check_for_51_percent_attack()`\
  \ 函数检查链中是否有任何区块的哈希值大于链总哈希率的 51%。如果某个区块的哈希大于 51%，则该函数打印出区块编号并返回 `True`。如果没有区块的哈希大于\
  \ 51%，该函数会打印一条消息，表示未检测到 51% 攻击并返回 `False`。\n\n通过在有效的区块链上调用 `check_for_51_percent_attack()`\
  \ 函数，我们可以判断该区块链上是否发生了 51% 攻击。\n\n\n\n### 3.11.13 演示分叉概念的程序\n\n![](img/604909_1_En_3_Figaaq_HTML.gif)\n\
  \n在此程序中，我们定义了一个代表区块链中区块的 `Block` 类，以及一个代表区块链本身的 `Blockchain` 类。我们还定义了两个函数 `thread_1`\
  \ 和 `thread_2`，它们负责向区块链中添加区块。我们为每个函数创建一个线程，并启动它们。最后，我们等待两个线程执行完毕，并打印出区块链的内容。\n\n\
  当线程向区块链添加区块时，它们都使用同一个区块链实例，这意味着它们都在修改相同的数据结构。这类似于区块链中的分叉，即两组节点正在修改同一个区块链数据结构，从而可能产生两条不同的链。\n\
  \n当我们运行这个程序时，可以看到两个线程都会向区块链添加区块，但它们并不会产生两条不同的链。相反，这些区块按照确定的顺序被添加，最终的区块链包含了来自两个线程的所有区块，且顺序相同。这是因为\
  \ Python 的全局解释器锁（GIL）阻止了真正的并行执行，意味着同一时间只有一个线程能执行。在实际的区块链中，由于存在真正的并行性，可能会发生分叉，并且节点可能创建出不同的链。\n\
