  \ Knox 提供国防级安全防护。\n    *   仅限于三星设备，充电和使用方面存在某些限制。\n\n7.  **Venmo**\n    *   轻松转账和收款，同时支持在线购物。\n\
  \    *   很少收取佣金，并具有交互式社交功能。\n    *   仅在美国可用，即时转账收费，隐私设置有限。\n\n8.  **Zelle**\n  \
  \  *   免费应用，发送和收款简便快捷。\n    *   每个账户的资金保护上限为 `$250,000`。\n    *   不保护经批准的支付免受欺诈，错误转账需等待处理。\n\
  \n9.  **Walmart Pay**\n    *   可在 iOS 和 Android 设备上使用，具备多层安全防护。\n    *   以电子方式存储收据，并支持多种支付方式。\n\
  \    *   仅限于美国，且仅限沃尔玛门店使用。\n\n10. **Amazon Pay**\n    *   交易费用低，安全等级高。\n    *  \
  \ 注册流程简单，无月度服务费。\n    *   与商店集成可能需要时间；客户支持响应时间有限。\n\n## 3.5 数字密钥与地址\n\n从根本上说，数字凭证和地址是加密货币生态系统信任与安全的基础。私钥是严格保密的秘密，它使所有者能够控制其数字资产，而公钥及相关联的加密货币地址则促成透明且安全的交易，让用户能够放心收款。\n\
  \n### 3.5.1 私钥\n\n为了理解像比特币这类加密货币中私钥的概念，让我们解析所提供的信息并通过示例加以说明。\n\n私钥对于控制和保障与比特币地址相关的资金至关重要。它们是随机生成的数字，必须始终保密。向他人透露私钥将使其能够控制与该密钥关联的比特币。丢失私钥将导致其所保障的资金永久丢失。以下是生成私钥的逐步说明。\n\
  \n熵的生成：生成私钥的第一步是获取安全的熵源或随机源。这可以通过多种方法实现，例如使用操作系统提供的随机数生成器。例如，比特币软件利用操作系统的随机数生成器，该生成器可能由人为生成的随机性（例如鼠标移动）来初始化。\n\
  \n随机数选择：私钥可以是 `1` 到某个常数值（`n - 1`）之间的任意数字，其中 `n` 代表比特币中使用的椭圆曲线的阶。通常，会随机选择一个 `256`\
  \ 位的数字。选择过程包括选取一个 `256` 位的数字，并检查它是否小于 `n - 1`。这可以通过将一串更长的随机比特输入 `SHA256` 哈希算法来实现，该算法会生成一个\
  \ `256` 位的数字。如果结果在所需范围内，它就被视为一个合适的私钥。否则，将使用新的随机数重复该过程。\n\n密码学安全伪随机数生成：使用密码学安全伪随机数生成器（CSPRNG）来创建私钥至关重要。它应该有一个来自具有足够熵的源的种子。建议使用可靠且安全的随机数生成器库，以确保正确实现\
  \ CSPRNG。\n\n### 3.5.2 公钥\n\n为了理解椭圆曲线密码学（ECC）中公钥的概念，让我们解析所提供的信息，并通过示例、程序和图解加以说明。\n\
  \nECC 是一种基于离散对数问题的非对称或公钥密码学。在 ECC 中，公钥是通过椭圆曲线乘法从私钥推导出来的。让我们逐步了解这个过程。\n\n椭圆曲线定义：比特币使用一条名为\
  \ `secp256k1` 的特定椭圆曲线，由数学函数定义。该曲线定义在一个素数阶的有限域上。尽管由于有限域的性质很难可视化，但我们可以使用一个简化的示例来理解这一概念。\n\
  \n生成点：椭圆曲线上的一个预定点称为生成点（`G`），用于密钥生成。生成点对所有比特币用户都是相同的，并被定义为 `secp256k1` 标准的一部分。\n\n\
  私钥到公钥的计算：要生成公钥（`K`），需使用椭圆曲线乘法将私钥（`k`）乘以生成点（`G`）。所得的点 `K` 即为公钥。\n\n\n\n"
- '# 3.6 比特币地址


  比特币地址是用于发送和接收比特币的虚拟标识符。它们类似于用于发送和接收电子邮件的电子邮件地址。比特币地址通常由字母和数字组成，长度在 26 到 35 个字符之间。它们拥有私钥，能够实现地址间的交易。比特币地址有多种类型，包括隔离见证（SegWit）或
  Bech32 地址、传统地址或 P2PKH 地址、兼容性地址或 P2SH 地址，以及 Taproot 或 BC1P 地址。每种类型都有其自身的特性和优势。由于比特币地址是跨兼容的，因此可以在不同的地址类型之间发送比特币。但是，务必仔细核对收款地址，以免将比特币发送到错误地址。在进行大额交易前，先用少量比特币测试地址，有助于建立信心。找回发送到错误地址的比特币十分困难，但在某些情况下，联系地址所有者或使用
  `OP_RETURN` 功能可能会有所帮助。在发送比特币之前，务必验证地址以确保准确无误。


  #### P2PKH 或传统地址格式


  如果你的比特币地址以 `1` 开头，那么你使用的是 P2PKH 或传统地址，例如 `1BvBMSEYstWetqTFn5Au4m4GFg7xJaNVN2`。P2PKH
  代表 Pay-to-Pubkey Hash（支付到公钥哈希），即支付到收款人公钥的哈希值。传统地址不兼容 SegWit，但你仍然可以毫无问题地将比特币从 P2PKH
  地址发送到 SegWit 地址。然而，由于 P2PKH 地址的交易体积较大，其交易手续费通常也更高。


  #### P2SH 地址格式


  P2SH 地址的结构与 P2PKH 地址类似，但以 `3` 开头，例如 `3J98t1WpEZ73CNmQviecrnyiWrnqRhWNLy`。P2SH 代表
  Pay-to-Script Hash（支付到脚本哈希），其功能比传统地址更复杂。它通常用于多重签名地址，即需要多个数字签名才能授权一笔交易。P2SH 地址也通过
  P2WPKH-in-P2SH 用于非原生 SegWit 交易。对大多数用户而言，重要的是这种地址类型得到广泛支持，并且可以用于向 P2PKH 和 bech32
  地址发送资金。


  #### Bech32 地址格式


  Bech32 地址外观独特，以“bc1”开头，并且由于前缀的存在，比传统地址或 P2SH 地址更长。Bech32 是原生 SegWit 地址格式，受到大多数软件和硬件钱包的支持，但并未被所有交易所完全采用。尽管目前只有不到百分之一的比特币存储在
  bech32 地址中，但这个数字正在逐渐增加。


  #### 比特币现金地址格式


  比特币现金（BCH）地址可以采用传统格式（以 `1` 开头）或现金地址（Cash Addr）格式。现金地址格式基于 bech32，并以“q”或“bitcoincash:q”开头。BCH
  钱包可以同时支持这两种格式，允许用户在其中切换。使用现金地址格式的主要目的是为了区分 BCH 与 BTC（比特币），防止资金被发送到错误的地址。


  '
- '# 3.7 交易


  比特币的主要功能是促进交易。比特币的其他特性都是围绕实现交易的生成、广播、验证，并最终将其添加到全球交易数据库（区块链）而构建的。在比特币网络中，货币转账被编码为称为“交易”的数据结构。比特币的区块链是一个去中心化的全球数据库，充当全球复式记账系统，公开记录所有交易。


  ## 3.7.1 交易生命周期


  比特币交易的创建、验证和添加到区块链的过程涉及多个步骤，这些步骤构成了其生命周期。


  ### 3.7.1.1 创建与广播


  资金转移的过程始于由一方或多方创建并签署授权文件。交易被验证后，将在比特币网络上广播，网络中的每个节点负责验证交易并将其传播给其他节点。


  ### 3.7.1.2 验证与收录


  矿工节点检查交易并验证其合法性。交易验证通过后，会通过将其包含在由先前交易组成的区块中，进而添加到区块链。为了被永久记录并被所有参与者视为合法，后续的区块（即确认数）必须随之产生。当新所有者花费这些资金时，一个新的交易生命周期就可以开始了。


  ## 3.7.2 创建交易


  创建比特币交易的过程类似于填写纸质支票。在实际执行之前，该交易仅作为传达转账意图的工具，对金融系统不可见。与支票的情况类似，发起交易的人不一定是签署交易的人。


  任何人，无论是在线还是离线，都可以创建交易，即使是未经授权的签署人。例如，应付账款文员可以草拟比特币交易，然后由首席执行官批准。与支票不同，比特币交易不会指定某个特定账户作为资金来源。


  交易必须由原始资金的拥有者签署才能开始创建过程。一旦准备妥当并签署，交易即为有效，并包含执行资金转账所需的所有信息。最后一步是将有效交易广播到比特币网络并添加到公共账本中。


  ## 3.7.3 向比特币网络广播交易


  将比特币交易提交给网络可以确保它能被众多节点看到并添加到区块链中。数千个比特币节点需要接收一个大约 300–400 字节的小型数据结构，该结构代表一笔交易。


  只要使用多个节点来确保传播，发送者就无需信任用于广播的节点。由于交易已签名且不包含任何私人信息，节点也不需要信任发送者的身份。与需要加密网络的信用卡交易不同，比特币交易可以通过任何合适的网络传输技术公开广播。


  WiFi、蓝牙、近场通信、条码、网页表单，甚至更非常规的方式如分组无线电和卫星中继，都可以用来广播比特币交易。由于比特币的去中心化结构，交易可以通过多种不同的渠道完成，这使得阻止其创建和完成变得极其困难。


  ## 3.7.4 在比特币网络上传播交易


  当一笔比特币交易被提交给比特币网络上的一个节点时，该节点负责验证交易的合法性。如果交易是真实的，该节点会将其转发给网络中的其他节点，并向发送者发回交易成功的信号。如果交易无效，该节点会向发送者发回一条拒绝消息。


  比特币网络中的每个节点在网络首次启动时，都会与多个其他节点建立连接。由于网络呈去中心化、无拓扑结构的网状形态，网络上的所有节点地位平等。通过一种称为“泛洪”的技术，交易从一个中心节点广播到与其通信的所有对等节点。一旦交易被网络处理并接受，它将以指数级方式扩散到每个节点。


  比特币网络旨在快速可靠地传播交易和区块，同时防御垃圾邮件、拒绝服务攻击和其他潜在问题。每个节点都独立检查交易，这能阻止恶意交易的扩散范围超过单个节点。




  ### 3.7.5 交易的数据结构


  交易是一种数据结构，它编码了从称为输入的 funds 来源到称为输出的目的地的价值转移。交易输入和输出与账户或身份无关。相反，你应该将它们视为被特定秘密锁定的比特币数量——比特币碎片，只有所有者或知道秘密的人才能解锁。


  交易的结构由几个字段组成，如表 3-2 所示。


  `Version` 字段指定了此交易遵循的规则。`Input Counter` 字段表示交易中包含的输入数量，而 `Input` 字段包含一个或多个交易输入。


  类似地，`Output Counter` 字段表示包含的输出数量，`Output` 字段包含一个或多个交易输出。


  最后，`Lock Time` 字段表示一个 Unix 时间戳或区块号，它作为交易被添加到区块链之前必须满足的条件。


  **表 3-2** 比特币交易结构


  | 字段 | 描述 |

  | --- | --- |

  | Version | 交易版本号 |

  | Input Counter | 交易中输入的数量 |

  | Input 1 | 第一个输入的详细信息 |

  | Input 2 | 第二个输入的详细信息 |

  | … | … |

  | Output Counter | 交易中输出的数量 |

  | Output 1 | 第一个输出的详细信息 |

  | Output 2 | 第二个输出的详细信息 |

  | … | … |

  | Lock Time | 交易锁定时间 |


  ### 3.7.6 交易类型


  比特币系统中不同类型的交易具有不同的功能和特性。一些典型的业务交易如下：


  #### 3.7.6.1 标准交易


  标准交易涉及双方之间简单的价值交换。它由引用先前交易输出作为资金来源的输入，以及将转移的价值分配给新接收者的输出组成。


  #### 3.7.6.2 多重签名交易


  多重签名交易需要在花费资金之前获得多方批准。多个公钥，通常属于不同的个人或实体，被用作交易的输入。通常，交易的输出随后会用脚本锁定，该脚本指定花费这些资金所需的签名数量。


  #### 3.7.6.3 隔离见证交易


  隔离见证是比特币协议的一次升级，它将交易签名数据（见证数据）与实际交易数据分离开来。隔离见证交易具有独特的结构，并使用独特的交易格式，从而能够提高交易容量和增强可扩展性。


  #### 3.7.6.4 Coinbase 交易


  隔离见证协议增强将交易签名数据（见证数据）从交易数据本身中分离出来。隔离见证交易具有独特的结构，并使用不同的交易格式，从而能够提高交易容量和增强可扩展性。


  #### 3.7.6.5 支持锁定时间的交易


  锁定时间允许交易的发送者指定交易生效的未来时间或区块高度。支持锁定时间的交易适用于多种用例，包括创建时间锁定交易、实现条件性支付，以及创建类似闪电网络的支付通道。


  ### 3.7.7 交易输入与输出


  未花费的交易输出（UTXO）是比特币交易的基础构建块。UTXO 是比特币的不可变单位，它们被锁定给特定的所有者，记录在区块链上，并被整个网络识别为货币单位。比特币网络跟踪数百万个可用的（未花费的）UTXO。每当用户收到比特币时，其数量都会作为
  UTXO 记录在区块链中。因此，用户的比特币可能作为 UTXO 分散在数百笔交易和数百个区块中。实际上，并不存在所谓的比特币地址或账户余额；只有分散的 UTXO
  被锁定给特定的所有者。钱包应用程序生成了用户比特币余额的概念。钱包通过在区块链中搜索并汇总用户的所有 UTXO 来计算用户的余额。


  比特币可以分割为聪（satoshis）的倍数，以便于人们进行比特币交易，同时使其可读。一旦创建，UTXO 必须被整体消耗并生成找零。例如，一笔包含一个 *20*
  比特币 UTXO 的交易将消耗整个 *20* 比特币 UTXO，并产生两个输出：支付 *1* 比特币给接收方，并将 *19* 比特币找零返回给钱包。大多数比特币交易都会产生找零。用户的钱包应用程序会自动从其可用的
  UTXO 中选择各种单位，以组合出等于或大于期望交易金额的数量。


  钱包应用程序可以使用组合较小单位、寻找精确找零，或使用大于交易价值的单一单位并产生找零等策略。这种可花费 UTXO 的复杂组合由用户的钱包完成，对用户是不可见的。交易输入是被交易消耗的
  UTXO，而输出是由交易创建的 UTXO。这种消耗和创建 UTXO 的交易链将比特币价值块从所有者转移到所有者，产生找零并确保数字货币的稳定性。


  ## 3.8 数字签名


  比特币使用椭圆曲线数字签名算法（ECDSA）来实现数字签名。ECDSA 是一种基于椭圆曲线的密码算法，可提供安全的数字签名。发送者在创建比特币交易时，使用其私钥为交易数据生成数字签名。此签名作为证据，证明私钥的所有者授权了该交易。ECDSA
  通过利用椭圆曲线的数学特性来保证交易的完整性和真实性。除 ECDSA 外，比特币还使用了 SIGHASH（签名哈希）功能。SIGHASH 用于指定数字签名涵盖交易的哪些方面。它允许签名者选择他们授权交易的哪些部分，以及哪些部分可以在不使签名失效的情况下被更改。通过指定特定的
  SIGHASH 类型，签名者可以决定签名是否包含整个交易、特定输入或特定输出。这种灵活性使得更复杂的交易方案成为可能，例如需要多个签名的交易或带有附加条件的交易。比特币将
  ECDSA 和 SIGHASH 结合使用，确保了整个网络中数字签名的安全性、真实性和适应性。它使参与者能够使用他们的私钥安全地授权交易，同时保持对交易各个组成部分的控制。


  ## 3.9 比特币的挖矿与共识


  挖矿和共识是比特币网络的基本组成部分，在维护系统的安全性、完整性和去中心化特性方面发挥着至关重要的作用。以下是比特币挖矿与共识的概述。




  '
- '# 3.9.1 挖矿


  `挖矿`是通过解决复杂的数学谜题来向区块链添加新交易并保障网络安全的流程。网络参与者（称为`矿工`）会竞相破解一种名为`工作量证明`（`PoW`）的密码学难题。


  `矿工`将有效交易收集到区块中，然后对包含前一个区块引用的区块数据应用数学函数（`哈希运算`）。他们会修改一小段称为`随机数`的数据，直到找到一个满足特定条件（例如具有特定数量的前导零）的哈希值。这需要大量的计算能力和能源。


  第一个发现满足条件的有效哈希值的矿工，会将这个新挖出的区块广播到网络。随后，其他矿工会验证该区块中交易的有效性。如果就区块有效达成共识，它就会被添加到区块链中，而该矿工将获得新铸造的`比特币`以及区块内包含的交易手续费作为奖励。


  `比特币`挖矿主要有以下两个目的：


  **交易验证：** 矿工通过验证新块并将有效交易纳入其中，确保`比特币`账本的完整性和准确性。


  **区块链安全：** 作为一种安全机制，挖矿所需的计算工作（`PoW`）充当了安全措施。`比特币`共识是指网络参与者就区块链状态和交易合法性达成的一致。以`比特币`匿名发明者`中本聪`命名的`中本聪`共识，是`比特币`所采用的共识机制。`中本聪`共识是通过多数矿工达成一致来实现。矿工共同决定哪条链被视为“最长”，因此也是合法的。这由累计`PoW`最多的链决定，这表示在其创建过程中投入了最大的计算工作。


  这使得恶意行为者操纵区块链变得极其困难和消耗资源。


