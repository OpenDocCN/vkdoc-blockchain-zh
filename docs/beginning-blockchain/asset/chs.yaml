  表 3-2


  区块头组成


  | 字段 | 大小 | 描述 |

  | --- | --- | --- |

  | 版本号 | 4 字节 | 表示比特币协议的版本号。理想情况下，运行比特币协议的每个节点都应具有相同的版本号。 |

  | 前一个区块哈希值 | 32 字节 | 包含链中前一个区块头的哈希值。当前一个区块头中的所有字段合并并使用 `SHA256` 算法进行哈希处理后，会产生一个
  256 位（即 32 字节）的结果。 |

  | 默克尔根 | 32 字节 | 区块中交易的哈希值按设计构成一棵默克尔树，默克尔根就是这棵默克尔树的根哈希值。如果区块中的一笔交易被修改，那么计算出的结果将与默克尔根不匹配。这种方式确保了仅保存前一个区块头的哈希值就足以维护安全的区块链。此外，默克尔树有助于在
  `O(n)` 时间内判断一笔交易是否属于某个区块，并且速度相当快！ |

  | 时间戳 | 4 字节 | 比特币网络中不存在全局时间概念。因此，该字段以 Unix 时间格式表示区块创建的近似时间。 |

  | 难度目标 | 4 字节 | 该区块被挖出时为其设定的工作量证明（PoW）难度级别。 |

  | 随机数 | 4 字节 | 挖矿过程中满足工作量证明（PoW）难题的随机数。 |


