  ## 比特币网络


  如前所述，比特币网络是一个点对点网络。在此类系统中，没有中心化服务器，每个节点都受到平等对待。在这样的系统中，没有主从现象，也没有层级结构。由于它运行在互联网上，因此使用了相同的
  TCP/IP 协议栈，如图 3-9 所示。


  ![A440588_1_En_3_Fig9_HTML.jpg](img/A440588_1_En_3_Fig9_HTML.jpg)


  **图 3-9** 互联网上的比特币区块链网络


  上图显示了比特币网络如何在相同的互联网协议栈上共存。比特币网络是高度动态的，节点可以随意加入和离开网络，系统仍然可以工作。此外，尽管比特币网络本质上是异步的，并且存在网络延迟和数据包丢失，但该系统非常稳健——这要归功于比特币的设计！


  比特币网络是一个去中心化网络，没有单点故障，也没有中央权威机构。采用这种设计，你将如何评估比特币网络的规模？由于节点可以随意加入和离开，因此没有恰当的方法来估算。然而，人们尝试对比特币网络进行研究，一些人声称网络中始终有接近
  10,000 个节点保持连接，同时可能有数百万个节点在运行。


  比特币网络中的每个节点在权限上是平等的，并且具有扁平结构，但节点可以是全节点或轻量级节点。全节点几乎可以执行比特币系统中的所有允许活动，例如挖掘交易和广播交易，并且可以提供钱包服务。全节点还提供路由功能，以参与和维护比特币网络。要成为全节点，你必须下载包含迄今为止发生的所有交易的整个区块链数据库。此外，该节点必须永久连接到比特币网络并监听所有发生的交易。拥有良好的网络连接、良好的存储空间（至少
  200GB）以及至少 2GB 的专用 RAM 非常重要。随着时间的推移，此要求可能会进一步变化，并需要更多资源。


  另一方面，轻量级节点无法挖掘新区块，但可以通过使用简化支付验证来验证交易。它们也被称为“瘦客户端”。比特币网络中的绝大多数节点都是 SPV 节点。它们也可以参与矿池挖矿，其中有许多节点共同尝试挖掘新区块。轻量级节点可以帮助全节点验证交易。SPV
  的一个很好的例子是钱包（客户端）。如果你正在运行一个钱包，并且有人向你汇款，你可以作为比特币网络中的一个节点，下载与你相关的交易，以便你可以检查向你发送比特币的人是否确实拥有它们。


  需要注意的是，SPV 的安全性不如完全验证节点，因为它通常只包含区块头，而不是整个区块。因此，SPV 无法验证交易，因为它没有某个区块的交易记录，而且除了自己的交易外，它也没有所有未花费的交易输出。




  ### 新节点的网络发现


  现在思考一下，当一个新节点想要加入网络时，它是如何联系到该网络的？它并不是一个 `192.168.1.X` 这样的内网，你可以向 IP `192.168.1.255`
  广播，让 `192.168.1.X` 网络内的所有计算机都能收到广播消息。网络交换机被设计为允许此类广播数据包。但请记住，我们谈论的是互联网，而比特币正运行于其上。如果你在伦敦运行一个节点，那么很有可能在伦敦、俄罗斯、爱尔兰、美国和印度还有其他节点，它们都通过互联网使用公共
  IP 地址连接在一起。


  这里的问题是，当一个全新节点加入网络时，它如何找出对等节点？并没有一个中心服务器像典型的基于互联网的 Web 应用那样来响应它们的请求。区块链是去中心化的，还记得吗？首次启动时，Bitcoin
  Core 或 BitcoinJ 程序没有任何全节点的 IP 地址。因此，它们配备了多种方法来寻找对等节点。其中一种方法是 DNS 种子。多个 DNS 种子被硬编码在其中。此外，DNS
  系统中还维护着几个主机名，这些主机名解析为一组运行比特币节点的 IP 地址列表。DNS 种子由比特币社区成员维护。一些社区成员通过手动输入 IP 地址和端口号来提供静态
  DNS 种子。同时，一些社区成员提供动态 DNS 种子服务器，这些服务器可以自动获取在默认比特币端口（主网为`8333`，测试网为`18333`）上运行的活动比特币节点的
  IP 地址。如果你对 DNS 种子执行 `NSLOOKUP` 查询，你会得到一堆运行比特币节点的 IP 地址。


  客户端（Bitcoin Core 或 BitcoinJ）也维护着一个硬编码的 IP 地址列表，这些地址指向一些（不是单个！）稳定的比特币节点。这类节点可以称为引导节点，其端点已经包含在源代码中。每次下载二进制文件时，都会随二进制文件一起下载一份最新的活动节点列表。一旦建立了比特币节点连接，就很容易拉取当前时间点活跃的其他比特币节点列表。新节点如何成为网络一部分的图示，可以在下图中找到。


  #### 第一步：

  假设在某个时间点，比特币网络中有六个活跃节点。请参考图 3-10。


  ![A440588_1_En_3_Fig10_HTML.jpg](img/A440588_1_En_3_Fig10_HTML.jpg)


  **图 3-10** – 通用比特币网络


  #### 第二步：

  有一个新节点，假设是第七个节点，它刚刚出现并试图加入现有的比特币网络，但尚未建立任何连接。请参考图 3-11。


  ![A440588_1_En_3_Fig11_HTML.jpg](img/A440588_1_En_3_Fig11_HTML.jpg)


  **图 3-11** – 尝试加入网络的新节点


  #### 第三步：

  第七个节点将尝试联系尽可能多的节点，要么使用 DNS 种子，要么使用其列表中已有的稳定比特币节点列表——如图 3-12 所示。


  ![A440588_1_En_3_Fig12_HTML.jpg](img/A440588_1_En_3_Fig12_HTML.jpg)


  **图 3-12** – 新比特币节点联系一些对等节点


  在图中，我们跳过了 DNS 解析部分。这与你在浏览器中输入网站名称、DNS 解析后获取 IP 地址的过程相同，该 IP 地址随后被用作目标 Web 服务器的地址，用于发送
  TCP 数据包。为了连接到一个新的对等节点，该节点会在端口 `8333` 上建立一个 TCP 连接（端口 `8333` 是比特币的知名端口，但也可能不同）。然后，两个节点通过交换版本号、时间、IP
  地址、区块链高度等信息进行握手。在 `net.cpp` 中定义的 “Version” 消息的实际比特币代码如下：


  ```

  PushMessage( "version", PROTOCOL_VERSION, nLocalServices, nTime, addrYou, addrMe,

  nLocalHostNonce, FormatSubVersion(CLIENT_NAME, CLIENT_VERSION,

  std::vector<string>()), nBestHeight, true );

  ```


  通过这条 `Version` 消息，会检查两个节点之间的兼容性，这是进一步通信的第一步。


  #### 第四步：

  在第四步中，被请求的节点将以其所知的其他活跃比特币节点的 IP 地址和对应端口号列表作为响应。请注意，某些活跃节点可能在任何时候都不知道网络中的每一个比特币节点。端口号很重要，因为一旦
  TCP 数据包到达目标节点，操作系统就会使用端口号将消息定向到系统上运行的正确应用程序或进程。请参考图 3-13。


  ![A440588_1_En_3_Fig13_HTML.jpg](img/A440588_1_En_3_Fig13_HTML.jpg)


  **图 3-13** – 对等比特币节点响应新节点的网络请求


  请注意，可能只需要一个对等节点就足以引导节点连接到比特币网络；但节点必须继续发现并连接新的对等节点。这是因为节点随时可能加入或离开，没有哪个连接是可靠的。


  #### 第五步：

  在第五步中，新的第七个节点会根据从上一步骤中联系到的节点那里收到的列表，与所有可到达的比特币节点建立连接。图 3-14 展示了这一过程。


  ![A440588_1_En_3_Fig14_HTML.jpg](img/A440588_1_En_3_Fig14_HTML.jpg)


  **图 3-14** – 新节点成为比特币网络的一部分




  ### 比特币交易


  比特币交易是比特币系统的基本构建模块。比特币交易大致可分为两大类：


  - **Coinbase 交易（铸币交易）**：比特币区块链中的每个区块都包含一笔由矿工自己打包的 Coinbase 交易，用于开采新币。矿工无法控制每个区块能挖到多少新币，因为这一数量由网络本身控制。初始时每区块奖励为
  50 BTC，此后每 210,000 个区块减半一次，直至比特币总量达到 2100 万枚。

  - **普通交易**：普通交易与一般的货币兑换非常相似，即某人试图将自己拥有的部分金额转移给他人。在比特币中，一切都以交易形式呈现。要花费一定金额，必须消耗其先前收到该金额的交易——这些就是比特币中的普通交易。本章将重点讨论这类普通交易。


  每个比特币持有者可以通过对之前收到比特币的交易哈希（与接收者的公钥一起）进行数字签名，将币转移给他人。收款方或接收者已经拥有付款方的公钥，因此他们可以验证交易。下图（图
  3-15）来自中本聪的白皮书，直观地展示了这一过程。


  ![A440588_1_En_3_Fig15_HTML.jpg](img/A440588_1_En_3_Fig15_HTML.jpg)


  **图 3-15** 比特币交易


  请注意图中高亮显示的 **Owner-2**（所有者 2）部分。由于 **Owner-1**（所有者 1）正在发起这笔交易，他使用自己的私钥对两项内容的哈希进行签名：一是他自己先前收到金额的那笔交易，二是
  **Owner-2** 的公钥。该签名可以很容易地使用 **Owner-1** 的公钥进行验证，以确保这是一笔合法交易。类似地，当 **Owner-2** 要向
  **Owner-3** 发起转账时，他会使用自己的私钥对先前交易（即他从 **Owner-1** 收到的那笔）的哈希以及 **Owner-3** 的公钥进行签名。网络中任何节点都可以并且将会验证这类交易。显然，由于每笔交易都会被广播，大多数节点都拥有完整的交易历史，从而能够防止双重支付尝试。


  比特币网络中没有"期末余额"的概念，一个人持有的总金额是其拥有的所有公开地址收到的全部传入交易的总和。你可以创建任意数量的公开地址。如果你有十个公开地址，那么无论哪些交易发送到这些地址，你都可以使用自己的私钥来花费这些交易（即未花费的交易，或
  `UTXO`）。假设你需要花费 5 个比特币，那么你有以下几种选择：


  - 使用之前收到 5 个或更多比特币的其中一笔交易。向接收者转移 5 个比特币，支付一定数额作为交易费，剩余部分转回给自己。参见图 3-16。


  ![A440588_1_En_3_Fig16_HTML.jpg](img/A440588_1_En_3_Fig16_HTML.jpg)


  **图 3-16** 单笔交易输入的比特币交易


  - 使用你收到的多笔先前交易，这些交易金额总和超过 5 个比特币。向接收者转移 5 个比特币，支付一定数额作为交易费，剩余部分转回给自己。参见图 3-17。


  ![A440588_1_En_3_Fig17_HTML.jpg](img/A440588_1_En_3_Fig17_HTML.jpg)


  **图 3-17** 多笔交易输入的比特币交易


  如你所见，每笔交易都以之前的某笔（或多笔）交易作为输入。系统不会维护一个账户说"你有 8 BTC，你可以花费不超过这个金额的任何数额"；如果你花费 5 BTC，剩余余额就是
  3 BTC。在比特币中，一切皆为交易，交易有输入和输出。如果某笔输出尚未被花费，该输出就是 `UTXO`。


  我们知道，网络中的每笔交易都会被广播到整个网络。无论某人是否运行节点，他们都可以发起一笔交易，该交易会被发布到所有可访问的比特币节点。接收比特币的节点会进一步将交易广播给其他节点，整个网络通常会被交易信息"淹没"。这种机制有时被称为**八卦协议（Gossip
  Protocol）**，它在防止双重支付攻击中起着重要作用。回顾第 2 章内容，防止双重支付的唯一方法就是了解所有交易。


  每个节点都会维护一个其所听闻的所有交易的集合，并且只广播那些尚未在列表中的新交易。节点会一直保留这些交易，直到该交易被打包进区块并成为区块链的一部分。这是因为，即使某个区块包含所有有效交易并被提议为有效区块，它仍可能因未成为最长链的一部分而被孤立。一旦确认该区块已成为最长链的一部分，该区块中的交易便会从交易列表中移除。比特币网络中的每个全节点都必须维护整个未花费交易列表（`UTXO`），即使它们数量高达数百万。如果某笔交易存在于
  `UTXO` 列表中，那么它就不太可能是双重支付尝试。在确认某笔交易不是双重支付攻击，并从其他角度验证交易有效后，节点会广播该交易。如果你在想，在数百万个 `UTXO`
  中搜索以检查双重支付会有多快——你问对方向了。由于交易输出按其哈希值排序，在有序的哈希列表中搜索条目是非常快的。


  现在，让我们深入思考并探索双重支付场景。完全有可能出现 Alice (A) 试图用同一笔交易同时支付给 Bob (B) 和 Charlie (C) 的情况（交易的输入是一笔前序交易，不存在期末余额的概念）。这种场景如图
  3-18 所示。


  ![A440588_1_En_3_Fig18_HTML.jpg](img/A440588_1_En_3_Fig18_HTML.jpg)


  **图 3-18** 比特币网络中的双重支付交易场景


  请注意图中所示的以下情况：


  - A 试图将同一笔交易同时支付给 B 和 C。

  - 节点 2 收到了交易 `A Tx(1234) --> B`，节点 3 收到了交易 `A Tx(1234) --> C`。

  - 对于节点 2 和节点 3，各自收到的交易都是合法的。

  - 当节点 3 试图将交易 `A Tx(1234) --> C` 广播给节点 2 时（每个节点都会广播新交易），节点 2 会拒绝此交易，因为它已经拥有一个具有相同输入交易
  `Tx(1234)` 的交易 `A Tx(1234) --> B`。

  - 其他节点也会发生类似情况，它们要么持有交易 `A Tx(1234) --> B`，要么持有交易 `A Tx(1234) --> C`，具体取决于哪个交易先到达它们，但不会同时持有两者。

  - 在挖矿过程中，无论哪个节点获得提议区块的权利，都会将其持有的交易包含在内。这笔交易将成为区块链的一部分，而其他持有另一笔交易的节点则会直接丢弃涉及 `Tx(1234)`
  的交易，因为它将不再是 `UTXO`。




  ### 共识与区块挖矿


  在上一节中，我们研究了细粒度的交易。接下来，我们将学习交易如何被打包成一个区块，以及节点之间如何达成共识，使得整个网络接受该区块以扩展区块链。请注意，“区块挖矿”指的是在区块链中成功创建一个新区块。在比特币中，正是分布式的
  PoW（工作量证明）共识算法，通过维持去中心化来帮助挖出新区块。在这样的网络中达成分布式共识是非常困难的。尽管该术语在 Facebook、Google、Amazon
  等分布式系统中已存在数十年（因为它们拥有数百万台服务器，需要保证所存储数据的一致性），但共识一词很大程度上是因比特币而广为人知的。本章我们将深入探讨共识与挖矿的具体细节。


  首先，请记住：比特币网络中的一切都是以交易形式呈现的。如果你想发起一笔交易，你必须消耗一个或多个之前的交易作为输入，并生成另一笔交易。我们已经知道，用户必须使用自己的私钥对交易进行签名，以确保交易是由合法用户发起的。然而，尽管有这种密码学安全保障，用户难道不能重复花费一笔已经用过的交易吗？例如：爱丽丝在一笔交易编号为`1234`的交易中收到了
  10 枚比特币。她完全可以再次使用同一笔交易`1234`，将这 10 枚比特币分别转给鲍勃和查理。因为她会用自己的私钥签名，这意味着这是一笔合法的交易，那么你认为什么能阻止她进行双重支付呢？请注意，在比特币中，你无法阻止她尝试双重支付，但系统的设计会使得这种尝试无法成功。阻止这类尝试的唯一方法是知晓所有正在发生的交易。这就是为什么比特币中的所有交易都会广播到整个网络。一旦一笔交易被花费，它就不再属于
  UTXO（未花费交易输出）集合，并会生成一个新的交易编号成为 UTXO 的一部分，且只有接收方才能花费它。这就是节点验证交易的方式。


  另外，防止双重支付攻击的唯一方法就是知晓所有交易。当你了解所有交易时，你就能知道哪些已被花费以及哪些是 UTXO。当一个矿工提议一个新区块时，要求该区块内的所有交易都是有效的。这是否意味着提议区块的节点不能包含无效交易？答案是“可以”。它们确实可以注入欺诈性交易，但其他节点会拒绝该区块。该节点为完成
  PoW（我们稍后会详细讲解）所消耗的算力和电力将付诸东流！因此，得益于 PoW 共识，节点绝不会想提议一个无效区块。尽管没有全局时间的概念，但请注意，交易被组合成一个区块并成为区块链的一部分，更多的区块一个接一个地被添加到链上，这便有了顺序！需要仔细注意：区块链保留了交易发生的顺序。这样一来，共识在区块层面达成，并一直传递到细粒度的交易层面。


  基于我们目前的理解，现在我们知道比特币网络中的每个节点都有自己的区块链副本，并不存在所谓的“全局区块链”；毕竟它是一个去中心化网络。每个节点的区块链副本中都包含许多交易。同样正确的是，每个节点都维护着一个
  UTXO 列表，当获得机会（节点会被随机选中——我们后面会看到具体方式）提议一个区块时，它们会尽可能多地包含交易，直到达到 1MB 或 2MB 的区块上限。如果该区块成功加入区块链，这些交易就会从
  UTXO 列表中移除。这里需要注意的是，每个节点可能拥有不同的未确认交易列表，因为某些交易可能没有被部分节点接收到。


  现在该看看 PoW 算法是如何实际运作的了。我们之前了解过每个区块头部中的难度目标字段。每个挖矿节点都试图解决这个密码学难题，期望能幸运地成功并提议一个区块。它们如此急切地想要提议区块，是因为一旦它们提议的区块成为区块链的一部分，就能获得巨大的收益。每个人在发起交易时，都可以预留一部分交易费用给矿工。我们知道，所有节点都维护着一个尚未纳入区块链的交易列表，当它们获得提议区块的机会时，会尽可能多地选取交易来组成一个区块。显然，它们会选择所有能带来最高收益的交易，而留下那些手续费很少或没有手续费的交易。那些低手续费的交易可能需要一段时间才能被纳入区块，而完全没有手续费的交易机会则更小。除了交易费用之外，提议新区块的节点还会获得新比特币作为奖励。每成功挖出一个区块，就会产生新的比特币，并且提议该区块的矿工会获得所有这些新币；这是在比特币系统中创造新比特币的唯一途径。这被称为“区块奖励”。从技术上讲，提议区块的节点会在其提议的区块中包含一个名为“币基交易”的特殊交易，该交易的接收地址就是该矿工自己的地址。比特币刚推出时，区块奖励是
  50 枚比特币（BTC）。根据设计，比特币总量只有 21,000,000 BTC，因此区块奖励每 210,000 个区块减半一次。它从 50 开始，然后变成 25，再变成
  12.5，以此类推，直到某个时间点（达到 21,000,000 BTC 时）趋向于零。以下是来自 Bitcoin Core（`main.cpp`）展示减半过程的代码片段：


  ```cpp

  int64_t GetBlockValue(int nHeight, int64_t nFees)

  {

  int64_t nSubsidy = 50 * COIN;

  int halvings = nHeight / Params().SubsidyHalvingInterval();

  // 当右移操作未定义时，强制区块奖励归零。

  if (halvings >= 64)

  return nFees;

  // 每 210,000 个区块（大约每 4 年）奖励减半。

  nSubsidy >>= halvings;

  return nSubsidy + nFees;

  }

  ```


  注意上述代码片段中区块奖励是如何减半的。以下解释能更清晰地描述这一设计：


  ```

  //区块奖励减半，保持在 50%

  BlockReward = BlockReward >> 1;

  //区块奖励再次减半，保持在 25%

  BlockReward = BlockReward-(BlockReward>>2);

  //区块奖励再次减半，保持在 12.5%

  BlockReward = BlockReward - (BlockReward>>3);

  ```




  #### 理解比特币挖矿中的工作量证明


  尽管奖励看起来很诱人，但要幸运地成为那个获得区块提议权的节点并不容易。如果你不够幸运，你做的所有工作都将白费；这就是一个劣势！那么，节点在 PoW 中具体做什么呢？现在我们回到难度难题上来。每个挖矿节点始终都在努力提议一个区块，但在某个时间点只有一个能成功。假设一个区块已经被提出，现在所有挖矿节点都在努力提议一个新区块。让我们逐步了解这个过程，并理解整个流程：


  ##### 第一步


  矿工使用软件来跟踪交易，剔除那些已经成功进入区块链的交易，拒绝欺诈交易，并解决密码学难题以提议一个新区块，然后将其广播到整个网络。最好的挖矿软件是官方的 Bitcoin
  Core，但人们也提出了许多其他变体。如果你登录这个链接（ [`https://bitcoin.org/en/download`](https://bitcoin.org/en/download)
  ），你会发现官方的 Bitcoin Core 支持 Windows、Linux、Mac OS、Ubuntu 和 ARM Linux。因此，当我们说挖矿节点选择所有交易（可能是能带给矿工最高利润的交易），直到达到
  1MB（比特币现金为 2MB）的区块限制时，它们也会对这些交易进行哈希运算，并生成将成为新区块头一部分的**梅克尔根**。这个梅克尔根代表了所有交易。


  ##### 第二步


  他们准备区块头。除了随机数（nonce），其余所有信息在这一步都是可用的。挖矿节点的工作是通过对区块头进行两次哈希运算，并与难度目标进行比较，以找出满足小于难度目标条件的随机数。他们不断改变随机数，直到满足条件，而且没有捷径可以快速找到随机数；必须尝试每一种可能的选项。我们之前已经了解了如何使用区块头本身包含的四个字节数据来计算难度目标，并学习了它是如何每两周调整一次的。这个过程如下所示：


  ```

  H [ H (版本 | 上一个区块哈希 | 梅克尔根 | 时间戳 | 难度目标 | 随机数) ]

  < [ 难度目标 ]

  ```


  ##### 第三步


  矿工在第二步中通过将随机数字段递增“1”来不断改变它，直到满足条件——这是一个递归过程。每个节点的难度目标都是相同的，所有节点都在尝试解决同一个问题，但请记住，它们可能拥有不同变体的交易池，因此它们的梅克尔根也会不同。由于每个节点都在尝试延长最长的主区块链，所以上一个区块的哈希值将是相同的。


  因此，最终区块头的两次 Sha256 哈希值必须小于目标值，才能将区块提议给整个网络。参考以下示例以更好地理解：


  ```

  目标值   : 0000000000000074cd00000000000000000000000000000000000000000000000

  哈希值   : 0000000000000074cc4471deff052ced7f0734e4eda86c845a2fcf0553ed7f0

  ```


  注意，哈希值和目标值具有相同数量的前导零（即 14 个），并且`74cc`小于`74cd`，因此它满足条件，这个区块现在可以被提议。在许多地方，你会发现这种解释是用目标和哈希的近似值来简化的，并且只计算前导零。如果哈希值的前导零多于目标值，则满足条件。再次记住，目标值中的零越多，找到满足条件的哈希值就越困难。


  让我们将到目前为止学到的知识与实际的比特币实现联系起来。我们知道，区块生成时间被设定为十分钟——正如我们已经讨论过的，这被编码在比特币二进制程序中，即两周内生成
  2016 个区块，并且在发生硬分叉之前不会改变。你可以在网站 [`https://blockchain.info`](https://blockchain.info/)
  上浏览已提议的区块，查看满足难度目标的哈希值，并亲眼看到不同区块的哈希值会有不同的前导零个数，这只是为了将平均区块生成时间设定为十分钟。在最初的日子，前导零的数量大约是
  9 或 10 个，而今天已经增加到大约 18 到 20 个零。当更多具有更高算力的计算节点加入网络时，它可能会进一步增加。


  ##### 第四步


  一旦矿工找到了有效的区块，他们会立即将该区块发布到整个网络。接收到这个区块的每个节点都会独立地重新检查提出该区块的矿工是否确实解决了挖矿难题。对于这些节点来说，验证过程只需一步，如下所示：


  ```

  H [H (版本| 上一个区块哈希 | 梅克尔根 | 时间戳 | 难度目标 | 找到的随机数)]

  < [ 难度目标 ]

  ```


  注意，它们只使用包含提议矿工找到的随机数的区块头，来检查哈希值是否小于目标值且有效。如果随机数有效且条件满足，那么它们会检查区块中提议的每个交易与其在区块头中的梅克尔根是否一致。如果所有交易都有效，它们就会将这个区块添加到本地区块链副本中。这个新区块包含一个**币基交易**，用于生成新的币（最初是
  50 BTC，然后是 25，然后是 12.5，并如所述不断减半），作为对提出有效区块的矿工的奖励。


  这里要注意的是，区块挖矿不是一件容易的事，这要归功于 PoW 挖矿算法。对于一个节点来说，要提议一个无效区块，它必须耗费大量的电力和 CPU 周期来找到随机数并提议区块，而该区块最终会被网络中的节点拒绝。如果这是一项容易的任务，许多节点就会不断尝试，用无效的区块淹没网络。到现在，你必须理解并欣赏比特币是如何以博弈论的方式防止这种情况的！矿工遵守规则总是有利可图的，并且不遵守规则不会带来任何额外好处。


  在前面的步骤中，我们学习了比特币中实现的 PoW 挖矿过程。这种设计中最出色的一点是随机选择获得区块提议权的挖矿节点。没有人知道谁会幸运地找到正确的随机数并提议一个区块，这纯粹是一个随机现象。我们已经知道，生成真正的随机数相当困难，而这正是大多数密码学实现中最容易受到攻击的薄弱环节。采用像比特币这样的设计，随机选择一个节点来提议区块是真正随机的。


  比特币挖矿中另一个出色之处是区块奖励。这是成功提议新区块的矿工通过同一区块中的币基交易获得的奖励。矿工还会获得他们包含在区块中的所有交易相关联的交易费用。因此，一个区块的挖矿奖励是区块奖励和交易费用的组合，如下所示：


  ```

  挖矿奖励 = 区块奖励 + 区块中所有交易的总交易费用

  ```




  我们已知，挖矿是比特币系统中创造新比特币的唯一途径，但这是挖矿的目的吗？不！挖矿的目的是挖掘新区块，而新比特币的生成以及交易费是为了激励矿工，让越来越多的矿工对挖矿感兴趣。显然，如果你赚不到钱，为什么还要挖矿？这又是博弈论。恰当的激励设计是使系统去中心化且能自我维持的关键。请注意，比特币系统没有惩罚不诚实行为节点的方法，它只会奖励诚实行为。比特币区块链网络中的参与者，例如仅使用比特币的个人或矿工，都通过其公钥来识别。他们可以生成尽可能多的密钥对，这使得系统成为一个假名系统。一个节点无法通过其在
  `coinbase` 交易中使用的公钥被唯一标识，因为在下一秒它就可以创建一个新的密钥对，并以一个新的网络地址出现。因此，恰当的激励是确保系统参与者诚实行为的最佳方式——再次体现了博弈论的魅力！


  现在问你一个问题。在广播一个区块后，假设某个节点验证了它，发现 `nonce` 值、交易以及其他一切均有效，并将其加入本地区块链副本。这是否意味着该区块中的所有交易都已被结算和确认？嗯，并非如此！有可能两个区块同时产生，当一个节点开始扩展其中一个区块时，有可能大多数节点正在扩展另一个区块。最终，最长的区块链会成为主链。这种情况下，一个完全有效、包含所有合法交易和有效
  `nonce` 值以满足挖矿难题的区块，仍然可能被比特币网络抛弃。这些未能成为最终区块链一部分的区块被称为**孤块**。这个解释表明，任何时候都存在一个或多个区块被孤立的可能性。因此，最佳策略是等待更多区块添加到链上。换句话说，当一个交易接收到多个确认时，可以认为它已属于最终共识链的一部分，不会被孤立。随着某个区块之后添加了任意数量的区块，该区块中的交易就会收到相应数量的确认。虽然对于在接收交易前应获得多少确认并无明确规定，但六个确认已是最佳实践。即使有四个确认，也足以安全地假定交易已被确认，但六个确认是最佳实践，因为随着确认次数增加，区块被孤立的可能性呈指数级下降。


  ### 区块传播


  比特币使用工作量证明挖矿来随机选择一个能够提议有效区块的节点。一旦矿工找到有效区块，他们就会将该区块广播至整个网络。网络中的区块传播方式与交易相同。每个接收到新区块的节点会进一步广播它，以便最终该区块到达网络中的每个节点。请注意，除非区块从其视角来看属于最长链的一部分，否则节点不会广播它。当节点接收到提议的新区块时，它们不仅会验证区块头并检查哈希值是否在可接受范围内，还会验证该区块中包含的每一笔交易。至此可以明确，对于比特币网络中的节点来说，验证区块比验证交易要复杂一些。与交易类似，有可能同时提出两个有效的区块。在这种情况下，节点会保留这两个区块，并开始在来自最长链的那个区块之上进行构建。


  我们必须理解，区块在整个网络中传播并到达每个节点总是存在延迟。区块大小与传播时间呈线性比例关系，即区块大小每增加 `1 kB`，延迟就会线性增加。显然，这种网络延迟会影响区块链的增长速度。Decker
  和 Wattenhofer 进行的一项测量研究讨论了这种情况。请参考图 3-19，该图展示了区块大小与到达 25%（线 1）、50%（线 2）和 75%（线 3）被监控节点所需时间之间的关系。


  ![A440588_1_En_3_Fig19_HTML.jpg](img/A440588_1_En_3_Fig19_HTML.jpg)


  图 3-19


  区块传播时间与区块大小的关系


  网络带宽是导致这种网络延迟的主要原因，并且它在全球各地并不一致。除此之外，我们知道区块的广播数据包需要经过多次跳转才能最终到达所有节点。典型的比特币区块大小为
  `1 MB`，而通过硬分叉产生的新变体（比特币现金）的区块大小为 `2 MB`；你可以想象由此带来的延迟固有限制。根据网络研究，一个月内有超过一百万个比特币节点连接到比特币网络，并且有数千个全节点几乎永久性地连接到网络。


  ### 综合应用


  从高层次来看，如果我们只是按事件发生的顺序列出，那么流程如下：


  *   所有新交易都会被广播到所有节点。

  *   听到新交易的每个节点将它们收集到一个区块中。

  *   每个挖矿节点努力为其区块找到困难的工作量证明，以便能够将其提交给网络。

  *   当一个节点幸运地为工作量证明难题找到正确的 `nonce` 值时，它就会将该区块广播给所有节点。

  *   仅当 `nonce` 值和区块中的所有交易均有效且未被花销时，节点才接受提议的区块。

  *   比特币网络节点通过努力创建链中的下一个区块来表达对区块的接受，并使用被接受区块的哈希作为它们将要挖矿的新区块的前一哈希。


  ## 比特币脚本


  我们在前面的章节中从高层次了解了比特币交易。在本节中，我们将深入探讨实现交易的实际编程结构。每一笔比特币交易的输入和输出都嵌入了脚本。比特币脚本是基于栈的，我们稍后会看到，并且是从左到右进行评估。请记住，比特币脚本不是图灵完备的，因此你不能像使用其他图灵完备语言（如
  `C`、`C++` 或 `Java` 等）那样实现任何和所有功能。比特币脚本中没有循环的概念，因此脚本的执行时间不是可变的，而是与指令数量成正比。这意味着脚本在有限的时间内执行，不可能陷入循环。而且，最重要的是，脚本一定会终止。现在我们了解了脚本的一些知识，那么它们在何处运行呢？无论是通过编程方式、钱包软件还是其他任何程序进行交易时，脚本都会被注入交易中，而矿工的任务就是在挖矿时运行这些脚本。比特币脚本的目的是使网络节点能够确保可用资金仅由真正拥有它们的授权方进行索取和花费。




  ### 重新审视比特币交易


  比特币网络中的交易是一种价值转移，它会广播至全网，并最终出现在区块链的某个区块中。通常，我们看起来像是比特币从一个账户或钱包转移到另一个，但实际上，它是从一笔交易转移到另一笔交易。在深入细节之前，请记住，比特币地址本质上就是参与者公钥经过双重哈希运算后的输出。公钥首先通过
  `SHA256` 哈希算法，然后通过 `RIPEMD160` 哈希算法，分别进行哈希运算，以生成 160 位的比特币地址。我们已经在上一章中介绍过这些哈希技术。现在，让我们更深入一点地了解交易。请看下面的交易树（图
  3-20），即比特币中的交易流程。


  ![A440588_1_En_3_Fig20_HTML.jpg](img/A440588_1_En_3_Fig20_HTML.jpg)


  **图 3-20** 典型的比特币交易结构


  请注意，前一笔交易的输出成为新交易的输入，这个过程会永远持续下去。在上图中，如果你是那个从前一笔输出中获得 100K 的人，那么这便成为了新交易中可花费的输入。请注意，在
  `Tx 0` 中，你花费了 40K 和 50K 并支付了这些金额，剩余金额（10K）则成为了矿工费。默认情况下，剩余金额会支付给矿工，所以你需要小心，不要忽略这种情况，而实际情况通常也是如此。在相同情况下，你可以从剩余的
  10K 中，比如说，将 9K 转回自己的地址，留下 1K 作为矿工费。当一笔金额未被花费，即该交易未被用作新交易的输入时，它就是一个 `UTXO`，可以在以后花费。显然，它之前的交易已被花费。因此，你持有的所有账户（公钥）对应的所有
  `UTXO` 的总和，就是你的钱包余额。


  在此暂停一下，思考一下这该如何编程实现。请记住，交易的输入和输出都配有相关的脚本来使其成为可能。正是通过这些脚本，才能确保你是进行交易的授权用户，并且你拥有从前一笔交易中收到的必要金额。这意味着输入和输出同等重要。交易内容的结构如下所示：


  ```

  交易输出 = 要转移的比特币数量 + 输出脚本

  交易输入 = 对前一笔交易输出的引用 + 输入脚本

  ```


  先查看输出脚本还是输入脚本，实际上是一个先有鸡还是先有蛋的问题。但我们将先查看输出脚本，因为它将被下一笔交易的输入脚本所消耗。让我们重复并准确理解这一点：在进行一笔交易时，当前交易的输出脚本只是为了能允许未来的交易将其作为输入来消费，但对于当前这笔交易而言，是前一笔交易的输出脚本让你能够花费它。这就是为什么输出脚本包含接收者的公钥和正在转移的价值（比特币数量）。当输出脚本被用作输入时，其主要目的是根据公钥验证签名。输出脚本也被称为
  `ScriptPubKey`。除非此输出被花费，否则它始终是一个等待被花费的 `UTXO`。


  交易输入数据结构中的输入脚本包含了如何消耗你想要花费的前一笔交易的机制。因此，它必须包含对该前一笔交易的引用。前一笔交易的哈希值和索引号 `{hash， index}`
  精确定位了你收到当前正在花费的金额的位置。“索引”的目的是识别前一笔交易中的目标输出。如果你是前一笔交易的接收者，你必须提供你的签名，以证明你是该交易目标公钥的合法所有者。这将使你能够花费该笔交易。此外，你还必须提供你的公钥，该公钥经过哈希运算后将与之前交易中用作目标地址的公钥相匹配。输入脚本也被称为
  `ScriptSig`。脚本的最终目标是将签名和密钥推入栈中。


  一个典型的比特币交易包含以下字段（表 3-5）。


  **表 3-5** 比特币交易字段


  | 字段 | 大小 | 描述 |

  | --- | --- | --- |

  | 版本号 | 4 字节 | 当前为 1。它告知比特币节点和矿工使用哪套规则来验证此交易。 |

  | 输入计数 | 1 - 9 字节 | 正整数（`VI = VarInt`）。表示输入的总数。 |

  | 输入列表 | 可变长度 | 列出交易的所有输入。 |

  | 输出计数 | 1 - 9 字节 | 正整数（`VI = VarInt`）。表示输出的总数。 |

  | 输出列表 | 可变长度 | 列出交易的所有输出。 |

  | 锁定时间 | 4 字节 | 当前未使用。它表示交易是在矿工验证后立即包含进区块链区块，还是需要等待一段时间才能包含进区块。 |


  现在，让我们来看看上一节讨论的相同交易结构的另一种表示形式。这是为了更详细地了解交易结构及其各种组成部分。现在请参考图 3-21。


  ![A440588_1_En_3_Fig21_HTML.jpg](img/A440588_1_En_3_Fig21_HTML.jpg)


  **图 3-21** 比特币交易的细粒度组件


  如上图所示，签名或公钥等数据项都嵌入在脚本中，并成为交易的一部分。仅仅通过查看比特币交易的细粒度组件，你的许多疑问就能得到直接解答。脚本中的指令被推入栈中并执行，我们稍后将详细探讨这一点。


  当比特币节点接收到交易广播时，它们会按照以下步骤，将前一笔交易的输出脚本与当前交易的输入脚本结合起来，各自独立地验证这些交易。




  *   找到前一笔交易，其输出被用作当前交易的输入。“Prev. Txn ID (Hash)”字段包含该前一笔交易的哈希值。

  *   在前一笔交易的输出中，找到收到资金的确切索引。由于一笔交易中可能有多个接收方，因此使用该索引来识别当前交易的发起方，其地址在前一笔交易中被用作接收方。

  *   使用称为“`ScriptSig`”的解锁脚本来使用前一笔交易中的输出脚本。请注意，在图 3-21 中，前面有一个指定该解锁脚本长度的字段。

  *   将该输出脚本与输入脚本连接起来，只需将其附加到输入脚本之后，形成验证脚本，然后执行该验证脚本（请记住，这是一种基于栈的脚本语言）。

  *   `amount`值实际存在于输出脚本中，即“`ScriptPubKey`”。它是一个锁定脚本，用于锁定交易输出的花费条件，并确保只有该交易发送到的比特币地址的合法所有者才能在以后索取它。请注意，在它之前还有一个锁定脚本长度字段。对于当前交易，此输出脚本仅用于提供信息，并在将来所有者尝试花费它时发挥作用。

  *   验证脚本通过验证签名来决定当前交易输入是否有权花费之前的 UTXO。如果验证脚本成功运行，则确认该交易有效，并且交易成功。


  让我们通过图示来更深入地理解前面的解释。假设 Alice 支付给 Bob 5 BTC。这意味着 Alice 在之前的一笔交易中收到了 5 BTC，该交易使用 `ScriptPubKey`
  锁定。Alice 可以通过使用 `ScriptSig` 解锁来证明自己是该交易的合法所有者，并将其花给 Bob。类似地，如果 Bob 尝试将 3 BTC 支付给
  Charlie，并将 2 BTC 支付给自己，那么情况如下所示（图 3-22）。


  ![A440588_1_En_3_Fig22_HTML.jpg](img/A440588_1_En_3_Fig22_HTML.jpg)


  图 3-22


  比特币脚本的实际示例


  当比特币网络，更准确地说是矿工，收到来自 Alice 的交易时，他们会检查并确认这是一笔有效交易，然后通过将其包含在他们的区块中（提出区块的矿工负责此事）来批准该交易。当这种情况发生时，该交易的输出成为
  Bob 名下的 UTXO 的一部分，Bob 可以在以后花费它。这正是我们示例中发生的事情——Bob 也将其花给了 Charlie。Bob 通过使用前一笔交易，用自己的签名和公钥解锁它来完成此操作，以证明他是
  Alice 曾使用的比特币地址的所有者。请注意，Bob 的交易中有两个输出。由于他从 Alice 那里收到了 5 BTC，并向 Charlie 支付了 3 BTC，他必须将剩余的金额转给自己，这样它就变成了
  Bob 自己绑定的 2 BTC 的 UTXO，他将来可以花费它。在 Bob 的交易中，支付给 Charlie 的 3 BTC 使用锁定脚本锁定，只有 Charlie
  以后才能花费。


  你现在是否在想这些脚本是如何组合并一起执行的？请记住，当前交易的解锁脚本与前一笔交易的锁定脚本一起运行。如前所述，运行脚本是矿工的工作，这些操作不会在钱包软件中发生。在前面的示例中，当
  Bob 进行交易时，矿工们执行 Bob 交易中的 `ScriptSig` 解锁脚本，然后立即按顺序执行 Alice 交易中的 `ScriptPubKey` 锁定脚本。如果组合后的验证脚本在基于栈的顺序执行中成功运行并返回
  `TRUE`，则验证该交易的所有节点都会接受 Bob 的交易。在下一节中，我们将更详细地研究比特币脚本以及比特币脚本虚拟机如何在组合脚本命令执行期间处理栈。然而，在本节中，请查看以下从开发者角度表示交易的示例：


  ```

