  \ `Solidity` 文档以及 `Solidity` 相关的专门文章。\n\n### 部署智能合约\n\n在本节中，我们将把上一节开发的智能合约部署到我们创建的私有以太坊网络中。部署智能合约的过程与我们前一章所做的相同。唯一的不同是，这次我们是把合约部署到私有网络，而非公共网络。在本章中，我们同样使用相同的\
  \ `web3.js` 库，通过 JavaScript 进行以太坊编程。建议尚未阅读前一章的读者先去阅读一下。\n\n#### 设置 web3 库和连接\n\n\
  首先，我们将在 `node.js` 应用中安装 `web3` 库。这与上一章的做法完全相同。这个 `node.js` 应用将用于部署智能合约。\n\n```\n\
  npm install web3@1.0.0-beta.28\n```\n\n安装完成后，我们先初始化并实例化 `web3` 实例。\n\n```\nvar Web3\
  \ = require('web3');\nvar web3 = new Web3(new Web3.providers.HttpProvider('http://127.0.0.1:8507'));\n\
  ```\n\n请注意，这次 `web3` 实例的 HTTP 提供者已更改为本地端点，而不是上一章使用的公共 INFURA 端点。这是因为我们现在要连接的是本地私有网络。同时请注意，我们使用的端口是\
  \ `8507`，这正是我们在设置私有网络第一个节点时，在 `--rpcport` 参数中指定的端口。这意味着我们从 `web3` 实例连接的是网络的第一个节点。\n\
  \n#### 将合约部署到私有网络\n\n现在我们有了智能合约及其详细信息，我们将准备一个包含该合约详细信息的 `web3` 合约对象，然后通过调用合约对象的\
  \ `deploy` 方法，将该合约部署到以太坊区块链上。\n\n我们需要创建一个 `web3.eth.Contract` 类的对象，它可以代表我们的合约。以下代码片段创建了一个合约实例，并将我们合约的\
  \ ABI 作为构造函数的输入。\n\n```\nvar pollingContract = new web3.eth.Contract([\n{\n\"constant\"\
