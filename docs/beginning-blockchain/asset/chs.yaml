- '# 1. 区块链简介


  区块链是一股新的颠覆性浪潮，它已开始重塑商业、社交和政治互动，以及任何其他形式的价值交换。同样，这不仅是变革，更是一场正在快速演进的现实。截至撰写本文时，已有超过
  40 家顶级金融机构以及众多跨行业企业开始探索区块链，以降低交易成本、加快交易速度、减少欺诈风险，并消除中间人或中介服务。一些机构正试图重新构想传统系统和服务，将其提升至新水平，同时推出新型服务产品。


  本书将详细探讨区块链。如果你是区块链新手，可按章节顺序阅读；也可以仅挑选与你相关的章节。本章将解释区块链的含义、其演变过程，以及结合一些用途和案例，阐述其在当今世界的重要性。它将为你提供一个由外而内的视角，助你更深入地探究区块链。


  ## 区块链的前世今生


  最早为互联网奠定基础的数字化颠覆之一，是 20 世纪 70 年代的 TCP/IP（传输控制协议/网际协议）。在 TCP/IP 之前，是电路交换的时代，通信双方需要建立专用连接。TCP/IP
  则采用了更开放、点对点的分组交换设计，无需预先建立专用线路。


  20 世纪 90 年代初，互联网通过万维网向公众开放时，本应更加开放和点对点。这是因为其建立在开放且去中心化的 TCP/IP 之上。任何新技术，尤其是革命性技术，面世时要么自行消亡，要么产生巨大影响并成为公认标准。人们适应了万维网革命，并以各种可能的方式利用其优势。结果，万维网的发展方式可能并未完全符合其最初构想。它本可以更开放、更易接入、更具点对点特性。许多新技术和企业在此基础上发展，最终形成了今天的局面——更加中心化。人们逐渐习惯了技术所提供的一切。即使一笔国际交易需要数天才能结算，或成本过高，或可靠性不足，人们也习以为常。


  让我们更仔细地审视银行系统及其演变。从古老的以物易物时代到法定货币，交易与结算并无本质区别，因为它们并非两个独立实体。例如，如果爱丽丝需要付给鲍勃 10 美元，她只需将一张
  10 美元钞票交给鲍勃，交易即可当场结清。无需银行从爱丽丝账户扣款 10 美元并存入鲍勃账户，也无需银行作为信任系统来确保爱丽丝不欺骗鲍勃。然而，与不在身边的人直接交易却很困难。因此，银行系统不断发展，提供了更多服务，使交易能够覆盖全球各个角落。借助互联网，地理不再成为限制，银行业务比以往任何时候都更加便捷。不仅是银行业务，互联网还促进了网络上的各种价值交换。


  技术使印度人能够与英国人进行货币交易，但需要付出成本。此类交易需要数天才能结算，而且费用高昂。此类多方交易始终需要银行来建立信任并确保安全。如果技术本身能在没有这些中介和中心化系统的情况下实现信任与安全，那会怎样？不知何故，技术建立信任的这一部分始终缺失，导致银行、托管服务、清算所、登记机构等中心化系统应运而生。区块链正是互联网革命拼图中缺失的那一块，它以密码学安全的方式实现了去信任（trustless）系统。


  中本聪——世人皆知这个化名——或许认为，自 20 世纪 80 年代以来，货币系统就未曾受到技术革命的触动。银行作为中心化机构，维护交易记录、管理互动、强制信任与安全，并规范整个系统。整个商业依赖于这些金融机构，它们作为可信第三方处理支付。金融中介增加了交易结算的成本和时间，也限制了交易规模。中介是解决争端所需，但这意味着完全不可逆的交易永远无法实现。这导致人们交易时需要信任他人。显然，这种官僚体制必须改变，以跟上经济预期的数字化转型。因此，中本聪发明了一种名为比特币的加密货币，其背后支撑技术正是区块链。比特币只是区块链在货币领域的一个应用案例，它解决了基于信任的模型固有的弱点。本书将深入探讨比特币和区块链的基本原理。




  ## 什么是区块链？


  互联网已经彻底改变了生活、社会和商业的诸多方面。然而，我们在前一节了解到，在过去的几十年里，人们和机构之间相互执行交易的方式并没有太大改变。区块链被认为是完成互联网版图、使其更加开放、更易访问、更可靠的关键组件。


  要理解区块链，你必须从商业角度和技术角度两方面来理解。让我们首先在商业交易的语境下理解它，把握其“是什么”，然后在接下来的章节中深入技术层面，理解其“如何运作”。


  区块链是一个点对点的价值（不仅仅是金钱！）交易记录系统。这意味着，它不需要银行、经纪商或其他托管服务等可信中介作为可信的第三方。例如，如果爱丽丝支付给鲍勃 10
  美元，为什么需要通过银行呢？请看图 1-1。


  ![A440588_1_En_1_Fig1_HTML.jpg](img/A440588_1_En_1_Fig1_HTML.jpg)


  图 1-1


  通过中介的交易 vs. 点对点交易


  现在让我们看另一个例子。一笔典型的股票交易在几秒钟内完成，但其结算却需要数周。这在数字时代是可取的吗？当然不是！图 1-2 展示了当前的情况。


  ![A440588_1_En_1_Fig2_HTML.jpg](img/A440588_1_En_1_Fig2_HTML.jpg)


  图 1-2


  通过中介清算所进行的股票交易


  如果有人想从一家公司或个人那里购买一些股票，他们可以直接从对方那里购买并即时结算，无需中间涉及经纪商、清算所或其他金融机构。针对这种情况的去中心化、点对点解决方案可以如图
  1-3 所示。


  ![A440588_1_En_1_Fig3_HTML.jpg](img/A440588_1_En_1_Fig3_HTML.jpg)


  图 1-3


  点对点股票交易


  请注意，在区块链的设定中，交易和结算并非两个不同的实体！交易类似于，比方说，法定货币交易：如果某人付给另一个人一张 10 美元的纸币，那么他们就不再拥有它，而这张
  10 美元纸币就物理地转移到了新主人手中。


  既然你已经从功能层面，在高层次上理解了区块链，让我们再从技术角度稍作探讨，这样将其命名为“区块链”的原因就变得更清晰了。我们将在技术上看到它“是什么”，而将其“如何运作”留给第
  2 章。


  请阅读以下陈述，如果这些概念在你的理解中还不能很好地融合在一起，不必担心。你可能需要重新回顾它，但请耐心读完本书。


  - 区块链是一个点对点的价值交易系统，中间没有可信的第三方。

  - 它是一个共享的、去中心化的、开放的交易分类账。这个账本数据库在大量节点上进行复制。

  - 这个账本数据库是一个只可追加的数据库，不能被更改或篡改。这意味着每一条记录都是永久性的记录。在其上的任何新条目都会反映在不同节点上托管的数据库的所有副本中。

  - 不需要可信第三方作为中介来验证、保护和结算交易。

  - 它是互联网之上的又一层，并能与其他互联网技术共存。

  - 正如 TCP/IP 被设计用于实现开放系统一样，区块链技术被设计用于实现真正的去中心化。为此，比特币的创造者将其开源，以期激发许多去中心化应用。


  一个典型的区块链可能如图 1-4 所示。


  ![A440588_1_En_1_Fig4_HTML.jpg](img/A440588_1_En_1_Fig4_HTML.jpg)


  图 1-4


  区块链数据结构


  区块链网络上的每个节点都拥有图 1-4 所示区块链的相同副本，其中每个区块都是交易的集合，因此得名。如你所见，每个区块有两个主要部分。“区块头”部分链接回链中的前一个区块。这意味着每个区块头都包含前一个区块的哈希值，这样任何人都无法篡改前一个区块中的任何交易。我们将在后续章节中深入了解这个概念。区块的另一部分是“主体内容”，其中包含一个经过验证的交易列表，包括交易金额、相关方的地址以及一些其他细节。因此，给定最新的区块，就可以访问区块链中的所有先前区块。


  让我们考虑一个实际例子，看看交易是如何发生的，以及账本是如何在网络中更新的，从而了解这个系统是如何工作的：


  假设有三个参与者——爱丽丝、鲍勃和查理——他们在一个区块链网络上相互进行一些货币交易。让我们一步步地经历这些交易，以理解区块链的开放和去中心化特性。


  ### 步骤 1：


  假设爱丽丝最初有 50 美元，这是所有交易的起源，并且每个节点都知道这一点，如图 1-5 所示。


  ![A440588_1_En_1_Fig5_HTML.jpg](img/A440588_1_En_1_Fig5_HTML.jpg)


  图 1-5


  创世区块


  ### 步骤 2：


  爱丽丝支付 20 美元给鲍勃，完成了一笔交易。观察区块链如何在每个节点上更新，如图 1-6 所示。


  ![A440588_1_En_1_Fig6_HTML.jpg](img/A440588_1_En_1_Fig6_HTML.jpg)


  图 1-6


  第一笔交易


  ### 步骤 3：


