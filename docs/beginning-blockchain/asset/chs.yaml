  ### 难度目标


  难度目标是驱动比特币工作量证明（PoW）的关键。其核心思想是：当一个区块填满了有效交易后，需要计算该区块头部的哈希值，使其小于同一头部中的难度目标。头部中的随机数`nonce`从零开始。矿工必须不断递增这个`nonce`并对头部进行哈希运算，直到哈希值小于目标值。


  头部中四个字节（32 位）的难度位定义了该区块被挖出所需的目标值（256 位）。需要找到这样一个`nonce`，使得整个区块头部的哈希值小于目标值。请记住，目标值越低，找到小于该值的头部哈希就越困难。由于比特币使用
  SHA256 算法，每次计算区块头部的哈希时，输出结果都是介于`0`和`2²⁵⁶`之间的任意一个数，这个数字相当巨大。如果使用你的`nonce`计算出的哈希值小于目标值，则该区块将被整个网络接受；否则，你必须尝试另一个`nonce`，直到满足条件。至此，我们仍未明确难度目标是如何根据每个头部中的难度位计算出来的。


  目标值可以根据头部中四个字节（八个十六进制数）的难度位，通过一个预设的公式推导出来。每个节点在安装时都默认附带了这个公式（因为它随二进制文件一同提供）。以下是计算难度的公式：


  ```

  target = coefficient * 2^(8 * (exponent – 3))

  ```


  请注意，这个公式中包含“系数”（coefficient）和“指数”（exponent）项，它们都包含在四个字节的难度位中。我们举一个例子来更好地说明这一点。如果四个字节的难度位以十六进制表示为`0x1b0404cb`，那么前两个十六进制数字构成指数项，即`0x1b`，剩余部分构成系数项，即`0x0404cb`。将这些值代入目标公式求解：


  ```

  target = 0x0404cb * 2^(0x08 * (0x1b – 0x03))

  target = 0x00000000000404CB000000000000000000000000000000000000000000000000

  ```


  比特币的设计目标是每生成 2,016 个区块需要花费两周时间。计算一下，平均每个区块的产生时间约为十分钟。在这个异步网络中，要想通过现有的 PoW 机制精确编程实现每个区块都耗时十分钟是非常困难的。实际上，这只是一个区块的平均时间，一个比特币区块可能在一分钟内生成，也可能需要
  15 分钟才能生成。因此，难度的设计会根据生成 2,016 个区块是小于还是大于两周时间而相应增加或减少。生成 2,016 个区块所需的时间可以通过每个区块头部时间戳字段中的时间计算得出。假设生成
  2,016 个区块花费了`T`时间（这个时间绝不会恰好是两周），那么每个区块的难度目标就会乘以（`T / 2 周`）。因此，如果`T`小于两周，[难度目标 ×
  (`T / 2 周`)]的结果就会增大；反之则会减小。


  由此可见，难度目标是可以调整的，可以根据之前所述的情况设置得更难或更易。你可能会想，在去中心化的系统中，是谁在调整这个难度呢？有一个经验法则你必须始终牢记：在这种去中心化设计中，任何操作都必须在每个节点上独立进行。每经过
  2,016 个区块，所有节点都会各自独立计算新的难度目标值，并且它们得出的结论是一致的，因为已经为此定义了一个公式。以下是该公式的再次表述：


  ```

  新目标 = 旧目标 * (T / 2 周)

  = 新目标 = 旧目标 * (生成 2016 个区块所花费的时间（秒） / 1,209,600 秒)

  ```


  **注意：** 诸如 2,016 个区块和两周（1,209,600 秒）的`TargetTimespan`等参数，在`chainparams.cpp`文件中定义如下：


  ```

  consensus.nPowTargetTimespan = 14 * 24 * 60 * 60; // 两周

  consensus.nPowTargetSpacing = 10 * 60;

  consensus.nMinerConfirmationWindow = 2016; // nPowTargetTimespan / nPowTargetSpacing

  ```


  请注意，这里是（`T / 2 周`），而不是（`2 周 / T`）。其目的在于，当需要增加挖矿难度、从而花费更多时间时，就降低难度目标值。目标哈希值越小，找到小于该值的哈希就越困难。例如：如果挖出
  2,016 个区块花费了十天时间，那么（`T / 2 周`）就是一个分数，这个分数与“旧目标”相乘后，会进一步降低“新目标”的值，使其小于旧值。这将使得找到合适哈希更加困难，需要更多时间。这就是区块平均生成时间维持在十分钟的原理。想象一下，如果难度目标是固定的且不可调整的，你认为会出现什么问题？请记住，随着更强大的计算机被用于区块挖矿，硬件的计算能力会随时间推移而增长。如果同时有
  10 个、100 个甚至 1,000 个区块被提出，这对于网络的正常运行来说是不可取的。因此，其理念是，即使越来越多强大的计算节点加入比特币网络，通过调整难度目标，提出一个区块所需的平均时间仍然应该保持在十分钟。此外，矿工提出区块的几率取决于他们拥有的算力与所有矿工总全球算力之比。


  你是不是在想，为什么是十分钟，而不是 12 分钟？或者为什么不是六分钟？请记住，在去中心化的异步系统中，所有节点需要一定的时间间隔才能达成共识。如果没有时间间隔，大量区块会仅以微小的延迟接踵而至，相比交易链，区块链也就没有优化优势可言。每一笔交易是一次广播，每一个新区块也是一次广播。此外，区块链为系统带来的有序性，在交易链中是很难实现的。借助区块的概念，可以将来自任意发送方到任意接收方的无关交易包含在同一个区块中，这在交易链中是难以维护的。一个有效的区块广播，比验证后逐个广播交易要高效得多。现在回到十分钟的讨论，它完全可以少一点或多一点，但两个连续区块之间必然存在一定的时间间隔。设想你是一名矿工，正在挖编号为
  4567 的区块，但另一个矿工运气更好，率先提出了编号为 4567 的区块，而你正在解决密码学难题时收到了这个区块。你现在要做的就是验证这个区块，如果它有效，就将其添加到本地区块链副本中，并立即开始挖掘编号为
  4568 的区块。你肯定不希望自己刚验证完区块 4567（由于网络延迟，你收到此区块的时间比其他矿工稍晚），就发现别人已经提出了区块 4568。那么问题来了：这十分钟是不是最佳选择？嗯，很难用一个词来解释，但十分钟的时间间隔解决了由于异步网络、时间延迟、数据包丢失、系统容量等带来的诸多问题。有可能可以进一步优化到比如五分钟左右，你可以在许多新的加密货币和其他区块链应用案例中看到这一点。




