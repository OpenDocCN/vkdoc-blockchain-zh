  | --- | --- | --- |

  | 魔数 | 4 字节 | 固定值为 `0xD9B4BEF9`，表示区块的起始，并表明该区块来自主网或生产网络。 |

  | 区块大小 | 4 字节 | 表示区块的大小。最初的比特币区块大小为 1MB，而名为“比特币现金”的较新版本区块大小为 2MB。 |

  | 区块头 | 80 字节 | 包含大量信息，例如前一个区块的哈希值、随机数、默克尔根等。 |

  | 交易计数器 | 1–9 字节（可变长度） | 表示区块中包含的交易总数。并非每笔交易的大小都相同，每个区块中的交易数量也是可变的。 |

  | 交易列表 | 数量可变但大小固定 | 列出给定区块中发生的所有交易。根据区块大小（1MB 或 2MB），该字段占据区块中的剩余空间。 |


