  \ Web 应用，用于调用该合约的 `vote` 函数，以此展示如何从前端进行投票操作。\n\n\n\n## 客户端应用\n\n与上一章类似，我们可以使用`web3`库来调用智能合约的函数。不过上一章是通过\
  \ node.js 应用程序而非浏览器应用实现的。在本节中，我们将通过浏览器应用使用`web3`来调用已部署智能合约的`vote`函数。\n\n我们能为这个 DApp\
  \ 创建的最简单的 Web 应用就是一个包含若干文本和按钮控件的单一网页。对于这个网页，我们可以在一个 html 文件中使用以下代码，然后通过本地服务器运行它。请注意，必须通过本地服务器运行，而不是直接在浏览器中打开文件，这样才能正确加载脚本，避免出现浏览器安全问题。\n\
