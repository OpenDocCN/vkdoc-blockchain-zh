  ## 比特币钱包


  比特币钱包与你日常生活中使用的钱包非常相似，你可以访问它，并随时进行支付。然而，比特币钱包是一种数字现象。回想一下我们在上一节使用的例子，爱丽丝向鲍勃支付了一些金额。如果鲍勃没有账户，她该如何操作呢？在比特币环境中，账户或钱包由比特币地址表示。鲍勃必须先生成一个密钥对（私钥/公钥）。比特币使用`ECDSA`算法，并采用`secp256k1`曲线（别担心，这只是曲线类型——一种标准推荐）。首先，生成一个随机比特串作为私钥，然后通过确定性方式将其转换为公钥。正如我们在第
  2 章中学到的，私钥和公钥在数学上是相关的，并且可以随时（确定性地）从私钥生成公钥。因此，实际上并不需要保存公钥本身。通过软件实现无法做到真正的随机性，所以许多服务器或应用程序使用硬件安全模块（`HSM`）来生成真正的随机比特，并保护私钥。与公钥不同，私钥绝对需要以最高安全级别进行保存。如果丢失了私钥，你就无法生成签名来证明你拥有公钥（或比特币地址）的所有权，而该地址在任何交易中都可能收到了金额。公钥经过两次哈希运算生成比特币地址：首先使用`SHA256`，然后使用`RIPEMD160`。这个过程也是确定性的，因此给定一个公钥，只需进行几次哈希运算就能生成比特币地址。


  请注意，比特币地址实际上并不会泄露公钥。这是因为地址是经过双重哈希处理的公钥，要通过比特币地址找到公钥是相当不可行的。然而，对于拥有公钥的人来说，很容易就能声明对比特币地址的所有权。比特币中的哈希技术缩短并混淆了[公钥](https://bitcoin.org/en/glossary/public-key#The%20public%20portion%20of%20a%20keypair%20which%20can%20be%20used%20to%20verify%20signatures%20made%20with%20the%20private%20portion%20of%20the%20keypair.)。这既方便了手动抄写，也提供了安全性，以防出现未预料到的问题——那些问题可能允许从[公钥](https://bitcoin.org/en/glossary/public-key#The%20public%20portion%20of%20a%20keypair%20which%20can%20be%20used%20to%20verify%20signatures%20made%20with%20the%20private%20portion%20of%20the%20keypair.)重构出[私钥](https://bitcoin.org/en/glossary/private-key#The%20private%20portion%20of%20a%20keypair%20which%20can%20create%20signatures%20that%20other%20people%20can%20verify%20using%20the%20public%20key.)。这可能是最安全的实现方式！公钥仅在交易输出的所有者声明所有权时才会被揭示，而不是在交易发送给他们的那一刻，如图
  3-28 所示。


  ![A440588_1_En_3_Fig28_HTML.jpg](img/A440588_1_En_3_Fig28_HTML.jpg)


  图 3-28

  声明交易时揭示公钥


  比特币钱包本质上就是`SPV`，并由完整节点提供服务。我们已经了解了`SPV`的功能，因此在本节中，我们将看看一些特定于钱包的活动。我们都知道，要进行一笔交易或接收一笔交易，你不需要运行完整节点。你所需要的只是一个能够保存你的私钥/公钥对的钱包，以便能够进行和接收交易（实际上是查看和验证发送给你的交易）。我们在学习`SPV`部分时已经了解了验证部分。现在让我们来看看如何使用钱包发起一笔交易。




  建议你运行自己的全节点并将钱包连接到该节点，因为这是在比特币上进行操作最安全的方式。不过，这并不是强制要求，你仍然可以在不维护自己节点的情况下工作。请记住，当你查询一个节点时，必须提供你的公开地址才能获取
  UTXO 列表，这意味着全节点会获知你的公开地址，这会造成隐私泄露！钱包所要做的只是获取 UTXO 列表，以便用私钥签名交易，并将该交易发布到比特币网络中。这可以通过创建自己的钱包软件或使用第三方钱包服务来实现。然而，请谨慎对待钱包服务提供商，因为你正在允许他们控制你的私钥。无论是他们故意盗取你的比特币，还是他们自身被黑客攻击（许多钱包服务都曾发生过这种情况），你都会损失比特币。归根结底，尽管比特币网络是去中心化的，但所有钱包服务提供商都是中心化的。通过钱包软件发起比特币交易的典型图示如下所示（图
  3-29）。


  ![A440588_1_En_3_Fig29_HTML.jpg](img/A440588_1_En_3_Fig29_HTML.jpg)


  图 3-29


  钱包应用程序与比特币网络交互


  一个可以用作比特币钱包的 SPV 客户端示例是 `BitcoinJ`。`BitcoinJ` 实际上是一个用于与比特币协议交互、维护钱包以及发起/验证交易的库。它不需要像
  Bitcoin Core 这样的本地全节点，可以作为轻客户端节点运行。尽管它是用 Java 实现的，但可以从任何兼容 JVM 的语言（如 JavaScript
  和 Python）中使用。


  ## 摘要


  在本章中，我们学习了如何将上一章讨论的区块链概念组合起来，构建比特币作为区块链技术的一种加密货币用例。我们涵盖了比特币的演变、历史、定义、设计优势及其为何如此重要。我们深入了解了比特币网络、交易、区块、区块链、共识机制以及所有这些要素如何相互衔接的细节。然后，我们学习了与比特币区块链系统交互所需钱包解决方案的要求。


  20 世纪 90 年代，互联网的普及改变了人们的经商方式。它消除了信息创建和传播中的摩擦。这为新市场、更多机遇和可能性铺平了道路。同样地，如今的区块链正在将互联网提升到一个全新的水平。比特币只是区块链的一种加密货币应用，而可能性是无限的。在下一章中，我们将学习以太坊如何运作，以及它如何成为单一公共区块链网络上各种去中心化应用的事实标准。


  '
- "# 以太坊的工作原理\n\n区块链应用的时代才刚刚开始。以太坊将成为构建去中心化应用的事实上的区块链平台。我们在前几章已经学到，公共区块链的用例不仅限于加密货币，其可能性只受限于你的想象力！以太坊已经在许多商业领域取得进展，不仅最适合公共区块链用例，也适用于私有区块链用例。以太坊已经为区块链平台树立了标杆，必须深入研究，才能设想如何借助或不借助以太坊来构建可用的去中心化应用。如今，得益于以太坊，即使仅具备最少的密码学、博弈论、数学或复杂编码以及计算机科学基础知识，也能构建区块链应用。\n\
  \n在本书第 3 章中，我们通过深入探讨协议和比特币应用，学习了比特币的工作原理。我们见证了加密货币方面如何与比特币协议紧密交织。我们了解到，比特币并非区块链上的比特币，而是特币区块链。在本章中，我们将学习以太坊如何成功构建了一个抽象基础层，该层能够在同一个区块链平台上赋能各种不同的区块链用例。\n\
  \n## 从比特币到以太坊\n\n显然，区块链技术是 2009 年随比特币一同出现的。在比特币经受住时间的考验后，人们开始相信区块链的潜力。如今，其用例已超越银行和金融领域，扩展到供应链、零售、电子商务、医疗保健、能源以及政府等其他行业。这是因为不同类型的区块链已经出现，并解决特定的业务问题。尽管如此，也有像以太坊这样的公共区块链平台，允许在同一个公共以太坊平台上构建不同的去中心化用例。\n\
  \n借助比特币，去中心化的点对点加密货币交易成为可能。人们意识到，区块链不仅可用于交易加密货币，还可用于交易和追踪任何具有价值的东西。人们开始探索是否可以将同一个比特币网络用于其他用例。举个例子，`存在性证明`\
  \ 就是一个这样的用例，它将文档的哈希值注入比特币区块链网络，以便任何人之后都能验证该文档在某个时间点是否存在。Vitalik Buterin 引入了以太坊区块链平台，该平台不仅能够促进货币交易，还能促进股份、土地、数字内容、车辆等许多具有内在价值的事物的交易。看一下图\
  \ 4-1。\n\n![A440588_1_En_4_Fig1_HTML.jpg](img/A440588_1_En_4_Fig1_HTML.jpg)\n\n\
  图 4-1\n\n一个以太坊平台上的多个去中心化应用\n\n与比特币一样，以太坊是一个具有不同设计理念的公共区块链平台。其最具创新性的方法是构建一个抽象层，使来自不同应用的交易被泛化为可以在所有以太坊节点上运行的程序代码。即使在以太坊中，矿工也会生成以太币，这是一种可交易的加密货币，公共区块链网络借此实现自我维持。任何在以太坊上运行的应用都必须支付交易费用，矿工最终通过运行节点和维持整个网络来获得这些费用。\n\
  \n\n  \n### 以太坊：下一代区块链  \n\n凭借比特币区块链，开发者社区曾试图通过构建全新的区块链来开发不同的去中心化应用，或尝试修改比特币核心以增加功能集。无论哪种方式，既复杂又耗时。当时或许正需要一种采用替代协议的不同设计方案，这正是以太坊区块链平台诞生的原因！其目标是促进在单一以太坊平台上开发多种区块链应用，而非为每个应用单独构建专用区块链。以太坊实现了去中心化应用的快速开发，这些应用可以相互交互，同时确保足够的安全性。如前一节所述，以太坊通过构建抽象基础层来实现这一点。与比特币不同，以太坊支持图灵完备语言，因此任何人都可以编写智能合约，从而在编程层面实现几乎任何功能。此外，以太坊在设计上具有状态性，并持续跟踪账户状态，这与比特币截然不同——比特币中所有内容都保持为交易形式，且脚本没有内部持久内存。借助抽象基础层，底层复杂性对开发者而言被隐藏起来，不仅如此，开发者还能灵活设计自己的状态转换函数，用于直接转移价值与信息，以及自定义交易格式。\n\
  \n为实现这一目标，以太坊的核心创新是以太坊虚拟机（`EVM`）。通过`EVM`支持图灵完备语言，使开发者能够轻松创建区块链应用。就像运行 Java 代码需要\
  \ Java 虚拟机（`JVM`）一样，运行智能合约需要`EVM`。目前只需记住：智能合约是用图灵完备语言编写的以太坊脚本，当预定义事件发生时，它会自动执行。比特币中的`ScriptSig`和`ScriptPubKey`可以说是智能合约的初级版本。我们在前一章了解到，比特币的指令集非常有限。然而在以太坊中，几乎可以编写任何程序，并在以太坊区块链网络中的每个节点上通过`EVM`运行。以太坊中的去中心化应用被称为\
  \ DApp。由于以太坊是一个没有中心化服务器的全球去中心化计算机系统，DApp 是能够无停机、无欺诈或任何形式监管运行的应用。像比特币这样的点对点电子现金系统，在以太坊上可以很容易地作为\
  \ DApp 构建。同样，任何具有内在价值的资产（如土地、汽车、房屋、选票等），都可以通过其在以太坊上的相应 DApp 以代币形式轻松交易。\n\n与传统软件的开发和部署不同，DApp\
  \ 无需托管在后端服务器上。可以说，“代码”作为交易的有效载荷嵌入其中，然后发送至以太坊网络中的挖矿节点。此类交易会被挖矿生态系统考虑，因为其支付了以 ETH（以太币）计价的“燃料价格”。与比特币类似，这些交易会被广播至网络中可访问的其他矿工。最终，交易被打包进区块，并在达成共识后成为区块链的永久组成部分。开发者可以自由编写任意解决方案并将其部署到以太坊网络中。网络会自动执行该方案，同时验证并产生输出。当然，如果没有成本，网络将无法持续。每笔区块链交易都关联着燃料价格，编写垃圾代码并部署到以太坊网络可能会代价高昂！\n\
  \n### 以太坊的设计理念  \n\n以太坊借鉴了比特币核心中经得起时间考验的许多概念，但其设计遵循不同的理念。以太坊的开发遵循以下原则：\n\n* **简约设计**：以太坊区块链设计得尽可能简单，以便易于理解和开发去中心化应用。在共识层面，实现中的复杂性被控制在最低限度，并在更上层进行管理。因此，高级语言编译、参数的序列化/反序列化等对开发者而言并非难题。\n\
  * **开发自由**：以太坊平台旨在鼓励其区块链平台上的任何形式的去中心化，并不歧视或偏袒任何特定用例。这种自由甚至允许开发者编写包含无限循环的智能合约并部署它。当然，只要他们支付交易费用（燃料价格），循环就会持续运行，当燃料耗尽时循环最终终止。\n\
  * **无内置特性概念**：为了提升系统的通用性，以太坊没有为开发者提供内置特性。相反，以太坊通过支持图灵完备语言，让用户按自己的意愿开发所需特性。从比特币中的`locktime`等基本功能，到完整的复杂用例，一切都可以在以太坊中编码实现。\n\
  \n## 进入以太坊区块链  \n\n我们了解了以太坊区块链的目标及其设计理念。为了能够理解并欣赏这一下一代区块链，并在其上构建去中心化应用，我们将在本节中详细学习以太坊的核心组件。\
  \  \n\n\n\n### 以太坊区块链\n\n以太坊区块链的数据结构与比特币的非常相似，不同之处在于区块头包含了更多信息，使其更加健壮，并有助于正确维护状态。我们将在后续章节中学习更多关于以太坊状态的知识。本节我们将主要关注区块链数据结构和区块头。在比特币中，区块头只有一个默克尔树根，用于存储块内的所有交易。而在以太坊中，另外还有两个默克尔树根，因此总共有三个默克尔树根，如下所示：\n\
  \n*   `stateRoot`：有助于维护全局状态。\n*   `transactionsRoot`：用于跟踪并确保区块内所有交易的完整性，类似于比特币的默克尔树根。\n\
  *   `receiptsRoot`：对应于区块内交易的收据树的根哈希。\n\n我们将在各自对应的区块头信息部分来审视这些默克尔树根。为了更好地理解，请查看图\
  \ 4-2。\n\n![A440588_1_En_4_Fig2_HTML.jpg](img/A440588_1_En_4_Fig2_HTML.jpg)\n\n\
  图 4-2\n\n以太坊的区块链数据结构\n\n每个区块通常包含区块头、交易列表、叔块列表和可选的`extraData`。现在，让我们看看区块头的各个字段，了解它们的含义及其在区块头中的作用。在此过程中，请记住，这些字段的名称在不同地方可能略有不同，或者它们的呈现顺序也可能有所不同。我们建议你深入理解这些字段，这样将来遇到任何不同的术语都不会给你带来太多困扰。\n\
  \n#### 第 1 节：区块元数据\n\n*   `parentHash`：父区块头的 Keccak 256 位哈希，类似于比特币的风格。\n*   `timestamp`：当前区块的\
  \ Unix 时间戳。\n*   `number`：当前区块的区块编号。\n*   `Beneficiary`：负责创建当前区块的“作者”账户的 160 位地址，成功挖掘该区块所获得的所有手续费都将汇集到此地址。\n\
  \n#### 第 2 节：数据引用\n\n*   `transactionsRoot`：填充了此区块所有交易的交易树的 Keccak 256 位根哈希（默克尔根）。\n\
  *   `ommersHash`：也称为“`uncleHash`”。它是区块中叔块部分的哈希，即此区块的叔块列表部分的 Keccak 256 位哈希（这些叔块是已知其父区块等于当前区块的父区块的父区块的区块）。\n\
  *   `extraData`：包含与此区块相关数据的任意字节数组。该数据的大小限制为 32 字节（256 位）。截至撰写本文时，此字段有可能变为“`extraDataHash`”，它将指向区块内包含的\
  \ `extraData`。`extraData` 可以是原始数据，其计费方式与交易数据相同。\n\n#### 第 3 节：交易执行信息\n\n*   `stateRoot`：在验证并执行此区块所有交易后的最终状态的\
  \ Keccak 256 位根哈希（默克尔根）。\n*   `receiptsRoot`：填充了此区块中每笔交易收据的收据树的 Keccak 256 位根哈希（默克尔根）。\n\
  *   `logBloom`：针对每笔交易收据的 Bloom 过滤器累积而成的 Bloom 过滤器，即区块中所有交易 Bloom 过滤器的“或”运算结果。\n\
  *   `gasUsed`：此区块中所有交易消耗的 gas 总量。\n*   `gasLimit`：此区块可使用的最大 gas 量（动态值，取决于网络活动）。\n\
  \n#### 第 4 节：共识子系统信息\n\n*   `difficulty`：根据前一区块的难度和时间戳计算得出的本区块难度限制。\n*   `mixHash`：256\
  \ 位的混合哈希，与“`nonce`”相结合用于本区块的工作量证明。\n*   `nonce`：nonce 是一个 64 位哈希，与 `mixHash` 结合使用，可作为工作量证明验证。\n\
  \n### 以太坊账户\n\n与比特币不同，以太坊账户并非以未花费交易输出（UTXO）的形式存在。在比特币章节中，我们了解到比特币实际上是以交易的形式存在的，每笔交易都有一个所有者（所有者的公钥，20\
  \ 字节地址）和一个数值。如果所有者拥有他们想要花费的交易的有效私钥，就可以花费该交易。因此，比特币是一个状态转换系统，其中“状态”指的是所有 UTXO 的集合。每当一个区块被挖出，就会发生状态变化，因为每个区块都包含一组交易，而每笔交易都会消耗\
  \ UTXO 并创建 UTXO。请注意，状态并未编码在区块内部。因此，在比特币的设计中，本质上没有账户余额的概念。相比之下，以太坊是有状态的，其基本单元是账户。每个账户都有一个与之关联的状态，并有一个\
  \ 20 字节（160 位）的地址，通过该地址进行识别和引用。以太坊中区块链的目的是跟踪状态变化。以太坊账户大致有两种类型：\n\n*   **外部拥有账户（EOA）**：这些账户也称为“简单账户”，通常由用户或设备拥有，他们使用私钥控制这些账户。EOA\
  \ 可以通过使用私钥签名来向其他 EOA 或合约账户发送交易。两个 EOA 之间的交易通常是转达任何形式的价值。另一方面，当 EOA 向合约账户发起交易时，其目的是激活合约账户内的“代码”。\n\
  *   **合约账户**：这些账户仅由其内部包含的代码控制。合约账户内的这种代码被称为“智能合约”。它们通常在 EOA 或其他合约账户向该合约账户发送交易时被激活。尽管合约账户能够通过其包含的代码执行复杂的业务逻辑，但它们不能自行发起新交易，始终依赖\
  \ EOA。它们所能做的只是根据其“代码”中编程的逻辑，响应其他交易（显然是通过发起交易）。\n\n请查看以下三种场景（图 4-3 至 4-5），以更好地理解\
  \ EOA 和合约账户之间的通信。\n\n**EOA 到 EOA 交易：**\n\n![A440588_1_En_4_Fig3_HTML.jpg](img/A440588_1_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3\n\nEOA 到 EOA 交易\n\n**EOA 到合约账户交易：**\n\n![A440588_1_En_4_Fig4_HTML.jpg](img/A440588_1_En_4_Fig4_HTML.jpg)\n\
  \n图 4-4\n\nEOA 到合约账户交易\n\n**EOA 到合约账户再到其他合约账户交易：**\n\n![A440588_1_En_4_Fig5_HTML.jpg](img/A440588_1_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5\n\nEOA 到合约账户再到合约账户交易\n\n为了避免上述表示造成混淆，请注意，合约账户是内部的，它们之间的通信也是内部的。与 EOA 账户不同（EOA\
  \ 发起交易并将其注入区块链），合约账户以及它们之间的交易是内部现象。\n\n\n\n#### UTXOs 的优势\n\n我们必须理解，比特币的设计理念是在尽可能的范围内保持匿名性。当与以太坊进行比较时，UTXO\
  \ 的以下优势似乎具有重要意义：\n\n- **更好的隐私性**：在比特币中，建议在接收交易时使用新地址，这有助于加强匿名性。即使运用复杂的统计或机器学习技术，也很难（尽管并非不可能）将账户关联起来。\n\
  - **潜在的更高可扩展性**：关于可扩展性的讨论通常非常主观，取决于具体情境、手头的用例以及许多其他因素。这里的意图仅仅是提及 UTXO 固有的扩展潜力。并行执行交易非常容易。此外，当所有者或其他维护某些代币的\
  \ Merkle 所有权证明数据的节点丢失这些数据时，仅所有者受到影响。相反，当某个账户的 Merkle 树数据丢失时，对该账户的任何操作都将不可行，甚至向其发送交易也不行。\n\
  \n#### 账户的优势\n\n尽管以太坊在某种程度上是比特币的扩展，但它是以一种全新的设计理念构思的，并有其自身的一套利弊权衡。让我们来看看与比特币设计相比，以太坊账户的以下优势：\n\
  \n- **显著的空间节省**：在比特币中，当多笔交易被合并成一笔交易时（例如，如果你需要支付 5 BTC，但你从未收到过一笔至少 5 BTC 的交易可用于此情况，那么你必须捆绑多笔交易以使总额超过\
  \ 5 BTC），就需要引用所有这些单独的交易。此外，所有这些交易都必须有不同的地址，因此交易数量与地址数量一样多！然而，在以太坊账户中，只需引用一个账户就足够了。尽管以太坊使用了\
  \ Merkle Patricia 树（MPT），它比 Merkle 树更占用空间，但对于复杂交易，你最终会节省大量空间。\n- **编码简单**：由于 UTXO\
  \ 和脚本不是图灵完备的，因此很难设计复杂的系统。UTXO 要么已花费，要么未花费；两者之间不存在其他状态。这使得编写复杂的业务逻辑变得困难。即使赋予脚本更多能力，与仅使用账户相比，它也会变得更加复杂。由于以太坊的目标是超越加密货币，并适应各种不同用例（通过\
  \ DApps），因此基于账户的系统几乎是不可避免的。\n- **轻客户端引用**：与比特币客户端不同，以太坊客户端应用可以通过在状态树中沿特定方向扫描，轻松快速地访问与某个账户相关的所有数据。在\
  \ UTXO 模型中，对于所考虑的特定交易，通常存在多个对多笔交易的引用。\n\n#### 账户状态\n\n我们了解到每个账户都有一个与之关联的状态。我们还了解了以太坊中存在的两种账户：一种是合约账户，另一种是外部拥有账户（EOA）。无论账户类型如何，它们都由区块头中的\
  \ `stateRoot` Merkle 根跟踪，并可能如图 4-6 所示。\n\n![A440588_1_En_4_Fig6_HTML.jpg](img/A440588_1_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6：放大查看账户状态表示\n\n如图所示，无论账户是 EOA 还是合约账户，它都有以下四个组成部分：\n\n- **账户余额**：账户中的“以太”总余额。更准确地说，是该地址拥有的\
  \ `Wei` 数量（`1ETH = 10¹⁸ Wei`）。\n- **CodeHash**：这是“代码”的哈希值。每个合约账户都有在 EVM 上执行的“代码”。该代码的哈希值存储在此\
  \ `CodeHash` 字段中。然而，对于 EOA 账户，没有“代码”，因此 `CodeHash` 字段包含空字符串的哈希值。\n- **StorageRoot**：这是编码账户存储内容的\
  \ Merkle 树的 256 位根哈希。MPT 对存储内容的哈希值进行编码。将树的根哈希保存在 `StorageRoot` 字段中，有助于跟踪账户的内容并确保其完整性。\n\
  - **Nonce**：这是一个计数器，确保每笔交易只被处理一次。对于 EOA，此数字表示从该账户地址发出的交易数量。对于合约账户，它表示由该账户创建的合约数量。\n\
  \n因此，正是“状态”树负责跟踪以太坊区块链的状态变化。然而，有一点棘手的是，状态并非直接存储在每个区块中，而是以递归长度前缀（RLP）编码的状态数据形式存储在每个以太坊节点的\
  \ MPT 中。因此，为了维护全局状态，以太坊区块链在每个区块中都包含了“状态根”，该根存储了表示区块创建时系统状态的哈希树的 Merkle 根。\n\n根据以太坊黄皮书，“世界状态”是地址（160\
  \ 位标识符）与账户状态之间的映射。因此，世界状态包含了区块链上所有账户的信息，但并未存储在每个区块中。每个区块只修改状态的一部分。在某种程度上，世界状态是通过处理自创世区块以来的每个区块而生成的。某些以太坊节点可以选择通过保留所有历史交易（即状态转换及其输出）来维护所有历史状态。这允许客户端在任何时候查询区块链的状态，即使是历史状态，也无需从头重新计算所有内容。检索状态信息类似于\
  \ SQL 中的聚合查询，数据随时可用，仅需进行聚合。因此，旧的状态数据可以很容易地被丢弃（这称为“修剪”），因为在需要时可以重新计算出来。嗯，状态数据按设计是隐式数据，这意味着状态信息只应被计算出来。\n\
  \n\n  \n#### Trie 的使用  \n\n我们学习了三种以区块头为根节点的 Trie。这些根节点本质上是指向这三个 Trie 的指针。虽然在之前的章节中我们已经简要概述了这些\
  \ Trie，但让我们换个角度重新审视它们：  \n\n- **状态 Trie**：表示访问区块后的整个状态（即全局状态）。  \n- **交易 Trie**：表示区块中按索引编号的所有交易（例如，key:0\
  \ 对应第一条执行的交易，key:1 对应第二条交易，以此类推）。请回想我们之前学过的 MPT 基础知识并尝试关联理解。  \n- **收据 Trie**：表示与每笔交易对应的“收据”。交易的收据是一个经过\
  \ RLP 编码的数据结构，如下所示：  \n\n```\n[medstate, gas_used, logbloom, logs]\n```\n\n由于我们尚未深入探讨收据\
  \ Trie 的基础知识，现在让我们更详细地研究它。请查看收据 Trie 的 RLP 编码数据结构中的所有字段，并阅读以下针对这些字段的说明：  \n\n- **`medstate`**：处理交易后的状态\
  \ Trie 根。成功的交易会更新以太坊状态。  \n- **`gas_used`**：处理该交易消耗的 Gas 总量。  \n- **`logs`**：一个包含以下格式项目的列表：\
  \  \n\n```\n[address, [topic1, topic2...], data]\n```  \n\n- 这些列表项由 `LOG0`、`LOG1`……\
  \ 等操作码在交易执行过程中生成。`address` 字段是生成日志的合约地址，`topic` 字段包含最多四个 32 字节的值，`data` 字段是任意大小的字节数组。\
  \  \n- **`logbloom`**：由交易中所有日志的地址和主题构成的布隆过滤器。这与区块头中的布隆过滤器不同。  \n\n#### 默克尔帕特里夏树\
  \  \n\n在以太坊中，账户与其各自的状态一一映射。所有以太坊账户（包括外部拥有账户和合约账户）与其状态之间的映射统称为“世界状态”。以太坊用于存储这种映射关系的数据结构是\
  \ MPT。因此，MPT 是以太坊中使用的主要数据结构，也称为默克尔帕特里夏树。我们在比特币章节中学习了默克尔树，这已经帮助我们理解了 MPT 的一半内容。MPT\
  \ 实际上融合了默克尔树和帕特里夏树的特点。  \n\n回想比特币章节，默克尔树是一种二叉哈希树，其中叶节点包含数据块的哈希值，每个非叶节点包含其子节点的哈希值。实现这种数据结构后，可以轻松验证某笔交易是否属于某个区块。只需从整个区块中提取少量信息（即仅使用默克尔分支而非整个树），就能非常简便地提供成员证明。默克尔树在去中心化系统中实现了高效且安全的内容验证。轻客户端无需下载每笔交易和每个区块，只需下载区块头链——每个区块仅需\
  \ 80 字节的数据块，其中仅包含五项内容：前一个区块头的哈希、时间戳、挖矿难度、满足工作量证明的随机数值，以及包含该区块所有交易的默克尔树根哈希。虽然这非常实用且有趣，但请注意，除了验证区块中某笔交易的成员证明外，其功能有限。一个明显的限制是，它无法证明关于当前状态的任何信息（例如数字资产总量、名称注册、金融合约状态）。即使要查询你持有多少比特币，也需要大量查询和验证工作。\
  \  \n\n另一方面，帕特里夏树是基数树的一种形式。PATRICIA 代表“检索字母数字编码信息的实用算法”。帕特里夏树支持高效的插入/删除操作。其中键值查找效率极高，键始终编码在路径中。因此，`key`\
  \ 是从根节点到存储 `value` 的叶节点所经过的路径。键通常是帮助向下遍历路径的字符串，每个字符指示应跟随哪个子节点才能到达叶节点并找到其中存储的值。 \
  \ \n\n因此，MPT 提供了一种加密认证的数据结构，用于存储以太坊中的所有（`key`，`value`）绑定。它具有完全确定性，这意味着具有相同（`key`，`value`）绑定的帕特里夏树将完全一致，直至最后一个字节。插入、查找和删除操作效率很高，复杂度为\
  \ `O(log(n))`。由于 MPT 中的默克尔树部分，节点的哈希值被用作指向该节点的指针，MPT 据此构建，其中：  \n\n```\nKey == SHA3(RLP(value))\n\
  ```  \n\n默克尔部分提供了防篡改且确定性的树形结构，而帕特里夏部分则提供了高效的信息检索功能。因此，如果你仔细观察，MPT 中的根节点会成为整个数据结构的加密指纹。在以太坊点对点网络中，当交易通过线缆广播时，每个接收到交易的挖矿节点会将其组装起来。这些节点随后形成一棵树（即\
  \ Trie），并计算根哈希以包含在区块头中。交易在本地以树结构存储，但在序列化为列表后会被发送到其他节点或客户端。接收方必须将其反序列化回交易树，以验证根哈希。另外请注意，在以太坊中，MPT\
  \ 经过轻微修改以更好地适应以太坊实现。它不再使用二进制，而是使用十六进制——源自包含 16 个字符的“字母表”。因此，树或 Trie 中的节点有 16 个子节点（16\
  \ 字符十六进制字母表）和最大深度 X。需要说明的是，十六进制字符在许多地方被称为“半字节”。  \n\n以太坊中 MPT 的基本思想是：对于单次操作，它只会修改最少数量的节点来重新计算根哈希。这样可以将存储和复杂度保持在最低水平。\
  \  \n\n\n\n#### RLP 编码\n\n你一定已经注意到我们在前面的章节中提到了 RLP 编码。在本节中，我们将简要介绍它的概念。RLP 是递归长度前缀（Recursive\
  \ Length Prefix）的缩写。这是一种在以太坊中用于区块、交易以及在线传输数据时的线协议消息的序列化方法，同时也用于在帕特里夏树中保存账户状态数据。通常，当复杂的数据结构需要存储或传输，并在接收端重新构建以进行处理时，对象序列化是一种良好的实践。从这个意义上说，RLP\
  \ 类似于 JSON 和 XML，但 RLP 被认为更加精简、节省空间、易于实现，并且能保证绝对的字节级完美一致性。这就是为什么 RLP 被选为以太坊主要序列化技术的原因。它的唯一目的是存储原始字节的嵌套数组。它也不试图定义任何特定的数据类型，例如布尔值、浮点数、双精度浮点数、整数等，并且仅设计用于以嵌套数组的形式存储结构。RLP\
  \ 并不显式支持键/值映射。因此，建议将此类映射表示为 `[[k1, v1], [k2, v2], …]`，其中 `k1`、`k2`……按字典序排列（使用标准的字符串排序方式）。或者，也可以使用更高级别的[帕特里夏树](https://github.com/ethereum/wiki/wiki/Patricia-Tree)编码，该编码具有固有的\
  \ RLP 编码方案。\n\n请记住，RLP 仅用于编码数据的结构，并且完全不了解被编码对象的类型。虽然它有助于减小原始字节编码数组的大小，但解码端必须知道它试图解码的对象类型。\n\
  \n#### 以太坊交易与消息结构\n\n在上一节中，我们了解了区块结构以及区块头中的不同字段。为了使交易能够被矿工或以太坊节点验证，它必须具有标准化的结构。一个典型的以太坊交易（例如，通过本书后面将介绍的\
  \ `sendRawTransaction()` 传入的交易）包含以下字段：\n\n* `nonce`：一个整数，只是一个计数器，等于发送方账户发送的交易数量，即交易序列号。\n\
  * `gasPrice`：你愿意为每单位 gas 支付的 Wei 数量。\n* `gasLimit`：执行此交易时应使用的最大 gas 量，这也限制了交易执行允许的最大计算步数。\n\
  * `To`：接收方的 160 位地址或合约地址。对于用于创建合约的交易（这意味着合约地址尚不存在），此字段保持为空。\n* `Value`：交易发送方要转移到接收方的总以太币（Wei\
  \ 数量）。\n* `V`、`r`、`s`：与交易的 ECDSA 签名相对应的值；也表示此交易的发送方。\n* `init`：这实际上不是可选字段，仅用于创建合约的交易。此字段可以包含一个不限大小的字节数组，指定用于账户初始化过程的\
  \ EVM 代码。`init` 操作码仅用于初始化新的合约账户，之后就会被丢弃。它在将账户代码与合约账户关联后返回账户代码的主体。请记住，这种关联是永久性的，并且永远不会改变。\n\
  * `Data`：一个可选字段，可以包含要发送给合约或简单账户的消息。默认情况下，它本身没有特殊功能，但 EVM 有一个操作码——合约可以使用该操作码访问此数据字段，执行必要的计算并将其存储在存储中。\n\
  \n请注意，上述字段按指定顺序提供，并且除了字段名称外，全部都是 RLP 编码的。因此，以太坊交易实际上是一个包含了这些字段的已签名数据包。`gasPrice`\
  \ 和 `gasLimit` 字段对于防止拒绝服务攻击非常重要。为了防止代码中出现意外或故意的无限循环或其他计算浪费，每笔交易都需要设置一个限制，规定其可以使用的代码执行计算步数。\n\
  \n以太坊交易实际上是“状态转换函数”，因为一笔成功的交易会改变状态。此外，正如我们之前在“账户状态”部分中了解到的，这些交易的结果可以被存储。\n\n另一方面，以太坊消息类似于交易，但仅由合约账户触发，而不是由外部拥有账户触发。此外，消息仅用于合约账户之间，因此它们也被称为“内部交易”。所以，合约能够向其他合约发送消息。\n\
  \n通常，当合约在执行其代码时遇到 `CALL` 或 `DELEGATECALL` 操作码时，就会产生一条消息。因此，消息更像是存在于以太坊执行环境中的函数调用。还需要注意的一点是，消息始终是原始的，永远不会被序列化或反序列化。一条消息包含以下字段：\n\
  \n* `Sender`：作为隐式选项的消息发送方。\n* `Recipient`：要发送到的接收方合约地址。\n* `Value`：随消息一起转移到合约地址的\
  \ Wei 数量。\n* `Data`：可选字段，但可以包含发送方提供的、供接收方合约使用的输入数据。\n* `gasLimit`：限制消息触发时，代码执行可以消耗的最大\
  \ gas 量的值。它也被称为“startGas”。\n\n\n\n我们研究了交易和消息。以太坊交易可以是从外部拥有账户（EOA）到外部拥有账户（EOA），或者从外部拥有账户（EOA）到合约账户。还存在另一种情况，即从外部拥有账户（EOA）发起的交易是为了创建合约账户（回想一下我们刚刚介绍的“`init`”字段）。现在，思考一下交易到底是什么？它无疑是外部世界与以太坊区块链之间的桥梁，但除此之外呢？如果你放大一笔交易，你会看到它是一条由外部拥有账户（EOA）签名发起的指令，该指令被序列化并提交至区块链。请参见图\
  \ 4-7。\n\n![A440588_1_En_4_Fig7_HTML.jpg](img/A440588_1_En_4_Fig7_HTML.jpg)\n\n\
  图 4-7\n\n交易发起——放大视图\n\n交易被注入区块链后会发生什么？如果它被验证有效，就会在每个以太坊节点上开始执行。在此交易执行过程中，以太坊被设计为跟踪“子状态”以追踪执行流程。这是因为，如果交易因“`gas`耗尽”而未能完成，则必须回滚到目前为止的整个执行过程。此外，执行过程中收集的信息在交易完成后也立即需要。因此，子状态包含以下内容：\n\
  \n- **自毁集合**：一组在交易完成后将被丢弃的账户（如果有的话）\n- **日志系列**：归档且可索引的 EVM 代码执行“检查点”，用于追踪合约调用\n\
  - **退款余额**：交易执行后应退还给发送者账户的金额。以太坊中的存储相当昂贵，因此 EVM 中有一条`SSTORE`指令被用作退款计数器。退款计数器从零开始（无退款状态），每当交易或合约从存储中删除某些内容时，它就会递增。请注意，此退款金额与退还给发送者的未使用的`gas`不同，且是额外支付的。\n\
  \n在以太坊的早期版本中，无论交易或合约是成功执行还是中途失败，所有已使用的`gas`都会被消耗。这有时并不合理。如果执行因某些授权/权限问题或其他问题而停止，执行会停止，但剩余的`gas`仍然会被消耗。最近的拜占庭升级引入了类似异常处理的“`revert`”代码。如果合约需要停止，可以使用“`revert`”来回滚状态更改，返回失败原因，并将剩余`gas`记回发送者账户。交易或合约成功执行后，会发生状态转换，我们将在后续章节中深入探讨。\n\
  \n就像我们查看`blockchaininfo`来了解实时比特币交易一样，如果你查看以太坊的网站（`https://etherscan.io`），将会找到以下信息：\n\
  \n![A440588_1_En_4_Figa_HTML.jpg](img/A440588_1_En_4_Figa_HTML.jpg)\n\n#### 以太坊状态转换函数\n\
  \n在上一节中，我们了解了以太坊交易和消息。我们现在知道，每当交易成功完成时，就会发生状态转换。因此，以太坊中的状态转换函数是：\n\n```\nAPPLY(S,Tx)\
  \ -> S'    \\\\where S is old state and S' is the new state\n```\n\n请参见图 4-8。\n\n\
  ![A440588_1_En_4_Fig8_HTML.jpg](img/A440588_1_En_4_Fig8_HTML.jpg)\n\n图 4-8\n\n以太坊状态转换函数\n\
  \n因此，当`Tx`应用于状态`S`以产生改变的状态`S'`时，状态转换函数可以定义如下：\n\n- 验证交易是否格式正确。\n    - 具有正确数量的值。\n\
  \    - 签名有效。\n    - `nonce`与发送者账户中的`nonce`匹配。如果上述任何一点无效，则返回错误。\n- 计算费用并结算账户。\n \
  \   - 将交易费用计算为`gasLimit * gasPrice`。\n    - 从签名中确定发送地址。\n    - 从发送者账户余额中减去费用，并递增发送者的`nonce`。如果没有足够的余额支付，则返回错误。\n\
  - 初始化`GAS = gasLimit`，并扣除一定量的`gas`（按字节计算）作为交易费用。\n- 将交易价值（可以是任何有价值的东西）从发送者账户转移到接收账户。请注意，交易可以用于任何具有内在价值的东西，如土地、车辆、ERC20\
  \ 代币等，但`gas`价格必须以以太币计价，以便矿工接受交易。如果接收账户尚不存在，则创建它。如果接收账户是合约而非外部拥有账户（EOA），则运行合约代码，直至完成或执行耗尽`gas`。请注意，合约代码会在每个节点的\
  \ EVM 上作为区块验证过程的一部分执行，以便区块以及合约执行后的输出成为主区块链的一部分。\n- 如果因为发送者没有足够的资金或代码执行耗尽`gas`而导致价值转移失败，则回滚除费用支付之外的所有状态更改（这要归功于\
  \ MPT 实现），并将费用添加到矿工账户。\n- 否则，将所有剩余`gas`的费用退还给发送者，并将已为消耗的`gas`支付的费用发送给矿工。\n\n\n\n\
  #### Gas 与交易成本\n\n以太坊上的交易基于“Gas”运行，这是以太坊中的基本计算单位。每笔交易，无论是发送到外部账户（EOA）还是合约，都必须指定\
  \ `gasLimit` 和 `gasPrice` 来计算费用。这笔费用支付给矿工，以补偿他们贡献的资源以及执行的工作。显然，矿工可以选择是否包含该交易并收取费用，这与比特币类似。\n\
  \n通常，一个计算步骤只需消耗 1 个 Gas，但某些计算密集型或存储密集型操作的成本更高。每字节的交易数据大约需要 5 个 Gas。看看下面这些示例：两个数相加（使用\
  \ EVM 操作码 `ADD`）大约需要 3 个 Gas；两个数相乘（使用 EVM 操作码 `MUL`）大约需要 5 个 Gas；计算哈希值（`SHA3`）大约需要\
  \ 30 个 Gas（显然这是计算密集型操作）。存储成本也以类似方式计算，但出于充分理由，其成本相当高。根据设计，一笔交易可以包含无限量的数据。每字节非零交易数据需要花费\
  \ 68 Gas。在“合约”中存储一个 256 位的字，大约需要 20,000 Gas。你可以在以太坊黄皮书中找到更多操作码及其对应的价格。那么总成本就是将所需\
  \ Gas 量乘以 `gasPrice`。与比特币不同，以太坊的成本计算更为复杂。它考虑了带宽、存储和计算成本。拥有这样的费用计算机制，可以防止攻击者试图注入无限循环进行计算（导致拒绝服务攻击）或通过存储无意义数据来消耗更多空间。\n\
  \n一笔交易的总以太币成本实际上取决于交易消耗的 Gas 量，乘以交易发起人在交易中指定的每单位 Gas 的价格。另一方面，矿工有一套策略来决定收取的 Gas\
  \ 价格，这应该是交易发送方必须指定的最低金额，以确保交易不会被矿工拒绝。那么，如何计算一笔交易的总成本呢？不是近似值，而是实际成本？交易的总“以太币”成本基于两个因素：`gasUsed`\
  \ 和 `gasPrice`。总成本 = `gasUsed * gasPrice`。`gasUsed` 部分是在执行 EVM 指令的操作码时消耗的总 Gas，而\
  \ `gasPrice` 是用户指定的价格。\n\n如果计算步骤（包括交易、消息以及可能触发的任何子消息）所使用的 Gas 总量小于或等于 `gasLimit`，则该交易会被矿工处理。然而，如果总\
  \ Gas 超过了 `gasLimit`，则所有更改都会回滚（尽管这是一笔有效交易），但矿工仍然可以收取费用。那么，多余的 Gas 会怎样呢？交易执行后所有未使用的\
  \ Gas 会以以太币的形式退还给发送方。发送方无需担心超额支付，因为他们只需为实际消耗的 Gas 付费。这无疑意味着，设定一个远高于预估值的 Gas 上限来发送交易既重要又安全。同时，也建议不要支付过高的\
  \ `gasPrice`，而是使用来自 [`https://ethgasstation.info/`](https://ethgasstation.info/)\
  \ 的平均 Gas 价格。\n\n让我们逐一梳理在以太坊网络中发起一笔交易时的每个步骤，以便对流程建立具体的理解：\n\n*   每笔交易必须定义其愿意花费的\
  \ `gasLimit`（`gasLimit` 也称为 `startGas`），以及每单位 Gas 愿意支付的费用（`gasPrice`）。在开始执行时，价值为\
  \ `gasLimit * gasPrice` 的以太币会从交易发送方的账户中扣除。请记住，这并非交易的实际总成本（在理想情况下应略高于此）。只有在交易完成后，其实际成本（`gasUsed\
  \ * gasPrice`）才会确定，并据此对最初从发送方账户中扣除的金额（`gasLimit * gasPrice`）进行调整，余额会返还给发送方。在交易开始时就直接扣除金额（`gasLimit\
  \ * gasPrice`），是因为存在一种可能性，即发送方在发起的交易执行中途可能破产。\n*   交易执行期间的所有操作，包括数据库读写、消息传递以及 EVM\
  \ 执行的每一个计算步骤（例如加法、减法、哈希等），都会消耗一定量的 Gas，这些消耗量是预定义的。\n*   正常交易是指成功执行且未超过指定 `gasLimit`\
  \ 的交易。对于此类交易，应会剩余一些 Gas，记为 `gas_rem`。交易成功执行后，交易发送方会收到 `gas_rem * gasPrice` 的退款，而该区块的矿工会获得\
  \ `(gasLimit - gas_rem) * gasPrice` 的奖励。\n*   如果一笔交易在成功完成前 Gas 耗尽，则所有执行都会回滚，但该交易仍然有效。在这种情况下，交易的唯一结果是全部金额\
  \ `gasLimit * gasPrice` 都归矿工所有。\n*   对于合约账户，当合约向另一个合约发送消息以进行子执行时，它也可以选择设置一个 `gasLimit`。此选项专门用于该消息引发的子执行，因为被调用的合约可能存在无限循环。如果子执行\
  \ Gas 耗尽，则子执行会回滚，这可以保护系统免受此类无限循环或蓄意的拒绝服务攻击企图。消耗的 Gas 仍然会被分配并归矿工所有。另外请注意，当消息由合约触发时，只有指令消耗\
  \ Gas，消息中的数据不消耗任何 Gas。这是因为来自父合约的数据无需再次复制，只需通过指针引用即可。\n\n以太坊的第一个版本（Frontier）的默认 Gas\
  \ 价格为 0.05e12 WEI（即以太币的最小面额）。在第二个版本（Homestead）中，默认 Gas 价格降到了 0.02e12 WEI。你可能会想，为什么\
  \ Gas 和以太币要相互解耦，而不是使用一个单一的计量单位，那样会更简单。其实，这是有意为之的设计，因为 Gas 单位与具有自然成本的计算单位（例如，每次计算的成本）很好地对应，而以太币的价格通常会因市场力量而波动。\n\
  \n我们已经知道，参与网络的每个以太坊节点都会运行 EVM，作为区块验证协议的一部分。这意味着所有节点都（冗余且并行地，但对于达成共识至关重要）执行同一组交易和合约。虽然这种冗余自然会使成本变得高昂，但也存在一种激励，促使人们不要将区块链用于那些可以在链下完成的计算（博弈论！）。\n\
  \n\n\n通常，每笔交易会收取 `21,000` gas 作为“基础费用”，以覆盖从签名计算发送方地址的椭圆曲线运算成本，以及存储交易的磁盘空间费用。有多种方法可以估算交易和合约的\
  \ gas 需求。例如：`estimateGas` 是一个估算某个函数 gas 需求的 Web3 函数。此外，要估算总成本，`gasPrice` 预言机是 `geth`\
  \ 客户端中的一个辅助函数，而 `web3.eth.getGasPrice` 是一个用于查找近似 gas 价格的 Web3 原生函数。以下是可在 `Truffle`\
  \ 中使用的示例代码：\n\n```\nvar MyContract = artifacts.require(\"./MyTest.sol\");\n// getGasPrice\
  \ 返回以 Wei 为单位的 gas 价格\nMyContract.web3.eth.getGasPrice(function(error, result){\n\
  var gasPrice = Number(result);\nconsole.log(\"当前 gas 价格为 \" + gasPrice + \" wei\"\
  );\n// 获取合约实例\nMyContract.deployed().then(function(instance) {\n// 检索函数 giveAwayDividend()\
  \ 的 gas 估算\nreturn instance.giveAwayDividend.estimateGas(1);\n}).then(function(result)\
  \ {\nvar gas = Number(result);\nconsole.log(\"总 gas 估算 = \" + gas + \" units\");\n\
  console.log(\"总交易成本估算（以 Wei 计）= \" + (gas * gasPrice) + \" wei\");\nconsole.log(\"\
  总交易成本估算（以 Ether 计）= \" + MyContract.web3.fromWei((gas * gasPrice), 'ether') + \"\
  \ Ether\");\n});\n});\n交易成本估算的示例代码\n```\n\n在 Solidity 中编写智能合约时，许多人更喜欢使用 `constant`\
  \ 函数在链下执行某些计算，或只是向本地区块链发起 RPC 查询。由于这类 `constant` 函数不会改变区块链状态，因此在某种程度上它们无需成本，因为它们不消耗\
  \ gas。如果在任何交易中使用 `constant` 函数，则极有可能需要支付 gas 费用。\n\n现在，我们来了解区块的 gas 限额。回想一下，比特币有\
  \ 1MB 区块大小的预定义限制，而比特币现金有 2MB 的区块大小限制。矿工会尽可能多地积累能塞进这些区块的交易。然而，以太坊限制区块大小的方法截然不同。在以太坊中，区块大小由区块\
  \ gas 限额控制。不同交易有不同的 gas 限额；因此，根据区块 gas 限额，一定数量的交易会被组合在一起，使总交易 gas 限额小于区块 gas 限额。不同的矿工可以有不同的交易集合，他们愿意将其放入一个区块中。区块\
  \ gas 限额是动态计算的。以太坊协议允许区块的矿工将其区块 gas 限额向任一方向调整 `1/1024`（`0.0976%`）的因子。以太坊网络上的矿工使用诸如\
  \ `ethminer` 这样的挖矿程序。`ethminer` 是一个以太坊 GPU 挖矿工作端，它连接到 `geth` 或 Parity 以太坊客户端节点。`geth`\
  \ 和 Parity 都有矿工可以更改的选项。\n\n### 以太坊智能合约\n\n与仅作为加密货币的比特币不同，以太坊的功能远不止于此——这要归功于智能合约。在前面的章节中学习合约账户时，我们已对智能合约有了初步了解。虽然我们将在后续章节深入探讨智能合约的开发方面，但本节我们将详细探究智能合约的真正本质。\n\
  \n首先，我们来谈谈它为什么叫这个名字？请注意，智能合约本身并没有什么“智能”可言。只有当你在其中编写了智能逻辑时，它才变得智能，而正是以太坊的优美之处让你能够做到这一点。让我们总结一下目前对以太坊智能合约的学习成果：\n\
  \n- 智能合约存在于以太坊区块链内部。\n- 它们有自己的账户，因此拥有地址和余额。\n- 它们能够发送消息和接收交易。\n- 它们在收到交易时被激活，并且也可以被停用。\n\
  - 与其他交易一样，它们也需要支付执行费和存储费。\n\n以太坊中的所有代码，包括智能合约，都会被编译成一种低级、基于堆栈的字节码语言，称为 EVM 代码，该代码在\
  \ EVM 上运行。用于编写智能合约的流行高级语言包括 Solidity、Serpent 和 LLL，它们各自的编译器会将高级代码转换为 EVM 字节码。我们了解了如何由任何外部代理（如\
  \ EOA）将合约添加到区块链中。由于以太坊中的计算和存储非常昂贵，因此建议尽可能以简单和优化的方式编写逻辑。当智能合约部署到以太坊区块链网络后，任何人都可以调用该智能合约的函数。这些函数通常内置了安全特性，以防止未经授权的访问；尽管如此，仍可能有人尝试调用，但不会成功。\n\
  \n如果你尝试想象一个以太坊区块链区块内的智能合约，它可能会如图 4-9 所示。\n\n![A440588_1_En_4_Fig9_HTML.jpg](img/A440588_1_En_4_Fig9_HTML.jpg)\n\
  \n图 4-9\n\n与区块相关的以太坊智能合约\n\n现在，我们以投票应用程序为例。一个智能合约被编写出来，它具有一个地址（合约账户地址），并且根据其创建时间，成为区块链中某个区块的一部分。投票者可以向该地址发送交易（即投票）。合约代码的编写方式是：每收到一笔交易就增加一次投票计数，并在一定时间后自动终止，公布投票结果（以太坊状态变化）。请参见图\
  \ 4-10，以获取高层次理解的图示。\n\n![A440588_1_En_4_Fig10_HTML.jpg](img/A440588_1_En_4_Fig10_HTML.jpg)\n\
  \n图 4-10\n\n一个包含智能合约逻辑的应用程序\n\n#### 合约创建\n\n回想一下，我们学过合约创建交易，其唯一目的就是创建一个合约。与其他类型的交易相比，它稍有不同。因此，在触发合约创建交易来创建合约账户之前，必须先初始化所有类型账户都具备的四个属性：\n\
  \n- `nonce` 初始应设置为零。\n- `账户余额` 应设置为发送方转移的价值（以 Ether 为单位），并且相同金额必须从发送方账户中扣除。\n- `StorageRoot`\
  \ 应为空。\n- 合约的 `codeHash` 应设置为空字符串的 Keccak 256 位哈希值。\n\n初始化账户后，就可以使用随交易发送的 `init`\
  \ 代码（该代码执行实际工作）来创建账户。`init` 代码中可以定义一系列操作，其执行可能会影响执行状态之外的一些事件，例如：\n\n- 可以更改账户的 `storage`。\n\
  - 可以创建更多账户。\n- 可以触发进一步的消息调用。\n\n\n\n### 以太坊虚拟机与代码执行\n\n以太坊是一个可编程的区块链，允许用户通过图灵完备的语言创建任意复杂度的自定义操作。`EVM`是以太坊的执行引擎，作为智能合约的运行时环境。它是以太坊相较于其他区块链系统最核心的创新，正是基于`EVM`，智能合约技术有望迈向新的创新高度，而竞争已然开启。`EVM`在交易执行、改变以太坊状态以及达成共识方面也扮演着关键角色。`EVM`的设计目标如下：\n\
  \n- **简洁性**：其理念是使用底层结构让`EVM`尽可能简单。因此，底层操作码的数量被控制在最小范围，数据类型也同样精简，但仍可使用这些结构便捷地编写复杂逻辑。共有\
  \ 160 条指令，其中 65 条在逻辑上互不相同。\n- **绝对确定性**：确保使用相同输入集执行指令能产生相同输出集（确定性！），有助于维护`EVM`的完整性，避免任何歧义。确定性结合“计算步骤”的概念，有助于以极高精度估算燃料费用。\n\
  - **空间优化**：在去中心化系统中，节省空间是最大的考量。因此，`EVM`汇编被设计得尽可能紧凑。\n- **针对原生操作调优**：`EVM`针对某些原生操作进行了调优，例如密码学中使用的特定算术类型（模运算）、读取区块或交易数据、与“状态”交互等。另一个例子是：为存储加密哈希值而采用\
  \ 256 位（32 字节）字长，`EVM`在此字长上进行整数运算。\n- **易于保障安全**：在某种程度上，燃料价格有助于确保`EVM`无法被利用。如果没有成本，攻击者就可以想方设法持续攻击系统。由于`EVM`上的几乎每一项操作都需要消耗燃料，因此在`EVM`上设计出良好的燃料成本模型应该是相对容易的。\n\
  \n我们了解到，以太坊网络中的每个参与节点都在本地运行`EVM`，执行所有交易和智能合约，并在本地保存最终状态。正是`EVM`将代码（智能合约）和数据写入区块链，并执行以图灵完备语言编写的交易代码和智能合约代码的指令（操作码）。也就是说，`EVM`充当以太坊智能合约的运行时环境，并确保代码的安全执行。显然，当代码或交易通过各自的数字签名验证后，它们会在`EVM`上执行。因此，只有通过`EVM`成功执行指令后，以太坊的状态才能发生改变。\n\
  \n除非将`EVM`与网络其余部分连接以参与 P2P 网络，否则它可以与主网络隔离。在隔离的沙盒环境中，`EVM`可用于测试智能合约，有助于构建更完善、更健壮且可投入生产的智能合约。\n\
  \n为了更深入地理解智能合约如何利用`EVM`工作，我们需要了解数据如何在任何`EVM`语言（例如`Solidity`、`Serpent`以及未来可能出现的语言）中进行组织、存储和操作。你可以将`EVM`视为一个数据库引擎。虽然我们不会深入探讨`Solidity`编程基础知识，但在本节中，我们将看到它如何与`EVM`交互。请看图\
  \ 4-11。\n\n![A440588_1_En_4_Fig11_HTML.jpg](img/A440588_1_En_4_Fig11_HTML.jpg)\n\
  \n图 4-11\n\n智能合约部署与使用\n\n现在我们来理解`EVM`的内存管理。请看`EVM`遵循的以下三种策略：\n\n- **存储（持久化）**：\n\
  \  - 键值存储映射（即 256 位到 256 位的字映射）。这意味着键和值都是 256 位（即 32 字节）。\n  - 在合约内部无法枚举存储内容。\n\
  \  - 在任何时间点，合约的状态可由称为“状态变量”的合约级变量决定，这些变量始终位于“存储”中，并且在运行时无法更新。这意味着存储结构仅在合约创建时设置一次，之后无法更改。但可以通过`sendTransaction`调用改变其内容。\n\
  \  - 读取/更新存储是一项昂贵的操作。\n  - 合约不能读取、写入或更新任何不属于自己的存储空间。\n  - `SSTORE`/`SLOAD`是常用的指令。例如：`SSTORE`指令从栈中弹出顶部两项，将第一项视为索引，并将第二项插入到合约存储中该索引位置。\n\
  - **内存（易失性）**：\n  - 类似于通用计算机系统中任何代码或应用执行所需的 RAM，用于存储临时值。\n  - 合约在执行期间可以通过付费使用任意数量的内存，执行完成后该内存空间会被清理。执行期间的输出可以推送到持久化存储中，供后续执行复用。\n\
  \  - 与存储不同，内存实际上是一个连续的字节数组，按 256 位（32 字节）的块进行分配。\n  - 初始时没有空间，并以 32 字节块为单位占用空间。\n\
  \  - 如果没有`memory`关键字，像`Solidity`这样的智能合约语言会在存储中声明变量以实现持久化。\n  - 内存不能在智能合约级别使用，只能在方法内部使用。\n\
  \  - 函数参数几乎总是在内存中。\n  - `MSTORE`/`MLOAD`是常用的指令。\n- **栈**：\n  - `EVM`基于栈，因此遵循后进先出原则，栈用于执行计算。\n\
  \  - 栈条目也是 256 位字，用于模拟 256 位伪寄存器。它们用于保存“值”类型的局部变量，以及向指令或函数传递参数、进行内存操作和其他算法操作。\n\
  \  - 最多允许 1024 个元素，且使用几乎免费。\n  - 大部分栈操作限于栈顶区域。其执行方式与比特币脚本的执行方式非常相似。\n\n当`EVM`运行且字节码随交易注入执行时，其完整计算状态可由以下元组定义：`[block_state,\
  \ transaction, message, code, memory, stack, pc, gas]`。\n\n你现在应该能理解所有这些字段了。它们包含我们讨论过的三种内存类型（`block_state`字段代表全局状态，用于存储）。`PC`字段类似于栈中待执行指令的指针。\n\
  \n在以太坊中，应用程序二进制接口（ABI）是一种抽象，它并非[以太坊核心协议](https://github.com/ethereum/yellowpaper)的一部分，但作为一种标准实践，用于访问智能合约中的字节码。虽然任何人都可以为其合约定义自己的\
  \ ABI 并遵守它以获得期望的输出，但使用`Solidity`会更简单。ABI 的目的如下：\n\n- 如何以及调用智能合约中的哪些函数\n- 信息作为输入传递给智能合约函数时应采用的二进制格式\n\
  - 调用函数后，预期函数执行结果输出的二进制格式\n\n有了 ABI 规范，用两种不同语言编写的两个程序可以更容易地相互交互（尽管可能并非必需）。\n\n\n\n\
  ## 以太坊生态\n\n我们学习了核心组件，以理解以太坊实际上的运作方式。以太坊存在一些固有的局限性，例如：\n\n- `EVM` 速度缓慢；不适用于大型计算。\n\
  - 区块链上的计算和存储成本高昂；建议使用链下计算，并采用 `IPFS`/`Swarm` 进行存储。\n- 可扩展性是个问题；有多种技术方案应对，但这些方案取决于你处理的具体业务场景。\n\
  - 私有链更有可能蓬勃发展。\n\n现在，让我们看一下以太坊技术栈，以从高层次了解以太坊生态。\n\n### Swarm\n\n它不仅是一个以 P2P 方式存储静态文件的分布式存储平台，还是一个分发服务。`Swarm`\
  \ 确保了以太坊区块链数据、DApp 代码等内容的充分去中心化和冗余存储。与万维网不同，上传到 `Swarm` 的内容并非集中于单一网络服务器。它被设计为具有零停机时间，并且能够抵御\
  \ DDOS 攻击，具备容错能力。\n\n### Whisper\n\n它是一种通信协议，允许 DApp 之间相互通信。它提供了分布式且私密的消息传递功能，支持单播、多播和广播消息。\n\
  \n### DApp\n\n一个 DApp 通常由前端和后端两部分组成。后端代码在由智能合约编码的实际区块链上运行。前端代码和用户界面可用任何语言编写，例如 HTML、CSS\
  \ 和 JavaScript，只要它能调用其后端即可。此外，前端可以托管在像 `SWARM` 或 `IPFS` 这样的去中心化存储上，而不是中心化的网络服务器上。\n\
  \n用户界面组件将缓存在某种去中心化的、类似 BitTorrent 的云端，并在需要时由 ÐApp 浏览器拉取。就像任何应用商店一样，可以在浏览器中浏览分布式\
  \ DApp 的目录。最终用户可以在其浏览器中安装任何感兴趣的 DApp。\n\n### 开发组件\n\n用于在以太坊上开发去中心化应用并与之交互的组件有很多。以下是几个流行的组件，但还有更多组件等待你去探索。我们将简要了解它们是什么，并在后续章节中深入探讨这些主题。\n\
  \n#### Web3.js\n\n这是开发 DApp 时一个非常重要的元素。\n\n#### Truffle\n\n`Truffle` 提供了创建、编译、部署和测试区块链应用所需的构建模块。\n\
  \n#### Mist 钱包\n\n我们在前面的章节中了解到，与区块链应用交互需要钱包，以太坊也是如此。为了存储、接收和发送以太币，用户需要一个钱包。`Mist\
  \ 钱包` 是一种基于 UI 的解决方案，可用于连接以太坊区块链。使用 `Mist` 钱包，可以创建账户、设计和部署合约、在账户间转移以太币以及查看交易详情。\n\
  \n在内部，`Mist` 依赖 `geth` 客户端（即 Go 以太坊客户端）来无缝执行所有操作。\n\n## 总结\n\n在本章中，我们涵盖了以太坊区块链的核心组件，并理解了其设计考量。我们能够区分以太坊与比特币区块链的设计，并理解了以太坊区块链如何在单一平台上促进不同用例的开发。我们深入探讨了智能合约以及以太坊虚拟机（EVM）如何以去中心化方式执行它。\n\
  \n我们将在第 5 章中进一步探索区块链的开发层面，然后在第 6 章中建立对以太坊开发的扎实理解。\n\n"
- "# 5. 区块链应用开发\n\n在前面的章节中，我们深入探讨了区块链是什么以及比特币和以太坊区块链如何运作的理论细节。我们还研究了构成区块链技术的不同密码学和数学算法、定理及证明。\n\
  \n在本章中，我们将首先了解区块链应用与传统应用的不同之处，然后深入探讨如何在区块链上构建应用。我们还将探讨搭建开始开发去中心化应用所需的基础设施。\n\n##\
  \ 去中心化应用\n\n区块链技术的流行主要源于它能够解决各种现实世界问题，因为它比传统技术提供了更高的透明度和安全性（防篡改）。许多初创公司和社区成员已经确定了大量旨在解决这些问题的区块链用例。为了实现这些用例，我们创建了在区块链之上运行的应用。通常，与区块链交互的应用被称为“去中心化应用”，或简称为\
  \ `DApps` 或 `dApps`。\n\n为了更好地理解 `DApps`，让我们首先回顾一下什么是区块链。区块链或分布式账本本质上是一种特殊类型的数据库，其数据不存储在中心化服务器上，而是在网络中所有参与节点上复制。此外，区块链上的数据经过加密签名，证明了将该数据写入区块链的实体的身份。为了利用这个数据库来存储和检索数据，我们创建了被称为\
  \ `DApps` 的应用，因为这些应用不依赖中心化数据库，而是基于区块链的去中心化数据存储。这些应用不存在单点故障或单点控制。\n\n让我们举一个 `DApp`\
  \ 的例子。考虑一个供应链场景，其中涉及多个供应商和物流合作伙伴参与成品的供应链流程。为了将区块链技术用于这个供应链用例，我们需要这样做：\n\n- 我们需要在每个供应商处设置区块链节点，以便他们能够参与共享数据的共识过程。\n\
  - 我们需要一个接口，使所有参与者和用户能够存储、检索、验证和评估区块链上的数据。制造商将使用此接口输入有关已生产商品的信息；物流合作伙伴用于输入有关商品转移的信息；仓储供应商用于验证已生产商品和已转移商品是否同步，等等。这个接口就是我们的供应链\
  \ `DApp`。\n\n另一个 `DApp` 的例子是基于区块链的投票系统。利用区块链进行投票，我们能够使整个过程更加透明和安全，因为每一票都会经过加密签名。我们需要创建一个应用，该应用能够提供选民可以投票的候选人列表，并且此应用还会提供一个简单的界面来提交和记录选票。\n\
  \n\n\n## 区块链应用开发\n\n在开始编写代码之前，我们先来了解一些关于区块链应用开发的基本概念。通常，我们在开发传统软件应用时，习惯使用对象、类、函数等概念。然而，当涉及到区块链应用时，我们需要理解更多概念，例如交易、账户和地址、通证和钱包、输入和输出以及余额。去中心化应用与区块链之间的握手和请求/响应机制正是由这些概念驱动的。\n\
  \n首先，在开发区块链应用时，我们需要确定应用数据如何映射到区块链数据模型。例如，在以太坊区块链上开发去中心化应用时，我们需要理解如何用 Solidity 数据结构来表示应用状态，以及如何用以太坊智能合约来表达应用行为。我们知道，区块链上的所有数据都由用户的私钥进行加密签名，因此我们需要确定应用中的哪些实体在区块链上拥有身份或地址。在传统应用中，通常并非如此，因为数据并不总是被签名的。对于区块链应用，我们需要定义谁是签名者，以及他们会签署哪些数据。例如，在一个投票去中心化应用中，每位选民都对其投票进行加密签名，这很容易识别。但是，假设一个场景，我们需要将一个现有的传统分布式系统应用（其数据存储在多个\
  \ SQL 表和数据库中）迁移到基于以太坊区块链的去中心化应用。在这种情况下，我们需要确定哪个表中的哪些实体将拥有其身份，以及哪些实体将附加到其他身份上。\n\n\
  在接下来的几个小节中，我们将通过简单的代码片段探索如何运用比特币和以太坊的应用程序接口发送交易。本练习的目的是熟悉区块链应用程序接口和常见的编程实践。为简单起见，我们将使用这些区块链的公共测试网络，并使用\
  \ JavaScript 编写代码。选择 JavaScript 的原因是，在撰写本文时，这两个区块链都有稳定的 JavaScript 库可用，并且在编写代码时更容易理解我们所采用方法的异同。代码片段在每个逻辑步骤后都有详细解释，即使读者不熟悉\
  \ JavaScript 编程也能理解。\n\n### 库和工具\n\n回顾一下第 2 章，区块链技术中使用了大量的加密算法和数学知识。在从应用向区块链发送交易之前，我们需要先准备好它们。交易的准备工作包括定义账户和地址、向交易对象添加所需参数和值、以及使用私钥进行签名等。在开发应用时，最好使用经过验证和测试的库来准备交易，而不是从头开始编写代码。比特币和以太坊的一些稳定库都是开源的，可用于准备和签署交易，并将它们发送到区块链节点/网络。为了进行我们的代码练习，我们将使用\
  \ `bitcoinjs` JavaScript 库与比特币区块链交互，并使用 `web3.js` JavaScript 库与以太坊区块链交互。这两个库都可以作为\
  \ node.js 包使用，可以通过 `npm` 命令下载和集成。\n\n**重要说明**\n\n本章中的代码练习基于 node.js 应用。这是为了确保我们作为练习的一部分编写的代码有一个容器，可以在其中运行并与提到的其他预打包库（node\
  \ 模块）进行交互。对 node.js 应用开发有所了解会更好，建议读者学习一个关于 node.js 和 npm 的入门教程。\n\n图 5-1 展示了去中心化应用如何与区块链交互。\n\
  \n![A440588_1_En_5_Fig1_HTML.jpg](img/A440588_1_En_5_Fig1_HTML.jpg)\n\n图 5-1\n\n\
  区块链应用交互\n\n### 与比特币区块链交互\n\n在本节中，我们将从一个地址向另一个地址发送一笔交易到比特币公共测试网络。可以将其视为比特币区块链的“Hello\
  \ World”应用。如前所述，我们将使用 `bitcoinjs` JavaScript 库来准备和签署交易。为简单起见，我们不会托管本地的比特币节点，而是使用由第三方提供商区块浏览器托管的公共比特币测试网络节点。请注意，您可以为您的应用使用任何提供商，也可以托管本地节点。您所需要做的就是将您的应用代码指向连接到您首选的节点。\n\
  \n回顾前几章，比特币区块链主要用于实现点对点支付。一笔比特币交易基本上只是将比特币从一个地址转移到另一个地址。以下是我们如何以编程方式实现这一点。\n\n下图（图\
  \ 5-2）展示了这段代码如何与比特币区块链交互。注意：该图仅为粗略示意图，未详细展示区块浏览器服务架构。\n\n![A440588_1_En_5_Fig2_HTML.jpg](img/A440588_1_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2\n\n使用区块浏览器应用程序接口与比特币区块链交互的应用\n\n本节以下的小标题是需要遵循的步骤（按顺序），以使用 JavaScript 向比特币测试网络发送交易。\n\
  \n#### 在 node.js 应用中设置并初始化 bitcoinjs 库\n\n在调用比特币交易特定的库代码之前，我们将安装并初始化 `bitcoinjs`\
  \ 库。\n\n使用 `npm init` 命令初始化 node.js 应用后，让我们为我们的应用创建一个入口点 `index.js`，并创建一个自定义 JavaScript\
  \ 模块 `btc.js` 来调用 `bitcoinjs` 库的函数。在 `index.js` 中导入 `btc.js`。现在，我们可以开始执行后续步骤了。\n\
  \n首先，让我们安装 `bitcoinjs` 的 node 模块：\n\n```\nnpm install --save bitcoinjs-lib\n```\n\
  \n然后，在我们的比特币模块 `btc.js` 中，我们将使用 `require` 关键字初始化 `bitcoinjs` 库：\n\n```\nvar btc\
  \ = require('bitcoinjs-lib');\n```\n\n现在我们就可以使用这个 `btc` 变量来调用 `bitcoinjs` 库的函数了。此外，作为初始化过程的一部分，我们还初始化了另外几个变量：\n\
  \n*   目标网络：我们使用的是比特币测试网络。\n\n    ```\n    var network = btc.networks.testnet;\n\
  \    ```\n\n*   用于获取和发送交易的公共节点应用程序接口端点：我们使用了比特币测试网络的区块浏览器应用程序接口。请注意，您可以将此应用程序接口端点替换为您偏好的端点。\n\
  \n    ```\n    var blockExplorerTestnetApiEndpoint = 'https://testnet.blockexplorer.com/api/';\n\
  \    ```\n\n至此，我们已经准备好使用 node.js 应用创建比特币交易了。\n\n\n#### 为发送方和接收方创建密钥对\n\n首先需要为发送方和接收方创建密钥对。这些密钥对就像区块链上标识用户的账户。那么，我们先为\
  \ Alice 和 Bob 创建两个密钥对。\n\n```\nvar getKeys = function () {\nvar aliceKeys = btc.ECPair.makeRandom({\n\
  network: network\n});\nvar bobKeys = btc.ECPair.makeRandom({\nnetwork: network\n\
  });\nvar alicePublic = aliceKeys.getAddress();\nvar alicePrivate = aliceKeys.toWIF();\n\
  var bobPublic = bobKeys.getAddress();\nvar bobPrivate = bobKeys.toWIF();\nconsole.log(alicePublic,\
  \ alicePrivate, bobPublic, bobPrivate);\n};\n```\n\n在上面的代码片段中，我们使用了 bitcoinjs 库中的`ECPair`类，并调用了它的`makeRandom`方法，为测试网络创建了随机的密钥对；请注意为网络类型传递的参数。\n\
  \n现在我们已经创建了两个密钥对，接下来就用它们来进行比特币的转账。在几乎所有的密码学示例中，Alice 和 Bob 都是最常用的角色，正如前面密钥对变量所展示的那样。然而，每当我们看到密码学示例时，通常都是\
  \ Alice 加密/签名某些内容并发送给 Bob。正因如此，我们觉得 Bob 欠了 Alice 不少人情，所以在这个例子中，我们将帮 Bob 偿还一部分债务。我们将进行一笔从\
  \ Bob 到 Alice 的比特币交易示例。\n\n#### 在发送方的钱包中获取测试比特币\n\n我们已经确定，在这个比特币交易示例中，Bob 将扮演发送方的角色。在他向\
  \ Alice 发送任何比特币之前，他需要先拥有这些比特币。我们知道这个示例交易针对的是比特币测试网络，不涉及真实货币，但我们仍然需要 Bob 的钱包里有一些测试比特币。获取测试网络比特币的一个简单方法是在网上索取。互联网上有很多网站提供了简单的网页表单，可以接收比特币测试网络地址，然后向这些地址发送测试比特币。这类服务被称为比特币测试网络水龙头，如果你在网上搜索这个词，搜索结果中会出现很多这样的服务。我们不会列出或推荐任何特定的测试网络水龙头，因为它们通常不是永久性的。一旦某个水龙头服务提供商用完了测试币，或者他们不想再提供服务了，就会关闭它。但与此同时，新的水龙头服务会不断出现。这些水龙头服务的一部分列表也可以在比特币维基的测试网络页面上找到。\n\
  \n另一种获取测试网络比特币的方法是搭建一个指向测试网络的本地比特币节点，然后进行挖矿。比特币测试网络的区块挖矿难度远低于主网络。当你正在构建一个生产级的比特币应用程序并需要频繁测试时，这种方法可能更适合进阶用户。与其每次想测试应用程序时都去索取测试币，不如自己挖矿获取。\n\
  \n对于这个简单的示例，我们只需从测试网络水龙头获取一些比特币即可。在上面的代码片段中，`bobPublic`变量的值就是 Bob 的比特币测试网络地址。当我们运行这段代码时，它生成了`\"\
  msDkUzzd69idLLGCkDFDjVRz44jHcV3pW2\"`作为 Bob 的地址。这也是 Bob 经过 Base58 编码的公钥。我们将把这个值提交到某个测试网络水龙头的网页表单中，作为回报，我们会收到一个交易\
  \ ID。如果我们在任何一个比特币测试网络浏览器上查询该交易 ID，就会看到其他某个地址向我们提交的表单中的 Bob 地址发送了一些测试比特币。\n\n####\
  \ 获取发送方的未花费输出\n\n现在我们知道 Bob 的钱包里有一些测试比特币了，我们可以通过一笔比特币交易花掉它们并转给 Alice。让我们回顾一下第 3\
  \ 章中关于比特币交易如何由输入和输出构成的内容。你可以通过将未花费的输出添加为你想要花费它们的交易的输入，来花掉这些未花费输出。要做到这一点，首先需要向网络查询发送方的未花费输出。以下是我们将如何使用区块浏览器\
  \ API 为 Bob 的比特币测试网络地址执行此操作。为了获取未花费输出，我们将向 UTXO 端点发送一个 HTTP 请求，请求中包含 Bob 的地址`\"\
  msDkUzzd69idLLGCkDFDjVRz44jHcV3pW2\"`。\n\n```\nvar getOutputs = function () {\n\
  var url = blockExplorerTestnetApiEndpoint + 'addr/' + msDkUzzd69idLLGCkDFDjVRz44jHcV3pW2\
  \ + '/utxo';\nreturn new Promise(function (resolve, reject) {\nrequest.get(url,\
  \ function (err, res, body) {\nif (err) {\nreject(err);\n}\nresolve(body);\n});\n\
  });\n};\n```\n\n在上面的代码片段中，我们使用了 Node.js 的`request`模块，通过一个 Node.js 应用程序来发送 HTTP 请求。你可以随意使用自己喜爱的\
  \ HTTP 库/模块。这个代码片段是一个 JavaScript 函数，它返回一个 Promise，这个 Promise 会解析为 API 方法返回的响应体。响应内容如下所示：\n\
  \n```\n[\n{\naddress: 'msDkUzzd69idLLGCkDFDjVRz44jHcV3pW2',\ntxid: 'db2e5966c5139c6e937203d567403867643482bbd9a6624752bbc583ca259958',\n\
  vout: 0,\nscriptPubKey: '76a914806094191cbd4fcd8b4169a70588adc51dc02d6888ac',\n\
  amount: 0.99992,\nsatoshis: 99992000,\nheight: 1258815,\nconfirmations: 1011\n},\n\
  {\naddress: 'msDkUzzd69idLLGCkDFDjVRz44jHcV3pW2',\ntxid: '5b88d5fc4675bb86b0a3a7fc5a36df9c425c3880a7453e3afeb4934e6d1d928e',\n\
  vout: 1,\nscriptPubKey: '76a914806094191cbd4fcd8b4169a70588adc51dc02d6888ac',\n\
  amount: 0.99998,\nsatoshis: 99998000,\nheight: 1258814,\nconfirmations: 1012\n}\n\
  ]\n```\n\n该调用返回的响应体是一个包含两个对象的 JSON 数组。每个对象代表 Bob 的一个未花费输出。每个输出都有`txid`，即该输出所属的交易\
  \ ID；有与输出相关联的金额`amount`；还有`vout`，即该输出在交易中的序号或索引。JSON 对象中还包含其他一些信息，但这些信息在交易准备过程中不会被用到。\n\
  \n以数组中的第一个对象为例，它表示比特币测试网络地址`\"msDkUzzd69idLLGCkDFDjVRz44jHcV3pW2\"`有来自交易`db2e5966c5139c6e937203d567403867643482bbd9a6624752bbc583ca259958`索引位置`0`的`99992000`个未花费聪。类似地，第二个对象表示有来自交易`5b88d5fc4675bb86b0a3a7fc5a36df9c425c3880a7453e3afeb4934e6d1d928e`索引位置`1`的`99998000`个未花费聪。\n\
  \n别忘了，`\"msDkUzzd69idLLGCkDFDjVRz44jHcV3pW2\"`是 Bob 的比特币测试网络地址，我们是在前面第 2 步中创建的这个地址。现在我们知道\
  \ Bob 拥有这么多聪，他可以在新的交易中花费它们了。\n\n\n\n#### 准备比特币交易\n\n下一步是准备一笔比特币交易，通过该交易，鲍勃可以将测试币发送给爱丽丝。准备交易主要是定义其输入、输出和金额。\n\
  \n根据上一步骤，我们知道鲍勃在其比特币测试网地址下有两个未花费的输出，现在让我们使用输出数组的第一个元素。将其添加为交易的输入。\n\n```\nvar utxo\
  \ = JSON.parse(body.toString());\nvar transaction = new btc.TransactionBuilder(network);\n\
  transaction.addInput(utxo[0].txid, utxo[0].vout);\n```\n\n在上述代码片段中，我们首先解析了来自上一个\
  \ API 调用的响应，以获取鲍勃的未花费输出。然后，我们使用`bitcoinjs`库为比特币测试网络创建了一个交易构建器对象。在最后一行，我们定义了一个交易输入。请注意，此输入引用了`utxo`数组中索引为\
  \ 0 的元素，该元素来自上一步的 API 调用。我们将未花费输出中的交易 ID（`txid`）和`vout`作为输入参数传递给了`transaction.addInput`方法。\n\
  \n本质上，我们正在定义我们要花费什么以及从何处获得它。\n\n接下来，我们添加交易输出。这是指定我们打算如何花费输入中添加内容的地方。在下面一行中，我们通过调用交易构建器对象上的`addOutput`方法，并传入目标地址和金额，添加了一个交易输出。鲍勃想向爱丽丝发送\
  \ 99,990,000 聪。请注意，我们使用了爱丽丝的比特币测试网地址作为该函数的第一个参数。\n\n```\ntransaction.addOutput(alicePublic,\
  \ 99990000);\n```\n\n虽然在此示例交易中我们只使用了一个输入和一个输出，但一笔交易可以有多个输入和输出。需要特别注意的一点是，输入的总金额不应少于输出的总金额。大多数情况下，输入的金额会略高于输出的金额，差额即为支付给矿工的交易费用，以激励他们在挖掘下一个区块时将此交易包含在内。\n\
  \n在此交易中，我们有 2,000 聪作为交易费用，这是输入金额（99,992,000）与输出金额（99,999,000）之间的差额。请注意，我们无需为交易费用创建任何输出；输入与输出总金额之间的差额会自动被视为交易费用。\n\
  \n同时注意，我们无法部分花费未花费的输出。如果一个未花费输出关联了 x 数量的比特币，那么当将此未花费输出作为输入添加到交易中时，我们必须花费全部 x 个比特币。因此，如果鲍勃不想将他的未花费输出所关联的全部\
  \ 99,990,000 聪都转给爱丽丝，那么我们需要通过向交易添加另一个输出，其金额等于未花费总金额与鲍勃想给爱丽丝的金额之间的差额，从而将剩余部分返还给鲍勃。\n\
  \n#### 签署交易输入\n\n现在，我们已经在交易中定义了输入和输出，需要使用鲍勃的密钥来签署这些输入。下面这行代码调用交易构建器对象上的`sign`函数，使用鲍勃的私钥对交易进行加密签名，但它将整个密钥对对象作为输入参数。\n\
  \n```\ntransaction.sign(0, bobKeys);\n```\n\n请注意，`transaction.sign`函数将输入的索引和完整的密钥对作为输入参数。在此交易中，因为我们只有一个输入，所以传递的索引是\
  \ 0。\n\n至此，我们的交易已经准备就绪并已签署。\n\n#### 创建交易十六进制字符串\n\n现在，我们将从交易对象创建一个十六进制字符串。\n\n```\n\
  var transactionHex = transaction.build().toHex();\n```\n\n这行代码的输出是以下字符串，它代表了我们准备好的交易；此步骤是必需的，因为发送交易\
  \ API 接受原始交易作为字符串。\n\n#### 将交易广播到网络\n\n最后，我们使用上一步生成的十六进制字符串值，通过 API 将其发送到区块浏览器的公共测试网节点。\n\
  \n```\nvar txPushUrl = blockExplorerTestnetApiEndpoint + 'tx/send';\nrequest.post({\n\
  url: txPushUrl,\njson: {\nrawtx: transactionHex\n}\n}, function (err, res, body)\
  \ {\nif (err) console.log(err);\nconsole.log(res);\nconsole.log(body);\n});\n```\n\
  \n如果交易被区块浏览器公共节点接受，我们将收到一个交易 ID 作为此 API 调用的响应。\n\n```\n{\ntxid: \"db2e5966c5139c6e937203d567403867643482bbd9a6624752bbc583ca259958\"\
  \n}\n```\n\n现在我们有了自己交易的交易 ID，就可以在任何在线测试网浏览器上查询它，查看它是否（以及何时）被挖出，以及它有多少个确认数。\n\n综合起来，以下是使用\
  \ JavaScript 发送比特币测试网交易的完整代码。输入参数是我们在步骤 1 中创建的比特币测试网密钥对。\n\n```\nvar createTransaction\
  \ = function (aliceKeys, bobKeys) {\ngetOutputs(bobKeys.getAddress()).then(function\
  \ (res) {\nvar utxo = JSON.parse(res.toString());\nvar transaction = new btc.TransactionBuilder(network);\n\
  transaction.addInput(utxo[0].txid, utxo[0].vout);\ntransaction.addOutput(alicekeys.getAddress(),\
  \ 99990000);\ntransaction.sign(0, bobKeys);\nvar transactionHex = transaction.build().toHex();\n\
  var txPushUrl = blockExplorerTestnetApiEndpoint + 'tx/send';\nrequest.post({\nurl:\
  \ txPushUrl,\njson: {\nrawtx: transactionHex\n}\n}, function (err, res, body) {\n\
  if (err) console.log(err);\nconsole.log(res);\nconsole.log(body);\n});\n});\n};\n\
  ```\n\n在本节中，我们学习了如何以编程方式向比特币测试网络发送交易。类似地，我们可以通过在库函数和 API 端点中将主网络设为目标来向比特币主网络发送交易。我们还使用了查询\
  \ API 来获取比特币地址的未花费输出。这些功能可用于创建一个简单的比特币钱包应用程序，以查询和管理比特币地址和交易。\n\n\n\n### 以编程方式与以太坊交互——发送交易\n\
  \n与比特币区块链相比，以太坊区块链在区块链应用开发方面提供了更多功能。使用智能合约在区块链上执行逻辑的能力是以太坊区块链的关键特性，它使开发者能够创建去中心化应用。在本节中，我们将学习如何使用\
  \ JavaScript 以编程方式与以太坊区块链交互。我们将探讨以太坊应用编程的主要方面，从简单的交易到创建和调用智能合约。\n\n如同上一节中我们为与比特币区块链交互所做的那样，我们也将使用\
  \ JavaScript 库和测试网络来与以太坊交互。我们将使用 `web3` JavaScript 库来操作以太坊。该库封装了许多以太坊 JSON-RPC API，并提供了易于使用的函数来使用\
  \ JavaScript 创建以太坊 DApp。在撰写本文时，我们使用的 `web3` JavaScript 库版本大于且兼容 `1.0.0-beta.28`\
  \ 版本。\n\n对于测试网络，我们将使用以太坊区块链的 Ropsten 测试网络。\n\n为简化操作，我们将再次使用一个公共托管的以太坊测试网络节点，这样我们在运行这些代码片段时就无需托管本地节点。不过，所有代码片段也应当能在本地托管节点上运行。我们将使用\
  \ Infura 服务提供的以太坊 API。Infura 是一个提供公共托管以太坊节点的服务，以便开发者能够轻松测试他们的以太坊应用。在使用 Infura API\
  \ 之前，需要完成一个简单且免费的注册步骤，因此我们将访问 [`https://infura.io`](https://infura.io/) 进行注册。注册后我们会获得一个\
  \ API 密钥。使用此 API 密钥，我们就可以调用 Infura API 了。\n\n下图（图 5-3）展示了这段代码如何与以太坊区块链交互。注意：该图仅为粗略示意图，并未详细展示\
  \ Infura 服务架构。\n\n![A440588_1_En_5_Fig3_HTML.jpg](img/A440588_1_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3\n\n使用 Infura API 服务与以太坊区块链交互的应用\n\n本节的以下小节是按顺序执行的步骤，用于使用 JavaScript 向以太坊\
  \ Ropsten 测试网络发送交易。\n\n#### 设置库和连接\n\n首先，我们在 Node.js 应用中安装 `web3` 库。请注意安装命令中提到的库的特定版本。这是因为该库的\
  \ `1.0.0` 版本提供了更多可用的 API 和函数，从而减少了对其他外部包的依赖。\n\n```\nnpm install web3@1.0.0-beta.28\n\
  ```\n\n然后，我们使用 `require` 关键字在 Node.js 以太坊模块中初始化该库：\n\n```\nvar Web3 = require('web3');\n\
  ```\n\n现在，我们有了 `web3` 库的引用，但我们需要先实例化它才能使用。以下代码行创建了一个新的 `Web3` 对象实例，并将 Infura 托管的以太坊\
  \ Ropsten 测试网络节点设置为该 `Web3` 实例的提供者。\n\n```\nvar web3 = new Web3(new Web3.providers.HttpProvider('https://ropsten.infura.io/'));\n\
  ```\n\n#### 设置以太坊账户\n\n现在一切就绪，我们来向以太坊区块链发送一笔交易。在这笔交易中，我们将从一个账户向另一个账户发送一些以太币。回顾第\
  \ 4 章，以太坊不使用 UTXO 模型，而是使用账户和余额模型。\n\n基本上，以太坊区块链像银行一样通过账户和余额来管理状态和资产。这里没有输入和输出。你可以简单地将以太币从一个账户发送到另一个账户，以太坊会确保这些账户的状态在所有节点上得到更新。\n\
  \n要向以太坊发送一笔将以太币从一个账户转移到其他账户的交易，我们首先需要几个以太坊账户。让我们先为 Alice 和 Bob 创建两个账户。\n\n以下代码片段调用了\
  \ `web3` 库的账户创建函数，并创建了两个账户。\n\n```\nvar createAccounts = function () {\nvar aliceKeys\
  \ = web3.eth.accounts.create();\nconsole.log(aliceKeys);\nvar bobKeys = web3.eth.accounts.create();\n\
  console.log(bobKeys);\n};\n```\n\n以下是运行上述代码片段后在控制台窗口中得到的输出。\n\n```\n{\naddress:\
  \ '0xAff9d328E8181aE831Bc426347949EB7946A88DA',\nprivateKey: '0x9fb71152b32cb90982f95e2b1bf2a5b6b2a53855eacf59d132a2b7f043cfddf5',\n\
  signTransaction: [Function: signTransaction],\nsign: [Function: sign],\nencrypt:\
  \ [Function: encrypt]\n}\n{\naddress: '0x22013fff98c2909bbFCcdABb411D3715fDB341eA',\n\
  privateKey: '0xc6676b7262dab1a3a28a781c77110b63ab8cd5eae2a5a828ba3b1ad28e9f5a9b',\n\
  signTransaction: [Function: signTransaction],\nsign: [Function: sign],\nencrypt:\
  \ [Function: encrypt]\n}\n```\n\n正如你所看到的，除了地址和私钥之外，每个账户创建函数调用的输出还包含一些函数。目前，我们将重点关注返回对象的\
  \ `address` 和 `privateKey`。`address` 是所生成私钥的 ECDSA 公钥的 Keccak-256 哈希值。这个 `address`\
  \ 和 `privateKey` 组合代表以太坊区块链上的一个账户。你可以向该 `address` 发送以太币，也可以使用对应地址的 `privateKey`\
  \ 来花费这些以太币。\n\n#### 在发送方账户中获取测试以太币\n\n现在，为了创建一笔将以太币从一个账户转移到另一个账户的以太坊交易，我们首先需要在一个账户中拥有一些以太币。回想一下比特币编程部分，我们使用了测试网水龙头在我们生成的地址上获取一些测试比特币。对于以太坊，我们也将采用同样的方法。请记住，我们的目标是以太坊的\
  \ Ropsten 测试网络，因此我们需要在互联网上寻找一个 Ropsten 水龙头。在本例中，我们将前一个代码片段中生成的 Alice 地址提交给了以太坊 Ropsten\
  \ 测试网络水龙头，并在该地址上收到了三个以太币。\n\n在 Alice 的地址收到以太币后，让我们检查一下该地址的余额，以确认我们是否真的拥有这些以太币。虽然我们可以使用任何在线以太坊浏览器来检查该地址的余额，但这里我们使用代码来实现。以下代码片段调用了\
  \ `getBalance` 函数，并将 Alice 的地址作为输入参数传入。\n\n```\nvar getBalance = function () {\n\
  web3.eth.getBalance('0xAff9d328E8181aE831Bc426347949EB7946A88DA').then(console.log);\n\
  };\n```\n\n然后我们得到以下输出作为 Alice 地址的余额。这是一个巨大的数字，但实际上这是以 `wei` 为单位的余额值。`Wei` 是以太币的最小单位。一个以太币等于\
  \ 10¹⁸ `wei`。因此，下面的数值等于三个以太币，正是我们从测试网络水龙头收到的数量。\n\n```\n3000000000000000 000\n```\n\
  \n\n\n#### 准备以太坊交易\n\n现在我们已经让爱丽丝拥有了一些测试以太币，接下来我们将创建一笔以太坊交易，将其中一部分以太币发送给鲍勃。回想一下，以太坊由于采用账户和余额系统，因此不需要像比特币那样处理输入、输出以及\
  \ UTXO 查询。所以，我们只需要在交易中指定`from`地址（发送方地址）、`to`地址（接收方地址）、发送的以太币数量以及其他一些字段即可。\n\n另外，请注意，在比特币交易中我们无需指定交易费用；然而在以太坊交易中，我们需要指定两个相关字段：一个是`gas`限制，另一个是`gasPrice`。回顾第\
  \ 4 章的内容，gas 是我们需要支付给以太坊网络以确认交易并将其添加到区块中的交易费用单位。`gasPrice`则是我们愿意为每单位 gas 支付的以太币数量（以\
  \ gwei 为单位）。一笔交易允许使用的最大费用就是`gas`与`gasPrice`的乘积。\n\n因此，对于这个示例交易，我们定义一个包含以下字段的 JSON\
  \ 对象。其中，`from`字段是爱丽丝的地址，`to`字段是鲍勃的地址，`value`字段是以 wei 为单位的一个以太币。我们选择的`gasPrice`是\
  \ 20 gwei，并且愿意为此交易支付的最大 gas 数量为 42,000。\n\n另外，请注意我们将`data`字段留空了。我们将在后面的智能合约部分再回过头来讨论它。\n\
  \n```\n{\nfrom: \"0xAff9d328E8181aE831Bc426347949EB7946A88DA\",\ngasPrice: \"20000000000\"\
  ,\ngas: \"42000\",\nto: '0x22013fff98c2909bbFCcdABb411D3715fDB341eA',\nvalue: \"\
  1000000000000000000\",\ndata: \"\"\n}\n```\n\n#### 签名交易\n\n现在我们已经创建了一个包含必要字段和数值的交易对象，接下来需要使用发送以太币的账户的私钥对其进行签名。在本例中，发送方是爱丽丝，因此我们将使用爱丽丝的私钥对交易进行签名。这是为了在密码学上证明确实是爱丽丝本人在花费她账户中的以太币。\n\
  \n```javascript\nvar signTransaction = function () {\nvar tx = {\nfrom: \"0xAff9d328E8181aE831Bc426347949EB7946A88DA\"\
  ,\ngasPrice: \"20000000000\",\ngas: \"42000\",\nto: '0x22013fff98c2909bbFCcdABb411D3715fDB341eA',\n\
  value: \"1000000000000000000\",\ndata: \"\"\n};\nweb3.eth.accounts.signTransaction(tx,\
  \ '0x9fb71152b32cb90982f95e2b1bf2a5b6b2a53855eacf59d132a2b7f043cfddf5')\n.then(function(signedTx){\n\
  console.log(signedTx.rawTransaction);\n});\n};\n```\n\n以上代码片段调用了`signTransaction`函数，传入了我们在上一步创建的交易对象以及生成爱丽丝账户时获得的私钥。以下是运行上述代码片段后得到的输出结果。\n\
  \n```\n{\nmessageHash: '0x91b345a38dc728dc06a43c49b92a6ac1e0e6d614c432a6dd37d809290a25aa6b',\n\
  v: '0x2a',\nr: '0x14c20901a060834972a539d7b8ad1f23161c2144a2b66fbf567e37e963d64537',\n\
  s: '0x3d2a0a818633a11832a5c48708a198af909eaf4884a7856c9ac9ed216d9b029c',\nrawTransaction:\
  \ '0xf86c018504a817c80082a4109422013fff98c2909bbfccdabb411d3715fdb341ea880de0b6b3a7640000802aa014c20901a060834972a539d7b8ad1f23161c2144a2b66fbf567e37e963d64537a03d2a0a818633a11832a5c48708a198af909eaf4884a7856c9ac9ed216d9b029c'\n\
  }\n```\n\n在`signTransaction`函数的输出中，我们收到一个包含若干属性的 JSON 对象。对我们来说，重要的值是`rawTransaction`。这是已签名交易的十六进制字符串表示。这与我们在比特币章节中创建比特币交易的十六进制字符串的方式非常相似。\n\
  \n#### 将交易发送至以太坊网络\n\n最后一步只需将这个已签名的原始交易发送到公共托管的以太坊测试网络节点即可，我们在创建`web3`对象时已将该节点设置为提供者。\n\
  \n以下代码调用`sendSignedTransaction`函数，将原始交易发送至以太坊测试网络。输入参数是我们在上一步签名交易时获得的`rawTransaction`字符串的值。\n\
  \n```javascript\nweb3.eth.sendSignedTransaction(signedTx.rawTransaction).then(console.log);\n\
  ```\n\n请注意上述代码片段中`then`的用法。这很有趣，因为`web3`库在处理以太坊交易时提供了不同层次的最终性，因为一笔以太坊交易在提交后会经历多个状态。在这个函数调用中，将交易发送到网络时，`then`会在交易收据生成且交易完成时被触发。\n\
  \n几秒钟后，当 JavaScript 的 Promise 解析时，我们将得到以下输出。\n\n```\n{\nblockHash: '0x26f1e1374d11d4524f692cdf1ce3aa6e085dcc181084642293429eda3954d30e',\n\
  blockNumber: 2514764,\ncontractAddress: null,\ncumulativeGasUsed: 125030,\nfrom:\
  \ '0xaff9d328e8181ae831bc426347949eb7946a88da',\ngasUsed: 21000,\nlogs: [],\nlogsBloom:\
  \ '',\n\
  status: '0x1',\nto: '0x22013fff98c2909bbfccdabb411d3715fdb341ea',\ntransactionHash:\
  \ '0xd3f45394ac038c44c4fe6e0cdb7021fdbd672eb1abaa93eb6a1828df5edb6253',\ntransactionIndex:\
  \ 3\n}\n```\n\n我们可以看到，输出包含大量信息。其中最重要的是`transactionHash`，它是该交易在网络上的 ID。输出还提供了`blockHash`，即包含该交易的区块的\
  \ ID。除此之外，我们还获得了此交易消耗了多少 gas 等信息。如果实际消耗的 gas 少于我们在创建交易时指定的最大 gas 数量，剩余的 gas 将退还给发送方地址。\n\
  \n在本节中，我们使用 JavaScript 向以太坊区块链发送了一笔简单交易。但这仅仅是以太坊应用程序编程的开始。在下一节中，我们还将探讨如何以编程方式创建和调用智能合约。\n\
  \n### 以编程方式与以太坊交互——创建智能合约\n\n在本节中，我们将继续以太坊编程练习，使用相同的`web3` JavaScript 库和 Infura\
  \ 服务 API，在以太坊区块链上创建一个简单的智能合约。\n\n因为没有\"Hello World\"程序的计算机编程初学者教程是不完整的，所以我们即将创建的智能合约将是一个在被调用时返回字符串\"\
  Hello World\"的简单合约。\n\n合约创建过程将是一种发送到以太坊区块链的特殊交易类型，这类交易被称为\"合约创建交易\"。这些交易不会提及`to`地址，而智能合约的所有者就是交易中提到的`from`地址。\n\
  \n#### 先决条件\n\n在这个创建智能合约的代码练习中，我们继续假设`web3` JavaScript 库已安装并在一个 Node.js 应用中实例化，并且我们已经注册了\
  \ Infura 服务，就像我们在上一节中所做的那样。\n\n以下是使用 JavaScript 在以太坊上创建智能合约的步骤。\n\n\n\n#### 编写智能合约\n\
  \n回顾第 4 章的内容，以太坊智能合约是用 Solidity 编程语言编写的。虽然 `web3` JavaScript 库能够帮助我们通过编程将合约部署到以太坊区块链上，但我们仍需要使用\
  \ `web3` 将智能合约发送到以太坊网络之前，先用 Solidity 编写并编译好合约。因此，让我们先用 Solidity 创建一个示例合约。\n\n有多种工具可用于编写\
  \ Solidity 代码。大多数主流 IDE 和代码编辑器都提供了 Solidity 插件，用于编辑和编译智能合约。此外，还有一个基于网页的 Solidity\
  \ 编辑器，名为 `Remix`。你可以在 [`https://remix.ethereum.org/`](https://remix.ethereum.org/)\
  \ 免费使用它。`Remix` 提供了一个非常简单的界面，让你能在浏览器中编码和编译智能合约。在本练习中，我们将使用 `Remix` 来编写和测试我们的智能合约，然后使用\
  \ `web3` JavaScript 库和 Infura API 服务将同一份合约发送到以太坊网络。\n\n以下代码片段是用 Solidity 编程语言编写的，它是一个简单的智能合约，其\
  \ `Hello` 函数会返回字符串 \"Hello World\"。该合约还有一个构造函数，用于设置返回消息的值。\n\n```solidity\npragma\
  \ solidity ⁰.4.0;\ncontract HelloWorld {\nstring message;\nfunction HelloWorld(){\n\
  message = \"Hello World!\";\n}\nfunction Hello() constant returns (string) {\nreturn\
  \ message;\n}\n}\n```\n\n让我们进入 `Remix`，将这段代码粘贴到编辑器窗口中。下面的图片（图 5-4 和图 5-5）展示了我们的示例智能合约在\
  \ `Remix` 编辑器中的样子，以及当我们点击右侧菜单 `Run` 选项卡下的 `Create` 按钮时，输出结果是什么样的。另外，请注意，默认情况下，`Remix`\
  \ 编辑器会针对 JavaScript VM 环境进行智能合约编译，并会使用一个带有一些 ETH 余额的测试账户用于测试。当我们点击 `Create` 按钮时，该合约就会在\
  \ JavaScript VM 环境中使用所选账户被创建。\n\n![A440588_1_En_5_Fig5_HTML.jpg](img/A440588_1_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5：在 Remix IDE 中创建智能合约的输出\n\n![A440588_1_En_5_Fig4_HTML.jpg](img/A440588_1_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4：在 Remix IDE 中编辑智能合约\n\n以下是 `create` 操作生成的输出，它告诉我们合约已经创建成功，因为它有了一个合约地址。`from`\
  \ 值是用来创建合约的账户地址。同时，它还显示了合约创建交易的哈希值。\n\n```text\nstatus     0x1 Transaction mined\
  \ and execution succeed\ncontractAddress    0x692a70d2e424a56d2c6c27aa97d1a86395877b3a\n\
  from   0xca35b7d915458ef540ade6068dfe2f44e8fa733c\nto     HelloWorld.(constructor)\n\
  gas    3000000 gas\ntransaction cost   205547 gas\nexecution cost     109539 gas\n\
  hash   0x9f3c21c21f263084b9f031966858a5d8e0648ed19c77d4d2291875b01d89a141\ninput\
  \  \n\
  decoded input  {}\ndecoded output      -\nlogs   []\nvalue  0 wei\n```\n\n至此，我们已经准备好了一个简单的“Hello\
  \ World”智能合约。下一步是通过编程方式将其部署到以太坊区块链上。\n\n#### 编译合约并获取详细信息\n\n首先，让我们从 `Remix` 中获取一些关于智能合约的详细信息，这些信息在后续使用\
  \ `web3` 库将合约部署到以太坊网络时会用到。点击右侧菜单中的 `Compile` 选项卡，然后点击 `Details` 按钮。这会弹出一个新的子窗口，其中包含智能合约的详细信息。对我们来说，最重要的是详情弹窗中的\
  \ `ABI` 和 `BYTECODE` 部分。\n\n让我们使用 `ABI` 标题旁边的“复制值到剪贴板”按钮，复制 `ABI` 部分中的内容。以下是我们的智能合约的\
  \ `ABI` 数据值。\n\n```json\n[\n{\n\"constant\": true,\n\"inputs\": [],\n\"name\": \"\
  Hello\",\n\"outputs\": [\n{\n\"name\": \"\",\n\"type\": \"string\"\n}\n],\n\"payable\"\
  : false,\n\"stateMutability\": \"view\",\n\"type\": \"function\"\n},\n{\n\"inputs\"\
  : [],\n\"payable\": false,\n\"stateMutability\": \"nonpayable\",\n\"type\": \"constructor\"\
  \n}\n]\n```\n\n这是一个 JSON 数组。如果仔细查看，我们会发现它包含了合约中每个函数（包括其构造函数）的 JSON 对象。这些 JSON 对象描述了函数的详细信息及其输入和输出。该数组定义了智能合约的接口。\n\
  \n当我们在网络上部署并调用这个智能合约时，我们需要这些信息来了解合约暴露了哪些函数，以及需要向我们要调用的函数传入什么参数。\n\n现在，让我们获取详情弹窗中\
  \ `BYTECODE` 部分的数据。以下是我们为合约复制的数据。\n\n\n\n```\n{\n\"linkReferences\": {},\n\"object\"\
  : \"\"\
  ,\n\"opcodes\": \"PUSH1 0x60 PUSH1 0x40 MSTORE CALLVALUE ISZERO PUSH2 0xF JUMPI\
  \ PUSH1 0x0 DUP1 REVERT JUMPDEST PUSH1 0x40 DUP1 MLOAD SWAP1 DUP2 ADD PUSH1 0x40\
  \ MSTORE DUP1 PUSH1 0xC DUP2 MSTORE PUSH1 0x20 ADD PUSH32 0x48656C6C6F20576F726C64210000000000000000000000000000000000000000\
  \ DUP2 MSTORE POP PUSH1 0x0 SWAP1 DUP1 MLOAD SWAP1 PUSH1 0x20 ADD SWAP1 PUSH2 0x5A\
  \ SWAP3 SWAP2 SWAP1 PUSH2 0x60 JUMP JUMPDEST POP PUSH2 0x105 JUMP JUMPDEST DUP3\
  \ DUP1 SLOAD PUSH1 0x1 DUP2 PUSH1 0x1 AND ISZERO PUSH2 0x100 MUL SUB AND PUSH1 0x2\
  \ SWAP1 DIV SWAP1 PUSH1 0x0 MSTORE PUSH1 0x20 PUSH1 0x0 KECCAK256 SWAP1 PUSH1 0x1F\
  \ ADD PUSH1 0x20 SWAP1 DIV DUP2 ADD SWAP3 DUP3 PUSH1 0x1F LT PUSH2 0xA1 JUMPI DUP1\
  \ MLOAD PUSH1 0xFF NOT AND DUP4 DUP1 ADD OR DUP6 SSTORE PUSH2 0xCF JUMP JUMPDEST\
  \ DUP3 DUP1 ADD PUSH1 0x1 ADD DUP6 SSTORE DUP3 ISZERO PUSH2 0xCF JUMPI SWAP2 DUP3\
  \ ADD JUMPDEST DUP3 DUP2 GT ISZERO PUSH2 0xCE JUMPI DUP3 MLOAD DUP3 SSTORE SWAP2\
  \ PUSH1 0x20 ADD SWAP2 SWAP1 PUSH1 0x1 ADD SWAP1 PUSH2 0xB3 JUMP JUMPDEST JUMPDEST\
  \ POP SWAP1 POP PUSH2 0xDC SWAP2 SWAP1 PUSH2 0xE0 JUMP JUMPDEST POP SWAP1 JUMP JUMPDEST\
  \ PUSH2 0x102 SWAP2 SWAP1 JUMPDEST DUP1 DUP3 GT ISZERO PUSH2 0xFE JUMPI PUSH1 0x0\
  \ DUP2 PUSH1 0x0 SWAP1 SSTORE POP PUSH1 0x1 ADD PUSH2 0xE6 JUMP JUMPDEST POP SWAP1\
  \ JUMP JUMPDEST SWAP1 JUMP JUMPDEST PUSH2 0x1BC DUP1 PUSH2 0x114 PUSH1 0x0 CODECOPY\
  \ PUSH1 0x0 RETURN STOP PUSH1 0x60 PUSH1 0x40 MSTORE PUSH1 0x4 CALLDATASIZE LT PUSH2\
  \ 0x41 JUMPI PUSH1 0x0 CALLDATALOAD PUSH29 0x100000000000000000000000000000000000000000000000000000000\
  \ SWAP1 DIV PUSH4 0xFFFFFFFF AND DUP1 PUSH4 0xBCDFE0D5 EQ PUSH2 0x46 JUMPI JUMPDEST\
  \ PUSH1 0x0 DUP1 REVERT JUMPDEST CALLVALUE ISZERO PUSH2 0x51 JUMPI PUSH1 0x0 DUP1\
  \ REVERT JUMPDEST PUSH2 0x59 PUSH2 0xD4 JUMP JUMPDEST PUSH1 0x40 MLOAD DUP1 DUP1\
  \ PUSH1 0x20 ADD DUP3 DUP2 SUB DUP3 MSTORE DUP4 DUP2 DUP2 MLOAD DUP2 MSTORE PUSH1\
  \ 0x20 ADD SWAP2 POP DUP1 MLOAD SWAP1 PUSH1 0x20 ADD SWAP1 DUP1 DUP4 DUP4 PUSH1\
  \ 0x0 JUMPDEST DUP4 DUP2 LT ISZERO PUSH2 0x99 JUMPI DUP1 DUP3 ADD MLOAD DUP2 DUP5\
  \ ADD MSTORE PUSH1 0x20 DUP2 ADD SWAP1 POP PUSH2 0x7E JUMP JUMPDEST POP POP POP\
  \ POP SWAP1 POP SWAP1 DUP2 ADD SWAP1 PUSH1 0x1F AND DUP1 ISZERO PUSH2 0xC6 JUMPI\
  \ DUP1 DUP3 SUB DUP1 MLOAD PUSH1 0x1 DUP4 PUSH1 0x20 SUB PUSH2 0x100 EXP SUB NOT\
  \ AND DUP2 MSTORE PUSH1 0x20 ADD SWAP2 POP JUMPDEST POP SWAP3 POP POP POP PUSH1\
  \ 0x40 MLOAD DUP1 SWAP2 SUB SWAP1 RETURN JUMPDEST PUSH2 0xDC PUSH2 0x17C JUMP JUMPDEST\
  \ PUSH1 0x0 DUP1 SLOAD PUSH1 0x1 DUP2 PUSH1 0x1 AND ISZERO PUSH2 0x100 MUL SUB AND\
  \ PUSH1 0x2 SWAP1 DIV DUP1 PUSH1 0x1F ADD PUSH1 0x20 DUP1 SWAP2 DIV MUL PUSH1 0x20\
  \ ADD PUSH1 0x40 MLOAD SWAP1 DUP2 ADD PUSH1 0x40 MSTORE DUP1 SWAP3 SWAP2 SWAP1 DUP2\
  \ DUP2 MSTORE PUSH1 0x20 ADD DUP3 DUP1 SLOAD PUSH1 0x1 DUP2 PUSH1 0x1 AND ISZERO\
  \ PUSH2 0x100 MUL SUB AND PUSH1 0x2 SWAP1 DIV DUP1 ISZERO PUSH2 0x172 JUMPI DUP1\
  \ PUSH1 0x1F LT PUSH2 0x147 JUMPI PUSH2 0x100 DUP1 DUP4 SLOAD DIV MUL DUP4 MSTORE\
  \ SWAP2 PUSH1 0x20 ADD SWAP2 PUSH2 0x172 JUMP JUMPDEST DUP3 ADD SWAP2 SWAP1 PUSH1\
  \ 0x0 MSTORE PUSH1 0x20 PUSH1 0x0 KECCAK256 SWAP1 JUMPDEST DUP2 SLOAD DUP2 MSTORE\
  \ SWAP1 PUSH1 0x1 ADD SWAP1 PUSH1 0x20 ADD DUP1 DUP4 GT PUSH2 0x155 JUMPI DUP3 SWAP1\
  \ SUB PUSH1 0x1F AND DUP3 ADD SWAP2 JUMPDEST POP POP POP POP POP SWAP1 POP SWAP1\
  \ JUMP JUMPDEST PUSH1 0x20 PUSH1 0x40 MLOAD SWAP1 DUP2 ADD PUSH1 0x40 MSTORE DUP1\
  \ PUSH1 0x0 DUP2 MSTORE POP SWAP1 JUMP STOP LOG1 PUSH6 0x627A7A723058 KECCAK256\
  \ DUP8 PUSH27 0x5DA4F7E05C4AD9B45DD10FB6C133A523541ED06DB6DD31D59B35D5 OR PUSH9\
  \ 0xA30029000000000000 \",\n\"sourceMap\": \"24:199:0:-;;;75:62;;;;;;;;106:24;;;;;;;;;;;;;;;;;;:7;:24;;;;;;;;;;;;:::i;:::-;;24:199;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;:::i;:::-;;;:::o;:::-;;;;;;;;;;;;;;;;;;;;;;;;;;;:::o;:::-;;;;;;;\"\
  \n}\n```\n\n正如我们所见，`BYTECODE` 部分中的数据是一个 JSON 对象。这基本上就是智能合约编译后的输出结果。`Remix` 使用 Solidity\
  \ 编译器编译了我们的智能合约，最终得到了 Solidity 字节码。现在，仔细检查这个 JSON，找到 `object` 属性及其值。这是一个十六进制字符串，包含了我们智能合约的字节码，我们将在创建合约的交易中，将其放入数据字段（data\
  \ field）——也就是在之前 Alice 和 Bob 之间以太坊交易示例中，我们留空的那个数据字段。\n\n现在，我们已经掌握了智能合约的所有详细信息，可以准备将其发送到以太坊网络了。\n\
  \n\n\n#### 在以太坊网络上部署合约\n\n现在我们有了智能合约及其详细信息，需要准备一笔交易，将合约部署到以太坊区块链上。这笔交易的准备过程与上一节准备交易的过程非常相似，但会多出一些创建合约所需的属性。\n\
  \n首先，我们需要创建一个`web3.eth.Contract`类的对象，它可以代表我们的合约。以下代码片段以 JSON 数组作为输入参数，创建了该类的实例。这个\
  \ JSON 数组与我们之前从 Remix 弹窗的 ABI 部分复制的一致，展示了智能合约的详细信息。\n\n```\nvar helloworldContract\
  \ = new web3.eth.Contract([{\n\"constant\": true,\n\"inputs\": [],\n\"name\": \"\
  Hello\",\n\"outputs\": [{\n\"name\": \"\",\n\"type\": \"string\"\n}],\n\"payable\"\
  : false,\n\"stateMutability\": \"view\",\n\"type\": \"function\"\n}, {\n\"inputs\"\
  : [],\n\"payable\": false,\n\"stateMutability\": \"nonpayable\",\n\"type\": \"constructor\"\
  \n}]);\n```\n\n现在需要使用 web3 库的`Contract.deploy`方法将此合约发送到以太坊网络。以下代码片段展示了具体操作。\n\n\
  ```\nhelloworldContract\n.deploy({\ndata: ''\n\
  })\n.send({\nfrom: '0xAff9d328E8181aE831Bc426347949EB7946A88DA',\ngas: 4700000,\n\
  gasPrice: '20000000000000'\n},\nfunction(error, transactionHash){\nconsole.log(error);\n\
  console.log(transactionHash);\n})\n.then(function(contract){\nconsole.log(contract);\n\
  });\n```\n\n请注意，`deploy`函数参数对象中的`data`字段值与上一步 BYTECODE 详情中的对象字段值相同。同时，该值前面添加了字符串`“0x”`。因此，在`deploy`函数中传递的数据是`'0x'`\
  \ + 合约的字节码。\n\n在`deploy`之后的`send`函数中，我们添加了`from`地址（即合约的拥有者）以及交易费用详情（gas 限额和 gas\
  \ 价格）。最后，当调用完成时，会返回合约对象。该合约对象将包含合约详细信息以及合约地址，可用于调用合约上的函数。\n\n另一种将合约发送到网络的方法是，将合约封装在交易中并直接发送。以下代码片段创建了一个交易对象，其中`data`为合约字节码，使用`from`字段地址的私钥进行签名，然后发送到以太坊区块链。\n\
  \n请注意，该交易对象中没有指定`to`地址，因为在合约部署之前其地址是未知的。\n\n```\nvar tx = {\nfrom: \"0x22013fff98c2909bbFCcdABb411D3715fDB341eA\"\
  ,\ngasPrice: \"20000000000\",\ngas: \"4900000\",\ndata: \"\"\
  \n};\nweb3.eth.accounts.signTransaction(tx, '0xc6676b7262dab1a3a28a781c77110b63ab8cd5eae2a5a828ba3b1ad28e9f5a9b')\n\
  .then(function (signedTx) {\nweb3.eth.sendSignedTransaction(signedTx.rawTransaction)\n\
  .then(console.log);\n});\n```\n\n执行此代码片段后，我们会得到以下输出结果，即该交易的收据。\n\n```\n{\nblockHash:\
  \ '0xaba93b4561fc35e062a1ad72460e0b677603331bbee3379ce6c74fa5cf505d82',\nblockNumber:\
  \ 2539889,\ncontractAddress: '0xd5a2d13723A34522EF79bE0f1E7806E86a4578E9',\ncumulativeGasUsed:\
  \ 205547,\nfrom: '0x22013fff98c2909bbfccdabb411d3715fdb341ea',\ngasUsed: 205547,\n\
  logs: [],\nlogsBloom: '',\n\
  status: '0x1',\nto: null,\ntransactionHash: '0xc333cbc5fc93b52871689aab22c48b910cb192b4875bea69212363030d36565a',\n\
  transactionIndex: 0\n}\n```\n\n请留意交易收据对象的属性。它的`contractAddress`属性有值，而`to`属性的值为 null。这表明这是一笔合约创建交易，已在网络上成功挖矿，并且该交易创建的合约已部署到地址`0xd5a2d13723A34522EF79bE0f1E7806E86a4578E9`上。\n\
  \n我们已经成功通过编程方式创建了一个以太坊智能合约。\n\n### 以编程方式与以太坊交互——执行智能合约函数\n\n现在我们已经将智能合约部署到以太坊网络，可以调用其成员函数了。以下是以编程方式调用以太坊智能合约的步骤。\n\
  \n\n\n#### 获取智能合约的引用\n\n要执行智能合约的函数，首先需要利用已部署合约的 ABI 和地址，创建一个 `web3.eth.Contract`\
  \ 类的实例。以下代码片段展示了如何实现。\n\n```\nvar helloworldContract = new web3.eth.Contract([{\n\
  \"constant\": true,\n\"inputs\": [],\n\"name\": \"Hello\",\n\"outputs\": [{\n\"\
  name\": \"\",\n\"type\": \"string\"\n}],\n\"payable\": false,\n\"stateMutability\"\
  : \"view\",\n\"type\": \"function\"\n}, {\n\"inputs\": [],\n\"payable\": false,\n\
  \"stateMutability\": \"nonpayable\",\n\"type\": \"constructor\"\n}], '0xd5a2d13723A34522EF79bE0f1E7806E86a4578E9');\n\
  ```\n\n在上述代码片段中，我们通过传入上一节创建的合约的 ABI 以及部署合约后收到的合约地址，创建了一个 `web3.eth.Contract` 类的实例。\n\
  \n现在，可以使用该对象来调用合约上的函数。\n\n#### 执行智能合约函数\n\n回顾一下，我们的合约中只有一个公共函数。该方法名为 `Hello`，执行时会返回字符串\
  \ `\"Hello World!\"`。\n\n要执行此方法，我们将使用 web3 库中的 `contract.methods` 类来调用它。以下代码片段展示了这一过程。\n\
  \n```\nhelloworldContract.methods.Hello().send({\nfrom: '0xF68b93AE6120aF1e2311b30055976d62D7dBf531'\n\
  }).then(console.log);\n```\n\n在上述代码片段中，我们在 `send` 函数中为“from”地址添加了一个值，该地址将用于发送交易，进而执行我们智能合约上的\
  \ `Hello` 函数。\n\n调用智能合约的完整代码如下所示。\n\n```\nvar callContract = function () {\nvar\
  \ helloworldContract = new web3.eth.Contract([{\n\"constant\": true,\n\"inputs\"\
  : [],\n\"name\": \"Hello\",\n\"outputs\": [{\n\"name\": \"\",\n\"type\": \"string\"\
  \n}],\n\"payable\": false,\n\"stateMutability\": \"view\",\n\"type\": \"function\"\
  \n}, {\n\"inputs\": [],\n\"payable\": false,\n\"stateMutability\": \"nonpayable\"\
  ,\n\"type\": \"constructor\"\n}], '0xd5a2d13723A34522EF79bE0f1E7806E86a4578E9');\n\
  helloworldContract.methods.Hello().send({\nfrom: '0xF68b93AE6120aF1e2311b30055976d62D7dBf531'\n\
  }).then(console.log);\n};\n```\n\n执行此合约函数的另一种方式是通过签名发送原始交易。这类似于我们在前面章节中发送原始以太坊交易来发送以太币和创建合约的方式。在本例中，我们只需在交易对象的“to”字段中提供合约地址，并在数据(data)字段中提供函数调用的编码后的\
  \ ABI 值。\n\n以下代码片段首先创建一个合约对象，然后获取待调用的智能合约函数的编码后的 ABI 值。接着，它基于这些值创建一个交易对象，然后对其进行签名并发送到网络。请注意，我们在合约函数上使用了\
  \ `encodeABI` 函数来获取交易的数据负载值。这就是智能合约的输入。\n\n```\nvar callContract = function () {\n\
  var helloworldContract = new web3.eth.Contract([{\n\"constant\": true,\n\"inputs\"\
  : [],\n\"name\": \"Hello\",\n\"outputs\": [{\n\"name\": \"\",\n\"type\": \"string\"\
  \n}],\n\"payable\": false,\n\"stateMutability\": \"view\",\n\"type\": \"function\"\
  \n}, {\n\"inputs\": [],\n\"payable\": false,\n\"stateMutability\": \"nonpayable\"\
  ,\n\"type\": \"constructor\"\n}], '0xd5a2d13723A34522EF79bE0f1E7806E86a4578E9');\n\
  var payload = helloworldContract.methods.Hello().encodeABI();\nvar tx = {\nfrom:\
  \ \"0xF68b93AE6120aF1e2311b30055976d62D7dBf531\",\ngasPrice: \"20000000000\",\n\
  gas: \"4700000\",\ndata: payload\n};\nweb3.eth.accounts.signTransaction(tx, '0xc6676b7262dab1a3a28a781c77110b63ab8cd5eae2a5a828ba3b1ad28e9f5a9b')\n\
  .then(function (signedTx) {\nweb3.eth.sendSignedTransaction(signedTx.rawTransaction)\n\
  .then(console.log);\n});\n};\n```\n\n#### 重要提示\n\n当使用以太坊的公共托管节点时，应使用原始交易方法来创建和执行智能合约，因为该库的\
  \ `web3.eth.Contract` 子模块会使用与提供者以太坊节点相关联的已解锁账户或默认账户，但公共节点（在撰写本文时）不支持此功能。\n\n## 重新审视区块链概念\n\
  \n在前面的章节中，我们使用 JavaScript 以编程方式向比特币和以太坊区块链发送了交易。以下是一些现在可以重新审视的通用概念，我们从使用代码手动构建交易的角度来看。\n\
  \n- **交易**：审视我们编写的代码以及向以太坊和比特币发送交易时获得的输出，我们现在可以说，区块链交易是由账户所有者发起的操作，如果成功完成，则会更新区块链的状态。例如，在爱丽丝和鲍勃之间的交易中，我们看到一定数量的比特币和以太币的所有权从爱丽丝转移到鲍勃，反之亦然，并且这种所有权变更被记录在区块链中，从而使其进入新状态。在以太坊的情况下，交易进一步涉及合约创建和执行，这些交易也会更新区块链的状态。我们创建了一个交易，该交易进而将智能合约部署到以太坊区块链上。区块链的状态得到了更新，因为现在我们在区块链中创建了一个新的合约账户。\n\
  - **输入、输出、账户和余额**：我们还了解到比特币和以太坊在状态管理方面有何不同。比特币使用 UTXO 模型，而以太坊使用账户和余额模型。然而，其根本思想是，两个区块链都记录资产的所有权，并且交易用于更改这些资产的所有权。\n\
  - **交易费用**：对于我们在公共区块链网络上进行的每笔交易，我们必须支付交易费用，以便矿工确认我们的交易。在比特币中，这是自动计算的，而在以太坊中，我们应该根据\
  \ Gas 价格和 Gas 上限来注明我们愿意支付的最高费用。\n- **签名**：在这两种情况下，我们还看到，在用所需的值创建交易对象后，我们使用发送者的公钥对其进行了签名。密码学签名是证明资产所有权的一种方式。如果签名不正确，那么交易将变为无效。\n\
  - **交易广播**：创建并签署交易后，我们将它们发送到区块链节点。虽然我们将示例交易发送到了公开托管的比特币和以太坊测试网络节点，但如果我们不信任所有节点都能处理我们的交易，我们可以自由地将交易发送到多个节点。这被称为交易广播。\n\
  \n总而言之，在与区块链交互时，如果我们打算更新区块链的状态，就需要提交已签名的交易；而为了让这些交易得到确认，我们需要向网络支付一些费用。\n\n\n\n##\
  \ 公有链与私有链\n\n根据访问控制方式，区块链可分为公有链和私有链。公有链也称为无许可区块链，私有链也称为有许可区块链。两者之间的主要区别在于访问控制机制。公有链或无许可区块链不限制新节点加入网络，任何人均可接入网络。私有链的网络节点数量有限，并非所有人都能加入网络。公有链的典型例子为比特币和以太坊主网。私有链的示例则可以是几个相互连接但未接入主网的以太坊节点组成的网络，这些节点统称为私有链。\n\
  \n企业通常使用私有链与合作伙伴和/或下属组织间进行数据交换。\n\n在开发区块链应用时，区块链类型（公有或私有）会产生关键影响，因为与区块链交互的规则可能相同也可能不同。这被称为区块链治理。公有链具备一套预定义的规则，而私有链可针对每条链制定不同的规则。例如，供应链场景的私有链可能采用不同的治理规则，协议治理场景的私有链也可能设置不同规则。举例来说，上述私有以太坊账本与以太坊主网在代币、燃料价格、交易手续费、端点等参数上可能相同也可能不同。这些差异也会影响我们的应用程序。\n\
  \n在代码示例中，我们主要聚焦于比特币和以太坊的公开测试网络。虽然与这些区块链的私有部署进行交互的基本概念仍然相同，但配置代码指向私有网络的方式会存在差异。\n\
  \n## 去中心化应用架构\n\n通常情况下，去中心化应用旨在直接与区块链节点交互，无需引入任何中心化组件。然而在实际场景中，由于需要兼容传统系统以及现有区块链网络的功能限制和扩展性问题，我们在设计\
  \ DApp 时有时不得不在完全去中心化与可扩展性之间做出权衡。\n\n### 公共节点 vs. 自托管节点\n\n区块链是由节点组成的去中心化网络。所有节点持有相同的数据副本，并能始终保持数据状态一致。当为区块链开发应用时，我们可以让应用与目标网络的任意节点通信。主要存在两种配置方案：\n\
  \n*   应用与节点均在本地运行：应用和节点都在本地机器上运行。这意味着我们需要应用用户运行一个本地区块链节点，并将应用配置为与该节点连接。这种模式属于纯去中心化应用运行模式。以太坊\
  \ Mist 浏览器就是这种模式的示例，它使用本地 `geth` 节点。图 5-6 展示了这种配置。\n\n    ![A440588_1_En_5_Fig6_HTML.jpg](img/A440588_1_En_5_Fig6_HTML.jpg)\n\
  \n    图 5-6\n\n    DApp 连接至本地节点\n*   公共节点：应用与第三方托管的公共节点进行通信。这样用户无需托管本地节点。此方法既有优势也存在不足。虽然用户无需为运行本地节点支付电费和存储费用，但他们需要信任第三方来向区块链广播交易。以太坊浏览器插件\
  \ `metamask` 就采用这种模式，连接到公共托管的以太坊节点。图 5-7 展示了这种配置。\n\n    ![A440588_1_En_5_Fig7_HTML.jpg](img/A440588_1_En_5_Fig7_HTML.jpg)\n\
  \n    图 5-7\n\n    DApp 连接至公共节点\n\n### 去中心化应用与服务器\n\n除了上述场景，根据特定的用例和需求，还可能存在其他配置方案。在许多场景下，应用与区块链之间需要设置服务器。例如：当需要维护区块链状态缓存以加速查询时；当应用需要根据区块链上的状态更新向用户发送通知（邮件、推送、短信等）时；以及当涉及多个账本，需要运行后端逻辑在账本之间转换数据时。不妨想象一下某些大型加密货币交易所所使用的底层基础设施——我们获得的所有服务，如双因素认证、通知、支付网关等，这些服务在任何一个区块链中都无法直接提供。从更广泛的意义上讲，区块链只是确保了数据层的防篡改性和可审计性。\n\
  \n## 本章小结\n\n本章我们学习了去中心化应用的开发，并通过代码练习了解了如何以编程方式与比特币和以太坊区块链交互。我们还探讨了一些 DApp 架构模型，以及它们如何根据不同的用例而有所区别。\n\
  \n下一章我们将搭建一个私有以太坊网络，然后开发一个功能完善的 DApp 与该私有网络交互，该 DApp 还将使用智能合约来实现业务逻辑。\n\n"
- "# 6. 构建一个以太坊 DApp\n\n在上一章中，我们学习了如何使用 JavaScript 以编程方式与比特币和以太坊区块链交互，还初步了解了如何创建和部署以太坊智能合约。在本章中，我们将通过学习和开发一个基于以太坊区块链的\
  \ DApp，把区块链应用程序开发提升到新的水平。作为创建这个 DApp 的一部分，我们将搭建一个私有以太坊网络，然后将这个网络作为 DApp 的底层区块链。这个\
  \ DApp 的业务逻辑将封装在以太坊智能合约中，并通过连接到私有以太坊网络的 Web 应用来执行这些逻辑。通过这种方式，我们旨在全面覆盖以太坊应用开发的各个方面——从搭建节点和网络，到创建和部署智能合约，再到使用客户端应用执行智能合约函数。\n\
  \n\n\n## DApp 去中心化应用\n\n在开始开发 DApp 之前，我们需要定义其用例，同时明确构成该 DApp 的各个组件。那么，我们首先来完成这项工作。\n\
  \n我们 DApp 的用例是一个投票应用，允许选民对发布在公共领域的投票进行表决。使用中心化系统的投票方式可靠性不足，因为它存在单一的数据篡改点和故障点。因此，我们\
  \ DApp 的目标是实现去中心化投票。这样一来，每位选民都能掌控自己的选票，每张选票都会在区块链的每个节点上处理，从而杜绝投票数据被篡改的可能。虽然使用公共以太坊网络可以轻松实现这一点，但为了让我们的实践更有趣，我们将把投票\
  \ DApp 部署在一个私有以太坊网络上，为此我们还需要搭建这个私有网络。听起来很有趣吧？我们这就开始。\n\n第一步是搭建一个私有以太坊网络。然后，为了托管业务逻辑和投票结果，我们将创建一个部署在该私有以太坊网络上的智能合约。为了与此智能合约进行交互，我们将使用\
  \ `web3` 库创建一个前端 web 应用。仅此而已。\n\n按照刚才描述的计划，我们的 DApp 开发实践将包含以下步骤：\n\n1.  搭建一个私有以太坊网络\n\
  2.  为投票功能创建一个智能合约\n3.  将智能合约部署到私有网络\n4.  创建用于与智能合约交互的前端 web 应用\n\n在接下来的章节中，我们将详细探讨上述每个步骤。\n\
  \n**注意**\n\n如前所述，我们也可以为此 DApp 开发使用公共以太坊网络。除此之外，我们还可以使用诸如 `Metamask` 和 `Truffle`\
  \ 框架等多种工具来加速以太坊 DApp 的开发。这些工具与其他各类工具一起，能让我们更好地管理代码和部署。鼓励读者探索这些工具以及其他工具，以找到最佳组合，为他们的\
  \ DApp 开发创建一个舒适且高效的环境。本文主要旨在让读者理解创建以太坊 DApp 时的底层机制，因此，所有在 DApp 开发流程之上提供抽象层的工具均不在讨论范围之内。\n\
  \n## 搭建私有以太坊网络\n\n为了搭建一个私有以太坊网络，我们需要使用现有的多种以太坊客户端之一。简单来说，以太坊客户端是一种实现了以太坊区块链协议的应用程序。如今互联网上有很多以太坊客户端；其中流行的一种是\
  \ `go-ethereum`，也被称为 `geth`。我们将使用 `geth` 来搭建我们的私有网络。本次实践，我们使用的是一台运行 Ubuntu Linux\
  \ 16.04 版本的虚拟机。\n\n### 安装 go-ethereum（geth）\n\n第一步是在我们的本地机器上安装 `geth`。为了安装 `geth`，我们将从官方来源\
  \ [`https://geth.ethereum.org/downloads/`](https://geth.ethereum.org/downloads/)\
  \ 获取 `geth` 的可执行安装程序。`geth` 官方网站的这个下载页面列出了所有主要平台（Windows、macOS、Linux）的安装包。\n\n下载适用于你平台的安装包，然后在本地机器上安装\
  \ `geth`。如果你不想在本地机器上安装，也可以选择将 `geth` 安装到远程（云托管）服务器或虚拟机上。\n\n当 `geth` 成功安装在本地机器上后，你可以通过在终端或命令提示符中运行以下命令来检查安装情况。\n\
  \n```\ngeth version\n```\n\n根据你的平台操作系统和安装的 `geth` 版本，该命令的输出应类似于以下内容：\n\n```\nGeth\n\
  版本: 1.7.3-stable\nGit 提交: 4bb3c89d44e372e6a9ab85a8be0c9345265c763a\n架构: amd64\n\
  协议版本: [63 62]\n网络 ID: 1\nGo 版本: go1.9\n操作系统: linux\nGOPATH=\nGOROOT=/usr/lib/go-1.9\n\
  ```\n\n### 创建 geth 数据目录\n\n默认情况下，`geth` 有自己的工作目录，但我们将创建一个自定义目录，以便于跟踪。只需创建一个目录并记住该路径。\n\
  \n```\nmkdir mygeth\n```\n\n### 创建一个 geth 账户\n\n我们首先需要一个能够持有以太币的以太坊账户。在后续的 DApp\
  \ 开发中，我们需要这个账户来创建智能合约和交易。我们可以使用以下命令创建一个新账户。\n\n```\nsudo geth account new --datadir\
  \ \nsudo geth account new --datadir /mygeth\n```\n\n**注意**\n\n我们使用 `sudo` 是为了避免权限问题。\n\
  \n运行此命令时，提示符会要求输入密码来锁定该账户。输入并确认密码后，你的 `geth` 账户就创建成功了。请务必记住你输入的密码；稍后解锁账户以签署交易时会用到它。该账户的地址会显示在屏幕上。对我们来说，生成的账户地址是\
  \ `baf735f889d603f0ec6b1030c91d9033e60525c3`。以下截图（图 6-1）展示了这一过程。\n\n![A440588_1_En_6_Fig1_HTML.jpg](img/A440588_1_En_6_Fig1_HTML.jpg)\n\
  \n**图 6-1** 使用 geth 设置以太坊账户\n\n请注意，我们将数据目录作为参数传递给了创建账户的命令。这是为了确保包含账户详细信息的文件创建在我们的数据目录内，从而便于在此目录上下文中访问该账户。如果我们没有向\
  \ `geth` 命令传递数据目录参数，它将自动使用数据目录的默认位置（该位置可能因平台而异）。\n\n### 创建 genesis.json 配置文件\n\n\
  安装 `geth` 并创建一个新账户后，下一步是为我们的私有网络定义创世配置。正如我们在前几章中所见，区块链都有一个创世块，作为区块链的起点，所有交易和区块都会根据创世块进行验证。对于我们的私有网络，我们将有一个自定义的创世块，从而也就有了一个自定义的创世配置。此配置定义了区块链的一些关键值，如难度级别、区块的\
  \ gas 上限等。\n\n以太坊的创世配置采用以下 JSON 对象格式。该对象的每个键都是一个驱动网络的配置值。\n\n```\n{\n\"config\"\
  : {\n\"chainId\": 3792,\n\"homesteadBlock\": 0,\n\"eip155Block\": 0,\n\"eip158Block\"\
  : 0\n},\n\"difficulty\": \"2000\",\n\"gasLimit\": \"2100000\",\n\"alloc\": {\n\"\
  baf735f889d603f0ec6b1030c91d9033e60525c3\": { \"balance\": \"9000000000000000000\"\
  \ }\n}\n}\n```\n\n这个 JSON 对象主要由一个 config 部分组成，其值特定于 `chainId` 以及一些已发生分叉的区块号。这里需要注意的重要参数是\
  \ `chainId`，它代表区块链的标识符，有助于防止重放攻击。对于我们的私有链，我们选择了一个随机的 `chainId` 3792。你可以选择任何与此处主网（1）和测试网（2、3、4）所使用的数字不同的数字。\n\
  \n下一个重要参数是 `difficulty`。该值定义了挖掘新区块的难度。这个值在以太坊主网络中要高得多，但对于私有网络，我们可以选择一个相对较小的值。\n\n\
  然后是 `gasLimit`。这是针对一个区块（而非单笔交易）的总 gas 限制。通常，该值越高，每个区块能容纳的交易就越多。\n\n最后是 `alloc` 部分。使用此配置，我们可以用以\
  \ wei 为单位的价值预先为以太坊账户充值。正如我们所见，我们用 9 个以太币为上一小节创建的同一个以太坊账户注入了资金。\n\n\n\n#### 运行私有网络的第一个节点\n\
  \n要运行私有区块链的第一个节点，我们首先复制上一步中的 JSON 内容，并将其保存为名为 `genesis.json` 的文件。为简单起见，我们将该文件保存在与\
  \ `geth` 数据目录相同的目录中。\n\n首先，我们需要使用 `genesis.json` 初始化 `geth`。这一初始化步骤是为我们的私有网络设置自定义创世配置所必需的。\n\
  \n切换到保存 `genesis.json` 文件的目录：\n\n```\ncd mygeth\n```\n\n以下命令将使用我们定义的自定义配置初始化 `geth`：\n\
  \n```\nsudo geth --datadir \"/mygeth\" init genesis.json\n```\n\n`geth` 将确认自定义创世配置设置完成，并输出如下截图所示的内容（图\
  \ 6-2）。\n\n![A440588_1_En_6_Fig2_HTML.jpg](img/A440588_1_En_6_Fig2_HTML.jpg)\n\n\
  图 6-2\n\n使用 `genesis.json` 中的配置初始化 `geth`\n\n接下来，我们需要使用以下命令和参数运行 `geth`。我们将逐一详细解释这些参数。\n\
  \n```\nsudo geth --datadir \"/mygeth\" --networkid 8956 --ipcdisable --port 30307\
  \ --rpc --rpcapi \"eth,web3,personal,net,miner,admin,debug\" --rpcport 8507 --mine\
  \ --minerthreads=1 --etherbase=0xbaf735f889d603f0ec6b1030c91d9033e60525c3\n```\n\
  \n让我们看看传递给 `geth` 命令的每个参数。\n\n-   `datadir`：用于指定数据目录，与之前的步骤相同。\n-   `networkid`：这是网络的标识符，用于将我们的私有网络与其他以太坊网络区分开来。它与我们在\
  \ `genesis.json` 文件中定义的 `chainId` 类似，但为网络之间提供了另一层区分。可以看到，我们为此值使用了另一个自定义编号。\n-  \
  \ `ipcdisable`：使用此参数，我们禁用了 `geth` 的进程间通信端口，这样在同一台本地机器上运行多个 `geth` 实例（节点）时，就不会遇到冲突问题。\n\
  -   `port`：我们为与 `geth` 交互的端口选择了一个自定义值。\n-   `rpc`、`--rpcapi`、`--rpcport`：这三个参数定义了\
  \ `geth` 公开的 RPC API 的配置。我们希望启用它；我们希望通过 RPC 公开 `eth`、`web3`、`personal`、`net`、`miner`、`admin`、`debug`\
  \ 这些 geth API；并且我们希望它在自定义端口 `8507` 上运行。\n-   `mine`、`minerthreads`、`etherbase`：通过这三个参数，我们指示\
  \ `geth` 将该节点作为矿工节点启动，将矿工进程线程数限制为一个（以避免消耗大量 CPU 资源），并将挖矿奖励发送到我们在第一步中创建的以太坊账户。\n\n\
  这就是目前运行第一个私有网络 `geth` 节点所需的全部配置。\n\n当我们使用所有参数运行此命令时，`geth` 将给出如下输出（如图 6-3 所示）。\n\
  \n![A440588_1_En_6_Fig3_HTML.jpg](img/A440588_1_En_6_Fig3_HTML.jpg)\n\n图 6-3\n\n\
  `geth` 运行第一个节点\n\n注意输出中的 UDP 监听器启动日志语句。\n\n```\nINFO [02-11|18:00:57] UDP listener\
  \ upself=enode://e03b50e9b1b2579904f2bbdff7dd0826bd4e4eb2e225c1d1cb1a765195474d7418f3e8fbfeefd55bd85722973d17626f0e53208c62e38d1099bb583e702b3b48@[::]:30307\n\
  ```\n\n这包含我们刚启动的节点的地址。要将其他节点连接到此节点，我们需要此地址。请将其记在某个地方。以下行是从上一条日志语句中提取的地址。\n\n```\n\
  enode://e03b50e9b1b2579904f2bbdff7dd0826bd4e4eb2e225c1d1cb1a765195474d7418f3e8fbfeefd55bd85722973d17626f0e53208c62e38d1099bb583e702b3b48@[::]:30307\n\
  ```\n\n注意我们在命令中定义的端口号前的 `[::]`。如果我们在同一台机器上运行另一个节点，请将其替换为本地主机 IP 地址，否则替换为机器的外部 IP\
  \ 地址。由于我们将在同一台机器上（出于开发目的）运行另一个网络节点，我们将用本地主机 IP 地址替换它。因此，第一个节点的最终地址将是\n\n```\nenode://e03b50e9b1b2579904f2bbdff7dd0826bd4e4eb2e225c1d1cb1a765195474d7418f3e8fbfeefd55bd85722973d17626f0e53208c62e38d1099bb583e702b3b48@127.0.0.1:30307\n\
  ```\n\n\n\n#### 运行网络中的第二个节点\n\n只有一个节点的网络是不存在的；它至少应该有两个节点。因此，让我们在同一台机器上运行另一个`geth`实例，它将与我们刚刚启动的节点进行交互，这两个节点一起组成我们的以太坊私有网络。\n\
  \n为了运行另一个节点，首先我们需要另一个目录，作为第二个节点的数据目录。我们来创建一个。\n\n```\nmkdir mygeth2\n```\n\n现在，我们将使用为第一个节点创建的同一个`genesis.json`配置来初始化这个节点。我们复制一份这个`genesis.json`文件，并将其保存在我们刚才创建的新目录中。让我们也切换到这个目录。现在，我们来初始化第二个节点的创世配置。\n\
  \n```\nsudo geth --datadir \"/mygeth2\" init genesis.json\n```\n\n然后，我们会得到与第一个节点类似的输出。请参见下面的截图（图\
  \ 6-4）。\n\n![A440588_1_En_6_Fig4_HTML.jpg](img/A440588_1_En_6_Fig4_HTML.jpg)\n\n\
  **图 6-4** 第二个节点的 Geth 初始化配置\n\n现在，我们的第二个节点也使用创世配置初始化完成了。让我们运行它。\n\n为了运行第二个节点，我们将向`geth`命令传递一些不同的参数。这个第二个节点不会作为矿工运行，因此我们将跳过第一个节点命令中的最后三个参数。同时，我们希望在运行此节点时暴露`geth`控制台，因此我们将添加一个相应参数。运行第二个节点的命令将是：\n\
  \n```\nsudo geth --datadir \"/mygeth2\" --networkid 8956 --ipcdisable --port 30308\
  \ --rpc --rpcapi \"eth,web3,personal,net,miner,admin,debug\" --rpcport 8508 console\n\
  ```\n\n正如我们所看到的，第二个节点的数据目录和端口已经更改。我们还在命令中添加了`console`标志，以便可以获取此节点的`geth`控制台。\n\n\
  当我们运行此命令时，第二个节点也将开始运行，我们将在终端中看到以下输出（图 6-5）。\n\n![A440588_1_En_6_Fig5_HTML.jpg](img/A440588_1_En_6_Fig5_HTML.jpg)\n\
  \n**图 6-5** 运行第二个节点的 Geth\n\n此时，我们的两个`geth`节点都在运行，但它们彼此都不知道对方的存在。如果我们在第二个节点的`geth`控制台上运行`admin.peers`命令，结果将得到一个空数组（图\
  \ 6-6）。\n\n![A440588_1_En_6_Fig6_HTML.jpg](img/A440588_1_En_6_Fig6_HTML.jpg)\n\n\
  **图 6-6** Geth 控制台——检查对等节点\n\n这意味着节点之间没有相互连接。让我们来连接这些节点。为此，我们将在第二个节点的`geth`控制台上发送`admin.addPeer()`命令，并将第一个节点的节点地址作为参数传入。还记得我们在运行第一个节点后记下了它的地址。让我们在第二个节点的`geth`控制台中运行此命令。\n\
  \n```\nadmin.addPeer(\"enode://e03b50e9b1b2579904f2bbdff7dd0826bd4e4eb2e225c1d1cb1a765195474d7418f3e8fbfeefd55bd85722973d17626f0e53208c62e38d1099bb583e702b3b48@127.0.0.1:30307\"\
  )\n```\n\n当我们在第二个节点上运行此命令后，它立即返回了`true`。此外，几秒钟后，它开始与第一个节点同步。以下截图（图 6-7）显示了来自第二个节点控制台的此输出。\n\
  \n![A440588_1_En_6_Fig7_HTML.jpg](img/A440588_1_En_6_Fig7_HTML.jpg)\n\n**图 6-7**\
  \ Geth 控制台——添加对等节点\n\n现在，我们的两个节点已连接，我们的私有以太坊网络已启动。为了进一步验证这一点，我们将在第二个节点上再次运行`admin.peers`命令。这次，我们将看到一个\
  \ JSON 数组，其中包含一个对象，显示第一个节点为对等节点（图 6-8）。\n\n![A440588_1_En_6_Fig8_HTML.jpg](img/A440588_1_En_6_Fig8_HTML.jpg)\n\
  \n**图 6-8** Geth 控制台——（再次）检查对等节点\n\n以下截图显示了我们已设置的两个节点的终端窗口。左侧是第一个节点，它也是一个矿工节点，正如我们所见，它正在持续挖掘新区块。第二个节点在右侧，我们可以看到它正在与第一个节点同步。由于包含的信息太多，该截图（图\
  \ 6-9）太小而无法阅读，但它只是捕获并并排显示了来自两个以太坊节点的日志。\n\n![A440588_1_En_6_Fig9_HTML.jpg](img/A440588_1_En_6_Fig9_HTML.jpg)\n\
  \n**图 6-9** 来自两个以太坊节点的 Geth 日志\n\n既然两个节点在网络上互为对等节点，我们就拥有了一个包含两个节点的、可运行的私有以太坊区块链。我们还有一个被设置为矿工并预充了部分以太币的以太坊账户。现在，我们可以在这个私有区块链上创建更多账户并在它们之间转移以太币。\n\
  \n在本节中，我们学习了如何搭建一个包含两个节点的私有以太坊网络。节点数量可以是任意多个；我们只需要为每个新节点遵循相同的过程。对于远程节点，我们需要注意指定远程机器的正确\
  \ IP 地址，并且如果存在阻止流量到达这些机器的防火墙，我们还应确保所需的端口已开放。\n\n\n\n## 创建智能合约\n\n现在我们已经搭建并运行了私有以太坊网络，接下来可以进入下一步，为我们的去中心化应用（DApp）创建投票功能的智能合约。然后将此合约部署到我们的私有网络上。我们将遵循上一章中创建和部署智能合约的相同步骤。\n\
  \n让我们启动 Remix 在线集成开发环境（IDE），用 Solidity 语言编写智能合约。\n\n以下 Solidity 代码片段展示了我们为投票功能编写的智能合约。\n\
  \n```\npragma solidity ⁰.4.19;\ncontract Poll {\nevent Voted(\naddress _voter,\n\
  uint _value\n);\nmapping(address => uint) public votes;\nstring pollSubject = \"\
  Should coffee be made tax free? Pass 1 for yes OR 2 for no in the vote function.\"\
  ;\nfunction getPoll() constant public returns (string) {\nreturn pollSubject;\n\
  }\nfunction vote(uint selection) public {\nVoted(msg.sender, selection);\nrequire\
  \ (votes[msg.sender] == 0);\nrequire (selection > 0 && selection < 3);\nvotes[msg.sender]\
  \ = selection;\n}\n}\n```\n\n现在，让我们分析这份合约源代码，理解我们在这里做了什么。如我们所见，合约的名称是 `Poll`。\n\n\
  下一行代码是\n\n```\nevent Voted(\naddress _voter,\nuint _value\n);\n```\n\n上面的代码片段基本上声明了一个智能合约事件，它接受两个参数：一个是以太坊地址类型，另一个是无符号整数类型。我们创建这个事件是为了能够记录谁在投票中投了什么。我们稍后会回到这一点。\n\
  \n接下来，我们有\n\n```\nmapping(address => uint) public votes;\n```\n\n上面这行代码声明了一个以太坊地址与无符号整数的映射。这是一个数据存储区，我们将在此存储投票者的地址以及他们选择的投票值。\n\
  \n然后我们有：\n\n```\nstring pollSubject = \"Should coffee be made tax free? Pass 1 for\
  \ yes OR 2 for no in the vote function.\";\nfunction getPoll() constant public returns\
  \ (string) {\nreturn pollSubject;\n}\n```\n\n上面的代码片段首先声明了一个用于投票主题的字符串。在这里，我们向投票者提出了一个问题。然后我们有一个函数可以返回这个字符串的值，以便投票者查询投票内容。\n\
  \n最后，我们实现了投票功能的函数。\n\n```\nfunction vote(uint selection) public {\nVoted(msg.sender,\
  \ selection);\nrequire (votes[msg.sender] == 0);\nrequire (selection > 0 && selection\
  \ < 3);\nvotes[msg.sender] = selection;\n}\n```\n\n仔细检查上述代码片段的每一行。\n\n首先，一旦进入这个函数，我们就触发之前创建的\
  \ Voted 事件，传入发送者地址（投票者）和他所选择的值。\n\n接下来，我们通过检查映射中对应地址的投票值是否为零，来限制每个投票者只能投一次票。`require`\
  \ 语句用于根据用户输入检查条件。\n\n然后，我们还通过使用 `require` 语句，将选择的值限制为 1 或 2。1 表示赞成，2 表示反对。并且我们已经在\
  \ `pollSubject` 字符串中传递了这些指令，以便投票者知道该如何操作。\n\n图 6-10 的屏幕截图显示了 Remix 中的智能合约。\n\n我们使用\
  \ Remix 编译了这份合约代码，并获取了合约的 ABI 和字节码，以便将其部署到我们的私有网络中。我们从 Remix 编译选项卡详情弹出窗口的相应部分复制了字节码和\
  \ ABI —— 这与我们在上一章中的操作完全一致。\n\n![A440588_1_En_6_Fig10_HTML.jpg](img/A440588_1_En_6_Fig10_HTML.jpg)\n\
  \n**图 6-10** 在 Remix 在线 Solidity 编辑器中编辑智能合约\n\n合约的 ABI 如下\n\n```\n[\n{\n\"constant\"\
  : true,\n\"inputs\": [\n{\n\"name\": \"\",\n\"type\": \"address\"\n}\n],\n\"name\"\
