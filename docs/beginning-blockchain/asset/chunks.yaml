- fmt: '## The History of Money


    Ever wonder what money is and why it even exists? Money is primarily the medium
    of exchange for exchanging value, that is anything of value. It has a history
    to it. We will quickly recap the history to be able to understand how money has
    evolved to how we know it today, and how Bitcoin furthers it to the next level.


    Not everyone has everything. In the good old days when there were no notions of
    currency or money, people still figured out how they could exchange what they
    had in surplus for what they needed from someone else. Those were the days of
    the barter system. Wheat in exchange for peddy or oranges for lemons was the system.
    This was all good, but what if someone having wheat needs medicine that the other
    person does not have? Example: Alice has wheat and needs medicine, but Bob knows
    she has access to someone who has oranges, and Bob needs wheat. In this situation,
    the exchange is not working out. So, they have to find a third person, Charlie,
    who might need oranges and as well has surplus medicine. A pictorial representation
    of this scenario is shown in Figure [3-1](#A440588_1_En_3_Chapter.html#Fig1).


    ![A440588_1_En_3_Fig1_HTML.jpg](A440588_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    The primitive barter system


    It was always tough to find a person such as Charlie in the previous example who
    could fit in the puzzle so easily; this problem had to be solved. So, people started
    thinking of a commoditized system of value exchange. There were a few items that
    everyone would need, such as milk, salt, seeds, sheep, etc. This system almost
    worked out! Soon after, people realized that it was quite inconvenient and difficult
    to store such commodities.


    Eventually, better techniques were found to be used as financial instruments,
    such as metal pieces. People valued the rare metals more than the usual ones.
    Gold and silver metals topped the list as they wouldn’t corrode. Then countries
    started minting their own currency (metal coins with different weights) with their
    official seal in them. Though the metal pieces and coins were better than the
    previous system, as one could easily store and carry them, they were vulnerable
    to theft. Temples came into rescue as people trusted in them and had a strong
    belief that no one would steal from temples. The priests would give a receipt
    to the person depositing gold that would mention the amount of gold/silver received,
    as a promise to acknowledge their deposit and give back to the bearer of the receipt
    the same when they returned. The person bearing the receipt could circulate the
    receipt in the market to get what they wanted. This was the beginning of our banking
    system. The receipt worked, as the fiat currency and the temples played the role
    of centralized banks that people trusted. Refer to Figure [3-2](#A440588_1_En_3_Chapter.html#Fig2)
    to understand how this system appeared back then.


    ![A440588_1_En_3_Fig2_HTML.jpg](A440588_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    The beginning of the banking era


    In the system just mentioned, currency was always backed by some precious metal
    such as gold or silver. This system continued even after the governments and banks
    replaced the temples. This is how the commodity currency came up in the market
    to enable a universal medium of value exchange for the goods and services. Whatever
    currency was there in those days was all backed by gold/silver.


    Slowly, “fiat currency” was introduced by the governments as legal tender, which
    was no longer backed by gold or silver. It was purely trust based, in the sense
    that people did not have a choice but to trust the government. Fiat currency does
    not have any intrinsic value, it is just backed by the government. Today, the
    money that we know of is all fiat currencies. So, the value of money today depends
    on the stability and performance of the governments in whose jurisdiction the
    currency is being issued and used. Those paper currencies were the money themselves
    and there was nothing more valuable in the banks. This was the state of banking
    systems and at the same time the digital world was just forming up.


    Around the 1990s, the Internet world was gaining momentum and the banking systems
    were getting digitized. Since some level of discomfort was still there with fiat
    currencies, since they were perishable and vulnerable to theft, banks assured
    that people could just go digital! This was the era when even the paper notes
    weren’t required to be printed. Money became the digital numbers in the computer
    systems of banks. Today, if every account holder went to their respective bank
    and demanded the currency notes for the amount of money they hold in their accounts,
    the banks would be in big trouble! The total real money in circulation is extremely
    marginal compared with the amount of digital money worldwide.


    ## Dawn of Bitcoin


    In the first chapter we looked at the technology aspects of the Internet revolution,
    and in the previous section of this chapter we looked at the evolution of money.
    We should now look at them side by side to understand Satoshi Nakamoto’s perspective
    behind designing Bitcoin—a cryptocurrency. In this section and elsewhere in this
    text, we will try to elaborate on Satoshi’s statements in the paper he wrote on
    Bitcoin.


    We learned about temples and then governments and banks for the role they played
    in the currency systems that evolved from barter systems. Even today, the situation
    is just the same. If you zoom in a bit on these systems, you will find that the
    one pivotal thing that makes these systems stable is the “trust” element. People
    trusted temples, and then they trusted governments and banks. The entire commerce
    on the Internet today relies on the centralized, trusted third parties to process
    payments. Though the Internet was designed to be peer-to-peer, people build centralized
    systems on it to reflect the same old practice. Well, technically building a peer-to-peer
    system back in the 2000s was quite tough considering the maturity of technology
    during that time. Consequently, the cost of transactions, time taken for a transaction
    to settle, and other issues due to centralization were obvious. This wasn’t the
    case with physical currencies, as transactions meant settlement.


    Could there be a digital currency backed by computing power, the same way gold
    was used to back the money in circulation? The answer is “Yes,” thanks to Satoshi’s
    Bitcoins. Bitcoins are designed to enable electronic payments between two parties
    based on cryptographic proof, and not based on trust due to intermediary third
    parties. It is possible today because of the technological advancements. In this
    chapter, we will see how Satoshi Nakamoto combined cryptography, game theory,
    and computer science engineering fundamentals to design the Bitcoin system in
    2008. After it went live in 2009 and till today, the system is quite stable and
    robust enough to sustain any kind of cyber attacks. It stood the test of time
    and positioned itself as a global currency.'
