- fmt: '### Run the Second Node of the Network


    There is no network with just one node; it should at least have two nodes. So,
    let’s run another `geth` instance on the same machine, which will interact with
    the node we just started, and both these nodes together will form our Ethereum
    private network.


    To run another node, first of all we need another directory that can be set as
    the data directory of the second node. Let us create one.


    ```

    mkdir mygeth2

    ```


    Now, we will initialize this node also with the same `genesis.json` configuration
    we created for the first node. Let’s create another copy of this `genesis.json`
    file and save it in the new directory we created earlier. Let’s also CD to this
    directory. Now, let’s initialize the genesis configuration for the second node.


    ```

    sudo geth --datadir "/mygeth2" init genesis.json

    ```


    And, we will get a similar output as we got for the first node. See the screenshot
    below (Figure 6-4).


    ![A440588_1_En_6_Fig4_HTML.jpg](A440588_1_En_6_Fig4_HTML.jpg)


    **Figure 6-4** Geth initialize configuration for second node


    Now our second node is also initialized with the genesis configuration. Let’s
    run it.


    For running the second node, we will pass a few different parameters to the `geth`
    command. This second node will not run as a miner, so we will skip the last three
    parameters from the command that we gave to the first node. Also, we want to expose
    the `geth` console while running this node, so we will add a parameter for that.
    The command for running the second node will be


    ```

    sudo geth --datadir "/mygeth2" --networkid 8956 --ipcdisable --port 30308 --rpc
    --rpcapi "eth,web3,personal,net,miner,admin,debug" --rpcport 8508 console

    ```


    As we can see, the data directory and ports have been changed for the second node.
    We also have added the `console` flag to the command so we can get the `geth`
    console for this node.


    When we run this command, the second node will also start running and we will
    see the following output in the terminal (Figure 6-5).


    ![A440588_1_En_6_Fig5_HTML.jpg](A440588_1_En_6_Fig5_HTML.jpg)


    **Figure 6-5** Geth run second node


    At this time, both our `geth` nodes are running but they do not know about each
    other. If we run the `admin.peers` command on the `geth` console of the second
    node, we will get an empty array as the result (Figure 6-6).


    ![A440588_1_En_6_Fig6_HTML.jpg](A440588_1_En_6_Fig6_HTML.jpg)


    **Figure 6-6** Geth console — check for peers


    This means that the nodes are not connected to each other. Let’s connect the nodes.
    To do this, we will send the `admin.addPeer()` command on the `geth` console of
    the second node with the node address of the first node as the parameter. Remember
    we noted the address of the first node after running it. Let’s run this command
    in the second node’s `geth` console.


    ```

    admin.addPeer("enode://e03b50e9b1b2579904f2bbdff7dd0826bd4e4eb2e225c1d1cb1a765195474d7418f3e8fbfeefd55bd85722973d17626f0e53208c62e38d1099bb583e702b3b48@127.0.0.1:30307")

    ```


    And as soon as we run this command on the second node, it returns `true`. Also,
    after a few seconds it starts synchronization with the first node. The following
    screenshot (Figure 6-7) shows this output from the console of the second node.


    ![A440588_1_En_6_Fig7_HTML.jpg](A440588_1_En_6_Fig7_HTML.jpg)


    **Figure 6-7** Geth console — add peer node


    Both our nodes are now connected and our private Ethereum network is up. To further
    verify this, we will run the `admin.peers` command again on the second node and
    this time we will see the JSON array with an object showing the first node as
    the peer (Figure 6-8).


    ![A440588_1_En_6_Fig8_HTML.jpg](A440588_1_En_6_Fig8_HTML.jpg)


    **Figure 6-8** Geth console — check for peers (again)


    The following screenshot shows the terminal windows of both the nodes we’ve set
    up. On the left is the first node, which is also a miner node, and as we can see
    it is constantly mining new blocks. The second node is on the right and we can
    see it is synchronizing with the first node. The screenshot (Figure 6-9) is too
    small to read because of too much information in it, but it just captures and
    shows the logs from both Ethereum nodes side by side.


    ![A440588_1_En_6_Fig9_HTML.jpg](A440588_1_En_6_Fig9_HTML.jpg)


    **Figure 6-9** Geth logs from both Ethereum nodes


    Now that both nodes are peers to each other in the network, we have a working
    private Ethereum blockchain with two nodes. We also have an Ethereum account that
    is set as a miner and also is prefunded by some Ether amount. We can now create
    more accounts and pass Ether among them on this private blockchain.


    In this section we learned how to set up a private Ethereum network with two nodes.
    This can be any number of nodes; we just need to follow the same process for each
    new node. In case of remote nodes, we should be careful about specifying the right
    IP addresses of the remote machines and we should also make sure that the required
    ports are opened if there is a firewall preventing traffic to the machines.'
