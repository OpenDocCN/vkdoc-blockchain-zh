- fmt: '## Interacting Programmatically with Ethereum — Sending Transactions


    The Ethereum blockchain has much more to offer in terms of blockchain application
    development as compared with the Bitcoin blockchain. The ability to execute logic
    on the blockchain using smart contracts is the key feature of Ethereum blockchain
    that allows developers to create decentralized applications. In this section we
    will learn how to programmatically interact with the Ethereum blockchain using
    JavaScript. We will look at the main aspects of Ethereum application programming
    from simple transactions to creating and calling smart contracts.


    As we did for interacting with the Bitcoin blockchain in the previous section,
    we will be using a JavaScript library and test network for interacting with Ethereum
    as well. We will use the `web3` JavaScript library for Ethereum. This library
    wraps a lot of Ethereum JSON-RPC APIs and provides easy to use functions to create
    Ethereum DApps using JavaScript. At the time of this writing, we are using a version
    greater than and compatible with version `1.0.0-beta.28` of the `web3` JavaScript
    library.


    For the test network, we will be using the Ropsten test network for Ethereum blockchain.


    For simplicity, we will again use a public-hosted test network node for Ethereum
    so that we don’t have to host a local node while running these code snippets.
    However, all snippets should work with a locally hosted node as well. We are using
    the Ethereum APIs provided by the Infura service. Infura is a service that provides
    public-hosted Ethereum nodes so that developers can easily test their Ethereum
    apps. There is a small and free registration step needed before we can use the
    Infura API, so we will go to [`https://infura.io`](https://infura.io/) and do
    a registration. We will get an API key after registration. Using this API key,
    we can now call the Infura API.


    The following (Figure [5-3](#A440588_1_En_5_Chapter.html#Fig3)) shows how this
    code interacts with the Ethereum blockchain. Note: The figure is just a rough
    sketch and does not show the Infura service architecture in detail.


    ![A440588_1_En_5_Fig3_HTML.jpg](A440588_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Application interacting with Ethereum blockchain using Infura API service


    The following subsections of this section are steps to follow, in that order,
    to send a transaction to the Ethereum Ropsten test network using JavaScript.


    ### Set Up Library and Connection


    First, we install the `web3` library in our Node.js application. Note the specific
    version of library mentioned in the installation command. This is because version
    `1.0.0` of the library has some more APIs and functions available and they reduce
    dependency on other external packages.


    ```

    npm install web3@1.0.0-beta.28

    ```


    Then, we initialize the library in our Node.js Ethereum module using the `require`
    keyword:


    ```

    var Web3 = require(''web3'');

    ```


    Now, we have a reference of the `web3` library, but we need to instantiate it
    before we can use it. The following line of code creates a new instance of the
    `Web3` object and sets the Infura-hosted Ethereum Ropsten test network node as
    the provider for this `Web3` instance.


    ```

    var web3 = new Web3(new Web3.providers.HttpProvider(''https://ropsten.infura.io/''));

    ```


    ### Set Up Ethereum Accounts


    Now that we are all set up, let’s send a transaction to the Ethereum blockchain.
    In this transaction, we will send some Ether from one account to another. Recall
    from Chapter [4](#A440588_1_En_4_Chapter.html) that Ethereum does not use the
    UTXO model but it uses an account and balances model.


    Basically, the Ethereum blockchain manages state and assets in terms of accounts
    and balances just like banks do. There are no inputs and outputs here. You can
    simply send Ether from one account to another and Ethereum will make sure that
    the states are updated for these accounts on all nodes.


    To send a transaction to Ethereum that transfers Ether from one account to others,
    we will first need a couple of Ethereum accounts. Let’s start with creating two
    accounts for Alice and Bob.


    The following code snippet calls the account creation function of `web3` library
    and creates two accounts.


    ```

    var createAccounts = function () {

    var aliceKeys = web3.eth.accounts.create();

    console.log(aliceKeys);

    var bobKeys = web3.eth.accounts.create();

    console.log(bobKeys);

    };

    ```


    And here’s the output that we get in the console window after running the previous
    snippet.


    ```

    {

    address: ''0xAff9d328E8181aE831Bc426347949EB7946A88DA'',

    privateKey: ''0x9fb71152b32cb90982f95e2b1bf2a5b6b2a53855eacf59d132a2b7f043cfddf5'',

    signTransaction: [Function: signTransaction],

    sign: [Function: sign],

    encrypt: [Function: encrypt]

    }

    {

    address: ''0x22013fff98c2909bbFCcdABb411D3715fDB341eA'',

    privateKey: ''0xc6676b7262dab1a3a28a781c77110b63ab8cd5eae2a5a828ba3b1ad28e9f5a9b'',

    signTransaction: [Function: signTransaction],

    sign: [Function: sign],

    encrypt: [Function: encrypt]

    }

    ```


    As you can see, along with the addresses and private keys, the output for each
    account creation function call also includes a few functions. For now, we will
    focus on the `address` and `privateKey` of the returned objects. The `address`
    is the Keccak-256 hash of the ECDSA public key of the generated private key. This
    `address` and `privateKey` combination represents an account on the Ethereum blockchain.
    You can send Ether to the `address` and you can spend that Ether using the `privateKey`
    of the corresponding address.


    ### Get Test Ether in Sender’s Account


    Now, to create an Ethereum transaction which transfers Ether from one account
    to another, we first need some Ether in one of the accounts. Recall from the Bitcoin
    programming section that we used testnet faucets to get some test Bitcoins on
    the address we generated. We will do the same for Ethereum also. Remember that
    we are targeting the Ropsten test network for Ethereum, so we will search for
    a Ropsten faucet on the Internet. For this example, we submitted Alice’s address
    that we generated in the previous code snippet to an Ethereum Ropsten test network
    faucet and we received three ethers on that address.


    After receiving Ether on Alice’s address, let’s check the balance of this address
    to confirm if we really have the Ether or not. Though we can check the balance
    of this address using any of the Ethereum explorers online, let’s do it using
    code. The following code snippet calls the `getBalance` function passing Alice’s
    address as input parameter.


    ```

    var getBalance = function () {

    web3.eth.getBalance(''0xAff9d328E8181aE831Bc426347949EB7946A88DA'').then(console.log);

    };

    ```


    And we get the following output as the balance of Alice’s address. That’s a huge
    number but that’s actually the value of the balance in `wei`. `Wei` is the smallest
    unit of Ether. One Ether equals 10^18 `wei`. So, the following value equals three
    Ether, which is what we received from the test network faucet.


    ```

    3000000000000000 000

    ```'
