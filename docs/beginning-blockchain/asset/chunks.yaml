    Note carefully that the aforementioned fields are supplied in the order specified
    and are all RLP encoded, except for the field names. So, an Ethereum transaction
    actually means a signed data package with these fields. The gasPrice and gasLimit
    fields are important to prevent denial of service attack. In order to prevent
    accidental or deliberate attempts of infinite loops or other computational wastage
    in code, each transaction is required to set a limit on how many computational
    steps for code execution it can use.


    Ethereum transactions are actually the "state transition functions" because a
    successful transaction changes the state. Also, the result of these transactions
    can be stored, as we already looked at in the “Account State” section previously.


    Ethereum messages on the other hand are like transactions, but are triggered only
    by Contract Accounts and not by EOAs. Also, messages are only meant to be between
    the Contract Accounts, due to which they are also referred to as "internal transactions."
    So, contracts have the ability to send messages to other contracts.


    Typically, a message is produced when a contract, while executing its code, encounters
    the “CALL” or “DELEGATECALL” opcodes. So, messages are more like function calls
    that exist in the Ethereum execution environment. It is also important to note
    that messages are always raw and never serialized or deserialized. A message contains
