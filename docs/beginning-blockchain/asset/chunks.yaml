  trans: "\n# 以太坊虚拟机与代码执行\n\n以太坊是一个可编程的区块链，允许用户通过图灵完备的语言创建任意复杂度的自定义操作。`EVM`是以太坊的执行引擎，作为智能合约的运行时环境。它是以太坊相较于其他区块链系统最核心的创新，正是基于`EVM`，智能合约技术有望迈向新的创新高度，而竞争已然开启。`EVM`在交易执行、改变以太坊状态以及达成共识方面也扮演着关键角色。`EVM`的设计目标如下：\n\
    \n- **简洁性**：其理念是使用底层结构让`EVM`尽可能简单。因此，底层操作码的数量被控制在最小范围，数据类型也同样精简，但仍可使用这些结构便捷地编写复杂逻辑。共有\
    \ 160 条指令，其中 65 条在逻辑上互不相同。\n- **绝对确定性**：确保使用相同输入集执行指令能产生相同输出集（确定性！），有助于维护`EVM`的完整性，避免任何歧义。确定性结合“计算步骤”的概念，有助于以极高精度估算燃料费用。\n\
    - **空间优化**：在去中心化系统中，节省空间是最大的考量。因此，`EVM`汇编被设计得尽可能紧凑。\n- **针对原生操作调优**：`EVM`针对某些原生操作进行了调优，例如密码学中使用的特定算术类型（模运算）、读取区块或交易数据、与“状态”交互等。另一个例子是：为存储加密哈希值而采用\
    \ 256 位（32 字节）字长，`EVM`在此字长上进行整数运算。\n- **易于保障安全**：在某种程度上，燃料价格有助于确保`EVM`无法被利用。如果没有成本，攻击者就可以想方设法持续攻击系统。由于`EVM`上的几乎每一项操作都需要消耗燃料，因此在`EVM`上设计出良好的燃料成本模型应该是相对容易的。\n\
    \n我们了解到，以太坊网络中的每个参与节点都在本地运行`EVM`，执行所有交易和智能合约，并在本地保存最终状态。正是`EVM`将代码（智能合约）和数据写入区块链，并执行以图灵完备语言编写的交易代码和智能合约代码的指令（操作码）。也就是说，`EVM`充当以太坊智能合约的运行时环境，并确保代码的安全执行。显然，当代码或交易通过各自的数字签名验证后，它们会在`EVM`上执行。因此，只有通过`EVM`成功执行指令后，以太坊的状态才能发生改变。\n\
    \n除非将`EVM`与网络其余部分连接以参与 P2P 网络，否则它可以与主网络隔离。在隔离的沙盒环境中，`EVM`可用于测试智能合约，有助于构建更完善、更健壮且可投入生产的智能合约。\n\
    \n为了更深入地理解智能合约如何利用`EVM`工作，我们需要了解数据如何在任何`EVM`语言（例如`Solidity`、`Serpent`以及未来可能出现的语言）中进行组织、存储和操作。你可以将`EVM`视为一个数据库引擎。虽然我们不会深入探讨`Solidity`编程基础知识，但在本节中，我们将看到它如何与`EVM`交互。请看图\
    \ 4-11。\n\n![A440588_1_En_4_Fig11_HTML.jpg](img/A440588_1_En_4_Fig11_HTML.jpg)\n\
    \n图 4-11\n\n智能合约部署与使用\n\n现在我们来理解`EVM`的内存管理。请看`EVM`遵循的以下三种策略：\n\n- **存储（持久化）**：\n\
    \  - 键值存储映射（即 256 位到 256 位的字映射）。这意味着键和值都是 256 位（即 32 字节）。\n  - 在合约内部无法枚举存储内容。\n\
    \  - 在任何时间点，合约的状态可由称为“状态变量”的合约级变量决定，这些变量始终位于“存储”中，并且在运行时无法更新。这意味着存储结构仅在合约创建时设置一次，之后无法更改。但可以通过`sendTransaction`调用改变其内容。\n\
    \  - 读取/更新存储是一项昂贵的操作。\n  - 合约不能读取、写入或更新任何不属于自己的存储空间。\n  - `SSTORE`/`SLOAD`是常用的指令。例如：`SSTORE`指令从栈中弹出顶部两项，将第一项视为索引，并将第二项插入到合约存储中该索引位置。\n\
    - **内存（易失性）**：\n  - 类似于通用计算机系统中任何代码或应用执行所需的 RAM，用于存储临时值。\n  - 合约在执行期间可以通过付费使用任意数量的内存，执行完成后该内存空间会被清理。执行期间的输出可以推送到持久化存储中，供后续执行复用。\n\
    \  - 与存储不同，内存实际上是一个连续的字节数组，按 256 位（32 字节）的块进行分配。\n  - 初始时没有空间，并以 32 字节块为单位占用空间。\n\
    \  - 如果没有`memory`关键字，像`Solidity`这样的智能合约语言会在存储中声明变量以实现持久化。\n  - 内存不能在智能合约级别使用，只能在方法内部使用。\n\
    \  - 函数参数几乎总是在内存中。\n  - `MSTORE`/`MLOAD`是常用的指令。\n- **栈**：\n  - `EVM`基于栈，因此遵循后进先出原则，栈用于执行计算。\n\
    \  - 栈条目也是 256 位字，用于模拟 256 位伪寄存器。它们用于保存“值”类型的局部变量，以及向指令或函数传递参数、进行内存操作和其他算法操作。\n\
    \  - 最多允许 1024 个元素，且使用几乎免费。\n  - 大部分栈操作限于栈顶区域。其执行方式与比特币脚本的执行方式非常相似。\n\n当`EVM`运行且字节码随交易注入执行时，其完整计算状态可由以下元组定义：`[block_state,\
    \ transaction, message, code, memory, stack, pc, gas]`。\n\n你现在应该能理解所有这些字段了。它们包含我们讨论过的三种内存类型（`block_state`字段代表全局状态，用于存储）。`PC`字段类似于栈中待执行指令的指针。\n\
    \n在以太坊中，应用程序二进制接口（ABI）是一种抽象，它并非[以太坊核心协议](https://github.com/ethereum/yellowpaper)的一部分，但作为一种标准实践，用于访问智能合约中的字节码。虽然任何人都可以为其合约定义自己的\
    \ ABI 并遵守它以获得期望的输出，但使用`Solidity`会更简单。ABI 的目的如下：\n\n- 如何以及调用智能合约中的哪些函数\n- 信息作为输入传递给智能合约函数时应采用的二进制格式\n\
    - 调用函数后，预期函数执行结果输出的二进制格式\n\n有了 ABI 规范，用两种不同语言编写的两个程序可以更容易地相互交互（尽管可能并非必需）。\n"
- fmt: '# Ethereum Ecosystem


    We learned the core components to understand how Ethereum really works. There
    are some inherent limitations to Ethereum such as the following:


    - The `EVM` is slow; it is not advisable to be used for large computations.

    - Computation and storage on the blockchain is expensive; it is advisable to use
    offchain computations and use `IPFS`/`Swarm` for storage.

    - Scalability is an issue; there are different techniques to address it, but they
    are subjective to the business case you are dealing with.

    - Private blockchains are more likely to flourish.


    Now let us take a look at the Ethereum tech stack to understand at a high-level
    the Ethereum ecosystem.


    ## Swarm


    It is not only a distributed storage platform of static files in a P2P fashion,
    but also a distribution service. `Swarm` ensures adequate decentralization and
    redundant storage of Ethereum’s blockchain data, DApp code, etc. Unlike WWW, the
    uploads to `Swarm` are not centralized to one web server. It is designed to have
    zero downtime and is DDOS resistant and fault tolerant.


    ## Whisper


    It is a communications protocol that allows DApps to communicate with each other.
    It provides a distributed yet private messaging functionality. It supports singlecast,
    multicast, and broadcast of messages.


    ## DApp


    A DApp usually has two components, a front-end and a back-end component. The back-end
    code runs on the actual blockchain coded up in smart contracts. The front-end
    code and user interfaces could be written in any language such as HTML, CSS, and
    JavaScript, as long as it can make calls to its back end. Also, the front end
    can be hosted in a decentralized storage like `SWARM` or `IPFS` instead of a centralized
    web server.


    User interface components will be cached on some kind of decentralized BitTorrent-like
    cloud and pulled in by the ÐApp Browser as needed. Like any App store, it is possible
    to browse the distributed DApps catalog in the browser. The end user can install
    any DApp of interest in their browser.


    ## Development Components


    There are so many development components used to develop decentralized applications
    on Ethereum and interact with them. Following are a few popular ones, but there
    are many more such for you to explore. We will just take a look at what they are
    and dive deeper into these topics in the following chapters.


    ### Web3.js


    This is a very important element in developing DApps.


    ### Truffle


    `Truffle` provides the building blocks to create, compile, deploy, and test blockchain
    applications.


    ### Mist Wallet


    We learned in the previous chapters that a wallet is required to interact with
    blockchain applications and the same applies to Ethereum as well. To store, accept,
    and send Ether, the users need a wallet. `Mist Wallet` is a UI-based solution
    that can be used to connect to the Ethereum blockchain. Using `Mist` wallet, one
    can create accounts, design and deploy contracts, transfer Ether across accounts,
    and view transaction details.


    Internally, `Mist` is dependent on the `geth` client (i.e., GoEthereum Client)
    to perform all the operations seamlessly.


    ## Summary


    In this chapter, we covered the core components of Ethereum blockchain and understood
    the design considerations. We were able to differentiate Ethereum design with
    that of the Bitcoin blockchain and understood how Ethereum blockchain facilitates
    development of different use cases on a single platform. We took a deep dive into
    the smart contracts and how the Ethereum Virtual Machine (EVM) executes it in
    a decentralized fashion.


    We will explore more into the development aspect of blockchain in general in Chapter
    [5](#A440588_1_En_5_Chapter.html) and then build a solid understanding of Ethereum
    development in Chapter [6](#A440588_1_En_6_Chapter.html).


    # 5. Blockchain Application Development


    In the previous chapters we went into theoretical details about what blockchain
    is and how the Bitcoin and Ethereum blockchains work. We also looked at the different
    cryptographic and mathematical algorithms, theorems, and proofs that go into making
    the blockchain technology.


    In this chapter, we will start with how blockchain applications are different
    than the conventional applications, and then we will dive into how to build applications
    on blockchains. We will also look at setting up the necessary infrastructure needed
    to start developing decentralized applications.


    ## Decentralized Applications


    The popularity of blockchain technology is mostly driven by the fact that it can
    potentially solve various real-world problems because it provides more transparency
    and security (tamper-proof) than conventional technologies. There are a lot of
    blockchain use cases identified by several startups and community members aimed
    at solving these problems. To implement these use cases, we create applications
    that work on top of blockchains. In general, applications that interact with blockchains
    are referred to as “decentralized applications” or, in short, just `DApps` or
    `dApps`.


    To understand `DApps` better, let’s first revisit what a blockchain is. A blockchain
    or a distributed ledger is basically a special kind of database where the data
    is not stored at a centralized server, but it is copied at all the participating
    nodes in the network. Also, the data on blockchains is cryptographically signed,
    which proves the identity of the entity who wrote that data on the blockchain.
    To make use of this database to store and retrieve data, we create applications
    that are called `DApps` because these applications do not rely on a centralized
    database but on a blockchain-based decentralized data store. There is no single
    point of failure or control for these applications.


    Let’s take an example of a `DApp`. Let’s take a scenario of supply chain where
    several vendors and logistics partners are involved in the supply chain process
    of manufactured goods. To use blockchain technology for this supply chain use
    case, here’s what we would do:


    - We would need to set up blockchain nodes at each of these vendors so that they
    can participate in the consensus process on the data shared.

    - We would need an interface so that all the participants and users can store,
    retrieve, verify, and evaluate data on the blockchain. This interface would be
    used by the manufacturer to enter the information about the goods manufactured;
    by the logistics partner to enter information about the transfer of goods; by
    the warehousing vendor to verify if the goods manufactured and the goods transferred
    are in sync, etc., etc. This interface would be our supply chain `DApp`.


    Another example of a `DApp` would be a voting system based on blockchains. Using
    blockchain for voting, we would be able to make the whole process much more transparent
    and secure because each vote would be cryptographically signed. We would need
    to create an application that could get a list of candidates for whom voters could
    vote, and this application would also provide a simple interface to submit and
    record the votes.'
