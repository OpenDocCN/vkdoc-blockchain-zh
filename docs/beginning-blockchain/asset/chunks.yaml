- fmt: "# Blockchain Application Development\n\nBefore we jump into code, let’s first\
    \ understand some basic concepts around blockchain application development. Generally,\
    \ we are used to concepts like objects, classes, functions, etc. when we develop\
    \ conventional software applications. However, when it comes to blockchain applications,\
    \ we need to understand a few more concepts like transactions, accounts and addresses,\
    \ tokens and wallets, inputs, and outputs and balances. The handshake and request/response\
    \ mechanism between a decentralized application and a blockchain are driven by\
    \ these concepts.\n\nFirst, when developing an application based on blockchain,\
    \ we need to identify how the application data would map to the blockchain data\
    \ model. For example, when developing a DApp on the Ethereum blockchain, we need\
    \ to understand how the application state can be represented in terms of Solidity\
    \ data structures and how the application’s behavior can be expressed in terms\
    \ of Ethereum smart contracts. As we know that all data on a blockchain is cryptographically\
    \ signed by private keys of the users, we need to identify which entities in our\
    \ application would have identities or addresses represented on the blockchain.\
    \ In conventional applications this is generally not the case, because the data\
    \ is not always signed. For blockchain application we need to define who would\
    \ be the signers and what data they would sign. For example, in a voting DApp\
    \ in which every voter cryptographically signs their vote, this is easy to identify.\
    \ However, imagine a scenario where we need to migrate an existing conventional\
    \ distributed systems application, having its data stored across multiple SQL\
    \ tables and databases, to a DApp based on Ethereum blockchain. In this case we\
    \ need to identify which entities in which table would have their identities and\
    \ which entities would be attached to other identities.\n\nIn the next few sections,\
    \ we will explore Bitcoin and Ethereum application programming using simple code\
    \ snippets to send some transactions. The purpose of this exercise is to become\
    \ familiar with the blockchain APIs and common programming practices. For simplicity,\
    \ we will be using public test networks for these blockchains and we will write\
    \ code in JavaScript. The reason for selecting JavaScript is, at the time of this\
    \ writing, we have stable JavaScript libraries available for both blockchains\
    \ and it will be easier to understand the similarities and differences in the\
    \ approaches we take while writing code. The code snippets are explained in detail\
    \ after every logical step and can be understood even if the reader is not familiar\
    \ with JavaScript programming.\n\n## Libraries and Tools\n\nRecall from Chapter\
    \ [2](#A440588_1_En_2_Chapter.html), that there are a lot of cryptographic algorithms\
    \ and mathematics used in blockchain technology. Before we send our transactions\
    \ to blockchains from an application, we need to prepare them. The transaction\
    \ preparation includes defining accounts and addresses, adding required parameters\
    \ and values to the transaction objects, and signing using private keys, among\
    \ a few other things. When developing applications, it’s better to use verified\
    \ and tested libraries for transaction preparation instead of writing code from\
    \ scratch. Some of the stable libraries for both Bitcoin and Ethereum are available\
    \ open source, which can be used to prepare and sign transactions and to send\
    \ them to the blockchain nodes/network. For the purpose of our code exercises,\
    \ we will be using the `bitcoinjs` JavaScript library for interacting with the\
    \ Bitcoin blockchain and the `web3.js` JavaScript library for interacting with\
    \ the Ethereum blockchain. Both these libraries are available as node.js packages\
    \ and can be downloaded and integrated using the `npm` commands.\n\n**Important\
    \ Note**\n\nThe code exercises in this chapter are based on node.js applications.\
    \ This is to make sure that the code we write as part of this exercise has a container\
    \ in which it can run and interact with the other prepackaged libraries (node\
    \ modules) mentioned. It is nice to have some knowledge about node.js application\
    \ development, and the reader is encouraged to follow a getting started tutorial\
    \ on node.js and npm.\n\nFigure [5-1](#A440588_1_En_5_Chapter.html#Fig1) shows\
    \ how a DApp interacts with a blockchain.\n\n![A440588_1_En_5_Fig1_HTML.jpg](A440588_1_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1\n\nBlockchain application interaction\n\n## Interacting with the\
    \ Bitcoin Blockchain\n\nIn this section we will send a transaction to the Bitcoin\
    \ public test network from one address to another. Consider this a “Hello World”\
    \ application for the Bitcoin blockchain. As mentioned before, we will be using\
    \ the `bitcoinjs` JavaScript library for preparing and signing transactions. And\
    \ for simplicity, instead of hosting a local Bitcoin node, we will use a public\
    \ Bitcoin test network node hosted by a third-party provider block-explorer. Note\
    \ that you can use any provider for your application and you can also host a local\
    \ node. All you need to do is to point your application code to connect to your\
    \ preferred node.\n\nRecall from previous chapters that the Bitcoin blockchain\
    \ is primarily for enabling peer to peer payments. A Bitcoin transaction is mostly\
    \ just a transfer of Bitcoins from one address to another. Here’s how we do this\
    \ programmatically.\n\nThe following (Figure [5-2](#A440588_1_En_5_Chapter.html#Fig2))\
    \ shows how this code interacts with the Bitcoin blockchain. Note: The figure\
    \ is just a rough sketch and does not show the Block Explorer service architecture\
    \ in detail.\n\n![A440588_1_En_5_Fig2_HTML.jpg](A440588_1_En_5_Fig2_HTML.jpg)\n\
    \nFigure 5-2\n\nApplication interacting with the Bitcoin blockchain using the\
    \ Block Explorer API\n\nThe following subheadings of this section are steps to\
    \ follow, in that order, to send a transaction to the Bitcoin test network using\
    \ JavaScript.\n\n### Setup and Initialize the bitcoinjs Library in a node.js Application\n\
    \nBefore we call the library-specific code for Bitcoin transactions, we will install\
    \ and initialize the `bitcoinjs` library.\n\nAfter initializing a node.js applicaion\
    \ using the `npm init` command, let’s create an entry point for our application,\
    \ `index.js`, and custom JavaScript module to call the `bitcoinjs` library functions\
    \ `btc.js`. Import `btc.js` in the `index.js`. Now, we are ready to follow the\
    \ next steps.\n\nFirst, let’s install the node module for `bitcoinjs`:\n\n```\n\
    npm install --save bitcoinjs-lib\n```\n\nThen, in our Bitcoin module `btc.js`,\
    \ we will initialize the `bitcoinjs` library using the `require` keyword:\n\n\
    ```\nvar btc = require('bitcoinjs-lib');\n```\n\nNow we can use this `btc` variable\
    \ to call library functions on the `bitcoinjs` library. Also, as part of the initialization\
    \ process, we are initializing a couple of more variables:\n\n*   The network\
    \ to target : We are using the Bitcoin test network.\n\n    ```\n    var network\
    \ = btc.networks.testnet;\n    ```\n\n*   The public node API endpoint to get\
    \ and post transactions : We are using the Block Explorer API for Bitcoin test\
    \ network. Note that you can replace this API endpoint with your preferred one.\n\
    \n    ```\n    var blockExplorerTestnetApiEndpoint = 'https://testnet.blockexplorer.com/api/';\n\
    \    ```\n\nAt this point, we are all set up to create a Bitcoin transaction using\
    \ a node.js application."
  raw: "## Blockchain Application Development\n\nBefore we jump into code, let’s first\
    \ understand some basic concepts around blockchain application development. Generally,\
    \ we are used to concepts like objects, classes, functions, etc. when we develop\
    \ conventional software applications. However, when it comes to blockchain applications,\
    \ we need to understand a few more concepts like transactions, accounts and addresses,\
    \ tokens and wallets, inputs, and outputs and balances. The handshake and request/response\
    \ mechanism between a decentralized application and a blockchain are driven by\
    \ these concepts.\n\nFirst, when developing an application based on blockchain,\
    \ we need to identify how the application data would map to the blockchain data\
    \ model. For example, when developing a DApp on the Ethereum blockchain, we need\
    \ to understand how the application state can be represented in terms of Solidity\
    \ data structures and how the application’s behavior can be expressed in terms\
    \ of Ethereum smart contracts. As we know that all data on a blockchain is cryptographically\
    \ signed by private keys of the users, we need to identify which entities in our\
    \ application would have identities or addresses represented on the blockchain.\
    \ In conventional applications this is generally not the case, because the data\
    \ is not always signed. For blockchain application we need to define who would\
    \ be the signers and what data they would sign. For example, in a voting DApp\
    \ in which every voter cryptographically signs their vote, this is easy to identify.\
    \ However, imagine a scenario where we need to migrate an existing conventional\
    \ distributed systems application, having its data stored across multiple SQL\
    \ tables and databases, to a DApp based on Ethereum blockchain. In this case we\
    \ need to identify which entities in which table would have their identities and\
    \ which entities would be attached to other identities.\n\nIn the next few sections,\
    \ we will explore Bitcoin and Ethereum application programming using simple code\
    \ snippets to send some transactions. The purpose of this exercise is to become\
    \ familiar with the blockchain APIs and common programming practices. For simplicity,\
    \ we will be using public test networks for these blockchains and we will write\
