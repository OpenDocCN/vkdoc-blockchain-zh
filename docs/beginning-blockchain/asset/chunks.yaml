  trans: '

    ### 区块链的采用现状


    2009 年，`区块链`随着一种名为`比特币`的数字加密货币通过一份简单的邮件列表问世。在其推出后不久，人们便意识到了它超越加密货币的巨大潜力。一些公司推出了不同形式的`区块链`产品，例如`以太坊`、`超级账本`等。`微软`和`IBM`分别在其`Azure`和`Bluemix`云平台上推出了
    SaaS（软件即服务）产品。众多初创公司如雨后春笋般成立，许多成熟企业也启动了`区块链`计划，专注于解决以往难以解决的一些业务问题。


    现在才说`区块链`拥有以某种方式颠覆几乎每个行业的巨大潜力已经太迟了；这场革命早已开始。它已经对金融服务市场产生了巨大影响。现在很难找到一家尚未探索`区块链`的全球性银行或金融机构。除了金融市场，在媒体和娱乐、能源交易、预测市场、零售连锁、忠诚度奖励系统、保险、物流与供应链、医疗记录以及政府和军事应用等领域，也已开始或正在采取相关举措。


    截至撰写本文时，许多初创公司和现有企业都已能看到基于`区块链`的系统如何真正解决一些痛点，并在许多方面带来益处。然而，设计出正确的`区块链`解决方案相当具有挑战性。虽然有一些关于`区块链`产品或解决方案的绝佳想法，但构建或实施这些想法同样困难。有一些用例只能建立在公共`区块链`上。设计一个拥有适当挖矿生态系统的自我维持型`区块链`很困难，而就现有的、可用于构建非加密货币应用的公共`区块链`而言，除了`以太坊`之外别无他选。一个`区块链`应用是仅在应用层构建并直接使用底层，还是需要从头开始构建，这是一个难以抉择的问题。此外还存在一些技术挑战。`区块链`仍在成熟过程中，要获得主流采用可能还需要几年时间。截至目前，已有多种方案来解决`区块链`的可扩展性问题。在本书中，我们将努力从所有这些角度建立起扎实的理解。现在，让我们在下一小节看看一些具体的用途和用例。


    ## 区块链的用途与用例


    在本节中，我们将了解已在金融、保险、银行、医疗、政府、供应链、物联网（IoT）、媒体和娱乐等行业中采取的一些举措。然而，可能性是无限的！在中心化系统中难以实现的真正共享经济，可以通过`区块链`技术实现（例如，`Uber`、`Airbnb`的点对点版本）。让公民能够拥有自己的身份（自主主权数字身份）并利用这项技术将自己的数据货币化也是可能的。现在，让我们先来看一些现有的用例。


    *   任何类型的财产或资产，无论是物理的还是数字的，例如笔记本电脑、手机、钻石、汽车、房地产、电子注册、数字文件等，都可以在`区块链`上注册。这可以使这些资产在人与人之间进行交易、维护交易日志，并验证有效性或所有权。此外，还可以开发公证服务、存在性证明、定制化保险方案等更多用例。

    *   `区块链`上正在开发许多金融用例，例如跨境支付、股票交易、忠诚度与奖励系统、银行间的了解你的客户（KYC）等。首次代币发行（ICO）是截至撰写本文时最热门的用例之一。ICO
    是当今利用加密货币作为数字资产进行众筹的最佳方式。ICO 中的代币可以被视为企业中的数字股票，非常便于购买和交易。

    *   `区块链`可以用来实现“群体智慧”，通过利用集体智慧来引领和塑造商业、经济及各种国家现象！基于群体智慧的金融和经济预测、去中心化预测市场、去中心化投票以及股票交易都可以在`区块链`上实现。

    *   确定音乐版税的过程历来复杂。互联网带来的音乐流媒体服务促进了更高的市场渗透率，但也使版税确定变得更加复杂。通过维护一个包含音乐版权所有权信息以及授权媒体内容分发的公共账本，`区块链`在很大程度上可以解决这个问题。

    *   这是一个物联网时代，到处都有数十亿的物联网设备，并且还有更多设备将加入进来。大量不同的品牌、型号和通信协议使得建立一个中心化系统来控制设备并提供通用数据交换平台变得困难。这也是`区块链`的一个应用领域，可用于为物联网设备构建一个去中心化的点对点系统，使它们能够相互通信。ADEPT（自主去中心化点对点遥测技术）是
    IBM 和三星的联合项目，它开发了一个平台，利用`比特币`底层设计的元素来构建一个设备分布式网络——即一个去中心化的物联网。ADEPT 在平台中使用了三种协议：用于文件共享的`BitTorrent`、用于智能合约的`以太坊`以及用于点对点消息传递的`TeleHash`。IOTA
    基金会是另一个类似的举措。

    *   在政府部门，`区块链`也获得了发展势头。有一些用例在技术上需要去中心化，但在政治上应由政府管理：土地登记、车辆登记与管理、电子投票等都是一些活跃的用例。供应链是`区块链`有众多优秀用例的另一个领域。全球的供应链一直容易发生纠纷，因为在这些系统中维持透明度一向很困难。


    ## 总结


    在本章中，我们涵盖了`区块链`的演变、它的历史、它是什么、其设计优势，以及为什么它如此重要，并附带了一些相关的用例。在本节中，我们将结合技术革命，总结其具有变革性的贡献。


    20 世纪 90 年代，互联网的大规模普及改变了人们的经商方式。它消除了信息创建和传播中的摩擦。这为新的市场、更多的机遇和可能性铺平了道路。同样地，今天的`区块链`通过消除三个关键领域的摩擦，将互联网提升到了一个全新的水平：控制权、信任和价值。


    **控制权**：`区块链`通过使系统去中心化来分配控制权。


    **信任**：`区块链`是一个不可变、防篡改的账本。它向所有节点提供一个单一、共享的事实来源，使系统无需信任。这意味着，与任何未知个人或实体进行交易不再需要信任，信任是系统设计所固有的。


    **价值**：`区块链`能够以任何形式交换价值。人们可以在没有中心化实体或中介的情况下发行和转移资产。


    在第 2 章中，我们将深入探讨`区块链`的基础知识。

    '
- fmt: '# 2. How Blockchain Works


    We stand at the edge of a new digital revolution. Blockchain probably is the biggest
    invention since the Internet itself! It is the most promising technology for the
    next generation of Internet interaction systems and has received extensive attention
    from many industry sectors as well as academia. Today, many organizations have
    already realized that they needed to be blockchain ready to sustain their positions
    in the market. We already looked at a few use cases in Chapter 1, but the possibilities
    are limitless. Though blockchain is not a silver bullet for all business problems,
    it has started to impact most business functions and their technology implementations.


    To be able to solve some real-world business problems using blockchain, we actually
    need a fine-grained understanding of what it is and how it works. For this, it
    needs to be understood through different perspectives such as business, technical,
    and legal viewpoints. This chapter is an effort to get into the nuts and bolts
    of blockchain technology and get a complete understanding of how it works.


    ## Laying the Blockchain Foundation


    Blockchain is not just a technology, it is mostly coupled with business functions
    and use cases. In its cryptocurrency implementations, it is also interwoven with
    economic principles. In this section, we will mainly focus on its technical aspects.
    Technically, blockchain is a brilliant amalgamation of the concepts from cryptography,
    game theory, and computer science engineering, as shown in Figure 2-1.


    ![A440588_1_En_2_Fig1_HTML.jpg](A440588_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Blockchain at its core


    Let us take a look at what role these components play in the blockchain system
    at a high level and dig deeper into the fundamentals eventually. Before that,
    let us quickly revisit how the traditional centralized systems worked. The traditional
    approach was that there would be a centralized entity that would maintain just
    one transaction/modification history. This was to exercise concurrency control
    over the entire database and inject trust into the system through intermediaries.
    What was the problem with such a stable system then? A centralized system has
    to be trusted, whether those involved are honest or not! Also, cost due to intermediaries
    and the transaction time could be greater for obvious reasons. Now think about
    the centralization of power; having full control of the entire system enables
    the centralized authorities to do almost anything they want.


    Now, let us look at how blockchain addresses these issues due to centralized intermediaries
    by using cryptography, game theory, and computer science concepts. Irrespective
    of the use case, the transactions are secured using cryptography. Using cryptography,
    it can be ensured that a valid user is initiating the transaction and no one can
    forge a fraudulent transaction. This means, cryptographically it can be ensured
    that Alice in no way can make a transaction on behalf of Bob by forging his signature.
    Now, what if a node or a user tries to launch a double-spend attack (e.g., one
    has just ten bucks and tries to pay the same to multiple people)? Pay close attention
    here — despite not having sufficient funds, one can still initiate a double-spend,
    which is cryptographically correct. The only way to prevent double-spend is for
    every node to be aware of all the transactions. Now this leads to another interesting
    problem. Since every node should maintain the transaction database, how can they
    all agree on a common database state? Again, how can the system stay immune to
    situations where one or more computing nodes deliberately attempt to subvert the
    system and try to inject a fraudulent database state? The majority of such problems
    come under the umbrella of the Byzantine Generals’ Problem (described later).
    Well, it gained even more popularity because of blockchain, but it has been there
    for ages. If you look at the data center solutions, or distributed database solutions,
    the Byzantine Generals’ Problem is an obvious and common problem that they deal
    with to remain fault tolerant. Such situations and their solution actually come
    from game theory. The field of game theory provides a radically different approach
    to determine how a system will behave. The techniques in game theory are arguably
    the most sophisticated and realistic ones. They usually never consider if a node
    is honest, malicious, ethical, or has any other such characteristics and believe
    that the participants act according to the advantage they get, not by moral values.
    The sole purpose of game theory in blockchain is to ensure that the system is
    stable (i.e., in Nash Equilibrium) with consensus among the participants.


    There are different kinds of business problems and situations with varying degrees
    of complexities. So, the underlying crypto and game theoretic consensus protocols
    could be different in different use cases. However, the general principle of maintaining
    a consistent log or database of verified transactions is the same. Though the
    concepts of cryptography and game theory have been around for quite some time
    now, it is the computer science piece that stitches these bits and pieces together
    through data structures and peer-to-peer network communication technique. Obviously,
    it is the “smart software engineering” that is needed to realize any logical or
    mathematical concepts in the digital world. It is then the computer science engineering
    techniques that incorporate cryptography and game theoretic concepts into an application,
    enabling decentralized and distributed computing among the nodes with data structure
    and network communication components.'
