    ## 货币的历史


    你是否曾好奇货币是什么，以及它为何存在？货币主要是用于交换价值（即任何具有价值的事物）的媒介。它有其历史渊源。我们将快速回顾历史，以理解货币如何演变至我们今天所知的形态，以及比特币如何将其推向更高层次。


    并非每个人都拥有一切。在远古时代，当没有货币概念时，人们仍然想出如何用自己过剩的物品去交换他人那里所需的东西。那就是物物交换的时代。用小麦换稻谷，或用橙子换柠檬，就是当时的交换系统。这固然不错，但如果拥有小麦的人需要药品，而对方却没有呢？例如：爱丽丝有小麦并需要药品，但鲍勃知道她认识有橙子的人，而鲍勃需要小麦。在这种情况下，交换就无法进行。因此，他们不得不寻找第三人——查理，他可能既需要橙子又有多余的药品。图
    3-1 对此情景进行了图示说明。


    ![A440588_1_En_3_Fig1_HTML.jpg](img/A440588_1_En_3_Fig1_HTML.jpg)


    图 3-1


    原始的物物交换系统


    在之前的例子中，找到像查理这样能轻易契合这个难题的人总是很困难；这个问题必须得到解决。于是，人们开始思考一种商品化的价值交换体系。有一些物品是每个人都需要的，比如牛奶、盐、种子、羊等。这个系统几乎奏效了！但不久之后，人们意识到储存这类商品既不方便又困难重重。


    最终，人们找到了更好的工具作为金融媒介，比如金属片。人们对稀有金属的重视程度远高于普通金属。黄金和白银因其不易腐蚀而位居榜首。随后，各国开始铸造带有官方印章的货币（不同重量的金属硬币）。虽然金属片和硬币比之前的系统更好，因为人们可以轻松储存和携带它们，但它们容易失窃。寺庙在此刻发挥了作用，因为人们信任它们，并坚信没人会从寺庙偷东西。祭司会给存入黄金的人一张收据，上面注明收到的黄金/白银数量，作为承认其存款的承诺，并保证在存户返回时将同等数量的金属归还给收据持有人。持有收据的人可以在市场上流通这张收据，以换取他们想要的东西。这就是我们银行体系的雏形。这种收据起到了法定货币的作用，而寺庙则扮演了人们信任的中心化银行角色。请参考图
    3-2 来理解当时这个体系的运作方式。


    ![A440588_1_En_3_Fig2_HTML.jpg](img/A440588_1_En_3_Fig2_HTML.jpg)


    图 3-2


    银行时代的开端


    在上述体系中，货币总是由某种贵金属（如黄金或白银）支撑。即使在政府和银行取代了寺庙之后，这个体系依然延续。这就是商品货币如何进入市场，成为商品和服务价值交换的通用媒介。那个时代存在的任何货币都是由黄金/白银支撑的。


    慢慢地，政府引入了“法定货币”作为法定偿还货币，这种货币不再由黄金或白银支撑。它纯粹基于信任，从某种意义上说，人们别无选择，只能信任政府。法定货币没有任何内在价值，它仅由政府的信用背书。今天，我们熟知的货币都是法定货币。因此，当今货币的价值取决于发行和使用该货币的司法管辖区内政府的稳定性和表现。这些纸币本身就是货币，银行里并没有比它更有价值的东西。这就是银行体系的状况，而与此同时，数字世界正在形成。


    大约在 20 世纪 90 年代，互联网世界蓬勃发展，银行系统也开始数字化。由于法定货币仍存在一些不便之处（例如容易损坏和失窃），银行向人们保证可以转向数字化！这个时代甚至不再需要印刷纸币。货币变成了银行计算机系统中的数字。今天，如果每个账户持有人都去各自的银行，要求提取他们账户中相应金额的纸币，银行将陷入巨大的麻烦！全世界流通的真实货币总量与全球数字货币总量相比，简直是微不足道。


    ## 比特币的诞生


    在第一章中，我们探讨了互联网革命的技术层面；在本章的前一部分，我们回顾了货币的演变。现在，我们应将两者结合起来，以理解中本聪设计比特币（一种加密货币）背后的视角。在本节及本文的其他部分，我们将尝试详细阐述中本聪在其比特币白皮书中的论述。


    我们了解了寺庙，以及后来的政府和银行在从物物交换演变而来的货币体系中所扮演的角色。即使在今天，情况依然如此。如果你仔细审视这些体系，你会发现使这些体系稳定的关键因素是“信任”元素。人们曾经信任寺庙，后来信任政府和银行。今天，整个互联网商业都依赖于中心化的、可信的第三方来处理支付。尽管互联网被设计成点对点网络，但人们却在其上构建中心化系统，以延续旧有的做法。嗯，从技术上讲，考虑到
    21 世纪初技术的成熟度，构建一个点对点系统是相当困难的。因此，交易成本、交易结算时间以及中心化带来的其他问题显而易见。实物货币则并非如此，因为交易即意味着结算。


    是否存在一种由计算能力支撑的数字货币，就像黄金曾用来支撑流通货币一样？答案是“是的”，这要归功于中本聪的比特币。比特币的设计使得双方能够基于密码学证明进行电子支付，而非基于对中间第三方机构的信任。由于技术的进步，这在如今成为可能。在本章中，我们将看到中本聪如何在
    2008 年结合密码学、博弈论和计算机科学工程原理来设计比特币系统。自 2009 年上线至今，该系统一直非常稳定且强大，足以抵御任何类型的网络攻击。它经受住了时间的考验，并确立了自己作为全球货币的地位。

    '
- fmt: '### What Is Bitcoin?


    Blockchain offers cryptocurrency: digital money! Just as we can transact with
    physical currency without banks or other centralized entities, Bitcoin is designed
    to facilitate peer-to-peer monetary transactions without trusted intermediaries.
    Let us look at what it is and then learn later in the chapter how it really works.
    Bitcoin is a decentralized cryptocurrency that is not limited to any nation and
    is a global currency. It is decentralized in every aspect — technical, logical,
    as well as political. As and when the transactions are validated, new Bitcoins
    get mined and a maximum of 21 million Bitcoins can ever be produced. Approximately,
    to reach 21 million Bitcoins, it would take until the year 2140. Anyone with good
    computing power can participate in mining and generate new Bitcoins. After all
    the Bitcoins get generated, no new coins can be minted and only the ones in circulation
    would be used. Note that Bitcoins do not have fixed denominations such as the
    national fiat currencies. As per design, the Bitcoins can have any value with
    eight decimal places of precision. So, the smallest value in Bitcoin is `0.00000001
    BTC`, which is called `1 Satoshi`.


    The miners mine the transactions to mint new coins and also consume the transaction
    fee that the person willing to make a transaction is ready to pay. When the total
    number of coins reaches 21 million, the miners would validate the transactions
    solely for the transaction fees. If someone tries to make a transaction without
    a transaction fee, it may still get mined because it is a valid transaction (if
    at all it is) and also the miner is more interested in the mining reward that
    lets him generate new coins.


    Are you wondering what decides the value of Bitcoins? When currency was backed
    by gold, it had great significance and was easy to assess the value based on gold
    standards. When we say Bitcoin is backed by the computing power that people use
    for mining, that is not enough to understand how it attains its value. Here is
    a little bit of economics required to understand it.


    When fiat currency was launched for the first time, it was backed by gold. Since
    people believed in gold, they believed in currency as well. After a few decades,
    currency was no longer backed by gold and was totally dependent on the governments.
    People continued believing in it because they themselves form or contribute to
    the formation of their own government. Since the governments ensure its value,
    and people trust it, so it attains that value. In an international setting, the
    value of currency of specific countries depends on various factors and the most
    important of them is "supply and demand." Please keep in mind that some countries
    that printed a lot of fiat currency notes went bankrupt; their economy went down!
    There has to be a balance and to understand this, more economics is needed, which
    is beyond the scope of this book. So, let us get back to Bitcoins for now.


    When Bitcoin was first launched, it did not have any official price or value that
    people would believe. If one would sell it for some US dollars (USD), I would
    never have bought those initially. Gradually when the exchange started taking
    place, it developed a price and one Bitcoin was not even one USD then. Since Bitcoins
    are generated by a competitive and decentralized process called "mining," and
    they are generated at a fixed rate with an upper cap of 21 million Bitcoins in
    total that can ever exist, this makes Bitcoin a scarce resource. Now relating
    this context back to the game of "supply and demand," the value of Bitcoin started
    inflating. Slowly, when the entire globe started believing in it, its price even
    skyrocketed from a few USDs to thousands of USDs. Bitcoin adoption among the users,
    merchants, start-ups, big businesses, and many others is growing like never before
    because they are being used in the form of money. So, the value of Bitcoin is
    highly influenced by "trust," "adoption," and "supply and demand" and its price
    is set by the market.


    Now, the question is why the value of Bitcoin is so volatile as of this writing
    and fluctuates quite a lot. One obvious reason is supply and demand. We learned
    that there can only be a limited number of Bitcoins in circulation, which is 21
    million, and the rate at which they get generated is decreasing with time. Because
    of this design, there is always a gap in supply and demand, which results in this
    volatility. Another reason is that Bitcoins are never traded in one place. There
    are so many exchanges in so many places across the globe, and all those exchanges
    have their own exchange prices. The indexes that you see gather Bitcoin exchange
    prices from several exchanges and then average them out. Again, since all these
    indexes do not collect data from the same set of exchanges, even they do not match.
    Similarly, the liquidity factor that implies the amount of Bitcoins flowing through
    the entire market at any given time also influences the volatility in Bitcoin
    price. As of now, it is definitely a high-risk asset but may get stabilized with
    time. Let us take a look at the following list of factors that may influence the
    supply and demand of Bitcoins, and hence their price:


    *   Confidence of people in Bitcoin and fear of uncertainty

    *   Press coverage with good and bad news on Bitcoin

    *   Some people own Bitcoins and do not allow them to flow through the market
    and some people keep buying and selling to minimize risk. This is why the liquidity
    level of Bitcoin keeps on changing.

    *   Acceptance of Bitcoins by big ecommerce giants

    *   Banning of Bitcoins in specific countries


    If you are now wondering if there is any possibility of Bitcoin to crash completely,
    then the answer is "Yes." There are many examples of countries whose currency
    systems have crashed. Well, there were political and economic reasons for them
    to crash such as hyperinflation, which is not the case with Bitcoins because one
    cannot generate as many Bitcoins as they want and the total number of Bitcoins
    is fixed. However, there is a possibility of technical or cryptographic failure
    of Bitcoins. Please note that Bitcoin has stood the test of time since its inception
    in 2008 and there is a possibility that it will grow much bigger with time, but
    it cannot be guaranteed!'
