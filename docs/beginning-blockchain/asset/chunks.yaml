- fmt: '# Creating the Smart Contract


    Now that we have the private Ethereum network set up and working, we can move
    on to the next step of creating a smart contract for the polling functionality
    of our DApp. We will then deploy this contract to our private network. We will
    follow the same steps of creating and deploying a smart contract as we did in
    the last chapter.


    Let’s fire up the Remix online IDE and code our smart contract in Solidity.


    The following Solidity code snippet shows the smart contract we have coded for
    the polling functionality.


    ```

    pragma solidity ^0.4.19;

    contract Poll {

    event Voted(

    address _voter,

    uint _value

    );

    mapping(address => uint) public votes;

    string pollSubject = "Should coffee be made tax free? Pass 1 for yes OR 2 for
    no in the vote function.";

    function getPoll() constant public returns (string) {

    return pollSubject;

    }

    function vote(uint selection) public {

    Voted(msg.sender, selection);

    require (votes[msg.sender] == 0);

    require (selection > 0 && selection < 3);

    votes[msg.sender] = selection;

    }

    }

    ```


    Now, let’s analyze this contract source code to understand what we have done here.
    As we can see, the name of the contract is `Poll`.


    The next line of code is


    ```

    event Voted(

    address _voter,

    uint _value

    );

    ```


    The preceding code snippet is basically declaring a smart contract event that
    takes two parameters: one is of the type of Ethereum address and another is of
    the type of unsigned integer. We have created this event so that we can capture
    who has voted what in the poll. We will come back to this later.


    Next, we have


    ```

    mapping(address => uint) public votes;

    ```


    The preceding line of code declares a mapping of Ethereum addresses and unsigned
    integers. This is the data store where we will be storing the voters’ addresses
    and their chosen value for the vote.


    Then we have the following:


    ```

    string pollSubject = "Should coffee be made tax free? Pass 1 for yes OR 2 for
    no in the vote function.";

    function getPoll() constant public returns (string) {

    return pollSubject;

    }

    ```


    The preceding code snippet first declares a string for the polling subject. In
    this we are asking a question of the voters. And then we have a function that
    can return the value of this string so that voters can query what the poll is
    about.


    And finally, we have the function that implements the voting functionality.


    ```

    function vote(uint selection) public {

    Voted(msg.sender, selection);

    require (votes[msg.sender] == 0);

    require (selection > 0 && selection < 3);

    votes[msg.sender] = selection;

    }

    ```


    Examine closely each line of the preceding snippet.


    First, as soon as we enter this function, we are raising the voted event we created
    with the values of the sender’s address (voter) and the value he has chosen.


    Next, we are limiting one vote per voter by checking if the value of the vote
    is zero for the corresponding address in the mapping. The `require` statement
    is used to check conditions based on user inputs.


    And then we are also limiting, by using the `require` statement, the value of
    the selection to either 1 or 2. 1 is a yes and 2 is a no. And we have passed these
    instructions in the `pollSubject` string so that the voters know what to do.


    The screenshot in Figure 6-10 shows the smart contract in Remix.


    We compiled this contract code using Remix and we took the ABI and byte code for
    the contract so that we can deploy it to our private network. We copied the bytecode
    and ABI from the respective sections in the details popup of the Remix compile
    tab — exactly how we did this in the previous chapter.


    ![A440588_1_En_6_Fig10_HTML.jpg](A440588_1_En_6_Fig10_HTML.jpg)


    **Figure 6-10** Smart contract editing in Remix online Solidity editor


    The ABI of the contract is


    ```

    [

