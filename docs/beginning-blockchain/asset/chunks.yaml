    could define and set node specifications with high computation power and more
    bandwidth. Also, there could be certain tasks offloaded from blockchain and computed
    off-chain that could help the system scale well.


    In this chapter, we will learn some of the generic scaling techniques, and discuss
    Bitcoin- and Ethereum-specific scaling techniques in their respective chapters.
    Please keep in mind that all scaling techniques may not apply to all kinds of
    blockchain flavors or use cases. The best way is to understand the techniques
    technically and use the best possible one in a given situation.'
  trans: '

    # 区块链应用


    虽然我们在本章中探讨了区块链的具体细节，但同样重要的是，要了解它如何被用于构建区块链解决方案。目前正在构建的应用中，有些将区块链视为网络服务器背后的后端数据库，而另一些则是完全去中心化、没有中心服务器的应用。例如，比特币区块链就是一个没有可发送请求的服务器的区块链应用！每一笔交易都会广播到整个网络。然而，也有可能构建一个托管在中心化网络服务器上的网络应用，并在需要时更新比特币区块链。请看图
    2-25，其中显示了一个比特币节点在某个时间点向可达节点广播交易的过程。


    ![A440588_1_En_2_Fig25_HTML.jpg](img/A440588_1_En_2_Fig25_HTML.jpg)


    图 2-25


    比特币区块链节点


    从软件应用的角度来看，每个节点都是自给自足的，并维护着各自的区块链数据库副本。以比特币区块链为基准，没有中心服务器的区块链应用似乎是最纯粹的去中心化应用，它们大多属于“公有区块链”类别。通常，对于这类公有区块链，使用来自诸如
    Microsoft Azure、IBM Bluemix 等云服务提供商的资源还不太普遍。然而，对于大多数私有区块链来说，云服务提供商已开始受到欢迎。打个比方，可能有多个网络应用服务于不同的部门或参与者，它们都拥有自己的区块链后端，并且这些区块链彼此之间保持同步。在这种设置下，虽然技术上实现了去中心化，但从治理角度看，它可能仍然是中心化的。即使实施了控制或治理，由于能够访问单一真相来源，系统仍然能够保持透明度和信任。请看图
    2-26，它可能类似于大多数正在构建的区块链概念验证或应用，其中区块链由某些云服务提供商通过其提供的`区块链即服务`（`BaaS`）产品来托管。


    ![A440588_1_En_2_Fig26_HTML.jpg](img/A440588_1_En_2_Fig26_HTML.jpg)


    图 2-26


    云端支持的区块链系统


    并不一定所有部门都需要各自不同的网络应用。一个网络应用可以通过适当的访问控制机制处理系统中多个不同参与者的请求。让系统中的所有参与者都拥有自己的区块链副本可能是个好主意。拥有本地区块链副本不仅有助于维护系统的透明度，还可能通过随时访问数据来帮助生成数据驱动的见解。系统中不同参与者维护的不同“区块链”在设计上保持一致，这要归功于诸如`PoW`、`PoS`等共识算法。大多数私有区块链倾向于使用除`PoW`之外的任何共识算法，以减轻资源消耗，并尽可能节省电力和计算能力。当涉及到私有或联盟链时，`PoS`共识机制相当常见。由于区块链正在颠覆商业的诸多方面，并且没有更好的方法来实现它们之间的透明度，因此在云端创建“按使用付费”模式的区块链解决方案正越来越受欢迎。云服务正在帮助企业以最低的前期投资，在其由区块链驱动的数字化转型之旅中实现跨越式发展。


    还有在以太坊区块链网络上构建的去中心化应用（`DApps`）。这些应用可以是私有以太坊上的许可制，也可以是公有以太坊网络上的非许可制。同时，这些应用也可以服务于同一公有以太坊网络上的不同用例。虽然我们将在本书后面详细介绍以太坊的具体内容，但请先看图
    2-27，以高层次了解这些应用可能的样子。


    ![A440588_1_En_2_Fig27_HTML.jpg](img/A440588_1_En_2_Fig27_HTML.jpg)


    图 2-27


    以太坊网络上的`DApps`


    正如前面章节所讨论的，开发区块链应用只受限于你的想象力。可以构建纯粹的区块链原生应用。目前也在构建将区块链仅视为后端的应用，以及使用传统应用并仅将区块链用于某些特定目的的混合应用。到目前为止，区块链的可扩展性是最主要的问题之一。虽然可扩展性本身仍处于研究阶段，但让我们先学习一些扩展技术。


    ## 扩展区块链


    我们从历史的角度审视了区块链，并了解了它何以成为当今最具颠覆性的技术之一。在本章的技术探讨中，我们了解到大多数区块链变体固有的可扩展性问题。根据设计，区块链难以扩展，因此它成为了学术界和一些创新驱动型企业的研究领域。看看比特币的采用情况，由于固有的可扩展性挑战，它并没有被用来取代法定货币。你不能用比特币买杯咖啡，然后等待一小时交易才结算。因此，比特币正被用作一种资产类别供投资者投资。截至目前，比特币区块链网络无法容纳像
    Visa 或 MasterCard 那样多的交易量。


    回想一下我们目前学过的共识协议，例如比特币或以太坊的`PoW`，或其他一些区块链变体（如 Multichain、Hyperledger、Ripple 或 Tendermint）的`PoS`及其他`BFT`共识。所有这些共识算法的主要目标都是实现拜占庭容错。根据设计，区块链网络中的每个节点（至少是全节点）都维护着整个区块链的本地副本，验证所有交易和区块，响应网络中其他节点的请求等，以实现去中心化，但这却成为了可扩展性的瓶颈。看看这里的讽刺之处——我们在中心化系统中增加更多服务器以提升可扩展性，但这在去中心化系统中却不适用，因为随着节点数量增加，延迟只会增加。虽然在去中心化网络中，节点数量增加可能会提高去中心化程度，但网络中的交易数量也会增加，从而导致对计算和存储资源的需求增加。请记住，这种情况更适用于公有区块链，而对私有区块链影响较小。与公有链相比，私有链更容易扩展，因为控制实体可以定义和设置具有高计算能力和更大带宽的节点规格。此外，某些任务可以从区块链上卸载并在链下计算，这也有助于系统良好地扩展。


    在本章中，我们将学习一些通用的扩展技术，并在各自的章节中讨论比特币和以太坊特有的扩展技术。请记住，并非所有扩展技术都适用于所有类型的区块链变体或用例。最好的方法是理解这些技术原理，并在特定情况下使用最合适的技术。

    '
- fmt: '### Off-Chain Computation


    Off-chain computation is one of the most promising techniques to scale blockchain
    solutions. The idea is to limit the usage of blockchain and do the heavy lifting
    outside of it, and only store the outcomes on blockchain. Keep in mind that there
    is no standard definition of how the off-chain computation should happen. It is
    heavily dependent on the situation and the people trying to address it. Also,
    different blockchain flavors may require different approaches for off-chain computation.
    At a high level, it is like another layer on top of blockchain that does heavy,
    compute-intensive work and wisely uses the blockchain. Obviously, you may not
    be able to retain all the characteristics of blockchain by doing computations
    off-chain, but it is also true that you may not need blockchain for all kinds
    of computing requirements and may use it only for specific pain points.


    The off-chain computations could be on a sidechain, could be distributed among
    a random group of nodes, or could be centralized as well. The side chains are
    independent of the main blockchain. It not only helps scale the blockchain well,
    it also isolates damages to the sidechain and prevents the main blockchain from
    any damages from a sidechain. One such example sidechain is the “Lightning Network”
    for Bitcoins that should help in faster execution of transactions with minimal
    fee; that will support micropayments as well. Another example of a sidechain for
    Bitcoins is “Zerocash,” whose primary objective is not really scalability, but
    privacy. If you are using Zerocash for Bitcoin transactions, you cannot be tracked
    and your privacy is preserved. We will limit our discussion to the generic scalability
    techniques and not get into a detailed discussion of Bitcoin scalability in this
    book.


    One obvious question that might come up at the moment is how people would check
    the authenticity of the transactions if they are sent off-chain. First, to create
    a valid transaction, you do not need a blockchain. We learned in the “Cryptography”
    section in this chapter about the assymetric key cryptography that is used by
    the blockchain system. To make a transaction, you have to be the owner of a private
    key so you can sign the transaction. Once the transaction is created, there are
    advantages when it gets into the blockchain. Double-spend is not possible with
    Bitcoin blockchain, and there are other advantages, too. For now, the only objective
    is to get you on board with the fact that you can create a transaction as long
    as you own the private key for your account.


    Bitcoin blockchains are a stateless blockchain, in the sense that they do not
    maintain the state of an account. Everything in Bitcoin blockchain is present
    in the form of a transaction. To be able to make a transaction, you have to consume
    a previous transaction and there is no notion of “closing balance” for an account,
    as such. On the contrary, Ethereum blockchain is a “stateful” one! The blocks
    in Ethereum blockchain contain information regaring the state of the entire block
    where account balance is also a part. The state information takes up significant
    space when every node in the network maintains it. This situation is valid for
    other blockchains as well that are stateful.


    Let’s take an example to understand this better. Alice and Bob are two parties
    having multiple transactions between each other. Let’s say they usually have 50
    monetary transactions in a month. In a stateful blockchain, all these individual
    transactions would have their state information, and that will be maintained by
    all the nodes. To address this challenge, the concept of “state channels” is introduced.
    The idea is to update the blockchain with the final outcome, say, at the end of
    the month or when a certain transaction threshold is reached, and not with each
    and every transaction.


    State channels are essentially a two-way communication channel between users,
    objects, or services. This is done with absolute security by using cryptographic
    techniques. Just to get a heads-up on how it works, take a look at Figure [2-28](#A440588_1_En_2_Chapter.html#Fig28).


    ![A440588_1_En_2_Fig28_HTML.jpg](A440588_1_En_2_Fig28_HTML.jpg)


    Figure 2-28


    State channels for off-chain computation


    Notice that the off-chain state channels are mostly private and confined among
    a group of participants. Keep in mind that the state of blockchain for the participants
    needs to be locked as the first step. Either it could be a MultiSig scheme or
    a smart contract-based locking. After locking, the participants make transactions
    among each other that are cryptographically secured. All transactions are cryptographically
    signed, which makes them verifiable and these transactions are not immediately
    submitted to the blockchain. As discussed, these state channels could have a predefined
    lifespan, or could be bound to the amount of transactions being carried out in
    terms of volume/quantity or any other quantifiable measure. So, the final outcome
    of the transactions gets settled on the blockchain and that unlocks the state
    as the final step.


    State channels could be very differently implemented in different use cases, and
    their implementations are actually left to the developers. It is certainly a way
    forward and is one of the most critical components for mainstream adoption of
    blockchain applications. For Bitcoin, the Lightning Network was designed for off-chain
    computation and to make the payments transaction faster. Similarly, the “Raiden
    Network” was designed for Ethereum blockchain. There are many other such developments
    to make micropayments faster and more feasible on blockchain networks.'
