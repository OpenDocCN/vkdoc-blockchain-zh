- fmt: 'Typically, `21,000` gas is charged for any transaction as a "base fee" to
    cover the cost of an elliptic curve operation to compute the sender address from
    the signature, and also for the disk space of storing the transaction. There are
    ways to estimate gas requirements for transactions and contracts. Example: `estimateGas`
    is a Web3 function to estimate gas requirement for a given function. Also, to
    estimate the total cost, `gasPrice` oracle is a helper function in `geth` client
    and `web3.eth.getGasPrice` is a Web3 native function to find an approximate gas
    Price. Following is an example code that can be used in `Truffle`:


    ```

    var MyContract = artifacts.require("./MyTest.sol");

    // getGasPrice returns the gas price in Wei

    MyContract.web3.eth.getGasPrice(function(error, result){

    var gasPrice = Number(result);

    console.log("Current gasPrice is " + gasPrice + " wei");

    // Get the Contract instance

    MyContract.deployed().then(function(instance) {

    // Retrieve gas estimation for the function giveAwayDividend()

    return instance.giveAwayDividend.estimateGas(1);

    }).then(function(result) {

    var gas = Number(result);

    console.log("Total gas estimation = " + gas + " units");

    console.log("Total Transaction Cost estimation in Wei = " + (gas * gasPrice) +
    " wei");

    console.log("Total Transaction Cost estimation in Ether = " + MyContract.web3.fromWei((gas
    * gasPrice), ''ether'') + " Ether");

    });

    });

    Example code for transaction cost estimation

    ```


    While writing smart contracts in Solidity, many prefer to use `constant` functions
    to compute certain things offchain or just make an RPC query to your local blockchain.
    Since such `constant` functions do not change the blockchain state, they are in
    a way free of cost as they do not consume gas. If the `constant` functions are
    used inside of any transaction, then it is highly likely that gas expense would
    be required.


    Let us now learn about the block''s gas limit. Recollect that Bitcoin had a predefined
    limit of 1MB block size and Bitcoin cash had a 2MB block size. Miners would accumulate
    as many transactions as could fit in those blocks. Ethereum, however, has a very
    different way of limiting the block size. In Ethereum, the block size is controlled
    by the block gas limit. Different transactions have different gas limits; so,
    depending on the block gas limit, a certain number of transactions are clubbed
    together so that total transactions gas limit is less than the block gas limit.
    Different miners can have different sets of transactions that they are willing
    to put in a block. The block gas limit is dynamically calculated. The Ethereum
    protocol allows the miner of a block to adjust the block gas limit by a factor
    of `1/1024` (`0.0976%`) in either direction. Miners on the Ethereum network use
    a mining program, such as `ethminer`. The `ethminer` is an Ethereum GPU mining
    worker, which connects to either `geth` or Parity Ethereum client node. Both `geth`
    and Parity have options that miners can change.


    ## Ethereum Smart Contracts


    Unlike Bitcoin, which is just a cryptocurrency, Ethereum is so much more — thanks
    to the smart contracts. We got a glimpse of what a smart contract might be in
    the previous sections while learning about Contract Accounts. While we will get
    into the development aspects of smart contracts in the following chapters, we
    will have a detailed exploration of what they really are in this section.


    Let us start with why it is named so? Please be aware that there is nothing "smart"
    in a smart contract that is out-of-the-box. It is smart when you code smart logic
    into it, and it is the beauty of Ethereum that enables you to do so. Let us just
    summarize our learning so far on the Ethereum smart contracts:


    - Smart contracts reside inside the Ethereum blockchain.

    - They have their own account, hence address and balance.

    - They are capable of sending messages and receiving transactions.

    - They get activated when they receive a transaction, and can be deactivated as
    well.

    - Like other transactions, an execution fee and storage fee are applicable for
    them as well.


    All the code in Ethereum, including the smart contracts, is compiled to a low
    level, stack-based bytecode language, referred to as EVM code, that runs on EVM.
    The popular high-level languages used to write smart contracts are Solidity, Serpent,
    and LLL, where their respective compilers convert the high-level code into the
    EVM byte code. We looked at how contracts could be added into the blockchain by
    any external agent such as EOA. Since computation and storage in Ethereum are
    very expensive, it is advisible that the logic should be written in as simple
    and optimized fashion as possible. When a smart contract is deployed to the Ethereum
    blockchain network, it is possible for anyone to call the functions of the smart
    contract. The functions usually have security features coded up that prevent unauthorized
    access; nevertheless, attempts can be made though they won''t succeed.


    If you try to imagine a smart contract inside of a block in an Ethereum blockchain,
    it might appear as in Figure [4-9](#A440588_1_En_4_Chapter.html#Fig9).


    ![A440588_1_En_4_Fig9_HTML.jpg](A440588_1_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Ethereum smart contract with respect to blocks


    Let us now take an example of a voting application. A smart contract is written
    that has an address (Contract Account address) and is a part of some block in
    the blockchain, depending on when it was created. The voters can make transactions
    to that address (votes). The contract code is written such that it will increment
    the vote count with every transaction received and terminates itself after some
    time, publishing the voting result (Ethereum state change). Take a look at Figure
    [4-10](#A440588_1_En_4_Chapter.html#Fig10) to have a diagramatic representation
    for a high-level understanding.


    ![A440588_1_En_4_Fig10_HTML.jpg](A440588_1_En_4_Fig10_HTML.jpg)


    Figure 4-10


    An application with smart contract logic


    ### Contract Creation


    Recollect that we learned about the contract creation transaction, whose only
    purpose is to create a contract. It is a bit different kind of transaction compared
    with the other types. So, before the contract creation transaction is fired up
    to create a Contract Account, it must first initialize the four properties that
    all types of accounts have:


    - The `nonce` should be set to zero initially.

    - The `Account Balance` should be set with the value (amount of Ether) transferred
    by the sender, and the same amount must be deducted from the sender''s account.

    - The `StorageRoot` should be empty.

    - The contract''s `codeHash` should be set with the Keccak 256-bit hash of an
    empty string.


    After initializing the account, the account can be created using the `init` code
    sent with the transaction that does the real work. There could be a whole bunch
    of actions defined in `init` code, and it''s execution can effect several events
    that are not internal to the execution state, such as:


    - The account''s `storage` can be altered.

    - Further accounts can be created.

    - Further message calls can be triggered.'
