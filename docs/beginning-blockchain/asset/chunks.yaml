    ### 区块链


    正如我们将要了解的，区块链本质上是一种区块链数据结构；从某种意义上说，它是由一个个区块链接而成的链条。当我们提到一个区块时，它可以指代单笔交易，也可以指代多笔交易组合在一起。我们将从哈希指针开始讨论，它是区块链数据结构的基本构建单元。


    哈希指针是一种指向数据块的密码学哈希值，其中哈希指针本身就是该数据块的哈希值（图 2-19）。与指向下一个区块以便你能访问它的链表不同，哈希指针指向前一个数据块，并提供一种验证数据未被篡改的方法。


    ![A440588_1_En_2_Fig19_HTML.jpg](img/A440588_1_En_2_Fig19_HTML.jpg)


    **图 2-19** 针对交易区块的哈希指针


    哈希指针的目的是构建一个防篡改的区块链，该区块链可被视为单一事实来源。区块链如何实现这一目标？其工作原理是，当前区块的区块头中存储了前一个区块的哈希值，而当前区块及其区块头的哈希值则会存储在下一个区块的区块头中。这就形成了我们能在图
    2-20 中看到的区块链。


    ![A440588_1_En_2_Fig20_HTML.jpg](img/A440588_1_En_2_Fig20_HTML.jpg)


    **图 2-20** 通过哈希指针链接的区块链中的区块


    正如我们所观察到的，每个区块都指向其前一个区块，即“父区块”。每个新添加到链上的区块，都会成为下一个待添加区块的父区块。这个过程一直追溯到区块链中创建的第一个区块，它被称为“创世区块”。在这种通过哈希值反向链接区块的设计中，任何人想要篡改任何区块中的数据实际上都是不可行的。我们已经了解了哈希函数的特性，因此知道如果数据被篡改，哈希值将无法匹配。那如果有人也同时更改了哈希值呢？让我们关注图
    2-21 来理解为何以任何方式篡改数据都是不可能的。


    -   假如你还更改了区块 1235 的区块头中存储的哈希值，使其与被篡改后的数据完美匹配。换句话说，你对篡改后的数据块 1234 计算哈希值，然后用这个新哈希值替换区块
    1235 区块头中存储的那个。但这样操作后，区块 1235 的哈希值本身也会改变（因为区块 1235 指的是数据和区块头的整体），并且这个新哈希值将无法与区块
    1236 区块头中存储的哈希值匹配。

    -   你必须一直这样做，直到最后一个或最新的哈希值。由于网络中的所有人或多数人已经拥有区块链以及最新哈希值的副本，因此绝无可能同时攻击大多数系统并更改所有哈希值。

    -   这使得它成为一种防篡改的区块链数据结构。


