- fmt: 'With these values our smart contract is ready to be deployed.


    **Important Note**


    There may be some improvements that can be done to make this contract more secure
    and performance (gas) friendly. The `Solidity` code should not be taken as reference.
    Detailed discussion on `Solidity` best practices is out of scope for this text.
    For `Solidity` best practices, we recommend following the official `Solidity`
    documentation and `Solidity`-specific texts.


    ## Deploying the Smart Contract


    In this section we will deploy the smart contract we developed in the last section
    to the private Ethereum network we have created. The process of deploying the
    smart contract is the same as what we did in the previous chapter. The only difference
    is that this time we are deploying the contract to a private network instead of
    a public one. In this chapter too, we are using the same `web3.js` library for
    Ethereum programming using JavaScript. We recommend the reader to go through the
    previous chapter if they have not already done that.


    ### Setting up web3 Library and Connection


    First of all, we will install the `web3` library in a `node.js` application. This
    is exactly how we did it in the last chapter. This `node.js` application will
    be used to deploy the smart contract.


    ```

    npm install web3@1.0.0-beta.28

    ```


    After installation, let’s first initialize and instantiate the `web3` instance.


    ```

    var Web3 = require(''web3'');

    var web3 = new Web3(new Web3.providers.HttpProvider(''http://127.0.0.1:8507''));

    ```


    Note that this time, our HTTP provider for the `web3` instance has changed to
    a local endpoint instead of a public INFURA endpoint, which we used in the last
    chapter. This is because we are now connecting to our local private network. Also
    note that the port we are using is `8507`, which is what we provided in the `--rpcport`
    parameter when we set up the first node of our private network. This means we
    are connecting to the first node of the network from our `web3` instance.


    ### Deploy the Contract to the Private Network


    Now that we have our smart contract and its details, we will prepare a `web3`
    contract object with the details of this contract, and then we will deploy this
    contract to the Ethereum blockchain by calling the `deploy` method on the contract
    object.


    We need to create an object of the `web3.eth.Contract` class that can represent
    our contract. The following code snippet creates a contract instance with the
    ABI of our contract as an input to the constructor.


    ```

    var pollingContract = new web3.eth.Contract([

    {

    "constant": true,

    "inputs": [

    {

    "name": "",

    "type": "address"

    }

    ],

    "name": "votes",

    "outputs": [

    {

    "name": "",

    "type": "uint256"

    }

    ],

    "payable": false,

    "stateMutability": "view",

    "type": "function"

    },

    {

    "constant": true,

