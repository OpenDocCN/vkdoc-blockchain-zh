    - 计算`e = SHA-1(m)`

    - 计算`s = k^(-1)(e + d.r) mod n`

    - 如果`s = 0`，则从第一步重新开始

    - Alice 对消息`m`的签名现在为`(r, s)`


    ### 签名验证


    假设 Bob 是接收方，他可以访问域参数和发送方 Alice 的公钥`Q`。作为安全措施，Bob 应首先验证他拥有的数据——即域参数、签名和 Alice 的公钥`Q`——全部有效。为了验证
    Alice 对消息（`m`）的签名，Bob 将按指定顺序执行以下操作：


    - 验证`r`和`s`是区间`[1, n - 1]`内的整数

    - 计算`e = SHA-1(m)`

    - 计算`w = s^(-1) mod n`

    - 计算`u[1] = ew mod n` 和 `u[2] = rw mod n`

    - 计算`X = u[1]G + u[2]G`，其中`X`代表坐标，例如`(x[2], y[2])`

    - 计算`v = x[1] mod n`

    - 如果`r = v`则接受签名，否则拒绝


    在本节中，我们了解了 ECDSA 背后的数学原理。回想一下，我们在生成密钥和签名时都使用了随机数。确保生成的随机数实际上是密码学意义上的随机数至关重要。在许多用例中，使用
    160 位 ECDSA，因为它需要与 SHA-1 哈希函数匹配。


    在众多用例中，ECDSA 被用于数字证书。在最简单的形式中，数字证书是一个公钥，与设备 ID 和证书过期日期捆绑在一起。这样，证书使我们能够检查并确认公钥属于谁，以及所考虑的设备是否是网络的合法成员。这些证书对于防止密钥建立协议中的“冒充攻击”非常重要。许多
    TLS 证书都是基于 ECDSA 密钥对，并且这种用法正在持续增长。

