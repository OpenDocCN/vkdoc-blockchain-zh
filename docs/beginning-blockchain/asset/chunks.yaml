- fmt: '# Understanding Proof of Work in Bitcoin Mining


    Even though the rewards look lucrative, it is not so easy to get lucky and be
    the node that gets to propose a block. If you are not lucky enough, all the work
    you did would be in vain; that’s a disadvantage! So, what is it that the nodes
    do as a PoW? Let’s get back to the difficulty puzzle now. Every mining node at
    all times is working to propose a block, but only one succeeds at a given point
    in time. Assume that a block is proposed already, and now all mining nodes are
    working to propose a new block. Let us go through the process step by step and
    understand the whole flow:


    ## Step-1


    The miners use a software to keep track of the transactions, eliminate the ones
    that already made it to a successful block in blockchain, reject the fraudulent
    transactions, and solve the cryptographic puzzle to propose a new block and relay
    that to the entire network. The best software to mine is the official Bitcoin
    Core but there have been many other variants that people have come up with. If
    you log into this link ( [`https://bitcoin.org/en/download`](https://bitcoin.org/en/download)
    ) you will find that the official Bitcoin Core is supported in Windows, Linux,
    Mac OS, Ubuntu, and ARM Linux. So, when we say that the mining node selects all
    the transactions (maybe the ones that give the miner the highest profit) till
    the block limit of 1MB (2MB for Bitcoin Cash), they also hash those transactions
    and generate the Merkle root that would become a part of this new block’s header.
    This Merkle root represents all the transactions.


    ## Step-2


    They prepare the block header. Apart from the nonce, the rest is all available
    at this step. It is the work of the mining node to find the nonce by hashing the
    block header twice and comparing it against the difficulty target to see if it
    is less than that. They keep changing the nonce till it satisfies this condition,
    and there is no shortcut to find a nonce quickly; one must try out every possible
    option. We already looked at how to compute the difficult target using the four
    bytes of data present in the header itself, and we learned how it changes every
    two weeks. See the following for how this process looks:


    ```

    H [ H (Version | Previous Block Hash | Merkle Root | Time Stamp | Difficulty Target
    |  Nonce) ]

    < [ Difficulty Target ]

    ```


    ## Step-3


    The miner keeps on changing the `nonce` field in step-2, by incrementing it by
    “1” till it satisfies the condition—it is a recursive phenomenon. The difficulty
    target for every node is the same and all of them are trying to solve the same
    problem, but remember that they may have different variants of transaction pools
    and hence the Merkle root for them would be different. Since every node is trying
    to extend the longest and main blockchain, so the previous block hash would be
    the same.


    So, ultimately the Sha256 hash twice for the block header should be less than
    the target to be able to propose the block to the entire network. See the following
    example for a better understanding:


    ```

    Target   : 0000000000000074cd00000000000000000000000000000000000000000000000

    Hash     : 0000000000000074cc4471deff052ced7f07347e4eda86c845a2fcf0553ed7f0

    ```


    Notice that the hash value and the target value have the same number of leading
    zeros (i.e., 14) and `74cc` is less than `74cd`, so it satisfies the condition
    and this block can now be proposed. In many places, you would find that this explanation
    is simplified with ballpark values of both the target and the hash, and counting
    only the leading zeros. If the hash has more leading zeros than the target, then
    it satisfies the condition. Remember again that the more zeros in the target,
    the more difficult it gets in finding the hash that can satisfy the condition.


    Let us connect this learning so far with the real Bitcoin implementation. We know
    that block creation time is set to ten minutes—it is coded up in Bitcoin binaries
    for 2,016 blocks in two weeks, as we discussed already, and does not change till
    a hard fork happens. You can browse blocks proposed and see the hashes that satisfied
    the difficulty target at the website [`https://blockchain.info`](https://blockchain.info/)
    and see for yourself that the hashes for different blocks would have different
    leading zeros, just to set the block creation time to ten minutes on average.
    In the initial days, the number of leading zeros was around nine or ten, and today
    it has increased to around 18 to 20 zeros. It may increase even further as and
    when more powerful computing nodes capable of more hash rates join the network.


    ## Step-4


    Once a miner finds the valid block, they immediately publish the block to the
    entire network. Every node that receives this block individually checks again
    if the miner who proposed the block actually solved the mining puzzle. For these
    nodes to validate this, it is just one step, as shown below:


    ```

    H [H (Version| PreviousBlock Hash | Merkle Root | Time Stamp | Difficulty Target
    | Found Nonce)]

    < [ Difficulty Target ]

    ```


    Notice that they just use the block header that includes the nonce found by the
    proposing miner to see if the hash is less than the target and is valid. If it
    was a valid nonce and the condition satisfied, then they check for individual
    transactions proposed in the block with its Merkle root in the block header. If
    all transactions are valid, then they add this block to the local copy of their
    blockchain. This new block has the coinbase transaction that generates new coins
    (it started with 50 BTC, then 25, then 12.5, and keeps halving as discussed) as
    an award for the miner who proposed the valid block.


    Note here that block mining is not an easy job, thanks to the PoW mining algorithm.
    For a node to propose an invalid block, it has to burn a lot of electricity and
    CPU cycles to find the nonce and propose the block that would ultimately get rejected
    by nodes in the network. Had it been an easy task, many nodes would just keep
    trying for it and flood the network with bad blocks. You must understand and appreciate
    by now how Bitcoin prevents such situations in a game theoretic way! It is always
    profitable for the miners to play by the rules and they do not gain any extra
    benefits by not following the rules.


    In the previous steps, we learned the PoW mining procedure that is implemented
    in Bitcoins. One of the best things in this design is the random selection of
    a mining node that gets to propose a block. No one knows who would get lucky to
    find the right nonce and propose a block, it is purely a random phenomenon. We
    already know that generating a true random number is quite difficult and this
    is something that is the most vulnerable surface of attack for most cryptographic
    implementations. With such a design as Bitcoin’s, random selection of a node to
    propose a block is truly random.


    The next best thing in Bitcoin mining is the block reward. It is something that
    a miner who successfully proposes a new block gets, using the coinbase transaction
    in the same block. The miners also get the transaction fees associated with all
    the transactions they have included in the block. So, mining reward for a block
    is a combination of block reward and transaction fee as shown below:


    ```

    Mining Reward = Block Reward + Total transaction fees of all transactions in the
    Block

    ```'
