  trans: '

    # 区块链的层次结构


    截至目前，以太坊等公有区块链变体正处于成熟过程中，在这些区块链之上构建复杂应用可能并非明智之举。请记住，区块链从来不仅仅是一项技术，而是商业原则、经济学、博弈论、密码学与计算机科学工程的结合。大多数现实世界中的应用本质上都相当复杂，建议从零开始构建区块链解决方案。


    本节的目的仅为让您概览区块链的各个层次，并在后续章节深入探讨核心基础知识。首先，让我们回顾一下对 TCP/IP 协议栈的基本理解。TCP/IP 协议栈中的分层方法实际上是实现开放系统的一种标准。拥有抽象层不仅有助于更好地理解协议栈，也有助于构建符合该协议栈的产品，从而实现开放系统。此外，各层之间的相互抽象使系统更健壮且易于维护。对任何一层的更改都不会影响其他层。再次强调，不要将
    TCP/IP 的类比与区块链的层次混淆。TCP/IP 是每个互联网应用都使用的通信协议，区块链亦是如此。


    进入区块链领域。目前尚无公认的全球标准能够将区块链组件清晰划分为不同层次。分层异构架构是必要的，但就目前而言，这仍是未来的发展方向。因此，我们将尝试构建区块链层次，以便更好地理解这项技术，并在市场上数百种区块链/加密货币变体之间建立类比。请参见图
    1-12 中区块链的高层级分层表示。


    ![A440588_1_En_1_Fig12_HTML.jpg](img/A440588_1_En_1_Fig12_HTML.jpg)


    图 1-12


    区块链的各个层次


    您可能会疑惑为什么是五层，而不是更细粒度或更少的层。显然，层数不能太多也不能太少；这将是复杂度、健壮性、适应性等因素之间的权衡。这里的目的同样不是标准化区块链技术，而是建立更好的理解。请记住，所有这些层都存在于所有节点上。


    在本书的第 6 章中，我们将从零开始构建一个去中心化应用，并通过实际用例学习区块链如何在所有这些层上运行。


    ## 应用层


    由于区块链的特性，如数据的不可篡改性、参与者之间的透明性、对抗攻击的韧性等，诸多应用正在被构建。某些应用仅在应用层构建，将任何可用的区块链“风味”视为既定事实；而另一些应用在应用层构建，并与区块链中的其他层交织在一起。这就是为什么应用层应被视为区块链的一部分。


    这是您编写所需功能、为最终用户构建应用的层次。它通常涉及传统的软件开发技术栈，如客户端编程结构、脚本、API、开发框架等。对于将区块链视为后端处理的应用，这些应用可能需要托管在
    Web 服务器上，这可能需要 Web 应用开发、服务器端编程和 API 等。理想情况下，良好的区块链应用不采用客户端–服务器模型，也没有客户端访问的集中式服务器——这正是比特币的工作方式。


    您可能听说过或已经学习过链下网络的概念。其思想是构建那些并非所有事务都依赖区块链，而是明智地使用区块链的应用。换句话说，这个概念是为了确保繁重的工作在应用层完成，或大量的存储需求在链下处理，从而使核心区块链轻量且高效，网络流量也不会过大。


    ## 执行层


    执行层是区块链网络中所有节点执行由应用层排序的指令的地方。这些指令可能是简单指令，也可能是以智能合约形式存在的一组多个指令。无论哪种情况，都需要执行程序或脚本来确保交易的正确执行。区块链网络中的所有节点都必须独立执行这些程序/脚本。在同一组输入和条件下，程序/脚本的确定性执行在所有节点上总能产生相同输出，这有助于避免不一致性。


    在比特币的情况下，这些是简单的脚本，并非图灵完备，仅允许有限的指令集。而以太坊和 Hyperledger 则允许复杂的执行。以太坊的代码或其用`solidity`编写的智能合约会被编译为`字节码`或`机器码`，在其自身的`以太坊虚拟机`上执行。Hyperledger
    对其链码智能合约采用了更简单的方法。它支持在 Docker 镜像内运行已编译的机器码，并支持多种高级语言，如 Java 和 Go。

    '
- fmt: '### Semantic Layer


    The Semantic Layer is a logical layer because there is an orderliness in the transactions
    and blocks. A transaction, whether valid or invalid, has a set of instructions
    that gets through the Execution Layer but gets validated in the Semantic Layer.
    If it is Bitcoin, then whether one is spending a legitimate transaction, whether
    it is a double-spend attack, whether one is authorized to make this transaction,
    etc., are validated in this layer. You will learn in the following chapters that
    Bitcoins are actually present as transactions that represent the system state.
    To be able to spend a Bitcoin, you have to consume one or more previous transactions
    and there is no notion of Accounts. This means that when someone makes a transaction,
    they use one of the previous transactions where they had received at least the
    amount they are spending now. This transaction must be validated by all the nodes
    by traversing previous transactions to see if it is a legitimate transaction.
    Ethereum, on the other hand, has the system of Accounts. This means that the account
    of the one making the transaction and that of the one receiving it both get updated.


    In this layer, the rules of the system can be defined, such as data models and
    structures. There could be situations that are a little more complex compared
    with simple transactions. Complex instruction sets are often coded into smart
    contracts. The system’s state gets updated when a smart contract is invoked upon
    receiving a transaction. A smart contract is a special type of account that has
    executable code and private states. A block usually contains a bunch of transactions
    and some smart contracts. The data structures such as the Merkle tree are defined
    in this layer with the Merkle root in the block header to maintain a relation
    between the block headers and the set of transactions in a block (usually Key-Value
    storage on disk). Also, the data models, storage modes, in-memory/disk based processing,
    etc. can be defined in this logical layer.


    Apart from the aforementioned, it is the semantic layer that defines how the blocks
    are linked with each other. Every block in a blockchain contains the hash of the
    previous block, all the way to the genesis block. Though the final state of the
    blockchain is achieved by the contributions from all the layers, the linking of
    blocks with each other needs to be defined in this layer. Depending on the use
    case, you might want to code up an additional functionality in this layer.


    ### Propagation Layer


    The previous layers were more of an individual phenomenon: not much coordination
    with other nodes in the system. The Propagation Layer is the peer-to-peer communication
    layer that allows the nodes to discover each other, and talk and sync with each
    other with respect to the current state of the network. When a transaction is
    made, we know that it gets broadcast to the entire network. Similarly, when a
    node wants to propose a valid block, it gets immediately propagated to the entire
    network so that other nodes could build on it, considering it as the latest block.
    So, transaction/block propagation in the network is defined in this layer, which
    ensures stability of the whole network. By design, most of the blockchains are
    designed such that they forward a transaction/block immediately to all the nodes
    they are directly connected to, when they get to know of a new transaction/block.


    In the asynchronous Internet network, there are often latency issues for transaction
    or block propagation. Some propagations occur within seconds and some take more
    time, depending on the capacity of the nodes, network bandwidth, and a few more
    factors.


    ### Consensus Layer


    The Consensus Layer is usually the base layer for most of the blockchain systems.
    The primary purpose of this layer is to get all the nodes to agree on one consistent
    state of the ledger. There could be different ways of achieving consensus among
    the nodes, depending on the use case. Safety and security of the blockchain is
    accertained in this layer. In Bitcoin or Ethereum, the consensus is achieved through
    proper incentive techniques called “mining.” For a public blockchain to be self-sustainable,
    there has to be some sort of incentivization mechanisms that not only helps in
    keeping the network alive, but also enforces consensus. Bitcoin and Ethereum use
    a Proof of Work (PoW) consensus mechanism to randomly select a node that can propose
    a block. Once that block is proposed and propagated to all the nodes, they check
    to see if it a valid block with all legitimate transactions and that the PoW puzzle
    was solved properly; they add this block to their own copy of blockchain and build
    further on it. There are many different variants of consensus protocols such as
    Proof of Stake (`PoS`), deligated PoS (`dPoS`), Practical Byzantine Fault Tolerance
    (`PBFT`), etc., which we will cover in great detail in the following chapters.


    ## Why is Blockchain Important?


    We looked at the design aspects of centralized and decentralized systems and got
    some idea of the technical benefits of decentralized systems over centralized
    ones. We also learned about different layers of blockchain. Blockchain, being
    a decentralized peer-to-peer system, has some inherent benefits and complexities.
    Keep in mind that it is not a silver bullet that can address all the problem areas
    in the world, but there are specific cases where it is the need of the hour. There
    are also scenarios where blockchainizing the existing solution makes it more robust,
    transparent, and secured. However, it can as well lead to disaster if not done
    the right way! Let us now keep a business and functional perspective in mind and
    analyze blockchain.


    ### Limitations of Centralized Systems


    If you take a quick glance at the software evolution landscape, you will see that
    many software solutions have a centralized design. The reason is not just because
    they are easy to develop and maintain, but because we are used to such a design
    to be able to trust the system. We always need a trusted third party who can assure
    we are not being cheated or becoming victims of a scam. Without a prior business
    relationship, it is difficult to trade with someone or even scale up. One would
    probably not do business with someone they have never known.


    Let us take an example to understand it better. Today when we order something
    from Amazon, we feel safe and assured of the item’s delivery. The producer of
    the item is someone and the buyer is someone else. Then what role is being played
    by Amazon here? It is there as an enabler functioning as a trusted intermediary,
    and also to take some cut of the transaction. The buyer trusts the seller where
    the trust relation is actually imposed by such trusted third parties. What blockchain
    proposes is that, in the modern digital era, we do not really need a third party
    in between to impose trust, and the technology has matured enough to handle it.
    In blockchain, trust is an inherent part of the network by default, which we will
    explore more in upcoming chapters.


    Let us quickly learn a few downsides of a conventional centralized system:


    *   Trust issues

    *   Security issue

    *   Privacy issue—data sale privacy is being undermined

    *   Cost and time factor for transactions


    Some of the advantages of decentralized systems over centralized systems could
    be:


    *   Elimination of intermediaries

    *   Easier and genuine verification of transactions

    *   Increased security with lower cost

    *   Greater transparency

    *   Decentralized and immutable'
