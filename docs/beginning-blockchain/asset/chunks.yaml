    \ interacts with a blockchain.\n\n![A440588_1_En_5_Fig1_HTML.jpg](A440588_1_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1\n\nBlockchain application interaction\n\n## Interacting with the Bitcoin\
    \ Blockchain\n\nIn this section we will send a transaction to the Bitcoin public\
