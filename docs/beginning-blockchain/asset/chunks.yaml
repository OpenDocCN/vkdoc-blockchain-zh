- fmt: "# Client Application\n\nAs we did in the last chapter, we can use the `web3`\
    \ library to call a function on a smart contract. But, in the last chapter we\
    \ did that using a node.js application and not in a browser application. In this\
    \ section, we will be using `web3` in a browser application to call our deployed\
    \ smart contract’s `vote` function.\n\nThe simplest web application we can create\
    \ for this DApp is a single web page with a few text and button controls. For\
    \ the web page, we can use the following code inside an html file and then run\
    \ it from a local server. Note that running from a local server and not directly\
    \ opening the file from the browser is important to load the scripts properly,\
    \ without facing any browser security issues.\n\n```\nBeginning Blockchain - DApp\
    \ demo\n\">\n\nBeginning Blockchain\n\nHi, Welcome to the Polling DApp!\n&nbsp;\n\
    Get latest poll:&nbsp;\nGet Poll\n\nVote: Yes:\n No:\n\nSubmit:&nbsp;\nSubmit\
    \ Vote\n\nif (typeof web3 !== 'undefined') {\nweb3 = new Web3(web3.currentProvider);\n\
    } else {\nweb3 = new Web3(new Web3.providers.HttpProvider('http://127.0.0.1:8507'));\n\
    }\nfunction getPoll() {\nvar pollingContract = new web3.eth.Contract([{\n\"constant\"\
    : true,\n\"inputs\": [{\n\"name\": \"\",\n\"type\": \"address\"\n}],\n\"name\"\
    : \"votes\",\n\"outputs\": [{\n\"name\": \"\",\n\"type\": \"uint256\"\n}],\n\"\
    payable\": false,\n\"stateMutability\": \"view\",\n\"type\": \"function\"\n},\n\
    {\n\"constant\": true,\n\"inputs\": [],\n\"name\": \"getPoll\",\n\"outputs\":\
    \ [{\n\"name\": \"\",\n\"type\": \"string\"\n}],\n\"payable\": false,\n\"stateMutability\"\
    : \"view\",\n\"type\": \"function\"\n},\n{\n\"anonymous\": false,\n\"inputs\"\
    : [{\n\"indexed\": false,\n\"name\": \"_voter\",\n\"type\": \"address\"\n},\n\
    {\n\"indexed\": false,\n\"name\": \"_value\",\n\"type\": \"uint256\"\n}\n],\n\"\
    name\": \"Voted\",\n\"type\": \"event\"\n},\n{\n\"constant\": false,\n\"inputs\"\
    : [{\n\"name\": \"selection\",\n\"type\": \"uint256\"\n}],\n\"name\": \"vote\"\
    ,\n\"outputs\": [],\n\"payable\": false,\n\"stateMutability\": \"nonpayable\"\
    ,\n\"type\": \"function\"\n}\n], '0x59E7161646C3436DFdF5eBE617B4A172974B481e');\n\
    pollingContract.methods.getPoll().call().then(function (value) {\ndocument.getElementById('pollSubject').textContent\
    \ = value;\n});\n};\nfunction submitVote() {\nvar value = 0\nvar yes = document.getElementById('yes').checked;\n\
    var no = document.getElementById('no').checked;\nif (yes) {\nvalue = 1\n} else\
    \ if (no) {\nvalue = 2\n} else {\nreturn;\n}\nvar pollingContract = new web3.eth.Contract([{\n\
    \"constant\": true,\n\"inputs\": [{\n\"name\": \"\",\n\"type\": \"address\"\n\
    }],\n\"name\": \"votes\",\n\"outputs\": [{\n\"name\": \"\",\n\"type\": \"uint256\"\
    \n}],\n\"payable\": false,\n\"stateMutability\": \"view\",\n\"type\": \"function\"\
    \n},\n{\n\"constant\": true,\n\"inputs\": [],\n\"name\": \"getPoll\",\n\"outputs\"\
    : [{\n\"name\": \"\",\n\"type\": \"string\"\n}],\n\"payable\": false,\n\"stateMutability\"\
    : \"view\",\n\"type\": \"function\"\n},\n{\n\"anonymous\": false,\n\"inputs\"\
    : [{\n\"indexed\": false,\n\"name\": \"_voter\",\n\"type\": \"address\"\n},\n\
    {\n\"indexed\": false,\n\"name\": \"_value\",\n\"type\": \"uint256\"\n}\n],\n\"\
    name\": \"Voted\",\n\"type\": \"event\"\n},\n{\n\"constant\": false,\n\"inputs\"\
    : [{\n\"name\": \"selection\",\n\"type\": \"uint256\"\n}],\n\"name\": \"vote\"\
    ,\n\"outputs\": [],\n\"payable\": false,\n\"stateMutability\": \"nonpayable\"\
    ,\n\"type\": \"function\"\n}\n], '0x59E7161646C3436DFdF5eBE617B4A172974B481e');\n\
    pollingContract.methods.vote(value).send({\nfrom: '0xbaf735f889d603f0ec6b1030c91d9033e60525c3'\n\
    }).then(function (result) {\nconsole.log(result);\n});\n};\n\n```\n\nLet’s now\
    \ analyze each of the sections of this HTML file.\n\nIn the head section of the\
    \ HTML document, we have loaded the `web3` script from either a CDN source or\
    \ a local source. This is just like we refer to any other third-party JavaScript\
    \ library in our web pages (JQuery, etc.)\n\nThen in the body section of the HTML,\
    \ we have the controls for showing the poll subject and radio and submit buttons\
    \ to capture user input. The overall web page looks like this (Figure [6-11](#A440588_1_En_6_Chapter.html#Fig11)).\n\
    \n![A440588_1_En_6_Fig11_HTML.jpg](A440588_1_En_6_Fig11_HTML.jpg)\n\nFigure 6-11\n\
    \nPolling web application view\n\nWhat is important is the script section in the\
    \ body. That’s where we are calling the smart contract interaction code. Let’s\
    \ look at it in detail.\n\n```\nif (typeof web3 !== 'undefined') {\nweb3 = new\
    \ Web3(web3.currentProvider);\n} else {\nweb3 = new Web3(new Web3.providers.HttpProvider('http://127.0.0.1:8507'));\n\
    }\nfunction getPoll() {\nvar pollingContract = new web3.eth.Contract([{\n\"constant\"\
    : true,\n\"inputs\": [{\n\"name\": \"\",\n\"type\": \"address\"\n}],\n\"name\"\
    : \"votes\",\n\"outputs\": [{\n\"name\": \"\",\n\"type\": \"uint256\"\n}],\n\"\
    payable\": false,\n\"stateMutability\": \"view\",\n\"type\": \"function\"\n},\n\
    {\n\"constant\": true,\n\"inputs\": [],\n\"name\": \"getPoll\",\n\"outputs\":\
    \ [{\n\"name\": \"\",\n\"type\": \"string\"\n}],\n\"payable\": false,\n\"stateMutability\"\
    : \"view\",\n\"type\": \"function\"\n},\n{\n\"anonymous\": false,\n\"inputs\"\
    : [{\n\"indexed\": false,\n\"name\": \"_voter\",\n\"type\": \"address\"\n},\n\
    {\n\"indexed\": false,\n\"name\": \"_value\",\n\"type\": \"uint256\"\n}\n],\n\"\
    name\": \"Voted\",\n\"type\": \"event\"\n},\n{\n\"constant\": false,\n\"inputs\"\
    : [{\n\"name\": \"selection\",\n\"type\": \"uint256\"\n}],\n\"name\": \"vote\"\
    ,\n\"outputs\": [],\n\"payable\": false,\n\"stateMutability\": \"nonpayable\"\
    ,\n\"type\": \"function\"\n}\n], '0x59E7161646C3436DFdF5eBE617B4A172974B481e');\n\
    pollingContract.methods.getPoll().call().then(function (value) {\ndocument.getElementById('pollSubject').textContent\
    \ = value;\n});\n};\nfunction submitVote() {\nvar value = 0\nvar yes = document.getElementById('yes').checked;\n\
    var no = document.getElementById('no').checked;\nif (yes) {\nvalue = 1\n} else\
    \ if (no) {\nvalue = 2\n} else {\nreturn;\n}\nvar pollingContract = new web3.eth.Contract([{\n\
    \"constant\": true,\n\"inputs\": [{\n\"name\": \"\",\n\"type\": \"address\"\n\
    }],\n\"name\": \"votes\",\n\"outputs\": [{\n\"name\": \"\",\n\"type\": \"uint256\"\
    \n}],\n\"payable\": false,\n\"stateMutability\": \"view\",\n\"type\": \"function\"\
    \n},\n{\n\"constant\": true,\n\"inputs\": [],\n\"name\": \"getPoll\",\n\"outputs\"\
    : [{\n\"name\": \"\",\n\"type\": \"string\"\n}],\n\"payable\": false,\n\"stateMutability\"\
    : \"view\",\n\"type\": \"function\"\n},\n{\n\"anonymous\": false,\n\"inputs\"\
    : [{\n\"indexed\": false,\n\"name\": \"_voter\",\n\"type\": \"address\"\n},\n\
    {\n\"indexed\": false,\n\"name\": \"_value\",\n\"type\": \"uint256\"\n}\n],\n\"\
    name\": \"Voted\",\n\"type\": \"event\"\n},\n{\n\"constant\": false,\n\"inputs\"\
    : [{\n\"name\": \"selection\",\n\"type\": \"uint256\"\n}],\n\"name\": \"vote\"\
    ,\n\"outputs\": [],\n\"payable\": false,\n\"stateMutability\": \"nonpayable\"\
    ,\n\"type\": \"function\"\n}\n], '0x59E7161646C3436DFdF5eBE617B4A172974B481e');\n\
    pollingContract.methods.vote(value).send({\nfrom: '0xbaf735f889d603f0ec6b1030c91d9033e60525c3'\n\
    }).then(function (result) {\nconsole.log(result);\n});\n};\n\n```\n\nIn the previous\
    \ script section, first we are initializing the `web3` object with the HTTP provider\
    \ of the local Ethereum node (if it is not already initialized).\n\nThen, we have\
    \ two JavaScript functions. One for getting the value of the `pollSubject` string\
    \ from the smart contract and another for calling the `vote` function of the contract.\n\
    \nThe calling of smart contract functions is exactly how we did it in the previous\
    \ chapter using the `web3.eth.Contract` submodule of the `web3` library.\n\nNote\
    \ that in the first function `getPoll` we are calling the `call` function on the\
    \ smart contract instance, while in the second function `submitVote` we are calling\
    \ `send` on the smart contract instance. That’s primarily the difference in the\
    \ two function calls.\n\nUsing the `call` on the `getPoll` function of the smart\
    \ contract, we are getting the return value of the `getPoll` function without\
    \ sending any transaction to the network. We are then showing this value on the\
    \ UI by assigning it as the text of a UI element.\n\nNext, using `send` on the\
    \ `vote` function, we are sending a transaction to execute this function on the\
    \ network and so we have to also define an account that will be used to execute\
    \ the smart contract function. Following is the output obtained from the `submitVote`\
    \ function shown previously, which is basically a transaction receipt."
