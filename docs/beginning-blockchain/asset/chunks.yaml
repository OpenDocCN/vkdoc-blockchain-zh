- fmt: '# Code Examples of Asymmetric Key Cryptography


    Following are some code examples of different public key algorithms. This section
    is just intended to give you a heads-up on how to use different algorithms programmatically.
    Code examples are in Python but would be quite similar in different languages;
    you just have to find the right library functions to use.


    ```

    # -*- coding: utf-8 -*-

    import Crypto

    from Crypto.PublicKey import RSA

    from Crypto import Random

    from hashlib import sha256

    # Function to generate keys with default length 1024

    def generate_key(KEY_LENGTH=1024):

    random_value= Random.new().read

    keyPair=RSA.generate(KEY_LENGTH,random_value)

    return keyPair

    #Generate Key for ALICE and BOB

    bobKey=generate_key()

    aliceKey=generate_key()

    #Print Public Key of Alice and Bob. This key could shared

    alicePK=aliceKey.publickey()

    bobPK=bobKey.publickey()

    print "Alice''s Public Key:", alicePK

    print "Bob''s Public Key:", bobPK

    #Alice wants to send a secret message to Bob. Lets create a dummy message for
    Alice

    secret_message="Alice''s secret message to Bob"

    print "Message",  secret_message

    # Function to generate a signature

    def generate_signature(key,message):

    message_hash=sha256(message).digest()

    signature=key.sign(message_hash,'''')

    return signature

    # Lets generate a signature for secret message

    alice_sign=generate_signature(aliceKey,secret_message)

    # Before sending message in network, encrypt message using the Bob''s public key...

    encrypted_for_bob  = bobPK.encrypt(secret_message, 32)

    # Bob decrypts secret message using his own private key...

    decrypted_message   = bobKey.decrypt(encrypted_for_bob)

    print "Decrypted message:", decrypted_message

    # Bob will use the following function to verify the signature from Alice using
    her public key

    def verify_signature(message,PublicKey,signature):

    message_hash=sha256(message).digest()

    verify = PublicKey.verify(message_hash,signature)

    return verify

    # bob is verifying using decrypted message and alice''s public key

    print "Is alice''s signature for decrypted message valid?", verify_signature(decrypted_message,alicePK,
    alice_sign)

    ```


    ## The ECDSA Algorithm


    ```

    import ecdsa

    # SECP256k1 is the Bitcoin elliptic curve

    signingKey = ecdsa.SigningKey.generate(curve=ecdsa.SECP256k1)

    # Get the verifying key

    verifyingKey = signingKey.get_verifying_key()

    # Generate The signature of a message

    signature = signingKey.sign(b"signed message")

    # Verify the signature is valid or invalid for a message

    verifyingKey.verify(signature, b"signed message") # True. Signature is valid

    # Verify the signature is valid or invalid for a message

    assert verifyingKey.verify(signature, b"message") # Throws an error. Signature
    is invalid for message

    ```


    ## Diffie-Hellman Key Exchange


    We already looked at symmetric key cryptography in the previous sections. Recollect
    that sharing the secret between the sender and the receiver is a very big challenge.
    As a rule of thumb, we are now aware that the communication channel is always
    insecure. There could always be an Eve trying to intercept your message while
    it is being transmitted by using various different kinds of attacks. So, the technique
    of DH was developed for securely exchanging the cryptographic keys. Obviously,
    you must be wondering how secure key exchange is possible when the communication
    channel itself is insecure. Well, later in this section you will see that the
    DH technique is not really sharing the entire secret key between two parties,
    rather it is about creating the key together. At the end of the day, what is important
    is that the sender and the receiver both have the same key. However, keep in mind
    that it is not asymmetric key cryptography, as encryption/decryption does not
    take place during the exchange. In fact, it was the base upon which asymmetric
    key cryptography was later designed. The reason we are looking at this technique
    now is because a lot of math that we already studied in the previous section is
    useful here.


    Let us first try to understand the concept at a high level before getting into
    the mathematical explanation. Take a look at the following (Figure [2-16](#A440588_1_En_2_Chapter.html#Fig16)),
    where a simple explanation of DH algorithm is presented with colors.


    ![A440588_1_En_2_Fig16_HTML.jpg](A440588_1_En_2_Fig16_HTML.jpg)


    Figure 2-16


    Diffie-Hellman key exchange illustration


    Notice that only the yellow color was shared between the two parties in the first
    step, which may represent any other color or a random number. Both parties then
    add their own secret to it and make a mixture. That mixture is again shared through
    the same insecure channel. Respective parties then add their secret to it and
    form their final common secret. In this example with colors, observe that the
    common secrets are the combination of same sets of colors. Let us now look at
    the actual mathematical steps that take place for the generation of keys:


    * Alice and Bob agree on `P = 23` and `G = 9`

    * Alice chooses private key `a = 4`, computes `9⁴ mod 23 = 6` and sends it to
    Bob

    * Bob chooses private key `b = 3`, computes `9³ mod 23 = 16` and sends it to Alice

    * Alice computes `16⁴ mod 23 = 9`

    * Bob computes `6³ mod 23 = 9`


    If you follow through these steps, you will find that both Alice and Bob are able
    to generate the same secret key at their ends that can be used for encryption/decryption.
    We used small numbers in this example for easy understanding, but large prime
    numbers are used in real-world use cases. To understand it better, let us go through
    the following code snippet and see how DH algorithm can be implemented in a simple
    way:


    ```

    /* Program to calculate the Keys for two parties using Diffie-Hellman Key exchange
    algorithm */

    // function to return value of a ^ b mod P

    long long int power(long long int a, long long int b, long long int P)

    {

    if (b == 1)

    return a;

    else

    return (((long long int)pow(a, b)) % P);

    }

    //Main program for DH Key computation

    int main()

    {

    long long int P, G, x, a, y, b, ka, kb;

    // Both the parties agree upon the public keys G and P

    P = 23; // A prime number P is taken

    printf("The value of P : %lld\n", P);

    G = 9; // A primitve root for P, G is taken

    printf("The value of G : %lld\n\n", G);

    // Alice will choose the private key a

    a = 4; // a is the chosen private key

    printf("The private key a for Alice : %lld\n", a);

    x = power(G, a, P); // gets the generated key

    // Bob will choose the private key b

    b = 3; // b is the chosen private key

    printf("The private key b for Bob : %lld\n\n", b);

    y = power(G, b, P); // gets the generated key

    // Generating the secret key after the exchange of keys

    ka = power(y, a, P); // Secret key for Alice

    kb = power(x, b, P); // Secret key for Bob

    printf("Secret key for the Alice is : %lld\n", ka);

    printf("Secret Key for the Bob is : %lld\n", kb);

    return 0;

    }

    ```


    > **Note:** While the discrete logarithm problem is traditionally used (the `x^y
    mod p`), the general process can be modified to use elliptic curve cryptography
    as well.'
