    in outputs, and the difference is the transaction fee offered to the miners to
    include this transaction when they mine the next block.


    In this transaction, we have 2,000 satoshis as the transaction fee, which is the
    difference between input amount (99992000) and the output amount (99990000). Note
    that we don’t have to create any outputs for the transaction fee; the difference
    between the input and output total amounts is automatically taken as the transaction
    fee.


    Also, note that we cannot spend partial unspent outputs. If an unspent output
    has x amount of Bitcoins associated with it then we must spend all of the x Bitcoins
    when adding this unspent output as an input in a transaction. So, in case Bob
    doesn’t want to give all the 99,990,000 satoshis associated with his unspent output
    to Alice, then we need to give it back to Bob by adding another output to the
    transaction with an amount equal to the difference of total unspent amount and
    the amount Bob wants to give to Alice.


    ### Sign Transaction Inputs


    Now, that we have defined the inputs and outputs in the transaction, we need to
    sign the inputs using Bob’s keys. The following line of code calls the `sign`
    function on the transaction builder object to cryptographically sign the transaction
    using Bob’s private key, but it takes the whole key pair object as an input parameter.


    ```

    transaction.sign(0, bobKeys);

    ```


    Note that the `transaction.sign` function takes the index of the input and the
    full key pair as input parameters. In this transaction, because we have only one
    input, the index we have passed is 0.


    At this stage, our transaction is prepared and signed.


    ### Create Transaction Hex


    Now we will create a hex string from the transaction object.


    ```

    var transactionHex = transaction.build().toHex();

    ```


    The output of this line of code is the following string, which represents our
    prepared transaction; this step is needed because the send transaction API accepts
    the raw transaction as a string.


    ### Broadcast Transaction to the Network


    Finally, we use the hex string value we generated in the last step and send it
    to the block explorer public testnet node using the API,


    ```

    var txPushUrl = blockExplorerTestnetApiEndpoint + ''tx/send'';

    request.post({

    url: txPushUrl,

    json: {

    rawtx: transactionHex

    }

    }, function (err, res, body) {

    if (err) console.log(err);

    console.log(res);

    console.log(body);

    });

    ```


    If the transaction is accepted by the block explorer public node, we will receive
    a transaction ID as the response of this API call,


    ```

    {

    txid: "db2e5966c5139c6e937203d567403867643482bbd9a6624752bbc583ca259958"

    }

    ```


    Now that we have the transaction ID of our transaction, we can look it up on any
    of the online testnet explorers to see if and when it gets mined and how many
    confirmations it has.


    Putting it all together, here’s the complete code for sending a Bitcoin testnet
    transaction using JavaScript. The input parameters are the Bitcoin testnet keypairs
    we created in step 1.


    ```

    var createTransaction = function (aliceKeys, bobKeys) {

    getOutputs(bobKeys.getAddress()).then(function (res) {

    var utxo = JSON.parse(res.toString());

    var transaction = new btc.TransactionBuilder(network);

    transaction.addInput(utxo[0].txid, utxo[0].vout);

    transaction.addOutput(alicekeys.getAddress(), 99990000);

    transaction.sign(0, bobKeys);

    var transactionHex = transaction.build().toHex();

    var txPushUrl = blockExplorerTestnetApiEndpoint + ''tx/send'';

    request.post({

    url: txPushUrl,

    json: {

    rawtx: transactionHex

    }

    }, function (err, res, body) {

    if (err) console.log(err);

    console.log(res);

    console.log(body);

    });

    });

    };

    ```


    In this section we learned how we can programmatically send a transaction to the
    Bitcoin test network. Similarly, we can send transactions to the Bitcoin main
    network by using the main network as the target in the library functions and in
    the API endpoints. We also used the query APIs to get unspent outputs of a Bitcoin
    address. These functions can be used to create a simple Bitcoin wallet application
    to query and manage Bitcoin addresses and transactions.'
  trans: '

    ### 准备比特币交易


    下一步是准备一笔比特币交易，通过该交易，鲍勃可以将测试币发送给爱丽丝。准备交易主要是定义其输入、输出和金额。


    根据上一步骤，我们知道鲍勃在其比特币测试网地址下有两个未花费的输出，现在让我们使用输出数组的第一个元素。将其添加为交易的输入。


    ```

    var utxo = JSON.parse(body.toString());

    var transaction = new btc.TransactionBuilder(network);

    transaction.addInput(utxo[0].txid, utxo[0].vout);

    ```


    在上述代码片段中，我们首先解析了来自上一个 API 调用的响应，以获取鲍勃的未花费输出。然后，我们使用`bitcoinjs`库为比特币测试网络创建了一个交易构建器对象。在最后一行，我们定义了一个交易输入。请注意，此输入引用了`utxo`数组中索引为
    0 的元素，该元素来自上一步的 API 调用。我们将未花费输出中的交易 ID（`txid`）和`vout`作为输入参数传递给了`transaction.addInput`方法。


    本质上，我们正在定义我们要花费什么以及从何处获得它。


    接下来，我们添加交易输出。这是指定我们打算如何花费输入中添加内容的地方。在下面一行中，我们通过调用交易构建器对象上的`addOutput`方法，并传入目标地址和金额，添加了一个交易输出。鲍勃想向爱丽丝发送
    99,990,000 聪。请注意，我们使用了爱丽丝的比特币测试网地址作为该函数的第一个参数。


    ```

    transaction.addOutput(alicePublic, 99990000);

    ```


    虽然在此示例交易中我们只使用了一个输入和一个输出，但一笔交易可以有多个输入和输出。需要特别注意的一点是，输入的总金额不应少于输出的总金额。大多数情况下，输入的金额会略高于输出的金额，差额即为支付给矿工的交易费用，以激励他们在挖掘下一个区块时将此交易包含在内。


    在此交易中，我们有 2,000 聪作为交易费用，这是输入金额（99,992,000）与输出金额（99,999,000）之间的差额。请注意，我们无需为交易费用创建任何输出；输入与输出总金额之间的差额会自动被视为交易费用。


    同时注意，我们无法部分花费未花费的输出。如果一个未花费输出关联了 x 数量的比特币，那么当将此未花费输出作为输入添加到交易中时，我们必须花费全部 x 个比特币。因此，如果鲍勃不想将他的未花费输出所关联的全部
    99,990,000 聪都转给爱丽丝，那么我们需要通过向交易添加另一个输出，其金额等于未花费总金额与鲍勃想给爱丽丝的金额之间的差额，从而将剩余部分返还给鲍勃。


    ### 签署交易输入


    现在，我们已经在交易中定义了输入和输出，需要使用鲍勃的密钥来签署这些输入。下面这行代码调用交易构建器对象上的`sign`函数，使用鲍勃的私钥对交易进行加密签名，但它将整个密钥对对象作为输入参数。


    ```

    transaction.sign(0, bobKeys);

    ```


    请注意，`transaction.sign`函数将输入的索引和完整的密钥对作为输入参数。在此交易中，因为我们只有一个输入，所以传递的索引是 0。


    至此，我们的交易已经准备就绪并已签署。


    ### 创建交易十六进制字符串


    现在，我们将从交易对象创建一个十六进制字符串。


    ```

    var transactionHex = transaction.build().toHex();

    ```


    这行代码的输出是以下字符串，它代表了我们准备好的交易；此步骤是必需的，因为发送交易 API 接受原始交易作为字符串。


    ### 将交易广播到网络


    最后，我们使用上一步生成的十六进制字符串值，通过 API 将其发送到区块浏览器的公共测试网节点。


    ```

    var txPushUrl = blockExplorerTestnetApiEndpoint + ''tx/send'';

    request.post({

    url: txPushUrl,

    json: {

    rawtx: transactionHex

    }

    }, function (err, res, body) {

    if (err) console.log(err);

    console.log(res);

    console.log(body);

    });

    ```


    如果交易被区块浏览器公共节点接受，我们将收到一个交易 ID 作为此 API 调用的响应。


    ```

    {

    txid: "db2e5966c5139c6e937203d567403867643482bbd9a6624752bbc583ca259958"

    }

    ```


    现在我们有了自己交易的交易 ID，就可以在任何在线测试网浏览器上查询它，查看它是否（以及何时）被挖出，以及它有多少个确认数。


    综合起来，以下是使用 JavaScript 发送比特币测试网交易的完整代码。输入参数是我们在步骤 1 中创建的比特币测试网密钥对。


    ```

    var createTransaction = function (aliceKeys, bobKeys) {

    getOutputs(bobKeys.getAddress()).then(function (res) {

    var utxo = JSON.parse(res.toString());

    var transaction = new btc.TransactionBuilder(network);

    transaction.addInput(utxo[0].txid, utxo[0].vout);

    transaction.addOutput(alicekeys.getAddress(), 99990000);

    transaction.sign(0, bobKeys);

    var transactionHex = transaction.build().toHex();

    var txPushUrl = blockExplorerTestnetApiEndpoint + ''tx/send'';

    request.post({

    url: txPushUrl,

    json: {

    rawtx: transactionHex

    }

    }, function (err, res, body) {

    if (err) console.log(err);

    console.log(res);

    console.log(body);

    });

    });

    };

    ```


    在本节中，我们学习了如何以编程方式向比特币测试网络发送交易。类似地，我们可以通过在库函数和 API 端点中将主网络设为目标来向比特币主网络发送交易。我们还使用了查询
    API 来获取比特币地址的未花费输出。这些功能可用于创建一个简单的比特币钱包应用程序，以查询和管理比特币地址和交易。

