    that can help us understand how it really works. After going through them, namely
    cryptography, game theory, and computer science engineering concepts, we must
    have developed a notion of how blockchains might work. Though these concepts have
    been around for ages, no one could ever imagine how the same old stuff can be
    used to build a transforming technology such as blockchain. Let us have a quick
    recap of some fundamentals we covered so far, and we will build further understanding
    on those concepts. So here they are:


    *   Cryptographic functions are one-way and cannot be inverted. They are deterministic
    and produce the same output for a given input. Any changes to the input would
    produce a completely different output when hashed again.

    *   Using public key cryptography, digital signatures are possible. It helps in
    verifying the authenticity of the person/entity that has signed. Considering the
    private key is kept confidential, it is not feasible to forge a signature with
    someone else’s identity. Also, if someone has signed on any document or a transaction,
    they cannot later deny they did not.

    *   Using game theoretic principles and best practices, robust systems can be
    designed that can sustain in most of the odd situations. Systems that can face
    the Byzantine Generals’ Problem need to be handled properly. Our approach to any
    system design should be such that the participants play by the rules to get the
    maximum payoff; deviating from the protocol should not really benefit them.

    *   The blockchain data structure, by using the cryptographic hashes, provides
    a tamper resistant chain of blocks. The usage of Merkle trees makes the transaction
    verification easier and faster.


    With all these concepts in mind, let us now think of a real blockchain implementation.
    What problems can you think of that need to be addressed for such a decentralized
    system to work properly? Well, there are loads of them; some would be generic
    to most of the blockchain use cases and some would be specific to a few. Let us
    discuss at least some of the scenarios that need to be addressed:


    *   Who would maintain the distributed ledger of transactions? Should all the
    participants maintain, or only a few would do? How about the computing nodes that
    are not powerful enough to process transactions or do not have enough storage
    space to accommodate the entire history of transactions?

    *   How is it possible to maintain a single consistent state of the distributed
    ledger? Network latency, packet drops, deliberate hacking attempts, etc. are inevitable.
    How would the system survive all these?

    *   Who would validate or invalidate the transactions? Would only a few authorized
    nodes validate, or all the nodes together would reach a consensus? What if some
    of the nodes are not available at a given time?

    *   What if some computing nodes deliberately want to subvert the system or try
    to reject some of the transactions?

    *   How would you upgrade the system when there is no centralized entity to take
    the responsibility? In a decentralized network, what if a few computing nodes
    upgrade themselves and the rest don’t?


    There are in fact a lot more concerns that need to be addressed apart from the
    ones just mentioned. For now we will leave you with those thoughts, but most of
    those queries should be clarified by the end of this chapter.


    Let us start with some basic building blocks of a blockchain system that may be
    required to design any decentralized solution.


    ### Properties of Blockchain Solutions


    So far, we have only learned the technical aspects of blockchain solutions to
    understand how blockchains might work. In this section, we will learn some of
    the desired properties of blockchains.


    #### Immutability


    It is the most desired property to maintain the atomicity of the blockchain transactions.
    Once a transaction is recorded, it cannot be altered. If the transactions are
    broadcast to the network, then almost everyone has a copy of it. With time, when
    more and more blocks are added to the blockchain, the immutability increases and
    after a certain time, it becomes completely immutable. For someone to alter the
    data of so many blocks in a series is not practically feasible because they are
    cryptographically secured. So, any transaction that gets logged remains forever
    in the system.'
