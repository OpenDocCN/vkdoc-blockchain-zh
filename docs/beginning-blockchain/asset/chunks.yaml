    ### 区块结构


    比特币区块链的区块结构对所有区块都是固定的，并包含特定的字段及其对应的必需数据。请查看图 3-5（区块结构的鸟瞰图），稍后我们将在本章中进一步了解各个字段。


    ![A440588_1_En_3_Fig5_HTML.jpg](img/A440588_1_En_3_Fig5_HTML.jpg)


    图 3-5


    比特币区块链的区块结构


    典型的区块结构如表 3-1 所示。


    表 3-1


    区块结构


    | 字段 | 大小 | 描述 |

    | --- | --- | --- |

    | 魔数 | 4 字节 | 固定值为 `0xD9B4BEF9`，表示区块的起始，并表明该区块来自主网或生产网络。 |

    | 区块大小 | 4 字节 | 表示区块的大小。最初的比特币区块大小为 1MB，而名为“比特币现金”的较新版本区块大小为 2MB。 |

    | 区块头 | 80 字节 | 包含大量信息，例如前一个区块的哈希值、随机数、默克尔根等。 |

    | 交易计数器 | 1–9 字节（可变长度） | 表示区块中包含的交易总数。并非每笔交易的大小都相同，每个区块中的交易数量也是可变的。 |

    | 交易列表 | 数量可变但大小固定 | 列出给定区块中发生的所有交易。根据区块大小（1MB 或 2MB），该字段占据区块中的剩余空间。 |


    现在，让我们聚焦（表 3-2）区块中的“区块头”部分，了解它所维护的各种不同字段。


    表 3-2


    区块头组成


    | 字段 | 大小 | 描述 |

    | --- | --- | --- |

    | 版本号 | 4 字节 | 表示比特币协议的版本号。理想情况下，运行比特币协议的每个节点都应具有相同的版本号。 |

    | 前一个区块哈希值 | 32 字节 | 包含链中前一个区块头的哈希值。当前一个区块头中的所有字段合并并使用 `SHA256` 算法进行哈希处理后，会产生一个
    256 位（即 32 字节）的结果。 |

    | 默克尔根 | 32 字节 | 区块中交易的哈希值按设计构成一棵默克尔树，默克尔根就是这棵默克尔树的根哈希值。如果区块中的一笔交易被修改，那么计算出的结果将与默克尔根不匹配。这种方式确保了仅保存前一个区块头的哈希值就足以维护安全的区块链。此外，默克尔树有助于在
    `O(n)` 时间内判断一笔交易是否属于某个区块，并且速度相当快！ |

    | 时间戳 | 4 字节 | 比特币网络中不存在全局时间概念。因此，该字段以 Unix 时间格式表示区块创建的近似时间。 |

    | 难度目标 | 4 字节 | 该区块被挖出时为其设定的工作量证明（PoW）难度级别。 |

    | 随机数 | 4 字节 | 挖矿过程中满足工作量证明（PoW）难题的随机数。 |


    前面表格中展示的区块字段及其相应解释足以让我们入门，我们还将进一步探究少数几个需要更详细解释的字段。


    ### 默克尔树


    我们在前一章已经介绍了默克尔树的概念。在本节中，我们将仅探讨比特币如何使用默克尔树。比特币区块链中的每个区块都包含所有交易的哈希值，而这些交易的默克尔根则包含在该区块的区块头中。从真正意义上讲，当我们说每个区块头包含整个前一个区块的哈希值时，其信任基础在于它仅包含前一个区块头的哈希值。尽管如此，这已经足够了，因为区块头已经包含了默克尔根。如果区块中的一笔交易被篡改，默克尔根将不再匹配，这种设计仍然保持了区块链的完整性。


    默克尔树是一种交易哈希值的树形数据结构。默克尔树中的“叶节点”实际上代表交易的哈希值，而树的根就是默克尔根。请参考图 3-6。


    ![A440588_1_En_3_Fig6_HTML.jpg](img/A440588_1_En_3_Fig6_HTML.jpg)


    图 3-6


    默克尔树表示


    请注意，七笔交易 A、B、C、D、E、F 和 G 的哈希值构成了树的叶节点。由于有七笔交易，但在二叉树中总叶节点数应为偶数，因此最后一个叶节点被重复。每个
    32 字节（即 256 位）的交易哈希值是通过对交易应用两次 `SHA256` 计算得出的。类似地，两个交易的哈希值连接起来（62 字节），然后使用 `SHA256`
    进行两次哈希运算，得到 32 字节的父哈希值。


    只需交易对应的默克尔路径就足以验证该交易是否属于某个区块，因此效率相当高。因此，实际的区块链可以如图 3-7 所示。


    ![A440588_1_En_3_Fig7_HTML.jpg](img/A440588_1_En_3_Fig7_HTML.jpg)


    图 3-7


    默克尔树表示

