    are generated by a competitive and decentralized process called “mining,” and
    they are generated at a fixed rate with an upper cap of 21 million Bitcoins in
    total that can ever exist, this makes Bitcoin a scarce resource. Now relating
    this context back to the game of “supply and demand,” the value of Bitcoin started
    inflating. Slowly, when the entire globe started believing in it, its price even
    skyrocketed from a few USDs to thousands of USDs. Bitcoin adoption among the users,
    merchants, start-ups, big businesses, and many others is growing like never before
    because they are being used in the form of money. So, the value of Bitcoin is
    highly influenced by “trust,” “adoption,” and “supply and demand” and its price
    is set by the market.


    Now, the question is why the value of Bitcoin is so volatile as of this writing
    and fluctuates quite a lot. One obvious reason is supply and demand. We learned
    that there can only be a limited number of Bitcoins in circulation, which is 21
    million, and the rate at which they get generated is decreeasing with time. Because
    of this design, there is always a gap in supply and demand, which results in this
    volatility. Another reason is that Bitcoins are never traded in one place. There
    are so many exchanges in so many places across the globe, and all those exchanges
    have their own exchange prices. The indexes that you see gather Bitcoin exchange
    prices from several exchanges and then average them out. Again, since all these
    indexes do not collect data from the same set of exchanges, even they do not match.
    Similarly, the liquidity factor that implies the amount of Bitcoins flowing through
    the entire market at any given time also influences the volatility in Bitcoin
    price. As of now, it is definitely a high-risk asset but may get stabilized with
    time. Let us take a look at the following list of factors that may influence the
    supply and demand of Bitcoins, and hence their price:


    *   Confidence of people in Bitcoin and fear of uncertainty

    *   Press coverage with good and bad news on Bitcoin

    *   Some people own Bitcoins and do not allow them to flow through the market
    and some people keep buying and selling to minimize risk. This is why the liquidity
    level of Bitcoin keeps on changing.

    *   Acceptance of Bitcoins by big ecommerce giants

    *   Banning of Bitcoins in specific countries


    If you are now wondering if there is any possibility of Bitcoin to crash completely,
    then the answer is “Yes.” There are many examples of countries whose currency
    systems have crashed. Well, there were political and economic reasons for them
    to crash such as hyperinflation, which is not the case with Bitcoins because one
    cannot generate as many Bitcoins as they want and the total number of Bitcoins
    is fixed. However, there is a possibility of technical or cryptographic failure
    of Bitcoins. Please note that Bitcoin has stood the test of time since its inception
    in 2008 and there is a possibility that it will grow much bigger with time, but
    it cannot be guaranteed!'
  trans: '

    ### 什么是比特币？


    区块链提供了一种加密货币：数字货币！正如我们可以在没有银行或其他中心化实体的情况下使用实体货币进行交易一样，比特币旨在促进无需可信中介的点对点货币交易。我们先来看看它是什么，然后在后续章节中再了解它的实际运作原理。比特币是一种去中心化的加密货币，不受任何国家限制，是一种全球性货币。它在技术、逻辑以及政治等各个方面都是去中心化的。当交易被验证时，新的比特币就会被挖出，并且最多只能产生
    2100 万个比特币。大约要到 2140 年才能达到 2100 万个比特币的产量。任何拥有强大算力的人都可以参与挖矿并生成新的比特币。在所有比特币都被生成之后，就无法再铸造新的货币，只有流通中的比特币会被使用。请注意，比特币不像国家法定货币那样有固定的面额。根据设计，比特币可以具有任意价值，精度可达小数点后八位。因此，比特币的最小单位是
    `0.00000001 BTC`，称为 `1 Satoshi`。


    矿工通过挖矿交易来铸造新币，并赚取交易发起者愿意支付的交易手续费。当比特币总数达到 2100 万时，矿工将仅为了交易手续费而验证交易。如果有人试图发起一笔没有交易手续费的交易，它仍然可能被挖出，因为只要这是一笔有效的交易，并且矿工更关注能让他生成新币的挖矿奖励。


    你是否好奇是什么决定了比特币的价值？当货币以黄金为支撑时，它具有重大意义，并且很容易根据金本位来评估其价值。当我们说比特币以人们用于挖矿的算力为支撑时，这还不足以理解它是如何获得价值的。这里需要一点经济学知识来理解。


    当法定货币首次推出时，它是以黄金为支撑的。由于人们相信黄金，因此他们也相信法定货币。几十年后，货币不再以黄金为支撑，完全依赖于各国政府。人们继续相信它，是因为他们自己组建或参与组建了他们自己的政府。由于政府确保其价值，人们信任它，所以它获得了这种价值。在国际环境中，特定国家货币的价值取决于多种因素，其中最重要的是“供求关系”。请记住，一些大量印刷法定纸币的国家已经破产了；它们的经济崩溃了！必须保持平衡，而要理解这一点，需要更多的经济学知识，这超出了本书的范围。所以，我们现在还是回到比特币上来。


    当比特币首次推出时，它并没有一个人们会相信的官方价格或价值。如果有人想用一些美元来出售它，我起初是绝对不会买的。渐渐地，随着交易的开始，它产生了价格，当时一个比特币甚至不值一美元。由于比特币是通过一个称为“挖矿”的竞争性、去中心化过程产生的，并且以固定的速率生成，总量上限为
    2100 万个，这使得比特币成为一种稀缺资源。现在将这个背景联系回“供求关系”的游戏，比特币的价值开始膨胀。慢慢地，当全球开始相信它时，其价格甚至从几美元飙升至数千美元。比特币在用户、商家、初创公司、大型企业以及其他群体中的采用率正以前所未有的速度增长，因为它们被当作货币形式使用。因此，比特币的价值深受“信任”、“采用率”和“供求关系”的影响，其价格由市场决定。


    那么，问题来了，为什么比特币的价值在撰写本文时如此波动，且起伏很大？一个显而易见的原因是供求关系。我们知道，流通中的比特币数量是有限的，只有 2100 万个，并且它们的生成速度随着时间的推移而下降。由于这种设计，供求之间总是存在差距，从而导致这种波动性。另一个原因是比特币从未在单一地点交易。全球有如此多的交易所，所有这些交易所都有自己的交易价格。你所看到的指数是从多个交易所收集比特币交易价格然后取平均值得到的。同样，由于所有这些指数并非从同一组交易所收集数据，因此它们之间也不匹配。类似地，流动性因素（即任何给定时间在整个市场中流动的比特币数量）也会影响比特币价格的波动性。目前，这绝对是一种高风险资产，但随着时间的推移可能会趋于稳定。让我们来看看以下可能影响比特币供求关系，从而影响其价格的因素列表：


    *   人们对比特币的信心以及对不确定性的恐惧

    *   媒体对比特币正面和负面消息的报道

    *   一些人持有比特币但不允许其在市场流通，而另一些人则不断买卖以最小化风险。这就是比特币流动性水平不断变化的原因。

    *   大型电商巨头对比特币的接受程度

    *   特定国家对比特币的禁令


    如果你现在想知道比特币是否存在完全崩盘的可能性，那么答案是“有”。世界上有很多国家的货币体系崩溃的例子。嗯，它们崩溃有政治和经济原因，例如恶性通货膨胀，但比特币并非如此，因为人们无法随心所欲地生成任意多的比特币，而且比特币的总数是固定的。然而，比特币存在技术或密码学层面失败的可能性。请注意，自
    2008 年诞生以来，比特币已经经受住了时间的考验，并且它有可能随着时间的推移变得更大，但这无法保证！

    '
- fmt: '### Working with Bitcoins


    In order to get started with Bitcoins, no technicality is needed. You just have
    to download a Bitcoin wallet and get started with it. When you download and install
    a wallet on your laptop or mobile, it generates your first Bitcoin address (public
    key). You can generate many more, however, and you should. It is a best practice
    to use the Bitcoin addresses only once. Address reuse is an unintended practice
    in Bitcoin, though it works. Address reuse can harm privacy and confidentiality.
    As an example, if you are reusing the same address, signing a transaction with
    the same private key, the recipient can easily and reliably determine that the
    address being reused is yours. If the same address is used with multiple transactions,
    they can all be tracked and finding who you are gets even easier. Remember that
    Bitcoin is not fully anonymous; it is said to be pseudonymous and there are ways
    to trace the transaction origins that can reveal the owners.


    You have to disclose your Bitcoin address to the person willing to transfer Bitcoins
    to you. This is very safe because the public key is public anyway. We know that
    there is no notion of a closing balance in Bitcoin and all records are there as
    transactions. Bitcoin wallets can easily calculate their spendable balance, as
    they have the private keys of the corresponding public keys on which transactions
    are received. There are a variety of Bitcoin wallets available from so many wallet
    providers. There are mobile wallets, desktop wallets, browser-based web wallets,
    hardware wallets, etc., with varying levels of security. You need to be extremely
    careful in the wallet security aspect while working with Bitcoins. The Bitcoin
    payments are irreversible.


    You must be wondering how secured are these wallets. Well, different wallet types
    have different levels of security and it depends on how you want to use it. Many
    online wallet services suffered from security breaches. It is always a good practice
    to enable two-factor authentication whenever applicable. If you are a regular
    user of Bitcoins, it may be a good idea to use small amounts in your wallets and
    keep the remainder separately in a safe environment. An offline wallet or cold
    wallet that is not connected to the network provides the highest level of security
    for savings. Also, there should be proper backup mechanisms for your wallet in
    case you lose your computer/mobile. Remember that if you lose your private key,
    you lose all the money associated with it.


    If you have not joined Bitcoin as a miner running a full node, then you can just
    be a user or a trader of Bitcoins. You will definitely need an exchange from where
    you can buy some Bitcoins with your US dollars or other currencies as accepted
    by the exchanges. You should prefer buying Bitcoins from a legitimate and secured
    exchange. There have been many examples of exchanges that suffered from security
    breaches.


    ## The Bitcoin Blockchain


    We already looked at the basic blockchain data structure in the previous chapter
    and also covered the basic building blocks of a blockchain data structure such
    as hashing techniques and asymmetric cryptography. We will learn the specifics
    of Bitcoin blockchain in this section.


    The Bitcoin blockchain, like any other blockchain, has a similar blockchain data
    structure. The Bitcoin Core client uses the LevelDB database of Google to store
    the blockchain datastructure internally. Each block is identified by its hash
    (Bitcoin uses the SHA256 hashing algorithm). Every block contains the hash of
    the previous block in its header section. Remember that this hash is not just
    the hash of the previous header but the entire block including header, and it
    continues all the way to the genesis block. The genesis block is the beginning
    of any blockchain. Typically, a Bitcoin blockchain looks as shown in Figure [3-3](#A440588_1_En_3_Chapter.html#Fig3).


    ![A440588_1_En_3_Fig3_HTML.jpg](A440588_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    The Bitcoin blockchain


    As you can see in this blockchain, there is a block header part that contains
    the header information and there is a body part where the transactions are bundled
    in every block. Every block’s header contains the hash of the previous block.
    So, any change in any block in the chain will not be so easy; all the subsequent
    blocks have to be changed accordingly. Example: If someone tries to change a previous
    transaction that was captured in, say, block number 441, after changing the transaction,
    the hash of this block that is in the header of block number 442 will not match,
    so it has to be changed as well. Changing the header with the new hash will then
    require you to update the hash in the block header of the next block in the sequence,
    which is block number 443, and this will go on till the current block and this
    is tough work to do. It becomes almost impossible when we know that every node
    has its own copy and hacking into all the nodes, or at least 51% of them, is infeasible.


    In the blockchain, there is only one true path to the genesis block. However,
    if you start from the genesis block, then there can be forks. When two blocks
    are proposed at the same time and both of them are valid, only one of them would
    become a part of the true chain and the other gets orphaned. Every node builds
    on the longest chain, and whichever it hears first and whichever becomes the longest
    chain will be the one to build on. Such a scenario can be represented as shown
    in Figure [3-4](#A440588_1_En_3_Chapter.html#Fig4).


    ![A440588_1_En_3_Fig4_HTML.jpg](A440588_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Orphan blocks in true blockchain


    Observe in Figure [3-4](#A440588_1_En_3_Chapter.html#Fig4) that at block height-3,
    two blocks are proposed to become block-3, but only one of them could make it
    to the final blockchain and the rest got orphaned out. It is evident that at a
    certain block height, there is a possibility of one or more blocks because there
    can as well be some orphaned blocks at this height, so block height is not the
    best way to uniquely identify a block and block hash is the right way to do so.'
