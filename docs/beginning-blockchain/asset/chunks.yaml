    \ format.\n*   After the IP round, the 64-bit block gets divided into two 32-bit\
    \ blocks, a left block (L) and a right block (R). In every round, the blocks are\
    \ represented as L[i] and R[i], where the subscript “I” denotes the round. So,\
    \ the outcomes of IP round are denoted as L[0] and R[0].\n*   Now the Feistel\
    \ rounds start. The first round takes L[0] and R[0] as input and follows the following\
    \ steps:\n    *   The right side 32-bit block (R) comes as is to the left side\
    \ and the left side 32-bit block (L) goes through an operation with the key k\
    \ of that round and the right side 32-bit block (R) as shown following:\n    *\
    \   L[i] = R[i] −1\n    *   R[i] = L[i] −1 ⊕ F(R[i] −1, K[i]) where “I” is the\
    \ round number\n    *   The F() is called the “Cipher Function” that is actually\
    \ the core part of every round. There are multiple steps or operations that are\
    \ bundled together in this F() operation.\n    *   In the first step , operation\
    \ of the 32-bit R-block is expanded and permuted to output a 48-bit block.\n \
    \   *   In the second step, this 48-bit block is then XORed with the 48-bit subkey\
    \ supplied by the key generator of the same round.\n    *   In the third step,\
    \ this 48-bit XORed output is fed to the substitution box to reduce the bits back\
    \ to 32 bits. The substitution operation in this S-box is the only nonlinear operation\
    \ in DES and contributes significantly to the security of this algorithm.\n  \
    \  *   In the fourth step, the 32-bit output of the S-box is fed to the permutation\
    \ box (P-box), which is just a permutation operation that outputs a 32-bit block,\
    \ which is actually the final output of F() cipher function.\n    *   The output\
    \ of F() is then XORed with the 32-bit L-block, which is input to this round.\
    \ This XORed output then becomes the final R-block output of this round.\n   \
    \ *   Refer to Figure [2-5](#A440588_1_En_2_Chapter.html#Fig5) to understand the\
    \ various operations that take place in every round.\n\nWe looked at how the DES\
    \ algorithm really works. The decryption also works a similar way in the reverse\
    \ order. We will not get into those details, but leave it to you to explore.\n\
    \nLet us conclude with the limitations of the DES. The 56-bit key length was susceptible\
    \ to brute force attack and the S-boxes used for substitution in each round were\
    \ also prone to cryptanalysis attack because of some inherent weaknesses. Because\
    \ of these reasons, the Advanced Encryption Standard (AES) has replaced the DES\
    \ to the extent possible. Many applications now choose AES over DES."
  trans: "\n#### 数据加密标准\n\n数据加密标准（`DES`）是一种对称分组密码技术。它使用 64 位块大小和 64 位密钥进行加密和解密。在 64\
    \ 位密钥中，有 8 位保留用于奇偶校验，因此实际密钥长度为 56 位。事实证明，它容易受到暴力攻击，并且可以在不到一天的时间内被破解。根据摩尔定律，未来破解速度会快得多，因此由于其密钥长度，其使用已大量弃用。它曾非常流行，被用于银行应用、`ATM`以及其它商业应用中，并且更多用于硬件实现而非软件实现。本节我们将对`DES`加密进行一个高级描述。\n\
    \n在对称密码学中，大量分组密码采用一种称为“Feistel 密码”或“Feistel 网络”的设计方案。Feistel 密码由多轮处理组成，使用密钥对明文进行处理，每一轮都包含一个替换步骤，后跟一个置换步骤。轮数越多，安全性可能越高，但加密/解密速度会变慢。`DES`基于一个具有\
    \ 16 轮的 Feistel 密码。`DES`算法的一般步骤序列如图 2-4 所示。\n\n![A440588_1_En_2_Fig4_HTML.jpg](img/A440588_1_En_2_Fig4_HTML.jpg)\n\
    \n图 2-4\n\n`DES`密码学\n\n我们先讨论密钥生成器，然后再进入加密部分。\n\n- 如前所述，密钥也是 64 位长。由于有 8 位用作奇偶校验位（更准确地说，是第\
    \ 8、16、24、32、40、48、56 和 64 位），因此只有 56 位用于加密和解密。\n- 去除奇偶校验位后，56 位密钥被分成两个 28 位的块。然后在每一轮中，对它们进行按位左移。我们知道`DES`使用\
    \ 16 轮的 Feistel 网络。请注意，每一轮都接收上一轮左移后的位块，然后在当前轮中再次左移一位。\n- 接着，两个左移后的 28 位块通过一个压缩机制合并，输出一个\
    \ 48 位的密钥，称为子密钥，用于加密。类似地，在每一轮中，来自上一轮的两个 28 位块会再次左移一位，然后合并并压缩为 48 位密钥。该密钥随后被输入到同一轮的加密函数中。\n\
    \n现在我们来看`DES`如何使用 Feistel 密码轮进行加密：\n\n- 前面讨论的 Feistel 轮会重复 16 次，其中一轮的输出作为下一轮的输入。\n\
    - 当所有 16 轮结束后，第 16 轮的输出再次进行交换，使得左侧块变为右侧块，反之亦然。\n- 然后将这两个块合并成一个 64 位块，并通过一个置换操作，该操作是初始置换函数的逆操作，最终得到\
    \ 64 位的密文输出。\n\n![A440588_1_En_2_Fig5_HTML.jpg](img/A440588_1_En_2_Fig5_HTML.jpg)\n\
    \n图 2-5\n\n`DES`的轮函数\n\n- 首先，明文输入被分成 64 位的块。如果消息的位数不能被 64 整除，则最后一个块会被填充，使其成为 64\
    \ 位块。\n- 每个 64 位输入数据块都要经过一个初始置换（`IP`）轮。它只是置换，即通过转置输入块，按照特定模式重新排列所有 64 位输入。它本身没有密码学意义，其目标是使以字节大小的格式将明文/密文加载到`DES`芯片中变得更容易。\n\
    - 在`IP`轮之后，64 位块被分成两个 32 位块：左块（`L`）和右块（`R`）。在每一轮中，这些块被表示为`L[i]`和`R[i]`，其中下标“i”表示轮数。因此，`IP`轮的输出被记为`L[0]`和`R[0]`。\n\
    - 现在 Feistel 轮开始。第一轮以`L[0]`和`R[0]`作为输入，并遵循以下步骤：\n  - 右侧的 32 位块（`R`）原样传递到左侧，而左侧的\
    \ 32 位块（`L`）则与该轮的密钥`k`以及右侧的 32 位块（`R`）进行运算，如下所示：\n  - `L[i] = R[i] - 1`\n  - `R[i]\
    \ = L[i] - 1 XOR F(R[i] - 1, K[i])`，其中“i”是轮数\n  - `F()`被称为“密码函数”，实际上是每一轮的核心部分。这个`F()`函数中包含了多个步骤或操作。\n\
    \  - 第一步，32 位的`R`块经过扩展并置换，输出一个 48 位的块。\n  - 第二步，这个 48 位的块与同一轮密钥生成器提供的 48 位子密钥进行`XOR`运算。\n\
    \  - 第三步，这个 48 位的`XOR`结果被送入替换盒，以将位数缩减回 32 位。这个`S`盒中的替换操作是`DES`中唯一的非线性操作，对该算法的安全性贡献显著。\n\
    \  - 第四步，`S`盒的 32 位输出被送入置换盒（`P`盒），这只是一个置换操作，输出一个 32 位块，它实际上是`F()`密码函数的最终输出。\n\
    \  - 然后，`F()`的输出与输入到该轮的 32 位`L`块进行`XOR`运算。这个`XOR`结果随后成为该轮最终的`R`块输出。\n  - 请参考图\
    \ 2-5 来理解每一轮中发生的各种操作。\n\n我们了解了`DES`算法实际是如何工作的。解密也以类似的方式按相反顺序进行。我们不再深入这些细节，但留给您去探索。\n\
    \n最后总结一下`DES`的局限性。56 位密钥长度容易受到暴力攻击，并且每轮用于替换的`S`盒由于一些固有的弱点也容易受到密码分析攻击。由于这些原因，高级加密标准（`AES`）已在尽可能大的程度上取代了`DES`。现在许多应用都选择`AES`而非`DES`。\n"
- fmt: '# Advanced Encryption Standard


    Like DES, the AES algorithm is also a symmetric block cipher but is not based
    on a Feistel network. The AES uses a substitution-permutation network in a more
    general sense. It not only offers greater security, but also offers greater speed!
    As per the AES standards, the block size is fixed at 128 bits and allows a choice
    of three keys: 128 bits, 192 bits, and 256 bits. Depending on the choice of the
    key, AES is named as `AES-128`, `AES-192`, and `AES-256`.


    In AES, the number of encryption rounds depend on the key length. For `AES-128`,
    there are ten rounds; for `AES-192`, there are 12 rounds; and for `AES-256`, there
    are 14 rounds. In this section, our discussion is limited to key length 128 (i.e.,
    `AES-128`), as the process is almost the same for other variants of AES. The only
    thing that changes is the “key schedule,” which we will look into later in this
    section.


    Unlike DES, AES encryption rounds are iterative and operate an entire data block
    of 128 bits in every round. Also, unlike DES, the decryption is not very similar
    to the encryption process in AES.


    To understand the processing steps in every round, consider the 128-bit block
    as 16 bytes where individual bytes are arranged in a 4 × 4 matrix as shown:


    ![A440588_1_En_2_Figa_HTML.jpg](A440588_1_En_2_Figa_HTML.jpg)


    This 4 × 4 matrix of bytes as shown is referred to as state array. Please note
    that every round consumes an input state array and produces an output state array.


    The AES also uses another piece of jargon called “word” that needs to be defined
    before we go further. Whereas a byte consists of eight bits, a word consists of
    four bytes, that is, 32 bits. The four bytes in each column of the state array
    form 32-bit words and can be called state words. The state array can be shown
    as follows:


    ![A440588_1_En_2_Figb_HTML.jpg](A440588_1_En_2_Figb_HTML.jpg)


    Also, every byte can be represented with two hexadecimal numbers. Example: if
    the 8-bit byte is `{00111010}`, it could be represented as `3A` in Hex notation.
    `3` represents the left four bits `0011` and `A` represents the right four bits
    `1010`.


    Now to generalize each round, processing in each round happens at byte level and
    consists of byte-level substitution followed by word-level permutation, hence
    it is a substitution-permutation network. We will get to further details when
    we discuss the various operations in each round. The overall encryption and decryption
    process of AES can be represented in Figure [2-6](#A440588_1_En_2_Chapter.html#Fig6).


    ![A440588_1_En_2_Fig6_HTML.jpg](A440588_1_En_2_Fig6_HTML.jpg)


    **Figure 2-6** AES cryptography


    If you paid close attention to Figure [2-6](#A440588_1_En_2_Chapter.html#Fig6),
    you would have noticed that the decryption process is not just the opposite of
    encryption. The operations in the rounds are executed in a different order! All
    steps of the round function — `SubBytes`, `ShiftRows`, `MixColumns`, `AddRoundKey`
    — are invertible. Also, notice that the rounds are iterative in nature. Round
    1 through round 9 have all four operations, and the last round excludes only the
    `MixColumns` operation. Let us now build a high-level understanding of each operation
    that takes place in a round function.


    `SubBytes`: This is a substitution step. Here, each byte is represented as two
    hexadecimal digits. As an example, take a byte `{00111010}` represented with two
    hexadecimal digits, say `{3A}`. To find its substitution values, refer to the
    S-box lookup table (16 × 16 table) to find the corresponding value for 3-row and
    A-column. So, for `{3A}`, the corresponding substituted value would be `{80}`.
    This step provides the nonlinearity in the cipher.


    `ShiftRows`: This is the transformation step and is based upon the matrix representation
    of the state array. It consists of the following shift operations:


    - No circular shifting of the first row, and remains as is

    - Circularly shifting of the second row by one byte to the left

    - Circularly shifting of the third row by two bytes to the left

    - Circularly shifting of the fourth row (last row) by three bytes to the left


    It can be represented as shown:


    ![A440588_1_En_2_Figc_HTML.jpg](A440588_1_En_2_Figc_HTML.jpg)


    `MixColumns`: It is also a transformation step where all the four columns of the
    state are multiplied with a fixed polynomial (`C[x]`) and get transformed to new
    columns. In this process, each byte of a column is mapped to a new value that
    is a function of all four bytes in the column. This is achieved by the matrix
    multiplication of state as shown:


    ![A440588_1_En_2_Figd_HTML.jpg](A440588_1_En_2_Figd_HTML.jpg)


    The matrix multiplication is as usual, but the AND products are XORed. Let us
    see one of the examples to understand the process. `Byte 0’` is calculated as
    shown:


    `Byte 0’ = (2 . Byte0) ⊕ (3 . Byte1) ⊕ Byte3 ⊕ Byte4`


    It is important to note that this `MixColumns` step, along with the `ShiftRows`
    step, provide the necessary diffusion property (information from one byte gets
    diffused to multiple bytes) to the cipher.


    `AddRoundKey`: This is again a transformation step where the 128-bit round key
    is bitwise XORed with 128 bits of state in a column major order. So, the operation
    takes place column-wise, meaning four bytes of a word state column with one word
    of the round key. In the same way we represented the 128-bit plaintext block,
    the 128-bit key should also be represented in the same 4 × 4 matrix as shown here:


    ![A440588_1_En_2_Fige_HTML.jpg](A440588_1_En_2_Fige_HTML.jpg)


    128-bit key


    This operation affects every bit of a state. Now, recollect that there are ten
    rounds, and each round has its own round key. Since there is an `AddRoundKey`
    step before the rounds start, effectively there are eleven (10 + 1) `AddRoundKey`
    operations. In one round, all 128-bits of subkey, that is, all four words of subkey,
    are used to XOR with the 128-bit input data block. So, in total, we require 44
    key words, `w[0]` through `w[43]`. This is why the 128-bit key has to go through
    a key expansion operation, which we will get to in a little while.


    Note here that the key word `[w[0], w[1], w[2], w[3]]` gets XORed with the initial
    input block before the round-based processing begins. The remaining 40 word-keys,
    `w[4]` through `w[43]`, get used four words at a time in each of the ten rounds.


    ## AES Key Expansion


    The AES key expansion algorithm takes as input a 128-bit cipher key (four-word
    key) and produces a schedule of 44 key words from it. The idea is to design this
    system in such a way that a one-bit change in the key would significantly affect
    all the round keys.


    The key expansion operation is designed such that each grouping of a four-word
    key produces the next grouping of a four-word key in a four-word to four-word
    basis. It is easy to explain this with a pictorial representation, so here we
    go:


    ![A440588_1_En_2_Fig7_HTML.jpg](A440588_1_En_2_Fig7_HTML.jpg)


    **Figure 2-7** AES key expansion


    We will quickly run through the operations that take place for key expansion by
    referring to the diagram.'
