  trans: "\n### SHA-256 与 SHA-512\n\n如前所述，`SHA-256` 属于 `SHA-2` 哈希函数家族，且正是比特币所使用的！顾名思义，它会产生一个\
    \ 256 位的哈希值，因而得名。根据生日悖论，它能提供 `2¹²⁸` 位的安全性。\n\n回顾一下，哈希函数接收任意长度的输入，并产生固定大小的输出。任意长度的输入并非直接送入压缩函数，而是先在送入压缩函数前被分割成固定长度的数据块。这意味着需要一种构造方法，能够通过从任意长度的输入数据构建固定大小的输入块来迭代调用压缩函数，并产生固定长度的输出。存在多种构造方法，例如\
    \ Merkle-Damgård 构造、树形构造和海绵构造。已经证明，如果底层的压缩函数是抗碰撞的，那么采用任何构造方法的整体哈希函数也应是抗碰撞的。\n\n\
    `SHA-256` 所使用的构造方法是 Merkle-Damgård 构造，让我们通过图 2-9 来看看它是如何工作的。\n\n![A440588_1_En_2_Fig9_HTML.jpg](img/A440588_1_En_2_Fig9_HTML.jpg)\
    \  \n图 2-9 `SHA-256` 的 Merkle-Damgård 构造\n\n参照该图，为计算最终的哈希值，需按指定顺序执行以下步骤（高级概述）：\n\
    \n- 如图所示，消息首先被分割成 512 位的数据块。当消息长度不是 512 位的整数倍时（通常是这种情况），最后一个数据块位数不足，因此需要对其进行填充，使其达到\
    \ 512 位。\n- 这些 512 位的数据块进一步被分割成 16 个 32 位的字（16 × 32 = 512）。\n- 每个数据块都要经过 64 轮轮函数处理，其中每个\
    \ 32 位字会经历一系列运算。轮函数是一些常见函数的组合，例如 `XOR`、`AND`、`OR`、`NOT`、按位左/右移位等，本书不对这些细节进行深入探讨。\n\
    \n与 `SHA-256` 类似，`SHA-512` 的步骤和操作也相当相似，因为 `SHA-512` 同样使用 Merkle-Damgård 构造。主要区别在于\
    \ `SHA-512` 中有 80 轮轮函数，且字长为 64 位。`SHA-512` 的数据块大小为 1024 位，进一步被分割成 16 个 64 位的字。输出的消息摘要长度为\
    \ 512 位，即八个 64 位的字。当 `SHA-512` 逐渐兴起并开始被许多应用使用时，一些人为了面向未来而转向了 `SHA-3` 算法。`SHA-3`\
    \ 只是一种不同的哈希方法，并非真正替代 `SHA-256` 或 `SHA-512`，尽管它允许调整参数。我们将在后续章节中了解更多关于 `SHA-3` 的细节。\n\
    \n### RIPEMD\n\nRACE 完整性基元评估消息摘要（`RIPEMD`）哈希函数是 `MD4` 哈希函数的一个变体，设计思路几乎相同。由于它在比特币中被使用，我们将对其进行简要讨论。\n\
    \n最初的 `RIPEMD` 为 128 位，后来开发了 `RIPEMD-160`。该算法存在 128 位、256 位和 320 位的版本，分别称为 `RIPEMD-128`、`RIPEMD-256`\
    \ 和 `RIPEMD-320`，但我们的讨论将仅限于最流行且广泛使用的 `RIPEMD-160`。\n\n`RIPEMD-160` 是一种密码学哈希函数，其压缩函数基于\
    \ Merkle–Damgård 构造。输入被分割成 512 位的数据块，当输入位数不是 512 的倍数时进行填充。输出的 160 位哈希值通常表示为 40\
    \ 位的十六进制数。\n\n压缩函数由 80 个阶段组成，这些阶段又由两条并行的线路构成，每条线路包含 5 轮，每轮有 16 个步骤（5 × 16 = 80）。压缩函数对十六个\
    \ 32 位的字（512 位的数据块）进行操作。\n\n> **注意：** 比特币在地址生成中同时使用了 `SHA-256` 和 `RIPEMD-160`\
    \ 哈希。`RIPEMD-160` 用于将 `SHA-256` 的哈希值输出进一步缩短至 160 位。\n\n### SHA-3\n\n2015 年，Keccak（发音为“ket-chak”）算法被\
    \ NIST 标准化为 `SHA-3`。请注意，其目的并非真正取代 `SHA-2` 标准，而是与它共存互补，尽管在某些情况下可以选择 `SHA-3` 而非\
    \ `SHA-2`。\n\n由于 `SHA-1` 和 `SHA-2` 都基于 Merkle-Damgård 构造，因此需要一种不同的哈希函数方法。因此，不使用\
    \ Merkle-Damgård 构造是 NIST 设定的标准之一。这是因为新设计不应受到 Merkle-Damgård 构造的局限性（如多重碰撞）的影响。Keccak，即后来的\
    \ `SHA-3`，采用了一种称为海绵构造的不同构造方法。\n\n为了实现向后兼容，要求 `SHA-3` 能够产生可变长度的输出，例如 224、256、384\
    \ 和 512 位，以及其他任意长度的输出。这样一来，`SHA-3` 成为了一个密码学哈希函数家族，包括 `SHA3-224`、`SHA3-256`、`SHA3-384`、`SHA3-512`，以及两个可扩展输出函数\
    \ (XOF)，分别称为 `SHAKE128` 和 `SHAKE256`。此外，`SHA-3` 必须有一个可调参数（容量），以允许在安全性和性能之间进行权衡。由于\
    \ `SHAKE128` 和 `SHAKE256` 是 XOF，它们的输出可以扩展到任何所需的长度，故而得名。\n\n下图（图 2-10）展示了 `SHA-3`（Keccak\
    \ 算法）的高级设计。\n\n![A440588_1_En_2_Fig10_HTML.jpg](img/A440588_1_En_2_Fig10_HTML.jpg)\
    \  \n图 2-10 `SHA-3` 的海绵构造\n\n`SHA-3` 所执行的一系列步骤如下：\n\n- 如图 2-10 所示，消息首先被分割成大小为\
    \ `r` 位的数据块 (`x[i]`)。如果输入数据不是 `r` 位的整数倍，则需要填充。如果你对这个 `r` 感到疑惑，不用担心，我们稍后会解释。现在，让我们关注填充是如何进行的。对于一个不是\
    \ `r` 位整数倍且包含一些消息 `m` 的消息块 `x[i]`，填充过程如下所示：\n\n`x[i] = m || P 1 {0}* 1`\n\n`P`\
    \ 是一个预定义的比特串，后跟 `1 {0}* 1`，这意味着一个前导 `1` 和一个尾随 `1`，以及一些数量的零（也可能没有零位），这可以使 `x[i]`\
    \ 成为 `r` 的整数倍。表 2-4 展示了 `P` 的各种值。\n\n表 2-4 `SHA-3` 变体中的填充\n\n![A440588_1_En_2_Figh_HTML.jpg](img/A440588_1_En_2_Figh_HTML.jpg)\n"
- fmt: '# SHA-3 Sponge Construction and Keccak-f


    As you can see in Figure [2-10](#A440588_1_En_2_Chapter.html#Fig10), there are
    broadly two phases to SHA-3 sponge construction: the first one is the “Absorbing”
    phase for input, and the second one is the “Squeezing” phase for output. In the
    Absorbing phase, the message blocks (`x[i]`) go through various operations of
    the algorithm and in the Squeezing phase, the output of configurable length is
    computed. Notice that for both of these phases, the same function called “Kecaak-f”
    is used.


    For the computation of SHA3-224, SHA3-256, SHA3-384, SHA3-512, which is effectively
    a replacement of SHA-2, only the first bits of the first output block `y[0]` are
    used with required level of truncation.


    The SHA-3 is designed to be tunable for its security strength, input, and output
    sizes with the help of tuning parameters.


    As you can see in the diagram, “b” represents the width of the state and requires
    that `r + c = b`. Also, “b” depends on the exponent “ℓ” such that `b = 25 × 2^ℓ`.
    Since “ℓ” can take on values between 0 and 6, “b” can have widths `{25, 50, 100,
    200, 400, 800 and 1600}`. It is advisable not to use the smallest two values of
    “b” in practice as they are just there to analyze and perform cryptanalysis on
    the algorithm.


    In the equation `r + c = b`, the “r” that we see is what we used to preprocess
    the message and divided into blocks of length “r.” This is called the “bit rate.”
    Also, the parameter “c” is called the capacity that just has to satisfy the condition
    `r + c = b ∈ {25, 50, 100, 200, 400, 800, 1600}` and get computed. This way “r”
    and “c” are used as tuning parameters to trade off between security and performance.


    For SHA-3, the exponent value ℓ is fixed to be “6,” so the value of `b` is 1600
    bits. For this given `b = 1600`, two bit-rate values are permissible: `r = 1344`
    and `r = 1088`. This leads to two distinct values of “c.” So, for `r = 1344`,
    `c = 256` and for `r = 1088`, `c = 512`.


    Let us now look at the core engine of this algorithm, i.e. Keccak-f, which is
    also called “Keccak-f Permutation.” There are “n” rounds in each Keccak-f, where
    “n” is computed as: `n = 12 + 2ℓ`. Since the value of ℓ is 6 for SHA-3, there
    will be 24 rounds in each Keccak-f. Every round takes “b” bits (`r + c`) input
    and produces the same number of “b” bits as output.


    In each round, the input “b” is called a state. This state array “b” can be represented
    as a three-dimensional (3-D) array `b = (5 x 5 × w)`, where word size `w = 2^ℓ`.
    So, `w = 64` bits, which means `5 × 5 = 25` words of 64 bits each. Recall that
    ℓ = 6 for SHA-3, so `b = 5 × 5 x 64 = 1600`. The 3-D array can be shown as in
    Figure [2-11](#A440588_1_En_2_Chapter.html#Fig11).


    ![A440588_1_En_2_Fig11_HTML.jpg](A440588_1_En_2_Fig11_HTML.jpg)


    Figure 2-11: State array representation in SHA-3


    Each round consists of a sequence of five steps and the state array gets manipulated
    in each of those steps as shown in Figure [2-12](#A440588_1_En_2_Chapter.html#Fig12).


    ![A440588_1_En_2_Fig12_HTML.jpg](A440588_1_En_2_Fig12_HTML.jpg)


    Figure 2-12: The five steps in each SHA-3 round


    Without getting into much detail into each of the five steps, let us quickly learn
    what they do at a high level:


    - **Theta (θ) step**: It performs the XOR operation to provide minor diffusion.

    - **Rho (ρ) step**: It performs bitwise rotation of each of the 25 words.

    - **Pi (π) step**: It performs permutation of each of the 25 words.

    - **Chi (χ) step**: In this step, bits are replaced by combining those with their
    two subsequent bits in their rows.

    - **Iota (ι) step**: It XORs a round constant into one word of the state to break
    the symmetry.


    The last round of Keccak-f produces the `y[0]` output, which is enough for SHA-2
    replacement mode, i.e., the output with 224, 256, 384, and 512 bits. Note that
    the least significant bits of `y[0]` are used for the desired length output. In
    case of variable length output, along with `y[0]`, other output bits of `y[1]`,
    `y[2]`, `y[3]`… can also be used.


    When it comes to the real-life implementation of SHA-3, it is found that its performance
    is good in software (though not as good as SHA-2) and is excellent in hardware
    (better than SHA-2).


    ## Applications of Hash Functions


    The cryptographic hash functions have many different usages in different situations.
    Following are a few example use cases:


    - Hash functions are used in verifying the integrity and authenticity of information.

    - Hash functions can also be used to index data in hash tables. This can speed
    up the process of searching. Instead of the whole data, if we search based on
    the hashes (assuming the much shorter hash value compared with the whole data),
    then it should obviously be faster.

    - They can be used to securely authenticate the users without storing the passwords
    locally. Imagine a situation where you do not want to store passwords on the server,
    obviously because if an adversary hacks on to the server, they cannot get the
    password from their stored hashes. Every time a user tries to log in, hash of
    the punched in password is calculated and matched against the stored hash. Secured,
    isn’t it?

    - Since hash functions are one-way functions, they can be used to implement PRNG.

    - Bitcoin uses hash functions as a proof of work (PoW) algorithm. We will get
    into the details of it when we hit the Bitcoin chapter.

    - Bitcoin also uses hash functions to generate addresses to improve security and
    privacy.

    - The two most important applications are digital signatures and in MACs such
    as hash-based message authentication codes (HMACs).


    Understanding the working and the properties of the hash functions, there can
    be various other use cases where hash functions can be used.


    **Note**


    The Internet Engineering Task Force (IETF) adopted version 3.0 of the SSL (SSLv3)
    protocol in 1999, renamed it to Transport Layer Security (TLS) version 1.0 (TLSv1)
    protocol and defined it in RFC 2246. SSLv3 and TLSv1 are compatible as far as
    the basic operations are concerned.'
