    从刚才讨论的哈希函数性质中，还可以推导出另一个在比特币中非常有用的性质。让我们从技术角度来探究它，并在我们读到第 3 章时，了解比特币是如何利用它进行挖矿的。这个性质的名字叫“谜题友好性”。这个名字意味着，找到解没有捷径，唯一的方法就是遍历输入空间中所有可能的选项。我们在此不打算试图定义它，而是直接尝试理解它的真正含义。让我们考虑这个例子：`H(r
    || X) = Z`，其中“r”是从一个具有高最小熵的分布中选取的，“X”是与“r”拼接的输入，“Z”是哈希输出的值。这个性质意味着，对于一个攻击者来说，找到一个恰好能哈希到“Z”的值“Y”是非常困难的。也就是说，`H(r´
    || Y) = Z`，其中`r´`是与“r”同样以随机方式选择的输入的一部分。这意味着，当输入的一部分被充分随机化后，就很难通过一个快速的解法来攻破哈希函数；唯一的方法就是用所有可能的随机值进行测试。


    在前一个例子中，如果“Z”是一个`n`位的输出，那么它只是从`2^n`个可能值中取了一个值。请仔细注意，你输入的一部分，比如“r”，来自一个高最小熵分布，它必须与你的输入`X`拼接在一起。现在到了设计搜索谜题的有趣部分。假设`Z`是一个`n`位的输出，是一个包含`2^n`个可能值的集合，而不仅仅是一个精确的值。你被要求找到一个`r`的值，使得当它与`X`拼接后进行哈希时，结果落在这个包含`2^n`个值的输出集合内；这样就形成了一个搜索谜题。其思想是找出所有可能的`r`值，直到它落入`Z`的范围内。请注意，这里`Z`的大小将输出空间限制到了一个更小的、包含`2^n`个可能值的集合。输出空间越小，问题就越难。显然，如果范围很大，找到其中的一个值就比较容易；而如果范围非常窄，只有少数几种可能性，那么在该范围内找到一个值就很难。这就是“r”（在哈希函数输入中称为“nonce”）的巧妙之处。无论你取哪个随机值“r”，它都会与“X”拼接，并一遍又一遍地通过相同的哈希函数，直到你找到正确的、满足`Z`所需范围的
    nonce 值“r”。除了尝试所有可能的值之外，绝对没有任何捷径！


    请注意，对于一个`n`位的哈希值输出，要破解抗原像性和抗第二原像性平均需要`2^n`的算力，而抗碰撞性则需要`2^(n/2)`的算力。


    我们讨论了哈希函数的各种基本属性和安全属性。在接下来的章节中，我们将了解一些重要的哈希函数，并在适当的情况下进行更深入的探讨。


    ### 关于不同哈希函数的温馨提示


    最古老的哈希函数或压缩函数之一是`MD4`哈希函数。它属于消息摘要（MD）家族。MD 家族的其他成员包括`MD5`和`MD6`，并且`MD4`还有许多其他变体，例如`RIPEMD`。MD
    系列的算法通过处理 512 位的数据块来生成 128 位的消息摘要。它们曾被广泛用作校验和来验证数据完整性。许多文件服务器或软件仓库曾提供预先计算好的`MD5`校验和，用户可以用它来与自己下载的文件进行对比检查。然而，在
    MD 家族中发现了许多漏洞，它已被弃用。


    另一个这样的哈希函数家族是安全哈希算法（SHA）家族。这个家族主要有四种算法，例如`SHA-0`、`SHA-1`、`SHA-2`和`SHA-3`。这个家族中提出的第一个算法被命名为
    SHA，但后来的版本带来了安全修复和更新，因此它被赋予了“旧称”，变成了`SHA-0`。它被发现存在一个严重但未公开的安全缺陷，随后被停止使用。后来，`SHA-1`被提出作为`SHA-0`的替代品。`SHA-1`增加了一个额外的计算步骤，解决了`SHA-0`中的问题。`SHA-0`和`SHA-1`都是
    160 位的哈希函数，处理 512 位的数据块大小。`SHA-1`由美国国家安全局（NSA）设计，用于数字签名算法（DSA）。它曾被广泛应用于许多安全工具和互联网协议中，例如
    SSL、SSH、TLS 等。它也用于一些版本控制系统（如 Mercurial、Git 等）的一致性检查，而并非真正用于安全目的。后来，大约在 2005 年，在其发现了密码学弱点，并在
    2010 年后被弃用。我们将在接下来的章节中详细介绍`SHA-2`和`SHA-3`。


    ### SHA-2


    它属于 SHA 哈希函数家族，但其本身又是一个哈希函数家族。它有许多 SHA 变体，例如`SHA-224`、`SHA-256`、`SHA-384`、`SHA-512`、`SHA-512/224`和`SHA-512/256`。`SHA-256`和`SHA-512`是原始的哈希函数，其他变体都是由它们衍生而来。`SHA-2`系列的哈希函数广泛应用于
    SSL、SSH、TLS、PGP、MIME 等应用中。


    `SHA-224`是`SHA-256`的一个截断版本，使用了不同的初始值或初始化向量（IV）。请注意，应用了不同截断的 SHA 变体可能会产生相同位长度的哈希输出，因此在不同
    SHA 变体中应用不同的初始化向量，以便能够正确地区分它们。现在回到`SHA-224`的计算，它是一个两步过程。首先，使用与`SHA-256`中使用的默认
    IV 不同的 IV 来计算`SHA-256`值。其次，将得到的 256 位哈希值截断为 224 位；通常保留左侧的 224 位，但选择权在你手中。


    `SHA-384`是`SHA-512`的一个截断版本，就像`SHA-224`是`SHA-256`的截断版本一样。类似地，`SHA-512/224`和`SHA-512/256`都是`SHA-512`的截断版本。你是不是想知道为什么存在这种“截断”的概念？请注意，截断并不仅限于我们刚才提到的那些，还可能存在各种其他变体。截断的主要原因可能如下：


    *   某些应用需要特定长度（与默认长度不同）的消息摘要。

    *   无论我们使用哪种`SHA-2`变体，都可以根据我们希望维持的安全属性来选择截断级别。例如：考虑到当今的计算能力，当需要抗碰撞性时，我们应该至少保留
    160 位；当只需要抗原像性时，我们应该至少保留 80 位。像抗碰撞性这样的安全属性会随着截断而降低，但应该选择截断级别，使得找到碰撞在计算上不可行。

    *   截断还有助于保持与旧版应用的向后兼容性。例如：`SHA-224`提供 112 位的安全性，可以与三重 DES（3DES）的密钥长度相匹配。


    谈到效率，`SHA-256`基于 32 位字，而`SHA-512`基于 64 位字。因此，在 64 位架构上，与`SHA-1`或其他`SHA-256`变体相比，`SHA-512`及其所有截断变体可以以更快的速度计算，并提供更好的安全级别。


    表 2-3 是摘自 NIST 论文的一个表格，它概括了`SHA-1`和不同`SHA-2`算法的属性。


    **表 2-3** SHA-1 和 SHA-2 哈希函数概览


    ![A440588_1_En_2_Figg_HTML.jpg](img/A440588_1_En_2_Figg_HTML.jpg)


    根据经验法则，建议在非必要的情况下不要进行截断。某些哈希函数可以容忍截断，而有些则不能，这还取决于你如何使用它以及使用的上下文。

