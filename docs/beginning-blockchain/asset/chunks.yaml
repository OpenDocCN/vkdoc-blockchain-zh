- fmt: '### Block Structure


    The block structure of a Bitcoin blockchain is fixed for all blocks and has specific
    fields with their corresponding required data. Take a look at Figure [3-5](#A440588_1_En_3_Chapter.html#Fig5),
    a birds-eye view of the entire block structure, and then we will learn more about
    the individual fields later in this chapter.


    ![A440588_1_En_3_Fig5_HTML.jpg](A440588_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Block structure of Bitcoin blockchain


    A typical block structure appears as shown in Table [3-1](#A440588_1_En_3_Chapter.html#Tab1).


    Table 3-1


    Block Structure


    | Field | Size | Description |

    | --- | --- | --- |

    | Magic Number | 4 bytes | It has a fixed value `0xD9B4BEF9`, which indicates
    the start of the block and also that the block is from the mainnet or the production
    network. |

    | Block Size | 4 bytes | This indicates the size of the block. The original Bitcoin
    blocks are of 1MB and there is a newer version of Bitcoin called “Bitcoin Cash”
    whose block size is 2MB. |

    | Block Header | 80 bytes | It comprises much information such as Previous Block’s
    hash, Nonce, Merkle Root, and many more. |

    | Transaction Counter | 1–9 bytes (variable length) | It indicates total number
    of transactions that are included within the block. Not every transaction is of
    the same size, and there is a variable number of transactions in every block.
    |

    | Transaction List | Variable in number but fixed in size | It lists all the transactions
    that are taking place in a given block. Depending on block size (whether 1MB or
    2MB), this field occupies the remaining space in a block. |


    Let us now zoom in (Table [3-2](#A440588_1_En_3_Chapter.html#Tab2)) to the “Block
    Header” section of the blocks and learn the various different fields that it maintains.


    Table 3-2


    Block Header Components


    | Field | Size | Description |

    | --- | --- | --- |

    | Version | 4 bytes | It indicates the version number of Bitcoin protocol. Ideally
    each node running Bitcoin protocol should have the same version number. |

    | Previous Block Hash | 32 bytes | It contains the hash of the block header of
    the previous block in the chain. When all the fields in the previous block header
    are combined and hashed with `SHA256` algorithm, it produces a 256-bit result,
    which is 32 bytes. |

    | Merkle Root | 32 bytes | Hashes of the transactions in a block form a Merkle
    tree by design, and Merkle root is the root hash of this Merkle tree. If a transaction
    is modified in the block, then it won’t match with the Merkle root when computed.
    This way it ensures that keeping the hash of the previous block’s header is enough
    to maintain the secured blockchain. Also, Merkle trees help determine if a transaction
    was a part of the block in `O(n)` time, and are quite fast! |

    | Timestamp | 4 bytes | There is no notion of a global time in the Bitcoin network.
    So, this field indicates an approximate time of block creation in Unix time format.
    |

    | Difficulty Target | 4 bytes | The proof-of-work (PoW) difficulty level that
    was set for this block when it was mined |

    | Nonce | 4 bytes | This is the random number that satisfied the PoW puzzle during
    mining. |


    The block fields and their corresponding explanations as presented in the previous
    tables are good enough to start with, and we will explore more of only a few fields
    that require a more detailed explanation.


    ### Merkle Tree


    We have covered the concept of Merkle trees in the previous chapter. In this section,
    we will just take a look at how Bitcoin uses Merkle trees. Each block in a Bitcoin
    blockchain contains the hash of all the transactions, and the Merkle root of all
    these transactions is included in the header of that block. In a true sense, when
    we say that each block header contains the hash of the entire previous block,
    the trust is that it just contains the hash of the previous block’s header. Nonetheless,
    it is enough, because the header already contains the Merkle root. If a transaction
    in the block is altered, the Merkle root will not match anymore and such a design
    still preserves the integrity of the blockchain.


    The Merkle tree is a tree data structure of the hash of the transactions. The
    “Leaf Nodes” in the Merkle tree actually represent the hash of the transactions,
    whereas the root of the tree is the Merkle root. Refer to Figure [3-6](#A440588_1_En_3_Chapter.html#Fig6).


    ![A440588_1_En_3_Fig6_HTML.jpg](A440588_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Merkle-tree representation


    Notice that the hash of the seven transactions A, B, C, D, E, F, and G form the
    leaf of the tree. Since there are seven transactions but the total leaf nodes
    should be even in a binary tree, the last leaf node gets repeated. Each transaction
    hash of 32 bytes (i.e., 256 bits) is calculated by applying `SHA256` twice to
    the transactions. Similarly, the hash of two transactions are concatenated (62
    bytes) and then hashed twice with `SHA256` to get the parent hash of 32 bytes.


    Only the Merkle path to a transaction is enough to verify if a transaction was
    a part of any block and is quite efficient therefore. So, the actual blockchain
    can be represented as shown in Figure [3-7](#A440588_1_En_3_Chapter.html#Fig7).


    ![A440588_1_En_3_Fig7_HTML.jpg](A440588_1_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Merkle tree representation'
