  trans: '

    ### 零和博弈


    博弈论中的零和博弈概念十分直白。在这类博弈中，一方的收益等价于另一方的损失。举例来说：一方赢得的数额恰好等于对手损失的数额，这意味着参与者的选择既不能增加也不能减少特定情境下的可用资源。


    `扑克`、`国际象棋`、`围棋`等是零和博弈的几个例子。更广泛地说，那些只有一人获胜而对手落败的博弈，如网球、羽毛球等，也属于零和博弈。许多金融工具，如`互换`、`远期合约`和`期权`，也可被描述为零和工具。


    在许多现实生活场景中，收益与损失难以量化。因此，相比非零和博弈，零和博弈并不那么常见。大多数金融交易或贸易以及股票市场都是非零和博弈。然而，保险领域却是零和博弈发挥重要作用的地方。不妨思考一下保险计划是如何运作的。我们向保险公司支付保费，以防范事故、住院、死亡等困难情况。想到自己已投保，我们得以安心生活，而在遭遇困境时，保险公司也会给予相应赔偿。这确实提供了一份帮助我们渡过难关的财务保障。请注意，并非每位支付保费的人都会遭遇事故或住院，而真正需要理赔的人所需的金额远超其支付的保费。你看，即便考虑到保险公司的运营成本，这里的一切也相当平衡。此外，保险公司可能会将我们支付的保费进行投资并获得一定回报。即便如此，这依然是一个零和博弈。


    再举一个不同的例子：如果有一个职位正在举行面试招聘，那么最终录用的候选人实际上是以其他候选人的落选为代价的。这同样是一个零和博弈。


    你可能会问，研究零和博弈有什么用处。其实，仅仅意识到零和情境的存在，对于理解和制定复杂问题的策略就非常有用。我们可以分析在特定的交易场景中，自己是否能够实际获益。


    ### 为何要学习博弈论


    博弈论是一种革命性的跨学科现象，它将心理学、经济学、数学、哲学以及众多其他学术领域广泛地融合在一起。


    我们说博弈论与现实世界的问题息息相关。然而，问题是无穷无尽的。博弈论的概念也是无穷无尽的吗？当然！我们每天都在有意或无意地运用博弈论，因为我们总是会动脑筋，在特定情境下采取最佳策略行动。不是吗？既然如此，为什么还要学习博弈论呢？


    原因在于，博弈论中有大量案例能帮助我们换一种方式思考。一些已发展成熟的理论，如`纳什均衡`，就与许多现实生活情境相关。在很多现实场景中，参与者或决策者面对的决策矩阵类似于“囚徒困境”。因此，学习这些概念不仅能帮助我们以更数学化的方式构建问题，还能让我们做出最佳决策。它让我们识别出，在任何给定的互动中，每位参与者在选择策略行动之前应考虑哪些方面。它告诉我们首先要确定博弈的类型：参与者是谁，他们的目标或目的是什么，他们可能采取什么行动等，以便能采取最佳行动。现实生活中的许多决策涉及不同方；博弈论为理性决策提供了基础。


    我们在前一节学习的`拜占庭将军问题`，广泛应用于分布式存储解决方案和数据中心，以维护各计算节点间的数据一致性。


    ## 计算机科学工程


    如前所述，正是巧妙地运用计算机科学的概念，将密码学、博弈论等许多其他领域的组件缝合在一起，才构建出了区块链。在本节中，我们将学习区块链中用到的一些重要的计算机科学组件。

    '
- fmt: '### The Blockchain


    As we will see, a blockchain is actually a blockchain data structure; in the sense
    that it is a chain of blocks linked together. When we say a block, it can mean
    just a single transaction or multiple transactions clubbed together. We will start
    our discussion with hash pointers, which is the basic building block of blockchain
    data structure.


    A hash pointer is a cryptographic hash pointing to a data block, where the hash
    pointer is the hash of the data block itself (Figure [2-19](#A440588_1_En_2_Chapter.html#Fig19)).
    Unlike linked lists that point to the next block so you can get to it, hash pointers
    point to the previous data block and provide a way to verify that the data has
    not been tampered with.


    ![A440588_1_En_2_Fig19_HTML.jpg](A440588_1_En_2_Fig19_HTML.jpg)


    **Figure 2-19** Hash pointer for a block of transactions


    The purpose of the hash pointer is to build a tamper resistant blockchain that
    can be considered as a single source of truth. How does blockchain achieve this
    objective? The way it works is that the hash of the previous block is stored in
    the current block header, and the hash of the current block with its block header
    will be stored in the next block’s header. This creates the blockchain as we can
    see in Figure [2-20](#A440588_1_En_2_Chapter.html#Fig20).


    ![A440588_1_En_2_Fig20_HTML.jpg](A440588_1_En_2_Fig20_HTML.jpg)


    **Figure 2-20** Blocks in a blockchain linked through hash pointers


    As we can observe, every block points to its previous block, known as “the parent
    block.” Every new block that gets added to the chain becomes the parent block
    for the next block to be added. It goes all the way to the first block that gets
    created in the blockchain, which is called “the genesis block.” In such a design
    where blocks are linked back with hashes, it is practically infeasible for someone
    to alter data in any block. We already looked at the properties of hash functions,
    so we understand that the hashes will not match if the data is altered. What if
    someone changes the hash as well? Let us focus on Figure [2-21](#A440588_1_En_2_Chapter.html#Fig21)
    to understand how it is not possible to alter the data in any way.


    - What if you also change the hash stored in the block header of block-1235 so
    that it perfectly matches the altered data. In other words, you hash the data
    block-1234 after you alter it and replace that new hash with the one stored in
    block header of block-1235. After you do this, the hash of the block-1235 changes
    (because block-1235 means the data and the header together) and it does not match
    with the one stored in the block header of block-1236.

    - One has to keep doing this all the way till the final or the most recent hash.
    Since everyone or many in the network already have a copy of the blockchain along
    with the most recent hash, in no way is it possible to hack into the majority
    of the systems and change all the hashes at a time.

    - This makes it a tamper-proof blockchain data structure.


    ![A440588_1_En_2_Fig21_HTML.jpg](A440588_1_En_2_Fig21_HTML.jpg)


    **Figure 2-21** Any attempt in changing Header or Block content breaks the entire
    chain. Assume that you altered the data in block-1234. If you do so, the hash
    that is stored in the block header of block-1235 would not match.


    This clearly means that each block can be uniquely identified by its hash. To
    calculate this hash, you can use either the SHA2 or SHA3 family of hash functions
    that we discussed in the cryptography section. If you use SHA-256 to hash the
    blocks, it would produce a 256-bit hash output such as:


    ```

    000000000000000a73b6a2af7bad40ec3fc2a83dafd76ef15f3d1b71a7132765

    ```


    Notice that there are only 64 characters in it. Since the hashed output is represented
    using hexadecimal characters, and every hex digit can be represented using four
    bits, the output is 64 × 4 = 256 bits. You would usually see that the 256-bit
    hashed output is represented using the 64 hex characters in many places.


    The structure of a block, that is, block size, the data and header sections, number
    of transactions in a block, etc., is something that you should decide while designing
    a blockchain solution. For existing blockchains such as Bitcoin, Ethereum, or
    Hyperledger, the structure is already defined and you have to understand that
    to build on top of these platforms. We will take a closer look at the Bitcoin
    and Ethereum blockchains later in this book.


    ### Merkle Trees


    A Merkle tree is a binary tree of cryptographic hash pointers, hence it is a binary
    hash tree. It is named so after its inventor Ralph Merkle. It is another useful
    data structure being used in blockchain solutions such as Bitcoin. Merkle trees
    are constructed by hashing paired data (usually transactions at the leaf level),
    then again hashing the hashed outputs all the way up to the root node, called
    the Merkle root. Like any other tree, it is constructed bottom-up. In Bitcoin,
    the leaves are always transactions of a single block in a blockchain. We will
    discuss in a little while the advantages of using Merkle trees, so you can decide
    for yourself if the leaves would be transactions or a group of transactions in
    blocks. A typical Merkle tree can be represented as in Figure [2-22](#A440588_1_En_2_Chapter.html#Fig22).


    ![A440588_1_En_2_Fig22_HTML.jpg](A440588_1_En_2_Fig22_HTML.jpg)


    **Figure 2-22** Merkle tree representation


    Similar to the hash pointer data structure, the Merkle tree is also tamper-proof.
    Tampering at any level in the tree would not match with the hash stored at one
    level up in the hierarchy, and also till the root node. It is really difficult
    for an adversary to change all the hashes in the entire tree. It also ensures
    the integrity of the order of transactions. If you change just the order of the
    transactions, then also the hashes in the tree till the Merkle root will change.


    Here is a situation. The Merkle tree is a binary tree and there should be an even
    number of items at the leaf level. What if there are an odd number of items? One
    good solution would be to duplicate the last transaction hash. Since it is the
    hash we are duplicating, it would mean just the same transaction and not create
    any issue such as double-spend or repeated transactions. That way, it is possible
    to balance the tree.


    In the blockchain we discussed, if we were to find a transaction through its hash,
    or check if a transaction had happened in the past, how would we get to that transaction?
    The only way is to keep traversing until you encounter the exact block that matches
    the hash of the transaction. This is a case where a Merkle tree can help a great
    deal.


    Merkle trees provide a very efficient way to verify if a specific transaction
    belongs to a particular block. If there are “n” transactions in a Merkle tree
    (leaf items), then this verification takes just `Log(n)` time as shown in Figure
    [2-23](#A440588_1_En_2_Chapter.html#Fig23).


    ![A440588_1_En_2_Fig23_HTML.jpg](A440588_1_En_2_Fig23_HTML.jpg)


    **Figure 2-23** Verification in Merkle tree


    To verify if a transaction or any other leaf item belongs to a Merkle tree, we
    do not need all items and the whole tree. Rather, a subset of it is needed as
    we can see in the diagram in Figure [2-23](#A440588_1_En_2_Chapter.html#Fig23).
    One can just start with the transaction to verify along with its sibling (it is
    a binary tree so there would be one sibling leaf item), calculate the hash of
    those two, and see if it matches their parent hash. Then continue with that parent
    hash and its sibling at that level and hash them together to get their parent
    hash. Continuing this process all the way to the top root hash is the quickest
    possible way for transaction verification (just `Log(n)` time for n items). In
    the figure, only the solid rectangles are required and the dotted rectangles can
    be just computed, provided the solid rectangle data. Since there are eight transaction
    elements (n = 8), only three computations (log2 8 = 3) would be required for verification.'
