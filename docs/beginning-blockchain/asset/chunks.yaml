    (or Bitcoin address) that received some amount in any transaction. The public
    keys are hashed twice to generate the Bitcoin adress, first with SHA256 and then
    with RIPEMD160\. This is also deterministic, so given a public key, it is just
    a matter of a couple of hashes to generate the Bitcoin address.


    Note carefully that the Bitcoin address does not really reveal the public key.
    This is because the addresses are double-hashed public keys and it’s quite infeasible
    to find the public key given the Bitcoin address. However, for someone with a
    public key, it is easy to claim the ownership of a Bitcoin address. The hashing
    technique in Bitcoin shortens and obfuscates the [public key](https://bitcoin.org/en/glossary/public-key#The%20public%20portion%20of%20a%20keypair%20which%20can%20be%20used%20to%20verify%20signatures%20made%20with%20the%20private%20portion%20of%20the%20keypair.).
    While it makes the manual transcription easier, it also provides security against
    unanticipated problems that might allow reconstruction of [private keys](https://bitcoin.org/en/glossary/private-key#The%20private%20portion%20of%20a%20keypair%20which%20can%20create%20signatures%20that%20other%20people%20can%20verify%20using%20the%20public%20key.)
    from [public key](https://bitcoin.org/en/glossary/public-key#The%20public%20portion%20of%20a%20keypair%20which%20can%20be%20used%20to%20verify%20signatures%20made%20with%20the%20private%20portion%20of%20the%20keypair.)s.
    This is possibly the safest implementation! Public keys are revealed only when
    the transaction output is being claimed by the owner, not when it was transacted
    to them, as you can see in Figure [3-28](#A440588_1_En_3_Chapter.html#Fig28).


    ![A440588_1_En_3_Fig28_HTML.jpg](A440588_1_En_3_Fig28_HTML.jpg)


    Figure 3-28


    Revealing public key to claim a transaction


    Bitcoin wallets are nothing but the SPVs and are served by the full nodes. We
    already looked at the functioning of SPVs, so in this section we will take a look
    at some wallet-specific activities. We all understand that to make a transaction,
    or to receive a transaction, you need not be running a full node. All you want
    is a wallet to be able to save your private/public key pair, to be able to make
    and receive transactions (actually view and verify the ones made to you). We already
    learned the verification part while going through the SPVs section. Let us take
    a look at how to initiate a transaction using a wallet.'
  trans: '

    ### SPV（简易支付验证）


    比特币设计中有个很棒的概念，即简易支付验证（`SPV`）节点，它可以在不运行完整节点的情况下验证交易。`SPV`的工作方式是，在初次同步到比特币网络时，仅下载所有区块的区块头。在比特币中，每个区块头大小为
    80 字节，下载所有区块头的数据量并不大，总计仅几兆字节。


    `SPV`的目的是提供一种机制，无需整个区块链数据，即可验证特定交易是否存在于区块链的某个区块中。每个区块头都包含默克尔根（即区块哈希）。我们知道每笔交易都有一个哈希值，通过我们在上一章讨论过的默克尔树证明，可以将该交易哈希链接到区块哈希。区块中的所有交易构成默克尔树的叶子节点，而区块哈希则构成默克尔树的根节点。默克尔树的精妙之处在于，只需要区块的一小部分数据，就能证明某笔交易确实属于该区块。因此，为了确认一笔交易，一个`SPV`会做两件事：首先，检查某笔交易的默克尔树证明，以确定它属于该区块；其次，检查该区块是否属于主链，并且其后至少还有六个区块被创建，才能确认它属于最长链。图
    3-26 描绘了这一过程。


    ![A440588_1_En_3_Fig26_HTML.jpg](img/A440588_1_En_3_Fig26_HTML.jpg)


    图 3-26

    SPV 区块头中的默克尔根


    让我们深入探究一下`SPV`在验证交易时实际运作的技术细节。从高层次来看，它需要以下步骤：


    - 对于`SPV`所连接的对等节点，它会与其中许多节点建立布隆过滤器，理想情况下不只是连接一个节点，因为该节点有可能实施拒绝服务攻击或进行欺骗。布隆过滤器的目的是仅匹配`SPV`感兴趣的交易，而不是区块中的其他交易，同时不泄露`SPV`感兴趣的是哪些地址或密钥。

    - 对等节点将相关的交易以`merkleblock`消息的形式发回，该消息包含默克尔根和指向感兴趣交易的默克尔路径，如上图所示。`merkleblock`消息的大小仅为几千字节，非常高效。

    - 然后，`SPV`就可以很容易地验证一笔交易是否真正属于区块链中的某个区块。

    - 交易验证完成后，下一步就是检查该区块是否确实是真正的最长区块链的一部分。


    下图（图 3-27）展示了此 SPV 与其对等节点的通信步骤。


    ![A440588_1_En_3_Fig27_HTML.jpg](img/A440588_1_En_3_Fig27_HTML.jpg)


    图 3-27

    SPV 与比特币网络的通信机制


    ## 比特币钱包


    比特币钱包与你日常生活中使用的钱包非常相似，你可以访问它，并随时进行支付。然而，比特币钱包是一种数字现象。回想一下我们在上一节使用的例子，爱丽丝向鲍勃支付了一些金额。如果鲍勃没有账户，她该如何操作呢？在比特币环境中，账户或钱包由比特币地址表示。鲍勃必须先生成一个密钥对（私钥/公钥）。比特币使用`ECDSA`算法，并采用`secp256k1`曲线（别担心，这只是曲线类型——一种标准推荐）。首先，生成一个随机比特串作为私钥，然后通过确定性方式将其转换为公钥。正如我们在第
    2 章中学到的，私钥和公钥在数学上是相关的，并且可以随时（确定性地）从私钥生成公钥。因此，实际上并不需要保存公钥本身。通过软件实现无法做到真正的随机性，所以许多服务器或应用程序使用硬件安全模块（`HSM`）来生成真正的随机比特，并保护私钥。与公钥不同，私钥绝对需要以最高安全级别进行保存。如果丢失了私钥，你就无法生成签名来证明你拥有公钥（或比特币地址）的所有权，而该地址在任何交易中都可能收到了金额。公钥经过两次哈希运算生成比特币地址：首先使用`SHA256`，然后使用`RIPEMD160`。这个过程也是确定性的，因此给定一个公钥，只需进行几次哈希运算就能生成比特币地址。


    请注意，比特币地址实际上并不会泄露公钥。这是因为地址是经过双重哈希处理的公钥，要通过比特币地址找到公钥是相当不可行的。然而，对于拥有公钥的人来说，很容易就能声明对比特币地址的所有权。比特币中的哈希技术缩短并混淆了[公钥](https://bitcoin.org/en/glossary/public-key#The%20public%20portion%20of%20a%20keypair%20which%20can%20be%20used%20to%20verify%20signatures%20made%20with%20the%20private%20portion%20of%20the%20keypair.)。这既方便了手动抄写，也提供了安全性，以防出现未预料到的问题——那些问题可能允许从[公钥](https://bitcoin.org/en/glossary/public-key#The%20public%20portion%20of%20a%20keypair%20which%20can%20be%20used%20to%20verify%20signatures%20made%20with%20the%20private%20portion%20of%20the%20keypair.)重构出[私钥](https://bitcoin.org/en/glossary/private-key#The%20private%20portion%20of%20a%20keypair%20which%20can%20create%20signatures%20that%20other%20people%20can%20verify%20using%20the%20public%20key.)。这可能是最安全的实现方式！公钥仅在交易输出的所有者声明所有权时才会被揭示，而不是在交易发送给他们的那一刻，如图
    3-28 所示。


    ![A440588_1_En_3_Fig28_HTML.jpg](img/A440588_1_En_3_Fig28_HTML.jpg)


    图 3-28

    声明交易时揭示公钥


    比特币钱包本质上就是`SPV`，并由完整节点提供服务。我们已经了解了`SPV`的功能，因此在本节中，我们将看看一些特定于钱包的活动。我们都知道，要进行一笔交易或接收一笔交易，你不需要运行完整节点。你所需要的只是一个能够保存你的私钥/公钥对的钱包，以便能够进行和接收交易（实际上是查看和验证发送给你的交易）。我们在学习`SPV`部分时已经了解了验证部分。现在让我们来看看如何使用钱包发起一笔交易。

    '
