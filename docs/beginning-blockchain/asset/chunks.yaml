- fmt: '# Layers of Blockchain


    As of this writing, the public blockchain variants such as Ethereum are in the
    process of maturing, and building complex applications on top of these blockchains
    may not be a good idea. Keep in mind that blockchain is never just a piece of
    technology, but a combination of business principles, economics, game theory,
    cryptography, and computer science engineering. Most of the real-world applications
    are quite complex in nature, and it is advisable to build blockchain solutions
    from the ground up.


    The purpose of this section is only to provide you with a bird’s eye view of various
    blockchain layers, and delve deeper into the core fundamentals in the following
    chapters. To start with, let us just recollect our basic understanding of the
    TCP/IP protocol stack. The layered approach in the TCP/IP stack is actually a
    standard to achieve an open system. Having abstraction layers not only helps in
    understanding the stack better, but also helps in building products that are compliant
    to the stack to achieve an open system. Also, having the layers abstract from
    each other makes the system more robust and easy to maintain. Any change to any
    of the layers doesn’t impact the other layers. Again, the TCP/IP analogy is not
    to be confused with the blockchain layers. TCP/IP is a communication protocol
    that every Internet application uses, and so is blockchain.


    Enter the blockchain. There are no agreed global standards yet that would clearly
    segregate the blockchain components into distinct layers. A layered heterogeneous
    architecture is needed, but for now that is still in the future. So, we will try
    to formulate blockchain layers to be able to understand the technology better
    and build a comparative analogy between hundreds of blockchain/Cryptocurrency
    variants out there in the market. Take a look at the high-level, layered representation
    of blockchain in Figure [1-12](#A440588_1_En_1_Chapter.html#Fig12).


    ![A440588_1_En_1_Fig12_HTML.jpg](A440588_1_En_1_Fig12_HTML.jpg)


    Figure 1-12


    Various layers of blockchain


    You may be wondering why five layers and why not more granular layers, or fewer
    layers. Obviously, there cannot be too many or too few layers; it is going to
    be a trade-off driven among complexity, robustness, adaptability, etc., to name
    a few. The purpose again is not really to standardize blockchain technology, but
    to build a better understanding. Please keep in mind that all these layers are
    present on all the nodes.


    In Chapter [6](#A440588_1_En_6_Chapter.html) of this book, we will be building
    a decentralized application from scratch and learning how blockchain functions
    on all these layers with a practical use case.


    ## Application Layer


    Because of the characteristics of blockchain, such as immutability of data, transparency
    among participants, resilience against adversarial attacks etc., there are multiple
    applications being built. Certain applications are just built in the application
    layer, taking for granted any available “flavor” of blockchain, and some applications
    are built in the application layer and are interwoven with other layers in blockchain.
    This is the reason the application layer should be considered a part of blockchain.


    This is the layer where you code up the desired functionalities and make an application
    out of it for the end users. It usually involves a traditional tech stack for
    software development such as client-side programming constructs, scripting, APIs,
    development frameworks, etc. For the applications that treat blockchain as a backend,
    those applications might need to be hosted on some web servers and that might
    require web application development, server-side programming, and APIs, etc. Ideally,
    good blockchain applications do not have a client–server model, and there are
    no centralized servers that the clients access, which is just the way Bitcoin
    works.


    You probably have heard or already learned about the off-chain networks. The idea
    is to build applications that wouldn’t use blockchain for anything and everything,
    but use it wisely. In other words, this concept is to ensure that the heavy lifting
    is done at the application layer, or bulky storage requirements are taken care
    of off the chain so that the core blockchain is light and effective and the network
    traffic is not too much.


    ## Execution Layer


    The Execution Layer is where the executions of instructions ordered by the Application
    Layer take place on all the nodes in a blockchain network. The instructions could
    be simple instructions or a set of multiple instructions in the form of a smart
    contract. In either case, a program or a script needs to be executed to ensure
    the correct execution of the transaction. All the nodes in a blockchain network
    have to execute the programs/scripts independently. Deterministic execution of
    programs/scripts on the same set of inputs and conditions always produces the
    same output on all the nodes, which helps avoid inconsistencies.


    In the case of Bitcoins, these are simple scripts that are not Turing-complete
    and allow only a few set of instructions. Ethereum and Hyperledger, on the other
    hand, allow complex executions. Ethereum’s code or its smart contracts written
    in `solidity` gets compiled to `Bytecode` or `Machine Code` that gets executed
    on its own `Ethereum Virtual Machine`. Hyperledger has a much simpler approach
    for its chaincode smart contracts. It supports running of compiled machine codes
    inside docker images, and supports multiple high-level languages such as Java
    and Go.'
