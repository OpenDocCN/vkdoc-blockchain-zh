- fmt: "# Ethereum Virtual Machine and Code Execution\n\nEthereum is a programmable\
    \ blockchain that allows users to create their own operations of any arbitrary\
    \ complexity through Turing-complete languages. The `EVM` is the execution engine\
    \ of Ethereum that serves as the runtime environment for smart contracts. It is\
    \ the primary innovation of Ethereum that makes it unique compared with other\
    \ blockchain systems. It is the `EVM` on the basis of which the smart contract\
    \ technology is supposed to get to the next level of innovation, and the game\
    \ is on. `EVM` also plays a critical role in transaction execution, changing the\
    \ state of Ethereum, and achieving consensus. The design goals of `EVM` are as\
    \ follows:\n\n- **Simplicity**: The idea was to make `EVM` as simple as possible\
    \ with the low-level constructs. This is why the number of low-level opcodes is\
    \ kept to a minimum, and so are the data types to the extent that complex logics\
    \ could still be written conveniently using these constructs. Total 160 instructions,\
    \ out of which 65 are logically distinct\n- **Absolute determinism**: Ensuring\
    \ that the execution of instructions with the same set of inputs should produce\
    \ the same set of outputs (deterministic!) helps maintain the integrity of the\
    \ `EVM` without any ambiguity. Determinism along with the concept of \"computational\
    \ step\" helps estimate gas expense with close approximation.\n- **Space optimization**:\
    \ In decentralized systems, space saving is a biggest concern. This is why the\
    \ `EVM` assembly is kept as compact as possible.\n- **Tuned for native operations**:\
    \ `EVM` is tuned for some native operations such as the specific types of arithmatic\
    \ operations used for cryptography (modular arithmatic), reading blocks or transaction\
    \ data, interacting with \"states,\" etc. Another such example is: 256-bit (32\
    \ bytes) word length to store cryptographic hashes, where `EVM` operates on the\
    \ same 256-bits integer.\n- **Easy security**: In a way, gas Price helps ensure\
    \ that the `EVM` is nonexploitable. If there was no cost, attackers could just\
    \ keep attacking the system in every possible way. While almost every operation\
    \ on `EVM` requires some gas cost, it should be easy to come up with good gas\
    \ cost model on `EVM`\n\nWe learned that every participating node in the Ethereum\
    \ network runs `EVM` locally, executes all transactions and smart contracts, and\
    \ saves the final state locally. It is the `EVM` that writes code (smart contracts)\
    \ and data to blockchain and executes instructions (opcodes) of transaction code\
    \ and smart contract code written in a Turing-complete language. That is to say,\
    \ `EVM` serves as a runtime environment (RTE) for Ethereum smart contracts and\
    \ ensures secured execution of the code. Obviously, when the code or transactions\
    \ are validated through their respective digital signatures, they are executed\
    \ on `EVM`. So, only after successful execution of instructions through `EVM`,\
    \ the Ethereum state can change.\n\nUnless one connects the `EVM` with the rest\
    \ of the network to participate in the P2P network, it can be isolated from the\
    \ main network. In an isolated and sandboxed environment, `EVM` could be used\
    \ to test smart contracts. It facilitates in building better, robust, and production\
    \ ready-smart contracts.\n\nTo build a better understanding of how smart contracts\
    \ work leveraging the `EVM`, we should understand how data is organized, stored,\
    \ and manipulated in any `EVM` language such as `Solidity`, `Serpent`, and ones\
    \ that might come in future. You might want to consider `EVM` more like a database\
    \ engine. Though we will not get deeper into the `Solidity` programming fundamentals,\
    \ we will see how it interacts with the `EVM` in this section. Take a look at\
    \ Figure [4-11](#A440588_1_En_4_Chapter.html#Fig11).\n\n![A440588_1_En_4_Fig11_HTML.jpg](A440588_1_En_4_Fig11_HTML.jpg)\n\
    \nFigure 4-11\n\nSmart contract deployment and usage\n\nLet us now understand\
    \ memory management with `EVM`. Take a look at the following three strategies\
    \ that the `EVM` follows:\n\n- **Storage (persistent)**:\n  - Key-value storage\
    \ mapping (i.e., 256-bit to 256-bit word mapping). This means both keys and values\
    \ are 256 bits (i.e., 32 bytes).\n  - From within a contract, it is not possible\
    \ to enumarate storage.\n  - At any given point in time, the state of the contract\
    \ can be determined by the contract level variables called \"state variables\"\
    \ that are always in \"storage,\" and it cannot be updated at runtime. This means\
    \ that the structure of the storage is set only once during the contract creation\
    \ and cannot be altered. However, their content can be changed with `sendTransaction`\
    \ calls.\n  - Read/update of storage is an expensive affair.\n  - Contracts cannot\
    \ read, write, or update to any other storage that is not owned by them.\n  -\
    \ `SSTORE`/`SLOAD` are the frequently used instructions. Example: `SSTORE` instruction\
    \ pops the top two items off the stack, considers the first item as the index,\
    \ and inserts the second item into the contract's storage at that index location.\n\
    - **Memory (volatile)**:\n  - It is similar to RAM requirement in a general computer\
    \ system for any code or application execution and used to store temporary values.\n\
    \  - A contract can use any amount of memory during execution by paying for it,\
    \ and that memory space is cleaned up after execution completes. The outputs during\
    \ execution could be pushed to the persistent storage that can be reused in future\
    \ executions.\n  - Memory is actually a byte-array that is contiguous, unlike\
    \ storage. It is allocated in 256-bit (32 bytes) chunks.\n  - Starts with no space\
    \ and takes on space in the units of 32-byte chunks.\n  - Without the `memory`\
    \ keyword, smart contract languages such as `Solidity` are expected to declare\
    \ variables in storage for persistence.\n  - Memory cannot be used at the smart\
    \ contract level; it can only be used in methods.\n  - Function arguments are\
    \ almost always in memory.\n  - `MSTORE`/`MLOAD` are the frequently used instructions.\n\
    - **Stack**:\n  - `EVM` is stack based, hence follows LIFO (Last-in, First-Out),\
    \ where stack is used to perform computations.\n  - Stack entries are also 256-bit\
    \ words used to mimic 256-bit pseudo registers. They are used to hold local variables\
    \ of \"value\" type and to pass parameters to instructions or functions, memory\
    \ operations, and other algorithmic operations.\n  - Allows a maximum of 1024\
    \ element and is almost free to use.\n  - Most of the stack operations are limited\
    \ to top of the stacks. The execution is pretty similar to the way Bitcoin script\
    \ was executed.\n\nWhen `EVM` is running and the byte code is injected with a\
    \ transaction for execution, its full computational state can be defined by the\
    \ following tuple: `[block_state, transaction, message, code, memory, stack, pc,\
    \ gas]`.\n\nYou must be able to make out all these fields now. They have the three\
    \ kinds of memory we discussed (the `block_state` field represents the global\
    \ state and is for storage). The `PC` field is like a pointer for an instruction\
    \ in the stack to be executed.\n\nIn Ethereum, an Application Binary Interface\
    \ (ABI) is an abstraction that is not part of the [core Ethereum protocol](https://github.com/ethereum/yellowpaper),\
    \ but is used to access the byte code in a smart contract as standard practice.\
    \ Though it is possible for anyone to define their own ABI for their contracts\
    \ and comply with it to get the desired output, it is easier to use `Solidity`.\
    \ The purpose of ABI is as follows:\n\n- How and what functions inside smart contracts\
    \ should be called\n- The Binary format in which information should be passed\
    \ to smart contract functions as inputs\n- The Binary format in which you expect\
    \ the output of function execution after calling that function\n\nWith ABI specifications,\
    \ it is easy (though may not be necessary) for two programs written in two different\
    \ languages to interact with each other."
