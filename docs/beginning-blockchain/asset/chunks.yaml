    ### 区块链状态分片


    分片是一种早已存在的可扩展性技术，也是数据库中备受关注的话题。人们在不同场景中以不同方式运用这一技术来解决特定的可扩展性挑战。在理解分片如何应用于区块链扩展之前，我们首先需要了解其含义。


    当处理大规模数据集时，磁盘读写始终是性能瓶颈。通过将数据分散到多个磁盘上，读写操作可以并行执行，延迟显著降低。这种技术被称为分片。请参见图 2-29。


    ![A440588_1_En_2_Fig29_HTML.jpg](img/A440588_1_En_2_Fig29_HTML.jpg)


    图 2-29


    数据库分片示例


    注意图 2-29 中如何通过水平分区将 300GB 的数据库表拆分为三个各 100GB 的分片，并存储在不同服务器实例上。同样的概念也适用于区块链——将整个区块链状态划分为包含各自子状态的不同分片。当然，这绝非像数据库分片那样简单地进行水平分区即可。


    那么，分片在区块链中究竟如何运作？其核心理念是：节点无需下载并维护整个区块链的副本，只需下载与其相关的部分（分片）。这样一来，节点只需处理与所存储数据相关的交易，从而支持交易的并行执行。当交易发生时，它会被路由到受影响的特定分片节点。从另一个角度看，所有节点无需对每笔交易都进行全量计算和验证。当处理特定交易需要涉及多个分片时，可以定义分片间的通信机制或协议。请注意，不同区块链可能采用不同形式的分片技术。


    举例来说，你可以针对特定场景选择合适的分片技术。例如，一种方案要求每个分片包含多个独立账户。换句话说，每个独立账户归属于某个分片（这更适用于以太坊这类有状态的区块链），同一分片内的账户之间极易进行交易。显然，要实现分片功能，还需要在分片级别进行额外的抽象提取，而节点仅需保存部分信息。


    ## 本章小结


    在本章中，我们深入探讨了密码学、博弈论和计算机科学工程的核心基础原理。所学的概念将帮助你设计出满足特定需求的区块链解决方案。区块链绝非解决所有问题的银弹。然而，在真正需要区块链的场景下，很可能需要根据不同设计构造，采用不同风格的解决方案。


    我们学习了多种用于保障交易安全的密码学技术，以及哈希函数的实用价值，探讨了如何利用博弈论设计稳健的解决方案，并掌握了区块链数据结构、默克尔树等计算机科学核心基础。部分概念附有示例代码片段，可助你快速上手区块链相关任务。


    下一章，我们将学习比特币这一区块链应用案例及其具体运作原理。


    # 3. 比特币如何运作


    多亏了比特币，区块链技术如今风靡一时！我们所熟知的区块链，是比特币及其发明者中本聪献给全世界的礼物。如果你好奇中本聪是谁，这是化名，背后是创建比特币的未知个人或团体。建议你无需追查发明者身份，而是理解并欣赏比特币背后精妙的技术。学习比特币的技术基础，将使你能够理解市场上其他区块链应用。


    由于比特币多年来已证明了区块链技术的稳健性，人们如今对其充满信心，并开始探索其他可能的应用方式。上一章我们已经初步了解了区块链在技术层面的运作方式，但学习比特币能让你真正领略区块链的魅力。你可以将比特币视为区块链技术的一个加密货币应用案例。因此，本章不仅帮助你理解比特币的具体运作方式，还能让你了解如何像比特币一样，利用区块链技术构建不同的应用场景。


    本章将详细讲解比特币，在此过程中，许多区块链基础原理也将通过更多实战视角得到阐明。如果你已熟悉比特币基础，可以跳过本章；否则，建议按顺序学习本章内容。本章将解释比特币是什么、其技术设计原理，并分析其固有的优势与不足。

