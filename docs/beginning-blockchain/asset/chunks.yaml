  trans: '

    #### 数字签名算法


    `DSA`由美国国家安全局（NSA）设计，作为数字签名标准（`DSS`）的一部分，并由美国国家标准与技术研究院（NIST）标准化。请注意，其主要目标是数字签名消息，而非加密。换句话说，`RSA`既可用于密钥管理也可用于身份验证，而`DSA`仅用于身份验证。此外，与基于大数因子分解的`RSA`不同，`DSA`基于离散对数。从高层来看，`DSA`的使用方式如图
    2-15 所示。


    ![A440588_1_En_2_Fig15_HTML.jpg](img/A440588_1_En_2_Fig15_HTML.jpg)


    图 2-15


    数字签名算法（`DSA`）


    如图 2-15 所示，消息先被哈希处理，然后再进行签名，因为这样比先签名再哈希更安全。理想情况下，你希望在执行其他操作之前先验证真实性。因此，在消息签名后，签名的哈希值会与消息一起标记并发送给接收方。接收方随后可以检查真实性并获取哈希值，同时对消息进行哈希处理以再次得到哈希值，并检查两个哈希值是否匹配。通过这种方式，`DSA`提供了以下安全特性：


    -   **真实性**：由私钥签名，并由公钥验证。

    -   **数据完整性**：若数据被篡改，哈希值将不匹配。

    -   **不可否认性**：由于发送方进行了签名，他们之后无法否认自己发送过该消息。在数据交换可能引发争议的情况下，不可否认性是最理想的特性。例如，一旦电子订单下达，若在此情况下启用了不可否认性，购买方就无法否认该采购订单。


    一个典型的`DSA`方案包含三种算法：(1) 密钥生成，(2) 签名生成，以及 (3) 签名验证。


    #### 椭圆曲线密码学


    椭圆曲线密码学（`ECC`）实际上是从 Diffie-Hellman 密码学发展而来的。它被发现是一种实现公钥密码学的替代机制。它实际上指的是一套密码协议，并像`DSA`一样基于离散对数问题。然而，人们认为离散对数问题在应用于椭圆曲线上的点时难度更大。因此，对于给定的密钥大小，`ECC`提供了更高的安全性。一个
    160 位的`ECC`密钥被认为与 1024 位的`RSA`密钥同样安全。由于`ECC`中较小的密钥大小能比其他公钥算法提供更高的安全性和性能，它被广泛应用于小型嵌入式设备、传感器及其他物联网设备等。目前已有针对`ECC`的极其高效的硬件实现方案。


    `ECC`基于有限域上椭圆曲线的一组数学相关数值。而且，它和椭圆形状毫无关系！从数学上讲，椭圆曲线满足以下数学方程：


    ```

    y² = x³ + ax + b，其中 4 a³ + 27 b² ≠ 0

    ```


    随着`a`和`b`值的不同，曲线会呈现出如下图中所示的不同形状：


    ![A440588_1_En_2_Figi_HTML.jpg](img/A440588_1_En_2_Figi_HTML.jpg)


    密码学中使用的椭圆曲线有几个重要特性，例如：


    -   它们呈水平对称。也就是说，X 轴下方的部分与上方的部分互为镜像。因此，曲线上任意一点相对于 X 轴反射后，仍位于曲线上。

    -   任何非垂直直线最多能与曲线相交于三个点。

    -   如果你在椭圆曲线上选取两个点`P`和`Q`，并通过它们画一条直线，该直线可能会与曲线恰好再多相交于一点。我们将其称为（`-R`）。如果通过（`-R`）画一条垂直线，它将与曲线相交于一点，我们称之为`R`，它是点（`-R`）的反射。那么，第三个属性意味着`P
    + Q = R`。这被称为“点加法”，即椭圆曲线上的两个点相加，会得到该曲线上的另一个点。请参考下图以直观理解这三个属性。


    ![A440588_1_En_2_Figj_HTML.jpg](img/A440588_1_En_2_Figj_HTML.jpg)


    -   因此，你可以对曲线上的任意两点应用点加法。在上一个要点中，我们对`P`和`Q`执行了点加法（`P + Q`），找到了`-R`，并最终得到了`R`。一旦我们得到`R`，就可以从`P`到`R`画一条直线，该直线会再次与曲线相交于第三点。然后，我们可以取那个点，并沿垂直线移动，直到它再次与曲线相交。这就变成了对点`P`和`R`的点加法。对于一个固定的`P`，这个反复得出新点的过程可以无限继续下去，我们也会持续在曲线上得到新的点。

    -   现在，如果不是两个点`P`和`Q`，而是对同一个点`P`（即`P`和`P`，称为“点加倍”）应用这个操作呢？显然，通过`P`点可以有无数条直线，因此我们只考虑切线。该切线将与曲线再多相交一点，从该点引出的垂直线将再次与曲线相交，从而得到最终的值。具体表示如下：


    ![A440588_1_En_2_Figk_HTML.jpg](img/A440588_1_En_2_Figk_HTML.jpg)


    -   很明显，我们可以对初始点应用`n`次点加倍，每次都会引导我们到达曲线上的一个不同点。如图所示，第一次对点`P`应用点加倍时，我们得到了结果点`2P`。现在，如果重复这个过程`n`次，我们将会到达曲线上的一个点，如下图中所示：


    ![A440588_1_En_2_Figl_HTML.jpg](img/A440588_1_En_2_Figl_HTML.jpg)

    '
- fmt: '在所述场景中，当给定初始点和最终点时，除了逐一尝试所有可能的`n`之外，无法判断点倍运算被应用了多少次（`n`）才到达最终结果点。这就是椭圆曲线密码学中的离散对数问题，它指出：给定点`G`和`Q`（其中`Q`是`G`的倍数），求`d`使得`Q
    = dG`。这构成了一个没有捷径的单向函数。此处，`Q`是公钥，`d`是私钥。你能从公钥`Q`中提取出私钥`d`吗？这就是椭圆曲线离散对数问题，在计算上难以求解。


    此外，曲线必须定义在一个有限域上，并且不能趋于无穷大！这意味着`X`轴上的“最大值”必须被限制在某个值，因此当达到最大值时，我们只需将值翻转。在椭圆曲线密码学（ECC）系统中，这个值用`P`表示（并非此处图表中使用的`P`），被称为“模数”值，它也定义了密钥长度，从而定义了有限域。在许多ECC实现中，`P`会选择一个质数。


    - 增大`P`的规模会使曲线上可用的值增多，从而提供更高的安全性。

    - 我们观察到，点加法和点倍运算是寻找用于加密和解密的数值的基础。


    因此，为了定义一个ECC系统，需要定义以下域参数：


    - 曲线方程：`y² = x³ + ax + b`，其中`4a³ + 27b² ≠ 0`

    - `P`：质数，指定曲线所在的有限域（模数值）

    - `a`和`b`：定义椭圆曲线的系数

    - `G`：曲线上的基点或生成点。所有点运算都从该点开始，并且它定义了循环子群。

    - `n`：曲线上直到结果线变为垂直时的点运算次数。即`G`的阶，也就是使得`nG = ∞`的最小正数。它通常是质数。

    - `h`：称为“余因子”，等于曲线的阶除以`n`。它是一个整数值，通常接近1。


    请注意，ECC是生成密钥的优秀技术，但它需要与其他技术结合使用以实现数字签名和密钥交换。例如，椭圆曲线迪菲-赫尔曼（ECDH）广泛用于密钥交换，而椭圆曲线数字签名算法（ECDSA）则用于数字签名。


    ## 椭圆曲线数字签名算法


    ECDSA是一种使用ECC进行密钥生成的数字签名算法（DSA）。顾名思义，它的目的是数字签名，而非加密。在更小的密钥尺寸、更高的安全性和更优的性能方面，ECDSA可以成为RSA的一个更好的替代方案。它是比特币中使用的最重要的密码学组件之一！


    我们已经了解了数字签名如何用于在发送方和接收方之间建立信任。由于可以通过数字签名验证发送方的真实性和消息的完整性，两个未知方可以相互进行交易。请注意，发送方和接收方在开始通信前必须就域参数达成一致。


    ECDSA大致包含三个步骤：密钥生成、签名生成和签名验证。


    ### 密钥生成


    由于域参数（`P`、`a`、`b`、`G`、`n`、`h`）是预先设定的，双方都已知曲线和基点。此外，使其成为有限域的质数`P`也是已知的（`P`通常是160位，也可能更大）。因此，发送方（例如Alice）按以下步骤生成密钥：


    - 在区间`[1, n - 1]`内选择一个随机整数`d`

    - 计算`Q = dG`

    - 声明`Q`为公钥，并将`d`作为私钥妥善保管


    ### 签名生成


    密钥生成后，发送方Alice将使用私钥`d`对消息（`m`）进行签名。她将按指定顺序执行以下步骤来生成签名：


    - 在区间`[1, n - 1]`内选择一个随机数`k`

    - 计算`k.G`，得到新坐标`(x[1], y[1])`，并计算`r = x[1] mod n`

    - 如果`r = 0`，则从头重新开始

    - 计算`e = SHA-1(m)`

    - 计算`s = k^(-1)(e + d.r) mod n`

    - 如果`s = 0`，则从第一步重新开始

    - Alice对消息`m`的签名现在为`(r, s)`


    ### 签名验证


    假设Bob是接收方，他可以访问域参数和发送方Alice的公钥`Q`。作为安全措施，Bob应首先验证他拥有的数据——即域参数、签名和Alice的公钥`Q`——全部有效。为了验证Alice对消息（`m`）的签名，Bob将按指定顺序执行以下操作：


    - 验证`r`和`s`是区间`[1, n - 1]`内的整数

    - 计算`e = SHA-1(m)`

    - 计算`w = s^(-1) mod n`

    - 计算`u[1] = ew mod n` 和 `u[2] = rw mod n`

    - 计算`X = u[1]G + u[2]G`，其中`X`代表坐标，例如`(x[2], y[2])`

    - 计算`v = x[1] mod n`

    - 如果`r = v`则接受签名，否则拒绝


    在本节中，我们了解了ECDSA背后的数学原理。回想一下，我们在生成密钥和签名时都使用了随机数。确保生成的随机数实际上是密码学意义上的随机数至关重要。在许多用例中，使用160位ECDSA，因为它需要与SHA-1哈希函数匹配。


    在众多用例中，ECDSA被用于数字证书。在最简单的形式中，数字证书是一个公钥，与设备ID和证书过期日期捆绑在一起。这样，证书使我们能够检查并确认公钥属于谁，以及所考虑的设备是否是网络的合法成员。这些证书对于防止密钥建立协议中的“冒充攻击”非常重要。许多TLS证书都是基于ECDSA密钥对，并且这种用法正在持续增长。'
  raw: '*   In the aforementioned scenario, when the initial and final point is given,
    there is no way one can say that the point doubling was applied “n” number of
    times to reach the final resulting point except trying for all possible “n” one
    by one. This is the discrete logarithm problem for ECC, where it states that given
    a point G and Q, where Q is a multiple of G, find “d” such that Q = d G. This
    forms the one-way function with no shortcuts. Here, Q is the public key and d
    is the private key. Can you extract private key d from public key Q? This is the
    elliptic curve discrete logarithm problem, which is computationally difficult
    to solve.

    *   Further to this, the curve should be defined over a finite field and not take
    us to infinity! This means the “max” value on the X-axis has to be limited to
    some value, so just roll the values over when we hit the maximum. This value is
    represented as P (not the P used in the graphs here) in the ECC cryptosystem and
    is called "modulo” value, and it also defines the key size, hence the finite field.
    In many implementations of ECC, a prime number for “P” is chosen.

    *   Increased size of “P” results in more usable values on the curve, hence more
    security.

    *   We observed that point addition and point doubling form the basis for finding
    the values that are used for encryption and decryption.


    So, in order to define an ECC, the following domain parameters need to be defined:


    *   The Curve Equation: y² = x³ + ax + b, where 4 a³ + 27 b² ≠ 0

    *   P: The prime number, which specifies the finite field that the curve will
    be defined over (modulo value)

    *   a and b: Coefficients that define the elliptic curve

    *   G: Base point or the generator point on the curve. This is the point where
    all the point operations begin and it defines the cyclic subgroup.

    *   n: The number of point operations on the curve until the resultant line is
    vertical. So, it is the order of G, i.e., the smallest positive number such that
    nG = ∞. It is normally prime.

    *   h: It is called “cofactor,” which is equal to the order of the curve divided
    by n. It is an integer value and usually close to 1.


    Note that ECC is a great technique to generate the keys, but is used alongside
    other techniques for digital signatures and key exchange. For example, Elliptic
    Curve Diffie-Hellman (ECDH) is quite popularly used for key exchange and ECDSA
    is used for digital signatures.


    #### Elliptic Curve Digital Signature Algorithm


    The ECDSA is a type of DSA that uses ECC for key generation. As the name suggests,
    its purpose is digital signature, and not encryption. ECDSA can be a better alternative
    to RSA in terms of smaller key size, better security, and higher performance.
    It is one of the most important cryptographic components used in Bitcoins!


    We already looked at how digital signatures are used to establish trust between
    the sender and receiver. Since authenticity of the sender and integrity of the
    message can be verified through digital signatures, two unknown parties can transact
    with each other. Note that the sender and the receiver have to agree on the domain
    parameters before engaging in the communication.


    There are broadly three steps to ECDSA: key generation, signature generation,
    and signature verification.


    ##### Key Generation


    Since the domain parameters (P, a, b, G, n, h) are preestablished, the curve and
    the base point are known by both parties. Also, the prime P that makes it a finite
    field is also known (P is usually 160 bits and can be greater as well). So, the
    sender, say, Alice does the following to generate the keys :


    *   Select a random integer d in the interval [1, n − 1]

    *   Compute Q = d G

    *   Declare Q is the public key and keep d as the private key.


    ##### Signature Generation


    Once the keys are generated, Alice, the sender, would use the private key “d”
    to sign the message (m). So, she would perform the following steps in the order
    specified to generate the signature:


    *   Select a random number k in the interval [1, n − 1]

    *   Compute k.G and find the new coordinates (x[1], y[1]) and find r = x[1] mod
    n


    If r = 0, then start all over again


    *   Compute e = SHA-1 (m)

    *   Compute s = k ^(−1) (e + d . r) mod n


    If s = 0, then start all over again from the first step


    *   Alice’s signature for the message (m) would now be (r, s)


    ##### Signature Verification


    Let us say Bob is the receiver here and has access to the domain parameters and
    the public key Q of the sender Alice. As a security measure, Bob should first
    verify that the data he has, which is the domain parameters, the signature, and
    Alice’s public key Q are all valid. To verify Alice’s signature on the message
    (m), Bob would perform the following operations in the order specified:


    *   Verify that r and s are integers in the interval [1, n − 1]

    *   Compute e = SHA-1 (m)

    *   Compute w = s ^(−1) mod n

    *   Compute u[1] = e w mod n, and u[2] = r w mod n

    *   Compute X = u[1] G + u[2] G, where X represents the coordinates, say (x[2],
    y[2])

    *   Compute v = x[1] mod n

    *   Accept the signature if r = v, otherwise reject it


    In this section, we looked at the math behind ECDSA. Recollect that we used a
    random number while generating the key and the signature. It is extremely important
    to ensure that the random numbers generated are actually cryptographically random.
    In many use cases, 160-bit ECDSA is used because it has to match with the SHA-1
    hash function.


    Out of so many use cases, ECDSA is used in digital certificates. In its simplest
    form, a digital certificate is a public key, bundled with the device ID and the
    certificate expiration date. This way, certificates enable us to check and confirm
    to whom the public key belongs and the device is a legitimate member of the network
    under consideration . These certificates are very important to prevent “impersonation
    attack” in key establishment protocols. Many TLS certificates are based on ECDSA
    key pair and this usage continues to grow.'
