  trans: '

    ### 区块链交易


    当我们谈论区块链时，指的是交易的区块链，对吧？因此，整个过程始于一笔交易，该交易会经历一系列步骤，最终被记录在区块链中。由于区块链是一种点对点的现象，如果你处理的用例每秒涉及大量交易，你可能不希望让所有交易都充斥整个网络。显然，当个人或实体发起交易时，他们只需将其广播到整个网络。一旦完成广播，交易必须由多个节点进行验证。验证通过后，它需要再次广播到整个网络，以便该交易被纳入区块链。


    那么，为什么不采用交易链而非区块链呢？如果你的业务场景不涉及大量交易，这在某种程度上可能是合理的。然而，如果每秒有海量交易发生，那么在交易层面进行哈希运算、保留其踪迹，并将其广播到网络中，可能会导致系统不稳定。你可能希望将一定数量的交易分组到一个区块中，然后广播该区块。广播单个交易可能会变得成本高昂。


    另一个使用区块链而非交易链的重要原因是防止女巫攻击。在第 3 章中，你将更详细地了解 PoW 挖矿算法是如何运作的，以及如何随机选择一个节点来提议区块。如果不是这样，人们可能会创建自己节点的副本以破坏系统。


    在最简化的形式下，区块链交易通过以下步骤被纳入区块链：


    - 每笔新交易都会被广播到网络中，以便所有计算节点在交易发生时知晓该事实（以确保系统具有双花防护能力）。

    - 交易可能会由节点通过检查其真实性进行验证，以决定接受或拒绝。

    - 随后，节点可能会将多笔交易分组形成区块，并与网络中的其他节点共享。

    - 此时便遇到了难点：谁来提议这些由各节点自行分组的交易区块？广义上讲，新区块的生成应受到控制，但不能采用中心化方式，且机制应确保每个节点拥有平等优先级。所有节点就某个区块达成一致的过程被称为共识，但根据你的用例，存在不同的算法来实现这一目标。我们将在下一节讨论不同的共识机制。

    - 尽管由于网络延迟、数据包丢失和地理位置等因素，不存在全局时间的概念，但此类系统仍然能够运行，因为区块是按顺序逐一添加的。因此，我们可以认为区块按照它们到达的顺序被打上时间戳，并被添加到区块链中。

    - 一旦网络中的节点一致接受某个区块，该区块就会被纳入区块链，并且它包含前一个区块的哈希值。这样一来，区块链便会延长一个区块。


    我们已经讨论过区块链的数据结构和默克尔树，因此现在能理解它们的价值了。回想一下，当节点需要验证一笔交易时，它可以通过默克尔路径更高效地完成验证。网络中的其他节点无需共享完整的区块数据来证明某笔交易在一个区块中的成员资格。从技术上讲，`“布隆过滤器”`
    这类内存高效且对计算机友好的数据结构在此类场景中被广泛用于测试成员资格。


    此外，请注意，为了能够验证交易，节点理想情况下应在本地拥有完整的区块链数据（交易及其元数据）。你应该根据用例选择一个高效的存储机制，供节点采用。


    ### 分布式共识机制


    当节点通过本地保存完整区块链数据的副本以知晓整个交易历史，从而防止双花，并且能够通过数字签名验证交易的真实性时，共识的作用又是什么？想象一下存在一个或多个恶意节点的情况。难道它们不能把无效交易说成有效交易，或者反过来吗？回想一下拜占庭将军问题，这在许多去中心化系统中极有可能发生。为了克服此类问题，我们需要建立适当的共识机制。


    到目前为止，我们讨论中尚不明确的一点是：谁来提议区块？显然，并非所有节点都应同时向其他节点提议区块，因为这只会制造混乱，更别提要保持账本状态的一致性了。另一方面，如果只是交易而没有将它们分组为区块，你可能会辩称：如果每笔交易都被广播到整个网络，并且网络中的每个节点都对这些单独的交易进行投票，这只会使系统复杂化，并导致性能低下。


    因此，出于显而易见的原因，将交易分组为区块非常重要，并且需要基于每个区块达成共识。解决此问题的最佳策略是：一次只应有一个节点提议一个区块，其余节点应验证该区块中的交易，如果交易有效，则将其添加到各自的区块链中。我们知道每个节点都维护着自己的账本副本，并且没有用于同步的中央来源。因此，如果任何一个节点提议一个区块，而其余节点都同意它，那么所有这些节点都会将该区块添加到各自的区块链中。在这种设计中，你倾向于区块创建之间至少有几分钟的间隔，而不应出现多个区块同时到达的情况。现在的问题是：谁可能是那个幸运的节点来提议区块？这是最棘手的部分，也可能导致适当的共识；我们将在不同的共识机制下讨论这一方面。


    这些共识机制实际上源于博弈论。你的系统设计应确保节点在遵守规则时能获得最大收益。确保节点诚实行为的一个方面是奖励诚实行为，惩罚欺诈活动。然而，这里有一个陷阱。在像比特币这样的公有区块链中，一个人可以拥有许多不同的公共身份，而且这些身份是相当匿名的。惩罚此类身份变得非常困难，因为它们可以选择为自己创建新身份来规避惩罚。另一方面，奖励它们效果很好，因为即使有人拥有多个身份，他们也可以愉快地接受给予他们的奖励。因此，这取决于你的业务场景：如果身份是匿名的，那么惩罚可能不起作用，但如果身份不是匿名的，则可能效果良好。尽管有很好的机制来选择提议下一个区块的节点，你仍可能要考虑这种奖励/惩罚的方面。这是因为你永远无法预先知道所选节点是恶意节点还是诚实节点。请记住我们可能经常使用的术语`挖矿`，它指的是生成新区块。


    共识的目标还在于确保网络足够健壮，能够抵御各种类型的攻击。无论根据用例选择何种共识算法，它都必须符合拜占庭容错共识的框架才能被接受。现在让我们学习一些与区块链场景相关的共识机制，我们可能在不同的情况下使用它们。

    '
- fmt: '### Proof of Work


    The `PoW` consensus mechanism has been around for a long time now. However, the
    way it was used in Bitcoin along with other concepts made it even more popular.
    We will discuss this consensus mechanism at its basic level and look at how it
    is implemented in Bitcoin in Chapter [3](#A440588_1_En_3_Chapter.html).


    The idea behind the `PoW` algorithm is that certain work is done for a block of
    transactions before it gets proposed to the whole network. A `PoW` is actually
    a piece of data that is difficult to produce in terms of computation and time,
    but easy to verify. One of the old usages of `PoW` was to prevent email spams.
    If a certain amount of work is to be done before one can send an email, then spamming
    a lot of people would require a lot of computation to be performed. This can help
    prevent email spams. Similarly, in blockchain as well, if some amount of compute-intensive
    work is to be performed before producing a block, then it can help in two ways:
    one is that it will definitely take some time and the second is, if a node is
    trying to inject a fraudulent transaction in a block, then rejection of that block
    by the rest of the nodes will be very costly for the one proposing the block.
    This is because the computation performed to get the `PoW` will have no value.


    Just think about proposing a block without much of effort vs. doing some hard
    work to be able to propose a block. If it was with almost no effort, then proposing
    a node with a fraudulent transaction and getting rejected would not have been
    a big concern. People may just keep proposing such blocks with a hope that one
    may get through and make it to the blockchain sometime. On the contrary, doing
    some hard work to propose a block prevents a node from injecting a fraudulent
    transaction in a subtle way.


    Also, the difficulty of the work should be adjustable so that there is a control
    over how fast the blocks can get generated. You must be thinking, if we are talking
    about some work that requires some computation and time, what kind of work must
    it be? It is very simple yet tricky work. An example would help here. Imagine
    a problem where you have to find a number which, if you hash, the hashed output
    would start with the alphabet “a.” How would you do it? We have learned about
    the hash functions and know that there are no shortcuts to it. So you would just
    keep guessing (maybe take any number and keep incrementing by one) the numbers
    and keep hashing them to see if that fits the bill. If the difficulty level needs
    to be increased, then one can say it starts with three consecutive “a”s. Obviously,
    finding a solution for something like “axxxxxxx” is easier to find compared with
    “aaaxxxxx” because the latter is more constrained.


    In the example just given, if multiple different nodes are working to solve such
    a computational puzzle, then you will never know which node would solve it first.
    This can be leveraged to select a random node (this time it is truly random because
    there is no algorithm behind it) that solves the puzzle and proposes the block.
    It is extremely important to note that in case of public blockchains, the nodes
    that are investing their computing resources have to be rewarded for honest behavior,
    else it would be difficult to sustain such a system.


    ### Proof of Stake


    The `Proof of Stake` (`PoS`) algorithm is another consensus algorithm that is
    quite popular for distributed consensus. However, what is tricky about it is that
    it isn’t about mining, but is about validating blocks of transactions. There are
    no mining rewards due to generation of new coins, there are only transaction fees
    for the miners (more accurately validators, but we will keep using ‘miners’ so
    it gets easier to explain).


    In `PoS` systems, the validators have to bond their stake (mortgage the amount
    of cryptocurrency they would like to keep at stake) to be able to participate
    in validating the transactions. The probability of a validator producing a block
    is proportional to their stake; the more the amount at stake, the greater is their
    chance to validate a new block of transactions. A miner only needs to prove they
    own a certain percentage of all coins available at a certain time in a given currency
    system. For example, if a miner owns 2% of all Ether (`ETH`) in the Ethereum network,
    they would be able to mine 2% of all transactions across Ethereum. Accordingly,
    who gets to create the new block of transaction is decided, and it varies based
    on the `PoS` algorithm you are using. Yes, there are variants of `PoS` algorithm
    such as naive `PoS`, delegated `PoS`, chain-based `PoS`, `BFT-style PoS`, and
    `Casper PoS`, to name a few. `Delegated PoS` (`DPOS`) is used by Bitshares and
    `Casper PoS` is being developed to be used in Ethereum.


    Since the creator of a block in a `PoS` system is deterministic (based on the
    amount at stake), it works much faster compared with `PoW` systems. Also, since
    there are no block rewards and just transaction fees, all the digital currencies
    need to be created in the beginning and their total amount is fixed all through.


    The `PoS` systems may provide better protection against malicious attacks because
    executing an attack would risk the entire amount at stake. Also, since it does
    not require burning a lot of electricity and consuming CPU cycles, it gets priority
    over `PoW` systems where applicable.


    ### PBFT


    `PBFT` is the acronym for the `Practical Byzantine Fault Tolerance` algorithm,
    one of the many consensus algorithms that one can consider for their blockchain
    use case. Out of so many blockchain initiatives, Hyperledger, Stellar, and Ripple
    are the ones that use `PBFT` consensus.


    `PBFT` is also an algorithm that is not used to generate mining rewards, similar
    to `PoS` algorithms. However, the technicalities in their respective implementations
    are different. The inner working of `PBFT` is beyond the scope of this book, but
    at a high level, requests are broadcast to all participating nodes that have their
    own replicas or internal states. When nodes receive a request, they perform the
    computation based on their internal states. The outcome of the computation is
    then shared with all other nodes in the system. So, every node is aware of what
    other nodes are computing. Considering their own computation results along with
    the ones received from other nodes, they make a decision and commit to a final
    value, which is again shared across the nodes. At this moment, every node is aware
    of the final decision of all other nodes. Then they all respond with their final
    decisions and, based on the majority, the final consensus is achieved. This is
    demonstrated in Figure [2-24](#A440588_1_En_2_Chapter.html#Fig24).


    ![A440588_1_En_2_Fig24_HTML.jpg](A440588_1_En_2_Fig24_HTML.jpg)


    Figure 2-24

    PBFT consensus approach


    `PBFT` can be efficient compared with other consensus algorithms, based on the
    effort required. However, anonymity in the system may be compromised because of
    the way this algorithm is designed. It is one of the most widely used algorithms
    for consensus even in non-blockchain environments.'
  raw: '#### Proof of Work


    The PoW consensus mechanism has been around for a long time now. However, the
    way it was used in Bitcoin along with other concepts made it even more popular.
    We will discuss this consensus mechanism at its basic level and look at how it
    is implemented in Bitcoin in Chapter [3](#A440588_1_En_3_Chapter.html).


    The idea behind the PoW algorithm is that certain work is done for a block of
    transactions before it gets proposed to the whole network. A PoW is actually a
    piece of data that is difficult to produce in terms of computation and time, but
    easy to verify. One of the old usages of PoW was to prevent email spams. If a
    certain amount of work is to be done before one can send an email, then spamming
    a lot of people would require a lot of computation to be performed. This can help
    prevent email spams. Similarly, in blockchain as well, if some amount of compute-intensive
    work is to be performed before producing a block, then it can help in two ways:
    one is that it will definitely take some time and the second is, if a node is
    trying to inject a fraudulent transaction in a block, then rejection of that block
    by the rest of the nodes will be very costly for the one proposing the block.
    This is because the computation performed to get the PoW will have no value.


    Just think about proposing a block without much of effort vs. doing some hard
    work to be able to propose a block. If it was with almost no effort, then proposing
    a node with a fraudulent transaction and getting rejected would not have been
    a big concern. People may just keep proposing such blocks with a hope that one
    may get through and make it to the blockchain sometime. On the contrary, doing
    some hard work to propose a block prevents a node from injecting a fraudulent
    transaction in a subtle way.


    Also, the difficulty of the work should be adjustable so that there is a control
    over how fast the blocks can get generated. You must be thinking, if we are talking
    about some work that requires some computation and time, what kind of work must
    it be? It is very simple yet tricky work. An example would help here. Imagine
    a problem where you have to find a number which, if you hash, the hashed output
    would start with the alphabet “a.” How would you do it? We have learned about
    the hash functions and know that there are no shortcuts to it. So you would just
    keep guessing (maybe take any number and keep incrementing by one) the numbers
    and keep hashing them to see if that fits the bill. If the difficulty level needs
    to be increased, then one can say it starts with three consecutive “a”s. Obviously,
    finding a solution for something like “axxxxxxx” is easier to find compared with
    “aaaxxxxx” because the latter is more constrained.


    In the example just given, if multiple different nodes are working to solve such
    a computational puzzle , then you will never know which node would solve it first.
    This can be leveraged to select a random node (this time it is truly random because
    there is no algorithm behind it) that solves the puzzle and proposes the block.
    It is extremely important to note that in case of public blockchains, the nodes
    that are investing their computing resources have to be rewarded for honest behavior
    , else it would be difficult to sustain such a system.


    #### Proof of Stake


    The Proof of Stake (PoS) algorithm is another consensus algorithm that is quite
    popular for distributed consensus. However, what is tricky about it is that it
    isn’t about mining, but is about validating blocks of transactions. There are
    no mining rewards due to generation of new coins, there are only transaction fees
    for the miners (more accurately validators, but we will keep using ‘miners’ so
    it gets easier to explain).


    In PoS systems, the validators have to bond their stake (mortgage the amount of
    cryptocurrency thay would like to keep at stake) to be able to participate in
    validating the transactions. The probability of a validator producing a block
    is proportional to their stake; the more the amount at stake, the greater is their
    chance to validate a new block of transactions. A miner only needs to prove they
    own a certain percentage of all coins available at a certain time in a given currency
    system. For example, if a miner owns 2% of all Ether (ETH) in the Ethereum network,
    they would be able to mine 2% of all transactions across Ethereum. Accordingly,
    who gets to create the new block of transaction is decided, and it varies based
    on the PoS algorithm you are using. Yes, there are variants of PoS algorithm such
    as naive PoS, delegated PoS, chain-based PoS, BFT-style PoS, and Casper PoS, to
    name a few. Delegated PoS (DPOS) is used by Bitshares and Casper PoS is being
    developed to be used in Ethereum.


    Since the creator of a block in a PoS system is deterministic (based on the amount
    at stake), it works much faster compared with PoW systems. Also, since there are
    no block rewards and just transaction fees, all the digital currencies need to
    be created in the beginning and their total amount is fixed all through.


    The PoS systems may provide better protection against malicious attacks because
    executing an attack would risk the entire amount at stake. Also, since it does
    not require burning a lot of electricity and consuming CPU cycles, it gets priority
    over PoW systems where applicable.


    #### PBFT


    PBFT is the acronym for the Practical Byzantine Fault Tollerance algorithm, one
    of the many consensus algorithms that one can consider for their blockchain use
    case. Out of so many blockchain initiatives, Hyperledger, Stellar, and Ripple
    are the ones that use PBFT consensus.


    PBFT is also an algorithm that is not used to generate mining rewards, similar
    to PoS algorithms. However, the technicalities in their respective implementations
    are different. The inner working of PBFT is beyond the scope of this book, but
    at a high level, requests are broadcast to all participating nodes that have their
    own replicas or internal states. When nodes receive a request, they perform the
    computation based on their internal states. The outcome of the computation is
    then shared with all other nodes in the system. So, every node is aware of what
    other nodes are computing. Considering their own computation results along with
    the ones received from ther nodes, they make a decision and commit to a final
    value, which is again shared across the nodes. At this moment, every node is aware
    of the final decision of all other nodes. Then they all respond with their final
    decisions and, based on the majority, the final consensus is achieved. This is
    demonstrated in Figure [2-24](#A440588_1_En_2_Chapter.html#Fig24).


    ![A440588_1_En_2_Fig24_HTML.jpg](A440588_1_En_2_Fig24_HTML.jpg)


    Figure 2-24


    PBFT consensus approach


    PBFT can be efficient compared with other consensus algorithms, based on the effort
    required. However, anonymity in the system may be compromised because of the way
    this algorithm is designed. It is one of the most widely used algorithms for consensus
    even in non-blockchain environments .'
  trans: '

    ### 工作量证明（Proof of Work）


    `PoW` 共识机制已经存在了相当长的时间。然而，它在比特币中的使用方式，加上其他概念的引入，使其变得更加流行。我们将在基础层面讨论这一共识机制，并在第 3
    章中考察它在比特币中的实现方式。


    `PoW` 算法背后的理念是：在将一组交易区块提交给整个网络之前，需要为该区块完成一定的工作量。`PoW` 实际上是一段数据，它在计算和时间层面难以生成，但易于验证。`PoW`
    的旧用途之一是防止垃圾邮件。如果在发送一封邮件之前必须完成一定的工作量，那么向大量人群发送垃圾邮件就需要执行大量的计算。这有助于阻止垃圾邮件。同样，在区块链中，如果在生成一个区块之前需要执行一定量的计算密集型工作，那么这可以在两方面发挥作用：一是这肯定会耗费一些时间；二是，如果某个节点试图向一个区块中注入欺诈交易，那么该区块被其他节点拒绝，对于提出该区块的节点来说代价将非常高昂。这是因为为获得
    `PoW` 所执行的计算将变得毫无价值。


    试想一下，几乎不费什么力气就提出一个区块，与付出艰苦努力才能提出一个区块之间的区别。如果几乎不需要什么努力，那么提出一个包含欺诈交易的区块并被拒绝，就不会是什么大问题。人们可能会一直抱着侥幸心理提出这样的区块，期望某个时候能通过并成功上链。相反，为提出一个区块付出艰苦努力，能够以一种巧妙的方式防止节点注入欺诈交易。


    此外，工作的难度应该是可调整的，这样才能控制区块生成的速度。你一定在想，如果我们讨论的是需要一定计算和时间的工作，那它到底是一种什么样的工作呢？这是一项非常简单但巧妙的任务。这里举个例子可以帮助理解。想象一个问题：你需要找到一个数字，对该数字进行哈希运算后，得到的哈希输出必须以字母“a”开头。你会怎么做？我们已经了解了哈希函数，并且知道对此没有捷径可循。所以你只能不断地猜测（比如随便选一个数字，然后不断加一）数字，并对它们进行哈希运算，看看是否符合要求。如果需要提高难度，那么就可以规定哈希输出必须以三个连续的“a”开头。显然，找到类似“axxxxxxx”的解要比找到“aaaxxxxx”的解容易，因为后者约束更多。


    在上面的例子中，如果有多个不同的节点都在努力解决这样一个计算难题，那么你永远无法知道哪个节点会先解出来。这可以用来随机选择一个节点（这次是真正的随机，因为背后没有任何算法）来解出难题并提出区块。需要特别注意的是，在公有链的情况下，那些投入计算资源的节点必须因其诚实行为而获得奖励，否则这种系统将难以为继。


    ### 权益证明（Proof of Stake）


    `权益证明`（`PoS`）算法是另一种在分布式共识领域相当流行的共识算法。然而，它的巧妙之处在于，它与挖矿无关，而是与验证交易区块有关。这里没有因为生成新币而产生的挖矿奖励，矿工（更准确地说是验证者，但为了便于解释，我们将继续使用“矿工”一词）只能获得交易手续费。


    在`PoS`系统中，验证者需要质押他们的权益（抵押他们希望作为赌注的加密货币数量），才能参与验证交易。验证者生成一个区块的概率与其质押量成正比；质押的数额越大，他们验证新区块交易的可能性就越高。矿工只需要证明他们在特定时间点，在特定货币系统中，拥有所有可用货币的一定百分比即可。例如，如果一个矿工拥有以太坊网络中所有以太币（`ETH`）的
    2%，那么他就能挖到以太坊上所有交易的 2%。据此，系统决定由谁来创建新的交易区块，而这会根据你所使用的具体`PoS`算法而有所不同。是的，`PoS`算法有多种变体，例如朴素的`PoS`、委托`PoS`、基于链的`PoS`、`拜占庭容错风格的
    PoS`以及`Casper PoS`等等。`委托权益证明`（`DPOS`）被 Bitshares 采用，而`Casper PoS`正在被开发用于以太坊。


    由于在`PoS`系统中，区块的创建者是确定的（基于质押量），因此其工作速度比`PoW`系统快得多。同时，由于没有区块奖励，只有交易手续费，所有的数字货币都需要在系统初始时创建，并且其总量在整个过程中是固定的。


    `PoS`系统能更好地防御恶意攻击，因为发动攻击会危及全部的质押金额。此外，由于它不需要消耗大量电力和占用 CPU 周期，在适用的情况下，它比`PoW`系统更具优先性。


    ### PBFT


    `PBFT` 是 `实用拜占庭容错`（`Practical Byzantine Fault Tolerance`）算法的缩写，是为区块链用例可考虑的众多共识算法之一。在众多的区块链项目中，Hyperledger、Stellar
    和 Ripple 是采用 `PBFT` 共识的几个项目。


    与 `PoS` 算法类似，`PBFT` 也是一种不用于产生挖矿奖励的算法。然而，它们各自在实现细节上是不同的。`PBFT` 的内部工作原理超出了本书的讨论范围，但从高层次来看，请求会被广播到所有参与节点，这些节点都拥有各自的数据副本或内部状态。当节点收到请求时，它们会根据自身的内部状态执行计算。计算的结果随后会与系统中的所有其他节点共享。因此，每个节点都知晓其他节点正在计算什么。结合自身的计算结果以及其他节点传来的结果，它们会做出决策并提交一个最终值，该值会再次在节点间共享。此时，每个节点都知晓所有其他节点的最终决策。然后，所有节点都响应其最终决策，基于多数原则，达成最终共识。这如
    图 2-24 所示。


    ![A440588_1_En_2_Fig24_HTML.jpg](img/A440588_1_En_2_Fig24_HTML.jpg)


    图 2-24

    PBFT 共识方法


    基于所需的工作量，`PBFT` 可以比其他共识算法更高效。然而，由于该算法的设计方式，系统中的匿名性可能会受到损害。即使在非区块链环境中，它也是使用最广泛的共识算法之一。

    '
- fmt: '# Blockchain Applications


    While we looked at the nuts and bolts of blockchain throughout this chapter, it
    is also important that we look at how it is being used in building blockchain
    solutions. There are applications being built that treat blockchain as a backend
    database behind a web server, and there are applications that are completely decentralized
    with no centralized server. Bitcoin blockchain, for example, is a blockchain application
    where there is no server to send a request to! Every transaction is broadcast
    to the entire network. However, it is possible that a web application is built
    and hosted in a centralized web server, and that makes Bitcoin blockchain updates
    when required. Take a look at Figure [2-25](#A440588_1_En_2_Chapter.html#Fig25)
    where a Bitcoin node broadcasts the transactions to the nodes that are reachable
    at a given point in time.


    ![A440588_1_En_2_Fig25_HTML.jpg](A440588_1_En_2_Fig25_HTML.jpg)


    Figure 2-25


    Bitcoin blockchain nodes


    From a software application perspective, every node is self-sufficient and maintains
    its own copies of the blockchain database. Considering Bitcoin blockchain as a
    benchmark, the blockchain applications with no centralized servers appear to be
    the purest decentralized applications and most of them fall under the "public
    blockchain" category. Usually for such public blockchains, usage of resources
    from cloud service providers such as Microsoft Azure, IBM Bluemix, etc. are not
    quite popular yet. For most of the private blockchains, however, the cloud service
    providers have started to gain popularity. To give you an analogy, there could
    be one or more web applications for different departments or actors, all of them
    having their own Blockchain backends and still the blockchains are in sync with
    each other. In such a setting, though technical decentralization is achieved,
    politically it could still be centralized. Even though control or governance is
    enforced, the system is still able to maintain transparency and trust because
    of the accessibility to single source of truth. Take a look at Figure [2-26](#A440588_1_En_2_Chapter.html#Fig26),
    which may resemble most of the blockchain POCs or applications being built on
    blockchain where blockchains are hosted by some cloud service provider by consuming
    their `blockchain-as-a-Service` (`BaaS`) offering.


    ![A440588_1_En_2_Fig26_HTML.jpg](A440588_1_En_2_Fig26_HTML.jpg)


    Figure 2-26


    Cloud-powered blockchain system


    It may not be necessary that all the departments have their own different web
    application. One web application can handle requests from multiple different actors
    in the system with proper access control mechanisms. It might be a good idea that
    all the actors in the system have their own copies of blockchains. Having a local
    copy of blockchain not only helps maintain transparency in the system, but also
    may help generate data-driven insights with ready access to data all the time.
    The different "blockchains" maintained by different actors in the system are consistent
    by design, thanks to consensus algorithms such as `PoW`, `PoS`, etc. Most of the
    private blockchains prefer any consensus algorithm other than `PoW` to mitigate
    heavy resource consumption, and save electricity and computing power as much possible.
    The `PoS` consensus mechanism is quite common when it comes to private or consortium
    blockchains. Since blockchain is disrupting many aspects of businesses, and there
    was no better way of enabling transparency among them, creating a blockchain solution
    in the cloud with a "pay as you use" model is gaining momentum. Cloud services
    are helping businesses leapfrog in their blockchain-enabled digital transformation
    journey with minimal upfront investments.


    There are also decentralized applications (`DApps`) being built on Ethereum blockchain
    networks. These applications could be permissioned on private Ethereum or could
    be permissionless on a public Ethereum network. Also, these applications could
    be for different use cases on the same public Ethereum network. Though we will
    cover the Ethereum-specific details later in this book, just look at Figure [2-27](#A440588_1_En_2_Chapter.html#Fig27)
    for a high-level understanding of how those applications might look.


    ![A440588_1_En_2_Fig27_HTML.jpg](A440588_1_En_2_Fig27_HTML.jpg)


    Figure 2-27


    `DApps` on Ethereum network


    As discussed already in previous sections, developing blockchain applications
    is only limited by your imagination. Pure blockchain native applications could
    be built. Applications that treat blockchain as just a backend are also being
    built, and there are hybrid applications that are also being built that use the
    legacy applications and use blockchain for some specific purpose only. So far,
    blockchain scalability is one of the biggest concerns. Though the scalability
    itself is in research, let us learn some of the scalability techniques.


    ## Scaling Blockchain


    We looked at blockchain from a historic perspective and how it proves to be one
    of the most disruptive technologies as of today. While exploring it technically
    in this chapter, we learned about the scalability issues inherent to most of the
    Blockchain flavors. By design, blockchains are difficult to scale and thus a research
    area in academia and for some innovation-driven corporates. If you look at the
    Bitcoin adoption, it is not being used to replace fiat currencies due to the inherent
    scalability challenges. You cannot buy a coffee using Bitcoin and wait for an
    hour for the transaction to settle. So, Bitcoins are being used as an asset class
    for investors to invest in. A Bitcoin blockchain network is not capable of accommodating
    as many transactions as that of Visa or MasterCard, as of today.


    Recollect the consensus protocols we have studied so far, such as `PoW` of Bitcoins
    or Ethereum, or `PoS` and other `BFT` consensus of some other blockchain flavors
    such as Multichain, Hyperledger, Ripple, or Tendermint. All of these consensus
    algorithms'' primary objective is Byzantine fault tolerance. By design, every
    node (at least the full nodes) in a blockchain network maintains its own copy
    of the entire blockchain, validates all transactions and blocks, serves requests
    from other nodes in the network, etc. to achieve decentralization, which becomes
    a bottleneck for scalability. Look at the irony here — we add more servers in
    a centralized system for scalability, but the same does not apply in a decentralized
    system because with more number of nodes, the latency only increases. While the
    level of decentralization could increase with a greater number of nodes in a decentralized
    network, the number of transactions in the network also increases, which leads
    to increased requirements of computing and storage resources. Keep in mind that
    this situation is applicable more on public blockchains and less so for private
    blockchains. Private blockchains could easily scale compared with the public ones
    because the controlling entities could define and set node specifications with
    high computation power and more bandwidth. Also, there could be certain tasks
    offloaded from blockchain and computed off-chain that could help the system scale
    well.


    In this chapter, we will learn some of the generic scaling techniques, and discuss
    Bitcoin- and Ethereum-specific scaling techniques in their respective chapters.
    Please keep in mind that all scaling techniques may not apply to all kinds of
    blockchain flavors or use cases. The best way is to understand the techniques
    technically and use the best possible one in a given situation.'
