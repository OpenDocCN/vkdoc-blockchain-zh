- fmt: '### Bitcoin Transactions


    Bitcoin transactions are the fundamental building blocks of the Bitcoin system.
    There are basically two broader categories of Bitcoin transactions:


    - **Coinbase transaction**: Every block in Bitcoin blockchain contains one coinbase
    transaction included by the miners themselves to be able to mine new coins. They
    do not have control of how many coins they can mine in every block because it
    is controlled by the network itself. It started with 50 BTC in the beginning and
    keeps halving till it reaches 21 Million Bitcoins in total.

    - **Regular transactions**: The regular transactions are very similar to currency
    exchanges in general, where one is trying to transact some amount of money that
    they own with another. Typically, in Bitcoin, everything is present as transactions.
    To spend some amount, one has to consume previous transaction(s) where they received
    that amount—these are regular transactions in Bitcoin. Our main focus in this
    chapter will be on these regular transactions.


    Each owner of a Bitcoin can transfer the coin to someone else by digitally signing
    a hash of the previous transaction where they had received the Bitcoin along with
    the public key of the recipient. The payee or the recipient already has the public
    key of the payer so they can verify the transaction. The following figure (Figure
    [3-15](#A440588_1_En_3_Chapter.html#Fig15)) is from the white paper of Satoshi
    Nakamoto that pictorially demonstrates how it works.


    ![A440588_1_En_3_Fig15_HTML.jpg](A440588_1_En_3_Fig15_HTML.jpg)


    Figure 3-15 Bitcoin transaction


    Notice only the highlighted Owner-2 section in the diagram. Since Owner-1 is initiating
    this transaction, he is using his private key for signing the hash of two items:
    one is the previous transaction where he himself received the amount and the second
    is Owner-2''s public key. This signature can be easily verified using the public
    key of Owner-1 to ensure that it is a legitimate transaction. Similarly, when
    Owner-2 will initiate a transfer to Owner-3, he will use his private key to sign
    the hash of the previous transaction (the one he received from Owner-1) along
    with the public key of Owner-3. Such a transaction can be, and will be, verified
    by anyone who is a part of the network. Obviously because every transaction is
    broadcast, most of the nodes will have the entire history of transactions to be
    able to prevent double-spend attempts.


    There is no principle of closing balance in a Bitcoin network, and the total amount
    one holds is the summation of all incoming transactions to the public addresses
    you own. You can create as many public addresses as you want. If you have ten
    public addresses, then whatever transactions were made to that public address,
    you can spend those transactions (unspent transactions or `UTXOs`) using your
    private key. If you have to spend, say, five Bitcoins, you have a couple of choices:


    - Use one of the previous transactions where you received five or more Bitcoins.
    Transfer five Bitcoins to the recipient, some amount as transaction fee and the
    remainder to yourself. Refer to Figure [3-16](#A440588_1_En_3_Chapter.html#Fig16).


    ![A440588_1_En_3_Fig16_HTML.jpg](A440588_1_En_3_Fig16_HTML.jpg)


    Figure 3-16 Bitcoin transaction with one transaction input


    - Use multiple previous transactions that you had received that would sum up to
    more than five Bitcoins. Transfer five Bitcoins to the recipient, some amount
    as transaction fee and the remainder to yourself. Refer to Figure [3-17](#A440588_1_En_3_Chapter.html#Fig17).


    ![A440588_1_En_3_Fig17_HTML.jpg](A440588_1_En_3_Fig17_HTML.jpg)


    Figure 3-17 Bitcoin transaction with multiple transactions input


    As you can see, every transaction takes as input the previous transaction(s).
    There is no account maintained that says you have eight BTC, and you can spend
    anything below this amount; if you spend five BTC, the remaining balance would
    be three BTC. In Bitcoin, everything is a transaction where there are inputs and
    outputs. If the outputs are not spent yet, they are the `UTXOs`.


    We are aware that every transaction in the network is broadcast to the entire
    network. Whether someone is maintaining a node or not, they can still make a transaction
    and that transaction is published to all the accessible Bitcoin nodes. The receiver
    Bitcoin nodes then further broadcast the transactions to other nodes and the entire
    network is usually flooded with transactions. This is sometimes referred to as
    the gossip protocol and plays an important role in preventing double-spend attacks.
    Recollect from Chapter [2](#A440588_1_En_2_Chapter.html) that the only way to
    prevent double-spend is to be aware of all transactions.


    Each node maintains a set of all the transactions that they hear about and broadcasts
    only the new ones, which were not a part of the list already. Nodes maintain the
    transactions in the list till the time the transaction gets into a block and is
    a part of the blockchain. This is because there is a chance that even if a block
    has all valid transactions and is proposed as a valid block, it can still get
    orphaned by not being a part of the longest chain. Once it is confirmed that the
    block is now a part of the longest chain, the transactions that are there in that
    block are taken off from the list of transactions. Each full node in the Bitcoin
    network must maintain the entire list of unspent transactions (`UTXOs`) even though
    they are in the millions. If a transaction is in the list of `UTXOs`, then it
    may not be a double-spend attempt. Upon confirming a transaction is not a double-spend
    attack and also validating the transactions from other perspectives, a node broadcasts
    such transactions. If you are wondering how fast it would be to search millions
    of `UTXOs` to check for double-spend, you are on track. Since the transaction
    outputs are ordered by their hashes, searching for an item in an ordered hash
    list is quite fast.


    Let us now think and dig deeper into a double-spend scenario. It is very possible
    that Alice (A) tries to pay Bob (B) and Charlie (C) the same transaction (input
    to a transaction is a previous transaction and there is no concept of closing
    balance). Such a scenario would appear as shown in Figure [3-18](#A440588_1_En_3_Chapter.html#Fig18).


    ![A440588_1_En_3_Fig18_HTML.jpg](A440588_1_En_3_Fig18_HTML.jpg)


    Figure 3-18 A double-spend transaction scenario in Bitcoin network


    Notice in the figure the following scenarios:


    - A is trying to spend the same transaction to B and C.

    - Node-2 received the transaction `A Tx(1234) --> B` and Node-3 received the transaction
    `A Tx(1234) --> C`.

    - For Node-2 and Node-3, their respective transactions received were legitimate
    transactions.

    - When Node-3 tries to broadcast the transaction `A Tx(1234) --> C` to Node-2
    (every node broadcasts new transactions), Node-2 would refuse this transaction
    because it already has a transaction `A Tx(1234) --> B` with the same input transaction
    `Tx(1234)`.

    - Similar things happen with other nodes as well, and they may have either the
    transaction `A Tx(1234) --> B` or `A Tx(1234) --> C`, whichever reached them faster,
    but not both.

    - During mining, whichever node gets to propose the block will include the transaction
    it has. This transaction would be a part of the blockchain and the rest of the
    nodes that are holding the other transaction would simply drop the transaction
    with `Tx(1234)` because it will no longer be a `UTXO`.'
  raw: '### Bitcoin Transactions


    Bitcoin transactions are the fundamental building blocks of the Bitcoin system.
    There are basically two broader categories of Bitcoin transactions:


    *   Coinbase transaction : Every block in Bitcoin blockchain contains one coinbase
    transaction included by the miners themselves to be able to mine new coins. They
    do not have control of how many coins they can mine in every block because it
    is controlled by the network itself. It started with 50 BTC in the beginning and
    keeps halving till it reaches 21 Million Bitcoins in total.

    *   Regular transactions : The regular transactions are very similar to currency
    exchanges in general, where one is trying to transact some amount of money that
    they own with another. Typically, in Bitcoin, everything is present as transactions.
    To spend some amount, one has to consume previous transaction(s) where they received
    that amount—these are regular transactions in Bitcoin. Our main focus in this
    chapter will be on these regular transactions.


    Each owner of a Bitcoin can transfer the coin to someone else by digitally signing
    a hash of the previous transaction where they had received the Bitcoin along with
    the public key of the recipient. The payee or the recipient already has the public
    key of the payer so they can verify the transaction. The following figure (Figure
    [3-15](#A440588_1_En_3_Chapter.html#Fig15)) is from the white paper of Satoshi
    Nakamoto that pictorially demonstrates how it works.


    ![A440588_1_En_3_Fig15_HTML.jpg](A440588_1_En_3_Fig15_HTML.jpg)


    Figure 3-15


    Bitcoin transaction


    Notice only the highlighted Owner-2 section in the diagram. Since Owner-1 is initiating
    this transaction, he is using his private key for signing the hash of two items:
    one is the the previous transaction where he himself received the amount and the
    second is Owner-2’s public key. This signature can be easily verified using the
    public key of Owner-1 to ensure that it is a legitimate transaction. Similarly,
    when Owner-2 will initiate a transfer to Owner-3, he will use his private key
    to sign the hash of the previous transaction (the one he received from Owner-1)
    along with the public key of Owner-3\. Such a transaction can be, and will be,
    verified by anyone who is a part of the network. Obviously because every transaction
    is broadcast, most of the nodes will have the entire history of transactions to
    be able to prevent double-spend attempts.


    There is no principle of closing balance in a Bitcoin network, and the total amount
    one holds is the summation of all incoming transactions to the public addresses
    you own. You can create as many public addresses as you want. If you have ten
    public addresses, then whatever transactions were made to that public address,
    you can spend those transactions (unspent transactions or UTXOs) using your private
    key. If you have to spend, say, five Bitcoins, you have a coupe of choices:


    *   Use one of the previous transactions where you received five or more Bitcoins.
    Transfer five Bitcoins to the recepient, some amount as transaction fee and the
    remainder to yourself. Refer to Figure [3-16](#A440588_1_En_3_Chapter.html#Fig16).


    ![A440588_1_En_3_Fig16_HTML.jpg](A440588_1_En_3_Fig16_HTML.jpg)


    Figure 3-16


    Bitcoin transaction with one transaction input

    *   Use multiple previous transactions that you had received that would sum up
    to more than five Bitcoins. Transfer five Bitcoins to the recepient, some amount
    as transaction fee and the remainder to yourself. Refer to Figure [3-17](#A440588_1_En_3_Chapter.html#Fig17).


    ![A440588_1_En_3_Fig17_HTML.jpg](A440588_1_En_3_Fig17_HTML.jpg)


    Figure 3-17


    Bitcoin transaction with multiple transactions input


    As you can see, every transaction takes as input the previous transaction(s).
    There is no account maintained that says you have eight BTC, and you can spend
    anything below this amount; if you spend five BTC, the remaining balance would
    be three BTC. In Bitcoin, everything is a transaction where there are inputs and
    outputs. If the outputs are not spent yet, they are the UTXOs.


    We are aware that every transaction in the network is broadcast to the entire
    network. Whether someone is maintaining a node or not, they can still make a transaction
    and that transaction is published to all the accessible Bitcoin nodes. The receiver
    Bitcoin nodes then further broadcast the transactions to other nodes and the entire
    network is usually flodded with transactions. This is sometimes referred to as
    the gossip protocol and plays an important role in preventing double-spend attacks.
    Recollect from Chapter [2](#A440588_1_En_2_Chapter.html) that the only way to
    prevent double-spend is to be aware of all transactions.


    Each node maintains a set of all the transactions that they hear about and broadcasts
    only the new ones, which were not a part of the list already. Nodes maintain the
    transactions in the list till the time the transaction gets into a block and is
    a part of the blockchain. This is because there is a chance that even if a block
    has all valid transactions and is proposed as a valid block, it can still get
    orphaned by not being a part of the longest chain. Once it is confirmed that the
    block is now a part of the longest chain, the transactions that are there in that
    block are taken off from the list of transactions. Each full node in the Bitcoin
    network must maintain the entire list of unspent transactions (UTXOs) even though
    they are in the millions. If a transaction is in the list of UTXOs, then it may
    not be a double-spend attempt. Upon confirming a transaction is not a double-spend
    attack and also validating the transactions from other perspectives, a node broadcasts
    such transactions. If you are wondering how fast it would be to search millions
    of UTXOs to check for double-spend, you are on track. Since the transaction outputs
    are ordered by their hashes, searching for an item in an ordered hash list is
    quite fast.


    Let us now think and dig deeper into a double-spend scenario. It is very possible
    that Alice (A) tries to pay Bob (B) and Charlie (C) the same transaction (input
    to a transaction is a previous transaction and there is no concept of closing
    balance). Such a scenario would appear as shown in Figure [3-18](#A440588_1_En_3_Chapter.html#Fig18).


    ![A440588_1_En_3_Fig18_HTML.jpg](A440588_1_En_3_Fig18_HTML.jpg)


    Figure 3-18


    A double-spend transaction scenario in Bitcoin network


    Notice in the figure the following scenarios:


    *   A is trying to spend the same transaction to B and C.

    *   Node-2 received the transaction A Tx(1234) --> B and Node-3 received the transaction
    A Tx(1234) --> C.

    *   For Node-2 and Node-3, their respective transactions received were legitimate
    transactions.

    *   When Node-3 tries to broadcast the transaction A Tx(1234) --> C to Node-2
    (every node broadcasts new transactions), Node-2 would refuse this transaction
    because it already has a transaction A Tx(1234) --> B with the same input transaction
    Tx(1234).

    *   Similar things happen with other nodes as well, and they may have either the
    transaction “A Tx(1234) --> B” or “A Tx(1234) --> C”, whichever reached them faster,
    but not both.

    *   During mining, whichever node gets to propose the block will include the transaction
    it has. This transaction would be a part of the blockchain and the rest of the
    nodes that are holding the other transaction would simply drop the transaction
    with Tx(1234) because it will no longer be a UTXO.'
  trans: '

    ### 比特币交易


    比特币交易是比特币系统的基本构建模块。比特币交易大致可分为两大类：


    - **Coinbase 交易（铸币交易）**：比特币区块链中的每个区块都包含一笔由矿工自己打包的 Coinbase 交易，用于开采新币。矿工无法控制每个区块能挖到多少新币，因为这一数量由网络本身控制。初始时每区块奖励为
    50 BTC，此后每 210,000 个区块减半一次，直至比特币总量达到 2100 万枚。

    - **普通交易**：普通交易与一般的货币兑换非常相似，即某人试图将自己拥有的部分金额转移给他人。在比特币中，一切都以交易形式呈现。要花费一定金额，必须消耗其先前收到该金额的交易——这些就是比特币中的普通交易。本章将重点讨论这类普通交易。


    每个比特币持有者可以通过对之前收到比特币的交易哈希（与接收者的公钥一起）进行数字签名，将币转移给他人。收款方或接收者已经拥有付款方的公钥，因此他们可以验证交易。下图（图
    3-15）来自中本聪的白皮书，直观地展示了这一过程。


    ![A440588_1_En_3_Fig15_HTML.jpg](img/A440588_1_En_3_Fig15_HTML.jpg)


    **图 3-15** 比特币交易


    请注意图中高亮显示的 **Owner-2**（所有者 2）部分。由于 **Owner-1**（所有者 1）正在发起这笔交易，他使用自己的私钥对两项内容的哈希进行签名：一是他自己先前收到金额的那笔交易，二是
    **Owner-2** 的公钥。该签名可以很容易地使用 **Owner-1** 的公钥进行验证，以确保这是一笔合法交易。类似地，当 **Owner-2**
    要向 **Owner-3** 发起转账时，他会使用自己的私钥对先前交易（即他从 **Owner-1** 收到的那笔）的哈希以及 **Owner-3** 的公钥进行签名。网络中任何节点都可以并且将会验证这类交易。显然，由于每笔交易都会被广播，大多数节点都拥有完整的交易历史，从而能够防止双重支付尝试。


    比特币网络中没有"期末余额"的概念，一个人持有的总金额是其拥有的所有公开地址收到的全部传入交易的总和。你可以创建任意数量的公开地址。如果你有十个公开地址，那么无论哪些交易发送到这些地址，你都可以使用自己的私钥来花费这些交易（即未花费的交易，或
    `UTXO`）。假设你需要花费 5 个比特币，那么你有以下几种选择：


    - 使用之前收到 5 个或更多比特币的其中一笔交易。向接收者转移 5 个比特币，支付一定数额作为交易费，剩余部分转回给自己。参见图 3-16。


    ![A440588_1_En_3_Fig16_HTML.jpg](img/A440588_1_En_3_Fig16_HTML.jpg)


    **图 3-16** 单笔交易输入的比特币交易


    - 使用你收到的多笔先前交易，这些交易金额总和超过 5 个比特币。向接收者转移 5 个比特币，支付一定数额作为交易费，剩余部分转回给自己。参见图 3-17。


    ![A440588_1_En_3_Fig17_HTML.jpg](img/A440588_1_En_3_Fig17_HTML.jpg)


    **图 3-17** 多笔交易输入的比特币交易


    如你所见，每笔交易都以之前的某笔（或多笔）交易作为输入。系统不会维护一个账户说"你有 8 BTC，你可以花费不超过这个金额的任何数额"；如果你花费 5 BTC，剩余余额就是
    3 BTC。在比特币中，一切皆为交易，交易有输入和输出。如果某笔输出尚未被花费，该输出就是 `UTXO`。


    我们知道，网络中的每笔交易都会被广播到整个网络。无论某人是否运行节点，他们都可以发起一笔交易，该交易会被发布到所有可访问的比特币节点。接收比特币的节点会进一步将交易广播给其他节点，整个网络通常会被交易信息"淹没"。这种机制有时被称为**八卦协议（Gossip
    Protocol）**，它在防止双重支付攻击中起着重要作用。回顾第 2 章内容，防止双重支付的唯一方法就是了解所有交易。


    每个节点都会维护一个其所听闻的所有交易的集合，并且只广播那些尚未在列表中的新交易。节点会一直保留这些交易，直到该交易被打包进区块并成为区块链的一部分。这是因为，即使某个区块包含所有有效交易并被提议为有效区块，它仍可能因未成为最长链的一部分而被孤立。一旦确认该区块已成为最长链的一部分，该区块中的交易便会从交易列表中移除。比特币网络中的每个全节点都必须维护整个未花费交易列表（`UTXO`），即使它们数量高达数百万。如果某笔交易存在于
    `UTXO` 列表中，那么它就不太可能是双重支付尝试。在确认某笔交易不是双重支付攻击，并从其他角度验证交易有效后，节点会广播该交易。如果你在想，在数百万个
    `UTXO` 中搜索以检查双重支付会有多快——你问对方向了。由于交易输出按其哈希值排序，在有序的哈希列表中搜索条目是非常快的。


    现在，让我们深入思考并探索双重支付场景。完全有可能出现 Alice (A) 试图用同一笔交易同时支付给 Bob (B) 和 Charlie (C) 的情况（交易的输入是一笔前序交易，不存在期末余额的概念）。这种场景如图
    3-18 所示。


    ![A440588_1_En_3_Fig18_HTML.jpg](img/A440588_1_En_3_Fig18_HTML.jpg)


    **图 3-18** 比特币网络中的双重支付交易场景


    请注意图中所示的以下情况：


    - A 试图将同一笔交易同时支付给 B 和 C。

    - 节点 2 收到了交易 `A Tx(1234) --> B`，节点 3 收到了交易 `A Tx(1234) --> C`。

    - 对于节点 2 和节点 3，各自收到的交易都是合法的。

    - 当节点 3 试图将交易 `A Tx(1234) --> C` 广播给节点 2 时（每个节点都会广播新交易），节点 2 会拒绝此交易，因为它已经拥有一个具有相同输入交易
    `Tx(1234)` 的交易 `A Tx(1234) --> B`。

    - 其他节点也会发生类似情况，它们要么持有交易 `A Tx(1234) --> B`，要么持有交易 `A Tx(1234) --> C`，具体取决于哪个交易先到达它们，但不会同时持有两者。

    - 在挖矿过程中，无论哪个节点获得提议区块的权利，都会将其持有的交易包含在内。这笔交易将成为区块链的一部分，而其他持有另一笔交易的节点则会直接丢弃涉及 `Tx(1234)`
    的交易，因为它将不再是 `UTXO`。

    '
- fmt: '### Consensus and Block Mining


    In the previous section we looked at granular transactions. We will learn how
    the transactions are bundled together to form a block and a consensus is achieved
    among nodes, so the entire network accepts that block to extend the blockchain.
    Note that “block mining” refers to successfully creating a new block in the blockchain.
    In Bitcoin, it is the distributed PoW consensus algorithm that helps mine new
    blocks by maintaining decentralization. Achieving distributed consensus in such
    a network is very difficult. Though it has been around for decades for distributed
    systems such as Facebook, Google, Amazon, and many more because they have millions
    of servers that require consistency in the data they store, the term consensus
    is very much popularized because of Bitcoins. We will get into the nuts and bolts
    of consensus and mining in this chapter.


    First, just keep in mind that everything in a Bitcoin network is represented as
    transactions. If you want to make a transaction, you have to consume one or more
    previous transactions as input and make another transaction. We already know that
    one has to sign a transaction using their private key to ensure that the right
    person is making the transaction. Despite such cryptographic security, can’t that
    person sign a transaction that they already spent? Example: Alice received ten
    Bitcoins in a transaction with transaction number `1234`. She can very well spend
    the same transaction `1234` and give away those ten Bitcoins to Bob and Charlie.
    Since she will sign with her private key, which means it is an authentic transaction,
    what do you think can prevent her from double-spending? Please note that there
    is no way in Bitcoin that you can prevent her from attempting to make a double-spend,
    but the system is designed so that such an attempt will not be successful. The
    only way to prevent such attempts is to be aware of all the transactions that
    are taking place. This is why all transactions in Bitcoin are broadcast to the
    entire network. Once a transaction is spent, it is no longer a part of the UTXOs
    and a new transaction number is generated to be a part of the UTXO, which only
    the recipient can spend. This is the way nodes can validate transactions.


    Also, the only way you can prevent a double-spend attack is by knowing all the
    transactions. When you are aware of all transactions, you would know the spend
    and the UTXOs. When a new block is proposed by a miner, it is required that all
    the transactions in the block are valid. Does it mean that the node proposing
    a block cannot include an invalid transaction? The answer is “Yes.” They can certainly
    inject a fraudulent transaction but the rest of the nodes will reject it. The
    PoW that the node would have done (we will get into the details shortly) by spending
    computer resources and electricity would be in vain! So, a node would never want
    to propose an invalid block, thanks to the PoW consensus. Despite not having a
    notion of global time, observe that the transactions are clubbed together to form
    a block that becomes a part of blockchain, more blocks get added to the chain
    one by one, and there is an order! Note carefully that the order in which the
    transactions took place is preserved by the blockchain. This way, consensus happens
    at block level, which propagates all the way to granular transactions.


    Based on what we have understood so far, now we know that every node in the Bitcoin
    network has its own copy of blockchain, and there is no “global blockchain” as
    such; it is a decentralized network after all. Each node in all those copies of
    blockchains comprises many transactions. It is also true that every node maintains
    a list of UTXOs and when given a chance (A node is randomly selected — we will
    see how) to propose a block, they include as many transactions as possible up
    to the block limit of 1MB or 2MB. If the block successfully makes it to the blockchain,
    they are removed from the list of UTXOs. Note here that every node may have different
    outstanding transactions lists because there is a possibility that some transactions
    are not heard by some of the nodes.


    It’s time now to see how the PoW algorithm really works. We learned about the
    difficulty target field in the header of each block. Every mining node tries to
    solve the cryptographic puzzle with an expectation to get lucky and propose a
    block. The reason they are so desperate in proposing a block is because they get
    great benefits when their proposed block becomes a part of the blockchain. Every
    transaction that an individual makes, they can set aside some transaction fee
    for the miners. We know that all nodes maintain the list of transactions that
    are not yet a part of the blockchain and when they get a chance to propose a block,
    they take as many transactions as they can and form a block. It is obvious that
    they will take all those transactions that would give them the highest profit
    and leave the ones with minimum or no transaction fees. It may take some time
    for the transactions with low transaction fee to get into the blocks, and chances
    are less for the ones with no transaction fee at all. Apart from the transaction
    fee, the nodes that propose a new block are rewarded with new Bitcoins. With every
    successful block, new Bitcoins get generated and the miner who proposed the block
    gets all of those; this is the only way new Bitcoins get created in the Bitcoin
    system. This is called “block reward.” Technically, the node that proposes a block
    includes a special transaction called “coin creation” in the proposed block where
    the recipient address is the one that the miner owns. When the Bitcoin was first
    launched, the block reward was 50 Bitcoins (BTC). By design, there can only be
    21,000,000 BTCs in total, so the block reward gets halved every 210,000 blocks.
    It started at 50, then it became 25, then 12.5, and it goes on this way till at
    some point in time (when it reaches 21,000,000 BTCs) it trends to zero. Following
    is the code snippet from Bitcoin Core (`main.cpp`) that shows this halving process:


    ```cpp

    int64_t GetBlockValue(int nHeight, int64_t nFees)

    {

    int64_t nSubsidy = 50 * COIN;

    int halvings = nHeight / Params().SubsidyHalvingInterval();

    // Force block reward to zero when right shift is undefined.

    if (halvings >= 64)

    return nFees;

    // Subsidy is cut in half every 210,000 blocks which will occur approximately
    every 4 years.

    nSubsidy >>= halvings;

    return nSubsidy + nFees;

    }

    ```


    Notice in the previous code snippet how the block reward gets halved. The following
    explanation gives a better picture of this design:


    ```

    //Block reward reduced by half, remains at 50%

    BlockReward = BlockReward >> 1;

    //Block reward further reduced by half, remains at 25%

    BlockReward = BlockReward-(BlockReward>>2);

    //Block reward further reduced by half, remains at 12.5%

    BlockReward = BlockReward - (BlockReward>>3);

    ```'
