    \ for your platform and install geth on your local machine. You can also choose\
    \ to install geth on a remote (cloud-hosted) server/virtual machine if you do\
    \ not want to install it on your local machine.\n\nOnce geth is successfully installed\
    \ on your local machine, you can check the installation by running the following\
    \ command in your terminal/command prompt.\n\n```\ngeth version\n```\n\nDepending\
    \ on your platform OS and the geth version you have installed, this command should\
    \ give an output similar to the following:\n\n```\nGeth\nVersion: 1.7.3-stable\n\
    Git Commit: 4bb3c89d44e372e6a9ab85a8be0c9345265c763a\nArchitecture: amd64\nProtocol\
    \ Versions: [63 62]\nNetwork Id: 1\nGo Version: go1.9\nOperating System: linux\n\
    GOPATH=\nGOROOT=/usr/lib/go-1.9\n```\n\n### Create geth Data Directory\n\nBy default,\
    \ geth will have its working directory but we will create a custom one so that\
    \ we can track it easily. Simply create a directory and keep the path to this\
    \ directory handy.\n\n```\nmkdir mygeth\n```\n\n### Create a geth Account\n\n\
    The first thing we need is an Ethereum account that can hold Ether. We will need\
    \ this account to create our smart contracts and transactions later in the DApp\
    \ development. We can create a new account using the following command.\n\n```\n\
    sudo geth account new --datadir \nsudo geth account new --datadir /mygeth\n```\n\
    \nNote\n\nWe are using sudo to avoid any permission issues.\n\nWhen you run this\
    \ command, the prompt will ask for a passphrase to lock this account. Enter and\
    \ confirm the passphrase and then your geth account will be created. Make sure\
    \ to remember the passphrase you entered; it will be needed to unlock the account\
    \ later to sign transactions. The address of this account will be shown on the\
    \ screen. For us, the address of the generated account is `baf735f889d603f0ec6b1030c91d9033e60525c3`.\
    \ The following screenshot (Figure [6-1](#A440588_1_En_6_Chapter.html#Fig1)) shows\
    \ this process.\n\n![A440588_1_En_6_Fig1_HTML.jpg](A440588_1_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1\n\nEthereum account setup with geth\n\nNotice that we have passed\
    \ the data directory as the parameter for the create account command. This is\
    \ to make sure that the file containing the account details is created inside\
    \ our data directory so that it is easy to access the account from the context\
    \ of this directory. If we do not pass the data directory parameter to the geth\
    \ commands, then it will automatically take the default location of the data directory\
    \ (which can be different depending on the platform).\n\n### Create genesis.json\
    \ Configuration File\n\nAfter installing geth and creating a new account, the\
    \ next step is to define the genesis configuration for our private network. As\
    \ we have seen in the previous chapters, blockchains have a genesis block that\
    \ acts as the starting point of the blockchain, and all transactions and blocks\
    \ are validated against the genesis block. For our private network, we will have\
    \ a custom genesis block and hence a custom genesis configuration. This configuration\
    \ defines some key values for the blockchain like difficulty level, gas limit\
    \ for blocks, etc.\n\nThe genesis configuration for Ethereum has the following\
    \ format as a JSON object. Each of the keys of this object is a configuration\
    \ value that drives the network.\n\n```\n{\n\"config\": {\n\"chainId\": 3792,\n\
    \"homesteadBlock\": 0,\n\"eip155Block\": 0,\n\"eip158Block\": 0\n},\n\"difficulty\"\
    : \"2000\",\n\"gasLimit\": \"2100000\",\n\"alloc\": {\n\"baf735f889d603f0ec6b1030c91d9033e60525c3\"\
    : { \"balance\": \"9000000000000000000\" }\n}\n}\n```\n\nThe JSON object is primarily\
    \ constituted by a config section having values specific to chainId and block\
    \ numbers related to some of the forks that have taken place. The important parameter\
    \ to note here is the chainId, which represents the identifier of the blockchain\
    \ and helps prevent replay attacks. For our private chain, we have opted for a\
    \ random chainId 3792. You can choose any number here different from the numbers\
    \ used by main net (1) and the test nets (2, 3, and 4).\n\nThe next important\
    \ parameter is the difficulty. This value defines how difficult it will be to\
    \ mine a new block. This value is much higher in the Ethereum main network, but\
    \ for private networks we can choose a relatively smaller value.\n\nThen there\
    \ is gasLimit. This is the total gas limit for a block and not a transaction.\
    \ A higher value generally means more transactions in each block.\n\nFinally,\
    \ we have the alloc section. Using this configuration, we can prefund Ethereum\
    \ accounts with the value in wei. As we can see, we have funded the same Ethereum\
    \ account that we created in the last step, with 9 Ether."
  trans: "\n# DApp 去中心化应用\n\n在开始开发 DApp 之前，我们需要定义其用例，同时明确构成该 DApp 的各个组件。那么，我们首先来完成这项工作。\n\
    \n我们 DApp 的用例是一个投票应用，允许选民对发布在公共领域的投票进行表决。使用中心化系统的投票方式可靠性不足，因为它存在单一的数据篡改点和故障点。因此，我们\
    \ DApp 的目标是实现去中心化投票。这样一来，每位选民都能掌控自己的选票，每张选票都会在区块链的每个节点上处理，从而杜绝投票数据被篡改的可能。虽然使用公共以太坊网络可以轻松实现这一点，但为了让我们的实践更有趣，我们将把投票\
    \ DApp 部署在一个私有以太坊网络上，为此我们还需要搭建这个私有网络。听起来很有趣吧？我们这就开始。\n\n第一步是搭建一个私有以太坊网络。然后，为了托管业务逻辑和投票结果，我们将创建一个部署在该私有以太坊网络上的智能合约。为了与此智能合约进行交互，我们将使用\
    \ `web3` 库创建一个前端 web 应用。仅此而已。\n\n按照刚才描述的计划，我们的 DApp 开发实践将包含以下步骤：\n\n1.  搭建一个私有以太坊网络\n\
    2.  为投票功能创建一个智能合约\n3.  将智能合约部署到私有网络\n4.  创建用于与智能合约交互的前端 web 应用\n\n在接下来的章节中，我们将详细探讨上述每个步骤。\n\
    \n**注意**\n\n如前所述，我们也可以为此 DApp 开发使用公共以太坊网络。除此之外，我们还可以使用诸如 `Metamask` 和 `Truffle`\
    \ 框架等多种工具来加速以太坊 DApp 的开发。这些工具与其他各类工具一起，能让我们更好地管理代码和部署。鼓励读者探索这些工具以及其他工具，以找到最佳组合，为他们的\
    \ DApp 开发创建一个舒适且高效的环境。本文主要旨在让读者理解创建以太坊 DApp 时的底层机制，因此，所有在 DApp 开发流程之上提供抽象层的工具均不在讨论范围之内。\n\
    \n# 搭建私有以太坊网络\n\n为了搭建一个私有以太坊网络，我们需要使用现有的多种以太坊客户端之一。简单来说，以太坊客户端是一种实现了以太坊区块链协议的应用程序。如今互联网上有很多以太坊客户端；其中流行的一种是\
    \ `go-ethereum`，也被称为 `geth`。我们将使用 `geth` 来搭建我们的私有网络。本次实践，我们使用的是一台运行 Ubuntu Linux\
    \ 16.04 版本的虚拟机。\n\n## 安装 go-ethereum（geth）\n\n第一步是在我们的本地机器上安装 `geth`。为了安装 `geth`，我们将从官方来源\
    \ [`https://geth.ethereum.org/downloads/`](https://geth.ethereum.org/downloads/)\
    \ 获取 `geth` 的可执行安装程序。`geth` 官方网站的这个下载页面列出了所有主要平台（Windows、macOS、Linux）的安装包。\n\n\
    下载适用于你平台的安装包，然后在本地机器上安装 `geth`。如果你不想在本地机器上安装，也可以选择将 `geth` 安装到远程（云托管）服务器或虚拟机上。\n\
    \n当 `geth` 成功安装在本地机器上后，你可以通过在终端或命令提示符中运行以下命令来检查安装情况。\n\n```\ngeth version\n```\n\
    \n根据你的平台操作系统和安装的 `geth` 版本，该命令的输出应类似于以下内容：\n\n```\nGeth\n版本: 1.7.3-stable\nGit\
    \ 提交: 4bb3c89d44e372e6a9ab85a8be0c9345265c763a\n架构: amd64\n协议版本: [63 62]\n网络 ID:\
    \ 1\nGo 版本: go1.9\n操作系统: linux\nGOPATH=\nGOROOT=/usr/lib/go-1.9\n```\n\n## 创建\
    \ geth 数据目录\n\n默认情况下，`geth` 有自己的工作目录，但我们将创建一个自定义目录，以便于跟踪。只需创建一个目录并记住该路径。\n\n```\n\
    mkdir mygeth\n```\n\n## 创建一个 geth 账户\n\n我们首先需要一个能够持有以太币的以太坊账户。在后续的 DApp 开发中，我们需要这个账户来创建智能合约和交易。我们可以使用以下命令创建一个新账户。\n\
    \n```\nsudo geth account new --datadir \nsudo geth account new --datadir /mygeth\n\
    ```\n\n**注意**\n\n我们使用 `sudo` 是为了避免权限问题。\n\n运行此命令时，提示符会要求输入密码来锁定该账户。输入并确认密码后，你的\
    \ `geth` 账户就创建成功了。请务必记住你输入的密码；稍后解锁账户以签署交易时会用到它。该账户的地址会显示在屏幕上。对我们来说，生成的账户地址是 `baf735f889d603f0ec6b1030c91d9033e60525c3`。以下截图（图\
    \ 6-1）展示了这一过程。\n\n![A440588_1_En_6_Fig1_HTML.jpg](img/A440588_1_En_6_Fig1_HTML.jpg)\n\
    \n**图 6-1** 使用 geth 设置以太坊账户\n\n请注意，我们将数据目录作为参数传递给了创建账户的命令。这是为了确保包含账户详细信息的文件创建在我们的数据目录内，从而便于在此目录上下文中访问该账户。如果我们没有向\
    \ `geth` 命令传递数据目录参数，它将自动使用数据目录的默认位置（该位置可能因平台而异）。\n\n## 创建 genesis.json 配置文件\n\n\
    安装 `geth` 并创建一个新账户后，下一步是为我们的私有网络定义创世配置。正如我们在前几章中所见，区块链都有一个创世块，作为区块链的起点，所有交易和区块都会根据创世块进行验证。对于我们的私有网络，我们将有一个自定义的创世块，从而也就有了一个自定义的创世配置。此配置定义了区块链的一些关键值，如难度级别、区块的\
    \ gas 上限等。\n\n以太坊的创世配置采用以下 JSON 对象格式。该对象的每个键都是一个驱动网络的配置值。\n\n```\n{\n\"config\"\
    : {\n\"chainId\": 3792,\n\"homesteadBlock\": 0,\n\"eip155Block\": 0,\n\"eip158Block\"\
    : 0\n},\n\"difficulty\": \"2000\",\n\"gasLimit\": \"2100000\",\n\"alloc\": {\n\
    \"baf735f889d603f0ec6b1030c91d9033e60525c3\": { \"balance\": \"9000000000000000000\"\
    \ }\n}\n}\n```\n\n这个 JSON 对象主要由一个 config 部分组成，其值特定于 `chainId` 以及一些已发生分叉的区块号。这里需要注意的重要参数是\
    \ `chainId`，它代表区块链的标识符，有助于防止重放攻击。对于我们的私有链，我们选择了一个随机的 `chainId` 3792。你可以选择任何与此处主网（1）和测试网（2、3、4）所使用的数字不同的数字。\n\
    \n下一个重要参数是 `difficulty`。该值定义了挖掘新区块的难度。这个值在以太坊主网络中要高得多，但对于私有网络，我们可以选择一个相对较小的值。\n\
    \n然后是 `gasLimit`。这是针对一个区块（而非单笔交易）的总 gas 限制。通常，该值越高，每个区块能容纳的交易就越多。\n\n最后是 `alloc`\
    \ 部分。使用此配置，我们可以用以 wei 为单位的价值预先为以太坊账户充值。正如我们所见，我们用 9 个以太币为上一小节创建的同一个以太坊账户注入了资金。\n"
- fmt: '### Run the First Node of the Private Network


    To run the first node of the private blockchain, let’s first copy the JSON from
    the previous step and save it as a file named `genesis.json`. For simplicity,
    we are saving this file in the same directory that we are using as the data directory
    for `geth`.


    First, we need to initialize `geth` with the `genesis.json`. This initialization
    is needed to set the custom genesis configuration for our private network.


    CD to the directory where we have saved the `genesis.json` file is


    ```

    cd mygeth

    ```


    The following command will initialize `geth` with the custom configuration we
    have defined.


    ```

    sudo geth --datadir "/mygeth" init genesis.json

    ```


    `geth` will confirm the custom genesis configuration set-up with the output in
    the following screen-shot (Figure [6-2](#A440588_1_En_6_Chapter.html#Fig2)).


    ![A440588_1_En_6_Fig2_HTML.jpg](A440588_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Initialize `geth` with configuration in `genesis.json`


    Next, we need to run `geth` using the following command and the parameters. We
    will look into each of these parameters in detail.


    ```

    sudo geth --datadir "/mygeth" --networkid 8956 --ipcdisable --port 30307 --rpc
    --rpcapi "eth,web3,personal,net,miner,admin,debug" --rpcport 8507 --mine --minerthreads=1
    --etherbase=0xbaf735f889d603f0ec6b1030c91d9033e60525c3

    ```


    Let’s look at each of the parameters that we gave to the `geth` command.


    - `datadir`: This is to specify the data directory just like we did in the previous
    steps.

    - `networkid`: This is the identifier of the network, which differentiates our
    private blockchain with other Ethereum networks. This is similar to the `chainId`
    we defined in the `genesis.json` file but provides another layer of differentiation
    among networks. As we can see, we have used another custom number for this value.

    - `ipcdisable`: With this parameter we have disabled the interprocess communication
    port for `geth` so that while running multiple `geth` instances (nodes) on the
    same local machine we should not encounter any conflicting issues.

    - `port`: We have selected a custom value for the port to interact with `geth`.

    - `rpc`, `--rpcapi`, `--rpcport`: These three parameters define the configuration
    for the RPC API exposed by `geth`. We want to enable it; we want `eth`, `web3`,
    `personal`, `net`, `miner`, `admin`, `debug` geth APIs exposed over RPC; and we
    want to run it on a custom port `8507`.

    - `mine` – `minerthreads` – `etherbase`: With these three parameters we are instructing
    `geth` to start this node as a miner node, limit the miner process threads to
    only one (so that we do not consume a lot of CPU power), and send the mining rewards
    to the Ethereum account that we created in the first step.


    That’s all the configuration we need at this time to run our first `geth` node
    for the private network.


    When we run this command with all the parameters, `geth` will give the following
    output (as in the screenshot shown in Figure [6-3](#A440588_1_En_6_Chapter.html#Fig3)).


    ![A440588_1_En_6_Fig3_HTML.jpg](A440588_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    `geth` run first node


    Note the UDP listener up log statement in the output.


    ```

    INFO [02-11|18:00:57] UDP listener upself=enode://e03b50e9b1b2579904f2bbdff7dd0826bd4e4eb2e225c1d1cb1a765195474d7418f3e8fbfeefd55bd85722973d17626f0e53208c62e38d1099bb583e702b3b48@[::]:30307

    ```


    This contains the address of the node we just started. To connect other nodes
    to this node we will need this address. Let’s keep it noted at some place. The
    following line has the extracted address from the previous log statement.


    ```

    enode://e03b50e9b1b2579904f2bbdff7dd0826bd4e4eb2e225c1d1cb1a765195474d7418f3e8fbfeefd55bd85722973d17626f0e53208c62e38d1099bb583e702b3b48@[::]:30307

    ```


    Note the `[::]` before the port number we defined in the command. Let’s replace
    this with the local host IP address if we are running the other node on the same
    machine, or else replace it with the external IP address of the machine. As we
    are going to run the other network node on the same machine (for development purposes),
    we will replace it with the localhost IP address. So, the address of the first
    node will finally be


    ```

    enode://e03b50e9b1b2579904f2bbdff7dd0826bd4e4eb2e225c1d1cb1a765195474d7418f3e8fbfeefd55bd85722973d17626f0e53208c62e38d1099bb583e702b3b48@127.0.0.1:30307

    ```'
  raw: '### Run the First Node of the Private Network


    To run the first node of the private blockchain, let’s first copy the JSON from
    the previous step and save it as a file named `genesis.json`. For simplicity,
    we are saving this file in the same directory that we are using as the data directory
    for geth.


    First, we need to initialize geth with the genesis.json. This initialization is
    needed to set the custom genesis configuration for our private network.


    CD to the directory where we have saved the genesis.json file is


    ```

    cd mygeth

    ```


    The following command will initialize geth with the custom configuration we have
    defined.


    ```

    sudo geth --datadir "/mygeth" init genesis.json

    ```


    geth will confirm the custom genesis configuration set-up with the output in the
    following screen-shot (Figure [6-2](#A440588_1_En_6_Chapter.html#Fig2)).


    ![A440588_1_En_6_Fig2_HTML.jpg](A440588_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Initialize geth with configuration in genesis.json


    Next, we need to run geth using the following command and the parameters. We will
    look into each of these parameters in detail.


    ```

    sudo geth --datadir "/mygeth" --networkid 8956 --ipcdisable --port 30307 --rpc
    --rpcapi "eth,web3,personal,net,miner,admin,debug" --rpcport 8507 --mine --minerthreads=1
    --etherbase=0xbaf735f889d603f0ec6b1030c91d9033e60525c3

    ```


    Let’s look at each of the parameters that we gave to the geth command.


    *   datadir: This is to specify the data directory just like we did in the previous
    steps.

    *   networkid: This is the identifier of the network, which differentiates our
    private blockchain with other Ethereum networks. This is similar to the chainId
    we defined in the genesis.json file but provides another layer of differentiation
    among networks. As we can see, we have used another custom number for this value.

    *   ipcdisable: With this parameter we have disabled the interprocess communication
    port for geth so that while running multiple geth instances (nodes) on the same
    local machine we should not encounter any conflicting issues.

    *   port: We have selected a custom value for the port to interact with geth.

    *   rpc, --rpcapi, --rpcport: These three parameters define the configuration
    for the RPC API exposed by geth. We want to enable it; we want eth,web3,personal,net,miner,admin,debug
    geth APIs exposed over RPC; and we want to run it on a custom port 8507.

    *   mine – minerthreads – etherbase : With these three parameters we are instructing
    geth to start this node as a miner node, limit the miner process threads to only
    one (so that we do not consume a lot of CPU power), and send the mining rewards
    to the Ethereum account that we created in the first step.


    That’s all the configuration we need at this time to run our first geth node for
    the private network.


    When we run this command with all the parameters, geth will give the following
    output (as in the screenshot shown in Figure [6-3](#A440588_1_En_6_Chapter.html#Fig3)).


    ![A440588_1_En_6_Fig3_HTML.jpg](A440588_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Geth run first node


