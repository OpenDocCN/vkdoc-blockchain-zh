  trans: '

    # 高级加密标准


    与 DES 类似，AES 算法也是一种对称分组密码，但并非基于 Feistel 网络。AES 在更广义上使用了代替-置换网络。它不仅提供了更高的安全性，还提供了更快的速度！根据
    AES 标准，分组大小固定为 128 位，并允许选择三种密钥：128 位、192 位和 256 位。根据密钥的选择，AES 被命名为 `AES-128`、`AES-192`
    和 `AES-256`。


    在 AES 中，加密轮数取决于密钥长度。对于 `AES-128`，有十轮；对于 `AES-192`，有 12 轮；而对于 `AES-256`，有 14 轮。在本节中，我们的讨论仅限于密钥长度为
    128（即 `AES-128`）的情况，因为其他 AES 变体的处理过程基本相同。唯一变化的是“密钥调度”，我们将在本节后面探讨。


    与 DES 不同，AES 加密轮次是迭代的，并且在每一轮中处理整个 128 位的数据块。此外，与 DES 不同，AES 的解密过程与加密过程并不十分相似。


    为了理解每一轮中的处理步骤，请将 128 位数据块视为 16 个字节，其中各个字节排列成一个 4 × 4 矩阵，如下所示：


    ![A440588_1_En_2_Figa_HTML.jpg](img/A440588_1_En_2_Figa_HTML.jpg)


    如图所示，这个 4 × 4 的字节矩阵被称为状态数组。请注意，每一轮都会输入一个状态数组并产生一个输出状态数组。


    AES 还使用了另一个术语“字”，在进一步讨论之前需要对其进行定义。一个字节由八位组成，而一个字由四个字节组成，即 32 位。状态数组每一列中的四个字节构成
    32 位的字，可称为状态字。状态数组可以如下所示：


    ![A440588_1_En_2_Figb_HTML.jpg](img/A440588_1_En_2_Figb_HTML.jpg)


    此外，每个字节都可以用两个十六进制数表示。例如：如果 8 位字节是 `{00111010}`，则可以用十六进制表示法表示为 `3A`。`3` 代表左边四位
    `0011`，`A` 代表右边四位 `1010`。


    现在来概括每一轮，每一轮的处理发生在字节级别，包括字节级代替，然后是字级置换，因此它是一个代替-置换网络。当我们讨论每轮中的各种操作时，将进一步了解细节。AES
    的整体加密和解密过程可以用图 2-6 表示。


    ![A440588_1_En_2_Fig6_HTML.jpg](img/A440588_1_En_2_Fig6_HTML.jpg)


    **图 2-6** AES 加密技术


    如果你仔细观察图 2-6，会发现解密过程并非仅仅是加密的逆过程。轮中的操作以不同的顺序执行！轮函数的所有步骤——`SubBytes`、`ShiftRows`、`MixColumns`、`AddRoundKey`——都是可逆的。另外，请注意各轮本质上是迭代的。第
    1 轮到第 9 轮包含所有四种操作，而最后一轮仅排除了 `MixColumns` 操作。现在，让我们对轮函数中发生的每个操作建立一个高层次的理解。


    `SubBytes`：这是一个代替步骤。在这里，每个字节被表示为两个十六进制数字。例如，取一个字节 `{00111010}`，用两个十六进制数字表示，比如
    `{3A}`。要找到它的代替值，请参考 S 盒查找表（16 × 16 表），找到第 3 行和第 A 列对应的值。因此，对于 `{3A}`，相应的代替值将是
    `{80}`。这一步为密码提供了非线性特性。


    `ShiftRows`：这是一个变换步骤，基于状态数组的矩阵表示。它包含以下移位操作：


    - 第一行不移位，保持原样

    - 第二行循环左移一个字节

    - 第三行循环左移两个字节

    - 第四行（最后一行）循环左移三个字节


    可以如下表示：


    ![A440588_1_En_2_Figc_HTML.jpg](img/A440588_1_En_2_Figc_HTML.jpg)


    `MixColumns`：这也是一个变换步骤，状态的所有四列与一个固定多项式（`C[x]`）相乘，并转换为新列。在此过程中，列中的每个字节被映射到一个新值，该值是列中所有四个字节的函数。这通过状态的矩阵乘法实现，如下所示：


    ![A440588_1_En_2_Figd_HTML.jpg](img/A440588_1_En_2_Figd_HTML.jpg)


    矩阵乘法与通常相同，但“与”乘积通过“异或”运算处理。让我们看一个示例来理解这个过程。`Byte 0''` 的计算如下：


    `Byte 0'' = (2 . Byte0) ⊕ (3 . Byte1) ⊕ Byte3 ⊕ Byte4`


    需要注意的是，这个 `MixColumns` 步骤与 `ShiftRows` 步骤一起，为密码提供了必要的扩散特性（一个字节的信息扩散到多个字节）。


    `AddRoundKey`：这又是一个变换步骤，其中 128 位的轮密钥按列主序与 128 位的状态进行逐位“异或”运算。因此，该操作是按列进行的，即状态字列中的四个字节与轮密钥的一个字进行运算。与我们表示
    128 位明文块的方式相同，128 位密钥也应表示在相同的 4 × 4 矩阵中，如下所示：


    ![A440588_1_En_2_Fige_HTML.jpg](img/A440588_1_En_2_Fige_HTML.jpg)


    128 位密钥


    此操作影响状态的每一位。现在回想一下，共有十轮，每一轮都有自己的轮密钥。由于在轮开始之前有一个 `AddRoundKey` 步骤，因此实际上有十一（10 +
    1）次 `AddRoundKey` 操作。在一轮中，所有 128 位的子密钥，即子密钥的所有四个字，都与 128 位的输入数据块进行“异或”运算。因此，总共需要
    44 个密钥字，`w[0]` 到 `w[43]`。这就是为什么 128 位密钥必须经过密钥扩展操作的原因，我们稍后会讲到。


    请注意，密钥字 `[w[0], w[1], w[2], w[3]]` 在基于轮的处理开始之前与初始输入块进行“异或”运算。其余 40 个密钥字 `w[4]`
    到 `w[43]` 在每一轮中每次使用四个字。


    ## AES 密钥扩展


    AES 密钥扩展算法接收一个 128 位的加密密钥（四个字的密钥）作为输入，并从中生成一个包含 44 个密钥字的调度表。其设计思路是，使得密钥中一位的改变会显著影响所有轮密钥。


    密钥扩展操作的设计原则是，每组四个字的密钥以四字对四字的方式产生下一组四个字的密钥。用图形表示很容易解释这一点，下面开始：


    ![A440588_1_En_2_Fig7_HTML.jpg](img/A440588_1_En_2_Fig7_HTML.jpg)


    **图 2-7** AES 密钥扩展


    我们将通过参考该图快速了解密钥扩展所发生的操作。

