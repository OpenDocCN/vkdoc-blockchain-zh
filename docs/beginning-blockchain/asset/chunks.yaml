    ## 比特币网络


    如前所述，比特币网络是一个点对点网络。在此类系统中，没有中心化服务器，每个节点都受到平等对待。在这样的系统中，没有主从现象，也没有层级结构。由于它运行在互联网上，因此使用了相同的
    TCP/IP 协议栈，如图 3-9 所示。


    ![A440588_1_En_3_Fig9_HTML.jpg](img/A440588_1_En_3_Fig9_HTML.jpg)


    **图 3-9** 互联网上的比特币区块链网络


    上图显示了比特币网络如何在相同的互联网协议栈上共存。比特币网络是高度动态的，节点可以随意加入和离开网络，系统仍然可以工作。此外，尽管比特币网络本质上是异步的，并且存在网络延迟和数据包丢失，但该系统非常稳健——这要归功于比特币的设计！


    比特币网络是一个去中心化网络，没有单点故障，也没有中央权威机构。采用这种设计，你将如何评估比特币网络的规模？由于节点可以随意加入和离开，因此没有恰当的方法来估算。然而，人们尝试对比特币网络进行研究，一些人声称网络中始终有接近
    10,000 个节点保持连接，同时可能有数百万个节点在运行。


    比特币网络中的每个节点在权限上是平等的，并且具有扁平结构，但节点可以是全节点或轻量级节点。全节点几乎可以执行比特币系统中的所有允许活动，例如挖掘交易和广播交易，并且可以提供钱包服务。全节点还提供路由功能，以参与和维护比特币网络。要成为全节点，你必须下载包含迄今为止发生的所有交易的整个区块链数据库。此外，该节点必须永久连接到比特币网络并监听所有发生的交易。拥有良好的网络连接、良好的存储空间（至少
    200GB）以及至少 2GB 的专用 RAM 非常重要。随着时间的推移，此要求可能会进一步变化，并需要更多资源。


    另一方面，轻量级节点无法挖掘新区块，但可以通过使用简化支付验证来验证交易。它们也被称为“瘦客户端”。比特币网络中的绝大多数节点都是 SPV 节点。它们也可以参与矿池挖矿，其中有许多节点共同尝试挖掘新区块。轻量级节点可以帮助全节点验证交易。SPV
    的一个很好的例子是钱包（客户端）。如果你正在运行一个钱包，并且有人向你汇款，你可以作为比特币网络中的一个节点，下载与你相关的交易，以便你可以检查向你发送比特币的人是否确实拥有它们。


    需要注意的是，SPV 的安全性不如完全验证节点，因为它通常只包含区块头，而不是整个区块。因此，SPV 无法验证交易，因为它没有某个区块的交易记录，而且除了自己的交易外，它也没有所有未花费的交易输出。

    '
- fmt: '### Network Discovery for a New Node


    Now think about, when a new node wants to join the network, how would it contact
    the network? It is not an intranet with a `192.168.1.X` network where you can
    broadcast to the IP `192.168.1.255` so that whichever computer is a part of the
    `192.168.1.X` network gets the broadcast message. The network switches are designed
    to allow such broadcast packets. However, remember that we are talking about the
    Internet, which Bitcoin is sitting on. If you are running a node in London, there
    is a possibility that there are other nodes in London, Russia, Ireland, the United
    States, and India and all of them are connected through the Internet with some
    public facing IP address.


    The question here is that when a fresh node joins the network, how does it figure
    out the peer nodes? There is no central server somewhere to respond to their request
    the way a typical Internet-based web application works. Blockchain is decentralized,
    remember? When started for the first time, a Bitcoin Core or BitcoinJ program
    does not have the IP address of any full node. So, they are equipped with several
    methods to find the peers. One of them is DNS seeds. Several DNS seeds are hardcoded
    in them. Also, several host names are maintained in the DNS system that resolve
    to a list of IP addresses that are running the Bitcoin nodes. DNS seeds are maintained
    by Bitcoin community members. Some community members provide static DNS seeds
    by manually entering the IP addresses and port numbers. Also, some community members
    provide dynamic DNS seed servers that can automatically get the IP addresses of
    active Bitcoin nodes that are running on default Bitcoin ports (`8333` for mainnet
    and `18333` for testnet). If you perform `NSLOOKUP`s on the DNS seeds, you will
    get a bunch of IP addresses running Bitcoin nodes.


    The clients (Bitcoin Core or BitcoinJ) also maintain a hardcoded list of IP addresses
    that point to some (not one!) stable Bitcoin nodes. Such nodes can be called bootstrap
    nodes whose endpoints are already available with the source code itself. Every
    time one downloads the binaries, a fresh list of active nodes get downloaded along
    with the binaries. Once a Bitcoin node connection is established, it is very easy
    to pull the list of other Bitcoin nodes active at that point in time. A pictorial
    representation of how a new node becomes a part of the network can be found in
    the following figures.


    #### Step-1:

    Imagine that there were six nodes active at some point in time in the Bitcoin
    network. Refer to Figure [3-10](#A440588_1_En_3_Chapter.html#Fig10).


    ![A440588_1_En_3_Fig10_HTML.jpg](A440588_1_En_3_Fig10_HTML.jpg)


    **Figure 3-10** – Bitcoin network in general


    #### Step-2:

    There is a new node, say, a seventh node that just showed up and is trying to
    join the existing Bitcoin network, but does not have any connection yet. Refer
    to Figure [3-11](#A440588_1_En_3_Chapter.html#Fig11).


    ![A440588_1_En_3_Fig11_HTML.jpg](A440588_1_En_3_Fig11_HTML.jpg)


    **Figure 3-11** – A new node trying to join the network


    #### Step-3:

    The seventh node will try to reach out to as many nodes as it can either using
    DNS seeds or using the list of stable Bitcoin nodes in the list that it has—as
    shown in Figure [3-12](#A440588_1_En_3_Chapter.html#Fig12).


    ![A440588_1_En_3_Fig12_HTML.jpg](A440588_1_En_3_Fig12_HTML.jpg)


    **Figure 3-12** – New Bitcoin node contacts some peers


    In the diagram, we have skipped the DNS resolution part. It is the same as when
    you browse any website with its name and post DNS resolution the IP address is
    retrieved, which is then used as the destination webserver’s address to send TCP
    packets to. To connect to a new peer, the node establishes a TCP connection on
    port `8333` (port `8333` is well known for Bitcoins but could be different). Then
    the two nodes handshake with information such as version number, time, IP addresses,
    height of blockchain, etc. The actual Bitcoin code for “Version” message defined
    in `net.cpp` is as shown in the following:


    ```

    PushMessage( "version", PROTOCOL_VERSION, nLocalServices, nTime, addrYou, addrMe,

    nLocalHostNonce, FormatSubVersion(CLIENT_NAME, CLIENT_VERSION,

    std::vector<string>()), nBestHeight, true );

    ```


    Through this `Version` message, the compatibility between the two nodes is checked
    as the first step toward further communication.


    #### Step-4:

    In the fourth step, the requested nodes will respond with the list of IP addresses
    and corresponding port numbers of the other active Bitcoin nodes that they are
    aware of. Please note that it is possible for some of active nodes to not be aware
    of each and every Bitcoin node in the network at any time. The port number is
    important because once the TCP packets reach the destination node, it is the port
    number that is used by the operating system to direct the message to the correct
    application/process running on the system. Please refer to Figure [3-13](#A440588_1_En_3_Chapter.html#Fig13).


    ![A440588_1_En_3_Fig13_HTML.jpg](A440588_1_En_3_Fig13_HTML.jpg)


    **Figure 3-13** – Peer Bitcoin nodes respond to the network request by a new node


    Note that, only one peer may be enough to bootstrap the connection of a node to
    the Bitcoin network; the node must continue to discover and connect to new peers.
    This is because nodes come and go at will and no connection is reliable.


    #### Step-5:

    In the fifth step, the new seventh node establishes connection with all the reachable
    Bitcoin nodes, depending on the list it received from the nodes contacted in the
    previous step. Figure [3-14](#A440588_1_En_3_Chapter.html#Fig14) represents this.


    ![A440588_1_En_3_Fig14_HTML.jpg](A440588_1_En_3_Fig14_HTML.jpg)


    **Figure 3-14** – A new node becomes a part of the Bitcoin network'
