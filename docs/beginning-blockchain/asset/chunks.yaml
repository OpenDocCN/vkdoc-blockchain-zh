    Bitcoin Core 这样的本地全节点，可以作为轻客户端节点运行。尽管它是用 Java 实现的，但可以从任何兼容 JVM 的语言（如 JavaScript
    和 Python）中使用。


    ## 摘要


    在本章中，我们学习了如何将上一章讨论的区块链概念组合起来，构建比特币作为区块链技术的一种加密货币用例。我们涵盖了比特币的演变、历史、定义、设计优势及其为何如此重要。我们深入了解了比特币网络、交易、区块、区块链、共识机制以及所有这些要素如何相互衔接的细节。然后，我们学习了与比特币区块链系统交互所需钱包解决方案的要求。


    20 世纪 90 年代，互联网的普及改变了人们的经商方式。它消除了信息创建和传播中的摩擦。这为新市场、更多机遇和可能性铺平了道路。同样地，如今的区块链正在将互联网提升到一个全新的水平。比特币只是区块链的一种加密货币应用，而可能性是无限的。在下一章中，我们将学习以太坊如何运作，以及它如何成为单一公共区块链网络上各种去中心化应用的事实标准。


    # 以太坊的工作原理


    区块链应用的时代才刚刚开始。以太坊将成为构建去中心化应用的事实上的区块链平台。我们在前几章已经学到，公共区块链的用例不仅限于加密货币，其可能性只受限于你的想象力！以太坊已经在许多商业领域取得进展，不仅最适合公共区块链用例，也适用于私有区块链用例。以太坊已经为区块链平台树立了标杆，必须深入研究，才能设想如何借助或不借助以太坊来构建可用的去中心化应用。如今，得益于以太坊，即使仅具备最少的密码学、博弈论、数学或复杂编码以及计算机科学基础知识，也能构建区块链应用。


    在本书第 3 章中，我们通过深入探讨协议和比特币应用，学习了比特币的工作原理。我们见证了加密货币方面如何与比特币协议紧密交织。我们了解到，比特币并非区块链上的比特币，而是特币区块链。在本章中，我们将学习以太坊如何成功构建了一个抽象基础层，该层能够在同一个区块链平台上赋能各种不同的区块链用例。


    ## 从比特币到以太坊


    显然，区块链技术是 2009 年随比特币一同出现的。在比特币经受住时间的考验后，人们开始相信区块链的潜力。如今，其用例已超越银行和金融领域，扩展到供应链、零售、电子商务、医疗保健、能源以及政府等其他行业。这是因为不同类型的区块链已经出现，并解决特定的业务问题。尽管如此，也有像以太坊这样的公共区块链平台，允许在同一个公共以太坊平台上构建不同的去中心化用例。


    借助比特币，去中心化的点对点加密货币交易成为可能。人们意识到，区块链不仅可用于交易加密货币，还可用于交易和追踪任何具有价值的东西。人们开始探索是否可以将同一个比特币网络用于其他用例。举个例子，`存在性证明`
    就是一个这样的用例，它将文档的哈希值注入比特币区块链网络，以便任何人之后都能验证该文档在某个时间点是否存在。Vitalik Buterin 引入了以太坊区块链平台，该平台不仅能够促进货币交易，还能促进股份、土地、数字内容、车辆等许多具有内在价值的事物的交易。看一下图
    4-1。


    ![A440588_1_En_4_Fig1_HTML.jpg](img/A440588_1_En_4_Fig1_HTML.jpg)


    图 4-1


    一个以太坊平台上的多个去中心化应用


    与比特币一样，以太坊是一个具有不同设计理念的公共区块链平台。其最具创新性的方法是构建一个抽象层，使来自不同应用的交易被泛化为可以在所有以太坊节点上运行的程序代码。即使在以太坊中，矿工也会生成以太币，这是一种可交易的加密货币，公共区块链网络借此实现自我维持。任何在以太坊上运行的应用都必须支付交易费用，矿工最终通过运行节点和维持整个网络来获得这些费用。

    '
- fmt: '### Ethereum as a Next-Gen Blockchain


    With the Bitcoin blockchain, the developer community tried building different
    decentralized applications with a completely new blockchain, or were trying to
    modify Bitcoin Core to increase the set of functionalities. Either way, it was
    complicated as well as time consuming. A different design with an alternative
    protocol was probably the need of the hour then, which is why the Ethereum blockchain
    platform! The purpose was to facilitate development of many blockchain applications
    on one Ethereum platform rather than building dedicated blockchains for each application
    separately. Ethereum enabled rapid development of decentralized applications that
    could interact among themselves, ensuring adequate security. As mentioned in the
    previous section, Ethereum does this by building an abstract foundation layer.
    Unlike Bitcoin, Ethereum supported Turing-complete language so anyone could write
    smart contracts that could virtually do anything and everything on a programming
    perspective. Also, Ethereum is stateful by design and keeps track of the account
    states, which is very different from Bitcoin where everything remains as a transaction
    and there is no internal persistent memory for scripts. With the help of an abstract
    foundation layer, the underlying complexities are hidden from the developers and
    not just that; the developers get the flexibility of designing their own state
    transition functions for direct transfer of value and information, and transaction
    formats.


    In an effort to meet the objective, the core innovation of Ethereum was the Ethereum
    Virtual Machine (`EVM`). The support for Turing-complete languages through the
    `EVM` makes it easy for the developers to create blockchain applications. Just
    the way a Java Virtual Machine (`JVM`) is required to run Java code, `EVM` is
    required to run the smart contracts. For now, just keep in mind that smart contracts
    are the Ethereum scripts written in a Turing-complete language that automatically
    gets executed in case a predefined event occurs. The `ScriptSig` and `ScriptPubKey`
    in Bitcoins are the basic versions of smart contracts so to speak. We learned
    in the previous chapter that in Bitcoins, the instruction set was very limited.
    In Ethereum, however, one could code almost any program that would run on the
    `EVM` on each and every node in the Ethereum blockchain network. The decentralized
    applications in Ethereum are called DApps. Ethereum being a global decentralized
    computer system with no centralized server, DApps are the applications that run
    without downtime, fraud, or any sort of regulations. A peer-to-peer electronic
    cash system such as Bitcoin is very easy to build on Ethereum as a DApp. Similarly,
    any other asset with some intrinsic value, such as land, cars, houses, votes,
    etc., could easily be transacted through their respective DApps on Ethereum in
    the form of tokens.


    Unlike traditional software development and deployment, DApps do not need to be
    hosted on a back-end server. The “code” is embedded as payload in transactions,
    so to speak, that are then sent to the mining nodes in the Ethereum network. Such
    transactions would be considered by the mining ecosystem because of the ETH (Ether)
    paid as “gas Price.” Like in Bitcoin, these transactions get broadcast to other
    miners in the network that they are accessible to. The transaction then eventually
    gets into a block and becomes an eternal part of the blockchain when consensus
    is reached. Developers have the liberty to code up any solution and deploy that
    in the Ethereum network. The network executes that, all by itself, and validates
    and produces the outputs as well. Well, had it been without any cost, the network
    wouldn’t have been sustainable. There is a gas Price associated with each blockchain
    transaction, and writing some garbage code and deploying that into the Ethereum
    network could be an expensive affair!


    ### Design Philosophy of Ethereum


    Ethereum borrows many concepts from Bitcoin Core as it stood the test of time,
    but is designed with a different philosophy. Ethereum development has been done
    following certain principles as follows:


    * Simplistic design: The Ethereum blockchain is designed to be as simple as possible
    so that it is easy to understand and develop decentralized applications on. The
    complexities in the implementation are kept to a bare minimum at the consensus
    level and are managed at a level above it. As a result, high-level language compilation
    or serialization/deserialization of arguments, etc. are not a concern for the
    developers.

    * Freedom of development: The Ethereum platform is designed to encourage any sort
    of decentralization on its blockchain platform and does not discriminate or favor
    any specific kinds of use cases. This freedom is given to an extent that a developer
    can code up an infinite loop in a smart contract and deploy it. Obviously, the
    loop will run as long as they are paying the transaction fee (gas Price), and
    the loop eventually terminates when it runs out of gas.

    * No notion of features: In an effort to make the system more generalized, Ethereum
    does not have built-in features for the developers to use. Instead, Ethereum provides
    support for Turing-complete language and lets the users develop their own features
    the way they want to. Starting from basic features such as `locktime`, as in Bitcoin
    till full blown use cases, everything can be coded up in Ethereum.


    ## Enter the Ethereum Blockchain


    We learned about the objective behind Ethereum blockchain and its design philosophy.
    To be able to understand and appreciate this next-gen blockchain and build decentralized
    applications on it, we will learn about the core components of Ethereum in great
    detail in this section.'
