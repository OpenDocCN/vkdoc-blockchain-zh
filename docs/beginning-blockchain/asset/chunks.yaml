    *   Take a look at the expanded word now: [w[4], w[5], w[6], w[7]]. Notice that
    w[5] depends on w[4] and w[1]. This means that every expanded word depends on
    the immediately preceding word, i.e., w[i] – 1 and the word that is four positions
    back, i.e., w[i] – 4 . Test the same for w[6] as well. As you can see, just a
    simple XOR operation is performed here.

    *   Now, what about w[4]? Or, any other position that is a multiple of four, such
    as w[8] or w[12]? For these words, a more complex function denoted as “g” is used.
    It is basically a three-step function. In the first step, the input four-word
    block goes through circular left shift by one byte. For example [w[0], w[1], w[2],
    w[3]] becomes [w[1], w[2], w[3], w[0]]. In the second step, the four bytes input
    word (e.g., [w[1], w[2], w[3], w[0]]) is taken as input and byte substitution
    is applied on each byte using S-box. Then, in the third step, the result of step
    2 is XORed with something called round constant denoted as Rcon[ ]. The round
    constant is a word in which the right-most three bytes are always zero. For example,
    [x, 0, 0, 0]. This means that the purpose of Rcon[ ] is to just perform XOR on
    the left-most byte of the step 2 output key word. Also note that the Rcon[ ] is
    different for each round. This way, the final output of the complex function “g”
    is generated, which is then XORed with w[i] – 4 to get w[i] where “I” is a multiple
    of 4.

    *   This is how the key expansion takes place in AES.


    The output state array of the last round is rearranged back to form the 128-bit
    ciphertext block. Similarly, the decryption process takes place in a different
    order, which we looked at in the AES process diagram. The idea was to give you
    a heads-up on how this algorithm works at a high level, and we will restrict our
    discussion to just the encryption process in this section.


    The AES algorithm is standardized by the NIST (National Institute of Standards
    and Technology) . It had the limitation of long processing time. Assume that you
    are sending just a 1 megabyte file (8388608 bits) by encrypting with AES. Using
    a 128-bit AES algorithm, the number of steps required for this encryption will
    be 8388608/128 = 65536 on this same number of data blocks! Using a parallel processing
    approach, AES efficiency can be increased, but is still not very suitable when
    you are dealing with large data.


    #### Challenges in Symmetric Key Cryptography


    There are some limitations in symmetric key cryptography. A few of them are listed
    as follows:


    *   The key must be shared by the sender and receiver before any communication.
    It requires a secured key establishment mechanism in place.

    *   The sender and receiver must trust each other, as they use the same symmetric
    key. If a receiver is hacked by an attacker or the receiver deliberately shared
    the key with someone else, the system gets compromised.

    *   A large network of, say, n nodes require key n(n–1)/2 key pairs to be managed.

    *   It is advisable to keep changing the key for each communication session.

    *   Often a trusted third party is needed for effective key management, which
    itself is a big issue.


    ### Cryptographic Hash Functions


    Hash functions are the mathematical functions that are the most important cryptographic
    primitives and are an integral part of blockchain data structure. They are widely
    used in many cryptographic protocols, information security applications such as
    Digital Signatures and message authentication codes (MACs) . Since it is used
    in asymmetric key cryptography, we will discuss it here prior to getting into
    asymmetric cryptography. Please note that the concepts covered in this section
    may not be in accordance with the academic text books, and a little biased toward
    the blockchain ecosystem.


    Cryptographic hash functions are a special class of hash functions that are apt
    for cryptography, and we will limit our discussion pertaining to it only. So,
    a cryptographic hash function is a one-way function that converts input data of
    arbitrary length and produces a fixed-length output. The output is usually termed
    “hash value” or “message digest.” It can be represented as shown Figure [2-8](#A440588_1_En_2_Chapter.html#Fig8).


    ![A440588_1_En_2_Fig8_HTML.jpg](A440588_1_En_2_Fig8_HTML.jpg)


    Figure 2-8


    Hash function in its basic form


    For the hash functions to serve their design purpose and be usable, they should
    have the following core properties:


    *   Input can be any string of any size, but the output is of fixed length, say,
    a 256-bit output or a 512-bit output as examples.

    *   The hash value should be efficiently computable for any given message.

    *   It is deterministic, in the sense that the same input when provided to the
    same hash function produces the same hash value every time.

    *   It is infeasible (though not impossible!) to invert and generate the message
    from its hash value, except trying for all possible messages.

    *   Any small change in the message should greatly influence the output hash,
    just so no one can correlate the new hash value with the old one after a small
    change.


    Apart from the aforementioned core properties, they should also meet the following
    security properties to be considered as a cryptographic protocol:


    *   Collision resistance: It implies that it is infeasible to find two different
    inputs, say, X and Y, that hash to the same value.


