- fmt: '### Bitcoin Transactions Revisited


    A transaction in the Bitcoin network is a transfer of value, which is a broadcast
    to the entire network and ends up in some block in the blockchain. Typically,
    it appears that Bitcoins get transferred from one account or wallet to another,
    but in reality, it is from one transaction to another. Well, before getting into
    further details, keep in mind that the Bitcoin addresses are basically the double-hashed
    output of the public key of the participants. The public key is first hashed using
    `SHA256` and then by `RIPEMD160` hashing algorithms, respectively, to generate
    160-bit Bitcoin addresses. We have already covered these hashing techniques in
    the previous chapter. Let us zoom in a bit more into the transactions now. Take
    a look at the following transaction tree (Figure [3-20](#A440588_1_En_3_Chapter.html#Fig20)),
    the way it happens in Bitcoin.


    ![A440588_1_En_3_Fig20_HTML.jpg](A440588_1_En_3_Fig20_HTML.jpg)


    **Figure 3-20** A typical Bitcoin transaction structure


    Observe that the output of previous transactions become input to new transactions
    and this process continues forever. In the previous figure, if it was you who
    got the 100K from some previous output, it became the spendable input to a new
    transaction. Notice that in `Tx 0`, you spent 40K and 50K and paid up those amounts,
    and the remaining amount (10K) became the fee to the miner. By default, the remaining
    amount is paid to the miner, so you need to be careful not to ignore such situations,
    which are always the case. In this same situation, out of the remaining 10K amount,
    you could transfer say 9K to your own address and leave aside 1K for the mining
    fee. When an amount is not spent, in the sense that a transaction is not used
    as an input to a new transaction, it remains a `UTXO`, which can be spent later.
    Obviously, the ones previous to it are already spent. So, all the `UTXO`s combined
    for all the accounts (public keys) that you hold are your wallet balance.


    Pause for a moment here, and think about how it must have been programmed. Remember
    that both the inputs and outputs of transactions are equipped with relevant scripts
    to make it possible. It is only through the scripts that it can be ensured that
    you are the authorized user to make a transaction and you have the necessary amount
    that you have received from a previous transaction. This means that both the inputs
    and outputs are equally important. Here is how the transaction’s contents look:


    ```

    Transaction Output = Amount of Bitcoins to transfer + Output Script

    Transaction Input = Reference to previous transaction output + Input Script

    ```


    Whether to look into the output script first or the input script first is actually
    an egg-chicken problem. But we will see the output script first because it is
    the one that is being consumed by the input script of the next transaction. Let
    us repeat and get this right, that while making a transaction, the output script
    of the current transaction is there just to enable the future transaction that
    can consume this as input, but for this current transaction, it is the previous
    transaction’s output script that lets you spend it. This is why the output scripts
    have the public key of the recipient and the value (amount of Bitcoins) being
    transferred. When the output scripts are being used as inputs, their primary purpose
    is to check the signature against the public key. The output scripts are also
    called `ScriptPubKey`. Unless this output is spent, it remains a `UTXO` waiting
    to be spent.


    The input script in the transaction input data structure has the mechanism of
    how to consume the previous transaction that you are trying to spend. So, it has
    to have the reference to that previous transaction. The hash of the previous transaction
    and the index number `{hash, index}` pinpoints the exact place where you had received
    the amount that you are now spending. The purpose of the “index” is to identify
    the intended output in the previous transaction. If you were the recipient of
    the previous transaction, you have to provide your signature to claim that you
    are the rightful owner of the public key to which the transaction was made. This
    will let you spend that transaction. Also, you have to provide your public key,
    which will hash to the one used as destination address in previous transaction.
    Input scripts are also known as `ScriptSig`s. The ultimate objective of the script
    is to push the signatures and keys onto the stack.


    A typical Bitcoin transaction has the following fields (Table [3-5](#A440588_1_En_3_Chapter.html#Tab5)).


    **Table 3-5** Bitcoin Transaction Fields


    | Field | Size | Description |

    | --- | --- | --- |

    | Version no | 4 bytes | Currently 1\. It tells Bitcoin peers and miners which
    set of rules to use to validate this transaction. |

    | In-counter | 1 - 9 bytes | Positive integer (`VI = VarInt`). It indicates total
    number of inputs. |

    | list of inputs | Variable length | It lists all the inputs for a transaction.
    |

    | Out-counter | 1 - 9 bytes | Positive integer (`VI = VarInt`). It indicates total
    number of outputs. |

    | list of outputs | Variable length | It lists all the outputs for a transaction.
    |

    | lock_time | 4 bytes | Not being used currently. It indicates if the transaction
    should be included in the blockchain block immediately after it is validated by
    the miner or there should be some lock time before it gets included in the block.
    |


    Let us now take a look at a different representation of the same transaction structure
    that we discussed in the previous section. This is to see a more detailed view
    of the transaction structure and the various components of it. Now refer to Figure
    [3-21](#A440588_1_En_3_Chapter.html#Fig21).


    ![A440588_1_En_3_Fig21_HTML.jpg](A440588_1_En_3_Fig21_HTML.jpg)


    **Figure 3-21** Granular components of a Bitcoin transaction


    As you can see in the previous figure, the data items such as signatures or public
    keys are all embedded inside the scripts and are a part of the transaction. Just
    by looking at the granular components of Bitcoin transactions, many of your queries
    would be answered up front. The instructions in the script get pushed onto the
    stack and executed, which we will explore in detail shortly.


    When Bitcoin nodes receive the transaction broadcasts, they all validate those
    transactions individually, by combining the output script of the previous transaction
    with the input script of the current transaction following the steps mentioned
    as follows.'
