- fmt: '这使得哈希函数`H()`具有抗碰撞性，因为没有人能找到`X`和`Y`，使得`H(X) = H(Y)`。注意，这个哈希函数是一个压缩函数，因为它将给定的输入压缩为比输入更短的固定大小输出。因此，与输出空间（固定大小）相比，输入空间（任意大小）过于庞大。如果输出是一个256位的哈希值，那么输出空间最多可以有`2^(256)`个值，并且不会超出这个范围。这意味着碰撞必然存在。然而，找到这种碰撞极其困难。根据“生日悖论”的原理，我们可以推断出，通过遍历输出空间的平方根次数，应该能够找到碰撞。因此，取`2^(128)
    + 1`个输入，找到碰撞的可能性很高；但要计算这个数字是极其庞大的，这非常不可行！接下来我们讨论这个属性在何处有用。在大多数在线存储、云文件存储、对象存储、应用商店等场景中，“抗碰撞性”被广泛用于确保文件的完整性。例如：有人计算出一个文件的消息摘要并将其上传到云存储。之后，当他们下载该文件时，他们可以重新计算消息摘要，并与之前保存的摘要进行交叉比对。通过这种方式，可以确保文件是否因传输问题或某些蓄意尝试而损坏。正是由于抗碰撞性的特性，没有人能够找到一个不同的文件或修改过的文件，其哈希值与原始文件的哈希值相同。


    *   **抗原像性**：这个属性意味着在计算上无法逆向一个哈希函数；即，从输出`H(X)`找到输入`X`是不可行的。因此，这个属性也可以称为“隐藏”属性。请特别注意这里；这种情况还有一个微妙的方面。请注意，当`X`可以是世界上的任何东西时，这个属性很容易实现。然而，如果`X`只取有限数量的值，并且这些值对攻击者是已知的，那么他们可以轻松计算出`X`的所有可能值，并找出哪个值的哈希与结果匹配。示例：一个实验室决定为实验的成功结果准备消息摘要，这样任何能够访问结果数据库的攻击者都无法理解其内容，因为系统中存储的是哈希后的输出。假设实验只有三种可能的结果，如`OP111`、`OP112`和`OP113`，其中只有一个是成功的，比如说`OP112`。于是，实验室决定对其进行哈希，计算`H(OP112)`，并将哈希值存储在系统中。虽然攻击者无法从`H(OP112)`找到`OP112`，但他们可以简单地哈希所有可能的实验结果，即`H(OP111)`、`H(OP112)`和`H(OP113)`，然后发现只有`H(OP112)`与系统中存储的值匹配。这种情况当然很脆弱！这意味着，当哈希函数的输入来自一个有限的空间并且不是分布广泛的分布时，它是弱的。然而，有一个解决方案如下：我们取一个输入，比如“`X`”，它分布不广，就像我们刚才讨论的只有少数可能值的实验结果一样。如果我们将它与另一个随机输入（比如“`r`”）拼接起来，该输入来自一个具有高最小熵的概率分布，那么从`H(r
    || X)`中找到`X`将变得困难。这里，高最小熵意味着分布非常广泛，并且没有特定的值容易出现。假设“`r`”是从256位分布中选取的。对于攻击者来说，要精确得到与输入一起使用的“`r`”值，成功的概率是`1/2^(256)`，这几乎是不可能实现的。唯一的方法是一个接一个地考虑这个分布的所有可能值——这又是实际上不可能的。值“`r`”也被称为“nonce”。在密码学中，nonce是一个只能使用一次的随机数。现在我们来讨论抗原像性属性在何处有用。它在承诺一个值时非常有用，因此“承诺”就是这里的用例。这可以通过一个例子更好地解释。假设你参与了一些博彩或赌博活动。假设你必须承诺你的选择，并将其公开宣布。然而，别人不应该能猜出你在赌什么，而且你以后也不能否认你的赌注。因此，你利用了哈希函数的抗原像性属性。你对你所赌选择的哈希值进行公开声明。没有人能够逆向哈希函数并找出你在赌什么。同时，你以后也不能说你的选择是另一个，因为如果你对另一个选择进行哈希，它将与你之前公开声明的不匹配。建议使用我们上一段中解释过的
    nonce “`r`”来设计此类系统。


    *   **第二抗原像性**：这个属性与“抗碰撞性”略有不同。它意味着给定一个输入`X`及其哈希值`H(X)`，找到`Y`使得`H(X) = H(Y)`是不可行的。与抗碰撞性不同，这里讨论的是针对一个固定的、给定的`X`。这意味着，如果一个哈希函数已经具有抗碰撞性，那么它也必然具有第二抗原像性。'
  raw: 'This makes the hash function H() collision resistant because no one can find
    X and Y, such that H(X) = H(Y). Note that this hash function is a compression
    function, as it compresses a given input to fixed sized output that is shorter
    than the input. So, the input space is too large (anything of any size) compared
    with the output space, which is fixed. If the output is a 256-bit hash value,
    then the output space can have a maximum of 2^(256) values, and not beyond that.
    This implies that a collision must exist. However, it is extremely difficult to
    find that collision. As per the theory of “the birthday paradox,” we can infer
    that it should be possible to find a collision by using the square root of the
    output space. So, by taking 2^(128) + 1 inputs, it is highly likely to find a
    collision; but that is an extremely huge number to compute, which is quite infeasible!
    Let us now discuss where this property could be useful. In the majority of online
    storage, cloud file storage, blob storage, App Stores, etc., the property “collision
    resistance” is widely used to ensure the integrity of the files. Example: someone
    computes the message digest of a file and uploads to cloud storage. Later when
    they download the file, they could just compute the message digest again and cross-check
    with the old one they have. This way, it can be ensured if the file was corrupted
    because of some transmission issues or possibly due to some deliberate attempts.
    It is due to the property of collision resistance that no one can come up with
    a different file or a modified file that would hash to the same value as that
    of the original file.

    *   Preimage resistance: This property means that it is computationally impossible
    to invert a hash function; i.e., finding the input X from the output H(X) is infeasible.
    Therefore, this property can also be called “hiding” property. Pay close attention
    here; there is another subtle aspect to this situation. Note that when X can be
    anything in the world, this property is easily achieved. However, if there are
    just a limited number of values that X can take, and that is known to the adversary,
    they can easily compute all possible values of X and find which one hashes to
    the outcome. Example: A laboratory decided to prepare the message digests for
    the successful outcome of an experiment so that any adversary who gets access
    to the results database cannot make any sense of it because what is stored in
    the system are hashed outputs. Assume that there can only be three possible outcomes
    of the experiment such as OP111, OP112, and OP113, out of which only one is successful,
    say, OP112\. So, the laboratory decides to hash it, compute H(OP112), and store
    the hashed values in the system. Though an adversary cannot find OP112 from H(OP112),
    they can simply hash all the possible outcomes of the experiment, i.e., H(OP111),
    H(OP112), and H(OP113) and see that only H(OP112) is matching with what is stored
    in the system. Such a situation is certainly vulnerable! This means that, when
    the input to a hash function comes from a limited space and does not come from
    a spread-out distribution, it is weak. However, there is a solution to it as follows:
    Let us take an input, say “X” that is not very spread out, just like the outcomes
    of the experiment we just discussed with a few possible values. If we can concatenate
    that with another random input, say “r,” that comes from a probability distribution
    with high min entropy, then it will be difficult to find X from H(r || X). Here,
    high min entropy means that the distribution is very spread out and there is no
    particular value that is likely to occur. Assume that “r” was chosen from 256-bit
    distribution. For an adversary to get the exact value of “r” that was used along
    with input, there is a success probability of 1/2^(256), which is almost impossible
    to achieve. The only way is to consider all the possible values of this distribution
    one by one—which is again practically impossible. The value “r” is also referred
    to as “nonce.” In cryptography, a nonce is a random number that can be used only
    once. Let us now discuss where this property of preimage resistance could be useful.
    It is very useful in committing to a value, so “commitment” is the use case here.
    This can be better explained with an example. Assume that you have participated
    in some sort of betting or gambling event. Say you have to commit to your option,
    and declare it as well. However, no one should be able to figure out what you
    are betting on, and you yourself cannot deny later on what you bet on. So, you
    leverage the preimage resistance property of Hash Function. You take a hash of
    the choice you are betting on, and declare it publicly. No one can invert the
    hash function and figure out what you are betting on. Also, you cannot later say
    that your choice was different, because if you hash a different choice, it will
    not match what you have declared publicly. It is advisable to use a nonce “r”
    the way we explained in the previous paragraph to design such systems.

    *   Second preimage resistance: This property is slightly different from “collision
    resistant.” It implies that given an input X and its hash H(X), it is infeasible
    to find Y, such that H(X) = H(Y). Unlike in collision-resistant property, here
    the discussion is for a given X, which is fixed. This implies that if a hash function
    is collision resistant already, then it is second preimage resistant also.'
