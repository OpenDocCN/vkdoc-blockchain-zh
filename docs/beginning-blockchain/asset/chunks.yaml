    ### 哈希函数代码示例


    以下是一些不同哈希函数的代码示例。本节旨在让您初步了解如何以编程方式使用哈希函数。代码示例使用 Python 编写，但在不同语言中会非常相似；您只需找到合适的库函数即可。


    ```python

    # -*- coding: utf-8 -*-

    import hashlib

    # hashlib 模块是 Python 中流行的哈希计算模块

    # hashlib 中提供了 md5()、sha1()、sha224()、sha256()、sha384()和 sha512()的构造函数

    md=hashlib.md5()

    md.update("The quick brown fox jumps over the lazy dog")

    print md.digest()

    print "摘要大小:", md.digest_size, "\n", "块大小: ", md.block_size

    # 比较 SHA224、SHA256、SHA384、SHA512 的摘要

    print "摘要 SHA224", hashlib.sha224("The quick brown fox jumps over the lazy dog").hexdigest()

    print "摘要 SHA256", hashlib.sha256("The quick brown fox jumps over the lazy dog").hexdigest()

    print "摘要 SHA384", hashlib.sha384("The quick brown fox jumps over the lazy dog").hexdigest()

    print "摘要 SHA512", hashlib.sha512("The quick brown fox jumps over the lazy dog").hexdigest()

    # 所有哈希输出都是唯一的

    # RIPEMD160 160 位哈希示例

    h = hashlib.new(''ripemd160'')

    h.update("The quick brown fox jumps over the lazy dog")

    h.hexdigest()

    # 密钥派生算法：

    # 原生哈希算法无法抵御暴力破解攻击。

    # 密钥派生算法用于保护密码哈希。

    import hashlib, binascii

    algorithm=''sha256''

    password=''HomeWifi''

    salt=''salt'' # salt 是随机数据，可作为单向函数的附加输入

    nu_rounds=1000

    key_length=64 # dklen 是派生密钥的长度

    dk = hashlib.pbkdf2_hmac(algorithm,password, salt, nu_rounds, dklen=key_length)

    print ''派生密钥: '',dk

    print ''十六进制格式的派生密钥 :'', binascii.hexlify(dk)

    # 检查哈希的属性

    import hashlib

    input = "示例输入文本"

    for i in xrange(20):

    # 将迭代器附加到文本末尾

    input_text = input + str(i)

    # 显示输入和哈希结果

    print input_text, '':'',  hashlib.sha256(input_text).hexdigest()

    ```


    ### MAC 与 HMAC


    `HMAC` 是 `MAC`（消息认证码）的一种类型。顾名思义，`MAC` 的目的是使用对称密钥提供消息认证，并使用哈希函数提供消息完整性。因此，发送方将
    `MAC` 与消息一起发送，供接收方验证和信任。接收方已经拥有密钥 `K`（由于使用的是对称密钥加密技术，因此发送方和接收方已事先就密钥达成一致）；他们只需使用该密钥计算消息的
    `MAC`，然后将其与随消息一起发送的 `MAC` 进行比对。


    在最简单的形式中，`MAC = H(key || message)`。`HMAC` 实际上是一种将哈希函数转换为 `MAC` 的技术。在 `HMAC` 中，哈希函数可以与密钥及其派生密钥一起多次应用。`HMAC`
    广泛应用于基于 RFID 的系统、TLS 等。在 SSL/TLS（HTTPS 是 SSL/TLS 中的 TTP）中，`HMAC` 用于让客户端和服务器验证并确保交换的数据在传输过程中未被篡改。下面我们来了解一些广泛使用的重要
    MAC 策略：


    - **先 MAC 后加密**：此技术要求先对明文计算 `MAC`，将其附加到数据后，再对所有内容进行加密。此方案不提供密文的完整性。在接收端，必须首先进行消息解密，然后才能检查消息的完整性。不过，它确保了明文的完整性。TLS
    使用此 `MAC` 方案来确保客户端-服务器通信会话是安全的。

    - **加密与 MAC 同时进行**：此技术要求对消息或明文进行加密和 `MAC` 计算，然后将 `MAC` 附加到加密消息或密文的末尾。请注意，`MAC`
    是在明文上计算的，因此可以保证明文的完整性，但不能保证密文的完整性，这为某些攻击留下了空间。与前一方案不同，明文的完整性可以得到验证。SSH（安全外壳）使用此
    `MAC` 方案。

    - **先加密后 MAC**：此技术要求先对明文进行加密，然后计算密文的 `MAC`。然后将此密文的 `MAC` 附加到密文本身上。此方案确保了密文的完整性，因此可以首先检查完整性，如果有效，则进行解密。它可以轻松过滤掉无效的密文，这在许多情况下提高了效率。此外，由于
    `MAC` 位于密文中，它绝不会泄露关于明文的任何信息。它通常是最理想的方案，并且应用更广泛。它被用于 IPsec 中。

