    当比特币网络，更准确地说是矿工，收到来自 Alice 的交易时，他们会检查并确认这是一笔有效交易，然后通过将其包含在他们的区块中（提出区块的矿工负责此事）来批准该交易。当这种情况发生时，该交易的输出成为
