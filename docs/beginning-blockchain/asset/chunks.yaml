  trans: "  \n### Trie 的使用  \n\n我们学习了三种以区块头为根节点的 Trie。这些根节点本质上是指向这三个 Trie 的指针。虽然在之前的章节中我们已经简要概述了这些\
    \ Trie，但让我们换个角度重新审视它们：  \n\n- **状态 Trie**：表示访问区块后的整个状态（即全局状态）。  \n- **交易 Trie**：表示区块中按索引编号的所有交易（例如，key:0\
    \ 对应第一条执行的交易，key:1 对应第二条交易，以此类推）。请回想我们之前学过的 MPT 基础知识并尝试关联理解。  \n- **收据 Trie**：表示与每笔交易对应的“收据”。交易的收据是一个经过\
    \ RLP 编码的数据结构，如下所示：  \n\n```\n[medstate, gas_used, logbloom, logs]\n```\n\n由于我们尚未深入探讨收据\
    \ Trie 的基础知识，现在让我们更详细地研究它。请查看收据 Trie 的 RLP 编码数据结构中的所有字段，并阅读以下针对这些字段的说明：  \n\n\
    - **`medstate`**：处理交易后的状态 Trie 根。成功的交易会更新以太坊状态。  \n- **`gas_used`**：处理该交易消耗的 Gas\
    \ 总量。  \n- **`logs`**：一个包含以下格式项目的列表：  \n\n```\n[address, [topic1, topic2...],\
    \ data]\n```  \n\n- 这些列表项由 `LOG0`、`LOG1`…… 等操作码在交易执行过程中生成。`address` 字段是生成日志的合约地址，`topic`\
    \ 字段包含最多四个 32 字节的值，`data` 字段是任意大小的字节数组。  \n- **`logbloom`**：由交易中所有日志的地址和主题构成的布隆过滤器。这与区块头中的布隆过滤器不同。\
    \  \n\n### 默克尔帕特里夏树  \n\n在以太坊中，账户与其各自的状态一一映射。所有以太坊账户（包括外部拥有账户和合约账户）与其状态之间的映射统称为“世界状态”。以太坊用于存储这种映射关系的数据结构是\
    \ MPT。因此，MPT 是以太坊中使用的主要数据结构，也称为默克尔帕特里夏树。我们在比特币章节中学习了默克尔树，这已经帮助我们理解了 MPT 的一半内容。MPT\
    \ 实际上融合了默克尔树和帕特里夏树的特点。  \n\n回想比特币章节，默克尔树是一种二叉哈希树，其中叶节点包含数据块的哈希值，每个非叶节点包含其子节点的哈希值。实现这种数据结构后，可以轻松验证某笔交易是否属于某个区块。只需从整个区块中提取少量信息（即仅使用默克尔分支而非整个树），就能非常简便地提供成员证明。默克尔树在去中心化系统中实现了高效且安全的内容验证。轻客户端无需下载每笔交易和每个区块，只需下载区块头链——每个区块仅需\
    \ 80 字节的数据块，其中仅包含五项内容：前一个区块头的哈希、时间戳、挖矿难度、满足工作量证明的随机数值，以及包含该区块所有交易的默克尔树根哈希。虽然这非常实用且有趣，但请注意，除了验证区块中某笔交易的成员证明外，其功能有限。一个明显的限制是，它无法证明关于当前状态的任何信息（例如数字资产总量、名称注册、金融合约状态）。即使要查询你持有多少比特币，也需要大量查询和验证工作。\
    \  \n\n另一方面，帕特里夏树是基数树的一种形式。PATRICIA 代表“检索字母数字编码信息的实用算法”。帕特里夏树支持高效的插入/删除操作。其中键值查找效率极高，键始终编码在路径中。因此，`key`\
    \ 是从根节点到存储 `value` 的叶节点所经过的路径。键通常是帮助向下遍历路径的字符串，每个字符指示应跟随哪个子节点才能到达叶节点并找到其中存储的值。\
    \  \n\n因此，MPT 提供了一种加密认证的数据结构，用于存储以太坊中的所有（`key`，`value`）绑定。它具有完全确定性，这意味着具有相同（`key`，`value`）绑定的帕特里夏树将完全一致，直至最后一个字节。插入、查找和删除操作效率很高，复杂度为\
    \ `O(log(n))`。由于 MPT 中的默克尔树部分，节点的哈希值被用作指向该节点的指针，MPT 据此构建，其中：  \n\n```\nKey ==\
    \ SHA3(RLP(value))\n```  \n\n默克尔部分提供了防篡改且确定性的树形结构，而帕特里夏部分则提供了高效的信息检索功能。因此，如果你仔细观察，MPT\
    \ 中的根节点会成为整个数据结构的加密指纹。在以太坊点对点网络中，当交易通过线缆广播时，每个接收到交易的挖矿节点会将其组装起来。这些节点随后形成一棵树（即\
    \ Trie），并计算根哈希以包含在区块头中。交易在本地以树结构存储，但在序列化为列表后会被发送到其他节点或客户端。接收方必须将其反序列化回交易树，以验证根哈希。另外请注意，在以太坊中，MPT\
    \ 经过轻微修改以更好地适应以太坊实现。它不再使用二进制，而是使用十六进制——源自包含 16 个字符的“字母表”。因此，树或 Trie 中的节点有 16 个子节点（16\
    \ 字符十六进制字母表）和最大深度 X。需要说明的是，十六进制字符在许多地方被称为“半字节”。  \n\n以太坊中 MPT 的基本思想是：对于单次操作，它只会修改最少数量的节点来重新计算根哈希。这样可以将存储和复杂度保持在最低水平。\
    \  \n"
- fmt: '### RLP Encoding


    You must have noticed that we mentioned RLP encoding in previous sections. We
    will give you a heads-up on what it is all about in this section. RLP stands for
    Recursive Length Prefix. It is a serialization method used in Ethereum for blocks,
    transactions, and wire protocol messages while sending data over the wire and
    also for account state data while saving the state in Patricia tree. In general,
    when complex data structures need to be stored or transmitted and then get reconstructed
    at the receiving end for processing, object serialization is a good practice.
    RLP in that sense is similar to JSON and XML, but RLP is believed to be more minimalistic,
    space efficient, simple to implement, and guarantees absolute byte-perfect consistency.
    This is why RLP was chosen to be the main serialization technique for Ethereum.
    Its sole purpose is to store nested arrays of raw bytes. It does not try to define
    any specific data types either, such as Booleans, floats, doubles, integers, etc.,
    and is only designed to store structure in the form of nested arrays. Key/value
    maps are not explicitly supported by RLP. So, it is advisible to represent such
    maps as `[[k1, v1], [k2, v2], …]`, where `k1`, `k2`… are in lexicographic order
    (sorted using the standard ordering for strings). Alternatively, use the higher-level
    [Patricia tree](https://github.com/ethereum/wiki/wiki/Patricia-Tree) encoding
    that has an inherent RLP encoding scheme.


    Please keep in mind that RLP is used only to encode the structure of the data
    and is completely unaware of the type of object being encoded. While it helps
    reduce the size of the encoding array of raw bytes, the decoding end must be aware
    of the type of object it is trying to decode.


    ### Ethereum Transaction and Message Structure


    In the previous section, we looked at the block structure and the different fields
    in the block’s header. For a transaction to be qualified by the miners or Ethereum
    nodes, it has to have a standardized structure. A typical Ethereum transaction
    (e.g., what you pass through `sendRawTransaction()` that we will see later in
    this book) consists of the following fields:


    * `nonce`: It is an integer, just a counter equal to the number of transactions
    sent by the sender account, i.e., transaction sequence number.

    * `gasPrice`: Price you are willing to pay in terms of the number of Wei to be
    paid per unit of gas

    * `gasLimit`: The maximum amount of gas that should be used in executing this
    transaction, which also limits the maximum number of computational steps the transaction
    execution is allowed to take

    * `To`: Recipient’s 160-bits address or Contract’s address. For the transaction
    that is used to create a contract (it means contract’s address does not exist
    yet), it is kept empty.

    * `Value`: Total Ether (number of Wei) to be transferred to the recipient by the
    transaction sender

    * `V`, `r`, `s`: values corresponding to the ECDSA signature of the transaction;
    also represent the sender of this transaction

    * `init`: This is not really an optional field, only used with transactions used
    for creating contracts. This field can contain an unlimited size byte array specifying
    the EVM-code for the account initialisation procedure. The opcode `init` is used
    only once for initializing the new Contract Account and gets discarded after that.
    It returns the body of the account code after associating it with the Contract
    Account. Keep in mind that this association is a permanent phenomenon and never
    changes.

    * `Data`: An optional field that can contain a message to be sent to a contract
    or simple account. It has no special function as such by default, but the EVM
    has an opcode — using which, a contract can access this data field and perform
    necessary computations and place them in storage.


    Note carefully that the aforementioned fields are supplied in the order specified
    and are all RLP encoded, except for the field names. So, an Ethereum transaction
    actually means a signed data package with these fields. The `gasPrice` and `gasLimit`
    fields are important to prevent denial of service attack. In order to prevent
    accidental or deliberate attempts of infinite loops or other computational wastage
    in code, each transaction is required to set a limit on how many computational
    steps for code execution it can use.


    Ethereum transactions are actually the "state transition functions" because a
    successful transaction changes the state. Also, the result of these transactions
    can be stored, as we already looked at in the “Account State” section previously.


    Ethereum messages on the other hand are like transactions, but are triggered only
    by Contract Accounts and not by EOAs. Also, messages are only meant to be between
    the Contract Accounts, due to which they are also referred to as "internal transactions."
    So, contracts have the ability to send messages to other contracts.


    Typically, a message is produced when a contract, while executing its code, encounters
    the `CALL` or `DELEGATECALL` opcodes. So, messages are more like function calls
    that exist in the Ethereum execution environment. It is also important to note
    that messages are always raw and never serialized or deserialized. A message contains
    the following fields:


    * `Sender`: The sender of the message as an implicit option

    * `Recipient`: The recipient contract address to send to

    * `Value`: The amount of Wei to transfer to the contract address along with the
    message

    * `Data`: Optional field, but can contain input data for the recipient contract
    provided by the sender

    * `gasLimit`: The value that limits the maximum amount of gas the code execution
    can consume when triggered by the message. It is also termed “startGas.”'
