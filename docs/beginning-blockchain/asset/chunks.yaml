    the integrity of the order of transactions. If you change just the order of the
    transactions, then also the hashes in the tree till the Merkle root will change.


    Here is a situation. The Merkle tree is a binary tree and there should be an even
    number of items at the leaf level. What if there are an odd number of items? One
    good solution would be to duplicate the last transaction hash. Since it is the
    hash we are duplicating, it would mean just the same transaction and not create
    any issue such as double-spend or repeated transactions. That way, it is possible
    to balance the tree.


    In the blockchain we discussed, if we were to find a transaction through its hash,
    or check if a transaction had happened in the past, how would we get to that transaction?
    The only way is to keep traversing till you encounter the exact block that matches
    the hash of the transaction. This is a case where a Merkle tree can help a great
    deal.


    Merkle trees provide a very efficient way to verify if a specific transaction
    belongs to a particular block. If there are “n” transactions in a Merkle tree
    (leaf items), then this verification takes just Log (n) time as shown in Figure
    [2-23](#A440588_1_En_2_Chapter.html#Fig23).


    ![A440588_1_En_2_Fig23_HTML.jpg](A440588_1_En_2_Fig23_HTML.jpg)


    Figure 2-23


    Verification in Merkle tree


    To verify if a transaction or any other leaf item belongs to a Merkle tree, we
    do not need all items and the whole tree. Rather, a subset of it is needed as
    we can see in the diagram in Figure [2-23](#A440588_1_En_2_Chapter.html#Fig23).
    One can just start with the transaction to verify along with its sibling (it is
    a binary tree so there would be one sibling leaf item), calculate the hash of
    those two, and see if it matches their parent hash. Then continue with that parent
    hash and its sibling at that level and hash them together to get their parent
    hash. Continuing this process all the way to the top root hash is the quickest
    possible way for transaction verification (just Log (n) time for n items). In
    the figure, only the solid rectangles are required and the dotted rectangles can
    be just computed, provided the solid rectangle data. Since there are eight transaction
    elements (n = 8), only three computations (log2 8 = 3) would be required for verification.'
