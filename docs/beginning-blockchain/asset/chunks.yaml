- fmt: '### Get Reference to the Smart Contract


    To execute a function of the smart contract, first we need to create an instance
    of the `web3.eth.Contract` class with the ABI and address of our deployed contract.
    The following code snippet shows how to do that.


    ```

    var helloworldContract = new web3.eth.Contract([{

    "constant": true,

    "inputs": [],

    "name": "Hello",

    "outputs": [{

    "name": "",

    "type": "string"

    }],

    "payable": false,

    "stateMutability": "view",

    "type": "function"

    }, {

    "inputs": [],

    "payable": false,

    "stateMutability": "nonpayable",

    "type": "constructor"

    }], ''0xd5a2d13723A34522EF79bE0f1E7806E86a4578E9'');

    ```


    In the preceding code snippet, we have created an instance of the `web3.eth.Contract`
    class by passing the ABI of the contract we created in the previous section, and
    we have also passed the address of the contract that we received after deploying
    the contract.


    This object can now be used to call functions on our contract.


    ### Execute Smart Contract Function


    Recall that we have only one public function in our contract. This method is named
    `Hello` and it returns the string `"Hello World!"` when executed.


    To execute this method, we will call it using the `contract.methods` class in
    the web3 library. The following code snippet shows this.


    ```

    helloworldContract.methods.Hello().send({

    from: ''0xF68b93AE6120aF1e2311b30055976d62D7dBf531''

    }).then(console.log);

    ```


    In the preceding code snippet, we have added a value to the "from" address in
    the `send` function, and this address will be used to send the transaction that
    will in turn execute the function `Hello` on our smart contract.


    The full code for calling a smart contract is in the following code snippet.


    ```

    var callContract = function () {

    var helloworldContract = new web3.eth.Contract([{

    "constant": true,

    "inputs": [],

    "name": "Hello",

    "outputs": [{

    "name": "",

    "type": "string"

    }],

    "payable": false,

    "stateMutability": "view",

    "type": "function"

    }, {

    "inputs": [],

    "payable": false,

    "stateMutability": "nonpayable",

    "type": "constructor"

    }], ''0xd5a2d13723A34522EF79bE0f1E7806E86a4578E9'');

    helloworldContract.methods.Hello().send({

    from: ''0xF68b93AE6120aF1e2311b30055976d62D7dBf531''

    }).then(console.log);

    };

    ```


    Another way of executing this contract function will be by sending a raw transaction
    by signing it. It is similar to how we sent a raw Ethereum transaction to send
    Ether and to create a contract in the previous sections. In this case all we need
    to do is provide the contract address in the "to" field of the transaction object
    and the encoded ABI value of the function call in the data field.


    The following code snippet first creates a contract object and then gets the encoded
    ABI value of the smart contract function to be called. It then creates a transaction
    object based on these values and then signs and sends it to the network. Note
    that we have used the `encodeABI` function on the contract function to get the
    data payload value for the transaction. This is the input for the smart contract.


    ```

    var callContract = function () {

    var helloworldContract = new web3.eth.Contract([{

    "constant": true,

    "inputs": [],

    "name": "Hello",

    "outputs": [{

    "name": "",

    "type": "string"

    }],

    "payable": false,

    "stateMutability": "view",

    "type": "function"

    }, {

    "inputs": [],

    "payable": false,

    "stateMutability": "nonpayable",

    "type": "constructor"

    }], ''0xd5a2d13723A34522EF79bE0f1E7806E86a4578E9'');

    var payload = helloworldContract.methods.Hello().encodeABI();

    var tx = {

    from: "0xF68b93AE6120aF1e2311b30055976d62D7dBf531",

    gasPrice: "20000000000",

    gas: "4700000",

    data: payload

    };

    web3.eth.accounts.signTransaction(tx, ''0xc6676b7262dab1a3a28a781c77110b63ab8cd5eae2a5a828ba3b1ad28e9f5a9b'')

    .then(function (signedTx) {

    web3.eth.sendSignedTransaction(signedTx.rawTransaction)

    .then(console.log);

    });

    };

    ```


    ### Important Note


    When using a public-hosted node for Ethereum, we should use the raw transaction
    method for creating and executing smart contracts because the `web3.eth.Contract`
    submodule of the library uses either an unlocked or default account associated
    with the provider Ethereum node, but this is not supported by the public nodes
    (at the time of this writing).


    ## Blockchain Concepts Revisited


    In the previous sections we programmatically sent transactions to both Bitcoin
    and Ethereum blockchains using JavaScript. Here are some of the common concepts
    that we can now revisit, looking at the process of handcrafting transactions using
    code.


    - **Transactions**: Looking at the code we wrote and the output we got for sending
    transactions to Ethereum and Bitcoin, we can now say that blockchain transactions
    are the operations initiated from an account owner, which, if completed successfully,
    update the state of the blockchain. For example, in our transactions between Alice
    and Bob, we saw that the ownership of a certain amount of Bitcoins and Ether changed
    from Alice to Bob and vice versa, and this change of ownership was recorded in
    the blockchain, hence bringing it into a new state. In the case of Ethereum, transactions
    go further into contract creation and execution and these transactions also update
    the state of the blockchain. We created a transaction that in turn deployed a
    smart contract on the Ethereum blockchain. The state of the blockchain was updated
    because now we have a new contract account created in the blockchain.

    - **Inputs, Outputs, Accounts and Balances**: We also saw how Bitcoin and Ethereum
    are different from each other in terms of managing the state. While Bitcoin uses
    the UTXO model, Ethereum uses the accounts and balances model. However, the underlying
    idea is both the blockchains record the ownership of assets, and transactions
    are used to change ownership of these assets.

    - **Transaction Fee**: For every transaction we do on public blockchain networks,
    we must pay a transaction fee for our transactions to be confirmed by the miners.
    In Bitcoin this is automatically calculated, while in Ethereum we should mention
    the maximum fee we are willing to pay in terms of gas price and gas limit.

    - **Signing**: In both cases, we also saw that after creating a transaction object
    with the required values, we signed it using the sender''s public key. Cryptographic
    signing is a way of proving ownership of the assets. If the signature is incorrect,
    then the transaction becomes invalid.

    - **Transaction broadcasting**: After creating and signing the transactions, we
    sent them to the blockchain nodes. While we sent our example transactions to publicly
    hosted Bitcoin and Ethereum test network nodes, we are free to send our transactions
    to multiple nodes if we don''t trust all of them to process our transactions.
    This is called transaction broadcasting.


    To summarize, when interacting with blockchains, if we intend to update the state
    of the blockchain, we submit signed transactions; and to get these transactions
    confirmed, we need to pay some fee to the network.'
