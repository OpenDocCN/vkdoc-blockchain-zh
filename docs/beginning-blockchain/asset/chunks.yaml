- fmt: "### SHA-256 and SHA-512\n\nAs mentioned already, `SHA-256` belongs to the\
    \ `SHA-2` family of hash functions, and this is the one used in Bitcoins! As the\
    \ name suggests, it produces a 256-bit hash value, hence the name. So, it can\
    \ provide `2^(128)`-bit security as per the birthday paradox.\n\nRecall that the\
    \ hash functions take arbitrary length input and produce a fixed size output.\
    \ The arbitrary length input is not fed as is to the compression function and\
    \ is broken into fixed length blocks before it is fed to the compression function.\
    \ This means that a construction method is needed that can iterate through the\
    \ compression function by constructing fixed-sized input blocks from arbitrary\
    \ length input data and produce a fixed length output. There are various types\
    \ of construction methods such as Merkle-Damgård construction, tree construction,\
    \ and sponge construction. It is proven that if the underlying compression function\
    \ is collision resistant, then the overall hash function with any construction\
    \ method should also be collision resistant.\n\nThe construction method that `SHA-256`\
    \ uses is the Merkle-Damgård construction, so let us see how it works in Figure\
    \ [2-9](#A440588_1_En_2_Chapter.html#Fig9).\n\n![A440588_1_En_2_Fig9_HTML.jpg](A440588_1_En_2_Fig9_HTML.jpg)\
    \  \nFigure 2-9 Merkle-Damgård construction for `SHA-256`\n\nReferring to the\
    \ diagram, the following steps (presented at a high level) are executed in the\
    \ order specified to compute the final hash value:\n\n- As you can see in the\
    \ diagram, the message is first divided into 512-bit blocks. When the message\
    \ is not an exact multiple of 512 bits (which is usually the case), the last block\
    \ falls short of bits, hence it is padded to make it 512 bits.\n- The 512-bit\
    \ blocks are further divided into 16 blocks of 32-bit words (16 × 32 = 512).\n\
    - Each block goes through 64 rounds of round function where each 32-bit word goes\
    \ through a series of operations. The round functions are a combination of some\
    \ common functions such as `XOR`, `AND`, `OR`, `NOT`, Bit-wise Left/Right Shift,\
    \ etc., and we will not get into those details in this book.\n\nSimilar to `SHA-256`,\
    \ the steps and the operations are quite similar in `SHA-512`, as `SHA-512` also\
    \ uses Merkle-Damgård construction. The major difference is that there are 80\
    \ rounds of round functions in `SHA-512` and the word length is 64 bits. The block\
    \ size in `SHA-512` is 1024 bits, which gets further divided into 16 blocks of\
    \ 64-bit words. The output message digest is 512 bits in length, that is, eight\
    \ blocks of 64-bit words. While `SHA-512` was gaining momentum, and started being\
    \ used in many applications, a few people turned to the `SHA-3` algorithm to be\
    \ future ready. `SHA-3` is just a different approach to hashing and not a real\
    \ replacement to `SHA-256` or `SHA-512`, though it allows tuning. We will learn\
    \ a few more details about `SHA-3` in the following sections.\n\n### RIPEMD\n\n\
    RACE Integrity Primitives Evaluation Message Digest (`RIPEMD`) hash function is\
    \ a variant of the `MD4` hash function with almost the same design considerations.\
    \ Since it is used in Bitcoins, we will have a brief discussion on it.\n\nThe\
    \ original `RIPEMD` was of 128 bits, later `RIPEMD-160` was developed. There exist\
    \ 128-, 256-, and 320-bit versions of this algorithm, called `RIPEMD-128`, `RIPEMD-256`,\
    \ and `RIPEMD-320`, respectively, but we will limit our discussion to the most\
    \ popular and widely used `RIPEMD-160`.\n\n`RIPEMD-160` is a cryptographic hash\
    \ function whose compression function is based on the Merkle–Damgård construction.\
    \ The input is broken into 512-bit blocks and padding is applied when the input\
    \ bits are not a multiple of 512. The 160-bit hash value output is usually represented\
    \ as 40-digit hexadecimal numbers.\n\nThe compression function is made up of 80\
    \ stages, made up of two parallel lines of five rounds of 16 steps each (5 × 16\
    \ = 80). The compression function works on sixteen 32-bit words (512-bit blocks).\n\
    \n> **Note:** Bitcoin uses both `SHA-256` and `RIPEMD-160` hashes together for\
    \ address generation. `RIPEMD-160` is used to further shorten the hash value output\
    \ of `SHA-256` to 160 bits.\n\n### SHA-3\n\nIn 2015, the Keccak (pronounced as\
    \ “ket-chak”) algorithm was standardized by the NIST as the `SHA-3`. Note that\
    \ the purpose was not really to replace the `SHA-2` standard, but to complement\
    \ and coexist with it, though one can choose `SHA-3` over `SHA-2` in some situations.\n\
    \nSince both `SHA-1` and `SHA-2` were based on Merkle-Damgård construction, a\
    \ different approach to hash function was desirable. So, not using Merkle-Damgård\
    \ construction was one of the criteria set by the NIST. This was because the new\
    \ design should not suffer from the limitations of Merkle-Damgård construction\
    \ such as multicollision. Keccak, which became `SHA-3`, used a different construction\
    \ method called sponge construction.\n\nIn order to make it backward compatible,\
    \ it was required that `SHA-3` should be able to produce variable length outputs\
    \ such as 224, 256, 384, and 512 bits and also other arbitrary length outputs.\
    \ This way `SHA-3` became a family of cryptographic hash functions such as `SHA3-224`,\
    \ `SHA3-256`, `SHA3-384`, `SHA3-512`, and two extendable-output functions (XOFs),\
    \ called `SHAKE128` and `SHAKE256`. Also, `SHA-3` had to have a tunable parameter\
    \ (capacity) to allow a tradeoff between security and performance. Since `SHAKE128`\
    \ and `SHAKE256` are XOFs, their output can be extended to any desired length,\
    \ hence the name.\n\nThe following diagram (Figure [2-10](#A440588_1_En_2_Chapter.html#Fig10))\
    \ shows how `SHA-3` (Keccak algorithm) is designed at a high level.\n\n![A440588_1_En_2_Fig10_HTML.jpg](A440588_1_En_2_Fig10_HTML.jpg)\
    \  \nFigure 2-10 Sponge construction for `SHA-3`\n\nA series of steps that take\
    \ place for `SHA-3` are as follows:\n\n- As you can see in Figure [2-10](#A440588_1_En_2_Chapter.html#Fig10),\
    \ the message is first divided into blocks (`x[i]`) of size `r` bits. If the input\
    \ data is not a multiple of `r` bits, then padding is required. If you are wondering\
    \ about this `r`, do not worry, we will get to it in a little while. Now, let\
    \ us focus on how this padding happens. For a message block `x[i]` which is not\
    \ a multiple of `r` and has some message `m` in it, padding happens as shown in\
    \ the following: \n\n`x[i] = m || P 1 {0}* 1`\n\n`P` is a predetermined bit string\
    \ followed by `1 {0}* 1`, which means a leading and trailing `1` and some number\
    \ of zeros (could be no zero bits also) that can make `x[i]` a multiple of `r`.\
    \ Table [2-4](#A440588_1_En_2_Chapter.html#Tab4) shows the various values of `P`.\n\
    \nTable 2-4 Padding in `SHA-3` variants\n\n![A440588_1_En_2_Figh_HTML.jpg](A440588_1_En_2_Figh_HTML.jpg)"
  raw: '#### SHA-256 and SHA-512


    As mentioned already, SHA-256 belongs to the SHA-2 family of hash functions, and
    this is the one used in Bitcoins! As the name suggests, it produces a 256-bit
    hash value, hence the name. So, it can provide 2^(128)-bit security as per the
    birthday paradox.


    Recall that the hash functions take arbitrary length input and produce a fixed
    size output. The arbitrary length input is not fed as is to the compression function
    and is broken into fixed length blocks before it is fed to the compression function.
    This means that a construction method is needed that can iterate through the compression
    function by constructing fixed-sized input blocks from arbitrary length input
    data and produce a fixed length output. There are various types of construction
    methods such as Merkle-Damgård construction, tree construction, and sponge construction.
    It is proven that if the underlying compression function is collision resistant,
    then the overall hash function with any construction method should also be collision
    resistant.


    The construction method that SHA-256 uses is the Merkle-Damgård construction,
    so let us see how it works in Figure [2-9](#A440588_1_En_2_Chapter.html#Fig9).


    ![A440588_1_En_2_Fig9_HTML.jpg](A440588_1_En_2_Fig9_HTML.jpg)


    Figure 2-9


    Merkle-Damgård construction for SHA-256


    Referring to the diagram, the following steps (presented at a high level) are
    executed in the order specified to compute the final hash value:


    *   As you can see in the diagram, the message is first divided into 512-bit blocks.
    When the message is not an exact multiple of 512 bits (which is usually the case),
    the last block falls short of bits, hence it is padded to make it 512 bits.

    *   The 512-bit blocks are further divided into 16 blocks of 32-bit words (16
    × 32 = 512).

    *   Each block goes through 64 rounds of round function where each 32-bit word
    goes through a series of operations. The round functions are a combination of
    some common functions such as XOR, AND, OR, NOT, Bit-wise Left/Right Shift, etc.
    and we will not get into those details in this book.


    Similar to SHA-256, the steps and the operations are quite similar in SHA-512,
    as SHA-512 also uses Merkle-Damgård construction. The major difference is that
    there are 80 rounds of round functions in SHA-512 and the word length is 64 bits.
    The block size in SHA-512 is 1024 bits, which gets further divided into 16 blocks
    of 64-bit words The output message digest is 512 bits in length, that is, eight
    blocks of 64-bit words. While SHA-512 was gaining momentum, and started being
    used in many applications, a few people turned to the SHA-3 algorithm to be future
    ready. SHA-3 is just a different approach to hashing and not a real replacement
    to SHA-256 or SHA-512, though it allows tuning. We will learn a few more details
    about SHA-3 in the following sections.


    #### RIPEMD


    RACE Integrity Primitives Evaluation Message Digest (RIPEMD) hash function is
    a variant of the MD4 hash function with almost the same design considerations.
    Since it is used in Bitcoins, we will have a brief discussion on it.


    The original RIPEMD was of 128 bits, later RIPEMD-160 was developed. There exist
    128-, 256-, and 320-bit versions of this algorithm, called RIPEMD-128, RIPEMD-256,
    and RIPEMD-320, respectively, but we will limit our discussion to the most popular
    and widely used RIPEMD-160.


    RIPEMD-160 is a cryptographic hash function whose compression function is based
    on the Merkle–Damgård construction. The input is broken into 512-bit blocks and
    padding is applied when the input bits are not a multiple of 512\. The 160-bit
    hash value output is usually represented as 40-digit hexadecimal numbers.


    The compression function is made up of 80 stages, made up of two parallel lines
    of five rounds of 16 steps each (5 × 16 = 80). The compression function works
    on sixteen 32-bit words (512-bit blocks).


    Note


    Bitcoin uses both SHA-256 and RIPEMD-160 hashes together for address generation.
    RIPEMD-160 is used to further shorten the hash value output of SHA-256 to 160
    bits.


    #### SHA-3


    In 2015, the Keccak (pronounced as “ket-chak”) algorithm was standardized by the
    NIST as the SHA-3\. Note that the purpose was not really to replace the SHA-2
    standard, but to complement and coexist with it, though one can choose SHA-3 over
    SHA-2 in some situations.


    Since both SHA-1 and SHA-2 were based on Merkle-Damgård construction, a different
    approach to hash function was desirable. So, not using Merkle-Damgård construction
    was one of the criteria set by the NIST. This was because the new design should
    not suffer from the limitations of Merkle-Damgård construction such as multicollision.
    Keccak, which became SHA-3, used a different construction method called sponge
    construction.


    In order to make it backward compatible, it was required that SHA-3 should be
    able to produce variable length outputs such as 224, 256, 384, and 512 bits and
    also other arbitrary length outputs. This way SHA-3 became a family of cryptographic
    hash functions such as SHA3-224, SHA3-256, SHA3-384, SHA3 -512, and two extendable-output
    functions (XOFs), called SHAKE128 and SHAKE256. Also, SHA-3 had to have a tunable
    parameter (capacity) to allow a tradeoff between security and performance. Since
    SHAKE128 and SHAKE256 are XOFs, their output can be extended to any desired length,
    hence the name.


    The following diagram (Figure [2-10](#A440588_1_En_2_Chapter.html#Fig10)) shows
    how SHA-3 (Keccak algorithm) is designed at a high level.


    ![A440588_1_En_2_Fig10_HTML.jpg](A440588_1_En_2_Fig10_HTML.jpg)


    Figure 2-10


    Sponge construction for SHA-3


    A series of steps that take place for SHA-3 are as follows:


    *   As you can see in Figure [2-10](#A440588_1_En_2_Chapter.html#Fig10), the message
    is first divided into blocks (x[i]) of size r bits. If the input data is not a
    multiple of r bits, then padding is required. If you are wondering about this
    r, do not worry, we will get to it in a little while. Now, let us focus on how
    this padding happens. For a message block x[i] which is not a multiple of r and
    has some message m in it, padding happens as shown in the following: x[i] = m
    || P 1 {0}* 1 “P” is a predetermined bit string followed by 1 {0}* 1, which means
    a leading and trailing 1 and some number of zeros (could be no zero bits also)
    that can make x[i] a multiple of r. Table [2-4](#A440588_1_En_2_Chapter.html#Tab4)
    shows the various values of P.


    Table 2-4


    Padding in SHA-3 variants


