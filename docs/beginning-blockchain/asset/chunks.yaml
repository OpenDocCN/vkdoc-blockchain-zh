    message called “ciphertext.” An adversary has to be aware of both the algorithm
    (E) and key (k) to intercept the message. The stronger the algorithm and the key,
    the more difficult it is for the adversary to attack. Note that it would always
    be desirable to design blockchain systems that are at least provably secure. What
