    # SHA-3 海绵结构与 Keccak-f


    如图 2-10 所示，SHA-3 海绵结构大致分为两个阶段：第一阶段是输入的“吸收”阶段，第二阶段是输出的“挤压”阶段。在吸收阶段，消息分组（`x[i]`）会经历算法的各种运算；而在挤压阶段，则会计算出可配置长度的输出。请注意，这两个阶段都使用了同一个名为“Keccak-f”的函数。


    对于 SHA3-224、SHA3-256、SHA3-384 和 SHA3-512（这些算法实际上是 SHA-2 的替代品）的计算而言，仅使用第一个输出分组
    `y[0]` 的初始若干比特，并根据所需的长度进行截断。


    SHA-3 的设计目标是能够通过调优参数，对其安全强度、输入和输出大小进行调节。


    如图中所示，“b”表示状态的宽度，且必须满足 `r + c = b`。此外，“b”取决于指数“ℓ”，关系为 `b = 25 × 2^ℓ`。由于“ℓ”的取值范围是
    0 到 6，因此“b”可能的宽度为 `{25, 50, 100, 200, 400, 800, 1600}`。在实际应用中，建议不要使用“b”最小的两个值，因为它们仅用于对算法进行分析和密码分析。


    在等式 `r + c = b` 中，我们看到的“r”用于预处理消息，并将其划分为长度为“r”的分组。这被称为“比特率”。参数“c”被称为“容量”，它只需满足条件
    `r + c = b ∈ {25, 50, 100, 200, 400, 800, 1600}` 并计算得出。这样，“r”和“c”就被用作调优参数，以在安全性和性能之间进行权衡。


    对于 SHA-3，指数值 ℓ 固定为“6”，因此 `b` 的值为 1600 比特。对于这个给定的 `b = 1600`，有两个可接受的比特率值：`r = 1344`
    和 `r = 1088`。这对应着两个不同的“c”值。因此，当 `r = 1344` 时，`c = 256`；当 `r = 1088` 时，`c = 512`。


    现在，让我们来看一下这个算法的核心引擎，即 Keccak-f，它也被称为“Keccak-f 置换”。每个 Keccak-f 中包含“n”轮，其中“n”的计算方式为：`n
    = 12 + 2ℓ`。由于 SHA-3 的 ℓ 值为 6，因此每个 Keccak-f 将包含 24 轮。每一轮接收“b”位（`r + c`）的输入，并产生相同数量（“b”位）的输出。


    在每一轮中，输入的“b”被称为一个状态。这个状态数组“b”可以被表示为一个三维（3-D）数组 `b = (5 x 5 × w)`，其中字大小 `w = 2^ℓ`。因此，`w
    = 64` 比特，这意味着有 `5 × 5 = 25` 个字，每个字 64 比特。回想一下，对于 SHA-3，ℓ = 6，所以 `b = 5 × 5 x 64
    = 1600`。这个三维数组可以如图 2-11 所示。


    ![A440588_1_En_2_Fig11_HTML.jpg](img/A440588_1_En_2_Fig11_HTML.jpg)


    图 2-11：SHA-3 中的状态数组表示


    每一轮由五个步骤组成，如图 2-12 所示，状态数组会在每个步骤中被处理。


    ![A440588_1_En_2_Fig12_HTML.jpg](img/A440588_1_En_2_Fig12_HTML.jpg)


    图 2-12：SHA-3 每一轮中的五个步骤


    在深入了解这五个步骤的细节之前，让我们快速了解它们在高级层面上的作用：


    - **Theta（θ）步骤**：执行 XOR 运算以提供微小的扩散。

    - **Rho（ρ）步骤**：对 25 个字中的每一个执行按位循环移位。

    - **Pi（π）步骤**：对 25 个字中的每一个执行置换。

    - **Chi（χ）步骤**：在此步骤中，通过将比特与其行中后续的两个比特相结合来替换比特。

    - **Iota（ι）步骤**：将一个轮常数与该状态中的一个字进行 XOR 运算，以打破对称性。


    Keccak-f 的最后一轮产生 `y[0]` 输出，这对于 SHA-2 替代模式（即输出为 224、256、384 和 512 比特的模式）来说已经足够。请注意，`y[0]`
    的最低有效位用于生成所需长度的输出。在需要可变长度输出的情况下，除了 `y[0]` 之外，还可以使用 `y[1]`、`y[2]`、`y[3]`…等其他输出比特。


    在 SHA-3 的实际应用中，人们发现它在软件中的性能不错（尽管不如 SHA-2），但在硬件中的性能非常出色（优于 SHA-2）。


    ## 哈希函数的应用


    加密哈希函数在不同场景下有许多不同的用途。以下是一些示例用例：


    - 哈希函数用于验证信息的完整性和真实性。

    - 哈希函数也可用于在哈希表中索引数据。这可以加快搜索过程。如果基于哈希值进行搜索（假设哈希值比整个数据短得多），那么显然会比搜索整个数据更快。

    - 它们可用于安全地验证用户身份，而无需在本地存储密码。想象一种情况，你不希望在服务器上存储密码，原因显而易见：如果攻击者入侵了服务器，他们也无法从存储的哈希值中获取密码。每次用户尝试登录时，都会计算输入密码的哈希值，并将其与存储的哈希值进行比对。这很安全，不是吗？

    - 由于哈希函数是单向函数，它们可用于实现伪随机数生成器（PRNG）。

    - 比特币使用哈希函数作为工作量证明（PoW）算法。我们将在比特币章节中详细探讨这一点。

    - 比特币还使用哈希函数来生成地址，以提高安全性和隐私性。

    - 两个最重要的应用是数字签名和消息认证码（MAC），例如基于哈希的消息认证码（HMAC）。


    理解了哈希函数的工作原理和特性后，可以发现哈希函数还有很多其他应用场景。


    **注**


    互联网工程任务组（IETF）于 1999 年采用了 SSL 协议 3.0 版（SSLv3），将其重命名为传输层安全协议（TLS）1.0 版（TLSv1），并在
    RFC 2246 中进行了定义。就基本操作而言，SSLv3 和 TLSv1 是兼容的。

    '
- fmt: '### Code Examples of Hash Functions


    Following are some code examples of different hash functions. This section is
    just intended to give you a heads-up on how to use the hash functions programmatically.
    Code examples are in Python but would be quite similar in different languages;
    you just have to find the right library functions to use.


    ```python

    # -*- coding: utf-8 -*-

    import hashlib

    # hashlib module is a popular module to do hashing in python

    #Constructors of md5(), sha1(), sha224(), sha256(), sha384(), and sha512() present
    in hashlib

    md=hashlib.md5()

    md.update("The quick brown fox jumps over the lazy dog")

    print md.digest()

    print "Digest Size:", md.digest_size, "\n", "Block Size: ", md.block_size

    # Comparing digest of SHA224, SHA256,SHA384,SHA512

    print "Digest SHA224", hashlib.sha224("The quick brown fox jumps over the lazy
    dog").hexdigest()

    print "Digest SHA256", hashlib.sha256("The quick brown fox jumps over the lazy
    dog").hexdigest()

    print "Digest SHA384", hashlib.sha384("The quick brown fox jumps over the lazy
    dog").hexdigest()

    print "Digest SHA512", hashlib.sha512("The quick brown fox jumps over the lazy
    dog").hexdigest()

    # All hashoutputs are unique

    # RIPEMD160 160 bit hashing example

    h = hashlib.new(''ripemd160'')

    h.update("The quick brown fox jumps over the lazy dog")

    h.hexdigest()

    #Key derivation Alogithm:

    #Native hashing algorithms are not resistant against brutefore attack.

    #Key deviation algorithms are used for securing password hashing.

    import hashlib, binascii

    algorithm=''sha256''

    password=''HomeWifi''

    salt=''salt'' # salt is random data that can be used as an additional input to
    a one-way function

    nu_rounds=1000

    key_length=64 #dklen is the length of the derived key

    dk = hashlib.pbkdf2_hmac(algorithm,password, salt, nu_rounds, dklen=key_length)

    print ''derieved key: '',dk

    print ''derieved key in hexadeximal :'', binascii.hexlify(dk)

    # Check properties for hash

    import hashlib

    input = "Sample Input Text"

    for i in xrange(20):

    # add the iterator to the end of the text

    input_text = input + str(i)

    # show the input and hash result

    print input_text, '':'',  hashlib.sha256(input_text).hexdigest()

    ```


    ### MAC and HMAC


    `HMAC` is a type of `MAC` (Message Authentication Code). As the name suggests,
    a `MAC`''s purpose is to provide message authentication using Symmetric Key and
    message integrity using hash functions. So, the sender sends the `MAC` along with
    the message for the receiver to verify and trust it. The receiver already has
    the key `K` (as symmetric key cryptography is being used, so both sender and receiver
    have agreed on it already); they just use it to compute the `MAC` of the message
    and check it against the `MAC` that was sent along with the message.


    In its simplest form, `MAC = H(key || message)`. `HMAC` is actually a technique
    to turn the hash functions into `MAC`s. In `HMAC`, the hash functions can be applied
    multiple times along with the key and its derived keys. `HMAC`s are widely used
    in RFID-based systems, TLS, etc. In SSL/TLS (HTTPS is TTP within SSL/TLS), `HMAC`
    is used to allow client and server to verify and ensure that the exchanged data
    has not been altered during transmission. Let us take a look at a few of the important
    MAC strategies that are widely used:


    - **MAC-then-Encrypt**: This technique requires the computation of `MAC` on the
    cleartext, appending it to the data, and then encrypting all of that together.
    This scheme does not provide integrity of the ciphertext. At the receiving end,
    the message decryption has to happen first to be able to check the integrity of
    the message. It ensures the integrity of the plaintext, however. TLS uses this
    scheme of `MAC` to ensure that the client-server communication session is secured.

    - **Encrypt-and-MAC**: This technique requires the encryption and `MAC` computation
    of the message or the cleartext, and then appending the `MAC` at the end of the
    encrypted message or ciphertext. Notice that `MAC` is computed on the cleartext,
    so integrity of the cleartext can be assured but not of the ciphertext, which
    leaves scope for some attacks. Unlike the previous scheme, integrity of the cleartext
    can be verified. SSH (Secure Shell) uses this `MAC` scheme.

    - **Encrypt-then-MAC**: This technique requires that the cleartext needs to be
    encrypted first, and then compute the `MAC` on the ciphertext. This `MAC` of the
    ciphertext is then appended to the ciphertext itself. This scheme ensures integrity
    of the ciphertext, so it is possible to first check the integrity and if valid
    then decrypt it. It easily filters out the invalid ciphertexts, which makes it
    efficient in many cases. Also, since `MAC` is in ciphertext, in no way does it
    reveal information about the plaintext. It is usually the most ideal of all schemes
    and has wider implementations. It is used in IPsec.'
