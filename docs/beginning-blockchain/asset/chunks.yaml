  raw: '### Create Keypairs for the Sender and Receiver


    The first thing that we will need are the keypairs for the sender and the receivers.
    These are like user accounts identifying the users on the blockchain. So, let’s
    first create two keypairs for Alice and Bob.


    ```

    var getKeys = function () {

    var aliceKeys = btc.ECPair.makeRandom({

    network: network

    });

    var bobKeys = btc.ECPair.makeRandom({

    network: network

    });

    var alicePublic = aliceKeys.getAddress();

    var alicePrivate = aliceKeys.toWIF();

    var bobPublic = bobKeys.getAddress();

    var bobPrivate = bobKeys.toWIF();

    console.log(alicePublic, alicePrivate, bobPublic, bobPrivate);

    };

    ```


    What we did in the previous code snippet is, we used the `ECPair` class of the
    bitcoinjs library and called the `makeRandom` method on it to create random keypairs
    for the test network; note the parameter passed for network type.


    Now that we have created a couple of keypairs , let’s use them to send Bitcoins
    from one to the other. In almost all the cryptography examples, Alice and Bob
    have been the favorite characters, as seen in the preceding keypair variables.
    However, every time we see a cryptography example, generally Alice is the one
    who encrypts/signs something and sends to Bob. For that reason, we feel Bob is
    under a lot of debt from Alice, so in our case we will help Bob repay some of
    that debt. We will do this example Bitcoin transaction from Bob to Alice.


    ### Get Test Bitcoins in the Sender’s Wallet


    We have identified that Bob is going to be acting as the sender in this example
    Bitcoin transaction. Before he sends any Bitcoins to Alice, he needs to own them.
    As we know that this example transaction is targeting the Bitcoin test network,
    there is no real money involved but we still need some test Bitcoins in Bob’s
    wallet. A simple way to get test network Bitcoins is to ask on the Internet. There
    are a lot of websites on the Internet that host a simple web form to take the
    Bitcoin testnet addresses and then send test net Bitcoins to those. These services
    are called Bitcoin testnet faucets, and if you search online for that term you
    will get a lot of those in the search results. We are not listing or recommending
    any specific testnet faucet because they are generally not permanent. As soon
    as a faucet service provider has exhausted their test coins, or they don’t want
    to host the service anymore, they shut it down. But then new ones keep coming
    up all the time. A list of some of these faucet services is also available on
    the Bitcoin wiki testnet page.


    Another way of getting test net Bitcoins is to host a local Bitcoin node pointing
    to the test net and mine some. The block mining on the Bitcoin test network is
    not as difficult as that on the main network. This approach could well be the
    next level approach when you are building a production Bitcoin application and
    you need to test it frequently. Instead of asking for test coins every time you
    want to test your application, you can just mine them yourself.


    ```

    For the purposes of this simple example, we will just get some Bitcoins from a
    testnet faucet. In the previous code snippet, the value in the bobPublic variable
    is Bob’s Bitcoin testnet address. When we ran this snippet, it generated “msDkUzzd69idLLGCkDFDjVRz44jHcV3pW2”
    as Bob’s address. It is also Bob’s base 58 encoded public key. We will submit
    this value in one of the testnet faucet web forms and in return we will receive
    a transaction ID. If we look up that transaction ID on any of the Bitcoin testnet
    explorers, we will see that some other address has sent some test Bitcoins to
    Bob’s address we submitted in the form.

    ```


    ### Get the Sender’s Unspent Outputs


    Now that we know that we have some test Bitcoins in Bob’s wallet, we can spend
    them and give them to Alice through a Bitcoin transaction. Let’s recall from Chapter
    [3](#A440588_1_En_3_Chapter.html) how the Bitcoin transactions are made of inputs
    and outputs. You can spend your unspent outputs by adding them as inputs to the
    transactions where you want to spend them. To do that, first you need to query
    the network about the sender’s unspent outputs. Here’s how we will do that for
    Bob’s Bitcoin testnet address using the block explorer API. To get the unspent
    outputs, we will send an HTTP request to the UTXO endpoint with Bob’s address
    `"msDkUzzd69idLLGCkDFDjVRz44jHcV3pW2"`.


    ```

    var getOutputs = function () {

    var url = blockExplorerTestnetApiEndpoint + ''addr/'' + msDkUzzd69idLLGCkDFDjVRz44jHcV3pW2
    + ''/utxo'';

    return new Promise(function (resolve, reject) {

    request.get(url, function (err, res, body) {

    if (err) {

    reject(err);

    }

    resolve(body);

    });

    });

    };

    ```


    In the previous code snippet, we have used the node.js request module to send
    http requests using a node.js application. Feel free to use your favorite http
    library/module. This snippet is a JavaScript function that returns a promise that
    resolves into the response body from the API method. Here’s how the response looks:


    ```

    [

    {

    address: ''msDkUzzd69idLLGCkDFDjVRz44jHcV3pW2'',

    txid: ''db2e5966c5139c6e937203d567403867643482bbd9a6624752bbc583ca259958'',

    vout: 0,

    scriptPubKey: ''76a914806094191cbd4fcd8b4169a70588adc51dc02d6888ac'',

    amount: 0.99992,

    satoshis: 99992000,

    height: 1258815,

    confirmations: 1011

    },

    {

    address: ''msDkUzzd69idLLGCkDFDjVRz44jHcV3pW2'',

    txid: ''5b88d5fc4675bb86b0a3a7fc5a36df9c425c3880a7453e3afeb4934e6d1d928e'',

    vout: 1,

    scriptPubKey: ''76a914806094191cbd4fcd8b4169a70588adc51dc02d6888ac'',

    amount: 0.99998,

    satoshis: 99998000,

    height: 1258814,

    confirmations: 1012

    }

    ]

    ```


    The response body returned by the call is a JSON array with two objects. Each
    of these objects represents an unspent output for Bob. Each output has txid, which
    is the transaction ID where this output is listed, the amount associated with
    output, and the vout, which means the sequence or index number of the output in
    that transaction. There is some other information in the JSON objects too, but
    that will not be used in the transaction preparation process.


    If we take the first object in the array, it basically says that the Bitcoin testnet
    address `"msDkUzzd69idLLGCkDFDjVRz44jHcV3pW2"` has ``99992000`` unspent satoshis
    coming from the transaction ``db2e5966c5139c6e937203d567403867643482bbd9a6624752bbc583ca259958``
    at the index ``0``. Similarly, the second object represents ``99998000`` unspent
    satoshis coming from the transaction ``5b88d5fc4675bb86b0a3a7fc5a36df9c425c3880a7453e3afeb4934e6d1d928e``
    at the index ``1``.


    Don’t forget that `"msDkUzzd69idLLGCkDFDjVRz44jHcV3pW2"` is Bob’s Bitcoin testnet,
    which we created in step 2 earlier. Now we know that Bob has this many satoshis,
    which he can spend in a new transaction.'
