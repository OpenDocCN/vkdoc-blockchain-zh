    outcome of the transaction is that the entire amount “gasLimit * gasPrice” is
    allocated to the miner.

    *   In the case of Contract Accounts, when a contract sends a message to the other
    contract for subexecution, it also has the option to set a gasLimit. This option
    is specifically intended for the subexecution arising out of that message, because
    there is a possibility that the called contract has an infinite loop. If the subexecution
    runs out of gas, then the subexecution is reverted, which protects against such
    infinite loops or deliberate attempts of DoS attacks. The gas is consumed anyway
    and allocated to the miner. Also note that when a message is triggered by a contract,
    only the instructions cost gas, but data in a message do not cost any gas. This
    is because the data from the parent contract need not be copied again, and could
    be just referrenced through a pointer.


    The first Ethereum release (Frontier) had a default gas Price of 0.05e12 WEI (i.e.,
    smallest denomination of Ether). In the second Ethereum release (Homestead), default
    gas Price was reduced to 0.02e12 WEI. You must be wondering why gas and Ether
    are decoupled from each other and not a single unit of measurement, which would
    have made it much simpler. Well, it is deliberately designed this way because
    units of gas align well with computation units having a natural cost (e.g., cost
    per computation), while the price of Ether generally fluctuates as a result of
    market forces.


    We already know that every Ethereum node participating in the network runs the
    EVM as part of the block verification protocol. This means that all the nodes
    execute the same set of transactions and contracts (redundantly parallel, but
    essential for consensus). While this redundency naturally makes it expensive,
    there is an incentive not to use the blockchain for computation that can be done
    offchain (Game Theory!).'
  trans: '

    ### Gas 与交易成本


    以太坊上的交易基于“Gas”运行，这是以太坊中的基本计算单位。每笔交易，无论是发送到外部账户（EOA）还是合约，都必须指定 `gasLimit` 和 `gasPrice`
    来计算费用。这笔费用支付给矿工，以补偿他们贡献的资源以及执行的工作。显然，矿工可以选择是否包含该交易并收取费用，这与比特币类似。


    通常，一个计算步骤只需消耗 1 个 Gas，但某些计算密集型或存储密集型操作的成本更高。每字节的交易数据大约需要 5 个 Gas。看看下面这些示例：两个数相加（使用
    EVM 操作码 `ADD`）大约需要 3 个 Gas；两个数相乘（使用 EVM 操作码 `MUL`）大约需要 5 个 Gas；计算哈希值（`SHA3`）大约需要
    30 个 Gas（显然这是计算密集型操作）。存储成本也以类似方式计算，但出于充分理由，其成本相当高。根据设计，一笔交易可以包含无限量的数据。每字节非零交易数据需要花费
    68 Gas。在“合约”中存储一个 256 位的字，大约需要 20,000 Gas。你可以在以太坊黄皮书中找到更多操作码及其对应的价格。那么总成本就是将所需
    Gas 量乘以 `gasPrice`。与比特币不同，以太坊的成本计算更为复杂。它考虑了带宽、存储和计算成本。拥有这样的费用计算机制，可以防止攻击者试图注入无限循环进行计算（导致拒绝服务攻击）或通过存储无意义数据来消耗更多空间。


    一笔交易的总以太币成本实际上取决于交易消耗的 Gas 量，乘以交易发起人在交易中指定的每单位 Gas 的价格。另一方面，矿工有一套策略来决定收取的 Gas
    价格，这应该是交易发送方必须指定的最低金额，以确保交易不会被矿工拒绝。那么，如何计算一笔交易的总成本呢？不是近似值，而是实际成本？交易的总“以太币”成本基于两个因素：`gasUsed`
    和 `gasPrice`。总成本 = `gasUsed * gasPrice`。`gasUsed` 部分是在执行 EVM 指令的操作码时消耗的总 Gas，而
    `gasPrice` 是用户指定的价格。


    如果计算步骤（包括交易、消息以及可能触发的任何子消息）所使用的 Gas 总量小于或等于 `gasLimit`，则该交易会被矿工处理。然而，如果总 Gas 超过了
    `gasLimit`，则所有更改都会回滚（尽管这是一笔有效交易），但矿工仍然可以收取费用。那么，多余的 Gas 会怎样呢？交易执行后所有未使用的 Gas 会以以太币的形式退还给发送方。发送方无需担心超额支付，因为他们只需为实际消耗的
    Gas 付费。这无疑意味着，设定一个远高于预估值的 Gas 上限来发送交易既重要又安全。同时，也建议不要支付过高的 `gasPrice`，而是使用来自 [`https://ethgasstation.info/`](https://ethgasstation.info/)
    的平均 Gas 价格。


    让我们逐一梳理在以太坊网络中发起一笔交易时的每个步骤，以便对流程建立具体的理解：


    *   每笔交易必须定义其愿意花费的 `gasLimit`（`gasLimit` 也称为 `startGas`），以及每单位 Gas 愿意支付的费用（`gasPrice`）。在开始执行时，价值为
    `gasLimit * gasPrice` 的以太币会从交易发送方的账户中扣除。请记住，这并非交易的实际总成本（在理想情况下应略高于此）。只有在交易完成后，其实际成本（`gasUsed
    * gasPrice`）才会确定，并据此对最初从发送方账户中扣除的金额（`gasLimit * gasPrice`）进行调整，余额会返还给发送方。在交易开始时就直接扣除金额（`gasLimit
    * gasPrice`），是因为存在一种可能性，即发送方在发起的交易执行中途可能破产。

    *   交易执行期间的所有操作，包括数据库读写、消息传递以及 EVM 执行的每一个计算步骤（例如加法、减法、哈希等），都会消耗一定量的 Gas，这些消耗量是预定义的。

    *   正常交易是指成功执行且未超过指定 `gasLimit` 的交易。对于此类交易，应会剩余一些 Gas，记为 `gas_rem`。交易成功执行后，交易发送方会收到
    `gas_rem * gasPrice` 的退款，而该区块的矿工会获得 `(gasLimit - gas_rem) * gasPrice` 的奖励。

    *   如果一笔交易在成功完成前 Gas 耗尽，则所有执行都会回滚，但该交易仍然有效。在这种情况下，交易的唯一结果是全部金额 `gasLimit * gasPrice`
    都归矿工所有。

    *   对于合约账户，当合约向另一个合约发送消息以进行子执行时，它也可以选择设置一个 `gasLimit`。此选项专门用于该消息引发的子执行，因为被调用的合约可能存在无限循环。如果子执行
    Gas 耗尽，则子执行会回滚，这可以保护系统免受此类无限循环或蓄意的拒绝服务攻击企图。消耗的 Gas 仍然会被分配并归矿工所有。另外请注意，当消息由合约触发时，只有指令消耗
    Gas，消息中的数据不消耗任何 Gas。这是因为来自父合约的数据无需再次复制，只需通过指针引用即可。


    以太坊的第一个版本（Frontier）的默认 Gas 价格为 0.05e12 WEI（即以太币的最小面额）。在第二个版本（Homestead）中，默认 Gas
    价格降到了 0.02e12 WEI。你可能会想，为什么 Gas 和以太币要相互解耦，而不是使用一个单一的计量单位，那样会更简单。其实，这是有意为之的设计，因为
    Gas 单位与具有自然成本的计算单位（例如，每次计算的成本）很好地对应，而以太币的价格通常会因市场力量而波动。


    我们已经知道，参与网络的每个以太坊节点都会运行 EVM，作为区块验证协议的一部分。这意味着所有节点都（冗余且并行地，但对于达成共识至关重要）执行同一组交易和合约。虽然这种冗余自然会使成本变得高昂，但也存在一种激励，促使人们不要将区块链用于那些可以在链下完成的计算（博弈论！）。

