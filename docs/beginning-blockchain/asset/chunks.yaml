- fmt: '### Prepare Ethereum Transaction


    Now that we have some test Ether with Alice, let’s create an Ethereum transaction
    to send some of this Ether to Bob. Recall that there are no inputs and outputs
    and UTXO queries to be done in the case of Ethereum because it uses an account
    and balances-based system. So, all that we need to do in the transaction is to
    specify the `from` address (the sender’s address), the `to` address (the recipient
    address), and the amount of Ether to be sent, among a few other things.


    Also, recall that in the case of a Bitcoin transaction we did not have to specify
    the transaction fee; however, in the case of an Ethereum transaction we need to
    specify two related fields. One is `gas` limit and the other is `gasPrice`. Recall
    from Chapter [4](#A440588_1_En_4_Chapter.html) that gas is the unit of transaction
    fee we need to pay to the Ethereum network to get our transactions confirmed and
    added to blocks. `gasPrice` is the amount of Ether (in gwei) we want to pay per
    unit of gas. The maximum fee that we allow to be used for a transaction is the
    product of `gas` and `gasPrice`.


    So, for this example transaction, we define a JSON object with the following fields.
    Here, `from` has Alice’s address and `to` has Bob’s address, and `value` is one
    Ether in wei. The `gasPrice` we choose is 20 gwei and the maximum amount of gas
    we want to pay for this transaction is 42,000.


    Also, note that we have left the `data` field empty. We will come back to this
    later in the smart contract section.


    ```

    {

    from: "0xAff9d328E8181aE831Bc426347949EB7946A88DA",

    gasPrice: "20000000000",

    gas: "42000",

    to: ''0x22013fff98c2909bbFCcdABb411D3715fDB341eA'',

    value: "1000000000000000000",

    data: ""

    }

    ```


    ### Sign Transaction


    Now that we have created a transaction object with the required fields and values,
    we need to sign it using the private key of the account that is sending the Ether.
    In this case, the sender is Alice, so we will use Alice’s private key to sign
    the transaction. This is to cryptographically prove that it is actually Alice
    who is spending the Ether in her account.


    ```javascript

    var signTransaction = function () {

    var tx = {

    from: "0xAff9d328E8181aE831Bc426347949EB7946A88DA",

    gasPrice: "20000000000",

    gas: "42000",

    to: ''0x22013fff98c2909bbFCcdABb411D3715fDB341eA'',

    value: "1000000000000000000",

    data: ""

    };

    web3.eth.accounts.signTransaction(tx, ''0x9fb71152b32cb90982f95e2b1bf2a5b6b2a53855eacf59d132a2b7f043cfddf5'')

    .then(function(signedTx){

    console.log(signedTx.rawTransaction);

    });

    };

    ```


    The preceding code snippet calls the `signTransaction` function with the transaction
    object we created in the step before and Alice’s private key that we got when
    we generated Alice’s account. Following is the output we get when we run the preceding
    code snippet.


    ```

    {

    messageHash: ''0x91b345a38dc728dc06a43c49b92a6ac1e0e6d614c432a6dd37d809290a25aa6b'',

    v: ''0x2a'',

    r: ''0x14c20901a060834972a539d7b8ad1f23161c2144a2b66fbf567e37e963d64537'',

    s: ''0x3d2a0a818633a11832a5c48708a198af909eaf4884a7856c9ac9ed216d9b029c'',

    rawTransaction: ''0xf86c018504a817c80082a4109422013fff98c2909bbfccdabb411d3715fdb341ea880de0b6b3a7640000802aa014c20901a060834972a539d7b8ad1f23161c2144a2b66fbf567e37e963d64537a03d2a0a818633a11832a5c48708a198af909eaf4884a7856c9ac9ed216d9b029c''

    }

    ```


    In the output of the `signTransaction` function we receive a JSON object with
    a few properties. The important value for us is the `rawTransaction` value. This
    is the hex string representation of the signed transaction. This is very similar
    to how we created a hex string of the Bitcoin transaction in the Bitcoin section.


    ### Send Transaction to the Ethereum Network


    The final step is to just send this signed raw transaction to the public-hosted
    Ethereum test network node, which we have set as the provider of our `web3` object.


    The following code calls the `sendSignedTransaction` function to send the raw
    transaction to the Ethereum test network. The input parameter is the value of
    the `rawTransaction` string that we got in the previous step as part of signing
    the transaction.


    ```javascript

    web3.eth.sendSignedTransaction(signedTx.rawTransaction).then(console.log);

    ```


    Notice the use of `then` in the preceding code snippet. This is interesting because
    the `web3` library provides different levels of finality when working with Ethereum
    transactions, because an Ethereum transaction goes through several states after
    being submitted. In this function, call of sending a transaction to the network,
    `then` is hit when the transaction receipt is created, and the transaction is
    complete.


    After a few seconds, when the JavaScript promise resolves, the following is what
    we get as an output.


    ```

    {

    blockHash: ''0x26f1e1374d11d4524f692cdf1ce3aa6e085dcc181084642293429eda3954d30e'',

    blockNumber: 2514764,

    contractAddress: null,

    cumulativeGasUsed: 125030,

    from: ''0xaff9d328e8181ae831bc426347949eb7946a88da'',

    gasUsed: 21000,

    logs: [],

    logsBloom: '''',

    status: ''0x1'',

    to: ''0x22013fff98c2909bbfccdabb411d3715fdb341ea'',

    transactionHash: ''0xd3f45394ac038c44c4fe6e0cdb7021fdbd672eb1abaa93eb6a1828df5edb6253'',

    transactionIndex: 3

    }

    ```


    The output has a lot of information, as we can see. The most important part is
    the `transactionHash`, which is the ID of the transaction on the network. It also
    gives us the `blockHash`, which is the ID of the block in which this transaction
    was included. Along with this, we also get information about how much gas was
    used for this transaction, among other details. If the gas used is less than the
    maximum gas we specified during transaction creation, the remaining gas is sent
    back to the sender’s address.


    In this section, we sent a simple transaction to the Ethereum blockchain using
    JavaScript. But this is just the beginning of Ethereum application programming.
    In the next section, we will also look at how to create and call smart contracts
    programmatically.


    ## Interacting Programmatically with Ethereum—Creating a Smart Contract


    In this section, we will continue our Ethereum programming exercise, and we will
    create a simple smart contract on the Ethereum blockchain using the same `web3`
    JavaScript library and the Infura service API.


    Because no computer programming beginners’ tutorial is complete without a “Hello
    World” program, the smart contract we are going to create will be a simple smart
    contract returning the string “Hello World” when called.


    The contract creation process will be a special kind of transaction sent to the
    Ethereum blockchain, and these types of transactions are called “contract creation
    transactions.” These transactions do not mention a `to` address and the owner
    of the smart contract is the `from` address mentioned in the transaction.


    ### Prerequisites


    In this code exercise to create a smart contract, we will continue with the assumption
    that the `web3` JavaScript library is installed and instantiated in a Node.js
    app and we have registered for the Infura service, just like we did in the previous
    section.


    Following are the steps to create a smart contract on Ethereum using JavaScript.'
