    \ protocol in 1999, renamed it to Transport Layer Security (TLS) version 1.0 (TLSv1)\
    \ protocol and defined it in RFC 2246\\. SSLv3 and TLSv1 are compatible as far\
    \ as the basic operations are concerned."
