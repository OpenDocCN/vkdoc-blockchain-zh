  trans: '

    ### 编写智能合约


    回顾第 4 章的内容，以太坊智能合约是用 Solidity 编程语言编写的。虽然 `web3` JavaScript 库能够帮助我们通过编程将合约部署到以太坊区块链上，但我们仍需要使用
    `web3` 将智能合约发送到以太坊网络之前，先用 Solidity 编写并编译好合约。因此，让我们先用 Solidity 创建一个示例合约。


    有多种工具可用于编写 Solidity 代码。大多数主流 IDE 和代码编辑器都提供了 Solidity 插件，用于编辑和编译智能合约。此外，还有一个基于网页的
    Solidity 编辑器，名为 `Remix`。你可以在 [`https://remix.ethereum.org/`](https://remix.ethereum.org/)
    免费使用它。`Remix` 提供了一个非常简单的界面，让你能在浏览器中编码和编译智能合约。在本练习中，我们将使用 `Remix` 来编写和测试我们的智能合约，然后使用
    `web3` JavaScript 库和 Infura API 服务将同一份合约发送到以太坊网络。


    以下代码片段是用 Solidity 编程语言编写的，它是一个简单的智能合约，其 `Hello` 函数会返回字符串 "Hello World"。该合约还有一个构造函数，用于设置返回消息的值。


    ```solidity

    pragma solidity ⁰.4.0;

    contract HelloWorld {

    string message;

    function HelloWorld(){

    message = "Hello World!";

    }

    function Hello() constant returns (string) {

    return message;

    }

    }

    ```


    让我们进入 `Remix`，将这段代码粘贴到编辑器窗口中。下面的图片（图 5-4 和图 5-5）展示了我们的示例智能合约在 `Remix` 编辑器中的样子，以及当我们点击右侧菜单
    `Run` 选项卡下的 `Create` 按钮时，输出结果是什么样的。另外，请注意，默认情况下，`Remix` 编辑器会针对 JavaScript VM 环境进行智能合约编译，并会使用一个带有一些
    ETH 余额的测试账户用于测试。当我们点击 `Create` 按钮时，该合约就会在 JavaScript VM 环境中使用所选账户被创建。


    ![A440588_1_En_5_Fig5_HTML.jpg](img/A440588_1_En_5_Fig5_HTML.jpg)


    图 5-5：在 Remix IDE 中创建智能合约的输出


    ![A440588_1_En_5_Fig4_HTML.jpg](img/A440588_1_En_5_Fig4_HTML.jpg)


    图 5-4：在 Remix IDE 中编辑智能合约


    以下是 `create` 操作生成的输出，它告诉我们合约已经创建成功，因为它有了一个合约地址。`from` 值是用来创建合约的账户地址。同时，它还显示了合约创建交易的哈希值。


    ```text

    status     0x1 Transaction mined and execution succeed

    contractAddress    0x692a70d2e424a56d2c6c27aa97d1a86395877b3a

    from   0xca35b7d915458ef540ade6068dfe2f44e8fa733c

    to     HelloWorld.(constructor)

    gas    3000000 gas

    transaction cost   205547 gas

    execution cost     109539 gas

    hash   0x9f3c21c21f263084b9f031966858a5d8e0648ed19c77d4d2291875b01d89a141

    input  

    decoded input  {}

    decoded output      -

    logs   []

    value  0 wei

    ```


    至此，我们已经准备好了一个简单的“Hello World”智能合约。下一步是通过编程方式将其部署到以太坊区块链上。


    ### 编译合约并获取详细信息


    首先，让我们从 `Remix` 中获取一些关于智能合约的详细信息，这些信息在后续使用 `web3` 库将合约部署到以太坊网络时会用到。点击右侧菜单中的 `Compile`
    选项卡，然后点击 `Details` 按钮。这会弹出一个新的子窗口，其中包含智能合约的详细信息。对我们来说，最重要的是详情弹窗中的 `ABI` 和 `BYTECODE`
    部分。


    让我们使用 `ABI` 标题旁边的“复制值到剪贴板”按钮，复制 `ABI` 部分中的内容。以下是我们的智能合约的 `ABI` 数据值。


    ```json

    [

    {

    "constant": true,

    "inputs": [],

    "name": "Hello",

    "outputs": [

    {

    "name": "",

    "type": "string"

    }

    ],

    "payable": false,

    "stateMutability": "view",

    "type": "function"

    },

    {

    "inputs": [],

    "payable": false,

    "stateMutability": "nonpayable",

    "type": "constructor"

    }

    ]

    ```


    这是一个 JSON 数组。如果仔细查看，我们会发现它包含了合约中每个函数（包括其构造函数）的 JSON 对象。这些 JSON 对象描述了函数的详细信息及其输入和输出。该数组定义了智能合约的接口。


    当我们在网络上部署并调用这个智能合约时，我们需要这些信息来了解合约暴露了哪些函数，以及需要向我们要调用的函数传入什么参数。


    现在，让我们获取详情弹窗中 `BYTECODE` 部分的数据。以下是我们为合约复制的数据。

    '
