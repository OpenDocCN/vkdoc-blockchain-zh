    # 理解比特币挖矿中的工作量证明


    尽管奖励看起来很诱人，但要幸运地成为那个获得区块提议权的节点并不容易。如果你不够幸运，你做的所有工作都将白费；这就是一个劣势！那么，节点在 PoW 中具体做什么呢？现在我们回到难度难题上来。每个挖矿节点始终都在努力提议一个区块，但在某个时间点只有一个能成功。假设一个区块已经被提出，现在所有挖矿节点都在努力提议一个新区块。让我们逐步了解这个过程，并理解整个流程：


    ## 第一步


    矿工使用软件来跟踪交易，剔除那些已经成功进入区块链的交易，拒绝欺诈交易，并解决密码学难题以提议一个新区块，然后将其广播到整个网络。最好的挖矿软件是官方的 Bitcoin
    Core，但人们也提出了许多其他变体。如果你登录这个链接（ [`https://bitcoin.org/en/download`](https://bitcoin.org/en/download)
    ），你会发现官方的 Bitcoin Core 支持 Windows、Linux、Mac OS、Ubuntu 和 ARM Linux。因此，当我们说挖矿节点选择所有交易（可能是能带给矿工最高利润的交易），直到达到
    1MB（比特币现金为 2MB）的区块限制时，它们也会对这些交易进行哈希运算，并生成将成为新区块头一部分的**梅克尔根**。这个梅克尔根代表了所有交易。


    ## 第二步


    他们准备区块头。除了随机数（nonce），其余所有信息在这一步都是可用的。挖矿节点的工作是通过对区块头进行两次哈希运算，并与难度目标进行比较，以找出满足小于难度目标条件的随机数。他们不断改变随机数，直到满足条件，而且没有捷径可以快速找到随机数；必须尝试每一种可能的选项。我们之前已经了解了如何使用区块头本身包含的四个字节数据来计算难度目标，并学习了它是如何每两周调整一次的。这个过程如下所示：


    ```

    H [ H (版本 | 上一个区块哈希 | 梅克尔根 | 时间戳 | 难度目标 | 随机数) ]

    < [ 难度目标 ]

    ```


    ## 第三步


    矿工在第二步中通过将随机数字段递增“1”来不断改变它，直到满足条件——这是一个递归过程。每个节点的难度目标都是相同的，所有节点都在尝试解决同一个问题，但请记住，它们可能拥有不同变体的交易池，因此它们的梅克尔根也会不同。由于每个节点都在尝试延长最长的主区块链，所以上一个区块的哈希值将是相同的。


    因此，最终区块头的两次 Sha256 哈希值必须小于目标值，才能将区块提议给整个网络。参考以下示例以更好地理解：


    ```

    目标值   : 0000000000000074cd00000000000000000000000000000000000000000000000

    哈希值   : 0000000000000074cc4471deff052ced7f0734e4eda86c845a2fcf0553ed7f0

    ```


    注意，哈希值和目标值具有相同数量的前导零（即 14 个），并且`74cc`小于`74cd`，因此它满足条件，这个区块现在可以被提议。在许多地方，你会发现这种解释是用目标和哈希的近似值来简化的，并且只计算前导零。如果哈希值的前导零多于目标值，则满足条件。再次记住，目标值中的零越多，找到满足条件的哈希值就越困难。


    让我们将到目前为止学到的知识与实际的比特币实现联系起来。我们知道，区块生成时间被设定为十分钟——正如我们已经讨论过的，这被编码在比特币二进制程序中，即两周内生成
    2016 个区块，并且在发生硬分叉之前不会改变。你可以在网站 [`https://blockchain.info`](https://blockchain.info/)
    上浏览已提议的区块，查看满足难度目标的哈希值，并亲眼看到不同区块的哈希值会有不同的前导零个数，这只是为了将平均区块生成时间设定为十分钟。在最初的日子，前导零的数量大约是
    9 或 10 个，而今天已经增加到大约 18 到 20 个零。当更多具有更高算力的计算节点加入网络时，它可能会进一步增加。


    ## 第四步


    一旦矿工找到了有效的区块，他们会立即将该区块发布到整个网络。接收到这个区块的每个节点都会独立地重新检查提出该区块的矿工是否确实解决了挖矿难题。对于这些节点来说，验证过程只需一步，如下所示：


    ```

    H [H (版本| 上一个区块哈希 | 梅克尔根 | 时间戳 | 难度目标 | 找到的随机数)]

    < [ 难度目标 ]

    ```


    注意，它们只使用包含提议矿工找到的随机数的区块头，来检查哈希值是否小于目标值且有效。如果随机数有效且条件满足，那么它们会检查区块中提议的每个交易与其在区块头中的梅克尔根是否一致。如果所有交易都有效，它们就会将这个区块添加到本地区块链副本中。这个新区块包含一个**币基交易**，用于生成新的币（最初是
    50 BTC，然后是 25，然后是 12.5，并如所述不断减半），作为对提出有效区块的矿工的奖励。


    这里要注意的是，区块挖矿不是一件容易的事，这要归功于 PoW 挖矿算法。对于一个节点来说，要提议一个无效区块，它必须耗费大量的电力和 CPU 周期来找到随机数并提议区块，而该区块最终会被网络中的节点拒绝。如果这是一项容易的任务，许多节点就会不断尝试，用无效的区块淹没网络。到现在，你必须理解并欣赏比特币是如何以博弈论的方式防止这种情况的！矿工遵守规则总是有利可图的，并且不遵守规则不会带来任何额外好处。


    在前面的步骤中，我们学习了比特币中实现的 PoW 挖矿过程。这种设计中最出色的一点是随机选择获得区块提议权的挖矿节点。没有人知道谁会幸运地找到正确的随机数并提议一个区块，这纯粹是一个随机现象。我们已经知道，生成真正的随机数相当困难，而这正是大多数密码学实现中最容易受到攻击的薄弱环节。采用像比特币这样的设计，随机选择一个节点来提议区块是真正随机的。


    比特币挖矿中另一个出色之处是区块奖励。这是成功提议新区块的矿工通过同一区块中的币基交易获得的奖励。矿工还会获得他们包含在区块中的所有交易相关联的交易费用。因此，一个区块的挖矿奖励是区块奖励和交易费用的组合，如下所示：


    ```

    挖矿奖励 = 区块奖励 + 区块中所有交易的总交易费用

    ```

    '
- fmt: '我们已知，挖矿是比特币系统中创造新比特币的唯一途径，但这是挖矿的目的吗？不！挖矿的目的是挖掘新区块，而新比特币的生成以及交易费是为了激励矿工，让越来越多的矿工对挖矿感兴趣。显然，如果你赚不到钱，为什么还要挖矿？这又是博弈论。恰当的激励设计是使系统去中心化且能自我维持的关键。请注意，比特币系统没有惩罚不诚实行为节点的方法，它只会奖励诚实行为。比特币区块链网络中的参与者，例如仅使用比特币的个人或矿工，都通过其公钥来识别。他们可以生成尽可能多的密钥对，这使得系统成为一个假名系统。一个节点无法通过其在`coinbase`交易中使用的公钥被唯一标识，因为在下一秒它就可以创建一个新的密钥对，并以一个新的网络地址出现。因此，恰当的激励是确保系统参与者诚实行为的最佳方式——再次体现了博弈论的魅力！


    现在问你一个问题。在广播一个区块后，假设某个节点验证了它，发现`nonce`值、交易以及其他一切均有效，并将其加入本地区块链副本。这是否意味着该区块中的所有交易都已被结算和确认？嗯，并非如此！有可能两个区块同时产生，当一个节点开始扩展其中一个区块时，有可能大多数节点正在扩展另一个区块。最终，最长的区块链会成为主链。这种情况下，一个完全有效、包含所有合法交易和有效`nonce`值以满足挖矿难题的区块，仍然可能被比特币网络抛弃。这些未能成为最终区块链一部分的区块被称为**孤块**。这个解释表明，任何时候都存在一个或多个区块被孤立的可能性。因此，最佳策略是等待更多区块添加到链上。换句话说，当一个交易接收到多个确认时，可以认为它已属于最终共识链的一部分，不会被孤立。随着某个区块之后添加了任意数量的区块，该区块中的交易就会收到相应数量的确认。虽然对于在接收交易前应获得多少确认并无明确规定，但六个确认已是最佳实践。即使有四个确认，也足以安全地假定交易已被确认，但六个确认是最佳实践，因为随着确认次数增加，区块被孤立的可能性呈指数级下降。


    ### 区块传播


    比特币使用工作量证明挖矿来随机选择一个能够提议有效区块的节点。一旦矿工找到有效区块，他们就会将该区块广播至整个网络。网络中的区块传播方式与交易相同。每个接收到新区块的节点会进一步广播它，以便最终该区块到达网络中的每个节点。请注意，除非区块从其视角来看属于最长链的一部分，否则节点不会广播它。当节点接收到提议的新区块时，它们不仅会验证区块头并检查哈希值是否在可接受范围内，还会验证该区块中包含的每一笔交易。至此可以明确，对于比特币网络中的节点来说，验证区块比验证交易要复杂一些。与交易类似，有可能同时提出两个有效的区块。在这种情况下，节点会保留这两个区块，并开始在来自最长链的那个区块之上进行构建。


    我们必须理解，区块在整个网络中传播并到达每个节点总是存在延迟。区块大小与传播时间呈线性比例关系，即区块大小每增加`1 kB`，延迟就会线性增加。显然，这种网络延迟会影响区块链的增长速度。Decker
    和 Wattenhofer 进行的一项测量研究讨论了这种情况。请参考图 [3-19](#A440588_1_En_3_Chapter.html#Fig19)，该图展示了区块大小与到达
    25%（线 1）、50%（线 2）和 75%（线 3）被监控节点所需时间之间的关系。


    ![A440588_1_En_3_Fig19_HTML.jpg](A440588_1_En_3_Fig19_HTML.jpg)


    图 3-19


    区块传播时间与区块大小的关系


    网络带宽是导致这种网络延迟的主要原因，并且它在全球各地并不一致。除此之外，我们知道区块的广播数据包需要经过多次跳转才能最终到达所有节点。典型的比特币区块大小为`1
    MB`，而通过硬分叉产生的新变体（比特币现金）的区块大小为`2 MB`；你可以想象由此带来的延迟固有限制。根据网络研究，一个月内有超过一百万个比特币节点连接到比特币网络，并且有数千个全节点几乎永久性地连接到网络。


    ### 综合应用


    从高层次来看，如果我们只是按事件发生的顺序列出，那么流程如下：


    *   所有新交易都会被广播到所有节点。

    *   听到新交易的每个节点将它们收集到一个区块中。

    *   每个挖矿节点努力为其区块找到困难的工作量证明，以便能够将其提交给网络。

    *   当一个节点幸运地为工作量证明难题找到正确的`nonce`值时，它就会将该区块广播给所有节点。

    *   仅当`nonce`值和区块中的所有交易均有效且未被花销时，节点才接受提议的区块。

    *   比特币网络节点通过努力创建链中的下一个区块来表达对区块的接受，并使用被接受区块的哈希作为它们将要挖矿的新区块的前一哈希。


    ## 比特币脚本


    我们在前面的章节中从高层次了解了比特币交易。在本节中，我们将深入探讨实现交易的实际编程结构。每一笔比特币交易的输入和输出都嵌入了脚本。比特币脚本是基于栈的，我们稍后会看到，并且是从左到右进行评估。请记住，比特币脚本不是图灵完备的，因此你不能像使用其他图灵完备语言（如`C`、`C++`或`Java`等）那样实现任何和所有功能。比特币脚本中没有循环的概念，因此脚本的执行时间不是可变的，而是与指令数量成正比。这意味着脚本在有限的时间内执行，不可能陷入循环。而且，最重要的是，脚本一定会终止。现在我们了解了脚本的一些知识，那么它们在何处运行呢？无论是通过编程方式、钱包软件还是其他任何程序进行交易时，脚本都会被注入交易中，而矿工的任务就是在挖矿时运行这些脚本。比特币脚本的目的是使网络节点能够确保可用资金仅由真正拥有它们的授权方进行索取和花费。'
  raw: 'We know that mining is the only way new Bitcoins are created in the Bitcoin
    system, but is that the purpose of mining? No! The purpose of mining is to mine
    new blocks, and generation of new Bitcoins and also the transaction fee is to
    incentivize the miners so that more and more miners are interested in mining.
    Obviously though, why would you mine if you are not making good money? This is
    again game theory. A proper incentivization mechanism is the key to make a sytem
    decentralized and self-sustainable. Notice that the Bitcoin system does not have
    a way to penalize nodes that do not play honestly, it only rewards honest behavior.
    Actors in the Bitcoin blockchain network such as individuals who just use Bitcoin
    or the miners are all identified using their public keys. It is possible for them
    to generate as many key pairs as possible and this makes it a psydonemous system.
    A node cannot be uniquely identified with its public key that it has used in the
    coinbase transaction, as in the very next moment it can create a new key pair
    and expose itself with a new network address. So, proper incentivization stands
    to be the best way to ensure the actors in the system play honestly`—`again the
    beauty of game theory!


    Here is a question for you now. After a block was broadcast, let’s say a node
    verified it, found the nonce and transactions and everything else to be valid,
    and included it in its local copy of blockchain. Does this mean that the transactions
    that were there in the block are all settled and confirmed now? Well, not really!
    There is a chance that two blocks came in at the same time and while one node
    started extending one of them, there is a chance that a majority of the nodes
    are extending on the other block. Eventually, the longest blockchain becomes the
    original chain. This is a scenario when a block that is absolutely valid, with
    all legitimate transactions and a proper nonce value that satisfied the mining
    puzzle, can still get abandoned by the Bitcoin network. Such blocks that do not
    become a part of the final blockchain are called orphaned blocks. Now, this explanation
    indicates that there is a certain possibility of one or more blocks getting orphaned
    out at any time. So, the best strategy would be to wait untill many blocks are
    added to the chain. In other words, when a transaction receives multiple confirmations,
    it is safe to think that it is a part of the final consensus chain and will not
    get orphaned out. As any number of blocks get added after a certain block, that
    many number of confirmations are received by the transactions in that block. Though
    there are no rules as such that define how many confirmations one should get before
    accepting a transaction, six confirmations has been the best practice. Even with
    four confirmations, it is quite safe to assume a transaction has been confirmed,
    but six is the best practice because with more confirmations, the chances of a
    block getting orphaned out decreases exponentially.


    ### Block Propagation


    Bitcoin uses PoW mining to randomly select a node that can propose a valid block.
    Once the miner finds a valid block, they broadcast that block to the entire network.
    Block propagation in the network happens the same way as transactions. Every node
    that receives the new block further broadcasts it so that eventually the block
    reaches every node in the network. Please note that a node does not broadcast
    a block unless it is a part of the longest chain from its perspective. Once the
    nodes receive the new block that is proposed, they not only verify the header
    and check the hash value in acceptable range, but also validate each and every
    transaction that was included in that block. It is clear by now that for a node
    in the Bitcoin network, validating a block is a little more complex compared with
    validating transactions. Similar to transactions, there is a possibility that
    two valid blocks are proposed at the same time. In such a scenario, the node will
    keep both the blocks and start building on the one that comes from the longest
    chain.


    We must understand that there is always a latency involved for a block to propagate
    through the entire network and reach every node. The relation between the block
    size and the time taken is linearly proportional, in the sense that for each kB
    added to the block size, the latency increases linearly. It is obvious that such
    network latency would impact the rate of growth of the blockchain. A measurement
    study that was conducted by Decker and Wattenhofer addresses this situation. Refer
    to Figure [3-19](#A440588_1_En_3_Chapter.html#Fig19), which shows the relation
    between block size and the time it took to reach 25% (Line-1), 50% (Line-2), and
    75% (Line-3) of monitored nodes.


    ![A440588_1_En_3_Fig19_HTML.jpg](A440588_1_En_3_Fig19_HTML.jpg)


    Figure 3-19


    Block propagation time with respect to block size


    The network bandwidth is the primary reason for such network latencies and it
    is never consistent in all areas of the globe. On top of this, we know that the
    broadcast packets of blocks go through many hops to finally reach all nodes. A
    typical Bitcoin block is of 1MB and the new variant of Bitcoin with a hard fork
    that has come up (Bitcoin Cash) is of 2MB block size; you can imagine the inherent
    limitations due to latency. As per the network research, there are more than a
    million Bitcoin nodes that are connected to the Bitcoin network in a month and
    there are thousands of full nodes that are almost always connected to the network
    permanently.


    ### Putting It all Together


    At a high level, if we just put down the events in the order they take place,
    then here is how it may look:


    *   All new transactions are broadcast to all nodes.

    *   Each node that hears the new transactions collects them into a block.

    *   Each mining node works on finding a difficult PoW for its block to be able
    to propose it to the network.

    *   When a node gets lucky and finds a correct nonce to the PoW puzzle, it broadcasts
    the block to all nodes.

    *   Nodes accept the proposed block only if the nonce and all transactions in
    it are valid and not already spent.

    *   Bitcoin network nodes express their acceptance of the block by working on
    creating the next block in the chain, using the hash of the accepted block as
    the previous hash for the new block they would be mining.


    ## Bitcoin Scripts


    We learned about Bitcoin transactions in previous sections at a high level. In
    this section we will delve deep into the actual programming constructs that make
    the transactions happen. Every Bitcoin transactions’ input and output are embedded
    with scripts. Bitcoin scripts are stack based, which we will see shortly, and
    are evaluated from left to right. Remember that Bitcoin scripts are not Turing-complete,
    so you cannot really do anything and everything that is possible through other
    Turing-complete languages such as C, C++, or Java, etc. There are no concepts
    of loops in Bitcoin script, hence the execution time for scripts is not variable
    and is proportional to the number of instructions. This means that the scripts
    execute in a limited amount of time and there is no possibility for them to get
    stuck inside a loop. Also, most importantly, the scripts definitely terminate.
    Now that we know a little about the scripts, where do they run? Whenever transactions
    are made, whether programmatically, or through a wallet software or any other
    program, the scripts are injected inside the transactions and it is the work of
    the miners to run those scripts while mining. The purpose of Bitcoin scripts is
    to enable the network nodes to ensure the available funds are claimed and spent
    only by the entitled parties that really own them.'
  trans: '

