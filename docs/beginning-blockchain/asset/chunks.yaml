  trans: "\n## 公有链与私有链\n\n根据访问控制方式，区块链可分为公有链和私有链。公有链也称为无许可区块链，私有链也称为有许可区块链。两者之间的主要区别在于访问控制机制。公有链或无许可区块链不限制新节点加入网络，任何人均可接入网络。私有链的网络节点数量有限，并非所有人都能加入网络。公有链的典型例子为比特币和以太坊主网。私有链的示例则可以是几个相互连接但未接入主网的以太坊节点组成的网络，这些节点统称为私有链。\n\
    \n企业通常使用私有链与合作伙伴和/或下属组织间进行数据交换。\n\n在开发区块链应用时，区块链类型（公有或私有）会产生关键影响，因为与区块链交互的规则可能相同也可能不同。这被称为区块链治理。公有链具备一套预定义的规则，而私有链可针对每条链制定不同的规则。例如，供应链场景的私有链可能采用不同的治理规则，协议治理场景的私有链也可能设置不同规则。举例来说，上述私有以太坊账本与以太坊主网在代币、燃料价格、交易手续费、端点等参数上可能相同也可能不同。这些差异也会影响我们的应用程序。\n\
    \n在代码示例中，我们主要聚焦于比特币和以太坊的公开测试网络。虽然与这些区块链的私有部署进行交互的基本概念仍然相同，但配置代码指向私有网络的方式会存在差异。\n\
    \n## 去中心化应用架构\n\n通常情况下，去中心化应用旨在直接与区块链节点交互，无需引入任何中心化组件。然而在实际场景中，由于需要兼容传统系统以及现有区块链网络的功能限制和扩展性问题，我们在设计\
    \ DApp 时有时不得不在完全去中心化与可扩展性之间做出权衡。\n\n### 公共节点 vs. 自托管节点\n\n区块链是由节点组成的去中心化网络。所有节点持有相同的数据副本，并能始终保持数据状态一致。当为区块链开发应用时，我们可以让应用与目标网络的任意节点通信。主要存在两种配置方案：\n\
    \n*   应用与节点均在本地运行：应用和节点都在本地机器上运行。这意味着我们需要应用用户运行一个本地区块链节点，并将应用配置为与该节点连接。这种模式属于纯去中心化应用运行模式。以太坊\
    \ Mist 浏览器就是这种模式的示例，它使用本地 `geth` 节点。图 5-6 展示了这种配置。\n\n    ![A440588_1_En_5_Fig6_HTML.jpg](img/A440588_1_En_5_Fig6_HTML.jpg)\n\
    \n    图 5-6\n\n    DApp 连接至本地节点\n*   公共节点：应用与第三方托管的公共节点进行通信。这样用户无需托管本地节点。此方法既有优势也存在不足。虽然用户无需为运行本地节点支付电费和存储费用，但他们需要信任第三方来向区块链广播交易。以太坊浏览器插件\
    \ `metamask` 就采用这种模式，连接到公共托管的以太坊节点。图 5-7 展示了这种配置。\n\n    ![A440588_1_En_5_Fig7_HTML.jpg](img/A440588_1_En_5_Fig7_HTML.jpg)\n\
    \n    图 5-7\n\n    DApp 连接至公共节点\n\n### 去中心化应用与服务器\n\n除了上述场景，根据特定的用例和需求，还可能存在其他配置方案。在许多场景下，应用与区块链之间需要设置服务器。例如：当需要维护区块链状态缓存以加速查询时；当应用需要根据区块链上的状态更新向用户发送通知（邮件、推送、短信等）时；以及当涉及多个账本，需要运行后端逻辑在账本之间转换数据时。不妨想象一下某些大型加密货币交易所所使用的底层基础设施——我们获得的所有服务，如双因素认证、通知、支付网关等，这些服务在任何一个区块链中都无法直接提供。从更广泛的意义上讲，区块链只是确保了数据层的防篡改性和可审计性。\n\
    \n## 本章小结\n\n本章我们学习了去中心化应用的开发，并通过代码练习了解了如何以编程方式与比特币和以太坊区块链交互。我们还探讨了一些 DApp 架构模型，以及它们如何根据不同的用例而有所区别。\n\
    \n下一章我们将搭建一个私有以太坊网络，然后开发一个功能完善的 DApp 与该私有网络交互，该 DApp 还将使用智能合约来实现业务逻辑。\n\n# 6.\
    \ 构建一个以太坊 DApp\n\n在上一章中，我们学习了如何使用 JavaScript 以编程方式与比特币和以太坊区块链交互，还初步了解了如何创建和部署以太坊智能合约。在本章中，我们将通过学习和开发一个基于以太坊区块链的\
    \ DApp，把区块链应用程序开发提升到新的水平。作为创建这个 DApp 的一部分，我们将搭建一个私有以太坊网络，然后将这个网络作为 DApp 的底层区块链。这个\
    \ DApp 的业务逻辑将封装在以太坊智能合约中，并通过连接到私有以太坊网络的 Web 应用来执行这些逻辑。通过这种方式，我们旨在全面覆盖以太坊应用开发的各个方面——从搭建节点和网络，到创建和部署智能合约，再到使用客户端应用执行智能合约函数。\n"
- fmt: "# The DApp\n\nBefore we jump into developing the DApp, we need to define the\
    \ use case for the DApp. We also need to define the various components that will\
    \ be part of our DApp. So, let’s first do this.\n\nThe use case for our DApp is\
    \ a polling application that can allow voters to vote on a poll published in the\
    \ public domain. Voting using a centralized system is not very reliable, as it\
    \ exposes a single point of data corruption and failure. So, the goal of our DApp\
    \ is to enable decentralized polling. This way every voter is in control of their\
    \ vote and each vote is processed on every node on the blockchain so there is\
    \ no way to tamper with the vote data. While this can be easily done using the\
    \ public Ethereum blockchain, to make our exercise interesting we will deploy\
    \ our polling DApp on a private Ethereum network, and for that we will set up\
    \ the private network too. Sounds interesting? Let’s do this.\n\nThe first step\
    \ will be to set up a private Ethereum network. Then, for hosting the business\
    \ logic and poll results, we will create a smart contract that will be deployed\
    \ on this private Ethereum network. To interact with this smart contract, we will\
    \ create a front-end web application using the `web3` library. That’s it.\n\n\
    As per the plan just described, our DApp development exercise will have the following\
    \ steps:\n\n1. Setting up a private Ethereum network\n2. Creating a smart contract\
    \ for polling functionality\n3. Deploying the smart contract to the private network\n\
    4. Creating a front-end web app to interact with the smart contract\n\nIn the\
    \ following sections, we will be looking, in detail, at each of the steps mentioned.\n\
    \n**Note**\n\nAs mentioned, we can also use the public Ethereum network for this\
    \ DApp development. In addition to that, we can also use several tools like `Metamask`\
    \ and `Truffle` framework to expedite the development of an Ethereum DApp. These\
    \ tools, along with various others, allow us to manage our code and deployments\
    \ in a better way. The reader is encouraged to explore these and other tools to\
    \ try to find the best combination to create a comfortable and productive development\
    \ environment for their DApp development. This text is primarily focussed on making\
    \ the reader understand what goes under the hood when creating an Ethereum DApp,\
    \ hence all tools providing abstractions on top of the DApp development process\
    \ are kept out of scope.\n\n# Setting Up a Private Ethereum Network\n\nTo set\
    \ up a private Ethereum network, we will need one of the many Ethereum clients\
    \ available. In simple terms, an Ethereum client is an application that implements\
    \ the Ethereum blockchain protocol. There are many Ethereum clients available\
    \ on the Internet today; one of the popular ones is `go-ethereum`, also known\
    \ as `geth`. We will be using `geth` for our private network set-up. For this\
    \ exercise, we are using a virtual machine running Ubuntu Linux version 16.04.\n\
    \n## Install go-ethereum (geth)\n\nThe first step is to install `geth` on our\
    \ local machine. To install `geth`, we will get the `geth` executable installer\
    \ from the official source [`https://geth.ethereum.org/downloads/`](https://geth.ethereum.org/downloads/).\
    \ This download page at the official `geth` website lists the installer packages\
    \ for all major platforms (Windows, macOS, Linux).\n\nDownload the installer package\
    \ for your platform and install `geth` on your local machine. You can also choose\
    \ to install `geth` on a remote (cloud-hosted) server/virtual machine if you do\
    \ not want to install it on your local machine.\n\nOnce `geth` is successfully\
    \ installed on your local machine, you can check the installation by running the\
    \ following command in your terminal/command prompt.\n\n```\ngeth version\n```\n\
    \nDepending on your platform OS and the `geth` version you have installed, this\
    \ command should give an output similar to the following:\n\n```\nGeth\nVersion:\
    \ 1.7.3-stable\nGit Commit: 4bb3c89d44e372e6a9ab85a8be0c9345265c763a\nArchitecture:\
    \ amd64\nProtocol Versions: [63 62]\nNetwork Id: 1\nGo Version: go1.9\nOperating\
    \ System: linux\nGOPATH=\nGOROOT=/usr/lib/go-1.9\n```\n\n## Create geth Data Directory\n\
    \nBy default, `geth` will have its working directory but we will create a custom\
    \ one so that we can track it easily. Simply create a directory and keep the path\
    \ to this directory handy.\n\n```\nmkdir mygeth\n```\n\n## Create a geth Account\n\
    \nThe first thing we need is an Ethereum account that can hold Ether. We will\
    \ need this account to create our smart contracts and transactions later in the\
    \ DApp development. We can create a new account using the following command.\n\
    \n```\nsudo geth account new --datadir \nsudo geth account new --datadir /mygeth\n\
    ```\n\n**Note**\n\nWe are using `sudo` to avoid any permission issues.\n\nWhen\
    \ you run this command, the prompt will ask for a passphrase to lock this account.\
    \ Enter and confirm the passphrase and then your `geth` account will be created.\
    \ Make sure to remember the passphrase you entered; it will be needed to unlock\
    \ the account later to sign transactions. The address of this account will be\
    \ shown on the screen. For us, the address of the generated account is `baf735f889d603f0ec6b1030c91d9033e60525c3`.\
    \ The following screenshot (Figure 6-1) shows this process.\n\n![A440588_1_En_6_Fig1_HTML.jpg](A440588_1_En_6_Fig1_HTML.jpg)\n\
    \n**Figure 6-1** Ethereum account setup with geth\n\nNotice that we have passed\
    \ the data directory as the parameter for the create account command. This is\
    \ to make sure that the file containing the account details is created inside\
    \ our data directory so that it is easy to access the account from the context\
    \ of this directory. If we do not pass the data directory parameter to the `geth`\
    \ commands, then it will automatically take the default location of the data directory\
    \ (which can be different depending on the platform).\n\n## Create genesis.json\
    \ Configuration File\n\nAfter installing `geth` and creating a new account, the\
    \ next step is to define the genesis configuration for our private network. As\
    \ we have seen in the previous chapters, blockchains have a genesis block that\
    \ acts as the starting point of the blockchain, and all transactions and blocks\
    \ are validated against the genesis block. For our private network, we will have\
    \ a custom genesis block and hence a custom genesis configuration. This configuration\
    \ defines some key values for the blockchain like difficulty level, gas limit\
    \ for blocks, etc.\n\nThe genesis configuration for Ethereum has the following\
    \ format as a JSON object. Each of the keys of this object is a configuration\
    \ value that drives the network.\n\n```\n{\n\"config\": {\n\"chainId\": 3792,\n\
    \"homesteadBlock\": 0,\n\"eip155Block\": 0,\n\"eip158Block\": 0\n},\n\"difficulty\"\
    : \"2000\",\n\"gasLimit\": \"2100000\",\n\"alloc\": {\n\"baf735f889d603f0ec6b1030c91d9033e60525c3\"\
    : { \"balance\": \"9000000000000000000\" }\n}\n}\n```\n\nThe JSON object is primarily\
    \ constituted by a config section having values specific to `chainId` and block\
    \ numbers related to some of the forks that have taken place. The important parameter\
    \ to note here is the `chainId`, which represents the identifier of the blockchain\
    \ and helps prevent replay attacks. For our private chain, we have opted for a\
    \ random `chainId` 3792. You can choose any number here different from the numbers\
    \ used by main net (1) and the test nets (2, 3, and 4).\n\nThe next important\
    \ parameter is the `difficulty`. This value defines how difficult it will be to\
    \ mine a new block. This value is much higher in the Ethereum main network, but\
    \ for private networks we can choose a relatively smaller value.\n\nThen there\
    \ is `gasLimit`. This is the total gas limit for a block and not a transaction.\
    \ A higher value generally means more transactions in each block.\n\nFinally,\
    \ we have the `alloc` section. Using this configuration, we can prefund Ethereum\
    \ accounts with the value in wei. As we can see, we have funded the same Ethereum\
    \ account that we created in the last step, with 9 Ether."
  raw: "## The DApp\n\nBefore we jump into developing the DApp, we need to define\
    \ the use case for the DApp. We also need to define the various components that\
    \ will be part of our DApp. So, let’s first do this.\n\nThe use case for our DApp\
    \ is a polling application that can allow voters to vote on a poll published in\
    \ the public domain. Voting using a centralized system is not very reliable, as\
    \ it exposes a single point of data corruption and failure. So, the goal of our\
    \ DApp is to enable decentralized polling. This way every voter is in control\
    \ of their vote and each vote is processed on every node on the blockchain so\
    \ there is no way to tamper with the vote data. While this can be easily done\
    \ using the public Ethereum blockchain, to make our exercise interesting we will\
    \ deploy our polling DApp on a private Ethereum network, and for that we will\
    \ set up the private network too. Sounds interesting? Let’s do this.\n\nThe first\
    \ step will be to set up a private Ethereum network. Then, for hosting the business\
    \ logic and poll results, we will create a smart contract that will be deployed\
    \ on this private Ethereum network. To interact with this smart contract, we will\
    \ create a front-end web application using the web3 library. That’s it.\n\nAs\
    \ per the plan just described, our DApp development exercise will have the following\
    \ steps:\n\n1.  Setting up a private Ethereum network  \n2.  Creating a smart\
    \ contract for polling functionality  \n3.  Deploying the smart contract to the\
    \ private network  \n4.  Creating a front-end web app to interact with the smart\
    \ contract  \n\nIn the following sections, we will be looking, in detail, at each\
    \ of the steps mentioned.\n\nNote\n\nAs mentioned, we can also use the public\
    \ Ethereum network for this DApp development. In addition to that, we can also\
    \ use several tools like Metamask and Truffle framework to expedite the development\
    \ of an Ethereum DApp. These tools, along with various others, allow us to manage\
    \ our code and deployments in a better way. The reader is encouraged to explore\
    \ these and other tools to try to find the best combination to create a comfortable\
    \ and productive development environment for their DApp development. This text\
    \ is primarily focussed on making the reader understand what goes under the hood\
    \ when creating an Ethereum DApp, hence all tools providing abstractions on top\
    \ of the DApp development process are kept out of scope.\n\n## Setting Up a Private\
    \ Ethereum Network\n\nTo set up a private Ethereum network, we will need one of\
    \ the many Ethereum clients available. In simple terms, an Ethereum client is\
    \ an application that implements the Ethereum blockchain protocol. There are many\
    \ Ethereum clients available on the Internet today; one of the popular ones is\
