    *   初始的 128 位密钥被排列为四个字：`[w[0], w[1], w[2], w[3]]`。

    *   现在看一下扩展后的字：`[w[4], w[5], w[6], w[7]]`。请注意，`w[5]`依赖于`w[4]`和`w[1]`。这意味着每个扩展后的字都依赖于紧邻的前一个字（即`w[i]
    – 1`）以及向后四个位置的字（即`w[i] – 4`）。对`w[6]`也进行同样的测试。如你所见，这里只执行了一个简单的异或（XOR）操作。

    *   那么，`w[4]`呢？或者任何其他位置是四的倍数的字，例如`w[8]`或`w[12]`？对于这些字，使用了一个更为复杂的函数，记为“`g`”。它基本上是一个三步函数。第一步，输入的四个字块循环左移一个字节。例如，`[w[0],
    w[1], w[2], w[3]]`变为`[w[1], w[2], w[3], w[0]]`。第二步，将输入的四个字节字（例如`[w[1], w[2], w[3],
    w[0]]`）作为输入，并使用 S 盒对每个字节进行字节替换。然后，第三步，将第二步的结果与称为轮常数（记为`Rcon[]`）的东西进行异或操作。轮常数是一个字，其中最右边的三个字节始终为零。例如，`[x,
    0, 0, 0]`。这意味着`Rcon[]`的目的仅仅是对第二步输出密钥字的最左边字节执行异或操作。同时请注意，每一轮的`Rcon[]`都不同。这样，复杂函数“`g`”的最终输出就生成了，然后将其与`w[i]
    – 4`进行异或操作，从而得到`w[i]`，其中“`i`”是 4 的倍数。

    *   这就是 AES 中密钥扩展的方式。


    最后一轮输出的状态数组被重新排列，形成 128 位的密文块。类似地，解密过程以不同的顺序进行，我们在 AES 过程图中看到过这一点。本意是让你对算法在高级层面上的工作原理有一个初步了解，在本节中，我们将把讨论限制在加密过程上。


    AES 算法由 NIST（美国国家标准与技术研究院）标准化。它存在处理时间较长的局限性。假设你正在发送一个只有 1 兆字节的文件（8388608 位）并用
    AES 加密。使用 128 位 AES 算法，此加密所需的步骤数将是 8388608 / 128 = 65536 个数据块！使用并行处理方法可以提高 AES
    的效率，但在处理大量数据时仍然不太适合。


    ### 对称密钥密码学中的挑战


    对称密钥密码学存在一些局限性。下面列出了其中的几个：


    *   密钥必须在任何通信之前由发送方和接收方共享。这需要一个安全的密钥建立机制。

    *   发送方和接收方必须相互信任，因为他们使用相同的对称密钥。如果接收方被攻击者入侵，或者接收方故意与他人共享密钥，系统就会受到损害。

    *   一个由 n 个节点组成的大型网络需要管理 n(n–1)/2 个密钥对。

    *   建议为每个通信会话更改密钥。

    *   通常需要一个可信的第三方来进行有效的密钥管理，这本身就是一个大问题。


    ## 密码学哈希函数


    哈希函数是最重要的密码学原语之一的数学函数，并且是区块链数据结构的一个组成部分。它们被广泛用于许多密码学协议、信息安全应用，如数字签名和消息认证码（MAC）。由于它用于非对称密钥密码学，我们将在进入非对称密码学之前在此讨论它。请注意，本节涵盖的概念可能与学术教科书不符，并稍微偏向区块链生态系统。


    密码学哈希函数是一类适用于密码学的特殊哈希函数，我们将仅围绕它进行讨论。因此，密码学哈希函数是一种单向函数，它将任意长度的输入数据转换，并生成固定长度的输出。输出通常称为“哈希值”或“消息摘要”。它可以如图
    2-8 所示表示。


    ![A440588_1_En_2_Fig8_HTML.jpg](A440588_1_En_2_Fig8_HTML.jpg)


    **图 2-8** 哈希函数的基本形式


    为了使哈希函数达到其设计目的并可用，它们应具备以下核心属性：


    *   输入可以是任意大小的字符串，但输出是固定长度的，例如，256 位输出或 512 位输出。

    *   对于任何给定的消息，哈希值都应是可高效计算的。

    *   它是确定性的，这意味着相同的输入提供给相同的哈希函数，每次都产生相同的哈希值。

    *   除了尝试所有可能的消息外，从哈希值反向推导并生成消息是不可行的（尽管并非不可能！）。

    *   消息中的任何微小变化都应该极大地影响输出哈希值，这样就没有人能够在小变化后将新的哈希值与旧的哈希值关联起来。


    除了上述核心属性外，它们还应满足以下安全属性，才能被视为密码学协议：


    *   抗碰撞性：这意味着找到两个不同的输入（例如 X 和 Y）使它们哈希到相同值是不可行的。


