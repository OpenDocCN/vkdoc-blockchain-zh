- fmt: '### Blockchain Transactions


    When we say blockchain, we mean a blockchain of transactions, right? So it starts
    from a transaction and then the transaction goes through a series of steps and
    ultimately resides in the blockchain. Since blockchain is a peer-to-peer phenomenon,
    if you are dealing with a use case that has a lot of transactions taking place
    every second, you may not want to flood the whole network with all transactions.
    Obviously when an individual or an entity is making a transaction, they just have
    to broadcast it to the whole network. Once that happens, it has to be validated
    by multiple nodes. Upon validation, it has to again get broadcast to the whole
    network for the transaction to get included in the blockchain.


    Now, why not a transaction chain instead of a blockchain? It may make sense to
    some extent if your business case does not involve a lot of transactions. However,
    if there are a huge number of transactions every second, then hashing them at
    transaction level, keeping a trail of it, and broadcasting that to the network
    can make the system unstable. You may want a certain number of transactions to
    be grouped in a block and broadcast that block. Broadcasting individual transactions
    can become a costly affair.


    Another good reason for a blockchain instead of a transaction chain is to prevent
    Sybil Attack. In [Chapter 3](#A440588_1_En_3_Chapter.html), you will learn in
    more detail how the PoW mining algorithm is used and one node is chosen at random
    that could propose a block. If it was not the case, people might create replicas
    of their own node to subvert the system.


    In its most simplified form, the blockchain transactions go through the following
    steps to get into the blockchain:


    - Every new transaction gets broadcast to the network so that all the computing
    nodes are aware of that fact at the time it took place (to ensure the system is
    double-spend resistant).

    - Transactions may get validated by the nodes to accept or reject by checking
    the authenticity.

    - The nodes may then group multiple transactions into blocks to share with the
    other nodes in the network.

    - Here comes the difficult situation. Who would propose the block of transactions
    that they have grouped individually? Broadly speaking, the generation of new blocks
    should be controlled but not in a centralized fashion, and the mechanism should
    be such that every node is given equal priority. Every node agreeing upon a block
    is called the consensus, but there are different algorithms to achieve the same
    objective, depending on your use case. We will discuss different consensus mechanisms
    in the following section.

    - Though there is no notion of a global time due to network latency, packet drops,
    and geographic locations, such a system still works because the blocks are added
    one after another in an order. So, we can consider that the blocks are time stamped
    in the order they arrive and get added in the blockchain.

    - Once the nodes in the network unanimously accept a block, then that block gets
    into the blockchain and it includes the hash of the block that was created right
    before it. So this extends the blockchain by one block.


    We already discussed the blockchain data structure and the Merkle trees, so we
    understand their value now. Recollect that when a node would like to validate
    a transaction, it can do so more efficiently by the Merkle path. The other nodes
    in the network do not have to share the full block of data to justify proof of
    membership of a transaction in a block. Technically speaking, memory efficient
    and computer-friendly data structures such as `"Bloom filters"` are widely used
    in such scenarios to test the membership.


    Also, note that for a node to be able to validate a transaction, it should ideally
    have the whole blockchain data (transactions along with their metadata) locally.
    You should select an efficient storage mechanism that the nodes will adopt based
    on your use case.


    ### Distributed Consensus Mechanisms


    When the nodes are aware of the entire history of transactions by having a local
    copy of the full blockchain data to prevent double-spend, and they can verify
    the authenticity of a transaction through digital signatures, what is the use
    of consensus? Imagine the presence of one or more malicious nodes. Can’t they
    say an invalid transaction is a valid one, or vice versa? Recollect the Byzantine
    Generals’ Problem, which is most likely to occur in many decentralized systems.
    To overcome such issues, we need a proper consensus mechanism in place.


    So far in our discussion, the one thing that is not clear yet is who proposes
    the block. Obviously, not every node should propose a block to the rest of the
    nodes at the same time because it is only going to create a mess; forget about
    the consistent state of the ledger. On the other hand, had it been the case with
    just transactions without grouping them into blocks, you could argue that if every
    transaction gets broadcast to the whole network and every node in the network
    casts a vote on those individual transactions, it would only complicate the system
    and lead to poor performance.


    So, grouping transactions into blocks is important for obvious reasons and consensus
    is required on a block by block basis. The best strategy for this problem is that
    only one block should propose a block at a time and the rest of the nodes should
    validate the transactions in the block and add to their blockchains if transactions
    are valid. We know that every node maintains its own copy of the ledger and there
    is no centralized source to sync from. So, if any one node proposes a block and
    the rest of the nodes agree on it, then all those nodes add that block to their
    respective blockchains. In such a design, you would prefer that there are at least
    a few minutes of gap in block creation and it should not be the case where multiple
    blocks arrive at the same time. Now the question is: who might be that lucky node
    to propose a block? This is the trickiest part and can lead to proper consensus;
    we will discuss this aspect under different consensus mechanisms.


    These consensus mechanisms actually come from game theory. Your system should
    be designed such that the nodes get the most benefit if they play by the rules.
    One of the aspects to ensure the nodes behave honestly is to reward for honest
    behavior and punish for fraudulent activities. However, there is a catch here.
    In a public blockchain such as Bitcoin, one can have many different public identities
    and they are quite anonymous. It gets really difficult to punish such identities
    because they have a choice to avoid that punishment by creating new identities
    for themselves. On the other hand, rewarding them works great, because even if
    someone has multiple identities, they can happily reap the rewards given to them.
    So, it depends on your business case: if the identities are anonymous, then punishing
    them may not work, but may work well if the identities are not anonymous. You
    may want to consider this reward/punish aspect despite having a great mechanism
    to select a node that would propose the next block. This is because you would
    never know in advance if the node selected is a malicious node or an honest one.
    Keep in mind the term `mining` that we may be using quite often, and it would
    mean generating new blocks.


    The goal of consensus is also to ensure that the network is robust enough to sustain
    various types of attacks. Irrespective of the types of consensus algorithms one
    may choose depending on the use case, it has to fall into the Byzantine fault
    tolerant consensus mold to be able to get accepted. Let us now learn some of the
    consensus mechanisms pertaining to the blockchain scenarios that we may be able
    to use in different situations.'
