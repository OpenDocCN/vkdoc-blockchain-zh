    ```


    This contains the address of the node we just started. To connect other nodes
    to this node we will need this address. Let’s keep it noted at some place. The
    following line has the extracted address from the previous log statement.


    ```

    enode://e03b50e9b1b2579904f2bbdff7dd0826bd4e4eb2e225c1d1cb1a765195474d7418f3e8fbfeefd55bd85722973d17626f0e53208c62e38d1099bb583e702b3b48@[::]:30307

    ```


    Note the [::] before the port number we defined in the command. Let’s replace
    this with the local host IP address if we are running the other node on the same
    machine, or else replace it with the external IP address of the machine. As we
    are going to run the other network node on the same machine (for development purposes),
    we will replace it with the localhost IP address. So, the address of the first
    node will finally be


    ```

    enode://e03b50e9b1b2579904f2bbdff7dd0826bd4e4eb2e225c1d1cb1a765195474d7418f3e8fbfeefd55bd85722973d17626f0e53208c62e38d1099bb583e702b3b48@127.0.0.1:30307

    ```'
  trans: '

    ### 运行私有网络的第一个节点


    要运行私有区块链的第一个节点，我们首先复制上一步中的 JSON 内容，并将其保存为名为 `genesis.json` 的文件。为简单起见，我们将该文件保存在与
    `geth` 数据目录相同的目录中。


    首先，我们需要使用 `genesis.json` 初始化 `geth`。这一初始化步骤是为我们的私有网络设置自定义创世配置所必需的。


    切换到保存 `genesis.json` 文件的目录：


    ```

    cd mygeth

    ```


    以下命令将使用我们定义的自定义配置初始化 `geth`：


    ```

    sudo geth --datadir "/mygeth" init genesis.json

    ```


    `geth` 将确认自定义创世配置设置完成，并输出如下截图所示的内容（图 6-2）。


    ![A440588_1_En_6_Fig2_HTML.jpg](img/A440588_1_En_6_Fig2_HTML.jpg)


    图 6-2


    使用 `genesis.json` 中的配置初始化 `geth`


    接下来，我们需要使用以下命令和参数运行 `geth`。我们将逐一详细解释这些参数。


    ```

    sudo geth --datadir "/mygeth" --networkid 8956 --ipcdisable --port 30307 --rpc
    --rpcapi "eth,web3,personal,net,miner,admin,debug" --rpcport 8507 --mine --minerthreads=1
    --etherbase=0xbaf735f889d603f0ec6b1030c91d9033e60525c3

    ```


    让我们看看传递给 `geth` 命令的每个参数。


    -   `datadir`：用于指定数据目录，与之前的步骤相同。

    -   `networkid`：这是网络的标识符，用于将我们的私有网络与其他以太坊网络区分开来。它与我们在 `genesis.json` 文件中定义的 `chainId`
    类似，但为网络之间提供了另一层区分。可以看到，我们为此值使用了另一个自定义编号。

    -   `ipcdisable`：使用此参数，我们禁用了 `geth` 的进程间通信端口，这样在同一台本地机器上运行多个 `geth` 实例（节点）时，就不会遇到冲突问题。

    -   `port`：我们为与 `geth` 交互的端口选择了一个自定义值。

    -   `rpc`、`--rpcapi`、`--rpcport`：这三个参数定义了 `geth` 公开的 RPC API 的配置。我们希望启用它；我们希望通过
    RPC 公开 `eth`、`web3`、`personal`、`net`、`miner`、`admin`、`debug` 这些 geth API；并且我们希望它在自定义端口
    `8507` 上运行。

    -   `mine`、`minerthreads`、`etherbase`：通过这三个参数，我们指示 `geth` 将该节点作为矿工节点启动，将矿工进程线程数限制为一个（以避免消耗大量
    CPU 资源），并将挖矿奖励发送到我们在第一步中创建的以太坊账户。


    这就是目前运行第一个私有网络 `geth` 节点所需的全部配置。


    当我们使用所有参数运行此命令时，`geth` 将给出如下输出（如图 6-3 所示）。


    ![A440588_1_En_6_Fig3_HTML.jpg](img/A440588_1_En_6_Fig3_HTML.jpg)


    图 6-3


    `geth` 运行第一个节点


    注意输出中的 UDP 监听器启动日志语句。


    ```

    INFO [02-11|18:00:57] UDP listener upself=enode://e03b50e9b1b2579904f2bbdff7dd0826bd4e4eb2e225c1d1cb1a765195474d7418f3e8fbfeefd55bd85722973d17626f0e53208c62e38d1099bb583e702b3b48@[::]:30307

    ```


    这包含我们刚启动的节点的地址。要将其他节点连接到此节点，我们需要此地址。请将其记在某个地方。以下行是从上一条日志语句中提取的地址。


    ```

    enode://e03b50e9b1b2579904f2bbdff7dd0826bd4e4eb2e225c1d1cb1a765195474d7418f3e8fbfeefd55bd85722973d17626f0e53208c62e38d1099bb583e702b3b48@[::]:30307

    ```


    注意我们在命令中定义的端口号前的 `[::]`。如果我们在同一台机器上运行另一个节点，请将其替换为本地主机 IP 地址，否则替换为机器的外部 IP 地址。由于我们将在同一台机器上（出于开发目的）运行另一个网络节点，我们将用本地主机
    IP 地址替换它。因此，第一个节点的最终地址将是


    ```

    enode://e03b50e9b1b2579904f2bbdff7dd0826bd4e4eb2e225c1d1cb1a765195474d7418f3e8fbfeefd55bd85722973d17626f0e53208c62e38d1099bb583e702b3b48@127.0.0.1:30307

    ```

