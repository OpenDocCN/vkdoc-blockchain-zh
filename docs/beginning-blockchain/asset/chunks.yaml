    # 1. 区块链简介


    区块链是一股新的颠覆性浪潮，它已开始重塑商业、社交和政治互动，以及任何其他形式的价值交换。同样，这不仅是变革，更是一场正在快速演进的现实。截至撰写本文时，已有超过
    40 家顶级金融机构以及众多跨行业企业开始探索区块链，以降低交易成本、加快交易速度、减少欺诈风险，并消除中间人或中介服务。一些机构正试图重新构想传统系统和服务，将其提升至新水平，同时推出新型服务产品。


    本书将详细探讨区块链。如果你是区块链新手，可按章节顺序阅读；也可以仅挑选与你相关的章节。本章将解释区块链的含义、其演变过程，以及结合一些用途和案例，阐述其在当今世界的重要性。它将为你提供一个由外而内的视角，助你更深入地探究区块链。


    ## 区块链的前世今生


    最早为互联网奠定基础的数字化颠覆之一，是 20 世纪 70 年代的 TCP/IP（传输控制协议/网际协议）。在 TCP/IP 之前，是电路交换的时代，通信双方需要建立专用连接。TCP/IP
    则采用了更开放、点对点的分组交换设计，无需预先建立专用线路。


    20 世纪 90 年代初，互联网通过万维网向公众开放时，本应更加开放和点对点。这是因为其建立在开放且去中心化的 TCP/IP 之上。任何新技术，尤其是革命性技术，面世时要么自行消亡，要么产生巨大影响并成为公认标准。人们适应了万维网革命，并以各种可能的方式利用其优势。结果，万维网的发展方式可能并未完全符合其最初构想。它本可以更开放、更易接入、更具点对点特性。许多新技术和企业在此基础上发展，最终形成了今天的局面——更加中心化。人们逐渐习惯了技术所提供的一切。即使一笔国际交易需要数天才能结算，或成本过高，或可靠性不足，人们也习以为常。


    让我们更仔细地审视银行系统及其演变。从古老的以物易物时代到法定货币，交易与结算并无本质区别，因为它们并非两个独立实体。例如，如果爱丽丝需要付给鲍勃 10 美元，她只需将一张
    10 美元钞票交给鲍勃，交易即可当场结清。无需银行从爱丽丝账户扣款 10 美元并存入鲍勃账户，也无需银行作为信任系统来确保爱丽丝不欺骗鲍勃。然而，与不在身边的人直接交易却很困难。因此，银行系统不断发展，提供了更多服务，使交易能够覆盖全球各个角落。借助互联网，地理不再成为限制，银行业务比以往任何时候都更加便捷。不仅是银行业务，互联网还促进了网络上的各种价值交换。


    技术使印度人能够与英国人进行货币交易，但需要付出成本。此类交易需要数天才能结算，而且费用高昂。此类多方交易始终需要银行来建立信任并确保安全。如果技术本身能在没有这些中介和中心化系统的情况下实现信任与安全，那会怎样？不知何故，技术建立信任的这一部分始终缺失，导致银行、托管服务、清算所、登记机构等中心化系统应运而生。区块链正是互联网革命拼图中缺失的那一块，它以密码学安全的方式实现了去信任（trustless）系统。


    中本聪——世人皆知这个化名——或许认为，自 20 世纪 80 年代以来，货币系统就未曾受到技术革命的触动。银行作为中心化机构，维护交易记录、管理互动、强制信任与安全，并规范整个系统。整个商业依赖于这些金融机构，它们作为可信第三方处理支付。金融中介增加了交易结算的成本和时间，也限制了交易规模。中介是解决争端所需，但这意味着完全不可逆的交易永远无法实现。这导致人们交易时需要信任他人。显然，这种官僚体制必须改变，以跟上经济预期的数字化转型。因此，中本聪发明了一种名为比特币的加密货币，其背后支撑技术正是区块链。比特币只是区块链在货币领域的一个应用案例，它解决了基于信任的模型固有的弱点。本书将深入探讨比特币和区块链的基本原理。

    '
- fmt: '# What is Blockchain?


    The Internet has revolutionized many aspects of life, society, and business. However,
    we learned in the previous section that how people and organizations execute transactions
    with one another has not changed much in the past couple of decades. Blockchain
    is believed to be the component that completes the Internet puzzle and makes it
    more open, more accessible, and more reliable.


    To understand blockchain, you have to understand it from both a business perspective
    and technical perspective. Let us first understand it in a business transaction
    context to get the “what” of it, and then look into the technicality to understand
    the “how” of it in the following chapters.


    Blockchain is a system of records to transact value (not just money!) in a peer-to-peer
    fashion. What it means is that there is no need for a trusted intermediary such
    as banks, brokers, or other escrow services to serve as a trusted third party.
    For example, if Alice pays to Bob $10, why would it go through a bank? Take a
    look at Figure [1-1](#A440588_1_En_1_Chapter.html#Fig1).


    ![A440588_1_En_1_Fig1_HTML.jpg](A440588_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Transaction through an intermediary vs. peer-to-peer transaction


    Let us look at a different example now. A typical stock transaction happens in
    seconds, but its settlement takes weeks. Is it desirable in this digital age?
    Certainly not! Figure [1-2](#A440588_1_En_1_Chapter.html#Fig2) demonstrates the
    current situation.


    ![A440588_1_En_1_Fig2_HTML.jpg](A440588_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Stocks trading through an intermediary clearing house


    If someone wants to buy some stocks from a company or a person, they can just
    directly buy it from them with instant settlement, with no need for brokers, clearing
    houses, or other financial institutions in between. A decentralized and peer-to-peer
    solution to such a situation can be represented as in Figure [1-3](#A440588_1_En_1_Chapter.html#Fig3).


    ![A440588_1_En_1_Fig3_HTML.jpg](A440588_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Peer-to-peer stock trading


    Please note that transaction and settlement are not two different entities in
    a blockchain setting! The transactions are analogous to, say, fiat currency transactions
    where if someone pays another a $10 note, they do not own it anymore and that
    $10 note is physically transferred to the new owner.


    Now that you understand blockchain from a functional perspective, at a high level,
    let us look into it a little technically, and the reason for naming it “blockchain”
    becomes clearer. We will see “What” it is technically and leave the “How” it works
    to Chapter [2](#A440588_1_En_2_Chapter.html).


    Read the following statements and do not worry if the concepts do not fit together
    well for your complete understanding. You may want to revisit it, but be patient
    till you finish reading this book.


    - Blockchain is a peer-to-peer system of transacting values with no trusted third
    parties in between.

    - It is a shared, decentralized, and open ledger of transactions. This ledger
    database is replicated across a large number of nodes.

    - This ledger database is an append-only database and cannot be changed or altered.
    It means that every entry is a permanent entry. Any new entry on it gets reflected
    on all copies of the databases hosted on different nodes.

    - There is no need for trusted third parties to serve as intermediaries to verify,
    secure, and settle the transactions.

    - It is another layer on top of the Internet and can coexist with other Internet
    technologies.

    - Just the way TCP/IP was designed to achieve an open system, blockchain technology
    was designed to enable true decentralization. In an effort to do so, the creators
    of Bitcoin open-sourced it so it could inspire many decentralized applications.


    A typical blockchain may look as shown in Figure [1-4](#A440588_1_En_1_Chapter.html#Fig4).


    ![A440588_1_En_1_Fig4_HTML.jpg](A440588_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    The blockchain data structure


    Every node on the blockchain network has an identical copy of the blockchain shown
    in Figure [1-4](#A440588_1_En_1_Chapter.html#Fig4), where every block is a collection
    of transactions, hence the name. As you can see, there are two major parts in
    every block. The “header” part links back to the previous block in the chain.
    What it means is that every block header contains the hash of the previous block
    so that no one can alter any transaction in the previous block. We will look into
    further details of this concept in the following chapters. The other part of a
    block is the “body content” that has a validated list of transactions, their amounts,
    the addresses of the parties involved, and some more details. So, given the latest
    block, it is feasible to access all the previous blocks in a blockchain.


    Let us consider a practical example and see how the transactions take place and
    the ledger gets updated across the network, to see how this system works:


    Assume that there are three candidates—Alice, Bob, and Charlie—who are doing some
    monetary transactions among each other on a blockchain network. Let us go through
    the transactions step by step to understand blockchain’s open and decentralized
    features.


    ## Step-1:


    Let us assume that Alice had $50 with her, which is the genesis of all transactions
    and every node is aware of it, as shown in Figure [1-5](#A440588_1_En_1_Chapter.html#Fig5).


    ![A440588_1_En_1_Fig5_HTML.jpg](A440588_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    The genesis block


    ## Step-2:


    Alice makes a transaction by paying $20 to Bob. Observe how the blockchain gets
    updated at each node, as shown in Figure [1-6](#A440588_1_En_1_Chapter.html#Fig6).


    ![A440588_1_En_1_Fig6_HTML.jpg](A440588_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    The first transaction


    ## Step-3:


    Bob makes another transaction by paying $10 to Charlie and the blockchain gets
    updated as shown in Figure [1-7](#A440588_1_En_1_Chapter.html#Fig7).


    ![A440588_1_En_1_Fig7_HTML.jpg](A440588_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    The second transaction


    Please note that the transaction data in the blocks is immutable. All transactions
    are fully irreversible. Any change would result in a new transaction, which would
    get validated by all contributing nodes. Every node has its own copy of blockchain.


    If there are many questions popping up in your mind, such as “What if Alice pays
    the same amount to Dave to double-spend the same amount, or what if she is making
    a payment without having enough funds in her account?,” “How is the security ensured?,”
    and so on, that is wonderful! We are going to cover those details in the following
    chapters.'
