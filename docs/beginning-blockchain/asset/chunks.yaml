- fmt: "## Public vs. Private Blockchains\n\nBased on access control, blockchains\
    \ can be classified as public and private. Public blockchains are also called\
    \ permissionless blockchain and private blockchains are also called permissioned\
    \ blockchains. The primary difference between the two is access control. Public\
    \ or permissionless blockchains do not restrict addition of new nodes to the network\
    \ and anyone can join the network. Private blockchains have a limited number of\
    \ nodes in the network and not everyone can join the network. Examples of public\
    \ blockchains are Bitcoin and Ethereum main nets. An example of a private blockchain\
    \ can be a network of a few Ethereum nodes connected to each other but not connected\
    \ to the main net. These nodes would be collectively called a private blockchain.\n\
    \nPrivate blockchains are generally used by enterprises to exchange data among\
    \ themselves and their partners and/or among their suborganizations.\n\nWhen we\
    \ develop applications for blockchains, the type of blockchain, public or private,\
    \ makes a difference because the rules of interaction with the blockchain may\
    \ or may not be the same. This is called blockchain governance. The public blockchains\
    \ have a predefined set of rules and the private ones can have a different set\
    \ of rules per blockchain. A private blockchain for a supply chain may have different\
    \ governance rules, while a private blockchain for protocol governance may have\
    \ different rules. For example, the token, gas Price, transaction fee, endpoints,\
    \ etc. may or may not be the same in the aforementioned private Ethereum ledger\
    \ and the Ethereum main net. This can impact our applications too.\n\nIn our code\
    \ samples, we primarily focused on the public test networks of Bitcoin and Ethereum.\
    \ While the basic concepts of interacting with private deployments of these blockchains\
    \ will still be the same, there will be differences in how we configure our code\
    \ to point to the private networks.\n\n## Decentralized Application Architecture\n\
    \nIn general, the decentralized applications are meant to directly interact with\
    \ the blockchain nodes without the need for any centralized components coming\
    \ into picture. However, in practical scenarios, with legacy systems integrations\
    \ and limited functionality and scaling of the current blockchain networks, sometimes\
    \ we must make choices between full decentralization and scalability while designing\
    \ our DApps.\n\n### Public Nodes vs. Self-Hosted Nodes\n\nBlockchains are decentralized\
    \ networks of nodes. All nodes have the same copy of data and they agree on the\
    \ state of data always. When we develop applications for blockchains, we can make\
    \ our application talk to any of the nodes of the target network. There can be\
    \ mainly two set-ups for this:\n\n*   Application and node both run locally: The\
    \ application and the node both run on the local machine. This means we will need\
    \ our application users to run a local blockchain node and point the application\
    \ to connect with it. This model would be a purely decentralized model of running\
    \ an application. An example of this model is the Ethereum-based Mist browser,\
    \ which uses a local `geth` node. Figure [5-6](#A440588_1_En_5_Chapter.html#Fig6)\
    \ shows this setup.\n\n    ![A440588_1_En_5_Fig6_HTML.jpg](A440588_1_En_5_Fig6_HTML.jpg)\n\
    \n    Figure 5-6\n\n    DApp connects to local node\n*   Public node: The application\
    \ talks to a public node hosted by a third party. This way our users don’t have\
    \ to host a local node. There are several advantages and disadvantages of this\
    \ approach. While the users don’t have to pay for power and storage for running\
    \ a local node, they need to trust a third party to broadcast their transactions\
    \ to the blockchain. The Ethereum browser plugin `metamask` uses this model and\
    \ connects with public hosted Ethereum nodes. Figure [5-7](#A440588_1_En_5_Chapter.html#Fig7)\
    \ shows this setup.\n\n    ![A440588_1_En_5_Fig7_HTML.jpg](A440588_1_En_5_Fig7_HTML.jpg)\n\
    \n    Figure 5-7\n\n    DApp connects to public node\n\n### Decentralized Applications\
    \ and Servers\n\nApart from the previously mentioned scenarios, there can be other\
    \ setups too, depending upon specific use cases and requirements. There are a\
    \ lot of scenarios when a server is needed between an app and the blockchain.\
    \ For example: When you need to maintain a cache of the blockchain state for faster\
    \ queries; when the app needs to send notifications (emails, push, SMS, etc.)\
    \ to the users based on state updates on the blockchain; and when multiple ledgers\
    \ are involved, and you need to run a back-end logic to transform data between\
    \ the ledgers. Imagine the infrastructure being used by some of the big cryptocurrency\
    \ exchanges where we get all the services like two-factor authentication, notifications,\
    \ and payment gateways, among other things, and none of these services are available\
    \ directly in any of the blockchains. In a broader sense, blockchains simply make\
    \ sure of keeping the data layer tamper resistant and auditable.\n\n## Summary\n\
    \nIn this chapter we learned about decentralized application development along\
    \ with some code exercises about interacting programmatically with the Bitcoin\
    \ and Ethereum blockchains. We also looked at some of the DApp architecture models\
    \ and how they differ based on the use cases.\n\nIn the next chapter we will set\
    \ up a private Ethereum network and then we will develop a full-fledged DApp interacting\
    \ with this private network, which will also use smart contracts for business\
    \ logic.\n\n# 6. Building an Ethereum DApp\n\nIn the previous chapter we learned\
    \ how to programmatically interact with Bitcoin and Ethereum blockchains using\
    \ JavaScript. We also touched on how to create and deploy Ethereum smart contracts.\
    \ In this chapter we will take our blockchain application programming to the next\
    \ level by learning how to develop and deploy a DApp based on the Ethereum blockchain.\
    \ As part of creating this DApp, we will be setting up a private Ethereum network\
    \ and then we will use this network as the underlying blockchain for our DApp.\
    \ This DApp will have its business logic in an Ethereum smart contract, and this\
    \ logic will be executed using a web application connecting to private Ethereum\
    \ network. This way, we intend to cover all aspects of Ethereum application development\
    \ — from setting up nodes and networks, to creating and deploying a smart contract,\
    \ to executing smart contract functions using client applications."
