  trans: '

    # 防伪造


    由于交易公开，去中心化方案容易遭受各种攻击。最明显的当属伪造企图，尤其是在涉及任何有价值交易时。密码学哈希和数字签名可用于确保系统具有防伪造能力。我们已经了解到，在计算上伪造他人签名是不可行的。如果你发起一笔交易并对其哈希值进行签名，那么之后任何人都无法篡改交易内容，并声称你签署的是另一笔交易。同样，你之后也无法声称从未做过这笔交易，因为签名者就是你本人。


    # 民主性


    任何点对点去中心化系统在设计上都应当具备民主性（对于私有区块链可能不完全适用，这一点我们稍后再讨论）。系统中不应存在任何比其它节点更强大的实体。每一位参与者在任何情况下都应享有平等权利，决策需在多数节点达成共识时做出。


    # 防双花


    双花攻击在货币及非货币交易中都相当常见。在加密货币环境中，双花是指试图将相同金额支付给多人。例如：你账户中有 100 美元，却向两个或更多方各支付 90 美元，这就是一种双花行为。对于比特币这类没有“期末余额”概念的加密货币来说，情况略有不同。交易的输入（即你向某人付款时）是另一笔交易的输出，在该交易中你收到的金额至少等于你本次支付的金额。假设鲍勃之前从爱丽丝那里收到了
    10 美元。如果今天鲍勃想向查理支付 8 美元，那么他从爱丽丝处收到 10 美元的那笔交易将成为与查理交易的输入。因此，鲍勃不能多次使用同一笔输入（爱丽丝支付给他的
    10 美元）向其他人付款，从而实施双花。再举一个不同的例子：某人拥有一块土地，却将同一块土地卖给了两个人。


    在中心化系统中，防止双花相当容易，因为中心机构知晓所有交易。区块链解决方案也应当能够抵御此类双花攻击。虽然密码学能确保交易的真实性，但无法帮助防止双花。因为从技术上讲，正常交易和双花交易都是真实的。因此，防止双花的唯一可能途径是知晓所有交易。如果我们了解过去发生的所有交易，就能判断一笔交易是否属于双花尝试。因此，验证交易的节点必须能够访问自创世块以来的完整区块链数据。


    # 账本状态一致性


    我们刚刚讨论的各项性质在一定程度上确保了账本的整体一致性。设想一种情况：某些节点故意希望阻止某笔交易，使其被拒绝。或者，如果某些节点因故与账本不同步，导致不知道其离线期间发生的几笔交易，那么对这些节点而言，某笔交易可能看起来像是欺诈。那么，如何确保参与者之间达成共识，这是一个需要非常谨慎处理的问题。请回想一下“拜占庭将军问题”。针对特定情况选择合适的共识机制，对于确保去中心化方案的稳定性起着最重要的作用。我们将在本书后面学习不同的共识机制。


    # 弹性


    网络应具备足够的弹性，以承受临时节点故障、某些计算节点偶尔不可用、网络延迟和数据包丢失等情况。


    # 可审计性


    区块链是一条通过哈希值链接而成的区块链条。由于交易区块一直链接回创世块，可审计性已经存在，我们必须确保这一点无论如何都不会被破坏。此外，如果某人想验证过去是否发生过某笔交易，那么这种验证应该能够快速完成。

