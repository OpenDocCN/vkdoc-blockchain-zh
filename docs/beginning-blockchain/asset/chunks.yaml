    # 区块链数据结构与默克尔树的结合


    现在，考虑区块链数据结构和默克尔树的混合体如何？想象区块链中每个区块包含大量交易的情况。由于这是区块链，前一个区块的哈希已经存在；现在，将区块中所有交易的默克尔根包含进来，有助于更快地验证交易。如果我们需要验证声称来自（例如）区块`22456`的一笔交易，我们可以获取该区块的交易，验证默克尔树，并快速确认该交易是否有效。我们已经看到，使用默克尔树验证交易非常容易且快速。尽管区块链中的区块具有防篡改特性，几乎不允许对区块内容进行任何修改，但默克尔树也确保了交易的顺序得以保留。


    在典型的区块链环境中，可能存在许多情况，其中一个节点（为简单起见，假设任何没有完整区块链数据的节点，即轻节点）需要验证过去是否发生了某笔交易。实际上，这里需要验证两件事：交易作为区块的一部分，以及区块作为区块链的一部分。为此，节点不必下载区块中的所有交易，只需向网络请求与区块哈希和交易哈希相关的信息即可。网络中拥有相关信息的对等节点可以用该交易的默克尔路径来响应。你可能会问，如何信任网络中未知对等节点与你共享的数据？你已经知道哈希函数是单向的。因此，恶意节点绝无可能伪造出与给定哈希值匹配的交易；从交易级别到默克尔根级别，这甚至更加困难。


    默克尔树的使用不仅限于区块链：它们还广泛应用于其他许多应用程序，例如`BitTorrent`、`Cassandra`（一个`NoSQL`数据库）、`Apache
    Wave`等。


    ## 默克尔树的示例代码片段


    本节旨在让你初步了解如何编写最基本的默克尔树代码。代码示例使用`Python`，但其他语言中也相当类似；你只需要找到正确的库函数即可。


    ```

    # -*- coding: utf-8 -*-

    from hashlib import sha256

    class MerkelTree(object):

    def __init__(self):

    pass

    def chunks(self,transaction,n):

    #This function yeilds "n" number of transaction at time

    for i in range (0, len(transaction),number):

    yield transaction[i:i+2]

    def merkel_tree(self,transactions):

    #Here we will find the merkel tree hash of all transactions passed to this fuction

    #Problem is solved using recursion techqiue

    # Given a list of transactions, we concatinate the hashes in groups of two and
    compute

    # the hash of the group, then keep the hash of group. We repeat this step till

    # we reach a single hash

    sub_tree=[]

    for i in chunks(transactions,2):

    if len(i)==2:

    hash = sha256(str(i[0]+i[1])).hexdigest()

    else:

    hash = sha256(str(i[0]+i[0])).hexdigest()

    sub_tree.append(hash)

    # When the sub_tree has only one hash then we reached our merkel tree hash.

    #Otherwise, we call this fuction recursively

    if len(sub_tree) == 1:

    return sub_tree[0]

    else:

    return self.merkel_tree(sub_tree)

    if __name__==''__main__'':

    mk=MerkelTree()

    merkel_hash= mk.merkel_tree(["TX1","TX2","TX3","TX4","TX5","TX6"])

    print merkel_hash

    ```


    ## 综合应用


    到本节为止，我们已经涵盖了帮助理解区块链真正工作原理的所有必要组件。通过研究密码学、博弈论和计算机科学工程概念，我们应该已经对区块链如何运作有了概念。尽管这些概念已经存在了很长时间，但没有人能想象到这些古老的知识如何被用来构建像区块链这样变革性的技术。让我们快速回顾一下目前涵盖的一些基础知识，我们将在这些概念的基础上进一步构建理解。以下是它们：


    - 加密函数是单向的，不可逆。它们是确定性的，对于给定输入产生相同输出。对输入的任何更改都会在再次哈希时产生完全不同的输出。

    - 使用公钥密码学，可以实现数字签名。它有助于验证签名者/实体的真实性。考虑到私钥是保密的，伪造他人身份的签名是不可行的。此外，如果某人对任何文档或交易进行了签名，他们之后不能否认。

    - 使用博弈论原则和最佳实践，可以设计出在大多数异常情况下都能维持的健壮系统。需要妥善处理能够面对拜占庭将军问题的系统。我们对任何系统设计的方法都应当使参与者通过遵守规则获得最大收益；偏离协议不应使他们真正受益。

    - 区块链数据结构通过使用加密哈希，提供了一条防篡改的区块链。默克尔树的使用使交易验证变得更容易、更快速。


    牢记所有这些概念，现在让我们思考一个真实的区块链实现。要使这样一个去中心化系统正常运行，你认为需要解决哪些问题？嗯，有很多问题；有些问题对大多数区块链用例来说是通用的，有些则是特定的。让我们至少讨论一些需要解决的场景：


    - 谁来维护分布式交易账本？是所有参与者都维护，还是只有少数人维护？对于那些计算能力不足以处理交易或没有足够存储空间容纳整个交易历史的计算节点怎么办？

    - 如何维持分布式账本的单一一致状态？网络延迟、数据包丢失、故意黑客攻击等是不可避免的。系统如何应对所有这些情况？

    - 谁来验证或无效交易？是只有少数授权节点验证，还是所有节点共同达成共识？如果某些节点在特定时间不可用怎么办？

    - 如果某些计算节点故意想要破坏系统或试图拒绝某些交易怎么办？

    - 当没有中心化实体负责时，如何升级系统？在去中心化网络中，如果一些计算节点升级了自己而其他节点没有，该怎么办？


    实际上，除了刚才提到的这些问题之外，还有更多需要解决的问题。现在我们让你带着这些思考，但大多数疑问应该会在本章结束前得到澄清。


    让我们从设计任何去中心化解决方案可能需要的区块链系统的一些基本构建块开始。


    ### 区块链解决方案的属性


    到目前为止，我们只学习了区块链解决方案的技术方面，以了解区块链如何工作。在本节中，我们将学习区块链的一些期望属性。


    #### 不可变性


    这是维护区块链交易原子性的最期望属性。一旦交易被记录，就不能被更改。如果交易被广播到网络，那么几乎每个人都有一份副本。随着时间的推移，越来越多的区块被添加到区块链中，不可变性增加，经过一定时间后，它变得完全不可变。对于某人来说，篡改一系列这么多区块的数据实际上是不可行的，因为它们受到密码学保护。因此，任何被记录的交易都将永远存在于系统中。

