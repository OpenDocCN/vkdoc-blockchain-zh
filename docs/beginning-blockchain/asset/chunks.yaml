    *   它是确定性的，这意味着相同的输入提供给相同的哈希函数，每次都产生相同的哈希值。

    *   除了尝试所有可能的消息外，从哈希值反向推导并生成消息是不可行的（尽管并非不可能！）。

    *   消息中的任何微小变化都应该极大地影响输出哈希值，这样就没有人能够在小变化后将新的哈希值与旧的哈希值关联起来。


    除了上述核心属性外，它们还应满足以下安全属性，才能被视为密码学协议：


    *   抗碰撞性：这意味着找到两个不同的输入（例如 X 和 Y）使它们哈希到相同值是不可行的。


    ![A440588_1_En_2_Figf_HTML.jpg](img/A440588_1_En_2_Figf_HTML.jpg)

