  trans: '

    ### RLP 编码


    你一定已经注意到我们在前面的章节中提到了 RLP 编码。在本节中，我们将简要介绍它的概念。RLP 是递归长度前缀（Recursive Length Prefix）的缩写。这是一种在以太坊中用于区块、交易以及在线传输数据时的线协议消息的序列化方法，同时也用于在帕特里夏树中保存账户状态数据。通常，当复杂的数据结构需要存储或传输，并在接收端重新构建以进行处理时，对象序列化是一种良好的实践。从这个意义上说，RLP
    类似于 JSON 和 XML，但 RLP 被认为更加精简、节省空间、易于实现，并且能保证绝对的字节级完美一致性。这就是为什么 RLP 被选为以太坊主要序列化技术的原因。它的唯一目的是存储原始字节的嵌套数组。它也不试图定义任何特定的数据类型，例如布尔值、浮点数、双精度浮点数、整数等，并且仅设计用于以嵌套数组的形式存储结构。RLP
    并不显式支持键/值映射。因此，建议将此类映射表示为 `[[k1, v1], [k2, v2], …]`，其中 `k1`、`k2`……按字典序排列（使用标准的字符串排序方式）。或者，也可以使用更高级别的[帕特里夏树](https://github.com/ethereum/wiki/wiki/Patricia-Tree)编码，该编码具有固有的
    RLP 编码方案。


    请记住，RLP 仅用于编码数据的结构，并且完全不了解被编码对象的类型。虽然它有助于减小原始字节编码数组的大小，但解码端必须知道它试图解码的对象类型。


    ### 以太坊交易与消息结构


    在上一节中，我们了解了区块结构以及区块头中的不同字段。为了使交易能够被矿工或以太坊节点验证，它必须具有标准化的结构。一个典型的以太坊交易（例如，通过本书后面将介绍的
    `sendRawTransaction()` 传入的交易）包含以下字段：


    * `nonce`：一个整数，只是一个计数器，等于发送方账户发送的交易数量，即交易序列号。

    * `gasPrice`：你愿意为每单位 gas 支付的 Wei 数量。

    * `gasLimit`：执行此交易时应使用的最大 gas 量，这也限制了交易执行允许的最大计算步数。

    * `To`：接收方的 160 位地址或合约地址。对于用于创建合约的交易（这意味着合约地址尚不存在），此字段保持为空。

    * `Value`：交易发送方要转移到接收方的总以太币（Wei 数量）。

    * `V`、`r`、`s`：与交易的 ECDSA 签名相对应的值；也表示此交易的发送方。

    * `init`：这实际上不是可选字段，仅用于创建合约的交易。此字段可以包含一个不限大小的字节数组，指定用于账户初始化过程的 EVM 代码。`init` 操作码仅用于初始化新的合约账户，之后就会被丢弃。它在将账户代码与合约账户关联后返回账户代码的主体。请记住，这种关联是永久性的，并且永远不会改变。

    * `Data`：一个可选字段，可以包含要发送给合约或简单账户的消息。默认情况下，它本身没有特殊功能，但 EVM 有一个操作码——合约可以使用该操作码访问此数据字段，执行必要的计算并将其存储在存储中。


    请注意，上述字段按指定顺序提供，并且除了字段名称外，全部都是 RLP 编码的。因此，以太坊交易实际上是一个包含了这些字段的已签名数据包。`gasPrice`
    和 `gasLimit` 字段对于防止拒绝服务攻击非常重要。为了防止代码中出现意外或故意的无限循环或其他计算浪费，每笔交易都需要设置一个限制，规定其可以使用的代码执行计算步数。


    以太坊交易实际上是“状态转换函数”，因为一笔成功的交易会改变状态。此外，正如我们之前在“账户状态”部分中了解到的，这些交易的结果可以被存储。


    另一方面，以太坊消息类似于交易，但仅由合约账户触发，而不是由外部拥有账户触发。此外，消息仅用于合约账户之间，因此它们也被称为“内部交易”。所以，合约能够向其他合约发送消息。


    通常，当合约在执行其代码时遇到 `CALL` 或 `DELEGATECALL` 操作码时，就会产生一条消息。因此，消息更像是存在于以太坊执行环境中的函数调用。还需要注意的一点是，消息始终是原始的，永远不会被序列化或反序列化。一条消息包含以下字段：


    * `Sender`：作为隐式选项的消息发送方。

    * `Recipient`：要发送到的接收方合约地址。

    * `Value`：随消息一起转移到合约地址的 Wei 数量。

    * `Data`：可选字段，但可以包含发送方提供的、供接收方合约使用的输入数据。

    * `gasLimit`：限制消息触发时，代码执行可以消耗的最大 gas 量的值。它也被称为“startGas”。

    '
- fmt: "我们研究了交易和消息。以太坊交易可以是从外部拥有账户（EOA）到外部拥有账户（EOA），或者从外部拥有账户（EOA）到合约账户。还存在另一种情况，即从外部拥有账户（EOA）发起的交易是为了创建合约账户（回想一下我们刚刚介绍的“`init`”字段）。现在，思考一下交易到底是什么？它无疑是外部世界与以太坊区块链之间的桥梁，但除此之外呢？如果你放大一笔交易，你会看到它是一条由外部拥有账户（EOA）签名发起的指令，该指令被序列化并提交至区块链。请参见图[4-7](#A440588_1_En_4_Chapter.html#Fig7)。\n\
    \n![A440588_1_En_4_Fig7_HTML.jpg](A440588_1_En_4_Fig7_HTML.jpg)\n\n图 4-7\n\n交易发起——放大视图\n\
    \n交易被注入区块链后会发生什么？如果它被验证有效，就会在每个以太坊节点上开始执行。在此交易执行过程中，以太坊被设计为跟踪“子状态”以追踪执行流程。这是因为，如果交易因“`gas`耗尽”而未能完成，则必须回滚到目前为止的整个执行过程。此外，执行过程中收集的信息在交易完成后也立即需要。因此，子状态包含以下内容：\n\
    \n- **自毁集合**：一组在交易完成后将被丢弃的账户（如果有的话）\n- **日志系列**：归档且可索引的EVM代码执行“检查点”，用于追踪合约调用\n\
    - **退款余额**：交易执行后应退还给发送者账户的金额。以太坊中的存储相当昂贵，因此EVM中有一条`SSTORE`指令被用作退款计数器。退款计数器从零开始（无退款状态），每当交易或合约从存储中删除某些内容时，它就会递增。请注意，此退款金额与退还给发送者的未使用的`gas`不同，且是额外支付的。\n\
    \n在以太坊的早期版本中，无论交易或合约是成功执行还是中途失败，所有已使用的`gas`都会被消耗。这有时并不合理。如果执行因某些授权/权限问题或其他问题而停止，执行会停止，但剩余的`gas`仍然会被消耗。最近的拜占庭升级引入了类似异常处理的“`revert`”代码。如果合约需要停止，可以使用“`revert`”来回滚状态更改，返回失败原因，并将剩余`gas`记回发送者账户。交易或合约成功执行后，会发生状态转换，我们将在后续章节中深入探讨。\n\
    \n就像我们查看`blockchaininfo`来了解实时比特币交易一样，如果你查看以太坊的网站（`https://etherscan.io`），将会找到以下信息：\n\
    \n![A440588_1_En_4_Figa_HTML.jpg](A440588_1_En_4_Figa_HTML.jpg)\n\n### 以太坊状态转换函数\n\
    \n在上一节中，我们了解了以太坊交易和消息。我们现在知道，每当交易成功完成时，就会发生状态转换。因此，以太坊中的状态转换函数是：\n\n```\nAPPLY(S,Tx)\
    \ -> S'    \\\\where S is old state and S' is the new state\n```\n\n请参见图[4-8](#A440588_1_En_4_Chapter.html#Fig8)。\n\
    \n![A440588_1_En_4_Fig8_HTML.jpg](A440588_1_En_4_Fig8_HTML.jpg)\n\n图 4-8\n\n以太坊状态转换函数\n\
    \n因此，当`Tx`应用于状态`S`以产生改变的状态`S'`时，状态转换函数可以定义如下：\n\n- 验证交易是否格式正确。\n    - 具有正确数量的值。\n\
    \    - 签名有效。\n    - `nonce`与发送者账户中的`nonce`匹配。如果上述任何一点无效，则返回错误。\n- 计算费用并结算账户。\n\
    \    - 将交易费用计算为`gasLimit * gasPrice`。\n    - 从签名中确定发送地址。\n    - 从发送者账户余额中减去费用，并递增发送者的`nonce`。如果没有足够的余额支付，则返回错误。\n\
    - 初始化`GAS = gasLimit`，并扣除一定量的`gas`（按字节计算）作为交易费用。\n- 将交易价值（可以是任何有价值的东西）从发送者账户转移到接收账户。请注意，交易可以用于任何具有内在价值的东西，如土地、车辆、ERC20代币等，但`gas`价格必须以以太币计价，以便矿工接受交易。如果接收账户尚不存在，则创建它。如果接收账户是合约而非外部拥有账户（EOA），则运行合约代码，直至完成或执行耗尽`gas`。请注意，合约代码会在每个节点的EVM上作为区块验证过程的一部分执行，以便区块以及合约执行后的输出成为主区块链的一部分。\n\
    - 如果因为发送者没有足够的资金或代码执行耗尽`gas`而导致价值转移失败，则回滚除费用支付之外的所有状态更改（这要归功于MPT实现），并将费用添加到矿工账户。\n\
    - 否则，将所有剩余`gas`的费用退还给发送者，并将已为消耗的`gas`支付的费用发送给矿工。"
  raw: "We looked at the transaction and messages. An Ethereum transaction can be\
    \ from an EOA to an EOA, or from an EOA to a Contract Account. There exists another\
    \ situation where a transaction from an EOA is initiated to create a Contract\
    \ Account (recollect the “init” field that we just covered). Now, just think about\
    \ what exactly a transaction is? It is definitely the bridge between the external\
    \ world and the Ethereum blockchain, but what more? If you zoom in to a transaction,\
    \ you will see that it is an instruction, initiated by the EOA by signing it,\
    \ which gets serialized and submitted to the blockchain. Take a look at Figure\
    \ [4-7](#A440588_1_En_4_Chapter.html#Fig7).\n\n![A440588_1_En_4_Fig7_HTML.jpg](A440588_1_En_4_Fig7_HTML.jpg)\n\
    \nFigure 4-7\n\nTransaction initiation`—`zoomed in\n\nNow what happens after a\
    \ transaction is injected into the blockchain? Well, it starts executing at every\
    \ Ethereum node if found valid. While this transaction is undergoing execution,\
    \ Ethereum is designed to keep tabs on the “substate” to track the flow of execution.\
    \ This is because, if a transaction does not complete due to “running out of gas,”\
    \ then the entire execution so far has to be reverted. Also, information collected\
    \ during the execution is required immediately after the transaction completion.\
    \ So, the substate contains the following:\n\n*   Self-destruct set: a set of\
    \ accounts (if any) that will be discarded after the transaction completion\n\
    *   Log series: archived and indexable “checkpoints” of the EVM’s code execution\
    \ to track the contract calls\n*   Refund balance: It is the amount to be refunded\
    \ to the sender account post transaction execution. Storage in Ethereum is quite\
    \ expensive, so there is an SSTORE instruction in Ethereum that is used as a refund\
    \ counter. The refund counter starts at zero (no refund state) and gets incremented\
    \ every time the transaction or contract deletes something from the storage. Please\
    \ note that this refund amount is different and in addition to the unused gas\
    \ that gets refunded to the sender.\n\nIn the earlier versions of Ethereum, whether\
    \ a transaction or contract executes successfully or fails in between, the entire\
    \ gas used to get consumed. This was not always making sense. If an execution\
    \ stopped due to some authorization/permission issue or any other issue, the execution\
    \ would stop and the remaining gas would still be consumed. The last Byzantium\
    \ update introduced the “revert” code like an exception handling. In case a contract\
    \ has to stop, “revert” could be used to revert state changes, return a reason\
    \ for failure, and credit the remaining gas back to the sender. Post successful\
    \ execution of the transactions or contracts, a state transition happens that\
    \ we will dive deeper into in the followiung section.\n\nJust the way we looked\
    \ at blockchaininfo to see a live Bitcoin transaction, if you take a look at [`https://etherscan.io`](https://etherscan.io/)\
    \ for Ethereum you will find the following information:\n\n![A440588_1_En_4_Figa_HTML.jpg](A440588_1_En_4_Figa_HTML.jpg)\n\
    \n### Ethereum State Transaction Function\n\nIn the previous section, we learned\
    \ about Ethereum transactions and messages. We are now aware that a state transition\
    \ happens whenever a transaction is through`—`successfully. So, the state transition\
    \ function in Ethereum is:\n\n```\nAPPLY(S,Tx) -> S'    \\\\where S is old state\
    \ and S' is the new state\n```\n\nTake a look at Figure [4-8](#A440588_1_En_4_Chapter.html#Fig8).\n\
    \n![A440588_1_En_4_Fig8_HTML.jpg](A440588_1_En_4_Fig8_HTML.jpg)\n\nFigure 4-8\n\
    \nEthereum state transition function\n\nSo, the state transition function when\
    \ Tx is applied to state S to result in changed state S’ can be defined as follows:\n\
    \n*   Validate the transaction to see if it is well formed.\n    *   Has the right\
    \ number of values\n    *   The signature is valid.\n    *   The nonce matches\
    \ the nonce in the sender’s account.If any of preceding points is not valid, return\
    \ an error.\n*   Calculate the fee and settle the accounts.\n    *   Compute the\
    \ transaction fee as gasLimit * gasPrice.\n    *   Determine the sending address\
    \ from the signature.\n    *   Subtract the fee from the sender’s account balance\
    \ and increment the sender’s nonce.If there is not enough balance to spend, return\
    \ an error.\n*   Initialize GAS = gasLimit, and take off a certain quantity of\
    \ gas per byte to pay for the bytes as a transaction fee.\n*   Transfer the transaction\
    \ value (could be anything of value) from the sender’s account to the receiving\
    \ account. Note here that the transaction could be for anything of some intrinsic\
    \ value such as land, vehicle, ERC20 tokens, etc., but the gas Price has to be\
    \ in Ether so that the miners would accept the transaction. If the receiving account\
    \ does not yet exist, create it. If the receiving account is a contract and not\
    \ an EOA, then run the contract’s code either to completion or until the execution\
    \ runs out of gas. Note here that the contract code gets executed on every node’s\
    \ EVM as part of the block validation process so that the block, hence the contract’s\
    \ output post execution, becomes a part of the main blockchain.\n*   If the value\
    \ transfer failed because the sender did not have enough money, or the code execution\
    \ ran out of gas, revert all state changes (thanks to MPT implementation) except\
    \ the payment of the fees, and add the fees to the miner’s account.\n*   Otherwise,\
    \ refund the fees for all remaining gas back to the sender, and send the fees\
    \ paid already for gas consumed to the miner."
  trans: "\n我们研究了交易和消息。以太坊交易可以是从外部拥有账户（EOA）到外部拥有账户（EOA），或者从外部拥有账户（EOA）到合约账户。还存在另一种情况，即从外部拥有账户（EOA）发起的交易是为了创建合约账户（回想一下我们刚刚介绍的“`init`”字段）。现在，思考一下交易到底是什么？它无疑是外部世界与以太坊区块链之间的桥梁，但除此之外呢？如果你放大一笔交易，你会看到它是一条由外部拥有账户（EOA）签名发起的指令，该指令被序列化并提交至区块链。请参见图\
    \ 4-7。\n\n![A440588_1_En_4_Fig7_HTML.jpg](img/A440588_1_En_4_Fig7_HTML.jpg)\n\n\
    图 4-7\n\n交易发起——放大视图\n\n交易被注入区块链后会发生什么？如果它被验证有效，就会在每个以太坊节点上开始执行。在此交易执行过程中，以太坊被设计为跟踪“子状态”以追踪执行流程。这是因为，如果交易因“`gas`耗尽”而未能完成，则必须回滚到目前为止的整个执行过程。此外，执行过程中收集的信息在交易完成后也立即需要。因此，子状态包含以下内容：\n\
    \n- **自毁集合**：一组在交易完成后将被丢弃的账户（如果有的话）\n- **日志系列**：归档且可索引的 EVM 代码执行“检查点”，用于追踪合约调用\n\
    - **退款余额**：交易执行后应退还给发送者账户的金额。以太坊中的存储相当昂贵，因此 EVM 中有一条`SSTORE`指令被用作退款计数器。退款计数器从零开始（无退款状态），每当交易或合约从存储中删除某些内容时，它就会递增。请注意，此退款金额与退还给发送者的未使用的`gas`不同，且是额外支付的。\n\
    \n在以太坊的早期版本中，无论交易或合约是成功执行还是中途失败，所有已使用的`gas`都会被消耗。这有时并不合理。如果执行因某些授权/权限问题或其他问题而停止，执行会停止，但剩余的`gas`仍然会被消耗。最近的拜占庭升级引入了类似异常处理的“`revert`”代码。如果合约需要停止，可以使用“`revert`”来回滚状态更改，返回失败原因，并将剩余`gas`记回发送者账户。交易或合约成功执行后，会发生状态转换，我们将在后续章节中深入探讨。\n\
    \n就像我们查看`blockchaininfo`来了解实时比特币交易一样，如果你查看以太坊的网站（`https://etherscan.io`），将会找到以下信息：\n\
    \n![A440588_1_En_4_Figa_HTML.jpg](img/A440588_1_En_4_Figa_HTML.jpg)\n\n### 以太坊状态转换函数\n\
    \n在上一节中，我们了解了以太坊交易和消息。我们现在知道，每当交易成功完成时，就会发生状态转换。因此，以太坊中的状态转换函数是：\n\n```\nAPPLY(S,Tx)\
    \ -> S'    \\\\where S is old state and S' is the new state\n```\n\n请参见图 4-8。\n\
    \n![A440588_1_En_4_Fig8_HTML.jpg](img/A440588_1_En_4_Fig8_HTML.jpg)\n\n图 4-8\n\
    \n以太坊状态转换函数\n\n因此，当`Tx`应用于状态`S`以产生改变的状态`S'`时，状态转换函数可以定义如下：\n\n- 验证交易是否格式正确。\n\
    \    - 具有正确数量的值。\n    - 签名有效。\n    - `nonce`与发送者账户中的`nonce`匹配。如果上述任何一点无效，则返回错误。\n\
    - 计算费用并结算账户。\n    - 将交易费用计算为`gasLimit * gasPrice`。\n    - 从签名中确定发送地址。\n    - 从发送者账户余额中减去费用，并递增发送者的`nonce`。如果没有足够的余额支付，则返回错误。\n\
    - 初始化`GAS = gasLimit`，并扣除一定量的`gas`（按字节计算）作为交易费用。\n- 将交易价值（可以是任何有价值的东西）从发送者账户转移到接收账户。请注意，交易可以用于任何具有内在价值的东西，如土地、车辆、ERC20\
    \ 代币等，但`gas`价格必须以以太币计价，以便矿工接受交易。如果接收账户尚不存在，则创建它。如果接收账户是合约而非外部拥有账户（EOA），则运行合约代码，直至完成或执行耗尽`gas`。请注意，合约代码会在每个节点的\
    \ EVM 上作为区块验证过程的一部分执行，以便区块以及合约执行后的输出成为主区块链的一部分。\n- 如果因为发送者没有足够的资金或代码执行耗尽`gas`而导致价值转移失败，则回滚除费用支付之外的所有状态更改（这要归功于\
    \ MPT 实现），并将费用添加到矿工账户。\n- 否则，将所有剩余`gas`的费用退还给发送者，并将已为消耗的`gas`支付的费用发送给矿工。\n"
- fmt: '### Gas and Transaction Cost


    Transactions on Ethereum run on “gas,” the fundamental unit of computation in
    Ethereum. Every transaction, whether to an EOA or to a contract, must have the
    `gasLimit` and `gasPrice` to compute the fee. This fee is paid to the miners to
    compensate them for their resource contributions and work they perform. Obviously,
    miners have the choice of including the transaction and collecting the fee, similar
    to that of Bitcoin.


    Usually, a computational step costs just one gas, but some of the compute- or
    storage-intensive operations cost more. For every byte of transaction data, around
    five gas is required. Take a look at these sample examples: adding two numbers
    (with EVM opcode `ADD`) requires approximately three gas; multiplying two numbers
    (with EVM opcode `MUL`) requires approximately five gas; calculating a hash (`SHA3`)
    requires around 30 gas (compute-intensive, you see). Storage cost is also computed
    in similar fashion, but quite expensive for good reasons. As per the design, a
    transaction can include an unlimited amount of data. It costs 68 gas per byte
    of nonzero transaction data. To store a 256-bit word in a “Contract,” approximately
    20,000 gas is required. You could find more opcodes and their corresponding prices
    in the Ethereum yellow paper. The cost then would be to just multiply the gas
    required with the `gasPrice`. Unlike Bitcoin, Ethereum cost computation is more
    complex. It takes into account the costs of bandwidth, storage, and computation.
    Having such a fee computation mechanism prevents the Ethereum network from an
    attacker who might just want to inject an infinite loop for computation (leading
    to denial-of-service attacks) or consume more and more space by storing meaningless
    data.


    The total Ether a transaction would cost actually depends on the amount of gas
    consumed by the transaction, multiplied by the price of one unit of gas specified
    in the transaction by the transaction initiator. Miners on the other hand have
    a strategy for calculating the gas Price to charge, which should be the least
    amount the sender of a transaction must specify so that the transaction does not
    get rejected by the miner. So, how do you calculate the total cost of a transaction?
    Not the approximate one, but the actual cost? The total “Ether” cost of a transaction
    is based on two factors: `gasUsed` and `gasPrice`. Total cost = `gasUsed * gasPrice`.
    The `gasUsed` component is the total gas consumed while executing the EVM opcodes
    for the instructions, and `gasPrice` is the one specified by the user.


    If the total amount of gas used by the computational steps (including the transaction,
    the message, and any submessages that may be triggered) is less than or equal
    to the `gasLimit`, then the transaction is processed by the miner. However, if
    the total gas exceeds the `gasLimit`, then all changes are reverted (though it
    is a valid transaction), except that the fee can still be collected by the miner.
    So, what happens to the excess gas? All the unused gas after transaction execution
    is reimbursed to the sender as Ether. Senders do not need to worry about overspending,
    as they are only charged for the gas consumed. This definitely means that it is
    important as well as safe to send transactions with a gas limit well above the
    estimates. It is also recommended not to pay very high `gasPrice` and use the
    average gas price from [`https://ethgasstation.info/`](https://ethgasstation.info/).


    Let us go through each and every step when a transaction is made in an Ethereum
    network to build a concrete understanding of the flow:


    *   Every transaction must define a `gasLimit` that it is willing to spend (`gasLimit`
    is also termed `startGas`), and the fee that it is willing to pay per unit of
    gas (`gasPrice`). At the start of execution, Ether worth of `gasLimit * gasPrice`
    is removed from the transaction sender’s account. Remember that this is not really
    the total cost of a transaction (should be a bit more than that in an ideal case).
    Only after the transaction, its actual cost is concluded (`gasUsed * gasPrice`)
    that’s adjusted from this (`gasLimit * gasPrice`), which was initially deducted
    from sender’s account and the balance amount is credited back to the sender. In
    the beginning of a transaction itself, the amount (`gasLimit * gasPrice`) is deducted
    because there could be a possibility that the sender could go bankrupt while the
    transaction they initiated is midway through.

    *   All operations during transaction execution, including database reads and
    writes, messages, and every computational step taken by the EVM such as addition,
    subtraction, hash, etc. consume a certain quantity of gas that is predefined.

    *   A normal transaction is one that executes successfully without exceeding the
    `gasLimit` specified. For such transactions, there should be some gas remaining,
    say, `gas_rem`. After a successful transaction execution, the transaction sender
    receives a refund of `gas_rem * gasPrice` and the miner of the block receives
    a reward of `(gasLimit - gas_rem) * gasPrice`.

    *   If a transaction runs out of gas before successful completion, then all executions
    revert, but the transaction is nevertheless valid. In such situations, the only
    outcome of the transaction is that the entire amount `gasLimit * gasPrice` is
    allocated to the miner.

    *   In the case of Contract Accounts, when a contract sends a message to the other
    contract for subexecution, it also has the option to set a `gasLimit`. This option
    is specifically intended for the subexecution arising out of that message, because
    there is a possibility that the called contract has an infinite loop. If the subexecution
    runs out of gas, then the subexecution is reverted, which protects against such
    infinite loops or deliberate attempts of DoS attacks. The gas is consumed anyway
    and allocated to the miner. Also note that when a message is triggered by a contract,
    only the instructions cost gas, but data in a message do not cost any gas. This
    is because the data from the parent contract need not be copied again, and could
    be just referenced through a pointer.


    The first Ethereum release (Frontier) had a default gas Price of 0.05e12 WEI (i.e.,
    smallest denomination of Ether). In the second Ethereum release (Homestead), default
    gas Price was reduced to 0.02e12 WEI. You must be wondering why gas and Ether
    are decoupled from each other and not a single unit of measurement, which would
    have made it much simpler. Well, it is deliberately designed this way because
    units of gas align well with computation units having a natural cost (e.g., cost
    per computation), while the price of Ether generally fluctuates as a result of
    market forces.


    We already know that every Ethereum node participating in the network runs the
    EVM as part of the block verification protocol. This means that all the nodes
    execute the same set of transactions and contracts (redundantly parallel, but
    essential for consensus). While this redundancy naturally makes it expensive,
    there is an incentive not to use the blockchain for computation that can be done
    offchain (Game Theory!).'
