- fmt: '### Prisoner’s Dilemma


    Many games in real life can also be non-zero-sum games. Prisoner’s dilemma is
    one such example, which can be broadly categorized as a symmetric game. This is
    because, if you change the identities of the players (e.g., if two players “A”
    and “B” are playing, then “A” becomes “B” and “B” becomes “A”), and also the strategies
    do not change, then the payoff remains the same. This is what a symmetric game
    is.


    Let us start directly with an example. Assume that there are two guys, Bob and
    Charlie, who are caught by the cops for selling drugs independently, say in different
    locations. They are kept in two different cells for interrogation. They were then
    told that they would be sentenced to jail for two years for this crime. Now, the
    cops somehow suspect that these two guys could also be involved in the robbery
    that just happened last week. If they did not do the robbery, then it is two years
    of imprisonment anyway. So, the cops have to strategize a way to get to the truth.
    So here is what they do.


    The cops go to Bob and give him a choice, a good choice that goes like this. If
    Bob confesses his crime and Charlie does not, then his punishment would go down
    from two years to just one year and Bob gets five years. However, if Bob denies
    and Charlie confesses, then Bob gets five years and Charlie gets just one year.
    Also, if both confess, then both get three years of imprisonment. Similarly, the
    same choice is given to Charlie as well. What do you think they are going to do?
    This situation is called the prisoner’s dilemma.


    Both Bob and Charlie are in two different cells. They cannot talk to each other
    and conclude with the situation where they both deny and get two years in jail
    (just for the drug dealing case), which seems to be the global optimum in this
    situation. Well, even if they could talk to each other, they may not really trust
    each other.


    What would go through Bob’s mind now? He has two choices, confess or deny. He
    knows that Charlie would choose what is best for him, and he himself is no different.
    If he denies and Charlie confesses, then he is in trouble by getting five years
    of jail and Charlie gets just one year of jail. He certainly does not want to
    get into this situation.


    If Bob confesses, then Charlie has two choices: confess or deny. Now Bob thinks
    that if he confesses, then whatever Charlie does, he is not getting more than
    three years. Let us state these scenarios for Bob.


    - Bob confesses and Charlie denies—Bob gets one year, Charlie gets five years
    (best case given Bob confesses)

    - Bob confesses and Charlie also confesses—Both Bob and Charlie get three years
    (worst case given Bob confesses)


    This situation is called Nash equilibrium where each party has taken the best
    move, given the choices of the other party. This is definitely not the global
    optimum, but represents the best move as an individual. Now, if you look at this
    situation as an outsider, you would say both should deny and get two years. But
    when you play as a participant in the game, Nash equilibrium is what you would
    eventually fall into. Note that this is the most stable stage where you changing
    your decision does not benefit you at all. It can be pictorially represented as
    shown in Figure [2-17](#A440588_1_En_2_Chapter.html#Fig17).


    ![A440588_1_En_2_Fig17_HTML.jpg](A440588_1_En_2_Fig17_HTML.jpg)


    Figure 2-17 Prisoner’s dilemma—payoff matrix


    ### Byzantine Generals’ Problem


    In the previous section, we looked at different examples of games and learned
    a few game theory concepts. Now we will discuss a specific problem from the olden
    days that is still widely used to solve many computer science as well as real-life
    problems.


    The Byzantine Generals’ Problem was a problem faced by the Byzantine army while
    attacking a city. The situation was straightforward yet very difficult to deal
    with. To put it simply, the situation was that several army factions commanded
    by separate generals surrounded a city to win over it. The only chance of victory
    is when all the generals attack the city together. However, the problem is how
    to reach a consensus. This implies that either all the generals should attack
    or all of them should retreat. If some of them attack and some retreat, then chances
    are greater they would lose the battle. Let us take an example with numbers to
    be able to understand the situation better.


    Let us assume a situation where there are five factions of the Byzantine army
    surrounding a city. They would attack the city if at least three out of five generals
    are willing to attack, but retreat otherwise. If there is a traitor among the
    generals, what he can do is vote for attack with the generals willing to attack
    and vote for retreat with the generals willing to retreat. He can do so because
    the army is dispersed in factions, which makes centralized coordination difficult.
    This can result in two generals attacking the city and getting outnumbered and
    defeated. There could be more complicated issues with such a situation:


    - What if there is more than one traitor?

    - How would the message coordination between generals take place?

    - What if a messenger is caught/killed/bribed by the city commander?

    - What if a traitor general forges a different message and fools other generals?

    - How to find the generals who are honest and who are traitors?


    As you can see, there are so many challenges that need to be addressed for a coordinated
    attack on the city. It can be pictorially represented as in Figure [2-18](#A440588_1_En_2_Chapter.html#Fig18).


    ![A440588_1_En_2_Fig18_HTML.jpg](A440588_1_En_2_Fig18_HTML.jpg)


    Figure 2-18 Byzantine army attacking the city


    There are numerous scenarios in real life that are analogous to the Byzantine
    Generals’ Problem. How a group of people reach consensus on some voting agenda
    or how to maintain the consistent state of a distributed or decentralized database,
    or maintaining the consistent state of blockchain copies across nodes in a network
    are a few examples similar to the Byzantine Generals’ Problem. Note, however,
    that the solutions to these different problems could be quite different in different
    situations. We will look at how Bitcoin solves the Byzantine Generals’ Problem
    later in this book.'
