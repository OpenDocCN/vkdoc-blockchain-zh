  trans: "  \n### 以太坊：下一代区块链  \n\n凭借比特币区块链，开发者社区曾试图通过构建全新的区块链来开发不同的去中心化应用，或尝试修改比特币核心以增加功能集。无论哪种方式，既复杂又耗时。当时或许正需要一种采用替代协议的不同设计方案，这正是以太坊区块链平台诞生的原因！其目标是促进在单一以太坊平台上开发多种区块链应用，而非为每个应用单独构建专用区块链。以太坊实现了去中心化应用的快速开发，这些应用可以相互交互，同时确保足够的安全性。如前一节所述，以太坊通过构建抽象基础层来实现这一点。与比特币不同，以太坊支持图灵完备语言，因此任何人都可以编写智能合约，从而在编程层面实现几乎任何功能。此外，以太坊在设计上具有状态性，并持续跟踪账户状态，这与比特币截然不同——比特币中所有内容都保持为交易形式，且脚本没有内部持久内存。借助抽象基础层，底层复杂性对开发者而言被隐藏起来，不仅如此，开发者还能灵活设计自己的状态转换函数，用于直接转移价值与信息，以及自定义交易格式。\n\
    \n为实现这一目标，以太坊的核心创新是以太坊虚拟机（`EVM`）。通过`EVM`支持图灵完备语言，使开发者能够轻松创建区块链应用。就像运行 Java 代码需要\
    \ Java 虚拟机（`JVM`）一样，运行智能合约需要`EVM`。目前只需记住：智能合约是用图灵完备语言编写的以太坊脚本，当预定义事件发生时，它会自动执行。比特币中的`ScriptSig`和`ScriptPubKey`可以说是智能合约的初级版本。我们在前一章了解到，比特币的指令集非常有限。然而在以太坊中，几乎可以编写任何程序，并在以太坊区块链网络中的每个节点上通过`EVM`运行。以太坊中的去中心化应用被称为\
    \ DApp。由于以太坊是一个没有中心化服务器的全球去中心化计算机系统，DApp 是能够无停机、无欺诈或任何形式监管运行的应用。像比特币这样的点对点电子现金系统，在以太坊上可以很容易地作为\
    \ DApp 构建。同样，任何具有内在价值的资产（如土地、汽车、房屋、选票等），都可以通过其在以太坊上的相应 DApp 以代币形式轻松交易。\n\n与传统软件的开发和部署不同，DApp\
    \ 无需托管在后端服务器上。可以说，“代码”作为交易的有效载荷嵌入其中，然后发送至以太坊网络中的挖矿节点。此类交易会被挖矿生态系统考虑，因为其支付了以 ETH（以太币）计价的“燃料价格”。与比特币类似，这些交易会被广播至网络中可访问的其他矿工。最终，交易被打包进区块，并在达成共识后成为区块链的永久组成部分。开发者可以自由编写任意解决方案并将其部署到以太坊网络中。网络会自动执行该方案，同时验证并产生输出。当然，如果没有成本，网络将无法持续。每笔区块链交易都关联着燃料价格，编写垃圾代码并部署到以太坊网络可能会代价高昂！\n\
    \n### 以太坊的设计理念  \n\n以太坊借鉴了比特币核心中经得起时间考验的许多概念，但其设计遵循不同的理念。以太坊的开发遵循以下原则：\n\n* **简约设计**：以太坊区块链设计得尽可能简单，以便易于理解和开发去中心化应用。在共识层面，实现中的复杂性被控制在最低限度，并在更上层进行管理。因此，高级语言编译、参数的序列化/反序列化等对开发者而言并非难题。\n\
    * **开发自由**：以太坊平台旨在鼓励其区块链平台上的任何形式的去中心化，并不歧视或偏袒任何特定用例。这种自由甚至允许开发者编写包含无限循环的智能合约并部署它。当然，只要他们支付交易费用（燃料价格），循环就会持续运行，当燃料耗尽时循环最终终止。\n\
    * **无内置特性概念**：为了提升系统的通用性，以太坊没有为开发者提供内置特性。相反，以太坊通过支持图灵完备语言，让用户按自己的意愿开发所需特性。从比特币中的`locktime`等基本功能，到完整的复杂用例，一切都可以在以太坊中编码实现。\n\
    \n## 进入以太坊区块链  \n\n我们了解了以太坊区块链的目标及其设计理念。为了能够理解并欣赏这一下一代区块链，并在其上构建去中心化应用，我们将在本节中详细学习以太坊的核心组件。\
    \  \n"
- fmt: '# Ethereum Blockchain


    The Ethereum blockchain data structure is pretty similar to that of Bitcoin’s,
    except that there is a lot more information contained in the block header to make
    it more robust and help maintain the state properly. We will learn more about
    the Ethereum states in the following sections. Let us focus more on the blockchain
    data structure and the header in this section. In Bitcoins, there was only one
    Merkle root in the block header for all the transactions in a block. In Ethereum,
    there are two more Merkle roots, so there are three Merkle roots in total as follows:


    *   `stateRoot`: It helps maintain the global state.

    *   `transactionsRoot`: It is to track and ensure integrity of all the transactions
    in a block, similar to Bitcoin’s Merkle root.

    *   `receiptsRoot`: It is the root hash of the receipts trie corresponding to
    the transactions in a block


    We will take a look at these Merkle roots in their respective sections of block
    header information. For better comprehension, take a look at Figure [4-2](#A440588_1_En_4_Chapter.html#Fig2).


    ![A440588_1_En_4_Fig2_HTML.jpg](A440588_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    The blockchain data structure of Ethereum


    Every block usually comprises block header, transactions list, uncles list, and
    optional extraData. Let us now take a look at the header fields to understand
    what they mean and their purpose for being in the header. While you do so, keep
    in mind that there could be slight variants of these names in different places,
    or the order in which they are presenbted could be different in different places.
    We suggest that you build a proper understanding of these fields so that any different
    terminology that you might come across won’t bother you much.


    ## Section-1: Block metadata


    *   `parentHash`: Keccak 256-bit hash of the parent block’s header, like that
    of Bitcoin’s style

    *   `timestamp`: The Unix timestamp current block

    *   `number`: Block number of the current block

    *   `Beneficiary`: The 160-bit address of “author” account responsible for creating
    the current block to which all the fees from successfully mining a block are collected


    ## Section-2: Data references


    *   `transactionsRoot`: The Keccak 256-bit root hash (Merkle root) of the transactions
    trie populated with all the transactions in this block

    *   `ommersHash`: It is otherwise known as “`uncleHash`.” It is the hash of the
    uncles segment of the block, i.e., Keccak 256-bit hash of the ommers list portion
    of this block (blocks that are known to have a parent equal to the present block’s
    parent’s parent).

    *   `extraData`: Arbitrary byte array containing data relevant to this block.
    The size of this data is limited to 32 bytes (256-bits). As of this writing, there
    is a possibility that this field might become “`extraDataHash`”, which will point
    to the `extraData` contained inside the block. `extraData` could be raw data,
    charged at the same amount of gas as that of transaction data.


    ## Section-3: Transaction execution information


    *   `stateRoot`: The Keccak 256-bit root hash (Merkle root) of the final state
    after validating and executing all transactions of this block

    *   `receiptsRoot`: The Keccak 256-bit root hash (Merkle root) of the receipts
    trie populated with the recipients of each transaction in this block

    *   `logBloom`: The accumulated Bloom filter for each of the transactions’ receipts’
    Blooms, i.e., the “OR” of all of the Blooms for the transactions in the block

    *   `gasUsed`: The total amount of gas used through each of the transactions in
    this block

    *   `gasLimit`: The maximum amount of gas that this block may utilise (dynamic
    value depending on the activity in the network)


    ## Section-4: Consensus-subsystem information


    *   `difficulty`: The difficulty limit for this block calculated from the previous
    block’s difficulty and timestamp

    *   `mixHash`: The 256-bits mix hash combined with the ‘`nonce`’ for the PoW of
    this block

    *   `nonce`: The nonce is a 64-bit hash that is combined with `mixHash` and can
    be used as a PoW verification.


    # Ethereum Accounts


    The Ethereum accounts, unlike Bitcoins, are not in the form of unspent transaction
    outputs (UTXOs). In the Bitcoin chapter, we learned that Bitcoins are actually
    present in the form of transactions that have an owner (owner’s public key, 20-byte
    address) and a value. The owner can spend the transaction if they have the valid
    private key for the transaction they are trying to spend. Bitcoin therefore is
    a state transition system where “state” refers to the collection of all UTXOs.
    Every time a block is mined, a state change happens because each block contains
    a bunch of transactions where each transaction cosumes UTXO(s) and produces UTXO(s).
    Note here that the state is not encoded inside the blocks. So, there is no notion
    of an account balance as such in Bitcoin’s design. Ethereum on the other hand
    is stateful, and its basic unit is the account. Each account has a state associated
    with it and also has a 20-byte (160 bits) address through which it gets identified
    and referenced. The purpose of blockchain in Ethereum is to keep track of the
    state changes. There are broadly two types of Ethereum accounts:


    *   **Externally Owned Accounts (EOAs)**: These accounts are also known as “simple
    accounts” that are usually owned by users or devices who control these accounts
    using Private Keys. The EOAs can send transactions to other EOAs or Contract Accounts
    by signing with a private key. The transaction between two EOAs is usually to
    transfer any form of value. On the other hand, when an EOA makes a transaction
    to a Contract Account, the purpose is to activate the “code” inside the Contract
    Account.

    *   **Contract Accounts**: These are controlled only by the code contained in
    them. This code inside the Contract Accounts is referred to as “smart contracts.”
    They are usually activated when a transaction is sent to the Contract Account
    by the EOAs or by other Contract Accounts. Even though the Contract Accounts are
    capable of executing complex business logics through the code they contain, they
    can’t initiate new transactions on their own and always depend on the EOAs. All
    they can do is respond to other transactions (obviously by making transactions)
    as per the logic coded in their “code.”


    Take a look at the following three scenarios (Figures [4-3](#A440588_1_En_4_Chapter.html#Fig3)
    to [4-5](#A440588_1_En_4_Chapter.html#Fig5)) to get a better understanding on
    the communication between the EOAs and Contract Accounts.


    **EOA to EOA transaction:**


    ![A440588_1_En_4_Fig3_HTML.jpg](A440588_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    EOA to EOA transaction


    **EOA to Contract Account Transaction:**


    ![A440588_1_En_4_Fig4_HTML.jpg](A440588_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    EOA to Contract Account transaction


    **EOA to Contract Account to other Contract Account transaction:**


    ![A440588_1_En_4_Fig5_HTML.jpg](A440588_1_En_4_Fig5_HTML.jpg)


    Figure 4-5


    EOA to Contract Account to Contract Account transaction


    Just so the previous representations are not confusing, please be aware that the
    Contract Accounts are internal and the communications between them, too. Unlike
    EOA accounts where EOAs make a transaction that gets injected in the blockchain,
    Contract Accounts and the transactions between them are internal phenomena.'
  raw: '### Ethereum Blockchain


    The Ethereum blockchain data structure is pretty similar to that of Bitcoin’s,
    except that there is a lot more information contained in the block header to make
    it more robust and help maintain the state properly. We will learn more about
    the Ethereum states in the following sections. Let us focus more on the blockchain
    data structure and the header in this section. In Bitcoins, there was only one
    Merkle root in the block header for all the transactions in a block. In Ethereum,
    there are two more Merkle roots, so there are three Merkle roots in total as follows:


    *   stateRoot: It helps maintain the global state.

    *   transactionsRoot: It is to track and ensure integrity of all the transactions
    in a block, similar to Bitcoin’s Merkle root.

    *   receiptsRoot: It is the root hash of the receipts trie corresponding to the
    transactions in a block


    We will take a look at these Merkle roots in their respective sections of block
    header information. For better comprehension, take a look at Figure [4-2](#A440588_1_En_4_Chapter.html#Fig2).


    ![A440588_1_En_4_Fig2_HTML.jpg](A440588_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    The blockchain data structure of Ethereum


    Every block usually comprises block header, transactions list, uncles list, and
    optional extraData. Let us now take a look at the header fields to understand
    what they mean and their purpose for being in the header. While you do so, keep
    in mind that there could be slight variants of these names in different places,
    or the order in which they are presenbted could be different in different places.
    We suggest that you build a proper understanding of these fields so that any different
    terminology that you might come across won’t bother you much.


    Section-1: Block metadata


    *   parentHash: Keccak 256-bit hash of the parent block’s header, like that of
    Bitcoin’s style

    *   timestamp: The Unix timestamp current block

    *   number: Block number of the current block

    *   Beneficiary: The 160-bit address of “author” account responsible for creating
    the current block to which all the fees from successfully mining a block are collected


    Section-2: Data references


    *   transactionsRoot: The Keccak 256-bit root hash (Merkle root) of the transactions
    trie populated with all the transactions in this block

    *   ommersHash: It is otherwise known as “uncleHash.” It is the hash of the uncles
    segment of the block, i.e., Keccak 256-bit hash of the ommers list portion of
    this block (blocks that are known to have a parent equal to the present block’s
    parent’s parent).

    *   extraData: Arbitrary byte array containing data relevant to this block. The
    size of this data is limited to 32 bytes (256-bits). As of this writing, there
    is a possibility that this field might become “extraDataHash”, which will point
    to the “extraData” contained inside the block. extraData could be raw data, charged
    at the same amount of gas as that of transaction data.


    Section-3: Transaction execution information


    *   stateRoot: The Keccak 256-bit root hash (Merkle root) of the final state after
    validating and executing all transactions of this block

    *   receiptsRoot: The Keccak 256-bit root hash (Merkle root) of the receipts trie
    populated with the recipients of each transaction in this block

    *   logBloom: The accumulated Bloom filter for each of the transactions’ receipts’
    Blooms, i.e., the “OR” of all of the Blooms for the transactions in the block

    *   gasUsed: The total amount of gas used through each of the transactions in
    this block

    *   gasLimit: The maximum amount of gas that this block may utilise (dynamic value
    depending on the activity in the network)


    Section-4: Consensus-subsystem information


    *   difficulty: The difficulty limit for this block calculated from the previous
    block’s difficulty and timestamp

    *   mixHash: The 256-bits mix hash combined with the ‘nonce’ for the PoW of this
    block

    *   nonce: The nonce is a 64-bit hash that is combined with mixHash and can be
    used as a PoW verification.


    ### Ethereum Accounts


    The Ethereum accounts, unlike Bitcoins, are not in the form of unspent transaction
    outputs (UTXOs). In the Bitcoin chapter, we learned that Bitcoins are actually
    present in the form of transactions that have an owner (owner’s public key, 20-byte
    address) and a value. The owner can spend the transaction if they have the valid
    private key for the transaction they are trying to spend. Bitcoin therefore is
    a state transition system where “state” refers to the collection of all UTXOs.
    Every time a block is mined, a state change happens because each block contains
    a bunch of transactions where each transaction cosumes UTXO(s) and produces UTXO(s).
    Note here that the state is not encoded inside the blocks. So, there is no notion
    of an account balance as such in Bitcoin’s design. Ethereum on the other hand
    is stateful, and its basic unit is the account. Each account has a state associated
    with it and also has a 20-byte (160 bits) address through which it gets identified
    and referenced. The purpose of blockchain in Ethereum is to keep track of the
    state changes. There are broadly two types of Ethereum accounts:


    *   Externally Owned Accounts (EOAs) : These accounts are also known as “simple
    accounts” that are usually owned by users or devices who control these accounts
    using Private Keys. The EOAs can send transactions to other EOAs or Contract Accounts
    by signing with a private key. The transaction between two EOAs is usually to
    transfer any form of value. On the other hand, when an EOA makes a transaction
    to a Contract Account, the purpose is to activate the “code” inside the Contract
    Account.

    *   Contract Accounts: These are controlled only by the code contained in them.
    This code inside the Contract Accounts is referred to as “smart contracts .” They
    are usually activated when a transaction is sent to the Contract Account by the
    EOAs or by other Contract Accounts. Even though the Contract Accounts are capable
    of executing complex business logics through the code they contain, they can’t
    initiate new transactions on their own and always depend on the EOAs. All they
    can do is respond to other transactions (obviously by making transactions) as
    per the logic coded in their “code.”


    Take a look at the following three scenarios (Figures [4-3](#A440588_1_En_4_Chapter.html#Fig3)
    to [4-5](#A440588_1_En_4_Chapter.html#Fig5)) to get a better understanding on
    the communication between the EOAs and Contract Accounts.


    EOA to EOA transaction:


    ![A440588_1_En_4_Fig3_HTML.jpg](A440588_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    EOA to EOA transaction


    EOA to Contract Account Transaction:


    ![A440588_1_En_4_Fig4_HTML.jpg](A440588_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    EOA to Contract Account transaction


    EOA to Contract Account to other Contract Account transaction:


    ![A440588_1_En_4_Fig5_HTML.jpg](A440588_1_En_4_Fig5_HTML.jpg)


    Figure 4-5


    EOA to Contract Account to Contract Account transaction


    Just so the previous representations are not confusing, please be aware that the
    Contract Accounts are internal and the communications between them, too. Unlike
    EOA accounts where EOAs make a transaction that gets injected in the blockchain,
    Contract Accounts and the transactions between them are internal phenomena.'
  trans: '

    # 以太坊区块链


    以太坊区块链的数据结构与比特币的非常相似，不同之处在于区块头包含了更多信息，使其更加健壮，并有助于正确维护状态。我们将在后续章节中学习更多关于以太坊状态的知识。本节我们将主要关注区块链数据结构和区块头。在比特币中，区块头只有一个默克尔树根，用于存储块内的所有交易。而在以太坊中，另外还有两个默克尔树根，因此总共有三个默克尔树根，如下所示：


    *   `stateRoot`：有助于维护全局状态。

    *   `transactionsRoot`：用于跟踪并确保区块内所有交易的完整性，类似于比特币的默克尔树根。

    *   `receiptsRoot`：对应于区块内交易的收据树的根哈希。


    我们将在各自对应的区块头信息部分来审视这些默克尔树根。为了更好地理解，请查看图 4-2。


    ![A440588_1_En_4_Fig2_HTML.jpg](img/A440588_1_En_4_Fig2_HTML.jpg)


    图 4-2


    以太坊的区块链数据结构


    每个区块通常包含区块头、交易列表、叔块列表和可选的`extraData`。现在，让我们看看区块头的各个字段，了解它们的含义及其在区块头中的作用。在此过程中，请记住，这些字段的名称在不同地方可能略有不同，或者它们的呈现顺序也可能有所不同。我们建议你深入理解这些字段，这样将来遇到任何不同的术语都不会给你带来太多困扰。


    ## 第 1 节：区块元数据


    *   `parentHash`：父区块头的 Keccak 256 位哈希，类似于比特币的风格。

    *   `timestamp`：当前区块的 Unix 时间戳。

    *   `number`：当前区块的区块编号。

    *   `Beneficiary`：负责创建当前区块的“作者”账户的 160 位地址，成功挖掘该区块所获得的所有手续费都将汇集到此地址。


    ## 第 2 节：数据引用


    *   `transactionsRoot`：填充了此区块所有交易的交易树的 Keccak 256 位根哈希（默克尔根）。

    *   `ommersHash`：也称为“`uncleHash`”。它是区块中叔块部分的哈希，即此区块的叔块列表部分的 Keccak 256 位哈希（这些叔块是已知其父区块等于当前区块的父区块的父区块的区块）。

    *   `extraData`：包含与此区块相关数据的任意字节数组。该数据的大小限制为 32 字节（256 位）。截至撰写本文时，此字段有可能变为“`extraDataHash`”，它将指向区块内包含的
    `extraData`。`extraData` 可以是原始数据，其计费方式与交易数据相同。


    ## 第 3 节：交易执行信息


    *   `stateRoot`：在验证并执行此区块所有交易后的最终状态的 Keccak 256 位根哈希（默克尔根）。

    *   `receiptsRoot`：填充了此区块中每笔交易收据的收据树的 Keccak 256 位根哈希（默克尔根）。

    *   `logBloom`：针对每笔交易收据的 Bloom 过滤器累积而成的 Bloom 过滤器，即区块中所有交易 Bloom 过滤器的“或”运算结果。

    *   `gasUsed`：此区块中所有交易消耗的 gas 总量。

    *   `gasLimit`：此区块可使用的最大 gas 量（动态值，取决于网络活动）。


    ## 第 4 节：共识子系统信息


    *   `difficulty`：根据前一区块的难度和时间戳计算得出的本区块难度限制。

    *   `mixHash`：256 位的混合哈希，与“`nonce`”相结合用于本区块的工作量证明。

    *   `nonce`：nonce 是一个 64 位哈希，与 `mixHash` 结合使用，可作为工作量证明验证。


    # 以太坊账户


    与比特币不同，以太坊账户并非以未花费交易输出（UTXO）的形式存在。在比特币章节中，我们了解到比特币实际上是以交易的形式存在的，每笔交易都有一个所有者（所有者的公钥，20
    字节地址）和一个数值。如果所有者拥有他们想要花费的交易的有效私钥，就可以花费该交易。因此，比特币是一个状态转换系统，其中“状态”指的是所有 UTXO 的集合。每当一个区块被挖出，就会发生状态变化，因为每个区块都包含一组交易，而每笔交易都会消耗
    UTXO 并创建 UTXO。请注意，状态并未编码在区块内部。因此，在比特币的设计中，本质上没有账户余额的概念。相比之下，以太坊是有状态的，其基本单元是账户。每个账户都有一个与之关联的状态，并有一个
    20 字节（160 位）的地址，通过该地址进行识别和引用。以太坊中区块链的目的是跟踪状态变化。以太坊账户大致有两种类型：


    *   **外部拥有账户（EOA）**：这些账户也称为“简单账户”，通常由用户或设备拥有，他们使用私钥控制这些账户。EOA 可以通过使用私钥签名来向其他 EOA
    或合约账户发送交易。两个 EOA 之间的交易通常是转达任何形式的价值。另一方面，当 EOA 向合约账户发起交易时，其目的是激活合约账户内的“代码”。

    *   **合约账户**：这些账户仅由其内部包含的代码控制。合约账户内的这种代码被称为“智能合约”。它们通常在 EOA 或其他合约账户向该合约账户发送交易时被激活。尽管合约账户能够通过其包含的代码执行复杂的业务逻辑，但它们不能自行发起新交易，始终依赖
    EOA。它们所能做的只是根据其“代码”中编程的逻辑，响应其他交易（显然是通过发起交易）。


    请查看以下三种场景（图 4-3 至 4-5），以更好地理解 EOA 和合约账户之间的通信。


    **EOA 到 EOA 交易：**


    ![A440588_1_En_4_Fig3_HTML.jpg](img/A440588_1_En_4_Fig3_HTML.jpg)


    图 4-3


    EOA 到 EOA 交易


    **EOA 到合约账户交易：**


    ![A440588_1_En_4_Fig4_HTML.jpg](img/A440588_1_En_4_Fig4_HTML.jpg)


    图 4-4


    EOA 到合约账户交易


    **EOA 到合约账户再到其他合约账户交易：**


    ![A440588_1_En_4_Fig5_HTML.jpg](img/A440588_1_En_4_Fig5_HTML.jpg)


    图 4-5


    EOA 到合约账户再到合约账户交易


    为了避免上述表示造成混淆，请注意，合约账户是内部的，它们之间的通信也是内部的。与 EOA 账户不同（EOA 发起交易并将其注入区块链），合约账户以及它们之间的交易是内部现象。

    '
- fmt: '### UTXOs 的优势


    我们必须理解，比特币的设计理念是在尽可能的范围内保持匿名性。当与以太坊进行比较时，UTXO 的以下优势似乎具有重要意义：


    - **更好的隐私性**：在比特币中，建议在接收交易时使用新地址，这有助于加强匿名性。即使运用复杂的统计或机器学习技术，也很难（尽管并非不可能）将账户关联起来。

    - **潜在的更高可扩展性**：关于可扩展性的讨论通常非常主观，取决于具体情境、手头的用例以及许多其他因素。这里的意图仅仅是提及 UTXO 固有的扩展潜力。并行执行交易非常容易。此外，当所有者或其他维护某些代币的
    Merkle 所有权证明数据的节点丢失这些数据时，仅所有者受到影响。相反，当某个账户的 Merkle 树数据丢失时，对该账户的任何操作都将不可行，甚至向其发送交易也不行。


    ### 账户的优势


    尽管以太坊在某种程度上是比特币的扩展，但它是以一种全新的设计理念构思的，并有其自身的一套利弊权衡。让我们来看看与比特币设计相比，以太坊账户的以下优势：


    - **显著的空间节省**：在比特币中，当多笔交易被合并成一笔交易时（例如，如果你需要支付 5 BTC，但你从未收到过一笔至少 5 BTC 的交易可用于此情况，那么你必须捆绑多笔交易以使总额超过
    5 BTC），就需要引用所有这些单独的交易。此外，所有这些交易都必须有不同的地址，因此交易数量与地址数量一样多！然而，在以太坊账户中，只需引用一个账户就足够了。尽管以太坊使用了
    Merkle Patricia 树（MPT），它比 Merkle 树更占用空间，但对于复杂交易，你最终会节省大量空间。

    - **编码简单**：由于 UTXO 和脚本不是图灵完备的，因此很难设计复杂的系统。UTXO 要么已花费，要么未花费；两者之间不存在其他状态。这使得编写复杂的业务逻辑变得困难。即使赋予脚本更多能力，与仅使用账户相比，它也会变得更加复杂。由于以太坊的目标是超越加密货币，并适应各种不同用例（通过
    DApps），因此基于账户的系统几乎是不可避免的。

    - **轻客户端引用**：与比特币客户端不同，以太坊客户端应用可以通过在状态树中沿特定方向扫描，轻松快速地访问与某个账户相关的所有数据。在 UTXO 模型中，对于所考虑的特定交易，通常存在多个对多笔交易的引用。


    ### 账户状态


    我们了解到每个账户都有一个与之关联的状态。我们还了解了以太坊中存在的两种账户：一种是合约账户，另一种是外部拥有账户（EOA）。无论账户类型如何，它们都由区块头中的
    `stateRoot` Merkle 根跟踪，并可能如图 [4-6](#A440588_1_En_4_Chapter.html#Fig6) 所示。


    ![A440588_1_En_4_Fig6_HTML.jpg](A440588_1_En_4_Fig6_HTML.jpg)


    图 4-6：放大查看账户状态表示


    如图所示，无论账户是 EOA 还是合约账户，它都有以下四个组成部分：


    - **账户余额**：账户中的“以太”总余额。更准确地说，是该地址拥有的 `Wei` 数量（`1ETH = 10^18 Wei`）。

    - **CodeHash**：这是“代码”的哈希值。每个合约账户都有在 EVM 上执行的“代码”。该代码的哈希值存储在此 `CodeHash` 字段中。然而，对于
    EOA 账户，没有“代码”，因此 `CodeHash` 字段包含空字符串的哈希值。

    - **StorageRoot**：这是编码账户存储内容的 Merkle 树的 256 位根哈希。MPT 对存储内容的哈希值进行编码。将树的根哈希保存在 `StorageRoot`
    字段中，有助于跟踪账户的内容并确保其完整性。

    - **Nonce**：这是一个计数器，确保每笔交易只被处理一次。对于 EOA，此数字表示从该账户地址发出的交易数量。对于合约账户，它表示由该账户创建的合约数量。


    因此，正是“状态”树负责跟踪以太坊区块链的状态变化。然而，有一点棘手的是，状态并非直接存储在每个区块中，而是以递归长度前缀（RLP）编码的状态数据形式存储在每个以太坊节点的
    MPT 中。因此，为了维护全局状态，以太坊区块链在每个区块中都包含了“状态根”，该根存储了表示区块创建时系统状态的哈希树的 Merkle 根。


    根据以太坊黄皮书，“世界状态”是地址（160 位标识符）与账户状态之间的映射。因此，世界状态包含了区块链上所有账户的信息，但并未存储在每个区块中。每个区块只修改状态的一部分。在某种程度上，世界状态是通过处理自创世区块以来的每个区块而生成的。某些以太坊节点可以选择通过保留所有历史交易（即状态转换及其输出）来维护所有历史状态。这允许客户端在任何时候查询区块链的状态，即使是历史状态，也无需从头重新计算所有内容。检索状态信息类似于
    SQL 中的聚合查询，数据随时可用，仅需进行聚合。因此，旧的状态数据可以很容易地被丢弃（这称为“修剪”），因为在需要时可以重新计算出来。嗯，状态数据按设计是隐式数据，这意味着状态信息只应被计算出来。'
  raw: '#### Advantages of UTXOs


    We must understand that Bitcoin’s design perspective was to maintain anonymity
    to an extent possible. When we compare it with Ethereum, the following advantages
    of UTXOs seem to have a lot of significance:


    *   Better privacy: In Bitcoins, it is advisible to use a new address while receiving
    transactions, which helps reinforce anonymity. Even with sophisticated statistical
    or machine learning techniques, it is difficult to link the accounts together,
    though not impossible.

    *   Potentially more scalable: The discussion pertaining to scalability is usually
    very subjective and depends on the context, use case at hand, and many other factors.
    The intention here is to just mention UTXO’s inherent potential to scale. It is
    very easy to execute the transactions in parallel. Also, when an owner or other
    nodes maintaining the Merkle proof of ownership data for some coins lose this
    data, only the owner is impacted. On the contrary, when Merkle tree data for some
    account is lost, then any operation on that account would not be feasible, even
    sending to it.


    #### Advantages of Accounts


    Even though Ethereum in a way is an extention to Bitcoin, it is imagined with
    a whole new design with its own set of pros–cons tradeoff. Let us take a look
    at the following advantages of Ethereum accounts compared with Bitcoin design:


    *   Significant space saving: In Bitcoins, when multiple transactions are clubbed
    together to make one transaction (e.g., if you have to make a 5BTC transaction
    and you never received one transaction with at least 5BTC that you could use in
    this case, then you have to bundle multiple transactions so the total exceeds
    5BTC), that many references to those individual transactions must be made. Also,
    all those transactions must have different addresses, so as many transactions,
    that many addresses also! In Ethereum accounts, however, just one reference to
    an account is good enough. Even though Ethereum uses Merkle Patricia tree (MPT)
    , which is a bit more space intensive than Merkle tree, you end up saving a significant
    amount of space for complex transactions.

    *   Simple to code: Along with UTXOs and scripts that are not Turing-complete,
    it is difficult to design complex systems. UTXOs can either be spent or unspent;
    there is no other state possible in between. Which makes it difficult to code
    up complex business logics. Even if the scripts are empowered to do more, it gets
    more complicated as compared with just using accounts. Since the objective of
    Ethereum is to go beyond cryptocurrency and accommodate different kinds of use
    cases (through DApps), an accounts-based system is almost inevitable.

    *   Lightweight client reference: Unlike Bitcoin clients, Ethereum client applications
    can easily and quickly access all the data related to an account by scanning down
    the state tree in a specific direction. In the UTXO model, there are usually multiple
    references to multiple transactions associated to any specific transaction under
    consideration.


    #### Account State


    We learned that every account has a state associated with it. We also looked at
    the two kinds of accounts that exist with Ethereum, one is a Contract Account
    and the other is an Externally Owned Account or EOA. Regardless of the account
    type, they are tracked by the “stateRoot” Merkle root in the block header and
    may appear as shown in Figure [4-6](#A440588_1_En_4_Chapter.html#Fig6).


    ![A440588_1_En_4_Fig6_HTML.jpg](A440588_1_En_4_Fig6_HTML.jpg)


    Figure 4-6


    Zooming in to account state representation


    As you can see in the figure, irrespective of whether the account is an EOA or
    or a Contract Account, it has the following four components:


    *   Account balance: Total “Ether” balance in the account. More precisely, number
    of Wei owned by the address (1ETH = 10^(18) Wei)

    *   CodeHash: This is the hash of the “code.” Every Contract Account has “code”
    in it that gets executed on the EVM. The hash of this code is stored in this CodeHash
    field. For the EOA accounts, however, there is no “code,” so the CodeHash field
    contains the hash of empty string.

    *   StorageRoot: It is the 256-bit root hash of Merkle tree that encodes the storage
    contents of an account. The MPT encodes the hash of the storage content. Keeping
    the root hash of this tree in the StorageRoot field helps track the content of
    an account and also helps ensure its integrity.

    *   Nonce: It is a counter that ensures each transaction is processed only once.
    For EOAs, this number represents the number of transactions from the account’s
    address. For Contract Accounts, it represents the number of contracts created
    by this account.


    So, it is the “state” trie that is responsible to keep track of the state changes
    of Ethereum blockchain. However, what is a bit tricky is that the state is not
    directly stored in each block, rather in the form of Recursive Length Prefix (RLP)-encoded
    state data in MPT at every Ethereum node. So, to maintain the global state, the
    Ethereum blockchain includes “state roots” in each and every block that store
    the root hash of the hash tree (Merkle root) representing the system state at
    the time the block was created.


    As per the Ethereum Yellow Paper, the “World State” is a mapping between addresses
    (160-bit identifiers) and account states. So, the World State has the information
    of all the accounts in blockchain, but is not stored in each block. Each block
    only modifies parts of the state. In a way, the World State is generated processing
    each block since the genesis block. Certain Ethereum nodes can choose to maintain
    all historical states by keeping all the historical transactions, that is, state
    transitions and their outputs. This allows clients to query the state of the blockchain
    at any time, even for the historic ones, without having to recalculate everything
    from the beginning. Retrieving the state information is similar to an aggregate
    query in SQL where data is readily available; just aggregation is required. So,
    old state data can easily be discarded (this is known as “pruning”) because they
    can be computed back when required. Well, the state data by design is implicit
    dada, which means state information should only be calculated.'
  trans: '

    ### UTXOs 的优势


    我们必须理解，比特币的设计理念是在尽可能的范围内保持匿名性。当与以太坊进行比较时，UTXO 的以下优势似乎具有重要意义：


    - **更好的隐私性**：在比特币中，建议在接收交易时使用新地址，这有助于加强匿名性。即使运用复杂的统计或机器学习技术，也很难（尽管并非不可能）将账户关联起来。

    - **潜在的更高可扩展性**：关于可扩展性的讨论通常非常主观，取决于具体情境、手头的用例以及许多其他因素。这里的意图仅仅是提及 UTXO 固有的扩展潜力。并行执行交易非常容易。此外，当所有者或其他维护某些代币的
    Merkle 所有权证明数据的节点丢失这些数据时，仅所有者受到影响。相反，当某个账户的 Merkle 树数据丢失时，对该账户的任何操作都将不可行，甚至向其发送交易也不行。


    ### 账户的优势


    尽管以太坊在某种程度上是比特币的扩展，但它是以一种全新的设计理念构思的，并有其自身的一套利弊权衡。让我们来看看与比特币设计相比，以太坊账户的以下优势：


    - **显著的空间节省**：在比特币中，当多笔交易被合并成一笔交易时（例如，如果你需要支付 5 BTC，但你从未收到过一笔至少 5 BTC 的交易可用于此情况，那么你必须捆绑多笔交易以使总额超过
    5 BTC），就需要引用所有这些单独的交易。此外，所有这些交易都必须有不同的地址，因此交易数量与地址数量一样多！然而，在以太坊账户中，只需引用一个账户就足够了。尽管以太坊使用了
    Merkle Patricia 树（MPT），它比 Merkle 树更占用空间，但对于复杂交易，你最终会节省大量空间。

    - **编码简单**：由于 UTXO 和脚本不是图灵完备的，因此很难设计复杂的系统。UTXO 要么已花费，要么未花费；两者之间不存在其他状态。这使得编写复杂的业务逻辑变得困难。即使赋予脚本更多能力，与仅使用账户相比，它也会变得更加复杂。由于以太坊的目标是超越加密货币，并适应各种不同用例（通过
    DApps），因此基于账户的系统几乎是不可避免的。

    - **轻客户端引用**：与比特币客户端不同，以太坊客户端应用可以通过在状态树中沿特定方向扫描，轻松快速地访问与某个账户相关的所有数据。在 UTXO 模型中，对于所考虑的特定交易，通常存在多个对多笔交易的引用。


    ### 账户状态


    我们了解到每个账户都有一个与之关联的状态。我们还了解了以太坊中存在的两种账户：一种是合约账户，另一种是外部拥有账户（EOA）。无论账户类型如何，它们都由区块头中的
    `stateRoot` Merkle 根跟踪，并可能如图 4-6 所示。


    ![A440588_1_En_4_Fig6_HTML.jpg](img/A440588_1_En_4_Fig6_HTML.jpg)


    图 4-6：放大查看账户状态表示


    如图所示，无论账户是 EOA 还是合约账户，它都有以下四个组成部分：


    - **账户余额**：账户中的“以太”总余额。更准确地说，是该地址拥有的 `Wei` 数量（`1ETH = 10¹⁸ Wei`）。

    - **CodeHash**：这是“代码”的哈希值。每个合约账户都有在 EVM 上执行的“代码”。该代码的哈希值存储在此 `CodeHash` 字段中。然而，对于
    EOA 账户，没有“代码”，因此 `CodeHash` 字段包含空字符串的哈希值。

    - **StorageRoot**：这是编码账户存储内容的 Merkle 树的 256 位根哈希。MPT 对存储内容的哈希值进行编码。将树的根哈希保存在 `StorageRoot`
    字段中，有助于跟踪账户的内容并确保其完整性。

    - **Nonce**：这是一个计数器，确保每笔交易只被处理一次。对于 EOA，此数字表示从该账户地址发出的交易数量。对于合约账户，它表示由该账户创建的合约数量。


    因此，正是“状态”树负责跟踪以太坊区块链的状态变化。然而，有一点棘手的是，状态并非直接存储在每个区块中，而是以递归长度前缀（RLP）编码的状态数据形式存储在每个以太坊节点的
    MPT 中。因此，为了维护全局状态，以太坊区块链在每个区块中都包含了“状态根”，该根存储了表示区块创建时系统状态的哈希树的 Merkle 根。


    根据以太坊黄皮书，“世界状态”是地址（160 位标识符）与账户状态之间的映射。因此，世界状态包含了区块链上所有账户的信息，但并未存储在每个区块中。每个区块只修改状态的一部分。在某种程度上，世界状态是通过处理自创世区块以来的每个区块而生成的。某些以太坊节点可以选择通过保留所有历史交易（即状态转换及其输出）来维护所有历史状态。这允许客户端在任何时候查询区块链的状态，即使是历史状态，也无需从头重新计算所有内容。检索状态信息类似于
    SQL 中的聚合查询，数据随时可用，仅需进行聚合。因此，旧的状态数据可以很容易地被丢弃（这称为“修剪”），因为在需要时可以重新计算出来。嗯，状态数据按设计是隐式数据，这意味着状态信息只应被计算出来。

    '
- fmt: '### Trie Usage


    We learned the three types of tries that have their roots in the block header.
    These roots are basically the pointers to those three tries. Though we looked
    at the one-liner explanations of these tries in previous sections, let us just
    revisit them with a slightly different choice of words:


    - **State trie**: It represents the entire state (the global state) after accessing
    the block.

    - **Transaction trie**: It represents all the transactions in a block keyed by
    index (i.e., key:0 for the first transaction to execute, key:1 for the second
    transaction, etc.). Recollect the MPT fundamentals we covered earlier and try
    to correlate.

    - **Receipt trie**: It represents the "receipts" corresponding to each transaction.
    A receipt for a transaction is an RLP-encoded data structure as shown below:


    ```

    [ medstate, gas_used, logbloom, logs ]

    ```


    Let’s now dig deeper into the Receipt trie as we haven’t covered the basics yet
    on this. Take a look at all the fields in the Receipt trie’s RLP-encoded data
    structure and follow through the following descriptions for those fields:


    - **`medstate`**: It is the State trie root after processing the transaction.
    A successful transaction updates the Ethereum state.

    - **`gas_used`**: It is the total amount of gas used for processing the transaction.

    - **`logs`**: It is a list of items of the form:


    ```

    [address, [topic1, topic2...], data]

    ```


    - These list items are produced by the `LOG0`, `LOG1`... opcodes during the execution
    of the transaction. The `address` field is the address of the contract that produced
    the log, the `topic` fields are up to four 32-byte values, and the `data` field
    is an arbitrarily sized byte array.

    - **`logbloom`**: It is a Bloom filter made up of the addresses and topics of
    all logs in the transaction. This is different from the one present in the block
    header.


    ### Merkle Patricia Tree


    In Ethereum, the accounts are mapped with their respective states. The mapping
    between all the Ethereum accounts, including EOAs and Contract Accounts with their
    states, is collectively referred to as World States. To store this mapping data,
    the data structure used in Ethereum is the MPT. So, MPT is the principal data
    structure used in Ethereum, which is otherwise known as Merkle Patricia trie.
    We learned about the Merkle trees in the Bitcoin chapter, which already takes
    us half way through in understanding MPT. MPT is actually derived by taking elements
    from both Merkle tree and Patricia tree.


    Recollect from the Bitcoin chapter that Merkle trees are the binary hash trees
    where the leaf nodes contain the hash of the data blocks and every non-leaf node
    contains the hashes of their child nodes. When such a data structure is implemented,
    it becomes easy to check if a certain transaction was a part of a block. Only
    by using very little information from the entire block, that is, by using just
    the Merkle branch instead of the entire tree, providing proof of membership was
    quite easy. Merkle trees facilitate efficient and secure verification of the contents
    in decentralized systems. Instead of downloading every transaction and every block,
    the light clients can only download the chain of block headers, that is, 80-byte
    chunks of data for each block that contain only five things: hash of the previous
    block header, timestamp, mining difficulty, nonce value that satisfied PoW, and
    the root hash of the Merkle tree containing all the transactions for that block.
    While it is quite useful and interesting, note here that apart from validating
    the proof of membership for a transaction in a block, there is nothing much you
    could do. One particular limitation is that no information can be proved about
    the current state (e.g., total digital asset holdings, name registrations, status
    of financial contracts). Even to check how many Bitcoins you hold, quite a lot
    of querying and validating is involved.


    Patricia trees on the other hand are a form of Radix trees. The name PATRICIA
    stands for “Practical Algorithm to Retrieve Information Coded In Alphanumeric.”
    A Patricia tree facilitates efficient insert/delete operations. The key-value
    lookups in the Patricia tree are very efficient. Keys are always encoded in the
    path. So, `key` is the path that you take from the root till the leaf node where
    the `value` is stored. Keys are usually the strings that help descend down the
    path where each character indicates which child node to follow to reach the leaf
    node and find the value stored in it.


    So, the MPTs provide a cryptographically authenticated data structure used to
    store all (`key`, `value`) bindings in Ethereum. They are fully deterministic,
    meaning that a Patricia tree with the same (`key`, `value`) bindings will surely
    be the same down to the last byte. The insert, lookup, and delete operations are
    quite efficient with `O(log(n))` complexity. Due to the Merkle part in MPT, hash
    of a node is used as the pointer to the node and the MPT is constructed accordingly,
    where:


    ```

    Key == SHA3(RLP(value))

    ```


    While the Merkle part provides a tamper-proof and deterministic tree structure,
    the Patricia part provides an efficient information retrieval feature. So, if
    you notice carefully, the root node in MPT becomes a cryptographic fingerprint
    of the entire data structure. In the Ethereum P2P network, when transactions are
    broadcast over the wire, they are assembled by every mining node that received
    them. The nodes then form a Tree (a.k.a. trie) and compute the root hash to include
    in the Block header. While the transactions are stored locally in the tree, they
    are sent to other nodes or clients after they are serialized to lists. The receiving
    parties have to deserialize them back to form the transaction tree to verify against
    the root hash. Also note that in Ethereum, MPTs are a little modified for better
    fitment with Ethereum implementation. Instead of binary, hexadecimal is used —
    X characters from a 16 character “alphabet.” Hence nodes in the tree or trie have
    16 child nodes (the 16 character hex alphabet) and a maximum depth of X. Just
    to let you know, a hex character is referred to as a “nibble” in many places.


    The basic idea of an MPT in Ethereum is that for a single operation, it will only
    modify the minimum amount of nodes to recalculate the root hash. This way the
    storage and complexities are kept minimal.'
