  trans: '

    ### 链下计算


    链下计算是扩展区块链解决方案最有前景的技术之一。其核心理念是限制区块链的使用，将繁重的计算任务放在链外完成，仅将最终结果存储在链上。请注意，链下计算并没有标准的执行方式，它高度依赖于具体场景和解决问题的人群。此外，不同类型的区块链可能需要采用不同的链下计算方法。从宏观层面看，它就像是区块链之上的一层，负责处理大量计算密集型工作，并明智地使用区块链资源。显然，通过链下计算你可能无法保留区块链的所有特性，但同样，你也并非所有计算需求都需要依赖区块链，可以仅将其用于解决特定痛点。


    链下计算可以在侧链上进行，可以分布在随机节点组中，也可以是中心化的。侧链独立于主区块链，它不仅有助于更好地扩展区块链，还能将损害隔离在侧链内，防止主区块链受到侧链问题的波及。一个典型的侧链例子是比特币的“闪电网络”，它有助于以极低费用快速执行交易，并能支持微支付。比特币的另一个侧链例子是“零币”，其主要目的并非可扩展性，而是隐私保护。如果你使用零币进行比特币交易，你的交易将无法被追踪，从而保护了隐私。本书将把讨论范围限定在通用的可扩展性技术上，不会深入探讨比特币的可扩展性细节。


    此时你可能产生一个显而易见的问题：如果交易通过链下发送，人们如何验证其真实性？首先，创建一笔有效交易并不需要区块链。我们在本章的“密码学”部分已经了解了区块链系统所使用的非对称密钥密码学。要进行交易，你必须拥有一个私钥的所有权，这样你才能对交易进行签名。交易创建后，将其纳入区块链会带来诸多优势。例如，比特币区块链可以防止双重支付，还有其他优势。目前，你只需明白一点：只要你拥有自己账户的私钥，就能创建交易。


    比特币区块链是一种“无状态”区块链，它不维护账户的状态。比特币区块链中的所有信息都以交易的形式存在。要发起一笔交易，你必须消耗一笔之前的交易，而且账户没有所谓的“期末余额”概念。相比之下，以太坊区块链则是“有状态”的！以太坊区块链中的区块包含了整个区块的状态信息，其中就包括账户余额。当网络中每个节点都维护这些状态信息时，它们会占用大量空间。对于其他有状态的区块链而言，情况也是如此。


    让我们通过一个例子来更好地理解。假设爱丽丝和鲍勃双方之间有多笔交易。比方说，他们通常每个月有 50 笔货币交易。在一个有状态的区块链中，所有这些单独的交易都会包含各自的状态信息，并且这些信息将由所有节点维护。为了解决这一挑战，“状态通道”的概念应运而生。其理念是，只在月底或达到某个交易阈值时，才将最终结果更新到区块链上，而不是更新每一笔交易。


    状态通道本质上是用户、对象或服务之间的双向通信通道。通过使用密码学技术，它可以实现绝对安全。为了让你对其工作原理有所了解，请参考图 2-28。


    ![A440588_1_En_2_Fig28_HTML.jpg](img/A440588_1_En_2_Fig28_HTML.jpg)


    图 2-28


    用于链下计算的状态通道


    请注意，链下状态通道通常是私密的，并且仅限于一组参与者之间。请记住，第一步需要锁定参与者在区块链上的状态。这可以通过多重签名方案或基于智能合约的锁定来实现。锁定后，参与者之间进行密码学保护的交易。所有交易都经过密码学签名，使其可验证，并且这些交易不会立即提交到区块链。如前所述，这些状态通道可以预设生命周期，也可以根据交易量、交易次数或其他任何可量化指标来设定其存续范围。最终，交易的最终结果会在区块链上结算，并解锁状态，这是最后一步。


    状态通道在不同的用例中可以有截然不同的实现方式，其具体实现实际上交由开发者决定。这无疑是前进的方向，也是区块链应用走向主流采纳最关键的核心组件之一。对于比特币而言，闪电网络就是为了实现链下计算并加速支付交易而设计的。类似地，“雷电网络”则是为以太坊区块链设计的。还有许多其他类似的开发项目，旨在使区块链网络上的微支付更快、更可行。

    '
- fmt: '### Sharding Blockchain State


    Sharding is one of the scalability techniques that has been there for ages and
    has been a more sought-after topic for databases. People used this technique differently
    in different use cases to address specific scalability challenges. Before we understand
    how it could be used in scaling blockchain as well, let us first understand what
    it means.


    Disk read/write has always been a bottleneck when dealing with huge data sets.
    When the data is partitioned across multiple disks, the read/write could be performed
    in parallel and latency decreases significantly. This technique is called sharding.
    Take a look at Figure [2-29](#A440588_1_En_2_Chapter.html#Fig29).


    ![A440588_1_En_2_Fig29_HTML.jpg](A440588_1_En_2_Fig29_HTML.jpg)


    Figure 2-29


    Database sharding example


    Notice in Figure [2-29](#A440588_1_En_2_Chapter.html#Fig29) how horizontal partitioning
    is done to distribute a 300GB database table into three shards of 100GB each and
    stored on separate server instances. The same concept is also applicable for blockchain,
    where the overall blockchain state is divided into different shards that contain
    their own substates. Well, it is definitely not as easy as sharding a database
    with just doing horizontal partitioning.


    So, how does sharding really work in the context of blockchain? The idea is that
    the nodes wouldn’t be required to download and keep a copy of the entire blockchain.
    Instead, they would download and keep the portions (shards) relevant to them.
    By doing so, they get to process only those transactions that are relevant to
    the data they store, and parallel execution of transactions is possible. So, when
    a transaction occurs, it is routed to only specific nodes depending on which shards
    they affect. If you look at it from a different lens, all the nodes are not required
    to do all sorts of calculations and verifications for each and every transaction.
    A mechanism or a protocol could be defined for communication between shards when
    more than one shard is required to process any specific transactions. Please keep
    in mind that different blockchains might have different variants of sharding.


    To give you an example, you might choose a specific sharding technique for a given
    situation. One example could be where shards are required to have multiple unique
    accounts in them. In other words, each unique account is in one shard (more applicable
    for Ethereum style blockchains that are stateful), and it is very easy for the
    accounts in one shard to transact among themselves. Obviously, one more level
    extraction at a shard level is required for sharding to work, and the nodes could
    keep only a subset of the information.


    ## Summary


    In this chapter, we took a deep dive into the core fundamentals of cryptography,
    game theory, and computer science engineering. The concepts learned would help
    you design your own blockchain solution that may have some specific needs. Blockchain
    is definitely not a silver bullet for all sorts of problems. However, for the
    ones where blockchain is required, it is highly likely that different flavors
    of blockchain solutions would be needed with different design constructs.


    We learned different cryptographic techniques to secure transactions and the usefulness
    of hash functions. We looked at how game theory could be used to design robust
    solutions. We also learned some of the core computer science fundamentals such
    as blockchain data structure and Merkle trees. Some of the concepts were supplemented
    with example code snippets to give you a jump start on your blockchain assignments.


    In the next chapter, we will learn about Bitcoin as a blockchain use case, and
    how exactly it works.


    # 3. How Bitcoin Works


    Blockchain technology is all the rage these days, thanks to Bitcoin! Blockchain
    as we know it is a gift of Bitcoin and its inventor, Satoshi Nakamoto, to the
    whole world. If you are wondering who Satoshi Nakamoto is, it is the name used
    by the unknown person or persons who originated Bitcoin. We suggest that you understand
    and appreciate the wonderful technology behind Bitcoin without searching for the
    inventor. Learning the technical fundamentals of Bitcoin will enable you to understand
    the other blockchain applications that are there in the market.


    Since Bitcoin testified to the robustness of blockchain technology for years,
    people now believe in it and have started exploring other possible ways to use
    it. In the previous chapter, we already got the hang of how blockchain works at
    a technical level, but learning Bitcoin can give you the real taste of blockchain.
    You may want to consider Bitcoin as a cryptocurrency use case of blockchain technology.
    So, this chapter will not only help you understand how Bitcoin works in particular,
    but also give you a perspective of how different use cases can be built using
    blockchain technology, the way Bitcoin is built.


    We will cover Bitcoin in greater detail throughout this chapter and while doing
    so, a lot of blockchain fundamentals will also be clarified with more practical
    insights. If you are already familiar with the Bitcoin fundamentals, you may skip
    this chapter. Otherwise, we advise you to follow through the concepts in the order
    presented. This chapter explains what Bitcoin is, how it is designed technically,
    and provides an analysis of some inherent strengths and weaknesses of Bitcoin.'
