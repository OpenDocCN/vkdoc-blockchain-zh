    # 在网络中发送消息之前，使用鲍勃的公钥加密消息...\nencrypted_for_bob  = bobPK.encrypt(secret_message,\
    \ 32)\n# 鲍勃使用自己的私钥解密消息...\ndecrypted_message   = bobKey.decrypt(encrypted_for_bob)\n\
    print \"解密后的消息:\", decrypted_message\n# 鲍勃将使用以下函数，通过爱丽丝的公钥验证她的签名\ndef verify_signature(message,PublicKey,signature):\n\
    \    message_hash=sha256(message).digest()\n    verify = PublicKey.verify(message_hash,signature)\n\
    \    return verify\n# 鲍勃使用解密后的消息和爱丽丝的公钥进行验证\nprint \"爱丽丝对解密后消息的签名是否有效？\", verify_signature(decrypted_message,alicePK,\
    \ alice_sign)\n```\n\n## ECDSA 算法\n\n```\nimport ecdsa\n# SECP256k1 是比特币椭圆曲线\n\
    signingKey = ecdsa.SigningKey.generate(curve=ecdsa.SECP256k1)\n# 获取验证密钥\nverifyingKey\
    \ = signingKey.get_verifying_key()\n# 生成消息的签名\nsignature = signingKey.sign(b\"\
    signed message\")\n# 验证签名对于消息是否有效\nverifyingKey.verify(signature, b\"signed message\"\
    ) # 正确。签名有效\n# 验证签名对于消息是否有效\nassert verifyingKey.verify(signature, b\"message\"\
    ) # 抛出错误。签名对该消息无效\n```\n\n## Diffie-Hellman 密钥交换\n\n我们在前面的章节中已经学习了对称密钥密码学。回想一下，在发送方和接收方之间共享秘密是一个非常巨大的挑战。根据经验法则，我们现在知道通信信道总是不安全的。总是可能存在一个名叫伊芙的攻击者，试图通过各种不同类型的攻击来拦截你正在传输的消息。因此，DH\
    \ 技术被开发出来，用于安全地交换密码密钥。显然，你一定会疑惑，当通信信道本身不安全时，如何可能进行安全的密钥交换？好吧，在本节后面你将看到，DH 技术并非真正地在两方之间共享整个秘密密钥，而是关于共同创建密钥。归根结底，重要的是发送方和接收方拥有相同的密钥。然而，请记住，这不是非对称密钥密码学，因为在交换过程中并未进行加密/解密。事实上，它是后来设计非对称密钥密码学的基础。我们现在讨论这项技术的原因在于，我们在上一节中已经学习的许多数学知识在这里很有用。\n\
    \n在进入数学解释之前，让我们先尝试从高层次理解这个概念。请看下图（图 2-16），它用颜色对 DH 算法进行了简单解释。\n\n![A440588_1_En_2_Fig16_HTML.jpg](img/A440588_1_En_2_Fig16_HTML.jpg)\n\
    \n**图 2-16**\n\nDiffie-Hellman 密钥交换示意图\n\n注意，在第一步中，只有黄色在两方之间共享，它可以代表任何其他颜色或一个随机数。然后，双方将自己的秘密加入其中并制作成混合物。该混合物再次通过同一个不安全的信道共享。接着，各方将自己的秘密加入其中，形成最终的公共秘密。在这个使用颜色的示例中，观察公共秘密是由相同颜色组合而成的。现在，让我们看看密钥生成过程中实际发生的数学步骤：\n\
    \n* 爱丽丝和鲍勃约定 `P = 23` 和 `G = 9`\n* 爱丽丝选择私钥 `a = 4`，计算 `9⁴ mod 23 = 6`，并将其发送给鲍勃\n\
    * 鲍勃选择私钥 `b = 3`，计算 `9³ mod 23 = 16`，并将其发送给爱丽丝\n* 爱丽丝计算 `16⁴ mod 23 = 9`\n* 鲍勃计算\
    \ `6³ mod 23 = 9`\n\n如果你遵循这些步骤，你会发现爱丽丝和鲍勃都能在自己的终端生成相同的秘密密钥，该密钥可用于加密/解密。为了便于理解，我们在示例中使用了较小的数字，但在实际应用场景中会使用大质数。为了更好地理解，让我们浏览以下代码片段，看看如何以简单的方式实现\
    \ DH 算法：\n\n```\n/* 使用 Diffie-Hellman 密钥交换算法为两方计算密钥的程序 */\n// 返回 a ^ b mod P 值的函数\n\
    long long int power(long long int a, long long int b, long long int P)\n{\n  \
    \  if (b == 1)\n        return a;\n    else\n        return (((long long int)pow(a,\
    \ b)) % P);\n}\n// DH 密钥计算的主程序\nint main()\n{\n    long long int P, G, x, a, y,\
    \ b, ka, kb;\n    // 双方约定公钥 G 和 P\n    P = 23; // 取一个质数 P\n    printf(\"P 的值为:\
    \ %lld\\n\", P);\n    G = 9; // 取 P 的一个本原根 G\n    printf(\"G 的值为: %lld\\n\\n\"\
    , G);\n    // 爱丽丝将选择私钥 a\n    a = 4; // a 是选择的私钥\n    printf(\"爱丽丝的私钥 a: %lld\\\
    n\", a);\n    x = power(G, a, P); // 获取生成的密钥\n    // 鲍勃将选择私钥 b\n    b = 3; //\
    \ b 是选择的私钥\n    printf(\"鲍勃的私钥 b: %lld\\n\\n\", b);\n    y = power(G, b, P); //\
    \ 获取生成的密钥\n    // 密钥交换后生成秘密密钥\n    ka = power(y, a, P); // 爱丽丝的秘密密钥\n    kb =\
    \ power(x, b, P); // 鲍勃的秘密密钥\n    printf(\"爱丽丝的秘密密钥是: %lld\\n\", ka);\n    printf(\"\
    鲍勃的秘密密钥是: %lld\\n\", kb);\n    return 0;\n}\n```\n\n> **注意：** 虽然传统上使用离散对数问题（`x^y\
    \ mod p`），但一般流程也可以修改为使用椭圆曲线密码学。\n"
- fmt: "### Symmetric vs. Asymmetric Key Cryptography\n\nWe looked at various aspects\
    \ and types of both symmetric and asymmetric key algorithms. Obviously, their\
    \ design goals and implications are different. Let us have a comparative analysis\
    \ so that we use the right one at the right place.\n\n**Table 2-5**  \nKey Requirements\
    \ Comparison for Symmetric and Asymmetric Key Techniques\n\n![A440588_1_En_2_Figm_HTML.jpg](A440588_1_En_2_Figm_HTML.jpg)\n\
    \n- `Symmetric key cryptography` is also referred to as `private key cryptography`.\
    \ Similarly, `asymmetric key cryptography` is also called `public key cryptography`.\n\
    - Key exchange or distribution in `symmetric key cryptography` is a big headache,\
    \ unlike `asymmetric key cryptography`.\n- `Asymmetric encryption` is quite compute-intensive\
    \ because the length of the keys is usually large. Hence, the process of encryption\
    \ and decryption is slower. On the contrary, `symmetric encryption` is faster.\n\
    - `Symmetric key cryptography` is appropriate for long messages because the speed\
    \ of encryption/decryption is fast. `Asymmetric key cryptography` is appropriate\
    \ for short messages, and the speed of encryption/decryption is slow.\n- In `symmetric\
    \ key cryptography`, symbols in plaintext and ciphertext are permuted or substituted.\
    \ In `asymmetric key cryptography`, plaintext and ciphertext are treated as integers.\n\
    - In many situations, when `symmetric key` is used for encryption and decryption,\
    \ `asymmetric key` technique is used to share and agree upon the key used in encryption.\n\
    - `Asymmetric key cryptography` finds its strongest application in untrusted environments,\
    \ when parties involved have no prior relationship. Since the unknown parties\
    \ do not get any prior opportunity to establish shared secret keys with each other,\
    \ sharing of sensitive data is secured through `public key cryptography`.\n- `Symmetric\
    \ cryptographic` techniques do not provide a way for digital signatures, which\
    \ are only possible through `asymmetric cryptography`.\n- Another good case is\
    \ the number of keys required among a group of nodes to communicate with each\
    \ other. How many keys do you think would be needed among, say, 100 participants\
    \ when `symmetric key cryptography` is needed? This problem of finding the keys\
    \ needed can be approached as a complete graph problem with order 100. Like each\
    \ vertex requires 99 connected edges to connect with everyone, every participant\
    \ would need 99 keys to establish secured connections with all other nodes. So,\
    \ in total, the keys needed would be `100 * (100 − 1) / 2 = 4,950`. It can be\
    \ generalized for \"n\" number of participants as `n * (n − 1) / 2` keys in total.\
    \ With an increased number of participant, it becomes a nightmare! However, in\
    \ the case of `asymmetric key cryptography`, each participant would just need\
    \ two keys (one private and one public). For a network of 100 participants, total\
    \ keys needed would be just 200. Table [2-5](#A440588_1_En_2_Chapter.html#Tab5)\
    \ shows some sample data to give you an analogy on the increased number of keys\
    \ needed when the number of participants increases.\n\n## Game Theory\n\nGame\
    \ Theory is a certainly quite an old concept and is being used in many real-life\
    \ situations to solve complex problems. The reason we are covering this topic\
    \ at a high level is because it is used in Bitcoins and many other blockchain\
    \ solutions. It was formally introduced by John von Neumann to study economic\
    \ decisions. Later, it was more popularized by John Forbes Nash Jr because of\
    \ his theory of \"Nash Equilibrium,\" which we will look into shortly. Let us\
    \ first understand what game theory is.\n\nGame theory is a theory on games, where\
    \ the games are not just what children play. Most are situations where two or\
    \ more parties are involved with some strategic behavior. Examples: A cricket\
    \ tournament is a game, two conflicting parties in a court of law with lawyers\
    \ and juries is a game, two siblings fighting over an ice cream is a game, a political\
    \ election is a game, a traffic signal is also a game. Another example: Say you\
    \ applied for a blockchain job and you are selected and offered a job offer with\
    \ some salary, but you reject the offer, thinking there is a huge gap in the demand\
    \ and supply and chances are good they will revise the offer with a higher salary.\
    \ You must be thinking now, what is not a game? Well, in real situations, almost\
    \ everything is a game. So, a \"game\" can be defined as a situation involving\
    \ a \"correlated rational choice.\" What it means is that the prospects available\
    \ for any player are dependent not only on their own choices, but also on the\
    \ choices that others make in a given situation. In other words, if your fate\
    \ is impacted by the actions of others, then you are in a game. So what is game\
    \ theory?\n\nGame theory is a study of strategies involved in complex games. It\
    \ is the art of making the best move, or opting for a best strategy in a given\
    \ situation based on the objective. To do so, one must understand the strategy\
    \ of the opponent and also what the opponent thinks your move is going to be.\
    \ Let us take a simple example: There are two siblings, one elder and the other\
    \ younger. Now, there are two ice creams in the fridge, one is orange flavor and\
    \ the other is mango flavor. The elder one wants to eat the orange flavor, but\
    \ knows if he opts for that, then the younger one would cry for the same orange.\
    \ So, he opts for the mango flavored ice cream and it turns out as expected, the\
    \ younger one wants the same. Now, the elder one pretends to have sacrificed the\
    \ mango flavored ice cream and gives it to the younger one and eats the orange\
    \ one himself. Look at the situation: this is a win-win for both the parties,\
    \ as this was the objective of the elder one. If the elder one wanted, he could\
    \ simply have fought with the younger kid and got the orange one if that was his\
    \ objective. In the second case, the elder one would strategize where to hit so\
    \ that the younger kid is not injured much but enough so that he gives up on the\
    \ orange flavored ice cream. This is game theory: what is your objective and what\
    \ should be your best move?"
  raw: '### Symmetric vs. Asymmetric Key Cryptography


    We looked at various aspects and types of both symmetric and asymmetric key algorithms.
    Obviously, their design goals and implications are different. Let us have a comparative
    analysis so that we use the right one at the right place.


    Table 2-5


    Key Requirements Comparison for Symmetric and Asymmetric Key Techniques


    ![A440588_1_En_2_Figm_HTML.jpg](A440588_1_En_2_Figm_HTML.jpg)


    *   Symmetric key cryptography is also referred to as private key cryptography.
    Similarly, asymmetric key cryptography is also called public key cryptography.

    *   Key exchange or distribution in symmetric key cryptography is a big headache,
    unlike asymmetric key cryptography.

    *   Asymmetric encryption is quite compute-intensive because the length of the
    keys is usually large. Hence, the process of encryption and decryption is slower.
    On the contrary, symmetric encryption is faster.

    *   Symmetric key cryptography is appropriate for long messages because the speed
    of encryption/decryption is fast. Asymmetric key cryptography is appropriate for
    short messages, and the speed of encryption/decryption is slow.

    *   In symmetric key cryptography, symbols in plaintext and ciphertext are permuted
    or substituted. In asymmetric key cryptography, plaintext and ciphertext are treated
    as integers.

    *   In many situations, when symmetric key is used for encryption and decryption,
    asymmetric key technique is used to share and agree upon the key used in encryption.

    *   Asymmetric key cryptography finds its strongest application in untrusted environments,
    when parties involved have no prior relationship. Since the unknown parties do
    not get any prior opportunity to establish shared secret keys with each other,
    sharing of sensitive data is secured through public key cryptography.

    *   Symmetric cryptographic techniques do not provide a way for digital signatures,
    which are only possible through asymmetric cryptography.

    *   Another good case is the number of keys required among a group of nodes to
    communicate with each other. How many keys do you think would be needed among,
    say, 100 participants when symmetric key cryptography is needed? This problem
    of finding the keys needed can be approached as a complete graph problem with
    order 100\. Like each vertex requires 99 connected edges to connect with everyone,
    every participant would need 99 keys to establish secured connections with all
    other nodes. So, in total, the keys needed would be 100 * (100 − 1)/2 = 4,950\.
    It can be generalized for “n” number of participants as n * (n − 1)/2 keys in
    total. With an increased number of participant, it becomes a nightmare! However,
    in the case of asymmetric key cryptography, each participant would just need two
    keys (one private and one public). For a network of 100 participants, total keys
    needed would be just 200\. Table [2-5](#A440588_1_En_2_Chapter.html#Tab5) shows
    some sample data to give you an analogy on the increased number of keys needed
    when the number of participants increases.


    ## Game Theory


    Game Theory is a certainly quite an old concept and is being used in many real-life
    situations to solve complex problems. The reason we are covering this topic at
    a high level is because it is used in Bitcoins and many other blockchain solutions.
    It was formally introduced by John von Neumann to study economic decisions. Later,
    it was more popularized by John Forbes Nash Jr because of his theory of “Nash
    Equilibrium,” which we will look into shortly. Let us first understand what game
    theory is.


    Game theory is a theory on games, where the games are not just what children play.
    Most are situations where two or more parties are involved with some strategic
    behavior. Examples: A cricket tournament is a game, two conflicting parties in
    a court of law with lawyers and juries is a game, two siblings fighting over an
    ice cream is a game, a political election is a game, a traffic signal is also
    a game. Another example: Say you applied for a blockchain job and you are selected
    and offered a job offer with some salary, but you reject the offer, thinking there
    is a huge gap in the demand and supply and chances are good they will revise the
    offer with a higher salary. You must be thinking now, what is not a game? Well,
    in real situations, almost everything is a game. So, a “game” can be defined as
    a situation involving a “correlated rational choice.” What it means is that the
    prospects available for any player are dependent not only on their own choices,
    but also on the choices that others make in a given situation. In other words,
    if your fate is impacted by the actions of others, then you are in a game. So
    what is game theory?


    Game theory is a study of strategies involved in complex games. It is the art
    of making the best move, or opting for a best strategy in a given situation based
    on the objective. To do so, one must understand the strategy of the opponent and
    also what the opponent thinks your move is going to be. Let us take a simple example:
    There are two siblings, one elder and the other younger. Now, there are two ice
    creams in the fridge, one is orange flavor and the other is mango flavor. The
    elder one wants to eat the orange flavor, but knows if he opts for that, then
    the younger one would cry for the same orange. So, he opts for the mango flavored
    ice cream and it turns out as expected, the younger one wants the same. Now, the
    elder one pretends to have sacrificed the mango flavored ice cream and gives it
    to the younger one and eats the orange one himself. Look at the situation: this
    is a win-win for both the parties, as this was the objective of the elder one.
    If the elder one wanted, he could simply have fought with the younger kid and
    got the orange one if that was his objective. In the second case, the elder one
    would strategize where to hit so that the younger kid is not injured much but
    enough so that he gives up on the orange flavored ice cream. This is game theory:
    what is your objective and what should be your best move?'
  trans: "\n### 对称密码学与非对称密码学\n\n我们已探讨了对称密码算法和非对称密码算法的多个方面与类型。显然，它们的设计目标和应用场景各不相同。下面通过对比分析，以便在合适的场景选用正确的算法。\n\
    \n**表 2-5**  \n对称与非对称密钥技术要求对比\n\n![A440588_1_En_2_Figm_HTML.jpg](img/A440588_1_En_2_Figm_HTML.jpg)\n\
    \n- `对称密钥密码学` 也称为 `私钥密码学`。同样地，`非对称密钥密码学` 也被称为 `公钥密码学`。\n- 与 `非对称密钥密码学` 不同，`对称密钥密码学`\
    \ 中的密钥交换或分发是一个令人头疼的问题。\n- `非对称加密` 计算量相当大，因为密钥长度通常很大，因此加密和解密过程较慢。相比之下，`对称加密` 速度更快。\n\
    - `对称密钥密码学` 适用于长消息，因为其加解密速度快。`非对称密钥密码学` 适用于短消息，其加解密速度较慢。\n- 在 `对称密钥密码学` 中，明文和密文中的符号会被置换或替换。在\
    \ `非对称密钥密码学` 中，明文和密文被当作整数处理。\n- 在许多情况下，当使用 `对称密钥` 进行加密和解密时，会利用 `非对称密钥` 技术来共享和协商加密所用的密钥。\n\
    - `非对称密钥密码学` 在涉及无预先关系各方的不可信环境中具有最强的应用价值。由于未知各方没有机会预先建立共享密钥，因此通过 `公钥密码学` 来保障敏感数据共享的安全性。\n\
    - `对称密码技术` 无法提供数字签名功能，而数字签名只能通过 `非对称密码学` 实现。\n- 另一个典型场景是一组节点之间相互通信所需的密钥数量。假设有\
    \ 100 个参与者需要采用 `对称密钥密码学`，你认为需要多少密钥？可以将这个问题看作一个 100 阶的完全图问题：每个顶点需要 99 条边才能与所有人相连，因此每个参与者需要\
    \ 99 个密钥才能与所有其他节点建立安全连接。那么，总共需要的密钥数量为 `100 × (100 − 1) / 2 = 4,950`。将其推广到 \"n\"\
    \ 个参与者的情况，总共需要 `n × (n − 1) / 2` 个密钥。随着参与者数量的增加，这将变得极其棘手！然而，在 `非对称密钥密码学` 中，每个参与者只需要两个密钥（一个私钥和一个公钥）。对于一个包含\
    \ 100 个参与者的网络，总共只需要 200 个密钥。表 2-5 提供了一些示例数据，用以说明当参与者数量增加时，所需密钥数量的增长情况。\n\n## 博弈论\n\
    \n博弈论无疑是一个相当古老的概念，并已被广泛应用于现实生活中的许多复杂问题求解。我们在此简要介绍这个主题，是因为它在比特币以及许多其他区块链解决方案中均有应用。博弈论由约翰·冯·诺伊曼正式提出，用于研究经济决策。后来，由于约翰·福布斯·纳什的“纳什均衡”理论，博弈论得到了更广泛的普及，我们稍后将对此进行探讨。首先，让我们理解什么是博弈论。\n\
    \n博弈论是一门关于博弈的理论，这里所说的博弈不仅仅是儿童玩耍的游戏。大多数情况下，它涉及两方或多方在某种策略行为下的互动。例如：一场板球锦标赛是一个博弈，法庭上双方律师和陪审团的对峙是一个博弈，两个兄弟姐妹争夺冰淇淋是一个博弈，一场政治选举是一个博弈，一个交通信号灯也是一个博弈。再比如：假设你申请了一份区块链工作并被录用，对方给出了一个薪资报价，但你拒绝了，认为供需之间存在巨大差距，对方很可能会提高报价。你可能会想，什么不是博弈？其实，在现实情境中，几乎所有事情都是一场博弈。因此，“博弈”可以定义为一种涉及“关联理性选择”的情境。这意味着任何参与者可获得的预期结果不仅取决于他们自己的选择，也取决于其他人在特定情境下做出的选择。换句话说，如果你的命运受到他人行为的影响，那么你就身处一场博弈之中。那么，究竟什么是博弈论？\n\
    \n博弈论是对复杂博弈中策略的研究。它是一门基于目标，在特定情境下做出最佳决策或选择最优策略的艺术。要做到这一点，必须理解对手的策略，以及对手认为你会采取什么行动。让我们看一个简单的例子：有一对兄妹。冰箱里有两份冰淇淋，一份是橙子味，一份是芒果味。哥哥想吃橙子味的，但他知道如果自己选了橙子味，妹妹就会哭闹着也要橙子味。于是，他选择了芒果味的冰淇淋，事情正如所料，妹妹也想要芒果味的。这时，哥哥假装牺牲了芒果味的冰淇淋，把它让给妹妹，自己吃掉了橙子味的。注意这个情境：这对双方来说是一种双赢，而这正是哥哥的目标。如果哥哥想要，他可以简单地和妹妹打一架，如果他的目标是拿到橙子味冰淇淋，那他就能得手。在第二种情况中，哥哥会制定策略，找准下手的位置，既不让妹妹受重伤，又能让她放弃橙子味冰淇淋。这就是博弈论：你的目标是什么，你该做出怎样的最佳抉择？\n"
- fmt: '# 博弈论：一个商业场景示例


    让我们再看一个例子——这次更偏向商业场景。假设你是一个向城镇供应蔬菜的供应商。比如说，有三条路可以到达该城镇，其中一条是常规路线，因为路程更短、路况更好，几乎每个人都走这条路。有一天，你发现常规路线因维修工程而被封锁，你完全无法走那条路。现在只剩下另外两条路可选：一条是通往目的城镇的捷径，但路比较窄；另一条路稍长一些，但路面宽阔。此时，你必须制定一个策略，决定走这两条路中的哪一条。情况可能是这样的：路上交通繁忙，许多人会试图通过最短的路线。这可能导致那条路严重拥堵，造成巨大延误。因此，你决定走较长的路线，以便准时到达城镇，但代价是多花几美元的油费。你确信，如果你能准时到达并以好价格早早卖出蔬菜，这点成本很容易就能弥补回来。这就是博弈论：为了实现你心中的目标（通常是找到一个最优解决方案），你的最佳行动是什么？


    在许多情况下，你所扮演的角色和你的目标在制定策略时都起着至关重要的作用。例如：如果你是一个体育赛事的组织者，而不是参赛者，那么你会制定一个策略，其目标可能是希望参赛者遵守规则并遵循流程。这是因为你并不在乎最终谁赢，你只是一个组织者。另一方面，参赛者会通过考虑对手的优缺点以及组织者制定的规则来制定获胜策略，因为违反规则可能会受到处罚。现在，让我们考虑你扮演组织者角色的情况。你应该考虑是否可能出现这样一种情况：某参赛者违反规则而失去一分，但却让对手受伤到无法继续比赛的程度。因此，你必须考虑参赛者可能会想什么，并据此制定你的规则。


    让我们根据从之前例子中学到的内容，再次尝试定义博弈论。它是一种将现实生活情境建模为游戏形式的方法，并分析一个人或实体在给定情境下为了期望结果所能采取的最佳策略或行动。博弈论的概念几乎被广泛应用于生活的方方面面，例如政治、社交媒体、城市规划、竞标、博彩、市场营销、分布式存储、分布式计算、供应链以及金融等，仅举几例。利用博弈论的概念，可以设计出参与者无需依赖其情感或道德价值观就能遵守规则的系统。如果你想要超越仅仅构建概念验证，将你的产品或解决方案投入生产，那么你应该将博弈论列为最重要的元素之一。它可以帮助你构建稳健的解决方案，并让你用各种有趣的场景来测试它。事实上，很多人已经在用博弈论的视角思考问题，只是他们自己不知道这就是博弈论。然而，如果你掌握了博弈论中的众多工具和技术，这绝对会有所帮助。


    ## 纳什均衡


    在上一节中，我们看了不同的博弈例子。博弈有很多种分类方式，例如合作/非合作博弈、对称/非对称博弈、零和/非零和博弈、同时/顺序博弈等。更一般地说，这里让我们聚焦于合作/非合作视角，因为它与纳什均衡有关。


    顾名思义，在合作博弈中，玩家相互合作，可以结成联盟。此外，可能存在某种外部力量来确保玩家之间的合作行为。另一方面，在非合作博弈中，玩家作为个体竞争，没有结成联盟的空间。参与者只关心自己的利益。同时，也没有外部力量来强制实施合作行为。


    纳什均衡指出，在任意一个玩家都了解彼此策略的非合作博弈中，至少存在一个均衡点，在该均衡点上，所有玩家都发挥其最佳策略以获得最大收益，并且任何一方都不会因改变自身策略而获益。如果你知道其他玩家的策略，并且你也有自己的策略，如果你无法通过改变自己的策略而获益，那么这就是纳什均衡的状态。因此，纳什均衡中的每一个策略，都是对该均衡中所有其他策略的最佳回应。


    请注意，一个玩家可能作为个体玩家制定策略以求获胜，但并非通过确保对手得到最差结果来击败对手。此外，任何游戏如果重复进行，最终都可能陷入纳什均衡。


    在下一节中，我们将通过“囚徒困境”来具体理解纳什均衡。'
  raw: 'One more example: more on a business side this time. Imagine that you are
    a vendor supplying vegetables to a town. There are, say, three ways to get to
    the town, out of which one is a regular route in the sense that everyone goes
    by that route, maybe because it is shorter and better. One day, you see that the
    regular route has been blocked because of some repair activity and in no way can
    you go by that route. You are now left with two other routes. One of those is
    a short route to the destination town but is a little narrow. The other one is
    a little longer route but wide enough. Here, you have to make a strategy as to
    which route of the two you need to go by. The situation may be such that there
    is heavy traffic on the roads and many people would try to get through the shortest
    route. This can lead to heavy congestion on that route and can cause a huge delay.
    So, you decided to take the longer route to reach the town on time, but at the
    cost of few extra dollars spent on fuel. You are sure you can easily get compensated
    for that if you arrive on time and sell your vegetables early at a good price.
    This is game theory: what is your best move for the objective you have in mind,
    which is usually finding an optimal solution.


    In many situations, the role that you play and your objective both play a vital
    role in formulating the strategy. Example: If you are an organizer of a sport
    event, and not a participant in the competition, then you would formulate a strategy
    where your objective could be that you want the participants to play by the rules
    and follow the protocol. This is because you do not care who wins at the end,
    you are just an organizer. On the other hand, a participant would strategize the
    winning moves by taking into account the strengths and weaknesses of the opponent,
    and the rules imposed by the organizer because there could be penalties if you
    break the rules. Now, let us consider this situation with you playing the role
    of the organizer. You should consider if there could be a situation where a participant
    breaks a rule and loses one point but injures the opponent so much that they cannot
    compete any longer. So, you have to take into account what the participants can
    think and set your rules accordingly.


    Let us try to define game theory once again based on what we learned from the
    previous examples. It is the method of modeling real-life situations in the form
    of a game and analyzing what the best strategy or move of a person or an entity
    could be in a given situation for a desired outcome. Concepts from game theory
    are widely used in almost every aspect of life, such as politics, social media,
    city planning, bidding, betting, marketing, distributed storage, distributed computing,
    supply chains, and finance, just to name a few. Using game theoretic concepts,
    it is possible to design systems where the participants play by the rules without
    assuming emotional or moral values of them. If you want to go beyond just building
    a proof of concept and get your product or solution to production, then you should
    prioritize game theory as one of the most important elements. It can help you
    build robust solutions and lets you test those with different interesting scenarios.
    Well, many people already think in game theoretic perspectives without knowing
    it is game theory. However, if you are equipped with the many tools and techniques
    from game theory, it definitely helps.


    ### Nash Equilibrium


    In the previous section, we looked at different examples of games. There are many
    ways to classify games, such as cooperative/noncooperative games, symmetric/asymmetric
    games, zero-sum/non-zero-sum games, simultaneous/sequential games, etc. More generally,
    let us focus on the cooperative/noncooperative perspective here, because it is
    related to the Nash equilibrium.


    As the name suggests, the players cooperate with each other and can work together
    to form an alliance in cooperative games. Also, there can be some external force
    applied to ensure cooperative behavior among the players. On the other hand, in
    noncooperative games, the players compete as individuals with no scope to form
    an alliance. The participants just look after their own interests. Also, no external
    force is available to enforce cooperative behavior.


    Nash equilibrium states that, in any noncooperative games where the players know
    the strategies of each other, there exists at least one equilibrium where all
    the players play their best strategies to get the maximum profits and no side
    would benefit by changing their strategies. If you know the strategies of other
    players and you have your own strategy as well, if you cannot benefit by changing
    your own strategy, then this is the state of Nash equilibrium. Thus, each strategy
    in a Nash equilibrium is a best response to all other strategies in that equilibrium.


    Note that a player may strategize to win as an individual player, but not to defeat
    the opponent by ensuring the worst for the opponents. Also, any game when played
    repeatedly may eventually fall into the Nash equilibrium.


    In the following section, we will look at the “prisoner”s dilemma” to get a concrete
    understanding of the Nash equilibrium .'
