    this transaction. The “Prev. Txn ID (Hash)” field contains the hash of that previous
    transaction.

    *   In the previous transaction output, find the exact index where the amount
    was received. There could be multiple receivers in a transaction, so the index
    is used to identify the initiator of this current transaction whose address was
    used as recipient in the previous transaction.

    *   Consume the output script used in the previous transaction using the Unlocking
    Script called “ ScriptSig .” Notice in Figure [3-21](#A440588_1_En_3_Chapter.html#Fig21)
    that there is a field before it that specifies the length of this Unlocking Script.

    *   Join this output script with the input script by just appending it to form
    the validation script and execute this validation script (remember this is a stack-based
    scripting language).

    *   The amount value is actually present in the Output Script, i.e., the “ScriptPubKey.”
    It is the locking script that locks the transaction output with the spending conditions
    and ensures that only the rightful owner of the Bitcoin address to which this
    transaction has been made can later claim it. Observe that it also has the Locking
    Script Length field right before it. For the current transaction, this output
    script is only for information, and plays its role in the future when the owner
    tries to spend it.

    *   It is the validation script that decides if the current transaction input
    has the right to spend the previous UTXO by validating the signatures. If the
    validation script runs successfully, it is confirmed that the transaction is valid
    and the transaction went through.


    Let us explore the previous explanation through a diagramatic representation to
    get a better understanding. Assume that Alice is paying Bob, say, five BTC. This
    means that Alice had received 5BTC in one of the previous transactions that was
    locked using ScriptPubKey . Alice can claim that she is the rightful owner of
    that transaction by unlocking it with ScriptSig and can spend it to Bob. Similarly,
    now if Bob tries to spend three BTC to Charlie and two BTC to himself, then here
    is how it would look (Figure [3-22](#A440588_1_En_3_Chapter.html#Fig22)).


    ![A440588_1_En_3_Fig22_HTML.jpg](A440588_1_En_3_Fig22_HTML.jpg)


    Figure 3-22


    A practical example of Bitcoin scripts


    When the Bitcoin network, more precisely the miners, receive the transaction from
    Alice, they check and confirm that it is a valid transaction and approve it by
    including it in their blocks (well, the one who proposes a block does it). When
    that happens, the output of this transaction becomes a part of the UTXO in the
    name of Bob, who could later spend it. And this is what happens in our example`—`that
    Bob also spends it to Charlie. Bob did so by consuming the previous transaction,
    unlocking it with his signature and public key, to prove that he is the owner
    of the Bitcoin address that Alice had used. Observe that there are two outputs
    in Bob’s transaction. Since he had received five BTC from Alice and is paying
    three BTC to Charlie, he must transfer the remainder to himself so that it becomes
    two BTC of UTXO bound to Bob himself and he could spend it in future. In Bob’s
    transaction, the three BTC to Charlie is locked using the locking script for only
    Charlie to spend later.


    Are you now thinking about how the scripts are combined and executed together?
    Remember that the unlocking script of current transaction is run along with the
    locking script of the previous transaction. As discussed already, running the
    scripts is a miner’s job and they do not happen at the wallet software. In the
    previous example, when Bob makes the transactions, miners execute the ScriptSig
    unlocking script from Bob’s transaction, and then immediately execute the ScriptPubKey
    locking script from Alice’s transaction in order. If the sequential execution
    in a stack-based fashion for the combined validation script runs successfully
    by returning TRUE, then Bob’s transaction is excepted by all the nodes validating
    it. We will take a look at Bitcoin scripts and how a Bitcoin-scripting virtual
    machine executes the stack during the execution of the combined script commands
    in more detail in the following section. In this section, however, take a look
    at the following example that represents the transaction from a developer’s standpoint:


