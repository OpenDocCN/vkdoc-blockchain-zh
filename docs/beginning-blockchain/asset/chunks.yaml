- fmt: '### Deploy Contract to Ethereum Network


    Now that we have our smart contract and its details, we need to prepare a transaction
    that can deploy this contract to the Ethereum blockchain. This transaction preparation
    will be very similar to the transaction we prepared in the previous section, but
    it will have a few more properties that are needed to create contracts.


    First, we need to create an object of the `web3.eth.Contract` class, which can
    represent our contract. The following code snippet creates an instance for the
    said class with a JSON array as an input parameter. This is the same JSON array
    that we copied from the ABI section of the Remix popup window, showing the details
    about our smart contract.


    ```

    var helloworldContract = new web3.eth.Contract([{

    "constant": true,

    "inputs": [],

    "name": "Hello",

    "outputs": [{

    "name": "",

    "type": "string"

    }],

    "payable": false,

    "stateMutability": "view",

    "type": "function"

    }, {

    "inputs": [],

    "payable": false,

    "stateMutability": "nonpayable",

    "type": "constructor"

    }]);

    ```


    Now we need to send this contract to the Ethereum network using the `Contract.deploy`
    method of the web3 library. The following code snippet shows how to do this.


    ```

    helloworldContract

    .deploy({

    data: ''''

    })

    .send({

    from: ''0xAff9d328E8181aE831Bc426347949EB7946A88DA'',

    gas: 4700000,

    gasPrice: ''20000000000000''

    },

    function(error, transactionHash){

    console.log(error);

    console.log(transactionHash);

    })

    .then(function(contract){

    console.log(contract);

    });

    ```


    Note that the value of the field `data` inside the `deploy` function parameter
    object is the same value we received in the object field of the BYTECODE details
    in the previous step. Also notice that the string `“0x”` is added to this value
    in the beginning. So, the data passed in the `deploy` function is `‘0x’` + byte
    code of the contract.


    Inside the `send` function after the `deploy`, we have added the `from` address,
    which will be the owner of the contract and the transaction fee details of gas
    limit and gas price. Finally, when the call is complete, the contract object is
    returned. This contract object will have the contract details along with the address
    of the contract, which can be used to call the function on the contract.


    Another way of sending the contract to the network would be to wrap the contract
    inside a transaction and send it directly. The following code snippet creates
    a transaction object with `data` as the contract bytecode, signs it using the
    private key of the address in the `from` field, and then sends it to the Ethereum
    blockchain.


    Note that we have not assigned a `to` address in this transaction object, as the
    address of the contract is unknown before the contract is deployed.


    ```

    var tx = {

    from: "0x22013fff98c2909bbFCcdABb411D3715fDB341eA",

    gasPrice: "20000000000",

    gas: "4900000",

    data: ""

    };

    web3.eth.accounts.signTransaction(tx, ''0xc6676b7262dab1a3a28a781c77110b63ab8cd5eae2a5a828ba3b1ad28e9f5a9b'')

    .then(function (signedTx) {

    web3.eth.sendSignedTransaction(signedTx.rawTransaction)

    .then(console.log);

    });

    ```


    When we execute this code snippet, we get the following output, which is the receipt
    of this transaction.


    ```

    {

    blockHash: ''0xaba93b4561fc35e062a1ad72460e0b677603331bbee3379ce6c74fa5cf505d82'',

    blockNumber: 2539889,

    contractAddress: ''0xd5a2d13723A34522EF79bE0f1E7806E86a4578E9'',

    cumulativeGasUsed: 205547,

    from: ''0x22013fff98c2909bbfccdabb411d3715fdb341ea'',

    gasUsed: 205547,

    logs: [],

    logsBloom: '''',

    status: ''0x1'',

    to: null,

    transactionHash: ''0xc333cbc5fc93b52871689aab22c48b910cb192b4875bea69212363030d36565a'',

    transactionIndex: 0

    }

    ```


    Notice the properties of the transaction receipt object. It has a value assigned
    to the `contractAddress` property, while the value of the `to` property is null.
    This means that this was a contract creation transaction that was successfully
    mined on the network and the contract created as part of this transaction is deployed
    at the address `0xd5a2d13723A34522EF79bE0f1E7806E86a4578E9`.


    We have successfully created an Ethereum smart contract programmatically.


    ## Interacting Programmatically with Ethereum—Executing Smart Contract Functions


    Now that we have deployed our smart contract to the Ethereum network, we can call
    its member functions. Following are the steps to call an Ethereum smart contract
    programmatically.'
