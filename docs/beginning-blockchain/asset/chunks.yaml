- fmt: '### Difficulty Target


    The difficulty target is the one that drives the Proof-of-Work (PoW) in Bitcoin.
    The idea is that once a block is filled with valid transactions, the hash of that
    block’s header needs to be calculated to be less than the difficulty target in
    the same header. The `nonce` in the header starts from zero. The miner has to
    keep on incrementing this `nonce` and hashing the header until the hash value
    is less than the target.


    The difficulty bits of four bytes (32 bits) in the headers define what the target
    value (256 bits) would be for that block to be mined. The `nonce` should be found
    such that the hash of the entire header is less than the target value. Remember
    that the lower the target value, the more difficult it would be to find a header
    hash that is less than the target. Since Bitcoin uses SHA256, every time you hash
    a block header, the output is any number between `0` and `2^(256)`, which is quite
    a large number. If with your `nonce` the hash is less than the target, the block
    will be accepted by the entire network; otherwise, you have to try a different
    `nonce` until it satisfies the condition. At this point, it is still not clear
    how the difficulty target is calculated from the difficulty bits in each header.


    The target can be derived from the four-byte (eight hexadecimal numbers) difficulty
    bits in the header using a predefined formula that every node has by default,
    as it came along with the binaries during installation. The following is the formula
    to compute the difficulty:


    ```

    target = coefficient * 2^(8 * (exponent – 3))

    ```


    Notice that there is a "coefficient" and also an "exponent" term in this formula,
    which are present as a part of the four-byte difficulty bits. Let us take an example
    to explain this better. If the four-byte difficulty bits in hex form are `0x1b0404cb`,
    then the first two hex digits form the exponent term, which is `0x1b`, and the
    remaining form the coefficient term, which is `0x0404cb` in this case. Solving
    the target formula with these values:


    ```

    target = 0x0404cb * 2^(0x08 * (0x1b – 0x03))

    target = 0x00000000000404CB000000000000000000000000000000000000000000000000

    ```


    Bitcoin is designed such that every 2,016 blocks should take two weeks to be generated,
    and if you do the math, it would be around ten minutes per block. In this asynchronous
    network, it is difficult to program this so that every block takes exactly ten
    minutes with the kind of PoW mechanism in place. In reality, it is the average
    time for a block, and there is a possibility that a Bitcoin block gets generated
    within a minute, or it may very well take 15 minutes to be generated. Therefore,
    the difficulty is designed to increase or decrease depending on whether it took
    less or more than two weeks to find 2,016 blocks. The time taken for 2,016 blocks
    can be found using the time present in the timestamp fields of every block header.
    If it took, say, `T` amount of time for 2,016 blocks, which is never exactly two
    weeks, the difficulty target in every block is multiplied by (`T / 2 weeks`).
    So, the result of [difficulty target × (`T / 2 weeks`)] will be increased if `T`
    was less, and decreased otherwise.


    It is evident by now that the difficulty target is adjustable; it could be set
    more difficult or easier depending on the situation explained before. You must
    be wondering who adjusts this difficulty when the system is decentralized. One
    rule of thumb that you must always keep in mind is that whatever happens in such
    a decentralized design has to happen individually at every node. After every 2,016
    blocks, all the nodes individually compute the new difficulty target value, and
    they all conclude on the same one because there is already a formula defined for
    it. Here is the formula once again:


    ```

    New Target = Old Target * (T / 2 weeks)

    = New Target = Old Target * (Time taken for 2016 Blocks in Seconds / 12,09,600
    seconds)

    ```


    **Note:** The parameters such as 2,016 blocks and `TargetTimespan` of two weeks
    (12,09,600 seconds) are defined in `chainparams.cpp` as shown below:


    ```

    consensus.nPowTargetTimespan = 14 * 24 * 60 * 60; // two weeks

    consensus.nPowTargetSpacing = 10 * 60;

    consensus.nMinerConfirmationWindow = 2016; // nPowTargetTimespan / nPowTargetSpacing

    ```


    Note here that it is (`T / 2 weeks`) and not (`2 weeks / T`). The idea is to decrease
    the difficulty target when it is required to increase the complexity, so it takes
    more time. The smaller the target hash, the more difficult it is to find a hash
    that is less than this target hash. Example: If it took ten days to mine 2,016
    blocks, then (`T / 2 weeks`) would be a fraction, which when multiplied by "Old
    Target" further reduces it, and "New Target" would be a value less than the old
    one. This would make it more difficult to find a hash and would require more time.
    This is how the average time between blocks is maintained at ten minutes. Imagine
    that the difficulty target was fixed and not adjustable; what do you think the
    problem would be? Remember that the computation power of hardware increases over
    time as more powerful computers are introduced for block mining. A situation where
    10s or 100s or even 1,000s of blocks are proposed at the same time is not desirable
    for the network to function properly. So, the idea is that, even when more and
    more powerful computing nodes enter the Bitcoin network, the average time required
    to propose a block should still be ten minutes by adjusting the difficulty target.
    Also, a miner’s chances of proposing a block depend on how much hash power they
    have compared with the global hash power of all miners included.


    Are you thinking why ten minutes, and why not 12 minutes? Or why not six minutes?
    Just keep in mind that there has to be some time gap for all the nodes in a decentralized
    asynchronous system to agree on it. If there was no time gap, so many blocks would
    arrive with just fractional delays, and there would be no optimization benefit
    of blockchain compared with a transaction chain. Every transaction is a broadcast,
    and every new block is also a broadcast. Also, the orderliness that a blockchain
    brings to the system is quite infeasible with the transaction chain. With the
    concept of blocks, it is possible to include unrelated transactions from any sender
    to any receiver in blocks, which is not easy to maintain with the transaction
    chain. One valid block broadcast is more efficient compared to individual transaction
    broadcast after validation. Now, coming back to the discussion of ten minutes,
    it could very well be a little less or a little more, but there should certainly
    be some gap between two consecutive blocks. Imagine that you are a miner and mining
    block number 4567, but some other miner got lucky and proposed block number 4567,
    which you just received while solving the cryptographic puzzle. What you would
    do now is validate this block, and if it is valid, add it to your local copy of
    the blockchain and immediately start mining block number 4568. You wouldn’t want
    someone else to propose 4568 already while you just finished validating block
    4567, which you received a little later compared with other miners due to network
    latency. Now the question is: is this 10 minutes the best possible option? Well,
    it is difficult to explain this in one word, but a ten-minute gap addresses a
    lot of issues due to an asynchronous network, time delays, packet drops, system
    capacity, and more. There is a possibility that it could be optimized further
    to, say, five minutes or so, which you can see in many new cryptocurrencies and
    other blockchain use cases.'
