- fmt: 'There is another derived property from the properties mentioned that is quite
    useful in Bitcoin. Let us look into it from a technical point of view and learn
    how Bitcoin leverages it for mining when we hit Chapter [3](#A440588_1_En_3_Chapter.html).
    The name of this property is “puzzle friendliness.” This name implies that there
    is no shortcut to the solution and the only way to get to the solution is to traverse
    through all the possible options in the input space. We will not try to define
    it here but will directly try to understand what it really means. Let us consider
    this example: `H(r || X) = Z`, where “r” is chosen from a distribution with high
    min entropy, “X” is the input concatenated with “r,” and “Z” is the hashed output
    value. The property means that it is way too hard for an adversary to find a value
    “Y” that exactly hashes to “Z.” That is, `H(r´ || Y) = Z`, where `r´` is a part
    of the input chosen in the same randomized way as “r.” What this means is that,
    when a part of the input is substantially randomized, it is hard to break the
    hash function with a quick solution; the only way is to test with all possible
    random values.


    In the previous example, if “Z” is an `n`-bits output, then it has taken just
    one value out of `2^n` possible values. Note carefully that a part of your input,
    say “r,” is from a high min-entropy distribution, which has to be appended with
    your input `X`. Now comes the interesting part of designing a search puzzle. Let’s
    say `Z` is an `n`-bits output and is a set of `2^n` possible values, not just
    an exact value. You are asked to find a value of `r` such that when hashed appended
    with `X`, it falls within that output set of `2^n` values; then it forms a search
    puzzle. The idea is to find all possible values of `r` till it falls within the
    range of `Z`. Note here that the size of `Z` has limited the output space to a
    smaller set of `2^n` possible values. The smaller the output space, the harder
    is the problem. Obviously, if the range is big, it is easier to find a value in
    it and if the range is quite narrow with just a few possibilities, then finding
    a value within that range is tough. This is the beauty of the “r,” called the
    “nonce” in the input to hash function. Whatever random value of `r` you take,
    it will be concatenated with “X” and will go through the same hash function, again
    and again, till you get the right nonce value “r” that satisfies the required
    range for `Z`, and there are absolutely no shortcuts to it except for trying all
    possible values!


    Note that for an `n`-bit hash value output, an average effort of `2^n` is needed
    to break preimage and second preimage resistance, and `2^(n/2)` for collision
    resistance.


    We discussed various fundamental and security properties of hash functions. In
    the following sections we will see some important hash functions and dive deeper
    as applicable.


    ### A Heads-up on Different Hash Functions


    One of the oldest hash functions or compression function is the `MD4` hash function.
    It belongs to the message digest (MD) family. Other members of the MD family are
    `MD5` and `MD6`, and there are many other variants of `MD4` such as `RIPEMD`.
    The MD family of algorithms produce a 128-bit message digest by consuming 512-bit
    blocks. They were widely used as checksums to verify data integrity. Many file
    servers or software repositories used to provide a precomputed `MD5` checksum,
    which the users could check against the file they downloaded. However, there were
    a lot of vulnerabilities found in the MD family and it was deprecated.


    Another such hash function family is the Secure Hash Algorithm (SHA) family. There
    are basically four algorithms in this family, such as `SHA-0`, `SHA-1`, `SHA-2`,
    and `SHA-3`. The first algorithm proposed in this family was named SHA, but newer
    versions were coming with security fixes and updates, so a retronym was applied
    to it and it was made `SHA-0`. It was found to have a serious yet undisclosed
    security flaw and was discontinued. Later, `SHA-1` was proposed as a replacement
    to `SHA-0`. `SHA-1` had an extra computational step that addressed the problem
    in `SHA-0`. Both `SHA-0` and `SHA-1` were 160-bit hash functions that consumed
    512-bit block sizes. `SHA-1` was designed by the National Security Agency (NSA)
    to use it in the digital signature algorithm (DSA). It was used quite a lot in
    many security tools and Internet protocols such as SSL, SSH, TLS, etc. It was
    also used in version control systems such as Mercurial, Git, etc. for consistency
    checks, and not really for security. Later, around 2005, cryptographic weaknesses
    were found in it and it was deprecated after the year 2010. We will get into `SHA-2`
    and `SHA-3` in detail in the following sections.


    ### SHA-2


    It belongs to the SHA family of hash functions, but itself is a family of hash
    functions. It has many SHA variants such as `SHA-224`, `SHA-256`, `SHA-384`, `SHA-512`,
    `SHA-512/224`, and `SHA-512/256`. `SHA-256` and `SHA-512` are the primitive hash
    functions and the other variants are derived from them. The `SHA-2` family of
    hash functions are widely used in applications such as SSL, SSH, TLS, PGP, MIME,
    etc.


    `SHA-224` is a truncated version of `SHA-256` with a different initial value or
    initialization vector (IV). Note that the SHA variants with different truncations
    applied can produce the same bit length hash outputs, hence different initialization
    vectors are applied in different SHA variants to be able to properly differentiate
    them. Now coming back to the `SHA-224` computation, it is a two-step process.
    First, `SHA-256` value is computed with a different IV compared with the default
    one used in `SHA-256`. Second, the resulting 256-bit hash value is truncated to
    224-bit; usually the 224 bits from left are kept, but the choice is all yours.


    `SHA-384` is a truncated version of `SHA-512`, just the way `SHA-224` is a truncated
    version of `SHA-256`. Similarly, both `SHA-512/224` and `SHA-512/256` are truncated
    versions of `SHA-512`. Are you wondering why this concept of “truncation” exists?
    Note that truncation is not just limited to the ones we just mentioned, and there
    can be various other variants as well. The primary reasons for truncation could
    be as follows:


    *   Some applications require a message digest with a certain length that is different
    from the default ones.

    *   Irrespective of the `SHA-2` variant we are using, we can select a truncation
    level depending on what security property we want to sustain. Example: Considering
    today’s state of computing power, when collision resistance is necessary, we should
    keep at least 160 bits and when only preimage-resistance is necessary, we should
    keep at least 80 bits. The security property such as collision resistance decreases
    with truncation, but it should be chosen such that it would be computationally
    infeasible to find a collision.

    *   Truncation also helps maintain the backward compatibility with older applications.
    Example: `SHA-224` provides 112-bit security that can match the key length of
    triple-DES (3DES).


    Talking about efficiency, `SHA-256` is based on a 32-bit word and `SHA-512` is
    based on a 64-bit word. So, on a 64-bit architecture, `SHA-512` and all its truncated
    variants can be computed faster with a better level of security compared with
    `SHA-1` or other `SHA-256` variants.


    Table [2-3](#A440588_1_En_2_Chapter.html#Tab3) is a tabular representation taken
    from the NIST paper that represents `SHA-1` and different `SHA-2` algorithms properties
    in a nutshell.


    **Table 2-3** SHA-1 & SHA-2 Hash Function in a Nutshell


    ![A440588_1_En_2_Figg_HTML.jpg](A440588_1_En_2_Figg_HTML.jpg)


    As a rule of thumb, it is advisable not to truncate when not necessary. Certain
    hash functions tolerate truncation and some don’t, and it also depends on how
    you are using it and in what context.'
  raw: 'There is another derived property from the properties mentioned that is quite
    useful in Bitcoin. Let us look into it from a technical point of view and learn
    how Bitcoin leverages it for mining when we hit Chapter [3](#A440588_1_En_3_Chapter.html).
    The name of this property is “puzzle friendliness.” This name implies that there
    is no shortcut to the solution and the only way to get to the solution is to traverse
    through all the possible options in the input space. We will not try to define
    it here but will directly try to understand what it really means. Let us consider
    this example: H(r || X) = Z, where “r” is chosen from a distribution with high
    min entropy, “X” is the input concatenated with “r,” and “Z” is the hashed output
    value. The property means that it is way too hard for an adversary to find a value
    “Y” that exactly hashes to “Z.” That is, H(r´ || Y) = Z, where r´ is a part of
    the input chosen in the same randomized way as “r.” What this means is that, when
    a part of the input is substantially randomized, it is hard to break the hash
    function with a quick solution; the only way is to test with all possible random
    values.


    In the previous example, if “Z” is an n-bits output, then it has taken just one
    value out of 2^n possible values. Note carefully that a part of your input, say
    “r,” is from a high min-entropy distribution, which has to be appended with your
    input X. Now comes the interesting part of designing a search puzzle. Let’s say
    Z is an n-bits output and is a set of 2^n possible values, not just an exact value.
    You are asked to find a value of r such that when hashed appended with X, it falls
    within that output set of 2^n values; then it forms a search puzzle. The idea
    is to find all possible values of r till it falls withing the range of Z. Note
    here that the size of Z has limited the output space to a smaller set of 2^n possible
    values. The smaller the output space, the harder is the problem. Obviously, if
    the range is big, it is easier to find a value in it and if the range is quite
    narrow with just a few possibilities, then finding a value within that range is
    tough. This is the beauty of the “r,” called the “nonce” in the input to hash
    function. Whatever random value of r you take, it will be concatenated with “X”
    and will go through the same hash function, again and again, till you get the
    right nonce value “r” that satisfies the required range for Z, and there are absolutely
    no shortcuts to it except for trying all possible values!


    Note that for an n-bit hash value output, an average effort of 2^n is needed to
    break preimage and second preimage resistance, and 2^n/2 for collision resistance.


    We discussed various fundamental and security properties of hash functions. In
    the following sections we will see some important hash functions and dive deeper
    as applicable.


    #### A Heads-up on Different Hash Functions


    One of the oldest hash functions or compression function is the MD4 hash function.
    It belongs to the message digest (MD) family. Other members of the MD family are
    MD5 and MD6, and there are many other variants of MD4 such as RIPEMD. The MD family
    of algorithms produce a 128-bit message digest by consuming 512-bit blocks. They
    were widely used as checksums to verify data integrity. Many file servers or software
    repositories used to provide a precomputed MD5 checksum, which the users could
    check against the file they downloaded. However, there were a lot of vulnerabilities
    found in the MD family and it was deprecated.


    Another such hash function family is the Secure Hash Algorithm (SHA) family. There
    are basically four algorithms in this family, such as SHA-0, SHA-1, SHA-2, and
    SHA-3\. The first algorithm proposed in this family was named SHA, but newer versions
    were coming with security fixes and updates, so a retronym was applied to it and
    it was made SHA-0\. It was found to have a serious yet undisclosed security flaw
    and was discontinued. Later, SHA-1 was proposed as a replacement to SHA-0\. SHA-1
    had an extra computational step that addressed the problem in SHA-0\. Both SHA-0
    and SHA-1 were 160-bit hash functions that consumed 512-bit block sizes. SHA-1
    was designed by the National Security Agency (NSA) to use it in the digital signature
    algorithm (DSA) . It was used quite a lot in many security tools and Internet
    protocols such as SSL, SSH, TSL, etc. It was also used in version control systems
    such as Mercurial, Git, etc. for consistency checks, and not really for security.
    Later, around 2005, cryptographic weaknesses were found in it and it was deprecated
    after the year 2010\. We will get into SHA-2 and SHA-3 in detail in the following
    sections.


    #### SHA-2


    It belongs to the SHA family of hash functions, but itself is a family of hash
    functions. It has many SHA variants such as SHA-224, SHA-256, SHA-384, SHA-512,
    SHA-512/224, and SHA-512/256\. SHA-256 and SHA-512 are the primitive hash functions
    and the other variants are derived from them. The SHA-2 family of hash functions
    are widely used in applications such as SSL, SSH, TSL, PGP, MIME, etc.


    SHA-224 is a truncated version of SHA-256 with a different initial value or initialization
    vector (IV). Note that the SHA variants with different truncations applied can
    produce the same bit length hash outputs, hence different initialization vectors
    are applied in different SHA variants to be able to properly differentiate them.
    Now coming back to the SHA-224 computation, it is a two-step process. First, SHA-256
    value is computed with a different IV compared with the default one used in SHA-256\.
    Second, the resulting 256-bit hash value is truncated to 224-bit; usually the
    224 bits from left are kept, but the choice is all yours.


    SHA-384 is a truncated version of SHA-512, just the way SHA-224 is a truncated
    version of SHA-256\. Similarly, both 512/224 and SHA-512/256 are truncated versions
    of SHA-512\. Are you wondering why this concept of “truncation” exists? Note that
    truncation is not just limited to the ones we just mentioned, and there can be
    various other variants as well. The primary reasons for truncation could be as
    follows:


    *   Some applications require a message digest with a certain length that is different
    from the default ones.

    *   Irrespective of the SHA-2 variant we are using, we can select a truncation
    level depending on what security property we want to sustain. Example: Considering
    today’s state of computing power, when collision resistance is necessary, we should
    keep at least 160 bits and when only preimage-resistance is necessary, we should
    keep at least 80 bits. The security property such as collision resistance decreases
    with truncation, but it should be chosen such that it would be computationally
    infeasible to find a collision.

    *   Truncation also helps maintain the backward compatibility with older applications.
    Example: SHA-224 provides 112-bit security that can match the key length of triple-DES
    (3DES).


    Talking about efficiency, SHA-256 is based on a 32-bit word and SHA-512 is based
    on a 64-bit word. So, on a 64-bit architecture, SHA-512 and all its truncated
    variants can be computed faster with a better level of security compared with
    SHA-1 or other SHA-256 variants.


    Table [2-3](#A440588_1_En_2_Chapter.html#Tab3) is a tabular representation taken
    from the NIST paper that represents SHA-1 and different SHA-2 algorithms properties
    in a nutshell.


    Table 2-3


    SHA-1 & SHA-2 Hash Function in a Nutshell


    ![A440588_1_En_2_Figg_HTML.jpg](A440588_1_En_2_Figg_HTML.jpg)


    As a rule of thumb, it is advisable not to truncate when not necessary. Certain
    hash functions tolerate truncation and some don’t, and it also depends on how
    you are using it and in what context.'
