    ### 准备以太坊交易


    现在我们已经让爱丽丝拥有了一些测试以太币，接下来我们将创建一笔以太坊交易，将其中一部分以太币发送给鲍勃。回想一下，以太坊由于采用账户和余额系统，因此不需要像比特币那样处理输入、输出以及
    UTXO 查询。所以，我们只需要在交易中指定`from`地址（发送方地址）、`to`地址（接收方地址）、发送的以太币数量以及其他一些字段即可。


    另外，请注意，在比特币交易中我们无需指定交易费用；然而在以太坊交易中，我们需要指定两个相关字段：一个是`gas`限制，另一个是`gasPrice`。回顾第
    4 章的内容，gas 是我们需要支付给以太坊网络以确认交易并将其添加到区块中的交易费用单位。`gasPrice`则是我们愿意为每单位 gas 支付的以太币数量（以
    gwei 为单位）。一笔交易允许使用的最大费用就是`gas`与`gasPrice`的乘积。


    因此，对于这个示例交易，我们定义一个包含以下字段的 JSON 对象。其中，`from`字段是爱丽丝的地址，`to`字段是鲍勃的地址，`value`字段是以
    wei 为单位的一个以太币。我们选择的`gasPrice`是 20 gwei，并且愿意为此交易支付的最大 gas 数量为 42,000。


    另外，请注意我们将`data`字段留空了。我们将在后面的智能合约部分再回过头来讨论它。


    ```

    {

    from: "0xAff9d328E8181aE831Bc426347949EB7946A88DA",

    gasPrice: "20000000000",

    gas: "42000",

    to: ''0x22013fff98c2909bbFCcdABb411D3715fDB341eA'',

    value: "1000000000000000000",

    data: ""

    }

    ```


    ### 签名交易


    现在我们已经创建了一个包含必要字段和数值的交易对象，接下来需要使用发送以太币的账户的私钥对其进行签名。在本例中，发送方是爱丽丝，因此我们将使用爱丽丝的私钥对交易进行签名。这是为了在密码学上证明确实是爱丽丝本人在花费她账户中的以太币。


    ```javascript

    var signTransaction = function () {

    var tx = {

    from: "0xAff9d328E8181aE831Bc426347949EB7946A88DA",

    gasPrice: "20000000000",

    gas: "42000",

    to: ''0x22013fff98c2909bbFCcdABb411D3715fDB341eA'',

    value: "1000000000000000000",

    data: ""

    };

    web3.eth.accounts.signTransaction(tx, ''0x9fb71152b32cb90982f95e2b1bf2a5b6b2a53855eacf59d132a2b7f043cfddf5'')

    .then(function(signedTx){

    console.log(signedTx.rawTransaction);

    });

    };

    ```


    以上代码片段调用了`signTransaction`函数，传入了我们在上一步创建的交易对象以及生成爱丽丝账户时获得的私钥。以下是运行上述代码片段后得到的输出结果。


    ```

    {

    messageHash: ''0x91b345a38dc728dc06a43c49b92a6ac1e0e6d614c432a6dd37d809290a25aa6b'',

    v: ''0x2a'',

    r: ''0x14c20901a060834972a539d7b8ad1f23161c2144a2b66fbf567e37e963d64537'',

    s: ''0x3d2a0a818633a11832a5c48708a198af909eaf4884a7856c9ac9ed216d9b029c'',

    rawTransaction: ''0xf86c018504a817c80082a4109422013fff98c2909bbfccdabb411d3715fdb341ea880de0b6b3a7640000802aa014c20901a060834972a539d7b8ad1f23161c2144a2b66fbf567e37e963d64537a03d2a0a818633a11832a5c48708a198af909eaf4884a7856c9ac9ed216d9b029c''

    }

    ```


    在`signTransaction`函数的输出中，我们收到一个包含若干属性的 JSON 对象。对我们来说，重要的值是`rawTransaction`。这是已签名交易的十六进制字符串表示。这与我们在比特币章节中创建比特币交易的十六进制字符串的方式非常相似。


    ### 将交易发送至以太坊网络


    最后一步只需将这个已签名的原始交易发送到公共托管的以太坊测试网络节点即可，我们在创建`web3`对象时已将该节点设置为提供者。


    以下代码调用`sendSignedTransaction`函数，将原始交易发送至以太坊测试网络。输入参数是我们在上一步签名交易时获得的`rawTransaction`字符串的值。


    ```javascript

    web3.eth.sendSignedTransaction(signedTx.rawTransaction).then(console.log);

    ```


    请注意上述代码片段中`then`的用法。这很有趣，因为`web3`库在处理以太坊交易时提供了不同层次的最终性，因为一笔以太坊交易在提交后会经历多个状态。在这个函数调用中，将交易发送到网络时，`then`会在交易收据生成且交易完成时被触发。


    几秒钟后，当 JavaScript 的 Promise 解析时，我们将得到以下输出。


    ```

    {

    blockHash: ''0x26f1e1374d11d4524f692cdf1ce3aa6e085dcc181084642293429eda3954d30e'',

    blockNumber: 2514764,

    contractAddress: null,

    cumulativeGasUsed: 125030,

    from: ''0xaff9d328e8181ae831bc426347949eb7946a88da'',

    gasUsed: 21000,

    logs: [],

    logsBloom: '''',

    status: ''0x1'',

    to: ''0x22013fff98c2909bbfccdabb411d3715fdb341ea'',

    transactionHash: ''0xd3f45394ac038c44c4fe6e0cdb7021fdbd672eb1abaa93eb6a1828df5edb6253'',

    transactionIndex: 3

    }

    ```


    我们可以看到，输出包含大量信息。其中最重要的是`transactionHash`，它是该交易在网络上的 ID。输出还提供了`blockHash`，即包含该交易的区块的
    ID。除此之外，我们还获得了此交易消耗了多少 gas 等信息。如果实际消耗的 gas 少于我们在创建交易时指定的最大 gas 数量，剩余的 gas 将退还给发送方地址。


    在本节中，我们使用 JavaScript 向以太坊区块链发送了一笔简单交易。但这仅仅是以太坊应用程序编程的开始。在下一节中，我们还将探讨如何以编程方式创建和调用智能合约。


    ## 以编程方式与以太坊交互——创建智能合约


    在本节中，我们将继续以太坊编程练习，使用相同的`web3` JavaScript 库和 Infura 服务 API，在以太坊区块链上创建一个简单的智能合约。


    因为没有"Hello World"程序的计算机编程初学者教程是不完整的，所以我们即将创建的智能合约将是一个在被调用时返回字符串"Hello World"的简单合约。


    合约创建过程将是一种发送到以太坊区块链的特殊交易类型，这类交易被称为"合约创建交易"。这些交易不会提及`to`地址，而智能合约的所有者就是交易中提到的`from`地址。


    ### 先决条件


    在这个创建智能合约的代码练习中，我们继续假设`web3` JavaScript 库已安装并在一个 Node.js 应用中实例化，并且我们已经注册了 Infura
    服务，就像我们在上一节中所做的那样。


    以下是使用 JavaScript 在以太坊上创建智能合约的步骤。

    '
- fmt: '### Program the Smart Contract


    Recall from Chapter [4](#A440588_1_En_4_Chapter.html) that the Ethereum smart
    contracts are written in Solidity programming language. While the `web3` JavaScript
    library will help us deploy our contract on the Ethereum blockchain, we will still
    have to write and compile our smart contract in Solidity before we send it to
    the Ethereum network using `web3`. So, let’s first create a sample contract using
    Solidity.


    There are a variety of tools available to code in Solidity. Most of the major
    IDEs and code editors have Solidity plugins for editing and compiling smart contracts.
    There is also a web-based Solidity editor called `Remix`. It’s available for free
    to use at [`https://remix.ethereum.org/`](https://remix.ethereum.org/). `Remix`
    provides a very simple interface to code and compile smart contracts within your
    browser. In this exercise we will be using `Remix` to code and test our smart
    contract and then we will send the same contract to the Ethereum network using
    the `web3` JavaScript library and the Infura API service.


    The following code snippet is written in the Solidity programming language and
    it is a simple smart contract that returns the string “Hello World” from its function
    `Hello`. It also has a constructor that sets the value of the message returned.


    ```solidity

    pragma solidity ^0.4.0;

    contract HelloWorld {

    string message;

    function HelloWorld(){

    message = "Hello World!";

    }

    function Hello() constant returns (string) {

    return message;

    }

    }

    ```


    Let’s head to `Remix` and paste this code in the editor window. The following
    images (Figures [5-4](#A440588_1_En_5_Chapter.html#Fig4) and [5-5](#A440588_1_En_5_Chapter.html#Fig5))
    show how our sample smart contract looks in the `Remix` editor and what the output
    looks like when we clicked the `Create` button on the right-side menu, under the
    `Run` tab. Also, note that by default, the `Remix` editor targets a JavaScript
    VM environment for smart contract compilation and it uses a test account with
    some ETH balance, for testing purposes. When we click the `Create` button, this
    contract is created using the selected account in the JavaScript VM environment.


    ![A440588_1_En_5_Fig5_HTML.jpg](A440588_1_En_5_Fig5_HTML.jpg)


    Figure 5-5: Smart contract creation output in Remix IDE


    ![A440588_1_En_5_Fig4_HTML.jpg](A440588_1_En_5_Fig4_HTML.jpg)


    Figure 5-4: Editing smart contracts in Remix IDE


    Following is the output generated by the `create` operation, and it shows us that
    the contract has been created because it has a contract address. The `from` value
    is the account address that was used to create the contract. It also shows us
    the hash of the contract creation transaction.


    ```text

    status     0x1 Transaction mined and execution succeed

    contractAddress    0x692a70d2e424a56d2c6c27aa97d1a86395877b3a

    from   0xca35b7d915458ef540ade6068dfe2f44e8fa733c

    to     HelloWorld.(constructor)

    gas    3000000 gas

    transaction cost   205547 gas

    execution cost     109539 gas

    hash   0x9f3c21c21f263084b9f031966858a5d8e0648ed19c77d4d2291875b01d89a141

    input  

    decoded input  {}

    decoded output      -

    logs   []

    value  0 wei

    ```


    At this point, we have a simple “Hello World” smart contract ready, and now the
    next step is to deploy it programmatically to the Ethereum blockchain.


    ### Compile Contract and Get Details


    Let’s first get some details about our smart contract from `Remix`, which will
    be needed to deploy the contract to the Ethereum network using the `web3` library.
    Click on the `Compile` tab in the right-side menu and then click the `Details`
    button. This pops up a new child window with details of the smart contract. What’s
    important for us are the `ABI` and the `BYTECODE` sections on the details popup
    window.


    Let’s copy the details in the `ABI` section using the copy value to clipboard
    button available next to the `ABI` header. Following is the value of the `ABI`
    data for our smart contract.


    ```json

    [

    {

    "constant": true,

    "inputs": [],

    "name": "Hello",

    "outputs": [

    {

    "name": "",

    "type": "string"

    }

    ],

    "payable": false,

    "stateMutability": "view",

    "type": "function"

    },

    {

    "inputs": [],

    "payable": false,

    "stateMutability": "nonpayable",

    "type": "constructor"

    }

    ]

    ```


    This is a JSON array and if we closely look at it, we see that it has JSON objects
    for each function in our contract including its constructor. These JSON objects
    have details about a function and its input and output. This array describes the
    smart contract interface.


    When we call this smart contract after it is deployed to the network, we will
    need this information to find out what functions the contract is exposing and
    what do we need to pass as an input to the function we wish to call.


    Now let’s get the data in the `BYTECODE` section of the details popup. Following
    is the data we copied for our contract.'
