    ### 创世区块


    如下列代码所示，第一个区块（即区块 0）被称为创世区块。请记住，创世区块必须被硬编码到区块链应用程序中，比特币也是如此。你可以将其视为一个特殊区块，因为它不包含任何对先前区块的引用。比特币的创世区块创建于
    2009 年其诞生之时。如果你打开比特币核心，特别是 `chainparams.cpp` 文件，就会看到创世区块是如何被静态编码的。通过使用比特币核心的命令行引用，你可以使用创世区块的哈希值进行查询，从而获得相同的信息，如下所示：


