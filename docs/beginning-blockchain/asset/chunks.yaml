    对区块进行哈希计算，它将产生一个 256 位的哈希输出，例如：


    ```

    000000000000000a73b6a2af7bad40ec3fc2a83dafd76ef15f3d1b71a7132765

    ```


    注意其中只有 64 个字符。由于哈希输出使用十六进制字符表示，而每个十六进制数字可以用四位比特表示，因此输出是 64 × 4 = 256 位。在许多地方，你通常会看到
    256 位的哈希输出就是用这 64 个十六进制字符表示的。


    区块的结构，即区块大小、数据和区块头部分、一个区块中的交易数量等，是你在设计区块链解决方案时需要决定的事项。对于现有的区块链，如比特币、以太坊或超级账本，其结构已经定义好，你必须理解这些结构才能在这些平台之上进行构建。我们将在本书后面详细研究比特币和以太坊的区块链。


    ### 默克尔树


    默克尔树是一种由密码学哈希指针构成的二叉树，因此它是一种二叉哈希树。它以发明者拉尔夫·默克尔的名字命名。它是区块链解决方案（如比特币）中使用的另一种有用的数据结构。默克尔树是通过对配对的数椐（通常是叶子层的交易）进行哈希计算，然后对哈希输出结果逐层向上重复哈希，直至根节点（称为默克尔根）构建而成的。像其他树一样，它是自底向上构建的。在比特币中，叶子节点始终是区块链中单个区块的交易。我们将稍后讨论使用默克尔树的好处，这样你可以自行决定叶子节点是交易还是区块中的交易组。一个典型的默克尔树可以如图
    2-22 所示。


    ![A440588_1_En_2_Fig22_HTML.jpg](img/A440588_1_En_2_Fig22_HTML.jpg)


    **图 2-22** 默克尔树表示


    与哈希指针数据结构类似，默克尔树也是防篡改的。篡改树中任何层级的数据，都无法与层级结构中上一级存储的哈希值匹配，也无法与直到根节点的哈希值匹配。攻击者要改变整棵树中的所有哈希值是非常困难的。它还保证了交易顺序的完整性。即使你只更改了交易的顺序，从该节点到默克尔根的树中哈希值也会改变。


    这里有一种情况。默克尔树是二叉树，叶子层应该有偶数个项目。如果项目数量是奇数该怎么办？一个好的解决方案是复制最后一个交易的哈希值。因为我们复制的是哈希值，这意味着只是相同的交易，并不会产生任何诸如双花或重复交易的问题。这样，就有可能平衡这棵树。


    在我们讨论的区块链中，如果我们要通过哈希值查找一笔交易，或检查过去是否发生过某笔交易，我们该如何找到那笔交易呢？唯一的方法是不断遍历，直到找到与这笔交易的哈希值完全匹配的区块。这正是默克尔树可以大显身手的地方。


    默克尔树提供了一种非常高效的方式来验证特定的交易是否属于某个特定的区块。如果默克尔树中有“n”笔交易（叶子项），那么这种验证只需要 `Log(n)` 时间，如图
    2-23 所示。


    ![A440588_1_En_2_Fig23_HTML.jpg](img/A440588_1_En_2_Fig23_HTML.jpg)


    **图 2-23** 默克尔树中的验证


    要验证一笔交易或任何其他叶子项是否属于某个默克尔树，我们不需要所有的项和整棵树。相反，只需要它的一个子集，正如我们在图 2-23 中所见。我们可以直接从要验证的交易及其兄弟节点（因为是二叉树，所以会有一个兄弟叶子项）开始，计算这两者的哈希值，并检查它是否与它们的父哈希值匹配。然后，用该父哈希值及其在该层的兄弟节点继续此过程，将它们一起哈希以得到它们的父哈希值。一直持续这个过程直到顶部的根哈希值，是实现交易验证的最快方式（对于
    n 个项目，只需 `Log(n)` 时间）。在图中，只需要实线矩形中的数据，而虚线矩形中的数据则可以在给定实线矩形数据的情况下计算得出。由于有八个交易元素（n
    = 8），验证只需要三次计算（log2 8 = 3）。

