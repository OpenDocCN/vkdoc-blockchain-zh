    it, as it would be the most secured way of working on Bitcoin. However, it is
    not a mandate and you can still work without maintaining your own node. Keep in
    mind that when you query a node, you have to mention your public address to get
    the list of UTXOs, and the full node is becoming aware of your public address,
    which is a privacy leak! All a wallet has to do is get the list of UTXOs so it
    can spend a transaction by signing it with its private key and publish that transaction
    into the Bitcoin network. This can be done by creating your own wallet software
    or by using a third-party wallet service. However, be careful with the wallet
    service providers because you are allowing them to take control of your private
    key. Whether they deliberately take your Bitcoins or they themselves are hacked,
    which has been the case with many wallet services, you lose your Bitcoins. At
    the end of the day, all wallet-service providers are centralized, though the Bitcoin
    network is decentralized. A typical pictorial representation of initiating a Bitcoin
    transaction through the wallet software can be represented as shown in the following
    (Figure [3-29](#A440588_1_En_3_Chapter.html#Fig29)).


    ![A440588_1_En_3_Fig29_HTML.jpg](A440588_1_En_3_Fig29_HTML.jpg)


    Figure 3-29


    A wallet application interacting with the Bitcoin network


    An example of an SPV client that can serve as a Bitcoin wallet is `BitcoinJ`.
    `BitcoinJ` is actually a library to work with the Bitcoin protocol, maintain a
    wallet, and initiate/validate transactions. It does not require a full node such
    as a Bitcoin Core node locally and can function as a thin client node. Though
    it is implemented in Java, it can be used from any JVM-compatible language such
    as JavaScript and Python.


    ## Summary


    In this chapter, we learned how blockchain concepts we discussed in the previous
    chapter were put together to build Bitcoin as a cryptocurrency use case of blockchain
    technology. We covered the evolution of Bitcoin, the history of it, what it is,
    the design benefits, and why it is so important. We got to know about granular
    details on the Bitcoin network, transactions, blocks, the blockchain, consensus,
    and how all these are stitched together. Then we learned about the requirement
    of a wallet solution to interact with the Bitcoin blockchain system.


    In the 1990s, mass adoption of the Internet changed the way people did business.
    It removed friction from creation and distribution of information. This paved
    the way for new markets, more opportunities, and possibilities. Similarly, blockchain
    is here today to take the Internet to a whole new level. Bitcoin is just one cryptocurrency
    application of blockchain, and the possibilities are limitless. In the next chapter,
    we will learn about how Ethereum works and how it has become a defacto standard
    for various decentralized applications on one public blockchain network.


    # How Ethereum Works


    The era of blockchain applications has just begun. Ethereum is here to be the
    defacto blockchain platform for building decentralized applications. We already
    learned in the previous chapters that public blockchain use cases are not just
    limited to cryptocurrencies, and the possibilities are only limited by your imagination!
    Ethereum has already made inroads in many business sectors and works best not
    only for public blockchain use cases, but also for the private ones. Ethereum
    has already set a benchmark for blockchain platforms and must be studied well
    to be able to envision how usable decentralized applications can be built with
    or without using Ethereum. Today, it is possible to build blockchain applications
    with minimal knowledge of cryptography, game theory, mathematics or complex coding,
    and computer science fundamentals, thanks to Ethereum.


    In Chapter [3](#A440588_1_En_3_Chapter.html), we learned how Bitcoin works by
    taking a deep dive into the protocol as well as the Bitcoin application. We witnessed
    how the cryptocurrency aspect is so much interwoven into the Bitcoin protocol.
    We learned that Bitcoin is not Bitcoin on blockchain, rather a Bitcoin blockchain.
    In this chapter, we will learn how Ethereum has successfully built an abstract
    foundation layer that is capable of empowering various different blockchain use
    cases on the same blockchain platform.


    ## From Bitcoin to Ethereum


    Obviously, blockchain technology came along with Bitcoin back in 2009. After Bitcoin
    stood the test of time, people believed in the potential of blockchain. The use
    cases now have gone beyond banking and finance sectors and have enveloped other
    industries such as supply chain, retail, e-commerce, healthcare, energy, and government
    sectors as well. This is because different flavors of blockchain have come up
    and address specific business problems. Nonetheless, there are public blockchain
    platforms such as Ethereum that allow different decentralized use cases to be
    built on the same public Ethereum platform.


    With Bitcoins, decentralized peer-to-peer transaction of cryptocurrency was possible.
    People realized that blockchain could be used to transact and keep track of anything
    of value, not just cryptocurrency. People started exploring if the same Bitcoin
    network could be used for any other use case. To give you an example, `proof of
    existence` is one such use case where the hash of a document was injected in the
    Bitcoin blockchain network so that anyone could later verify that such a ducument
    was existant in so and so point in time. Vitalik Buterin introduced the Ethereum
    blockchain platform that could facilitate transactions of not just money, but
    also shares, lands, digital content, vehicles, and many others that have some
    intrinsic value. Take a look at Figure [4-1](#A440588_1_En_4_Chapter.html#Fig1).


    ![A440588_1_En_4_Fig1_HTML.jpg](A440588_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Multiple decentralized applications on one Ethereum platform


    Like Bitcoin, Ethereum is a public blockchain platform with a different design
    philosophy. The most innovative approach was to build an abstraction layer so
    that transactions from different applications are generalized to the program code
    that can run on all the Ethereum nodes. Even in Ethereum, the miners generate
    Ether, a tradeable cryptocurrency because of which the public blockchain network
    is self-sustainable. Any application that is running on Ethereum has to pay transaction
    fees that eventually the miners get for running the nodes and sustaining the whole
    network.'
