    \ {\nweb3 = new Web3(web3.currentProvider);\n} else {\nweb3 = new Web3(new Web3.providers.HttpProvider('http://127.0.0.1:8507'));\n\
    }\nfunction getPoll() {\nvar pollingContract = new web3.eth.Contract([{\n\"constant\"\
    : true,\n\"inputs\": [{\n\"name\": \"\",\n\"type\": \"address\"\n}],\n\"name\"\
    : \"votes\",\n\"outputs\": [{\n\"name\": \"\",\n\"type\": \"uint256\"\n}],\n\"\
    payable\": false,\n\"stateMutability\": \"view\",\n\"type\": \"function\"\n},\n\
    {\n\"constant\": true,\n\"inputs\": [],\n\"name\": \"getPoll\",\n\"outputs\":\
    \ [{\n\"name\": \"\",\n\"type\": \"string\"\n}],\n\"payable\": false,\n\"stateMutability\"\
    : \"view\",\n\"type\": \"function\"\n},\n{\n\"anonymous\": false,\n\"inputs\"\
    : [{\n\"indexed\": false,\n\"name\": \"_voter\",\n\"type\": \"address\"\n},\n\
    {\n\"indexed\": false,\n\"name\": \"_value\",\n\"type\": \"uint256\"\n}\n],\n\"\
    name\": \"Voted\",\n\"type\": \"event\"\n},\n{\n\"constant\": false,\n\"inputs\"\
    : [{\n\"name\": \"selection\",\n\"type\": \"uint256\"\n}],\n\"name\": \"vote\"\
    ,\n\"outputs\": [],\n\"payable\": false,\n\"stateMutability\": \"nonpayable\"\
    ,\n\"type\": \"function\"\n}\n], '0x59E7161646C3436DFdF5eBE617B4A172974B481e');\n\
    pollingContract.methods.getPoll().call().then(function (value) {\ndocument.getElementById('pollSubject').textContent\
    \ = value;\n});\n};\nfunction submitVote() {\nvar value = 0\nvar yes = document.getElementById('yes').checked;\n\
    var no = document.getElementById('no').checked;\nif (yes) {\nvalue = 1\n} else\
    \ if (no) {\nvalue = 2\n} else {\nreturn;\n}\nvar pollingContract = new web3.eth.Contract([{\n\
    \"constant\": true,\n\"inputs\": [{\n\"name\": \"\",\n\"type\": \"address\"\n\
    }],\n\"name\": \"votes\",\n\"outputs\": [{\n\"name\": \"\",\n\"type\": \"uint256\"\
    \n}],\n\"payable\": false,\n\"stateMutability\": \"view\",\n\"type\": \"function\"\
    \n},\n{\n\"constant\": true,\n\"inputs\": [],\n\"name\": \"getPoll\",\n\"outputs\"\
    : [{\n\"name\": \"\",\n\"type\": \"string\"\n}],\n\"payable\": false,\n\"stateMutability\"\
    : \"view\",\n\"type\": \"function\"\n},\n{\n\"anonymous\": false,\n\"inputs\"\
    : [{\n\"indexed\": false,\n\"name\": \"_voter\",\n\"type\": \"address\"\n},\n\
    {\n\"indexed\": false,\n\"name\": \"_value\",\n\"type\": \"uint256\"\n}\n],\n\"\
    name\": \"Voted\",\n\"type\": \"event\"\n},\n{\n\"constant\": false,\n\"inputs\"\
    : [{\n\"name\": \"selection\",\n\"type\": \"uint256\"\n}],\n\"name\": \"vote\"\
    ,\n\"outputs\": [],\n\"payable\": false,\n\"stateMutability\": \"nonpayable\"\
    ,\n\"type\": \"function\"\n}\n], '0x59E7161646C3436DFdF5eBE617B4A172974B481e');\n\
    pollingContract.methods.vote(value).send({\nfrom: '0xbaf735f889d603f0ec6b1030c91d9033e60525c3'\n\
    }).then(function (result) {\nconsole.log(result);\n});\n};\n```\n\n现在我们来分析这个 HTML\
    \ 文件的各个部分。\n\n在 HTML 文档的 head 部分，我们从 CDN 源或本地源加载了`web3`脚本。这就像我们在网页中引用其他第三方 JavaScript\
    \ 库（如 JQuery 等）一样。\n\n接着，在 HTML 的 body 部分，我们放置了用于显示投票主题的控件，以及用于捕获用户输入的单选按钮和提交按钮。整个网页看起来像这样（图\
    \ 6-11）。\n\n![A440588_1_En_6_Fig11_HTML.jpg](img/A440588_1_En_6_Fig11_HTML.jpg)\n\
    \n图 6-11\n\n投票 Web 应用视图\n\n重要的是 body 中的脚本部分。正是在这里，我们调用了智能合约交互代码。让我们详细看看它。\n\n\
    ```\n【重复的脚本内容，此处省略】\n```\n\n在前面的脚本部分，首先我们使用本地以太坊节点的 HTTP 提供者初始化了`web3`对象（如果尚未初始化）。\n\
    \n然后，我们有两个 JavaScript 函数。一个用于从智能合约获取`pollSubject`字符串的值，另一个用于调用合约的`vote`函数。\n\n\
    调用智能合约函数的方式与上一章中使用`web3`库的`web3.eth.Contract`子模块的方式完全相同。\n\n请注意，在第一个函数`getPoll`中，我们调用了智能合约实例的`call`函数；而在第二个函数`submitVote`中，我们调用了智能合约实例的`send`函数。这是这两个函数调用的主要区别。\n\
    \n通过对智能合约的`getPoll`函数使用`call`，我们无需向网络发送任何交易即可获取`getPoll`函数的返回值。然后，我们通过将其赋值给某个\
    \ UI 元素的文本来在界面上显示这个值。\n\n接下来，通过对`vote`函数使用`send`，我们发送一笔交易来在网络上执行此函数，因此我们还必须定义一个用于执行智能合约函数的账户。以下是前面`submitVote`函数输出的结果，本质上是一笔交易收据。\n"
