- fmt: '### Blockchain Adoption So Far


    `Blockchain` came along with `Bitcoin`, a digital cryptocurrency, in 2009 via
    a simple mailing list. Soon after it was launched, people could realize its true
    potential beyond just cryptocurrency. Some companies came up with different flavors
    of `blockchain` offerings such as `Ethereum`, `Hyperledger`, etc. `Microsoft`
    and `IBM` came up with SaaS (Software as a Service) offerings on their `Azure`
    and `Bluemix` cloud platforms, respectively. Different start-ups were formed,
    and many established companies took `blockchain` initiatives that focused on solving
    some business problems that were not easily solved before.


    It is too late now to just say that `blockchain` has tremendous potential to disrupt
    almost every industry in some way or the other; the revolution has already started.
    It has hugely impacted the financial services market. It is difficult to name
    a global bank or finance entity not exploring `blockchain`. Apart from the financial
    market, initiatives have already been/are already being taken in areas such as
    media and entertainment, energy trading, prediction markets, retail chains, loyalty
    rewards systems, insurance, logistics and supply chains, medical records, and
    also government and military applications.


    As of this writing, the current situation is such that many start-ups and companies
    are able to see how a `blockchain`-based system can really address some pain areas
    and become beneficial in many ways. However, designing the right kind of `blockchain`
    solution is quite challenging. There are some really great ideas for a `blockchain`-based
    product or solution, but it is equally difficult to either build them or implement
    them. There are some use cases that can only be built on a public `blockchain`.
    Designing a self-sustainable `blockchain` with a proper mining ecosystem is difficult,
    and when it comes to the existing public `blockchain`s to build non-cryptocurrency
    applications there is none other than `Ethereum`. Whether a `blockchain` application
    is to be built in the Application Layer only and use the underlying layers as
    they are, or the application needs to be built from the ground up, is something
    difficult to decide. There are some technical challenges, too. `Blockchain` is
    still maturing, and it may take few more years for mainstream adoption. As of
    today, there are multiple propositions to address the scalability issues of `blockchain`.
    We will try to build a solid understanding on all these perspectives in this entire
    book. For now, let us see some of the specific uses and use cases in the following
    section.


    ## Blockchain Uses and Use Cases


    In this section, we will look at some of the initiatives that are already being
    taken across industries such as finance, insurance, banking, healthcare, government,
    supply chains, IoT (Internet of Things), and media and entertainment to name a
    few. The possibilities are limitless, however! A true sharing economy, which was
    difficult to achieve in centralized systems, is possible using `blockchain` technology
    (e.g., peer-to-peer versions of `Uber`, `AirBNB`). It is also possible to enable
    citizens to own their identity (Self-Sovereign Digital Identity) and monetize
    their own data using this technology. For now, let us take a look at some of the
    existing use cases.


    * Any type of property or asset, whether physical or digital, such as laptops,
    mobile phones, diamonds, automobiles, real estate, e-registrations, digital files,
    etc. can be registered on `blockchain`. This can enable these asset transactions
    from one person to another, maintain the transaction log, and check validity or
    ownerships. Also, notary services, proof of existence, tailored insurance schemes,
    and many more such use cases can be developed.

    * There are many financial use cases being developed on `blockchain` such as cross-border
    payments, share trading, loyalty and rewards system, Know Your Customer (KYC)
    among banks, etc. Initial Coin Offering (ICO) is one of the most trending use
    cases as of this writing. ICO is the best way of crowdsourcing today by using
    cryptocurrency as digital assets. A coin in an ICO can be thought of as a digital
    stock in an enterprise, which is very easy to buy and trade.

    * `Blockchain` can be used to enable “The Wisdom of Crowds” to take the lead and
    shape businesses, economies, and various other national phenomena by using collective
    wisdom! Financial and economic forecasts based on the wisdom of crowds, decentralized
    prediction markets, decentralized voting, as well as stocks trading can be possible
    on `blockchain`.

    * The process of determining music royalties has always been convoluted. The Internet-enabled
    music streaming services facilitated higher market penetration, but made the royalty
    determination more complex. This concern can pretty much be addressed by `blockchain`
    by maintaining a public ledger of music rights ownership information as well as
    authorised distribution of media content.

    * This is the IoT era, with billions of IoT devices everywhere and many more to
    join the pool. A whole bunch of different makes, models, and communication protocols
    makes it difficult to have a centralized system to control the devices and provide
    a common data exchange platform. This is also an area where `blockchain` can be
    used to build a decentralized peer-to-peer system for the IoT devices to communicate
    with each other. ADEPT (Autonomous Decentralized Peer-To-Peer Telemetry) is a
    joint initiative from IBM and Samsung that has developed a platform that uses
    elements of the `Bitcoin`’s underlying design to build a distributed network of
    devices—a decentralized IOT. ADEPT uses three protocols: `BitTorrent` for file
    sharing, `Ethereum` for smart contracts, and `TeleHash` for peer-to-peer messaging
    in the platform. The IOTA foundation is another such initiative.

    * In the government sectors as well, `blockchain` has gained momentum. There are
    use cases where technical decentralization is necessary, but politically should
    be governed by governments: land registration, vehicle registration and management,
    e-Voting, etc. are some of the active use cases. Supply chains are another area
    where there are some great use cases of `blockchain`. Supply chains have always
    been prone to disputes across the globe, as it was always difficult to maintain
    transparency in these systems.


    ## Summary


    In this chapter, we covered the evolution of `blockchain`, the history of it,
    what it is, the design benefits, and why it is so important with some relevant
    use cases. In this section, we will conclude with its game-changing offerings,
    in line with the technology revolution.


    In the 1990s, mass adoption of the Internet changed the way people did business.
    It removed friction from creation and distribution of information. This paved
    the way for new markets, more opportunities, and possibilities. Similarly, `blockchain`
    is here today to take the Internet to a whole new level by removing friction along
    three key areas: Control, Trust, and Value.


    **Control**: `Blockchain` enabled distribution of the control by making the system
    decentralized.


    **Trust**: `Blockchain` is an immutable, tamper-resistant ledger. It gives a single,
    shared source of truth to all nodes, making the system trustless. What it means
    is that trust is no longer needed to transact with any unknown person or entity
    and is inherent by design.


    **Value**: `Blockchain` enables exchange of value in any form. One can issue and
    transfer assets without central entities or intermediaries.


    In Chapter [2](#A440588_1_En_2_Chapter.html), we will take a deep dive into the
    `blockchain` fundamentals.'
