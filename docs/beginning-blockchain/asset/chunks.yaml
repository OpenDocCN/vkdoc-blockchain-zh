    ### 囚徒困境


    现实生活中的许多博弈也可能是非零和博弈。囚徒困境便是其中一例，它大致可归类为对称博弈。这是因为，如果你交换玩家的身份（例如，如果玩家“A”和“B”参与游戏，则“A”变为“B”，“B”变为“A”），且策略不变，那么收益保持不变。这就是对称博弈的含义。


    我们直接从一个例子开始。假设有两个人，鲍勃和查理，他们因独立贩卖毒品（例如，在不同地点）被警察抓获。他们被关在不同的牢房接受审讯。警方告知他们，此罪行将被判处两年监禁。现在，警方不知何故怀疑这两人也可能参与了上周刚发生的抢劫案。如果他们没抢劫，反正也是两年监禁。因此，警方需要设计一个策略来查明真相。于是他们是这么做的。


    警方找到鲍勃，给了他一个选择，一个听起来不错的选项：如果鲍勃认罪而查理不认罪，那么鲍勃的刑罚将降至一年，而查理将获刑五年。然而，如果鲍勃否认而查理认罪，那么鲍勃将获刑五年，查理仅获刑一年。另外，如果两人都认罪，那么两人都将被监禁三年。同样，警方也给了查理相同的选择。你认为他们会怎么做？这种情况就称为囚徒困境。


    鲍勃和查理身处两个不同的牢房，无法交流。如果两人都否认并各自服刑两年（仅针对毒品案），这似乎是该情况下的全局最优解。但即使他们能交谈，也未必真正信任对方。


    现在鲍勃心里会怎么想？他有两个选择：认罪或否认。他知道查理会做出对自己最有利的选择，他自己也不例外。如果他否认而查理认罪，那他就会陷入麻烦，获刑五年，而查理只需坐一年牢。他当然不想陷入这种境地。


    如果鲍勃认罪，那么查理有两个选择：认罪或否认。鲍勃想，如果他认罪，那么无论查理怎么做，他最多不会超过三年。我们来列举一下鲍勃面临的这些情况。


    - 鲍勃认罪，查理否认——鲍勃获刑一年，查理获刑五年（鲍勃认罪情况下的最佳情况）

    - 鲍勃认罪，查理也认罪——鲍勃和查理均获刑三年（鲍勃认罪情况下的最差情况）


    这种情况称为纳什均衡，即每一方都在给定对方选择的情况下做出了最优行动。这绝非全局最优解，但代表了作为个体的最佳选择。现在，如果你作为旁观者来看，你会说双方都应该否认并各自获刑两年。但当你作为参与者参与博弈时，你最终就会陷入纳什均衡。请注意，这是最稳定的阶段，此时你改变自己的决定不会带来任何好处。这可以用图
    2-17 所示的图形来表示。


    ![A440588_1_En_2_Fig17_HTML.jpg](img/A440588_1_En_2_Fig17_HTML.jpg)


    图 2-17 囚徒困境——收益矩阵


    ### 拜占庭将军问题


    在上一节中，我们了解了博弈的不同例子，并学习了一些博弈论概念。现在我们将讨论一个源自古代的具体问题，它至今仍被广泛用于解决许多计算机科学以及现实生活中的问题。


    拜占庭将军问题是拜占庭军队在进攻一座城市时遇到的问题。情况直截了当，却极难处理。简单来说，情况是：多个由不同将军指挥的军队派系包围了一座城市，意图攻克它。胜利的唯一机会是所有将军同时进攻城市。然而，问题在于如何达成共识。这意味着要么所有将军都进攻，要么所有将军都撤退。如果部分进攻、部分撤退，那么他们战败的可能性就更大。我们通过一个具体的数字例子来更好地理解这种情况。


    假设有一个场景，拜占庭军队的五个派系包围了一座城市。如果五位将军中至少有三位愿意进攻，他们就进攻城市，否则就撤退。如果将军中存在叛徒，他可以这样做：在愿意进攻的将军面前投票支持进攻，在愿意撤退的将军面前投票支持撤退。他之所以能这样做，是因为军队分散在各个派系中，这使得集中协调变得困难。这可能导致两位将军进攻城市，却因寡不敌众而战败。这种情况还可能引发更复杂的问题：


    - 如果有不止一个叛徒怎么办？

    - 将军之间如何进行消息协调？

    - 如果信使被城市指挥官抓获、杀害或收买怎么办？

    - 如果某个叛徒将军伪造了不同的消息来欺骗其他将军怎么办？

    - 如何找出哪些将军是诚实的，哪些是叛徒？


    如你所见，要对城市进行协同进攻，有太多挑战需要解决。这可以用图 2-18 所示的图形来表示。


    ![A440588_1_En_2_Fig18_HTML.jpg](img/A440588_1_En_2_Fig18_HTML.jpg)


    图 2-18 拜占庭军队进攻城市


    现实生活中有无数场景与拜占庭将军问题类似。一群人如何就某个投票议程达成共识，如何维护分布式或去中心化数据库的一致性状态，或者如何维护区块链在网络中各节点副本的一致性状态，这些都是与拜占庭将军问题相似的例子。但请注意，针对这些不同问题的解决方案在不同情境下可能截然不同。我们将在本书后面探讨比特币如何解决拜占庭将军问题。

    '
- fmt: '### Zero-Sum Games


    A zero-sum game in game theory is quite straightforward. In such games, one player’s
    gain is equivalent to another player’s loss. Example: One wins exactly the same
    amount as the opponent loses, which means choices by players can neither increase
    nor decrease the available resources in a given situation.


    `Poker`, `Chess`, `Go`, etc. are a few examples of zero-sum games. To generalize
    even more, the games where only one person wins and the opponent loses, such as
    tennis, badminton, etc. are also zero-sum games. Many financial instruments such
    as `swaps`, `forwards`, and `options` can also be described as zero-sum instruments.


    In many real-life situations, gains and losses are difficult to quantify. So,
    zero-sum games are less common compared with non-zero-sum games. Most financial
    transactions or trades and the stock market are non-zero-sum games. Insurance,
    however, is a field where a zero-sum game plays an important role. Just think
    about how the insurance schemes might work. We pay an insurance premium to the
    insurance companies to guard against some difficult situations such as accidents,
    hospitalization, death, etc. Thinking that we are insured, we live a peaceful
    life and we are fairly compensated by the insurance companies when we face such
    tough situations. There is certainly a financial backup that helps us survive.
    Note that everyone who pays the premium does not meet with accident or get hospitalized,
    and the ones who do need a lot of money compared with the premium they pay. You
    see, things are quite balanced here, even considering the operational expenses
    of the insurance company. Again, the insurance company may invest the premium
    we pay and get some return on that. Still, this is a zero-sum game.


    Just to give you a different example, if there is one open position for which
    an interview drive is happening, then the candidate who qualifies actually does
    it at the cost of others’ disqualification. This is also a zero-sum game.


    You may ask if there is any use in studying about zero-sum games. Just being aware
    of a zero-sum situation is quite useful in understanding and devising a strategy
    for any complex problem. We can analyze if we can practically gain in a given
    situation in which the transactions are taking place.


    ### Why to Study Game Theory


    Game theory is a revolutionary interdisciplinary phenomenon bringing together
    psychology, economics, mathematics, philosophy, and an extensive mix of various
    other academic areas.


    We say that game theory is related to real-world problems. However, the problems
    are limitless. Are the game theoretic concepts limitless as well? Certainly! We
    use game theory every day, knowingly or unknowingly, because we always use our
    brains to take the best strategic action, given a situation. Don’t we? If that
    is so, why study game theory?


    Well, there are numerous examples in game theory that help us think differently.
    There are some theories developed such as `Nash Equilibrium` that relate to many
    real-life situations. In many real-world situations, the participants or the players
    are faced with a decision matrix similar to that of a “prisoner’s dilemma.” So,
    learning these concepts not only helps us formulate the problems in a more mathematical
    way, but also enables us to make the best move. It lets us identify aspects that
    each participant should consider before choosing a strategic action in any given
    interaction. It tells us to identify the type of game first; who are the players,
    what are their objectives or goals, what could be their actions, etc., to be able
    to take the best action. Much decision-making in real life involves different
    parties; game theory provides the basis for rational decision-making.


    The `Byzantine Generals’ Problem` that we studied in the previous section is widely
    used in distributed storage solutions and data centers to maintain data consistency
    across computing nodes.


    ## Computer Science Engineering


    As mentioned already, it is clever engineering with the concepts from computer
    science that stitches the components of cryptography, game theory, and many others
    to build a blockchain. In this section, we will learn some of the important computer
    science components that are used in blockchain.'
