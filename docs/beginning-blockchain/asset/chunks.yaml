    \ keyPair\n# 为爱丽丝和鲍勃生成密钥\nbobKey=generate_key()\naliceKey=generate_key()\n# 打印爱丽丝和鲍勃的公钥。此密钥可以共享\n\
    alicePK=aliceKey.publickey()\nbobPK=bobKey.publickey()\nprint \"爱丽丝的公钥:\", alicePK\n\
