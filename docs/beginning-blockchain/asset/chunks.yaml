- fmt: "### Asymmetric Key Cryptography\n\nAsymmetric key cryptography, also known\
    \ as “public key cryptography,” is a revolutionary concept introduced by Diffie\
    \ and Hellman. With this technique, they solved the problem of key distribution\
    \ in a symmetric cryptography system by introducing digital signatures. Note that\
    \ asymmetric key cryptography does not eliminate the need for symmetric key cryptography.\
    \ They usually complement each other; the advantages of one can compensate for\
    \ the disadvantages of the other.\n\nLet us see a practical scenario to understand\
    \ how such a system would work. Assume that Alice wants to send a message to Bob\
    \ confidentially so that no one other than Bob can make sense of the message,\
    \ then it would require the following steps:\n\n**Alice—The Sender:**\n- Encrypt\
    \ the plaintext message `m` using encryption algorithm `E` and the public key\
    \ `Puk[Bob]` to prepare the ciphertext `c`.\n- `c = E(Puk[Bob], m)`\n- Send the\
    \ ciphertext `c` to Bob.\n\n**Bob—The Receiver:**\n- Decrypt the ciphertext `c`\
    \ using decryption algorithm `D` and its private key `Prk[Bob]` to get the original\
    \ plaintext `m`.\n- `m = D(Prk[Bob], c)`\n\nSuch a system can be represented as\
    \ shown in Figure [2-13](#A440588_1_En_2_Chapter.html#Fig13).\n\n![A440588_1_En_2_Fig13_HTML.jpg](A440588_1_En_2_Fig13_HTML.jpg)\n\
    \nFigure 2-13  \nAsymmetric cryptography for confidentiality\n\nNotice that the\
    \ public key should be kept in a public repository accessible to everyone and\
    \ the private key should be kept as a well-guarded secret. Public key cryptography\
    \ also provides a way of authentication. The receiver, Bob, can verify the authenticity\
    \ of the origin of the message `m` in the same way.\n\n![A440588_1_En_2_Fig14_HTML.jpg](A440588_1_En_2_Fig14_HTML.jpg)\n\
    \nFigure 2-14  \nAsymmetric cryptography for authentication\n\nIn the example\
    \ in Figure [2-14](#A440588_1_En_2_Chapter.html#Fig14), the message was prepared\
    \ using Alice’s private key, so it could be ensured that it only came from Alice.\
    \ So, the entire message served as a digital signature. Note that both confidentiality\
    \ and authentication are desirable. To facilitate this, public key encryption\
    \ has to be used twice. The message should first be encrypted with the sender’s\
    \ private key to provide a digital signature. Then it should be encrypted with\
    \ the receiver’s public key to provide confidentiality. It can be represented\
    \ as:\n- `c = E[Puk[Bob], E(Prk[Alice], m)]`\n- `m = D[Puk[Alice], D(Prk[Bob],\
    \ c)]`\n\nAs you can see, the decryption happens in just its reverse order. Notice\
    \ that the public key cryptography is used four times here: twice for encryption\
    \ and twice for decryption. It is also possible that the sender may sign the message\
    \ by applying the private key to just a small block of data derived from the message\
    \ to be sent, and not to the whole message. In the real world, App stores such\
    \ as Google Play or Apple App Store require that the software apps should be digitally\
    \ signed before they get published.\n\nWe looked at the uses of the two keys in\
    \ asymmetric cryptography, which can be summarized as follows:\n- Public keys\
    \ are known and accessible to everyone. They can be used to encrypt the message\
    \ or to verify the signatures.\n- Private keys are extremely private to individuals.\
    \ They are used to decrypt the message or to create signatures.\n\nIn asymmetric\
    \ or public key cryptography, there is no key distribution problem, as exchanging\
    \ the agreed upon key is no longer needed. However, there is a significant challenge\
    \ with this approach. How would one ensure that the public key they are using\
    \ to encrypt the message is really the public key of the intended recipient and\
    \ not of an intruder or eavesdropper? To solve this, the notion of a trusted third\
    \ party called public key infrastructure (PKI) is introduced. Through PKIs, the\
    \ authenticity of public keys is assured by the process of attestation or notarization\
    \ of user identity. The way PKIs operate is that they provide verified public\
    \ keys by embedding them in a security certificate by digitally signing them.\n\
    \nThe public key encryption scheme can also be called one-way function or a trapdoor\
    \ function. This is because encrypting a plaintext using the public key `Puk`\
    \ is easy, but the other direction is practically impossible. No one really can\
    \ deduce the original plaintext from the encrypted ciphertext without knowing\
    \ the secret or private key `Prk`, which is actually the trapdoor information.\
    \ Also, in the context of just the keys, they are mathematically related but it\
    \ is computationally not feasible to find one from the other.\n\nWe discussed\
    \ the important objectives of public key cryptography such as key establishment,\
    \ authentication and non-repudiation through digital signatures, and confidentiality\
    \ through encryption. However, not all public key cryptography algorithms may\
    \ provide all these three characteristics. Also, the algorithms are different\
    \ in terms of their underlying computational problem and are classified accordingly.\
    \ Certain algorithms such as `RSA` are based on integer factorization scheme because\
    \ it is difficult to factor large numbers. Certain algorithms are based on the\
    \ discrete logarithm problems in finite fields such as Diffie–Hellman key exchange\
    \ (`DH`) and `DSA`. A generalized version of discrete logarithm problems is elliptic\
    \ curve (`EC`) public key schemes. The Elliptic Curve Digital Signature Algorithm\
    \ (`ECDSA`) is an example of it. We will cover most of these algorithms in the\
    \ following section.\n\n### RSA\n\n`RSA` algorithm, named after Ron Rivest, Adi\
    \ Shamir, and Leonard Adleman is possibly one of the most widely used cryptographic\
    \ algorithms. It is based on the practical difficulty of factoring very large\
    \ numbers. In `RSA`, plaintext and ciphertext are integers between `0` and `n\
    \ − 1` for some `n`.\n\nWe will discuss the `RSA` scheme from two aspects. First\
    \ is generation of key pairs and second, how the encryption and decryption works.\
    \ Since modular arithmetic provides the mechanism for key generation, let us quickly\
    \ look at it.\n\n#### Modular Arithmetic\n\nLet `m` be a positive integer called\
    \ modulus. Two integers `a` and `b` are congruent modulo `m` if:\n\n```\na ≡ b\
    \ (mod m), which implies a − b = m . k for some integer k.\n```\n\nExample: if\
    \ `a ≡ 16 (mod 10)` then `a` can have the following solutions:\n\n```\na = . .\
    \ ., −24, −14, −4, 6, 16, 26, 36, 46\n```\n\nAny of these numbers subtracted by\
    \ `16` is divisible by `10`. For example, `−24 −16 = −40`, which is divisible\
    \ by `10`. Note that `a ≡ 36 (mod 10)` can also have the same solutions of `a`.\n\
    \nAs per the Quotient-Remainder theorem, only a unique solution of `a` exists\
    \ that satisfies the condition: `0 ≤ a < m`. In the example `a ≡ 16 (mod 10)`,\
    \ only the value `6` satisfies the condition `0 ≤ 6 < 10`. This is what will be\
    \ used in the encryption/decryption process of `RSA` algorithm.\n\nLet us now\
    \ look at the Inverse Modulus. If `b` is an inverse to `a` modulo `m`, then it\
    \ can be represented as:\n\n```\na b ≡ 1 (mod m), which implies that a b − 1 =\
    \ m . k for some integer k.\n```\n\nExample: `3` has inverse `7` modulo `10` since\n\
    \n```\n3 · 7 = 1 (mod 10) => 21 − 1 = 20, which is divisible by 10.\n```"
  raw: '### Asymmetric Key Cryptography


    Asymmetric key cryptography, also known as “public key cryptography,” is a revolutionary
    concept introduced by Diffie and Hellman. With this technique, they solved the
    problem of key distribution in a symmetric cryptography system by introducing
    digital signatures. Note that asymmetric key cryptography does not eliminate the
    need for symmetric key cryptography. They usually complement each other; the advantages
    of one can compensate for the disadvantages of the other.


    Let us see a practical scenario to understand how such a system would work. Assume
    that Alice wants to send a message to Bob confidentially so that no one other
    than Bob can make sense of the message, then it would require the following steps:


    Alice—The Sender:


    *   Encrypt the plaintext message m using encryption algorithm E and the public
    key Puk[Bob] to prepare the ciphertext c.

    *   c = E(Puk[Bob], m )

    *   Send the ciphertext c to Bob.


    Bob—The Receiver:


    *   Decrypt the ciphertext c using decryption algorithm D and its private key
    Prk[Bob] to get the original plaintext m.

    *   m = D(Prk[Bob], c)


    Such a system can be represented as shown in Figure [2-13](#A440588_1_En_2_Chapter.html#Fig13).


    ![A440588_1_En_2_Fig13_HTML.jpg](A440588_1_En_2_Fig13_HTML.jpg)


    Figure 2-13


    Asymmetric cryptography for confidentiality


    Notice that the public key should be kept in a public repository accessible to
    everyone and the private key should be kept as a well-guarded secret. Public key
    cryptography also provides a way of authentication. The receiver, Bob, can verify
    the authenticity of the origin of the message m in the same way.


    ![A440588_1_En_2_Fig14_HTML.jpg](A440588_1_En_2_Fig14_HTML.jpg)


    Figure 2-14


    Asymmetric cryptography for authentication


    In the example in Figure [2-14](#A440588_1_En_2_Chapter.html#Fig14), the message
    was prepared using Alice’s private key, so it could be ensured that it only came
    from Alice. So, the entire message served as a digital signature. Note that both
    confidentiality and authentication are desirable. To facilitate this, public key
    encryption has to be used twice. The message should first be encrypted with the
    sender’s private key to provide a digital signature. Then it should be encrypted
    with the receiver’s public key to provide confidentiality. It can be represented
    as:


    *   c = E[Puk [Bob] , E(Prk [Alice] , m)]

    *   m = D[Puk [Alice] , D(Prk [Bob] , c)]


    As you can see, the decryption happens in just its reverse order. Notice that
    the public key cryptography is used four times here: twice for encryption and
    twice for decryption. It is also possible that the sender may sign the message
    by applying the private key to just a small block of data derived from the message
    to be sent, and not to the whole message. In the real world, App stores such as
    Google Play or Apple App Store require that the software apps should be digitally
    signed before they get published.


    We looked at the uses of the two keys in asymmetric cryptography, which can be
    summarized as follows:


    *   Public keys are known and accessible to everyone. They can be used to encrypt
    the message or to verify the signatures.

    *   Private keys are extremely private to individuals. They are used to decrypt
    the message or to create signatures.


    In asymmetric or public key cryptography, there is no key distribution problem,
    as exchanging the agreed upon key is no longer needed. However, there is a significant
    challenge with this approach. How would one ensure that the public key they are
    using to encrypt the message is really the public key of the intended recipient
    and not of an intruder or eavesdropper? To solve this, the notion of a trusted
    third party called public key infrastructure (PKI) is introduced. Through PKIs,
    the authenticity of public keys is assured by the process of attestation or notarization
    of user identity. The way PKIs operate is that they provide verified public keys
    by embedding them in a security certificate by digitally signing them.


    The public key encryption scheme can also be called one-way function or a trapdoor
    function. This is because encrypting a plaintext using the public key “Puk” is
    easy, but the other direction is practically impossible. No one really can deduce
    the original plaintext from the encrypted ciphertext without knowing the secret
    or private key “Prk,” which is actually the trapdoor information. Also, in the
    context of just the keys, they are mathematically related but it is computationally
    not feasible to find one from the other.


    We discussed the important objectives of public key cryptography such as key establishment,
    authentication and non-repudiation through digital signatures, and confidentiality
    through encryption. However, not all public key cryptography algorithms may provide
    all these three characteristics. Also, the algorithms are different in terms of
    their underlying computational problem and are classified accordingly. Certain
    algorithms such as RSA are based on integer factorization scheme because it is
    difficult to factor large numbers. Certain algorithms are based on the discrete
    logarithm problems in finite fields such as Diffie–Hellman key exchange (DH) and
    DSA. A generalized version of discrete logarithm problems is elliptic curve (EC)
    public key schemes. The Elliptic Curve Digital Signature Algorithm (ECDSA) is
    an example of it. We will cover most of these algorithms in the following section.


    #### RSA


    RSA algorithm, named after Ron Rivest, Adi Shamir, and Leonard Adleman is possibly
    one of the most widely used cryptographic algorithms. It is based on the practical
    difficulty of factoring very large numbers. In RSA, plaintext and ciphertext are
    integers between 0 and n − 1 for some n.


    We will discuss the RSA scheme from two aspects. First is generation of key pairs
    and second, how the encryption and decryption works. Since modular arithmetic
    provides the mechanism for key generation, let us quickly look at it.


    ##### Modular Arithmetic


    Let m be a positive integer called modulus. Two integers a and b are congruent
    modulo m if:


    a ≡ b (mod m), which implies a − b = m . k for some integer k.


    Example: if a ≡ 16 (mod 10) then a can have the following solutions:


    a = . . ., −24, − 14, −4, 6, 16, 26, 36, 46


    Any of these numbers subtracted by 16 is divisible by 10\. For example, −24 −16
    = −40, which is divisible by 10\. Note that a ≡ 36 (mod 10) can also have the
    same solutions of a.


    As per the Quotient-Remainder theorem, only a unique solution of “a” exists that
    satisfies the condition: 0 ≤ a < m. In the example a ≡ 16 (mod 10), only the value
    6 satisfies the condition 0 ≤ 6 < 10\. This is what will be used in the encryption/decryption
    process of RSA algorithm.


    Let us now look at the Inverse Midulus. If b is an inverse to a modulo m, then
    it can be represented as:


    a b ≡ 1 (mod m), which implies that a b − 1 = m . k for some integer k.


    Example: 3 has inverse 7 modulo 10 since


    3 · 7 = 1 (mod 10) => 21 − 1 = 20, which is divisible by 10.'
  trans: "\n### 非对称密钥密码学\n\n非对称密钥密码学，也称为“公钥密码学”，是由迪菲和赫尔曼提出的一项革命性概念。通过引入数字签名，他们解决了对称密码系统中密钥分发的问题。请注意，非对称密钥密码学并未消除对对称密钥密码学的需求。它们通常相互补充；一方的优势可以弥补另一方的劣势。\n\
    \n让我们看一个实际场景来理解此类系统是如何运作的。假设爱丽丝想秘密地发送一条消息给鲍勃，确保除了鲍勃之外没有人能理解这条消息，那么这需要以下步骤：\n\n\
    **爱丽丝——发送者：**\n- 使用加密算法 `E` 和公钥 `Puk[Bob]` 对明文消息 `m` 进行加密，以生成密文 `c`。\n- `c = E(Puk[Bob],\
    \ m)`\n- 将密文 `c` 发送给鲍勃。\n\n**鲍勃——接收者：**\n- 使用解密算法 `D` 及其私钥 `Prk[Bob]` 对密文 `c`\
    \ 进行解密，以获得原始明文 `m`。\n- `m = D(Prk[Bob], c)`\n\n此类系统可以如图 2-13 所示。\n\n![A440588_1_En_2_Fig13_HTML.jpg](img/A440588_1_En_2_Fig13_HTML.jpg)\n\
    \n图 2-13  \n用于保密的非对称密码学\n\n请注意，公钥应保存在人人可访问的公共存储库中，而私钥则必须作为严密保守的秘密保存。公钥密码学也提供了一种身份验证方式。接收者鲍勃可以用同样的方式验证消息\
    \ `m` 来源的真实性。\n\n![A440588_1_En_2_Fig14_HTML.jpg](img/A440588_1_En_2_Fig14_HTML.jpg)\n\
    \n图 2-14  \n用于身份验证的非对称密码学\n\n在图 2-14 的例子中，消息是使用爱丽丝的私钥准备的，因此可以确保该消息确实来自爱丽丝。因此，整个消息充当了数字签名。请注意，保密性和身份验证都是可取的。为了实现这一点，公钥加密必须使用两次。消息应首先使用发送者的私钥进行加密以提供数字签名。然后，它应使用接收者的公钥进行加密以提供保密性。可以表示为：\n\
    - `c = E[Puk[Bob], E(Prk[Alice], m)]`\n- `m = D[Puk[Alice], D(Prk[Bob], c)]`\n\
    \n如您所见，解密完全按照相反的顺序进行。请注意，这里公钥密码学被使用了四次：两次用于加密，两次用于解密。发送者也可以仅对从待发送消息中派生出的一小块数据（而非整个消息）应用私钥来签署消息。在现实世界中，像\
    \ Google Play 或 Apple App Store 这样的应用商店要求软件应用在发布前必须进行数字签名。\n\n我们了解了非对称密码学中两种密钥的用途，可以总结如下：\n\
    - 公钥对人人皆知且可访问。它们可用于加密消息或验证签名。\n- 私钥对个人而言极其私密。它们用于解密消息或创建签名。\n\n在非对称或公钥密码学中，不存在密钥分发问题，因为不再需要交换约定的密钥。然而，这种方法也存在一个重大挑战。如何确保某人用来加密消息的公钥确实是预期接收者的公钥，而不是入侵者或窃听者的公钥？为了解决这个问题，引入了被称为公钥基础设施（PKI）的受信任第三方概念。通过\
    \ PKI，公钥的真实性通过用户身份的认证或公证过程得到保证。PKI 的运作方式是，它们通过数字签名将验证过的公钥嵌入到安全证书中并提供。\n\n公钥加密方案也可以称为单向函数或陷门函数。这是因为使用公钥\
    \ `Puk` 加密明文很容易，但反向操作实际上是不可能的。不掌握秘密或私钥 `Prk`（这实际上是陷门信息），任何人都无法从加密的密文中推断出原始明文。此外，仅就密钥而言，它们在数学上是相关的，但从计算上从一个推导出另一个是不可行的。\n\
    \n我们讨论了公钥密码学的重要目标，例如通过数字签名实现密钥建立、身份验证和不可否认性，以及通过加密实现保密性。然而，并非所有公钥密码学算法都能提供这三个特性。此外，这些算法在其底层计算问题方面也各不相同，并据此进行分类。某些算法（例如\
    \ `RSA`）基于整数因式分解方案，因为分解大数很困难。某些算法基于有限域中的离散对数问题，例如 Diffie–Hellman 密钥交换（`DH`）和 `DSA`。离散对数问题的一个推广版本是椭圆曲线（`EC`）公钥方案。椭圆曲线数字签名算法（`ECDSA`）就是一个例子。我们将在下一节介绍这些算法中的绝大部分。\n\
    \n### RSA\n\n以罗恩·李维斯特、阿迪·萨莫尔和伦纳德·阿德曼命名的 `RSA` 算法可能是使用最广泛的密码学算法之一。它基于分解极大数的实际困难。在\
    \ `RSA` 中，对于某个 `n`，明文和密文是介于 `0` 和 `n − 1` 之间的整数。\n\n我们将从两个方面讨论 `RSA` 方案。首先是密钥对的生成，其次是加密和解密的工作原理。由于模运算为密钥生成提供了机制，让我们快速了解一下它。\n\
    \n#### 模运算\n\n设 `m` 是一个称为模数的正整数。两个整数 `a` 和 `b` 对模数 `m` 同余，如果：\n\n```\na ≡ b (mod\
    \ m)，这意味着 a − b = m . k，其中 k 为某个整数。\n```\n\n示例：如果 `a ≡ 16 (mod 10)`，那么 `a` 可以有以下解：\n\
    \n```\na = . . ., −24, −14, −4, 6, 16, 26, 36, 46\n```\n\n这些数字中的任何一个减去 `16` 都能被\
    \ `10` 整除。例如，`−24 −16 = −40`，它可以被 `10` 整除。请注意，`a ≡ 36 (mod 10)` 也可以有相同的 `a` 的解。\n\
    \n根据商余定理，存在一个满足条件 `0 ≤ a < m` 的唯一解 `a`。在示例 `a ≡ 16 (mod 10)` 中，只有值 `6` 满足条件 `0\
    \ ≤ 6 < 10`。这就是 `RSA` 算法加密/解密过程中将要使用的内容。\n\n现在让我们看一下逆模。如果 `b` 是 `a` 模 `m` 的逆元，那么它可以表示为：\n\
    \n```\na b ≡ 1 (mod m)，这意味着 a b − 1 = m . k，其中 k 为某个整数。\n```\n\n示例：`3` 模 `10`\
    \ 的逆元是 `7`，因为\n\n```\n3 · 7 = 1 (mod 10) => 21 − 1 = 20，它可以被 10 整除。\n```\n"
- fmt: '### Generation of Key Pairs


    As discussed already, a key pair of private and public keys is needed for any
    party to participate in asymmetric crypto-communication. In the RSA scheme, the
    public key consists of `(e, n)` where `n` is called the modulus and `e` is called
    the public exponent. Similarly, the private key consists of `(d, n)`, where `n`
    is the same modulus and `d` is the private exponent.


    Let us see how these keys get generated along with an example:


    - Generate a pair of two large prime numbers `p` and `q`. Let us take two small
    prime numbers as an example here for the sake of easy understanding. So, let the
    two primes be `p = 7` and `q = 17`.

    - Compute the RSA modulus (`n`) as `n = pq`. This `n` should be a large number,
    typically a minimum of 512 bits. In our example, the modulus (`n`) = `pq = 119`.

    - Find a public exponent `e` such that `1 < e < (p − 1)(q − 1)` and there must
    be no common factor for `e` and `(p − 1)(q − 1)` except 1. It implies that `e`
    and `(p − 1)(q − 1)` are coprime. Note that there can be multiple values that
    satisfy this condition and can be taken as `e`, but any one should be taken.

    - In our example, `(p − 1)(q − 1) = 6 × 16 = 96`. So, `e` can be relatively prime
    to and less than 96. Let us take `e` to be 5.

    - Now the pair of numbers `(e, n)` form the public key and should be made public.
    So, in our example, the public key is `(5, 119)`.

    - Calculate the private exponent `d` using `p`, `q`, and `e` considering the number
    `d` is the inverse of `e` modulo `(p − 1)(q − 1)`. This implies that `d` when
    multiplied by `e` is equal to 1 modulo `(p − 1)(q − 1)` and `d < (p − 1)(q − 1)`.
    It can be represented as:


    ```

    e d = 1 mod (p − 1)(q − 1)

    ```


    - Note that this multiplicative inverse is the link between the private key and
    the public key. Though the keys are not derived from each other, there is a relation
    between them.

    - In our example, we have to find `d` such that the above equation is satisfied.
    Which means, `5 d = 1 mod 96` and also `d < 96`.

    - Solving for multiple values of `d` (can be calculated using the extended version
    of Euclid’s algorithm), we can see that `d = 77` satisfies our condition. See
    the math: `77 × 5 = 385` and `385 − 1 = 384` is divisible by 96 because `4 × 96
    + 1 = 385`.

    - We can conclude that in our example, the private key will be `(77, 119)`.

    - Now you have got your key pairs!


    ### Encryption/Decryption Using Key Pair


    Once the keys are generated, the process of encryption and decryption are fairly
    simple. The math behind them is as follows:


    Encrypting the plaintext message `m` to get the ciphertext message `c` is as follows:


    ```

    c = m^e (mod n)

    ```


    given the public key `(e, n)` and the plaintext message `m`.


    Decrypting the ciphertext message `c` to get the plaintext message `m` is as follows:


    ```

    m = c^d (mod n)

    ```


    given the private key `(d, n)` and the ciphertext `c`.


    Note that RSA scheme is a block cipher where the input is divided into small blocks
    that the RSA algorithm can consume. Also, the plaintext and the ciphertext are
    all integers from 0 to `n − 1` for some integer `n` that is known to both sender
    and receiver. This means that the input plaintext is represented as integer, and
    when that goes through RSA and becomes ciphertext, they are again integers but
    not the same ones as input; we encrypted them remember? Now, considering the same
    key pairs from the previous example, let us go through the steps to understand
    how it works practically:


    - The sender wants to send a text message to the receiver whose public key is
    known and is say `(e, n)`.

    - The sender breaks the text message into blocks that can be represented as a
    series of numbers less than `n`.

    - The ciphertext equivalents of plaintext can be found using `c = m^e (mod n)`.
    If the plaintext (`m`) is 19 and the public key is `(5, 119)` with `e = 5` and
    `n = 119`, then the ciphertext `c` will be `19^5 (mod 119) = 2,476,099 (mod 119)
    = 66`, which is the remainder and 20,807 is the quotient, which we do not use.
    So, `c = 66`.

    - When the ciphertext 66 is received at the receiver’s end, it needs to be decrypted
    to get the plaintext using `m = c^d (mod n)`.

    - The receiver already has the private key `(d, n)` with `d = 77` and `n = 119`,
    and received the ciphertext `c = 66` by the sender. So, the receiver can easily
    retrieve the plaintext using these values as `m = 66^77 (mod 119) = 19`.

    - For the modular arithmetic calculations, there are many online calculators that
    you can play around with, such as: [`http://comnuan.com/cmnn02/cmnn02008/`](http://comnuan.com/cmnn02/cmnn02008/).


    We looked at the math behind RSA algorithm. Now we know that `n` (supposed to
    be a very large number) is publicly available. Though it is public, factoring
    this large number to get the prime numbers `p` and `q` is extremely difficult.
    The RSA scheme is based on this practical difficulty of factoring large numbers.
    If `p` and `q` are not large enough, or the public key `e` is small, then the
    strength of RSA goes down. Currently, RSA keys are typically between 1024 and
    2048 bits long. Note that the computational overhead of the RSA cryptography increases
    with the size of the keys.


    In situations where the amount of data is huge, it is advisable to use a symmetric
    encryption technique and share the key using an asymmetric encryption technique
    such as RSA. Also, we looked at one of the aspects of RSA, that is, for encryption
    and decryption. However, it can also be used for authentication through digital
    signature. Just to give a high-level idea, one can take the hash of the data,
    sign it using their own private key, and share it along with the data. The receiver
    can check with the sender’s public key and ensure that it was the sender who sent
    the data, and not someone else. This way, in addition to secure key transport,
    the public key encryption method RSA also offers authentication using a digital
    signature. Note here that a different algorithm called digital signature algorithm
    (DSA) can also be used in such situations that we will learn about in the following
    section.


    RSA is widely being used with HTTPS on web browsers, emails, VPNs, and satellite
    TV. Also, many commercial applications or the apps in app stores are also digitally
    signed using RSA. SSH also uses public key cryptography; when you connect to an
    SSH server, it broadcasts a public key that can be used to encrypt data to be
    sent to that server. The server can then decrypt the data using its private key.'
  raw: '##### Generation of Key Pairs


    As discussed already, a key pair of private and public keys is needed for any
    party to participate in asymmetric crypto-communication. In the RSA scheme, the
    public key consists of (e, n) where n is called the modulus and e is called the
    public exponent. Similarly, the private key consists of (d, n), where n is the
    same modulus and d is the private exponent.


    Let us see how these keys get generated along with an example:


    *   Generate a pair of two large prime numbers p and q. Let us take two small
    prime numbers as an example here for the sake of easy understanding. So, let the
    two primes be p = 7 and q = 17.

    *   Compute the RSA modulus (n) as n = pq. This n should be a large number, typically
    a minimum of 512 bits. In our example, the modulus (n) = pq = 119.

    *   Find a public exponent e such that 1 < e < (p − 1) (q − 1) and there must
    be no common factor for e and (p − 1) (q − 1) except 1\. It implies that e and
    (p − 1) (q − 1) are coprime. Note that there can be multiple values that satisfy
    this condition and can be taken as e, but any one should be taken.

    *   In our example, (p − 1) (q − 1) = 6 × 16 = 96\. So, e can be relatively prime
    to and less than 96\. Let us take e to be 5.

    *   Now the pair of numbers (e, n) form the public key and should be made public.
    So, in our example, the public key is (5, 119).

    *   Calculate the private exponent d using p, q, and e considering the number
    d is the inverse of e modulo (p − 1) (q − 1). This implies that d when multiplied
    by e is equal to 1 modulo (p − 1) (q − 1) and d < (p − 1) (q − 1). It can be represented
    as:


    e d = 1 mod (p − 1) (q − 1)


    *   Note that this multiplicative inverse is the link between the private key
    and the public key. Though the keys are not derived from each other, there is
    a relation between them.

    *   In our example, we have to find d such that the above equation is satisfied.
    Which means, 5 d = 1 mod 96 and also d < 96.

    *   Solving for multiple values of d (can be calculated using the extended version
    of Euclid’s algorithm), we can see that d = 77 satisfies our condition. See the
    math: 77 × 5 = 385 and 385 − 1 = 384 is divisible by 96 because 4 × 96 + 1 = 385

    *   We can conclude that the in our example, the private key will be (77, 119).

    *   Now you have got your key pairs!


    ##### Encryption/Decryption Using Key Pair


    Once the keys are generated, the process of encryption and decryption are fairly
    simple. The math behind them is as follows:


    Encrypting the plaintext message m to get the ciphertext message c is as follows:


    c = m . e (mod n) given the public key (e, n) and the plaintext message m.


    Decrypting the ciphertext message c to get the plaintext message m is as follows:


    m = c . d (mod n) given the private key (d, n) and the ciphertext c.


    Note that RSA scheme is a block cipher where the input is divided into small blocks
    that the RSA algorithm can consume. Also, the plaintext and the ciphertext are
    all integers from 0 to n − 1 for some integer n that is known to both sender and
    receiver. This means that the input plaintext is represented as integer, and when
    that goes through RSA and becomes ciphertext, they are again integers but not
    the same ones as input; we encrypted them remember? Now, considering the same
    key pairs from the previous example, let us go through the steps to understand
    how it works practically:


    *   The sender wants to send a text message to the receiver whose public key is
    known and is say (e, n).

    *   The sender breaks the text message into blocks that can be represented as
    a series of numbers less than n.

    *   The ciphertext equivalents of plaintext can be found using c = m e (mod n).
    If the plaintext (m) is 19 and the public key is (5, 119) with e = 5 and n = 119,
    then the ciphertext c will be 195(mod 119) = 2, 476, 099 (mod 119) = 66, which
    is the remainder and 20,807 is the quotient, which we do not use. So, c = 66

    *   When the ciphertext 66 is received at the receiver’s end, it needs to be decrypted
    to get the plaintext using m = c d (mod n).

    *   The receiver already has the private key (d, n) with d = 77 and n = 119, and
    received the ciphertext c = 66 by the sender. So, the receiver can easily retrieve
    the plaintext using these values as m = 6,677(mod 119) = 19

    *   For the modular arithmetic calculations, there are many online calculators
    that you can play around with, such as: [`http://comnuan.com/cmnn02/cmnn02008/`](http://comnuan.com/cmnn02/cmnn02008/)


    We looked at the math behind RSA algorithm. Now we know that n (supposed to be
    a very large number) is publicly available. Though it is public, factoring this
    large number to get the prime numbers p and q is extremely difficult. The RSA
    scheme is based on this practical difficulty of factoring large numbers. If p
    and q are not large enough, or the public key e is small, then the strength of
    RSA goes down. Currently, RSA keys are typically between 1024 and 2048 bits long.
    Note that the computational overhead of the RSA cryptography increases with the
    size of the keys.


    In situations where the amount of data is huge, it is advisable to use a symmetric
    encryption technique and share the key using an asymmetric encryption technique
    such as RSA. Also, we looked at one of the aspects of RSA, that is, for encryption
    and decryption. However, it can also be used for authentication through digital
    signature. Just to give a high-level idea, one can take the hash of the data,
    sign it using their own private key, and share it along with the data. The receiver
    can check with the sender’s public key and ensure that it was the sender who sent
    the data, and not someone else. This way, in addition to secure key transport,
    the public key encryption method RSA also offers authentication using a digital
    signature. Note here that a different algorithm called digital signature algorithm
    (DSA) can also be used in such situations that we will learn about in the following
    section.


    RSA is widely being used with HTTPS on web browsers, emails, VPNs, and satellite
    TV. Also, many commercial applications or the apps in app stores are also digitally
    signed using RSA. SSH also uses public key cryptography; when you connect to an
    SSH server, it broadcasts a public key that can be used to encrypt data to be
    sent to that server. The server can then decrypt the data using its private key.'
  trans: '

    ### 密钥对的生成


    如前所述，任何一方想要参与非对称加密通信，都需要一对私钥和公钥。在 RSA 方案中，公钥由`(e, n)`组成，其中`n`称为模数，`e`称为公钥指数。类似地，私钥由`(d,
    n)`组成，其中`n`是相同的模数，`d`是私钥指数。


    让我们通过一个例子来看看这些密钥是如何生成的：


    -   生成一对大素数 `p` 和 `q`。为了便于理解，我们在此以两个较小的素数为例。那么，令这两个素数为 `p = 7` 和 `q = 17`。

    -   计算 RSA 模数 (`n`)，即 `n = pq`。这个 `n` 应该是一个大数，通常至少为 512 位。在我们的例子中，模数 (`n`) = `pq
    = 119`。

    -   找到一个公钥指数 `e`，使得 `1 < e < (p − 1)(q − 1)`，并且 `e` 与 `(p − 1)(q − 1)` 除了 1 之外没有公因子。这意味着
    `e` 和 `(p − 1)(q − 1)` 互质。注意，满足此条件的值可能有多个，都可以作为 `e`，但只需选取其中一个。

    -   在我们的例子中，`(p − 1)(q − 1) = 6 × 16 = 96`。所以，`e` 必须小于 96 且与 96 互质。我们令 `e` 为 5。

    -   现在，数对 `(e, n)` 就构成了公钥，应该被公开。所以，在我们的例子中，公钥是 `(5, 119)`。

    -   使用 `p`、`q` 和 `e` 计算私钥指数 `d`，其中数字 `d` 是 `e` 关于模 `(p − 1)(q − 1)` 的逆元。这意味着 `d`
    乘以 `e` 等于 1 模 `(p − 1)(q − 1)`，并且 `d < (p − 1)(q − 1)`。这可以表示为：


    ```

    e d = 1 mod (p − 1)(q − 1)

    ```


    -   注意，这个乘法逆元是私钥和公钥之间的纽带。虽然密钥并非彼此派生而来，但它们之间存在关联。

    -   在我们的例子中，我们必须找到满足上述方程的 `d`。即，`5 d = 1 mod 96` 并且 `d < 96`。

    -   求解 `d` 的多个值（可以使用扩展欧几里得算法计算），我们可以看到 `d = 77` 满足我们的条件。验算一下：`77 × 5 = 385`，并且
    `385 − 1 = 384` 能被 96 整除，因为 `4 × 96 + 1 = 385`。

    -   我们可以得出结论，在我们的例子中，私钥将是 `(77, 119)`。

    -   现在你就得到了你的密钥对！


    ### 使用密钥对进行加密/解密


    一旦密钥生成，加密和解密的过程就相当简单了。其背后的数学原理如下：


    使用公钥 `(e, n)` 将明文消息 `m` 加密为密文消息 `c` 的方法如下：


    ```

    c = m^e (mod n)

    ```


    给定公钥 `(e, n)` 和明文消息 `m`。


    使用私钥 `(d, n)` 将密文消息 `c` 解密为明文消息 `m` 的方法如下：


    ```

    m = c^d (mod n)

    ```


    给定私钥 `(d, n)` 和密文 `c`。


    注意，RSA 方案是一种分组密码，其中输入被分成 RSA 算法可以处理的小块。此外，对于某个收发送双方都已知的整数 `n`，明文和密文都是 0 到 `n −
    1` 之间的整数。这意味着输入的明文被表示为整数，当它经过 RSA 处理变成密文时，它们仍然是整数，但不再是输入的整数；我们加密了它们，记得吗？现在，考虑与前面例子相同的密钥对，让我们逐步理解它实际是如何工作的：


    -   发送方想要向接收方发送一条文本消息，接收方的公钥是已知的，假设为 `(e, n)`。

    -   发送方将文本消息分成若干块，这些块可以表示为一串小于 `n` 的数字。

    -   明文的密文等价物可以使用 `c = m^e (mod n)` 求得。如果明文 (`m`) 是 19，公钥是 `(5, 119)`，其中 `e = 5`
    且 `n = 119`，那么密文 `c` 将是 `19⁵ (mod 119) = 2,476,099 (mod 119) = 66`，66 是余数，20,807
    是商，我们不需要商。所以，`c = 66`。

    -   当密文 66 被接收方收到后，需要使用 `m = c^d (mod n)` 对其进行解密以获得明文。

    -   接收方已经持有私钥 `(d, n)`，其中 `d = 77` 且 `n = 119`，并收到了发送方发送的密文 `c = 66`。因此，接收方可以轻松地使用这些值恢复出明文，即
    `m = 66⁷⁷ (mod 119) = 19`。

    -   关于模算术的计算，有很多在线计算器可供您尝试，例如：[`http://comnuan.com/cmnn02/cmnn02008/`](http://comnuan.com/cmnn02/cmnn02008/)。


    我们已经了解了 RSA 算法背后的数学原理。现在我们知道 `n`（应该是一个非常大的数）是公开的。尽管它是公开的，但分解这个大数以得到素数 `p` 和 `q`
    是极其困难的。RSA 方案正是基于这种分解大数的实际困难。如果 `p` 和 `q` 不够大，或者公钥 `e` 很小，那么 RSA 的强度就会下降。目前，RSA
    密钥的长度通常在 1024 到 2048 位之间。注意，RSA 密码术的计算开销会随着密钥大小的增加而增加。


    在数据量巨大的情况下，建议使用对称加密技术，并使用如 RSA 这样的非对称加密技术来共享密钥。此外，我们探讨了 RSA 在加密和解密方面的一个方面。然而，它也可以通过数字签名用于身份验证。简而言之，人们可以对数据进行哈希处理，使用自己的私钥对其进行签名，然后将其与数据一起共享。接收方可以使用发送方的公钥进行验证，以确保数据是由发送方而非其他人发送的。这样，除了安全的密钥传输之外，公钥加密方法
    RSA 还通过数字签名提供了身份验证。请注意，在这种情况下，也可以使用一种称为数字签名算法（DSA）的不同算法，我们将在下一节中学习。


    RSA 被广泛应用于 Web 浏览器上的 HTTPS、电子邮件、VPN 和卫星电视中。此外，许多商业应用或应用商店中的应用也使用 RSA 进行数字签名。SSH
    也使用公钥密码术；当你连接到 SSH 服务器时，它会广播一个公钥，该公钥可用于加密发送到该服务器的数据。然后，服务器可以使用其私钥解密数据。

    '
- fmt: '#### Digital Signature Algorithm


    The `DSA` was designed by the NSA as part of the Digital Signature Standard (`DSS`)
    and standardized by the NIST. Note that its primary objective is to sign messages
    digitally, and not encryption. Just to paraphrase, `RSA` is for both key management
    and authentication whereas `DSA` is only for authentication. Also, unlike `RSA`,
    which is based on large-number factorization, `DSA` is based on discrete logarithms.
    At a high level, `DSA` is used as shown in Figure [2-15](#A440588_1_En_2_Chapter.html#Fig15).


    ![A440588_1_En_2_Fig15_HTML.jpg](A440588_1_En_2_Fig15_HTML.jpg)


    Figure 2-15


    Digital Signature Algorithm (`DSA`)


    As you can see in Figure [2-15](#A440588_1_En_2_Chapter.html#Fig15), the message
    is first hashed and then signed because it is more secured compared with signing
    and then hashing it. Ideally, you would like to verify the authenticity before
    doing any other operation. So, after the message is signed, the signed hash is
    tagged with the message and sent to the receiver. The receiver can then check
    the authenticity and find the hash. Also, hash the message to get the hash again
    and check if the two hashes match. This way, `DSA` provides the following security
    properties:


    -   Authenticity: Signed by private key and verified by public key

    -   Data integrity: Hashes will not match if the data is altered.

    -   Non-repudiation: Since the sender signed it, they cannot deny later that they
    did not send the message. Non-repudiation is a property that is most desirable
    in situations where there are chances of a dispute over the exchange of data.
    For example, once an order is placed electronically, a purchaser cannot deny the
    purchase order if non-repudiation is enabled in such a situation.


    A typical `DSA` scheme consists of three algorithms: (1) key generation, (3) signature
    generation, and (3) signature verification.


    #### Elliptic Curve Cryptography


    Elliptic curve cryptography (`ECC`) actually evolved from Diffie-Hellman cryptography.
    It was discovered as an alternative mechanism for implementing public key cryptography.
    It actually refers to a suite of cryptographic protocols and is based on the discrete
    logarithm problem, as in `DSA`. However, it is believed that the discrete logarithmic
    problem is even harder when applied to the points on an elliptic curve. So, `ECC`
    offers greater security for a given key size. A 160-bit `ECC` key is considered
    to be as secured as a 1024-bit `RSA` key. Since smaller key sizes in `ECC` can
    provide greater security and performance compared with other public key algorithms,
    it is widely used in small embedded devices, sensors, and other IoT devices, etc.
    There are extremely efficient hardware implementations available for `ECC`.


    `ECC` is based on a mathematically related set of numbers on an elliptic curve
    over finite fields. Also, it has nothing to do with ellipses! Mathematically,
    an elliptic curve satisfies the following mathematical equation:


    ```

    y² = x³ + ax + b, where 4 a³ + 27 b² ≠ 0

    ```


    With different values of `a` and `b`, the curve takes different shapes as shown
    in the following diagram:


    ![A440588_1_En_2_Figi_HTML.jpg](A440588_1_En_2_Figi_HTML.jpg)


    There are several important characteristics of elliptic curves that are used in
    cryptography, such as:


    -   They are horizontally symmetrical. i.e., what is below the X-axis is a mirror
    image of what is above the X-axis. So, any point on the curve when reflected over
    the X-axis still remains on the curve.

    -   Any nonvertical line can intersect the curve in at most three places.

    -   If you consider two points `P` and `Q` on the elliptic curve and draw a line
    through them, the line may exactly cross the curve at one more places. Let us
    call it (`-R`). If you draw a vertical line through (`-R`), it will cross the
    curve at, say, `R`, which is a reflection of the point (`-R`). Now, the third
    property implies that `P + Q = R`. This is called “point addition,” which means
    adding two points on an elliptic curve will lead you to another point on the curve.
    Refer to the following diagram for a pictorial representation of these three properties.


    ![A440588_1_En_2_Figj_HTML.jpg](A440588_1_En_2_Figj_HTML.jpg)


    -   So, you can apply point addition to any two points on the curve. Now, in the
    previous bullet-point, we did point addition of `P` and `Q` (`P + Q`) and found
    `-R` and then ultimately arrived at `R`. Once we arrive at `R`, we can then draw
    a line from `P` to `R` and see that the line intersects the graph again at a third
    point. We can then take that point and move along a vertical line until it intersect
    the graph again. This becomes the point addition for points `P` and `R`. This
    process with a fixed `P` and the resulting point can continue as long as we want,
    and we will keep getting new points on the curve.

    -   Now, instead of two points `P` and `Q`, what if we apply the operation to
    the same point `P`, i.e., `P` and `P` (called “point doubling”). Obviously, infinite
    numbers of lines are possible through `P`, so we will only consider the tangential
    line. The tangent line will cross the curve in one more point and a vertical line
    from there will cross the curve again to get to the final value. It can be shown
    as follows:


    ![A440588_1_En_2_Figk_HTML.jpg](A440588_1_En_2_Figk_HTML.jpg)


    -   It is evident that we can apply point doubling `n` number of times to the
    initial point and every time it will lead us to a different point on the curve.
    The first time we applied point doubling to the point `P`, it took us to the resulting
    point `2P` as you can see in the diagram. Now, if the same is repeated `n` number
    of times, we will reach a point on the curve as shown in the following diagram:


    ![A440588_1_En_2_Figl_HTML.jpg](A440588_1_En_2_Figl_HTML.jpg)'
