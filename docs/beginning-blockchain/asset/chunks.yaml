- fmt: '### Scripts


    A script is actually a list of instructions recorded with each transaction that
    describes how the next person can gain access to those Bitcoins received and spend
    them. Bitcoin uses stack-based, non-Turing-complete scripting language where the
    instructions get processed from left to right. Keep in mind that it is non-Turing-complete
    by design!


    We looked at the input and output scripts in the previous section. We are now
    aware that the input script `ScriptSig` is the unlocking script and has two components,
    the public key and the signature. The public key is used because it hashes to
    the Bitcoin address that the transaction was spent to, in the previous transaction.
    The ECDSA digital signature’s purpose is to prove the ownership of the public
    key, hence the Bitcoin address to be able to spend it further. Similarly, the
    output script `ScriptPubKey` in the previous transaction was to lock the transaction
    to the rightful owner of the Bitcoin address. These two scripts, `ScriptSig` of
    current transaction and `ScriptPubKey` of previous transaction, are combined and
    run. Take a look at its appearance after they are combined (Figure [3-23](#A440588_1_En_3_Chapter.html#Fig23)).


    ![A440588_1_En_3_Fig23_HTML.jpg](A440588_1_En_3_Fig23_HTML.jpg)


    Figure 3-23


    Formation of combined validation script


    As we learned already, it is important to note that the Bitcoin script either
    runs successfully or it fails. When the transactions are valid, it runs successfully
    without any errors. Bitcoin scripting language is a very simplified version of
    programming languages and is quite small, with just 256 instructions in total.
    Out of these 256, 15 are disabled and 75 are kept reserved maybe for later usage.
    These basic instructions comprise mathematical, logical (`if`/`then`), error reporting,
    and just return statements. Apart from these, there are some additional cryptographic
    instructions such as hashing, signature verification, etc. We will not get into
    all the available instruction sets, and focus only on the ones we will use in
    this chapter. Following are a few:


    *   `OP_DUP`: It just duplicates the top item in the stack.

    *   `OP_HASH160`: It hashes twice, first with SHA256 and then RIPEMD160.

    *   `OP_EQUALVERIFY`: It returns `TRUE` if the inputs are matched, and `FALSE`
    otherwise and marks the transaction invalid.

    *   `OP_CHECKSIG`: Checks if the input signature is a valid signature using the
    input Public Key itself for the hash of the current transaction.


    To execute these instructions, we just have to push these instructions on to the
    stack and then execute. Apart from the memory that the stack takes, there is no
    extra memory required and this makes the Bitcoin scripts efficient. As you have
    seen, there are two kinds of instructions in the script, one is data instruction
    and the other is opcodes. The previous bullet list entries are all opcodes, and
    the combined validation script that we saw before has both of these kinds of instructions.
    Data instructions are just to push data onto the stack and not really to perform
    any function, and the sole purpose of opcodes is to execute some functions on
    the data in the stack and pop out as applicable. Let us discuss how Bob’s transaction
    would get executed with such a stack-based implementation. Recollect the combined
    script where Bob is trying to spend a previously received transaction in the current
    transaction to Charlie (Figure [3-24](#A440588_1_En_3_Chapter.html#Fig24)).


    ![A440588_1_En_3_Fig24_HTML.jpg](A440588_1_En_3_Fig24_HTML.jpg)


    Figure 3-24


    Combined script of `ScriptPubKey` and `CheckSig`


    The corresponding stack-based implementation would be as follows (Figure [3-25](#A440588_1_En_3_Chapter.html#Fig25)).


    ![A440588_1_En_3_Fig25_HTML.jpg](A440588_1_En_3_Fig25_HTML.jpg)


    Figure 3-25


    Example of stack-based implementation of Bitcoin script


    Though the previous stack-based implementation is self explanatory, we will quickly
    run through what happened here.


    *   First was Bob’s signature–a data instruction and so was pushed onto the stack

    *   Then was his public key–again a data instruction and was pushed on to the
    stack

    *   Then it was `OP_DUP`, an opcode. It duplicates the first item in the stack,
    so the public key of Bob was duplicated and became the third item on the stack.

    *   Next was `OP_HASH160`, an opcode, which hashed Bob’s public key twice, once
    with SHA256 and then with RIPEMD160, and the final 160 bits output replaced Bob’s
    public key and became the top of the stack.

    *   Then it was Bob’s Bitcoin address (160 bits)–a data instruction, which was
    pushed to the stack.

    *   Next was an opcode, `OP_EQUALVERIFY`, which checks the top two items in the
    stack and if they match, it pops them both else an error is thrown and the script
    would terminate.

    *   Then was again an opcode `OP_CHECKSIG`, which checks the public key against
    the signature to validate the authenticity of the owner. This opcode is also capable
    of consuming both inputs and popping them off the stack.


    You must be wondering what if someone tries to inject some fraudulent scripts
    or tries to misuse them. Please note that Bitcoin scripts are standardized and
    the miners are aware of them. Anything that does not follow the standard gets
    dropped by the miners, as they wouldn’t waste their time executing such transactions.


    ## Full Nodes vs. SPVs


    We already got a heads-up on the full nodes and SPVs in this chapter. It is obvious
    that the notion of full node and lightweight node is implemented to ease out the
    usage of Bitcoins and make them more adaptable. In this section, we will zoom
    in to the technicalities for these variants and understand their purpose.


    ### Full Nodes


    The full nodes are the most integral components in a Bitcoin network. They are
    the ones that maintain and run Bitcoin from various places across the globe. As
    discussed already, download the entire blockchain with all transactions, starting
    all the way from the genesis block to the latest discovered block. The latest
    block defines the height of the blockchain.


    The full nodes are extremely secure because they have the entire chain. For an
    adversary to be successful in cheating a node, an alternative blockchain needs
    to be presented, which is practically impossible. The true chain is the most cumulative
    PoW chain, and it gets computationally infeasible to propose a new fraudulent
    block. If all transactions are not valid in a block, PoW mining performed by the
    adversary will be in vain, because other miners will not mine on top of it. Such
    a block gets orphaned out soon enough. Full nodes build and maintain their own
    copy of blockchain locally. They do not rely on the network for transaction validation
    because they are self-sufficient. They are just interested in knowing the new
    blocks that get proposed by other nodes so that they can update their local copy
    after validating blocks. So, we learned that each full node must process all transactions;
    they must store the entire database, every transaction that is currently being
    broadcast, every transaction that is ever spent, and the list of UTXOs; participate
    in maintaining the entire Bitcoin network; and they also have to serve the SPV
    clients.


    Note that there are so many varieties of Bitcoin software that the full nodes
    use that are quite different in software architecture and programmed in different
    language constructs. However, the most widely used one is the “Bitcoin Core” software;
    more than three fourths of the network uses it.'
  raw: '### Scripts


    A script is actually a list of instructions recorded with each transaction that
    describes how the next person can gain access to those Bitcoins received and spend
    them. Bitcoin uses stack-based, non`–`Turing-complete scripting language where
    the instructions get processed from left to right. Keep in mind that it is non`–`Turing-complete
    by design!


    We looked at the input and output scripts in the previous section. We are now
    aware that the input script ScriptSig is the unlocking script and has two components,
    the public key and the signature. The public key is used because it hashes to
    the Bitcoin address that the transaction was spent to, in the previous transaction.
    The ECDSA digital signature’s purpose is to prove the ownership of the public
    key, hence the Bitcoin address to be able to spend it further. Similarly, the
    output script ScriptPubKey in the previous transaction was to lock the transaction
    to the rightful owner of the Bitcoin address. These two scripts, ScriptSig of
    current transaction and ScriptPubKey of previous transaction, are combined and
    run. Take a look at its appearance after they are combined (Figure [3-23](#A440588_1_En_3_Chapter.html#Fig23)).


    ![A440588_1_En_3_Fig23_HTML.jpg](A440588_1_En_3_Fig23_HTML.jpg)


    Figure 3-23


    Formation of combined validation script


    As we learned already, it is important to note that the Bitcoin script either
    runs successfully or it fails. When the transactions are valid, it runs successfully
    without any errors. Bitcoin scripting language is a very simplified version of
    programming languages and is quite small, with just 256 instructions in total.
    Out of these 256, 15 are disabled and 75 are kept reserved maybe for later usage.
    These basic instructions comprise mathematical, logical (if/then), error reporting,
    and just return statements. Apart from these, there are some additional cryptographic
    instructions such as hashing, signature verification, etc. We will not get into
    all the available instruction sets, and focus only on the ones we will use in
    this chapter. Following are a few:


    *   OP_DUP: It just duplicates the top item in the stack.

    *   OP_HASH160: It hashes twice, first with SHA256 and then RIPEMD160.

    *   OP_EQUALVERIFY: It returns TRUE if the inputs are matched, and FALSE otherwise
    and marks the transaction invalid.

    *   OP_CHECKSIG: Checks if the input signature is a valid signature using the
    input Public Key itself for the hash of the current transaction.


    To execute these instructions, we just have to push these instructions on to the
    stack and then execute. Apart from the memory that the stack takes, there is no
    extra memory required and this makes the Bitcoin scripts efficient. As you have
    seen, there are two kinds of instructions in the script, one is data instruction
    and the other is opcodes. The previous bullet list entries are all opcodes, and
    the combined validation script that we saw before has both of these kinds of instructions.
    Data instructions are just to push data onto the stack and not really to perform
    any function, and the sole purpose of opcodes is to execute some functions on
    the data in the stack and pop out as applicable. Let us discuss how Bob’s transaction
    would get executed with such a stack-based implementation. Recollect the combined
    script where Bob is trying to spend a previously received transaction in the current
    transaction to Charlie (Figure [3-24](#A440588_1_En_3_Chapter.html#Fig24)).


    ![A440588_1_En_3_Fig24_HTML.jpg](A440588_1_En_3_Fig24_HTML.jpg)


    Figure 3-24


    Combined script of ScriptPubKey and CheckSig


    The corresponding stack-based implemention would be as follows (Figure [3-25](#A440588_1_En_3_Chapter.html#Fig25)).


    ![A440588_1_En_3_Fig25_HTML.jpg](A440588_1_En_3_Fig25_HTML.jpg)


    Figure 3-25


    Example of stack-based implementation of Bitcoin script


    Though the previous stack-based implementation is self explanatory, we will quickly
    run through what happened here.


    *   First was Bob’s signature–a data instruction and so was pushed onto the stack

    *   Then was his public key–again a data instruction and was pushed on to the
    stack

    *   Then it was OP_DUP, an opcode. It duplicates the first item in the stack,
    so the public key of Bob was duplicated and became the third item on the stack.

    *   Next was OP_HASH160, an Opcode, which hashed Bob’s public key twice, once
    with SHA256 and then with RIPEMD160, and the final 160 bits output replaced Bob’s
    public key and became the top of the stack.

    *   Then it was Bob’s Bitcoin address (160 bits)–a data instruction, which was
    pushed to the stack.

    *   Next was an opcode, OP_EQUALVERIFY, which checks the top two items in the
    stack and if they match, it pops them both else an error is thrown and the script
    would terminate.

    *   Then was again an opcode OP_CHECKSIG, which checks the public key against
    the signature to validate the authenticity of the owner. This opcode is also capable
    of consuming both inputs and popping them off the stack.


    You must be wondering what if someone tries to inject some fraudulent scripts
    or tries to misuse them. Please note that Bitcoin scripts are standardized and
    the miners are aware of them. Anything that does not follow the standard gets
    dropped by the miners, as they wouldn’t waste their time executing such transactions.


    ## Full Nodes vs. SPVs


    We already got a heads-up on the full nodes and SPVs in this chapter. It is obvious
    that the notion of full node and lightweight node is implemented to ease out the
    usage of Bitcoins and make them more adaptable. In this section, we will zoom
    in to the technicalities for these variants and understand their purpose.


    ### Full Nodes


    The full nodes are the most integral components in a Bitcoin network. They are
    the ones that maintain and run Bitcoin from various places across the globe. As
    discussed already, download the entire blockchain with all transactions, starting
    all the way from the genesis block to the latest discovered block. The latest
    block defines the height of the blockchain.


    The full nodes are extremely secure because they have the entire chain. For an
    adversary to be successful in cheating a node, an alternative blockchain needs
    to be presented, which is practically impossible. The true chain is the most cumulative
    PoW chain, and it gets computationally infeasible to propose a new fraudulent
    block. If all transactions are not valid in a block, PoW mining performed by the
    adversary will be in vain, because other miners will not mine on top of it. Such
    a block gets orphaned out soon enough. Full nodes build and maintain their own
    copy of blockchain locally. They do not rely on the network for transaction validation
    because they are self-sufficient. They are just interested in knowing the new
    blocks that get proposed by other nodes so that they can update their local copy
    after validating blocks. So, we learned that each full node must process all transactions;
    they must store the entire database, every transaction that is currently being
    brioadcast, every transaction that is ever spent, and the list of UTXOs; participate
    in maintaining the entire Bitcoin network; and they also have to serve the SPV
    clients.


    Note that there are so many varities of Bitcoin software that the full nodes use
    that are quite different in software architecture and programmed in different
    language constructs. However, the most widely used one is the “Bitcoin Core” software;
    more than three fourths of the network uses it.'
  trans: '

    ### 脚本


    脚本实际上是用每笔交易记录的一系列指令，它描述了下一个用户如何获得这些收到的比特币并进行花费。比特币使用基于栈的、非图灵完备的脚本语言，指令按从左到右的顺序处理。请记住，它是故意设计为非图灵完备的！


    我们在上一节中了解了输入和输出脚本。现在我们知道了，输入脚本 `ScriptSig` 是解锁脚本，包含两个部分：公钥和签名。使用公钥是因为它的哈希值对应于上一笔交易中该交易花费的目标比特币地址。ECDSA
    数字签名的目的是证明公钥的所有权，从而证明比特币地址的所有权，以便进一步花费。同样，上一笔交易中的输出脚本 `ScriptPubKey` 的作用是将交易锁定给比特币地址的合法所有者。这两个脚本——当前交易的
    `ScriptSig` 和上一笔交易的 `ScriptPubKey`——会被合并起来执行。看看它们合并后的样子（图 3-23）。


    ![A440588_1_En_3_Fig23_HTML.jpg](img/A440588_1_En_3_Fig23_HTML.jpg)


    图 3-23


    组合验证脚本的形成


    正如我们已经了解的，需要注意的重要一点是，比特币脚本要么成功执行，要么失败。当交易有效时，它会成功执行，没有任何错误。比特币脚本语言是一种非常简化的编程语言版本，体积很小，总共只有
    256 条指令。在这 256 条指令中，有 15 条被禁用，75 条被保留（可能供以后使用）。这些基本指令包括数学运算、逻辑运算（`if`/`then`）、错误报告和仅返回语句。除此之外，还有一些额外的密码学指令，例如哈希计算、签名验证等。我们不会深入所有可用的指令集，只关注本章将要用到的那些。以下是一些指令：


    *   `OP_DUP`：复制栈顶项。

    *   `OP_HASH160`：执行两次哈希运算，先使用 SHA256，然后使用 RIPEMD160。

    *   `OP_EQUALVERIFY`：如果输入匹配则返回 `TRUE`，否则返回 `FALSE` 并将交易标记为无效。

    *   `OP_CHECKSIG`：使用输入公钥本身，检查输入的签名对于当前交易的哈希值是否为有效签名。


    要执行这些指令，我们只需将这些指令压入栈中，然后执行。除了栈占用的内存外，不需要额外的内存，这使得比特币脚本非常高效。如你所见，脚本中有两种指令：数据指令和操作码。前面的列表项都是操作码，而我们之前看到的组合验证脚本则包含了这两种指令。数据指令只是将数据压入栈中，并不执行任何功能；而操作码的唯一目的是对栈中的数据执行某些功能，并在适用时将其弹出。让我们讨论一下鲍勃的交易如何在这样一个基于栈的实现中执行。回想一下组合脚本，其中鲍勃试图在当前交易中花费之前收到的一笔交易，将其发送给查理（图
    3-24）。


    ![A440588_1_En_3_Fig24_HTML.jpg](img/A440588_1_En_3_Fig24_HTML.jpg)


    图 3-24


    `ScriptPubKey` 和 `CheckSig` 的组合脚本


    相应的基于栈的实现如下所示（图 3-25）。


    ![A440588_1_En_3_Fig25_HTML.jpg](img/A440588_1_En_3_Fig25_HTML.jpg)


    图 3-25


    比特币脚本基于栈实现的示例


    尽管前面的基于栈的实现是不言自明的，但我们还是快速浏览一下这里发生了什么。


    *   首先是鲍勃的签名——一个数据指令，因此被压入栈中。

    *   然后是鲍勃的公钥——同样是一个数据指令，被压入栈中。

    *   接着是 `OP_DUP`，一个操作码。它复制栈中的第一项，因此鲍勃的公钥被复制，成为栈中的第三项。

    *   接下来是 `OP_HASH160`，一个操作码，它对鲍勃的公钥执行两次哈希：先使用 SHA256，再使用 RIPEMD160，最终的 160 位输出替换了鲍勃的公钥，成为栈顶。

    *   然后是鲍勃的比特币地址（160 位）——一个数据指令，被压入栈中。

    *   接下来是一个操作码 `OP_EQUALVERIFY`，它检查栈中的顶部两项，如果它们匹配，则将它们都弹出，否则抛出错误，脚本终止。

    *   最后又是一个操作码 `OP_CHECKSIG`，它检查公钥是否与签名匹配，以验证所有者的真实性。这个操作码还能够消耗这两个输入并将它们从栈中弹出。


    你可能会想，如果有人试图注入欺诈性脚本或滥用它们会怎样。请注意，比特币脚本是标准化的，矿工们了解它们。任何不符合标准的内容都会被矿工丢弃，因为他们不会浪费时间执行这样的交易。


    ## 全节点与简易支付验证（SPV）


    我们已经在本章中对全节点和 SPV 有了初步了解。很明显，实现全节点和轻量级节点的概念是为了简化比特币的使用并使其更易于适应。在本节中，我们将深入探讨这些变体的技术细节，并理解它们的目的。


    ### 全节点


    全节点是比特币网络中最核心的组件。它们是那些从全球各地维护和运行比特币的节点。正如已经讨论过的，它们下载包含所有交易的整个区块链，从创世区块一直到最新发现的区块。最新的区块定义了区块链的高度。


    全节点非常安全，因为它们拥有整条链。对于攻击者来说，要成功欺骗一个节点，需要提出一条替代区块链，而这实际上是不可能的。真正的链是累计工作量证明最大的链，要提出一个新的欺诈区块在计算上是不可行的。如果一个区块中的所有交易无效，攻击者执行的工作量证明挖矿将是徒劳的，因为其他矿工不会在其之上进行挖矿。这样的区块很快就会成为孤块。全节点在本地构建并维护自己的区块链副本。它们不依赖网络进行交易验证，因为它们是自给自足的。它们只关心了解其他节点提出的新区块，以便在验证区块后更新自己的本地副本。因此，我们了解到，每个全节点必须处理所有交易；它们必须存储整个数据库——包括当前正在广播的每一笔交易、历史上曾经花费的每一笔交易以及
    UTXO 列表；参与维护整个比特币网络；并且还必须为 SPV 客户端提供服务。


    请注意，全节点使用的比特币软件种类繁多，它们在软件架构上差异很大，并使用不同的编程语言编写。然而，使用最广泛的是“Bitcoin Core”软件；超过四分之三的网络节点都在使用它。

    '
- fmt: '### SPVs


    Bitcoin design has this nice concept of Simple Payment Verification (`SPV`) nodes
    that can be used to verify transactions without running full nodes. The way `SPV`s
    work is that they download only the header of all the blocks during the initial
    syncing to the Bitcoin network. In Bitcoin, the block headers are of 80 bytes
    each, and downloading all the headers is not much and ranges to a few MBs in total.


    The purpose of `SPV`s is to provide a mechanism to verify that a particular transaction
    was in a block in a blockchain without requiring the entire blockchain data. Every
    block header has the Merkle root, which is the block hash. We know that every
    transaction has a hash and that transaction hash can be linked to the block hash
    using the Merkle tree proof which we discussed in the previous chapter. All the
    transactions in a block form the Merkle leafs and the block hash forms the Merkle
    root. The beauty of the Merkle tree is that only a small part of the block is
    needed to prove that a transaction was actually a part of the block. So, to confirm
    a transaction an `SPV` does two things. First, it checks the Merkle tree proof
    for a transaction to accertain it is a part of the block and second, if that block
    is a part of the main chain or not; and there should be at least six more blocks
    created after it to confirm it is a part of the longest chain. Figure [3-26](#A440588_1_En_3_Chapter.html#Fig26)
    depicts this process.


    ![A440588_1_En_3_Fig26_HTML.jpg](A440588_1_En_3_Fig26_HTML.jpg)


    Figure 3-26


    Merkle root in block header of SPV


    Let us dig deeper into the technicality of how `SPV`s really work in verifying
    transactions. At a high level, it takes the following steps:


    - To the peers an `SPV` is connected to, it establishes Bloom filters with many
    of them and ideally not just to one peer, because there could be a chance for
    that peer to perform denial of service or cheat. The purpose of Bloom filters
    is to match only the transactions an `SPV` is interested in, and not the rest
    in a block without revealing which addresses or keys the `SPV` is interested in.

    - Peers send back the relevant transactions in a `merkleblock` message that contains
    the Merkle root and the Merkle path to the transaction of interest as shown in
    the figure above. The `merkleblock` message size is in a few kB and quite efficient.

    - It is then easy for the `SPV`s to verify if a transaction truly belongs to a
    block in the blockchain.

    - Once the transaction is verified, the next step is to check if that Block is
    actually a part of the true longest blockchain.


    The following (Figure [3-27](#A440588_1_En_3_Chapter.html#Fig27)) represents this
    SPV communication steps with its peers.


    ![A440588_1_En_3_Fig27_HTML.jpg](A440588_1_En_3_Fig27_HTML.jpg)


    Figure 3-27


    SPV communication mechanism with the Bitcoin network


    ## Bitcoin Wallets


    Bitcoin wallets are very similar to the wallet you use in your daily life, in
    the sense you have access to it and you can spend when you want. Bitcoin wallets,
    however, are a digital phenomenon. Recollect the example we used in the previous
    section, where Alice paid some amount to Bob. How would she do it if Bob did not
    have an account? In the Bitcoin setting, the accounts or wallets are represented
    by the Bitcoin address. Bob must first generate a key pair (private/public keys).
    Bitcoin uses the `ECDSA` algorithm with `secp256k1` curve (don’t worry, it is
    just the curve type — a standard recommendation). First a random bit string is
    generated to serve as private key, which is then deterministically transformed
    to public key. As we learned before in Chapter [2](#A440588_1_En_2_Chapter.html),
    the private/public keys are mathematically related and the public key can be generated
    from the private key any time (deterministic). So, it is not really a requirement
    to save the public keys as such. True randomness is not possible through software
    implementations, so many servers or applications use hardware security modules
    (`HSM`s) to generate true random bits and also to protect the private keys. Unlike
    public keys, private keys definitely require saving them with maximum security.
    If you lose them, you cannot generate a signature that would justify the ownership
    of the public key (or Bitcoin address) that received some amount in any transaction.
    The public keys are hashed twice to generate the Bitcoin address, first with `SHA256`
    and then with `RIPEMD160`. This is also deterministic, so given a public key,
    it is just a matter of a couple of hashes to generate the Bitcoin address.


    Note carefully that the Bitcoin address does not really reveal the public key.
    This is because the addresses are double-hashed public keys and it’s quite infeasible
    to find the public key given the Bitcoin address. However, for someone with a
    public key, it is easy to claim the ownership of a Bitcoin address. The hashing
    technique in Bitcoin shortens and obfuscates the [public key](https://bitcoin.org/en/glossary/public-key#The%20public%20portion%20of%20a%20keypair%20which%20can%20be%20used%20to%20verify%20signatures%20made%20with%20the%20private%20portion%20of%20the%20keypair.).
    While it makes the manual transcription easier, it also provides security against
    unanticipated problems that might allow reconstruction of [private keys](https://bitcoin.org/en/glossary/private-key#The%20private%20portion%20of%20a%20keypair%20which%20can%20create%20signatures%20that%20other%20people%20can%20verify%20using%20the%20public%20key.)
    from [public key](https://bitcoin.org/en/glossary/public-key#The%20public%20portion%20of%20a%20keypair%20which%20can%20be%20used%20to%20verify%20signatures%20made%20with%20the%20private%20portion%20of%20the%20keypair.)s.
    This is possibly the safest implementation! Public keys are revealed only when
    the transaction output is being claimed by the owner, not when it was transacted
    to them, as you can see in Figure [3-28](#A440588_1_En_3_Chapter.html#Fig28).


    ![A440588_1_En_3_Fig28_HTML.jpg](A440588_1_En_3_Fig28_HTML.jpg)


    Figure 3-28


    Revealing public key to claim a transaction


    Bitcoin wallets are nothing but the `SPV`s and are served by the full nodes. We
    already looked at the functioning of `SPV`s, so in this section we will take a
    look at some wallet-specific activities. We all understand that to make a transaction,
    or to receive a transaction, you need not be running a full node. All you want
    is a wallet to be able to save your private/public key pair, to be able to make
    and receive transactions (actually view and verify the ones made to you). We already
    learned the verification part while going through the `SPV`s section. Let us take
    a look at how to initiate a transaction using a wallet.'
