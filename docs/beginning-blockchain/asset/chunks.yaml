- fmt: '# Centralized vs. Decentralized Systems


    The very reason we are looking into the debate on centralization vs. decentralization
    is because blockchain is designed to be decentralized, defying the centralized
    design. However, the terms decentralized and centralized are not always clear.
    They are very poorly defined and misleading in many places. The reason is that
    there is almost no system that is purely centralized or decentralized. Most of
    the concepts and examples in this section are inspired from the notes of Mr. Vitalik
    Buterin, the founder of Ethereum blockchain.


    What is a distributed system then? Just so it does not mess with the current discussion,
    let us understand it first and take it off the list. Please note that whether
    a system is centralized or decentralized, it can still be distributed. A centralized
    distributed system is one in which there is, say, a master node responsible for
    breaking down the tasks or data and distribute the load across nodes. On the other
    hand, a decentralized distributed system is one where there is no “master” node
    as such and yet the computation may be distributed. Blockchain is one such example,
    and we will look at many diagrammatic representations of it later in this book.
    Figure [1-8](#A440588_1_En_1_Chapter.html#Fig8) is a pictorial representation
    of how a centralized distributed system may look.


    ![A440588_1_En_1_Fig8_HTML.jpg](A440588_1_En_1_Fig8_HTML.jpg)


    Figure 1-8


    A distributed system with centralized control


    This representation is similar to Hadoop implementation, as an example. Though
    the computation is faster in such designs because of distributed computing, it
    also suffers from limitations due to centralization.


    Let us resume our discussion on centralization vs. decentralization. It is extremely
    important to note that for a system to be centralized/decentralized is not just
    limited to the technical architecture. What we intend to say is that a system
    can be centralized or decentralized technically, but may not be so logically or
    politically. Let us take a look at these different perspectives to be able to
    design a system correctly based on the requirement:


    - **Technical Architecture**: A system can be centralized or decentralized from
    a technical architecture point of view. What we consider is how many physical
    computers (or nodes) are used to design a system, how many node failures it can
    sustain before the whole system goes down, etc.

    - **Political perspective**: This perspective indicates the control that an individual,
    or a group of people, or an organization as a whole has on a system. If the computers
    of the system are controlled by them, then the system is naturally centralized.
    However, if no specific individual or groups control the system and everyone has
    equal rights on the system, then it is a decentralized system in a political sense!

    - **Logical perspective**: A system can be logically centralized or decentralized
    based on how it appears to be, irrespective of whether it is centralized or decentralized
    technically or politically. An alternative analogy could be that if you vertically
    cut a system (say of computing devices) in half with every half having service
    providers and consumers, if they can operate as independent units they are decentralized
    and centralized otherwise.


    All the aforementioned perspectives are crucial in designing a real-life system
    and calling it centralized or decentralized. Let us discuss some of the examples
    mixing these perspectives to clear up any confusion you might have:


    - If you look at the corporates, they are architecturally centralized (one head
    office), they are politically centralized (governed by a CEO or the board), and
    they are logically centralized as well. (You can’t really split them in halves.)

    - Our language of communication is decentralized from every perspective—architecturally,
    politically, as well as logically. For two people to communicate with each other,
    in general, their language is neither politically influenced nor logically dependent
    on the language of communication of other people.

    - The torrent systems such as BitTorrent are also decentralized from every perspective.
    Any node can be a provider or a consumer, so even if you cut the system into halves,
    it still sustains.

    - The Content Delivery Network on the other hand is architecturally decentralized,
    logically also decentralized, but is politically centralized because it is owned
    by corporates. An example is Amazon CloudFront.

    - Let us consider blockchain now. The objective of blockchain was to enable decentralization.
    So, it is architecturally decentralized by design. Also, it is decentralized from
    a political viewpoint, as nobody controls it. However, it is logically centralized,
    as there is one common agreed state and the whole system behaves like a single
    global computer.


    Let us explore these terms separately and have a comparative view to be able to
    appreciate why blockchain is decentralized by design.


    ## Centralized Systems


    As the name suggests, a centralized system has a centralized control with all
    administrative authority. Such systems are easy to design, maintain, impose trust,
    and govern, but suffer from many inherent limitations, as follows:


    - They have a central point of failure, so are less stable.

    - They are more vulnerable to attack and hence less secured.

    - Centralization of power can lead to unethical operations.

    - Scalability is difficult most of the time.


    A typical centralized system may appear as shown in Figure [1-9](#A440588_1_En_1_Chapter.html#Fig9).


    ![A440588_1_En_1_Fig9_HTML.jpg](A440588_1_En_1_Fig9_HTML.jpg)


    Figure 1-9


    A centralized system


    ## Decentralized Systems


    As the name suggests, a decentralized system does not have a centralized control
    and every node has equal authority. Such systems are difficult to design, maintain,
    govern, or impose trust. However, they do not suffer from the limitations of conventional
    centralized systems. Decentralized systems offer the following advantages:


    - They do not have a central point of failure, so more stable and fault tolerant

    - Attack resistant, as no central point to easily attack and hence more secured

    - Symmetric system with equal authority to all, so less scope of unethical operations
    and usually democratic in nature


    A typical decentralized system may appear as shown in Figure [1-10](#A440588_1_En_1_Chapter.html#Fig10).


    ![A440588_1_En_1_Fig10_HTML.jpg](A440588_1_En_1_Fig10_HTML.jpg)


    Figure 1-10


    A decentralized system


    Please note that a distributed system can also be decentralized. An example would
    be blockchain! However, unlike common distributed systems, the task is not subdivided
    and delegated to nodes, as there is no master who would do that in blockchain.
    The contributing nodes do not work on a portion of the work, rather, the interested
    nodes (or the ones chosen at random) perform the entire work. A typical decentralized
    and distributed system, which is effectively a peer-to-peer system, may appear
    as shown in Figure [1-11](#A440588_1_En_1_Chapter.html#Fig11).


    ![A440588_1_En_1_Fig11_HTML.jpg](A440588_1_En_1_Fig11_HTML.jpg)


    Figure 1-11


    A decentralized and peer-to-peer system'
