    Figure [2-3](#A440588_1_En_2_Chapter.html#Fig3).


    ![A440588_1_En_2_Fig3_HTML.jpg](A440588_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Symmetric cryptography


    Symmetric key cryptography is used widely; the most common uses are secure file
