    ### 共识与区块挖矿


    在上一节中，我们研究了细粒度的交易。接下来，我们将学习交易如何被打包成一个区块，以及节点之间如何达成共识，使得整个网络接受该区块以扩展区块链。请注意，“区块挖矿”指的是在区块链中成功创建一个新区块。在比特币中，正是分布式的
    PoW（工作量证明）共识算法，通过维持去中心化来帮助挖出新区块。在这样的网络中达成分布式共识是非常困难的。尽管该术语在 Facebook、Google、Amazon
    等分布式系统中已存在数十年（因为它们拥有数百万台服务器，需要保证所存储数据的一致性），但共识一词很大程度上是因比特币而广为人知的。本章我们将深入探讨共识与挖矿的具体细节。


    首先，请记住：比特币网络中的一切都是以交易形式呈现的。如果你想发起一笔交易，你必须消耗一个或多个之前的交易作为输入，并生成另一笔交易。我们已经知道，用户必须使用自己的私钥对交易进行签名，以确保交易是由合法用户发起的。然而，尽管有这种密码学安全保障，用户难道不能重复花费一笔已经用过的交易吗？例如：爱丽丝在一笔交易编号为`1234`的交易中收到了
    10 枚比特币。她完全可以再次使用同一笔交易`1234`，将这 10 枚比特币分别转给鲍勃和查理。因为她会用自己的私钥签名，这意味着这是一笔合法的交易，那么你认为什么能阻止她进行双重支付呢？请注意，在比特币中，你无法阻止她尝试双重支付，但系统的设计会使得这种尝试无法成功。阻止这类尝试的唯一方法是知晓所有正在发生的交易。这就是为什么比特币中的所有交易都会广播到整个网络。一旦一笔交易被花费，它就不再属于
    UTXO（未花费交易输出）集合，并会生成一个新的交易编号成为 UTXO 的一部分，且只有接收方才能花费它。这就是节点验证交易的方式。


    另外，防止双重支付攻击的唯一方法就是知晓所有交易。当你了解所有交易时，你就能知道哪些已被花费以及哪些是 UTXO。当一个矿工提议一个新区块时，要求该区块内的所有交易都是有效的。这是否意味着提议区块的节点不能包含无效交易？答案是“可以”。它们确实可以注入欺诈性交易，但其他节点会拒绝该区块。该节点为完成
    PoW（我们稍后会详细讲解）所消耗的算力和电力将付诸东流！因此，得益于 PoW 共识，节点绝不会想提议一个无效区块。尽管没有全局时间的概念，但请注意，交易被组合成一个区块并成为区块链的一部分，更多的区块一个接一个地被添加到链上，这便有了顺序！需要仔细注意：区块链保留了交易发生的顺序。这样一来，共识在区块层面达成，并一直传递到细粒度的交易层面。


    基于我们目前的理解，现在我们知道比特币网络中的每个节点都有自己的区块链副本，并不存在所谓的“全局区块链”；毕竟它是一个去中心化网络。每个节点的区块链副本中都包含许多交易。同样正确的是，每个节点都维护着一个
    UTXO 列表，当获得机会（节点会被随机选中——我们后面会看到具体方式）提议一个区块时，它们会尽可能多地包含交易，直到达到 1MB 或 2MB 的区块上限。如果该区块成功加入区块链，这些交易就会从
    UTXO 列表中移除。这里需要注意的是，每个节点可能拥有不同的未确认交易列表，因为某些交易可能没有被部分节点接收到。


    现在该看看 PoW 算法是如何实际运作的了。我们之前了解过每个区块头部中的难度目标字段。每个挖矿节点都试图解决这个密码学难题，期望能幸运地成功并提议一个区块。它们如此急切地想要提议区块，是因为一旦它们提议的区块成为区块链的一部分，就能获得巨大的收益。每个人在发起交易时，都可以预留一部分交易费用给矿工。我们知道，所有节点都维护着一个尚未纳入区块链的交易列表，当它们获得提议区块的机会时，会尽可能多地选取交易来组成一个区块。显然，它们会选择所有能带来最高收益的交易，而留下那些手续费很少或没有手续费的交易。那些低手续费的交易可能需要一段时间才能被纳入区块，而完全没有手续费的交易机会则更小。除了交易费用之外，提议新区块的节点还会获得新比特币作为奖励。每成功挖出一个区块，就会产生新的比特币，并且提议该区块的矿工会获得所有这些新币；这是在比特币系统中创造新比特币的唯一途径。这被称为“区块奖励”。从技术上讲，提议区块的节点会在其提议的区块中包含一个名为“币基交易”的特殊交易，该交易的接收地址就是该矿工自己的地址。比特币刚推出时，区块奖励是
    50 枚比特币（BTC）。根据设计，比特币总量只有 21,000,000 BTC，因此区块奖励每 210,000 个区块减半一次。它从 50 开始，然后变成
    25，再变成 12.5，以此类推，直到某个时间点（达到 21,000,000 BTC 时）趋向于零。以下是来自 Bitcoin Core（`main.cpp`）展示减半过程的代码片段：


    ```cpp

    int64_t GetBlockValue(int nHeight, int64_t nFees)

    {

    int64_t nSubsidy = 50 * COIN;

    int halvings = nHeight / Params().SubsidyHalvingInterval();

    // 当右移操作未定义时，强制区块奖励归零。

    if (halvings >= 64)

    return nFees;

    // 每 210,000 个区块（大约每 4 年）奖励减半。

    nSubsidy >>= halvings;

    return nSubsidy + nFees;

    }

    ```


    注意上述代码片段中区块奖励是如何减半的。以下解释能更清晰地描述这一设计：


    ```

    //区块奖励减半，保持在 50%

    BlockReward = BlockReward >> 1;

    //区块奖励再次减半，保持在 25%

    BlockReward = BlockReward-(BlockReward>>2);

    //区块奖励再次减半，保持在 12.5%

    BlockReward = BlockReward - (BlockReward>>3);

    ```

