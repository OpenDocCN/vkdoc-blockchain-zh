  ## 13.6 项目代码


  以下是本项目的主要代码。该代码使用 C 语言开发。要执行此代码，您需要一个 C 语言编译器。机器人的旋转和移动（左、右、前进、后退）在代码的不同函数中定义。使用
  `void setup_message()` 函数定义了每个机器人的消息处理。`orbit_tooclose()` 函数检查相邻机器人的移动情况（参见清单 13-1）。



  ```c

  void smooth_set_motors(uint8_t ccw, uint8_t cw)

  {

  #ifdef KILOBOT

  uint8_t l = 0, r = 0;

  if (ccw && !OCR2A)

  l = 0xff;

  if (cw && !OCR2B)

  r = 0xff;

  if (l || r)

  {

  set_motors(l, r);

  delay(15);

  }

  #endif

  set_motors(ccw, cw);

  }

  void set_motion(motion_t new_motion)

  {

  switch(new_motion) {

  case STOP:

  smooth_set_motors(0,0);

  break;

  case FORWARD:

  smooth_set_motors(kilo_straight_left, kilo_straight_right);

  break;

  case LEFT:

  smooth_set_motors(kilo_turn_left, 0);

  break;

  case RIGHT:

  smooth_set_motors(0, kilo_turn_right);

  break;

  }

  }

