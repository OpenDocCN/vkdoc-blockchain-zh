- "# 9. 实时系统\n\n分布式实时系统（DRTS）由通过实时网络连接在一起的独立计算节点组成。这些节点协同工作，在预定的时间限制内实现共同目标。出于多种原因，需要分布式实时系统。\n\
  \n任何实时计算机控制系统都必须能够实时测量事件之间的时间，并在预定的实时时间间隔内对刺激做出反应。本章讨论了在实时分布式系统中包含此实时度量的一些意义。\n\n\
  术语“实时系统”指的是受实时约束的系统，即必须保证在某个时间限制内做出响应，或者系统必须满足特定的截止时间。示例包括飞行控制系统、实时监控系统等。\n\n##\
  \ 9.1 理解实时系统\n\n具有时间限制的实时系统被分为硬实时系统或软实时系统。*硬实时系统*不能错过任何截止时间。错过截止时间的后果可能是灾难性的。如果延迟增加，硬实时系统结果的效用会急剧下降，甚至可能变为负值。延迟是指实时系统完成任务与其截止时间相比的延迟程度。硬实时系统的一个例子是飞行控制器系统。\n\
  \n另一方面，*软实时系统*偶尔可以以足够低的概率错过截止时间，使其可以接受。错过截止时间没有负面后果。随着延迟增加，软实时系统结果的效用会迅速降低。电话交换机是软实时系统的一个例子。\n\
  \n\n\n## 9.2 实时系统参考模型\n\n该参考模型由三个组成部分来刻画特性：\n\n-   **工作负载模型：**  用于确定系统所支持的应用程序。\n\
  -   **资源模型：**  用于描述程序可以访问的资源。\n-   **算法：**  它们描述了软件应用程序将如何使用资源。\n\n实时系统术语包括：\n\n\
  -   **作业：** 一个可以分配给处理器的小型任务，它可能需要使用资源，也可能不需要。\n-   **任务：** 一组相互关联的作业，它们协同工作以提供系统功能。\n\
  -   **作业的释放时间：** 作业准备好执行的时间点。\n-   **作业执行时间：** 作业完成执行所需的时间。\n-   **作业截止时间：** 作业必须完成的最后期限。截止时间有两种类型：绝对截止时间和相对截止时间。（一个作业的**相对截止时间**是最大允许响应时间。一个作业的**绝对截止时间**是其相对截止时间与其释放时间之和。）\n\
  -   **作业响应时间：** 从作业被释放到作业完成所经历的时间。\n-   **活动资源：** 处理器的另一种称呼，是成功完成任务所必需的。一个作业需要一个或多个处理器来执行并推进至完成。计算机和传输链路是其中的两个例子。\n\
  -   **被动资源：** 在作业执行期间，可能需要也可能不需要的资源。内存和互斥锁是其中的两个例子。也称为资源。如果两个资源可以互换使用，则它们是相同的；否则，它们是异构的。\n\
  \n图 9-1 描述了硬实时系统与软实时系统之间的关键区别。硬实时系统的响应时间要求为毫秒级或更短，如果达不到，可能导致灾难。另一方面，软实时系统的响应时间更长且要求不那么严格。在苛刻的硬实时系统中，必须预期峰值负载性能，并且不得违反规定的截止时间。在软实时系统中，可以接受在极少出现的峰值负载下功能降级。在所有情况下，硬实时系统都必须保持与环境状态的同步。\n\
  \n![../images/520777_1_En_9_Chapter/520777_1_En_9_Fig1_HTML.jpg](img/520777_1_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1\n\n硬实时系统与软实时系统\n\n### 9.2.1 故障安全系统与故障可运行系统\n\n如果环境中存在一个在系统发生故障时可以到达的良好状态，则该系统被认为是故障安全的。列车信号系统就是一个例子。\n\
  \n在故障安全应用中需要高错误检测覆盖率。应用程序的故障安全性是其一个特性。如果应用程序没有提供安全状态的标识，则系统必须能够故障可运行，例如飞机上的飞行控制系统，这类系统在发生故障时必须保持运行。\n\
  \n### 9.2.2 可保证的及时性系统与尽力而为系统\n\n即使出现故障，计算机系统也必须提供最低限度的服务。\n\n## 9.3 实时系统分类\n\n基于外部需求，考虑以下这些类别：\n\
  \n-   软实时与硬实时\n-   故障安全与故障可运行\n-   可保证的及时性与尽力而为\n-   资源充足性\n-   时间触发与事件触发\n\n如果能够通过分析推理（在规定的负载和故障假设内）证明时间准确性，则系统实现可保证确定的及时性。如果无法提出这种关于时间正确性的理性论证，则系统实现是尽力而为的。\n\
  \n即使在规定的负载和故障假设内，对尽力而为系统的时间验证也依赖于概率性考虑。可保证的及时性应是硬实时系统的基础。\n\n### 9.3.1 资源充足性\n\n\
  如果系统要提供可保证的及时性，其处理资源必须能够管理规定的峰值负载和故障场景。过去曾有一些应用认为资源充足性成本过高，令人望而却步。\n\n由于硬件成本正在下降，实施资源充足的设计正变得越来越经济有效。在具有挑战性的实时应用中，资源充足的设计是唯一的选择。\n\
  \n### 9.3.2 罕见事件情况下的可预测性\n\n罕见事件是指在系统生命周期内很少发生的重要事件，例如核反应堆中的管道爆裂。一个罕见事件可能引发一连串相关的服务请求（例如，警报风暴）。\n\
  \n在许多应用中，例如飞行控制系统，系统的价值取决于在罕见事件场景下的可预测性能。在大多数情况下，工作负载测试无法应对罕见事件场景。\n\n### 9.3.3\
  \ 状态与事件\n\n![../images/520777_1_En_9_Chapter/520777_1_En_9_Fig2_HTML.jpg](img/520777_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2\n\n状态事件\n\n*状态*是实时中持续特定时间长度的一种条件，例如时间轴的一部分。*事件*是指瞬时发生的事件。参见图 9-2。\n\n状态信息描述了观测点（其本身是一个事件）处状态的特性。事件信息提供了事件发生前后瞬间状态特性的变化，以及对事件发生时间点的估计。\n\
  \n### 9.3.4 时间触发系统与事件触发系统\n\n如果实时系统中的控制信号纯粹源自事件的发生，例如任务的完成、消息的接收或外部中断的发生，则称该系统为事件触发系统。\n\
  \n如果控制指标（如消息的发送和接收）纯粹源自（全局）时间概念的演进，则称该实时系统为时间触发系统。\n\n## 9.4 时间要求\n\n对于实时系统，操作员看到的数据片段必须在时间上准确。刺激与反应之间的最大实时差距必须被确定并加以限制。即使是很罕见的情况，时间行为也应该是可预测的。参见图\
  \ 9-3。\n\n![../images/520777_1_En_9_Chapter/520777_1_En_9_Fig3_HTML.jpg](img/520777_1_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3\n\n与实时数据相关的时间参数\n\n## 9.5 调度算法分类\n\n### 9.5.1 硬实时与软实时调度\n\n在硬实时系统中，关键任务的截止时间必须在所有可能的方式下，并针对可预见的情况提前得到保证。这需要对系统资源进行仔细设计。如果您正在设计的是软实时系统，则可以接受低成本的调度器设计。\n\
  \n### 9.5.2 动态与静态调度器\n\n如果调度器根据当前请求来做出运行决策，则称其为动态（在线）调度器。因此，动态调度器是灵活的，并能随着系统的演化而自适应。如果在调度器运行之前就已经做出决策，并且这些决策不可更改，则称该调度器为静态（预运行）调度器。这需要对要执行的任务有深入且完整的了解（最大执行时间、优先级、互斥约束、截止时间等）。正因为在执行阶段无需进行决策计算，这类调度器的运行开销很低。\n\
  \n\n\n### 9.5.3 可抢占/非可抢占调度器\n\n在可抢占调度器中，一个任务在收到更高优先级任务的请求后可以被中断。然而，只有在某些断言未被违反（参见互斥）时，才允许抢占。在非可抢占调度器中，任务在执行完成前不会被中断。\n\
  \n### 9.5.4 静态调度\n\n在静态调度中，任务的执行顺序是离线计算出来的。静态调度常见于时间触发型应用以及周期性任务中。\n\n### 9.5.5\
  \ 动态调度\n\n动态调度器根据系统的当前状态，在事件到达时决定执行哪个任务。各种动态调度算法根据其所做的假设而有所不同。\n\n### 9.5.6 独立任务调度\n\
  \n此类别假设任务之间没有任何依赖关系（例如互斥）。\n\n## 9.6 复习题\n\n1.  \"分布式实时系统（DRTS）由通过实时网络连接的独立计算节点组成。\"\
  \ 这个说法正确还是错误？\n\n2.  以下哪一项描述的是硬实时系统？\n    1.  可以经常性地错过截止时间，可能性较低。\n    2.  偶尔会错过截止时间，且有合理的可能性发生这种情况。\n\
  \    3.  由于某种不可接受的低概率，偶尔会错过截止时间。\n    4.  偶尔会错过截止时间，但概率较低。\n\n3.  以下关于*状态*的陈述，哪一项是正确的？\n\
  \    1.  状态是一种在实时时间内持续一定时间的条件。\n    2.  状态是一种持续非实时时间跨度的条件。\n    3.  状态是一种不会持续一段时间的条件。\n\
  \    4.  状态是一种不可预测地变化并持续一段时间的条件。\n\n4.  以下关于*事件*的陈述，哪一项是正确的？\n    1.  事件是发生在特定状态下的事情。\n\
  \    2.  事件是一次性的未发生事件。\n    3.  事件是一次性的发生事件。\n    4.  以上所有选项。\n\n5.  参考模型由三个部分组成：\n\
  \    1.  工作负载模型\n    2.  资源模型\n    3.  算法\n    这个说法正确还是错误？\n\n## 9.7 复习题答案\n\n1.\
  \  答案：正确。分布式实时系统（DRTS）由通过实时网络连接的独立计算节点组成，并由通过实时网络连接的自洽计算节点构成。此类系统中的节点相互协作，以在规定期限内实现共同目标。\n\
  \n2.  答案：D，偶尔会错过截止时间，但概率较低。\n\n3.  答案：A，*状态*是一种在实时时间内持续一定时间的条件。\n\n4.  答案：C，*事件*是一次性的发生事件。\n\
  \n5.  答案：正确。实时系统模型的主要部分是工作负载模型、资源模型和算法。\n\n## 9.8 总结\n\n本章解释了分布式系统的时间管理。此外，还讨论了软实时系统和硬实时系统，它们阐述了参考模型。为了实现分布式系统，有必要理解这种时间管理系统。调度算法也是分布式系统的一个重要概念，因此下一章将解释分布式系统中的动态和静态调度算法。\n\
  \n"
- "# 10. 实时系统中的调度\n\n任务状态决定了任务在进程中的里程碑。默认状态如下：\n\n-   任务已接收，正在等待被系统接纳。\n-   任务已被分配的用户（或系统）接受。由于该任务已被锁定，其他用户和系统无法修改或完成该工作。\n\
  -   任务已完成。\n-   已为用户分配了该任务。（仅限于人工任务。）\n-   任务尝试在激活系统中生成工作单，但未成功。（仅限于激活任务。）\n\n这些条件必须满足且不可更改。为了支持您的业务流程，您可以定义额外的状态（用户自定义状态）。如果一个任务无法按时完成，您可以将其状态设置为`suspended`。\n\
  \n在没有其他操作的情况下，处理器执行一系列指令直至完成。一个任务是一个实例（作业）的序列。\n\n![../images/520777_1_En_10_Chapter/520777_1_En_10_Fig1_HTML.jpg](img/520777_1_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1 状态切换\n\n就绪的任务保存在一个称为等待列表（`QUEUE`）的队列中。调度算法是一种用于选择在 CPU 上运行的任务的方法。\n\n##\
  \ 10.1 调度的概念\n\n进程由调度算法组成：\n\n![../images/520777_1_En_10_Chapter/520777_1_En_10_Fig2_HTML.jpg](img/520777_1_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2 状态转换与就绪队列\n\n-   **可抢占的：** 工作可以短暂暂停，以便完成更关键的任务。\n-   **非可抢占的：** 任务不能被中断。调度表是按特定顺序分配给处理器的一组任务列表。一个处理器的进程是已分配给该处理器的一组任务。\n\
  \n对于具有严格实时限制的应用，进程可能需要换出或分页到二级存储器。\n\n当一个操作系统同时运行多个程序时，它就被称为*多任务*系统。区分作为“指令容器”的程序和作为“进行中”实体的程序非常重要。正在运行的程序称为进程（或任务）。\n\
  \n因此，虽然*程序*是描述要执行的操作的静态实体，但*进程*是代表这些操作执行的动态实体。操作系统采用来“并行”执行多个进程（并发进程）的机制称为*时间片轮转*。\n\
  \n它包括为每个进程分配一个称为`time-slice`的 CPU 时间片。当该时间到期时，该进程的执行被挂起，CPU 分配给另一个进程。这种技术称为*抢占式多任务*。\n\
  \n多任务系统最重要的问题是各种进程所需资源的分配。事实上，可能会发生多个进程同时请求一个特定的、无法共享的单一资源（例如打印机）。在这种情况下，请求资源的进程会立即被挂起，并放入等待队列。只有当资源被释放且队列中没有其他进程排在其前面时，它才能获取该资源并继续执行。\n\
  \n另一个问题涉及对外设的访问。由于设备的 I/O 操作相对于处理器速度来说极其缓慢，进程对 I/O 操作的请求会导致该进程挂起，直到操作完成（所涉及的硬件机制显然是中断）。\n\
  \n一个进程可以处于以下三种状态之一：\n\n-   运行态：该进程拥有 CPU 并且正在运行（就绪态）。\n-   挂起态：该进程因时间片到期而被挂起。\n\
  -   阻塞态：该进程因需要某个尚不可用的资源或正在等待 I/O 而无法继续执行。\n\n管理就绪任务是通过一组队列来实现的，每个队列都有定义的优先级。每个进程都被分配一个优先级，这样当进程进入就绪状态时，它就会被放入具有相应优先级的队列中。\n\
  \n正在运行的进程是最高优先级队列中的第一个。如果该队列中没有等待的任务，则执行下一个优先级队列中的第一个任务，以此类推。\n\n\n\n## 10.2 约束类型\n\
  \n转移限制（transition restriction）可防止数据因先前状态而进入不可能的状态。例如，一个人不应能从“已婚”状态切换到“未婚，从未结婚”状态。在“已婚”之后，唯一允许的状态是“离异”、“丧偶”或“死亡”。\n\
  \n![../images/520777_1_En_10_Chapter/520777_1_En_10_Fig3_HTML.jpg](img/520777_1_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3\n\n任务处理器\n\n转移约束（transitional constraint）是一种特性，它支配着信息安全形式模型中，从模型的一个状态到其后继状态的每一次合法转移。它可以被视为状态标准的补充，状态标准适用于整个状态，但对状态之间的转移没有影响。\n\
  \n一旦其目标地址已写入辅助存储器，且它不在等待特定任务，则该进程即可执行且可切换。如果一个进程正在等待某个任务，它将被置入睡眠状态，其整个地址空间将被写入辅助存储器。\n\
  \n关于约束，请注意以下几点：\n\n![../images/520777_1_En_10_Chapter/520777_1_En_10_Fig5_HTML.jpg](img/520777_1_En_10_Fig5_HTML.jpg)\n\
  \n图 10-5\n\n任务激活\n\n![../images/520777_1_En_10_Chapter/520777_1_En_10_Fig4_HTML.jpg](img/520777_1_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4\n\n实时任务\n\n- 类型包括抖动、触发、完备性和截止期限。\n- 它们可以是显式的（包含在系统活动规范中）或隐式的（不包含在系统活动规范中）。\n\
  - 它们对资源的执行限制施加了逻辑顺序。\n- 它们确保对互斥资源的访问是同步的。\n\n### 10.2.1 独立任务调度约束\n\n此类别假设任务之间没有任何依赖关系（例如互斥）。\n\
  \n*速率单调算法*是一种基于静态优先级进行抢占的动态算法，其假设如下：\n\n1.  属于特定任务集的所有任务的请求（该任务集具有硬实时约束）都是周期性的。\n\
  2.  所有任务都是独立的（不存在互斥或依赖关系）。\n3.  每个任务（`Ti`）的到期时间与其周期（`pi`）的持续时间一致。\n4.  你预先知道每个任务的最大计算时间。\n\
  5.  上下文切换时间忽略不计。\n6.  `n` 个任务的利用率因子之和的上限为：\n\n![$$ \\mu =\\sum \\frac{c_i}{p_i}\\\
  le n\\;\\left({2}^{\\frac{1}{n}}-1\\right) $$](img/520777_1_En_10_Chapter_TeX_Equa.png)\n\
  \n其中：\n\n`c[i]` = 第 i*个*任务的计算时间\n\n`p[i]` = 第 i*个*任务的周期持续时间\n\n该算法静态地分配优先级，并基于任务周期的持续时间。周期较短的任务将具有较高优先级，而周期较长的任务优先级较低。因此，在执行阶段，每次都会选择周期最短的任务。\n\
  \n对于*最早截止期限优先算法*，会选择到期时间最早的算法。对于*最小松驰度算法*，任务的优先级是基于截止期限与任务所需计算时间之间的差值来计算的。这个值越低，任务的优先级就越高。\n\
  \n![$$ {laxity}_i={d}_i-{c}_i $$](img/520777_1_En_10_Chapter_TeX_Equb.png)\n\n###\
  \ 10.2.2 调度依赖任务\n\n在此类别中（更接近现实，因此也更有趣），我们假设任务之间存在依赖关系（例如互斥）。\n\n由 Mok [2] 提出的*内核化监视器算法*，为不可中断的时间\
  \ `q` 分配处理器，并假设临界区可以在该时间限制内执行。调度时采用最早截止期限优先策略。\n\n此协议中的调度分析需要为任务中出现的所有临界区的执行时间设定上限。实际上，这个量必须根据最长可执行临界区进行校准。由于这些上限可能过于悲观，使用内核化监视器协议可能会导致处理器利用率较低。\n\
  \n*优先级天花板协议*用于调度一组周期性任务，这些任务对受信号量保护的一个或多个公共资源具有排他性访问权。\n\n该协议由 Sha、Rajkmar 和 Lehocky\
  \ 于 1990 年创建，用于解决*优先级反转*问题。当高优先级任务必须等待另一个高优先级任务执行时，就会发生此问题，这通常是由于运行的任务正在使用其他资源。\n\
  \n如果有三个任务（`T1`、`T2` 和 `T3`），优先级为 `p1 > p2 > p3`，三者都使用资源 `R`，并且采用速率单调类型的调度算法。\n\n\
  假设 `T1` 和 `T3` 都需要访问与互斥锁 `S` 相关联的资源。\n\n如果 `T3` 在 `T1` 开始之前开始处理并锁定（`S`），那么 `T1`\
  \ 将被锁定一段不确定的时间，也就是说，直到 `T3` 执行解锁（`S`）释放资源 `S` 为止。事实上，如果没有 `T3` 持有的资源 `S`，`T1` 就无法继续执行。在这种情况下，尽管优先级顺序为\
  \ `p1 > p3`，但 `T1` 会因其而被 `T3` 所阻碍。\n\n如果在 `T3` 解锁（`S`）之前，`T2` 开始运行，那么 `T3` 将被挂起，以便\
  \ `T2` 能够根据优先级 `p2 > p3` 被处理。在这种情况下，`T1` 将不得不等待 `T2` 停止处理。实际上，尽管优先级顺序为 `p1 > p2`，但\
  \ `T1` 被 `T3` 阻塞，而 `T3` 又反过来被 `T2` 阻塞。\n\n所提出的算法基于以下几点：\n\n- 仅当任务的优先级高于当前锁定资源的任务时，才允许该任务进入临界区。\n\
  - 当其使用完临界区后，它会释放临界区，并将优先级恢复为先前的状态。\n\n## 10.3 复习题与答案\n\n请尝试回答这些复习题以检验知识掌握情况。\n\n\
  ### 10.3.1 复习题\n\n1.  “一个任务是一组事件。”这个说法正确还是错误？\n\n2.  什么是调度？\n    1.  预防性：当前任务可以被暂停以便完成一个更重要的任务。\n\
  \    2.  预防性：正在运行的任务可以被短暂暂停以便完成一个更关键的任务。\n    3.  抢占式：当前正在执行的进程可以被用来临时执行另一个任务。\n\
  \    4.  预防性：正在进行中的任务可以被短暂暂停以完成一个不那么关键的任务。\n\n3.  下列关于任务的陈述，哪一个是正确的？\n    1.  取决于操作系统，一个任务可以是一个进程或一个线程。\n\
  \    2.  作业必须是一个程序或一个线程，具体取决于操作系统。\n    3.  一个任务可能是一个进程或一个线程，具体取决于版本。\n    4.  以上都不对。\n\
  \n4.  下列关于事件的陈述，哪些是正确的？\n    1.  如果当前任务在完成之前不能被暂停，那么它就是非抢占式的。调度表是已分配给处理器的一系列任务。\n\
  \    2.  非抢占式不是指正在进行的工作是否可以暂停直至完成。调度表是已分配给处理器的一系列任务。\n    3.  非抢占式是指当前任务在完成之前不能被暂停。时间表是分配给特定事件的一组职责。\n\
  \    4.  以上所有陈述都是正确的。\n\n5.  “在没有其他活动的情况下，一个任务是由处理器持续执行的一组指令。”这个说法正确吗？\n\n\n\n###\
  \ 10.3.2 答案\n\n1.  答案：错误，任务是多个事件组成的序列。\n2.  答案：B，抢占式调度是指可以短暂暂停正在运行的任务，以便完成更关键的任务。\n\
  3.  答案：C，根据版本不同，任务可能是一个进程或一个线程。\n4.  答案：A，如果当前任务在完成前无法被暂停，则为非抢占式。调度表是已分配给处理器的任务列表。\n\
  5.  答案：错误，任务是指处理器在没有其他操作干扰下执行直至完成的一组指令。\n\n## 10.4 本章小结\n\n本章解释了实时系统中的调度工作原理。当多个具有相同请求和时间约束的进程需要被调度策略高效服务时，就会产生同构进程调度问题。例如，在必须支持固定数量视频显示的视频服务器中就会出现这种情况，这些视频都具有相同的帧率、视频分辨率、数据传输频率等特征。\n\
  \n在这种情况下，一种简单有效的调度策略是轮转调度。实际上，所有进程同等重要，它们拥有相同的工作量，并在处理完当前帧后结束。调度算法可以通过添加定时机制进行优化，以确保每个进程以正确的频率运行。这种简单的先例模型在实践中很少出现。更现实的模型需要考虑多个进程竞争\
  \ CPU 使用的情况，每个进程都有自己的工作负载和截止时间。\n\n下一章将聚焦建模，并讨论基于模型的工程如何助力分布式系统。对于分布式系统的实际实现，模型引导的工程是一个重要概念。\n\
  \n"
- "# 11. 基于模型的工程\n\n基于模型的工程是一种应用开发技术，它优先创建与特定领域概念更紧密相关的模型或抽象，而非计算或算法原理。该技术通过优化系统兼容性来提高生产力，简化设计流程，并促进个人与团队之间围绕系统的沟通与协作。\n\
  \n模型使技术人员和非技术人员能够拥有相同的愿景和理解，并促进和鼓励他们之间的互动。模型还有助于项目规划，通过提供对即将构建系统的更清晰视图，并允许基于客观标准进行项目管理。\n\
  \n## 11.1 面向区块链的模型驱动方法\n\n近年来，区块链的概念在实践和研究中获得了极大关注，因为它为分散环境中涉及多方必须安全共享数据和协作的匿名性和问责制问题提供了实用的解决方案。然而，业务核心网络和配置对成功使用区块链技术的影响至今仍很大程度上未知。本书提供了一种模型驱动方法，通过结合本体论和分层模型，捕捉当前区块链驱动业务网络的特征。\n\
  \n这些层次有助于详细描述此类网络。书中还引入了区块链业务网络本体（`BBO`），它将区块链网络各组件的概念和特征形式化。我通过评估并将其应用于一个真实的区块链用例，论证了这项工作的实用性。\n\
  \n要开发区块链业务模型，你需要具备*模型驱动工程*的方法。\n\n## 11.2 模型驱动开发\n\n通过汇集具有不同抽象程度的各种视角，基于模型的方法有助于理解一个系统。“客户能够构建一个包含系统特征和特性的模型，然后可以在此上下文中使用该模型完全重建系统。”遵循模型驱动架构或设计，有助于以多种方式理解和描述一个系统。^(⁷)\n\
  \n-   各部分之间的联系及其描述，有助于对系统的广泛了解，同时也有助于开发可扩展的解决方案，因为模型是建立在明确定义的命名法和分类法之上的。\n-   为了简化系统的开发，可以使用一个架构框架来混合和修改多个模型及解释层。\n\
  -   自动化可用于一组形式化的元模型，这些元模型随后可以被合并并转化为具有更详细信息的模型。\n-   技术标准是扩大基于模型的工作的可接受性和实施的必要基础。\n\
  \n### 11.2.1 区块链分层模型\n\n创建专门针对更大系统的不同方面的各种模型，有助于形成对该系统或现象的透彻理解。“可以使用这些模型来审视不同的抽象层次，然后可以将它们相互叠加，或者将其信息传递到其他层次，以便理解一个概念的全部范围。”¹\n\
  \n因此，我们定义了三个基本层次（见图 11-1），以便更合理、更全面地描述区块链驱动的网络。这些层次涵盖了从商业模式视角到基于代码的视角的所有内容。所有这些层次都至关重要，因为我们预期区块链技术将对每个层次产生独特的影响。\n\
  \n由于这些层次是相互关联的，技术实现会影响网络构成，进而影响商业模式。图 11-1 是分层区块链的一个示例。\n\n![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig1_HTML.jpg](img/520777_1_En_11_Fig1_HTML.jpg)\n\
  \n**图 11-1** 区块链层次\n\n为了创建一种用于定义区块链交易和区块层次的模型驱动方法，你将看到如何借助模型和元模型在这些基础上进行构建。\n\n\
  ### 11.2.2 模型与元模型\n\n本节介绍支撑 MDE 的基本概念，如系统、模型、元模型及其相互关系。\n\n在 MDE 的语境中，*系统*被定义为“一个通用概念，用于指代软件应用、软件平台或其他软件制品。”^(⁸)\
  \ 一个系统也可以由多个子系统构成，如图 11-2 所示，并且它可以与其他系统交互。（系统可以与其他系统交互。）\n\n模型是对现实世界现象的抽象：元模型是进一步的抽象，它突出显示模型本身的属性。模型遵循其元模型，就像计算机程序遵循其编写所用的编程语言的语法一样。\n\
  \n使用元模型的领域：\n\n-   需要交换或存储的语义数据的模式\n-   支持特定方法或流程的语言\n-   用于向现有信息表达额外语义的语言\n\n以下各节将详细介绍模型和元模型。\n\
  \n![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig2_HTML.jpg](img/520777_1_En_11_Fig2_HTML.jpg)\n\
  \n**图 11-2** 系统定义\n\n\n\n### 11.2.3 模型\n\n*模型*描述了一个可能存在于今日或未来，也可能并不存在的系统。它是一个被视为有效范例或原型、值得效仿的参考术语。\n\
  \n模型之所以值得考虑，是因为它包含以下细节：\n\n-   模型可以是关于所研究设备/系统的一系列断言的集合。\n-   模型是为特定目标而构建的系统的最简化版本，并且应能够代替实际系统来回答问题。\n\
  -   模型是为特定目标而构建的系统的简化版本，并且能够为真实程序解答问题。\n\n另一方面，模型本身也是一个系统，拥有自身的标识、复杂性、组成元素、连接关系等。\n\
  \n特别是，在考虑一个“模型的模型”时，你必须牢记，其中一个是另一个模型的模型，因此它本身也是一个*系统*。总而言之，“模型”是一个有助于描述和研究中的系统并提供答案，而无需直接观察该系统的系统，如图\
  \ 11-3 所示。\n\n![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig3_HTML.jpg](img/520777_1_En_11_Fig3_HTML.jpg)\n\
  \n图 11-3 – 模型与系统之间的关系\n\n模型与系统之间也存在关系。借助模型，你可以设计一个系统。通过观察模型，你可以理解系统的工作原理。另一方面，你可以基于系统架构创建多个模型。这就是为什么可以说模型是系统的简化版本，并且是为特定目标而构建的。¹\n\
  \n### 11.2.4 元模型\n\n*元模型*是一种基于先前研究来规定建模语言架构的模型。然而，必须从图 11-4 中理解以下事实。\n\n![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig4_HTML.jpg](img/520777_1_En_11_Fig4_HTML.jpg)\n\
  \n图 11-4 – 元模型与模型之间的关系\n\n我们可以说，建模语言将是一组模型的集合，这是由“模型”与“建模语言”之间的“*属于*”关系定义的（或者说，模型是建模语言的一个元素）。\n\
  \n我们也可以说，这种方法从其规则来源于对模型概念与元模型概念的区分。\n\n一个 UML 模型是一种表示法，它从特定视角并在特定约束下，捕捉了你想要建模的一切事物的关键方面。模型以图表（UML\
  \ 图）的形式构建，而图表是图形化表达手段。模型由三个基本部分组成：\n\n-   **分类器：** 它们描述一组对象。对象是一个具有状态并与其他对象存在关系的独立实体。\n\
  -   **事件：** 它们描述一组可能的 occurence。Occurrence 是系统内发生并产生后果的事情。\n-   **行为：** 它们描述一组可能的执行过程。执行代表根据一组规则完成某个算法。⁹\n\
  \n另一方面，UML 图包含表示模型元素的图形元素。例如，在一个包图中定义的两个关联类，是两种类型的分类器，由两个矩形符号和一条表示关联符号的连线来表示。\n\n\
  ## 11.3 构建元模型与模型\n\n如何构建第一个元模型是一个众所周知的、反复出现的元模型问题。OMG 官方规范通过按包分解架构来描述 UML 的语义。在每个包内，模型元素以半形式化的方式通过以下术语定义：\n\
  \n-   **抽象语法：** 通过使用 UML 符号表达的类图来呈现 UML 元模型、其概念（即元类）、关系以及约束。此外，还附加了用自然语言（英语）编写的文本部分。\n\
  -   **内涵：** 以自然语言提供，包括对构成 UML 元模型的元素及其关系的描述。\n-   **形成规则：** 用于定义有效模型的规则和约束。这些规则和约束既使用形式化语言\
  \ `OCL`，也使用自然语言进行表达。\n\nUML 元模型的复杂性通过将其组织成三个包来管理：基础包、行为元素包和模型管理包。前两个包进一步分解为子包，每个子包包含语义相关的元素。以下是每个包的简要描述：\n\
  \n-   **行为元素：** 此包规定了定义模型动态行为所需的结构。它由五个子包组成。\n-   **基础：** 此包代表了规定静态建模结构的语言基础设施。它分为三个子包。\n\
  -   **模型管理：** 此包定义了模型、包和子系统等，用于组织不同的模型，并将具有共同特征的元素分组。\n\n## 11.4 建模语言的类别\n\n根据专业人士的观点，定义建模语言还有其他一些方式。他们认为建模语言可以分为两种类型：通用型和领域特定型。二者的区别在于通用型拥有更多通用构件的数量，这使其更容易应用于各种领域。\n\
  \n由于 UML 和 SysML 提供了全面且丰富的结构和标记，用于定义和解释基于面向对象范式的软件应用，或系统工程学科所定义的任何类型的系统，因此它们是通用型和领域特定型的常见实例。¹\n\
  \n另一方面，DSL 通常使用更少的、与应用程序领域更直接相关的结构或概念。因为 DSL 使用领域概念进行定义，所以通常更易于理解、掌握、验证和交互，从而促进了开发人员与领域专家之间的协作。有人认为\
  \ DSL 可以提高生产力、可靠性、信赖性和可移植性。¹\n\n然而，采用 DSL 也存在缺点，例如学习、创建和维护一种现代语言及其配套使用所需的生成工具的成本。\n\
  \n![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig5_HTML.jpg](img/520777_1_En_11_Fig5_HTML.jpg)\n\
  \n图 11-5 – 建模语言\n\n另一些人则认为，由于当今语言工作台的高质量和复杂性，工具支持已不再是重大障碍。\n\n此外，研究结果表明，软件语言工程师甚至不会评估他们自己的原生语言，这意味着在软件语言过程领域，特别是在设计、实现和评估的开发方面，需要进行更多研究。¹\n\
  \n如图 11-6 所示，建模语言可以根据其软件架构属性进行分类，并可以通过一个或多个视图进行组织。\n\n![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig6_HTML.jpg](img/520777_1_En_11_Fig6_HTML.jpg)\n\
  \n图 11-6 – 对建模语言及其相关视角进行分类\n\n\n\n## 11.5 为信息物理系统设计元模型\n\n信息物理系统是监控和调节物理环境，同时协助人类履行职责的复杂系统。CPS\
  \ 是结合了软件和硬件的网络化混合系统。当程序员、工程师和科学家协作构建和实现此类系统时，他们会遇到种种障碍。来自多个领域的专家必须理解该系统才能进行协作，无论他们身处哪个领域。\n\
  \n我们提出了一个信息物理系统元模型和一种教育研究方法，程序员、工程师和科学家可以使用、重用和修改该方法，用于信息物理系统的新应用。数据科学家和程序员利用这个元模型来构建一个能够提供跨领域可理解的\
  \ `M1` 系统模型的信息物理系统。该元模型既包含了智能物，也包含了人，这两者通常出现在任何信息物理系统的设计中。它采用复合架构，支持创建包含诸如叶子节点等智能元素的信息物理系统。\n\
  \n## 11.6 CPS 元模型示例\n\n考虑以下示例：\n\n- **交通运输**：用于空中交通管制和运输管理的系统。\n- **健康医疗**：医疗设备、健康监测系统、远程机器人手术系统。\n\
  - **制造业**：汽车、飞机、工厂自动化系统、化工过程跟踪、自主机器人空间以及工业网络等都是工业网络的例子。\n- **环境**：农业、环境和地质系统都是环境科学系统的例子。\n\
  - **航空航天**：太空探索系统。\n- **建筑**：日常生活中的辅助生活和智能场所。\n- **公共环境**：智能供水网络和应急管理。\n- **信息物理公共系统**：这些\
  \ CPS 还会考虑人类理解力、技术能力以及社会文化因素。\n\n下一节将介绍*元对象设施*，并以一个用于信息物理系统的基础元模型作为支撑。\n\n### 11.6.1\
  \ 元对象设施\n\n元对象设施是对象管理组用于模型驱动工程的一个标准。它源于 `UML` 语言；对象管理组需要一个元建模架构来定义 `UML`^(¹⁰)。它使用对象建模方法来定义任何形式的元数据。尽管它通常与\
  \ `UML` 相关联，但它独立于 `UML`。为了指定任何类型的元数据，`MOF` 使用对象建模技术。尽管有时会与 `UML` 混淆，但它们并非同一事物。\n\
  \n我们使用 `UML` 的构造型机制来创建和扩展 CPS 元模型上的智能对象。`M1` 定义的类可以利用这个元模型作为基础进行扩展和重用。这些类代表了一个系统。`M1`\
  \ 上应用程序的顶层设计被称为顶层设计。\n\n一个*系统的系统* 是一个由有限个独立且可运行的组成系统组合而成的系统，这些组成系统为了达成更高目标而在一段时间内通过网络连接在一起。一个\
  \ SoS 集成了多个 CS。\n\n![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig7_HTML.jpg](img/520777_1_En_11_Fig7_HTML.jpg)\n\
  \n图 11-7\n\n建模语言的分类及其伴随的视角\n\n一个*组成系统* 包括一个计算机网络（网络系统）、一个受控对象（物理系统），以及可能的人机交互。一个\
  \ SoS 可以是：\n\n![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig9_HTML.jpg](img/520777_1_En_11_Fig9_HTML.jpg)\n\
  \n图 11-9\n\n一个 SoS\n\n![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig8_HTML.jpg](img/520777_1_En_11_Fig8_HTML.jpg)\n\
  \n图 11-8\n\n一个 SoS 集成一个 CS\n\n- **定向 SoS**：一个具有集中化目标并拥有所有 CS 所有权的 SoS。一个无人火箭中的控制系统集合就是一个例子。\n\
  - **已识别 SoS**：CS 为独立拥有，但所有者之间达成合作协议以实现共同目标。\n- **协作 SoS**：独立 CS 之间的自愿交互，目标是实现有利于单个\
  \ CS 的目标。\n- **虚拟 SoS**：核心目标缺失且缺乏集中统一指挥。\n\n每个 CS 都有一个接口，基于该接口的服务对其他 CS 可用，例如可靠接口，它作为一个\
  \ CS 的接口，通过该接口，CS 的服务对其他 CS 可用。RUI 由以下部分组成：\n\n![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig11_HTML.jpg](img/520777_1_En_11_Fig11_HTML.jpg)\n\
  \n图 11-11\n\nRUMI 和 RUPI\n\n![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig10_HTML.jpg](img/520777_1_En_11_Fig10_HTML.jpg)\n\
  \n图 11-10\n\nSOS 和 CS\n\n- 可靠消息接口\n- 可靠物理接口\n\n## 11.7 复习题\n\n1.  “模型驱动工程是一种软件开发方法，它强调创建比计算或代数概念更接近特定领域概念的模型或抽象。”\
  \ 此陈述正确还是错误？\n\n2.  建模语言由以下哪项确定？\n    1.  由与所讨论的元模型相对应的所有可能模型的集合确定，该集合被称为元模型。\n\
  \    2.  由一个元模型确定，该元模型是遵循所讨论的元模型的一组模型。\n    3.  由元模型确定，该元模型是遵循特定元状态的所有可行模型的集合。\n\
  \    4.  以上都不是。\n\n3.  对于*事件*，以下哪项陈述是正确的？\n    1.  虚拟 SoS 的特点是缺乏核心目标和集中统一指挥。\n \
  \   2.  虚拟 SoS 缺乏目标和集中统一指挥。\n    3.  虚拟 SoS 的特点是缺乏重点和统一指挥。\n    4.  以上所有。\n\n4.\
  \  “元模型包括 `UML` 和`公共仓库元模型`。” 此陈述正确还是错误？\n\n## 11.8 复习题答案\n\n1.  答案：正确。模型驱动工程是一种软件开发方法，它侧重于构建比计算或代数概念更紧密地与特定领域概念相关联的模型或抽象。\n\
  \n2.  答案：A。与所讨论的元模型相对应的所有可能模型的集合被称为元模型。\n\n3.  答案：A。虚拟 SoS 的特点是缺乏核心目标和集中统一指挥。\n\n\
  4.  答案：正确。`UML` 和`公共仓库元模型`是元模型的例子。\n\n\n\n## 11.9 总结\n\n自从人类开始使用计算机以来，研究人员就一直致力于提高抽象层次。模型驱动工程（MDE）是这一趋势的自然延续，也是一种很有前景的方法，用于应对平台复杂性以及第三代语言无法减轻这种复杂性并有效表达主导概念的困境。\n\
  \n模型驱动工程（MDE）处于层次结构的顶端，因此抽象程度最高。它被公认为一种软件工程范式，不仅将模型视为辅助文档，更视其为任何工程学科和应用领域开发的核心焦点。模型驱动开发（MDD）在层次结构中略低于\
  \ MDE。该方法侧重于分析、设计、实现和需求等学科。\n\n具体的 MDD 方法倾向于定义建模语言，以在不同抽象层次上描述所研究的系统。基于模型的测试（MBT）侧重于测试学科的自动化。测试模型用于表示所研究系统的预期行为。模型驱动架构（MDA）是由\
  \ OMG 提出的一种方法，主要侧重于模型的定义及其转换。\n\n要创建有效的区块链应用，必须首先对系统进行建模。在建模系统时，必须包含前面提到的技术。当你在分布式系统中应用区块链技术时，作为分布式系统建模的一部分，你还需要对区块链层进行建模，以便清晰地了解系统架构和系统之系统（SoS）功能。所有这些模型都可以借助\
  \ `BLOCKLY 4SOS` 建模技术来完成。\n\n作为模型驱动工程的一部分，你需要考虑使用 `BLOCKLY 4SOS` 来对 SoS 系统进行建模。下一章将解释\
  \ `BLOCKLY 4SOS`。\n\n脚注 1 2 3 4\n\n"
- "# 12. BLOCKLY 4SOS\n\n`BLOCKLY` 是一个库，允许你制作积木式编程应用。即使用户并不真正了解编程语言，积木式编程也能让他们使用图形块来构建脚本和程序。在拖拽式编辑器中，`BLOCKLY`\
  \ 包含了定义和渲染积木所需的一切。每个积木代表一行可以轻松堆叠并转换为代码的代码。它可用于让用户自定义应用的各个元素并为其添加操作。\n\n## 12.1 SoS\
  \ 建模\n\n在使用该工具时，它会生成一个名为 `ex-abundant` 积木的标准 `SoS-block` 来进行说明。左侧的工具箱包含了构建 `SoS`\
  \ 设计所需的所有积木。这个概念模型将帮助 `SoS` 设计者。此外，`BLOCKLY` 中每个导出的积木都关联着一个视角积木，因此所有与通信视角相关的积木都可以在工具包的“通信”类别下找到。\n\
  \n用户必须点击并拖拽浮动面板或工具箱中的积木，才能在 `BLOCKLY` 中生成新的积木。一个针对 `BLOCKLY` 的 API 被设计出来，旨在提高易用性和准确性。`Field\
  \ Dropdown()` 提供了一个合适的积木列表，这些积木可以链接到特定的积木，从而方便用户构建积木。\n\n在添加“技术”积木后，该工具会显示如何添加其他合适的积木：故障预测、故障预防、故障消除和故障容错。“技术”积木是配置文件中的一个抽象积木，而上述四个积木都继承自它。\n\
  \n一个积木可以具有三个阶段，如下所示：\n\n*   压缩视图\n*   部分压缩视图\n*   未压缩视图\n\n通过减少屏幕上的积木数量，压缩显示使用户能够看到当前正在编辑的积木（见图\
  \ 12-1）。由于部分折叠的积木只显示一个积木的非空特征，因此用户可以选择仅查看已声明的属性。使用“完整视图/未压缩视图”来查看积木的所有属性。用户可以通过双击积木在这三种视图之间切换。参见图\
