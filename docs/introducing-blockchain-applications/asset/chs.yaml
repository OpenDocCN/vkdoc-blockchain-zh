  // 公共代码\n/*********************************************************************/\n\
  \nvoid loop() {\n    if (kilo_ticks >= END_TIME) {\n        set_color(RGB(0, 0,\
  \ 0));\n        set_motors(0, 0);\n    } else {\n        if (kilo_ticks < 32) spinup_motors();\n\
  \        if (kilo_uid == 0) leader();\n        else follower();\n    }\n}\n\nvoid\
  \ initMessageFunctions() {\n    kilo_message_rx = message_rx;\n    kilo_message_tx\
  \ = message_tx;\n}\n\nint main() {\n    kilo_init();\n    initMessageFunctions();\n\
  \    kilo_start(setup, loop);\n    return 0;\n}\n```\n**清单 15-1**  \n**队列源程序**\n\
