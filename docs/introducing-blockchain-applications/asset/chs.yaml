- "# 3. 比特币\n\n在上一章中，您看到了区块链技术如何在没有中央权威的情况下，借助所讨论的技术和算法，在参与者之间建立信任，并认证分布式账本的*不可篡改性*。区块链本身非常适合数字货币的理想模型，在这些模型中不需要像银行、保险公司和其他中央组织这样的中介和第三方。事实上，区块链正是因比特币而诞生并得以普及。\n\
  \n2008 年，一位（或一群）名为中本聪的人发布了一篇题为《比特币：一种点对点的电子现金系统》的研究论文。这篇论文描述了一个点对点的现金系统，它允许网络交易直接从一方发送到另一方，而无需经过任何中介/银行组织，并对比特币进行了非常详细的说明。\n\
  \n与那些通过共同可信实体管理交易的系统相比，加密货币这一术语描述了所有使用密码学来保护数字交易的系统、网络和媒介。\n\n本章将介绍*比特币协议*。它将详细分析构成该协议的主要部分——公钥和私钥、比特币地址以及区块。接着，本章将阐释其网络和共识机制，包括工作量证明。\n\
  \n## 3.1 比特币的历史\n\n比特币的几乎所有技术部分都诞生于 20 世纪 80 年代和 90 年代的学术出版物中。“我们需要强调的是，我们的目标不是贬低中本聪的工作和成就，而只是强调其真正的直觉飞跃是什么。实际上，通过追溯比特币中存在的想法的起源，我们可以关注这些想法被整合到底层组件的具体而复杂的方式。”^(¹)\n\
  \n比特币的历史本身就是一个案例研究，因为它证明了学术界、外部科学家、工程师和专业人士之间的关系，并展示了这些团队如何相互学习。许多专业人士研究过比特币并发表了大量研究论文。\n\
  \n请注意，账本的想法是比特币的初始起点。如果你理解了账本，你就会理解该系统的结构及其通信方式。账本是所有交易发生的地方。它对系统中的所有参与方和组件都是开放和可信的（见图\
  \ 3-1）。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig1_HTML.jpg](img/520777_1_En_3_Fig1_HTML.jpg)\n\
  \n**图 3-1** 比特币背后的主要思想\n\n为了支持数字货币，账本必须具有以下基本属性：\n\n- **仅可追加：** 只能向账本中添加新的交易。不能废弃、修改或重新排序现有的账本条目。\n\
  - **不可篡改：** 账本中存在的任何信息都不能被改变。\n- **防止双重支付：** 不能多次使用同一数字货币单位进行支付。\n\n\n\n### 3.1.1\
  \ 链式时间戳与默克尔树\n\n比特币账本的数据结构，在适当修改后，借鉴自斯图尔特·哈伯和斯科特·斯托内塔（1990 年和 1997 年）的几篇文章。\n\n\
  正如我们所知，中本聪在比特币白皮书中指出，哈伯和斯托内塔的论文探讨了文档的时间戳问题。请注意，在涉及商业合同、专利及其他文件时，可以确定该文件是在某个特定时间点生成的。我们理解他们所说的“文档”概念相当宽泛，可以包含不同类型的数据。\n\
  \n他们曾顺带提及银行交易作为一种可能的应用，但请注意，这并非他们的目标。每份文档的发起者确认生成时间，并对文档及其日期和时间进行签名。这份初始文档由创建者批准/签名，因此文档形成了一条指向过去的长链。第三方用户无法编辑已加时间戳的消息，因为它已由发起者批准；此外，发起者或创建者若想编辑该消息，则必须更改后续的整个消息链。\n\
  \n哈伯和斯托内塔还在他们的文章中提出了若干想法，以使这种数据结构更快速、高效和精确：\n\n-   文档之间的链可以通过使用哈希值而非签名来创建；请注意，这些哈希值计算起来更简单、更快速，并且在作为数据标识符时更强大。我们将此类链接称为*指针*。\n\
  -   与其单独为文档加盖时间戳（如果同时生成大量文档，这种方式效率低下），不如将文档合并成批次或区块，并为这些文档使用相同的时间戳。\n-   每个区块中的文档应通过一个称为*默克尔树*的哈希指针二叉树来关联。乔什·贝纳洛先生和迈克尔·德·马雷先生在哈伯的文章发表后不久，于\
  \ 1991 年独立提出了这些想法。\n\n请注意，默克尔树以拉尔夫·默克尔的名字命名，他在 1980 年的文档中提出了非对称加密的逻辑。\n\n无论是哪种方式，比特币都采用了哈伯和斯托内塔研究中的数据结构，并通过加入工作量证明机制重新设计了其安全特性。\n\
  \n### 3.1.2 分布式共识\n\n互联网货币或货币交易需要一个共同的权威机构。\n\n对于分布式账本，你会看到自动产生分叉的情况，这意味着某些节点会认定区块\
  \ A 是最后一个区块，而所有其他节点则会认定区块 B 是最后一个区块。^(²)\n\n在这种情况下，你需要明白，这是由于对手试图中断账本交易，或者由于网络延迟，偶尔导致不同节点几乎同时生成了区块，而彼此不知晓对方的存在。链式时间戳不足以解决分叉问题，这一点由迈克在\
  \ 1997-1998 年指出。\n\n在可能出错的情况下如何达成共识的问题被称为*拜占庭将军问题*。在第 2 章中曾非正式地讨论过这个问题。拜占庭故障既包括自然故障，也包括恶意行为。\n\
  \n这个想法最初由莱斯利·兰波特与罗伯特和马歇尔于 1982 年共同撰写的一篇文章中讨论。1999 年，米格尔·卡斯特罗和芭芭拉·利斯科夫发表了一份文档，提出了\
  \ PBFT 算法，该算法能够以出色的性能解决拜占庭将军问题。（请注意，PBFT 代表实用拜占庭容错。）\n\n该复制算法可以管理拜占庭缺陷。拜占庭容错算法在不久的将来将变得越来越重要，因为在网络世界中，恶意攻击和软件错误变得非常普遍，这可能导致故障节点产生任意行为。\n\
  \n但对于之前的算法来说，它们需要一个特殊的同步系统，并且速度很慢。本书中描述的算法非常实用，因为它能在异步环境中快速工作。\n\n中本聪在他的最初白皮书中既没有引用同一篇文章，也没有使用他的措辞。然而，他采用了一些概念，将自己的协议称为共识协议，并考虑了入侵者形式的故障，以及节点加入和退出基础设施的情况。\n\
  \n当在一个邮件列表中被问及比特币与拜占庭将军问题之间的联系时，中本聪声称工作量证明链解决了这个问题。\n\n几乎所有的故障系统都假设系统中的大多数节点既是可信的，也是诚实的（例如，超过一半或三分之二）。开放对等网络中的节点可以随时自由加入和离开。\n\
  \n因此，可以利用女巫攻击来绕开系统的共识或质量保证。约翰·杜塞于 2002 年定义了女巫攻击，并提出了一种名为工作量证明的密码学突破来对抗它。\n\n## 3.2\
  \ 工作量证明\n\n本节将介绍工作量证明的早期阶段，以便你更好地理解它。辛西娅·德沃克和莫尼·纳尔于 1992 年提出了第一个倡议，标题为“工作量证明”。他们当时的目的是阻止垃圾邮件。\n\
  \n例如，Hashcash 是一种工作量证明方法，已被用作多种系统中的拒绝服务攻击对策。一个 hashcash 印章是一种工作量证明，发送者需要花费可参数化的计算时间才能生成。接收者可以快速验证收到的\
  \ hashcash 印章。\n\n虽然 `hashcash` 的设计初衷是给发送电子邮件增加成本，以防止大量发送垃圾邮件的发送者，但现在它可以被引入到任何互联网服务中，对那些可能滥用服务器资源的用户施加计算成本。\n\
  \n然而，一个想要发送一百万封电子邮件的垃圾邮件发送者，如果使用类似的方法，可能需要数周时间。有时，工作量证明实例（也称为*谜题*）被要求用于识别电子邮件和收件人。\n\
  \n否则，垃圾邮件发送者可以仅花费发送一条消息给一个接收者的成本，就将大量消息发送给同一接收者（或将同一条消息发送给多个接收者）。第二个关键特性是，接收者的计算成本应尽可能低；无论计算谜题答案多么复杂，验证起来都应该很简单。\n\
  \n德沃克和纳尔的建议催生了一个完整的研究领域。亚当·贝克，当时是赛博朋克研究社区的一名博士后，于 1997 年独立设计了一个类似的概念，称为 `hashcash`。\n\
  \n*赛博朋克*是反政府和反中央集权机构的活动家，他们利用密码学来推动社会和政治变革。\n\n`Hashcash` 只不过是一种工作量证明算法；它被用作不同系统中针对垃圾邮件和拒绝服务攻击的措施。它基于一个与哈希函数相关的简单原理：要找出一个其哈希值为给定输出的输入，唯一的方法就是测试各种输入，直到在哈希函数中得到所需的数据。因此，要找出一个其哈希值与任意一系列输出匹配的输入，唯一的方法就是尝试一个接一个地对不同输入进行哈希运算。\n\
  \n\n\n### 3.2.1 中本聪的天才之处\n\n理解构成比特币设计要素的所有前身技术，有助于我们领会中本聪真正伟大的发现。\n\n`工作量证明`（`PoW`）用于保护总账或分类账。`工作量证明`的求解工作由矿工完成。每位矿工解决的挑战形式略有不同；因此，其成功概率与其所拥有的全球算力比例成正比。解决难题的矿工可以向账本提交一个新的交易区块，该区块将根据时间戳被添加到账本中。贡献区块的矿工将获得新铸造的比特币作为奖励，以换取维护账本的服务。如果某个矿工贡献了一个无效的区块或交易，它很可能会被其他大多数为后续区块做出贡献的矿工所剔除，从而使错误区块的区块奖励失效。\n\
  \n通过这种方式，由于货币激励的存在，矿工们相互之间形成了保险机制。与用于协调计算机系统的复杂方法不同，中本聪的天才之处在于比特币的各个组成部分。以前没人想到要激励节点保持诚实，也没人想到要使用共识算法来避免双重支付问题。\n\
  \n为了消除双重支付并确保货币具有价值，比特币需要一个安全的账本。矿工必须以某种方式获得奖励。而矿工的算力反过来又用于保护账本的安全。否则，一个拥有超过全球 51%挖矿能力的敌手，可能比网络中的其他节点更快地生成区块，进行双重支付计算或交易，并通过绕过计算机系统来彻底重写历史。\n\
  \n因此，比特币的诞生依赖于这三个组件之间精心设计的平衡关系。\n\n## 3.3 密钥与地址\n\n为了拥有自己的比特币，即能够花费它们，你需要具备：\n\n\
  - 一组数字密钥，包括一个私钥和一个公钥\n- 一个比特币地址\n- 一个数字签名\n\n`椭圆曲线数字签名算法`是一种加密算法，是比特币私钥和公钥的基础。它用于确保只有合法的所有者才能花费比特币。\n\
  \n### 3.3.1 私钥\n\n在比特币的语境中，私钥是一个秘密数字，允许你花费比特币。每个比特币钱包都包含一个或多个存储在钱包文件中的私钥。它也被用于生成数字签名。\n\
  \n私钥只是一个随机生成的数字。它是一个有符号的 256 位（32 字节）整数。然而，并非所有 256 位无符号整数都是比特币私钥。事实上，比特币采用的标准`secp256k1`限制了有效私钥的数量。`Secp256k1`在高效加密标准中有详细描述，它对应于比特币公钥加密中所使用的椭圆曲线参数（SEC）。请记住，私钥用于生成公钥。\n\
  \n### 3.3.2 公钥\n\n关键在于，公钥可以用来验证签名的真实性（即，该签名是使用正确的私钥生成的）。通常，公钥是通过将私钥与椭圆曲线上的一个点相乘来生成的。比特币使用`secp256k1`常数中定义的固定椭圆曲线和一组数学常数。\n\
  \n从私钥`<< privkey >>`开始，将其与曲线上一个称为*生成点* `G`的预定义点相乘，会在曲线上产生另一个不同的点，该点就对应着公钥`<< pubKey\
  \ >>`。通常，公钥可以用点`«privkey»*G=«pubKey» = (x,y)`的坐标来定义（见图 3-2）。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig2_HTML.jpg](img/520777_1_En_3_Fig2_HTML.jpg)\n\
  \n**图 3-2** 用于计算公钥的椭圆曲线密码函数示例\n\n生成点`G`是`secp256k1`标准的一部分，对于比特币中的所有密钥都是相同的。私钥`<<\
  \ privKey >>`乘以`G`的结果将得到与之对应的唯一公钥`<< pubKey >>`。`<<privKey >>`与`<< pubKey >>`之间的关系是固定的，但只能以单向方式计算，即从`<<\
  \ privKey >>`到`<< pubKey >>`。\n\n椭圆曲线上点的 (x, y) 坐标可用于描述公钥。十六进制是最常用的数据存储格式。\n\n因此，公钥有两种格式：\n\
  \n- 非压缩公钥\n- 压缩公钥\n\n请注意，非压缩公钥是旧格式。现在通常已不再使用，转而采用压缩格式。比特币最初使用`x`和`y`坐标来存储公钥。在这种非压缩格式中，坐标被简单地串联起来，并添加前缀`04`以表明这是一个非压缩公钥，如图\
  \ 3-3 所示。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig3_HTML.jpg](img/520777_1_En_3_Fig3_HTML.jpg)\n\
  \n**图 3-3** 非压缩公钥\n\n对于压缩公钥，椭圆曲线沿 X 轴对称，如图 3-4 所示。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig4_HTML.png](img/520777_1_En_3_Fig4_HTML.png)\n\
  \n**图 3-4** 椭圆曲线的对称性\n\n因此，在压缩公钥格式中（见图 3-5），你只需存储完整的`x`坐标，以及一个指示`y`坐标是偶数还是奇数的前缀。\n\
  \n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig5_HTML.jpg](img/520777_1_En_3_Fig5_HTML.jpg)\n\
  \n**图 3-5** 压缩公钥\n\n这种格式在区块链上节省了大量空间。\n\n\n\n### 3.3.3 比特币地址\n\n比特币地址，或简称地址，是由 26-35\
  \ 个字母数字字符组成的标识符，以数字 1、3 或`bc1`开头，代表比特币支付的一个可能目的地。比特币（加密货币，BTC）中的交易可以通过地址进行，有点像发送电子邮件。然而，与电子邮件地址不同，人们拥有不同的比特币地址，并且每笔交易应使用一个唯一的地址。\n\
  \n一个人可以创建无限数量的地址，从而提高支付的匿名性。一个地址由三个元素构成：\n*   公钥哈希\n*   前缀\n*   校验和\n\n让我们详细分析这三个组成部分。\n\
  \n公钥哈希无非是对公钥应用双重哈希。具体来说，它是通过`SHA-256`和`RIPEMD160`获得的哈希，因此：\n\n```\n> = RIPEMD160\
  \ (SHA-256 (>))\n```\n\n它有时被称为`HASH160 (<< publickey >>)`，因为这比写`RIPEMD160 (SHA256\
  \ (<< publickey >>))`更简单。\n\n前缀表示要创建的区块类型。最常用的有：\n*   `00`：用于`P2PKH`锁定脚本（你将在后面了解它是什么）\n\
  *   `05`：用于`P2SH`锁定脚本\n\n最后，校验和是通过对公钥哈希进行两次`SHA-256`哈希并取前四个字节获得的。然后，你将这些元素按顺序排列得到一个队列（见图\
  \ 3-6 和 3-7）：\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig6_HTML.jpg](img/520777_1_En_3_Fig6_HTML.jpg)\n\
  \n**图 3-6** 构成比特币地址的元素\n\n1.  `prefix`\n2.  `HASH160(«public key»)`\n3.  `checksum`\n\
  \n然后应用`Base58`函数，该函数最终将提供比特币地址，如图 3-7 所示。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig7_HTML.jpg](img/520777_1_En_3_Fig7_HTML.jpg)\n\
  \n**图 3-7** 比特币地址\n\n`Base58`是一个转换器，你可以用它以更短、更直观的格式表示大数字，从而得到字母数字文本。显然，这些操作是在应用程序层面实现的，用户无需执行所有这些步骤。\n\
  \n### 3.3.4 数字签名\n\n数字签名是一种数学手段，用于证明你知道与公钥关联的私钥，而无需泄露实际的私钥。在进行交易时，你首先必须解锁你想要使用的余额（UTXO，你将在下一节中了解）。这可以通过证明你“拥有”该余额，并且你知道存储该余额的地址的私钥来实现。因此，为了在不提供私钥的情况下解锁余额，你使用数字签名。通过这种方式，你表明你拥有私钥，但无需将其交给网络。然后在交易中使用这些签名来证明你拥有正在花费的余额。\n\
  \n是什么阻止了有人利用某笔交易的数字签名来解锁你地址上的其他输出？每笔交易都有自己的数字签名。\n\n换句话说，你不仅使用私钥，还使用私钥和交易数据来构造数字签名。因此，任何数字签名都与使用它的交易相关联。因此，如果有人试图在一笔新交易中使用某笔交易的数字签名，它将与数字签名中的交易数据冲突，并被比特币网络节点拒绝。\n\
  \n因此，数字签名也能保护其使用的交易不被篡改。数字签名由两部分组成：\n*   一个随机部分\n*   签名部分，由以下内容组成：\n    *   一个私钥\n\
  \    *   你正在为其创建数字签名的数据\n\n对于随机部分，设 *n* 为第二条椭圆曲线标准 `secp256k1` 上点 `G` 的阶。你生成一个随机数\
  \ 2 [1; n - 1] 并称这个随机数为 `k`。\n\n然后，你将此随机数乘以椭圆曲线的点 `G`（生成点）。这与你用于公钥并由标准 `secp256k1`\
  \ 指示的 `G` 相同。为简洁起见，你将此随机数称为变量 `k`。\n\n```\nk G = (xr; yr)\n```\n\n该数字签名的随机部分是你获得的曲线上的点（见图\
  \ 3-8）。但你只取 `xr` 坐标。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig8_HTML.jpg](img/520777_1_En_3_Fig8_HTML.jpg)\n\
  \n**图 3-8** 曲线上获得的随机数，取其中的 X 坐标\n\n为简洁起见，你可以将从\n\n```\nr = randomPart = xr mod n\n\
  ```\n\n获得的 `r` 称为 `randomPart` 值。\n\n对于签名部分，你需要获取私钥用于随机部分。\n\n```\nr * privKey\n\
  ```\n\n然后包含你想要创建签名的数据。\n\n在比特币中，这由包含你想要解锁的余额（UTXO）的交易哈希表示。你定义 `h (msg) = SHA-256\
  \ (<<transaction >>)` 并得到：\n\n```\n[r * privKey] + h(msg)\n```\n\n交易哈希的包含将签名绑定到一笔交易（因此它不能用于另一笔不同的交易）。最后，你将其除以初始随机数\
  \ `k`：\n\n```\ns = sign = k-1 (r privKey + h(msg)) (mod n)\n```\n\n你已经得到了数字签名的基本部分。数字签名由\
  \ `r` 和 `s` 组成。\n\n如果有人要求你证明你知道某个公钥的私钥，你可以给他们数字签名 (`r`; `s`) 作为证明。\n\n#### 3.3.4.1\
  \ 验证数字签名\n\n为了验证数字签名是使用正确的私钥创建的，收到此数字签名的人必须使用这两部分 (`r`; `s`) 在椭圆曲线上找到两个新点并检查签名。\n\
  \n从现在开始，乘号仅在严格需要分隔变量时才使用，否则假定为隐式乘法运算。\n\n首先，让我们获取被附加了数字签名的数据。在这种情况下，它是应用于交易的 `SHA-256`\
  \ 哈希。\n\n你将此值除以 `s`（数字签名的核心部分）并乘以 `G`（生成点），如下所示：\n\n```\nu1 = (x1; y1) = (h(msg)\
  \ s-1 mod n) G\n```\n\n然后你找到点 1（见图 3-9）。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig9_HTML.jpg](img/520777_1_En_3_Fig9_HTML.jpg)\n\
  \n**图 3-9** 点 1 的图形表示示例\n\n然后你将 `r` 除以 `s` 并乘以 `< < publickey > >`：\n\n```\nu2 =\
  \ (x2; y2) = (r s-1 mod n) pubKey\n```\n\n然后你得到点 2（见图 3-10）。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig10_HTML.jpg](img/520777_1_En_3_Fig10_HTML.jpg)\n\
  \n**图 3-10** 点 2 的图形表示示例\n\n最后，将这两点相加，你会得到椭圆曲线上的第三个点（见图 3-11）。\n\n```\nRv = (xv;\
  \ yv) = u1 + u2\n```\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig11_HTML.jpg](img/520777_1_En_3_Fig11_HTML.jpg)\n\
  \n**图 3-11** 点 1 与点 2 之和的图形表示示例\n\n如果椭圆曲线上获得的这个点 `Rv = (xv; yv)` 的值 `c = xv mod\
  \ n` 等于 `r`，即 `c == 初始 r`，那么就证明了该数字签名是使用与公钥关联的私钥创建的。\n\n\n#### 3.3.4.2 理解 ECDSA\
  \ 签名/验证的数学原理\n\nECDSA 签名的描述很简单：\n\n请注意，签名过程通过椭圆曲线的变换，使用私钥 `privKey` 对随机点 `R`（仅用\
  \ X 坐标表示，即 `r = randomPart = xr mod n`）进行编码。然后，它将消息 `h(msg)` 的哈希编码为一个数字签名 `sign`，这证明了签名者知晓私钥\
  \ `privKey`。由于 ECDLP 问题的复杂性，签名（`randomPart`, `sign`）可能会泄露私钥。\n\n验证签名时，使用公钥 `pubKey`\
  \ 和消息哈希 `h(msg)` 对证明数字 `sign` 进行编码。然后恢复出用于创建签名的原始点 `R`，称为 `Rv`。接着，比较检索到的 `Rv` 的\
  \ `X` 坐标（`xv mod n`）与签名中的 `r = randomPart` 值。\n\n那么，所描述的签名和验证方案是如何工作的呢？我们首先考虑验证过程，然后是推导\
  \ `Rv` 的方程。接着，我们将方程写成扩展形式。\n\n`Rv = (xv; yv) = h(msg) s⁻¹ (mod n) G + r s⁻¹ (mod\
  \ n) pubKey`\n\n将 `pubKey` 替换为 `privKey G`：\n\n`Rv = (xv; yv) = h(msg) s⁻¹ (mod\
  \ n) G + r s⁻¹ (mod n) privKey G`\n\n提取公因子 `G` 和 `s⁻¹ (mod n)`，得到：\n\n`Rv = (xv;\
  \ yv) = (h(msg) + r privKey) s⁻¹ (mod n) G`\n\n我们知道：\n\n`s⁻¹ (mod n) = (k⁻¹ (h(msg)\
  \ + r privKey))⁻¹ (mod n)`\n\n因此：\n\n`s⁻¹ (mod n) = k (h(msg) + r privKey)⁻¹ (mod\
  \ n)`\n\n将其代入 `Rv` 的方程：\n\n`Rv = (h(msg) + r privKey) k (h(msg) + r privKey)⁻¹ (mod\
  \ n) G = k G`\n\n最后一步是比较点 `Rv` 与点 `R`。点 `R` 由 `privKey` 编码。该算法会比较 `Rv` 的 `X` 坐标与\
  \ `R` 的 `X` 坐标（其中 `R = (xr; yr)` 且 `r = randomPart = xr mod n`）。更精确地说，如果给定 `c =\
  \ xv mod n`，且 `c == r`，则签名被认为是有效的。\n\n图 3-12 从高层次说明了比特币交易中的数字签名是如何工作的。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig12_HTML.jpg](img/520777_1_En_3_Fig12_HTML.jpg)\n\
  \n图 3-12\n\n交易与数字签名\n\n## 3.4 交易\n\n交易是比特币区块链中最基本的组成部分。交易经过验证后被发送出去。许多交易组合在一起形成一个区块。此外，通过数字数据链接形成一条区块链。^(³)\n\
  \n为了选择下一个要添加到链上的区块，区块会经过一个共识过程。被选中的区块会经过验证并被添加到现有的链上。\n\n矿工是执行验证和共识过程的特殊对等节点。需要明确的是，它们并非特殊或强大的机器，而是运行着区块链协议特定软件的计算机。让我们来看一下单个比特币交易的具体细节。\n\
  \n### 3.4.1 未花费交易输出（UTXO）\n\n未花费交易输出（UTXO）是比特币网络中的一个基本概念。UTXO 是与某个特定用户相关联的一组比特币。它们只能在交易中被完整花费。一个用户可以拥有零个、一个或多个\
  \ UTXO。显然，一旦用户使用某个 UTXO 完成了一笔交易，其他用户就不能再使用它。与某个用户关联的 UTXO 之和就是该用户的总余额。\n\n换句话说，比特币以\
  \ UTXO 的形式存储与交易和用户余额相关的数据。UTXO 是发送给用户且该用户可能可以花费的“未花费”比特币数量。\n\n网络中所有 UTXO 的集合构成了比特币区块链的状态。一笔比特币交易由输入和输出组成。\n\
  \n一笔交易以一个或多个 UTXO 作为输入，并根据发送方发起的请求，生成一个或多个 UTXO 作为输出，以支付交易请求指定的金额。因此，未花费交易输出是用户接收并可以在以后花费的交易结果。\n\
  \n例如，假设 John 有一个价值 10 比特币的 UTXO 和另一个价值 5 比特币的 UTXO，他想发送 8 比特币给 Sara（Sara 的钱包中没有\
  \ UTXO）。John 可以创建一笔交易，指定要支付给 Sara 的金额，并将 10 比特币的 UTXO 作为交易输入。\n\n因此，这笔交易将如下所示：\n\
  \n- **输入：** 10 比特币 Mario UTXO\n- **输出：**\n    - 一个与 Sara 关联的 8 比特币 UTXO\n    - 一个与\
  \ Mario 关联的 2 比特币 UTXO（交易的找零）\n\n因此，一旦交易被记录，Mario 的钱包中将有一个 5 比特币的 UTXO 和一个 2 比特币的\
  \ UTXO，总余额为 7 比特币。Sara 将拥有一个 8 比特币的 UTXO，总余额为 8 比特币。UTXO 的结构非常简单。（见图 3-13。）\n\n\
  有两种脚本：锁定脚本和解锁脚本。根据该术语的定义，以及解锁所有权是转移 UTXO 的第一步，输入值包含术语*解锁脚本*。另一方面，输出值由于锁定过程将是*锁定脚本*。“脚本”一词意为“栈结构”，但我们将关注其方法而非定义。\n\
  \n交易输出 UTXO 具有以下结构（见图 3-13）。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig13_HTML.jpg](img/520777_1_En_3_Fig13_HTML.jpg)\n\
  \n图 3-13\n\nUTXO 结构\n\n### 3.4.2 输入与输出 (I&O)\n\n这指的是“列出”交易的收入来源（输入）和支出（输出）的概念，而不是通过设置输入和输出结果来转移资金的概念。也就是说，当你支付金额时，你首先说明你想要花费的\
  \ UTXO 的收入来源，然后说明你想要在输出项上投资的金额。让我们先看看输出的结构。（见图 3-14。）\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig15_HTML.jpg](img/520777_1_En_3_Fig15_HTML.jpg)\n\
  \n图 3-15\n\nUTXO 描述\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig14_HTML.jpg](img/520777_1_En_3_Fig14_HTML.jpg)\n\
  \n图 3-14\n\n输入与输出\n\n当创建一笔用于转账的交易时，交易输入必须指定将使用哪个 UTXO。简单来说，交易的输入是指向 UTXO 的指针。它们定义了一个特定的\
  \ UTXO，该 UTXO 与交易的哈希值和交易输出的索引号相关。为了输出 UTXO，交易输入还包含一个解锁脚本，该脚本满足 UTXO 给定的输出条件（见图 3-15\
  \ 和 3-16）。解锁脚本通常是一个签名，用于验证区块脚本中标识的比特币地址属于所有者。\n\n因此，一笔交易的 UTXO 输入结构如图 3-16 所示。\n\
  \n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig16_HTML.jpg](img/520777_1_En_3_Fig16_HTML.jpg)\n\
  \n图 3-16\n\nUTXO 描述\n\n这种交易输入和输出的结构引出了如图 3-17 所示的交易链接设计。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig17_HTML.jpg](img/520777_1_En_3_Fig17_HTML.jpg)\n\
  \n图 3-17\n\n比特币交易输入与输出\n\n\n### 3.4.3 支付到公钥哈希（P2PKH）\n\n在了解了交易如何发生的高级描述之后，本节将介绍其技术和结构细节，以理解其实现方式。\n\
  \n`P2PKH`（支付到公钥哈希）是一种用于完成比特币交易或向某人发送资金的脚本模板。它是最常用的脚本，用于将输出锁定在某人的公钥上。它确保只有 UTXO 的受益人，或拥有私钥（从而拥有与\
  \ UTXO 的比特币受益人地址相关的公钥）的人，才能花费它。\n\n为了更深入地理解，让我们先分析交易过程的输出部分，暂时忽略输入的细节。然后，我们将讨论该过程的输入方面，并深入探讨检查两部分组合的流程。\n\
  \n### 3.4.4 观察输出方\n\n假设马里奥想向萨拉发送 20 个比特币。因此，萨拉必须生成一个与之关联的公钥/私钥对。然后，萨拉将向马里奥提供她的比特币地址（请参阅“比特币地址”一节）。\n\
  \n该地址可以通过任何方式传输，包括以单向方式传输，从而停止发送方和接收方之间的通信，并且可以进一步编码为不同的格式，例如包含`Bitcoin:` URI 的二维码。\n\
  \n然后，交易的花费者马里奥将收到萨拉的比特币地址，并可以将其指定为交易的受益人/收款人。这将用于创建交易的 UTXO 锁定脚本，以确保只有萨拉，或者任何能够证明拥有与萨拉提供的比特币地址相关的公钥所对应的私钥的人，才能花费它。\n\
  \n然后，马里奥将广播该交易。一旦交易被验证、添加到区块并达成共识，它将成为比特币区块链的一部分。\n\n因此，网络将其归类为未花费交易输出（UTXO），萨拉的钱包软件将其显示为可花费余额。换句话说，萨拉现在钱包里有一个从马里奥那里收到的\
  \ 20 比特币的 UTXO。\n\n因此，在每个 UTXO 中都有一个`PubKey`脚本，该脚本将 UTXO 的使用权限锁定给受益人，或任何拥有私钥的人。然后在交易验证过程中使用它。其结构如图\
  \ 3-18 所示。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig18_HTML.jpg](img/520777_1_En_3_Fig18_HTML.jpg)\n\
  \n**图 3-18** PubKey 脚本结构\n\n以`OP`开头的字段表示一个操作，其他字段表示一个值。\n\n- `OP_DUP`：执行复制操作；用于复制`scriptSig`（稍后会看到）中存在的公钥，将对其应用哈希函数，以将获得的结果与此`scriptPubKey`中的`pubKeyHash`进行比较。\n\
  - `OP_HASH160`：首先对复制的`scriptSig`中的公钥应用 SHA-256 哈希函数，然后应用`RIPEMD160`。\n- `PubKeyHash`：公钥哈希；来自对提供给发送方的比特币地址进行解码。\n\
  - `OP_EQUALVERIFY`：验证两个公钥哈希（一个来自`scriptSig`中的完整公钥，另一个来自此`PubKey`脚本）是否相同的操作。如果相同则返回`True`，不同则返回`False`。\n\
  - `OP_CHECKSIG`：此操作因此在脚本上执行。“根据公钥`<pubKey>`检查签名`<sig>`”。如果用于公钥的签名是使用所有必需的签名数据生成的，则`OP_CHECKSIG`返回`True`。\n\
  \n为了能够花费这个 UTXO，需要一个已解决的脚本。要解决此脚本，然后使用该 UTXO 进行交易，您必须证明您拥有与 UTXO 发送到的比特币地址相关的私钥和公钥。\n\
  \n### 3.4.5 观察输入方\n\n让我们从花费者的角度来看看创建交易的过程是如何进行的。假设萨拉想向法比奥发送 20 个比特币。一旦法比奥向萨拉提供了比特币地址，萨拉就会将其与金额一起作为交易的受益人输入。\n\
  \n法比奥提供的比特币地址也将用于`PubKey`脚本，该脚本将允许他专有地将交易输出花费给相关私钥的所有者。\n\n然后，萨拉将填写交易输入，对于每个 UTXO，她必须定位并解锁图\
  \ 3-19 所示的信息。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig19_HTML.jpg](img/520777_1_En_3_Fig19_HTML.jpg)\n\
  \n**图 3-19** 脚本结构 `Sig`\n\n### 3.4.6 验证流程\n\n所使用的语言`Script`是基于栈的，并且允许有限的操作，以避免代码中出现循环而导致执行问题。由于其低复杂性和可预测的执行时间，这些语言被认为是非图灵完备的语言。栈是一种类似于一叠扑克牌的数据结构。\n\
  \n有两种可用的操作：压入和弹出。压入是将一张牌放在牌堆顶部，而弹出则是将其移除。在这种情况下，牌就是数据。任何想向某人汇款的人都必须证明他们确实拥有该币。输入的`scriptSig`和所引用输出的`scriptPubKey`被合并并评估。\n\
  \n最初，输入到`Sig`脚本中的数据被添加到交易输入的栈中（因此，先是`sig`，然后是`pubKey`）。\n\n该脚本从栈中提取公钥，该公钥与`scriptSig`中的`pubKey`一致，并对其应用哈希：先是\
  \ SHA-256，然后是`RIPEMD160`。然后，它将结果与`PubKey`脚本中的公钥哈希进行比较。如果成功，则继续验证数字签名；否则，交易被拒绝。\n\
  \n因此，如果用于公钥的签名是使用所有需要签名的数据生成的，那么交易就是有效的。\n\n您可以通过图 3-20 到 3-26 中的图表更详细地看到这些操作。\n\
  \n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig26_HTML.jpg](img/520777_1_En_3_Fig26_HTML.jpg)\n\
  \n**图 3-26** 交易验证流程，步骤 7\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig25_HTML.jpg](img/520777_1_En_3_Fig25_HTML.jpg)\n\
  \n**图 3-25** 交易验证流程，步骤 6\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig24_HTML.jpg](img/520777_1_En_3_Fig24_HTML.jpg)\n\
  \n**图 3-24** 交易验证流程，步骤 5\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig23_HTML.jpg](img/520777_1_En_3_Fig23_HTML.jpg)\n\
  \n**图 3-23** 交易验证流程，步骤 4\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig22_HTML.jpg](img/520777_1_En_3_Fig22_HTML.jpg)\n\
  \n**图 3-22** 交易验证流程，步骤 3\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig21_HTML.jpg](img/520777_1_En_3_Fig21_HTML.jpg)\n\
  \n**图 3-21** 交易验证流程，步骤 2\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig20_HTML.jpg](img/520777_1_En_3_Fig20_HTML.jpg)\n\
  \n**图 3-20** 交易验证流程，步骤 1\n\n因此，如果在评估了`scriptsig`和`scriptPubKey`之后，栈顶不是`False`，那么交易就是有效的。\n\
  \n事实上，交易的完整验证过程，除了对于接收它的每个节点是独立的之外，还包括您稍后会看到的其他步骤和检查。\n\n\n\n### 3.4.7 交易结构\n\n\
  了解了操作过程并分析了基本组成部分之后，现在你将学习交易是如何构成的。（见图 3-27）。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig27_HTML.jpg](img/520777_1_En_3_Fig27_HTML.jpg)\n\
  \n图 3-27\n\n交易结构\n\n`Locktime` 变量是一个有趣的变量。它定义了交易可以首次被添加到区块链的时间。在大多数交易中，它被设置为 0，表示立即执行。\n\
  \n如果区块时间大于 0 但小于 400 毫秒，则被视为区块高度，这意味着交易直到达到该区块高度时才会被包含在区块链中。如果它超过 400 毫秒，则被解释为 *UNIX\
  \ 时间戳*，并且在所需时间之前，交易不会被包含在区块链中。`Locktime` 类似于远期支票。\n\n### 3.4.8 交易费用\n\n通过为每笔交易收取少量费用，交易费用既作为一种激励，促使交易被包含在下一个区块中，也作为一种威慑，防止“垃圾邮件”交易或其他形式的系统滥用。\n\
  \n挖掘该区块并将交易存储到区块链中的矿工收取交易费用。而且，与比特币交易的金额不同，交易费用是根据交易的大小（以字节为单位）计算的。\n\n*   请注意，比特币区块的大小限制为\
  \ 1MB（1,000,000 字节）。\n\n*   交易数据会占用区块中的空间。\n\n因此，当矿工填满一个交易区块时，他们会希望最大化自己能够收取的费用。他们通过选择那些为它们所占用的区块空间提供最多佣金（手续费）的交易来实现这一点。因此，在处理交易费用的价值时，重要的衡量标准是每字节的佣金。矿工根据多种因素对交易进行优先级排序，在某些情况下，他们甚至可能免费处理交易。\n\
  \n由于交易费用影响处理优先级，带有佣金的交易更有可能被包含在下一个被挖掘出的区块中，而佣金不足或没有佣金的交易可能会被推迟处理。\n\n在大多数情况下，交易费用并非必需，没有费用的交易也可能稍后被处理；然而，包含交易费用可以鼓励优先处理。交易数据结构中也缺少一个费用字段。\n\
  \n费用是隐含存在的，即作为输入总额与输出总额之间的差额。\n\n丢失比特币的风险很小，因为大多数钱包会自动计算并处理交易费用。但是，如果交易是通过编程方式或通过命令行创建的，则必须手动输入并核算费用。\n\
  \n从所有输入中扣除所有支出后剩余的任何超出的金额，就是矿工收取的佣金。\n\n因此，如果你不想损失比特币，为你的钱包指定交易中 UTXO（未花费交易输出）的找零也很重要。\n\
  \n## 3.5 交易流程\n\n一旦产生了一笔新交易，它就会被转发到比特币网络附近的节点，以便在整个网络中传播。\n\n然而，每个收到交易的比特币节点在将其发送给邻居之前，都会先对其进行验证。只有合法的交易才会在网络中传播，无效的交易会被第一个遇到它的节点丢弃。\n\
  \n如果传输的交易是合法的，该节点会将其转发给它所连接的其他节点，并同步地向发送方返回一条成功消息。如果交易无效，节点将拒绝它，并向发送方发送一条同步的拒绝消息。\n\
  \n因此，无效交易将被拒绝，而有效的交易则会通过网络传播，并形成*交易池*。交易池是已通过验证、等待被确认并添加到新区块中的交易的集合。\n\n因此，它充当了新交易的等待区域。\n\
  \n为了生成新区块，矿工从交易池中选择交易。这个新区块被称为*候选区块*。然后，每个矿工都试图通过挖矿过程将他们的候选区块添加到区块链中。\n\n假设当一个 UTXO\
  \ 被花费时，交易 A 是交易 B 的子交易。交易 A 依赖于父交易（B）的输出 UTXO。交易在网络中广播时并不总是按相同的顺序到达。\n\n子交易有可能先于父交易到达。在这种情况下，首次看到该子交易的节点可能会注意到它属于一个未知的父交易。节点不会拒绝它，而是将其放入一个临时池中，等待父交易到达，之后再将子交易传递给所有其他节点。\n\
  \n孤儿交易池，也称为孤立交易池，是一个存放无父交易的池。一旦父交易到达，所有引用了该父交易 UTXO 的孤儿交易都会从池中被释放出来，并递归地重新验证，从而使完整的交易链能够被包含在交易池中，等待被拉入区块。\n\
  \n孤儿池的滞留机制确保了本来可以接受的交易不会仅仅因为其父交易迟到而被拒绝，并且无论到达顺序如何，归属链最终都能以正确的顺序重建。交易链可以是你想要的任意长度。每个节点都会根据一长串标准来检查它收到的每一笔交易。以下是基本的验证标准：\n\
  \n*   交易的语法和数据结构必须正确。\n\n*   输入或输出列表都不能为空。\n\n*   `MAX BLOCK SIZE`（最大区块大小）大于交易的字节大小。\n\
  \n*   对于每个输入，其引用的输出必须存在且未被花费（以防止双重支付）。\n\n*   如果池中任何其他交易的任何输入存在被引用的输出，则该交易必须被取消（以防止双重支付）。\n\
  \n*   为了找到每个输入所引用的输出交易，扫描主链和交易池。请注意，如果任何输入缺少对应的输出交易，则该交易将成为孤儿交易。如果交易匹配项尚未在池中，则将其添加到孤儿交易池。\n\
  \n每个输入的解锁脚本必须与相应的输出锁定脚本进行比较。这些是最重要的验证规则，由每个接收交易的节点执行。此列表可能会根据更新的协议而变化。（见图 3-28）。\n\
  \n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig28_HTML.jpg](img/520777_1_En_3_Fig28_HTML.jpg)\n\
  \n图 3-28\n\n交易的生命周期\n\n\n\n## 3.6 区块\n\n区块链的数据结构是一个有序列表，其中包含交易区块的反向链接。区块链可以保存为简单的数据库或平面文件。区块链的元数据由比特币核心客户端存储在谷歌的\
  \ LevelDB 数据库中。^(⁴)\n\n区块以“向后”的方式连接，每个区块都引用链中它之前的区块。\n\n区块链中的每个区块都由其头部通过 SHA-256\
  \ 加密哈希技术生成的哈希值来标识。此外，每个区块在其头部中使用前一个区块的哈希字段来引用其父区块，即前一个区块。\n\n换句话说，每个区块的头部都包含其父区块的哈希值。这个将每个区块与其父区块连接起来的哈希序列，一直追溯到被称为*创世区块*的第一个区块，形成了一条链条。\n\
  \n一个区块只有一个父区块，但可以在任何时候有多个子区块。每个子区块都引用同一个父区块，并且前一个区块的 `hash` 字段包含相同的哈希值（父区块）。在区块链分叉期间——这是一种多个矿工几乎同时挖出多个区块的临时状态——会出现更多的子区块。\n\
  \n最终，“分叉”被纠正，只有一个子区块成为区块链的一部分。尽管一个区块可以有多个子区块，但它只能有一个父区块。这是由于区块的单个字段 `previous block\
  \ hash` 引用了其唯一的父区块。\n\n前一个区块的哈希位于区块及其头部中，其后是当前区块的哈希。\n\n请记住，当父区块的身份发生变化时，子区块的身份也会随之改变。如果父区块以任何方式被修改，其哈希值就会改变。因此，父区块修改后的哈希值要求子区块的指针\
  \ `pre-block hash` 也发生改变。这又改变了子区块的哈希值，进而改变了侄区块的 `preceding block hash` 字段以及侄区块本身的哈希值，依此类推，直至链中的最后一个区块。\n\
  \n由于这种级联效应，一个拥有众多后续区块的区块，在不重新计算所有后续区块的情况下是无法被篡改的。\n\n由于这种重新计算需要巨大的计算能力，因此一条长链的存在造就了区块链深厚的历史，这也是比特币的一个重要安全要素。前六个区块被视为对第七个区块的确认。\n\
  \n随着你对区块链技术的深入了解，你会发现区块变得越来越难以更改。最终，区块是一种数据结构，它包含了一组上传到区块链的交易。\n\n### 3.6.1 区块的结构\n\
  \n区块由一个包含元数据或模型的头部组成，其后面跟着一系列交易，这些交易占据了区块的大部分空间。一个区块的平均大小被设置为 1MB。区块头部长度为 80 字节，而平均每笔交易至少为\
  \ 250 字节。（见图 3-29。）\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig29_HTML.jpg](img/520777_1_En_3_Fig29_HTML.jpg)\n\
  \n图 3-29\n\n区块的结构\n\n### 3.6.2 区块头部\n\n区块头部包含三组区块元数据：\n\n*   指向前一个区块哈希的引用，将此区块连接到区块链的前一个区块。\n\
  *   术语“目标”、“随机数”和“时间戳”均与比特币挖矿相关。\n*   市场根（市场根应为默克尔根）是默克尔树的根，用于高效且安全地汇总区块中的交易。\n\n\
  默克尔树是一种树形结构。借助默克尔树，一个节点只需下载少量区块头部（每个区块 80 字节），就能检测到某笔交易是否包含在某个区块中。它通过从全节点恢复一条小的默克尔路径来实现这一点，而无需存储或扩展大部分区块链（其大小可达数\
  \ GB）。\n\nSPV 节点（简单支付验证节点）是不保留完整区块链并使用默克尔路径来验证交易而无需下载完整区块的节点。SPV 节点经常使用默克尔树。SPV\
  \ 节点只下载区块头部，不保存完整的交易数据，也不下载所有区块。\n\n它们使用认证或默克尔路径来检查某笔交易是否包含在某个区块中，而无需下载该区块的所有交易。区块头部的详细结构如图\
  \ 3-30 中的表格所示。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig30_HTML.jpg](img/520777_1_En_3_Fig30_HTML.jpg)\n\
  \n图 3-30\n\n区块头部详情\n\n图 3-31 展示了比特币区块链区块结构的图形示例。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig31_HTML.jpg](img/520777_1_En_3_Fig31_HTML.jpg)\n\
  \n图 3-31\n\n比特币区块链结构\n\n正如你所见，无论是通过网络广播还是存储在区块链中，区块哈希都不包含在区块的结构化数据中。\n\n相反，当网络收到一个区块时，每个节点都会计算该区块的哈希值。区块高度，即其在区块链中的位置，是识别区块的第二种方式。因此，一个区块可以通过两种方式识别：查看其哈希值或查看其高度。\n\
  \n每个连续放置在区块链“第一个”区块“之上”的区块，其位置都“更高”一个单位，就像盒子堆叠在一起一样。\n\n认识到区块高度并非像区块哈希那样的唯一标识符至关重要。区块高度并不总是意味着唯一的一个区块。正如你将看到的，两个或更多具有相同高度的区块可能会竞争区块链中的同一个位置。区块的数据结构不包含区块高度，它不保存在区块中。\n\
  \n当比特币网络收到一个区块时，每个节点都会动态地确定其在区块链中的位置（高度）。\n\n## 3.7 中本聪共识\n\n此外，所有传统的支付系统都依赖于对中央权威机构的信任，该机构管理交易并因此管理账本。\n\
  \n比特币没有中央权威机构，但每个全节点都拥有一份区块链的副本，以及一个你可以信赖作为记录的公共账本。区块链并非由中央权威机构建立，而是由每个网络节点独立工作构建而成。利用网络上提供的信息，网络的每个节点都能得出相同的结论，并组装出相同的账本副本。\n\
  \n这种通过*涌现共识*实现的去中心化技术，是中本聪的关键发明。\n\n之所以称为涌现共识，是因为它并非明确达成。没有产生共识的选举。相反，共识是数百个独立节点在简单规则和条例下异步交互而产生的涌现结果。\n\
  \n网络上节点独立运行的四个过程的相互作用，产生了比特币的去中心化共识：\n\n*   每个全节点使用一套详尽的标准独立验证每一笔交易。\n*   挖矿节点将这些交易自主分组到新块中，并通过工作量证明算法进行经过证明的计算。\n\
  *   每个节点在将新区块添加到区块链之前，都独立验证这些新区块。\n*   每个节点独立选择更长的工作量证明链（即被证明具有比短链更高的计算能力）。\n\n\n\
  \n### 3.7.1 `矿工节点`\n\n某些节点是特殊节点，称为挖矿节点或*矿工节点*。它们负责创建新区块并将其注册到账本中。这些节点相互竞争，以将新区块添加到区块链上。\n\
  \n它们之所以相互竞争，是因为谁能成功赢得区块并将其添加到链上，就能获得比特币奖励，作为对其为比特币网络共识做出贡献的激励。\n\n为了形成新区块，矿工从交易池中选择交易，从而获得一个待注册到账本的候选区块。在选择交易时，矿工会应用一种交易属性度量标准，优先处理那些输入中包含更久远`UTXO`且金额更高的交易，而非那些较新且金额较小的交易。换句话说，给定一笔交易`Tx`。设`N`为其输入的`UTXO`数量，对于每个输入`UTXO\
  \ i`。我们将`Tx`的优先级定义如下：\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Figa_HTML.gif](img/520777_1_En_3_Figa_HTML.gif)\n\
  \n同时，它们会赋予每千字节手续费更高的交易更大的权重，而不是手续费较低的交易。\n\n比特币区块的平均大小设定为 1MB。因此，矿工会尝试选择一系列交易，在遵循优先级（根据时效和金额）以及最大区块大小的前提下，使其获得更高的收入。\n\
  \n因此，交易手续费通常根据交易的规模来评估。\n\n### 3.7.2 `Coinbase 交易`\n\n添加到区块中的第一笔交易是一种独一无二的交易，与常规交易不同。它被称为`Coinbase\
  \ 交易`。\n\n这笔交易允许挖出区块的矿工获得以下奖励：\n\n-   因参与并贡献于添加新区块的共识过程而获得的激励。\n-   其添加到区块中的所有交易的手续费总和。\n\
  \n显然，这笔交易的受益比特币地址就是挖出该区块的矿工的地址。每笔交易的输入总值与输出总值之间的差额用于计算总手续费。也就是说：\n\n-   设`N`为输入总数，`I`为每个输入的索引，`Vi`为输入`i`的金额。\n\
  -   设`M`为输出总数，`O`为每个输出的索引，`Vo`为输出的金额。那么：\n\n![$$ \\mathrm{手续费总计}=\\sum \\limits_{\\\
  mathrm{i}=1}^{\\mathrm{N}}{V}_i-\\sum \\limits_{\\mathrm{o}=1}^{\\mathrm{M}}{V}_o\
  \ $$](img/520777_1_En_3_Chapter_TeX_Equ2.png)\n(3.2)\n\n相反，矿工奖励最初为 50 个比特币，之后每 210,000\
  \ 个区块减半一次。这意味着比特币在每个区块的构建过程中，以既定且递减的速率被“铸造”出来。每十分钟形成一个新区块，其中包含一个从零开始新创建的比特币。每 210,000\
  \ 个区块（大约每四年），货币发行率会降低 50%。在网络运行的头四年里，每个区块包含 50 个新比特币。^(⁵)\n\n奖励基于区块高度，初始值为每个区块 50\
  \ 个比特币，每 210,000 个区块减半。由于该区块的高度为 277,316，因此当前正确的奖励是 25 个比特币。\n\n该计算过程可以在比特币核心客户端的\
  \ `GetBlockValue` 函数中看到，如代码清单 3-1 所示。\n\n```\nint64_t GetBlockValue(int nHeight,\
  \ int64_t nFees)\n{\n    int64_t nSubsidy = 50 * COIN;\n    int halvings = nHeight\
  \ / Params().SubsidyHalvingInterval();\n    if (halvings >= 64)\n        return\
  \ nFees;\n    // 每 210,000 个区块（大约每 4 年），区块奖励减半。\n    nSubsidy >>= halvings;\n  \
  \  return nSubsidy + nFees;\n}\n代码清单 3-1\nGetBlockValue 函数\n```\n\n### 3.7.3 构建区块头\n\
  \n在从交易池和`Coinbase 交易`中计算出交易后，矿工会继续构建区块头，以生成候选区块。接下来将执行以下步骤：\n\n1.  指明区块的版本号，该版本号说明了区块的架构。\n\
  2.  添加其接受的父区块的哈希值。\n3.  将 Merkle 树根值加入计算。因此，在对每笔交易计算 SHA-256 哈希值后，将这些哈希值成对合并，形成树的每一层，直到所有交易都被汇总到树“根”的一个节点中。结果，Merkle\
  \ 树根将*所有交易*存储在一个 32 字节的值中。\n4.  添加以 Unix 纪元格式表示的时间戳，该时间戳对应区块创建的当前时间。\n5.  通过填充难度目标，定义使区块成为合法区块所需的工作量证明难度。\n\
  6.  最后一个字段是随机数，初始化为 0。\n\n此时，区块头的所有其他字段都已填充完毕，挖矿操作可以开始。现在的目标是找到一个随机数值，使得区块头的哈希值低于难度目标。\n\
  \n### 3.7.4 难度目标\n\n目标值在挖矿中使用。它是一个数字（以十六进制表示），区块哈希值必须小于等于该数字，该区块才能被添加到账本中。\n\n目标值每\
  \ 2016 个区块（大约两周）调整一次，以确保区块平均每十分钟被挖出一个。\n\n`工作量证明`的复杂度由移动平均值决定，该平均值旨在使每小时的平均区块数适应硬件速度的持续提升以及节点运行兴趣随时间的变化。如果区块生成过快，难度就会增加。\n\
  \n目标值由网络中的每个节点独立计算，但需遵循比特币协议规则。\n\n规则规定，每 2,016 个区块后，所有节点自动重新调整`工作量证明`的难度。重新调整难度的计算会将寻找剩余\
  \ 2,016 个区块所花费的实际时间与预期的 20,160 分钟（基于每十分钟生成一个区块的目标，相当于两周）进行比较。\n\n然后计算实际时间与预期时间的比率，并据此对难度进行调整。如果网络发现区块的速度快于每十分钟一个，难度就会上升。如果发现区块的速度慢于预期，难度就会下降。\n\
  \n设 `RecentBlockTime` 为表示寻找最新 2016 个区块所花费时间的变量。计算*难度目标*的公式为：\n\n![$$ \\mathrm{新难度目标}\
  \ = \\mathrm{旧目标} \\ast \\left( \\frac{\\mathrm{最近区块时间}}{20160} \\right) $$](img/520777_1_En_3_Chapter_TeX_Equ3.png)\n\
  (3.3)\n\n每个周期的调整必须小于 4 倍，以避免难度目标出现显著波动。\n\n如果所需的难度调整超过 4 倍，则将其限制在允许的最大值内。\n\n所有剩余的修改将在下一个周期进行。由于每个节点都遵循相同的共识规则，并且所有区块都相同，因此它们都将得出相同的难度值。\n\
  \n如果一个节点错误计算了目标值（或对此说谎），并基于该值生成了一个区块，网络中的其他节点将拒绝该区块，因为它不符合目标值的要求，并且投入在该区块挖掘上的所有工作都将白费。\n\
  \n\n\n### 3.7.5 工作量证明\n\n一旦矿工节点生成了一个候选区块，该区块必须由节点的硬件平台进行提取。它必须解决工作量证明算法，以使该区块有效。比特币挖矿过程中使用了`SHA-256`哈希函数。\n\
  \n简单来说，*挖矿*就是通过反复修改`nonce`参数来对区块头进行哈希处理的过程，直到生成的哈希值不匹配特定的目标。哈希函数的结果无法提前预测，也无法生成产生特定哈希值的模式。哈希函数具有此特性，这意味着达到与特定目标相匹配的哈希结果的唯一方法是重复输入，直到随机出现所需的哈希结果。^(⁶)\n\
  \n因此，我们必须明白，矿工会计算此区块头的哈希值，以判断其是否小于当前目标。如果哈希值不小于目标，矿工就会增加`nonce`（通常加一）并再次尝试。“在比特币网络当前的难度级别下，矿工必须尝试数百万次才能找到一个`nonce`，使得区块头的哈希值足够低。”\n\
  \n此外，虽然在早期可以用普通家用电脑挖矿，但如今你必须使用专门的昂贵硬件，并通过加入矿池与其他用户共享你的算力。当挖矿节点解决了问题，它会将区块发送给所有相邻节点，以便其在网络中传播、被验证，并最终添加到账本中。\n\
  \n### 3.7.6 验证新区块\n\n在区块链上达成共识的第三步是独立验证，由每个接收到新区块的节点执行。\n\n随着新解出的区块在网络中传播，每个节点在将其转发给对等节点之前，会运行一系列测试以确保其有效。因此，只有合法的区块才会在网络中传播。独立验证也确保了诚实的矿工能将自己的区块添加到区块链上并从中获利。\n\
  \n那些行为不诚实的矿工，其区块会被拒绝，不仅无法获得奖励，而且寻找工作量证明解决方案的努力也会付之东流，因此还要承担无法收回的电费成本。\n\n当一个节点收到新区块时，它会将其与必须满足的大量要求集合进行比较以进行验证；否则，该区块会被丢弃。\n\
  \n以下是可以总结的最重要的特征列表：\n\n*   区块的结构和语法正确。\n*   目标值准确。\n*   必须认识到，区块头哈希值比目标难度更低（工作量证明检查）。\n\
  *   区块时间戳的未来时间不超过两小时（容纳时间错误）。\n*   区块大小符合协议的标准。\n*   初始交易是币基交易。\n*   其中包含的交易是有效的（使用交易流程中概述的验证标准重新检查交易）。\n\
  \n因此，独立验证确保了矿工无法作弊。矿工必须根据所有节点共同遵守的共享协议或规则集构建一个完整的区块，并使用适当的工作量证明解决方案来提取它。他们为此消耗大量电力，如果作弊，所有的电力和努力都将白费。因此，不依赖他人的验证是去中心化共识的关键部分。\n\
  \n### 3.7.7 区块链分叉\n\n由于区块链是一种去中心化的数据架构，其不同的副本并非总是一致的。区块可能在不同时间到达不同节点，使节点对区块链产生不同的视角。为了解决这个问题，每个节点都会选择工作量证明最强的区块链，也称为最长链或累积难度最大的链，并尽可能扩展它。\n\
  \n节点可以通过将每个区块中记录的难度相加，来计算用于形成一条链的累计工作量证明总量。\n\n通过让所有节点都选择累积难度最长的链，全球比特币网络最终会收敛到一个一致的状态。\n\
  \n节点管理三组区块：\n\n*   第一组是链接到主区块链的区块。\n*   第二组是那些在已知链中没有已知父块的区块。\n*   第三组是构成主区块链分支的区块（侧链）（孤块）。\n\
  \n当任何一项验证标准失败时，无效区块会被移除或拒绝，并且不会包含在链中。你必须认识到，在任何给定时间，主链就是具有最大或最高累积难度的区块链。\n\n除非有两条等长的链，其中一条有更大量的有效工作量证明，否则这通常就是区块数量最多的链。当发现新区块时，节点会尝试将其整合到当前的区块链中。\n\
  \n节点会检查上一个区块的哈希字段，该字段包含新区块的父块地址。然后，节点会在当前区块链中搜索该父块。在最近的情况下，父块通常是主链的“顶端”，这意味着这个新区块扩展了主链。\n\
  \n此外，新区块有时可能会扩展一条非主链的链。在这种情况下，节点会将新区块连接到侧链上，从而能够比较侧链与主链的难度。\n\n如果侧链的累积难度高于主链，节点就会回退到侧链，使侧链成为新的父链，而原来的主链则变为侧链。\n\
  \n如果收到一个有效的区块，但在当前链中未发现其父块，则该区块被称为*孤块*。孤块会被放入孤块池中，并一直留在那里，直到它们的父块出现。\n\n一旦父块到达或被接收并连接到现有链中，孤块就可以从孤块池中取出并链接到父块上。请记住，孤块通常发生在短时间内挖出的两个区块以相反顺序被接收到时。通过选择难度最高的链，所有节点最终都能达成网络层面的共识。\n\
  \n临时的链变更最终会通过用新的工作量证明扩展现有的一条链来解决。挖矿节点使用它们的算力来“投票”决定下一个要被提取的区块。当它们提取新区块以扩展链时，这个新区块就代表了它们的投票。\n\
  \n## 3.8 总结\n\n当你想到“区块链”这个词时，脑海中应该浮现的主要概念是比特币，你在本章中已经了解了这一点。我通过示例解释了比特币的技术细节、比特币区块链的区块结构以及区块链中的交易流程。要开发区块链应用程序，你必须理解这些基本概念。\n\
  \n下一章将重点介绍以太坊，这是一个基于区块链的软件平台，主要用于支持市值仅次于比特币的全球第二大加密货币。\n\n脚注 1   2   3   4   5  \
  \ 6\n\n\n\n"
- "# 4. 以太坊\n\n比特币区块链模型已被证明是一种适用于加密货币的有效范式，这激发了人们对区块链在各个应用领域的研究和兴趣，并使其日益受到关注。\n\n\
  维塔利克·布特林（Vitalik Buterin）很早就意识到了区块链模型的潜力。他认为其远不止是一个加密货币平台。\n\n对比特币的热情促使他在 17 岁时与米哈伊·阿利西（Mihai\
  \ Alisie）共同创办了*《比特币杂志》*，这是一家涵盖比特币相关话题的网站和印刷杂志。维塔利克很快意识到，区块链技术所能做到的远不止于此。\n\n2013\
  \ 年，他宣称比特币需要一种脚本语言，用于开发和创建*去中心化应用程序*。\n\n在未能说服比特币社区后，他开始基于区块链技术开发一个新的分布式信息平台。于是，以太坊于\
  \ 2015 年 7 月 30 日诞生，并引入了一项名为*智能合约*的新功能。\n\n新一代区块链由此开启，并且至今仍是最为突出的——即区块链 2.0。\n\n\
  请参考图 4-1，其中对比了比特币和以太坊。左侧是比特币，其堆栈顶层是用于进行转账操作的**钱包**应用程序。右侧是以太坊，它将区块链转变为一个计算系统框架或架构，并在去中心化领域开启了一个充满机遇的全新世界。注意，以太坊支持智能合约以及运行这些合约的以太坊虚拟机（EVM）。而智能合约则进一步实现了超越单纯价值转移的去中心化应用程序。通过这种方式，区块链被注入了逻辑和计算能力。\n\
  \n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig1_HTML.jpg](img/520777_1_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1\n比特币与以太坊堆栈对比\n\n以太坊用户不仅可以通过交易转移数字货币，还能开发智能合约，从而在特定条件下执行交易。从各方面来看，他们可以为价值转移的方式设定条件。可以理解，“可编程货币”的理念吸引了世界各地的用户、开发者和公司。\n\
  \n此外，开发者还可以实现并创建在以太坊区块链分布式网络中运行的应用程序，即去中心化应用程序。\n\n有了以太坊，区块链成为一个去中心化的 IT 平台。在此平台上，除了转移数字货币，还可以分发新的应用程序，并与网络中的其他用户进行交互。\n\
  \n任何人都可以编写新的应用程序在区块链网络上运行，而非在中心化服务器上。这不仅意味着可以规避任何来自中央权威的审查，而且还能抵御篡改，并允许所有用户在与应用程序交互之前检查其代码。\n\
  \n借助以太坊，区块链的应用范围当然不局限于金融领域；它还可以应用于选举系统、域名注册、众筹平台和知识产权等领域，仅举几例。\n\n简而言之，以太坊是一个具有革命性和远见的项目。它除了被公认为最佳在线投资之一外，还为其年轻的创始人带来了世界声誉。这项发明在\
  \ 2014 年获得了享有盛誉的世界技术奖。\n\n本章将详细介绍定义以太坊区块链的组件和技术。\n\n## 4.1 区块链作为状态转换系统\n\n*以太坊区块链*是一个开源的公共区块链。以太坊实现的模型可以用三个定义来概括：\n\
  \n*   **密码学安全：** 账本中的信息安全由复杂的数学算法和难以破解的密码学技术保证。换句话说，几乎不可能欺骗这个系统。\n\n*   **交易单例机器：**\
  \ 根据其构建范式，系统中存在一个单一的、规范的机器实例，负责处理系统中生成的所有交易。存在着一个所有人都相信的全局真相。\n\n*   **共享状态：** 此机器中存储的状态是共享的，并且所有参与者都可访问。\n\
  \n因此，以太坊区块链的范式是一个密码学安全的、共享状态的交易单例机器。以太坊区块链本质上是一个基于交易的状态机。\n\n状态机是一个由状态和转换组成的图。\n\
  \n*   **状态**描述了一个对象在其生命周期中的某段时间，由顶点或*节点*表示。\n\n*   **转换**连接两个状态，由有向弧表示。\n\n状态的退出定义了对象对事件发生的响应。事件是在时间和空间中发生的某种现象的反复出现。\n\
  \n因此，状态机是一个自动机，它根据一系列输入数据改变其内部状态。（见图 4-2）\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig2_HTML.jpg](img/520777_1_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2\n有限状态机示例\n\n由此，你可以推导出：\n\n*   区块链的状态是账本中所有交易的集合。\n*   区块链中的事件，例如创建一笔交易。\n\
  *   区块链中的交易函数，它接收一个状态和新交易，并生成一个新状态。\n\n所以，令 `S` 为一个状态，`TX` 为一笔交易，`APPLY` 为状态转换函数。它可以被正式定义为：\n\
  \n`APPLY (S; TX) -> S0` 或 `ERROR`\n\n注意，以太坊的状态机从一个创世状态开始，类似于网络中尚未进行任何交易时的空列表。\n\n\
  为了引起从一个状态到另一个状态的转换，交易必须是有效的。当各种交易被执行时，这个创世状态会随时间推移转换到后续状态。（见图 4-3）\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig3_HTML.png](img/520777_1_En_4_Fig3_HTML.png)\n\
  \n图 4-3\n基于交易的状态转换\n\n在任何交汇点，最终状态都代表了以太坊的全局状态。\n\n以太坊的全局状态包含交易。这些交易被分组到区块中。每个区块包含一定数量的交易，并链接到前一个区块。见图\
  \ 4-4\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig4_HTML.png](img/520777_1_En_4_Fig4_HTML.png)\n\
  \n图 4-4\n交易流程\n\n从技术角度来看，总账可以被视为一个状态转换系统。其中存在一个包含所有总账交易的状态，以及一个接收状态和交易并返回新状态的转换函数。\n\
  \n例如，在传统的银行系统中，状态是账户余额表，交易是将 `X` 金额从账户 `A` 转移到账户 `B` 的请求，而状态转换函数则是减少账户 `A` 中的 `X`\
  \ 金额，并增加账户 `B` 中的 `X` 金额。\n\n如果账户 `A` 的余额开始时少于 `X`，那么状态转换函数会报错。令 `TX = 从 Luca 向\
  \ Sara 发送 70`。\n\n`APPLY ((Luca: e50; Sara: e50); TX) = ERROR`\n\n或者，令 `TX = 从 Luca\
  \ 向 Sara 发送 e20`。\n\n`APPLY ((Luca: e50; Sara: e50); TX) = Luca: e30; Sara: e70`\n\
  \n\n\n## 4.2 以太坊账户\n\n在以太坊中，状态是由被称为*账户*的对象累积而成的，这些对象扮演着核心角色。共有两种类型的账户：\n\n- 外部拥有账户（EOA）\n\
  - 合约账户\n\n通常，EOA 是用户账户，由私钥控制，并且没有关联的代码。而合约账户由其合约代码控制，并且有关联的代码。（见图 4-5。）\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig5_HTML.jpg](img/520777_1_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5 — 以太坊账户\n\n### 4.2.1 账户状态\n\n此账户状态由四个元素组成，无论账户类型如何，这些元素都存在：（见图 4-6。）\n\n\
  ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig6_HTML.jpg](img/520777_1_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6 — 以太坊中的账户状态\n\n- **Nonce（仅使用一次的数字）：** 如果账户由外部拥有，此数字表示从该账户地址发送的交易数量。如果账户是合约账户，则\
  \ Nonce 是该账户创建的合约数量。\n- **Balance（余额）：** 这是此地址拥有的`Wei`数量。一个以太币等于`10¹⁸` Wei。\n- **StorageRoot（存储根）：**\
  \ 一棵帕特里夏默克尔树（Merkle Patricia Tree，请参阅第 2 章）根节点的 256 位哈希值。此树编码了该账户的存储账户哈希值，默认为空。对于合约账户，这是智能合约存储。\n\
  - **CodeHash（代码哈希）：** 这是 EVM（以太坊虚拟机）账户的哈希代码。对于合约账户，这是经过哈希并以`codeHash`形式存储的代码。对于外部拥有账户，`codeHash`是空字符串的哈希值。\n\
  \n### 4.2.2 外部拥有账户（EOA）\n\n外部拥有账户：\n\n- 拥有以太币余额。\n- 可以发送交易（它们可以转移资金或激活合约的代码）。\n\
  - 由私钥控制。\n- 没有关联的代码。\n\n请注意，每个账户都由一个密钥对定义——一个私钥和一个公钥。与比特币类似，以太坊也使用 ECDSA（椭圆曲线数字签名算法）。以太坊也使用标准`secp256k1`规定的曲线。\n\
  \n您应该已经了解私钥和相应公钥的工作原理。然而，以太坊在生成*以太坊地址*方面与比特币不同。\n\n这些地址与比特币一样，是从公钥派生出来的。但在此过程中，会应用哈希函数`Keccak\
  \ 256`。从这个函数的结果中，您会得到*公钥哈希值*。从该哈希值中，取最右边的 20 个字节，您将得到以太坊地址。所有以太坊地址都以`0x`前缀开头。\n\n\
  - 账户基于其地址进行索引。\n- 创建外部拥有账户没有成本。\n- EOA 使用交易（或者如您将看到的消息）来与以太坊区块链网络交互。\n- 它们可以发送交易，将数字货币转移到其他外部属性账户。\n\
  - 它们可以向合约账户发送交易以调用智能合约。\n\n### 4.2.3 合约账户\n\n合约账户代表一个智能合约，这意味着：\n\n- 它有一个地址。\n-\
  \ 它有一个以太币余额。\n- 它有关联的代码。\n- 它由关联的代码控制。\n- 代码的执行由从其他账户（EOA 或合约账户）接收的交易或消息（调用）触发/调用。\n\
  - 一旦执行，它将执行任意复杂度的操作（图灵完备），并操作其自己的持久存储；它可以拥有自己的永久状态，并可以调用其他合约。\n\n合约地址是通过对发送方账户地址及其\
  \ nonce 进行 SHA-3 哈希（也称为`Keccak-256`），然后取此结果的最右边 20 个字节生成的。合约账户在创建和使用（执行）时都有成本，因为它们使用计算资源和网络存储。\n\
  \n### 4.2.4 外部拥有账户与合约账户的区别\n\n首先，需要明确的是，要参与以太坊网络，需要一个外部拥有账户。此外，通过以太坊网络发送的任何类型的消息都有成本，因为它会使用计算和存档资源。\n\
  \n这意味着外部拥有账户可以向其他外部拥有账户或创建其他合约的账户发送或传递消息。（见图 4-7。）\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig7_HTML.jpg](img/520777_1_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7 — 来自 EOA 的交易\n\n这意味着两个外部拥有账户之间的消息仅仅是价值的转移。\n\n然而，从外部拥有账户发送到合约账户的消息会激活合约账户的代码，使其能够执行各种操作（例如，转移代币、写入内部存储器、铸造新代币、运行一些计算、创建全新的合约等）。\n\
  \n换句话说，通过从外部拥有账户发送到合约账户的消息来调用智能合约。（见图 4-8。）\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig8_HTML.jpg](img/520777_1_En_4_Fig8_HTML.jpg)\n\
  \n图 4-8 — 合约账户的交易示例\n\n与外部拥有账户不同，合约账户无法发起新的交易。相反，合约账户只能响应收到的不同交易（来自外部拥有账户或另一个合约账户）来生成交易。您将在“交易和消息”一节中找到更多关于合约调用的信息。\n\
  \n因此，以太坊区块链上发生的任何操作，总是由受外部监管账户激活的交易触发的。\n\n\n\n### 4.2.5 存储密钥：加密密钥库\n\n每个私钥/地址对都编码在一个密钥文件中，这些密钥文件是\
  \ JSON 文本文件。此外，密钥文件的关键组成部分——账户的私钥——始终使用账户创建时输入的密码进行加密。\n\n密钥文件位于创建或导入该账户的以太坊节点数据目录的\
  \ `keystore` 子目录中。\n\n该密钥库使用椭圆曲线 `secp256k1`（依据高效加密标准定义），由 `libsecp256k` 库实现，您可以在\
  \ `github.com/ethereum/go-ethereum/accounts` 找到它。账户以 Web3 秘密存储格式存储在磁盘上。\n\n为以太坊账户创建加密密钥库后，您可以使用此账户管理器来满足账户生命周期的所有需求。这包括以下基本功能：\n\
  \n- 创建新账户\n- 删除现有账户\n- 更新访问凭证\n- 导出现有账户\n- 导入到另一台设备\n\n尽管密钥库定义了用于存储账户的加密级别，但并没有一个全局主密码可以授予所有人访问权限。相反，每个账户都是单独管理的，并以各自独立的加密格式存储在磁盘上，从而确保隔离更加彻底，并使用更严格的凭证。\n\
  \n这种独立性意味着，任何需要访问账户的操作都必须以密码短语的形式，提供该特定账户所需的身份验证凭证：\n\n- 创建新账户时，调用者必须提供一个密码短语来加密该账户。此密码短语将在后续任何访问时被要求提供。\n\
  - 删除现有账户时，调用者必须提供密码短语以验证账户所有权。\n- 更新现有账户时，调用者必须同时提供当前密码短语和新密码短语。操作完成后，该账户将无法再通过之前的密码短语访问。\n\
  - 导出现有账户时，调用者必须同时提供一个当前密码短语来解密账户，以及一个用于在返回密钥文件给用户之前重新编码该账户的密码短语。这是为了在不共享凭证的情况下，允许账户在机器和应用程序之间迁移。\n\
  - 导入新账户时，调用者必须同时提供待导入密钥文件的加密密码短语，以及一个用于存储该账户的新密码短语。这是为了允许使用与迁移时不同的凭证来存储账户。\n\n因此，密码短语丢失后没有任何恢复机制。加密密钥库的密码特性确保了账户凭证无法以任何方式被暴力破解。对于账户管理，有多种钱包应用程序可以高效管理。\n\
  \n## 4.3 世界状态\n\n以太坊区块链的世界状态是以太坊地址（160 位标识符）与账户状态之间的映射。这种映射通过一种称为“修改版默克尔帕特里夏树”的数据结构来维护。让我们来看看它究竟是什么。\n\
  \n### 4.3.1 字典树\n\n字典树，也称为*数字树*或*前缀树*，是一种有序树状数据结构，用于存储动态集合或关联数组，其中键通常是字符串。通常，树中节点的位置定义了与其关联的键。节点不保存自身键的副本，而是依赖节点在树中的位置。（见图\
  \ 4-9。）\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig9_HTML.jpg](img/520777_1_En_4_Fig9_HTML.jpg)\n\
  \n**图 4-9** 字典树示例\n\n树的根节点关联空字符串，一个节点的所有后代共享与该节点关联的前缀。并非所有节点都必然代表一个有效的键，有效的键通常出现在叶子节点，有时也可能出现在某些内部节点中。\n\
  \n### 4.3.2 基数树\n\n请注意，基数树，也称为紧凑前缀树或基数特里树，是一种对空间进行优化的字典树数据结构。在这棵树中，与字典树不同，每个叶子节点如果只有一个子节点，就会与其父节点合并。（见图\
  \ 4-10。）\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig10_HTML.jpg](img/520777_1_En_4_Fig10_HTML.jpg)\n\
  \n**图 4-10** 基数树示例\n\n这样做的结果是，每个内部节点的子节点数量最多为值 `r`，`r` 是赋给基数树基数变量的正整数。该值是 `2x` 的幂，其中\
  \ `x` 大于或等于 1。这使得基数树对于键是长字符串的集合，以及键共享长前缀的集合，效率高得多。因此，如果基数等于 2，就得到一棵二进制基数树。\n\n设\
  \ `k` 为键的长度。基数树允许在 `O(k)` 时间内完成搜索、插入和删除操作。这看起来似乎不太有优势，但它们可以用更少的比较次数完成这些操作，并且所需的节点数远少于平衡树。\n\
  \n通常，基数树用于构建键可以表示为字符串的关联数组。它们在 IP 路由中有特殊应用，因为其能够用少量例外包含大范围值的能力，特别适合 IP 地址的层次化组织。\n\
  \n\n\n### 4.3.3 Patricia Trie\n\n注意，`Patricia trie`是一种`Radix tree`，其中基数为 2。（见图 4-11。）\n\
  \n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig11_HTML.jpg](img/520777_1_En_4_Fig11_HTML.jpg)\n\
  \n**图 4-11**\n树基数，`radix = 2`\n\n换句话说，它是一个二叉树（`radix = 2`），其中每个节点有两个子节点。因此，在树的每个分叉处，每个非叶子节点都面临一个二元选择（两个分支）。这意味着键的每一位都会被单独比较，每个节点都是一个双向分支（即左和右）。\n\
  \n`Patricia trie`是二叉树（`radix = 2`）的一个特殊变体，它不是显式存储每个键的每一位，而是只存储区分两个子树的第一位的位置。\n\n\
  在交集操作期间，算法会检查搜索键的索引位，并选择合适的右子树或左子树。`Patricia trie`的显著特点之一是，它为每个存储的键仅插入一个节点，这使得`Patricia\
  \ trie`比标准的二叉树紧凑得多。我们提供一个示例来帮助理解`Patricia trie`。假设你在`Patricia trie`中放入三个键：`smiled`、`smiles`和`smile`。\n\
  \n这三个键的二进制表示如图 4-12 所示。\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig12_HTML.jpg](img/520777_1_En_4_Fig12_HTML.jpg)\n\
  \n**图 4-12**\n`Patricia trie`示例\n\n我们注意到`smile`是`smiled`和`smiles`的前缀。\n\n分析二进制表示，我们可以看到第一个不同的位（从左到右）是`0`（在第二行中以红色突出显示）。因此，`smiled`将是`smile`的左子节点。同样地，`smiles`将是`smiled`的右子节点，因为它们共享相同的前缀，直到某一位的值为`1`（在第三行中以红色突出显示）。插入这三个键后得到的`Patricia\
  \ trie`如图 4-13 所示。\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig13_HTML.jpg](img/520777_1_En_4_Fig13_HTML.jpg)\n\
  \n**图 4-13**\n`Patricia trie`示例\n\n此外，由于实际键不再显式存储，你需要在索引的记录上对键进行完全比较以确认匹配。关于这一点，`Patricia\
  \ trie`与使用哈希表的索引有特别的相似之处。\n\n### 4.3.4 以太坊修改版默克尔帕特里夏树\n\n本节解释以太坊如何修改了默克尔帕特里夏树。\n\
  \n在修改版默克尔帕特里夏树中，树的键由以太坊地址（20 字节，160 位地址）表示，并以十六进制表示法（16 个字符）呈现。账户状态中的值对应于该以太坊地址。\n\
  \n对于密码学安全的默克尔树，每个节点都通过其哈希值被引用，树的根作为整个树的密码学印记。换句话说，每个节点的确定性密码学哈希被精确地用作指向该节点本身的指针。\n\
  \n这为数据提供了一种密码学认证形式。如果某个树的根哈希是公开已知的，那么任何人都可以提供证据，证明该树在特定路径上具有给定值，前提是逐级提供节点。攻击者无法提供不存在的（路径，值）对证明，因为根哈希基于所有底层哈希，任何更改都会改变根哈希。这就是树的“默克尔”部分。\n\
  \n此外，修改版默克尔帕特里夏树中有三种不同类型的节点：\n\n- **扩展节点：** 包含多个节点的公共键的一部分（编码路径），并包含对后续节点的引用（键），或下一个节点的哈希。因此，该节点由这两个字段（编码路径，键）构成。\n\
  - **分支节点：** 包含指向具有相同键前缀的不同节点的指针。一个分支节点有 17 个字段，分别对应十六进制字母表的每个字符（16 个字符）和一个值字段，用于在路径已完全遍历时包含最终的目标值，即如果存在键值对（键：以太坊地址，值：账户状态）且键（以太坊地址）终止于该分支节点。该节点由\
  \ 17 个字段（`v0` ... `v15`，`value`）组成。\n- **叶子节点：** 包含一个值和键的剩余部分（称为`key-end`）。指向叶子节点的键（以及因此你的以太坊地址）是其所有父节点的前缀与叶子节点的`key-end`的串联。\n\
  \n一个扩展节点永远只有一个子节点。出于这个原因，该子节点只能是一个分支节点。事实上，如果它指向一个叶子节点，它们将被合并为一个单独的叶子节点。如果它指向一个扩展节点，它们将被合并为一个单独的扩展节点。在图\
  \ 4-14 中，你可以看到各种类型节点的结构。\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig14_HTML.jpg](img/520777_1_En_4_Fig14_HTML.jpg)\n\
  \n**图 4-14**\n以太坊修改版默克尔帕特里夏树\n\n为简单起见，`value`字段存放账户余额。但实际上，它存放的是应用了`RLP`函数（序列化函数）于账户状态（包含四个字段）后的结果。相反，节点使用的哈希函数是`SHA\
  \ 3`。\n\n如你所见，扩展节点和叶子节点都由两个字段组成：一个专门用于地址路径的字段，以及一个专门用于值的字段。对于扩展节点，这个值是它所指向节点的哈希。对于叶子节点，它是被序列化的账户。\n\
  \n但是以太坊如何区分这两种节点呢？\n\n它添加了一个前缀。这是图中称为`prefix`的字段。假设一个十六进制字符等于 1 个`nibble`的单位。所以，一个`nibble`相当于\
  \ 4 位。因此，使用以下前缀：\n\n- `0` 表示路径字段中`nibble`数量为偶数的扩展节点。\n- `1` 表示路径字段中`nibble`数量为奇数的扩展节点。\n\
  - `2` 表示路径字段中`nibble`数量为偶数的叶子节点。\n- `3` 表示路径字段中`nibble`数量为奇数的叶子节点。\n\n为什么区分扩展节点和叶子节点很重要？\n\
  \n因为如果是扩展节点，那么`value`是一个指向分支节点的指针（即它的哈希）。而如果是叶子节点，那么`value`是通过`RLP`函数序列化后的账户状态。\n\
  \n以太坊中的所有默克尔树都是以太坊默克尔帕特里夏树。这种结构通过一个扁平的键/值数据库来维护。\n\n### 4.3.5 存储根\n\n一个 256 位的哈希根节点或`Merkle\
  \ Patricia`树的基节点，将账户存储的内容编码为从`Keccak`哈希（256 位）到 256 位`RLP`编码整数值的映射。然后，对于合约账户而言，这就是智能合约的存储。图\
  \ 4-15 展示了这一概念。\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig15_HTML.png](img/520777_1_En_4_Fig15_HTML.png)\n\
  \n**图 4-15**\n存储根是用于账户存储的`Merkle Patricia Trie`的根或基\n\n\n\n### 4.3.6 为什么要用默克尔树？\n\
  \n能够高效地将所有这些信息存储在默克尔树中，在以太坊中极具价值，尤其对于我们称之为*轻节点*的节点而言。区块链由一组节点共同处理。通常，节点分为两类：全节点和轻节点。\n\
  \n全节点通过归档从创世区块到最新区块的整个链来同步区块链，并执行其中包含的所有操作。矿工通常为了挖矿过程而保留全节点。\n\n也可以在不挖矿的情况下下载全节点。无论如何，每个全节点都包含整个区块链。但只要一个节点不需要执行每笔交易或查询历史数据，就没有必要存储整个区块链。\n\
  \n这就是轻量级节点的概念应运而生的原因。它们不需要下载和存储整个链并执行所有轻节点的交易，而只需下载从创世区块到当前区块的区块头链，而不执行任何交易或检索任何状态。由于轻节点可以访问包含三个默克尔帕特里夏树哈希值的区块头，它们仍然可以轻松生成并接收关于交易、事件、余额等信息的可验证响应。\n\
  \n## 4.4 以太坊虚拟机\n\n以太坊虚拟机（通常缩写为 EVM）是计算核心，允许在以太坊平台之上执行复杂的代码（智能合约）。因此，它是一个虚拟机，即能够通过虚拟化过程在各方面模拟物理机器的软件。在虚拟化过程中，物理资源（CPU、RAM、硬盘等）被分配给在虚拟机上运行的应用程序（包括其操作系统）。它的作用类似于\
  \ Java 虚拟机（JVM）对 Java 的作用，即提供一个安全、隔离且受保护的环境，与主机上运行的其他进程或文件隔离开。\n\nEVM 的崩溃或故障不会对主机的文件系统和操作系统进程造成副作用。EVM\
  \ 还充当网络节点的担保人，这些节点为存储和处理潜在有害的智能合约“贡献”自己的物理基础设施。以太坊区块链（与比特币类似）的开放和无许可特性实际上允许任何人加入其中并部署潜在的恶意智能合约。\n\
  \n## 4.5 什么是 Gas？\n\n以太坊中一个非常重要的概念是手续费。考虑到每个节点在验证和确认协议中都要运行 EVM。网络上的每个节点都会在 EVM\
  \ 上执行每笔交易和每个智能合约。\n\n显然，这并非为了优化计算效率。这种并行处理是冗余的并行处理。其目标是在无需可信第三方的情况下提供一种更高效的达成共识的方法。*智能合约和交易的执行*通过节点被冗余复制，这使得它们非常昂贵。\n\
  \n这就产生了避免使用区块链进行计算的动机，而计算可以在平台之外执行。任何因以太坊网络上的交易而产生的计算都是有成本的。\n\n请注意，*gas*是交易发送方为在以太坊区块链上执行的每项任务所需支付的手续费的名称。\n\
  \n之所以称之为 gas，是因为这笔费用就像加密燃料一样，驱动着智能合约和*交易*的运行。Gas 和以太币被有意地分离开来，因为 Gas 单位对应于具有自然成本的计算单位，而以太币的价格通常会因市场力量而波动。Gas\
  \ 是用来计量特定计算所需费用的单位。\n\nGas 的价格是我们愿意为每单位 Gas 支付的以太币数量，以`gwei`为单位计量。请注意，Wei 是以太币的最小单位，1\
  \ 个以太币等于 10¹⁸ Wei。1 `gwei`等于 1,000,000,000 Wei。在每次计算/交易中，发送方会设置一个`gasLimit`（Gas\
  \ 上限），这代表了 Gas 成本或价格（`gasprice`）。在这种情况下，Gas 上限指的是我们愿意为特定计算或交易花费的 Gas 总量。Gas 成本指的是我们愿意支付的`gwei`数量。Gas\
  \ 成本与 Gas 上限的乘积代表发送方愿意为执行计算或交易而支付的以太币数量。\n\n这里我们考虑一个发送方设置 Gas 上限和 Gas 价格的例子。假设发送方设置\
  \ Gas 上限为 50,000，Gas 价格为 20 `gwei`。这意味着发送方愿意花费高达`50000 x 20 gwei = 1,000,000,000,000,000\
  \ Wei = 0.001 Ether`来执行该计算或交易。（见图 4-16。）\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig16_HTML.jpg](img/520777_1_En_4_Fig16_HTML.jpg)\n\
  \n图 4-16\n\n交易手续费支付示例\n\n如果用户的余额账户中有足够多的以太币来支付这笔费用，那么交易或计算就可以被执行。在交易或计算的最后阶段，发送方将获得未使用的\
  \ Gas 的退款。\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig17_HTML.jpg](img/520777_1_En_4_Fig17_HTML.jpg)\n\
  \n图 4-17\n\n计算结束时未使用 Gas 的退款示例\n\n如果发送方未提供执行交易所需的 Gas，则交易将因 Gas 耗尽而不会被认定为有效。在这种情况下，交易处理会停止，并且任何路径更改都将被回滚，以返回到计算之前的以太坊状态。此外，失败的交易会被记录，以显示尝试了什么操作以及在何处失败。并且，由于车辆在\
  \ Gas 耗尽之前已经消耗了资源进行计算，因此不会向发送方退还任何金额。（见图 4-18。）\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig18_HTML.jpg](img/520777_1_En_4_Fig18_HTML.jpg)\n\
  \n图 4-18\n\n因 Gas 不足导致交易失败的示例\n\n请注意，发送方为 Gas 支付的全部费用都会被发送到矿工地址。由于矿工们正在消耗自己的资源来运行计算和识别计算任务，他们因此获得\
  \ Gas 费用作为奖励。（见图 4-19。）\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig19_HTML.jpg](img/520777_1_En_4_Fig19_HTML.jpg)\n\
  \n图 4-19\n\n矿工收到手续费的示例\n\n所以，很明显，Gas 价格越高，矿工从计算中获得的收益就越高。通过这种方式，矿工可以自由选择验证哪些计算以及避免哪些计算。为了引导发送方设定他们可以接受的\
  \ Gas 价格，矿工可以宣传他们愿意执行交易的较低费用。矿工会优先打包手续费最高的交易，因此用户愿意支付的 Gas 价格越高，他们的交易就越快被纳入区块。你可以在这张表上查看每项操作所需的\
  \ Gas。\n\n\n\n### 存储的 Gas 费用\n\n`gas`不仅用于支付计算步骤，还用于支付内存使用。归档费用的计算有一些细微的差别。例如，由于内存的大幅增加会增加所有节点上以太坊状态数据库的大小，因此在归档时需要激励用户保持较小的数据量。\n\
  \n因此，如果某笔交易存在一个清除存储空间条目的阶段，该交易的执行费用将被取消，并会发放退款以释放存储空间。此外，存储成本非常高。在开发智能合约时，我们有三种方式访问内存：\n\
  \n- **栈**：访问易失性栈。\n- **内存**：访问易失性存储或内存。\n- **存储**：访问非易失性存储。其中非易失性存储的成本最高。\n\n图 4-20\
  \ 展示了一个表格，列出了每次内存操作所需的 gas。\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig20_HTML.jpg](img/520777_1_En_4_Fig20_HTML.jpg)\n\
  \n**图 4-20** 每次内存操作的 gas 费用列表\n\n总之，在以太坊上持续存储数据的成本极高。使用以太坊来存储数据是没有意义的。只应存储当前操作所需的数据；将归档任务委托给其他解决方案。\n\
  \n然而，一个很好的方法是将默克尔树的根或基础哈希作为数据防篡改证明，仅归档到以太坊中，而数据本身存储在外部分布式服务上。\n\n理解智能合约在 gas 消耗或计算方面的情况，对于控制运营成本至关重要。\n\
  \n有一些 API 可以估算交易成本以及智能合约的成本，但这超出了本书的讨论范围。最终，无论是计算操作还是归档操作，其成本都以 gas 单位进行衡量。当用户提交交易时，他们会为每个\
  \ gas 单位提供一个 ETH 价格，以及他们愿意花费的 gas 单位数量。代码消耗的 gas 越低，其在执行代码所需的资源方面效率就越高。\n\n### Gas\
  \ 的目的\n\n以太坊运行的一个重要方面是，网络执行的每一个操作都是由所有全节点共同完成的。但你已经看到，以太坊虚拟机上的计算步骤可能成本更高。\n\n因此，以太坊智能合约主要用于基础活动，例如执行简单的业务策略、验证数字签名和其他加密对象，而非用于文件归档、电子邮件、机器学习以及通常会加重网络负担的更复杂用途。\n\
  \n费用机制的引入可以防止用户过度使用。请注意，以太坊是一种完全图灵完备的语言，简而言之，它能够模拟任何算法。这也使得它可以创建循环，从而使以太坊容易面临程序无限执行的问题。\n\
  \n如果没有费用机制，攻击者可能会通过在一个操作或动作中运行无限循环来企图拖垮网络，而无需承担任何后果。\n\n## 交易与消息\n\n我们将以太坊区块链定义为一个基于交易的机器状态。因此，交易是一个可以改变以太坊区块链状态的事件。交易可以出于不同目的而创建：\n\
  \n- 外部拥有账户之间的数字货币转账\n- 在以太坊区块链上部署智能合约\n- 在已部署的智能合约上执行函数\n\n交易只能由外部拥有账户创建和发送。\n\n\
  ### 交易结构\n\n一条以太坊交易是一个字节数组。该数组被分为多个字段，如图 4-21 所示。\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig21_HTML.jpg](img/520777_1_En_4_Fig21_HTML.jpg)\n\
  \n**图 4-21** 交易结构\n\n交易通过修改后的默克尔帕特里夏树进行维护，这在前文关于世界状态的章节中已详细讨论过。\n\n在此逻辑中，键由交易 ID\
  \ 表示，值则正是交易本身。\n\n### 交易数字签名流程\n\n我们按照维塔利克·布特林在影响以太坊的硬分叉后提出的 EIP（以太坊改进提案）方案，来演示签名交易的具体步骤，该方案可防范可能的重放攻击。使用旧方案也可以工作，但以太坊创始人建议使用新方案来保护自己免受重放攻击。可以在此处看到：\n\
  \n![../images/520777_1_En_4_Chapter/520777_1_En_4_Figa_HTML.jpg](img/520777_1_En_4_Figa_HTML.jpg)\n\
  \n这由以太坊创始人提出，并附带了所有链的 ID 列表。\n\n一旦创建了交易，就会通过`RLP`函数对其进行序列化：\n\n```\nL1 = RLP(T(T[n];\
  \ T[p]; T[g]; T[t]; T[v]; p; chainID; (); ()))\n```\n其中，如果`T[t] = 0`，则 `p = T[i]`，否则\
  \ `p = T[d]`。\n\n序列化后，将应用名为 SHA-3（也称为 Keccak-256）的加密哈希函数：\n\n```\nh1 = KEC(L(T))\n\
  ```\n\n完成此步骤后，即可应用签名：\n\n```\nECDSASIGN(h(T); privKey) = (T[w]; T[r]; T[s])\n```\n\
  \n其中：\n\n- `T[w]` 是一个恢复标识符，其值为双倍再加 35 或 36\n- `T[r]` 是数字签名的 `randomPart`（随机部分）\n\
  - `T[s]` 是数字签名的签名值\n\n因此，`T[r]` 和 `T[s]` 构成了 ECDSA 数字签名的输出（`randomPart`；`sign`），而\
  \ `T[w]` 则根据 `EIP155` 计算得出，具有双重目的：\n\n- 防范重放攻击\n- 允许检索信息以快速恢复公钥\n\n实际上，发送者的地址并不存在于交易中。完成这一步骤后，字段\
  \ `T[w]`、`T[r]` 和 `T[s]` 会被添加到交易中，得到 `T(T[n]; T[p]; T[g]; T[t]; T[v]; p; T[w]; T[r];\
  \ T[s])`。\n\n然后，对此应用 `RLP` 序列化函数：\n\n```\nL2 = RLP(T(T[n]; T[p]; T[g]; T[t]; T[v];\
  \ p; T[w]; T[r]; T[s]))\n```\n\n并再次应用 SHA-3 哈希函数：\n\n```\nh2))\n```\n\n最终得到的就是交易\
  \ ID。\n\n\n\n\n### 4.6.3 从数字签名中恢复公钥\n\n对于数字签名，以太坊与比特币一样，使用带有标准`secp256k1`的 ECDSA\
  \ 算法。\n\n我们在此讨论的是 EIP-155 提案中的数字签名方案。在本例中，我们将指代以太坊主网链。但对于使用此方案的每条链，流程都是相同的，只需将`chainId`更改为相应的值即可。\n\
  \n正如你所见，交易中并没有发送方地址字段。\n\n实际上，这个信息是后来获取的。正因如此，你有了变量`v`，它提供了关于奇偶性的信息，以及曲线点（其中`randomPart`是其`x`值）的有限性。计算`v`的公式是：\n\
  \n`v = chainId * 2 + ((y mod 2) + 35)`\n\n- `chainID` 是所用链的 ID。对于以太坊主网，此变量的值为`1`。\n\
  - `y` 是曲线点的 y 坐标，其中`randomPart`是该曲线的 x 值。它是 ECDSA 签名的一部分。\n\n分析这个用于计算`v`的公式，你会发现有趣的部分是`y\
  \ mod 2`，它扮演了恢复标识符的角色。\n\n它用于加速检索签名者公钥的过程。实际上，如果信息正确，此操作有两个可能的结果：\n- `0`： -> y 坐标是偶数。\n\
  - `1`： -> y 坐标是奇数。\n\n因此，我们发现`((y mod 2) + 35)`可能有两个值：\n- `35`： -> y 坐标是偶数。\n- `36`：\
  \ -> y 坐标是奇数。\n\n给定 X 坐标的一个固定值，并截断与 Y 坐标相关的信息，就可能存在多个具有相同`x`的点对`(x; y)`。\n\n那么，为了验证签名，我们需要检索公钥，执行一个循环，在每次迭代中，比较可能的点对之一是否与签名匹配。可能的点对与签名匹配。所以，让我们看看发送者的公钥。我们简要说明\
  \ ECDSA 算法如何计算数字签名的随机部分。\n\n给定曲线`secp256k1`。设`G`为由标准`secp256k1`定义的生成点。设`n`为曲线上点`G`的阶。然后，我们需要理解在区间`[1,\
  \ n-1]`内生成一个随机数。我们称此值为`randomNumber`。我们这样找到`randomPart`：\n\n`randomNumber * G =\
  \ (x1; y1)`\n\n因此：\n\n`randomPart = x1 mod n`\n\n设`h`为椭圆曲线的余因子，则`2 * (h + 1)`告诉我们，给定\
  \ X 坐标的`randomPart`，我们有多少个可能的点。对于`secp256k1`，余因子等于`1`。所以，我们有四个可能的点：\n- 两个，因为每个 X\
  \ 坐标有两个可能的 Y 坐标，一个为正，一个为负。\n- 两个，因为`R.x = randomPart + j * n`，其中`j`取`{0, 1, 2, ...,\
  \ h}`（在我们的例子中`h = 1`）。\n\n然而，`R.x`可以从`randomPart`唯一恢复，因为整数中只有一个：\n\n`R.x = randomPart\
  \ + j * n`\n\n对于`j = 0, 1, 2, ..., h`，代表一个有效的 x 坐标，即`G`的倍数。\n\n出于这个原因，[`SEC2`]加密标准推荐使用余因子`h\
  \ = 1`或`h = 2`的椭圆曲线。对于这些由[`SEC2`]推荐的曲线，有效 x 坐标的数量通常是一个，因此这个检查是空的。\n\n在最坏的情况下，从`randomPart`找到`R.x`只需要`log2(h)\
  \ + 1`个比特。\n\n因此，给定点`R`的 X 坐标的固定`randomPart`信息，并截断与 Y 坐标相关的信息，可能存在两个可能的点对`(x; y)`，其\
  \ X 坐标相同有效。也就是说，一个是 Y 坐标为正的点`(x; y)`，另一个是 Y 坐标为负的点`(x; -y)`。\n\n那么，为了验证签名，你需要运行一个循环，在每次迭代中，确定可能的点对之一是否与签名匹配。然而，多亏了关于\
  \ Y 坐标奇偶性的信息，我们可以一次性获得点`R`的`yr`值，从而推导出与签名对应的公钥。实际上，由于`v`给了我们坐标 Y 的奇偶性信息（对于该坐标 Y，`randomPart`是坐标\
  \ X 的信息），我们可以计算出`R = (xr; yr)`。\n\n设`h(msg)`为交易的哈希值。通过这种方式，我们得到相应的公钥`Q`：\n\n1. 对于`j`从`0`到`h`（对于`secp256k1`，`h\
  \ = 1`）：\n    1. 设 `x[r] = randomPart + j * n`\n\n2. 从`y[r]`的奇偶性信息，推导出点`R`。 `R =\
  \ (x[r]; y[r])`\n\n3. 计算候选公钥：  \n   ![../images/520777_1_En_4_Chapter/520777_1_En_4_Figb_HTML.gif](img/520777_1_En_4_Figb_HTML.gif)\n\
  \n4. 用数字签名验证公钥：\n   1. `u1 = h(msg) * sign-1 mod n`\n   2. `u2 = randomPart * sign-1\
  \ mod n`\n   3. 计算：  \n      `R = (xr, yr) = u1 * G + u2 * Q`\n   4. 设 `c = xr mod\
  \ n`。那么，如果 `c == randomPart` 为真，则签名被验证。返回 `True`（有效）。\n\n否则，如果循环结束后未返回`True`值，则信息中存在不一致之处。这样，公钥就从带有标准`secp256k1`的\
  \ ECDSA 签名中推导出来，并且签名得到了验证。\n\n### 4.6.4 三种交易类型\n\n本节涵盖三种类型的交易：\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig22_HTML.jpg](img/520777_1_En_4_Fig22_HTML.jpg)\n\
  \n**图 4-22** – EOA 之间的资金转移\n\n- **EOA（外部拥有账户）之间的资金转移：** 当一个 EOA 向另一个 EOA 转移资金时，使用此交易。此交易的`Data`字段为空。（见图\
  \ 4-22）\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig23_HTML.jpg](img/520777_1_En_4_Fig23_HTML.jpg)\n\
  \n**图 4-23** – 在已部署的智能合约上运行以太坊函数的智能合约分发\n\n- **在以太坊网络上存储智能合约：** 在以太坊中，分发合约是通过交易进行的。此交易的目标地址字段为空。然而，在`Data`字段中，包含智能合约的字节码，如果需要，还有一些参数。如果成功，发送方会收到一个收据，其中包含他们使用该智能合约所需的合约地址（见图\
  \ 4-23）。\n\n部署合约后，EOA 可以执行此合约中定义的函数。同样，这是通过提交一笔以太坊交易来实现的。在这种情况下，交易的目标地址是智能合约地址。而在`Data`字段中，包含要调用的函数选择器以及要输入函数的数据。（见图\
  \ 4-24）\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig24_HTML.jpg](img/520777_1_En_4_Fig24_HTML.jpg)\n\
  \n**图 4-24** – 调用智能合约上的函数\n\n显然，关于谁可以执行操作的智能合约的权限，是在智能合约代码中定义的，代码中包含了操作的逻辑。\n\n\n\
  \n### 4.6.5 消息\n\n消息是 EVM 代码从一个智能合约发送到另一个智能合约的一种虚拟交易。请注意，以太坊中的交易和消息是不同的。以太坊术语中的*交易*特指一份经数字签名的数据，该数据源自\
  \ EVM 代码执行过程之外，并将在区块链中注册。消息只能由 EVM 代码发送，且永远不会在数据中体现。因此，它们表达了智能合约向不同智能合约发送消息的能力。\n\
  \n这些是虚拟对象，从未被序列化，只存在于以太坊运行时环境中。它们也可以被理解为智能合约之间的函数调用。\n\n基本上，你需要理解消息类似于交易，区别在于它是由合约而非外部参与者产生的。在消息生成后，当一个合约正在执行时，代码会执行主要的`CALL`或`DELEGATE\
  \ THE CALL`操作码，从而生成一条消息。\n\n因此，一个合约可以像外部参与者一样，与其他智能合约建立关系。它们也被称为内部计算或内部交易，当一个合约在内部向另一个合约发送交易时，代码会被执行并与接收方合约账户关联。（参见图\
  \ 4-25。）\n\n通常，消息来自智能合约，其执行会触发来自 EOA（外部拥有账户）的交易。\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig25_HTML.jpg](img/520777_1_En_4_Fig25_HTML.jpg)\n\
  \n**图 4-25** 交易与消息（内部交易）\n\n`gasLimit`由外部拥有账户设置，因此其值足够高，以允许整个操作（包括因操作本身而产生的任何子执行，即合约间的消息）顺利执行。\n\
  \n对于整个交易链，当某条消息的特定执行结束时，该消息的执行及其后续激活的所有消息的执行，都可以恢复到初始状态。\n\n## 4.7 以太坊状态转换函数\n\n\
  ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig26_HTML.png](img/520777_1_En_4_Fig26_HTML.png)\n\
  \n**图 4-26** 由新交易触发的状态改变与状态转换函数\n\n本节讨论交易的验证以及状态转换函数。当且仅当交易有效，并且你已经安排好完成其执行所需的所有资源时，此函数允许你转换到一个新状态。参见图\
  \ 4-26。\n\n让我们来看一下以太坊状态转换函数的步骤：\n\n`APPLY (S; TX) -> S0` 或 `ERROR` 定义如下：\n\n1. 检查交易的结构和语法，验证签名的有效性，并确定交易的\
  \ nonce 是否与发送者匹配。如果不成功，则返回错误。\n2. 然后，你可以将交易成本计算为`GASLIMIT * GASPRICE`，并确定签名发送者的地址。如果发送者的账户余额充足，则扣除刚计算出的金额并增加\
  \ nonce；否则，返回错误。\n3. 初始化变量`GAS = GAS_LIMIT`。每消耗一个字节，就按一定数量减少 gas，以支付所消耗的每个字节的资源。\n\
  4. 将交易的数字货币从发送者账户转移至接收者账户。注意，如果接收者账户不存在，则创建它。然后，如果收款人账户是智能合约，则运行合约代码，直到操作完成，或至少直到\
  \ gas 耗尽。\n5. 如果交易因发送者资金不足或代码执行耗尽 gas 而失败，则恢复所有状态更改，支付税费，并将税费添加到矿工账户。\n6. 否则，如果成功，则向发送者退还未消耗的\
  \ gas 费用，并将已消耗的费用奖励给包含该交易的区块的获胜矿工。\n\n在恢复管理方面，消息的工作方式与交易等效：如果正在运行的消息耗尽 gas，并且由此触发的所有其他执行都被恢复，这没有问题。在其他情况下，它会返回一个错误或一个`STOP/RETURN`语句。\n\
  \n如前所述，智能合约开发者可以访问三种类型的存储内存：\n\n* LIFO（后进先出）栈（易失性），可以在其中压入或弹出数据（范围从 0 到 1024）。\n\
  * （易失性）内存，是一个可无限扩展的字节数组。\n* 以太坊的（非易失性）存储。\n\n代码还可以获取消息的值和传入数据。它可以访问区块头数据，并且也可以返回一个字节数组作为输出。\n\
  \nEVM 的功能状态可以由数据集定义。在这种情况下，区块状态是包含所有账户、余额和存储的全局状态。\n\n务必注意，在每一轮运行的开始，当前指令是通过程序计数器指向的字节来识别的。每个操作在与数据集交互方面都有其自身的定义。\n\
  \n\n## 4.8 以太坊区块链中的交易流程\n\n本节讨论以太坊区块链中的交易生命周期。我们以一笔调用智能合约函数的交易为例——该示例有效且适用于任何类型的交易。假设你希望通过一个部署在以太坊网络上的去中心化应用进行选举投票。图\
  \ 4-27 展示了该应用的图形界面，你通过安装了用于管理以太坊账户插件的浏览器访问该界面。\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig27_HTML.jpg](img/520777_1_En_4_Fig27_HTML.jpg)\n\
  \n图 4-27\n\n调用智能合约函数的交易\n\n该应用为我们提供了一个选举列表，我们选择自己有权投票的那一项。\n\n我们点击的投票功能是一个通过名为 `Web3.js`\
  \ 的以太坊通信库由 JavaScript 处理的事件。该事件连接到以太坊网络的一个节点，创建一个投票智能合约代理的实例，并调用其 `castVote()` 函数，传入选定的候选人。这个函数调用是一笔交易，因为它会改变投票应用的状态（通过其\
  \ `castVote()` 函数），并且需要现场生成数字签名。参见图 4-28。\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig28_HTML.png](img/520777_1_En_4_Fig28_HTML.png)\n\
  \n图 4-28\n\n区块链去中心化应用\n\n这笔投票交易由提交它的本地以太坊节点进行验证。验证涉及检查以下事项：\n\n- 结构和语法格式正确。\n- 数字签名与发送者地址及交易内容一致。\n\
  - 交易的 nonce 值必须有效。请记住，账户的 nonce 是该账户账簿或账单发送的计算次数或交易计数。要成为有效交易，交易的 nonce 应与发送者用户账户的\
  \ nonce 匹配。\n- 发送者拥有足够的以太币来处理交易。\n- 发送的数据不会导致 `castVote()` 函数执行失败。\n\n因此，如果验证成功，当前节点会将交易广播到其所有邻近的对等节点。如果验证失败，交易不会被传输，而是直接消失。随后，交易通过各个完整节点在网络中传输，这些节点会依次执行前述验证过程。\n\
  \n然后，交易通过网络传播，到达矿工节点。每个矿工节点根据其收到的交易，拥有自己的交易池，用于添加到账本中。（参见图 4-29。）\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig29_HTML.jpg](img/520777_1_En_4_Fig29_HTML.jpg)\n\
  \n图 4-29\n\n内存池\n\n矿工节点随后选择要包含在候选区块中的交易。\n\n因此，我们假设 `n` 是交易数量，并令 `APPLI (S; TX)`\
  \ 为之前定义的状态转换函数。\n\n令 `S [0]` 为上一个区块结束时的状态。\n\n*对于 i = 0; 1; ... n–1，S (i+1) = APP\
  \ (S (i); TX (i))*\n\n如果状态转换函数的每次应用都没有返回错误，则交易有效并可被添加到区块中，否则将丢弃无效交易。\n\n然后，矿工将获得的奖励增加到\
  \ `S [n]` 中，并定义区块的最终状态。接着矿工构建区块，解决共识算法，并将区块传播到网络中以供添加到区块链。一旦投票交易在区块验证过程中被执行，智能合约将发布\
  \ `VoteConfirmation()` 事件。\n\n该事件将被投票者的网络用户界面接收，你已在该界面上注册以监听该事件。\n\n随后，`VoteConfirmation()`\
  \ 事件将由界面的 JavaScript 网络用户进行处理，屏幕上会显示一条消息，告知用户投票成功。\n\n图 4-30 展示了交易的整个生命周期，从发起到确认事件。\n\
  \n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig30_HTML.jpg](img/520777_1_En_4_Fig30_HTML.jpg)\n\
  \n图 4-30\n\n交易池系统\n\n## 4.9 交易状态\n\n一笔交易会经历一系列状态，直到它被确认并添加到账本的区块中。（参见图 4-31。）\n\n\
  ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig31_HTML.jpg](img/520777_1_En_4_Fig31_HTML.jpg)\n\
  \n图 4-31\n\n交易状态\n\n我们来逐一分析这些状态：\n\n- **未知：** 网络既未查看也未处理的交易。\n- **待定：** 处于待定状态，等待被矿工选择和处理。它位于所谓的交易池中。\n\
  - **已入块：** 当矿工正确选择交易并将其提取到区块中时，交易进入已入块状态。一旦进入区块，如果该区块发生分叉，交易可以回滚至待定状态。\n- **已替换：**\
  \ 当发生以下事件之一时，交易可以从待定状态进入已替换状态：\n  - 来自同一发送者且具有相同 nonce 的另一笔交易进入已入块状态。\n  - 来自同一发送者、具有相同\
  \ nonce 但 gas 价格更高的另一笔交易进入待定状态。\n\n那么，让我们看看交易的 *状态转换*。\n\n- **入池：** 从未知状态到待定状态的转换。这涉及进入某个节点交易池的交易。它们因此等待被选中以组成候选区块。\n\
  - **已挖出：** 已挖出的交易已被矿工处理，创建了一个区块。一旦矿工签出交易，它便进入已入块状态。由于以太坊网络的*点对点*特性，从某些节点的角度来看，交易可以直接从未知状态转换到已入块状态，而无需经过待定状态。\n\
  - **已替换：** 从待定状态转换到已替换状态被称为已替换。这发生在以下情况：\n  - 来自同一发送者且具有相同 nonce 的另一笔交易进入已入块状态。\n\
  \  - 来自同一发送者、具有相同 nonce 但 gas 价格更高的另一笔交易进入待定状态。\n- **已分叉：** 当区块交易所在的区块被网络逆转时，会发生此情况。该区块内的所有交易将从已入块状态转换到待定状态。\n\
  - **已确认：** 每当新区块被提取并添加到链中时，处于已入块状态的交易即被确认。\n\n\n\n## 4.10 区块结构\n\n以太坊区块链的一个区块分为以下部分：\n\
  \n- 区块头\n- 叔块头列表\n- 区块数据\n\n叔块头的格式与前述相同。（见图 4-32。）\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig32_HTML.jpg](img/520777_1_En_4_Fig32_HTML.jpg)\n\
  \n图 4-32 区块结构\n\n叔块头列表用 `B[U]` 表示，交易列表用 `B[T]` 表示。因此，正式地，我们将区块 `B` 表示如下：\n\n`B =\
  \ (B[H]; B[T]; B[U])`\n\n请记住，以太坊中的每棵树都是修改版默克尔帕特里夏树（Modified Merkle Patricia trie），这在世界状态（World\
  \ State）一节中有详细阐述。\n\n这种方法乍看起来可能非常低效，因为每个区块都必须捕获整个状态，但实际上，每个区块之后只需改变其中极少部分数据。由于所有状态信息都是最终区块的一部分，因此无需记录区块链的完整历史。\n\
  \n通常，两个相邻区块之间的大部分树结构是相同的，因此只需记录一次信息，并通过哈希指针引用两次。此外，值得补充的是，智能合约的代码执行过程由一个交易生成，该交易通过状态计算或状态转换函数来执行。\n\
  \n根据区块验证算法，如果计算或交易被添加到名为 `X` 的区块中，则由该交易生成的代码执行将在网络的所有节点上执行，从而验证并添加 `X` 区块。\n\n图\
  \ 4-33 总结了这些以太坊区块。\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig33_HTML.jpg](img/520777_1_En_4_Fig33_HTML.jpg)\n\
  \n图 4-33 以太坊中的区块结构\n\n### 4.10.1 交易收据\n\n每笔交易在执行并验证后，都会改变区块链的状态。因此，每笔有效交易都会产生一个结果。交易收据记录了每笔交易的结果。每个计算或交易收据是一个由四个元素组成的元组：\n\
  \n- `Ru`：累计消耗的 gas\n- `Rl`：通过交易执行生成的一组日志\n- `Rb`：由这些日志中的信息组成的布隆过滤器\n- `Rz`：交易后的状态\n\
  \n因此，交易收据定义如下：\n\n`R = (R[u]; R[b]; R[l]; R[z])`\n\n### 4.10.2 叔块\n\n与比特币相比，以太坊的区块处理时间要短得多。一方面，这允许更快速地处理交易；另一方面，多个矿工可能同时解出更多的区块。这些并发的区块被称为**叔块**。\n\
  \n叔块不会进入主链。然而，将这些区块整合到已获得主区块链位置的主块中，其目标是帮助奖励生成这些区块的矿工。\n\n为了使矿工因叔块而获得奖励，该叔块必须是有效的。因此，叔块的目标是奖励表现良好的矿工，同时奖励孤块。\n\
  \n这具有双重效果：\n\n1.  **促进网络去中心化。** 事实上，即使是那些因以下原因挖出孤块的矿工也能获得奖励：\n    -   更大的网络延迟，导致数据传播延迟\n\
  \    -   更低的算力，导致挖出区块的难度更大\n        -   这减少了中心化趋势，并避免了拥有更高算力的矿池攫取大部分奖励，而对个体矿工毫无保留。\n\
  \n2.  **通过增加主链的工作量来提高链的安全性。** 从而减少工作量浪费。\n\n赢得主链位置的区块，通常是拥有最大工作量证明份额的区块。而叔块则是通常共享较少工作量证明的区块。每个区块最多可以包含两个叔块。\n\
  \n## 4.11 以太坊简化版 GHOST 协议\n\nGHOST 协议旨在为区块处理速度极快的区块链提出一种解决方案。事实上，确认时间极快的链会受到“降低的”安全性的影响，因为矿工挖出的区块在网络中传播得更慢。\n\
  \n基本上，解决方案是将潜在区块纳入主区块链的计算中。\n\n此外，产生快速区块的区块链很容易面临向拥有高比例网络哈希率的矿池中心化的风险，从而控制挖矿过程。\n\
  \n为了避免这种情况，以太坊采用了 GHOST 协议的**简化版本**，它能够克服困扰快速处理区块的区块链的两个问题。\n\n以太坊采用的解决方案是为潜在区块提供降低的奖励。不仅如此，它们还为包含这些潜在区块的“孙子辈”区块提供奖励。\n\
  \n以太坊简化版 GHOST 协议定义如下：\n\n-   一个区块必须指定一个父区块，以及 0、1 或 2 个叔块。\n-   包含在某个区块中的叔块应具备以下属性：\n\
  \    -   它必须是 `B` 的 k 代祖先的直接子块，其中 `k` 介于 2 和 7 之间。\n    -   因此，它不能是 `B` 的祖先。\n \
  \   -   它必须是一个有效区块。\n    -   该叔块必须与之前区块中包含的所有叔块以及同一区块中包含的所有其他叔块不同。\n\n叔块可以被包含在最多七代之内，有两个原因：\n\
  \n-   没有代际限制的 GHOST 协议会给计算特定区块的哪些叔块有效带来复杂性。\n-   此外，如果像在以太坊中实现的那样采用无限制的 GHOST 协议，会削弱矿工挖主链的动力，转而偏向攻击者的链。\n\
  \n\n\n## 4.12 以太坊共识机制\n\n我们来看看，即便在此处，它如何成为一种涌现式共识，并且以太坊将其共识机制建立在工作量证明（POW）之上。\n\n\
  以太坊使用的 POW 算法是 `Ethash`，它基于 `Keccak-256-bit` 加密哈希函数。\n\n正如你所见，当一笔交易被创建并签名后，在传输到网络之前，它会通过本地以太坊节点进行验证。\n\
  \n此验证包括以下检查项：\n\n*   交易的结构和语法格式正确。\n*   数字签名与发送者地址和交易内容一致。\n*   交易的 `nonce` 值必须有效。要使\
  \ `nonce` 有效，交易的 `nonce` 必须与发送者账户的 `nonce` 相匹配。\n*   发送者有足够的以太币来支付交易的 gas 费用。\n\
  *   发送的数据一致且格式正确，因此不会导致任何被调用的操作失败。\n\n如果这些验证步骤中的任何一个失败，那么交易将失败并传输到网络。相反，如果验证通过，它就会通过相邻节点在网络中传播。每个接收到交易的节点都会依次对交易的有效性进行验证。\n\
  \n同样，如果验证成功，该交易将在网络中继续传递，否则将被忽略。通过这种方式，可以避免网络被无效交易堵塞，因为此类交易不会导致任何状态变更。\n\n当交易到达矿工手中时，矿工会对其进行验证并将其添加到交易池中。事实上，与比特币一样，矿工在本地维护一个交易池，等待被添加到一个候选区块中。\n\
  \n矿工根据多种标准选择要添加到区块中的交易，但主要依据是交易提供的费用。矿工每个区块都有 gas 上限，他们不能突破这个限制。\n\n然后，他们选择一定数量\
  \ `n` 的交易添加到区块中，并为每个交易应用状态转换函数。\n\n```\nAPPLY (S; TX) -> S 或 ERROR\n```\n\n因此，矿工最终可以用新状态\
  \ `S0` 构建区块，填写各字段，并解决我们在专门介绍比特币的章节中讨论过的 Nakamoto 共识部分提到的 PoW 难题。一旦难题被解决，矿工就可以将区块发送到网络。每个接收到该区块的节点都会对其进行验证。以太坊中基本的区块验证算法按以下方式工作：\n\
  \n*   检查前一个引用区块是否仍然存在且有效。\n*   查看该区块的时间戳是否大于前一个区块的时间戳，并且小于未来 15 分钟的时间戳。\n*   验证区块编号、难度、交易来源、衍生交易和\
  \ gas 上限是否有效。\n*   验证区块上的 POW 是否仍然有效。\n*   `S [0]` 可以是最后一个区块结束时的状态，`TX` 可以是该区块的计算或交易列表，共\
  \ `n` 步。\n\n对于 `i = 0 ... n - 1`，设置 `S (i+1) = APPLY (S (i); TX (i))`。\n\n然后检查应用是否出错，或者截至当前区块消耗的最终或总\
  \ gas 是否超过了 `GASLIMIT`；如果超出，也会报错。\n\n*   假设 `S FINALS (n)`，然后加上支付给矿工区块的区块奖励。\n*\
  \   需要验证 Merkle 树的原始状态 `S_FINAL` 是否与区块头中给出的最终步骤或状态一致。如果一致，则该区块有效；否则，无效。\n\n### 4.12.1\
  \ 工作量证明算法 (PWA)\n\nPWA 的形式化定义如下：\n\n`(n; m) = PoW (H; H[n]; d)`\n\n其中\n\n*   `(n;\
  \ m)`\n    *   `m` 是 mixHash\n    *   `n` 是 nonce\n*   `H` 是不包含 nonce 和 mixHash\
  \ 的区块头。\n*   `Hn` 是定义为加密伪随机数的 nonce，它并非独立于 `H` 和 `d`。\n*   `d` 是 DAG，它是计算 mix-hash\
  \ 所需的一大组数据。简单来说，矿工通过 DAG 不断生成此类 mixHash，直到输出结果具有低于目标值的 nonce 值。\n\nnonce 与区块难度之间的关系在此形式化定义：\n\
  \n![../images/520777_1_En_4_Chapter/520777_1_En_4_Figc_HTML.png](img/520777_1_En_4_Figc_HTML.png)\n\
  \n## 4.13 以太坊 2.0\n\n你已经看到，与比特币一样，以太坊是一种涌现式共识。以太坊用于挖矿的算法是*工作量证明*算法。\n\n然而，不久之后，以太坊将迎来从\
  \ 1.0 到 2.0 的升级。这次更新不会一蹴而就，而是会通过多个阶段逐步推进。\n\n这次更新最重要的一个方面是用于挖矿算法的创新。事实上，随着升级到以太坊\
  \ 2.0，将过渡到权益证明算法。工作量证明是一种挖矿算法，其计算负担不轻。为了能够赢得一个区块，你需要从昂贵的专用硬件中获得必要的计算能力。\n\n这会导致非常高的能源消耗，并对环境造成污染。所以，总而言之，与\
  \ PoW 相关的问题有：\n\n*   由于所需计算资源和能源的数量，这是一个非常低效的过程。\n*   能够负担得起更强大硬件来执行 PoW 的个人和组织比其他人更有可能使用它，这意味着存在挖矿过程向组织中心化的风险。\n\
  \n图 4-34 显示了以太坊网络内算力分布的一个统计示例。\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig34_HTML.png](img/520777_1_En_4_Fig34_HTML.png)\n\
  \n图 4-34 — 以太坊哈希率分布\n\n因此，从图中可以清楚地看到，以太坊总挖矿算力的 51% 以上掌握在三个组织手中。为了解决这些问题，以太坊考虑将权益证明作为一种解决方案。\n\
  \n## 4.14 总结\n\n在本章中，你学习了以太坊及其结构（状态和交易函数）。本章解释了以太坊是如何创建的，以使开发者能够构建和发布智能合约和分布式应用，这些应用可以在没有停机问题、欺诈或第三方干扰的情况下使用。下一章将重点介绍基于权益证明算法的共识机制，相关研究正日益深入。越来越多的区块链正在考虑转向这种算法共识，以太坊首当其冲。本章最后涵盖了以太坊\
  \ Casper，这是以太坊开发者正在实现的权益证明机制。\n\n\n\n"
- "# 5\\. 权益证明：未来的共识机制\n\n`权益证明`算法用验证者取代了矿工，并使挖矿过程虚拟化。以太坊开发者一直想转向`权益证明`，但它带来了一些问题，开发者仍在努力解决。\n\
  \n`权益证明`算法基于一种不同的区块挖矿理念。\n\n概括而言，该算法基于以下事实：\n\n-   任何想要成为验证者的用户，都必须通过质押币在网络中注册为验证者。质押的价值随后被锁定并冻结。\n\
  -   这个币的赌注绝不能低于一定数量。实际上，质押必须大于他们从验证新区块中可能获得的收益。\n-   为了正确运作，该算法必须通过削减质押来惩罚不诚实的验证者。这样，验证者从诚实行为中获得的收益将大于攻击区块链的收益。\n\
  \n在每个时间间隔，会从验证者池中选取一个验证者，负责验证并向区块链提供下一个区块。验证者的选择在每个时间间隔根据多种标准进行。\n\n每个验证者投注的赔率会影响被选中的概率。赔率越高，被选中的可能性越大。\n\
  \n`权益证明`的每种实现都按照自身需求来定义这种选择机制。因此，它可能与传统工作量证明`PoW`向权益证明`PoS`的过渡有所不同。\n\n通常，有两种方式进行此类选择：\n\
  \n-   **随机选择区块：** 通过最小哈希值与最大质押值之间的配对来选取验证者。然而，由于每个验证者的质押是公开的，这种选择可以被预测。\n-   **币龄选择：**\
  \ 验证者是根据其代币持有时间的长短来选择的。币龄根据币在质押中持有的天数计算。但是，每当验证者添加一个区块，币龄就会重置为 0。因此，必须等待一定的时间间隔才能验证新区块。\n\
  \    -   这种方式有助于实现去中心化。\n-   这可以防止拥有大量质押的节点主导验证过程，从而控制区块链。\n\n这显然不排除新的选择方法。相反，每个人都可以通过项目自身的选择来实现其选择机制。\n\
  \n事实上，每个使用`PoS`的区块链都采用自己认为最合适的方法和技术。被选中的节点因此验证新区块、签名并将其添加到区块链上。\n\n作为奖励，该节点会获得交易费用。\n\
  \n如果节点想要停止验证区块并撤回其质押，它也可以这样做。然而，它必须等待一段时间，以便网络验证其行为是否诚实。该算法实现了以下目标：\n\n-   **安全性：**\
  \ 质押作为一种财务激励，促使节点只验证有效区块和有效交易，从而拒绝无效交易。它还激励验证者在规范链上工作。如果行为不诚实，惩罚就是削减质押。\n-   **能源效率：**\
  \ 无需昂贵且专门的硬件来执行`PoW`所需的复杂计算。\n-   **激励性：** 越来越多的用户将受到激励来管理验证工作。\n-   **去中心化：** 由于验证者的选择具有伪随机性，避免了像`PoW`那样将验证权集中在少数组织手中。\n\
  -   **币价稳定：** 因为不再需要释放新币作为给矿工的奖励。\n\n正因如此，只要质押金额高于奖励，验证者在行为不诚实的情况下，损失的币将超过其可能赚取的币。\n\
  \n要有效控制网络并验证欺诈性交易，验证者需要持有网络上总质押量的 51%。然而，即使这在数学上并非不可能，实际上也是不太可能的。事实上，要做到这一点，验证者必须控制网络，持有至少\
  \ 51% 的当前流通供应量。存在两种类型的权益证明算法：\n\n-   **链式权益证明：** 算法在每个时间片（每十秒周期可能代表一个时间片）内伪随机地选取一名验证者，并赋予该验证者生成一个区块的能力。这个区块必须引用某个先前的区块（通常是最长链上前一个链末端的区块）。因此，随着时间的推移，大多数区块会汇聚成一条持续增长的单一链条。\n\
  -   **BFT（拜占庭容错）风格的权益证明：** 验证者被随机赋予提出区块的权利，但通过多轮方法来确定哪个区块是规范链上的。在此基础上，每个验证者在每一轮中对某个特定区块进行投票，在过程结束时，所有（诚实且在线）的验证者就给定区块是否与链相连达成一致。请注意，区块仍然可以连接到链上；区别在于对区块的批准可以在区块内部发生，并且不依赖于其后链的长度或大小。\n\
  \n## 5.1 基于链的权益证明\n\n本节讨论一种将`权益证明`与`工作量证明`相结合的算法。\n\n比特币开发者提出的第一种替代`PoW`的区块生成方法的`PoS`技术，就是基于链的`PoS`。实际上，它是一种介于`PoS`和`PoW`之间的混合机制。它在中本聪共识的框架内，遵循以下原则：\n\
  \n-   点对点式的信息传播\n-   区块验证规则\n-   最长链规则\n-   逻辑目标\n\n第一个完整的基于链的区块链`POS`系统由 Nxt 和\
  \ Peercoin 实施并采用。基于链的`POS`的过程可以用下面的算法来描述。与`PoW`不同，`PoS`不依赖无用的哈希值来创建区块。矿工在每个时钟周期内只能找到一次解。\n\
  \n由于哈希难题的复杂度随着矿工质押金额的增加而降低，即使矿工的质押水平较高，其解决该难题所需的估算哈希尝试次数也可以大幅减少。\n\n因此，`PoS`组件避免了如果使用`PoW`会出现的强力哈希并发，从而节省了大量能源。\n\
  \n我们首先提出`BlockGen()`方法，然后是共识算法。（见图 5-1。）\n\n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig1_HTML.jpg](img/520777_1_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1\n\n`BlockGen()` 和基于链的权益证明总体流程\n\n\n\n### 5.1.1 基于委员会的权益证明\n\n`基于链的`权益证明依然依赖哈希难题来创建区块。作为一种替代技术，基于委员会的权益证明遵循了更有序的流程：\n\
  \n- 根据质押权益建立利益相关者委员会。\n- 允许委员会轮流创建区块。\n\n在全局网络中，通常采用安全的多方计算（MPC）技术来推选这样的委员会。MPC\
  \ 是一种分布式计算方式，其中从不同输入出发的不同部分会产生相同的结果。\n\n基于委员会的权益证明中的 MPC 流程有效实现了以下功能：从所有股东瞄准的区块链当前状态中获取价值，并生成一个伪随机序列的股东（领导者序列），这些股东随后将组成提议委员会。（参见图\
  \ 5-2。）\n\n这个领导者序列对所有参与方而言都是相同的，并且拥有更高权威级别的参与方可以在该序列中占据多个位置。\n\n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig2_HTML.jpg](img/520777_1_En_5_Fig2_HTML.jpg)\n\
  \n**图 5-2** `CommitteeElect()` 与基于委员会的权益证明的通用流程\n\n### 5.1.2 “无成本”难题\n\n在许多早期的基于链的权益证明系统中，既没有惩罚也没有激励措施。（参见图\
  \ 5-3。）\n\n这会产生不良后果：如果多条链相互竞争，验证者的动机就是尝试在每条链上生成区块。这有两个基本原因：\n\n- 与工作量证明不同，验证者可以免费在多个分支上验证交易。因为构建区块不需要工作量证明，所以在每个分叉上生成区块的计算成本很低。\n\
  - 验证者会在所有分叉上工作，因为这样对他们有利可图。如果验证者主要验证两条（或更多）链上的区块，他们将收集任意获胜分支上的交易费用。这增加了收集成功的概率。\n\
  \n因此，问题是如果验证者指向每一个分叉，区块链将更容易受到双重花费攻击。\n\n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig3_HTML.jpg](img/520777_1_En_5_Fig3_HTML.jpg)\n\
  \n**图 5-3** 基于链的权益证明系统\n\n在工作量证明中，同时挖多个链没有激励。如果矿工将其哈希算力（计算能力）分散到两条链上，并不会增加他们挖出区块的机会。\n\
  \n这个问题可以通过两种策略解决——Slash 机制和 Dunkle 机制。\n\n#### 5.1.2.1 Slash 机制\n\n这包括对同时在多条链上创建区块的验证者进行惩罚，以及提供作恶证据。在这种情况下，作恶验证者的保证金会被削减。激励结构因此发生改变。（参见图\
  \ 5-4。）\n\n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig4_HTML.jpg](img/520777_1_En_5_Fig4_HTML.jpg)\n\
  \n**图 5-4** Slash 机制\n\n然而，要使这项技术解决问题，两个分支上每个区块的验证者选择必须相同，这就需要在分叉之前进行验证者选择。该解决方案存在某些缺点：\n\
  \n- 节点必须频繁在线才能保持对区块链的安全视图。\n- 对中程验证者存在共谋风险的开放性（例如，在 30 个验证者中，有 25 个提前串通，对前 19 个区块发起\
  \ 51% 攻击的情况）。\n\n#### 5.1.2.2 Dunkle 机制\n\n第二种方法是简单地对在错误链上创建区块的验证者进行惩罚。假设两个对立的链\
  \ A 和 B。在 A 上构建区块的验证者会在 A 上获得 +R 的奖励，但该区块的头部可以包含在 B 中，而验证者会在 B 上受到 -F 的惩罚。换句话说，即使是试图“错误地”伪造链（次要链）的验证者也可能被惩罚。（参见图\
  \ 5-5。）\n\n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig5_HTML.jpg](img/520777_1_En_5_Fig5_HTML.jpg)\n\
  \n**图 5-5** Dunkle 机制\n\n这里的洞见在于，你可以在权益证明内复制工作量证明的经济机制。\n\n在工作量证明中，在链上创建区块时犯错是有代价的，但这个成本隐藏在环境中。矿工必须消耗更多电力，并购买或租赁额外的硬件。或者，他们必须分割自己的计算资源，这并不方便。\n\
  \n在这里，制裁措施被明确陈述。这种技术的缺点是使验证者面临更大的风险。\n\n由于这些原因，以太坊 2.0 正在计划其自己的权益证明机制，名为 Casper，采用\
  \ BFT（拜占庭容错）风格。\n\n### 5.1.3 基于 BFT 的权益证明\n\n由于仍然采用最长链规则来保证区块的概率性最终性，基于链的权益证明和基于委员会的权益证明在很大程度上遵循了中本聪共识结构。相比之下，基于\
  \ BFT 的权益证明整合了一个额外的共识层，该层提供了区块的确定性快速最终确认。\n\n区块提议可以由任何权益证明机制（轮询、基于委员会等）执行，只要它向 BFT\
  \ 共识层注入稳定的新区块流即可。\n\n除了标准方法之外，还可以采用检查点机制来确保区块链的目标得以实现。（参见图 5-6。）\n\n因此，最长链规则可以通过当前安全的检查点规则以安全的方式替代，以确定规范的主链。\n\
  \n其中 `BlockGen()`：\n\n- 以与质押价值成正比的成功率选出提议的区块。\n- 因此，提议区块 `BlockFi BTC()`。\n- 参与将获胜区块最终化的共识\
  \ BFT 过程。\n\n返回获胜区块。\n\n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig6_HTML.jpg](img/520777_1_En_5_Fig6_HTML.jpg)\n\
  \n**图 5-6** 基于拜占庭容错机制的权益证明通用流程\n\n\n\n## 5.2 以太坊 Casper\n\nFT（部分同步）方法允许验证者使用权益证明技术对区块进行投票，这些技术会生成一种或多种形式的签名消息。其目标是达成共识，并识别和惩罚任何不诚实的验证者。\n\
  \n与 BFT 共识算法一样，其假设是：如果 2/3 的验证者正确遵循协议，那么无论网络延迟如何，算法都无法解决冲突区块。\n\nVitalik Buterin\
  \ 指出，Casper 的目标之一是达到经济目的。我们可以将其定义如下：\n\n当客户有证据证明 (i) `B1` 区块将永远成为规范链的一部分，或者 (ii)\
  \ 那些导致 `B1` 被回滚的行为者确保会受到至少 `$X` 金额的经济处罚时，`B1` 区块即实现了经济最终确定性，并带有 `$X` 的加密安全边际。\n\n\
  显然，经济加密安全边际必须足够高。事实上，如果我们考虑 `X = 7000 万美元`，就能理解该区块是链的一部分，并且改变它的代价非常高昂。PoW（工作量证明）不具备这些保证。这是\
  \ PoS（权益证明）的一个特定特性。\n\n其意图是让 51% 攻击变得极其昂贵，以至于大多数验证者即使联手也无法在不遭受巨大经济损失的情况下恢复已最终确定的区块。经济目的的实现方式是要求那些希望参与验证过程的人提交一份保证金。\n\
  \n如果协议判定某个验证者行为不诚实，违反了协议规则，那么他们将受到惩罚，其保证金将被没收。\n\n协议中的这套规则被称为削减条件。削减条件使得能够在排除合理怀疑的情况下确定验证者何时行为不当（例如，同时为多个不同的区块投票）。\n\
  \n另一方面，对于遵守协议规则的验证者，则有保证他们不会违反任何规则，也不会受到任何处罚。\n\n还存在最终性条件，这些条件描述了何时可以认为某个特定的最终哈希值已确定。当一个哈希值获得了当前活跃验证者存入的总余额中至少\
  \ 2/3 的承诺时，该哈希值即被视为已最终确定。削减条件必须满足两个属性：\n\n*   **可追责的安全性：** 如果两个冲突的哈希值都被最终确定，那么必须能够证明至少有\
  \ 1/3 的验证者违反了某些削减条件。\n*   **可行的活跃性：** 必须存在一组消息，使得 2/3 的验证者能够在不违反削减条件的情况下完成某些新哈希值的传输，除非至少有\
  \ 1/3 的验证者违反了某些削减条件。\n\n可追责的安全性带来了这种经济目的理念：如果两个冲突的哈希值被最终确定（即分叉），那么你就可以获得数学证明，表明有大量验证者必定违反了某些削减条件，你可以将此证据提交给区块链并对他们进行处罚。\n\
  \n可行的活跃性基本上意味着“不应该发生”。算法有可能被阻塞而无法最终确定任何东西。\n\n## 5.3 Casper 实现\n\n`Blocktree`（区块树）是一种树形数据结构，它与\
  \ Casper 中刚刚生成和接收到的区块相关。共识的实际对象是检查点树，它是 `blocktree` 的一个子树。\n\n具体来说，在每个共识周期（`blocktree`\
  \ 中每 100 高度或检查点树中每 1 高度），每个验证者向其对等节点发送一个针对某个区块的投票，将其视为一个检查点。\n\n检查点是指创世区块以及 `blocktree`\
  \ 中高度为 100 或 100 的倍数的每个区块。然而，高度为 100k 的区块的“检查点高度”就是 `k`。在 `blocktree` 中，区块的高度必须能被\
  \ 100 整除。\n\n为了更好地理解，请参见图 5-7 中的检查点树。\n\n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig7_HTML.jpg](img/520777_1_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7\n\n检查点树：虚线表示检查点之间的 100 个区块\n\n高度函数如图 5-8 所示。\n\n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig8_HTML.jpg](img/520777_1_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8\n\n带有高度函数的检查点树\n\n该等级由经过验证的源检查点（`CPs`）及其高度 `h(s)` 组成。一个目标门 `CPT` 及其高度 `h(t)`，以及验证者\
  \ `S` 的签名。必须满足 `h(t) > h(s)`。\n\n因此，`<s; CPs; CPt; h(s); h(t)>` 就是验证者的投票。\n\n每张投票都会被发送到网络，并根据签名者参与的价值（来自其质押）进行加权。\n\
  \n如果来源-目标控制点对 `<CP[s]; CP[t]>` 获得了总存款超过 2/3 的验证者的投票，那么 `CP[t]` 即被验证，而 `CP[s]` 则被完成。`CP[s]`\
  \ 和 `CP[t]` 之间的所有区块也被完成。\n\nCasper FFG 依赖于两条所谓的 Casper 戒律来确保共识的安全性：\n\n1.  验证者不能对同一个检查点高度投两次票。\n\
  2.  验证者不需要投出新票，因为其现有投票的范围已经包含了源-目标。\n\n违规者将面临严厉处罚，包括没收质押和暂时禁止投注。由于每张投票都使用验证者的私钥签名，并由验证者接收，因此\
  \ Casper FFG 可以轻松检测并应用削减规则。\n\n此外，还适用以下条件：\n\n*   超级多数链接被定义为检查点的有序对 `(a; b)`，也写作\
  \ `a -> b`，使得至少 2/3 的验证者（即其存款总和占总存款 2/3 的验证者集合）以 `a` 为源、`b` 为目标投了票。超级多数链接可以跳过检查点。因此，如果\
  \ `h(b) > h(a) + 1` 也是可以的。\n*   两个检查点（`a` 和 `b`）被定义为冲突的，当且仅当它们是不同分支上的节点，也就是说，一个不是另一个的祖先或后代。\n\
  *   一个检查点被视为已验证，如果：\n    *   它是创世检查点\n    *   链接 `c0 -> c` 拥有超级多数支持\n\n一个检查点 `c`\
  \ 被视为已最终确定，如果存在一个超级多数链接 `c -> c0`，并且 `c0` 是 `c` 的一个显著子节点。同样地，`c` 被最终确定当且仅当 `c` 是已验证的。还必须存在一个超级多数链接\
  \ `c -> c0`，其中检查点 `c` 和 `c0` 不冲突，并且 `h(c0) = h(c) + 1`。（见图 5-9。）\n\n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig9_HTML.jpg](img/520777_1_En_5_Fig9_HTML.jpg)\n\
  \n图 5-9\n\n已验证的链 `r -> b1 -> b2 -> b3`\n\nEIP 1011 包含关于 Casper FFG 当前智能合约的信息。利益相关者通过向承诺的智能合约注册而获得参与资格，该合约对\
  \ Casper FFG 进行了编码，并可通过以太坊交易访问。\n\n这里我们报告了 `CheckpointTimes()` 函数（见图 5-10），然后是 Casper\
  \ FFG（友好型最终性小工具）算法。\n\n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig10_HTML.jpg](img/520777_1_En_5_Fig10_HTML.jpg)\n\
  \n图 5-10\n\n`CheckPointVote()`\n\n然后我们报告 Casper FFG，如图 5-11 所示。\n\n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig11_HTML.jpg](img/520777_1_En_5_Fig11_HTML.jpg)\n\
  \n图 5-11\n\n`CheckPointVote()`\n\n\n\n## 5.4 本章小结\n\n本章介绍了权益证明的未来发展前景，这种机制用验证者取代矿工，使挖矿过程虚拟化。同时，本章还讨论了基于链的权益证明，该机制采用区块系统运作。\n\
  \n像比特币和以太坊这样的公共区块链的普及，激发了对区块链技术及其在最前沿商业应用中作为分布式系统使用的兴趣。要在分布式系统中使用区块链，你需要理解 `Hyperledger\
  \ Fabric` 的概念，它作为应用开发或模块化架构解决方案的基础。下一章将包含关于 `Hyperledger Fabric` 的更多细节。\n\n"
- '# 6. Hyperledger Fabric


  像比特币和以太坊这样的公共区块链的成功，引发了人们对区块链技术及其在最具创新性的商业用例中作为分布式系统应用的日益增长的兴趣。


  然而，企业的优先事项基于公有无许可区块链尚无法满足的原则和特性。


  因此，私有许可区块链应运而生，能够满足商业上的折中需求。


  事实上，私有许可区块链允许你设计出满足以下条件的系统：


  -   网络是经过授权的

  -   参与者是已知且可识别的

  -   数据隐私和机密性有保障

  -   交易确认延迟较低


  因此，有许多不同的区块链项目被授权用于企业用途。`Hyperledger Fabric` 是一款基于分布式账本的自由软件企业会计系统，与其他著名的分布式账本及区块链系统相比，它拥有某些重要的变体。


  然而，区分 `Hyperledger` 与 `Hyperledger Fabric` 至关重要。`Hyperledger` 项目是由 Linux 基金会发起的一个开源区块链项目。


  `Hyperledger Fabric` 旨在作为应用开发或模块化架构解决方案的基础。`Hyperledger Fabric` 支持即插即用的组件，例如共识和成员服务。其模块化和适应性强的设计能够满足广泛的行业用例需求。它采用了一种新颖的共识方法，在保护隐私的同时实现了全规模性能。


  正如 IBM 所推广的，它是一个面向多种用例应用开发的企业级解决方案，为各个应用领域提供了创新性和多功能性。


  它是一个 `授权` 的解决方案，因此参与者是已知的，没有公共网络或无许可网络带来的问题。因此，参与者之间存在着信任。


  这对共识产生了显著影响。在一个由可信机构授权和管理的系统中，共识并非必需。实际上，在这种情况下，共识在性能和速度方面将是低效的。


  这使得 `Hyperledger Fabric` 平台具有高性能。该区块链经过特殊设计，具有高度模块化、可配置性和可定制性，能够满足各种业务需求。


  ## 6.1 高层次视角


  本节通过提供一个高层次视角来介绍 `Hyperledger Fabric`。它包含以下组件：


  -   一个负责通过确定交易顺序来建立系统共识，并因此向对等节点传输新区块的**排序节点**。

  -   一个负责使用加密标识符验证网络身份的**成员服务提供者**。

  -   一个额外的用于向其他对等节点广播排序服务结果区块的**点对点八卦消息通道**。

  -   账本可以配置为与多种数据库管理系统协同工作。

  -   每个应用都有**可定制的背书策略**。因此，平台的每个方面都是模块化和可配置的。

  -   在 `Hyperledger Fabric` 中，智能合约被称为 `链码`。`Hyperledger Fabric` 的执行-共识架构被称为 `执行-排序-验证`。


  实际上，它将交易流程分为三个阶段：


  -   执行交易并验证其有效性，从而以这种方式批准交易。

  -   使用可编程的共识协议对交易进行排序。

  -   在将交易记录到账本之前，必须根据应用区块链的策略对它们进行验证。


  `Hyperledger Fabric` 提供了一种**通道结构**。可以说，每个通道对应且仅对应一个区块链。因此，一个区块链仅与一个通道相关联。这意味着只有属于某个通道的组织才有权访问该通道自身的数据，进而也有权访问该通道对应区块链的数据。


  这一点，连同私有数据的概念，为数据安全和隐私提供了一定保障。


  对条目进行分类的任务被委托给一个模块化组件，该组件在概念上区别于那些执行交易和维护账本的对等节点。这就是排序过程的工作原理。


  只要共识是模块化的，它就可以根据对特定分布或解决方案的信任度进行调整。


  在讨论 `Hyperledger Fabric` 背后的概念和机制时，本章在尝试总结这些概念时，遵循并信赖网络上可获得的官方 `Hyperledger Fabric`
  文档。因此，所有关于 `Hyperledger Fabric` 的叙述均源于对其官方文档的分析与研究。


  ## 6.2 资产


  `Hyperledger Fabric` 允许你使用 `链码` 构建任何类型的资产，无论是有形资产（房产、商品、产品等）还是无形资产（合同条款、知识产权、文档等）。


  在 `Hyperledger Fabric` 中，资产被定义为一组键值对，其状态变化作为交易存储在（与通道绑定的）账本上。资产可以采用二进制和/或 JSON 表示形式。


  ## 6.3 链码


  `链码` 是一种定义业务逻辑的软件。换句话说，它定义了一个或一组活动，以及用于更改这些活动的交易指令。因此，`链码` 定义了改变活动状态的操作。它使用规则来读取或更改键值对。


  一个交易提案会触发 `链码` 函数，这些函数在当前数据库账本上执行。当 `链码` 运行时，它会生成一组写入集，这些写入集可以在网络中广播，并添加到所有对等节点的账本中。




  ## 6.4 账本的特征


  账本按顺序记录所有网络状态转换。各方提交的链码调用（交易）会产生状态转换。每个操作都包含一组针对账本中资源的会话密钥，这些资源会在账本中被创建、更新或删除。


  账本由以下部分组成：


  - 一个用于将不可更改的数据存储在区块中的链。

  - 一个记录区块链当前状态的状态数据库。如前所述，每个通道都有自己的账本。对于每个参与的通道，每个节点都有一份数据副本。


  以下是账本的一些特征：


  - 执行基于键的搜索和查询，以及范围查询和通常依赖的查询。

  - 使用复杂的查询语言执行只读问题（`CouchDB`）。

  - 从历史记录中执行只读问题，并查询账本中某个键的记录，从而提供数据来源的选项。

  - 交易包含每个批准该交易的节点的签名，然后才被转发到排序服务。

  - 交易包含每个批准该交易的节点的签名，然后才被转发到排序服务。

  - 条目被排序到区块中，并由排序服务“分发”给通道上的节点。

  - 节点通过检查事件来执行批准策略。

  - 在添加区块之前，会执行版本检查，以确认自链码代码执行以来，所读取资源的状态没有发生变化。

  - 一旦交易被验证并提交，它就是不可变的。通道账本中的配置区块定义了策略、访问控制和其他相关信息。


  通道是成员提供者实例，允许从多个认证机构获取加密材料。


  ## 6.5 隐私


  我之前说过，账本仅存在于一个通道中，而一个通道中只有一个账本。因此，只有通道的成员才能访问该通道的账本。这允许你在确保隐私和机密性的同时完成许多事情。


  例如，让我们想象一个供应商公司和多个客户公司的场景。如果供应商公司根据客户公司应用不同的价格，但不想透露此细节，那么通道就是解决方案。事实上，只需为每个商业关系实现一个通道，任何信息的机密性都能得到保证。


  此外，在通道本身内部，还可以获得额外的机密性级别。事实上，链码可以定义改变资产状态的函数。那么，在这个领域，只有拥有该链码的节点才能读取与该链码相关的资产。


  如果该通道中的一个组织子组需要保密财务数据，它们可以收集数据并将其存储在私有数据库中，该数据库在概念上独立于通道寄存器，并且仅限机构内部的有限人员访问。


  通过这种方式，通道为网络的其他部分维护私有交易，而集合则维护通道组织子组之间的私有数据。


  在将交易提交给排序服务并将区块添加到账户之前，链码的值可以使用加密方法进行加密，以进一步隐藏数据。只有拥有用于生成密文的对应密钥的用户，才能在加密数据被打印到账本后解密。


  ## 6.6 身份


  一旦加密数据被解密，区块链由多个参与者组成：


  - 节点

  - 排序节点

  - 客户端应用程序

  - 管理方

  - 用户


  需要一个可信权威机构来验证身份。成员服务提供者（`MSP`）是 Fabric 中最受信任的权威机构。`MSP` 是一个元素，用于设置管理该组织授权身份的规则。默认实现使用标准
  PKI（公钥基础设施）模型，该模型采用`X.509`身份证书。


  ### 6.6.1 公钥基础设施 (PKI)


  *公钥基础设施*是一种安全架构，允许生成、管理和使用加密密钥和数字证书。因此，它是一组支持安全网络连接的技术。（见图 6-1。）


  PKI 的元素包括：


  - 证书颁发机构（CA）

  - 公钥和私钥

  - 数字证书

  - 证书吊销


  证书颁发机构（CA）负责颁发证书。`MSP` 确定特定组织中受信任成员的利益。


  ![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig1_HTML.jpg](img/520777_1_En_6_Fig1_HTML.jpg)


  *图 6-1 CA 电子证书示例*


  ### 6.6.2 数字证书


  数字证书是关于证书持有者的一组信息。


  `X.509`数字证书的元素包括：


  - 版本

  - 序列号

  - 算法 ID

  - 颁发机构

  - 有效期

  - 主体

  - 主体公钥信息

  - 证书签名算法

  - 证书签名


  证书是加密的，因此可以防篡改。任何更改都会使证书失效。实际上，它使用证书颁发机构的私钥签名，因此可以通过同一机构的公钥进行验证。任何更改都会使验证过程无效。（见图
  6-2。）


  ![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig2_HTML.jpg](img/520777_1_En_6_Fig2_HTML.jpg)


  *图 6-2 CA 和数字证书示例*


  它证明公钥与主体身份之间的唯一关联。


  数字证书的目的是保证声明的公钥与声称拥有该公钥的主体的真实身份相关联。实际上，应用的签名证明了所声明的公钥是准确的。


  实际上，应用的签名会检查证书的公钥是否与证书内容中指定的主题匹配。


  因此，最初，如果马里奥·罗西想对文档进行数字签名，他必须向通信的其他参与者公开他的公钥。任何拥有该公钥的人都可以从他那里接收使用私钥签名的文档，然后使用上述公钥验证签名；但是，任何人都可以公开一个不同的公钥（他知道其对应的私钥），并声明它是马里奥·罗西的公钥。


  为了避免这个问题，每个用户都将自己的密钥放入由可靠第三方（在 PKI 案例中，是证书颁发机构）签名的证书中。所有信任该第三方的人只需检查其签名即可确定公钥是否确实属于该用户。




  '
- "# 证书颁发机构\n\n身份（公钥对和私钥）及证书由认证机构分发给各个参与者。这份将原告与参与者公钥关联起来的证书，由认证机构进行数字签名（并可选择附带完整属性）。因此，如果信任该\
  \ CA（且知晓其公钥），则可信任该个体参与者。由此，若信任 CA（并知晓其公钥），便可确信被识别的参与者与证书中提供的公钥相对应，并具备所列特征，从而验证原告证书上\
  \ CA 签名的真实性。CA 负责确保组织内所有参与者均拥有经过验证的数字身份。（见图 6-3。）\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig3_HTML.jpg](img/520777_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3  \n证书颁发机构\n\n"
- '# 成员服务提供者（MSP）


  MSP 能够验证身份。换言之，它们能判定某个身份是否属于特定组织，以及该身份在组织内所扮演的角色。因此，尽管 CA 可以颁发身份和数字证书，但 MSP 能在网络上识别这些身份。


  MSP 还向成员提供网络内部的多种角色与权限。


  MSP 是将组织身份与其成员资格关联起来的方法。成员的公钥（也称为证书、证书签名）被添加到组织的 MSP 中，以获取成员资格。


  MSP 也用于为网络参与者分配各种角色和权限。MSP 是连接身份与组织成员资格的机制。成员的公钥（也称为证书、证书签名）被添加到组织的 MSP 中，以获取成员资格。


  另一方面，MSP 的功能不仅限于列举谁是网络或通道的成员。通过识别参与者在节点或通道上的特定权利，MSP 负责将身份转化为角色。用户在向 CA Fabric 注册时必须被分配一个角色，例如管理员、对等节点、客户端、排序节点或成员。


  ### 本地 MSP


  针对客户端和节点的 MSP 是按每个客户端和每个节点（对等节点和排序节点）分别指定的。本地 MSP 控制节点的权限（例如能够运行节点的对等管理员）。在 MSP
  的客户端环境中，用户可以将自己认证为通道的成员（例如在链码交易中），或系统中特定角色的持有者（例如作为管理员组织）。


  客户本地 MSP 设置在节点的系统文件中，仅适用于该节点。由于排序节点与对等节点一样属于单一机构，因此它们拥有单个 MSP 来标识其信任的参与者或节点。


  ### 通道 MSP


  另一方面，通道 MSP 在通道级别确立管理和参与权限。应用程序通道上的对等节点和排序节点与通道 MSP 共享相同的视图，从而能够正确认证通道访客。这意味着，如果某公司想要加入通道，通道配置中应包含一个与该公司内部人员协作的
  MSP。因此，涉及该组织身份的交易将被拒绝。


  本地 MSP 记录在通道配置中，而通道 MSP 以文件夹结构的形式存储在文件系统上。通道 MSP 决定谁在通道级别拥有权力。通道 MSP 定义了通道成员身份与通道级规则执行之间的关联。


  通道 MSP 将所有参与组织的 MSP 连接到一个统一的排序系统中。排序服务很可能拥有来自多家企业的排序节点，整个排序服务由这些企业共同管理。


  ### 存储 MSP 数据


  本地 MSP 记录在通道配置中，而通道 MSP 以文件夹结构的形式存储在文件系统上。通道 MSP 决定谁在通道级别拥有权力。通道 MSP 定义了通道成员身份与通道级规则执行之间的关联。


  通道 MSP 将所有参与组织的 MSP 连接到一个统一的排序系统中。排序服务很可能拥有来自多家企业的排序节点，整个排序服务由这些企业共同管理。


  因此，通道 MSP 在逻辑上驻留在通道或网络中并由其管理，但每个节点的本地文件系统都包含所有通道 MSP 的副本。


  '
- "# 对等节点\n\n区块链主要由相互通信的节点构成。由于对等节点拥有账本和智能合约，因此它们是网络的关键组件。账本以不可变的方式记录所有智能合约交易。可以对对等节点进行添加、移除、重启、重新配置和删除操作。\n\
  \n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig4_HTML.jpg](img/520777_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4  \n账本与链码\n\n因此，一个对等节点拥有一个或多个账本实例，以及一个或多个不同链码的实例。（见图 6-4。）\n\n实际上，对等节点可以参与不同的通道，从而拥有不同的账本实例（每个通道对应一个独立的账本）。\n\
  \n此外，根据网络的配置方式及其设计目的，可能存在多个链码。因此，一个对等节点可以托管多个链码实例。\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig5_HTML.jpg](img/520777_1_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5  \n应用程序与对等节点\n\n接着，为了获取对账本的访问权限，图中展示了应用程序如何与对等节点交互。（见图 6-5。）Hyperledger\
  \ Fabric 为开发者提供了 Fabric API 软件开发工具包（SDK），使其能够与对等节点、链码以及账本进行交互。\n\n应用程序可以通过对等节点连接，利用链码查询或更新账本。账本查询的提议交易结果会迅速返回，但账本更新需要应用程序、对等节点和排序节点之间进行更复杂的交互。\n\
  \n图 6-6 以非常基础的方式展示了这一点。\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig6_HTML.jpg](img/520777_1_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6  \n应用程序连接对等节点\n\n在图 6-6 中，应用程序 A 连接到 P1，并使用链码 S1 查询或修改账本 L1。P1 向 S1 请求响应，S1\
  \ 返回计划中的账本查询或更新的结果。应用程序 A 收到了提案响应，流程的查询阶段至此完成。\n\n应用程序 A 根据所有更新回复生成一笔交易，并将其发送给 O1\
  \ 进行排序。O1 从所有对等节点（包括 P1）收集交易并以区块形式分发。P1 在将交易提交至 L1 之前对其进行验证。一旦 L1 按照从 A 接收到的内容完成更新，P1\
  \ 便生成一个事件以指示完成。\n\n在大多数情况下，应用程序必须连接其所代表的对等节点，以使账本更新主节点获得批准。这一点在“交易流程”一节中进行了演示。\n\
  \n\n\n### 对等节点与组织\n\n不同的公司控制着区块链网络，或者由单个公司统一管理。由于这些网络归各公司所有，对等节点在此类分布式网络的构建中至关重要。对等节点同时也是组织网络的连接点。\n\
  \n在此情形下，一个网络由四个贡献组织和八个对等节点构成。通过通道 `C` 相连的网络 `N` 中的五个对等节点分别是 `P1`、`P3`、`P5`、`P7`\
  \ 和 `P8`。尽管这些公司的其他对等节点并未加入此通道，但它们通常至少是另一个通道的成员。由某公司开发的应用程序将连接该公司内部的员工以及来自其他公司的员工。为清晰起见，图\
  \ 6-7 中未显示排序节点。\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig7_HTML.jpg](img/520777_1_En_6_Fig7_HTML.jpg)\n\
  \n*图 6-7 连接组织与对等节点*\n\n多个拥有资源的贡献组织共同建立并管理网络。本文主题中的资源指对等节点；然而，组织提供的资源远不止对等节点。如果没有那些向网络提供独特资源的组织，协作网络便不复存在。网络因这些成员实体所提供的资源而得以扩展或收缩。\n\
  \n### 对等节点与身份\n\n对等节点通过某个认证中心颁发的数字证书来分配身份。当对等节点通过通道连接到区块链时，其对等节点的权限由通道配置中基于其身份的规则所决定。\n\
  \n因此，（通道）`MSP` 通过其数字证书来识别对等节点所属的组织。（见图 6-8。）\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig8_HTML.jpg](img/520777_1_En_6_Fig8_HTML.jpg)\n\
  \n*图 6-8 对等节点的身份*\n\n在此案例中，`CA1` 已向 `P1` 和 `P2` 提供了身份。由 `CA1` 颁发的身份通过 `ORG1.MSP`\
  \ 与 `Org1` 关联，这是由通道 `C` 使用 `MSP` 通道来确定的。`ORG2.MSP` 同样将 `P3`/`P4` 识别为 `Org2` 的组成部分。\n\
  \n### 对等节点、共识与排序\n\n为了确保网络区块链上的几乎所有对等节点都能保持其信息同步，想要修改账本的应用程序需要经过一个三步流程。\n\n- 第一步，应用程序与一有限集合的支持节点进行交互，这些节点各自提供尚未应用到账本的提议响应。应用程序与之交互以更新账本的支持节点子集，由网络策略决定。\n\
  \n- 第二步，应用程序收集这些提议响应，并执行以下操作：\n    - 验证其一致性。\n    - 随后将交易发送至排序服务。\n\n- 第三步也是最后一步，排序服务将所有传入的交易进行排序，组合成一个区块，然后将该区块发送给每个邻居节点，在那里每笔交易在被记录前都会得到验证。\n\
  \n因此，构成排序服务的排序节点是一切的核心。接下来的部分将更深入地审视这一过程。\n\n## Hyperledger Fabric 共识\n\nHyperledger\
  \ Fabric 中的共识经历三个阶段：\n\n- 提案\n- 交易的排序与打包入块\n- 验证与提交\n\n### 阶段 1：提案\n\n首先，程序选择一组对等节点来生成对提议账本的更新。\n\
  \n背书策略（为某个链码设定）决定了哪些组织必须批准一项提议的账本交易，之后该交易才能被网络接受并因此得以记录。\n\n达成共识的意义即在于此：每个相关的组织都必须同意提议的账本更新，之后该更新才能被任何对等节点的账本所接受。\n\
  \n应用程序开发出被提议的交易，并将其发送给每一个必须批准它的对等节点组。每个这样的对等节点都是独一无二的。随后，支持节点通过独立执行基于交易提案的链码，生成对结算提案的响应。此更新不会应用到账本主本上；相反，它会被签名并返回给应用程序。（见图\
  \ 6-9。）\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig9_HTML.jpg](img/520777_1_En_6_Fig9_HTML.jpg)\n\
  \n*图 6-9 提案*\n\n对等节点通过使用其私钥对整个有效载荷进行签名并附上其数字签名，来接受一个提议的响应。此许可随后可用于证明某个特定响应是由公司内部的对等节点生成的。\n\
  \n当应用程序获得足够数量的对等节点响应时，阶段 1 即告结束。请注意，不同的对等节点可能会向应用程序返回不同的交易响应，从而导致结算提案出现矛盾。\n\n可能有两个原因导致这种情况：或由于链码的非确定性（链码中应避免的特性），或由于对等节点之间的不一致。\n\
  \n如果应用程序试图用一组不一致的响应交易来更新账本，该更新将被拒绝。如果提案成功，则每个响应都是一致的，因此彼此等价。\n\n\n\n### 阶段 2：交易被排序并打包成区块\n\
  \n交易工作流程继续进行到打包阶段。由于付款方接收包含各应用已接受结算提议回复的交易，并将其整理成片段，因此付款方在此过程中至关重要。\n\n除此之外，授权官员负责收集拟议的交易变更，对其进行排序，并将它们打包成区块分发给对等节点。（见图\
  \ 6-10。）\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig10_HTML.jpg](img/520777_1_En_6_Fig10_HTML.jpg)\n\
  \n**图 6-10**  \n排序交易\n\n阶段 3 从计算机将区块分发给与其连接的所有对等节点开始。当新区块生成时，对等节点会通过通道与排序节点相连，从而将新区块的副本分发给所有与发起节点相连的对等节点。每个对等节点会单独处理该区块，但处理方式与通道上所有其他对等节点相同。图\
  \ 6-11 展示了如何以此种方式保持账本恒定。同样值得注意的是，并非所有对等节点都需要连接到计算机：对等节点可以通过八卦协议级联连接到其他对等节点。\n\n\
  ![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig11_HTML.jpg](img/520777_1_En_6_Fig11_HTML.jpg)\n\
  \n**图 6-11**  \n验证与最终确定\n\n当对等节点收到一个区块时，它会按区块中交易出现的顺序处理每一笔交易。对于每笔交易，每个对等节点都会检查该交易是否已根据启动交易的链码的认可规则，获得了所请求组织的授权。（见图\
  \ 6-11。）\n\n例如，有些交易可能只需要一个组织的许可，而其他交易则可能需要多次批准才能被认定为有效。\n\n这一验证过程确保了所有相关企业都产生了相同的结果。此验证不同于阶段\
  \ 1 中的批准检查，在阶段 1 中，应用程序从其授权的对等节点接收回复，并决定是否发送拟议的交易。如果应用程序通过提交错误交易违反了批准规则，那么对等节点仍然可能在阶段\
  \ 3（验证阶段）拒绝该交易。\n\n如果交易已被正确接受，对等节点将尝试在区块链上执行它。为此，对等节点必须进行账本一致性检查，以确认账本主副本的当前状态与创建拟议更新时的账本状态一致。\n\
  \n即使交易已获得完全批准，这也并非总是可行的。例如，账本中相同资源的另一笔交易可能已被修改，以至于该交易更新不再适用，因此无法实施。由于通道内的所有对等节点都遵循相同的交易验证标准，因此账本得以保持恒定。\n\
  \n## 账本\n\nHyperledger Fabric 的 IA 账本由两个独立但相互关联的部分组成：区块链和全局状态。（见图 6-12。）\n\n两者都代表一组业务对象的信息集合。\n\
  \n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig12_HTML.jpg](img/520777_1_En_6_Fig12_HTML.jpg)\n\
  \n**图 6-12**  \n账本\n\n首先是区块链的使用。交易日志记录了所有导致世界当前状态的事件。交易被收集到添加到区块链的区块中，这使您可以查看导致当前状态的事件路径。由于区块链一旦写入就不可更改，其数据结构与世界状态的数据结构有很大不同。\n\
  \n其次，存在一个全局状态。业务对象状态集合的当前值存储在一个数据库中。程序无需遍历整个交易寄存器来计算状态的当前值，而是可以直接通过世界状态访问它。默认情况下，账本状态表示为键值对。状态可以被创建、更新和删除，因此世界状态可以频繁更改。\n\
  \n因此，全局状态是从区块链的子集生成的。\n\n### 区块链\n\n区块链记录了导致资产当前状态的事件。\n\n与使用数据库的状态不同，区块链始终以文件形式实现。（见图\
  \ 6-13。）\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig13_HTML.jpg](img/520777_1_En_6_Fig13_HTML.jpg)\n\
  \n**图 6-13**  \n带有数据库的账本\n\n账本的创世区块中包含一条提供通道初始网络状态的配置交易。区块结构是标准的，如你在“区块链基础”中所见。\n\
  \n### 交易\n\n另一方面，交易的结构很有意思。其设计如图 6-14 所示。\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig14_HTML.jpg](img/520777_1_En_6_Fig14_HTML.jpg)\n\
  \n**图 6-14**  \n带有交易的账本\n\n在此示例中，你可以看到以下字段：\n\n*   **头：** 包含一些关键的交易元数据，例如交易的链码名称和版本。\n\
  *   **签名：** 由应用客户端生成的数字签名提供。此功能用于验证交易信息未被篡改，因为创建它需要应用的私钥。\n*   **提案：** 将应用的输入参数编码到生成拟议账本更新的链码中。\n\
  \n    当链码被执行时，此提案提供一组输入变量，这些变量与当前世界状态相结合，生成新的世界状态。\n\n*   **响应：** 包含世界状态的前后值。这是智能合约的结果，如果交易被正确验证，它将被添加到账本中以更新全局系统。\n\
  *   **认可：** 这是一个所有批准的交易答案的列表，必须符合每个公司的批准策略。如果足够多的签署人签署了一笔交易，全局状态将不会发生变化。\n\n###\
  \ 世界状态\n\n*世界状态* 将业务对象属性的主要值反映为单一账本状态。大多数应用程序需要对象的当前值；测量整个区块链上某个物品的实际价值会很繁琐；相反，你可以直接从全局状态获取它。（见图\
  \ 6-15。）\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig15_HTML.jpg](img/520777_1_En_6_Fig15_HTML.jpg)\n\
  \n**图 6-15**  \n状态\n\n数据库跟踪世界的当前状态。这是可以理解的，因为数据库提供了广泛的归档操作符以及快速的状态恢复。\n\n对于全局状态数据库，有两个选项：`LevelDB`\
  \ 和 `CouchDB`。每个链码都有自己的全局状态，该状态与所有其他链码的状态不同。这意味着世界状态存储在命名空间中，只有来自同一链码的智能合约才能访问该命名空间。因此，一个链码无法看到另一个链码的世界状态。\n\
  \n\n\n## 6.12 排序服务实现\n\nHyperledger Fabric 最新版本中的排序服务是一种崩溃容错提供者，称为 *Raft*。\n\nRaft\
  \ 采用了“领导者和追随者”范式，其中通道的排序节点会动态选举出一个领导者，由该领导者将消息复制到通道的追随者节点。Raft 具有崩溃容错性，因为它能够容忍部分节点（如领导者节点）的故障，只要大多数排序节点仍然正常运行（CFT）。\n\
  \n## 6.13 总结\n\n本章详细讨论了 Hyperledger Fabric。首先介绍了 Hyperledger Fabric 的特性，然后加深了您对\
  \ Hyperledger Fabric 的理解。Hyperledger 概念之所以重要，原因如下：\n\n-   许可区块链\n-   性能良好且交易延迟低\n\
  -   可根据需求进行模块化和可配置化\n-   数据库抽象化以加速与世界状态的交互\n-   能够创建不同的通道，进而创建不同的账本\n-   能够使用不同的编程语言开发应用和链码\n\
  \n该平台没有特别的缺点。在讨论 Hyperledger 时，您还必须考虑分布式系统，以及如何在分布式系统中使用 Hyperledger。这正是共识算法概念发挥作用的地方。下一章将重点介绍分布式环境中的共识算法。\n\
  \n"
- "# 7. 区块链共识算法\n\n*共识算法*是一种使人类或机器能够在分布式环境中协作的机制。即使某些节点发生故障，系统也必须能够就所有节点共同的真实来源达成一致。换句话说，系统必须能够容忍故障。\n\
  \n在中心化设计中，系统由单个实体控制。该系统在大多数情况下可以进行调整，因为没有复杂的治理机制来在多个管理员之间达成共识。\n\n去中心化设置则完全是另一回事。假设您正在使用一个分布式数据库；您如何决定添加哪些条目？\n\
  \n为区块链铺平道路的最关键的发展是在互不信任的陌生人的环境中克服了这一困难。本章将探讨共识算法如何对加密货币和分布式账本的运作至关重要。\n\n## 7.1\
  \ 共识算法与加密货币\n\n区块链是一个存储加密货币用户余额的数据库。至关重要的是，每个人（或者更确切地说，每个节点）都拥有该数据库的副本。否则，您将很快发现信息相互矛盾，从而破坏了加密货币网络的根本目的。\n\
  \n公钥密码学确保了用户不能互相花费对方的货币。然而，网络参与者仍然必须依赖单一的真实来源来确定资金是否已被花费。\n\n为了协调参与，比特币的创造者中本聪提出了一种工作量证明方法。稍后我们将深入探讨\
  \ PoW 的工作原理；现在，我们先看看各种共识算法的一些共同特征。\n\n首先，需要那些想要贡献区块的人（称为*验证者*）提供一份抵押品。抵押品是验证者必须提交的一笔资金，这可以阻止他们做出不诚实的行为。如果他们作弊，就会失去抵押品。计算能力、加密货币甚至声誉都是抵押品的例子。\n\
  \n他们为什么要拿自己的资产冒险？因为有经济激励。这通常包括其他用户支付的费用、新铸造的加密货币单位，或两者兼有，并且通常以协议的原生加密货币形式存在。\n\n\
  最后需要的是透明度。您必须能够识别出何时有人在说谎。对他们来说，创建区块的成本应该很高，但对任何人来说验证区块的成本应该很低。这确保了普通用户能够监督验证者。\n\
  \n群体中的个体成员使用共识算法来为整个群体做出并支持最佳选择。这是一种决策系统，其中个体必须支持整体选择，无论他们是否同意。\n\n简单来说，这是一种让一群人可以做出决定的方法。例如，考虑一个由\
  \ 10 人组成的团队，他们想要选择一个对所有人都有利的项目。他们每个人都可以提出建议，但大多数人会选择最有利于自己的那个建议。这个决定会影响其他人，无论他们是否同意。\n\
  \n想象一下在数万名参与者中做同样的事情。是不是会变得困难得多？\n\n共识算法不仅与多数投票一致，而且还会寻求一个惠及所有人的解决方案。因此，网络始终是胜利的一方。\n\
  \n区块链上的共识模型是在网络世界中建立公平公正的方法。用于达成这种共识的机制被称为*共识定理*。\n\n## 7.2 共识模型的目标\n\n这些区块链共识模型有几个特定的目标，包括：\n\
  \n-   **达成一致：** 该机制尽可能多地收集群体的一致意见。\n-   **协作：** 各方都力求达成一个对整体更有利的协议。\n-   **合作：**\
  \ 每个人都像一个团队一样工作，将个人目标搁置一旁。\n-   **平等权利：** 在投票过程中，每个投票者都具有相同的价值，每个人的投票都很重要。\n-  \
  \ **参与：** 网络中的每个人都必须参与投票。没有人会被排除在外，也没有人能够投弃权票。\n\n## 7.3 不同类型共识算法\n\n拜占庭问题的另一个非常困难的方面是达成一致。即使出现一个缺陷，节点也将无法达成妥协，或者会遇到更高的难度值。\n\
  \n使用共识算法，您不必处理这个问题。它们的主要目标是尽一切必要手段达成既定目标。拜占庭共识结构在可信度上远低于区块链共识模型。\n\n因此，在可能存在冲突输出的分布式系统中，采用共识技术来获得更好或更高的结果是可取的。\n\
  \n共识算法是一种计算机工程方法，允许分散的流程或系统就*单一数据值*达成一致。共识方法用于具有多个故障节点的网络，以确保可靠性。在分布式计算和多智能体系统中，解决这个问题，即所谓的*共识问题*，至关重要。\n\
  \n共识算法必须假设某些进程和系统将不可用，并且某些通信将会丢失，以应对这种现实情况。因此，共识方法必须具备容错性。\n\n共识方法用于具有多个故障节点的网络，以确保可靠性。它们必须确保系统中的节点能够就单一的真实来源达成一致。\n\
  \n## 7.4 区块链共识算法的类型\n\n存在多种具有不同特性的区块链共识算法（见图 7-1）。以下各节将介绍其中许多算法。\n\n\n\n### 7.4.1\
  \ 工作量证明（PoW）\n\n中本聪发明了 `PoW`，这是区块链世界中最古老的共识机制。它也被称为挖矿，参与其中的节点被称为*矿工*。\n\n在这种技术中，矿工必须运用大量算力来解决复杂的数学谜题。他们采用多种挖矿技术，包括图形处理器（`GPU`）挖矿、专用集成电路（`ASIC`）挖矿和现场可编程门阵列（`FPGA`）挖矿。最先解决难题的人将获得一个区块作为奖励。\n\
  \n![../images/520777_1_En_7_Chapter/520777_1_En_7_Fig1_HTML.jpg](img/520777_1_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1\n\n共识算法的类型\n\n多种加密货币——包括比特币、莱特币、ZCash、质数币、门罗币和垂直币——都采用了`工作量证明`机制。\n\n`PoW`不仅对金融行业产生了影响，还波及了医疗保健、治理、管理等领域。事实上，它提供了通过一个地址进行多通道支付和多签名交易的选项，以提高安全性。\n\
  \n### 7.4.2 权益证明（PoS）\n\n`PoS`是`PoW`共识机制最简单且最环保的替代方案。\n\n在这种区块链系统中，区块的创建者并非扮演矿工角色，而是充当验证者。他们可以在所有人之上构建一个区块，这将节省能源和时间。为了验证该区块，他们必须投入一定数量的资金或权益。\n\
  \n此外，与`PoW`不同的是，由于该共识模型中没有奖励机制，矿工可以选择保留自己的交易手续费。\n\n因此，像以太坊这样的公司被推动在其`以太坊 2.0`版本中将范式从`PoW`升级为`PoS`。它还帮助了达世币、点点币、Decred、ReddCoin\
  \ 和 Piv X 等多个区块链生态系统的正常运行。\n\n尽管`PoS`解决了之前困扰`PoW`的一些缺陷，但市场仍然面临诸多挑战。为了解决这些问题并提供更好的区块链生态系统，涌现出了多种类型的`PoS`。`权益证明`的两种主要变体是`PoSD`和`LPoS`，接下来将讨论它们。\n\
  \n#### 7.4.2.1 委托权益证明（PoSD）\n\n在`PoSD`中，玩家质押他们的币并投票给一定数量的代表，其投入金额决定了他们所拥有的投票权重。例如，如果用户\
  \ A 向某代表投入 10 个币，而用户 B 投入 5 个，那么 A 的投票权比 B 更重要。\n\n代表们还可以通过互换手续费或固定数量的比特币获得报酬。\n\
  \n由于其基于权益权重的投票方式，`PoSD`通常被视为一种数字民主，并且是运行最快的区块链共识算法之一。该区块链共识机制的一些实际应用包括 Steem、EOS\
  \ 和比特股。\n\n#### 7.4.2.2 租赁权益证明（LPoS）\n\n`LPoS`是 Waves 平台上`PoS`共识机制的更新变体。\n\n与传统的权益证明方法不同，该共识过程允许用户将其闲置的加密货币余额租赁给完整节点，而非仅仅出租整个余额。\n\
  \n出租最多的人有最大的机会创建区块。此外，出租者可以从完整节点收取的交易手续费中获得分成。\n\n这种`权益证明`的变体提供了一种快速且安全的方式来构建公有加密货币。\n\
  \n### 7.4.3 拜占庭容错（BFT）\n\n拜占庭错误是指系统中的参与者必须就避免灾难性故障的适当方法达成一致，但其中一些参与者却无法确定的情况。`PBFT`和`DBFT`是区块链行业中两种最常见的`BFT`共识模型。\n\
  \n### 7.4.4 实用拜占庭容错（Practical-BFT）\n\n`Practical-BFT`是一种简单的方法，它通过允许用户完成计算来验证决策的有效性，从而对发送给他们的消息达成一致，以此来应对拜占庭将军问题。\n\
  \n该方随后将其决定通知其他节点，这些节点随后需要做出决定。最终的选择则基于从其他节点收集到的信息。\n\n### 7.4.5 委托拜占庭容错（dBFT）\n\n\
  `dBFT`技术由 NEO 引入，NEO 币的持有者同样有权选举代表。\n\n无论他们投入多少资金，这一点都成立。任何满足最低要求——包括经过验证的身份、足够的设备以及\
  \ 1000 个 GAS——的人都可以担任代表。之后，代表中会随机选出一名发言人。\n\n### 7.4.6 有向无环图（DAG）\n\n`DAG`是一种简单但重要的区块链共识机制，每个处理区块链业务的移动应用开发公司都应熟悉它。\n\
  \n在这种类型的区块链共识架构中，每个节点都准备成为“矿工”。如果矿工被从等式中移除，交易由用户验证，那么与交易相关的成本将降至零。任意两个节点之间验证交易的过程变得更加容易，使其更轻量、更快速、更安全。\n\
  \n尽管这些是开发环境中最常见的共识模型，但其他几种区块链共识机制也开始受到关注，包括以下内容。\n\n### 7.4.7 容量证明（PoC）\n\n所遵循的方法是“绘图”。使用这种区块链共识技术的两种加密货币是\
  \ Burstcoin 和 SpaceMint。\n\n它是如何工作的？首先你需要理解两个概念——绘图和挖矿——才能领会共识定理的本质。\n\n*   `PoC`算法使用的随机数（nonces）与比特币中使用的不同。在随机数被破解之前，你需要对你的\
  \ ID 和数据进行哈希运算。\n*   硬盘“挖矿”是下一个概念。如前所述，你一次可以获取 0 到 4095 个“勺子”，然后将其存储在你的存储空间内。系统会给你一个严格的时间限制来解析这些随机数。这个时间线说明了创建一个区块需要多长时间。\n\
  \n如果你能比其他矿工更快地解析这些随机数，你将获得一个区块作为奖励。Burst 是采用`PoC`算法的知名公司案例。\n\n### 7.4.8 燃烧证明（PoB）\n\
  \n`PoB`共识架构在能耗方面是`PoW`和`PoS`的替代方案。它的运作方式是让矿工燃烧/销毁虚拟加密货币代币，从而允许他们按照与燃烧货币成比例的方式生成区块。燃烧的币越多，他们每获得一个币赢得新区块的机会就越大。\n\
  \n然而，为了燃烧货币，他们必须将其发送到一个无法用于验证区块的地址。这通常用于分布式共识的场景。这种共识机制的最佳例子是 Slimcoin。\n\n### 7.4.9\
  \ 身份证明（PoI）\n\n`PoI`类似于授权身份的概念。它是用户私钥的一段密码学确认信息，与每笔交易相关联。\n\n每个经过身份验证的用户都可以创建和管理一个数据块，并与网络中的其他用户共享。\n\
  \n这种区块链的方法论确保了数据的有效性和完整性。因此，它是智慧城市应用的一个良好候选方案。\n\n### 7.4.10 活动证明（PoA）\n\n`PoA`结合了`PoW`和`PoS`共识模型的优点。\n\
  \n矿工们像在`PoW`中一样，使用特殊硬件和电能，竞相尽快解决一个密码学难题。然而，最终形成的区块只包含区块继承者的身份信息和奖励交易信息。\n\n`活动证明`结合了`权益证明`和`工作量证明`共识技术。它使得合法交易和矿工之间的共识得以发生。`PoA`旨在解决`PoS`和`PoW`中存在的中心化问题。它也力求以资源节约的方式实现这一目标。\n\
  \n\n\n### 7.4.11 消逝时间证明（PoET）\n\n`PoET` 基于均匀分布并提高更大比例参与者获胜几率的原理。因此，每个参与节点都需要等待一个特定时间才能开始下一轮挖矿过程。等待时间最短的成员将被请求提议一个区块。\n\
  \n同时，每个节点自行选择进入休眠模式前的等待时长。\n\n### 7.4.12 重要性证明（PoI）\n\n`PoI` 是 NEM 开发的`PoS`协议变体，考虑了验证者的角色。这不仅受其持有份额的数量和可能性影响，还受其他因素影响，例如声誉、总余额以及通过每个特定地址完成的交易数量。\n\
  \n图 7-2 中的表格比较了不同的共识算法。\n\n`![../images/520777_1_En_7_Chapter/520777_1_En_7_Fig2_HTML.jpg](img/520777_1_En_7_Fig2_HTML.jpg)`\n\
  \n图 7-2\n\n算法对比表\n\n## 7.5 分布式系统与区块链技术中的共识\n\n区块链的两种主要形式是许可链，也称为授权区块链。在无许可链中，节点是匿名的。\n\
  \n添加一个新的经过修改的交易区块可能会导致分叉。当一个有效交易与一个无效交易不一致时，就会发生分叉。共识算法的主要目的是在节点间达成共识，以便每个节点能就一个真实值达成一致。在授权区块链中，节点不是匿名的，而是被视为已知实体。\n\
  \n此外，在定义共识系统时，需要考虑通信范式是同步的还是异步的。崩溃错误、瞬态错误、遗漏错误、安全错误、软件错误、拜占庭错误、时间错误和环境问题都是错误的例子。\n\
  \n当进程突然停止时，就会发生崩溃故障。在同步环境中，超时机制有助于发现这种故障，但在非同步环境中，故障很难被识别。\n\n- **延续失败：** 非必然且持久的失败被称为*瞬态*失败。电池电量低或电涌可能导致硬件问题。这些软件缺陷可能是内部代码中的缺陷，这些缺陷很少出现，且在测试时未被发现。\n\
  \n- **可靠性失败：** 可靠性失败是由于安全攻击和身份冒充造成的。因此，数据有可能被损坏。\n\n- **软件失败：** 软件失败是由于设计和建模中的错误导致的。这种失败可能导致其他类型的失败，例如崩溃或遗漏。\n\
  \n- **拜占庭失败：** 拜占庭失败是一种在系统每个成员身上表现各异的故障。它使得所有成员难以达成一致意见或共识。\n\n这些错误使系统感到困惑，使其更难接受它们。例如，一个服务器在一个观察者看来可能已宕机，而在另一个观察者看来却运行正常。由于他们观点冲突，两个观察者将无法达成共识，并且该服务器不能被认定为失效。\n\
  \n- **时间失败：** 当错过截止时间时，就会发生时间失败。也就是说，可能得到了正确的结果，但为时已晚，已不再有用。在实时系统中，这类失败极其重要。\n\n\
  - **环境扰动：** 如果解决方案不能适应环境变化，它就会失败。环境的变化可能导致一个正确的结果变得不正确。\n\n区块链是由去中心化账本构成的，不受中央机构管理。恶意行为者可能因试图引发故障而获得丰厚回报。因此，思考拜占庭问题及其解决方案对区块链至关重要。\n\
  \n拜占庭错误在系统的每个成员中表现各异。它阻止所有参与者达成一致或形成共识。这些错误使系统感到困惑，使其难以接受这些错误。\n\n## 7.6 复习题\n\n\
  1.  “共识是分布式系统中的一个基本概念，但它是区块链独有的。” 这个说法正确还是错误？\n\n2.  哪个说法是正确的？\n    1.  共识算法是一种允许公司或机器在分散环境中进行协作的方法。\n\
  \    2.  共识算法是一种阻止用户或机器在分布式环境中协作的方法。\n    3.  共识算法阻止用户或机器在分布式环境中协作。\n    4.  你可以使用共识过程来展示等价关系，这是一种机制。\n\
  \n3.  关于工作量证明的概念，以下哪个说法是正确的？\n    1.  `PoW`系统允许知道秘密（通常是公钥）的参与者执行更快的计算。\n    2. \
  \ `PoW`系统允许知道秘密（通常是私钥）的参与者执行更快的计算。\n    3.  通过这个过程，矿工必须使用大量的计算能力来解决复杂的数学难题。\n  \
  \  4.  通过这个过程，矿工必须使用算法来解决复杂的数学难题。\n\n4.  关于活动量证明，以下哪个说法是正确的？\n    1.  就像在`PoW`中一样，矿工们竞相使用专门的硬件和电力尽快解决一个密码学难题。\n\
  \    2.  矿工们使用特定的硬件和电能尽快解决一个密码学难题，就像在`PoW`中一样。\n    3.  矿工们使用它，通过专门的软件和电能尽快解决一个密码学难题，就像在`PoW`中一样。\n\
  \    4.  矿工们竞相使用专门的软件和能量尽快解决一个密码学难题，就像在`PoW`中一样。\n\n5.  “在其运作中，`PoI` 是一个`PoS`版本，它考虑了股东和验证者的角色。”\
  \ 你认为这个陈述是真的还是假的？\n\n## 7.7 复习答案\n\n1.  答：错误。共识是分布式系统中的一个主要概念，而不仅仅是区块链中的概念。\n2.\
  \  答：A，共识算法是一种允许公司或机器在分散环境中进行协作的方法。\n3.  答：C，在这种技术中，矿工必须使用大量的计算能力来解决复杂的数学谜题。\n4.\
  \  答：A，就像在`PoW`中一样，矿工们竞相使用专门的硬件和电力尽快解决一个密码学难题。\n5.  这个说法是正确的。\n\n\n\n## 7.8 本章小结\n\
  \n区块链作为一种分布式账本，已激发出横跨众多行业的广泛兴趣。区块链技术正被用于多个领域，以创造各类产品和服务。要理解区块链对各种应用的影响和适用性，掌握其核心组件、功能特性和架构至关重要。\n\
  \n`比特币`这种加密货币，是区块链最广为人知的应用。由于区块链网络是一个分布式账本，它需要在节点之间达成共识机制，以确保其正常运作。\n\n为了理解区块链对不同应用的影响和适用性，弄清其基本组件、功能特征和设计原理十分关键。现代世界已提出了多种共识算法，每种算法都具备独特的可靠性和可扩展性特征。单一共识算法无法满足所有企业的需求。评估不同共识算法的优势、弱点及应用场景是必要的。\n\
  \n本章识别并讨论了与区块链共识、隐私性和可扩展性相关的参数。针对这些因素，对各种共识技术进行了比较和对比分析。高效共识算法的开发以及现有算法的评估方面仍存在研究空白。本书将指导开发者和研究人员完成评估和创建共识算法的全过程。\n\
  \n由于存在多种明确的共识算法，区块链网络的本质极具灵活性。世上没有所谓的\"完美\"区块链共识算法。但我们认为，这正是技术的魅力所在：它总是在不断改进。由于本章详细解释了区块链和共识算法，你现在应该已经准备好基于这些技术启动一个项目了。下一章将介绍本书的第一个项目。\n\
  \n"
- "# 8. 区块链项目共识算法\n\n本项目是一个用 Python 编写的基础区块链。它是一组以特定方式链接在一起的区块，使得其中存储的信息无法被修改（随着更多区块加入区块链，修改难度会越来越大）。\n\
  \n该区块链使用 PoW（工作量证明）算法来挖掘每个区块。其目的是找到满足特定条件的、区块中所有储存数据的哈希值。为此，每个区块都有一个名为 `nonce` 的可变数据，必须对其进行修改，直到发现所需的哈希值。\n\
  \n例如，比特币中所需的哈希值要求前 *X* 位数字为零。`X` 的值决定了挖矿的难度（`X` 越大，难度越高）。在这个区块链中，`X` 是区块链的一个属性，可以在其构造函数中设置。然而，在比特币和大多数其他币种中，这取决于支持网络的节点的挖矿能力。\n\
