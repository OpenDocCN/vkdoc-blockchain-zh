  ## 13.7 本章小结


  本章讨论了如何基于意大利游戏“女巫喊颜色”创建一个信息物理系统。该项目展示了信息物理系统的特性以及分布式系统所使用的通信方式。该项目借助 BlocklySoS
  建模图进行建模。下一章将深入探讨一个更复杂的项目，这将帮助你更好地理解分布式系统架构。


