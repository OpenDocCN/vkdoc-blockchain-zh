- "# 14. 使用 MATLAB 智能农场项目\n\n本项目阐述了如何有效控制对共享资源的互斥访问。为了实现这种互斥性，项目在 MATLAB 中使用 Simulink\
  \ 框架创建。项目名称为*智能农场*。在此项目中，一支自主机器人车队执行一系列农业任务，包括整地、浇灌植物以及收割已种植的植物。\n\n## 14.1 智能农场项目描述\n\
  \n该项目探讨了一个关于对共享资源进行分布式互斥访问的案例研究。背景是一个*智能农场*，一支自主机器人车队负责整地、浇灌植物、收割植物产品等。\n\n每个机器人在田地与主农场建筑和仓库之间循环移动。农场的地理布局是，有两个主要的生产田地（命名为北田和南田），通过一条乡村道路可从主农场区域到达，这条道路要经过一座横跨河流的小桥（见图\
  \ 14-1）。同一时间只能有一个机器人使用桥梁，这意味着机器人需要通过 V2V 通信来协商对桥梁的独占访问权，且没有中央控制中心。\n\n![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig1_HTML.jpg](img/520777_1_En_14_Fig1_HTML.jpg)\n\
  \n*图 14-1* 河上的桥\n\n每个机器人可以被视为在多种操作模式之间循环切换，如图 14-2 所示。当机器人需要移动到田地或农场建筑时，它会进入 `Ask4Bridge`\
  \ 模式，在此模式下它请求访问桥梁，并将此请求通信给其他处于 `Ask4Bridge` 或 `Bridge` 模式的机器人。\n\n该项目的主要目标是定义允许对桥梁进行独占访问的分布式通信协议，以避免在桥梁上发生碰撞。\n\
  \n![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig2_HTML.jpg](img/520777_1_En_14_Fig2_HTML.jpg)\n\
  \n*图 14-2* 操作模式\n\n### 14.1.1 项目需求\n\n系统必须满足以下需求：\n\n- *需求 1*：系统由数量非预先确定的相同机器人组成，它们通过无线连接相互通信。\n\
  - *需求 2*：每个机器人遵循图 14-2 所描述的循环操作模式行为。\n- *需求 3*：不能有两个机器人同时访问桥梁（互斥性，安全性）。\n- *需求 4*：一个未获得桥梁访问权限的机器人需要等待，直到桥梁被清空，然后才发出新的访问请求。\n\
  - *需求 5*：如果一个机器人发出了桥梁访问请求，那么它迟早会获得访问权限（*存活性*）。\n- *需求 6*：如果桥梁访问权限被授予给一个从北田来的机器人，并且至少还有另外两个机器人\
  \ R1 和 R2 即将到来——R1 同样来自北田，R2 来自农场或南田——那么下一次访问权限不能授予给同样来自北田的 R1。此规则同样适用于机器人从南田或农场过桥的对称情况（*公平性*）。\n\
  - *需求 7*：该系统基于完全分布式的算法，没有任何中心化元素。\n- *需求 8*：机器人不参照共同的时钟，每个时钟都是自主且非同步的。\n\n\n好的，作为高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例，对给定的英文文本进行专业翻译。\n\
  \n以下是翻译后的中文文档：\n\n\n### 14.1.2 解决方案提示\n\n机器人可被视为分布式系统的节点，将使用给定的规范形式进行建模。通常，每个节点将被建模为某种形式的*扩展有限状态机*，节点将利用该形式提供的机制交换数据，以实现不同状态机之间的通信。\n\
  \n节点（机器人）用编号标识，必要时可使用其标识符发送点对点通信。\n\n作为建议，你可以基于 2PC（两阶段提交协议）算法（标准或线性）来组织解决方案，其中需要定义一个协调者，将它的提议发送给其他节点。\n\
  \n请求访问桥梁的机器人 `R1` 在每次运行中充当协调者。因此，它向其他机器人广播访问请求。接收到来自 `R1` 的这个请求的机器人，如果其工作模式不是 `Ask4Bridge`\
  \ 或 `Bridge`，则简单地回复 `agree`。处于 `Bridge` 模式的机器人将回复 `abort`，因为它当前正占用桥梁。接收到来自 `R1`\
  \ 请求且处于 `Ask4Bridge` 模式的机器人 `R2`，如果其标识符低于 `R1`，则回复 `abort`；否则回复 `agree`。但在这种情况下，`R2`\
  \ 还必须中止它在进入 `Ask4Bridge` 模式时启动的算法运行。\n\n离开 `Bridge` 模式的机器人向其他节点广播桥梁空闲的信息，以便处于 `Ask4Bridge`\
  \ 模式的节点可以重试它们的请求。\n\n请注意，一个节点应能启动自己的 2PC 运行，*同时*监听来自参与其他 2PC（两阶段提交协议）运行的其他机器人发来的消息。这需要使用一些并发线程，或*状态图*区域。\n\
  \n在第一阶段，你应该专注于 2PC 方案，考虑一个由三个或四个机器人组成的固定集合，并仔细研究它们的交互，忽略活性和公平性要求，仅考虑三种运行模式（`Ask4Bridge`、`Field\
  \ Action` 和 `Bridge`）。\n\n在第二阶段，你扩展模型以考虑其他运行模式、可能更多的机器人和/或活性/公平性要求。\n\n请注意，通常，工具（为了能够模拟或形式化验证模型）需要通过物理复制粘贴来实例化固定数量的对象（节点）。\n\
  \n## 14.2 实施项目\n\n该项目设计使用三个机器人在田野与主要农业建筑和仓库之间循环移动。农场的地理位置决定了有两个主要生产田（命名为北田和南田）。机器人的运动满足前述使用互斥实现分布式系统中并发控制的三个基本要求。\n\
  \n除此之外，该系统基于一个完全分布式的算法，没有任何集中化元素。机器人不参考公共时钟，每个时钟都是自治的且不同步。\n\n该项目使用 MATLAB 实现，并借助\
  \ Simulink 工具设计机器人。实施需要以下 MATLAB 依赖项：\n\n- Simulink\n- Stateflow\n- Robotics System\
  \ Toolbox\n- Navigation Toolbox\n\n下一节将介绍 Simulink 中内置的、并在本项目中使用到的功能。\n\n### 14.2.1\
  \ 环境模型\n\nMATLAB 内置的 Robotics Visualizer 使您能够在 2D 移动机器人环境中模拟和原型设计算法。多机器人生态系统还支持在\
  \ 2D 多机器人移动机器人环境中开发和原型设计算法。这些功能可通过 MATLAB 和 Simulink 接口访问。\n\n### 14.2.2 传感器模型\n\
  \n在本项目中，Lidar Sensor 模拟了用于可视化和算法原型设计的 2D 视线传感器。此功能可在 MATLAB 和 Simulink 界面中使用（见图\
  \ 14-3）。\n\n![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig3_HTML.jpg](img/520777_1_En_14_Fig3_HTML.jpg)\n\
  \n图 14-3\n传感器\n\n### 14.2.3 多机器人激光雷达传感器\n\n除了前面列出的功能外，还使用了多机器人激光雷达传感器来模拟多机器人环境中的二维视线探测器。该传感器将测试占用地图以及对环境中使用有限半径的其他机器人的视线。此功能可在\
  \ MATLAB 和 Simulink 界面中使用。\n\n## 14.3 系统架构\n\n本项目将两阶段提交协议技术应用于机器人的移动。\n\n在系统架构下，一次只能有一个进程运行关键部分（CS）。在分布式网络中，无法使用共享变量或本地内核实现互斥。创建分布式互斥的唯一方法是使用消息转发。通过分布式系统算法来处理不可预见的通信延迟和系统状态的部分信息（见图\
  \ 14-4）。\n\n![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig4_HTML.jpg](img/520777_1_En_14_Fig4_HTML.jpg)\n\
  \n图 14-4\n多传感器\n\n为了避免通过桥梁的机器人之间发生碰撞，架构的设计方式如下：当机器人需要移动到田地或农场建筑时，它进入 `Ask4Bridge`\
  \ 模式。在那里，它请求访问桥梁，并将此请求传达给处于 `Ask4Bridge` 模式的机器人。分布式通信协议（两阶段提交协议）允许独占访问，以避免桥梁上的碰撞。\n\
  \n在上述架构中，事务被定义为一组操作。根据应用标准，每个事务都被赋予一个截止时间。操作被认为是牢固且真实的，并具有相同的严重级别。超过截止日期的事务将被立即取消。\n\
  \n当事务准备“提交”时，两阶段提交协议启动。由一个单独的协调机器（本例中为机器人 1）启动。机器人 2 和 3 是其他参与者，它们将等待来自监管者（机器人 1）的命令。\n\
  \n这种技术确保了事务的原子性：要么整个事务反映在系统的最终状态中，要么什么都不反映。即使只有一个参与者无法提交，该事务也将被终止。换句话说，每个参与者对事务都有“否决”权。两阶段提交协议的基本流程如图\
  \ 14-5 所示。\n\n![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig5_HTML.jpg](img/520777_1_En_14_Fig5_HTML.jpg)\n\
  \n图 14-5\n智能农场的系统架构\n\n## 14.4 系统建模\n\n所有建模均在 MATLAB 的帮助下完成。使用 Simulink 工具，我为机器人的运动开发了一个\
  \ State flow 模型。为了移动机器人，该程序使用了 Robotics System Toolbox 和 Navigation Toolbox。（要执行此任务，请注意\
  \ MATLAB 中提供了免费的插件。）\n\n### 14.4.1 机器人可视化工具和激光雷达传感器\n\n机器人可视化工具用于开发机器人架构。此外，通过为每个机器人使用激光雷达传感器，可以验证机器人的运动。激光雷达传感器还可以模拟二维视线传感器，如图\
  \ 14-6 所示。\n\n![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig6_HTML.jpg](img/520777_1_En_14_Fig6_HTML.jpg)\n\
  \n图 14-6\n两阶段提交协议（2PC）\n\n\n\n### 14.4.2 避障逻辑与*两阶段提交（2PC）*协议概念\n\n为防止机器人在状态转换过程中发生碰撞，本项目采用了**两阶段提交（2PC）协议**概念来实现过渡。为实现此概念，项目为机器人引入了一种基于投票的移动模式。当某个机器人想要转换到不同状态时，它会请求进入`Ask4Bridge`模式。随后，协调器会判断是否有其他机器人也请求了相同模式。若没有，则允许其继续移动。为了防止机器人在移动过程中相互碰撞，项目还使用了\
  \ MATLAB 中提供的避障逻辑。\n\n### 14.4.3 北农场、南农场与仓库的架构\n\nMATLAB 中有一项名为*多机器人环境*的功能，用于构建不同的场地，例如北农场、南农场和仓库。在此平台上，用户可以创建“n”个机器人并追踪其移动轨迹。\n\
  \n这是 MATLAB 中 Navigation Toolbox 插件内置的一项功能。MATLAB 对多机器人环境的定义如下：“多机器人环境使您能够在二维多机器人移动机器人场景中模拟和原型化算法。”（见图\
  \ 14-7。）\n\n![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig7_HTML.jpg](img/520777_1_En_14_Fig7_HTML.jpg)\n\
  \n图 14-7\n机器人可视化器与激光雷达传感器\n\n## 14.5 实现两阶段提交协议\n\n当事务准备“提交”时，2PC 协议便开始生效。一个单一的主控系统（初始阶段为机器人\
  \ 1）会启动该协议。\n\n2PC 协议包含两个阶段，如下所示（假设在初始阶段，机器人 1 是协调器，机器人 2 和 3 是参与者）。\n\n- **阶段 1：**\
  \ 主控机器人 1 询问每个个体是否已完成其事务任务并准备好提交。每位成员给出“是”或“否”的答复。\n- **阶段 2：** 组织者统计所有答复。如果所有工作节点都回答“是”，则事务将被完成；否则将中止。主控向每个工作节点发送最终提交选择的决定，并接收响应。\n\
  \n该技术确保操作具有原子性：要么整个操作反映在系统的最终状态中，要么完全不反映。即使只有一个参与方无法提交，事务也会被取消。换句话说，每个参与方对事务拥有*否决权*。\n\
  \n![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig8_HTML.jpg](img/520777_1_En_14_Fig8_HTML.jpg)\n\
  \n图 14-8\n避障逻辑\n\n它还确保了事务的长期可行性。在步骤 1 中回答“是”之前，每个参与方都会双重检查事务的所有写入操作是否已持久化写入存储。这使得主控能够就事务做出最终决定，而无需担心投票“是”的参与者后续会失败（见图\
  \ 14-8）。\n\n### 14.5.1 需求\n\n本项目在实现互斥时满足了分布式系统并发控制的三个基本需求：\n\n- 互斥与安全性\n- 活性\n-\
  \ 公平性\n\n允许多个进程以互斥的方式访问共享资源或数据源，具体如下：\n\n- 分布式系统中没有可用于构建互斥和同步原语的公共变量。\n- 共享信息的唯一途径是通过数据传输。\n\
  \n这三个基本需求的满足方式如下：\n\n- **互斥与安全性：** 在任何给定时间，只有一个进程可以运行关键部分。\n- **活性：** （无死锁或无饥饿。）两个或多个参与方不应无限期等待永远不会到达的通信。\n\
  - **公平性：** 每个进程都有平等的机会完成关键部分。原则上，公平性意味着关键部分执行请求按照它们到达系统的顺序被处理。\n\n除上述需求外，我们还实现了以下需求：\n\
  \n- 系统由数量不定的相同机器人组成，它们借助激光雷达传感器和避障逻辑，通过无线连接相互通信。\n- 每个机器人都借助机器人可视化器工具遵循循环操作模式行为。\n\
  - 未获得桥接授权的机器人会等待桥接通畅，然后才借助 2PC 协议概念发出新的访问请求。\n\n系统基于一个完全分布式的算法，借助 2PC 协议概念，不存在任何集中化元素。\n\
  \n### 14.5.2 遇到的问题\n\n在实施本项目时，出现了以下问题：\n\n- 由于两阶段提交协议的阻碍特性，导致缺乏可扩展性。\n\n  两阶段提交协议最大的问题在于它是一种阻碍性协议。如果主控永久性故障，某些参与方将无法完成其操作。在一个参与者向主控提交了同意消息后，它将会停顿，直到收到提交或回滚指令。\n\
  \n- 一旦参与者确认准备好提交，它必须能够在之后提交该事务，即使其中途崩溃。这需要将检查点写入持久化存储。\n\n- 最糟糕的情况是主控本身也是一个参与者，并对协议的结果进行投票。那么，主控的崩溃可能会同时抹去它自身和一个成员，导致协议保持阻塞状态，即使只发生了一次故障。由于通信复杂度低，2PC\
  \ 仍然是一种常见的共识协议。然而，在发生故障时，如果每个节点都自愿成为恢复节点，复杂度可能会上升到`O(n²)`。\n\n尽管如此，2PC 可能因主控故障而阻塞，这是一个严重问题，会严重降低可用性。如果事务可以在任何时刻回滚，协议可以在节点超时时恢复；但如果提交决定必须被视为永久性的，那么单个故障就可能导致整个系统停滞。此外，已开发出三阶段提交协议，它以额外的消息延迟为代价，消除了\
  \ 2PC 的阻塞问题（见图 14-9）。\n\n![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig9_HTML.jpg](img/520777_1_En_14_Fig9_HTML.jpg)\n\
  \n图 14-9\n北农场、南农场与仓库的模型架构\n\n\n\n## 14.6 总结\n\n在分布式计算机系统中，提交协议提供了全局原子性。这确保了跨计算机网络的事务不会在所有网络节点上结束，也不会在所有节点都失败时完全不执行（即要么全部成功，要么全部失败）。\n\
  \n分布式计算是一种利用联网的独立计算机协作完成项目的方法。根据这一范式，中央计算机拆分任务并将其交付给客户端计算机来完成。得益于提交机制，这种方法能够承受单个客户端故障。\n\
  \n*两阶段提交协议*的缺点是，如果协调者失败，所有客户端资源都可能被无限期冻结。提交的三阶段协议中使用超时转换来弥补这一缺陷。如果协调计算机发生故障，超时转换允许在预定时间释放资源。\n\
  \n本章涵盖了一种可用于设计分布式系统的基本协议。通过两个阶段——提交请求阶段和提交阶段——两阶段提交方法保证了原子性。在提交请求阶段，协调计算机向网络上每一台其他客户端计算机发送请求，然后等待来自每个客户端的响应消息。如果收到所有消息，则执行步骤\
  \ 2；如果存在客户端错误且未收到所有消息，则执行步骤 1。所有客户端都会收到中断通知。\n\n以这种方式使用 `MATLAB` 是分布式系统的一个绝佳示例。机器人的运动是借助\
  \ `MATLAB` 工具设计的。两阶段提交协议用于分布式系统中的消息事务处理。该项目是对共享资源实现分布式互斥访问的案例研究。场景是一个智能农场，其中一支自主机器人车队执行诸如整地、植物浇水、收获农作物等活动。\n\
  \n下一章介绍一个具有更多分布式系统特性的高级项目示例。该项目名为 *Platoon*。\n\n"
- "# 15. Platoon 项目\n\n本章解释如何基于一个名为 *Platoon* 的游戏开发一个网络物理系统。\n\n*Platoon* 是 Ocean\
  \ Software 于 1987-1988 年发行的一款视频游戏，最初面向 8 位家用电脑，随后推出 16 位版本以及任天堂娱乐系统（NES）版本。该游戏受战争电影\
  \ *Platoon* 启发，由不同游戏机制的关卡组成，包含第三人称和第一人称视角。1988 年，Sunsoft 还开发了一款街机移植版本，名为 *Vs. Platoon*，基于\
  \ NES 和从任天堂获得许可的任天堂 Vs. 系列系统。根据维基百科，该游戏包含几个阶段。^(¹²)\n\n该游戏由四个关卡组成：¹\n\n*   *丛林与村庄:*\
  \ “通过由垂直通道连接的横向卷轴环境迷宫，具有二维移动和第三人称侧视视角”。路径上遍布陷阱和越共。玩家一次控制一名士兵，但可以随时用其他士兵替换他，例如为了避免让已经受伤的士兵冒险。玩家可以跳跃、蹲伏、射击和投掷手榴弹，且弹药有限。在最后部分，玩家需要探索村庄的小屋（这些小屋会暂时变得透明），以寻找继续游戏所需的物品。\n\
  \n*   *游击队:* 游戏转变为第一人称射击游戏，小地图占据屏幕的一半。当你遇到也会从淹没隧道的洪水中出现的游击队时，移动会停止，你需要查看瞄准器。当你进入房间时，瞄准器变为指针用于检查物体；通过这种方式，你能找到继续游戏所需的元素——补给品和陷阱。\n\
  \n*   *碉堡:* 这是一个固定屏幕的瞄准器射击游戏；画面是黑暗的，只有枪口的闪光才能被敌人注意到，除非玩家用照明弹暂时照亮场景。弹药和照明弹有限。\n\n\
  *   *巴恩斯的丛林与碉堡:* 一个由固定 2.5D 第三人称画面组成的迷宫，玩家需要从屏幕底部穿越到顶部，避开障碍物并借助指南针射击敌人。弹药和总时间有限。最终\
  \ Boss 是巴恩斯，需要使用手榴弹攻击。\n\n五名排成员每人可以承受四次攻击才会死亡。还有一个总体士气条，当无辜平民受伤或被击中时会下降，通过收集食物和药品可以补充。如果士气降至零，或者所有队员都阵亡，则游戏失败。\n\
  \n在本章中，你将学习如何借助 Kilobots 的移动来实现这个游戏。\n\n## 15.1 游戏环境\n\n1.  AE-1：Kilobots 将在白板上操作。\n\
  2.  AE-2：白板中央将放置一个障碍物。\n\n### 15.1.1 SoS 组织\n\n1.  ASoS-1：`SoS` 由 N 个 Kilobots 组成。\n\
  2.  ASoS-2：`SoS` 还包含一个控制器，负责将程序加载到 Kilobots 的内存中。\n3.  ASoS-3：`SoS` 在组成 `SoS` 的\
  \ Kilobots 之间进行排级编队。\n4.  ASoS-4：当 `SoS` 启动时，Kilobots 排成一条直线，彼此相距 D 厘米。\n5.  ASoS-5：当\
  \ `SoS` 运行时，Kilobots 之间的距离保持在大约 D 厘米。\n6.  ASoS-6：领导者在执行前确定。\n7.  ASoS-7：所有 Kilobots\
  \ 都知道领导者的 ID。\n\n### 15.1.2 计算机系统级\n\n1.  CCS-1：每个 Kilobot 都有一个 `RUMI` 用于交换消息。\n\
  2.  每个 Kilobot 都有一个 `RUMI` 用于与控制器通信。\n3.  控制器有一个 `RUMI` 用于与 Kilobots 通信。\n4.  每个\
  \ Kilobot 都有一个 `RUMI` 用于估计距离。\n\n### 15.1.3 系统级组织\n\n1.  CSoS-1：每个 Kilobot 将使用其\
  \ `RUMI` 来交换关于方向的信息，在加入排级编队时以及离开排级编队时。\n2.  CSoS-2：当 `SoS` 启动时，每个 Kilobot 通过传输消息通知相邻的跟随者它是领导者。\n\
  3.  CSoS-3：每个 Kilobot 都有一个 `RUPI`，用于利用信号功率估计发送者和接收者之间的距离。\n\n### 15.1.4 涌现观点\n\n\
  1.  E-1：多个 Kilobots 的交互导致了一个独特的排级编队。\n\n### 15.1.5 动态性观点\n\n1.  D-1：该排级编队允许任何 Kilobot\
  \ 成为其成员。\n2.  D-2：该排级编队至少由两个 Kilobots 组成。\n3.  D-3：只允许在排级编队的尾部引入新的 Kilobot。\n4.\
  \  D-4：该排级编队仅允许最后一个 Kilobot 离开。\n\n### 15.1.6 时间观点\n\n1.  T-1：Kilobot 将根据本地时钟 T-2\
  \ 测量时间。时间相关的事件由消息交换触发。\n2.  T-3：当一个 Kilobot 启动时，它将为电机准备 Mms（毫秒）的时间。\n\n## 15.2 网络物理系统\n\
  \nKilobots 将帮助你实现你的概念。Kilobots 被用来执行排级编队的移动。Kilobot 群体是一个由一万个机器人（1024 个）组成的群体，可用于开发和测试高增长群体中的集体行为。\n\
  \n每个机器人具备独立群体机器人的基本能力（可配置控制器、基本的移动能力和本地通信能力），但它们由低成本组件构成，并且主要由自动化系统制造。\n\n此外，该系统的架构使得单个操作员能够简单灵活地控制一个庞大的\
  \ Kilobot 群体，包括对机器人的“免手动”编程、开机和充电。本项目利用 Kilobot 群体来研究集体的“人工”智能（例如同步、集体运输和身份识别），并测试将个体最低能力与群体行为联系起来的新构想。\n\
  \n本项目希望通过使用理论-实验混合方法，在鲁棒性、可扩展性、自组织和受限个体的涌现集体方面获得新的算法见解。\n\n## 15.3 Kilobot 源代码\n\
  \n\n```c\n#include <stdio.h>\n#include \"platoon.h\"\n#include <math.h>\n#ifdef\
  \ SIMULATOR\n#include <stdio.h>  // 用于 printf\n#include <stdlib.h>\n#else\n#include\
  \ <avr/io.h>   // 用于微控制器寄存器定义\n#endif\n\n#define RED RGB(3,0,0)\n#define GREEN RGB(0,3,0)\n\
  #define BLUE RGB(0,0,3)\n#define WHITE RGB(3,3,3)\n#define STRAIGHT 1\n#define LEFT\
  \ 2\n#define JOIN 3\n#define QUIT 4\n#define OK 5\n#define LEAVE 6\n#define SPEED_DOWN\
  \ 7\n#define TURN_LEFT_DELAY 126\n#define GO_STRAIGHT_DELAY 700\n#define JOIN_DELAY\
  \ 150\n#define FOLLOW_DELAY 220\n#define STANDARD_DISTANCE 80\n#define NORMAL_SPEED\
  \ 70\n#define CAN_LEAVE 2\n#define CAN_JOIN 3\n#define LEAVE_TIME 2500\n#define\
  \ END_TIME 20000\n\nREGISTER_USERDATA(USERDATA)\n\nvoid message_rx(message_t *m,\
  \ distance_measurement_t *d) {\n    mydata->new_message = 1;\n    mydata->received_msg\
  \ = *m;\n    mydata->dist = *d;\n}\n\nvoid setup_message(uint8_t data) {\n    mydata->transmit_msg.type\
  \ = NORMAL;\n    mydata->transmit_msg.data[0] = kilo_uid & 0xff; // ID 的低字节，目前未实际使用\n\
  \    mydata->transmit_msg.data[1] = data;\n    mydata->transmit_msg.crc = message_crc(&mydata->transmit_msg);\n\
  }\n\nmessage_t *message_tx() {\n    return &mydata->transmit_msg;\n}\n\nvoid setupUserData()\
  \ {\n    mydata->cur_distance = 0;\n    mydata->new_message = 0;\n    mydata->turning\
  \ = 0;\n    mydata->joining = 0;\n    mydata->following = 0;\n    mydata->follower_id\
  \ = kilo_uid + 1;\n}\n\nvoid setup() {\n    setupUserData();\n    if (kilo_uid ==\
  \ 0)\n        set_color(WHITE); // 领队机器人的颜色\n    else if (kilo_uid == CAN_JOIN)\
  \ {\n        mydata->my_leader = 255;\n        set_color(BLUE); // 加入机器人的颜色\n  \
  \  } else {\n        set_color(RED); // 移动机器人的颜色\n        mydata->my_leader = kilo_uid\
  \ - 1;\n    }\n}\n\n// 领队代码\n/*********************************************************************/\n\
  \nint checkDistance() {\n    if (mydata->new_message && mydata->received_msg.data[0]\
  \ == mydata->follower_id) {\n        if (estimate_distance(&mydata->dist) > STANDARD_DISTANCE\
  \ + 3)\n            return SPEED_DOWN;\n    }\n    return -1;\n}\n\nvoid speedCorrection(int\
  \ distance) {\n    if (distance == SPEED_DOWN)\n        set_motors(0, 0);\n    else\n\
  \        set_motors(kilo_turn_left, kilo_turn_right);\n}\n\nvoid leader() {\n  \
  \  mydata->myClock = kilo_ticks % (GO_STRAIGHT_DELAY + TURN_LEFT_DELAY);\n    if\
  \ (mydata->myClock < GO_STRAIGHT_DELAY) {\n        speedCorrection(checkDistance());\n\
  \        setup_message(STRAIGHT);\n    } else {\n        set_motors(kilo_turn_left,\
  \ kilo_turn_right);\n        setup_message(LEFT);\n    }\n}\n\n// 跟随者代码\n/*********************************************************************/\n\
  \nint handleMessage() {\n    if (mydata->new_message && mydata->received_msg.data[0]\
  \ == mydata->my_leader) {\n        return mydata->received_msg.data[1];\n    }\n\
  \    return 0;\n}\n\nint handleOther() {\n    if (mydata->new_message && mydata->received_msg.data[0]\
  \ != mydata->my_leader) {\n        return mydata->received_msg.data[1];\n    }\n\
  \    return 0;\n}\n\nint goStraight() {\n    return (kilo_ticks - mydata->message_timestamp)\
  \ > GO_STRAIGHT_DELAY;\n}\n\nint handleTurnLeft() {\n    return (kilo_ticks - mydata->message_timestamp)\
  \ > TURN_LEFT_DELAY;\n}\n\nint passedDelay() {\n    return (kilo_ticks - mydata->message_timestamp)\
  \ >= 346;\n}\n\nvoid leave() {\n    mydata->my_leader = 255;\n    set_color(GREEN);\n\
  \    set_motors(kilo_turn_left, kilo_turn_right);\n}\n\nvoid join() {\n    set_motors(kilo_turn_left,\
  \ kilo_turn_right);\n    setup_message(JOIN);\n    if (mydata->new_message && mydata->received_msg.data[1]\
  \ == OK) {\n        mydata->my_leader = mydata->received_msg.data[0];\n        mydata->joining\
  \ = 1;\n    }\n}\n\nvoid prepareToFollow() {\n    mydata->follow_timestamp = kilo_ticks;\n\
  \    mydata->joining = 0;\n    mydata->following = 1;\n}\n\nvoid followPlatoon()\
  \ {\n    if (kilo_ticks - mydata->follow_timestamp < FOLLOW_DELAY) {\n        set_motors(kilo_turn_left,\
  \ kilo_turn_right);\n        set_color(RED);\n    } else mydata->following = 0;\n\
  }\n\nint checkJoin() {\n    if (mydata->following) {\n        followPlatoon();\n\
  \        return 1;\n    }\n    if (mydata->joining) {\n        prepareToFollow();\n\
  \        return 1;\n    }\n    if (kilo_ticks == LEAVE_TIME && kilo_uid == CAN_LEAVE)\
  \ {\n        leave();\n        return 1;\n    }\n    if (kilo_ticks >= LEAVE_TIME\
  \ + JOIN_DELAY && kilo_uid == CAN_JOIN && mydata->my_leader == 255) {\n        join();\n\
  \        return 1;\n    }\n    if (handleOther() == JOIN) {\n        setup_message(OK);\n\
  \        return 1;\n    }\n    return 0;\n}\n\nvoid follower() {\n    if (checkJoin())\
  \ return;\n    int message = handleMessage();\n    if (mydata->turning == 0 && message\
  \ == LEFT) {\n        mydata->message_timestamp = kilo_ticks;\n        mydata->turning\
  \ = 1;\n    }\n    if (mydata->turning == 0 && message == STRAIGHT) {\n        speedCorrection(checkDistance());\n\
