  `BLOCKLY` 不使用线条来显示积木之间的连接，而是使用折叠方法来隐藏 `SoS` 模型的复杂性。模型查询用于寻找满足一组条件的积木。\n\n\n\n![../images/520777_1_En_12_Chapter/520777_1_En_12_Fig4_HTML.jpg](img/520777_1_En_12_Fig4_HTML.jpg)\n\
