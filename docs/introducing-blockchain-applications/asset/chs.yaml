  \n\n### 8.3.1 第一步：创建一个简单的工作量证明\n\n工作量证明（PoW）的目标是提供一个可以解决问题的数字。这个数字必须难以寻找，但网络上的任何其他人都应该能够验证它。由于该数字由加密签名组成，如果在其他地方提供了错误的数字，访问将被拒绝。PoW\
  \ 方法允许你在无需信任任何个人或机构的情况下发送资金，因为区块链只关心加密签名。这就是 PoW 的基础。\n\n比特币基于 PoW 构建。列表 8-2 展示了一个示例。\n\
  \n```python\nfrom hashlib import sha256\nx = 10\ny = 0  # We don't know what y should\
  \ be yet...\nwhile sha256(f'{x*y}'.encode()).hexdigest()[-1] != \"0\":\ny += 1\n\
  printf('The solution is y = {y}')\n@staticmethod\ndef hash(block: Dict[str, Any])\
  \ -> str:\n\"\"\"\nCreates a SHA-256 hash of a Block\n:param block: Block\n\"\"\"\
  \n### We must make sure that the Dictionary is Ordered, or we'll have inconsistent\
  \ hashes\nblock_string = json.dumps(block, sort_keys=True).encode()\nreturn hashlib.sha256(block_string).hexdigest()\n\
  def proof_of_work(self, last_proof: int) -> int:\n\"\"\"\nSimple Proof of Work Algorithm:\n\
  - Find a number 0' such that hash(00') contains leading 4 zeroes, where 0 is the\
  \ previous 0'\n- 0 is the previous proof, and 0' is the new proof\n\"\"\"\nproof\
  \ = 0\nwhile self.valid_proof(last_proof, proof) is False:\nproof += 1\nreturn proof\n\
  @staticmethod\ndef valid_proof(last_proof: int, proof: int) -> bool:\n\"\"\"\nValidates\
  \ the Proof\n:param last_proof: Previous Proof\n:param proof: Current Proof\n:return:\
  \ True if correct, False if not.\n\"\"\"\nguess = f'{last_proof}{proof}'.encode()\n\
  guess_hash = hashlib.sha256(guess).hexdigest()\nreturn guess_hash[:4] == \"0000\"\
  \n```\n\n`列表 8-2 ProofOfWork.py`\n\n### 8.3.2 第二步：为区块链创建一个 API 端点\n\n将列表 8-3 中显示的代码放在你的\
