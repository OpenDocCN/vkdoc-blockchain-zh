    # 14. Using a MATLAB Smart Farm Project


    This project illustrates how to effectively control mutual exclusive access to
    a shared resource. To implement exclusivity in this manner, the project is created
    in MATLAB using the Simulink framework. The name of the project is *Smart Farm*.
    In this project, a fleet of autonomous robots performs a series of farming tasks,
    including preparing the soil, watering the plants, and producing the harvested
    plants.


    ## 14.1 Description of the Smart Farm Project


    The project addresses a case study of distributed, mutual exclusive access to
    a shared resource. The context is a *smart farm*, where a fleet of autonomous
    robots prepares the soil, waters the plants, harvests plant production, and so
    on.


    Each robot moves cyclically between the fields and the main farm buildings and
    stores. The geography of the farm is such that there are two main production fields
    (named North and South), reachable from the main farm premises by a rural road
    that passes over a small bridge on a river (see Figure [14-1](#520777_1_En_14_Chapter.xhtml#Fig1)).
    Only one robot at a time can use the bridge, which means that robots need to negotiate
    exclusive access to the bridge by means of V2V communication, with no centralized
    control center.


    ![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig1_HTML.jpg](images/520777_1_En_14_Chapter/520777_1_En_14_Fig1_HTML.jpg)


    *Figure 14-1* Bridge on a river


    Each robot can be seen as cycling through different modes of operation, represented
    in Figure [14-2](#520777_1_En_14_Chapter.xhtml#Fig2). When a robot needs to move
    to a field or to the farm building, it enters `Ask4Bridge` mode, in which it asks
    for access to the bridge, communicating this request to the other robots, which
    are in the `Ask4Bridge` or `Bridge` modes.


    The main objective of the project is to define the distributed communication protocol
    that allows exclusive access to the bridge, in order to avoid collisions over
    the bridge.


    ![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig2_HTML.jpg](images/520777_1_En_14_Chapter/520777_1_En_14_Fig2_HTML.jpg)


    *Figure 14-2* Modes of operation


    ### 14.1.1 Project Requirements


    The system must meet the following requirements:


    - *Requirement 1*: The system is composed of a non-predetermined number of identical
    robots communicating with each other via a wireless connection.

    - *Requirement 2*: Each robot follows the cyclic modes of operation behavior described
    in Figure [14-2](#520777_1_En_14_Chapter.xhtml#Fig2).

    - *Requirement 3*: No two robots can access the bridge at the same time (mutual
    exclusion, safety).

    - *Requirement 4*: A robot that is not granted bridge access waits until the bridge
    is cleared, and only then issues a new access request.

    - *Requirement 5*: If a robot issues a bridge access request, sooner or later,
    it is granted access (*liveness*).

    - *Requirement 6*: If access to the bridge is granted to a robot coming from the
    North field, and there are at least two other robots R1 and R2 coming—R1 also
    from the North, and R2 from the farm or from South—then the next access cannot
    be granted to R1, coming again from North. The same applies to the symmetrical
    cases of a robot crossing the bridge from South or from the farm (*fairness*).

    - *Requirement 7*: The system is based on a totally distributed algorithm, without
    any element of centralization.

    - *Requirement 8*: The robots do not refer to a common clock, but each clock is
    autonomous and not synchronized.'
