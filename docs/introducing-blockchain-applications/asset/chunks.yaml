  trans: "\n### 3.7.1 `矿工节点`\n\n某些节点是特殊节点，称为挖矿节点或*矿工节点*。它们负责创建新区块并将其注册到账本中。这些节点相互竞争，以将新区块添加到区块链上。\n\
    \n它们之所以相互竞争，是因为谁能成功赢得区块并将其添加到链上，就能获得比特币奖励，作为对其为比特币网络共识做出贡献的激励。\n\n为了形成新区块，矿工从交易池中选择交易，从而获得一个待注册到账本的候选区块。在选择交易时，矿工会应用一种交易属性度量标准，优先处理那些输入中包含更久远`UTXO`且金额更高的交易，而非那些较新且金额较小的交易。换句话说，给定一笔交易`Tx`。设`N`为其输入的`UTXO`数量，对于每个输入`UTXO\
    \ i`。我们将`Tx`的优先级定义如下：\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Figa_HTML.gif](img/520777_1_En_3_Figa_HTML.gif)\n\
    \n同时，它们会赋予每千字节手续费更高的交易更大的权重，而不是手续费较低的交易。\n\n比特币区块的平均大小设定为 1MB。因此，矿工会尝试选择一系列交易，在遵循优先级（根据时效和金额）以及最大区块大小的前提下，使其获得更高的收入。\n\
    \n因此，交易手续费通常根据交易的规模来评估。\n\n### 3.7.2 `Coinbase 交易`\n\n添加到区块中的第一笔交易是一种独一无二的交易，与常规交易不同。它被称为`Coinbase\
    \ 交易`。\n\n这笔交易允许挖出区块的矿工获得以下奖励：\n\n-   因参与并贡献于添加新区块的共识过程而获得的激励。\n-   其添加到区块中的所有交易的手续费总和。\n\
    \n显然，这笔交易的受益比特币地址就是挖出该区块的矿工的地址。每笔交易的输入总值与输出总值之间的差额用于计算总手续费。也就是说：\n\n-   设`N`为输入总数，`I`为每个输入的索引，`Vi`为输入`i`的金额。\n\
    -   设`M`为输出总数，`O`为每个输出的索引，`Vo`为输出的金额。那么：\n\n![$$ \\mathrm{手续费总计}=\\sum \\limits_{\\\
    mathrm{i}=1}^{\\mathrm{N}}{V}_i-\\sum \\limits_{\\mathrm{o}=1}^{\\mathrm{M}}{V}_o\
    \ $$](img/520777_1_En_3_Chapter_TeX_Equ2.png)\n(3.2)\n\n相反，矿工奖励最初为 50 个比特币，之后每\
    \ 210,000 个区块减半一次。这意味着比特币在每个区块的构建过程中，以既定且递减的速率被“铸造”出来。每十分钟形成一个新区块，其中包含一个从零开始新创建的比特币。每\
    \ 210,000 个区块（大约每四年），货币发行率会降低 50%。在网络运行的头四年里，每个区块包含 50 个新比特币。^(⁵)\n\n奖励基于区块高度，初始值为每个区块\
    \ 50 个比特币，每 210,000 个区块减半。由于该区块的高度为 277,316，因此当前正确的奖励是 25 个比特币。\n\n该计算过程可以在比特币核心客户端的\
    \ `GetBlockValue` 函数中看到，如代码清单 3-1 所示。\n\n```\nint64_t GetBlockValue(int nHeight,\
    \ int64_t nFees)\n{\n    int64_t nSubsidy = 50 * COIN;\n    int halvings = nHeight\
    \ / Params().SubsidyHalvingInterval();\n    if (halvings >= 64)\n        return\
    \ nFees;\n    // 每 210,000 个区块（大约每 4 年），区块奖励减半。\n    nSubsidy >>= halvings;\n\
    \    return nSubsidy + nFees;\n}\n代码清单 3-1\nGetBlockValue 函数\n```\n\n### 3.7.3\
    \ 构建区块头\n\n在从交易池和`Coinbase 交易`中计算出交易后，矿工会继续构建区块头，以生成候选区块。接下来将执行以下步骤：\n\n1.  指明区块的版本号，该版本号说明了区块的架构。\n\
    2.  添加其接受的父区块的哈希值。\n3.  将 Merkle 树根值加入计算。因此，在对每笔交易计算 SHA-256 哈希值后，将这些哈希值成对合并，形成树的每一层，直到所有交易都被汇总到树“根”的一个节点中。结果，Merkle\
    \ 树根将*所有交易*存储在一个 32 字节的值中。\n4.  添加以 Unix 纪元格式表示的时间戳，该时间戳对应区块创建的当前时间。\n5.  通过填充难度目标，定义使区块成为合法区块所需的工作量证明难度。\n\
    6.  最后一个字段是随机数，初始化为 0。\n\n此时，区块头的所有其他字段都已填充完毕，挖矿操作可以开始。现在的目标是找到一个随机数值，使得区块头的哈希值低于难度目标。\n\
    \n### 3.7.4 难度目标\n\n目标值在挖矿中使用。它是一个数字（以十六进制表示），区块哈希值必须小于等于该数字，该区块才能被添加到账本中。\n\n\
    目标值每 2016 个区块（大约两周）调整一次，以确保区块平均每十分钟被挖出一个。\n\n`工作量证明`的复杂度由移动平均值决定，该平均值旨在使每小时的平均区块数适应硬件速度的持续提升以及节点运行兴趣随时间的变化。如果区块生成过快，难度就会增加。\n\
    \n目标值由网络中的每个节点独立计算，但需遵循比特币协议规则。\n\n规则规定，每 2,016 个区块后，所有节点自动重新调整`工作量证明`的难度。重新调整难度的计算会将寻找剩余\
    \ 2,016 个区块所花费的实际时间与预期的 20,160 分钟（基于每十分钟生成一个区块的目标，相当于两周）进行比较。\n\n然后计算实际时间与预期时间的比率，并据此对难度进行调整。如果网络发现区块的速度快于每十分钟一个，难度就会上升。如果发现区块的速度慢于预期，难度就会下降。\n\
    \n设 `RecentBlockTime` 为表示寻找最新 2016 个区块所花费时间的变量。计算*难度目标*的公式为：\n\n![$$ \\mathrm{新难度目标}\
    \ = \\mathrm{旧目标} \\ast \\left( \\frac{\\mathrm{最近区块时间}}{20160} \\right) $$](img/520777_1_En_3_Chapter_TeX_Equ3.png)\n\
    (3.3)\n\n每个周期的调整必须小于 4 倍，以避免难度目标出现显著波动。\n\n如果所需的难度调整超过 4 倍，则将其限制在允许的最大值内。\n\n\
    所有剩余的修改将在下一个周期进行。由于每个节点都遵循相同的共识规则，并且所有区块都相同，因此它们都将得出相同的难度值。\n\n如果一个节点错误计算了目标值（或对此说谎），并基于该值生成了一个区块，网络中的其他节点将拒绝该区块，因为它不符合目标值的要求，并且投入在该区块挖掘上的所有工作都将白费。\n"
- fmt: '### 3.7.5 Proof of Work


    Once a miner node has created a candidate block, the block must be extracted by
    the node’s hardware platform. It must solve the proof-of-work algorithm in order
    for the block to be valid. The `SHA-256` hash function is utilized in the Bitcoin
    mining process.


    Simply said, *mining* is the process of hashing the block header by modifying
    the `nonce` parameter repeatedly until the resulting hash does not match a specific
    target. The hash function’s result cannot be predicted in advance, nor can a pattern
    that generates a certain hash value be generated. Hash functions have this property,
    which means that the only method to achieve a hash result that matches a specific
    target is to repeat the input until the desired hash result arises randomly.^([⁶](#fn6))


    As a result, we must understand that the miner computes the hash of this block’s
    header to determine whether it is smaller than the current target. If the hash
    isn’t smaller than the target, the miner increases the `nonce` (typically by one)
    and tries again. “Miners must try several million times to discover a `nonce`
    that results in a low enough hash of the block header at the present difficulty
    level of the Bitcoin network.”


    Furthermore, while it was possible to mine the blocks using a simple home computer
    in the early years, today you must utilize specialized and expensive hardware
    and share your processing power with other users by joining mining pools. When
    a mining node solves the problem, it sends the block to all of its neighbors so
    that it can propagate around the network, be validated, and ultimately be added
    to the ledger.


    ### 3.7.6 Validating a New Block


    The third step in reaching consensus on the blockchain is independent validation,
    which is carried out by each node that receives a new block.


    As the newly solved block propagates over the network, each node runs a series
    of tests to ensure that it is valid before forwarding it to its peers. Only legitimate
    blocks are propagated over the network as a result of this. Independent validation
    also ensures that honest miners are putting their blocks on the blockchain and
    profiting.


    Those that act dishonestly have their blocks rejected, losing not only the reward,
    but also the effort of finding a proof-of-work solution, and therefore bearing
    the expense of electricity without reimbursement.


    When a node receives a new block, it verifies it by comparing it to a large set
    of requirements that must all be met; otherwise, the block is eliminated.


    These is a list of the most significant characteristics that can be summarized:


    *   The block’s structure and syntax are correct.

    *   The target value is accurate.

    *   It’s important to realize that the block header hash is easier than the target
    difficulty (proof of work check).

    *   The block timestamp is less than two hours in the future (holding timing faults).

    *   The block size follows the protocol’s criteria.

    *   The initial transaction is made with coinbase.

    *   The transactions contained therein are valid (recheck transactions using the
    verification criteria outlined in the transaction flow).


    As a result, independent validation ensures that miners cannot cheat. Miners must
    construct a complete block based on a shared protocol or set of rules observed
    by all nodes and extract it using a proper proof of work solution. They use a
    lot of electricity to do this, and if they cheat, all of the electricity and effort
    is squandered. Therefore, the validation not depended on is a key part of the
    decentralized consensus.


    ### 3.7.7 The Blockchain Forks


    Different copies of the blockchain are not always constant because it is a decentralized
    data architecture. Blocks could arrive at different times on different nodes,
    giving nodes different perspectives on the blockchain. To tackle this problem,
    each node picks the most effective proof of work blockchain, also known as the
    highest chain or chain with the greatest cumulative difficulty, and tries to extend
    it as much as possible.


    A node can calculate the total amount of proof of work used to form a chain by
    summing the difficulty recorded in each block.


    The global Bitcoin network eventually converges to a coherent state by the time
    all nodes select the longest cumulative chain of difficulty.


    The nodes manage three groups of blocks:


    *   The first is the one that is linked to the main blockchain.

    *   The blocks that do not have a known parent in known chains.

    *   The blocks that constitute the branches of the main blockchain (secondary
    chains) (orphans).


    When any of the criterion validations fail, the invalid blocks are removed or
    rejected, and they are not included in the chain. You must realize that the main
    chain is the blockchain with the greatest or highest cumulative difficulty at
    any given time.


    Unless there are two chains of equal length, one of which has a larger number
    of functioning proofs, this is usually the chain with the most blocks. When a
    new block is discovered, a node tries to incorporate it into the current blockchain.


    The node examines the previous block’s hash field, which contains the address
    of the new block’s parent. The node will then search the current blockchain for
    that parent. The parent block is the “top” of the main chain in the most recent
    examples, implying that this new block extends the main chain.


    Additionally, the new block may occasionally extend a chain that isn’t the main
    chain. In this situation, the node connects the new block to the secondary chain,
    allowing it to compare the secondary chain’s difficulty to that of the main chain.


    If the secondary chain has a higher cumulative difficulty than the main chain,
    the node will fall back to it, making the secondary chain the new parent chain
    and the former main chain a secondary chain.


    If a good block is received but no parent is discovered in the current chains,
    the block is referred to as an *orphan*. The orphaned blocks are placed in the
    orphaned blocks pool and will remain there until their parent arrives.


    The orphaned block can be retrieved from the orphan pool and attached to the parent
    once the parent has arrived or been received and joined to the existing chains.
    Keep in mind that orphaned blocks typically occur when two blocks mined within
    a short period of time are received in reverse order. By selecting the chain with
    the highest difficulty, all nodes reach network-level consensus in the end.


    Temporary chain modifications are finally resolved by extending one of the existing
    chains with new proofs of work. Mining nodes use their mining power to “vote”
    for the next block to be extracted. The new block will represent their vote when
    they extract a new block to expand the chain.


    ## 3.8 Summary


    When you think about the term “blockchain,” the main concept that should come
    to mind is Bitcoin, which you learned about in this chapter. I explained the technical
    aspects of Bitcoin, the block structure of the Bitcoin blockchain, and the flow
    of transactions in the blockchain, with examples. To develop a blockchain application,
    you must understand these fundamental concepts.


    The next chapter focuses on Ethereum, a blockchain-based software platform that
    is primarily used to support the world’s second-largest cryptocurrency by market
    capitalization after Bitcoin.


