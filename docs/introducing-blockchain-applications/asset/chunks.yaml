    \ checkpoint tree), each validator transmits to its peers one vote for a block\
    \ as a checkpoint.\n\nA checkpoint is the genesis block and each block whose height\
    \ in the blocktree is 100 or a multiple of 100\\. However, the “checkpoint height”\
    \ of a block whose height is 100 k is simply k. In blocktree, the block’s height\
    \ has to be divisible by 100.\n\nFor a better understanding, see the checkpoint\
    \ tree in Figure [5-7](#520777_1_En_5_Chapter.xhtml#Fig7).\n\n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig7_HTML.jpg](images/520777_1_En_5_Chapter/520777_1_En_5_Fig7_HTML.jpg)\n\
    \nFigure 5-7\n\nCheckpoint tree: Dashed lines represent 100 blocks between checkpoints\n\
    \nThe height function is shown in Figure [5-8](#520777_1_En_5_Chapter.xhtml#Fig8).\n\
    \n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig8_HTML.jpg](images/520777_1_En_5_Chapter/520777_1_En_5_Fig8_HTML.jpg)\n\
    \nFigure 5-8\n\nCheckpoint tree with the height function\n\nThe grade consists\
    \ of justified source checkpoint (CPs) and their height h (s). A destination gates\
    \ CPT and their height h (t) and the signature of the validator S. It must be\
    \ h (t)> h (s).\n\nTherefore <s; CPs; CPt; h (s); h (t)> is the vote of the validator.\n\
    \nEvery vote is sent to the network and is weighted based on the value of participation\
