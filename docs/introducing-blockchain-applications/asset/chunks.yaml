    # 18. Summary


    The primary conclusions from this examination of blockchain technology and its
    cross-sector applicability are summarized in this chapter.


    The blockchain is built on a unique set of properties, including decentralization,
    tamper-resistance, transparency, security, and smart contracts. Because there
    is no central authority to control the system, it is very resistant to single-point
    faults. The records in a blockchain are tamper proof in this regard since it is
    extremely difficult to alter or delete transaction records. All transactions in
    public or open blockchains are transparent and observable.


    All transactions are timestamped, which implies that information like payment
    details, contracts, ownership transfers, and so on are publicly connected to a
    certain date and time.


    However, there are still a number of unresolved difficulties, such as public blockchains’
    restricted scalability and performance, which is primarily due to low transaction
    volumes or excessive power consumption when using existing `PoW` consensus techniques.
    Other concerns include the possibility of a majority of participants colluding
    to infiltrate the network, as well as the network’s significant reliance on a
    small number of players.


    The extra responsibility for key management, which can be as simple or as significant
    as losing a phone or a backup of credentials, is another major source of security
    vulnerabilities.


    Another key subject that requires more investigation is how to safeguard personal,
    sensitive, or confidential information.


    If certain records do not need to be transparent then transparent data in a blockchain
    could be a problem. Data that’s publicly accessible or needs to be updated because
    of mistakes or inconsistencies is a problem for blockchain.


    ## 18.1 Blockchain in the Policy Context


    The EU (European Union) has taken notice of the growing popularity and interest
    in blockchain technology. The focus was first on the advent of cryptocurrencies
    and virtual currencies like `Bitcoin`. On the EU website, several initiatives
    concentrating on the cross-cutting impact of blockchain are now being researched.


    The EU has established the Blockchain Observatory and Forum, and the Anti-Counterfeiting
    Blockathon Forum as significant projects in close partnership with industry stakeholders,
    start-ups, governments, international organizations, and civil society as part
    of its recent efforts.


    The EP (European Parliament) has also actively participated in previous and ongoing
    discussions on blockchain’s cross-sectoral potential, having previously enacted
    a resolution on virtual currencies, which sparked the formation of the `FinTech`
    task force.


    Since then, the Research Service of the European Parliament has issued studies
    and other materials on the subject. In addition, there are two resolutions titled
    “Distributed Ledger and Blockchain Technologies: Building Trust Through Disintermediation.”'
