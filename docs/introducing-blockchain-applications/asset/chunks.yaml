  trans: "\n# 5.2 以太坊 Casper\n\nFT（部分同步）方法允许验证者使用权益证明技术对区块进行投票，这些技术会生成一种或多种形式的签名消息。其目标是达成共识，并识别和惩罚任何不诚实的验证者。\n\
    \n与 BFT 共识算法一样，其假设是：如果 2/3 的验证者正确遵循协议，那么无论网络延迟如何，算法都无法解决冲突区块。\n\nVitalik Buterin\
    \ 指出，Casper 的目标之一是达到经济目的。我们可以将其定义如下：\n\n当客户有证据证明 (i) `B1` 区块将永远成为规范链的一部分，或者 (ii)\
    \ 那些导致 `B1` 被回滚的行为者确保会受到至少 `$X` 金额的经济处罚时，`B1` 区块即实现了经济最终确定性，并带有 `$X` 的加密安全边际。\n\
    \n显然，经济加密安全边际必须足够高。事实上，如果我们考虑 `X = 7000 万美元`，就能理解该区块是链的一部分，并且改变它的代价非常高昂。PoW（工作量证明）不具备这些保证。这是\
    \ PoS（权益证明）的一个特定特性。\n\n其意图是让 51% 攻击变得极其昂贵，以至于大多数验证者即使联手也无法在不遭受巨大经济损失的情况下恢复已最终确定的区块。经济目的的实现方式是要求那些希望参与验证过程的人提交一份保证金。\n\
    \n如果协议判定某个验证者行为不诚实，违反了协议规则，那么他们将受到惩罚，其保证金将被没收。\n\n协议中的这套规则被称为削减条件。削减条件使得能够在排除合理怀疑的情况下确定验证者何时行为不当（例如，同时为多个不同的区块投票）。\n\
    \n另一方面，对于遵守协议规则的验证者，则有保证他们不会违反任何规则，也不会受到任何处罚。\n\n还存在最终性条件，这些条件描述了何时可以认为某个特定的最终哈希值已确定。当一个哈希值获得了当前活跃验证者存入的总余额中至少\
    \ 2/3 的承诺时，该哈希值即被视为已最终确定。削减条件必须满足两个属性：\n\n*   **可追责的安全性：** 如果两个冲突的哈希值都被最终确定，那么必须能够证明至少有\
    \ 1/3 的验证者违反了某些削减条件。\n*   **可行的活跃性：** 必须存在一组消息，使得 2/3 的验证者能够在不违反削减条件的情况下完成某些新哈希值的传输，除非至少有\
    \ 1/3 的验证者违反了某些削减条件。\n\n可追责的安全性带来了这种经济目的理念：如果两个冲突的哈希值被最终确定（即分叉），那么你就可以获得数学证明，表明有大量验证者必定违反了某些削减条件，你可以将此证据提交给区块链并对他们进行处罚。\n\
    \n可行的活跃性基本上意味着“不应该发生”。算法有可能被阻塞而无法最终确定任何东西。\n\n# 5.3 Casper 实现\n\n`Blocktree`（区块树）是一种树形数据结构，它与\
    \ Casper 中刚刚生成和接收到的区块相关。共识的实际对象是检查点树，它是 `blocktree` 的一个子树。\n\n具体来说，在每个共识周期（`blocktree`\
    \ 中每 100 高度或检查点树中每 1 高度），每个验证者向其对等节点发送一个针对某个区块的投票，将其视为一个检查点。\n\n检查点是指创世区块以及 `blocktree`\
    \ 中高度为 100 或 100 的倍数的每个区块。然而，高度为 100k 的区块的“检查点高度”就是 `k`。在 `blocktree` 中，区块的高度必须能被\
    \ 100 整除。\n\n为了更好地理解，请参见图 5-7 中的检查点树。\n\n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig7_HTML.jpg](img/520777_1_En_5_Fig7_HTML.jpg)\n\
    \n图 5-7\n\n检查点树：虚线表示检查点之间的 100 个区块\n\n高度函数如图 5-8 所示。\n\n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig8_HTML.jpg](img/520777_1_En_5_Fig8_HTML.jpg)\n\
    \n图 5-8\n\n带有高度函数的检查点树\n\n该等级由经过验证的源检查点（`CPs`）及其高度 `h(s)` 组成。一个目标门 `CPT` 及其高度\
    \ `h(t)`，以及验证者 `S` 的签名。必须满足 `h(t) > h(s)`。\n\n因此，`<s; CPs; CPt; h(s); h(t)>` 就是验证者的投票。\n\
    \n每张投票都会被发送到网络，并根据签名者参与的价值（来自其质押）进行加权。\n\n如果来源-目标控制点对 `<CP[s]; CP[t]>` 获得了总存款超过\
    \ 2/3 的验证者的投票，那么 `CP[t]` 即被验证，而 `CP[s]` 则被完成。`CP[s]` 和 `CP[t]` 之间的所有区块也被完成。\n\n\
    Casper FFG 依赖于两条所谓的 Casper 戒律来确保共识的安全性：\n\n1.  验证者不能对同一个检查点高度投两次票。\n2.  验证者不需要投出新票，因为其现有投票的范围已经包含了源-目标。\n\
    \n违规者将面临严厉处罚，包括没收质押和暂时禁止投注。由于每张投票都使用验证者的私钥签名，并由验证者接收，因此 Casper FFG 可以轻松检测并应用削减规则。\n\
    \n此外，还适用以下条件：\n\n*   超级多数链接被定义为检查点的有序对 `(a; b)`，也写作 `a -> b`，使得至少 2/3 的验证者（即其存款总和占总存款\
    \ 2/3 的验证者集合）以 `a` 为源、`b` 为目标投了票。超级多数链接可以跳过检查点。因此，如果 `h(b) > h(a) + 1` 也是可以的。\n\
    *   两个检查点（`a` 和 `b`）被定义为冲突的，当且仅当它们是不同分支上的节点，也就是说，一个不是另一个的祖先或后代。\n*   一个检查点被视为已验证，如果：\n\
    \    *   它是创世检查点\n    *   链接 `c0 -> c` 拥有超级多数支持\n\n一个检查点 `c` 被视为已最终确定，如果存在一个超级多数链接\
    \ `c -> c0`，并且 `c0` 是 `c` 的一个显著子节点。同样地，`c` 被最终确定当且仅当 `c` 是已验证的。还必须存在一个超级多数链接 `c\
    \ -> c0`，其中检查点 `c` 和 `c0` 不冲突，并且 `h(c0) = h(c) + 1`。（见图 5-9。）\n\n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig9_HTML.jpg](img/520777_1_En_5_Fig9_HTML.jpg)\n\
    \n图 5-9\n\n已验证的链 `r -> b1 -> b2 -> b3`\n\nEIP 1011 包含关于 Casper FFG 当前智能合约的信息。利益相关者通过向承诺的智能合约注册而获得参与资格，该合约对\
    \ Casper FFG 进行了编码，并可通过以太坊交易访问。\n\n这里我们报告了 `CheckpointTimes()` 函数（见图 5-10），然后是\
    \ Casper FFG（友好型最终性小工具）算法。\n\n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig10_HTML.jpg](img/520777_1_En_5_Fig10_HTML.jpg)\n\
    \n图 5-10\n\n`CheckPointVote()`\n\n然后我们报告 Casper FFG，如图 5-11 所示。\n\n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig11_HTML.jpg](img/520777_1_En_5_Fig11_HTML.jpg)\n\
    \n图 5-11\n\n`CheckPointVote()`\n"
- fmt: '## 5.4 Summary


    This chapter introduced the future scope of proof of stake, which replaces miners
    with validators and makes the mining process virtual. The chapter also discussed
    chain-based proof of stake, which uses a block system.


    The popularity of public blockchains like Bitcoin and Ethereum has sparked interest
    in blockchain technology and its usage as a distributed system in the most cutting-edge
    commercial applications. To use blockchain in the distributed system, you need
    to understand the concept of `Hyperledger Fabric`, which serves as a foundation
    for application development or modular architecture solutions. The next chapter
    contains more details about `Hyperledger Fabric`.


    # 6. Hyperledger Fabric


    The success of public blockchains, such as Bitcoin and Ethereum, has led to growing
    interest in Blockchain technology and its application as a distributed system
    in the most innovative business use cases.


    However, corporate prerogatives are based on principles and characteristic that
    public and permissionless blockchains still cannot deliver.


    For this reason, private and authorized blockchains were born, capable to satisfy
    business compromises.


    In fact, private and authorized blockchains allow you to design systems in which:


    - The networks are authorized

    - Participants are identified and identifiable

    - There is a guarantee of privacy and confidentiality of the data

    - There is low transaction confirmation latency


    There are therefore many different blockchain projects authorized for corporate
    use. `Hyperledger Fabric` is a free software enterprise accounting system based
    on distributed ledger, with certain important variations from other famous distributed
    ledgers as well as blockchain systems.


    However, it is critical to distinguish `Hyperledger` from `Hyperledger Fabric`.
    The `Hyperledger` project is an open source blockchain program started by the
    Linux Foundation.


    `Hyperledger Fabric` is aimed at serving as a foundation for application development
    or modular architecture solutions. `Hyperledger Fabric` enables plug-and-play
    components such as consent and membership services. Its modular and adaptable
    design accommodates a wide range of industry use cases. It takes a novel approach
    to consent, allowing full-scale performance while protecting privacy.


    It is an enterprise solution for the development of applications for a wide variety
    of use cases, as promoted by IBM, it allows innovation and versatility for various
    fields of application.


    It is an `authorized` solution and therefore the participants are known, without
    the problems arising from a public network and without permits. So, there is trust
    among the participants.


    This has a significant impact on consent. In one system authorized and managed
    by a trusted authority, consent is not required. Indeed, in these cases, it would
    be inefficient in terms of performance and speed.


    This allows the `Hyperledger Fabric` platform high performance. This blockchain
    was specially designed to be highly modular, configurable, and customizable according
    to the various business needs.


    ## 6.1 High-Level Perspective


    This section introduces `Hyperledger Fabric` by providing a high-level perspective.
    It includes the following components:


    - A company move that establishes system consensus by determining the order of
    transactions and, as a result, transmits new blocks to peers.

    - A subscription network operator is in charge of using cryptographic identifiers
    to validate network identities.

    - An extra peer-to-peer gossip channel for broadcasting and ordering service result
    blocks to those other peers.

    - The ledger may be configured to work with a variety of database management systems.

    - The customizable endorsement policy for each application. Therefore, every aspect
    of the platform is modular and configurable.

    - In `Hyperledger Fabric`, smart contracts are known to as `chaincode`. The execute-consensus
    architecture of `Hyperledger Fabric` is known as `execute-order-validate`.


    Indeed, it divides the transaction flow into three stages:


    - Carry out a transaction and verify its validity, approving it in this manner.

    - Order the transactions using a programmable consensus protocol.

    - Before registering transactions in the ledger, they must be validated according
    to the application blockchain’s policies.


    `Hyperledger Fabric` provides a channel structure. Let’s say that each channel
    corresponds to one and only one blockchain. Therefore, a blockchain is associated
    only and exclusively to a channel. This means that only organizations that are
    part of a channel are authorized to the data of the channel itself, and therefore
    to the data of the blockchain of that channel.


    This, together with the concept of private data, provides some guarantee of data
    security and privacy.


    The task of categorizing entries is delegated to a modular component that is conceptually
    distinct from the peers who conduct the transactions and maintain the ledger.
    This is how the ordering process works.


    Consent can be adjusted to the assumption of trust in a particular distribution
    or solutions as long as this is modular.


    In discussing the concepts and mechanisms behind `Hyperledger Fabric`, the chapter
    follows and trusts the official `Hyperledger Fabric` documentation available on
    the web, when trying to summarize the concepts. So everything that is reported
    about `Hyperledger Fabric` derives from the study from the analysis of its official
    documentation.


    ## 6.2 Assets


    `Hyperledger Fabric` allows you to construct any type of asset using `chaincode`,
    whether it’s physical (property, goods, products, etc.) or intangible (contract
    terms, intellectual property, documents, etc.).


    Assets are specified as a number of essential pairs in `Hyperledger Fabric`, with
    state changes being stored as transactions on a ledger (tied to the canal). Binary
    and/or JSON representations are available for assets.


    ## 6.3 Chaincode


    `Chaincode` is a type of software that specifies business logic. In other words,
    it defines an activity or set of activities and the transaction instructions for
    changing the activities. The `chaincode` therefore defines the operations that
    alter the status of the activity. It uses rules to read or change key-value pairs.


    A settlement proposal triggers the `chaincode` functions, which are performed
    on the current database ledger. When the `chaincode` is run, it creates a set
    of writing that can be broadcast over the network and added to all peers’ ledgers.'
