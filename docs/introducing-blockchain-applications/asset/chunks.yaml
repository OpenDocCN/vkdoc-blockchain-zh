    以下是翻译后的中文文档：



    # 14.1.2 解决方案提示


    机器人可被视为分布式系统的节点，将使用给定的规范形式进行建模。通常，每个节点将被建模为某种形式的*扩展有限状态机*，节点将利用该形式提供的机制交换数据，以实现不同状态机之间的通信。


    节点（机器人）用编号标识，必要时可使用其标识符发送点对点通信。


    作为建议，你可以基于 2PC（两阶段提交协议）算法（标准或线性）来组织解决方案，其中需要定义一个协调者，将它的提议发送给其他节点。


    请求访问桥梁的机器人 `R1` 在每次运行中充当协调者。因此，它向其他机器人广播访问请求。接收到来自 `R1` 的这个请求的机器人，如果其工作模式不是 `Ask4Bridge`
    或 `Bridge`，则简单地回复 `agree`。处于 `Bridge` 模式的机器人将回复 `abort`，因为它当前正占用桥梁。接收到来自 `R1`
    请求且处于 `Ask4Bridge` 模式的机器人 `R2`，如果其标识符低于 `R1`，则回复 `abort`；否则回复 `agree`。但在这种情况下，`R2`
    还必须中止它在进入 `Ask4Bridge` 模式时启动的算法运行。


    离开 `Bridge` 模式的机器人向其他节点广播桥梁空闲的信息，以便处于 `Ask4Bridge` 模式的节点可以重试它们的请求。


    请注意，一个节点应能启动自己的 2PC 运行，*同时*监听来自参与其他 2PC（两阶段提交协议）运行的其他机器人发来的消息。这需要使用一些并发线程，或*状态图*区域。


    在第一阶段，你应该专注于 2PC 方案，考虑一个由三个或四个机器人组成的固定集合，并仔细研究它们的交互，忽略活性和公平性要求，仅考虑三种运行模式（`Ask4Bridge`、`Field
    Action` 和 `Bridge`）。


    在第二阶段，你扩展模型以考虑其他运行模式、可能更多的机器人和/或活性/公平性要求。


    请注意，通常，工具（为了能够模拟或形式化验证模型）需要通过物理复制粘贴来实例化固定数量的对象（节点）。


    ## 14.2 实施项目


    该项目设计使用三个机器人在田野与主要农业建筑和仓库之间循环移动。农场的地理位置决定了有两个主要生产田（命名为北田和南田）。机器人的运动满足前述使用互斥实现分布式系统中并发控制的三个基本要求。


    除此之外，该系统基于一个完全分布式的算法，没有任何集中化元素。机器人不参考公共时钟，每个时钟都是自治的且不同步。


    该项目使用 MATLAB 实现，并借助 Simulink 工具设计机器人。实施需要以下 MATLAB 依赖项：


    - Simulink

    - Stateflow

    - Robotics System Toolbox

    - Navigation Toolbox


    下一节将介绍 Simulink 中内置的、并在本项目中使用到的功能。


    ### 14.2.1 环境模型


    MATLAB 内置的 Robotics Visualizer 使您能够在 2D 移动机器人环境中模拟和原型设计算法。多机器人生态系统还支持在 2D 多机器人移动机器人环境中开发和原型设计算法。这些功能可通过
    MATLAB 和 Simulink 接口访问。


    ### 14.2.2 传感器模型


    在本项目中，Lidar Sensor 模拟了用于可视化和算法原型设计的 2D 视线传感器。此功能可在 MATLAB 和 Simulink 界面中使用（见图
    14-3）。


    ![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig3_HTML.jpg](img/520777_1_En_14_Fig3_HTML.jpg)


    图 14-3

    传感器


    ### 14.2.3 多机器人激光雷达传感器


    除了前面列出的功能外，还使用了多机器人激光雷达传感器来模拟多机器人环境中的二维视线探测器。该传感器将测试占用地图以及对环境中使用有限半径的其他机器人的视线。此功能可在
    MATLAB 和 Simulink 界面中使用。


    ## 14.3 系统架构


    本项目将两阶段提交协议技术应用于机器人的移动。


    在系统架构下，一次只能有一个进程运行关键部分（CS）。在分布式网络中，无法使用共享变量或本地内核实现互斥。创建分布式互斥的唯一方法是使用消息转发。通过分布式系统算法来处理不可预见的通信延迟和系统状态的部分信息（见图
    14-4）。


    ![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig4_HTML.jpg](img/520777_1_En_14_Fig4_HTML.jpg)


    图 14-4

    多传感器


    为了避免通过桥梁的机器人之间发生碰撞，架构的设计方式如下：当机器人需要移动到田地或农场建筑时，它进入 `Ask4Bridge` 模式。在那里，它请求访问桥梁，并将此请求传达给处于
    `Ask4Bridge` 模式的机器人。分布式通信协议（两阶段提交协议）允许独占访问，以避免桥梁上的碰撞。


    在上述架构中，事务被定义为一组操作。根据应用标准，每个事务都被赋予一个截止时间。操作被认为是牢固且真实的，并具有相同的严重级别。超过截止日期的事务将被立即取消。


    当事务准备“提交”时，两阶段提交协议启动。由一个单独的协调机器（本例中为机器人 1）启动。机器人 2 和 3 是其他参与者，它们将等待来自监管者（机器人 1）的命令。


    这种技术确保了事务的原子性：要么整个事务反映在系统的最终状态中，要么什么都不反映。即使只有一个参与者无法提交，该事务也将被终止。换句话说，每个参与者对事务都有“否决”权。两阶段提交协议的基本流程如图
    14-5 所示。


    ![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig5_HTML.jpg](img/520777_1_En_14_Fig5_HTML.jpg)


    图 14-5

    智能农场的系统架构


    ## 14.4 系统建模


    所有建模均在 MATLAB 的帮助下完成。使用 Simulink 工具，我为机器人的运动开发了一个 State flow 模型。为了移动机器人，该程序使用了
    Robotics System Toolbox 和 Navigation Toolbox。（要执行此任务，请注意 MATLAB 中提供了免费的插件。）


    ### 14.4.1 机器人可视化工具和激光雷达传感器


    机器人可视化工具用于开发机器人架构。此外，通过为每个机器人使用激光雷达传感器，可以验证机器人的运动。激光雷达传感器还可以模拟二维视线传感器，如图 14-6
    所示。


    ![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig6_HTML.jpg](img/520777_1_En_14_Fig6_HTML.jpg)


    图 14-6

    两阶段提交协议（2PC）

