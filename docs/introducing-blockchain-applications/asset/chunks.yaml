    CS : 3 : 1\n\nState variable / kilo_uid\nstate_variable : 66 : 1\n\nGo Straight\
    \ Follower\n == STRAIGHT && sender == LEADER\n+\n+\n+\n+\n\nCS / Kilobot\nCS :\
    \ 3 : 1\n\nState variable / received_msg\nstate_variable : 112 : 1\n\ngoStraight\n\
    +\nSatisfies requirement(s) :\n\n```\n\nThe environment for this project is represented\
