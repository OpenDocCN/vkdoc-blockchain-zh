    \ phase of the procedure is now complete.\n\nApplication A generates a transaction\
    \ from all update replies and sends it to O1 to sort. O1 gathers and distributes\
    \ transactions in blocks from all peers, including P1. P1 verifies the transaction\
    \ before committing it to L1. Once L1 has been changed, as received from A, P1\
    \ creates an event to signal completion.\n\nIn most cases, applications must connect\
    \ to the peers they represent in order for the book update master to be approved.\
    \ This is demonstrated in the “Transaction Flow” section."
  raw: '## 6.7 Certificate Authorities


    Identity (public key pair and private key) and certificates are distributed by
    a certification authority to various actors. This certificate, which connects
    the plaintiff to the actor’s public key, is digitally signed by the certification
    authority (and optionally with a complete property). As a result, if the CA is
    trusted (and the public key is known), the individual actor may be trusted. As
    a consequence, if one trusts the CA (and knows its public key), one may be sure
    that the identified actor is related to the public key supplied in the certificate
    and possesses the included characteristics, therefore verifying the CA’s signature
    on the plaintiff’s certificate. The CA is responsible for ensuring that all actors
    in an organization have a verified digital identity. (See Figure [6-3](#520777_1_En_6_Chapter.xhtml#Fig3).)


    ![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig3_HTML.jpg](images/520777_1_En_6_Chapter/520777_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Certificate authority


    ## 6.8 Membership Service Provider (MSP)


    MSPs are able to verify identity. In other words, they determine whether an identity
    belongs to a certain organization or not, and the role it covers within the organization.
    So although the CAs can issue identities and digital certificates, MSPs can recognize
    these identities on the network.


    MSPs also provide members with a variety of roles and permissions inside the network.


    The MSP is the method through which an organization’s identification is linked
    to its membership. The public key of a member (also called a certificate, certificate
    signature) is added to the organization’s MSP to gain membership.


    MSPs are also used to assign various roles and permissions to network participants.
    The MSP is the mechanism that connects identity to organizational membership.
    The member’s public key (also called a certificate, certificate signature) is
    added to the organization’s MSP to gain membership.


    An MSP’s capabilities, on the other hand, go beyond merely listing who is a network
    or channel member. By identifying an actor’s unique rights on a node or channel,
    the MSP is responsible for converting an identity into a role. A user must be
    allocated a role when registering with a CA Fabric, such as administrator, peer,
    client, order, or member.


    ### 6.8.1 Local MSP


    MSPs for clients and nodes are specified on a per-client and per-node basis (peers
    and orderers). Local MSPs control a node’s permissions (the peer administrators
    who can run the node). At the MSP’s client premises, the users can authenticate
    themselves as a member of a channel (for example, in chaincode transactions) or
    as the holder of a certain role in the system (as an administrator organization).


    A customer local MSP is set in the system files of the node and only applies to
    that node. Because orderers, like peer nodes, are part of a single institution,
    they have a single MSP to identify the actors or nodes they trust.


    ### 6.8.2 Channel MSP


    On the other hand, channel MSPs establish administrative and participation rights
    at the channel level. Peers and ordering nodes on an applications channel share
    the same viewpoint as channel MSPs, allowing them to authenticate channel guests
    properly. This implies that if a firm wants to join the channel, the channel setup
    should include an MSP who works with the organization’s internal personnel. Therefore,
    transactions involving the identities of this organization will be rejected.


    Local MSPs are documented in a channel configuration, whereas channel MSPs are
    represented on the file system as a folder structure. Channel MSPs determine who
    has power at the channel level. The channel MSP defines the connection between
    channel members’ identities and the execution of channel-level rules.


    The MSP channel links the MSPs of all participating organizations to a single
    ordering system. An ordering service will most likely have ordering nodes from
    many businesses, with the ordering service as a whole being handled by the businesses.


    ### 6.8.3 Storing MSP Data


    Local MSPs are documented in a channel configuration, whereas channel MSPs are
    represented on the file system as a folder structure. Channel MSPs determine who
    has power at the channel level. The channel MSP defines the connection between
    channel members’ identities and the execution of channel-level rules.


    The MSP channel links the MSPs of all participating organizations to a single
    ordering system. An ordering service will most likely have ordering nodes from
    many businesses, with the ordering service as a whole being handled by the businesses.


    As a result, a channel MSP logically resides and is handled from the channel or
    network, but each node’s local file system contains a copy of every channel MSP.


    ## 6.9 Peers


    A blockchain is mostly made up of nodes that communicate with one another. Because
    they have ledgers as well as smart contracts, peers are critical components of
    the network. The ledger records all smart contract transactions in an immutable
    manner. It is possible to add, remove, restart, reconfigure, and delete peers.


    ![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig4_HTML.jpg](images/520777_1_En_6_Chapter/520777_1_En_6_Fig4_HTML.jpg)


    Figure 6-4


    Ledger and chaincode


    A peer therefore has one or more instances of the ledger and one or more instances
    of different chaincodes. (See Figure [6-4](#520777_1_En_6_Chapter.xhtml#Fig4).)


    In fact, a peer can participate in different channels, and therefore have different
    instances of the ledger (each channel corresponds to an independent ledger).


    In addition, depending on how the network is configured and for what purposes
    it is designed, there can be multiple chaincodes. Consequently, a peer can host
    multiple instances of chaincode.


    ![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig5_HTML.jpg](images/520777_1_En_6_Chapter/520777_1_En_6_Fig5_HTML.jpg)


    Figure 6-5


    Applications and peers


    Then, to obtain access to the ledger, you show how apps connect with peers. (See
    Figure [6-5](#520777_1_En_6_Chapter.xhtml#Fig5).) Hyperledger Fabric makes the
    Fabric APIs available to developers Software Development Kits (SDKs), which allow
    them to interact with the peers, the chaincodes, and therefore the ledger.


    Chaincode can be used by applications to query or update a ledger over a peer
    connection. A ledger query proposed transaction result is returned quickly, but
    ledger updates need more complex interaction between apps, peers, and orderers.


    Figure [6-6](#520777_1_En_6_Chapter.xhtml#Fig6) shows this in a very basic way.


    ![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig6_HTML.jpg](images/520777_1_En_6_Chapter/520777_1_En_6_Fig6_HTML.jpg)


    Figure 6-6


    Apps connecting to peers


    In Figure [6-6](#520777_1_En_6_Chapter.xhtml#Fig6), application A links to P1
    and uses the chaincode S1 to query or modify the L1 ledger. P1 requests a response
    from S1 with the outcome of the planned ledger query or update. Application A
    has received the proposal response, and the query phase of the procedure is now
    complete.


    Application A generates a transaction from all update replies and sends it to
    O1 to sort. O1 gathers and distributes transactions in blocks from all peers,
    including P1\. P1 verifies the transaction before committing it to L1\. Once L1
    has been changed, as received from A, P1 creates an event to signal completion.


    In most cases, applications must connect to the peers they represent in order
    for the book update master to be approved. This is demonstrated in the “Transaction
    Flow” section.'
  trans: "\n# 证书颁发机构\n\n身份（公钥对和私钥）及证书由认证机构分发给各个参与者。这份将原告与参与者公钥关联起来的证书，由认证机构进行数字签名（并可选择附带完整属性）。因此，如果信任该\
    \ CA（且知晓其公钥），则可信任该个体参与者。由此，若信任 CA（并知晓其公钥），便可确信被识别的参与者与证书中提供的公钥相对应，并具备所列特征，从而验证原告证书上\
    \ CA 签名的真实性。CA 负责确保组织内所有参与者均拥有经过验证的数字身份。（见图 6-3。）\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig3_HTML.jpg](img/520777_1_En_6_Fig3_HTML.jpg)\n\
    \n图 6-3  \n证书颁发机构\n\n# 成员服务提供者（MSP）\n\nMSP 能够验证身份。换言之，它们能判定某个身份是否属于特定组织，以及该身份在组织内所扮演的角色。因此，尽管\
    \ CA 可以颁发身份和数字证书，但 MSP 能在网络上识别这些身份。\n\nMSP 还向成员提供网络内部的多种角色与权限。\n\nMSP 是将组织身份与其成员资格关联起来的方法。成员的公钥（也称为证书、证书签名）被添加到组织的\
    \ MSP 中，以获取成员资格。\n\nMSP 也用于为网络参与者分配各种角色和权限。MSP 是连接身份与组织成员资格的机制。成员的公钥（也称为证书、证书签名）被添加到组织的\
    \ MSP 中，以获取成员资格。\n\n另一方面，MSP 的功能不仅限于列举谁是网络或通道的成员。通过识别参与者在节点或通道上的特定权利，MSP 负责将身份转化为角色。用户在向\
    \ CA Fabric 注册时必须被分配一个角色，例如管理员、对等节点、客户端、排序节点或成员。\n\n## 本地 MSP\n\n针对客户端和节点的 MSP\
    \ 是按每个客户端和每个节点（对等节点和排序节点）分别指定的。本地 MSP 控制节点的权限（例如能够运行节点的对等管理员）。在 MSP 的客户端环境中，用户可以将自己认证为通道的成员（例如在链码交易中），或系统中特定角色的持有者（例如作为管理员组织）。\n\
    \n客户本地 MSP 设置在节点的系统文件中，仅适用于该节点。由于排序节点与对等节点一样属于单一机构，因此它们拥有单个 MSP 来标识其信任的参与者或节点。\n\
    \n## 通道 MSP\n\n另一方面，通道 MSP 在通道级别确立管理和参与权限。应用程序通道上的对等节点和排序节点与通道 MSP 共享相同的视图，从而能够正确认证通道访客。这意味着，如果某公司想要加入通道，通道配置中应包含一个与该公司内部人员协作的\
    \ MSP。因此，涉及该组织身份的交易将被拒绝。\n\n本地 MSP 记录在通道配置中，而通道 MSP 以文件夹结构的形式存储在文件系统上。通道 MSP 决定谁在通道级别拥有权力。通道\
    \ MSP 定义了通道成员身份与通道级规则执行之间的关联。\n\n通道 MSP 将所有参与组织的 MSP 连接到一个统一的排序系统中。排序服务很可能拥有来自多家企业的排序节点，整个排序服务由这些企业共同管理。\n\
    \n## 存储 MSP 数据\n\n本地 MSP 记录在通道配置中，而通道 MSP 以文件夹结构的形式存储在文件系统上。通道 MSP 决定谁在通道级别拥有权力。通道\
    \ MSP 定义了通道成员身份与通道级规则执行之间的关联。\n\n通道 MSP 将所有参与组织的 MSP 连接到一个统一的排序系统中。排序服务很可能拥有来自多家企业的排序节点，整个排序服务由这些企业共同管理。\n\
    \n因此，通道 MSP 在逻辑上驻留在通道或网络中并由其管理，但每个节点的本地文件系统都包含所有通道 MSP 的副本。\n\n# 对等节点\n\n区块链主要由相互通信的节点构成。由于对等节点拥有账本和智能合约，因此它们是网络的关键组件。账本以不可变的方式记录所有智能合约交易。可以对对等节点进行添加、移除、重启、重新配置和删除操作。\n\
    \n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig4_HTML.jpg](img/520777_1_En_6_Fig4_HTML.jpg)\n\
    \n图 6-4  \n账本与链码\n\n因此，一个对等节点拥有一个或多个账本实例，以及一个或多个不同链码的实例。（见图 6-4。）\n\n实际上，对等节点可以参与不同的通道，从而拥有不同的账本实例（每个通道对应一个独立的账本）。\n\
    \n此外，根据网络的配置方式及其设计目的，可能存在多个链码。因此，一个对等节点可以托管多个链码实例。\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig5_HTML.jpg](img/520777_1_En_6_Fig5_HTML.jpg)\n\
    \n图 6-5  \n应用程序与对等节点\n\n接着，为了获取对账本的访问权限，图中展示了应用程序如何与对等节点交互。（见图 6-5。）Hyperledger\
    \ Fabric 为开发者提供了 Fabric API 软件开发工具包（SDK），使其能够与对等节点、链码以及账本进行交互。\n\n应用程序可以通过对等节点连接，利用链码查询或更新账本。账本查询的提议交易结果会迅速返回，但账本更新需要应用程序、对等节点和排序节点之间进行更复杂的交互。\n\
    \n图 6-6 以非常基础的方式展示了这一点。\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig6_HTML.jpg](img/520777_1_En_6_Fig6_HTML.jpg)\n\
    \n图 6-6  \n应用程序连接对等节点\n\n在图 6-6 中，应用程序 A 连接到 P1，并使用链码 S1 查询或修改账本 L1。P1 向 S1 请求响应，S1\
    \ 返回计划中的账本查询或更新的结果。应用程序 A 收到了提案响应，流程的查询阶段至此完成。\n\n应用程序 A 根据所有更新回复生成一笔交易，并将其发送给\
    \ O1 进行排序。O1 从所有对等节点（包括 P1）收集交易并以区块形式分发。P1 在将交易提交至 L1 之前对其进行验证。一旦 L1 按照从 A 接收到的内容完成更新，P1\
    \ 便生成一个事件以指示完成。\n\n在大多数情况下，应用程序必须连接其所代表的对等节点，以使账本更新主节点获得批准。这一点在“交易流程”一节中进行了演示。\n"
- fmt: "### Peers and Organizations\n\nDifferent companies control blockchain networks,\
    \ or a single company manages them all. Because they are owned by these companies,\
    \ peers are crucial in the construction of this form of distributed network. Peers\
    \ are also the connection points for an organization’s network.\n\nIn this case,\
    \ a network is formed by four contributing organizations and eight peers. The\
    \ five peers in network `N` that are connected via channel `C` are `P1`, `P3`,\
    \ `P5`, `P7`, and `P8`. Although the other peers of these companies have not entered\
    \ this channel, they are generally members of at least one other channel. The\
    \ applications developed by a company will link employees within that company\
    \ as well as employees from other companies. For clarity, an ordering node is\
    \ not shown in Figure 6-7.\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig7_HTML.jpg](images/520777_1_En_6_Chapter/520777_1_En_6_Fig7_HTML.jpg)\n\
    \n*Figure 6-7 Connecting organizations and peers*\n\nMultiple contributing organizations\
    \ with resources establish and administer the network. The resources in this topic\
    \ are peers; however the resources supplied by an organization are more than just\
    \ peers. The collaborative network would not exist without the organizations that\
    \ offer their unique resources to it. The network grows and narrows as a result\
    \ of the resources provided by these member entities.\n\n### Peers and Identity\n\
    \nPeers are assigned an identity through a digital certificate of one certain\
    \ certification authority. When a peer connects to a blockchain via a channel,\
    \ the peer’s rights are determined by a rule in the channel configuration based\
    \ on their identity.\n\nTherefore, the (channel) `MSP` recognizes the organization\
    \ to which it belongs through its digital certificate. (See Figure 6-8.)\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig8_HTML.jpg](images/520777_1_En_6_Chapter/520777_1_En_6_Fig8_HTML.jpg)\n\
    \n*Figure 6-8 Identity of the peers*\n\n`CA1` has provided identities to `P1`\
    \ and `P2` in this case. The identities issued by `CA1` are related with `Org1`\
    \ using `ORG1.MSP`, as determined by Channel `C` utilizing the `MSP` channel.\
    \ `ORG2.MSP` also recognizes `P3`/`P4` as `Org2` components.\n\n### Peer, Consensus,\
    \ and Order\n\nTo guarantee that almost all peers on a network blockchain retain\
    \ their information in sync, applications that want to modify the ledger go through\
    \ a three-step process.\n\n- In the first step, the app connects with a limited\
    \ set of supporting peers, who individually provide a proposed response that isn’t\
    \ yet applied to the ledger. The subset of endorsing peers that the application\
    \ interacts with to update the ledger is determined by network policies.\n\n-\
    \ These proposal answers are collected in the second step by an application that:\n\
    \    - Verifies its consistency.\n    - Sends the transaction to the ordering\
    \ service as a consequence.\n\n- In the third and final stage, the ordering service\
    \ orders all incoming transactions to be combined into a block, which is then\
    \ sent to each neighbor, where each transaction is verified before being recorded.\n\
    \nAs a result, the ordering nodes that make up the ordering service are at the\
    \ center of everything. The section that follows takes a deeper look at this procedure.\n\
    \n## Hyperledger Fabric Consensus\n\nConsent in Hyperledger Fabric goes through\
    \ three stages:\n\n- Proposal\n- Ordering and packing of transactions in blocks\n\
    - Validation and commit\n\n### Stage 1: Proposal\n\nInitially, the program selects\
    \ a set of peers to generate updates to the proposed ledger.\n\nThe approval policy\
    \ (given for a chaincode) determines which organizations must approve a suggested\
    \ ledger transaction before it can be accepted by the networks and therefore registered.\n\
    \nThat’s what it means to attain consensus: every relevant organization must agree\
    \ the proposed ledger update before it can be accepted into any peer’s ledger.\n\
    \nApplications develop transactions which are suggested, which they transmit to\
    \ every one of the peer groups that must approve it. Each of these is unique.\
    \ The supporting peer then generates a response to the settlement proposal by\
    \ independently executing a transaction proposal-based chaincode. This update\
    \ is not applied to the book master; instead, it is signed and returned to the\
    \ application. (See Figure 6-9.)\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig9_HTML.jpg](images/520777_1_En_6_Chapter/520777_1_En_6_Fig9_HTML.jpg)\n\
    \n*Figure 6-9 Proposal*\n\nA peer accepts a proposed answer by signing the whole\
    \ payload with his private key and attaching its digital signature. This permission\
    \ can later be used to demonstrate that a certain response was generated by a\
    \ peer inside the company.\n\nPhase 1 concludes when the application obtains a\
    \ enough number of peer replies. Note that various peers can return to the application\
    \ with different transaction answers, making the settlement proposal contradictory.\n\
    \nThere are two possible causes for this. Because of the chaincode’s nondeterminism\
    \ (a feature to avoid in chaincodes), or because of peer inconsistency.\n\nIf\
    \ an application tries to update the ledger with an inconsistent set of reply\
    \ transactions, it will be refused. If the proposition is successful, each response\
    \ is consistent and thus equivalent to the others."
