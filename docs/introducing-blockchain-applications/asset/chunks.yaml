    \ *,* the task priority is calculated based on the difference between the deadline\
    \ and the computation time necessary for the task. The lower this value is, the\
    \ higher the priority the task is\n\n![$$ {laxity}_i={d}_i-{c}_i $$](images/520777_1_En_10_Chapter/520777_1_En_10_Chapter_TeX_Equb.png)\n\
    \n### 10.2.2 Scheduling Dependent Tasks\n\nIn this category, which is closer to\
    \ reality and therefore more interesting, we assume that the tasks have dependencies\
    \ (e.g. mutual exclusion).\n\nThe *Kernelized Monitor algorithm* *,* proposed\
    \ by Mok [2], allocates the processor for non-interruptible time *q* and assumes\
    \ that a critical section is executable within the time limit. The earliest policy\
    \ is used for scheduling deadlines first.\n\nThe scheduling analysis done in this\
    \ protocol requires the use of upper bounds on the times of execution of all the\
    \ critical sections that appear in the tasks. In fact, the quantity must be calibrated\
    \ on the longest executable critical section. Since these upper bounds can be\
    \ too pessimistic, using the protocol kernelized monitor can lead to low processor\
    \ utilization.\n\nThe *Priority Ceiling Protocol* is used to schedule a periodic\
    \ set of tasks that have exclusive access to one or multiple common resources\
    \ protected by traffic lights.\n\nThis protocol was created by Sha, Rajkmar, and\
    \ Lehocky in 1990 to solve the problem of *priority inversion*. This arises when\
    \ a high priority job has to wait for a higher priority job to be executed, typically\
    \ due to other resources being used by running tasks.\n\nIf there are three tasks\
    \ (T1, T2, and T3) with priority p1> p2> p3, all three use the resource R and\
    \ the algorithm for scheduling the monotonic rate type.\n\nSuppose that T1 and\
    \ T3 need to access the resource to which the mutex S is associated.\n\nIf T3\
    \ starts processing and locks (S) before T1 starts, then T1 will be locked for\
    \ an undefined time, that is, until T3 it will not do an unlock (S), freeing the\
    \ resource S. In fact, T1 cannot continue execution without the resource S held\
    \ by T3\\. In this case, T1 is penalized in favor of T3 in spite of the order\
    \ of priorities p1> p3.\n\nIf, before T3 unlocks (S), T2 starts, then T3 will\
    \ be suspended to allow T2 to be processed under the priorities p2> p3\\. In this\
    \ case, T1 will have to wait for T2 to stop being processed. Indeed, T1 is blocked\
    \ on T3, which in turn is blocked on T2 in spite of the order of priorities p1>\
    \ p2.\n\nThe proposed algorithm is based on the following points:\n\n*   A task\
    \ is allowed to enter the critical section only if its priority is higher than\
    \ the task that is currently locking the resource.\n\n*   When it has finished\
    \ using the critical section, it releases it, giving it the previous priority.\n\
    \n## 10.3 Review Questions and Answers\n\nTry these review questions as a test\
    \ of knowledge.\n\n### 10.3.1 Review Questions\n\n1.  “A task is a set of events.”\
    \ Is this statement correct or incorrect?\n\n2.  What is scheduling ?\n    1.\
    \  Preventive: When a current task can be put on hold in order to finish an even\
    \ more important task.\n\n    2.  Preventive: When a running task can be briefly\
    \ paused in order to complete a more critical task.\n\n    3.  Preemptive: When\
    \ the currently executing process can be used to temporarily execute another task.\n\
    \n    4.  Preventive: When an ongoing task can be briefly paused to complete a\
    \ less critical task.\n\n3.  Which of the following task statements is correct?\n\
    \    1.  Depending on the operating system, a task can be a process or a thread.\n\
    \n    2.  The job must be a program or a thread, depending on the operating system.\n\
    \n    3.  A task might be a process or a thread, depending on the version.\n\n\
    \    4.  None of the preceding.\n\n4.  Which of the following claims regarding\
    \ events are true?\n    1.  If the current task can’t be paused until it’s finished,\
    \ it’s non-preemptive. A schedule is a list of tasks that the processor has been\
    \ allocated.\n\n    2.  Non-preemptive is not whether a job in progress can be\
    \ paused until it is completed. A schedule is a list of tasks that the processor\
    \ has been allocated.\n\n    3.  Non-preemptive is when the current task can’t\
    \ be halted until it’s completed. A timetable is a set of responsibilities assigned\
    \ to a specific event.\n\n    4.  All of these are true.\n\n5.  “A task is a set\
    \ of instructions that is continually executed by the processor in the absence\
    \ of other activities.” Is this statement correct?"
  trans: "\n# 10.2 约束类型\n\n转移限制（transition restriction）可防止数据因先前状态而进入不可能的状态。例如，一个人不应能从“已婚”状态切换到“未婚，从未结婚”状态。在“已婚”之后，唯一允许的状态是“离异”、“丧偶”或“死亡”。\n\
    \n![../images/520777_1_En_10_Chapter/520777_1_En_10_Fig3_HTML.jpg](img/520777_1_En_10_Fig3_HTML.jpg)\n\
    \n图 10-3\n\n任务处理器\n\n转移约束（transitional constraint）是一种特性，它支配着信息安全形式模型中，从模型的一个状态到其后继状态的每一次合法转移。它可以被视为状态标准的补充，状态标准适用于整个状态，但对状态之间的转移没有影响。\n\
    \n一旦其目标地址已写入辅助存储器，且它不在等待特定任务，则该进程即可执行且可切换。如果一个进程正在等待某个任务，它将被置入睡眠状态，其整个地址空间将被写入辅助存储器。\n\
    \n关于约束，请注意以下几点：\n\n![../images/520777_1_En_10_Chapter/520777_1_En_10_Fig5_HTML.jpg](img/520777_1_En_10_Fig5_HTML.jpg)\n\
    \n图 10-5\n\n任务激活\n\n![../images/520777_1_En_10_Chapter/520777_1_En_10_Fig4_HTML.jpg](img/520777_1_En_10_Fig4_HTML.jpg)\n\
    \n图 10-4\n\n实时任务\n\n- 类型包括抖动、触发、完备性和截止期限。\n- 它们可以是显式的（包含在系统活动规范中）或隐式的（不包含在系统活动规范中）。\n\
    - 它们对资源的执行限制施加了逻辑顺序。\n- 它们确保对互斥资源的访问是同步的。\n\n## 10.2.1 独立任务调度约束\n\n此类别假设任务之间没有任何依赖关系（例如互斥）。\n\
    \n*速率单调算法*是一种基于静态优先级进行抢占的动态算法，其假设如下：\n\n1.  属于特定任务集的所有任务的请求（该任务集具有硬实时约束）都是周期性的。\n\
    2.  所有任务都是独立的（不存在互斥或依赖关系）。\n3.  每个任务（`Ti`）的到期时间与其周期（`pi`）的持续时间一致。\n4.  你预先知道每个任务的最大计算时间。\n\
    5.  上下文切换时间忽略不计。\n6.  `n` 个任务的利用率因子之和的上限为：\n\n![$$ \\mu =\\sum \\frac{c_i}{p_i}\\\
    le n\\;\\left({2}^{\\frac{1}{n}}-1\\right) $$](img/520777_1_En_10_Chapter_TeX_Equa.png)\n\
    \n其中：\n\n`c[i]` = 第 i*个*任务的计算时间\n\n`p[i]` = 第 i*个*任务的周期持续时间\n\n该算法静态地分配优先级，并基于任务周期的持续时间。周期较短的任务将具有较高优先级，而周期较长的任务优先级较低。因此，在执行阶段，每次都会选择周期最短的任务。\n\
    \n对于*最早截止期限优先算法*，会选择到期时间最早的算法。对于*最小松驰度算法*，任务的优先级是基于截止期限与任务所需计算时间之间的差值来计算的。这个值越低，任务的优先级就越高。\n\
    \n![$$ {laxity}_i={d}_i-{c}_i $$](img/520777_1_En_10_Chapter_TeX_Equb.png)\n\n\
    ## 10.2.2 调度依赖任务\n\n在此类别中（更接近现实，因此也更有趣），我们假设任务之间存在依赖关系（例如互斥）。\n\n由 Mok [2] 提出的*内核化监视器算法*，为不可中断的时间\
    \ `q` 分配处理器，并假设临界区可以在该时间限制内执行。调度时采用最早截止期限优先策略。\n\n此协议中的调度分析需要为任务中出现的所有临界区的执行时间设定上限。实际上，这个量必须根据最长可执行临界区进行校准。由于这些上限可能过于悲观，使用内核化监视器协议可能会导致处理器利用率较低。\n\
    \n*优先级天花板协议*用于调度一组周期性任务，这些任务对受信号量保护的一个或多个公共资源具有排他性访问权。\n\n该协议由 Sha、Rajkmar 和 Lehocky\
    \ 于 1990 年创建，用于解决*优先级反转*问题。当高优先级任务必须等待另一个高优先级任务执行时，就会发生此问题，这通常是由于运行的任务正在使用其他资源。\n\
    \n如果有三个任务（`T1`、`T2` 和 `T3`），优先级为 `p1 > p2 > p3`，三者都使用资源 `R`，并且采用速率单调类型的调度算法。\n\
    \n假设 `T1` 和 `T3` 都需要访问与互斥锁 `S` 相关联的资源。\n\n如果 `T3` 在 `T1` 开始之前开始处理并锁定（`S`），那么 `T1`\
    \ 将被锁定一段不确定的时间，也就是说，直到 `T3` 执行解锁（`S`）释放资源 `S` 为止。事实上，如果没有 `T3` 持有的资源 `S`，`T1`\
    \ 就无法继续执行。在这种情况下，尽管优先级顺序为 `p1 > p3`，但 `T1` 会因其而被 `T3` 所阻碍。\n\n如果在 `T3` 解锁（`S`）之前，`T2`\
    \ 开始运行，那么 `T3` 将被挂起，以便 `T2` 能够根据优先级 `p2 > p3` 被处理。在这种情况下，`T1` 将不得不等待 `T2` 停止处理。实际上，尽管优先级顺序为\
    \ `p1 > p2`，但 `T1` 被 `T3` 阻塞，而 `T3` 又反过来被 `T2` 阻塞。\n\n所提出的算法基于以下几点：\n\n- 仅当任务的优先级高于当前锁定资源的任务时，才允许该任务进入临界区。\n\
    - 当其使用完临界区后，它会释放临界区，并将优先级恢复为先前的状态。\n\n## 10.3 复习题与答案\n\n请尝试回答这些复习题以检验知识掌握情况。\n\
    \n### 10.3.1 复习题\n\n1.  “一个任务是一组事件。”这个说法正确还是错误？\n\n2.  什么是调度？\n    1.  预防性：当前任务可以被暂停以便完成一个更重要的任务。\n\
    \    2.  预防性：正在运行的任务可以被短暂暂停以便完成一个更关键的任务。\n    3.  抢占式：当前正在执行的进程可以被用来临时执行另一个任务。\n\
    \    4.  预防性：正在进行中的任务可以被短暂暂停以完成一个不那么关键的任务。\n\n3.  下列关于任务的陈述，哪一个是正确的？\n    1. \
    \ 取决于操作系统，一个任务可以是一个进程或一个线程。\n    2.  作业必须是一个程序或一个线程，具体取决于操作系统。\n    3.  一个任务可能是一个进程或一个线程，具体取决于版本。\n\
    \    4.  以上都不对。\n\n4.  下列关于事件的陈述，哪些是正确的？\n    1.  如果当前任务在完成之前不能被暂停，那么它就是非抢占式的。调度表是已分配给处理器的一系列任务。\n\
    \    2.  非抢占式不是指正在进行的工作是否可以暂停直至完成。调度表是已分配给处理器的一系列任务。\n    3.  非抢占式是指当前任务在完成之前不能被暂停。时间表是分配给特定事件的一组职责。\n\
    \    4.  以上所有陈述都是正确的。\n\n5.  “在没有其他活动的情况下，一个任务是由处理器持续执行的一组指令。”这个说法正确吗？\n"
- fmt: '### 10.3.2 Answers


    1.  Answer: Incorrect, a task is a series of events.

    2.  Answer: B, preventive scheduling is when a running task can be briefly paused
    in order to complete a more critical task.

    3.  Answer: C, a task might be a process or a thread, depending on the version.

    4.  Answer: A, If the current task can’t be paused until it’s finished, it’s non-preemptive.
    A schedule is a list of tasks that the processor has been allocated.

    5.  Answer: Incorrect, a task is a set of instructions that the processor executes
    in the absence of other operations until it is completed.


    ## 10.4 Summary


    This chapter explained how scheduling works in real-time systems. Scheduling homogeneous
    processes arises when several processes with the same requests and time constraints
    must be efficiently served by the scheduling policy. For example, such a situation
    arises in a video server that must support the display of a fixed number of videos
    all characterized by the same frame rate, video resolution, data transmission
    frequency, etc.


    In this situation, a simple but effective scheduling policy is round-robin. In
    fact, all processes are equally important; they have the same amount of work to
    do and crash when they have finished processing the current frame. The scheduling
    algorithm can be optimized by adding a timing mechanism to ensure that each process
    runs at the correct frequency. The simple precedent model rarely occurs in practice.
    A more realistic model provides for the presence of multiple processes competing
    for CPU use, each with its own workload and deadlines.


    The next chapter focuses on modeling and discusses how model-based engineering
    helps in the distributed system. For the practical implementation of distributed
    systems, the model’s guided engineering is an important concept.


    # 11. Engineering Based on Models


    Engineering-based models is an application development technique that prioritizes
    the creation of models or abstractions that are more closely related to specific
    domain notions than computational or algorithmic principles. This technique boosts
    productivity by optimizing system compatibility, simplifies the design process,
    and fosters individual and team communication and collaboration on the system.


    Models allow technical and non-technical stakeholders to have the same vision
    and understanding, as well as promote and encourage interaction between them.
    Models also help with project planning by providing a clearer view of the system
    to be built and enabling for managing projects based on objective criteria.


    ## 11.1 Model-Driven Approach to Blockchain


    In recent years, the notion of blockchain has acquired great traction in practice
    and research, as it offers a practical solution to the problems of anonymity and
    accountability in dispersed situations involving numerous parties that must share
    data and cooperate securely. However, the influence of business core network and
    configuration on successfully using blockchain technology remains largely unknown
    to date. This book offers a model-driven method that captures the features of
    current blockchain-driven business networks by combining an ontology with a layer
    model.


    The levels help describe such networks in detail. The Blockchain Business Network
    Ontology (`BBO`) is also introduced, which formalizes the ideas and characteristics
    of the various components of a blockchain network. I demonstrate the usefulness
    of this work by assessing and applying it to a real-world blockchain use case.


    To develop the blockchain business model, you need to have the approach of *model-driven
    engineering*.


    ## 11.2 Model-Driven Development


    By bringing together diverse viewpoints with varied degrees of abstraction, a
    model-based method aids in the understanding of a system. “A client is able to
    build on a model that includes a system’s features and characteristics, which
    can then be used to completely rebuild the system in this context.” Following
    a model-driven architecture or design helps in a variety of ways to comprehend
    and describe a system.^([⁷](#fn7))


    - The links between the various parts, as well as their descriptions, contribute
    to a broad knowledge of the system, while also assisting in the development of
    scalable solutions, because a model is built on a well-defined nomenclature and
    taxonomy.

    - To make the development of a system easier, an architectural frame may be used
    to mix and modify multiple models and explanatory levels.

    - Automat may be used for a group of formalized metamodels, which can then be
    merged and converted into models with a greater degree of information.

    - Technical standards are a necessary basis for expanding model-based effort acceptability
    and implementation.


    ### 11.2.1 The Blockchain Layer Model


    Creating various models that specifically address diverse elements of a larger
    system aids in the development of a thorough knowledge of that system or phenomena.
    “Various levels of abstraction may be examined using these models, which can then
    be overlaid onto each other or whose information transmitted to other levels in
    order to comprehend the full scope of a concept.”¹


    As a result, three fundamental layers (see Figure [11-1](#520777_1_En_11_Chapter.xhtml#Fig1))
    have been defined to make it easier to describe blockchain-driven networks in
    a sound and comprehensive manner. These layers include everything from a business
    model perspective to a code-based viewpoint. All of these levels are essential
    because we anticipate blockchain technology to have a unique impact on each of
    them.


    Because the layers are interrelated, the technological implementation has an impact
    on the network composition, which has an effect on the business model. Figure
    [11-1](#520777_1_En_11_Chapter.xhtml#Fig1) is an example of layered blockchain.


    ![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig1_HTML.jpg](images/520777_1_En_11_Chapter/520777_1_En_11_Fig1_HTML.jpg)


    **Figure 11-1** Blockchain layers


    In order to create a model-driven method for defining blockchain transactions
    and blocks layers, you’ll see how to build on these foundations with the help
    of models and metamodels.


    ### 11.2.2 Models and Metamodels


    This section covers the fundamental ideas that underpin MDE, such as system, model,
    metamodel, as well as their relationships.


    The *system* is defined in the context of MDE as “a general notion for denoting
    a software application, software platform, or other software artefact.” ^([⁸](#fn8))
    A system can also be built up of various subsystems, as illustrated in Figure
    [11-2](#520777_1_En_11_Chapter.xhtml#Fig2), and it can interact with other systems.
    (Systems may interact with other systems.)


    A model is an abstraction of phenomena in the real world: a metamodel is a further
    abstraction, which highlights properties of the model itself. A model conforms
    to its metamodel in the same way that a computer program conforms to the grammar
    of the programming language in which it is written.


    Domains where metamodels are used:


    - A schema for semantic data that needs to be exchanged or stored

    - A language that supports a particular method or process

    - A language to express additional semantics to existing information


    The following sections cover the details of models and metamodels.


    ![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig2_HTML.jpg](images/520777_1_En_11_Chapter/520777_1_En_11_Fig2_HTML.jpg)


    **Figure 11-2** System definition'
