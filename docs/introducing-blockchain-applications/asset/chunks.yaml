- fmt: '# 17.2 Blockchain for Information Sharing and Exchange


    `Blockchain` is critical for sharing and transferring data across IoT device endpoints.
    It manages the wireless communication network between the various network control
    locations, systems, and servers using `BC`. `BC` is an IoT backbone technology
    that collects data and distributes it to endpoints or final nodes. As is generally
    known, `BC` offers IoT nodes and stakeholders with traceability, trust, privacy,
    security, and transparency when sharing information.


    `Blockchain` allows providers and Internet firms to share data and approve interoperability
    based on customer privacy data. It also shares data sharing records in order to
    authorize data access. Data traceability is also important to guarantee that data
    exchange is legitimate, controlled, auditable, and regulated³.


    The information should be communicated among the endpoints with trust, security,
    and transparency via this blockchain system. To achieve data access permission,
    blockchain shares data sharing records. Vehicle drivers have their own private
    access control mechanisms and the ability to share or sell their data, as shown
    in Figure [17-2](#520777_1_En_17_Chapter.xhtml#Fig2). Here, the carrier or communication
    service provider (`CSP`) provides benefits such as (1) no private data is sent
    out, (2) confirmation information may be verified and modified, and (3) traceable
    and tamper-proof information.³


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig2_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig2_HTML.jpg)


    **Figure 17-2** Data transfer via blockchain technology in the vehicle management
    system


    ## Note


    In this chapter, we created a project (autonomous vehicle management) that combines
    artificial intelligence and blockchain technology. The goal is to focus on artificial
    intelligence because the previous chapter talked a lot about blockchain technology.
    This is a combination of most trending technologies such as artificial intelligence,
    blockchain, and IoT. There are lots of examples in Western countries where both
    technologies are implemented in application development.


    In all Western countries, self-driving vehicles are now one of the primary axes
    of mobility development. The European Commission is dedicated to supporting any
    connected and automated mobility solutions that can help meet the previously established
    sustainability and safety goals in its smart and sustainable mobility plan.


    Urban tram and train options with self-driving capabilities currently exist for
    public transportation. We may see autonomous taxis with digital car-sharing systems
    develop in the next several years, operating in limited regions. In terms of private
    transportation, the objective of producing a fully driverless car is still a long
    way off, especially in congested areas. However, in the next few years, automobiles
    with increasingly advanced autonomous driving functions will be available for
    purchase. Several cities might potentially provide the infrastructure needed to
    develop environmental digital systems that allow for the deployment of some autonomous
    driving features within a decade. Even if the change will be gradual, let’s expect
    a totally new path.


    Autonomous driving is, at the moment, one of the biggest challenges facing the
    automotive world. Creating cars with artificial intelligence developed to the
    point of being able to drive without human intervention and capable of making
    fundamental decisions in a few thousandths of a second is by no means simple.
    In the test phase on the roads open to traffic, there was no shortage of accidents
    involving self-driving cars, but step by step we are arriving at increasingly
    advanced models capable of not requiring human intervention.


    ## Advantages of autonomous vehicle management include:


    * **Multitasking:** The driver can devote themself to a completely different activity.

    * **Safety:** Sensors and predictive algorithms will allow self-driving cars to
    assess and in some cases predict risks. Thanks to safe driving, the number of
    road accidents would decrease.

    * **Efficiency:** Abrupt braking and sudden acceleration can be avoided, thus
    optimizing fuel consumption.

    * **Less traffic:** Once on the road, vehicles would continuously communicate
    with each other, exchanging data on position, driving speed, and other useful
    and traffic-compliant information.

    * **No one excluded:** Self-driving cars can also be used by disabled people.
    In fact, they do not require particular physical skills. Just indicate the destination
    to your driverless driver and that’s it.


    Computers now play a crucial role in our culture. These systems are today utilized
    for a variety of applications in a variety of fields, ranging from medicine to
    avionics, this also includes the comparatively recent emerging technology called
    artificial intelligence.


    Because of the new fields in which these technologies are utilized, the idea of
    “computer systems” has to be redefined. Most of these systems must meet strict
    timelines in order to complete their jobs, otherwise catastrophic repercussions
    may occur, including widespread destruction, injuries, and even fatalities.


    We refer to systems as *crucial systems* when they must adhere to strict time
    frames. When a system’s failure might be catastrophic, inflicting serious harm
    to the environment, infrastructure, or persons, we refer to it as a *safety critical
    system*.


    In certain situations, these systems are used in a physical context. An automated
    automobile is an example of such a system: it consists of a computer system that
    performs the computations required to complete the given job and a physical component
    that interacts with the environment by changing both the environment’s and the
    platform’s state.


    Since these systems are so widespread and yet so hazardous if they fail, meeting
    and ensuring their (typically) ultra-high reliability criteria during the design
    and development process is critical. A system’s dependability is a gauge of how
    “trustworthy” it is, or its capacity to offer accurate service.


    A breakdown is an occurrence that causes the given service to be disrupted. A
    critical system’s *dependability* is described as a collection of theoretical
    and practical indicators. Let’s look more closely at the most significant indicators.'
