- fmt: "### 9.5.3 Scheduler With/Without Preemption\n\nIn schedulers with preemption,\
    \ a task can be interrupted following the request of a higher priority task. However,\
    \ the preemption is authorized if some assertions are not violated (see mutual\
    \ exclusion). In non-preemptive schedulers, tasks are not interrupted until their\
    \ completion.\n\n### 9.5.4 Static Scheduling\n\nIn static scheduling, the order\
    \ of execution of tasks is calculated offline. Static scheduling is typical in\
    \ time-triggered applications and with periodic tasks.\n\n### 9.5.5 Dynamic Scheduling\n\
    \nDynamic schedulers determine which task is to be executed when an event arrives,\
    \ based on the current state of the system. The various dynamic scheduling algorithms\
    \ differ according to the assumptions that are made.\n\n### 9.5.6 Independent\
    \ Task Scheduling\n\nThis category assumes that the tasks do not have any dependencies\
    \ (e.g. mutual exclusion).\n\n## 9.6 Review Questions\n\n1.  \"A distributed real-time\
    \ system (DRTS) is made up of self-contained computational nodes linked by a real-time\
    \ network.\" Is this statement correct or incorrect?\n\n2.  Which of the following\
    \ describes a hard real-time system?\n    1.  Can miss its deadline on a regular\
    \ basis with a low possibility.\n    2.  Can miss its deadline from time to time,\
    \ with a reasonable chance of doing so.\n    3.  Can occasionally miss its deadline\
    \ due to some unacceptably low probability.\n    4.  Can miss its deadline from\
    \ time to time, but with a low probability.\n\n3.  Which of the following statements\
    \ is correct for *state*?\n    1.  A state is a condition that lasts for a certain\
    \ amount of time in real time.\n    2.  A state is a condition that lasts for\
    \ a non-real time span.\n    3.  A state is a condition that does not last for\
    \ a period of time.\n    4.  A state is an unpredictably changing condition that\
    \ lasts for a period of time.\n\n4.  Which of the following statements about an\
    \ *event* is correct?\n    1.  An event is a happening that occurs in a particular\
    \ state.\n    2.  An event is a one-time non-occurrence.\n    3.  An event is\
    \ a one-time occurrence.\n    4.  All of these.\n\n5.  Three pieces define a reference\
    \ model:\n    1.  Workload model\n    2.  Resource model\n    3.  Algorithm\n\
    \    Is this statement correct or incorrect?\n\n## 9.7 Review Answers\n\n1.  Answer:\
    \ Correct. A distributed real-time system (DRTS) is made up of self-contained\
    \ computational nodes linked by a real-time network and consists of autonomous\
    \ computing nodes connected by a real-time network. The nodes in such a system\
    \ cooperate to achieve a common goal within specified deadlines.\n\n2.  Answer:\
    \ D, Can miss its deadline from time to time, but with a low probability.\n\n\
    3.  Answer: A, A *state* is a condition that lasts for a certain amount of time\
    \ in real time.\n\n4.  Answer: C, An *event* is a one-time occurrence.\n\n5. \
    \ Answer: Correct. The main parts of the RT system model are the workload model,\
    \ the resource model, and algorithms.\n\n## 9.8 Summary\n\nThis chapter explained\
    \ the time management of distributed systems. In addition, soft real-time and\
    \ hard real-time systems were discussed, which illustrate the reference models.\
    \ In order to implement a distributed system, it is necessary to understand this\
    \ time management system. Scheduling algorithms are also an important concept\
    \ of distributed systems, so the next chapter explains dynamic and static scheduling\
    \ algorithms in the distributed system.\n\n# 10. Scheduling in Real-Time Systems\n\
    \nThe task state determines the milestone of a task in a process. The default\
    \ states are as follows:\n\n- The job has been received and is waiting to be accepted\
    \ in the system.\n- The task has been accepted by the allocated user (or system).\
    \ Other users and systems cannot modify or complete the work since it is locked.\n\
    - The task has been completed.\n- A user has been assigned to the job. (Manual\
    \ tasks only.)\n- The task attempted to generate a work order in the activation\
    \ system, but was unsuccessful. (Activation tasks only.)\n\nThese conditions must\
    \ be met and cannot be changed. To support your business processes, you can define\
    \ extra states (user-defined states). You can set a task's state to `suspended`\
    \ if it can't be completed on time.\n\nIn the absence of other operations, the\
    \ processor executes a series of instructions until they are completed. A task\
    \ is a sequence of instances (jobs).\n\n![../images/520777_1_En_10_Chapter/520777_1_En_10_Fig1_HTML.jpg](images/520777_1_En_10_Chapter/520777_1_En_10_Fig1_HTML.jpg)\n\
    \nFigure 10-1 State even\n\nJobs that are ready are kept in a queue known as the\
    \ waiting list (`QUEUE`). The scheduling algorithm is a method for selecting a\
    \ task to run on the CPU.\n\n## 10.1 The Concept of Scheduling\n\nThe process\
    \ is composed of the scheduling algorithm:\n\n![../images/520777_1_En_10_Chapter/520777_1_En_10_Fig2_HTML.jpg](images/520777_1_En_10_Chapter/520777_1_En_10_Fig2_HTML.jpg)\n\
    \nFigure 10-2 State transition and ready queue\n\n- **Preemptive:** Work can be\
    \ briefly paused so that a more critical task can be completed.\n- **Non-preemptive:**\
    \ The task can't be interrupted. A schedule is a list of tasks allocated to the\
    \ processor in a certain order to the processor. A processor's process is a set\
    \ of tasks that have been allocated to them.\n\nProcesses may need to be swapped\
    \ or paged out to secondary memory in applications with severe real-time limitations.\n\
    \nAn operating system is said to be *multitasking* when it runs multiple programs\
    \ at the same time. It is important to distinguish between a program intended\
    \ as a \"container of instructions\" and a program intended as an \"in progress\"\
    \ entity. A running program is called a process (or task).\n\nSo while a *program*\
    \ is a static entity that describes the actions to be performed, a *process* is\
    \ a dynamic entity that represents the execution of those actions. The mechanism\
    \ that the OS adopts to execute several processes \"in parallel\" (concurrent\
    \ processes) is called *time sharing*.\n\nIt consists of assigning the CPU for\
    \ a time slice called `time-slice`, which is set for each process. When that time\
    \ expires, the execution of the process is suspended and the CPU is assigned to\
    \ another process. This technique is called *preemptive multitasking*.\n\nThe\
    \ most important problem with multitasking systems is the allocation of the resources\
    \ required by the various processes. In fact, it may happen that several processes\
    \ simultaneously request a specific single resource that cannot be shared (e.g.\
    \ the printer). In this case, the process requestor is suspended immediately and\
    \ the requesting process is placed in a wait queue. Only when the resource is\
    \ released and no other process in the queue precedes it, can it acquire the resource\
    \ and resume execution.\n\nAnother problem concerns access to peripherals. Because\
    \ device I/O operations are extremely slow relative to processor speed, a process's\
    \ request for an I/O operation causes the process to suspend until the operation\
    \ is complete (the hardware mechanism at stake is obviously the interrupt).\n\n\
    A process can be in one of these three states:\n\n- Running. The process has the\
    \ CPU and is running (ready).\n- The process was suspended because the time expired.\n\
    - Blocked (blocked, waiting, suspended). The process cannot advance because it\
    \ needs a resource that is not yet available or because it is waiting for I/O.\n\
    \nManaging ready jobs is implemented by a set of queues, each with a defined priority.\
    \ Each process is assigned a priority so that when the process goes to the ready\
    \ state, it is placed in the queue with the corresponding priority.\n\nThe process\
    \ that runs is the first in the queue. If there are no jobs waiting in it, the\
    \ first job in the queue is executed, and so on."
