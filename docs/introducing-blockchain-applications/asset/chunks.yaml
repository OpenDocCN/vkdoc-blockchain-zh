    governance, management, and other fields. In fact, it has provided the option
    of multichannel payments and multi-signature transactions over an address in order
    to improve security.


    ### 7.4.2 Proof of Stake (PoS)


    The simplest and most ecologically friendly alternative to the PoW consensus mechanism
    is Proof of Stake (PoS) .


    The block creators in this blockchain system do not act as miners, but rather
    as validators. They can construct a block over everyone, which will save energy
    and time. In order to validate the block, they must invest a certain amount of
    money or stake.


    In addition, unlike PoW, miners are given the option to keep their transaction
    fees in this algorithm because there is no reward mechanism in this consensus
    model.


    As a result, companies like Ethereum were pushed to upgrade their paradigm from
    PoW to PoS in their Ethereum 2.0 release. It also aided the correct functioning
    of several blockchain ecosystems such as Dash, Peercoin, Decred, ReddCoin, and
    Piv X.


    While PoS addressed some of the flaws that previously plagued PoW, the market
    still faced numerous challenges. Several types of PoS were created to address
    these issues and provide a better blockchain ecosystem. The two major variations
    of Proof of Stake (PoS) are PoSD and LPoS, discussed next.


    #### 7.4.2.1 Proof of Stake Delegated (PoSD)


    In PoSD, players stake their coin and vote for a certain number of delegates,
    with the amount they invest determining how much weight they receive. For example,
    if user A invests 10 coins in a delegate while user B spends 5, A’s vote is more
    important than B’s.


    Delegates are also paid in interchange fees or a set number of bitcoins.


    Due to its stake-weighted voting method, PoSD is commonly considered a digital
    democracy and one of the fastest blockchain consensus algorithms. Some of the
    real-world uses of the blockchain consensus mechanism include Steem, EOS, and
    Bit Shares.


    #### 7.4.2.2 Leased Proof of Stake (LPoS)


    LPoS is updated variant of the PoS consensus mechanism on the Waves platform.


    Unlike the traditional proof-of-stake approach, which allows users to lease their
    cryptocurrency balance to full nodes, this consensus process enables users to
    rent their remaining balance to complete nodes.


    Those who rent the most have the best chance of creating the block. In addition,
    the leaser gets paid a share of the transaction charge collected from the entire
    node.


    This Proof-of-Stake variation offers a fast and secure way to build public cryptocurrencies.


    ### 7.4.3 Byzantine Fault Tolerance (BFT)


