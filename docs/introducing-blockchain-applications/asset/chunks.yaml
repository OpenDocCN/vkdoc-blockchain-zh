    \ s-1 (modn) G + r s-1 (modn) pubKey*\n\nReplace `pubKey` with `privKey G`:\n\n\
    *Rv = (xv; yv) = h (msg) s-1 (modn) G + r s-1 (modn) privKey G*\n\nHighlight `G`\
    \ and `s-1 (mod n)`, obtaining:\n\n*Rv = (xv; yv) = (h (msg) + r privKey) s-1\
    \ (mod n) G*\n\nWe know that:\n\n*s-1 (mod n) = (k-1 (h (msg) + r privKey)) -\
    \ 1 (mod n)*\n\nAnd so:\n\n*s-1 (mod n) = k (h (msg) + r privKey) -1 (mod n)*\n\
    \nWe substitute this in the equation of `Rv:`\n\n*Rv = (h (msg) + r privKey) k\
    \ (h (msg) + r privKey) -1 (modn) G = k*\n\nThe last step is to compare the point\
    \ `Rv` with the point `R`. This is encoded by `privKey`. This algorithm compares\
    \ the `X` coordinates of `Rv` with the `X` of `R` (where `R = (xr; yr) e r = randomPart\
    \ = xr mod n`). More precisely, the signature is expected to be valid if given\
    \ `c = xv mod n`, then `c == r`.\n\nFigure [3-12](#520777_1_En_3_Chapter.xhtml#Fig12)\
    \ illustrates, at a high level, how the digital signatures in Bitcoin transactions\
    \ work.\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig12_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig12_HTML.jpg)\n\
    \nFigure 3-12\n\nTransactions and digital signatures\n\n## 3.4 The Transaction\n\
    \nThe transaction is the most basic component of Bitcoin’s blockchain. Transactions\
    \ are verified and sent out. Many transactions combine to make a block. Furthermore,\
    \ a chain of blocks is formed through a digital data link.^([³](#fn3))\n\nTo select\
    \ the next block to be put to the chain, the blocks go through a consensus procedure.\
    \ The chosen block is verified and added to the existing chain.\n\nMiners are\
    \ special peer nodes that perform the validation and consensus processes. It’s\
    \ important to note that they are unique or powerful machines that run blockchain\
    \ protocol-specific software. Let’s take a look at the specifics of a single Bitcoin\
    \ transaction.\n\n### 3.4.1 The Unspent Transaction Output (UTXO)\n\nUnspent Transaction\
    \ Output (UTXO) is a fundamental idea in the Bitcoin network UTXOs are a set of\
    \ Bitcoins that are linked to a certain user. They can only be spent in a transaction\
    \ if they are used entirely for that. A user can be associated with zero, one,\
    \ or many UTXOs. Obviously, once a user has used a UTXO to complete a transaction,\
    \ it cannot be used by another user. The sum of UTXOs associated with a user is\
    \ the total balance of the latter.\n\nIn other words, Bitcoin stores data relating\
    \ to transactions and balances of users in the form of UTXO, which are “unspent”\
    \ Bitcoin amounts that have been sent to a user, and that are potentially expendable\
    \ from that user.\n\nThe set of all the UTXOs in the network constitute the state\
    \ of the blockchain Bitcoin. A Bitcoin transaction consists of inputs and outputs.\n\
    \nA transaction takes as input one or more UTXOs and, according to the request\
    \ initiated by the sender, it generates one or more UTXOs to output the amount\
    \ specified by the transaction request. As a result, an Unspent Transaction Output\
    \ is the result of a transaction that a user receives and can spend later.\n\n\
    For example, suppose John has a UTXO with a value of ten Bitcoin and another five\
    \ Bitcoin UTXO, and he wants to send eight Bitcoins to Sara, who has no UTXO in\
    \ her portfolio. John can create a transaction, specifying the amount to spend\
    \ on Sara, and enter ten Bitcoin UTXO as the transaction input.\n\nThe transaction\
    \ will therefore look like this:\n\n*   **Input:** 10 Bitcoin Mario UTXO\n\n*\
    \   **Output:**\n    *   An 8 Bitcoin UTXO associated with Sara\n\n    *   A 2\
    \ Bitcoin UTXO associated with Mario (the rest of the transaction)\n\nSo, once\
    \ the transaction is recorded, Mario will have in his wallet a 5 Bitcoin UTXO\
    \ and a 2 Bitcoin UTXO, for a total balance of 7 Bitcoins. Sara will have an 8\
    \ Bitcoin UTXO, for a total balance of 8 Bitcoins. The anatomy of a UTXO is very\
    \ simple. (See Figure [3-13](#520777_1_En_3_Chapter.xhtml#Fig13).)\n\nThere are\
    \ two sorts of scripts: locking scripts and unlocking scripts. Given the definition\
    \ of the term, and the fact that unlocking ownership is the first step in transferring\
    \ UTXO, the input value contains the phrase *unlocking script*. The output value,\
    \ on the other hand, will be *locking script* as a result of the locking procedure.\
    \ The term “script” means “stack structure,” however we’ll focus on the method\
    \ rather than the definition.\n\nA transaction output UTXO has the following structure\
    \ (see Figure [3-13](#520777_1_En_3_Chapter.xhtml#Fig13)).\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig13_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig13_HTML.jpg)\n\
    \nFigure 3-13\n\nThe UTXO structure\n\n### 3.4.2 Input and Output (I&O)\n\nThis\
    \ is the notion of “listing” the income source (input) and spending (output) of\
    \ a transaction, rather than the concept of transferring money by placing input\
    \ and the outcome being the output. That is, when you pay the amount, you explain\
    \ the revenue source of the UTXO you want to spend first, and then the quantity\
    \ you want to invest on the output item second. Let’s first look at the output’s\
    \ structure. (See Figure [3-14](#520777_1_En_3_Chapter.xhtml#Fig14).)\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig15_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig15_HTML.jpg)\n\
    \nFigure 3-15\n\nUTXO description\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig14_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig14_HTML.jpg)\n\
    \nFigure 3-14\n\nInput and output\n\nWhen a transaction to transfer money is created,\
    \ the transaction input must specify which UTXO will be issued. Simply put, the\
    \ transaction’s inputs are pointers to UTXO. They define a specific UTXO, which\
    \ relates to the transaction’s hash and the transaction output’s index number.\
    \ A transaction input additionally contains the unlock script that satisfies the\
    \ output conditions given by UTXO in order to output UTXO (see Figures [3-15](#520777_1_En_3_Chapter.xhtml#Fig15)\
    \ and [3-16](#520777_1_En_3_Chapter.xhtml#Fig16)). The unlock script is usually\
    \ a signature that verifies that the Bitcoin address identified in the block script\
    \ belongs to the owner.\n\nSo, the structure of a UTXO input to a transaction\
    \ is as shown in Figure [3-16](#520777_1_En_3_Chapter.xhtml#Fig16).\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig16_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig16_HTML.jpg)\n\
    \nFigure 3-16\n\nUTXO description\n\nThis structure of transaction inputs and\
    \ outputs leads to a transaction link design, as shown in Figure [3-17](#520777_1_En_3_Chapter.xhtml#Fig17).\n\
    \n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig17_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig17_HTML.jpg)\n\
    \nFigure 3-17\n\nBitcoin transaction input and output"
  trans: "#### 3.3.4.2 理解 ECDSA 签名/验证的数学原理\n\nECDSA 签名的描述很简单：\n\n请注意，签名过程通过椭圆曲线的变换，使用私钥\
    \ `privKey` 对随机点 `R`（仅用 X 坐标表示，即 `r = randomPart = xr mod n`）进行编码。然后，它将消息 `h(msg)`\
    \ 的哈希编码为一个数字签名 `sign`，这证明了签名者知晓私钥 `privKey`。由于 ECDLP 问题的复杂性，签名（`randomPart`, `sign`）可能会泄露私钥。\n\
    \n验证签名时，使用公钥 `pubKey` 和消息哈希 `h(msg)` 对证明数字 `sign` 进行编码。然后恢复出用于创建签名的原始点 `R`，称为\
    \ `Rv`。接着，比较检索到的 `Rv` 的 `X` 坐标（`xv mod n`）与签名中的 `r = randomPart` 值。\n\n那么，所描述的签名和验证方案是如何工作的呢？我们首先考虑验证过程，然后是推导\
    \ `Rv` 的方程。接着，我们将方程写成扩展形式。\n\n`Rv = (xv; yv) = h(msg) s⁻¹ (mod n) G + r s⁻¹ (mod\
    \ n) pubKey`\n\n将 `pubKey` 替换为 `privKey G`：\n\n`Rv = (xv; yv) = h(msg) s⁻¹ (mod\
    \ n) G + r s⁻¹ (mod n) privKey G`\n\n提取公因子 `G` 和 `s⁻¹ (mod n)`，得到：\n\n`Rv = (xv;\
    \ yv) = (h(msg) + r privKey) s⁻¹ (mod n) G`\n\n我们知道：\n\n`s⁻¹ (mod n) = (k⁻¹ (h(msg)\
    \ + r privKey))⁻¹ (mod n)`\n\n因此：\n\n`s⁻¹ (mod n) = k (h(msg) + r privKey)⁻¹ (mod\
    \ n)`\n\n将其代入 `Rv` 的方程：\n\n`Rv = (h(msg) + r privKey) k (h(msg) + r privKey)⁻¹\
    \ (mod n) G = k G`\n\n最后一步是比较点 `Rv` 与点 `R`。点 `R` 由 `privKey` 编码。该算法会比较 `Rv` 的\
    \ `X` 坐标与 `R` 的 `X` 坐标（其中 `R = (xr; yr)` 且 `r = randomPart = xr mod n`）。更精确地说，如果给定\
    \ `c = xv mod n`，且 `c == r`，则签名被认为是有效的。\n\n图 3-12 从高层次说明了比特币交易中的数字签名是如何工作的。\n\n\
    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig12_HTML.jpg](img/520777_1_En_3_Fig12_HTML.jpg)\n\
    \n图 3-12\n\n交易与数字签名\n\n## 3.4 交易\n\n交易是比特币区块链中最基本的组成部分。交易经过验证后被发送出去。许多交易组合在一起形成一个区块。此外，通过数字数据链接形成一条区块链。^(³)\n\
    \n为了选择下一个要添加到链上的区块，区块会经过一个共识过程。被选中的区块会经过验证并被添加到现有的链上。\n\n矿工是执行验证和共识过程的特殊对等节点。需要明确的是，它们并非特殊或强大的机器，而是运行着区块链协议特定软件的计算机。让我们来看一下单个比特币交易的具体细节。\n\
    \n### 3.4.1 未花费交易输出（UTXO）\n\n未花费交易输出（UTXO）是比特币网络中的一个基本概念。UTXO 是与某个特定用户相关联的一组比特币。它们只能在交易中被完整花费。一个用户可以拥有零个、一个或多个\
    \ UTXO。显然，一旦用户使用某个 UTXO 完成了一笔交易，其他用户就不能再使用它。与某个用户关联的 UTXO 之和就是该用户的总余额。\n\n换句话说，比特币以\
    \ UTXO 的形式存储与交易和用户余额相关的数据。UTXO 是发送给用户且该用户可能可以花费的“未花费”比特币数量。\n\n网络中所有 UTXO 的集合构成了比特币区块链的状态。一笔比特币交易由输入和输出组成。\n\
    \n一笔交易以一个或多个 UTXO 作为输入，并根据发送方发起的请求，生成一个或多个 UTXO 作为输出，以支付交易请求指定的金额。因此，未花费交易输出是用户接收并可以在以后花费的交易结果。\n\
    \n例如，假设 John 有一个价值 10 比特币的 UTXO 和另一个价值 5 比特币的 UTXO，他想发送 8 比特币给 Sara（Sara 的钱包中没有\
    \ UTXO）。John 可以创建一笔交易，指定要支付给 Sara 的金额，并将 10 比特币的 UTXO 作为交易输入。\n\n因此，这笔交易将如下所示：\n\
    \n- **输入：** 10 比特币 Mario UTXO\n- **输出：**\n    - 一个与 Sara 关联的 8 比特币 UTXO\n    -\
    \ 一个与 Mario 关联的 2 比特币 UTXO（交易的找零）\n\n因此，一旦交易被记录，Mario 的钱包中将有一个 5 比特币的 UTXO 和一个\
    \ 2 比特币的 UTXO，总余额为 7 比特币。Sara 将拥有一个 8 比特币的 UTXO，总余额为 8 比特币。UTXO 的结构非常简单。（见图 3-13。）\n\
    \n有两种脚本：锁定脚本和解锁脚本。根据该术语的定义，以及解锁所有权是转移 UTXO 的第一步，输入值包含术语*解锁脚本*。另一方面，输出值由于锁定过程将是*锁定脚本*。“脚本”一词意为“栈结构”，但我们将关注其方法而非定义。\n\
    \n交易输出 UTXO 具有以下结构（见图 3-13）。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig13_HTML.jpg](img/520777_1_En_3_Fig13_HTML.jpg)\n\
    \n图 3-13\n\nUTXO 结构\n\n### 3.4.2 输入与输出 (I&O)\n\n这指的是“列出”交易的收入来源（输入）和支出（输出）的概念，而不是通过设置输入和输出结果来转移资金的概念。也就是说，当你支付金额时，你首先说明你想要花费的\
    \ UTXO 的收入来源，然后说明你想要在输出项上投资的金额。让我们先看看输出的结构。（见图 3-14。）\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig15_HTML.jpg](img/520777_1_En_3_Fig15_HTML.jpg)\n\
    \n图 3-15\n\nUTXO 描述\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig14_HTML.jpg](img/520777_1_En_3_Fig14_HTML.jpg)\n\
    \n图 3-14\n\n输入与输出\n\n当创建一笔用于转账的交易时，交易输入必须指定将使用哪个 UTXO。简单来说，交易的输入是指向 UTXO 的指针。它们定义了一个特定的\
    \ UTXO，该 UTXO 与交易的哈希值和交易输出的索引号相关。为了输出 UTXO，交易输入还包含一个解锁脚本，该脚本满足 UTXO 给定的输出条件（见图\
    \ 3-15 和 3-16）。解锁脚本通常是一个签名，用于验证区块脚本中标识的比特币地址属于所有者。\n\n因此，一笔交易的 UTXO 输入结构如图 3-16\
    \ 所示。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig16_HTML.jpg](img/520777_1_En_3_Fig16_HTML.jpg)\n\
    \n图 3-16\n\nUTXO 描述\n\n这种交易输入和输出的结构引出了如图 3-17 所示的交易链接设计。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig17_HTML.jpg](img/520777_1_En_3_Fig17_HTML.jpg)\n\
    \n图 3-17\n\n比特币交易输入与输出"
- fmt: '### 3.4.3 Pay to Public Key Hash (P2PKH)


    Given a high-level description of how a transaction takes place, this section
    covers the technical and structural details of it, to understand how it is implemented.


    `P2PKH` (pay to a public key hash) is a script template for completing a Bitcoin
    transaction or sending money to someone. It is the most commonly used script to
    lock an output on the key of someone’s public key. It ensures that only the UTXO
    beneficiary, or the person who owns the private key (and therefore the public
    key relating to the address of the Bitcoin beneficiary of the UTXO), can spend
    it.


    For greater understanding, let’s analyze the output part of the transaction process
    first, neglecting the details of the input. Then we will address the input aspect
    of the process, going into the process of checking that it combines both parts.


    ### 3.4.4 Looking at the Output Side


    Let’s say Mario wants to send 20 Bitcoins to Sara. Sara, therefore, will have
    to generate a public key/private key pair associated with it. Then Sara will provide
    her Bitcoin address (see the “Bitcoin Address” section) to Mario.


    The address could be transmitted in any way, including in a one-way manner that
    stops communication between the sender and receiver, and it can be further encoded
    in a different format, such as a QR code that includes a `Bitcoin:` URI.


    Then, Mario, the spender of the transaction, will receive Sara’s Bitcoin address
    and can specify it as the beneficiary/recipient of the transaction. This will
    be used to create the UTXO blocking script for the transaction, so that only Sara,
    or whoever can prove to have the associated private key to the public key relating
    to that Bitcoin address that Sara provided, can spend it.


    Then Mario will transmit the transaction. Once the transaction is validated, added
    to the block, and reaches consensus, it will be part of the blockchain Bitcoin.


    The network, therefore, classifies it as an Unspent Transaction Output (UTXO)
    and Sara’s wallet software shows it as a spendable balance. In other words, Sara
    now has a 20 Bitcoin UTXO in her wallet received from Mario.


    Therefore, in each UTXO there is the `PubKey` script, which blocks the use of
    the UTXO to the beneficiary, or to whoever owns the private key. It is then used
    in the transaction validation process. This is structured as shown in Figure [3-18](#520777_1_En_3_Chapter.xhtml#Fig18).


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig18_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig18_HTML.jpg)


    **Figure 3-18** PubKey script structure


    The fields starting with `OP` denote an operation, while the others denote a value.


    - `OP_DUP`: Performs a duplication operation; serves to copy the public key present
    in the `scriptSig` (which you will see later), which hash functions will be applied
    to compare the result obtained with the `pubKeyHash` of this `scriptPubKey`.

    - `OP_HASH160`: First applies the SHA-256 hash function and then `RIPEMD160` to
    the public key of the duplicate `scriptSig`.

    - `PubKeyHash`: The public key hash; comes from decoding the Bitcoin address provided
    to the sender.

    - `OP_EQUALVERIFY`: The operation that verifies that the two public key hashes
    (the one from the complete public key in `scriptSig` and the one in this `PubKey`
    script) are the same. Returns `True` if they are the same, `False` if they are
    different.

    - `OP_CHECKSIG`: This operation is therefore carried out on the script. “Check
    signature `<sig>` against public key `<pubKey>`”. If the signature joining the
    public key has been generated using all the data required for the signature, `OP_CHECKSIG`
    returns `True`.


    In order for this UTXO to be spent, there needs to be a resolved script. To solve
    this script and then use the UTXO to make a transaction, you must prove that you
    have the private key and the public key related to the Bitcoin address to which
    the UTXO was sent.


    ### 3.4.5 Looking at the Input Side


    Let’s see how the process of creating a transaction works from the spender’s perspective.
    Let’s assume Sara wants to send 20 Bitcoins to Fabio. Sara, once Fabio has provided
    her with the Bitcoin address, will enter it as a beneficiary of the transaction,
    together with the amount.


    The Bitcoin address provided by Fabio will also be used for the `PubKey` script,
    which will allow him to spend the output of the transaction exclusively to the
    owner of the relative private key.


    Then Sara will fill in the transaction input, where for each UTXO, she must target
    and unlock the information shown in Figure [3-19](#520777_1_En_3_Chapter.xhtml#Fig19).


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig19_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig19_HTML.jpg)


    **Figure 3-19** The Script structure `Sig`


    ### 3.4.6 Validation Process


    The language used, `Script`, is stack-based and allows for limited operations
    to avoid loops in the code that would cause problems of execution. Because of
    their low complexity and predictable lead times, these languages are regarded
    as incomplete Turing languages. A stack is a data structure that resembles a stack
    of playing cards.


    There are two procedures available: push and pop. Push puts a card on top of the
    deck, whereas pop removes it. In this case, the cards are the data. Anyone who
    wants to send money to someone must prove they actually own that coin. The `scriptSig`
    of the input and the `scriptPubKey` of the referenced output are combined and
    evaluated.


    Initially, the data entered in the `Sig` script is added to the stack of the transaction
    input (therefore, first `sig` and then `pubKey`).


    The script extracts the public key from the stack, which coincides with the `pubKey`
    of the `scriptSig`, and applies a hash to it: first SHA-256 and then `RIPEMD160`.
    Then it compares the result with the public key hash of the `PubKey` script. If
    it is successful, you proceed to verify the digital signature; otherwise, the
    transaction is rejected.


    So, if the signature common for the public key has been generated using all the
    data required to be signed, then the transaction is valid.


    You can see these operations, in more detail, through the diagrams in Figures
    [3-20](#520777_1_En_3_Chapter.xhtml#Fig20) through [3-26](#520777_1_En_3_Chapter.xhtml#Fig26).


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig26_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig26_HTML.jpg)


    **Figure 3-26** Transaction validation process, Step 7


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig25_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig25_HTML.jpg)


    **Figure 3-25** Transaction validation process, Step 6


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig24_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig24_HTML.jpg)


    **Figure 3-24** Transaction validation process, Step 5


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig23_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig23_HTML.jpg)


    **Figure 3-23** Transaction validation process, Step 4


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig22_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig22_HTML.jpg)


    **Figure 3-22** Transaction validation process, Step 3


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig21_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig21_HTML.jpg)


    **Figure 3-21** Transaction validation process, Step 2


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig20_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig20_HTML.jpg)


    **Figure 3-20** Transaction validation process, Step 1


    So if `False` is not at the top of the stack after `scriptsig` and `scriptPubKey`
    were evaluated, then the transaction is valid.


    In fact, the complete validation process of a transaction, in addition to being
    independent for each node that receives it, also includes other steps and checks
    that you will see later.'
  raw: '### 3.4.3 Pay to Public Key Hash (P2PKH)


    Given a high-level description of how a transaction takes place , this section
    covers the technical and structural details of it, to understand how it is implemented.


    P2PKH (pay to a public key hash) is a script template for completing a Bitcoin
    transaction or sending money to someone. It is most commonly used script to lock
    an output on the key someone’s public key. It ensures that only the UTXO beneficiary,
    or the person who owns the private key and therefore the public key relating the
    address Bitcoin beneficiary of UTXO, can spend it.


    For greater understanding, let’s analyze the output part of the Transaction process
    first, neglecting the details of the input. Then we will address the input aspect
    of the process, going into the process of check that it combines both parts.


    ### 3.4.4 Looking at the Output Side


    Let’s say Mario wants to send 20 Bitcoins to Sara. Sara, therefore, will have
    to generate a public key/private key pair associated with it. Then Sara will provide
    her Bitcoin address (see the “Bitcoin Address” section) to Mario.


    The address could be transmitted in any way, including in a one-way manner that
    stops communication between the sender and receiver, and it can be further encoded
    in a different format, such as a QR code that includes a `Bitcoin:` URI.


    Then, Mario, the spender of the transaction, will receive Sara’s Bitcoin address
    and can specify it as the beneficiary/recipient of the transaction. This will
    be used to create the UTXO blocking script for the transaction, so that only Sara,
    or whoever can prove to have the associated private key to the public key relating
    to that Bitcoin address that Sara provided, can spend it.


    Then Mario will transmit the transaction. Once the transaction is validated, added
    to the block, and reaches consensus, it will be part of the blockchain Bitcoin.


    The network, therefore, classifies it as an Unspent Transaction Output (UTXO)
    and Sara’s wallet software shows it as a spendable balance. In other words, Sara
    now has a 20 Bitcoin UTXO in her wallet received from Mario.


    Therefore, in each UTXO there is the `PubKey` script, which blocks the use of
    the UTXO to the beneficiary, or to whoever owns the private key. It is then used
    in the transaction validation process. This is structured as shown in Figure [3-18](#520777_1_En_3_Chapter.xhtml#Fig18).


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig18_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig18_HTML.jpg)


    Figure 3-18


    PubKey script structure


    The fields starting with OP denote an operation, while the others denote a value.


    *   `OP_DUP`: Performs a duplication operation; serves to copy the public key
    present in the `scriptSig` (which you will see later), which hash functions will
    be applied to compare the result obtained with the `pubKeyHash` of this `scriptPubKey`.


    *   `OP_HASH160`: First applies the SHA-256 hash function and then `RIPEMD160`
    to the public key of the duplicate `scriptSig`.


    *   `PubKeyHash`: The public `Key` hash; comes from decoding the Bitcoin address
    provided to the sender.


    *   `OP_EQUALVERIFY`: The operation that verifies that the two public key hashes
    (the one from the complete public key in `scriptSig` and the one in this `PubKey`
    script) are the same. Returns `True` if they are the same, `False` if they are
    different.


    *   `OP_CHECKSIG`: This operation is therefore carried out on the script. `Mr.
    Check signature <sig> against public key <pub-Key>`. If the signature joining
    the public key and has been generated using all the data required for the signature,
    `OP_CHECKSIG` returns `True`.


    In order for this UTXO to be spent, there needs to be a resolved script. In order
    to solve this script and then use the UTXO to make a transaction, you must prove
    that you have the key private and the public key related to the Bitcoin address
    to which it was sent the UTXO.


    ### 3.4.5 Looking at the Input Side


    Let’s see how the process of creating a transaction works from the spender’s perspective.
    Let’s assume Sara wants to send 20 Bitcoins to Fabio. Sara, once Fabio has provided
    her with the Bitcoin address, will enter as a beneficiary of the transaction,
    together with the amount.


    The Bitcoin address provided by Fabio will also be used for the `PubKey` script,
    which will therefore allow him to spend the output of the transaction exclusively
    to the owner of the relative private key.


    Then Sara will fill in the transaction input, where for each UTXO, she must target
    and unlock the information shown in Figure [3-19](#520777_1_En_3_Chapter.xhtml#Fig19).


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig19_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig19_HTML.jpg)


    Figure 3-19


    The Script structure Sig


    ### 3.4.6 Validation Process


    The language used, `Script` , is stack-based and allows for limited operations
    to avoid loops in the code that would cause problems of execution. Because of
    their low complexity and predicted lead times, these languages are referred regarded
    as incomplete Turing languages. A stack is a data structure that resembles a stack
    of playing cards.


    There are two procedures available: push and pop. Push puts a card to the top
    of the deck, whereas pop removes it. In this case, the cards are the data. Anyone
    who wants to send money to someone must prove they actually own that coin. The
    `scriptSig` of the input and the `scriptPubKey` of the referenced output are combined
    and evaluated.


    Initially, the data entered in the `Sig` script is added to the stack of the transaction
    input (therefore, first `sig` and then `pubKey`).


    The script extracts the public key from the stack, which coincides with the `pubKey`
    of the `scriptSig`, and applies it to it, hashed it first SHA-256 and then `RIPEMD160`.
    Then compare the result with the public key hash of the `PubKey` script . If it
    is successful, you proceed to verify the digital signature, otherwise the transaction
    is rejected.


    So, if the signature common for the public key and has been generated using all
    the data required to be signed, then the transaction is valid.


    You can see these operations, in more detail, through the diagrams in Figures
    [3-20](#520777_1_En_3_Chapter.xhtml#Fig20) through [3-26](#520777_1_En_3_Chapter.xhtml#Fig26).


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig26_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig26_HTML.jpg)


    Figure 3-26


    Transaction validation process, Step 7


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig25_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig25_HTML.jpg)


    Figure 3-25


    Transaction validation process, Step 6


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig24_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig24_HTML.jpg)


    Figure 3-24


    Transaction validation process, Step 5


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig23_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig23_HTML.jpg)


    Figure 3-23


    Transaction validation process, Step 4


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig22_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig22_HTML.jpg)


    Figure 3-22


    Transaction validation process, Step 3


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig21_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig21_HTML.jpg)


    Figure 3-21


    Transaction validation process, Step 2


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig20_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig20_HTML.jpg)


    Figure 3-20


    Transaction validation process, Step 1


    So if `False` is not at the top of the stack after `scriptsig` and `scriptPubKey`
    were evaluated, then the transaction is valid.


    In fact, the complete validation process of a transaction, in addition to being
    independent for each node that receives it, also includes other steps and checks
    that you will see later.'
