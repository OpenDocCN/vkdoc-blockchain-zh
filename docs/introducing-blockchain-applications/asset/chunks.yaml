    *   **Append-only:** It is only possible to add new transactions to the ledger.
    It is not possible to abandon, modify, or reorder the existing ledger.


    *   **Immutable:** The information present cannot be changed in the ledger.


    *   **Prevents double spending:** It is not possible to spend the same currency
    security more than once.'
  trans: '

    # 2.2 区块链的应用


    从长远来看，区块链具有改变商业战略和模式的巨大潜力。此外，区块链并非是一种颠覆传统商业模式的破坏性技术，而是一种赋能技术，能够为全球经济和社会环境创造新的技术和基础。


    区块链的应用有望显著改善全球供应链、金融与营销交易、会计以及分布式社交网络。这项新技术可以整合到各个领域，其协议使企业更容易采用新方法来处理和管理数字交易。


    例如，货币支付系统和促进众筹的数字货币、预测市场的实现以及通用治理工具。区块链可用于认证文件日期并验证其未被篡改。通过插入待认证文件的哈希值来实现的这项区块链应用被称为*公证*。一个例子是对从建筑工地运输泥土的卡车运行轨迹进行公证，以确保符合环境标准。


    区块链可以满足对信托服务提供商的需求，并确保减少诉讼成本。它有潜力消除系统性风险和金融欺诈。它可以自动化许多以前需要长时间手动完成的流程，例如业务整合。


    总的来说，大多数区块链应用都涉及诸如`Bitcoin`、`Blackcoin`、`Dash`和`Nxt`等加密货币。其中心账本系统存储所有交易，并使用去中心化的投票机制来理解交易。


    这种新的分发方式也适用于保险和银行领域。这些领域对此新兴技术感兴趣，因为这些交易既快速又非常安全。


    协作经济和物联网（IoT）技术也可以通过让许多志同道合的人参与在线协作投票应用，从而从区块链技术中受益。


    区块链还可用于构建医疗人员信息系统，以提高其互操作性和安全性。多个区块链也已被开发用于存储数据、发布文本以及识别数字艺术的来源。例如，一家银行开设了专门研究区块链的研究中心，旨在研究这项新技术对金融服务产生的各种影响，以提高效率并降低成本。还有一项应用被提议用于共享无线网络。


    ## 2.3 为何区块链如此重要


    企业依赖信息。在商业世界中，信息越快速、越准确就越好。区块链非常适合提供这类信息，因为它提供即时、可共享且完全透明的数据，并存储在不可更改的账本中。只有经过授权的个人才能查看这些数据。


    此外，区块链网络可以追踪订单、货币交易、会计账本和生产流程等内容。由于成员共享包含在区块链中的公共信息，因此还可以查看端到端交易的所有数据（对所有参与方完全透明），这带来了更高的信任度，以及新的改进和未来应用。


    ## 2.4 本章小结


    在本章中，您学习了区块链、分布式账本和时间戳文件的基本概念。您还理解了为什么这些技术在市场上很重要，以及它们近年来是如何发展的。下一章将重点介绍比特币。


    # 3. 比特币


    在上一章中，您看到了区块链技术如何在没有中央权威的情况下，借助所讨论的技术和算法，在参与者之间建立信任，并认证分布式账本的*不可篡改性*。区块链本身非常适合数字货币的理想模型，在这些模型中不需要像银行、保险公司和其他中央组织这样的中介和第三方。事实上，区块链正是因比特币而诞生并得以普及。


    2008 年，一位（或一群）名为中本聪的人发布了一篇题为《比特币：一种点对点的电子现金系统》的研究论文。这篇论文描述了一个点对点的现金系统，它允许网络交易直接从一方发送到另一方，而无需经过任何中介/银行组织，并对比特币进行了非常详细的说明。


    与那些通过共同可信实体管理交易的系统相比，加密货币这一术语描述了所有使用密码学来保护数字交易的系统、网络和媒介。


    本章将介绍*比特币协议*。它将详细分析构成该协议的主要部分——公钥和私钥、比特币地址以及区块。接着，本章将阐释其网络和共识机制，包括工作量证明。


    ## 3.1 比特币的历史


    比特币的几乎所有技术部分都诞生于 20 世纪 80 年代和 90 年代的学术出版物中。“我们需要强调的是，我们的目标不是贬低中本聪的工作和成就，而只是强调其真正的直觉飞跃是什么。实际上，通过追溯比特币中存在的想法的起源，我们可以关注这些想法被整合到底层组件的具体而复杂的方式。”^(¹)


    比特币的历史本身就是一个案例研究，因为它证明了学术界、外部科学家、工程师和专业人士之间的关系，并展示了这些团队如何相互学习。许多专业人士研究过比特币并发表了大量研究论文。


    请注意，账本的想法是比特币的初始起点。如果你理解了账本，你就会理解该系统的结构及其通信方式。账本是所有交易发生的地方。它对系统中的所有参与方和组件都是开放和可信的（见图
    3-1）。


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig1_HTML.jpg](img/520777_1_En_3_Fig1_HTML.jpg)


    **图 3-1** 比特币背后的主要思想


    为了支持数字货币，账本必须具有以下基本属性：


    - **仅可追加：** 只能向账本中添加新的交易。不能废弃、修改或重新排序现有的账本条目。

    - **不可篡改：** 账本中存在的任何信息都不能被改变。

    - **防止双重支付：** 不能多次使用同一数字货币单位进行支付。

    '
- fmt: '### 3.1.1 Linked Timestamping and the Merkle Tree


    The Bitcoin ledgers data architecture is taken, with appropriate changes, from
    several articles by Stuart Haber and Scott Stornetta (1990 and 1997).


    As we know well, since Nakamoto states it in the paper on Bitcoin, the Haber and
    Stornetta’s paper dealt with the timestamp issue for documents. Note that when
    it comes to commercial contracts, patents, and other documents, it is possible
    to determine that the document was generated at a given point of time. We understand
    that their notion of documents is quite generic, and it can include different
    types of data.


    They casually mentioned banking transactions as a possible application, but note
    that this was not their goal. The originator of every document confirms the time
    of generation and signs the document, its date, and time. This initial document
    was approved/signed by the creator, so the document forms a lengthy chain with
    pointers into the past. A third-party user cannot edit a timestamped message because
    it is approved by its originator, and moreover the originator or the creator cannot
    edit the message without changing the entire subsequent chain of messages.


    Haber and Stornetta also mentioned in their articles several ideas to make this
    data structure more fast, effective, and accurate:


    - The chain between documents can be created by using hashes instead of signatures;
    note that these hashes are easier and faster to compute and are stronger when
    it comes to data identifiers. We call such links *pointers*.

    - Rather than timestamping documents separately, which could be inefficient if
    many documents are generated at once, the documents can be combined into batches
    or blocks, using the same timestamp in the documents.

    - The documents in each block should be tied by a binary tree of hash pointers
    called the *Merkle tree*. Mr. Josh Benaloh and Mr. Michael de Mare presented these
    ideas independently in 1991, immediately after Haber’s article.


    Note that the Merkle trees are named after Ralph Merkle, who presented the asymmetric
    cryptography logic in his 1980 document.


    Either way, Bitcoin takes the data structure from the work of Haber and Stornetta
    and redesigns its safety characteristics with the addition of the PoW scheme.


    ### 3.1.2 Distributed Consensus


    A common authority is required for Internet money or currency transactions.


    In the case of a distributed ledger, you can see that there will automatically
    be forks, which means that some nodes will conclude that block A is the last block,
    whereas all other nodes will conclude that it is block B.^([²](#fn2))


    In this case, you need to understand that this is due to an opponent trying to
    interrupt the transaction of the ledger or because of the network delay, occasionally
    causing near-block generation together from different nodes, unaware of reciprocal
    blocks. The linked timestamp is not sufficient to rectify the forks, and this
    is expressed by Mike in 1997-1998.


    The problem of how to reach consensus in situations where errors are possible
    is called the *Byzantine generals problem*. It was talked about informally in
    Chapter [2](#520777_1_En_2_Chapter.xhtml). Byzantine faults include both natural
    breakdowns and malicious behavior.


    This idea was initially discussed in an article by Leslie Lamport, written with
    Robert & Marshall in 1982. In 1999, a document from Miguel Castro & Barbara Liskov
    presented the PBFT algorithm, and this enables you to solve the problem of Byzantine
    generals with excellent performance. (Note that the PBFT stands for Practical
    Byzantine Fault Tolerance.)


    The replication algorithm can manage the Byzantine defects. Byzantine fault-tolerant
    algorithms will become increasingly important in the near future, because as malicious
    attacks and software bugs become very common in the cyber world, this can cause
    faulty nodes to promote arbitrary behaviors.


    But in the case of the previous algorithms, they needed a special synchronous
    system and were slow. The algorithm described in this book is very practical,
    because it works in asynchronous environments quickly.


    Nakamoto doesn’t cite the same article in his initial paper, nor does he utilize
    his phrasing. However, he employs some concepts, referring to his own protocol
    as a consensus protocol and taking into account both faults in the form of intruders,
    as well as nodes joining and exiting the infrastructure.


    When asked about the connection between Bitcoin and the Byzantine generals problem
    on a mailing list, Nakamoto claims that the Proof-of-Work (PoW) chain fixes the
    issue.


    Almost all failure systems assume that the majority of the nodes in the system
    are both trustworthy and honest (e.g., more than half or two-thirds). Nodes in
    an open peer-to-peer network are free to join and leave at any time.


    As a result, a Sybil attack can be used to go around the system’s consent or quality
    assurances. John Douceur defined the Sybil attack in 2002 and proposed a cryptographic
    breakthrough called Proof of Work to combat it.


    ## 3.2 Proof of Work


    This section goes over the first phases of Proof of Work so you can get a better
    understanding of it. Cynthia Dwork and Moni Naor created the first proposal, which
    was titled “Proof of Work,” in 1992. Their purpose at the time was to discourage
    spam.


    For example, the Hashcash is a proof-of-work method that has been employed in
    a variety of systems as a denial-of-service countermeasure. A hashcash stamp is
    a proof-of-work that takes the sender a parameterizable amount of time to compute.
    The recipient may quickly check the hashcash stamps he or she has received.


    While `hashcash` was designed to add a penalty to sending email in order to prevent
    high-volume email spammers, it may now be introduced to any internet service to
    impose a computational cost on customers who might otherwise misuse a server’s
    resources.


    However, a spammer who wanted to transmit a million emails might need multiple
    weeks to do it using a similar approach. Occasionally, the Proof-of-Work instance
    (also known as a *puzzle*) is required to identify the email and the recipient.


    A spammer may otherwise send many messages to the same recipient (or the same
    message to multiple recipients) for the cost of only sending one message to one
    receiver. The second critical feature is that the recipient’s computing cost should
    be as minimal as feasible; puzzle answers, no matter how complex to compute, should
    be straightforward to check.


    Dwork and Naor’s suggestion spawned an entire field of inquiry. Adam Back, a post-doc
    in the cypherpunk research community at the time, separately devised a similar
    concept called `hashcash` in 1997.


    *Cypherpunks* were anti-government and anti-centralized institution activists
    who used encryption to bring about social and political change.


    `Hashcash` is nothing more than a proof-of-work algorithm; it was used as a measure
    against spam and denial-of-service attacks in different systems. It is based on
    a simple principle connected to the hash function: the only way to identify an
    input that has a hash on a given output is to test various inputs until the desired
    data is provided in a hash function. As a result, the only method to identify
    an input that hashes in one arbitrary series of outputs is to try hashing different
    inputs, one after the other.'
