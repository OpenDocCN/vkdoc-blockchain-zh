  trans: '

    ## 16.9 节点的功能


    比特币网络由节点构成，这些节点是借助比特币开源软件相互通信的计算机。


    节点可以具有不同的功能：某些节点验证交易是否符合规则，其他节点则将交易传播给其他节点。本文中关注的节点被称为“矿工”，它们负责创建被称为区块链的区块链条，所有交易都会被永久记录在其中。


    现在，让我们看看矿工做些什么。挖矿节点由私人或公司拥有，他们投入巨大资源来解决一个只能通过反复尝试才能解决的数学问题。任何人都可以挖掘比特币；让我们看看你需要具备什么条件：


    - 挖矿需要专门的设备；通常，用于视频游戏的显卡就足够了。然而，现在已有专门开发的强大处理器（`ASICS`），用于计算比特币的 `SHA-256` 方程，以提高获胜几率。


    - 第二个条件是产生或购买大量电力，为计算机和相关的冷却设备供电；事实上，运行这些机器会使周围环境升温，你必须维持理想的温度以保持机器的物理完整性。


    - 下一步是规划运行挖矿矿场需要多少小时。比特币矿场的员工还负责机器的维护和更换，这些机器在满负荷计算能力运行时，会迅速发生故障。


    所有这些都发生与其他矿工竞争的过程中。


    一旦操作开始，你的计算器只会一遍又一遍地计算同一个方程（`SHA-256`），从比特币网络获取数据作为输入，然后尝试向方程中添加一个新数字，看看输出是否符合协议的要求。结果是一个如下所示的十六进制数：


    ![../images/520777_1_En_16_Chapter/520777_1_En_16_Figb_HTML.jpg](img/520777_1_En_16_Figb_HTML.jpg)


    在第一次尝试时，挖矿机器将数字 1 插入到 `SHA-256` 方程中，并检查输出，看该数字前面有多少个零。第二次尝试时，它使用同一组交易重新计算 `SHA-256`，并添加数字
    2。第三次尝试时，它添加数字 3，依此类推，直到获得一个以零开头的数字。结果完全是随机的。这些都是巨大的数字；实际上，大约每隔 10 分钟，世界上就有一台计算机会发现当时协议所要求的精确零位数。


    当一个矿工发现一个可行的解决方案时，整个计算机网络容易遭受交易阻塞。由于该结论在数学上是可重复和可验证的，所有矿工都可以快速而简单地检查它。被挖掘区块中包含的交易是
    100%合法的，并且可以添加到区块链中。


    矿工是在其计算机上安装了比特币的节点或用户，但除了验证和传播交易之外，矿工还承担着消耗能量来解决数学难题的责任，该难题是获得区块链写入授权的基础。


    这些特定的节点贡献出可用的能源资源，以赚取奖励，同时确保在没有中央协调机构的情况下，系统能够防范双重支付。


    ### 16.9.1  组合有效交易以创建新区块候选


    一旦你发送交易，最近的节点会立即检查你是否有足够的资金进行花费。如果此验证通过，交易就会被排队等待矿工执行。一个矿工收集该笔交易，然后将其与以太坊（此处应指网络）中的其他交易组合，形成一个待添加到区块链的交易候选区块。在这个阶段，矿工的工作就是计算出以
    0 开头的数字。


    ### 16.9.2  防御墙上的算力（哈希率）


    因为投入系统的哈希算力（计算能力）完全致力于确保不存在欺诈性交易，所以即使是没有在最后一个区块中赢得比特币的矿工，也为比特币的安全做出了贡献。这道防护墙能够防御双重支付以及试图篡改区块链事实的入侵者。


    理论上，每个矿工可以拥有一组不同的交易，而第一个使用其选择的交易找到解决方案的矿工，就能将自己的候选区块添加到区块链中。当网络就哪一个区块是最后一个有效区块达成一致后，寻找下一个区块的竞赛就开始了。


    如果系统的处理能力足够好，以至于有效区块在不到 10 分钟内就能被发现，那么数学难题的复杂度就会通过增加待求解结果前面的零的个数来提高。如果系统的计算能力不足，并且要求新区块只能每
    15 分钟被发现一次，那么系统会通过要求矿工寻找一个前面带有较少零的数字来简化解决方案。


    这种技术会根据系统的计算能力调整难度。因此，当计算能力下降时，发现比特币会更容易，更多的人会受到激励去挖矿，从而使系统得以维持。然而，当挖掘比特币变得过于困难时，只有最高效的矿工会留在市场中。这表明，当比特币价格上涨时，哈希率也会随之上涨——价值越高，计算能力越强，安全性也越高。


    ## 16.10 创造新比特币


    比特币是一种货币，为它的创造和维护做出贡献，你就可以通过努力赚取比特币作为回报。每四年，区块奖励会减半。经过十年不间断的活动，目前每 10 分钟产生 6.25
    个比特币。除了比特币奖励外，一个成功的矿工还能获得与每笔交易相关的所有手续费。


    如你所见，新比特币的数量持续减少；在撰写本文时，自 2009 年以来产生的比特币总数约为 1800 万。


    按照这个数学序列继续下去，到 2140 年左右，2100 万个比特币将被全部挖出。

    '
- fmt: '### 16.10.1 The Concept of Decentralization


    `Miners` are components, nodes of the network, with the special duty of producing
    blockchain blocks and releasing new Bitcoins, ensuring security against double
    spending attempts.


    The notion of decentralization, or, to put it another way, the fact that you don’t
    need a central coordinator to verify that all parties behave correctly, is perhaps
    one of Bitcoin’s most revolutionary features.


    How does Bitcoin’s decentralized coordination work? The answer is “proof of work,”
    a new approach for reaching an agreement on the state of balances. The job entails
    gathering transactions, generating candidate blocks, and computing hash with zeros
    in front, as stated. `Proof of work` is nothing more than a cunning ruse to compel
    the system to coordinate every 10 minutes on the status of Bitcoin balances.


    The incentive mechanism draws new miners who are ready to spend resources to discover
    Bitcoin, and none of the participants in the game are interested in acting against
    the Bitcoin network’s interests.


    Miners make significant investments in order to earn Bitcoins, and they will never
    attempt to compromise the protocol’s resilience because doing so would result
    in them losing the whole worth of the Bitcoins in their possession. Miners seldom
    sell their Bitcoins for less than the cost of manufacturing. This means that Bitcoin
    has a minimum price, determined by the cost of mining a single Bitcoin successfully.


    Miners are honest because deceiving the system costs a lot of money initially;
    it is predicted that rearranging blockchain history to attack the system would
    cost $5 billion. Second, all hacking efforts would be futile since each node has
    the option of accepting or rejecting updates to its blockchain copy. Blocks with
    a double expense will never be accepted by honest nodes. In reality, the attacker
    would be on a blockchain other than the main one, a blockchain that has no value
    since it includes fraudulent data.


    ### 16.11 Summary


    This chapter discussed the future scope of blockchain technology and distributed
    systems and touched on how you can achieve secure transactions using blockchain.
    The B-Coin project showed how Bitcoin works and how you can attain secure transactions
    using the Bitcoin concept.


    I am sure that you now understand what Bitcoins are for. The uses of this digital
    currency, in fact, can be multiple and are not only linked to the speculation
    that is made on it. The blockchain method is also particularly interesting for
    its future developments, which could be related to every aspect of our existence.
    Now that you know how Bitcoin works, nothing can stop you in the discovery of
    the cryptocurrency!


    The next chapter will focus on automated vehicle management systems.


    Footnotes [1](#520777_1_En_16_Chapter.xhtml#Fn1_source) [2](#520777_1_En_16_Chapter.xhtml#Fn2_source)
    [3](#520777_1_En_16_Chapter.xhtml#Fn3_source)


    # 17. AI and Blockchain Monitoring Autonomous Vehicles Management Project


    The autonomous vehicle management system is the subject of this chapter. This
    entails operating a vehicle or system in a distributed environment. `Artificial
    intelligence` and message exchanges (blockchain) are both present in this scenario.
    Simultaneously, we must prevent catastrophic collapse when it comes to autonomous
    vehicle management.


    ### 17.1 The Connection Between Blockchain and Artificial Intelligence


    `Blockchain` and `AI` are two of the most popular technological developments right
    now. Scientists have been debating and researching the integration of the two
    technologies, despite the fact that their development partners and implementations
    are vastly different. A blockchain, by definition, is a distributed, decentralized,
    immutable ledger for storing encrypted data. `AI`, on the other hand, is the motor
    or “mind” that will enable analysis and judgment based on the acquired information[^(16)](#fn16).


    `AI` and blockchain are in a position where they can support and profit from each
    other. Because both of these technologies may affect data in various ways, combining
    them makes logical sense and potentially pushes data exploitation to new heights.
    Simultaneously, incorporating machine learning and `AI` into blockchain, and vice
    versa, can improve blockchain’s fundamental architecture while also enhancing
    `AI`’s capabilities. Blockchain could also make `AI` more logical and intelligible,
    allowing developers to track and comprehend why deep learning choices are made.
    The blockchain and its ledger can keep track of all the data and factors that
    go into a deep learning conclusion (see Figure [17-1](#520777_1_En_17_Chapter.xhtml#Fig1))¹.


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig1_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig1_HTML.jpg)


    **Figure 17-1.** Blockchain and AI


    Furthermore, `AI` can improve blockchain efficiency considerably more effectively
    than people or even traditional technology. A glance at how blockchains are now
    operated on conventional computers demonstrates this, with a significant amount
    of computing power required to complete even basic activities[^(17)](#fn17).


    #### 17.1.1 AI and Blockchain in Applications


    The number of automobiles on the road is rising these days. As a result, preventing
    traffic accidents is a problem for society. `Machine Learning (ML)` techniques,
    for example, are particularly useful in improving the overall performance of the
    road safety management system. Blockchain uses consensus methods and smart contracts
    to govern communication between nodes without the need for a third-party intermediary.
    Simultaneously, `AI` has the potential to provide intelligent, decision-making
    robots that are comparable to human minds².


    Basically, we need to consider the following two aspects when we apply blockchain
    and `AI` for application development:


    - **Monetization of data.** With consensus algorithms and smart contracts, blockchain
    manages communication among nodes without the involvement of a third-party or
    intermediary body. Additionally, blockchain technology facilitates sharing of
    information on the network, which is decentralized, secure, persistent, anonymous,
    and trustworthy.²

    - **Decision making using AI.** `Artificial Intelligence (AI)` such as `Machine
    Learning (ML)` algorithms are very helpful for improving the performance of the
    overall vehicle safety management system.²


    #### 17.1.2 AI’s Role in Making Real-Time Intelligent and Decision-Making Machines


    `AI` technology enables machines to think for themselves without the need for
    human involvement. The `AI` approach is extremely careful in analyzing the collected
    data via `IoT` devices that have been placed within a vehicle’s driver’s cabin.
    For real-time decision-making operations in vehicles, several machine-learning
    techniques are significant.


    The system evaluates the driver’s unfit or uncomfortable state based on the system’s
    training. Then, first and foremost, it communicates with the driver. After that,
    if it detects the vehicle’s uncomfortable body expressions, it sends a report
    to the pre-programmed network. This chapter explains how to implement `AI` in
    vehicle system management[^(18)](#fn18).'
