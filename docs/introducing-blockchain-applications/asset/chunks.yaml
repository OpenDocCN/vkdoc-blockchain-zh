  trans: '

    # 11.9 总结


    自从人类开始使用计算机以来，研究人员就一直致力于提高抽象层次。模型驱动工程（MDE）是这一趋势的自然延续，也是一种很有前景的方法，用于应对平台复杂性以及第三代语言无法减轻这种复杂性并有效表达主导概念的困境。


    模型驱动工程（MDE）处于层次结构的顶端，因此抽象程度最高。它被公认为一种软件工程范式，不仅将模型视为辅助文档，更视其为任何工程学科和应用领域开发的核心焦点。模型驱动开发（MDD）在层次结构中略低于
    MDE。该方法侧重于分析、设计、实现和需求等学科。


    具体的 MDD 方法倾向于定义建模语言，以在不同抽象层次上描述所研究的系统。基于模型的测试（MBT）侧重于测试学科的自动化。测试模型用于表示所研究系统的预期行为。模型驱动架构（MDA）是由
    OMG 提出的一种方法，主要侧重于模型的定义及其转换。


    要创建有效的区块链应用，必须首先对系统进行建模。在建模系统时，必须包含前面提到的技术。当你在分布式系统中应用区块链技术时，作为分布式系统建模的一部分，你还需要对区块链层进行建模，以便清晰地了解系统架构和系统之系统（SoS）功能。所有这些模型都可以借助
    `BLOCKLY 4SOS` 建模技术来完成。


    作为模型驱动工程的一部分，你需要考虑使用 `BLOCKLY 4SOS` 来对 SoS 系统进行建模。下一章将解释 `BLOCKLY 4SOS`。


    脚注 1 2 3 4


    # 12. BLOCKLY 4SOS


    `BLOCKLY` 是一个库，允许你制作积木式编程应用。即使用户并不真正了解编程语言，积木式编程也能让他们使用图形块来构建脚本和程序。在拖拽式编辑器中，`BLOCKLY`
    包含了定义和渲染积木所需的一切。每个积木代表一行可以轻松堆叠并转换为代码的代码。它可用于让用户自定义应用的各个元素并为其添加操作。


    ## 12.1 SoS 建模


    在使用该工具时，它会生成一个名为 `ex-abundant` 积木的标准 `SoS-block` 来进行说明。左侧的工具箱包含了构建 `SoS` 设计所需的所有积木。这个概念模型将帮助
    `SoS` 设计者。此外，`BLOCKLY` 中每个导出的积木都关联着一个视角积木，因此所有与通信视角相关的积木都可以在工具包的“通信”类别下找到。


    用户必须点击并拖拽浮动面板或工具箱中的积木，才能在 `BLOCKLY` 中生成新的积木。一个针对 `BLOCKLY` 的 API 被设计出来，旨在提高易用性和准确性。`Field
    Dropdown()` 提供了一个合适的积木列表，这些积木可以链接到特定的积木，从而方便用户构建积木。


    在添加“技术”积木后，该工具会显示如何添加其他合适的积木：故障预测、故障预防、故障消除和故障容错。“技术”积木是配置文件中的一个抽象积木，而上述四个积木都继承自它。


    一个积木可以具有三个阶段，如下所示：


    *   压缩视图

    *   部分压缩视图

    *   未压缩视图


    通过减少屏幕上的积木数量，压缩显示使用户能够看到当前正在编辑的积木（见图 12-1）。由于部分折叠的积木只显示一个积木的非空特征，因此用户可以选择仅查看已声明的属性。使用“完整视图/未压缩视图”来查看积木的所有属性。用户可以通过双击积木在这三种视图之间切换。参见图
    12-2。


    ![../images/520777_1_En_12_Chapter/520777_1_En_12_Fig2_HTML.jpg](img/520777_1_En_12_Fig2_HTML.jpg)


    图 12-2


    用户可以使用下拉菜单添加积木


    ![../images/520777_1_En_12_Chapter/520777_1_En_12_Fig1_HTML.jpg](img/520777_1_En_12_Fig1_HTML.jpg)


    图 12-1


    导入到 `BLOCKLY` 的 SysML


    此外，如图 12-3 和 12-4 所示，与选定构建积木相关联的属性可以对每个积木进行显示。这是通过在每个积木的左上角放置一个变异按钮来实现的。


    支持设施使用一个名为 `Type-Indicator 5` 的免费开源插件来创建直观的建模环境。该插件会高亮显示所有与当前正在移动的积木（`block cs4`）兼容的积木（以黄色显示）。


    在 `SoS` 项目中，必须检查和管理需求的可追溯性，因此需求管理至关重要。可以根据视角和构建组件（例如架构、通信和可靠性）来分解需求。


    因此，由于每个构建积木满足其所实现的需求集合，并且每个需求构建积木控制着维持它的构建积木集合，所以实现了完整的可追溯性。为了使设计更清晰，`BLOCKLY`
    允许你向积木添加注释。


    ![../images/520777_1_En_12_Chapter/520777_1_En_12_Fig3_HTML.jpg](img/520777_1_En_12_Fig3_HTML.jpg)


    图 12-3


    一个积木可以通过三种方式查看：折叠、部分折叠和未折叠


    约束使用的一个示例显示在图 12-4 中。约束可用于寻找那些可能容易导致 `SoS` 出现涌现阶段的异常转折。你可以通过对模型进行适当的查询来获取这些情况。在处理大型模型时，查看整个
    `SoS` 可能很困难，因此需要使用专门的视图。


    `BLOCKLY` 不使用线条来显示积木之间的连接，而是使用折叠方法来隐藏 `SoS` 模型的复杂性。模型查询用于寻找满足一组条件的积木。

    '
- fmt: '![../images/520777_1_En_12_Chapter/520777_1_En_12_Fig4_HTML.jpg](images/520777_1_En_12_Chapter/520777_1_En_12_Fig4_HTML.jpg)


    **Figure 12-4** A block''s building-blocks could be activated or disabled


    It may also be used to see a model in a conventional perspective (such as showing
    the relationship between blocks and other blocks via lines).


    To query a certain model, a user can right-click the working space and select
    **Show Query Diagram**. In the query diagram, the user can create filters for
    querying the model.^([^(11)](#fn11))


    Returning `true`, for example, indicates that no filtration is necessary (i.e.,
    shows all the blocks for the model depicted in Figure [12-5](#520777_1_En_12_Chapter.xhtml#Fig5)).
    This query generates the graph in Figure [12-5](#520777_1_En_12_Chapter.xhtml#Fig5),
    which highlights all blocks of type `RUMI` using the filter:


    ```

    return b. of type == RUMI

    ```


    Model querying assists in the visualization of custom SoS views and can help discover
    design problems.


    Adding a new connection to a block is a simple process. Using connections to existing
    blocks is one approach to constructing an SoS. Creating connections/links can
    let you reuse an available block, but it''s not the same as copying and pasting
    a block into `BLOCKLY`. The connected blocks are referenced via links. For example,
    on a workspace, CSs can be formed and only connections can be joined to the SoS
    block, as illustrated in Figure [12-5](#520777_1_En_12_Chapter.xhtml#Fig5).


    ![../images/520777_1_En_12_Chapter/520777_1_En_12_Fig5_HTML.jpg](images/520777_1_En_12_Chapter/520777_1_En_12_Fig5_HTML.jpg)


    **Figure 12-5** Filtered view of SoS


    The modular SoS grouping enables the modularization of the design by allowing
    suitable blocks to be grouped together. For example, as illustrated in Figure
    [12-6](#520777_1_En_12_Chapter.xhtml#Fig6), all CSs can be clustered together.
    The group block aids in the division of the model into useful groups.


    Whenever a group''s block is mentioned, the group name is also included to distinguish
    it from other blocks with similar titles.


    ![../images/520777_1_En_12_Chapter/520777_1_En_12_Fig6_HTML.jpg](images/520777_1_En_12_Chapter/520777_1_En_12_Fig6_HTML.jpg)


    **Figure 12-6** Type Indicator cs4 plug-ins are shown with in yellow


    ## 12.2 Environment for SoS Behavior Simulation


    Behaviors can be introduced to any block after a static model has been created.
    The user can add a behavior by right-clicking the affected block and selecting
    **Add Behavior**. The Python programming language may be used to write behaviors,
    which represents the code that will be performed throughout the simulation (as
    seen in Figure [12-7](#520777_1_En_12_Chapter.xhtml#Fig7)).


    The titles of the `init`, `start`, and `run` functions can be specified, and they
    are performed during startup, block startup, and simulation execution, respectively.
    A service block''s `run` function has a specific understanding and is presented
    as a TCP-IP server.^([1])


    All the behavior code created for all the blocks is merged into a single file
    during code generation. XML and Code generation The model may be produced to XML
    and code for simulating after it has been imported by clicking the necessary buttons
    on the tool''s top-right side.^([1])


    The following format is used to generate unique object names for all blocks:


    ![../images/520777_1_En_12_Chapter/520777_1_En_12_Fig7_HTML.jpg](images/520777_1_En_12_Chapter/520777_1_En_12_Fig7_HTML.jpg)


