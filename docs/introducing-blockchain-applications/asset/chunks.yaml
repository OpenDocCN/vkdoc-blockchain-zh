- fmt: "### 14.4.2 Obstacle Avoidance Logic and *2* PC Protocol Concept\n\nTo prevent\
    \ robots from colliding while moving from one state to another, the project uses\
    \ the 2PC protocol concept for transition. To implement this concept, the project\
    \ includes a different mode of movement for robots (based on vote). If one robot\
    \ wants to move to a different state, it asks for `Ask4Bridge` mode. Then the\
    \ coordinator determines whether any other robots have requested the same mode.\
    \ If not, it allows further movement. To prevent robots from colliding while they’re\
    \ moving, the project also uses obstacle avoidance logic, which is available in\
    \ MATLAB.\n\n### 14.4.3 Architecture of North and South Farm and Storehouse\n\n\
    There is a feature in MATLAB called the *multi-robot environment* that’s used\
    \ to construct different fields, such as the North and South Farm and the Store.\
    \ In this platform, you could build “n” number of robots and track their movement.\n\
    \nThis is a built-in feature that’s available in the Navigation Toolbox plugin\
    \ in MATLAB. The MATLAB definition of the multi-robot environment is as follows:\
    \ “The Multi-Robot Environment enables you to simulate and prototype algorithms\
    \ in a two-dimensional multi-robot mobile robotics situation.” (See Figure [14-7](#520777_1_En_14_Chapter.xhtml#Fig7).)\n\
    \n![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig7_HTML.jpg](images/520777_1_En_14_Chapter/520777_1_En_14_Fig7_HTML.jpg)\n\
    \nFigure 14-7\n\nRobot Visualizer and Lidar Sensor\n\n## 14.5 Implementing the\
    \ Two-Phase Commit Protocol\n\nWhen a transaction is ready to “commit,” the 2PC\
    \ protocol kicks in. A single supervisor system initiates it (Robot 1, in the\
    \ initial stage).\n\nThe 2PC protocol has two phases, as shown here (assume in\
    \ the initial stage, that Robot 1 is the coordinator and Robots 2 and 3 are participants).\n\
    \n- **Phase 1:** The supervisor, Robot 1, asks each individual if they have finished\
    \ their tasks for the transaction and are prepared to commit. Each member gives\
    \ a yes or no answer.\n- **Phase 2:** All of the answers are counted by the organizer.\
    \ If all of the workers said yes, the transaction will be completed. It will abort\
    \ if this does not happen. The supervisor sends a message to each employee with\
    \ the final commits choice and gets a response.\n\nThis technique assures that\
    \ actions are atomic: either the whole action is reflected in the system’s final\
    \ state, or none of this is. If even a single party is unable to commit, the transaction\
    \ will be canceled. To put it another way, each party has *veto power* over a\
    \ transaction.\n\n![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig8_HTML.jpg](images/520777_1_En_14_Chapter/520777_1_En_14_Fig8_HTML.jpg)\n\
    \nFigure 14-8\n\nObstacle avoidance logic\n\nIt also assures the long-term viability\
    \ of transactions. Before answering “yes” in Step 1, each party double-checks\
    \ that all of a transaction’s writes have been durably written to storage. This\
    \ allows the supervisor to make a final decision regarding a transaction without\
    \ being concerned about a participant’s failure if they voted “yes” (see Figure\
    \ [14-8](#520777_1_En_14_Chapter.xhtml#Fig8)).\n\n### 14.5.1 Requirements\n\n\
    This project satisfies three basic requirements of concurrency control in distributed\
    \ systems when using mutual exclusion:\n\n- Mutual exclusion and safety\n- Liveness\n\
    - Fairness\n\nEnabling several processes to access a common resource or data source\
    \ is done in a mutually exclusive way:\n\n- There are no common variables in a\
    \ distributed system that may be utilized to construct mutual exclusion and synchronization\
    \ primitives.\n- The only way to share information is through data transfer.\n\
    \nThese three basic requirements are met as follows:\n\n- **Mutual exclusion,\
    \ safety:** Only one process can run the crucial portion at any given time.\n\
    - **Liveness:** (There is no deadlock or hunger.) Two or more parties should not\
    \ have to wait indefinitely for communications that will never arrive.\n- **Fairness:**\
    \ Every process is given an equal opportunity to complete the key portion. In\
    \ principle, fairness implies that crucial section execution requests are carried\
    \ out in the sequence in which they arrive in the system.\n\nIn addition to from\
    \ the previous requirements, we have also implemented the following requirements:\n\
    \n- The system is composed of a non-predetermined number of identical robots communicating\
    \ with each other via a wireless connection with the help of a Lidar Sensor and\
    \ obstacle avoidance logic.\n- Each robot follows the cyclic modes of operation\
    \ behavior with the help of the Robot Visualizer tool.\n- A robot that is not\
    \ granted bridge access waits until the bridge is cleared, and only then issues\
    \ a new access request, with the help of 2PC protocol concept.\n\nThe system is\
    \ based on a totally distributed algorithm, without any element of centralization,\
    \ with the help of the 2PC protocol concept.\n\n### 14.5.2 Problems Encountered\n\
    \nWhile implementing this project, the following problems appeared:\n\n- There\
    \ is a lack of scalability due to the hindering characteristics of the two-phase\
    \ commit protocol.\n\n  The two-phase commit protocol’s biggest issue is that\
    \ it is a hindering protocol. Some parties cannot complete their operations if\
    \ the supervisor fails permanently. It will stall until a commit or rollback is\
    \ received after a player has submitted an agreement message to the supervisor.\n\
    \n- Once a participant has acknowledged that it is ready to commit, it must be\
    \ able to commit the transaction afterward, even if it crashed in between. This\
    \ requires checkpointing to persistence storage.\n\n- The very worst situation\
    \ occurs when the supervisor is also a participant and votes on the protocol’s\
    \ conclusion. Then perhaps a crash to the supervisor wipes out both it and a member,\
    \ ensuring that the protocol will stay blocked, despite the fact that only one\
    \ loss occurred. 2PC is still a common consensus protocol due to its low communication\
    \ complexity. However, in the event of a failure, the difficulty can rise to `O(n^2)`\
    \ if every node volunteers to be the recovery node.\n\nNevertheless, the fact\
    \ that 2PC might block due to a supervisor failing is a serious issue that severely\
    \ reduces availability. If a transaction may be turned back at any moment, the\
    \ protocol can recover as nodes time out, but if commit choices must be treated\
    \ as permanent, a single failure can bring the entire system to a halt. Furthermore,\
    \ a three-phase commit protocol has been developed that eliminates the blocking\
    \ issues of 2PC at the cost of an additional message delay (see Figure [14-9](#520777_1_En_14_Chapter.xhtml#Fig9)).\n\
    \n![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig9_HTML.jpg](images/520777_1_En_14_Chapter/520777_1_En_14_Fig9_HTML.jpg)\n\
    \nFigure 14-9\n\nModel architecture of the north and south farm and storehouse"
