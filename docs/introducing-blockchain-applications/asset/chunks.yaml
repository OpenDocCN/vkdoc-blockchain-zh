  raw: '### 16.1.1 Blockchain Implementations and Use Cases in IoT


    The distributed ledger technology that underpins cryptocurrency, particularly
    Bitcoin, is known as blockchain. It’s already being used in a number of industries,
    notably in retail to move items through supply chains more easily and securely,
    and in medicine to preserve the integrity of contracts, clinical studies, and
    the medications themselves.


    The quality of the products is constantly checked by incorporating blockchain
    into these and other industries. A blockchain-focused research center has also
    been formed to encourage the development and commercialization of the technology
    and its potential to transform the IoT ecosystem.


    ### 16.1.2 Challenges with Integrating Blockchain Into IoT


    The IoT blockchain is gaining traction, but it is not without its challenges.
    To begin, the blockchain’s central idea is the chain of activities that have been
    completed. The chain is created by storing a reference to earlier operations,
    which are referred to in Bitcoin as *blocks* . Creating blocks, on the other hand,
    is a computationally expensive task that necessitates several processors and a
    significant amount of time. Because it’s tough to make a single block, manipulating
    it would be far more complex—you’d have to fake the preceding block and then follow
    the chain you made to modify it.


    ## 16.2 Safety Recommendations


    If properly managed, blockchain can significantly reduce costs and improve efficiency
    in IoT systems. However, technological adoption in IoT-enabled workplaces is far
    from ideal. Only 10% of blockchain ledgers in operation, for instance, are expected
    to integrate embedded technologies by 2020\. Additionally, most IoT systems have
    a long way to go before they are computationally capable of handling the load.


    IoT users, both people and companies, should seek multi-layered security with
    end-to-end security that spans from the gateway to the endpoint and is capable
    of preventing potential network attacks and compromises, in addition to timely
    software upgrades to avoid downtime. This includes the following:


    *   **Changing the default credentials**. IoT botnets have been found to use manufacturer
    default credentials to connect to linked devices. To decrease the danger of a
    device breach, it is advised that users enable secure passwords and use unique
    and complicated passwords.


    *   **Strengthening the router’s security**. A network is made susceptible by
    a weak router. Using security management solutions to protect routers helps users
    keep track of all devices connected while protecting privacy and productivity.


    *   **Configuring security devices**. The device’s default settings must be evaluated
    and modified to meet the needs of the user. To improve security, it’s a good idea
    to personalize features and turn off those that aren’t needed. Keep an eye on
    the network traffic. Actively monitoring for unusual behavior on the Internet
    can assist consumers in avoiding harmful efforts. Real-time scanning provided
    by security solutions may also be used to identify malware automatically and effectively.


    *   **Implementing additional security measures**. For extra protection, users
    should activate firewalls and use the Wi-Fi Protected Access II security protocol.
    Web reputations and application control-based technologies also give greater network
    visibility.


    ## 16.3 Blockchain Security and Privacy


    Security and privacy threats can be exploited on blockchain networks. Several
    chapters characterize attack surfaces, identify vulnerabilities in consensus protocols,
    discuss privacy and security threats to blockchain without and with required authorization,
    diagnose problems to defend against duplicate spending, and isolate effective
    defenses adopted by blockchain technology or proposed by researchers to mitigate
    the risks.


    Through cryptography, there is blockchain-based document ownership of all existing
    currencies inside a cryptocurrency ecosystem at any one time. A transaction is
    stored in a “block” on the blockchain once it has been confirmed and cryptographically
    verified by other network members or nodes.


    The timing of the transaction, prior transactions, and transaction details are
    all stored in a block. Events are kept chronologically and cannot be altered after
    they have been entered as a block. Since the birth of Bitcoin and the initial
    use of blockchain technology, this technology has stimulated the development of
    additional cryptocurrencies and applications.


    Data is not validated and controlled by a single organization, as in traditional
    systems, due to decentralization. Rather, every node or computer connected to
    the network verifies the authenticity of transactions. Cryptography secures and
    verifies transactions and data in the blockchain technology.


    Data breaches have grown more prevalent as the use of technology has increased.
    Personal data and information are stored, abused, and misused, posing a danger
    to privacy. Numerous people are advocating for blockchain technology to be widely
    used because it can increase user privacy, data security, and data ownership.


    ## 16.4 The Future Scope


    Despite the fact that there are numerous blockchain systems on the market and
    that substantial research and development is being done on specific blockchain
    aspects, additional study in the following categories is required.


    ### 16.4.1 Blockchain Architecture: Private, Public, or Hybrid-Public Blockchain
    Design


    Transactions are conducted in a decentralized manner. Commercial businesses, on
    the other hand, are wary of incorporating a public blockchain into their corporate
    solutions, due to worries about privacy, performance, and reaction time. To solve
    these problems, more R&D in the public blockchain system is required.


    Meanwhile, corporate players are moving closer to private/approved consensus mechanisms.
    Depending on the type of governance, this architecture might range from a single
    member to a consortium that controls the blockchain platform. The architecture,
    protocol, or method by which transactions are verified on these blockchain platforms
    has administrative components.


    ### 16.4.2 Inducement


    In Bitcoin, there is a monetary incentive to join the blockchain platform; however,
    there are no monetary incentives in use cases like provenance and identity management.
    To achieve maximum involvement, the incentive structure must be included in the
    protocol.


    To guarantee that blockchain protocols function to maximize advantages for the
    use case, mechanisms for incentive design may be generated from use cases. While
    trust management of the public blockchain may prevent manipulations or fraud,
    it is critical that the architecture incorporate incentive mechanisms with anti-fraud
    or anti-justice qualities. The processes involved in motivating participation
    need the development of theoretical models.


    ### 16.4.3 Data Privacy


    Because blockchain transactions are public, data analysis techniques may be used
    to analyze the vast quantities of data included inside them. The identities of
    participants and the precise transactions they have done might be revealed as
    a result of this research. Stealth addresses, homomorphic cryptography, and zero-knowledge
    proof are among the approaches used to solve privacy problems in public blockchain
    systems. A mix of approaches is necessary to obtain the appropriate level of anonymity.'
  trans: '

    ### 16.1.1 区块链在物联网中的实现与用例


    作为支持加密货币（尤其是比特币）的底层技术，分布式账本技术被称为区块链。它已被应用于多个行业，尤其是在零售业中，用于更轻松、更安全地推动商品在供应链中的流转；在医疗领域，则用于维护合同、临床研究以及药品本身的完整性。


    通过将区块链融入这些及其他行业，产品质量得到了持续监控。此外，一个专注于区块链的研究中心已经成立，旨在推动该技术的开发与商业化，并挖掘其在变革物联网生态系统方面的潜力。


    ### 16.1.2 将区块链集成到物联网中的挑战


    物联网区块链正获得越来越多的关注，但它并非没有挑战。首先，区块链的核心概念是已完成活动的链条。通过存储对先前操作的引用来创建链，在比特币中这些操作被称为*区块*。然而，创建区块是一项计算密集型任务，需要多个处理器和大量时间。由于单个区块本身就很难创建，操纵它将变得更加复杂——你必须伪造前一个区块，然后沿着你所创建的链条对其进行修改。


    ## 16.2 安全建议


    如果管理得当，区块链可以显著降低成本并提高物联网系统的效率。然而，在支持物联网的工作场所中，技术采纳远未达到理想状态。例如，预计到 2020 年，运营中的区块链账本只有
    10%会集成嵌入式技术。此外，大多数物联网系统在计算能力足以处理负载之前，还有很长的路要走。


    物联网用户，无论是个人还是公司，都应寻求多层安全防护，即实现从网关到端点的端到端安全，能够防范潜在的网络攻击和入侵，同时及时进行软件升级以避免停机。这包括以下内容：


    - **更改默认凭据**。已发现物联网僵尸网络使用制造商默认凭据来连接链接设备。为降低设备被入侵的风险，建议用户启用安全密码，并使用唯一且复杂的密码。

    - **加强路由器安全**。弱路由器会使网络易受攻击。使用安全管理解决方案来保护路由器，有助于用户跟踪所有连接的设备，同时保护隐私和生产力。

    - **配置安全设备**。必须评估并修改设备的默认设置以满足用户需求。为了提高安全性，个性化定制功能并关闭不需要的功能是个好主意。监控网络流量。主动监控互联网上的异常行为可以帮助消费者避免恶意攻击。安全解决方案提供的实时扫描也可以用于自动、有效地识别恶意软件。

    - **实施额外的安全措施**。为提供额外保护，用户应激活防火墙并使用 Wi-Fi 保护访问 II 安全协议。基于网络信誉和应用程序控制的技术也能提供更大的网络可见性。


    ## 16.3 区块链安全与隐私


    区块链网络可能被利用安全与隐私威胁。多个章节描述了攻击面，识别了共识协议中的漏洞，讨论了无需许可和需要许可的区块链所面临的隐私与安全威胁，诊断了防御双重支付的问题，并隔离了区块链技术采用或研究人员提出以降低风险的有效防御措施。


    通过密码学，加密数字货币生态系统中的所有现有货币在任何时刻都拥有基于区块链的文档所有权。一旦交易被其他网络成员或节点确认并通过加密验证，它就会被存储在区块链上的一个“区块”中。


    交易的时间、先前的交易以及交易详情都存储在一个区块中。事件按时间顺序保存，一旦作为区块录入就无法更改。自比特币诞生以及区块链技术首次应用以来，这项技术已刺激了更多加密货币和应用的发展。


    由于去中心化，数据不像传统系统那样由单一组织验证和控制。相反，连接到网络的每个节点或计算机都会验证交易的真实性。在区块链技术中，密码学用于保护和验证交易与数据。


    随着技术使用的增加，数据泄露也变得越来越普遍。个人数据和信息被存储、滥用和误用，对隐私构成了威胁。许多人倡导广泛使用区块链技术，因为它可以增强用户隐私、数据安全性和数据所有权。


    ## 16.4 未来展望


    尽管市场上有许多区块链系统，并且针对特定的区块链方面正在进行大量的研究和开发，但还需要在以下类别中进行进一步的研究。


    ### 16.4.1 区块链架构：私有、公有或混合公有区块链设计


    交易以去中心化的方式执行。然而，由于对隐私、性能和响应时间的担忧，商业企业不愿将公有区块链整合到其企业解决方案中。为了解决这些问题，需要在公有区块链系统中进行更多的研发。


    与此同时，企业参与者正逐渐转向私有/许可共识机制。根据治理类型的不同，这种架构可能从单个成员到控制区块链平台的联盟不等。在这些区块链平台上验证交易的架构、协议或方法都包含管理组件。


    ### 16.4.2 激励机制


    在比特币中，加入区块链平台有金钱激励；然而，在诸如溯源和身份管理等用例中，并没有金钱激励。为了实现最大程度的参与，激励结构必须包含在协议中。


    为了确保区块链协议能够为用例最大化收益，激励设计机制可以从用例中生成。虽然公有区块链的信任管理可以防止操纵或欺诈，但在架构中纳入具有反欺诈或反操纵特性的激励机制至关重要。激励参与所涉及的过程需要开发理论模型。


    ### 16.4.3 数据隐私


    由于区块链交易是公开的，可以使用数据分析技术来分析其中包含的海量数据。这项研究可能会泄露参与者的身份以及他们执行过的具体交易。隐身地址、同态加密和零知识证明是用于解决公有区块链系统中隐私问题的方法之一。要达到理想的匿名水平，需要综合运用多种方法。

