  trans: '

    ### 4.6.5 消息


    消息是 EVM 代码从一个智能合约发送到另一个智能合约的一种虚拟交易。请注意，以太坊中的交易和消息是不同的。以太坊术语中的*交易*特指一份经数字签名的数据，该数据源自
    EVM 代码执行过程之外，并将在区块链中注册。消息只能由 EVM 代码发送，且永远不会在数据中体现。因此，它们表达了智能合约向不同智能合约发送消息的能力。


    这些是虚拟对象，从未被序列化，只存在于以太坊运行时环境中。它们也可以被理解为智能合约之间的函数调用。


    基本上，你需要理解消息类似于交易，区别在于它是由合约而非外部参与者产生的。在消息生成后，当一个合约正在执行时，代码会执行主要的`CALL`或`DELEGATE
    THE CALL`操作码，从而生成一条消息。


    因此，一个合约可以像外部参与者一样，与其他智能合约建立关系。它们也被称为内部计算或内部交易，当一个合约在内部向另一个合约发送交易时，代码会被执行并与接收方合约账户关联。（参见图
    4-25。）


    通常，消息来自智能合约，其执行会触发来自 EOA（外部拥有账户）的交易。


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig25_HTML.jpg](img/520777_1_En_4_Fig25_HTML.jpg)


    **图 4-25** 交易与消息（内部交易）


    `gasLimit`由外部拥有账户设置，因此其值足够高，以允许整个操作（包括因操作本身而产生的任何子执行，即合约间的消息）顺利执行。


    对于整个交易链，当某条消息的特定执行结束时，该消息的执行及其后续激活的所有消息的执行，都可以恢复到初始状态。


    ## 4.7 以太坊状态转换函数


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig26_HTML.png](img/520777_1_En_4_Fig26_HTML.png)


    **图 4-26** 由新交易触发的状态改变与状态转换函数


    本节讨论交易的验证以及状态转换函数。当且仅当交易有效，并且你已经安排好完成其执行所需的所有资源时，此函数允许你转换到一个新状态。参见图 4-26。


    让我们来看一下以太坊状态转换函数的步骤：


    `APPLY (S; TX) -> S0` 或 `ERROR` 定义如下：


    1. 检查交易的结构和语法，验证签名的有效性，并确定交易的 nonce 是否与发送者匹配。如果不成功，则返回错误。

    2. 然后，你可以将交易成本计算为`GASLIMIT * GASPRICE`，并确定签名发送者的地址。如果发送者的账户余额充足，则扣除刚计算出的金额并增加
    nonce；否则，返回错误。

    3. 初始化变量`GAS = GAS_LIMIT`。每消耗一个字节，就按一定数量减少 gas，以支付所消耗的每个字节的资源。

    4. 将交易的数字货币从发送者账户转移至接收者账户。注意，如果接收者账户不存在，则创建它。然后，如果收款人账户是智能合约，则运行合约代码，直到操作完成，或至少直到
    gas 耗尽。

    5. 如果交易因发送者资金不足或代码执行耗尽 gas 而失败，则恢复所有状态更改，支付税费，并将税费添加到矿工账户。

    6. 否则，如果成功，则向发送者退还未消耗的 gas 费用，并将已消耗的费用奖励给包含该交易的区块的获胜矿工。


    在恢复管理方面，消息的工作方式与交易等效：如果正在运行的消息耗尽 gas，并且由此触发的所有其他执行都被恢复，这没有问题。在其他情况下，它会返回一个错误或一个`STOP/RETURN`语句。


    如前所述，智能合约开发者可以访问三种类型的存储内存：


    * LIFO（后进先出）栈（易失性），可以在其中压入或弹出数据（范围从 0 到 1024）。

    * （易失性）内存，是一个可无限扩展的字节数组。

    * 以太坊的（非易失性）存储。


    代码还可以获取消息的值和传入数据。它可以访问区块头数据，并且也可以返回一个字节数组作为输出。


    EVM 的功能状态可以由数据集定义。在这种情况下，区块状态是包含所有账户、余额和存储的全局状态。


    务必注意，在每一轮运行的开始，当前指令是通过程序计数器指向的字节来识别的。每个操作在与数据集交互方面都有其自身的定义。'
- fmt: "# 4.8 Transaction Flow in Ethereum Blockchain\n\nThis section discusses the\
    \ transaction lifecycle in the Ethereum blockchain. Let’s take as an example a\
    \ transaction that invokes a function of a smart contract—it’s valid and applies\
    \ to any type of transaction. Suppose you want to cast your vote in an election\
    \ through a decentralized application distributed on the Ethereum network. Figure\
    \ [4-27](#520777_1_En_4_Chapter.xhtml#Fig27) shows a graphical interface of the\
    \ application, which you have accessed it through your browser, and which has\
    \ installed a plug-in to manage the Ethereum accounts.\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig27_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig27_HTML.jpg)\n\
    \nFigure 4-27\n\nTransaction that invokes a function of a smart contract\n\nThe\
    \ application gives us a list of elections, and we choose the one for which we\
    \ have the right to vote.\n\nThe vote function we click is an event handled by\
    \ JavaScript through an Ethereum communication library called `Web3.js`. It connects\
    \ to a node of the Ethereum network, creates an instance of a proxy for the smart\
    \ voting contract, and calls its `castVote()` function, passing the selected candidate.\
    \ The function call is a transaction, since it alters the status of the voting\
    \ app (through its function `castVote()`) and requires a digital signature that\
    \ is generated on the spot. See Figure [4-28](#520777_1_En_4_Chapter.xhtml#Fig28).\n\
    \n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig28_HTML.png](images/520777_1_En_4_Chapter/520777_1_En_4_Fig28_HTML.png)\n\
    \nFigure 4-28\n\nBlockchain dapps\n\nThe voting transaction is validated by the\
    \ local Ethereum node from which it is been submitted. Validation involves checking\
    \ various things:\n\n- The structure and syntax is well defined.\n- The digital\
    \ signature is consistent with the sender’s address and the content of the transaction.\n\
    - The nonce value of the transaction must be valid. Remember that the nonce of\
    \ an account is the count of computations or the transactions sent by that account\
    \ ledger or bill. To be valid, the nonce of a transaction should match the nonce\
    \ of the sender’s user account.\n- The sender has enough ether to process the\
    \ transaction.\n- The data sent will not cause the `castVote()` function to fail.\n\
    \nSo, if the validation is successful, the current node broadcasts the transaction\
    \ to all its neighboring peer nodes. If the validation is not successful, the\
    \ transaction is not transmitted and simply disappears. Then, the transaction\
    \ is transmitted over the network through the various complete nodes, which in\
    \ turn go through the previous validation process.\n\nThen the transaction, spreading\
    \ through the network, reaches the miner nodes. Each miner node, based on the\
    \ transactions it receives, has its own transaction pool to add to the ledger.\
    \ (See Figure [4-29](#520777_1_En_4_Chapter.xhtml#Fig29).)\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig29_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig29_HTML.jpg)\n\
    \nFigure 4-29\n\nMemPool\n\nThe miner node then chooses the transactions to include\
    \ in the candidate block.\n\nHence, let’s consider that `n` is the number of transactions\
    \ and let `APPLI (S; TX)` be the function of state transition defined earlier.\n\
    \nLet `S [0]` be the state at the end of the last block.\n\n*For i = 0; 1; ...\
    \ n–1 S (i+1) = APP (S (i); TX (i))*\n\nIf no application of the transition function\
    \ returns an error, then they are valid and could be added to the block, otherwise\
    \ it will discard those that are invalid.\n\nThen to `S [n]` the miner adds the\
    \ rewards obtained and defines the final state of the block. Then the miner will\
    \ build the block, solve the algorithm of consensus and propagate it on the network\
    \ to be added to the blockchain. Once the voting transaction is performed during\
    \ validation of the block, the smart contract will publish the `VoteConfirmation()`\
    \ event.\n\nThis will be received from the voter’s web user interface, on which\
    \ you are registered to hear that event.\n\nThe `VoteConfirmation()` event will\
    \ then be handled by the interface’s JavaScript web user, and a message will appear\
    \ on the screen so that the user knows that the vote was successful.\n\nFigure\
    \ [4-30](#520777_1_En_4_Chapter.xhtml#Fig30) shows the lifecycle of the transaction,\
    \ from the origin to the confirmation event.\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig30_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig30_HTML.jpg)\n\
    \nFigure 4-30\n\nTransaction pool system\n\n## 4.9 Transaction State\n\nA transaction\
    \ proceeds through a series of states until it is not confirmed in a block added\
    \ to the ledger. (See Figure [4-31](#520777_1_En_4_Chapter.xhtml#Fig31).)\n\n\
    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig31_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig31_HTML.jpg)\n\
    \nFigure 4-31\n\nTransaction state\n\nLet’s analyze these states one by one:\n\
    \n- **Unknown:** A transaction that was neither viewed nor processed by the network.\n\
    - **Pending:** A transaction that is in the pending state and is waiting to be\
    \ chosen and elaborated by the miners. It’s in the so-called transaction pool.\n\
    - **In block:** A transaction moves into the block state when a miner has correctly\
    \ selected the transaction and extracted it in a block. Once in the block, a transaction\
    \ can roll back to the pending status if the block is forked.\n- **Replaced:**\
    \ A transaction can go to the replaced state from the pending state when one of\
    \ these events occurs:\n  - Another transaction from the same sender with the\
    \ nonce itself enters the state of in block.\n  - Another transaction from the\
    \ same sender with the same nonce with a higher gas price enters the state pending.\n\
    \nSo, let’s see the state *transitions* of the transactions.\n\n- **Pooling:**\
    \ A transition from the unknown state to the pending state. It concerns the transactions\
    \ that enter the transaction pool of somebody. They are therefore waiting to be\
    \ selected to train a candidate block.\n- **Mined:** A mined transaction was processed\
    \ by a miner, creating a block. Once he checked out a transaction, he entered\
    \ the status in block. Due to the *peer-to-peer* nature of the Ethereum network,\
    \ from the perspective of some node, the transaction can shift from the *unknown*\
    \ state directly to the in-block state without going through the pending state.\n\
    - **Replaced:** A transaction that moves from the pending state to replaced it\
    \ is said to have been replaced. This happens when:\n  - Another transaction from\
    \ the same sender with the nonce itself enters the in-block state.\n  - Another\
    \ transaction from the sender state with the same nonce but with a higher gas\
    \ price enters the pending status.\n- **Forked:** This happens when a block transaction\
    \ is part of a block that is inverted by the network. All transactions within\
    \ that block will pass from the in-block state to the state pending.\n- **Confirmed:**\
    \ A transaction in block status is confirmed whenever a new block is extracted\
    \ and added to the chain."
