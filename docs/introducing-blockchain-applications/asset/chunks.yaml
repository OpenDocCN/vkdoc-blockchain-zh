    seen in Figure [12-7](#520777_1_En_12_Chapter.xhtml#Fig7)).


    The titles of the `init`, `start`, and `run` functions can be specified, and they
    are performed during startup, block startup, and simulation execution, respectively.
    A service block’s `run` function has a specific understanding and is presented
    as a TCP-IP server.¹


