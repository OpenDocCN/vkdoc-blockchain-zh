  trans: "\n### 对等节点与组织\n\n不同的公司控制着区块链网络，或者由单个公司统一管理。由于这些网络归各公司所有，对等节点在此类分布式网络的构建中至关重要。对等节点同时也是组织网络的连接点。\n\
    \n在此情形下，一个网络由四个贡献组织和八个对等节点构成。通过通道 `C` 相连的网络 `N` 中的五个对等节点分别是 `P1`、`P3`、`P5`、`P7`\
    \ 和 `P8`。尽管这些公司的其他对等节点并未加入此通道，但它们通常至少是另一个通道的成员。由某公司开发的应用程序将连接该公司内部的员工以及来自其他公司的员工。为清晰起见，图\
    \ 6-7 中未显示排序节点。\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig7_HTML.jpg](img/520777_1_En_6_Fig7_HTML.jpg)\n\
    \n*图 6-7 连接组织与对等节点*\n\n多个拥有资源的贡献组织共同建立并管理网络。本文主题中的资源指对等节点；然而，组织提供的资源远不止对等节点。如果没有那些向网络提供独特资源的组织，协作网络便不复存在。网络因这些成员实体所提供的资源而得以扩展或收缩。\n\
    \n### 对等节点与身份\n\n对等节点通过某个认证中心颁发的数字证书来分配身份。当对等节点通过通道连接到区块链时，其对等节点的权限由通道配置中基于其身份的规则所决定。\n\
    \n因此，（通道）`MSP` 通过其数字证书来识别对等节点所属的组织。（见图 6-8。）\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig8_HTML.jpg](img/520777_1_En_6_Fig8_HTML.jpg)\n\
    \n*图 6-8 对等节点的身份*\n\n在此案例中，`CA1` 已向 `P1` 和 `P2` 提供了身份。由 `CA1` 颁发的身份通过 `ORG1.MSP`\
    \ 与 `Org1` 关联，这是由通道 `C` 使用 `MSP` 通道来确定的。`ORG2.MSP` 同样将 `P3`/`P4` 识别为 `Org2` 的组成部分。\n\
    \n### 对等节点、共识与排序\n\n为了确保网络区块链上的几乎所有对等节点都能保持其信息同步，想要修改账本的应用程序需要经过一个三步流程。\n\n- 第一步，应用程序与一有限集合的支持节点进行交互，这些节点各自提供尚未应用到账本的提议响应。应用程序与之交互以更新账本的支持节点子集，由网络策略决定。\n\
    \n- 第二步，应用程序收集这些提议响应，并执行以下操作：\n    - 验证其一致性。\n    - 随后将交易发送至排序服务。\n\n- 第三步也是最后一步，排序服务将所有传入的交易进行排序，组合成一个区块，然后将该区块发送给每个邻居节点，在那里每笔交易在被记录前都会得到验证。\n\
    \n因此，构成排序服务的排序节点是一切的核心。接下来的部分将更深入地审视这一过程。\n\n## Hyperledger Fabric 共识\n\nHyperledger\
    \ Fabric 中的共识经历三个阶段：\n\n- 提案\n- 交易的排序与打包入块\n- 验证与提交\n\n### 阶段 1：提案\n\n首先，程序选择一组对等节点来生成对提议账本的更新。\n\
    \n背书策略（为某个链码设定）决定了哪些组织必须批准一项提议的账本交易，之后该交易才能被网络接受并因此得以记录。\n\n达成共识的意义即在于此：每个相关的组织都必须同意提议的账本更新，之后该更新才能被任何对等节点的账本所接受。\n\
    \n应用程序开发出被提议的交易，并将其发送给每一个必须批准它的对等节点组。每个这样的对等节点都是独一无二的。随后，支持节点通过独立执行基于交易提案的链码，生成对结算提案的响应。此更新不会应用到账本主本上；相反，它会被签名并返回给应用程序。（见图\
    \ 6-9。）\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig9_HTML.jpg](img/520777_1_En_6_Fig9_HTML.jpg)\n\
    \n*图 6-9 提案*\n\n对等节点通过使用其私钥对整个有效载荷进行签名并附上其数字签名，来接受一个提议的响应。此许可随后可用于证明某个特定响应是由公司内部的对等节点生成的。\n\
    \n当应用程序获得足够数量的对等节点响应时，阶段 1 即告结束。请注意，不同的对等节点可能会向应用程序返回不同的交易响应，从而导致结算提案出现矛盾。\n\n\
    可能有两个原因导致这种情况：或由于链码的非确定性（链码中应避免的特性），或由于对等节点之间的不一致。\n\n如果应用程序试图用一组不一致的响应交易来更新账本，该更新将被拒绝。如果提案成功，则每个响应都是一致的，因此彼此等价。\n"
- fmt: "### Stage 2: Transactions Are Ordered and Packaged in Blocks\n\nThe transaction\
    \ workflow continues with the packaging stage. Because he receives transactions\
    \ comprising replies to settlement offers accepted by various applications and\
    \ arranges them into pieces, the payer is crucial to this process.\n\nAmong other\
    \ things, the authorizing officers have the responsibility of gathering proposed\
    \ transaction changes, arranging them, and packaging them into blocks for delivery\
    \ to peers. (See Figure [6-10](#520777_1_En_6_Chapter.xhtml#Fig10).)\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig10_HTML.jpg](images/520777_1_En_6_Chapter/520777_1_En_6_Fig10_HTML.jpg)\n\
    \nFigure 6-10  \nOrdering transactions\n\nStage 3 begins with the computer distributing\
    \ the blocks to all peers connected to it. When a new block is produced, the peers\
    \ are linked to the orderers via channels in such a way that a copy of the new\
    \ block is disseminated to all peers connected to the originator. Each peer will\
    \ process this block individually, but in the same way as every other peer on\
    \ the channel. Figure [6-11](#520777_1_En_6_Chapter.xhtml#Fig11) illustrates how\
    \ to keep the ledger constant in this way. It’s also worth noting that not all\
    \ peers need to be connected to a computer: peers can connect to cascade to other\
    \ peers via the gossip protocol.\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig11_HTML.jpg](images/520777_1_En_6_Chapter/520777_1_En_6_Fig11_HTML.jpg)\n\
    \nFigure 6-11  \nVerification and finalization\n\nWhen a peer gets a block, it\
    \ processes each transaction in the block in the order that it occurs. For each\
    \ transaction, each peer will check if the transaction has been authorized by\
    \ the organization requested according to the approval rules of the chaincode\
    \ that started the transaction. (See Figure [6-11](#520777_1_En_6_Chapter.xhtml#Fig11).)\n\
    \nA few transactions, for example, may just require clearance from a single organization,\
    \ while others may necessitate several approvals before being declared genuine.\n\
    \nThis validation procedure ensures that all relevant companies produced the same\
    \ outcome. This validation is distinct from the approval check in Stage 1, in\
    \ which the application receives answers from the peers it authorizes and chooses\
    \ whether or not to transmit the proposed transactions. If the application violates\
    \ the approval rules by submitting erroneous transactions, the peer might still\
    \ refuse the transaction at Stage 3, validation.\n\nIf the transaction has been\
    \ correctly accepted, the peer will seek to enforce it on the blockchain. To do\
    \ so, a peer must conduct a check ledger consistency to confirm that the current\
    \ state of the book master corresponds to the ledger state at the time the proposed\
    \ update was created.\n\nEven though the transaction has been fully approved,\
    \ this may not always be doable. Another transaction, for example, the identical\
    \ resource in the ledger, may have been changed to the point that the transaction\
    \ update is no longer applicable and so cannot be implemented. Because all peers\
    \ in the channel follow the same standards for validating transactions, the ledger\
    \ is kept constant.\n\n## Ledger\n\nHyperledger Fabric’s IA ledger is made up\
    \ of two separate but interconnected parts: a blockchain and a global state. (See\
    \ Figure [6-12](#520777_1_En_6_Chapter.xhtml#Fig12).)\n\nBoth represent a bundle\
    \ of information on a group of business items.\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig12_HTML.jpg](images/520777_1_En_6_Chapter/520777_1_En_6_Fig12_HTML.jpg)\n\
    \nFigure 6-12  \nLedger\n\nThe first step is to use the blockchain. A transaction\
    \ log records all of the events that have led to the world’s present state. Transactions\
    \ are collected in blocks that are added to the blockchain, which allows you to\
    \ view the path of events that led to the present situation. Because it is immutable\
    \ once written, the blockchain’s data structure varies considerably from that\
    \ of the rest of the world.\n\nSecond, a global state exists. The current values\
    \ of a set of business object states are stored in a database. Instead of having\
    \ to calculate the current value of a state by crossing the entire register of\
    \ transactions, a program can directly access it using the world state. By default,\
    \ accounting states are expressed as key-value pairs. States can be generated,\
    \ updated, and eliminated, so the world state can change frequently.\n\nAs a consequence,\
    \ the global state is generated from a subset of the blockchain.\n\n### Blockchain\n\
    \nThe blockchain keeps track of the events that led to the current status of assets.\n\
    \nThe blockchain has always been implemented as a file, unlike the state, which\
    \ utilizes a database. (See Figure [6-13](#520777_1_En_6_Chapter.xhtml#Fig13).)\n\
    \n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig13_HTML.jpg](images/520777_1_En_6_Chapter/520777_1_En_6_Fig13_HTML.jpg)\n\
    \nFigure 6-13  \nLedger with database\n\nA config transaction providing the network’s\
    \ initial condition of the channel is included in the ledger’s genesis frame.\
    \ The block structure is standard, as you saw in “Blockchain Fundamentals.”\n\n\
    ### Transaction\n\nThe structure of transactions, on the other hand, is fascinating.\
    \ Their design is depicted in Figure [6-14](#520777_1_En_6_Chapter.xhtml#Fig14).\n\
    \n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig14_HTML.jpg](images/520777_1_En_6_Chapter/520777_1_En_6_Fig14_HTML.jpg)\n\
    \nFigure 6-14  \nLedger with a transaction\n\nIn this example, you can see the\
    \ following fields:\n\n*   **Header:** Contains some critical transaction metadata,\
    \ such as the transaction’s chaincode name and version.\n*   **Signature:** The\
    \ application client generates a digital signature, which is provided. This feature\
    \ is used to verify that the transaction information has not been altered because\
    \ it requires the application’s private key to create.\n*   **Proposal:** Encodes\
    \ an application’s input parameters into the chaincode that generates the proposed\
    \ ledger’s update.\n\n    When chaincode is executed, this proposal offers a set\
    \ of input variables that, when coupled with the existing world state, produce\
    \ the new world state.\n\n*   **Response:** Encompasses the values of the world\
    \ before and after. Is the outcome of a smart contract, and if the transaction\
    \ is correctly validated, it will be added to the ledger to update the global\
    \ system.\n*   **Endorsements:** This is a list of all approved transaction answers\
    \ that must adhere to the approval policy for each company. There will be no change\
    \ in global status if enough people sign a transaction.\n\n### World State\n\n\
    The *World State* reflects the primary value of a business object’s characteristics\
    \ as a single accounting state. Most applications demand the current value of\
    \ an object; measuring the real worth of an item over the whole blockchain would\
    \ be cumbersome; instead, you obtain it straight from the global state. (See Figure\
    \ [6-15](#520777_1_En_6_Chapter.xhtml#Fig15).)\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig15_HTML.jpg](images/520777_1_En_6_Chapter/520777_1_En_6_Fig15_HTML.jpg)\n\
    \nFigure 6-15  \nState\n\nA database keeps track of the present status of the\
    \ planet. This is understandable because a database provides a wide range of archiving\
    \ operators as well as fast state recovery.\n\nFor the global state database,\
    \ there are two options: `LevelDB` and `CouchDB`. Each chaincode has its own global\
    \ status, which is unique from the status of all other chaincodes. This means\
    \ that the world’s states are stored in a namespace, which can only be accessed\
    \ by contracts intelligent from the same chaincode. As a result, a chaincode can’t\
    \ see another chaincode’s world state."
