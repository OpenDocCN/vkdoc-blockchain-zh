    \ transactions) or as the holder of a certain role in the system (as an administrator\
    \ organization).\n\nA customer local MSP is set in the system files of the node\
    \ and only applies to that node. Because orderers, like peer nodes, are part of\
    \ a single institution, they have a single MSP to identify the actors or nodes\
