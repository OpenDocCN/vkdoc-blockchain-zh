  trans: '

    ## 17.3 可靠性与安全性


    关键系统的*可靠性*被描述为一系列*定量*指标的集合。以下是一些较为重要的指标：


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Figa_HTML.jpg](img/520777_1_En_17_Figa_HTML.jpg)


    - *可用性* 是一种衡量正确服务与错误服务频率对比的指标。


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Figb_HTML.jpg](img/520777_1_En_17_Figb_HTML.jpg)


    - *可靠性* 指系统提供持续服务的能力。

    - *安全性* 被定义为在发生故障时避免灾难性后果。


    由于安全标准需要可量化的度量，系统的安全性通常通过整合其他指标来描述，例如平均无灾难性故障时间。


    - *可维护性* 指系统在发生故障后进行维护和恢复的能力。该因素会影响可用性。

    - *覆盖率* 是衡量系统容错措施在预防、避免或纠正问题方面有效性的指标。


    *风险* 是指任何威胁系统可靠性的事物：它是一个导致系统提供错误服务的“事件”。威胁可能形式多样，来源各异，例如错误的规范、需求的错误执行，或灾难。


    在系统可靠性方面，我们需确保服务始终正确。当服务从正确状态转变为错误状态时，便发生了故障。在构建关键系统时，最小化从正常服务状态过渡到错误服务状态的可能性这一需求，主导着项目的部署。（见图
    17-3。）


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig3_HTML.jpg](img/520777_1_En_17_Fig3_HTML.jpg)


    图 17-3


    正确服务与错误服务


    在评估安全关键系统的可靠性时，我们应区分良性和灾难性故障。对于良性故障，系统可能无法提供最佳服务，但仍能保持安全。当这些系统与人近距离交互时，不安全的服务可能导致灾难性后果，例如环境破坏、系统基础设施紊乱，甚至致命事故。以自动驾驶汽车为例。设想一种情况：汽车在“正常”条件下行驶，前方突然出现障碍物。


    尽管急刹车并随后中断行驶是一种故障状态，但由于无人受伤，它被认为是良性故障。除此之外，车辆加速冲向障碍物（并最终撞上）的场景则被视为危险故障，因为车内人员可能会受重伤。（见图
    17-4。）


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig4_HTML.jpg](img/520777_1_En_17_Fig4_HTML.jpg)


    图 17-4


    状态


    我们希望发现所有可能的故障，以评估安全关键系统的可靠性。研究人员利用在学术界和决策者中广为人知的“故障-错误-失效链”来实现这一目标：


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig5_HTML.jpg](img/520777_1_En_17_Fig5_HTML.jpg)


    图 17-5


    故障、错误和失效


    - **故障 (Fault)：** 指已判定或推测出原因的缺陷。

    - **错误 (Error)：** 系统状态中可能导致失效的一部分。

    - **失效 (Failure)：** 错误进入服务接口，导致整个系统服务中断的情况。（见图 17-5。）


    当错误发展到无法纠正的程度时，系统的可靠性取决于一套旨在预防或减轻潜在故障影响的四种方法：


    - **故障预防：** 防止故障发生或被引入的方法。

    - **故障容错：** 允许容忍缺陷的方法。即使发生故障，系统仍能提供正确服务。

    - **故障排除：** 降低系统缺陷的数量或严重程度。

    - **故障预测：** 使用统计方法估计当前缺陷数量、未来发生情况以及潜在影响。验证过程用于评估为满足系统可靠性要求所采取措施的有效性。


    系统需求的确认是在整个开发阶段都必须遵循的方法，包括在设计过程开始时。对于系统开发过程的每个阶段，都可以选择多种验证技术：


    - **数值建模：** 使用具有简单解析解的数值模型对系统能力进行建模的方法。换句话说，可以使用定量分析函数来表达系统的变化。这些模型包括顺序模型和基于状态的模型。

    - **仿真：** 在模拟环境中对系统可靠性进行经验性估计。该方法允许测试某个特定容错机制能否在不损害真实系统的情况下运行。

    - **测量：** 一旦系统原型就绪，可以在实际运行中进行监控并生成相关指标。


    需要注意的是，这些技术并非相互排斥，在验证过程中都应予以考虑。


    如前所述，验证必须贯穿项目的整个生命周期，从建模阶段开始，一直持续到实施之后。在某些阶段，本书中描述的一些方法更为适用：


    - **规范阶段：** 通过描述可靠性标准来实现有效性，这些标准可以使用数值技术进行验证。使用组合设计等方法来确定系统组件的故障标准。故障被认为是相互独立的。

    - **设计阶段：** 在设计阶段，适合使用基于状态的模型来表示系统的状态空间。这些模型的例子包括马尔可夫链和佩特里网。

    - **实现阶段：** 当项目进展到一定程度时，可能可以构建一个可以密切监控的原型模型，以观察容错方法在提高系统可靠性方面的有效性。

    - **运行阶段：** 系统安装后，可以在真实环境中进行测试。

    '
- fmt: "# 17.4 Tracking the System\n\nMonitoring the system is a technique that involves\
    \ seeing a system operate in its surroundings and collecting data and evidence\
    \ regarding its features. Currently, it’s seen to be a useful way to assess a\
    \ system’s dependability, and many techniques to do so have been presented in\
    \ the research. We use the approaches presented in these books in this chapter.\n\
    \nThis method seeks to continuously monitor a system in its end environment, ensuring\
    \ that the observed behavior and performance fulfill the specific needs. Validation\
    \ of the data acquired during the monitoring activity is required:\n\n- **Offline:**\
    \ While the system is functioning, data is gathered and saved someplace, then\
    \ evaluated afterward.\n- **Online** (or in real time): Data is evaluated as it\
    \ is obtained. All of these factors must be considered while developing a monitoring\
    \ strategy:\n  - Identifying the system’s important events, measures, and qualities\
    \ that must be evaluated in order to determine the system’s dependability.\n \
    \ - Data labeling in order to add more information to raw measurements.\n  - Data\
    \ collection and transfer to the analysis node for processing.\n  - Data filtering\
    \ and classification based on the metrics of interest.\n\nThe entire system is\
    \ referred to as target system in the description of a monitoring process. When\
    \ the tracking activity is linked to a specific H/w or S/w or piece of the system,\
    \ an aimed component or final application is employed. The professionals and academicians\
    \ are full in agreement that these diametrically opposed techniques are effective:\n\
    \n- Analysis in a black-box setting.\n- Analysis in a white-box setting.\n\nThe\
    \ strategy you choose is determined by how much command you have over the target\
    \ system, particularly its inner implementations.\n\nA black box approach can\
    \ be used when the implementations are unknown, such as when the ability to monitor\
    \ action is performed by a third-party system. After defining a workload, the\
    \ task is offered to the system, and its outputs are noticed. (See Figure [17-6](#520777_1_En_17_Chapter.xhtml#Fig6).)\n\
    \n![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig6_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig6_HTML.jpg)\n\
    \n**Figure 17-6** Target system output processing\n\nIt is possible to study the\
    \ target machine “on the inside” by attaching a probe directly to the computer\
    \ and viewing the system’s intermediary outputs while it runs, if the internal\
    \ characteristics of the target system are known and easily available. Because\
    \ these probes are directly connected to the system’s internal components, they\
    \ can offer considerably more information than simply observing the system’s outputs\
    \ can.\n\nOn the one side, this technique gives a lot more information on the\
    \ system’s behavior, but it also necessitates more caution in terms of monitoring\
    \ and system probing. These two principles, in particularly, must be followed:\n\
    \n- **Representativeness of choices:** In order to execute a successful monitoring\
    \ activity, the probes should be able to get a sufficient number of relevant facts.\n\
    - **No intrusiveness:** Probing must not alter the system’s behavior; otherwise,\
    \ the acquired data will be useless.\n\n![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig7_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig7_HTML.jpg)\n\
    \n**Figure 17-7** Probes\n\nAdditional rationale is required in the design and\
    \ development of the monitoring system, particularly in regard to how the probing\
    \ is carried out. We can differentiate between the following in specific.\n\n\
    Hardware monitoring, software monitoring, and hybrid monitoring are all options.\
    \ Because of its obvious minimal intrusiveness, a devoted hardware channel for\
    \ tracking is the best approach to observe a system. However, as systems get more\
    \ sophisticated, installing hardware probes becomes increasingly difficult, if\
    \ not extremely difficult. (See Figure [17-7](#520777_1_En_17_Chapter.xhtml#Fig7).)\n\
    \nSoftware probes are more powerful than hardware probes because they have access\
    \ to more relevant data and can establish the context in which a specific output\
    \ was created. Data extraction and measurement instructions can be included in\
    \ the procedure, the operative system, or a new probe process can be created.\
    \ In a hybrid technique, equipment/software probes might be utilized simultaneously,\
    \ with specific emphasis devoted to reducing the disadvantages of each technology.\n\
    \n## 17.5 Motivation and Goal of This Work\n\nA `neural network`, which is in\
    \ charge of driving the automobile, is pitted against a system supervisor, which\
    \ offers fault-tolerance mechanisms to prevent catastrophic failures. In relation\
    \ to the effects autonomous automobiles may have on future system advancements,\
    \ they are among the most current and promising safety essential technologies.\n\
    \nThis type of technology typically has extremely high-capacity needs that are\
    \ difficult to verify. Furthermore, the nature of the software architecture, which\
    \ involves artificial intelligence and non-artificial intelligence software interacting\
    \ with one another, makes validation much more difficult.\n\nThe objective of\
    \ this research is to provide an experimental technique for evaluating the dependability\
    \ of such complex systems, with an emphasis on what metrics are acceptable for\
    \ these processes and what factors impact the analysis process. To exemplify the\
    \ principles provided in this book, an experimental activity was undertaken in\
    \ a realistic simulation setting.\n\nYou can’t get access to a system supervisor\
    \ or a trained neural network. The network was developed from the ground up, and\
    \ the project included the creation of a basic system supervisor.\n\nIt’s crucial\
    \ to note that the goal of this work isn’t to provide a complete treatment of\
    \ the argument; rather, it’s to begin a period of exploration of these notions\
    \ and difficulties, which will need additional validation and research in future\
    \ designs.\n\n## 17.6 Automotive Applications\n\nOne of the popular trends this\
    \ decade is self-driving cars. AI that have been actually trained to drive using\
    \ machine learning techniques have shown that a computer can drive a car. However,\
    \ if these systems fail, individuals might be hurt or killed. Simultaneously,\
    \ certifying the ultra-high dependability specifications demanded is proving difficult.\
    \ Today’s modern problems with self-driving vehicle safety are reviewed in this\
    \ chapter."
