    This chapter explained the time management of distributed systems. In addition,\
    \ soft real-time and hard real-time systems were discussed, which illustrate the\
    \ reference models. In order to implement a distributed system, it is necessary\
    \ to understand this time management system. Scheduling algorithms are also an\
    \ important concept of distributed systems, so the next chapter explains dynamic\
    \ and static scheduling algorithms in the distributed system.\n\n# 10. Scheduling\
    \ in Real-Time Systems\n\nThe task state determines the milestone of a task in\
    \ a process. The default states are as follows:\n\n*   The job has been received\
    \ and is waiting to be accepted in the system.\n\n*   The task has been accepted\
    \ by the allocated user (or system). Other users and systems cannot modify or\
    \ complete the work since it is locked.\n\n*   The task has been completed.\n\n\
    *   A user has been assigned to the job. (Manual tasks only.)\n\n*   The task\
    \ attempted to generate a work order in the activation system, but was unsuccessful.\
    \ (Activation tasks only.)\n\nThese conditions must be met and cannot be changed.\
    \ To support your business processes, you can define extra states (user-defined\
    \ states). You can set a task’s state to `suspended` if it can’t be completed\
    \ on time.\n\nIn the absence of other operations, the processor executes a series\
    \ of instructions until they are completed. A task is a sequence of instances\
    \ (jobs).\n\n![../images/520777_1_En_10_Chapter/520777_1_En_10_Fig1_HTML.jpg](images/520777_1_En_10_Chapter/520777_1_En_10_Fig1_HTML.jpg)\n\
    \nFigure 10-1\n\nState even\n\nJobs that are ready are kept in a queue known as\
    \ the waiting list (`QUEUE`) . The scheduling algorithm is a method for selecting\
    \ a task to run on the CPU.\n\n## 10.1 The Concept of Scheduling\n\nThe process\
    \ is composed of the scheduling algorithm:\n\n![../images/520777_1_En_10_Chapter/520777_1_En_10_Fig2_HTML.jpg](images/520777_1_En_10_Chapter/520777_1_En_10_Fig2_HTML.jpg)\n\
    \nFigure 10-2\n\nState transition and ready queue\n\n*   **Preemptive:** Work\
    \ can be briefly paused so that a more critical task can be completed.\n\n*  \
    \ **Non-preemptive:** The task can’t be interrupted. A schedule is a list of tasks\
    \ allocated to the processor in a certain order to the processor. A processor’s\
    \ process is a set of tasks that have been allocated to them.\n\nProcesses may\
    \ need to be swapped or paged out to secondary memory in applications with severe\
    \ real-time limitations.\n\nAn operating system is said to be *multitasking* when\
    \ it runs multiple programs at the same time. It is important to distinguish between\
    \ a program intended as a “container of instructions” and a program intended as\
    \ an “in progress” entity. A running program is called a process (or task).\n\n\
    So while a *program* is a static entity that describes the actions to be performed,\
    \ a *process* is a dynamic entity that represents the execution of those actions.\
    \ The mechanism that the OS adopts to execute several processes “in parallel”\
    \ (concurrent processes) is called *time sharing* .\n\nIt consists of assigning\
    \ the CPU for a time slice called `time-slice`, which is set for each process.\
    \ When that time expires, the execution of the process is suspended and the CPU\
    \ is assigned to another process. This technique is called *preemptive multitasking*\
    \ .\n\nThe most important problem with multitasking systems is the allocation\
    \ of the resources required by the various processes. In fact, it may happen that\
    \ several processes simultaneously request a specific single resource that cannot\
    \ be shared (e.g. the printer). In this case, the process requestor is suspended\
    \ immediately and the requesting process is placed in a wait queue. Only when\
    \ the resource is released and no other process in the queue precedes it, can\
    \ it acquire the resource and resume execution.\n\nAnother problem concerns access\
    \ to peripherals. Because device I/O operations are extremely slow relative to\
    \ processor speed, a process’s request for an I/O operation causes the process\
    \ to suspend until the operation is complete (the hardware mechanism at stake\
    \ is obviously the interrupt).\n\nA process can be in one of these three states:\n\
    \n*   Running. The process has the CPU and is running (ready).\n\n*   The process\
    \ was suspended because the time expired.\n\n*   Blocked (blocked, waiting, suspended).\
    \ The process cannot advance because it needs a resource that is not yet available\
    \ or because it is waiting for I/O.\n\nManaging ready jobs is implemented by a\
    \ set of queues, each with a defined priority. Each process is assigned a priority\
    \ so that when the process goes to the ready state, it is placed in the queue\
    \ with the corresponding priority.\n\nThe process that runs is the first in the\
    \ queue. If there are no jobs waiting in it, the first job in the queue is executed,\
    \ and so on."
  trans: "\n### 9.5.3 可抢占/非可抢占调度器\n\n在可抢占调度器中，一个任务在收到更高优先级任务的请求后可以被中断。然而，只有在某些断言未被违反（参见互斥）时，才允许抢占。在非可抢占调度器中，任务在执行完成前不会被中断。\n\
    \n### 9.5.4 静态调度\n\n在静态调度中，任务的执行顺序是离线计算出来的。静态调度常见于时间触发型应用以及周期性任务中。\n\n### 9.5.5\
    \ 动态调度\n\n动态调度器根据系统的当前状态，在事件到达时决定执行哪个任务。各种动态调度算法根据其所做的假设而有所不同。\n\n### 9.5.6 独立任务调度\n\
    \n此类别假设任务之间没有任何依赖关系（例如互斥）。\n\n## 9.6 复习题\n\n1.  \"分布式实时系统（DRTS）由通过实时网络连接的独立计算节点组成。\"\
    \ 这个说法正确还是错误？\n\n2.  以下哪一项描述的是硬实时系统？\n    1.  可以经常性地错过截止时间，可能性较低。\n    2.  偶尔会错过截止时间，且有合理的可能性发生这种情况。\n\
    \    3.  由于某种不可接受的低概率，偶尔会错过截止时间。\n    4.  偶尔会错过截止时间，但概率较低。\n\n3.  以下关于*状态*的陈述，哪一项是正确的？\n\
    \    1.  状态是一种在实时时间内持续一定时间的条件。\n    2.  状态是一种持续非实时时间跨度的条件。\n    3.  状态是一种不会持续一段时间的条件。\n\
    \    4.  状态是一种不可预测地变化并持续一段时间的条件。\n\n4.  以下关于*事件*的陈述，哪一项是正确的？\n    1.  事件是发生在特定状态下的事情。\n\
    \    2.  事件是一次性的未发生事件。\n    3.  事件是一次性的发生事件。\n    4.  以上所有选项。\n\n5.  参考模型由三个部分组成：\n\
    \    1.  工作负载模型\n    2.  资源模型\n    3.  算法\n    这个说法正确还是错误？\n\n## 9.7 复习题答案\n\n\
    1.  答案：正确。分布式实时系统（DRTS）由通过实时网络连接的独立计算节点组成，并由通过实时网络连接的自洽计算节点构成。此类系统中的节点相互协作，以在规定期限内实现共同目标。\n\
    \n2.  答案：D，偶尔会错过截止时间，但概率较低。\n\n3.  答案：A，*状态*是一种在实时时间内持续一定时间的条件。\n\n4.  答案：C，*事件*是一次性的发生事件。\n\
    \n5.  答案：正确。实时系统模型的主要部分是工作负载模型、资源模型和算法。\n\n## 9.8 总结\n\n本章解释了分布式系统的时间管理。此外，还讨论了软实时系统和硬实时系统，它们阐述了参考模型。为了实现分布式系统，有必要理解这种时间管理系统。调度算法也是分布式系统的一个重要概念，因此下一章将解释分布式系统中的动态和静态调度算法。\n\
    \n# 10. 实时系统中的调度\n\n任务状态决定了任务在进程中的里程碑。默认状态如下：\n\n-   任务已接收，正在等待被系统接纳。\n-   任务已被分配的用户（或系统）接受。由于该任务已被锁定，其他用户和系统无法修改或完成该工作。\n\
    -   任务已完成。\n-   已为用户分配了该任务。（仅限于人工任务。）\n-   任务尝试在激活系统中生成工作单，但未成功。（仅限于激活任务。）\n\n\
    这些条件必须满足且不可更改。为了支持您的业务流程，您可以定义额外的状态（用户自定义状态）。如果一个任务无法按时完成，您可以将其状态设置为`suspended`。\n\
    \n在没有其他操作的情况下，处理器执行一系列指令直至完成。一个任务是一个实例（作业）的序列。\n\n![../images/520777_1_En_10_Chapter/520777_1_En_10_Fig1_HTML.jpg](img/520777_1_En_10_Fig1_HTML.jpg)\n\
    \n图 10-1 状态切换\n\n就绪的任务保存在一个称为等待列表（`QUEUE`）的队列中。调度算法是一种用于选择在 CPU 上运行的任务的方法。\n\n\
    ## 10.1 调度的概念\n\n进程由调度算法组成：\n\n![../images/520777_1_En_10_Chapter/520777_1_En_10_Fig2_HTML.jpg](img/520777_1_En_10_Fig2_HTML.jpg)\n\
    \n图 10-2 状态转换与就绪队列\n\n-   **可抢占的：** 工作可以短暂暂停，以便完成更关键的任务。\n-   **非可抢占的：** 任务不能被中断。调度表是按特定顺序分配给处理器的一组任务列表。一个处理器的进程是已分配给该处理器的一组任务。\n\
    \n对于具有严格实时限制的应用，进程可能需要换出或分页到二级存储器。\n\n当一个操作系统同时运行多个程序时，它就被称为*多任务*系统。区分作为“指令容器”的程序和作为“进行中”实体的程序非常重要。正在运行的程序称为进程（或任务）。\n\
    \n因此，虽然*程序*是描述要执行的操作的静态实体，但*进程*是代表这些操作执行的动态实体。操作系统采用来“并行”执行多个进程（并发进程）的机制称为*时间片轮转*。\n\
    \n它包括为每个进程分配一个称为`time-slice`的 CPU 时间片。当该时间到期时，该进程的执行被挂起，CPU 分配给另一个进程。这种技术称为*抢占式多任务*。\n\
    \n多任务系统最重要的问题是各种进程所需资源的分配。事实上，可能会发生多个进程同时请求一个特定的、无法共享的单一资源（例如打印机）。在这种情况下，请求资源的进程会立即被挂起，并放入等待队列。只有当资源被释放且队列中没有其他进程排在其前面时，它才能获取该资源并继续执行。\n\
    \n另一个问题涉及对外设的访问。由于设备的 I/O 操作相对于处理器速度来说极其缓慢，进程对 I/O 操作的请求会导致该进程挂起，直到操作完成（所涉及的硬件机制显然是中断）。\n\
    \n一个进程可以处于以下三种状态之一：\n\n-   运行态：该进程拥有 CPU 并且正在运行（就绪态）。\n-   挂起态：该进程因时间片到期而被挂起。\n\
    -   阻塞态：该进程因需要某个尚不可用的资源或正在等待 I/O 而无法继续执行。\n\n管理就绪任务是通过一组队列来实现的，每个队列都有定义的优先级。每个进程都被分配一个优先级，这样当进程进入就绪状态时，它就会被放入具有相应优先级的队列中。\n\
    \n正在运行的进程是最高优先级队列中的第一个。如果该队列中没有等待的任务，则执行下一个优先级队列中的第一个任务，以此类推。\n"
- fmt: "# 10.2 Types of Constraints\n\nA transition restriction prevents the data\
    \ from entering an impossible state as a result of a prior state. For example,\
    \ a person should not be able to switch from being “married” to “single, never\
    \ married.” “Divorced,” “widowed,” or “dead” are the only allowed states after\
    \ “married.”\n\n![../images/520777_1_En_10_Chapter/520777_1_En_10_Fig3_HTML.jpg](images/520777_1_En_10_Chapter/520777_1_En_10_Fig3_HTML.jpg)\n\
    \nFigure 10-3\n\nTask processor\n\nA transitional constraint is a characteristic\
    \ that governs every legitimate transition from one state of the model to its\
    \ successor state in the formal model of information security. It can be thought\
    \ of as a supplement to state criteria, which applies to states as a whole but\
    \ has no influence on transitions between them.\n\nOnce its destination address\
    \ has been written to secondary storage and it is not waiting for a particular\
    \ task, the process is executable and switchable. If a process is waiting for\
    \ a task, it is put to sleep and its whole address space is written to secondary\
    \ storage.\n\nNote the following about constraints:\n\n![../images/520777_1_En_10_Chapter/520777_1_En_10_Fig5_HTML.jpg](images/520777_1_En_10_Chapter/520777_1_En_10_Fig5_HTML.jpg)\n\
    \nFigure 10-5\n\nTasks activation\n\n![../images/520777_1_En_10_Chapter/520777_1_En_10_Fig4_HTML.jpg](images/520777_1_En_10_Chapter/520777_1_En_10_Fig4_HTML.jpg)\n\
    \nFigure 10-4\n\nReal-time tasks\n\n- Types include jitter, trigger, completeness,\
    \ and deadline.\n- They can be explicit (included in the system activities specification)\
    \ or implicit (not included in the system activities specification).\n- They impose\
    \ a logical order on the execution limits of resources.\n- They ensure that access\
    \ to mutually exclusive resources is synchronized.\n\n## 10.2.1 Independent Task\
    \ Scheduling Constraints\n\nThis category assumes that the tasks do not have any\
    \ dependencies (e.g. mutual exclusion).\n\nThe *rate monotonic algorithm* is a\
    \ dynamic algorithm with preemption based on static priorities with the following\
    \ assumptions:\n\n1. Requests for all tasks belonging to a specific task set for\
    \ which you have hard real-time constraints are periodic.\n2. All tasks are independent\
    \ (absence of mutual exclusion or dependencies).\n3. The expiration of each task\
    \ (`Ti`) corresponds with the duration of its period (`pi`).\n4. You know a priori\
    \ the maximum computation time for each task.\n5. Context switching times are\
    \ ignored.\n6. The sum of the utilization factors of the `n` tasks is limited\
    \ at the top by:\n\n![$$ \\mu =\\sum \\frac{c_i}{p_i}\\le n\\;\\left({2}^{\\frac{1}{n}}-1\\\
    right) $$](images/520777_1_En_10_Chapter/520777_1_En_10_Chapter_TeX_Equa.png)\n\
    \nWhere:\n\n`c[i]` = Computation time of the i*th* task\n\n`p[i]` = Duration of\
    \ the period of the i*th* task\n\nThe algorithm assigns priorities statically\
    \ and is based on the duration of the task period. The tasks with shorter periods\
    \ will have higher priority and those with longer periods have lower priority.\
    \ In the execution phase, therefore, the task with the shortest period will be\
    \ chosen each time.\n\nWith the *earliest-deadline-first algorithm*, the algorithm\
    \ with the earliest expiration is selected. With the *least-laxity algorithm*,\
    \ the task priority is calculated based on the difference between the deadline\
    \ and the computation time necessary for the task. The lower this value is, the\
    \ higher the priority the task is\n\n![$$ {laxity}_i={d}_i-{c}_i $$](images/520777_1_En_10_Chapter/520777_1_En_10_Chapter_TeX_Equb.png)\n\
    \n## 10.2.2 Scheduling Dependent Tasks\n\nIn this category, which is closer to\
    \ reality and therefore more interesting, we assume that the tasks have dependencies\
    \ (e.g. mutual exclusion).\n\nThe *Kernelized Monitor algorithm*, proposed by\
    \ Mok [2], allocates the processor for non-interruptible time `q` and assumes\
    \ that a critical section is executable within the time limit. The earliest policy\
    \ is used for scheduling deadlines first.\n\nThe scheduling analysis done in this\
    \ protocol requires the use of upper bounds on the times of execution of all the\
    \ critical sections that appear in the tasks. In fact, the quantity must be calibrated\
    \ on the longest executable critical section. Since these upper bounds can be\
    \ too pessimistic, using the protocol kernelized monitor can lead to low processor\
    \ utilization.\n\nThe *Priority Ceiling Protocol* is used to schedule a periodic\
    \ set of tasks that have exclusive access to one or multiple common resources\
    \ protected by traffic lights.\n\nThis protocol was created by Sha, Rajkmar, and\
    \ Lehocky in 1990 to solve the problem of *priority inversion*. This arises when\
    \ a high priority job has to wait for a higher priority job to be executed, typically\
    \ due to other resources being used by running tasks.\n\nIf there are three tasks\
    \ (`T1`, `T2`, and `T3`) with priority `p1 > p2 > p3`, all three use the resource\
    \ `R` and the algorithm for scheduling the monotonic rate type.\n\nSuppose that\
    \ `T1` and `T3` need to access the resource to which the mutex `S` is associated.\n\
    \nIf `T3` starts processing and locks (`S`) before `T1` starts, then `T1` will\
    \ be locked for an undefined time, that is, until `T3` it will not do an unlock\
    \ (`S`), freeing the resource `S`. In fact, `T1` cannot continue execution without\
    \ the resource `S` held by `T3`. In this case, `T1` is penalized in favor of `T3`\
    \ in spite of the order of priorities `p1 > p3`.\n\nIf, before `T3` unlocks (`S`),\
    \ `T2` starts, then `T3` will be suspended to allow `T2` to be processed under\
    \ the priorities `p2 > p3`. In this case, `T1` will have to wait for `T2` to stop\
    \ being processed. Indeed, `T1` is blocked on `T3`, which in turn is blocked on\
    \ `T2` in spite of the order of priorities `p1 > p2`.\n\nThe proposed algorithm\
    \ is based on the following points:\n\n- A task is allowed to enter the critical\
    \ section only if its priority is higher than the task that is currently locking\
    \ the resource.\n- When it has finished using the critical section, it releases\
    \ it, giving it the previous priority.\n\n## 10.3 Review Questions and Answers\n\
    \nTry these review questions as a test of knowledge.\n\n### 10.3.1 Review Questions\n\
    \n1. “A task is a set of events.” Is this statement correct or incorrect?\n\n\
    2. What is scheduling?\n   1. Preventive: When a current task can be put on hold\
    \ in order to finish an even more important task.\n   2. Preventive: When a running\
    \ task can be briefly paused in order to complete a more critical task.\n   3.\
    \ Preemptive: When the currently executing process can be used to temporarily\
    \ execute another task.\n   4. Preventive: When an ongoing task can be briefly\
    \ paused to complete a less critical task.\n\n3. Which of the following task statements\
    \ is correct?\n   1. Depending on the operating system, a task can be a process\
    \ or a thread.\n   2. The job must be a program or a thread, depending on the\
    \ operating system.\n   3. A task might be a process or a thread, depending on\
    \ the version.\n   4. None of the preceding.\n\n4. Which of the following claims\
    \ regarding events are true?\n   1. If the current task can’t be paused until\
    \ it’s finished, it’s non-preemptive. A schedule is a list of tasks that the processor\
    \ has been allocated.\n   2. Non-preemptive is not whether a job in progress can\
    \ be paused until it is completed. A schedule is a list of tasks that the processor\
    \ has been allocated.\n   3. Non-preemptive is when the current task can’t be\
    \ halted until it’s completed. A timetable is a set of responsibilities assigned\
    \ to a specific event.\n   4. All of these are true.\n\n5. “A task is a set of\
    \ instructions that is continually executed by the processor in the absence of\
    \ other activities.” Is this statement correct?"
