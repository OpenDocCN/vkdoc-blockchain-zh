    \ an obstacle is located in the middle of the whiteboard. The AE-1 and AE-2 environments\
    \ are shown here:\n\n```\n\n1\\. AE-1\n\nAE-1\n\nCS / Controller\nCS : 2 : 0\n\
    \nCS / Kilobot\nCS : 3 : 0\n\nObstacle\n+\nSatisfies requirement(s) :\n\n1\\.\
    \ AE-2\n\nAE-2\n\nwidth\n\n+\n\nheight\n\n+\n\nobstacle width\n\n+\n\nobstacle\
