    \n4. 答案：D，以上所有。\n\n5. 答案：正确。\n\n## 8.6 总结\n\n本章提供了两个示例来说明共识算法。这些示例是使用 Python 语言提供的。这些示例也有助于说明区块链的\
    \ PoW 系统。借助这些示例，你可以根据自己的需要构建应用程序。\n\n当你考虑区块链技术时，你需要理解分布式系统管理，因为区块链技术广泛应用于分布式系统中。本书的主要目的是在分布式系统中实现区块链。下一章将介绍分布式系统中的时间管理。\n\
    \n# 9. 实时系统\n\n分布式实时系统（DRTS）由通过实时网络连接在一起的独立计算节点组成。这些节点协同工作，在预定的时间限制内实现共同目标。出于多种原因，需要分布式实时系统。\n\
    \n任何实时计算机控制系统都必须能够实时测量事件之间的时间，并在预定的实时时间间隔内对刺激做出反应。本章讨论了在实时分布式系统中包含此实时度量的一些意义。\n\
    \n术语“实时系统”指的是受实时约束的系统，即必须保证在某个时间限制内做出响应，或者系统必须满足特定的截止时间。示例包括飞行控制系统、实时监控系统等。\n\n\
    ## 9.1 理解实时系统\n\n具有时间限制的实时系统被分为硬实时系统或软实时系统。*硬实时系统*不能错过任何截止时间。错过截止时间的后果可能是灾难性的。如果延迟增加，硬实时系统结果的效用会急剧下降，甚至可能变为负值。延迟是指实时系统完成任务与其截止时间相比的延迟程度。硬实时系统的一个例子是飞行控制器系统。\n\
    \n另一方面，*软实时系统*偶尔可以以足够低的概率错过截止时间，使其可以接受。错过截止时间没有负面后果。随着延迟增加，软实时系统结果的效用会迅速降低。电话交换机是软实时系统的一个例子。\n"
- fmt: '# 9.2 Real-Time System Reference Model


    Three components characterize this reference model:


    - **A workload model:** This identifies the applications that the system supports.

    - **A resource model:** This describes the resources that the program has access
    to.

    - **Algorithms:** They describe how the software application will use resources.


    Real-time system terms include:


    - **Job:** A tiny task that can be assigned to a processor and may or may not
    necessitate the use of resources.

    - **Task:** A collection of related jobs that work together to offer system functionality.

    - **A work''s release time job:** The point at which the job is ready to be executed.

    - **Job execution time:** This is the time it takes for a job to complete its
    execution.

    - **Job deadline:** This is the deadline by which a job must be completed. There
    are two types of deadlines: absolute and relative deadlines. (A job''s **relative
    deadline** is the maximum permissible response time. A job''s **absolute deadline**
    is the sum of its relative deadline and its release time.)

    - **Job response time:** This is the time from when the time a job is released
    to the time it is completed.

    - **Active resources:** Another name for processors, these are required for the
    successful completion of a task. In order to execute and progress toward completion,
    a job requires one or more processors. Computers and transmission links are two
    examples.

    - **Passive resources:** During the execution of a job, a resource may or may
    not be required. Memory and mutex are two examples. Also called resources. If
    two resources may be used interchangeably, they are identical; otherwise, they
    are heterogeneous.


    Figure [9-1](#520777_1_En_9_Chapter.xhtml#Fig1) depicts the key distinctions between
    hard and soft real-time systems. Hard real-time systems have response time requirements
    of milliseconds or less, which if not reached, can result in disaster. Soft real-time
    systems, on the other hand, have higher and less rigorous reaction times. Peak-load
    performance in a harsh real-time system must be expected and not breach specified
    deadlines. A degraded function at a rarely occurring peak load can be accepted
    in a soft real-time system. In all circumstances, a hard real-time system must
    remain synchronized with the state of the environment.


    ![../images/520777_1_En_9_Chapter/520777_1_En_9_Fig1_HTML.jpg](images/520777_1_En_9_Chapter/520777_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Hard real-time versus soft real-time systems


    ### 9.2.1 Fail-Safe vs. Fail-Operational Systems


    If there is a good state in the environment that can be reached in the event of
    a system failure, the system is considered fail-safe. One example is a train signaling
    system.


    High error-detection coverage is required in a fail-safe application. The application''s
    failure safety is a feature. A system must be fail-operational if the application
    does not provide for the identification of a safe state, and such systems, such
    as a flight control systems on airplanes, must remain operational in the event
    of a failure.


    ### 9.2.2 Guaranteed Timeliness vs. Best Effort Systems


    Even if there is a malfunction, the computer system must deliver a minimal level
    of service.


    ## 9.3 RT System Categorization


    On the basis of the requirements from the outside, consider these categories:


    - Soft real-time vs. hard real-time

    - Fail-safe vs. fail-operational

    - Timeliness guaranteed vs. best effort

    - Adequacy of resources

    - Time triggered vs. event triggered


    If the temporal accuracy can be proved by analytical reasoning (within the stipulated
    load- and fault-hypotheses), a system implementation guarantees assured timeliness.
    If such an intellectual case for temporal correctness cannot be presented, a system
    implementation is best effort.


    Even within the defined load- and fault assumptions, the temporal validation of
    best effort systems relies on probabilistic considerations. Guaranteed timeliness
    should be the foundation of hard real-time systems.


    ### 9.3.1 Resource Adequacy


    A system''s processing resources must be capable of managing the stated peak load
    and fault scenario if it is to deliver assured timeliness. There have been several
    applications in the past where resource adequacy was thought to be prohibitively
    expensive.


    Because hardware costs are falling, implementing resource-appropriate designs
    is becoming more cost-effective. In challenging real-time applications, resource-adequate
    designs are the only option.


    ### 9.3.2 Predictability in Rare Event Situations


    A rare event is a significant occurrence that seldomly occurs throughout the course
    of a system''s lifespan, such as a burst pipe in a nuclear reactor. A uncommon
    event can result in a slew of associated service requests (e.g., an alarm shower).


    The value of a system in a number of applications is dependent on predictable
    performance in uncommon event scenarios, such as a flight control system. Workload
    testing, in most circumstances, will not address the uncommon occurrence scenario.


    ### 9.3.3 The State and Event


    ![../images/520777_1_En_9_Chapter/520777_1_En_9_Fig2_HTML.jpg](images/520777_1_En_9_Chapter/520777_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    State event


    A *state* is a condition that lasts a specific amount of time in real time, such
    as a part of the timeline. An instantaneous occurrence is referred to as an *event*.
    See Figure [9-2](#520777_1_En_9_Chapter.xhtml#Fig2).


    State information describes the characteristics of states at the observation site
    (itself an event). The change in the qualities of the states immediately before
    and after the occurrence of the event, as well as an estimate of the moment in
    time when the event occurred, is provided by event information.


    ### 9.3.4 Time Triggered vs. Event Triggered Systems


    The control signals in a real-time system are said to be event triggered (ET)
    if they are obtained purely from the occurrence of events, such as the completion
    of a task, the reception of a message, or the incidence of an external interrupt.


    A real-time system is time triggered (TT) if the control indicators, such as message
    sending and receiving, are generated purely from the development of a (global)
    notion of time.


    ## 9.4 Temporal Requirements


    For real-time systems, the data pieces that the operator sees must be accurate
    in terms of time. The greatest real-time gap between a stimulus and a reaction
    must be determined and limited. Even though it''s a rare occurrence, the temporal
    behavior should also be predictable. See Figure [9-3](#520777_1_En_9_Chapter.xhtml#Fig3).


    ![../images/520777_1_En_9_Chapter/520777_1_En_9_Fig3_HTML.jpg](images/520777_1_En_9_Chapter/520777_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Temporal parameters associated with real-time data


    ## 9.5 Classification of the Scheduling Algorithm


    ### 9.5.1 Hard Real-Time and Soft Real-Time Scheduling


    In hard RT systems, the deadline of critical tasks must be guaranteed in advance
    in all possible ways and with anticipatable scenarios. This requires careful design
    of the system resources. If you are designing a soft real-time system instead,
    you can accept a low-cost scheduler design.


    ### 9.5.2 Dynamic and Static Schedulers


    A scheduler is called dynamic (online) if it bases its running decisions on the
    basis of current requests. Dynamic schedulers are therefore flexible and adapt
    with the evolution of the system. A scheduler is called static (pre-runtime) if
    decisions are made before its scheduler is running and cannot be changed. This
    requires a profound and complete knowledge of the task to be performed (maximum
    execution time, priorities, mutual exclusion constraints, deadlines, etc.). Such
    a scheduler has a low cost in phase execution precisely because no decision calculations
    are made.'
