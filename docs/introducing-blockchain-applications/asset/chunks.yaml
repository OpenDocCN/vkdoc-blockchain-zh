  trans: "\n### 14.4.2 避障逻辑与*两阶段提交（2PC）*协议概念\n\n为防止机器人在状态转换过程中发生碰撞，本项目采用了**两阶段提交（2PC）协议**概念来实现过渡。为实现此概念，项目为机器人引入了一种基于投票的移动模式。当某个机器人想要转换到不同状态时，它会请求进入`Ask4Bridge`模式。随后，协调器会判断是否有其他机器人也请求了相同模式。若没有，则允许其继续移动。为了防止机器人在移动过程中相互碰撞，项目还使用了\
    \ MATLAB 中提供的避障逻辑。\n\n### 14.4.3 北农场、南农场与仓库的架构\n\nMATLAB 中有一项名为*多机器人环境*的功能，用于构建不同的场地，例如北农场、南农场和仓库。在此平台上，用户可以创建“n”个机器人并追踪其移动轨迹。\n\
    \n这是 MATLAB 中 Navigation Toolbox 插件内置的一项功能。MATLAB 对多机器人环境的定义如下：“多机器人环境使您能够在二维多机器人移动机器人场景中模拟和原型化算法。”（见图\
    \ 14-7。）\n\n![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig7_HTML.jpg](img/520777_1_En_14_Fig7_HTML.jpg)\n\
    \n图 14-7\n机器人可视化器与激光雷达传感器\n\n## 14.5 实现两阶段提交协议\n\n当事务准备“提交”时，2PC 协议便开始生效。一个单一的主控系统（初始阶段为机器人\
    \ 1）会启动该协议。\n\n2PC 协议包含两个阶段，如下所示（假设在初始阶段，机器人 1 是协调器，机器人 2 和 3 是参与者）。\n\n- **阶段\
    \ 1：** 主控机器人 1 询问每个个体是否已完成其事务任务并准备好提交。每位成员给出“是”或“否”的答复。\n- **阶段 2：** 组织者统计所有答复。如果所有工作节点都回答“是”，则事务将被完成；否则将中止。主控向每个工作节点发送最终提交选择的决定，并接收响应。\n\
    \n该技术确保操作具有原子性：要么整个操作反映在系统的最终状态中，要么完全不反映。即使只有一个参与方无法提交，事务也会被取消。换句话说，每个参与方对事务拥有*否决权*。\n\
    \n![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig8_HTML.jpg](img/520777_1_En_14_Fig8_HTML.jpg)\n\
    \n图 14-8\n避障逻辑\n\n它还确保了事务的长期可行性。在步骤 1 中回答“是”之前，每个参与方都会双重检查事务的所有写入操作是否已持久化写入存储。这使得主控能够就事务做出最终决定，而无需担心投票“是”的参与者后续会失败（见图\
    \ 14-8）。\n\n### 14.5.1 需求\n\n本项目在实现互斥时满足了分布式系统并发控制的三个基本需求：\n\n- 互斥与安全性\n- 活性\n\
    - 公平性\n\n允许多个进程以互斥的方式访问共享资源或数据源，具体如下：\n\n- 分布式系统中没有可用于构建互斥和同步原语的公共变量。\n- 共享信息的唯一途径是通过数据传输。\n\
    \n这三个基本需求的满足方式如下：\n\n- **互斥与安全性：** 在任何给定时间，只有一个进程可以运行关键部分。\n- **活性：** （无死锁或无饥饿。）两个或多个参与方不应无限期等待永远不会到达的通信。\n\
    - **公平性：** 每个进程都有平等的机会完成关键部分。原则上，公平性意味着关键部分执行请求按照它们到达系统的顺序被处理。\n\n除上述需求外，我们还实现了以下需求：\n\
    \n- 系统由数量不定的相同机器人组成，它们借助激光雷达传感器和避障逻辑，通过无线连接相互通信。\n- 每个机器人都借助机器人可视化器工具遵循循环操作模式行为。\n\
    - 未获得桥接授权的机器人会等待桥接通畅，然后才借助 2PC 协议概念发出新的访问请求。\n\n系统基于一个完全分布式的算法，借助 2PC 协议概念，不存在任何集中化元素。\n\
    \n### 14.5.2 遇到的问题\n\n在实施本项目时，出现了以下问题：\n\n- 由于两阶段提交协议的阻碍特性，导致缺乏可扩展性。\n\n  两阶段提交协议最大的问题在于它是一种阻碍性协议。如果主控永久性故障，某些参与方将无法完成其操作。在一个参与者向主控提交了同意消息后，它将会停顿，直到收到提交或回滚指令。\n\
    \n- 一旦参与者确认准备好提交，它必须能够在之后提交该事务，即使其中途崩溃。这需要将检查点写入持久化存储。\n\n- 最糟糕的情况是主控本身也是一个参与者，并对协议的结果进行投票。那么，主控的崩溃可能会同时抹去它自身和一个成员，导致协议保持阻塞状态，即使只发生了一次故障。由于通信复杂度低，2PC\
    \ 仍然是一种常见的共识协议。然而，在发生故障时，如果每个节点都自愿成为恢复节点，复杂度可能会上升到`O(n²)`。\n\n尽管如此，2PC 可能因主控故障而阻塞，这是一个严重问题，会严重降低可用性。如果事务可以在任何时刻回滚，协议可以在节点超时时恢复；但如果提交决定必须被视为永久性的，那么单个故障就可能导致整个系统停滞。此外，已开发出三阶段提交协议，它以额外的消息延迟为代价，消除了\
    \ 2PC 的阻塞问题（见图 14-9）。\n\n![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig9_HTML.jpg](img/520777_1_En_14_Fig9_HTML.jpg)\n\
    \n图 14-9\n北农场、南农场与仓库的模型架构\n"
- fmt: '# 14.6 Summary


    In distributed computer systems, the committing protocols provide global atomicity.
    This ensures that transactions across a computer network do not end up on all
    nodes in the network, or on none at all if all nodes fail.


    Distributed computing is a method of collaborating on a project using networked,
    standalone computers. A central computer splits the task and delivers it to the
    client computer to finish, according to this paradigm. This approach can withstand
    single client failures, thanks to commit mechanisms.


    The drawback of the *two-phase commit protocol* is that if the coordinator fails,
    all client resources are potentially frozen indefinitely. A timeout transition
    is used in committed three-phase protocols to compensate for this shortcoming.
    A timeout transition allows resources to be released at a predetermined time if
    the coordinating computer fails.


    I’ve covered an essential protocol that may be utilized in the design of distributed
    systems in this chapter. With two phases—the commit request phase and the commit
    phase—two-phase commit methods assure atomicity. Computer coordination sends a
    request to every other client computer on the network during the commit request
    phase, then waits for a response message from each client. Step 2 is done if all
    messages are received; if there is a client error and not all messages are received,
    Step 1 is performed. All clients are notified of the disruption.


    Using `MATLAB` this way is a perfect example of a distributed system. The robots’
    movement is designed with the help of `MATLAB` tools. Two-phase commit protocol
    was used for the transaction of messages in the distributed system. This project
    is a case study of distributed mutual exclusive access to a shared resource. The
    setting was a smart farm, where a fleet of autonomous robots conducts activities
    such as soil preparation, plant watering, harvesting plant production, and so
    on.


    The next chapter covers an example of an advanced project with more features of
    a distributed system. The project is called *Platoon*.


    # 15. The Platoon Project


    This chapter explains how to develop a cyber-physical system based on a game called
    *Platoon*.


    *Platoon* was a video game released in 1987-1988 by Ocean Software, first for
    8-bit home computers and then for 16-bit ones and for the Nintendo Entertainment
    System. Inspired by the war movie *Platoon*, it is composed of levels with different
    gameplay mechanics, both in third and first person. In 1988, Sunsoft also developed
    an arcade conversion, known as *Vs. Platoon*, based on the NES and Nintendo Vs.
    Series system licensed from Nintendo. According to Wikipedia, the game features
    a few stages.^([^(12)](#fn12))


    The game consists of four levels:¹


    *   *Jungle and village:* “Through a labyrinth of horizontal scrolling environments
    connected by perpendicular passages, with two-dimensional movement and third-person
    lateral view”. The path is haunted by traps and the Viet Cong. The player controls
    one soldier at a time, but can replace the soldier at any time with one of the
    others, for example to avoid putting those already wounded at risk. They can jump
    and crouch, shoot and throw grenades, both with limited ammo. In the last part,
    the huts of the village are explored, which become temporarily transparent, in
    search of objects necessary to continue.


    *   *Guerrillas:* The game becomes a first person shooter with a minimap taking
    up half the screen. When you meet the guerrillas, who also emerge from the water
    that floods the tunnels, the movement stops and you go to check the viewfinder.
    When you enter a room, the viewfinder becomes a pointer to examine objects; in
    this way there are elements necessary to continue—supplies and traps.


    *   *Bunker:* This is a fixed screen viewfinder shooter; the image is dark and
    only the flashes of gunfire are noticeable by the enemies, unless the player temporarily
    lights the scene with a flare. Ammunition and flares are limited.


    *   *Barnes Jungle and Bunker:* A maze of fixed 2.5D third-person screens, to
    cross from the bottom to the top of the screen, avoiding obstacles and shooting
    enemies with the help of a compass. Ammo and total time are limited. The final
    boss is Barnes, to be hit with grenades.


    Each of the five platoon members can take four hits before dying. There is also
    an overall morale gauge, which decreases when innocent civilians are injured or
    hit, and is recharged by gathering food and medicine. You are defeated if morale
    drops to zero, as well as if all team members die.


    In this chapter, you learn how to implement this game with the help of Kilobots
    movements.


    ## 15.1 The Game Environment


    1. AE-1: The Kilobots will operate on a whiteboard.


    2. AE-2: An obstacle will be located in the middle of the whiteboard.


    ### 15.1.1 SoS Organization


    1. ASoS-1: The `SoS` is composed of N Kilobots.


    2. ASoS-2: The `SoS` is also composed of a controller that loads the program in
    the Kilobots memory.


    3. ASoS-3: The `SoS` platoons among the Kilobots composing the `SoS`.


    4. ASoS-4: When the `SoS` starts, the Kilobots are positioned in a straight line,
    at a distance of D cm.


    5. ASoS-5: When the `SoS` operates, the distance between Kilobots is maintained
    at approximately D cm.


    6. ASoS-6: The leader is decided before execution.


    7. ASoS-7: All the Kilobots know the leader’s ID.


    ### 15.1.2 CS-Level


    1. CCS-1: Each Kilobot has a `RUMI` to exchange messages.


    2. Each Kilobot has a `RUMI` to communicate with the controller.


    3. The controller has a `RUMI` to communicate with the Kilobots.


    4. Each Kilobot has a `RUMI` to estimate distances.


    ### 15.1.3 SOS-Level


    1. CSoS-1: Each Kilobot will use its `RUMI` to exchange information about direction,
    when it is joining the platoon, and when it is leaving the platoon.


    2. CSoS-2: When the `SoS` starts, each Kilobot notifies the adjacent follower
    it is the leader by transmitting a message.


    3. CSoS-3: Each Kilobot has a `RUPI` to estimate distance between the sender and
    the receiver using signal power.


    ### 15.1.4 Viewpoint Emergence


    1. E-1: The interaction of multiple Kilobots leads to a unique platoon.


    ### 15.1.5 Viewpoint Dynamicity


    1. D-1: The platoon allows any Kilobot to become a member.


    2. D-2: The platoon is composed of at least two Kilobots.


    3. D-3: The introduction of a Kilobot into the platoon is allowed only at its
    tail.


    4. D-4: The platoon allows only the last Kilobot to leave.


    ### 15.1.6 Viewpoint Time


    1. T-1: The Kilobot will measure time according to a local clock T-2. Timely-related
    events are triggered by message exchange.


    2. T-3: When a Kilobot starts, it will prepare motors for Mms.


    ## 15.2 The Cyber-Physical Systems


    Kilobots will assist you in putting your concept into action. Kilobots were used
    to execute platoon mobility. The Kilobot swarm is a ten-thousand-robot (1024)
    swarm that may be used to develop and test collective behavior in high-growth
    swarms.


    Every robot has the fundamental capabilities of an independent swarm robot (configurable
    controller, rudimentary movement, and local communication), but they are constructed
    with low-cost parts and built mainly by an automatic system.


    Furthermore, the system''s architecture enables a single operator to simply and
    flexibly control a large Kilobot collective, including "hands-off" coding, switching
    on, and charging all robots. This project utilizes the Kilobot swarm to examine
    collective “artificial” intelligence (e.g., sync, collectively transport, and
    identity) and to test novel ideas that relate minimum individual capabilities
    to swarm behaviors.


    This project hopes to gain new algorithmic insights into robustness, scalability,
    self-organization, and emerging collectives of restricted individuals utilizing
    a mixed theory-experiment approach.


    ## 15.3 Kilobot Source Code'
