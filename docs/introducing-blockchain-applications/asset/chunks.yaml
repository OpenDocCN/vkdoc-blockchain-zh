- fmt: "### 7.4.11 Proof-of-Elapsed Time (PoET)\n\n`PoET` is based on the principle\
    \ of evenly distributing and increasing the odds for a larger percentage of participants.\
    \ As a result, each participating node is required to wait for a specific time\
    \ to begin the next mining process. The member who has been waiting the least\
    \ amount of time is requested to propose a block.\n\nAt the same time, each node\
    \ chooses how long it will wait before entering sleep mode.\n\n### 7.4.12 Proof-of-Importance\
    \ (PoI)\n\n`PoI` is a NEM-developed variant of the `PoS` protocol that takes into\
    \ account the roles of validators. This is influenced not only by the quantity\
    \ and likelihood of their shares, but also by other factors, such as reputation,\
    \ total balance, and the number of transactions done through each specific address.\n\
    \nThe table shown in Figure [7-2](#520777_1_En_7_Chapter.xhtml#Fig2) compares\
    \ the different consensus algorithms.\n\n`![../images/520777_1_En_7_Chapter/520777_1_En_7_Fig2_HTML.jpg](images/520777_1_En_7_Chapter/520777_1_En_7_Fig2_HTML.jpg)`\n\
    \nFigure 7-2\n\nAlgorithm comparison table\n\n## 7.5 Consensus in Distributed\
    \ Systems and Blockchain Technology\n\nThe two primary forms of blockchains are\
    \ authorized, which is called authorization of blockchain. Nodes are anonymous\
    \ on the permissionless blockchain.\n\nA fork can be caused by adding a new modified\
    \ transaction block. When a valid transaction disagrees with an invalid one, a\
    \ fork occurs. The consensus algorithm's main purpose is to obtain consensus across\
    \ the nodes so that each node may agree on a true value. Nodes are not anonymous\
    \ in the authorized blockchain and are considered known entities.\n\nIn addition,\
    \ the communication paradigm, whether synchronous or asynchronous, is taken into\
    \ account when defining the consensus system. Crash errors, transient errors,\
    \ omission mistakes, security errors, software errors, Byzantine errors, time\
    \ errors, and environmental problems are all examples of errors.\n\nCrash failure\
    \ occurs when a process comes to an abrupt halt. In a synchronous context, timeout\
    \ measures will help reveal this failure, however in a non-synchronous atmosphere,\
    \ failure is difficult to recognize.\n\n- **Passage failure:** Non-inevitable\
    \ and long-lasting failures are referred to as *transient* failures. Low batteries\
    \ or a power surge might create a hardware issue. These software flaws might be\
    \ defects in internal codes that arise infrequently and go unnoticed during testing.\n\
    \n- **Reliability failure:** Reliability failures arise because of safety assaults\
    \ and impersonation. As a result, it's conceivable that data will be corrupted.\n\
    \n- **Software failure:** Software failures occur as a result of faults in design\
    \ and modeling. Other types of failures, such as crash or omission, can be caused\
    \ by this type of failure.\n\n- **Byzantine failure:** A byzantine failure is\
    \ a fault that manifests itself differently in each member of the system. It makes\
    \ it difficult for all members to establish an agreement or reach a consensus.\n\
    \nThese mistakes perplex the system, making it harder for it to accept them. A\
    \ server, for example, may seem to be down to one viewer while being functional\
    \ to another. Because of their conflicting viewpoints, both observers will be\
    \ unable to reach a consensus, and the server cannot be deemed failed.\n\n- **Temporal\
    \ failure:** Temporal failures happen when a deadline is missed. That is, accurate\
    \ results may be obtained, but they are too late to be considered useful. In real-time\
    \ systems, this category is extremely important.\n\n- **Environmental perturbations:**\
    \ If the solution is not made adaptive to changes in the environment, it will\
    \ fail. A change in the environment could cause a right result to be incorrect.\n\
    \nBlockchains are decentralized ledgers that are not administered by a central\
    \ authority. Malicious individuals could be rewarded handsomely for attempting\
    \ to cause faults. As a result, thinking about the Byzantine problem and its solutions\
    \ is important for blockchain.\n\nA Byzantine error manifests itself differently\
    \ in each member of the system. It inhibits all participants from reaching an\
    \ agreement or forming a consensus. These errors perplex the system, making it\
    \ difficult for it to accept the errors.\n\n## 7.6 Review Questions\n\n1.  \"\
    Consensus is a fundamental concept in distributed systems, but it is unique to\
    \ blockchain.\" Is this statement correct or incorrect?\n\n2.  Which statement\
    \ is true?\n    1.  A consensus algorithm is a method that allows companies or\
    \ machines to cooperate in a dispersed setting.\n    2.  A consensus algorithm\
    \ is a method that prevents users or machines from cooperating in a distributed\
    \ environment.\n    3.  A consensus algorithm prevents users or machines from\
    \ cooperating in a distributed environment.\n    4.  You can show equivalence\
    \ relations using a consensus procedure, which is a mechanism.\n\n3.  Which of\
    \ the following statements about the concept of Proof of Work is correct?\n  \
    \  1.  `PoW` systems allow players who know a secret, usually a public key, to\
    \ perform faster computations.\n    2.  `PoW` systems allow players who know a\
