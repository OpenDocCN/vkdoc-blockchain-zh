    a proof of work for mining the block. The goal is to have four leading zeros in
    the resultant hash. (See Listing [16-1](#520777_1_En_16_Chapter.xhtml#PC2).)


    It has the following functions and methods:


    ```

    # add transactions

    # adding the node

    # replacing the chain with the longest chain

    ```


    In addition to these methods, it has the `POST` and `GET` methods for managing
    blocks in the chain.'
