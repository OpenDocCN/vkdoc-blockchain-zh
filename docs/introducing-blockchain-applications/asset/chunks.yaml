    \ candidate. The function call is a transaction, since it alters the status of\
    \ the voting app (through its function `castVote()`) and requires a digital signature\
    \ that is generated on the spot. See Figure [4-28](#520777_1_En_4_Chapter.xhtml#Fig28).\n\
    \n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig28_HTML.png](images/520777_1_En_4_Chapter/520777_1_En_4_Fig28_HTML.png)\n\
    \nFigure 4-28\n\nBlockchain dapps\n\nThe voting transaction is validated by the\
    \ local Ethereum node from which it is been submitted. Validation involves checking\
    \ various things:\n\n*   The structure and syntax is well defined.\n\n*   The\
    \ digital signature is consistent with the sender’s address and the content of\
    \ the transaction.\n\n*   The nonce value of the transaction must be valid. Remember\
    \ that the nonce of an account is the count of computations or the transactions\
    \ sent by that account ledger or bill. To be valid, the nonce of a transaction\
    \ should match the nonce of the sender’s user account.\n\n*   The sender has enough\
    \ ether to process the transaction.\n\n*   The data sent will not cause the `castVote()`\
    \ function to fail.\n\nSo, if the validation is successful, the current node broadcasts\
    \ the transaction to all its neighboring peer nodes. If the validation is not\
    \ successful, the transaction is not transmitted and simply disappears. Then,\
    \ the transaction is transmitted over the network through the various complete\
    \ nodes, which in turn go through the previous validation process.\n\nThen the\
    \ transaction, spreading through the network, reaches the miner nodes. Each miner\
    \ node, based on the transactions it receives, has its own transaction pool to\
    \ add to the ledger. (See Figure [4-29](#520777_1_En_4_Chapter.xhtml#Fig29).)\n\
    \n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig29_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig29_HTML.jpg)\n\
    \nFigure 4-29\n\nMemPool\n\nThe miner node then chooses the transactions to include\
    \ in the candidate block.\n\nHence, let’s consider that n is the number of transactions\
    \ and let `APPLI (S; TX)` be the function of state transition defined earlier.\n\
    \nLet `S [0]` be the state at the end of the last block.\n\n*For i = 0; 1; ...\
    \ n–1 S (i+1) = APP (S (i); TX (i))*\n\nIf no application of the transition function\
    \ returns an error, then they are valid and could be added to the block, otherwise\
    \ it will discard those that are invalid.\n\nThen to `S [n]` the miner adds the\
    \ rewards obtained and defines the final state of the block. Then the miner will\
    \ build the block, solve the algorithm of consensus and propagate it on the network\
    \ to be added to the blockchain. Once the voting transaction is performed during\
    \ validation of the block, the smart contract will publish the `VoteConfirmation()`\
    \ event.\n\nThis will be received from the voter’s web user interface, on which\
    \ you are registered to hear that event.\n\nThe `Vote Confirmation()` event will\
    \ then be handled by the interface’s JavaScript web user, and a message will appear\
    \ on the screen so that the user knows that the vote was successful.\n\nFigure\
    \ [4-30](#520777_1_En_4_Chapter.xhtml#Fig30) shows the lifecycle of the transaction,\
    \ from the origin to the confirmation event.\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig30_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig30_HTML.jpg)\n\
    \nFigure 4-30\n\nTransaction pool system\n\n## 4.9 Transaction State\n\nA transaction\
    \ proceeds through a series of states until it is not confirmed in a block added\
    \ to the ledger. (See Figure [4-31](#520777_1_En_4_Chapter.xhtml#Fig31).)\n\n\
    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig31_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig31_HTML.jpg)\n\
    \nFigure 4-31\n\nTransaction state\n\nLet’s analyze these states one by one:\n\
    \n*   **Unknown:** A transaction that was neither viewed nor processed by the\
    \ network.\n\n*   **Pending:** A transaction that is in the pending state and\
    \ is waiting to be chosen and elaborated by the miners. It’s in the so-called\
    \ transaction pool.\n\n*   **In block:** A transaction moves into the block state\
    \ when a miner has correctly selected the transaction and extracted it in a block.\
    \ Once in the block, a transaction can roll back to the pending status if the\
    \ block is forked.\n\n*   **Replaced:** A transaction can go to the replaced state\
    \ from the pending state when one of these events occurs:\n    *   Another transaction\
    \ from the same sender with the nonce itself enters the state of in block.\n\n\
    \    *   Another transaction from the same sender with the same nonce with a higher\
    \ gas price enters the state pending.\n\nSo, let’s see the state *transitions*\
    \ of the transactions.\n\n*   **Pooling:** A transition from the unknown state\
    \ to the pending state. It concerns the transactions that enter the transaction\
    \ pool of somebody. They are therefore waiting to be selected to train a candidate\
    \ block.\n\n*   **Mined:** A mined transaction was processed by a miner, creating\
    \ a block. Once he checked out a transaction, he entered the status in block.\
    \ Due to the *peer-to-peer* nature of the Ethereum network, from the perspective\
    \ of some node, the transaction can shift from the *unknown* state directly to\
    \ the in-block state without going through the pending state.\n\n*   **Replaced:**\
    \ A transaction that moves from the pending state to replaced it is said to have\
    \ been replaced. This happens when:\n    *   Another transaction from the same\
    \ sender with the nonce itself enters the in-block state.\n\n    *   Another transaction\
    \ from the sender state with the same nonce but with a higher gas price enters\
    \ the pending status.\n\n*   **Forked:** This happens when a block transaction\
    \ is part of a block that is inverted by the network. All transactions within\
    \ that block will pass from the in-block state to the state pending*.*\n\n*  \
    \ **Confirmed:** A transaction in block status is confirmed whenever a new block\
    \ is extracted and added to the chain."
  trans: "\n# 4.8 以太坊区块链中的交易流程\n\n本节讨论以太坊区块链中的交易生命周期。我们以一笔调用智能合约函数的交易为例——该示例有效且适用于任何类型的交易。假设你希望通过一个部署在以太坊网络上的去中心化应用进行选举投票。图\
    \ 4-27 展示了该应用的图形界面，你通过安装了用于管理以太坊账户插件的浏览器访问该界面。\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig27_HTML.jpg](img/520777_1_En_4_Fig27_HTML.jpg)\n\
    \n图 4-27\n\n调用智能合约函数的交易\n\n该应用为我们提供了一个选举列表，我们选择自己有权投票的那一项。\n\n我们点击的投票功能是一个通过名为\
    \ `Web3.js` 的以太坊通信库由 JavaScript 处理的事件。该事件连接到以太坊网络的一个节点，创建一个投票智能合约代理的实例，并调用其 `castVote()`\
    \ 函数，传入选定的候选人。这个函数调用是一笔交易，因为它会改变投票应用的状态（通过其 `castVote()` 函数），并且需要现场生成数字签名。参见图\
    \ 4-28。\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig28_HTML.png](img/520777_1_En_4_Fig28_HTML.png)\n\
    \n图 4-28\n\n区块链去中心化应用\n\n这笔投票交易由提交它的本地以太坊节点进行验证。验证涉及检查以下事项：\n\n- 结构和语法格式正确。\n\
    - 数字签名与发送者地址及交易内容一致。\n- 交易的 nonce 值必须有效。请记住，账户的 nonce 是该账户账簿或账单发送的计算次数或交易计数。要成为有效交易，交易的\
    \ nonce 应与发送者用户账户的 nonce 匹配。\n- 发送者拥有足够的以太币来处理交易。\n- 发送的数据不会导致 `castVote()` 函数执行失败。\n\
    \n因此，如果验证成功，当前节点会将交易广播到其所有邻近的对等节点。如果验证失败，交易不会被传输，而是直接消失。随后，交易通过各个完整节点在网络中传输，这些节点会依次执行前述验证过程。\n\
    \n然后，交易通过网络传播，到达矿工节点。每个矿工节点根据其收到的交易，拥有自己的交易池，用于添加到账本中。（参见图 4-29。）\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig29_HTML.jpg](img/520777_1_En_4_Fig29_HTML.jpg)\n\
    \n图 4-29\n\n内存池\n\n矿工节点随后选择要包含在候选区块中的交易。\n\n因此，我们假设 `n` 是交易数量，并令 `APPLI (S; TX)`\
    \ 为之前定义的状态转换函数。\n\n令 `S [0]` 为上一个区块结束时的状态。\n\n*对于 i = 0; 1; ... n–1，S (i+1) =\
    \ APP (S (i); TX (i))*\n\n如果状态转换函数的每次应用都没有返回错误，则交易有效并可被添加到区块中，否则将丢弃无效交易。\n\n然后，矿工将获得的奖励增加到\
    \ `S [n]` 中，并定义区块的最终状态。接着矿工构建区块，解决共识算法，并将区块传播到网络中以供添加到区块链。一旦投票交易在区块验证过程中被执行，智能合约将发布\
    \ `VoteConfirmation()` 事件。\n\n该事件将被投票者的网络用户界面接收，你已在该界面上注册以监听该事件。\n\n随后，`VoteConfirmation()`\
    \ 事件将由界面的 JavaScript 网络用户进行处理，屏幕上会显示一条消息，告知用户投票成功。\n\n图 4-30 展示了交易的整个生命周期，从发起到确认事件。\n\
    \n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig30_HTML.jpg](img/520777_1_En_4_Fig30_HTML.jpg)\n\
    \n图 4-30\n\n交易池系统\n\n## 4.9 交易状态\n\n一笔交易会经历一系列状态，直到它被确认并添加到账本的区块中。（参见图 4-31。）\n\
    \n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig31_HTML.jpg](img/520777_1_En_4_Fig31_HTML.jpg)\n\
    \n图 4-31\n\n交易状态\n\n我们来逐一分析这些状态：\n\n- **未知：** 网络既未查看也未处理的交易。\n- **待定：** 处于待定状态，等待被矿工选择和处理。它位于所谓的交易池中。\n\
    - **已入块：** 当矿工正确选择交易并将其提取到区块中时，交易进入已入块状态。一旦进入区块，如果该区块发生分叉，交易可以回滚至待定状态。\n- **已替换：**\
    \ 当发生以下事件之一时，交易可以从待定状态进入已替换状态：\n  - 来自同一发送者且具有相同 nonce 的另一笔交易进入已入块状态。\n  - 来自同一发送者、具有相同\
    \ nonce 但 gas 价格更高的另一笔交易进入待定状态。\n\n那么，让我们看看交易的 *状态转换*。\n\n- **入池：** 从未知状态到待定状态的转换。这涉及进入某个节点交易池的交易。它们因此等待被选中以组成候选区块。\n\
    - **已挖出：** 已挖出的交易已被矿工处理，创建了一个区块。一旦矿工签出交易，它便进入已入块状态。由于以太坊网络的*点对点*特性，从某些节点的角度来看，交易可以直接从未知状态转换到已入块状态，而无需经过待定状态。\n\
    - **已替换：** 从待定状态转换到已替换状态被称为已替换。这发生在以下情况：\n  - 来自同一发送者且具有相同 nonce 的另一笔交易进入已入块状态。\n\
    \  - 来自同一发送者、具有相同 nonce 但 gas 价格更高的另一笔交易进入待定状态。\n- **已分叉：** 当区块交易所在的区块被网络逆转时，会发生此情况。该区块内的所有交易将从已入块状态转换到待定状态。\n\
    - **已确认：** 每当新区块被提取并添加到链中时，处于已入块状态的交易即被确认。\n"
- fmt: "# 4.10 Block Structure\n\nOne block of the Ethereum blockchain is divided\
    \ into the following:\n\n- Block header\n- List of ommer block headers\n- Block\
    \ data\n\nThe headers of the ommer blocks are in the same format as reported.\
    \ (See Figure [4-32](#520777_1_En_4_Chapter.xhtml#Fig32).)\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig32_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig32_HTML.jpg)\n\
    \nFigure 4-32 Block structure\n\nThe list of ommer block headers is indicated\
    \ with `B[U]`, while the list of transactions is indicated with `B[T]`. So, formally,\
    \ we refer to block `B` as follows:\n\n`B = (B[H]; B[T]; B[U])`\n\nRemember that\
    \ every tree in Ethereum is a Modified Merkle Patricia trie, which is extensively\
    \ covered in the World State section.\n\nThe approach may seem very inefficient\
    \ at first look, since the entire state must be captured at each block, but in\
    \ fact only a low part of the shaft needs to be changed after each block. Since\
    \ all the state information is a part of the final block, there is no need to\
    \ record the full history of the blockchain.\n\nIn general, most of the tree between\
    \ two adjacent blocks is the same, and therefore only one piece of information\
    \ can be recorded once and referenced twice with hash pointers. Also, it is worth\
    \ adding that the code execution process of the smart contract is generated by\
    \ a transaction that is executed via the state computation or transition function.\n\
    \nIn view of the block validation algorithm, if the computations or transactions\
    \ are added to the block called `X`, the execution of the code generated by this\
    \ transaction will be performed by all the nodes of the network, validating and\
    \ adding the `X` block.\n\nFigure [4-33](#520777_1_En_4_Chapter.xhtml#Fig33) summarizes\
    \ these Ethereum blocks.\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig33_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig33_HTML.jpg)\n\
    \nFigure 4-33 Block structure in Ethereum\n\n## 4.10.1 Transaction Receipts\n\n\
    Each transaction, when executed and validated, changes the status of the blockchain.\
    \ Therefore, every valid transaction has an outcome. Transaction receipts record\
    \ the result of each transaction. Each computation or transaction receipt is a\
    \ tuple consisting of four elements:\n\n- `Ru`: The cumulative gas\n- `Rl`: The\
    \ set of registers developed through the execution of the transactions\n- `Rb`:\
    \ The Bloom filter composed of information in those registers\n- `Rz`: The post-transaction\
    \ status\n\nTherefore, the transaction receipt is defined as follows:\n\n`R =\
    \ (R[u]; R[b]; R[l]; R[z])`\n\n## 4.10.2 Ommer Blocks\n\nThe block processing\
    \ times are much lower in Ethereum compared to those of Bitcoin. On the one hand,\
    \ this allows for faster processing of transactions, on the other hand, several\
    \ miners simultaneously resolve more blocks. These concurrent blocks are called\
    \ ommer blocks.\n\nThe ommer blocks do not enter the main chain. However, the\
    \ goal to integrate these blocks into the main blocks that have been awarded the\
    \ place in the main blockchain is to help reward the miner for these blocks.\n\
    \nIn order for a miner to be rewarded for an ommer block, it must be valid. So,\
    \ the purpose of ommers is to reward miners who do well, as well as award orphan\
    \ blocks.\n\nThis has a double effect:\n\n1. **Feeds the decentralization of the\
    \ network.** In fact, even rewarding miners who mine orphaned blocks due to:\n\
    \   - Greater network latency, which causes delays in data propagation\n   - Less\
    \ computing power, which leads to greater difficulty to extract a block\n    \
    \ - Reduces centralization and avoids pools of miners with greater computing power\
    \ claiming most of the rewards without leaving anything to individual miners.\n\
    \n2. **Increases the safety of the chain by increasing the amount of work on the\
    \ main chain.** So less work gets wasted.\n\nThe block that wins the place in\
    \ the main chain is, generally, the one that has the largest share of proof of\
    \ work. While the ommer blocks are those that usually share less than this test.\
    \ Each block can have at most two ommer blocks.\n\n## 4.11 Ethereum Simplified\
    \ Ghost\n\nThe aim behind the GHOST protocol is to propose one solution for blockchains\
    \ that had very fast block processing. In fact, chains with very fast confirmation\
    \ times are affected by a “reduced” security as the work done by the miners mine\
    \ blocks that spread more slowly in the network.\n\nBasically, the solution is\
    \ to include latent blocks in the computation of the main blockchain.\n\nAlso,\
    \ blockchains that produce fast blocks strongly run the risk of centralizing toward\
    \ a mining pool, which has a high percentage of hash power on the network, arriving\
    \ thus to control the mining process.\n\nTo avoid this situation, Ethereum has\
    \ adopted a “simplified” version of the GHOST protocol that’s able to overcome\
    \ both problems that plague blockchains that process blocks quickly.\n\nThe solution\
    \ adopted by Ethereum is to provide a reduced reward for latent blocks. Not only\
    \ that, but they also provide a reward for grandchildren blocks that include latent\
    \ blocks.\n\nThe simplified version of Ethereum’s GHOST protocol is defined like\
    \ this:\n\n- A block must specify a previous block, and 0, 1 or 2 ommer blocks.\n\
    - An ommer block included in a block should have these properties:\n  - It must\
    \ be direct child of the k-generation parent of `B`, with `k` between two and\
    \ seven.\n  - So, it should not be a progenitor of `B`.\n  - It should be a valid\
    \ block.\n  - The ommer block should be varied from all included ommers in the\
    \ last blocks and by all the other ommers included in the same block.\n\nThere\
    \ are two reasons that ommers can be included in up to seven generations:\n\n\
    - A GHOST with no generation limits would bring complications in calculating which\
    \ ommers are valid for a certain block.\n- An unlimited GHOST, moreover, as implemented\
    \ in Ethereum, would eliminate the incentive of miners to mine the main chain,\
    \ and not that of an attacker."
