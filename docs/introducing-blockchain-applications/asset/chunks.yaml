  trans: "\n### 阶段 2：交易被排序并打包成区块\n\n交易工作流程继续进行到打包阶段。由于付款方接收包含各应用已接受结算提议回复的交易，并将其整理成片段，因此付款方在此过程中至关重要。\n\
    \n除此之外，授权官员负责收集拟议的交易变更，对其进行排序，并将它们打包成区块分发给对等节点。（见图 6-10。）\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig10_HTML.jpg](img/520777_1_En_6_Fig10_HTML.jpg)\n\
    \n**图 6-10**  \n排序交易\n\n阶段 3 从计算机将区块分发给与其连接的所有对等节点开始。当新区块生成时，对等节点会通过通道与排序节点相连，从而将新区块的副本分发给所有与发起节点相连的对等节点。每个对等节点会单独处理该区块，但处理方式与通道上所有其他对等节点相同。图\
    \ 6-11 展示了如何以此种方式保持账本恒定。同样值得注意的是，并非所有对等节点都需要连接到计算机：对等节点可以通过八卦协议级联连接到其他对等节点。\n\n\
    ![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig11_HTML.jpg](img/520777_1_En_6_Fig11_HTML.jpg)\n\
    \n**图 6-11**  \n验证与最终确定\n\n当对等节点收到一个区块时，它会按区块中交易出现的顺序处理每一笔交易。对于每笔交易，每个对等节点都会检查该交易是否已根据启动交易的链码的认可规则，获得了所请求组织的授权。（见图\
    \ 6-11。）\n\n例如，有些交易可能只需要一个组织的许可，而其他交易则可能需要多次批准才能被认定为有效。\n\n这一验证过程确保了所有相关企业都产生了相同的结果。此验证不同于阶段\
    \ 1 中的批准检查，在阶段 1 中，应用程序从其授权的对等节点接收回复，并决定是否发送拟议的交易。如果应用程序通过提交错误交易违反了批准规则，那么对等节点仍然可能在阶段\
    \ 3（验证阶段）拒绝该交易。\n\n如果交易已被正确接受，对等节点将尝试在区块链上执行它。为此，对等节点必须进行账本一致性检查，以确认账本主副本的当前状态与创建拟议更新时的账本状态一致。\n\
    \n即使交易已获得完全批准，这也并非总是可行的。例如，账本中相同资源的另一笔交易可能已被修改，以至于该交易更新不再适用，因此无法实施。由于通道内的所有对等节点都遵循相同的交易验证标准，因此账本得以保持恒定。\n\
    \n## 账本\n\nHyperledger Fabric 的 IA 账本由两个独立但相互关联的部分组成：区块链和全局状态。（见图 6-12。）\n\n两者都代表一组业务对象的信息集合。\n\
    \n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig12_HTML.jpg](img/520777_1_En_6_Fig12_HTML.jpg)\n\
    \n**图 6-12**  \n账本\n\n首先是区块链的使用。交易日志记录了所有导致世界当前状态的事件。交易被收集到添加到区块链的区块中，这使您可以查看导致当前状态的事件路径。由于区块链一旦写入就不可更改，其数据结构与世界状态的数据结构有很大不同。\n\
    \n其次，存在一个全局状态。业务对象状态集合的当前值存储在一个数据库中。程序无需遍历整个交易寄存器来计算状态的当前值，而是可以直接通过世界状态访问它。默认情况下，账本状态表示为键值对。状态可以被创建、更新和删除，因此世界状态可以频繁更改。\n\
    \n因此，全局状态是从区块链的子集生成的。\n\n### 区块链\n\n区块链记录了导致资产当前状态的事件。\n\n与使用数据库的状态不同，区块链始终以文件形式实现。（见图\
    \ 6-13。）\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig13_HTML.jpg](img/520777_1_En_6_Fig13_HTML.jpg)\n\
    \n**图 6-13**  \n带有数据库的账本\n\n账本的创世区块中包含一条提供通道初始网络状态的配置交易。区块结构是标准的，如你在“区块链基础”中所见。\n\
    \n### 交易\n\n另一方面，交易的结构很有意思。其设计如图 6-14 所示。\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig14_HTML.jpg](img/520777_1_En_6_Fig14_HTML.jpg)\n\
    \n**图 6-14**  \n带有交易的账本\n\n在此示例中，你可以看到以下字段：\n\n*   **头：** 包含一些关键的交易元数据，例如交易的链码名称和版本。\n\
    *   **签名：** 由应用客户端生成的数字签名提供。此功能用于验证交易信息未被篡改，因为创建它需要应用的私钥。\n*   **提案：** 将应用的输入参数编码到生成拟议账本更新的链码中。\n\
    \n    当链码被执行时，此提案提供一组输入变量，这些变量与当前世界状态相结合，生成新的世界状态。\n\n*   **响应：** 包含世界状态的前后值。这是智能合约的结果，如果交易被正确验证，它将被添加到账本中以更新全局系统。\n\
    *   **认可：** 这是一个所有批准的交易答案的列表，必须符合每个公司的批准策略。如果足够多的签署人签署了一笔交易，全局状态将不会发生变化。\n\n###\
    \ 世界状态\n\n*世界状态* 将业务对象属性的主要值反映为单一账本状态。大多数应用程序需要对象的当前值；测量整个区块链上某个物品的实际价值会很繁琐；相反，你可以直接从全局状态获取它。（见图\
    \ 6-15。）\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig15_HTML.jpg](img/520777_1_En_6_Fig15_HTML.jpg)\n\
    \n**图 6-15**  \n状态\n\n数据库跟踪世界的当前状态。这是可以理解的，因为数据库提供了广泛的归档操作符以及快速的状态恢复。\n\n对于全局状态数据库，有两个选项：`LevelDB`\
    \ 和 `CouchDB`。每个链码都有自己的全局状态，该状态与所有其他链码的状态不同。这意味着世界状态存储在命名空间中，只有来自同一链码的智能合约才能访问该命名空间。因此，一个链码无法看到另一个链码的世界状态。\n"
- fmt: '# 6.12 Ordering Service Implementations


    The ordering service in the latest version of Hyperledger Fabric is a crash fault-tolerant
    provider. It''s called *Raft*.


    The “leader and follower” paradigm is used by Raft, in which the ordering nodes
    of a channel dynamically elect a leader, who then duplicates messages to the channel’s
    follower nodes. Raft is crash fault-tolerant because it can withstand the loss
    of some nodes, such as leader nodes, as long as the bulk of the ordered nodes
    are still operational (CFT).


    ## 6.13 Summary


    This chapter discussed Hyperledger Fabric in detail. It started with Hyperledger
    Fabric features and then deepened your understanding of Hyperledger Fabric. The
    hyperledger concept is important for the following reasons:


    - Permissioned blockchain

    - Good performance and low transaction latency

    - Modular and configurable according to your needs

    - Database abstraction to speed up interactions with the World State

    - Ability to create different channels and therefore ledgers

    - Ability to develop applications and chaincode in different languages programming


    There are no particular drawbacks to this platform. When discussing hyperledger,
    you must also consider the distributed system and how the hyperledger can be used
    in a distributed system. That’s where the concept of a consensus algorithm comes
    in. The next chapter focuses on the consensus algorithm in a distributed environment.


    # 7. Consensus Algorithms for Blockchains


    A *consensus algorithm* is a mechanism that enables humans or machines to cooperate
    in a distributed setting. Even if some agents fail, the system must be able to
    agree on a common source of truth for all agents. To put it another way, the system
    must be tolerant to failures.


    In a centralized design, the system is controlled by a single entity. That system
    can make adjustments in most circumstances because there isn’t a complicated governance
    mechanism in place to obtain consensus among multiple administrators.


    It’s a different story with a decentralized setup. Say you’re working with a distributed
    database; how do you decide which entries to add?


    The most crucial development that opened the way for blockchains was overcoming
    this difficulty in an environment where strangers do not trust one other. This
    chapter looks at how consensus algorithms are crucial to the operation of cryptocurrencies
    and distributed ledgers.


    ## 7.1 Consensus Algorithms and Cryptocurrency


    The blockchain is a database that stores the balances of cryptocurrency users.
    It’s critical that everyone (or, more precisely, every node) have a duplicate
    of the database. Otherwise, you’ll soon find yourself with contradictory information,
    undermining the cryptocurrency network’s very purpose.


    Users can’t spend each other’s currencies, thanks to public-key cryptography.
    However, network participants must still rely on a single source of truth in order
    to ascertain whether funds have been spent.


    To coordinate participation, Satoshi Nakamoto, the creator of Bitcoin, suggested
    a Proof of Work method. We’ll delve into how PoW works later; for now, we’ll look
    at some of the common characteristics of the various consensus algorithms.


    To begin, you need people who want to contribute blocks (referred to as *validators*)
    to provide a stake. The stake is a monetary amount that a validator must present,
    which deters them from acting dishonestly. They will lose their stake if they
    cheat. Computing power, cryptocurrency, and even reputation are examples.


    Why would they jeopardize their own assets? There is a monetary incentive. This
    is typically comprised of fees paid by other users, freshly minted cryptocurrency
    units, or both, and is typically comprised of the protocol’s native cryptocurrency.


    Transparency is the last thing you need. You must be able to recognize when someone
    is lying. It should be expensive for them to create blocks, but inexpensive for
    anyone to validate them. This guarantees that regular users keep validators in
    check.


    Individual members of a group make and support the best option for the group as
    a whole using consensus algorithms. It is a decision-making system in which individuals
    must support the overall choice regardless of whether they agree with it.


    Simply put, it’s a method for a group of people to make decisions. As an example,
    consider a team of 10 people who want to choose a project that will benefit all
    of them. Each of them can make a suggestion, but most will opt for the one that
    will best benefit them. Others will be affected by this decision, whether they
    agree with it or not.


    Consider doing that with tens of thousands of participants. Isn’t it going to
    make things a lot harder?


    Consensus algorithms agree not just with the popular vote, but also with a solution
    that benefits everyone. As a result, the network is always victorious.


    Consensus models on the blockchain are ways to establish equity and fairness in
    the online world. A *consensus theorem* is the name given to the consensus mechanisms
    that were utilized to get this agreement.


    ## 7.2 Objectives of Consensus Models


    These blockchain consensus models have a number of specific goals, including:


    - **Reaching an agreement:** As much as possible, the mechanism collects all of
    the group’s agreements.

    - **Collaboration:** Each party aims for a more favorable agreement that benefits
    the entire group.

    - **Collaboration:** Everybody works as a group, putting their individual goals
    aside.

    - **Equal rights:** Each voter has the same value in the voting process and each
    person’s vote is important.

    - **Involvement:** The voting must be done by everyone in the network. No one
    will be left out, and no one will be able to abstain from voting.


    ## 7.3 Different Types of Consensus Algorithms


    Another very difficult aspect of Byzantine is reaching an agreement. Nodes will
    be unable to reach a compromise or have a greater difficulty value if even one
    defect occurs.


    With consensus algorithms, you do not have to deal with this issue. Their major
    purpose is to achieve a given aim by any means necessary. The Byzantine consensus
    structure is substantially less trustable than the blockchain consensus models.


    Because of this, in a distributed system with potentially contradicting outputs,
    it’s good to employ consensus techniques for a greater or higher result.


    A consensus algorithm is a computer engineering method that allows dispersed processes
    or systems to agree on a *single data value*. Consensus methods are used in networks
    with numerous faulty nodes to ensure dependability. In distributed computing and
    multi-agent systems, resolving this issue, known as the *consensus problem*, is
    critical.


    Consensus algorithms must assume that certain processes and systems will be unavailable
    and that some communications will be lost, in order to handle this reality. Consensus
    methods must be fault-tolerant as a result.


    Consensus methods are used in networks with numerous faulty nodes to ensure dependability.
    They must ensure that the system’s agents can agree on a single source of truth.


    ## 7.4 Types of Blockchain Consensus Algorithms


    There are a number of blockchain consensus algorithms with varying features (see
    Figure 7-1). The following sections cover many of them.'
