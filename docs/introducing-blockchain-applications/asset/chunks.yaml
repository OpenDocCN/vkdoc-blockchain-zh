  trans: "\n### 7.4.11 消逝时间证明（PoET）\n\n`PoET` 基于均匀分布并提高更大比例参与者获胜几率的原理。因此，每个参与节点都需要等待一个特定时间才能开始下一轮挖矿过程。等待时间最短的成员将被请求提议一个区块。\n\
    \n同时，每个节点自行选择进入休眠模式前的等待时长。\n\n### 7.4.12 重要性证明（PoI）\n\n`PoI` 是 NEM 开发的`PoS`协议变体，考虑了验证者的角色。这不仅受其持有份额的数量和可能性影响，还受其他因素影响，例如声誉、总余额以及通过每个特定地址完成的交易数量。\n\
    \n图 7-2 中的表格比较了不同的共识算法。\n\n`![../images/520777_1_En_7_Chapter/520777_1_En_7_Fig2_HTML.jpg](img/520777_1_En_7_Fig2_HTML.jpg)`\n\
    \n图 7-2\n\n算法对比表\n\n## 7.5 分布式系统与区块链技术中的共识\n\n区块链的两种主要形式是许可链，也称为授权区块链。在无许可链中，节点是匿名的。\n\
    \n添加一个新的经过修改的交易区块可能会导致分叉。当一个有效交易与一个无效交易不一致时，就会发生分叉。共识算法的主要目的是在节点间达成共识，以便每个节点能就一个真实值达成一致。在授权区块链中，节点不是匿名的，而是被视为已知实体。\n\
    \n此外，在定义共识系统时，需要考虑通信范式是同步的还是异步的。崩溃错误、瞬态错误、遗漏错误、安全错误、软件错误、拜占庭错误、时间错误和环境问题都是错误的例子。\n\
    \n当进程突然停止时，就会发生崩溃故障。在同步环境中，超时机制有助于发现这种故障，但在非同步环境中，故障很难被识别。\n\n- **延续失败：** 非必然且持久的失败被称为*瞬态*失败。电池电量低或电涌可能导致硬件问题。这些软件缺陷可能是内部代码中的缺陷，这些缺陷很少出现，且在测试时未被发现。\n\
    \n- **可靠性失败：** 可靠性失败是由于安全攻击和身份冒充造成的。因此，数据有可能被损坏。\n\n- **软件失败：** 软件失败是由于设计和建模中的错误导致的。这种失败可能导致其他类型的失败，例如崩溃或遗漏。\n\
    \n- **拜占庭失败：** 拜占庭失败是一种在系统每个成员身上表现各异的故障。它使得所有成员难以达成一致意见或共识。\n\n这些错误使系统感到困惑，使其更难接受它们。例如，一个服务器在一个观察者看来可能已宕机，而在另一个观察者看来却运行正常。由于他们观点冲突，两个观察者将无法达成共识，并且该服务器不能被认定为失效。\n\
    \n- **时间失败：** 当错过截止时间时，就会发生时间失败。也就是说，可能得到了正确的结果，但为时已晚，已不再有用。在实时系统中，这类失败极其重要。\n\
    \n- **环境扰动：** 如果解决方案不能适应环境变化，它就会失败。环境的变化可能导致一个正确的结果变得不正确。\n\n区块链是由去中心化账本构成的，不受中央机构管理。恶意行为者可能因试图引发故障而获得丰厚回报。因此，思考拜占庭问题及其解决方案对区块链至关重要。\n\
    \n拜占庭错误在系统的每个成员中表现各异。它阻止所有参与者达成一致或形成共识。这些错误使系统感到困惑，使其难以接受这些错误。\n\n## 7.6 复习题\n\
    \n1.  “共识是分布式系统中的一个基本概念，但它是区块链独有的。” 这个说法正确还是错误？\n\n2.  哪个说法是正确的？\n    1.  共识算法是一种允许公司或机器在分散环境中进行协作的方法。\n\
    \    2.  共识算法是一种阻止用户或机器在分布式环境中协作的方法。\n    3.  共识算法阻止用户或机器在分布式环境中协作。\n    4.  你可以使用共识过程来展示等价关系，这是一种机制。\n\
    \n3.  关于工作量证明的概念，以下哪个说法是正确的？\n    1.  `PoW`系统允许知道秘密（通常是公钥）的参与者执行更快的计算。\n    2.\
    \  `PoW`系统允许知道秘密（通常是私钥）的参与者执行更快的计算。\n    3.  通过这个过程，矿工必须使用大量的计算能力来解决复杂的数学难题。\n\
    \    4.  通过这个过程，矿工必须使用算法来解决复杂的数学难题。\n\n4.  关于活动量证明，以下哪个说法是正确的？\n    1.  就像在`PoW`中一样，矿工们竞相使用专门的硬件和电力尽快解决一个密码学难题。\n\
    \    2.  矿工们使用特定的硬件和电能尽快解决一个密码学难题，就像在`PoW`中一样。\n    3.  矿工们使用它，通过专门的软件和电能尽快解决一个密码学难题，就像在`PoW`中一样。\n\
    \    4.  矿工们竞相使用专门的软件和能量尽快解决一个密码学难题，就像在`PoW`中一样。\n\n5.  “在其运作中，`PoI` 是一个`PoS`版本，它考虑了股东和验证者的角色。”\
    \ 你认为这个陈述是真的还是假的？\n\n## 7.7 复习答案\n\n1.  答：错误。共识是分布式系统中的一个主要概念，而不仅仅是区块链中的概念。\n\
    2.  答：A，共识算法是一种允许公司或机器在分散环境中进行协作的方法。\n3.  答：C，在这种技术中，矿工必须使用大量的计算能力来解决复杂的数学谜题。\n\
    4.  答：A，就像在`PoW`中一样，矿工们竞相使用专门的硬件和电力尽快解决一个密码学难题。\n5.  这个说法是正确的。\n"
- fmt: '# 7.8 Summary


    The blockchain can be a distributed ledger, which has sparked interest across
    a wide range of industries. Blockchain technology is already being used in a variety
    of sectors to create goods and services. It is important to grasp blockchain’s
    core components, functional characteristics, and architecture in order to appreciate
    its affect and applicability to various applications.


    `Bitcoin`, a cryptocurrency, is the most well-known application of blockchain.
    Because a blockchain network is a distributed ledger, it requires a consensus
    mechanism among peer nodes to ensure that it functions properly.


    To comprehend blockchain’s influence and applicability to diverse applications,
    it’s critical to understand its fundamental components, functional features, and
    design. Several consensus algorithms have been proposed in the modern world, each
    with its unique set of reliability and scalability features. To fulfill the needs
    of all businesses, a single consensus algorithm will be inadequate. It’s essential
    to assess the strengths, weaknesses, and applications of the various consensus
    algorithms.


    Parameters related to blockchain consensus, privacy, and scalability were identified
    and discussed. The consensus techniques are compared and contrasted in terms of
    these factors. There are research gaps in the development of efficient consensus
    algorithms as well as the assessment of current algorithms. Developers and researchers
    will be guided through the process of assessing and creating a consensus algorithm
    in this book.


    Due to the obvious consensus algorithms, the nature of blockchain networks is
    extremely flexible. There is no such thing as a "perfect" blockchain consensus
    algorithm. But, we guess, that is the allure of technology: it is always improving.
    Since this chapter explained blockchain and consensus algorithms in detail, you
    should now be ready to start a project based on these technologies. The next chapter
    explains the first project of this book.


    # 8. The Consensus Algorithms for Blockchains Project


    This project is a basic blockchain written in Python. It is a set of blocks that
    are linked together in such a way that the information they store is impossible
    to modify (and more and more difficult as more blocks are joined to the blockchain).


    The PoW (Proof of Work) algorithm is used to mine every block in this blockchain.
    Its purpose is to find a hash of all the data saved in the blocks that meets certain
    criteria. For this purpose, each block has a variable data called `nonce` that
    must be modified until the desired hash is discovered.


    The desired hash in bitcoin, for example, requires the first *X* digits to be
    zeros. The amount `X` determines how difficult mining is (the larger the `X`,
    the greater the difficulty). In this blockchain, `X` is a property of the blockchain
    that can be set in its constructor. However, this is dependent on the mining capacity
    of the nodes that support the network in Bitcoin and the majority of other coins.


    ## 8.1 Starting the Project


    This project has one dependency, called `hashlib`, which secures the hashes and
    message digests the `import hashlib`.


    To run the project, open a terminal and type the following:


    ```

    python3 project1.py

    ```


    The `Create Transaction` method is used to generate transactions. Required inputs
    include the sending address, the receiving address, and the number of FDCs (*Federated
    Data Collaborations* in the Internet of Things). To add the transaction to the
    blockchain, use the `Mine Pending Transactions` function after it has been created.
    As an argument, this method requires the address of the block’s miner, i.e., the
    address that will be rewarded in the future. You may also use the `Show Address
    Balance` method with the address name you want to verify as an argument to check
    each address balance.


    ## 8.2 The Python Code


    Listing [8-1](#520777_1_En_8_Chapter.xhtml#PC2) shows the `TransactionProject.py`
    Python file. The python file `TransactionProject.py` will help us do following
    tasks:


    1. Create transaction in blockchain

    2. Mining of transaction

    3. Validate Transaction

    4. Creating blocks in blockchain


    ```

    import datetime

    import hashlib

    from pprint import pprint

    class Transaction(object):

    """Transaction class

    """

    def __init__(self, fromAddress, toAddress, amount):

    self.fromAddress = fromAddress

    self.toAddress = toAddress

    self.amount = amount

    class Block(object):

    """Block class

    """

    def __init__(self, timestamp, transactions, previousHash=""):

    self.timestamp = timestamp

    self.transactions = transactions

    self.previousHash = previousHash

    self.nonce = 0

    self.hash = self.calculateHash()

    def calculateHash(self):

    info = str(self.timestamp) + str(self.transactions) + str(self.previousHash) +
    str(self.nonce)

    return hashlib.sha256(info.encode(''utf-8'')).hexdigest()

    # Proof of work algorithm

    def mineBlock(self, difficulty):

    self.hash = self.calculateHash()

    while(self.hash[:difficulty] != "0"*difficulty):

    self.nonce += 1

    self.hash = self.calculateHash()

    class BlockChain(object):

    """Blockchain class

    """

    def __init__(self):

    self.chain = [self.createGenesisBlock()]

    self.difficulty = 4

    self.pendingTransactions = []

    self.miningReward = 100

    def createGenesisBlock(self):

    return Block("20/03/2018", [], "0")

    def getLatestBlock(self):

    return self.chain[-1]

    def minePendingTransactions(self, miningRewardAddress):

    newBlock = Block(datetime.datetime.now(), self.pendingTransactions)

    newBlock.previousHash = self.getLatestBlock().hash

    # you can check if transactions are valid here

    print("mining block...")

    newBlock.mineBlock(self.difficulty)

    print("block mined:", newBlock.hash)

    print("block succesfully mined.")

    self.chain.append(newBlock)

    self.pendingTransactions = [Transaction(None, miningRewardAddress, self.miningReward)]

    def createTransaction(self, transaction):

    self.pendingTransactions.append(transaction)

    def getBalanceOfAddress(self, address):

    balance = 0

    for block in self.chain:

    for transaction in block.transactions:

    if transaction.fromAddress == address:

    balance -= transaction.amount

    if transaction.toAddress == address:

    balance += transaction.amount

    return balance

    def isBlockChainValid(self):

    for previousBlock, block in zip(self.chain, self.chain[1:]):

    if block.hash != block.calculateHash():

    return False

    if block.previousHash != previousBlock.hash:

    return False

    return True

    def showBlockChain(self):

    print("blockchain: fedecoin\n")

    for block in self.chain:

    print("block")

    print("timestamp:", block.timestamp)

    pprint("transactions:", block.transactions)

    print("previousHash:", block.previousHash)

    print("hash:", block.hash, "\n")

    def showAddressBalance(self, address):

    print(address, "balance:", self.getBalanceOfAddress(address))

    fedecoin = BlockChain()

    fedecoin.createTransaction(Transaction("address1", "address2", 100))

    fedecoin.createTransaction(Transaction("address2", "address1", 50))

    fedecoin.minePendingTransactions("fede_address")

    fedecoin.createTransaction(Transaction("address1", "address3", 100))

    fedecoin.createTransaction(Transaction("address2", "address1", 50))

    fedecoin.minePendingTransactions("fede_address")

    fedecoin.showAddressBalance("fede_address")

    print("fedecoin is valid?", fedecoin.isBlockChainValid())

    fedecoin.chain[1].transactions = Transaction("address1", "address2", 1000)

    print("fedecoin is valid?", fedecoin.isBlockChainValid())

    fedecoin.chain[1].calculateHash()

    print("fedecoin is valid?", fedecoin.isBlockChainValid())

    Listing 8-1

    TransactionProject.py

    ```


    ## 8.3 Example 2: Using Flask in Python


    We utilized the Python Flask framework to create this blockchain application.
    The following are the requirements for this application.


    ```

    Python 3.0+

    Flask and requests

    for Install

    pip install Flask == 0.122 requests==2.18.4

    ```


    Here are the steps:


    1. Put in place a basic proof of work.

    2. Create an API interface for the blockchain.

    3. Construct a blockchain miner.

    4. Use the blockchain to interact.'
