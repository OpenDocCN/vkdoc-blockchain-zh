- fmt: '### 3.7.1 `Miner`


    Some nodes are particular nodes, called mining nodes or *miner nodes*. They are
    responsible for creating and registering new blocks to the ledger. These nodes
    compete with each other to add a new block to the blockchain.


    They are in contention with each other because who manages to win the block and
    add it to the chain receives a Bitcoin reward such as an incentive for contributing
    to the consensus of the Bitcoin network.


    To form a new block, miners select transactions from the transaction pool, thus
    obtaining a candidate block to be registered to the ledger. To select transactions,
    miners apply a property metric transactions, giving higher priority to transactions
    with `UTXO` in older inputs and of a higher amount than the most recent ones and
    of smaller amount. In other words, given a transaction `Tx`. Let `N` be its `UTXO`
    number in input and for each `UTXO i` in input. We define the priority of `TX`
    as follows:


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Figa_HTML.gif](images/520777_1_En_3_Chapter/520777_1_En_3_Figa_HTML.gif)


    At the same time, they will assign more weight to those with costs of commission
    per kilobyte higher than those that have commissions for lower kilobytes.


    The average size of a Bitcoin block is set at 1MB. Hence, a miner will try to
    select the sequence of transactions which, respecting the priorities (of seniority
    and value) and the maximum block size, will allow you to have a greater income.


    As a result, transaction commissions are usually valued based on the magnitude
    of the transaction.


    ### 3.7.2 `Coinbase Transaction`


    The first transaction added to the block is a one-of-a-kind transaction that differs
    from regular transactions. `Coinbase Transaction` is the name given to it.


    It is the transaction that allows the miner who extracts the block to receive:


    - The incentive for having participated and contributed to the consent process
    adding a new block.

    - The sum of all the commissions of all the transactions it has added to the block.


    Obviously, the beneficiary Bitcoin address of this transaction is that of the
    miner who extracts the block. The difference between the total value of input
    and the total value of output for each transaction is used to compute the total
    commissions. That is to say:


    - Take `N` as the total number of inputs, `I` as the index for each input, and
    `Vi` as the amount of input `i`.

    - Let `M` be the total number of outputs, or the index for each output, and `V`
    be the amount of the output. Then:


    ![$$ \mathrm{Commission}i\mathrm{Total}i=\sum \limits_{\mathrm{i}=1}^{\mathrm{N}}{V}_i-\sum
    \limits_{0=1}^{\mathrm{M}}{V}_0 $$](images/520777_1_En_3_Chapter/520777_1_En_3_Chapter_TeX_Equ2.png)

    (3.2)


    Instead, the miner reward is calculated from 50 bitcoin and by dividing this value
    by 2, every 210,000 blocks. That means Bitcoins are “minted” at a set and declining
    rate throughout the construction of each block. Each block, which is formed every
    ten minutes, comprises a new Bitcoin created from scratch. The currency issuance
    rate is reduced by 50% every 210,000 blocks, or about every four years. Each block
    included 50 new Bitcoins throughout the first four years of the network’s functioning.^([⁵](#fn5))


    The reward is based on the block height, with a beginning value of 50 Bitcoins
    per block and halving every 210,000 blocks. The proper reward is 25 Bitcoins because
    this block has a height of 277,316.


    The computation may be observed in the Bitcoin Core client’s `GetBlockValue` function,
    as demonstrated in Listing [3-1](#520777_1_En_3_Chapter.xhtml#PC2).


    ```

    int64_t GetBlockValue(int nHeight, int64_t nFees)

    {

    int64_t nSubsidy = 50 * COIN;

    int halvings = nHeight / Params().SubsidyHalvingInterval();

    if (halvings >= 64)

    return nFees;

    // Every 210,000 blocks, or about every 4 years, the subsidy is decreased in half..

    nSubsidy >>= halvings;

    return nSubsidy + nFees;

    }

    Listing 3-1

    The GetBlockValue Function

    ```


    ### 3.7.3 Developing the Block Header


    After calculating the transactions from the Transaction Pool and the `Coinbase
    Transaction`, the miner continues on to construct the block header in order to
    generate the Candidate Block. The following steps will then be taken:


    1. Indicates the block’s version number, which explains the block’s architecture.

    2. Adds the hash of the previous block that it accepted as a block parent.

    3. Add the Merkle tree root value to the equation. So, after calculating the SHA-256
    hash for each transaction, these are merged in pairs to form each level of the
    tree, until all transactions are summarized in a node at the “root” of the tree.
    As a result, the Merkle tree’s root stores all transactions in a single 32-byte
    value.

    4. Adds the timestamp in Unix Epoch format that it refers to now of block creation.

    5. Defines the test difficulty of work required to make it a legitimate block
    by filling in the difficulty target.

    6. The final field is the nonce, initialized to 0.


    The block header is now complete, with all other fields filled in, and the mining
    operation may commence. The goal now is to discover a value for the nonce that
    transforms the difficulty target into a hash of the lower block header.


    ### 3.7.4 Difficulty Target


    The target is used in mining. It is the number (expressed in hexadecimal) to which
    the hash value of a block must be reduced in order for it to be added to the ledger.


    The target is adjusted every 2016 blocks (about two weeks) to ensure that blocks
    are extracted on average every ten minutes.


    The complexity of the `Proof of Work` is determined by a moving average that aims
    an average number of blocks per hour to adjust for increasing hardware speed and
    variable interest in node execution over time. The difficulty increases if they
    are generated too quickly.


    The target is calculated by each node of the network independently, but following
    the Bitcoin protocol rules.


    The rule stipulates that every 2,016 blocks, all nodes automatically retarget
    the `Proof of Work` difficulty. The retargeting difficulty calculation compares
    the time it takes to find the remaining 2,016 blocks to the expected time of 20,160
    minutes (which equals two weeks, based on a time of desired block of ten minutes).


    The desired ratio between the actual period and the time period is then computed,
    and an adjustment based on the difficulty is made. The difficulty rises if the
    network finds blocks faster than every ten minutes. The difficulty decreases if
    block finding is slower than planned.


    Let `RecentBlockTime` be the variable that indicates the time taken to find the
    latest 2016 blocks. The equation for calculating the *Difficulty Target* is:


    ![$$ \mathrm{NewDifficultyTarget}=\mathrm{OldTarget}\ast \left(\frac{\mathrm{RecentBlockTime}}{20160}\right)
    $$](images/520777_1_En_3_Chapter/520777_1_En_3_Chapter_TeX_Equ3.png)

    (3.3)


    The adjustment per cycle must be less than a factor of 4 to avoid significant
    volatility in the difficulty objective.


    If the required difficulty adjustment exceeds a factor of 4, it is limited to
    the maximum allowed.


    All remaining modifications will be performed in the next period. Because each
    node adheres to the same consensus rules and all blocks are identical, they will
    all arrive at the same difficulty value.


    If a node miscalculates the goal (or lies about it) and then produces a block
    based on that value, the rest of the network will reject it since it does not
    match the target’s requirements, and all of the work invested in mining that block
    will be lost.'
