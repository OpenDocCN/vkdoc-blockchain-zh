    \  1.  PoW systems allow players who know a secret, usually a public key, to perform\
    \ faster computations.\n\n    2.  PoW systems allow players who know a secret,\
    \ usually a private key, to perform faster computations.\n\n    3.  With this\
    \ process, miners must use extensive computation capacity to solve complicated\
    \ mathematical challenges.\n\n    4.  With this process, miners must use algorithms\
    \ to solve complex mathematical challenges.\n\n4.  Which of the following statements\
    \ about Proof of Activity is correct?\n    1.  Miners compete, much as in PoW,\
    \ to solve a cryptographic problem as soon as possible using specialized hardware\
    \ and electricity.\n\n    2.  Miners resolve a cryptographic challenge using specific\
    \ hardware and electric energy as quickly as possible, much like in PoW.\n\n \
    \   3.  Miners use it to resolve a cryptographic challenge using special software\
    \ and electric energy as quickly as possible, much like in PoW.\n\n    4.  Miners\
    \ compete to resolve a cryptographic challenge using special software and energy\
    \ as quickly as possible, much like in PoW.\n\n5.  *“*In its functioning, PoI\
    \ is a PoS version that considers the role of shareholders and validators.” Do\
    \ you think this statement is true or false?\n\n## 7.7 Review Answers\n\n1.  Answer:\
    \ Incorrect. Consensus is a major idea in distributed-systems, not just in blockchain.\n\
    \n2.  Answer: A, A consensus algorithm is a method that allows companies or machines\
