- fmt: '### 4.3.6 Why Merkle Trees?


    The power to store all this information efficiently in Merkle trees is incredibly
    useful in Ethereum, and for those we call *light nodes*. A blockchain is handled
    by a group of nodes. Generally, there are two types of nodes: full nodes and light
    nodes.


    A full node synchronizes the blockchain by archiving the entire chain, from the
    originating block to the last block, and performs all operations contained therein.
    Miners usually keep full nodes for the mining process.


    It is also possible to download a full node without mining. Regardless, each full
    node contains the entire blockchain. But as long as a node does not need to execute
    every transaction or query historical data, it’s not really necessary to store
    the entire blockchain.


    This is where the concept of a lightweight node comes in. Instead of downloading
    and storing the entire chain and executing all of the light node’s transactions,
    they only download the chain of headers, from the originating block to the current
    one, without executing any transactions or retrieving any state. Since the light
    nodes have access to the block headers, which contain the hashes of three Merkle
    Patricia trie trees, they can still easily generate and receive verifiable responses
    to transactions, events, balances, etc.


    ### 4.4 Ethereum Virtual Machine


    The Ethereum Virtual Machine, often abbreviated EVM, is the computing center that
    allows the execution of complex codes (smart contracts) on top of the Ethereum
    platform. It is therefore a virtual machine, i.e. software capable of emulating
    a physical machine in all respects, through a virtualization process in which
    physical resources (CPU, RAM, hard disk, ...) are assigned to the applications
    that are run on the virtual machine (including its operating system). It plays
    a role similar to what the Java Virtual Machine (JVM) plays for Java, that is,
    a safe environment, isolated and protected from the rest of the running processes
    or files on the host computer.


    A crash or malfunction of the EVM does not cause side effects in the host computer’s
    file system and operating system processes. EVM also acts as a guarantor for the
    network nodes, which “offer” their own physical infrastructure for the storage
    and processing of potentially harmful smart contracts. The open and permissionless
    nature of the Ethereum blockchain (like that of Bitcoin), in fact, allows anyone
    to be part of it and deploy potentially malicious smart contracts.


    ### 4.5 What Is a Gas?


    A very important concept in Ethereum is that of commissions. Consider that every
    node runs EVM as part of the verification and validation protocol. Every transaction
    and each smart contract is executed on the EVM for each node on the network.


    Clearly this is not to optimize the efficiency of the calculation. This parallel
    processing is redundantly parallel. The goal is to offer a more efficient method
    of reaching consensus without the need for trusted third party. The fact that
    the *executions of smart contracts and transactions* are redundantly replicated
    through knots makes them very expensive.


    This creates an incentive not to use the blockchain for computation, which can
    be performed off the platform. Any calculation that occurs because of a transaction
    on the Ethereum network comes at a cost.


    Note that *gas* is the name of the execution commission that the senders of the
    transactions have to pay for each task carried out on the blockchain Ethereum.


    The name gas is developed by the fact that this tax acts like crypto-fuel, driving
    the motion of smart contracts and of *transactions*. The gas and ether are purposefully
    dissociated since the gas units align to the calculation units having a natural
    cost, while the price of the ether generally fluctuates due to market forces.
    The gas is the unit used to count the fees required for a certain computation.


    The price of gas is the amount of Ether we are ready to spend on every unit of
    gas and is counted in the `gwei`. Note that the Wei is the smallest unit of Ether,
    where 10^18 Wei denotes one Ether. One `gwei` is 1,000,000,000 Wei. With every
    computation/transaction, a sender sets a `gasLimit` and that means the gas cost
    or price (`gasprice`). In this case, the gas limit refers to the full amount of
    gas that we are willing to spend on a particular computation or transaction. The
    Gas cost refers to the amount of `gwei` we are ready to pay. The product of the
    gas cost and the gas limit represent the amount of Ether that the sender is ready
    to pay for the execution of a computation or transaction.


    Here we will consider an example of a sender with a limit of gas cost. Suppose
    the sender gives the gas limit as 50,000 and a gas price of 20 `gwei`. This means
    that the sender is ready to spend a high amount of `50000 x 20 gwei = 1,000,000,000,000,000
    Wei = 0.001 Ether` to execute that computation or transaction. (See Figure [4-16](#520777_1_En_4_Chapter.xhtml#Fig16).)


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig16_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig16_HTML.jpg)


    Figure 4-16


    Example of payment of commissions for a transaction


    If a user has a large amount of Ether in their balance account to cover this,
    the transaction or computation can be executed. The sender is then refunded for
    the amount of gas not used during the final stage of the transaction or computation.


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig17_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig17_HTML.jpg)


    Figure 4-17


    Example of reimbursement for unused gas at the end of a computation


    If the sender will not give the gas needed to perform a transaction, the transaction
    will run out and would not be considered valid. In this case, the processing of
    the transaction would stop and any path changes that would be reverted in order
    to return to the Ethereum state prior to the computation. Also, a failed transaction
    would be logged to show which operation was attempted and where it failed. And
    since the car has already spent resources to perform the calculations before running
    out of gas, no amount is refunded to the sender. (See Figure [4-18](#520777_1_En_4_Chapter.xhtml#Fig18).)


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig18_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig18_HTML.jpg)


    Figure 4-18


    Example of a failed transaction due to a lack of gas


    Note that the whole price spent by the sender for gas is sent to the address of
    the miner. As miners are spending their resources to run the calculations and
    identify the computations, they receive the gas tax as granted. (See Figure [4-19](#520777_1_En_4_Chapter.xhtml#Fig19).)


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig19_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig19_HTML.jpg)


    Figure 4-19


    Example of a miner receiving a commission


    So, it is clear that the higher the price of gas, the higher the mark the miner
    will get from computation. In this way, miners are free to select which computations
    to validate and which to avoid. To direct senders to a gas price they deem acceptable,
    miners have the option of advertising a cheaper cost for which they are willing
    to perform transactions. Miners will include transactions with the highest fees,
    so the more a user is willing to pay for gas, the more their transaction will
    quickly be included in a block. It is possible to see the gas required for each
    operation on this sheet.'
