  trans: "  \n### 17.13 实验活动  \n\n本章阐述前一章所创建的方法如何付诸实践，以及在此过程中出现的技术问题。  \n\n为生成四个待评估的检查点，在城区环境中使用\
    \ Coach 的默认技术对控制器进行训练。  \n\n`CARLA` 提供了 152 个生成点，用于创建场景。每个生成点均创建了一个基础配置及其三种变体：\
    \  \n\n-   `h0`-默认设置：使用与控制器训练时相同的条件生成地图，包含 30 人和 15 辆汽车。  \n-   `h1`-行人设置：生成地图时将行人数量从\
    \ 30 增加至 60。  \n-   `h2`-车辆设置：生成地图时将环境中汽车数量从 15 增加至 30。  \n-   `h3`-该地图由`h1`和`h2`合并生成，形成包含\
    \ 60 名行人和 30 辆汽车的情景。  \n\n为确保各变体之间的一致性和可重复性，共生成了 152 对具有唯一随机种子的初始点，每对均对应不同的起点。这样，同一初始点可在多次迭代中重复使用相同的随机种子。\
    \  \n\n为补充系统整体性能信息，汽车还被分配了一个待达成的目标目的地，该目标同样被记录以便重复测试。如果目标达成，系统记录成功，并为系统分配一个新的目标。\
    \  \n\n在正常情况下，碰撞可能需要极长时间才会发生。因此，本工作设定了 15 分钟的最大运行时长来展示提出的原理，超过该时长则视系统任务为完成。  \n\
    \n在第一部分研究中，使用第 3 节概述的方法开发并评估了四个检查点。由于 Coach 项目是开源的，相关代码已公开。  \n\n因此，我们能够利用软件探针监控控制器的活动。源代码被修改，增加了将每次运行所需数据写入独立文件的指令：\
    \  \n\n-   场景的起始位置和随机种子  \n-   控制器已执行的操作  \n-   发生碰撞时的结果  \n-   若达成目标，记录目标达成情况以及新目标坐标\
    \  \n\n通常，修改源代码可能导致整体性能和结果准确性的下降。幸运的是，`CARLA`模拟器允许以特定时间步长运行仿真。为确保从服务器接收的所有数据正确且及时，时间步长设置为最小值：每秒十帧。由于无法控制可变时间步长，这可能会在数据中引入不确定性。这也为测试可重复性提供了基准。完成初始训练部分以及控制器测试大约花费了一个半月。\
    \  \n\n在第二步中，在每个检查点评估安全监控器。源代码再次被修改，以建立两个独立并行的进程：一个从`CARLA`服务器获取激光雷达数据并发送至安全监控服务器，另一个等待安全监控器判断是否需要刹车。\
    \  \n\n每一帧，`CARLA`系统都会生成激光雷达数据。由于数据生成的负载完全依赖于 CPU，执行时间显著变慢。不幸的是，如果 FPS 低于 10 帧，`CARLA`会出现问题，导致数据错误。为确保最低每秒十帧的约束，需要一台性能强大的机器。代码库中添加了软件探针以收集监控器警报信息，并再次修改源代码。在监控安全行为监控器的同时，重复执行第一步中的运行。测试期间，所有生成的警报均为误报。\
    \  \n\n为评估真阳性数量，在碰撞发生前两秒激活紧急制动。这种方法使我们能够在运行环境中评估安全性能监控器。  \n\n第一阶段完成后，处理所获得的数据，以计算机化前述章节中描述的测量指标。\
    \  \n\n-   控制器的检查点：  \n    -   故障间的平均时间  \n    -   故障平均间隔时间（MTBF）  \n    -   故障率\
    \  \n    -   稳定性  \n-   安全监控器：  \n    -   混淆预测矩阵  \n    -   阳性/阴性率（真/假）  \n  \
    \  -   完整性详情  \n    -   马修斯相关系数  \n    -   误报率  \n\n使用前述方法从之前的检查点继续训练，并以相同方式执行测量过程。\
    \  \n\n某些提及的方法需要安全监控器训练，导致执行时间极快。由于生成激光雷达数据的高计算负载，这一阶段耗时约三个月，此后训练停止。收集的数据可用于比较，评估网络是否正确学习，以及安全-有效性监控器随时间的变化情况。\
    \  \n\n使用`Python`脚本收集并分析数据，以聚合数据并为控制器和安全整体监控器的功能提供指标。对于此类工作，数据聚合至关重要。然而，由于这些系统的复杂性及许多不利事件发生频率较低，在数据聚合之前，必须对单次运行进行评估和比较。\
    \  \n\n由于获得的数据量庞大，我们在下一部分主要以聚合形式呈现收集到的结果。还存在关于“原始”数据的其他问题，这些问题未包含在本研究中，但已单独提供用于评估。\
    \  \n\n### 17.14 结果  \n"
- fmt: "### 17.14.1 Testing the Controller (Phase 1)\n\nThe collected data is kept\
    \ in different files for each run, and the measures specified in this chapter\
    \ are computed using Python code. The obtained data is compared to determine the\
    \ controller’s goodness and modifications in the safety-efficacy monitor’s across\
    \ the neural network’s stages.\n\nThe distances traveled for each circumstance\
    \ were plotted to determine whether the number of meters walked was increasing\
    \ and if there were any scenarios that were particularly “positive” or “challenging”\
    \ for the system.\n\nThis is the first step, which aids testers in distinguishing\
    \ between significant and minor scenarios. If the distance covered by the controller\
    \ in scenario `x` is less than the usual distance traveled in all checkpoints,\
    \ there are two options:\n\n- There may be a danger that the controller has not\
    \ learned to handle if the controller always goes the same distances in all checkpoints\
    \ before exploding.\n- If the distance traveled varies in a brief interval, the\
    \ likelihood of a collision may be determined by the initial conditions. In any\
    \ event, using this method, it’s easy to figure out which situations lead the\
    \ controllers to crash rapidly, and each one may be investigated further.\n\n\
    It’s important to remember that if a pattern arises when testing various checkpoints,\
    \ such as when the controller regularly works exceptionally well or exceptionally\
    \ poorly, in both cases, a study of the particular instance is necessary.\n\n\
    For these reasons, the rationale for “poor” runs is self-evident. It may sound\
    \ counterintuitive but doing many “good” runs in the same circumstance necessitates\
    \ more care. An examination of the relationship between performance and beginning\
    \ conditions is required, and it may be shown or refuted using this method.\n\n\
    When the sys recognizes a “good pattern,” like a run in which the car just repeats\
    \ the very same sequence without encountering any other cars on the road, a more\
    \ complex problem arises.\n\nThe order of magnitude differs significantly between\
    \ Checkpoints 1 and 4 at normal difficulty, and in a few situations, the maximum\
    \ length set for these tests has been achieved. Another fascinating feature of\
    \ this method is that the bottom constraint on distance traveled for `C2` : :\
    \ 4 remains constant throughout the challenges, remaining at 22 meters.\n\nA closer\
    \ look at the travel distances and running times indicates that there are runs\
    \ in which the controller makes no progress, implying that the event that triggered\
    \ the crash was of a sort that the controller couldn’t handle. These types of\
    \ results are undoubtedly intriguing in terms of determining whether the shortest\
    \ runs share any environmental variables that might cause the controller to perform\
    \ poorly. (See Figure [17-16](#520777_1_En_17_Chapter.xhtml#Fig16).)\n\n![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig16_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig16_HTML.jpg)\n\
    \n**Figure 17-16**  \nAt normal difficulty, controller `C1` moves in meters at\
    \ every situation\n\nThe time gap between two consecutive activities is known\
    \ because the simulation time that has elapsed between two stages of the simulation\
    \ is specified and understood: the true total length of a single run may be estimated\
    \ by counting how many actions the controller has performed. (See Figure [17-17](#520777_1_En_17_Chapter.xhtml#Fig17).)\n\
    \n![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig17_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig17_HTML.jpg)\n\
    \n**Figure 17-17**  \nController `C4`’s distance traveled at every scenario at\
    \ normal troubles\n\nWe can simply approximate the dependability function of every\
    \ checkpoint in this way, using the mean `MTTF` in each degree of difficulty.\n\
    \n![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig18_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig18_HTML.jpg)\n\
    \n**Figure 17-18**  \nAfter `x` min of reaction, the chance `y` of the systems\
    \ being operational is shown graphically\n\nThe `MTTF` of the initial checkpoint\
    \ is relatively low (20 sec), as predicted, and grows as the number of checkpoints\
    \ rises. Interestingly, the second checkpoint appears to perform better than the\
    \ third and fourth checkpoints. Despite this, analysis of a portion of the runs\
    \ in which the second checkpoint accomplished extremely good results in terms\
    \ of time to collapse and distance traveled revealed that its driving is far more\
    \ dangerous than the other two and is likely to result in a poor driving style\
    \ in which the car prevented a crash almost every time by steering at the last\
    \ possible moment. Another indication that `C2` isn’t always superior to `C3`\
    \ and `C4`. `C3`/`C4` indicates that the apparent increased safety is most likely\
    \ due to “fortunate patterns” in the sense indicated above.\n\nFortunately, as\
    \ the findings from Phase 3 will demonstrate, the controller was able to overcome\
    \ this issue.\n\nCheckpoint distances follow a similar pattern: longer runs are\
    \ really trips in which the automobile travels more meters. This guarantees that\
    \ the system isn’t “cheating”: if the car isn’t moving at all, the execution time\
    \ will be greater. We may estimate the durability function in terms of km traveled\
    \ prior to crashing by computing the average distance traveled by each checkpoint\
    \ in each level of danger.\n\nFurthermore, the observed advances in the distance\
    \ to failure tend to coincide with the progress for a while to failure, implying\
    \ that the two metrics are linked.\n\nBecause `CARLA` permits the kind of item\
    \ with which a collision happened to be recorded, rates of the type of object\
    \ collided in relation to total collisions are calculated for every checkpoint,\
    \ for each risk category. This method is beneficial for a number of reasons: (See\
    \ Figure [17-19](#520777_1_En_17_Chapter.xhtml#Fig19).)\n\n![../images/520777_1_En_17_Chapter/520777_1_En_17_Figl_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Figl_HTML.jpg)\n\
    \n![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig19_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig19_HTML.jpg)\n\
    \n**Figure 17-19**  \nAfter `x` km, the chance `y` of the system becoming operational\
    \ is shown graphically\n\n- To see whether the automobile slams into walls, lamp\
    \ poles, or fences, indicating that it is going off-road.\n- To see how the automobile\
    \ reacts to different levels of difficulty; for example, if the number of people\
    \ is raised and there are fewer pedestrian collisions, the system may be capable\
    \ of preventing human accidents.\n- To recognize the system’s capacity to prevent\
    \ failures when interacting with certain things.\n\nThose diagrams may be used\
    \ to see how the system performs as the scenario’s complexity is increased while\
    \ it is being trained, as well as to see whether there are any correlations between\
    \ the types of collision and the security checks. The first checkpoint, as expected,\
    \ collides with off-road objects, showing the controller’s weak driving abilities.\
    \ (See Figure [17-20](#520777_1_En_17_Chapter.xhtml#Fig20).)\n\n![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig20_HTML.png](images/520777_1_En_17_Chapter/520777_1_En_17_Fig20_HTML.png)\n\
    \n**Figure 17-20**  \nCharts\n\nIt also appears that the ratio of collisions with\
    \ generic barriers has a tendency to follow the total checkpoint achievement.\
    \ When comparing this graph to the contributing, it can be seen that `C1` has\
    \ the largest ratio of collisions against barriers, whereas `C2` has the lowest\
    \ ratio. `C3` increased the frequency of these impacts, which was accompanied\
    \ by a decrease in the `MTTF`/ `MDTF`, which was later decreased by `C4`."
  raw: '### 17.14.1 Testing the Controller (Phase 1)


    The collected data is kept in different files for each run, and the measures specified
    in this chapter are computed using Python code. The obtained data is compared
    to determine the controller’s goodness and modifications in the safety-efficacy
    monitor’s across the neural network’s stages.


    The distances traveled for each circumstance were plotted to determine whether
    the number of meters walked was increasing and if there were any scenarios that
    were particularly “positive” or “challenging” for the system.


    This is the first step, which aids testers in distinguishing between significant
    and minor scenarios. If the distance covered by the controller in scenario x is
    less than the usual distance traveled in all checkpoints, there are two options:


    *   There may be a danger that the controller has not learned to handle if the
    controller always goes the same distances in all checkpoints before exploding.


    *   If the distance traveled varies in a brief interval, the likelihood of a collision
    may be determined by the initial conditions. In any event, using this method,
    it’s easy to figure out which situations lead the controllers to crash rapidly,
    and each one may be investigated further.


    It’s important to remember that if a pattern arises when testing various checkpoints,
    such as when the controller regularly works exceptionally well or exceptionally
    poorly, in both cases, a study of the particular instance is necessary.


    For these reasons, the rationale for “poor” runs is self-evident. It may sound
    counterintuitive but doing many “good” runs in the same circumstance necessitates
    more care. An examination of the relationship between performance and beginning
    conditions is required, and it may be shown or refuted using this method.


    When the sys recognizes a “good pattern,” like a run in which the car just repeats
    the very same sequence without encountering any other cars on the road, a more
    complex problem arises.


    The order of magnitude differs significantly between Checkpoints 1 and 4 at normal
    difficulty, and in a few situations, the maximum length set for these tests has
    been achieved. Another fascinating feature of this method is that the bottom constraint
    on distance traveled for C2 : : 4 remains constant throughout the challenges,
    remaining at 22 meters.


    A closer look at the travel distances and running times indicates that there are
    runs in which the controller makes no progress, implying that the event that triggered
    the crash was of a sort that the controller couldn’t handle. These types of results
    are undoubtedly intriguing in terms of determining whether the shortest runs share
    any environmental variables that might cause the controller to perform poorly.
    (See Figure [17-16](#520777_1_En_17_Chapter.xhtml#Fig16).)


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig16_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig16_HTML.jpg)


    Figure 17-16


    At normal difficulty, controller C1 moves in meters at every situation


    The time gap between two consecutive activities is known because the simulation
    time that has elapsed between two stages of the simulation is specified and understood:
    the true total length of a single run may be estimated by counting how many actions
    the controller has performed. (See Figure [17-17](#520777_1_En_17_Chapter.xhtml#Fig17).)


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig17_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig17_HTML.jpg)


    Figure 17-17


    Controller C4’s distance traveled at every scenario at normal troubles


    We can simply approximate the dependability function of every checkpoint in this
    way, using the mean MTTF in each degree of difficulty.


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig18_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig18_HTML.jpg)


    Figure 17-18


    After x min of reaction, the chance y of the systems being operational is shown
    graphically


    The MTTF of the initial checkpoint is relatively low (20 sec), as predicted, and
    grows as the number of checkpoints rises. Interestingly, the second checkpoint
    appears to perform better than the third and fourth checkpoints. Despite this,
    analysis of a portion of the runs in which the second checkpoint accomplished
    extremely good results in terms of time to collapse and distance traveled revealed
    that its driving is far more dangerous than the other two and is likely to result
    in a poor driving style in which the car prevented a crash almost every time by
    steering at the last possible moment. Another indication that C2 isn’t always
    superior to C3 and C4\. C3/C4 indicates that the apparent increased safety is
    most likely due to “fortunate patterns” in the sense indicated above.


    Fortunately, as the findings from Phase 3 will demonstrate, the controller was
    able to overcome this issue.


    Checkpoint distances follow a similar pattern: longer runs are really trips in
    which the automobile travels more meters. This guarantees that the system isn’t
    “cheating”: if the car isn’t moving at all, the execution time will be greater.
    We may estimate the durability function in terms of km traveled prior to crashing
    by computing the average distance traveled by each checkpoint in each level of
    danger.


    Furthermore, the observed advances in the distance to failure tend to coincide
    with the progress for a while to failure, implying that the two metrics are linked.


    Because CARLA permits the kind of item with which a collision happened to be recorded,
    rates of the type of object collided in relation to total collisions are calculated
    for every checkpoint, for each risk category. This method is beneficial for a
    number of reasons: (See Figure [17-19](#520777_1_En_17_Chapter.xhtml#Fig19).)


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Figl_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Figl_HTML.jpg)


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig19_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig19_HTML.jpg)


    Figure 17-19


    After x km, the chance y of the system becoming operational is shown graphically


    *   To see whether the automobile slams into walls, lamp poles, or fences, indicating
    that it is going off-road.


    *   To see how the automobile reacts to different levels of difficulty; for example,
    if the number of people is raised and there are fewer pedestrian collisions, the
    system may be capable of preventing human accidents.


    *   To recognize the system’s capacity to prevent failures when interacting with
    certain things.


    Those diagrams may be used to see how the system performs as the scenario’s complexity
    is increased while it is being trained, as well as to see whether there are any
    correlations between the types of collision and the security checks. The first
    checkpoint, as expected, collides with off-road objects, showing the controller’s
    weak driving abilities. (See Figure [17-20](#520777_1_En_17_Chapter.xhtml#Fig20).)


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig20_HTML.png](images/520777_1_En_17_Chapter/520777_1_En_17_Fig20_HTML.png)


    Figure 17-20


    Charts


    It also appears that the ratio of collisions with generic barriers has a tendency
    to follow the total checkpoint achievement. When comparing this graph to the contributing,
    it can be seen that C1 has the largest ratio of collisions against barriers, whereas
    C2 has the lowest ratio. C3 increased the frequency of these impacts, which was
    accompanied by a decrease in the MTTF/ MDTF, which was later decreased by C4.'
  trans: '

    ### 17.14.1 测试控制器（第一阶段）


    每次运行收集的数据会分别保存在不同文件中，本章指定的各项指标均通过 Python 代码计算得出。通过对比所获数据，可确定控制器的优劣，以及安全-效能监控器在神经网络各阶段所做的修改。


    针对每种情景，绘制了行驶距离图，以判断步行米数是否在增加，以及是否存在对系统而言特别“有利”或“具有挑战性”的场景。


    这是第一步，有助于测试人员区分重要场景和次要场景。如果在场景 `x` 中，控制器行驶的距离少于所有检查点中的通常行驶距离，那么有两种可能：


    - 如果控制器在所有检查点爆炸前行驶的距离始终相同，则可能存在控制器尚未学会处理的危险。

    - 如果行驶距离在很短时间内变化，碰撞的可能性可能由初始条件决定。无论如何，使用这种方法，很容易找出哪些情况会导致控制器快速崩溃，并且可以进一步分析每种情况。


    需要注意的是，如果在测试不同检查点时出现某种模式，例如控制器表现异常出色或异常糟糕，在这两种情况下，都需要对特定实例进行研究。


    基于这些原因，分析“糟糕”运行的理由是不言而喻的。然而，在相同情况下出现多次“良好”运行，这听起来可能违反直觉，但需要更加仔细地审视。需要分析性能与起始条件之间的关系，并且可以通过这种方法来证明或反驳这种关系。


    当系统识别出一种“良好模式”时，例如，在一次运行中，汽车只是重复完全相同的序列，而没有在路上遇到任何其他车辆，就会出现一个更复杂的问题。


    在正常难度下，检查点 1 和 4 的量级存在显著差异，并且在少数情况下，达到了为这些测试设定的最大长度。该方法的另一个有趣特点是，在 `C2` : : 4
    中，行驶距离的下限限制在所有挑战中保持不变，始终为 22 米。


    仔细观察行驶距离和运行时间会发现，存在一些控制器毫无进展的运行，这意味着触发碰撞的事件属于控制器无法处理的类型。在判断这些最短的运行是否共享某些可能导致控制器性能不佳的环境变量方面，这类结果无疑颇具研究价值。（见图
    17-16。）


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig16_HTML.jpg](img/520777_1_En_17_Fig16_HTML.jpg)


    **图 17-16**

    在正常难度下，控制器 `C1` 在每种情况下的行驶距离（米）


    由于模拟两个阶段之间经过的模拟时间是已知且可计算的，因此可以获知两次连续动作之间的时间间隔：通过统计控制器执行了多少次动作，可以估算单次运行的实际总时长。（见图
    17-17。）


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig17_HTML.jpg](img/520777_1_En_17_Fig17_HTML.jpg)


    **图 17-17**

    在正常难度下，控制器 `C4` 在每种场景下的行驶距离


    通过这种方式，我们可以在每个难度等级下使用平均 `MTTF`，简单地近似计算出每个检查点的可靠性函数。


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig18_HTML.jpg](img/520777_1_En_17_Fig18_HTML.jpg)


    **图 17-18**

    经过 `x` 分钟反应时间后，系统保持运行的概率 `y` 的图示


    如预期的那样，初始检查点的 `MTTF` 相对较低（20 秒），并随着检查点数量的增加而增加。有趣的是，第二个检查点表现似乎优于第三和第四个检查点。尽管如此，对部分运行的分析显示，第二个检查点在崩溃时间和行驶距离方面取得了非常好的结果，但其驾驶方式远比另外两个危险，很可能导致一种不良的驾驶风格：汽车几乎每次都通过在最后一刻转向来避免碰撞。这也是
    `C2` 并非总是优于 `C3` 和 `C4` 的另一个迹象。`C3`/`C4` 表明，明显的安全性提升很可能归因于上述意义上的“幸运模式”。


    幸运的是，正如第三阶段的结果将显示的那样，控制器最终克服了这个问题。


    检查点的行驶距离遵循类似的模式：更长的运行实际上意味着汽车行驶了更多米数。这确保了系统没有“作弊”：如果汽车根本不移动，执行时间会更长。通过计算每个检查点在每种危险等级下的平均行驶距离，我们可以估算出以行驶公里数计的耐久性函数（直到崩溃）。


    此外，观察到的崩溃前行驶距离的进步趋势，往往与崩溃前运行时间的进步趋势一致，表明这两个指标是相互关联的。


    由于 `CARLA` 允许记录发生碰撞的物体类型，因此可以为每个检查点、每种风险类别计算碰撞物体类型占总碰撞次数的比率。这种方法有很多好处：（见图 17-19。）


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Figl_HTML.jpg](img/520777_1_En_17_Figl_HTML.jpg)


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig19_HTML.jpg](img/520777_1_En_17_Fig19_HTML.jpg)


    **图 17-19**

    经过 `x` 公里后，系统保持运行的概率 `y` 的图示


    - 用于观察汽车是否撞上墙壁、灯杆或围栏，从而判断其是否驶离道路。

    - 用于观察汽车对不同难度等级的反应；例如，如果行人数量增加而与行人的碰撞减少，则系统可能具备防止撞人事故的能力。

    - 用于识别系统在与特定物体交互时防止故障的能力。


    这些图表可用于观察系统在训练过程中，随着情景复杂度的增加其性能如何变化，也可用于观察碰撞类型与安全检查之间是否存在任何关联。如预期的那样，初始检查点会与越野物体碰撞，这表明控制器的驾驶能力较弱。（见图
    17-20。）


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig20_HTML.png](img/520777_1_En_17_Fig20_HTML.png)


    **图 17-20**

    图表


    此外，与普通障碍物碰撞的比例似乎有随着检查点总体成就而变化的趋势。将此图表与贡献度进行比较可以看出，`C1` 与障碍物碰撞的比例最高，而 `C2` 的比例最低。`C3`
    增加了此类碰撞的频率，随之而来的结果是 `MTTF`/`MDTF` 的下降，而 `C4` 则降低了该频率。

