  trans: "\n# 17.4 系统追踪\n\n系统监控是一种通过观察系统在其运行环境中的表现，并收集关于其特性的数据和证据的技术。目前，这被视为评估系统可靠性的有效方法，研究中已提出了多种实现该技术的方案。本章将采用这些书籍中介绍的方法。\n\
    \n此方法旨在持续监控最终环境中的系统，确保观察到的行为和性能满足特定需求。对监控活动中获取的数据进行验证是必要的：\n\n- **离线：** 系统运行时，数据被收集并存储在某处，随后进行评估。\n\
    - **在线**（或实时）：数据在获取时即进行评估。在制定监控策略时必须考虑所有以下因素：\n  - 确定系统中必须评估的关键事件、度量和特性，以判断系统的可靠性。\n\
    \  - 数据标记，以便为原始测量添加更多信息。\n  - 数据收集并传输到分析节点进行处理。\n  - 根据感兴趣的指标进行数据过滤和分类。\n\n在描述监控过程时，整个系统被称为目标系统。当追踪活动与特定的硬件、软件或系统组件关联时，会使用目标组件或最终应用。专家和学者们一致认为以下两种截然不同的技术是有效的：\n\
    \n- 黑盒分析。\n- 白盒分析。\n\n选择哪种策略取决于你对目标系统（尤其是其内部实现）的控制程度。\n\n当实现细节未知时，例如监控动作由第三方系统执行，可以采用黑盒方法。在定义负载后，将任务提交给系统，并观察其输出。（见图\
    \ 17-6。）\n\n![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig6_HTML.jpg](img/520777_1_En_17_Fig6_HTML.jpg)\n\
    \n**图 17-6** 目标系统输出处理\n\n如果目标系统的内部特性已知且易于访问，可以通过将探针直接连接到计算机，并在系统运行时观察其中间输出来“从内部”研究目标机器。由于这些探针直接连接到系统的内部组件，它们能提供比仅观察系统输出多得多的信息。\n\
    \n一方面，这种技术提供了关于系统行为的更多信息，但同时也需要在监控和系统探测方面更加谨慎。特别是必须遵循以下两个原则：\n\n- **选择的代表性：**\
    \ 为了成功执行监控活动，探针应能获取足够数量的相关事实。\n- **非侵入性：** 探测不得改变系统行为；否则，获取的数据将毫无用处。\n\n![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig7_HTML.jpg](img/520777_1_En_17_Fig7_HTML.jpg)\n\
    \n**图 17-7** 探针\n\n监控系统的设计和开发需要额外的论证，特别是在探针如何实施方面。具体来说，我们可以区分以下几种方式：\n\n包括硬件监控、软件监控和混合监控。由于其明显的最小侵入性，专用的硬件跟踪通道是观察系统的最佳方式。然而，随着系统变得日益复杂，安装硬件探针变得越来越困难，甚至极其困难。（见图\
    \ 17-7。）\n\n软件探针比硬件探针更强大，因为它们能访问更多相关数据，并能确定特定输出产生的上下文环境。指令数据提取和测量的指令可以包含在进程、操作系统中，或者可以创建一个新的探针进程。在混合技术中，硬件/软件探针可以同时使用，并特别关注减少每种技术的缺点。\n\
    \n## 17.5 本工作的动机与目标\n\n一个负责驾驶汽车的`神经网络`，与一个提供容错机制以防止灾难性故障的系统监管器相互配合。考虑到自动驾驶汽车可能对未来系统发展产生的影响，它们是最新且最有前景的安全关键性技术之一。\n\
    \n这类技术通常具有极高且难以验证的容量需求。此外，软件架构涉及人工智能与非人工智能软件的交互，使得验证工作更加困难。\n\n本研究的目的是提供一种评估此类复杂系统可靠性的实验技术，重点关注哪些指标适用于这些过程，以及哪些因素会影响分析过程。为了例证本书提出的原理，我们在一个逼真的仿真环境中进行了一项实验活动。\n\
    \n你无法直接接触系统监管器或训练好的神经网络。网络是从零开始开发的，该项目还包含创建一个基本系统监管器的工作。\n\n需要强调的是，本文的目的并非对该论点进行全面阐述；而是开启对这些概念和困难的探索阶段，这需要在未来的设计中进一步验证和研究。\n\
    \n## 17.6 汽车应用\n\n自动驾驶汽车是这十年来的流行趋势之一。使用机器学习技术经过实际训练来驾驶的 AI 已经表明计算机可以驾驶汽车。然而，如果这些系统发生故障，人员可能会受伤或死亡。同时，证明所要求的超高可靠性规格也颇具挑战。本章将回顾当今自动驾驶车辆安全方面存在的现代问题。\n"
- fmt: '### 17.6.1 Autonomous Cars as Cyber-Physical Systems


    A car’s ability to drive itself necessitates the use of appropriate technology
    and software. As a result, autonomous vehicles are classified as `cyber-physical
    systems` (CPSs), with the potentially devastating effects of a failure in/of these
    systems placing them in the important systems category.


    The system gathers data from various sensors to perceive and map the local environment.
    Here are some of the most significant sensors and their functions:


    - **Highly accurate GPS sensors:** These sensors are useful for monitoring change
    in the status of the automobile and objects in the surroundings over time.

    - **Cameras:** Face recognition software and cameras are generally used to process
    recorded images.

    - **Lidars and Radars:** Lidars are the next step in the evolution of traditional
    radars. The information gathered from these sensors is used to map the surroundings
    and detect obstacles and objects in the vicinity of the vehicle.


    These sensors’ results are integrated and sent into the car’s control system.
    Figure 17-8 depicts a simplified version of the software architecture.


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig8_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig8_HTML.jpg)


    *Figure 17-8 The software architecture of the system is abstracted at a high level*


    Sensor data are inputs to the management system, which are divided into two parts.
    One input collects data straight from the sensors, processes it to create an occupancy
    grid to map the nearby region, and generates a physical model of the system in
    terms of following the appropriate path to a final stage without collapsing. The
    other input collects data from the sensors, processes it to create an occupancy
    grid to map the nearby area, and generates a physical model of the system to get
    the correct path to a final stage without collision.


    A car’s activities include accelerating, braking, and steering. Because of the
    importance of their job, a system supervisor is required. This system is in charge
    of detecting potential hardware faults or erroneous process control outputs and,
    if required, executing a right action.


    The system administrator is the key part of such systems and prevents breakdown.
    Without a doubt, certain checks may be performed when data is analyzed, but the
    final decision rests with the system’s monitor, and underestimating its importance
    might have disastrous results, such as the 2018 Arizona tragedy in which a lady
    was killed by a self-driving car during a practice run.


    Additional examination found that the vehicle’s radar and Lidar sensors detected
    the victim around six seconds before impact, and that it took four seconds to
    infer that there was an impediment on the road requiring an emergency stop. During
    testing for “smoother rides,” however, this safety-checker was deactivated, resulting
    in tragedy.


    The high complexity of these systems raises issues among specialists, including
    the need to develop a new perspective for studying and testing their safety, as
    well as the need to raise awareness about safety.


    ## 17.7 Safety and Self-Controlled Vehicles


    The amount of automation may be split into six categories, ranging from 0 to 5,
    by an SAE International proposal to categorize self-driving cars’ autonomy. Level
    0 implies no autonomy: the car is operated only by a person; level 5 means that
    no human involvement is necessary, and the vehicle must be capable of not just
    driving safely on the road, but also avoiding catastrophic failures that may seriously
    injure people. The greater the reliability criteria for an automobile to be used
    on open streets, the more autonomous it is.


    Demonstrating a device’s dependability is a difficult undertaking in and of itself,
    but it becomes considerably more difficult with ultra-high dependability systems
    like these. In addition to the problem at hand, showing the dependability of autonomous
    vehicles has two additional challenges: how do you test the system efficiently
    and safely, and the presence of neural networks, and as such it is difficult to
    explain why it produced the output `y` given the input `x`.


    Several studies have shown that road testing vehicles is impossible. One of these,
    dubbed the RAND study, considers how many miles of driving it would take to demonstrate
    autonomous vehicles’ accuracy using traditional statistical inference, estimating
    that if autonomous vehicles’ fatality rate was 20 percentage points lower than
    humans’, it would take more than five centuries with “a fleet of 100 driverless
    cars being test-driven 24/7 a day, 24/7/365 a year.”


    The confirmation of ultra-high dependability criteria for safety-critical systems
    is a well-known topic in the safety literature, and autonomous cars haven’t been
    added to it. In actuality, the RAND research is just one example of the problem
    described in Littlewood & Strigini’s paper from 1993, in which the same ideas
    are examined and extended for any ultra-high dependability system.


    The fundamental flaw in the RAND study approach is that the frequency of future
    failures cannot be anticipated only based on the observed one. Not only because
    of the quantitative findings of its impossibility, but also because this method
    is ineffective: a failure rate that was observed. This technique cannot function,
    not only because of the quantitative approaches of its impossibility, but also
    because an observed frequency failure of zero would lead to optimistic (and potentially
    dangerous) forecasts. Fortunately, as Zhao et al. demonstrate, this dilemma is
    solvable.


    Validating the reliability criteria of an autonomous vehicle appears to be a difficult
    challenge in and of itself. The fact that these automobiles are controlled by
    neural networks makes things much more difficult.


    The area of machine learning has seen a rise in attention in recent years, resulting
    in important scientific advancements. As a result of these advancements, autonomous
    automobiles appear to be a reality, as AIs have achieved astounding results with
    their abilities, and large businesses such as Amazon and Alibaba are investing
    even more in artificial intelligence related research. The way people interact
    with computers is changing dramatically thanks to this new wave of AI research,
    and neural networks have produced surprising results.


    While neural networks have shown promise and appear to be the only method to reach
    objectives like automated vehicles, it has been proven numerous times how weird
    a network’s forecast may become when the inputs are skewed and how wide the confidence
    level can be when the inputs are skewed. The absence of established standards
    and certifications for this sort of software, as well as the need to comprehend
    neural networks fully, has prompted worries about how reliant these systems may
    be. With advanced AI businesses lobbying for more limitations, there is now a
    growing awareness of the problem.'
