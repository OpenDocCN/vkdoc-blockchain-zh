- fmt: '# 3.6 The Block


    The blockchain’s data structure is an ordered list with transaction block backlinks.
    The blockchain can be saved as a simple database or as a flat file. The blockchain
    metadata is stored in Google’s LevelDB database by the Bitcoin Core client.^([⁴](#fn4))


    The blocks are connected “backward,” with each one referencing the block before
    it in the chain.


    Every block in the blockchain is identified by a hash created by the SHA-256 cryptographic
    hash technique in the block’s header. Additionally, each block uses the prior
    block’s hash field in the block’s header to refer to the parent block, which is
    the previous block.


    To put it another way, each block’s header contains the hash of its parent. The
    hash sequence that connects each block to its parent, known as the *genesis block*,
    generates a chain that extends back to the first block ever created.


    A block has only one parent, although it can have multiple children at any time.
    Every child refers to the same block as its parent, and the `hash` field of the
    previous block includes the same hash (parent). During a blockchain fork, which
    is a transitory condition in which numerous blocks are mined almost simultaneously
    by several miners, more child blocks appear.


    Finally, the “fork” is rectified, and only a child block becomes part of the blockchain.
    Even though a block can have multiple children, it can only have one parent. Due
    to a block’s single field `previous block hash` referencing its single parent,
    this occurs.


    The hash of the previous block is located in the block and influence header, followed
    by the hash of the current block.


    Keep in mind that as the parent’s identity changes, the child’s identity changes
    as well. The hash of the parent changes if the parent is altered in any way. As
    a result, the modified hash of the parent necessitates a change in the child’s
    pointer `pre-block hash`. This changes the hash of the child block, which changes
    the hash of the nephew block’s `preceding block hash` field and the hash of the
    nephew itself, and so on, until the last block in the chain is added.


    Because of the cascade effect, a block with many subsequent generations cannot
    be altered without causing all subsequent blocks to be recalculated.


    Due to the massive computer power required for such a recalculation, the existence
    of a long chain of blocks results in the blockchain’s deep history, which is a
    major security element of Bitcoin. The first six blocks are taken as confirmation
    of the seventh block.


    As you learn more about blockchain technology, you’ll see that the blocks are
    becoming less and less likely to change. Finally, a block is a data structure
    that holds a collection of transactions uploaded to the blockchain.


    ## 3.6.1 The Structure of a Block


    The block is made up of a header with metadata or a model, followed by a series
    of transactions that take up the majority of its space. A block’s average size
    is set to 1MB. The block header is 80 bytes long, but the average transaction
    is at least 250 bytes long. (See Figure [3-29](#520777_1_En_3_Chapter.xhtml#Fig29).)


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig29_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig29_HTML.jpg)


    Figure 3-29


    Structure of block


    ## 3.6.2 The Block Header


    There are three sets of block metadata in the block header:


    *   A reference to a previous block hash that connects this block to the blockchain’s
    preceding block.

    *   The terms “target,” “once,” and “timestamp” all refer to Bitcoin mining.

    *   The market root is the root of the Merkle tree, which is used to effectively
    and securely summarize block transactions.


    Merkle trees are a type of tree that grows in the Merkle. With Merkle trees, a
    node can only download a few block headers (80 bytes per block) and still detect
    the inclusion of a transaction in a block. It does this by recovering a small
    Merkle path from a full node without having to store or expand the vast majority
    of blockchains, which can be several gigabytes in size.


    SPV nodes (simplified payment verification) are nodes that do not retain a full
    blockchain and use Merkle pathways to verify transactions without downloading
    full blocks. SPV nodes frequently employ Merkle trees. Only block headers are
    downloaded by SPV nodes, which do not hold full transactions or download all blocks.


    They employ an authentication or Merkle path to check if a transaction is contained
    in a block without downloading all of the block’s transactions. The block header’s
    detailed structure is shown in the table in Figure [3-30](#520777_1_En_3_Chapter.xhtml#Fig30).


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig30_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig30_HTML.jpg)


    Figure 3-30


    Block header’s details


    Figure [3-31](#520777_1_En_3_Chapter.xhtml#Fig31) shows a graphic example of the
    structure of the blocks of the Bitcoin blockchain.


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig31_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig31_HTML.jpg)


    Figure 3-31


    Bitcoin blockchain structure


    The block hash is not included in the block’s structural data, either when it
    is broadcast over the network or when it is stored in the blockchain, as you have
    seen.


    Instead, when a block is received by the network, every node computes the block
    hash. The block height, or position in the blockchain, is the second way to identify
    a block. As a result, a block may be identified in two ways: by looking at its
    hash or by looking at its height.


    Each consecutive block placed “above” the first block in the blockchain is one
    position “higher,” like boxes stacked on top of each other.


    It’s vital to realize that the block height isn’t a unique identifier like the
    block hash. The block height may not always imply a single block. As you will
    see, two or more blocks with the same block height might contend for the same
    position in the blockchain. The data structure of the block does not include the
    block’s height; it is not saved in the block.


    When a block is received by the Bitcoin network, every node dynamically determines
    its position (height) in the blockchain.


    # 3.7 The Nakamoto Consensus


    Furthermore, all traditional payment systems rely on a trust with a central authority
    that administers transactions and, as a result, the ledger.


    Bitcoin has no central authority, but each full node has a copy of the blockchain,
    complete with a public ledger that you can rely on as a record. The blockchain
    is not established by a central authority, but rather by each network node working
    independently. Using the information supplied over the network, each node of the
    network can come to the same conclusion and assemble the same copy of the ledger.


    The decentralized technique, through *emergent consensus*, is Satoshi Nakamoto’s
    key invention.


    Consensus is emerging because it is not expressly reached. There is no election
    in which consent happens. Instead, the consensus is an emergent result of hundreds
    of independent nodes interacting asynchronously under simple rules and regulations.


    The interaction of four processes that run independently on nodes in the network
    results in Bitcoin’s decentralized consensus:


    *   Independent verification of each transaction for each full node using a thorough
    set of criteria.

    *   Autonomous grouping of these transactions into new blocks by mining nodes,
    as well as proved computations through a proof-of-work algorithm.

    *   Each node independently verifies new blocks before adding them to the blockchain.

    *   Independent selection of the longer proof-of-work chain for each node (i.e.,
    proven to have higher computational power than the shorter one).'
