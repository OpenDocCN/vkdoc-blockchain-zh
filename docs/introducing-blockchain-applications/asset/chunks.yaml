- fmt: '### 4.3.3 Patricia Trie


    注意，`Patricia trie`是一种`Radix tree`，其中基数为2。（见图[4-11](#520777_1_En_4_Chapter.xhtml#Fig11)。）


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig11_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig11_HTML.jpg)


    图4-11

    树基数，`radix = 2`


    换句话说，它是一个二叉树（`radix = 2`），其中每个节点有两个子节点。因此，在树的每个分叉处，每个非叶子节点都面临一个二元选择（两个分支）。这意味着键的每一位都会被单独比较，每个节点都是一个双向分支（即左和右）。


    `Patricia trie`是二叉树（`radix = 2`）的一个特殊变体，它不是显式存储每个键的每一位，而是只存储区分两个子树的第一位的位置。


    在交集操作期间，算法会检查搜索键的索引位，并选择合适的右子树或左子树。`Patricia trie`的显著特点之一是，它为每个存储的键仅插入一个节点，这使得`Patricia
    trie`比标准的二叉树紧凑得多。我们提供一个示例来帮助理解`Patricia trie`。假设你在`Patricia trie`中放入三个键：`smiled`、`smiles`和`smile`。


    这三个键的二进制表示如图[4-12](#520777_1_En_4_Chapter.xhtml#Fig12)所示。


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig12_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig12_HTML.jpg)


    图4-12

    `Patricia trie`示例


    我们注意到`smile`是`smiled`和`smiles`的前缀。


    分析二进制表示，我们可以看到第一个不同的位（从左到右）是`0`（在第二行中以红色突出显示）。因此，`smiled`将是`smile`的左子节点。同样地，`smiles`将是`smiled`的右子节点，因为它们共享相同的前缀，直到某一位的值为`1`（在第三行中以红色突出显示）。插入这三个键后得到的`Patricia
    trie`如图[4-13](#520777_1_En_4_Chapter.xhtml#Fig13)所示。


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig13_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig13_HTML.jpg)


    图4-13

    `Patricia trie`示例


    此外，由于实际键不再显式存储，你需要在索引的记录上对键进行完全比较以确认匹配。关于这一点，`Patricia trie`与使用哈希表的索引有特别的相似之处。


    ### 4.3.4 以太坊修改版默克尔帕特里夏树


    本节解释以太坊如何修改了默克尔帕特里夏树。


    在修改版默克尔帕特里夏树中，树的键由以太坊地址（20字节，160位地址）表示，并以十六进制表示法（16个字符）呈现。账户状态中的值对应于该以太坊地址。


    对于密码学安全的默克尔树，每个节点都通过其哈希值被引用，树的根作为整个树的密码学印记。换句话说，每个节点的确定性密码学哈希被精确地用作指向该节点本身的指针。


    这为数据提供了一种密码学认证形式。如果某个树的根哈希是公开已知的，那么任何人都可以提供证据，证明该树在特定路径上具有给定值，前提是逐级提供节点。攻击者无法提供不存在的（路径，值）对证明，因为根哈希基于所有底层哈希，任何更改都会改变根哈希。这就是树的“默克尔”部分。


    此外，修改版默克尔帕特里夏树中有三种不同类型的节点：


    - **扩展节点：** 包含多个节点的公共键的一部分（编码路径），并包含对后续节点的引用（键），或下一个节点的哈希。因此，该节点由这两个字段（编码路径，键）构成。

    - **分支节点：** 包含指向具有相同键前缀的不同节点的指针。一个分支节点有17个字段，分别对应十六进制字母表的每个字符（16个字符）和一个值字段，用于在路径已完全遍历时包含最终的目标值，即如果存在键值对（键：以太坊地址，值：账户状态）且键（以太坊地址）终止于该分支节点。该节点由17个字段（`v0`
    ... `v15`，`value`）组成。

    - **叶子节点：** 包含一个值和键的剩余部分（称为`key-end`）。指向叶子节点的键（以及因此你的以太坊地址）是其所有父节点的前缀与叶子节点的`key-end`的串联。


    一个扩展节点永远只有一个子节点。出于这个原因，该子节点只能是一个分支节点。事实上，如果它指向一个叶子节点，它们将被合并为一个单独的叶子节点。如果它指向一个扩展节点，它们将被合并为一个单独的扩展节点。在图[4-14](#520777_1_En_4_Chapter.xhtml#Fig14)中，你可以看到各种类型节点的结构。


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig14_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig14_HTML.jpg)


    图4-14

    以太坊修改版默克尔帕特里夏树


    为简单起见，`value`字段存放账户余额。但实际上，它存放的是应用了`RLP`函数（序列化函数）于账户状态（包含四个字段）后的结果。相反，节点使用的哈希函数是`SHA
    3`。


    如你所见，扩展节点和叶子节点都由两个字段组成：一个专门用于地址路径的字段，以及一个专门用于值的字段。对于扩展节点，这个值是它所指向节点的哈希。对于叶子节点，它是被序列化的账户。


    但是以太坊如何区分这两种节点呢？


    它添加了一个前缀。这是图中称为`prefix`的字段。假设一个十六进制字符等于1个`nibble`的单位。所以，一个`nibble`相当于4位。因此，使用以下前缀：


    - `0` 表示路径字段中`nibble`数量为偶数的扩展节点。

    - `1` 表示路径字段中`nibble`数量为奇数的扩展节点。

    - `2` 表示路径字段中`nibble`数量为偶数的叶子节点。

    - `3` 表示路径字段中`nibble`数量为奇数的叶子节点。


    为什么区分扩展节点和叶子节点很重要？


    因为如果是扩展节点，那么`value`是一个指向分支节点的指针（即它的哈希）。而如果是叶子节点，那么`value`是通过`RLP`函数序列化后的账户状态。


    以太坊中的所有默克尔树都是以太坊默克尔帕特里夏树。这种结构通过一个扁平的键/值数据库来维护。


    ### 4.3.5 存储根


    一个256位的哈希根节点或`Merkle Patricia`树的基节点，将账户存储的内容编码为从`Keccak`哈希（256位）到256位`RLP`编码整数值的映射。然后，对于合约账户而言，这就是智能合约的存储。图[4-15](#520777_1_En_4_Chapter.xhtml#Fig15)展示了这一概念。


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig15_HTML.png](images/520777_1_En_4_Chapter/520777_1_En_4_Fig15_HTML.png)


    图4-15

    存储根是用于账户存储的`Merkle Patricia Trie`的根或基'
  raw: '### 4.3.3 Patricia Trie


    Note that a Patricia trie is a type of Radix tree where the radix equals 2\. (See
    Figure [4-11](#520777_1_En_4_Chapter.xhtml#Fig11).)


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig11_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig11_HTML.jpg)


    Figure 4-11


    Tree radix, radix = 2


    In other words, it is a binary radix tree (radix = 2), where each node has two
    child nodes. So at each cross of the tree, for each node (which is not leaf) you
    have in front of a binary choice (two branches). This means that each bit of the
    key is compared individually and each node is a two-way branch (that’s the left
    and right).


    A Patricia trie is a special variant of the binary radix tree (radix = 2), where
    instead of explicitly storing every bit of every key, the nodes only store the
    position of the first bit that distinguishes two subtrees from each other.


    During the intersection, the algorithm examines the indexed bit of the search
    key and chooses the appropriate right or left subtree. Among the notable features
    of Patricia trie is that it inserts only a single node for each stored key, making
    Patricia much more compact than a standard binary trie. We provide an example
    for a better understanding of a Patricia trie. Suppose you put three keys – smiled,
    smiles, and smile – in a Patricia Trie.


    The binary representation of these three keys is shown in Figure [4-12](#520777_1_En_4_Chapter.xhtml#Fig12).


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig12_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig12_HTML.jpg)


    Figure 4-12


    Example by Patricia trie


    We note that smile is a prefix of smiled and smiles.


    Analyzing the binary representation, we can see that the former bit that differs
    (from left to right) is 0 (highlighted in red in the second line). For this reason,
    smiled will be the left child of smile. Likewise, smiles will be smiled’ s right
    child because they share the same prefix up to a bit whose value is 1 (highlighted
    in red in the third line). The resulting Patricia trie after entering the three
    keys is shown in Figure [4-13](#520777_1_En_4_Chapter.xhtml#Fig13).


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig13_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig13_HTML.jpg)


    Figure 4-13


    Example of a Patricia trie


    Also, because the actual keys are no longer stored explicitly, you need to do
    a full comparison of the keys on the record indexed to confirm a match. About
    this, Patricia has a particular resemblance to indexing using a hash table.


    ### 4.3.4 Ethereum Modified Merkle Patricia Trie


    This section explains how Ethereum changed the Merkle Patricia trie.


    In the modified Merkle Patricia tree, the keys of the tree are represented by
    Ethereum addresses (20-byte, 160-bit addresses), represented in hexadecimal notation
    (16 characters). The values from the account state correspond to that Ethereum
    address.


    In the case of a cryptographically secure Merkle tree, each node is referenced
    by its hash, and the root of the tree acts as a cryptographic imprint of the whole
    tree. In other words, the deterministic cryptographic hash of each node is used,
    precisely, as a pointer to the node itself.


    This provides a form of cryptographic authentication to the data. If the root
    hash of a certain trie is publicly known, then anyone can provide evidence that
    the trie has a given value at a specific path providing the nodes go up every
    step of the way. It is impossible for an attacker providing proof of a pair (path,
    value) that they do not exist since the root hash is based on all the underlying
    hashes, so any changes would change the root hash. This is the *Merkle* part of
    the tree.


    Additionally, there are three different types of nodes in the Modified Merkle
    Patricia trie:


    *   **Extension Node:** Contains a part of the common key for multiple nodes (encoded
    path) and contains a reference to a subsequent node (key), or the hash of the
    next node. Therefore, a constituted knot from these two fields (encoded path,
    key).


    *   **Branch Node:** Contains pointers to different nodes that have the same key
    prefix. A branch node has 17 fields, one for each character of the hexadecimal
    alphabet (16 characters) and a value field, to contain the final target value
    in case the path has been completely crossed, i.e., if a pair exists (key: Ethereum
    Address, value: Account State) where the key (Ethereum Address) terminates in
    the branch node. This node consists of 17 fields (v0 ... v15, value).


    *   **Leaf Node:** Contains a value and the remainder of the key (called key-end).
    A key to a leaf node (and therefore your Ethereum Address) is the concatenation
    of a prefix from all of its parents and the key-end of the leaf node.


    An extension node only ever has one child node. For this reason, the child node
    is only ever a branch node. In fact if it pointed to a leaf node, they would be
    combined into a single leaf knot. If it pointed to an extension node, these would
    be combined into a single extension node. In Figure [4-14](#520777_1_En_4_Chapter.xhtml#Fig14),
    you can see the structure of the various types of nodes.


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig14_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig14_HTML.jpg)


    Figure 4-14


    Ethereum Modified Merkle Patricia trie


    For simplicity, the value field hosts the account balance. But in reality, it
    hosts the result of the RLP function (serialization function) applied to the Account
    State (which contains the four fields). Instead, the hash function used for nodes
    is SHA 3.


    As you can see, both extension nodes and leaf nodes consist of two fields, a field
    dedicated to the path of the address and a field dedicated to the value. In the
    case of the extension node, this value is the hash of the node it points to. In
    the case of the leaf node, it is the account being serialized.


    But how does Ethereum distinguish between the two nodes?


    It adds a prefix. This is the field that in the figure is called `prefix` . Assume
    that a single hexadecimal character equals the unit of 1 nibbe. So, one nibbe
    is equivalent to 4 bits. Therefore, these prefixes are used:


    *   0 is an extension node that has an even number of nibbes in the field referred
    to the path.


    *   1 is an extension node that has an odd number of nibbes in the field referred
    to the path.


    *   2 is a leaf node that has an even number of nibbes in the field referred to
    path.


    *   3 is a leaf node that has an odd number of nibbes in the field referred to
    the path.


    Why is it important to distinguish between an extension node and a leaf node?


    Because if it is an extension node then the value is a pointer to a branch node
    (that is, its hash). While if it is a leaf node then the value is the same as
    the account state serialized through the RLP function.


    All Merkle Tries in Ethereum are Ethereum Merkle Patricia Trie. This structure
    is maintained through a flat key/value DB.


    ### 4.3.5 Storage Root


    A hash 256-bit root node or base node of a Merkle Patricia tree encodes the content
    of the account storage in the trie as a mapping from the Keccak hash to 256 bit
    to integer values encoded in 256-bit RLP. This, then, in the case of contract
    accounts, is the storage of the smart contract. Figure [4-15](#520777_1_En_4_Chapter.xhtml#Fig15)
    illustrates the concept.


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig15_HTML.png](images/520777_1_En_4_Chapter/520777_1_En_4_Fig15_HTML.png)


    Figure 4-15


    Storage root is the root of or base of a Merkle Patricia Trie for storage of the
    account'
