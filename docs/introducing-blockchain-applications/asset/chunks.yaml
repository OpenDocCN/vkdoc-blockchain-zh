    # 1.2 本书涵盖内容


    要在分布式系统中有效实施区块链，首先需要深入理解区块链技术及其相关组件。这些内容将在第 2 章至第 7 章中阐述。由于共识算法是分布式系统交易中的重要概念，第
    8 章包含了一个与此主题相关的项目。


    随后，本书将讨论实时系统与调度。这些是分布式系统中的关键概念，涵盖在第 9 章和第 10 章中。（关于实时系统，本书解释了调度的工作原理。当多个进程具有相同的需求和时间限制，且必须通过调度策略高效处理时，这种情形被称为*同质进程调度*。）


    要成功开发区块链应用，必须首先对系统进行建模。在建模系统时，必须采用上述方法。当在分布式系统中使用区块链技术时，你必须将区块链层作为分布式系统建模的一部分进行建模，从而清晰了解系统架构以及系统之系统（SoS）的能力。`BLOCKLY
    4SOS`建模方法被用于创建所有这些模型。


    为了对 SoS 系统进行建模，你必须将`BLOCKLY 4SOS`纳入模型驱动工程。这些主题将在第 11 章和第 12 章中详细讨论。


    借助信息物理系统项目，你可以综合运用所有这些方法。本书提供了五个项目。这些项目使用了多种编程语言创建，第 13 章至第 17 章包含源代码和建模语言。每个项目还讨论了信息物理系统的组成部分。


    本书以第 18 章作为结尾，该章讨论了与区块链和分布式系统相关的全球法规，以及区块链-分布式系统相关倡议的未来。


    让我们从区块链的基础知识开始；下一章将讨论区块链及其组件。


    # 2. 区块链简介


    *区块链*是一个可共享且不可篡改的账本，它使系统间的交易和计算更加简便、安全，并能在商业世界中追踪资产。


    重要的是要理解，资产可以是有形的，也可以是无形的。这包括知识产权、专利、版权、商标等。区块链概念在商业领域被广泛应用。


    区块链（可将其视为“一系列区块”）是一个可共享且不可更改的数据包。通常，它可以被定义为一个数字注册表，其中的条目被连接到一系列/链条的“区块”中，并按顺序串联起来，其完整性通过密码学技术得以确保。尽管其规模会随时间增长，但它是不可更改的，因为其内容一旦写入，通常无法在不使整个架构失效的情况下进行修改或删除。在区块链系统上追踪或交易资产可以降低交易双方的风险和成本。


    请注意，这些概念属于更广泛的分布式账本范畴。（*分布式账本*是一个共享账本，它可以是一组公开或私有的数字信息，这些信息被同步并地理分布到多个国家、站点或机构，无需管理员或集中式数据管理。）这意味着这些系统基于一个可由网络中多个节点读取和更改的分布式账本。


    此外，所涉及的节点无需了解彼此的行为或身份，也无需相互信任。为了确保不同副本之间的完整性和一致性，新区块的添加由全球统一的规则或协议管理。当区块从网络或系统获得批准后，每个节点都需要更新其自身的私有副本。因此，该数据结构保证了未来无法进行篡改。


    采用区块链和分布式账本技术开发的系统具有数据数字化、去中心化、去中介化、转移可追溯性和透明性等特点。


    凭借这些特性，你可以以集中、可监控的方式提供交易，并为每笔交易提供安全保障。


    ## 2.1 区块链简史


    根据维基百科记载，第一个区块链由中本聪于 2008 年提出，并于次年实施，旨在为新兴数字货币比特币充当“账本”（所有交易的登记簿）。中本聪在原始文章中对*区块*和*链*这两个词的使用方式有所不同。2009
    年，中本聪的创造物——比特币，首次被用于购买实物资产：一个披萨。


    2014 年 8 月，随着比特币已在全球范围内声名鹊起，其区块链大小已达到 20 千兆字节。2018 年 3 月，它超过了 162 千兆字节。2014 年，“区块链
    2.0”这一术语开始被用于指代一种使用区块链的新方式。其理念是让那些被当前货币体系排除在外的人能够获得可靠、安全的货币存储，保护他们的隐私，并实现其信息的货币化。根据一些作者的观点，它还有可能通过改变财富分配方式来解决社会不公问题。


    2017 年，内华达州参议院完全放开了对区块链的限制。特别是参议院第 398 号法案的第 4 部分规定：


    - 禁止地方当局对区块链征税。

    - 禁止要求为使用区块链申请任何形式的许可证。

    - 禁止对区块链的使用提出任何其他要求。

    - 禁止地方当局对区块链征税。


    2019 年 4 月，在国际手工艺品展览会上，展示了首款（意大利制造）产品，其生产步骤完全使用区块链技术进行追溯。


    对数字文档进行时间戳标记的需求催生了区块链技术。例如，你可以给自己写一封信并通过邮件寄出。如果你不拆封，就能保证这封信是在信封盖戳之前写好的。企业在日常运营中采用日益复杂的流程，以提高其内部文件在日后被质疑时的可信度。在网络世界中，交易需要以安全的方式使用数字印章。可以使用比特币或区块链技术创建安全的时间戳数字签名。


    所有数字签名都使用哈希函数。这些方法接受任何文件，并生成固定长度的指纹，这是一种唯一标识该文件的代码。任何有权访问该文件的人都可以生成该代码；然而，根据代码重构文件则非常困难。

    '
- fmt: '# 2.2 Applications Using Blockchain


    Blockchain has great potential to change business strategies and models in the
    long run. Moreover, blockchain is an enabling technology that could create new
    technologies and new foundations for the global economy and social environments,
    rather than a disruptive technology that attacks the traditional business model.


    The use of blockchain promises an important improvement for worldwide supply chains,
    financial and marketing transactions, accounting, and distributed social networks.
    This new technology can be integrated into various sectors, and its protocols
    make it easier for companies to adopt new methods for processing and managing
    digital transactions.


    Some examples include money payment systems and digital currencies that facilitate
    crowd sales, implementation of the prediction market, and generic governance tools.
    Blockchain can be used to certify the date of a document and verify that it has
    not been tampered with. This application of blockchain, obtained by inserting
    the hash of the documents to be certified, is called *notarization*. An example
    of this is the notarization of the movements of trucks that are transporting land
    from a construction site, in order to ensure compliance with environmental standards.


    Blockchain can address the need for a fiduciary service provider and ensure that
    less litigation capital is incurred. It has the potential to remove systematic
    risk and financial fraud. It can automate various processes that previously had
    to be done manually for a long time, such as business integration.


    In general, most blockchain applications involve cryptocurrencies such as `Bitcoin`,
    `Blackcoin`, `Dash`, and `Nxt`, and so on. Its center ledger system stores all
    the transactions. A decentralized voting mechanism is used to understand the transaction.


    This new distribution method is also applicable and available in the insurance
    and bank sectors. These sectors are interested in this emerging technology, because
    the transactions are quick and very secure.


    The collaborative economy and the Internet of Things (IoT) technologies can also
    benefit from blockchain technology by engaging many like-minded people in online
    collaborative voting applications.


    Blockchain can also be used to build information systems for medical staff to
    increase their interoperability and security. Several blockchains have also been
    developed for storing data, publishing text, and identifying the origin of digital
    art. For example, a bank has opened research centers dedicated to blockchain to
    study the various implications of this new technology on financial services with
    the goal to improve efficiency and reduce costs. Another application has been
    proposed to share wireless networks.


    ## 2.3 Why Blockchain Matters


    Businesses depend on information. In the business world, the faster and more accurate
    that information is, the better. Blockchain is ideal for providing this type of
    information because it provides instant, sharable, and fully transparent data
    that’s stored in an unchangeable ledger. Only authorized individuals can view
    the data.


    Additionally, a blockchain network can trace orders, money transactions, account
    ledgers, and production processes, among other things. Because members share a
    common information that is contained in the blockchain, it’s also possible to
    see all the data of an end-to-end transaction (it’s fully transparent to all the
    parties), leading to higher trust as well as new improvements and future uses.


    ## 2.4 Summary


    In this chapter, you learned the basic concepts underlying blockchains, distributed
    ledgers, and timestamping documents. You also gained an understanding of why these
    technologies are important in the market, and how they’ve developed in recent
    years. The next chapter focuses on Bitcoin.


    # 3. Bitcoin


    In the previous chapter, you saw how blockchain technology, without the need for
    a central authority, and thanks to the techniques and algorithms discussed, can
    establish trust between participants and certify the *immutability* of a distributed
    ledger. The blockchain lends itself to being an ideal model for digital currencies,
    where there is no need for intermediaries and third parties such as banks, insurance
    companies, and other central organizations. In fact, blockchain was born and spread
    thanks to Bitcoin.


    In 2008, a person (or group of persons) named Satoshi Nakamoto released a research
    paper entitled “Peer-to-Peer Electronic Cash System in Bitcoin.” This paper described
    a peer-to-peer cash system that permitted network transactions to be sent directly
    from one part to another without going through any intermediaries/banking organizations.
    It explains Bitcoins in great detail.


    The term cryptocurrency describes all the systems, networks, and media that use
    cryptography to protect digital transactions, compared to those systems where
    transactions are managed through a common trusted entity.


    This chapter covers the *Bitcoin protocol*. It analyzes in detail the main parts
    that compose it—the public and private keys, the Bitcoin addresses, and the blocks.
    The chapter then illustrates the network and consensus mechanisms, including the
    proof of work.


    ## 3.1 The History of Bitcoin


    Almost all of the technological parts of Bitcoin were born in academic publications
    of the 1980s and 1990s. “We need to emphasis that our aim is not to reduce the
    work and success of Nakamoto, but only to emphasize what the real leap of intuition
    was. Indeed, by tracking the initial of ideas present in Bitcoin, we can focus
    on the specific and complex way they come put together the underlying components”.^([¹](#fn1))


    Bitcoin’s history doubles as a case study, as it proves relationships between
    the academic world, external scientists, engineers, and professionals and shows
    on how these teams can gain knowledge from each other. Many professionals have
    studied Bitcoin and have produced numerous research papers.


    Note that the ledger idea is the initial starting point for Bitcoin. If you understand
    the ledger, you will understand the system’s structure and its communication.
    The ledger is the place where all the transactions take place. It’s open and trusted
    by all parties and components in the system (see Figure [3-1](#520777_1_En_3_Chapter.xhtml#Fig1)).


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig1_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig1_HTML.jpg)


    **Figure 3-1** The main ideas behind Bitcoin


    In order to support a digital currency, the ledger must have these fundamental
    properties:


    - **Append-only:** It is only possible to add new transactions to the ledger.
    It is not possible to abandon, modify, or reorder the existing ledger.

    - **Immutable:** The information present cannot be changed in the ledger.

    - **Prevents double spending:** It is not possible to spend the same currency
    security more than once.'
