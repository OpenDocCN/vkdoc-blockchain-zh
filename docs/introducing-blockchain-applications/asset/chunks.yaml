- fmt: "# 12.3 Review Questions\n\n1. “`BLOCKLY` is a library for creating applications\
    \ with blocks. Users can utilize visual blocks to construct scripts and programs\
    \ in block programming.” Is this statement correct or incorrect?\n\n2. Which of\
    \ the following describes `BLOCKLY 4SoS`?\n    1. Each block represents a portion\
    \ of code that can be layered and converted into a metamodel with ease.\n    2.\
    \ Each block represents a portion of code that could be stacked and converted\
    \ into an algorithm with ease.\n    3. Each block represents a coding chunk that\
    \ can be readily stacked and translated.\n    4. All the above.\n\n3. Which of\
    \ the following statements is correct for *simulator* components?\n    1. A simulator\
    \ is a collection of Python programs that are used to run the designer’s intended\
    \ scenarios.\n    2. A simulator is a collection of programs designed to carry\
    \ out the designer’s planned scenarios.\n    3. A simulator is a collection of\
    \ Java applications that are used to run the scenarios that the designer has prepared.\n\
    \    4. None of the above.\n\n4. Which of the following statements is correct\
    \ for *event*?\n    1. `BLOCKLY` comes with everything you need to create and\
    \ render blocks in a drag-and-drop editor.\n    2. `BLOCKLY` comes with everything\
    \ you need to define and display blocks.\n    3. `BLOCKLY` comes with everything\
    \ you need to create and render blocks in an editor.\n    4. All of these.\n\n\
    5. “Requirements management is a crucial component of the SoS architecture, since\
    \ it allows for the viewing and monitoring of requirement traceability. The perspective\
    \ and building blocks can be used to split requirements.” Is this statement correct\
    \ or incorrect?\n\n## 12.4 Review Answers\n\n1. Answer: Correct, `BLOCKLY` is\
    \ a library for developing block-based apps. In block programming, users can use\
    \ visual blocks to create scripts and programs.\n\n2. Answer: C, Every block represents\
    \ a coding chunk that could be readily stacked and translated.\n\n3. Answer: B,\
    \ A simulator is a collection of programs designed to carry out the designer’s\
    \ planned scenarios.\n\n4. Answer: A, `BLOCKLY` comes with everything you need\
    \ to create and render blocks in a drag-and-drop editor.\n\n5. Answer: Correct,\
    \ because it enables for the viewing and monitoring of requirement traceability,\
    \ requirements management is a critical component of the SoS design. To divide\
    \ needs, the viewpoint and building blocks can be employed.\n\n## 12.5 Summary\n\
    \nThis chapter explained the `BLOCKLY 4SOS` tool. It is a system-of-systems modeling,\
    \ validation, querying, and simulation tool. The goal of the AMADEOS supporting\
    \ facility is to make designing SoS with the AMADEOS ideas and the `BLOCKLY` tool\
    \ simple and intuitive. This tool is very helpful when designing a distributed\
    \ system (a cyber-physical system). The next chapter outlines the first project\
    \ of cyber-physical systems with the help of Kilobots.\n\nFootnotes [1](#520777_1_En_12_Chapter.xhtml#Fn1_source)\n\
    \n# 13. Cyber-Physical Systems Project\n\nIn this chapter, you learn how to develop\
    \ a cyber-physical system based on an Italian game called Witch Calls Color. This\
    \ game has the following rules:\n\n- One player is picked to be the witch.\n-\
    \ They call out a color, such as blue.\n- The other children then run to touch\
    \ an object of that color. (Clothes are not included, and only one person can\
    \ touch an object.)\n- If the witch catches a child who is not touching the color,\
    \ they become the next witch. Then the original witch joins the other kids.\n\n\
    You are going to implement this project with the help of Kilobots. The movement\
    \ of the witch and the color are implemented in Kilobots.\n\n## 13.1 Using Kilobots\n\
    \nThe *Kilobot* cluster is a cluster of 1,000 robots that may be used to create\
    \ collective behavior that is automatic and has a long duration. Each robot has\
    \ the basic functions of an autonomous swarm robot, but it is made up of a restricted\
    \ number of pieces and assembled mostly by an automatic system. Additionally,\
    \ the system design allows a single individual to operate a huge Kilobot cooperative\
    \ in an efficient and scalable manner, including programming it, turning it on,\
    \ and refilling all the robots. The Kilobot swarm is used to investigate collective\
    \ \"virtual\" intellect and to test innovative theories that link minimal personal\
    \ qualities to cluster characteristics. See Figure [13-1](#520777_1_En_13_Chapter.xhtml#Fig1).\
    \ Using a mixed concept technique, you can obtain new algorithmic understanding\
    \ about robustness, adaptability, personality, and an emerging in groups of limited\
    \ individuals.\n\n### 13.1.1 The Kilobots Movements\n\nThe following list shows\
    \ the basic Kilobots movements:\n\n- Upward motion\n- Characteristics of rotating\n\
    - Keeping in touch with adjacent units\n- Computing the difference between adjacent\
    \ units\n- Having sufficient RAM to execute the Kilobots\n\nThe following extra\
    \ parts were added to the Kilobot to expand its implementation:\n\n![../images/520777_1_En_13_Chapter/520777_1_En_13_Fig1_HTML.jpg](images/520777_1_En_13_Chapter/520777_1_En_13_Fig1_HTML.jpg)\n\
    Figure 13-1: A Kilobot\n\n- The capacity to estimate the amount of light in the\
    \ environment\n- Making the operations more flexible\n\n## 13.2 Project Requirements\n\
    \n### 13.2.1 Architecture\n\n1. The Kilobots will operate in a space of at least\
    \ 100x80cm.\n2. The surface should be glossy and reflective for the infrared to\
    \ work properly.\n3. The SoS is composed of at least five Kilobots and a controller\
    \ (one witch, two players, and two colors).\n4. At the beginning of the program\
    \ execution, there are assigned positions for the Kilobots.\n5. Each Kilobot has\
    \ an ID, color, and positions.\n6. When the game starts, the player searches for\
    \ the color and the witch searches for the player.\n7. The witch and player Kilobots\
    \ are waiting for the signal to each other to run.\n8. The target color is chosen\
    \ by the program.\n9. During the game, all of the Kilobots are searching for each\
    \ other.\n10. During the game, the witch is trying to catch the players and the\
    \ players are searching for the color. If the witch catches a player, that player\
    \ will be the witch in the next round.\n11. The round is finished when the Kilobots\
    \ catch the color.\n12. Each Kilobot has two independent motors.\n13. Each Kilobot\
    \ has an infrared transmitter and receiver.\n14. The Kilobots can estimate relative\
    \ distance from other bots from the environment.\n15. The Kilobots will operate\
    \ in one of at least three states: run, bootload, or sleep.\n16. Through a message\
    \ interface, each Kilobot can communicate with every other Kilobot.\n\n### 13.2.2\
    \ Project Communication\n\n1. The Kilobots can receive messages from the overhead\
    \ controller.\n2. The Kilobots are communicating when they are within 7.5cm distance\
    \ of each other.\n3. The connection between all the Kilobots is established at\
    \ the beginning of each round.\n4. There should be a unique Kilobot operating\
    \ as a central communication coordinator.\n\n### 13.2.3 Time\n\nEach Kilobot will\
    \ have a time-based internal clock. Kilobots can communicate over the network\
    \ within 10 seconds of every message sent.\n\n### 13.2.4 Dynamicity\n\nA Kilobot\
    \ moving out of the range of communication will start moving to find the other\
    \ Kilobots in order to become a part of the network again.\n\n### 13.2.5 Dependability\n\
    \n1. Availability: A charged battery is necessary for Kilobots.\n2. Reliability:\
    \ The Kilobots can start each game round only when they can communicate with all\
    \ the others because they don’t provide the necessary service.\n3. Integrity:\
    \ It is fundamental that the SoS doesn’t have an improper state to function correctly."
