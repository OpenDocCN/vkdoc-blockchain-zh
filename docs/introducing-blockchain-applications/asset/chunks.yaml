  trans: '

    # 4. 以太坊


    比特币区块链模型已被证明是一种适用于加密货币的有效范式，这激发了人们对区块链在各个应用领域的研究和兴趣，并使其日益受到关注。


    维塔利克·布特林（Vitalik Buterin）很早就意识到了区块链模型的潜力。他认为其远不止是一个加密货币平台。


    对比特币的热情促使他在 17 岁时与米哈伊·阿利西（Mihai Alisie）共同创办了*《比特币杂志》*，这是一家涵盖比特币相关话题的网站和印刷杂志。维塔利克很快意识到，区块链技术所能做到的远不止于此。


    2013 年，他宣称比特币需要一种脚本语言，用于开发和创建*去中心化应用程序*。


    在未能说服比特币社区后，他开始基于区块链技术开发一个新的分布式信息平台。于是，以太坊于 2015 年 7 月 30 日诞生，并引入了一项名为*智能合约*的新功能。


    新一代区块链由此开启，并且至今仍是最为突出的——即区块链 2.0。


    请参考图 4-1，其中对比了比特币和以太坊。左侧是比特币，其堆栈顶层是用于进行转账操作的**钱包**应用程序。右侧是以太坊，它将区块链转变为一个计算系统框架或架构，并在去中心化领域开启了一个充满机遇的全新世界。注意，以太坊支持智能合约以及运行这些合约的以太坊虚拟机（EVM）。而智能合约则进一步实现了超越单纯价值转移的去中心化应用程序。通过这种方式，区块链被注入了逻辑和计算能力。


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig1_HTML.jpg](img/520777_1_En_4_Fig1_HTML.jpg)


    图 4-1

    比特币与以太坊堆栈对比


    以太坊用户不仅可以通过交易转移数字货币，还能开发智能合约，从而在特定条件下执行交易。从各方面来看，他们可以为价值转移的方式设定条件。可以理解，“可编程货币”的理念吸引了世界各地的用户、开发者和公司。


    此外，开发者还可以实现并创建在以太坊区块链分布式网络中运行的应用程序，即去中心化应用程序。


    有了以太坊，区块链成为一个去中心化的 IT 平台。在此平台上，除了转移数字货币，还可以分发新的应用程序，并与网络中的其他用户进行交互。


    任何人都可以编写新的应用程序在区块链网络上运行，而非在中心化服务器上。这不仅意味着可以规避任何来自中央权威的审查，而且还能抵御篡改，并允许所有用户在与应用程序交互之前检查其代码。


    借助以太坊，区块链的应用范围当然不局限于金融领域；它还可以应用于选举系统、域名注册、众筹平台和知识产权等领域，仅举几例。


    简而言之，以太坊是一个具有革命性和远见的项目。它除了被公认为最佳在线投资之一外，还为其年轻的创始人带来了世界声誉。这项发明在 2014 年获得了享有盛誉的世界技术奖。


    本章将详细介绍定义以太坊区块链的组件和技术。


    ## 4.1 区块链作为状态转换系统


    *以太坊区块链*是一个开源的公共区块链。以太坊实现的模型可以用三个定义来概括：


    *   **密码学安全：** 账本中的信息安全由复杂的数学算法和难以破解的密码学技术保证。换句话说，几乎不可能欺骗这个系统。


    *   **交易单例机器：** 根据其构建范式，系统中存在一个单一的、规范的机器实例，负责处理系统中生成的所有交易。存在着一个所有人都相信的全局真相。


    *   **共享状态：** 此机器中存储的状态是共享的，并且所有参与者都可访问。


    因此，以太坊区块链的范式是一个密码学安全的、共享状态的交易单例机器。以太坊区块链本质上是一个基于交易的状态机。


    状态机是一个由状态和转换组成的图。


    *   **状态**描述了一个对象在其生命周期中的某段时间，由顶点或*节点*表示。


    *   **转换**连接两个状态，由有向弧表示。


    状态的退出定义了对象对事件发生的响应。事件是在时间和空间中发生的某种现象的反复出现。


    因此，状态机是一个自动机，它根据一系列输入数据改变其内部状态。（见图 4-2）


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig2_HTML.jpg](img/520777_1_En_4_Fig2_HTML.jpg)


    图 4-2

    有限状态机示例


    由此，你可以推导出：


    *   区块链的状态是账本中所有交易的集合。

    *   区块链中的事件，例如创建一笔交易。

    *   区块链中的交易函数，它接收一个状态和新交易，并生成一个新状态。


    所以，令 `S` 为一个状态，`TX` 为一笔交易，`APPLY` 为状态转换函数。它可以被正式定义为：


    `APPLY (S; TX) -> S0` 或 `ERROR`


    注意，以太坊的状态机从一个创世状态开始，类似于网络中尚未进行任何交易时的空列表。


    为了引起从一个状态到另一个状态的转换，交易必须是有效的。当各种交易被执行时，这个创世状态会随时间推移转换到后续状态。（见图 4-3）


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig3_HTML.png](img/520777_1_En_4_Fig3_HTML.png)


    图 4-3

    基于交易的状态转换


    在任何交汇点，最终状态都代表了以太坊的全局状态。


    以太坊的全局状态包含交易。这些交易被分组到区块中。每个区块包含一定数量的交易，并链接到前一个区块。见图 4-4


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig4_HTML.png](img/520777_1_En_4_Fig4_HTML.png)


    图 4-4

    交易流程


    从技术角度来看，总账可以被视为一个状态转换系统。其中存在一个包含所有总账交易的状态，以及一个接收状态和交易并返回新状态的转换函数。


    例如，在传统的银行系统中，状态是账户余额表，交易是将 `X` 金额从账户 `A` 转移到账户 `B` 的请求，而状态转换函数则是减少账户 `A` 中的 `X`
    金额，并增加账户 `B` 中的 `X` 金额。


    如果账户 `A` 的余额开始时少于 `X`，那么状态转换函数会报错。令 `TX = 从 Luca 向 Sara 发送 70`。


    `APPLY ((Luca: e50; Sara: e50); TX) = ERROR`


    或者，令 `TX = 从 Luca 向 Sara 发送 e20`。


    `APPLY ((Luca: e50; Sara: e50); TX) = Luca: e30; Sara: e70`

    '
- fmt: '# 4.2 Ethereum Account


    In Ethereum, the state is a buildup of objects called *accounts* that play a central
    role. There are two types of accounts:


    - Externally owned accounts (EOA)

    - Contract accounts


    In general, the EOAs are user accounts and are controlled by private keys and
    have no code associated with them. But contract accounts are controlled by their
    contract code and have an associated code. (See Figure 4-5.)


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig5_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig5_HTML.jpg)


    Figure 4-5 — Ethereum account


    ## 4.2.1 The Account State


    This account status is made up of four elements that are present regardless of
    the account type: (See Figure 4-6.)


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig6_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig6_HTML.jpg)


    Figure 4-6 — Account status in Ethereum


    - **Nonce (number only used once):** If the account is owned by a third party,
    this number indicates how many transactions have been sent from the account address.
    The nonce is then the number of contracts created by the account if it is a contract
    account.

    - **Balance:** This is the `Wei` number that this address owns. One ether is equal
    to `10^18`.

    - **MemoryRoot:** A 256-bit hash of the root node of a Merkle tree Patricia (refer
    to Chapter 2). This tree encodes the hash of the storage account of this account
    and is empty by default. For contract accounts, this is smart contract storage.

    - **CodeHash:** This is the hash code of an EVM (Ethereum Virtual Machine) account.
    For the contract account, this is the code that is hashed and stored as a `codeHash`.
    For external owned accounts, the `codeHash` is the hash of the empty string.


    ## 4.2.2 Externally Owned Accounts (EOAs)


    Externally owned accounts:


    - Have an Ether balance.

    - Can send to the transactions (they either transfer or activate the code of a
    contract).

    - Are controlled by the private key.

    - Do not have an associated code.


    Note that every account is defined by a key pair—a private key and a public key.
    Like Bitcoin, Ethereum also uses ECDSA (Elliptic Curve Digital Signature Algorithm).
    Ethereum also uses the curve dictated by standard `secp256k1`.


    You should already know how private keys and respective public keys work. However,
    Ethereum differs from Bitcoin by the generation of an *Ethereum address*.


    These, like Bitcoin, are derived from the public key. However, to this the hash
    function `Keccak 256` is applied. From the result of this function, you have the
    *public key hash*. From this you take the 20 bytes farther to the right and you
    will get the Ethereum address. All Ethereum addresses start with the `0x` prefix.


    - Accounts are indexed based on their address.

    - Creating an external ownership account has no cost.

    - An EOA uses transactions (or messages, as you’ll see) to interact with the Ethereum
    blockchain network.

    - They can send transactions to transfer digital money to other accounts of external
    property.

    - They can be send to a transaction to a contract account to invoke a smart contract.


    ## 4.2.3 Contract Accounts


    A contract account represents a smart contract, which means:


    - It has an address.

    - It has an Ether balance.

    - It has an associated code.

    - It is controlled by the associated code.

    - The execution of the code is triggered/invoked by transactions or messages (calls)
    received from other accounts (EOAs or contract accounts).

    - Once executed, it performs operations of arbitrary complexity (Turing complete)
    and manipulates its own persistent archive; it can have its own permanent state
    it can call other contracts.


    The contract address is generated by hashing the SHA-3, also called `Keccak-256`,
    the address of the sender’s account and their nonce, and taking the rightmost
    20 bytes of this result. Contract accounts have a cost both in creation and in
    use (execution), because they use computational resource and network storage.


    ## 4.2.4 Differences Between Externally Owned and Contract Accounts


    First of all, it is good to clarify that to participate in the Ethereum network,
    an external ownership account is required. Furthermore, any type of message sent
    through the Ethereum network has a cost because it uses computational and archiving
    resources.


    That means an external owned account can send or deliver the messages to other
    account owned externally or to other contract creating accounts. (See Figure 4-7.)


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig7_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig7_HTML.jpg)


    Figure 4-7 — Transaction from EOA


    That means a message between two external owned accounts is simply a transfer
    of value.


    However, a message from an owned account external to a contract account activates
    the contract account code, allowing it to perform various actions (examples include
    transfer tokens, write to internal memory, mint new tokens, run some calculations,
    create a brand-new contracts, etc.).


    In other words, through a message from an ownership account external to a contract
    account invokes a smart contract. (See Figure 4-8.)


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig8_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig8_HTML.jpg)


    Figure 4-8 — Transaction example of account contracts


    Unlike externally owned accounts, the contract accounts won’t be able to start
    new transactions. On the contrary, the accounts of the contracts can generate
    transactions only in response to different transactions received (from an external
    ownership account or another contract account). You will find out more about contract
    calls in the section entitled “Transaction and Message.”


    Hence, any action that occurs on the Ethereum blockchain is always activated by
    transactions activated by externally regulated accounts.'
