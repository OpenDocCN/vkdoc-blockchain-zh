    \ blockchains that process blocks quickly.\n\nThe solution adopted by Ethereum\
    \ is to provide a reduced reward for latent blocks. Not only that, but they also\
    \ provide a reward for grandchildren blocks that include latent blocks.\n\nThe\
    \ simplified version of Ethereum’s GHOST protocol is defined like this:\n\n* \
    \  A block must specify a previous block, and 0.1 or 2 ommer block.\n\n*   An\
    \ ommer block included in a block should have these properties:\n    *   It must\
    \ be direct child of the k-generation parent of B, with k between two and seven.\n\
    \n    *   So, it should not be a progenitor of B.\n\n    *   It should be a valid\
    \ block.\n\n    *   The ommer block should be varied from all included ommers\
    \ in the last blocks and by all the other ommers included in the same block.\n\
    \nThere are two reasons that ommers can be included in up to seven generations:\n\
    \n*   A GHOST with no generation limits would bring complications in calculating\
    \ which ommers are valid for a certain block.\n\n*   An unlimited GHOST, moreover,\
    \ as implemented in Ethereum, would eliminate the incentive of miners to mine\
    \ the main chain, and not that of an attacker."
  trans: "\n# 4.10 区块结构\n\n以太坊区块链的一个区块分为以下部分：\n\n- 区块头\n- 叔块头列表\n- 区块数据\n\n叔块头的格式与前述相同。（见图\
    \ 4-32。）\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig32_HTML.jpg](img/520777_1_En_4_Fig32_HTML.jpg)\n\
    \n图 4-32 区块结构\n\n叔块头列表用 `B[U]` 表示，交易列表用 `B[T]` 表示。因此，正式地，我们将区块 `B` 表示如下：\n\n`B\
    \ = (B[H]; B[T]; B[U])`\n\n请记住，以太坊中的每棵树都是修改版默克尔帕特里夏树（Modified Merkle Patricia\
    \ trie），这在世界状态（World State）一节中有详细阐述。\n\n这种方法乍看起来可能非常低效，因为每个区块都必须捕获整个状态，但实际上，每个区块之后只需改变其中极少部分数据。由于所有状态信息都是最终区块的一部分，因此无需记录区块链的完整历史。\n\
    \n通常，两个相邻区块之间的大部分树结构是相同的，因此只需记录一次信息，并通过哈希指针引用两次。此外，值得补充的是，智能合约的代码执行过程由一个交易生成，该交易通过状态计算或状态转换函数来执行。\n\
    \n根据区块验证算法，如果计算或交易被添加到名为 `X` 的区块中，则由该交易生成的代码执行将在网络的所有节点上执行，从而验证并添加 `X` 区块。\n\n\
    图 4-33 总结了这些以太坊区块。\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig33_HTML.jpg](img/520777_1_En_4_Fig33_HTML.jpg)\n\
    \n图 4-33 以太坊中的区块结构\n\n## 4.10.1 交易收据\n\n每笔交易在执行并验证后，都会改变区块链的状态。因此，每笔有效交易都会产生一个结果。交易收据记录了每笔交易的结果。每个计算或交易收据是一个由四个元素组成的元组：\n\
    \n- `Ru`：累计消耗的 gas\n- `Rl`：通过交易执行生成的一组日志\n- `Rb`：由这些日志中的信息组成的布隆过滤器\n- `Rz`：交易后的状态\n\
    \n因此，交易收据定义如下：\n\n`R = (R[u]; R[b]; R[l]; R[z])`\n\n## 4.10.2 叔块\n\n与比特币相比，以太坊的区块处理时间要短得多。一方面，这允许更快速地处理交易；另一方面，多个矿工可能同时解出更多的区块。这些并发的区块被称为**叔块**。\n\
    \n叔块不会进入主链。然而，将这些区块整合到已获得主区块链位置的主块中，其目标是帮助奖励生成这些区块的矿工。\n\n为了使矿工因叔块而获得奖励，该叔块必须是有效的。因此，叔块的目标是奖励表现良好的矿工，同时奖励孤块。\n\
    \n这具有双重效果：\n\n1.  **促进网络去中心化。** 事实上，即使是那些因以下原因挖出孤块的矿工也能获得奖励：\n    -   更大的网络延迟，导致数据传播延迟\n\
    \    -   更低的算力，导致挖出区块的难度更大\n        -   这减少了中心化趋势，并避免了拥有更高算力的矿池攫取大部分奖励，而对个体矿工毫无保留。\n\
    \n2.  **通过增加主链的工作量来提高链的安全性。** 从而减少工作量浪费。\n\n赢得主链位置的区块，通常是拥有最大工作量证明份额的区块。而叔块则是通常共享较少工作量证明的区块。每个区块最多可以包含两个叔块。\n\
    \n## 4.11 以太坊简化版 GHOST 协议\n\nGHOST 协议旨在为区块处理速度极快的区块链提出一种解决方案。事实上，确认时间极快的链会受到“降低的”安全性的影响，因为矿工挖出的区块在网络中传播得更慢。\n\
    \n基本上，解决方案是将潜在区块纳入主区块链的计算中。\n\n此外，产生快速区块的区块链很容易面临向拥有高比例网络哈希率的矿池中心化的风险，从而控制挖矿过程。\n\
    \n为了避免这种情况，以太坊采用了 GHOST 协议的**简化版本**，它能够克服困扰快速处理区块的区块链的两个问题。\n\n以太坊采用的解决方案是为潜在区块提供降低的奖励。不仅如此，它们还为包含这些潜在区块的“孙子辈”区块提供奖励。\n\
    \n以太坊简化版 GHOST 协议定义如下：\n\n-   一个区块必须指定一个父区块，以及 0、1 或 2 个叔块。\n-   包含在某个区块中的叔块应具备以下属性：\n\
    \    -   它必须是 `B` 的 k 代祖先的直接子块，其中 `k` 介于 2 和 7 之间。\n    -   因此，它不能是 `B` 的祖先。\n\
    \    -   它必须是一个有效区块。\n    -   该叔块必须与之前区块中包含的所有叔块以及同一区块中包含的所有其他叔块不同。\n\n叔块可以被包含在最多七代之内，有两个原因：\n\
    \n-   没有代际限制的 GHOST 协议会给计算特定区块的哪些叔块有效带来复杂性。\n-   此外，如果像在以太坊中实现的那样采用无限制的 GHOST\
    \ 协议，会削弱矿工挖主链的动力，转而偏向攻击者的链。\n"
- fmt: "# 4.12 Ethereum Consensus\n\nLet’s see how, even here, it turns out to be\
    \ an emerging consensus, and Ethereum bases its consensus on Proof of Work (POW).\n\
    \nThe POW algorithm used by Ethereum is the `Ethash`, which is based on the `Keccak-256-bit`\
    \ cryptographic hash function.\n\nAs you have already seen, when a transaction\
    \ is created and signed, before being transmitted to the network, it is validated\
    \ locally through the local Ethereum node.\n\nThis validation includes the following\
    \ checks:\n\n*   The structure and syntax of the transaction is well formed.\n\
    *   The digital signature is consistent with the sender’s address and the content\
    \ of the transaction.\n*   The `nonce` value of the transaction must be valid.\
    \ To be valid, the `nonce` of a transaction must match the `nonce` of the sender’s\
    \ account.\n*   The sender has enough ether to finance the gas of the transaction.\n\
    *   The data sent is consistent and well-formed and therefore does not cause failures\
    \ of any operations invoked.\n\nIf one of these validation steps fails, then the\
    \ transaction will fail and be transmitted to the network. Instead, if so, it\
    \ is spread across the network through neighboring nodes. Each node that will\
    \ receive a transaction is carried out in turn a verification of the validity\
    \ of the transaction.\n\nAgain, if successful, this will be passed on through\
    \ the network, otherwise ignored. This way you avoid clogging the network with\
    \ invalid transactions that, therefore, would not lead to any change of state.\n\
    \nWhen these reach the miners, they validate them and add them to the transaction\
    \ pool. In fact, miners, as in Bitcoin, keep a pool of transactions locally, waiting\
    \ to be added to a candidate block.\n\nMiners choose the transactions to add to\
    \ the block based on various criteria, but primarily based on the fees that a\
    \ transaction offers. Miners have a gas limit per block, which they cannot breach.\n\
    \nThen they choose a number n of transactions to add in block, and they apply\
    \ the transition function for each of these status\n\n```\nAPPLY (S; TX) -> S\
    \ or ERROR\n```\n\nSo the miner can finally build the block with the new state\
    \ `S0`, fill in the fields, and solve the PoW puzzle we talked about in the Nakamoto\
    \ Consensus section in the chapter dedicated to Bitcoin. Once the puzzle is solved,\
    \ the miner can pass the block to the net. Each node that will receive the block\
    \ will then validate the latter. The basic block validation algorithm in Ethereum\
    \ works in the following way:\n\n*   Check if the previous reference block still\
    \ exists and is valid.\n*   See if the timestamp of the block is larger than that\
    \ of the previous and lower reference block of 15 minutes in the future.\n*  \
    \ Verify whether the block number, difficulty, transaction origin, derivative\
    \ transaction, and gas limit are valid.\n*   Verify if the POW on the block is\
    \ still valid.\n*   `S [0]` can be the state at the end of the last block and\
    \ `TX` can be the list of the computations or transactions of the block, with\
    \ n steps.\n\nFor `i = 0 ... n - 1`, set `S (i+1) = APPLY (S (i); TX (i))`.\n\n\
    Then check if the application gives an error or if the final or total gas consumed\
    \ in the block up to this point go beyond the `GASLIMIT`; this too gives an error.\n\
    \n*   Assume that `S FINALS (n)`, however adding the block reward paid to the\
    \ miner block.\n*   Need to verify that the original state of the Merkle tree\
    \ `S_FINAL` is the same in the original final step or state given in the header\
    \ of the block. In such a case, the block is valid; on the other hand, it’s not\
    \ valid.\n\n### 4.12.1 The Proof of Work Algorithm (PWA)\n\nThe PWA is formally\
    \ defined as follows:\n\n`(n; m) = PoW (H; H[n]; d)`\n\nWhere\n\n*   `(n; m)`\n\
    \    *   `m` is a mixHash\n    *   `n` is the nonce\n*   `H` is the block header\
    \ without the nonce and without mixHash.\n*   `Hn` is the nonce defined as a cryptographically\
    \ pseudo-random number not independent on `H` and `d`.\n*   `d` is the DAG, and\
    \ it is a large set of data required to compute the mix-hash. Simply put, a miner\
    \ repeatedly spawns such mixHashes through the DAG, until the output has a lower\
    \ nonce value than the desired value.\n\nThe relationship between the nonce and\
    \ the difficulty of the block is formally defined here:\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Figc_HTML.png](images/520777_1_En_4_Chapter/520777_1_En_4_Figc_HTML.png)\n\
    \n## 4.13 Ethereum 2.0\n\nYou have seen that, as with Bitcoin, Ethereum is an\
    \ emerging consensus. The algorithm for extracting blocks used by Ethereum is\
    \ the *Proof of Work* algorithm.\n\nHowever, soon, there will be an upgrade from\
    \ Ethereum 1.0 to Ethereum 2.0. This update will not be immediate but will proceed\
    \ gradually through various stages.\n\nOne of the most important notes of this\
    \ update is innovation of the algorithm used to extract the blocks. In fact, with\
    \ the upgrade to Ethereum 2.0 there will be a transition to the Proof of Stake\
    \ algorithm. The Proof of Work is an algorithm for extracting blocks that entails\
    \ a computational burden no less. In order for it to be possible to win a block,\
    \ you need the necessary computational power from expensive and specialized hardware.\n\
    \nThis leads to a very high energy consumption with consequences on pollution.\
    \ So, in summary, the problems related to PoW are:\n\n*   It is a very inefficient\
    \ process due to the number of computational resources and the energy it requires.\n\
    *   People and organizations who can afford more powerful hardware to carry out\
    \ PoW are more likely to use it than the others, which means there is a risk of\
    \ centralizing the mining process at organizations.\n\nFigure [4-34](#520777_1_En_4_Chapter.xhtml#Fig34)\
    \ shows a statistical example of the distribution of mining power within the Ethereum\
    \ network.\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig34_HTML.png](images/520777_1_En_4_Chapter/520777_1_En_4_Fig34_HTML.png)\n\
    \nFigure 4-34 — Distribution of the hash rate in Ethereum\n\nTherefore, from the\
    \ image it is clear that more than 51% of the total mining power of Ethereum is\
    \ in the hands of three organizations. To solve these problems, Ethereum considered\
    \ Proof of Stake as a solution.\n\n## 4.14 Summary\n\nIn this chapter, you learned\
    \ about Ethereum and its structure (state and transaction functions). It explained\
    \ how Ethereum was created to enable developers to build and publish smart contracts\
    \ and distributed applications that can be used without downtime issues, fraud,\
    \ or interference from a third party. The next chapter will focus on the consensus\
    \ based on the Proof of Stake algorithm, on which research is deepening more and\
    \ more. More blockchains are considering switching to this algorithm consensus,\
    \ first of all Ethereum. The chapter ends by covering by Ethereum Casper, the\
    \ proof of stake the developers of Ethereum are implementing."
