  trans: '

    # 4.2 以太坊账户


    在以太坊中，状态是由被称为*账户*的对象累积而成的，这些对象扮演着核心角色。共有两种类型的账户：


    - 外部拥有账户（EOA）

    - 合约账户


    通常，EOA 是用户账户，由私钥控制，并且没有关联的代码。而合约账户由其合约代码控制，并且有关联的代码。（见图 4-5。）


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig5_HTML.jpg](img/520777_1_En_4_Fig5_HTML.jpg)


    图 4-5 — 以太坊账户


    ## 4.2.1 账户状态


    此账户状态由四个元素组成，无论账户类型如何，这些元素都存在：（见图 4-6。）


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig6_HTML.jpg](img/520777_1_En_4_Fig6_HTML.jpg)


    图 4-6 — 以太坊中的账户状态


    - **Nonce（仅使用一次的数字）：** 如果账户由外部拥有，此数字表示从该账户地址发送的交易数量。如果账户是合约账户，则 Nonce 是该账户创建的合约数量。

    - **Balance（余额）：** 这是此地址拥有的`Wei`数量。一个以太币等于`10¹⁸` Wei。

    - **StorageRoot（存储根）：** 一棵帕特里夏默克尔树（Merkle Patricia Tree，请参阅第 2 章）根节点的 256 位哈希值。此树编码了该账户的存储账户哈希值，默认为空。对于合约账户，这是智能合约存储。

    - **CodeHash（代码哈希）：** 这是 EVM（以太坊虚拟机）账户的哈希代码。对于合约账户，这是经过哈希并以`codeHash`形式存储的代码。对于外部拥有账户，`codeHash`是空字符串的哈希值。


    ## 4.2.2 外部拥有账户（EOA）


    外部拥有账户：


    - 拥有以太币余额。

    - 可以发送交易（它们可以转移资金或激活合约的代码）。

    - 由私钥控制。

    - 没有关联的代码。


    请注意，每个账户都由一个密钥对定义——一个私钥和一个公钥。与比特币类似，以太坊也使用 ECDSA（椭圆曲线数字签名算法）。以太坊也使用标准`secp256k1`规定的曲线。


    您应该已经了解私钥和相应公钥的工作原理。然而，以太坊在生成*以太坊地址*方面与比特币不同。


    这些地址与比特币一样，是从公钥派生出来的。但在此过程中，会应用哈希函数`Keccak 256`。从这个函数的结果中，您会得到*公钥哈希值*。从该哈希值中，取最右边的
    20 个字节，您将得到以太坊地址。所有以太坊地址都以`0x`前缀开头。


    - 账户基于其地址进行索引。

    - 创建外部拥有账户没有成本。

    - EOA 使用交易（或者如您将看到的消息）来与以太坊区块链网络交互。

    - 它们可以发送交易，将数字货币转移到其他外部属性账户。

    - 它们可以向合约账户发送交易以调用智能合约。


    ## 4.2.3 合约账户


    合约账户代表一个智能合约，这意味着：


    - 它有一个地址。

    - 它有一个以太币余额。

    - 它有关联的代码。

    - 它由关联的代码控制。

    - 代码的执行由从其他账户（EOA 或合约账户）接收的交易或消息（调用）触发/调用。

    - 一旦执行，它将执行任意复杂度的操作（图灵完备），并操作其自己的持久存储；它可以拥有自己的永久状态，并可以调用其他合约。


    合约地址是通过对发送方账户地址及其 nonce 进行 SHA-3 哈希（也称为`Keccak-256`），然后取此结果的最右边 20 个字节生成的。合约账户在创建和使用（执行）时都有成本，因为它们使用计算资源和网络存储。


    ## 4.2.4 外部拥有账户与合约账户的区别


    首先，需要明确的是，要参与以太坊网络，需要一个外部拥有账户。此外，通过以太坊网络发送的任何类型的消息都有成本，因为它会使用计算和存档资源。


    这意味着外部拥有账户可以向其他外部拥有账户或创建其他合约的账户发送或传递消息。（见图 4-7。）


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig7_HTML.jpg](img/520777_1_En_4_Fig7_HTML.jpg)


    图 4-7 — 来自 EOA 的交易


    这意味着两个外部拥有账户之间的消息仅仅是价值的转移。


    然而，从外部拥有账户发送到合约账户的消息会激活合约账户的代码，使其能够执行各种操作（例如，转移代币、写入内部存储器、铸造新代币、运行一些计算、创建全新的合约等）。


    换句话说，通过从外部拥有账户发送到合约账户的消息来调用智能合约。（见图 4-8。）


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig8_HTML.jpg](img/520777_1_En_4_Fig8_HTML.jpg)


    图 4-8 — 合约账户的交易示例


    与外部拥有账户不同，合约账户无法发起新的交易。相反，合约账户只能响应收到的不同交易（来自外部拥有账户或另一个合约账户）来生成交易。您将在“交易和消息”一节中找到更多关于合约调用的信息。


    因此，以太坊区块链上发生的任何操作，总是由受外部监管账户激活的交易触发的。

    '
- fmt: '### 4.2.5 Storing Key: Encrypted Keystore


    Every private key/address pair is encoded in a keyfile and the keyfiles are JSON
    text files. Additionally, the critical component of the keyfile, the private key
    of the account, is always encrypted with the password entered during the account
    creation.


    The keyfile is located in the `keystore` subdirectory of the data directory of
    the Ethereum node that created the account or imported it.


    The keystore uses the elliptic curve `secp256k1` as defined in the standards for
    efficient Encryption, implemented by the `libsecp256k` library and found at `github.com/ethereum/go-ethereum/accounts`.
    Accounts are stored on disk in the Web3 secret storage format.


    After creating an encrypted keystore for Ethereum accounts, you can use this account
    manager for all cycle requirements of the account life. This includes the basic
    features:


    - Creation of new accounts

    - Elimination of existing ones

    - Updating of access credentials

    - Export of existing accounts

    - Import to another device


    Although the keystore defines the encryption level used to store accounts, there
    is no global master password capable of granting access to everyone. Rather, each
    account is managed individually and is stored on disk in its individually encrypted
    format, ensuring separation is much cleaner and uses more rigorous credentials.


    This individuality means that any operation that requires access to an account
    must provide authentication credentials required for that particular account in
    the form of a passphrase:


    - When creating a new account, the caller must provide a passphrase with which
    to encrypt the account. This passphrase will be required for any subsequent access.

    - When deleting an existing account, the caller must provide a passphrase to verify
    account ownership.

    - When updating an existing account, the caller must provide both the current
    and the new passphrase. After completing the operation, the account will no longer
    be accessible via the previous passphrase.

    - When exporting an existing account, the caller must provide both a current passphrase
    to decrypt the account, and a passphrase to reencode it before returning the key
    file to the user. This is necessary to allow the movement of the accounts between
    machines and applications without sharing credentials.

    - When importing a new account, the caller must provide both the encryption passphrase
    of the keyfile to be imported and a new passphrase with which to store the account.
    This is necessary to allow the storage of accounts with different credentials
    than those used to move them.


    Therefore, there are no recovery mechanisms for the loss of a passphrase. The
    cryptographic properties of the encrypted keystore ensure that the account credentials
    cannot be brutally forced in any way. For account management, various Wallet apps
    are available to manage them efficiently.


    ## 4.3 World State


    The world state of the Ethereum blockchain is a mapping between the Ethereum address
    (160-bit identifiers) and the account state. This mapping is maintained through
    a data structure called the Modified Merkle Patricia tree. Let’s see what it is.


    ### 4.3.1 Trie


    A Trie, also called a *digital tree* or *prefix tree*, is a data structure ordered
    tree used to store a dynamic set or array associative where the keys are generally
    strings. In general, the position of a node in the tree defined the key that it
    is associated with. Nodes do not keep a copy of their own key, instead they depend
    on the position of the node in the tree. (See Figure [4-9](#520777_1_En_4_Chapter.xhtml#Fig9).)


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig9_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig9_HTML.jpg)


    **Figure 4-9** Example of a Trie


    The root of the tree is associated with the empty string, and all the descendants
    of a node share the prefix associated with that node. Not all nodes necessarily
    represent a significant key, which typically is found instead in the leaves and
    possibly in some internal nodes.


    ### 4.3.2 The Radix Tree


    Note that the Radix tree, also called a compact prefix tree or radix trie, is
    one data structure that represents a Trie in which space is optimized. In this
    tree, unlike the Trias, each leaf node is an only child and is joined with the
    parent node. (See Figure [4-10](#520777_1_En_4_Chapter.xhtml#Fig10).)


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig10_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig10_HTML.jpg)


    **Figure 4-10** Example of Radix tree


    Here the result is that the number of children of each internal node is at most
    the value `r`, a positive integer assigned to the radix variable of the radix
    tree. The value is a power of `2x`, where `x` is greater than or equal to 1. This
    makes radix trees much more efficient for sets where the keys are long strings,
    and for shared sets of keys with long prefixes. Thus, if radix equals 2, you get
    a binary Radix tree.


    Let `k` be the length of the keys. Radix trees allow searching, insertion, and
    elimination in time `O(k)`. This doesn’t seem to be an advantage, but they can
    perform these operations with fewer comparisons and require many fewer nodes than
    balanced trees.


    In general, Radix trees are useful for building associative arrays of keys that
    can be expressed as strings. They’ve particular application in IP routing, where
    the ability to contain large ranges of values with few numbers of exceptions is
    especially suited to the hierarchical organization of IP addresses.'
