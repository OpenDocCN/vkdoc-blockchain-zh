- fmt: "## 15.5 Cyber-Physical Modeling\n\nYou can find this model in the GitHub repository.\
    \ Look for the `final-model.xml` file in [`https://github.com/JosephThachilGeorge/Platoon-Project`](https://github.com/JosephThachilGeorge/Platoon-Project).\n\
    \nSince the XML file is large, this section explains a few parts of the code.\n\
    \nTo add a block modeling diagram, follow these instructions:\n\n1. Drag the block/workspace\
    \ with the mouse.\n2. Minimize/maximize/partially minimize a block by double-clicking\
    \ it.\n3. Drag and drop new blocks from the Toolbox from the left side.\n4. Add\
    \ related blocks to this block by clicking the (+) dropdown.\n5. Right-click the\
    \ block/workspace to see a menu.\n6. Close this comment by clicking the button.\n\
    \nAs you can see in the beginning of the project, the SOS organization has various\
    \ requirements. These requirements are shown in the XML file. These are the requirements\
    \ for the Cyber System of Systems (`CSoS`):\n\n```\n1. CSoS-1.4\n\nCSoS-1.4\n\n\
    CS / Kilobot\nCS : 3 : 1\n\njoinPlatoon\n+\nSatisfies requirement(s) :\n\n1. CSoS-1.4\n\
    2. CSoS-1.6\n\nCSoS-1.4,CSoS-1.6\n\nCS / Kilobot\nCS : 3 : 1\n\ndoNothing\n+\n\
    \nCS / Kilobot\nCS : 3 : 1\n\nSend OK\n == JOIN\n+\n+\n+\n+\n\nCS / Kilobot\n\
    CS : 3 : 1\n\nState variable / received_msg\nstate_variable : 112 : 1\n\nturn_check\n\
    ==1\n+\n+\n+\nSatisfies requirement(s) :\n\n1. CSoS-1.5\n\nCSoS-1.5\n\nCS / Kilobot\n\
    CS : 3 : 1\n\nState variable / is_turning\nstate_variable : 321 : 1\n\nsendOk\n\
    +\nSatisfies requirement(s) :\n\n1. CSoS-1.5\n\nCS / Kilobot\nCS : 3 : 1\n\ndoNothing\n\
    +\n\nCS / Controller\nCS : 2 : 1\n\n/next>\n\ndoNothing\n+\n\nCS / Kilobot\nCS\
    \ : 3 : 1\n\nAE-1\nWhiteboard width x height\nSatisfied by block(s) :\n\n```\n\
    \nThe message transfer is done with the help of `RUPI` (Relied Upon Physical Interface)\
    \ and `RUMI` (Relied Upon Message Interface). The message transfer from one Kilobot\
    \ to another is designed in this session.\n\n```\n1. RUMI : Message Exchange\n\
    \nCCS-3\nController RUMI\nSatisfied by block(s) :\n\n1. RUMI : Kilobot program\
    \ load\n\nCCS-4\nRUPI kilobot\nSatisfied by block(s) :\n\n1. RUPI : Calculate\
    \ Distance\n\nCSoS-1\nkbot-kbot RUMI utilization\nSatisfied by block(s) :\n\n\
    1. RUMI : Message Exchange\n\nCSoS-2\nLeader notification\nSatisfied by block(s)\
    \ :\n\n```\n\nIt also uses an Automated Surface Observing System (`ASOS`), which\
    \ observes the nearby cyber-physical system components. It has a security and\
    \ internal clock system, a controller, and dynamicity. An example is shown here:\n\
    \n```\n1. ASoS-3\n\nASoS-3\n\nController\nautonomous\n+\n+\n+\n+\n+\n+\n+\n+\n\
    +\n+\n+\n+\n+\n+\n+\n+\n+\n+\n+\nSatisfies requirement(s) :\n\n1. ASoS-2\n\nASoS-2\n\
    \nKilobot program load\nFALSE\n+\n+\n+\n+\n+\n+\n+\n+\n+\n+\n+\nSatisfies requirement(s)\
    \ :\n\n```\n\nAnother part of the XML file is `T1`, `T2`, `T3`, and `T4`, which\
    \ are transport messages. They help illustrate how messages transfer between `CCS-1`,\
    \ `CSoS-1`, `T-2` or `TI` or `T3` or `T4`.\n\n- `T-1`: The Kilobots measure time\
    \ according to a local clock.\n- `T-2`: Time-related events are triggered by message\
    \ exchange.\n- `T-3`: When a Kilobot starts, it will prepare motors for Mms.\n\
    \nThese requirements are designed with the help of the following code:\n\n```\n\
    3. T-2\n\nCCS-1,CSoS-1,T-2\n\nJOIN\nPAR_message\n  ?  \n  ?  \n+\n+\n\nLEAVE\n\
    PAR_message\n  ?  \n  ?  \n+\n+\n\nDIRECTION\nPAR_message\n  ?  \n  ?  \n+\n+\n\
    \nLeader Notify\nPAR_message\n  ?  \n  ?  \n+\n+\nSatisfies requirement(s) :\n\
    \n1. CSoS-2\n\nCSoS-2\n\nLOAD_PRGRM\nPAR_message\n  ?  \n  ?  \n+\n+\n\nRUMI /\
    \ Message Exchange\nRUMI : 63 : 0\n\nRUMI / Kilobot program load\nRUMI : 65 :\
    \ 0\n\nStarting Position = Straight line\n+\n+\nSatisfies requirement(s) :\n\n\
    1. T-3\n\nStarting Distance = 8 cm\n+\n+\n\nRunning Distance between 7 cm and\
    \ 9 cm\n+\n+\n\nkilo_uid\n  ?  \n+\n\nleader_uid\n\n+\nSatisfies requirement(s)\
    \ :\n\n1. T-1\n\nT-1\n\nreceived_msg\n  ?  \n+\n\nis_turning\n  ?  \n+\n\nkilobot\
    \ turning\n\nDynamic service / JoinLeave\ndynamic_service : 238 : 0\n\nPlatoon\n\
    +\n\nStart\n+\n\nSend Program\n+\n\nCS / Controller\nCS : 2 : 1\n\nCS / Kilobot\n\
    CS : 3 : 1\n\nInit State Variables\n+\n\nCS / Kilobot\nCS : 3 : 1\n\nspinup_motors\n\
    +\n\nCS / Kilobot\nCS : 3 : 1\n\nMain\n+\n\nMainLoop\n\n+\n+\n+\nSatisfies requirement(s)\
    \ :\n\n1. T-4\n\nT-4\n\nCS / Kilobot\nCS : 3 : 1\n\nState variable / kilo_ticks\n\
    state_variable : 250 : 1\n\nLeaderPrgrm\n  == 0\n+\n+\n+\n+\n\nCS / Kilobot\n\
    CS : 3 : 1\n\nState variable / kilo_uid\nstate_variable : 66 : 1\n\nGo Straight\
    \ Leader\n+\n```"
  raw: "## 15.5 Cyber-Physical Modeling\n\nYou can find this model in the GitHub repository.\
    \ Look for the `final-model.xml` file in [`https://github.com/JosephThachilGeorge/Platoon-Project`](https://github.com/JosephThachilGeorge/Platoon-Project).\n\
    \nSince the XML file is large, this section explains a few parts of the code.\n\
    \nTo add a block modeling diagram, follow these instructions :\n\n1.  Drag the\
    \ block/workspace with the mouse.\n\n2.  Minimize/maximize/partially minimize\
    \ a block by double-clicking it.\n\n3.  Drag and drop new blocks from the Toolbox\
    \ from the left side.\n\n4.  Add related blocks to this block by clicking the\
    \ (+) dropdown.\n\n5.  Right-click the block/workspace to see a menu.\n\n6.  Close\
    \ this comment by clicking the button.\n\nAs you can see in the beginning of the\
    \ project, the SOS organization has various requirements. These requirements are\
    \ shown in the XML file. These are the requirements for the Cyber System of Systems\
    \ (CSoS):\n\n```\n\n1\\. CSoS-1.4\n\nCSoS-1.4\n\nCS / Kilobot\nCS : 3 : 1\n\n\
    joinPlatoon\n+\nSatisfies requirement(s) :\n\n1\\. CSoS-1.4\n2\\. CSoS-1.6\n\n\
    CSoS-1.4,CSoS-1.6\n\nCS / Kilobot\nCS : 3 : 1\n\ndoNothing\n+\n\nCS / Kilobot\n\
    CS : 3 : 1\n\nSend OK\n == JOIN\n+\n+\n+\n+\n\nCS / Kilobot\nCS : 3 : 1\n\nState\
    \ variable / received_msg\nstate_variable : 112 : 1\n\nturn_check\n==1\n+\n+\n\
    +\nSatisfies requirement(s) :\n\n1\\. CSoS-1.5\n\nCSoS-1.5\n\nCS / Kilobot\nCS\
    \ : 3 : 1\n\nState variable / is_turning\nstate_variable : 321 : 1\n\nsendOk\n\
    +\nSatisfies requirement(s) :\n\n1\\. CSoS-1.5\n\nCS / Kilobot\nCS : 3 : 1\n\n\
    doNothing\n+\n\nCS / Controller\nCS : 2 : 1\n\n/next>\n\ndoNothing\n+\n\nCS /\
    \ Kilobot\nCS : 3 : 1\n\nAE-1\nWhiteboard width x height\nSatisfied by block(s)\
    \ :\n\n```\n\nThe message transfer is done with the help of RUPI (Relied Upon\
    \ Physical Interface) and RUMI (Relied Upon Message Interface) . The message transfer\
    \ from one Kilobot to another is designed in this session.\n\n```\n\n1\\. RUMI\
    \ : Message Exchange\n\nCCS-3\nController RUMI\nSatisfied by block(s) :\n\n1\\\
    . RUMI : Kilobot program load\n\nCCS-4\nRUPI kilobot\nSatisfied by block(s) :\n\
    \n1\\. RUPI : Calculate Distance\n\nCSoS-1\nkbot-kbot RUMI utilization\nSatisfied\
    \ by block(s) :\n\n1\\. RUMI : Message Exchange\n\nCSoS-2\nLeader notification\n\
    Satisfied by block(s) :\n\n```\n\nIt also uses an Automated Surface Observing\
    \ System (ASOS), which observes the nearby cyber-physical system components. It\
    \ has a security and internal clock system, a controller, and dynamicity. An example\
    \ is shown here:\n\n```\n\n1\\. ASoS-3\n\nASoS-3\n\nController\nautonomous\n+\n\
    +\n+\n+\n+\n+\n+\n+\n+\n+\n+\n+\n+\n+\n+\n+\n+\n+\n+\nSatisfies requirement(s)\
    \ :\n\n1\\. ASoS-2\n\nASoS-2\n\nKilobot program load\nFALSE\n+\n+\n+\n+\n+\n+\n\
    +\n+\n+\n+\n+\nSatisfies requirement(s) :\n\n```\n\nAnother part of the XML file\
    \ is T1, T2, T3, and T4, which are transport messages. They help illustrate how\
    \ messages transfer between CCS-1, CSoS-1, T-2 or TI or T3 or T4.\n\n*   T-1:\
    \ The Kilobots measure time according to a local clock.\n\n*   T-2: Time-related\
    \ events are triggered by message exchange.\n\n*   T-3: When a Kilobot starts,\
    \ it will prepare motors for Mms.\n\nThese requirements are designed with the\
    \ help of the following code:\n\n```\n3\\. T-2\n\nCCS-1,CSoS-1,T-2\n\nJOIN\nPAR_message\n\
    \  ?  \n  ?  \n+\n+\n\nLEAVE\nPAR_message\n  ?  \n  ?  \n+\n+\n\nDIRECTION\nPAR_message\n\
    \  ?  \n  ?  \n+\n+\n\nLeader Notify\nPAR_message\n  ?  \n  ?  \n+\n+\nSatisfies\
    \ requirement(s) :\n\n1\\. CSoS-2\n\nCSoS-2\n\nLOAD_PRGRM\nPAR_message\n  ?  \n\
    \  ?  \n+\n+\n\nRUMI / Message Exchange\nRUMI : 63 : 0\n\nRUMI / Kilobot program\
    \ load\nRUMI : 65 : 0\n\nStarting Position = Straight line\n+\n+\nSatisfies requirement(s)\
    \ :\n\n1\\. T-3\n\nStarting Distance = 8 cm\n+\n+\n\nRunning Distance between\
    \ 7 cm and 9 cm\n+\n+\n\nkilo_uid\n  ?  \n+\n\nleader_uid\n\n+\nSatisfies requirement(s)\
    \ :\n\n1\\. T-1\n\nT-1\n\nreceived_msg\n  ?  \n+\n\nis_turning\n  ?  \n+\n\nkilobot\
    \ turning\n\nDynamic service / JoinLeave\ndynamic_service : 238 : 0\n\nPlatoon\n\
    +\n\nStart\n+\n\nSend Program\n+\n\nCS / Controller\nCS : 2 : 1\n\nCS / Kilobot\n\
    CS : 3 : 1\n\nInit State Variables\n+\n\nCS / Kilobot\nCS : 3 : 1\n\nspinup_motors\n\
    +\n\nCS / Kilobot\nCS : 3 : 1\n\nMain\n+\n\nMainLoop\n\n+\n+\n+\nSatisfies requirement(s)\
    \ :\n\n1\\. T-4\n\nT-4\n\nCS / Kilobot\nCS : 3 : 1\n\nState variable / kilo_ticks\n\
    state_variable : 250 : 1\n\nLeaderPrgrm\n  == 0\n+\n+\n+\n+\n\nCS / Kilobot\n\
    CS : 3 : 1\n\nState variable / kilo_uid\nstate_variable : 66 : 1\n\nGo Straight\
    \ Leader\n+"
  trans: "\n## 15.5 赛博物理建模\n\n你可以在 GitHub 仓库中找到这个模型。请在 [`https://github.com/JosephThachilGeorge/Platoon-Project`](https://github.com/JosephThachilGeorge/Platoon-Project)\
    \ 中查找 `final-model.xml` 文件。\n\n由于 XML 文件很大，本节仅解释代码的其中几个部分。\n\n要添加模块建模图表，请遵循以下说明：\n\
    \n1.  用鼠标拖拽模块/工作区。\n2.  双击模块可将其最小化/最大化/部分最小化。\n3.  从左侧的“工具箱”中拖拽并放置新模块。\n4.  点击\
    \ (+) 下拉菜单，将相关模块添加到此模块。\n5.  右键点击模块/工作区以查看菜单。\n6.  点击按钮关闭此评论。\n\n正如你在项目开头所见，SOS\
    \ 组织有各种需求。这些需求显示在 XML 文件中。以下是赛博系统体系（`CSoS`）的需求：\n\n```\n1. CSoS-1.4\n\nCSoS-1.4\n\
    \nCS / Kilobot\nCS : 3 : 1\n\njoinPlatoon\n+\n满足需求：\n\n1. CSoS-1.4\n2. CSoS-1.6\n\
    \nCSoS-1.4,CSoS-1.6\n\nCS / Kilobot\nCS : 3 : 1\n\ndoNothing\n+\n\nCS / Kilobot\n\
    CS : 3 : 1\n\nSend OK\n == JOIN\n+\n+\n+\n+\n\nCS / Kilobot\nCS : 3 : 1\n\nState\
    \ variable / received_msg\nstate_variable : 112 : 1\n\nturn_check\n==1\n+\n+\n\
    +\n满足需求：\n\n1. CSoS-1.5\n\nCSoS-1.5\n\nCS / Kilobot\nCS : 3 : 1\n\nState variable\
    \ / is_turning\nstate_variable : 321 : 1\n\nsendOk\n+\n满足需求：\n\n1. CSoS-1.5\n\n\
    CS / Kilobot\nCS : 3 : 1\n\ndoNothing\n+\n\nCS / Controller\nCS : 2 : 1\n\n/next>\n\
    \ndoNothing\n+\n\nCS / Kilobot\nCS : 3 : 1\n\nAE-1\nWhiteboard width x height\n\
    由模块满足：\n\n```\n\n消息传输借助 `RUPI`（可靠的物理接口）和 `RUMI`（可靠的消息接口）完成。本部分设计了从一个 Kilobot 到另一个\
    \ Kilobot 的消息传输过程。\n\n```\n1. RUMI : 消息交换\n\nCCS-3\nController RUMI\n由模块满足：\n\n\
    1. RUMI : Kilobot 程序加载\n\nCCS-4\nRUPI kilobot\n由模块满足：\n\n1. RUPI : 计算距离\n\nCSoS-1\n\
    kbot-kbot RUMI utilization\n由模块满足：\n\n1. RUMI : 消息交换\n\nCSoS-2\nLeader notification\n\
    由模块满足：\n\n```\n\n它还使用了一个自动地表观测系统（`ASOS`），用于观测附近的赛博物理系统组件。该系统拥有安全与内部时钟系统、一个控制器以及动态特性。此处示例如下：\n\
    \n```\n1. ASoS-3\n\nASoS-3\n\nController\nautonomous\n+\n+\n+\n+\n+\n+\n+\n+\n\
    +\n+\n+\n+\n+\n+\n+\n+\n+\n+\n+\n满足需求：\n\n1. ASoS-2\n\nASoS-2\n\nKilobot program\
    \ load\nFALSE\n+\n+\n+\n+\n+\n+\n+\n+\n+\n+\n+\n满足需求：\n\n```\n\nXML 文件的另一部分是 `T1`、`T2`、`T3`\
    \ 和 `T4`，它们是传输消息。它们有助于说明消息如何在 `CCS-1`、`CSoS-1`、`T-2` 或 `TI` 或 `T3` 或 `T4` 之间传输。\n\
    \n- `T-1`：Kilobots 根据本地时钟测量时间。\n- `T-2`：与时间相关的事件由消息交换触发。\n- `T-3`：当 Kilobot 启动时，它将为\
    \ Mms 准备电机。\n\n这些需求是借助以下代码设计的：\n\n```\n3. T-2\n\nCCS-1,CSoS-1,T-2\n\nJOIN\nPAR_message\n\
    \  ?  \n  ?  \n+\n+\n\nLEAVE\nPAR_message\n  ?  \n  ?  \n+\n+\n\nDIRECTION\nPAR_message\n\
    \  ?  \n  ?  \n+\n+\n\nLeader Notify\nPAR_message\n  ?  \n  ?  \n+\n+\n满足需求：\n\
    \n1. CSoS-2\n\nCSoS-2\n\nLOAD_PRGRM\nPAR_message\n  ?  \n  ?  \n+\n+\n\nRUMI /\
    \ Message Exchange\nRUMI : 63 : 0\n\nRUMI / Kilobot program load\nRUMI : 65 :\
    \ 0\n\n起始位置 = 直线\n+\n+\n满足需求：\n\n1. T-3\n\n起始距离 = 8 cm\n+\n+\n\n运行距离在 7 cm 与 9\
    \ cm 之间\n+\n+\n\nkilo_uid\n  ?  \n+\n\nleader_uid\n\n+\n满足需求：\n\n1. T-1\n\nT-1\n\
    \nreceived_msg\n  ?  \n+\n\nis_turning\n  ?  \n+\n\nkilobot turning\n\n动态服务 /\
    \ JoinLeave\ndynamic_service : 238 : 0\n\nPlatoon\n+\n\n开始\n+\n\n发送程序\n+\n\nCS\
    \ / Controller\nCS : 2 : 1\n\nCS / Kilobot\nCS : 3 : 1\n\n初始化状态变量\n+\n\nCS / Kilobot\n\
    CS : 3 : 1\n\nspinup_motors\n+\n\nCS / Kilobot\nCS : 3 : 1\n\n主程序\n+\n\n主循环\n\n\
    +\n+\n+\n满足需求：\n\n1. T-4\n\nT-4\n\nCS / Kilobot\nCS : 3 : 1\n\nState variable\
    \ / kilo_ticks\nstate_variable : 250 : 1\n\nLeaderPrgrm\n  == 0\n+\n+\n+\n+\n\n\
    CS / Kilobot\nCS : 3 : 1\n\nState variable / kilo_uid\nstate_variable : 66 : 1\n\
    \n直线前进 Leader\n+\n```\n"
- fmt: "# `StraightDelay`\n\n`kilo_ticks mod 826`\n\n---\n\n**CS / Kilobot**\n`CS\
    \ : 3 : 1`\n\n**State variable / kilo_ticks**\n`state_variable : 250 : 1`\n\n\
    `goStraight`\n\n---\n\n**CS / Kilobot**\n`CS : 3 : 1`\n\n`sendStraight`\n\n---\n\
    \n**CS / Kilobot**\n`CS : 3 : 1`\n\n# Turn Left Leader\n\n---\n\n## `TurnDelay`\n\
    \n`kilo_ticks mod 826 >= 700`\n\n---\n\n**CS / Kilobot**\n`CS : 3 : 1`\n\n**State\
    \ variable / kilo_ticks**\n`state_variable : 250 : 1`\n\n`turnLeft`\n\n---\n\n\
    **CS / Kilobot**\n`CS : 3 : 1`\n\n`sendLeft`\n\n---\n\n**CS / Kilobot**\n`CS :\
    \ 3 : 1`\n\n`doNothing`\n\n---\n\n**CS / Kilobot**\n`CS : 3 : 1`\n\n# `FollowerPrgrm`\n\
    \n`!= 0`\n\n---\n\n**CS / Kilobot**\n`CS : 3 : 1`\n\n**State variable / kilo_uid**\n\
    `state_variable : 66 : 1`\n\n# Go Straight Follower\n\n`== STRAIGHT && sender\
    \ == LEADER`\n\n---\n\n**CS / Kilobot**\n`CS : 3 : 1`\n\n**State variable / received_msg**\n\
    `state_variable : 112 : 1`\n\n`goStraight`\n\n---\n\nSatisfies requirement(s)\
    \ :\n\nThe environment for this project is represented by AE-1 and AE-2. In AE-1,\
    \ the Kilobots operate on a whiteboard and in AE-2, an obstacle is located in\
    \ the middle of the whiteboard. The AE-1 and AE-2 environments are shown here:\n\
    \n```\n1. AE-1\n\nAE-1\n\nCS / Controller\nCS : 2 : 0\n\nCS / Kilobot\nCS : 3\
    \ : 0\n\nObstacle\n+\nSatisfies requirement(s) :\n\n1. AE-2\n\nAE-2\n\nwidth\n\
    \n+\n\nheight\n\n+\n\nobstacle width\n\n+\n\nobstacle height\n\n+\n\nKilobot platooning\n\
    acknowledged\n+\n+\n+\n+\n+\nThis is an example System-of-Systems (SoS) block\
    \ named \"example_block\", on the work-space.\n```\n\nThe next ones are about\
    \ dynamicity and these are named D1, D2, D3, and D4.\n\n- D-1: The platoon will\
    \ allow any Kilobot to become a member.\n- D-2: The platoon is composed of at\
    \ least two Kilobots.\n- D-3: The introduction of a Kilobot in the platoon is\
    \ allowed only at its tail.\n- D-4: The platoon allows only the last Kilobot to\
    \ leave.\n\nThese requirements are implemented with the following code:\n\n```\n\
    1. D-4\n2. D-5\n\nD-4, D-5\n\nState variable / leader_uid\nstate_variable : 67\
    \ : 0\n\nState variable / kilo_uid\nstate_variable : 66 : 0\n\nJoin\n+\nSatisfies\
    \ requirement(s) :\n\n1. D-1\n2. D-3\n\nD-1, D-3\n\nState variable / kilo_uid\n\
    state_variable : 66 : 0\n\nPlatooning\n+\n\nUnique Platoon\nSatisfies requirement(s)\
    \ :\n\n2. D-2\n\nASoS-1, D-2\n\nCalculate Distance\nFALSE\n+\n+\n+\n+\n+\n+\n\
    +\n+\n+\n+\n+\nSatisfies requirement(s) :\n```\n\nThe SoS level is designed as\
    \ follows. CSoS-1: Each Kilobot will use its RUMI to exchange information about\
    \ direction, when it is joining the platoon, and when it is leaving the platoon.\
    \ CSoS-2: When the SoS starts, each Kilobot notifies its adjacent follower that\
    \ it is the leader by transmitting a message. CSoS-3: Each Kilobot has a RUPI\
    \ to estimate the distance between the sender and receiver using signal power.\n\
    \nThe following code explains the CSoS systems:\n\n```\n1. CSoS-2\n\nCSoS-2\n\n\
    LOAD_PRGRM\nPAR_message\n  ?  \n  ?  \n+\n+\n\nRUMI / Message Exchange\nRUMI :\
    \ 63 : 0\n\nRUMI / Kilobot program load\nRUMI : 65 : 0\n\nStarting Position =\
    \ Straight line\n+\n+\nSatisfies requirement(s) :\n\n1. CSoS-1.2\n\nCSoS-1.2\n\
    \nCS / Kilobot\nCS : 3 : 1\n\ndoNothing\n+\n\nCS / Kilobot\nCS : 3 : 1\n\nTurn\
    \ Left Follower\n == LEFT && sender == LEADER\n+\n+\n+\n+\n\nCS / Kilobot\nCS\
    \ : 3 : 1\n\nState variable / received_msg\nstate_variable : 112 : 1\n\nturnLeft\n\
    +\nSatisfies requirement(s) :\n\n1. CSoS-1.1\n\nCSoS-1.1\n\nCS / Kilobot\nCS :\
    \ 3 : 1\n\nsendLeft\n+\nSatisfies requirement(s) :\n\n1. CSoS-1.1\n\nCSoS-1.1\n\
    \nCS / Kilobot\nCS : 3 : 1\n\ndoNothing\n+\n\nCS / Kilobot\nCS : 3 : 1\n\nkilo_ticks\
    \ check\n > 2000\n+\n+\n+\n+\n\nCS / Kilobot\nCS : 3 : 1\n\nState variable / kilo_ticks\n\
    state_variable : 250 : 1\n\nLeave\n+\n\ncanLeave\n== LAST_IN_PLATOON\n+\n+\n+\n\
    +\n\nCS / Kilobot\nCS : 3 : 1\n\nState variable / kilo_uid\nstate_variable : 66\
    \ : 1\n\nsendLeave\n+\nSatisfies requirement(s) :\n\n1. CSoS-1.3\n\nCSoS-1.3\n\
    \nCS / Kilobot\nCS : 3 : 1\n\ngoAway\n+\nSatisfies requirement(s) :\n\n1. CSoS-1.3\n\
    \nCSoS-1.3\n\nCS / Kilobot\nCS : 3 : 1\n\ndoNothing\n+\n\nCS / Kilobot\nCS : 3\
    \ : 1\n\ndoNothing\n+\n\nCS / Kilobot\nCS : 3 : 1\n\nJoin\n+\n\ncheckSequence\n\
    +\n\nidCheck\n  == 255\n+\n+\n+\n+\n\nCS / Kilobot\nCS : 3 : 1\n\nState variable\
    \ / leader_uid\nstate_variable : 67 : 1\n\nsendingJoin\n != OK\n+\n+\n+\n\nCS\
    \ / Kilobot\nCS : 3 : 1\n\nState variable / received_msg\nstate_variable : 112\
    \ : 1\n\nsendJoin\n+\nSatisfies\n```\n\nThis `xml` code is listed in this GitHub\
    \ repository:\n\n[`https://github.com/JosephThachilGeorge/Platoon-Project/blob/main/final-model.xml`](https://github.com/JosephThachilGeorge/Platoon-Project/blob/main/final-model.xml)\n\
    \nNote that to run this code you can use any model simulator that accepts `xml`\
    \ files.\n\nOnce you execute, you will get models shown in Figures 15-1a and 15-1b.\n\
    \n![../images/520777_1_En_15_Chapter/520777_1_En_15_Fig2_HTML.jpg](images/520777_1_En_15_Chapter/520777_1_En_15_Fig2_HTML.jpg)\n\
    \nFigure 15-1b\n\nThe models, continued\n\n![../images/520777_1_En_15_Chapter/520777_1_En_15_Fig1_HTML.jpg](images/520777_1_En_15_Chapter/520777_1_En_15_Fig1_HTML.jpg)\n\
    \nFigure 15-1a\n\nThe models\n\n## 15.6 Summary\n\nThe project platoon helps you\
    \ design and implement the cyber-physical system. The same concept can be used\
    \ to design any cyber-physical system in the real world. The Kilobot movement\
    \ illustrates the parts of cyber-physical systems and their characteristics. This\
    \ chapter concludes the projects related to cyber-physical systems. So far, you’ve\
    \ seen how to develop blockchains and distributed systems. In the next chapter,\
    \ you learn about the future of blockchain and distributed cyber-physical systems.\n\
    \nFootnotes [1](#520777_1_En_15_Chapter.xhtml#Fn1_source)\n\n# 16. Blockchain\
    \ Technology and Distributed System Future Scope and B-Coin Project\n\nBlockchain\
    \ systems have attracted various industry stakeholders, including those in finance,\
    \ healthcare, utilities, real estate, and government, since it solves many security\
    \ problems in distributed systems. Public blockchains will play a significant\
    \ role in cyber-security and Internet of Things (IoT) security as the commercial,\
    \ government, and military sectors become more comfortable with it. At the same\
    \ time, security and privacy problems in public blockchains will need to be addressed\
    \ before they can be incorporated into existing core cloud and IoT devices.^([^(13)](#fn13))\n\
    \nThe development of blockchain systems will bring new concerns linked to the\
    \ Internet of Smart Things, including trust, security, and privacy. Academia and\
    \ business are collaborating to create blockchain platforms to address these urgent\
    \ cloud and IoT security issues.¹\n\nWe now know that blockchain platforms address\
    \ issues such as cloud-based data proofing, information sharing, cloud storage,\
    \ smart vehicles, IoT mass transit security, attack surface analysis, double spending\
    \ prevention, trustless platform security, failure consensus protocols, statistics,\
    \ and performance measures in cloud and IoT systems.\n\nMilitary and commercial\
    \ organizations have also used cloud technology to enable data storage, on-demand\
    \ computation, and dynamic provisioning. Cloud services’ ecosystems are diverse\
    \ and dynamic. They necessitate interoperability since they incorporate multiple\
    \ hardware and software components from several suppliers.\n\n## 16.1 Blockchain\
    \ and IoT Security\n\nVehicles, infrastructures, home monitors, smart healthcare\
    \ imaging, and wearable electronics have all embraced the Internet of Things (IoT)\
    \ as the principal way to optimize interconnectedness between the cyber and physical\
    \ worlds. In the IoT context, security is still a major problem. Despite considerable\
    \ advancements in security in the area of information technology in recent years,\
    \ security at the application level remains an open research issue."
