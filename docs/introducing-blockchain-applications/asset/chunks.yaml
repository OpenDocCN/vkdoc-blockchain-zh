- fmt: "# 11.5 Designing a Metamodel for CPSs\n\nCPSs are complicated systems that\
    \ monitor and regulate the physical environment while also assisting humans in\
    \ their duties. CPS are networked hybrid systems that combine software and hardware.\
    \ As programmers, engineers, and scientists collaborate to build and implement\
    \ such systems, they run into obstacles. Experts from many fields must comprehend\
    \ the system in order to collaborate, regardless of their field.\n\nWe suggest\
    \ a cyber-physical systems metamodel and an educational research method that programmers,\
    \ engineers, and scientists can use, reuse, and modify for new applications of\
    \ cyber-physical systems. Data scientists and programmers utilize this metamodel\
    \ to build a cyber-physical system that provides `M1` system models that are understandable\
    \ across fields. The metamodel includes both smart things and humans, which are\
    \ often present in any cyber-physical system's design. It uses a composite architecture\
    \ to enable the creation of cyber-physical systems with smart elements like leaf\
    \ nodes.\n\n# 11.6 CPS Metamodel Examples\n\nConsider the following examples:\n\
    \n- **Transportation**: System for air traffic control and transportation management.\n\
    - **Health, medical**: Medical gadgets, health monitoring systems, telerobotic\
    \ surgical-systems.\n- **Manufacturing**: Automobiles, airplanes, factory automation\
    \ systems, chemical process tracking, autonomous robotic spaces, and industry\
    \ networks are all examples of industrial networks.\n- **Environmental**: Farming,\
    \ environmental, and geological systems are all examples of environmental science\
    \ systems.\n- **Aerospace**: Space exploration systems.\n- **Buildings**: Assistive\
    \ living and smart places in everyday life.\n- **Public environment**: Intelligent\
    \ water supply networks and emergency management.\n- **Cyber-physical public systems**:\
    \ These are CPSs that also consider human understanding, technological capabilities,\
    \ and sociocultural factors.\n\nThe *meta-object facility* is introduced in the\
    \ following section, backed by a base-metamodel for cyber-physical systems.\n\n\
    ## 11.6.1 Meta-Object Facility\n\nThe meta-object facility is a standard for model-driven\
    \ engineering of the Object Management Group. This comes from the `UML` language;\
    \ Object Management Group needed a metamodeling architecture to define `UML`^([^(10)](#fn10)).\
    \ It uses object-modeling methods to define any form of metadata. Even though\
    \ it is usually associated with `UML`, it is independent from it. To specify any\
    \ type of metadata, `MOF` uses object modeling techniques. Even though it is sometimes\
    \ confused with `UML`, it is not the same thing.\n\nWe use the stereotype mechanism\
    \ of `UML` to create and expand intelligent objects on the CPS metamodel. `M1`-defined\
    \ classes can be extended and reused utilizing the metamodel as a basis. A system\
    \ is represented by these classes. The top-level design of an application on `M1`\
    \ is referred to as top-level design.\n\nA *system-of-systems* (SoS) is a combination\
    \ of a finite set of independent and operable constituent systems that are networked\
    \ together for a length of time in order to achieve a higher purpose. An SoS integrates\
    \ CSs.\n\n![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig7_HTML.jpg](images/520777_1_En_11_Chapter/520777_1_En_11_Fig7_HTML.jpg)\n\
    \nFigure 11-7\n\nA categorization of a modeling language and the perspectives\
    \ that go with it\n\nA *constituent system* includes a computer network (the cybersystem),\
    \ a controlled item (the physical system), and perhaps human interaction. An SoS\
    \ could be:\n\n![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig9_HTML.jpg](images/520777_1_En_11_Chapter/520777_1_En_11_Fig9_HTML.jpg)\n\
    \nFigure 11-9\n\nAn SoS\n\n![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig8_HTML.jpg](images/520777_1_En_11_Chapter/520777_1_En_11_Fig8_HTML.jpg)\n\
    \nFigure 11-8\n\nAn SoS integrates a CS\n\n- **Directed SoS**: An SoS having a\
    \ centralized purpose and ownership of all CSs. A collection of control systems\
    \ in an unmanned rocket is an example.\n- **Recognized SoS**: CSs are owned independently,\
    \ but there are cooperative agreements among the owners to achieve a common goal.\n\
    - **Collaboration SoS**: Volunteer interactions among independent CSs with the\
    \ objective of achieving a goal that benefits the individual CS.\n- **Virtual\
    \ SoS**: Core alignment and lack of a primary purpose.\n\nEach CS has an interface\
    \ based on which services are made available to other CSs, such as Reliable Interface\
    \ (RUI), which serves as a CS's interface via which the CS's services are made\
    \ available to other CSs. RUIs are made up of the following components:\n\n![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig11_HTML.jpg](images/520777_1_En_11_Chapter/520777_1_En_11_Fig11_HTML.jpg)\n\
    \nFigure 11-11\n\nRUMI and RUPI\n\n![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig10_HTML.jpg](images/520777_1_En_11_Chapter/520777_1_En_11_Fig10_HTML.jpg)\n\
    \nFigure 11-10\n\nSOS and CS\n\n- Relied Upon Message Interface (RUMI)\n- Relied\
    \ Upon Physical Interface (RUPI)\n\n# 11.7 Review Questions\n\n1.  \"Model-driven\
    \ engineering is a software development approach that emphasizes the creation\
    \ of models or abstractions that are closer to specific domain notions than computational\
    \ or algebraic concepts.\" Is this statement correct or incorrect?\n\n2.  The\
    \ modeling language is established by which of the following?\n    1.  By a collection\
    \ of all possible models that correspond to the metamodel in issue, which is referred\
    \ to as a metamodel.\n    2.  By a metamodel, which is a collection of models\
    \ that adhere to the metamodel in question.\n    3.  By the metamodel, which is\
    \ a collection of all feasible models that adhere to a certain metastate.\n  \
    \  4.  None of the above.\n\n3.  Which of the following statements is correct\
    \ for *event*?\n    1.  Virtual SoS is characterized by the absence of a core\
    \ goal and central alignment.\n    2.  Virtual SoS has a lack of purpose and central\
    \ alignment.\n    3.  Virtual SoS is characterized by a lack of focus and alignment.\n\
    \    4.  All of these.\n\n4.  \"Metamodels include `UML` and the `Common Warehouse\
    \ metamodel`.\" Is this statement correct or incorrect?\n\n# 11.8 Review Answers\n\
    \n1.  Answer: Correct, Model-driven engineering is a software development methodology\
    \ that focuses on the construction of models or abstractions that are more closely\
    \ related to specific domain concepts than computational or algebraic concepts.\n\
    \n2.  Answer: A, A collection of all possible models that correspond to the metamodel\
    \ in issue is referred to as a metamodel.\n\n3.  Answer: A, A virtual SoS is characterized\
    \ by the absence of a core goal and central alignment.\n\n4.  Answer: Correct,\
    \ `UML` and the `Common Warehouse Metamodel` are examples of metamodels."
