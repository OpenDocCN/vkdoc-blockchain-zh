  trans: "\n### 4.6.3 从数字签名中恢复公钥\n\n对于数字签名，以太坊与比特币一样，使用带有标准`secp256k1`的 ECDSA 算法。\n\
    \n我们在此讨论的是 EIP-155 提案中的数字签名方案。在本例中，我们将指代以太坊主网链。但对于使用此方案的每条链，流程都是相同的，只需将`chainId`更改为相应的值即可。\n\
    \n正如你所见，交易中并没有发送方地址字段。\n\n实际上，这个信息是后来获取的。正因如此，你有了变量`v`，它提供了关于奇偶性的信息，以及曲线点（其中`randomPart`是其`x`值）的有限性。计算`v`的公式是：\n\
    \n`v = chainId * 2 + ((y mod 2) + 35)`\n\n- `chainID` 是所用链的 ID。对于以太坊主网，此变量的值为`1`。\n\
    - `y` 是曲线点的 y 坐标，其中`randomPart`是该曲线的 x 值。它是 ECDSA 签名的一部分。\n\n分析这个用于计算`v`的公式，你会发现有趣的部分是`y\
    \ mod 2`，它扮演了恢复标识符的角色。\n\n它用于加速检索签名者公钥的过程。实际上，如果信息正确，此操作有两个可能的结果：\n- `0`： -> y\
    \ 坐标是偶数。\n- `1`： -> y 坐标是奇数。\n\n因此，我们发现`((y mod 2) + 35)`可能有两个值：\n- `35`： -> y\
    \ 坐标是偶数。\n- `36`： -> y 坐标是奇数。\n\n给定 X 坐标的一个固定值，并截断与 Y 坐标相关的信息，就可能存在多个具有相同`x`的点对`(x;\
    \ y)`。\n\n那么，为了验证签名，我们需要检索公钥，执行一个循环，在每次迭代中，比较可能的点对之一是否与签名匹配。可能的点对与签名匹配。所以，让我们看看发送者的公钥。我们简要说明\
    \ ECDSA 算法如何计算数字签名的随机部分。\n\n给定曲线`secp256k1`。设`G`为由标准`secp256k1`定义的生成点。设`n`为曲线上点`G`的阶。然后，我们需要理解在区间`[1,\
    \ n-1]`内生成一个随机数。我们称此值为`randomNumber`。我们这样找到`randomPart`：\n\n`randomNumber * G\
    \ = (x1; y1)`\n\n因此：\n\n`randomPart = x1 mod n`\n\n设`h`为椭圆曲线的余因子，则`2 * (h + 1)`告诉我们，给定\
    \ X 坐标的`randomPart`，我们有多少个可能的点。对于`secp256k1`，余因子等于`1`。所以，我们有四个可能的点：\n- 两个，因为每个\
    \ X 坐标有两个可能的 Y 坐标，一个为正，一个为负。\n- 两个，因为`R.x = randomPart + j * n`，其中`j`取`{0, 1,\
    \ 2, ..., h}`（在我们的例子中`h = 1`）。\n\n然而，`R.x`可以从`randomPart`唯一恢复，因为整数中只有一个：\n\n`R.x\
    \ = randomPart + j * n`\n\n对于`j = 0, 1, 2, ..., h`，代表一个有效的 x 坐标，即`G`的倍数。\n\n出于这个原因，[`SEC2`]加密标准推荐使用余因子`h\
    \ = 1`或`h = 2`的椭圆曲线。对于这些由[`SEC2`]推荐的曲线，有效 x 坐标的数量通常是一个，因此这个检查是空的。\n\n在最坏的情况下，从`randomPart`找到`R.x`只需要`log2(h)\
    \ + 1`个比特。\n\n因此，给定点`R`的 X 坐标的固定`randomPart`信息，并截断与 Y 坐标相关的信息，可能存在两个可能的点对`(x;\
    \ y)`，其 X 坐标相同有效。也就是说，一个是 Y 坐标为正的点`(x; y)`，另一个是 Y 坐标为负的点`(x; -y)`。\n\n那么，为了验证签名，你需要运行一个循环，在每次迭代中，确定可能的点对之一是否与签名匹配。然而，多亏了关于\
    \ Y 坐标奇偶性的信息，我们可以一次性获得点`R`的`yr`值，从而推导出与签名对应的公钥。实际上，由于`v`给了我们坐标 Y 的奇偶性信息（对于该坐标\
    \ Y，`randomPart`是坐标 X 的信息），我们可以计算出`R = (xr; yr)`。\n\n设`h(msg)`为交易的哈希值。通过这种方式，我们得到相应的公钥`Q`：\n\
    \n1. 对于`j`从`0`到`h`（对于`secp256k1`，`h = 1`）：\n    1. 设 `x[r] = randomPart + j *\
    \ n`\n\n2. 从`y[r]`的奇偶性信息，推导出点`R`。 `R = (x[r]; y[r])`\n\n3. 计算候选公钥：  \n   ![../images/520777_1_En_4_Chapter/520777_1_En_4_Figb_HTML.gif](img/520777_1_En_4_Figb_HTML.gif)\n\
    \n4. 用数字签名验证公钥：\n   1. `u1 = h(msg) * sign-1 mod n`\n   2. `u2 = randomPart *\
    \ sign-1 mod n`\n   3. 计算：  \n      `R = (xr, yr) = u1 * G + u2 * Q`\n   4. 设\
    \ `c = xr mod n`。那么，如果 `c == randomPart` 为真，则签名被验证。返回 `True`（有效）。\n\n否则，如果循环结束后未返回`True`值，则信息中存在不一致之处。这样，公钥就从带有标准`secp256k1`的\
    \ ECDSA 签名中推导出来，并且签名得到了验证。\n\n### 4.6.4 三种交易类型\n\n本节涵盖三种类型的交易：\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig22_HTML.jpg](img/520777_1_En_4_Fig22_HTML.jpg)\n\
    \n**图 4-22** – EOA 之间的资金转移\n\n- **EOA（外部拥有账户）之间的资金转移：** 当一个 EOA 向另一个 EOA 转移资金时，使用此交易。此交易的`Data`字段为空。（见图\
    \ 4-22）\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig23_HTML.jpg](img/520777_1_En_4_Fig23_HTML.jpg)\n\
    \n**图 4-23** – 在已部署的智能合约上运行以太坊函数的智能合约分发\n\n- **在以太坊网络上存储智能合约：** 在以太坊中，分发合约是通过交易进行的。此交易的目标地址字段为空。然而，在`Data`字段中，包含智能合约的字节码，如果需要，还有一些参数。如果成功，发送方会收到一个收据，其中包含他们使用该智能合约所需的合约地址（见图\
    \ 4-23）。\n\n部署合约后，EOA 可以执行此合约中定义的函数。同样，这是通过提交一笔以太坊交易来实现的。在这种情况下，交易的目标地址是智能合约地址。而在`Data`字段中，包含要调用的函数选择器以及要输入函数的数据。（见图\
    \ 4-24）\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig24_HTML.jpg](img/520777_1_En_4_Fig24_HTML.jpg)\n\
    \n**图 4-24** – 调用智能合约上的函数\n\n显然，关于谁可以执行操作的智能合约的权限，是在智能合约代码中定义的，代码中包含了操作的逻辑。\n"
- fmt: '### 4.6.5 Messages


    The message is a kind of virtual transaction sent by the EVM code from one smart
    contract to another. Note that transactions and messages in Ethereum are different.
    A *transaction* in the Ethereum language specifically refers to a digitally signed
    piece of data from a different source from the execution of the EVM code, to be
    registered in the blockchain. Messages can only be sent by the EVM code and are
    never represented in the data. They therefore express the ability of smart contract
    to send messages to different smart contracts.


    These are the virtual objects, have never serialized, and only exist in the Ethereum
    run environment. They can also be conceived as a function call between smart contracts.


    Basically, you need to understand that a message is like a transaction, except
    that it is developed by a contract and not by an outside actor. After a message
    is produced, and when a contract is currently executing, a code executes the main
    `CALL` or `DELEGATE THE CALL` codes, which develops a message.


    Therefore, a contract can have relationships with other smart contracts, like
    external actors. They are also called internal computations or transactions, and
    when a contract sends a transaction internally to different contract, the code
    is executed and associated with the recipient contract account. (See Figure [4-25](#520777_1_En_4_Chapter.xhtml#Fig25).)


    In general, a message comes from a smart contract, and the execution triggers
    a transaction from an EOA.


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig25_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig25_HTML.jpg)


    **Figure 4-25** Transactions and messages (internal transactions)


    The `gasLimit` is set by the external ownership account and therefore is sufficiently
    high to allow the execution of the overall operation, which includes any under-executions
    that occur because of operation itself, as messages between contracts.


    For the overall chain of transactions a particular on execution of a message ends,
    then the execution of that message could be restored to its initial state, along
    with all messages subsequently activated by its execution.


    ## 4.7 Ethereum State Transition Function


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig26_HTML.png](images/520777_1_En_4_Chapter/520777_1_En_4_Fig26_HTML.png)


    **Figure 4-26** State change and state transition function invoked by a new transaction


    This section discusses the validation of transactions and therefore the state
    transition function. This function allows you to transit to a new state if and
    only if the transaction is valid and you have arranged all the resources necessary
    to complete its execution. See Figure [4-26](#520777_1_En_4_Chapter.xhtml#Fig26).


    Let’s look at the steps of the transition function of the Ethereum state:


    `APPLY (S; TX) -> S0` or `ERROR` is defined like this:


    1. Check the transaction for structure and syntax, verifying the validity of the
    signature and determine if the nonce of the transaction matches that of the sender.
    If unsuccessful, it returns an error.


    2. You can then compute the transaction cost as `GASLIMIT GASPRICE` and determine
    the address of the sender of the sign. If the sender’s account is sufficient then
    it decreases by the value just calculated and increases the nonce; otherwise,
    it returns an error.


    3. Initialize the variable `GAS = GAS LIMIT`. For each byte consumed it reduces
    the gas by a certain amount to pay for each byte of resource consumed.


    4. Transfer the digital money of the transaction from the sender’s account to
    the recipient’s account. Note that if the recipient’s account does not exist,
    it creates it. Then if the beneficiary’s account is a smart contract, run the
    contract code until the operation is completed, or at least until the execution
    is out of gas.


    5. If the transaction does not succeed because the sender does not have the money,
    or the execution of the code has run out of gas, restore full status changes,
    payment of taxes, and add taxes to the miner’s account.


    6. Otherwise, if it’s successful, it reimburses the sender for the commissions
    for gas not consumed and sends the consumed commissions to the miner that wins
    the block containing the transaction.


    The messages work in an equivalent route to the transactions in terms of recovery
    management: If a running message runs out of gas, and all other executions triggered
    by this, are restored, it’s fine. In other cases, it gives an error or a `STOP/RETURN`
    statement.


    As mentioned, a Smart `Contracts` developer has access to three types of storage
    memory:


    * The LIFO (Last-in-first-out) stack (volatile) in which it is possible push or
    feed data (in a range from 0 to 1024).

    * The (volatile) memory is an array of indefinitely expandable bytes.

    * Ethereum’s (nonvolatile) storage.


    The code can also get the message’s value and data incoming. It can block header
    data, and can also return an array of bytes of data as output.


    The functional state of EVM can be defined by the set of data. In this case the
    block state is the global state that contains all accounts and budgets and storage.


    Be sure to consider that at the beginning of each turn of run, the current instruction
    is identified taking the byte pointed to by the program counter. Each operation
    has its own definition in terms of how it interacts with the set of data.'
