- fmt: "### 17.13 Experimental Activity\n\nThis part explains how the approach created\
    \ in the preceding chapter was put into practice, as well as the technical issues\
    \ that arose during the process.\n\nCoach’s default technique was used to train\
    \ the Controllers in an urban context in order to produce four checkpoints that\
    \ were then assessed.\n\n`CARLA` offered 152 spawn points, which were used to\
    \ create scenarios. A basic configuration and three variants of it were created\
    \ for each spawn point:\n\n-   `h0`-Default Setting: With 30 people and 15 automobiles,\
    \ the map is produced using the same circumstances as when the controllers were\
    \ trained.\n-   `h1`- Setting for Pedestrians: The map is created with the number\
    \ of pedestrians increased from 30 to 60.\n-   `h2`- Setting Vehicles: The map\
    \ is produced with the number of cars in the environment increased from 15 to\
    \ 30.\n-   `h3`- The map is made by merging `h1` and `h2`, resulting in a scenario\
    \ with 60 pedestrians and 30 automobiles.\n\n152 pairs of unique seeds were produced\
    \ for consistency and reproducibility throughout the variations, each with its\
    \ own beginning point. You may use the same seed for many iterations of the same\
    \ starting spot this way.\n\nThe automobile is also assigned a destination goal\
    \ to attain, which is likewise documented for repeatability, to supplement the\
    \ information regarding the system’s overall performance. If the goal is met,\
    \ the achievement is noted, and the sys is assigned a new target to pursue.\n\n\
    In normal cases, a crash might take an extremely long period to occur. As a result,\
    \ a maximum operating duration of 15 min was set to show the principles presented\
    \ in this work, after which the system’s mission was regarded as complete.\n\n\
    Four checkpoints were developed and evaluated in the first part of the investigation\
    \ using the technique outlined in Section 3\\. The coding was publicly available\
    \ because the Coach project is open-source.\n\nWe were able to utilize software\
    \ probes to monitor the controller’s activities as a result of this. The source\
    \ code was changed to include instructions for writing all required data into\
    \ a separate file for every run:\n\n-   The situations’ starting position and\
    \ seeds\n-   Actions that the controller has taken\n-   What will happen if there\
    \ is a collision?\n-   If a target is met, make a note of it as well as the new\
    \ target coordinates\n\nIn general, altering the source code may result in a reduction\
    \ in overall performance and outcome accuracy. The `CARLA` simulator, thankfully,\
    \ allows you to run simulations at a specific time step. To guarantee that all\
    \ data received from the server is correct and timely, this was set to the minimum:\
    \ ten frames per second. Because we have no control over the variable time-step,\
    \ it may introduce unpredictability into the data. This also serves as a baseline\
    \ for testing repeatability. It took roughly a month and a half to finish the\
    \ initial training portion, as well as the Controller test.\n\nIn the second step,\
    \ the security monitors were assessed at each checkpoint. The source code was\
    \ changed once again to establish two autonomous, parallel processes: one takes\
    \ Lidar data from the `CARLA` server and sends it to the security monitor server,\
    \ while the other waits for the security monitors to decide whether or not a brake\
    \ is required.\n\nEach frame, the `CARLA` system creates Lidar data. Because the\
    \ burden for data creation is completely dependent on the CPU, execution times\
    \ are significantly slower. Unfortunately, if FPSs are less than ten, `CARLA`\
    \ has a problem that causes data to be incorrect. To guarantee the lowest constraint\
    \ of ten frames per second, a powerful machine was necessary. Software probes\
    \ were added to the codebase to gather information regarding the monitor’s alarms,\
    \ and the source code was modified once more. While the safety-behavior monitor\
    \ is being watched, the first step’s runs are now repeated. During the test, all\
    \ of the alerts that were generated were false positives.\n\nTo assess the quantity\
    \ of true positives, the emergency brake is activated two seconds before the accident.\
    \ This method allows us to assess the safety-performance monitor in its operating\
    \ context.\n\nFollowing the completion of the first phase, the data obtained is\
    \ processed to computerize the measurements stated in the preceding chapter.\n\
    \n-   Checkpoints for the controller:\n    -   Average time among failures\n \
    \   -   Interval between failures (MTBF)\n    -   Rate of failure\n    -   Stability\n\
    -   Security Inspector:\n    -   Matrix of predictions confusing\n    -   Positives/negatives\
    \ rates (true/false)\n    -   Perfection details\n    -   Matthew’s Correlation\
    \ of Coefficient\n    -   Percentage of false positives\n\nTraining is continued\
    \ from the previous checkpoints using the previously mentioned techniques, and\
    \ the measuring procedure is performed in the same manner.\n\nSome of the approaches\
    \ mentioned need security monitor training, leading in exceptionally fast execution\
    \ times. Because of the high processing load required to create Lidar data, this\
    \ stage took roughly three months, after which the training was stopped. The data\
    \ collected may be compared to evaluate if the network is learning correctly as\
    \ well as how the security-efficacy monitor evolves over time.\n\nData was gathered\
    \ and analyzed using `Python` scripts to aggregate data and provide metrics for\
    \ the controller and the safety-overall monitor’s functionality. For this type\
    \ of work, data aggregation is essential. However, due to the complexity of these\
    \ systems and the infrequency of many detrimental occurrences, individual runs\
    \ must be evaluated and compared before data can be aggregated.\n\nDue to the\
    \ large quantity of data obtained, we offer the collected results primarily in\
    \ aggregated form in the following part. Other issues about “raw” data, which\
    \ were not included in this research but were provided separately for evaluation,\
    \ exist.\n\n### 17.14 Results"
