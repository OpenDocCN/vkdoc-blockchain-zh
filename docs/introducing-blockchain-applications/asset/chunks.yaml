    and the new passphrase. After completing the operation, the account will no longer
    be accessible via the previous passphrase.


    *   When exporting an existing account, the caller must provide both a current
    passphrase to decrypt the account, and a passphrase to reencode it before returning
    the key file to the user. This is necessary to allow the movement of the accounts
    between machines and applications without sharing credentials.


    *   When importing a new account, the caller must provide both the encryption
    passphrase of the keyfile to be imported and a new passphrase with which to store
    the account. This is necessary to allow the storage of accounts with different
    credentials than those used to move them.


    Therefore , there are no recovery mechanisms for the loss of a passphrase. The
    cryptographic properties of the encrypted keystore ensure that the account credentials
    cannot be brutally forced in any way. For account management, various Wallet apps
    are available to manage them efficiently.


    ## 4.3 World State


    The world state of the Ethereum blockchain is a mapping between the Ethereum address
    (160-bit identifiers) and the account state.


    This mapping is maintained through a data structure called the Modified Merkle
    Patricia tree. Let’s see what it is.


    ### 4.3.1 Trie


    A Trie , also called a *digital tree* or *prefix tree* , is a data structure ordered
    tree used to store a dynamic set or array associative where the keys are generally
    strings.


    In general, the position of a node in the tree defined the key that it is associated
    with. Nodes do not keep a copy of their own key, instead they depend on the position
    of the node in the tree. (See Figure [4-9](#520777_1_En_4_Chapter.xhtml#Fig9).)


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig9_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Example of a Trie


    The root of the tree is associated with the empty string, and all the descendants
    of a node share the prefix associated with that node. Not all nodes necessarily
    represent a significant key, which typically is found instead in the leaves and
    possibly in some internal nodes.


    ### 4.3.2 The Radix Tree


    Note that the Radix tree , also called a compact prefix tree or radix trie, is
    one data structure that represents a Trie in which space is optimized. In this
    tree, unlike the Trias, each leaf node is an only child and is joined with the
    parent node. (See Figure [4-10](#520777_1_En_4_Chapter.xhtml#Fig10).)


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig10_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig10_HTML.jpg)


    Figure 4-10


    Example of Radix tree


    Here the result is that the number of children of each internal node is at most
    the value r, a positive integer assigned to the radix variable of the radix tree.
    The value is a power of 2x, where x is greater than or equal to 1.


    This makes radix trees much more efficient for sets where the keys are long strings,
    and for shared sets of keys with long prefixes. Thus, if radix equals 2, you get
    a binary Radix tree.


    Let `k` be the length of the keys. Radix trees allow searching, insertion, and
    elimination in time O (k) This doesn’t seem to be an advantage, but they can perform
    these operations with fewer comparisons and require many fewer nodes than balanced
    trees.


    In general, Radix trees are useful for building associative arrays of keys that
    can be expressed as strings. They’ve particular application in IP routing, where
    the ability to contain large ranges of values with few numbers of exceptions is
    especially suited to the hierarchical organization of IP addresses.'
  trans: '

    ### 4.2.5 存储密钥：加密密钥库


    每个私钥/地址对都编码在一个密钥文件中，这些密钥文件是 JSON 文本文件。此外，密钥文件的关键组成部分——账户的私钥——始终使用账户创建时输入的密码进行加密。


    密钥文件位于创建或导入该账户的以太坊节点数据目录的 `keystore` 子目录中。


    该密钥库使用椭圆曲线 `secp256k1`（依据高效加密标准定义），由 `libsecp256k` 库实现，您可以在 `github.com/ethereum/go-ethereum/accounts`
    找到它。账户以 Web3 秘密存储格式存储在磁盘上。


    为以太坊账户创建加密密钥库后，您可以使用此账户管理器来满足账户生命周期的所有需求。这包括以下基本功能：


    - 创建新账户

    - 删除现有账户

    - 更新访问凭证

    - 导出现有账户

    - 导入到另一台设备


    尽管密钥库定义了用于存储账户的加密级别，但并没有一个全局主密码可以授予所有人访问权限。相反，每个账户都是单独管理的，并以各自独立的加密格式存储在磁盘上，从而确保隔离更加彻底，并使用更严格的凭证。


    这种独立性意味着，任何需要访问账户的操作都必须以密码短语的形式，提供该特定账户所需的身份验证凭证：


    - 创建新账户时，调用者必须提供一个密码短语来加密该账户。此密码短语将在后续任何访问时被要求提供。

    - 删除现有账户时，调用者必须提供密码短语以验证账户所有权。

    - 更新现有账户时，调用者必须同时提供当前密码短语和新密码短语。操作完成后，该账户将无法再通过之前的密码短语访问。

    - 导出现有账户时，调用者必须同时提供一个当前密码短语来解密账户，以及一个用于在返回密钥文件给用户之前重新编码该账户的密码短语。这是为了在不共享凭证的情况下，允许账户在机器和应用程序之间迁移。

    - 导入新账户时，调用者必须同时提供待导入密钥文件的加密密码短语，以及一个用于存储该账户的新密码短语。这是为了允许使用与迁移时不同的凭证来存储账户。


    因此，密码短语丢失后没有任何恢复机制。加密密钥库的密码特性确保了账户凭证无法以任何方式被暴力破解。对于账户管理，有多种钱包应用程序可以高效管理。


    ## 4.3 世界状态


    以太坊区块链的世界状态是以太坊地址（160 位标识符）与账户状态之间的映射。这种映射通过一种称为“修改版默克尔帕特里夏树”的数据结构来维护。让我们来看看它究竟是什么。


    ### 4.3.1 字典树


    字典树，也称为*数字树*或*前缀树*，是一种有序树状数据结构，用于存储动态集合或关联数组，其中键通常是字符串。通常，树中节点的位置定义了与其关联的键。节点不保存自身键的副本，而是依赖节点在树中的位置。（见图
    4-9。）


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig9_HTML.jpg](img/520777_1_En_4_Fig9_HTML.jpg)


    **图 4-9** 字典树示例


    树的根节点关联空字符串，一个节点的所有后代共享与该节点关联的前缀。并非所有节点都必然代表一个有效的键，有效的键通常出现在叶子节点，有时也可能出现在某些内部节点中。


    ### 4.3.2 基数树


    请注意，基数树，也称为紧凑前缀树或基数特里树，是一种对空间进行优化的字典树数据结构。在这棵树中，与字典树不同，每个叶子节点如果只有一个子节点，就会与其父节点合并。（见图
    4-10。）


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig10_HTML.jpg](img/520777_1_En_4_Fig10_HTML.jpg)


    **图 4-10** 基数树示例


    这样做的结果是，每个内部节点的子节点数量最多为值 `r`，`r` 是赋给基数树基数变量的正整数。该值是 `2x` 的幂，其中 `x` 大于或等于 1。这使得基数树对于键是长字符串的集合，以及键共享长前缀的集合，效率高得多。因此，如果基数等于
    2，就得到一棵二进制基数树。


    设 `k` 为键的长度。基数树允许在 `O(k)` 时间内完成搜索、插入和删除操作。这看起来似乎不太有优势，但它们可以用更少的比较次数完成这些操作，并且所需的节点数远少于平衡树。


    通常，基数树用于构建键可以表示为字符串的关联数组。它们在 IP 路由中有特殊应用，因为其能够用少量例外包含大范围值的能力，特别适合 IP 地址的层次化组织。

