    向块添加新连接是一个简单的过程。使用与现有块的连接是构建 SoS 的一种方法。创建连接/链接可以让你重用现有的块，但这与将块复制粘贴到 `BLOCKLY`
    不同。被连接的块通过链接进行引用。例如，在工作区上，可以形成 CS，并且只有连接可以加入到 SoS 块中，如图 12-5 所示。


