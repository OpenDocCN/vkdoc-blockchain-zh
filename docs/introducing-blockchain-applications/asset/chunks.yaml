    ### 11.2.3 模型


    *模型*描述了一个可能存在于今日或未来，也可能并不存在的系统。它是一个被视为有效范例或原型、值得效仿的参考术语。


    模型之所以值得考虑，是因为它包含以下细节：


    -   模型可以是关于所研究设备/系统的一系列断言的集合。

    -   模型是为特定目标而构建的系统的最简化版本，并且应能够代替实际系统来回答问题。

    -   模型是为特定目标而构建的系统的简化版本，并且能够为真实程序解答问题。


    另一方面，模型本身也是一个系统，拥有自身的标识、复杂性、组成元素、连接关系等。


    特别是，在考虑一个“模型的模型”时，你必须牢记，其中一个是另一个模型的模型，因此它本身也是一个*系统*。总而言之，“模型”是一个有助于描述和研究中的系统并提供答案，而无需直接观察该系统的系统，如图
    11-3 所示。


    ![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig3_HTML.jpg](img/520777_1_En_11_Fig3_HTML.jpg)


    图 11-3 – 模型与系统之间的关系


    模型与系统之间也存在关系。借助模型，你可以设计一个系统。通过观察模型，你可以理解系统的工作原理。另一方面，你可以基于系统架构创建多个模型。这就是为什么可以说模型是系统的简化版本，并且是为特定目标而构建的。¹


    ### 11.2.4 元模型


    *元模型*是一种基于先前研究来规定建模语言架构的模型。然而，必须从图 11-4 中理解以下事实。


    ![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig4_HTML.jpg](img/520777_1_En_11_Fig4_HTML.jpg)


    图 11-4 – 元模型与模型之间的关系


    我们可以说，建模语言将是一组模型的集合，这是由“模型”与“建模语言”之间的“*属于*”关系定义的（或者说，模型是建模语言的一个元素）。


    我们也可以说，这种方法从其规则来源于对模型概念与元模型概念的区分。


    一个 UML 模型是一种表示法，它从特定视角并在特定约束下，捕捉了你想要建模的一切事物的关键方面。模型以图表（UML 图）的形式构建，而图表是图形化表达手段。模型由三个基本部分组成：


    -   **分类器：** 它们描述一组对象。对象是一个具有状态并与其他对象存在关系的独立实体。

    -   **事件：** 它们描述一组可能的 occurence。Occurrence 是系统内发生并产生后果的事情。

    -   **行为：** 它们描述一组可能的执行过程。执行代表根据一组规则完成某个算法。⁹


    另一方面，UML 图包含表示模型元素的图形元素。例如，在一个包图中定义的两个关联类，是两种类型的分类器，由两个矩形符号和一条表示关联符号的连线来表示。


    ## 11.3 构建元模型与模型


    如何构建第一个元模型是一个众所周知的、反复出现的元模型问题。OMG 官方规范通过按包分解架构来描述 UML 的语义。在每个包内，模型元素以半形式化的方式通过以下术语定义：


    -   **抽象语法：** 通过使用 UML 符号表达的类图来呈现 UML 元模型、其概念（即元类）、关系以及约束。此外，还附加了用自然语言（英语）编写的文本部分。

    -   **内涵：** 以自然语言提供，包括对构成 UML 元模型的元素及其关系的描述。

    -   **形成规则：** 用于定义有效模型的规则和约束。这些规则和约束既使用形式化语言 `OCL`，也使用自然语言进行表达。


    UML 元模型的复杂性通过将其组织成三个包来管理：基础包、行为元素包和模型管理包。前两个包进一步分解为子包，每个子包包含语义相关的元素。以下是每个包的简要描述：


    -   **行为元素：** 此包规定了定义模型动态行为所需的结构。它由五个子包组成。

    -   **基础：** 此包代表了规定静态建模结构的语言基础设施。它分为三个子包。

    -   **模型管理：** 此包定义了模型、包和子系统等，用于组织不同的模型，并将具有共同特征的元素分组。


    ## 11.4 建模语言的类别


    根据专业人士的观点，定义建模语言还有其他一些方式。他们认为建模语言可以分为两种类型：通用型和领域特定型。二者的区别在于通用型拥有更多通用构件的数量，这使其更容易应用于各种领域。


    由于 UML 和 SysML 提供了全面且丰富的结构和标记，用于定义和解释基于面向对象范式的软件应用，或系统工程学科所定义的任何类型的系统，因此它们是通用型和领域特定型的常见实例。¹


    另一方面，DSL 通常使用更少的、与应用程序领域更直接相关的结构或概念。因为 DSL 使用领域概念进行定义，所以通常更易于理解、掌握、验证和交互，从而促进了开发人员与领域专家之间的协作。有人认为
    DSL 可以提高生产力、可靠性、信赖性和可移植性。¹


    然而，采用 DSL 也存在缺点，例如学习、创建和维护一种现代语言及其配套使用所需的生成工具的成本。


    ![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig5_HTML.jpg](img/520777_1_En_11_Fig5_HTML.jpg)


    图 11-5 – 建模语言


    另一些人则认为，由于当今语言工作台的高质量和复杂性，工具支持已不再是重大障碍。


    此外，研究结果表明，软件语言工程师甚至不会评估他们自己的原生语言，这意味着在软件语言过程领域，特别是在设计、实现和评估的开发方面，需要进行更多研究。¹


    如图 11-6 所示，建模语言可以根据其软件架构属性进行分类，并可以通过一个或多个视图进行组织。


    ![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig6_HTML.jpg](img/520777_1_En_11_Fig6_HTML.jpg)


    图 11-6 – 对建模语言及其相关视角进行分类

