- fmt: '### 3.4.7 Transaction Structure


    After learning about the operation and analyzing the fundamental components, you’ll
    now learn how a transaction is structured. (See Figure [3-27](#520777_1_En_3_Chapter.xhtml#Fig27)).


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig27_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig27_HTML.jpg)


    Figure 3-27


    Transaction structured


    The `Locktime` variable is a fascinating one. It defines when a transaction can
    be added to the blockchain for the first time. In most transactions, it is set
    to 0 to indicate instant execution.


    If the block time is more than zero but less than 400 milliseconds, it is regarded
    as a block height, implying that the transaction is not included on the blockchain
    until the block height is reached. It is interpreted as a *UNIX timestamp* if
    it exceeds 400 milliseconds, and the transaction is not included in the blockchain
    before the required time. `Locktime` is the same as postdating a paper check.


    ### 3.4.8 Transaction Fee


    By charging a modest fee for each transaction, transaction fees serve as an incentive
    to include a transaction in the next block, as well as a deterrent against “spam”
    transactions or other forms of system abuse.


    The miner who mines the block and stores the transaction in the blockchain collects
    transaction fees. And, unlike the amount of a Bitcoin transaction, transaction
    fees are calculated depending on the size of the transaction in bytes.


    *   Note that Bitcoin blocks are limited to 1MB (1,000,000 bytes) of dimensions.


    *   Transaction data takes up space in a block.


    So when a miner fills a block of transactions, they will want to maximize the
    amount of money they can raise in taxes. They do it selecting the transactions
    that give them the most money in commissions for the space they occupy in the
    block. Therefore, when processing the value of the transaction fee, the important
    metric is the commission per byte. The miners prioritize transactions based on
    a variety of factors, and in some cases, they may even process transactions for
    free.


    Because transaction fees influence processing priority, a transaction with commissions
    is more likely to be included in the next block extracted, but a transaction with
    inadequate or no commissions may be postponed.


    Transaction costs are not required in most cases, and transactions without them
    may be completed later; however, the inclusion of transaction fees encourages
    priority processing. A charge field is also missing from the transaction data
    structure.


    Fees are implied instead as the difference between the sum of inputs and outputs.


    There is no risk of losing Bitcoins because most wallets compute and account for
    transaction fees automatically. If the transactions are created programmatically
    or via the command line, however, the fees must be manually entered and accounted
    for.


    Any excess amount left over after all expenses are subtracted from all inputs
    is the commission charged by the miners.


    Therefore, if you do not want to lose Bitcoin, it is important to also specify
    the change in UTXOs of a transaction for your wallet.


    ## 3.5 Transaction Flow


    Once a new transaction is made, it is forwarded to the Bitcoin network’s nearby
    nodes to be spread throughout the network.


    Each Bitcoin node that receives a transaction, however, verifies it first before
    sending it to its neighbors. Only legitimate transactions are sent over the network,
    and invalid transactions are discarded by the first node that encounters them.


    If the transmitted transaction is genuine, that node forwards it to the other
    nodes with whom it is connected, and a success message is sent back to the sender
    synchronously. If the transaction is invalid, the node rejects it and sends the
    sender a synchronous rejection message.


    Therefore, invalid transactions will be rejected, while valid ones are disseminated
    through the network and will form the *transaction pool* **.** The transaction
    pool is the set of validated transactions that await be confirmed and added to
    a new block.


    As a result, it serves as a holding area for fresh transactions.


    To produce a new block, miners choose transactions from the transaction pool.
    This new block is called the *candidate block* . Each miner then attempts to add
    their candidate block to the blockchain through the mining process.


    Let’s say a transaction A is the child of a transaction B when a UTXO spent. Transaction
    A is dependent on the output UTXO of the parent transaction (B). Transactions
    do not always arrive in the same order when broadcast over the network.


    It is possible that the child will come before the parents. In this situation,
    nodes that view the child for the first time may notice that it belongs to an
    unknown parent. Rather than rejecting it, it places the child in a temporary pool
    until the parents arrive, after which the child is passed on to all the other
    nodes.


    The orphan transaction pool, also known as the orphaned transaction pool, is a
    parentless transaction pool. All orphans referring to the parent’s UTXO are freed
    from the pool and recursively revalidated once their parents arrive, allowing
    the complete transaction chain to be contained in the transaction pool, ready
    to be pulled into a block.


    The orphan pool’s detention mechanism ensures that otherwise acceptable transactions
    are rejected solely because their parent is late, and that the chain of belonging
    is finally rebuilt in the right order, independent of the order of arrival. The
    transaction chains can be as long as you want them to be. Each node checks each
    transaction it receives against a long list of criteria. Here is the fundamental
    verification criteria:


    *   The transaction’s syntax and data format must be accurate.


    *   None of the input or output lists can be empty.


    *   `MAX BLOCK SIZE` is less than the transaction size in bytes.


    *   For each input, the referenced output must exist and cannot be spent (to prevent
    double spending).


    *   If the referenced output in any other transaction in the pool exists for any
    input, the transaction must be cancelled (to prevent double spending).


    *   To discover the referred output transaction for each input, scan the main
    branch and the transaction pool. Note that if the output transaction is absent
    for any input, the transaction will be orphaned. If a transaction match isn’t
    already in the pool, add it to the orphaned transaction pool.


    Each input’s unlock scripts must be compared to the equivalent output blocking
    scripts. These are the most important verification rules, carried out by each
    node that receives the transaction. The list may vary based on an updated protocol.
    (See Figure [3-28](#520777_1_En_3_Chapter.xhtml#Fig28).)


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig28_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig28_HTML.jpg)


    Figure 3-28


    Lifecycle of a transaction'
