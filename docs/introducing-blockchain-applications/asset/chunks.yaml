  trans: '

    # 排版后的内容


    尽管所描述的四个难度等级相对简单，但它们被证明是在训练环境之外评估系统性能的有效手段。在问题三和四中，`MTTF`和`MDTF`显著降低，表明高交通流量的场景更难以管理。同时，所选难度要素会影响特定类型物体的命中率增减。


    这意味着报告的碰撞情况取决于周围环境。人口数量以及汽车数量的增加，会导致与这些“物体”的碰撞增多。随着人口和汽车数量的增长，与其他车辆的碰撞显然仍是事故的主要原因，这表明拥挤的交通会使控制器处于更危险的位置。


    这些特征对于定义更困难的问题至关重要。这些指标还能用来检测不同类型碰撞的增减之间的关联。


    通过采用第一步中提供的方法（包括场景开发、问题等级和所选指标），无需主动观察控制器的运行情况，就能了解其众多特征。此外，结合少数指定的度量指标，环境条件、初始状态和检查点之间的潜在关联可能会被忽略。


    ## 17.14.2 监控评估（第二阶段）


    在控制器经过验证并记录其运行日志后，可以评估其安全性，以衡量其预测精度以及对整体系统安全的影响。


    如前所述，每一帧都会收集激光雷达数据并传输至安全监控模块。然后，使用“传感器开发”章节中概述的算法对这些数据进行评估，并将包含车辆是否制动具体信息的消息发送回控制系统。与同类真实系统一样，这两个组件之间不存在协调：因为若存在协调将导致运行卡顿，控制器无法每帧都等待安全监控模块的响应。


    采用以下方法来计算真正例、真反例、假正例和假反例的数量：


    - 在安全操作模块与车辆连接后，复制启动阶段记录的控制系统运行过程。

    - 允许安全操作模块发出警报，但仅在系统进入警报状态后经过时间 `t` 后才施加安全制动，如第 3 章所述。

    - 由于选择“过早的” `t` 可能会对处理器已处理的操作施加制动，而选择“过晚的” `t` 则可能因安全制动启动过晚导致安全监控失效，因此 `t` 是影响观察结果可靠性的关键参数。当车辆从安全状态过渡到警报状态时，应尽快激活安全制动。遗憾的是，理解这一过渡发生的时刻并不总是可行的（在复杂运行中几乎不可能）。

    - 基于汽车相对于速度限制的平均速度以及分析激光雷达数据并从安全监控模块获取响应所需的时间（本研究设定为两秒），在 `t` 之前产生的所有警告均被视为假正例。

    - 真反例是指监控模块得出预测但未发出警报的所有帧。

    - 如果系统在设定的单次任务最大持续时间内正常运行，但安全模块在时间 `t` 之后发出警报，则视为假正例警报。

    - 因安全制动监控而成功避免事故（若发生）被视为真正例。

    - 无论安全操作模块是否触发警报，只要发生碰撞，就归类为假反例。

    - 在确定真正例、假正例、真反例和假反例的数量后，可以将它们组合成更精确的度量指标。


    本研究提出的方法似乎是一种有效的策略，用于理解和验证控制器的行为假设，并监控监控模块自身的行为。监控模块的有效性似乎受控制器可靠性的影响。虽然真正例率稳定在
    0.75 左右，但我们可以观察到，在 `C2` 之后，监控模块的精度下降，这引发了关于安全监控模块长期有效性的一些疑问。


    精度的下降表明假正例增加，这使我们推测，由于控制器的新行为，监控模块无法准确识别系统的状态。每个检查点的马修斯相关系数支持这一观点，表现出与控制器学习过程相同的精度行为。我们有兴趣观察，一旦控制器在第三阶段受到约束，MCC
    是否会降低，因为它是衡量监控模块整体性能的指标。


    正如预期，该监控模块产生了大量假正例。这对所概述的监控方法的有效性没有影响，但确实有助于理解如果两个部分协同工作（即由于安全假监控模块的警报产生了大量“虚假”安全信号）时系统将如何表现。

    '
- fmt: '查看精确率-召回率曲线能够快速直观地呈现安全性能监控器的衰退情况。这种监控方式与“简单”控制器配合良好，但当控制器经过更好训练后，则几乎会产生干扰。


    图[17-21](#520777_1_En_17_Chapter.xhtml#Fig21)表明，尽管效率低下，监控器在最高难度设置下（即场景中行人与汽车数量翻倍时）表现最佳。控制器的次优表现出现在第二高难度设置下，即在`C1`之后，车辆数量有所增加的场景。尽管本研究无法完全探讨对控制器而言的“困难”与对观察者而言的“困难”之间的关联，但这些图表的绘制揭示了意料之外的行为，促使我们在未来的研究中对此进行更深入的探究。


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig21_HTML.png](images/520777_1_En_17_Chapter/520777_1_En_17_Fig21_HTML.png)


    **图 17-21** 控制点1至4的安全监控器预测率


    这些发现与收集和分析的数据一致：安全监控器在`C1`上表现良好，而`C2`至`C4`产生的结果几乎相同，其中`C2`的结果略优。


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig23_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig23_HTML.jpg)


    **图 17-23** 比较`C1`至`C4`的精确率-召回率曲线


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig22_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig22_HTML.jpg)


    **图 17-22** 基于各复杂度级别下的观测值，检查点`C1`至`C4`的精确率-召回率曲线


    为了理解安全监控器预测的结果，我们不得不亲自执行并观察第1阶段检查点`C2`的若干最佳运行轨迹。根据表中所示的假阳性原因比例，高速是导致`C2.7`监控器失效的主要原因。这类数据收集的另一个有趣方面是，随着网络学会处理新情况，安全监控器似乎会产生更多的误报，更重要的是，最终将导致碰撞的场景是监控器无法检测到的新型场景。


    图[17-24](#520777_1_En_17_Chapter.xhtml#Fig24)中的表格展示了这种方法的运作方式，以及如何仅通过少量观测就能收集到大量关于系统行为的信息和证据。根据实际可用的硬件和仿真模型，可以获取并整合进一步的测量数据来补充这些信息。


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig24_HTML.png](images/520777_1_En_17_Chapter/520777_1_En_17_Fig24_HTML.png)


    **图 17-24** `C1`产生高比例的假阴性...`C4`


    正如我们项目开始时预期的那样，监控器的有效性似乎受到控制器行为方式的影响。最重要的是，有证据表明监控器的预测准确性与控制器的训练时长无关。使用不同技术重新训练网络，并对操作员使用相同的监控方法，可能会证实或反驳这一发现。


    ### 17.14.3 重新训练与复检（第3阶段）


    如果第2阶段表明，同一安全监控器应用于不同检查点时效率不同，那么使用不同策略进行重构，并将通过这些方法训练出的控制器性能与默认方法训练的控制器进行对比，对于证实或反驳这一理论将至关重要。在此阶段，我们使用以下五种技术对`C4`进行了重新训练：


    *   **S0)** `Coach`框架的基础技术，用于训练`C1...C4`，优化方法根据整体神经网络质量计算。

    *   **S1)** 当汽车碰撞到物体时，惩罚函数形式现在更为严厉，但只要汽车不停车，刹车会得到稍高的奖励。

    *   **S2)** 安全监控器与系统相连，若触发警报，传感器的响应优先于网络的响应。

    *   **S3)** 若监控器触发警报，网络的行动将被监控器的行动替代。网络因表现得像监控器一样而获得正面激励。

    *   **S4)** 若触发警报，训练阶段终止，系统获得负面激励。

    *   结果为`{C5S0, C5S1, C5S2, C5S3, C5S4}`。


    遗憾的是，对于`S2`、`S3`和`S4`技术，基于安全监控器的方法并未产生预期结果。`S3`和`S4`导致控制器停止移动，而`S2`导致控制器在车辆前方有物体时（即使距离相当远）行驶几米后停止。由于不移动会获得低奖励，因此这些检查点都不会因其行为而意外获得高奖励。因此，神经网络陷入局部最小值与最大值之间的情形可能仍是一个理论，但我们认为训练时间过短。


    监控器极高的假阳性率很可能是罪魁祸首。以此方式进行长时间训练教会了车辆通过不移动来避免安全警报和监控器。尽管这些技术通过给予负收益惩罚来考虑车辆不移动的可能性，但这并不足以阻止车辆保持静止。


    我们认为`DDPG`算法的奖励函数定义良好，它考虑到了所有良好和不良行为，并且即时奖励是平衡的，因为不存在意外的高额回报。然而，由于网络应在各种困难和多样化的环境下驾驶车辆，调整所有奖励因子以避免出现我们所观察到的结果极其困难。最重要的是，我们无法得知这种行为是奖励函数设计的结果，还是需要更多训练才能观察到有趣的行为。


    训练中最重要的问题是时间投入；很难用`n`种技术训练`n`个智能体，然后等待它们训练完成再确定哪种方法产生了最佳结果。


    正如许多文献所证明的，网络参数的调整主要依赖于规则和启发式方法。然而，这些方法已被证明既耗时又容易出错。


    此外，目前试错法似乎是衡量奖励函数效率的唯一方法。由于训练数据仍在研究中，且自动驾驶汽车没有明确的规则，这个对这些算法而言独特的问题仍未解决。在学术界，为这些相对较新的算法设计奖励函数是一个热门话题，研究人员正试图找出如何提供合适的学习模型。'
  raw: 'Viewing the accuracy-recall curves offers a fast visual representation of
    the safety-performance monitor’s decline, which works well with a “dumb” controller
    but becomes nearly disruptive with better trained controllers.


    Figure [17-21](#520777_1_En_17_Chapter.xhtml#Fig21) demonstrates that, despite
    its low efficiency, the monitors perform best at the highest difficulty setting,
    i.e. when the number of people and automobiles in the scenarios is doubled. The
    controller’s second-best performances are shown with the second-most difficult
    difficulty, i.e. the level when the number of vehicles is increased, after C1\.
    Although the link between something “hard” for the controllers and something “hard”
    for the observer cannot be completely examined in this study, charting these pictures
    revealed unexpected behavior, leading us to look into this more in future studies.


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig21_HTML.png](images/520777_1_En_17_Chapter/520777_1_En_17_Fig21_HTML.png)


    Figure 17-21


    The safety monitor forecast rates for control points 1 to 4


    These findings are in line with the data collected and analyzed, as the security
    performs well with C1, while C2 to C4 produce almost identical outcomes, with
    C2 producing somewhat superior results.


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig23_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig23_HTML.jpg)


    Figure 17-23


    Comparing of PRC for C1 through C4


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig22_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig22_HTML.jpg)


    Figure 17-22


    Accuracy recall curve for checkpoints C1–4 based on observed values at every level
    of complexity


    To comprehend the results of the safety monitor’s predictions, we had to personally
    perform and watch some of the best runs for Checkpoints 2 in phase 1\. High speed
    is the major reason for monitor failures for C2.7, according to the percentage
    of false-positive causes shown in the table. Another intriguing aspect of this
    type of data collection is that it appears that as the network learns to handle
    new situations, the security produces more false alarms, and, more importantly,
    the scenarios that will eventually result in a crash are of a new type that the
    watch is unable to detect.


    The table in Figure [17-24](#520777_1_En_17_Chapter.xhtml#Fig24) shows how this
    approach works and how a great quantity of information and proof about the system’s
    behavior can be gathered using only a few observations. Depending on the real
    hardware available and the simulation model, further measurements can be acquired
    and combined to supplement this information.


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig24_HTML.png](images/520777_1_En_17_Chapter/520777_1_En_17_Fig24_HTML.png)


    Figure 17-24


    C1 generates a high percentage of false - negative: : : C4


    The monitor’s effectiveness appears to be impacted by how the controller acts,
    as we anticipated at the start of this project. Most significantly, evidence shows
    that the monitor’s prediction accuracy is unrelated to the length of time the
    controller has been taught. Retraining the network with various techniques and
    using the same monitoring approach for the operators may confirm or refute this
    finding.


    ### 17.14.3 Retraining and Rechecking (Phase 3)


    If Phase 2 suggested that the efficiency of the same security varies when applied
    to different checkpoints, restructuring with different strategies and comparing
    the performance of controllers trained in these methods to the one we used as
    the default approach will be critical in confirming or refuting this theory. In
    this phase, we retrained C4 using the five techniques listed here:


    *   S0) The Coach framework’s basic technique, which was used to train C1... 4,
    with the optimization method calculated depending on the total neural network
    quality.


    *   S1) When the automobile strikes anything, the functional form is now more
    severe, but braking is somewhat more rewarding, as long as the car does not stop
    going.


    *   S2) The security monitor is connected to the system, and if an alarm is raised,
    the sensor’s response takes precedence over the network’s.


    *   S3) If the monitoring raises an alarm, the network’s activity is substituted
    by the monitor’s. For acting like the monitors, the network receives a good incentive.


    *   S4) If an alarm is triggered, the training phase is terminated and the system
    is given a poor incentive.


    *   The result is `{C5S0, C5S1, C5S2, C5S3, C5S4}`.


    On the failure of the S2, S3, and S4 techniques, regrettably, the safety monitor-based
    methods did not yield the expected results. S3 and S4 stop the controller from
    moving, while S2 causes it to stop after a few meters if there is something in
    front of the vehicle, even if it is a considerable distance away. Because not
    moving is a poor reward, none of these checkpoints receive an unintentionally
    large reward for their behavior. As a consequence, the scenario in which the neural
    net becomes stuck between a local minimum and maximum may remain a theory, but
    we feel the training time was too short.


    The monitor’s extremely large false positive rate is probably certainly to blame.
    Extended training in this manner taught the vehicle not to move in order to avoid
    the safety alarms and monitors. Even though these techniques account for the possibility
    of the car not moving by penalizing it with a -ve benefit, it was not sufficient
    to keep the automobile from remaining still.


    We think that the DDPG algorithm’s reward function is well-defined, in the sense
    that it accounts for all good and bad behaviors, and that immediate rewards are
    well-balanced, as there are no inadvertently huge payments. However, adjusting
    all of the reward factors to prevent results like the one we witnessed is exceedingly
    tough owing to the difficulty and diversity of circumstances that a network should
    be allowed to drive a vehicle. Most important, we have no way of knowing if this
    behavior is a product of the reward function’s design or if it requires more training
    to observe intriguing behaviors.


    The most important issue with training is the time commitment; it is difficult
    to teach n agents using n techniques and then wait for them to be taught before
    determining which approach produced the best results.


    The tuning of the network’s parameters is primarily dependent on regulations and
    heuristic approaches, as demonstrated by many publications. These methods, on
    the other hand, have shown to be time-consuming and error-prone.


    Furthermore, at this time, trial-and-error appears to be the sole way to measure
    the reward function’s efficiency. Because training data is still being investigated
    and there are no defined laws for self-driving vehicles, this problem, which is
    unique to these algorithms, remains unresolved. In academia, the design of the
    reward function for these relatively new algorithms is a hot issue, with academics
    trying to find out how to offer an appropriate learning model.'
  trans: "  \n查看精确率-召回率曲线能够快速直观地呈现安全性能监控器的衰退情况。这种监控方式与“简单”控制器配合良好，但当控制器经过更好训练后，则几乎会产生干扰。\
    \  \n\n图 17-21 表明，尽管效率低下，监控器在最高难度设置下（即场景中行人与汽车数量翻倍时）表现最佳。控制器的次优表现出现在第二高难度设置下，即在`C1`之后，车辆数量有所增加的场景。尽管本研究无法完全探讨对控制器而言的“困难”与对观察者而言的“困难”之间的关联，但这些图表的绘制揭示了意料之外的行为，促使我们在未来的研究中对此进行更深入的探究。\
    \  \n\n![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig21_HTML.png](img/520777_1_En_17_Fig21_HTML.png)\
    \  \n\n**图 17-21** 控制点 1 至 4 的安全监控器预测率  \n\n这些发现与收集和分析的数据一致：安全监控器在`C1`上表现良好，而`C2`至`C4`产生的结果几乎相同，其中`C2`的结果略优。\
    \  \n\n![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig23_HTML.jpg](img/520777_1_En_17_Fig23_HTML.jpg)\
    \  \n\n**图 17-23** 比较`C1`至`C4`的精确率-召回率曲线  \n\n![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig22_HTML.jpg](img/520777_1_En_17_Fig22_HTML.jpg)\
    \  \n\n**图 17-22** 基于各复杂度级别下的观测值，检查点`C1`至`C4`的精确率-召回率曲线  \n\n为了理解安全监控器预测的结果，我们不得不亲自执行并观察第\
    \ 1 阶段检查点`C2`的若干最佳运行轨迹。根据表中所示的假阳性原因比例，高速是导致`C2.7`监控器失效的主要原因。这类数据收集的另一个有趣方面是，随着网络学会处理新情况，安全监控器似乎会产生更多的误报，更重要的是，最终将导致碰撞的场景是监控器无法检测到的新型场景。\
    \  \n\n图 17-24 中的表格展示了这种方法的运作方式，以及如何仅通过少量观测就能收集到大量关于系统行为的信息和证据。根据实际可用的硬件和仿真模型，可以获取并整合进一步的测量数据来补充这些信息。\
    \  \n\n![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig24_HTML.png](img/520777_1_En_17_Fig24_HTML.png)\
    \  \n\n**图 17-24** `C1`产生高比例的假阴性...`C4`  \n\n正如我们项目开始时预期的那样，监控器的有效性似乎受到控制器行为方式的影响。最重要的是，有证据表明监控器的预测准确性与控制器的训练时长无关。使用不同技术重新训练网络，并对操作员使用相同的监控方法，可能会证实或反驳这一发现。\
    \  \n\n### 17.14.3 重新训练与复检（第 3 阶段）  \n\n如果第 2 阶段表明，同一安全监控器应用于不同检查点时效率不同，那么使用不同策略进行重构，并将通过这些方法训练出的控制器性能与默认方法训练的控制器进行对比，对于证实或反驳这一理论将至关重要。在此阶段，我们使用以下五种技术对`C4`进行了重新训练：\
    \  \n\n*   **S0)** `Coach`框架的基础技术，用于训练`C1...C4`，优化方法根据整体神经网络质量计算。  \n*   **S1)**\
    \ 当汽车碰撞到物体时，惩罚函数形式现在更为严厉，但只要汽车不停车，刹车会得到稍高的奖励。  \n*   **S2)** 安全监控器与系统相连，若触发警报，传感器的响应优先于网络的响应。\
    \  \n*   **S3)** 若监控器触发警报，网络的行动将被监控器的行动替代。网络因表现得像监控器一样而获得正面激励。  \n*   **S4)**\
    \ 若触发警报，训练阶段终止，系统获得负面激励。  \n*   结果为`{C5S0, C5S1, C5S2, C5S3, C5S4}`。  \n\n遗憾的是，对于`S2`、`S3`和`S4`技术，基于安全监控器的方法并未产生预期结果。`S3`和`S4`导致控制器停止移动，而`S2`导致控制器在车辆前方有物体时（即使距离相当远）行驶几米后停止。由于不移动会获得低奖励，因此这些检查点都不会因其行为而意外获得高奖励。因此，神经网络陷入局部最小值与最大值之间的情形可能仍是一个理论，但我们认为训练时间过短。\
    \  \n\n监控器极高的假阳性率很可能是罪魁祸首。以此方式进行长时间训练教会了车辆通过不移动来避免安全警报和监控器。尽管这些技术通过给予负收益惩罚来考虑车辆不移动的可能性，但这并不足以阻止车辆保持静止。\
    \  \n\n我们认为`DDPG`算法的奖励函数定义良好，它考虑到了所有良好和不良行为，并且即时奖励是平衡的，因为不存在意外的高额回报。然而，由于网络应在各种困难和多样化的环境下驾驶车辆，调整所有奖励因子以避免出现我们所观察到的结果极其困难。最重要的是，我们无法得知这种行为是奖励函数设计的结果，还是需要更多训练才能观察到有趣的行为。\
    \  \n\n训练中最重要的问题是时间投入；很难用`n`种技术训练`n`个智能体，然后等待它们训练完成再确定哪种方法产生了最佳结果。  \n\n正如许多文献所证明的，网络参数的调整主要依赖于规则和启发式方法。然而，这些方法已被证明既耗时又容易出错。\
    \  \n\n此外，目前试错法似乎是衡量奖励函数效率的唯一方法。由于训练数据仍在研究中，且自动驾驶汽车没有明确的规则，这个对这些算法而言独特的问题仍未解决。在学术界，为这些相对较新的算法设计奖励函数是一个热门话题，研究人员正试图找出如何提供合适的学习模型。\
    \  \n"
- fmt: 'Simultaneously, as previously said, AV training needs a huge amount of data,
    which is frequently inaccessible or insufficient as compared to traditional training
    methods. There are several frameworks for designing decision-making rules for
    relevance feedback, but most of them seem to focus on how to speed up the learning
    process rather than how to add learning factors to these networks.


    Creating probabilistic models to aid in the calibration of reward system parameters
    prior to the controller’s retraining phase would be a fascinating approach. Because
    the protection performance measures were effectively approximated, the technique
    presented in this book would have a substantial impact on the construction of
    these models.


    In reality, the reward function has no means of knowing ahead of time what value
    each state should be assigned. Keep in mind that we are in a full spatial condition,
    which is difficult to depict and makes it hard to evaluate all potential events
    and transitions, making our task much more difficult.


    Unfortunately, because of the complexity and uniqueness of these systems and techniques,
    more research is required to address these issues, and the development of a simulation
    process to aid fine-tuning will be critical in future work.


    ## 17.15 Summary


    This chapter looked at how to do a checking activity on self-driving automobiles
    managed by a controller and a sys admin.


    Such systems demand special attention due to their complexity and the main problems
    of the ecosystem in which they function. This research is meant to be a first
    step in defining how such systems should be monitored. Because they are regularly
    employed in military activities, automatic vehicles are not a novel sort of equipment.
    However, because self-driving cars will be operating in close proximity to humans
    and in an urban environment, greater caution will be necessary in coping with
    the wide variety of events that may occur.


    We also questioned if there were any links between the efficacy of the relative
    safety and that of the control element when the latter was taught for long periods
    of time using various approaches. We covered the basic principles of these activities
    in the initial parts, such as:


    * The definitions of reliability and safety, which are both critical components
    of safety. In the context of self-driving automobiles, critical systems were examined.

    * Problems that prohibit us from deploying self-driving automobiles in metropolitan
    areas at this point in time.

    * How an incorrect/poor/optimistic evaluation of these systems’ reliability might
    have catastrophic repercussions when they are implemented.

    * Problems in analyzing observed emerging behavior as a result of the interaction
    of two main constituent components.


    Is the efficacy of the safety monitor impacted by the controller’s behavior, and
    if so, how? By the duration of the training and the strategies used throughout
    the training.


    The instruments accessible for this type of activity were considered in the creation
    of this initial technique. We have to seek open-source alternatives because most
    solutions in this sector are private and proprietary, indicating that performing
    these studies in non-professional contexts is difficult.


    The Lidar sensor issue would have rendered our study unfeasible, and it could
    have been impossible if it hadn’t been for Zhuang’s effort, because our only alternative
    would have been to rely on ground observations, which would have been useless
    for our research.


    While the Coach framework was created by Intel AI Labs, it has the usual problems
    that plague open-source projects, the most notable of which being the failure
    of one of the two CARLA agents to move after a few rounds of training in Phase
    1. This problem makes us question if there were other flaws in the training algorithm’s
    architecture that contributed to the `C5S2:::4` behaviors.


    Another issue that obstructs the framework’s use is that the memory is not properly
    released, leading it to overflow and crash the running processes. As a result,
    we had to maintain a close check on the training process and redo it after each
    mishap.


    The monitoring activity was created with the following major characteristics in
    mind:


    * **Consistency:** By saving the controller’s activity in each frame, as well
    as the RNGs1 seeds, goal objectives, and the environment variable of every circumstance
    in files.

    * **The ability to be unobtrusive:** Because of the client-server design, code
    instrumentation may provide non-real-time data or incorrect measurements. This
    difficulty is solved by CARLA, which allows users to conduct simulations at a
    set time step. But the h/w should be capable of achieving the specified time step.'
