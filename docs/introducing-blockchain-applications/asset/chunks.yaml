- fmt: '### Gas for Storing


    Not only is `gas` used to pay for the calculation steps, but it is also used to
    pay for memory usage. The rates for archiving have some nuanced aspects. For example,
    since a major memory increase increases the size of the Ethereum state database
    on all nodes, there is an incentive to keep the amount of data small when archiving.


    For this reason, if a transaction has a phase where it cancels an entry in the
    storage space, the execution commission of that transaction is canceled and a
    refund is granted to free up storage space. In addition, the storage costs are
    very high. When we develop a smart contract, we have three ways to access memory:


    - **Stack**: Access to the volatile stack.

    - **Memory**: Access to volatile storage or memory.

    - **Storage**: Access to non-volatile storage. The most expensive is non-volatile
    storage.


    Figure 4-20 shows a table with the gas required for each memory operation.


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig20_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig20_HTML.jpg)


    **Figure 4-20** List of gas costs for each operation on the memory


    In conclusion, storing data constantly on Ethereum is extremely costly. There
    is no point in using Ethereum to keep data. Only the data needed for the current
    operations should be stored; delegate archiving to another solution.


    However, a great method would be to archive in Ethereum only the root or the base
    hash of the Merkle tree as proof of data tampering on an external service.


    It is important to understand the smart contracts in terms of consumption or computation
    of gas to control operating price.


    There are several APIs for estimating transaction costs as well as of smart contracts.
    But this goes beyond the objectives of this book. Ultimately, all operations,
    both computational and archiving, have a price explained in the gas units. When
    a user submits a transaction, they provide an ETH price per gas unit and the number
    of units of gas that they are willing to spend. The lower the code in terms of
    gas, the more efficient it will be in terms of materials needed to execute the
    code.


    ### The Purpose of Gas


    An important aspect of how Ethereum runs is that every single operation performed
    by the network is performed together from every full node. But you have seen that
    the calculation steps on the Ethereum virtual machine can be more costly.


    Hence, the Ethereum smart contracts are used for elementary activities, such as
    the execution of a simple business strategy, or verifying digital signatures and
    other cryptographic objects, rather than for more complex uses such as file archiving,
    email, machine learning, and in general operations that can strain the network.


    The imposition of tariffs prevents users from overcharging. Note that Ethereum
    is a complete or full Turing language and, in a nutshell, it is capable of simulating
    any algorithm. This also allows you to create loops and makes Ethereum sensitive
    to the problem of avoiding programs that are performed indefinitely.


    In the absence of tariffs, an attacker could effectively try to distract the network
    by running an unlimited loop within an action or an operation without any repercussions.


    ## Transactions and Messages


    We have defined the Ethereum blockchain as a machine state based on transactions.
    Therefore, a transaction is an event that can change the state of the Ethereum
    blockchain. A transaction can be created for different purposes:


    - Digital money transfer between EOs

    - Distribution of a smart contract on the Ethereum blockchain

    - Execute a function on a distributed smart contract


    A transaction can only be created and transmitted by EOs.


    ### Transaction Structure


    An Ethereum transaction is an array of bytes. The matrix is divided into fields,
    as shown in Figure 4-21.


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig21_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig21_HTML.jpg)


    **Figure 4-21** Transaction structure


    Transactions are maintained through the modified Merkle Patricia tree, which was
    discussed extensively in the section dedicated to the world state.


    In this logic, the keys are represented by the Transaction IDs and the values
    are precisely the transactions.


    ### Transaction Digital Signature Flow


    We use the steps taken to sign a transaction, following the EIP (Ethereum Improvement
    Proposal) scheme proposed, after the hard fork that hit Ethereum, by Vitalik Buterin
    which protects against possible replay attacks. Using the old scheme also works;
    however, the founder suggests using the new one to protect yourself from replay
    attacks. It is possible to see here:


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Figa_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Figa_HTML.jpg)


    This was proposed by the founder of Ethereum, with the list of IDs of all chains.


    Once a transaction is created, it is serialized via the function `RLP`:


    ```

    L[1](T) = RLP(T(T[n]; T[p]; T[g]; T[t]; T[v]; p; chainID; (); ()))

    ```

    where `p = T[i]` if `T[t] = 0`, otherwise `p = T[d]`.


    Once serialized, the cryptographic hash function called SHA-3 is applied, also
    called Keccak-256:


    ```

    h[1](T) = KEC(L(T))

    ```


    Once this is done, you can apply the signature:


    ```

    ECDSASIGN(h(T); privKey) = (T[w]; T[r]; T[s])

    ```


    In which:


    - `T[w]` is a recovery identifier and it is doubled plus 35 or 36

    - `T[r]` is the `randomPart` of the digital signature

    - `T[s]` is the sign of the digital signature


    Therefore, `T[r]` and `T[s]` constitute the outputs of the ECDSA digital signature
    (`randomPart`; `sign`), while `T[w]` is calculated according to `EIP155`, and
    has a dual purpose:


    - Protects from replay attacks

    - Allows you to retrieve information for the quick recovery of the public key


    In fact, the sender’s address is not present in the transaction. Once this is
    done, the fields `T[w]`, `T[r]`, and `T[s]` are added to the transaction, obtaining
    `T(T[n]; T[p]; T[g]; T[t]; T[v]; p; T[w]; T[r]; T[s])`.


    Then the `RLP` serialization function is applied to this:


    ```

    L[2](T) = RLP(T(T[n]; T[p]; T[g]; T[t]; T[v]; p; T[w]; T[r]; T[s]))

    ```


    And once again the SHA-3 hash function is applied:


    ```

    h[2](KEC(L[s](T)))

    ```


    What you finally get is the Transaction ID.'
