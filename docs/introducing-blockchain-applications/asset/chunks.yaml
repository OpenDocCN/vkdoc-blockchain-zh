    ![../images/520777_1_En_12_Chapter/520777_1_En_12_Fig4_HTML.jpg](img/520777_1_En_12_Fig4_HTML.jpg)


    **图 12-4** 块的构建模块可被激活或禁用


    它也可以用于从常规视角查看模型（例如，通过线条展示块与其他块之间的关系）。


    若要查询某个模型，用户可右键点击工作区并选择 **显示查询图**。在查询图中，用户可以创建过滤器来查询模型。^(¹¹)


    例如，返回 `true` 表示无需过滤（即显示图 12-5 中所描绘模型的所有块）。此查询将生成图 12-5 中的图表，该图表使用以下过滤器高亮显示了所有类型为
