    \ reconfigure, and delete peers.\n\n![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig4_HTML.jpg](images/520777_1_En_6_Chapter/520777_1_En_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4  \nLedger and chaincode\n\nA peer therefore has one or more instances\
