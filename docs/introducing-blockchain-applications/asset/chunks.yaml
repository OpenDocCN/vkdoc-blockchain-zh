- fmt: '### 11.2.3 The Model


    A *model* depicts a system that might or might not exist today or in the future.
    It’s a term of reference considered valid as an example or prototype and worthy
    of imitation.


    A model is worth considering since it includes the following details:


    - A model can be a collection of assertions about the device/system which goes
    into the investigation.

    - A model is the simplest version of a system that was formed with a specific
    goal in mind, and it should be capable of answering queries in place of the actual
    system.

    - A model is a simplified edition of a system that was formed with a particular
    objective in mind, and it can reply to the queries for the real program.


    A model, on the other hand, is a system in and of itself, with its own identity,
    complexity, constituents, linkages, and so on.


    In particular, while considering a model of a model, you must keep in mind that
    one of them serves as a model of a model and, as a result, is a *system*. In summary,
    “model” is a system that helps describe and provide answers to the system under
    study without having to look at it directly, as shown in Figure [11-3](#520777_1_En_11_Chapter.xhtml#Fig3).


    ![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig3_HTML.jpg](images/520777_1_En_11_Chapter/520777_1_En_11_Fig3_HTML.jpg)


    Figure 11-3 – Relationships between a model and a system


    There is also a relationship between the model and the system. With the help of
    models, you can design a system. By looking at models, you can understand how
    the system works. On the other hand, you can make a number of models based on
    the system architecture. That is the reason you can say that a model is a simplified
    edition of a system, and it is formed with a particular goal in mind.¹


    ### 11.2.4 The Metamodel


    A *metamodel* is a type of model that specifies the architecture of a modeling
    language, based on prior research. However, the following facts must be understood
    from Figure [11-4](#520777_1_En_11_Chapter.xhtml#Fig4).


    ![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig4_HTML.jpg](images/520777_1_En_11_Chapter/520777_1_En_11_Fig4_HTML.jpg)


    Figure 11-4 – Relationships between a metamodel and a model


    We can say that the modeling language will be a set of models, as defined by the
    relationship *Element Of* between *model* and *modeling language* (or a model
    is an element of a modeling language).


    We can also say that this approach draws its rules from the distinction between
    the concept of a model and that of a metamodel.


    A UML model is a representation that captures the important aspects of everything
    you want to model, from a certain point of view and under certain limitations.
    A model is structured in diagrams (UML diagrams), which represent the graphic
    means of expression. The model consists of three basic parts:


    - **Classifiers:** They describe a set of objects. An object is an individual
    entity with a state and relationships with other objects.

    - **Events (Events):** They describe a set of possible occurrences. An occurrence
    is something that happens and has consequences within the system.

    - **Actions (Behaviors):** They describe a set of possible executions. An execution
    represents the fulfillment of an algorithm in accordance with a set of rules.⁹


    UML diagrams, on the other hand, contain graphic elements that represent elements
    of the model. For example, two associated classes defined within a package diagram
    are two types of classifiers and are represented by two rectangular symbols and
    a link representing the association symbol.


    ## 11.3 Building the Metamodel and Model


    How to build the first metamodel is a well-known and recurrent metamodel problem.
    The official OMG specification describes the semantics of UML by breaking down
    the architecture in the package. Within each package, the elements of the model
    are defined in the following terms in a semiformal way:


    - **Abstract-syntax:** Presented, through class diagrams expressed with the UML
    notation, the UML metamodel, its concepts (i.e. meta-classes), and its relationships
    and constraints. To these are added parts of text written in natural language
    (English).

    - **Connotation:** Provided in natural language, it includes the description of
    elements that make up the UML metamodel and their relationships.

    - **Formedness rules:** The rules and constraints to define models that are valid.
    These are expressed using both a formal language, `OCL`, and natural language.


    The complexity of the UML metamodel is managed by organizing it into three packages:
    Foundation, Behavioral Elements, and Model Management. The first two are further
    decomposed into packages, each of which contains semantically related elements.
    Here is a brief description of each package:


    - **Behavioral Elements:** This package specifies the structure needed to define
    the dynamic behaviors of a model. It consists of five subpackages.

    - **Foundation:** This package represents the language infrastructure that specifies
    the structure static modeling. It is divided into three subpackages.

    - **Model Management:** This package defines, among others, the model, package
    and subsystem necessary to organize different models and to group together elements
    that have features in common.


    ## 11.4 A Modeling Language’s Category


    According to professionals, there are some other ways you can define modeling
    languages. They say a modeling language may be divided into two types: specific
    and domain-specific. They are differentiated by a higher number of generic constructs,
    which facilitates their application in a variety of areas.


    Because they provide comprehensive collection of structures and marking for defining
    and explaining software applications based on the object-oriented paradigm, or
    any type of system as defined by the system engineering discipline, UML and SysML
    are popular instances of specific and domain specific.¹


    DSLs, on the other hand, typically use a smaller set of structures or ideas that
    are more directly connected to the application area. Because a DSL is defined
    using domain concepts, it is typically easier to understand, grasp, validate,
    and interact with, facilitating collaboration between developers and domain specialists.
    Some argue that DSLs can improve productivity, dependability, reliability, and
    portability.¹


    Yet, there are also drawbacks to adopting a DSL, such as the expense of learning,
    creating, and sustaining a contemporary language, as well as the production tools
    needed to use it.


    ![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig5_HTML.jpg](images/520777_1_En_11_Chapter/520777_1_En_11_Fig5_HTML.jpg)


    Figure 11-5 – Modeling language


    Others argue that, because of the high quality and complexity of today’s language
    workstations, tool support is no longer a significant obstacle.


    Furthermore, findings suggest that software language engineers would not even
    evaluate their native languages, implying that additional study in the subject
    of software language processes, especially in the development of design, implementation,
    and assessment, is necessary.¹


    As illustrated in Figure [11-6](#520777_1_En_11_Chapter.xhtml#Fig6), a modeling
    language may be classified by its software architecture attributes and organized
    by one or more views.


    ![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig6_HTML.jpg](images/520777_1_En_11_Chapter/520777_1_En_11_Fig6_HTML.jpg)


    Figure 11-6 – Categorizing a modeling language and the perspectives that go with
    it'
