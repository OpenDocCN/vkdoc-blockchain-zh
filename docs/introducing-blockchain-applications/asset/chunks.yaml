- fmt: "### 3.3.3 Bitcoin Address\n\nA Bitcoin address, or simply an address, is an\
    \ identifier of 26-35 alphanumeric characters, starting with the number 1, 3,\
    \ or `bc1`, that represents a possible destination for a Bitcoin payment. Transactions\
    \ in Bitcoin (cryptocurrency, BTC) can be made through an address, a bit like\
    \ sending an email. However, unlike email addresses, people have different Bitcoin\
    \ addresses and at the same time a unique address should be used for every transaction.\n\
    \nA person can create an unlimited number of addresses, increasing the level of\
    \ anonymity of payments. An address is created from three elements:\n* A public\
    \ key hash\n* A prefix\n* A checksum\n\nLet’s analyze these three components in\
    \ detail.\n\nThe public key hash is nothing more than a double hash applied to\
    \ the public key. In particular, it is the hash obtained through the `SHA-256`\
    \ and `RIPEMD160`, and therefore:\n\n```\n> = RIPEMD160 (SHA-256 (>))\n```\n\n\
    It is sometimes referred to as `HASH160 (<< publickey >>)`, because it is simpler\
    \ than writing `RIPEMD160 (SHA256 (<< publickey >>))`.\n\nThe prefix indicates\
    \ the type of block to be created. The most commonly used ones are:\n* `00`: For\
    \ the `P2PKH` locking script (you will learn what it is later)\n* `05`: For `P2SH`\
    \ locking script\n\nFinally, the checksum is obtained by performing the `SHA-256`\
    \ hash twice on the public key hash and taking the first four bytes. So, you take\
    \ these elements and put them in order to get a queue (see Figures [3-6](#520777_1_En_3_Chapter.xhtml#Fig6)\
    \ and [3-7](#520777_1_En_3_Chapter.xhtml#Fig7)):\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig6_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig6_HTML.jpg)\n\
    \n**Figure 3-6** Elements to form the Bitcoin address\n\n1. `prefix`\n2. `HASH160(«public\
    \ key»)`\n3. `checksum`\n\nThe `Base58` function is then applied, which will finally\
    \ provide the Bitcoin address, as shown in Figure [3-7](#520777_1_En_3_Chapter.xhtml#Fig7).\n\
    \n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig7_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig7_HTML.jpg)\n\
    \n**Figure 3-7** Bitcoin address\n\n`Base58` is a converter that you can use to\
    \ represent large numbers in a shorter and more intuitive format, resulting in\
    \ a text alphanumeric. Obviously, these operations are implemented at the application\
    \ level, and it is not up to the user to carry out all these steps.\n\n### 3.3.4\
    \ Digital Signature\n\nThe digital signature is a mathematical means of demonstrating\
    \ that you are aware of the private key associated with a public key without revealing\
    \ the effective private key. When making a transaction, you must first unlock\
    \ the balances you want to use (UTXO, as you’ll see in the next section). This\
    \ can be accomplished by demonstrating that you “own” the balance and that you\
    \ know the private key to the address where the balance is kept. Therefore, to\
    \ unlock a balance without providing the private key you use the digital signature.\
    \ In this way you show that you have the private key, without handing it over\
    \ to the network. These are then used in transactions to prove you own the balances\
    \ you are spending.\n\nWhat stops someone from exploiting a transaction’s digital\
    \ signature to unlock other exits at your address? Each transaction has its own\
    \ digital signature.\n\nTo put it another way, you employ not only the private\
    \ key, but the private key and the transaction data to construct a digital signature.\
    \ As a result, any digital signature is associated with the transaction in which\
    \ it is employed. As a result, if someone tries to use a transaction’s digital\
    \ signature in a new transaction, it will clash with the data of the transaction\
    \ in the digital signature shop and will be rejected by the Bitcoin network’s\
    \ nodes.\n\nConsequently, the digital signature will also save against destroying\
    \ the transaction in which it is used. A digital signature consists of two parts:\n\
    * A random part\n* A part of the signature, consisting of:\n  * A private key\n\
    \  * The data on which you are creating the digital signature\n\nFor the random\
    \ part, let *n* be the order of point `G` of the second elliptic curve the standard\
    \ `secp256k1`. You generate a random number 2 [1; n - 1] and call this random\
    \ number.\n\nYou then multiply this random number by the point `G` (generator\
    \ point) of the elliptic curve. This is the same `G` you used for the public key\
    \ and indicated by the standard `secp256k1`. For the sake of brevity, you call\
    \ the random number with the variable `k`.\n\n```\nk G = (xr; yr)\n```\n\nThe\
    \ random part of this digital signature is the point on the curve that you obtain\
    \ (see Figure [3-8](#520777_1_En_3_Chapter.xhtml#Fig8)). But you only take the\
    \ `xr` coordinate.\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig8_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig8_HTML.jpg)\n\
    \n**Figure 3-8** Random number obtained on the curve, from which you take the\
    \ X coordinate\n\nFor the sake of brevity, you can call `r` the `randomPart` value\
    \ obtained from\n\n```\nr = randomPart = xr mod n\n```\n\nFor the signature part,\
    \ you need to take the private key for the random part.\n\n```\nr * privKey\n\
    ```\n\nThen you include the data on which you want to create the signature.\n\n\
    In Bitcoin, this is represented by the hash of the transaction that contains the\
    \ balance (UTXO) that you want to unlock. You define `h (msg) = SHA-256 (<<transaction\
    \ >>)` and get:\n\n```\n[r * privKey] + h(msg)\n```\n\nThe inclusion of the transaction\
    \ hash binds the signature to a transaction (therefore it cannot be used in a\
    \ different transaction). Finally, you divide this by the initial random number\
    \ `k`:\n\n```\ns = sign = k-1 (r privKey + h(msg)) (mod n)\n```\n\nYou have obtained\
    \ the fundamental part of the digital signature. The digital signature is made\
    \ up of an `r` and an `s`.\n\nIf someone asks you to prove that you know the key\
    \ private for a public key, you can give them the signature digital (`r`; `s`)\
    \ as proof.\n\n#### 3.3.4.1 Verifying a Digital Signature\n\nTo verify that a\
    \ digital signature has been made using a correct private key, the person to whom\
    \ you provide this digital signature must use both sides (`r`; `s`) to find two\
    \ new points on the elliptic curve and check the signature.\n\nFrom here on, the\
    \ multiplication operator is used only when it is strictly necessary to divide\
    \ the variables, otherwise yes assumes the implicit multiplication operation.\n\
    \nFirst, let’s take the data on which the digital signature has been affixed.\
    \ In this case, it is the `SHA-256` hash that’s applied to the transaction.\n\n\
    You divide this value by `s` (the core part of the digital signature) and multiply\
    \ by `G` (the generator point), like so:\n\n```\nu1 = (x1; y1) = (h(msg) s-1 mod\
    \ n) G\n```\n\nYou then find point 1 (see Figure [3-9](#520777_1_En_3_Chapter.xhtml#Fig9)).\n\
    \n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig9_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig9_HTML.jpg)\n\
    \n**Figure 3-9** Example of graphic representation of point 1\n\nThen you divide\
    \ `r` by `s` and multiply by the `< < publickey > >`:\n\n```\nu2 = (x2; y2) =\
    \ (r s-1 mod n) pubKey\n```\n\nYou then have point 2 (see Figure [3-10](#520777_1_En_3_Chapter.xhtml#Fig10)).\n\
    \n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig10_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig10_HTML.jpg)\n\
    \n**Figure 3-10** Example of graphic representation of point 2\n\nFinally, add\
    \ these two points and you get a third point on the elliptic curve (see Figure\
    \ [3-11](#520777_1_En_3_Chapter.xhtml#Fig11)).\n\n```\nRv = (xv; yv) = u1 + u2\n\
    ```\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig11_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig11_HTML.jpg)\n\
    \n**Figure 3-11** Example of graphical representation of the sum between point\
    \ 1 and point 2\n\nIf the value `c = xv mod n` of this point `Rv = (xv; yv)` obtained\
    \ on the elliptic curve is equal to `r`, that is, `c == initial r`, then it’s\
    \ proof that the digital signature was made with the public key’s connected private\
    \ key."
