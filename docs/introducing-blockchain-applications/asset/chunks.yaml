  trans: "\n## 17.10 实验方法\n\n本探索性研究的方法分为三个阶段：\n\n- **阶段 1：** 给定神经网络的 `c` 个检查点以及 `nh`\
    \ 种情境，操作员在所有情况下接受评估，并记录其运行日志。\n- **阶段 2：** 将安全监控器连接到系统后，通过重复阶段 1 所执行的测试对其进行验证。\n\
    - **阶段 3：** 利用多种技术对网络进行重新训练，以提升其相对于先前检查点的效率。之后，在指定的所有情境中对更新后的控制器和安全监控器进行评估。\n\n\
    我们感兴趣的是在第一阶段确定神经网络及监控器的质量。这分两个步骤完成。第一步，在所有情境下对控制器的 `m` 个检查点进行测试。我们主要关注在此阶段中控制器的可靠性如何随这些检查点变化。\n\
    \n可重复性问题是对神经网络进行评估时最困难的方面之一。即便初始条件相同，同一个神经网络在多次运行中也几乎不可能表现相同。\n\n由于网络的这一特性，在一次情境运行中出现的故障模式可能永远不会再次发生，或者再次出现所需的时间可能长得离谱。因为很难预见到所有可能的故障情景，我们认为这种类型的情境方法可能有助于解决该问题，它通过创造更具挑战性的运行条件，从而能够分析导致崩溃的变量。\n\
    \n为应对可重复性问题，针对运行的每个测试场景构建了一个黑盒。此方法会记录操作员的操作，以便能够进一步查看特定运行过程，从而发现控制器到底出了什么问题。然后，这些数据可用于找出控制器在检查点\
    \ `j` 时能防范哪些危险情况，以及在检查点 `--:j + x` 对网络进行复查时这些情景是否仍能得到保护。\n\n### 17.10.1 控制器测试\n\
    \n控制器在各情境中、各难度级别下均会被孤立地进行评估，直至崩溃发生。当然，也仍有可能没有记录到任何故障。可接受的运行标准不在本研究的范围之内，但它们在学术界仍是一个争议点；不过，如前文所述，这个问题可以得到解决。\n\
    \n在方法开发阶段出现的一些困难促使我们决定将控制器隔离出来进行测试。主要的挑战在于一致性和非侵入性。如前所述，神经网络的可重复性问题通过创建一个保存每一帧车辆状态信息的黑盒来解决。由于监控器强制执行的刹车几乎肯定会改变模拟器运行期间的环境条件，我们将无法计算控制器的性能指标，因此不能同时测试整个系统（控制器和监控器）。\n\
    \n在隔离状态下测试控制器有助于解决这些困难，并为第二阶段做好预热。在所有已对控制器进行过各复杂度测试的情况下，至少需要计算以下指标：\n\n![../images/520777_1_En_17_Chapter/520777_1_En_17_Figk_HTML.jpg](img/520777_1_En_17_Figk_HTML.jpg)\n\
    \n评估系统可靠性函数 `R(t)` 最重要的指标之一是平均失效时间，在模拟条件下该指标易于计算，并用于确定指数函数的速率。然而，汽车行业的统计数据通常以行驶距离来表示，例如平均失效行驶距离、每公里碰撞发生率等。如果参数和仿真硬件足够强大，能够按定义的时间步长进行计算，那么使用这种方法就可以非常容易地转换看待数据的视角。\n\
    \n只要神经网络被充分训练，我们预计以下不等式会持续成立：`Ri(t) 6 Rj(t)`，其中 `i` 和 `j` 是两个检查点，且 `i j`。这可以通过前面描述的数据收集方法轻松验证。\n\
    \n![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig15_HTML.jpg](img/520777_1_En_17_Fig15_HTML.jpg)\n\
    \n**图 17-15**\n\n可靠函数决定了系统在时刻 `t` 继续正常工作的概率。我们预计，经验更丰富的驾驶员（对应更成熟的网络）能够完成比训练不足的网络更长的行程。\n\
    \n- 如果用于测试的模拟器允许，还应记录其他信息，以便加深对控制器行为的理解，例如：\n  - 车辆的瞬时速度与加速度向量。\n  - 汽车与什么发生了碰撞（另一辆车、行人）。\n\
    \  - 设置一个或多个目标目的地，并追踪车辆是否到达。\n  - 如果在时刻 `t` 发生碰撞，则确定时刻 `t-x` 时的环境条件。这些数据对于区分“安全”和“灾难性”故障至关重要。例如，如果以低于\
    \ 10 公里/小时的速度撞上护栏，可能被视为比以相同速度撞人危害性更小的碰撞。\n\n由于经过训练的驾驶员比新手引发的事故更少，我们预计随着控制器的学习，可靠函数会增大，从而提高平均故障间隔时间。\n\
    \n如果黑盒利用更优质的数据，那么也有可能追踪汽车行为相对于情境和难度级别的变化。例如，如果我们将情境中的汽车数量加倍，那么与其他障碍物碰撞的次数几乎肯定会增加。如果情况确实如此，则应进一步深入研究模拟结果，以便让训练策略朝着特定方向聚焦，因为控制器在试图避开其他汽车时，这可能会导致它们撞向墙壁。"
- fmt: '### 17.10.2 Monitor or Observation Testing


    After the operator’s runs have been documented, the monitor testing may commence.
    Not only are we evaluating how good the security monitor is at preventing crashes
    during this phase, but we’re also searching for evidence of which situations are
    “difficult” for the monitoring and which are “easy” for the controller.


    Because the controller now encompasses all of the failures previously disclosed
    by the screen, and the risks posed by its novel behavior are too great for the
    watch to detect, its behavior may evolve to the point where the monitor is no
    longer capable of detecting impending failures as the internet backbone matures.


    On the other hand, the opposite is a viable option. In the early epochs, the controller,
    for example, would drive “crazy,” making a lot of abrupt, high angle steering
    and ride at high speeds. Because the controller’s behavior is unexpected, the
    monitor will have a harder difficulty anticipating the future state. The network
    will move more smoothly as it learns, making it simpler for the monitor to see
    potential accidents.


    The main issue is that the monitor’s effectiveness may diminish as the network
    learns, resulting in a completely pointless component that may even be harmful
    to the system’s performance: the operator may grow sufficient to cover all of
    the damage covered by the screen at a previous checkpoint, resulting in a useless
    component. The system’s overall safety may not be jeopardized if we believe the
    monitor’s activities to be completely safe, but the safety monitor’s security
    will result in fewer smooth trips.


    The monitor is put to the test by repeating the runs that were produced during
    the controllers testing step. The beginning conditions must also be the same,
    and they must be kept in the black box from the previous stage. The controller’s
    prior runs are now repeated, with the monitors linked to the systems and the warnings
    raised throughout the run recorded, as well as whether it was able to avoid the
    previous crash.


    The main issue at this point in the investigation was non-intrusiveness. We cannot
    consider rerunning the simulations just by adding the safety monitor and watching
    how things proceed for the reasons stated above. If an alarm is triggered, the
    safety monitor overwrites the controller’s action, altering the next section of
    the run. This isn’t an issue in theory if you can tell the difference between
    false and real positives. However, without developing software sensors monitor
    and mapping the environment, we won’t be able to predict what a technical error
    will be.


    Because this is a safety monitor, there will be false +ves, even if they are extremely
    low, thus this method will not solve the problem.


    The goal is to maintain track of the warnings that occur during the operation
    while also avoiding the safety procedure from being initiated. Because we’ll be
    repeating the runs from Phase 1, we’ll be able to pinpoint the exact time `t`
    when the switch to the alert state happened before the crash. Because we know
    `t`, all prior alerts to `t` are false +ves or false reports, based on this information.
    Coverage can be approximated by allowing the Monitors to start the safety procedure
    after this point in time.


    As mentioned in the previous chapter, we use the confusion matrix to show the
    predicted values of a model in comparison to real values to see how good it is
    at classifying tasks. However, measuring all of them for real-time critical systems
    is difficult, if not impossible. It’s especially difficult to comprehend when
    the operator averted a collision, but the monitor did not sound an alarm.


    This makes calculating the number of real negatives exceedingly difficult since,
    in most cases, such instances can only be recognized when an operator reviews
    each individual run, presenting a degree of arbitrary nature into metrics like
    true negatives.


    For example, a safety monitor input is made up of a series of timed input that
    may be thought of as the development of the environment while the system is running.
    As a result, it’s impossible to predict whether another state will be alerted
    or secure since we don’t know when the collection of inputs that would ultimately
    lead to a crash will begin.


    Because the monitor requires a certain number of true negatives, the metrics and
    rates that may be calculated are limited. Simultaneously, the security monitor
    classifies the condition of the system in each frame, collecting Lidar data, assessing
    it, and deciding whether or not a safety brake is required. Due to the system’s
    real-time nature, we may regard any frame in which the monitors does not raise
    an alarm as a true negative. We can compute all of the widely used metrics in
    statistical classification models using this method.


    We must combine genuine and false pluses and minuses, such as precision and accuracy,
    to achieve large benefits since the vast quantity of real negatives is likely
    to be far greater than the other metrics for the reasons previously stated. Because
    the false positive rate is stated as `FP/FP+TN`, numbers with numerous zeroes
    before the first significant digit result. Furthermore, in order to give an intelligible
    rate measure for false positives, the quantity of false positives was computed
    over the distance traveled in a session .


    The rates of correct and wrong operator predictions were determined as previously
    mentioned and may be used to compare checkpoints:


    *   Miss rate and awareness

    *   Specificity and consequences

    *   Correctness

    *   Precise

    *   Matthew’s Factor of Connection

    *   Percentage of false positives per meter

    *   Precision recall curves reduced


    An ISO standard was used to choose accuracy and reliability. The notion of accuracy
    has been superseded by the concept of prediction trueness, with accuracy being
    explained as a representation of a mix of random mistakes needing large precision
    and accuracy. The most helpful metric for assessing a confusion matrix is Matthew’s
    Correlation Coefficient, which is calculated as the total of all forecasts and
    has been found to offer more accurate overall data than the F-score.


    We chose not to use `Fi` since it does not function well with imbalanced datasets
    in general, resulting in conclusions that are either overly optimistic, depending
    on the size. We opted to utilize `MCC` as a measurement of the monitor’s performance
    because of the large number of True Negatives and our interest in the monitor’s
    overall utility.


    The `False +Ves per Meter` is used to predict how the system would behave if the
    controllers and the security were both turned on and operating together, as well
    as to quantify the impact of the latter’s faulty safety-brakes. The `ROC2` curve,
    a graphical representation of a classifier tool’s diagnostic abilities, might
    have offered a fast visual representation of the sensor’s efficacy, however this
    method was not possible. The x-axis is determined by `PR`, whereas the y-axis
    is determined by `TPR`.


    The figure would be flattened on the left side due to the significant imbalance
    of our dataset, where the number of false is likely to be lower than `10-2`, based
    on how genuine negatives were classified. As a result, based on data obtained
    for each checkpoint in each difficulty, we used highly precise cropped to produce
    a graphical mean, a curve generated by defining the x-axis by recall and the y-axis
    by accuracy.


    We couldn’t construct a test-set to evaluate the monitor while altering the cutoff
    for choosing whether to brake and presenting the whole curve since the monitor
    only defines states as safe or dangerous in real time depending on data provided
    by the Lidar sensor. As a consequence, past data for each degree of complexity
    was computed, and these values were displayed to explore the link between difficulty
    and monitor efficacy, cropped to the region containing the anticipated value.'
