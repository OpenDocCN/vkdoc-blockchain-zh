    \ the network. These are then used in transactions to prove you own the balances\
    \ you are spending.\n\nWhat stops someone from exploiting a transaction’s digital\
    \ signature to unlock other exits at your address? Each transaction has its own\
    \ digital signature.\n\nTo put it another way, you employ not only the private\
    \ key, but the private key and the transaction data to construct a digital signature.\
    \ As a result, any digital signature is associated with the transaction in which\
    \ it is employed. As a result, if someone tries to use a transaction’s digital\
    \ signature in a new transaction, it will clash with the data of the transaction\
    \ in the digital signature shop and will be rejected by the Bitcoin network’s\
    \ nodes.\n\nConsequently, the digital signature will also save against destroying\
    \ the transaction in which it is used. A digital signature consists of two parts:\n\
    \n*   A random part\n\n*   A part of the signature, consisting of\n    *   A private\
    \ key\n\n    *   The data on which you are creating the digital signature\n\n\
    For the random part, let *n* be the order of point `G` of the second elliptic\
    \ curve the standard `secp256k1`. You generate a random number 2 [1; n - 1] and\
    \ call this random number.\n\nYou then multiply this random number by the point\
    \ `G` (generator point) of the elliptic curve. This is the same `G` you used for\
    \ the public key and indicated by the standard `secp256k1`. For the sake of brevity,\
    \ you call the random number with the variable `k`.\n\nk G = (xr; yr)\n\nThe random\
    \ part of this digital signature is the point on the curve that you obtain (see\
    \ Figure [3-8](#520777_1_En_3_Chapter.xhtml#Fig8)). But you only take the `xr`\
    \ coordinate.\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig8_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig8_HTML.jpg)\n\
    \nFigure 3-8\n\nRandom number obtained on the curve, from which you take the X\
    \ coordinate\n\nFor the sake of brevity, you can call `r` the `randomPart` value\
    \ obtained from\n\n*r = randomPart = xr mod n*\n\nFor the signature part, you\
    \ need to take the private key for the random part.\n\n*r * privKey*\n\nThen you\
    \ include the data on which you want to create the signature.\n\nIn Bitcoin, this\
    \ is represented by the hash of the transaction that contains the balance (UTXO)\
    \ that you want to unlock. You define `h (msg) = SHA-256 (<<transaction >>)` and\
    \ get:\n\n*[r * privKey] + h(msg)*\n\nThe inclusion of the transaction hash binds\
    \ the signature to a transaction (therefore it cannot be used in a different transaction).\
    \ Finally, you divide this by the initial random number `k`:\n\n*s = sign = k-1\
    \ (r privKey + h(msg)) (mod n)*\n\nYou have obtained the fundamental part of the\
    \ digital signature. The digital signature is made up of an `r` and an `s`.\n\n\
    If someone asks you to prove that you know the key private for a public key, you\
    \ can give them the signature digital (`r; s`) as proof.\n\n#### 3.3.4.1 Verifying\
    \ a Digital Signature\n\nTo verify that a digital signature has been made using\
    \ a correct private key, the person to whom you provide this digital signature\
    \ must use both sides (`r; s`) to find two new points on the elliptic curve and\
    \ check the signature.\n\nFrom here on, the multiplication operator is used only\
    \ when it is strictly necessary to divide the variables, otherwise yes assumes\
    \ the implicit multiplication operation.\n\nFirst, let’s take the data on which\
    \ the digital signature has been affixed. In this case, it is the SHA-256 hash\
    \ that’s applied to the transaction.\n\nYou divide this value by `s` (the core\
    \ part of the digital signature) and multiply by `G` (the generator point), like\
    \ so:\n\n*u1 = (x1; y1) = (h(msg) s-1 mod n) G*\n\nYou then find point 1 (see\
    \ Figure [3-9](#520777_1_En_3_Chapter.xhtml#Fig9)).\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig9_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig9_HTML.jpg)\n\
    \nFigure 3-9\n\nExample of graphic representation of point 1\n\nThen you divide\
    \ `r` by `s` and multiply by the `< < publickey > >`:\n\n*u2 = (x2; y2) = (r s-1\
    \ mod n) pubKey*\n\nYou then have point 2 (see Figure [3-10](#520777_1_En_3_Chapter.xhtml#Fig10)).\n\
    \n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig10_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig10_HTML.jpg)\n\
    \nFigure 3-10\n\nExample of graphic representation of point 2\n\nFinally, add\
    \ these two points and you get a third point on the elliptic curve. (See Figure\
    \ [3-11](#520777_1_En_3_Chapter.xhtml#Fig11).)\n\n*Rv = (xv; yv) = u1 + u2*\n\n\
    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig11_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig11_HTML.jpg)\n\
    \nFigure 3-11\n\nExample of graphical representation of the sum between the point\
    \ 1 and point 2\n\nIf the value `c = xv mod n` of this point `Rv = (xv; yv)` obtained\
    \ on the elliptic curve is equal to `r`, that is, `c == initial r`, then it’s\
    \ proof that the digital signature was made with the public key’s connected private\
    \ key."
  trans: "\n### 3.3.3 比特币地址\n\n比特币地址，或简称地址，是由 26-35 个字母数字字符组成的标识符，以数字 1、3 或`bc1`开头，代表比特币支付的一个可能目的地。比特币（加密货币，BTC）中的交易可以通过地址进行，有点像发送电子邮件。然而，与电子邮件地址不同，人们拥有不同的比特币地址，并且每笔交易应使用一个唯一的地址。\n\
    \n一个人可以创建无限数量的地址，从而提高支付的匿名性。一个地址由三个元素构成：\n*   公钥哈希\n*   前缀\n*   校验和\n\n让我们详细分析这三个组成部分。\n\
    \n公钥哈希无非是对公钥应用双重哈希。具体来说，它是通过`SHA-256`和`RIPEMD160`获得的哈希，因此：\n\n```\n> = RIPEMD160\
    \ (SHA-256 (>))\n```\n\n它有时被称为`HASH160 (<< publickey >>)`，因为这比写`RIPEMD160 (SHA256\
    \ (<< publickey >>))`更简单。\n\n前缀表示要创建的区块类型。最常用的有：\n*   `00`：用于`P2PKH`锁定脚本（你将在后面了解它是什么）\n\
    *   `05`：用于`P2SH`锁定脚本\n\n最后，校验和是通过对公钥哈希进行两次`SHA-256`哈希并取前四个字节获得的。然后，你将这些元素按顺序排列得到一个队列（见图\
    \ 3-6 和 3-7）：\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig6_HTML.jpg](img/520777_1_En_3_Fig6_HTML.jpg)\n\
    \n**图 3-6** 构成比特币地址的元素\n\n1.  `prefix`\n2.  `HASH160(«public key»)`\n3.  `checksum`\n\
    \n然后应用`Base58`函数，该函数最终将提供比特币地址，如图 3-7 所示。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig7_HTML.jpg](img/520777_1_En_3_Fig7_HTML.jpg)\n\
    \n**图 3-7** 比特币地址\n\n`Base58`是一个转换器，你可以用它以更短、更直观的格式表示大数字，从而得到字母数字文本。显然，这些操作是在应用程序层面实现的，用户无需执行所有这些步骤。\n\
    \n### 3.3.4 数字签名\n\n数字签名是一种数学手段，用于证明你知道与公钥关联的私钥，而无需泄露实际的私钥。在进行交易时，你首先必须解锁你想要使用的余额（UTXO，你将在下一节中了解）。这可以通过证明你“拥有”该余额，并且你知道存储该余额的地址的私钥来实现。因此，为了在不提供私钥的情况下解锁余额，你使用数字签名。通过这种方式，你表明你拥有私钥，但无需将其交给网络。然后在交易中使用这些签名来证明你拥有正在花费的余额。\n\
    \n是什么阻止了有人利用某笔交易的数字签名来解锁你地址上的其他输出？每笔交易都有自己的数字签名。\n\n换句话说，你不仅使用私钥，还使用私钥和交易数据来构造数字签名。因此，任何数字签名都与使用它的交易相关联。因此，如果有人试图在一笔新交易中使用某笔交易的数字签名，它将与数字签名中的交易数据冲突，并被比特币网络节点拒绝。\n\
    \n因此，数字签名也能保护其使用的交易不被篡改。数字签名由两部分组成：\n*   一个随机部分\n*   签名部分，由以下内容组成：\n    *   一个私钥\n\
    \    *   你正在为其创建数字签名的数据\n\n对于随机部分，设 *n* 为第二条椭圆曲线标准 `secp256k1` 上点 `G` 的阶。你生成一个随机数\
    \ 2 [1; n - 1] 并称这个随机数为 `k`。\n\n然后，你将此随机数乘以椭圆曲线的点 `G`（生成点）。这与你用于公钥并由标准 `secp256k1`\
    \ 指示的 `G` 相同。为简洁起见，你将此随机数称为变量 `k`。\n\n```\nk G = (xr; yr)\n```\n\n该数字签名的随机部分是你获得的曲线上的点（见图\
    \ 3-8）。但你只取 `xr` 坐标。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig8_HTML.jpg](img/520777_1_En_3_Fig8_HTML.jpg)\n\
    \n**图 3-8** 曲线上获得的随机数，取其中的 X 坐标\n\n为简洁起见，你可以将从\n\n```\nr = randomPart = xr mod\
    \ n\n```\n\n获得的 `r` 称为 `randomPart` 值。\n\n对于签名部分，你需要获取私钥用于随机部分。\n\n```\nr * privKey\n\
    ```\n\n然后包含你想要创建签名的数据。\n\n在比特币中，这由包含你想要解锁的余额（UTXO）的交易哈希表示。你定义 `h (msg) = SHA-256\
    \ (<<transaction >>)` 并得到：\n\n```\n[r * privKey] + h(msg)\n```\n\n交易哈希的包含将签名绑定到一笔交易（因此它不能用于另一笔不同的交易）。最后，你将其除以初始随机数\
    \ `k`：\n\n```\ns = sign = k-1 (r privKey + h(msg)) (mod n)\n```\n\n你已经得到了数字签名的基本部分。数字签名由\
    \ `r` 和 `s` 组成。\n\n如果有人要求你证明你知道某个公钥的私钥，你可以给他们数字签名 (`r`; `s`) 作为证明。\n\n#### 3.3.4.1\
    \ 验证数字签名\n\n为了验证数字签名是使用正确的私钥创建的，收到此数字签名的人必须使用这两部分 (`r`; `s`) 在椭圆曲线上找到两个新点并检查签名。\n\
    \n从现在开始，乘号仅在严格需要分隔变量时才使用，否则假定为隐式乘法运算。\n\n首先，让我们获取被附加了数字签名的数据。在这种情况下，它是应用于交易的 `SHA-256`\
    \ 哈希。\n\n你将此值除以 `s`（数字签名的核心部分）并乘以 `G`（生成点），如下所示：\n\n```\nu1 = (x1; y1) = (h(msg)\
    \ s-1 mod n) G\n```\n\n然后你找到点 1（见图 3-9）。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig9_HTML.jpg](img/520777_1_En_3_Fig9_HTML.jpg)\n\
    \n**图 3-9** 点 1 的图形表示示例\n\n然后你将 `r` 除以 `s` 并乘以 `< < publickey > >`：\n\n```\nu2\
    \ = (x2; y2) = (r s-1 mod n) pubKey\n```\n\n然后你得到点 2（见图 3-10）。\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig10_HTML.jpg](img/520777_1_En_3_Fig10_HTML.jpg)\n\
    \n**图 3-10** 点 2 的图形表示示例\n\n最后，将这两点相加，你会得到椭圆曲线上的第三个点（见图 3-11）。\n\n```\nRv = (xv;\
    \ yv) = u1 + u2\n```\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig11_HTML.jpg](img/520777_1_En_3_Fig11_HTML.jpg)\n\
    \n**图 3-11** 点 1 与点 2 之和的图形表示示例\n\n如果椭圆曲线上获得的这个点 `Rv = (xv; yv)` 的值 `c = xv mod\
    \ n` 等于 `r`，即 `c == 初始 r`，那么就证明了该数字签名是使用与公钥关联的私钥创建的。\n"
- fmt: "#### 3.3.4.2 Understanding the ECDSA Sign/Verify Math\n\nThe ECDSA signature\
    \ has a simple description:\n\nNote that the signing process signature encodes\
    \ a random dot `R` (represented only from the X coordinate, you refer to `r =\
    \ randomPart = xr mod n`) through transformations of the elliptic curve uses the\
    \ private key `privKey`. It then encodes the hash of the message `h(msg)` in a\
    \ number sign, which is proof that the signer understands the private key `privKey`.\
    \ The signature (`randomPart`, `sign`) may reveal the private key due to the complexity\
    \ of the problem ECDLP.\n\nVerification of the signature encodes the proof number\
    \ sign using the public key `pubKey` and the message hash `h(msg)`. It then restores\
    \ the original point `R`, used to create the signature, called `Rv`. Then compare\
    \ the `X` coordinate (`xv mod n`) of the `Rv` retrieved with the `r = randomPart`\
    \ value of the signature.\n\nSo how does the reported signature and verification\
    \ scheme work? Let’s consider the verification, then the equation to derive `Rv`.\
    \ We then write the equation in the extended form.\n\n`Rv = (xv; yv) = h(msg)\
    \ s⁻¹ (mod n) G + r s⁻¹ (mod n) pubKey`\n\nReplace `pubKey` with `privKey G`:\n\
    \n`Rv = (xv; yv) = h(msg) s⁻¹ (mod n) G + r s⁻¹ (mod n) privKey G`\n\nHighlight\
    \ `G` and `s⁻¹ (mod n)`, obtaining:\n\n`Rv = (xv; yv) = (h(msg) + r privKey) s⁻¹\
    \ (mod n) G`\n\nWe know that:\n\n`s⁻¹ (mod n) = (k⁻¹ (h(msg) + r privKey))⁻¹ (mod\
    \ n)`\n\nAnd so:\n\n`s⁻¹ (mod n) = k (h(msg) + r privKey)⁻¹ (mod n)`\n\nWe substitute\
    \ this in the equation of `Rv`:\n\n`Rv = (h(msg) + r privKey) k (h(msg) + r privKey)⁻¹\
    \ (mod n) G = k G`\n\nThe last step is to compare the point `Rv` with the point\
    \ `R`. This is encoded by `privKey`. This algorithm compares the `X` coordinates\
    \ of `Rv` with the `X` of `R` (where `R = (xr; yr)` and `r = randomPart = xr mod\
    \ n`). More precisely, the signature is expected to be valid if given `c = xv\
    \ mod n`, then `c == r`.\n\nFigure [3-12](#520777_1_En_3_Chapter.xhtml#Fig12)\
    \ illustrates, at a high level, how the digital signatures in Bitcoin transactions\
    \ work.\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig12_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig12_HTML.jpg)\n\
    \nFigure 3-12\n\nTransactions and digital signatures\n\n## 3.4 The Transaction\n\
    \nThe transaction is the most basic component of Bitcoin’s blockchain. Transactions\
    \ are verified and sent out. Many transactions combine to make a block. Furthermore,\
    \ a chain of blocks is formed through a digital data link.^([³](#fn3))\n\nTo select\
    \ the next block to be put to the chain, the blocks go through a consensus procedure.\
    \ The chosen block is verified and added to the existing chain.\n\nMiners are\
    \ special peer nodes that perform the validation and consensus processes. It’s\
    \ important to note that they are unique or powerful machines that run blockchain\
    \ protocol-specific software. Let’s take a look at the specifics of a single Bitcoin\
    \ transaction.\n\n### 3.4.1 The Unspent Transaction Output (UTXO)\n\nUnspent Transaction\
    \ Output (UTXO) is a fundamental idea in the Bitcoin network. UTXOs are a set\
    \ of Bitcoins that are linked to a certain user. They can only be spent in a transaction\
    \ if they are used entirely for that. A user can be associated with zero, one,\
    \ or many UTXOs. Obviously, once a user has used a UTXO to complete a transaction,\
    \ it cannot be used by another user. The sum of UTXOs associated with a user is\
    \ the total balance of the latter.\n\nIn other words, Bitcoin stores data relating\
    \ to transactions and balances of users in the form of UTXO, which are “unspent”\
    \ Bitcoin amounts that have been sent to a user, and that are potentially expendable\
    \ from that user.\n\nThe set of all the UTXOs in the network constitute the state\
    \ of the blockchain Bitcoin. A Bitcoin transaction consists of inputs and outputs.\n\
    \nA transaction takes as input one or more UTXOs and, according to the request\
    \ initiated by the sender, it generates one or more UTXOs to output the amount\
    \ specified by the transaction request. As a result, an Unspent Transaction Output\
    \ is the result of a transaction that a user receives and can spend later.\n\n\
    For example, suppose John has a UTXO with a value of ten Bitcoin and another five\
    \ Bitcoin UTXO, and he wants to send eight Bitcoins to Sara, who has no UTXO in\
    \ her portfolio. John can create a transaction, specifying the amount to spend\
    \ on Sara, and enter ten Bitcoin UTXO as the transaction input.\n\nThe transaction\
    \ will therefore look like this:\n\n- **Input:** 10 Bitcoin Mario UTXO\n- **Output:**\n\
    \    - An 8 Bitcoin UTXO associated with Sara\n    - A 2 Bitcoin UTXO associated\
    \ with Mario (the rest of the transaction)\n\nSo, once the transaction is recorded,\
    \ Mario will have in his wallet a 5 Bitcoin UTXO and a 2 Bitcoin UTXO, for a total\
    \ balance of 7 Bitcoins. Sara will have an 8 Bitcoin UTXO, for a total balance\
    \ of 8 Bitcoins. The anatomy of a UTXO is very simple. (See Figure [3-13](#520777_1_En_3_Chapter.xhtml#Fig13).)\n\
    \nThere are two sorts of scripts: locking scripts and unlocking scripts. Given\
    \ the definition of the term, and the fact that unlocking ownership is the first\
    \ step in transferring UTXO, the input value contains the phrase *unlocking script*.\
    \ The output value, on the other hand, will be *locking script* as a result of\
    \ the locking procedure. The term “script” means “stack structure,” however we’ll\
    \ focus on the method rather than the definition.\n\nA transaction output UTXO\
    \ has the following structure (see Figure [3-13](#520777_1_En_3_Chapter.xhtml#Fig13)).\n\
    \n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig13_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig13_HTML.jpg)\n\
    \nFigure 3-13\n\nThe UTXO structure\n\n### 3.4.2 Input and Output (I&O)\n\nThis\
    \ is the notion of “listing” the income source (input) and spending (output) of\
    \ a transaction, rather than the concept of transferring money by placing input\
    \ and the outcome being the output. That is, when you pay the amount, you explain\
    \ the revenue source of the UTXO you want to spend first, and then the quantity\
    \ you want to invest on the output item second. Let’s first look at the output’s\
    \ structure. (See Figure [3-14](#520777_1_En_3_Chapter.xhtml#Fig14).)\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig15_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig15_HTML.jpg)\n\
    \nFigure 3-15\n\nUTXO description\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig14_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig14_HTML.jpg)\n\
    \nFigure 3-14\n\nInput and output\n\nWhen a transaction to transfer money is created,\
    \ the transaction input must specify which UTXO will be issued. Simply put, the\
    \ transaction’s inputs are pointers to UTXO. They define a specific UTXO, which\
    \ relates to the transaction’s hash and the transaction output’s index number.\
    \ A transaction input additionally contains the unlock script that satisfies the\
    \ output conditions given by UTXO in order to output UTXO (see Figures [3-15](#520777_1_En_3_Chapter.xhtml#Fig15)\
    \ and [3-16](#520777_1_En_3_Chapter.xhtml#Fig16)). The unlock script is usually\
    \ a signature that verifies that the Bitcoin address identified in the block script\
    \ belongs to the owner.\n\nSo, the structure of a UTXO input to a transaction\
    \ is as shown in Figure [3-16](#520777_1_En_3_Chapter.xhtml#Fig16).\n\n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig16_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig16_HTML.jpg)\n\
    \nFigure 3-16\n\nUTXO description\n\nThis structure of transaction inputs and\
    \ outputs leads to a transaction link design, as shown in Figure [3-17](#520777_1_En_3_Chapter.xhtml#Fig17).\n\
    \n![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig17_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig17_HTML.jpg)\n\
    \nFigure 3-17\n\nBitcoin transaction input and output"
  raw: "#### 3.3.4.2 Understanding the ECDSA Sign/Verify Math\n\nThe ECDSA signature\
    \ has a simple description:\n\nNote that the signing process signature encodes\
    \ a random dot `R` (represented only from the X coordinate, you refer to `r =\
    \ randomPart =xr mod n`) through transformations of the elliptic curve uses the\
    \ private key `privKey`. It then encodes the hash of the message `h (msg)` in\
    \ a number sign, which is proof that the signer understands the private key `privKey`.\
    \ The signature (`random Part, sign`) may reveal the private key due to the complexity\
