  trans: "\n# 11.5 为信息物理系统设计元模型\n\n信息物理系统是监控和调节物理环境，同时协助人类履行职责的复杂系统。CPS 是结合了软件和硬件的网络化混合系统。当程序员、工程师和科学家协作构建和实现此类系统时，他们会遇到种种障碍。来自多个领域的专家必须理解该系统才能进行协作，无论他们身处哪个领域。\n\
    \n我们提出了一个信息物理系统元模型和一种教育研究方法，程序员、工程师和科学家可以使用、重用和修改该方法，用于信息物理系统的新应用。数据科学家和程序员利用这个元模型来构建一个能够提供跨领域可理解的\
    \ `M1` 系统模型的信息物理系统。该元模型既包含了智能物，也包含了人，这两者通常出现在任何信息物理系统的设计中。它采用复合架构，支持创建包含诸如叶子节点等智能元素的信息物理系统。\n\
    \n# 11.6 CPS 元模型示例\n\n考虑以下示例：\n\n- **交通运输**：用于空中交通管制和运输管理的系统。\n- **健康医疗**：医疗设备、健康监测系统、远程机器人手术系统。\n\
    - **制造业**：汽车、飞机、工厂自动化系统、化工过程跟踪、自主机器人空间以及工业网络等都是工业网络的例子。\n- **环境**：农业、环境和地质系统都是环境科学系统的例子。\n\
    - **航空航天**：太空探索系统。\n- **建筑**：日常生活中的辅助生活和智能场所。\n- **公共环境**：智能供水网络和应急管理。\n- **信息物理公共系统**：这些\
    \ CPS 还会考虑人类理解力、技术能力以及社会文化因素。\n\n下一节将介绍*元对象设施*，并以一个用于信息物理系统的基础元模型作为支撑。\n\n## 11.6.1\
    \ 元对象设施\n\n元对象设施是对象管理组用于模型驱动工程的一个标准。它源于 `UML` 语言；对象管理组需要一个元建模架构来定义 `UML`^(¹⁰)。它使用对象建模方法来定义任何形式的元数据。尽管它通常与\
    \ `UML` 相关联，但它独立于 `UML`。为了指定任何类型的元数据，`MOF` 使用对象建模技术。尽管有时会与 `UML` 混淆，但它们并非同一事物。\n\
    \n我们使用 `UML` 的构造型机制来创建和扩展 CPS 元模型上的智能对象。`M1` 定义的类可以利用这个元模型作为基础进行扩展和重用。这些类代表了一个系统。`M1`\
    \ 上应用程序的顶层设计被称为顶层设计。\n\n一个*系统的系统* 是一个由有限个独立且可运行的组成系统组合而成的系统，这些组成系统为了达成更高目标而在一段时间内通过网络连接在一起。一个\
    \ SoS 集成了多个 CS。\n\n![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig7_HTML.jpg](img/520777_1_En_11_Fig7_HTML.jpg)\n\
    \n图 11-7\n\n建模语言的分类及其伴随的视角\n\n一个*组成系统* 包括一个计算机网络（网络系统）、一个受控对象（物理系统），以及可能的人机交互。一个\
    \ SoS 可以是：\n\n![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig9_HTML.jpg](img/520777_1_En_11_Fig9_HTML.jpg)\n\
    \n图 11-9\n\n一个 SoS\n\n![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig8_HTML.jpg](img/520777_1_En_11_Fig8_HTML.jpg)\n\
    \n图 11-8\n\n一个 SoS 集成一个 CS\n\n- **定向 SoS**：一个具有集中化目标并拥有所有 CS 所有权的 SoS。一个无人火箭中的控制系统集合就是一个例子。\n\
    - **已识别 SoS**：CS 为独立拥有，但所有者之间达成合作协议以实现共同目标。\n- **协作 SoS**：独立 CS 之间的自愿交互，目标是实现有利于单个\
    \ CS 的目标。\n- **虚拟 SoS**：核心目标缺失且缺乏集中统一指挥。\n\n每个 CS 都有一个接口，基于该接口的服务对其他 CS 可用，例如可靠接口，它作为一个\
    \ CS 的接口，通过该接口，CS 的服务对其他 CS 可用。RUI 由以下部分组成：\n\n![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig11_HTML.jpg](img/520777_1_En_11_Fig11_HTML.jpg)\n\
    \n图 11-11\n\nRUMI 和 RUPI\n\n![../images/520777_1_En_11_Chapter/520777_1_En_11_Fig10_HTML.jpg](img/520777_1_En_11_Fig10_HTML.jpg)\n\
    \n图 11-10\n\nSOS 和 CS\n\n- 可靠消息接口\n- 可靠物理接口\n\n# 11.7 复习题\n\n1.  “模型驱动工程是一种软件开发方法，它强调创建比计算或代数概念更接近特定领域概念的模型或抽象。”\
    \ 此陈述正确还是错误？\n\n2.  建模语言由以下哪项确定？\n    1.  由与所讨论的元模型相对应的所有可能模型的集合确定，该集合被称为元模型。\n\
    \    2.  由一个元模型确定，该元模型是遵循所讨论的元模型的一组模型。\n    3.  由元模型确定，该元模型是遵循特定元状态的所有可行模型的集合。\n\
    \    4.  以上都不是。\n\n3.  对于*事件*，以下哪项陈述是正确的？\n    1.  虚拟 SoS 的特点是缺乏核心目标和集中统一指挥。\n\
    \    2.  虚拟 SoS 缺乏目标和集中统一指挥。\n    3.  虚拟 SoS 的特点是缺乏重点和统一指挥。\n    4.  以上所有。\n\n\
    4.  “元模型包括 `UML` 和`公共仓库元模型`。” 此陈述正确还是错误？\n\n# 11.8 复习题答案\n\n1.  答案：正确。模型驱动工程是一种软件开发方法，它侧重于构建比计算或代数概念更紧密地与特定领域概念相关联的模型或抽象。\n\
    \n2.  答案：A。与所讨论的元模型相对应的所有可能模型的集合被称为元模型。\n\n3.  答案：A。虚拟 SoS 的特点是缺乏核心目标和集中统一指挥。\n\
    \n4.  答案：正确。`UML` 和`公共仓库元模型`是元模型的例子。\n"
- fmt: '# 11.9 Summary


    Ever since humans started using computers, researchers have worked to raise the
    level of abstraction. Model-driven engineering (MDE) is the natural continuation
    of this trend, as well as a promising approach to address complexity of platforms
    and the inability of third-generation languages to alleviate this complexity and
    express dominance concepts effectively.


    The Model-Driven Engineering (MDE) is at the top of the hierarchy and therefore
    the most abstract. It is recognized as a software engineering paradigm and considers
    models not only as supporting documentation, but also as a central focus of development
    in any engineering discipline and application domain. Model-Driven Development
    (MDD) is slightly lower in the hierarchy than MDE. This approach focuses on the
    disciplines of analysis, design, implementation, and requirements.


    The concrete MDD approaches tend to define modeling languages to specify the system
    under study at different levels of abstraction. Model-Based Testing (MBT) is focused
    on the automation of the testing discipline. Testing models are used to represent
    the desired behavior of the system under study. Model-Driven Architecture (MDA)
    is an approach proposed by OMG and is mainly focused on the definition of models
    and their transformations.


    To create an effective block chain application, systems must first be modeled.
    The previously-mentioned technique must be included when modeling systems. When
    you apply blockchain technology in the distributed system, as part of the modeling
    of distributed systems, you also need to model the blockchain layers in order
    to have a clear picture of the system architecture and systems of systems (SoS)
    functionality. All these models can be done with the help of the BLOCKLY 4SOS
    modeling technique.


    As a part of model driven engineering, you need to consider BLOCKLY 4SOS to model
    SOS systems. The next chapter explains the BLOCKLY 4SOS.


    Footnotes [1](#520777_1_En_11_Chapter.xhtml#Fn1_source) [2](#520777_1_En_11_Chapter.xhtml#Fn2_source)
    [3](#520777_1_En_11_Chapter.xhtml#Fn3_source) [4](#520777_1_En_11_Chapter.xhtml#Fn4_source)


    # 12. BLOCKLY 4SOS


    `BLOCKLY` is a library that allows you to make block programming apps. Even if
    users do not really know a programming language, block programming allows them
    to construct scripts and programs using graphic blocks. In a drag-and-drop editor,
    `BLOCKLY` includes all you need to define and render blocks. Each block represents
    a single line of code that may be stacked and converted into code with ease. It
    can be used to let users personalize elements of the app and add actions to them.


    ## 12.1 SOS Modeling


    While using this tool, it generates a standard `SoS-block` called `ex-abundant`
    block, to illustrate. The left-side toolbox contains all of the blocks required
    to build an `SoS` design. This conceptual model will assist the `SoS` designer.
    Furthermore, every exported block in `BLOCKLY` is connected to a perspective block,
    so all blocks connected to the communication point of view may be found under
    the Toolkit’s Communication category.


    Users must click and drag blocks from the flyout or toolbox to generate new blocks
    in `BLOCKLY`. An API for `BLOCKLY` was designed with the goal of improving usability
    and accuracy. The `Field Dropdown()` provides a list of appropriate blocks that
    may be linked to a certain block, making it easy for the users to build blocks.


    After adding a Technique block, the tool displays how to add the other appropriate
    blocks: fault predicting, failure prevention, failure elimination, and failure
    tolerance. The Technique block is an abstraction block in profile, and the four
    blocks above inherit it.


    A block can have three phases, as shown:


    * A compressed view

    * A partially compressed view

    * An uncompressed view


    By decreasing the amount of blocks on the screen, a compressed display enables
    the user to see the current editing block (see Figure [12-1](#520777_1_En_12_Chapter.xhtml#Fig1)).
    The person can choose to just view the stated attributes since a partially-collapsed
    block only reveals the non-empty features of a block. Use Full View/Uncompressed
    View to examine all of a block’s attributes. The user may flip between the three
    viewpoints by clicking on the block twice. See Figure [12-2](#520777_1_En_12_Chapter.xhtml#Fig2).


    ![../images/520777_1_En_12_Chapter/520777_1_En_12_Fig2_HTML.jpg](images/520777_1_En_12_Chapter/520777_1_En_12_Fig2_HTML.jpg)


    Figure 12-2


    Using a dropdown menu, the users can add blocks


    ![../images/520777_1_En_12_Chapter/520777_1_En_12_Fig1_HTML.jpg](images/520777_1_En_12_Chapter/520777_1_En_12_Fig1_HTML.jpg)


    Figure 12-1


    SysML imported to BLOCKLY


    In addition, as illustrated in Figures [12-3](#520777_1_En_12_Chapter.xhtml#Fig3)
    and [12-4](#520777_1_En_12_Chapter.xhtml#Fig4), characteristics linked to selected
    building blocks can be shown for each block. This is accomplished by placing a
    mutator button on the upper-left side of each block.


    The supporting facility uses a freely accessible open source plug-in called `Type-Indicator
    5` to create an intuitive modeling environment. This plugin highlights all the
    blocks that are compatible (in yellow) with the current block as it is being moved
    (`block cs4`).


    The traceability of requirements must be examined and managed in an `SoS` project,
    therefore requirements management is critical. The needs may be broken down into
    categories based on points of view and building components, such as architecture,
    communication, and reliability.


    As a result, full traceability is provided since each building block satisfies
    the collection of criteria that it fulfills, and each building block of requirements
    controls the collection of building blocks that maintains it. To make the design
    more obvious, `BLOCKLY` allows you to add comments to blocks.


    ![../images/520777_1_En_12_Chapter/520777_1_En_12_Fig3_HTML.jpg](images/520777_1_En_12_Chapter/520777_1_En_12_Fig3_HTML.jpg)


    Figure 12-3


    A block can be viewed in three different ways: collapsed, partially collapsed,
    and uncollapsed


    An example of constraint usage is shown in Figure [12-4](#520777_1_En_12_Chapter.xhtml#Fig4).
    Constraints can be utilized to find unusual twists that could be prone to an emerging
    stage in `SoS`. You can get these situations by using proper query in the models.
    When working with big models, it might be difficult to see the whole `SoS`, necessitating
    the use of specialized views.


    Instead of using lines to display connection between blocks, `BLOCKLY` uses collapse
    methods to disguise the complexity of an `SoS` model. The model query is used
    to look for blocks that meet a set of requirements.'
