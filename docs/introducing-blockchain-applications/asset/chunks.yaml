  trans: "\n# 4.12 以太坊共识机制\n\n我们来看看，即便在此处，它如何成为一种涌现式共识，并且以太坊将其共识机制建立在工作量证明（POW）之上。\n\
    \n以太坊使用的 POW 算法是 `Ethash`，它基于 `Keccak-256-bit` 加密哈希函数。\n\n正如你所见，当一笔交易被创建并签名后，在传输到网络之前，它会通过本地以太坊节点进行验证。\n\
    \n此验证包括以下检查项：\n\n*   交易的结构和语法格式正确。\n*   数字签名与发送者地址和交易内容一致。\n*   交易的 `nonce` 值必须有效。要使\
    \ `nonce` 有效，交易的 `nonce` 必须与发送者账户的 `nonce` 相匹配。\n*   发送者有足够的以太币来支付交易的 gas 费用。\n\
    *   发送的数据一致且格式正确，因此不会导致任何被调用的操作失败。\n\n如果这些验证步骤中的任何一个失败，那么交易将失败并传输到网络。相反，如果验证通过，它就会通过相邻节点在网络中传播。每个接收到交易的节点都会依次对交易的有效性进行验证。\n\
    \n同样，如果验证成功，该交易将在网络中继续传递，否则将被忽略。通过这种方式，可以避免网络被无效交易堵塞，因为此类交易不会导致任何状态变更。\n\n当交易到达矿工手中时，矿工会对其进行验证并将其添加到交易池中。事实上，与比特币一样，矿工在本地维护一个交易池，等待被添加到一个候选区块中。\n\
    \n矿工根据多种标准选择要添加到区块中的交易，但主要依据是交易提供的费用。矿工每个区块都有 gas 上限，他们不能突破这个限制。\n\n然后，他们选择一定数量\
    \ `n` 的交易添加到区块中，并为每个交易应用状态转换函数。\n\n```\nAPPLY (S; TX) -> S 或 ERROR\n```\n\n因此，矿工最终可以用新状态\
    \ `S0` 构建区块，填写各字段，并解决我们在专门介绍比特币的章节中讨论过的 Nakamoto 共识部分提到的 PoW 难题。一旦难题被解决，矿工就可以将区块发送到网络。每个接收到该区块的节点都会对其进行验证。以太坊中基本的区块验证算法按以下方式工作：\n\
    \n*   检查前一个引用区块是否仍然存在且有效。\n*   查看该区块的时间戳是否大于前一个区块的时间戳，并且小于未来 15 分钟的时间戳。\n*   验证区块编号、难度、交易来源、衍生交易和\
    \ gas 上限是否有效。\n*   验证区块上的 POW 是否仍然有效。\n*   `S [0]` 可以是最后一个区块结束时的状态，`TX` 可以是该区块的计算或交易列表，共\
    \ `n` 步。\n\n对于 `i = 0 ... n - 1`，设置 `S (i+1) = APPLY (S (i); TX (i))`。\n\n然后检查应用是否出错，或者截至当前区块消耗的最终或总\
    \ gas 是否超过了 `GASLIMIT`；如果超出，也会报错。\n\n*   假设 `S FINALS (n)`，然后加上支付给矿工区块的区块奖励。\n\
    *   需要验证 Merkle 树的原始状态 `S_FINAL` 是否与区块头中给出的最终步骤或状态一致。如果一致，则该区块有效；否则，无效。\n\n###\
    \ 4.12.1 工作量证明算法 (PWA)\n\nPWA 的形式化定义如下：\n\n`(n; m) = PoW (H; H[n]; d)`\n\n其中\n\
    \n*   `(n; m)`\n    *   `m` 是 mixHash\n    *   `n` 是 nonce\n*   `H` 是不包含 nonce\
    \ 和 mixHash 的区块头。\n*   `Hn` 是定义为加密伪随机数的 nonce，它并非独立于 `H` 和 `d`。\n*   `d` 是 DAG，它是计算\
    \ mix-hash 所需的一大组数据。简单来说，矿工通过 DAG 不断生成此类 mixHash，直到输出结果具有低于目标值的 nonce 值。\n\nnonce\
    \ 与区块难度之间的关系在此形式化定义：\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Figc_HTML.png](img/520777_1_En_4_Figc_HTML.png)\n\
    \n## 4.13 以太坊 2.0\n\n你已经看到，与比特币一样，以太坊是一种涌现式共识。以太坊用于挖矿的算法是*工作量证明*算法。\n\n然而，不久之后，以太坊将迎来从\
    \ 1.0 到 2.0 的升级。这次更新不会一蹴而就，而是会通过多个阶段逐步推进。\n\n这次更新最重要的一个方面是用于挖矿算法的创新。事实上，随着升级到以太坊\
    \ 2.0，将过渡到权益证明算法。工作量证明是一种挖矿算法，其计算负担不轻。为了能够赢得一个区块，你需要从昂贵的专用硬件中获得必要的计算能力。\n\n这会导致非常高的能源消耗，并对环境造成污染。所以，总而言之，与\
    \ PoW 相关的问题有：\n\n*   由于所需计算资源和能源的数量，这是一个非常低效的过程。\n*   能够负担得起更强大硬件来执行 PoW 的个人和组织比其他人更有可能使用它，这意味着存在挖矿过程向组织中心化的风险。\n\
    \n图 4-34 显示了以太坊网络内算力分布的一个统计示例。\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig34_HTML.png](img/520777_1_En_4_Fig34_HTML.png)\n\
    \n图 4-34 — 以太坊哈希率分布\n\n因此，从图中可以清楚地看到，以太坊总挖矿算力的 51% 以上掌握在三个组织手中。为了解决这些问题，以太坊考虑将权益证明作为一种解决方案。\n\
    \n## 4.14 总结\n\n在本章中，你学习了以太坊及其结构（状态和交易函数）。本章解释了以太坊是如何创建的，以使开发者能够构建和发布智能合约和分布式应用，这些应用可以在没有停机问题、欺诈或第三方干扰的情况下使用。下一章将重点介绍基于权益证明算法的共识机制，相关研究正日益深入。越来越多的区块链正在考虑转向这种算法共识，以太坊首当其冲。本章最后涵盖了以太坊\
    \ Casper，这是以太坊开发者正在实现的权益证明机制。\n"
- fmt: "# 5\\. Proof of Stake: Consensus of the Future\n\nThe `Proof of Stake` algorithm\
    \ replaces miners with validators and makes the mining process virtual. Ethereum\
    \ developers have always wanted to switch to `Proof of Stake`, but it presents\
    \ some problems that developers are still working to resolve.\n\nThe `Proof of\
    \ Stake` algorithm is based on a different mining philosophy of blocks.\n\nIn\
    \ general terms, the algorithm is based on these facts:\n\n- Any user who wants\
    \ to be a validator must register on the network as validators through a stake\
    \ of coins. The stake value is then blocked and frozen.\n- This coin bet can never\
    \ be less than a certain quantity. In fact the stake must be greater than the\
    \ gain that they can derive from validating new blocks.\n- In order to work correctly,\
    \ the algorithm must punish dishonest validators by cutting their stake. This\
    \ way, validators benefit more from behaving honestly than from attacking the\
    \ blockchain.\n\nAt each time interval, a validator is chosen from the pool of\
    \ validators for validating and providing another block to the blockchain. The\
    \ choice of the validator is made at each time interval according to various criteria.\n\
    \nThe odds bet by each validator affect the probability of being chosen. The greater\
    \ the odds, the greater the likelihood of being chosen.\n\nEach implementation\
    \ of the `Proof of Stake` defines, as it sees fit, this choice. So it can vary\
    \ from `PoW` to `PoS`.\n\nIn general, there are two ways to make this type of\
    \ selection:\n\n- **Randomly chosen block:** The validator is picked through the\
    \ pairs between the smallest hash value and the biggest stake value. However,\
    \ since the stakes of each validator are public, this choice can be foreseen.\n\
    - **Coin age selection:** The validator is chosen based on how long their tokens\
    \ have been held. Age is calculated based on the number of days the coins are\
    \ held in the stake for the stake share. However, each time a validator adds a\
    \ block, the age of the coin is reset to 0\\. So it has to wait for a certain\
    \ time interval to validate a new block.\n  - This allows decentralization.\n\
    - This prevents large stake nodes from dominating validation and therefore the\
    \ blockchain.\n\nThis obviously does not prevent new selection methods. On the\
    \ contrary, everyone, through the choices of the project, can implement their\
    \ selection.\n\nIn fact, each blockchain that uses `PoS` implements its own methods\
    \ and its own techniques as it deems most appropriate. The chosen node will therefore\
    \ validate the new block, sign it, and add it to the blockchain.\n\nAs a reward,\
    \ the node receives transaction fees.\n\nIf a node wants to stop validating blocks,\
    \ and therefore withdraw its stake, it can do so. However, it will have to wait\
    \ a certain amount of time to allow the network to verify that it has behaved\
    \ honestly. This algorithm allows you to reach:\n\n- **Safety:** The stake acts\
    \ as a financial incentive to validate only blocks and therefore valid transactions.\
    \ It then rejects invalid ones. It also incentivizes validators to work on the\
    \ canonical chain. In case of dishonest behavior, the penalty is that the episode\
    \ is cut.\n- **Energy efficiency:** No need for expensive and specialized hardware\
    \ to carry out the complex calculations required, for example, by the `PoW`.\n\
    - **Incentive:** More and more users will be incentivized into managing validations.\n\
    - **Decentralization:** Thanks to the pseudo-randomness with which the validators\
    \ are chosen, it avoids centralizing the validation to a restricted circle of\
    \ organizations, as happens with the `PoW`.\n- **Stability of the price of the\
    \ coin:** Due to the fact that it no longer needs to release new coins as a reward\
    \ to miners.\n\nFor this reason, as long as the stake is higher than the prize,\
    \ the validator, in the case of dishonest behavior, will lose more coins than\
    \ they can earn.\n\nTo effectively control the network and validate fraudulent\
    \ transactions, a validator should hold 51% of the total stake amount in the network.\
    \ However, if this is not mathematically impossible, it is practically unlikely.\
    \ In fact, for this to happen, a validator must have control of the network, holding\
    \ at least 51% of the current offer. There are two types of shareholder proof\
    \ algorithms:\n\n- **Proof of stake on a chain:** The algorithm pseudo-randomly\
    \ picks a validator during every time band (each ten-second period could represent\
    \ a time slot) and assigns to that validator the ability to generate a single\
    \ block. This block must refer to some prior block (usually the block at the conclusion\
    \ of the preceding longest chain, in most cases). As a result, as time goes, the\
    \ majority of the blocks converge into a single chain that continues to grow.\n\
    - **Proof of stake in the style of BFT (Byzantine Fault Tolerance):** Validators\
    \ are given the right to propose blocks at random, but a multi-round method determines\
    \ which block is canonical. On that basis each validator submits a vote for some\
    \ particular block at every round, and at end of the process all validators (honest\
    \ and online) agree if the given block is linked with the chain. Note that the\
    \ blocks can still be connected to the chain; the difference is that an approval\
    \ on a block can occur within a block, and it is not dependent on the length or\
    \ size of the chain afterward.\n\n## 5.1 Chain-Based Proof of Stake\n\nThis section\
    \ discusses a `Proof of Stake` algorithm combined with `Proof of Work`.\n\nThe\
    \ first `PoS` technique proposed by developers of Bitcoin as an alternate block\
    \ generation method to `PoW` was chain-based `PoS`. It is, in fact, a combined\
    \ mechanism between `PoS` and `PoW`. It is within the context of the Nakamoto\
    \ agreement within which the following principles are maintained:\n\n- A communication\
    \ in the style of gossip\n- The rule of block validation\n- The most extensive\
    \ chain rule\n- The logical goal\n\nThe first complete chain blockchain `POS`\
    \ systems have been implemented and adopted by Nxt and Peercoin. The procedure\
    \ of a chain-based `POS` can be stated by the algorithm that follows. `PoS`, unlike\
    \ `PoW`, does not rely on useless hashes to create blocks. A miner can only find\
    \ the solution once for a tick of the clock.\n\nSince the complexity of the hashing\
    \ puzzle reduces with the amount of the miner’s bet, the estimated number of hashing\
    \ attempts for a miner to solve the puzzle can be greatly reduced, even if their\
    \ stake level is greater.\n\nSo, the `PoS` component avoids the use of force hashing\
    \ concurrency, which would have occurred if `PoW` was used, resulting in a large\
    \ energy savings.\n\nWe first propose the `BlockGen()` method and then the consensus\
    \ algorithm. (See Figure [5-1](#520777_1_En_5_Chapter.xhtml#Fig1).)\n\n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig1_HTML.jpg](images/520777_1_En_5_Chapter/520777_1_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1\n\n`BlockGen()` and the chained-based proof of stake general procedure"
