- fmt: '# 14.1.2 Solution Hints


    The robots can be seen as nodes of a distributed system, which will be modeled
    using the given specification formalism. Typically each node will be modeled as
    an *extended finite state machine* of some form, and the nodes will exchange data
    using the mechanisms offered by the formalism to let different state machines
    communicate.


    The nodes (robots) are identified with a number, and their identifier can be used
    to send point-to-point communications when necessary.


    As a suggestion, you can organize the solution based on a 2PC (two-phase commit
    protocol) algorithm (standard or linear), in which you need to define a coordinator,
    sending its proposal to the others.


    A robot `R1` asking for access to the bridge is acting as the coordinator at each
    run. Hence, it broadcasts the access request to the other robots. A robot receiving
    this request from `R1`, when working in any mode other than `Ask4Bridge` or `Bridge`,
    simply replies `agree`. A robot in `Bridge` mode will reply instead with `abort`,
    since it currently occupies the bridge. A robot `R2` receiving this request from
    `R1`, when in mode `Ask4Bridge`, replies `abort` if its identifier is lower than
    that of `R1`; otherwise, it replies `agree`. But in this case, `R2` has also to
    `abort` the algorithm run that it had launched when it entered `Ask4Bridge` mode.


    A robot leaving the `Bridge` mode broadcasts the information that the bridge is
    free to the other nodes, so that the ones in `Ask4Bridge` mode can retry their
    requests.


    Note that a node should be able to start its own 2PC run *and* listening to messages
    incoming from other robots engaged in other 2PC (two-phase commit protocol) runs
    at the same time. This requires the use of some concurrent threads, or *statechart*
    regions.


    In the first phase, you should focus on the 2PC scheme by considering a fixed
    set of three or four robots and accurately studying their interactions, ignoring
    the liveness and fairness requirements and considering only three operating modes
    (`Ask4Bridge`, `Field Action`, and `Bridge`).


    In the second phase, you extend the model to consider the other operating modes,
    possibly a larger number of robots and/or the liveness/fairness requirements.


    Note that, in general, the tools (in order to be able to simulate or formally
    verify the model) need to instantiate a fixed number of objects (nodes) by physically
    copying and pasting.


    ## 14.2 Implementing the Project


    The project is designed with three robots that move cyclically between the fields
    and the main agricultural buildings and stores. The geography of the farm is such
    that there are two main production fields (named North and South). The movements
    of robots satisfy the three basic requirements of concurrency control in distributed
    system using mutual exclusion, as mentioned earlier.


    In addition to that, the system is based on a totally distributed algorithm, without
    any element of centralization. The robots do not refer to a common clock, but
    each clock is autonomous and not synchronized.


    The project is implemented in MATLAB and the robots are designed with the help
    of the Simulink tool. The following MATLAB dependencies are needed for implementation:


    - Simulink

    - Stateflow

    - Robotics System Toolbox

    - Navigation Toolbox


    The next section covers the built-in features that are available in Simulink and
    used in this project.


    ### 14.2.1 Environment Models


    The built-in Robotics Visualizer in MATLAB enables you to simulate and prototype
    algorithms in a 2D mobile robotics environment. The multi-robot ecosystem also
    enables for the development and prototype of algorithms in a 2D multi-robot mobile
    robotic environment. These functions are accessible through the MATLAB and Simulink
    interfaces.


    ### 14.2.2 Sensor Models


    In this project, the Lidar Sensor simulates 2D line-of-sight sensors for visualization
    and algorithm prototyping. This feature is available in MATLAB and the Simulink
    interface (see Figure [14-3](#520777_1_En_14_Chapter.xhtml#Fig3)).


    ![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig3_HTML.jpg](images/520777_1_En_14_Chapter/520777_1_En_14_Fig3_HTML.jpg)


    Figure 14-3

    The sensor


    ### 14.2.3 Multi-Robot Lidar Sensor


    In addition to the features listed previously, the Multi-Robot Lidar Sensor was
    utilized to mimic two-dimensional line-of-sight detectors for the multi-robot
    environment. This sensor will test for a line-of sight for an occupancy map as
    well as other for robots using a finite radius in the environment. This feature
    is available in the MATLAB and Simulink interface.


    ## 14.3 The System Architecture


    This project implements the two-phase commit protocol technology for the movement
    of the robots.


    Only one process can run the crucial section (CS) at a time under the system architecture.
    Mutual exclusions cannot be implemented in a distributed network using shared
    variables or a local kernel. The only way to create distributed mutual exclusion
    is using message forwarding. Unforeseen communication latency and partial information
    of the system status are dealt with via distributed system algorithms (see Figure
    [14-4](#520777_1_En_14_Chapter.xhtml#Fig4)).


    ![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig4_HTML.jpg](images/520777_1_En_14_Chapter/520777_1_En_14_Fig4_HTML.jpg)


    Figure 14-4

    Multi-sensor


    To avoid collisions between the robots that are crossing the bridge, the architecture
    is designed in a such a way that, when a robot needs to move to a field or to
    the farm building, it enters the `Ask4Bridge` mode. There, it asks for access
    to the bridge, communicating this request to the robots that are in `Ask4Bridge`
    mode. The distributed communication protocol (two-phase commit protocol) allows
    exclusive access, to avoid collisions over the bridge.


    A transaction is defined as a set of actions in the aforementioned architecture.
    Depending on the application criteria, each transaction is given a deadline. The
    operations are considered to be firm and genuine and have the same severity level.
    A transaction with a past-due date will be canceled right away.


    When a transaction is ready to "commit," the two-phase commit protocol kicks in.
    A solitary coordinating machine initiates it (in this case, Robot 1). Robots 2
    and 3 are the other players, and they will wait for orders from the supervisor
    (Robot 1).


    This technique ensures that transactions are atomic: either the whole transaction
    is reflected in the system''s final state, or none of this is. The transaction
    will be terminated if even a single individual is unable to submit. To put it
    another way, each employee has "veto" power over a transaction. The two-phase
    commit protocol''s fundamental flow is depicted in Figure [14-5](#520777_1_En_14_Chapter.xhtml#Fig5).


    ![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig5_HTML.jpg](images/520777_1_En_14_Chapter/520777_1_En_14_Fig5_HTML.jpg)


    Figure 14-5

    System architecture of the smart farm


    ## 14.4 System Modeling


    All the modeling is done with the help of MATLAB. Using the Simulink tool, I have
    developed a State flow model for the movement of the robots. To move the robots,
    the program uses the Robotics System Toolbox and the Navigation Toolbox. (To perform
    this task, note that the free plug-in is available in MATLAB.)


    ### 14.4.1 Robot Visualizer and Lidar Sensor


    The Robot Visualizer is used to develop the robot architecture. Additionally,
    using the Lidar Sensor for each robot, the movement of the robots can be verified.
    The Lidar Sensor may also mimic two-dimensional line-of-sight sensors, as shown
    in Figure [14-6](#520777_1_En_14_Chapter.xhtml#Fig6).


    ![../images/520777_1_En_14_Chapter/520777_1_En_14_Fig6_HTML.jpg](images/520777_1_En_14_Chapter/520777_1_En_14_Fig6_HTML.jpg)


    Figure 14-6

    Two-phase commit protocol (2PC)'
