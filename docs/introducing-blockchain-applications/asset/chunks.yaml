- fmt: "### 4.6.3 Recovery Public Key from Digital Signature\n\nFor a digital signature,\
    \ Ethereum, like Bitcoin, uses the ECDSA algorithm with the standard `secp256k1`.\n\
    \nWe deal here with the digital signature scheme in proposal EIP-155. In this\
    \ example we will refer to the Ethereum Mainnet chain. But the procedure is the\
    \ same for each chain that uses this scheme, just change the `chainId` to the\
    \ appropriate one.\n\nAs you can see, there is no field for the sender’s address\
    \ of the transaction.\n\nThis information is in fact obtained. It is for this\
    \ reason that you have the variable `v` which gives you information about parity\
    \ and the finiteness of curve point in which `randomPart` is the `x` value. The\
    \ formula for calculating `v` is:\n\n`v = chainId * 2 + ((y mod 2) + 35)`\n\n\
    - `chainID` is the ID of the chain used. For Ethereum Mainnet the value of this\
    \ variable is `1`.\n- `y` is the y coordinate of curve point in which `randomPart`\
    \ is the x value of the curve. It is part of the ECDSA signature.\n\nAnalyzing\
    \ the formula proposed for the calculation of `v`, you see that the interesting\
    \ part is `y mod 2`, which assumes the role of recovery identifier.\n\nIt is used\
    \ to speed up the process of retrieving the signer’s public key. In fact, if the\
    \ information is correct, this operation has two possible results:\n- `0`: ->\
    \ the y coordinate is an even value.\n- `1`: -> the y coordinate is an odd value.\n\
    \nConsequently, we find that `((y mod 2) + 35)` can have two possible values:\n\
    - `35`: -> the y coordinate is an even value.\n- `36`: -> the y coordinate is\
    \ an odd value.\n\nGiven a fixed value for the X coordinate and truncating the\
    \ information relative to the Y coordinate, it is possible to have several possible\
    \ pairs of points `(x; y)` with the same `x`.\n\nTo verify the signature, then,\
    \ we would have to retrieve the public key, perform a loop, in which at each iteration,\
    \ compare whether one of the possible pairs matches the signature. Possible pairs\
    \ match the signature. So, let’s see the public key of the sender. We briefly\
    \ explain how the ECDSA algorithm calculates the random part of a digital signature.\n\
    \nGiven the curve `secp256k1`. Let `G` be the generator point defined by the standard\
    \ `secp256k1`. Let `n` be the order of point `G` of the curve. Then, we need to\
    \ understand that a random number is generated in between the interval of `[1,\
    \ n-1]`. We call this `randomNumber` value. We find `randomPart` like this:\n\n\
    `randomNumber * G = (x1; y1)`\n\nTherefore:\n\n`randomPart = x1 mod n`\n\nLet\
    \ `h` be the cofactor of an elliptic curve, then `2 * (h + 1)` gives us the information\
    \ about how many possible points we have given `randomPart` of the X coordinate.\
    \ For `secp256k1` the cofactor is equal to `1`. So, we have four possible points:\n\
    - Two because each X coordinate has two possible Y coordinates, one positive and\
    \ one negative.\n- Two because `R.x = randomPart + j * n` with `j` in `{0, 1,\
    \ 2, ..., h}` (in our case `h = 1`).\n\nHowever, `R.x` is uniquely recoverable\
    \ from `randomPart`, as only one of the integers:\n\n`R.x = randomPart + j * n`\n\
    \nfor `j = 0, 1, 2, ..., h` represents a valid x coordinate, that is, a multiple\
    \ of `G`.\n\nFor this reason, [`SEC2`] encryption standards recommend elliptic\
    \ curves with cofactor `h = 1` or `h = 2`. For these curves recommended by [`SEC2`]\
    \ the number of valid x coordinates is usually one, therefore this control is\
    \ empty.\n\nIn the worst-case scenario, only `log2(h) + 1` bits are needed to\
    \ find `R.x` from `randomPart`.\n\nTherefore, given the fixed `randomPart` information\
    \ of the X coordinate of point `R` and truncating the information relating to\
    \ the Y coordinate, it is possible to have two possible pairs `(x; y)` with the\
    \ same valid X coordinate. That is to say, the one with the positive Y coordinate\
    \ `(x; y)` and the one with the negative coordinate `(x; -y)`.\n\nTo verify the\
    \ signature, then, you would have to run a loop in which, during each iteration,\
    \ you determine if one of the possible pairs matches the signature. However, thanks\
    \ to the information about the parity of the Y coordinate, we can obtain the `yr`\
    \ value of point `R` to derive the public key corresponding to the signature in\
    \ one fell swoop. In fact, since `v` gives us information about the parity of\
    \ the coordinate Y for which `randomPart` is the information about coordinate\
    \ X, we can calculate `R = (xr; yr)`.\n\nLet `h(msg)` be the hash of the transaction.\
    \ We get, in this way, the corresponding public key `Q`:\n\n1. For `j` ranging\
    \ from `0` to `h` (for `secp256k1`, `h = 1`):\n    1. Pony `x[r] = randomPart\
    \ + j * n`\n\n2. From the information about the parity of `y[r]`, derive point\
    \ `R`. `R = (x[r]; y[r])`\n\n3. Calculate the public key candidate:  \n   ![../images/520777_1_En_4_Chapter/520777_1_En_4_Figb_HTML.gif](images/520777_1_En_4_Chapter/520777_1_En_4_Figb_HTML.gif)\n\
    \n4. Verify the public key with the digital signature:\n   1. `u1 = h(msg) * sign-1\
    \ mod n`\n   2. `u2 = randomPart * sign-1 mod n`\n   3. Calculate:  \n      `R\
    \ = (xr, yr) = u1 * G + u2 * Q`\n   4. Set `c = xr mod n`. So, if `c == randomPart\
    \ true`, then the signature is verified. Returns `True` (valid).\n\nOtherwise,\
    \ if, after the loop, the value `True` was not returned then there is a disability\
    \ in the information. In this way, the public key is derived from the ECDSA signature\
    \ with standard `secp256k1` and the signature is verified.\n\n### 4.6.4 Three\
    \ Types of Transactions\n\nThis section covers three types of transactions:\n\n\
    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig22_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig22_HTML.jpg)\n\
    \n**Figure 4-22** – Transfer of funds between EOs\n\n- **Fund Transfer Between\
    \ EOA (Externally Owned Accounts):** This transaction is used when an EOA transfers\
    \ funds to another EOA. This transaction has a blank `Data` field. (See Figure\
    \ [4-22](#520777_1_En_4_Chapter.xhtml#Fig22).)\n\n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig23_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig23_HTML.jpg)\n\
    \n**Figure 4-23** – Distribution of a smart contract of an Ethereum Run function\
    \ on a deployed smart contract\n\n- **Storing Smart Contract on Ethereum Network:**\
    \ In Ethereum, the distribution contract takes place through a transaction. This\
    \ transaction has a blank destination address field. However, in the `Data` field,\
    \ there is the Smart Contract code in bytecode, plus some arguments if necessary.\
    \ If successful, the sender receives a receipt with the contract address that\
    \ they will need to use the smart contract (see Figure [4-23](#520777_1_En_4_Chapter.xhtml#Fig23)).\n\
    \nAfter a contract is deployed, an EOA can perform functions defined in this contract.\
    \ Again, it is implemented by submitting an Ethereum transaction. In this case,\
    \ the destination address of the transaction is the Smart Contract address. While\
    \ in the `Data` field, there is the selector of the function to be recalled plus\
    \ the data to be input into the function. (See Figure [4-24](#520777_1_En_4_Chapter.xhtml#Fig24))\n\
    \n![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig24_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig24_HTML.jpg)\n\
    \n**Figure 4-24** – Calling function on smart contract\n\nObviously, the rights\
    \ on a smart contract of those who can carry out operations are defined in the\
    \ smart contract code, where there is the logic of the operations."
