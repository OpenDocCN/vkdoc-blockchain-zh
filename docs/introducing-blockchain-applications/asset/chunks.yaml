    \n3.  Answer: B, A simulator is a collection of programs designed to carry out\
    \ the designer’s planned scenarios\n\n4.  Answer: A, BLOCKLY comes with everything\
    \ you need to create and render blocks in a drag-and-drop editor.\n\n5.  Answer:\
    \ Correct, because it enables for the viewing and monitoring of requirement traceability,\
    \ requirements management is a critical component of the SoS design. To divide\
    \ needs, the viewpoint and building blocks can be employed.\n\n## 12.5 Summary\n\
    \nThis chapter explained the BLOCKLY 4SOS tool. It is a system-of-systems modeling,\
    \ validation, querying, and simulation tool.\n\nThe goal of the AMADEOS supporting\
    \ facility is to make designing SoS with the AMADEOS ideas and the BLOCKLY tool\
    \ simple and intuitive. This tool is very helpful when designing a distributed\
    \ system (a cyber-physical system).\n\nThe next chapter outlines the first project\
    \ of cyber-physical systems with the help of Kilobots.\n\nFootnotes [1](#520777_1_En_12_Chapter.xhtml#Fn1_source)\n\
    \n# 13. Cyber-Physical Systems Project\n\nIn this chapter, you learn how to develop\
    \ a cyber-physical system based on an Italian game called Witch Calls Color.\n\
    \nThis game has the following rules:\n\n*   One player is picked to be the witch.\n\
    \n*   They call out a color, such as blue.\n\n*   The other children then run\
    \ to touch an object of that color. (Clothes are not included, and only one person\
    \ can touch an object.)\n\n*   If the witch catches a child who is not touching\
    \ the color, they become the next witch. Then the original witch joins the other\
    \ kids.\n\nYou are going to implement this project with the help of Kilobots.\
    \ The movement of the witch and the color are implemented in Kilobots.\n\n## 13.1\
    \ Using Kilobots\n\nThe *Kilobot* cluster is a cluster of 1,000 robots that may\
    \ be used to create collective behavior that is automatic and has a long duration.\
    \ Each robot has the basic functions of an autonomous swarm robot, but it is made\
    \ up of a restricted number of pieces and assembled mostly by an automatic system.\n\
    \nAdditionally, the system design allows a single individual to operate a huge\
    \ Kilobot cooperative in an efficient and scalable manner, including programming\
    \ it, turning it on, and refilling all the robots. The Kilobot swarm is used to\
    \ investigate collective \"virtual\" intellect and to test innovative theories\
    \ that link minimal personal qualities to cluster characteristics. See Figure\
    \ [13-1](#520777_1_En_13_Chapter.xhtml#Fig1).\n\nUsing a mixed concept technique,\
    \ you can obtain new algorithmic understanding about robustness, adaptability,\
    \ personality, and an emerging in groups of limited individuals.\n\n### 13.1.1\
    \ The Kilobots Movements\n\nThe following list shows the basic Kilobots movements:\n\
    \n*   Upward motion\n\n*   Characteristics of rotating\n\n*   Keeping in touch\
    \ with adjacent units\n\n*   Computing the difference between adjacent units.\n\
    \n*   Having sufficient RAM to execute the Kilobots\n\nThe following extra parts\
    \ were added to the Kilobot to expand its implementation:\n\n![../images/520777_1_En_13_Chapter/520777_1_En_13_Fig1_HTML.jpg](images/520777_1_En_13_Chapter/520777_1_En_13_Fig1_HTML.jpg)\n\
    \nFigure 13-1\n\nA Kilobot\n\n*   The capacity to estimate the amount of light\
    \ in the environment\n\n*   Making the operations more flexible\n\n## 13.2 Project\
    \ Requirements\n\n### 13.2.1 Architecture\n\n1.  The Kilobots will operate in\
    \ a space of at least 100x80cm.\n\n2.  The surface should be glossy and reflective\
    \ for the infrared to work properly.\n\n3.  The SoS is composed of at least five\
    \ Kilobots and a controller (one witch, two players, and two colors).\n\n4.  The\
    \ SoS is composed of at least five Kilobots and a controller (one witch, two players,\
    \ and two colors).\n\n5.  At the beginning of the program execution, there are\
    \ assigned positions for the Kilobots.\n\n6.  Each Kilobot has an ID, color, and\
    \ positions.\n\n7.  When the game starts, the player searches for the color and\
    \ the witch searches for the player.\n\n8.  The witch and player Kilobots are\
    \ waiting for the signal to each other to run.\n\n9.  The target color is chosen\
    \ by the program.\n\n10.  During the game, all of the Kilobots are searching for\
    \ each other.\n\n11.  During the game, the witch is trying to catch the players\
    \ and the players are searching for the color. If the witch catches a player,\
    \ that player will be the witch in the next round.\n\n12.  The round is finished\
    \ when the Kilobots catch the color.\n\n13.  Each Kilobot has two independent\
    \ motors.\n\n14.  Each Kilobot has an infrared transmitter and receiver.\n\n15.\
    \  The Kilobots can estimate relative distance from other bots from the environment.\n\
    \n16.  The Kilobots will operate in one of at least three states: run, bootload,\
    \ or sleep.\n\n17.  Through a message interface, each Kilobot can communicate\
    \ with every other Kilobit.\n\n### 13.2.2 Project Communication\n\n1.  The Kilobots\
    \ can receive messages from the overhead controller.\n\n2.  The Kilobots are communicating\
    \ when they are within 7.5cm distance of each other.\n\n3.  The connection between\
    \ all the Kilobots is established at the beginning of each round.\n\n4.  There\
    \ should be a unique Kilobot operating as a central communication coordinator.\n\
    \n### 13.2.3 Time\n\nEach Kilobot will have a time-based internal clock. Kilobots\
    \ can communicate over the network within 10 seconds of every message sent.\n\n\
    ### 13.2.4 Dynamicity\n\nA Kilobot moving out of the range of communication will\
    \ start moving to find the other Kilobots in order to become a part of the network\
    \ again.\n\n### 13.2.5 Dependability\n\n1.  Availability: A charged battery is\
    \ necessary for Kilobots.\n\n2.  Reliability: The Kilobots can start each game\
    \ round only when they can communicate with all the others because they don’t\
    \ provide the necessary service.\n\n3.  Integrity: It is fundamental that the\
    \ SoS doesn’t have an improper state to function correctly."
  trans: "好的，作为高级文档工程师和翻译员，我将严格遵守您提供的注意事项和示例格式，对给定的英文文本进行专业、准确的翻译。\n\n\n# 12.3 复习题\n\
    \n1. “`BLOCKLY`是一个用于通过积木创建应用程序的库。用户可以在积木编程中利用可视化积木来构建脚本和程序。” 这种说法是正确的还是错误的？\n\n\
    2. 以下哪一项描述了 `BLOCKLY 4SoS`？\n    1. 每个积木代表一段可以分层并轻松转换为元模型的代码。\n    2. 每个积木代表一段可以堆叠并轻松转换为算法的代码。\n\
    \    3. 每个积木代表一个可以轻松堆叠和翻译的代码块。\n    4. 以上所有选项。\n\n3. 对于*模拟器*组件，以下哪项陈述是正确的？\n \
    \   1. 模拟器是用于运行设计者预期场景的 Python 程序集合。\n    2. 模拟器是为执行设计者规划的场景而设计的程序集合。\n    3.\
    \ 模拟器是用于运行设计者准备好的场景的 Java 应用程序集合。\n    4. 以上都不是。\n\n4. 对于*事件*，以下哪项陈述是正确的？\n  \
    \  1. `BLOCKLY`提供了在拖放编辑器中创建和渲染积木所需的一切。\n    2. `BLOCKLY`提供了定义和显示积木所需的一切。\n   \
    \ 3. `BLOCKLY`提供了在编辑器中创建和渲染积木所需的一切。\n    4. 以上所有选项。\n\n5. “需求管理是 SoS 架构的关键组成部分，因为它允许查看和监控需求可追溯性。可以使用视角和构建块来拆分需求。”\
    \ 这种说法是正确的还是错误的？\n\n## 12.4 复习题答案\n\n1. 答案：正确，`BLOCKLY`是一个用于开发基于积木的应用程序的库。在积木编程中，用户可以使用可视化积木创建脚本和程序。\n\
    \n2. 答案：C，每个积木代表一个可以轻松堆叠和翻译的代码块。\n\n3. 答案：B，模拟器是为执行设计者规划的场景而设计的程序集合。\n\n4. 答案：A，`BLOCKLY`提供了在拖放编辑器中创建和渲染积木所需的一切。\n\
    \n5. 答案：正确，因为它允许查看和监控需求可追溯性，所以需求管理是 SoS 设计的一个关键组成部分。为了划分需求，可以采用视角和构建块。\n\n## 12.5\
    \ 本章小结\n\n本章解释了`BLOCKLY 4SOS`工具。它是一个用于系统之系统建模、验证、查询和仿真的工具。AMADEOS 支持工具的目标是使使用\
    \ AMADEOS 理念和`BLOCKLY`工具设计 SoS 变得简单直观。该工具在设计分布式系统（网络物理系统）时非常有用。下一章将概述借助于 Kilobots\
    \ 的第一个网络物理系统项目。\n\n脚注 1\n\n# 13. 网络物理系统项目\n\n在本章中，您将学习如何基于一个名为“女巫喊颜色”的意大利游戏来开发一个网络物理系统。此游戏的规则如下：\n\
    \n-   挑选一名玩家作为女巫。\n-   女巫喊出一种颜色，例如蓝色。\n-   其他孩子随后跑去触摸该颜色的物体。（不包括衣服，且只能有一个人触摸一个物体。）\n\
    -   如果女巫抓住了一个没有触摸到该颜色的孩子，那么被抓住的孩子就成为下一任女巫。然后原来的女巫加入到其他孩子中。\n\n您将借助 Kilobots 来实现这个项目。女巫的移动和颜色功能均在\
    \ Kilobots 中实现。\n\n## 13.1 使用 Kilobots\n\n*Kilobot*集群是一个由 1000 个机器人组成的集群，可用于创建自动化且具有长持续时间的集体行为。每个机器人拥有自主群体机器人的基本功能，但它由有限数量的部件组成，并主要由自动化系统组装。此外，系统设计允许单个人以高效且可扩展的方式操作一个大型\
    \ Kilobot 协作体，包括对其编程、启动以及为所有机器人补充能源。Kilobot 群体用于研究集体的“虚拟”智能，并测试将最低个人特质与集群特征联系起来的新理论。见图\
    \ 13-1。通过使用混合概念技术，您可以获得关于鲁棒性、适应性、个性以及在有限个体群体中涌现现象的新算法理解。\n\n### 13.1.1 Kilobots\
    \ 的运动\n\n以下列表展示了 Kilobots 的基本运动方式：\n\n-   向上运动\n-   旋转特性\n-   与相邻单元保持联系\n-   计算与相邻单元的距离\n\
    -   拥有足够的 RAM 来执行 Kilobots 程序\n\n为了扩展其功能，对 Kilobot 添加了以下额外部分：\n\n![../images/520777_1_En_13_Chapter/520777_1_En_13_Fig1_HTML.jpg](img/520777_1_En_13_Fig1_HTML.jpg)\n\
    图 13-1：一个 Kilobot\n\n-   估算环境中光照强度的能力\n-   使操作更加灵活\n\n## 13.2 项目需求\n\n### 13.2.1\
    \ 架构\n\n1.  Kilobots 将在至少 100x80 厘米的空间内运行。\n2.  表面应为光泽且反光的材质，以便红外线正常工作。\n3.  该\
    \ SoS 由至少五个 Kilobots 和一个控制器组成（一个女巫，两个玩家，两种颜色）。\n4.  在程序执行开始时，为 Kilobots 分配好位置。\n\
    5.  每个 Kilobot 都有一个 ID、颜色和位置。\n6.  游戏开始时，玩家搜索颜色，女巫搜索玩家。\n7.  女巫和玩家 Kilobots 在等待彼此的奔跑信号。\n\
    8.  目标颜色由程序选择。\n9.  游戏过程中，所有 Kilobots 都在互相搜索。\n10. 游戏过程中，女巫试图抓住玩家，而玩家则在搜索颜色。如果女巫抓住了某个玩家，该玩家将在下一轮成为女巫。\n\
    11. 当 Kilobots 触及到目标颜色时，本轮结束。\n12. 每个 Kilobot 都有两个独立的电机。\n13. 每个 Kilobot 都有一个红外发射器和一个接收器。\n\
    14. Kilobots 可以估算与环境中其他机器人的相对距离。\n15. Kilobots 将在至少三种状态之一运行：运行、引导加载或休眠。\n16. 通过消息接口，每个\
    \ Kilobot 都可以与其它任何 Kilobot 通信。\n\n### 13.2.2 项目通信\n\n1.  Kilobots 可以接收来自顶部控制器的消息。\n\
    2.  Kilobots 在彼此相距 7.5 厘米范围内时进行通信。\n3.  所有 Kilobot 之间的连接在每轮开始时建立。\n4.  应有一个唯一的\
    \ Kilobot 作为中央通信协调器。\n\n### 13.2.3 时间\n\n每个 Kilobot 将拥有一个基于时间的内部时钟。对于发送的每条消息，Kilobots\
    \ 可以在 10 秒内通过网络进行通信。\n\n### 13.2.4 动态性\n\n一个移动出通信范围的 Kilobot 将开始移动以寻找其他 Kilobot，以便重新成为网络的一部分。\n\
    \n### 13.2.5 可靠性\n\n1.  可用性：Kilobots 需要充满电的电池。\n2.  可靠性：Kilobots 只有能够与所有其他机器人通信时才能开始每一轮游戏，因为它们无法提供必要的服务。\n\
    3.  完整性：SoS 不处于不正确的状态以使其正常运行是至关重要的。\n"
- fmt: '# 13.3 Blockly4SoS Model


    In this model, we have an SoS composed of five Kilobots and one overhead controller.


    1. The overhead controller has a `RUMI` (a Relied Upon Message Interface) that
    it uses to send information to the Kilobots about the state they must enter or
    sends the code that defines the behavior of Kilobots.

    2. The Kilobot with `ID=0` is the central point of communication; it helps you
    define a better protocol of communication.

    3. Every Kilobot has a `RUMI`, which is the interface that they use to exchange
    messages, and a `RUPI` (Relied Upon Physical Interface), which is represented
    by the infrared sensor that catches information from the environment (for example,
    the distance from the other bots). The message channels are based on the infrared
    sensor at the hardware layer, but since that is used to directly communicate the
    data and exchange messages, those are `RUMI`s. Every characteristic of the Kilobots’
    SoS is related to a requirement.


    # 13.4 Implementing the Project


    In this project, you assign starting positions of Kilobots and specify them in
    the `endstate.json` file. At first, a Kilobot moves in a spiral way, trying to
    establish a connection with the other Kilobots in order to receive a signal.


    In the first phase, every Kilobot sends an array of 10 bits, where all the bits
    are 0 except for the one at the array position equal to the Kilobot ID. When every
    Kilobot has an array, that means that every Kilobot is connected to all the other
    Kilobots one way and they are ready to communicate. The first phase is terminated.


    In the second phase, all the Kilobots have formed a network and now act as an
    SoS. They select the witch and broadcast this information through the network
    of Kilobots. Every Kilobot resends the received message until the chosen witch
    receives it. Then the witch selects the target color to catch and broadcast this
    information.


    In the next phase, the Kilobots try to catch the target. Every Kilobot evaluates
    the distance to the target Kilobot, identifying which of the neighbors have the
    field "distance to target" smaller than all the others. By adding the "distance
    to target" of the neighbor to the distance of Kilobot X to the neighbor’s closest
    to the target, you can obtain an approximate distance to the target. This process
    starts from the Kilobots that are effectively communicating with the target, because
    they are the only ones able to obtain the real distance to the target. After that,
    this process will recursively happen up to the outermost node of the network.


    So, every Kilobot in communication range can know the approximate distance to
    the target and the closest neighbor it needs to follow in order to reach the target.
    Kilobots can go out of range of communication. In such cases, they start moving
    in a spiral way until they find someone communicating with the target.


    There is an emergent behavior—an unexpected and positive behavior—that when a
    Kilobot exits the range, it turns around 360 degrees and enters the range again.


    # 13.5 Executing the Project


    In this project, you assign the starting positions of the Kilobots and specify
    them in the `endstate.json` file. Now, we’ll describe the simulation as per the
    settings you choose (most importantly, `randSeed = 2`).


    In Figure [13-2](#520777_1_En_13_Chapter.xhtml#Fig2), you can see the starting
    positions of the bots in this simulation. A circle around a bot means that it
    is transmitting; a line between two bots means they are communicating.


    So, from Figure [13-2](#520777_1_En_13_Chapter.xhtml#Fig2), you can see that at
    the start, only one bot (with `ID=1`) is transmitting. Initially, the goal of
    the bots is to create a network in which they are connected and can send and receive
    messages to any bot, so they start moving around, stopping only when they receive
    a message from a bot connected to the growing network, starting from bot 1. Bot
    1 remains stopped.


    After the bots create the network, they use this common channel to agree on the
    main game parameters and then start playing. During this phase, their job is either
    to run away from other bots or catch the one who has the chosen color. Also, this
    phase starts with only one bot transmitting; this is the target bot, or runner,
    which constantly sends its color and its distance from the target (which is 0,
    of course).


    Bots that don’t receive a message start moving around searching for anyone, the
    bots that actually get messages, and try to use the information about the distance
    from the target bot contained in those messages to catch the runner. See Figure
    [13-3](#520777_1_En_13_Chapter.xhtml#Fig3).


    ![../images/520777_1_En_13_Chapter/520777_1_En_13_Fig3_HTML.jpg](images/520777_1_En_13_Chapter/520777_1_En_13_Fig3_HTML.jpg)


    Figure 13-3


    Orbit bot


    ![../images/520777_1_En_13_Chapter/520777_1_En_13_Fig2_HTML.jpg](images/520777_1_En_13_Chapter/520777_1_En_13_Fig2_HTML.jpg)


    Figure 13-2


    Orbit bot


    # 13.6 Project Code


    This is the main code for the project. It is developed in C language. To execute
    this code, you need a C language compiler. The rotation of the robot and movements
    (left and right and forward and backward) are defined in different functions in
    the code. Using `void setup_message()` function message handling of each robot
    is defined. The `orbit_tooclose()` function checks the adjacent robot movement
    (see Listing [13-1](#520777_1_En_13_Chapter.xhtml#PC1)).'
