    ## 5.4 本章小结


    本章介绍了权益证明的未来发展前景，这种机制用验证者取代矿工，使挖矿过程虚拟化。同时，本章还讨论了基于链的权益证明，该机制采用区块系统运作。


    像比特币和以太坊这样的公共区块链的普及，激发了对区块链技术及其在最前沿商业应用中作为分布式系统使用的兴趣。要在分布式系统中使用区块链，你需要理解 `Hyperledger
    Fabric` 的概念，它作为应用开发或模块化架构解决方案的基础。下一章将包含关于 `Hyperledger Fabric` 的更多细节。


    # 6. Hyperledger Fabric


    像比特币和以太坊这样的公共区块链的成功，引发了人们对区块链技术及其在最具创新性的商业用例中作为分布式系统应用的日益增长的兴趣。


    然而，企业的优先事项基于公有无许可区块链尚无法满足的原则和特性。


    因此，私有许可区块链应运而生，能够满足商业上的折中需求。


    事实上，私有许可区块链允许你设计出满足以下条件的系统：


    -   网络是经过授权的

    -   参与者是已知且可识别的

    -   数据隐私和机密性有保障

    -   交易确认延迟较低


    因此，有许多不同的区块链项目被授权用于企业用途。`Hyperledger Fabric` 是一款基于分布式账本的自由软件企业会计系统，与其他著名的分布式账本及区块链系统相比，它拥有某些重要的变体。


    然而，区分 `Hyperledger` 与 `Hyperledger Fabric` 至关重要。`Hyperledger` 项目是由 Linux 基金会发起的一个开源区块链项目。


    `Hyperledger Fabric` 旨在作为应用开发或模块化架构解决方案的基础。`Hyperledger Fabric` 支持即插即用的组件，例如共识和成员服务。其模块化和适应性强的设计能够满足广泛的行业用例需求。它采用了一种新颖的共识方法，在保护隐私的同时实现了全规模性能。


    正如 IBM 所推广的，它是一个面向多种用例应用开发的企业级解决方案，为各个应用领域提供了创新性和多功能性。


    它是一个 `授权` 的解决方案，因此参与者是已知的，没有公共网络或无许可网络带来的问题。因此，参与者之间存在着信任。


    这对共识产生了显著影响。在一个由可信机构授权和管理的系统中，共识并非必需。实际上，在这种情况下，共识在性能和速度方面将是低效的。


    这使得 `Hyperledger Fabric` 平台具有高性能。该区块链经过特殊设计，具有高度模块化、可配置性和可定制性，能够满足各种业务需求。


    ## 6.1 高层次视角


    本节通过提供一个高层次视角来介绍 `Hyperledger Fabric`。它包含以下组件：


    -   一个负责通过确定交易顺序来建立系统共识，并因此向对等节点传输新区块的**排序节点**。

    -   一个负责使用加密标识符验证网络身份的**成员服务提供者**。

    -   一个额外的用于向其他对等节点广播排序服务结果区块的**点对点八卦消息通道**。

    -   账本可以配置为与多种数据库管理系统协同工作。

    -   每个应用都有**可定制的背书策略**。因此，平台的每个方面都是模块化和可配置的。

    -   在 `Hyperledger Fabric` 中，智能合约被称为 `链码`。`Hyperledger Fabric` 的执行-共识架构被称为 `执行-排序-验证`。


    实际上，它将交易流程分为三个阶段：


    -   执行交易并验证其有效性，从而以这种方式批准交易。

    -   使用可编程的共识协议对交易进行排序。

    -   在将交易记录到账本之前，必须根据应用区块链的策略对它们进行验证。


    `Hyperledger Fabric` 提供了一种**通道结构**。可以说，每个通道对应且仅对应一个区块链。因此，一个区块链仅与一个通道相关联。这意味着只有属于某个通道的组织才有权访问该通道自身的数据，进而也有权访问该通道对应区块链的数据。


    这一点，连同私有数据的概念，为数据安全和隐私提供了一定保障。


    对条目进行分类的任务被委托给一个模块化组件，该组件在概念上区别于那些执行交易和维护账本的对等节点。这就是排序过程的工作原理。


    只要共识是模块化的，它就可以根据对特定分布或解决方案的信任度进行调整。


    在讨论 `Hyperledger Fabric` 背后的概念和机制时，本章在尝试总结这些概念时，遵循并信赖网络上可获得的官方 `Hyperledger Fabric`
    文档。因此，所有关于 `Hyperledger Fabric` 的叙述均源于对其官方文档的分析与研究。


    ## 6.2 资产


    `Hyperledger Fabric` 允许你使用 `链码` 构建任何类型的资产，无论是有形资产（房产、商品、产品等）还是无形资产（合同条款、知识产权、文档等）。


    在 `Hyperledger Fabric` 中，资产被定义为一组键值对，其状态变化作为交易存储在（与通道绑定的）账本上。资产可以采用二进制和/或 JSON
    表示形式。


    ## 6.3 链码


    `链码` 是一种定义业务逻辑的软件。换句话说，它定义了一个或一组活动，以及用于更改这些活动的交易指令。因此，`链码` 定义了改变活动状态的操作。它使用规则来读取或更改键值对。


    一个交易提案会触发 `链码` 函数，这些函数在当前数据库账本上执行。当 `链码` 运行时，它会生成一组写入集，这些写入集可以在网络中广播，并添加到所有对等节点的账本中。

    '
- fmt: '# 6.4 Characteristics of the Ledger


    The ledger keeps track of all network state transitions in a sequential order.
    Chaincode invocations (transactions) supplied by the parties produce state transitions.
    Every operation contains a set of session keys for the resources in the ledger
    which are created, updated, or eliminated in the ledger.


    The ledger consists of:


    - A chain to store unchangeable data in blocks.

    - A state database that records the present position of the blockchain. Each channel
    has its own ledger, as previously mentioned. For each channel in which they participate,
    each peer has a copy of the data.


    Here are some ledger features:


    - Perform key-based searches and enquiries, as well as range and generally relied
    inquiries.

    - Use a sophisticated query language to do read-only questions. (`CouchDB`).

    - Perform read-only questions from history and query the ledger’s record for a
    key, allowing options for where the data came from.

    - Transactions contain the signatures of each peer who approves them before being
    forwarded to the service for placing orders.

    - Transactions contain the signatures of each peer who approves them before they
    are forwarded to the ordering service.

    - Entries are sorted into blocks and “distributed” to peers on the channel by
    an ordering service.

    - Peers enforce approval policies by checking events against them.

    - Before adding a block, a version check is conducted to confirm that the statuses
    of the read assets have not changed since the chaincode code was executed.

    - Once a transaction has been verified and committed, it is immutable. A configuration
    block in the channel ledger defines policies, access controls, and other relevant
    information.


    Channels are membership provider instances that allow cryptographic materials
    to be obtained from multiple certifying bodies.


    ## 6.5 Privacy


    I previously said that a ledger only exists in one channel and in a channel there
    is only one ledger. Only the members of a channel can therefore access the ledger
    of this channel. This allows you to do a lot of things while ensuring privacy
    and confidentiality.


    For example, let’s imagine the scenario in which there is a supplier company and
    various client companies. If the supplier company applies different prices depending
    on the client company, but does not want to reveal this detail, then the channel
    is the solution. In fact, it would be enough to implement a channel for each commercial
    relationship, and the confidentiality of any information is guaranteed.


    Furthermore, within the channel itself it is possible to obtain an additional
    level of confidentiality. In fact, chaincode can define an asset the functions
    that alter the state of the latter. Well, in this area, only the peers who own
    the chaincode can read the asset related to that chaincode.


    If a subgroup of organizations in that channel needs to keep financial data secret,
    they can gather (collect) the data and store it in a private database that is
    conceptually distinct from the channel registers and only accessible to a limited
    number of people inside the institution.


    In this way, channels maintain private transactions for the rest of the network,
    and collections store private data between organizational subsets of channels.


    Before submitting a transaction to the ordering service and adding the block to
    the account, the value of the chaincode can be encrypted with a cryptographic
    method to further obscure the data. Only a user with the key correspondent used
    to produce the ciphertext may decode encrypted data once it has been printed to
    the ledger.


    ## 6.6 Identity


    Once the encrypted data has been decrypted, a blockchain is made up of multiple
    actors:


    - Peers

    - Orderers

    - Client applications

    - Directors

    - Users


    A trusted authority is required for an identity to be verifiable. A Membership
    Service Provider (`MSP`) is Fabric’s most trusted authority. A `MSP` is an element
    that sets the rules that govern this organization’s authorized identities. The
    standard PKI (Public Key Infrastructure) model is used in the default implementation,
    which employs `X.509` identity certificates.


    ### 6.6.1 Infrastructure with Public Keys (PKI)


    A *public key infrastructure* is one of the safety architectures that allows for
    the generation, management, and use of encryption keys and digital certificates.
    As a consequence, it’s a set of technologies that allows for secure network connections.
    (See Figure [6-1](#520777_1_En_6_Chapter.xhtml#Fig1).)


    The elements of the PKI are:


    - A certification authority (CA)

    - Public key and private key

    - Digital certificates

    - Revocation of certificates


    The certification authority (CA) issues the certificates. The `MSP` determines
    the benefits of the trusted members of a certain organization.


    ![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig1_HTML.jpg](images/520777_1_En_6_Chapter/520777_1_En_6_Fig1_HTML.jpg)


    *Figure 6-1 Example of CA e-digital certificate*


    ### 6.6.2 Digital Certificates


    A digital certificate is a collection of information about the certificate holder.


    Among the elements of an `X.509` digital certificate are:


    - Version

    - Serial number

    - ID of the algorithm

    - Issuing body

    - Validity

    - Subject

    - Information on the subject’s public key

    - Certificate signing algorithm

    - Certificate signature


    The certificate is encrypted and therefore proof against tampering. A change would
    invalidate the certificate. In fact, it is signed with the private key of the
    certification authority, and in this way, verifiable through the public key of
    the same authority. A change would invalidate the verification process. (See Figure
    [6-2](#520777_1_En_6_Chapter.xhtml#Fig2).)


    ![../images/520777_1_En_6_Chapter/520777_1_En_6_Fig2_HTML.jpg](images/520777_1_En_6_Chapter/520777_1_En_6_Fig2_HTML.jpg)


    *Figure 6-2 Example of CA and a digital certificate*


    It certifies the unique association between a public key and the identity of a
    subject.


    The purpose of the digital certificate is to guarantee that a key public is associated
    with the true identity of the subject claiming it. In fact, the applied signature
    certifies that the public key declared is accurate.


    In effect, the applied signature checks that the certificate’s public key matches
    the topic specified in the certificate’s contents.


    In the beginning, therefore, if Mario Rossi wanted to digitally sign a document,
    he had to divulge his public key to the other actors of the communication. Any
    person who possessed it could receive from him documents signed with the private
    key and then verify the signature with the aforementioned public key; however
    any individual could disclose a different public key, of which he knew the relative
    private key, and declare that it was Mario Rossi’s public key.


    To avoid this problem, each user then enters their key in a certificate signed
    by a reliable third party (in the PKI case, the certificate authorities). All
    those who recognize this third party simply have to check its signature to decide
    if the public key really belongs to that user.'
