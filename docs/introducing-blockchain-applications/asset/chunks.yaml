  trans: "\n# 5\\. 权益证明：未来的共识机制\n\n`权益证明`算法用验证者取代了矿工，并使挖矿过程虚拟化。以太坊开发者一直想转向`权益证明`，但它带来了一些问题，开发者仍在努力解决。\n\
    \n`权益证明`算法基于一种不同的区块挖矿理念。\n\n概括而言，该算法基于以下事实：\n\n-   任何想要成为验证者的用户，都必须通过质押币在网络中注册为验证者。质押的价值随后被锁定并冻结。\n\
    -   这个币的赌注绝不能低于一定数量。实际上，质押必须大于他们从验证新区块中可能获得的收益。\n-   为了正确运作，该算法必须通过削减质押来惩罚不诚实的验证者。这样，验证者从诚实行为中获得的收益将大于攻击区块链的收益。\n\
    \n在每个时间间隔，会从验证者池中选取一个验证者，负责验证并向区块链提供下一个区块。验证者的选择在每个时间间隔根据多种标准进行。\n\n每个验证者投注的赔率会影响被选中的概率。赔率越高，被选中的可能性越大。\n\
    \n`权益证明`的每种实现都按照自身需求来定义这种选择机制。因此，它可能与传统工作量证明`PoW`向权益证明`PoS`的过渡有所不同。\n\n通常，有两种方式进行此类选择：\n\
    \n-   **随机选择区块：** 通过最小哈希值与最大质押值之间的配对来选取验证者。然而，由于每个验证者的质押是公开的，这种选择可以被预测。\n-   **币龄选择：**\
    \ 验证者是根据其代币持有时间的长短来选择的。币龄根据币在质押中持有的天数计算。但是，每当验证者添加一个区块，币龄就会重置为 0。因此，必须等待一定的时间间隔才能验证新区块。\n\
    \    -   这种方式有助于实现去中心化。\n-   这可以防止拥有大量质押的节点主导验证过程，从而控制区块链。\n\n这显然不排除新的选择方法。相反，每个人都可以通过项目自身的选择来实现其选择机制。\n\
    \n事实上，每个使用`PoS`的区块链都采用自己认为最合适的方法和技术。被选中的节点因此验证新区块、签名并将其添加到区块链上。\n\n作为奖励，该节点会获得交易费用。\n\
    \n如果节点想要停止验证区块并撤回其质押，它也可以这样做。然而，它必须等待一段时间，以便网络验证其行为是否诚实。该算法实现了以下目标：\n\n-   **安全性：**\
    \ 质押作为一种财务激励，促使节点只验证有效区块和有效交易，从而拒绝无效交易。它还激励验证者在规范链上工作。如果行为不诚实，惩罚就是削减质押。\n-   **能源效率：**\
    \ 无需昂贵且专门的硬件来执行`PoW`所需的复杂计算。\n-   **激励性：** 越来越多的用户将受到激励来管理验证工作。\n-   **去中心化：**\
    \ 由于验证者的选择具有伪随机性，避免了像`PoW`那样将验证权集中在少数组织手中。\n-   **币价稳定：** 因为不再需要释放新币作为给矿工的奖励。\n\
    \n正因如此，只要质押金额高于奖励，验证者在行为不诚实的情况下，损失的币将超过其可能赚取的币。\n\n要有效控制网络并验证欺诈性交易，验证者需要持有网络上总质押量的\
    \ 51%。然而，即使这在数学上并非不可能，实际上也是不太可能的。事实上，要做到这一点，验证者必须控制网络，持有至少 51% 的当前流通供应量。存在两种类型的权益证明算法：\n\
    \n-   **链式权益证明：** 算法在每个时间片（每十秒周期可能代表一个时间片）内伪随机地选取一名验证者，并赋予该验证者生成一个区块的能力。这个区块必须引用某个先前的区块（通常是最长链上前一个链末端的区块）。因此，随着时间的推移，大多数区块会汇聚成一条持续增长的单一链条。\n\
    -   **BFT（拜占庭容错）风格的权益证明：** 验证者被随机赋予提出区块的权利，但通过多轮方法来确定哪个区块是规范链上的。在此基础上，每个验证者在每一轮中对某个特定区块进行投票，在过程结束时，所有（诚实且在线）的验证者就给定区块是否与链相连达成一致。请注意，区块仍然可以连接到链上；区别在于对区块的批准可以在区块内部发生，并且不依赖于其后链的长度或大小。\n\
    \n## 5.1 基于链的权益证明\n\n本节讨论一种将`权益证明`与`工作量证明`相结合的算法。\n\n比特币开发者提出的第一种替代`PoW`的区块生成方法的`PoS`技术，就是基于链的`PoS`。实际上，它是一种介于`PoS`和`PoW`之间的混合机制。它在中本聪共识的框架内，遵循以下原则：\n\
    \n-   点对点式的信息传播\n-   区块验证规则\n-   最长链规则\n-   逻辑目标\n\n第一个完整的基于链的区块链`POS`系统由 Nxt\
    \ 和 Peercoin 实施并采用。基于链的`POS`的过程可以用下面的算法来描述。与`PoW`不同，`PoS`不依赖无用的哈希值来创建区块。矿工在每个时钟周期内只能找到一次解。\n\
    \n由于哈希难题的复杂度随着矿工质押金额的增加而降低，即使矿工的质押水平较高，其解决该难题所需的估算哈希尝试次数也可以大幅减少。\n\n因此，`PoS`组件避免了如果使用`PoW`会出现的强力哈希并发，从而节省了大量能源。\n\
    \n我们首先提出`BlockGen()`方法，然后是共识算法。（见图 5-1。）\n\n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig1_HTML.jpg](img/520777_1_En_5_Fig1_HTML.jpg)\n\
    \n图 5-1\n\n`BlockGen()` 和基于链的权益证明总体流程\n"
- fmt: '### 5.1.1 Committee-Based PoS


    `Chain-based` PoS still depends on the hashing puzzle to create the blocks. As
    an alternative technique, committee-based PoS follows a more orderly procedure:


    - Establishes a stakeholder committee based on the mail at stake.

    - Allows the committee to create blocks in turn.


    A safe multi-party computation (MPC) technique is frequently used to derive such
    a board in the global network. MPC is a kind of distributed computing where different
    parts starting with diverse inputs produce the same outcome.


    The MPC process in committee-based PoS effectively achieves the functionality
    that takes the values from the present state of the blockchain targeted by all
    shareholders and produces a pseudo-random series of shareholders (sequence of
    leaders) that will then occupy the proposing committee. (See Figure [5-2](#520777_1_En_5_Chapter.xhtml#Fig2).)


    This leader sequence is the same for all parties involved and those with greater
    levels of authority can occupy multiple stitches in the sequence.


    ![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig2_HTML.jpg](images/520777_1_En_5_Chapter/520777_1_En_5_Fig2_HTML.jpg)


    **Figure 5-2** `CommitteeElect()` and the committee-based proof of stake general
    procedure


    ### 5.1.2 The Nothing at Stake Theory


    There are no penalties or incentives in many early chain-based proof of stake
    systems. (See Figure [5-3](#520777_1_En_5_Chapter.xhtml#Fig3).)


    This has the undesirable consequence that, if multiple chains compete, the validator’s
    incentive is to strive to make blocks on each chain. There are two basic reasons
    for this:


    - Unlike PoW, validators can validate transactions across multiple branches for
    free. Because PoW is not required to build a block, it is computationally cheap
    to be produced on each fork.

    - Validators work on all forks because it is profitable for them to do so. If
    validators validate blocks mainly on two (or more) chains, they will collect trading
    fees on any branch that wins. This increases the probability of collection.


    The problem therefore is that if the validators point to every fork, the blockchain
    will become more susceptible to double spending attacks.


    ![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig3_HTML.jpg](images/520777_1_En_5_Chapter/520777_1_En_5_Fig3_HTML.jpg)


    **Figure 5-3** Chain-based proof of stake systems


    In PoW, there is no incentive to mine on numerous chains at the same time. It
    will not boost a miner’s chances of extracting a block if they split their hash
    power (computational power) between two chains.


    This problem can be solved by two strategies—Slasher and Dunkle.


    #### 5.1.2.1 Slasher


    This includes a punishment for validators that create blocks on numerous chains
    at the same time, as well as evidence of wrongdoing. The deposit of the wicked
    validator is cut in this situation. The incentive structure is altered as a result
    of this. (See Figure [5-4](#520777_1_En_5_Chapter.xhtml#Fig4).)


    ![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig4_HTML.jpg](images/520777_1_En_5_Chapter/520777_1_En_5_Fig4_HTML.jpg)


    **Figure 5-4** Slasher


    However, the validator selection for each block on both branches is identical
    for this technique to solve the problem, necessitating validator selection before
    the fork. There are certain disadvantages to this solution:


    - Nodes must be online often to have a secure view of the blockchain.

    - Openness to the risks of collusion for medium-range validators (e.g., situations
    in which, for example, 25 of the 30 validators get together and agree ahead of
    time to launch a 51% attack on the preceding 19 blocks).


    #### 5.1.2.2 Dunkle


    The second approach is to simply penalize validators who create blocks on the
    incorrect chain. Assume two opposing chains, A and B. A validator who constructs
    a block on A receives a reward of + R on A, but the block’s header can be included
    in B, and the validator receives a penalty of -F on B. In other words, even validators
    trying to forge a chain (minor) “incorrectly” may be penalized. (See Figure [5-5](#520777_1_En_5_Chapter.xhtml#Fig5).)


    ![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig5_HTML.jpg](images/520777_1_En_5_Chapter/520777_1_En_5_Fig5_HTML.jpg)


    **Figure 5-5** Dunkle


    The insight here is that you can replicate the PoW economy within the PoS.


    In PoW, there is a charge for making a mistake while creating a block on the chain,
    but this cost is hidden in the environment. Miners must spend more electricity
    and buy or rent additional hardware. Or alternatively, they must divide their
    computational resources, which is not convenient.


    Here, the sanctions are simply stated. This technique has the downside of putting
    validators at greater risk.


    For these reasons, Ethereum 2.0 is planning its own Proof of Stake, which takes
    the name of Casper, in the style of BFT (Byzantine Fault Tolerance).


    ### 5.1.3 BFT-Based Proof of Stake


    Because the rule of the longest chain is still employed to ensure the probabilistic
    finality of the blocks, chain-based PoS and commission-based PoS substantially
    follow the Nakamoto consensus structure. In contrast, BFT-based PoS incorporates
    an additional layer of consent that gives a quick finalization that is deterministic
    of the blocks.


    The blocking proposal can be made by any mechanism PoS (round-robin, committee-based,
    etc.) provided it injects a steady stream of fresh blocks into the BFT consensus
    layer.


    Aside from the standard approach, a checkpoint mechanism can be employed to ensure
    that the blockchain’s goal is fulfilled. (See Figure [5-6](#520777_1_En_5_Chapter.xhtml#Fig6).)


    Consequently, the longest chain rule can be substituted in a safe way by the current
    and secure checkpoint rule to determine the canonical main chain.


    Where `BlockGen()`:


    - Elects a proposed block with a success rate proportionate to the stake value.

    - Proposes, therefore, the block `BlockFi BTC()`.

    - Participates in the consensus BFT that finalizes a winning block.


    The winning block returns.


    ![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig6_HTML.jpg](images/520777_1_En_5_Chapter/520777_1_En_5_Fig6_HTML.jpg)


    **Figure 5-6** Byzantine fault tolerance-based PoS general procedure'
