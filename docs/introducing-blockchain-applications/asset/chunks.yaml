  trans: '

    ### 18.2.1 政府与公共部门


    为特定公民提供个性化服务、提升政府信任度、以及改进自动化、透明度和可验证性，这些都是区块链技术为公共部门带来的优势。在某些情况下，采用区块链技术执行公共服务可带来显著的额外效益，其中安全性提升便是一个例子。


    例如，基于区块链的政府签发身份证明，能为公民、企业和政府在开发、管理和获取特定服务的身份信息方面节省时间和金钱。诸如养老金、缴款、补贴及其他款项等公共福利，可以受益于由区块链驱动的去中心化网络，从而无需额外的第三方或中介机构即可进行交易。


    区块链可用于教育领域登记数字凭证，实现快速验证与确认，同时为教育机构和企业简化繁琐的行政流程。


    总体而言，区块链尚未大规模融入现有系统以创造能够为公民提供更好保护的新功能。在提供财产数据或链接到特定个人或实体时，这项技术仍需依赖来自中心化或政府系统的输入。


    此外，如何确保在没有法院参与的情况下，以电子方式发送的声明具有外部一致性，也是一个问题。尤其是需要利用智能合约处理的大量交易，是一项重大挑战。最后，建立、调整并维持众多不同企业之间的协作能力，对于区块链技术的采用至关重要。


    ### 18.2.2 数据管理


    大多数企业和行业已在应用数字化数据管理，这一趋势在不久的将来很可能会持续。由谁处理、存储和拥有数据，以及他们这样做的原因和方式，是或将是任何公司的关键问题。区块链可以提供额外工具，作为防篡改账本，确保数据的有效性和可靠性。


    ## 18.3 安全建议


    如果管理得当，区块链可以显著降低物联网系统的成本并提高效率。然而，技术融入物联网环境远非完美。例如，预计到 2021 年，只有 10%的生产用区块链账本会包含物联网传感器。此外，大多数物联网系统在计算能力上还远未达到能够处理大规模区块链实施的水平。


    虽然单点故障问题尚未消除，但物联网安全基于为所有连接设备持续提供安全保障。物联网用户，无论是个人还是组织，都应寻求具有端到端保护的多层安全体系，该体系应覆盖从网关到终端的范围，并能防止潜在的网络漏洞和入侵。这包括以下章节中涵盖的问题。


    ### 18.3.1 隐私政策


    区块链网络可能遭受安全和隐私攻击。本主题在多个章节中均有涉及，这些章节描述了攻击面，识别了共识协议中的漏洞，讨论了无需许可和需要许可的区块链面临的安全与隐私威胁，确定了防御重复支付的策略（无论是区块链技术自身发展的还是研究人员为减轻这些攻击影响而提出的方法），并探讨了可以采取哪些措施来减轻这些攻击的影响。


    通过密码学，区块链在任何时刻都能记录加密货币生态系统中所有现存币的所有权。一旦交易被其他网络成员或节点验证并通过密码学确认，它就会被记录在区块链的一个“区块”中。交易的时间、之前的交易以及交易详情都存储在一个区块中。


    交易按时间顺序保存，一旦作为区块被录入，便无法修改。自区块链技术的首个应用——比特币问世以来，该技术加速了新型加密货币和应用的发展。


    由于去中心化，数据并非像传统系统那样由单一机构检查和处置。相反，连接到网络的每个节点或计算机都会验证交易的合法性。密码学在区块链技术中保护并验证交易与数据。随着技术使用的增加，数据泄露变得更加普遍。


    个人数据和信息被保留、处理不当和滥用，对隐私构成威胁。许多人希望区块链技术能被广泛使用，因为它能提升用户隐私、数据安全性和数据所有权。


    ### 18.3.2 智能合约


    另一个需要填补与区块链相关的空白和期望的重要领域是智能合约。基于区块链的智能合约能为公司、组织和公共管理部门带来巨大利益。


    前景毋庸置疑，保险、物流和采购等行业已经收获了重要的好处。同样，在从现实世界、物理世界和数字世界的过渡阶段，一个极其重要的问题仍然存在，即确保由主体、个人或公司提供的、且已被正确识别的信息是准确无误的。


    ### 18.3.3 分布式计算系统


    分布式计算系统用于解决计算密集型问题。该领域有两大类别：


    - 集群计算

    - 网格计算


    *集群计算*涉及通常相似且位于同一区域的计算机，通过高速数据网络（局域网）连接。例如，你可以使用 Beowulf，它能够通过一台主计算机将一组进程分配到一组
    Linux 机器上。


    集群计算的一个应用领域是天气预报的计算。位于英国伯克郡雷丁市辛菲尔德公园的欧洲中期天气预报中心，由数十万个相似系统组成，这些系统通过一个极高速度的局域网（数量级达太比特）连接。


    在*网格计算*的情况下，资源是异构的，并且可能属于不同的机构。由于属于不同机构，这些资源通过地理数据网络（通常是互联网）连接。


    网格计算的一个例子是用于搜寻外星生命的 SETI 项目。分布式计算系统的编程需要使用某种特殊的库，这些库有助于利用物理基础设施。


    在集群架构和网格架构之间进行选择的标准是评估节点之间需要交换的数据量。如果需要交换的数据量很大，则必须使用集群计算。然而，如果数据量稀疏，则可以使用网格计算。高性能计算本身就是一个独立的研究领域。

    '
- fmt: '### 18.3.4 Distributed Information Systems


    These have the objective of managing distributed information. That is, we have
    pieces of information about different systems, and we want to manage them in such
    a way that they appear as if they were all present in one system.


    Classic example: distributed databases. There can be implementations:


    - Distributed transaction processing (or TPS: transaction processing system)

    - Enterprise application integration (EAI)


    **Distributed transaction processing.** In transactional systems, the ACID (Atomicity,
    Consistency, Isolation, Durability) properties apply to a database.


    In particular, atomicity consists of being able to execute a whole block of instructions,
    or not doing anything otherwise. Consistency means that any constraints imposed
    are respected. Isolation implies that multiple parallel transactions do not interfere
    with each other. Durability means that, when the order is committed, the results
    of the operations are permanent.


    Distributed transactional systems have a greater inherent difficulty than centralized
    ones: they can fall apart. Think of the fact that we are dealing with multiple
    databases, each in different systems. If the job in an intermediate database fails,
    it is also necessary to cancel the job already done in all the previous databases,
    in which it was completed successfully.


    A *Transaction Processing Monitor* (TPM) is normally used to implement transactional
    distributed systems. Basically, it consists in having a central system that collects
    requests and distributes them to the different systems, verifying precisely how
    the individual operations are going. In this way, the information is distributed,
    but the control logic is centralized.


    Instead of integrating databases, one can think of integrating applications, thus
    approaching the concept of Enterprise Application Integration.


    In this case there are a series of servers, equipped with peer-to-peer communication
    interfaces. The desired information is constructed by accessing the various servers
    that contain it, and then mounted appropriately. This approach is much more complex
    than the TPM. For example, think of web servers with service access interfaces.
    To integrate the related data, it is necessary to work on the responses of the
    services in question.


    ### 18.3.5 Distributed Pervasive Systems


    Pervasive distributed systems are part of the environment that surrounds us. The
    devices that compose them need to discover the services and adapt to the environment.


    Examples of pervasive distributed systems are:


    - Home systems

    - Electronic systems for healthcare and wireless sensor networks


    A domestic system is typically:


    - Self-managed

    - Self-configured

    - A personal space


    Electronic healthcare systems are composed of sensors that detect health measures
    from the patient (motion sensors, ECG, ...) and transmit them via a body-area
    network (BAN) to a hub that collects them and retransmits them to a centralized
    repository.


    An alternative architecture consists of connecting the measurement sensors to
    an external storage system via a continuous wireless connection. Unlike home systems,
    healthcare systems cannot be deployed with single server architectures.


    Healthcare systems need in-network computing capabilities. Wireless sensor networks
    (WSNs) are autonomous sensor systems, distributed in physical space, which cooperatively
    monitor physical or environmental conditions.


    They are characterized by stringent limitations regarding:


    - Processing capacity

    - Amount of memory

    - Power supply capacity


    These systems are particularly challenging in relation to:


    - Energy consumption

    - Programming

    - Safety

    - Routing

    - Software engineering

    - Middleware


    Typically it will be necessary to obtain the information collected from the sensor
    network. Several architectures are possible.


    It can be assumed that the sensors do not cooperate with each other and do not
    store the collected data, but merely send the data directly to the operator; or
    you can have sensors capable of processing and storing data. In response to a
    query, the sensors responsible for the requested data are sent only the answers.


    These solutions are not very attractive because:


    - Energy consumption is high.

    - It is necessary to limit the response data to the operator.


    For these reasons, the need to have in-network processing capabilities is considered.
    For this purpose, pub/sub (publish/subscribe) patterns can be used.


    ## 18.4 Client and Server Anatomy


    ### 18.4.1 Client


    The clients have the function of allowing the users to interact with the servers.
    This functionality can take place in several ways. The client can provide direct
    access to the services on the server by giving the user only the interface. In
    this context, the server does everything. The client is called a *thin* client.


    An example is the X Windows machines, where the clients do nothing but display
    the graphics decided by the server.


    It is possible that the client hosts software components that go beyond the pure
    graphical interface, taking charge of part of the application, to gradually reach
    extremes such as ATM machines and TV set-top boxes. In these cases, the user interface
    can become a minority component of the software present in the customer. While
    local processing and communication support may be predominant component.


    So far we have talked about the functional requirements of the software. But there
    may also be non-functional requirements.


    For example, transparency for data access is usually implemented with a software
    emulator on the client that provides the same interface as the server, masking
    the differences (data and communication format).


    Leasing, migration, and relocation are usually accomplished via naming systems,
    with the cooperation of client software. For example, consider how your cell phone
    works. When walking, the mobile phone measures the signal strength of the cell
    it is working with, and compares it with the powers of the other cells it receives.


    When the power of the reference cell drops excessively, the mobile phone (therefore
    the client) triggers the process to change the reference cell, requesting the
    connection to the strongest signal among those available.


    Similarly when dealing with embedded systems and the multi TCP, this means that
    a layer 4 (cellular) client opens multiple TCP channels (such as via a radio network
    and via WiFi). It routes the TCP traffic on the best performing channel. If the
    signal of the current channel degrades—because you go too far from the WiFi access
    point—your mobile phone passes the TCP traffic to the radio network. Indeed, if
    the signals are both good, it can do load balancing on both networks. This is
    an example of relocation of services. Even the masking of communication errors
    usually takes place on the client side.'
