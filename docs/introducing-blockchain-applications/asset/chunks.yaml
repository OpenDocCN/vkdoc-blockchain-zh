- fmt: '# 4. Ethereum


    The Bitcoin blockchain model has proved to be a paradigm valid for cryptocurrencies,
    which has led to increased interest and study about blockchain in various fields
    of application.


    Vitalik Buterin realized the potential of the blockchain model early on. He saw
    it as much more than a platform for cryptocurrencies.


    A passion for Bitcoin led him to found, at the age of 17, together with Mihai
    Alisie, *Bitcoin Magazine*, a site and print magazine covering topics related
    to Bitcoin. Vitalik quickly realized that blockchain technology could do much
    more.


    In 2013, he declared that Bitcoin needed a language of scripting for the development
    and creation of *decentralized applications.*


    Failing to convince the community, he began developing a new distributed information
    platform, based on technology blockchain. Thus, Ethereum was born on July 30,
    2015, and it introduced a new feature called *smart contracts*.


    A new generation of blockchain was inaugurated, and to date it’s still the most
    prominent—Blockchain 2.0.


    Consider the image shown in Figure [4-1](#520777_1_En_4_Chapter.xhtml#Fig1), in
    which Bitcoin and Ethereum are compared. On the left is Bitcoin, to which top
    of the stack is the Wallet application through which money transfer operations
    are made. To the right is Ethereum, which changed the blockchain into a computational
    system framework or architecture and opened a full world of opportunities in the
    decentralized realm. Note that Ethereum supports smart contracts and the machine
    virtual EVM on which these run. Smart contracts, in turn, enable decentralized
    applications that accomplish more of a transfer of value. In this way, a level
    of logic and calculation is added to the blockchain.


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig1_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig1_HTML.jpg)


    Figure 4-1

    Bitcoin vs. Ethereum stacks


    Ethereum users can not only transfer digital money through transactions, but they
    can develop smart contracts that allow them to perform transactions under certain
    conditions. For all intents and purposes, they can set conditions on the ways
    in which the value is transferred. Understandably, the idea of “programmable money”
    has attracted users, developers, and companies all over the world.


    In addition, developers can implement and create applications that operate in
    the distributed network of the Ethereum blockchain, the DAPPs (decentralized applications).


    With Ethereum, the blockchain becomes a decentralized IT platform where, in addition
    to transferring digital money, it is possible to distribute new applications and
    interact with other users of the network.


    Anyone can write a new application to run on the network blockchain, instead of
    on a centralized server. This does not only require overcoming any kind of censorship
    by a central authority, but is also immune to changes and allows all users to
    check the code before interacting with it.


    With Ethereum, blockchains are certainly not limited to the financial sector;
    they can also include electoral systems, registration of domain names, crowdfunding
    platforms, and intellectual properties, to name just a few examples.


    In short, Ethereum is a revolutionary and far-sighted project, which in addition
    to being recognized as one of the best online investments, brought world fame
    to the young founder of the Ethereum network. This invention was awarded the prestigious
    World Technology Award in 2014.


    This chapter goes into detail about the components and techniques that define
    the Ethereum blockchain.


    ## 4.1 Blockchain as a State Transition System


    The *Ethereum blockchain* is an open-source public blockchain. The model implemented
    by Ethereum can be summarized by three definitions:


    * **Cryptographically secure:** The information security present in the ledger
    is guaranteed by complex mathematical algorithms and difficult to break cryptography.
    In other terms, it is almost impossible to cheat the system.


    * **Transactional singleton machine:** There is, by construction paradigm, a single
    canonical instance of the machine responsible for all transactions that are generated
    in the system. There is one global truth that everyone believes in.


    * **With shared-state:** The state stored in this machine is shared and accessible
    by all.


    Hence, the Ethereum blockchain paradigm is that of a cryptographically secure,
    shared-state transactional singleton machine. The Ethereum blockchain is essentially
    a state machine based on transactions.


    A state machine is a graph of states and transitions.


    * A state describes a period of time in the life of an object and is represented
    by vertices or *nodes*.


    * A transition connects two states together and is represented with a oriented
    arc.


    The exit from a state defines the response of the object to the occurrence of
    an event. An event is the recurrence of a phenomenon placed in time and in space.


    Thus, a state machine is an automaton which, based on a series of input data,
    changes its internal state. (See Figure [4-2](#520777_1_En_4_Chapter.xhtml#Fig2).)


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig2_HTML.jpg](images/520777_1_En_4_Chapter/520777_1_En_4_Fig2_HTML.jpg)


    Figure 4-2

    Example of a finite state machine


    From this, you can deduce:


    * The status of the blockchain as the set of transactions present in the ledger.


    * An event in the blockchain such as the creation of a transaction.


    * A transaction function in the blockchain that takes on a state and new transaction
    and generates a new state.


    So, let `S` be a state, `TX` a transaction, and `APPLY` the function of state
    transition. It can be formally defined:


    `APPLY (S; TX) -> S0` or `ERROR`


    Note that the Ethereum’s state machine begins with a state of genesis, analogous
    to an empty list before transactions have been made on the network.


    To cause a transition from one state to another, a transaction must be valid.
    When the various transactions are performed, this state of genesis passes from
    time to time to a subsequent state. (See Figure [4-3](#520777_1_En_4_Chapter.xhtml#Fig3).)


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig3_HTML.png](images/520777_1_En_4_Chapter/520777_1_En_4_Fig3_HTML.png)


    Figure 4-3

    Transitions of states based on transactions


    At any point in the junction, the final state represents the overall state of
    Ethereum.


    The overall status of Ethereum contains transactions. Such transactions are grouped
    into blocks. Each block contains a number of transactions and is chained to the
    previous block. See Figure [4-4](#520777_1_En_4_Chapter.xhtml#Fig4).


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig4_HTML.png](images/520777_1_En_4_Chapter/520777_1_En_4_Fig4_HTML.png)


    Figure 4-4

    Transaction flow


    From a technical point of view, the general ledger can be viewed as a state transition
    system in which there is a state that contains all of the general ledger transactions,
    as well as a transition function that takes a state and a transaction and returns
    a new state.


    In a conventional banking system, for example, state is a balance sheet, a transaction
    is a request to shift `X` from account `A` to account `B`, and the state transition
    function decreases the value of `X` in account `A` and increases the value of
    `X` in account `B`.


    The state transition function then gives an error if `A`’s account has less than
    `X` at the start. Let `TX = Send 70 from Luca to Sara`.


    `APPLY ((Luca: e50; Sara: e50); TX) = ERROR`


    Or, let `TX = Send e20 from Luca to Sara`


    `APPLY ((Luke: e50; Sara: e50); TX) = Luke: e30; Sara: e70`'
