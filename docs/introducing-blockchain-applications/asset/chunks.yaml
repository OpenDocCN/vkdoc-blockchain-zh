    task was difficult owing to the large number of options presented, many of which
    had significant practical constraints. However, the technologies we utilized in
    this project allowed us to complete this task.


    At the same time, we cannot overlook the problems that these initiatives have.
    This approach has shown to be a helpful tool for analyzing the performance of
    the entire system, with a focus on well-known metrics for evaluating a system’s
    reliability and the security monitor’s effectiveness.


    The creation of situations and problems is essential for establishing whether
    external factors impair performance of the system and for creating and evaluating
    “uncommon” circumstances that cannot always be covered when building ad hoc safety
    cases.


    The main hypothesis that inspired us to start this study was to examine if the
    performance of “static” error-checkers was impacted by neuronal network performance,
    and if ad hoc training approaches had an impact as well.


    According to the data gathered, the monitor’s efficacy with expert agents is expected
    to alter, encouraging us to further investigate this hypothesis. The failure of
    those methods (S2, S3, S4) that employed the safety monitor to direct the training
    did not provide us with proof of this reality, and this issue was highlighted
    at the beginning of the chapter. There are two possible causes for this failure:


