    \ who has power at the channel level. The channel MSP defines the connection between\
    \ channel members’ identities and the execution of channel-level rules.\n\nThe\
    \ MSP channel links the MSPs of all participating organizations to a single ordering\
    \ system. An ordering service will most likely have ordering nodes from many businesses,\
    \ with the ordering service as a whole being handled by the businesses.\n\nAs\
    \ a result, a channel MSP logically resides and is handled from the channel or\
    \ network, but each node’s local file system contains a copy of every channel\
    \ MSP.\n\n# Peers\n\nA blockchain is mostly made up of nodes that communicate\
