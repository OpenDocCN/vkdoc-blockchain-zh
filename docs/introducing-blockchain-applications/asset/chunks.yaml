  trans: '

    # 6.12 排序服务实现


    Hyperledger Fabric 最新版本中的排序服务是一种崩溃容错提供者，称为 *Raft*。


    Raft 采用了“领导者和追随者”范式，其中通道的排序节点会动态选举出一个领导者，由该领导者将消息复制到通道的追随者节点。Raft 具有崩溃容错性，因为它能够容忍部分节点（如领导者节点）的故障，只要大多数排序节点仍然正常运行（CFT）。


    ## 6.13 总结


    本章详细讨论了 Hyperledger Fabric。首先介绍了 Hyperledger Fabric 的特性，然后加深了您对 Hyperledger Fabric
    的理解。Hyperledger 概念之所以重要，原因如下：


    -   许可区块链

    -   性能良好且交易延迟低

    -   可根据需求进行模块化和可配置化

    -   数据库抽象化以加速与世界状态的交互

    -   能够创建不同的通道，进而创建不同的账本

    -   能够使用不同的编程语言开发应用和链码


    该平台没有特别的缺点。在讨论 Hyperledger 时，您还必须考虑分布式系统，以及如何在分布式系统中使用 Hyperledger。这正是共识算法概念发挥作用的地方。下一章将重点介绍分布式环境中的共识算法。


    # 7. 区块链共识算法


    *共识算法*是一种使人类或机器能够在分布式环境中协作的机制。即使某些节点发生故障，系统也必须能够就所有节点共同的真实来源达成一致。换句话说，系统必须能够容忍故障。


    在中心化设计中，系统由单个实体控制。该系统在大多数情况下可以进行调整，因为没有复杂的治理机制来在多个管理员之间达成共识。


    去中心化设置则完全是另一回事。假设您正在使用一个分布式数据库；您如何决定添加哪些条目？


    为区块链铺平道路的最关键的发展是在互不信任的陌生人的环境中克服了这一困难。本章将探讨共识算法如何对加密货币和分布式账本的运作至关重要。


    ## 7.1 共识算法与加密货币


    区块链是一个存储加密货币用户余额的数据库。至关重要的是，每个人（或者更确切地说，每个节点）都拥有该数据库的副本。否则，您将很快发现信息相互矛盾，从而破坏了加密货币网络的根本目的。


    公钥密码学确保了用户不能互相花费对方的货币。然而，网络参与者仍然必须依赖单一的真实来源来确定资金是否已被花费。


    为了协调参与，比特币的创造者中本聪提出了一种工作量证明方法。稍后我们将深入探讨 PoW 的工作原理；现在，我们先看看各种共识算法的一些共同特征。


    首先，需要那些想要贡献区块的人（称为*验证者*）提供一份抵押品。抵押品是验证者必须提交的一笔资金，这可以阻止他们做出不诚实的行为。如果他们作弊，就会失去抵押品。计算能力、加密货币甚至声誉都是抵押品的例子。


    他们为什么要拿自己的资产冒险？因为有经济激励。这通常包括其他用户支付的费用、新铸造的加密货币单位，或两者兼有，并且通常以协议的原生加密货币形式存在。


    最后需要的是透明度。您必须能够识别出何时有人在说谎。对他们来说，创建区块的成本应该很高，但对任何人来说验证区块的成本应该很低。这确保了普通用户能够监督验证者。


    群体中的个体成员使用共识算法来为整个群体做出并支持最佳选择。这是一种决策系统，其中个体必须支持整体选择，无论他们是否同意。


    简单来说，这是一种让一群人可以做出决定的方法。例如，考虑一个由 10 人组成的团队，他们想要选择一个对所有人都有利的项目。他们每个人都可以提出建议，但大多数人会选择最有利于自己的那个建议。这个决定会影响其他人，无论他们是否同意。


    想象一下在数万名参与者中做同样的事情。是不是会变得困难得多？


    共识算法不仅与多数投票一致，而且还会寻求一个惠及所有人的解决方案。因此，网络始终是胜利的一方。


    区块链上的共识模型是在网络世界中建立公平公正的方法。用于达成这种共识的机制被称为*共识定理*。


    ## 7.2 共识模型的目标


    这些区块链共识模型有几个特定的目标，包括：


    -   **达成一致：** 该机制尽可能多地收集群体的一致意见。

    -   **协作：** 各方都力求达成一个对整体更有利的协议。

    -   **合作：** 每个人都像一个团队一样工作，将个人目标搁置一旁。

    -   **平等权利：** 在投票过程中，每个投票者都具有相同的价值，每个人的投票都很重要。

    -   **参与：** 网络中的每个人都必须参与投票。没有人会被排除在外，也没有人能够投弃权票。


    ## 7.3 不同类型共识算法


    拜占庭问题的另一个非常困难的方面是达成一致。即使出现一个缺陷，节点也将无法达成妥协，或者会遇到更高的难度值。


    使用共识算法，您不必处理这个问题。它们的主要目标是尽一切必要手段达成既定目标。拜占庭共识结构在可信度上远低于区块链共识模型。


    因此，在可能存在冲突输出的分布式系统中，采用共识技术来获得更好或更高的结果是可取的。


    共识算法是一种计算机工程方法，允许分散的流程或系统就*单一数据值*达成一致。共识方法用于具有多个故障节点的网络，以确保可靠性。在分布式计算和多智能体系统中，解决这个问题，即所谓的*共识问题*，至关重要。


    共识算法必须假设某些进程和系统将不可用，并且某些通信将会丢失，以应对这种现实情况。因此，共识方法必须具备容错性。


    共识方法用于具有多个故障节点的网络，以确保可靠性。它们必须确保系统中的节点能够就单一的真实来源达成一致。


    ## 7.4 区块链共识算法的类型


    存在多种具有不同特性的区块链共识算法（见图 7-1）。以下各节将介绍其中许多算法。

    '
- fmt: '### 7.4.1 Proof-of-Work (PoW)


    Satoshi Nakamoto invented `PoW`, which is the earliest consensus mechanism in
    the blockchain world. Mining is another name for it, and the nodes involved are
    called *miners*.


    The miners must resolve complex math riddles employing a large amount of computing
    power in this technique. They employ a variety of mining techniques, including
    Graphical Processing Unit (`GPU`) mining, Application Specific Integrated Circuit
    (`ASIC`) mining, and Field Programmable Gate Array (`FPGA`) mining. The person
    who solves the problem first gets a block as a prize.


    ![../images/520777_1_En_7_Chapter/520777_1_En_7_Fig1_HTML.jpg](images/520777_1_En_7_Chapter/520777_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Types of consensus algorithms


    Several cryptocurrencies—including Bitcoin, Litecoin, ZCash, Primecoin, Monero,
    and Vertcoin—utilize the `Proof of Work` mechanism.


    `PoW` has had an impact on not only the finance industry, but also on healthcare,
    governance, management, and other fields. In fact, it has provided the option
    of multichannel payments and multi-signature transactions over an address in order
    to improve security.


    ### 7.4.2 Proof of Stake (PoS)


    The simplest and most ecologically friendly alternative to the `PoW` consensus
    mechanism is `Proof of Stake (PoS)`.


    The block creators in this blockchain system do not act as miners, but rather
    as validators. They can construct a block over everyone, which will save energy
    and time. In order to validate the block, they must invest a certain amount of
    money or stake.


    In addition, unlike `PoW`, miners are given the option to keep their transaction
    fees in this algorithm because there is no reward mechanism in this consensus
    model.


    As a result, companies like Ethereum were pushed to upgrade their paradigm from
    `PoW` to `PoS` in their `Ethereum 2.0` release. It also aided the correct functioning
    of several blockchain ecosystems such as Dash, Peercoin, Decred, ReddCoin, and
    Piv X.


    While `PoS` addressed some of the flaws that previously plagued `PoW`, the market
    still faced numerous challenges. Several types of `PoS` were created to address
    these issues and provide a better blockchain ecosystem. The two major variations
    of `Proof of Stake (PoS)` are `PoSD` and `LPoS`, discussed next.


    #### 7.4.2.1 Proof of Stake Delegated (PoSD)


    In `PoSD`, players stake their coin and vote for a certain number of delegates,
    with the amount they invest determining how much weight they receive. For example,
    if user A invests 10 coins in a delegate while user B spends 5, A’s vote is more
    important than B’s.


    Delegates are also paid in interchange fees or a set number of bitcoins.


    Due to its stake-weighted voting method, `PoSD` is commonly considered a digital
    democracy and one of the fastest blockchain consensus algorithms. Some of the
    real-world uses of the blockchain consensus mechanism include Steem, EOS, and
    Bit Shares.


    #### 7.4.2.2 Leased Proof of Stake (LPoS)


    `LPoS` is updated variant of the `PoS` consensus mechanism on the Waves platform.


    Unlike the traditional proof-of-stake approach, which allows users to lease their
    cryptocurrency balance to full nodes, this consensus process enables users to
    rent their remaining balance to complete nodes.


    Those who rent the most have the best chance of creating the block. In addition,
    the leaser gets paid a share of the transaction charge collected from the entire
    node.


    This `Proof-of-Stake` variation offers a fast and secure way to build public cryptocurrencies.


    ### 7.4.3 Byzantine Fault Tolerance (BFT)


    The Byzantine Error is a situation in which the system’s participants must agree
    on a suitable approach to avoid catastrophic failure, yet some of them are unsure.
    `PBFT` and `DBFT` are the two most common `BFT` consensus models in the blockchain
    industry.


    ### 7.4.4 Practical-BFT


    `Practical-BFT` is a simple method that tackles the Byzantine Common’s difficulties
    by permitting users to agree to the messages that have been delivered to them
    by completing a computation to verify the validity decision.


    The party then informs other nodes of its decision, which are then required to
    make a decision. The final choice is then based on the information gathered from
    the other nodes.


    ### 7.4.5 Delegated Byzantine Fault Tolerance (dBFT)


    The `dBFT` technique was introduced by NEO and NEO coin holders have the ability
    to elect delegates as well.


    This is true regardless of the amount of money they invest. Anyone who meets the
    minimum requirements, which include a verified identification, adequate equipment,
    and 1,000 GAS, can serve as a delegate. After that, a speaker is chosen at random
    from among the delegates.


    ### 7.4.6 Direct Acyclic Graph (DAG)


    `DAG` is a simple yet important blockchain consensus mechanism that every mobile
    app development business dealing with blockchain should be familiar with.


    In this type of blockchain consensus architecture, each node prepares to become
    a “miner.” If miners are removed from the equation and transactions are validated
    by users, the cost associated with them is lowered to $0. The process of validating
    transactions between any two nodes becomes easier, making it lighter, faster,
    and more secure.


    Despite the fact that these are the most common consensus models in the development
    environment, several other blockchain consensus mechanisms have begun to gain
    traction, including the following.


    ### 7.4.7 Proof of Capacity (PoC)


    The method that is followed is plotting. Two cryptocurrencies that use this blockchain
    consensus technology are Burstcoin and SpaceMint.


    How does it work? First you need to grasp two ideas—charting and mining—in order
    to appreciate the essence of the consensus theorem.


    *   The `PoC` algorithm uses nonces that are different from those used in Bitcoin.
    Until the nonces are solved, you’ll have to hash your ID and data.

    *   Hard drive “mining” is the next concept. As previously indicated, you can
    get zero to 4095 scoops at one time and then you can store it in our storage space.
    You will be given a strict timeframe to resolve the nonces. This timeline mentions
    how long it will take to create a block.


    You will receive a block as a reward if you can resolve the nonces faster than
    the other miners. Burst is a well-known example of a company that has embraced
    the `PoC` algorithm.


    ### 7.4.8 Proof-of-Burn (PoB)


    `PoB` consensus architecture is an alternative to `PoW` and `PoS` in terms of
    energy consumption. It operates by letting miners burn/ruin virtual cryptocurrency
    tokens, allowing them to produce blocks proportional to the currencies. They are
    more likely to win a new block for each coin they get if they burn more coins.


    However, in order to burn money, they must transmit it to an address where it
    cannot be used to verify the block. This is often utilized in the situation of
    distributed consensus. The best example of this consensus mechanism is Slimcoin.


    ### 7.4.9 Proof-of-Identity (PoI)


    `PoI` is similar to the idea of authorized identity. It’s a piece of cryptographic
    confirmation for a user’s private key, which is associated with each transaction.


    Each identified user can create and manage a data block that can be shared with
    others in the network.


    This blockchain’s methodology ensures the data’s validity and integrity. As a
    result, it’s a good candidate for use in smart cities.


    ### 7.4.10 Proof-of-Activity (PoA)


    `PoA` combines the benefits of the `PoW` and `PoS` consensus models.


    The miners compete to solve a cryptographic puzzle as quickly as possible, using
    special hardware and electric energy, exactly as they do in `PoW`. However, the
    blocks that come together only have the information on the block successors’ identity
    and the prize transaction.


    `Proof-of-Activity (PoA)` is a combination of the `Proof-of-Stake (PoS)` and `Proof-of-Work
    (PoW)` consensus techniques. It allows legitimate transactions and consensus among
    miners to take place. In both `PoS` and `PoW`, `PoA` seeks to solve centralization
    concerns. It also aspires to do it in a resource-conserving manner.'
  raw: '### 7.4.1 Proof-of-Work (PoW)


    Satoshi Nakamoto invented PoW , which is the earliest consensus mechanism in the
