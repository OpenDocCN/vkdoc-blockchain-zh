    Model querying assists in the visualization of custom SoS views and can help discover
    design problems.


    Adding a new connection to a block is a simple process. Using connections to existing
    blocks is one approach to constructing an SoS. Creating connections/links can
    let you reuse an available block, but it’s not the same as copying and pasting
    a block into BLOCKLY. The connected blocks are referenced via links. For example,
